[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_and_session_modules_bound"
description = "Contract modules browse-query-v1, command-session-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show browse, session, entity, and artifact tool prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, session, entity, and artifact tool handlers drive the same visible UI logic as on-page controls (section/press-kit destinations, race toggle/select, video start/pause/restart, press-kit export/copy)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_available"
description = "Only documented browse, session, entity (create/select/update/delete/toggle/quantity/reorder), and artifact (import/export/copy/print_preview/convert) permitted operations are available — no undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open against bound destinations, session start/pause/restart, entity race select/toggle/update, and artifact import/export/copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_open"
description = "Browse open works for declared destinations: hero, horizontal-media, helmet-grid, race-calendar, collabs, social-stream, footer, menu, and press-kit."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_start_pause_restart_bound"
description = "Session operations start, pause, and restart are bound and surface the same video play/pause/restart UI state as manual hover/control use where the UI exposes those states."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "destinations_match_bindings"
description = "Browse destinations exposed via tools match the Bindings block exactly: hero; horizontal-media; helmet-grid; race-calendar; collabs; social-stream; footer; menu; press-kit."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / command-session-v1 / entity-collection-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Browse or session MCP tooling is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A browse open or session start/pause tool invocation updates MCP-reported state without matching the visible scroll position or video UI (or the reverse)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_destinations_or_ops_exposed"
description = "Undeclared destinations or operations outside the Bindings/permitted_operations lists are exposed via webmcp_list_tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise browse open or session start/pause/restart against the declared bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mechanics_exclusions_faked_via_mcp"
description = "MCP handlers fabricate success for Playwright-excluded mechanics (menu overlay open/close animation, horizontal-track/helmet scroll motion, social hover-to-play fade, or WebGL/Rive rendering) without the visible UI performing those behaviors."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete module/tool data for the declared contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console stubs rather than app-registered handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_missing"
description = "browse-query-v1, command-session-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed so list/invoke cannot reach real handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "session_ops_bindings_incomplete"
description = "Declared session operations start, pause, and restart are missing from the bound command-session surface."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.11"
name = "entity_race_select_toggle_bound"
description = "Entity race operations select, toggle, and update are bound and change the same visible race selected treatment and Selected races N readout as clicking a race row."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_import_export_copy_bound"
description = "Artifact operations import, export, and copy are bound (import modes paste/file; export formats json, markdown, ics) and drive the same press-kit preview/import surface as the PRESS KIT UI (file picker, clipboard, and download contents remain Playwright-observed)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n11"
name = "entity_or_artifact_missing"
description = "Declared entity race operations or artifact import/export/copy formats are missing from the bound tool surface."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n12"
name = "artifact_export_diverges_from_ui_kit"
description = "Invoking artifact export/copy updates MCP-reported success without the press-kit preview reflecting the current race selections and shortlist (or the reverse)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
