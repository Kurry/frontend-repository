[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_20px_baseline"
description = "At 1440 width, section spacing and card gaps align to a consistent baseline unit of 1.25rem (20px) and its multiples rather than arbitrary one-off offsets visible in computed styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec_metrics"
description = "At 1440 typography matches the spec: stacked AVERY (serif ~32px) / VALE (sans weight 900 ~32px) wordmark in rgb(17, 17, 18); impact statement roughly 132px / ~109px line-height in lime-off rgb(178, 199, 58); footer statement roughly 72px in off-white rgb(244, 244, 237); STORE label ~20px weight 800."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_screenshots"
description = "At 1440 desktop width, composition matches /reference-screenshots/ overview and segment panels to near pixel-parity for fixed nav, cream hero with NEXT RACE widget, pinned horizontal media, impact statement, helmet grid, collaborators, social video, and footer density/proportions — using fictional Avery Vale assets, not source branding."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: LOAD VALE preloader clear, menu ellipse expand/collapse (~750ms), pinned horizontal media travel, STORE split reveal, helmet clip-path reveal, and character fills — verified via the real UI/scroll path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns at the product breakpoints (992/991/767/479): single-row ~100px nav at ≥992 vs ~140px wrapped mobile nav at 390, three-across helmet cards vs single column (~326×435), menu photo grid hidden at 390."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "store_and_hamburger_styling_match_spec"
description = "STORE is a filled lime pill (background rgb(210, 255, 0), dark text, bag icon, radius near 0.74rem/~12px); hamburger and menu close are square outlined buttons about 60×60 with rounded corners — not unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes serif display treatment (impact, menu items, footer statement) from Mona Sans Variable body/labels across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Default/hover/disabled states match the spec where specified: HOME current-item lime stroke vs muted green rgb(180, 184, 165), Subscribe disabled until valid email, helmet hover scale/reveal/index lime, video placeholder fade."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_and_accent_exact"
description = "Color treatments match exactly: dark-green base/menu/footer rgb(40, 44, 32); cream hero rgb(239, 239, 229); off-white text rgb(244, 244, 237); lime accent rgb(210, 255, 0) reserved for STORE, current-menu stroke, and hover highlights — not flooding large section backgrounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec_timing"
description = "Hover/press microinteractions follow the reference language and timing: menu overlay 750ms cubic-bezier(0.65, 0.05, 0, 1), STORE split ~0.4s on the same easing, helmet reveal 0.75s, video placeholder opacity 0.3s — verified on the real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_baseline"
description = "Visible major section gaps use arbitrary odd-pixel spacing that contradicts the 1.25rem (20px) baseline scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_dual_tone_palette"
description = "Surfaces or accents use colors outside the specified dual-tone dark-green/cream canvas and lime accent system (e.g. arbitrary purple/blue theme wash or lime flooding large backgrounds)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440 the impact statement or footer brand statement is grossly mismatched versus the ~132px / ~72px reference metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no pinned horizontal media travel, no menu overlay transition, or no STORE/helmet hover motion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "STORE, hamburger, or newsletter controls use unstyled browser default appearance when the spec styles them with the lime/token system."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_screenshots"
description = "At 1440 the nav/hero/media/helmet/footer composition is grossly misaligned versus /reference-screenshots/ segment panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (NEXT RACE widget, horizontal media cards, helmet grid, footer form) render off-screen or clipped at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated homepage regions (hero → horizontal media → impact → helmet grid → race calendar → collaborators → social video → footer) or omits a required region including the menu overlay, press kit, or command palette."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/case throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or menu/STORE/helmet microinteractions are missing or clearly deviate from the reference (instant snaps, no split reveal, no clip-path helmet wipe)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.11"
name = "hardened_surfaces_match_token_system"
description = "Race calendar, press-kit drawer, and command palette match the dual-tone token system (dark-green rgb(40,44,32), off-white text, lime accents) rather than introducing a second unrelated UI theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "hardened_surfaces_break_reference_system"
description = "The race calendar, press kit, or palette introduce a clashing visual system (e.g. light card dashboard chrome) that breaks the reference dual-tone cinematic language."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
