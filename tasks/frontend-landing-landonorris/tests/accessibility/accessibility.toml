[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "interactive_controls_keyboard_operable"
description = "Every interactive control (STORE, PRESS KIT, hamburger, menu items, socials, legal links, shortlist controls, race rows, status filter, Undo, Redo, email field, Subscribe, palette search/results) is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "menu_modal_focus_trap_and_return"
description = "The menu overlay behaves as a modal dialog: it traps focus while open, closes on Escape, and returns focus to the hamburger button on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "media_have_accessible_names"
description = "Editorial images, helmet cards, partner marks, and the social video poster carry descriptive alt text or accessible labels where they convey content."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "newsletter_feedback_uses_live_region"
description = "Newsletter inline error and confirmation messages are announced through an aria-live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "newsletter_field_has_explicit_label"
description = "The newsletter email field uses an explicit label association (or equivalent accessible name)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "Section headings follow a logical heading order through the homepage with no skipped levels that break the outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_nav_main_footer"
description = "The document exposes HTML-first landmarks: header/nav chrome, a main content landmark wrapping the homepage sections, and a footer landmark."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contrast_cream_and_dark_sections"
description = "Text over the cream hero and dark-green sections, and all control labels, meet WCAG AA contrast; lime STORE button text on lime stays high-contrast (dark text on rgb(210, 255, 0))."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_interactive_chrome"
description = "Interactive chrome uses real controls (button, label, native links) with semantic roles; custom overlays expose matching ARIA roles only where native elements cannot carry the behavior."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_settles_immediately"
description = "With prefers-reduced-motion emulated on a fresh load, scroll-linked animation settles immediately, the LOAD VALE preloader does not block content, in-page jumps use instant scroll, and continuous marquees do not run — while the page remains fully scrollable and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.a1"
name = "split_text_aria_label_on_container"
description = "Split-text headlines (impact statement and footer brand statement) keep the original phrase as an aria-label on the heading container while individual character/word spans are aria-hidden from the accessibility tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.a2"
name = "hero_webgl_labelled_or_decorative"
description = "The hero canvas or WebGL layer is treated as decorative or labelled: role=img with a descriptive aria-label, or aria-hidden when a static silhouette sibling already conveys the artwork."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "A primary interactive control (STORE, hamburger, menu item, email field, or Subscribe) cannot be reached or activated via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused interactive controls show no visible focus indicator or the indicator is fully obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "icon_only_controls_lack_names"
description = "The hamburger or menu close control lacks a descriptive accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "newsletter_errors_color_only"
description = "Newsletter validation errors are indicated only by color with no text or live-region announcement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "menu_fails_to_trap_focus"
description = "With the menu open, keyboard focus escapes into the background page while overlay controls remain open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_unreadable_text"
description = "Body or UI text over the cream hero or dark-green sections is unreadable due to contrast below WCAG AA."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "newsletter_feedback_visual_only"
description = "Newsletter error or confirmation appears visually only with no aria-live region exposure."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.a4"
name = "split_heading_character_soup"
description = "A split/kinetic headline (impact or footer statement) is exposed to the accessibility tree as character soup — no aria-label on the container and the split spans are not aria-hidden."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.a5"
name = "canvas_only_control_unreachable"
description = "A canvas-only interactive control in the hero is unreachable by keyboard and has no representation in the accessibility tree."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, scroll-linked horizontal media travel, continuous marquees, or a blocking preloader continue to run."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "press_kit_and_palette_modal_a11y"
description = "The press-kit drawer and command palette each behave as modal dialogs: Escape closes them, focus is trapped while open, and focus returns to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "shortlist_controls_accessible_names"
description = "Icon-only shortlist controls on helmet and editorial cards expose descriptive accessible names."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "selection_counts_live_region"
description = "Selected races N and shortlist count changes are announced via an aria-live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n11"
name = "press_kit_or_palette_no_focus_trap"
description = "With the press kit or command palette open, keyboard focus escapes into the background page while the overlay remains open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n12"
name = "shortlist_or_race_row_not_keyboard"
description = "A shortlist control or race row cannot be reached or activated via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
