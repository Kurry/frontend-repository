[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "rapid_hamburger_x_settles_open_or_closed"
description = "Rapidly clicking the hamburger and the X control in succession never leaves the menu overlay stuck half-open or the page inert; the menu always settles fully open or fully closed."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "escape_while_menu_closed_noop"
description = "Pressing Escape while the menu is closed and no other overlay is open changes nothing on the page (overlay stays closed; scroll and chrome unchanged)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "empty_newsletter_submit_blocked"
description = "Submitting the newsletter form with an empty email field is blocked: an inline message names the email field and no confirmation appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "double_subscribe_one_confirmation"
description = "Double-activating the Subscribe control on one valid email shows exactly one confirmation message."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "video_leave_mid_fade_restores_placeholder"
description = "Moving the pointer off the social video card mid-fade restores the placeholder image to fully opaque and pauses the video."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "webgl_unavailable_static_hero_usable"
description = "If WebGL rendering is unavailable, the hero shows a static composition of the same artwork and every section, control, and flow (menu, newsletter, video hover, race calendar, shortlist, press kit, palette) remains present and usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "newsletter_errors_name_email_field"
description = "Newsletter validation errors name the email field with actionable text rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "newsletter_controls_semantic"
description = "The newsletter email field and Subscribe control use semantic input/button elements with visible labels (or accessible name equivalents) rather than unlabeled div shells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "menu_close_paths_work"
description = "The open menu overlay closes via the X control and via Escape, restoring an interactive homepage under the fixed nav."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "subscribe_disabled_until_valid_email"
description = "The Subscribe control stays disabled until the newsletter field holds a contract-valid email (exactly one @, non-empty local part, domain segment containing a dot)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "menu_stuck_half_open"
description = "After rapid hamburger/X clicks, the menu overlay remains stuck half-open or the page is left inert."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "newsletter_errors_only_in_console"
description = "Submitting an empty or invalid newsletter email surfaces errors only in the browser console with no inline message naming the email field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "newsletter_or_video_silent_feedback"
description = "A valid newsletter submit or a video hover/leave cycle produces no visible feedback (no confirmation, no playback/placeholder change)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "empty_submit_shows_confirmation"
description = "Submitting the newsletter with an empty field shows a confirmation message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "menu_interactive_chrome_nonsemantic"
description = "The hamburger, menu close control, or Subscribe control are non-semantic div/span shells without button semantics or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "menu_not_keyboard_dismissible"
description = "The open menu overlay cannot be dismissed via Escape or a focusable close control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "newsletter_validation_feedback_missing"
description = "An empty or invalid newsletter submit shows no inline validation indication naming the email field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "store_or_subscribe_labels_missing"
description = "The STORE button or Subscribe control lacks readable labels or uses blank/ambiguous text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "video_stuck_mid_fade"
description = "Leaving the social video card mid-fade leaves the placeholder partially transparent or the video stuck playing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "webgl_failure_breaks_homepage"
description = "When WebGL is unavailable, the hero is blank/broken or menu, newsletter, or video flows become unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "escape_closes_press_kit_or_palette"
description = "Pressing Escape while the press kit or command palette is open closes that overlay and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "filter_preserves_hidden_selections"
description = "Filtering the race calendar to Completed then back to All keeps previously selected Upcoming races selected; the Selected races count does not drop solely because a filter hid rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "empty_press_kit_valid_previews"
description = "Opening the press kit with zero selected races and zero shortlisted assets shows valid empty-state previews (JSON with schemaVersion 1, empty races/shortlist, newsletter none, ICS with zero VEVENT entries) rather than an error blank."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "empty_undo_redo_noop"
description = "Undo when the undo stack is empty is a no-op that does not clear unrelated UI; Redo when the redo stack is empty is likewise a no-op."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "filter_clears_hidden_race_selections"
description = "Switching the race status filter clears selections on races that were only temporarily hidden by the filter."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "4.20"
name = "out_of_enum_status_rejected"
description = "Submitting the race status editor with a value outside Upcoming or Completed is blocked with an inline error naming status and the race chip does not change."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.21"
name = "malformed_import_keeps_state"
description = "Importing malformed or undecodable press-kit JSON, or JSON that violates the field contract (wrong schemaVersion, missing races, non-YYYY-MM-DD date, status outside Upcoming/Completed, shortlist kind outside helmet/editorial, empty or over-length shortlist label, shortlist index < 1, newsletter neither none nor a contract-valid email), shows a visible error naming the import problem, leaves selections and shortlist unchanged, and produces no console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n20"
name = "malformed_import_corrupts_state"
description = "Importing schema-invalid press-kit JSON mutates Selected races or shortlist without a visible named import error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "empty_press_kit_errors_or_blank"
description = "Opening PRESS KIT with no selections shows a blank/error drawer instead of valid empty JSON/ICS previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
