[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The composition reads as a dark cinematic F1 brand site with a dark-green base, off-white text, and lime as the single loud accent, and a lighter cream hero band"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The stacked LANDO NORRIS wordmark pairs a serif treatment for LANDO with a heavy sans treatment for NORRIS and oversized display copy uses the Brier face"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "3_3"
description = "The open menu is a full-screen dark-green overlay with a topographic line texture, oversized uppercase menu items on the left, and a photo grid on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Helmet cards are tall portrait cards masked to a helmet silhouette and the logo marquees fade out at their left and right edges"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "The hero is an equal-width plain stack instead of the branded dark-green and cream hero with lime accents and the NEXT RACE widget"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The lime accent is missing so the Store button, current-menu stroke, and hover states do not read as lime #d2ff00"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The impact heading computes to the Brier family at roughly 132px in the lime-off color rgb(178, 199, 58) at 1440x900"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "3_8"
description = "The hero band background computes to rgb(239, 239, 229) and contrasts against the following sections whose background computes to rgb(40, 44, 32)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "The wordmark renders LANDO in a serif family and NORRIS in Mona Sans Variable at weight 900, both in the dark color rgb(17, 17, 18)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "3_10"
description = "The impact statement, menu items, or footer statement render in a system or sans fallback instead of the Brier display face"
type = "binary"
weight = 0.5
negate = true
optional = true
