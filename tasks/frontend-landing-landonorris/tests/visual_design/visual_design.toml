[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dark_cinematic_palette"
description = "The composition reads as a dark cinematic F1 brand site: sections compute to the dark-green base rgb(40, 44, 32) with off-white rgb(244, 244, 237) text, lime rgb(210, 255, 0) is the single loud accent, and the hero is a lighter cream band"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "wordmark_serif_sans_pairing"
description = "The stacked LANDO NORRIS wordmark pairs a serif display treatment for LANDO with a heavy sans treatment for NORRIS, both about 32px at 1440, and oversized display copy (impact statement, menu items, footer statement) renders in the bundled serif display face"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "menu_overlay_composition"
description = "The open menu is a full-screen dark-green overlay with a topographic line texture, oversized uppercase display-face menu items (roughly 96px at 1440) on the left, a staggered placeholder photo grid on the right, and the current HOME item de-emphasized to the muted green rgb(180, 184, 165) with a lime stroke"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "helmet_mask_and_marquee_fade"
description = "Helmet cards are tall portrait cards (about 445 by 594 at 1440, three across) masked to a helmet silhouette and the logo marquees fade out at their left and right edges"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "hero_generic_stack"
description = "The hero is an equal-width plain stack instead of the branded cream band with topographic contours, organic blobs, lime accents, and the NEXT RACE widget"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "lime_accent_missing"
description = "The lime accent is missing so the Store button, current-menu stroke, and hover states do not read as lime #d2ff00"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "impact_statement_metrics"
description = "The impact heading renders in the bundled serif display face at roughly 132px with a line-height near 109px in the lime-off color rgb(178, 199, 58) at 1440x900"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "hero_cream_band_contrast"
description = "The hero band background computes to rgb(239, 239, 229) and contrasts against the following sections whose background computes to rgb(40, 44, 32)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "wordmark_weights_and_color"
description = "The wordmark renders LANDO in a serif family at weight 400 and NORRIS in the bundled variable sans face at weight 900, both in the dark color rgb(17, 17, 18)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "display_face_fallback"
description = "The impact statement, menu items, or footer statement render in a Times, system, or generic sans fallback instead of the bundled serif display face"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.11"
name = "store_button_pill_treatment"
description = "The Store button is a solid lime pill with a small bag icon, a rounded radius near 12px, and a bold sans label near 20px, and the hamburger and menu close control are square outlined buttons about 60px by 60px with rounded corners"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.12"
name = "footer_statement_metrics"
description = "The footer statement renders in the bundled serif display face at roughly 72px in the off-white rgb(244, 244, 237), with its characters filling into the lime-off color"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.13"
name = "newsletter_footer_treatment"
description = "The newsletter email field is a dark input with off-white text and a visible focus ring, the Subscribe control uses the lime accent with dark text, and the inline error renders in a clearly distinct warning treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "desktop_nav_single_row"
description = "At viewport widths at or above 992px the nav is a single row about 100px tall with the wordmark left, the monogram mark centered, and the Store button plus hamburger on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "mobile_390_adaptation"
description = "At 390px width the nav wraps to about 140px tall with the monogram and a centered LANDO NORRIS wordmark (about 24px) plus the MCLAREN F1 SINCE 2019 sub-line stacked, the helmet grid collapses to a single column with cards about 326 by 435, the impact heading drops to about 48px, and the menu photo grid is hidden"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "fluid_type_across_breakpoints"
description = "Resizing across the 992, 991, 767, and 479 pixel breakpoints scales type fluidly rather than jumping abruptly between adjacent widths"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.17"
name = "mobile_overflow_or_clipping"
description = "At 390px width, content clips or overflows the viewport, or a horizontal scrollbar appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.18"
name = "case_conventions_consistent"
description = "Navigation, menu, and button labels keep the uppercase convention while supporting body copy uses one consistent sentence-case convention"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.19"
name = "lorem_or_filler_copy_visible"
description = "Lorem ipsum or filler placeholder text (such as TODO, asdf, or template variable names) is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.20"
name = "real_brand_assets_shipped"
description = "The page ships brand-owned assets — real McLaren or Lando Norris logos or monograms, real partner brand logos or wordmarks, licensed driver photography or video, or the reference site's licensed display font — instead of original placeholder or open-license equivalents"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
