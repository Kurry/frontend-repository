[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "console_clean_during_flows"
description = "No console errors or unhandled promise rejections appear while the homepage and its interaction workflows (preloader dismiss, menu open and close, hovers, scroll-linked sections, hover-to-play video, marquees, newsletter submit) are exercised"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "all_assets_same_origin"
description = "Loading the homepage issues zero network asset requests to a non-origin host; fonts, images, video, CSS, JS, WASM, and GL assets are all same-origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "fonts_resolve_bundled"
description = "Rendered text resolves to the bundled Mona Sans Variable sans face and the bundled open-license serif display face rather than a Times or system fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "brand_tokens_exact"
description = "The brand tokens compute to their exact values — lime #d2ff00, dark-green #282c20, white #f4f4ed, black #111112, lime-off #b2c73a, green-off-white-1 #dde1d2, green-off-white-2 #b4b8a5, and orange #ff6b00 — and the body background computes to rgb(40, 44, 32)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "storage_stays_empty"
description = "localStorage and sessionStorage remain empty after the homepage workflows are exercised"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "rive_wasm_same_origin"
description = "Where the page uses the Rive runtime, its WASM binary is requested from a same-origin path with no request to any Rive or package CDN host"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.7"
name = "gl_assets_same_origin"
description = "Where the page renders a WebGL hero, its GL assets (models, textures, Draco and KTX2 decoder files) are requested from same-origin paths only"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.8"
name = "storage_written_violation"
description = "localStorage, sessionStorage, cookies, or another browser storage API is written while the homepage is exercised"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "outbound_runtime_requests"
description = "The page issues outbound runtime requests to a non-origin host such as cdn.prod.website-files.com, assets.itsoffbrand.io, player.vimeo.com, a font CDN, or an analytics host"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "store_button_computed_colors"
description = "The Store button background computes to rgb(210, 255, 0) with text rgb(17, 17, 18), and the menu overlay and footer backgrounds compute to rgb(40, 44, 32)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "nav_dimensions_desktop"
description = "The nav bar row is about 100px tall at 1440x900 and the hamburger button is about 60px by 60px"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.12"
name = "menu_modal_focus_behavior"
description = "The open menu overlay behaves as a modal dialog: it closes when Escape is pressed, traps focus while open, and returns focus to the hamburger button on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "keyboard_operable_with_focus_ring"
description = "Every interactive control (Store button, hamburger, menu items, socials, legal links, the email field, Subscribe) is reachable and operable with the keyboard alone and shows a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "icon_buttons_accessible_names"
description = "The icon-only hamburger and menu close controls expose descriptive accessible names"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "split_text_accessible_phrase"
description = "Split-text headlines keep the original phrase as an aria-label on the heading container while the individual character spans are hidden from the accessibility tree"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.16"
name = "newsletter_aria_live_announcements"
description = "The newsletter inline error and confirmation are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.17"
name = "video_stays_muted"
description = "The social video is muted and never plays audio at any point while the card is exercised"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.18"
name = "interactive_fast_no_layout_shift"
description = "The homepage is interactive within about 2 seconds of a local cold load, and after first paint no visible layout jumps occur as fonts, images, or the hero scene finish loading — media regions hold their space from the start"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "smooth_full_page_scroll"
description = "Continuous scrolling from top to bottom shows no visible hitching or dropped frames through every animated section"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.20"
name = "hydration_clean_console"
description = "The console is hydration-clean: no hydration mismatch errors or warnings appear on first load or after exercising the interactive islands (menu, Store button, video card, newsletter form), and statically rendered content is not visibly replaced by different client content after hydration"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, accessibility, or performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, network request, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
