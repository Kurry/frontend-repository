[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "nav_menu_uppercase_convention"
description = "Where the app renders navigation, menu, and button labels (HOME, ON TRACK, OFF TRACK, CALENDAR, STORE, CLIPS, PHOTOS, VIDEO, LIVE), they keep the uppercase convention consistently."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "action_labels_specific"
description = "Where the app renders primary action labels, they use the mandated specific labels (STORE, Subscribe) rather than generic Submit/OK alone when a specific label is specified."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "newsletter_errors_name_email_and_fix"
description = "Where the app renders newsletter error messages, they name the email field and state the fix (valid address format) rather than only saying Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "exact_mandated_chrome_strings"
description = "Where the app renders mandated chrome copy, the exact strings appear: tab title 2025 Apex Grand Prix Driver — Avery Vale; preloader LOAD VALE; menu items HOME, ON TRACK, OFF TRACK, CALENDAR; socials CLIPS, PHOTOS, VIDEO, LIVE; contact hello@averyvale.example; hero widget NEXT RACE, ALPINE GP, and NOVA RACING SINCE 2019; legal links Privacy Policy, Terms, Cookies; press-kit tabs JSON, Markdown, ICS; nav PRESS KIT; race circuits Alpine GP, Bayfront Circuit, Ridgeway GP, Solstice GP, Meridian Night Run, Cascade Finale."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_spelling_grammar"
description = "Where the app renders body or marketing copy on the Avery Vale homepage, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "avery_vale_terminology_consistent"
description = "Where the app renders the driver and team identity, terminology stays consistent as Avery Vale / AVERY VALE and Nova Racing (not mixed with leftover source-driver naming)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "supporting_copy_sentence_case"
description = "Where the app renders supporting body copy (not nav/menu/button labels), it uses one consistent sentence-case convention."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "newsletter_confirmation_states_success"
description = "Where the app renders the newsletter confirmation, it states that the signup succeeded rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as LOAD VALE, AVERY VALE, NEXT RACE, ALPINE GP, or STORE."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "source_brand_names_in_copy"
description = "Rendered copy still names the source driver, real team, sponsors, or reference-site branding instead of the fictional Avery Vale / Nova Racing system."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders mandated labels, hero widget copy, or newsletter messages unreadable at 1440 or 390."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.9"
name = "press_kit_empty_state_plain_language"
description = "Where the app renders press-kit empty states, the copy says selection lists are empty in plain language rather than a blank or cryptic error code."
type = "binary"
weight = 0.5


[[criterion]]
id = "15.10"
name = "status_and_import_errors_name_fields"
description = "Race status validation errors name the status field, and press-kit Import errors name the import problem in plain language rather than silent failure or generic Error text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "15.n5"
name = "press_kit_labels_wrong_case_or_missing"
description = "PRESS KIT, JSON, Markdown, or ICS labels are missing or use inconsistent casing versus the mandated strings."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
