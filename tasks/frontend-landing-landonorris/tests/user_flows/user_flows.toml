[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "menu_open_shows_home_stroke"
description = "Clicking the hamburger opens a full-viewport dark-green menu overlay; HOME shows the lime telemetry-stroke current-item line and ON TRACK, OFF TRACK, and CALENDAR do not."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "menu_item_scrolls_and_closes"
description = "With the menu open, activating ON TRACK closes the overlay and scrolls within the same homepage (/) to the horizontal media strip without loading another document or route."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "menu_x_closes_preserving_scroll"
description = "With the menu open, activating the X control closes the overlay while leaving page scroll position unchanged; the fixed navigation bar stays pinned and the homepage is interactive again."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "newsletter_invalid_keeps_subscribe_disabled"
description = "Typing an invalid email (missing @ or domain without a dot) into the footer newsletter field leaves Subscribe disabled and shows an inline error naming the email field; correcting to fan@averyvale.example clears the error and enables Subscribe."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "newsletter_valid_submit_confirms_and_clears"
description = "Submitting the newsletter form with fan@averyvale.example shows an inline confirmation in the footer, empties the field, sets press-kit JSON newsletter to that email, and never reloads or navigates away."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "video_hover_play_leave_pause_cycle"
description = "Hovering the social video card starts muted looping playback and fades the placeholder away; moving the pointer off pauses playback and restores the placeholder to fully opaque; a second hover-and-leave cycle still works with no stuck intermediate state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "reload_baseline_resets_homepage_state"
description = "After opening the menu, selecting a race, shortlisting a helmet, typing into the newsletter field, and hovering the video card, reloading returns the initial state: LOAD VALE preloader plays again, menu/press kit/palette closed, selections and shortlist empty, newsletter empty with no confirmation, and no prior visit state persists."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "menu_destinations_stay_on_homepage"
description = "Activating HOME, OFF TRACK, and CALENDAR from the open menu each closes the overlay and scrolls within / to the hero, social video section, and race calendar respectively — no second document or origin navigation occurs."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "chrome_activations_stay_in_page"
description = "Activating the AVERY VALE wordmark, AV monogram, STORE button, social labels (CLIPS, PHOTOS, VIDEO, LIVE), business contact, or legal links either scrolls to a homepage region or performs a no-op — none reload the document or navigate to another origin."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "post_menu_close_nav_still_pinned"
description = "After either menu close path (menu item activation or X), the fixed navigation bar remains pinned at the top and no document reload has occurred at any step."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_homepage_flows_unavailable"
description = "The hamburger cannot open the menu overlay, the newsletter cannot reach a confirmation from a valid email, or the social video card cannot start/pause via hover — primary homepage flows are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "newsletter_confirmation_without_valid_submit"
description = "A newsletter confirmation appears without a valid email submit, or a single valid submit produces duplicate confirmation messages."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "menu_state_desyncs_page"
description = "After opening or closing the menu, the overlay and page interaction desync (overlay invisible but page inert, or overlay visible while homepage controls underneath remain operable as if closed)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "menu_item_leaves_homepage"
description = "Activating a menu item (HOME, ON TRACK, OFF TRACK, or CALENDAR) navigates away from / or loads a second document instead of scrolling within the same homepage."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "menu_cannot_reopen_after_close"
description = "After closing the menu via X or a menu item, clicking the hamburger again cannot reopen the overlay."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "menu_overlay_blocks_with_no_exit"
description = "The menu overlay opens but cannot be closed via the X control, Escape, or a menu item, leaving navigation blocked with no exit path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "invalid_newsletter_lacks_feedback"
description = "Entering an invalid newsletter email or submitting an empty field produces no inline error naming the email field and leaves the user without visible failure feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "flow_dead_end_requires_reload"
description = "After opening the menu, submitting the newsletter, or hovering the video card, recovering normal homepage interaction requires a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "press_kit_flow_export_reflects_session"
description = "Press kit flow: shortlist one helmet and one editorial card and select three distinct races so Selected races reads 3; open PRESS KIT; confirm JSON names those three circuits and both shortlisted labels, each races entry shows id/circuit/date/status/selected/uid, and each shortlist entry shows kind/label/index; switch to ICS and confirm exactly three VEVENT entries with UID matching race uids; switch to Markdown and confirm Avery Vale plus the same races and shortlist; activate Copy and see a copied confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "undo_redo_shortlist_flow"
description = "Undo flow: shortlist one helmet so the shortlist count increases by one, activate Undo so the helmet leaves and the count returns, then activate Redo so the helmet and count restore."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "command_palette_calendar_flow"
description = "Command palette flow: press Meta+K or Control+K, type CALENDAR, activate Go CALENDAR; the palette closes and the page scrolls within / to the race calendar without a document reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "press_kit_static_ignores_selections"
description = "After selecting races and shortlisting assets, opening PRESS KIT shows preview text that ignores those selections (identical to the empty-selection kit)."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.14"
name = "race_status_edit_flow"
description = "Race status edit flow: open Edit status on Ridgeway GP, set Upcoming, submit; chip reads Upcoming; when that race is selected the ICS STATUS line reads CONFIRMED; set Completed again and chip/ICS STATUS return to Completed/CANCELLED."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "press_kit_export_import_round_trip"
description = "Export/import round trip: select two races and shortlist one helmet, note the JSON preview, Undo until Selected races is 0 and shortlist empty, Import that JSON; Selected races returns to 2, shortlist to 1, and previews again name those circuits and the helmet label."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n13"
name = "import_round_trip_fails_to_restore"
description = "After exporting a press-kit JSON with selections then clearing and Importing it, Selected races, shortlist, or previews stay mismatched against the exported payload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n12"
name = "palette_or_press_kit_unavailable"
description = "After pressing Meta+K or Control+K, or activating PRESS KIT, the command palette and press-kit drawer both remain absent so those primary hardened overlays are unavailable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
