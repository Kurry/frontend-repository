[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_on_chrome"
description = "Hovering with the real pointer shows visible feedback: buttons ease background and shadow with a slight press effect, run strips, dataset cards, table rows, and sidebar items take a hover wash, and form controls show focus rings — verified by inspecting computed styles while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "strip_and_row_microinteractions"
description = "Driven through the real UI controls (never a state-shortcut tool call): a newly submitted run's strip animates into the board, a strip removed by the dataset filter animates away rather than snapping, and leaderboard rows animate to their new positions when the sort changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "status_transition_animation"
description = "Watched through real simulated progression: a phase's status chip cross-fades to its new label and color when it changes, the connector visibly fills toward the next phase when a phase completes, and a Running chip carries a subtle pulse while active"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "submission_panel_transition"
description = "Opening and closing the job submission panel through its real controls plays a short opacity and slide transition of roughly 200 to 300 milliseconds rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "toasts_slide_and_autodismiss"
description = "After submitting a job, retrying a failed phase, and a run completing, a feedback toast slides in, remains readable long enough to scan, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "trace_streams_with_indicator"
description = "Expanding a trial's detail disclosure for the first time streams the trace excerpt in progressively with a visible in-progress indicator until it finishes, rather than rendering the full text at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly while counters, charts, and status information remain fully visible and the app stays completely usable"
type = "binary"
weight = 1.0

