[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "console_shell_composition"
description = "The app composes as a console shell: a left sidebar with three view entries (Pipeline board, Datasets, Results), a persistent rollup strip across the top, and a main canvas that swaps per view while the sidebar and rollup strip stay in place"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "status_color_system_consistent"
description = "One status color system is applied identically across phase chips, strip connectors, and timeline entries — Pending neutral gray, Running blue, Complete green, Failed red, Skipped muted outline — and every status chip carries its text label so status is never conveyed by color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "connector_progress_scannable"
description = "The connector between two phase cards renders in the completed color once the earlier phase is Complete, so a run strip's progress reads as a connected pipeline at a glance"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "charts_and_code_block_styling"
description = "The loss curves, task-type distribution mini-charts, and comparison bars share one accent palette, and the config preview renders as a monospaced code block visually distinct from surrounding UI text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "component_states_and_hierarchy"
description = "Buttons, selects, and chips show distinct default, hover, focus (visible ring), and disabled treatments with the disabled submit control visibly muted, and typography keeps a clear hierarchy (view titles larger than card titles, which are larger than body, labels, and timeline metadata)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "mobile_375_overflow"
description = "At 375px viewport width, content clips, overflows the viewport, or page-level horizontal scrolling appears instead of run strips and the leaderboard scrolling within their own containers"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "responsive_sidebar_breakpoints"
description = "At 1024px width and above the sidebar is open by default; at 768px and below it collapses to a hamburger control that opens an overlay drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "writing_conventions"
description = "Headings, buttons, and labels follow one consistent capitalization convention; action labels are specific verbs (Submit job, Retry, Clear filter) rather than generic labels where a specific one is possible; validation messages name the field and the fix; and empty states explain what belongs in the region"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.9"
name = "placeholder_text_visible"
description = "Lorem ipsum, 'TODO', template variable names, real product or company branding, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design, responsiveness, or UI copy that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, viewport, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
