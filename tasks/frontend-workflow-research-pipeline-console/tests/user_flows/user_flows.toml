[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "submit_evaluate_updates_board_and_leaderboard"
description = "Submit Evaluate end to end: open Submit job, choose Evaluate, pick an eligible checkpoint, a benchmark, keep repetitions at 3, submit; a new run strip appears, active jobs rollup increases by one, the evaluation phase advances trial by trial, and when complete the matching leaderboard cell's trial count and mean score update — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_job_submit_inline_validation"
description = "Submit flow: empty required fields or out-of-range count (0, negative, or above 50) show immediate inline messages naming the field/range, keep submit disabled while invalid, and add no run."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "auto_chain_finetune_to_evaluate"
description = "Automatic chaining: submit a Fine-tune job with the automatic-evaluation toggle on; when fine-tuning turns Complete, evaluation flips from Pending to Running with no user action, and the run timeline shows the trigger entry between the two transitions."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "failure_retry_preserves_completed_phases"
description = "Failure recovery: on the seeded Failed phase, after retries are exhausted use manual Retry; the failed phase returns to Running while earlier Complete phases keep original timestamps and outputs; the timeline records the retry."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "board_datasets_results_navigation"
description = "Navigation: switch Pipeline board ↔ Datasets ↔ Results without reload; returning to the board keeps prior run detail/timeline filter state while the session stays open."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "dataset_filter_empty_state"
description = "Edge: selecting a dataset that matches no runs shows an empty-state message on the board with a clear-filter control rather than a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "dataset_filter_and_timeline_filters"
description = "Filter flow: from Datasets select a dataset to filter the board to runs that used it (active-filter chip visible); clear restores all seeded runs; run timeline phase/status filters similarly narrow and restore."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "submit_panel_and_rollup_chrome"
description = "Chrome: Submit job panel opens/closes with continuity; the rollup strip (active jobs, queue depth, cost, mean scores) remains visible across views and updates as runs change."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "submit_pause_retry_overlays"
description = "Overlays/controls: Submit job panel, Pause/Resume on Running phases, and Retry on Failed phases support their flows without trapping the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "job_config_export_and_reject_recover"
description = "Recovery: fill a valid Evaluate job, confirm monospaced preview includes jobType/benchmark/repetitions, Download/Copy emit that text; after submit, Export runs includes the new runId; a rejected import shows a visible error and changes nothing — no reload required."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "pipeline_submit_flows_unavailable"
description = "Submit job, dataset filter, Results comparison, or Export runs cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "submitted_run_missing_or_duplicated"
description = "After a valid submit, the new run strip fails to appear, appears duplicated, or active jobs does not increase by exactly one."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "board_leaderboard_rollup_desync"
description = "After a completed Evaluate submit, board phase status, leaderboard cell, and rollup strip disagree about the same run's outcomes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_pipeline"
description = "Switching Pipeline/Datasets/Results breaks layout or loses the open run detail unexpectedly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_dataset_filter_breaks_board"
description = "A no-match dataset filter leaves a blank/broken board with no empty-state and clear control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "dataset_and_timeline_filters_disagree"
description = "Dataset board filter and timeline filters disagree about which runs/events are in scope, or clear fails to restore the full set."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "submit_panel_cannot_reopen"
description = "After closing Submit job, the panel cannot be reopened from the Submit control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "submit_panel_blocks_board"
description = "Submit job panel blocks returning to the Pipeline board with no dismiss path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_submit_or_import_silent"
description = "An invalid submit or contract-invalid Import provides no visible named-field or import error feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "research_pipeline_dead_end_requires_reload"
description = "A Research Pipeline flow leaves a dead end that requires a full page reload to continue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "job_config_and_export_runs_flow"
description = "Job-config export flow: fill a valid Evaluate job, confirm the monospaced preview includes jobType, benchmark, and repetitions; Download job-config.json and Copy emit that exact text; submit; then confirm Export runs includes the new runId and config."
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
