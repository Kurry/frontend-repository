[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "During real play the Rival's thinking delay is visibly animated (a pulsing thinking indicator for roughly a second) before its tile resolves, rather than an instant silent jump"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Hovering an actionable covered tile with the pointer produces a visible lift or brightness response"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "The Round Result overlay eases in over a blurred backdrop rather than appearing instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "When the Rival's move resolves via real play, it appears instantly with no visible thinking animation or turn transition"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Animations ignore the prefers-reduced-motion setting and keep playing full-length transitions when reduced motion is requested"
type = "binary"
weight = 0.5
negate = true
optional = true
