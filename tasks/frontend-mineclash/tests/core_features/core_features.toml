[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the setup screen shows the MineClash title, an Easy/Medium/Hard difficulty selector, and a Start match control with no login or routing gate"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After selecting Medium then Start match, the board renders a 10 by 10 grid and both the You and Rival panels read score 0 with 0 filled strikes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "When it is the Player's turn a 'Your turn' indicator is shown, and revealing a safe covered tile adds that tile's ore value (1, 2, or 3) to the You score and shows the tile's adjacent-mine count when greater than 0"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After the Player reveals a safe tile, the turn passes to the Rival, a 'Rival is thinking' indicator animates for a visible delay, then the Rival reveals one tile and control returns to the Player"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When a side reveals a mine, that side's score drops by 5 (never below 0), one Strike icon fills for that side, the mine tile shows a distinct mine icon, and the mine tile stays revealed for the rest of the round"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After activating Flag Mode the mode is visibly active, clicking a covered tile places a flag marker on it, and a normal reveal click on that flagged tile does not reveal it until it is unflagged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "Using Hint costs the You score 3 points and marks one chosen covered tile as safe or mine without revealing it, and the Hint control is disabled after 2 uses in the round"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When a side reaches 3 Strikes or the Target Score of 50, a Round Result overlay names the winner, the reason, and both final scores"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After one side wins 2 rounds, a Match Complete screen shows the round-by-round scores, the overall winner, and Rematch and New match controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "Clicking Pause during a round freezes the board and shows a paused indicator so tile clicks are rejected, and Resume unfreezes play"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "In the history panel, performing a flag or hint move then Undo restores the exact prior board and scores, and making a different move after undoing creates a new selectable branch shown in the history list rather than replacing the old one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "The region labelled 'History state' shows the selected node's snapshot (both sides' score and strikes and whose turn it is), and Apply Scenario Change is disabled when the selected node is already current"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "The Stats view shows 'No matches played yet' before any match, and after completing a match it shows the matches played, matches won, total ore mined, and best single-round score under the difficulty that was played"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After completing a match and refreshing the page, the Stats view still shows the exact previously recorded figures, and the Sound setting and remembered difficulty are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load, the setup screen shows the MineClash title, an Easy/Medium/Hard difficulty selector, and a Start match control with no login or routing gate"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "After choosing Medium and starting the match, the board renders a 10 by 10 grid and both the You and Rival score readouts start at 0 with 0 filled strikes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Revealing a safe covered tile on the Player's turn adds that tile's ore value (1, 2, or 3) to the You score and displays the tile's adjacent-mine count when it is greater than 0"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Revealing a mine drops the revealing side's score by 5 without going below 0, fills one Strike icon for that side, and leaves the mine tile revealed with a distinct mine icon for the rest of the round"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The Player and Rival AI take alternating turns and the current turn is always shown, with a 'Your turn' state for the Player and a 'Rival' state during the Rival's move"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "After the Player's turn ends, the Rival AI automatically reveals exactly one tile following a visible thinking delay and then returns control to the Player"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "A round ends the instant a side reaches 3 Strikes or the Target Score of 50, showing a Round Result overlay that names the winner, the reason, and both final scores"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "The match is best-of-3: after a side wins 2 rounds a Match Complete screen shows the round-by-round scores, the overall winner, and Rematch and New match controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Activating Flag Mode lets the Player place a flag on a covered tile, and a normal reveal click on a flagged tile does not reveal it until it is unflagged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Using a Hint costs the You score 3 points and marks one chosen covered tile as safe or mine without revealing it, and the Hint control is disabled after 2 uses in a round"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Difficulty changes the whole match: Easy is an 8 by 8 grid with 10 mines and Hard is a 12 by 12 grid with 24 mines, applied to every round"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Pausing during a round freezes the board and shows a paused indicator so tile clicks are rejected, and Resume unfreezes play"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The Stats view lists matches played, matches won, total ore mined, and best single-round score broken down by each of the three difficulties"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "In the history panel, Undo restores the exact prior board and scores, and making a different change after an Undo creates a new selectable branch in the history list rather than replacing the previous move"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "A region labelled 'History state' shows the selected node's snapshot (both sides' score and strikes and whose turn it is), and the 'Apply Scenario Change' action re-applies the selected node and is disabled when it is already current"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "Revealing a mine fails to end the turn, does not subtract 5 (floored at 0) or does not add a Strike, or the mine tile reverts to covered later in the round"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "Turns do not alternate (the Player can take consecutive turns or the Rival never moves) or the current turn is not clearly indicated"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "1_32"
description = "A side's score goes negative after a mine hit or a Hint, showing the floor of 0 is not enforced"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "1_33"
description = "Undoing and then making a different move silently flattens or corrupts the history instead of creating a selectable branch"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.34"
name = "1_34"
description = "The Stats view before any match shows blank or zero rows instead of a 'No matches played yet' message"
type = "binary"
weight = 0.5
negate = true
optional = true
