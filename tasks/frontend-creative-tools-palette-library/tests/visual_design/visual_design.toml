[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "cream_editorial_library"
description = "The app uses a cream editorial field with near-black foreground, generous article-like composition, and hairline nomenclature rules, reading as a fine-art library rather than a dashboard or promotional card grid"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "header_and_editor_composition"
description = "The sticky header balances the O&A script lockup, centered MENU, and CART, while Detail/Editor uses a focused palette-editing panel and the empty state occupies the library region clearly"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "static_brochure_instead_of_library"
description = "Replaces the library with a static brochure and no interactive palette collection"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "view_controls_and_period_layout"
description = "The three view toggles (Nomenclature, Palette, Swatch) each show a circular indicator that fills on the active view, and exactly one library layout renders at a time"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "luminance_aware_swatch_text"
description = "Swatch-view tiles flip their hex/name/title text dark or light by the tile's perceived luminance and reveal it on hover"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "expressive_type_pairing"
description = "Titles and editorial leads use an expressive serif/script character, hex and metadata use disciplined monospace, and historical color names use italic styling, with a clear hierarchy across intro, controls, rows, cards, and footer"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.7"
name = "responsive_palette_layouts"
description = "At desktop and narrow mobile widths, nomenclature rows remain readable, palette cards reflow responsively, swatch tiles retain usable overlays, editor/cart/menu surfaces fit the viewport, and no essential content is clipped or causes page-wide horizontal overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "footer_and_long_page_structure"
description = "A multi-column inert footer sits behind the main content and remains visually distinct from the library, without masquerading as active navigation or disrupting the editorial reading flow"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "swatch_text_contrast_failure"
description = "A large Swatch tile uses light text on a light color or dark text on a dark color, making its hex, name, or title visibly unreadable because luminance-aware styling failed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick or taste disagreement. If present, name the defect and cite the concrete browser evidence (element, page state, viewport, or screenshot) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
