[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "editorial_spacing_matches_reference"
description = "At 1440px, spacing among the sticky header, editorial intro, controls row, and library rows/cards follows a consistent scale matching the reference screenshots — cream editorial field with hairline nomenclature rules, not a dense dashboard card grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "expressive_type_pairing_matches_spec"
description = "Titles use an expressive serif pairing, hex/meta uses monospace, and historical color names render in italic — matching the reference type treatment rather than a default system UI stack throughout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: sticky header with O&A script lockup, centered MENU, and CART above the editorial intro and library controls — an editorial palette library, not a marketing landing or equal-width promo-card stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — creating a palette card into the grid, deleting a card out, view/mode switches, copy confirmation, and subscribe overlay fade — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: Palette cards narrow toward a single column, the two-column monospace intro collapses to one column, and the controls row stacks or wraps while remaining operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "View toggles with circular fill indicators, the period filter, palette editor fields, and primary actions use the editorial treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_intro_vs_library_meta"
description = "Typography hierarchy clearly distinguishes the serif editorial lead, denser monospace intro body, control labels, and hex/meta copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "View toggles show filled circular indicators when active; hover/focus/disabled-submit and inline validation error states are visually distinct as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "cream_field_and_surface_treatments"
description = "Surfaces match the cream editorial field with near-black foreground, hairline rules on nomenclature rows, distinct error color for inline validation, and a multi-column inert footer behind main content as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover outlines on nomenclature/palette/swatch surfaces, inactive view-toggle indicator fill, Detail list-row wash, ~1s on-swatch copied confirmation, and overlay fade follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_editorial_reference"
description = "Visible spacing between header, intro, controls, and library contradicts the reference editorial composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_ignore_cream_editorial_palette"
description = "The page ignores the cream/near-black editorial palette and renders a fixed unrelated dashboard theme that stays identical to a generic admin shell."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "header_or_controls_sizing_mismatches"
description = "At 1440px the sticky header lockup/MENU/CART or controls-row treatments are sized or proportioned in clear mismatch with the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_library_animations_missing"
description = "Required animations are missing where the spec requires them (new palette cards snap in with no enter, deletes snap out, copy confirmation teleports, subscribe overlay has no fade)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "View toggles, period filter, or palette editor fields use unstyled browser default appearance when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the composition is misaligned versus the reference (missing sticky header lockup/MENU/CART, dashboard card grid replacing editorial rows, or controls row absent)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "At 1440px, nomenclature rows, palette cards, or Detail/Editor panel content render clipped or off-screen compared to the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_editorial_library"
description = "Structure deviates from the reference: a multi-page shop/checkout shell or generic dashboard replaces the single-page O&A Palette Library editorial layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_intro_and_meta"
description = "Serif lead, monospace intro body, and hex/meta labels are visually undifferentiated — no clear hierarchy between editorial copy and library meta."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on swatches, view toggles, palette cards, or Detail rows are missing or clearly deviate from the reference timing/feel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
