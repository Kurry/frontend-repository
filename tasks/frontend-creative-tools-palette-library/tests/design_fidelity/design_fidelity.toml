[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "editorial_spacing_matches_reference"
description = "At 1440px, spacing among the sticky header, editorial intro, controls row, and library rows/cards follows a consistent scale matching the reference screenshots — cream editorial field with hairline nomenclature rules, not a dense dashboard card grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "expressive_type_pairing_matches_spec"
description = "Titles use an expressive serif pairing, hex/meta uses monospace, and historical color names render in italic — matching the reference type treatment rather than a default system UI stack throughout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: sticky header with O&A script lockup, centered MENU, and CART above the editorial intro and library controls — an editorial palette library, not a marketing landing or equal-width promo-card stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — creating a palette card into the grid, deleting a card out, view/mode switches, copy confirmation, subscribe overlay fade, and export drawer / layout simulator open-close — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: Palette cards narrow toward a single column, the two-column monospace intro collapses to one column, and the controls row stacks or wraps while remaining operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "View toggles with circular fill indicators, the period filter, palette editor fields, and primary actions use the editorial treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_intro_vs_library_meta"
description = "Typography hierarchy clearly distinguishes the serif editorial lead, denser monospace intro body, control labels, and hex/meta copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "View toggles show filled circular indicators when active; hover/focus/disabled-submit and inline validation error states are visually distinct as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "cream_field_and_surface_treatments"
description = "Surfaces match the cream editorial field with near-black foreground, hairline rules on nomenclature rows, distinct error color for inline validation, and a multi-column inert footer behind main content as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover outlines on nomenclature/palette/swatch surfaces, inactive view-toggle indicator fill, Detail list-row wash, ~1s on-swatch copied confirmation, and overlay fade follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

