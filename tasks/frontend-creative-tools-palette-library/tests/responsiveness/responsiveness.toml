[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable palette library: intro, controls, and at least one Browse layout remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, view toggles, period filter, swatches, MENU/CART, and editor submit present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Serif lead, monospace intro body, control labels, and hex/meta remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no content clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "controls_row_stacks_at_narrow_width"
description = "At narrow widths the controls row stacks or wraps so the view toggles and the period filter both remain fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "intro_collapses_to_single_column"
description = "At 375px width the two-column monospace intro collapses to a single column without overlapping the lead or controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At 375px width, tap/click activation works on view toggles, period filter, swatches, MENU/CART, and palette editor controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "palette_grid_reflows_to_one_column"
description = "The Palette-view card grid reflows across widths: multiple columns at desktop widths narrowing to a single column at phone widths with no clipped cards."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_remain_operable_at_small_widths"
description = "The cart drawer, Detail/Editor overlay, and subscribe popup stay fully visible and operable at 375px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the editorial library layout breaks: overlapping sections, overflow, or unusable stacking."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px width, view toggles, period filter, swatches, or editor submit are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "intro_or_meta_unreadable_on_mobile"
description = "At 375px width, intro copy, control labels, or hex/meta text are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 375px or 1440px, library content is cropped or unnecessary scrollbars appear for content that should fit the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "controls_or_filter_missing_at_narrow"
description = "At narrow widths, the view toggles or period filter is missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_header_obscures_library"
description = "Fixed-position sticky header obscures view toggles, period filter, or library rows so they cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px width, intro, controls, and library sections overlap into an unusable stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "mobile_overlays_inoperable"
description = "At 375px width, the cart drawer, Detail/Editor overlay, or subscribe popup cannot be opened or operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "palette_cards_static_size_overflow"
description = "Palette-view cards use a static multi-column size that overflows the viewport at 375px instead of collapsing to a single column."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "At 375px or 1440px, required controls (view toggles, period filter, MENU/CART, or editor submit) disappear from the layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
