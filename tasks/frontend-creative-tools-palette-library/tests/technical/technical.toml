[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.2"
name = "coherent_palette_state"
description = "A palette change made in one visible surface is reflected immediately and consistently in the collection count, all three Browse layouts, active period filter, Detail/Editor, selection, and favorite state without reload or stale duplicate values"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "in_memory_reload_round_trip"
description = "After changing independent facets—collection membership, palette content, active view, period filter, selection, favorite, copy feedback, and popup dismissal—a fresh load resets every facet coherently to the seeded baseline rather than retaining a partial mixture"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "local_asset_network_hygiene"
description = "From a fresh load through menu, cart, period select, editor, icon, clipboard, animation, and popup interactions, the network log shows only same-origin app assets and no CDN-hosted styles, scripts, icons, fonts, data, checkout, or subscribe request"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "console_clean_full_flow"
description = "No console errors or unhandled promise rejections appear from first load through view/filter changes, palette create/edit/favorite/delete, copy, Detail round-trip, menu/cart, and subscribe dismiss/submit flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "inline_form_validation_runtime"
description = "Palette create/edit, subscribe, CartAdd, and Import package controls expose visible field-level validation before invalid submission can mutate state, and correcting each field clears its error and permits the in-memory action"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "accessible_overlay_and_select_controls"
description = "Menu, cart drawer, period select, palette editor, and subscribe dialog are keyboard-operable through visible controls, dismiss predictably, and preserve visibly trackable focus without navigating away"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "derived_view_input_sensitivity"
description = "Changing the period, editing a palette period or hex, toggling favorite, and switching view each produces the corresponding distinct filtered, hue-sorted/deduped, or selected-state result rather than an identical hardcoded layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "historical_collection_responsiveness"
description = "With the full historical dataset and seeded palettes visible, switching views, filtering periods, opening Detail, and scrolling through swatches remains responsive without a visible freeze, stale result flash, or input lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "dialog_focus_and_announcements"
description = "Opening the cart drawer, subscribe popup, or Detail/Editor overlay moves focus into it and returns focus to the invoking control on close, and copy confirmations and validation errors are exposed through an aria-live region while swatch controls carry accessible names that include their hex value"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.15"
name = "fast_interactive_load"
description = "On a local cold load the library renders and responds to a first interaction (view toggle or swatch hover) within roughly 2 seconds"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.16"
name = "export_artifacts_track_store"
description = "After create/edit/delete of a user palette, Export CSS/utility-theme/SCSS previews and palette package JSON update from the shared store without reload, and Import of a conforming package replaces the collection coherently across Browse and Detail"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "no_browser_storage_for_session"
description = "Across create, cart add, export, import, and subscribe dismiss, localStorage and sessionStorage remain unused for app state (good-app in-memory rule); persistence is export/MCP only"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "undo_redo_coherent_with_shared_state"
description = "Undo and Redo mutate the same collection the Browse layouts, Layout simulator, and export previews read: after any undo or redo step, every surface agrees without a reload, and each control's enabled or disabled appearance matches whether a step is available"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "derived_color_surfaces_recompute"
description = "Contrast-matrix ratios, color-wheel hex readouts, and vision-simulated rendering derive from the shared collection: editing a swatch through any path (direct edit, batch shift, harmony apply, import) updates all of them without a reload"
type = "binary"
weight = 1.0

