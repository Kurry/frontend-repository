[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_library_when_filter_or_delete_all"
description = "An empty state appears in the library region when the period filter matches nothing or all user-manageable palettes are deleted, with a message explaining that no palettes match and how to get back (clear the filter or create a palette)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "invalid_create_inline_validation"
description = "An empty palette name, a swatch that is not #RRGGBB, duplicate hexes, or fewer than 3 / more than 8 swatches shows visible inline validation naming the offending field before submit, adds no palette, and leaves the collection count unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_and_fix"
description = "Palette create/edit, subscribe email, CartAdd, and Import package validation copy names the field and the fix rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "swatch_copy_shows_confirmation"
description = "Clicking a swatch copies its hex and shows a brief on-swatch 'copied' confirmation (~1s) that then clears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_submit_creates_exactly_one"
description = "Double-activating the editor's submit control with a valid palette creates exactly one palette: the count increases by one and one new card appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "painting_title_never_copies"
description = "Clicking a painting-title control never triggers the copy confirmation; only swatch clicks copy a hex."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "subscribe_stays_dismissed"
description = "Dismissing the subscribe popup keeps it dismissed for the rest of the session; it does not reappear on further idle or scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "library_controls_use_semantic_tags"
description = "View toggles, period filter, palette editor fields, submit, MENU, CART, and swatch controls use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlay_close_paths"
description = "The cart drawer, Detail/Editor overlay, and subscribe popup each close via an explicit close control (and backdrop or Escape where present), returning to the library without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "submit_disabled_while_invalid"
description = "While any required create/edit field is invalid, the submit control stays disabled and an inline error naming what to fix remains visible next to that field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_library_shows_nothing"
description = "When the period filter matches nothing or all user palettes are deleted, the library region shows nothing — no empty-state message or restore guidance."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "validation_errors_only_in_console"
description = "Invalid create/edit failures surface only in the browser console with no visible inline field feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "swatch_copy_silent"
description = "Clicking a swatch produces no visible copied confirmation and no clipboard write of the hex (silent failure)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "delete_palette_no_destructive_affordance"
description = "Deleting a palette proceeds with no visible destructive affordance (no Delete labeling or confirmation cue) distinguishing it from a non-destructive action."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_controls_are_nonsemantic"
description = "Primary interactive controls (view toggles, period filter, swatches, editor submit, MENU/CART) are non-semantic div/span click targets without button/role semantics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "overlay_not_keyboard_dismissible"
description = "With the cart drawer, subscribe popup, or Detail/Editor overlay open, keyboard users cannot dismiss it (no Escape path and no focusable Close control)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "double_submit_creates_duplicates"
description = "Rapidly double-activating the editor's submit control with a valid palette creates more than one new palette or more than one new card for a single intended create."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_or_missing_action_labels"
description = "Primary actions show blank, placeholder, or ambiguous labels such as 'Submit', 'OK', or 'Button' instead of specific labels for create/edit, delete, view toggles, or filter."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "painting_title_triggers_copy"
description = "Clicking a painting-title control triggers the on-swatch copied confirmation or copies a hex as if the swatch were clicked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "subscribe_reappears_after_dismiss"
description = "After dismissing the subscribe popup, further idle or scrolling makes it reappear in the same session."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_import_package_rejected"
description = "Importing malformed palette package JSON, schemaVersion other than 1, library other than O&A Palette Library, or a palette that fails the create/edit field contract leaves the collection unchanged and shows a visible error naming the problem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "invalid_cart_add_rejected"
description = "CartAdd with a paletteName that matches no palette, or quantity outside 1–5, adds no line and shows an inline error naming that field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "invalid_import_mutates_collection"
description = "Importing a non-conforming palette package still mutates the visible user palette collection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.13"
name = "hsl_shift_clamps_to_valid_hex"
description = "A batch H/S/L shift pushed to a slider extreme commits only valid #RRGGBB values (clamped at the representable range) and never an invalid hex string"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "harmony_and_shift_respect_contract"
description = "Apply harmony and Apply shift never commit a swatch set that violates the 3-8 unique #RRGGBB contract; when the result would violate it (for example duplicate hexes), a visible error names swatches and the palette is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "undo_redo_disabled_at_stack_ends"
description = "With nothing to undo, Undo shows a disabled appearance and does nothing; with nothing to redo, Redo shows a disabled appearance and does nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "contrast_matrix_sparse_state"
description = "A palette with fewer than 2 distinct swatch hexes shows an explanatory contrast-matrix state instead of fabricated ratios"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n12"
name = "redo_resurrects_cleared_stack"
description = "After Undo followed by a new mutation, activating Redo still re-applies the superseded step from the cleared redo stack"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n13"
name = "batch_edit_commits_invalid_state"
description = "Applying a batch shift or harmony set leaves the palette with duplicate hexes, an out-of-bounds swatch count, or a non-#RRGGBB value without any visible error"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
