[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_palette_updates_all_surfaces"
description = "Create flow: submitting a valid new palette from the editor increases the palette collection count by exactly one, the new palette appears as a card in Palette view and its swatches join the Nomenclature rows (hue-ordered, hex-deduped) without a reload, and selecting the new palette's period keeps it visible while All Periods shows it alongside the seeds."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: submitting with an empty name or fewer than the required swatches triggers immediate inline validation naming the offending field and leaves the collection count unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_name_and_period_update_all_surfaces"
description = "Edit flow: renaming a palette and changing its period in Detail/Editor updates that palette's name on its Palette-view card and in Detail without a reload, and the period change is reflected by the filter — the old period no longer shows the palette and the new period does."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_palette_updates_all_surfaces"
description = "Delete flow: deleting a palette decreases the collection count by exactly one, removes its card from Palette view and its swatches from Nomenclature and Swatch views, clears it from any active selection, and the period filter recomputes so the deleted palette matches nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "browse_view_switch_retains_filter"
description = "View/mode switch: switching among Nomenclature, Palette, and Swatch shows exactly one library layout at a time without reload and keeps the active period filter applied across the switch."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting every user-manageable palette, the library region shows a clear empty state explaining how to create a palette or clear the filter."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "period_filter_hides_across_views"
description = "Filter flow: selecting a named period hides nonmatching items in Nomenclature, Palette, and Swatch; choosing All Periods restores the full set in all three."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "favorite_toggle_cross_view"
description = "Favorite flow: toggling the favorite/featured flag on a palette in one view shows the same flag state when the same palette is viewed in another view or opened in Detail, without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "detail_editor_overlay_open_and_close"
description = "Detail/Editor overlay: opening a palette enters the focused editor for name/period/swatches; closing returns to Browse with prior view and filter intact and no dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "Recovery/reload: after creating, filtering, and selecting a palette, a page reload returns the app to its seeded state — seeded palettes, Nomenclature view default, All Periods, and no selection — with no dead end requiring a second reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "palette_crud_unavailable_from_ui"
description = "Palette create, edit, or delete cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "create_fails_to_appear_or_duplicates"
description = "Submitting a valid new palette either fails to add a visible Palette-view card or adds duplicate cards for a single create."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "edits_desync_surfaces"
description = "After renaming a palette or changing its period, Palette-view card, Detail, and filtered Browse disagree about the same record's name or period."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_filter"
description = "Switching among Nomenclature, Palette, and Swatch breaks the layout or loses the active period filter / selection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_library_region_broken"
description = "After deleting all user palettes or filtering to zero matches, the library region is blank or broken with no empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "With a period filter active, Nomenclature, Palette, and Swatch disagree about which items are visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "detail_editor_cannot_reopen"
description = "After closing Detail/Editor, the same palette cannot be reopened into the editor from Browse."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_with_no_exit"
description = "The cart drawer, subscribe popup, or Detail/Editor overlay blocks the library with no working exit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_create_validation_silent"
description = "An empty-name or underswatched create attempt provides no visible validation feedback naming the offending field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "reload_or_mode_switch_dead_end"
description = "Recovering from Detail/Editor or after a failed create requires a full page reload — the UI reaches a dead end."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_session_then_omit_on_delete"
description = "Export flow: create a valid palette, open Export, confirm CSS/Tailwind/SCSS and palette package JSON include its name and swatches, then delete it and confirm the next export omits it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_restores_collection"
description = "Import flow: export a palette package after a create, delete palettes to diverge, Import the JSON, and confirm collection count, Browse layouts, and a fresh export match the imported package."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "cart_add_valid_then_invalid_quantity"
description = "Cart flow: submit CartAdd for an existing palette with quantity 2 and see the line in the drawer; submit quantity 0 or 6 and see an inline quantity error with no extra line."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "subscribe_invalid_then_valid_dismiss"
description = "Subscribe flow: after the popup appears, invalid email keeps it open with an email-field error; valid email dismisses it and it does not return on further scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_preview_ignores_create"
description = "After creating a valid palette, opening Export shows CSS/Tailwind/SCSS or package JSON that still omit the new palette's name and swatches."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
