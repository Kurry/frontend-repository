[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_palette_updates_all_surfaces"
description = "Create flow: submitting a valid new palette from the editor increases the palette collection count by exactly one, the new palette appears as a card in Palette view and its swatches join the Nomenclature rows (hue-ordered, hex-deduped) without a reload, and selecting the new palette's period keeps it visible while All Periods shows it alongside the seeds."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: submitting with an empty name or fewer than the required swatches triggers immediate inline validation naming the offending field and leaves the collection count unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_name_and_period_update_all_surfaces"
description = "Edit flow: renaming a palette and changing its period in Detail/Editor updates that palette's name on its Palette-view card and in Detail without a reload, and the period change is reflected by the filter — the old period no longer shows the palette and the new period does."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_palette_updates_all_surfaces"
description = "Delete flow: deleting a palette decreases the collection count by exactly one, removes its card from Palette view and its swatches from Nomenclature and Swatch views, clears it from any active selection, and the period filter recomputes so the deleted palette matches nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "browse_view_switch_retains_filter"
description = "View/mode switch: switching among Nomenclature, Palette, and Swatch shows exactly one library layout at a time without reload and keeps the active period filter applied across the switch."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting every user-manageable palette, the library region shows a clear empty state explaining how to create a palette or clear the filter."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "period_filter_hides_across_views"
description = "Filter flow: selecting a named period hides nonmatching items in Nomenclature, Palette, and Swatch; choosing All Periods restores the full set in all three."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "favorite_toggle_cross_view"
description = "Favorite flow: toggling the favorite/featured flag on a palette in one view shows the same flag state when the same palette is viewed in another view or opened in Detail, without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "detail_editor_overlay_open_and_close"
description = "Detail/Editor overlay: opening a palette enters the focused editor for name/period/swatches; closing returns to Browse with prior view and filter intact and no dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "Recovery/reload: after creating, filtering, and selecting a palette, a page reload returns the app to its seeded state — seeded palettes, Nomenclature view default, All Periods, and no selection — with no dead end requiring a second reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_session_then_omit_on_delete"
description = "Export flow: create a valid palette, open Export, confirm CSS/utility-theme/SCSS and palette package JSON include its name and swatches, then delete it and confirm the next export omits it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_restores_collection"
description = "Import flow: export a palette package after a create, delete palettes to diverge, Import the JSON, and confirm collection count, Browse layouts, and a fresh export match the imported package."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "cart_add_valid_then_invalid_quantity"
description = "Cart flow: submit CartAdd for an existing palette with quantity 2 and see the line in the drawer; submit quantity 0 or 6 and see an inline quantity error with no extra line."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "subscribe_invalid_then_valid_dismiss"
description = "Subscribe flow: after the popup appears, invalid email keeps it open with an email-field error; valid email dismisses it and it does not return on further scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "batch_edit_to_export_flow"
description = "Select at least two swatches in Detail/Editor, drag the Hue shift slider, Apply shift, and confirm the shifted #RRGGBB values appear on the palette's Browse surfaces and in the Export CSS preview and package JSON while unselected swatches are unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "harmony_wheel_to_export_flow"
description = "Drag the color-wheel anchor and watch the companion points and hex readouts track, switch mode from Analogous to Triadic and confirm the points reposition, Apply harmony, and confirm the palette's swatches equal the computed set in Detail and Browse and appear in a fresh export"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "undo_redo_delete_flow"
description = "Delete a palette (count decreases by one), Undo (card, swatches, and prior count return and the next export includes it again), Redo (deleted again), then create a new palette and confirm Redo shows a disabled appearance and does nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "contrast_recolor_flow"
description = "Open a palette's contrast matrix, note one pairing's ratio, recolor one swatch via Apply shift, and confirm at least one ratio or pass/fail mark changes without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.19"
name = "vision_simulation_flow"
description = "Set vision simulation to Deuteranopia and confirm swatch rendering visibly shifts in Browse and in the Layout simulator versus None; set None and confirm the original appearance returns"
type = "binary"
weight = 1.0

