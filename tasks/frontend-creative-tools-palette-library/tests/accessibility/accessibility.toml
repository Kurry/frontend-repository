[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "library_controls_keyboard_operable"
description = "Every interactive control — Nomenclature/Palette/Swatch view toggles, Filter by Period, swatches, painting-title controls, palette editor fields and submit, MENU, CART, Export, Import, Layout simulator, Add to cart, and favorite/featured toggles — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlay_dialogs_trap_and_return_focus"
description = "The cart drawer, subscribe popup, Detail/Editor overlay, and export drawer behave as dialogs: focus moves into them when opened, stays trapped while open, and returns to the invoking control on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "period_filter_keyboard_operable"
description = "The period filter is operable with the keyboard alone: it opens, moves through period options, and applies a selection without a pointer."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "copy_and_validation_announced_live"
description = "The on-swatch copied confirmation and palette create/edit form validation errors are shown visually and announced through an aria-live region (or equivalent live announcement)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "editor_fields_explicitly_labeled"
description = "Palette create/edit form fields (name, period, swatches), the subscribe email field, CartAdd paletteName and quantity fields, and Import package controls use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "swatches_named_with_hex"
description = "Each swatch control carries an accessible name that includes its hex value so assistive technology can identify the color being activated."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "library_landmarks_present"
description = "The app exposes semantic landmarks (for example header/nav for sticky chrome and main for the library region) so assistive technology can navigate the editorial library."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "cream_field_text_contrast"
description = "Near-black foreground text, control labels, and primary chrome on the cream editorial field meet sufficient contrast against their surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "view_toggles_and_overlays_semantic"
description = "View toggles, period filter, MENU/CART, and overlay dismiss controls use button/role semantics with accessible names rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, scroll reveals and palette card enter/exit animations are removed and state changes apply instantly while every feature — views, filter, create/edit/delete, copy, overlays — remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "wheel_sliders_and_history_keyboard"
description = "The color-wheel anchor is keyboard-adjustable (arrow keys move the anchor with companion points tracking), and the batch-edit sliders, harmony mode select, Undo/Redo controls, and vision-simulation control are keyboard-operable with visible focus indicators"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "contrast_marks_not_color_only"
description = "Contrast-matrix pass/fail marks include a text label such as Pass or Fail alongside any color cue rather than color alone"
type = "binary"
weight = 1.0

