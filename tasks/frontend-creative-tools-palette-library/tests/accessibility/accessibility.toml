[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "library_controls_keyboard_operable"
description = "Every interactive control — Nomenclature/Palette/Swatch view toggles, Filter by Period, swatches, painting-title controls, palette editor fields and submit, MENU, CART, Export, Import, Layout simulator, Add to cart, and favorite/featured toggles — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlay_dialogs_trap_and_return_focus"
description = "The cart drawer, subscribe popup, Detail/Editor overlay, and export drawer behave as dialogs: focus moves into them when opened, stays trapped while open, and returns to the invoking control on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "period_filter_keyboard_operable"
description = "The period filter is operable with the keyboard alone: it opens, moves through period options, and applies a selection without a pointer."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "copy_and_validation_announced_live"
description = "The on-swatch copied confirmation and palette create/edit form validation errors are shown visually and announced through an aria-live region (or equivalent live announcement)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "editor_fields_explicitly_labeled"
description = "Palette create/edit form fields (name, period, swatches), the subscribe email field, CartAdd paletteName and quantity fields, and Import package controls use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "swatches_named_with_hex"
description = "Each swatch control carries an accessible name that includes its hex value so assistive technology can identify the color being activated."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "library_landmarks_present"
description = "The app exposes semantic landmarks (for example header/nav for sticky chrome and main for the library region) so assistive technology can navigate the editorial library."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "cream_field_text_contrast"
description = "Near-black foreground text, control labels, and primary chrome on the cream editorial field meet sufficient contrast against their surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "view_toggles_and_overlays_semantic"
description = "View toggles, period filter, MENU/CART, and overlay dismiss controls use button/role semantics with accessible names rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, scroll reveals and palette card enter/exit animations are removed and state changes apply instantly while every feature — views, filter, create/edit/delete, copy, overlays — remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "library_controls_unreachable_by_keyboard"
description = "A view toggle, period filter, swatch, painting title, editor field, MENU, CART, or favorite control cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_controls"
description = "Focused view toggles, period filter, swatches, editor fields, or header controls show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "View toggles, swatches, or overlay triggers use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "active_view_or_error_color_only"
description = "The active view indicator or a form validation error is conveyed by color alone with no text, filled indicator state, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "overlay_fails_to_trap_focus"
description = "With the cart drawer, subscribe popup, or Detail/Editor overlay open, Tab moves focus to controls behind the overlay without trapping focus in the dialog."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_editorial_field"
description = "Intro copy, control labels, or nomenclature/meta text is unreadable due to poor contrast against the cream field or swatch surfaces."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "validation_or_copy_feedback_visual_only"
description = "Copied confirmation or form validation feedback is visual only and is not announced via an aria-live region or equivalent assistive association."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "swatches_missing_hex_accessible_name"
description = "Swatch controls that copy a hex lack an accessible name that includes the hex value."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Editorial or library headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, scroll reveals or palette card enter/exit animations still run fully instead of applying instant state changes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
