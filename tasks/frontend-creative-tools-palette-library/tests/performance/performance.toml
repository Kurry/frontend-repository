[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the palette library becomes interactive within 2 seconds, with the seeded palettes and Nomenclature Browse view already usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise: browsing all three views, filtering by period, creating, editing, deleting, copying a swatch, and dismissing the subscribe popup."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_and_filter_respond_under_100ms"
description = "Switching Nomenclature/Palette/Swatch or changing Filter by Period updates the visible library with UI response in under 100ms (perceived immediate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the sticky header and library region remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "library_scrolls_without_lag"
description = "With the seeded historical rows and at least six user palettes present, scrolling Nomenclature or Palette view shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_state_changes"
description = "During create/delete card transitions and view switches, controls remain interactive — the UI does not freeze until animations finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "card_and_view_motion_holds_frame_rate"
description = "Driven through real UI controls, palette card enter/exit and Browse view switches maintain a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_view_and_filter_never_hang"
description = "Rapid repeated view switching and filter changes stay responsive with no hangs, dropped interactions, or layout breakage, and leave the visible layout consistent with the selected view and period."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_library_session_stable"
description = "After an extended session of many view switches, filter changes, creates, edits, deletes, and swatch copies, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; header, intro, and library regions hold their space as the app settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before view toggles or library rows can be operated, or the seeded palettes are not yet listed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_library_flows"
description = "Console errors, warnings, or unhandled rejections appear during browse, filter, create, edit, delete, copy, or subscribe-dismiss flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "view_or_filter_transition_blocks_ui"
description = "View switching or period filtering blocks the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "create_or_delete_hangs_ui"
description = "Creating or deleting a palette hangs or freezes the UI until the card animation completes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "library_janks_on_scroll_or_filter"
description = "Scrolling nomenclature rows or applying period filters produces sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_library_input"
description = "While card enter/exit or overlay fade animations run, view toggles, filter, and editor controls ignore input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "The UI blocks rendering of header and library until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_switches"
description = "Rapid view switching or filter changes cause visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no sticky header or library skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid view/filter switching, or after deleting all user palettes and recreating."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
