[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: create a valid palette, switch to Palette view, select a named period filter, open Detail for that palette, and toggle favorite; then reload. Confirm every facet coherently resets to the seeded baseline — seeded palettes only, Nomenclature default, All Periods, and no selection — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "view_toggle_reversal_proves_live_layout"
description = "Selection-reversal proof (genre stand-in for sort reversal): switch to Palette and note the card layout, switch to Swatch and note the large tiles, then switch back to Palette. Confirm Palette's card grid returns identically — proving Browse layouts are derived from live view state, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "period_filter_derived_view_sensitivity"
description = "Derived-view sensitivity: with mixed-period data, select a named period and note the visible set across Nomenclature/Palette/Swatch, then select a different period. Confirm the visible items change meaningfully for each input rather than redrawing an identical set regardless of filter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_in_browse_and_detail"
description = "Cross-view echo: rename a palette and change one swatch hex in Detail/Editor; without reload confirm the same Palette-view card name, Nomenclature/Swatch presence of the new hex, and Detail all reflect the edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure the palette collection count, submit one valid create, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_palette_creates_different_outcomes"
description = "Input-dependent output: create palette A with name/period/swatches set A, then create palette B with clearly different name/period/swatches. Confirm the two outcomes differ in the ways the inputs dictate (not byte-identical cards or nomenclature rows)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_view_flows"
description = "Interleaved-flow integrity: start creating palette A in the editor (fill some fields but do not submit), switch Browse to Swatch view, then finish creating a separate valid palette B; confirm exactly one new palette appears for B, the view switch persisted, and A's incomplete draft did not corrupt B's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_library"
description = "Edge-state round-trip: delete every user-manageable palette (empty-state message visible), then create two valid palettes and clear the period filter; confirm the empty state clears, both new cards appear, and Nomenclature/Swatch track their swatches."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring a created palette, Browse view, period filter, and selection then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "filter_identical_across_different_periods"
description = "Selecting two different named periods leaves Nomenclature/Palette/Swatch visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_creates_produce_identical_output"
description = "Creating two palettes with different names, periods, and swatches yields identical visible cards and nomenclature rows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_surface_state_stale_until_reload"
description = "After editing name/period/swatches or toggling favorite, Browse layouts or Detail still show stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_contains_session_create"
description = "Full-pipeline export probe: measure collection, create a valid palette with a unique name and swatches, open Export immediately — CSS/Tailwind/SCSS previews and palette package JSON palettes array contain that exact name and those #RRGGBB values (session work product, not a seed-only snapshot)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_probe"
description = "Round-trip probe: create a palette, Download/copy palette package JSON, delete all user palettes (empty state), Import the package — collection count, Palette-view cards, and a fresh package export reconstruct to the imported document without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_identical_after_create"
description = "Creating a palette with a unique name and swatches leaves the Export CSS/Tailwind/SCSS or package JSON visually identical to the pre-create export (derived artifact ignoring session mutations)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
