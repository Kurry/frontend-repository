[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "required_hover_feedback"
description = "Through real pointer hover, nomenclature swatches gain outlines, palette-card swatches outline and reveal hex labels, Swatch tiles fade in overlays, inactive view indicators briefly fill, and Detail palette rows show a hover wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "browse_detail_mode_motion"
description = "Using the real palette-title and return controls switches between Browse and Detail/Editor without a full reload, stale layout flash, or loss of the active view/filter state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "missing_hover_feedback"
description = "Nomenclature swatches, palette-card swatches, Swatch tiles, inactive view toggles, or Detail rows remain visually static on real pointer hover where the instruction requires outline, label, overlay, indicator, or wash feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "copy_confirmation_timing"
description = "Clicking a real swatch shows a short on-swatch copied confirmation that remains readable briefly and then clears without shifting the surrounding row, card, or tile layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "subscribe_popup_fade"
description = "On a fresh load the subscribe overlay is absent; after the real deep-scroll or idle trigger it fades in, and using Close or a valid demo submit fades it out without navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "conditional_scroll_motion_usability"
description = "Where smooth scrolling or scroll-triggered reveals are present, real scrolling on a fresh load remains controllable and reaches all content, and opening an overlay pauses any smooth-scroll behavior that would interfere with native scroll locking"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "motion_layout_jank"
description = "A required hover, view/mode switch, copied confirmation, scroll reveal, or subscribe fade visibly flickers, shifts unrelated layout, blocks input, traps scrolling, or ends in an incorrect visual state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.8"
name = "create_delete_card_animation"
description = "Creating a palette through the real editor animates its card into the Palette-view grid, and deleting a palette through the real delete control animates its card out rather than snapping the surrounding layout instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion enabled, scroll reveals and card animations are removed or reduced to instant state changes while every view, control, and flow remains reachable and functional"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "export_and_simulator_open_transition"
description = "Opening and closing the export drawer and Layout simulator through real controls uses a brief opacity transition rather than a hard cut"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteraction quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (real control path, animated element, scroll state, timing, or resulting state) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
