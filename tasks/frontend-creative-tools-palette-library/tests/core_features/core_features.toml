[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "editorial_library_first_load"
description = "On first load the app opens directly to the O&A Palette Library in Nomenclature Browse view, with the editorial intro, controls row, non-empty historical rows, and no login, checkout, or route transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_manageable_palettes"
description = "At least six user-manageable palettes are available on first load alongside the historical dataset, and each has a visible name, period tag, and set of hex swatches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_palette"
description = "After creating a valid palette named 'Harbor Coastal' with a period and the required number of swatches, the collection count increases by exactly one and that palette appears in Browse and Detail/Editor surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "create_count_delta"
description = "After adding 3 new palettes on top of the seed set, the manage/list count shows exactly 3 more than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "period_filter_across_views"
description = "Selecting a named period with mixed-period data hides nonmatching items in Nomenclature, Palette, and Swatch views; choosing All Periods restores the full set in all three"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "edit_palette_everywhere"
description = "After editing one palette's name to 'Evening Ochre', period, and at least one swatch, that same record shows all three new values in Detail and every applicable Browse layout while the prior values disappear"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "delete_palette_everywhere"
description = "After deleting a selected palette, the collection count decreases by exactly one and that record disappears from Browse layouts, Detail selection, and matching filtered results"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_library_state"
description = "A period filter with zero matches and, separately, removal of all user-manageable palettes each produce a clear empty state inside the library region rather than blank or broken chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "invalid_palette_validation"
description = "Submitting create with an empty or whitespace-only name and then with fewer than the required swatches leaves the collection count unchanged both times and shows visible inline feedback naming the invalid field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "exclusive_browse_views"
description = "Switching among Nomenclature, Palette, and Swatch shows exactly one corresponding library layout at a time, fills only that view's circular indicator, and does so without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "browse_detail_editor_modes"
description = "Opening a palette enters a focused Detail/Editor where name, period, and swatches are editable; returning to Browse restores the prior view and filter without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "header_menu_cart_inert_controls"
description = "The sticky header shows the O&A script lockup, centered MENU, and CART; menu and empty-cart drawer open in place, while header, menu, cart, footer, and painting-title controls never navigate away or expose checkout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "swatch_copy_feedback"
description = "Clicking a swatch—not its painting-title control—copies that swatch's hex to the clipboard, shows an on-swatch copied confirmation for about one second, and then clears the confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "nomenclature_rows_sorted_deduped"
description = "Nomenclature rows each show a swatch, hex, italic historical name, notes, and painting-title control; their colors progress in hue order and no two visible rows repeat a hex"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "subscribe_hidden_first_paint"
description = "The subscribe popup is not visible on first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "palette_and_swatch_layout_content"
description = "Palette view renders responsive cards with about five swatches plus painting metadata, while Swatch view renders large color tiles whose hex/name/title overlay uses dark or light text appropriate to the tile luminance"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "palette_crud_coherence"
description = "A user palette can be created, selected, edited, selected away from and back to, favorited, filtered, and deleted, with the collection, counts, Browse layouts, and Detail surface reflecting each action immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "period_filter_options"
description = "Filter by Period offers All Periods plus named art-historical options including Baroque to Neoclassical, Expressionism, Fauvism, Old Masters, Post-Impressionism, Realism, Romanticism, Symbolism, and Tonalism"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "favorite_toggle"
description = "Toggling a palette's favorite or featured control changes that same record's visible status and preserves it while switching views, filtering, and opening Detail during the current session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "editorial_intro_content"
description = "The intro contains a serif lead about browsing color across paintings and centuries plus a two-column monospace body naming Werner's Nomenclature of Colours, Winsor & Newton, Cennini, and the ongoing/open dataset framing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "filter_recomputes_after_edit"
description = "With a period filter active, editing a selected palette's period from the matching period to a different one removes it from the visible results immediately, and changing the filter to its new period reveals the same edited record"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "nomenclature_derivation_after_edit"
description = "After adding or editing duplicate and differently hued swatches in user palettes, Nomenclature view still shows one row per hex and repositions changed colors according to hue rather than append order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "subscribe_trigger_and_dismiss"
description = "The subscribe popup stays hidden on first paint and appears only after idle (~45s) or scrolling past ~50%, closing or submitting dismisses it with no outbound navigation, and it does not reappear on further idle or scrolling during the same session"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "create_edit_filter_views_flow"
description = "Starting from a recorded count: create 'Harbor Coastal' with a period and distinct swatches, edit its name/period/one swatch, favorite it, filter to the edited period, and inspect Nomenclature, Palette, Swatch, and Detail; the count is exactly one higher and every surface shows the same edited record, color, period, and favorite state without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "delete_empty_repopulate_flow"
description = "Delete every user-manageable palette and observe the empty library state, then create one valid replacement and clear the period filter; the empty state disappears, the count becomes one, and the replacement is selectable and editable from Browse"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "view_filter_copy_round_trip"
description = "Choose a period, switch Nomenclature→Palette→Swatch→Nomenclature, copy one matching swatch, then choose All Periods; exactly one layout is visible throughout, the filtered set is consistent across layouts, copied feedback clears, and the full deduped hue ordering returns without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "submit_disabled_until_valid"
description = "In the palette create/edit form, typing an invalid or empty required value shows an inline error next to that field naming what to fix, and the submit control remains disabled until every required field is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "double_submit_single_create"
description = "Rapidly double-activating the editor's submit control with a valid palette creates exactly one palette: the collection count increases by exactly one and exactly one new card appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "palette_field_contract_bounds"
description = "Palette create/edit enforces the request-body field contract: name length 2–80, period one of the named Filter by Period values (never All Periods), swatches 3–8 unique #RRGGBB values; out-of-contract input shows inline errors naming the field and does not change the collection count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "export_drawer_live_format_previews"
description = "Opening Export shows live CSS, utility-theme, and SCSS previews plus palette package JSON that regenerate from the current user-manageable palettes; after creating a named palette with distinct swatches, those name and #RRGGBB values appear in the active format preview and the package JSON palettes array"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "palette_package_json_required_keys"
description = "Download palette package JSON (or its live preview) exposes required keys schemaVersion equal to number 1, library exactly 'O&A Palette Library', palettes as an array of palette request-body objects, and generatedAt as an ISO-8601 datetime ending in Z"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "import_package_round_trip"
description = "After exporting a palette package that includes a session-created palette, deleting user palettes to diverge, then Import package of that JSON, the collection count, Browse layouts, and a fresh export reconstruct to match the imported package without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "cart_add_request_body"
description = "Submitting a valid CartAdd with an existing paletteName and quantity between 1 and 5 adds one cart line showing that name and quantity; the cart drawer never exposes checkout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "subscribe_request_body_email"
description = "When the subscribe popup is visible, submitting an invalid email keeps it open with an inline error naming the email field; submitting a valid email-shaped value dismisses it in memory with no network subscribe"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "layout_simulator_recolors_from_palette"
description = "Opening Layout simulator shows a mock blog/dashboard/landing surface whose colors update from the selected palette's swatches (or the first library palette when none is selected) without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "undo_redo_history_stack"
description = "Undo and Redo step backward and forward through palette mutations: after deleting a palette via the UI, Undo restores its card, swatches, and the prior collection count; Redo re-applies the delete; a new mutation after Undo leaves Redo visibly disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "batch_hsl_shift_applies_to_selection"
description = "In Detail/Editor, selecting at least two swatches reveals a batch-edit tray with Hue (-180 to 180), Saturation (-100 to 100), and Lightness (-100 to 100) shift sliders with live numeric readouts; moving a slider previews the shift on the selected swatches live, Apply shift commits new #RRGGBB values as one undoable step, Cancel restores the pre-preview colors, and unselected swatches are unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "color_wheel_harmonic_modes"
description = "Detail/Editor shows a circular color wheel with a draggable anchor and a harmony mode select offering Analogous, Complementary, and Triadic; dragging the anchor moves the companion points continuously per the active mode (Complementary near 180 degrees apart, Triadic near 120-degree spacing) with live hex readouts, and switching mode repositions the companion points without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "apply_harmony_replaces_swatches"
description = "Activating Apply harmony replaces the selected palette's swatches with the wheel's computed set as one undoable step, and the committed set satisfies the 3-8 unique #RRGGBB contract everywhere the palette appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "contrast_matrix_ratios_and_marks"
description = "Detail/Editor for a palette with at least 2 distinct swatch hexes shows a contrast matrix of unique text/background pairings with computed contrast ratios (at least one decimal place) and AA (4.5:1) / AAA (7:1) pass/fail marks that include a text label such as Pass or Fail; recoloring a swatch updates at least one ratio or mark without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "vision_simulation_modes"
description = "A vision-simulation control offers None (default), Protanopia, and Deuteranopia; choosing Protanopia or Deuteranopia visibly alters swatch rendering across the Browse layouts and the Layout simulator relative to None, and choosing None restores the unfiltered appearance"
type = "binary"
weight = 1.0

