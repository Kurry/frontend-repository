[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "AC-01"
name = "signature_mutation"
description = "The replay timeline mutation changes the primary record, linked view, and status together."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "drum_patterns_collection_crud"
description = "Collection supports create, edit, delete, and filtering by domain status."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "drum_patterns_boundaries_validation"
description = "Tempo (40-300) and step count (4-32) validate at the boundaries, rejecting out-of-range values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "replay_timeline_scrub_restore"
description = "Replay Timeline scrubs a selected record through its timeline history and restores a prior checkpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "replay_timeline_undo_mutation"
description = "Undo reverts the last mutation and restores ordering, selection, and derived values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "artifact_export"
description = "Export artifact contains drum-pattern-v1 schemaVersion, exportedAt, records, derived state, and history."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "artifact_import_validation"
description = "Valid import restores authored structure, invalid import makes no state change."
type = "binary"
weight = 1.0
