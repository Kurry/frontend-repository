[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app shows a Dare Night setup screen with a players panel, Icebreaker/Truth/Dare/Wild category chips, Mild/Spicy/Wild intensity buttons, a round-timer switch, a custom-card form, and a Start game control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "When fewer than 2 valid names are entered or all categories are deselected, Start game stays disabled and a visible inline error appears next to the offending control; after adding 2 unique names and keeping a category selected, Start game becomes enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "When a name duplicating an existing player is entered, it is rejected with a visible inline error and is not added to the roster."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After pressing Start game, the play screen appears without a full page reload and shows the first player's turn above a Draw card control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After pressing Draw card, a white card panel reveals a category label, an intensity badge, and centered prompt text at least 18px, with the current player's name shown above it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After pressing Done, the current player's points increase by 1 and the turn advances to the next player; after pressing Skip on a later turn, a forfeit is logged with no point and the turn advances."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After starting a game with only one category selected and drawing several cards, every drawn card's category label matches that single selected category."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After adding a custom card via the form, a transient confirmation appears and the card is listed; after a full page refresh the custom card still appears in the list, proving localStorage persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "When a custom card's Delete control is pressed, a confirmation step is required, and cancelling it leaves the card in place while confirming removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After opening View scores, every player is listed with points and forfeits sorted by points descending, and resolving one more turn updates the scoreboard immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When the round timer is toggled on and a card is drawn, a 15-second countdown runs and, if it reaches zero before Done or Skip, the card is logged as a forfeit for the current player and the turn advances."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After drawing until the selected-category deck is exhausted, the deck reshuffles automatically, a Deck reshuffled confirmation appears, and the same card is not drawn twice in a row across the reshuffle boundary."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After pressing Done, Undo last turn is enabled; pressing it removes the awarded point, returns the turn to that same player, re-shows the exact card that was on screen rather than a new one, and cannot be used a second time on the already-reverted action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "On the live event feed, pressing Start begins delivery and the status reads Active; pressing Pause stops value changes; delivering events out of order and then Reconnect leaves the per-player bonus totals matching logical-timestamp order with duplicates ignored and the status reading Caught up."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After resolving turns to raise a player's total above any prior record, pressing Start new game and confirming returns to the setup screen with players and scores cleared while the Dare Night record still shows the new higher total, and a mid-game refresh instead restores the same players, points, forfeits, and current turn."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The setup screen accepts 2 to 8 player names, requires each name, and rejects a case-insensitive duplicate with a visible inline error rather than adding it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "The roster caps at 8 players and an empty or whitespace-only name is never added."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.18"
name = "1_18"
description = "Toggling category chips filters the deck: starting with only one category selected and drawing several cards yields only cards whose category label matches that category."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Selecting the Wild intensity weights the deck toward Wild-tagged cards, and exactly one intensity is active at a time."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.20"
name = "1_20"
description = "Pressing Draw card reveals a card showing its category label, an intensity badge, and prompt text, with the current player's name displayed above the card."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Pressing Done awards the current player one point and advances the turn, while pressing Skip logs a forfeit with no point and advances the turn."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "With 3 or more players the turn rotates in a fixed repeating order that returns to the first player after the last."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "A custom card added through the form is mixed into the deck and drawable during play, and the custom-card list shows a friendly empty-state message before any card is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Deleting a custom card requires a confirmation step, and cancelling the confirmation leaves the card in place while confirming removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The scoreboard lists every player with points and forfeits sorted by points descending and updates immediately after each resolved turn."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "With the round timer on, letting the 15-second countdown reach zero logs a forfeit for the current player and advances the turn exactly as a Skip would."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "Exhausting the selected-category deck reshuffles it automatically, shows a Deck reshuffled confirmation, and never draws the same card twice in a row across the reshuffle boundary."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "Undo last turn reverts the most recent Done, Skip, or timer forfeit by restoring that player's points and forfeits, returning the turn to that player, and re-showing the exact card that was on screen; it is unavailable at game start and after it has already been used for the latest action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "Start new game asks for confirmation, then returns to the setup screen with players and scores cleared while the saved Dare Night record is preserved and reflects the highest single-player total reached."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "The live event feed's Start, Pause, Reconnect, and Deliver out of order controls drive a visible stream status, and out-of-order delivery plus Reconnect resolve to per-player bonus totals matching logical-timestamp order with duplicates ignored and no double-applying."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "1_31"
description = "Start game commits a game with fewer than 2 players, a duplicate name, or zero categories selected instead of blocking it with an inline error."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "1_32"
description = "Rapidly repeating a control such as Done, Draw card, or the live-stream Start duplicates a transition, blanks the screen, or leaves the visible score or state inexact."
type = "binary"
weight = 1.0
negate = true
