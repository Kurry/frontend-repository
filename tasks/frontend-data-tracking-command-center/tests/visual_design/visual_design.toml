[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "grid_composition_kpi_main_sidebar"
description = "At a 1440px desktop viewport the layout composes as a full-width KPI metrics strip on top with a roughly two-thirds main column (agent status panel) and a roughly one-third sidebar column (activity feed) below, aligned to one regular grid"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "typography_hierarchy"
description = "Panel titles are visibly larger and heavier than table rows and feed items, feed items and agent rows share one compact body size, and the hierarchy is consistent across dashboard and detail views"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "kpi_tile_accent_and_shared_anatomy"
description = "The four KPI tiles are elevated cards with a top accent border in the primary brand blue and share identical anatomy, spacing, and alignment (value, trend arrow, sparkline in the same positions on every tile)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "consistent_status_chip_language"
description = "Agent state chips and feed status chips share one chip shape and size system, with color plus a visible text label distinguishing idle, running, error, info, and success"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "focus_ring_and_danger_treatment"
description = "Interactive controls show a visible focus ring on keyboard focus (verified by tabbing), and error surfaces — agent error rows and invalid form fields — use one consistent danger red treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "single_icon_set_consistency"
description = "One icon set is used consistently across KPI tiles, feed items, agent rows, and header controls, with no mixed icon styles, emoji stand-ins, or blurry raster icons"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.7"
name = "night_theme_full_recolor"
description = "When night mode activates, all surfaces, text, chips, and chart accents recolor to dark equivalents with readable contrast; no panel, dialog, or chart region stays light-themed while the rest of the app is dark"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "responsive_reflow_and_wrap"
description = "Below 1024px the KPI tiles wrap to two per row and the feed stacks full-width below the agent panel; at 375px the suggestions row scrolls within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n1"
name = "mobile_overflow_or_clipping"
description = "At 375px width, content clips, overlaps, or overflows the viewport, or page-level horizontal scrolling appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.n2"
name = "unstyled_default_register"
description = "Controls, dialogs, or tables render as unstyled browser defaults or visually clashing one-off styles instead of one coherent design language across the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
