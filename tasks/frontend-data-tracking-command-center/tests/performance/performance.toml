[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load"
description = "No console errors or warnings appear on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_during_exercise"
description = "No console errors or warnings appear during a full exercise including connect, filters, export, and palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_simulate_stays_responsive"
description = "Repeatedly activating Simulate activity keeps the UI responsive with no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "rapid_filter_toggles_stay_responsive"
description = "Rapidly toggling feed filter chips causes no hangs or frozen animations"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "export_tab_switch_no_freeze"
description = "Opening the export drawer and switching between Session JSON and Agents CSV regenerates the preview without freezing the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "palette_filter_stays_snappy"
description = "Typing in the command palette filter updates the result list without noticeable freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "undo_redo_stays_responsive"
description = "Rapid Undo/Redo after several connects/disconnects stays responsive without janky freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "detail_navigation_no_jank"
description = "Opening KPI detail views and returning with Back stays responsive without multi-second stalls"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "bulk_disconnect_no_hang"
description = "Bulk Disconnect selected on multiple agents completes without hanging the UI"
type = "binary"
weight = 1.0

