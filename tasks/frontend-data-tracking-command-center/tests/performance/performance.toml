[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load"
description = "No console errors or warnings appear on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_during_exercise"
description = "No console errors or warnings appear during a full exercise including connect, filters, export, and palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_simulate_stays_responsive"
description = "Repeatedly activating Simulate activity keeps the UI responsive with no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "rapid_filter_toggles_stay_responsive"
description = "Rapidly toggling feed filter chips causes no hangs or frozen animations"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "export_tab_switch_no_freeze"
description = "Opening the export drawer and switching between Session JSON and Agents CSV regenerates the preview without freezing the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "palette_filter_stays_snappy"
description = "Typing in the command palette filter updates the result list without noticeable freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "undo_redo_stays_responsive"
description = "Rapid Undo/Redo after several connects/disconnects stays responsive without janky freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "detail_navigation_no_jank"
description = "Opening KPI detail views and returning with Back stays responsive without multi-second stalls"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "bulk_disconnect_no_hang"
description = "Bulk Disconnect selected on multiple agents completes without hanging the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "Cold load takes more than 2 seconds before the dashboard is interactive"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_on_load"
description = "Console errors or warnings appear on load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "ui_hangs_under_rapid_input"
description = "Rapid Simulate activity or filter toggling hangs the UI or drops interactions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "export_freezes_ui"
description = "Opening Export session or switching format tabs freezes the UI for a noticeable period"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "palette_typing_janks"
description = "Command palette filtering stutters or freezes on each keypress"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animations_jank_under_load"
description = "Feed insertion or row animations stutter heavily under repeated Simulate activity"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "memory_leak_from_feed_growth"
description = "Repeated Simulate activity degrades responsiveness as if unbounded work accumulates beyond the 50-event cap"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "import_blocks_main_thread_long"
description = "Importing Session JSON freezes the UI for several seconds with no progress feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "theme_switch_long_stall"
description = "Night-mode theme switch stalls interaction for a noticeable period"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "detail_chart_render_stalls"
description = "Opening a KPI detail chart stalls the UI for a noticeable period"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
