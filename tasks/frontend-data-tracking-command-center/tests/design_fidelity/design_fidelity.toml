[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "prd_grid_composition_fidelity"
description = "At desktop width the composition matches the PRD: full-width KPI strip above a roughly two-thirds agent panel and one-third activity feed"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "prd_kpi_tile_anatomy_fidelity"
description = "KPI tiles match the PRD anatomy: elevated cards with primary-blue top accent, shared value/trend/sparkline structure"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "prd_chip_language_fidelity"
description = "Agent and feed status chips match the PRD's one consistent chip language with text labels for idle/running/error/info/success"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "prd_export_drawer_fidelity"
description = "Export drawer matches the PRD structure: Session JSON and Agents CSV tabs, monospaced preview, Copy and Download"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "prd_palette_overlay_fidelity"
description = "Command palette matches the PRD as a centered overlay list with a filter field and runnable commands"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "prd_night_theme_fidelity"
description = "Night theme matches the PRD expectation of full-surface recolor including chips and chart accents with no light regions left behind"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "prd_danger_treatment_fidelity"
description = "Error agent rows and invalid fields use one consistent danger treatment as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "prd_typography_hierarchy_fidelity"
description = "Panel titles versus feed/agent body text follow the PRD productive hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "prd_icon_consistency_fidelity"
description = "One consistent icon set is used across KPI tiles, feed, agents, and header as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "prd_detail_view_fidelity"
description = "KPI detail views show a larger chart plus a breakdown table of at least 6 rows with a Back control as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "composition_ignores_prd_grid"
description = "Desktop layout ignores the PRD grid and reads as an unrelated single-column or card stack"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "kpi_tiles_lack_shared_anatomy"
description = "KPI tiles lack the shared PRD anatomy or primary accent treatment"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "export_drawer_mismatches_prd"
description = "Export UI lacks Session JSON / Agents CSV tabs or monospaced preview contrary to the PRD"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "palette_mismatches_prd"
description = "Command palette is absent or renders as a plain unlabeled list without a filter field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "night_theme_partial_only"
description = "Night mode only partially recolors the app, leaving light panels or charts"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "chip_language_incoherent"
description = "Agent and feed chips use inconsistent shapes/sizes contrary to the PRD chip language"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "detail_view_missing_breakdown"
description = "KPI detail view omits the larger chart or the 6-row breakdown table"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "icon_styles_mixed"
description = "Mixed icon styles appear across KPI, feed, agents, and header"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "danger_treatment_inconsistent"
description = "Error rows and invalid fields use inconsistent unrelated danger treatments"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "visual_language_unrelated_to_prd"
description = "Overall visual language is unrelated to the specified command-center dashboard composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
