[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "prd_grid_composition_fidelity"
description = "At desktop width the composition matches the PRD: full-width KPI strip above a roughly two-thirds agent panel and one-third activity feed"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "prd_kpi_tile_anatomy_fidelity"
description = "KPI tiles match the PRD anatomy: elevated cards with primary-blue top accent, shared value/trend/sparkline structure"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "prd_chip_language_fidelity"
description = "Agent and feed status chips match the PRD's one consistent chip language with text labels for idle/running/error/info/success"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "prd_export_drawer_fidelity"
description = "Export drawer matches the PRD structure: Session JSON and Agents CSV tabs, monospaced preview, Copy and Download"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "prd_palette_overlay_fidelity"
description = "Command palette matches the PRD as a centered overlay list with a filter field and runnable commands"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "prd_night_theme_fidelity"
description = "Night theme matches the PRD expectation of full-surface recolor including chips and chart accents with no light regions left behind"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "prd_danger_treatment_fidelity"
description = "Error agent rows and invalid fields use one consistent danger treatment as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "prd_typography_hierarchy_fidelity"
description = "Panel titles versus feed/agent body text follow the PRD productive hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "prd_icon_consistency_fidelity"
description = "One consistent icon set is used across KPI tiles, feed, agents, and header as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "prd_detail_view_fidelity"
description = "KPI detail views show a larger chart plus a breakdown table of at least 6 rows with a Back control as specified"
type = "binary"
weight = 1.0

