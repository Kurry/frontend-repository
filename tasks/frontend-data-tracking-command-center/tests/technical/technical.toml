[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "5.1"
name = "serves_clean_and_interactive_fast"
description = "The app serves from its documented start path, renders the full dashboard (not a blank or broken page), and is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app (connect, rename, disconnect, bulk disconnect, retry, filters, detail views, theme change, export, import, undo/redo, command palette)"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.4"
name = "reload_returns_seeded_baseline"
description = "After changing several facets (connect an agent, apply a feed filter, activate night mode, open export drawer) a page reload returns the app to its seeded baseline: at least 12 seeded feed events, at least 4 seeded agents, the default light theme, dashboard view, and empty undo/redo stacks — all facets reset coherently, never a mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.5"
name = "cross_view_state_coherence"
description = "A change made in one view is immediately reflected everywhere the datum appears without a reload: renaming an agent updates its panel row, expanded detail, feed references, and both export previews; connecting or disconnecting a running agent moves the active agents KPI in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.7"
name = "rapid_input_stability"
description = "Rapidly repeating actions (spamming Simulate activity, toggling filter chips, opening and closing Connect/export/palette) causes no hangs, dropped interactions, view desyncs, or runtime exceptions in the console"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.9"
name = "webmcp_registry_matches_ui"
description = "The page exposes window.webmcp_session_info, window.webmcp_list_tools, and window.webmcp_invoke_tool, and invoking a state-changing tool produces the same rendered result and feed trail as the equivalent visible control"
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "5.10"
name = "export_preview_regen_stays_responsive"
description = "Opening the export drawer and switching between Session JSON and Agents CSV regenerates the preview without freezing the UI or throwing console errors"
type = "binary"
weight = 1.0

