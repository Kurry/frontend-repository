[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "5.1"
name = "serves_clean_and_interactive_fast"
description = "The app serves from its documented start path, renders the full dashboard (not a blank or broken page), and is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app (connect, rename, disconnect, retry, filters, detail views, theme change)"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.3"
name = "browser_storage_used"
description = "localStorage, sessionStorage, or another browser storage API is non-empty after a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.4"
name = "reload_returns_seeded_baseline"
description = "After changing several facets (connect an agent, apply a feed filter, activate night mode, expand an agent row) a page reload returns the app to its seeded baseline: at least 12 seeded feed events, at least 4 seeded agents, the default light theme, and the dashboard view — all facets reset coherently, never a mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.5"
name = "cross_view_state_coherence"
description = "A change made in one view is immediately reflected everywhere the datum appears without a reload: renaming an agent updates its panel row, expanded detail, and feed references; connecting or disconnecting a running agent moves the active agents KPI in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.6"
name = "outbound_network_requests"
description = "The network log shows outbound requests to external origins (CDN scripts, fonts, icons, analytics, or data) during load or use of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.7"
name = "rapid_input_stability"
description = "Rapidly repeating actions (spamming Simulate activity, toggling filter chips, opening and closing the dialog) causes no hangs, dropped interactions, view desyncs, or runtime exceptions in the console"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.8"
name = "full_page_reload_on_actions"
description = "A primary action — KPI tile navigation, view switching, form submission, retry, or theme change — triggers a full page reload instead of updating client state in place"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.9"
name = "webmcp_registry_matches_ui"
description = "The page exposes window.webmcp_session_info, window.webmcp_list_tools, and window.webmcp_invoke_tool, and invoking a state-changing tool produces the same rendered result and feed trail as the equivalent visible control"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "5.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
