[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_kpi_strip_one_row"
description = "At 1024px and above the KPI strip shows all four tiles in one row and the two-thirds/one-third agent/feed split holds"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_kpi_wrap_feed_stacks"
description = "Below 1024px the KPI tiles wrap to two per row and the feed stacks below the agent panel full-width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_horizontal_scroll"
description = "At 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "suggestions_row_self_scrolls"
description = "At 375px the suggestions row scrolls within its own container without forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_drawer_usable_on_mobile"
description = "The export drawer stays fully visible and operable at 375px rather than rendering off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "command_palette_usable_on_mobile"
description = "The command palette stays fully visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "undo_redo_visible_on_mobile"
description = "Undo and Redo controls stay visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "connect_dialog_usable_on_mobile"
description = "The Connect agent dialog stays fully visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "agent_panel_readable_on_mobile"
description = "Agent rows remain readable at 375px with truncated long names and accessible expand/actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "feed_readable_on_mobile"
description = "Activity feed items remain readable and tappable at 375px without overlapping chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "mobile_overflow_or_clipping"
description = "At 375px content clips, overlaps, or overflows the viewport, or page-level horizontal scrolling appears"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "desktop_split_collapses_incorrectly"
description = "At 1440px the two-thirds/one-third agent/feed split collapses into a single stacked column incorrectly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "export_offscreen_on_small_widths"
description = "Export drawer or its Copy/Download controls render off-screen or unusable below 1024px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "palette_offscreen_on_small_widths"
description = "Command palette renders off-screen or unusable at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "kpi_tiles_overflow_desktop"
description = "KPI tiles overflow or overlap each other at desktop width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_widths_break_reflow"
description = "Fixed-width panels prevent the feed from stacking below the agent panel below 1024px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "touch_targets_too_small_on_mobile"
description = "Primary agent actions or filter chips are too small to operate at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "suggestions_force_page_scroll"
description = "Suggestions row forces page-level horizontal scrolling at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "undo_redo_unreachable_on_mobile"
description = "Undo/Redo controls are unreachable or clipped at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "detail_view_breaks_on_mobile"
description = "KPI detail view or Back control is unusable at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
