[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_kpi_strip_one_row"
description = "At 1024px and above the KPI strip shows all four tiles in one row and the two-thirds/one-third agent/feed split holds"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_kpi_wrap_feed_stacks"
description = "Below 1024px the KPI tiles wrap to two per row and the feed stacks below the agent panel full-width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_horizontal_scroll"
description = "At 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "suggestions_row_self_scrolls"
description = "At 375px the suggestions row scrolls within its own container without forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_drawer_usable_on_mobile"
description = "The export drawer stays fully visible and operable at 375px rather than rendering off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "command_palette_usable_on_mobile"
description = "The command palette stays fully visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "undo_redo_visible_on_mobile"
description = "Undo and Redo controls stay visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "connect_dialog_usable_on_mobile"
description = "The Connect agent dialog stays fully visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "agent_panel_readable_on_mobile"
description = "Agent rows remain readable at 375px with truncated long names and accessible expand/actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "feed_readable_on_mobile"
description = "Activity feed items remain readable and tappable at 375px without overlapping chrome"
type = "binary"
weight = 1.0

