[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seeded"
description = "Multi-facet round-trip: connect an agent, apply a feed filter, open a KPI detail, and enable night mode, then reload — all facets coherently reset to the seeded baseline (at least 12 feed events, at least 4 agents, light theme, dashboard view, empty undo stacks), never a mix of kept and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "feed_filter_reversal_proves_live"
description = "Filter-reversal proof: apply an error filter and note the visible events, then Clear filters and re-apply the same filter; the filtered set matches and differs from the full feed, proving filters derive from live events rather than hardcoded lists"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_preview_tracks_agent_mutations"
description = "Derived-view sensitivity: connect an agent named Probe Alpha then open Export — Session JSON and Agents CSV both contain Probe Alpha; disconnect it and both previews no longer contain that name"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "rename_echoes_panel_feed_export"
description = "Cross-view echo: rename an agent in the panel and confirm the new name appears in the expanded detail, any feed references, and both export previews without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "connect_count_delta_is_exact"
description = "Count-delta integrity: measure agent panel row count immediately before and after Connect agent; the delta is exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_agent_names_change_exports"
description = "Input-dependent output: connect two agents with different names in separate runs (or sequential connects) and confirm the two names appear distinctly in the panel and in Session JSON / Agents CSV"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_connect_and_detail_views"
description = "Interleaved-flow integrity: start Connect agent, switch to a KPI detail view and back, finish Connect, then confirm the new agent exists and the detail Back path still works without corrupting feed filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_agents_then_reconnect_tracks_kpi"
description = "Edge-state round-trip: disconnect every agent (empty panel + active-agents KPI at 0), then connect a running-capable agent path or reconnect until a running agent exists; the active-agents KPI and export agent list track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_round_trip_restores_exports"
description = "Connect an agent, confirm it appears in export previews, Undo, and confirm the agent and its connected feed event are gone from the panel and both export previews; Redo restores them"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_pipeline_end_state"
description = "Full pipeline: mutate (connect or rename), open Export, confirm Session JSON contains the mutation, Import that JSON after a further local change if needed, and confirm agents, feed, active-agents KPI, and both export previews match the imported session"
type = "binary"
weight = 1.0

