[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_strip_bonus"
description = "Beyond the required export drawer, a structured export summary strip names agent count and the active-agents KPI above the preview so operators can trust the artifact at a glance"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "undo_redo_keyboard_shortcuts_bonus"
description = "Beyond required Undo/Redo buttons, keyboard shortcuts reverse and reapply mutating actions with the same completeness as the header controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "last_mutation_chip_bonus"
description = "A compact chip or status line shows the last mutating action (for example Connected agent or Exported session) and updates after connect, disconnect, export copy, or import"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "kpi_sparkline_extra_affordance"
description = "KPI sparklines or detail charts offer an extra usability affordance beyond the required tooltip — for example a brush, range highlight, or comparison marker that remains browser-observable"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "palette_recent_commands_bonus"
description = "The command palette shows recent commands or a keyboard-hint row beyond the required command list"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "operator_density_preferences_bonus"
description = "A density or feed-verbosity preference changes the visible compactness of agent rows or feed items beyond the required layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "ops_console_brand_polish_bonus"
description = "The command center presents a polished ops-console identity (distinct title treatment or header composition) beyond bare generic dashboard chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "theme_accent_customization_bonus"
description = "Beyond required light/night themes, an accent or contrast preference recolors chips or chart accents without breaking night mode"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "print_or_share_session_bonus"
description = "A print-friendly or share-oriented session summary view is available beyond the required JSON/CSV export"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_ops_polish"
description = "Competition-level polish is visible: the session artifact path (mutate → export preview → copy/download) feels operator-ready rather than demo-thin"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0