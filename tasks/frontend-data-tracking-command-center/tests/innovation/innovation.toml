[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_strip_bonus"
description = "Beyond the required export drawer, a structured export summary strip names agent count and the active-agents KPI above the preview so operators can trust the artifact at a glance"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "undo_redo_keyboard_shortcuts_bonus"
description = "Beyond required Undo/Redo buttons, keyboard shortcuts reverse and reapply mutating actions with the same completeness as the header controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "last_mutation_chip_bonus"
description = "A compact chip or status line shows the last mutating action (for example Connected agent or Exported session) and updates after connect, disconnect, export copy, or import"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "kpi_sparkline_extra_affordance"
description = "KPI sparklines or detail charts offer an extra usability affordance beyond the required tooltip — for example a brush, range highlight, or comparison marker that remains browser-observable"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "palette_recent_commands_bonus"
description = "The command palette shows recent commands or a keyboard-hint row beyond the required command list"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "operator_density_preferences_bonus"
description = "A density or feed-verbosity preference changes the visible compactness of agent rows or feed items beyond the required layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "ops_console_brand_polish_bonus"
description = "The command center presents a polished ops-console identity (distinct title treatment or header composition) beyond bare generic dashboard chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "theme_accent_customization_bonus"
description = "Beyond required light/night themes, an accent or contrast preference recolors chips or chart accents without breaking night mode"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "print_or_share_session_bonus"
description = "A print-friendly or share-oriented session summary view is available beyond the required JSON/CSV export"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_ops_polish"
description = "Competition-level polish is visible: the session artifact path (mutate → export preview → copy/download) feels operator-ready rather than demo-thin"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The demo is purely spec-compliant, barebones, and unenhanced beyond the minimum required surfaces"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "Interactions and visuals are generic, templated, or copied with no command-center identity"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n3"
name = "experience_lacks_polish_guidance_story"
description = "The app has no polish around the export artifact path — no summary, shortcuts, or last-action feedback beyond the bare minimum"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n4"
name = "no_bonus_operator_affordance"
description = "No optional operator affordance from the innovation list is present"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n5"
name = "innovation_breaks_required_flows"
description = "An attempted enhancement breaks Connect, Export, or Undo required flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n6"
name = "bonus_ui_obscures_required_controls"
description = "Bonus chrome obscures required Export session, Undo/Redo, or Connect agent controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n7"
name = "fake_innovation_non_observable"
description = "Claimed enhancements are not browser-observable in the running UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n8"
name = "innovation_only_in_marketing_copy"
description = "Innovation appears only as marketing copy with no interactive enhancement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n9"
name = "bonus_feature_is_nonfunctional"
description = "A visible bonus control (summary strip, shortcut hint, last-action chip) is nonfunctional"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n10"
name = "enhancement_regresses_accessibility"
description = "An enhancement removes keyboard reachability or focus indicators from required controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0