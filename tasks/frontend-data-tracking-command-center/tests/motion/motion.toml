[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "kpi_countup_on_fresh_load"
description = "On a fresh page load, KPI numeric values count up from zero to their current value over roughly 800 milliseconds (sample early and settled frames) rather than appearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "feed_item_slide_in_from_top"
description = "Driven through the real Simulate activity control (never a state-shortcut tool call): the new feed item slides in from the top with a roughly 200 millisecond ease-out while older items shift down smoothly to make room rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "step_status_transition_animation"
description = "Watching a running agent through the real UI, a step's status indicator transitions visibly from pending to running to complete rather than swapping instantly, and expanding an agent row opens its detail area with a short height-and-opacity transition and a rotating chevron cue"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "dialog_drawer_palette_enter_exit"
description = "The Connect agent dialog, night-mode popover, export drawer, and command palette enter and exit with a short opacity-and-scale transition of roughly 200 milliseconds when opened and closed via their real triggers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "agent_row_animate_in_out"
description = "Driven through the real UI controls: a newly connected agent's row animates into the panel and a disconnected agent's row animates out rather than appearing or vanishing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "hover_wash_system"
description = "Verified with computed styles while hovering: buttons ease background and shadow with a slight press effect, agent rows, feed items, and filter chips take a visible hover wash, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "theme_recolor_transition"
description = "Activating night mode through the schedule form recolors surfaces with a short transition rather than an instant hard swap, and the app stays usable throughout the transition"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion set, the KPI count-up is instant, feed items appear without animation, and dialog, popover, drawer, palette, and step-status transitions apply instantly while every feature remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_drawer_motion"
description = "Driven through the real Export session control: the export drawer enters and exits with a short opacity-and-scale or slide transition rather than snapping open and shut"
type = "binary"
weight = 0.5

