[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_reaches_primary_controls"
description = "Every interactive control — KPI tiles, agent rows and actions, checkboxes, feed items, filter chips, Undo/Redo, Export session, command palette, and form fields — is reachable and operable with the keyboard alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "visible_focus_indicators"
description = "Keyboard focus shows a visible focus indicator on KPI tiles, agent rows, filter chips, header controls, and form fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "dialogs_trap_focus_and_escape"
description = "Connect agent dialog, export drawer, and command palette trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "night_popover_escape_returns_focus"
description = "The night-mode popover closes on Escape and returns focus to its badge"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "validation_associated_with_fields"
description = "Form validation messages for Connect agent and night schedule are associated with their fields so each message names the field it belongs to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "status_not_color_only"
description = "Agent state chips and feed status chips carry visible text labels so status is never conveyed by color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "aria_live_announces_mutations"
description = "Connect, disconnect, bulk disconnect, export copy, and import completion are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "labels_on_form_controls"
description = "Connect agent and night-schedule form controls have visible labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "checkbox_and_bulk_actions_labeled"
description = "Agent selection checkboxes and Disconnect selected are labeled or named for assistive technology"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "export_tabs_are_keyboard_operable"
description = "Session JSON and Agents CSV tabs and Copy/Download controls in the export drawer are keyboard operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "keyboard_traps_without_escape"
description = "A dialog, drawer, or palette traps keyboard focus with no Escape or close path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_not_visible"
description = "Interactive controls show no visible focus indicator when reached by keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "status_color_only"
description = "Agent or feed status is conveyed only by color with no text label"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "dialogs_missing_modal_semantics"
description = "Connect dialog, export drawer, or command palette lacks role dialog / aria-modal semantics while behaving as a modal"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "validation_not_associated"
description = "Validation messages render as orphaned copy unassociated with Connect agent or night-schedule fields"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "live_region_missing_for_mutations"
description = "Connect, disconnect, export copy, or import completion has no aria-live announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "icon_only_controls_unlabeled"
description = "Icon-only header controls (palette, export, undo) lack accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "focus_lost_after_overlay_close"
description = "Closing Connect, export, or palette leaves focus lost or on body with no return to the opener"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "checkboxes_unreachable_by_keyboard"
description = "Agent selection checkboxes cannot be toggled with the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "export_drawer_not_keyboard_usable"
description = "Export drawer format tabs or Copy/Download cannot be operated by keyboard alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
