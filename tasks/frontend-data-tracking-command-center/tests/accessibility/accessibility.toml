[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_reaches_primary_controls"
description = "Every interactive control — KPI tiles, agent rows and actions, checkboxes, feed items, filter chips, Undo/Redo, Export session, command palette, and form fields — is reachable and operable with the keyboard alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "visible_focus_indicators"
description = "Keyboard focus shows a visible focus indicator on KPI tiles, agent rows, filter chips, header controls, and form fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "dialogs_trap_focus_and_escape"
description = "Connect agent dialog, export drawer, and command palette trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "night_popover_escape_returns_focus"
description = "The night-mode popover closes on Escape and returns focus to its badge"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "validation_associated_with_fields"
description = "Form validation messages for Connect agent and night schedule are associated with their fields so each message names the field it belongs to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "status_not_color_only"
description = "Agent state chips and feed status chips carry visible text labels so status is never conveyed by color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "aria_live_announces_mutations"
description = "Connect, disconnect, bulk disconnect, export copy, and import completion are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "labels_on_form_controls"
description = "Connect agent and night-schedule form controls have visible labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "checkbox_and_bulk_actions_labeled"
description = "Agent selection checkboxes and Disconnect selected are labeled or named for assistive technology"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "export_tabs_are_keyboard_operable"
description = "Session JSON and Agents CSV tabs and Copy/Download controls in the export drawer are keyboard operable"
type = "binary"
weight = 1.0

