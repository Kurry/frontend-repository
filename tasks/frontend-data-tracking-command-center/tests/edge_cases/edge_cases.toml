[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_feed_and_empty_agents_states"
description = "When feed filters match no events the feed shows an empty-state message with Clear filters; when every agent is disconnected the agent panel shows an empty state offering Connect agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_enforce_agent_and_schedule_contracts"
description = "Connect agent and night-schedule forms show inline per-field validation for the declared field contracts before submit, and submit/save stays blocked while invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_messages_name_field_and_rule"
description = "Validation and import error messages name the offending field and the violated rule rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation_feedback"
description = "Connect, disconnect, export Copy, and successful import show visible confirmation or feed/toast feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "running_agent_shows_step_progress"
description = "A running agent shows live step progression and an n-of-m summary rather than an inert static row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "disconnect_supports_confirm_and_undo"
description = "Disconnect asks for confirmation before removal, and Undo can restore a disconnected agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "night_badge_and_palette_are_discoverable"
description = "Night-mode badge and Command palette control are labeled or titled so their purpose is discoverable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_interactive_elements"
description = "Connect, Disconnect, Export, Undo, Redo, checkboxes, and filter chips use semantic buttons/inputs/labels rather than non-interactive divs only"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modals_support_close_paths"
description = "Connect dialog, export drawer, and command palette close via explicit close and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "running_agent_shows_step_progress_feedback"
description = "Long simulated agent runs provide visible step-status progress rather than a silent wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty filtered feed or empty agent panel shows nothing with no empty-state message or recovery control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Connect, schedule, or import validation failures appear only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Connect, disconnect, export Copy, or import succeed or fail with no visible UI feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Disconnect or bulk Disconnect selected removes agents with no confirmation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "double_submit_creates_duplicates"
description = "Double-activating Connect agent submit creates more than one agent row"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "import_malformed_mutates_session"
description = "Importing malformed Session JSON or contract-violating agents mutates the agent collection or clears undo as if import succeeded"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "bulk_disconnect_with_zero_selection_fires"
description = "Bulk Disconnect selected with zero checked rows still removes agents or opens a confirmation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "long_agent_name_breaks_layout"
description = "An agent name longer than 40 characters overflows or breaks the panel row layout instead of truncating with an ellipsis"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "export_empty_agents_errors"
description = "With zero agents, opening Export session errors or fails to show header-only CSV / empty agents array JSON"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "redo_after_new_mutation_still_applies"
description = "After Undo then a new connect, Redo is still enabled and resurrects the cleared redo stack"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
