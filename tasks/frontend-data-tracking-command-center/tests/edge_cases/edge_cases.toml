[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_feed_and_empty_agents_states"
description = "When feed filters match no events the feed shows an empty-state message with Clear filters; when every agent is disconnected the agent panel shows an empty state offering Connect agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_enforce_agent_and_schedule_contracts"
description = "Connect agent and night-schedule forms show inline per-field validation for the declared field contracts before submit, and submit/save stays blocked while invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_messages_name_field_and_rule"
description = "Validation and import error messages name the offending field and the violated rule rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation_feedback"
description = "Connect, disconnect, export Copy, and successful import show visible confirmation or feed/toast feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "running_agent_shows_step_progress"
description = "A running agent shows live step progression and an n-of-m summary rather than an inert static row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "disconnect_supports_confirm_and_undo"
description = "Disconnect asks for confirmation before removal, and Undo can restore a disconnected agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "night_badge_and_palette_are_discoverable"
description = "Night-mode badge and Command palette control are labeled or titled so their purpose is discoverable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_interactive_elements"
description = "Connect, Disconnect, Export, Undo, Redo, checkboxes, and filter chips use semantic buttons/inputs/labels rather than non-interactive divs only"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modals_support_close_paths"
description = "Connect dialog, export drawer, and command palette close via explicit close and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "running_agent_shows_step_progress_feedback"
description = "Long simulated agent runs provide visible step-status progress rather than a silent wait"
type = "binary"
weight = 1.0

