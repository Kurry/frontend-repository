[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"
[[criterion]]
id = "floor_system_topology"
name = "floor_system_topology"
description = "Verify that assets can be dragged among valid room anchor points and connect with edges (supplies, drains-to, powers, controls, vents-to, located-in), and that the floor plan and abstract system graph share selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "condition_symptom_timeline"
name = "condition_symptom_timeline"
description = "Verify that readings and symptoms store and display their respective exact fields on the timeline, highlighting graph nodes and work orders when time is brushed, and preserving missing/not-measured/zero distinctions."
type = "binary"
weight = 1.0

[[criterion]]
id = "diagnostic_hypothesis_branches"
name = "diagnostic_hypothesis_branches"
description = "Verify that symptoms/readings can be connected to hypotheses in a branch graph, tests execute deterministic outcomes, accepting a test prunes incompatible branches only after review, and hypotheses cannot be confirmed without required evidence."
type = "binary"
weight = 1.0

[[criterion]]
id = "recurring_maintenance_planner"
name = "recurring_maintenance_planner"
description = "Verify that recurring service occurrences appear on a calendar and asset timeline, supporting exceptions, and that completing/rescheduling preserves recurrence identity without rewriting prior service history."
type = "binary"
weight = 1.0

[[criterion]]
id = "parts_tool_reservation"
name = "parts_tool_reservation"
description = "Verify that work orders tentatively reserve parts from inventory by lot/expiry, release on cancel, consume exactly upon step completion, and require compatibility evidence for substitution."
type = "binary"
weight = 1.0

[[criterion]]
id = "resumable_work_order_execution"
name = "resumable_work_order_execution"
description = "Verify that work steps progress correctly through their states, correctly handle deterministic test/part failures, and support retry, rollback of reversible steps, and abandonment."
type = "binary"
weight = 1.0

[[criterion]]
id = "verification_certification"
name = "verification_certification"
description = "Verify that certification requires matching before/after readings, symptom resolution, step evidence, and parts, freezing checksums when closed, and becoming stale on upstream edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "responsive_atlas_artifacts"
name = "responsive_atlas_artifacts"
description = "Verify that the desktop correctly links floor/system graph, condition timeline, planner, and diagnostic rail into a coherent multi-view layout."
type = "binary"
weight = 1.0
