[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "core_features.map_connect"
description = "Assets drag among valid room anchor points and connect with supplies, drains-to, powers, controls, vents-to, or located-in edges."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.symptom_timeline"
description = "Readings store measure, value, unit, observed time, provenance, and note; symptoms store type, severity, interval, affected asset/zone, and evidence."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.branch_hypothesis"
description = "Users connect symptoms/readings to possible causes and tests in a branch graph; accepting a test result prunes incompatible branches."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.maintenance_planner"
description = "Each asset supports interval- or date-based service series with this, this-and-future, all exceptions."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.parts_reservation"
description = "Work orders reserve quantities from the fixture inventory with lot, compatibility, and expiry."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.work_execution"
description = "The workflow supports queued, active, paused, awaiting evidence, failed, skipped-allowed, complete, or rolled back states."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.verify_certify"
description = "Closing requires declared criteria; exceptions need type/note and cannot waive fixture hard checks."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.artifact_export"
description = "Export produces canonical JSON, CSV asset/service/reading ledger, SVG floor/system maps, and Markdown handoff report."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.no_preseed"
description = "On fresh load, authored work, completion, approval, export, or success evidence is preseeded in the application state."
type = "binary"
negate = true
weight = 1.0
