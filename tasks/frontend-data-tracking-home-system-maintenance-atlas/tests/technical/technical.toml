[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"
[[criterion]]
id = "reload_isolation"
name = "reload_isolation"
description = "Verify that state promised to persist survives reload exactly, while transient previews, dialogs, hover, drag, and invalid drafts do not leak into persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "atomic_import"
name = "atomic_import"
description = "Verify that import behaves as an atomic transaction that rejects invalid records with zero state mutation."
type = "binary"
weight = 1.0

[[criterion]]
id = "downloadable_artifact"
name = "downloadable_artifact"
description = "Verify that the system exports a canonical JSON/CSV/SVG/Markdown dossier, and that importing restores exactly the derived and authored state."
type = "binary"
weight = 1.0

[[criterion]]
id = "bounds_validation"
name = "bounds_validation"
description = "Verify that exact minimum, maximum, enum, and cross-field rules are enforced on bounded fields, and that error copy identifies the exact field and rejected value."
type = "binary"
weight = 1.0

[[criterion]]
id = "zero_event_creation"
name = "zero_event_creation"
description = "Verify that no-op, invalid, cancelled, and double activation paths create zero extra events in the canonical ledger."
type = "binary"
weight = 1.0

[[criterion]]
id = "clean_state_start"
name = "clean_state_start"
description = "Verify that the app begins from a genuinely clean state, with no authored work, completion, or success evidence preseeded."
type = "binary"
weight = 1.0
