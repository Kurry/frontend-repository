[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "breakpoint_1000_desktop_vs_mobile_nav"
description = "At and above 1000px the header shows the full primary navigation with the Responsibility dropdown; below 1000px the desktop nav is replaced by the Menu toggle and full-screen overlay menu, with header logo variants swapping as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "Below 1000px, primary interactive controls (Menu toggle, Close, cookie banner actions, carousel Prev./Next) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_and_spacing_no_abrupt_jumps"
description = "Between 1440 and 375 widths, fluid clamp() type and spacing tokens resize typography and gaps smoothly and continuously, with no abrupt size jumps at the 700px, 1000px, or 1400px thresholds."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "At 375, 768, and 1440 widths, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_collapses_to_menu_below_1000"
description = "Below 1000px the navigation collapses to the Menu toggle path; the desktop About/Brands/Careers/Investors/Responsibility row is not the operable nav at 375."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "sections_reflow_logically_at_narrow"
description = "At narrow widths the hero, portfolio particle field, news cards, market snapshot, and footer reflow logically without collapsing into an unreadable equal-width dump that loses the asymmetric hero hierarchy."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_menu_and_carousel_touch_work"
description = "Below 1000px, tapping Menu opens the overlay and carousel Prev./Next (and pointer drag where present) remain operable on the Latest News track."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scrollbar_at_key_widths"
description = "At 375, 768, and 1440 widths no horizontal scrollbar appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "hero_portfolio_news_keep_aspect_ratios"
description = "The hero video/still, portfolio imagery, and news cards keep their aspect ratios at 375, 768, and 1440 without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "sticky_header_accessible_all_widths"
description = "The sticky header remains reachable and operable at 375, 768, and 1440; at 1440 it measures roughly 82px tall and stays above page content while scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_composition_reflow_preserves_hierarchy"
description = "At 375 the asymmetric hero (left-weighted Make. Every Day. Better. plus Annual Report card) and broken-grid portfolio title are re-choreographed into a stacked mobile composition that preserves hierarchy rather than a flat equal-column dump of the desktop grid."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_product_breakpoints"
description = "At 375, 768, or 1440 the layout breaks, overflows, or loses required chrome (desktop nav vs Menu overlay) for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Below 1000px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_narrow_width"
description = "At 375 width body or heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 375, 768, or 1440 content is cropped or unnecessary scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_menu_missing_or_unresponsive"
description = "Below 1000px the Menu toggle is absent from the header, or activating it leaves the full-screen overlay closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "sticky_header_obscures_content"
description = "The sticky header permanently obscures the hero headline or section content with no recoverable scroll offset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_or_stacking_failure_at_width"
description = "At 375, 768, or 1440 elements overlap incorrectly or stacking order breaks the hero card, cookie layer, or footer slab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "desktop_chrome_shown_on_mobile_or_inverse"
description = "Below 1000px the full desktop nav row remains the only nav path without a working Menu overlay, or at ≥1000px the Menu overlay is the only nav with desktop links unavailable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "media_static_size_overflows"
description = "Hero video/still, portfolio imagery, or news cards use a static size that overflows the viewport at 375 or 768."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "cookie_or_carousel_controls_disappear"
description = "Cookie banner actions or news carousel Prev./Next disappear at 375 or 768 while remaining required chrome."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "briefing_and_palette_usable_at_375"
description = "At 375 width, the command palette, Investor briefing preview (including Import), shortlist strip, and Pin to briefing controls remain reachable and usable without horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "briefing_overflows_narrow_viewport"
description = "At 375 width, the Investor briefing panel or command palette clips content or forces a horizontal scrollbar."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
