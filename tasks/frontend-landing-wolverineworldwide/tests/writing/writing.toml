[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_casing_matches_reference"
description = "Where the app renders headings and section titles, they keep the reference casing conventions consistently (uppercase mono meta labels such as DAY'S HIGH; sentence-case body; exact section headings as specified)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "action_labels_specific"
description = "Where the app renders button or action labels, they use specific mandated wording (Accept all, Reject all, Manage preferences, Prev./Next, View All, Careers CTA) rather than generic Submit/OK alone when a specific label is specified."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "consent_feedback_names_problem"
description = "Where the app renders cookie-preferences validation or error feedback, it names the problem with actionable text (for example that necessary must remain enabled or that a category is required) rather than only saying Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.12"
name = "import_errors_name_problem"
description = "Where the app renders Investor briefing Import errors, the message names the import problem in plain language (for example schemaVersion or consent) rather than silent failure or only the word Error."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "cookie_banner_copy_intentional"
description = "Where the app renders the cookie banner, the heading We use cookies and the three actions read as intentional product copy rather than a broken missing-content stub."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "marketing_copy_spelling_grammar"
description = "Where the app renders body or marketing copy (culture statement, careers push, news cards, market snapshot), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "northstar_terminology_consistent"
description = "Where the app renders the corporate and portfolio identity, terminology stays consistent as Northstar Collective and the eleven fictional brand names (Trailmark, Cadence, Forgeworks, Alder & Ash, Ironcat, Solstice, Hearthstep, First Mile, Highline, Wildhorse, Foundry) without leftover source-company naming."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "market_snapshot_numbers_exact"
description = "Where the app renders Market Snapshot figures, they match exactly: primary quote 18.16 USD; DAY'S HIGH $18.60; DAY'S LOW $18.16; DAY'S VOLUME 38,982.00; LAST UPDATED 2hours ago; security name Northstar Collective, Inc. (NST); label Common Stock."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "mandated_headlines_exact"
description = "Where the app renders mandated headlines, they match exactly: Make. Every Day. Better.; A portfolio built for every step.; 2025 Annual Report; Many brands, one shared culture, limitless innovation.; Market Snapshot; Latest News; Creating Your Future With Us."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "news_card_titles_exact"
description = "Where the app renders Latest News card titles, they match exactly: Northstar Earns People-First Workplace Certification; Trailmark Celebrates 45 Years Outside; Cadence Velocity Pro Wins Best Racing Shoe; Northstar Studio Receives Four Creative Honors; Cadence Brings the Daily Runner Back; Trailmark Launches a Flow-Focused Trail Shoe; Forgeworks Steps Onto the Small Screen; and Northstar Named Company of the Year."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "footer_legal_and_copyright_exact"
description = "Where the app renders footer legal and copyright copy, the copyright line is exactly © 2026 Northstar Collective, Inc. and the legal group includes Privacy Policy, Terms & Conditions, Patents, Supply Chain Transparency, Customer Returns, and Retail Partners."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as Make. Every Day. Better., Market Snapshot, Creating Your Future With Us, or primary cookie/carousel labels."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "source_brand_names_in_copy"
description = "Rendered copy still names a source company, source brand, real ticker, or real social-platform branding instead of the fictional Northstar Collective system."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders mandated headings, news titles, market figures, or cookie copy unreadable at 1440 or 375."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.11"
name = "consent_and_briefing_labels_exact"
description = "Where the app renders consent and briefing chrome, category names Necessary / Analytics / Marketing / Functional, empty-state No stories pinned yet, palette empty-state No matching commands, and tab labels JSON / Markdown render exactly as specified."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "briefing_placeholder_copy"
description = "The Investor briefing preview, shortlist, or command palette shows lorem ipsum, TODO, or template placeholder text."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
