[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting on the homepage: dismiss the cookie banner via Accept all, advance the news carousel with Next at least once, pin one news story, and open then close the Responsibility dropdown; then reload. All facets coherently reset to the seeded baseline (banner visible again, carousel at first card, shortlist empty at 0 of 8, undo/redo empty, dropdown closed) — never a mixed partial survival of some facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "consent_path_derived_surfaces_differ"
description = "Derived-view sensitivity: on separate fresh loads, choose Accept all versus Manage preferences → change a category toggle → save; the two paths produce different intermediate visible surfaces (modal present only on the Manage path) before both end with the banner dismissed."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "carousel_position_echo_after_scroll"
description = "Cross-view echo: advance the news carousel away from the first cards, then scroll to the footer and back to Latest News without reload; the carousel remains at the same advanced track position."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "carousel_next_moves_track_once"
description = "Count-delta integrity: note the visible news-card set, click Next once, and confirm the track advances so a later card set becomes visible with a single discrete move (no no-op and no multi-page jump from one click)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "accept_vs_reject_input_dependent"
description = "Input-dependent output: on one load activate Accept all (banner dismisses, no modal); on a fresh load activate Reject all (banner dismisses, no modal); both dismiss without modal, and on a third fresh load Manage preferences opens the modal — outcomes differ by which control was used."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_carousel_and_cookie"
description = "Interleaved-flow integrity: advance the news carousel once, open Manage preferences and dismiss without saving (banner remains), advance the carousel again, then Accept all; carousel stays at the twice-advanced position and the banner is dismissed — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "carousel_end_bound_round_trip"
description = "Edge-state round-trip: advance Next until the final news card (track stays bounded with no blank overscroll), then activate Prev. repeatedly until earlier cards return; the track position and visible cards track both directions without leaving the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "pin_then_export_pipeline"
description = "Starting with an empty shortlist: pin Northstar Earns People-First Workplace Certification then Trailmark Celebrates 45 Years Outside; open the JSON briefing tab and confirm both titles appear in pin order with market quote 18.16 USD; unpin the first title and confirm the JSON pinned array drops to only the second title — mutate → derived preview tracks → export text contains session work."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "consent_undo_round_trip_briefing"
description = "Save preferences with Analytics off and Marketing on (banner dismisses, briefing consent matches); Undo restores the banner and reverts the briefing consent object; Redo re-applies the saved consent and dismisses the banner again."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "accept_reject_briefing_input_dependent"
description = "Input-dependent output: Accept all then read briefing consent (all true); on a fresh load Reject all then read briefing consent (only necessary true) — the two JSON consent objects differ by analytics, marketing, and functional."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "palette_interleaved_with_pins"
description = "Interleaved-flow integrity: pin one story, open the command palette and jump to Market Snapshot, pin a second story, then open Investor briefing; both pins remain in the shortlist and JSON preview and the page is still on the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "invalid_then_valid_consent_payload_round_trip"
description = "Edge-state round-trip: open Manage preferences, attempt Save with an invalid draft (named field errors, banner stays, briefing consent unchanged), then correct Analytics off / Marketing on and Save; banner dismisses and briefing consent shows necessary true, analytics false, marketing true without leftover error chrome blocking the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "briefing_export_import_round_trip_probe"
description = "Export then import round-trip probe: pin Northstar Earns People-First Workplace Certification and Trailmark Celebrates 45 Years Outside, Accept all, copy JSON; unpin both to 0 of 8; Import the JSON; shortlist returns to 2 of 8 with both titles, consent stays all-true with banner dismissed, and the JSON preview again lists those pinnedTitles."
type = "binary"
weight = 1.0

