[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "hero_headline_and_operable_nav"
description = "On load, once the hero intro settles the full-bleed video hero shows the headline Make. Every Day. Better. split across lines and a present, operable primary navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "portfolio_heading_and_footer_brand_grid"
description = "On load, the brand-portfolio section shows the exact heading A portfolio built for every step. over a particle/galaxy image field, and the eleven brands Trailmark, Cadence, Forgeworks, Alder & Ash, Ironcat, Solstice, Hearthstep, First Mile, Highline, Wildhorse, and Foundry are all reachable as footer brand-grid links"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "annual_report_block_with_pdf_affordance"
description = "On load, an annual-report block shows the exact heading 2025 Annual Report with lede copy Our 2025 Annual Report and offers a PDF download affordance"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "culture_statement_heading"
description = "On load, the culture statement shows the exact heading Many brands, one shared culture, limitless innovation. alongside supporting body copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "market_snapshot_full_stat_list"
description = "On load, the Market Snapshot section shows the exact heading Market Snapshot, the name Northstar Collective, Inc. (NST), the label Common Stock, the quote value 18.16 USD, and the stat list DAY'S HIGH $18.60, DAY'S LOW $18.16, DAY'S VOLUME 38,982.00, and LAST UPDATED 2hours ago"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "carousel_next_advances_without_reload"
description = "After clicking the Latest News carousel Next control, the horizontal card track advances to later news cards without leaving the homepage, and the section shows a View All affordance plus Prev./Next controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "employee_stats_paired_with_first_story"
description = "The Northstar Earns People-First Workplace Certification news card is paired with the employee-culture statistics 96% welcomed, 95% care about colleagues, and 94% proud to share where they work"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "careers_cta_heading"
description = "On load, the careers call-to-action shows the exact heading Creating Your Future With Us"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "responsibility_dropdown_opens"
description = "When the Responsibility toggler is activated on desktop, a dropdown reveals the three pillars Purpose, Planet, and Product and the toggler aria-expanded becomes true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "mobile_menu_overlay_opens"
description = "When the Menu button is clicked below 1000px, a full-screen mobile menu overlay opens and its items reveal in a staggered sequence rather than all at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "cookie_banner_on_load"
description = "On load, a cookie-consent banner appears with the heading We use cookies and the actions Accept all, Reject all, and Manage preferences"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "webmcp_browse_open_market_snapshot"
description = "When webmcp browse_open is invoked with destination market-snapshot, the page scrolls the real Market Snapshot section into view via the same scroll path the UI uses"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "careers_copy_and_outbound_cta"
description = "The careers call-to-action section shows the supporting copy No matter the role, the door is open to you at Northstar Collective to create positive change and leave a lasting impact. and a Careers CTA whose href is inert or points to a fictional .example destination"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "news_press_copy_verbatim"
description = "The Latest News carousel carries all eight fictional stories: Northstar Earns People-First Workplace Certification; Trailmark Celebrates 45 Years Outside; Cadence Velocity Pro Wins Best Racing Shoe; Northstar Studio Receives Four Creative Honors; Cadence Brings the Daily Runner Back; Trailmark Launches a Flow-Focused Trail Shoe; Forgeworks Steps Onto the Small Screen; and Northstar Named Company of the Year"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "footer_full_structure"
description = "The footer shows About Us, Brands, Careers, Responsibility, Investors, and Contact, plus a social group (Photos, People stories, Professional network), the eleven-label fictional brand grid, a legal group (Privacy Policy, Terms & Conditions, Patents, Supply Chain Transparency, Customer Returns, Retail Partners), and the copyright line © 2026 Northstar Collective, Inc."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "coherent_editorial_content"
description = "Section headings and body copy are coherent real editorial content with the mandated anchors present (Make. Every Day. Better., A portfolio built for every step., Market Snapshot) and no placeholder or lorem text"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "mandated_anchors_missing"
description = "The homepage renders only placeholder or missing section headings and fails to display the mandated anchors (Make. Every Day. Better., A portfolio built for every step., Market Snapshot)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "brand_grid_or_press_copy_filler"
description = "The brand grid omits one or more of the eleven fictional brands or the news cards show generic filler instead of the specified fictional editorial stories"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "1.28"
name = "header_nav_exact_labels_and_logo"
description = "The header shows the primary navigation with the exact labels About, Brands, Careers, Investors (marked with an external-link icon), and Responsibility as a dropdown toggler, with an original placeholder logo mark and logotype at the header start"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "hero_card_links_annual_report"
description = "The hero contains a card linking to the 2025 Annual Report, and the hero background video is muted with playsinline backed by a freeze-frame still fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "cookie_preferences_flow_probe"
description = "Scripted flow on a fresh load: the cookie banner is visible over the page; clicking Manage preferences opens the preferences modal with per-category consent controls; switching a toggle visibly updates its state; saving closes the modal AND dismisses the banner in the same pass; the banner stays dismissed while scrolling and interacting elsewhere on the page; and a subsequent reload shows the banner again in its initial state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "consent_shortcut_flow_probe"
description = "Scripted flow: clicking Accept all (or Reject all) on the cookie banner dismisses the banner without opening the modal, no consent surface reappears for the rest of the session, and the page behind remains fully scrollable and interactive afterwards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "responsibility_dropdown_flow_probe"
description = "Scripted flow: activating the Responsibility toggler flips its aria-expanded to true and reveals the panel with Purpose, Planet, and Product; pressing Escape (or activating a pillar link) hides the panel, returns aria-expanded to false, and leaves the rest of the header unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "mobile_menu_flow_probe"
description = "Scripted flow below 1000px: activating the Menu toggle opens the full-screen overlay with staggered items, keyboard focus stays contained inside the open overlay, and the page behind cannot scroll; activating Close or pressing Escape dismisses the overlay, restores page scrolling, and returns focus to the Menu toggle with the page's scroll position unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "news_carousel_flow_probe"
description = "Scripted flow: clicking Next visibly moves the news track so later cards become visible, clicking Prev. returns toward earlier cards, dragging the track with the pointer also moves it, and the carousel position holds while scrolling elsewhere on the page without leaving the homepage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "reload_baseline_flow_probe"
description = "Scripted flow: after dismissing the cookie banner, advancing the carousel, and opening/closing the mobile menu or dropdown, a page reload returns the homepage to its seeded state — scrolled to top, hero intro replaying, cookie banner visible again, and the carousel back at its first card, all facets coherently, never a mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "hero_video_freeze_frame_fallback"
description = "If the hero background video cannot play (or before it starts), a freeze-frame still fallback renders in its place at the same size and the headline remains fully legible over it"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.37"
name = "escape_noop_when_nothing_open"
description = "Pressing Escape with no menu, dropdown, or modal open changes nothing visible on the page"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.38"
name = "carousel_end_stop_no_overscroll"
description = "At the final news card, activating Next produces no broken state: the track never scrolls past its last card into blank space and the page never gains a horizontal scrollbar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "rapid_menu_toggle_stability"
description = "After rapidly toggling the mobile menu open and closed several times, exactly zero overlays remain stacked and the page scroll is not locked once the overlay is closed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "prefs_dismiss_without_save_keeps_banner"
description = "Opening the cookie preferences modal and dismissing it without saving leaves the banner visible with its Accept all, Reject all, and Manage preferences actions still operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "overlay_exclusivity"
description = "The Responsibility dropdown, mobile menu overlay, and cookie preferences modal are never open simultaneously: opening one dismisses or blocks the others"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.42"
name = "homepage_only_scope_stub_links"
description = "Activating header, footer, social, legal, and brand-grid links keeps the browser on the single homepage: each is in-page, inert, or a fictional-destination stub, and no in-page control triggers a full-page navigation to an additional built page or a real company, brand, investor, careers, or social destination"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or end-to-end flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
