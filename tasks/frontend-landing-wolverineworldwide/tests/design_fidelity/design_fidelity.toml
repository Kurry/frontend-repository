[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_token_scale"
description = "At 1440 width, section paddings, gaps, and major offsets follow the declared unit/spacing tokens (--unit-sm 12px, --unit-md 20px, --unit-lg 48px, fluid --spacing-fluid-*) rather than arbitrary odd-pixel one-offs visible in computed styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_reference_metrics"
description = "At 1440px reference width typography matches the spec: hero Make. Every Day. Better. at 168px / weight 700 / line-height 132.72px / letter-spacing -8.4px / white; portfolio and careers headings at 128px / weight 700; Market Snapshot value 18.16 at 128px / weight 700; section headings Market Snapshot and Many brands… at 33px / weight 700; header nav links at 15px / weight 400 / letter-spacing -0.3px; news titles at 19px; market meta labels in mono at 11px uppercase."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "block_fidelity_sticky_header"
description = "Block: sticky header — sticky top bar with the Northstar Collective wordmark plus compact monogram at the start and right-aligned nav links About, Brands, Careers, Responsibility (chevron), Investors (external-link icon), morphing to a dark compact bar on scroll (reference: segment-01.png, persists across segments). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.13"
name = "block_fidelity_video_hero"
description = "Block: video hero — full-viewport muted brand-montage video with the huge white three-line headline Make. Every Day. Better. and a lower-right latest-news annual-report card with sunrise trail-runner thumbnail (reference: segment-01.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
