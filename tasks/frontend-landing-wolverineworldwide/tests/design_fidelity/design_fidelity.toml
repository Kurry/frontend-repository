[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_token_scale"
description = "At 1440 width, section paddings, gaps, and major offsets follow the declared unit/spacing tokens (--unit-sm 12px, --unit-md 20px, --unit-lg 48px, fluid --spacing-fluid-*) rather than arbitrary odd-pixel one-offs visible in computed styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_reference_metrics"
description = "At 1440px reference width typography matches the spec: hero Make. Every Day. Better. at 168px / weight 700 / line-height 132.72px / letter-spacing -8.4px / white; portfolio and careers headings at 128px / weight 700; Market Snapshot value 18.16 at 128px / weight 700; section headings Market Snapshot and Many brands… at 33px / weight 700; header nav links at 15px / weight 400 / letter-spacing -0.3px; news titles at 19px; market meta labels in mono at 11px uppercase."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_pixel_match_reference_screenshots"
description = "At 1440 desktop width, composition matches /reference-screenshots/ overview and segment panels to near pixel-parity for sticky header, full-bleed hero, portfolio particle field, market snapshot, news carousel, careers push, and dark footer density/proportions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: hero intro timeline, scroll reveals, particle/galaxy parallax, header scroll morph, mobile-menu stagger, and cookie modal 0.25s transition — verified via the real UI/scroll path on a fresh load where required."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns at the 1000px product breakpoint (desktop nav + Responsibility dropdown vs Menu overlay), with load-bearing thresholds at 700px and 1400px for grid/header adjustments."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_match_token_styling"
description = "Buttons, cookie modal, and chrome controls use the token system (including translucent button wash #0000001a and --radius-* ) rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes immense display headlines (hero/portfolio/careers) from section headings and body copy across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover/focus states match the reference where specified: buttons take --color-gray-200 hover/focus wash with ~25px icon shift; header nav underline on hover/expanded; cards show focus-visible title underline and image outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_exact"
description = "Color treatments match exactly: body background rgb(255,255,255); body text rgb(1,1,1); --color-gray-200 #ccc; footer surface rgb(1,1,1) with rgb(255,255,255) text; hero white type over full-bleed imagery; cookie overlay rgba(0,0,0,0.65); no saturated accent on chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions and cookie-consent modal transitions follow the reference language with the specified durations (cookie modal ~0.25s; header morph inner transition 0.4s) verified via the real UI path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_token_scale"
description = "Visible major section gaps use arbitrary odd-pixel spacing that contradicts the declared --unit-* / fluid spacing token scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_monochrome_palette"
description = "Surfaces or chrome use saturated accent colors outside the monochrome editorial system (white/black/gray-200) — e.g. arbitrary purple/blue theme wash on chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440px the hero display, portfolio/careers 128px headings, or Market Snapshot 18.16 value are grossly mismatched versus the specified metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no hero intro on fresh load, no particle parallax in the portfolio region, or no header scroll morph after scrolling past the top."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary CTAs, cookie modal, or carousel controls use unstyled browser default appearance when the reference uses token-styled controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_screenshots"
description = "At 1440 the header/hero/portfolio/news/footer composition is grossly misaligned versus /reference-screenshots/ segment panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (hero card, portfolio field, market snapshot, news carousel, dark footer) render off-screen or clipped at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated homepage order (sticky header → hero → portfolio → annual report → culture → market snapshot → latest news → careers → footer) or omits a required section."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/weight throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or cookie-modal transitions are missing or clearly deviate from the reference (instant snaps, no nav underline, no button wash)."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.11"
name = "additive_chrome_preserves_reference_composition"
description = "Investor briefing, shortlist, and command-palette chrome can open without permanently destroying the reference homepage composition (sticky header, hero, portfolio, news, footer remain recognizable at 1440 when overlays are closed)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "new_chrome_breaks_reference_section_order"
description = "Adding briefing/palette chrome permanently removes or reorders reference sections (hero, portfolio, market snapshot, news, careers, footer) relative to /reference-screenshots/ when overlays are closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
