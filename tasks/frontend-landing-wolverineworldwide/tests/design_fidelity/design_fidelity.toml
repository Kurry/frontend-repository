[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: hero intro timeline, scroll reveals, particle/galaxy parallax, header scroll morph, mobile-menu stagger, and cookie modal 0.25s transition — verified via the real UI/scroll path on a fresh load where required."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns at the 1000px product breakpoint (desktop nav + Responsibility dropdown vs Menu overlay), with load-bearing thresholds at 700px and 1400px for grid/header adjustments."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_match_token_styling"
description = "Buttons, cookie modal, and chrome controls use the token system (including translucent button wash #0000001a and --radius-* ) rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes immense display headlines (hero/portfolio/careers) from section headings and body copy across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover/focus states match the reference where specified: buttons take --color-gray-200 hover/focus wash with ~25px icon shift; header nav underline on hover/expanded; cards show focus-visible title underline and image outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_exact"
description = "Color treatments match exactly: body background rgb(255,255,255); body text rgb(1,1,1); --color-gray-200 #ccc; footer surface rgb(1,1,1) with rgb(255,255,255) text; hero white type over full-bleed imagery; cookie overlay rgba(0,0,0,0.65); no saturated accent on chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions and cookie-consent modal transitions follow the reference language with the specified durations (cookie modal ~0.25s; header morph inner transition 0.4s) verified via the real UI path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "additive_chrome_preserves_reference_composition"
description = "Investor briefing, shortlist, and command-palette chrome can open without permanently destroying the reference homepage composition (sticky header, hero, portfolio, news, footer remain recognizable at 1440 when overlays are closed)."
type = "binary"
weight = 1.0

