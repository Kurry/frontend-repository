[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "all_requests_same_origin"
description = "Every network request the page makes is same-origin with the candidate on port 3000 (or a data:/about: URL) with no external font, image, video, CSS, or JavaScript CDN request"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "console_and_hydration_clean"
description = "The page loads with no uncaught JavaScript console errors, no hydration mismatch errors or warnings, and no failed asset request (no 4xx/5xx or net::ERR) on load or during a full scroll-through, menu, dropdown, carousel, and cookie-consent exercise"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "semantic_landmarks_and_keyboard_reach"
description = "The document uses appropriate header, nav, main, footer, heading, link, and button semantics, and every interactive control (nav links, the Responsibility toggler, the Menu toggle, carousel controls, cookie banner actions, footer links) is reachable and operable with the keyboard alone with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "seo_meta_and_local_share_image"
description = "The homepage exposes a title, meta description, canonical link, and OpenGraph/Twitter tags referencing a local share image"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "storage_stays_empty"
description = "After interacting with the page (dismissing the cookie banner, opening the menu, advancing the carousel), localStorage and sessionStorage remain empty and no cookies are set"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "overlay_focus_containment_and_return"
description = "While the mobile menu overlay or the cookie preferences modal is open, keyboard focus is contained inside it, and closing it returns focus to the control that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "investors_link_marked_external"
description = "The Investors nav link is marked as external both visually (an external-link icon) and accessibly (its accessible name or attributes convey that it opens an external site)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "split_headlines_accessible_phrase"
description = "Split hero and section headlines keep the original full phrase accessible on the heading container (e.g. an aria-label) while the per-line or per-character spans are hidden from the accessibility tree"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.11"
name = "media_accessible_labels_and_alt"
description = "The hero video is muted with playsinline and carries an accessible label, and placeholder imagery and brand marks carry descriptive alt text or accessible labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "wcag_aa_contrast_over_media"
description = "Text over imagery and all control labels meet WCAG AA contrast, including the white hero type over the video and footer text on the dark slab"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "interactive_2s_and_stable_layout"
description = "The page is interactive within 2 seconds of a local cold load, navigation and copy respond while the hero video is still loading, and no visible layout shift occurs as fonts, images, or the hero video finish loading — media regions reserve their space from first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "homepage_cold_load_complete"
description = "Loading the single-page homepage directly at its root URL renders the complete homepage (header, hero, sections, footer) with no flash of unstyled or unhydrated content"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.15"
name = "smooth_full_page_scroll_framerate"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through the header morph, scroll reveals, and the continuous particle parallax, with no sustained hitching"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.17"
name = "required_authored_asset_files_load"
description = "Browser network/render evidence shows the Northstar mark, eleven portfolio marks, VP9 WebM hero and still, particle images, annual-report cover and valid local PDF, eight news images, careers art, share image, and icon sprite loading from same-origin paths with no 404, decode, playback, or PDF failure"
type = "binary"
weight = 1.0


[[criterion]]
id = "4.18"
name = "reload_resets_pins_consent_undo"
description = "After pinning stories, saving or accepting consent, and using undo/redo, a reload returns the seeded baseline: cookie banner visible, shortlist empty, briefing without pins, empty undo/redo stacks — coherent in-memory reset, never mixed persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.19"
name = "briefing_compiled_from_live_client_state"
description = "Pinning a story then reading the JSON briefing preview shows that title without reload, proving the export compiles from live client state rather than a static hardcoded document."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.20"
name = "consent_form_validates_four_boolean_keys"
description = "The cookie preferences form enforces the Consent preferences request-body field contract (required booleans necessary, analytics, marketing, functional with necessary constrained to true): invalid drafts show named field errors before commit, and a valid Save writes that exact payload into session/briefing state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.21"
name = "briefing_export_import_share_schema"
description = "Investor briefing JSON export and Import validate through the same client-side field contract (schemaVersion 1, company, quote, brands, pinnedTitles, consent, generatedAt): invalid Import shows a named import error before commit, and a valid Import restores pins and consent into the same store the JSON preview reads."
type = "binary"
weight = 1.0

