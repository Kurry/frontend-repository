[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_interactive_under_2s"
description = "The page is interactive within 2 seconds of a local cold load; navigation and copy respond while the hero video is still loading."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load_and_exercise"
description = "No console errors, warnings, or hydration errors appear on load or during a full scroll-through, menu, dropdown, carousel, and cookie-consent exercise."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "chrome_interactions_stay_snappy"
description = "Header nav, Menu/Responsibility toggles, and cookie banner actions respond without multi-second lag after first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "hero_region_holds_space_while_loading"
description = "While the hero video is still loading, the video region holds its space without shifting the layout and the page remains interactive."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "long_page_scroll_without_lag"
description = "Scrolling the full homepage (hero through footer) remains usable without perceived multi-second freezes between sections."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_overlays_and_carousel"
description = "The UI remains interactive during mobile-menu open/close, Responsibility dropdown use, cookie consent actions, and news carousel paging."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "scroll_reveals_and_particles_hold_frame_rate"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through the header morph, scroll reveals, and the continuous particle/galaxy parallax."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_menu_and_carousel_never_freeze"
description = "Rapidly toggling the mobile menu or rapidly clicking carousel Next/Prev never freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_scroll_session_stable"
description = "After an extended scroll-through with menu, dropdown, carousel, and cookie interactions, the page remains responsive without runaway resource use that freezes interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "direct_root_load_complete_homepage"
description = "Loading the homepage directly at its root URL renders the complete single-page homepage with no flash of unstyled or unhydrated content."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a1"
name = "scroll_linked_particle_frame_rate"
description = "Scroll-linked particle/galaxy parallax and section reveals hold a smooth frame rate through the full page length on a 1440-wide viewport with no visible hitching during continuous scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a4"
name = "layout_stable_as_media_loads"
description = "Layout is stable after load: no visible reflow jumps as fonts, images, or the hero video finish loading — media regions reserve their space from first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a6"
name = "interactive_before_heavy_media_finish"
description = "The page becomes interactive before the hero WebM and dense portfolio/news imagery finish loading; media regions hold reserved space while streaming in and do not block chrome interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "palette_pin_briefing_stay_responsive"
description = "Opening the command palette, pinning several news cards, regenerating the briefing preview, and Importing a valid briefing JSON never freezes scrolling or leaves the page unresponsive for multi-second stalls."
type = "binary"
weight = 1.0

