[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "all_four_modules_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools with browse, entity, form, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed tool handlers drive the same visible UI logic as on-page controls for section destinations, news-pin toggles, cookie consent form submit/cancel, and briefing export/copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations"
description = "Only documented operations for the four modules are available — no undeclared routes, arbitrary URL/selector tools, or extra modules beyond Bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open, entity toggle/create on news-pin, form submit on consent fields, and artifact import/export/copy for json and markdown (import modes paste/file)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_include_briefing_palette"
description = "Browse open works for declared destinations including investor-briefing and command-palette as well as hero; brand-portfolio; annual-report; culture-statement; market-snapshot; latest-news; culture-stats; awards; careers-cta; mobile-menu; responsibility-dropdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_news_pin_matches_ui"
description = "Entity operations on news-pin (create/select/delete/toggle with fields title and pinned) update the same shortlist and pinned-card UI as the Pin to briefing controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "form_consent_fields_match_bindings"
description = "Form fields necessary, analytics, marketing, and functional with operations validate/submit/cancel/reset match the cookie preferences modal and apply the same visible consent state as Manage preferences → Save; validate/submit reject invalid drafts (necessary false or incomplete booleans) with the same named field errors as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_import_export_formats_json_markdown"
description = "Artifact operations import, export, and copy are bound (import modes paste/file; export formats json and markdown) and trigger the same Investor briefing Import/download/copy paths as the visible controls (without returning raw file bytes in tool results; file picker and clipboard remain Playwright-observed)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list for all four modules, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Browse, entity, form, or artifact MCP tooling is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A tool invocation for browse open, news-pin toggle, consent form submit, or artifact import/export updates MCP-reported state without matching the visible UI (or the reverse)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_destinations_or_ops_exposed"
description = "Undeclared destinations, entity fields, form fields, export formats, import modes, or operations outside the Bindings/permitted_operations lists are exposed via webmcp_list_tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise browse open, entity news-pin, form consent submit, or artifact import/export against the declared bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "entity_pin_desyncs_shortlist"
description = "Invoking entity toggle/create for news-pin leaves MCP and the visible shortlist/pin marks inconsistent with a manual Pin to briefing activation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "form_submit_desyncs_consent_briefing"
description = "Invoking form submit for consent fields leaves the cookie banner/modal or briefing consent object inconsistent with saving preferences in the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "artifact_export_bypasses_ui_preview"
description = "Artifact import/export/copy reports success while the visible Investor briefing preview still shows stale pins or consent values that disagree with the session (or only works via undocumented harness stubs)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_missing"
description = "One or more of browse-query-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed so list/invoke cannot reach real handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "destination_or_export_bindings_incomplete"
description = "One or more declared destinations (including investor-briefing and command-palette), news-pin entity bindings, consent form fields, import modes paste/file, or json/markdown export formats are missing from the bound surface."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
