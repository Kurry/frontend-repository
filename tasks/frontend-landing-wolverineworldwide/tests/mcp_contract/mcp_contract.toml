[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "all_four_modules_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools with browse, entity, form, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed tool handlers drive the same visible UI logic as on-page controls for section destinations, news-pin toggles, cookie consent form submit/cancel, and briefing export/copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations"
description = "Only documented operations for the four modules are available — no undeclared routes, arbitrary URL/selector tools, or extra modules beyond Bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open, entity toggle/create on news-pin, form submit on consent fields, and artifact import/export/copy for json and markdown (import modes paste/file)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_include_briefing_palette"
description = "Browse open works for declared destinations including investor-briefing and command-palette as well as hero; brand-portfolio; annual-report; culture-statement; market-snapshot; latest-news; culture-stats; awards; careers-cta; mobile-menu; responsibility-dropdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_news_pin_matches_ui"
description = "Entity operations on news-pin (create/select/delete/toggle with fields title and pinned) update the same shortlist and pinned-card UI as the Pin to briefing controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "form_consent_fields_match_bindings"
description = "Form fields necessary, analytics, marketing, and functional with operations validate/submit/cancel/reset match the cookie preferences modal and apply the same visible consent state as Manage preferences → Save; validate/submit reject invalid drafts (necessary false or incomplete booleans) with the same named field errors as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_import_export_formats_json_markdown"
description = "Artifact operations import, export, and copy are bound (import modes paste/file; export formats json and markdown) and trigger the same Investor briefing Import/download/copy paths as the visible controls (without returning raw file bytes in tool results; file picker and clipboard remain Playwright-observed)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list for all four modules, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

