[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "hero_intro_two_frame_delta"
description = "On a fresh load the hero intro runs, provable by two samples: an early sample within roughly 800ms shows the hero title below its settled opacity (and the hero video above its settled scale, about 1.08), and a later settled sample shows the title at opacity 1 and the video at scale 1 — the early-versus-settled delta proves the intro animated rather than appearing pre-composed"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "header_scroll_morph"
description = "When the page is scrolled down from the top via the real scroll gesture, the header morphs over roughly 0.4s: the large wordmark/logotype fades from opacity 1 to 0, a dark header background fades in (opacity 0 to 1) over a rgba(0,0,0,0.8) bar, and the dropdown height contracts from 300px to 200px, reversing when scrolled back to top"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "signature_particle_scroll_storytelling"
description = "Signature interaction on a fresh load: scrolling through the brand-portfolio region keeps the particle/galaxy field in continuous requestAnimationFrame parallax motion tied to scroll position (translate3d/scale updating) rather than static tiles, while the section's split heading reveal participates in the same scroll narrative"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "scroll_reveals_with_stagger"
description = "On a fresh load, under native document scrolling, scrolling the page into each section triggers reveal animations (fade / rise / rise-and-scale / split-text) as elements enter the viewport, with staggered groups offsetting each child by roughly 0.1s times its index, while the sticky header remains pinned"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "carousel_next_moves_real_track"
description = "Clicking the Latest News carousel Next control moves the real horizontal track to later cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "mobile_menu_index_stagger_delays"
description = "Opening the mobile menu below 1000px reveals its items in an index-keyed stagger: the items carry ascending per-item computed transition-delay values stepping 0s, 0.06s, 0.12s, 0.18s, 0.24s across the items with a transition duration around 0.6s, so they do not all reveal simultaneously"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "responsibility_dropdown_reveal"
description = "Activating the Responsibility toggler on desktop opens the dropdown revealing Purpose, Planet, and Product, and the toggler aria-expanded flips to true (the panel is hidden again on dismiss or Escape)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "hover_focus_microinteractions"
description = "Hovering a header nav link animates its underline overlay from computed opacity 0 to 1, hovering a primary button applies its hover background (the light gray token family) with an icon shift of about 25px, and keyboard focus shows a visible focus indicator (cards show a focus-visible title underline) — hover evidence measured via computed style while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "portfolio_heading_split_line_reveal"
description = "The portfolio heading A portfolio built for every step. is split into three line spans that reveal as the standout-image-galaxy section enters view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.11"
name = "hero_static_or_header_no_morph"
description = "On a fresh load an early sample and a settled sample of the hero are identical (the hero renders at its final state instantly with no intro), or the header stays unchanged when scrolled (after a real scroll gesture the wordmark stays at opacity 1 and the dropdown height stays 300px)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.12"
name = "no_stagger_static_particles_or_no_hover"
description = "The mobile menu items carry no per-item stagger (their computed transition-delay values are all 0s or identical), or the particle field is static, or interactive controls give zero hover or focus feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.13"
name = "scroll_reveals_presettled"
description = "On a fresh load, scroll-reveal elements below the fold already sit at their final on-screen state (opacity 1 and final transform) before ever being scrolled into view"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.14"
name = "reduced_motion_disables_transforms"
description = "With prefers-reduced-motion: reduce emulated on a fresh load, the hero and sections render directly in their settled state with no transform-in animations or stagger, and the particle field's parallax motion is disabled, while the page stays complete and navigable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "carousel_pointer_drag_with_drag_state"
description = "Dragging the news track with the pointer moves the track (a visible dragging state appears during the drag) and the track settles to a snapped position on release"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.16"
name = "cookie_modal_animated_transition"
description = "The cookie preferences modal transitions in and out over roughly 0.25s rather than snapping instantly between hidden and shown"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.17"
name = "inertial_easing_on_signature_motion"
description = "The hero intro, scroll reveals, header morph, and mobile-menu stagger settle with inertial non-linear easing (expo-out / power2-out / sine-out class curves such as cubic-bezier(0.19, 1, 0.22, 1) or cubic-bezier(0.215, 0.61, 0.355, 1)) rather than constant-speed linear tweens — verified on the real UI control path / fresh load"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "linear_mechanical_signature_motion"
description = "The hero intro, header morph, or menu stagger uses purely linear constant-speed tweens that start and stop mechanically with no inertial settling"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.19"
name = "lazy_media_settles_on_view"
description = "On a fresh load, the inline hero video plays once in view (muted, playsinline) and lazy images below the fold start visually suppressed and settle to opacity 1 / scale 1 as they load and enter the viewport under native scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
