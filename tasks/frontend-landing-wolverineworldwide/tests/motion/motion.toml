[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "On a fresh load the hero intro runs, provable by two samples: an early sample within roughly 800ms shows the hero title below its settled opacity (and the hero video above its settled scale, about 1.08), and a later settled sample shows the title at opacity 1 and the video at scale 1 — the early-versus-settled delta proves the intro animated rather than appearing pre-composed"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "When the page is scrolled down from the top via the real scroll gesture, the header morphs over roughly 0.4s: the large wordmark/logotype fades from opacity 1 to 0, a dark header background fades in (opacity 0 to 1), and the dropdown height contracts from 300px to 200px, reversing when scrolled back to top"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The particle/galaxy field is in continuous requestAnimationFrame parallax motion tied to scroll position rather than static"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Scrolling the page into each section triggers reveal animations (fade / rise / scale) as elements enter the viewport, with staggered groups offsetting each child"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Clicking the Latest News carousel Next control moves the real horizontal track to later cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "Opening the mobile menu below 1000px reveals its items in an index-keyed stagger: the items carry ascending per-item computed transition-delay values stepping 0s, 0.06s, 0.12s, 0.18s, 0.24s across the items with a transition duration around 0.6s, so they do not all reveal simultaneously"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "3_7"
description = "Activating the Responsibility toggler on desktop opens the dropdown revealing Purpose, Planet, and Product, and the toggler aria-expanded flips to true (the panel is hidden again on dismiss or Escape)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "3_8"
description = "Hovering a header nav link raises its ::before overlay pseudo-element from computed opacity 0 to 1, and hovering a primary button applies its hover background (--color-gray-200 family on .c-button-class elements); keyboard focus shows a visible focus outline — hover evidence lives on the pseudo-element, not the link's own background"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "3_9"
description = "The portfolio heading A portfolio built for every step. is split into three line spans that reveal as the standout-image-galaxy section enters view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "3_10"
description = "Two-frame check on a fresh load: an early sample taken within roughly 800ms shows the hero content (title opacity and video transform) at non-final values while a settled sample shows them at their final on-screen values, and the two samples differ — confirming the hero animated from a hidden/transformed state rather than rendering settled instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "3_11"
description = "On a fresh load an early sample and a settled sample of the hero are identical (the hero renders at its final state instantly with no intro), or the header does not morph when scrolled (after a real scroll gesture the wordmark stays at opacity 1 and the dropdown height stays 300px)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.12"
name = "3_12"
description = "The mobile menu items carry no per-item stagger (their computed transition-delay values are all 0s or identical), or the particle field is static, or interactive controls have no hover or focus feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.13"
name = "3_13"
description = "On a fresh load an early and a settled sample of the hero are identical (no intro ran), or scroll-reveal elements already sit at their final on-screen state (opacity 1 and final transform) before being scrolled into view"
type = "binary"
weight = 0.5
negate = true
optional = true
