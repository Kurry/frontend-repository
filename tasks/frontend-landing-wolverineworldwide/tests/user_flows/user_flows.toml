[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "cookie_manage_preferences_save_dismisses"
description = "On a fresh load the cookie banner with heading We use cookies is visible; activating Manage preferences opens the preferences modal with Necessary, Analytics, Marketing, and Functional toggles; saving a valid four-key boolean payload closes the modal and dismisses the banner in the same pass."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "cookie_accept_or_reject_dismisses_without_modal"
description = "Activating Accept all or Reject all on the cookie banner dismisses the banner without opening the preferences modal, and no consent surface reappears while scrolling or interacting during the session."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "responsibility_dropdown_open_close_aria"
description = "Hovering or activating the Responsibility toggler flips aria-expanded to true and reveals the panel with Purpose, Planet, and Product; activating a pillar link or pressing Escape hides the panel, returns aria-expanded to false, and leaves the rest of the header unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "mobile_menu_open_locks_scroll_staggers"
description = "Below 1000px, activating the Menu toggle opens the full-screen overlay with menu items revealing in a staggered sequence, keyboard focus is contained inside the open overlay, and the page behind does not scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "mobile_menu_close_restores_focus_and_scroll"
description = "Below 1000px, with the mobile menu open: activating Close or pressing Escape dismisses the overlay, restores background scrolling, returns focus to the Menu toggle, and leaves the page's scroll position unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "news_carousel_next_prev_advances_track"
description = "In Latest News, activating Next advances the horizontal track so later cards become visible and the track position visibly moves; activating Prev. returns toward earlier cards without leaving the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "news_carousel_drag_and_holds_while_scrolling"
description = "Dragging the news carousel track with the pointer moves it (a visible dragging state during drag); after advancing away from the first cards, scrolling elsewhere on the page and returning leaves the carousel at the same client position."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "reload_returns_seeded_homepage_baseline"
description = "After dismissing the cookie banner, advancing the news carousel, and opening then closing the Responsibility dropdown or mobile menu: a page reload returns the homepage to its seeded baseline — scrolled to top, cookie banner visible again, carousel back at its first card."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "cookie_banner_stays_dismissed_in_session"
description = "After Accept all, Reject all, or saving preferences, the cookie banner stays dismissed while scrolling and interacting anywhere on the page for the rest of the session (until reload)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "consent_category_toggles_update_before_save"
description = "In the open preferences modal, switching per-category consent toggles updates their visible states immediately; saving then closes the modal and dismisses the banner together."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "briefing_shortlist_export_flow"
description = "Pin two distinct news cards; the shortlist count becomes 2 of 8 and both titles appear in order in the JSON and Markdown previews; Download briefing on the JSON tab yields text containing both titles plus 18.16 USD; unpinning the first story returns the count to 1 of 8 and removes that title from both previews without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "consent_into_briefing_undo_flow"
description = "On a fresh load open Manage preferences, turn Analytics off and Marketing on, save; the banner dismisses and the briefing consent object shows necessary true, analytics false, marketing true; Undo restores the banner to visible and returns the briefing consent object to the pre-save values."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "command_palette_jump_flow"
description = "Press Ctrl+K (or Cmd+K), type Market, press Enter on Market Snapshot; the page scrolls Market Snapshot into view with the palette closed; reopen the palette, choose Open cookie preferences, and the preferences modal (or manage path) opens."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "accept_vs_reject_export_divergence_flow"
description = "On one load Accept all then open the JSON briefing preview and note consent all-true; on a fresh load Reject all then open the JSON preview and confirm only necessary is true with analytics, marketing, and functional false."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "reload_clears_pins_and_undo_stacks"
description = "After pinning stories, dismissing cookies, and using undo: a reload returns shortlist empty at 0 of 8, briefing with no pinned titles, cookie banner visible, and empty undo/redo stacks."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "consent_invalid_save_validation_flow"
description = "On a fresh load open Manage preferences, force an invalid draft (necessary false or a missing boolean category), activate Save preferences; the modal stays open with named field errors, the banner remains visible, and the briefing consent object is unchanged; correcting to a valid draft and saving then dismisses the banner and writes the four-key payload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "briefing_export_import_round_trip_flow"
description = "Pin two distinct news cards and Accept all; copy or note the JSON briefing; unpin both to 0 of 8; Import that JSON; shortlist returns to 2 of 8 with both titles pinned in order, banner stays dismissed with consent all true, and the JSON preview again shows those pinnedTitles and consent values."
type = "binary"
weight = 1.0

