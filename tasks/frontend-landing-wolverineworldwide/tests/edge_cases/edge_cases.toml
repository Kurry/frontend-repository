[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hero_video_fallback_keeps_headline_legible"
description = "If the hero background video cannot play, the matching freeze-frame still fallback renders at the same full-bleed size and the headline Make. Every Day. Better. remains fully legible over it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "escape_noop_when_no_overlay_open"
description = "With no mobile menu, Responsibility dropdown, or preferences modal open, pressing Escape changes nothing visible on the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "news_carousel_final_next_stays_bounded"
description = "At the final news card, activating Next produces no broken state: the track never scrolls past its last card into blank space and the page never gains a horizontal scrollbar."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "rapid_mobile_menu_toggle_no_stack_or_lock"
description = "Below 1000px, rapidly toggling the mobile menu open and closed never stacks multiple overlays and never leaves the page scroll-locked after the overlay is closed."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "preferences_dismiss_without_save_keeps_banner"
description = "Opening the cookie preferences modal and dismissing it without saving leaves the We use cookies banner visible with Accept all, Reject all, and Manage preferences still operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "overlays_mutually_exclusive"
description = "The Responsibility dropdown, mobile menu overlay, and cookie preferences modal are never open simultaneously; opening one dismisses or blocks the others."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "consent_save_gives_visible_confirmation"
description = "Saving cookie preferences visibly closes the modal and removes the banner in the same pass (clear confirmation that the action applied)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "interactive_chrome_uses_semantic_controls"
description = "Header nav, Menu/Responsibility toggles, carousel Prev./Next, and cookie banner actions use semantic buttons or links rather than unlabeled non-interactive shells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "preferences_modal_and_menu_keyboard_dismissible"
description = "The open cookie preferences modal and the open mobile menu overlay can each be dismissed via Escape (and their Close control where present), restoring the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "consent_toggles_show_immediate_state"
description = "In the preferences modal, switching a per-category consent control updates that control's visible on/off state immediately before save."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "hero_fallback_missing_or_illegible"
description = "When the hero video cannot play, no freeze-frame still appears at hero size, or the Make. Every Day. Better. headline becomes illegible over the media."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "escape_mutates_page_with_nothing_open"
description = "With no menu, dropdown, or modal open, pressing Escape changes visible page state (scroll jump, chrome hide, or unintended overlay)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "carousel_next_past_end_breaks_layout"
description = "At the final news card, activating Next scrolls into blank track space or introduces a horizontal page scrollbar."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "mobile_menu_leaves_scroll_locked"
description = "After closing the mobile menu (especially after rapid open/close), the page remains scroll-locked or multiple overlays remain stacked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "dismiss_preferences_hides_banner_without_save"
description = "Dismissing the preferences modal without saving also dismisses the cookie banner or disables Accept all / Reject all / Manage preferences."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "multiple_overlays_open_together"
description = "The Responsibility dropdown, mobile menu, and/or preferences modal are visible open at the same time."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "overlay_not_keyboard_dismissible"
description = "An open mobile menu or preferences modal cannot be dismissed via Escape or a focusable Close control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "primary_action_labels_ambiguous_or_missing"
description = "Cookie banner actions, Menu/Close, or carousel Prev./Next controls lack readable labels or use blank/ambiguous text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "consent_toggle_gives_no_visible_state"
description = "Switching a preferences-modal consent category produces no visible change to that control's state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "cookie_actions_silently_fail"
description = "Accept all, Reject all, or Manage preferences produce no visible banner/modal change after activation."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "4.11"
name = "palette_mutually_exclusive_with_overlays"
description = "The Responsibility dropdown, mobile menu, preferences modal, and command palette are never open simultaneously; opening one dismisses or blocks the others."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "double_pin_does_not_duplicate"
description = "Pinning the same news card twice in a row does not duplicate its title in the shortlist or increment the count past a single pin for that card."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "empty_undo_redo_disabled_noop"
description = "Undo with an empty undo stack and Redo with an empty redo stack are disabled; activating the disabled controls does nothing and produces no console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "empty_shortlist_export_still_valid"
description = "Downloading or copying the briefing while zero stories are pinned still produces a valid artifact that satisfies the Investor briefing JSON field contract with pinnedTitles as an empty array (or the Markdown empty-state line), schemaVersion 1, all eleven brands, market quote fields, and the current consent object."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "necessary_consent_locked_on"
description = "Necessary consent cannot be turned off in the preferences modal; attempting to toggle it leaves it on, and any save attempt with necessary false is rejected with a named necessary field error while a normal save still succeeds with necessary true."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "palette_stacks_with_other_overlays"
description = "The command palette is visible open at the same time as the mobile menu, Responsibility dropdown, or preferences modal."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "necessary_toggle_turns_off"
description = "The Necessary consent category can be turned off and saved as false in the preferences modal."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.16"
name = "dismiss_without_save_does_not_write_payload"
description = "Opening the preferences modal and dismissing it without saving leaves the banner visible with its actions still operable and does not write a consent payload into the Investor briefing consent object."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n13"
name = "dismiss_without_save_mutates_consent"
description = "Dismissing the preferences modal without saving still writes a consent payload or dismisses the cookie banner."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.17"
name = "malformed_briefing_import_keeps_state"
description = "Importing malformed or undecodable briefing JSON, or JSON that violates the field contract (wrong schemaVersion, missing quote or brands, unknown pinnedTitles entry, consent with necessary false or a missing boolean key, generatedAt not ending in Z), shows a visible error naming the import problem, leaves shortlist and consent unchanged, and produces no console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n14"
name = "malformed_briefing_import_corrupts_state"
description = "Importing schema-invalid briefing JSON mutates the shortlist or consent state without a visible named import error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
