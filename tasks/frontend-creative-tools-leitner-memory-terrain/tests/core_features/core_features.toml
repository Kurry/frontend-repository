[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "cf_01"
name = "fixture_load"
type = "must have"
weight = 1.0
negate = false
description = "First load populates a starter deck of exactly 30 fictional cards across six topics with a fixed local date 2026-03-10 distributed across five Leitner boxes."

[[criterion]]
id = "cf_02"
name = "spatial_tabletop"
type = "must have"
weight = 1.0
negate = false
description = "Cards can be freely dragged on a bounded tabletop and multi-selected by lasso."

[[criterion]]
id = "cf_03"
name = "group_regions"
type = "must have"
weight = 1.0
negate = false
description = "Drawing a named group region assigns a tag to contained card centers."

[[criterion]]
id = "cf_04"
name = "memory_terrain_box"
type = "must have"
weight = 1.0
negate = false
description = "Dragging a non-session card between boxes creates a manual adjustment requiring a reason, and recomputes the due date."

[[criterion]]
id = "cf_05"
name = "review_session"
type = "must have"
weight = 1.0
negate = false
description = "Starting a review freezes an ordered queue: overdue first, then due, then new."

[[criterion]]
id = "cf_06"
name = "review_rating"
type = "must have"
weight = 1.0
negate = false
description = "Ratings apply exact transitions: again to box 1 today+1, hard to max 1 box-1, good to min 5 box+1, easy to min 5 box+2."

[[criterion]]
id = "cf_07"
name = "session_undo"
type = "must have"
weight = 1.0
negate = false
description = "Undo of the latest rating restores the card and queue position."

[[criterion]]
id = "cf_08"
name = "export_artifact"
type = "must have"
weight = 1.0
negate = false
description = "Exporting produces an interoperable artifact with complete review history, tags, and box states."
