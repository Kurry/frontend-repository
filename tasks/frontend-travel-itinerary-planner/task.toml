schema_version = "1.3"

[task]
name = "local/frontend-travel-itinerary-planner"
description = "French Riviera trip itinerary planner variant."
keywords = ["frontend", "good-app", "playwright", "rewardkit", "webmcp"]

[metadata]
difficulty = "hard"
category = "frontend"
tags = ["frontend", "good-app", "webmcp", "rewardkit"]
source_folder = "variants/TravelItineraryPlanner"

[agent]
timeout_sec = 3600.0

[verifier]
timeout_sec = 14400.0

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
CLAUDE_CODE_OAUTH_TOKEN = "${CLAUDE_CODE_OAUTH_TOKEN}"

[environment]
workdir = "/app"
build_timeout_sec = 1200.0
memory_mb = 8192
cpus = 4

[[artifacts]]
source = "/app"
destination = "app"
exclude = [
    "node_modules",
    ".cache",
    "dist",
    "build",
    "out",
    ".DS_Store",
    ".git",
]
