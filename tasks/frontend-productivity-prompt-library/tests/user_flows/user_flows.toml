[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_prompt_updates_table_and_count"
description = "Create flow: submitting New Prompt with valid title, body, and technique closes the modal, inserts exactly one library row, increases the toolbar count by one, and searching the new title narrows the table to that row — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_prompt_create_inline_validation"
description = "Create flow: submitting with an empty title (or other field-contract violation) shows immediate inline validation naming the title/body/technique field, keeps Submit disabled until valid, and adds no row."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_with_history_updates_row"
description = "Edit flow: saving an edit updates the row in place and increments its version; View History shows the new version at the top with timestamp and diff summary; clicking an older version restores its content into the edit form."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_prompt_updates_count"
description = "Delete flow: confirming Delete on a row removes exactly that row and decreases the visible toolbar count by one; canceling leaves the row intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "detail_history_panel_retains_library"
description = "View/mode switch: opening detail, Edit, or View History and returning to the library keeps search/filter state and selection continuity while the app stays open."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_shows_empty_with_cta"
description = "Edge: after deleting every prompt, the table region shows a designed empty state naming what belongs there with a New Prompt call to action."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_and_technique_filter_coherence"
description = "Filter flow: technique filter plus search narrows the table under both constraints, the toolbar X of Y count updates, and Clear filters restores the full list exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "suggestion_chips_and_history_panel"
description = "Chrome: suggestion chips scroll horizontally when overflowing without shifting vertical layout; View History side panel opens and closes with workflow continuity."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "create_edit_delete_extend_combine_modals"
description = "Overlays: New Prompt, Edit, Delete confirmation, Extend, Combine, and Export library modals/panels support their flows and dismiss without trapping the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "export_import_recover_without_reload"
description = "Recovery: after Export library then delete, Import of the prior JSON reconstructs the table; a rejected import shows a visible error and leaves the collection unchanged — no reload required."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_library_includes_created_prompt"
description = "Export library flow: create a valid prompt, open Export library, confirm prompt-library.json and the markdown package include that title and technique; Download or Copy emit the active format; after deleting the prompt the next export omits it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_library_round_trip_flow"
description = "Import round-trip: export JSON after a create, note prompts length, delete to diverge, Import that JSON, and confirm the table and a fresh export reconstruct to match."
type = "binary"
weight = 1.0

