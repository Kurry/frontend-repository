[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_library_present"
description = "On load, the library table contains at least 15 seeded prompts spanning at least 5 distinct technique categories, and at least 3 seeded prompts show attachment badges in their rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_prompt_flow"
description = "Clicking New Prompt opens a modal with title, body text, technique select, and description fields; the Submit control stays disabled until title and body are non-empty and a technique is selected, and submitting a valid prompt closes the modal, inserts exactly one row, and increases the toolbar prompt count by one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "invalid_create_validation"
description = "Attempting to submit New Prompt with an empty title shows an inline validation message naming the title field and adds no row; the prompt count is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "search_narrows_and_restores"
description = "Typing in the search field narrows the table to rows whose title or body contain the query, the toolbar's X of Y count updates to match, and clearing the field restores the full list exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "technique_filter_combines_with_search"
description = "Selecting a technique in the filter narrows the list to matching prompts, and applying a search on top applies both constraints simultaneously"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "suggestion_chips_apply_exactly"
description = "Clicking a suggestion chip above the table fills the search field or applies the technique filter with exactly the chip's value and the table narrows accordingly; when the chips overflow their row, the row scrolls horizontally without shifting the vertical layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "no_match_empty_state_clear_filters"
description = "When search and filter together match nothing, the table body shows an empty state with a message and a Clear filters control, and activating it resets both constraints and restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "body_code_block_with_copy"
description = "A prompt's detail or edit surface renders the body in a monospaced block with a visible format label and a Copy control; activating Copy puts the exact body text on the clipboard and shows a visible confirmation that clears after a moment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "edit_prefilled_updates_row"
description = "Clicking a row's Edit action opens the modal pre-filled with that prompt's title, body, technique, and description; submitting updates the row in place without a reload and the row's version column increments"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "history_panel_restore"
description = "Clicking View History opens a side panel listing each saved version with a timestamp and diff summary, and clicking an older version restores that version's content into the edit form"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "delete_confirm_cancel"
description = "Clicking Delete on a row opens a confirmation dialog; confirming removes exactly that row and decreases the visible count by one, while canceling leaves the row intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "selection_gates_extend_combine"
description = "With fewer than two rows checkbox-selected, the Extend and Combine controls are disabled or hidden; selecting two or more rows enables both controls in the toolbar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "extend_creates_derived_prompt"
description = "Extend opens a modal showing the selected prompt with an appended extension text field, and submitting creates exactly one new prompt entry derived from the original"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "combine_merges_to_one_prompt"
description = "Combine opens a modal merging the selected prompt bodies into a single editable composite, and submitting creates exactly one new prompt from the merged content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "sources_list_links_in_app"
description = "A prompt created through Extend or Combine shows a sources affordance with a count; activating it opens a list naming the contributing prompts, and choosing a listed source opens that prompt's detail in-app without navigating to another origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "attachment_badges_and_rows"
description = "Rows with attachments show compact inline badges whose hover reveals a small preview, while the detail and edit surfaces show the same attachments as detailed rows with filename and type metadata, each with a type-appropriate preview (image thumbnail, media glyph, or document icon fallback)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "add_attachment_from_seeded_assets"
description = "The edit surface's Add attachment control offers a set of seeded assets, and choosing one makes the attachment appear immediately on the prompt's detail rows and table badges"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "remove_attachment_with_feedback"
description = "Hovering an attachment row reveals a Remove control; activating it deletes exactly that attachment with visible feedback and the row's attachment badges update to match, without breaking the row layout when the last attachment is removed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "create_search_chain"
description = "Scripted probe: submit New Prompt with a distinctive title such as 'Socratic Debugger', confirm the table gains exactly one row and the toolbar count increases by one, then type 'Socratic' into the search field and confirm the table narrows to that row — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "edit_version_history_chain"
description = "Scripted probe: edit a seeded prompt's body, save, and confirm the row's version increments; open View History, confirm the new version appears at the top with a timestamp and diff summary, click the older version, and confirm the edit form now shows the older content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "double_submit_creates_one"
description = "Rapidly double-activating the New Prompt Submit control creates exactly one prompt: the count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "cancel_leaves_collection_unchanged"
description = "Canceling the create, edit, extend, combine, or delete dialog leaves the collection unchanged: the row count and toolbar count are identical before and after"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "long_text_truncation"
description = "A prompt title longer than 60 characters renders truncated with an ellipsis in its table row and in full on the detail and edit surfaces, and a long body shows a truncated single-line preview in the table"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.24"
name = "delete_all_empty_state"
description = "After deleting every prompt, the table region shows a designed, illustrated empty state naming what belongs there with a New Prompt call to action instead of a blank table"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "derived_prompt_static_sources"
description = "The sources affordance on a derived prompt shows hardcoded or empty content that fails to name the actual prompts selected for the Extend or Combine action"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "copy_confirmation_without_clipboard"
description = "The Copy control shows its confirmation while the clipboard receives nothing or text differing from the prompt body"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "prompt_request_body_field_contract"
description = "New Prompt / Edit validate the prompt request-body field contract: title trimmed length 1–60, body non-empty max 8000, technique exactly one closed-list tag, optional description max 280; invalid drafts keep Submit disabled with named field errors and add no row; a valid create record matches that shape"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "export_library_json_and_markdown"
description = "Export library compiles prompt-library.json with required keys schemaVersion equal to 1, product exactly Prompt Library, prompts array, and generatedAt ending in Z, plus a markdown package; after creating a prompt both artifacts include that title and technique; Download JSON, Download Markdown, and Copy emit the visible text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "import_library_round_trip"
description = "After exporting JSON following a create, deleting to diverge, then Import library of that JSON, the table count/titles and a fresh export reconstruct to match; malformed JSON shows a visible error and changes nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "export_omits_session_prompt"
description = "After creating a prompt, Export library JSON or markdown omits that prompt's title or technique — an incomplete session export"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "export_prompts_carry_full_record_shape"
description = "In prompt-library.json each prompts entry carries the request-body fields plus id, version, sources, and attachment filenames, listed in the same order as the library table; after an edit or a Combine, the affected entry's version and sources values match the visible row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
