[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "studio_controls_keyboard_operable"
description = "Every interactive control — Preview/Components/Saved Themes/Export tabs, Phone/Tablet/Desktop toggles, Palette accordion rows, tool fields, editor actions (Copy, Undo, Redo, Save), Export Download/Copy/Import, command palette results, and saved-theme card Load/Delete — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "tutorial_and_theme_form_dialogs_manage_focus"
description = "The Tutorial modal, the theme create/rename forms, and the command palette use role dialog with aria-modal true, trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "chrome_icons_have_accessible_names"
description = "Meaningful header icons (GitHub, Material logo mark, and similar action icons) expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_status_announced_live"
description = "Validation and status messages (invalid name, duplicate name, invalid #RRGGBB field paths, fontSize/borderRadius bounds, Type↔palette.type cross-field errors, invalid options, save status, import field errors, WCAG Fail labels) are shown visually and announced via an aria-live polite region."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "theme_name_field_explicitly_labeled"
description = "Theme create and rename name fields use an explicit label element associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "palette_accordions_expose_expanded_state"
description = "Palette accordion rows expose their expanded/collapsed state to assistive technology and toggle with Enter or Space."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example nav or tablist for the main tabs and main for the Preview/Components/Saved Themes/Export workspace) so assistive technology can navigate the studio."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "shell_and_tool_contrast"
description = "Dark-shell labels, tab text, tool-panel titles, and primary controls meet sufficient contrast against their near-black or indigo-accented surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "tabs_and_device_toggles_keyboard_semantics"
description = "Main tabs and Phone/Tablet/Desktop toggles are keyboard-operable with button/tab semantics and a visible selected/active state exposed to assistive technology."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, tab indicator slides, accordion expand/collapse, theme-card enter/exit, modal opacity/scale, and toast slide/fade are removed or reduced to instant state changes while every flow remains completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "studio_controls_unreachable_by_keyboard"
description = "A main tab, device toggle, Palette accordion row, tool field, editor action, or saved-theme Load/Delete control cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_studio_controls"
description = "Focused tabs, device toggles, accordion rows, color fields, or theme-form inputs show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Main tabs, device toggles, or Palette accordion rows use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "active_theme_or_error_color_only"
description = "Active saved-theme selection or name-field error state is conveyed by color alone with no text, marker, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "dialogs_fail_to_trap_focus"
description = "With the Tutorial modal or a theme create/rename form open, Tab moves focus to controls behind the overlay without trapping focus in the dialog."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_shell_or_tools"
description = "Shell tab labels, tool-panel titles, or primary button labels are unreadable due to poor contrast against their background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "validation_or_status_visual_only"
description = "Invalid-name, invalid-options, or save-status feedback is visual only with no aria-live announcement or accessible association."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "meaningful_icons_missing_names"
description = "Meaningful header or action icons that convey controls are missing alt text or an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped_in_studio"
description = "Studio chrome or tool-panel headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, tab indicator slides, accordion expand/collapse, theme-card enter/exit, modal transitions, or toast animations still run fully."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "compare_and_colorblind_state_not_color_only"
description = "Color-blindness mode and Before/After compare expose their selected state to assistive technology with text or ARIA state, not by color alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n11"
name = "command_palette_no_focus_trap"
description = "With the command palette open, Tab moves focus to controls behind the overlay without trapping focus in the dialog."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
