[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_chrome_and_tools"
description = "Where the app renders header title, tab labels (Preview, Components, Saved Themes, Export), and tool-panel titles (Palette, Fonts, Typography, Snippets), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as New Theme, Save, Copy theme code, Download JSON, Download CSS, Import ThemeOptions, Save version, Restore, Undo, Redo, Load, and Delete rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders theme-name validation messages, they name the name field and the fix, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_saved_themes_explains_next_step"
description = "Where the app renders the Saved Themes empty state, the copy explains that no themes are saved yet and how to create one."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "studio_and_sample_copy_polished"
description = "Where the app renders sample-site copy, component-demo labels, and chrome/tool labels, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (saved theme vs theme, primary in Palette vs editor ThemeOptions, Light/Dark Type), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "hex_and_status_formatting_consistent"
description = "Where the app renders hex color values and save-status text (saved / unsaved / editing), formatting is consistent for the same value across Palette fields, editor source, and status row."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders confirmation feedback (copy toast, save toast, snippet-applied toast, export copied toast), the copy states what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "wcag_labels_use_exact_tokens"
description = "Where the app renders WCAG contrast readout labels, they use the exact tokens Pass AA, Pass AAA, or Fail so the status is unambiguous."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "export_import_errors_explain_failure"
description = "Where the app renders Export or import error copy, the message names the offending field (e.g. name, primary.main, fontSize, palette.type, borderRadius) or the payload/cross-field problem rather than a bare rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as Material-UI Theme Creator, Preview/Components/Saved Themes, New Theme, Save, or Copy theme code."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same theme or palette concept is named inconsistently across tabs, Palette tool, editor, and Saved Themes in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Tab labels, validation messages, or button labels are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
