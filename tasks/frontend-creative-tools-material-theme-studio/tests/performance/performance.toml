[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the Material theme studio becomes interactive within 2 seconds, with the header and main tabs operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise: tab switches, palette edits, source edits, theme CRUD, font add/remove, export/import, and command palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "palette_typography_repaint_under_100ms"
description = "Palette and typography edits repaint the preview and regenerate Export text with UI response in under 100ms (perceived immediate), without visible hangs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the header lockup and three-tab bar remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "component_gallery_scrolls_without_lag"
description = "With the Components panel showing roughly two dozen themed demos, scrolling the gallery and using the filterable drawer nav shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_retheme"
description = "During preview recolor after a palette edit or Light/Dark toggle, editor actions and tool fields remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_retheme_holds_stable_frame_rate"
description = "Driven through real Palette controls, preview recolor maintains a smooth frame rate without visible hitching during continuous edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_palette_edits_never_hang"
description = "Rapid repeated palette or typography input keeps the UI responsive with no hangs and leaves preview, editor source, and tool fields in agreement."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_studio_session_stable"
description = "After an extended session of many palette edits, tab switches, creates, and deletes, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; header, tabs, and Preview regions hold their space as the app settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before header tabs or Preview controls can be operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_studio_flows"
description = "Console errors, warnings, or unhandled rejections appear during tab switches, palette edits, source edits, theme CRUD, font add/remove, export/import, or command palette."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.11"
name = "command_palette_filter_no_lag"
description = "Command palette filtering updates the result list without perceptible lag as the user types fuzzy queries across tabs, tools, and theme names."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n11"
name = "export_regen_hangs_on_palette_edit"
description = "Regenerating the Export JSON/CSS preview after a palette edit hangs the UI or leaves Export text stale for multi-second delays."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "retheme_or_tab_transition_blocks_ui"
description = "Preview recolor or main-tab swap blocks the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "palette_edit_hangs_ui"
description = "Updating the preview after a palette or typography edit hangs or freezes the UI until the transition completes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "component_gallery_janks_on_scroll"
description = "Scrolling or filtering the Components gallery of roughly two dozen demos produces sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_editor_input"
description = "While preview recolor or toast animations run, Palette fields and editor actions ignore input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "The UI blocks rendering of header and tabs until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_edits"
description = "Rapid palette edits or Light/Dark toggles cause visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no header or tab-bar skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid palette edits, source edits, or after deleting all saved themes and recreating."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
