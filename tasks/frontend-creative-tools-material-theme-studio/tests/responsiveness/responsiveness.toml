[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1280_to_narrow"
description = "Resizing from 1280px+ desktop to 768px keeps a usable theme studio: header, main tabs, and Preview/Components/Saved Themes content remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "narrow_tap_targets_adequate"
description = "At 768px width, main tabs, device toggles, New Theme, Load/Delete, and editor actions present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Header title, tab labels, and tool-panel titles remain legible at both 1280px and 768px — type scales or reflows without becoming unreadably small at the narrower width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_768"
description = "At 768px width, Preview regions, tool panels, and Saved Themes cards never clip or overflow the viewport; no horizontal viewport scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "preview_stacks_below_1024"
description = "Below roughly 1024px the Preview panel stacks its device-frame and editor/tool regions vertically and every tool panel remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At 768px width, Preview frame, editor/tools, and tab content reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_controls_tappable"
description = "At 768px width, tap/click activation works on main tabs, Phone/Tablet/Desktop toggles, Palette accordion rows, and Saved Themes Load/Delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_768"
description = "At 768px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "device_frame_and_component_gallery_scale"
description = "The device-framed sample site and the Components gallery scale with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_remain_operable_at_narrow_widths"
description = "Tutorial modal, theme create/rename forms, and the command palette stay fully visible and operable at 768px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_and_versions_operable_at_768"
description = "At 768px width, the Export preview block with JSON/CSS tabs and the Versions list remain fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_768_or_1280"
description = "At 768px or 1280px the Material theme studio layout breaks: overlapping panels, overflow, or unusable stacking."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "narrow_controls_too_small"
description = "At 768px width, main tabs, device toggles, New Theme, or Load/Delete are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "tool_text_unreadable_when_narrow"
description = "At 768px width, tool-panel titles, accordion labels, or theme card names are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 768px or 1280px, workspace content is cropped or unnecessary scrollbars appear for content that should fit the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "preview_region_missing_below_1024"
description = "Below ~1024px, the device frame, editor, or a tool panel region is missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_header_obscures_workspace"
description = "Fixed-position header or tab bar obscures Preview tools, editor actions, or Saved Themes controls so they cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 768px width, Preview frame, editor/tools, and tab content overlap into an unusable stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "narrow_modals_or_tools_inoperable"
description = "At 768px width, the Tutorial modal, theme forms, command palette, Export panel, or stacked tool panels cannot be opened or operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_panel_offscreen_at_768"
description = "At 768px width, the Export preview block or Download/Copy controls render off-screen or are unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "device_frame_static_size_overflows"
description = "The device frame or Components gallery uses a static size that overflows the viewport at 768px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "At 768px or 1280px, required controls (main tabs, device toggles, editor actions, or Saved Themes Load/Delete) disappear from the layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
