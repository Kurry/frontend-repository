[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1280_to_narrow"
description = "Resizing from 1280px+ desktop to 768px keeps a usable theme studio: header, main tabs, and Preview/Components/Saved Themes content remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "narrow_tap_targets_adequate"
description = "At 768px width, main tabs, device toggles, New Theme, Load/Delete, and editor actions present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Header title, tab labels, and tool-panel titles remain legible at both 1280px and 768px — type scales or reflows without becoming unreadably small at the narrower width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_768"
description = "At 768px width, Preview regions, tool panels, and Saved Themes cards never clip or overflow the viewport; no horizontal viewport scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "preview_stacks_below_1024"
description = "Below roughly 1024px the Preview panel stacks its device-frame and editor/tool regions vertically and every tool panel remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At 768px width, Preview frame, editor/tools, and tab content reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_controls_tappable"
description = "At 768px width, tap/click activation works on main tabs, Phone/Tablet/Desktop toggles, Palette accordion rows, and Saved Themes Load/Delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_768"
description = "At 768px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "device_frame_and_component_gallery_scale"
description = "The device-framed sample site and the Components gallery scale with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_remain_operable_at_narrow_widths"
description = "Tutorial modal, theme create/rename forms, and the command palette stay fully visible and operable at 768px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_and_versions_operable_at_768"
description = "At 768px width, the Export preview block with JSON/CSS tabs and the Versions list remain fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

