[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_saved_theme_updates_all_surfaces"
description = "Create flow: activating New Theme and submitting a valid name closes the form, increases the saved-themes card count by exactly one, shows the new card with swatches and meta line, and loading that card immediately rewrites the editor source and recolors the framed sample site without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_theme_name_inline_validation"
description = "Create/rename flow: submitting an empty name shows an immediate inline validation message naming the name field, submit stays disabled or rejects, and the card count is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "palette_edit_save_updates_all_surfaces"
description = "Edit flow: changing the primary main color in the Palette tool recolors the sample site's primary surfaces immediately, rewrites the ThemeOptions source to the new hex, flips save status to unsaved, recomputes that intent's WCAG contrast label, and updates the Export panel's JSON and CSS text to include the new hex; after activating Save, status returns to saved and the active theme's Saved Themes card shows the updated swatch without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_loaded_theme_clears_active"
description = "Delete flow: confirming delete of the loaded theme removes its card, decreases the card count by exactly one, and clears the active-theme marker so no card is marked active until another theme is loaded."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "light_dark_round_trip_across_panels"
description = "Light/Dark round-trip: toggling Type to Dark recolors preview background, paper, text, and divider surfaces and updates the editor source; switching to Components shows the same dark surfaces across demos; toggling back to Light restores light surfaces on every panel without a document navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_saved_themes"
description = "Edge: after deleting every saved theme, Saved Themes shows a clear empty state with a message and a way to create a new theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_filters_saved_theme_cards"
description = "Search/filter flow: typing a query over saved theme names recomputes the visible cards from the collection; clearing the query restores the full card set."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "undo_redo_round_trip_across_surfaces"
description = "Undo round-trip: after a tool edit, activating Undo restores the previous value in the tool field, the editor source, the preview, and the Export preview text together; activating Redo reapplies the edit across all four surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "tutorial_and_theme_form_overlays"
description = "Overlays: Tutorial opens an in-page modal that can be dismissed; theme create/rename forms open, validate, and close without trapping the user — Close/Escape returns to the workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "Recovery/reload: a page reload returns the app to its seeded state — at least three seeded themes listed, the default theme active, and any unsaved edits from before the reload gone — with no dead end requiring a second reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "Export then import: after editing primary main to a distinct #RRGGBB hex and shape.borderRadius to a distinct in-range value, open Export and confirm the ThemeOptions JSON preview contains that hex under primary.main along with palette.type, typography.fontFamily, typography.fontSize, and shape.borderRadius; after changing the color and radius away, Import that same payload — editor, tools, Type toggle, preview, and Export text all return to the imported options including that hex and borderRadius without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "command_palette_loads_theme_flow"
description = "Command palette jump: open with Ctrl+K, type part of a seeded theme name, press Enter on the highlighted theme result — that theme loads into editor and preview and the palette closes."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "version_save_restore_flow"
description = "Version restore: after editing palette values, Save version with a valid name adds one snapshot; editing again then Restoring the snapshot returns editor, tools, preview, and Export text to the snapshotted options."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "duplicate_name_create_then_unique_succeeds"
description = "Schema validation on create: attempting New Theme with a duplicate of a seeded theme name leaves the card count unchanged and shows an inline error naming the name field; submitting a unique valid name then succeeds and increases the count by exactly one."
type = "binary"
weight = 1.0

