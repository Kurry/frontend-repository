[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dark_studio_shell_lockup"
description = "Dark studio shell with near-black surfaces, light shell text, an indigo/Material primary accent, Roboto type, and Material iconography; the header brand lockup with a cyan Material logo mark sits above the four-tab bar (Preview / Components / Saved Themes / Export), and the layout keeps full-viewport tool density rather than a marketing landing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_saved_themes_state"
description = "Empty Saved Themes state is visually present when the collection is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "static_marketing_page_only"
description = "Presents only a static marketing page without Monaco or saved themes management"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "theme_card_swatches_actions"
description = "Saved theme cards are dense, preview each theme's swatches (e.g. primary / secondary / paper) with a type-and-updated meta line and load/delete controls, and mark the active theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "preview_split_regions"
description = "The Preview tab places the device toggles and framed sample site on one side and the code editor above stacked Palette / Fonts / Typography / Snippets tool panels on the other, with a bottom tool-nav switching panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "previews_recolor_from_theme"
description = "Sample sites and component demos recolor from the live ThemeOptions, so a palette or typography edit is reflected across every preview surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "component_state_treatments"
description = "Buttons, inputs, and accordion controls show distinct default, hover, focus (visible ring), and disabled treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "desktop_side_by_side_layout"
description = "At desktop widths of 1280 pixels and above, the Preview panel shows the device frame and the editor/tool stack side by side as in the reference layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "stacked_layout_below_1024"
description = "Below roughly 1024 pixels the Preview panel stacks its regions vertically with every tool panel still reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "horizontal_overflow_at_768"
description = "At 768 pixel viewport width, content clips or a horizontal viewport scrollbar appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "export_panel_dense_tool_surface"
description = "Export mode shows a monospaced live preview block with JSON / CSS format tabs, Download and Copy controls, and an Import ThemeOptions affordance as a dense tool surface — not a marketing CTA card"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "wcag_and_harmonics_compact_meta"
description = "WCAG contrast labels and harmonic suggestion chips read as compact meta beside Palette fields, not large promo cards competing with the editor"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n11"
name = "export_looks_like_marketing_cta"
description = "The Export panel is styled as a marketing CTA / empty hero rather than a dense monospaced artifact preview with format tabs and download/copy controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable visual-design defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action, page state, screenshot) that demonstrates it. If the defect is already covered - even partially - by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
