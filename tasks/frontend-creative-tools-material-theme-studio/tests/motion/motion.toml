[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_animations_present"
description = "Required hover animations are present: buttons and icon buttons brightness-lift on hover, accordion summaries and saved theme rows take a subtle hover wash, inert link-like controls underline on hover, and tab labels ease opacity/background on hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "tab_switch_keeps_hover"
description = "Tab/mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "hover_washes_missing"
description = "Omits hover washes on buttons, rows, or tabs so the studio feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "tab_indicator_slides"
description = "The primary-colored main tab indicator slides when switching between Preview, Components, and Saved Themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "accordion_eased_expand"
description = "Palette accordion rows expand and collapse with a chevron rotation and an eased height transition when clicked via the real accordion control"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "theme_card_enter_exit"
description = "Driven through the real UI controls, a newly created saved-theme card eases in and a deleted card animates out rather than vanishing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "modal_scale_fade_transition"
description = "The Tutorial and theme-form modals enter with a short opacity and scale transition of roughly 200 to 300 milliseconds and exit the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "toast_slide_and_fade"
description = "Action toasts (copy, save, snippet applied) slide in, remain readable, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_flows_completable"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly while every flow stays completable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action, page state, screenshot) that demonstrates it. If the defect is already covered - even partially - by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
