[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_animations_present"
description = "Required hover animations are present: buttons and icon buttons brightness-lift on hover, accordion summaries and saved theme rows take a subtle hover wash, inert link-like controls underline on hover, and tab labels ease opacity/background on hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "tab_switch_keeps_hover"
description = "Tab/mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "tab_indicator_slides"
description = "The primary-colored main tab indicator slides when switching between Preview, Components, Saved Themes, and Export"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "accordion_eased_expand"
description = "Palette accordion rows expand and collapse with a chevron rotation and an eased height transition when clicked via the real accordion control"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "theme_card_enter_exit"
description = "Driven through the real UI controls, a newly created saved-theme card eases in and a deleted card animates out rather than vanishing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "modal_scale_fade_transition"
description = "The Tutorial, theme-form, and command-palette overlays enter with a short opacity and scale transition of roughly 200 to 300 milliseconds and exit the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "toast_slide_and_fade"
description = "Action toasts (copy, save, snippet applied, export copied) slide in, remain readable, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_flows_completable"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly while every flow stays completable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "preview_filter_and_compare_ease"
description = "Driven through real Preview chrome controls, color-blindness filter application and Before/After swaps ease the framed sample without a hard cut"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "harmonics_secondary_swatch_highlight"
description = "Driven through the real Harmonics control, applying Analogous, Complementary, or Triadic briefly highlights the secondary swatch as secondary main updates"
type = "binary"
weight = 0.5

