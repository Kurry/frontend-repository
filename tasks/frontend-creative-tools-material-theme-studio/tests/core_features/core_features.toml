[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_themes_visible"
description = "On load, Saved Themes (or the saved list after opening that tab) shows at least 3 seeded theme rows with names visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_named_theme_visible"
description = "After creating a saved theme named 'Harbor Indigo' with valid required fields, the text 'Harbor Indigo' is visible under Saved Themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_three_count_delta"
description = "After adding 3 new saved themes on top of the seed set, Saved Themes shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "load_theme_applies_options"
description = "After loading a saved theme, the Preview surfaces and/or Monaco editor reflect that theme's options"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "rename_theme_updates_name"
description = "After editing a saved theme name to 'Evening Paper', the text 'Evening Paper' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "delete_theme_removes_name"
description = "After deleting a saved theme, that theme name is no longer visible under Saved Themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_state_after_last_delete"
description = "After deleting all saved themes, an empty state message with a way to create a new theme is visible in the Saved Themes region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_name_create_rejected"
description = "After submitting create with an empty required theme name, the saved themes count does not increase and a visible inline validation message names the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "light_dark_toggle_recolors"
description = "After toggling Light/Dark palette Type, preview surfaces recolor without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "tab_switch_no_navigation"
description = "After switching from Preview to Saved Themes, Components, or Export, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "device_toggle_reframes"
description = "After switching among Phone / Tablet / Desktop device frames, the preview chrome reframes without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "palette_edit_save_flow"
description = "Changing the primary main color in the Palette tool recolors the sample site's primary surfaces immediately, rewrites the ThemeOptions source in the editor to the new hex, and flips the save status to unsaved; after activating Save, the status returns to saved and the active theme's card under Saved Themes shows the updated swatch without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "saved_theme_crud_shared_state"
description = "Saved themes collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "saved_theme_search_filter"
description = "Typing a query into the saved-themes search filters the visible cards to matching names, a query matching no theme names shows an empty result state, and clearing the query restores the full card set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "editor_bisync_invalid_status"
description = "The Monaco editor stays bi-synced with the tool panels: editing a Palette color rewrites the ThemeOptions source, editing valid source updates the tools and preview, and invalid source surfaces an invalid-options status instead of applying while the preview keeps rendering the last valid theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "palette_accordion_intent_fields"
description = "The Palette tool lists expandable accordion rows including a Light/Dark Type toggle (palette.type light or dark), Background, Text, Divider, and the six intent colors (primary, secondary, error, warning, info, success), each intent expanding to main / light / dark / contrastText fields that accept six-digit hex with a leading hash and stay live with the editor"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "fonts_add_remove_roboto_protected"
description = "The Fonts tool adds a Google font by name, rejects a duplicate family with visible feedback and no duplicate list entry, removes a font, and keeps the base Roboto family protected from removal (its remove control absent or disabled)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "components_gallery_search_filters"
description = "The Components panel renders a searchable gallery of roughly two dozen themed component demos that filters as the search text changes, with a filterable drawer nav that jumps to a section via same-document anchors only"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "device_widths_and_templates"
description = "The Preview device toggles Phone / Tablet / Desktop reframe the sample chrome to roughly 375px / 768px / full width, and the frame cycles through at least six named sample templates"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "header_chrome_tutorial_modal"
description = "The header shows the product title Material-UI Theme Creator, an inert version chip, and a Tutorial control that opens an in-page modal; activating the GitHub icon leaves the page where it is"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "copy_theme_code_toast"
description = "The editor actions row offers Editor Settings (toggling the editor color theme), Undo, Redo, and Save with status text, and activating Copy theme code shows a confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "undo_redo_roundtrip"
description = "After a tool edit, activating Undo restores the previous value in the tool field, the ThemeOptions editor source, and the preview together; activating Redo reapplies the edit across all three surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "typography_font_size_bounded"
description = "The Typography tool sets typography.fontFamily from the loaded fonts and typography.fontSize as an integer from 8 through 24 inclusive; shape.borderRadius is a number from 0 through 24 inclusive kept live with the editor; entering a size outside 8 through 24 or a borderRadius outside 0 through 24 is rejected or clamped with visible feedback naming the fontSize or borderRadius field instead of being applied verbatim"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "snippet_preset_applies_toast"
description = "Activating a Snippets preset (e.g. Dense spacing, Rounded shapes, or Button casing) visibly patches the ThemeOptions source — Rounded shapes updates shape.borderRadius within 0–24 — and shows a confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "create_theme_flow_chain"
description = "Activating New Theme and submitting a valid name closes the form, increases the saved-themes card count by exactly one measured immediately around the submit, shows the new card with its swatches and meta line, and loading that new card immediately rewrites the editor source and recolors the framed sample site without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "light_dark_cross_panel_roundtrip"
description = "Toggling Type to Dark recolors the preview background, paper, text, and divider surfaces and updates the editor source; switching to the Components panel shows the same dark surfaces across the component demos, and toggling back to Light restores the light surfaces on every panel without a document navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "delete_loaded_theme_clears_active"
description = "After loading a theme and then confirming its delete, its card is removed, the card count decreases by exactly one measured around the delete, and no card is marked active until another theme is loaded"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "reload_restores_seeded_state"
description = "After creating a theme and editing palette values, a page reload returns the app to its seeded state: the seeded themes are listed, the default theme is active, and the unsaved edits and created theme from before the reload are gone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "submit_disabled_until_valid_name"
description = "In the theme create and rename forms, the name field shows a per-field inline error naming the field when it is empty and the submit control stays disabled until the name is valid"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.39"
name = "load_resets_dirty_state"
description = "Loading a saved theme resets the save status to saved and clears the pending dirty/undo state, shown by the status text immediately after the load"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.40"
name = "export_panel_live_json_css"
description = "The Export panel shows live-compiled ThemeOptions JSON and CSS variables format tabs; after changing primary main to a distinct #RRGGBB hex and shape.borderRadius to a distinct value within 0–24, both previews update to include those values without a reload, and the JSON preview also shows palette.type, typography.fontFamily, typography.fontSize, and shape.borderRadius field names with the session's values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "export_download_and_copy"
description = "Export offers Download JSON, Download CSS, and Copy export: Download triggers a real file download of the visible format text, and Copy writes that exact visible text to the clipboard with a confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "import_themeoptions_applies"
description = "Import ThemeOptions with a valid declared-theme JSON payload (name ≤64 chars, palette.type light|dark, intent main/light/dark/contrastText #RRGGBB channels, typography.fontFamily, typography.fontSize 8-24, shape.borderRadius 0-24, Type↔palette.type cross-field) replaces editor, tools, Type toggle, and preview with those options and flips save status to unsaved; a malformed or contract-invalid payload shows a visible error naming the offending field and leaves the current theme unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "wcag_contrast_readout_live"
description = "Each Palette intent color row shows a live WCAG contrast readout for main versus contrastText labeled Pass AA, Pass AAA, or Fail; changing either color recomputes the label immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "harmonics_apply_secondary"
description = "Activating a Harmonics suggestion (Analogous, Complementary, or Triadic) derived from primary main writes a derived hex into secondary main, rewrites the editor source, and recolors the preview without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "color_blindness_preview_filter"
description = "Choosing Protanopia, Deuteranopia, or Tritanopia on the Preview chrome applies an SVG filter overlay to the framed sample site only; choosing None removes the filter — both without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "before_after_compare_toggle"
description = "Before / After compare toggles the framed sample between the current ThemeOptions and the last saved snapshot of the active theme while the editor and tool panels keep showing the current editable options"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "theme_versions_save_restore"
description = "Save version with a valid name adds exactly one snapshot under Versions; Restore on a selected snapshot writes those options into editor, tools, and preview and marks the theme unsaved; an empty version name adds nothing and shows an inline error naming the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "command_palette_fuzzy_jump"
description = "Pressing Ctrl+K (Cmd+K on macOS) opens a command palette; typing fuzzy-matches tabs, tools, saved themes, or templates; Enter on a highlighted theme result loads that theme and closes the palette; Escape returns focus"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "theme_name_uniqueness_enforced"
description = "Submitting New Theme or rename with a name that already exists on another saved theme (after trim), or a name longer than 64 characters, leaves the card count unchanged and shows an inline validation message naming the name field; a successful create writes a would-be request body whose palette.type matches the current Type toggle"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "intent_hex_format_validated"
description = "Entering a non-#RRGGBB value into an intent color channel such as primary.main, or a shape.borderRadius outside 0 through 24, shows an inline error naming that field path and does not update the editor source, preview, or Export text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "export_json_enumerates_themeoptions_fields"
description = "The ThemeOptions JSON export preview enumerates name, palette.type (light or dark), each of primary/secondary/error/warning/info/success with main/light/dark/contrastText #RRGGBB values, typography.fontFamily, typography.fontSize, and shape.borderRadius as visible field names and values, with palette.type agreeing with the Type toggle (cross-field)"
type = "binary"
weight = 1.0

