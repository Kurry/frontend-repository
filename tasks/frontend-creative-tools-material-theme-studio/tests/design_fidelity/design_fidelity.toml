[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_studio_tool_density"
description = "At 1440px, spacing among the header lockup, four-tab bar, Preview device frame, and editor/tool stack follows a consistent dense-studio scale matching the reference screenshots — no arbitrary one-off gaps that break the composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_roboto_material_spec"
description = "Studio chrome and tool labels use Roboto (or the bundled Material typeface) consistent with the reference; sample-site and component-demo text follows the active theme options — not a default system UI stack for chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: dark header with Material-UI Theme Creator lockup above the main tab bar (Preview / Components / Saved Themes, plus Export as instructed); Preview shows device frame beside editor/tool stack — a full-viewport tool studio, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — main-tab indicator slide, Palette accordion expand/collapse, new/deleted saved-theme card enter/exit, Tutorial and theme-form modal opacity/scale (~200–300ms), and action toasts — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 1280px+ the Preview panel keeps device frame and editor/tool stack side by side as in the reference; below ~1024px those regions stack vertically while tools stay reachable, matching the instructed responsive pattern."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "studio_controls_styled_not_browser_default"
description = "Tabs, accordions, dialogs, selects, buttons, and toasts use Material-studio treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_header_tabs_tools"
description = "Typography hierarchy clearly distinguishes the product title Material-UI Theme Creator, the four-tab bar labels, denser tool-panel titles (Palette / Fonts / Typography / Snippets), and preview/sample copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, inputs, and accordion controls show distinct default, hover, focus (visible ring), and disabled treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_recolor_from_live_theme_options"
description = "Sample sites and component demos recolor from the live ThemeOptions (via CSS variables or equivalent live tokens): palette/typography edits are reflected across every preview surface as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover brightness/wash on buttons, accordion summaries, and saved-theme rows; modal opacity/scale (~200–300ms); and toast slide/fade follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_surface_present_in_studio_chrome"
description = "At 1440px the Export tab is present in the main tab bar and opens a dense artifact preview surface consistent with the instructed studio chrome (text wins over screenshots where they conflict)."
type = "binary"
weight = 1.0

