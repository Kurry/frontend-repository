[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_studio_tool_density"
description = "At 1440px, spacing among the header lockup, four-tab bar, Preview device frame, and editor/tool stack follows a consistent dense-studio scale matching the reference screenshots — no arbitrary one-off gaps that break the composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_roboto_material_spec"
description = "Studio chrome and tool labels use Roboto (or the bundled Material typeface) consistent with the reference; sample-site and component-demo text follows the active theme options — not a default system UI stack for chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: dark header with Material-UI Theme Creator lockup above the main tab bar (Preview / Components / Saved Themes, plus Export as instructed); Preview shows device frame beside editor/tool stack — a full-viewport tool studio, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — main-tab indicator slide, Palette accordion expand/collapse, new/deleted saved-theme card enter/exit, Tutorial and theme-form modal opacity/scale (~200–300ms), and action toasts — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 1280px+ the Preview panel keeps device frame and editor/tool stack side by side as in the reference; below ~1024px those regions stack vertically while tools stay reachable, matching the instructed responsive pattern."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "studio_controls_styled_not_browser_default"
description = "Tabs, accordions, dialogs, selects, buttons, and toasts use Material-studio treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_header_tabs_tools"
description = "Typography hierarchy clearly distinguishes the product title Material-UI Theme Creator, the four-tab bar labels, denser tool-panel titles (Palette / Fonts / Typography / Snippets), and preview/sample copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, inputs, and accordion controls show distinct default, hover, focus (visible ring), and disabled treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_recolor_from_live_theme_options"
description = "Sample sites and component demos recolor from the live ThemeOptions (via CSS variables or equivalent live tokens): palette/typography edits are reflected across every preview surface as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover brightness/wash on buttons, accordion summaries, and saved-theme rows; modal opacity/scale (~200–300ms); and toast slide/fade follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_studio"
description = "Visible spacing between header, tabs, Preview frame, and editor/tool stack contradicts the reference studio composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_ignore_active_theme_options"
description = "Preview and component-demo surfaces ignore the active theme options and render a fixed unrelated palette that stays identical after Palette edits."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "preview_split_sizing_mismatches_reference"
description = "At 1440px the Preview device frame and editor/tool stack are sized or proportioned in clear mismatch with the reference side-by-side studio layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_studio_animations_missing"
description = "Required animations are missing where the spec requires them (tab indicator snaps with no slide, accordions hard-cut, theme cards vanish instantly, modals teleport, toasts appear with no slide/fade)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Tabs, theme-form inputs, or primary buttons use unstyled browser default appearance when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the studio is misaligned versus the reference (missing header lockup, missing main tab bar, or Preview not splitting frame beside editor/tools)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "At 1440px, device frame, editor, tool panels, or saved-theme cards render clipped or off-screen compared to the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_studio"
description = "Structure deviates from the reference: a marketing landing or multi-page shell replaces the dense Material theme studio with Preview / Components / Saved Themes / Export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_surface_present_in_studio_chrome"
description = "At 1440px the Export tab is present in the main tab bar and opens a dense artifact preview surface consistent with the instructed studio chrome (text wins over screenshots where they conflict)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_header_and_tools"
description = "Header brand text and tool-panel titles are visually undifferentiated — no clear hierarchy between product lockup and dense tool copy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on buttons, accordion summaries, saved-theme rows, or inert link-like controls are missing or clearly deviate from the reference timing/feel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
