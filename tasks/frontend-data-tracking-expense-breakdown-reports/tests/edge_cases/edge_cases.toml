[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_is_present"
description = "After deleting all transactions or filtering to zero matches, the list region shows an empty state message rather than a blank table"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "Create/edit forms show inline per-field validation for empty payee, missing amount, zero amount, non-ISO date, and cross-field Salary-with-negative before submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and import mismatch messages name the offending field or row number rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Successful Copy shows a Copied confirmation, and demo chrome actions show a toast confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "async_work_shows_loading_state"
description = "Where import commit or export compile takes noticeable time, a brief busy/progress indicator is visible rather than a frozen blank control"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.6"
name = "destructive_actions_support_undo_or_cancel"
description = "Delete and bulk delete can be cancelled from a confirmation step, or dismissed before commit, so accidental activation does not silently wipe rows without a chance to abort"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.7"
name = "double_submit_creates_one_row"
description = "Double-activating a valid create submit creates exactly one transaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "empty_export_still_valid"
description = "With an empty collection, Export report still produces JSON with version 1, zero totals, empty transactions, and Markdown titled Expense Breakdown Report; Copy still shows Copied"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "import_rejects_bad_header_and_invalid_rows"
description = "Import CSV with a bad header or only invalid rows shows mismatch/error feedback and leaves the collection unchanged; mixed rows can commit only valid ones via Commit valid rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "invalid_date_range_and_ceiling_rejected"
description = "A date range with end before start shows an inline message and does not apply; a zero or negative burn-rate ceiling is rejected with an inline message naming the ceiling field"
type = "binary"
weight = 1.0

