[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.2"
name = "no_browser_storage_seeded_reload"
description = "No browser storage is used for persistence: localStorage and sessionStorage remain empty after a full exercise of the app, and a reload returns the seeded state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "storage_apis_persist_state"
description = "Uses localStorage or sessionStorage to persist transactions or filters"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "console_clean_during_full_exercise"
description = "No console errors or unhandled promise rejections appear during a full exercise of the app (create, edit, delete, filters, chart tab switches, bulk actions)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "keyboard_operable_with_visible_focus"
description = "Every interactive control (sidebar items, chrome actions, chart tabs, table controls, form fields) is reachable and operable with the keyboard alone, and the focused control shows a visible focus indicator (e.g. a focus-visible ring)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "modal_form_focus_trap_and_return"
description = "When the transaction create/edit form is presented as a modal it uses dialog semantics: focus moves into it on open, stays trapped inside while open, and returns to the invoking control on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "validation_announced_via_live_region"
description = "Form validation messages are exposed through a polite live region (e.g. aria-live=\"polite\" or role=\"status\") in addition to being shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "legends_convey_data_without_hover"
description = "Chart content is readable without hover: the legends list every expense category with its currency amount and percentage as plain text"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.9"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "in_place_redraws_without_jank"
description = "Chart redraws and tab switches apply in place without a full page reload and without visible jank, and the UI stays responsive under rapid repeated input with no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "document_title_ledger_reports"
description = "The document title is exactly 'Ledger | Reports'"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "no_outbound_requests_or_navigation"
description = "During a full exercise of the app, only same-origin network requests appear in devtools and no control navigates the browser to another origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "multi_facet_reload_resets_coherently"
description = "Configure several independent facets — create a transaction, switch the chart tab to Trends, and apply a category filter — then reload the page. All facets coherently reset to the seeded baseline (the seeded transactions, the default chart tab, and cleared filters), never a mix of reverted and surviving facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "views_desync_on_shared_datum"
description = "The same datum shows different values in two places at once (e.g. the table reflects an edit or delete while a KPI card, chart legend, or the summary strip still shows the stale value until a reload)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
