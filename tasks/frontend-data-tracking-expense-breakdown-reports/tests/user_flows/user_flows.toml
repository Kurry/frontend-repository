[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "After submitting a valid new transaction, the table gains exactly one row, the four summary cards recompute, the summary strip count increases by one, and the active chart panel reflects the new category aggregate without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Submitting create with an empty payee or missing amount shows inline validation naming the offending field and adds no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Editing a transaction amount updates that same table row, moves the affected summary cards, and updates the matching pie and sankey legend amounts without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Deleting a transaction removes its row, drops it from selection, decreases the summary strip count by exactly one, and drops its amount from KPIs and chart legends"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "Switching Breakdown/Trends and focusing list versus chart keeps the transactions collection and filters intact without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "After deleting all transactions, the list region shows an empty state and summary cards and strip read zero/empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_all_surfaces"
description = "Category, income-vs-expense, date-range, and payee search filters narrow the table and recompute chart legends and summary tiles; clearing them restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "At narrow widths, any collapsed sidebar or overlay chrome can be reopened and the reports workflow continues without losing the transactions collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Create/edit dialogs, the export drawer, import diagnostic panel, and command palette open, complete their actions, and dismiss without trapping the user"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "After dismissing an invalid create or closing the export drawer, the user can continue create/edit/filter flows without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_flow_terminates_at_artifact"
description = "Export flow: after two creates with payees Ada Books and Evening Market, Export report JSON contains both payees, Markdown shows Expense Breakdown Report totals, and Download/Copy affordances work with a Copied confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "burn_rate_and_palette_flows"
description = "Burn rate flow: lowering the ceiling below projected month-end spend shows over-burn treatment; command palette flow: Cmd/Ctrl+K then Switch to Trends activates Trends"
type = "binary"
weight = 1.0

