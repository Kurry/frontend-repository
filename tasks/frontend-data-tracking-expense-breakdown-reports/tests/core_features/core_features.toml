[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_transactions_visible_on_load"
description = "On load, the transactions list shows at least 8 seeded rows with date, payee, category, account, and amount visible, spanning enough expense categories (roughly 8-10) that the breakdown legend and pie are visibly multi-category"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "created_transaction_appears_in_list"
description = "After creating a transaction with payee Ada Books and a valid amount matching the field contract, the text Ada Books is visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "three_creates_add_exactly_three_rows"
description = "After adding 3 new valid transactions on top of the seed set, the list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "expense_create_updates_kpi"
description = "After creating an expense transaction, Total Expenses or Net KPI updates to reflect the new amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "edited_payee_replaces_old_value"
description = "After editing a payee from the seeded value to Evening Market, the text Evening Market is visible and the previous payee is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "deleted_transaction_removed_from_list"
description = "After deleting a transaction, that payee is no longer visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_state_after_deleting_all"
description = "After deleting all transactions, the list region shows an empty state message with no transaction rows remaining, and the summary metric cards and transaction summary strip reflect zero/empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_create_blocked_with_messages"
description = "After submitting create with an empty payee or missing amount, no row is added, the transactions count is unchanged, and inline validation messages naming the offending fields are visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "category_filter_narrows_list"
description = "After filtering transactions by a category (with mixed categories present), only matching rows remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "chart_tab_switch_stays_in_page"
description = "After switching between Breakdown and Trends chart tabs, the chart panel swaps without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "chart_and_list_modes_coexist"
description = "After focusing the transactions list versus the chart panel (list vs chart interaction modes), both remain usable without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "hover_feedback_on_interactive_chrome"
description = "When hovering sidebar items, transaction rows, or primary buttons, a visible hover wash or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "bulk_action_updates_rows_and_aggregates"
description = "After selecting multiple transaction rows and running bulk categorize or bulk delete, the selected rows update category together or disappear from the list and KPIs/charts reflect the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "sankey_flow_structure_and_legend"
description = "In Breakdown view, the sankey-style flow shows income-source nodes feeding an Income hub that splits into a Net Income node and expense-category nodes, with node labels showing amounts and a per-category legend listing each expense category's amount and share percentage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "summary_strip_tracks_collection"
description = "The transaction summary strip (total count, largest transaction, average transaction, total income, first/last transaction dates) reflects the current collection and updates after a transaction is added or deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "kpi_cards_derive_from_collection"
description = "Summary metric cards (Total Income, Total Expenses, Net Income, Savings Rate) derive from the transactions collection, with Net Income equal to income minus expenses and Savings Rate equal to net divided by income as a percentage, and they update when a transaction is created, edited, or deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "trends_doughnut_legend_and_tooltip"
description = "Trends view renders a doughnut of expense categories with a legend showing each category's amount and percentage of total expenses, and hovering a slice reveals a tooltip with that amount and percentage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "filters_recompute_and_show_empty_state"
description = "Category and income-vs-expense filters recompute the visible list from the shared collection, and a filter matching nothing shows an empty state message instead of a blank table"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "create_flow_multi_surface_chain"
description = "Starting from the seeded state: note the table row count and the four summary metric card values, then create a valid transaction via the form. Confirm the table gains exactly one row (count delta measured immediately around the action), the four summary metric cards recompute to include its amount, the transaction summary strip updates its count and average, and switching to the Breakdown or Trends chart shows that transaction's category reflected in the node labels, slices, and legend amounts — all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "edit_amount_propagates_to_both_legends"
description = "After editing an existing transaction's amount via the UI, that same row shows the new amount in the table, the summary metric cards change by exactly the difference, and the matching category's amount and percentage update in both the pie legend and the sankey flow legend without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "delete_flow_clears_row_selection_and_aggregates"
description = "After selecting a transaction row and then deleting that transaction: its row disappears from the table and from the current selection, the summary strip count decreases by exactly one, and its amount is dropped from the summary metric cards and from every chart legend"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "filter_clear_restores_full_list_exactly"
description = "Applying the category filter narrows the visible table rows to that category and clearing the filter restores the full list exactly (same rows and count as before filtering); the income vs expense filter narrows and restores the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "double_submit_creates_exactly_one_row"
description = "Double-activating the create form's submit control in quick succession creates exactly one transaction: the row count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "ledger_sidebar_shell_with_inert_nav"
description = "The sidebar shows a branded Ledger nav of roughly a dozen items (Dashboard, Accounts, Transactions, Cash Flow, Reports, Budget, Recurring, Goals, Investments, Forecasting, Advice) with Reports as the active item, a Shared demo report eyebrow, Demo mode/Sample data chips, notification and settings icons, and an Alex Rivera profile; clicking any other nav item is an inert demo control that does not navigate away from the reports page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "inert_chrome_and_tab_switch_fire_toasts"
description = "Clicking inert chrome actions (Filters, Date, Save, Sort, Columns) and switching chart tabs each fire a demo toast confirming the action, while real create, edit, delete, export, and import perform actual state changes rather than being replaced by a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "charts_redraw_on_filter_change"
description = "After applying the category or income-vs-expense filter, the sankey node labels, pie slices, legends, and summary tiles redraw to the new filtered totals without a page reload, and the redrawn values meaningfully differ from the unfiltered ones"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "form_submit_disabled_until_valid"
description = "The transaction create/edit form presents date, payee, category, account, amount, and optional status fields; the submit control stays disabled until every required field is valid against the field contract, and each invalid field shows an inline message naming that field before submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "income_rows_styled_positive"
description = "In the transactions list, income amounts render with a leading + and a distinct positive (green) color while expense amounts render neutral"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.38"
name = "field_contract_rejects_zero_and_cross_field"
description = "Submitting create with amount 0, or with category Salary and a negative amount, adds no row; inline validation messages name the offending fields and the transactions count is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "date_range_and_payee_search_narrow_list"
description = "Applying a date-range filter narrows visible rows to dates inside the inclusive range, and typing a payee search query narrows rows to case-insensitive substring matches; clearing each control restores the prior wider list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "burn_rate_panel_tracks_ceiling_and_overage"
description = "The Burn rate panel shows daily expense totals for the current calendar month against an editable monthly ceiling and a projected month-end spend; lowering the ceiling below the projection shows a visible over-burn treatment that names the overage, and raising it above clears the treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "command_palette_runs_declared_commands"
description = "Pressing Cmd+K or Ctrl+K opens a command palette listing at least New transaction, Switch to Breakdown, Switch to Trends, Export report, Import CSV, Focus payee search, and Clear filters; choosing Switch to Trends activates the Trends panel and choosing Export report opens the export drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "export_report_json_and_markdown_reflect_session"
description = "After creating transactions with payees Ada Books and Evening Market, Export report shows a JSON tab whose transactions array contains both payees and whose totals.count equals the live summary strip count, and a Markdown tab titled Expense Breakdown Report with Totals and Category breakdown sections; Download JSON and Download Markdown offer expense-breakdown-report.json and expense-breakdown-report.md; Copy shows a Copied confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "import_csv_diagnostic_commits_valid_rows"
description = "Import CSV accepts a header date,payee,category,account,amount,status; invalid rows appear in a mismatch list naming the row number and offending field; committing valid rows with Replace all updates the table, KPIs, charts, and burn rate, and a subsequent export reflects the committed rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "command_palette_filter_and_escape"
description = "With the command palette open, typing filters the command list by title; Escape closes the palette without performing any action; choosing a command (for example New transaction or Clear filters) closes the palette and performs that action through the same handlers as the visible controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "export_mirrors_burnrate_and_filters"
description = "The Export report JSON includes a filters object mirroring the active category, type, date-range, and payee controls and a burnRate object (ceiling, monthToDate, projectedMonthEnd, over) mirroring the Burn rate panel; the Markdown tab includes a Burn rate section naming ceiling, month-to-date, projected month-end, and over status"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "import_append_mode_adds_rows"
description = "Import CSV with the Append mode commits valid rows on top of the existing collection: the table row count increases by exactly the number of committed valid rows and the KPIs, charts, burn rate, and a subsequent export include both the prior and appended transactions"
type = "binary"
weight = 1.0

