[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "reports_workspace_density"
description = "Ledger sidebar + metrics + chart + transactions density remains a reports workspace, not a marketing landing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_state_visually_present"
description = "Empty transactions state is visually present when the collection or filter result is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "static_mockups_instead_of_live_ui"
description = "Shows only static chart mockups with a non-interactive transactions table"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "income_positive_expense_neutral_multi_hue_charts"
description = "Income amounts read as positive (green with a leading +) while expenses read neutral, and the breakdown sankey and trends doughnut use multi-hue category fills"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "soft_mint_palette_and_ledger_mark"
description = "The UI uses the soft mint finance palette — light page and sidebar washes with brand teal (#0F3D3E) and accent mint (#7BC4B8) visible in chrome, accents, or branding — and a Ledger mark appears in the sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "sidebar_plus_main_column_structure"
description = "The layout shows a persistent left sidebar beside a main column containing, in order: page chrome actions (Filters / Date / Save), four statistic cards, the chart card, the transactions table/list, and the transaction summary tile strip"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "sankey_bars_curved_links_doughnut_legend"
description = "The Breakdown sankey renders its income-source, Income hub, Net Income, and expense-category nodes as colored bars connected by curved, proportionally sized links with amount labels on the nodes, and the Trends view renders a multi-hue doughnut accompanied by a category legend"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "single_consistent_icon_set"
description = "One icon set is used consistently across the sidebar, chrome actions, and table controls, with no visibly mixed icon styles"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.9"
name = "sidebar_persistent_at_desktop_widths"
description = "At viewport widths of 1024 pixels and above, the left sidebar stays persistently visible beside the main reports column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "narrow_width_stacking_without_overflow"
description = "At a narrow viewport width (e.g. 375px), the main column content (metric cards, chart card, table, summary strip) stacks vertically with no horizontal scrolling and no clipped content"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "narrow_width_layout_breaks"
description = "At a narrow viewport width, content overflows the viewport horizontally, overlaps, or is clipped so parts of the reports UI become unreadable or unreachable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.12"
name = "consistent_capitalization_convention"
description = "Headings, buttons, and nav labels use one consistent capitalization convention (title case or sentence case) throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "consistent_currency_formatting"
description = "Currency values use the same symbol and decimal treatment across the metric cards, table, legends, tooltips, and summary strip"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "toast_and_empty_state_copy_quality"
description = "Toasts name the action they confirm, and empty states explain what belongs in the region and how to add it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "placeholder_text_in_shipped_ui"
description = "Placeholder or lorem text (e.g. 'Lorem', 'TODO', 'asdf', template variable names) is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
