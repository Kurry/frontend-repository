[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "reports_workspace_density"
description = "The reports workspace reads as a dense finance tool surface (sidebar, metric cards, chart card, burn-rate panel, table, summary strip) rather than a marketing landing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_state_visually_present"
description = "When the transactions list is empty, a visible empty-state treatment occupies the list region"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "static_mockups_instead_of_live_ui"
description = "Primary surfaces are static mockups or images that stay unchanged after create, edit, or delete actions"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "income_positive_expense_neutral_multi_hue_charts"
description = "Income amounts read as positive (green / leading +), expenses neutral, and Breakdown/Trends charts use multi-hue category fills"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "soft_mint_palette_and_ledger_mark"
description = "The UI uses a soft mint finance palette with brand teal (#0F3D3E) and accent mint (#7BC4B8), and a Ledger mark appears in the sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "sidebar_plus_main_column_structure"
description = "Layout is a persistent left sidebar plus a main column containing chrome actions, four statistic cards, chart card, burn-rate panel, transactions table, and summary strip"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "sankey_bars_curved_links_doughnut_legend"
description = "Breakdown sankey renders colored bars with curved proportional links and node amount labels; Trends renders a doughnut with a category legend"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "single_consistent_icon_set"
description = "One icon set is used consistently across the sidebar, chrome actions, and table controls with no mixed icon styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "sidebar_persistent_at_desktop_widths"
description = "At widths of 1024 pixels and above, the left sidebar stays persistently visible beside the main reports column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "narrow_width_stacking_without_overflow"
description = "At narrower widths the main column stacks vertically with no horizontal scrolling and no clipped content"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "narrow_width_layout_breaks"
description = "At narrow widths content clips, overlaps, or forces page-level horizontal scrolling"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.12"
name = "consistent_capitalization_convention"
description = "Headings, buttons, and nav labels use one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "consistent_currency_formatting"
description = "Currency values use the same symbol and decimal treatment across metric cards, table, legends, tooltips, summary strip, burn-rate panel, and export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "toast_and_empty_state_copy_quality"
description = "Toasts name the action they confirm and empty states explain what belongs in the region and how to add it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "placeholder_text_in_shipped_ui"
description = "Placeholder or lorem text appears in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.16"
name = "export_drawer_and_over_burn_treatments"
description = "The export drawer shows JSON/Markdown tabs with a scrollable preview plus Download and Copy affordances; over-burn treatment uses an error color family distinct from ordinary row hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
