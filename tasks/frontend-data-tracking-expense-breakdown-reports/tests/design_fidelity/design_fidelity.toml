[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing among sidebar, metric cards, chart card, and table follow a consistent scale matching the reference screenshots' dense reports layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography hierarchy for page title, metric labels, and table headers matches the soft mint Ledger reports reference treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "Desktop layout matches the reference: left sidebar with Ledger nav, four statistic cards, chart card with Breakdown/Trends, transactions table, and summary strip"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes from the reference experience (chart tab swap, row add/remove, toast) animate rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Responsive stacking of the main column at narrow widths matches the reference screenshots' content order expectations"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Chrome action buttons, chart pills, and table controls match the soft mint control styling of the reference"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Metric values, section labels, and table body text show a clear size/weight hierarchy as in the reference"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons and inputs show distinct default, hover, focus, disabled, and error treatments consistent with the reference chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Light page/sidebar wash, teal/mint accents, and card surfaces match the soft mint finance reference look"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover washes on nav/rows and toast enter/exit match the reference microinteraction language"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Sizing or spacing among cards, chart, and table contradicts the dense reports scale shown in the reference"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Prominent colors fall outside the soft mint / brand teal / accent mint palette from the instruction and reference"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Control or card sizing mismatches the reference reports density"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required chart-tab, row, or toast animations from the reference experience are missing or wrong"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Specified chrome controls use unstyled browser defaults instead of the Ledger reports treatment"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "Layout is misaligned versus the reference at desktop or narrow breakpoints"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Reference-critical elements (sidebar mark, metric cards, chart card, table) are clipped or offscreen"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Structure deviates from the reference by omitting the sidebar-plus-main reports composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text are undifferentiated compared to the reference hierarchy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover and toast microinteractions deviate from the reference language"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the reference screenshots that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
