[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: create a transaction, switch the chart tab to Trends, apply a category filter and a payee search query, then reload. All facets coherently reset to the seeded baseline — seeded transactions, default chart tab, cleared filters and search — never a mix of reverted and surviving state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort the transactions table by amount ascending, note the order, then sort descending; the order reverses correctly relative to ascending, proving sort is derived from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: change the category filter or date range and confirm the sankey/pie legends, summary strip, and burn-rate month-to-date change meaningfully rather than redrawing identically regardless of input"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: create or edit a transaction in the table and confirm the same amount appears in the matching chart legend and in the Export report JSON totals without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the summary strip transaction count immediately before and immediately after creating one valid transaction; the delta is exactly +1 with no off-by-one or lagging counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: create two expense transactions in different categories with different amounts; the two category legend lines and the Export report categoryBreakdown entries differ in the ways the inputs dictate"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start creating a transaction, open the command palette and switch chart tabs, finish creating a second transaction, then confirm both rows exist and neither flow corrupted filters or burn-rate state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: delete all transactions so the empty state shows and KPIs read zero, then Import CSV with Replace all using valid rows; the table, cards, strip, charts, burn rate, and a fresh export track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_pipeline_contains_session_work"
description = "Full export pipeline: mutate the collection with two distinct payees, open Export report, and confirm the JSON transactions array contains both payees and totals.count matches the live strip; an export that omits either payee fails"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_restores_state"
description = "Import/export round-trip: after mutations, capture the export JSON transaction set, delete all rows, Import CSV built from those rows with Replace all, and confirm the table and a fresh export transactions array match the captured set"
type = "binary"
weight = 1.0

