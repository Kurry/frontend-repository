[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_washes_and_pointer_cursors"
description = "Hovering (with the real pointer) sidebar/nav items and action controls shows a pointer cursor and a hover wash, transaction rows take a light mint wash on hover, and chart sectors keep a pointer cursor"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_page_alive"
description = "Chart/list mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "static_chrome_missing_hover_feedback"
description = "Omits hover washes on rows or nav so the reports chrome feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "chart_tab_pill_toggle_swaps_in_place"
description = "Clicking the Breakdown / Trends pill toggle (via the real UI control) swaps the chart panels in place without a page reload, and the active pill gains visibly stronger weight"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "row_create_and_delete_animate"
description = "When a transaction is created or deleted through the real UI controls (not a state shortcut), the new row animates into the table and the deleted row animates out rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "bulk_delete_rows_animate_out"
description = "Bulk deleting several selected rows through the real UI control animates each removed row out rather than snapping the list to its new state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "toast_enter_hold_exit_cycle"
description = "A demo toast enters from below with a short ease, holds briefly (roughly 1.5s), then exits; toasts fire both on chart-tab switches and on clicking inert chrome actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "pie_slice_hover_tooltip_and_lift"
description = "Hovering a Trends pie slice with the real pointer reveals a tooltip showing that category's amount and percentage, and the hovered slice may lift or offset slightly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "list_changes_snap_without_transition"
description = "Row insertions, deletions, or bulk removals snap instantly with no transition, or the toast appears and disappears abruptly with no enter/exit motion"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
