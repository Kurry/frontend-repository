[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_washes_and_pointer_cursors"
description = "Hovering (with the real pointer) sidebar/nav items and action controls shows a pointer cursor and a hover wash, transaction rows take a light mint wash on hover, and chart sectors keep a pointer cursor"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_page_alive"
description = "Chart/list mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "chart_tab_pill_toggle_swaps_in_place"
description = "Clicking the Breakdown / Trends pill toggle (via the real UI control) swaps the chart panels in place without a page reload, and the active pill gains visibly stronger weight"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "row_create_and_delete_animate"
description = "When a transaction is created or deleted through the real UI controls (not a state shortcut), the new row animates into the table and the deleted row animates out rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "bulk_delete_rows_animate_out"
description = "Bulk deleting several selected rows through the real UI control animates each removed row out rather than snapping the list to its new state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "toast_enter_hold_exit_cycle"
description = "A demo toast enters from below with a short ease, holds briefly (roughly 1.5s), then exits; toasts fire both on chart-tab switches and on clicking inert chrome actions; Copied confirmation follows the same toast language"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "pie_slice_hover_tooltip_and_lift"
description = "Hovering a Trends pie slice with the real pointer reveals a tooltip showing that category's amount and percentage, and the hovered slice may lift or offset slightly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "export_drawer_and_palette_animate_in"
description = "Opening the export drawer or command palette through the real UI control uses a short opacity/slide enter transition rather than snapping fully open"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "reduced_motion_disables_entry_exits"
description = "With prefers-reduced-motion set, entry/exit animations are removed and state changes apply instantly while export, import, and CRUD remain reachable"
type = "binary"
weight = 0.5

