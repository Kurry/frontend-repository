[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_coachmarks_beyond_spec"
description = "Optional: guided first-run coachmarks highlight Export report and the burn-rate panel beyond the required chrome"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "printable_markdown_stylesheet"
description = "Optional: a printable stylesheet improves the Markdown report preview for paper/PDF output beyond the required drawer"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "palette_keyboard_shortcut_footer"
description = "Optional: denser keyboard shortcuts are listed inside the command palette footer beyond the required command list"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "enhanced_burn_rate_storytelling"
description = "Optional: burn-rate projection storytelling (annotations or day callouts) adds clarity beyond the required bars and overage text"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "delightful_export_microinteractions"
description = "Optional: export download or copy offers a delightful microinteraction beyond the required Copied toast"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "advanced_filter_chips_ux"
description = "Optional: removable filter chips summarize category, type, date range, and payee search beyond the required controls"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "polished_ledger_brand_moments"
description = "Optional: polished Ledger brand moments (mark animation or report title treatment) exceed the required sidebar mark"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "import_diagnostic_row_preview"
description = "Optional: import diagnostic offers a richer per-cell preview or fix affordance beyond the required mismatch list"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "sankey_explore_depth"
description = "Optional: sankey node focus or category drill-down explores flows beyond the required structure and legend"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_finance_polish"
description = "Optional: overall finance-tool polish visibly exceeds the specification in ways a real operator would notice"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "optional_enhancement_breaks_required_export"
description = "An optional enhancement (coachmark, printable stylesheet, or palette footer) blocks or replaces the required Export report download/copy path"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant, browser-observable innovative enhancement beyond the specification that is NOT covered by any other criterion in this file. Cite the concrete evidence (element, interaction, page state). If nothing beyond the covered optional items stands out, answer no."
type = "binary"
weight = 0.5
