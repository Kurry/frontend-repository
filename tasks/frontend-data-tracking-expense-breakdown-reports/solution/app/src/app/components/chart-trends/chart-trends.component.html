<div id="demo-trends-panel" class="chart-panel" role="tabpanel" aria-labelledby="tab-trends">
  <div class="pie-layout">
    <div class="pie-canvas-wrap" style="height: 360px; width: 360px;">
      <div echarts [options]="(options$ | async)" style="height: 100%; width: 100%;"></div>
    </div>
    <ul class="pie-legend" id="trends-legend">
      <li *ngFor="let item of (legendData$ | async)">
        <span class="swatch" [style.background]="item.color"></span>
        <span>{{ item.name }}</span>
        <span class="legend-meta">{{ item.amount | currency:'USD':'symbol':'1.2-2' }} ({{ item.percent | number:'1.2-2' }}%)</span>
      </li>
    </ul>
  </div>
</div>
