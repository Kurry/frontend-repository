<p-toast></p-toast>

<!-- Transaction Create/Edit Dialog -->
<p-dialog header="Create Transaction" [(visible)]="txDialogVisible" [modal]="true" [focusTrap]="true" [closeOnEscape]="true" [style]="{width: '400px'}">
  <form [formGroup]="txForm" (ngSubmit)="onSubmit()">
    <div class="flex flex-col gap-4 mt-4">
      <div>
        <label for="date" class="block text-sm font-medium text-gray-700">Date</label>
        <input id="date" type="date" pInputText formControlName="date" class="w-full mt-1">
        <small class="text-red-500" *ngIf="formErrors['date']">{{ formErrors['date'] }}</small>
      </div>

      <div>
        <label for="payee" class="block text-sm font-medium text-gray-700">Payee</label>
        <input id="payee" type="text" pInputText formControlName="payee" class="w-full mt-1">
        <small class="text-red-500" *ngIf="formErrors['payee']">{{ formErrors['payee'] }}</small>
      </div>

      <div>
        <label for="category" class="block text-sm font-medium text-gray-700">Category</label>
        <select id="category" formControlName="category" class="w-full mt-1 border border-gray-300 rounded p-2">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <small class="text-red-500" *ngIf="formErrors['category']">{{ formErrors['category'] }}</small>
      </div>

      <div>
        <label for="account" class="block text-sm font-medium text-gray-700">Account</label>
        <select id="account" formControlName="account" class="w-full mt-1 border border-gray-300 rounded p-2">
          <option *ngFor="let acc of accounts" [value]="acc">{{ acc }}</option>
        </select>
        <small class="text-red-500" *ngIf="formErrors['account']">{{ formErrors['account'] }}</small>
      </div>

      <div>
        <label for="amount" class="block text-sm font-medium text-gray-700">Amount</label>
        <p-inputNumber id="amount" formControlName="amount" mode="currency" currency="USD" locale="en-US" styleClass="w-full mt-1"></p-inputNumber>
        <small class="text-red-500" *ngIf="formErrors['amount']">{{ formErrors['amount'] }}</small>
      </div>

      <div class="flex items-center gap-2">
        <p-checkbox id="income" formControlName="income" [binary]="true"></p-checkbox>
        <label for="income" class="text-sm font-medium text-gray-700">Is Income?</label>
      </div>
    </div>
    
    <div class="flex justify-end gap-2 mt-6">
      <button pButton type="button" label="Cancel" class="p-button-text p-button-secondary" (click)="txDialogVisible = false"></button>
      <button pButton type="submit" label="Save" [disabled]="isSubmitting" class="p-button-primary"></button>
    </div>
  </form>
</p-dialog>

<!-- Export Drawer -->
<p-dialog header="Export report" [visible]="(drawerOpen$ | async) ?? false" (visibleChange)="closeDrawer()" [modal]="true" position="right" [focusTrap]="true" [closeOnEscape]="true" [style]="{width: '450px', height: '100vh'}">
  <div class="p-4 flex flex-col gap-4">
    <div class="flex gap-2">
      <button pButton type="button" label="JSON" [class.p-button-outlined]="exportFormat !== 'json'" (click)="setExportFormat('json')"></button>
      <button pButton type="button" label="Markdown" [class.p-button-outlined]="exportFormat !== 'markdown'" (click)="setExportFormat('markdown')"></button>
    </div>
    <textarea readonly class="w-full h-96 p-2 border border-gray-300 rounded font-mono text-sm resize-none">{{ exportPreview }}</textarea>
    <div class="flex gap-2">
      <button pButton type="button" label="Copy" (click)="copyExport()"></button>
      <button pButton type="button" [label]="'Download ' + (exportFormat === 'json' ? 'JSON' : 'Markdown')" class="p-button-outlined"></button>
    </div>
  </div>
</p-dialog>

<!-- Command Palette -->
<p-dialog header="Import CSV" [visible]="(cmdPaletteOpen$ | async) ?? false" (visibleChange)="closeCmdPalette()" [modal]="true" [focusTrap]="true" [closeOnEscape]="true" [style]="{width: '500px'}">
  <div class="p-4 flex flex-col gap-4">
    <textarea rows="6" class="w-full p-2 border border-gray-300 rounded font-mono text-sm" placeholder="Paste CSV data here..." (input)="importText = $any($event.target).value"></textarea>
    <button pButton type="button" label="Commit valid rows" (click)="handleImport()"></button>
  </div>
</p-dialog>
