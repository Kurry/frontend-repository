[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "vd-1"
name = "study_desk_palette_applied"
description = "The page background reads as parchment (#F4F1EA) with white panel surfaces and near-black body text; the header bar and board frame use the deep navy (#1E3A5F) and the active tree node, primary buttons, and star toggle use the brass gold accent (#C9A24B)"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-2"
name = "serif_headings_sans_body"
description = "Headings render in a serif stack at 1.5rem or larger while the move tree, statistics, and body copy use a sans-serif stack near 16px"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-4"
name = "board_squares_legible_all_themes"
description = "Cycling all 3 board themes keeps light and dark squares clearly legible and distinguishable under every theme"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-5"
name = "selected_node_border_your_line_distinct"
description = "The selected tree node keeps a persistent accent-colored left border that follows the selection, and the Your Line branch and its New Line badge are visibly distinct from bundled main-line and branch styling"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-6"
name = "mobile_stack_at_375"
description = "At approximately 375px wide the board, move tree, and statistics panel stack vertically without horizontal scrolling or truncated data-dense text"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-7"
name = "favorites_empty_state_friendly"
description = "Enabling Favorites Only with nothing favorited shows a friendly empty-state message rather than a blank list"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-8"
name = "shape_system_radii"
description = "Cards, panels, and the saved-lines drawer use approximately 10px corner radius while buttons and move chips use approximately 6px"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-9"
name = "consistent_icon_set"
description = "One consistent icon set is used across the header, board controls, saved-lines actions, Export center, command palette, and the star toggle, sized and aligned uniformly"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-10"
name = "flash_colors_success_danger_distinct"
description = "The correct-move flash uses a green matching #2F8F4E and the incorrect-move flash uses a red matching #C0392B, clearly distinct from each other"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-11"
name = "family_groups_visually_separated"
description = "Opening family groups (Open Games, Semi-Open Games, Closed Games, Flank Openings) are visually separated with clear headers so browsing by family is easy at a glance"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-12"
name = "validation_messages_danger_beside_field"
description = "Inline validation messages render in the danger color directly beside the field they name"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-13"
name = "desktop_side_by_side_no_overflow"
description = "At desktop widths the library, board, and tree/statistics panels present side by side, and no content clips or overflows the viewport at any width between 375px and 1440px"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-14"
name = "touch_targets_comfortable_at_375"
description = "Board controls, move chips, and the star toggle remain comfortably tappable at the 375px layout"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-15"
name = "labels_specific_verbs_consistent_case"
description = "Headings, buttons, and labels use one consistent capitalization convention, and action labels are specific verbs such as Save this line, Practice this line, Flip board, Export center, Download study pack, and Import study pack rather than generic labels"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-16"
name = "messages_name_problem_and_fix"
description = "Where the app renders validation, rejection, or empty-state copy, the text names the specific problem and the fix (e.g. the name field must not be empty; star an opening to see it here) rather than a bare rejection or blank region"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "vd-17"
name = "export_center_monospace_previews"
description = "Export center uses monospaced preview blocks for Study pack JSON and Current line PGN with clear tab or section labels"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-18"
name = "command_palette_visual_structure"
description = "The command palette is a centered overlay with a search field, kind labels (Opening, Saved line, Theme, Action) on result rows, and a highlighted keyboard selection"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-19"
name = "bulk_bar_appears_on_selection"
description = "The bulk action bar appears above My Saved Lines when any entry is selected and shows a live selected count"
type = "binary"
weight = 1.0
[[criterion]]
id = "vd-neg-1"
name = "board_squares_illegible_some_theme"
description = "Board squares are indistinguishable, overlapping, or unreadable under one or more board themes"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "vd-neg-2"
name = "selected_node_unmarked"
description = "No selected tree node is visually marked, so the current position in the tree cannot be identified"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "vd-neg-3"
name = "mobile_overflow_or_clipping"
description = "At approximately 375px wide the page scrolls horizontally or key text clips, truncates, or overflows its container"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "vd-neg-4"
name = "placeholder_copy_shipped"
description = "Placeholder or filler copy (e.g. lorem ipsum, TODO, 'coming soon' stubs) appears somewhere in the shipped UI"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "vd-neg-5"
name = "export_center_looks_unstructured"
description = "Export center lacks distinguishable Study pack JSON / PGN sections or uses non-monospaced walls of text without labels"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "vd.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
