[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — board squares, Save this line, Practice this line, star toggle, Undo/Redo, Export center, Import study pack, bulk actions, and command palette — is keyboard accessible with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Save and rename forms, Export center dialogs, import confirmation, bulk delete confirmation, and the command palette trap focus while open and return focus to the originating control on close"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls in the header, board chrome, and star toggle expose accessible names"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Practice feedback (Correct! and Try again), inline validation, import errors, and Copy confirmation are conveyed both visually and via aria-live polite regions"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Save, rename, and bulk tag form fields use explicit labels naming name, notes, tags, or the relevant SavedLine fields"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings follow a logical order with LineForge as the primary heading and section headings for library, statistics, and Export center"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Main landmark regions distinguish the library, board/explorer, and panels so assistive tech can navigate the study shell"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Body text, navy header chrome, brass accent controls, and danger validation text have sufficient color contrast against their backgrounds"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Semantic HTML roles such as nav, main, button, and dialog are used for chrome, drawers, and overlays"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "Animations respect the prefers-reduced-motion setting while keeping state changes correct"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Export center, command palette, Undo/Redo, or board controls cannot be activated or reached via keyboard"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured on Tab through study controls"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom components for the board, palette, or bulk bar use non-semantic tags and lack ARIA roles or labels"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Favorite starred state or practice correct/incorrect feedback is conveyed by color alone with no text or icon cue"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n5"
name = "live_regions_missing_for_feedback"
description = "Practice Correct!/Try again or import errors have no aria-live announcement"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n6"
name = "modals_do_not_return_focus"
description = "Closing save, palette, or confirmations fails to return focus to the control that opened them"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
