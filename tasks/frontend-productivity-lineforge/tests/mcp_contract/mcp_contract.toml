[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 are initialized and bound"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers for browse, entity, session, and artifact operations invoke the same logic as the visible LineForge controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations and destinations (library, explorer, practice, notable-games, saved-lines, export-center) are available"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool automation"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, delete, and toggle on saved-line work through the contract"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.6"
name = "artifact_operations_are_bound"
description = "Artifact operations export, import, and copy are bound for study-pack-json and pgn formats and study-pack import mode"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations, favorites/family filters, and classic/forest/slate themes match the allowed specification"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared module routes or capabilities beyond the LineForge bindings are exposed"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation are correctly surfaced for live-relay session operations and deliver-out-of-order demo"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.11"
name = "entity_fields_cover_saved_line_contract"
description = "Entity fields name, opening-code, moves, ply, tags, notes, and side-to-move are declared and usable for saved-line create/update"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.12"
name = "export_center_destination_bound"
description = "Browse open to export-center reaches the same Export center surface as the visible control"
type = "binary"
weight = 1.0
