[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "coachmarks_for_study_flows"
description = "Optional coachmarks tour Practice this line, Save this line, and Export center on first visit"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.2"
name = "printable_study_sheet_preview"
description = "A printable study sheet layout preview is available beyond the required Export center tabs"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.3"
name = "keyboard_move_entry"
description = "Keyboard SAN or UCI move entry for the board is supported beyond click-only piece movement"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.4"
name = "richer_stats_graphics"
description = "Statistics or practice surfaces offer an enhanced interactive graphic beyond the required stacked bar"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.5"
name = "study_desk_brand_polish"
description = "Beyond-spec study-desk brand polish (editorial flourishes, paper texture, or manual-like chapter treatments) is visible without breaking the parchment/navy/brass system"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.6"
name = "repertoire_compare_bonus"
description = "A beyond-spec compare of two saved lines or openings is available as bonus polish"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.7"
name = "engine_eval_sparkline_bonus"
description = "A beyond-spec illustrative eval sparkline or depth readout accompanies practice without claiming live engine connectivity"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.8"
name = "share_link_hash_bonus"
description = "A beyond-spec shareable hash or clipboard study link encodes the current line beyond Download/Copy artifacts"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.9"
name = "sound_cues_bonus"
description = "Optional subtle move or practice sound cues that respect reduced-motion/user preference"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.10"
name = "competition_level_study_polish"
description = "Competition-level polish is visible in the study workflow beyond the minimum exportable end state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "experience_is_generic_template_shell"
description = "Beyond the mandated study surfaces, the UI reads as a generic template shell with no study-desk-specific polish or optional enhancement."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
