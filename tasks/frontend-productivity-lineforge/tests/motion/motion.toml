[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "mo-1"
name = "practice_flash_and_toast_feedback"
description = "Playing the correct move in Practice through the real board control flashes the board green for roughly 0.65s and shows a Correct! toast; an incorrect legal move flashes red and shows Try again before the board reverts"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-2"
name = "hover_feedback_on_all_controls"
description = "Hovering (without clicking) a button, the star toggle, an opening list item, a move-tree chip, a board control, an Export center control, and a command-palette row each produces a visible hover change distinct from the resting state"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-3"
name = "visible_focus_indicator_on_tab"
description = "Tabbing through interactive controls shows a clearly visible focus indicator on each focused element"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-4"
name = "toasts_slide_in_and_autodismiss"
description = "Toasts enter with a short slide-in (about 0.25s) and clear on their own without trapping interaction"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-5"
name = "saved_list_add_remove_animates"
description = "Saving a line animates the new entry into the My Saved Lines list and deleting an entry animates it out, with surrounding entries sliding smoothly into place rather than snapping"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-6"
name = "library_filter_transitions_animate"
description = "Narrowing the library by search or by the Favorites Only filter animates list items in and out instead of instantly swapping the list"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "mo-7"
name = "captured_piece_animates_into_tally"
description = "A newly captured piece animates into the captured-piece tally rather than appearing abruptly"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "mo-8"
name = "piece_lift_targets_lastmove_highlight"
description = "Picking up a board piece lifts it and reveals target markers on its legal destination squares, and the moved piece and last-move squares are highlighted after a move"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-9"
name = "selection_accent_border_follows_node"
description = "Clicking a different move-tree node through the real UI moves the persistent accent-colored left border from the previously selected node to the newly selected one"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "mo-10"
name = "palette_and_copy_motion"
description = "The command palette overlay enters with a brief opacity and scale transition, and Copy confirmation on Export center shows a short confirmation before resetting"
type = "binary"
weight = 1.0
[[criterion]]
id = "mo-11"
name = "bulk_bar_slides"
description = "The bulk action bar slides in when the first saved line is selected and slides away when the selection clears"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "mo-12"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, list and toast motion is reduced or removed and state changes still apply instantly and correctly"
type = "binary"
weight = 0.5
optional = true
