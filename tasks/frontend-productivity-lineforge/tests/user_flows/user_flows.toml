[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "save_line_updates_all_surfaces"
description = "Save flow: after exploring to a ply and submitting a valid SavedLine, the entry appears in My Saved Lines, the header saved-line count increases by exactly one, and Loading restores that ply with the matching tree node highlighted"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.2"
name = "invalid_save_shows_inline_validation"
description = "Save flow: submitting with an empty name or notes over 280 characters shows immediate inline validation naming the field and creates no entry"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.3"
name = "rename_saved_line_updates_list"
description = "Rename flow: renaming a saved entry updates its name in My Saved Lines and in the Study pack JSON savedLines without changing the count"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.4"
name = "delete_saved_line_updates_surfaces"
description = "Delete flow: deleting a saved entry removes it from My Saved Lines, decreases the header count by exactly one, and removes it from the Study pack JSON"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.5"
name = "practice_mode_switch_retains_opening"
description = "View/mode switch: entering Practice this line then exiting or loading another opening keeps explorer state coherent without losing the selected opening identity incorrectly"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last saved line, My Saved Lines shows its empty-state message explaining how to save one"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.7"
name = "favorites_filter_updates_library"
description = "Edge: Favorites Only narrows the library to starred openings and clears back to the full grouped list when disabled"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.8"
name = "saved_lines_drawer_preserves_workflow"
description = "Collapsible chrome: opening and closing View saved lines preserves the explorer board position and selected tree node"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.9"
name = "export_and_import_overlays_work"
description = "Overlays: Export center, import confirmation, and bulk delete confirmation open, complete their flows, and dismiss without trapping the user"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.10"
name = "failed_save_recovers_without_reload"
description = "Recovery: an invalid save or failed import shows feedback and leaves the user able to correct the form or dismiss without a page reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.11"
name = "export_pipeline_end_to_end"
description = "Export pipeline: after starring, saving a tagged line, and choosing Forest, Export center Study pack JSON contains those mutations and Current line PGN contains the displayed moves; Copy shows confirmation"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.12"
name = "import_round_trip_flow"
description = "Import round-trip: Import study pack of a previously exported pack reconstructs favorites, boardTheme, and My Saved Lines including tags and notes"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.13"
name = "undo_redo_flow"
description = "Undo round-trip: save then Undo removes the entry; Redo restores it; a new mutation after Undo disables Redo"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.14"
name = "command_palette_flow"
description = "Command palette: Ctrl/Cmd+K opens the palette, selecting an opening loads it, and selecting Export center opens that panel"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.15"
name = "bulk_tag_then_undo_flow"
description = "Bulk tag then undo: selecting 2 saved lines, Add tag study, then Undo restores both without that tag"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.16"
name = "reload_baseline_flow"
description = "Reload baseline: after session mutations, a page reload returns empty Favorites, empty My Saved Lines, Classic theme, and empty undo/redo stacks"
type = "binary"
weight = 1.0
