[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing follow the study-desk scale implied by the reference screenshots and the approximately 10px/6px radius system, with no arbitrary one-off values dominating computed styles"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the spec: serif headings at 1.5rem or larger and sans body near 16px for tree nodes, statistics, and body copy"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "Layout matches reference screenshots to within a small tolerance at desktop: library, board, and tree/statistics composition reads as the study desk overview"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions or animations are applied to the state changes the spec calls out, such as save/delete list motion, library filter transitions, practice flash, and palette entrance"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Responsive behavior matches the stacking pattern described for ~375px versus desktop side-by-side panels"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Button and form radii, padding, and navy/brass treatments conform to the visual_design tokens"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography has a clear hierarchy that distinguishes LineForge, section headings, and body/tree text"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, focus, disabled) are distinct for primary buttons, star toggle, Undo/Redo when empty, and theme selector"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Parchment background, white surfaces, navy header/board frame, and brass accents match the specified color treatments"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Microinteraction feedback for hover and press on buttons, chips, and list items follows the motion durations called out (~0.25s toasts, ~0.65s practice flash)"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.11"
name = "export_center_matches_instruction_chrome"
description = "Export center monospaced previews and command palette overlay structure match the instruction visual design lines"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the specified roughly 10px panel / 6px chip radius scale"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n2"
name = "typography_contradicts_spec"
description = "Headings use a sans stack where a serif study-manual look is required, or body text is far from the 16px base"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n3"
name = "layout_diverges_from_reference"
description = "Desktop layout diverges from the reference study composition so library/board/tree no longer read as the screenshot overview"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n4"
name = "palette_tokens_ignored"
description = "Parchment/navy/brass tokens are ignored in favor of an unrelated theme"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n5"
name = "state_treatments_missing"
description = "Hover/focus/disabled treatments are missing on primary study controls"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the instruction and reference screenshots that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
