[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "stacks_at_375_no_hscroll"
description = "At approximately 375px wide the board, move tree, and statistics panel stack vertically without horizontal scrolling and without truncating data-dense text"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "desktop_side_by_side"
description = "At desktop widths the library, board, and tree/statistics panels present side by side"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.3"
name = "no_overflow_375_to_1440"
description = "No content clips or overflows the viewport at any width between 375px and 1440px"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "touch_targets_at_375"
description = "Board controls, move chips, and the star toggle remain comfortably tappable at the 375px layout"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "export_and_palette_reflow_375"
description = "Export center previews and the command palette reflow to fit the column at 375px with no page-level horizontal scrolling"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "bulk_bar_usable_narrow"
description = "The bulk action bar remains usable at narrow widths when saved lines are selected"
type = "binary"
weight = 0.5
optional = true
