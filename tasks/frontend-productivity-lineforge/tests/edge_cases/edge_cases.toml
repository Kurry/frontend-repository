[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_present"
description = "Empty states render for empty My Saved Lines, Favorites Only with no stars, and a library search with no matches"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "Inline validation appears on save and rename before submit for empty name and other SavedLine field-contract violations"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and import error messages name the offending field or payload problem and the fix rather than only saying Invalid"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Success or confirmation feedback appears after save, Copy export, bulk tag, and import"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.5"
name = "live_relay_shows_stream_status"
description = "Live relay shows a visible stream status while Started, Paused, Disconnected, or catching up"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.6"
name = "destructive_actions_support_undo_or_cancel"
description = "Delete selected requires confirmation naming the count, and Undo can reverse save/delete/tag mutations"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.7"
name = "non_obvious_controls_have_help"
description = "Empty states and Export center labels explain how to save a line, star an opening, or import a study pack"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, and labels use semantic tags for save, theme, export, and palette controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Save form, command palette, and confirmation overlays close via explicit close/Escape and return focus"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.10"
name = "export_import_show_progress_feedback"
description = "Export Copy confirmation and import success or error provide visible progress/feedback steps"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.11"
name = "illegal_square_rejected"
description = "Clicking a non-legal destination rejects the move with a visible message and leaves the position uncorrupted"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.12"
name = "double_save_idempotent"
description = "Double-activating save creates exactly one entry and increases the header count by exactly one"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.13"
name = "malformed_import_rejected"
description = "Importing malformed Study pack JSON shows a visible error and leaves favorites, saved lines, and boardTheme unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.14"
name = "bulk_delete_disabled_when_none_selected"
description = "With zero checkboxes checked, the bulk bar stays hidden or its actions stay disabled so nothing is deleted"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.15"
name = "empty_undo_redo_disabled"
description = "Undo with an empty undo stack and Redo with an empty redo stack are disabled and activating them changes nothing"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty My Saved Lines or Favorites Only view shows nothing and provides no UI feedback"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Save/import validation errors are surfaced only in the browser console"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Save, Copy, bulk tag, or import lack visible feedback and silently succeed or fail"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Bulk Delete selected has no confirmation naming the count"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap primary interactive controls such as Save this line or Export center"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Save form, command palette, or confirmations cannot be dismissed via keyboard"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "SavedLine field-contract validation feedback is missing or delayed with no UI indication"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Primary action labels are ambiguous or missing (generic OK/Submit instead of Save this line / Import study pack)"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n9"
name = "non_obvious_flows_lack_guidance"
description = "Empty Favorites Only or empty My Saved Lines have no in-app guidance at all"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Export center, Undo/Redo, or command palette affordances are visually hidden or inaccessible"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
