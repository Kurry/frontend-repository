[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "ti-1"
name = "loads_interactive_ui"
description = "Loading / reaches an interactive UI showing the Opening Library and board, not a blank page, framework error overlay, or noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections are logged during initial load or while driving the core workflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-4"
name = "board_is_dom_grid_not_canvas"
description = "The exploration board and its squares are real DOM elements (div/grid nodes) with no canvas element used for the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-5"
name = "persistence_all_facets_restore"
description = "After favoriting an opening, saving a line, choosing a non-default board theme, and opening a specific opening, a full page refresh restores all four exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-6"
name = "keyboard_only_operability"
description = "Every interactive control is reachable and operable with the keyboard alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-7"
name = "form_dialogs_manage_focus"
description = "The save and rename forms trap focus while open and return focus to the control that opened them when closed"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-8"
name = "feedback_announced_via_aria_live"
description = "Practice feedback (Correct! and Try again) and inline form validation messages are exposed through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-9"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-10"
name = "rapid_scrubbing_stays_responsive"
description = "Rapidly stepping through a line with the Previous move / Next move scrubber stays responsive with no hangs or dropped interactions"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "ti-11"
name = "theme_switch_instant_no_shift"
description = "Switching board themes applies instantly with no page reload and no layout shift"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "ti-12"
name = "fresh_load_starts_unseeded"
description = "On a first load with cleared storage, Favorites and My Saved Lines start empty with no pre-seeded entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-neg-1"
name = "hidden_ground_truth_exposed"
description = "A hidden element, attribute, or window global not mandated by the PRD exposes internal ground-truth state (the expected practice move, computed answers) a real user could not reach through visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-2"
name = "grader_addressed_text_present"
description = "A judge-visible surface (rendered text, DOM comment, alt text, title, console) contains language addressed to a grader rather than a user or developer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-3"
name = "fabricated_success_state"
description = "A workflow shows a success state without the action occurring — a saved line or favorite is absent after reload, or an output is a hardcoded constant regardless of input"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-4"
name = "automation_keyed_behavior"
description = "The app renders or behaves differently when driven by automation (behavior keyed on navigator.webdriver or automation-specific signals)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-5"
name = "persistence_lost_on_refresh"
description = "Favorites, saved lines, board theme, or last-opened opening are lost after a full page refresh (persistence does not survive reload)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-6"
name = "session_only_state_persists"
description = "After a full page refresh, the session-only Your Line deviation branch, the practice streak or accuracy, or a notable-game replay position is still present instead of having been reset"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, persistence coherence, performance, accessibility) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, console output, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
