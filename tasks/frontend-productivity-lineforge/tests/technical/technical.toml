[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "ti-1"
name = "loads_interactive_ui"
description = "Loading / reaches an interactive UI showing the Opening Library and board, not a blank page, framework error overlay, or noscript fallback"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections are logged during initial load or while driving the core workflow including Export center and import"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-4"
name = "board_is_dom_grid_not_canvas"
description = "The exploration board and its squares are real DOM elements (div/grid nodes) with no canvas element used for the board"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-5"
name = "in_memory_reload_resets_session"
description = "After favoriting an opening, saving a line, choosing a non-default board theme, and opening a specific opening, a full page refresh returns the seeded baseline with empty Favorites, empty My Saved Lines, and Classic theme rather than restoring those session mutations"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-6"
name = "keyboard_only_operability"
description = "Every interactive control including Export center, command palette, Undo/Redo, and bulk actions is reachable and operable with the keyboard alone"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-7"
name = "form_dialogs_manage_focus"
description = "The save and rename forms, Export center dialogs, import confirmation, bulk delete confirmation, and command palette trap focus while open and return focus to the control that opened them when closed"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-8"
name = "feedback_announced_via_aria_live"
description = "Practice feedback (Correct! and Try again), inline form validation messages, import errors, and Copy confirmation are exposed through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-9"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-10"
name = "rapid_scrubbing_stays_responsive"
description = "Rapidly stepping through a line with the Previous move / Next move scrubber stays responsive with no hangs or dropped interactions"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "ti-11"
name = "theme_switch_instant_no_shift"
description = "Switching board themes applies instantly with no page reload and no layout shift"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "ti-12"
name = "fresh_load_starts_unseeded"
description = "On a first load, Favorites and My Saved Lines start empty with no pre-seeded user entries"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-13"
name = "cross_view_state_coherence"
description = "A change made in one surface is immediately reflected in every other surface showing that datum without a reload: starring an opening updates both the library star and the Favorites Only filter, saving a line updates both the header saved-line count and the My Saved Lines list, and both appear in the Study pack JSON"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-14"
name = "export_previews_stay_responsive"
description = "Opening Export center or regenerating Study pack JSON and PGN previews after mutations stays responsive with no hangs"
type = "binary"
weight = 1.0
[[criterion]]
id = "ti-15"
name = "no_browser_storage_apis"
description = "During a full exercise that saves lines, favorites openings, changes theme, exports, and imports, the app does not read or write localStorage or sessionStorage for app state"
type = "binary"
weight = 1.0
