[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_reload_resets_coherently"
description = "Multi-facet round-trip: submit a job, apply a status filter, open Aggregates, then reload — the app coherently resets to the seeded baseline (seeded jobs, lanes, timeline, default view, closed export/import), never a mix of persisted and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "filter_combination_proves_live"
description = "Filter proof: apply a status filter and note the visible set, then add a model filter; the visible set becomes the intersection matching both, and clearing restores the full seeded-plus-session table"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_derived_view_tracks_mutations"
description = "Derived-view sensitivity: submit or cancel a job, reopen Export queue, and confirm the JSON jobs array (and related providers/timeline) changes to match the session rather than redrawing identical hardcoded text"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_table_lane_export_echo"
description = "Cross-view echo: submit a valid job and confirm the jobs table row, the model's provider lane queue depth, and the Export queue jobs entry all reflect that job without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "jobs_count_delta_exact"
description = "Count-delta integrity: measure the jobs table row count immediately before and after a valid single-model submit; the delta is exactly plus one with no lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_models_different_export"
description = "Input-dependent output: submit two jobs with different valid models and confirm the Export queue JSON contains both distinct model values rather than identical entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_submit_and_pause"
description = "Interleaved-flow integrity: open Submit job and change fields, cancel the form, pause a lane, then complete a new valid submit — the paused lane stays paused and the new job appears once without corrupting either flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_filter_then_clear_tracks"
description = "Edge-state round-trip: apply filters that match zero jobs (empty state visible), then clear filters; the full table, lane depths, and Export preview job count track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_reconstructs_state"
description = "Export/import pipeline: mutate the queue (submit or cancel), export Queue Snapshot JSON, import that JSON, and confirm visible jobs, lane depths, and timeline match the exported document and the next Export preview matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "aggregates_track_completions"
description = "Derived aggregates: note total cost, let a running job complete more trials, and confirm total cost increases while mean-reward bars remain consistent with completed jobs"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_reload_incoherence"
description = "After mutations, a reload keeps some session facets (for example a submitted job or filter) while resetting others, producing incoherent partial persistence in this in-memory genre"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_ignores_session_inputs"
description = "Export queue preview text is identical before and after a submit or cancel that should alter jobs, providers, or timeline"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_identical_export_rows"
description = "Submitting two jobs with different valid models yields export entries that are byte-identical including the model field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "A submit or cancel appears in the jobs table but not in the provider lane or Export preview until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
