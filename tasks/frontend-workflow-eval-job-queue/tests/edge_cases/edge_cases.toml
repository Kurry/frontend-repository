[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_filter_state_present"
description = "When status/model/dataset filters match no jobs, the table region shows an empty state message with a control that clears the filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "submit_validates_inline"
description = "The submit-job form shows inline validation naming missing dataset/agent/model and trialCount bounds before submit, with submit disabled while invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_rule"
description = "Validation and import errors name the field and the rule broken (for example trialCount 1 to 10, sweepModel must differ from model, schemaVersion eval-queue-v1) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Submitting, cancelling, copying the config or export preview, and importing show visible success or confirmation feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "simulation_shows_progress_affordance"
description = "While running jobs advance and while export/import surfaces open, async-feeling regions show a deliberate loading or progress affordance rather than a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "cancel_and_pause_confirm_first"
description = "Cancel on a queued/running job and pause on a lane each ask for confirmation before mutating; declining leaves state unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "sweep_cross_field_guard"
description = "Choosing a sweepModel equal to model shows an inline error naming sweepModel and creates no job"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Submit, filter, lane, export, and import controls use semantic button/input/label elements rather than clickable bare divs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Submit form, export drawer, import surface, and confirmation dialogs close via an explicit control and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "mid_trial_cancel_keeps_results"
description = "Cancelling a job mid-trial keeps every completed trial's reward and duration visible in the detail; only unfinished trials stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "import_malformed_leaves_queue"
description = "Importing malformed Queue Snapshot JSON or a document that breaks the field contract shows an inline import error and leaves job count and lane depths unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "A zero-match filter shows nothing and provides no empty-state UI feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Submit or import validation failures surface only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Submit, cancel, copy, or import succeed or fail with no visible feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Cancel job or pause lane mutate state with no confirmation warning"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Primary interactive controls for submit, filters, lanes, export, or import are only non-semantic div or span wrappers"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Submit, export, import, or confirmation overlays cannot be dismissed via Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "An invalid submit that breaks the field contract still creates a job row before any inline field error is shown"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Primary actions use blank or only generic labels such as OK/Submit where Submit job, Export queue, or Import queue is expected"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "import_silently_corrupts_queue"
description = "A malformed import changes job count or lane depths without an inline error"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Export queue, Import queue, or Submit job controls are visually hidden or inaccessible when the jobs view is active"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
