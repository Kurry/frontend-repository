[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "monitor_shell_composition"
description = "The app presents a monitor composition: a header with the app name and Submit job control, a main jobs table with its filter toolbar above it, a provider lanes panel visible alongside or above the table, and Aggregates and Timeline reachable as views or tabs without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "status_color_system_consistent"
description = "One status color system is applied identically in the jobs table, trial grid, lanes, and timeline — queued muted neutral, running an accented treatment, completed green, failed red, cancelled gray — always paired with a readable status label rather than color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "rate_limit_chip_states_distinct"
description = "The rate-limit chips render three visually distinct states: a quiet normal treatment, a warning-toned throttled treatment, and a strong muted paused treatment, consistent across all lanes"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "typography_and_numeric_alignment"
description = "Typography shows a clear hierarchy — page title larger than section headings, which are larger than table body text — and ids, counts, rewards, and durations render in an aligned, tabular numeric style"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "config_preview_monospace_surface"
description = "The configuration preview renders on a visually distinct monospaced surface with an indented key-value structure, and cards and panels across the app use consistent borders, radii, and subtle shadows with one consistent icon set"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "responsive_reflow_clean"
description = "At 768 pixels and below the lanes panel stacks above or below the table and the filter toolbar wraps; at 375 pixel width no content clips or overflows the viewport, no page-level horizontal scrolling appears, and the jobs table and trial grid scroll within their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "overlap_or_default_controls"
description = "At 1440 pixel width, text, chips, or countdowns overlap other elements or are clipped by their containers, or form controls and dialogs render with unstyled browser-default appearance that clashes with the rest of the interface"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
