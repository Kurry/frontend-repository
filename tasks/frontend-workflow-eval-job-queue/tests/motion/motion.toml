[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_required"
description = "Hovering with the real pointer shows visible feedback: buttons ease background and shadow with a slight press effect, table rows take a full-width hover wash, chips, legend entries, and lane controls respond, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "dialogs_enter_exit_transition"
description = "Opening the submit form, export drawer, import surface, or a confirmation dialog with the real pointer brings it in with a short opacity and scale transition of roughly 200 to 300 milliseconds, and closing exits the same way rather than disappearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "progress_microinteractions"
description = "Driven through the real UI controls (never a state-shortcut tool call): a newly submitted job's row animates into the table, running jobs' progress readouts and bars advance smoothly rather than jumping in large snaps, and new timeline entries animate in rather than popping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "backoff_countdown_ticks"
description = "A failed trial's backoff countdown visibly ticks down second by second, and when it reaches zero the status change from failed to running animates rather than swapping with no transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "toasts_slide_autodismiss"
description = "After submitting a job, cancelling a job, copying the configuration or export preview, and importing a queue snapshot, a feedback toast slides in, remains readable long enough to scan, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, animations are removed or reduced to instant state changes while every flow — submit, cancel, retries, pause and resume, export, and import — remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "transitions_snap_everywhere"
description = "Dialogs, toasts, and status changes snap abruptly with no transition anywhere in the app, leaving the interface feeling entirely static under pointer interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
