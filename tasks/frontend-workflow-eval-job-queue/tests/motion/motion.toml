[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_required"
description = "Hovering with the real pointer shows visible feedback: buttons ease background and shadow with a slight press effect, table rows take a full-width hover wash, chips, legend entries, and lane controls respond, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "dialogs_enter_exit_transition"
description = "Opening the submit form, export drawer, import surface, or a confirmation dialog with the real pointer brings it in with a short opacity and scale transition of roughly 200 to 300 milliseconds, and closing exits the same way rather than disappearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "progress_microinteractions"
description = "Driven through the real UI controls (never a state-shortcut tool call): a newly submitted job's row animates into the table, running jobs' progress readouts and bars advance smoothly rather than jumping in large snaps, and new timeline entries animate in rather than popping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "backoff_countdown_ticks"
description = "A failed trial's backoff countdown visibly ticks down second by second, and when it reaches zero the status change from failed to running animates rather than swapping with no transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "toasts_slide_autodismiss"
description = "After submitting a job, cancelling a job, copying the configuration or export preview, and importing a queue snapshot, a feedback toast slides in, remains readable long enough to scan, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, animations are removed or reduced to instant state changes while every flow — submit, cancel, retries, pause and resume, export, and import — remains fully usable"
type = "binary"
weight = 1.0

