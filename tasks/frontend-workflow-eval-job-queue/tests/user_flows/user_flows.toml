[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "submit_job_end_to_end"
description = "Submit flow: open Submit job, watch the configuration preview update with create-payload field names as fields change, submit valid values, confirm exactly one new queued row appears in the jobs table and the chosen model's provider lane without a reload, and reopening Export queue shows that job with matching dataset, agent, model, and trialCount"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_submit_inline_validation"
description = "Submit flow: missing dataset/agent/model, trialCount outside 1 to 10, or sweepModel equal to model shows inline errors naming each field and creates no job"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "sweep_submission_flow"
description = "Sweep submission: choosing a sweepModel that differs from model and submitting once creates one job per selected model, each in its own lane, increasing the jobs table count by exactly the number of models chosen"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "cancel_keeps_completed_trials"
description = "Cancel flow: confirming cancel on a queued or running job flips it to cancelled, stops progress, and keeps already-completed trial rewards and durations visible in the detail; declining leaves the job unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_queue_state"
description = "View switch: moving between Jobs, Aggregates, and Timeline without a reload retains the current jobs collection, filters, and selection so returning to Jobs shows the same rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "retry_lifecycle_flow"
description = "Retry lifecycle: a failed trial's backoff countdown ticks down and flips the trial to running; on an exhausted trial, manual retry returns only that trial to running"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_jobs_table"
description = "Filter flow: status, model, and dataset filters combine to narrow the jobs table, and clearing them restores the full table; a zero-match filter shows an empty state with a clear-filters control"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "pause_resume_lane_flow"
description = "Pause and resume: pausing a lane through its confirm dialog freezes a running trial's completed count; after waiting the count has not advanced, resume continues from the same count with completed trials untouched"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "mutation_to_export_flow"
description = "Mutation-to-export: after submitting a valid job, Export queue preview contains that job's dataset, agent, model, and trialCount, schemaVersion is eval-queue-v1, providers and timeline keys are present, and Copy and Download are available"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after a submit or cancel mutation, importing the exported Queue Snapshot JSON reconstructs the same visible jobs, lane depths, and timeline, and the next Export preview matches again"
type = "binary"
weight = 1.0

