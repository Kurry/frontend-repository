[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Every network request the page makes is same-origin with the candidate on port 3000 (or a data:/about: URL) with no external font, image, video, CSS, or JavaScript CDN request"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "The page loads with no uncaught JavaScript console errors and no failed asset request (no 4xx/5xx or net::ERR) on load or while scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "The document uses appropriate header, nav, main, footer, heading, link, and button semantics with useful accessible names and keyboard-reachable controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "The homepage exposes a title, meta description, canonical link, and OpenGraph/Twitter tags referencing a local share image"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "After interacting with the page (opening the menu, advancing the carousel), localStorage and sessionStorage remain empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "An asset (font, image, video, CSS, or JS) loads from a remote CDN host such as CloudFront or Vimeo instead of same-origin"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "localStorage or sessionStorage is populated after interacting with the page"
type = "binary"
weight = 0.5
negate = true
optional = true
