[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the board shows day columns from Monday July 6 through Sunday July 26, with the July 18 column labeled Shutdown and future columns labeled Plan"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the July 18 column shows the seeded tasks Set up Cadence and Weekly planning, each with an unchecked checkbox and a #work channel tag"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the Set up Cadence task shows a 0:20 planned-time chip and an expanded subtask list containing Add a task, Complete daily planning, Add integrations, Add channels, and Add recurring tasks"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "On load, the July 20 column shows the Work task with a 9:00 am scheduled start and a 1:00 planned-time chip, and the July 20 column footer reads a planned total of 1:00"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "On load, the July 18 column footer reads a planned total of 0:20"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After adding a task titled Review inbox to the July 21 column via its Add task control, the text Review inbox is visible in that column"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After adding a task with a planned time of 0:30 to the July 21 column, that column's planned-time footer total updates from 0:00 to reflect the new task"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After submitting Add task with an empty title, no new task is added to the column and visible validation feedback appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After editing the Daily planning task title to Plan the week, the text Plan the week is visible and Daily planning is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After deleting the Weekly planning task from the July 18 column, Weekly planning is no longer visible in that column"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After clicking the Work task's completion checkbox, the task renders in a completed state and remains listed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "The right calendar panel titled Calendars shows a 1x control, a Sat 18 day header, an all-day event reading Automatic Bill Payment - Sallie Mae, and an hour ruler from 12 AM through 11 PM"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When clicking a non-active left-nav item such as Focus or the board Filter control, a demo toast appears and the multi-day board stays in view without navigating away"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When hovering nav items, task cards, or right-rail buttons, a visible hover wash, border, or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Tasks are a working collection: a task can be created in a day column via Add task, edited, completed via its checkbox, and deleted, with the board updating from shared application state and no full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Each day column's planned-time footer total is derived from that column's tasks: it reads 0:20 for July 18 and 1:00 for July 20 on load, and recomputes when a task's planned time changes or a task is added or deleted in that column"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Two interaction modes read from the same tasks collection: the multi-day board and the right calendar day panel, and selecting a different day updates the calendar panel in place without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Submitting Add task with an empty required title shows visible validation feedback and does not append a task to the column"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "The board seeds exactly the four tasks Set up Cadence and Weekly planning (July 18), Daily planning (July 19), and Work (July 20), and Set up Cadence carries the five subtasks Add a task, Complete daily planning, Add integrations, Add channels, and Add recurring tasks"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.21"
name = "1_21"
description = "The day columns are static HTML with no working Add task, edit, complete, or delete against shared task state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "A chrome-only control (a non-active left-nav item such as Focus, the board Filter control, or a right-rail button such as Search, GitHub, Backlog, Archive, or Objectives) navigates via a real outbound link to another origin instead of showing a demo toast and keeping the board in view"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "The per-column planned-time footer shows a hardcoded value that does not change when a task is added to or deleted from that column"
type = "binary"
weight = 0.5
negate = true
optional = true
