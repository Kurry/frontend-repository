[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The layout reads as a planner workspace: a left nav rail with the Cadence wordmark, a central horizontally scrollable board of day columns July 6 through July 26, and a right calendar rail with the Calendars panel and hour ruler"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "A column with no tasks shows an empty column that still offers Add task and reads a 0:00 planned-time total"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "3_3"
description = "The page renders as a single-day or marketing-style mock rather than the multi-day board of 21 dated columns from July 6 through July 26"
type = "binary"
weight = 1.0
negate = true
