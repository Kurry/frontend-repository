[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with no data, the overview shows \"Set your first goal to start building a path\" and a \"+ New Goal\" call to action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "When \"+ New Goal\" is clicked, an inline form opens offering a required title, optional target date, exactly 8 fixed accent-color swatches (not a free-form picker), and a \"Why this matters\" note; submitting a goal titled \"Learn Piano\" adds a card showing its accent color and a 0% progress bar."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating three goals with target dates next month, next week, and none, the overview lists them nearest-target-date first with the no-date goal sorted last."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After opening a goal and adding three milestones with \"+ Add Milestone\", they render as numbered nodes connected by a line in order, with the first as the highlighted active node and the others as outlined/dashed upcoming nodes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When every action step of the first milestone is checked, the milestone auto-completes the instant the last step is checked, its node/connector become solid, and the second milestone becomes the highlighted active one."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After a milestone completes, its up/down reorder controls are disabled and an inline note reads \"Reordering disabled — an earlier milestone is complete\" (or \"— this milestone is complete\"); reordering two still-incomplete milestones with the buttons swaps their order."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "On a milestone with zero steps, \"Add a step to make progress\" is shown and no control marks it complete; adding two steps and checking both auto-completes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "On a goal with 4 steps across two milestones, completing 2 shows 50% and completing a 3rd live-updates to 75% as both a number and a matching progress-bar fill in the detail header, aggregating across milestones."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After toggling \"Focus Today\" on 4 steps across two goals, the Today's Focus panel lists only the first 3 with quick-complete checkboxes and the 4th toggle shows an inline message to complete or unfocus one first."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When the app's stored focus-date is changed to a non-today value via browser_evaluate and the page is reloaded, the Today's Focus panel is empty while the underlying steps' complete/incomplete state is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When a goal is seeded (matching the created localStorage schema) with an incomplete milestone whose latest step-completion/creation date is more than 7 days ago, both its overview card and detail view show a \"Needs Attention\" badge, which clears after completing a fresh step dated today."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "\"Mark Goal Complete\" is absent below 100% and appears only at 100%; confirming it moves the goal into a toggle-visible \"Completed Goals\" section with a recorded date and a read-only path whose steps cannot be toggled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After creating a goal with milestones, completed/incomplete steps, and a Today's Focus selection, a full page refresh restores the exact state; a deleted goal, milestone, or step is not revived after refresh."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "The live activity stream exposes Start, Pause, Reconnect, and \"Deliver Out of Order\" controls with a visible status; starting, delivering out of order, and reconnecting resolves the applied-event ledger in logical-timestamp order with each event applied exactly once and no duplicates."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Creating a goal from the + New Goal form (title, target date, one of 8 fixed accent swatches, motivation) adds a card to the overview showing its accent color and a 0% progress bar."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The overview lists active goals sorted by nearest target date, with goals that have no target date sorted last."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Adding milestones renders them as numbered nodes connected by a line in order, with the first not-yet-complete milestone highlighted as active and later ones outlined/dashed."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "A milestone auto-completes the instant its last action step is checked, and reverts to incomplete/active when a step is later unchecked."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "A milestone with zero steps shows \"Add a step to make progress\" and offers no way to be marked complete."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Goal completion percentage equals completed steps over total steps aggregated across all milestones, live-updating from 50% (2 of 4) to 75% (3 of 4) as steps toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Toggling Focus Today caps Today's Focus at 3 steps and shows an inline message asking to complete or unfocus one on a 4th attempt, keeping exactly the existing 3."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "A goal with an incomplete milestone whose most recent step-completion or creation date is more than 7 days ago shows a Needs Attention badge on its overview card and detail view."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Mark Goal Complete appears only at 100%; confirming it moves the goal into a toggle-visible Completed Goals section with a recorded date and a read-only path."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Goal title, target date, and motivation, and milestone and step titles, are all editable inline and reflect immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Deleting a goal or milestone through its inline confirm step also removes its nested milestones and steps from the path."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "With zero goals the overview shows \"Set your first goal to start building a path\" with a + New Goal action, and a goal with zero milestones shows \"Add your first milestone to build this path\"."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "The live activity stream's Start, Pause, Reconnect, and Deliver Out of Order controls resolve the applied-event ledger in logical-timestamp order, ignoring duplicates and catching up on reconnect exactly once."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "Submitting the New Goal form with a blank title shows a visible required-field message and adds no goal card."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Reorder up/down controls stay enabled on a milestone when it or an earlier milestone is already complete, letting completed order be shuffled."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "A goal's completion percentage reflects only a single milestone's steps rather than aggregating across all its milestones."
type = "binary"
weight = 1.0
negate = true
