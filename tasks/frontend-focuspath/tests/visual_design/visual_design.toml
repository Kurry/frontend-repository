[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The milestone path is built from divs and borders — circular nodes, thin connectors, dashed upcoming styling — with node/connector fill matching the completion the progress bar reports."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The palette matches the spec: teal primary buttons and path lines, gold active-milestone highlight, green completed nodes/steps, amber Needs Attention badge, red delete controls, off-white app background on white cards."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Typography follows the spec: serif (Fraunces/Georgia) goal and milestone titles, sans (Inter/system-ui) body chrome, and monospace target dates."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "Primary buttons use a teal fill with white text and rounded corners while secondary controls use a bordered light surface, giving a clear visual hierarchy."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "Delete confirmations and the Today's Focus limit message appear as native browser alert()/confirm() dialogs rather than inline styled UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The active milestone, completed milestones, and upcoming milestones are visually indistinguishable, or node fill contradicts the reported completion percentage."
type = "binary"
weight = 1.0
negate = true
