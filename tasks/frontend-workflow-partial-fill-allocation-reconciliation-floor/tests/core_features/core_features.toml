[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 1.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "sum"

[[criterion]]
id = "CF.1"
name = "Import Fixture"
description = "Import the intent and fill fixtures via diagnostic screens."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF.2"
name = "Allocation Flow Floor"
description = "Dragging a fill chip onto an intent opens a quantity splitter and allocates it properly."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF.3"
name = "Lot Split and Conservation"
description = "Splitter supports exact quantity entry and conserves remaining totals in the ribbon."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF.4"
name = "Rule and Locate Guard"
description = "Enforce max quantity, locate inventory, and boundary conflicts."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF.5"
name = "Time-ordered Ledger"
description = "Scrubbing the ledger reconstructs the state."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF.6"
name = "Export"
description = "Export generates JSON and CSVs properly."
type = "binary"
weight = 1.0
