[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "te.1"
name = "interleave_actions"
description = "AC-04: Interleave UI/WebMCP piece/material, placement/rule, witness/sensor, curve, branch/review, clock/batch/result/refire, history, and transfer actions. Ensure ids, geometry, samples, events, files match exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.2"
name = "clean_state_isolation"
description = "Begin from a clean state. Ensure no pre-seeded success evidence. Verify that persisted state survives reload perfectly, while transient previews (like dragging) do not leak into persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.3"
name = "keyboard_pointer_convergence"
description = "For every pointer manipulation (drag/drop), verify the keyboard/exact-value path creates identical events with identical stable IDs and identical WebMCP-observable state."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.4"
name = "atomic_transactions"
description = "Verify import modes function as atomic transactions. Rejecting an import with unknown enums or bounds violations must result in zero state mutation."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.5"
name = "adversarial_ordering_convergence"
description = "Exercise adversarial orderings: e.g. canonical edit before/after merge, undo followed by branch, or cancel after preview. Ensure equivalent orders converge and cancellation strictly restores the prior snapshot."
type = "binary"
weight = 1.0
