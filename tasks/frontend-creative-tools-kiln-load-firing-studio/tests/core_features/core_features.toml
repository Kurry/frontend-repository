[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "piece_provenance_catalog"
description = "Pieces store id, footprint polygon fixture, height band, mass grams, clay lot, glaze lots/surfaces, firing stage, owner code, and status. Source lot cards link material properties and prior fixture results."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "shelf_load_canvas"
description = "Pieces drag/rotate in 15-degree increments across 4 circular shelves enforcing bounds, pairwise clearance, shelf-post exclusion, load grams, height/overhang, and orientation rules."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "glaze_and_adjacency_graph"
description = "Edges identify forbidden adjacency, required separation, shared catch tile, or allowed pairing by glaze/clay fixture combination. Distance derives from footprint polygons."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "witness_and_sensor_placement"
description = "Witness fixtures occupy bounded shelf regions and must cover declared low/mid/high zones without collision. Sensor channels bind fixture shelf positions."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "firing_curve_composer"
description = "Contiguous piecewise curve with ordered ramp, hold, controlled-cool, and natural-cool segments. Handles drag on time/temperature axes; segments satisfy bounds/rate/hold/total-duration rules."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "batch_execution_states"
description = "Execution advances reserve pieces → precheck → ramp/hold/cool segments → unload inspection → reconcile."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "responsive_studio_and_artifacts"
description = "Export produces canonical JSON (schemaVersion: 'kiln-firing-project/v1'), SVG shelf maps and curve/result report, CSV piece/material/batch/sensor ledger, and Markdown runbook."
type = "binary"
weight = 1.0
