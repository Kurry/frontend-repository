[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load after dismissing boot, the terminal shows a live command prompt and welcome/output chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After opening Projects Board or running /work, at least 6 seeded projects are visible with names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating a project named 'Harbor Atlas' with valid required fields, the text 'Harbor Atlas' is visible in the projects list or board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding 3 new projects on top of the seed set, the projects list shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After filtering projects by status (e.g. wip) with mixed statuses present, only matching projects remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After editing a project name to 'Evening Terminal', the text 'Evening Terminal' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting a project, that project name is no longer visible in the projects list or board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After deleting all projects, an empty state is visible in Projects Board or /work output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After submitting create with an empty required project name, the projects count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After switching between Terminal CLI mode and Projects Board mode, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After running a theme command (/dark, /light, /retro, or /glass), documentElement theme classes update without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering project rows/cards, autocomplete rows, or titlebar controls, a visible hover wash or highlight appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After load, the terminal plays a boot sequence ending in a ready line; pressing Enter or clicking dismisses boot and reveals the post-boot terminal with a focused command prompt"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After typing /skills, labeled skill bars render and animate from zero toward their target widths, and after /clear prior output is wiped"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After running an easter-egg command (/matrix or /konami), the corresponding canvas animation (matrix rain or confetti) appears over the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Projects collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Renders visible validation feedback when create is submitted with empty required fields, and the collection count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "On load the terminal plays a boot sequence ending in a ready line and a Press Enter to continue prompt; pressing Enter, clicking, or touching dismisses boot and reveals the post-boot terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Typing slash section commands (/help, /about, /work, /skills, /contact) echoes the input line and appends the matching output, and /clear wipes prior output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Typing in the command input shows an autocomplete dropdown of matching commands, Tab completes the highlighted one, and the up/down arrows walk command history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Hidden easter-egg commands work and are discoverable via /secrets: /matrix starts a green matrix-rain canvas and /konami fires a confetti burst"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The macOS window chrome works: red close opens an exit overlay with a Reopen control that restores the window, yellow minimize swaps the wallpaper blur, and green maximize expands the window"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "A cookie-consent banner appears after boot; choosing Accept or Decline dismisses it, updates in-memory consent without throwing, and /privacy reflects the accepted or declined status"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "Section or easter-egg commands are decorative stubs — /matrix, /konami, or /clear print nothing or do not change the terminal output"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "Projects list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true
