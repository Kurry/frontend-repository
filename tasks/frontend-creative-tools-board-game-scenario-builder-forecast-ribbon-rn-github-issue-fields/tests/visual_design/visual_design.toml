[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "visual_hierarchy"
description = "Inspect the primary work surface, linked summary, and detail panel. The visual hierarchy makes current state and next action clear."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "explicit_visual_states"
description = "Explicit visual states for scenarios: draft, ready, changed, conflict, and archived."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "domain_specific_workbench"
description = "A distinctive, domain-specific workbench with clear state tokens, intentional density, and a calm focused canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "form_validation_states"
description = "Form controls present clear validation states when exact bounds are violated."
type = "binary"
weight = 1.0
