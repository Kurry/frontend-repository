[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "full_run_flow_with_bindings_and_variants"
description = "Full run flow: type a prompt containing two placeholders, bind both values in the side panel, confirm the preview shows the resolved text, click Run, watch the response stream progressively to complete, then flip through the 3 variants — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_save_and_insert_variable_validation"
description = "Create/save flow: opening Save with empty title, overlong title, or technique outside zero-shot|few-shot|chain-of-thought|role-prompt|extraction|summarization keeps confirm disabled and shows inline validation naming the field; Insert Variable with an invalid name (spaces/punctuation or over 64 characters) shows an inline message naming the name field and allowed format and does not insert a placeholder."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "binding_edit_updates_preview_not_completed_run"
description = "Edit flow: after a run completes, changing a variable value updates the live preview immediately while the completed run's response text stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_library_entry_updates_count"
description = "Delete flow: deleting a library entry removes its row and decreases the visible library count by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "workbench_library_switch_retains_draft"
description = "View/mode switch: switching between workbench and Library happens without a page reload; returning to the workbench retains the in-progress draft (prompt text and bindings) unless a library entry was explicitly opened."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_library_delete_shows_empty_state"
description = "Edge: after deleting every library entry, the library empty state is clear and visible with a control that returns to the workbench."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "suggestion_chip_replaces_editor_content"
description = "Suggestion-chip flow: clicking a suggestion chip replaces the editor content with exactly that chip's prompt text and moves focus to the editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "stop_mid_stream_freezes_response"
description = "Stop flow: start a run, activate Stop mid-stream, and confirm the response text stays frozen, no further text appends, the run's status shows stopped, and Run is enabled again."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "save_modal_and_library_round_trip"
description = "Save overlay: Save opens a modal with title (1 to 80 characters) and technique (closed enum) fields matching the LibraryPrompt field contract; confirming adds the prompt to the library with a success toast and a row showing that title and technique; switching to Library shows the count increased by one; opening the new entry restores the same prompt text, bindings, and attachments in the workbench."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "Recovery/reload: a page reload returns the app to its seeded state — 6 models, 4 library prompts, 4 suggestion chips, an empty editor, and no run history — with no dead end requiring a second reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_package_flow_with_field_contract"
description = "Export package flow: edit the prompt and bind a variable, open Export, confirm Markdown and JSON previews contain the edited prompt text and binding value and the JSON shows schemaVersion prompt-package-v1 plus model, promptText, messages, bindings, and attachments, then Import that JSON and confirm the workbench restores the same text and bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Run, Stop, Save-to-library, open-library-entry, Insert Variable, Export, or Import cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "save_fails_to_appear_or_duplicates"
description = "Confirming Save either fails to add a visible library row or adds duplicate rows for a single confirm."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "binding_or_run_state_desyncs"
description = "After binding a variable or completing a run, the preview, binding panel, response panel, and history row disagree about the same prompt/run state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_draft"
description = "Switching between workbench and Library breaks the layout or unexpectedly clears the in-progress draft without opening a library entry."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_library_region_broken"
description = "After deleting all library prompts, the library region is blank or broken with no empty-state message and return control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "stop_fails_to_freeze_stream"
description = "Activating Stop mid-stream still appends further response text, leaves the run status as streaming/waiting, or leaves Run disabled after Stop."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "library_entry_cannot_reopen_in_workbench"
description = "After switching to Library, a saved entry cannot be opened back into the workbench with its saved prompt text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "save_modal_blocks_with_no_exit"
description = "The Save modal blocks the workbench with no working exit (no close control and no Escape)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_validation_silent"
description = "An invalid Insert Variable name or incomplete Save attempt provides no visible validation feedback naming the field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Recovering from Library, Save modal, or a stopped run requires a full page reload — the UI reaches a dead end."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
