[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "full_run_flow_with_bindings_and_variants"
description = "Full run flow: type a prompt containing two placeholders, bind both values in the side panel, confirm the preview shows the resolved text, click Run, watch the response stream progressively to complete, then flip through the 3 variants — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_save_and_insert_variable_validation"
description = "Create/save flow: opening Save with empty title, overlong title, or technique outside zero-shot|few-shot|chain-of-thought|role-prompt|extraction|summarization keeps confirm disabled and shows inline validation naming the field; Insert Variable with an invalid name (spaces/punctuation or over 64 characters) shows an inline message naming the name field and allowed format and does not insert a placeholder."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "binding_edit_updates_preview_not_completed_run"
description = "Edit flow: after a run completes, changing a variable value updates the live preview immediately while the completed run's response text stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_library_entry_updates_count"
description = "Delete flow: deleting a library entry removes its row and decreases the visible library count by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "workbench_library_switch_retains_draft"
description = "View/mode switch: switching between workbench and Library happens without a page reload; returning to the workbench retains the in-progress draft (prompt text and bindings) unless a library entry was explicitly opened."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_library_delete_shows_empty_state"
description = "Edge: after deleting every library entry, the library empty state is clear and visible with a control that returns to the workbench."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "suggestion_chip_replaces_editor_content"
description = "Suggestion-chip flow: clicking a suggestion chip replaces the editor content with exactly that chip's prompt text and moves focus to the editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "stop_mid_stream_freezes_response"
description = "Stop flow: start a run, activate Stop mid-stream, and confirm the response text stays frozen, no further text appends, the run's status shows stopped, and Run is enabled again."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "save_modal_and_library_round_trip"
description = "Save overlay: Save opens a modal with title (1 to 80 characters) and technique (closed enum) fields matching the LibraryPrompt field contract; confirming adds the prompt to the library with a success toast and a row showing that title and technique; switching to Library shows the count increased by one; opening the new entry restores the same prompt text, bindings, and attachments in the workbench."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "Recovery/reload: a page reload returns the app to its seeded state — 6 models, 4 library prompts, 4 suggestion chips, an empty editor, and no run history — with no dead end requiring a second reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_package_flow_with_field_contract"
description = "Export package flow: edit the prompt and bind a variable, open Export, confirm Markdown and JSON previews contain the edited prompt text and binding value and the JSON shows schemaVersion prompt-package-v1 plus model, promptText, messages, bindings, and attachments, then Import that JSON and confirm the workbench restores the same text and bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "undo_round_trip_persona_and_binding"
description = "Undo round-trip: attach a persona, change a binding value, then activate Undo twice and confirm the binding value and the persona preface return to their prior states in the panel and the live preview together; Redo twice restores both"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "command_palette_loads_library_prompt"
description = "Command palette flow: open the palette with Cmd+K or Ctrl+K, select a library prompt result, and confirm the workbench loads that prompt's text without a reload and the palette closes"
type = "binary"
weight = 1.0

