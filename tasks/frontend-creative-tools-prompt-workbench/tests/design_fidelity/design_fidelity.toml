[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_two_thirds_one_third"
description = "At 1440px, spacing among the toolbar strip, editor/response stack (left ~two-thirds), and variable binding panel (right ~one-third) follows a consistent scale matching the visual_design composition — no arbitrary one-off gaps that break the workbench layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "editor_monospace_and_panel_hierarchy"
description = "The prompt editor uses a monospace typeface; panel titles are visually larger than metadata rows and helper text, consistently across workbench and library views."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_spec"
description = "At 1440px the layout matches the specified composition: left two-thirds editor and response stack, right one-third variable binding panel, with a single toolbar strip across the top of the editor carrying model selector, token count, Insert Variable, Run, and Save."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — response panel slide-open on run start (~250ms), reasoning expand/collapse height, variant cross-fade, attachment badge enter/exit, library row add/delete, and toast slide/fade — show transitions rather than hard cuts when driven through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Below 1024px the variable binding panel moves below the editor stack into a single column; at 375px the toolbar wraps instead of overflowing — matching the responsiveness patterns in the instruction."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Toolbar buttons, model selector, chips, binding inputs, and Save modal fields use the styled Carbon/workbench treatments rather than unstyled browser default appearance."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_panels_vs_metadata"
description = "Typography hierarchy clearly distinguishes panel titles from run-history metadata rows, token-count helper text, and library row secondary labels."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, inputs, selects, and chips show distinct default, hover, focus (visible ring), and disabled treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "placeholder_and_status_color_language"
description = "Variable placeholders in the editor use a blue tag-style highlight distinct from plain text; unbound variables in the preview use an amber warning highlight; run status uses neutral waiting, active streaming, success complete, and a distinct stopped treatment."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover wash on buttons/chips/library rows, response-panel open (~250ms), blinking streaming cursor while active, and toast auto-dismiss follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_workbench_composition"
description = "Visible spacing between toolbar, editor/response stack, and binding panel contradicts the specified two-thirds / one-third workbench composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "placeholder_highlights_missing_or_wrong"
description = "Editor placeholders lack a distinct blue tag-style highlight, or unbound preview variables lack a clearly distinct amber warning highlight."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "panel_proportions_mismatch_spec"
description = "At 1440px the editor/response stack and binding panel are proportioned in clear mismatch with left ~two-thirds / right ~one-third."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_workbench_animations_missing"
description = "Required animations are missing where the spec requires them (response panel snaps open with no ~250ms slide, reasoning snaps with no height animation, variants swap with no cross-fade, badges/rows snap with no enter/exit)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Toolbar buttons, model selector, chips, or Save modal fields use unstyled browser default appearance when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_spec"
description = "At 1440px the workbench is misaligned versus the spec (missing toolbar strip, binding panel not in the right third, or equal-width card stack instead of editor/response + bindings)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "At 1440px, toolbar controls, editor, response panel, or binding rows render clipped or off-screen."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_prompt_workbench"
description = "Structure deviates from the prompt workbench: a marketing landing or multi-page shell replaces the editor/response + bindings studio."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_titles_and_metadata"
description = "Panel titles and metadata/helper text are visually undifferentiated — no clear hierarchy across workbench and library."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_spec"
description = "Buttons, chips, or library rows use only browser-default hover/press with no specified wash or press treatment, or the streaming cursor stays static (no blink) the entire time a run is actively streaming."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
