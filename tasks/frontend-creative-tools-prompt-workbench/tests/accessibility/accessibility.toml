[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_workbench_controls"
description = "Every interactive control — toolbar buttons (Insert Variable, Run/Stop, Save, model selector), suggestion chips, binding-panel inputs, history rows, variant prev/next, library rows, and attachment add/remove — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "save_modal_focus_trap_and_return"
description = "The Save modal traps focus while open, closes on Escape, and returns focus to the Save control; the Insert Variable popover also closes on Escape and returns focus to its trigger."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "toolbar_and_badge_icons_named"
description = "Meaningful toolbar, badge, chip, and history icons expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "run_status_announced_via_live_region"
description = "Run status changes (streaming started, completed, stopped) are announced through a polite live region, and validation messages on Insert Variable and Save forms are programmatically associated with their fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "The Insert Variable name field and the Save modal title and technique fields use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "reasoning_disclosure_exposes_expanded_state"
description = "The reasoning disclosure is keyboard-operable and exposes its expanded or collapsed state to assistive technology (for example aria-expanded on the header control)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workbench_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the editor/response stack and complementary or aside for the variable binding panel, plus nav where chrome switches workbench/library) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "workbench_contrast_sufficient"
description = "Toolbar labels, panel titles, binding-row text, Unbound indicators, and primary controls meet sufficient contrast against their surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_on_interactive_chrome"
description = "Toolbar actions, suggestion chips, history rows, variant controls, and library rows use button/role semantics (or native interactive elements) rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, response-panel open, streaming cursor blink, reasoning height/chevron motion, variant cross-fade, attachment badge enter/exit, library row enter/exit, and toast transitions apply instantly (or are removed), and the streaming cursor does not blink, while every flow remains completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "export_modal_and_palette_focus_management"
description = "The Export modal and the command palette trap focus while open, close on Escape, and return focus to the control that opened them (or to the prior focus for the palette)"
type = "binary"
weight = 1.0

