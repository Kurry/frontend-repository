[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_workbench_controls"
description = "Every interactive control — toolbar buttons (Insert Variable, Run/Stop, Save, model selector), suggestion chips, binding-panel inputs, history rows, variant prev/next, library rows, and attachment add/remove — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "save_modal_focus_trap_and_return"
description = "The Save modal traps focus while open, closes on Escape, and returns focus to the Save control; the Insert Variable popover also closes on Escape and returns focus to its trigger."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "toolbar_and_badge_icons_named"
description = "Meaningful toolbar, badge, chip, and history icons expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "run_status_announced_via_live_region"
description = "Run status changes (streaming started, completed, stopped) are announced through a polite live region, and validation messages on Insert Variable and Save forms are programmatically associated with their fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "The Insert Variable name field and the Save modal title and technique fields use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "reasoning_disclosure_exposes_expanded_state"
description = "The reasoning disclosure is keyboard-operable and exposes its expanded or collapsed state to assistive technology (for example aria-expanded on the header control)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workbench_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the editor/response stack and complementary or aside for the variable binding panel, plus nav where chrome switches workbench/library) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "workbench_contrast_sufficient"
description = "Toolbar labels, panel titles, binding-row text, Unbound indicators, and primary controls meet sufficient contrast against their surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_on_interactive_chrome"
description = "Toolbar actions, suggestion chips, history rows, variant controls, and library rows use button/role semantics (or native interactive elements) rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, response-panel open, streaming cursor blink, reasoning height/chevron motion, variant cross-fade, attachment badge enter/exit, library row enter/exit, and toast transitions apply instantly (or are removed), and the streaming cursor does not blink, while every flow remains completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "workbench_controls_unreachable_by_keyboard"
description = "A toolbar button, suggestion chip, binding input, history row, variant control, library row, or attachment control cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_workbench"
description = "Focused toolbar buttons, chips, binding inputs, history rows, variant controls, or library rows show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Suggestion chips, history rows, variant controls, or library rows use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "run_status_or_unbound_color_only"
description = "Run status (waiting/streaming/complete/stopped) or Unbound variable state is conveyed by color alone with no text, label, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "save_modal_no_focus_trap"
description = "With the Save modal open, Tab moves focus to controls behind the overlay without trapping focus in the dialog."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_workbench"
description = "Toolbar labels, panel titles, Unbound indicators, or primary button labels are unreadable due to poor contrast against their background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "validation_or_status_visual_only"
description = "Insert Variable / Save validation feedback or run-status changes are visual only with no programmatic association or live-region announcement for assistive technology."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "meaningful_icons_missing_names"
description = "Meaningful toolbar, badge, or history icons that convey actions are missing alt text or an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Workbench or library panel headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, the streaming cursor still blinks or response-panel / reasoning / variant / toast / badge transitions still animate fully."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
