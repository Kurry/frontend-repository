[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: type a non-empty prompt with a placeholder, bind a variable value, select a non-default model, add an attachment, complete one run, and switch to Library; then reload. Confirm every facet coherently resets to the seeded baseline — 6 models, 4 library prompts, 4 suggestion chips, empty editor, and no run history — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "variant_reversal_proves_live_run_state"
description = "Selection-reversal proof (genre stand-in for sort reversal): on a completed run, note variant 1 response/reasoning, advance to variant 2 and note different content, then return to variant 1. Confirm variant 1's response and reasoning return identically — proving surfaces are derived from the live run record, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "binding_and_model_derived_sensitivity"
description = "Derived-view sensitivity: with a prompt containing a placeholder, change the bound value and confirm the live preview changes meaningfully; then select a different model and confirm the token count estimate for the same editor text changes — not identical redraws regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "editor_placeholder_echoes_in_bindings_and_preview"
description = "Cross-view echo: type a new {{variable_name}} placeholder in the editor; without reload confirm the binding panel gains that entry and the preview shows an unbound warning highlight for it; bind a value and confirm the preview substitutes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "save_library_count_delta_exact"
description = "Count-delta integrity: measure the library count, complete one valid Save, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_prompts_different_run_outcomes"
description = "Input-dependent output: run two prompts with clearly different editor text (both fully bound) and confirm the two completed responses differ in the ways the inputs dictate (not byte-identical hardcoded output)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_save_and_run_flows"
description = "Interleaved-flow integrity: start typing a draft with bindings, switch to Library and back (draft retained), then complete a Run; confirm the run history gains one entry for that draft and the library was not corrupted by the interleaved view switch."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_library"
description = "Edge-state round-trip: delete every library entry (empty state visible), then Save two new prompts with valid LibraryPrompt titles and technique enum values; confirm the empty state clears, both new rows appear with their technique tags, and opening each restores its own prompt text and bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_pipeline_preserves_session_contract"
description = "Full-pipeline probe: edit the prompt, bind a variable, optionally attach a persona, open Export, confirm the JSON preview includes schemaVersion prompt-package-v1 plus the session promptText and binding value under the PromptPackage keys, Copy or Download that JSON, Import it after clearing the draft, and confirm the workbench restores the same prompt text, bindings, persona, and model."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring draft text, bindings, model, attachments, a completed run, and Library view then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "preview_identical_across_different_bindings"
description = "Changing a bound variable value or selecting a different model leaves the live preview and token count visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_prompts_produce_identical_runs"
description = "Running two clearly different bound prompts yields byte-identical completed response text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_surface_state_stale_until_reload"
description = "After editing the prompt, bindings, or saving a library entry, editor, binding panel, preview, or library still shows stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_preview_ignores_session_mutations"
description = "After changing prompt text or a binding value, reopening Export shows JSON identical to the pre-edit package — missing the session mutation or required PromptPackage contract keys."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
