[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "streaming_delight_beyond_minimum"
description = "Beyond the required progressive stream and blinking cursor, the response surface includes an extra delightful microinteraction on complete or stop (for example a richer settle flash, status chip morph, or celebratory complete cue) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "variant_or_reasoning_motion_beyond_spec"
description = "Variant flipping or reasoning disclosure offers an advanced transition beat beyond the required cross-fade/height animate — for example coordinated stagger of metadata and body — verified through real UI controls (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_prompt_studio"
description = "A brief guided first-run or coachmark flow introduces Insert Variable, bindings, and Run without blocking the tool (bonus beyond required empty-state and validation copy)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "token_or_preview_aid_extra_usability"
description = "An interactive readout beyond the required token counter — for example a per-model cost estimate, prompt length bar, or binding-coverage meter — adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "alternate_prompt_input_beyond_baseline"
description = "Beyond basic Tab/Enter operability, the editor supports an alternate prompt input such as keyboard shortcut to Insert Variable or paste-with-placeholder detection (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last selected model or last open reasoning run until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_prompt_studio_narrative_polish"
description = "The toolbar, editor, bindings, and response chrome read as a cohesive branded prompt-authoring studio rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "status_and_highlight_craft_beyond_minimum"
description = "Run-status color language and placeholder/unbound highlight craft go beyond bare compliance — cohesive tokenized accents across toolbar, history, and preview without inventing a conflicting second product (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local monospace font rendering or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_prompt_studio_feel"
description = "The overall studio feels competition-grade: streaming feel, binding/preview coherence, and library round-trip polish read as a professional prompt instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain text controls with no editor/response stack, binding panel, or run-history immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified prompt-workbench composition (toolbar + editor/response + bindings)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
