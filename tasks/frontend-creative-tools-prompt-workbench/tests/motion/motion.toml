[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "response_panel_slide_open"
description = "Clicking Run with the real pointer makes the response panel slide open from zero height over roughly 250 milliseconds rather than appearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "streaming_cursor_behavior"
description = "While a run streams, text appears incrementally with a blinking cursor at the insertion point, and the cursor stops blinking once the run completes or is stopped through the Stop control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "reasoning_expand_animation"
description = "Activating the reasoning header with the real pointer rotates its chevron and animates the region's height open and closed rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "variant_flip_crossfade"
description = "Clicking the variant prev/next controls cross-fades the response content briefly rather than swapping it instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.5"
name = "copy_and_toast_feedback"
description = "Activating a copy control animates its confirmation (icon swap or check morph), and toasts slide in, remain readable long enough to scan, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "attachment_and_library_microinteractions"
description = "Driven through the real UI controls (never a state-shortcut tool call): adding an attachment animates its badge in, removing one animates it out, and library rows animate on add and delete rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hover_system_present"
description = "Buttons ease background and shadow with a slight press effect on hover, suggestion chips and library rows take a visible hover wash, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, transitions apply instantly (panel opens without the slide, regions snap open) and the streaming cursor does not blink, while every feature remains usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "step_status_transitions_fade"
description = "Driven by a real Run, step statuses fade between pending, running, and complete rather than snapping between states"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "palette_and_export_modal_enter_transition"
description = "The Export modal and the command palette each enter with a short opacity and scale transition rather than appearing instantly"
type = "binary"
weight = 1.0

