[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_baseline_present"
description = "On first load the workbench shows an empty editor with a token count of 0, a model selector listing 6 models grouped under 3 provider groups, a row of at least 4 suggestion chips above the editor, and a Library view reachable without reload containing exactly 4 seeded prompts, at least one of which shows an attachment count of one or more"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "placeholder_detection_and_highlight"
description = "Typing a prompt containing {{tone}} into the editor renders the placeholder with a highlight treatment visually distinct from plain text and adds a 'tone' entry to the variable binding panel without any manual refresh; deleting the placeholder text removes that entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "token_count_tracks_text_and_model"
description = "The toolbar token count updates continuously while typing (0 when empty, growing with added text), and switching the selected model changes the displayed estimate for the same editor text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "insert_variable_popover_validation"
description = "Clicking Insert Variable opens a popover whose confirm control stays disabled until the VariableInsert name field is 1 to 64 characters of letters, digits, and underscores only; entering an invalid name (e.g. 'my var!' or longer than 64 characters) shows an inline message naming the name field and the allowed format, and confirming a valid name inserts the double-brace placeholder at the cursor position and closes the popover"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "binding_updates_preview_unbound_warns"
description = "With a prompt containing two placeholders, typing a value for one in the binding panel immediately substitutes that value in the live preview, while the still-unbound placeholder renders in the preview with a visible warning highlight instead of a value and shows an Unbound indicator in the panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "run_streams_with_status_affordance"
description = "Clicking Run with a fully bound prompt streams the response progressively (text appears incrementally over time, never in one paint) and a status affordance visibly moves through waiting, streaming, and complete states during the run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "run_disabled_stop_freezes_output"
description = "Run is disabled while the editor is empty and while a run is streaming; during streaming the Run control is replaced by a Stop control, and activating Stop freezes the response text (no further characters append), marks the run stopped, and re-enables Run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "autofollow_and_jump_to_latest"
description = "While a response streams past the panel's visible height the panel auto-scrolls to follow the newest text; scrolling up during streaming stops the auto-follow and reveals a jump-to-latest control, and activating that control scrolls back to the newest content and resumes following"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "variant_navigation_updates_dependents"
description = "A completed run exposes 3 response variants with prev/next controls and a position label such as '1 of 3'; prev is disabled on the first variant and next on the last, and flipping variants changes the response text, the reasoning content, and the run metadata row together without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reasoning_disclosure_lifecycle"
description = "Each run's reasoning region is collapsed by default and expands/collapses from its header with a rotating chevron; while the run streams the header shows an active indicator, after completion it shows a duration summary line, and the expanded state is remembered per run while the app stays open"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "code_block_copy_confirmation"
description = "Response content containing code renders in a monospaced block with a language label and a copy control; activating copy places the exact code text on the clipboard and shows a visible confirmation such as an icon swap or a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "suggestion_chip_fills_editor"
description = "Clicking a suggestion chip replaces the editor content with exactly that chip's prompt text and moves focus to the editor; when the chip row overflows its container it scrolls horizontally without shifting the vertical layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "attachments_add_preview_remove"
description = "The attachment add control opens a picker seeded with at least 5 assets; choosing one appends an inline badge immediately, hovering the badge reveals a preview with the asset name and type plus a remove control, and activating remove deletes exactly that attachment with visible feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "save_modal_validation_and_toast"
description = "Clicking Save opens a modal that submits a LibraryPrompt create payload: confirm stays disabled until title (1 to 80 characters, unique) and technique (exactly one of zero-shot, few-shot, chain-of-thought, role-prompt, extraction, summarization) are valid; invalid title or technique shows inline messages naming that field and the fix, and confirming a valid save adds one library row whose visible title and technique match the payload and shows a success toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "library_round_trip_restores_prompt"
description = "Scripted probe: save a prompt containing a bound placeholder and one attachment, switch to the Library view and confirm the count increased by exactly one, open the new entry, and confirm the workbench shows the same prompt text, the same binding value, and the same attachment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "library_delete_and_empty_state"
description = "Deleting a library entry removes its row and decreases the visible count by exactly one, and deleting every entry shows an empty state message in the library list with a control that returns to the workbench"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "run_history_selectable"
description = "Each run appends one entry to the run history showing the model that was selected when it started, a timestamp, and its status; selecting an older history entry displays that run's response, reasoning, and variants"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "unbound_run_blocked_with_warning"
description = "Clicking Run while the prompt contains an unbound variable shows a warning notice naming the unbound variable and no run starts (no streaming begins and no history entry is added)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "double_save_creates_one_entry"
description = "Rapidly double-activating the Save modal's confirm control creates exactly one library entry: the count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "completed_run_frozen_after_binding_change"
description = "Scripted probe: after a run completes, changing a variable's bound value updates the live preview but the completed run's response text remains byte-identical to what it showed before the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "prompt_package_export_field_contract"
description = "Opening Export shows a live JSON package preview whose visible text includes the PromptPackage field contract keys schemaVersion exactly prompt-package-v1, model, promptText, messages (role system|user objects), bindings, and attachments; after editing the draft and binding a variable, reopening Export shows that prompt text and binding value in the preview, and Copy/Download are available for the JSON format"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "prompt_package_import_round_trip_and_reject"
description = "Exporting then importing a conforming PromptPackage JSON reconstructs the same visible prompt text, bindings, persona, and model; importing parseable JSON that fails the field contract (wrong schemaVersion, missing required keys, messages role outside system|user, or technique outside the closed enum) shows validation naming the offending field and leaves the workbench draft unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "persona_preface_in_preview_and_export"
description = "Selecting a persona attaches a system preface visible in the live preview and included in the Export JSON messages/persona fields; clearing the persona removes the preface from the preview and from a subsequent Export package"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "pricing_estimator_live_and_model_sensitive"
description = "With the editor empty the pricing estimate beside the token count reads a zero or free amount; typing text grows the estimated cost on every keystroke, and switching the selected model changes the cost estimate for the same editor text without any other action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "persona_drawer_seeded_and_replaceable"
description = "The Persona control opens a drawer listing at least 4 seeded persona templates with role and context text; selecting one attaches its preface and shows the persona name as a chip near the editor; attaching a different persona replaces the previous preface text immediately in the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "run_step_panel_advances_with_rollup"
description = "Each run decomposes into at least 3 visible named steps whose statuses advance through pending, running, and complete or failed during the simulation; a run-level rollup shows steps complete out of total and updates as steps advance; selecting an older history entry shows that run's step statuses and outputs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "command_palette_full_behavior"
description = "Pressing Cmd+K (Ctrl+K on non-Mac) opens a command palette whose results fuzzy-match seeded models, library prompt titles, persona templates, and actions (Export package, Save, Switch to Library, Switch to Workbench); choosing a model selects it in the toolbar, a library prompt loads into the workbench, a persona attaches, and an action runs; with an empty query a short set of top actions is listed, with no matches an empty state names that nothing matched, and Escape closes the palette and returns focus to the prior control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "undo_redo_reverts_workbench_mutations"
description = "Toolbar Undo and Redo revert and reapply the most recent workbench mutations — editor text edits, persona attach or clear, binding value changes, attachment add or remove, and library save or delete; undoing a library save removes the created entry and restores the prior library count, redo re-adds it identically, and both controls disable when their stacks are empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "bulk_export_selected_library_prompts"
description = "Selecting two or more library rows via their checkboxes reveals a bulk Export selected control, and activating it packages exactly those prompts as a JSON array of LibraryPrompt records (title, technique from the closed enum, promptText, bindings, attachments, personaId) listing exactly the selected titles"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "technique_filter_narrows_library"
description = "The Library technique filter narrows the list to rows whose technique tag matches the chosen closed-enum value, and clearing the filter restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "markdown_export_full_contents"
description = "The Markdown export includes the active persona preface when one is attached, the prompt body with placeholders, a bindings table of variable names and values, the selected model name, attachment filenames, and — after a completed run — a short response summary for the active variant"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "latest_run_request_chat_completions_shape"
description = "After a run completes, the Export JSON preview's latestRun.request shows the chat-completions would-be body assembled from the workbench: model matching the run's selected model, a messages array with a system message when a persona was attached plus a user message carrying the prompt text, temperature between 0 and 2, and maxTokens between 1 and 4096"
type = "binary"
weight = 1.0

