[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared state: typing in the editor updates the variable panel, token count, pricing estimate, and preview together; a run's status advances identically in the response panel and the history row; saving, opening, and deleting library entries update the list, count, and workbench together; Export JSON regenerates from that same state — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "localStorage and sessionStorage remain empty after exercising the editor, runs, attachments, and library flows, and a page reload returns the app to its seeded state: 6 models, 4 library prompts, 4 suggestion chips, an empty editor, and no run history"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean_during_session"
description = "The console is free of errors and unhandled promise rejections on first load and stays clean while typing, running, stopping, flipping variants, managing attachments, and saving, opening, and deleting library entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "cold_load_interactive_2s"
description = "The app is interactive (editor accepts typing and toolbar controls respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "streaming_never_blocks_ui"
description = "With 2000 characters in the editor typing stays responsive, and while a run is streaming the rest of the UI (view switch, binding inputs, history selection) keeps responding without hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus"
description = "Every interactive control — toolbar buttons, suggestion chips, binding inputs, history rows, variant controls, library rows — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "modal_popover_focus_management"
description = "The Save modal traps focus while open, closes on Escape, and returns focus to the Save control; the Insert Variable popover closes on Escape and returns focus to its trigger"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "live_region_and_error_association"
description = "Run status changes (streaming started, completed, stopped) are announced through a polite live region, the reasoning disclosure exposes its expanded state to assistive technology, and validation messages are programmatically associated with their fields and name the field"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "forms_validate_api_shaped_payloads"
description = "Insert Variable, Save to Library, and Import forms reject invalid payloads with inline per-field errors before mutating state: VariableInsert name pattern/length, LibraryPrompt title bounds/uniqueness and technique closed enum, and PromptPackage schemaVersion/messages/bindings rules are enforced in the UI"
type = "binary"
weight = 1.0

