[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the prompt workbench becomes interactive within 2 seconds, with the 6 seeded models, 4 library prompts, and 4 suggestion chips available."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or unhandled promise rejections appear on load or during a full exercise: typing, binding variables, running/stopping a stream, flipping variants, saving to library, and opening a library entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "preview_updates_under_100ms"
description = "The live preview updates within 100 milliseconds of a change to the editor text or a variable binding (perceived immediate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "streaming_status_visible_while_running"
description = "While a simulated run streams, waiting/streaming/complete status affordances and progressive response text remain visible rather than a blank response region with no feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_editor_text_stays_responsive"
description = "Typing stays responsive with 2000 characters in the editor — token count, binding detection, and preview keep updating without perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_stream"
description = "An in-progress streaming run never blocks interaction with the rest of the UI — binding panel, history, and toolbar (aside from Run being replaced by Stop) remain operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "streaming_and_variant_motion_stable"
description = "Driven through real Run and variant controls, progressive streaming text and variant cross-fade maintain a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_typing_never_hangs"
description = "Rapid typing and repeated binding edits keep the UI responsive with no hangs and leave editor, binding panel, and preview in agreement."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_run_session_stable"
description = "After an extended session of many runs, stops, variant flips, and library saves/opens, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; toolbar, editor, and binding panel hold their space as the app settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before editor or toolbar controls can be operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_workbench_flows"
description = "Console errors, warnings, or unhandled rejections appear during typing, binding, run/stop, variant flip, save, or library-open flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "preview_or_stream_transition_blocks_ui"
description = "Preview updates or streaming transitions block the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "streaming_hangs_ui"
description = "An in-progress streaming run hangs or freezes the rest of the UI until the stream completes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_editor_text_janks"
description = "With ~2000 characters in the editor, typing or binding updates produce sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_workbench_input"
description = "While response-panel open, toast, or variant cross-fade animations run, toolbar and binding controls ignore input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "The UI blocks rendering of toolbar and panels until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_runs"
description = "Rapid successive runs, stops, or library saves cause visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no toolbar or workbench skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid typing, successive Run/Stop presses, or after deleting all library prompts and recreating."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
