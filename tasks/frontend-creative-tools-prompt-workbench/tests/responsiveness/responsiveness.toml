[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable prompt workbench: editor, response panel, binding panel, and toolbar controls remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, Run/Stop, Save, Insert Variable, suggestion chips, binding inputs, and library rows present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Panel titles, toolbar labels, binding-row names, and library titles remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no content clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "bindings_stack_below_1024"
description = "Below 1024px wide, the variable binding panel moves below the editor stack so the layout becomes a single column, and every control remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At 375px width, editor, response, and binding regions reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At 375px width, tap/click activation works on Run, Save, Insert Variable, suggestion chips, binding inputs, and library/workbench switch controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width no page-level horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "toolbar_wraps_instead_of_overflow"
description = "At 375px width the toolbar wraps its controls instead of overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_remain_operable_at_small_widths"
description = "The Save modal, Insert Variable popover, and attachment picker stay fully visible and operable at 375px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "palette_and_export_modal_operable_mobile"
description = "The command palette and the Export modal stay fully visible and operable at 375px width rather than rendering off-screen"
type = "binary"
weight = 1.0

