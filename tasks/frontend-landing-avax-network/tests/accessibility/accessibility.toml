[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "interactive_controls_keyboard_operable"
description = "Every interactive control (nav links, theme toggle, hamburger, accordions, form fields, carousel arrows, social buttons, Session leads Undo/Download/Copy controls) is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "mobile_drawer_focus_and_expanded_state"
description = "Below 1025px, the hamburger reflects expanded state via aria-expanded; the open drawer contains keyboard-operable accordions, and focus can move within the drawer while background scrolling stays locked."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "placeholder_media_have_accessible_names"
description = "All placeholder imagery, logos, and video panels carry descriptive alt text or accessible labels; decorative marquee duplicates are hidden from the accessibility tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "form_success_and_errors_use_live_regions"
description = "Newsletter and contact success messages and inline validation errors are announced through a polite live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "form_fields_have_explicit_labels"
description = "Newsletter and contact form elements use explicit label associations (or equivalent accessible names) for every required field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "Section headings follow a logical heading order through the homepage with no skipped levels that break the outline (e.g. H1 jumping straight to H3 without an H2)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_nav_main_footer"
description = "The document exposes HTML-first landmarks: a primary navigation region, a main content landmark wrapping the homepage sections, and a contentinfo/footer landmark."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contrast_light_and_dark_themes"
description = "Body text meets at least 4.5:1 contrast against its surface and UI controls/icons meet at least 3:1 in both light and dark themes, including text over imagery."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_interactive_chrome"
description = "Interactive chrome uses real controls (links/buttons) with semantic roles rather than canvas-only hit targets for nav, theme, forms, and carousels."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_suppresses_kinetic_effects"
description = "With prefers-reduced-motion emulated on a fresh load, the smooth-scroll engine, line reveals, heading glyph flashes, and marquees are suppressed while the page remains fully scrollable and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.a1"
name = "split_heading_aria_label_after_flash"
description = "After a split-heading character flash runs via real scroll, the heading container keeps the original unsplit phrase as an aria-label (or accessible name) while individual character/word spans are aria-hidden from the accessibility tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "A primary interactive control (theme toggle, hamburger, form field, carousel arrow, or nav link) cannot be reached or activated via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused interactive controls show no visible focus indicator or the indicator is fully obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom interactive chrome (drawer, theme toggle, carousel arrows) uses non-semantic tags without ARIA roles/labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "errors_conveyed_by_color_only"
description = "Contact or newsletter validation errors are indicated only by color with no text or live-region announcement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "drawer_focus_not_managed"
description = "Below 1025px the open drawer's hamburger keeps aria-expanded false (or omits the attribute), or keyboard focus escapes into a scroll-locked background while drawer controls are inoperable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_unreadable_text"
description = "Body or UI text is unreadable due to contrast below the mandated floors in light or dark theme."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "form_feedback_visual_only"
description = "Newsletter/contact success or inline errors appear visually only with no polite live region exposure."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_missing_alt_or_labels"
description = "Placeholder imagery, logos, or video panels lack descriptive alt text or accessible labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.a4"
name = "split_heading_character_soup"
description = "A split/kinetic headline is exposed to the accessibility tree as character soup — no aria-label (or equivalent) on the container and the split spans are not aria-hidden."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, smooth scrolling, line reveals, heading glyph flashes, or marquees continue to run."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "session_leads_controls_keyboard_operable"
description = "Session leads Undo last lead, Download JSON, and Copy JSON controls are reachable and operable with the keyboard alone and show a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "copied_confirmation_announced"
description = "The Copied confirmation after Copy JSON is conveyed visually and via a polite live region (or equivalent accessible announcement) rather than a silent clipboard write alone."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
