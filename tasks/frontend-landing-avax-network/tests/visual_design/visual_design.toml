[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "cut_corner_frames_and_rounded_shells"
description = "Calls to action and panels use custom cut-corner frames rather than plain rectangles, with large-radius rounded section containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "accent_red_and_placeholder_mark_red"
description = "The red accent rgb(255, 57, 74) is used for primary calls to action and active states against the neutral canvas, and the original placeholder logo mark renders in a distinct red near #E6212F"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "display_face_type_hierarchy"
description = "Display headings render uppercase in the bundled open-license display face (a wide grotesque, clearly not a default system font) with tight leading and an oversized Network title, while body copy uses Inter"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "theme_surface_computed_colors"
description = "Both themes present coherent surfaces with the specified values: at 1440x900 the html/root background computes rgb(10, 10, 10); the visible fixed nav bar surface computes rgb(255, 255, 255) in light and rgb(21, 20, 19) in dark; body text computes rgb(0, 0, 0) in light and rgb(255, 255, 255) in dark, with legible contrast throughout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "asymmetric_hero_and_sticky_why"
description = "On a desktop viewport the hero composes three unequal regions (Payments Collective lower left, animated center, clock/date and scroll cue on the right) with deliberate offset whitespace rather than equal thirds, and Why Astra uses a sticky heading with full-height stacked cards"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "cta_accent_red_computed"
description = "The CTA accent red computes rgb(255, 57, 74) on primary buttons and .text-red elements (getComputedStyle color/fill)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "display_title_metrics_1440"
description = "At 1440x900 the oversized Why Astra and Network / In Action display titles compute a font-size near 145px with line-height near 116px in the bundled display face, uppercase, and section headings compute near 47.9px"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "self_hosted_display_face_and_inter"
description = "Headings and nav links resolve to a self-hosted bundled display face (a named webfont family that is neither source licensed face nor a generic system fallback) and body copy resolves to Inter (computed font-family)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "no_horizontal_overflow_across_breakpoints"
description = "At 1440, 1024, and 390 widths no horizontal scrollbar appears and no content clips or overflows the viewport, and images and video panels keep their aspect ratios at every width"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "nav_metrics_across_breakpoints"
description = "The measured nav height is about 67px at 1440, 88px at 1024, and 80px at 390; the desktop mega-menu row is visible at 1024 and hidden at 390; the fixed nav background does not recolor when scrolling past the hero"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.14"
name = "mandated_copy_exact_no_filler"
description = "All mandated copy strings (section headings, news titles, event dates, form messages) render exactly as specified and free of typos, with consistent uppercase display headings and sentence-cased body copy, and no lorem ipsum, TODO, or template placeholder text anywhere on the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "placeholder_brand_standins_plausible"
description = "The logo position shows an original placeholder wordmark, the trusted marquee shows invented partner names that read as plausible companies, and the footer studio credit uses invented generic text — each at the reference's size, position, and role"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "body_nav_type_and_cta_height"
description = "At 1440x900 body copy computes about 15.7px / 21.2px line-height in Inter, nav links compute about 12.9px at weight 600 in the display face, and primary CTA buttons render about 53.78px tall"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.18"
name = "fluid_clamp_type_and_padding"
description = "Resizing between 1440 and 390 widths shows typography and section padding scaling continuously via clamp-driven tokens (rem minima/maxima with vw midpoints) with no abrupt size jump at the 1025px breakpoint"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "four_px_baseline_spacing_rhythm"
description = "Section paddings, gaps, and major offsets align to a 4px baseline (root --spacing computes to 0.25rem / 4px and measured gaps land on multiples of 4px) rather than arbitrary odd-pixel spacing"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.20"
name = "three_tier_css_tokens_and_red_scarcity"
description = "Document styles expose three tiers of CSS custom properties — palette (--color-red near #ff394a, --color-dark, --color-neutral-950), functional/theme (--text-base/--text-9xl, --padding-md, --ease-out-cubic), and component usage of those tokens on nav/buttons/headings — while the red accent stays scarce on CTAs/active states against the dual-tone black/white canvas rather than washing large surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.22"
name = "scratch_authored_media_inventory_craft"
description = "The Astra identity and required authored media are visibly complete and art-directed: Astra wordmark/symbol; five hero panels; three quick-link illustrations; ten distinct fictional partner marks; five developer/tool illustrations; seven distinct news thumbnails; six solution illustrations; event and builder panels; both seven-avatar community rows; and supporting icons all fill their reference-sized surfaces with coherent, non-repeated artwork"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.a1"
name = "asymmetric_hero_composition"
description = "At 1440 the hero uses proportion-based asymmetric composition — three unequal regions (Payments Collective lower left, animated center, clock/date and scroll cue on the right) with deliberate offset whitespace rather than equal-width thirds."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.a2"
name = "broken_grid_cut_corner_control"
description = "Broken-grid moments stay controlled: cut-corner panels and overlapping sticky Why Astra stacks cross section borders with preserved legibility and align to the same padding/gap scale."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.a3"
name = "display_type_as_visual_asset"
description = "Typography is treated as a core visual asset: oversized uppercase display titles (~145px at 1440) anchor Why Astra and Network In Action, with disciplined scale contrast to ~15.7px Inter body."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.a6"
name = "fluid_type_scales_continuously"
description = "Typography scales fluidly: resizing between 1440 and 390 scales type smoothly via clamp tokens with no abrupt size jumps at the 1025px breakpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.a7"
name = "broken_grid_on_4px_baseline"
description = "Broken-grid asymmetry stays mathematically controlled: spacing and offsets align to the 4px baseline unit so cut-corner overlaps read as deliberate composition."
type = "binary"
weight = 0.5


[[criterion]]
id = "3.40"
name = "session_leads_panel_matches_token_system"
description = "The Session leads panel uses the same dual-tone surfaces, accent red sparingly on CTAs, and cut-corner/button language as the surrounding Newsletter/Contact/Footer regions rather than a visually alien widget."
type = "binary"
weight = 0.5
optional = true

