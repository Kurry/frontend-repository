[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "breakpoint_1025_desktop_vs_mobile_chrome"
description = "At 1025px and wider the hover mega-menus, Start Building button, asymmetric desktop hero column split, and desktop card/table spacing appear; below 1025px the drawer navigation, stacked hero, and mobile spacing apply."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "Below 1025px, primary interactive controls (hamburger, theme toggle, form submit, carousel arrows) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_and_padding_no_jump_at_1025"
description = "Between 1440 and 390 widths, typography and section padding scale fluidly via clamp tokens with no abrupt size jump at the 1025px breakpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "At 1440, 1024, and 390 widths, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_collapses_to_hamburger_below_1025"
description = "Below 1025px the navigation collapses to logo, theme toggle, and a hamburger; the desktop mega-menu row is hidden at 390 and the drawer is the operable nav."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "hero_and_cards_reflow_without_equal_stack_loss"
description = "Below 1025px the hero reflows to stacked rows and card regions reflow logically without collapsing into a uniform equal-width card stack that loses cut-corner geometry."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_hamburger_and_drawer_tap_work"
description = "Below 1025px, tapping the hamburger opens the overlay drawer and accordion taps expand/collapse as expected."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scrollbar_at_key_widths"
description = "At 1440, 1024, and 390 widths no horizontal scrollbar appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "images_and_video_panels_keep_aspect_ratios"
description = "Images and video panels keep their aspect ratios at 1440, 1024, and 390 widths without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_nav_accessible_all_widths"
description = "The fixed navigation remains reachable at 1440, 1024, and 390; measured nav height is about 67px at 1440, 88px at 1024, and 80px at 390, and the fixed nav background stays rgb(10, 10, 10) before and after scrolling past the hero (no scroll-triggered recolor)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_product_breakpoints"
description = "At 1440, 1024, or 390 the layout breaks, overflows, or loses required chrome (mega-menu vs drawer) for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Below 1025px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_narrow_width"
description = "At 390 width body or heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 1440, 1024, or 390 content is cropped or unnecessary scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_nav_missing_or_unresponsive"
description = "Below 1025px the hamburger control is absent from the nav chrome, or tapping it leaves the overlay drawer closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_nav_obscures_content"
description = "The fixed navigation permanently obscures hero or section content with no recoverable scroll offset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_or_stacking_failure_at_width"
description = "At 1440, 1024, or 390 elements overlap incorrectly or stacking order breaks cut-corner panels/sticky stacks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "desktop_chrome_shown_on_mobile_or_inverse"
description = "Below 1025px hover mega-menus and the desktop Start Building row remain as the only nav path, or at ≥1025px the hamburger drawer is the only nav with mega-menus unavailable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "media_static_size_overflows"
description = "Hero or editorial images/video panels use a static size that overflows the viewport at 390 or 1024."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "theme_toggle_disappears_at_width"
description = "The theme toggle disappears at 390 or 1024 while remaining required chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_composition_reflow_preserves_hierarchy"
description = "At 390 the asymmetric hero and sticky Why Astra chapter are re-choreographed into a stacked mobile composition that preserves hierarchy rather than a flat equal-column dump of the desktop grid."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.20"
name = "session_leads_usable_at_390"
description = "At 390px width the Session leads panel, its live count, and Undo/Download/Copy controls remain fully visible and operable without horizontal overflow or clipped labels."
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
