[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "breakpoint_1025_desktop_vs_mobile_chrome"
description = "At 1025px and wider the hover mega-menus, Start Building button, asymmetric desktop hero column split, and desktop card/table spacing appear; below 1025px the drawer navigation, stacked hero, and mobile spacing apply."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "Below 1025px, primary interactive controls (hamburger, theme toggle, form submit, carousel arrows) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_and_padding_no_jump_at_1025"
description = "Between 1440 and 390 widths, typography and section padding scale fluidly via clamp tokens with no abrupt size jump at the 1025px breakpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "At 1440, 1024, and 390 widths, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_collapses_to_hamburger_below_1025"
description = "Below 1025px the navigation collapses to logo, theme toggle, and a hamburger; the desktop mega-menu row is hidden at 390 and the drawer is the operable nav."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "hero_and_cards_reflow_without_equal_stack_loss"
description = "Below 1025px the hero reflows to stacked rows and card regions reflow logically without collapsing into a uniform equal-width card stack that loses cut-corner geometry."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_hamburger_and_drawer_tap_work"
description = "Below 1025px, tapping the hamburger opens the overlay drawer and accordion taps expand/collapse as expected."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scrollbar_at_key_widths"
description = "At 1440, 1024, and 390 widths no horizontal scrollbar appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "images_and_video_panels_keep_aspect_ratios"
description = "Images and video panels keep their aspect ratios at 1440, 1024, and 390 widths without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_nav_accessible_all_widths"
description = "The fixed navigation remains reachable at 1440, 1024, and 390; measured nav height is about 67px at 1440, 88px at 1024, and 80px at 390, and the fixed nav background stays rgb(10, 10, 10) before and after scrolling past the hero (no scroll-triggered recolor)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_composition_reflow_preserves_hierarchy"
description = "At 390 the asymmetric hero and sticky Why Astra chapter are re-choreographed into a stacked mobile composition that preserves hierarchy rather than a flat equal-column dump of the desktop grid."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.20"
name = "session_leads_usable_at_390"
description = "At 390px width the Session leads panel, its live count, and Undo/Download/Copy controls remain fully visible and operable without horizontal overflow or clipped labels."
type = "binary"
weight = 1.0

