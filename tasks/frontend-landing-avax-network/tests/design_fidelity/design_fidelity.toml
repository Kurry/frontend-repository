[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_4px_baseline_scale"
description = "At 1440x900, section paddings, gaps, and major offsets follow the 4px baseline (root --spacing near 0.25rem) rather than arbitrary odd-pixel one-offs visible in computed styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_reference_metrics"
description = "At 1440x900 typography matches the spec: oversized Why Astra / Network In Action titles near 145px / 116px line-height uppercase display face; section headings near 47.9px; body near 15.7px / 21.2px Inter; nav links near 12.9px weight 600."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_pixel_match_reference_screenshots"
description = "At 1440 desktop width, composition matches /reference-screenshots/ overview and segment panels to near pixel-parity for nav, hero, sticky Why cards, Network tables, News carousel, and footer density/proportions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: scroll section reveals, theme cross-fade (~0.3s), mega-menu fade/translate, and marquee loops — verified via the real UI/scroll path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns at the 1025px product breakpoint: mega-menus vs drawer, desktop 3/6/3 hero vs stacked mobile hero, Lenis on above 1024 and off at or below 1024."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "cut_corner_controls_match_spec"
description = "Primary CTA buttons and cut-corner panels match the reference styling (custom frames, ~53.78px CTA height at 1440x900) rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes uppercase display section titles from Inter body copy across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover/active/disabled states match the reference where specified: nav accent hover, carousel end-arrow disabled states, and theme toggle sun/moon swap."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_and_accent_exact"
description = "Color treatments match exactly: html/root rgb(10,10,10); nav surface rgb(255,255,255) light / rgb(21,20,19) dark; body text rgb(0,0,0) light / rgb(255,255,255) dark; accent red rgb(255,57,74)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions follow the reference language (nav accent shift, button ease, marquee pause) with theme .transition-mode duration near 0.3s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_baseline"
description = "Visible major section gaps use arbitrary odd-pixel spacing that contradicts the 4px baseline scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_dual_tone_palette"
description = "Surfaces or accents use colors outside the specified dual-tone black/white canvas and rgb(255,57,74) accent system (e.g. arbitrary purple/blue theme wash)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440x900 display titles or section headings are grossly mismatched versus the ~145px / ~47.9px reference metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no scroll reveals, no theme transition, or no mega-menu hover panel motion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary CTAs or form controls use unstyled browser default appearance when the reference uses cut-corner/token-styled controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_screenshots"
description = "At 1440 the nav/hero/Why/Network composition is grossly misaligned versus /reference-screenshots/ segment panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (hero panels, sticky Why cards, Network tables, footer marquee) render off-screen or clipped at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated homepage order (nav → hero → Why Astra → … → footer) or omits a required section."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/case throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or theme swap microinteractions are missing or clearly deviate from the reference (instant snaps, no marquee pause, no nav accent)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.20"
name = "session_leads_additive_without_breaking_reference_order"
description = "The Session leads panel is additive between Contact and Footer and does not remove, reorder, or replace the reference sections (Hero through Contact and Footer) whose composition must still match /reference-screenshots/."
type = "binary"
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
