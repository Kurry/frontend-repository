[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "newsletter_next_back_advances_step_surfaces"
description = "Starting on newsletter step 1 of 5: clicking Next advances exactly one step and both the step counter and progress bar reflect the new step; clicking Back retreats one step with the same two surfaces updating."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "newsletter_submit_shows_thank_you"
description = "On newsletter step 5, submitting a valid subscribe request body shows Thank you for subscribing after a brief delay (~500ms) and appends one newsletter lead (Session leads total +1); an invalid step-5 submit shows named field errors, no thank-you, and appends no lead."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "newsletter_step_survives_scroll"
description = "Starting on newsletter step 1: click Next twice to reach step 3, then scroll to the top of the page and back down; the form remains on step 3 with matching step counter and progress bar (step state does not reset from mere scrolling)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "contact_valid_submit_success_and_clear"
description = "Filling a valid contact lead request body (including otherDetail when project_type is Other) and submitting shows Success! We'll be in touch. after a brief delay (~600ms), clears every field, and appends one contact lead (Session leads total +1)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "contact_otherDetail_conditional_round_trip"
description = "Choosing project_type Other reveals the conditional otherDetail field; typing a value then switching away from Other hides the field and discards its value (re-selecting Other shows it empty)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "theme_toggle_recolors_and_persists_while_scrolling"
description = "Toggling the theme adds or removes the dark state on the document root, recolors every surface/text/accent across sections in the same pass, swaps sun/moon icons, and the choice persists while scrolling and interacting; toggling back restores the exact prior palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "news_carousel_paging_and_bounds"
description = "Paging the news carousel forward updates the visible cards and the arrows' enabled state at the track ends; at the first slide previous is disabled and at the last slide next is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "news_carousel_resets_on_scroll_above"
description = "After paging the news carousel away from the first slide, scrolling above the carousel and back resets it to the first slide with the previous arrow disabled again."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "mobile_drawer_open_locks_scroll"
description = "Below 1025px: tapping the hamburger opens the overlay drawer with four accordions, locks background scrolling, and sets the control's aria-expanded to true."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "mobile_drawer_close_restores_position"
description = "Below 1025px: closing the open drawer restores background scrolling and the collapsed aria-expanded state, and the page scroll position is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "newsletter_or_contact_primary_flow_unavailable"
description = "The newsletter cannot advance through its five steps to Thank you for subscribing, or the contact form cannot reach Success! We'll be in touch. from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "theme_or_carousel_state_desyncs"
description = "After a theme toggle or carousel page, some sections keep the prior palette or the carousel arrows disagree with the visible slide (state not synced across surfaces)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "drawer_blocks_with_no_exit"
description = "Below 1025px the mobile drawer overlay opens but cannot be closed, leaving navigation blocked with no exit path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "failed_form_flow_lacks_feedback"
description = "Submitting the contact form with required fields empty produces no inline field-naming errors and no visible failure feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "flow_dead_end_requires_reload"
description = "After opening the drawer, advancing newsletter steps, or submitting a form, recovering normal homepage interaction requires a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "land_scroll_submit_confirm"
description = "On a fresh load: land on the hero, scroll through mid-page sections to Newsletter or Contact, complete a valid submit, and see the matching confirmation (Thank you for subscribing or Success! We'll be in touch.) without leaving /."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "session_lead_export_download_and_copy"
description = "After at least one successful submit, the Session leads panel shows the new row; Download JSON downloads astra-session-leads.json including that payload; Copy JSON copies the same JSON and shows Copied confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "second_submit_export_contains_both"
description = "After two successful submits with different emails (or names), a subsequent export's leads array contains both distinct payloads and counts.total equals 2."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "undo_last_lead_then_export_omits_it"
description = "With two leads present, Undo last lead removes the newest row and decrements the total by one; a subsequent export's leads array omits the undone entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n6"
name = "export_flow_unavailable_after_submit"
description = "After a successful newsletter or contact submit, Download JSON / Copy JSON controls are absent from the Session leads panel, or activating them yields an empty download/clipboard payload that omits the just-submitted lead."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.15"
name = "contact_otherDetail_invalid_then_valid"
description = "With project_type Other and empty otherDetail, submit shows a named otherDetail error and no success; then filling otherDetail (at least 2 characters) and the remaining valid lead fields and submitting shows Success! We'll be in touch., clears the form, and appends exactly one contact lead."
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
