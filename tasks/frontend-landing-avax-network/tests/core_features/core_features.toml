[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "single_page_sections_in_order"
description = "On load, / returns 200 as a single continuous scrolling homepage (no in-app route change) and renders all sections in order: navigation, hero, Why Avalanche, quick links, trusted marquee, Developer Hub, Network, News, Solutions, Community, events/support, Newsletter, Contact, and footer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "hero_and_why_card_titles"
description = "On load, the hero shows the Payments Collective card, the brand statement, a live local time and full date, and the four Why Avalanche cards read Fast. Powerful. Secure., Infinitely Scalable by Design, Customizable Layer 1s, and Global Community"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "network_live_stats_and_tables"
description = "On load, the Network section shows the transaction total 60,932,291 with a Live Stats badge and Latest blocks and Latest transactions tables of seven rows each"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "news_carousel_seven_titles_in_order"
description = "On load, the News carousel shows exactly seven cards whose titles appear in this order: Avalanche Payments Collective: How a Payments Ecosystem Took Shape on Avalanche; NEC Signs MOU to Explore Biometric-Verified On-Chain Services on Avalanche; Progmat is Now on Avalanche; Retro9000 C-Chain Round 4: New Mechanics, Rewards and Opportunities for Builders; Avalanche Team1 Applications Are Now Open; The Avalanche Foundation Introduces Call For Research Program Selection Committee; and The Avalanche Foundation Opens Up To $50,000 In Research Grants On Avalanche Network Economics — with previous/next controls and a View More call to action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "theme_toggle_recolors_document"
description = "When the theme toggle is clicked, the document root gains or loses its dark state and every surface, text, and accent recolors without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "newsletter_next_back_step_surfaces"
description = "After clicking Next in the newsletter form, the step counter advances (1 of 5 to 2 of 5) and the progress bar grows; clicking Back returns to the prior step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "newsletter_submit_thank_you"
description = "After completing the five newsletter steps and submitting, the message Thank you for subscribing appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contact_valid_submit_success_and_clear"
description = "After submitting the contact form with valid first name, last name, email, project type, and message, the message Success! We'll be in touch. appears and the form clears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "contact_empty_submit_inline_field_errors"
description = "When the contact form is submitted with required fields empty, inline error messages appear that each name the specific missing field, no success message appears, and no previously entered field values are cleared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "contact_other_conditional_field_round_trip"
description = "When project type Other is selected in the contact form a conditional detail input is revealed; after typing into it and switching the project type away from Other, the detail input is hidden again and re-selecting Other shows it empty (its value was discarded)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "mobile_drawer_lenis_off"
description = "On a viewport 1024px or narrower, the navigation is a hamburger drawer, Lenis smooth scrolling is off, and tapping the hamburger opens the overlay drawer and sets aria-expanded to true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "section_reveal_on_real_scroll"
description = "When a lower section such as Network or Contact scrolls into view, it reveals with its heading character flash and line reveals rather than appearing pre-shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "carousel_reset_and_empty_community_feed"
description = "When the blog carousel is scrolled past and the viewport returns above it, the carousel resets to its first slide; the community feed stays empty with disabled previous/next arrows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "hover_chrome_and_marquee_pause"
description = "On hover, navigation labels and mega-menu link rows take an accent/wash change, buttons ease their frame, and the trusted-logo and footer wordmark marquees pause"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "why_cards_numbered_titles"
description = "The four Why Avalanche cards read Fast. Powerful. Secure., Infinitely Scalable by Design, Customizable Layer 1s, and Global Community, numbered 01 to 04"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "solutions_six_cards"
description = "The Solutions section shows six cards for Institutions and Capital Markets, Gaming, Enterprise and Consumer Apps, DeFi, NFTs, Arts, and Culture, and Infrastructure and Tooling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "events_summit_and_support_cards"
description = "The Events section shows an Avalanche Summit New York card dated Sep 16-17, 2026 and the support cards Questions about Avalanche?, Avalanche Team1, and The Community Hub"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "section_missing_or_filler_copy"
description = "Any homepage section from the required order is missing, empty, or renders lorem-ipsum/TODO/template filler text instead of the mandated copy strings"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "form_controls_are_nonfunctional"
description = "A form control appears but does nothing: the newsletter never reaches Thank you for subscribing or the contact form never reaches Success! We'll be in touch."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "nav_chrome_complete_with_placeholder_wordmark"
description = "The fixed navigation shows an original placeholder wordmark in the logo position, mega-menu labels Build, Solutions, Community, and About, a separate Grants link, a light/dark theme toggle, and a Start Building call to action; hovering a desktop menu label fades and translates its panel of links into view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "quick_links_and_partner_marquee"
description = "The quick-links region shows three cards for wallet setup, the AVAX token, and ecosystem exploration, followed by the statement Avalanche is Trusted by Businesses Worldwide and a horizontal marquee containing at least ten distinct original placeholder partner logos"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "developer_hub_cards_present"
description = "The Developer Hub shows the heading Build on the Network Designed for Big Ideas, explanatory copy, image cards for Academy, Builder Console, Documentation, Integrations, and tools, and a final Start Building tile"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "community_section_arrows_stay_disabled"
description = "The Community section shows Join The Best Community in web3, X / Arena / Discord / YouTube / Reddit / LinkedIn buttons, a Follow @avax control, and an empty feed track whose previous and next arrows are disabled on load and remain disabled after clicking them, hovering them, and scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "newsletter_flow_state_survives_scroll"
description = "Starting on newsletter step 1, clicking Next twice reaches step 3 with the step counter and progress bar both reflecting step 3; after scrolling to the top of the page and back down, the form is still on step 3; a submit action exists only on step 5, and steps 1 through 4 never show the subscription confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "theme_flow_persists_and_round_trips"
description = "After toggling to dark, the dark state persists across all sections while scrolling the full page and interacting with the carousel; toggling back to light restores the exact prior palette (body text returns to rgb(0, 0, 0) and the nav surface to rgb(255, 255, 255))"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "carousel_arrow_bounds_no_wrap"
description = "At the news carousel's first slide the previous arrow is disabled; after paging to the last slide the next arrow is disabled; clicking a disabled end arrow does not wrap the carousel around"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "hero_clock_live_updates"
description = "The hero shows a local time and full date that visibly refresh within about four to eight seconds of watching, without a page reload"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.36"
name = "drawer_close_restores_scroll_state"
description = "On a viewport below 1025px, the open drawer contains four accordions and background scrolling is locked; closing the drawer restores background scrolling, sets the hamburger's aria-expanded to false, and leaves the page scroll position unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "footer_columns_marquee_and_credit"
description = "The footer shows the original placeholder mark, six link columns, a fast repeating white placeholder-wordmark marquee, and a generic studio credit line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "multi_route_app_shell_present"
description = "Exercising primary chrome (mega-menu destinations, Start Building, or footer column links) navigates into a second in-app route or page shell with its own document content instead of staying on the single continuous homepage scroll at /"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user-flow behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
