[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "single_page_sections_in_order"
description = "On load, / returns 200 as a single continuous scrolling homepage (no in-app route change) and renders all sections in order: navigation, hero, Why Astra, quick links, trusted marquee, Developer Hub, Network, News, Solutions, Community, events/support, Newsletter, Contact, Session leads, and footer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "hero_and_why_card_titles"
description = "On load, the hero shows the Payments Collective card, the brand statement, a live local time and full date, and the four Why Astra cards read Fast. Powerful. Secure., Infinitely Scalable by Design, Customizable Layer 1s, and Global Community"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "network_live_stats_and_tables"
description = "On load, the Network section shows the transaction total 60,932,291 with a Live Stats badge and Latest blocks and Latest transactions tables of seven rows each"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "news_carousel_seven_titles_in_order"
description = "On load, the News carousel shows exactly seven cards whose titles appear in this order: Astra Payments Collective: How a Payments Ecosystem Took Shape; Northstar Systems Explores Biometric-Verified On-Chain Services; LedgerWorks is Now on Astra; Forge9000 Round 4: New Mechanics, Rewards and Opportunities for Builders; Launch Team Applications Are Now Open; The Astra Foundation Introduces Its Research Selection Committee; and The Astra Foundation Opens $50,000 In Research Grants for Network Economics — with previous/next controls and a View More call to action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "theme_toggle_recolors_document"
description = "When the theme toggle is clicked, the document root gains or loses its dark state and every surface, text, and accent recolors without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "newsletter_next_back_step_surfaces"
description = "After clicking Next in the newsletter form, the step counter advances (1 of 5 to 2 of 5) and the progress bar grows; clicking Back returns to the prior step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "newsletter_submit_thank_you"
description = "After completing the five newsletter steps with a valid subscribe request body and submitting on step 5, the message Thank you for subscribing appears and the Session leads total increments by 1 with a new newsletter lead row whose payload matches the subscribe field contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contact_valid_submit_success_and_clear"
description = "After submitting the contact form with a valid lead request body (firstname, lastname, email, project_type, astra_contact_message of at least 10 characters, gdpr true, and otherDetail when project_type is Other), the message Success! We'll be in touch. appears, the form clears, and the Session leads total increments by 1 with a new contact lead row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "contact_empty_submit_inline_field_errors"
description = "When the contact form is submitted with required fields empty, inline error messages appear that each name the specific missing field, no success message appears, and no previously entered field values are cleared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "contact_otherDetail_conditional_round_trip"
description = "When project_type Other is selected in the contact form the conditional otherDetail input is revealed; after typing into it and switching the project type away from Other, otherDetail is hidden again and re-selecting Other shows it empty (its value was discarded)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "mobile_drawer_lenis_off"
description = "On a viewport 1024px or narrower, the navigation is a hamburger drawer, Lenis smooth scrolling is off, and tapping the hamburger opens the overlay drawer and sets aria-expanded to true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "section_reveal_on_real_scroll"
description = "When a lower section such as Network or Contact scrolls into view, it reveals with its heading character flash and line reveals rather than appearing pre-shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "carousel_reset_and_empty_community_feed"
description = "When the blog carousel is scrolled past and the viewport returns above it, the carousel resets to its first slide; the community feed stays empty with disabled previous/next arrows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "hover_chrome_and_marquee_pause"
description = "On hover, navigation labels and mega-menu link rows take an accent/wash change, buttons ease their frame, and the trusted-logo and footer wordmark marquees pause"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "why_cards_numbered_titles"
description = "The four Why Astra cards read Fast. Powerful. Secure., Infinitely Scalable by Design, Customizable Layer 1s, and Global Community, numbered 01 to 04"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "solutions_six_cards"
description = "The Solutions section shows six cards for Institutions and Capital Markets, Gaming, Enterprise and Consumer Apps, DeFi, NFTs, Arts, and Culture, and Infrastructure and Tooling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "events_summit_and_support_cards"
description = "The Events section shows an Astra Forum New York card dated Sep 16-17, 2026 in NYC and the support cards Questions about Astra?, Launch Team, and The Community Hub"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "section_missing_or_filler_copy"
description = "Any homepage section from the required order is missing, empty, or renders lorem-ipsum/TODO/template filler text instead of the mandated copy strings"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "form_controls_are_nonfunctional"
description = "After completing the five newsletter steps and submitting, the UI stays on the form without showing Thank you for subscribing; or after a valid contact submit, the UI stays without showing Success! We'll be in touch."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "nav_chrome_complete_with_placeholder_wordmark"
description = "The fixed navigation shows an original placeholder wordmark in the logo position, mega-menu labels Build, Solutions, Community, and About, a separate Grants link, a light/dark theme toggle, and a Start Building call to action; hovering a desktop menu label fades and translates its panel of links into view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "quick_links_and_partner_marquee"
description = "The quick-links region shows three cards for wallet setup, the ASTRA token, and ecosystem exploration, followed by the statement Astra is Trusted by Businesses Worldwide and a horizontal marquee containing at least ten distinct original placeholder partner logos"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "developer_hub_cards_present"
description = "The Developer Hub shows the heading Build on the Network Designed for Big Ideas, explanatory copy, image cards for Academy, Builder Console, Documentation, Integrations, and tools, and a final Start Building tile"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "community_section_arrows_stay_disabled"
description = "The Community section shows Join The Best Community in web3, Updates / Forum / Chat / Video / Boards / Careers buttons, a Follow @astra control, and an empty feed track whose previous and next arrows are disabled on load and remain disabled after clicking them, hovering them, and scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "newsletter_flow_state_survives_scroll"
description = "Starting on newsletter step 1, clicking Next twice reaches step 3 with the step counter and progress bar both reflecting step 3; after scrolling to the top of the page and back down, the form is still on step 3; a submit action exists only on step 5, and steps 1 through 4 never show the subscription confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "theme_flow_persists_and_round_trips"
description = "After toggling to dark, the dark state persists across all sections while scrolling the full page and interacting with the carousel; toggling back to light restores the exact prior palette (body text returns to rgb(0, 0, 0) and the nav surface to rgb(255, 255, 255))"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "carousel_arrow_bounds_no_wrap"
description = "At the news carousel's first slide the previous arrow is disabled; after paging to the last slide the next arrow is disabled; clicking a disabled end arrow does not wrap the carousel around"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "hero_clock_live_updates"
description = "The hero shows a local time and full date that visibly refresh within about four to eight seconds of watching, without a page reload"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.36"
name = "drawer_close_restores_scroll_state"
description = "On a viewport below 1025px, the open drawer contains four accordions and background scrolling is locked; closing the drawer restores background scrolling, sets the hamburger's aria-expanded to false, and leaves the page scroll position unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "footer_columns_marquee_and_credit"
description = "The footer shows the original placeholder mark, six link columns, a fast repeating white placeholder-wordmark marquee, and a generic studio credit line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "multi_route_app_shell_present"
description = "Exercising primary chrome (mega-menu destinations, Start Building, or footer column links) navigates into a second in-app route or page shell with its own document content instead of staying on the single continuous homepage scroll at /"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.39"
name = "session_leads_panel_live_count"
description = "Between Contact and Footer, a Session leads panel shows a live total count starting at 0 with an empty-state line; after a successful newsletter or contact submit the total increments by exactly one and a newest-first lead row appears without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "download_astra_session_leads_json"
description = "After at least one successful lead submit, activating Download JSON triggers a real download named astra-session-leads.json whose body is live-compiled JSON with version, theme, counts, and a leads array containing that submission's payload fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "copy_json_shows_copied_confirmation"
description = "Activating Copy JSON copies the same session-lead JSON text to the clipboard and shows a visible Copied confirmation (label swap or toast) that clears within about three seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "undo_last_lead_decrements"
description = "With two or more leads present, Undo last lead removes only the newest row, decrements the total by exactly one, and leaves older leads visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "export_reflects_distinct_session_mutations"
description = "After two successful submits with different emails (or names), the exported astra-session-leads.json leads array contains both distinct payloads and counts.total equals 2"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n39"
name = "export_omits_session_lead_mutations"
description = "After a successful newsletter or contact submit, Download/Copy JSON yields a leads array that omits the just-submitted payload or keeps counts.total at 0"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.44"
name = "newsletter_subscribe_payload_step_fields"
description = "The five-step newsletter form exposes the subscribe request-body fields by step: step 1 firstname/lastname/email/socialhandle; step 2 country and vertical closed enums; step 3 isDeveloper and hasWeb3Experience; step 4 isStudent and source; step 5 gdpr, marketing_consent, and newsletter — and a valid final submit's lead payload includes those collected values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "contact_lead_payload_otherDetail_cross_field"
description = "A valid contact submit with project_type Other includes otherDetail on the contact lead payload; a valid submit with a non-Other project_type omits otherDetail from the payload; Success! We'll be in touch. appears only when the lead request body passes the field contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n40"
name = "success_without_passing_field_contract"
description = "Thank you for subscribing or Success! We'll be in touch. appears after a submit whose payload fails the declared subscribe or contact field contract (missing required fields, invalid email, out-of-enum values, or otherDetail missing when project_type is Other)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user-flow behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
