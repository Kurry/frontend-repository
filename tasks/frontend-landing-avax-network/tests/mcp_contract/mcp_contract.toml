[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_and_form_modules_bound"
description = "Contract modules browse-query-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, form, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, form, and artifact tool handlers drive the same visible UI logic as the on-page controls (theme toggle, section destinations including session-leads, newsletter advance/submit, contact validate/submit, Download/Copy JSON)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_and_destinations"
description = "Only documented browse operations (open, search, apply_filter, clear_filter, sort, set_locale, set_theme), form operations (validate, submit, cancel, reset, advance, return), and artifact operations (export, copy) are available — no undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/set_theme, form advance/validate/submit, and artifact export/copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_open"
description = "Browse open works for declared destinations: hero, solutions-insights, links, companies, developers-hub, numbers, blog, solutions, community, event, questions, newsletter, contact-us, session-leads, footer."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_validate_submit_advance_return_bound"
description = "Form-workflow operations validate, submit, cancel, reset, advance, and return are bound for the newsletter/contact workflows and surface the same validation/success UI as manual use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "themes_and_workflow_steps_match_bindings"
description = "Browse set_theme accepts light and dark; form workflow steps expose step-1 through step-5 matching the Bindings block."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / form-workflow-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_copy_bound"
description = "artifact-transfer-v1 exposes export (format json) and copy operations that drive the same Session leads Download JSON / Copy JSON handlers as the visible UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_export_reflects_session_leads"
description = "After a successful newsletter or contact submit via UI or form MCP, invoking artifact.export with format json acknowledges the live session lead log (same store as the visible Session leads panel / download)."
type = "binary"
weight = 1.0

