[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting on the homepage: toggle theme to dark, advance the newsletter to step 3, page the news carousel forward, and submit one contact lead; then reload. All facets coherently reset to the seeded baseline (light theme default, newsletter step 1, carousel first slide, Session leads total 0 / empty log) — never a mixed partial survival of some facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "theme_toggle_derived_surfaces_change"
description = "Derived-view sensitivity: toggle light→dark and confirm body text and nav surface computed colors change meaningfully (rgb(0,0,0)→rgb(255,255,255) body; nav rgb(255,255,255)→rgb(21,20,19)); toggle back restores the originals exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "theme_echo_across_distant_sections"
description = "Cross-view echo: toggle theme while viewing the hero, then scroll to Footer and Contact without reload; those distant sections show the same dark/light palette as the hero."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "newsletter_step_count_delta"
description = "Count-delta integrity: note the newsletter step counter, click Next once, and confirm the counter and progress bar both advance by exactly one step with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "contact_other_input_dependent"
description = "Input-dependent output: select project_type Other (otherDetail appears), then switch to a non-Other type (otherDetail hides and value discarded); repeating with Other vs non-Other yields different visible field sets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_newsletter_and_theme"
description = "Interleaved-flow integrity: advance newsletter to step 2, toggle theme, advance newsletter to step 4, toggle theme again; newsletter remains on step 4 with matching progress and the final theme matches the last toggle — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "carousel_reset_edge_round_trip"
description = "Edge-state round-trip: page the news carousel to a later slide (previous enabled), scroll above it so it resets to slide 0 with previous disabled, then page forward again; arrows and visible cards track both transitions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_input_dependent_payloads"
description = "Input-dependent output: perform two contact (or newsletter) submits with different emails/names; the exported astra-session-leads.json leads payloads differ accordingly (not byte-identical hardcoded rows)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_updates_export_and_count"
description = "Cross-view echo: after Undo last lead, both the Session leads list/total and a subsequent Copy/Download JSON export omit the undone entry and show the decremented counts.total."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "theme_mirrored_in_export"
description = "Toggle to dark, then Download/Copy JSON; the exported object reports theme dark matching the document; toggle back to light and export again reports theme light."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "valid_create_export_matches_field_contract"
description = "After a valid contact submit with project_type Other and otherDetail of at least 2 characters, the exported lead payload includes firstname, lastname, email, project_type Other, otherDetail, astra_contact_message, and gdpr true; after a valid newsletter submit, the exported newsletter payload includes firstname, email, country, vertical, isDeveloper, and gdpr true matching the filled values."
type = "binary"
weight = 1.0

