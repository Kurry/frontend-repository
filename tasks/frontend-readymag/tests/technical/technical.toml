[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Every request the page makes is same-origin with the app or a data:/about: URL; no external font, image, video, CSS, or script CDN request fires (negative anchor: a remote font or analytics request is issued to an external host)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "The page produces no uncaught JavaScript console errors and no failed asset request (no 4xx/5xx or net::ERR) for scripts, styles, images, fonts, or media"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "After the page loads and its motion runs, localStorage and sessionStorage remain empty (state is held in memory, not browser storage)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "The page issues a request to an external host (remote font, image, video, script, analytics, consent, or telemetry endpoint)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "The console reports an uncaught error, or an asset request fails with a 4xx/5xx status or net::ERR"
type = "binary"
weight = 1.0
negate = true
