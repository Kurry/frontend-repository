[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Optional bonus: beyond required toasts and progress motion, the batch runner adds unique microinteractions around Launch, Export run, or retry resolution"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional bonus: beyond the required stagger, countdown, and modal transitions, the app adds advanced motion such as coordinated flip markers or a live-drawing timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "Optional bonus: a short coachmarks tour highlights the composer, Export run, and Launch on first visit, dismissible and never blocking the primary workflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "run_activity_feed"
description = "Optional bonus: a compact run activity feed lists the last several launches, retries, pauses, and exports with timestamps, derived from the same store as the event timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "Optional bonus: useful keyboard shortcuts or a command palette operate Launch, Export run, or queue macros beyond the required keyboard paths"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional bonus: density toggles, column visibility, or default concurrency preferences beyond the specification are available"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_product_narrative"
description = "Optional bonus: the app presents a polished product identity and narrative rather than an anonymous admin shell"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming"
description = "Optional bonus: a dynamic theme or color mode beyond requirements is offered and consistently applied"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "printable_run_summary"
description = "Optional bonus: a printable run summary layout reachable from the export drawer restates rollups and failure rate without changing store state"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_polish"
description = "Optional bonus: overall execution reaches competition-level polish visible to operators using the runner"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The build is purely spec-compliant with no enhancement anywhere beyond the minimum required surfaces"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_or_copied_feel"
description = "Interactions and visuals feel generic, templated, or copied with no product identity"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
