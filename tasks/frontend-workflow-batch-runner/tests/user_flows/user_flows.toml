[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "compose_flow_lands_everywhere"
description = "Composing a job from pasted CSV creates a sidebar entry whose name, row count, and Ready status match the composer input, and the job is immediately launchable"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_compose_inline_validation"
description = "Submitting the composer with an empty name or zero dataset rows triggers immediate inline validation naming the field, with no job created"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_displays"
description = "Editing a job (name, concurrency, or schedule) updates its sidebar entry, composer prefill, and any run headers without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_clears_surfaces"
description = "Deleting a job removes it from the sidebar, the comparison pickers, and the main panel after confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "run_view_switches_retain_state"
description = "Switching between the grid, comparison view, and another job and back retains the run's statuses, the applied timeline filter, and the queue order"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Deleting every job leaves a clear empty state in the sidebar and main panel with a control to create a new job"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "timeline_filter_flow"
description = "Filtering the event timeline by status narrows entries everywhere the timeline renders, and clearing the filter restores the full log"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "sidebar_collapse_continuity"
description = "Collapsing and reopening the job sidebar (including the overlay at narrow widths) preserves the selected job and run state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_flows"
description = "The composer, schedule form, confirmation dialog, and inspector each open, complete their flow, and close without losing surrounding state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload"
description = "A mis-step — canceling a compose, closing the inspector, clearing a comparison — recovers to a working view without a reload or dead end"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "durability_pipeline_end_to_end"
description = "The full durable pipeline works in one session: compose with create-payload fields, launch, deterministic failures retry with countdowns, one item exhausts into failed, Retry failed items resolves it, a pause and resume continues from the checkpoint, and Export run JSON shows schemaVersion batch-run-v1 with job/model/concurrency and per-item statuses, attempts, and costs matching the grid exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "mutation_to_export_flow"
description = "After Stop All or a retry, reopening Export run shows the JSON items array and rollups reflecting those mutations, with Copy and Download JSON available"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "export_import_round_trip_flow"
description = "After a run mutation, Copy or Download the Run Report JSON, Import that same text, and confirm the visible grid, rollups, and timeline match the pre-export mutated state and the next Export preview matches again"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable"
description = "Composing, launching, retrying, pausing, exporting, importing, or deleting a job is not achievable from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_jobs_missing_or_duplicated"
description = "A composed job fails to appear in the sidebar or appears more than once"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "run_state_desyncs_displays"
description = "A retry, pause, macro, or reorder is reflected in one surface but not another (grid vs rollups vs timeline vs history)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_loses_selection"
description = "Switching jobs or toggling the comparison view breaks the layout or loses the selected run"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_jobs_breaks_ui"
description = "Emptying the job list produces a broken or blank main panel instead of the empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The timeline filter and the grid disagree about which transitions exist for a status"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_sidebar_stuck"
description = "The collapsed job sidebar cannot be reopened"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "The composer, inspector, or a dialog blocks navigation with no exit option"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_silent"
description = "A failed flow — malformed paste, invalid schedule, empty retry — gives no user feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "dead_end_requires_reload"
description = "Any flow dead-ends so that only a page reload recovers the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
