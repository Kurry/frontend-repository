[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "completed_items_staggered"
description = "During a run started from the real Launch control, newly completed items animate into their settled state one at a time roughly 60 milliseconds apart rather than snapping together"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "progress_bar_eased"
description = "The progress bar advances with a smooth eased width transition rather than jumping between fractions"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "status_transition_motion"
description = "During a real run the running indicator shows continuous activity, a completing item's status transitions with a short fade rather than snapping, and the retry backoff countdown ticks visibly second by second"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "queue_reorder_animation"
description = "Reordering the pending queue through the real drag path settles the entry into its slot with a short transition, and a keyboard move slides the entry rather than teleporting it"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "macro_flip_reconcile_motion"
description = "Activating a real Start All, Pause All, or Stop All control transitions the affected rows to their new status together, and the reconciling indicator resolves with a subtle fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "hover_system"
description = "Buttons ease background and shadow with a slight press effect; sidebar entries, grid rows, queue entries, and timeline entries take a full-width hover wash; form controls show focus rings — verified with the real pointer while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "modal_enter_exit"
description = "The composer, schedule, and confirmation modals enter with a short opacity and scale transition of roughly 200 to 300 milliseconds and exit the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "inspector_slide"
description = "The inspector panel slides in from the side when an item row is clicked and slides out when closed rather than appearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "feedback_toasts"
description = "Toasts after creating, deleting, exporting, copying the calendar text, and completing a run slide in, remain readable, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion set, rows and statuses appear immediately, the progress bar jumps to its current value, and transitions apply instantly while every flow stays fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "run_motion_absent_or_snapping"
description = "During a real launch the grid shows no motion at all — completed items, status changes, and the progress bar all snap with no transitions anywhere"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "animation_causes_jank"
description = "Any grid, queue, or macro animation causes visible layout shift, flicker, or misaligned rows after settling"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "motion.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion and microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
