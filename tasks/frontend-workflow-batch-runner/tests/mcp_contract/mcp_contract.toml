[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, form_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_batch_job_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse navigation across job views, the composer form flow, session run-lifecycle controls, and artifact export/copy change the same job sidebar, execution grid, rollup strip, event timeline, and run history the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/apply_filter/clear_filter over destinations job-sidebar, job-detail, execution-grid, pending-queue, event-timeline, run-history, compare-runs, result-inspector, and export with filters timeline-status, run-history-selection, and compare-run-pair; form validate/submit/cancel over job-name, prompt-template, model, concurrency, dataset-slice, dataset-paste, and the schedule window; session start/pause/resume/stop/restart/trigger_demo with the simulate-window-start demo; artifact export/copy with formats run-report-json, run-report-csv, and ics-calendar-text — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "composer_submit_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: a valid composer submit through the form tools adds exactly one Ready job to the sidebar and increments the visible job count by one, and simulate-window-start launches every scheduled Ready job so their grids begin advancing."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "run_lifecycle_session_operations_work"
description = "Declared session operations all work against the real run lifecycle: start fills the per-item grid with the same deterministic first-attempt failures per configuration; pause freezes items at a checkpoint and resume proceeds only pending/interrupted items without re-executing completed ones; restart re-queues only failed items of the selected run; stop marks pending and running items stopped while completed outputs, timestamps, and costs stay unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "composer_form_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: a job name over 80 characters is rejected naming the limit, malformed dataset JSON/CSV is rejected with a parse error and rows missing input listed by row number, and a schedule requires both start and end with end after start."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "reports_match_grid_and_declared_enums"
description = "Query and report surfaces match the allowed specification: run-report-json carries the composer's job payload shape plus per-item index, input, output, status, attempts, latency, and cost with status from the closed six-value set {pending, running, complete, failed, retrying, stopped}, matching the grid and rollups exactly, and ics-calendar-text is a BEGIN:VCALENDAR block with one VEVENT per scheduled job carrying its name and window times."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: models stay inside the four-value set, concurrency inside 1-5, prompt templates from the seeded list, and no raw file paths or blobs appear in WebMCP arguments or results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: backoff countdown ticking, pending-queue drag reordering, optimistic macro flips, virtualized-grid scrolling, the job Delete confirmation dialog path, and undo/redo are left to real UI interaction, and downloads and clipboard stay Playwright territory."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "batch_runner_tools_missing_or_noop"
description = "WebMCP tooling for the composer, run lifecycle, queue views, or exports is unbound, missing, or a no-op that reports success while the sidebar, execution grid, or rollup strip stays unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_run_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked stop reports success while running items keep advancing, or a resume re-executes completed items and changes their outputs, timestamps, or costs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_job_capabilities_exposed"
description = "Undeclared capabilities are exposed, such as destinations beyond the nine declared ones, item statuses outside the closed six-value enum, or a generic state setter that patches grid items directly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "composer_bounds_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — concurrency outside 1-5, a model outside the four-value set, an empty dataset with no detected rows, or a schedule whose end precedes its start — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared browse, form, session, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (browse-query-v1, form-workflow-v1, command-session-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the job, run, and schedule state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — replaying pending-queue drag reordering, bypassing the job Delete confirmation dialog, or returning calendar-copy clipboard contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
