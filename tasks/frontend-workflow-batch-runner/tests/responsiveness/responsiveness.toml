[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "The layout adapts gracefully from 1440 pixel desktop to 375 pixel mobile — sidebar, rollups, grid, queue, and inspector all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets"
description = "Macro buttons, queue move controls, row actions, and sidebar entries are tap targets of at least 44 pixels at mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_scales"
description = "Headings, grid text, and rollup values resize appropriately between desktop and mobile"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_viewport_clipping"
description = "No rollup, grid, queue, or inspector content clips or overflows the viewport at any width between 1440 and 375 pixels"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_at_768"
description = "At widths of 768 pixels and below the job sidebar collapses behind a toggle that opens it as an overlay; at desktop widths it is open by default"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths the rollup strip, grid, queue, and timeline stack in a logical reading order"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "touch_paths_work"
description = "On a touch viewport, tapping rows, macros, and queue move controls works; queue reordering remains achievable via the move controls even if drag is unavailable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_page_horizontal_scroll"
description = "At 375 pixel width no page-level horizontal scrolling appears; the execution grid and comparison view scroll within their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "grid_sizes_responsively"
description = "The virtualized grid and comparison table size to their containers rather than forcing a fixed width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_reachable"
description = "The toolbar, undo/redo, and macro controls remain reachable at every width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The layout breaks or overflows at common breakpoints between 1440 and 375 pixels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_unusable"
description = "Queue move controls, row actions, or macros are too small or misaligned to use at mobile widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_unreadably_small"
description = "Grid or rollup text becomes too small to read at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "cropped_content_or_stray_scrollbars"
description = "Content is cropped or unnecessary scrollbars appear around the grid or panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_missing_at_widths"
description = "The job sidebar is unreachable or missing at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_grid"
description = "Fixed toolbar or macro chrome obscures grid rows or the inspector at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_some_size"
description = "Panels overlap each other at some viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "touch_reorder_impossible"
description = "At touch widths the pending queue cannot be reordered by any means"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_grid_overflows"
description = "The grid or comparison table uses a static size that overflows the viewport"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Toolbar, macro, or retry controls disappear entirely at specific widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
