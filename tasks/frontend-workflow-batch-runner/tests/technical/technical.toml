[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared state: an item advancing updates the grid, progress bar, rollup strip, and event timeline together; a retry, pause, resume, or macro is reflected in the grid, rollups, history, and any open inspector; and a job edit, delete, or undo is reflected everywhere the job appears, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_seeded_reload"
description = "localStorage and sessionStorage remain empty after composing, launching, retrying, pausing, reordering, scheduling, exporting, importing, and undoing, and a page reload returns the app to its seeded state (seeded jobs and history, default view, no schedules, closed export/import)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "rapid_input_keeps_sync"
description = "Rapid job switches, macro clicks, and timeline filtering while the 200-item job runs leave every surface consistent — no view shows a status or count another surface already updated differently"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "all_views_reachable"
description = "Every documented surface — composer, grid, queue, inspector, timeline, comparison, schedule form, Export run, Import run — is reachable through in-app controls and renders without errors"
type = "binary"
weight = 1.0

