[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "reload_resets_seeded_baseline"
description = "Multi-facet round-trip: change a reason, complete a re-run, apply a filter, toggle theme, then reload. All facets coherently reset to the seeded baseline — seeded suites, matrices, verdicts, reasons, default filters, and default theme — never a mix of surviving mutations."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "divergence_sort_reversal_probe"
description = "Sort-reversal proof: activate divergence sort, note the order of test identifiers, activate it again; the order reverses relative to the first sort, proving sort is derived from live divergence counts rather than two hardcoded orders."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "quarantine_lists_track_verdict"
description = "Derived-view sensitivity: re-run a flaky or fail test until its verdict changes; the quarantine all-fail and flaky lists and their header counts change membership to match the new verdict rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "reason_echoes_into_export_json"
description = "Cross-view echo: change a test's reason via the select, open Export triage report Triage report JSON; that test's reason field in the preview matches the new vocabulary entry without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "quarantine_count_delta_exact"
description = "Count-delta integrity: measure the flaky or all-fail quarantine header count immediately before and immediately after a re-run that moves a test into or out of that list; the delta is exactly plus or minus one with no lagging counter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_reasons_change_export"
description = "Input-dependent output: assign timing-sensitive to one test and environment-dependent to another (or change the same test twice); the Triage report JSON reason fields differ in the ways the inputs dictate rather than staying byte-identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_rerun_and_reason"
description = "Interleaved-flow integrity: start a re-run on test A, switch suite or open another test's reason select and change it, return to A when the re-run finishes; A's matrix updates and B's reason stays changed with no cross-corruption."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_quarantine_export_round_trip"
description = "Edge-state round-trip: drive the view so every visible test is keep (quarantine lists empty), confirm both export formats show empty quarantine membership, then re-run until a flaky or fail returns; lists and export quarantine arrays repopulate together."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "triage_report_import_round_trip_probe"
description = "Export then import round-trip probe: change a reason and complete a re-run; Copy Triage report JSON; change another reason so the queue diverges; Import the copied JSON; queue reasons, matrices, quarantine counts, and the next Export preview match the pre-import mutated document."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "rerun_echoes_into_detail_and_export"
description = "Cross-view echo: complete a re-run from the real control; the queue matrix, detail schedule, quarantine membership, and Triage report JSON runs for that test all agree with the new results in the same session."
type = "binary"
weight = 1.0

