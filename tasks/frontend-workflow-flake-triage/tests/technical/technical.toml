[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "5.1"
name = "interactive_within_two_seconds"
description = "The app becomes interactive within 2 seconds of a local cold load: the triage queue renders and a test can be selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app, including a complete 10-run re-run, a stop mid-run, reason changes, export copy, and an invalid import attempt"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.3"
name = "reload_returns_seeded_state"
description = "After re-runs, reason changes, filters, a theme toggle, and an export or import surface open, a page reload returns the app to its seeded baseline: the seeded suites, matrices, verdicts, and reasons, the default view, and the default theme, with none of those changes surviving"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.4"
name = "cross_view_state_coherence"
description = "A change made in one surface is immediately reflected in every other surface that shows the same data without a reload: a re-run's results appear together in the queue row, detail panel, quarantine map, and Triage report JSON preview, and a reason change appears in the row, the timeline, and the export JSON"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.5"
name = "stable_under_rapid_input"
description = "Rapidly switching suites, toggling filters, opening details, and starting or stopping re-runs causes no hangs, dropped interactions, or desynced surfaces, and double-activating the re-run submit starts exactly one re-run"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.6"
name = "api_shaped_schemas_drive_forms"
description = "Reason update, re-run submit, and Import triage report validate through client-side schemas: invalid runCount or invalid import JSON shows named field or import errors before commit, and valid commits update the same store the queue and export previews read"
type = "binary"
weight = 1.0

