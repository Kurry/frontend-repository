[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Optional bonus: beyond required toasts and re-run tick-in, the triage console adds unique microinteractions around reason change, export copy, or quarantine membership shifts."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional bonus: beyond required panel and toast transitions, the app adds coordinated motion such as matrix cell storytelling during re-runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "Optional bonus: a short coachmarks tour highlights the triage queue, Export triage report, and Start re-run on first visit, dismissible and never blocking the primary workflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Optional bonus: a compact condition-correlation strip shows which varied conditions appear most often on diverging flaky runs in the active suite."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "Optional bonus: keyboard command shortcuts beyond required focus order accelerate suite switch, export, or filter clear."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional bonus: beyond the required light/dark toggle, the operator can personalize triage density or default filters within the session."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "Optional bonus: the shell presents a polished product identity for the flake triage console beyond generic dashboard chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional bonus: beyond light/dark, the app offers an additional theme accent or density mode that recolors triage surfaces without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "Optional bonus: a printable quarantine summary layout reachable from the export drawer restates all-fail and flaky counts without changing store state."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Optional bonus: competition-level innovation is visible in the triage workflow beyond the mandatory export and re-run loops."
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
