[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "triage_layout_composition"
description = "At desktop width the app composes as a dense triage table beside a detail panel, with the quarantine map and audit timeline as distinct panels, rows separated by hairline borders, and panels rendered as cards with subtle shadows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "consistent_result_color_language"
description = "Pass and fail colors are identical wherever run results appear — queue matrix cells, the detail condition schedule, and the re-run ticker — and match a visible legend"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "verdict_chips_distinct_and_consistent"
description = "Keep, flaky, and fail verdict chips are visually distinct from one another and each keeps one consistent treatment across the queue, the detail panel, and the quarantine map"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "typography_hierarchy_and_monospace"
description = "Suite and panel titles are visibly larger than test identifiers, which are larger than condition and timestamp text, and test identifiers, reason identifiers, and the export previews render in a monospaced face"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "theme_toggle_recolors_surfaces"
description = "Toggling the header light/dark control recolors surfaces, chips, and matrix cells without a page reload, and toggling back restores the original colors"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "component_states_and_icons"
description = "One icon set is used consistently across the chrome, and buttons, selects, and inputs show distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "responsive_layout_at_narrow_widths"
description = "At 768 pixels and below the detail panel and quarantine map stack below the queue or open from visible controls, and at 375 pixels no content clips or overflows the viewport, no page-level horizontal scrolling appears, and the queue table scrolls within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "copy_conventions_consistent"
description = "Headings and action labels use one consistent capitalization convention, action labels are specific verbs (such as Start re-run, Stop run, Export triage report, Import triage report, Copy, Download), and no placeholder or lorem-ipsum text appears anywhere in the shipped UI"
type = "binary"
weight = 0.5

