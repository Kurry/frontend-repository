[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Queue rows, panel cards, and form controls use consistent spacing and sizing rather than arbitrary one-off gaps that break the dense triage composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Suite and panel titles are visibly larger than test identifiers, which are larger than condition and timestamp text, matching the visual hierarchy in the instruction."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "At desktop width the composition matches the specified triage layout: dense table beside detail panel, with quarantine map and audit timeline as distinct panels."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Re-run tick-in, verdict chip changes, quarantine list enter/leave, and export/import open/close use the transitions the motion section requires rather than silent snaps for every state change."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "At 768px and below, detail and quarantine panels stack or open from controls as specified rather than keeping an unbroken desktop side-by-side that clips."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Buttons, selects, and inputs show distinct default, hover, focus (visible ring), disabled, and error treatments rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Test identifiers, reason identifiers, and export previews render in a monospaced face while titles remain distinct proportional headings."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Keep, flaky, and fail verdict chips each keep one consistent treatment across queue, detail, and quarantine surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Pass and fail cell colors are identical in queue matrices, the detail schedule, and the re-run ticker, and match a visible legend."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover wash on test rows, timeline entries, and quarantine rows, plus button press feedback, match the required hover animations."
type = "binary"
weight = 1.0

