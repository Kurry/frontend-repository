[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "flaky_triage_end_to_end"
description = "Triage flow: filter to flaky, select a test, change its reason through the closed vocabulary select, and confirm the row updates, a reason-change timeline entry appears, and Triage report JSON shows the new reason — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_rerun_shows_inline_validation"
description = "Re-run flow: submitting without choosing a runCount triggers immediate inline validation naming runCount and starts no re-run."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "reason_change_updates_related_displays"
description = "Reason edit flow: changing a reason updates the queue row, the detail panel's reason display if open, the audit timeline, and the next Triage report JSON preview together."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "rerun_updates_all_surfaces"
description = "Re-run flow: completing a valid 5-run re-run updates the matrix cells, verdict chip, quarantine lists, detail panel, and Triage report JSON together in the same session."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "suite_switch_retains_chrome"
description = "Suite switch: changing suites via the suite switcher shows that suite's queue without a full page reload and keeps theme and chrome usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_quarantine_is_clear"
description = "Edge: when every visible test is keep, both quarantine lists show designed empty states and export quarantine membership is empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_queue_everywhere"
description = "Filter flow: applying verdict, reason, or suite filters narrows the queue; clearing restores the full queue; quarantine map continues to reflect full-suite verdicts."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "detail_panel_preserves_workflow"
description = "Detail panel: selecting a test opens the detail panel; closing or selecting another test continues the triage workflow without losing suite selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_import_overlays_support_flows"
description = "Export and import surfaces open from visible controls, support Copy/Download or paste/apply as specified, and close without trapping the operator."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "stop_mid_run_recovers_without_reload"
description = "Stop flow: start a 10-run re-run, stop after some runs complete, confirm completed results stay frozen, remaining runs never fill in, and the timeline records the stop — recoverable without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "Round-trip flow: after a reason change and completed re-run, Copy Triage report JSON, diverge with another reason change, Import the JSON, and confirm queue, quarantine counts, and next Export match the imported document."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Reason change, re-run, Export triage report, or Import triage report are not reachable from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "reason_change_missing_or_duplicated"
description = "A reason change fails to appear on the row or produces duplicate timeline entries for one change."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "After a re-run or reason change, queue, detail, quarantine, and export disagree until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "suite_switch_breaks_or_loses_selection"
description = "Switching suites breaks the layout or leaves the prior suite's tests visible as if still selected."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_quarantine_breaks_ui"
description = "Empty quarantine lists or empty filter results produce broken or missing UI instead of empty states."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Verdict/reason/suite filters disagree with each other about which tests are visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "detail_panel_cannot_reopen"
description = "After closing the detail panel, selecting a test cannot reopen it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "export_import_blocks_navigation"
description = "Export or import surfaces block the app with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_import_lacks_feedback"
description = "A failed Import triage report provides no user-visible feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "After stop, failed import, or closing export, recovery requires a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
