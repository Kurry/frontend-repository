[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_on_chrome"
description = "Hovering with the real pointer shows visible feedback: buttons ease background and shadow with a slight press effect, test rows, timeline entries, and quarantine list rows take a full-width hover wash, and form controls show focus rings (verify via computed styles while hovering)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "rerun_cells_tick_in_animated"
description = "During a re-run started from the real re-run control (never a state-shortcut tool call), each run's cell ticks in with a short entrance transition as its result lands and the progress indicator advances smoothly rather than jumping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "verdict_and_quarantine_transitions"
description = "Driven through the real re-run flow: a verdict chip that changes transitions to its new treatment rather than swapping instantly, and a test entering or leaving a quarantine list animates into or out of that list rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "panel_and_form_transitions"
description = "The detail panel and the re-run form open through their real controls with a short opacity-plus-scale transition of roughly 200 to 300 milliseconds and exit the same way, and new audit timeline entries animate into the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "toasts_slide_and_autodismiss"
description = "Feedback toasts (copy confirmation, re-run completed, re-run stopped) slide in, remain readable long enough to scan, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, animations are removed while every state change (re-run results, verdict changes, quarantine membership, toasts) still applies instantly and completely"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "snapping_or_janky_transitions"
description = "Interactive chrome gives no motion feedback at all — panels, forms, chips, and toasts snap with no transitions anywhere — or animations cause visible layout jank or flicker that disrupts reading the queue"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
