[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "filter_empty_state_present"
description = "When active filters match no tests, the queue shows an empty state message with a clear-filters control rather than a bare table."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "rerun_validates_runcount_inline"
description = "Submitting the re-run form without choosing a runCount shows an inline message naming the runCount field and starts no re-run."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "import_errors_name_problem"
description = "Import errors name the import problem or offending field (for example schemaVersion, tests, quarantine, verdict, or reason) rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_and_import_show_confirmation"
description = "Copy on an export tab and a successful Import each show visible confirmation feedback (toast or icon swap)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rerun_shows_progress"
description = "While a re-run is active, an overall progress indicator advances as each run ticks in."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "stop_before_any_run_preserves_matrix"
description = "Stopping a re-run before any run completes leaves the test's previous matrix and verdict fully intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "divergence_sort_help_or_label"
description = "The divergence sort control has a visible label or accessible name explaining it orders by diverging runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Suite switcher, reason selects, re-run and stop controls, export and import controls, and filter controls use semantic button, select, or input elements (or equivalent ARIA roles)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_import_escape_closes"
description = "The export and import surfaces close via an explicit close control and via Escape, returning focus to the opener."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "ten_run_rerun_shows_progress_steps"
description = "A 10-run re-run shows progressive run results filling in rather than jumping straight to a final matrix with no intermediate feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_import_leaves_suite_unchanged"
description = "Importing Triage report JSON with wrong schemaVersion, missing tests or quarantine, or a reason outside the 7-item vocabulary shows a named error, leaves reasons and matrices unchanged, and produces no console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "double_submit_starts_one_rerun"
description = "Double-activating the re-run submit control starts exactly one re-run; the audit timeline gains one re-run started entry, not two."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "empty_quarantine_export_headings_only"
description = "When every test in view is keep, both quarantine lists show empty states and Quarantine text contains only group headings with no identifiers while Triage report JSON has empty allFail and flaky arrays."
type = "binary"
weight = 1.0

