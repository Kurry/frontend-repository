[judge]
judge = "claude-code"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "stagehand-webmcp"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@browserbasehq/stagehand@3.7.0",
  "mcp",
  "--env",
  "LOCAL",
  "--chrome-version",
  "151.0.7922.34",
  "--enable-webmcp",
  "--tools",
  "webmcp_session_info,webmcp_list_tools,webmcp_invoke_tool",
  "--disable-tools",
  "act,observe,extract,agent",
  "--cdp-port",
  "$WEBMCP_CDP_PORT",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Operations Overview keeps an asymmetric 12-column mosaic with a primary inverse Revenue run rate card; Users views use dense admin tables/forms"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Role and status use distinct badge treatments; empty list state is visually present when the collection or filter result is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Lays out Operations Overview as a uniform equal-width single-column card stack with no mixed mosaic spans"
type = "binary"
weight = 1.0
negate = true
