[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "mo.1"
name = "causal_motion_update"
description = "Keyframe and curve edits visibly change the sampled typography, wraps, prominence, and validation loop instantaneously upon manipulation."
type = "binary"
weight = 1.0

[[criterion]]
id = "mo.2"
name = "reduced_motion_static"
description = "Toggle the reduced-motion preference. The active score preview updates to a static or crossfade-only mode preserving reading order, without spatial/axis animations beyond limits."
type = "binary"
weight = 1.0

[[criterion]]
id = "mo.3"
name = "reduced_motion_no_override"
description = "Confirm that toggling reduced-motion design on and off does not silently destroy or overwrite the canonical full-motion keyframes."
type = "binary"
weight = 1.0

[[criterion]]
id = "mo.4"
name = "interpolation_quantization"
description = "Axis value interpolation obeys the declared easing curves (linear, ease-in, cubic-bezier) and visibly quantizes sampling without stuttering playback."
type = "binary"
weight = 1.0

[[criterion]]
id = "mo.5"
name = "no_layout_jump_on_render"
description = "Switching views or opening the export drawer causes layout jumps or visible tearing in the canvas preview."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mo.ac3"
name = "motion_ac_03"
description = "Add/retime/curve/scrub/loop, perform a viewport transition, toggle reduced motion, then inspect the reduced editor. Confirm that the causal samples and final states agree exactly."
type = "binary"
weight = 1.0
