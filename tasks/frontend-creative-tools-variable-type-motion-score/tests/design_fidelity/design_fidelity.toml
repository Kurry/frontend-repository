[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "df.1"
name = "css_export_parity"
description = "The exported CSS keyframes, media queries, and percentages perfectly agree with the approved canonical score timelines and viewport overrides without dropping properties."
type = "binary"
weight = 1.0

[[criterion]]
id = "df.2"
name = "svg_storyboard_geometry"
description = "The standalone SVG storyboard accurately renders sampled geometry, text, and axis labels for the specified frames and viewports mirroring the canvas preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "df.3"
name = "fixed_point_precision"
description = "Angles, axes, tracking, and opacity visually render using the declared fixed-point precision functions, preventing sub-pixel smearing of typography."
type = "binary"
weight = 1.0

[[criterion]]
id = "df.ac12"
name = "design_fidelity_ac_12"
description = "Verify fixed-point interpolation/easing, metric wraps, inheritance, prominence, reduced rules, and generated CSS/SVG/Markdown files. Confirm that motion-type semantics are rendered strictly to exact spec."
type = "binary"
weight = 1.0
