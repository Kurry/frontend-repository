[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "vd.1"
name = "visual_hierarchy_legibility"
description = "Inspect selected, interpolated, clipped, overlap, prominence, and full/reduced branch states. The visual hierarchy and contrast remain legible without breaking layout constraints."
type = "binary"
weight = 1.0

[[criterion]]
id = "vd.2"
name = "prominence_lane"
description = "The semantic lane highlights prominence ties, priority inversions, or missing emphasis using visually distinct warning or error styles without automatically correcting them."
type = "binary"
weight = 1.0

[[criterion]]
id = "vd.3"
name = "overlap_stacking_styles"
description = "When blocks overlap intentionally due to an explicit stacking relationship, their visual stacking order accurately reflects the declared relationship."
type = "binary"
weight = 1.0

[[criterion]]
id = "vd.4"
name = "override_provenance"
description = "Responsive overrides or unverified branch data display visible provenance tags or clear visual distinction to indicate their inherited or overridden status."
type = "binary"
weight = 1.0

[[criterion]]
id = "vd.ac2"
name = "visual_design_ac_02"
description = "Inspect selected/keyed/interpolated/clipped/wrapped/overlap/prominence/inheritance/override/full/reduced/branch/finding states. Confirm that visual hierarchy stays legible."
type = "binary"
weight = 1.0
