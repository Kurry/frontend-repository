[[criterion]]
id = "13.1"
description = "Interleave stage position edits, keyframe additions, viewport overrides, reduced score definitions, and branch merges, followed by an undo operation. Verify that the tracks, samples, and lineage round trip accurately and the previous canonical snapshot is restored exactly."
