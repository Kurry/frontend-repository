weight = 1.0

[[criterion]]
id = "13.2"
description = "Execute a full authoring session across multiple viewports. Export the score, clear the application state, and import the same score file. Verify the tracks, UI state, active branch, and keyframe data strictly round trip with identical representation."
type = "binary"
weight = 1.0
