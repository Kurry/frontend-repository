[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "te.1"
name = "import_transaction_atomic"
description = "Treat every import mode as an atomic transaction. A corrupted manifest with an unknown enum or missing ID is completely rejected without applying partial state mutations."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.2"
name = "canonical_event_convergence"
description = "For any given direct-manipulation path (like dragging a block), the exact keyboard shortcut equivalent fires identical event shapes and converges on identical stable IDs and WebMCP state."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.3"
name = "export_parity_checksum"
description = "A canonical JSON re-export is completely byte-identical (and structurally equal) to a previous successful export, save for regenerating the `exportedAt` metadata."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.4"
name = "reload_survival"
description = "State that is persisted (like stage bounds and keyframes) survives a hard browser reload, while transient previews and dialogs correctly reset and do not leak into persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.5"
name = "invalid_events_no_op"
description = "Trigger a double-activation, cancelled drag, or out-of-bounds invalid event. Confirm that zero extra historical events or mutated states are registered."
type = "binary"
weight = 1.0

[[criterion]]
id = "te.ac4"
name = "technical_ac_04"
description = "Interleave UI/WebMCP block, track/keyframe, beat, viewport, playback, reduced mode, branch, validation, history, and transfer actions. Confirm that ids, fixed-point values, checksums, and export files strictly match expected schemas."
type = "binary"
weight = 1.0
