[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "MO-1"
name = "MO-1"
description = "Hovering (without clicking) a sidebar row, the Create note button, and a toolbar control each shows a visibly distinct hover state, and keyboard Tab focus shows a visible focus ring on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-2"
name = "MO-2"
description = "Editing a note shows a transient Saved label that animates in and clears on its own, and creating and deleting a note each show their own transient toast that is visually distinct from the Saved indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-3"
name = "MO-3"
description = "Toggling Focus Mode through its real control animates the sidebar's width and opacity rather than snapping, and the Quick Switcher highlight visibly moves between results as the arrow keys are pressed"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-4"
name = "MO-4"
description = "Sidebar rows, buttons, and toolbar controls show no hover or focus feedback, appearing identical at rest, on hover, and on keyboard focus"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO-5"
name = "MO-5"
description = "Creating or deleting a note produces no visible transient confirmation, or the same indicator is reused for edits and for create/delete with no visual distinction"
type = "binary"
weight = 0.5
negate = true
optional = true
