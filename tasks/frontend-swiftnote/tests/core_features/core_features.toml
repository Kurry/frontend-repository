[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with no notes, the sidebar shows a friendly empty-state message hinting to create the first note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After using the New Note control, an untitled note appears at the top of the sidebar and the title field is focused so typing populates the title without an extra click."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After typing a title and body into the open note, that note's sidebar row shows the title, a one-line body preview, and a relative timestamp, and sorts to the top of the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After creating a second note and editing it, the second note sorts above the first, and a transient Saved label appears after the edit and clears on its own."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When a note's body is edited, the live word count and character count beneath the note update to reflect the exact text entered."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After pinning an older note, it appears above a newer unpinned note in the sidebar, and it stays above even after the newer note is edited."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "When the Search Notes input matches a word in one note's body, the list narrows to that note and the matched term is highlighted in its preview; clearing the search restores all rows; a search matching nothing shows a no-results message."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After inserting an image (file picker or drag-and-drop onto the body), the image renders inline within the open note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After using Duplicate on a note with text and an image, a new separate note appears with the same text and image, and editing the duplicate leaves the original unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When opened via its control or the Ctrl+K / Cmd+K shortcut, the Quick Switcher overlays a dimmed backdrop; typing narrows the list, the Down and Up arrows move and wrap the highlight, and Enter opens the highlighted note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When Focus Mode is toggled, the sidebar hides and the note expands to full width; Exit Focus Mode or Escape restores the sidebar."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When Delete is used, an explicit confirm step appears; cancelling keeps the note, and confirming removes it permanently from the sidebar while other notes remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After creating a note with text, an embedded image, and a pinned second note, a full page refresh restores both notes with their exact text, the inline image, and the pinned note still above the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After activating Load 10,000 Items, the Virtualized items region shows the full total while the Rendered item count stays far below 10,000, and selection and scroll position survive scrolling and filtering."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "The New Note control creates an untitled note at the top of the sidebar and focuses the title field so typing populates the title without an extra click"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The sidebar lists notes sorted most-recently-edited first, each row showing title, a one-line body preview, and a relative timestamp"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Typing a title or body updates that note's sidebar row live and re-sorts it to the top; editing a different note moves it above the previously edited one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "The live word count and character count beneath the open note recompute to match the exact text as it is added or removed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The Quick Switcher overlay narrows the list as the query is typed and pressing Enter opens the currently highlighted note in the editor"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Using only the keyboard inside the Quick Switcher, the Down and Up arrows move the highlight and wrap at the ends, and after typing narrows the list the highlight re-clamps to a still-visible result before Enter opens it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "The Search Notes input filters the list by title or body match, highlights the matched term in the preview, and shows a no-results message when nothing matches; clearing it restores all rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Inserting an image via the file picker or by dragging an image file onto the note body embeds it inline within the open note"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Duplicate clones a note's text and embedded images into a new separate note, and editing the duplicate leaves the original unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Pinning a note keeps it above unpinned notes regardless of edit recency, holding above a newer unpinned note even after that newer note is edited"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Delete requires an explicit confirm step: cancelling preserves the note and confirming removes it permanently from the sidebar while other notes remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Focus Mode hides the sidebar and expands the note to full width, and Exit Focus Mode or Escape restores the sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The Shortcuts control opens an overlay listing keyboard shortcuts including at least New Note, Quick Switcher, and Focus Mode with their key combinations, dismissible by a close control or Escape"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "Export as .txt is present and activating it initiates a text download of the open note without throwing an error"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Load 10,000 Items makes the collection navigable through a visible Virtualized items region while a visible Rendered item count stays far below 10,000, and selection plus scroll position survive scrolling and filtering"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "The note list is a static hardcoded set of rows with no working create, edit, or delete through the visible controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "Delete wipes the note in a single click with no confirmation step"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "1_32"
description = "Pin has no effect on ordering, or edit recency overrides pin so a pinned note falls below a newer unpinned note"
type = "binary"
weight = 0.5
negate = true
optional = true
