[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Dark studio shell with Preview/Editor and Saved Themes density remains tool-like"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Empty Saved Themes state is visually present when the collection is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Presents only a static marketing page without Monaco or saved themes management"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "dark_shell_brand_and_typography"
description = "The shell renders near-black surfaces with light text and an indigo/Material primary accent, Roboto as the UI typeface, Material iconography, and a header brand lockup ('Material-UI Theme Creator' with version affordance) sitting above the main tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "preview_workspace_split_layout"
description = "At desktop width, the Preview tab shows device toggles plus the framed sample site on one side and the code editor with stacked tool panels on the other, in a full-viewport tool-dense layout rather than a marketing-page composition"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "distinct_component_state_treatments"
description = "Buttons, inputs, and accordion rows show visibly distinct default, hover, focus (visible ring), and disabled treatments, each verified via computed styles while the state is active"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "preview_workspace_stacks_at_1024"
description = "At viewport widths of 1024px and below, the Preview workspace stacks vertically with the device preview above the editor and tool panels, and every control remains reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "mobile_375_clipping_or_overflow"
description = "At 375px viewport width, content clips, overlaps, or overflows the viewport, or horizontal scrolling appears"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.9"
name = "consistent_label_capitalization"
description = "Headings, buttons, and tab labels use one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "status_and_validation_copy_quality"
description = "The save status text reads 'All changes saved' when the source matches the active theme, and validation messages name the field and the fix rather than a bare rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "empty_state_copy_explains_next_step"
description = "Empty states (Saved Themes emptied, no-match search) explain what belongs in the region and how to add or restore it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.12"
name = "placeholder_text_visible_in_ui"
description = "Lorem-ipsum, 'TODO', template-variable, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered - even partially - by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
