[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "palette_swatch_delight_beyond_minimum"
description = "Beyond required live swatch updates, Palette color changes include an extra delightful microinteraction (for example a brief swatch pulse, coordinated preview flash, or richer accordion settle) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "device_or_sample_storytelling_beyond_toggles"
description = "The Preview stage offers an advanced transition or storytelling beat beyond basic Phone/Tablet/Desktop reframes — for example a coordinated chrome morph or memorable nested-template wipe — verified through real device/template interaction (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "tutorial_guided_first_run_polish"
description = "The Tutorial control opens a guided first-run or coachmark flow that introduces Preview, Palette tools, Export, and Saved Themes without blocking the tool after dismiss (bonus beyond a bare modal)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "harmony_suggestions_beyond_matrix"
description = "An interactive graphic beyond the required Contrast matrix — for example linked primary/secondary harmony suggestions or a tonal guidance cue — adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "editor_alternate_input_beyond_basic"
description = "Beyond basic typing in the theme source pane, the editor supports an alternate input such as keyboard undo/redo shortcuts, format-on-paste, or jump-to-matching-palette-token (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last main tab or last device frame until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_studio_narrative_polish"
description = "The Material-UI Theme Creator brand lockup, version affordance, and dark studio chrome read as a cohesive branded tool narrative rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "theme_preview_craft_beyond_minimum"
description = "Sample-site and Components gallery craft goes beyond bare compliance — nested templates and demos feel dense and thematically coherent without inventing a conflicting second product (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "shortcuts_sheet_or_local_enhancement"
description = "A keyboard shortcuts sheet listing Cmd+K, undo/redo, and export shortcuts, or another genre-appropriate local enhancement, is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_theme_studio_feel"
description = "The overall studio feels competition-grade: bi-directional editor sync, live Theme Files export, contrast matrix, and Saved Themes polish read as a professional Material theme instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain text controls with no Preview device frame, theme source editor, Palette tools, Theme Files export, or Saved Themes immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified dense Material theme-studio composition (header brand above Preview/Components/Saved Themes with device preview plus editor/tools)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
