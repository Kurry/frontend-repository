[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_studio_density"
description = "Compared with /reference-screenshots/, spacing and density of the dark studio header, tabs, Preview split, and tool panels match the reference composition at desktop width (text wins on conflicts)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_roboto_studio_spec"
description = "Typography weight and hierarchy for the Material-UI Theme Creator brand, tabs, and tools match the Roboto studio look shown in the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At desktop width, the composition matches the reference: brand lockup above Preview/Components/Saved Themes with device preview plus editor/tools — not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "Specified state changes (tab switch indicator, accordion expand, Tutorial enter/exit, toast, card add/remove) show motion consistent with the instruction when reduced motion is unset."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "Responsive stacking at <=1024 and no clip/overflow at 375 match the instruction's responsive contract and do not invent a conflicting layout system versus the reference desktop anatomy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Tabs, buttons, accordions, and form controls are styled to the dark studio system rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_header_tabs_tools"
description = "Visual hierarchy clearly separates header brand, main tabs, Preview stage, editor/tools, and Saved Themes list as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Default/hover/focus/disabled treatments on buttons, inputs, and accordion rows match the specified studio interaction language."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_driven_by_live_theme_options"
description = "Sample sites and component demos are visibly driven by the live theme options rather than a static mock that ignores Palette edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Microinteraction timing for hover washes, tab indicator, and toasts reads as short studio transitions consistent with the instruction rather than multi-second theatrical delays."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_and_contrast_surfaces_fit_studio"
description = "Theme Files drawer and Contrast matrix read as native studio panels consistent with the dark Material tool chrome rather than a bolted-on alien widget style."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_studio"
description = "Spacing/density grossly contradicts the reference studio (huge empty marketing gaps or cramped overlapping panels) despite no conflicting instruction override."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_ignore_live_theme_options"
description = "Preview/Components colors ignore live theme options and stay fixed regardless of Palette edits."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "preview_editor_split_mismatches_reference"
description = "Desktop Preview/editor split grossly mismatches the reference studio anatomy (missing device frame or missing editor/tools column)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_studio_animations_missing"
description = "Required studio animations specified in instruction/motion are entirely absent when reduced motion is unset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Primary controls use unstyled browser-default appearance that breaks the dark studio system."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "Desktop layout alignment of header/tabs/workspace is grossly misaligned versus the reference screenshots."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "Key studio elements that the reference shows on-canvas are clipped or offscreen at desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_studio"
description = "Information structure invents a conflicting product shell that is not a Material theme studio (for example a dashboard grid replacing Preview/Components/Saved Themes)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_brand_and_tools"
description = "There is no readable hierarchy between brand, tabs, and tools — everything competes at one visual level."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Microinteractions grossly deviate from the specified studio language (no hover washes, no tab indicator motion) when reduced motion is unset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity versus the reference/instruction that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
