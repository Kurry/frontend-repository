[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_studio_density"
description = "Compared with /reference-screenshots/, spacing and density of the dark studio header, tabs, Preview split, and tool panels match the reference composition at desktop width (text wins on conflicts)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_roboto_studio_spec"
description = "Typography weight and hierarchy for the Material-UI Theme Creator brand, tabs, and tools match the Roboto studio look shown in the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At desktop width, the composition matches the reference: brand lockup above Preview/Components/Saved Themes with device preview plus editor/tools — not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "Specified state changes (tab switch indicator, accordion expand, Tutorial enter/exit, toast, card add/remove) show motion consistent with the instruction when reduced motion is unset."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "Responsive stacking at <=1024 and no clip/overflow at 375 match the instruction's responsive contract and do not invent a conflicting layout system versus the reference desktop anatomy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Tabs, buttons, accordions, and form controls are styled to the dark studio system rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_header_tabs_tools"
description = "Visual hierarchy clearly separates header brand, main tabs, Preview stage, editor/tools, and Saved Themes list as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Default/hover/focus/disabled treatments on buttons, inputs, and accordion rows match the specified studio interaction language."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_driven_by_live_theme_options"
description = "Sample sites and component demos are visibly driven by the live theme options rather than a static mock that ignores Palette edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Microinteraction timing for hover washes, tab indicator, and toasts reads as short studio transitions consistent with the instruction rather than multi-second theatrical delays."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_and_contrast_surfaces_fit_studio"
description = "Theme Files drawer and Contrast matrix read as native studio panels consistent with the dark Material tool chrome rather than a bolted-on alien widget style."
type = "binary"
weight = 1.0

