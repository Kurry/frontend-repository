[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_suite_matches_spec"
description = "Verified with the real pointer on a desktop viewport: buttons and icon buttons brightness-lift on hover; accordion summaries take a subtle hover wash; saved theme rows take a hover wash; inert link-like controls underline on hover — judged via computed style while hovering."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "device_frame_reframe_without_reload"
description = "Phone / Tablet / Desktop toggles reframe the sample site chrome without reload when activated through the real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "required_motion_missing_or_instant_snap"
description = "Required studio motions (tab indicator slide, accordion expand/collapse, Tutorial enter/exit, toasts, saved-theme card enter/exit) are missing entirely or always snap with no transition when prefers-reduced-motion is not set."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.4"
name = "tab_indicator_slides_on_switch"
description = "On a fresh load with reduced motion unset, switching Preview / Components / Saved Themes through the real tab controls shows a primary-colored indicator that slides rather than teleporting; tab labels ease opacity/background on hover/selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "palette_accordion_expand_animates"
description = "Through the real Palette accordion UI (not a WebMCP shortcut), expanding/collapsing a row animates the chevron and height rather than snapping open/closed."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "tutorial_modal_enter_exit_transition"
description = "Opening and closing Tutorial through the real control shows a short enter/exit transition (unless prefers-reduced-motion is set)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "action_toasts_slide_and_autodismiss"
description = "Action toasts for save/apply/copy/export/import slide in and auto-dismiss with a fade when triggered through the real UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "saved_theme_card_add_remove_animates"
description = "Creating a saved theme animates the new card into the list; deleting a saved theme animates the card out rather than snapping — verified through the real create/delete controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_removes_animation"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly while every feature remains usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "before_after_and_palette_enter_motion"
description = "Through the real UI, Before / After cross-fades the framed preview; Command palette and Theme Files enter with a brief opacity/scale or slide; Preset application briefly highlights changed Palette swatches (unless reduced motion)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "hover_states_absent"
description = "Buttons, accordion summaries, saved theme rows, or inert link-like controls show no visible hover treatment when hovered with the real pointer on a desktop viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "webmcp_shortcut_fakes_motion_pass"
description = "Motion criteria appear to pass only because state was snapped via WebMCP rather than exercised through the real UI control path that should animate."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
