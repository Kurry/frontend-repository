[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Required hover animations are present; tab indicator and preview updates animate as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Tab/mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Omits hover washes on buttons, rows, or tabs so the studio feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "tab_indicator_slides_on_switch"
description = "Clicking between the Preview / Components / Saved Themes tabs slides a primary-colored indicator to the newly selected tab rather than snapping, and tab labels ease opacity/background on hover and selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "palette_accordion_expand_animates"
description = "Clicking a Palette accordion row expands it with a smooth height transition and an animated chevron rotation, and collapsing reverses the animation, verified via the real click path"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "tutorial_modal_enter_exit_transition"
description = "Opening the Tutorial control shows the in-page modal with a short enter transition, and closing it plays an exit transition rather than the overlay vanishing instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.7"
name = "action_toasts_slide_and_autodismiss"
description = "Action toasts for save/apply slide in when triggered and auto-dismiss with a fade rather than disappearing abruptly or persisting forever"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "saved_theme_card_add_remove_animates"
description = "Creating a saved theme animates the new card into the list and deleting a saved theme animates the card out rather than snapping, verified by performing the create and delete through the real UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_removes_animation"
description = "On a fresh load with prefers-reduced-motion set, animations are removed and state changes apply instantly while tab switching, palette edits, and saved-theme actions all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered - even partially - by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
