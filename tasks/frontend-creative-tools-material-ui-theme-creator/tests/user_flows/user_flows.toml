[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "new_theme_create_survives_tab_switch"
description = "Create flow: submitting New Theme with a valid name increases the saved themes list count by exactly one, the new card shows the entered name, and switching to Preview and back to Saved Themes still shows it without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_new_theme_inline_validation"
description = "Create flow: submitting New Theme with an empty name shows immediate inline validation naming the name field and adds no saved theme (count unchanged)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "rename_and_save_options_update_surfaces"
description = "Edit flow: renaming a saved theme updates that same card without creating a duplicate; saving options updates both the active theme and the saved payload so loading that theme later reproduces the edited options across editor, preview, Components demos, and Theme Files export."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_loaded_theme_updates_all_surfaces"
description = "Delete flow: deleting the theme that is currently loaded removes its card, decreases the list count by one, and clears it from active selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "load_theme_persists_across_main_tabs"
description = "Load flow: loading a saved theme writes its options into shared editor/preview state so the editor source, tool controls, framed sample site, Components gallery demos, contrast matrix, and Theme Files export all reflect it immediately, and it stays active when switching among Preview / Components / Saved Themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last saved theme, Saved Themes shows a clear empty state explaining the region is empty and how to create a theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "saved_themes_search_narrows_and_restores"
description = "Filter flow: typing in the saved-themes search narrows the list; clearing the search restores the full list exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "palette_edit_echoes_preview_editor_components"
description = "Palette flow: changing a palette color from the Palette tool recolors preview surfaces, rewrites the matching value in the editor source, updates contrast matrix badges, and the same change is visible in the Components tab demos and Theme Files export without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "tutorial_overlay_open_and_dismiss"
description = "Tutorial overlay: the Tutorial control opens an in-page modal/flow; dismissing it returns to the studio workspace without leaving the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "light_dark_toggle_survives_tab_switch"
description = "Type flow: toggling the palette type between light and dark recolors preview surfaces and the editor source immediately, and the chosen type remains applied while switching Preview / Components / Saved Themes — no dead end requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_end_to_end_contains_unique_color"
description = "Export flow: edit primary to a unique color, open Theme Files, and confirm both JSON and CSS artifacts contain that color; Copy shows confirmation and Download transfers the same previewed text."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_restores_options"
description = "Import round-trip: export the current theme as JSON, change a palette color so the live preview differs, then Import the earlier JSON and confirm editor, preview, contrast matrix, and export text return to the exported options including the same name, paletteType, and themeOptions.palette.primary.main values."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "preset_then_undo_restores_prior"
description = "Preset flow: apply a Preset pack so editor/preview/export change, then undo once and confirm the pre-pack options return across editor, preview, contrast matrix, and Theme Files export."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "snapshot_before_after_compare_flow"
description = "Snapshot compare flow: save a Snapshot, change a palette color, toggle Before / After and confirm the framed preview flips between snapshot and live colors while the editor stays on the live options."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "command_palette_jump_to_component"
description = "Command palette flow: open the command palette, choose a Components section result, and land on that gallery section without leaving the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "theme_package_field_contract_visible_in_export"
description = "Theme package field contract flow: after editing primary.main and shape.borderRadius, open Theme Files and confirm the JSON preview shows keys name, paletteType, and themeOptions with palette.type equal to paletteType, primary.main as a #RRGGBB hex matching the live swatch, and shape.borderRadius as a number from 0 through 24 matching the Shape tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "schema_validation_on_create_unique_name"
description = "Schema validation on create: attempting New Theme with a duplicate of a seeded theme name, or a name longer than 64 characters, leaves the card count unchanged and shows an inline error naming the name field; submitting a unique valid name then succeeds and increases the count by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "theme_crud_unavailable_from_ui"
description = "Saved-theme create (New Theme), rename/edit, save-options, load, or delete cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "create_fails_to_appear_or_duplicates"
description = "Submitting New Theme with a valid name either fails to add a visible card or adds duplicate cards for a single submit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "palette_edits_desync_surfaces"
description = "After changing a Palette color or Light/Dark type, the editor source, framed preview, Components demos, contrast matrix, or Theme Files export disagree about the same theme options."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "main_tab_switch_breaks_or_loses_theme"
description = "Switching among Preview, Components, and Saved Themes breaks the layout or loses the active theme options / selection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_saved_themes_region_broken"
description = "After deleting all saved themes, the Saved Themes region is blank or broken with no empty-state guidance."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "search_filter_disagrees_with_list"
description = "Saved-themes search results disagree with the visible cards (matched names missing, or clearing search fails to restore the prior full list)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "device_toggle_cannot_reframe"
description = "After choosing Phone, Tablet, or Desktop, the sample-site chrome stays the same frame size as before the toggle, or the device toggles become stuck/inoperable until a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "tutorial_blocks_with_no_exit"
description = "The Tutorial modal blocks the workspace with no working exit (no close control or Escape)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_name_validation_silent"
description = "An empty New Theme name attempt provides no visible validation feedback naming the name field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "tab_or_theme_flow_dead_end_requires_reload"
description = "Recovering from a main-tab switch, Tutorial modal, Theme Files drawer, Command palette, or loaded-theme edit requires a full page reload — the UI reaches a dead end."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_or_import_flow_dead_end"
description = "Theme Files Export or Import cannot be completed end-to-end from the visible UI, or completing them leaves editor/preview/export surfaces desynced."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
