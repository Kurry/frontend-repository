[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: create a New Theme with a unique name, change a Palette primary color, toggle Light/Dark, switch the main tab to Components, choose Desktop device frame, and open Theme Files once; then reload. Confirm every facet coherently resets to the seeded baseline — at least 3 seeded saved themes, no unsaved create, default active options, default tab/device, empty session snapshots/undo — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "load_theme_reversal_proves_live_state"
description = "Selection-reversal proof: load saved theme A and note editor source / preview colors / export text, load saved theme B and note different options, then reload theme A. Confirm A's options return identically across editor, preview, and Theme Files — proving surfaces derive from the live active theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "palette_edit_derived_preview_sensitivity"
description = "Derived-view sensitivity: change primary to a clearly different color, then toggle Light/Dark. Confirm the framed sample site, editor source, Components demos, contrast matrix badges, and Theme Files export change meaningfully for each input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "palette_edit_echoes_editor_preview_components"
description = "Cross-view echo: change a Palette color from the Palette tool; without reload confirm the matching value rewrites in the editor source, the framed preview recolors, Components demos reflect it, and Theme Files JSON/CSS contain it."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "new_theme_count_delta_exact"
description = "Count-delta integrity: measure the saved themes list count, submit New Theme once with a valid unique name, and re-measure immediately — the count increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_palette_edits_different_outcomes"
description = "Input-dependent output: set primary to color A and note preview/editor/export; then set primary to a clearly different color B. Confirm the two outcomes differ in the ways the inputs dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_tab_flows"
description = "Interleaved-flow integrity: open New Theme and enter a name but do not submit, switch to Preview and change a Palette color, then return to Saved Themes and submit a different valid New Theme; confirm exactly one new card for the submitted name appears, the palette edit persisted on Preview, and neither flow corrupted the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_saved_themes"
description = "Edge-state round-trip: delete every saved theme (empty state visible), then create two New Themes with valid names; confirm the empty state clears, both new cards appear, and editor/preview/export track the active theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_probe"
description = "Full-pipeline probe: mutate primary to a unique #RRGGBB color and set shape.borderRadius to a distinct in-range value, export JSON via Theme Files (confirming name, paletteType, themeOptions.palette.primary.main, and shape.borderRadius in the preview), mutate primary again so preview differs, import the earlier JSON, and confirm editor, preview, contrast matrix, and both export artifacts return to the first unique color with the same paletteType, primary.main, and borderRadius."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "preset_undo_round_trip_probe"
description = "Preset/undo probe: note current primary, apply Ocean (or another pack) so export/preview change, undo once, and confirm primary and Theme Files text return to the pre-pack values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring a new saved theme, palette edit, Light/Dark type, and main tab then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "preview_identical_across_different_tokens"
description = "Changing Palette colors or Light/Dark leaves the framed preview, editor source, Components demos, contrast matrix, and Theme Files export visually/textually identical — derived surfaces ignoring inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_themes_apply_identical_options"
description = "Loading two seeded saved themes that declare different options yields identical editor source, preview colors, and Theme Files export text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_surface_state_stale_until_reload"
description = "After editing Palette colors, renaming a theme, loading a saved theme, or importing JSON, editor source, preview, Components demos, or Theme Files still show stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_text_hardcoded_ignores_mutations"
description = "Theme Files JSON/CSS text stays byte-identical across two different palette edit states, proving the export is hardcoded rather than compiled from the session store."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "export_import_schema_drift"
description = "Theme Files JSON uses different field names or enums than Import accepts, or a New Theme / Snapshot record cannot round-trip through the Theme package field contract (name unique ≤64, paletteType, themeOptions with matching palette.type, #RRGGBB mains, and required shape.borderRadius 0–24)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "form_export_import_field_contract_disagree"
description = "New Theme accepts a duplicate or over-64 name, or Theme Files export omits required shape.borderRadius / paletteType ↔ palette.type agreement that Import and form validation claim to enforce — form, export, and import disagree on the Theme package field contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
