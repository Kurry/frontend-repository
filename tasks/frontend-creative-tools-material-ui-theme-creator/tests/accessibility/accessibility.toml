[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_studio_controls"
description = "Every interactive control — main tabs Preview/Components/Saved Themes, Phone/Tablet/Desktop toggles, Palette accordion rows, editor toolbar (Editor Settings, Copy theme code, undo, redo, history timeline, save), Tutorial, New Theme / load / delete / rename, Export/Import, Command palette, Before/After, Color blindness, Presets, Snapshot, and Components search — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "dialog_focus_trap_and_return"
description = "The Tutorial modal, Theme Files drawer, and Command palette each use role dialog with aria-modal true, trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "chrome_icons_have_accessible_names"
description = "Meaningful chrome icons (GitHub icon, Tutorial, editor toolbar icons, Export/Import, Command palette, Material Symbols used as actions) expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "new_theme_validation_announced"
description = "New Theme, Snapshot, and Import validation messages are shown visually and announced via an aria-live region so assistive technology hears the field-naming feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "new_theme_and_rename_fields_labeled"
description = "New Theme, rename/edit, Snapshot name, and Import fields use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "palette_accordion_exposes_expanded_state"
description = "Palette accordion rows expose their expanded/collapsed state to assistive technology and toggle with Enter or Space."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example nav or tablist for main tabs and main for the Preview/Components/Saved Themes workspace) so assistive technology can navigate the studio."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "dark_studio_contrast_sufficient"
description = "Dark-studio shell labels, tab labels, Palette row titles, saved-theme card names, Theme Files labels, and primary controls meet sufficient contrast against their near-black surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "tabs_and_accordions_use_semantics"
description = "Main tabs, device toggles, and Palette accordion summaries use button/tab/disclosure semantics with accessible names rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, tab indicator slide, accordion expand/collapse, Tutorial/Theme Files/Command palette enter/exit, action toasts, Before/After cross-fade, and saved-theme card enter/exit animations are removed or reduced to instant state changes while every feature remains usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "contrast_badges_and_copy_announced"
description = "Contrast matrix AA / AAA / Fail status is exposed as text (not color alone), and Copy/Download confirmations are announced via an aria-live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "studio_controls_unreachable_by_keyboard"
description = "A main tab, device toggle, Palette accordion row, editor toolbar control, Tutorial, Export/Import, Command palette, or saved-theme action cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_controls"
description = "Focused tabs, device toggles, accordion summaries, editor toolbar buttons, Export/Import controls, or New Theme fields show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Main tabs, Palette accordion rows, Export/Import, Command palette, or saved-theme action controls use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "error_or_type_state_color_only"
description = "New Theme validation error, contrast Fail status, or Light/Dark palette type state is conveyed by color alone with no text, label, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "tutorial_modal_no_focus_trap"
description = "With the Tutorial modal, Theme Files drawer, or Command palette open, Tab moves focus to controls behind the overlay without trapping focus in the dialog."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_shell"
description = "Shell labels, tab labels, or primary button labels are unreadable due to poor contrast against the dark studio background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "validation_errors_visual_only"
description = "New Theme, Snapshot, or Import validation feedback is visual only and is not announced via an aria-live region or equivalent assistive-technology association."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "meaningful_icons_missing_names"
description = "Meaningful chrome or toolbar icons that convey actions are missing alt text or an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped_in_studio"
description = "Studio chrome headings or tool-panel section headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, tab indicator slide, accordion expand/collapse, Tutorial/Theme Files/Command palette enter/exit, action toasts, or saved-theme card enter/exit still animate fully."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
