[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of the app (tab switches, palette edits, source edits, saved theme create/load/delete, export/import, presets, snapshots, command palette)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "palette_edit_rethemes_under_100ms"
description = "Palette edits re-theme the live preview promptly (no multi-second lag between control change and preview recolor)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "The studio shell (header/tabs) is visible while the app settles rather than leaving a blank page until everything finishes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "components_gallery_scrolls_without_lag"
description = "The Components gallery scrolls through many demos without multi-second freezes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_retheme"
description = "While palette or Light/Dark changes re-theme preview/Components, the UI remains interactive (tabs and tools still respond)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_retheme_holds_stable_frame_rate"
description = "Continuous palette adjustments keep preview updates smooth enough that interactions are not dropped."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_palette_and_typing_never_hang"
description = "Rapid palette changes, continuous typing in the source editor, and history timeline scrubbing stay responsive with no hangs or dropped interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_theme_session_stable"
description = "An extended session of create/load/delete, export/import, and preset application remains stable without progressive slowdown to unusability."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint, panels and the preview frame hold their space as the app settles without large layout jumps."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "export_regenerates_without_blocking"
description = "Theme Files export text regenerates when palette colors change without blocking the UI or freezing input."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "Cold load remains non-interactive for more than 2 seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_theme_flows"
description = "Console errors or warnings appear during theme create/load/delete, palette edits, export/import, or command palette use."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "retheme_or_tab_transition_blocks_ui"
description = "Retheme or tab transitions block the UI so controls stop responding for seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "palette_edit_hangs_ui"
description = "A palette edit hangs the UI so further interaction is dropped."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "components_gallery_janks_on_scroll"
description = "Components gallery scrolling janks so badly that demos are effectively unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_editor_input"
description = "Animations block editor input so typing or undo cannot proceed until motion finishes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "Settle blocks first paint so no studio controls appear within the interactive window."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_edits"
description = "Rapid edits cause runaway resource use that freezes or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "The page stays blank while loading with no shell chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes under rapid palette typing, export/import, or edge-case invalid source."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
