[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "At a desktop viewport (~1440px) the Preview split layout is usable; resizing to 375px reflows without broken overlap so primary controls remain reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, primary controls (main tabs, device toggles, New Theme, Export/Import, Command palette) present adequate tap targets rather than tiny unusable hit areas."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Studio labels, tab text, and tool headings remain readable at both desktop and 375px widths without illegible shrinkage."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "preview_stacks_at_1024_and_below"
description = "At widths of 1024 pixels and below, the Preview workspace stacks vertically: the device preview sits above the editor and tool panels, and every control remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "In the stacked Preview layout, editor tools, Palette accordion, contrast matrix, and export controls remain usable without being trapped off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At narrow widths, Saved Themes load/delete, New Theme submit, and Theme Files Copy/Download remain tappable and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the document does not require horizontal scrolling to reach primary studio content."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "device_frame_and_gallery_scale"
description = "Device frame and Components gallery scale within the viewport at narrow widths rather than forcing page-level overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_remain_operable_at_small_widths"
description = "Theme Files drawer, Tutorial modal, and Command palette remain fully visible and operable at 375 pixel width rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "Layout breaks at 375px or ~1440px with overlapping regions or unreachable primary controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px, primary controls are too small to tap reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "studio_text_unreadable_on_mobile"
description = "Studio text becomes unreadable at narrow widths due to extreme shrinkage or overflow clipping."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 375px, content is cropped with spurious page-level horizontal scrollbars."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "preview_or_tools_missing_below_1024"
description = "Below 1024px, the device preview or editor/tool panels disappear or become unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_header_obscures_workspace"
description = "A fixed header permanently obscures the Preview/Components/Saved Themes workspace at narrow widths with no way to reach covered controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At narrow widths, panels overlap so labels or controls are unreadable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "mobile_tutorial_or_forms_inoperable"
description = "At 375px, Tutorial, New Theme, Theme Files, or Command palette forms/overlays are inoperable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "device_frame_static_size_overflows"
description = "The device frame keeps a static desktop size that overflows the narrow viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "Essential controls disappear entirely at a supported width rather than reflowing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsiveness that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
