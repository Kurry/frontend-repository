[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Join Room, Leave Room, the theme toggle, and the choose-file control each show a hover feedback change (background, border, or shadow) on pointer hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The connection badge transitions its background/text color smoothly rather than snapping instantly whenever the connection state changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "File queue rows show a hover background wash when the pointer moves over them"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "Switching between light and dark surfaces transitions background/text colors smoothly rather than flipping instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "The app fails this criterion if Join Room, Leave Room, or the theme toggle show no hover feedback at all"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The app fails this criterion if the chat composer's enabled/disabled transition (idle/disconnected versus connecting/waiting) happens with no visible feedback at the moment of the state change"
type = "binary"
weight = 0.5
negate = true
optional = true
