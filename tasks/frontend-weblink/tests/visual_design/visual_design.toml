[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "At desktop width the workspace uses a three-column communication layout with the chat transcript and composer as the visually primary center column, session/identity on one side and the file-transfer queue as secondary content on the other"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "The connection badge uses a visually distinct background/text color for each of the idle, connecting, waiting, and disconnected states"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "A theme toggle switches the whole workspace between a light and a dark surface, recoloring backgrounds, borders, and text while keeping the same layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Chat bubbles visually distinguish the local user's own sent messages (e.g. right-aligned, accent fill) from the seeded demo/loopback lines (e.g. left-aligned, neutral surface)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "At 375 by 667 pixels the three columns restack vertically in a coherent order and the room-identifier entry and Join Room control remain reachable without horizontal scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "The app fails this criterion if all four connection-badge states render with identical or near-identical color treatment, leaving state distinguishable only by reading the label text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "The app fails this criterion if the file-transfer queue is given equal or greater visual weight than the chat transcript, rather than remaining secondary"
type = "binary"
weight = 0.5
negate = true
optional = true
