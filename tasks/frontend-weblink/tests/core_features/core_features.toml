[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the session panel (peer name, read-only client ID, room/peer identifier field, Join Room and Leave Room controls, connection badge), the chat panel, and the file-transfer panel all render together instead of a generic starter page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the connection badge shows an idle label such as \"Not connected\" and never a connected/online label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the chat panel shows at least 2 seeded local/loopback demo lines"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "On load, the file-transfer queue is empty and shows an empty-state message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After typing a room or peer identifier and clicking Join Room, the connection badge changes to a connecting label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After the connection attempt settles (a few seconds after Join Room), the connection badge shows a waiting-for-peer label, and no visible text anywhere claims a peer connected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After clicking Leave Room while connecting or waiting, the connection badge changes to a disconnected label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When idle or disconnected, the chat composer input is disabled and a nearby note states that sending is unavailable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After clicking Join Room, the chat composer input becomes enabled and typing then submitting a message adds it to the transcript, visually distinguished (e.g. right-aligned) from the seeded demo lines"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After choosing a local file via the file-transfer control, its filename and size appear as a new row in the queue table with a Not Started status, without any room or connected peer required"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After choosing a second, different local file, a second distinct row appears in the queue table showing the second file's own name, without merging or overwriting the first row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After typing a second room or peer identifier over a first, the join field shows only the latest value typed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After clicking the theme toggle, the page surface switches between light and dark backgrounds/text while the connection badge and layout stay in place"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After reloading the page following Join Room and a file selection, the peer name, client ID, last-entered room identifier, chat transcript, and file queue are restored, and the connection badge resumes at an idle or disconnected label, never connecting or waiting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load the session panel (peer name, read-only client ID, room/peer identifier field, Join Room, Leave Room, connection badge), chat panel, and file-transfer panel all render together instead of a generic starter page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Entering a room or peer identifier and clicking Join Room changes the connection badge to a connecting label, then to a waiting-for-peer label within a few seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Clicking Leave Room while connecting or waiting returns the connection badge to a disconnected label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Choosing a local file through the file-transfer control adds its filename and size to the queue table with a Not Started status, without requiring a room, recipient, or connected peer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Choosing a second, different local file adds a second distinct row to the queue table showing its own filename, without merging into or overwriting the first row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Typing a second room or peer identifier over a first leaves only the latest value shown in the join field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "The chat composer is disabled with a nearby explanatory note while idle or disconnected, and becomes enabled once Join Room starts a connecting/waiting session"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "Submitting a chat message while connecting or waiting appends it to the local transcript immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Reloading the page restores the local peer name, client ID, last-entered room identifier, chat transcript, and file queue from local storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Reloading the page after Join Room never resumes the badge at connecting or waiting; it resumes at idle or disconnected"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "1_25"
description = "The app fails this criterion if any visible text, badge, or dialog claims a peer actually connected (e.g. \"connected to peer\", \"online\" with a named remote peer, a fabricated peer avatar joining)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "The app fails this criterion if the file-transfer panel displays transfer progress, a completion state, or a recipient name for a file when no peer session exists"
type = "binary"
weight = 1.0
negate = true
