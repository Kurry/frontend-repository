[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "wizard_controls_keyboard_accessible"
description = "Every interactive control in the patching wizard — Base theme, Base icon set, swatch pickers and hex fields, Back, Continue, Generate, and Download — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter, or Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "select_controls_arrow_key_operable"
description = "The Base theme and Base icon set controls are operable with arrow keys and Enter or Space, and expose their selected option to assistive technology."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "swatch_fields_labelled_by_role"
description = "Each swatch colour picker and hex field is labelled with its swatch role name (Backdrop darkest, Backdrop darker, Backdrop main, Backdrop lighter, Backdrop lightest, or Foreground secondary) so the label is programmatically associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_status_live_regions"
description = "Inline hex validation messages and the replaced-count status line are announced via an aria-live polite region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "progress_bar_exposes_current_step"
description = "The progress bar conveys the current wizard step to assistive technology (for example via aria attributes or an accessible name that includes the stage), not only by colour."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "visible_keyboard_focus_indicators"
description = "Every interactive wizard control shows a clearly visible focus indicator when focused from the keyboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_and_heading_order"
description = "The patching workspace exposes semantic landmarks (for example main) and headings follow a logical order with no skips from H1 to deeper levels."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_meet_contrast"
description = "Primary body text, stage labels, and control labels on the light neutral surfaces meet at least WCAG AA contrast (about 4.5:1 for text; about 3:1 for interactive control boundaries)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "icons_have_accessible_names"
description = "Header badge, alert, check-mark, and control icons that convey meaning have descriptive accessible names (alt text or aria-label); purely decorative icons are hidden from the accessibility tree."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.10"
name = "reduced_motion_keeps_functionality"
description = "With prefers-reduced-motion enabled on a fresh load, transitions are removed and every wizard state change still completes with full functionality (advance, return, theme select, icon-set toggle, generate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "keyboard_cannot_reach_wizard_controls"
description = "Core wizard controls (Base theme, Base icon set, swatch hex fields, Back, Continue, Generate, or Download) cannot be reached or activated via keyboard Tab/Enter/Space."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured on interactive wizard controls when focused from the keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "selects_lack_accessible_selection"
description = "The Base theme or Base icon set control exposes no selected option to assistive technology and cannot be operated with arrow keys plus Enter or Space."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "validation_or_status_visual_only"
description = "Inline hex validation or the replaced-count status line is visual only: no aria-live polite announcement when the message or count updates."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "progress_step_is_color_only"
description = "The current wizard step is indicated by colour alone on the progress bar, with no non-colour or programmatic cue for assistive technology."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, step-body transitions, progress-circle fills, button hover/press motion, or the patched-result entrance animation still run."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "command_palette_dialog_a11y"
description = "The command palette uses role dialog with aria-modal true, traps focus while open, closes on Escape, and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "contrast_pass_fail_not_color_only"
description = "Contrast matrix Pass/Fail is not colour-only: each row includes a text mark such as Pass or Fail alongside the ratio."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "undo_export_controls_keyboard"
description = "Undo, Redo, snapshot controls, colour-blindness options, bitmap checkboxes, bulk actions, export tabs, Copy export, and Import recipe are reachable and operable with the keyboard alone with a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "copy_and_contrast_live_regions"
description = "Contrast pass/fail updates and the Copy export confirmation are announced via an aria-live polite region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n7"
name = "palette_lacks_focus_trap"
description = "While the command palette is open, Tab moves focus outside the overlay, Escape leaves it open, or closing it returns focus to a control other than the opener."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "contrast_status_color_only"
description = "Contrast matrix rows indicate Pass/Fail by colour alone with no text mark readable by assistive technology."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
