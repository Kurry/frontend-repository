[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "Starting from the seeded wizard: advance to step two, select Ayu, edit one swatch, advance to step three and choose Vector. Reload the page. Confirm wizard step, Ayu selection, the edited swatch, Vector icon set, and replaced count all survive from client storage together — never a mix of persisted and reset facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "theme_set_replaces_all_six"
description = "On step two, note all six swatch hex values under EuroScope, then select Grey (or Primer). Confirm all six swatches change to the new set's palette at once and both Preview panels retint — proving the palette is derived from the live base-theme selection rather than a hardcoded snapshot."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "icon_set_changes_derived_tiles"
description = "On step three, switch the icon set from None to Vector and back. Confirm every preview tile and the replaced-count status change meaningfully with the selection — not an identical redraw regardless of icon set."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "swatch_echoes_preview_and_summary"
description = "Edit one swatch hex on step two, then advance through to step four. Without reload, confirm the Preview on step two, the bitmap tiles under Vector on step three, and the step-four swatch strip all reflect the edited colour."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "vector_count_delta_exact"
description = "With None selected, record the replaced-count status (zero). Switch to Vector and immediately confirm the status reports the seeded bitmap total (at least 10 of N) as replaced — the delta matches exactly with no lagging counter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_themes_different_outputs"
description = "Select Ayu and note the six swatch values and Preview colours, then select Solarised. Confirm the two outcomes differ in the ways the theme inputs dictate (not byte-identical hardcoded palettes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_theme_and_icon_flows"
description = "Select a base theme on step two, advance to step three and switch icon set, return via Back, edit a single swatch, then advance again. Confirm neither the theme/swatch choice nor the icon-set choice corrupted the other, and step four summary reports both current choices."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "none_to_vector_derived_round_trip"
description = "On step three, set icon set to None (muted tiles, zero replaced), then to Vector (recoloured tiles, full replaced count), then back to None. Confirm derived tiles and status track through both transitions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_contains_session_work"
description = "Starting from seeded state: select Ayu, edit Backdrop lighter to a distinct #RRGGBB hex, set Vector, Keep original on one tile, advance to step four. Confirm Patch recipe JSON preview contains schemaVersion euroscope-patch-v1, baseTheme Ayu, colours.backdropLighter equal to the edited hex, iconSet vector, and that bitmap's keepOriginal true — not a stale seed recipe — and Theme CSS shows matching --es-* tokens."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_restores_all_derived_surfaces"
description = "Select Solarised, edit Backdrop main, note Preview and contrast marks, then Undo twice. Confirm base theme, Backdrop main, Preview colours, contrast matrix, and export preview all return to their pre-mutation values together."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "import_export_round_trip_probe"
description = "Configure theme, icon set, and one keep-original override; download Patch recipe JSON; Reset to base; import the downloaded file. Confirm six swatches, icon set, keep-original map, Preview, and export preview match the pre-reset configuration, and the Patch recipe JSON still shows every required field-contract key with no undeclared top-level keys and Theme CSS --es-* matching colours.*"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "mutate_derived_export_import_contract"
description = "Mutate → derived → export → import: set Ayu, edit Backdrop main to colour A, set Vector with one keep-original; confirm contrast and Patch recipe JSON / Theme CSS reflect A and keepOriginal; Download recipe; Reset to base; Import the downloaded JSON; confirm swatches, Preview, contrast, and both export tabs return to A's values and still show schemaVersion euroscope-patch-v1 plus all six --es-* tokens."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "batch_keep_original_count_delta"
description = "With Vector and zero keep-originals, record replaced count (N of N). Select three tiles, Keep original selected, immediately confirm count is N-3 of N and those three tiles are muted."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "contrast_derived_from_swatches"
description = "Note the Backdrop darkest on Foreground secondary ratio, then change Foreground secondary to a distinctly lighter or darker hex. Confirm the ratio and Pass/Fail mark change meaningfully rather than staying identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "snapshot_before_after_integrity"
description = "Save snapshot Night ops (Palette snapshot field contract: non-empty name plus six #RRGGBB colours keys), edit two swatches, toggle Before (Preview shows Night ops colours) then After (Preview shows edited colours). Restoring Night ops returns all six swatches to the saved values."
type = "binary"
weight = 1.0

