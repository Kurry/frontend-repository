[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "button_hover_press_ease"
description = "Hovering and pressing the wizard's actual buttons eases their border, shadow, and scale, and the press feedback appears immediately on pointer-down"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "row_full_width_hover_wash"
description = "Swatch rows and per-bitmap rows take a full-width hover wash when the pointer moves over them"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "visible_keyboard_focus_ring"
description = "Tabbing through the interactive controls shows a clearly visible keyboard focus ring distinct from the hover state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "step_swap_in_place"
description = "Advancing or returning between steps using the visible Continue, Generate, and Back buttons swaps the active step body in place without a full page reload and updates the progress bar to the current step"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "progress_circles_fill_transition"
description = "When a step becomes active or complete via the visible Continue or Back buttons, the progress circles transition their fill colour smoothly rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "step_swap_brief_eased_transition"
description = "Clicking Continue or Back swaps the active step body with a brief eased transition of roughly 200 to 300 milliseconds rather than an instant cut"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "bitmap_options_animated_expand"
description = "Revealing the advanced per-bitmap options via its visible control expands the list in place with an animated height change rather than an instant jump"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "patched_confirmation_fade_rise"
description = "When the patched result is generated by clicking the visible Generate button, the Patched result generated confirmation enters with a short fade-and-rise transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "reduced_motion_applies_instantly"
description = "With prefers-reduced-motion enabled, transitions are removed and state changes apply instantly while the wizard remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "live_recolour_without_reload"
description = "Editing a swatch or changing the icon set recolours the live colour Preview and the bitmap tiles immediately, with no page reload and no perceptible delay"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "command_palette_enter_transition"
description = "Opening the command palette via the visible Ctrl+K / Cmd+K path enters the overlay with a brief opacity/scale transition rather than an instant hard cut (verified through the real keyboard path on a fresh interaction)."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.14"
name = "copy_export_confirmation_motion"
description = "Activating Copy export via the visible control shows a short confirmation that appears and then resets, rather than snapping with no feedback."
type = "binary"
weight = 0.5

