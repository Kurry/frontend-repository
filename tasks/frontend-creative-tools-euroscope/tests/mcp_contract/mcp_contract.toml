[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "three_modules_bound"
description = "All three contract-mandated modules form-workflow-v1, structured-editor-v1, and artifact-transfer-v1 are initialized and bound so webmcp_session_info / webmcp_list_tools surface tools for each."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed form, editor, and artifact tool handlers call the same application logic as the visible UI for advance/return, theme and icon-set selection, swatch property updates, preview, and export."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "workflow_steps_bound"
description = "Workflow steps upload-euroscope-executable, update-theme-colours, update-embedded-bitmaps, and download-new-executable are bound; form advance/return move between adjacent steps through the same path as Back/Continue."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "editor_object_types_bound"
description = "Editor object types base-theme and base-icon-set support select/switch_mode operations that update the visible Base theme and Base icon set controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "swatch_properties_update"
description = "Editor properties backdrop-darkest, backdrop-darker, backdrop-main, backdrop-lighter, backdrop-lightest, and foreground-secondary accept update_property and refresh the matching swatch row and live Preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_modes_theme_and_bitmaps"
description = "Editor modes theme-colours and embedded-bitmaps are reachable via switch_mode and align with the visible Update theme colours and Update embedded bitmaps steps."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_export_patched_executable"
description = "Artifact export with format patched-executable drives the same generate/download path as the visible Download control; patch-recipe-json and theme-css align with the Export center tabs; no file contents appear in WebMCP arguments or results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond form-workflow-v1, structured-editor-v1, and artifact-transfer-v1, and no undeclared steps, properties, modes, or operations beyond the Bindings block, are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session data, the tool list, and successful invocations for the bound form/editor/artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "contract_exercisable_via_automation"
description = "The declared contract can be fully exercised via automation: advance/return through the four workflow steps, select base-theme and base-icon-set, update a swatch property, preview, and export patched-executable."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Required form, editor, or artifact WebMCP tools are unbound, missing, or no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A WebMCP advance/return, theme/icon select, swatch update_property, or export leaves the UI out of sync with the tool result (handlers diverge from visible UI logic)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, workflow steps, editor properties, modes, or artifact operations beyond the Bindings block are exposed through the tool list."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "validation_bypass_desyncs_mcp_ui"
description = "Updating a swatch property via WebMCP with an invalid colour bypasses validation and desynchronizes MCP state from the visible hex-field rules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "export_leaks_artifact_bytes"
description = "Artifact export returns raw file contents, filesystem paths, blobs, or base64 payload data in WebMCP arguments or results."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_broken"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated form, editor, and artifact modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_import_copy_bound"
description = "Artifact operations import and copy are bound alongside export; import with mode patch-recipe and copy drive the same paths as Import recipe and Copy export without putting file contents in WebMCP results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "export_formats_recipe_and_css"
description = "Export formats patch-recipe-json and theme-css are bound in addition to patched-executable and produce the same live preview content as the visible Export center tabs."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.13"
name = "snapshot_and_bitmap_editor_types"
description = "Editor object types palette-snapshot and bitmap-tile support add/select/update_property/delete paths that match Save snapshot, restore snapshot, and Keep original toggles in the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.14"
name = "colour_blindness_and_compare_properties"
description = "Editor properties colour-blindness and compare-mode accept update_property and refresh the visible colour-blindness control and Before/After compare state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.15"
name = "form_reset_and_export_center_mode"
description = "Form operation reset and editor mode export-center are bound; reset restores base-theme swatches like Reset to base, and switch_mode to export-center aligns with the step-four export surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n7"
name = "recipe_export_mcp_omits_mutations"
description = "Invoking artifact export for patch-recipe-json succeeds in the tool result while the visible Patch recipe JSON preview still omits the session's current swatch or keep-original mutations, drops a required field-contract key (schemaVersion, colours.*, iconSet, bitmaps keepOriginal), or violates cross-field agreement with the Base theme / icon set controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract for form-workflow-v1 / structured-editor-v1 / artifact-transfer-v1 with the EuroScope Bindings block deviates from its declaration in a way NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to automation or a real user. If present, name the defect and cite concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
