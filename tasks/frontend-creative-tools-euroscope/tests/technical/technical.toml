[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "root_loads_interactive_patcher"
description = "Loading the app at the root URL reaches an interactive patcher screen rather than a blank page or a framework error overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "theme_generate_no_uncaught"
description = "Choosing a colour set and generating the patched result completes with no uncaught JavaScript exception interrupting the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "local_resources_no_4xx_5xx"
description = "The patcher's required local resources load without 4xx or 5xx responses (ignoring only an automatic favicon probe)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "reload_restores_persisted_wizard"
description = "A full reload on any wizard step renders cleanly without a hydration failure or error flash and restores the persisted step and choices"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "shared_state_coherence_theme"
description = "The chosen colour set is reflected consistently across the swatch rows, the live preview, and the final chosen-replacements summary from one shared source of state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "keyboard_operable_controls"
description = "Every interactive control — the base theme control, icon set control, swatch pickers and hex fields, Back, Continue, Generate, and Download — is reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "selects_arrow_key_operable"
description = "The Base theme and Base icon set controls can be operated with arrow keys and Enter or Space, and expose their selected option to assistive technology"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "swatch_fields_programmatic_labels"
description = "Each swatch colour picker and hex field is programmatically labelled with its swatch role name (for example Backdrop darkest), so the label is associated with the control in the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "aria_live_status_announcements"
description = "Inline validation messages and the replaced-count status line are exposed through an aria-live polite region in addition to being shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.15"
name = "progress_step_exposed_to_at"
description = "The progress bar conveys the current step to assistive technology through text or ARIA semantics, not only by colour"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of the wizard, including generating and downloading the patched result"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "rapid_input_stays_responsive"
description = "Rapidly editing swatches or toggling the icon set keeps the Preview and tile grid responsive, with no hangs and no dropped updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "persists_snapshots_and_keep_original"
description = "After saving a named snapshot and toggling Keep original on a tile, a full reload restores that snapshot in the list and the keep-original override with the matching replaced count (persistence genre)."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "export_preview_coherent_with_swatches"
description = "After editing a swatch or icon set, the Export center Patch recipe JSON and Theme CSS previews agree with the visible swatch rows and icon-set control without a reload; Patch recipe colours keys and Theme CSS --es-* tokens match the same six roles."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.23"
name = "undo_stack_shared_state"
description = "Undo after a theme or swatch mutation restores every dependent surface from one coherent shared state: swatches, Preview, contrast matrix, and export preview agree."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.24"
name = "patch_recipe_field_contract_enforced"
description = "Swatch hex fields and Import enforce the Patch recipe field contract in the UI: values that are not #RRGGBB are rejected with inline feedback naming the swatch; Import of JSON that fails required keys, closed enums, #RRGGBB bounds, bitmaps keepOriginal completeness, undeclared top-level keys, or cross-field rules (schemaVersion, baseTheme, iconSet, colours, bitmaps) is rejected with feedback naming the offending field and does not mutate replacements."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.25"
name = "base_theme_icon_set_cross_field_export"
description = "Selecting Ayu updates Patch recipe JSON baseTheme to Ayu and selecting Vector updates iconSet to vector (and None to none) without a reload; colours.* and Theme CSS --es-* tokens stay equal to the matching working swatches — the declared cross-field rules between controls and export payload."
type = "binary"
weight = 1.0

