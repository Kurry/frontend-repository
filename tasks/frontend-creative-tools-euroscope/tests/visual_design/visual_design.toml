[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "At desktop width the patcher presents a step-based wizard with colour swatches, icon previews, and progress rather than generic equal-weight dashboard cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The colour and icon patching is the primary visual focus while secondary metadata (hex values, bitmap dimensions, helper text) stays visually subordinate"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "After the colour set is chosen and the patched result is generated, the final step is visibly distinguished from its prior state through a visible selection, status, value, or content change"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The live colour Preview and the bitmap preview grid visibly recolour to reflect the currently selected theme and icon set"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "At mobile width the patcher reorganises the step-based wizard into a coherent stacked composition that preserves the primary-before-secondary hierarchy and keeps controls reachable without horizontal scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The patcher's guidance uses colour-coded Information, Caution, and Warning alert blocks each with a leading icon and a heading"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The initial surface reads as a generic dashboard or starter page rather than a recognisable colour-and-icon patcher"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "At 375px width the layout forces horizontal scrolling to reach the controls needed to choose a colour set and generate the patched result"
type = "binary"
weight = 1.0
negate = true
