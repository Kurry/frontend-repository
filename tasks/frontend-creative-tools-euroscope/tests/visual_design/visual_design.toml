[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "wizard_not_dashboard_cards"
description = "At desktop width the patcher presents a step-based wizard with colour swatches, icon previews, and progress rather than generic equal-weight dashboard cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "patching_primary_visual_focus"
description = "The colour and icon patching is the primary visual focus while secondary metadata (hex values, bitmap dimensions, helper text) stays visually subordinate"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "final_step_visibly_complete"
description = "After the colour set is chosen and the patched result is generated, the final step is visibly distinguished from its prior state through a visible selection, status, value, or content change"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "preview_and_grid_recolour"
description = "The live colour Preview and the bitmap preview grid visibly recolour to reflect the currently selected theme and icon set"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "mobile_stacked_hierarchy"
description = "At mobile width the patcher reorganises the step-based wizard into a coherent stacked composition that preserves the primary-before-secondary hierarchy and keeps controls reachable without horizontal scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "colour_coded_alert_blocks"
description = "The patcher's guidance uses colour-coded Information, Caution, and Warning alert blocks each with a leading icon and a heading"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "centered_column_header_composition"
description = "At desktop width the app renders a single centered column roughly 600 pixels wide holding a compact header (a squared EuroScope badge, the title Custom EuroScope, and a theme-and-icon-patcher caption), the progress bar, and the active step body stacked with consistent spacing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "light_surfaces_blue_accent_grouping"
description = "The UI uses light neutral surfaces with a single blue accent on the active progress step and primary buttons, a soft radial accent wash behind the content, and bordered white boxes with hairline borders grouping each control cluster"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "preview_dual_named_panels"
description = "The colour Preview renders two side-by-side panels named Primary and Secondary, both tinted live from the working swatch colours"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "consistent_icon_set_throughout"
description = "Icons on the header badge, alert blocks, check marks, and control icons come from one consistent set with the same stroke weight and style throughout the chrome"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.13"
name = "distinct_component_state_treatments"
description = "Buttons and form controls show distinct default, hover, focus (visible ring), and disabled treatments rather than a single static appearance"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "progress_bar_truncates_at_mobile"
description = "At around 375 pixels wide the progress bar keeps its numbered steps visible with the active label truncating rather than overflowing, and the two Preview panels and the bitmap grid reflow to fit the single stacked column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "consistent_capitalization_convention"
description = "Headings, stage names, and button labels use one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "specific_wizard_action_verbs"
description = "Action labels are specific verbs matching the wizard vocabulary (Continue, Back, Generate, Download) rather than generic labels like Submit or OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "alert_copy_names_situation_and_action"
description = "The Information, Caution, and Warning alert copy names the situation and what the user should do rather than filler prose"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.19"
name = "contrast_matrix_visual_treatment"
description = "The contrast matrix uses compact ratio readouts with clear pass (green-tinted) and fail (amber or red-tinted) marks, and the colour-blindness control shows a segmented choice with a visible active selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "export_center_monospace_tabs"
description = "The export center presents a monospaced preview block with visible tab labels for Patch recipe JSON, Theme CSS, and Summary."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "command_palette_overlay_craft"
description = "The command palette is a centered overlay with a search field, kind labels (Stage or Theme) on result rows, and a highlighted keyboard selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.22"
name = "undo_redo_disabled_legible"
description = "Empty Undo/Redo and disabled export actions read as non-interactive while their labels stay legible."
type = "binary"
weight = 0.5

