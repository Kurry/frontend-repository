[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "narrow_single_column_stack"
description = "At about 375px width the layout reflows to a single stacked column and the controls needed to choose a colour set and generate the patched result stay reachable, with no clipped text and no horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "progress_bar_visible_label_truncates"
description = "At about 375px width the progress bar keeps its numbered steps visible while the active stage label truncates rather than overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "preview_panels_reflow_narrow"
description = "At about 375px width the two Preview panels reflow to fit the column without clipping or forcing horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "bitmap_grid_reflows_narrow"
description = "At about 375px width the bitmap preview grid reflows to fit the column without clipping tiles or forcing horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "desktop_centered_column"
description = "At about 1440px width the patcher sits in a single centered column roughly 600px wide with header, progress bar, and active step body stacked."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "mobile_tap_targets_adequate"
description = "At about 375px width, primary controls (Continue, Back, Generate, Download, Base theme, Base icon set) present tap targets at least about 44px in the smaller dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "typography_scales_across_breakpoints"
description = "Typography remains readable from 1440px desktop to 375px mobile: the Custom EuroScope title and stage labels scale down without becoming illegible, and swatch role names stay readable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll_narrow"
description = "At about 375px width the document/body does not require horizontal page scrolling to reach any primary wizard chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the layout breaks: overlapping controls, clipped text, or wizard actions that cannot be reached."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "narrow_forces_page_horizontal_scroll"
description = "At about 375px width the page itself scrolls horizontally because Preview panels, the bitmap grid, or the progress bar overflow the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "active_label_overflows_progress"
description = "At about 375px width the active progress stage label overflows or clips instead of truncating cleanly while numbered steps remain visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "mobile_controls_too_small"
description = "At about 375px width primary wizard controls are too small to tap reliably (well under about 44px) or misaligned so they collide."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "preview_or_grid_overflows"
description = "At a narrow viewport the Preview panels or bitmap grid use a fixed width that overflows the viewport or clips their content."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "controls_disappear_at_narrow"
description = "At about 375px width the Base theme control, Continue/Generate, or Download control disappears or becomes unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.9"
name = "contrast_and_export_reflow_narrow"
description = "At about 375px width the contrast matrix and export preview reflow to fit the column without clipping or forcing horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "command_palette_operable_narrow"
description = "At about 375px width the command palette overlay stays fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n7"
name = "palette_or_export_offscreen_narrow"
description = "At about 375px width the command palette or export preview renders off-screen or forces page-level horizontal scrolling."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
