[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load of the root URL, the patching wizard is interactive within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of the wizard, including selecting themes, editing swatches, toggling the icon set, generating, and downloading the patched result."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "responsive_under_rapid_swatch_edits"
description = "Under rapid repeated swatch hex edits or colour-picker changes, the live Preview stays responsive with no hangs, freezes, or dropped updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "icon_toggle_stays_snappy"
description = "Rapidly toggling the icon set between None and Vector updates every preview tile and the replaced-count status without perceptible multi-second lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "step_transitions_stay_interactive"
description = "While advancing or returning between wizard steps, the UI remains interactive: Back/Continue stay operable and the page does not freeze waiting on the step-body swap."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "generate_download_no_hang"
description = "Generating the patched result and activating Download complete without a multi-second UI hang or freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_recolours_without_jank"
description = "When base theme or swatch changes retint the Preview panels, the recolour happens without multi-second UI blocking or visible frame collapse."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_keep_original_and_filter"
description = "Rapidly toggling keep-original flags or switching colour-blindness modes keeps the Preview, tile grid, contrast matrix, and export preview responsive with no hangs or dropped updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "console_clean_export_undo_palette"
description = "No console errors or warnings appear while copying exports, importing a recipe, undoing, or opening the command palette during a full exercise."
type = "binary"
weight = 1.0

