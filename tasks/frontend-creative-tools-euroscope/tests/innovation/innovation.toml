[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "live_preview_craft"
description = "The dual Primary/Secondary colour Preview executes with polished live retinting that makes theme changes instantly scannable beyond a bare static swatch list."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "wizard_progress_craft"
description = "Progress circles, check marks, and active stage labelling feel like one coherent patching ritual rather than disconnected step chrome."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "bitmap_vector_recolour_craft"
description = "Vector icon-set recolouring of the bitmap tile grid is crafted so theme colours propagate across tiles with clear None-versus-Vector contrast."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "alert_guidance_craft"
description = "Information, Caution, and Warning alerts elevate the ATC-patcher guidance with clear colour coding and hierarchy beyond minimum helper text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "patched_result_moment"
description = "The Patched result generated confirmation and summary on step four land as a polished completion moment that clarifies chosen replacements at a glance."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "contrast_matrix_beyond_spec_minimum"
description = "Optional polish: the ATC contrast matrix presents ratios and Pass/Fail with scannable craft that makes theme readability decisions faster than a bare number list."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "colour_blindness_preview_craft"
description = "Optional polish: Protanopia/Deuteranopia simulation on the Preview panels makes colour-vision risk immediately visible without leaving the patcher."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "export_center_artifact_craft"
description = "Optional polish: the live Patch recipe JSON and Theme CSS export center feels like a real deliverable surface, not a debug dump."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the EuroScope patcher spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot). If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
