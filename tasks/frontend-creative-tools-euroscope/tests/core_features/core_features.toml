[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app shows a four-step patching wizard whose progress bar names the stages Upload EuroScope executable, Update theme colours, Update embedded bitmaps, and Download new executable, with step 1 active"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, step 1 shows a loaded sample named EuroScope.exe and a Continue button; clicking Continue advances to the Update theme colours step without requiring a file to be picked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On the Update theme colours step, the Base theme control lists exactly EuroScope, Grey, Primer, Ayu, Solarised"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After selecting the base theme Grey, the Backdrop main swatch reads #262626 and the live Preview panels recolour to the Grey palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After editing the Backdrop lighter swatch, the Preview updates and the other five swatch values stay unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After clicking Continue to the Update embedded bitmaps step and selecting the Vector icon set, the bitmap preview grid recolours to the chosen theme and a status line reads 10 of 10 bitmaps set to Vector"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After changing the icon set on the Update embedded bitmaps step, the previously chosen colour set is still selected and the colour Preview is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After clicking Generate, the Download new executable step shows a Patched result generated confirmation and a chosen-replacements summary naming the selected colour set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After reaching the Download new executable step, clicking Back returns to the Update embedded bitmaps step and then Back again returns to Update theme colours with the earlier colour set still selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After choosing colour set Grey, advancing a step, and returning, the Base theme control still shows Grey and the same Preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After returning to the Update theme colours step and selecting a different base theme (for example Ayu), the summary on the Download new executable step reflects the revised choice rather than the earlier one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After moving backward and forward through the wizard twice, each step appears once and retains its own choices, with no duplicated step and no lost selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After choosing a colour set and reloading the page, the app restores the same wizard step and the same chosen replacements"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "At 375 by 667 pixels, the controls needed to choose a colour set and generate the patched result remain reachable with no horizontal page scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the verifier session, including while choosing a colour set and generating the patched result"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The app opens into a four-step patching wizard whose progress bar names the stages Upload EuroScope executable, Update theme colours, Update embedded bitmaps, and Download new executable, starting on step 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Choosing a replacement colour set from the five named base themes (EuroScope, Grey, Primer, Ayu, Solarised) and advancing through the steps generates a patched result that is reflected in the current wizard step and the chosen-replacements summary"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Returning to an earlier step and revising the colour set or icon set replaces the earlier preview at that step and updates the final chosen-replacements summary accordingly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Moving backward one patching step shows the earlier replacement choice still selected exactly as it was left"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Changing the icon set after choosing colours updates the bitmap preview without resetting the colour choice made on the previous step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Moving backward and forward through the wizard repeatedly shows each step exactly once and each step retains its own choices, with no duplicated step and no lost selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Editing a single swatch on the Update theme colours step updates the live preview while the other five swatch values stay unchanged"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Reloading the page restores the same wizard step and the same chosen replacements (colour set, swatches, and icon set)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The workflow is non-empty on first load: a sample scope is loaded so step 1 advances without a user file, and at least ten sample bitmaps back the icon preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The wizard has no working backward navigation: no Back control returns to the previous step, so an earlier choice cannot be revisited"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Moving backward a step loses or resets the earlier colour or icon choice instead of keeping it selected"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "Selecting a different colour set or icon set does not change the preview or the generated summary, or the output is constant regardless of the choice"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "App chrome navigates via real outbound links to another origin instead of driving the wizard through in-app client state"
type = "binary"
weight = 1.0
negate = true
