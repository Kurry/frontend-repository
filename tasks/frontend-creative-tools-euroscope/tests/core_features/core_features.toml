[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app shows a four-step patching wizard whose progress bar names the stages Upload EuroScope executable, Update theme colours, Update embedded bitmaps, and Download new executable, with step 1 active"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, step 1 shows a loaded sample named EuroScope.exe and a Continue button; clicking Continue advances to the Update theme colours step without requiring a file to be picked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On the Update theme colours step, the Base theme control lists exactly EuroScope, Grey, Primer, Ayu, Solarised"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After selecting the base theme Grey, the Backdrop main swatch reads #262626 and the live Preview panels recolour to the Grey palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After editing the Backdrop lighter swatch, the Preview updates and the other five swatch values stay unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After clicking Continue to the Update embedded bitmaps step and selecting the Vector icon set, the bitmap preview grid recolours to the chosen theme and a status line reads 10 of 10 bitmaps set to Vector"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After changing the icon set on the Update embedded bitmaps step, the previously chosen colour set is still selected and the colour Preview is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After clicking Generate, the Download new executable step shows a Patched result generated confirmation and a chosen-replacements summary naming the selected colour set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After reaching the Download new executable step, clicking Back returns to the Update embedded bitmaps step and then Back again returns to Update theme colours with the earlier colour set still selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After choosing colour set Grey, advancing a step, and returning, the Base theme control still shows Grey and the same Preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "revise_choice_after_generate"
description = "After generating the patched result on the Download new executable step, returning to the Update theme colours step and selecting a different base theme (for example Ayu instead of Grey) updates the preview at that step, and the step four summary then names the revised colour set rather than the earlier one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "back_forward_repeat_retains_choices"
description = "Starting from the Update embedded bitmaps step with a colour set and icon set chosen: clicking Back twice and then Continue twice shows each step exactly once per visit, with the base theme control, the swatch values, and the icon set choice all retained exactly as they were left — no duplicated step and no lost selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After choosing a colour set and reloading the page, the app restores the same wizard step and the same chosen replacements"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The workflow is non-empty on first load: a sample scope is loaded so step 1 advances without a user file, and at least ten sample bitmaps back the icon preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "invalid_hex_shows_inline_error"
description = "Typing an invalid value (for example not-a-colour) into a swatch's hex field shows an inline validation message naming that swatch before any submit or step change, and the live Preview keeps its last valid colour; correcting the value clears the message and applies the colour"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "invalid_hex_blocks_apply_on_advance"
description = "Submitting or advancing while a swatch hex field holds an invalid value leaves the invalid colour unapplied, and the inline message naming that swatch remains visible until the value is corrected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "download_writes_named_exe"
description = "On the Download new executable step, activating the Download control downloads a file named EuroScope.exe and the control's label changes to reflect that the download occurred"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "none_iconset_zero_replaced_summary"
description = "With the icon set on None, the bitmap tiles show muted originals and the step four summary reports zero replaced bitmaps while the colour set summary still reflects the chosen theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "double_generate_single_result"
description = "Double-activating the Generate control produces exactly one Patched result generated confirmation block and one chosen-replacements summary, not two"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "ayu_theme_end_to_end_flow"
description = "Starting on the Update theme colours step: selecting the Ayu base theme replaces all six swatch values at once and retints both live Preview panels immediately; after advancing to the Update embedded bitmaps step with Vector selected, the bitmap tiles render in the Ayu colours; and the step four summary names Ayu as the selected colour set — all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "swatch_edit_reaches_summary_strip"
description = "On the Update theme colours step, editing a single swatch's hex to a distinct valid colour changes that swatch row and retints the live Preview while the other five rows stay unchanged; after advancing to the final stage, the edited colour appears in the step four swatch strip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "icon_toggle_multi_surface_flow"
description = "On the Update embedded bitmaps step, switching the icon set between None and Vector updates every preview tile and the replaced-count status line immediately; clicking Back shows the step two colour choice intact; and after advancing to the final stage, the step four summary reports the currently selected icon set with its replaced count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "reload_restores_all_wizard_facets"
description = "After selecting a base theme, editing one swatch, choosing the Vector icon set, and advancing to the Update embedded bitmaps step: reloading the page restores the same highlighted stage in the progress bar, the same base theme selection, all six swatch values including the edit, and the same icon set choice and replaced count — all facets together, never a mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The wizard has no working backward navigation: no Back control returns to the previous step, so an earlier choice cannot be revisited"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Moving backward a step loses or resets the earlier colour or icon choice instead of keeping it selected"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "Selecting a different colour set or icon set does not change the preview or the generated summary, or the output is constant regardless of the choice"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "App chrome navigates via real outbound links to another origin instead of driving the wizard through in-app client state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core patching-wizard features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
