[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "four_step_wizard_progress"
description = "On load, the app shows a four-step patching wizard whose progress bar names the stages Upload EuroScope executable, Update theme colours, Update embedded bitmaps, and Download new executable, with step 1 active"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_upload_continue"
description = "On load, step 1 shows a loaded sample named EuroScope.exe and a Continue button; clicking Continue advances to the Update theme colours step without requiring a file to be picked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "five_base_themes_listed"
description = "On the Update theme colours step, the Base theme control lists exactly EuroScope, Grey, Primer, Ayu, Solarised"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "base_theme_replaces_all_swatches"
description = "After selecting the base theme Grey, all six working swatch values change to that set's palette and the live Preview panels recolour to match immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "single_swatch_edit_isolated"
description = "After editing the Backdrop lighter swatch, the Preview updates and the other five swatch values stay unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "vector_icon_set_ten_of_ten"
description = "After clicking Continue to the Update embedded bitmaps step and selecting the Vector icon set, the bitmap preview grid recolours to the chosen theme and a status line reads 10 of 10 bitmaps set to Vector"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "icon_change_preserves_colours"
description = "After changing the icon set on the Update embedded bitmaps step, the previously chosen colour set is still selected and the colour Preview is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "generate_confirmation_summary"
description = "After clicking Generate, the Download new executable step shows a Patched result generated confirmation and a chosen-replacements summary naming the selected colour set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "back_from_download_retains_theme"
description = "After reaching the Download new executable step, clicking Back returns to the Update embedded bitmaps step and then Back again returns to Update theme colours with the earlier colour set still selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "grey_theme_survives_step_return"
description = "After choosing colour set Grey, advancing a step, and returning, the Base theme control still shows Grey and the same Preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "revise_choice_after_generate"
description = "After generating the patched result on the Download new executable step, returning to the Update theme colours step and selecting a different base theme (for example Ayu instead of Grey) updates the preview at that step, and the step four summary then names the revised colour set rather than the earlier one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "back_forward_repeat_retains_choices"
description = "Starting from the Update embedded bitmaps step with a colour set and icon set chosen: clicking Back twice and then Continue twice shows each step exactly once per visit, with the base theme control, the swatch values, and the icon set choice all retained exactly as they were left — no duplicated step and no lost selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "reload_restores_step_and_theme"
description = "After choosing a colour set and reloading the page, the app restores the same wizard step and the same chosen replacements"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "seeded_sample_and_bitmaps"
description = "The workflow is non-empty on first load: a sample scope is loaded so step 1 advances without a user file, and at least ten sample bitmaps back the icon preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "invalid_hex_shows_inline_error"
description = "Typing an invalid value (for example not-a-colour) into a swatch's hex field shows an inline validation message naming that swatch before any submit or step change, and the live Preview keeps its last valid colour; correcting the value clears the message and applies the colour"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "invalid_hex_blocks_apply_on_advance"
description = "Submitting or advancing while a swatch hex field holds an invalid value leaves the invalid colour unapplied, and the inline message naming that swatch remains visible until the value is corrected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "download_writes_named_exe"
description = "On the Download new executable step, activating the Download control downloads a file named EuroScope.exe and the control's label changes to reflect that the download occurred"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "none_iconset_zero_replaced_summary"
description = "With the icon set on None, the bitmap tiles show muted originals and the step four summary reports zero replaced bitmaps while the colour set summary still reflects the chosen theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "double_generate_single_result"
description = "Double-activating the Generate control produces exactly one Patched result generated confirmation block and one chosen-replacements summary, not two"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "ayu_theme_end_to_end_flow"
description = "Starting on the Update theme colours step: selecting the Ayu base theme replaces all six swatch values at once and retints both live Preview panels immediately; after advancing to the Update embedded bitmaps step with Vector selected, the bitmap tiles render in the Ayu colours; and the step four summary names Ayu as the selected colour set — all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "swatch_edit_reaches_summary_strip"
description = "On the Update theme colours step, editing a single swatch's hex to a distinct valid colour changes that swatch row and retints the live Preview while the other five rows stay unchanged; after advancing to the final stage, the edited colour appears in the step four swatch strip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "icon_toggle_multi_surface_flow"
description = "On the Update embedded bitmaps step, switching the icon set between None and Vector updates every preview tile and the replaced-count status line immediately; clicking Back shows the step two colour choice intact; and after advancing to the final stage, the step four summary reports the currently selected icon set with its replaced count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "reload_restores_all_wizard_facets"
description = "After selecting a base theme, editing one swatch, choosing the Vector icon set, and advancing to the Update embedded bitmaps step: reloading the page restores the same highlighted stage in the progress bar, the same base theme selection, all six swatch values including the edit, and the same icon set choice and replaced count — all facets together, never a mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "progress_stage_state_affordances"
description = "In the progress bar, the current stage is highlighted with its full text label, each completed stage shows a check mark, and each upcoming stage shows a muted number"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "six_swatch_rows_picker_and_hex"
description = "The Update theme colours step shows exactly six named swatch rows (Backdrop darkest, Backdrop darker, Backdrop main, Backdrop lighter, Backdrop lightest, Foreground secondary), each exposing a colour picker and a hex text field showing the current value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "upload_step_optional_exe_input"
description = "Step one offers an optional file input that accepts .exe files alongside the loaded EuroScope.exe sample, and continuing without picking a file shows no error"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.41"
name = "undo_redo_controls_present"
description = "Undo and Redo controls are visible in the wizard chrome; both are disabled when their stacks are empty, and Undo reverses a base-theme select or swatch edit across swatches, Preview, contrast matrix, and export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "contrast_matrix_live_aa"
description = "On the Update theme colours step, a live ATC contrast matrix lists at least three pairings (Backdrop darkest on Foreground secondary, Backdrop main on Foreground secondary, Backdrop lightest on Backdrop darkest) with contrast ratios and Pass/Fail marks against WCAG AA 4.5:1; editing a swatch recomputes the ratios immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "colour_blindness_filter_preview_only"
description = "Choosing Protanopia or Deuteranopia on the colour-blindness control visibly shifts both Preview panels while the six swatch hex field values stay unchanged; choosing None removes the filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "named_snapshot_save_and_restore"
description = "Saving a snapshot with a valid name (for example Night ops) adds exactly one row whose payload matches the Palette snapshot field contract (non-empty name plus six #RRGGBB colours keys); selecting that snapshot restores its six colours into the working swatches and retints the Preview and contrast matrix"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "before_after_snapshot_compare"
description = "After saving a snapshot and editing two swatches, the Before / After toggle shows the snapshot colours in the Preview on Before and the edited colours on After without mutating the undo stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "keep_original_decrements_replaced_count"
description = "With Vector selected, turning Keep original on two tiles via the advanced per-bitmap list mutes those tiles and drops the replaced-count status by exactly two"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "batch_keep_original_selected"
description = "Selecting three bitmap tiles and activating Keep original selected mutes all three at once, decrements the replaced count by three, and clears the selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "export_center_three_tabs_live"
description = "On step four, the Export center shows Patch recipe JSON, Theme CSS, and Summary tabs; after a swatch edit or icon-set change, the active preview text updates without a reload to reflect the session's actual replacements"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "copy_export_and_download_recipe"
description = "Copy export puts the visible preview text on the clipboard and shows a confirmation that reverts; Download recipe downloads a .json file whose contents match the Patch recipe JSON preview and still include every required field-contract key"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "import_recipe_round_trip"
description = "After configuring theme, icon set, and a keep-original override, exporting then importing the Patch recipe JSON (after Reset to base) reconstructs the same six swatches, icon set, keep-original map, Preview colours, and export preview; the Patch recipe JSON still shows schemaVersion euroscope-patch-v1 and the six colours keys, and Theme CSS still shows all six --es-* tokens"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "patch_recipe_api_shaped_field_contract"
description = "The Patch recipe JSON export preview is a single object with no undeclared top-level keys whose visible text includes the required field contract: schemaVersion exactly euroscope-patch-v1; target.product exactly EuroScope and target.executableName ending in .exe; baseTheme exactly one of EuroScope, Grey, Primer, Ayu, Solarised; colours keyed exactly backdropDarkest, backdropDarker, backdropMain, backdropLighter, backdropLightest, foregroundSecondary each as #RRGGBB; iconSet exactly none or vector; and bitmaps entries for every seeded id each carrying boolean keepOriginal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "theme_css_es_token_contract"
description = "The Theme CSS export preview is a :root block whose visible custom-property names are exactly --es-backdrop-darkest, --es-backdrop-darker, --es-backdrop-main, --es-backdrop-lighter, --es-backdrop-lightest, and --es-foreground-secondary, each assigned the matching working swatch's current #RRGGBB value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "swatch_form_matches_recipe_colours"
description = "After selecting a base theme and editing a swatch through the form controls, the Patch recipe JSON colours object shows the same six camelCase keys and #RRGGBB values the swatch forms produced — the form record is the export payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "command_palette_stage_and_theme"
description = "Pressing Ctrl+K (or Cmd+K) opens the command palette; activating an Update embedded bitmaps stage result jumps to step three, and activating an Ayu theme result applies the Ayu palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "reset_to_base_restores_palette"
description = "After editing swatches away from the selected base theme, activating Reset to base restores all six working swatches to that base theme's palette and retints the Preview"
type = "binary"
weight = 1.0

