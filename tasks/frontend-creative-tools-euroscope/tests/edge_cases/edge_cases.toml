[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "continue_without_file_uses_seed"
description = "Continuing from step one without picking a file advances to Update theme colours using the seeded EuroScope.exe sample, and no error message appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "back_forward_retains_choices"
description = "Moving backward and forward through the wizard repeatedly shows each step exactly once and each step retains its own choices; no step is duplicated and no selection is lost."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "invalid_hex_blocks_apply"
description = "Typing an invalid value into a swatch hex field (for example not-a-colour) shows an inline validation message naming that swatch before any submit or step change; advancing while invalid leaves the Preview on its last valid colour and keeps the message until corrected."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "double_generate_one_result"
description = "Double-activating the Generate control produces exactly one patched result: one confirmation block and one summary appear, not two."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "none_icon_set_zero_replaced"
description = "With the icon set on None, the step four summary reports zero replaced bitmaps while the colour set summary still reflects the chosen theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "correcting_hex_clears_message"
description = "After an invalid swatch hex shows an inline message, correcting the value to a valid hex clears the message and applies the colour to the Preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "alert_guidance_present"
description = "Information, Caution, or Warning alert blocks with actionable guidance copy are visible in the wizard chrome for the patching workflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_wizard_controls"
description = "Base theme, Base icon set, swatch hex fields, and primary action buttons use semantic form/button controls with persistent visible labels rather than unlabeled placeholder-only fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "continue_without_file_errors"
description = "Continuing from step one without picking a file shows an error or refuses to advance even though a seeded EuroScope.exe sample is present."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "back_forward_loses_or_duplicates"
description = "Moving backward and forward through the wizard duplicates a step, skips a stage, or loses a previously selected theme, swatch, or icon set."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "invalid_hex_applies_or_silent"
description = "An invalid swatch hex is applied to the Preview, or advancing proceeds with no inline message naming the swatch."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "double_generate_duplicates_result"
description = "Double-activating Generate produces two confirmation blocks or two summaries for a single intended patched result."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "none_reports_nonzero_replaced"
description = "With the icon set on None, the step four summary reports a non-zero replaced bitmap count."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "validation_console_only"
description = "Invalid swatch hex input is surfaced only in the browser console, with no inline UI message naming the swatch."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.9"
name = "empty_undo_redo_disabled"
description = "Undo with an empty history and Redo with an empty redo stack are disabled controls; activating them does nothing and produces no console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "whitespace_snapshot_name_rejected"
description = "Saving a snapshot with a whitespace-only name adds no row and shows validation naming the snapshot name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "malformed_import_unchanged"
description = "Importing a malformed patch-recipe file leaves swatches, icon set, and keep-original overrides unchanged and shows an inline import error."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "all_keep_original_zero_count"
description = "Selecting every bitmap and choosing Keep original selected while Vector is active drops the replaced count to zero; Use Vector selected restores the full replaced count."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "protanopia_hex_unchanged"
description = "With Protanopia selected, the six swatch hex field values stay identical to their unfiltered values while only the Preview panels' rendered colours shift."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "schema_invalid_import_rejected"
description = "Importing parseable JSON that fails the Patch recipe field contract — missing schemaVersion or target, an undeclared top-level key, baseTheme or iconSet outside their closed enums, a colours key missing/extra or not #RRGGBB, a bitmaps entry missing a seeded id or boolean keepOriginal, or a cross-field mismatch — leaves swatches, icon set, and keep-original overrides unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "non_rrggbb_swatch_rejected"
description = "A swatch hex that is not #RRGGBB (missing hash, wrong length, or non-hex characters) is rejected with validation naming that swatch and is not applied to Preview or the Patch recipe JSON / Theme CSS exports."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n7"
name = "empty_undo_still_mutates"
description = "Activating Undo while the undo stack is empty still mutates swatches, Preview, or export preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "malformed_import_applies_partial"
description = "A malformed patch-recipe import partially applies fields or clears valid swatches without an inline import error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "schema_invalid_import_mutates_state"
description = "Importing parseable JSON that violates the Patch recipe field contract still mutates swatches, icon set, keep-original overrides, or export preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
