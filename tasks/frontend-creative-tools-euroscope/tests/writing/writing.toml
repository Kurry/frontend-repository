[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Where the app renders headings, stage names, and button labels in the patching wizard, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_wizard_action_verbs"
description = "Where the app renders primary action labels, they use specific wizard verbs (Continue, Back, Generate, Download) rather than generic Submit or OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_swatch_and_fix"
description = "Where the app renders validation or error messages on swatch hex fields, they name the swatch and the problem (for example that Backdrop darkest is not a valid colour), not only a bare Invalid rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "alert_copy_names_situation"
description = "Where the app renders Information, Caution, and Warning alert copy, it names the situation and what the user should do."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_quality"
description = "Where the app renders body copy, stage labels, captions, or alert text, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "theme_terminology_consistent"
description = "Where the app renders labels for base theme, swatch roles, icon set, and patched result across steps and the final summary, terminology stays consistent rather than mixing synonyms for the same concept."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "hex_and_count_formatting_consistent"
description = "Where the app renders hex colour values and replaced-count status (for example 10 of 10), formatting is consistent across swatch rows and the status line."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "confirmation_states_what_happened"
description = "Where the app renders the Patched result generated confirmation or Download feedback, it states what happened, not a vague affirmation only."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variable names such as {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as Custom EuroScope, stage names, primary buttons, or alert headings."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_names"
description = "The same concept is named inconsistently across surfaces (for example Base theme in one place and Palette in another for the same control)."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_unreadably"
description = "Truncated or overflowing text renders primary labels, validation messages, or alert copy unreadable outside the intentional narrow-viewport progress-label truncation case."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.9"
name = "hardened_action_verbs"
description = "Where the app renders action labels for undo, snapshots, and export, they use specific verbs (Undo, Redo, Save snapshot, Copy export, Import recipe) rather than generic Submit or OK."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "palette_empty_state_copy"
description = "Where the app renders the command palette empty state, it explains that no stage or theme matched the query."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "import_error_names_problem"
description = "Where the app renders import or snapshot validation errors, they name the field or problem rather than a bare Invalid rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "generic_export_labels"
description = "Where the app renders export or snapshot actions, labels are only generic Submit/OK/Click here when specific verbs are possible."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
