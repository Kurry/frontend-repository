[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "three_pane_planner_density"
description = "At 1440px width the workspace shows the three-pane planner composition — left sidebar, center plan column, right map pane all visible — with planner density, not a marketing layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_states_visually_distinct"
description = "Empty list and empty day states render as visually distinct regions with a message, not blank whitespace"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "static_brochure_collapse"
description = "Collapses into a static brochure itinerary with no interactive stops collection"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "day_colors_consistent_detail_overlay"
description = "Sidebar day dots and map place pins use consistent per-day colors, and the selected place detail card floats over the map with its tab row"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "coastal_palette_source_sans_navy"
description = "The UI renders a soft coastal treatment: a cool blue-gray page wash, body text in the Source Sans Pro face (visible in computed styles), and a navy accent color used consistently"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "hero_stacks_above_day_sections"
description = "In the plan column, the plan hero stacks the cover image, editable title, date range, and suggestion cards above the day sections"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "component_state_treatments"
description = "Buttons, inputs, and tabs show distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "tablet_sidebar_overlay_drawer"
description = "At 768px width and below, the sidebar collapses behind a toggle that opens it as an overlay drawer, and the map pane stacks or yields to the active mode instead of sharing the row"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "mobile_content_overflows_viewport"
description = "At 375px width, content clips, overflows the viewport, or horizontal scrolling appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "consistent_heading_capitalization"
description = "Where the app renders headings, buttons, and labels, they keep one consistent capitalization convention across the workspace"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "action_labels_specific_verbs"
description = "Where the app renders action labels, they are specific verbs such as 'Add stop' and 'Optimize route' rather than generic labels where a specific one is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.12"
name = "placeholder_text_in_shipped_ui"
description = "Lorem ipsum or placeholder text (TODO, lorem, template variable names) is visible somewhere in the shipped UI, or a validation or empty-state message fails to name the problem and the fix"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.13"
name = "document_title_references_riviera"
description = "The document title (browser tab) references the French Riviera trip, and the first viewport presents the Trip / Travel Planner product name with 'French Riviera — Cote d'Azur' as the trip signal"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "financial_surfaces_keep_coastal_language"
description = "The ledger grid, spreadsheet matrix, and charts keep the planner's coastal visual language: dense but aligned rows, labeled chart axes and legends, prominent EUR totals, and a burn-rate ceiling line clearly distinguishable from the spend line"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "state_treatments_pair_color_with_icon_or_text"
description = "Threshold-flagged rows, projected-overage regions, and settled transactions each have a distinct visual treatment that pairs color with an icon or text label"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "dark_theme_coherent_everywhere"
description = "In dark theme every pane, chart, overlay, and form keeps readable contrast and the same layout as light theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n17"
name = "dark_theme_leaves_unstyled_regions"
description = "In dark theme at least one region (a chart, overlay, wizard step, or report surface) stays light-styled, renders unreadable text, or loses its layout"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.17"
name = "export_canvas_monospaced_previews"
description = "The export canvas presents markdown, ICS, and trip JSON as monospaced previews with Download and Copy controls that read as part of the coastal planner chrome rather than a screenshot dead end"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design, responsive layout, or UI copy that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
