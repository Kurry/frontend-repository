[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Create flow: a new stop or expense created via the UI appears everywhere it should — the stop in its day section and on the map, the expense in the ledger grid, spreadsheet, and derived totals."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: submitting stop or expense create with values that violate the Stop or Expense field contract (empty title/description, non-positive amount, illegal enum, endTime not after startTime, invalid weights) shows inline validation naming the field and adds no row."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Edit flow: renaming a stop or changing an expense amount/currency updates the plan list or ledger row, the open detail or spreadsheet cell, and the derived money or export surfaces without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Delete flow: deleting a stop removes its day-list row and map pin; deleting an expense removes its ledger row and its contribution from balances, pie, and burn-rate in the same interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "View/mode switch: switching Plan List, Map, Budget/Ledger, spreadsheet, and export canvas keeps the shared selection and collection state so the same stop or expense remains identifiable without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting every stop, the plan list empty state is visible and the ICS preview has zero VEVENT blocks with an empty trip JSON stops array."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_all_surfaces"
description = "Edge: choosing a day from the sidebar itinerary list narrows the plan list to that day's stops with the day's color highlight, and clearing the filter restores the full multi-day list."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "Collapsible chrome: Hide sidebar collapses the left nav and the toggle reopens it as an overlay drawer without losing day filter, mode, or selection state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Overlays: place detail, stop/expense forms, CSV wizard, and factory-reset confirm open over the workspace, complete their flow, and dismiss without stranding the user."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery: cancelling factory reset, rejecting a bad trip JSON import, or dismissing the place detail card returns the user to a usable planner workspace without requiring a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "ingestion_review_commit_flow"
description = "Ingestion flow: paste confirmation text or drop a CSV, review the drafts or diagnostics, commit, and confirm the accepted items land in the ledger or itinerary while discarded or excluded ones do not appear anywhere."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "expense_to_settlement_flow"
description = "Settlement flow: add an expense, open the debt visualizer, mark a computed transaction settled in the checklist, and open the settlement report — each step's output feeds the next with no reload and no dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "undo_restores_bulk_delete"
description = "Undo flow: after a bulk delete from the mutation tray, one Undo restores every deleted row to the ledger, the spreadsheet, and the charts; Redo re-applies the delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "spreadsheet_edit_echoes_to_cards"
description = "Spreadsheet flow: an inline cell edit committed in the matrix is visible on the corresponding card or ledger row immediately, and continuing to navigate cells with the keyboard keeps working after the edit."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "export_import_round_trip_flow"
description = "Export/import flow: mutate the plan (rename a stop, create one valid expense with a unique description, change one expense currency), Download or Copy the trip JSON, reload to the seeded baseline, Import that JSON, and confirm list rows, ledger rows, balances, charts, markdown, ICS, trip JSON, settlement report, and budget summary all match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "stop_create_updates_export_artifacts"
description = "Create flow ending at artifacts: after creating a valid stop, the plan list gains the row and the export canvas markdown, ICS, and trip JSON all include the new stop without a reload."
type = "binary"
weight = 1.0

