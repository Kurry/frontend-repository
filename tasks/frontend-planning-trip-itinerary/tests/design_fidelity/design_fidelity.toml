[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Sidebar, plan column, map pane, ledger grid, and export canvas spacing follow one consistent density scale matching the reference planner chrome rather than arbitrary one-off gaps."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Plan hero title Trip to the French Riviera - Cote d'Azur, day section headings, stop row titles, and ledger amounts use Source Sans Pro (or the instructed coastal humanist face) with hierarchy matching the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "At 1440px the three-pane composition (left sidebar, center plan column with hero and day sections, right map pane) matches the reference screenshots to within a small tolerance."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Stop row add/delete/reassign, place-detail enter, bulk tray slide, and chart updates use the short transitions called out in the motion section rather than instant snaps."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "At 768px and below the sidebar collapses behind a toggle drawer and the map stacks or yields as specified, matching the reference responsive pattern rather than keeping a clipped three-pane lock."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Sidebar items, mode switches, stop form controls, ledger currency dropdowns, and export Download/Copy buttons share consistent radii, padding, and coastal navy accent treatment with the reference chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Plan hero title, day headings, stop titles, and ledger secondary labels form a clear type hierarchy that distinguishes section and body text as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, inputs, and tabs show distinct default, hover, focus ring, disabled, and error treatments matching the visual_design contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Cool blue-gray page wash, navy accent, day-colored dots/pins, and floating place-detail card over the map match the coastal surface treatments in the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Sidebar hover opacity with brief press scale, place/carousel card lift, and map chrome press feedback match the instructed microinteraction feel rather than static chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the specified scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Colors appear outside the specified palette."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Sizing mismatches the spec."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Animations are missing or incorrect where the spec requires them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls use browser default styles when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The grid or layout is misaligned at reference breakpoints."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Elements render off-screen or clipped."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order, content, or structure deviates from the reference on fidelity tasks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text have no distinction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Microinteractions are missing or deviate from the provided reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.11"
name = "new_surfaces_integrate_with_reference_language"
description = "The financial, import, spreadsheet, and report surfaces integrate with the reference's coastal planner language (palette, type scale, spacing, planner density) rather than reading as a bolted-on foreign UI next to the screenshot-matched workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
