[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence_across_panes"
description = "Stops, active day, mode, detail tab, and map selection behave as one shared state: a change made through any control (sidebar day, list row, map pin, detail tab) is immediately reflected in the sidebar, map, and detail panel without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "browser_storage_used_for_state"
description = "localStorage, sessionStorage, or another browser storage API is non-empty after exercising stop creation, day selection, and mode switching"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "hydration_clean_console"
description = "The console shows no errors or warnings — including no hydration mismatch errors or warnings — on a fresh load of any route and after client-side navigation, throughout a full exercise of the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "deep_link_renders_same_workspace"
description = "Loading the app URL directly renders the same planner workspace, seeded stops, and chrome as reaching it through in-app navigation — no route 404s or half-rendered shells"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "hydration_content_flash"
description = "After first paint, content visibly flashes or is replaced by different client content as hydration completes — mismatched text, reflowing layout, or restyled elements between first paint and interactive"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "rapid_input_stays_responsive"
description = "Under rapid repeated input (fast stop creation, filter toggling, tab switching) the UI stays responsive with no hangs, dropped interactions, or console exceptions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "keyboard_operable_with_focus_ring"
description = "Every interactive control — sidebar items, mode switches, day filter, stop rows, form fields, detail tabs, and toast dismiss affordances — is reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "detail_tabs_keyboard_and_selected_state"
description = "The place detail tab row is keyboard operable: tabs can be reached and activated from the keyboard, and the active tab is programmatically distinguishable (e.g. an aria-selected or equivalent state visible in the accessibility tree)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "validation_messages_associated_with_fields"
description = "Form validation messages are shown visually and are programmatically associated with their fields so assistive technology announces them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "toasts_announced_via_live_region"
description = "Demo toasts are announced through a polite live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "external_network_requests_present"
description = "The network log shows requests to external origins (font CDNs, icon CDNs, map tile servers, booking or chat APIs) during a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.15"
name = "derived_money_surfaces_agree"
description = "At any moment, the ledger grand total, the sum of the pie's category shares, the pivot's cell totals, and the budget summary state the same underlying EUR figures — one coherent expense collection drives them all"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "money_totals_disagree_between_surfaces"
description = "Two surfaces disagree about the same figure — e.g. the ledger grand total differs from the budget summary total, or the debt visualizer's balances contradict the settlement report — while showing supposedly current state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.17"
name = "ics_structurally_valid"
description = "The rendered ICS payload is structurally valid: BEGIN:VCALENDAR and END:VCALENDAR wrap one VEVENT per scheduled stop, and each VEVENT carries a parseable DTSTART and a SUMMARY"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "trip_json_matches_field_contracts"
description = "The trip JSON preview parses as JSON with schemaVersion 1, trip.budgetCeilingEur 4500, and every stops/expenses element exposing the required Stop/Expense field-contract keys with closed-enum values where specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n17"
name = "exports_use_browser_storage"
description = "The app persists trip state through localStorage, sessionStorage, or another browser storage API instead of keeping good-app state in memory with portable ICS/JSON exports as the end state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, network entry, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
