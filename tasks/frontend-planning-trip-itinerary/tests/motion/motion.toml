[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "required_hover_and_tab_motion"
description = "Required hover animations are present on sidebar items, place cards, and map chrome, and list/map mode switches and detail tab switches behave as specified, verified through real pointer hovers and clicks"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_hover_feedback"
description = "Plan/Map mode switches update without full reload and hover feedback still works after the switch"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "sidebar_ease_cards_lift_toasts_dismiss"
description = "Sidebar items ease hover opacity with a brief press scale, place/suggestion cards lift on hover, and demo toasts slide or fade in, hold briefly, then auto-dismiss with a fade"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "stop_row_enter_exit_reassign_transitions"
description = "Using the real UI controls (never a WebMCP state shortcut): a newly created stop row animates into its day section, a deleted row animates out, and reassigning a stop to another day moves it with a transition rather than an instant jump"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "detail_card_enter_transition"
description = "Clicking a stop makes the place detail card overlay the map with a short enter transition rather than snapping in, and its tab switches swap panels without page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "validation_feedback_transitions_in"
description = "When an invalid stop form submit triggers validation, the feedback appears with a short transition rather than popping in instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "reduced_motion_instant_and_usable"
description = "With prefers-reduced-motion set on a fresh load, toast, list, and control transitions are removed and state changes apply instantly while every feature stays usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "tray_drawer_report_enter_transitions"
description = "Using the real UI controls: selecting 2 or more rows slides the bulk mutation tray in and clearing the selection slides it out, and the gallery drawer and settlement report surface open with a short enter transition rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "charts_and_checklists_animate_updates"
description = "Driven through real UI edits (never a state shortcut): pie slices and the burn-rate line transition to their new values when an expense changes, marking a settlement settled animates the checklist row into its settled state, and checking a packing item animates its progress bar"
type = "binary"
weight = 0.5

