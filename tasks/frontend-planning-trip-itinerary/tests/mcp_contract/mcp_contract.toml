[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All four contract-mandated modules — browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 — are initialized and bound to the product's activities, destinations (overview, day-detail, activity-form, budget-ledger, export-canvas), entity/form fields (title, day, location, notes, startTime, endTime, category) with day value bounds 2025-07-05 through 2025-07-11 and category value bounds sightseeing, dining, lodging, transport, other, and artifact operations (export, import, copy) with export formats ics, json, and markdown plus import mode trip-json."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers match visible UI command logic."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations and routes are available."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations declared for the activity entity — create, select, update, delete (with confirm=true), and reorder — all work against the same shared state as the visible UI, including entity fields title, day, location, notes, startTime, endTime, and category, with day and category values constrained to the declared value bounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form submission validation, error, and cancel operations are clearly bound to the declared form fields (title, day, location, notes, startTime, endTime, category)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations (overview, day-detail, activity-form, budget-ledger, export-canvas), filters (day, type, category), and themes (light, dark) match the declared bindings, and applying them updates the visible navigation state through the same handlers as the UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared module routes or capabilities are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation are correctly surfaced."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_import_tools_bound"
description = "Artifact-transfer tools for export, import, and copy are bound for formats ics, json, and markdown and import mode trip-json, and invoking export/import uses the same handlers as the visible export canvas controls so MCP-driven export state matches the on-screen previews; after a create/edit/delete or successful trip-json import, the ics/json/markdown surfaces reflect the session mutations per the declared workflow-completion bindings."
type = "binary"
weight = 1.0

