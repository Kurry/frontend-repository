[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: create a stop, add an expense, toggle dark theme, apply a day filter, and mark one settlement settled, then reload. All facets coherently reset to the seeded baseline (seeded stops and ledger, light theme, no filter, unsettled transactions) — never a mix where some facets survive"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort the expense ledger or spreadsheet by amount ascending, note the order, then sort descending; the order reverses correctly relative to ascending, proving sort is derived from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: change an expense's category and amount and confirm the pie, the pivot summary, and the burn-rate chart each change meaningfully rather than redrawing identically regardless of input"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: edit an expense's amount in the ledger grid and confirm the same expense shows the new amount in the spreadsheet matrix and the new total in the budget summary without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the ledger row count and the debt visualizer's stated transaction count immediately before and after adding one expense; the row count increases by exactly one and the transaction count changes only as the new balances dictate, with no lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: paste two different confirmation texts into the parsing sandbox and confirm the highlighted tokens and extracted draft items differ per the pasted content; likewise two expenses with different amounts produce different per-traveler balance contributions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start creating an expense, switch to the spreadsheet view and edit a cell, return and finish the expense create; confirm the cell edit survived and the created expense carries the values entered, with neither flow corrupting the other"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: delete every expense and confirm the grand total, pie, burn-rate chart, balances, and debt visualizer all show a coherent empty/zero state; then repopulate via the template injector and confirm every derived surface tracks back to the new data"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "import_wizard_to_ledger_chain"
description = "Chained import probe: drop a CSV, map its columns in the wizard, fix at least one flagged cell in the diagnostics screen, commit, and confirm the committed rows (with the fixed values, not the original invalid ones) appear in the ledger grid, the spreadsheet matrix, and the burn-rate chart totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "weighted_split_to_settlement_report_chain"
description = "Chained settlement probe: add an expense with a weighted split, confirm the per-traveler balances and the debt visualizer's minimum transaction set and stated count change consistently with the new amounts; mark one transaction settled, then open the settlement report and confirm its text contains the updated balances and the settled state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "formula_recomputes_on_cell_edit"
description = "Formula sensitivity: enter =SUM over a selected column range, note the result, then edit one cell inside the range via inline editing; the formula result changes by exactly the cell delta and the ledger grand total agrees with the same data"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "custom_field_card_spreadsheet_round_trip"
description = "Custom field round trip: define a custom field in the builder, enter a value on one expense card, confirm the same value in that field's spreadsheet column, edit it there, and confirm the new value back on the card without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "display_toggle_returns_exact_originals"
description = "Display-transform probe: note three displayed EUR amounts, switch the display currency, confirm all three change per the FX table, then switch back to EUR and confirm the three amounts match the originals exactly to the cent"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "trip_json_export_import_round_trip"
description = "Full pipeline: rename a stop, create one valid expense with a unique description, change one expense currency, Copy or Download the trip JSON, reload to the seeded baseline, Import that JSON — confirm plan list rows, ledger rows, balances, charts, markdown, ICS, trip JSON, settlement report, and budget summary match the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "mutate_to_ics_and_json_chain"
description = "Chained probe: create a valid stop with a unique title and startTime, confirm Plan List gains the row, then open the export canvas and confirm ICS gains a VEVENT whose SUMMARY is that title and trip JSON stops contains an object with that title and startTime"
type = "binary"
weight = 1.0

