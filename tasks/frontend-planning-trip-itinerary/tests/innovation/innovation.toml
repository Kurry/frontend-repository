[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Beyond required hover and list transitions, the planner adds a delightful microinteraction such as a day-dot pulse on filter, a pin bounce on selection, or a satisfying settlement check animation that is not required by the spec."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Beyond the required list and toast motion, the app adds an advanced transition such as coordinated plan-to-map emphasis, chart morphing between expense edits, or a multi-step export canvas reveal."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "A first-run coachmark or guided tour highlights the plan list, Budget ledger, and export canvas so a new traveler can find the portable trip files without reading the PRD."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Data visualizations or interactive graphics (the debt network, burn-rate chart, pie, or beyond) provide extra usability beyond the spec, such as tooltips, drill-downs, or series toggling."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "Beyond standard pointer and keyboard, the app supports an alternative input such as paste-from-confirmation as a primary create path with visible token highlighting, or a keyboard command palette for day jump and export."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Beyond the required light/dark toggle, the app exposes a traveler preference such as preferred display currency default, denser ledger row height, or remembered export format tab that observably changes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "The French Riviera / Cote d'Azur trip signal is carried through more than the hero title — for example day-colored storytelling chips, coastal empty-state copy, or export filenames that feel trip-branded."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Beyond the required light/dark structural toggle, the app offers an extra theme accent or coastal palette variant that restyles chrome without breaking ledger readability."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "The app uses a helpful web platform capability for this genre such as print stylesheet for the markdown itinerary, share-target style copy packaging, or offline-ready static asset caching indicators — without claiming a fake backend."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "A competition-level enhancement is visible — for example conflict-aware day collision hints, smarter minimum-debt explanations, or an export diff preview comparing current session to the last import — beyond the mandated ledger and ICS/JSON contracts."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The demo is purely spec-compliant, barebones, and unenhanced."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "Interactions and visuals are generic, templated, or copied."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n3"
name = "experience_lacks_polish_guidance_story"
description = "The app has no polish, guidance, or story."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n4"
name = "experience_lacks_extra_polish"
description = "The app has no extra visual or interactive polish."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n5"
name = "interface_is_flat_and_static"
description = "The UI is flat and static with no immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n6"
name = "helpful_platform_capabilities_ignored"
description = "Modern platform capabilities are ignored where they would clearly help."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n7"
name = "personalization_is_impossible"
description = "Personalization is impossible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n8"
name = "delightful_moments_are_absent"
description = "The app has no new or delightful user moments."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n9"
name = "design_has_no_twist"
description = "The design repeats well-trod patterns without a twist."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n10"
name = "effort_stops_at_mvp"
description = "The app shows minimal effort beyond the MVP or deliverable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
