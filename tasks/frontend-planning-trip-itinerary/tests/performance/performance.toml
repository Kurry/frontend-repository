[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to an interactive planner workspace (sidebar, plan column, map) is under 2 seconds on local render."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser console shows no errors or warnings — including no hydration mismatch warnings — during stop CRUD, ledger edits, CSV import, and export canvas use."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = "Plan/Map mode switches, day filter changes, and place-detail tab switches begin visible response in under 100ms from the triggering click."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "CSV import commit, template injector, and receipt-scanner extract show a brief busy or progress indicator while work runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_collections_render_without_lag"
description = "After a template injector or CSV commit that adds many expense rows, the ledger grid, spreadsheet, and charts render the new rows without multi-second blank stalls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "During FX currency changes, formula recalculation, and undo/redo, sidebar day chips and export tabs remain clickable without a frozen UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Stop row enter/exit, bulk tray slide, pie/burn-rate updates, and toast enter/exit run without visible stutter during normal use."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated stop creation, day filter toggling, tab switching, and FX dropdown changes leave the UI responsive with no hang or dropped clicks."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "bulk_import_commit_stays_responsive"
description = "Committing a CSV import of dozens of rows in one action renders the new rows, chart updates, and recomputed balances without freezing the UI."
type = "binary"
weight = 1.0

