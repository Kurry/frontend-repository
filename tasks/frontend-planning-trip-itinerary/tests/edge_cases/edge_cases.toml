[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_is_present"
description = "After deleting all stops, or filtering to a day with no stops, the plan list region shows a distinct empty-state message and an affordance to add a stop or clear the filter rather than blank whitespace."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "Stop and expense create/edit forms show inline per-field validation against their field contracts before submit, naming the invalid field (title, amount, category, endTime, weights, and so on)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Stop, expense, CSV diagnostic, formula, and trip JSON import errors name the field or rule and the fix rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Export Copy, settlement Mark as settled, template injector confirm, and import success or failure each show visible confirmation or error feedback in the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "async_work_shows_loading_state"
description = "CSV import commit, template injector, and receipt-scanner extract each show a brief progress or busy indicator while work runs, then resolve to a completed or failed state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_support_undo_or_cancel"
description = "Bulk delete and factory reset require a confirmation step with a cancel path, and Undo restores a bulk delete after it commits."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "non_obvious_controls_have_help"
description = "Non-obvious controls such as the formula bar, display-currency toggle, weighted split weights, and CSV schema-mapping dropdowns expose visible help text or tooltips naming their purpose."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Stop and expense form fields, day filter controls, detail tabs, export format tabs, and ledger action buttons use semantic interactive elements rather than clickable bare divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Place detail, stop/expense forms, CSV wizard, and factory-reset confirm overlays each close via an explicit dismiss control and via Escape or an equivalent cancel path without trapping the session."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "long_flows_show_progress"
description = "The CSV import wizard shows distinct mapping then diagnostics then commit steps so the user can tell which stage is active during the multi-step ingestion flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_csv_cell_blocks_commit"
description = "A CSV row with a non-numeric amount or unparseable date cannot be committed until the cell is fixed inline or the row is excluded, and the diagnostic screen names the offending cell and the problem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "formula_error_over_invalid_range"
description = "Entering a formula over an empty or invalid range shows an inline formula error message naming the problem instead of a numeric result."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "all_settled_zeroes_balances"
description = "Marking every settlement transaction settled brings all outstanding balances to zero and the debt visualizer shows an all-settled state with zero remaining transactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "expense_delete_purges_derived_surfaces"
description = "Deleting an expense removes its contribution from the per-traveler balances, the debt visualizer, the pie, and the burn-rate chart in the same interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "raising_cap_clears_flags"
description = "Raising a category cap above that category's current total clears the threshold flags from its rows immediately, and pasting text with no recognizable tokens into the parsing sandbox shows a no-matches message with no draft items created."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "malformed_trip_json_import_rejected"
description = "Importing malformed or undecodable trip JSON, or JSON whose stops or expenses violate their field contracts, shows a visible error naming the import problem, leaves stop and expense counts unchanged, and produces no console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "empty_stops_clears_ics_events"
description = "After deleting all stops, the plan list shows an empty state, the ICS payload has zero VEVENT blocks, and the trip JSON stops array is empty."
type = "binary"
weight = 1.0

