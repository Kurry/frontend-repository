[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "webmcp_state_parity"
description = "Interleave UI and WebMCP series, occurrence, dependency, triage, clock session, branch, history, and transfer actions, and confirm that all identities, elapsed seconds, checksums, and artifact files exactly match across both paths."
type = "binary"
weight = 1.0

[[criterion]]
id = "canonical_event_convergence"
description = "Perform a direct manipulation action on an occurrence. The keyboard or exact-value form path must converge to one canonical event with identical stable IDs, derived values, linked-view selection, history, WebMCP state, and export bytes."
type = "binary"
weight = 1.0

[[criterion]]
id = "no_op_mutation_rejection"
description = "Performing a no-op, invalid, cancelled, or double-activation action creates extra events or unexpected state mutations."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "transient_cancel_restoration"
description = "Cancel an action after viewing a transient preview and confirm the complete prior snapshot is restored, including selection, viewport, filters, focus, and history anchor."
type = "binary"
weight = 1.0

[[criterion]]
id = "artifact_export_fidelity"
description = "Export JSON and ICS, then re-export the identical state. Confirm the re-exported files are byte-identical to the original, except for updated `exportedAt` or dynamically generated metadata explicitly allowed."
type = "binary"
weight = 1.0

[[criterion]]
id = "reload_state_isolation"
description = "Reload the browser during a complex workflow involving invalid drafts or drag hover. Confirm that committed state perfectly survives the reload while transient states do not leak into persistence."
type = "binary"
weight = 1.0
