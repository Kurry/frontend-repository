[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "hardening_ribbon_stretch_split_propagate"
name = "hardening_ribbon_stretch_split_propagate"
description = "Stretching or splitting the recurrence ribbon must update occurrence cards, lineage graph, dependency lanes, workload histogram, focus log, and export preview together in one transition."
type = "binary"
weight = 1.0
[[criterion]]
id = "hardening_previous_layout_gone"
name = "hardening_previous_layout_gone"
description = "The previous occurrence layout is gone from every surface after a split."
type = "binary"
weight = 1.0
[[criterion]]
id = "hardening_workload_histogram_recomputes"
name = "hardening_workload_histogram_recomputes"
description = "The workload histogram recomputes from the new occurrence set immediately, not on later navigation."
type = "binary"
weight = 1.0
[[criterion]]
id = "hardening_motion_numerics"
name = "hardening_motion_numerics"
description = "Ribbon stretch, split, and rejoin transitions need named durations of 150 to 300ms with early and settled frame sampling."
type = "binary"
weight = 1.0
[[criterion]]
id = "hardening_computed_hover_deltas"
name = "hardening_computed_hover_deltas"
description = "Computed hover deltas are present on cards and lanes."
type = "binary"
weight = 1.0
[[criterion]]
id = "hardening_reduced_motion_toggle"
name = "hardening_reduced_motion_toggle"
description = "Reduced motion is verifiable via a visible chrome toggle or reducedMotion query param fresh load, never browser prefers reduced motion emulation."
type = "binary"
weight = 1.0
[[criterion]]
id = "reduced_motion_endpoints_agree"
name = "reduced_motion_endpoints_agree"
description = "Split series, move, dependency propagate, redistribute workload, pause, resume, compare, then repeat reduced: endpoints and canonical state agree."
type = "binary"
weight = 1.0
