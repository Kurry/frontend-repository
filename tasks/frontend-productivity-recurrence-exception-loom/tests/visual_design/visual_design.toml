[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "occurrence_state_styling"
description = "Inspect the calendar or occurrence list and confirm that master series, generated instances, exception states, detached instances, skipped instances, and completed instances each have distinct and legible visual styling."
type = "binary"
weight = 1.0

[[criterion]]
id = "lineage_indicators"
description = "Confirm that parent and child lineage lines or indicators are visually distinct and legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "dependency_edges"
description = "Confirm that dependency edges connecting tasks are clearly visible and legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "overloaded_slots"
description = "Confirm that overloaded workload slots are distinctly styled and visually obvious."
type = "binary"
weight = 1.0

[[criterion]]
id = "focus_session_states"
description = "Confirm that active and paused focus sessions have distinct visual states."
type = "binary"
weight = 1.0

[[criterion]]
id = "branch_comparison_highlight"
description = "When comparing schedule branches, confirm that differences between the branches are highlighted clearly."
type = "binary"
weight = 1.0

[[criterion]]
id = "empty_and_feedback_states"
description = "Empty states, invalid rule feedback, and triage proposals are present and visually differentiated from committed schedule data."
type = "binary"
weight = 1.0
