[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "rule_composition_and_expansion"
description = "Author or expand a recurring task series with rule options including interval, weekdays, day of month, start, end, count, and timezone, and confirm the generated occurrences correctly follow the rule, interpreting month-end and DST changes appropriately."
type = "binary"
weight = 1.0

[[criterion]]
id = "scoped_edit_this_and_future"
description = "Perform a scoped edit on an occurrence choosing 'this and future', and confirm it closes the parent series before the target id and creates a new child series for the future occurrences."
type = "binary"
weight = 1.0

[[criterion]]
id = "detach_and_rejoin_occurrence"
description = "Detach an occurrence to a new slot, then rejoin it back to its original slot, and confirm the exception is removed and its local fields match the generated occurrence, while retaining an audit event."
type = "binary"
weight = 1.0

[[criterion]]
id = "dependency_link_and_shift"
description = "Link a dependency between two occurrences and confirm downstream tasks shift according to finish-before-start or same-day-after edges."
type = "binary"
weight = 1.0

[[criterion]]
id = "triage_split_suggestion"
description = "Accept a triage split suggestion on an overloaded occurrence, and confirm it creates two linked child occurrences whose total durations exactly sum to the original."
type = "binary"
weight = 1.0

[[criterion]]
id = "resumable_focus_session"
description = "Start, pause, reload the app, and resume a focus session on an occurrence, and confirm the session state is perfectly reconstructed and accurate."
type = "binary"
weight = 1.0

[[criterion]]
id = "branch_compare_and_merge"
description = "Fork a schedule branch, apply multiple triage changes, compare branches, and merge, confirming conflicts are resolved without losing historical sessions bound to occurrences."
type = "binary"
weight = 1.0

[[criterion]]
id = "export_and_import_fidelity"
description = "Export the schedule to JSON and ICS, then import the same artifacts, and confirm the imported state exactly matches the exported state including lineage, exceptions, and dependencies."
type = "binary"
weight = 1.0
