[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
description = "Authoring Journey: Editing a field with a validation error immediately updates the validation feedback in the UI without a manual save."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
description = "Dispatch Journey: Clicking 'Run on Modal' creates a queued run, which progresses through starting and running states as events arrive."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
description = "Approval Journey: When a tool requires approval, the run halts, displays a blocking UI for the decision, and does not proceed until approved."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
description = "Retry Journey: A failed run displays a retry control; clicking it resumes from the latest checkpoint without duplicating completed events."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
description = "Cancel Journey: Canceling an active stream immediately sets a terminal cancelled state and preserves all previously emitted events."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
description = "Review Journey: Reopening a completed task artifact reconstructs the exact evidence and findings view identical to the end of the run."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
description = "Round-trip Journey: Exporting a valid editor state and importing it immediately back restores all previews, fields, and events identically."
type = "binary"
weight = 1.0
