[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_is_present"
description = "An empty folder, empty Trash, and no-match search each show a distinct styled empty-state message rather than a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "Blank/illegal note titles and folder names, and Nest Import field-contract failures, show immediate inline validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and import errors name the problem and the fix (required title, max length, schemaVersion, color enum, data: image prefix) rather than a generic failure."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Creating a note, deleting to Trash, restoring, Batch Trash, and Empty Trash each show a transient confirmation such as a toast, or an explicit confirm dialog before destruction."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "export_compiles_when_empty"
description = "With an empty active collection, Export Nest still compiles Nest JSON (schemaVersion notenest-v1 with folders/notes/trash arrays) and Markdown vault without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_support_undo_or_cancel"
description = "Folder delete, Empty Trash, and Batch Trash require confirm/cancel; Session Undo restores Batch Trash and delete-to-Trash when a session step is available."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "command_palette_empty_query_safe"
description = "Opening the command palette with an empty or nonsense query does not crash; Escape closes it and returns focus."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Primary actions (New Note, Export Nest, Batch Trash, Undo/Redo) use button/semantic interactive elements rather than non-interactive divs with click handlers only."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Confirm dialogs, Export Nest, Import Nest, and the command palette close via Escape and an explicit dismiss control."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "batch_zero_selection_noop"
description = "Batch Move/Color/Trash with zero selected notes do nothing and show no confirmation; the tray stays hidden until at least one note is selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "import_rejects_bad_field_contract"
description = "Importing Nest JSON with wrong schemaVersion, illegal color, empty title, parentId cycle, or non-data: image URL leaves the workspace unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "undo_redo_empty_stack_safe"
description = "Session Undo and Redo are disabled at empty-stack boundaries and never throw or corrupt the tree when activated there; a new mutation after Undo clears Redo."
type = "binary"
weight = 1.0

