[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "Nested folders are visibly indented under their parent, a folder with children shows an expand/collapse control, and the currently selected folder is highlighted distinctly from unselected folders."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "A note's assigned color renders as the same colored left-edge bar in its folder view, All Notes, the Pinned section, and search results."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "Checked checklist items show a strikethrough and muted color while unchecked items remain full-strength and visually distinct at a glance."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "When at least one note is pinned, a clearly labeled Pinned section appears above the regular list, separated from it by a divider or heading."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "An empty folder, an empty Trash, and a no-match search each show their own distinct deliberately styled message rather than a blank area."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "2_6"
description = "At approximately 375px wide the app has no horizontal scrolling, the folder tree collapses behind a togglable Folders control instead of squeezing the note view, and note title, body, folder labels, and count badges stay legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "2_7"
description = "The three regions read as a deliberate layout with a clear text hierarchy (distinct title, body, and caption/label roles) rather than one flat text size, with related controls grouped and aligned to a consistent spacing rhythm."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "At approximately 375px wide the app forces horizontal page scrolling or the folder tree stays wedged beside the note view compressing it into an unusable width."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "2_9"
description = "The color-label bar for the same note differs between lists or is missing in one of the folder, All Notes, Pinned, or search views, so the label is not applied consistently."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "count_badge_legible_distinct"
description = "Each folder's count badge reads as a legible, visually distinct numeral with its own treatment (background, weight, or color) rather than blending into the folder label text."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.11"
name = "consistent_icon_set"
description = "Icons across the sidebar, editor toolbar, and other controls come from one consistent icon set at a consistent size and stroke treatment, with no visually mismatched icon styles."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.12"
name = "control_labels_specific_verbs"
description = "Control labels are specific verbs or noun-verb pairs (such as New Note, New Folder, Insert Checklist, Empty Trash) using one consistent capitalization convention, and empty-state and error copy explains what belongs in the region or names the problem and the fix."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "placeholder_text_visible"
description = "Placeholder or scaffold text (such as 'Lorem ipsum', 'TODO', 'asdf', or template variable names like {{title}}) is visible somewhere in the shipped UI."
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "2.14"
name = "export_nest_drawer_anatomy"
description = "Export Nest appears as a drawer or modal with Nest JSON / Markdown vault tabs, a scrollable monospaced preview, and Copy and Download affordances."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "selection_tray_and_command_palette_chrome"
description = "When notes are multi-selected, a compact selection tray offers Batch Move, Batch Color, and Batch Trash; the command palette is a centered overlay with a search field and result list."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "export_drawer_missing_or_unreadable"
description = "Export Nest preview text is missing, not monospaced/readable, or lacks distinct Nest JSON vs Markdown vault tabs."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
