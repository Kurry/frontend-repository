[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Sidebar, note list, and editor spacing/sizing follow a consistent scale matching the reference three-region shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography hierarchy for folder labels, note titles, and editor body matches the reference density and weight contrast."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "Desktop layout matches the reference: left folder tree with All Notes/Trash, middle note list, right editor — not a single-column marketing page."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified create/delete/restore row animations and folder chevron expand match the reference motion character."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Narrow-width Folders collapse behavior matches the reference pattern of hiding the tree behind a toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "New Note, New Folder, color swatches, and toolbar controls match the reference control styling density."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Folder names, note titles, and body text remain visually hierarchical as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Selected folder highlight, pinned section treatment, and active toolbar pressed states match the reference component states."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Sidebar, list, and editor surface treatments (borders/backgrounds) match the reference three-pane studio look."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "export_chrome_fits_shell"
description = "Export Nest drawer and command palette chrome fit the NoteNest shell without looking like an unrelated marketing modal."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Sizing or spacing contradicts the reference scale (oversized cards, sparse single-column demo)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Shell colors fall outside the reference palette in a way that breaks the NoteNest look."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Control or badge sizing mismatches the reference so count badges or swatches are unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required row enter/exit or chevron animations are missing or snap contrary to the reference."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Specified dialogs/dropdowns/swatches use unstyled browser defaults instead of the Bits-styled chrome shown in the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "Layout is misaligned versus the reference at desktop or 375px breakpoints."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Reference-critical elements (tree, list, editor, export) are clipped or offscreen."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Structure deviates from the reference three-region shell (e.g. missing permanent All Notes/Trash)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text are undifferentiated versus the reference hierarchy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover and pressed microinteractions deviate so severely from the reference that controls feel inert."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable design-fidelity defect versus the reference that is NOT covered by any other criterion in this file. If present, name the defect and cite the concrete evidence. If already covered, answer no here."
type = "binary"
negate = true
weight = 1.0
