[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app shows a sidebar with a folder tree, a permanent All Notes entry, a permanent Trash entry, and New Folder and New Note controls, with no login wall."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After clicking New Folder and renaming it inline to Work, then nesting a second folder Clients inside Work, the tree shows Clients indented beneath Work and a folder-path control lists it as Work / Clients."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After selecting a folder and clicking New Note, giving it a title and body, the note appears filed under that folder and also under All Notes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "When creating a note with a blank title, creation is blocked and a visible inline error states a title is required, and the note count does not increase."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After using Insert Checklist and typing three lines, each line renders as its own toggleable checkbox, and toggling one item immediately shows that line with a strikethrough and muted color without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After using Add Image twice on one note, both images render inline, and using the first image's own Remove Image control removes only that image while the second image and the note content remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After pinning a note, a clearly labeled Pinned section appears above the regular list; after unpinning, the note leaves the Pinned section but stays in its normal list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After opening the color-label swatch picker, it presents six color choices; assigning one shows a matching colored left-edge bar on the note's list row and on its open detail view."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After deleting a note it moves to Trash instead of being erased; Restore returns it to its original folder, and Delete Forever plus Empty Trash (after confirm) leaves Trash empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After filing two notes directly in a folder and one note in its subfolder, the parent folder's count badge shows 2, not 3."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After bolding one word and italicizing another in the note body then doing a full page refresh, both the bold and italic formatting are still visibly applied, and the Bold or Italic toolbar control shows an active/pressed state only when the cursor sits inside the matching formatted word."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After creating a folder and a note with a checklist, image, pin, and color label and performing a full page refresh, the folder, note, checklist state, image, pin, and color label are all restored exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After clicking Load 10,000 Items, the view labels the total as Virtualized items 10000 while the Rendered item count stays far below 10,000 as the list is scrolled."
type = "binary"
weight = 1.0



[[criterion]]
id = "1.19"
name = "1_19"
description = "A note's Move to Folder control relocates it via a dropdown of full folder paths so it appears under the chosen folder and no longer under the previous one."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Global search filters notes by both title and body text across all folders, each result shows its folder-path breadcrumb, and clearing the box restores the full list."
type = "binary"
weight = 1.0



[[criterion]]
id = "1.25"
name = "1_25"
description = "Selecting a word and clicking Bold renders it bold immediately, selecting another word and clicking Italic renders it italic, and selecting several lines and clicking Bulleted List renders them as bulleted indented items."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "Load 10,000 Items produces a navigable virtualized collection, and applying a filter, selecting an item, and using keyboard navigation each produce a visible outcome matching the selected logical item."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.30"
name = "create_note_count_delta_chain"
description = "Starting with a folder selected and its note-list and count badge visible: creating a titled note via New Note increases that folder's note list by exactly one row and its count badge by exactly one (measured immediately before and after the action), and switching to All Notes shows the same note without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "move_note_badge_chain"
description = "Moving a note from folder A to folder B through its Move to Folder dropdown decreases A's count badge by exactly one, increases B's badge by exactly one, shows the note under B when B is selected, and keeps the note visible in All Notes throughout, all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "pin_state_cross_view_chain"
description = "Pinning a note while in All Notes places it in the Pinned section there; selecting the note's home folder shows the same note pinned in that view too, and unpinning it from the folder view removes it from the Pinned section in All Notes as well, all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "delete_restore_badge_chain"
description = "Deleting a note removes it from its folder's list, decreases that folder's count badge by exactly one, and adds exactly one entry to Trash; restoring it from Trash returns it to its previous folder and the badge returns to its prior count."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "color_label_syncs_across_views"
description = "Assigning a color label to a note updates the colored left-edge bar on its row in its folder list, in All Notes, in the Pinned section if pinned, and in matching search results, without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "double_activation_single_note"
description = "Double-activating the note creation control in rapid succession yields exactly one new note and a visible count increase of exactly one, with no duplicate records in any list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "folder_delete_confirm_nondestructive"
description = "Deleting a folder requires a confirm step in a dialog, and after confirming, the folder's notes follow one consistent non-destructive behavior (moved to the root level or moved to Trash) so they remain findable rather than being silently erased."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "bold_toggle_undo_redo_roundtrip"
description = "Applying Bold to a selection renders it bold immediately, activating Bold again on the same selection returns the text to its unformatted state, and Undo (toolbar control or Ctrl+Z / Cmd+Z) reverses the most recent edit while Redo reapplies it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "export_nest_two_format_tabs"
description = "Export Nest opens an artifact drawer with Nest JSON and Markdown vault tabs, each showing a monospaced preview regenerated from the current store, plus Copy and Download controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "export_reflects_session_mutations"
description = "After creating a note with a distinctive title, pinning it, assigning color blue, and filing it in a folder, the Nest JSON preview contains that title with pinned true and color blue under schemaVersion \"notenest-v1\", and the Markdown vault preview shows the title under that folder path — before any download or copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "nest_json_field_contract_visible"
description = "The Nest JSON preview is a single object showing required keys schemaVersion (exactly \"notenest-v1\"), folders, notes, and trash; a note object in the preview shows id, title, body, folderId, pinned, color, checklist, images, and updatedAt field names."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "import_nest_applies_workspace"
description = "Import Nest of a valid Nest JSON document replaces the in-memory workspace so the folder tree, All Notes list, pins, colors, and both export previews match the imported payload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "command_palette_navigates_note"
description = "Pressing Ctrl+K or Cmd+K (or activating Command Palette) opens the palette; typing part of an existing note title lists that note; choosing it selects the note in the editor without a reload; Escape closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "batch_trash_exact_count_delta"
description = "Selecting two notes and confirming Batch Trash decreases the active note count by exactly two, adds exactly two Trash entries, and decreases affected folder badges accordingly; the selection tray hides after completion."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "session_undo_restores_batch_trash"
description = "After Batch Trash of two notes, Session Undo restores both notes to their prior folders and badge counts and removes them from Trash; Nest JSON notes/trash membership matches the restored state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "batch_color_updates_edge_bars"
description = "Selecting multiple notes and applying Batch Color to one closed-list color updates the left-edge bar on every selected note in All Notes and in each note's folder list without a reload."
type = "binary"
weight = 1.0

