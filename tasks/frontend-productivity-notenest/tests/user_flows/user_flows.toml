[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Create flow: submitting a valid New Note inside a selected folder increases that folder's list and badge by one, shows the note in All Notes, and includes its title in Nest JSON and Markdown vault export previews — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Invalid create: a blank, whitespace-only, or over-200-character title shows an inline error naming the title field and adds no note to any list, badge, or export preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Edit flow: renaming a note, changing its color, or toggling pin updates the same record in All Notes, its folder list, Pinned section when applicable, search results, and Nest JSON without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Delete flow: deleting a note removes it from its folder list, decreases that folder's badge by one, adds exactly one Trash entry, and moves it from Nest JSON notes into trash."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "View switch: moving between All Notes, a folder, Trash, and Export Nest retains pin/color/selection state without a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "After moving the last active note to Trash (or emptying a folder), that region shows its styled empty-state message rather than a blank pane."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_filters_update_lists"
description = "Search filters notes by title or body across folders; each result shows a folder-path breadcrumb; clearing the box restores the full list everywhere it was narrowed."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "At narrow width the Folders button hides and reopens the folder panel with workflow continuity; note selection and editor content remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Folder-delete, Empty Trash, Batch Trash, Export Nest, Import Nest, and command-palette overlays support confirm/cancel or Escape close and return focus without trapping the user."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "export_import_flow_without_reload"
description = "Artifact flow: after mutating the workspace, Export Nest Nest JSON preview reflects mutations; Import Nest of that JSON reconstructs the same visible tree, notes, pins, and colors without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "batch_trash_undo_flow"
description = "Batch Trash of two selected notes then Session Undo restores both notes, prior badges, and Nest JSON membership without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "command_palette_selects_note"
description = "Command palette flow: Ctrl+K / Cmd+K opens the palette, choosing a matched note title selects that note in the editor, and Escape closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "New Note, New Folder, delete-to-Trash, Export Nest, or Import Nest are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "New notes fail to show up in lists/export or duplicate on a single create."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "Pin, color, move, or title changes are not synced across All Notes, folder list, and Nest JSON export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching All Notes / folder / Trash / Export Nest breaks layout or loses the selected note unexpectedly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying a folder or Trash produces broken or missing UI instead of the styled empty state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "search_and_lists_disagree"
description = "Search results disagree with All Notes about which notes match a query."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "Collapsed folder panel at narrow width cannot be re-opened via the Folders button."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Export Nest, Import Nest, command palette, or confirm dialogs block navigation with no Escape or cancel exit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed create/import/batch flow provides no visible user feedback naming the problem."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Navigation dead ends or requires reload for recovery after Export Nest, Import Nest, or command palette."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
