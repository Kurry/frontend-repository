[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load (folder tree, note list, and editor respond)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "No console errors appear during a full exercise including Export Nest, Import Nest, batch actions, command palette, session undo/redo, and Load 10,000 Items."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "export_recompile_stays_responsive"
description = "Nest JSON preview recompilation after create/edit/delete completes without freezing the shell or dropping interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "Load 10,000 Items and Import Nest show visible progress or completion feedback rather than a blank hang when work takes noticeable time."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.5"
name = "large_collections_render_without_lag"
description = "Scrolling the 10,000-item virtualized view stays smooth with Rendered item count far below 10,000 and no sustained blank regions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Rapid pin/color/batch/export updates keep the UI responsive with no hangs or dropped clicks."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Note row enter/exit and toast animations do not cause sustained jank that blocks interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "25 rapid note-create or edit repetitions leave an exact final count with no blank screen or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "virtualized_count_stays_bounded"
description = "During Load 10,000 Items scrolling, Rendered item count stays far below 10,000 throughout."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "Local cold load exceeds 2 seconds before the shell is interactive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors appear during Export Nest, Import Nest, batch, palette, or virtualized list flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Export drawer or list transitions block input or lag enough to drop interactions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "Import Nest or Load 10,000 Items hangs the UI with no feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "The 10,000-item view kills frame rate with sustained blank regions or Rendered count near 10,000."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Note row or toast animations block input until they finish."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "export_recompile_freezes_shell"
description = "Nest JSON recompilation after edits freezes the shell for a sustained period."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Browser resources run away during extended note/export sessions (tab unresponsive)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Long-running Load 10,000 Items or Import shows only a blank pane with no status."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid or edge use (batch + undo + export) crashes or blanks the app."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
