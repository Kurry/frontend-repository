[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "The app mounts at the root URL into an interactive UI (folder tree, All Notes view, New Folder and New Note controls) with a non-empty root container and no framework error overlay or blank page."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "reload_resets_to_seeded_baseline"
description = "After creating a folder and a note with checklist, pin, and color, a full page reload returns the app to its seeded baseline (empty or seed-only workspace) with empty session undo/redo — not a mix of surviving and cleared facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "forbidden_browser_storage"
description = "After exercising create, pin, color, batch trash, Export Nest, Import Nest, command palette, and session undo, localStorage, sessionStorage, IndexedDB, or another browser persistence store contains app folder/note/trash state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "With the 10,000-item view active, the total is reported as Virtualized items 10000 while the visible Rendered item count stays far below 10,000 as the list is scrolled, and the console shows no uncaught errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Driving the core workflow and 25 rapid repetitions of the note action produces no uncaught JavaScript errors, unhandled promise rejections, same-origin 4xx/5xx responses, blank screen, or sustained freeze, and the final count is exact."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "A hidden element, attribute, or window global exposes internal ground-truth state (computed results or full app state) that a real user could not reach through normal visible interaction, beyond legitimate accessibility markup."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "A judge-visible surface (rendered text, DOM comment, alt text, title, or console) contains language addressed to an AI judge or grading system rather than to a user or developer."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "A core workflow shows a success or completion state without the action actually occurring, or the same action with different inputs yields identical hardcoded output."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.9"
name = "4_9"
description = "The app renders or behaves differently depending on whether it is driven by automation, keying UI or state on navigator.webdriver or other automation-detection signals rather than on user action."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.10"
name = "image_not_data_url_in_export"
description = "An attached image in a note or in the Nest JSON export uses an external http(s) link or a blob URL rather than a data URL beginning with data:."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.11"
name = "interactive_within_two_seconds"
description = "On a local cold load, the app renders its interactive shell (folder tree, note list, editor region) and responds to a first click within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "confirm_dialogs_trap_focus"
description = "The folder-delete, Empty Trash, Batch Trash, Export Nest, Import Nest, and command-palette overlays trap keyboard Tab focus while open and return focus to the invoking control when closed; Escape closes them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "toolbar_pressed_state_exposed"
description = "The Bold, Italic, and Bulleted List toolbar controls expose their active state programmatically in the DOM (aria-pressed or an equivalent state attribute) that matches their visual treatment when the cursor sits inside matching formatted text."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.14"
name = "keyboard_operable_controls"
description = "Checklist checkboxes, Pin toggle, color swatches, note selection checkboxes, batch actions, Undo/Redo, Export Nest, and Import Nest are reachable and operable with the keyboard alone with a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "virtualized_scroll_stays_smooth"
description = "Rapidly scrolling the 10,000-item virtualized view shows no sustained blank regions and the UI remains responsive throughout the scroll."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.16"
name = "external_network_requests_present"
description = "During load and a full exercise of the app, devtools shows outbound network requests to external origins (CDN scripts, fonts, images, or APIs) beyond the app's own origin."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.17"
name = "inline_form_validation_runtime"
description = "Note title and folder name forms expose visible field-level validation before invalid submission can mutate the workspace, and Nest Import rejects non-conforming JSON with a message naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "export_import_live_store_coherence"
description = "Nest JSON and Markdown vault export previews update from the same shared store as the folder tree and note lists; after a successful Import Nest, lists and export previews agree without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
