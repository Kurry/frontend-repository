[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Toggling a checklist item's checkbox through the real UI transitions the line into and back out of the strikethrough/muted done state immediately, without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Creating a note, deleting a note to Trash, and restoring a note each surface a transient confirmation toast that appears and then dismisses on its own."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Hovering a folder row, a note row, and a color-label swatch each shows a visible hover treatment distinct from its resting state."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Tabbing through the folder tree, a note row, and a note's action controls shows a visible focus indicator at each stop, and one full core flow is completable using only the keyboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Clicking a Bold, Italic, or Bulleted List toolbar control and moving the cursor into matching formatted text switches that control into its active/pressed treatment, and none is active when the cursor sits in plain text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "Folder rows, note rows, buttons, and swatches show no hover or focus response, so interactive chrome is visually inert to pointer and keyboard."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "note_row_animates_create_delete_restore"
description = "Driven through the real UI controls (never a state shortcut), creating a note animates its row into the list, deleting a note to Trash animates the row out, and restoring it from Trash animates it back into place rather than snapping instantly."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "folder_chevron_expand_transition"
description = "Clicking a folder's expand/collapse control rotates its chevron and reveals or hides its child rows with a visible transition rather than an instant toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "mobile_folder_panel_slides"
description = "At approximately 375px wide, activating the Folders button slides the folder panel in and out over or beside the content rather than instantly reflowing the whole page."
type = "binary"
weight = 0.5


[[criterion]]
id = "3.10"
name = "export_and_palette_enter_exit"
description = "Export Nest Copy shows a short confirmation before resetting; the export drawer and command palette enter and exit with a brief opacity/scale transition (or instant under prefers-reduced-motion)."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "export_drawer_snaps_without_transition"
description = "Export Nest drawer and command palette hard-cut open/closed with no enter/exit transition when reduced motion is not preferred, and Copy never shows confirmation feedback."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
