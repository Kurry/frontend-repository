[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Toggling a checklist item's checkbox through the real UI transitions the line into and back out of the strikethrough/muted done state immediately, without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Creating a note, deleting a note to Trash, and restoring a note each surface a transient confirmation toast that appears and then dismisses on its own."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Hovering a folder row, a note row, and a color-label swatch each shows a visible hover treatment distinct from its resting state."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Tabbing through the folder tree, a note row, and a note's action controls shows a visible focus indicator at each stop, and one full core flow is completable using only the keyboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Clicking a Bold, Italic, or Bulleted List toolbar control and moving the cursor into matching formatted text switches that control into its active/pressed treatment, and none is active when the cursor sits in plain text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "Folder rows, note rows, buttons, and swatches show no hover or focus response, so interactive chrome is visually inert to pointer and keyboard."
type = "binary"
weight = 1.0
negate = true
