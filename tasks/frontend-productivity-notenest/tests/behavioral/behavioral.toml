[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: create a folder and note, pin it, set a color, open Trash then return to All Notes, open Export Nest on Markdown vault; then reload. Confirm every facet coherently resets to the seeded baseline — no surviving session notes/folders beyond seed, empty undo/redo, no multi-select, All Notes selected — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "folder_selection_reversal_proves_live_list"
description = "Selection-reversal proof: select folder A and note its note list, select folder B with a different set of notes, then re-select A. Confirm A's list returns identically — proving the middle pane is derived from the live folder selection, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "search_derived_list_sensitivity"
description = "Derived-view sensitivity: create two notes with distinct unique keywords in title/body; search for each keyword separately and confirm the result list changes to match only the corresponding note, rather than redrawing identically regardless of query."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "pin_and_color_echo_across_views_and_export"
description = "Cross-view echo: pin a note and set color green in All Notes; without reload confirm the Pinned section, the home folder list, matching search results, and Nest JSON pinned/color fields all reflect the same state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_note_count_delta_exact"
description = "Count-delta integrity: measure a folder's count badge, create one titled note via New Note, and re-measure immediately — the badge increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_titles_different_exports"
description = "Input-dependent output: create two notes with different distinctive titles; confirm both appear in All Notes with those titles and the Nest JSON / Markdown vault previews differ appropriately rather than identical hardcoded output."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_search_and_export"
description = "Interleaved-flow integrity: start creating a note (open New Note, enter a title), open the command palette and close it, switch search query then clear it, open Export Nest, return and finish creating a second valid note; confirm exactly one completed new note appears, search cleared, and export previews include it without corrupting the other flow's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_trash_then_repopulate"
description = "Edge-state round-trip: move every active note to Trash then Empty Trash (empty Trash message visible; export still compiles), then create two valid notes; confirm empty states clear, both notes appear in All Notes and Nest JSON, and folder badges track."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_pipeline"
description = "Mutate → derived → export → import: create a folder and a note with a unique title, pin it, set color blue; confirm Nest JSON shows schemaVersion notenest-v1 and those fields; Copy or Download Nest JSON; mutate away; Import Nest that document; confirm tree, note, pin, color, and export previews match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "batch_trash_undo_export_pipeline"
description = "Full pipeline: select two notes, confirm Batch Trash (count −2, both in Trash and absent from Nest JSON notes array), then Session Undo — both notes return, badges restore, and Nest JSON notes again contain both titles."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring folders, notes, pins, and export tab then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Changing search query, folder selection, or pin/color leaves the note list or Nest JSON preview visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Creating two notes with different titles yields identical visible titles and identical Nest JSON preview text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_stale_until_reload"
description = "After pinning, coloring, or moving a note, All Notes, the folder list, search results, or Nest JSON still show stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_ignores_session_mutations"
description = "Export Nest previews remain seed-only or otherwise omit visible session creates/edits/deletes/pins/colors/batch actions — export not compiled live from the store."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_does_not_restore_workspace"
description = "After Batch Trash or a single delete-to-Trash, Session Undo does not restore the prior notes, badges, and Nest JSON membership."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
