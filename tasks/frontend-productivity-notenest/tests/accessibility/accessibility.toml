[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Folder rows, note rows, toolbar controls, swatches, selection checkboxes, batch actions, Undo/Redo, Export Nest, Import Nest, and command palette results are reachable and operable with the keyboard alone with a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Folder-delete, Empty Trash, Batch Trash, Export Nest, Import Nest, and command-palette overlays trap focus while open, close on Escape, and return focus to the invoking control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "images_and_icons_have_alt_text"
description = "Attached note images and icon-only controls expose accessible names or alt text identifying their purpose."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Export Copy confirmation and Nest Import validation errors are announced via a polite live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Note title, folder name, and Nest Import fields have explicit labels or accessible names associated with their inputs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Sidebar, note list, editor, and Export Nest regions use a logical heading order without skipping levels in a way that breaks outline navigation."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "The three-region shell exposes landmarks or regions so assistive technology can move between folder tree, note list, and editor."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Note titles, folder labels, badges, and primary controls maintain readable contrast against their backgrounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Toolbar Bold/Italic/Bulleted List expose pressed state to assistive technology; dialogs use dialog semantics."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, list enter/exit and drawer transitions reduce to instant changes while Export Nest, Import Nest, and batch flows remain completable."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Selection checkboxes, Export Nest, Import Nest, or Session Undo/Redo are unreachable by keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Interactive controls lack a visible focus indicator or it is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Pin, color swatches, or batch tray controls lack accessible names or roles."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Pinned or color-label state is conveyed by color alone with no text/icon alternative."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "Export Nest, Import Nest, command palette, or confirm dialogs fail to trap focus or return it on close."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Primary note/folder/export text has poor contrast that makes it unreadable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Title or Nest Import validation errors are visual-only with no programmatic association or live-region announcement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Attached note images are missing alt text or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Heading order skips levels in a way that breaks the document outline for the shell regions."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "List and drawer animations ignore prefers-reduced-motion and cannot be skipped."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
