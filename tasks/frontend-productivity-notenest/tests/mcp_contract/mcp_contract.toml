[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All four contract-mandated modules are initialized and bound: entity-collection-v1, browse-query-v1, structured-editor-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with entity_*, browse_*, editor_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: entity create/select/update/delete/toggle, browse open/search, editor set_content/add, and artifact export/import/copy change the same folders, notes, Trash, and Nest export state the shell uses."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations from the bindings are available: browse destinations all-notes, trash, and export-nest; entity note with create, select, update, delete, and toggle; entity fields title, body, folder, pinned, color, checklist-item; color value bounds none/red/orange/yellow/green/blue/purple; editor checklist-block with set_content and add; artifact export, import, and copy with formats json and markdown and import mode nest-json — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound entity, browse, editor, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations declared for note work: create, select, update, delete (with confirm=true), and toggle update the visible note list, pin, color, and Nest JSON export preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_checklist_operations_bound"
description = "Structured-editor operations set_content and add for checklist-block are bound and produce visible checklist changes consistent with the Insert Checklist control path."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_match_spec"
description = "Browse destinations all-notes, trash, and export-nest match the allowed specification and update visible navigation/export state via the same handlers as UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound: export formats json and markdown and import mode nest-json are available without putting raw file paths, blobs, or base64 artifact contents in WebMCP arguments or results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

