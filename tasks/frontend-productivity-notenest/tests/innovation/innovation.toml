[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Optional polish beyond the spec: note/folder microinteractions feel deliberate (e.g. refined pin or color feedback) without harming core flows."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional: motion beyond the required list/toast/drawer transitions adds clarity (e.g. batch tray enter) while respecting reduced motion."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "Optional: a dismissible coachmark tour highlights the folder tree, Export Nest, and command palette on first visit."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Optional: richer visual treatment of the nested tree or export preview that aids scanning without clutter."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "Optional: additional keyboard shortcuts beyond Ctrl+K / undo that speed navigation without breaking required shortcuts."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional: session-scoped chrome density or theme preference that does not use forbidden browser storage."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "Optional: NoteNest brand voice in empty states and export hints feels product-quality rather than generic scaffold copy."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional: an extra session theme accent that stays coherent across sidebar, list, and Export Nest."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "search_syntax_chips"
description = "Optional: search syntax chips such as color:blue or pinned:true filter the note list when typed into the search box."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "printable_markdown_vault"
description = "Optional: a printable Markdown vault preview mode with print-optimized page breaks."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The experience stops at a bare MVP with no optional polish: no coachmarks, search syntax chips, printable vault mode, or other beyond-spec enhancements that would aid a real NoteNest operator."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The build includes a significant, browser-observable enhancement beyond the specification that improves NoteNest usefulness or clarity and is not covered by any other criterion in this file. Name the enhancement and cite concrete evidence."
type = "binary"
weight = 0.5
