[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "At approximately 375px wide the three-region shell adapts: the folder tree collapses behind a Folders button rather than squeezing the note view; at desktop widths the sidebar, list, and editor remain side by side."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At 375px, New Note, Folders, Export Nest, Undo/Redo, and batch tray controls remain large enough to activate without mis-taps."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "At 375px note titles, folder labels, and count badges stay legible and truncate with trailing ellipsis rather than overflowing."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px no content clips or overflows the viewport and no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "Export Nest drawer, command palette, multi-select tray, and Undo/Redo remain reachable at 375px without covering the primary note list permanently."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "Narrow viewport stacking keeps editor and note list usable after the folder panel collapses."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "Folders toggle, note selection, and swatch/picker controls work with tap/click at narrow width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px the page does not require horizontal scrolling to reach Export Nest, Import Nest, or the editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "export_drawer_fits_narrow"
description = "Export Nest tabs, preview, Copy, and Download fit within a 375px-wide viewport without horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Fixed or sticky chrome (Folders button, selection tray) remain accessible and do not permanently obscure the note editor at 375px."
type = "binary"
weight = 1.0

