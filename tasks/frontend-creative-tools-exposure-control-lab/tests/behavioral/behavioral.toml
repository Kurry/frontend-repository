[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from defaults: step aperture and ISO off default, create a valid preset in Presets/Compare, mark one preset favorite, and leave Presets/Compare active; then reload. Confirm every facet coherently resets to the seeded baseline — dials f/16, 1/60, ISO 100, only the seeded presets and seeded snapshots (favorites/filters cleared), and empty undo/redo stacks — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "favorites_filter_reversal_proves_live_list"
description = "Filter-reversal proof (genre stand-in for sort reversal): mark at least two presets favorite, switch to favorites-only and record the exact visible names, then clear the filter to show the full collection, then re-enable favorites-only. Confirm the favorites-only set returns identically — proving the list is derived from live collection + filter state, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "filter_derived_list_sensitivity"
description = "Derived-view sensitivity: with mixed favorites and lookTags present, switch the presets filter from all → favorites-only → a specific lookTag → all. Confirm the visible list membership changes meaningfully for each input rather than redrawing an identical set regardless of filter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "apply_preset_echoes_in_meter_lab"
description = "Cross-view echo: in Presets/Compare apply a seeded preset whose stops differ from the current dials; switch to Meter/Lab without reload. Confirm all three dial readouts, the preview stack (brightness, blur, motion frame, grain), and the meter position match that preset."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "preset_create_count_delta_exact"
description = "Count-delta integrity: in Presets/Compare measure the visible preset row count, create one valid preset, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_stops_different_preview"
description = "Input-dependent output: from defaults, step aperture two stops toward open and note brightness/blur/meter; return those dials to defaults via the steppers; then step ISO upward two stops and note brightness/grain/meter. Confirm the two outcomes differ in the ways the inputs dictate (not byte-identical preview/meter states)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_dial_flows"
description = "Interleaved-flow integrity: start creating a preset (open form, enter a name), switch to Meter/Lab and step a dial, return to Presets/Compare and finish creating a second valid preset; confirm the dial change persisted and exactly one new completed preset appears without corrupting the other flow's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_presets"
description = "Edge-state round-trip: delete every preset (empty state visible), then create two valid presets with distinct lookTags from the closed enum; confirm the empty state clears, both new rows appear, and favorites/lookTag filters operate on the repopulated collection."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_tracks_mutations_then_import_roundtrip"
description = "Starting from seed: step ISO up one stop, create a valid preset named Export Probe Look with lookTag cinematic, save a snapshot named Export Probe Snap; confirm the Export panel JSON contains schemaVersion exposure-control-lab.package.v1 and field names aperture/shutter/iso/ev/presets/snapshots plus Export Probe Look, lookTag cinematic, Export Probe Snap, and the new ISO; copy the JSON, reload to seed, import it; confirm dials, both new rows (including lookTag), EV, histogram, and Export panel match the pre-export session."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_after_batch_delete_restores_export"
description = "Select three seeded presets, Delete selected (count drops by three and Export panel loses those names), then Undo: the three presets reappear, the count restores, and the Export panel again contains those three names."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "histogram_and_ev_differ_for_different_inputs"
description = "From defaults, open aperture two stops and note EV and histogram; return to defaults; raise ISO two stops and note EV and histogram. Confirm the two outcomes differ in EV number and histogram shape the way the inputs dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "invalid_preset_payload_rejected_end_to_end"
description = "Attempt to create a preset with a duplicate name, then with lookTag outside the closed enum: both attempts leave the preset count unchanged, show inline errors naming name or lookTag, and leave the Export panel presets array without a new entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "chained_edit_to_export_png_differs"
description = "Chained pixel-proof probe: from the seeded state Download edited PNG; drag Exposure to +60 (preview brightens, readout shows 60, histogram mass shifts right), raise Grain to 80 (visible grain appears), then Download edited PNG again — the two exposure-lab-edit.png files are visibly different images and the second matches the current preview's tonal look"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "look_then_export_png_reflects_mono"
description = "Apply the Mono look (preview loses visible color, at least three sliders move, Mono shows selected), then Download edited PNG — the exported image is desaturated to match the preview; manually moving one slider clears the Mono active indication while the other sliders keep Mono's values"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "copy_paste_selective_group_probe"
description = "Set distinctive Light and Effects values, Copy settings with only Light checked, change sliders in both groups, Paste settings: every Light slider returns to the copied values, every Effects slider keeps its changed value, and a single Undo reverses the paste"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.16"
name = "reset_to_original_then_undo_probe"
description = "With dials and at least two sliders off default and a look active, Reset to original returns dials to f/16, 1/60, ISO 100, all sliders to defaults, and clears the look in one press while presets and snapshots survive; Undo restores the exact pre-reset edit state"
type = "binary"
weight = 1.0

