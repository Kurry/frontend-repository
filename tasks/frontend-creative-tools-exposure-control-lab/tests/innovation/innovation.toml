[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "compare_mode_polish_beyond_minimum"
description = "Beyond the minimum apply-a-look path, Presets/Compare offers a polished side-by-side compare of two presets that makes stop differences easy to scan (bonus / optional excellence)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "preview_stack_readability_aids"
description = "Beyond the required EV readout and histogram, the preview includes an extra usability aid such as zebra/clipping hints or a stop-delta caption versus a chosen baseline (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_dials"
description = "A brief guided first-run or coachmark flow introduces the three dials and meter without blocking the simulator (bonus beyond the required help panel)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "exposure_visualization_extra_usability"
description = "An interactive graphic beyond the required meter, EV, and histogram (for example a stop-delta strip or clipping overlay) adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_chord_or_alternate_dial_input"
description = "Beyond basic Tab/Enter operability, the lab supports an alternate dial input such as arrow-key stepping when a dial is focused (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "saved_view_preferences_in_session"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last mode or last compare pair until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "brand_chip_narrative_polish"
description = "The inert 'Camera Exposure Simulator' brand treatment and lab chrome read as a cohesive branded tool narrative rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "theme_accent_craft_beyond_minimum"
description = "Red-accent / dark-chrome craft goes beyond bare compliance — cohesive tokenized accents across help, meter, and badges without inventing a second conflicting theme (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example offline-capable asset caching via the app shell, or a high-quality local font rendering setup) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_lab_feel"
description = "The overall lab feels competition-grade: dial feel, preview coupling, and presets compare read as a polished instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain text controls with no live photo preview stack, dials, or meter immersion."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified full-viewport lab composition."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
