[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "all_four_contract_modules_bound"
description = "All four contract-mandated modules are initialized and bound: command-session-v1, structured-editor-v1, entity-collection-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with session_*, editor_*, entity_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_lab_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: session/editor operations change dials/preview, entity operations mutate presets, and artifact export/import/copy drive the same Export panel and import path the UI uses."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_bound_operations"
description = "Only documented operations from the bindings are available: session start/stop/restart/advance; editor select/update_property/preview on exposure; entity create/select/update/delete/toggle on preset; artifact export/import/copy with json / lab-package — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for bound session, editor, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_and_entity_operations_work"
description = "Editor operations on object type exposure (select, update_property for stop/brightness, preview) update the visible lab state, and entity operations on preset (create, select, update, delete, toggle) mutate the presets list the same way the UI does."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_and_artifact_ops_bound"
description = "Session operations start/stop/restart/advance and artifact operations export/import/copy (format json, mode lab-package) are bound and invoke without throwing when called through WebMCP."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "entity_fields_and_editor_properties_bound"
description = "Entity fields name/aperture/shutter/iso/lookTag/favorite and editor properties stop/brightness accept updates that produce visible changes on presets and the exposure preview/meter consistent with those fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond command-session-v1, structured-editor-v1, entity-collection-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data covering the four mandated modules."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for command-session-v1, structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound session/editor/entity/artifact tool leaves dials, presets, Export panel, or mode state diverging from what the equivalent visible UI control would produce."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings (session start/stop/restart/advance; editor select/update_property/preview on exposure; entity create/select/update/delete/toggle on preset; artifact export/import/copy) are exposed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared session, editor, entity, and artifact bindings."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n5"
name = "mcp_update_bypasses_shared_state"
description = "An editor, entity, or artifact invocation updates a parallel copy of state, leaving visible dials, presets, or Export panel showing stale values that disagree with the MCP result (MCP/UI desync)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the four mandated modules."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n8"
name = "required_modules_not_implemented"
description = "One or more of command-session-v1, structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave the lab state unchanged when invoked."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n10"
name = "mechanics_exclusion_faked_via_mcp"
description = "Hold-to-repeat edge timing or Before-hold preview crossfade timing is faked solely through WebMCP as a success path, bypassing the Playwright-observed mechanics exclusions."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract deviates from its declaration in a way not covered by any other criterion in this file. 'Significant' means a real automation/contract break, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
