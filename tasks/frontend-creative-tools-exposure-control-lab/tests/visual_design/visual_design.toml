[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "full_viewport_lab_composition"
description = "Full-viewport lab composition with overlaid dials and a dense presets list/panel remains tool-like"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_presets_state_visible"
description = "Empty presets state is visually present when the collection is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "three_dials_and_vertical_meter"
description = "Three circular dial controls (APERTURE / SPEED / ISO) with up/down steppers and a vertical exposure meter captioned UNDER EXPOSED / OVER EXPOSED overlay the full-viewport photo preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "condensed_type_dark_chrome_red_accent"
description = "Dial labels and captions render in a condensed display face (Oswald / Bebas-style), the dial chrome is dark with white values, and a red accent appears on the help trigger and meter emphasis"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "preset_rows_show_name_stops_badges"
description = "Presets/Compare presents a dense list or strip of looks where each row shows a name, a stop readout, and favorite/lookTag badges"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "single_icon_set_throughout"
description = "One icon set is used consistently across the steppers, favorites, filters, undo/redo, export, and the help trigger — no mixed icon styles"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.8"
name = "distinct_component_state_treatments"
description = "Steppers, form fields, and buttons show visually distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "help_panel_overlays_from_side"
description = "The help panel overlays the preview from the side without displacing the lab composition, and no marketing sections or competing hero cards appear"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "layered_preview_stack_renders"
description = "The preview renders as a layered stack — photo, motion frame, depth plate, and tiled noise overlay — with all imagery served from the app's own origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "presets_become_drawer_below_768"
description = "At viewport widths of 768 pixels and below, the presets collection presents as a drawer or sheet over the preview instead of a persistent side panel, and the help toggle works at both desktop and mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "mobile_375_operable_no_clipping"
description = "At 375 pixel width the three dial steppers, the meter, and the mode switch remain visible and operable with no content clipped and no horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "consistent_label_capitalization"
description = "Dial labels, meter captions, and mode names keep one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "help_copy_names_visible_effects"
description = "The help panel explains aperture, shutter, and ISO in plain sentences that each name the visible effect the control has on the preview"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "messages_name_problem_and_fix"
description = "Validation and empty-state messages name the problem and the fix, not just a generic rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "ev_and_histogram_in_lab_chrome"
description = "An EV numeric readout and a luma histogram graph sit in the lab chrome without replacing the overlaid three-dial composition"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "export_panel_monospace_json"
description = "An Export panel shows a monospaced JSON lab-package preview with visible API-shaped field names (schemaVersion, aperture, shutter, iso, ev, presets, snapshots, lookTag, favorite) and Download lab package and Copy lab package controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "batch_bar_and_snapshot_strip_visible"
description = "Presets/Compare rows include selection checkboxes, a batch bar appears when multiple rows are selected, and a Snapshots strip shows named stop readouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "develop_panel_groups_and_png_control"
description = "A Develop panel presents two labeled groups (LIGHT and EFFECTS) of slider rows each carrying the slider name, the control, and a live integer readout; the look chips row (Punch, Matte, Golden, Mono), Copy settings, Paste settings, and Reset to original sit with the Develop panel; and the Export panel includes a Download edited PNG control alongside the lab-package controls"
type = "binary"
weight = 1.0

