[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "required_hover_animations_present"
description = "Verified with real pointer hover: the help trigger brightens on hover, stepper buttons keep a pointer cursor while enabled, and preset rows and primary buttons take a visible hover wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_hover_feedback"
description = "Mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "meter_eases_and_preset_apply_eases"
description = "The exposure meter indicator travels continuously along its track (not hard jumps) as exposure changes, and applying a preset eases the dials and preview to the saved stops"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "stepper_edge_opacity_transition"
description = "Stepping a dial to or away from a stop-list edge fades the affected up/down control with a short opacity transition as it disables or re-enables, and pressed steps update dial values immediately with no page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "preview_stack_eases_on_stop_change"
description = "Pressing a real stepper control eases the preview stack rather than snapping it: the brightness filter, depth-of-field blur, shutter motion-frame crossfade, and noise opacity each transition smoothly on stop changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "preset_list_microinteractions"
description = "Driven through the real UI controls: a created preset animates into the list, a deleted preset animates out, and toggling a favorite animates its badge rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "crud_toast_enters_and_exits_smoothly"
description = "Create, edit, and delete confirmations appear as an animated toast or equivalent notice that enters and exits smoothly rather than popping in and vanishing abruptly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "help_overlay_transform_opacity"
description = "The help panel enters and exits with combined transform and opacity animation, and the trigger's icon stack shifts while the panel is open"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_instant_but_usable"
description = "With prefers-reduced-motion set, easing and travel animations are removed and dial, meter, preview, histogram, before/after, and list state changes apply instantly while the app remains fully usable"
type = "binary"
weight = 1.0


[[criterion]]
id = "4.11"
name = "before_hold_crossfade_via_real_control"
description = "Driven through the real Before control (not a state shortcut): pressing Before crossfades the preview stack toward the default exposure, and releasing crossfades back to the current stops"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "histogram_eases_on_stop_change"
description = "Pressing a real stepper eases histogram bars into their new shape on stop changes rather than snapping instantly (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "develop_slider_and_look_easing"
description = "Dragging a develop slider via the real control eases the preview tone, vignette, or grain change rather than snapping between discrete looks, and activating a look chip eases the affected sliders and preview to the stored state (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "copy_settings_dialog_transform_opacity"
description = "The Copy settings dialog enters and exits with transform plus opacity animation rather than popping (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

