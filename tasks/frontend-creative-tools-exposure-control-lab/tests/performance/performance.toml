[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the Camera Exposure Simulator becomes interactive (dials respond) within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of dials, help, modes, presets, snapshots, undo/redo, before/after, export, and import."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "dial_press_feedback_under_100ms"
description = "Pressing a dial stepper updates that dial's readout with UI response in under 100ms (perceived immediate), even when preview easing continues."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "preview_assets_do_not_blank_ui"
description = "While local preview assets (depth plate, motion frames, noise) load, the lab chrome remains visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_presets_list_scrolls_smoothly"
description = "With the seeded preset list (≥6 rows) visible in Presets/Compare, scrolling and filtering the list shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_preview_easing"
description = "During preview-stack and meter easing after a stop change, steppers and mode switch remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_easing_holds_stable_frame_rate"
description = "Driven through real steppers, brightness/blur/frame/noise transitions maintain a smooth frame rate without visible hitching during continuous stop changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_stepper_presses_never_hang"
description = "Rapid repeated stepper presses stay responsive: every press lands, dial values never skip out of the stop lists, and the preview keeps updating without hangs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_dial_session_stable"
description = "After an extended session of many dial steps, mode switches, and preset edits, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "local_assets_load_without_blocking_shell"
description = "The lab shell (dials, meter, mode switch) appears and is usable before or as preview imagery finishes loading — interactions are not blocked waiting on a single remote fetch."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "histogram_ev_recompute_without_freeze"
description = "Histogram and EV recompute immediately on each stop change with no multi-second freeze under rapid stepper presses"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.12"
name = "slider_drag_and_png_export_responsive"
description = "Dragging a develop slider end to end keeps the preview and readout tracking the gesture without multi-second freezes, and Download edited PNG completes without freezing the UI for more than a brief moment with the lab operable afterwards"
type = "binary"
weight = 1.0

