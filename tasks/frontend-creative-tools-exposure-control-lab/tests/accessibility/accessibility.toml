[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_lab_controls"
description = "Every stepper, mode switch, preset control, snapshot control, undo/redo control, export/import control, Before control, and form field is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus ring when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "help_dialog_focus_trap_escape_return"
description = "The help overlay behaves as a dialog: it traps focus while open, closes on Escape, and returns focus to the help trigger on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "preview_imagery_has_accessible_name"
description = "The photo preview stack imagery (depth plate / motion frames) exposes a descriptive accessible name or alt text so assistive technology can identify the preview surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "preset_validation_aria_live"
description = "Preset form validation messages are announced via an aria-live region as well as shown inline next to the field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "preset_form_fields_explicitly_labeled"
description = "Every preset create/edit form field (name, aperture, shutter, ISO, lookTag) uses an explicit label element associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "meter_exposes_exposure_state_text"
description = "The exposure meter region exposes a text readout of the current exposure state (under, balanced, or over) that updates as the stops change."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "dial_and_meter_text_contrast"
description = "Dial titles, value readouts, meter captions (UNDER EXPOSED / OVER EXPOSED), and primary controls meet sufficient contrast against the dark chrome and photo preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "edge_steppers_exposed_as_disabled"
description = "Steppers disabled at a stop-list edge are exposed as disabled to assistive technology (disabled attribute or aria-disabled), not merely dimmed visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_buttons_for_steppers_and_modes"
description = "Steppers, mode switches, help trigger, and preset actions are exposed as buttons (or equivalent interactive roles) within semantic landmarks, not unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected_for_lab"
description = "With prefers-reduced-motion set, dial, meter, preview, help-panel, and preset-list animations are removed or instant while every control remains operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "lab_controls_unreachable_by_keyboard"
description = "A stepper, mode switch, help trigger, form field, or preset control cannot be reached or activated via keyboard alone."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_lab_controls"
description = "Focused steppers, mode switches, help trigger, or form fields show no visible focus ring or the ring is obscured."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "help_or_presets_lack_semantics"
description = "The help panel or preset form controls use non-semantic tags without ARIA roles or accessible names."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "favorite_or_error_color_only"
description = "Favorite status or form error state is conveyed by color alone with no text, badge label, or other non-color cue."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "help_panel_no_focus_trap"
description = "With the help overlay open, Tab moves focus to controls behind the overlay without trapping focus, or Escape fails to close it."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_dials_or_meter"
description = "Dial readouts, meter captions, or primary button labels are unreadable due to poor contrast against their background."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n7"
name = "validation_errors_visual_only"
description = "Preset validation feedback is visual only with no aria-live announcement."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n8"
name = "preview_media_missing_alt"
description = "Preview stack images or decorative chrome icons that convey meaning are missing alt text or an accessible name."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n9"
name = "heading_order_skips_in_help_or_presets"
description = "Help explainer or presets chrome headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, help-panel slides, meter easing, or preview stack transitions still animate."
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "1.11"
name = "undo_redo_before_export_keyboard"
description = "Undo, Redo, Before, snapshot controls, and export/import controls are reachable and operable with the keyboard alone, each showing a visible focus ring when focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "undo_redo_disabled_exposed"
description = "When undo or redo stacks are empty, those controls are exposed as disabled to assistive technology (disabled or aria-disabled), not merely dimmed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "import_errors_aria_live"
description = "Import errors for malformed lab-package JSON are announced via an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n11"
name = "export_or_undo_unreachable_by_keyboard"
description = "Export, import, undo, redo, or Before controls cannot be reached or activated via keyboard alone"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.14"
name = "develop_sliders_keyboard_and_at_value"
description = "Each develop slider is adjustable with arrow keys while focused and exposes its current value as text to assistive technology"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "copy_settings_dialog_focus_trap"
description = "The Copy settings dialog traps focus while open, closes on Escape, and returns focus to the Copy settings trigger on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "look_chips_selected_state_programmatic"
description = "Look chips expose their selected state programmatically (for example aria-pressed or aria-selected), not only by color"
type = "binary"
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
