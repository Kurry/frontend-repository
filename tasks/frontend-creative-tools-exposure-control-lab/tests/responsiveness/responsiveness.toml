[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable lab: preview, dials, and meter remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, stepper buttons, mode switch, help trigger, and preset actions present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "dial_typography_readable_both_widths"
description = "Dial titles and value readouts remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width the three dial steppers, the meter, the EV readout, the histogram, and the mode switch remain visible and operable with no content clipped and no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "presets_drawer_at_768_and_below"
description = "At widths of 768 pixels and below, the presets collection presents as a drawer or sheet over the preview instead of a persistent side panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "help_toggle_works_desktop_and_mobile"
description = "Desktop and mobile each have a working help toggle that opens the same in-page help panel content."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_help_and_steppers_tappable"
description = "At 375px width, tap/click activation works on the mobile help trigger and dial steppers (touch-equivalent pointer activation succeeds)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "preview_stack_scales_with_viewport"
description = "The photo preview stack (depth plate, motion frames, noise overlay) sizes responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_overlays_remain_reachable"
description = "Help trigger, brand chip, and mode switch remain reachable at both 1440px and 375px — fixed positioning does not push them off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "ev_histogram_export_reachable_at_375"
description = "At 375px width the EV readout, histogram, Export panel controls, snapshot strip, undo/redo, and batch bar remain reachable — they may scroll within their containers but do not force page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.12"
name = "develop_panel_reachable_at_375"
description = "At 375px width the Develop panel — both slider groups and the Punch/Matte/Golden/Mono look chips — plus Copy settings, Paste settings, and Reset to original remain reachable; they may scroll within their containers but do not force page-level horizontal scrolling"
type = "binary"
weight = 1.0

