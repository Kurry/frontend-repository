[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable lab: preview, dials, and meter remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, stepper buttons, mode switch, help trigger, and preset actions present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "dial_typography_readable_both_widths"
description = "Dial titles and value readouts remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width the three dial steppers, the meter, the EV readout, the histogram, and the mode switch remain visible and operable with no content clipped and no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "presets_drawer_at_768_and_below"
description = "At widths of 768 pixels and below, the presets collection presents as a drawer or sheet over the preview instead of a persistent side panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "help_toggle_works_desktop_and_mobile"
description = "Desktop and mobile each have a working help toggle that opens the same in-page help panel content."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_help_and_steppers_tappable"
description = "At 375px width, tap/click activation works on the mobile help trigger and dial steppers (touch-equivalent pointer activation succeeds)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "preview_stack_scales_with_viewport"
description = "The photo preview stack (depth plate, motion frames, noise overlay) sizes responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_overlays_remain_reachable"
description = "Help trigger, brand chip, and mode switch remain reachable at both 1440px and 375px — fixed positioning does not push them off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the lab layout breaks: overlapping controls, overflow, or unusable stacking."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px width, dial steppers, help trigger, or preset actions are too small or misaligned to operate reliably."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n3"
name = "dial_text_unreadable_on_mobile"
description = "At 375px width, dial titles or value readouts are too small to read."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 375px or 1440px, lab content is cropped or unnecessary scrollbars appear for content that should fit the viewport."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n5"
name = "presets_stay_side_panel_on_narrow"
description = "At widths of 768px and below, the presets collection still presents as a persistent side panel rather than a drawer or sheet over the preview."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_dials"
description = "Fixed-position chrome (help badge, brand chip, or overlays) obscures dials or the meter so they cannot be used."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px width, dials, meter, and presets/mode chrome overlap into an unusable stack."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n8"
name = "help_toggle_missing_on_mobile_or_desktop"
description = "Desktop or mobile lacks a working help toggle that opens the in-page help panel."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n9"
name = "preview_static_size_overflows"
description = "The preview imagery uses a static size that overflows the viewport at 375px."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n10"
name = "dials_or_meter_disappear_at_width"
description = "At 375px width, the three dial steppers, the meter, or the mode switch disappear, clip, or become inoperable."
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "7.11"
name = "ev_histogram_export_reachable_at_375"
description = "At 375px width the EV readout, histogram, Export panel controls, snapshot strip, undo/redo, and batch bar remain reachable — they may scroll within their containers but do not force page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_or_histogram_forces_horizontal_scroll"
description = "At 375px width, the Export panel, histogram, or snapshot strip forces page-level horizontal scrolling or clips off-screen with no way to reach them"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.12"
name = "develop_panel_reachable_at_375"
description = "At 375px width the Develop panel — both slider groups and the Punch/Matte/Golden/Mono look chips — plus Copy settings, Paste settings, and Reset to original remain reachable; they may scroll within their containers but do not force page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
