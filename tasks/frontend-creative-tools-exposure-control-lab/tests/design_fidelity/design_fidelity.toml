[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_lab_reference_scale"
description = "At 1440px, spacing among the left meter, overlaid dials, help trigger, and presets chrome follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the lab composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_condensed_display_spec"
description = "Dial titles (APERTURE / SPEED / ISO), meter captions, and brand chip use condensed display typography (Oswald / Bebas-style) consistent with the reference, not a default system UI stack for those elements."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: vertical exposure meter on the left, three circular dials overlaid on the edge-to-edge photo preview, help trigger in its corner position."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — dial stop changes, mode switch, help open/close, preset row add/remove — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: edge-to-edge preview retained, dials/meter still operable, and at ≤768px presets appear as a drawer/sheet rather than a persistent side panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "dial_and_form_chrome_styled_not_browser_default"
description = "Dial steppers, mode switch, preset form fields, and primary buttons use the dark-chrome / styled treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_dials_vs_presets_copy"
description = "Typography hierarchy clearly distinguishes large dial value readouts from dial titles, meter captions, and denser presets-list copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Steppers, buttons, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "dark_chrome_white_values_red_accent"
description = "Color and depth treatments match the spec: dark chrome dials with white values and a red accent on the help trigger and meter emphasis."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover wash on help trigger, preset rows, and primary buttons, plus meter travel and preview-stack easing on stop changes, are visible when driven through real UI controls rather than hard cuts."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_lab"
description = "Visible spacing between meter, dials, and help trigger contradicts the reference lab composition (large empty voids or cramped collisions)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "colors_outside_dark_chrome_red_palette"
description = "Dominant chrome colors fall outside the specified dark-chrome / white-value / red-accent palette (for example a bright pastel marketing theme replacing the lab)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n3"
name = "dial_sizing_mismatches_reference"
description = "Circular dials or the vertical meter are sized or proportioned in clear mismatch with the reference screenshots at 1440px."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n4"
name = "required_lab_animations_missing"
description = "Required animations are missing where the spec requires them (meter jumps with no travel, help panel teleports, preview stack snaps with no easing)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Dial steppers, preset form controls, or primary buttons use unstyled browser default appearance when the spec styles them."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the meter/dials/help layout is misaligned versus the reference (meter not on the left, dials not overlaid on the preview, help trigger missing from its corner)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "At 1440px, dials, meter captions, or the brand chip render clipped or off-screen compared to the reference composition."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_lab"
description = "Structure deviates from the reference: marketing card grid or multi-page shell replaces the full-viewport lab with overlaid dials."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_readouts_and_labels"
description = "Dial value readouts and titles are visually undifferentiated — no clear hierarchy between large values and labels."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on steppers, help trigger, or preset rows are missing or clearly deviate from the reference timing/feel."
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "3.11"
name = "ev_histogram_export_match_hardened_spec"
description = "Beyond the reference dials/meter composition, the hardened lab chrome includes a visible EV readout, luma histogram, and Export panel with Download/Copy lab package controls as specified in the instruction text (text wins over screenshots)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "hardened_chrome_missing_vs_spec"
description = "EV readout, histogram, or Export panel required by the instruction text are missing while the builder claims fidelity to the lab — text wins over screenshots that predate those surfaces."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
