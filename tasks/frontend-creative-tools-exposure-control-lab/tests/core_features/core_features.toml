[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, Meter/Lab mode shows the photo preview with aperture, shutter, and ISO dials plus the exposure meter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load (or after opening Presets/Compare), the presets list shows at least 6 seeded exposure looks with names and stop readouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating a preset named 'Golden Hour Soft' with valid stops, the text 'Golden Hour Soft' is visible in the presets list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding 3 new presets on top of the seed set, the presets list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "apply_preset_rerenders_all_surfaces"
description = "Starting in Presets/Compare with the dials off the preset's values: apply a seeded preset, then confirm the three dial labels change to the preset's aperture, shutter, and ISO, the preview brightness, depth-of-field blur, visible motion frame, and noise overlay all re-render to match, and the meter dot moves to the position those stops imply — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "edit_preset_propagates_everywhere"
description = "After editing a preset's name to 'Night Street Grain' and changing its stops, the list row shows the new name and updated stop readout, the previous name is no longer visible, any compare panel showing that preset reflects the edit, and re-applying the preset drives the dials to the new stops — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting a preset, that preset's name is no longer visible in the presets list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_state_offers_create_control"
description = "After deleting all presets, the presets list region shows an empty state with a message and a control that opens the create flow, and no preset rows remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After submitting create with an empty required preset name, the presets count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After filtering presets by favorites or a look tag (with mixed items present), only matching presets remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After switching between Meter/Lab and Presets/Compare modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering steppers, preset rows, or primary controls, a visible hover wash, brightness, or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "At a stop-list edge, the corresponding up or down stepper is faded and non-interactive and does not change the dial value further"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After opening the help panel, an aperture / shutter / ISO explainer is visible on-page without leaving the simulator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Exposure presets list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.18"
name = "1_18"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.19"
name = "1_19"
description = "Pressing a stepper updates its dial value instantly, and the aperture up control raises the f-number (narrows the aperture) while its down control lowers it (widens the aperture)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Pressing the steppers visibly changes the live preview: it brightens as the aperture widens, the shutter slows, or ISO rises (and darkens for the opposite moves), depth-of-field blur increases as the aperture widens, and the ISO noise overlay grows more opaque as ISO climbs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "The vertical exposure meter dot climbs toward OVER EXPOSED when overexposed and drops toward UNDER EXPOSED when underexposed, clamping within the track at the extremes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "steppers_leave_preview_static"
description = "Pressing the dial steppers leaves the preview brightness, blur, noise overlay, and exposure meter position visibly unchanged — the preview behaves as a static image rather than a live simulation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "default_stops_match_exact_lists"
description = "On a fresh load the dials read f/16, 1/60, and ISO 100, and stepping each dial end to end traverses exactly the specified discrete lists: aperture f/22, 16, 11, 8, 5.6, 4, 2.8, 1.8 (8 stops); shutter 1/2, 1/4, 1/8, 1/15, 1/30, 1/60, 1/125, 1/250, 1/500, 1/1000 (10 stops); ISO 50, 100, 200, 400, 800, 1600, 3200 (7 stops) — no values outside these lists ever appear"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "shutter_stop_swaps_motion_frame"
description = "Stepping the shutter dial swaps the visible motion frame to the one matching the current shutter stop: stepping through several shutter stops shows visibly different local frames rather than one unchanging image"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "inline_per_field_validation_gates_submit"
description = "In the preset create and edit forms, an invalid or empty required field shows an error message naming that field next to it before submit, and the submit control stays disabled until every required field is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "iso_step_updates_three_surfaces"
description = "Starting from the default stops in Meter/Lab: step ISO up one stop and confirm, without a reload, that all three surfaces change together — the ISO dial label shows the next stop in the list, the tiled noise overlay becomes visibly more opaque than immediately before the press, and the exposure meter dot moves up the vertical track from its prior position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "create_preset_flow_survives_mode_switch"
description = "In Presets/Compare: note the visible preset count, create a valid preset with a look tag, and confirm the count increases by exactly one (measured immediately around the submit), the new row shows its name and stop readout, applying its look tag filter still shows the new row, and switching to Meter/Lab and back to Presets/Compare shows the same new preset without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "favorite_then_delete_updates_all_surfaces"
description = "Mark a preset as favorite and confirm its favorite badge appears immediately and switching the filter to favorites shows it; then delete that preset and confirm it disappears from the list, from any selection or compare slot showing it, and from the favorites filter results, with the visible preset count decreasing by exactly one measured immediately around the delete"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "reload_resets_all_facets_to_seed"
description = "After stepping the dials off their defaults, creating one preset, and marking one favorite: reload the page and confirm every facet returns to the seeded baseline together — dials back at f/16, 1/60, ISO 100 and only the seeded presets in the collection — never a mix of reset and surviving facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "double_submit_creates_exactly_one_preset"
description = "Double-activating the preset submit control in quick succession creates exactly one preset: the visible count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "long_preset_name_truncates_with_ellipsis"
description = "A preset whose name is longer than 40 characters shows a truncated name with an ellipsis in its list row, while the edit form shows the full name"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "brand_chip_is_inert"
description = "A brand chip labeled 'Camera Exposure Simulator' is visible, and activating it neither navigates away nor changes the view — it is an inert label, not a link"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
