[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Required hover animations are present; load entrance, Why Ridge pile, Get started rise, and Global Events decode contracts remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Marketing/Events mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Omits hover feedback on CTAs or event rows so interactive chrome feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "On first load, the sticky chrome drops in from off-screen top and the two bento cells and hero plane run a staggered enter sequence that settles over roughly 1.5-2s rather than painting fully settled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "At desktop width (>=768px), scrolling Why Ridge pins the four pillars into a progressive sticky stack where later cards peek roughly 24-32px below and cover earlier ones"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "On scrolling into the Ridge Global Events chapter, the RIDGE GLOBAL EVENTS headline flashes through decoy glyphs per character before settling and the supporting blurb reveals line-by-line"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "4_7"
description = "Below 1024px width, the Get started trio cards rise from a downward offset into place with a per-card stagger on enter"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "The first viewport paints fully settled with no load-entrance sequence for the chrome, bento cells, or hero plane"
type = "binary"
weight = 1.0
negate = true
