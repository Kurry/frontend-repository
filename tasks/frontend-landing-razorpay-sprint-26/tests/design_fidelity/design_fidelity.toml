[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: preloader exit, scroll-driven 3D scrub, stacked overlap reveals, word-reveal headings, and card hover scale — verified via the real UI/scroll path on a fresh load."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns at the 768px breakpoint: desktop segment nav vs hamburger with Roman labels, desktop vs mobile hero scene, stack overlap on desktop removed on mobile, and mobile lockup/pill repositioning."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "nav_rail_pill_geometry_matches"
description = "Fixed nav header is 70px tall full-width; GET ACCESS rail is about 30px by 140px pinned right; hero pill is bottom-center (bottom 32px desktop) and brand lockup top-left (top 32px, left 32px, width 160px desktop) rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes high-impact display section titles from body/UI text and mono index numerals across the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "nav_and_rail_states_match_spec"
description = "Component states match the spec: click-active nav cell #0039ff / rgb(0,57,255), scroll-spy active #305eff / rgb(48,94,255), GET ACCESS rest #0039ff with hover fill #305eff over 0.3s on real pointer hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_and_band_surfaces_exact"
description = "Color treatments match: body background rgb(26,26,26) with white text; dark bands rgb(21,21,21); blue band rgb(0,57,255); white/light-grey bands as specified; electric blue reserved for active nav, GET ACCESS rail, and the single blue section band."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions follow the reference language: card scale(1.03) over 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) on hover-capable devices; nav active background-color 0.3s; GET ACCESS hover 0.3s — verified via real pointer hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_geometry_tokens"
description = "Visible major structures contradict the mandated geometry (nav not ~70px, desktop gutters far from 66px, or desktop stack overlap far from 100px)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_novapay_palette"
description = "Surfaces or accents use colors outside the Novapay electric-blue system (e.g. lime/cream editorial wash or arbitrary purple theme) instead of the mandated blues/blacks/greys/yellow/sky accents."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440 desktop width display titles or section headings are grossly mismatched versus the ~144px hero / ~156px word-reveal / 48px section-title reference metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no preloader exit, no scroll-driven 3D scrub, or no stacked-section overlap reveals."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Segment nav, GET ACCESS rail, pills, or modal chrome use unstyled browser default appearance when the reference uses the Novapay-token restyled chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (3D hero overlays, segment nav, stacked bands, feature grids, footer) render off-screen or clipped at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated long-scroll order (hero → six thematic sections with Agentic Stack sub-bands → footer) or omits a required section."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/case throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or nav/rail active-state microinteractions are missing or clearly deviate from the reference (instant snaps, no card scale, wrong active blues)."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.20"
name = "session_chrome_fits_novapay_identity"
description = "Shortlist/Compare trays, Theme filter, Launch search, command palette, and Sprint launch brief panel are integrated into the Novapay electric-blue long-scroll composition (token accents, band surfaces) rather than a mismatched default dialog kit that breaks reference fidelity."
type = "binary"
weight = 0.5

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
