[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_nav_gutter_overlap_tokens"
description = "At 1440 desktop width, major spacing follows the mandated geometry tokens: nav height 70px, desktop gutter 66px, and stacked-section overlap 100px — not arbitrary odd-pixel one-offs for those structures."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_measured_metrics"
description = "At 1440 desktop width typography matches the measured spec: nav labels mono 16px/400; hero SPRINT/2026 fold display ~144px/400 letter-spacing -6px; THE AGENTIC ERA display ~156px/400 letter-spacing -6px; section titles display 48px/500 line-height 43.2px; feature-card headings body 16px/500."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "block_fidelity_preloader_boot"
description = "Block: preloader boot screen — Full-viewport solid-black boot screen with a centered white Novapay / SPRINT'26 wordmark lockup (fictional equivalent of the source wordmark) above a thin progress track that fills electric blue (reference: segment-01.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.22"
name = "block_fidelity_nav_segment_header"
description = "Block: segment nav header — Fixed full-width top nav on black with the wordmark at left and six hairline-divided mono-uppercase section cells running 01.AGENTIC STACK through 06.BUSINESS BANKING, the active cell filled electric blue (reference: persistent across segments, clearest in segment-07.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

