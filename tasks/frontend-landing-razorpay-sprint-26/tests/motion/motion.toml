[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "After the GLB and assets load, the preloader exits by transforming translateY(-100%) over the measured transition transform 0.9s cubic-bezier(0.76,0,0.24,1) and is removed, rather than snapping off or persisting."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Scrolling the hero with the real scroll gesture on desktop drives the Three.js camera through the scene (the WebGL canvas render changes as scroll progresses)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Clicking a segment nav link with the real nav control flashes that cell to rgb(0,57,255) (#0039ff) while the scroll-spy indicator computes rgb(48,94,255) (#305eff), over the measured .seg-cell transition background-color 0.3s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Hovering the GET ACCESS rail with the real pointer transitions its background from the rest rgb(0,57,255) (#0039ff) to rgb(48,94,255) (#305eff) over the measured background-color 0.3s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Clicking an executive play control with the real UI control opens the video modal and locks the underlying page scroll (body overflow hidden) while it is open."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "Feature-card Rive canvases hydrate lazily as their card scrolls into view rather than on first paint, and on a hover-capable device hovering a Rive card scales it to scale(1.03) over a 0.3s transition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "3_7"
description = "Scrolling the word-reveal heading THE AGENTIC ERA into view reveals its words THE, AGENTIC, ERA in sequence."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "Scrolling on desktop drives the stacked-section overlap reveal and the footer gradient overlay fades in relative to scroll position."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "The preloader never exits (the loader overlay remains after load) or scrolling the hero produces no camera or parallax motion on desktop."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "3_10"
description = "Hovering GET ACCESS with the real pointer shows no color change, or clicking a play control opens a modal that fails to lock body scroll."
type = "binary"
weight = 1.0
negate = true
