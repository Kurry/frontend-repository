[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "preloader_exit_transform"
description = "After the scene and assets load, the preloader exits by transforming translateY(-100%) over the measured transition transform 0.9s cubic-bezier(0.76,0,0.24,1) and is removed with pointer events cleared, rather than snapping off or persisting."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "scroll_scrubs_hero_camera"
description = "Scrolling the hero with the real scroll gesture on desktop drives the 3D camera through the scene (the WebGL canvas render changes as scroll progresses), and scrolling back up reverses the progression."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "nav_click_flash_transition"
description = "Clicking a segment nav link with the real nav control flashes that cell to rgb(0,57,255) (#0039ff) while the scroll-spy indicator computes rgb(48,94,255) (#305eff), both over the measured transition background-color 0.3s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "rail_hover_color_transition"
description = "Hovering the GET ACCESS rail with the real pointer transitions its background from the rest rgb(0,57,255) (#0039ff) to rgb(48,94,255) (#305eff) over the measured background-color 0.3s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "modal_open_locks_scroll"
description = "Clicking an executive play control with the real UI control opens the video modal and locks the underlying page scroll (body overflow hidden) while it is open, unlocking it again on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "lazy_hydrate_and_hover_scale"
description = "Feature-card canvases hydrate lazily as their card scrolls into view rather than on first paint, and on a hover-capable device hovering a card wrapping an animated canvas scales it to transform scale(1.03) over transition transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "word_reveal_sequence"
description = "On a fresh page load, scrolling the word-reveal heading THE AGENTIC ERA into view for the first time reveals its words THE, AGENTIC, ERA in sequence rather than all at once."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "scroll_pinning_and_footer_gradient"
description = "Scrolling on desktop drives section pinning and parallax background layers moving at a different rate than their foreground content, the stacked-section overlap reveal, and the footer gradient overlay fading in relative to scroll position."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "loader_stuck_or_hero_static"
description = "The preloader never exits (the loader overlay remains after load) or scrolling the hero produces no camera or parallax motion on desktop."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "hover_dead_or_scroll_lock_broken"
description = "Hovering GET ACCESS with the real pointer shows no color change, or clicking a play control opens a modal that fails to lock body scroll."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "preloader_intro_timings"
description = "The preloader mark fades and slides in over 0.6s cubic-bezier(0.25,0.46,0.45,0.94) delayed 0.3s, the progress track fades in with the same easing delayed 0.5s, and the progress bar width uses transition width 0.12s linear as it animates toward 100 percent."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.12"
name = "hero_overlay_fade_in"
description = "Once the hero is ready, the pinned hero lockup and the SCROLL TO SEE 100+ UPDATES pill fade in via an opacity transition of 0.6s ease."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.13"
name = "mouse_parallax_desktop_only"
description = "On desktop, mouse movement over the hero adds a smooth camera parallax, while below the 768px breakpoint parallax is disabled entirely and a fixed camera offset is used instead."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.14"
name = "native_smooth_scroll_gsap_sync"
description = "Hash and segment-nav anchor jumps use native document smooth scrolling, and the 3D camera scrub plus stacked-section/parallax scroll storytelling stay synced to that same native scroll position (scrolling forward and back reverse the progression) without a separate smooth-scroll engine fighting sticky or touch scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "inertial_easing_signature_motion"
description = "On a fresh load, the preloader exit, word-reveal stagger, card hover scale, and footer gradient fade use inertial ease-out or cubic-bezier easings (not constant-speed linear motion), while only the loader progress-bar width remains the intentional linear transition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "linear_only_signature_motion"
description = "The preloader exit, word-reveal stagger, card hover scale, or footer gradient fade moves at constant linear speed with no inertial easing or settle."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.17"
name = "reduced_motion_settled_and_operable"
description = "With prefers-reduced-motion enabled, the preloader clears immediately, smooth scrolling and parallax/pinning stop, the 3D hero presents a static composition, and split/reveal/vector timelines settle while all controls and sections remain visible and operable"
type = "binary"
weight = 1.0


[[criterion]]
id = "3.20"
name = "palette_and_brief_open_transition"
description = "Via the real UI path, command palette and Sprint launch brief panel open and close with a short ~0.2s opacity/translate transition using inertial easing; pin/unpin updates the Shortlist tray count without a full-page reload flash; Copied confirmation fades in and out on the brief Copy control."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a1"
name = "kinetic_word_reveal_headings"
description = "On a fresh load, real scrolling reveals word-level kinetic typography: headings such as THE / AGENTIC / ERA split into words and stagger into view with inertial easing as each heading enters the viewport (never a WebMCP state shortcut)"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a2"
name = "scroll_storytelling_pin_parallax_stack"
description = "On a fresh load, real scrolling drives sequential scroll storytelling: section pinning, parallax background layers moving at a different rate than foreground content, and stacked-section overlap reveals advance in choreographed order tied to scroll progress and reverse when scrolling back up"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a3"
name = "pointer_reactive_hero_parallax"
description = "On a desktop viewport (≥768px), real mouse movement over the hero adds continuous camera parallax (smoothness about 0.06, no stepping) while the page stays fully usable; below 768px parallax is disabled in favor of a fixed camera offset"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a4"
name = "spatial_3d_hero_scroll_scrub"
description = "The browser-rendered 3D hero scene responds in real time: on a fresh load, real scrolling scrubs the camera along its path through the hero at a stable frame rate rather than a static image or disconnected snap"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a5"
name = "scroll_capture_breaks_usability"
description = "Scroll capture traps the user, prevents reaching later sections, fights native scroll direction or position sticky, or ignores the reduced-motion path that must clear the preloader immediately, disable smooth scrolling/parallax/pinning, settle WebGL to a static composition, and keep every control operable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "8.a6"
name = "kinetic_effects_decorative_jank"
description = "Word-reveal heading splits stutter, reflow mid-animation, or leave words misaligned after settling"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "8.a7"
name = "signature_motion_purely_linear_tweens"
description = "Signature motion (preloader exit, word-reveal stagger, card hover scale, or footer gradient fade) uses purely linear tweens that start and stop mechanically with no inertial easing or settle (loader progress-bar width may remain linear)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "8.a8"
name = "interactive_feature_card_vectors"
description = "Feature-card canvas/vector animations stay crisp at the desktop viewport and respond to real hover state (pointer-events enabled and card scale to about 1.03 on hover-capable devices) rather than looping identically regardless of interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a9"
name = "signature_animation_is_raster_loop"
description = "The signature 3D hero scrub or interactive feature-card vector animation is faked as a pre-rendered video or raster loop that pixelates when scaled, ignores pointer/scroll state changes, and restarts identically on every encounter"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or animation behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
