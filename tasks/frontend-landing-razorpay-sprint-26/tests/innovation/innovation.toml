[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "execution_quality_signature_interactions"
description = "Score execution quality of the reference experience (not invention beyond it): preloader exit, 3D scroll-hero scrub, card hover scale(1.03), and video-modal open/close feel polished and coherent rather than unfinished stubs."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "scroll_storytelling_execution"
description = "On a fresh load, scroll-triggered storytelling (3D camera scrub, stacked-section overlap reveals, word-reveal headings, footer gradient) executes smoothly as a choreographed sequence rather than a janky or missing recreation."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "preloader_to_hero_intro_execution"
description = "The preloader progress → upward exit → hero lockup/pill fade-in sequence executes as a finished intro matching the reference ambition on a fresh load via the real UI path."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "lazy_rive_card_execution"
description = "Feature-card runtime vector animations hydrate lazily into view and respond on hover-capable devices with the scale(1.03) treatment, reading as finished interactive craft rather than static placeholders."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "novapay_brand_narrative_arc"
description = "The long-scroll page reads as one Novapay Sprint '26 narrative arc from 3D hero through Agentic Stack sub-bands, International Payments, Payment Gateway, D2C, Marketing, Business Banking, and footer rather than disconnected template blocks."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a1"
name = "designed_experience_narrative_arc"
description = "The page reads as a designed experience with a narrative arc — sections build on each other visually and the signature 3D scroll interaction is memorable as faithful reference execution, not a template with effects sprinkled on."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a2"
name = "showcase_rechoreographed_at_narrow_widths"
description = "Impeccable execution across breakpoints: at 375 the showcase composition is re-choreographed (mobile hero scene, hamburger nav, edge-to-edge stacks) rather than a broken shrink of the desktop overlap layout."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "signature_motion_absent_or_stubbed"
description = "Signature reference motions are absent or stubbed: no preloader exit, no scroll-driven 3D hero scrub, and no stacked-section overlap storytelling on a fresh load via the real UI path."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n2"
name = "recreation_feels_generic_template"
description = "The recreation reads as a generic marketing template with default type/spacing and none of the reference's electric-blue Novapay identity, broken-grid stacks, or 3D hero execution quality."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n5"
name = "page_flat_static_no_immersion"
description = "The page is flat and static with no scroll storytelling, no 3D hero scrub, and no word-reveal or card motion despite the reference requiring them."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "11.20"
name = "sprint_brief_end_state_polish"
description = "Score execution quality of the useful end state: the Sprint launch brief live JSON/Markdown preview, Download/Copy, and shortlist/compare trays feel finished and coherent with the Novapay Sprint narrative rather than unfinished stubs bolted onto the marketing page."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable execution-quality enhancement of the reference experience that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick, and must not invent design beyond the reference. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
