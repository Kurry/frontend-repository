[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "preloader_clears_input_after_exit"
description = "After the preloader finishes its upward exit and is removed, it no longer intercepts pointer or keyboard input anywhere on the page — nav, rail, and section controls remain operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "hash_deeplink_matches_in_app_nav"
description = "Deep-linking /sprint/26#payment-gateway renders the same view as in-app navigation: the payment-gateway section is in view and its nav cell is highlighted."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "rapid_nav_clicks_settle_last_active"
description = "Rapid successive clicks across three or more segment-nav labels settle on the last clicked section with exactly one nav cell marked active."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "video_modal_reopen_clean_playback"
description = "Closing and reopening the video modal plays the video from a clean state (not stuck mid-playback), and body scroll is never left locked after a close."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "resize_across_768_swaps_nav"
description = "Resizing the viewport across the 768px breakpoint swaps between the desktop segment nav and the mobile hamburger treatment without a page reload and without console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "webgl_fallback_keeps_page_usable"
description = "If WebGL is unavailable, the hero region falls back to a static composition with its heading text still present, and every section, nav link, and CTA below remains reachable and usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "get_access_rail_opens_external_signup"
description = "The persistent GET ACCESS rail link opens an external signup destination in a new tab (target _blank with rel noopener noreferrer) without navigating the /sprint/26 document away."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "play_and_nav_use_semantic_controls"
description = "Executive play controls, segment-nav anchors, the hamburger, and the video-modal close control use semantic buttons/links rather than unlabeled div shells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "video_modal_close_path_works"
description = "The open video modal can be dismissed via its close control, restoring scroll and stopping playback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "preloader_progress_visible_during_load"
description = "During the initial asset load, the preloader shows a visible progress track/bar filling toward 100 percent rather than a blank black screen with no feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "preloader_traps_input_after_exit"
description = "After the preloader exit animation, an invisible overlay still traps pointer or keyboard input so the page cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "deeplink_hash_ignored"
description = "Loading /sprint/26#payment-gateway leaves the page at the hero top with no payment-gateway section in view and no matching nav highlight."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "nav_or_modal_actions_silent"
description = "Clicking a segment-nav label or executive play control produces no visible scroll, modal, or active-state feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "multiple_nav_cells_active"
description = "After rapid nav clicks or mixed click-and-scroll, more than one segment-nav cell remains marked active at once."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "play_control_nonsemantic_shell"
description = "The executive play control is a non-semantic div/span with no button/link role or accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "video_modal_not_keyboard_dismissible"
description = "The open video modal cannot be dismissed via keyboard (focusable close control with Enter/Space or Escape)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "webgl_failure_breaks_below_fold"
description = "When WebGL is unavailable, sections below the hero, nav links, or CTAs become unreachable or blank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_or_missing_control_labels"
description = "Primary nav labels, GET ACCESS, or the video-modal close control lack readable accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "resize_breaks_nav_or_errors"
description = "Resizing across 768px leaves both desktop and mobile nav missing, or throws console errors during the swap."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "scroll_left_locked_after_modal"
description = "Body scroll remains locked after the video modal is closed."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "4.20"
name = "duplicate_pin_rejected"
description = "Pinning the same feature twice in a row does not duplicate its name in the shortlist or inflate the count past a single pin for that card."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.21"
name = "compare_fourth_refused"
description = "Adding a fourth compare feature shows Compare is full (3/3) and the Compare tray still holds exactly three names."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.22"
name = "empty_shortlist_brief_valid"
description = "Opening Export sprint brief with an empty shortlist still produces schema-valid JSON whose shortlistedFeatures is [], brand is Novapay, event is Sprint 26, themeFilter is the live closed-enum value, generatedAt is an ISO-8601 UTC string ending in Z, and other required keys reflect the live session without crashing or showing lorem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.23"
name = "malformed_import_rejected"
description = "Importing a malformed or contract-invalid brief JSON (missing required string brand or required array shortlistedFeatures, brand not Novapay, themeFilter outside the closed enum, compareFeatures longer than 3, a feature name not on the page catalog, a watchedExecutives name outside the closed executive set, or generatedAt not ending in Z) does not apply partial state; shortlist, compare, theme filter, search, and watch log stay unchanged and an inline import error names the offending field or rule."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.24"
name = "invalid_theme_filter_import_named_error"
description = "Importing a brief whose themeFilter is NotATheme keeps Theme filter and trays unchanged and shows an inline import error that names themeFilter (or the enum rule)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n20"
name = "malformed_import_corrupts_state"
description = "Importing malformed or contract-invalid brief JSON partially mutates shortlist, compare, theme filter, search, or watch log into an inconsistent mix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n21"
name = "oversized_compare_import_applied"
description = "Importing a brief with four compareFeatures names applies those names into the Compare tray or leaves compare state partially updated instead of refusing the payload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.25"
name = "undo_inert_with_empty_history"
description = "With an empty undo history, the Undo control is disabled or inert: activating it changes no Shortlist tray count, pin mark, or brief preview state"
type = "binary"
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
