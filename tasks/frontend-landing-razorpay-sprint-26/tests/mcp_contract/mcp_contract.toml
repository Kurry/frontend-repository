[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_and_command_modules_bound"
description = "Contract modules browse-query-v1, command-session-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, session, entity, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, session, entity, and artifact tool handlers drive the same visible UI logic as the on-page controls (section destinations, theme filters, shortlist pins, video session start/stop, mobile-menu/command-palette demos, sprint-brief export/copy/import)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_available"
description = "Only documented browse, session, entity (create, select, update, delete, toggle, quantity, reorder), and artifact (import, export, copy, print_preview, convert) operations from the declared module specs are available — no undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/apply_filter, session start/stop/trigger_demo, entity toggle, and artifact export/copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_open"
description = "Browse open works for declared destinations including hero through business-banking plus shortlist, compare, and sprint-brief — scrolling the matching section or opening the matching panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_start_stop_trigger_demo_bound"
description = "Session operations start, stop, and trigger_demo are bound (including the mobile-menu demo) and surface the same visible UI effects as manual use where applicable."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "destinations_match_bindings"
description = "Browse destinations exposed to automation match the Bindings list exactly: hero; agentic-stack; international; payment-gateway; d2c; marketing; business-banking; shortlist; compare; sprint-brief."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / command-session-v1 / entity-collection-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.20"
name = "entity_and_artifact_modules_bound"
description = "Contract modules entity-collection-v1 and artifact-transfer-v1 are initialized alongside browse-query-v1 and command-session-v1; webmcp_list_tools shows entity- and artifact-prefixed tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.21"
name = "browse_destinations_include_brief_panels"
description = "Browse destinations include hero through business-banking plus shortlist, compare, and sprint-brief; open against those destinations drives the same visible panels/sections as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.22"
name = "entity_shortlist_toggle_bound"
description = "Entity shortlist-item operations create, delete, and toggle with fields feature_name and pinned drive the same Shortlist tray and pin marks as the visible Pin/Unpin controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.23"
name = "artifact_export_copy_import_bound"
description = "Artifact operations export, copy, and import are bound for formats json and markdown and import modes file/sample; invoking artifact export/copy drives the same Sprint launch brief panel state as the visible Export/Download/Copy controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.24"
name = "browse_filters_theme_bound"
description = "Browse filters all through business-banking are bound; apply_filter/clear_filter update the same Theme filter card visibility as the on-page Theme filter control."
type = "binary"
weight = 1.0

