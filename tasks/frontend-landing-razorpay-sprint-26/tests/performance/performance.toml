[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_before_3d_finishes"
description = "The page is interactive before the 3D hero scene finishes loading: the nav, GET ACCESS rail, and copy respond immediately while the scene region holds its space and streams in."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load_and_scroll"
description = "No console errors, hydration mismatch errors/warnings, or unhandled rejections appear on load or during a full top-to-bottom scroll of /sprint/26."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "nav_and_rail_respond_quickly"
description = "After first paint, segment-nav clicks and GET ACCESS rail hover/focus respond without multi-second lag (chrome interactions feel under ~100ms)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "preloader_shows_progress_while_loading"
description = "While critical hero assets load, the preloader progress track/bar provides visible loading feedback rather than hanging the UI with a blank black screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "long_scroll_without_multi_second_freeze"
description = "Scrolling the full long-scroll page (hero through all six thematic sections and footer) remains usable without perceived multi-second freezes between sections."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_scene_stream_in"
description = "While the 3D hero scene streams in, the UI remains interactive — nav, rail, and hash links stay clickable."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "scroll_storytelling_holds_frame_rate"
description = "Continuous scrolling from top to bottom shows no visible hitching or dropped frames through the hero scrub, pinned sections, and card grids."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_nav_clicks_never_freeze"
description = "Rapid successive segment-nav clicks never freeze the page or leave it permanently unresponsive."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_scroll_session_stable"
description = "After an extended top-to-bottom scroll with modal open/close and nav jumps, the page remains responsive without runaway resource use that freezes interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "lazy_card_animations_below_fold"
description = "Feature-card canvas animations hydrate lazily as cards enter the viewport; cards far below the fold do not run animations before they are reached."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a1"
name = "scroll_linked_animation_frame_rate"
description = "Scroll-linked 3D camera scrub, section pinning/parallax, and stacked-band reveals hold a smooth frame rate through the full page length on a 1440-wide viewport with no visible hitching during continuous scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a4"
name = "layout_stable_after_load"
description = "After first paint, no visible layout jumps occur as fonts, images, or the 3D scene finish loading — media and scene regions reserve their space from first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a5"
name = "webgl_capability_fallback"
description = "When WebGL/GPU support is missing, the hero falls back to a complete static composition and the page remains whole, navigable, and visually coherent without the 3D scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a6"
name = "heavy_assets_progressive"
description = "Heavy scene parsing does not block the nav or controls: the page becomes interactive before 3D models/textures finish loading, and the scene region holds reserved space while streaming in."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.20"
name = "palette_brief_undo_stay_responsive"
description = "Opening the command palette, regenerating the Sprint launch brief after shortlist and filter mutations, and rapid Undo/Redo never freeze the page or drop nav or rail responsiveness."
type = "binary"
weight = 1.0

