[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "same_origin_requests_only"
description = "Using browser_network_requests, every request the page makes is same-origin with http://127.0.0.1:3000 or a data:/blob:/about: URL."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "external_cdn_asset_loaded"
description = "A font, script, stylesheet, image, video, 3D scene, or Draco decoder asset loads from an external CDN host (for example jsDelivr, unpkg, gstatic, Cloudflare, or an object-storage bucket) instead of same-origin."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.3"
name = "clean_console_full_scroll"
description = "On load and during a full top-to-bottom scroll, the page produces no uncaught JavaScript console errors, no hydration errors or hydration warnings, and no failed asset request (no 4xx/5xx and no net::ERR for scripts, styles, images, fonts, or media)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "route_and_exact_title"
description = "The /sprint/26 route returns a full document whose title is exactly 'Novapay Sprint 2026: The Age of AI-Native Payments'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "breakpoint_swap_without_reload"
description = "Resizing the viewport across the 768px breakpoint swaps between the desktop segment nav and the hamburger treatment (Roman-numeral labels I.AGENTIC STACK through VI.BUSINESS BANKING) without a page reload and without console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "storage_or_undeclared_navigation"
description = "The page uses localStorage or sessionStorage, or a page-chrome control navigates the origin away to a route other than the declared external signup and card CTA outbound links."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.7"
name = "keyboard_reachable_focus_visible"
description = "Every interactive control (nav anchors, CTAs, play controls, the modal close control) has an accessible link name, is reachable with the keyboard, and shows a visible focus outline in the #305eff outline color; the video modal's close control is keyboard-focusable and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "seo_meta_and_jsonld"
description = "The head carries the exact meta description 'Novapay Sprint 2026 Unveils 100+ Launches, From AI-native Payment Upgrades to Agentic Business Banking. The Agentic Era Begins Today.', a canonical link for the /sprint/26 route, and a WebPage JSON-LD block describing the page."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.9"
name = "hero_and_headings_accessible_text"
description = "The 3D hero canvas is decorative with the section's real heading text present in the DOM as an accessible equivalent, and word-reveal headings keep the full original phrase on the heading container (aria-label or equivalent) while the per-word fragments are hidden from the accessibility tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "interactive_before_scene_loads"
description = "The nav, GET ACCESS rail, and page copy respond to input before the 3D hero scene finishes loading, the scene region holds its space while streaming in, and after first paint no visible layout jumps occur as fonts, images, or the 3D scene finish loading."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "smooth_scroll_lazy_below_fold"
description = "Continuous scrolling from top to bottom shows no visible hitching or dropped frames through the hero scrub, the pinned sections, and the card grids, and cards far below the fold do not run their canvas animations before they are reached."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.12"
name = "wcag_aa_contrast_bands"
description = "Primary section titles, body copy, and control labels on dark, blue, white, and light-grey bands meet WCAG AA contrast against their immediate backgrounds (white or light text on dark/blue; dark text on white/light-grey)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "semantic_nav_and_headings"
description = "The desktop segment nav and mobile menu use semantic navigation landmarks, and section titles render as real heading elements rather than non-semantic clickable divs standing in for structure."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.14"
name = "required_authored_asset_files_load"
description = "Browser network/render evidence shows all portraits, VP9 WebM/poster pairs, original interactive vector files and fallbacks, desktop/mobile GLB scenes, materials/textures, decoder files, card art, SVGs, and share image loading from same-origin paths with no 404, decode, playback, WebGL, or vector-runtime failure"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "hydrated_content_visibly_replaced"
description = "Statically delivered content visibly flashes and is replaced by different client content after the island scripts hydrate — mismatched text, reflowing layout, or restyled elements between first paint and interactive on a fresh load of /sprint/26."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, network hygiene, accessibility, performance, or routing) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, console or network log) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
