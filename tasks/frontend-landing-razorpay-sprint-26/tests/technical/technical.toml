[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "same_origin_requests_only"
description = "Using browser_network_requests, every request the page makes is same-origin with http://127.0.0.1:3000 or a data:/blob:/about: URL."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "clean_console_full_scroll"
description = "On load and during a full top-to-bottom scroll, the page produces no uncaught JavaScript console errors, no hydration errors or hydration warnings, and no failed asset request (no 4xx/5xx and no net::ERR for scripts, styles, images, fonts, or media)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "route_and_exact_title"
description = "The /sprint/26 route returns a full document whose title is exactly 'Novapay Sprint 2026: The Age of AI-Native Payments'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "breakpoint_swap_without_reload"
description = "Resizing the viewport across the 768px breakpoint swaps between the desktop segment nav and the hamburger treatment (Roman-numeral labels I.AGENTIC STACK through VI.BUSINESS BANKING) without a page reload and without console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "keyboard_reachable_focus_visible"
description = "Every interactive control (nav anchors, CTAs, play controls, the modal close control) has an accessible link name, is reachable with the keyboard, and shows a visible focus outline in the #305eff outline color; the video modal's close control is keyboard-focusable and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "seo_meta_and_jsonld"
description = "The head carries the exact meta description 'Novapay Sprint 2026 Unveils 100+ Launches, From AI-native Payment Upgrades to Agentic Business Banking. The Agentic Era Begins Today.', a canonical link for the /sprint/26 route, and a WebPage JSON-LD block describing the page."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.9"
name = "hero_and_headings_accessible_text"
description = "The 3D hero canvas is decorative with the section's real heading text present in the DOM as an accessible equivalent, and word-reveal headings keep the full original phrase on the heading container (aria-label or equivalent) while the per-word fragments are hidden from the accessibility tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "interactive_before_scene_loads"
description = "The nav, GET ACCESS rail, and page copy respond to input before the 3D hero scene finishes loading, the scene region holds its space while streaming in, and after first paint no visible layout jumps occur as fonts, images, or the 3D scene finish loading."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "smooth_scroll_lazy_below_fold"
description = "Continuous scrolling from top to bottom shows no visible hitching or dropped frames through the hero scrub, the pinned sections, and the card grids, and cards far below the fold do not run their canvas animations before they are reached."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.12"
name = "wcag_aa_contrast_bands"
description = "Primary section titles, body copy, and control labels on dark, blue, white, and light-grey bands meet WCAG AA contrast against their immediate backgrounds (white or light text on dark/blue; dark text on white/light-grey)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "semantic_nav_and_headings"
description = "The desktop segment nav and mobile menu use semantic navigation landmarks, and section titles render as real heading elements rather than non-semantic clickable divs standing in for structure."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.14"
name = "required_authored_asset_files_load"
description = "Browser network/render evidence shows all portraits, VP9 WebM/poster pairs, original interactive vector files and fallbacks, desktop/mobile GLB scenes, materials/textures, decoder files, card art, SVGs, and share image loading from same-origin paths with no 404, decode, playback, WebGL, or vector-runtime failure"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.20"
name = "in_memory_session_state_resets"
description = "Shortlist, compare, theme filter, search, watch log, brief preview, palette, and undo/redo live in in-memory client state only: after mutations, a reload coherently returns to the empty seeded baseline with no localStorage/sessionStorage persistence of those facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.21"
name = "brief_export_reflects_live_store"
description = "Download/Copy of the Sprint launch brief emit live-compiled, schema-valid JSON or Markdown that reflects the current shortlist, compare, theme filter, search, and watch-log mutations rather than a static fixture, with required string brand Novapay, required string event Sprint 26, required closed-enum themeFilter, and required ISO-8601 UTC generatedAt ending in Z."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.22"
name = "brief_schema_first_export_import"
description = "Sprint launch brief export/import follows schema-first API-shaped modeling: exported JSON always satisfies the required field contract (required string/array/enum keys), and Import refuses contract-invalid payloads (wrong brand, illegal themeFilter, compareFeatures length > 3, catalog-illegal feature name, or generatedAt not ending in Z) with a named field error and no partial tray or watch-log mutation."
type = "binary"
weight = 1.0

