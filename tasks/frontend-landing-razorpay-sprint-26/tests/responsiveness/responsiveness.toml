[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "breakpoint_768_desktop_vs_mobile_nav"
description = "At 768px and wider the six-label desktop segment nav is present; below 768px it is replaced by a hamburger menu listing I.AGENTIC STACK through VI.BUSINESS BANKING."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "Below 768px, primary interactive controls (hamburger, menu items, GET ACCESS rail, play controls) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "type_steps_at_768_and_mobile"
description = "Typography steps at the 768px and mobile breakpoints (nav, hero billboard, section titles) rather than jumping between unrelated font families mid-resize."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_at_375"
description = "At 375px width, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "hamburger_replaces_segment_nav"
description = "Below 768px the desktop segment-nav row is gone and the hamburger is the operable section navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "mobile_removes_stack_overlap"
description = "On mobile (max-width 767px) the stacked-section 100px overlap is removed so sections stack edge-to-edge rather than overlapping."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_hamburger_tap_opens_menu"
description = "Below 768px, tapping the hamburger opens the menu listing the six Roman-numeral section labels."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "hero_canvas_and_cards_fit_viewport"
description = "The hero canvas/scene region and feature-card grids size responsively at 1440, 768, and 375 without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_chrome_accessible_all_widths"
description = "Fixed chrome stays accessible across widths: desktop segment nav (70px tall) and GET ACCESS rail at ≥768px; hamburger and repositioned hero lockup (top 20px, left 20px, width 120px) and pill (bottom 24px, rgba(10,10,10,0.82) background) below 768px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_product_breakpoints"
description = "At 1440, 768, or 375 the layout breaks, overflows, or loses required chrome (segment nav vs hamburger) for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "Below 768px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_375"
description = "At 375px width body or section heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 1440, 768, or 375 content is cropped or unnecessary horizontal scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_nav_missing_or_unresponsive"
description = "Below 768px the hamburger is absent, or tapping it leaves the menu closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_nav_or_rail_obscures_content"
description = "The fixed segment nav or GET ACCESS rail permanently obscures section content with no recoverable scroll offset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "desktop_overlap_retained_on_mobile"
description = "Below 768px the six stacked sections still overlap by ~100px as on desktop, causing clipped or unreadable bands."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "wrong_nav_chrome_for_width"
description = "Below 768px the desktop six-label segment nav remains the only nav path, or at ≥768px the hamburger is the only nav with segment labels unavailable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "hero_or_cards_static_overflow"
description = "The hero canvas or feature-card media use a static size that overflows the viewport at 375 or 768."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "get_access_or_hamburger_disappears"
description = "The GET ACCESS rail (desktop) or hamburger (mobile) disappears at a required width while remaining mandated chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_mobile_rechoreography"
description = "At 375 the asymmetric stacked-band composition is re-choreographed (edge-to-edge sections, mobile hero lockup/pill, hamburger nav) rather than a broken shrink of the desktop overlap grid."
type = "binary"
weight = 0.5


[[criterion]]
id = "7.20"
name = "session_chrome_usable_at_375"
description = "At 375px width, Shortlist tray, Compare tray, Theme filter, Launch search, command palette, and Sprint launch brief panel remain fully usable without clipping controls or requiring horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
