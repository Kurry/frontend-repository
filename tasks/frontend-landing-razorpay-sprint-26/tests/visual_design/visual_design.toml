[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "browser_evaluate getComputedStyle shows the clicked segment nav cell (.seg-cell.is-clicked) background-color computes to rgb(0, 57, 255) (#0039ff) and the scroll-spy active cell (.seg-cell.is-active) to rgb(48, 94, 255) (#305eff) — exact color match required."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "The preloader background computes to rgb(0, 0, 0) and its progress bar (.loader-bar) background to rgb(48, 94, 255) (#305eff) on a rgba(255,255,255,0.1) track that is 220px wide."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "browser_evaluate getComputedStyle shows body background-color computes to rgb(26, 26, 26) (#1a1a1a) with color rgb(255, 255, 255), and dark section bands compute to rgb(21, 21, 21) (#151515) — exact match required."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Computed font-family is Inter_tight for body/UI and feature-card text, Geist_mono for nav labels and section index numerals, and a Tasa/TASA Orbiter family for display headings — not a substituted family."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "The stacked thematic sections alternate measured band background-colors — dark rgb(21,21,21), blue rgb(0,57,255), white rgb(255,255,255), and light-grey rgb(240,240,240)/rgb(237,237,237)/rgb(233,233,233) — and visibly overlap the section above them on desktop (measured margin-top -100px)."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "2_6"
description = "Section callouts and taglines render verbatim, including Checkout of choice for top brands., Curated rewards for your users., and Your business has a new co-founder and it's AI-native."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "2_7"
description = "The footer shows the copyright line Copyright © Razorpay FTX26, the copy AI-native fintech. / Built from India. For the world., and a /SPRINT'26 word-mark."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "Body or heading text falls back to a substituted family such as Google Fonts Inter, system-ui, Arial, or Times instead of the self-hosted Inter_tight, Geist_mono, and TASA Orbiter Display."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "2_9"
description = "The active nav cell, preloader bar, or body background computes to a wrong color (clicked cell not rgb(0,57,255), bar not rgb(48,94,255), or body not rgb(26,26,26))."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "2_10"
description = "getComputedStyle shows the measured type scale: nav labels Geist_mono 16px/400, the hero SPRINT/2026 fold text Tasa_Regular 144px/400 letter-spacing -6px, section titles Tasa 48px/500 letter-spacing -0.9px, and feature-card body Inter_tight 16px/400 line-height 19.2px (close tolerance on px, exact on family)."
type = "binary"
weight = 0.5
optional = true
