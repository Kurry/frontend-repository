[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "nav_active_colors_exact"
description = "browser_evaluate getComputedStyle shows the clicked segment nav cell background-color computes to rgb(0, 57, 255) (#0039ff) and the scroll-spy active cell to rgb(48, 94, 255) (#305eff) — exact color match required."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "preloader_colors_and_track"
description = "The preloader background computes to rgb(0, 0, 0), the placeholder mark renders white, and its progress bar background computes to rgb(48, 94, 255) (#305eff) on a rgba(255,255,255,0.1) track, both 220px wide."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "body_and_band_colors_exact"
description = "browser_evaluate getComputedStyle shows body background-color computes to rgb(26, 26, 26) (#1a1a1a) with color rgb(255, 255, 255), and dark section bands compute to rgb(21, 21, 21) (#151515) — exact match required."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "self_hosted_font_families"
description = "Computed font-family is Inter Tight for body/UI and feature-card text, Geist Mono for nav labels and section index numerals, and a bundled open-license display face (a distinct tight, high-impact display family, not Inter Tight, system-ui, or a generic serif) for display headings, all served self-hosted."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "stacked_bands_alternate_overlap"
description = "The stacked thematic sections alternate measured band background-colors — dark rgb(21,21,21), blue rgb(0,57,255), white rgb(255,255,255), and light-grey rgb(240,240,240)/rgb(237,237,237)/rgb(233,233,233) — and visibly overlap the section above them on desktop (measured 100px stack overlap via negative top margin)."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "taglines_verbatim"
description = "Section callouts and taglines render verbatim, including Checkout of choice for top brands., Curated rewards for your users., Don't let banking weigh you down., and Your business has a new co-founder and it's AI-native."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "footer_wordmark_lines"
description = "The footer shows the copyright line Copyright © Novapay FTX26, the copy AI-native fintech. / Built with ambition. For the world., and a /SPRINT'26 word-mark, with a gradient overlay tied to scroll."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.8"
name = "substituted_font_family_present"
description = "Body or heading text renders in a substituted family such as externally hosted Inter, system-ui, Arial, or Times instead of the self-hosted Inter Tight, Geist Mono, and bundled display face, or any font loads from an external host."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "wrong_core_colors_present"
description = "The active nav cell, preloader bar, or body background computes to a wrong color (clicked cell not rgb(0,57,255), bar not rgb(48,94,255), or body not rgb(26,26,26))."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "measured_type_scale"
description = "getComputedStyle shows the measured type scale: nav labels in the mono face at 16px/400, the hero SPRINT/2026 fold text in the display face at 144px/400 letter-spacing -6px, section titles in the display face at 48px/500 letter-spacing -0.9px, section index numerals in the mono face at 38.4px/400 color rgb(138,138,138), and feature-card body in the body face at 16px/400 line-height 19.2px (close tolerance on px, exact on family role)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.11"
name = "nav_and_rail_geometry"
description = "The fixed nav header measures 70px tall spanning the full viewport width from top 0, and the GET ACCESS rail is a 30px by 140px box pinned to the right edge."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.12"
name = "hero_overlay_placement_desktop"
description = "On desktop the SCROLL TO SEE 100+ UPDATES pill is anchored bottom-center at bottom 32px and the white Novapay / SPRINT '26 brand lockup sits fixed top-left at top 32px, left 32px, width 160px over the hero scene."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.13"
name = "hero_overlay_placement_mobile"
description = "Below 768px the pinned hero lockup repositions to top 20px, left 20px, width 120px, the pill moves to bottom 24px, and the mobile hero pill background computes to rgba(10,10,10,0.82)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.14"
name = "no_fouc_on_fresh_load"
description = "On a fresh load, animated elements are preset to their resting opacity, color, and background so the page paints styled from the first frame with no flash of unstyled or mispositioned content."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.15"
name = "uppercase_label_styling"
description = "Uppercase label styling (nav segments, the SCROLL TO SEE 100+ UPDATES pill, GET ACCESS) is applied consistently wherever those elements appear."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.16"
name = "mobile_375_no_overflow"
description = "At 375px viewport width no content clips or overflows the viewport (documentElement.scrollWidth minus clientWidth at most 2px) and no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "unfinished_copy_present"
description = "Lorem ipsum, placeholder-text markers (for example TODO or TKTK), or visibly unfinished copy appears somewhere in the shipped UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.18"
name = "real_brand_assets_shipped"
description = "Copyrighted, trademarked, scraped, stock, source-site, screenshot-derived, or otherwise third-party-controlled creative material—or a recognizable trace, near-copy, or derivative—appears anywhere, including a source fintech logo, real executive likeness/photo/video frame, proprietary font, partner/social mark, site-builder badge, Rive artboard, WebGL model/texture, metadata, or hidden/preloaded asset instead of the fictional Novapay system."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.19"
name = "asymmetric_stack_composition"
description = "On desktop the stacked thematic sections overlap the predecessor by the measured 100px stack overlap, section headers use an asymmetric two-column layout (index column about 330px with title/tagline in the remaining span) rather than equal-width stacks, and feature-hero card grids use uneven column ratios."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "color_scarcity_electric_blues"
description = "Electric blue #0039ff (rgb(0,57,255)) appears as the click-flash nav cell, GET ACCESS rail rest, and blue section band, and #305eff (rgb(48,94,255)) appears as the scroll-spy cell, loader bar, rail hover, and focus outline — not as a page-wide body fill — while yellow #e3f51a and sky #b8cbd1 remain sparse accents rather than dominant backgrounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "lime_or_cream_palette_present"
description = "The page adopts a lime-on-dark or warm-cream editorial palette (for example lime accents near #ecfdad or a cream body near #F4F1EA / #eae9e6) instead of the Novapay electric-blue / near-black / white identity."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.22"
name = "scratch_authored_media_inventory_craft"
description = "The Novapay identity and asset inventory are visibly complete and art-directed: logo mark/lockup, six distinct executive portraits, matching local video posters, desktop/mobile 3D scenes and textures, every vector-interaction fallback, all card art, SVG controls, and the social-share image occupy their reference roles without repeated generic filler"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.23"
name = "missing_reused_or_source_media"
description = "A required Novapay surface is omitted, empty, broken, duplicated as filler, reduced to a generic gradient/emoji/text placeholder, or exposes a source-site name, logo silhouette, recognizable source media, distinctive copy, metadata, or destination"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.24"
name = "design_token_custom_properties_resolve"
description = "browser_evaluate getComputedStyle(document.documentElement).getPropertyValue shows the spacing-geometry design tokens resolve as CSS custom properties — a nav-height token of 70px, a desktop gutter token of 66px, and a stack-overlap token of 100px (names may vary, values must match) — and desktop display type steps between breakpoints rather than fluidly resizing via clamp() between unrelated families."
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "2.40"
name = "session_chrome_novapay_tokens"
description = "Shortlist tray, Compare tray, Theme filter, Launch search, command palette, and Sprint launch brief panel share the Novapay electric-blue token system: dark-band tray surfaces with #305eff accents on active pins and focus rings; JSON tab monospaced; Markdown tab display/body type; palette rows show kind labels Section, Panel, or Action."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
