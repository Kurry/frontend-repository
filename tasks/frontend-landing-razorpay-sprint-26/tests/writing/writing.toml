[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "nav_labels_exact_uppercase"
description = "Where the app renders segment-nav labels, they appear verbatim with numeric prefixes and uppercase styling: 01.AGENTIC STACK, 02.INTERNATIONAL PAYMENTS, 03.PAYMENT GATEWAY, 04.D2C, 05.MARKETING, 06.BUSINESS BANKING."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "cta_labels_specific_mandated"
description = "Where the app renders primary action labels, they use the mandated specific copy (SCROLL TO SEE 100+ UPDATES, GET ACCESS, EXPLORE, READ MORE) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "uppercase_label_styling_consistent"
description = "Where the app renders uppercase label styling (nav segments, SCROLL TO SEE 100+ UPDATES pill, GET ACCESS), that treatment is applied consistently wherever those elements appear."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "section_taglines_verbatim"
description = "Where the app renders section taglines and callouts, they appear verbatim including Your business has a new co-founder and it's AI-native., Checkout of choice for top brands., Curated rewards for your users., and Don't let banking weigh you down."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "marketing_copy_spelling_grammar"
description = "Where the app renders body or marketing copy (hero billboard, executive quotes, feature-card names, footer), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "novapay_terminology_consistent"
description = "Where the app renders the brand name, terminology stays consistent as Novapay / NovapayX / SPRINT '26 (not mixed with leftover source-brand naming)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "executive_quotes_verbatim"
description = "Where the app renders executive quotes, they appear verbatim with their fictional attributions, including Arjun Mehta, SVP, Engineering (\"This shift will redefine commerce as we know it. Not because payments got faster. But because it got intelligent.\") and Meera Nair, Senior Director, Product (\"We aim to deliver the best business banking experience. Today, that translates to 70% of Indian unicorns using NovapayX.\")."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "footer_copy_verbatim"
description = "Where the app renders footer copy, it includes AI-native fintech. / Built with ambition. For the world., Copyright © Novapay FTX26, fictional community links (Photos, Updates, Network), www.novapay.example, and /SPRINT'26."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "feature_card_names_verbatim"
description = "Where the app renders feature-card names within their sections, representative mandated names appear verbatim (e.g. Payments on In-App Chats, Localised Checkout, Biometric Card Authentication, Quick Buy 2.0, Rewards Marketplace 2.0, Payroll Engine 2.0)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "mobile_roman_labels_exact"
description = "Where the app renders the mobile menu below 768px, labels use Roman numerals verbatim: I.AGENTIC STACK through VI.BUSINESS BANKING."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as SPRINT 26 / 100+ LAUNCHES & UPDATES, THE AGENTIC ERA, GET ACCESS, or primary nav labels."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "source_brand_names_in_copy"
description = "Rendered copy still names the source fintech brand, real executives, or source-site product marks instead of the fictional Novapay system."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders mandated nav labels, executive quotes, feature names, or footer lines unreadable at 1440 or 375."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.20"
name = "session_chrome_labels_specific"
description = "Where the app renders shortlist, compare, filter, palette, and brief chrome, labels stay specific (Pin to shortlist, Unpin, Add to compare, Export sprint brief, Download, Copy, Import brief, Load sample brief, Undo, Redo, No launches pinned yet, Compare is full (3/3), Copied) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
