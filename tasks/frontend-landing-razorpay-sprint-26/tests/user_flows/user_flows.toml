[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "fresh_load_preloader_then_hero"
description = "Loading /sprint/26 on a fresh visit shows the full-viewport black preloader with the white Novapay Sprint mark and a progress bar filling toward 100 percent; the loader then exits upward and reveals the pinned 3D hero with the SPRINT 26 billboard and SCROLL TO SEE 100+ UPDATES pill."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "scroll_scrubs_hero_then_releases"
description = "After the preloader exits: scrolling down scrubs the 3D hero camera through the scene while the billboard and pill stay overlaid; once the scroll-linked sequence completes, the hero releases and the first stacked section scrolls into view with the scroll-spy highlighting 01.AGENTIC STACK."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "reload_restarts_preloader_at_top"
description = "Reloading the page from any scroll depth returns to the top and restarts the preloader-then-hero sequence from the beginning; no prior scroll position, active nav cell, or modal state survives the reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "nav_click_scrolls_payment_gateway"
description = "From the hero at desktop width: clicking 03.PAYMENT GATEWAY scrolls the payment-gateway section into view on the same document, that nav cell shows the click-active blue and is marked active, and the section's index numeral, executive block, and card grid are visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "scroll_spy_moves_to_d2c"
description = "After navigating to Payment Gateway: continuing to scroll manually into the D2C section moves the scroll-spy highlight from 03.PAYMENT GATEWAY to 04.D2C without any click."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "wordmark_returns_to_hero"
description = "From a mid-page section: clicking the Novapay wordmark in the segment nav returns the page to the hero (#Hero) on the same document without loading a different HTML page."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "video_modal_opens_locks_scroll"
description = "In any stacked section: clicking the executive play control opens a full-viewport video modal that plays that section's local VP9 WebM; while open, the page behind cannot be scrolled and the segment-nav active state is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "video_modal_close_unlocks_same_section"
description = "Closing the open video modal via its close control stops playback, unlocks body scrolling, and leaves the page at the same section so the scroll-spy highlight is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "mobile_menu_lists_roman_sections"
description = "At a viewport narrower than 768px: the desktop segment nav is gone and a hamburger is present; opening it lists I.AGENTIC STACK through VI.BUSINESS BANKING."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "mobile_menu_marketing_scrolls_closes"
description = "Below 768px: choosing V.MARKETING from the open hamburger menu closes the menu and scrolls the Marketing section into view on the same document."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_nav_or_hero_flow_unavailable"
description = "The preloader-then-hero reveal cannot complete, or the six segment-nav labels cannot scroll their matching in-page sections from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "nav_click_loads_different_page"
description = "Clicking a segment-nav label or the wordmark navigates to a different HTML page or client route instead of scrolling within /sprint/26."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "scroll_spy_and_click_active_desync"
description = "After clicking a nav label or scrolling into a section, the marked-active nav cell disagrees with the section in view (click-active and scroll-spy state desync)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "video_modal_leaves_scroll_locked"
description = "After closing the video modal, body scroll stays locked or the video keeps playing in the background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "mobile_menu_dead_end"
description = "Below 768px the hamburger opens but choosing a section leaves the menu stuck open or fails to scroll, requiring a reload to recover."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "video_modal_no_exit"
description = "The video modal opens but offers no operable close control, blocking navigation with no exit path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "flow_dead_end_requires_reload"
description = "After opening the video modal, using segment nav, or opening the mobile menu, recovering normal page interaction requires a full page reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.20"
name = "shortlist_compare_flow"
description = "Pin Voice Payments then Quick Buy 2.0 (count 2, both names listed); add Biometric Card Authentication to compare; unpin Voice Payments — count returns to 1 and that name disappears from the tray and both brief preview tabs without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.21"
name = "sprint_brief_export_flow"
description = "After shortlist/compare/filter/search/watch mutations, open Export sprint brief; JSON matches the Sprint launch brief field contract with brand Novapay, event Sprint 26, matching shortlistedFeatures, compareFeatures, themeFilter, searchQuery, watchedExecutives, and ISO-8601 UTC generatedAt ending in Z; Download offers novapay-sprint-26-brief.json; Copy shows Copied; Markdown shows the same facts under Shortlisted launches, Compare set, Theme filter, Search, and Watched executives."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.22"
name = "import_round_trip_flow"
description = "With a non-empty shortlist, compare set, and Watch log entry, Download JSON, clear both trays and the Watch log, then Import that file; Shortlist tray, Compare tray, Watch log, pinned marks, and both preview tabs match the exported session again; a follow-up Import of themeFilter NotATheme, four compareFeatures, or a catalog-illegal shortlistedFeatures name keeps trays and Watch log unchanged and shows a named-field import error."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.23"
name = "command_palette_flow"
description = "Press Ctrl+K, type Payment, choose Jump to Payment Gateway; palette closes and payment-gateway is in view with its nav cell active; reopen palette and choose Open sprint brief to open the brief panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.24"
name = "undo_flow"
description = "Pin Voice Payments, then Undo — Shortlist count returns to 0, pin clears, brief shortlistedFeatures is []; Redo restores the pin and preview together."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n20"
name = "brief_export_dead_end"
description = "Export sprint brief opens but Download/Copy are missing or inert, leaving no way to obtain the session artifact without a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
