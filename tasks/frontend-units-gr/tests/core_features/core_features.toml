[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, once the skeleton intro settles the hero shows the display headline \"Home of the uniquely awesome.\" and a \"Book your Unit\" call-to-action button, with no full-viewport loader remaining"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the document body background color computes to exactly #f4e9e1 (rgb(244, 233, 225)) with black text and the document title is \"Αρχική - Units\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load at desktop width, the sidebar/header shows the numbered nav labels 01 Student Homes, 02 Our way of living, 03 Community, 04 Επικοινωνία plus a \"Book your Unit\" CTA and an inert \"English\" control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After the page settles, the red marquee band (background rgb(234, 55, 55)) is continuously looping horizontally and contains the phrases Social areas, Private kitchen & bathroom, 24/7 Security, Fast and reliable maintenance, and Smart living"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After the page settles, the blue marquee band (background rgb(0, 114, 227)) is continuously looping horizontally and contains the phrases Super-fast WiFi, 24/7 Hot water, Electric bike stations, and Elevator access"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When the Swiper living next control is clicked, the amenity carousel advances by one slide across the slides Community living spaces, Ασφάλεια, Υποστήριξη, and Smart Living, and the previous control moves it back"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "On the typical-unit section, the pricing list reads Kick Unit 640€/μήνα, Boost Unit 690€/μήνα, and Flex Unit 740€/μήνα"
