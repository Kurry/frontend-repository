[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[criteria]]
id = "in_memory_only"
title = "NO localStorage; entirely in-memory."
weight = 1.0

[[criteria]]
id = "webmcp_contract"
title = "WebMCP contract implemented to support CRUD, status, validation, query, canonical mutation, derived state, undo, and export/import."
weight = 1.0
