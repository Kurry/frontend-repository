[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "milestone_confetti_craft_beyond_minimum"
description = "Beyond the required streak-milestone confetti burst, celebration craft includes an extra delightful beat (for example a richer particle pattern or brief card pulse) that remains browser-observable (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "heatmap_tooltip_polish_beyond_baseline"
description = "Heatmap day-cell tooltips offer advanced polish beyond naming date and completion — for example streak context or partial-count detail — verified via real hover (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_habits"
description = "A brief guided first-run or coachmark introduces New Habit, category chips, and Export as JSON without blocking the empty-state create path (bonus beyond required empty-state copy)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "trend_chart_interaction_aid"
description = "An interactive graphic beyond the required trend chart — for example hover readouts on day points or a longest-streak callout graphic — adds usability while staying local (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_habit_shortcuts_beyond_tab"
description = "Beyond basic Tab/Enter operability, habit check-in or category filtering supports an alternate shortcut such as a key to complete the focused habit (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the persisted session, the app offers a small personalization beyond requirements (for example remembering last opened view: habits vs Stats) that survives reload with the rest of localStorage state (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_habit_tracker_narrative"
description = "The LoopDaily shell, Manrope titles, mint accent, and flame milestone treatments read as a cohesive habit-tracker product narrative rather than generic unstyled controls (bonus execution quality)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "flame_tier_craft_beyond_swap"
description = "Flame tier treatments (plain / bright / gold) show crafted differentiation beyond a bare icon swap — cohesive glow or color staging that feels designed (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local Manrope rendering or offline-capable app shell assets) is visible without CDN dependence (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_loopdaily_feel"
description = "The overall experience feels competition-grade: habit create with field contracts, check-ins, Heatmap, Stats, and Workspace JSON export/import read as a professional habit instrument rather than a wired demo (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
