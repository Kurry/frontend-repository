[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "persistence_full_restore"
description = "All habits, categories, completion history, habit order, category assignments, reminder notes, and the active category filter survive a full page refresh, restored purely from localStorage"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "corrupted_storage_recovery_controls"
description = "When localStorage holds malformed or unparseable data for the app's storage key, reloading recovers to the last valid snapshot without a blank screen, shows a specific recovery notice in a role=alert live region, and offers working Retry and Reset controls with visible, deterministic effects — Retry re-applies the last valid snapshot (or reports none is available), Reset clears to the defined empty state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "malformed_sample_guarded_path"
description = "Clicking Load Malformed Sample exercises the soft-recovery drill (skip-or-repair, distinct from Import's strict field-contract gate) and reports what was skipped or repaired in the role=alert live region"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "export_import_no_network"
description = "Export as JSON downloads the current Workspace JSON document via a Blob and anchor download attribute with no network request; Import reads a file via FileReader with no network request"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "rapid_stepper_stability"
description = "Driving the primary check-in/stepper control through 25 rapid deterministic repetitions leaves the final count/state exact, the UI responsive, and produces no blank screen, uncaught error, or sustained freeze, with every tap reflected in the fraction and progress bar"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "loads_interactive_cleanly"
description = "The app reaches an interactive UI on load with no blank page, framework error overlay, or noscript-only fallback, and a full hard reload re-renders cleanly"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "keyboard_reachability_and_focus"
description = "Every interactive control — buttons, category chips, steppers, the drag handle, form fields, and the import/export controls — is reachable with keyboard Tab and shows a clearly visible focus indicator when focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "inline_errors_associated_with_fields"
description = "Inline form validation errors render adjacent to the field they name and are programmatically associated with that field (observable in the DOM via label/description association on the input)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "dialog_focus_trap_and_return"
description = "Dialogs opened by the app (such as the import confirmation) trap keyboard focus while open and return focus to the invoking control on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "console_clean_full_exercise"
description = "The browser console stays free of errors and unhandled promise rejections during a full exercise of the app, including the malformed-data recovery path"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "habit_form_validation_matches_field_contract"
description = "New Habit and category creation enforce the field contracts in the UI: blank, over-80-character, or whitespace-only habit names; targetCount outside 1–100 or once-with-count-not-1; reminder over 40 characters; and blank or over-40-character category names are rejected with inline feedback naming the offending field, and no habit or category is added"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "target_type_count_cross_field_contract"
description = "Choosing Once a day forces targetCount to 1 in the created habit record (visible after create on the card or in Export as JSON), and choosing Daily count with a valid 1–100 targetCount persists that count — the cross-field targetType/targetCount contract holds without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "workspace_json_exact_types_order_and_references"
description = "The exported Workspace document has exactly schemaVersion loopdaily.workspace.v1, ISO-8601 exportedAt, habits in visible list order, categories in creation order, and activeCategoryFilter as null or an imported category id; every habit includes a non-empty id, valid name/icon/targetType/targetCount/categoryId/reminder, boolean paused, non-negative integer order, ISO-8601 createdAt, and a completions object whose YYYY-MM-DD keys map to non-negative integers, while each category contains a non-empty id and trimmed 1–40 character name and every non-null habit categoryId resolves to that categories array"
type = "binary"
weight = 1.0

