[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_states_on_interactives"
description = "Hovering a habit row, a category filter chip, and a stepper control produces a clearly visible hover response on each, verified with computed styles while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "toasts_slide_and_autodismiss"
description = "Creating a habit, completing a check-in, exporting data, and importing data each produce a transient visible confirmation (toast or equivalent) immediately after the action, and the toast slides or fades in and auto-dismisses smoothly rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "flame_change_via_real_action"
description = "The milestone flame's treatment change on crossing 7 or 30 days happens live from the real check-in/stepper action, not a hidden shortcut, and is visible immediately after that action completes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "recovery_banner_appears_unprompted"
description = "The recovery banner and its Retry/Reset controls appear as soon as a recovery condition is detected and are announced through the role=alert live region without requiring focus to move to them"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "habit_enter_exit_animations"
description = "A newly created habit animates into the list rather than appearing instantly, a paused habit animates out of the main list, and the remaining rows settle into place with a smooth transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "stepper_progress_animates"
description = "A numeric-target habit's stepper progress bar and fraction animate their update immediately on each real +1/-1 tap rather than jumping with no transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "blank_name_shake_cue"
description = "Submitting the New Habit form with a blank name triggers a visible shake or equivalent motion cue alongside the inline error text"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "milestone_confetti_burst"
description = "Crossing a 7-day or 30-day streak milestone through a real check-in triggers a brief celebratory confetti-style particle burst near the habit card, and the effect fires only on that milestone action — never ambiently or on ordinary non-milestone check-ins"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "drag_lift_and_settle"
description = "Reordering a habit via its drag handle shows a lift/drag affordance while dragging and the row settles into its new position with a smooth transition on drop, performed through a real pointer drag"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "button_hover_ease_and_press"
description = "Buttons ease their background and border on hover and show a brief press effect on click rather than switching states instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.15"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, decorative animations and the celebration effect are removed or reduced while state changes (check-ins, creation, pause) still apply instantly and correctly"
type = "binary"
weight = 1.0

