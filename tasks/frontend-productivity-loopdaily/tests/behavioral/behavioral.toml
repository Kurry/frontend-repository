[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "Multi-facet round-trip: create habits in two categories, set a reminder, reorder, select a category chip, then reload — habits, categories, completions, reminders, order, and active filter all survive together with no facet reverting alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "drag_reorder_persists_across_checkin"
description = "Reorder proof: drag a habit to a new position, note the order, complete a check-in on another habit — the order stays unchanged, proving order is live state rather than a hardcoded list"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "stats_and_trend_respond_to_checkin"
description = "Derived-view sensitivity: record a check-in and confirm Stats monthly completions and the trend chart's today value change meaningfully rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "checkin_echoes_grid_heatmap_stats"
description = "Cross-view echo: complete a habit check-in and confirm today's weekly-grid cell, Heatmap shading, and Stats monthly completions update without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "habit_count_delta_exact"
description = "Count-delta integrity: measure the visible habit list count immediately before and after a valid New Habit submit; the delta is exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "once_vs_count_targets_differ"
description = "Input-dependent output: create one Once a day habit and one numeric-target habit; the first shows a one-tap complete control and the second shows a stepper with n/target — outcomes differ as the targetType inputs dictate"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "export_import_preserves_session_state"
description = "Artifact pipeline: mutate the workspace (create habit, check-in, category filter), Export as JSON, confirm Workspace JSON contains schemaVersion loopdaily.workspace.v1 and the session's habit fields, then Import that document after confirmation and confirm list, filter, and Stats match"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_stats_track"
description = "Edge-state round-trip: with no habits the Stats empty message shows; after creating habits and check-ins, Stats numbers and the trend chart populate; pausing or clearing back toward empty updates those derived surfaces"
type = "binary"
weight = 1.0

