[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "At roughly 1440px and 375px viewport widths the habit shell remains usable: habit rows, category chips, and New Habit remain operable without broken overlap"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_checkin_targets_large_enough"
description = "At roughly 375px, one-tap complete, stepper plus/minus, category chips, and Export as JSON / Import controls present tap targets large enough for touch (approximately 44px or clearly comfortable)"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "type_readable_on_narrow"
description = "Habit names, fraction labels (n/target), and Stats numbers remain readable at both desktop and roughly 375px widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "heatmap_and_week_grid_unclipped"
description = "At narrow width the Heatmap month grid and the 7-day weekly grid remain fully visible without clipping cells or labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "view_chrome_adapts_narrow"
description = "Habits / Stats / Heatmap / Import view chrome adapts at narrow width (stacked or wrapped navigation) so destinations remain reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "habit_rows_single_column_narrow"
description = "At roughly 375px habit rows stack in a single column and the New Habit form remains fully usable without overlapping controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_tap_checkin_works"
description = "At roughly 375px, tapping one-tap complete and stepper controls updates today's completion state without requiring a desktop-only hover path"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At roughly 375px viewport width the app renders with no horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "stats_chart_fits_viewport"
description = "At narrow width the Stats numbers and completions trend chart fit the viewport without overflowing horizontally"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "recovery_controls_reachable_narrow"
description = "The recovery notice remains legible at narrow width with its Retry and Reset controls reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375"
description = "At roughly 375px the habit list, category chips, or New Habit form break with overlapping or unreachable controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_stepper_targets_too_small"
description = "At roughly 375px stepper or one-tap complete targets are too small or misaligned for reliable touch"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "narrow_habit_name_unreadable"
description = "Habit names or Stats labels shrink to unreadable sizes at narrow width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "heatmap_cropped_on_narrow"
description = "Heatmap month cells or the 7-day grid are cropped or force unnecessary horizontal scrollbars at narrow width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "view_nav_missing_on_narrow"
description = "Habits / Stats / Heatmap / Import navigation is missing or unusable at some narrow widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_toast_obscures_narrow_controls"
description = "Fixed toasts or banners permanently obscure primary check-in or Export controls at narrow width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "category_chips_overlap_rows"
description = "Category filter chips overlap habit rows or each other at some viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "narrow_checkin_requires_hover"
description = "At roughly 375px, completing a habit requires a hover-only control that cannot be activated by tap"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "trend_chart_static_overflow"
description = "The Stats trend chart uses a static width that overflows the viewport at narrow sizes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "export_controls_disappear_narrow"
description = "Export as JSON, Import, or Load Malformed Sample controls disappear at specific narrow sizes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
