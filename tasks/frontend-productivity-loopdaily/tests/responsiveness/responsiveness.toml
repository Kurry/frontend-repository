[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "At roughly 1440px and 375px viewport widths the habit shell remains usable: habit rows, category chips, and New Habit remain operable without broken overlap"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_checkin_targets_large_enough"
description = "At roughly 375px, one-tap complete, stepper plus/minus, category chips, and Export as JSON / Import controls present tap targets large enough for touch (approximately 44px or clearly comfortable)"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "type_readable_on_narrow"
description = "Habit names, fraction labels (n/target), and Stats numbers remain readable at both desktop and roughly 375px widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "heatmap_and_week_grid_unclipped"
description = "At narrow width the Heatmap month grid and the 7-day weekly grid remain fully visible without clipping cells or labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "view_chrome_adapts_narrow"
description = "Habits / Stats / Heatmap / Import view chrome adapts at narrow width (stacked or wrapped navigation) so destinations remain reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "habit_rows_single_column_narrow"
description = "At roughly 375px habit rows stack in a single column and the New Habit form remains fully usable without overlapping controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_tap_checkin_works"
description = "At roughly 375px, tapping one-tap complete and stepper controls updates today's completion state without requiring a desktop-only hover path"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At roughly 375px viewport width the app renders with no horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "stats_chart_fits_viewport"
description = "At narrow width the Stats numbers and completions trend chart fit the viewport without overflowing horizontally"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "recovery_controls_reachable_narrow"
description = "The recovery notice remains legible at narrow width with its Retry and Reset controls reachable"
type = "binary"
weight = 1.0

