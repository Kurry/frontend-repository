[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_habit_appears_under_category"
description = "Create flow: submitting a valid New Habit form under the field contract increases the list count by exactly one and the habit appears when its category chip is selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_habit_field_contract_blocks_create"
description = "Create flow: submitting a New Habit payload that fails the field contract (blank name, illegal targetCount, or over-length reminder) shows immediate inline validation naming the offending field and adds no habit"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "checkin_updates_grid_and_stats"
description = "Check-in flow: completing a Once a day habit updates today's weekly-grid cell, streak/flame treatment, and Stats monthly completions without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "pause_removes_from_list_and_stats"
description = "Pause flow: pausing a habit removes it from the main list and from the Stats active-streak count without deleting its history"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "habits_stats_heatmap_view_switch"
description = "View switch: opening Stats and Heatmap from the habits list shows those views with state retained for the selected habit, and returning to habits restores the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_list_after_clear_or_start"
description = "Edge: with no habits present, the empty-state invitation remains clear and visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "category_filter_narrows_list"
description = "Filter flow: selecting a category chip narrows the habit list to that category and selecting All restores every habit"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "export_import_artifact_round_trip"
description = "Artifact flow: after creating a habit with a distinctive name and a check-in, Export as JSON then Import of that Workspace JSON after confirmation reconstructs the same visible habits, category chips, check-in state, and Stats numbers"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "import_confirmation_overlay"
description = "Import confirmation overlay warns that current data will be replaced; Cancel leaves data untouched and Confirm only proceeds for a field-contract-valid document"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_banner_retry_reset"
description = "Recovery: when the recovery notice appears, Retry and Reset produce visible deterministic results without requiring a full page reload to regain a usable UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "new_habit_flow_unavailable"
description = "The New Habit create flow is not enabled from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "created_habit_missing_or_duplicated"
description = "A successfully submitted New Habit fails to appear in the list or duplicates on a single submit"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "checkin_desyncs_grid_and_stats"
description = "A check-in updates the habit card but not the weekly grid or Stats (or the reverse) until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_habits_list"
description = "Switching to Stats or Heatmap and back breaks the habits list layout or loses the active category filter"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_habits_breaks_ui"
description = "With no habits present, the main list or Stats view is broken or missing required empty-state copy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "category_filter_disagrees"
description = "The active category chip and the visible habit list disagree about which habits belong to the filter"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_omits_session_work"
description = "After creating a habit and recording a check-in, Export as JSON omits that habit's name or today's completion from the Workspace JSON"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "import_dialog_blocks_without_exit"
description = "The Import confirmation overlay blocks the app with no Cancel or dismiss path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "invalid_import_lacks_feedback"
description = "Importing a document that fails the Workspace JSON field contract provides no visible validation feedback naming the offending field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "recovery_requires_full_reload"
description = "Recovery from corrupted storage or Load Malformed Sample requires a full page reload to regain a usable UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
