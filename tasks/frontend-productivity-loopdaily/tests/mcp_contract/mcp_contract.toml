[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with browse_*, entity_*, form_*, and artifact_* prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_habit_ui"
description = "Exposed tool handlers call the same application logic as the visible UI: browse, entity, form, and artifact operations change the same habits collection, category filter, Stats/Heatmap destinations, and Import/Export surfaces the visible controls use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse destinations habits, stats, import, heatmap; filter category; entity habit with update/delete/toggle/quantity and fields name, reminder, paused; secondary entity category with create/delete; form fields name, icon, target-type, target-count, category, reminder with validate/submit/cancel; artifact import/export with import modes file and malformed-sample and export format json — no invented destinations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound browse, entity, form, and artifact tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_habit_ops_work"
description = "Entity operations declared for habit work: update, delete (requires confirm=true), toggle, and quantity update the visible habit list, check-in state, and paused membership"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_new_habit_ops_bound"
description = "Form operations validate, submit, and cancel for New Habit fields (name, icon, target-type, target-count, category, reminder) are bound and surface the same field-contract errors as the visible form"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_and_category_filter"
description = "Browse operations for destinations habits, stats, import, and heatmap, plus apply_filter/clear_filter for category, update the visible view and filtered habit list"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list (including no habit reorder tool), are exposed on the WebMCP surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for browse-query-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_habit_ui"
description = "Invoking a bound browse, entity, or form tool leaves habits, category filter, or check-in state diverging from what the equivalent visible UI control would produce"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings (browse habits/stats/import/heatmap; filter category; entity habit update/delete/toggle/quantity; secondary category create/delete; form validate/submit/cancel; artifact import/export) are exposed — for example a habit reorder tool"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared browse, entity, form, or artifact bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "form_submit_bypasses_field_contract"
description = "A form submit or entity update via WebMCP bypasses HabitUpsert field-contract validation, leaving MCP and UI state inconsistent or accepting illegal targetCount/name values"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test harness hacks rather than app-registered tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "One of browse-query-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is not implemented where declared required"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed so tools do not affect habits or export"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "artifact_export_not_bound"
description = "artifact export/import tools are missing or fail to drive Export as JSON / Load Malformed Sample confirm paths declared in bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
