[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "empty_state_before_first_habit"
description = "On load with no habits, the main list shows a friendly empty-state message inviting the user to create the first habit"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_once_daily_habit"
description = "After creating a habit with a name, an emoji icon from the fixed palette, and the Once a day target, it appears in the list with its chosen icon and a one-tap complete control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "one_tap_complete_toggles"
description = "After tapping the one-tap complete control, the habit shows a distinct filled/checked treatment for today and today's weekly-grid cell shows done; tapping it again the same day undoes the completion"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "stepper_fraction_below_target"
description = "After creating a numeric-target habit (e.g. target 8) and tapping +1 three times, the fraction reads 3/8 and the habit does not show the complete treatment until the target count is reached"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "category_chip_filters_list"
description = "After creating a category and assigning a habit to it, selecting that category's filter chip shows only that habit and visibly highlights the active chip; selecting All restores every habit"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "heatmap_reflects_todays_checkin"
description = "After completing today's check-in and opening the habit's Heatmap view, today's day cell renders a distinctly higher shading intensity than a not-done day in the same month"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "drag_reorder_survives_checkin_and_reload"
description = "After creating at least three habits, dragging one by its handle to a new position reorders the list; completing a check-in on a different habit leaves that order unchanged, and a full page reload shows the same order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "full_state_restored_after_reload"
description = "After creating habits, checking one in, assigning a category, and setting a reminder note, then performing a full page refresh, the habits, their completion state, category assignment, and reminder note are all restored exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "pause_resume_preserves_streak"
description = "After pausing a habit with an existing streak, it disappears from the main habit list without losing its history; after Resume, it reappears with its prior streak value intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "stats_reflect_new_checkin"
description = "After completing a check-in and opening the Stats view, it shows the number of active current streaks, the longest streak ever recorded, and total completions this calendar month, reflecting the just-recorded check-in"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "import_requires_confirmation"
description = "After exporting data as JSON and then importing that same file, a confirmation step warns the current data will be replaced before the import proceeds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "corrupted_storage_recovery_notice"
description = "When localStorage is seeded with malformed data for the app's storage key and the page is reloaded, the app shows a recovery notice in a role=alert live region with working Retry and Reset controls instead of a blank screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "malformed_sample_reports_outcome"
description = "After clicking Load Malformed Sample, a recovery outcome is announced in the role=alert live region rather than the app silently failing or crashing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "blank_name_inline_error"
description = "Submitting the New Habit form with a blank name is blocked with a visible inline error naming the name field rather than a silently disabled button, and no phantom habit is added to the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "heatmap_month_shading_levels"
description = "The Heatmap view renders a full calendar month of day cells whose shading reflects each day's completion, distinguishing fully done, partially done, and not-done, with future days rendered as a distinct not-yet-elapsed shade"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "weekly_grid_day_states"
description = "The weekly 7-day grid on a habit row covers today plus the six previous days, distinguishes done, missed, and not-yet-elapsed days, and marks today's cell distinctly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "checkin_disturbs_habit_order"
description = "Completing a habit's check-in changes the visible list order (rather than the completion action leaving order untouched)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "heatmap_hover_tooltip"
description = "Hovering a day cell in the Heatmap view shows a tooltip naming that date and its completion state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "new_habit_category_dropdown"
description = "The New Habit form includes a category dropdown, and the created habit is assigned to the category chosen at creation time"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "advance_day_control_present"
description = "The app exposes a manual advance-day, time-travel, or simulated-date control somewhere in the UI instead of computing streaks and calendars from the real device date"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "double_submit_creates_one_habit"
description = "Double-activating the New Habit submit control in quick succession creates exactly one habit: the list count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "stepper_floor_at_zero"
description = "A minus-one tap when a stepper habit's count for today is already zero leaves the count at zero rather than going negative"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "stats_empty_state_message"
description = "The Stats view with no habits created yet shows its own short message instead of blank or placeholder numbers"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "import_cancel_preserves_data"
description = "Cancelling the import confirmation step leaves the current habits, categories, and history untouched — no data is replaced"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "create_flow_multi_surface"
description = "Count the visible habits, then submit a valid New Habit form with a category assigned: the list count increases by exactly one measured immediately around the submit, the new habit appears when its category's chip is selected, and after a full page reload the habit is still present with the same name, icon, target, and category"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "once_daily_checkin_cross_surface"
description = "Completing a Once a day habit's check-in fills today's cell in its 7-day grid, updates its streak and flame treatment, increases the Stats view's total completions for the current month by exactly one, and updates the trend chart's value for today — all without a reload; a full page reload then restores the identical completed state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "stepper_target_cross_surface"
description = "Tapping +1 on a numeric-target habit until the count reaches the target switches the card to its complete treatment and marks today done in the 7-day grid, the Heatmap view, and the Stats monthly completions; a single -1 tap dropping the count below target then reverts the card, the grids, and the Stats numbers together"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "pause_flow_stats_and_reload"
description = "Pausing a habit removes it from the main list and from the Stats active-streak count without deleting its history; a full page reload preserves the paused state, and resuming restores the habit with its prior streak value intact, with that restored state also surviving a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "filter_and_facets_survive_reload"
description = "After selecting a category chip, setting a reminder note, and dragging habits into a new order, a full page refresh restores the active category filter along with all habits, categories, completion history, reminder notes, and habit order coherently — no single facet reverts while the others survive"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "trend_chart_input_sensitivity"
description = "Recording a check-in changes the trend chart's plotted value for today the next time the chart is viewed without a reload, and undoing that check-in changes it back — the chart is not an identical redraw regardless of its inputs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core habit-tracking functionality (creation, check-ins, categories, history views, reminders, ordering, pause, stats, or import/export) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
