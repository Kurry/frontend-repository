[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_4px_scale"
description = "At 1440px, padding and gaps among habit cards, category chips, and view chrome follow a consistent 4px-base scale matching the reference screenshots — not arbitrary one-off gaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "manrope_type_matches_spec"
description = "Habit names and view titles use Manrope (with the specified fallback stack) at roughly 28px-equivalent top-level and 20px section headings, with 16px body for list text — matching the reference type treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_habit_shell_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: habit list with cards on #F4F7F6 canvas, category filter bar, and Stats/Heatmap destinations — a habit tracker shell, not an unrelated marketing landing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — habit enter/exit, check-in toast, stepper progress, drag reorder settle, and milestone confetti — show the specified transitions rather than hard cuts when driven through real UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: habit rows single-column, Heatmap and 7-day grids still visible, Stats chart fitting the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "primary_secondary_button_treatments"
description = "Primary buttons (#0F9D74 filled background, white text, 8px radius, no shadow) and secondary buttons (transparent, 1px #64748B border) use the specified treatments rather than unstyled native control chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_titles_vs_body"
description = "Typography hierarchy clearly distinguishes habit/view titles from 16px body list text, counts, and helper copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "chip_and_card_states_match_spec"
description = "Active category chips, hover on rows/chips/buttons, complete treatment on check-in, and paused muted treatment are visually distinct as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_match_mint_palette"
description = "Surfaces match canvas #F4F7F6, card #FFFFFF, ink #1B2430, muted #64748B, primary accent #0F9D74, and secondary flame accent #FFB020 as in the reference"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover wash on chips/rows, toast slide/fade auto-dismiss, stepper fraction animation, and drag lift/settle follow the specified microinteraction timing when driven through real controls"
type = "binary"
weight = 1.0

