[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_list_kpi_export"
description = "Create flow: submitting Add User with a valid UserCreate payload adds exactly one All Users row, increases KPI Total by one, and both Session JSON and Users CSV previews include the new user without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_field_contract_errors"
description = "Create flow: invalid submission (empty required fields, firstName over 40, email missing domain dot, temporaryPassword under 8) shows immediate inline validation naming the field and adds no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Edit flow: saving Edit updates the table row, KPI strip, filtered views, and both export previews in the same session"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Delete flow: the user is removed from All Users, selection, KPI counts, and both export previews after deletion"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_filters_theme"
description = "View/mode switch: switching Operations Overview ↔ All Users keeps theme and previously set filters/sort until reload, with no full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_user_delete_or_zero_filter_empty_state"
description = "Edge: after deleting all users, or when filters and search match nothing, the list region shows an empty-state message explaining what belongs there instead of an empty/broken table."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_list_and_export"
description = "Edge: filtering by role or status reveals/hides items in All Users and Session JSON filters object reflects the active filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "drawer_chrome_preserves_workflow"
description = "Collapsible chrome: on a small viewport the sidebar hamburger can be hidden and reopened with workflow continuity"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_export_and_popovers"
description = "Overlays: notifications, profile, account, and export drawer open from their triggers, support expected close paths, and do not trap the user"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "import_recovers_exported_session"
description = "Recovery: after mutating then exporting Session JSON, a further local change can be corrected by Import of that JSON without requiring a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "mutation_to_export_pipeline"
description = "Mutation-to-export: create a distinctive-email user, delete another, open Export, and confirm schemaVersion pineapple-admin-analytics-v1, the new email present, deleted user absent, and KPI match"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after create/edit plus delete, Import the exported Session JSON and confirm All Users, KPIs, and both export previews match the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Create/edit/delete/export/import (or genre-equivalent primary flows) are not enabled from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "New users fail to show up in All Users or export previews, or duplicate on create"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "State changes are not synced across All Users, KPIs, and export previews"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "View/mode switching breaks layout or loses selection unexpectedly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying the collection produces broken or missing UI instead of the empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "user_filters_disagree"
description = "User search and status/role filters disagree about which rows are visible, or clearing filters fails to restore the full user list."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "Collapsed sidebar chrome cannot be re-opened on small viewports"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Export drawer or popovers block navigation with no exit option"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed create or import provides no user feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Navigation dead ends or requires reload for recovery after export/import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
