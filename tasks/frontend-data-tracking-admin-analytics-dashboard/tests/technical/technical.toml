[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All views derive from one shared collection: a status/role edit, create, or delete made in any view is immediately reflected in every other place it appears (table rows, badges, KPI counts, filtered views, export previews) without a reload, and filters/sort/bulk actions recompute the same visible list"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after seeding, creating, editing, and deleting users and toggling theme, and a page reload returns the app to its seeded state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "hydration_clean_console"
description = "The console is free of errors, warnings, and hydration mismatch messages on first load and stays clean after switching views and exercising create, edit, delete, filter, sort, export, import, and theme flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "direct_load_full_shell"
description = "Loading the served URL directly in a fresh tab always renders the complete dashboard shell (sidebar, header, main canvas) with its seeded data — never a blank page, half-rendered shell, or 404"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "cold_load_interactive_2s"
description = "The app is interactive (sidebar and header controls respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "rapid_input_stability"
description = "Under rapid repeated input (fast theme toggles, quick view switches, rapid filter changes, export tab switches), the UI stays responsive with no hangs and no view showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "keyboard_operability_focus"
description = "Every interactive control — sidebar items, header controls, table row actions, form fields, pagination, export drawer — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "escape_closes_returns_focus"
description = "Open popovers and the export drawer close on the Escape key and return keyboard focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "labels_and_error_association"
description = "Add/Edit form fields have visible labels, and each validation message names the field it belongs to and renders in association with that field"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "export_end_state_live_compile"
description = "Session JSON and Users CSV compile live from the current store: after a create or delete, reopening Export shows the mutation without requiring a reload"
type = "binary"
weight = 1.0

