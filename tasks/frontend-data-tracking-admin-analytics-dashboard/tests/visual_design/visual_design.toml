[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "overview_mosaic_asymmetric"
description = "Operations Overview keeps an asymmetric 12-column mosaic with mixed wide/medium/narrow card spans and one primary inverse Revenue run rate spotlight card; Users views use dense admin tables, filter toolbars, and form layouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "badge_and_empty_state_styling"
description = "Role and status use distinct badge treatments; empty list state is visually present when the collection or filter result is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "theme_surfaces_accent_wash"
description = "Both light and dark themes render coherent surface colors, and the main canvas shows a soft radial accent wash rather than a flat single-color background"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "chart_accent_palette"
description = "Overview chart cards draw from the specified accent palette (teal, amber, sky, rose, orange) rather than default or arbitrary chart colors"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "card_shadow_hairline_density"
description = "Cards across the dashboard show subtle layered shadows and hairline borders, and the composition uses stats, badges, progress, radial-progress, tables, and list rows for a dense ops-dashboard feel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "consistent_icons_local_avatars"
description = "One consistent icon set is used throughout the chrome, avatar images render from local assets, and the utility header shows a search pill plus circular ghost icon buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "responsive_drawer_breakpoints"
description = "At a 1440px-wide viewport the drawer sidebar is open by default; at a narrow viewport the sidebar collapses to a hamburger control that opens an overlay drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "tables_scroll_in_containers"
description = "At 375px viewport width, dense data tables scroll horizontally within their own containers rather than stretching the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_drawer_visual_chrome"
description = "The export drawer shows Session JSON and Users CSV tabs with a monospaced preview and Copy/Download actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "consistent_capitalization"
description = "Headings, buttons, and menu items follow one consistent capitalization convention (title case or sentence case) throughout the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "specific_action_labels"
description = "Action labels are specific verbs (Add user, Change status, Export session) rather than generic labels (Submit, OK) where a specific label is possible"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "validation_and_empty_state_copy"
description = "Validation messages name the offending field and the fix, and empty state copy explains what belongs in the region and how to add it"
type = "binary"
weight = 1.0

