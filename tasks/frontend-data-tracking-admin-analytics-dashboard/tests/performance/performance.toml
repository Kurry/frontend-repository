[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on local render"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors, warnings, or hydration mismatch messages on load or during a full exercise including export/import"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_and_export_transitions_responsive"
description = "View switches and export drawer open/tab switches respond without multi-second lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "export_preview_has_no_long_freeze"
description = "Opening the export drawer and switching Session JSON / Users CSV regenerates the preview without freezing the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_users_table_responsive"
description = "The seeded users table (at least 8 rows with pagination) renders and filters without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during create, delete, filter, sort, and theme changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "list_animations_maintain_smoothness"
description = "Create/delete/sort row animations remain smooth enough not to block interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "The app does not hang or freeze under rapid filter toggling, sort switches, or theme toggles"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "post_hydration_no_flash"
description = "After first paint there is no post-hydration content flash as the app becomes interactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before interaction is possible on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during create/edit/export flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "View or export transitions block or lag for multiple seconds"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "export_preview_hangs_ui"
description = "Export preview generation causes the UI to hang or freeze"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Filtering or sorting the users table kills interactivity"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during list or toast animation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while loading local resources on cold start"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory leaks or runaway browser resource usage occur during extended CRUD/export"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed while the shell or export preview is preparing"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "hydration_flash_visible"
description = "Post-hydration content flash or layout shift is visible after first paint"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
