[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing in the drawer shell, KPI strip, and overview mosaic follow a consistent scale, with no arbitrary one-off gaps that break the dense ops-dashboard rhythm visible in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography hierarchy for sidebar labels, KPI titles, table headers, and overview panel titles matches the dense admin register shown in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "At 1440px, Operations Overview mosaic composition and Users table chrome match the reference screenshots to within a small tolerance for section order and card span mix; text instruction wins on conflicts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the instruction calls out — create/delete row motion, sort reorder, theme toggle, and export drawer slide"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "color_palette_matches_reference"
description = "Light/dark surfaces, chart accents (teal/amber/sky/rose/orange), and badge treatments align with the reference screenshot palette language"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "component_styling_matches_reference"
description = "Drawer, stats, badges, tables, popovers, and form controls use the dense DaisyUI-style admin treatments shown in the reference rather than unstyled browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "iconography_matches_reference"
description = "Sidebar and header iconography matches the reference's consistent icon family treatment; avatars render as local images"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "overview_mosaic_fidelity"
description = "Operations Overview keeps the asymmetric mosaic and primary inverse Revenue run rate spotlight visible in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "users_table_fidelity"
description = "All Users KPI strip, filters, and table columns match the dense admin register composition in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "export_drawer_does_not_break_fidelity"
description = "When Export is closed, the shell still matches the reference; when open, the drawer overlays without destroying the underlying mosaic/table structure"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the dense ops-dashboard scale in the reference"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Colors appear outside the specified light/dark and chart accent palette language"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Sidebar width, KPI strip, or mosaic card sizing mismatches the reference composition grossly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required theme, popover, list, or export-drawer animations are missing or snap with no transition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls use bare browser default styles when the reference shows styled admin controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The grid or mosaic is misaligned at 1440px relative to the reference"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Elements render off-screen or clipped compared to the reference overview segments"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Operations Overview or Users chrome section order grossly mismatches the reference screenshots"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text have no distinction in the admin chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "export_overlay_destroys_shell"
description = "Opening Export permanently replaces the shell so returning to Overview/Users no longer matches the reference structure"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the reference screenshots that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
