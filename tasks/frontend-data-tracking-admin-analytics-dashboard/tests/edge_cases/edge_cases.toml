[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_is_present"
description = "Empty state UI is present and renders when all users are deleted or filters match nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_enforce_usercreate_contract"
description = "Add User and Edit User show inline per-field validation for the UserCreate field contract before submit, and submit stays blocked while invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and import error messages name the offending field and the violated rule rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Create, delete, export Copy, and successful import show visible confirmation or toast feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "export_preview_regenerates_without_blank"
description = "Opening Export session and switching Session JSON / Users CSV shows a regenerated preview rather than a blank or stuck panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "cancel_and_bulk_zero_selection_safe"
description = "Cancel on Add/Edit leaves the collection unchanged; bulk Change status/role/Delete with zero selected is disabled or a no-op"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "export_import_controls_discoverable"
description = "Export session and Import session controls are labeled so their purpose is discoverable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, labels, checkboxes, and export controls use semantic interactive elements"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Export drawer and popovers close via explicit close and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "bulk_and_create_feedback_steps"
description = "Bulk actions and create provide visible progress or completion feedback rather than a silent wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "bulk_export_zero_selected_opens_drawer"
description = "With zero rows checkbox-selected, activating bulk Export still opens the export drawer with both format tabs available"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "correcting_field_clears_inline_error"
description = "After an invalid Add User submit attempt, correcting the offending field clears that field's inline error without a reload and submit becomes available once all required fields are valid"
type = "binary"
weight = 1.0

