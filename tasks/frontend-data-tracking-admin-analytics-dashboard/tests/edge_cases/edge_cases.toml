[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_is_present"
description = "Empty state UI is present and renders when all users are deleted or filters match nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_enforce_usercreate_contract"
description = "Add User and Edit User show inline per-field validation for the UserCreate field contract before submit, and submit stays blocked while invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and import error messages name the offending field and the violated rule rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Create, delete, export Copy, and successful import show visible confirmation or toast feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "export_preview_regenerates_without_blank"
description = "Opening Export session and switching Session JSON / Users CSV shows a regenerated preview rather than a blank or stuck panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "cancel_and_bulk_zero_selection_safe"
description = "Cancel on Add/Edit leaves the collection unchanged; bulk Change status/role/Delete with zero selected is disabled or a no-op"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "export_import_controls_discoverable"
description = "Export session and Import session controls are labeled so their purpose is discoverable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, labels, checkboxes, and export controls use semantic interactive elements"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Export drawer and popovers close via explicit close and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "bulk_and_create_feedback_steps"
description = "Bulk actions and create provide visible progress or completion feedback rather than a silent wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty collection or zero-match filter shows nothing and provides no UI feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Create or import validation failures appear only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Create, delete, export Copy, or import succeed or fail with no visible UI feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Delete or bulk Delete removes users with no confirmation when the UI otherwise supports confirmations"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "double_submit_creates_duplicates"
description = "Double-activating Add User submit creates more than one user row"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "import_malformed_mutates_session"
description = "Importing malformed Session JSON or contract-violating users mutates the users collection as if import succeeded"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "bulk_with_zero_selection_fires"
description = "Bulk Change status/role/Delete with zero checked rows still mutates users"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "long_name_breaks_layout"
description = "A firstName or lastName of 40 characters overflows or breaks the table row layout instead of truncating readably"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "export_empty_users_errors"
description = "With zero users, opening Export session errors or fails to show header-only CSV / empty users array JSON"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "validation_feedback_missing_or_delayed"
description = "Field-contract validation feedback is missing or delayed with no UI indication on invalid Add User"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "bulk_export_zero_selected_opens_drawer"
description = "With zero rows checkbox-selected, activating bulk Export still opens the export drawer with both format tabs available"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "correcting_field_clears_inline_error"
description = "After an invalid Add User submit attempt, correcting the offending field clears that field's inline error without a reload and submit becomes available once all required fields are valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
