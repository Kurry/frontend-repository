[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seeded"
description = "Multi-facet round-trip: create a user, apply a status filter, switch sort, toggle theme, and open Export, then reload — all facets coherently reset to the seeded baseline (at least 8 users, default theme, default view), never a mix of kept and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort All Users by Name A-Z, note the order, then sort by Newest; the order differs correctly relative to Name A-Z, proving sort is derived from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_preview_tracks_user_mutations"
description = "Derived-view sensitivity: create a user named Probe Alpha then open Export — Session JSON and Users CSV both contain Probe Alpha; delete that user and both previews no longer contain that name"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_list_kpi_export"
description = "Cross-view echo: edit a user's name and status and confirm the new values appear in the table row, KPI strip, and both export previews without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_is_exact"
description = "Count-delta integrity: measure All Users row count and KPI Total immediately before and after Add User; both deltas are exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_emails_change_exports"
description = "Input-dependent output: create two users with different emails and confirm both distinct emails appear in All Users and in Session JSON / Users CSV"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_overview"
description = "Interleaved-flow integrity: start Add User, switch to Operations Overview and back, finish Create, then confirm the new user exists and overview remains usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_tracks_kpi_export"
description = "Edge-state round-trip: delete every user (empty state + KPI Total 0), then create one valid user; the KPI strip and export user list track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_pipeline_end_state"
description = "Full pipeline: mutate (create or edit), open Export, confirm Session JSON contains the mutation with schemaVersion pineapple-admin-analytics-v1, Import that JSON after a further local change if needed, and confirm users, KPIs, and both export previews match the imported session"
type = "binary"
weight = 1.0

