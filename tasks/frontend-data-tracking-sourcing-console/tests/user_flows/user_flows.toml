[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "sourcing_flow_to_export"
description = "Sourcing flow end to end: score a Candidate, select it, pin it through the confirm dialog, queue it, and confirm at each step that the status chip, rollup strip, matching quota cell, and timeline update without a reload; then open Export sourcing pack and confirm Queue JSON names that repository in the queue array with its frozen commit and matching queuePosition"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "rejection_validation_blocks_invalid"
description = "Reject flow: opening Reject and submitting with no reason shows an inline message naming the reason field and leaves the row Scored; submitting with a chosen reason moves it to Rejected showing that reason on the row and in the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "quota_drilldown_then_select"
description = "Quota drill-down: activate an unfilled quota cell, confirm the candidates view opens filtered to that language and band, select an eligible Scored row, return to quota, and confirm that cell's achieved count and fill bar increased by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "queue_remove_updates_surfaces"
description = "Queue remove flow: remove a queued entry and confirm the chip returns to Selected, positions renumber contiguously, queue-length rollup decreases by one, and the timeline records the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_queue_order"
description = "View switch: after reordering the build queue, navigate to quota or timeline and back to candidates; the queue order and position numbers remain exactly as left, with no document reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "filtered_empty_state_recoverable"
description = "Edge: apply filters and search that match no candidates; the empty state names the active filters and offers clear; clearing restores the full seeded table"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_and_search_update_table"
description = "Filter and search: combining language, difficulty band, and name-search narrows the table to the intersection, and clearing restores the prior full count"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "queue_panel_collapse_preserves_workflow"
description = "At widths of 768px and below, the build-queue region collapses into a toggleable panel; hiding and reopening it preserves queue order and still allows move and remove actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "pin_and_export_overlays_behave"
description = "Overlays: the pin confirm dialog, command palette, and export/import panels open from their controls, support cancel/Escape without corrupting status, and after a successful pin or export copy a confirmation toast appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "guard_then_reject_recovers"
description = "Recovery: after a blocked Select on a duplicate-cluster candidate, rejecting that candidate with duplicate-cluster succeeds; the row reads Rejected, rollups update once, and no reload is required"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "bulk_then_undo_flow"
description = "Bulk then undo: select 3 guard-eligible Scored rows, apply Bulk Select, confirm Selected rises by exactly 3 and the tray clears; Undo restores all three chips and the rollup"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_flow"
description = "Import round trip: export Queue JSON, change a status, import the earlier JSON or seeded sample, and confirm statuses and queue order return to the pack with rollups agreeing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "command_palette_jump_flow"
description = "Command palette jump: open with Control-K or Command-K, type enough to match Quota, choose it, and land on the quota view with the palette closed"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Score, Select, Reject, Pin, Queue, Export sourcing pack, or Import sourcing pack cannot be completed from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "queued_entries_missing_or_duplicated"
description = "Queueing a pinned candidate fails to append a queue entry, or appends a duplicate position for the same repository"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "After a status transition, the table chip, rollup strip, quota cell, and timeline disagree about the new status"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_queue"
description = "Switching between candidates, quota, and timeline loses the build-queue order or resets filters unexpectedly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_filter_breaks_ui"
description = "A filter combination matching zero candidates leaves a blank broken table region with no empty state or clear control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The candidates table row set under active filters disagrees with what the same filters imply for quota drill-down results"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_queue_cannot_reopen"
description = "After the build-queue panel collapses at narrow width, it cannot be reopened from the header"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "The pin dialog, command palette, or export panel blocks navigation with no Escape or cancel exit"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A blocked Select, invalid rejection submit, or invalid import provides no visible inline explanation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "After a guard block, cancelled pin, or failed import, the operator cannot continue without reloading the page"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
