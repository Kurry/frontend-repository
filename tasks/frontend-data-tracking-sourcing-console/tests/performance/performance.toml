[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load: navigation and table controls respond"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load"
description = "No console errors or warnings appear on first load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise including fetch-more, bulk actions, command palette, export, and import"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "sort_filter_search_smooth"
description = "Sorting, filtering, and name-search stay smooth with the full seeded table plus fetch-more appends; no interaction hangs the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "rapid_input_stable"
description = "Rapid repeated input — fast filter changes, quick view switches, rapid queue reorders, palette open/close — causes no dropped interactions or stale counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "export_regenerates_without_freeze"
description = "Opening Export sourcing pack regenerates Queue JSON, Candidates CSV, and Sourcing report from live state without freezing the UI for more than a brief moment"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "fetch_more_stays_responsive"
description = "During a fetch-more run the UI remains responsive enough to show step status changes without locking the entire chrome permanently"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "bulk_action_updates_promptly"
description = "Bulk Score/Select/Reject updates chips and rollups in the same interaction without multi-second UI lock"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "import_applies_without_hang"
description = "A valid import applies statuses and queue order without hanging the page or leaving a permanent spinner"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "undo_redo_feels_immediate"
description = "Undo and Redo restore or reapply state without multi-second delay or frozen chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_start_exceeds_two_seconds"
description = "Cold load to interactive controls takes more than 2 seconds on a local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_on_load"
description = "Console errors or warnings appear on first load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "console_errors_during_exercise"
description = "Console errors or warnings appear during fetch-more, bulk, export, or import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "sort_or_filter_hangs_ui"
description = "Sorting, filtering, or search hangs the UI or drops frames badly enough that controls stop responding"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "rapid_input_drops_interactions"
description = "Rapid filter or view switching drops interactions or leaves a surface with stale counts another surface already updated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "export_freezes_ui"
description = "Opening Export sourcing pack locks the UI for multiple seconds while the three tabs stay empty or show pre-mutation text"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "fetch_more_locks_chrome"
description = "During fetch-more, navigation stays locked after steps should have completed, or step indicators remain stuck in running without reaching complete"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "bulk_action_multi_second_lock"
description = "A bulk tray action locks the UI for multiple seconds before chips and rollups update"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "import_hangs_or_spins_forever"
description = "After confirming Import, a permanent spinner remains on screen with no applied state and no inline error message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "undo_redo_unresponsive"
description = "Undo or Redo ignores activation or freezes the chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
