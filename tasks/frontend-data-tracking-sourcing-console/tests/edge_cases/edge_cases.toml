[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "filter_empty_state_names_filters"
description = "When filters and search match no candidates, the table region shows an empty state naming the active filters and offering the clear control rather than a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "rejection_and_pin_validate_inline"
description = "Rejection with no reason and pin notes longer than 200 characters show inline validation naming the reason or notes field before any status change"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Validation and import errors name the violated field (reason, notes, schemaVersion, status, or license) and what to fix rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation_toasts"
description = "Successful pin, queue, copy, bulk, import, and export-copy actions show a visible confirmation toast that auto-dismisses"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "fetch_more_shows_step_progress"
description = "Fetch more candidates shows the Querying, Scoring, and Classifying steps advancing pending to running to complete while the control stays disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "cancel_and_undo_recover"
description = "Cancelling the pin dialog or rejection form leaves status unchanged, and Undo is available after a completed status transition or bulk action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "guards_explain_cluster_and_org"
description = "Blocked Select attempts show an inline explanation naming the cluster guard with cluster id and holding repository, or the org cap of 3 and the org"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Navigation, row actions, checkboxes, selects, and dialog buttons use semantic button, input, or select elements rather than clickable plain text alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modals_support_escape_and_cancel"
description = "Pin confirm, command palette, and export/import panels close via Escape or an explicit cancel/close control without changing underlying status when cancelled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "fetch_more_and_import_show_progress"
description = "Long flows — fetch-more steps and import validation/apply — provide visible progress or completion feedback rather than a silent wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "queue_end_moves_inert"
description = "Move-up on the first queue entry and move-down on the last are disabled or inert; positions never leave a contiguous 1 to N sequence"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "invalid_import_leaves_state"
description = "Importing JSON with schemaVersion other than sourcing-pack/v1 or an illegal status token shows an inline message and leaves every surface unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "select_all_respects_filter"
description = "Select-all on a filtered table selects only the visible subset; clearing filters does not silently keep previously hidden rows selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_filter_has_no_feedback"
description = "A no-match filter state shows a blank table with no empty-state message and no clear control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Validation, guard, or import failures appear only in the browser console with no inline UI message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Pin, queue, copy, bulk, or export-copy succeeds or fails with no toast or other visible confirmation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_queue_remove_lacks_feedback"
description = "Removing a queue entry changes state with no visible update to the chip, positions, or rollup"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Primary actions such as Score, Select, Export, or queue move controls are only non-semantic div or span click targets with no button or link role"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "The pin dialog, command palette, or export panel cannot be dismissed via Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "An invalid rejection submit or invalid import leaves the form or panel with no inline field message at the moment of failure"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Row or tray action controls lack readable labels such as Score, Select, Reject, Pin, Queue, Export, or Import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "guard_flows_lack_guidance"
description = "A blocked Select shows no explanation naming the cluster or org constraint"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Bulk checkboxes, Undo/Redo, Export, or Import controls are visually hidden or not operable when the instruction requires them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
