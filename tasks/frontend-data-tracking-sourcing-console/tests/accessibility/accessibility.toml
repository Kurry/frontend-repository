[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — navigation, sortable headers, filter and search controls, row actions and checkboxes, rejection select, dialog fields, queue move and remove, bulk tray actions, Undo and Redo, Export and Import, copy controls, and command palette results — is reachable and operable with the keyboard alone with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "The pin confirm dialog, command palette, and export/import panels trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls such as copy, queue move, and close affordances expose an accessible name via aria-label or equivalent text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Fetch-more completion, bulk actions, successful import, export copy, and keyboard queue reorders are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Rejection reason, pin notes, import paste, name-search, and filter controls have visible labels associated with their fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "View titles and section headings in candidates, quota, timeline, and export panels follow a logical heading order without skipping levels in a confusing way"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "status_not_color_alone"
description = "Status chips always include their label text so Candidate through Queued is never conveyed by color alone; pass/fail style distinctions in guards use text as well as caution styling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "sort_state_exposed"
description = "Sortable name, stars, and difficulty headers expose their active sort column and direction programmatically"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "focus_visible_on_chrome"
description = "Keyboard focus shows a visible ring on buttons, selects, checkboxes, queue controls, and palette results"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "queue_reorder_keyboard_announced"
description = "Queue reordering is fully achievable via move-up and move-down without a pointer, and a reorder is announced via a polite live region naming the entry and its new position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "keyboard_traps_outside_dialogs"
description = "Focus is trapped in a non-dialog region so the operator cannot reach navigation or the queue panel with the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "dialogs_lose_focus_on_open"
description = "After opening the pin dialog, command palette, or export panel, keyboard focus remains on the underlying page instead of moving into the overlay"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "icon_controls_lack_names"
description = "Icon-only copy or queue-move controls have no accessible name"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "status_conveyed_by_color_only"
description = "A status chip omits its text label and relies on color alone to convey Candidate, Scored, Selected, Rejected, Pinned, or Queued"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "forms_missing_labels"
description = "The rejection select, pin notes field, or name-search input has no associated accessible label"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "live_region_missing_for_async"
description = "Fetch-more completion, bulk apply, import success, or keyboard reorder has visual feedback but no live-region announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "focus_indicator_absent"
description = "Keyboard focus on primary controls shows no visible focus indicator"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "escape_does_not_close_overlay"
description = "Escape fails to close the pin dialog, command palette, or export/import panel"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "sort_state_not_programmatic"
description = "Active sort column and direction are visible only graphically with no programmatic exposure on the header"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "queue_keyboard_reorder_unavailable"
description = "Queue reordering cannot be completed with the keyboard move controls alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
