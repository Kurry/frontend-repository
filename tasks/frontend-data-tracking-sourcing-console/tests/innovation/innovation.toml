[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "quota_pressure_sparklines"
description = "Beyond the required fill bars, quota cells or a summary strip show a compact trend or pressure cue that helps operators spot underfilled bands at a glance"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "cluster_map_or_graph"
description = "Beyond the inline cluster-guard message, the app offers a cluster map or grouping visualization that shows which repositories share a cluster id"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_sourcing_coachmarks"
description = "A short guided coachmark or checklist walkthrough highlights Score → Select → Pin → Queue → Export for first-time operators without blocking power use"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "queue_diff_preview"
description = "Before import apply or after a bulk action, a diff preview names which statuses and queue positions will change"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_chord_cheatsheet"
description = "A discoverable keyboard cheatsheet documents Control-K/Command-K, Undo/Redo chords, and queue move shortcuts"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "export_checksum_or_fingerprint"
description = "Exported Queue JSON includes a visible integrity fingerprint or content hash of the pack that changes when session mutations change the export"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "saved_filter_presets"
description = "Operators can save and reapply named filter-plus-search presets beyond the one-off clear control"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "org_diversity_dashboard"
description = "A compact org diversity readout shows how close each org is to the cap of 3 before a Select is attempted"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "timeline_filter_chips"
description = "The timeline view offers filter chips by transition type (score, select, reject, pin, queue, import) beyond the plain newest-first list"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "compare_two_exports"
description = "A lightweight compare mode highlights differences between two exported Queue JSON snapshots from the same session"
type = "binary"
weight = 1.0


[[criterion]]
id = "11.n1"
name = "gimmick_breaks_sourcing_flows"
description = "An optional flourish (coachmark, overlay, or extra viz) intercepts Score, Select, Pin, Queue, Export, or Import so the primary sourcing flow cannot complete without dismissing a blocking layer that has no skip path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app includes an additional browser-observable delight, power-user, or operator-efficiency enhancement in the sourcing console that is NOT covered by any other criterion in this file and goes beyond the written specification. If present, name the enhancement and cite the concrete evidence. If nothing beyond the spec is present, answer no."
type = "binary"
weight = 1.0
