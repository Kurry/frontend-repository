[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "sourcing_console_register"
description = "The app presents a dense sourcing-console layout: a header bar with product name, navigation for candidates, quota, and timeline, Undo and Redo, Export and Import, a dedicated build-queue region visible at desktop width, and data-dense surfaces (table, matrix grid, ordered queue list) rather than sparse marketing-style spacing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "status_and_license_chips_distinct"
description = "The six status chips are visually distinguishable from one another without reading their labels; license chips use a visually lighter treatment than status chips so the two chip families do not read as one system; and guard explanations render in a caution treatment distinct from validation errors and success notices"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "quota_matrix_visual_system"
description = "The quota grid reads as a matrix with language labels on one axis and the three band labels on the other, uniform cell sizing, fill bars sharing one visual treatment, unfilled cells clearly highlighted, and an oversubscription indicator visually distinct from the unfilled highlight"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "typography_hierarchy_monospace_ids"
description = "View titles are visibly larger than section headings, which are larger than row and label text, consistently across views, and repository names and commit hashes render in a monospaced face"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "component_state_treatments"
description = "Buttons, selects, sortable headers, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "responsive_queue_collapse_no_overflow"
description = "At 768px width the build-queue region collapses into a toggleable panel reachable from the header, and at 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears, with the candidates table scrolling inside its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "overlapping_or_clipped_content"
description = "At 1440px or 375px width, any text, chip, fill bar, or control overlaps another element or is clipped by its container"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.8"
name = "default_kit_styling_unthemed"
description = "The UI reads as unstyled defaults: browser-default form controls, a single flat unbranded surface, or component chrome with no cohesive palette or identity applied across the three views"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.9"
name = "panels_share_surface_language"
description = "The bulk action tray, command palette, and export/import panels use the same surface and border language as the rest of the app rather than unstyled browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "real_product_copy_no_lorem"
description = "All rendered copy is real product copy with no lorem ipsum or placeholder text; validation messages name the field and the fix; empty states explain what belongs in the region"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "inconsistent_chip_or_panel_language"
description = "Bulk tray, palette, or export panels visually clash with the header/table chrome as if from a different product, or status/license chip families collapse into one indistinguishable style"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
