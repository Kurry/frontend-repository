[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_use_consistent_capitalization"
description = "Where the app renders headings and section titles (Candidates, Quota, Timeline, Export sourcing pack, Import sourcing pack), they use consistent capitalization throughout"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders button or action labels, they use specific verbs such as Score, Select, Reject, Pin, Queue, Fetch more candidates, Export sourcing pack, and Import sourcing pack rather than generic Submit or OK when a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders validation or guard messages, they name the field or constraint (reason, notes, schemaVersion, cluster id, org cap) and the fix"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states (no filter matches, empty queue, palette no matches), they explain what belongs there and what action produces content"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "status_chips_use_exact_tokens"
description = "Where status chips render, they use the exact tokens Candidate, Scored, Selected, Rejected, Pinned, and Queued"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.6"
name = "license_chips_use_exact_labels"
description = "Where license chips render, they use Permissive, Weak copyleft, Strong copyleft, or Unlicensed"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "rejection_reasons_use_exact_tokens"
description = "Where rejection reasons render on rows or in forms, they use the exact tokens license-blocked, gui-heavy, network-dependent, duplicate-cluster, and too-large"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "no_lorem_or_placeholder_copy"
description = "Where the app renders product copy, there is no lorem ipsum or placeholder text such as TODO or Coming soon in chrome, empty states, or panels"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "generic_submit_ok_labels"
description = "Primary actions that could be specific still read only as Submit or OK across the rejection, pin, or export flows"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "errors_are_opaque"
description = "Validation or guard messages say only Invalid or Error without naming the field or constraint"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "empty_states_are_blank"
description = "An empty filter, queue, or palette result region is blank with no explanatory copy"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "status_tokens_drift"
description = "Status chips use drifted labels such as New or Done instead of the mandated Candidate through Queued tokens"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n5"
name = "placeholder_or_lorem_copy_present"
description = "Lorem ipsum, TODO, or Coming soon placeholder copy appears in the UI"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable writing or microcopy defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 0.5
