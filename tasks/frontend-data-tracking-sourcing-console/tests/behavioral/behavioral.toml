[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seeded"
description = "Multi-facet round-trip: change the active view, apply a language filter plus name-search, select a Scored candidate, and queue a pinned row, then reload; all facets coherently reset to the seeded baseline (seeded statuses, default filters and search, seeded queue/timeline, empty undo history) with no mix of surviving and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort candidates by difficulty ascending, note the order, then sort descending; the order reverses correctly relative to ascending without changing the visible row count, proving sort is derived from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "quota_and_export_track_inputs"
description = "Derived-view sensitivity: select an eligible Scored candidate and confirm the matching quota cell's achieved count and fill bar increase by exactly one and the rollup Selected count increases by one; open Export sourcing pack and confirm Queue JSON quotaFillPercent and candidates statuses reflect that selection rather than redrawing the pre-select export identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: pin and queue a candidate on the candidates view, switch to timeline and confirm the pin and queue transitions appear newest-first, switch to quota and confirm the language/band cell still counts the queued candidate, then open Export and confirm the queue array names that repository — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the Selected rollup and a quota cell's achieved count immediately before and after Select on an eligible Scored row; both increase by exactly one with no off-by-one or lagging counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_rejection_reasons_differ"
description = "Input-dependent output: reject two different Scored candidates with two different reasons (for example license-blocked vs too-large); the two rows show different reason labels, the timeline entries record different rejectionReason values, and Export Queue JSON lists those distinct rejectionReason strings"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: open the pin confirm dialog for candidate A, switch to the quota view without confirming, reject candidate B with duplicate-cluster, return and cancel A's pin dialog; B is Rejected with the reason shown and A remains Selected with no pin hash, and rollups agree"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "queue_empty_to_repopulated"
description = "Edge-state round-trip: remove every queued entry until the build-queue panel is empty and the queue-length rollup is 0, then pin and queue a candidate again; the queue shows position 1, the rollup reads 1, and Export Queue JSON queue array length is 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "mutate_export_pipeline"
description = "Full-pipeline probe: score, select, pin, and queue one candidate, reject another with gui-heavy, open Export sourcing pack; Queue JSON contains the queued name with commit and queuePosition, the rejected name with rejectionReason gui-heavy, and quotaFillPercent matching the rollup; Copy places that exact JSON text on the clipboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip"
description = "Round-trip probe: export Queue JSON, change at least one status in the UI so the table differs from the export, import the earlier JSON (or seeded sample that matches it), and confirm statuses, queue order, commits, and rollups return to the pack; exporting again yields the same queue order and status set"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_after_bulk"
description = "Undo round-trip: Bulk Select three guard-eligible Scored rows, confirm Selected rises by exactly 3, Undo once, and confirm all three chips and the Selected rollup restore exactly; Redo restores the bulk selection again"
type = "binary"
weight = 1.0

