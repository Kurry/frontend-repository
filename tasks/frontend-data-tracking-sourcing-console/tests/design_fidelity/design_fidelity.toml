[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_rhythm_consistent"
description = "Spacing between table rows, quota cells, queue entries, and header controls follows a consistent rhythm with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_hierarchy_matches_spec"
description = "View titles are visibly larger than section headings, which are larger than row and label text, and repository names and commit hashes use a monospaced face"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_sourcing_register"
description = "Layout matches the sourcing-console register: header with product name and view navigation, dedicated build-queue region at desktop width, and dense data surfaces for table, quota matrix, and timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Pin dialog, palette, export panel, queue reorder, fetch-more steps, status chip changes, bulk tray, and toasts use the motion treatments the instruction specifies"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "status_license_chip_system"
description = "Six status chips are visually distinct; license chips are lighter; guard messages use a caution treatment distinct from validation errors and success notices"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "quota_matrix_fidelity"
description = "Quota grid shows language-by-band matrix layout, uniform cells, shared fill-bar treatment, unfilled highlight, and distinct oversubscription indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "panels_match_chrome_language"
description = "Bulk tray, command palette, and export/import panels share the same surface and border language as the header and table rather than unstyled browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_complete"
description = "Buttons, selects, headers, and fields show distinct default, hover, focus, disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "iconography_consistent"
description = "One consistent icon set is used across header actions, row actions, queue controls, and toasts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "real_product_copy_only"
description = "Rendered copy is real product language with no lorem ipsum; empty states and validation messages match the instruction's voice"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_chaotic_or_orphaned"
description = "Table, quota, or queue regions show chaotic gaps, overlapping controls, or orphaned isolated elements"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "typography_flat_or_inconsistent"
description = "View titles, headings, and body text share one size with no hierarchy, or mono faces are missing on repository names and hashes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "layout_not_sourcing_console"
description = "The first desktop view reads as a sparse marketing page or generic dashboard without the sourcing-console header, table, and queue register"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "motion_spec_ignored"
description = "Specified transitions for pin dialog, queue reorder, fetch-more steps, or toasts are entirely absent when exercised through real UI controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "chips_indistinguishable"
description = "Status chips are visually indistinguishable from each other or from license chips without reading labels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "quota_not_matrix"
description = "Quota view renders as a plain list or unrelated chart without a language-by-band matrix, fill bars, and unfilled/oversubscribed treatments"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "panels_unstyled_defaults"
description = "Command palette or export/import panels render as unstyled browser defaults disconnected from the app chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "missing_component_states"
description = "Interactive controls lack distinct hover, focus, or disabled treatments"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "mixed_icon_styles"
description = "Icons mix unrelated styles or raw inconsistent SVGs across chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "placeholder_copy_in_chrome"
description = "Placeholder or lorem copy appears in headers, empty states, or panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable design-fidelity defect relative to the instruction's visual system that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
