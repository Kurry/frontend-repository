[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_rhythm_consistent"
description = "Spacing between table rows, quota cells, queue entries, and header controls follows a consistent rhythm with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_hierarchy_matches_spec"
description = "View titles are visibly larger than section headings, which are larger than row and label text, and repository names and commit hashes use a monospaced face"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_sourcing_register"
description = "Layout matches the sourcing-console register: header with product name and view navigation, dedicated build-queue region at desktop width, and dense data surfaces for table, quota matrix, and timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Pin dialog, palette, export panel, queue reorder, fetch-more steps, status chip changes, bulk tray, and toasts use the motion treatments the instruction specifies"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "status_license_chip_system"
description = "Six status chips are visually distinct; license chips are lighter; guard messages use a caution treatment distinct from validation errors and success notices"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "quota_matrix_fidelity"
description = "Quota grid shows language-by-band matrix layout, uniform cells, shared fill-bar treatment, unfilled highlight, and distinct oversubscription indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "panels_match_chrome_language"
description = "Bulk tray, command palette, and export/import panels share the same surface and border language as the header and table rather than unstyled browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_complete"
description = "Buttons, selects, headers, and fields show distinct default, hover, focus, disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "iconography_consistent"
description = "One consistent icon set is used across header actions, row actions, queue controls, and toasts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "real_product_copy_only"
description = "Rendered copy is real product language with no lorem ipsum; empty states and validation messages match the instruction's voice"
type = "binary"
weight = 1.0

