[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_candidates_columns_complete"
description = "On load, the candidates table shows at least 25 seeded rows with fictional org-slash-repo names, and each row shows language, star count, a difficulty score from 0 to 10 to one decimal, category, cluster id, a license chip reading Permissive, Weak copyleft, Strong copyleft, or Unlicensed, and a status chip reading Candidate, Scored, Selected, Rejected (with its reason), Pinned, or Queued"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "sort_round_trip_with_indicator"
description = "Scripted probe: click the difficulty column header and confirm rows sort by difficulty with a visible direction indicator; click it again and confirm the order reverses relative to the first click without changing the visible row count; sorting by stars behaves the same"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "combined_filters_search_and_clear"
description = "Filtering by a language plus a difficulty band (Easy 0-3.9, Medium 4-6.9, Hard 7-10) narrows the table to rows matching both; adding a license or status filter or a name-search substring narrows it further; the clear control restores the full table with the pre-filter row count; when filters and search match nothing an empty state names the active filters and offers the clear control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "score_select_transitions_update_everywhere"
description = "Scripted probe: use Score on a Candidate row and confirm its chip reads Scored and its difficulty is revealed; use Select on a Scored row and confirm the chip reads Selected, the rollup Selected count increases by exactly one, the matching quota cell's achieved count increases by exactly one, and the timeline gains one entry recording the old and new status — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "rejection_reason_constrained_select"
description = "The Reject form's reason control is a constrained select offering exactly license-blocked, gui-heavy, network-dependent, duplicate-cluster, and too-large with no free-text entry; submitting with no reason shows an inline message naming the reason field and changes no status; submitting with a reason moves the row to Rejected showing that reason; the submitted rejection payload is that required reason enum value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "timeline_records_status_changes"
description = "The timeline view lists status-change entries newest first, each showing time, repository name, old status, new status, and the rejection reason when there is one, and a newly performed transition appears at the top without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "quota_grid_cells_render"
description = "The quota view shows a language-by-band grid where each cell reads achieved of target with a fill bar proportional to achieved over target, cells below target carry a visible unfilled highlight, and at least one seeded cell shows an oversubscription indicator because its achieved count exceeds 1.5 times its target"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "quota_cell_click_filters_table"
description = "Activating a quota cell switches to the candidates view with the language and difficulty-band filters set to that cell so the table shows exactly the matching rows, with the active filters visible and clearable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "cluster_guard_blocks_selection"
description = "Scripted probe: select a Scored candidate, then attempt to Select a second Scored candidate with the same cluster id; the second attempt shows an inline explanation naming the cluster guard, the cluster id, and the already-holding repository, and the second row's chip, the rollups, the quota grid, and the timeline are all unchanged; attempting to Select a candidate whose org already holds 3 candidates in Selected, Pinned, or Queued status is blocked the same way, with the explanation naming the org cap of 3 and the org"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "pin_dialog_hash_and_copy"
description = "The Pin action on a Selected row opens a confirm dialog showing the repository name, an automatically generated fictional 12-character lowercase hex commit hash, and an optional notes field capped at 200 characters with the confirm control disabled until the dialog is valid; notes longer than 200 characters show an inline message naming the notes field and do not pin; after confirming, the row reads Pinned and shows the frozen hash with a copy control that places the exact hash on the clipboard with visible confirmation; cancelling the dialog leaves status, queue, and timeline unchanged, and rapidly double-activating the confirm control pins exactly once"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "queue_append_positions_metadata"
description = "Using Queue on a Pinned row moves it to Queued and appends it to the build-queue panel, where each entry shows a position number, repository name, difficulty score, and cluster id, and positions run contiguously from 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "queue_reorder_persists_across_views"
description = "Scripted probe: with at least three queued entries, move the third entry to position one by dragging or by the keyboard move controls, confirm positions renumber contiguously in the new order, navigate to another view and back, and confirm the order persists"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "queue_remove_returns_to_selected"
description = "Scripted probe: remove a queue entry and confirm the candidate's chip returns to Selected, the queue renumbers contiguously, the queue-length rollup decreases by exactly one, and the affected quota cell keeps counting the candidate (still Selected) while the timeline records the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "rollup_strip_derives_live"
description = "The rollup strip shows one count per status, the overall quota fill percentage to the nearest whole percent, and the queue length, and after any transition (select, reject, pin, queue, remove, bulk, undo, import) every rollup value agrees with the table and updates in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "fetch_more_run_appends_coherently"
description = "Scripted probe: record the table row count, start Fetch more candidates, confirm a progress list steps Querying then Scoring then Classifying from pending to running to complete in order while the control is disabled, and on completion exactly 6 new fictional candidates appear in the table with the rollups and quota grid updated to include them; a second run appends 6 further distinct candidates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "bulk_tray_select_and_actions"
description = "Scripted probe: select at least two visible Candidate or Scored rows with checkboxes (or select-all-visible on a filtered table) and confirm the bulk tray shows the live selected count; Bulk Score moves selected Candidate rows to Scored; Bulk Select moves only guard-eligible Scored rows to Selected while blocked rows stay Scored with their own guard explanation; Bulk Reject applies one chosen reason to selected Scored rows; after a bulk action the tray clears and rollups, quota, and timeline update by exactly the changed rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "undo_redo_restores_surfaces"
description = "Scripted probe: perform a Select (or Bulk Select), note the Selected rollup and chips, activate Undo, and confirm chips, rollups, quota cells, and timeline length return to their prior values; Redo reapplies the same change; Undo and Redo are disabled when their stacks are empty, and a blocked guard attempt creates no undo entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "command_palette_destinations_and_actions"
description = "Pressing Control-K or Command-K opens a command palette that fuzzy-matches Candidates, Quota, Timeline, Build queue, Fetch more candidates, Export sourcing pack, and Import sourcing pack; choosing Quota switches to the quota view and closes the palette; Escape closes the palette and returns focus; with no matches a designed empty state names what to type"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "export_sourcing_pack_field_contract"
description = "Export sourcing pack opens a panel with Queue JSON, Candidates CSV, and Sourcing report tabs compiled live from session state; Queue JSON top-level keys are exactly schemaVersion (sourcing-pack/v1), generatedAt, quotaFillPercent, queue, candidates, quota, and timeline, with per-entry keys and enums as specified (queue entries include position, name, difficulty, clusterId, commit; candidates include license and status enums and conditional rejectionReason, commit, notes, queuePosition); CSV honors active filters/search; the report markdown includes quota fill, numbered queue, per-status counts, and unfilled cells; Copy places the active tab text on the clipboard with confirmation and Download offers the same text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "export_reflects_session_mutations"
description = "Scripted probe: pin and queue one candidate and reject another with license-blocked, then open Export sourcing pack; Queue JSON lists the queued repository with its frozen commit and matching queuePosition, includes the rejected repository with rejectionReason license-blocked, and shows quotaFillPercent matching the rollup strip; an earlier export captured before those mutations does not already contain them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "import_validates_and_round_trips"
description = "Import sourcing pack accepts a file, paste, or seeded sample; invalid JSON (wrong schemaVersion or illegal status/license enum) shows an inline message naming the violated field and changes no state; a valid import replaces statuses, commits, notes, rejection reasons, and queue order, recomputes rollups and quota, and appends a timeline import entry; exporting Queue JSON then re-importing that text reconstructs the same visible statuses, queue order, and rollup counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "quota_oversubscription_names_exact_excess"
description = "For a quota cell whose achieved count exceeds 1.5 times its target, the cell shows an oversubscription indicator that names the numerical excess achieved minus target; cells at or below 1.5 times target do not show that indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "undo_redo_covers_every_sourcing_mutation"
description = "Using header controls and Control-Z/Control-Shift-Z (or Command-Z/Command-Shift-Z), Undo and Redo correctly reverse and reapply a status transition, pin confirm, queue append, queue removal, queue reorder, bulk action, and accepted import, restoring chips, rollups, quota cells, queue order, and timeline length each time; blocked guards and cancelled pin/rejection forms add no undo step."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "command_palette_runs_flows_and_row_actions"
description = "With a focused or selected eligible candidate, the command palette fuzzy-matches Score, Select, Reject, Pin, and Queue as applicable and each result invokes the same visible row handler; choosing Fetch more, Export sourcing pack, or Import sourcing pack starts that flow and closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "queue_json_exact_nested_entry_contracts"
description = "Queue JSON uses exactly the declared nested shapes: queue entries have position/name/difficulty/clusterId/commit with contiguous integer positions and 12-lowercase-hex commits; candidates have name/language/stars/difficulty/category/clusterId/license/status plus only the applicable rejectionReason, commit, notes, and queuePosition fields; quota entries have language/band/achieved/target with valid bands and bounds; timeline entries have at/name/fromStatus/toStatus plus rejectionReason only when applicable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "csv_and_sourcing_report_exact_content"
description = "Candidates CSV starts with name,language,stars,difficulty,category,clusterId,license,status,rejectionReason,commit,notes,queuePosition and has one line per candidate currently visible under filters/search; Sourcing report is markdown with a title, live quota-fill percentage, numbered queue in panel order, per-status counts matching rollups, and every below-target quota cell named."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "import_success_notice_names_applied_counts"
description = "After a valid sourcing-pack import, the success notice names the exact applied candidate count and applied queue-entry count, matching the imported candidates and queue arrays while the table, queue panel, rollups, quota grid, and import timeline entry show the applied state."
type = "binary"
weight = 1.0

