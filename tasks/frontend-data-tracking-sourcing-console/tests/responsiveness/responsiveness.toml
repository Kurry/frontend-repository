[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_queue_alongside_table"
description = "At 1440px width the build-queue region is visible alongside the candidates table and the header shows navigation plus Export, Import, Undo, and Redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_queue_collapses"
description = "At widths of 768px and below the build-queue region collapses into a toggleable panel reachable from the header, and the quota grid scrolls within its own container if needed"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_overflow"
description = "At 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears; the candidates table scrolls within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_header_menu_reaches_actions"
description = "At 375px width header actions collapse into a compact menu that still reaches Export, Import, Undo, Redo, and the command palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "quota_grid_scrolls_in_container"
description = "At narrow widths the quota grid remains usable by scrolling inside its own container rather than forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "export_panel_usable_on_mobile"
description = "At 375px width the export and import panels remain readable and operable without clipped tabs or unreachable Download/Copy controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "bulk_tray_adapts"
description = "At 768px and 375px widths the bulk action tray remains usable with readable selected count and Bulk Score/Select/Reject actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "typography_remains_legible"
description = "At 375px width repository names, chips, and rollup counts remain legible without overlapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "touch_targets_reach_controls"
description = "At 375px width primary controls (row actions, queue moves, header menu items) remain hittable without overlapping neighbors"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "layout_stable_across_breakpoints"
description = "Resizing from 1440px to 768px to 375px and back does not permanently break the queue panel, filters, or export entry points"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "desktop_queue_missing"
description = "At 1440px width there is no dedicated build-queue region alongside the candidates table"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_page_scrolls_horizontally"
description = "At 375px width the page itself scrolls horizontally or clips chips, rollups, or queue controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "collapsed_queue_unreachable"
description = "At 768px width the collapsed build-queue panel cannot be opened from the header"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "mobile_actions_unreachable"
description = "At 375px width Export, Import, Undo, Redo, or the command palette cannot be reached"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "quota_forces_page_overflow"
description = "The quota grid at narrow width forces page-level horizontal overflow instead of self-contained scrolling"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "export_panel_unusable_narrow"
description = "At 375px width export/import tabs or Download/Copy controls are clipped or inoperable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "bulk_tray_unusable_narrow"
description = "At narrow widths the bulk tray overlaps content or its actions cannot be activated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "text_illegible_on_mobile"
description = "At 375px width table text, chips, or rollups overlap or become unreadable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "controls_too_small_or_stacked_wrong"
description = "At 375px width primary row or header controls are too small to activate or stacked so they obscure each other"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "breakpoint_resize_breaks_chrome"
description = "After resizing across breakpoints, navigation, queue, or export controls remain broken until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable responsiveness or layout defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
