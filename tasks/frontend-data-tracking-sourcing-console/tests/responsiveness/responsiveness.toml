[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_queue_alongside_table"
description = "At 1440px width the build-queue region is visible alongside the candidates table and the header shows navigation plus Export, Import, Undo, and Redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_queue_collapses"
description = "At widths of 768px and below the build-queue region collapses into a toggleable panel reachable from the header, and the quota grid scrolls within its own container if needed"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_overflow"
description = "At 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears; the candidates table scrolls within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_header_menu_reaches_actions"
description = "At 375px width header actions collapse into a compact menu that still reaches Export, Import, Undo, Redo, and the command palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "quota_grid_scrolls_in_container"
description = "At narrow widths the quota grid remains usable by scrolling inside its own container rather than forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "export_panel_usable_on_mobile"
description = "At 375px width the export and import panels remain readable and operable without clipped tabs or unreachable Download/Copy controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "bulk_tray_adapts"
description = "At 768px and 375px widths the bulk action tray remains usable with readable selected count and Bulk Score/Select/Reject actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "typography_remains_legible"
description = "At 375px width repository names, chips, and rollup counts remain legible without overlapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "touch_targets_reach_controls"
description = "At 375px width primary controls (row actions, queue moves, header menu items) remain hittable without overlapping neighbors"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "layout_stable_across_breakpoints"
description = "Resizing from 1440px to 768px to 375px and back does not permanently break the queue panel, filters, or export entry points"
type = "binary"
weight = 1.0

