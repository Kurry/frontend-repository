[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_interactive_under_2s"
description = "The page is interactive within 2 seconds of a local cold load; hero content appears without waiting for below-the-fold video to finish loading."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load_and_exercise"
description = "No console errors or warnings appear on load or during a full scroll-through, flick-deck, client-carousel, contact form, video player, and cookie-banner exercise."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "chrome_interactions_stay_responsive"
description = "Nav, locale, carousel, and deck chrome respond without multi-second lag after first paint (primary UI transitions feel under ~100ms for chrome interactions)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "contact_submit_keeps_ui_responsive"
description = "A valid contact submit to the local endpoint reveals Thanks for your submission! without hanging the rest of the page; carousel position and ticking counters remain interactive."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "long_page_scroll_without_lag"
description = "Scrolling the full long-form homepage (hero through full-height footer) remains usable without perceived multi-second freezes between sections."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_deck_and_carousel"
description = "The UI remains interactive during flick-deck Next/Previous, client-carousel paging, and video play/pause (controls stay clickable)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "scroll_motion_holds_smooth_frame_rate"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through the pinned services throw, line reveals, thumbnail drift loops, and ticking counters."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_deck_carousel_never_freezes"
description = "Rapidly clicking flick-deck Next/Previous and client-carousel advance several times never freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_scroll_session_stable"
description = "After an extended scroll-through with deck, carousel, player, and cookie interactions, the page remains responsive without runaway resource use that freezes interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "hero_ready_before_below_fold_video"
description = "Hero content is interactive before below-the-fold client/service videos finish loading; media regions do not block first interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a1"
name = "scroll_linked_animation_frame_rate"
description = "Scroll-linked pinned services throws and line-mask reveals hold a smooth frame rate through the full page length on a 1440-wide viewport with no visible hitching during continuous scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a2"
name = "smooth_scroll_continuous_above_768"
description = "On viewports 768px and wider, desktop smooth scrolling feels continuous and settles naturally without lag between input and motion, while pinned services throw and nav theme sync stay locked to scroll position."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a4"
name = "layout_stable_no_visible_shift"
description = "No visible layout shift occurs as fonts, images, or videos finish loading; media regions reserve their space from first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a6"
name = "progressive_media_load_keeps_interactive"
description = "Heavy below-the-fold videos and posters load progressively: the page becomes interactive before those assets finish, reserved media regions hold space while streaming in, and interaction is not blocked waiting on an asset."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.b1"
name = "palette_brief_undo_stay_responsive"
description = "Opening the command palette, regenerating the discovery brief after shortlist and contact mutations, and rapid Undo/Redo never freeze the page or drop chrome responsiveness."
type = "binary"
weight = 1.0

