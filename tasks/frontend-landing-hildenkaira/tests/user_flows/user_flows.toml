[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "contact_flow_success_preserves_page_state"
description = "Contact flow: choosing We'll call you opens the contact popup; submitting a payload that passes the contact field contract (valid email, terms true) reveals Thanks for your submission! in place of the fields while the client carousel position and ticking Organic views / Likes counters remain unaffected, the request goes only to a local endpoint, and Export brief then shows contactSubmitted true with contactEmail equal to that email."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "contact_invalid_submit_keeps_popup_open"
description = "Contact flow invalid path: submitting with an empty or invalid email, with the Privacy Policy checkbox unchecked, or with a phone value outside the phone field contract, does not reveal the success state, marks the offending field, and keeps the popup open."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "flick_deck_next_previous_reshuffle"
description = "Flick-deck flow: clicking a client deck's Next control elastically reshuffles the stacked cards, promotes a new card to the front, and leaves only that front card's video player interactive; clicking Previous restores the prior front card the same way, and the other four clients' decks stay untouched."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "client_carousel_centers_and_restores"
description = "Client-carousel flow: advancing the client carousel centers a new client card at full scale while neighbors shrink; the newly centered client's deck controls and Organic views / Likes tiles become active; paging back re-centers the previous client in the same flick-deck state it was left in."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "locale_dropdown_en_fi_label_only"
description = "Locale flow: clicking the locale dropdown opens an EN / FI list; choosing FI updates the visible label to FI and choosing EN returns it to EN, without leaving / or reloading, and page copy stays English throughout."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "playback_play_pause_seek_elapsed"
description = "Playback flow: pressing play on the front card's player starts the video and elapsed time advances; pausing halts elapsed time; dragging the timeline seeks and the elapsed readout matches the new position immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "cookie_consent_preferences_and_accept"
description = "Cookie flow: the consent banner appears shortly after load; opening preferences shows Essential (locked on), Marketing, Analytics, and Personalization; toggling Marketing, Analytics, or Personalization flips only that category; Accept dismisses the banner; a full reload returns the seeded state and the banner appears again."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "mobile_lime_menu_open_close_continuity"
description = "At about 479px and below: tapping the hamburger opens the full-screen lime menu and locks page scrolling; closing it restores scrolling and leaves the user able to continue the homepage workflow without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "contact_popup_overlay_open_close"
description = "Choosing We'll call you opens the contact popup overlay; dismiss/close returns focus to the page and leaves carousel, counters, and locale label in their prior states."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "chrome_links_recover_without_reload"
description = "Recovery: clicking non-destination chrome (nav links Our approach / Story / Work / Blog, Show case, service/about CTAs, sitemap/social/legal footer links) stays on / with no dead end; recovering normal interaction never requires a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_landing_flows_unavailable"
description = "The contact We'll call you → Thanks for your submission! path, the flick-deck Next/Previous reshuffle, or the client-carousel advance cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "flick_or_carousel_state_desyncs"
description = "After flick-deck Next/Previous or client-carousel paging, the front-card interactive player, card status, or centered-client active controls disagree with what is visibly centered (state not synced across deck surfaces)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "contact_or_menu_overlay_blocks_exit"
description = "The contact popup or the mobile lime menu opens but cannot be closed, leaving navigation blocked with no exit path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "failed_contact_flow_lacks_feedback"
description = "Submitting the contact form with an empty/invalid email or unchecked Privacy Policy produces no field-marking feedback and no visible failure indication while the popup stays open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "flow_dead_end_requires_reload"
description = "After opening the contact popup, mobile lime menu, cookie preferences, or advancing the client carousel, recovering normal homepage interaction requires a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "shortlist_flow_count_and_panel"
description = "Shortlist flow: shortlisting Loom House raises the nav count from 0 to 1; shortlisting Second Circle raises it to 2; the Shortlist panel lists both; removing Loom House drops the count to 1 and clears only Loom House while Second Circle stays shortlisted."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "discovery_brief_export_import_flow"
description = "Discovery brief export flow: after shortlisting at least one client, setting locale to FI, saving a cookie preferences payload with Marketing off, advancing the carousel, and completing a valid contact submit under the contact field contract, Export brief JSON satisfies the Discovery brief field contract (schemaVersion 1) and matches those session facts including cookieCategories and contactEmail; Download and Copy work; importing the JSON after clearing the shortlist restores shortlist, locale, cookie toggles, centered client, and flick indices."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "command_palette_export_and_jump_flow"
description = "Command palette flow: Ctrl+K opens the palette; confirming Export brief opens the discovery brief panel; Jump to services scrolls to the services trio without leaving /."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "undo_redo_flow_shortlist_cookie"
description = "Undo flow: shortlist Loom House then Undo clears it; Redo restores it; Marketing off then Undo restores Marketing without altering the shortlist."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "cookie_validation_flow_keeps_banner"
description = "Cookie validation flow: open preferences and force an invalid draft (essential false or a missing boolean category); saving keeps preferences open, shows named field errors, leaves the banner visible, and leaves discovery-brief cookieCategories unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "cookie_accept_vs_prefs_export_flow"
description = "Cookie accept versus prefs export flow: on one load Accept then Export brief shows cookieCategories all true; on a fresh load open preferences, turn Marketing off, save, then Export brief shows marketing false with essential true."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n6"
name = "brief_export_flow_dead_end"
description = "Export brief, Shortlist panel, or command palette opens but cannot be closed, leaving the homepage blocked with no exit without reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "cookie_or_contact_contract_flow_unavailable"
description = "The contact lead payload cannot reach Thanks for your submission! under the field contract, or cookie Accept / valid preferences save cannot write the four-boolean cookieCategories payload into the discovery brief."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
