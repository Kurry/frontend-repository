[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "line_mask_reveal_on_scroll"
description = "On a fresh load, scrolling an unseen heading or paragraph to about 80% of the viewport plays a line-by-line upward mask reveal once (each line rising from below its mask with a pronounced ease-out), then it stays revealed"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "flick_deck_elastic_reshuffle"
description = "Clicking a client deck's Next/Previous control animates the stacked flick cards to new offset/rotation/scale positions (active 0/scale 1, +/-1 at about +/-25% and +/-10deg scale 0.9, +/-2 at about +/-45% and +/-15deg scale 0.8) with an elastic, springy overshoot settle of about 0.6s, and the active card's caption chips slide up into view"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "carousel_scale_transition"
description = "Advancing the client carousel keeps the active slide at full scale and shrinks neighbors to about 0.94, transitioning over roughly 600ms"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "hero_thumbnail_drift_loops"
description = "Hero case thumbnails drift on continuous 12–15 second bottom-to-top loops in left and right zones, fading in at the start and out near the top of each loop"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "nav_dot_overshoot_scale"
description = "Nav link dots scale up from nothing on hover and for the current link with a slight overshoot"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "primary_button_hover_choreography"
description = "Hovering a primary button on a fine-pointer device slides its label upward, rotates its icon backing, translates its arrow, and wipes the background"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "counters_tick_after_load"
description = "The Organic views and Likes counters tick upward on their own beginning about half a second after load, with space thousands separators"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "nav_theme_scroll_sync"
description = "The fixed nav's theme swaps to match whichever section sits under the top-of-viewport probe as the page scrolls, recoloring the nav in step with the section beneath it"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "player_interface_hide_on_play"
description = "The active card's video player interface fades and lifts out of view while playing and returns on hover, with a paused/hover dark overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "inertia_card_throw_on_hover"
description = "Eligible cards throw with momentum/inertia when the pointer enters and leaves them on desktop fine-pointer devices"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.11"
name = "banner_ease_in_and_menu_slide"
description = "The cookie banner eases into view shortly after load, and the mobile lime menu slides in from the top when the hamburger is tapped"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "footer_lettermark_assembles"
description = "The footer's brand lettermark animates its individual letters into place"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.13"
name = "animations_snap_or_state_shortcut"
description = "Reveals, flick reshuffles, counters, or button feedback appear instantly with no animation, are only reachable by snapping state (no real scroll/click/hover gesture), or interactive chrome (buttons, nav links, locale options, form controls, carousel controls) gives no visible hover/focus response"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.14"
name = "button_and_dot_easing_timings"
description = "When hovering a primary button, its animated targets transition transform over 0.525s with easing cubic-bezier(0.625, 0.05, 0, 1); when hovering/current, the nav link dot scales over 0.525s with easing cubic-bezier(0.175, 0.885, 0.32, 1.275)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.15"
name = "player_interface_transition_timing"
description = "The active card's video player interface transitions over 0.6s with easing cubic-bezier(0.625, 0.05, 0, 1) as it hides while playing and returns on hover"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.16"
name = "load_veil_and_lettermark_intro"
description = "On a fresh load, a lime page-load veil covers the hero then lifts to reveal it, the brand lettermark rises into place letter by letter, and the nav settles in"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "services_pinned_throw_on_scroll"
description = "Signature scroll storytelling: on a fresh load, scrolling through the pinned services section throws the top service card away with rotation to reveal the next card in the Organic content / Ads for social / Training trio, driven by real scroll progress, and scrolling back reverses the throw"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "smooth_scroll_keeps_triggers_synced"
description = "At 768px and wider, continuous scrolling keeps line reveals, the pinned services throw, and nav theme sync locked to scroll position without visible lag or desync as inertial smooth scrolling settles; below 768px native scrolling applies without scroll hijacking"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "signature_gestures_use_linear_tweens"
description = "Primary-button hover, nav-dot scale, flick-deck reshuffle, or CTA-card inertia throws start and stop on purely linear tweens with no inertial, springy, or overshoot easing"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.20"
name = "load_timeline_orchestrated"
description = "On a fresh load, the lime veil lift, lettermark letter-by-letter rise, and nav settle play as one coordinated intro timeline rather than unrelated instant pops"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.21"
name = "reduced_motion_settled_and_operable"
description = "With prefers-reduced-motion enabled, smooth scrolling, drifting thumbnails, decorative autoplay, marquees, and pinned throw transforms stop while all cards, headings, controls, and form fields remain visible and operable in their settled states"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
