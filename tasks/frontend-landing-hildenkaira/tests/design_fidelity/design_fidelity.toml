[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_fluid_em_baseline"
description = "At 1440 width, section paddings, gaps, and major offsets follow the fluid em baseline (multiples of 0.5em / 1em / 2em / 8em tracking the root size, equivalent to a 4/8px discipline) rather than arbitrary odd-pixel one-offs."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_reference_metrics"
description = "At 1440 typography matches the spec: hero H1 about 62.8px with ~0.9em line-height and negative letter-spacing; statement/about H2 about 57.6px–84px; paragraph-m about 15.7px; nav links about 13.1px; editorial display at weight 400 and grotesque at weight 500 from self-hosted files."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_pixel_match_reference_screenshots"
description = "At 1440 desktop width, composition matches /reference-screenshots/ overview and segment panels to near pixel-parity for the broken-grid hero, client deck density, pinned services trio, about flanking images, and full-height footer proportions — using fictional Cinder & Bloom assets, not source pixels."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: lime veil + lettermark intro on fresh load, line-mask reveals, pinned services throw, flick-deck elastic settle (~0.6s), and client-carousel scale(1)/scale(0.94) over ~600ms — verified via the real UI/scroll path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns: hamburger only at about 479 and below; smooth scroll at 768 and up; hero re-composition at narrow width rather than a mere shrink."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_match_token_styled_chrome"
description = "Primary buttons, contact chrome-metallic popup fields, and cookie dark banner match the reference styling (token-driven fills, floating labels) rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes oversized editorial display headings from grotesque body/eyebrow/nav text across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover/active states match the reference where specified: nav link red-dot scale, primary-button hover wipe with turquoise fill, flick active vs neighbor card scales, and video player chrome fade while playing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_exact_theme_colors"
description = "Color treatments match exactly: off-white #eae9e6 body, near-black #181818 text, lime #ecfdad, turquoise #3fae86, red #ff4545 nav dot, dark-grey #2b2b2b footer; theme-media bands black with lime headings; chrome reserved for Likes tile, contact popup, and footer theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions follow the reference language with primary-motion easing cubic-bezier(0.625, 0.05, 0, 1) over 0.525s on buttons and nav-dot back ease cubic-bezier(0.175, 0.885, 0.32, 1.275) over 0.525s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_baseline"
description = "Visible major section gaps use arbitrary odd-pixel spacing that contradicts the fluid em / 4/8px-equivalent baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_specified_palette"
description = "Surfaces or accents use colors outside the specified lime/turquoise/red/near-black/off-white/dark-grey/chrome system (e.g. arbitrary purple theme wash or lime used everywhere)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440 the hero H1 or statement/about H2 sizes are grossly mismatched versus the ~62.8px / ~57.6–84px reference metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no lime veil/lettermark intro, no pinned services throw, or no flick-deck elastic reshuffle on the real UI path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary CTAs, contact fields, or cookie controls use unstyled browser default appearance when the reference uses token-styled chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_screenshots"
description = "At 1440 the hero/client-deck/services/about/footer composition is grossly misaligned versus /reference-screenshots/ segment panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (hero lettermark/thumbnails, client deck, pinned services cards, about flanking images, full-height footer) render off-screen or clipped at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated homepage order (hero → statement → client deck → services → testimonials → about/self-esteem → CTA → footer) or omits a required section."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/weight throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or deck/carousel microinteractions are missing or clearly deviate from the reference (instant snaps, no button wipe, no flick elastic settle)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.b1"
name = "operator_chrome_does_not_displace_sections"
description = "Shortlist, command palette, and discovery brief controls layer as overlays/chrome without displacing the mandated section order (hero → statement → client → services → testimonials → about → CTA → footer) or removing reference-required surfaces at 1440."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "operator_chrome_removes_reference_sections"
description = "Adding Shortlist/Export/palette chrome removes or reorders a mandated reference section (e.g. missing services trio or about/self-esteem band) at desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
