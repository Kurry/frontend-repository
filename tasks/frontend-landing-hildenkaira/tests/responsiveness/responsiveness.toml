[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "breakpoints_1440_768_479_chrome"
description = "At 1440 the full centered nav (Our approach, Story, Work, Blog, EN locale, contact CTA) is shown; at 768 and wider smooth (inertial) scrolling is active; at about 479px and below the centered nav links are replaced by a hamburger that opens the full-screen lime menu."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At about 479px, primary interactive controls (hamburger, locale control, cookie Accept, contact CTA, carousel/deck controls) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_scale_no_abrupt_jumps"
description = "The fluid type scale tracks the viewport: hero H1 measures about 62.8px at 1440, 76px at 991, 60px at 767, and 52px at 479, with no abrupt size jumps between breakpoints."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "At 1440, 768, and 479 widths, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_collapses_to_hamburger_at_479"
description = "Below roughly 479px the centered nav links are replaced by a hamburger; tapping it opens the full-screen lime menu and locks page scrolling until closed."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "hero_recomposes_at_narrow_width"
description = "At about 479px the hero re-composes (lettermark and content stack tighter) rather than merely shrinking the desktop broken-grid layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_viewport_touch_scroll_native"
description = "Below 768px touch scrolling keeps native platform physics (smooth/inertial scroll engine disabled) and is not hijacked; hamburger and menu taps work."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scrollbar_at_key_widths"
description = "At 1440, 768, and 479 widths no horizontal scrollbar appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "media_and_cards_resize_to_layout"
description = "Hero case thumbnails, client flick vertical videos, service background videos, and about flanking images size responsively to fit the layout at 1440, 768, and 479 without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_nav_accessible_all_widths"
description = "The fixed top nav remains reachable and operable at 1440, 768, and 479 (desktop centered links or hamburger path) without disappearing."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_product_breakpoints"
description = "At 1440, 768, or 479 the layout breaks, overflows, or loses required chrome (centered nav vs hamburger) for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At about 479px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_narrow_width"
description = "At about 479px body or hero heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 1440, 768, or 479 content is cropped or unnecessary scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_nav_missing_or_unresponsive"
description = "At about 479px the hamburger is absent, or tapping it leaves the full-screen lime menu closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_nav_obscures_content"
description = "The fixed top nav permanently obscures hero or section content with no recoverable scroll offset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_or_stacking_failure_at_width"
description = "At 1440, 768, or 479 elements overlap incorrectly or stacking order breaks the hero lettermark, client deck, or services trio composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "smooth_scroll_wrong_for_viewport"
description = "Below 768px inertial/smooth scrolling still hijacks touch physics, or at 768px and wider the desktop smooth-scroll path is entirely absent while scroll-linked motion desyncs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "media_static_size_overflows"
description = "Hero thumbnails, flick videos, or service/about media use a static size that overflows the viewport at 479 or 768."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "locale_or_cta_disappears_at_width"
description = "The locale control or contact CTA disappears at 768 or 479 while remaining required chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_hero_rechoreographed_at_479"
description = "At about 479px the broken-grid hero, drifting thumbnails, and lettermark are re-choreographed into a tighter stacked composition that preserves editorial hierarchy rather than a flat shrink of the desktop grid."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.b1"
name = "palette_brief_usable_at_479"
description = "At about 479 width, the command palette, Shortlist panel, and discovery brief panel stay fully visible and operable without rendering off-screen or requiring page-level horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "brief_panel_clipped_at_479"
description = "At about 479 width the discovery brief or command palette is clipped, off-screen, or only reachable via horizontal page scroll."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
