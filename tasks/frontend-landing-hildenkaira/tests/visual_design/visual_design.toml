[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "per_section_theme_swaps"
description = "The page uses an off-white default surface with per-section theme swaps (lime #ecfdad, turquoise, chrome-metallic, dark media, dark-grey) rather than one flat background"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "display_vs_grotesque_hierarchy"
description = "Oversized editorial display headings are visually distinct from the medium-weight grotesque used for body, eyebrow, and nav text"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "stat_tiles_lime_and_chrome"
description = "Each client card shows two stat tiles: a lime Organic views tile and a chrome Likes tile with a metallic heart, plus caption chips (age and view count) on the flick cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "popup_and_banner_theming"
description = "The cookie banner uses a dark theme and the contact popup uses a chrome-metallic panel with floating-label fields"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "deck_media_distinct_and_authored"
description = "Every client deck visibly contains at least three distinct newly authored vertical video/poster faces, the five fictional clients each have a distinct authored mark, and every slot shows rendered media without cross-client reuse"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "body_offwhite_nearblack_text"
description = "The home body default surface renders off-white (computed background near rgb(234, 233, 230) / #eae9e6) with near-black text rgb(24, 24, 24)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "statement_and_footer_theme_colors"
description = "The statement and about/self-esteem bands (theme-media) render background rgb(24, 24, 24) with lime text rgb(236, 253, 173), and the footer (theme-chrome) renders a dark-grey base rgb(43, 43, 43) with white text"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "accent_colors_exact"
description = "Accent colors render exactly: the Organic views tile lime rgb(236, 253, 173) (#ecfdad), the Training service card turquoise rgb(63, 174, 134) (#3fae86), and the nav link dot red rgb(255, 69, 69) (#ff4545)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "open_license_faces_and_type_metrics"
description = "The hero H1 renders in a self-hosted open-license editorial display face at weight 400 (about 62.8px at 1440 width with a tight ~0.9em line-height and negative letter-spacing), body/eyebrow/nav text renders in a self-hosted open-license grotesque at weight 500 (paragraph about 15.7px, nav links about 13.1px at 1440), and Inter appears only for ancillary UI and cookie-consent copy — all faces resolve from local files with no external font requests"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "fluid_type_scale_across_breakpoints"
description = "Fluid clamp-based type scaling: the hero H1 measures about 62.8px at 1440 viewport width, about 76px at 991, about 60px at 767, and about 52px at 479, and resizing between these widths scales the type smoothly with no abrupt size jumps at breakpoint boundaries"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "nav_collapses_to_hamburger_only_narrow"
description = "On wide and tablet viewports the full centered nav (Our approach, Story, Work, Blog with the locale dropdown and contact CTA) is shown, and on viewports about 479px and below the centered links are replaced by a hamburger button"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "selection_scrollbar_button_resets"
description = "Text selection shows a lime-on-black highlight, scrollbars are hidden, and buttons reset their native chrome"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.17"
name = "mandated_copy_exact_with_accent"
description = "All mandated copy strings render exactly as specified — the fictional brand name reads Cinder & Bloom wherever the agency name appears — and headings, buttons, and captions keep the reference's casing and terminology consistently across sections"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "broken_grid_editorial_composition"
description = "At desktop width the layout reads as broken-grid editorial composition: the hero lettermark spans the top while the H1/lead sit toward the lower third with case thumbnails crossing the left and right zones; the about band overlays large display type on a media field with flanking images that break a single equal-width column stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "fluid_em_baseline_spacing"
description = "Major paddings and gaps follow a consistent fluid em baseline (multiples of about 0.5em / 1em / 2em / 8em tracking the root size) rather than arbitrary one-off spacing that breaks the 4/8-style rhythm"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.22"
name = "color_scarcity_roles_respected"
description = "Accent roles stay scarce: lime appears on the Organic views tile, theme-media headings, selection, primary buttons, and load veil — not as a global wash; turquoise appears on the Training card and primary-button hover; red appears only as the nav link dot; chrome-metallic is limited to the Likes tile, contact popup, and footer"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.24"
name = "scratch_authored_media_inventory_craft"
description = "The Cinder & Bloom identity and media inventory are visibly complete and art-directed: twelve letterform images, four hero-case thumbnails, five fictional client marks, at least three distinct video/poster deck faces per client, three service videos/posters, five testimonial portraits or marks, two about images, and the contact/footer art and icons occupy the reference roles without repetition"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.26"
name = "hero_recomposes_on_narrow_viewport"
description = "At about 479px viewport width the hero re-composes — the lettermark and hero content stack tighter in a mobile-specific arrangement with the tightened type scale — rather than merely rendering a shrunken copy of the desktop layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.27"
name = "theme_colors_resolve_from_shared_tokens"
description = "Inspecting computed styles in the browser, differently themed sections resolve their background, text, and button colors from shared CSS custom-property role tokens (the same token names resolving to different swatch values per theme) rather than scattered one-off literal color values per section"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.30"
name = "shortlist_brief_chrome_matches_theme"
description = "Shortlist controls, the Shortlist panel, Export brief chrome, and the discovery brief panel use the page's token-driven editorial surfaces (off-white/near-black or chrome/dark cookie language) rather than unstyled browser-default dialog chrome that breaks the Cinder & Bloom system."
type = "binary"
weight = 0.5

