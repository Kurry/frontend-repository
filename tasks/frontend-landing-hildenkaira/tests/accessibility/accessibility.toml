[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "interactive_controls_keyboard_operable"
description = "Every interactive control — nav links, locale options, client-deck and carousel controls, video player buttons, contact form fields, cookie banner actions, and the mobile hamburger/menu — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "contact_popup_traps_and_restores_focus"
description = "The contact popup behaves as a modal: focus moves into it when We'll call you opens it, stays trapped while open, and returns to the triggering control when it closes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "media_and_lettermark_accessible_names"
description = "Client marks, testimonial portraits, about flanking images, hero case thumbnails, and the twelve-letter brand lettermark carry descriptive alt text or accessible labels; decorative fragments are hidden from the accessibility tree where appropriate."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "contact_feedback_uses_live_regions"
description = "Contact form validation errors and the Thanks for your submission! success state are exposed to assistive technology (e.g. ARIA live region) as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "contact_fields_have_explicit_labels"
description = "Contact popup email, optional phone, and Privacy Policy agreement controls, and cookie preference toggles Essential, Marketing, Analytics, and Personalization, use explicit label associations (or equivalent accessible names)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order_homepage"
description = "Homepage headings follow a logical order with no skipped levels: the hero H1 If you can't reach a million people with 0€ ad spend, your branding sucks. precedes section H2s such as the statement lead, Does your brand have self-esteem issues?, and Ready to work with us?."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_nav_main_footer"
description = "Markup exposes HTML-first landmarks: a primary navigation region, a main content landmark wrapping the homepage sections, and a footer/contentinfo landmark."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contrast_meets_wcag_aa_surfaces"
description = "Text and control labels meet WCAG AA contrast against their surfaces, including lime headings on black media bands, near-black body on off-white rgb(234,233,230), and white text on dark-grey/chrome footer and cookie surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_interactive_chrome"
description = "Interactive chrome uses real buttons/links/labelled inputs with semantic roles rather than anonymous divs without roles for nav, locale, deck/carousel, player, form, and cookie controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_keeps_page_operable"
description = "With prefers-reduced-motion emulated on a fresh load, smooth scrolling, drifting thumbnails, autoplaying decorative video, marquee motion, and pinned services throw transforms stop, while every card, heading, control, and form remains visible and operable in its settled state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.a1"
name = "split_and_lettermark_accessible_names"
description = "Split and letter-assembled headings keep the full phrase as the parent's accessible name while per-line fragments are aria-hidden; the brand lettermark carries an accessible label reading Cinder & Bloom with per-letter fragments hidden or decorative."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "A primary interactive control (nav link, locale option, deck/carousel control, video player button, contact field, cookie action, or hamburger) cannot be reached or activated via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Keyboard-focused interactive controls show no visible focus outline or the indicator is fully obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom interactive chrome (locale dropdown, flick Previous/Next, carousel controls, video player, cookie banner) uses non-semantic tags without ARIA roles/labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "errors_conveyed_by_color_only"
description = "Contact validation errors are indicated only by color with no text or live-region announcement naming the offending field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "contact_popup_fails_focus_trap"
description = "While the contact popup is open, keyboard focus escapes into the page behind it, or closing the popup leaves focus somewhere other than the We'll call you trigger."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_unreadable_text"
description = "Lime-on-black media headings, near-black-on-off-white body, or white-on-chrome/footer/cookie text is unreadable due to contrast below WCAG AA."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "contact_feedback_visual_only"
description = "Contact validation errors or Thanks for your submission! appear visually only with no assistive-technology exposure."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_missing_alt_or_labels"
description = "Client marks, testimonial portraits, about images, hero thumbnails, or the brand lettermark lack descriptive alt text or accessible labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.a4"
name = "split_heading_character_soup"
description = "A split or letter-assembled headline is exposed to the accessibility tree as character soup — no accessible name on the container and the split/letter spans are not aria-hidden."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, drifting thumbnails, pinned services throws, decorative autoplay video, or smooth scrolling continue to run."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "mobile_menu_scroll_not_locked"
description = "While the mobile full-screen lime menu is open, background scrolling remains unlocked or the menu cannot be closed from the keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.b1"
name = "palette_shortlist_brief_dialogs_a11y"
description = "The command palette, Shortlist panel, and discovery brief panel behave as dialogs: focus moves in on open, stays trapped while open, returns to the trigger on close, and Escape dismisses each."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.b2"
name = "shortlist_export_undo_keyboard"
description = "Shortlist controls, Export brief, Download, Copy, Import, Undo, and Redo are reachable and operable with the keyboard alone and show a visible focus outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n11"
name = "brief_or_palette_no_focus_trap"
description = "While the command palette or discovery brief panel is open, keyboard focus remains outside the dialog and Escape leaves the dialog open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
