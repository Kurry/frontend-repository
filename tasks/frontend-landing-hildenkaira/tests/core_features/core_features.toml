[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the homepage at / returns HTTP 200 and the hero shows the H1 \"If you can't reach a million people with 0€ ad spend, your branding sucks.\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the statement section shows the H2 lead \"Content only you can post because it's built around your people.\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the client deck shows five client cards including Finlayson, Kierrätyskeskus, Uusi Juttu, Autoliitto, and Liikku"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After about a second on load, the Organic views counter increases on its own from its seeded total and formats with a space thousands separator (e.g. 2 148 665)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When clicking a client deck's Next control, the stacked flick cards elastically reshuffle and a different card becomes the active/front card (its status attribute changes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When the client carousel advances, the active slide stays at full scale while neighboring slides are scaled down to about 0.94"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "When clicking play on the active card's video player, the video begins playing and can be paused again from the same control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When opening the locale dropdown and choosing FI, the dropdown's visible label changes from EN to FI without leaving the homepage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "When choosing \"We'll call you\" and submitting the contact form with a valid email and the agreement checkbox ticked, the form's success state \"Thanks for your submission!\" replaces the form"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When submitting the contact form with an empty/invalid email or the checkbox unchecked, the success state does not appear and the offending field is marked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "On load, a cookie banner appears exposing categories Essential, Marketing, Analytics, and Personalization; clicking Accept dismisses it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When scrolling so a dark media section sits under the top of the viewport, the fixed nav recolors to match that section's theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When hovering a primary button on a fine-pointer device, its label slides, its icon rotates, and its background wipes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "On a narrow (~390px) viewport, tapping the hamburger opens a full-screen lime menu and page scrolling is locked until it closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load, the footer fills at least the viewport height and shows the reassembled brand lettermark, sitemap, podcast/social links, and the designer credit"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The homepage at / returns HTTP 200 and the hero shows the exact H1 \"If you can't reach a million people with 0€ ad spend, your branding sucks.\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "The statement section shows the exact H2 lead \"Content only you can post because it's built around your people.\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "The client deck presents five client cards: Finlayson, Kierrätyskeskus, Uusi Juttu, Autoliitto, and Liikku"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Clicking a client deck's Next (or Previous) control promotes a different flick card to the active/front position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Opening the locale dropdown and choosing FI updates the visible EN/FI label to FI without leaving the homepage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Choosing \"We'll call you\" and submitting the contact form with a valid email and the agreement checkbox ticked reveals the success state \"Thanks for your submission!\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Submitting the contact form with an empty/invalid email or the checkbox unchecked does not reveal the success state and marks the offending field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "A cookie banner appears with categories Essential, Marketing, Analytics, and Personalization, and clicking Accept dismisses it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The services section shows the trio Organic content, Ads for social, and Training, each with its own number, copy, and call-to-action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The testimonials section rotates through at least five client quotes, each with a client name and role, and advancing updates the shown quote"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "The footer shows a sitemap, Podcast links (Spotify, YouTube, Apple Podcasts), Social links (Instagram, TikTok, Facebook), legal links, and the designer credit"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "Nav center links, the locale dropdown, and the CTA are non-navigating chrome — clicking them does not perform a real outbound navigation or full page reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The contact form must not POST to an external form service; a submission that calls an outside endpoint instead of the app's local route is a failure"
type = "binary"
weight = 1.0
negate = true
