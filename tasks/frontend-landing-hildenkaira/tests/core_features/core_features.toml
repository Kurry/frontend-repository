[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "hero_h1_exact_and_http_200"
description = "On load, the single homepage at / returns HTTP 200, the document title reads Cinder & Bloom, and the hero shows the exact H1 \"If you can't reach a million people with 0€ ad spend, your branding sucks.\" with the exact lead \"We will 10x your social presence or work for free until it's done.\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "statement_h2_exact"
description = "On load, the statement section shows the H2 lead \"Content only you can post because it's built around your people.\" over a dark media band"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "five_client_cards_present"
description = "On load, the client deck shows five client cards: Loom House, Second Circle, New Current, Roadkind, and Motive Lab — each with a client title, a newly authored client mark, a Show case control, a stacked flick-card deck, and two stat tiles labelled Organic views and Likes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "counters_tick_with_space_separator"
description = "After about a second on load, the Organic views and Likes counters increase on their own from below their seeded totals and format large numbers with a space thousands separator (e.g. 2 148 665)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "flick_deck_next_promotes_card"
description = "When clicking a client deck's Next control, the stacked flick cards elastically reshuffle and a different card becomes the active/front card (its visible status changes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "carousel_active_slide_scale"
description = "When the client carousel advances, the active slide stays at full scale while neighboring slides are scaled down to about 0.94"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "video_play_pause_control"
description = "When clicking play on the active card's video player, the video begins playing and can be paused again from the same control; the player shows a big play control, play/pause, mute, fullscreen, a draggable timeline with elapsed and total time, and likes/views captions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "locale_label_updates_to_fi"
description = "When opening the locale dropdown and choosing FI, the dropdown's visible label changes from EN to FI without leaving the homepage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "contact_form_success_state"
description = "When choosing \"We'll call you\" and submitting a contact payload that passes the field contract (valid email, terms true, optional phone within bounds), the form's success state \"Thanks for your submission!\" replaces the fields; the popup contains email, optional phone, and the Privacy Policy agreement checkbox"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "contact_form_inline_validation"
description = "When submitting the contact form with an empty or invalid email, with the agreement checkbox unchecked, or with a phone value outside the phone field contract, the success state does not appear, the popup stays open, and an inline per-field error marks and names the offending field before submit succeeds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "cookie_banner_categories_accept"
description = "Shortly after load a cookie banner appears with an Accept action and a preferences path exposing four categories — Essential (required/locked), Marketing, Analytics, and Personalization — and clicking Accept dismisses the banner while writing cookieCategories with essential, marketing, analytics, and personalization all true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "mobile_menu_scroll_lock"
description = "On a narrow (~390px) viewport, tapping the hamburger opens a full-screen lime menu and page scrolling is locked until it closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "footer_full_height_content"
description = "On load, the footer fills at least the viewport height and shows the reassembled brand lettermark, a sitemap, podcast/social links, legal links, and a generic designer credit"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "services_trio_content"
description = "The services section shows the stacked trio Organic content, Ads for social, and Training, each with its own number, heading, description, background video, and its own call-to-action button"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "testimonials_rotator_advances"
description = "The testimonials section rotates through at least five client quotes, each with the client's name and role, and advancing shows the next quote with its author details"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "footer_link_groups_complete"
description = "The footer lists a sitemap, Audio/Video/Episodes links, Photos/Clips/Community links, legal links, and the fictional designer credit line"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "chrome_click_navigates_away"
description = "Clicking a centered nav link, a Show case or service/about button, the locale switcher, the contact CTA, or a footer social/legal/sitemap link leaves / for another route, opens an outbound destination, or triggers a full page reload instead of staying on the single homepage as non-navigating chrome"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "contact_posts_to_external_service"
description = "Submitting the contact form sends a request to an external form-service endpoint rather than a local API route within the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "section_order_matches_reference"
description = "Scrolling top to bottom, the page presents the sections in this exact order: hero with floating case thumbnails; statement/manifesto band; client flick-card deck carousel; services trio; testimonials carousel; about/self-esteem band with the H2 \"Does your brand have self-esteem issues?\"; call-to-action block with the H2 \"Ready to work with us?\" and the two choice cards; full-height footer (sitemap/podcast/social/legal live in the footer)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "hero_lettermark_and_drifting_thumbnails"
description = "The hero shows an animated brand lettermark assembled from twelve individual original letterform images, and case thumbnails continuously drift upward in the left and right edge zones"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "contact_flow_leaves_page_state_untouched"
description = "Scripted contact flow: note the client carousel's centered card and an Organic views counter value; choose \"We'll call you\", wait a few seconds, then submit a valid email with the agreement checkbox ticked. The success state \"Thanks for your submission!\" replaces the fields in place, the submission request in the network log goes only to a local same-origin endpoint, and afterwards the carousel still shows the same centered card while the counter has kept ticking upward"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "flick_deck_flow_round_trip"
description = "Scripted flick-deck flow: on one client's deck, note the front card, click Next — the stack reshuffles, a new card is promoted to the front with its visible status updated, and only the new front card's video player responds to input; click Previous — the prior front card is restored the same way; throughout, the other four clients' decks show no change to their front cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "carousel_flow_state_retention"
description = "Scripted carousel flow: advance a client's flick deck one step, then advance the client carousel — the newly centered client renders at full scale with neighbors shrunk, and its own deck controls and stat tiles become the active ones; paging back re-centers the previous client with its deck still on the card it was left at, without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "locale_flow_round_trip_copy_english"
description = "Scripted locale flow on the single-page homepage: opening the locale dropdown shows a small EN / FI list; choosing FI updates the visible label to FI and choosing EN returns it to EN, all without leaving / or triggering a reload, and the page copy stays English throughout (no separate /fi page is rendered)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "playback_flow_seek_matches_readout"
description = "Scripted playback flow: pressing play on the front card's player starts the video and the elapsed time readout begins advancing; pausing halts the elapsed time; dragging the timeline seeks the video and the elapsed readout matches the new position immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "cookie_flow_toggle_and_reload_reset"
description = "Scripted cookie flow: the consent banner appears shortly after load; opening preferences shows the four categories with Essential locked on; toggling Marketing flips only that category's visible state while Analytics and Personalization stay unchanged; Accept dismisses the banner; a full page reload returns the page to its seeded state and the banner appears again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "anti_spam_early_submit_ignored"
description = "A contact submission attempted within the first few seconds after load is silently ignored as anti-spam: no success state appears and no submission request shows up in the network log"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "testimonials_indicator_matches_quote"
description = "Advancing the testimonials rotator repeatedly cycles through all quotes, and the current-position indicator always matches the visible quote at every step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "rear_flick_card_playback_active"
description = "A partially visible rear flick card's video player responds to input or starts playback while it is not the front card"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.40"
name = "about_self_esteem_band_present"
description = "The about/self-esteem band appears after testimonials and before the CTA block, showing the H2 \"Does your brand have self-esteem issues?\" with supporting copy and two call-to-action controls over a dark media band"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "client_shortlist_toggles_and_nav_count"
description = "Each of the five client cards exposes a Shortlist control; shortlisting Loom House then Second Circle raises the fixed-nav shortlist count from 0 to 1 to 2, marks those controls active, and the Shortlist panel lists both titles; removing Loom House from the panel drops the count to 1 and clears only Loom House's control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "discovery_brief_json_keys_live"
description = "Opening Export brief shows a JSON tab whose live object satisfies the Discovery brief JSON field contract: schemaVersion 1, brand Cinder & Bloom, shortlistedClients, activeClient, flickIndexByClient, locale (en or fi), cookieCategories matching the cookie consent request body (essential/marketing/analytics/personalization booleans), contactSubmitted, contactEmail (null when not submitted; equal to the contact lead email when submitted), activeOrganicViews, activeLikes, and testimonialIndex; a Markdown tab is headed Discovery brief — Cinder & Bloom."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "discovery_brief_reflects_session_mutations"
description = "After shortlisting Loom House and Second Circle, setting locale to FI, toggling Marketing off via a valid cookie preferences save, advancing the carousel and active flick deck, and completing a valid contact submit under the contact field contract, the Export brief JSON contains schemaVersion 1, those two titles in shortlistedClients, locale fi, cookieCategories.marketing false with essential true, the new activeClient and flick indices, contactSubmitted true with contactEmail equal to the submitted lead email, and updated counter strings."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "discovery_brief_download_and_copy"
description = "In the discovery brief panel, Download offers the live JSON file and Copy writes the exact visible tab text with a brief copied confirmation that reverts after a moment."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "discovery_brief_import_round_trip"
description = "After exporting a brief with a non-empty shortlist, clearing the shortlist, then Importing that JSON restores shortlistedClients, locale, cookie toggles (essential stays on), centered activeClient, and flickIndexByClient so nav count, Shortlist controls, locale label, cookie preferences, carousel, and front cards match the imported brief."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "command_palette_ctrl_k_commands"
description = "Pressing Ctrl+K (Cmd+K) opens a command palette with a focused search input; choosing Export brief opens the discovery brief panel; choosing Jump to services scrolls to the services trio without leaving /; Escape or backdrop click closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "undo_redo_shortlist_and_cookie"
description = "Shortlisting Loom House then Undo returns the nav count to 0 and clears that Shortlist control; Redo restores it; toggling Marketing off then Undo restores Marketing on without changing the shortlist."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n41"
name = "export_omits_session_mutations"
description = "After shortlisting clients and mutating locale/cookies/contact, the Export brief JSON omits those mutations (empty shortlistedClients, wrong locale, contactSubmitted false, or stale counters) despite the visible UI showing them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n42"
name = "undo_does_not_restore_shortlist"
description = "After shortlisting a client, activating Undo leaves the nav shortlist count elevated and that client's Shortlist control still active."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.48"
name = "contact_lead_request_body_contract"
description = "The contact popup validates an API-shaped lead payload whose successful submit IS the request body: email (required, at most 254 chars, local@domain.tld), phone (optional; null/empty or at most 40 chars of digits/spaces/+/-/()), and terms (boolean true); only a valid payload reveals Thanks for your submission! and posts to the local contact endpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "cookie_consent_request_body_contract"
description = "Cookie preferences expose Essential (locked on), Marketing, Analytics, and Personalization; Accept writes cookieCategories with exactly the four required booleans essential/marketing/analytics/personalization all true; a valid preferences save writes those exact four booleans; essential false or a missing/non-boolean key is rejected with named field errors and no banner dismiss."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "discovery_brief_keys_align_form_contracts"
description = "After a valid contact submit and a cookie Accept or preferences save, Export brief JSON shows schemaVersion 1, contactSubmitted true with contactEmail equal to the submitted contact email, and cookieCategories matching the cookie consent request-body keys essential/marketing/analytics/personalization with essential true."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n43"
name = "brief_contact_or_cookie_keys_diverge_contracts"
description = "After a valid contact submit or cookie Accept/preferences save, the discovery-brief JSON omits schemaVersion / contactEmail / cookieCategories or shows values that disagree with the contact lead email or the four-boolean cookie consent payload just applied."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.51"
name = "discovery_brief_field_contract_complete"
description = "A live Export brief JSON includes every required Discovery brief field-contract key (schemaVersion 1, brand, shortlistedClients, activeClient, flickIndexByClient with all five client titles, locale en or fi, cookieCategories, contactSubmitted, contactEmail, activeOrganicViews, activeLikes, testimonialIndex) and satisfies the contactSubmitted/contactEmail and cookieCategories.essential cross-field rules."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n44"
name = "discovery_brief_missing_required_keys"
description = "Export brief JSON is missing schemaVersion 1 or another required Discovery brief field-contract key, uses a locale outside en/fi, or breaks the contactSubmitted/contactEmail or cookieCategories.essential cross-field rules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or end-to-end flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
