[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "No console errors or unhandled promise rejections occur on load or while exercising the flick deck, carousel, video player, locale dropdown, contact form, cookie banner, and mobile menu"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Shared client state stays coherent: the locale label, active flick-deck card, contact form state, and cookie state update immediately in place without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "The app stores no state in localStorage or sessionStorage — both stay empty after exercising the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "The app serves on port 3000, / returns HTTP 200, and the contact form POSTs to a local route that returns a success response revealing the app's own success state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Video is served locally with HTTP range support (206 Partial Content) so the player timeline can seek and scrub"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "The build runs fully offline: no fonts, images, video, or scripts are requested from an external host at runtime"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "4_7"
description = "Using localStorage, sessionStorage, or any other browser storage API to hold app state is a failure"
type = "binary"
weight = 1.0
negate = true
