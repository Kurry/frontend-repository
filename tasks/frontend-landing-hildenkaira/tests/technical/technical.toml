[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "console_clean_during_exercise"
description = "No console errors or unhandled promise rejections occur on load or while exercising the flick deck, carousel, video player, locale dropdown, contact form, cookie banner, and mobile menu"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "client_state_coherent_in_place"
description = "Shared client state stays coherent: the locale label, active flick-deck card, carousel position, contact form state, cookie state, shortlist count, and discovery brief preview update immediately in place without a full page reload, and a reload returns every facet coherently to the seeded baseline — never a mix of kept and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "storage_stays_empty"
description = "localStorage and sessionStorage both stay empty after exercising the page (all domain state lives in in-memory client state)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "port_3000_and_local_contact_post"
description = "The app serves on port 3000, / returns HTTP 200, and the contact form POSTs to a local same-origin route that returns a success response revealing the app's own success state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "video_range_requests_206"
description = "Video is served locally with HTTP range support (206 Partial Content responses in the network log) so the player timeline can seek and scrub"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "fully_offline_no_external_requests"
description = "The page runs fully offline: no fonts, images, video, or scripts are requested from an external host at runtime"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "browser_storage_used_for_state"
description = "Using localStorage, sessionStorage, or any other browser storage API to hold app state is observed after exercising the page"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "keyboard_operability_and_focus"
description = "Every interactive control — nav links, locale options, deck and carousel controls, video player buttons, form fields, cookie banner actions — is reachable and operable with the keyboard alone, buttons show a visible focus outline on keyboard focus, and the open mobile menu can be closed from the keyboard while background scrolling stays locked"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "contact_popup_focus_trap"
description = "The contact popup behaves as a modal dialog: focus moves into it when opened, stays trapped while it is open, and returns to the triggering control when it closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "form_feedback_exposed_to_at"
description = "Contact form validation errors and the success state are exposed to assistive technology (ARIA roles, live regions, or field associations visible in the accessibility tree) as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "split_headings_keep_accessible_text"
description = "Split and letter-assembled headings keep their full text accessible: the hero H1 container carries the complete phrase while per-line fragments are hidden from the accessibility tree, and the brand lettermark carries an accessible label reading Cinder & Bloom with its per-letter fragments hidden"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "player_controls_accessible_labels"
description = "The video player's play/pause, mute, fullscreen, and timeline controls carry accessible labels"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.13"
name = "fast_interactive_no_layout_shift"
description = "The page is interactive within 2 seconds of a local cold load, hero content appears without waiting for below-the-fold video, and no visible layout shift occurs as fonts, images, or videos finish loading — media regions reserve their space from first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "smooth_full_page_scroll"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through the pinned services throw, the line reveals, the thumbnail drift loops, and the ticking counters, with smooth (inertial) scrolling active at 768px and wider and native scrolling below 768px"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "hydration_clean_console"
description = "The console shows no hydration mismatch errors or warnings on first load of the homepage"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "hydrated_content_flash"
description = "Statically rendered content visibly flashes and is replaced by different client content after hydration — mismatched text, reflowing layout, or restyled elements between first paint and interactive"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.17"
name = "wcag_aa_contrast_on_surfaces"
description = "Text and control labels meet WCAG AA contrast against their surfaces: near-black body on off-white, lime headings on black media bands, and white text on dark-grey/chrome footer and cookie surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "html_first_landmarks_and_controls"
description = "The page exposes HTML-first landmarks (nav, main, footer), a logical heading outline, and interactive controls as buttons/links/labelled inputs rather than anonymous unlabelled divs for primary chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.19"
name = "required_authored_asset_files_load"
description = "Browser network and playback evidence shows all required Cinder & Bloom images and marks plus distinct local VP9 WebM/poster pairs loading from same-origin paths with no 404, decode, poster, or playback failure"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.20"
name = "shortlist_brief_state_in_memory_coherent"
description = "Shortlist count, discovery brief preview, command palette state, and undo/redo stacks live in in-memory client state: mutating shortlist updates the nav count and brief JSON without reload, and a full reload coherently resets shortlist to empty, locale to EN, and cookie banner to seeded visibility with empty undo/redo — never a mixed partial survival."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n20"
name = "brief_uses_browser_storage"
description = "After shortlisting clients and exporting a brief, localStorage or sessionStorage holds shortlist/brief/undo state (forbidden for this in-memory homepage)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.21"
name = "api_shaped_contact_and_cookie_schema_validation"
description = "Invalid contact payloads (empty/invalid email, terms false, out-of-bounds phone) and invalid cookie preference drafts (essential false or missing/non-boolean category) are blocked entirely client-side with named inline per-field errors and no success/consent commit; valid payloads alone reach Thanks for your submission! or update cookieCategories."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n21"
name = "schema_bypass_commits_invalid_payload"
description = "An invalid contact or cookie payload still reveals Thanks for your submission! or mutates cookieCategories / dismisses the banner without named field errors."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.22"
name = "discovery_brief_import_schema_validation"
description = "Import of discovery-brief JSON validates the Discovery brief JSON field contract client-side: schemaVersion must be 1, locale en or fi, cookieCategories and contactSubmitted/contactEmail must satisfy their contracts; invalid imports show a named inline error and leave shortlist, locale, cookie, carousel, and flick state unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n22"
name = "brief_import_bypasses_schema"
description = "Importing schema-invalid discovery-brief JSON (wrong schemaVersion, locale outside en/fi, or broken contact/cookie cross-field rules) still mutates session state without a named inline import error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console, network, storage, accessibility, performance, or state coherence) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network request, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
