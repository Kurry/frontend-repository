[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_match_mandated_casing"
description = "Where the app renders headings and section titles, they keep the mandated casing and wording consistently, including the hero H1 If you can't reach a million people with 0€ ad spend, your branding sucks., the statement H2 Content only you can post because it's built around your people., Does your brand have self-esteem issues?, and Ready to work with us?."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "cta_labels_specific"
description = "Where the app renders primary action labels, they use the specific PRD verbs (We'll call you, Contact us, Show case, Accept, Organic content / Ads for social / Training CTAs) rather than generic Submit/OK alone when a specific label is specified."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "contact_errors_name_fields"
description = "Where the app renders contact validation errors, they name the offending field (email, phone, or Privacy Policy/terms) and the broken rule rather than only saying Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "cookie_and_form_empty_guidance"
description = "Where the app renders the cookie preferences and contact popup empty/unchecked states, the copy still explains the categories (Essential, Marketing, Analytics, Personalization) and agreement requirement rather than a blank broken stub."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "marketing_copy_spelling_grammar"
description = "Where the app renders body or marketing copy (hero lead We will 10x your social presence or work for free until it's done., statement, services, about, testimonials), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "cinder_bloom_terminology_consistent"
description = "Where the app renders the agency name and client identities, terminology stays consistent as Cinder & Bloom and the five fictional clients (Loom House, Second Circle, New Current, Roadkind, Motive Lab) — not mixed with leftover source-agency naming."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "stat_numbers_space_thousands"
description = "Where the app renders Organic views and Likes counters, large numbers use a space as the thousands separator (for example 2 148 665) consistently."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_message_exact_copy"
description = "Where the app renders the contact confirmation, it states the mandated outcome exactly: Thanks for your submission!."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as the hero H1, hero lead, Does your brand have self-esteem issues?, Ready to work with us?, or primary CTA labels."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "source_brand_or_real_designer_in_copy"
description = "Rendered copy still names a source agency/client, real third-party logos as client marks, or the reference site's real designer instead of Cinder & Bloom and invented credits."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders mandated headings, hero lead, stat labels, or form messages unreadable at 1440 or 479."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.9"
name = "shortlist_export_palette_labels_specific"
description = "Where the app renders shortlist, export, palette, and undo chrome, labels stay specific (Shortlist, Export brief, Download, Copy, Import, Undo, Redo, Discovery brief) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "brief_markdown_heading_wrong"
description = "Where the Markdown discovery brief tab renders a heading, it is missing Discovery brief — Cinder & Bloom or substitutes placeholder/lorem copy."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.10"
name = "contact_cookie_validation_errors_name_fields"
description = "Where the app renders contact or cookie preference validation errors, they name the problem field (email, phone, terms/Privacy Policy, essential, marketing, analytics, or personalization) and the rule rather than only saying Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n6"
name = "form_errors_generic_invalid_only"
description = "Where contact or cookie validation fails, the only visible message is a generic Invalid (or equivalent) with no field name."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
