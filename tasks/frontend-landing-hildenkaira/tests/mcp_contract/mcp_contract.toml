[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_form_session_artifact_modules_bound"
description = "Contract modules browse-query-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, form, session, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, form, session, and artifact tool handlers drive the same visible UI logic as the on-page controls (section destinations, locale label, contact validate/submit/reset, video start/pause/resume/stop, and discovery-brief export/copy/import)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_available"
description = "Only documented browse, form, session, and artifact operations (import, export, copy, print_preview, convert) from the declared module specs are available — no undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/set_locale, form validate/submit/reset, session start/pause, and artifact export/copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_and_clients_entity"
description = "Browse open works for declared destinations hero, statement, client, services, testimonials, about, cta, and footer; the browsable entity clients is bound."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_validate_submit_reset_bound"
description = "Form-workflow operations validate, submit, cancel, and reset are bound for contact fields email, phone, and terms plus cookie fields essential, marketing, analytics, and personalization, and surface the same validation/success/consent UI as manual use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "locales_and_session_ops_match_bindings"
description = "Browse set_locale accepts en and fi; session operations start, pause, resume, and stop are bound for the front-card player matching the Bindings block."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / form-workflow-v1 / command-session-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_transfer_module_bound"
description = "artifact-transfer-v1 is initialized alongside browse-query-v1, form-workflow-v1, and command-session-v1; webmcp_list_tools shows artifact-prefixed tools for export, import, and copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_export_copy_import_bound"
description = "Artifact operations export, import, and copy are bound for export formats json and markdown and import mode discovery-brief; invoking artifact export/copy drives the same discovery-brief panel state as the visible Export brief / Copy controls, and the exported JSON acknowledges the Discovery brief field contract (schemaVersion 1 and live session keys)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.13"
name = "browse_destinations_include_about"
description = "Browse open works for declared destinations including about (plus hero, statement, client, services, testimonials, cta, footer)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.14"
name = "form_cookie_fields_match_consent_contract"
description = "Form fields essential, marketing, analytics, and personalization with validate/submit/cancel/reset match the cookie preferences surface and apply the same visible cookieCategories state as Accept or a valid preferences save."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.15"
name = "artifact_export_matches_brief_field_contract"
description = "After a valid contact submit and cookie Accept or preferences save via UI or form MCP, invoking artifact.export with format json returns discovery-brief JSON with schemaVersion 1 whose contactEmail and cookieCategories match the same store as the visible Export brief panel."
type = "binary"
weight = 1.0

