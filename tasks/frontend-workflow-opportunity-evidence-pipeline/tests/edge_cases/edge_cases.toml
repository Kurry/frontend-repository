[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"





[[criterion]]
id = "edge_cases.1"
name = "edge_cases_1"
description = "Attempting to bind overlapping requirements or duplicate spans triggers named recovery correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "edge_cases.2"
name = "edge_cases_2"
description = "Inputting unsupported metric/date data during packet tailoring is allowed or fails without named recovery."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.3"
name = "edge_cases_3"
description = "Exceeding exact page/character bounds fails to trigger a recovery path or is allowed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.4"
name = "edge_cases_4"
description = "Unresolved merge conflicts are permitted to complete branch tailoring."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.5"
name = "edge_cases_5"
description = "Violating WIP limits or mutually exclusive terminal states on the stage board is allowed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.6"
name = "edge_cases_6"
description = "Timeline tasks can be placed overlapping or outside deadline boundary constraints."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.7"
name = "edge_cases_7"
description = "Editing the profile after a submission modifies the frozen snapshot."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.8"
name = "edge_cases_8"
description = "Forged imports with invalid data or checksums mutate application state instead of being atomically rejected."
type = "binary"
weight = 1.0
negate = true
