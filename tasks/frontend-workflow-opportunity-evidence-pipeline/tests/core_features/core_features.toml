[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "requirement_extraction"
description = "Core features: exact spans from opportunity brief can be classified as must-have, preferred, etc."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "requirement_evidence_binding"
description = "Core features: evidence cards can be dragged onto requirement chips to bind them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "tailored_packet_branches"
description = "Core features: resume blocks and cover sections can be assembled from evidence-bound facts."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "unsupported_fact_blocking"
description = "Core features: new facts not represented in bound evidence are blocked in the packet composer."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "fit_gap_review"
description = "Core features: fit review exposes weighted coverage and a reviewer labels readiness."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "kanban_board_transitions"
description = "Core features: opportunity cards move through stages under declared conditions."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "submission_snapshots"
description = "Core features: submitting freezes the opportunity revision, bindings, and rendered documents."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "timeline_obligations"
description = "Core features: stage events generate and schedule timeline obligations (interviews, follow-ups)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "export_portable_dossier"
description = "Core features: exports produce JSON, Markdown, ICS, and CSV artifact files."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core features that is NOT covered by any other criterion in this file."
type = "binary"
negate = true
weight = 1.0
