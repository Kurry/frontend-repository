[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The canvas background computes to #F4F7F6, the habit card surface computes to #FFFFFF, and the primary button computes to #0F9D74 background with white text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Headings and body text render in Manrope (or its declared fallback), with headings visibly larger than body text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Habit cards, buttons, and inputs all render with a consistent 8px border-radius"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The three flame milestone treatments (plain, bright, gold) are visually distinguishable from each other as a present graphic element, not a placeholder"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The active category filter chip is visually highlighted distinctly from inactive chips"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "A paused habit renders with a visibly muted or dimmed treatment distinct from active habits wherever it appears"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "At approximately 375px width, habit rows stack in a single column with no horizontal scrolling and the New Habit form remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "3_9"
description = "The app substitutes a different color palette or type system than the specified tokens (Manrope, #0F9D74 primary, #F4F7F6 canvas)"
type = "binary"
weight = 1.0
negate = true
