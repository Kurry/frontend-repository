[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "a11y.keyboard_parity"
name = "keyboard_navigation_parity"
description = "Using only the keyboard, place, resize, and transfer blocks, bind edges, edit dates, allocate seeds, navigate tasks/findings, merge/approve, and export. Confirm that focus management and application state match the pointer experience."
type = "binary"
weight = 1.0

[[criterion]]
id = "a11y.focus_trap"
name = "modal_focus_trap"
description = "Open any modal dialog (e.g., branch compare or export). Confirm that focus is trapped within the dialog and returns to the opener element when closed."
type = "binary"
weight = 1.0

[[criterion]]
id = "a11y.missing_announcements"
name = "missing_live_announcements"
description = "Trigger a layout conflict or error state. The application fails to announce the error or state change to assistive technologies."
type = "binary"
negate = true
weight = 1.0
