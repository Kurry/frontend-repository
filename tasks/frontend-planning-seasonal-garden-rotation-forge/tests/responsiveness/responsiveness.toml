[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "resp.mobile_flow"
name = "mobile_workflow_transformation"
description = "Set viewport to 375px. Verify that the UI uses mini-maps, crop/coordinate/date sheets, and ledger drawers to preserve the complete job, retaining every action with no overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "resp.touch_targets"
name = "small_touch_targets"
description = "At 375px viewport width, one or more interactive elements have a hit area smaller than 44x44 pixels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "resp.desktop_canvas"
name = "desktop_canvas_layout"
description = "At 1440px viewport width, verify that the application utilizes canvases, graphs, and a full timeline without forcing the user into mobile-oriented drawers unnecessarily."
type = "binary"
weight = 1.0
