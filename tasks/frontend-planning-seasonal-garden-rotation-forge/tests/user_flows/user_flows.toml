[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "flow.complete_lifecycle"
name = "complete_planning_lifecycle"
description = "Verify the end-to-end user flow: place crop, adjust schedule, rotate/relate blocks, check resources, allocate seeds, edit tasks/harvest, branch/evaluate, approve, and export. Confirm all states transition correctly through each milestone."
type = "binary"
weight = 1.0

[[criterion]]
id = "flow.reset_import"
name = "reset_and_import_flow"
description = "After an export, reset the session to a clean state. Then import the exported plan artifact. Confirm that authored and derived state is restored identically to before the reset."
type = "binary"
weight = 1.0

[[criterion]]
id = "flow.undo_redo"
name = "undo_redo_recovery"
description = "Perform a destructive or modifying action (e.g., delete a block or move it causing conflict). Trigger an undo. Confirm the exact prior snapshot—including selection, viewport, filters, focus, and history anchor—is fully restored."
type = "binary"
weight = 1.0
