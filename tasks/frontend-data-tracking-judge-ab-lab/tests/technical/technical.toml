[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All views derive from one shared dataset: completing a rescore run updates the experiment table, both Compare pickers, and the cost chart together; saving an attribution updates the flip row and the pair rollup together; and filters, chips, sort, and the selected pair recompute the same visible data everywhere it appears, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "reload_returns_seeded_state"
description = "A page reload returns the app to its seeded state — 12 trials, the 4 seeded labels, the default view and theme — with no in-session labels, attributions, or run state remaining, and localStorage and sessionStorage stay empty after a full exercise of the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app, including a complete rescore run with its simulated retry"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "cold_load_and_rapid_input_stability"
description = "The app is interactive (header navigation and table controls respond) within 2 seconds of a local cold load, and under rapid repeated input — fast label-pair switching, filter and chip toggling, theme flips, quick view switches — the UI stays responsive with no hangs and no view showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus_escape"
description = "Every interactive control — nav items, chips, sort controls, label pickers, flip expanders, form fields, legend toggles, copy controls — is reachable and operable with the keyboard alone with a visible focus indicator, and open dialogs and popovers close on Escape returning focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "labels_and_error_association"
description = "The rescore, attribution, and saved-pair form fields have visible labels, and each validation message names the field it belongs to and renders in association with that field"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "api_shaped_schemas_shared_across_forms_and_export"
description = "Form validation enforces the same lab-results field contracts the export shape declares: attribution cause is one of scorer noise, rubric change effect, harness change effect with note at most 200 characters; rescore labelName is unique case-insensitively with scorerModel in {Sable 4, Quartz Mini, Onyx Pro} and configNote at most 120 characters; saved-pair name is unique, at most 40 characters, with distinct labelA and labelB — invalid values show an inline message naming the field and do not mutate state, while a valid create produces a record whose fields match the corresponding nested objects in the Export JSON"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "import_export_share_one_schema"
description = "After a valid Import of lab-results JSON, a fresh Export JSON preview re-enumerates schemaVersion rescore-ab-lab-v1 and the restored attributions and savedPairs with the imported values — form, export, and import share one schema"
type = "binary"
weight = 1.0

