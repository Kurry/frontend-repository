[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: complete a rescore with a unique label, save an attribution under Baseline versus that label, switch to Cost, then reload. All facets coherently reset to the seeded baseline — 12 trials, 4 labels, no in-session label, attribution, or saved pair — never a mix of persisted and cleared state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort the experiment table by a label's reward ascending, note the order, then sort descending; the row order reverses correctly relative to ascending."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: change the Compare pair or filters and confirm the summary strip, pass-rate wheel, and paired table change meaningfully rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: complete a rescore and confirm the new label appears in the experiment table picker, both Compare pickers, and the Cost chart series without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the attribution rollup total immediately before and after saving one attribution; the delta is exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: attribute two flips to different causes (scorer noise vs rubric change effect) and confirm the rollup per-cause counts differ accordingly."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start Compare attribution on one trial, switch to Experiments and toggle a chip, return to Compare and finish the attribution; neither flow corrupts the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "mutate_export_import_pipeline"
description = "Mutate → derived → export → import: attribute one flip under Baseline versus Rubric v2, save that pair, confirm Export JSON contains schemaVersion rescore-ab-lab-v1 plus that attribution and savedPairs entry; Download; reload; Import; confirm tag, rollup, and saved-pair menu return and Export still shows every required top-level key."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, some in-session facets survive while others reset, producing incoherent partial persistence."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Summary strip, pass-rate wheel, or Cost series render identically regardless of selected pair or filters."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "export_drops_api_shaped_contract"
description = "After a rescore or attribution mutation, the Export JSON drops a required field-contract key or shows schemaVersion other than rescore-ab-lab-v1."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "A completed rescore's new label appears in one view but not in Compare pickers or Cost until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
