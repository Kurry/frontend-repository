[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "compare_attribution_undo_flow"
description = "Compare end to end: pick Baseline as A and Rubric v2 as B, read the summary strip and pass-rate wheel, open a trial with flips, expand a flip, attribute it to rubric change effect, watch the pair rollup increment by one, then Undo and confirm the tag and rollup revert — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "rescore_validation_then_run_flow"
description = "Rescore end to end: open the rescore form, get rejected inline for a duplicate label name, correct to a unique name, pick a scorer model, submit, watch the 12 steps advance with one retry, and after completion select the new label as B in Compare and see paired deltas."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "filter_chip_sort_clear_flow"
description = "Filter chain: click the Big deltas suggestion chip, confirm the table narrows and the chip is active, add a task filter, sort by delta size, then clear all filters and confirm exactly 12 rows return."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "cost_disclosure_to_cost_view"
description = "Cost audit: in Compare, open the cost disclosure for label B, pick a contributing trial, confirm the paired table highlights that trial, then switch to Cost and confirm B's series end value equals the disclosed total."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "saved_pair_round_trip_flow"
description = "Saved pair round trip: pick Baseline and Quartz Swap, save under a unique name, switch pickers away, apply the saved pair, and confirm A, B, summary strip, chart, and pass-rate wheel restore."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "export_after_mutations_flow"
description = "Export after mutations: complete a rescore with a unique label, attribute one flip under Baseline versus that label, open Export lab results, and confirm schemaVersion rescore-ab-lab-v1, the new label under labels with its scorerModel, its trial results, and the attribution; Copy places that exact JSON on the clipboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "import_round_trip_flow"
description = "Import round trip: attribute one flip under Baseline versus Rubric v2, save that pair under a unique name, Download lab-results.json, reload to seeded state, Import that file, and confirm the attribution tag, rollup, and saved-pair menu entry return; a second Import with wrong schemaVersion or illegal cause leaves state unchanged with a named-field error."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "command_palette_jump_flow"
description = "Command palette jump: open with Control-K or Command-K, type enough to match Cost, choose it, and land on the Cost view with the palette closed."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "reload_returns_seeded_baseline"
description = "A page reload returns the app to its seeded state: 12 trials, the 4 seeded labels, default view, and no in-session labels, attributions, saved pairs, or undo history remaining."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "artifact_end_state_field_contract"
description = "Artifact end state: after a rescore and an attribution, open Export lab results and confirm every required field-contract key is present with the session values; Download then Import after reload reconstructs attributions and saved pairs when those were exported."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable"
description = "Compare, rescore, attribution, export, or import flows are not reachable from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "export_omits_session_mutations"
description = "After a completed rescore and an attribution save, Export lab results JSON omits the new label or the attribution."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "import_round_trip_fails"
description = "Importing a valid previously exported lab-results JSON after reload fails silently or leaves attributions and saved pairs unrestored."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "undo_does_not_restore_attribution"
description = "After saving an attribution, Undo does not remove the tag or does not decrement the pair rollup."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "state_desync_across_views"
description = "A rescore or attribution change appears in one view but not another until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
