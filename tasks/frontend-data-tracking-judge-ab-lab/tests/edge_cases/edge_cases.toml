[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "designed_empty_and_agreement_states"
description = "Before both Compare labels are picked the region shows a designed empty state naming what to pick; a trial pair with zero flips shows the designed agreement state; a pair with no tagged flips shows a zero-state rollup naming how to tag one; and deselecting every Cost series leaves a designed empty chart state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "rescore_and_attribution_inline_validation"
description = "Submitting the rescore form with a duplicate case-insensitive labelName, empty labelName, missing scorerModel, or configNote longer than 120 characters shows an inline message naming the offending field and starts no run; submitting attribution with no cause or note longer than 200 characters shows an inline message naming the field and saves nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "saved_pair_validation_names_field"
description = "Saving a comparison pair with an empty name, duplicate name, name longer than 40 characters, or labelA equal to labelB shows an inline message naming the offending field and adds no menu entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "self_compare_blocked"
description = "Selecting the same label for both A and B is blocked with the already-chosen label disabled or a visible rejection message, and no self-comparison table renders."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_submit_single_rescore"
description = "Double-activating the rescore submit control starts exactly one run and creates exactly one label."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_disabled_is_noop"
description = "With Undo disabled, activating Undo changes no attribution state; after one undo, Redo restores exactly the prior tag."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "seeded_export_is_schema_valid"
description = "Opening Export lab results before any in-session rescore or attribution still produces valid JSON for the seeded 12 trials and 4 labels with schemaVersion rescore-ab-lab-v1 and every required top-level key; the panel never shows an empty or broken region."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "import_rejects_contract_invalid"
description = "Importing malformed JSON, or parseable JSON that fails the lab results field contract (missing schemaVersion, schemaVersion not rescore-ab-lab-v1, cause outside the closed enum, note longer than 200 characters, savedPairs name longer than 40 characters, or pass inconsistent with totalReward), leaves attributions and saved pairs unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "palette_escape_preserves_drilldown"
description = "Closing the command palette with Escape while a Compare drill-down is open leaves the drill-down intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "cost_legend_empty_state"
description = "Deselecting every series in the Cost view legend leaves a designed empty chart state, and re-enabling a series restores it."
type = "binary"
weight = 1.0

