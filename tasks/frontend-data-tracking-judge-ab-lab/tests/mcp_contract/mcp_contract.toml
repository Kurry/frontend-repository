[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers match visible UI command logic for Experiments/Compare/Cost navigation, attribution create/update, rescore-run start, and lab-results export/import/copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations and destinations are available: destinations experiments, compare, cost, trial-criterion-diff; entity attribution create/select/update; session start for rescore-run; artifact export/import/copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation: browse destinations and filters, entity attribution create, session start for rescore-run, and artifact export/import/copy without manual harness edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations declared for attribution — create, select, and update — work through the same handlers as the attribution form and flip-row controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Attribution and rescore form validation, error, and cancel paths remain bound to the same store commands the UI uses; value bounds enforce cause in {scorer-noise, rubric-change-effect, harness-change-effect} and note max 200 chars."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations and filters match the allowed specification: experiments, compare, cost, trial-criterion-diff with filters task, pass-fail, delta-size, label-columns, compare-pair, suggestion-chip and sorts task-name, label-reward, delta-size."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared module routes or capabilities are exposed beyond the Bindings block."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation are correctly surfaced for webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound for lab-results-json (and copy for config-summary-text) and drive the same paths as Export lab results, Import, and Copy without putting file contents in WebMCP results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling is unbound, missing, or a no-op for a mandated browse, entity, session, or artifact operation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "WebMCP handlers mutate a different store path than the visible attribution, rescore, export, or import controls, so automation and UI disagree."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or entity operations are exposed beyond the Bindings block."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared browse, entity, session, or artifact operations cannot be exercised via automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "export_tool_omits_session_or_contract"
description = "Invoking artifact export for lab-results-json succeeds in the tool result while the visible Export JSON preview still omits session attributions or labels, or drops required field-contract key schemaVersion rescore-ab-lab-v1."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the WebMCP contract surface that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user or automation caller, not a nitpick. If present, name the defect and cite the concrete evidence. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
