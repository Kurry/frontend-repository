[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens directly at / with no login or error page and the table shows a \"Deal first hand\" prompt rather than an empty board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After clicking \"Deal first hand\", the table seats the human plus 3 AI opponents (4 seats) each starting at 1000 chips and a hand begins with hole cards dealt and blinds posted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "When it is the human's turn, Fold, Check or Call, Raise, and All-in are all visible, and \"1/2 pot\" and \"Pot\" populate the raise amount to distinct values (half vs full current pot)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After raising a specific chip amount, the pot increases by that amount and the human's stack decreases by the same amount with no page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After advancing from preflop to the flop and from the flop to the turn, the hand-equity percentage next to the human's hole cards recalculates to a new value at each street"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "On load each of the 3 AI seats shows a labeled play-style badge (Aggressive, Tight, or Bluffer) that is visually distinct, not distinguishable by text label alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After playing 8 completed hands, the blind-level indicator advances to the next level and both the small and big blind amounts increase, while the stats panel and hand history are not reset"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After completing a hand, the Session stats panel updates hands played, hands won, win rate, and biggest pot, and the win rate stays consistent with hands won divided by hands played"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "When a hand reaches showdown with two or more players, every remaining player's hole cards are revealed face-up and the winning 5-card hand is highlighted with its hand-type label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After completing two hands, the toggleable Hand history panel lists both with pot size, winner, and winning hand type most-recent-first, and shows \"No hands played yet\" before any hand"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When the human's stack reaches 0 a Rebuy control appears, and using it resets the stack to 1000 and increments the rebuys counter by 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After earning an achievement badge a transient toast appears at that moment and the badge is then listed in the Badges panel without removing earlier badges"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "In the Collaboration scenario, queuing two non-conflicting changes offline and reconnecting via \"Go Online\" converges the \"Shared content\" to the same result in either delivery order, and a same-note conflict surfaces an explicit keep-mine / keep-peer choice"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After playing several hands so chips, blind level, stats, hand history, and badges have changed, a full page refresh restores all of them exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Clicking \"Deal first hand\" seats the human plus 3 AI opponents (4 seats), each starting at 1000 chips, and deals a hand with hole cards and posted blinds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "During the human's turn Fold, Check or Call, Raise, and All-in are all visible, and \"1/2 pot\" and \"Pot\" populate the raise amount to distinct values matching half and full pot"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Raising a specific chip amount increases the pot by exactly that amount and decreases the human's stack by the same amount with no page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "The hand-equity percentage next to the human's hole cards recalculates to a new value after the flop and again after the turn, reflecting the current board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The 3 AI seats each show a play-style badge (Aggressive, Tight, Bluffer) whose labeled behavior differs: the Aggressive seat raises noticeably more often than the Tight seat over several hands"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "The blind-level indicator shows the level number with the current small/big blind amounts and advances to the next level with higher blinds after 8 completed hands"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "The Session stats panel updates hands played, hands won, win rate, and biggest pot after each completed hand, and win rate stays consistent with hands won divided by hands played"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "At showdown with two or more players remaining, every remaining player's hole cards are revealed face-up and the winning 5-card hand is highlighted with its hand-type label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "The Hand history panel lists completed hands most-recent-first with pot size, winner, and winning hand type, prepending each new hand rather than replacing earlier entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "When the human's stack reaches 0 a Rebuy control appears and resets the stack to 1000 while incrementing the rebuys counter, and it increments again to 2 on a second rebuy rather than sticking at 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Earning a second, different achievement badge lists both badges in the Badges panel — the first is not overwritten or lost"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "\"Start new session\" shows a confirmation prompt; cancelling leaves the table, stats, and history unchanged, and confirming resets table, chip stacks, stats, hand history, and badges to their initial state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "In the Collaboration scenario two non-conflicting offline changes converge to identical \"Shared content\" whether delivered mine-first or peer-first, and a same-note conflict surfaces an explicit keep-mine / keep-peer choice instead of silently overwriting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "The table renders a static, non-interactive poker mockup: \"Deal first hand\" does not seat players or deal cards, or betting controls do not change the pot and stacks"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Advancing 8 hands resets or clears the Session stats or Hand history, or the blind level never advances despite hands completing"
type = "binary"
weight = 1.0
negate = true
