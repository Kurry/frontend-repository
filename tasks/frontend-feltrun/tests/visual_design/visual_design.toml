[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "The page background renders the near-black felt token --color-background (#02070C) and the human seat highlight or a key call-to-action uses --color-primary (#FFFF7D)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "Headings and body text use the Poppins font stack, with a section heading rendering near 34.56px and body text near 24.84px"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "Cards and panels use an approximately 5px border radius and spacing follows a tight 2px-based scale rather than large default browser spacing"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.4"
name = "2_4"
description = "Card faces, chip-stack amounts, and seat badges use light-on-dark contrast that is clearly legible against the near-black felt"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "The three AI play-style badges are visually distinct from one another by color and/or icon, not distinguishable by text label alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "2_6"
description = "Before the first hand the table shows a \"Deal first hand\" prompt and the empty Hand history panel shows \"No hands played yet\" rather than blank areas"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "2_7"
description = "At the showdown the winning hand's highlight (border or glow) is clearly distinguishable at a glance from the other revealed hands"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "At approximately 375px wide the table and betting controls stay usable with no horizontal page scroll and the stats/history panels collapse into a toggleable drawer rather than being clipped"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "2_9"
description = "Card faces, chip amounts, or seat badges render as dark text on the dark felt, or are otherwise illegibly low-contrast against --color-background"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "2_10"
description = "At approximately 375px wide the layout forces horizontal scrolling or clips the table, betting controls, or side panels instead of collapsing them into a drawer"
type = "binary"
weight = 1.0
negate = true
