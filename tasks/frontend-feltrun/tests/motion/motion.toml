[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Driving the real Deal and betting controls, the hand-equity percentage animates its value change on each new street rather than snapping instantly to the new number"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Earning a badge through real play shows a transient toast at the moment it is earned that clears on its own after a few seconds without blocking the betting controls"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "3_3"
description = "Every betting control and panel toggle shows a visible hover state distinct from its resting state when hovered without clicking"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Keyboard Tab focus is clearly visible on every betting control and panel toggle, legible against the dark felt"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Betting controls and panel toggles show no hover feedback at all, appearing static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The hand-equity percentage snaps instantly to its new value on a new street with no visible transition when driven through the real deal flow"
type = "binary"
weight = 0.5
negate = true
optional = true
