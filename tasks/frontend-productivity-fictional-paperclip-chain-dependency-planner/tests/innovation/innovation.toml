[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]

[[criterion]]
id = "innovation.catchall"
title = "Reconciles spatial route geometry and schedule constraints"
description = "One clip attachment reconciles spatial route geometry, DAG topology, earliest starts, slack, critical chain, review buffer, issue provenance, rehearsal, actor history, WebMCP, and standalone proof through one stable-ID model not covered elsewhere. Evidence required."
weight = 1.0
