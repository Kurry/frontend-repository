[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]

[[criterion]]
id = "AC-10"
title = "Stable entity diagnostics"
description = "Trigger port, snap, cycle, route, schedule, rehearsal, history, approval, and import faults; copy names stable entity/field/relation, rejected value or exact fictional rule, unchanged state, and recovery without real project or productivity claims."
weight = 1.0
