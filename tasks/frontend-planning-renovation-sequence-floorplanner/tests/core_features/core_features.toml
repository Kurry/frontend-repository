[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "clean_state_start"
name = "clean_state_start"
description = "Load the application and verify it begins from a genuinely clean state, with no authored work, completion, approval, export, or success evidence preseeded."
type = "binary"
weight = 1.0

[[criterion]]
id = "work_zone_placement"
name = "work_zone_placement"
description = "Place a work zone on the floor canvas, resize on grid, assign work packages, and mark effects; confirm it appears without overlapping incompatible active work or crossing walls."
type = "binary"
weight = 1.0

[[criterion]]
id = "dependency_graph"
name = "dependency_graph"
description = "Draw dependencies between packages (finish-start, start-start, cure-delay, etc.) and verify inspection nodes freeze exact work and material checksums upon approval."
type = "binary"
weight = 1.0

[[criterion]]
id = "schedule_crew_lanes"
name = "schedule_crew_lanes"
description = "Drag and resize work bars on the timeline; confirm critical path and float recompute deterministically without allowing a crew to occupy incompatible zones simultaneously."
type = "binary"
weight = 1.0

[[criterion]]
id = "household_access_phases"
name = "household_access_phases"
description = "Define temporary partitions/paths and verify daily floor snapshots show open paths; confirm a day cannot be approved when required access fails."
type = "binary"
weight = 1.0

[[criterion]]
id = "material_batch_ledger"
name = "material_batch_ledger"
description = "Reserve batch quantities and confirm deliveries conserve quantities exactly; verify rescheduling work marks a delivery or expiry allocation as stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "budget_payment_draw"
name = "budget_payment_draw"
description = "Create a change order and approve it, confirming the baseline, committed reservations, consumption, refunds, and remaining contingency reconcile exactly in integer cents."
type = "binary"
weight = 1.0

[[criterion]]
id = "delay_failure_recovery"
name = "delay_failure_recovery"
description = "Trigger a two-day material delay and a failed inspection; branch the schedule, shift downstream work, and recover while preserving completed facts."
type = "binary"
weight = 1.0

[[criterion]]
id = "responsive_plan_artifacts"
name = "responsive_plan_artifacts"
description = "Verify the desktop layout shows the floor, schedule graph, resource rail, and timeline, and that exporting produces canonical JSON, SVG maps, CSV ledgers, and ICS events."
type = "binary"
weight = 1.0
