[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Optional enhancement beyond the spec: unique delightful microinteractions — for example a celebratory flourish when a package completes or distinctive stage-complete treatments"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional enhancement beyond the spec: advanced animation such as choreographed stage sequences or richer triage card physics"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "Optional enhancement beyond the required coachmarks: a richer guided onboarding or first-run narrative for the factory console"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Optional enhancement beyond the spec: richer PR diff previews or visual file-change summaries in the PR detail"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.5"
name = "keyboard_driven_triage_bonus"
description = "Optional enhancement beyond the spec: keyboard-driven triage or additional command-palette actions that speed accept/reject without degrading required flows"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional enhancement beyond the spec: personalization such as a themed dark mode toggle or saved display preferences"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "Optional enhancement: a polished product identity for the task factory rather than a generic admin shell"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional enhancement beyond the spec: dynamic theming or a color mode toggle"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.9"
name = "package_comparison_bonus"
description = "Optional enhancement beyond the spec: a package comparison view that helps operators contrast two library entries"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Competition-level innovation is visible to users and executed without interfering with required behaviors"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The build is purely spec-compliant, barebones, and unenhanced"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "Interactions and visuals are generic, templated, or copied"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n3"
name = "experience_lacks_polish_guidance_story"
description = "The app has no polish, guidance, or story beyond the minimum labels"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n4"
name = "experience_lacks_extra_polish"
description = "The app has no extra visual or interactive polish beyond the required motion set"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n5"
name = "interface_is_flat_and_static"
description = "The UI is flat and static with no immersion beyond required transitions"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n6"
name = "helpful_platform_capabilities_ignored"
description = "Modern platform capabilities that would clearly help this console are ignored where an optional enhancement would fit"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n7"
name = "personalization_is_impossible"
description = "No optional personalization path exists even as a bonus surface"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n8"
name = "delightful_moments_are_absent"
description = "The app has no new or delightful user moments beyond the required toasts"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n9"
name = "design_has_no_twist"
description = "The design repeats well-trod admin patterns without a twist"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n10"
name = "effort_stops_at_mvp"
description = "The app shows minimal effort beyond the MVP deliverable"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
