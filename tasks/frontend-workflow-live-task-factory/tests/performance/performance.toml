[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "No console errors or warnings appear on load or during a full exercise of connections, candidates, triage, a pipeline run, library, and the palette"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = "UI transitions such as view switches, filter chip updates, and overlay open/close respond without perceptible lag under normal use"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "Async or simulated-async work shows visible activity: the credential checking status, the streaming affordance on Evaluate and Generate, the rate-limit countdown, and the batch n-of-m progress indicator"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.5"
name = "large_collections_render_without_lag"
description = "The paginated PR lists, the triage board, and the filtered library render and update without perceived lag as pages load and filters change"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive while a run is streaming: switching views, filtering lists, and opening the command palette all work during an active pipeline run"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Streaming text, triage card moves, and list enter/exit transitions maintain a smooth frame rate without visible hitching"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated input — quick filter toggles, fast triage actions, repeated palette open and close — never hangs or freezes the app, including while a run is streaming"
type = "binary"
weight = 1.0
