[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All contract-mandated modules are initialized and bound: entity-collection-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers for entity select/delete on library-package, form validate/submit/cancel/reset, workflow steps accept-pr/reject-pr/undo-triage/queue-batch/disconnect-credential/reset-coachmarks, session start/pause/resume, and artifact export/import/copy call the same application logic as the visible UI"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations from the contract are available — entity select/delete, form validate/submit/cancel/reset, session start/pause/resume, artifact export/copy/import, and the declared demos — with no undeclared entity types or routes"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation through webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool on the bound tools"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.5"
name = "entity_library_package_ops_work"
description = "Entity tools select and delete library-package records using entity fields repository, pr-number, difficulty, language, and created-date; delete requires explicit confirm=true and updates the Library list the same way as the visible delete confirmation"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form tools expose validate, submit, cancel, and reset over form fields repository, github-token, ai-base-url, ai-api-key, and reject-reason with value bounds still enforced — reject-reason limited to too-few-files, too-many-files, docs-only, and no-linked-issue; repository must match owner/name with exactly one slash"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.7"
name = "session_pipeline_ops_and_demos_bound"
description = "Session tools start, pause, and resume drive the same pipeline controls as the UI, and demos demo-pipeline-run, rate-limit-retry-driftline-pr-58, generate-failure-retry-petrel-pr-31, trivial-verdict-run, and batch-run are bound to the corresponding fixture paths"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.8"
name = "artifact_export_import_copy_bound"
description = "Artifact tools expose export, import, and copy for export formats instruction-document-text, task-config-toml, package-bundle-json, and batch-run-report-json and import mode package-bundle-json without returning raw file, blob, or base64 contents"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation are correctly surfaced for the four bound modules"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0
