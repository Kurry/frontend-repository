[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "The layout adapts gracefully from 1440px desktop to 375px mobile: top bar, navigation rail, triage board, pipeline stages, and package viewer all remain usable"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "Interactive controls — navigation entries, triage actions, filter chips, stage retry/pause/resume, and package copy/download — present tap targets of at least 44px at mobile widths"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Typography stays legible at both desktop and mobile widths, with the app title, view headings, and card/table text hierarchy preserved"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px width no content clips or overflows the viewport, and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "At widths of 768 pixels and below the navigation rail collapses behind a toggle that opens it as an overlay, and the triage columns stack vertically while retaining all accept, reject, and undo actions"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths the Candidates, Triage, Runs, and Library content stacks vertically in a readable order with every control still reachable"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "At mobile width, tapping triage actions, filter chips, navigation entries, and package controls operates them exactly as clicking does at desktop width"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375 pixel width there is no page-level horizontal scrolling; the changed-files table and the monospaced package parts scroll within their own containers instead"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.9"
name = "dense_tables_resize"
description = "The changed-files table, PR list, and library list resize to fit their containers across widths without overflowing or collapsing to unreadable size"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Persistent controls (the rail toggle, Connections, Download bundle, Import bundle) remain visible and reachable at every width"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The layout breaks or overflows at common breakpoints between 1440px and 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Controls are too small to tap or visibly misaligned at mobile widths"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Body, label, or chip text becomes too small to read at some widths"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Content is cropped, or unnecessary scrollbars appear around panels that fit their space"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = "The navigation rail is missing, cannot be opened, or cannot be closed at some width"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "A fixed or sticky element (rail overlay, top bar, toast) obscures content or controls at some width"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Triage cards, stage rows, filter chips, or package panels overlap each other at some viewport size"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n8"
name = "required_mobile_touch_actions_missing"
description = "Tapping a control on mobile that works via click on desktop produces no response"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "A table or monospaced package block keeps a static size and overflows the viewport at narrow widths"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Required controls (Connections, Run pipeline, Download bundle, Import bundle) disappear entirely at specific sizes with no alternate access"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
