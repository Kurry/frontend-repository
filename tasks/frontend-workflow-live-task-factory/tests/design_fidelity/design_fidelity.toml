[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing across the top bar, rail, triage columns, stage list, and package viewer follow one consistent scale with no arbitrary one-off gaps"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the specified hierarchy: app title larger than view headings, which are larger than card, table, and label text"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "No reference screenshots ship with this task; the layout matches the specified console anatomy at desktop width — top bar with mode indicator and status chips, left navigation rail with Candidates, Triage, Runs, and Library, three triage columns, the four-stage runner, and the four-part package viewer"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the spec calls out: triage card column moves, filter chip enter/exit, library entry appearance after a run, and palette/slide-over open/close"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Responsive behavior matches the specified patterns: the rail collapses behind a toggle at 768 pixels and below, triage columns stack, and nothing overflows at 375 pixels"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Buttons, inputs, selects, toggles, and cards show the specified default, hover, focus, disabled, and error treatments rather than unstyled browser defaults"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography has a clear hierarchy that distinguishes the app title, view headings, and body/card text"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, focus ring, disabled, error) match the visual_design specification where specified"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Mode indicator Demo data versus Live treatments, stage status colors, reject-reason badge hues, and substantial/trivial verdict treatments match the specified visual language"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover wash on rows/cards, button press feedback, and toast slide/dismiss follow the motion specification in duration and feel"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing in the console contradicts the consistent scale used elsewhere"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Stage status, reject-reason, or verdict colors are inconsistent with the treatments used on other surfaces of the same concept"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Control or column sizing visibly mismatches the specified console density"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required animations are missing or incorrect — triage cards teleport, streaming has no affordance, or overlays snap open"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls use bare browser default styles when the spec styles them"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The rail, triage columns, or package panels are misaligned at 1440px or 768px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Elements in the top bar, board, or package viewer render off-screen or clipped at desktop width"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "The console's structure deviates from the specification — missing navigation entries, triage columns other than Inbox, Accepted, and Rejected, stages out of the Fetch, Evaluate, Generate, Package order, or package parts absent from the viewer"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text have no distinction across views"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover, press, or toast microinteractions are missing or deviate from the motion specification"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
