[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_are_designed"
description = "Every empty condition renders a designed empty state: a repository whose PR list matches none of the active filters names those filters with a clear-filters control, an emptied library explains what belongs there, and an empty timeline filter result shows a message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline_before_submit"
description = "The Add repository form (AddRepository field contract), the reject-reason chooser (RejectAction field contract), the connection panel fields, and the TaskPackageBundle import all surface inline validation before any submission takes effect, each message tied to its field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_schema_version_rejected"
description = "Importing a bundle whose schemaVersion is missing or not exactly live-task-package-v1 lists schemaVersion (or an equivalent per-field message naming it) among the errors and adds nothing to the library"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_carry_status_and_fix"
description = "Error surfaces are actionable: a failed credential check shows the failure status or message on its row, a failed stage shows its status code and message with a Retry control, and validation messages name the field and the required shape rather than only saying invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_confirm_visibly"
description = "Copying a package part, undoing a triage action, completing a run, and importing a bundle each produce visible confirmation feedback such as a toast or inline confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "async_work_shows_activity"
description = "Simulated or live async work shows a visible activity affordance: the credential checking status, the streaming indicator on Evaluate and Generate, the rate-limit countdown, and the batch n-of-m progress indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded"
description = "Destructive or consequential actions are guarded: deleting a library package requires confirmation, and triage actions offer Undo for at least the most recent action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "guidance_for_non_obvious_controls"
description = "Non-obvious surfaces carry in-app guidance: first-run coachmarks point out the Connections panel, the Triage board, and the pipeline runner, and the Reset tips control restores them"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, selects, and labels across the console use semantic tags rather than generic clickable divs or spans"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_close_by_multiple_paths"
description = "The Connections slide-over, the reject-reason chooser, the delete confirmation, and the command palette each close via their close control, via Escape, and — where an overlay backdrop exists — via clicking the backdrop"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "long_flows_show_progress"
description = "Long flows expose progress throughout: a pipeline run shows per-stage statuses advancing in order, and a batch shows per-item progression under the overall n-of-m indicator"
type = "binary"
weight = 1.0

