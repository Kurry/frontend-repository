[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All views derive from one shared state: a completed accepted run is reflected at once in the repository counts, the analytics charts, the event timeline, and the task detail without a reload, and no surface shows a value another surface already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "localStorage and sessionStorage remain empty after exercising the app (creating runs, filtering, expanding disclosures), and a page reload returns the app to its seeded state with the default view active"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "storage_persistence_used"
description = "localStorage or sessionStorage holds repositories, runs, filters, or view state after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "console_clean_during_session"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app, including while simulated runs are advancing"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "keyboard_operability_focus"
description = "Every interactive control — nav items, repository entries, disclosures, filters, form fields, and the copy control — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "dialog_focus_labels"
description = "The create-task dialog uses a dialog role, traps focus while open, closes on Escape returning focus to its trigger; form fields have visible labels, each validation message names and is associated with its field (or pair of bound fields), and stage statuses, verdicts, and rejection reasons are conveyed by text or accessible labels in addition to color"
type = "binary"
weight = 1.0



[[criterion]]
id = "2.8"
name = "cold_load_and_rapid_input"
description = "The app is interactive within 2 seconds of a local cold load, stays responsive during simulated runs and under rapid repeated input (fast view switches, filter toggling) with no hangs, and async-feeling surfaces show a deliberate loading affordance rather than a blank region"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
