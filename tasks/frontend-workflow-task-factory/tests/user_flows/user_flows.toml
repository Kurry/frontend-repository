[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_task_advances_pipeline_and_metrics"
description = "Create-task flow: submit the create form with valid repository, pullRequestNumber, and file bounds; the new pipeline row's stage strip advances through Fetch→Evaluate→Skeleton→Generate→Validate including one visible failure-and-retry; on completion the repository's tasks-produced count increases by exactly one, yield recomputes, tasks-per-week includes the new task, and the event timeline contains that run's stage entries — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_task_inline_validation"
description = "Create flow: empty/non-numeric pull-request number or minFiles greater than maxFiles shows immediate inline validation naming the offending field(s), keeps submit disabled while invalid, and starts no run (pipeline row count unchanged)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "retry_resume_preserves_completed_stages"
description = "Retry/resume flow: during a created run, the failing stage's attempt count increments, then the run resumes from that stage while every earlier stage keeps its completed status and timestamp unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "verdict_filter_and_needs_review"
description = "Trial filter flow: on an accepted task, activate the bad-success verdict; the trial list shows only bad-success trials and the needs-review banner is visible; clearing the filter restores the full trial list."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "repos_pipeline_detail_navigation_retains_state"
description = "Navigation: move from Repositories to a repository pipeline to a task detail and back; previously applied filters and expanded log excerpts in the detail keep their state while the app stays open."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_or_filtered_pipeline_empty_state"
description = "Edge: when a filter or selection matches no pull requests/trials, the list region shows a designed empty state explaining what belongs there rather than a blank broken area."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "timeline_status_filter_coherence"
description = "Timeline filter: filtering the factory event timeline by event status narrows visible entries; clearing the filter restores the full timeline without removing underlying records."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "analytics_and_timeline_chrome_continuity"
description = "Chrome: switching among Repositories, pipeline, Timeline, and Analytics keeps the shared session runs; charts remain interactive (hover tooltips) without navigating away from the factory shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "create_and_manifest_overlays"
description = "Overlays: Create task form and task-manifest Copy/Download surfaces open, complete their flows, and dismiss without trapping navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "manifest_export_and_failed_create_recover"
description = "Recovery: after a rejected create, the form can be corrected and submitted without reload; after an accepted run, task-manifest Copy/Download emit matching text including pullRequestNumber and file bounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "create_task_flows_unavailable"
description = "Create task, pipeline navigation, verdict filtering, or manifest export cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "created_run_missing_or_duplicated"
description = "After a valid create-task submit, the new pipeline row fails to appear, appears duplicated, or tasks-produced does not increase by exactly one on accept."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "pipeline_metrics_desync"
description = "After an accepted create-task run, repository yield, tasks-per-week chart, timeline entries, and pipeline row disagree about the new task."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "navigation_loses_filters_or_breaks"
description = "Moving Repositories→pipeline→detail→back breaks layout or loses filters/expanded logs while the session is open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_filter_breaks_pipeline_ui"
description = "A no-match filter on pipeline, trials, or timeline produces a blank/broken region with no empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "timeline_and_pipeline_filters_disagree"
description = "Timeline status filter and pipeline/trial filters disagree about the same run set, or clearing a filter fails to restore the full list."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "analytics_or_timeline_unreachable"
description = "After visiting Analytics or Timeline, those views cannot be reopened or the return control is missing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "create_form_blocks_exit"
description = "The Create task form blocks returning to Repositories/pipeline with no cancel/close path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_create_or_check_silent"
description = "An invalid create submit or failed validation check provides no visible named-field or status feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "task_factory_dead_end_requires_reload"
description = "A Task Factory flow leaves a dead end that requires a full page reload to continue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "manifest_export_after_accepted_create"
description = "Manifest export flow: complete a create-task run to accepted, open the task detail, confirm the monospaced manifest includes that pullRequestNumber and file bounds; Copy and Download emit the same text; a second accepted create increases any factory-wide export length by one."
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
