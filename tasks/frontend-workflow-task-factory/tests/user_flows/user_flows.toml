[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_task_advances_pipeline_and_metrics"
description = "Create-task flow: submit the create form with valid repository, pullRequestNumber, and file bounds; the new pipeline row's stage strip advances through Fetchâ†’Evaluateâ†’Skeletonâ†’Generateâ†’Validate including one visible failure-and-retry; on completion the repository's tasks-produced count increases by exactly one, yield recomputes, tasks-per-week includes the new task, and the event timeline contains that run's stage entries â€” without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_task_inline_validation"
description = "Create flow: empty/non-numeric pull-request number or minFiles greater than maxFiles shows immediate inline validation naming the offending field(s), keeps submit disabled while invalid, and starts no run (pipeline row count unchanged)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "retry_resume_preserves_completed_stages"
description = "Retry/resume flow: during a created run, the failing stage's attempt count increments, then the run resumes from that stage while every earlier stage keeps its completed status and timestamp unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "verdict_filter_and_needs_review"
description = "Trial filter flow: on an accepted task, activate the bad-success verdict; the trial list shows only bad-success trials and the needs-review banner is visible; clearing the filter restores the full trial list."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "repos_pipeline_detail_navigation_retains_state"
description = "Navigation: move from Repositories to a repository pipeline to a task detail and back; previously applied filters and expanded log excerpts in the detail keep their state while the app stays open."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_or_filtered_pipeline_empty_state"
description = "Edge: when a filter or selection matches no pull requests/trials, the list region shows a designed empty state explaining what belongs there rather than a blank broken area."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "timeline_status_filter_coherence"
description = "Timeline filter: filtering the factory event timeline by event status narrows visible entries; clearing the filter restores the full timeline without removing underlying records."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "analytics_and_timeline_chrome_continuity"
description = "Chrome: switching among Repositories, pipeline, Timeline, and Analytics keeps the shared session runs; charts remain interactive (hover tooltips) without navigating away from the factory shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "create_and_manifest_overlays"
description = "Overlays: Create task form and task-manifest Copy/Download surfaces open, complete their flows, and dismiss without trapping navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "manifest_export_and_failed_create_recover"
description = "Recovery: after a rejected create, the form can be corrected and submitted without reload; after an accepted run, task-manifest Copy/Download emit matching text including pullRequestNumber and file bounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "manifest_export_after_accepted_create"
description = "Manifest export flow: complete a create-task run to accepted, open the task detail, confirm the monospaced manifest includes that pullRequestNumber and file bounds; Copy and Download emit the same text; a second accepted create increases any factory-wide export length by one."
type = "binary"
weight = 1.0

