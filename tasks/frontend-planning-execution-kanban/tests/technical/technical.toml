[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "cold_load_interactive"
description = "The app serves via its documented start path and is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the board: drags, keyboard moves, create/edit, runs with retries, filtering, bulk moves, undo/redo, and export/import"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.3"
name = "state_coherence_across_surfaces"
description = "A change made in one surface reflects everywhere immediately without reload: moving a card updates both column counts and the export preview; editing in the detail modal updates the board card and export; a completed run updates the card chip, progress indicator, and export status fields"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.4"
name = "reload_returns_seeded_baseline"
description = "A page reload after creating, moving, running, selecting, and opening Export returns the app to its seeded baseline (in-memory state only): seeded cards/columns, no filters, empty undo/redo, no selection, Export closed — with no partial mixture of old and new state"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.5"
name = "keyboard_and_dialog_semantics"
description = "Modal dialogs and the Export drawer expose role dialog with aria-modal true, trap focus while open, close on Escape, and return focus to their opener; validation messages are associated with their fields and execution/WIP state changes are announced via an aria-live region"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.6"
name = "rapid_input_stability"
description = "The UI stays responsive and consistent under rapid repeated input — rapid drags, rapid filter toggling, bulk moves, and starting a run while filtering — with no hangs, dropped interactions, or desynced counts"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.9"
name = "export_field_contract_visible"
description = "The board JSON export preview visibly includes the declared API-shaped field names and enums (column ids, status values, tasks.attempts, comments.created_at) matching the instruction field contract"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.10"
name = "form_rejects_overlong_title"
description = "Submitting Add Card with a title longer than 120 characters shows an inline validation message naming title and does not add a card"
type = "binary"
weight = 1.0
