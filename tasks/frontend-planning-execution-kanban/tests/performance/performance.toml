[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.2"
name = "interactions_remain_responsive"
description = "Dragging cards, toggling filters, bulk moving, and opening Export stay responsive with no multi-second UI freezes"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.3"
name = "no_jank_during_drag"
description = "Card drag and drop stays smooth with no visible jank while the ghost placeholder tracks the insertion position"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.4"
name = "export_compile_does_not_freeze"
description = "Opening Export and switching JSON/markdown tabs recompiles the preview without freezing the UI for multiple seconds"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.5"
name = "run_progression_stays_smooth"
description = "During a card run, sub-item status updates and progress n of m increment without locking the rest of the board"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.6"
name = "rapid_filter_stable"
description = "Rapid filter and search toggling does not hang the page or leave column counts permanently wrong"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.7"
name = "console_clean_on_load"
description = "No console errors or warnings appear on initial load before interaction"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.8"
name = "console_clean_during_exercise"
description = "No console errors or unhandled rejections appear during drags, runs, filtering, export, and bulk moves"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.9"
name = "board_usable_during_run"
description = "While one card is running, the user can still scroll columns and interact with other cards without the UI locking"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.10"
name = "large_column_scroll_smooth"
description = "A column with many cards scrolls inside itself smoothly without hitching the whole page"
type = "binary"
weight = 1.0
