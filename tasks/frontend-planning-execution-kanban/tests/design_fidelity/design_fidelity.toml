[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "column_tiles_match_spec"
description = "Columns render as fixed-width tiles in a horizontal board scroller with internally scrollable card lists, matching the visual_design layout contract"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.2"
name = "typography_hierarchy_matches_spec"
description = "Board title is larger than column headers, which are larger than card titles, which are larger than metadata text"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.3"
name = "accent_borders_match_columns"
description = "Card left accent borders match the column color coding — gray Backlog, blue In Progress, yellow Review, green Done — and update when a card moves"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.4"
name = "specified_motions_present"
description = "Drop settle (~200ms), create fade-in (~150ms), modal enter/exit, and status chip color transitions are present for the state changes the instruction calls out"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.5"
name = "responsive_board_matches_spec"
description = "At 768px and 375px the toolbar stacking and board-internal horizontal scroll behave as specified in responsiveness"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.6"
name = "controls_match_carbon_chrome"
description = "Buttons, selects, tags, and modals show designed Carbon-style chrome rather than bare browser defaults"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.7"
name = "count_and_wip_badges_styled"
description = "Column count badges and WIP/breach labels read as compact designed tags adjacent to column names"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons and inputs show distinct default, hover, focus ring, disabled, and error treatments as specified"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.9"
name = "export_drawer_matches_spec"
description = "Export drawer shows format tabs, monospaced preview, and Copy/Download/Import actions as a coherent designed surface"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.10"
name = "drag_ghost_matches_spec"
description = "During drag, raised shadow and ghost placeholder match the specified insertion affordance"
type = "binary"
weight = 1.0
[[criterion]]
id = "3.n1"
name = "columns_not_fixed_width_tiles"
description = "Columns stretch unboundedly or fail to scroll internally, contradicting the fixed-width tile spec"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n2"
name = "accent_colors_wrong"
description = "Card accent borders use colors outside the gray/blue/yellow/green column mapping"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n3"
name = "typography_flat_hierarchy"
description = "Board title, column headers, and card titles are visually indistinguishable in size/weight"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n4"
name = "required_motions_missing"
description = "Drop settle, create enter, or modal transitions are missing where specified"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n5"
name = "browser_default_controls"
description = "Primary buttons, selects, or inputs use bare browser default styles"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n6"
name = "layout_breaks_vs_spec"
description = "At specified breakpoints the board layout contradicts the responsiveness contract"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n7"
name = "export_drawer_undesigned"
description = "Export is an unstyled dump without tabs/preview/actions described in visual_design"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n8"
name = "mixed_icon_styles"
description = "Prompt, move, run, and toolbar icons mix inconsistent icon styles"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n9"
name = "status_palette_inconsistent"
description = "Status chip colors are inconsistent across card and detail views"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n10"
name = "wip_breach_unstyled"
description = "WIP breach has no deep amber treatment or visible breach label when count exceeds 3"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
