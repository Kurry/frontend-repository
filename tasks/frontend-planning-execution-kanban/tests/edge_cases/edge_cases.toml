[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_column_state_designed"
description = "When a column has zero visible cards (after move or filter), it shows a designed empty message rather than a bare gap, and still offers Add Card for that column"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.2"
name = "create_and_import_validate_inline"
description = "Add Card and board import show inline validation naming the offending field before any board mutation; whitespace-only titles and titles over 120 characters are rejected"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.3"
name = "validation_errors_name_fields"
description = "Create and import errors name the field and the problem (for example title or import) rather than only saying Invalid"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.4"
name = "copy_export_and_save_confirm"
description = "Copy export shows a brief confirmation, and successful create/save/import show visible feedback (toast or equivalent)"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.5"
name = "run_shows_progressive_status"
description = "While a card is running, sub-items visibly progress through pending/running/complete (or retrying) rather than jumping straight to a final state with no intermediate UI"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.6"
name = "undo_after_move_or_import"
description = "After a card move or successful import, Undo restores the prior board; a failed import is not treated as an undoable success"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.7"
name = "drop_back_to_origin_noop"
description = "Dragging a card and dropping it back in its original position leaves the board and all counts unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.8"
name = "long_title_truncates_on_card"
description = "A card title longer than 80 characters is truncated with an ellipsis on the board card and shown in full in the detail view and export preview"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.9"
name = "run_disabled_while_running"
description = "The Run control on a card that is already running is disabled or absent until the run finishes or fails"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.10"
name = "wip_breach_and_bulk_empty"
description = "Filling In Progress past WIP limit 3 shows amber breach immediately; bulk move with zero selected cards does nothing and the bulk bar stays hidden"
type = "binary"
weight = 1.0
[[criterion]]
id = "4.n1"
name = "empty_column_is_blank_gap"
description = "An emptied column is a blank gap with no empty-state message and no Add Card control"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n2"
name = "invalid_create_mutates_board"
description = "An invalid create (empty/whitespace/overlong title) still adds a card or changes a column count"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n3"
name = "errors_are_generic_only"
description = "Create or import validation shows only a generic Invalid message with no field name"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n4"
name = "destructive_move_has_no_undo"
description = "After a bulk move or import, there is no working Undo that restores the prior board state"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n5"
name = "run_jumps_with_no_progress_ui"
description = "Pressing Run completes all sub-items in one jump with no visible sequential progression or status chip change to running"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n6"
name = "failed_import_mutates_board"
description = "Importing malformed board JSON changes column counts or titles despite an error, or succeeds silently"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n7"
name = "drop_origin_still_reorders"
description = "Dropping a card back on its original position still changes order or counts"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n8"
name = "long_title_breaks_layout"
description = "A title longer than 80 characters overflows its card, overlaps neighbors, or is missing from the detail view"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n9"
name = "second_run_starts_while_running"
description = "A second Run can be started on a card that is already running"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n10"
name = "wip_breach_never_appears"
description = "In Progress or Review can exceed 3 visible cards with no amber breach state and no breach label"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.11"
name = "redo_stack_cleared_by_new_action"
description = "After an Undo, performing a new mutating action (for example a create) disables Redo and the cleared redo stack cannot resurrect the undone change"
type = "binary"
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
