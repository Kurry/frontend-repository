[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "columns_fixed_width_scrollable"
description = "The board renders as a horizontal scrolling container of fixed-width column tiles, and a column with many cards scrolls inside itself rather than stretching the page"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.2"
name = "column_accent_colors"
description = "Cards carry a left accent border color-coded by column — gray for Backlog, blue for In Progress, yellow for Review, green for Done — and moving a card updates its accent to the destination column color"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.4"
name = "status_chip_palette_consistent"
description = "Execution status chips use one consistent palette everywhere: pending neutral gray, running blue with an active indicator, retrying amber, failed red, complete green; each chip label names the state in text"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.5"
name = "drag_ghost_and_shadow"
description = "During a real pointer drag, the dragged card raises with a visible shadow and a ghost placeholder indicates the exact insertion position in the target column"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.6"
name = "consistent_icons_and_typography"
description = "One consistent icon set is used across prompt chips, move menus, run/retry controls, and the toolbar, and typography keeps board title > column headers > card titles > metadata"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.7"
name = "component_states_styled"
description = "Buttons, selects, and inputs show distinct default, hover, focus (visible ring), disabled, and error treatments, with no bare browser-default controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.8"
name = "responsive_no_overflow"
description = "At 375 pixels wide no content clips or overflows the viewport and no page-level horizontal scrollbar appears (board-internal column scroll is allowed)"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.10"
name = "export_and_wip_chrome_designed"
description = "Export drawer shows format tabs, monospaced preview, and Copy/Download/Import; WIP limit and breach labels sit beside In Progress and Review counts; undo/redo sit in the toolbar; bulk action bar is a compact tray when selection is active"
type = "binary"
weight = 1.0
