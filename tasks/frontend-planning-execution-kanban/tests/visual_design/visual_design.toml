[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "columns_fixed_width_scrollable"
description = "The board renders as a horizontal scrolling container of fixed-width column tiles, and a column with many cards scrolls its card list inside itself rather than stretching the page vertically past the other columns"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "column_accent_colors"
description = "Cards carry a left accent border color-coded by column — gray for Backlog, blue for In Progress, yellow for Review, green for Done — moving a card to another column changes its accent to the destination color, and column counts render as compact rounded tag/badge components adjacent to the column names"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "status_chip_palette_consistent"
description = "Execution status chips use one consistent palette everywhere: pending neutral gray, running blue with an active indicator, retrying amber, failed red, complete green — and every chip carries a text label naming the state, never color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "drag_ghost_and_shadow"
description = "During a real pointer drag, the dragged card raises with a visible shadow and a ghost placeholder indicates the exact insertion position in the target column"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "consistent_icons_and_typography"
description = "One consistent icon set is used across prompt chips, move menus, run/retry controls, and the toolbar, and typography keeps a clear hierarchy (board title larger than column headers, larger than card titles, larger than metadata text)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "component_states_styled"
description = "Buttons, selects, and inputs show distinct default, hover, focus (visible ring), disabled, and error treatments, with no bare browser-default-styled controls anywhere"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "responsive_no_overflow"
description = "At 375 pixels wide no content clips or overflows the viewport and no page-level horizontal scrollbar appears (the board container itself may scroll horizontally); at 768 pixels the toolbar stacks its filter, search, and actions without clipping"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "text_overlap_or_clipping"
description = "At 1440 or 375 pixel widths, any card, column, chip, or toolbar text overlaps another element or is clipped by its container so it becomes unreadable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
