[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headers_consistent_capitalization"
description = "Where the app renders column headers and toolbar titles (Backlog, In Progress, Export, Undo, Redo), they use one consistent capitalization convention throughout"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.2"
name = "actions_use_specific_verbs"
description = "Where the app renders actions, labels are specific verbs such as Add Card, Run, Retry, Export, and Move to Done rather than generic Submit or OK when a specific label is possible"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.3"
name = "errors_name_field_and_problem"
description = "Where the app renders create or import errors, they name the field and the problem (for example title or import) rather than only Invalid"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty column or empty filter states, the copy explains what belongs there and how to add a card or clear filters"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.5"
name = "board_copy_well_written"
description = "Where the app renders board chrome and status copy, it is free of obvious spelling and grammatical errors"
type = "likert"
points = 5
weight = 0.5
[[criterion]]
id = "15.6"
name = "card_terminology_consistent"
description = "Where the app refers to cards, columns, and prompts across the board, detail modal, and export, terminology stays consistent"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.7"
name = "progress_and_counts_consistent"
description = "Where the app renders n of m progress and column counts, formatting is consistent across cards and headers"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.8"
name = "success_messages_specific"
description = "Where the app renders create, save, copy, or import confirmations, they state what happened rather than a vague OK"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum, TODO, or template placeholders are visible in the shipped board UI"
type = "binary"
negate = true
weight = 0.5
[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in column headers, primary buttons, or status chips"
type = "binary"
negate = true
weight = 0.5
[[criterion]]
id = "15.n3"
name = "concept_names_inconsistent"
description = "The same concept is named inconsistently across board, detail, and export (for example card vs task vs item for the same object)"
type = "binary"
negate = true
weight = 0.5
[[criterion]]
id = "15.n4"
name = "copy_truncated_unreadably"
description = "Toolbar or chip labels truncate so the action cannot be understood"
type = "binary"
negate = true
weight = 0.5
[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
