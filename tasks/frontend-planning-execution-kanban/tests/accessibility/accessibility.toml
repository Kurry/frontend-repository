[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "board_controls_keyboard_accessible"
description = "Cards, selection checkboxes, move controls, Add Card, toolbar filter/search, undo/redo, Export, bulk move actions, modal fields, and Run/Retry are reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space) with a visible focus indicator"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "modals_and_export_manage_focus"
description = "Create/detail modals and the Export drawer use dialog semantics, trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Prompt, run, retry, move, and toolbar icons expose accessible names (aria-label or equivalent) rather than being unnamed decorative controls that convey meaning"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "live_regions_for_status_and_errors"
description = "Validation errors, execution state changes (running/retrying/failed/complete), WIP breach announcements, and export copy confirmations are conveyed visually and via an aria-live region"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "form_fields_have_labels"
description = "Add Card, detail edit, comment, and import fields use visible labels associated with their inputs"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Board title and column headers follow a logical heading order with no skipped levels"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "landmarks_present"
description = "The board chrome exposes landmark regions (for example main and navigation/toolbar) so assistive tech can skip to the board"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "text_and_chips_have_contrast"
description = "Column headers, card titles, status chip text, WIP breach labels, and toolbar controls have sufficient contrast against their backgrounds"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "semantic_roles_for_controls"
description = "Interactive board controls use button/checkbox semantics (native or ARIA) rather than clickable bare divs without roles"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, card settle, modal, and check animations apply instantly while state changes and countdown text still occur"
type = "binary"
weight = 1.0
