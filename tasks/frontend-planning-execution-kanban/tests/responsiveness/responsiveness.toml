[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "board_adapts_desktop_to_mobile"
description = "At desktop widths all four columns are reachable via the horizontal board scroller; at 375px the toolbar stacks and columns remain fixed-width and horizontally scrollable inside the board without page-level horizontal scroll"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "At 375px, Add Card, Run/Retry, undo/redo, Export, filter/search, and bulk move controls are large enough to tap without precise aiming"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.3"
name = "typography_readable_at_breakpoints"
description = "Column headers and card titles remain readable at 1440px and 375px without becoming microscopic"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px no card, toolbar, Export drawer, or bulk bar content clips or overflows the viewport"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "toolbar_stacks_on_narrow"
description = "At 768px and below the toolbar stacks filter, search, undo/redo, Export, and actions without clipping"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "columns_remain_reachable"
description = "At narrow widths the four columns remain reachable by horizontal scrolling inside the board container; the page itself does not scroll horizontally"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "touch_drag_and_tap_work"
description = "On a narrow viewport, tap targets for Add Card and card open work, and card drag still relocates a card when pointer drag is available"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "no_page_horizontal_scroll"
description = "At 375px no page-level horizontal scrollbar appears (board-internal column scroll is allowed)"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.9"
name = "export_drawer_fits_narrow"
description = "The Export drawer preview, format tabs, and Copy/Download/Import remain usable at 375px without covering primary actions permanently"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.10"
name = "bulk_bar_reachable_on_mobile"
description = "When cards are selected at 375px, the bulk action bar remains reachable and operable"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "At 768px or 375px the toolbar or columns overflow, overlap, or become unreachable"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "Primary controls are too small or misaligned to tap at 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n3"
name = "text_unreadable_on_mobile"
description = "Column or card text is too small to read at 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n4"
name = "content_cropped_or_page_scroll"
description = "Content is cropped or a page-level horizontal scrollbar appears at 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n5"
name = "toolbar_unusable_when_narrow"
description = "Filter, Export, or undo/redo disappear or cannot be used at 768px and below"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_board"
description = "Fixed toolbar, bulk bar, or Export chrome permanently obscures cards with no way to reach them"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n7"
name = "elements_overlap_at_375"
description = "Cards, chips, or toolbar controls overlap illegibly at 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n8"
name = "required_mobile_actions_missing"
description = "Add Card, Export, or card open cannot be activated at 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n9"
name = "export_preview_overflows"
description = "The Export monospaced preview overflows the viewport without a usable scroll region at 375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Undo, Redo, Export, or bulk move controls disappear at a specified width where the instruction requires them"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
