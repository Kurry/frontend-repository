[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "board_adapts_desktop_to_mobile"
description = "At desktop widths all four columns are reachable via the horizontal board scroller; at 375px the toolbar stacks and columns remain fixed-width and horizontally scrollable inside the board without page-level horizontal scroll"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "At 375px, Add Card, Run/Retry, undo/redo, Export, filter/search, and bulk move controls are large enough to tap without precise aiming"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.3"
name = "typography_readable_at_breakpoints"
description = "Column headers and card titles remain readable at 1440px and 375px without becoming microscopic"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px no card, toolbar, Export drawer, or bulk bar content clips or overflows the viewport"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "toolbar_stacks_on_narrow"
description = "At 768px and below the toolbar stacks filter, search, undo/redo, Export, and actions without clipping"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "columns_remain_reachable"
description = "At narrow widths the four columns remain reachable by horizontal scrolling inside the board container; the page itself does not scroll horizontally"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "touch_drag_and_tap_work"
description = "On a narrow viewport, tap targets for Add Card and card open work, and card drag still relocates a card when pointer drag is available"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "no_page_horizontal_scroll"
description = "At 375px no page-level horizontal scrollbar appears (board-internal column scroll is allowed)"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.9"
name = "export_drawer_fits_narrow"
description = "The Export drawer preview, format tabs, and Copy/Download/Import remain usable at 375px without covering primary actions permanently"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.10"
name = "bulk_bar_reachable_on_mobile"
description = "When cards are selected at 375px, the bulk action bar remains reachable and operable"
type = "binary"
weight = 1.0
