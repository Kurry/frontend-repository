[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "reload_resets_in_memory_facets"
description = "After creating a card, applying an assignee filter, opening Export, and selecting cards, a page reload returns every facet to the seeded baseline together — seeded cards and columns, no filters, empty undo/redo, no selection, Export closed — never a mix of old and new state"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.2"
name = "keyboard_reorder_proves_live_order"
description = "Using Move down then Move up on a card in a column with at least three cards reverses the relative order correctly both ways, proving order is live board state rather than two hardcoded lists"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.3"
name = "export_tracks_board_mutations"
description = "Create a card with a unique title, move it to Review, then open Export: the board JSON preview contains that title under review; Undo once and the preview no longer places it under review — the export is derived from live store state"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.4"
name = "detail_board_export_echo"
description = "Editing a card title in the detail modal and saving updates the board card title and the same title string in the board JSON export preview without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.5"
name = "column_count_delta_exact"
description = "Measure a column header count immediately before and after dragging one card into that column; the destination count increases by exactly one and the source decreases by exactly one with no lag"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.6"
name = "two_creates_differ_in_export"
description = "Create two cards with different titles in Backlog; the board shows both distinct titles and the board JSON export contains both distinct title strings"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.7"
name = "interleaved_create_and_filter"
description = "Start Add Card in Backlog, cancel, apply an assignee filter, then create a valid card in In Progress; the new card appears in In Progress when the filter includes its assignee (or after clearing filters), and the prior cancel did not leave a partial card"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.8"
name = "empty_column_then_repopulate"
description = "Move every card out of Review so the empty state shows, then Add Card into Review; the count goes from zero to one and the new card appears with the entered title, and the export preview lists it under review"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.n1"
name = "partial_in_memory_reset"
description = "After reload, some session facets survive while others reset (for example filters clear but a created card remains), producing incoherent partial persistence"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n2"
name = "export_ignores_board_changes"
description = "The Export preview renders identically before and after a visible create or move"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n3"
name = "different_titles_same_export"
description = "Creating two cards with different titles yields export text with identical title fields or one shared title string for both cards"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n4"
name = "export_stale_vs_board"
description = "A title or column change appears on the board card but not in the export preview until reload"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.9"
name = "import_export_full_pipeline"
description = "Mutate the board (create or move), Copy the board JSON, reload to seeded baseline, Import that JSON — the board shows the mutated titles/columns/order and the export preview matches the imported state"
type = "binary"
weight = 1.0
[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
