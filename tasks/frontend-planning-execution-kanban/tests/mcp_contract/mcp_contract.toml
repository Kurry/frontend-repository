[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "The four contract modules — entity-collection-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1 — are initialized and bound so their tools appear via webmcp_list_tools"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Invoking entity update/reorder, form submit, session start/restart, or artifact export/import/copy through WebMCP produces the same board, counts, and export-drawer outcomes as the matching visible controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations for the four assigned modules are available — no undeclared entity fields, form fields, session ops, or artifact formats beyond the Bindings"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool can exercise create/update/reorder, form validate/submit/cancel, session start/restart, and artifact export/import/copy end to end"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, delete, reorder, and toggle work against card with the declared fields (title, description, column, position, assignee, attached-prompt, comment, status) and column/status value bounds"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form validate, submit, and cancel are bound for title, description, attached-prompt, assignee, comment, and import, and invalid submits still show visible field errors"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.7"
name = "artifact_formats_match_bindings"
description = "Artifact export/import/copy are bound to export formats json and markdown and import mode board-json; invoking them opens or drives the same Export drawer surfaces as the toolbar"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra undeclared modules, destinations, or artifact formats are exposed beyond the contract Bindings"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation correctly surface session start/restart for card-execution and seeded-failing-run demos"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works from the app delivery without manual editing of the test harness"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "One or more mandated module tools are unbound, missing from the tool list, or no-ops when invoked"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "A WebMCP entity move, form submit, session start, or artifact export produces a different board or export outcome than the matching visible control"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared entity operations, form fields, session ops, or export formats are exposed"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise a declared entity, form, session, or artifact operation"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "A form validate/submit via WebMCP bypasses visible validation and desyncs MCP state from the UI"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or omits mandated tools"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness edits"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "entity-collection-v1, form-workflow-v1, command-session-v1, or artifact-transfer-v1 is declared but not implemented"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "Automated MCP contract checks fail for this app delivery"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
