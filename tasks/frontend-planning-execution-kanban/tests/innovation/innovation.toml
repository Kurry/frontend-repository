[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "polished_drag_microinteractions"
description = "Card drag/drop or keyboard move includes polish beyond bare relocation — for example coordinated settle of neighbors and a clear insertion ghost that feels intentional"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.2"
name = "execution_timeline_clarity"
description = "Card execution presents a clear, watchable progression (status chip, per-item states, progress n of m) that reads as a designed run timeline rather than a bare checkbox flip"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.3"
name = "wip_breach_affordance"
description = "WIP breach uses a distinctive amber treatment and breach label that makes capacity problems obvious at a glance"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.4"
name = "export_as_centerpiece"
description = "The Export drawer feels like a first-class product surface — live preview, format tabs, copy confirmation — not a hidden dump"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.5"
name = "bulk_bar_ergonomics"
description = "Multi-select and the bulk action bar make batch moves feel intentional and low-friction"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.6"
name = "undo_confidence"
description = "Undo/redo affordances make destructive board edits feel safe and reversible"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.7"
name = "prompt_panel_readability"
description = "The prompt side panel presents full prompt text in a readable, focused reading surface"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.8"
name = "status_chip_craft"
description = "Status chips and progress indicators are visually refined and consistent across card and detail views"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.9"
name = "empty_state_craft"
description = "Empty column and empty filter states are designed, helpful, and on-brand rather than blank gaps"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.10"
name = "keyboard_parity_delight"
description = "Keyboard move controls feel as capable as drag, making the board fully operable without a pointer"
type = "binary"
weight = 1.0
[[criterion]]
id = "11.n1"
name = "stale_demo_interactions"
description = "Interactions that should feel polished (drag settle, export open, run progression) feel unfinished or broken in a way that undercuts the board as a usable tool"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n2"
name = "export_feels_bolted_on"
description = "Export preview stays identical after visible board mutations, or Export controls are buried under secondary chrome so the drawer is hard to discover"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n3"
name = "wip_or_bulk_feel_decorative"
description = "WIP limit labels and bulk-select checkboxes render while columns past 3 cards keep a normal background and bulk Move leaves selected cards in their original columns"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n4"
name = "motion_is_noisy_not_helpful"
description = "Motion distracts from board work (constant bouncing, blocking animations) rather than clarifying hierarchy"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n5"
name = "inconsistent_visual_language"
description = "Icons, chips, and toolbar treatments mix conflicting visual languages that make the board feel uncrafted"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n6"
name = "detail_panel_clutter"
description = "Card detail or prompt panel is cluttered to the point that primary actions are hard to find"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n7"
name = "toast_spam_blocks_work"
description = "Feedback toasts stack or persist in a way that blocks board interaction"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n8"
name = "selection_model_confusing"
description = "Multi-select checkboxes and bulk actions fight with drag/open gestures so selection is unreliable"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n9"
name = "undo_unexpected_scope"
description = "Undo reverses unrelated UI chrome instead of the last board mutation, surprising the user"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "11.n10"
name = "run_feedback_unclear"
description = "During a run it is unclear which sub-item is active or whether the card is still executing"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
