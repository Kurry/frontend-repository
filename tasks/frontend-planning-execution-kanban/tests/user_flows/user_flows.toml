[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_then_move_updates_counts_and_export"
description = "Submitting Add Card with a valid title in Backlog adds exactly one card at the top of Backlog and increases its count by one; dragging that card into In Progress moves it there, decreases Backlog by one, increases In Progress by one, and the board JSON export lists the card under in-progress with the submitted title — all without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.2"
name = "invalid_create_names_title_field"
description = "Submitting Add Card with an empty or whitespace-only title shows an inline validation message naming the title field, adds no card, and leaves every column count unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.3"
name = "detail_edit_echoes_board_and_export"
description = "Editing a card title in the detail view and saving updates the board card in place and the same title appears in the board JSON export preview without a reload; Cancel leaves both unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.4"
name = "bulk_move_then_undo_restores_board"
description = "Selecting three cards, bulk-moving them to Done, raises Done count by three and lists them under done in the export preview; Undo restores their prior columns, counts, and export preview"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.5"
name = "export_drawer_and_prompt_panel_switch"
description = "Opening Export shows the export drawer with format tabs while the board remains in its current filtered or unfiltered state; closing Export and opening a prompt panel shows the prompt text; returning to the board retains card positions and counts"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.6"
name = "empty_column_offers_add_card"
description = "Moving the last card out of a column leaves a designed empty state with a message and an Add Card control that opens create targeting that column"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.7"
name = "filter_round_trip_restores_counts"
description = "Selecting an assignee in the filter narrows every column to that assignee cards and updates every column count; clearing the filter restores the exact prior board and counts"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.8"
name = "prompt_panel_closes_with_continuity"
description = "Opening a prompt side panel from a card chip shows the prompt title and full text; closing via the close control or Escape returns focus and leaves the board counts and card positions unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.9"
name = "create_and_detail_modals_support_flows"
description = "Create and detail modals open from Add Card and card clicks, support save/cancel/escape, and do not leave the board unusable after close"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.10"
name = "failed_run_retry_without_reload"
description = "On the seeded failing card, after the run reaches failed, pressing Retry resumes from the failed sub-item without a page reload; previously completed sub-items stay checked"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "After creating or moving at least one card, Copy or Download the board JSON, then Import that same JSON — visible titles, columns, order, and task progress match the pre-export mutated state and the export preview matches again"
type = "binary"
weight = 1.0
