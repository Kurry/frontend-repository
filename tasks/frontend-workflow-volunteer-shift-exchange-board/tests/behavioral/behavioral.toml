[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "behavioral.transaction_roundtrip"
name = "transaction_roundtrip"
description = "Interleave revisions, expiry, concurrent roster change, rollback/retry, undo, and export/import operations. Verify that committed ownership, transaction lineage, and exported files round-trip exactly without losing data or creating duplicated/stale views."
type = "binary"
weight = 1.0

[[criterion]]
id = "behavioral.facet_reload_survival"
name = "facet_reload_survival"
description = "Execute a full multi-facet round-trip: configure several independent facets (e.g., active view, filter setting, and an ongoing transaction) then reload or import a clean dump. Confirm that in this app genre all state survives the reload and correctly tracks the expected outcomes."
type = "binary"
weight = 1.0
