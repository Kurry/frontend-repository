[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "visual_design.shift_card_states"
name = "shift_card_states"
description = "Inspect the app's rendering of shift cards and exchange items. Check the states: committed, proposed, reserved, conflicted, responded, expired, stale, committing, and rolled-back. Confirm that ownership and transaction provenance stay legible and visually distinct across all states."
type = "binary"
weight = 1.0

[[criterion]]
id = "visual_design.visual_cohesion"
name = "visual_cohesion"
description = "Verify that the application's overall visual language, color palette, and component spacing remain cohesive across the different views (roster canvas, transaction composer, constraint graph, response workflow, waitlist)."
type = "likert"
points = 5
weight = 0.5
