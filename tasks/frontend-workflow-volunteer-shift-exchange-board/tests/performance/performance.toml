[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "performance.large_fixture_responsiveness"
name = "large_fixture_responsiveness"
description = "Load a maximum declared fixture (200 shifts, 80 volunteers, 50 exchanges, and 100 responses/attempts). Verify that interactions remain responsive, direct manipulation acknowledges within 100 ms, linked views settle within 500 ms, and stale validation cancels immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "performance.heavy_interaction_stability"
name = "heavy_interaction_stability"
description = "During heavy interactions with the large fixture, monitor the dev tools console. Confirm there are no errors, dropped interactions, or layout jumps."
type = "binary"
weight = 1.0
