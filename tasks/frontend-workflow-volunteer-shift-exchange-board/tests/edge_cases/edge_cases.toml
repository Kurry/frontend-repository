[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "edge_cases.conflict_recovery_failure"
name = "conflict_recovery_failure"
description = "The app reports a conflict inaccurately, mutates canonical ownership inappropriately, or leaves state dangling when encountering open or duplicate exchange cycles, exact overlap, rest, hour, and travel boundary cases, or skill/accessibility mismatches."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.stale_base_handling_failure"
name = "stale_base_handling_failure"
description = "The app leaks old revision responses, allows invalid stale base progression, or drops into an unrecoverable fatal error loop when submitting a stale base or triggering a partial internal write."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.forged_import_handling_failure"
name = "forged_import_handling_failure"
description = "The app accepts a forged or modified import artifact, triggering incomplete state application or leaving the state mutated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.valid_conflict_resolution"
name = "valid_conflict_resolution"
description = "Verify that when presented with exact hour boundaries or conflicting schedule entries, the system correctly reports the conflict explicitly and prevents progression until a valid remediation path is taken."
type = "binary"
weight = 1.0
