[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Optional: the itinerary planner adds a delightful microinteraction beyond the required list/map animations — for example presence caret drift, polyline draw-on, or export compile pulse"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional: advanced motion beyond the required set — for example coordinated map fly + pin enlarge choreography or day-section accordion height easing"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "Optional: onboarding goes beyond the required 3-step coachmark — for example a contextual tip after the first vote promotion or first export"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Optional: an extra visualization beyond required polylines/isochrones — for example a day-density strip or distance summary chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "Optional: an alternative input path such as keyboard multi-select chord or paste-to-create from confirmation text"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional: personalization beyond the required light/dark toggle — for example remembered default transport mode or preferred timezone within the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "Optional: polished Côte d'Azur storytelling chrome beyond the required brand mark and plan hero"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional: theming beyond the required light/dark structural toggle — for example a coastal accent pack switcher"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "Optional: a useful web-platform extra such as a print stylesheet polish pass or offline map-cache indicator chrome (still frontend-only)"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Optional: a competition-level itinerary innovation visible in-browser beyond the specified collaboration and export depth"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.11"
name = "latency_simulation_optimistic_ui"
description = "The app ships the optional latency simulation control center: choosing 50, 500, or 2000 ms visibly delays simulated peer activity while the UI stays optimistic and settles cleanly"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.12"
name = "error_toast_test_dispatcher"
description = "The app ships the optional error-toast test dispatcher: triggering a simulated parse or sync failure raises a distinct toast carrying a visible recovery or dismiss path"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
