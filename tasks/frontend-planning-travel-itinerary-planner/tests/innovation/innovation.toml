[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Optional: the itinerary planner adds a delightful microinteraction beyond the required list/map animations — for example presence caret drift, polyline draw-on, or export compile pulse"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional: advanced motion beyond the required set — for example coordinated map fly + pin enlarge choreography or day-section accordion height easing"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_onboarding"
description = "Optional: onboarding goes beyond the required 3-step coachmark — for example a contextual tip after the first vote promotion or first export"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Optional: an extra visualization beyond required polylines/isochrones — for example a day-density strip or distance summary chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "Optional: an alternative input path such as keyboard multi-select chord or paste-to-create from confirmation text"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional: personalization beyond the required light/dark toggle — for example remembered default transport mode or preferred timezone within the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "Optional: polished Côte d'Azur storytelling chrome beyond the required brand mark and plan hero"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional: theming beyond the required light/dark structural toggle — for example a coastal accent pack switcher"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "Optional: a useful web-platform extra such as a print stylesheet polish pass or offline map-cache indicator chrome (still frontend-only)"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Optional: a competition-level itinerary innovation visible in-browser beyond the specified collaboration and export depth"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The demo is purely spec-compliant, barebones, and unenhanced beyond the required itinerary surfaces"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "Interactions and visuals feel generic or templated rather than a coastal Riviera trip planner"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n3"
name = "experience_lacks_polish_guidance_story"
description = "The planner has no polish, guidance, or trip story beyond empty chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n4"
name = "experience_lacks_extra_polish"
description = "The planner has no extra visual or interactive polish beyond the minimum required controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n5"
name = "interface_is_flat_and_static"
description = "The planner UI is flat and static with no map or timeline immersion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n6"
name = "helpful_platform_capabilities_ignored"
description = "Clearly helpful extras (print polish, keyboard multi-select, presence) are ignored where they would fit the trip domain"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n7"
name = "personalization_is_impossible"
description = "No personalization affordance exists even as an optional extra beyond light/dark"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n8"
name = "delightful_moments_are_absent"
description = "The planner has no delightful moments beyond bare CRUD"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n9"
name = "design_has_no_twist"
description = "The design repeats a generic dashboard pattern without a Riviera trip-planner twist"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n10"
name = "effort_stops_at_mvp"
description = "The app shows minimal effort beyond an MVP stop list with no export or collaboration depth"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.11"
name = "latency_simulation_optimistic_ui"
description = "The app ships the optional latency simulation control center: choosing 50, 500, or 2000 ms visibly delays simulated peer activity while the UI stays optimistic and settles cleanly"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.12"
name = "error_toast_test_dispatcher"
description = "The app ships the optional error-toast test dispatcher: triggering a simulated parse or sync failure raises a distinct toast carrying a visible recovery or dismiss path"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
