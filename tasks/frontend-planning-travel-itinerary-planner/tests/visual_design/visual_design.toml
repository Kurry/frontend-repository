[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "three_pane_planner_density"
description = "Three-pane planner composition (left sidebar / center plan column / right map pane) remains dense and trip-specific, with the planner workspace as the first viewport (no marketing landing)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_list_state_visible"
description = "Empty plan list state is visually present and clear when no stops remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "day_colored_numbered_pins"
description = "The map shows one numbered pin per stop colored by its day, the selected pin is enlarged with a popup reading the place name and its Day N label, and unscheduled ideas stops use a neutral non-day marker"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "coastal_palette_and_typeface"
description = "The page shows a soft coastal look: a cool blue-gray page wash, a humanist sans-serif body typeface, and a navy accent color used consistently across chrome and controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "sidebar_dot_matches_pin_color"
description = "Each itinerary day carries its own distinct color, and that color is shared between the day's sidebar dot and its numbered map pins"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "floating_detail_card_anatomy"
description = "The place-detail card floats over the map pane with a visible tab row (About / Book / Reviews / Photos / Mentions) and a dismiss control"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "single_consistent_icon_set"
description = "Icons across the sidebar, toolbar, and map chrome come from one consistent icon set rendered at consistent sizes, with no mixed styles or pixelated glyphs"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "hero_cover_title_date_range"
description = "The plan hero presents a cover image, the trip title 'Trip to the French Riviera - Cote d'Azur', and the date range 7/5–7/11 with clear typographic hierarchy over the plan column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "panes_side_by_side_at_1024"
description = "At viewport widths of 1024px and above the sidebar, plan column, and map pane render side by side; below 1024px the map pane stacks below the plan column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "sidebar_drawer_at_768"
description = "At viewport widths of 768px and below, the left sidebar collapses behind a toggle control that opens it as an overlay drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "ui_copy_quality"
description = "Where the app renders headings, labels, empty states, and validation messages, the copy uses one consistent capitalization convention and consistent terminology, and error messages name the problem field rather than a generic rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "brand_and_trip_signal_first_viewport"
description = "The first viewport shows the Trip / Travel Planner product name with French Riviera — Côte d'Azur as the trip signal, and the initial view is the planner workspace rather than a marketing or login screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "dual_pane_route_anatomy"
description = "Day-colored route polylines carry small distance labels, cluster badges are circular with a visible count, and the isochrone circle renders translucent so the map beneath stays readable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "scheduling_grid_anatomy"
description = "Time blocks display their start-end times, overlapping blocks use an amber treatment with a warning icon, and travel buffer cards are visually distinct from stop cards (for example a dashed connector style) so the timeline reads as blocks joined by transit"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "collaboration_chrome_anatomy"
description = "Presence avatars render as overlapping colored circles in the top chrome, peer carets use each member's distinct color, and the conflict modal presents current and incoming versions in two clearly differentiated columns"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "kanban_filter_bucket_anatomy"
description = "Kanban pivot shows three equal-width columns titled To Visit, Reserved, and Completed each with a count badge, the filter ribbon reads as one row of labeled chips above the plan column, and bucket poll cards share the app's card treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "dark_mode_coherent_panes"
description = "In dark mode the sidebar, plan column, and map chrome all swap coherently to the dark palette with readable text throughout"
type = "binary"
weight = 1.0

