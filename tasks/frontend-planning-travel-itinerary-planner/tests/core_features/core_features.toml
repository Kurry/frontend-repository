[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_multi_day_plan_on_load"
description = "On load, the planner shows itinerary day sections for Sun 7/5 through Sat 7/11 with at least 8 seeded French Riviera stops (place names visible) distributed across the days, plus at least 3 unscheduled ideas stops not tied to a day"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "created_stop_appears_in_list"
description = "After creating a stop named 'Harbor Lookout' on a day with valid required fields, the text 'Harbor Lookout' is visible in the plan list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_count_delta_exact"
description = "After adding 3 new stops on top of the seed set, the plan list shows exactly 3 more stops than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "place_detail_card_full_tab_set"
description = "After selecting a stop, a place-detail card opens over the map showing that stop's name and a tab row with About / Book / Reviews / Photos / Mentions (or equivalent labels for all five)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "edited_stop_name_replaces_old"
description = "After editing a stop name to 'Evening Promenade', the text 'Evening Promenade' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "deleted_stop_row_removed"
description = "After deleting a stop, that stop name is no longer visible in the plan list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_state_after_last_delete"
description = "After deleting all stops, an empty state message is visible in the plan list region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_title_submit_rejected"
description = "After submitting the stop form with an empty required title, the stops count is unchanged and an inline validation message naming the title field is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "day_filter_recomputes_visible_stops"
description = "After filtering or focusing a single day (with multi-day stops present), only that day's stops remain emphasized or visible in the filtered list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "mode_switch_without_navigation"
description = "After switching emphasis between Plan List and Map modes (or Trip plan / map focus), the workspace shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "detail_tabs_swap_in_place"
description = "After switching place detail tabs (About / Reviews or equivalent), the panel content swaps without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "row_pin_two_way_sync"
description = "Starting with the seeded plan visible: click a stop row and confirm the map flies to that stop's pin and the row highlights; then click a different stop's map pin and confirm that stop becomes selected and the plan list scrolls/highlights its row; after each direction the highlighted row and the enlarged pin refer to the same stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "day_select_focus_and_restore_flow"
description = "Selecting a day in the sidebar focuses the map on that day's center/zoom, selects the day's first stop, and shows only that day's stops recomputed from the shared collection; then returning to Overview restores the full multi-day plan without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "detail_card_dismiss_closes"
description = "The place-detail card opened over the map can be closed with its dismiss control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "stops_crud_from_shared_state"
description = "Itinerary stops collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "two_modes_available"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "domain_state_beyond_crud"
description = "Domain state beyond CRUD is implemented (day filter, mode, selection, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "create_flow_multi_surface"
description = "Full create flow: note a day section's row count and the map's numbered-pin count, create a valid stop assigned to that day, and confirm the day section shows exactly one more stop row and the map shows exactly one more numbered pin in that day's color; then switch between Plan List and Map modes and confirm the same new stop is present in both without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "edit_propagates_list_detail_map"
description = "With a stop's place-detail card open, edit that stop's name and confirm the new name appears in its day-list row, in the open place-detail card, and in its map pin popup, all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "delete_clears_row_pin_selection"
description = "After selecting a stop and deleting it, its row disappears from the day section, its pin disappears from the map, and the open selection/detail card is cleared, all in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "reload_restores_seeded_flow"
description = "Full reset flow: create one stop and delete a different seeded stop, then reload the page; the app returns to its seeded state — the original seeded stops, day colors, and the default Overview view reappear, with the created stop gone and the deleted stop restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "double_submit_creates_one_stop"
description = "Double-activating the stop form submit in quick succession creates exactly one stop: the day section gains exactly one row and the map gains exactly one pin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "emptied_day_shows_empty_state"
description = "After deleting every stop belonging to one day, selecting that day shows an empty day state message rather than a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "map_clears_pins_when_all_deleted"
description = "After deleting all stops, the map shows no numbered day pins"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "long_name_truncates_with_ellipsis"
description = "A stop given a name too long for its row truncates with an ellipsis in the list row while the place-detail card shows the full name"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.36"
name = "live_inline_validation_disables_submit"
description = "The stop create/edit form validates as the user types: while a required field is invalid it shows an inline error message naming that field, and the submit control stays disabled until all required fields are valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "inert_chrome_raises_demo_toasts"
description = "Inert demo affordances (Share, Optimize route, or map layers) give visible simulated feedback such as a toast when activated, rather than doing nothing or navigating away"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.38"
name = "plan_hero_title_and_dates"
description = "The plan hero shows a cover image, an editable title reading 'Trip to the French Riviera - Cote d'Azur', and the date range 7/5–7/11"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "top_plan_chrome_inert_affordances"
description = "The top plan chrome shows a Trip / Travel Planner brand mark, Trip plan / Trip journal mode labels, and Share and edit toolbar affordances that behave as inert in-app chrome (a toast or no-op) rather than navigating away"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "sidebar_nav_anatomy_complete"
description = "The left nav sidebar shows an Overview entry, an Itinerary day list for Sun 7/5 through Sat 7/11 with a distinct day-color dot per day, a Budget row, and Support and Hide sidebar controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "hover_highlights_paired_marker"
description = "Hovering a stop row in the plan column visibly highlights that stop's map marker (enlargement or halo) and emphasizes the route segment through it, and moving the pointer away clears the highlight — verified by real pointer hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "day_focus_fits_map"
description = "Activating a day header's Focus control fits the map viewport to exactly that day's stops, and leaving focus mode restores the full-plan map extent"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "day_polylines_with_recomputed_distances"
description = "The map draws one directional polyline per day connecting that day's stops in start-time order in the day's color, with each leg labeled with a distance in kilometers to one decimal; after reordering or reassigning a stop the affected polylines and distance labels update immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "marker_clustering_by_zoom"
description = "Zooming the map out groups nearby pins into cluster badges showing the count of contained stops, and zooming in or clicking a cluster expands it back into individual pins"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "map_layer_toggle_three_styles"
description = "A map layer toggle offers at least three layer styles and switching between them restyles the map in place without a page reload or blank map"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "lodging_isochrone_toggle"
description = "Selecting the seeded Hotel Le Negresco stop offers an isochrone toggle that draws a translucent circle of roughly 1.25 km radius around the hotel, and toggling it off removes the overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "drag_reassign_and_reorder"
description = "Dragging a stop card to another day reassigns it and dragging within a day reorders it, with the day sections, map pins, polylines, and distance labels all reflecting the new arrangement immediately after the drop"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "day_accordion_collapse_expand"
description = "Activating a day section header collapses that day's stop rows and activating it again expands them, while the other days keep their own expanded or collapsed state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "time_collision_amber_warning"
description = "When two time blocks in the same day overlap in time, both blocks show an amber overlap treatment with a warning icon, and adjusting either block's times so they no longer overlap clears the treatment from both"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "travel_buffer_mode_recompute"
description = "Travel-time buffer cards between consecutive stops show a Driving / Walking / Transit mode selector and a computed duration, and changing the mode immediately changes the displayed duration consistent with a faster mode yielding a shorter buffer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "impossible_transit_warning"
description = "When the gap between two consecutive blocks is shorter than the selected mode's computed buffer, the buffer card shows an impossible-transit warning, and widening the gap or choosing a faster mode clears it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "timezone_axis_relabels_times"
description = "The timezone switcher toggles displayed block times between destination local (CET), home (ET), and UTC: every visible time label relabels to the selected zone and the switcher indicates the active zone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "recurring_generator_creates_seven_blocks"
description = "Creating a stop such as 'Breakfast at hotel' 8:00-8:45 with the repeat-daily option enabled creates exactly one block per day across Sun 7/5 through Sat 7/11 (7 blocks) in a single action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "bucket_drawer_with_polls"
description = "The unassigned-concepts bucket drawer opens from a persistent control and lists the unscheduled ideas, each carrying a poll widget with per-member vote indicators for Sarah, John, and Marco plus a user vote control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "vote_winner_promotes_to_timeline"
description = "After starting a vote on a bucket item, the simulated members cast votes with visible count updates, and when the item reaches 3 of 4 votes it leaves the bucket and appears as a scheduled stop on a day timeline with a map pin in that day's color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.56"
name = "conflict_modal_choice_applies"
description = "Triggering a simulated peer edit on a block the user has an unsaved edit open on opens a conflict-resolution modal showing current and incoming versions side by side with Keep mine / Take theirs / Merge choices, and the chosen resolution is actually applied to the block"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.57"
name = "role_switcher_gates_controls"
description = "Switching the role to Viewer visibly disables all mutating controls (create, edit, delete, drag, vote, bulk), Editor keeps delete disabled while create/edit/move work, and Owner enables everything"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "activity_log_records_mutations"
description = "The activity log drawer lists session mutations newest first, each entry naming the actor and the change, and performing a create, a drag move, and a delete appends three matching entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.59"
name = "filter_ribbon_combines_and_clears"
description = "The filter ribbon combines cost-tier, category, and tag filters to recompute the visible stops from the shared collection, and Clear filters restores the full plan"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.60"
name = "fuzzy_search_typo_tolerant"
description = "Typing a slightly misspelled query such as 'anitbes' in the search field still surfaces the Antibes stop, and clearing the query restores the unfiltered view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.61"
name = "bulk_selection_bar_actions"
description = "Selecting multiple stops summons a bulk action bar showing the selected count, and its Mass tag, Move to day, and Delete actions apply to every selected stop in one operation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.62"
name = "kanban_pivot_status_columns"
description = "Kanban pivot mode shows the stops as To Visit / Reserved / Completed columns, and dragging a card between columns updates that stop's status wherever it appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.63"
name = "markdown_export_live_compile"
description = "The export canvas shows a markdown itinerary with a heading per day in date order and time-ordered stop lines, and reopening it after a change shows the updated document with a Copy control that confirms via toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.64"
name = "ics_payload_valid_structure"
description = "The ICS view renders a payload that begins with BEGIN:VCALENDAR, contains exactly one VEVENT block per scheduled stop with a DTSTART and a SUMMARY naming the stop, and ends with END:VCALENDAR"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.65"
name = "undo_redo_structural_changes"
description = "Undo and redo controls step through structural changes: after a delete, Undo restores the stop across list, map, and kanban together and Redo removes it again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.66"
name = "coachmarks_sequence_first_load"
description = "On a fresh load an onboarding coachmark sequence of at least 3 steps points at the plan column, the map pane, and the ideas bucket with Next and Skip controls, and once dismissed it does not reappear during the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.67"
name = "theme_toggle_swaps_all_panes"
description = "The light/dark toggle swaps the palette across the sidebar, plan column, and map chrome without a reload, with text readable in both themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.71"
name = "stop_field_contract_enforced"
description = "The stop create/edit form enforces the Stop field contract: empty title, endTime not after startTime, and out-of-enum category/costTier/status/day each show an inline error naming that field and leave the stops count unchanged; a valid submit creates a record whose visible title, day, location, times, category, costTier, and status match the submitted values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.72"
name = "trip_json_live_compile"
description = "The export canvas trip JSON preview is a live-compiled document with schemaVersion \"1\", a trip object carrying title and dateStart/dateEnd, and a stops array; after creating or renaming a stop the JSON updates to include that stop's title and fields without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.73"
name = "trip_json_download_and_copy"
description = "Download trip JSON offers a real download of the visible trip JSON text, and Copy trip JSON places that exact text on the clipboard with a visible confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.74"
name = "import_trip_json_reconstructs"
description = "Importing a previously exported trip JSON reconstructs the stops so list rows, map pins, and the trip JSON preview match the imported document; importing malformed JSON shows a visible error and leaves the session unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.75"
name = "ics_download_control"
description = "Download ICS offers a real download of the visible ICS payload that begins with BEGIN:VCALENDAR and contains one VEVENT per scheduled stop"
type = "binary"
weight = 1.0

