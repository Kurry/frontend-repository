[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "Stops, day selection, active mode, and place-detail selection behave as one coherent shared state: a change made in any one view (list edit, map selection, day filter) is immediately reflected in every other view showing that data, without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "reload_resets_all_facets_coherently"
description = "After configuring several independent facets (create a stop, select a day, switch mode, open a detail card), reloading the page returns every facet to the seeded in-memory baseline together — seeded stops, default Overview, no lingering selection — never a mix of surviving and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of creating, editing, deleting, mode switching, day selection, and map selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "rapid_input_stays_smooth"
description = "Mode switches, day selection, and map fly animations stay smooth under rapid repeated input, with no hangs, freezes, or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operable_with_focus_ring"
description = "Every interactive control — sidebar rows, stop rows, form fields, place-detail tabs, and map chrome buttons — is reachable and operable with the keyboard alone, with a visible focus indicator on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "detail_tabs_aria_and_focus_return"
description = "The place-detail tab row is keyboard operable with the active tab marked programmatically (e.g. aria-selected), and activating the dismiss control from the keyboard closes the card and returns focus to the stop that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "validation_announced_aria_live"
description = "Stop form validation messages are shown inline and announced through an aria-live polite region"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "map_pins_accessible_names"
description = "Map pins expose accessible names that include the place name and its day assignment"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "document_title_names_trip"
description = "The browser document title references the French Riviera trip rather than a build-tool or framework default placeholder title"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.14"
name = "collab_simulation_is_real_state"
description = "Simulated collaboration mutates the same shared collection the UI reads: a promoted bucket item becomes a normal stop that can be edited, dragged, and deleted, and simulated mutations appear in the same activity log as the user's own"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "role_timezone_theme_no_reload"
description = "Switching role, timezone mode, or theme updates every affected surface as shared client state without reloading the document"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "ics_structure_parses"
description = "The rendered ICS payload is structurally valid: BEGIN:VCALENDAR and END:VCALENDAR wrap one VEVENT per scheduled stop, and each VEVENT carries a parseable DTSTART and a SUMMARY"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "clipboard_copy_matches_display"
description = "Activating the export Copy control places text on the clipboard that matches the displayed markdown document and raises a visible confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "print_layout_clean"
description = "Under print media the plan renders as a clean paginated document of day sections with the map chrome, sidebar, and toolbars excluded"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.20"
name = "trip_json_schema_contract"
description = "The trip JSON preview conforms to the field contract: schemaVersion is the string 1, trip carries title/dateStart/dateEnd, and every stops element exposes title, day, location, category, costTier, status, lat, and lng using the closed enums and bounds from the instruction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "in_memory_only_no_storage"
description = "During a full exercise including export and import, the app does not write to localStorage or sessionStorage; persistence is the portable artifacts and MCP surface only"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "complete_stop_payload_contract"
description = "A created stop and its matching trip JSON element use the same complete payload: title trimmed length 1–120; day one of the seven 2025-07-05 through 2025-07-11 dates or unscheduled; location trimmed length 1–200; optional startTime/endTime as valid HH:MM with endTime only when startTime exists and strictly later; category lodging/food/transit/activity/idea; costTier 1/2/3/4; status to-visit/reserved/completed; optional tags as at most 8 unique trimmed strings of length 1–24; optional notes length at most 500; numeric lat -90 through 90 and lng -180 through 180"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.23"
name = "ics_event_date_time_semantics"
description = "For the live scheduled stops, each ICS VEVENT has SUMMARY exactly equal to its title; a timed stop has DTSTART matching its day and startTime, an untimed stop has DTSTART;VALUE=DATE on its day, and a stop with endTime has DTEND matching that same-day endTime; unscheduled ideas produce no VEVENT"
type = "binary"
weight = 1.0

