[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "planner_controls_keyboard"
description = "Sidebar day rows, stop rows, stop form fields, place-detail tabs, map chrome, Export Download/Copy, Import, role switcher, and undo/redo are operable with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "conflict_export_focus_management"
description = "Conflict-resolution modal and export canvas trap focus while open and return focus to the originating control on dismiss"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "cover_and_map_chrome_alt"
description = "Plan hero cover image and icon-only map/toolbar controls expose descriptive alt text or accessible names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_toast_live_regions"
description = "Stop validation errors, import errors, demo toasts, and export copy confirmations are shown visually and announced via aria-live regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "stop_form_explicit_labels"
description = "Stop create/edit fields (title, day, location, startTime, endTime, category, costTier, status) use explicit labels associated with their inputs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "planner_heading_order"
description = "Planner headings (trip title, day sections, export canvas) follow a logical order with no skips such as H1 to H3"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "planner_landmarks"
description = "The workspace exposes landmark regions such as nav for the sidebar and main for the plan column, or an equivalent skip-to-content path"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "coastal_theme_contrast"
description = "Body text, day labels, and primary controls meet readable contrast in both light and dark themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "sidebar_main_button_semantics"
description = "Sidebar navigation, plan main region, and primary actions use semantic nav/main/button roles rather than unlabeled generic containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "planner_reduced_motion"
description = "With prefers-reduced-motion set, toast, list, coachmark, and control transitions are removed or substantially reduced while create, edit, delete, export, and import stay usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "export_or_stop_unreachable"
description = "Export Download/Copy, Import, stop create submit, or day sidebar rows cannot be reached or activated from the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "planner_focus_ring_missing"
description = "Focused stop rows, form fields, or export controls show no visible focus indicator or the indicator is obscured"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "map_pins_or_tabs_lack_semantics"
description = "Map pins, place-detail tabs, or poll controls lack accessible names or ARIA roles needed to identify them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "overlap_or_status_color_only"
description = "Time-overlap warnings or kanban status rely on color alone with no icon, text, or accessible name conveying the state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "conflict_focus_escapes"
description = "While the conflict-resolution modal is open, keyboard focus escapes into the plan behind it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "dark_theme_unreadable"
description = "In light or dark theme, day labels or stop titles are unreadable due to poor contrast against the coastal wash"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "stop_errors_visual_only"
description = "Stop field-contract errors or import failures are visual only with no aria-live or accessible association"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "hero_or_icons_missing_alt"
description = "Plan hero cover image or icon-only toolbar controls are missing alt text or accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "day_heading_order_skipped"
description = "Day section or export canvas headings skip levels (for example H1 to H3) or are unordered"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "coachmark_ignores_reduced_motion"
description = "With prefers-reduced-motion set, coachmark, toast, or list transitions still run at full motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "keyboard_alternative_for_drag"
description = "Every drag interaction has a keyboard path: each stop card offers keyboard-operable Move to day and reorder controls that achieve the same reassignment and reordering as a pointer drag"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "conflict_dialog_semantics"
description = "The conflict-resolution modal has role dialog with aria-modal, traps focus while open, makes Keep mine / Take theirs / Merge operable from the keyboard, and returns focus to the edited block on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "poll_names_and_promotion_announced"
description = "Poll controls expose accessible names that include the item name and current vote count, and a promotion is announced through an aria-live region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "role_state_programmatic"
description = "The role switcher exposes the current role programmatically, and controls disabled by the Viewer role are disabled in the accessibility tree rather than merely styled as inactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n11"
name = "drag_only_mutation_path"
description = "Reassigning a stop to another day or reordering within a day is achievable only by pointer drag, with no keyboard-operable alternative anywhere in the UI"
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "1.15"
name = "export_import_keyboard_operable"
description = "Export Download/Copy controls and the trip JSON import control are reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0
[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
