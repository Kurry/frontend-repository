[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_plan_and_day_states"
description = "After deleting all stops the plan list shows an empty state message, and selecting a day with no stops shows an empty day state rather than a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "stop_form_inline_validation"
description = "The stop create/edit form shows inline per-field errors for title, endTime, category, costTier, status, and day before submit under the Stop field contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "stop_and_import_errors_actionable"
description = "Stop validation and trip JSON import errors name the problem field and a fix (for example endTime must be after startTime) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "export_copy_and_import_feedback"
description = "Export Copy and successful Import show a visible confirmation toast or notice, and a failed import shows a visible error"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "vote_and_peer_sim_feedback"
description = "Simulated peer voting and peer-edit conflict resolution show visible progress or state updates (vote counts changing, conflict modal opening) rather than a silent wait with no UI change"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "delete_supports_undo"
description = "After deleting a stop, Undo restores it across list, map, and exports; bulk Delete requires an explicit confirm step before removing selected stops"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "coachmarks_guide_workspace"
description = "The onboarding coachmark sequence and/or tooltips explain the plan column, map pane, and ideas bucket so non-obvious collaboration controls are discoverable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "planner_controls_semantic"
description = "Stop form fields, export Download/Copy, Import, role switcher, and sidebar day rows use semantic button/input/label elements rather than clickable bare divs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "conflict_and_export_dismiss_paths"
description = "The conflict-resolution modal and export canvas each offer an operable dismiss or choice path that returns to the plan without trapping the user"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "coachmark_and_vote_progress"
description = "The coachmark sequence shows step progress (Next/Skip), and bucket polls show visible vote-count progress toward the 3-of-4 promotion threshold"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "collision_flags_and_clears"
description = "Editing a block's times to overlap another block flags both amber immediately, and editing them apart clears both warnings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_bucket_state"
description = "Emptying the ideas bucket shows a bucket empty state message with no orphaned poll widgets remaining"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "viewer_blocked_action_feedback"
description = "In the Viewer role, activating a mutating control changes nothing and a read-only notice explains that Viewers cannot edit the plan"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "empty_undo_history_safe"
description = "With an empty undo history the Undo control is disabled or inert, and activating it produces no state change and no console error"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "recurring_duplicate_guard"
description = "Running the repeat-daily generator a second time for the same title and time warns about the duplicates and adds no additional blocks"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "end_before_start_rejected"
description = "Submitting a stop with endTime not strictly after startTime adds no stop and shows an inline error naming endTime"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "out_of_enum_rejected"
description = "Submitting a stop with a category, costTier, status, or day outside the closed enums adds no stop and shows an inline error naming that field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "malformed_import_rejected"
description = "Importing malformed trip JSON shows a visible error naming the import problem, leaves stops unchanged, and produces no console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.19"
name = "invalid_stop_import_rejected"
description = "Importing trip JSON whose stops violate the Stop field contract (missing title, illegal enum, or endTime not after startTime) shows a visible error naming the offending field and leaves the plan unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.20"
name = "title_or_notes_length_rejected"
description = "Submitting a title longer than 120 characters or notes longer than 500 characters adds no stop and shows an inline error naming that field"
type = "binary"
weight = 1.0

