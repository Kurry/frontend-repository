[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "three_pane_to_stacked"
description = "At 1440px the sidebar, plan column, and map pane sit side by side; below 1024px the map stacks under the plan; at 375px the workspace remains usable without horizontal page scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets"
description = "At 375px width, sidebar toggle, stop rows, and primary Export/Add controls present tap targets at least 44px in at least one dimension"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "planner_type_scales"
description = "Trip title and day headings remain readable at 1440px and at 375px without overflowing their containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_viewport_clip"
description = "At 1440px and 375px, plan list rows, map pane, and export canvas controls stay within the viewport without clipping primary content"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_drawer_below_768"
description = "At widths of 768px and below the left sidebar collapses behind a toggle that opens it as an overlay drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "map_stacks_below_plan"
description = "Below 1024px the map pane stacks below the plan column rather than overlapping or sitting beside a crushed sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_operates_stops"
description = "At 375px width, tapping a stop row selects it and tapping the sidebar toggle opens the drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_page_horizontal_scroll_375"
description = "At 375px width the page body has no horizontal scrolling; kanban may scroll inside its own container only"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "map_and_hero_responsive"
description = "Plan hero cover image and the map pane resize with the layout at 1440px and 375px without overflowing"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "toggle_and_export_reachable"
description = "Sidebar toggle, Export control, and undo/redo remain reachable at 375px without being covered by fixed chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "kanban_and_drawers_adapt"
description = "Below 1024 px the kanban columns scroll horizontally inside their own container without page-level horizontal scroll, and at 768 px and below the ideas bucket and activity log open as overlay drawers"
type = "binary"
weight = 1.0

