[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "three_pane_to_stacked"
description = "At 1440px the sidebar, plan column, and map pane sit side by side; below 1024px the map stacks under the plan; at 375px the workspace remains usable without horizontal page scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets"
description = "At 375px width, sidebar toggle, stop rows, and primary Export/Add controls present tap targets at least 44px in at least one dimension"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "planner_type_scales"
description = "Trip title and day headings remain readable at 1440px and at 375px without overflowing their containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_viewport_clip"
description = "At 1440px and 375px, plan list rows, map pane, and export canvas controls stay within the viewport without clipping primary content"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_drawer_below_768"
description = "At widths of 768px and below the left sidebar collapses behind a toggle that opens it as an overlay drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "map_stacks_below_plan"
description = "Below 1024px the map pane stacks below the plan column rather than overlapping or sitting beside a crushed sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_operates_stops"
description = "At 375px width, tapping a stop row selects it and tapping the sidebar toggle opens the drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_page_horizontal_scroll_375"
description = "At 375px width the page body has no horizontal scrolling; kanban may scroll inside its own container only"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "map_and_hero_responsive"
description = "Plan hero cover image and the map pane resize with the layout at 1440px and 375px without overflowing"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "toggle_and_export_reachable"
description = "Sidebar toggle, Export control, and undo/redo remain reachable at 375px without being covered by fixed chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "At 1024px or 375px the three-pane planner breaks: panes overlap, primary stop rows clip, or the map covers the plan column"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px, sidebar toggle, Add stop, or Export controls are too small to tap or misaligned off their hit targets"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "At 375px the trip title or day headings are too small to read"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px plan content is cropped or unnecessary page-level horizontal scrollbars appear"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = "At 768px or below the sidebar toggle is missing, or activating it leaves the drawer closed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed toolbars or drawers obscure stop rows or export controls at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "At narrow widths the map pane overlaps the plan column or export canvas"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_mobile_touch_actions_missing"
description = "At 375px stop rows or the sidebar toggle cannot be activated by tap"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "The map pane or plan hero image uses a static width that overflows the viewport at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Export, Undo, or Add stop controls disappear at 768px or 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.11"
name = "kanban_and_drawers_adapt"
description = "Below 1024 px the kanban columns scroll horizontally inside their own container without page-level horizontal scroll, and at 768 px and below the ideas bucket and activity log open as overlay drawers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "modal_or_coachmarks_clip_mobile"
description = "At 375 px width the conflict modal or a coachmark step clips off-screen, overlaps its target unreadably, or forces page-level horizontal scrolling"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
