[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/opt/webmcp/webmcp_stdio_server.mjs"]
env = { DEBUG = "webmcp*" }

[[criterion]]
id = "AC-02-01"
description = "Inspect backlog, overloaded, split, dependent, locked, focused, interrupted, compared, and certified states -> productivity hierarchy remains legible."
evaluator = "web-playwright-vision"
weight = 1.0
