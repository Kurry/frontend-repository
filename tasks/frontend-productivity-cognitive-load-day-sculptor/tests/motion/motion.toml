[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/opt/webmcp/webmcp_stdio_server.mjs"]
env = { DEBUG = "webmcp*" }

[[criterion]]
id = "AC-03-01"
description = "Place/resize, propagate/reject, focus/pause/recover, compare, and repeat reduced -> causality and final state agree."
evaluator = "web-playwright-vision"
weight = 1.0
