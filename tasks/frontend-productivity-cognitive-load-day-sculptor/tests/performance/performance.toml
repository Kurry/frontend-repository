[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/opt/webmcp/webmcp_stdio_server.mjs"]
env = { DEBUG = "webmcp*" }

[[criterion]]
id = "AC-09-01"
description = "Drag blocks across 48 slots with 15 tasks/dependencies and run timer -> responsive updates, stale propagation/timers cancelled, no old load flash."
evaluator = "web-playwright-vision"
weight = 1.0
