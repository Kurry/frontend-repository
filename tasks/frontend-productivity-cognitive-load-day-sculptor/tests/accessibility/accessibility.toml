[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/opt/webmcp/webmcp_stdio_server.mjs"]
env = { DEBUG = "webmcp*" }

[[criterion]]
id = "AC-08-01"
description = "Prioritize, place/resize blocks, navigate slots/graph, interrupt/recover, rollover, focus/complete, compare, and export without pointer -> focus/state match."
evaluator = "web-playwright-vision"
weight = 1.0
