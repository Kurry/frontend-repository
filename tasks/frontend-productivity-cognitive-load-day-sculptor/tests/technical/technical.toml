[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/opt/webmcp/webmcp_stdio_server.mjs"]
env = { DEBUG = "webmcp*" }

[[criterion]]
id = "AC-04-01"
description = "Interleave UI/WebMCP priority, block, break, dependency, interruption, focus-clock, checkpoint, and transfer operations -> views/artifacts agree."
evaluator = "web-playwright-vision"
weight = 1.0
