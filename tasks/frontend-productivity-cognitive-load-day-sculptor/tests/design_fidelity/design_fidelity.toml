[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/opt/webmcp/webmcp_stdio_server.mjs"]
env = { DEBUG = "webmcp*" }

[[criterion]]
id = "AC-12-01"
description = "Verify 15-minute geometry, capacity/switch/break math, dependency propagation, interruption lineage, and ICS -> productivity semantics are exact."
evaluator = "web-playwright-vision"
weight = 1.0
