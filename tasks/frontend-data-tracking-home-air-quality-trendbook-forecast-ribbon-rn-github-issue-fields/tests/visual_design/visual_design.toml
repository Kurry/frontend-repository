[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "three_column_evidence_hierarchy"
description = "At 1440px the interface reads as an intentional three-column evidence workbench: a compact saved-query rail, a flexible central forecast-and-table canvas, and a linked inspector, with the Forecast Ribbon visually dominant above the reading table"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "calm_air_monitoring_palette"
description = "Deep ink, mist-white surfaces, teal actions, cyan selection, and semantic green, yellow, orange, and rose AQI bands form one coherent high-contrast air-monitoring palette across rail, summary, ribbon, table, inspector, and dialogs"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.3"
name = "typed_field_and_status_system"
description = "Stable IDs, AQI values, dates, release provenance, and helper copy have a clear type hierarchy; selection and each status are distinguished by labeled text and structure as well as color"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "forecast_markers_or_controls_lose_legibility"
description = "The current or projected marker, status label, typed field, or primary control becomes unreadable, visually ambiguous, overlapped, or clipped anywhere in the desktop workbench"
type = "binary"
negate = true
weight = 1.0
