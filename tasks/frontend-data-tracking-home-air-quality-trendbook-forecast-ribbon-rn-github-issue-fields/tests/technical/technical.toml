[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "Creating, editing, archiving, deleting, merging, forecasting, undoing, and importing update the reading table, selected row, Forecast Ribbon, inspector, saved-query counts, six-value summary, history, and live artifact preview together without reload or stale values"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "strict_artifact_schema_contract"
description = "A downloaded artifact and the visible export preview contain the declared API-shaped record, forecast, provenance, derived, history, and view fields with closed enums, bounded numeric values, unique stable IDs, valid references, and an RFC3339 exportedAt"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "in_memory_reload_isolation"
description = "After authoring readings and changing query, sort, selection, and history, localStorage and sessionStorage remain empty and a page reload coherently returns every facet to the clean zero-record baseline"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "console_and_network_clean"
description = "First load and a complete create, forecast, undo, export, invalid import, clear, and valid import exercise produce no console errors, page errors, unhandled rejections, visible debug artifacts, or non-local network requests"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n1"
name = "invalid_import_partially_mutates_state"
description = "An import with multiple schema or relationship failures changes any reading, selected ID, saved query, sort mode, derived value, or history entry before or after its diagnostics appear"
type = "binary"
negate = true
weight = 1.0
