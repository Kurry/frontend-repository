[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "AC-04"
name = "schema_contract"
description = "The tool result and artifact must contain the declared API-shaped fields."
prompt = """
The tool result and artifact must contain the declared API-shaped fields.

Query the current state using the webmcp. Perform a mutation. Query the current state again and export the artifact.

Return score 1.0 if the queried state and export artifact contain the exact API-shaped fields declared in the contract. Return 0.0 otherwise.
"""
weight = 1.0
score_max = 1.0

[[criterion]]
id = "AC-13"
name = "artifact_round_trip"
description = "The artifact must preserve the session work for export and restore."
prompt = """
The artifact must preserve the session work for export and restore.

Perform mutations to edit a variant record and derived state. Export the artifact.
Clear the session state. Import the exported artifact.
Inspect the edited variant record and derived state.

Try importing an invalid artifact with malformed schema, duplicate IDs, unknown references, or invalid bounds.

Return score 1.0 if authored order/selection/geometry and domain state survive a valid import, and an invalid import is a no-op that makes no state change. Return 0.0 otherwise.
"""
weight = 1.0
score_max = 1.0
