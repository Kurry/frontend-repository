[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "edit_flow_reaches_every_pane"
description = "The core editing flow works end to end: adding, renaming, requiring, and constraining a field via a valid FieldDefinition lands in the tree, compiled text, example payload, format instruction, and SchemaPackage export within a beat of each edit and without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_forms_validate_inline"
description = "Submitting Save version with an empty name, entering min greater than max, an invalid pattern, a sibling-duplicate key, or a metadata field with no label triggers immediate inline validation naming the field and the FieldDefinition or VersionSnapshot rule and applies nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "validation_flow_end_to_end"
description = "The validation flow works end to end: paste payload, run, watch steps advance, see annotations land on the tree, and read the same outcomes in the validation report export"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Deleting a node (singly or via bulk delete) removes it and its descendants from the tree, compiled text, example payload, format instruction, and any annotations after deletion"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "schema_switch_retains_context"
description = "Switching between library schemas and back loads each schema's own tree, and switching right-pane tabs retains the underlying schema state — no switch silently loses edits already committed"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_tree_state_recovers"
description = "Deleting the loaded schema, or emptying the root's children, shows a clear state (blank-schema message or empty-object output) with working controls to create or select a schema and continue"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "versioning_flow_complete"
description = "The versioning flow works end to end: save, edit, save again, select the two versions, read the color-coded diff, and return to editing without losing the working tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "Collapsing and reopening the sidebar, the configuration panel, and tree branches preserves workflow continuity — the same schema, selection, and edits remain in place"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "The export modal, delete confirmations, and inline confirms open, complete their flow, and close as expected, returning the user to an intact editing context"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Every dead-end candidate recovers in-app: an invalid pasted payload, a failed validation step, a rejected import draft, a rejected SchemaPackage import, and an emptied library all leave working controls to continue without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_package_flow_with_field_contract"
description = "Export package flow: edit the schema by adding a constrained field, open Export, confirm the SchemaPackage JSON preview shows schemaVersion schema-package-v1 plus name, jsonSchema, fields, metadata, examplePayload, and formatInstruction with the new field present, then Import package that JSON and confirm the tree, compiled text, example, and format instruction restore the same session work"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "A primary flow — editing the tree, running validation, saving a version, importing an example, exporting a SchemaPackage, or importing a package — is not reachable from the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "An added field, saved version, or metadata field fails to appear where it should, or appears duplicated after a single submission"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A state change leaves two panes disagreeing — for example the tree shows a rename the compiled text or example payload does not"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching schemas or tabs breaks the layout or loses the selected node and its configuration panel state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying the library or the tree produces a broken or blank region instead of a designed empty state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n6"
name = "derived_views_disagree"
description = "The compiled text, example payload, and format instruction disagree about which fields currently exist in the same schema"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "The collapsed sidebar, a collapsed tree branch, or the dismissed configuration panel cannot be reopened from the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "The export modal or a confirmation blocks the rest of the app with no visible exit (no close control and no Escape path)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed flow — an invalid payload, an exhausted validation retry, a rejected constraint — completes silently with no visible feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Some state (mid-run pause, a deep diff selection, an emptied tree) can only be escaped by reloading the page"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
