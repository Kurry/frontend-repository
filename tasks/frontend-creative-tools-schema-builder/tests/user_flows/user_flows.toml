[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "edit_flow_reaches_every_pane"
description = "The core editing flow works end to end: adding, renaming, requiring, and constraining a field via a valid FieldDefinition lands in the tree, compiled text, example payload, format instruction, and SchemaPackage export within a beat of each edit and without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_forms_validate_inline"
description = "Submitting Save version with an empty name, entering min greater than max, an invalid pattern, a sibling-duplicate key, or a metadata field with no label triggers immediate inline validation naming the field and the FieldDefinition or VersionSnapshot rule and applies nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "validation_flow_end_to_end"
description = "The validation flow works end to end: paste payload, run, watch steps advance, see annotations land on the tree, and read the same outcomes in the validation report export"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Deleting a node (singly or via bulk delete) removes it and its descendants from the tree, compiled text, example payload, format instruction, and any annotations after deletion"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "schema_switch_retains_context"
description = "Switching between library schemas and back loads each schema's own tree, and switching right-pane tabs retains the underlying schema state — no switch silently loses edits already committed"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_tree_state_recovers"
description = "Deleting the loaded schema, or emptying the root's children, shows a clear state (blank-schema message or empty-object output) with working controls to create or select a schema and continue"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "versioning_flow_complete"
description = "The versioning flow works end to end: save, edit, save again, select the two versions, read the color-coded diff, and return to editing without losing the working tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "Collapsing and reopening the sidebar, the configuration panel, and tree branches preserves workflow continuity — the same schema, selection, and edits remain in place"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "The export modal, delete confirmations, and inline confirms open, complete their flow, and close as expected, returning the user to an intact editing context"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Every dead-end candidate recovers in-app: an invalid pasted payload, a failed validation step, a rejected import draft, a rejected SchemaPackage import, and an emptied library all leave working controls to continue without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_package_flow_with_field_contract"
description = "Export package flow: edit the schema by adding a constrained field, open Export, confirm the SchemaPackage JSON preview shows schemaVersion schema-package-v1 plus name, jsonSchema, fields, metadata, examplePayload, and formatInstruction with the new field present, then Import package that JSON and confirm the tree, compiled text, example, and format instruction restore the same session work"
type = "binary"
weight = 1.0

