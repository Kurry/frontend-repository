[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "10.1"
name = "serves_clean_and_fast"
description = "The app serves via its documented npm start path on port 3000, renders a working interface (not a blank or broken page), and is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.2"
name = "shared_state_coherence"
description = "A single edit propagates everywhere at once: renaming a field updates the tree, compiled text, example payload, format instruction, and SchemaPackage export together — the same datum never shows different values in two panes without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.3"
name = "reload_resets_to_seed"
description = "A page reload returns the app to its seeded baseline: the seeded schema library with the first schema active, empty undo history, no user versions, and an empty playground"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.4"
name = "console_stays_clean"
description = "No console errors or unhandled promise rejections appear on load or during a full exercise of editing, drag reorder, validation runs, versioning, import from example, SchemaPackage import, undo/redo scrubbing, and exports"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.5"
name = "compiled_output_parses_as_json"
description = "The compiled schema text and the SchemaPackage JSON preview are valid JSON at all times — after any sequence of edits the package parses without error, carries schemaVersion schema-package-v1, and its jsonSchema carries the draft-07 $schema declaration and standard keywords"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.6"
name = "rapid_interaction_stays_synced"
description = "Rapid interleaved interaction — fast renames, quick history-slider scrubs, tab switches during a validation run — leaves all panes consistent with each other, with no desynced or stale derivations"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.7"
name = "api_shaped_exports_round_trip"
description = "SchemaPackage export and Import package use the same field contract: a package exported from the session can be re-imported to reconstruct the same tree and derived panes, and browser storage remains unused for that persistence"
type = "binary"
weight = 1.0

