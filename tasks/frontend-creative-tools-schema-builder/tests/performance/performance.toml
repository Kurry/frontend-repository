[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to an interactive tree editor is under 2 seconds on local render"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or while exercising editing, drag reorder, validation, versioning, import from example, SchemaPackage import, and export"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "derivations_feel_instant"
description = "The compiled text, example payload, and format instruction land within roughly 100 milliseconds of any edit with no perceptible lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "simulated_run_has_progress_indicators"
description = "The simulated validation run shows continuous progress (step statuses, rollup) rather than a frozen or blank interface"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_trees_stay_smooth"
description = "A schema grown to dozens of fields with deep nesting still edits, collapses, and reorders smoothly without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_run"
description = "The UI remains fully interactive while a validation run advances — switching tabs, selecting nodes, and reading panes all work mid-run"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Height expansions, reorder slides, and panel transitions hold a smooth frame rate with no visible stutter"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated input — fast renames, rapid history-slider scrubbing, quick tab switches, repeated undo/redo — never hangs or drops interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the tree is editable on a local cold load"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings appear in the console during the exercised flows"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Panel, tab, or reorder transitions visibly block input or lag behind the interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n4"
name = "simulated_work_hangs_ui"
description = "The simulated validation run freezes the interface or blocks interaction while it advances"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n5"
name = "large_trees_kill_frame_rate"
description = "Editing or scrolling a large nested schema visibly kills the frame rate"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive while expansion or reorder animations play"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n7"
name = "loading_state_is_blank"
description = "A blank region is displayed with no affordance while a pane or the run panel prepares its content"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n8"
name = "rapid_or_edge_use_crashes"
description = "The app crashes or becomes unusable under rapid or edge-case use"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
