[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_present"
description = "An emptied tree, an empty version list, an empty playground, and a deleted-schema state each render a designed empty state naming what belongs there, never a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline_before_submit"
description = "The FieldDefinition configuration constraints, Save version, metadata field builder, Import from example, and Import package validate inline before submit, with required-field and field-contract rule errors naming the field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Error copy is actionable: the JSON parse error names the position, constraint errors name the FieldDefinition rule and bound, SchemaPackage import errors name schemaVersion or the offending key, and the rename-conflict message names the colliding sibling"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Copying, saving a version, inserting into the prompt draft, applying an import, importing a package, and deleting each produce visible success feedback (toast or inline confirmation)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "simulated_run_shows_progress"
description = "The simulated validation run shows live progress affordances — per-step statuses, the rollup, and the backoff countdown — rather than an unexplained wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded_and_undoable"
description = "Destructive actions are guarded and recoverable: node, bulk, and schema deletions require confirmation naming the scope, and tree deletions can be reverted via Undo"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "non_obvious_controls_have_help"
description = "Non-obvious controls — nest/un-nest, the history slider, constraint templates, import accept/reject — carry labels, tooltips, or hints that explain them in-app"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, selects, checkboxes, and the slider use semantic interactive elements with real labels rather than bare div or span wrappers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_support_close_paths"
description = "The export modal and confirmation dialogs close via their close control, Escape, and a background click where applicable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "boundary_values_handled"
description = "Boundary inputs behave: a 40-plus-character field name truncates with an ellipsis in the tree and shows in full in the panel, an empty enum entry is rejected with a message, an empty-object schema stays valid, and undo/redo at empty stacks are disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_regions_render_blank"
description = "An empty tree, library, version list, or playground renders as a blank region with no explanatory feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "A failure (invalid payload, invalid constraint, failed step) is surfaced only in the browser console with no visible UI feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Copy, save, apply, or delete actions complete silently with no visible confirmation or state change"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "A node, bulk, or schema deletion executes immediately with no confirmation step"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Interactive affordances (tree rows, toggles, drag handles, tab headers) are plain div or span elements with no role, keyboard handling, or label"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "The export modal or a confirmation dialog cannot be dismissed with the keyboard"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Form or constraint validation feedback is missing, or an invalid value is silently applied to the schema before any error appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Buttons render with ambiguous or missing text (icon-only destructive actions with no accessible name, or generic labels where the action is specific)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n9"
name = "double_activation_duplicates_effects"
description = "Double-activating Run validation, Save version, or Add Field produces duplicated runs, versions, or fields"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "A specified affordance (nest/un-nest, bulk action bar, template library, import review toggles, Import package) is visually hidden or unreachable in practice"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.11"
name = "schema_package_import_rejects_nonconforming"
description = "Importing parseable JSON that fails the SchemaPackage field contract — schemaVersion not exactly schema-package-v1, missing required name/jsonSchema/fields/metadata/examplePayload/formatInstruction keys, or a fields element outside the FieldDefinition contract — shows visible validation naming the offending field and leaves the working schema unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "nonconforming_package_mutates_tree"
description = "Importing JSON that fails the SchemaPackage field contract still mutates the working tree, compiled text, example payload, or format instruction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
