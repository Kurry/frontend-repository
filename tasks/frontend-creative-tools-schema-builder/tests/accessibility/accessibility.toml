[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — tree rows and their toggles, chevrons, the configuration inputs, tabs, version selectors, the history slider, and run controls — is reachable and operable with Tab, Shift+Tab, Enter, Space, or arrow keys"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlays_manage_focus"
description = "The export modal and confirmation dialogs trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls (delete, nest/un-nest, chevrons, copy) carry accessible names or labels; decorative icons are hidden from the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "run_outcomes_announced"
description = "Completion of a validation run and a step entering the failed state are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "The FieldDefinition configuration panel, Save version, metadata builder, Import from example, and Import package fields have visible labels, and validation messages are programmatically associated with their fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Panel and section headings follow a logical order with no skips (H1 for the app, H2 for panels, H3 within)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "tree_semantics_exposed"
description = "The schema tree exposes hierarchy semantically (tree or equivalent list-with-level semantics) so nesting depth and expanded states are readable by assistive technology, and landmark structure or a skip path is present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "All text — type badges, required asterisks, diff treatments, code surfaces, annotations — meets sufficient color contrast against its background"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Interactive and structural elements use semantic roles — real buttons for actions, real tab semantics for the pane tabs, slider semantics with value for the history control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, height expansions, reorder slides, panel transitions, and annotation pop-ins are removed while all functionality remains"
type = "binary"
weight = 1.0

