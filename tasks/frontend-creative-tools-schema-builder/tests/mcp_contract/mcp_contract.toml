[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: structured-editor-v1, command-session-v1, entity-collection-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the editor_*, session_*, entity_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_schema_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor operations on the schema tree, session validation-run controls, entity operations on library schemas, and artifact import/export change the same shared tree, compiled schema text, example payload, and format instruction the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: editor select/add/delete/update_property/set_content/switch_mode/preview on schema, field-node, metadata-field, and version (modes schema-text, example, format-prompt, diff, playground, import); session start/pause/resume/advance plus demos validation-run, regenerate-example, and apply-import-draft; entity create/select/update/delete on schema (fields name, fields, metadata); artifact export/import/copy with export formats compiled-schema-json, schema-package-json, validation-report-text, and format-instruction-text and import modes example-json and schema-package — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "tree_edits_propagate_to_all_derived_surfaces"
description = "The contract can be fully exercised via automation, and every invoked tree or configuration edit updates the compiled draft-07 schema text, the example payload, the format instruction, and the SchemaPackage export within a beat, all from the one shared tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "schema_entity_operations_work"
description = "Declared entity operations on schema all work: create, select, update, and delete (delete requires confirm=true) update the visible library list and active tree exactly as the sidebar controls do."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "validation_run_session_controls_are_bound"
description = "Session operations are bound to the real validation run: a completed run maps per-field pass/fail annotations onto the tree naming the field path and violated constraint keyword with its bound; pause freezes at the current step and resume continues there, with the rollup and event timeline agreeing with the step list."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "package_round_trip_and_diff_match_spec"
description = "Artifact operations match the declared spec: exporting then importing a schema-package reconstructs the same tree, compiled text, example payload, and format instruction; the SchemaPackage preview shows schemaVersion schema-package-v1 with all required keys; diffing two saved versions color-codes added, removed, and changed fields and a self-diff shows the explicit no-differences state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no generic state setter, versions are never edited in place, the root node has no delete, and export/import stay inside the four declared formats and two declared import modes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound editor, session, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: node drag-to-reorder gestures, history-timeline slider scrubbing, undo/redo keyboard shortcuts, and panel animations are left to real UI interaction, and no tool returns clipboard or downloaded file contents."
type = "binary"
weight = 1.0

