[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens at / into the PortfolioFrame builder with a left editor panel and a right live preview panel, and the preview shows a friendly start-building prompt because no content exists yet"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After typing 'Ada Lovelace' into the Profile Header Name field, the text 'Ada Lovelace' appears in the live preview's header block immediately without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After submitting the Add Project form with a Title 'Portfolio Site' and a Category Tag, a project card showing 'Portfolio Site' and that category appears in the preview's project grid; after editing the project's Title the preview card updates, and after deleting the project it is no longer visible in the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding a skill 'Design' and then attempting to add 'design' with different letter casing, the duplicate is rejected with a visible inline message and the preview still shows exactly one 'Design' chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After submitting the Add Testimonial form with a Quote, Name, and Role, a matching entry appears in the preview's horizontally scrollable testimonials row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After turning the Skills section's show/hide toggle off, the Skills section disappears from the preview while the other sections keep their relative order, and turning it back on restores it in its original position rather than at the end"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After using a section's Move Up control, that section's position in the preview shifts above the section that was previously before it, and Move Up is disabled for the section at the top of the order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After selecting the Forest theme, the preview's section headings and chips recolor to the Forest green accent while the surrounding editor chrome color is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After toggling the Density control between Compact and Spacious, the spacing between the preview's blocks visibly changes between the two settings"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After filling one previously empty recommended field, the Completeness panel's 'x of y complete' count increases by one live without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After entering distinctive Profile Header content, saving it with Save As Draft under a name, and performing a full page refresh, the drafts list still shows the saved draft and loading it restores the exact saved content to the editor and preview; deleting the draft removes it and it does not reappear after another refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After adding two skills in sequence, clicking Undo once removes the second skill from the preview while the first remains, clicking Undo again removes the first, and clicking Redo twice restores both in order, with Undo disabled when there is nothing left to undo and Redo disabled when there is nothing left to redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After making several content changes, undoing one or more, and then making a different change through the real controls, the History panel's History state region and a separate selectable branch are shown, and selecting a branch restores its exact prior visible state rather than a flattened history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When hovering buttons, theme swatches, and section toggles, a visible hover state such as a background, border, or shadow change appears, and keyboard Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The projects, skills, and testimonials collections support create, edit, and delete through visible editor controls, and each change is reflected in the live preview from shared application state without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Editing a Profile Header field (Name, Title, or Bio) or a Contact field (Email or Location) updates the corresponding block in the live preview immediately as it is typed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Adding a skill that case-insensitively duplicates an existing one is rejected with a visible inline message and creates no second chip, while a distinct skill is added as a chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Each section's show/hide toggle immediately adds or removes that section from the preview, and toggling a hidden section back on restores it in its existing position rather than appending it at the end"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Move Up and Move Down reorder the sections shown in the live preview, and the controls are disabled for the section at the top and bottom of the order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Selecting each of the four named themes (Sunrise, Slate, Forest, Blossom) recolors the preview's headings, chips, and accent text, and toggling Density between Compact and Spacious visibly re-spaces the preview blocks"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "The Contact section renders the Email, Location, and up to 3 custom labeled links together, with each custom link showing its own entered label"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Download PDF triggers the browser's native print flow (window.print) against print-specific CSS (an @media print rule) that hides the editor chrome and shows only the assembled preview, rather than using a client-side PDF library"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Save As Draft stores the current content under a typed name in a drafts list, loading a draft replaces the current editor and preview content with the draft's values, and deleting a draft removes it from the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The Completeness panel shows a live 'x of y complete' count that increases when a previously empty recommended field is filled, without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Undo reverts the most recent content change and Redo reapplies the last undone change across multiple consecutive changes, with Undo disabled when there is nothing to undo and Redo disabled when there is nothing to redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The History panel exposes a region labelled History state showing the current snapshot and an Apply Scenario Change action, and undoing one or more steps and then making a different change creates a separate selectable branch whose selection restores that branch's exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "The projects, skills, or testimonials in the preview are static markup with no working create, edit, or delete against shared application state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "A skill that case-insensitively duplicates an existing one is accepted as a second chip, or no inline rejection message appears when a duplicate is attempted"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Undoing one or more steps and then making a different change silently discards or flattens the abandoned history states instead of preserving them as a selectable branch"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "A success signal such as a saved-draft confirmation, an added chip, or an updated completeness count appears while the underlying item is absent, or a value stays constant regardless of the input given"
type = "binary"
weight = 1.0
negate = true
