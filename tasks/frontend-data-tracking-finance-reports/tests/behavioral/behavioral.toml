[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: create a transaction, switch the chart tab to Trends, apply a category filter, switch display currency, then reload. All facets coherently reset to the seeded baseline — seeded transactions, default chart tab, cleared filters, USD currency — never a mix of reverted and surviving state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort the transactions table by amount ascending, note the order, then sort descending; the order reverses correctly relative to ascending, proving sort is derived from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: change the category filter or date range and confirm the sankey/pie aggregates, summary strip, and threshold month-to-date change meaningfully rather than redrawing identically regardless of input"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: create or edit a transaction in the table and confirm the same amount appears in the matching chart aggregate and in the Export JSON totals without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the summary strip transaction count immediately before and immediately after creating one valid transaction; the delta is exactly +1 with no off-by-one or lagging counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: create two expense transactions in different categories with different amounts; the two category aggregates and the Export JSON transactions entries differ in the ways the inputs dictate"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start creating a transaction, open Export then close it, finish creating a second transaction, then confirm both rows exist and neither flow corrupted filters or threshold ceilings"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: delete all transactions so the empty state shows and KPIs read zero, then Import ledger-json with Replace using a valid document; the table, cards, strip, charts, thresholds, and a fresh export track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_pipeline_contains_session_work"
description = "Full export pipeline: mutate the collection with two distinct payees, open Export, and confirm the JSON transactions array contains both labels and totals.count matches the live strip; an export that omits either label fails"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_restores_state"
description = "Import/export round-trip: after mutations, capture the export JSON transaction set, delete all rows, Import that ledger-json with Replace, and confirm the table and a fresh export transactions array match the captured set"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_restores_prior_state"
description = "Undo round-trip: create a transaction, note KPIs, Undo to restore prior collection and derived surfaces, then Redo to reapply; surfaces match the pre-undo and post-create states respectively"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, some facets (filters, chart tab, currency, or created rows) silently survive while others reset, producing incoherent partial persistence in this in-memory app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "A derived surface (chart aggregate, summary strip, threshold status, or export totals) renders identically regardless of transaction or filter inputs"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Creating two transactions with different payees and amounts yields byte-identical export JSON transactions arrays"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "State changes appear in the table but not in chart aggregates, thresholds, or export preview until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "undo_does_not_restore"
description = "Activating Undo after a create or delete leaves the collection and derived surfaces unchanged"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
