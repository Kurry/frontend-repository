[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "After submitting a valid new transaction, the table gains exactly one row, the four summary cards recompute, the summary strip count increases by one, the active chart panel reflects the new aggregate, and thresholds recompute when the category is an expense — without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Submitting create with an empty payee/label, missing amount, zero amount, or Salary with negative amount shows inline validation naming the offending field and adds no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Editing a transaction amount updates that same table row, moves the affected summary cards, updates matching sankey/doughnut aggregates, and updates matching threshold month-to-date without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Deleting a transaction removes its row, drops it from selection, decreases the summary strip count by exactly one, and drops its amount from KPIs, chart aggregates, and thresholds"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "Switching Breakdown/Trends and focusing list versus chart keeps the transactions collection and filters intact without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "After deleting all transactions, the list region shows an empty state and summary cards and strip read zero/empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_all_surfaces"
description = "Category, income-vs-expense, and date-range filters narrow the table and recompute chart aggregates and summary strip; clearing them restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "Below 1024px, the collapsed sidebar can be reopened via its toggle and the reports workflow continues without losing the transactions collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Create/edit forms, the export drawer, and the import panel open, complete their actions, and dismiss without trapping the user"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "After dismissing an invalid create or closing the export drawer, the user can continue create/edit/filter/undo flows without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_flow_terminates_at_artifact"
description = "Export flow: after two creates with payees Ada Books and Evening Market, Export JSON contains both labels, CSV includes both labels, Download offers finance-reports-ledger.json and finance-reports-ledger.csv, and Copy shows Copied"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "currency_thresholds_undo_import_flows"
description = "Currency flow converts money surfaces when switching USD to EUR/GBP; thresholds flow shows over when a ceiling is lowered below month-to-date spend; undo/redo restores a create; import Replace of ledger-json reconstructs table and thresholds after an empty state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Create, edit, delete, Export, Import, Undo, or Redo primary flows are not enabled from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "Newly created transactions fail to show up in the table or appear duplicated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "After create/edit/delete, table, KPI cards, chart aggregates, thresholds, and export preview disagree about the same totals"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching Breakdown/Trends breaks the chart layout or clears an unrelated row selection incorrectly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying the collection produces broken layout, missing empty state, or crashed chart panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Filtered table rows disagree with chart aggregates computed from the same filter scope"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "Collapsed sidebar cannot be re-opened at narrow widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Export drawer or import panel blocks navigation with no Escape or close control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "An invalid create, bad date range, invalid threshold ceiling, or failed import provides no visible user feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "A flow dead-ends so the user must reload the page to continue using reports"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
