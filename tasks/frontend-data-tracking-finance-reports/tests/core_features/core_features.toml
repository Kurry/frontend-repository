[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_rows_visible_on_load"
description = "On load, the transactions list shows at least 8 seeded rows with payee, category, and amount visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "created_transaction_appears_in_list"
description = "After creating a transaction with payee 'Ada Books' and a valid amount, the text 'Ada Books' is visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "three_creates_add_three_rows"
description = "After adding 3 new transactions on top of the seed set, the list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "expense_create_updates_kpi"
description = "After creating an expense transaction, Total Expenses (or Net) KPI updates to reflect the new amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "edited_payee_replaces_old_value"
description = "After editing a payee from the seeded value to 'Evening Market', the text 'Evening Market' is visible and the previous payee is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "deleted_transaction_leaves_list"
description = "After deleting a transaction, that payee is no longer visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_state_after_last_delete"
description = "After deleting all transactions, an empty state message is visible and no transaction rows remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_submit_names_field_adds_no_row"
description = "After submitting create with an empty payee or a missing amount, an inline validation message naming the offending field is visible, no row is added, and the transactions count is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "category_filter_narrows_rows"
description = "After filtering transactions by a category (with mixed categories present), only matching rows remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "chart_tabs_swap_without_navigation"
description = "After switching between Breakdown and Trends chart tabs, the chart panel swaps without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "list_and_chart_modes_coexist"
description = "After focusing the transactions list versus the chart panel (list vs chart interaction modes), both remain usable without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "bulk_actions_apply_to_selection"
description = "After selecting multiple transaction rows and running bulk categorize or bulk delete, the selected rows update category together or disappear from the list and KPIs/charts reflect the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "summary_strip_updates_on_create"
description = "After creating an expense, the summary strip below the table (count, largest, average, date range) updates to reflect the new transaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "savings_rate_equals_net_over_income"
description = "The Savings Rate card equals net income divided by total income for the current transactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "inactive_nav_click_shows_toast"
description = "Clicking a non-active sidebar nav item (e.g. Accounts) shows a demo toast and the Reports view stays visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "transactions_crud_updates_derived_counts"
description = "Transactions collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "two_views_switchable_in_app"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "domain_state_beyond_crud_recomputes"
description = "Domain state beyond CRUD is implemented (filters, bulk categorize or bulk delete on selected rows, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "static_list_without_working_crud"
description = "Transactions list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "chrome_navigates_to_other_origins"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.24"
name = "summary_cards_recompute_on_crud"
description = "The four summary cards (Total Income, Total Expenses, Net Income, Savings Rate) recompute after create, edit, and delete, with Savings Rate shown as net income divided by income"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "summary_strip_derived_from_collection"
description = "A summary strip below the table reports transaction count, largest transaction, average amount, and covered date range, each recomputed from the current transactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "demo_chrome_replaces_real_crud"
description = "Demo chrome controls (Save, Export CSV, Sort, Bulk edit) replace or disable the working create/edit/delete flow instead of showing a transient toast"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "summary_strip_caption_hardcoded"
description = "The summary strip shows a hardcoded caption that does not change when transactions are added or deleted"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "1.29"
name = "breakdown_sankey_structure_rendered"
description = "Breakdown renders the sankey flow graph structure: named income-source nodes (Paychecks, Business Income, Interest, Other Income or equivalents) feed a central Income hub that splits into a Net Income node plus one node per expense category, with link thickness proportional to amount and node labels showing name and amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "create_flow_updates_all_surfaces"
description = "Scripted probe: note the table row count, the summary strip count, and the four summary card values; submit a valid new transaction through the create form; without any page reload the table gains exactly one row, all four summary cards recompute to include the new amount, the active chart panel redraws with the changed aggregate, and the summary strip count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "edit_flow_moves_cards_charts_strip"
description = "Scripted probe: change an existing transaction's amount to a distinctly different value; the same row shows the new amount in the table, the affected summary cards move, the corresponding sankey link thickness and doughnut segment differ when each chart panel is next viewed, and the summary strip largest and average figures update — all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "delete_flow_clears_row_selection_aggregates"
description = "Scripted probe: check a transaction's row checkbox, then delete that transaction; its row leaves the table, it is dropped from the checkbox selection, the summary strip count decreases by exactly one, and the matching chart aggregate shrinks the next time the panel is shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "filter_stack_and_clear_round_trip"
description = "Scripted probe: apply the category filter and confirm only matching rows remain; stack the income-vs-expense filter and confirm the visible rows narrow further; clear both filters and confirm exactly the full current collection returns, with the summary cards unchanged throughout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "bulk_flow_shifts_table_and_charts"
description = "Scripted probe: check several rows and apply bulk categorize — each checked row shows the chosen category in the table and the chart aggregates shift accordingly; then check several rows and apply bulk delete — every checked row disappears and the summary strip count drops by exactly that number"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "reload_restores_seeded_baseline"
description = "Scripted probe: create a transaction, switch the chart tab, and apply a filter, then reload the page; the app returns to its seeded state — the seeded transactions, default filters, and the default chart tab — with every facet reset coherently, never a mix of reset and surviving state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "double_submit_creates_exactly_one_row"
description = "Scripted probe: fill the create form with valid values and activate submit twice in quick succession; exactly one new transaction appears and the row count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "zero_state_after_empty_or_no_matches"
description = "Filtering to zero matches shows an empty state message in the list region; after deleting all transactions the empty state also shows and the summary cards and summary strip read zero/empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "bulk_actions_noop_without_selection"
description = "With no rows checked, activating bulk categorize or bulk delete performs no destructive change: the row count, chart aggregates, and summary strip stay exactly as they were"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "trends_doughnut_aggregates_live"
description = "The Trends panel renders a category pie/doughnut with a legend whose segments aggregate from the current transactions collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "charts_redraw_on_data_change"
description = "Scripted probe: note a sankey link width or node amount and a doughnut segment proportion, then create or delete a transaction in the corresponding category; the sankey link widths and node amounts and the doughnut segment proportions visibly differ the next time each panel is shown — the charts are data-driven, not baked images"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "submit_disabled_until_all_fields_valid"
description = "In the create and edit forms, the submit control stays disabled while any required field is invalid, and each invalid field shows an inline message naming that field (payee required, amount required and numeric)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "opens_directly_without_auth_gate"
description = "The app opens straight onto the Ledger reports workspace — sidebar, four summary cards, chart card, and transactions table all visible — with no login, signup, or bank-linking gate before the workspace"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "sidebar_nav_items_active_state_profile"
description = "The sidebar shows the named nav items Dashboard, Accounts, Transactions, Cash Flow, Reports, and Budget with Reports rendered as the active item, plus a profile reading Alex Rivera"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "chart_card_subtitle_and_pill_toggle"
description = "The chart card carries a 'By category & group' subtitle and a Breakdown / Trends pill toggle control"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.45"
name = "transaction_rows_carry_all_fields"
description = "Each transaction row in the table shows a date, payee, category, account, and a signed amount (optional status may also appear)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "demo_chrome_controls_show_toast"
description = "Activating the demo chrome controls (Filters, Save, Sort, Columns, Export CSV, Bulk edit) shows a brief toast that enters and clears, and never navigates away from or replaces the current view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, action sequence) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
