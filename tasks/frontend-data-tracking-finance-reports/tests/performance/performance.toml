[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of the app (create, edit, delete, filters, bulk actions, chart toggles, thresholds, currency switch, undo/redo, export, import, toasts)"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "chart_and_filter_changes_stay_responsive"
description = "Chart tab switches, filter changes, currency switches, and undo/redo apply without visible freezing"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_input_stays_responsive"
description = "The UI stays responsive under rapid repeated input with no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "export_import_do_not_jank"
description = "Opening Export, switching JSON/CSV tabs, and committing Import complete without multi-second freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "seeded_collection_scrolls_smoothly"
description = "With the seeded transaction set, scrolling the table and switching chart tabs remains smooth enough to follow without stutter that blocks interaction"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.7"
name = "animations_do_not_block_input"
description = "Row and toast animations do not block pointer or keyboard input for the duration of the animation"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_filter_chart_switching"
description = "Rapid repeated input on filters and chart tabs does not freeze or drop interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "Local cold load remains non-interactive for more than 2 seconds"
negate = true
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors appear during create, export, import, currency switch, undo/redo, or chart tab flows"
negate = true
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Chart tab switches or export drawer opens block the UI for a multi-second lag"
negate = true
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "Import or export leaves the UI hung with no feedback"
negate = true
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Doubling the seed collection makes scrolling or chart redraws unusably janky"
negate = true
type = "binary"
weight = 0.5

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Row or toast animations block pointer/keyboard input until they finish"
negate = true
type = "binary"
weight = 0.5

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "Chart or icon resource loading blocks first interactive render beyond the 2 second budget"
negate = true
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Extended use of export/import and chart switches causes progressive memory or CPU runaway that freezes the tab"
negate = true
type = "binary"
weight = 0.5

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "During slower import/export work the control region goes blank with no loading affordance"
negate = true
type = "binary"
weight = 0.5

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid filter/chart switching, currency switching, or empty-collection export crashes the page"
negate = true
type = "binary"
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
