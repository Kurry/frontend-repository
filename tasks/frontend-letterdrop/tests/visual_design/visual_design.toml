[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The layout uses the light #F5F5F7 background with #007AFF reserved for the primary Submit Word action and key highlights."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Primary buttons (Submit Word, Pause) use blue #007AFF fill with light text and a full pill shape; secondary buttons (Undo Last Tile, Resume) use the light #E6EEF7 fill with blue text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "3_3"
description = "Bomb and Slow power tiles are visually distinct from ordinary letter tiles and from each other in shape and color."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The danger line is always visible and reads as a hazard distinct from the board background."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The active streak badge and difficulty tier are visually highlighted, and locked achievements are muted or grayscale turning to full color when unlocked."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "At roughly 375px wide the board and HUD scale to fit without horizontal scrolling and tiles stay comfortably tappable."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The interface does not overflow horizontally or clip the board, HUD, or controls at a 375px viewport."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "Key state (streak badge, tier, unlocked achievements) is not left visually indistinguishable from inactive or locked state."
type = "binary"
weight = 0.5
negate = true
optional = true
