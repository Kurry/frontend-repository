[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Tiles animate downward smoothly and the fall rate increases gradually rather than snapping between speeds."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Submitting an invalid word (by clicking real tiles and Submit Word) shakes the word tray as its rejection feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Valid-word scoring, power-tile activation, Board Cleared, and achievement unlocks each surface a transient toast that fades on its own without blocking play."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Pressing the real Pause control dims the board with a Paused overlay and freezes tile motion, and Resume restarts motion from the frozen state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "All buttons show a visible hover state and keyboard Tab focus is visible on every interactive control."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "A transient confirmation toast does not persist indefinitely or block further interaction with the board and controls."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "Motion is not produced by snapping game state through a shortcut; pausing via the real control observably halts the ongoing fall animation."
type = "binary"
weight = 1.0
negate = true
