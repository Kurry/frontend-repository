[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_studio_scale"
description = "At 1440px, spacing among the left rail, header pickers, Ignore toggles, summary strip, and diff surface follows a consistent studio scale — no arbitrary one-off gaps that break the composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_chrome_and_mono_spec"
description = "UI chrome uses the sans-serif hierarchy (app title larger than panel headings, larger than body/labels) and all prompt text in diff, blame, merge, and Export uses monospaced type as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_rail_header_diff_spec"
description = "At 1440px the layout matches the specified composition: left rail (prompt picker + history), header (pickers, mode tabs, Ignore toggles, summary strip), and diff surface filling the remaining area — a dense studio, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the spec calls out: diff cross-fade (~150ms), counter pulse (~400ms), unified/split pane transition, merge resolution motion, graph node entrance, thread expand/collapse, and Export enter/exit — verified via real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "At 375px vs 1440px, responsive behavior matches the spec: below 768px the split stacks with a base/compare segment switch and the rail collapses behind a toggle; Export and Ignore toggles remain operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Buttons, inputs, selects, tabs, and Ignore toggles show the specified default, hover, focus ring, disabled, and error treatments rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography hierarchy clearly distinguishes the app title, panel headings, body/labels, and monospaced prompt text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states match the spec, including disabled Complete merge while regions remain unresolved, disabled Undo/Redo when stacks are empty, and the marked head version in the history list."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "diff_surface_treatments_match_spec"
description = "Added/removed line backgrounds, stronger word-level highlights, summary tag colors (green/red/blue), and distinct conflict treatment match the visual design spec."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover/press on buttons, history rows, search results, and graph nodes, plus toast slide-in/auto-dismiss, follow the specified microinteraction behavior when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_studio_composition"
description = "Visible spacing between rail, header, and diff contradicts the specified studio composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "diff_colors_ignore_spec"
description = "Added/removed/conflict treatments ignore the specified green/red/distinct-conflict palette and render a fixed unrelated scheme that does not distinguish change kinds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "pane_sizing_mismatches_spec"
description = "At 1440px split panes are not equal-width or the line-number gutter is not a fixed-width muted column as specified."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_studio_animations_missing"
description = "Required animations (diff cross-fade, counter pulse, unified/split transition, or Export enter/exit) are missing when driven through real controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Pickers, tabs, Ignore toggles, or Export controls use unstyled browser defaults when the spec requires distinct interactive treatments."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "At 768px or 375px the rail/diff stacking or Export surface is misaligned relative to the responsiveness spec."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Pickers, Ignore toggles, Export tabs, or graph nodes render off-screen or clipped at 1440px or 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_spec"
description = "Section structure omits the left rail, mode tabs, summary strip, or Export format tabs required by the visual design spec."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "App title, panel headings, and body labels have no visible size or weight distinction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_spec"
description = "Hover/press feedback or toast behavior is missing or contradicts the specified microinteractions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
