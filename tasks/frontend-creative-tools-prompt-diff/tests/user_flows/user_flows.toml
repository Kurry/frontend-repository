[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "merge_and_restore_create_versions"
description = "Create flow: a version created through the merge flow or a restore with a valid RestoreCreate changeNote appears at the head of the history list, in both pickers, on the graph, and in the Export Version package preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "incomplete_merge_blocked_with_feedback"
description = "Create flow: Complete merge stays disabled with the unresolved count visible until every conflict region is resolved, and the annotation composer rejects an empty AnnotationCreate bodyMarkdown inline before posting."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "resolution_edits_update_preview"
description = "Edit flow: changing a region's MergeRegionResolution (choose-left, choose-right, or edit-manually with manualText) updates the region chip and the merge result preview immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "undo_removes_created_version"
description = "Delete-equivalent flow: undoing a merge or restore removes the created head version from the history list, pickers, and graph together."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "mode_tabs_retain_context"
description = "View switch: switching between Diff, Compare Branches, Blame, and Graph retains the selected prompt, picker selections, Ignore toggles, and unified/split preference."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "no_differences_state_visible"
description = "Edge: comparing a version with itself shows the explicit no-differences state with zero counters instead of a blank panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_filters_consistently"
description = "Edge: the prompt picker search and the global version search narrow their lists consistently, and clearing either restores the prior list exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "rail_collapse_reopen"
description = "Collapsible chrome: collapsing the left rail (at narrow widths) and reopening it preserves the selected prompt and history scroll context."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "dialogs_support_expected_flows"
description = "Overlays: the restore confirmation, merge flow, annotation threads, and Export surface open, complete, and cancel as expected without losing surrounding state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload"
description = "Recovery: canceling a merge mid-resolution, dismissing a confirmation, closing Export, or rejecting an invalid Import never dead-ends the app; every flow is recoverable without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "diff_options_flow"
description = "Diff options flow: with a pair that differs only by whitespace or letter case, turn Ignore whitespace or Ignore case on and confirm the counters drop those differences; turn the toggle off and confirm the differences return."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "artifact_export_import_end_state"
description = "Artifact end state: after a merge, Export Version package shows schemaVersion prompt-diff-package-v1 and required keys including the new head; Download or Copy then Import that JSON reconstructs the same version texts and merge topology in history and graph."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "schema_validation_flow"
description = "Schema validation flow: empty AnnotationCreate bodyMarkdown posts nothing naming bodyMarkdown; empty RestoreCreate changeNote creates no head; Import with schemaVersion not prompt-diff-package-v1 leaves the chain unchanged naming schemaVersion; then a valid annotation and valid import succeed."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Comparing, merging, restoring, annotating, exporting, or importing (the primary flows) are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "A completed merge or restore fails to appear in the history or appears duplicated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A new version, annotation, or resolution is not synced across the history list, pickers, graph, and export surfaces."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching mode tabs breaks the layout or loses the selected prompt or picker selections."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "A prompt search or version search that matches nothing produces broken or missing UI instead of the designed empty state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The diff, its counters, and the blame view disagree about what changed between the same two versions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_omits_merge_head"
description = "After a completed merge, Export Version package or History report omits the new head or the merge resolutions shown in the app."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "The merge flow, Export surface, or an annotation thread blocks the app with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A blocked or invalid action — an unresolved merge, an empty annotation, or a non-conforming Import — gives no user feedback naming the field or problem."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "A navigation dead end requires a reload to recover — for example a merge session that cannot be canceled or completed, or a stuck Export surface."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
