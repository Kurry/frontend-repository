[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Layout adapts gracefully from 1440px desktop to 375px mobile: the rail, pickers, diff panes, graph, and threads reflow without breakage."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "UI controls are tap targets at least 44px on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Typography resizes for both mobile and desktop."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "No content clips or overflows the viewport at any width; long prompt lines wrap or scroll within the diff surface's own container."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "rail_collapses_split_stacks"
description = "At widths of 768 pixels and below the left rail collapses behind a toggle and the split view stacks into a single column with a base/compare segment switch; at desktop widths both are visible together."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "Layout stacking order reflows logically at narrow widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "Touch gestures such as swipe and tap work on mobile where present."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "Small screens have no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "graph_and_panes_resize"
description = "The version graph and diff panes size responsively to fit the layout at every width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Fixed controls remain accessible on all devices."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks or overflows at common breakpoints."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Controls are too small or misaligned on mobile."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Text is too small to read on some devices."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Content is cropped or scrollbars appear unnecessarily."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = "The sidebar or menu is unresponsive or missing at some widths."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed positions obscure content."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Stacking or overlap issues appear at some viewport size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_mobile_touch_actions_missing"
description = "Touch actions are not available on mobile where the spec requires them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "Images, charts, or canvases use a static size and overflow the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Controls disappear at specific sizes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
