[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Layout adapts from 1440px to 375px: the left rail, version pickers, Ignore toggles, diff panes, graph, Export surface, and threads reflow without breakage."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At 375px, pickers, tabs, Ignore toggles, merge choices, Export, Import, Undo, and Redo are tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Chrome labels and headings remain readable at both 1440px and 375px without shrinking into illegible sizes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px no content clips or overflows the viewport and no page-level horizontal scrolling appears; long prompt lines wrap or scroll within the diff surface's own container."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "rail_collapses_split_stacks"
description = "At widths of 768 pixels and below the left rail collapses behind a toggle and the split view stacks into a single column with a base/compare segment switch; at desktop widths both are visible together."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths the header controls, Ignore toggles, summary strip, and stacked panes reflow in a logical reading order rather than overlapping."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "At 375px tap activates pickers, tabs, Ignore toggles, merge choices, Export, and Import without requiring hover-only activation."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px the page has no page-level horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "graph_and_panes_resize"
description = "The version graph and diff panes size responsively to fit the layout at 1440px, 768px, and 375px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "export_import_operable_at_375"
description = "The Export surface, Ignore toggles, and Import control stay fully visible and operable at 375px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "At 768px or 375px the rail, split panes, or Export surface break, overlap, or overflow the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px primary controls (tabs, Ignore toggles, Export, merge choices) are smaller than ~44px or misaligned so they are hard to tap."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "At 375px chrome labels or diff text become too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px content is cropped by the viewport or page-level horizontal scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = "Below 768px the left rail cannot be toggled open, or it remains stuck open and covers the diff with no dismiss path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed header or Export chrome obscures the diff, graph, or merge controls at some width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "At 768px or 375px pickers, Ignore toggles, summary tags, or graph nodes visibly overlap."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_mobile_touch_actions_missing"
description = "At 375px Ignore toggles, Export, or Import cannot be activated by tap."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "The version graph or Export preview uses a static width that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Ignore toggles, Export, Import, or mode tabs disappear at 375px or 768px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
