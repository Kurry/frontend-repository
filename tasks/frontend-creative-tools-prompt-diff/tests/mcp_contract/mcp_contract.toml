[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: structured-editor-v1, browse-query-v1, entity-collection-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the editor_*, browse_*, entity_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_version_diff_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor operations on prompt-version, merge-region, and annotation-anchor, browse navigation and version search, entity operations on annotation-thread, and artifact export/copy change the same diff panes, counters, history list, graph, and export drawer the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: editor select/add/update_property/set_content/switch_mode/preview on prompt-version, merge-region, and annotation-anchor (properties base-version, compare-version, resolution, manual-text, restore-source, change-note; modes split, unified, diff, compare-branches, blame, graph); browse open/search over destinations diff, compare-branches, blame, graph, history-list, and export with filters prompt-search and global-version-search; entity create/update/toggle on annotation-thread (fields line-range-anchor, body-markdown, reply, resolved); artifact export/copy with formats version-history-report, version-package, and merged-prompt-text — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "version_picker_updates_show_postconditions"
description = "The contract can be fully exercised via automation: an invoked base or compare version switch re-renders the diff, the counters (lines added, lines removed, net token delta), and the word-level highlights without a reload, and comparing a version with itself yields the explicit no-differences state with zero counters."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "merge_and_restore_append_head_versions"
description = "Declared merge and restore operations work append-only: Complete merge stays unavailable until every conflict region is resolved from {choose-left, choose-right, edit-manually}; a completed merge appends one head version whose text matches the per-region choices exactly, adds a merge node connected to both parent branches in the graph, and adds one history entry; a restore creates one new head equal to the restored version while every prior version remains."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "annotation_thread_entity_operations_work"
description = "Declared entity operations on annotation-thread all work: create shows a thread marker on the anchored lines, a reply appends to the thread, the resolved toggle collapses it with the resolved treatment, anchors survive split/unified switches, and annotating an already-threaded range extends the existing thread."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "version_search_matches_declared_spec"
description = "Browse destinations and filters match the allowed specification: a version created by merge or restore is immediately findable via global-version-search, and activating a result loads that prompt and version into the base picker."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: merge and restore never rewrite or delete existing versions, no session or delete tools exist beyond the declared operations, and exports stay inside version-history-report, version-package, and merged-prompt-text with merged-prompt-text byte-identical to the merge result shown in the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound editor, browse, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: word-level highlight rendering, counter-click scroll pulses, the line-range selection gesture that anchors annotations, blame-gutter hover tooltips, graph entrance animation, and undo/redo are left to real UI interaction, and clipboard and downloaded files stay Playwright territory."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "diff_tools_missing_or_noop"
description = "WebMCP tooling for version switching, merging, annotations, or export is unbound, missing, or a no-op that reports success while the diff panes, graph, or history list stay unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_diff_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked merge reports success while the graph gains no merge node or the head version's text differs from the per-region choices, or an annotation create shows no thread marker on the anchored lines."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_version_capabilities_exposed"
description = "Undeclared capabilities are exposed, such as version delete or in-place rewrite tools, destinations beyond the six declared ones, or a generic state setter that patches diff state directly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "merge_bounds_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — a resolution outside {choose-left, choose-right, edit-manually}, a merge completed with unresolved conflict regions, a merge change note that fails to name the two merged branches, or an in-place edit of an existing version — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared editor, browse, entity, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (structured-editor-v1, browse-query-v1, entity-collection-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the version, merge, and annotation state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — asserting word-level highlight rendering from tool output, replaying the line-range selection gesture, driving undo/redo, or returning clipboard or file contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
