[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_designed"
description = "Empty state UI renders for a no-match prompt search, a no-match version search naming the query, and the no-differences self-compare state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "AnnotationCreate, AnnotationReply, RestoreCreate, and Import validate inline before submit with per-field messages naming bodyMarkdown, changeNote, schemaVersion, or the offending VersionPackage field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_problem_and_fix"
description = "Blocking messages name the problem and the fix — unresolved conflict count before Complete merge, bodyMarkdown length, schemaVersion must be prompt-diff-package-v1 — rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Merges, restores, exports, successful imports, and posted annotations each produce visible success feedback such as a toast naming what happened."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "long_operations_show_progress"
description = "The merge flow shows resolved-out-of-total progress, and Export shows its live preview before Copy or Download."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded"
description = "Restores and merge completion require confirmation, cancel leaves the chain intact, and undo reverts completed merges and restores."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "nonobvious_controls_have_help"
description = "Non-obvious controls — the net token delta counter, blame attributions, conflict markers, and Ignore whitespace / Ignore case toggles — carry a tooltip or inline explanation."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, selects, and labels for pickers, Ignore toggles, Export, Import, and merge choices use semantic elements rather than bare divs or spans."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_close_paths"
description = "The restore confirmation, merge confirmation, and Export surface close from their close control, Escape, and a background click where offered."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "merge_flow_stepwise_feedback"
description = "The region-by-region merge flow gives stepwise feedback: each MergeRegionResolution choice updates its chip and the progress indicator immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "import_rejects_malformed_json"
description = "Importing malformed JSON shows an inline parse error naming the import problem and leaves the prompt chain unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "import_rejects_field_contract_failures"
description = "Importing parseable JSON that fails the VersionPackage field contract — missing required keys, schemaVersion not prompt-diff-package-v1, kind outside main|branch|merge|restore, parentIds length outside 0-2, baseVersionId absent from versions, or resolution outside choose-left|choose-right|edit-manually — leaves the chain unchanged and names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "annotation_range_and_length_guards"
description = "AnnotationCreate with bodyMarkdown longer than 4000 characters or with lineEnd less than lineStart posts nothing and names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "seeded_export_still_opens"
description = "Export with only the seeded chain and no session merge still opens and shows a Version package including schemaVersion prompt-diff-package-v1 and every required VersionPackage key; Download and Copy remain available."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty search result, empty thread, or self-compare shows nothing and provides no feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "AnnotationCreate, RestoreCreate, or Import validation failures surface only in the browser console with no visible inline field feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Merging, restoring, annotating, exporting, or importing silently succeeds or fails with no visible feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "A restore or merge completes with no confirmation step."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap the pickers, tabs, Ignore toggles, merge choices, Export, or thread controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "A dialog, Export surface, or thread cannot be dismissed via the keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "The unresolved-regions gate is missing — Complete merge activates with regions still unresolved and no indication."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Button text is ambiguous or missing — for example unlabeled icon-only Export or Import actions with no accessible name or tooltip."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "import_mutates_on_invalid_payload"
description = "Import mutates the prompt chain when given malformed JSON or a VersionPackage that fails the field contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Interactive affordances such as the annotate control, Ignore toggles, Import, or blame attributions are visually hidden with no way to discover them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
