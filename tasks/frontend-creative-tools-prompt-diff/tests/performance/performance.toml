[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive (prompt list and pickers respond) is under 2 seconds on local render."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or during compare, Ignore toggle, merge, restore, annotate, export, and import flows."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = "Picker switches, Ignore toggles, and mode tab switches begin updating the visible diff within about 100ms of the control activation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "When Export regenerates a large Version package preview or Import parses a package, a visible busy or preview-updating affordance appears rather than a frozen blank surface."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.5"
name = "large_collections_render_without_lag"
description = "Diffing the longest seeded versions and searching across every version of every prompt complete without perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive while the diff recomputes after a picker switch, Ignore toggle, or mode toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Diff cross-fade, counter pulse, graph node entrance, and Export enter/exit maintain smooth motion without visible stutter during normal use."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated picker switches, Ignore toggles, and searches do not hang or freeze the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session of merges, undos, exports, and imports shows no obvious memory runaway (tab remains responsive)."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "poor_conditions_have_fallback"
description = "Import of a large or invalid package shows validation or parse feedback rather than an indefinite blank hang."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the prompt list and pickers become interactive on local render."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during compare, merge, export, or import flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Picker or Ignore-toggle updates block input or lag for a perceptible multi-second stall."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "Export preview generation or Import parsing causes the UI to hang or freeze with no feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Diffing the longest seeded versions makes the page unusable (multi-second freezes on each interaction)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during the diff cross-fade, counter pulse, or Export transition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while loading scripts or fonts with a prolonged blank screen after the cold-load window."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Repeated merge/undo/export cycles cause the tab to become unresponsive from runaway resource use."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Export or Import shows a blank surface with no preview and no busy affordance while work is in progress."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid picker switching or Import of invalid JSON crashes the app or blanks the workspace."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
