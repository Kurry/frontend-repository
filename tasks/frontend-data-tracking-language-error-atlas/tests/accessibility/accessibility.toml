[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "a11y_keyboard_range_controls"
description = "Keyboard range controls and mobile token/range sheets equal pointer selection functionality."
type = "binary"
weight = 1.0

[[criterion]]
id = "a11y_keyboard_traversal"
description = "Full keyboard traversal, named shortcuts, and modal focus trap and opener return function correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "a11y_live_announcements"
description = "Live announcements provide context for state changes correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "a11y_non_color_evidence"
description = "Provides non-color evidence for states correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "negative_keyboard_trap"
description = "Attempting to select ranges, branch/rebase, or bind/navigate the graph without a pointer results in inaccessible controls, missing focus states, or a keyboard trap."
type = "binary"
weight = 1.0
negate = true
