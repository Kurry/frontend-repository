[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "writing_error_copy_identification"
description = "Error copy identifies the field, rejected value or rule, and recovery action; correcting the value clears only the corresponding error."
type = "binary"
weight = 1.0

[[criterion]]
id = "conflict_writing_copy"
description = "Trigger every offset/operation/graph/opportunity/evaluation conflict -> copy names exact attempt/range/operation/revision/concept/exercise/denominator and recovery."
type = "binary"
weight = 1.0

[[criterion]]
id = "negative_unactionable_copy"
description = "An offset, operation, or graph conflict triggers generic error copy that fails to identify the exact attempt, concept, or recovery action."
type = "binary"
weight = 1.0
negate = true
