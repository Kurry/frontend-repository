[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "mobile_attempt_cards"
description = "Mobile layout displays attempt cards appropriately without horizontal overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "mobile_correction_sheets"
description = "Mobile layout uses token-range/correction sheets appropriately without horizontal overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "mobile_vertical_concept_lineage"
description = "Mobile layout transforms concept lineage to a vertical layout appropriately without horizontal overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "mobile_matrix_drilldowns"
description = "Mobile layout utilizes matrix drilldowns appropriately without horizontal overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "mobile_exercise_stepper"
description = "Mobile layout uses an exercise stepper appropriately without horizontal overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "negative_responsive_overflow"
description = "At 375px width, attempt, correction, or matrix flows exhibit page-level overflow, clip elements, or feature touch targets smaller than 44 pixels."
type = "binary"
weight = 1.0
negate = true
