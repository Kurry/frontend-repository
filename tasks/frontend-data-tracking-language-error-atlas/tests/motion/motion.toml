[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "causal_motion_highlight"
description = "Span highlight/operation diff changes explain cause with motion."
type = "binary"
weight = 1.0

[[criterion]]
id = "causal_motion_rebase"
description = "Stale/rebase mapping changes explain cause with motion."
type = "binary"
weight = 1.0

[[criterion]]
id = "causal_motion_concept_pattern"
description = "Concept/pattern propagation changes explain cause with motion."
type = "binary"
weight = 1.0

[[criterion]]
id = "causal_motion_schedule"
description = "Schedule/score/transfer changes explain cause with motion."
type = "binary"
weight = 1.0

[[criterion]]
id = "reduced_motion_parity"
description = "Reduced motion retains persistent range and count deltas."
type = "binary"
weight = 1.0

[[criterion]]
id = "negative_motion_reduced"
description = "Reduced motion fails to retain persistent range and count deltas, or breaks the causal endpoint updates."
type = "binary"
weight = 1.0
negate = true
