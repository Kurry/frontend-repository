[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_bound"
description = "The three contract-mandated modules — entity-collection-v1, browse-query-v1, and artifact-transfer-v1 — are initialized and bound (webmcp_list_tools shows entity, browse, and artifact prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed entity, browse, and artifact tool handlers drive the same visible UI logic as on-page create/edit/delete/toggle, destination switches, tag filters, theme, and Export grove / Import grove / Copy controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations"
description = "Only documented entity operations (create, select, update, delete, toggle), browse operations against root/node/grove-panel, and artifact operations (import, export, copy) are available — no undeclared routes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for entity create/update/delete/toggle, browse open against root/node/grove-panel, and artifact export/import/copy for grove-json and grove-csv"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_task_operations_work"
description = "Declared task entity operations create, select, update, delete, and toggle work over the contracted fields title, parentId, completed, collapsed, tags, status, priority, and dueDate, with delete requiring explicit confirm=true"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "artifact_export_import_copy_bound"
description = "Artifact-transfer export, import, and copy are bound to export formats grove-json and grove-csv and import modes grove-json and grove-csv; invoking them through WebMCP uses the same handlers as the visible Grove package controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_filters_themes"
description = "Browse destinations are limited to root, node, and grove-panel; filters are tag; themes are light, dark, and forest — matching the declared bindings"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond entity-collection-v1 / browse-query-v1 / artifact-transfer-v1 and the declared Bindings are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app module_spec + Bindings implementation without requiring manual edits to the verifier harness"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_reflects_entity_create"
description = "After entity create of a task with a distinctive title via WebMCP, artifact export (grove-json) through WebMCP uses the same store so the visible Grove JSON preview contains that title"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Entity, browse, or artifact MCP tooling is unbound, missing, or a no-op when invoked"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "An entity or artifact invocation updates MCP-reported state without matching the visible tree or Grove package UI (or the reverse)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or operations outside the Bindings/permitted_operations lists are exposed via webmcp_list_tools"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation via webmcp_invoke_tool"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "An entity create that should fail TaskUpsert field-contract validation still mutates the visible tree while MCP reports success (or the reverse desync)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for list/invoke"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks outside the app registration"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "entity-collection-v1, browse-query-v1, or artifact-transfer-v1 is missing where declared required"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation for the declared modules"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
