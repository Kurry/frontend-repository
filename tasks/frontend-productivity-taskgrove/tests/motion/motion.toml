[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Hovering a node row, its chevron, and a button such as Add Child each visibly respond with a background, border, or shadow change"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Tabbing through node controls, chevrons, tag chips, and buttons shows a focus indicator visibly distinct from both the resting and hover states"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Adding a task, archiving a branch, and re-parenting a node via Move To each show a transient toast that clears on its own"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Submitting a blank root or child title is blocked and explained with a visible inline error or shake, not merely a silently disabled button"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "Through the real chevron click and real leaf-toggle controls (not a state shortcut), the chevron rotates on toggle and the progress ring's fill animates smoothly as its percentage changes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "A node row, chevron, or button shows no visible change on hover, or Tab focus lands on a control with no visible indicator"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "A blank title submission is blocked with no visible explanation at all beyond a disabled-looking control"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.9"
name = "row_add_remove_reorder_animates"
description = "Driven through the real UI controls (not a state shortcut): a newly added task row animates into place rather than appearing instantly, an archived branch's rows animate out of the tree, and a Move Up or Move Down swap slides the affected rows to their new positions instead of snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "toast_slide_fade_entry"
description = "A confirmation toast enters with a short slide-and-fade animation rather than popping in instantly, then clears on its own after a few seconds"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "blank_submit_input_shake"
description = "Submitting a blank title (root or child) triggers a brief shake animation on the input alongside its inline error text"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.12"
name = "theme_switch_color_transition"
description = "Clicking the Theme control recolors every surface, border, and accent with a brief color transition and without a page reload"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.13"
name = "reduced_motion_disables_animation"
description = "On a fresh load with prefers-reduced-motion set, animations are removed and state changes (adding rows, toggling the chevron, toasts) apply instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "search_dimming_applies_immediately"
description = "As a search query is typed, matching-text highlighting and reduced-opacity dimming of non-matching branches apply immediately with each change to the query, and dimmed branches remain on the page rather than disappearing"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteraction behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
