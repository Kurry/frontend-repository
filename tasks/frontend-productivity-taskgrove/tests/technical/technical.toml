[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "persistence_round_trip_full_state"
description = "After building a tree with status and priority, tagging a node, collapsing a node, archiving a fully-complete branch, and switching theme, a full page refresh restores the tree, tags, status and priority, collapsed state, archived branch, and theme exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "console_clean_during_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear during initial load or a full exercise of the app: creating, nesting, editing status or priority, toggling, tagging, filtering, searching, zooming, moving, archiving, restoring, exporting as text, exporting or importing Grove JSON or CSV, and theme switching"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "A full page reload re-renders cleanly with no error overlay, blank layout, or visible error flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "No failed same-origin network requests occur during page load or the core workflow"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "Adding a child task 25 times in rapid succession through the normal Add Child control ends with an exact final child count and no blank screen, freeze, or uncaught error"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "2_6"
description = "The tree, tags, collapsed state, archive contents, or chosen theme reset to a default or are lost after a full page refresh"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "A hidden DOM element, attribute, or window global exposes internal ground-truth state that a real user could not reach through normal visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "A workflow shows a success or completion state (toast, checkmark, updated ring) without the underlying action actually taking effect or surviving a reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "2_9"
description = "The app renders or behaves differently depending on whether it is driven by automation (navigator.webdriver or similar signals)"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "2.10"
name = "keyboard_only_operability"
description = "Every interactive control (inputs, buttons, checkboxes, chevrons, tag chips, breadcrumb segments) is reachable and operable with the keyboard alone, with a visible focus indicator on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "move_picker_focus_trap_and_escape"
description = "The Move To picker traps keyboard focus while open, closes on Escape, and returns focus to the control that opened it; the Tag manager panel is likewise fully keyboard-operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "toast_announced_via_aria_live"
description = "Toast confirmations are exposed through an aria-live polite region in the DOM in addition to being shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "readable_contrast_in_all_themes"
description = "Text and interactive controls keep readable contrast against their background in each of the Light, Dark, and Forest themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "cold_load_interactive_within_2s"
description = "On a local cold load, the app renders and becomes interactive within 2 seconds"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.15"
name = "rapid_leaf_toggle_stays_consistent"
description = "Rapidly toggling several leaf checkboxes in succession keeps the UI responsive, and the progress rings and parent completion end consistent with the final toggle state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "external_network_requests_made"
description = "The app issues network requests to external origins (CDN scripts, fonts, icons, or APIs) during load or while exercising its features"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.17"
name = "forms_enforce_task_and_tag_field_contracts"
description = "New root task, Add Child, Edit task, and Tag manager forms enforce the declared field contracts in the UI: blank or over-120-character titles are rejected naming title; status outside todo|in_progress|done|blocked or priority outside low|medium|high|urgent is rejected naming that field; dueDate not empty and not YYYY-MM-DD is rejected naming dueDate; blank, over-40-character, or duplicate tag names are rejected naming name; a color outside the closed hex enum is rejected naming color; submit stays inactive until valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "import_accepts_schema_invalid_grove_package"
description = "Import grove accepts a parseable JSON or CSV document that violates the Grove package field contract (wrong schemaVersion, theme outside light|dark|forest, status or priority outside closed enums, tag color outside the closed hex enum, or a node tags array longer than 5) and still mutates the tree, tags, archive, or theme"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.19"
name = "grove_json_nested_contract_and_invariants"
description = "Grove JSON has numeric schemaVersion 1, exportedAt as an ISO-8601 datetime ending in Z, theme light/dark/forest, tags containing non-empty ids plus unique case-insensitive 1–40 character names and closed-enum colors, and tree-ordered tasks plus archive; every nested task has non-empty id, valid title/status/priority/dueDate, null-or-existing parentId expressed consistently by children nesting, 0–5 unique existing tag names, boolean completed and collapsed, and children, with leaf completed equivalent to status done and parent completed derived from descendant leaves"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "grove_csv_complete_depth_first_contract"
description = "Grove CSV uses the exact header id,title,status,priority,dueDate,parentId,completed,collapsed,tags,archived and one depth-first row per task across the main tree and archive; roots have empty parentId, children reference a present parent id, completed/collapsed are true or false, tags are pipe-delimited existing tag names with at most five entries, and archived is true exactly for archived-branch rows and false otherwise, with all task fields matching Grove JSON"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, state coherence, persistence behavior, stability) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
