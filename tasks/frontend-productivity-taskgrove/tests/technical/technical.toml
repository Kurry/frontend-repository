[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "After building a tree, tagging a node, collapsing a node, archiving a fully-complete branch, and switching theme, a full page refresh restores the tree, tags, collapsed state, archived branch, and theme exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "No uncaught JavaScript errors or unhandled promise rejections appear in the console during initial load or while exercising the core workflow (create, nest, toggle, zoom, archive)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "A full page reload re-renders cleanly with no error overlay, blank layout, or visible error flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "No failed same-origin network requests occur during page load or the core workflow"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "Adding a child task 25 times in rapid succession through the normal Add Child control ends with an exact final child count and no blank screen, freeze, or uncaught error"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "2_6"
description = "The tree, tags, collapsed state, archive contents, or chosen theme reset to a default or are lost after a full page refresh"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "A hidden DOM element, attribute, or window global exposes internal ground-truth state that a real user could not reach through normal visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "A workflow shows a success or completion state (toast, checkmark, updated ring) without the underlying action actually taking effect or surviving a reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "2_9"
description = "The app renders or behaves differently depending on whether it is driven by automation (navigator.webdriver or similar signals)"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "2.10"
name = "keyboard_only_operability"
description = "Every interactive control (inputs, buttons, checkboxes, chevrons, tag chips, breadcrumb segments) is reachable and operable with the keyboard alone, with a visible focus indicator on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "move_picker_focus_trap_and_escape"
description = "The Move To picker traps keyboard focus while open, closes on Escape, and returns focus to the control that opened it; the Tag manager panel is likewise fully keyboard-operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "toast_announced_via_aria_live"
description = "Toast confirmations are exposed through an aria-live polite region in the DOM in addition to being shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "readable_contrast_in_all_themes"
description = "Text and interactive controls keep readable contrast against their background in each of the Light, Dark, and Forest themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "cold_load_interactive_within_2s"
description = "On a local cold load, the app renders and becomes interactive within 2 seconds"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.15"
name = "rapid_leaf_toggle_stays_consistent"
description = "Rapidly toggling several leaf checkboxes in succession keeps the UI responsive, and the progress rings and parent completion end consistent with the final toggle state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "external_network_requests_made"
description = "The app issues network requests to external origins (CDN scripts, fonts, icons, or APIs) during load or while exercising its features"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, state coherence, persistence behavior, stability) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
