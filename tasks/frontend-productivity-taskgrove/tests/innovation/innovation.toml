[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "command_palette_bonus"
description = "Optional: a command palette jumps to Export grove, Import grove, Tag manager, or theme beyond the required controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "richer_grove_diff_preview"
description = "Optional: Import grove shows a diff preview of incoming tasks before commit"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "first_run_coachmarks"
description = "Optional: coachmarks guide the first root create or first Grove export while staying on-brand"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_progress_visualization"
description = "Optional: progress visualization beyond the required ring while remaining readable"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_chord_hints"
description = "Optional: keyboard chord hints surface export, import, or theme shortcuts"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "tag_usage_insights"
description = "Optional: tag usage insights beyond the required filter chips"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_empty_illustration"
description = "Optional: polished empty-state illustration work that stays on-brand with TaskGrove"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "print_friendly_outline"
description = "Optional: a print-friendly outline layout beyond Export as Text and Grove CSV"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "bulk_status_macros"
description = "Optional: bulk status or priority macros beyond single-node Edit task"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_polish"
description = "Optional: competition-level interaction polish visibly beyond the specification"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_blocks_required_flows"
description = "A bonus enhancement blocks or breaks a required create, Export grove, or Import grove flow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
