[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "Multi-facet round-trip: create a root with a child, attach a tag, collapse a node, archive a fully-complete sibling branch, switch theme to Forest, then reload; the tree structure, tag chips, collapsed state, Archive panel entry, and Forest theme all survive together — never a mix of preserved and lost facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sibling_reorder_proves_live_tree"
description = "Sibling-order proof: with three siblings, Move Down on the first then Move Up on the new second; the order changes relative to the starting order and stays stable across re-renders, proving reorder is derived from live tree data."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "progress_ring_tracks_leaf_toggles"
description = "Derived-view sensitivity: with a parent of four leaves, toggle leaves complete one by one and confirm the progress ring fill changes at each step rather than staying identical regardless of completion count."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "tag_echo_across_manager_row_and_export"
description = "Cross-view echo: create a tag and attach it to a node; confirm the same name and color appear on the node row, in the Tag manager list, on the toolbar filter chip, and in the Grove JSON tags array without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "root_create_count_delta_is_exact"
description = "Count-delta integrity: measure visible root-task count immediately before and after submitting a valid New root task; the count increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_titles_change_export_json"
description = "Input-dependent output: create two roots with different titles and distinct status or priority values and confirm both Grove JSON and Grove CSV previews contain both distinct titles and their status/priority values rather than identical payloads"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_zoom_and_tag_flows"
description = "Interleaved-flow integrity: start Add Child on a zoomed node, open Tag manager and create a tag, return and finish the child create; confirm the new child remains under the zoomed node and the new tag exists without corrupting either flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_export_tracks"
description = "Edge-state round-trip: from a populated tree, archive or remove until the main tree is empty and the empty-state message returns, then create a new root; the empty-state disappears and both Grove JSON tasks array and Grove CSV rows track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "grove_export_import_preserves_session"
description = "Mutate → export → import: create a root with one child, set status and priority, create and attach one tag, switch theme away from Light; confirm Grove JSON shows schemaVersion 1, theme, tag name/color, titles, status, and priority, and Grove CSV shows the same title/status/priority; Download or Copy JSON; mutate away; Import that JSON; confirm tree, tags, theme, and both export previews match the pre-export session."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "schema_invalid_import_leaves_state"
description = "Starting from a known tree and theme, attempt Import of parseable JSON with theme outside light|dark|forest, status outside its closed enum, or a tag color outside the closed hex enum; confirm tree titles, tag chips, archive, and theme stay unchanged and validation names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, the tree structure survives but tags, collapsed state, archive, or theme silently reverts, producing incoherent partial persistence."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "progress_ring_ignores_leaf_toggles"
description = "A parent's progress ring renders identically regardless of how many descendant leaves are complete."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_titles_produce_identical_export"
description = "Creating roots with different titles and status values yields Grove JSON or Grove CSV that is identical aside from incidental whitespace"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "tag_or_export_state_is_stale"
description = "A newly created tag or task title appears on the node row but not in the Tag manager, toolbar filter row, or Grove JSON/CSV previews until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "schema_invalid_import_mutates_session"
description = "Importing Grove JSON or Grove CSV that fails the field contract still mutates the tree, tags, archive, or theme"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.11"
name = "grove_csv_round_trip_preserves_fields"
description = "After creating tasks with status, priority, and dueDate, Download or Copy Grove CSV, diverge the session, Import that CSV, and confirm titles, status, priority, dueDate, and tree parent relationships match the pre-export session"
type = "binary"
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
