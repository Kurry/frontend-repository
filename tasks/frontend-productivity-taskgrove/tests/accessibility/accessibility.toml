[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Tree controls, chevrons, tag chips, breadcrumbs, Tag manager, Move To, Export grove, Import grove, Download grove package, Copy grove package, Grove JSON/CSV tabs, and footer create/edit forms are keyboard accessible with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "dialogs_manage_focus"
description = "Tag manager panel, Move To picker, and Grove package panel trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only chevron, zoom, move, archive, export, and theme controls expose accessible names describing their action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_toasts_use_live_regions"
description = "TaskUpsert and TagUpsert inline validation, Import grove validation, and toast confirmations are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "New root task, Add Child, Edit task, Tag manager, and Import grove fields use visible labels or accessible names associated with the controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "TaskGrove app name and secondary headings (Archive, Tag manager, Grove package, Move dialog) follow a logical order without skips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_regions_present"
description = "The shell exposes landmark regions so the toolbar, main tree, and Archive panel are distinguishable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Primary ink on the page canvas and #00BC7D primary controls keep readable contrast in Light, Dark, and Forest themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_used"
description = "Interactive controls use button/input semantics rather than clickable bare divs for Add Child, Export grove, Import grove, and Archive"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, row, chevron, toast, shake, theme, and Grove package panel animations are removed while features remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Grove JSON/CSV tabs, Export grove, or tree chevrons cannot be reached via keyboard"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured on toolbar or tree controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom tree or Grove package controls use non-semantic tags and lack ARIA roles or labels"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Completion, status, or validation state is conveyed by color alone with no text or icon cue"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "While the Move To picker or Grove package panel is open, keyboard focus escapes to background controls behind the dialog"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Task titles or status chips are unreadable due to poor contrast in any theme"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Title, status, priority, or Import field-contract failures are visual only and not screen-reader accessible"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Icon-only controls lack accessible names"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings jump from the app name to a much deeper level with no logical intermediate heading"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Row, toast, or Grove package animations ignore prefers-reduced-motion"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
