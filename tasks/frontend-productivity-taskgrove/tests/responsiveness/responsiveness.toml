[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "no_horizontal_scroll_375"
description = "At approximately 375px wide there is no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "archive_stacks_below_tree"
description = "At ~375px the Archive panel stacks below the task tree instead of sitting beside it; at desktop widths they sit side by side"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "app_name_scales_down"
description = "At ~375px the app-name heading scales down rather than overflowing the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "toolbar_and_grove_usable_narrow"
description = "At ~375px toolbar controls including Export grove wrap onto additional rows, and Grove package tabs plus Download, Copy, and Import stay fully visible and operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nested_titles_wrap_or_truncate"
description = "Deeply nested rows truncate or wrap their title text rather than forcing the page wider at narrow and desktop widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "desktop_side_by_side_layout"
description = "At desktop widths the task tree and Archive panel sit side by side with both panels usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_targets_usable"
description = "Primary tree and toolbar controls remain tappable without overlapping neighbors at ~375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "Small screens have no horizontal scrolling across tree, toolbar, and Grove package panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "grove_preview_scrolls_locally"
description = "The Grove package monospaced preview scrolls inside its panel rather than expanding the page width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "footer_create_form_remains_accessible"
description = "The New root task form in the footer remains reachable and usable at ~375px and desktop widths"
type = "binary"
weight = 1.0

