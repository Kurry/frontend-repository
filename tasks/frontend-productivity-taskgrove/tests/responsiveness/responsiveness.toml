[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "no_horizontal_scroll_375"
description = "At approximately 375px wide there is no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "archive_stacks_below_tree"
description = "At ~375px the Archive panel stacks below the task tree instead of sitting beside it; at desktop widths they sit side by side"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "app_name_scales_down"
description = "At ~375px the app-name heading scales down rather than overflowing the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "toolbar_and_grove_usable_narrow"
description = "At ~375px toolbar controls including Export grove wrap onto additional rows, and Grove package tabs plus Download, Copy, and Import stay fully visible and operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nested_titles_wrap_or_truncate"
description = "Deeply nested rows truncate or wrap their title text rather than forcing the page wider at narrow and desktop widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "desktop_side_by_side_layout"
description = "At desktop widths the task tree and Archive panel sit side by side with both panels usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_targets_usable"
description = "Primary tree and toolbar controls remain tappable without overlapping neighbors at ~375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "Small screens have no horizontal scrolling across tree, toolbar, and Grove package panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "grove_preview_scrolls_locally"
description = "The Grove package monospaced preview scrolls inside its panel rather than expanding the page width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "footer_create_form_remains_accessible"
description = "The New root task form in the footer remains reachable and usable at ~375px and desktop widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "page_scrolls_horizontally_375"
description = "At ~375px the page scrolls horizontally"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Export grove, Import grove, or tree action controls are too small or misaligned on mobile"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n3"
name = "app_name_overflows"
description = "The app-name heading overflows or clips at ~375px"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Tree titles or Grove package controls are cropped or force unnecessary page scrollbars"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n5"
name = "archive_layout_breaks_by_width"
description = "The Archive panel is missing, overlapping, or stuck beside the tree at narrow width"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed toolbar or footer positions obscure task rows or Grove package controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Toolbar chips, Export grove, or tree controls overlap at some viewport size"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n8"
name = "grove_controls_disappear_narrow"
description = "Download grove package, Copy grove package, or Import grove disappear at narrow width"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n9"
name = "nested_title_forces_page_wider"
description = "A deeply nested title forces page-level horizontal overflow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Theme, Tag manager, or Export grove controls disappear at specific sizes"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
