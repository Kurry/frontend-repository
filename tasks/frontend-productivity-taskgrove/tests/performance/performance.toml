[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load"
description = "No console errors or warnings appear on initial load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during create, edit status/priority, nest, toggle, tag, filter, search, zoom, move, archive, restore, Export as Text, Export grove, Import grove, and theme exercise"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_leaf_toggle_stays_responsive"
description = "Rapidly toggling several leaf checkboxes keeps the UI responsive with progress rings consistent with the final state"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "export_import_non_blocking"
description = "Opening Export grove or Import grove and copying or downloading Grove JSON or Grove CSV does not freeze the tree or drop interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during create, edit, archive, and import state changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "tree_animations_stay_smooth"
description = "Row add/remove/reorder and progress-ring animations stay smooth without multi-second stalls during normal tree use"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid typing in Smart Search or repeated theme toggles does not hang or freeze the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session of creating, nesting, and exporting shows no runaway memory growth that freezes the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "deep_tree_remains_usable"
description = "A multi-level nested tree remains scrollable and interactive without multi-second freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "long_blank_or_spinner"
description = "Cold load stays blank or blocked by a spinner past 2 seconds"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during create, export, or import flows"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n3"
name = "export_panel_blocks_or_lags"
description = "Opening the Grove package panel or switching Grove JSON/CSV tabs blocks or lags the UI for seconds"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n4"
name = "import_hangs_ui"
description = "Import grove causes the UI to hang or freeze"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n5"
name = "deep_tree_kills_frame_rate"
description = "A moderately nested tree kills interactivity or frame rate"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during row or toast animation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n7"
name = "theme_switch_blocks_rendering"
description = "Theme switching blocks rendering for a prolonged period"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory leaks or runaway browser resource usage occur during extended tree editing"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n9"
name = "export_preview_blank_while_computing"
description = "Grove JSON or Grove CSV preview stays blank with no feedback while recomputing after a mutation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid toggle, export, or import use"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
