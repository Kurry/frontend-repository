[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_tree_and_archive_messages"
description = "On first load with no data, the tree area shows an empty-state message inviting the first root task, and the Archive panel shows a short explanatory message instead of a blank area."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "blank_title_inline_field_contract"
description = "Submitting New root task or Add Child with a blank or whitespace-only title shows an inline error naming the title field before submit and adds no task."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_errors_name_offending_field"
description = "Task title and tag name/color validation errors name the offending field (title, name, or color) and the fix rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "durable_actions_show_toast"
description = "Adding a task or child, archiving, restoring, Move To, and importing a grove package each show a transient confirmation toast."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "overlength_title_rejected"
description = "A title longer than 120 characters is rejected with an inline error naming the title field and adds no task."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "tag_duplicate_and_invalid_color_rejected"
description = "Submitting a tag with a duplicate name (case-insensitive) is rejected naming the name field; a color outside the closed hex enum is rejected naming the color field; no invalid tag is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "sixth_tag_attachment_blocked"
description = "Attempting to attach a 6th tag to a node that already has 5 is blocked and the node still shows exactly 5 chips."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "incomplete_branch_hides_archive"
description = "A node whose branch is not fully complete does not show an Archive control."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "move_picker_escape_closes"
description = "The Move To picker closes on Escape and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_submit_single_task"
description = "Double-activating a task submit control creates exactly one task: exactly one new node appears in the tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "malformed_grove_import_rejected"
description = "Importing malformed Grove package JSON leaves the tree, tags, archive, and theme unchanged and shows visible validation naming the import problem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "schema_invalid_grove_import_rejected"
description = "Importing parseable JSON that fails the Grove package field contract — wrong schemaVersion, theme outside light|dark|forest, tag color outside the closed hex enum, blank title, or node tags longer than 5 — leaves the session unchanged and shows validation naming the offending field or rule."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_tree_has_no_feedback"
description = "An empty tree or empty Archive panel shows nothing and provides no UI feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Title, tag, or import field-contract failures are surfaced only in the browser console."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Adding a task, archiving, or importing a grove package lacks visible feedback and silently succeeds or fails."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "parent_completes_with_incomplete_leaf"
description = "A parent can be manually marked complete while an incomplete descendant leaf remains."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap interactive elements such as New root task, Add Child, or tag submit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "move_picker_not_keyboard_dismissible"
description = "The Move To picker cannot be dismissed via Escape."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Blank title or blank tag name validation feedback is missing or delayed with no UI indication naming the field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Primary action buttons use ambiguous or missing labels instead of specific verbs such as Add Child or Export grove."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "schema_invalid_import_mutates_session"
description = "Importing JSON that fails the Grove package field contract still mutates the tree, tags, archive, or theme."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "malformed_import_mutates_session"
description = "Importing malformed Grove package JSON still mutates the tree, tags, archive, or theme."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
