[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with no data, the tree area shows an empty-state message inviting the user to add the first root task, and the Archive panel shows its own short empty message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After creating a root task and using Add Child twice (child, then grandchild), the tree renders three visibly nested, indented levels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After collapsing a node with children via its chevron and refreshing the page, the node is still shown collapsed and its subtree stays hidden"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "When a parent has two leaf children and only one is toggled complete, the parent is not marked complete and its own completion cannot be manually toggled; toggling the second leaf complete auto-completes the parent with no manual action on it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After toggling half of a 4-leaf parent's children complete, its progress ring visibly fills to about half, and reaches a distinct complete (100%) treatment only once every leaf is done"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After creating a tag with a distinct color and attaching it to a node, the node's row shows a chip in that exact color; attaching a 6th tag to a node that already has 5 is blocked and the node still shows exactly 5 chips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "When a tag filter chip is toggled on, the visible tree narrows to only branches containing a match with ancestors auto-expanded, and toggling it off restores the full tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When Smart Search matches one node, that node is highlighted with its ancestor chain auto-expanded while non-matching branches are visibly dimmed but remain present, and clearing the query returns full visibility"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "zoom_breadcrumb_and_unzoom"
description = "After using Zoom In on a non-root node, everything outside its branch is hidden and a breadcrumb trail shows every ancestor down to the true root; clicking an ancestor segment zooms back to exactly that level, and clicking the trailing unzoom control returns the view to the true root"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After using Move To on a child of one root task to re-parent it under a second root task, it renders nested under the second root with its own children and tags intact, and no longer appears under the first root"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "A branch with an incomplete leaf shows no Archive control; once every leaf under it is completed, Archive appears; using it moves the branch to the Archive panel, and Restore there returns it to the main tree as a top-level root with its structure intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After building a tree, collapsing a node, attaching a tag, archiving a fully-complete branch, and switching the theme to Forest, refreshing the page restores the tree structure, the tag, the collapsed state, the archived branch (still in the Archive panel, not the main tree), and the Forest theme, all exactly as they were"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "blank_title_rejected_root_and_child"
description = "Submitting New root task or Add Child with a blank or whitespace-only title is rejected with a visible inline error naming the title field and adds no task"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "export_as_text_indented_outline"
description = "Export as Text downloads that node's branch as an indented plain-text outline, one line per node with deeper children indented further"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "parent_manual_complete_while_incomplete_leaf"
description = "A parent's completion checkbox can be manually toggled complete while it still has an incomplete descendant leaf"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "archive_shown_on_incomplete_branch"
description = "An Archive control appears on a branch that still has an incomplete descendant leaf"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "create_children_complete_chain_flow"
description = "Starting from an empty tree: create a root via the footer form with a valid title, status, priority, and optional dueDate; confirm exactly one new tree appears, the empty-state disappears, a toast shows, and both Export grove JSON and CSV previews include that title, status, and priority; add two children via Add Child and confirm both render indented with a 0 percent progress ring on the parent; toggle both children complete and confirm the ring reaches the 100 percent checkmark, the parent completes automatically, each leaf status becomes done, and both export previews update, all without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "archive_refresh_restore_chain_flow"
description = "With a branch fully complete: activate Archive and confirm the branch leaves the main tree, exactly one entry titled by its root appears in the Archive panel, and a toast shows; after a full page refresh the branch is still in the Archive panel and still absent from the main tree; activate Restore and confirm the branch returns to the main tree as a top-level root with its structure and tags intact while the Archive panel loses that entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "tag_lifecycle_filter_refresh_chain_flow"
description = "Create a tag in the Tag manager with a valid name and a closed-enum hex color and confirm chips appear in the manager and toolbar; attach it to a node; toggle the toolbar filter on then off; after refresh the tag still exists with the same color; both Export grove JSON and CSV previews include that tag name (JSON also shows the closed-enum color)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "zoomed_add_child_roundtrip_flow"
description = "Zoom into a grandchild node and confirm only that node's branch is visible with a breadcrumb naming each ancestor down to the true root; add a child while zoomed and confirm the new node appears inside the zoomed view; zoom back out via the breadcrumb and confirm the same new node is present in the full tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "move_up_down_swap_and_boundary_noop"
description = "Move Down on the first of three siblings swaps it with the next sibling and the new order stays stable across re-renders; Move Up on a first sibling and Move Down on a last sibling do nothing, with no error and no reorder"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "tag_manager_field_contract_validation"
description = "In the Tag manager create form, a blank or over-40-character tag name shows an inline error naming name, a duplicate name is rejected naming name, a color outside the closed hex enum is rejected naming color, submit stays inactive until valid per the TagUpsert field contract, and no invalid tag is added"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "double_submit_creates_single_task"
description = "Double-activating a task submit control in quick succession creates exactly one task: exactly one new node appears in the tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "theme_control_cycles_three_themes"
description = "Clicking the toolbar Theme control cycles through Light, Dark, and Forest, each click swapping the app's full color palette instantly with no page reload and the app staying fully readable in each theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "filter_search_no_results_messages"
description = "When active tag filters match no branch, the tree area shows an explicit no-results message instead of a blank area; a search query matching nothing also shows an explicit no-results message while branches stay dimmed on the page rather than removed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "grove_json_api_shaped_field_contract"
description = "After creating a task with status, priority, and optional dueDate, creating a tag, and switching theme, the Grove JSON preview is a single object whose visible text includes schemaVersion exactly 1, exportedAt ending in Z, theme exactly light|dark|forest, an archive array key, a tags entry with name and closed-enum hex color, and a tasks entry with title, status, priority, dueDate, completed, collapsed, tags, and children"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "grove_export_import_round_trip"
description = "After mutating tasks (including status or priority), a tag, archive, and theme, Download or Copy Grove JSON then Import that document and confirm main tree titles, status/priority, Tag manager chip, Archive panel, theme, and both Grove JSON and CSV previews match the pre-export session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "task_create_overlength_title_rejected"
description = "Submitting New root task or Add Child with a title longer than 120 characters is rejected with an inline error naming the title field and adds no task"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "export_omits_session_mutations"
description = "After creating a task with a distinctive title and status, creating a tag, and changing theme, the Grove JSON preview omits the new task title or status, the new tag name or color, or the chosen theme"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.41"
name = "grove_csv_mirrors_task_upsert_fields"
description = "After creating a root with title, status, priority, and a YYYY-MM-DD dueDate, the Grove CSV preview shows a header row exactly id,title,status,priority,dueDate,parentId,completed,collapsed,tags,archived and a data row carrying that title, status, priority, and dueDate"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "edit_task_status_priority_due_date"
description = "Using Edit task to set status to blocked, priority to urgent, and dueDate to a YYYY-MM-DD value updates the node row immediately and appears under the same keys in both Grove JSON and Grove CSV previews without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "invalid_status_priority_due_date_rejected"
description = "Submitting New root task, Add Child, or Edit task with status outside todo|in_progress|done|blocked, priority outside low|medium|high|urgent, or dueDate not empty and not YYYY-MM-DD shows an inline error naming the offending field and saves nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core feature behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
