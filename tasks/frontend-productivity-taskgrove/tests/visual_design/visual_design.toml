[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The app's main h1 heading computes to the ui-sans-serif/system-ui fallback stack at 96px, and an h2 heading computes to 48px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Ordinary body text, such as a task title, computes to the Arial fallback stack at 10px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "In the Light theme, the page background, primary text, and accent colors compute to #FFFFFF, #0F172B, and #00BC7D respectively"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "New Root Task, Add Child, and Export as Text render with a #00BC7D background, white text, 16px border radius, and a visible soft elevated shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Move Up, Move Down, Move To, and Archive render with a white background, #0F172B text, a visible #E2E8F0 border, 16px border radius, and no drop shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "Task-row panels render with sharp 0px corners and consistent spacing following an 8px-based rhythm"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The same tag's color chip renders identically on a node row, in the toolbar's tag filter bar, and in the Tag manager"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "3_8"
description = "At approximately 375px wide, the app shows no horizontal scrolling and no row or control overlaps or clips"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "3_10"
description = "Task-row panels or the primary/secondary buttons render with rounded corners instead of the specified sharp-cornered and 16px-radius button treatments"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.11"
name = "3_11"
description = "Button labels are long descriptive phrases or ALL CAPS instead of the short verb-led labels named in the spec (New Root Task, Add Child, Move Up, and so on)"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.12"
name = "layout_regions_match_spec"
description = "The app opens into a header with the app name and a one-line description, a toolbar holding search, tag filter chips, a Tag manager toggle, Export grove, Import grove, and a Theme control, a main area with the task tree on the left and the Archive panel on the right, and a footer holding the New root task input"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "dark_forest_themes_consistent_palettes"
description = "Switching to the Dark theme and then the Forest theme each swaps every surface, text, and accent color to its own consistent, readable palette while keeping the same recognizable green accent hue"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "single_consistent_icon_set"
description = "Chevron, zoom, move, archive, export, import, and theme controls all draw from one visually consistent icon set, with no two controls of the same kind using mismatched glyph styles"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "indent_alignment_with_chevron_slot"
description = "Deeper tree levels are visibly indented beneath their parent, and leaf rows reserve a chevron slot so title columns stay aligned across rows with and without children"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "narrow_viewport_stacking_and_wrapping"
description = "At approximately 375px wide, the Archive panel stacks below the task tree (while on desktop widths they sit side by side), toolbar controls including Export grove and Import grove wrap onto additional rows rather than clipping, and the app-name heading scales down rather than overflowing the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "consistent_capitalization_and_verb_labels"
description = "Headings, buttons, and control labels use one consistent capitalization convention throughout, and action labels are specific verbs (Add Child, Move To, Export as Text, Export grove, Import grove) rather than generic labels where a specific one is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.18"
name = "actionable_error_and_empty_copy"
description = "Validation and error messages name the problem and the fix including which field failed the field contract, and each empty state (empty tree, empty Archive panel, no filter or search matches) explains what belongs there and how to fill it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.19"
name = "placeholder_text_visible_in_ui"
description = "Lorem-ipsum, 'TODO', template-variable, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.20"
name = "muted_secondary_subtitle_color"
description = "In the Light theme, the header's one-line app description renders in the muted #62748E secondary tone, visibly distinct from the #0F172B primary ink used for body text"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.21"
name = "grove_package_panel_monospace_preview"
description = "The Grove package panel shows a scrollable monospaced JSON preview with Download grove package and Copy grove package controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
