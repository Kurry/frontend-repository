[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_root_appears_in_tree_and_export"
description = "Create flow: submitting a valid New root task with title, status, priority, and optional dueDate adds exactly one root to the main tree, clears the empty-state message, shows a toast, and includes that title, status, priority, and dueDate in both Grove JSON and Grove CSV previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: blank title on New root task or Add Child, invalid status or priority, or blank/duplicate tag name, triggers immediate inline validation naming the offending field and adds nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "add_child_updates_ring_and_export"
description = "Nesting flow: adding two children under a root shows both indented, grows a 0 percent progress ring on the parent, and lists both child titles with their status and priority under that parent in Grove JSON and as CSV rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "archive_restore_updates_all_surfaces"
description = "Archive flow: archiving a fully-complete branch removes it from the main tree and adds it to the Archive panel; Restore returns it as a top-level root with structure and tags intact and removes the archive entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "zoom_retains_branch_state"
description = "Zoom flow: Zoom In hides everything outside the branch and shows breadcrumbs; adding a child while zoomed keeps the new node after zooming back out via breadcrumb."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_tree_message_after_clear"
description = "Edge: when the main tree has no roots, the empty-state message inviting the first root task is clear and visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "tag_filter_updates_tree_everywhere"
description = "Filter flow: toggling a toolbar tag filter chip narrows the tree to matching branches with ancestors auto-expanded, and toggling it off restores the full tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "tag_manager_panel_preserves_workflow"
description = "Tag manager panel can be opened and closed while the tree, filters, and both Export grove previews remain coherent with the same tag list"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "move_to_picker_and_grove_panel_flows"
description = "Move To picker and Grove package panel open, complete their action (reparent or Download/Copy/Import for JSON or CSV), and dismiss without trapping the user"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "grove_import_recovers_session_without_reload"
description = "Recovery: after mutating away from an exported grove, Import of that Grove JSON or Grove CSV restores tree, tags, status/priority labels, theme, and both Export grove previews without requiring a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "New root task, Add Child, Edit task, Tag manager create, Export grove, or Import grove are not enabled from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "A valid created task or tag fails to show up in the tree/Tag manager or appears duplicated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A tag or task title appears in the tree but not in the Export grove JSON, or the reverse, without reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "zoom_breaks_or_loses_branch"
description = "Zoom In breaks layout or loses the zoomed branch's children after zooming back out."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_tree_breaks_ui"
description = "An empty main tree produces broken or missing UI instead of the empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Tag-filtered tree visibility disagrees with which nodes actually carry the active tag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "tag_manager_cannot_reopen"
description = "After closing the Tag manager panel it cannot be re-opened."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Move To picker or Grove package panel blocks navigation with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed create or Import grove provides no user feedback naming the problem."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Zoom, Move To, or Grove package panel leaves a dead end that requires reload for recovery."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "edit_task_updates_row_and_exports"
description = "Edit flow: changing a task status to blocked, priority to urgent, and dueDate to YYYY-MM-DD updates the node row and both Grove export previews without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
