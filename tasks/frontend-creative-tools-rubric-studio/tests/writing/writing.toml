[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_studio_labels"
description = "Where the app renders headings and section titles (rubric name, Tune, Export, Import, Rationale notes, history summaries), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as Add criterion, Export, Import, Undo, Redo, and Copy rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders criterion-form, version-bump, or import validation messages, they name the field or violation kind (name, description, id, schemaVersion, library, minor bump required, major bump required) and the fix, not only a bare rejection like Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states for an empty criteria list, empty Tune case set, or empty preview panel, the copy explains what belongs there and how to add or include content."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "studio_copy_is_well_written"
description = "Where the app renders body copy (criterion descriptions, Rationale notes, history summaries, empty-state text), rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (criterion vs criteria, must have vs nice to have, weighted mean / required-pass / all-pass), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "version_and_metric_formatting_consistent"
description = "Where the app renders semantic versions, weights, and Tune precision/recall/F1 numbers, formatting is consistent across the rail badge, header, history entries, and bars (same decimal style and version shape)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders confirmation feedback after save, delete, or copy, the copy states what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

