[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable rubric studio: rail (or its toggle), header card, and criteria/Tune/preview canvas remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, rail toggle, accordion headers, Add criterion, verdict toggles, case include toggles, history entries, Undo, Redo, Export, Import, and copy present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Rubric name, section headings, criterion names, and metadata remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no content clips or overflows the viewport; the Tune bars and diff view reflow to stacked layouts and Export center code blocks scroll within their own containers; Undo, Redo, Export, and Import remain fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "rail_collapses_at_1024"
description = "At widths of 1024px and below the left rail collapses behind a toggle control that opens it as an overlay; at desktop widths the rail is open by default."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At 375px width, header card, criteria/Tune/preview content, and history reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At 375px width, tap/click activation works on the rail toggle, rail entries (when overlay open), accordion headers, case toggles, verdict toggles, and Export."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce page-level horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "tune_bars_and_code_block_reflow"
description = "At 375px width, Tune precision/recall/F1 bars and the export monospaced code block size responsively — bars stack or shrink to fit, and the code block scrolls inside its container rather than forcing page overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_chrome_remains_accessible"
description = "Fixed or sticky studio chrome (rail toggle, header actions, Export) remains reachable at 375px and does not permanently obscure the criteria list or form dialogs."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "At 1024px or 375px the studio layout breaks or overflows so rail, header, or canvas become unusable."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px width, primary controls are too small to tap reliably or misaligned into overlapping hit targets."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n3"
name = "text_too_small_on_mobile"
description = "At 375px width, rubric name, criterion names, or validation copy become too small to read."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px width, criteria rows, Tune bars, or the diff view are cropped, or unnecessary page-level scrollbars appear while content is clipped."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n5"
name = "rail_missing_or_stuck_closed"
description = "At 1024px or below the left rail has no working toggle, or the rail overlay is missing so seeded rubrics cannot be opened."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_content"
description = "Fixed positions for the rail toggle, header, or Export permanently obscure accordion rows or the criterion form at 375px."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_narrow_width"
description = "At 375px width, stacking causes header, history, or Tune bars to overlap into an unreadable pile."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n8"
name = "rail_toggle_untappable_on_mobile"
description = "At 375px width the rail toggle or overlay entries cannot be activated by tap/click."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n9"
name = "tune_or_export_overflows_viewport"
description = "At 375px width, Tune bars or the export code block use a static width that overflows the viewport instead of reflowing or scrolling in-container."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Add criterion, Export, Import, Undo, Redo, aggregation selects, or rail toggle disappear at 1024px or 375px widths."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
