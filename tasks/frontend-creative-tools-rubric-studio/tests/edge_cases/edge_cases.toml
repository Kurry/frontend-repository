[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_criteria_tune_preview_states"
description = "After deleting all criteria from a rubric (each with its major bump), the criteria list shows an empty state naming what belongs there and offering Add criterion, and the Tune view and preview panel show their own empty states instead of broken bars."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "empty_name_description_inline_before_submit"
description = "Submitting the criterion form with an empty name or description, an id that violates the allowed pattern, a weight outside 0.5-5, or an importance outside must-have|nice-to-have shows inline messages naming those fields before a successful add, and no criterion is added — the criteria count is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_not_bare_invalid"
description = "Criterion-form, version-bump, and import validation copy names the offending field or violation kind (for example name, description, id, schemaVersion, library, minor bump required, major bump required) rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "save_delete_copy_show_confirmation"
description = "After a successful version-gated save, a confirmed delete save, or activating Export copy, a confirmation toast or visible confirmation appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "pending_bump_feedback_before_save"
description = "When a pending edit requires a minor or major bump, the save control stays disabled and an inline explanation of the required bump kind is visible before any save attempt."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "delete_asks_confirmation_cancel_safe"
description = "Deleting a criterion asks for confirmation; choosing Cancel on the confirmation or Cancel on a pending version bump leaves the rubric, its version, and its history unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "version_gate_explains_required_bump"
description = "Editing description/type shows an inline explanation that a minor bump is required, and deleting shows an inline explanation that a major bump is required — so the version gate is guided in-app."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "studio_controls_use_semantic_tags"
description = "Rail entries, header selects, accordion headers, Add criterion, verdict toggles, case include toggles, history entries, and copy use semantic button/input/label elements or equivalent accessible roles rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "criterion_form_close_paths"
description = "The criterion form dialog closes via Cancel and Escape, returning to the canvas without applying changes or requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "exclude_all_cases_shows_tune_empty_state"
description = "Excluding every labelled case in the Tune view shows an empty state in place of the bars rather than NaN, Infinity, or zero-division artifacts, and the summary strip reflects zero included cases."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_criteria_shows_nothing"
description = "After the criteria collection is empty, the criteria list shows nothing — no empty-state copy and no Add criterion affordance."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n2"
name = "validation_errors_only_in_console"
description = "Invalid criterion submissions or wrong version bumps surface only in the browser console with no visible inline field or violation feedback."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n3"
name = "save_or_tune_toggle_silent"
description = "Saving a correctly bumped change or toggling a labelled-case include produces no visible change to version badge, history, bars, or aggregate (silent failure)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n4"
name = "delete_proceeds_without_confirmation"
description = "Deleting a criterion proceeds with no confirmation step before the pending major-bump state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n5"
name = "interactive_controls_are_nonsemantic"
description = "Primary interactive controls (rail entries, accordion headers, verdict toggles, case toggles, Add criterion) are non-semantic div/span click targets without button/role semantics."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n6"
name = "criterion_form_not_keyboard_dismissible"
description = "With the criterion form dialog open, keyboard users cannot dismiss it (no Escape path and no focusable Cancel control)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n7"
name = "duplicate_id_still_submits"
description = "Entering a duplicate criterion id still enables submit and adds a second criterion with that id, or shows no inline message naming the id field as already in use."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n8"
name = "ambiguous_or_missing_action_labels"
description = "Primary actions show blank, placeholder, or ambiguous labels such as Submit, OK, or Button instead of specific labels like Add criterion, Export, or Copy."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n9"
name = "likert_min_gte_max_accepted"
description = "Choosing likert with min greater than or equal to max still allows submit, or shows no inline message on the range fields."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n10"
name = "cancel_still_mutates_rubric"
description = "Cancel on the criterion form or Cancel on a pending version bump still changes the rubric criteria, version, or history."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.11"
name = "import_rejects_nonconforming_package"
description = "Importing malformed JSON or parseable JSON that fails the RubricPackage field contract (schemaVersion not rubric-package-v1, library not Rubric Studio, missing rubrics/generatedAt, or invalid CriterionUpsert) leaves the rubric collection unchanged and shows a visible error naming the offending field or that the package is invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "undo_redo_disabled_when_stacks_empty"
description = "With an empty undo history, Undo is disabled; with an empty redo stack, Redo is disabled — neither control silently no-ops while appearing enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "export_empty_criteria_still_shows_schema_keys"
description = "After deleting all criteria (each with major bump), Export center still opens and shows artifacts that include schemaVersion rubric-document-v1 / rubric-package-v1 and the required keys rather than crashing; Download and Copy remain available."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "invalid_import_mutates_collection"
description = "A non-conforming Import package mutates the rail or criteria collection despite failing the RubricPackage field contract."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
