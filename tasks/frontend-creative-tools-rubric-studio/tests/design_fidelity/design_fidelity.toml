[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_studio_scale"
description = "At 1440px, spacing among the fixed-width left rail, header card, criteria list, and history panel follows a consistent rhythm matching the visual_design composition — no arbitrary one-off gaps that collapse the three regions together."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_hierarchy_matches_spec"
description = "Typography matches the spec hierarchy: the rubric name is visibly larger than section headings, which are larger than criterion names, which are larger than body and metadata text; Export center preview text uses a monospaced face distinct from the UI face."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_spec"
description = "At 1440px the layout matches the specified studio composition: fixed-width left rail, main canvas with header card above criteria, and history as a distinct right-hand or below-header surface separated by hairline borders or elevation — not a single undifferentiated stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — accordion expand/collapse, criterion row animate-in/out, Tune bar width easing, aggregate score transition, form dialog enter/exit (~200–300ms), toast slide-in — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "At 1024px and below the rail collapses behind a toggle overlay; at 375px Tune bars and diff view stack and the export code block scrolls in-container — matching the responsiveness spec rather than leaving a broken desktop layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "chips_and_controls_styled_not_browser_default"
description = "Type badges (binary, likert with range), importance labels, header selects, toggles, and primary buttons use the studio chip/control treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_rail_header_criteria"
description = "Typography hierarchy clearly distinguishes rail entry names, the opened rubric name in the header, criterion names, and body/metadata text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, selects, toggles, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments; the disabled save control is visibly muted next to its inline explanation."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "dual_accent_and_diff_treatments"
description = "One accent marks selection and primary actions; a second, visually distinct load-bearing accent marks weight-3-or-higher criteria and the load-bearing rollup count (different hues); diff view uses green-tinted added, red-tinted removed with strikethrough, and amber-tinted changed treatments readable against their tints."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec_duration"
description = "Hover wash on rail/criteria/history rows, chip lift, and form focus rings follow the motion spec's short easing rather than instantaneous or multi-second default browser feedback (verified via real pointer/keyboard focus)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible spacing among rail, header, criteria rows, and history contradicts the consistent rhythm described in visual_design — crowded or orphaned regions."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "accents_collapse_to_one_hue"
description = "Selection/primary accent and load-bearing accent use the same hue, or load-bearing criteria have no distinct accent treatment."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_studio_spec"
description = "The left rail is not a distinct fixed-width column at desktop, or the header card fails to sit above the criteria list as specified."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Accordion expand/collapse, Tune bar width changes, or form dialog enter/exit snap with no transition where the motion spec requires animated height, easing, or opacity/scale."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Header selects, criterion form fields, or toggles use bare browser default styling when the spec requires distinct studio treatments."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_desktop"
description = "At 1440px the three studio regions run together with no hairline border or elevation separation."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "At desktop width, criterion rows, history entries, or the export block render clipped or off-screen."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_studio_spec"
description = "Section structure omits the rail-plus-header-plus-criteria-plus-history studio shape or reorders it into an unrelated marketing layout."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n9"
name = "heading_and_body_undifferentiated"
description = "Rubric name, criterion names, and body/metadata text share the same size and weight with no hierarchy."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_spec"
description = "Hover/focus/press feedback on buttons and rows is missing or uses only unstyled browser defaults contrary to the motion/visual_design specs."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
