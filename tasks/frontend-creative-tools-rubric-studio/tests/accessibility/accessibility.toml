[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_studio_controls"
description = "Every interactive control — rail entries, header selects, accordion headers, form fields, verdict toggles, case include toggles, history entries, Undo, Redo, Export, Import, and copy controls — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "criterion_form_focus_trap_and_return"
description = "The criterion form dialog, Export center, and Import surface trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Meaningful icons (chevrons, copy, close, load-bearing badges) expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_toasts_announced"
description = "Form validation messages and confirmation toasts are conveyed visually and via association or an ARIA live region so assistive technology can announce them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "criterion_form_fields_explicitly_labeled"
description = "Criterion form fields (id, name, description, type, weight, importance, likert min/max, version) use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "accordion_and_disclosure_expose_expanded_state"
description = "Accordion headers and the Rationale notes disclosure expose their expanded or collapsed state to assistive technology (for example aria-expanded)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "studio_landmarks_present"
description = "The app exposes semantic landmarks (for example nav/complementary for the rail and main for the canvas) so assistive technology can navigate the studio."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Rubric name, criterion names, type/importance chips, validation copy, and primary controls meet sufficient contrast against their surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_for_interactive_chrome"
description = "Rail entries, accordion headers, selects, toggles, and dialogs use semantic HTML or equivalent ARIA roles (button, dialog, listbox) rather than unlabeled clickable text alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, accordion, Tune-bar, aggregate, dialog, and toast animations are removed and state changes apply instantly while every flow remains available."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Rail entries, accordion headers, verdict toggles, case toggles, Undo/Redo, or Export/Import/copy cannot be activated or reached via keyboard."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused studio controls show no visible focus indicator, or the indicator is obscured by overlapping chrome."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom accordion headers, toggles, or chips use non-semantic tags and lack ARIA roles or accessible names."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "diff_states_color_only"
description = "Diff added/removed/changed states are conveyed by color alone with no text label or icon distinguishing them."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "criterion_form_fails_to_trap_focus"
description = "With the criterion form dialog open, Tab moves focus to controls outside the dialog (focus is not trapped)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Rubric header text, criterion metadata, or validation messages are unreadable due to poor contrast."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Inline validation or version-violation messages are visual only and are not associated with their fields or announced to assistive technology."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n8"
name = "media_missing_accessible_name"
description = "Icon-only controls (copy, close, chevron) are missing accessible names."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings jump levels (for example H1 to H3) across the rail, rubric header, and section titles."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, accordion height transitions, Tune-bar easing, or toast slide-ins still run."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
