[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the rubric studio becomes interactive within 2 seconds, with the 4 seeded rubrics listed and Response Quality opened."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise: opening rubrics, adding/editing/deleting criteria with version bumps, using Tune toggles and thresholds, flipping preview verdicts, exporting, importing, undoing/redoing, and viewing history diffs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "tune_and_aggregate_recompute_under_100ms"
description = "Toggling a labelled-case include or a preview verdict recomputes Tune bars or the aggregate score with UI response in under 100ms (perceived immediate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the left rail and main canvas remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_criteria_list_scrolls_without_lag"
description = "With the default Response Quality rubric open (at least 6 criteria) and at least 10 labelled cases in Tune, scrolling the criteria list and case list shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_recompute"
description = "During Tune-bar width easing or aggregate score animation, case toggles, verdict toggles, and header selects remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "tune_bar_animation_holds_stable_frame_rate"
description = "Driven through real case toggles or threshold moves, Tune bar width easing maintains a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_verdict_toggling_never_hangs"
description = "Rapid repeated verdict toggling (at least five flips in quick succession, including All pass / All fail chips) keeps the UI responsive with no hangs and leaves toggles and aggregate in agreement."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stays_stable"
description = "An extended session of opening all 4 rubrics, switching Tune/preview, and exporting repeatedly shows no runaway memory growth or progressive slowdown that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "export_panel_stays_responsive"
description = "Opening Export center and switching among structured text, rubric JSON, and package JSON keeps the studio interactive; the monospaced previews appear without a multi-second blank hang, and Copy/Download remain responsive."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the seeded rail and opened rubric are interactive on local render."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during version-gated save, Tune toggles, preview chips, or export/copy."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n3"
name = "recompute_blocks_or_lags"
description = "Tune bar or aggregate recomputation blocks the UI or lags visibly after a single toggle."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n4"
name = "recompute_hangs_ui"
description = "Changing a likert pass threshold or flipping several verdicts causes the UI to hang or freeze."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n5"
name = "labelled_cases_kill_frame_rate"
description = "With at least 10 labelled cases listed, toggling includes or scrolling the Tune view collapses the frame rate into visible jank."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during accordion expand, Tune-bar easing, or toast slide-in."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering with a blank page while fonts or PrimeVue assets finish loading after first paint."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Repeated Tune toggles or aggregate chip clicks cause runaway browser resource usage that degrades the session."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed (blank viewport) while the seeded rubrics and default canvas should already be visible."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid verdict toggling, excluding all Tune cases, or deleting the last criterion crashes the app or leaves it unrecoverable without reload."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
