[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared collection: a saved criterion edit, add, or delete is immediately reflected in the accordion list, header rollups, rail badge and counts, Tune bars, preview panel, and export text without a reload, and no surface shows stale data another surface already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "no_storage_reload_seeded"
description = "localStorage and sessionStorage remain empty after adding, editing, and deleting criteria, saving version bumps, toggling cases and verdicts, and exporting, and a page reload returns the app to its seeded baseline"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "browser_storage_used"
description = "localStorage, sessionStorage, or another browser storage API holds rubric, history, case, verdict, or chrome state after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n2"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.3"
name = "console_clean_full_exercise"
description = "The console is free of errors, warnings, and unhandled promise rejections on load and stays clean through adding, editing, deleting, version-gated saves, diff viewing, tuning, preview toggling, and export"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "cold_load_interactive_2s"
description = "The app is interactive (rail entries and header selects respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rapid_input_stability"
description = "Under rapid repeated input (fast verdict toggling, quick case toggles, rapid rubric switching), the UI stays responsive with no hangs, and derived numbers settle to values consistent with the final input state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "keyboard_operability_focus"
description = "Every interactive control — rail entries, header selects, accordion headers, disclosures, form fields, verdict and case toggles, history entries, copy control — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "dialog_focus_trap_escape"
description = "The criterion form dialog traps focus while open, closes on the Escape key, and returns keyboard focus to the control that opened it; accordion headers and disclosures expose an expanded or collapsed state attribute to the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "labels_and_error_association"
description = "Every form field has a visible label, and each validation message names the field it belongs to and is programmatically associated with that field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
