[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared collection: a saved criterion edit, add, or delete is immediately reflected in the accordion list, header rollups, rail badge and counts, Tune bars, preview panel, and Export center structured-text / rubric-json / package-json previews without a reload, and no surface shows stale data another surface already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "no_storage_reload_seeded"
description = "localStorage and sessionStorage remain empty after adding, editing, and deleting criteria, saving version bumps, toggling cases and verdicts, exporting, importing, and undoing, and a page reload returns the app to its seeded baseline"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "browser_storage_used"
description = "localStorage, sessionStorage, or another browser storage API holds rubric, history, case, verdict, or chrome state after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n2"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.3"
name = "console_clean_full_exercise"
description = "The console is free of errors, warnings, and unhandled promise rejections on load and stays clean through adding, editing, deleting, version-gated saves, diff viewing, tuning, preview toggling, export, import, and undo/redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "cold_load_interactive_2s"
description = "The app is interactive (rail entries and header selects respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rapid_input_stability"
description = "Under rapid repeated input (fast verdict toggling, quick case toggles, rapid rubric switching), the UI stays responsive with no hangs, and derived numbers and Export center previews settle to values consistent with the final input state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "keyboard_operability_focus"
description = "Every interactive control — rail entries, header selects, accordion headers, disclosures, form fields, verdict and case toggles, history entries, Undo, Redo, Export, Import, and copy controls — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "dialog_focus_trap_escape"
description = "The criterion form dialog, Export center, and Import surface trap focus while open, close on the Escape key, and return keyboard focus to the control that opened them; accordion headers and disclosures expose an expanded or collapsed state attribute to the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "labels_and_error_association"
description = "Every form field has a visible label, and each validation message (criterion, version bump, import) names the field it belongs to and is programmatically associated with that field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "api_shaped_validation_rejects_invalid_payloads"
description = "Invalid CriterionUpsert submissions (empty required fields, duplicate id, likert min not less than max, weight outside 0.5-5, importance outside must-have|nice-to-have) and non-conforming Import packages are rejected with visible per-field or package errors and leave the collection unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "end_state_export_is_portable_persistence"
description = "After session mutations, Download or Copy of package JSON yields a RubricPackage that includes schemaVersion rubric-package-v1, library Rubric Studio, and the session's criteria; good-app persistence is this portable package plus MCP reads — browser storage stays unused"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "only_fictional_arbiter_names_rendered"
description = "Across the arbiter selector, seeded rubric metadata, Tune view, preview, history, and export previews, model or arbiter names are limited to quartz-arbiter-2, sable-jury-9, and cinder-panel-1; no real product, company, or model name is rendered anywhere in the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
