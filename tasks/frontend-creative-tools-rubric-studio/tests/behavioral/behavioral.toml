[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: add a valid criterion, switch to Tune and exclude one labelled case, flip a preview verdict, and change aggregation mode; then reload. Confirm every facet coherently resets to the seeded baseline — exactly 4 rubrics at seeded versions, Response Quality open, seeded history present, and no surviving custom criterion or toggled case — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "aggregation_mode_reversal_proves_live_state"
description = "Selection-reversal proof (genre stand-in for sort reversal): in the sample submission panel set a mixed pass/fail pattern, note the weighted-mean aggregate, switch aggregation mode to all-pass and note the different aggregate (0 percent when any fail), then switch back to weighted mean. Confirm the original weighted-mean aggregate returns — proving the score is derived from live verdicts and mode, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "tune_derived_view_responds_to_includes"
description = "Derived-view sensitivity: in Tune, note precision/recall/F1 and the summary strip, exclude two labelled cases, then change a likert pass threshold so seeded case scores straddle it. Confirm bars and summary change meaningfully for each input rather than redrawing identically regardless of toggles/threshold."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "criterion_edit_echoes_across_surfaces"
description = "Cross-view echo: after a version-gated save that changes a criterion name or weight, without reload confirm the accordion row, header rollup (criteria count / load-bearing count / weight sum), Tune bars for that criterion, preview panel row, and Export center structured-text / rubric-json / package-json previews all reflect the same updated values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "add_criterion_count_delta_exact"
description = "Count-delta integrity: measure the header criteria count, submit one valid Add criterion form, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter), and exactly one new accordion row appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_verdicts_change_aggregate"
description = "Input-dependent output: with aggregation mode set to weighted mean, apply the All fail chip and note the aggregate, then apply the All pass chip. Confirm the two outcomes differ (0 percent vs 100 percent class outcomes) rather than byte-identical aggregates."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_add_and_tune_flows"
description = "Interleaved-flow integrity: open Add criterion and fill some fields without submitting, switch to Tune and toggle one case include, then return and finish submitting a valid new criterion; confirm exactly one new row appears, the Tune include toggle persisted for that session, and neither flow corrupted the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_criteria"
description = "Edge-state round-trip: delete every criterion (each with major bump) until the criteria empty state appears and Tune/preview show empty states, then add two valid criteria with required bumps; confirm empty states clear, both rows appear, and header rollup tracks through both transitions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_pipeline_contains_session_work"
description = "Full-pipeline end state: add a valid CriterionUpsert, open Export center, confirm structured text plus rubric JSON (schemaVersion rubric-document-v1) and package JSON (schemaVersion rubric-package-v1, library Rubric Studio) include the new criterion id/name; delete that criterion with a major bump and confirm the next export omits it — proving artifacts compile live from the store."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_reconstructs"
description = "Export a RubricPackage after a create, note rubrics length and a criterion id, diverge the studio, Import the package, and confirm rail counts, opened criteria, and a fresh export reconstruct to match the imported document without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_restores_prior_state"
description = "Undo round-trip: add a valid criterion (or flip a preview verdict), Undo once and confirm the prior criteria count or aggregate returns on every surface that showed the mutation, then Redo and confirm the mutation returns identically."
type = "binary"
weight = 1.0

