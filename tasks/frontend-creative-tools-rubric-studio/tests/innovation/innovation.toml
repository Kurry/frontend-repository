[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "version_gate_delight_beyond_minimum"
description = "Beyond the required disabled save and bump explanation, the version gate includes an extra delightful cue (for example a bump-kind chip, animated version field highlight, or suggested next version) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "diff_storytelling_beyond_basic_tints"
description = "The history diff view offers advanced motion or storytelling beyond basic green/red/amber tints — for example coordinated before/after wipes or staggered row reveals — verified through real history selection (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_rubric_studio"
description = "A brief guided first-run or coachmark flow introduces the rail, version gate, Tune view, and Export center without blocking the tool (bonus beyond required empty-state copy)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "tune_graphic_extra_usability"
description = "An interactive graphic beyond the required precision/recall/F1 bars — for example a confusion-matrix mini-view or threshold histogram — adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_power_shortcuts_beyond_basics"
description = "Beyond basic Tab/Enter operability, the studio supports a power shortcut such as keyboard add-criterion, quick rail jump, or slash-style command for switching Tune/preview (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last opened view or last aggregation mode until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_studio_narrative_polish"
description = "The rail, header card, and criteria canvas read as a cohesive branded evaluation-studio narrative rather than generic unstyled CRUD (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "load_bearing_accent_craft_beyond_badge"
description = "Load-bearing accent craft goes beyond a bare badge — cohesive accent treatment across weight-3+ rows, rollup count, and related chips without inventing a conflicting second product (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local fonts or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_rubric_studio_feel"
description = "The overall studio feels competition-grade: version-gated editing, Tune sensitivity, weighted-total preview, undo/redo, and Export center package polish read as a professional rubric instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain text list with no two-pane studio, header rollup, Tune bars, or version history immersion."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified rail-plus-canvas rubric studio composition."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
