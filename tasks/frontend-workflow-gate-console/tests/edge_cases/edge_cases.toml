[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "timeline_and_registry_empty_states"
description = "Filtering the timeline to a type with no entries, or the registry to a severity with no gates, shows an empty-state message rather than a blank region; a run with no events yet names what will appear there."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "gatenote_and_import_validate_inline"
description = "GateNote create and Acceptance Package import surfaces show inline validation naming the offending field (text, category, schemaVersion, stages, or payload) before a successful commit."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_contract_errors_name_fields"
description = "Validation messages for note text length, missing category, wrong schemaVersion, or out-of-enum severity name the field and the fix rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_note_and_import_confirmations"
description = "Fingerprint copy, export Copy, note attach, and successful import each show visible confirmation feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rerun_shows_progress_indicator"
description = "A stage re-run shows the overall progress indicator advancing as gates complete rather than jumping straight to a final state with no intermediate feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "note_cancel_and_whatif_revert"
description = "Cancel on the Add note form leaves evidence and timeline unchanged; what-if revert restores recorded gate results without needing a destructive confirm."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "status_legend_explains_colors"
description = "A visible legend explains the four status colors used on stage segments, gates, chain links, and timeline entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "note_and_export_controls_semantic"
description = "Add note, Export acceptance package, Import acceptance package, Copy, and Download use semantic button or link controls with visible labels."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "note_export_import_dismissible"
description = "The note form and export/import drawers close via an explicit close control and Escape; focus returns to the opener."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "rerun_progress_and_export_tabs"
description = "Long re-run simulations expose per-gate progress, and the export drawer exposes format tabs so the operator can switch between Acceptance Package JSON and Certificate Chain Markdown without losing context."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_import_leaves_run_unchanged"
description = "Importing malformed Acceptance Package JSON or a document that breaks the field contract shows visible validation naming the offending field and leaves the selected run's note count and stage statuses unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "double_rerun_starts_once"
description = "Double-activating a stage's re-run control starts exactly one simulation; the timeline gains one re-run start entry, not two."
type = "binary"
weight = 1.0

