[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "browse-query-v1, structured-editor-v1, command-session-v1, and artifact-transfer-v1 are initialized and bound per the task contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "WebMCP handlers for browse destinations, editor note add / what-if switch_mode, session stage-re-run start, and artifact export/import/copy invoke the same store commands as the visible UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented browse destinations (run-list, run-detail, stage-detail, certificate, registry, timeline, export, import), editor operations, session start, and artifact export/import/copy are available."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "Automation can list tools and invoke browse, editor, session, and artifact operations declared in the contract without manual harness edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_note_and_whatif_operations_work"
description = "Editor operations select, switch_mode, update_property, and add work for gate and note objects, including note-text and note-category properties and recorded versus what-if modes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "artifact_export_import_copy_bound"
description = "Artifact-transfer export, import, and copy are bound for fingerprint-hash, acceptance-package-json, and certificate-chain-markdown formats with import mode acceptance-package."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations and filters (severity; timeline-entry-type) and themes (light; dark) match the contract bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared module routes, destinations, or artifact formats beyond the contract are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session start for stage-re-run and the other bound tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works from the app's own registration without manual editing or test harness changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Contract-mandated browse, editor, session, or artifact tools are unbound, missing, or no-ops."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "Invoking a WebMCP note add, what-if switch, re-run start, or acceptance-package export leaves the UI in a different state than the matching visible control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or artifact formats outside the gate-console contract are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation via webmcp_list_tools / webmcp_invoke_tool."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "WebMCP can attach a GateNote that violates the field contract or import a broken acceptance package while the UI validation path would reject it, desyncing MCP and UI state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for declared tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "browse-query-v1, structured-editor-v1, command-session-v1, or artifact-transfer-v1 is declared but not implemented."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
