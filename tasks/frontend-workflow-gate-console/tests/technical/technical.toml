[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "5.1"
name = "interactive_within_two_seconds"
description = "The app becomes interactive within 2 seconds of a local cold load: the run list renders and a run can be selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app, including a complete re-run simulation, what-if flips, a note submission, and opening Export acceptance package"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.3"
name = "reload_returns_seeded_state"
description = "After creating notes, running a re-run, importing a package, and toggling what-if and theme, a page reload returns the app to its seeded baseline: the seeded runs and recorded gate results, the default view, and the default theme, with none of those changes surviving"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.4"
name = "cross_view_state_coherence"
description = "A change made in one surface is immediately reflected in every other surface that shows the same data without a reload: a re-run's results appear in the stage strip, chain, suite outcome, timeline, and export preview together, and a note appears in the gate evidence area, the timeline, and the Acceptance Package JSON notes array"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.5"
name = "stable_under_rapid_input"
description = "Rapidly clicking through runs, stages, what-if toggles, filters, and export tabs causes no hangs, dropped interactions, or desynced surfaces, and double-activating the re-run control starts exactly one simulation"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.6"
name = "whatif_excluded_from_export"
description = "While what-if simulated gate values differ from recorded results, the Acceptance Package JSON preview still reflects recorded states only; after revert, export and on-screen recorded surfaces continue to agree"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.n1"
name = "browser_storage_used"
description = "After a full exercise of the app, localStorage, sessionStorage, or another browser storage API contains app data (the storage inspection shows non-empty app-written state)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.n2"
name = "outbound_network_requests"
description = "The network log shows outbound requests to external origins (CDN scripts, fonts, icons, or analytics) during load or use, or app chrome navigates away from the app's origin"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
