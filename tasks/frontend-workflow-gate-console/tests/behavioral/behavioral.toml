[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_in_memory"
description = "Multi-facet round-trip: attach a note, flip what-if on a gate, toggle theme, then reload — the seeded runs, recorded gate results, empty session notes, default view, and default theme all return together with no facet surviving alone (in-memory genre)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "severity_filter_reversal_proves_live_data"
description = "Sort-or-filter reversal proof: filter the registry to S1, note the visible gate identifiers, then filter to S3; the visible set changes to S3-only gates, and clearing restores the full list — proving the list is derived from live data rather than two hardcoded screens."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "whatif_derived_outcome_responds"
description = "Derived-view sensitivity: in what-if mode, flip a failing S1 gate to pass on an otherwise-passing rejected stage and confirm the suite outcome and stage status change meaningfully; revert restores the prior rejection."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "note_echoes_evidence_timeline_and_export"
description = "Cross-view echo: submit a valid GateNote on a gate and confirm the same text appears in the gate evidence area, a note timeline entry, and the Acceptance Package JSON notes array without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "timeline_note_count_delta_exact"
description = "Count-delta integrity: measure the selected run's timeline entry count immediately before and after submitting one valid note; the count increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_notes_change_export"
description = "Input-dependent output: attach two notes with different text tokens on the same or different gates in separate runs of the flow; the two Acceptance Package JSON previews differ in the notes arrays exactly where those texts differ."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_whatif_and_note_preserve_state"
description = "Interleaved-flow integrity: enter what-if and flip a gate, open Add note on another gate and submit a valid note, then revert what-if — the note remains attached and the flipped gate returns to its recorded state with no cross-corruption."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "export_import_round_trip_restores_notes"
description = "Edge-state round-trip: after exporting Acceptance Package JSON that includes at least one session note, clear those notes, Import the JSON, and confirm evidence notes, timeline note entries, and the next Export preview restore the exported package."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, some session facets (notes, what-if, theme, or re-run results) survive while others reset, producing incoherent partial persistence in this in-memory app."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_preview_ignores_note_input"
description = "The Acceptance Package JSON preview renders identically before and after attaching a distinct valid note on the selected run."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_note_texts_yield_identical_export"
description = "Attaching notes with two different text tokens yields byte-identical Acceptance Package JSON note arrays."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "note_missing_from_export_or_timeline"
description = "A successfully submitted GateNote appears in the gate evidence area but is missing from the timeline or from the Acceptance Package JSON notes array until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
