[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The app uses a light neutral background with white surface cards and hairline borders, giving a clean, airy productivity-tool look"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The three category colors — green for Meaningful, slate for Neutral, and rose for Draining — are distinguishable at a glance on both category chips and Weekly overview segments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The live timer digits and the duration numbers use a monospace typeface that is visibly distinct from the sans-serif body and UI text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Cards and inputs use a consistent rounded corner treatment with buttons slightly tighter, and primary buttons render as a filled dark button with white text distinct from outlined secondary buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Timeline entry blocks are visibly proportional to duration and colored by category, with the activity name and duration legible in or beside each block"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "The Meaningful ratio stat visually leans toward whichever side currently has more minutes using the meaningful and draining colors, and the currently selected category filter is visibly highlighted"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "3_7"
description = "The empty timeline state and the no-results search or filter state are visually present with friendly messaging rather than blank areas"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "The three category colors are not distinguishable from one another on chips or chart segments"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "Timeline blocks render at a uniform size regardless of duration, so a 60-minute entry and a 30-minute entry look the same"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "3_10"
description = "At approximately 375px wide the document overflows horizontally, or the Start timer and Add entry controls become unusable or illegible"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "coherent_icon_family"
description = "The timer, filter, search, delete, and history controls carry icons from one visually coherent icon family, with no mixed icon styles across the chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "weekly_chart_legend_and_separation"
description = "The Weekly overview's stacked day segments stay individually legible with visible separation between days, and a small legend maps the colors to the three categories"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "inline_error_distinct_treatment"
description = "Inline validation messages render in a distinct error treatment beside the field they name, visually separate from helper text"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "narrow_single_column_reflow"
description = "At approximately 375px wide the layout reflows to a single column with the weekly chart and timeline readable within the column and the Start timer and Add entry controls fully usable and legible"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "consistent_capitalization_convention"
description = "Headings, buttons, and filter labels use one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "toasts_name_the_action"
description = "Toasts name the specific action that just happened — for example confirming a saved entry or a timer switch — rather than showing a generic success message"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "placeholder_text_shipped"
description = "Lorem ipsum, 'TODO', template variable names, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
