[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "timer_round_trip_updates_all_surfaces"
description = "Timer round trip: start the Live timer with a Meaningful category, stop it (confirming interruption if under 25 minutes), and confirm exactly one new All entries row and timeline block appear, Today's minutes and Meaningful ratio update, today's Weekly overview Meaningful segment grows, and today's heat-map cell updates — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "manual_add_inline_validation"
description = "Create flow: submitting the Add entry manually form with an empty name or invalid durationMinutes shows immediate inline validation naming the field and adds no entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_category_propagates_everywhere"
description = "Edit flow: changing an entry's category from Draining to Meaningful in the edit dialog updates chip color in list and timeline, moves minutes on today's chart bar, and shifts the Meaningful ratio without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_confirm_removes_from_all_surfaces"
description = "Delete flow: confirming delete decreases the All entries count by exactly one, removes the timeline block, and recomputes ratio, streak, chart, and heat-map."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "export_import_artifact_end_state"
description = "Artifact end state: after creating entries and a custom tag, Export session Session JSON and Timesheet CSV contain those names/categories/durations with Session JSON field-contract keys present; Download Session JSON then Import reconstructs the same visible session."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last entry, timeline and All entries show friendly empty states and Today's minutes is zero."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_and_search_update_list"
description = "Filter/search flow: Meaningful filter shows only Meaningful entries with the button highlighted; typing a name into search narrows the list; clearing search or choosing All restores the full list."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "history_panel_preserves_workflow"
description = "History panel: View history opens the panel; Undo/Redo via the real controls restore adjacent visible states; the panel can be dismissed and the dashboard workflow continues."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Overlays behave as expected for edit, delete confirmation, tag manager, export drawer, import confirmation, interruption reason, and command palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "bulk_categorize_flow"
description = "Bulk categorize: select two entries, Set category Meaningful, confirm both chips update, ratio/chart update, and selection clears — recoverable without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Create/edit/delete, Export session, or Live timer primary flows are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "New entries fail to show up or duplicate on timer stop or manual add."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "State changes are not synced across timeline, list, ratio, chart, heat-map, or Export previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "export_import_breaks_or_loses_session"
description = "Export/Import round-trip breaks layout or loses session entries/tags."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_clocks_break_ui"
description = "After removing the last custom clock/timer entry (or emptying a list region), that region is blank/broken with no designed empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Filtered timeline and list disagree about which entries are visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "history_panel_cannot_reopen"
description = "History panel can't be re-opened after dismiss."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Overlays block interaction with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed import or invalid form submit provides no user feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "A flow dead-ends or requires reload for recovery."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "manual_add_updates_list_timeline_stats_chart_heatmap"
description = "Submit Add entry manually with a valid name, category, start time, and duration; exactly one row appears in All entries, a proportional timeline block appears, Meaningful ratio and Today's minutes recompute, today's Weekly overview bar and heat-map cell update, and the entry remains visible under its matching category filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "interruption_reason_echoes_into_both_exports"
description = "Start a timer, stop it before 25 minutes, choose External in the required interruption step, and confirm the saved entry shows an External chip; after reopening Export, that entry has interruptionReason External in Session JSON and External in the final Timesheet CSV column"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "reload_returns_complete_empty_baseline"
description = "After creating entries, tags, and history transitions, a full page reload returns to no entries and no tags, explicit empty states in the timeline and list, zero Today's minutes, an empty heat-map, and disabled Undo/Redo with empty history"
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
