[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens at / into the ClockCraft dashboard with header stats, a Live timer, a Today's timeline, a Weekly overview, and an All entries list, and both the timeline and the list show a friendly empty state because no entries exist yet"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After adding a manual entry named 'Deep Work' with category Meaningful and a duration in minutes, 'Deep Work' appears in the All entries list and the Today's timeline with a green Meaningful chip and its duration shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After adding a second entry, the entry list and timeline show exactly one more entry than before, and the header Today's minutes and Meaningful ratio update immediately without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After starting the Live timer for an activity with a category and waiting a few seconds, the elapsed display increases about once per second, and clicking Stop timer saves a new entry whose duration reflects the elapsed time"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After opening the edit dialog for an entry and changing its name to 'Evening Reading' and its duration, the list and timeline show 'Evening Reading' with the new duration and the previous name is no longer visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After clicking an entry's Delete control and cancelling the confirmation, the entry is still present; after deleting again and confirming, the entry is no longer visible in the list or the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After creating a custom tag in the tag manager and assigning it to an entry, that tag is visible on or beside the entry in the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When the Meaningful category filter is selected, only Meaningful entries remain visible in the timeline and list and the Meaningful filter button is visibly highlighted; selecting All restores every entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After typing an activity name or tag into the search input, the list narrows to matching entries, and a search that matches nothing shows an explicit no-results message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After logging entries of different durations, the Today's timeline blocks are visibly proportional to duration — a 60-minute entry renders roughly twice as tall as a 30-minute entry — and the Weekly overview shows today's bar with a category-colored segment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After creating an entry and performing a full page reload, the app returns to the empty seeded baseline — no entries, no tags, empty timeline and list states, and zero Today's minutes — rather than restoring the pre-reload session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering buttons, filter chips, and timeline entry blocks, a visible hover state (background, border, or shadow change) appears, and keyboard Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After opening the history panel via View history, making several changes, and clicking Undo, the visible timeline and list return to the immediately prior state, the History state region shows the current snapshot, and Redo restores the undone state while an invalid Undo or Redo control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After undoing one or more steps and then making a different change through the real controls, the history panel shows a separate selectable alternate branch, and selecting that branch restores its exact prior visible state rather than a flattened history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The entry collection supports create, edit, and delete through visible controls, with the Today's timeline, the All entries list, and the header stats all updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "timer_switch_autosaves_with_toast"
description = "Starting a new timer while one is already running automatically stops and saves the previous activity as a completed entry with a nonzero duration, shows a toast noting the switch, and leaves only the new timer live"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The Add entry manually form logs a past activity from a name, category, start time, and duration in minutes without a live timer, and the entry appears in the list and timeline with those values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Every entry shows exactly one category as a visually distinct colored chip everywhere it appears, and the category selector is required and defaults to a valid Meaningful, Neutral, or Draining value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "The Meaningful ratio, Today's minutes, weekly chart, and streak recompute immediately with no reload when an entry is started, stopped, added, edited, or deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The Weekly overview shows seven day bars split into Meaningful, Neutral, and Draining segments sized to minutes, and today's bar grows a matching segment after an entry is logged for today rather than staying a static placeholder"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The history panel exposes Undo, Redo, a region labelled History state, a snapshot list, and an Apply scenario change action, and Undo and Redo restore the exact adjacent visible states while an invalid Undo or Redo control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The Meaningful streak counter reflects a multi-day streak built from prior days on which Meaningful minutes exceeded Draining minutes rather than resetting to one"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The entry list is static markup with no working create, edit, or delete against shared application state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Deleting an entry happens with no confirmation step, or cancelling the delete confirmation still removes the entry"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Undoing and then making a different change silently discards or flattens the abandoned history states instead of preserving them as a selectable branch"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "A success signal such as a toast, a saved entry, or an updated ratio appears while the underlying entry is absent, or a value stays constant regardless of the input given"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "manual_form_inline_validation_blocks_submit"
description = "Submitting the manual form with an empty name or a zero, negative, or non-numeric duration is rejected: an inline message appears beside the specific offending field naming what is wrong, the submit control stays disabled while a required field is invalid, and no entry is added"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "double_submit_creates_single_entry"
description = "Double-activating the manual form's submit control in quick succession creates exactly one entry: the All entries list count increases by exactly one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "weekly_segment_hover_tooltip"
description = "Hovering a bar segment in the Weekly overview surfaces a tooltip identifying that segment's day, category, and minutes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "last_delete_restores_empty_states"
description = "Deleting the last remaining entry returns the timeline and the All entries list to their friendly empty states and the Today's minutes stat to zero"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "timer_round_trip_multi_surface"
description = "Timer round trip: starting the Live timer with a name and a Meaningful category, letting it run several seconds, and clicking Stop timer adds exactly one row to the All entries list and exactly one block to the Today's timeline (counts measured immediately before and after), increases the Today's minutes stat by the elapsed amount, recalculates the Meaningful ratio, and grows a matching Meaningful segment on today's bar in the Weekly overview — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "manual_add_updates_all_surfaces"
description = "Manual add echo: submitting the Add entry manually form with a valid name, category, start time, and duration adds exactly one row to the All entries list, renders a proportional block in the Today's timeline, and updates the Meaningful ratio, Today's minutes, and today's Weekly overview bar in the same interaction; selecting that entry's category filter afterwards still shows the new entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "edit_category_change_propagates"
description = "Edit propagation: changing an entry's category from Draining to Meaningful in the edit dialog and saving updates that entry's chip color in both the timeline and the list, moves the corresponding minutes between segments on today's chart bar, and shifts the Meaningful ratio and its colored lean toward Meaningful, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "delete_confirm_recomputes_derived"
description = "Delete propagation: confirming a delete decreases the All entries list count by exactly one (measured immediately before and after the confirmation), removes the matching timeline block, and immediately recomputes the Meaningful ratio, the streak, and the Weekly overview chart"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "reload_resets_to_empty_baseline"
description = "In-memory reload: after creating several entries with different categories, one custom tag assignment, and one deletion, a full page reload coherently resets every facet to the empty seeded baseline — no surviving mix of persisted and cleared facets"
type = "binary"
weight = 1.0


[[criterion]]
id = "1.41"
name = "export_session_json_field_contract"
description = "Opening Export session shows a Session JSON preview that is a single object with required keys schemaVersion (clockcraft.session.v1), exportedAt, tags, entries, and rollup (todayMinutes, meaningfulRatio, streakDays), and after adding a named entry the preview contains that entry's name, category, and durationMinutes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "export_timesheet_csv_contains_session_rows"
description = "The Timesheet CSV export tab shows a header row exactly name,category,tag,durationMinutes,startTime,interruptionReason and one data row per current entry whose name and category match the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "export_copy_and_download_controls"
description = "Each Export session format tab offers Copy (visible copied confirmation) and Download (triggers a real file download whose contents match the previewed text)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "import_session_json_round_trip"
description = "After exporting Session JSON for a non-empty session, changing the collection, then Importing that Session JSON with confirmation, the list, timeline, tags, ratio, chart, and heat-map reconstruct the exported visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "interruption_reason_required_under_25m"
description = "Stopping a live timer that has run for less than 25 minutes opens an interruption reason step requiring Internal or External; confirming writes that reason as a chip on the entry; cancelling leaves the timer running and adds no entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "bulk_set_category_updates_surfaces"
description = "Selecting two entries via checkboxes and choosing Set category Meaningful updates both entries' chips in the list and timeline, recomputes the Meaningful ratio and today's Weekly overview segment, and clears the selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "streak_heatmap_updates_with_entries"
description = "The streak heat-map shows at least the last 12 weeks of day cells; after logging an entry for today, today's cell fill intensity changes and hovering it surfaces a tooltip with the day and total minutes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "command_palette_opens_and_filters"
description = "Pressing Cmd+K or Ctrl+K opens a command palette; activating a filter command such as Meaningful applies that category filter and highlights the Meaningful filter button"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "manual_form_enforces_field_contract_bounds"
description = "Submitting the manual form with a name longer than 120 characters, durationMinutes above 1440, or a startTime that is not YYYY-MM-DDTHH:mm is rejected with an inline message naming the offending field and adds no entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n40"
name = "export_omits_session_mutations"
description = "After adding or editing entries, Export Session JSON or Timesheet CSV text omits those entries' names, categories, or durations, or Session JSON is missing a required field-contract key"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n41"
name = "import_accepts_invalid_session_json"
description = "Importing malformed Session JSON or JSON that fails the field contract still mutates the visible entries, tags, or stats"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
