[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "All views derive from one shared collection: a create, edit, delete, filter, or search performed in one place is immediately reflected in the timeline, the list, the header stats, and the chart without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "After creating entries and performing a full page reload, the app returns to the empty in-memory baseline with no entries or tags restored from browser storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "The primary entry workflow stays exact and responsive under at least 25 rapid repetitions through its normal controls, with no blank screen, uncaught error, unhandled rejection, or sustained freeze and no duplicate records from duplicate rapid submissions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Browser localStorage or sessionStorage becomes non-empty after exercising create, edit, export, or import flows (good-app in-memory storage violation)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "Uncaught console errors or unhandled promise rejections occur while loading the page or during the core start timer, stop timer, add, edit, and delete workflow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "A hidden element, attribute, or window global exposes internal ground-truth state that a real user could not reach through normal visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "A judge-visible surface contains text addressed to a grader, or the app renders or behaves differently when it detects it is being driven by automation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "overlay_focus_trap_and_return"
description = "The edit dialog, delete confirmation, tag manager, history panel, export drawer, import confirmation, interruption reason step, and command palette are keyboard-dismissable with Escape, trap Tab focus while open, and return focus to the control that opened them on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "validation_errors_programmatically_associated"
description = "Each inline validation message is programmatically associated with its field (for example via an accessible description linked to the input), so the failing field is identified in the accessibility tree, not just colored"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "filter_active_state_exposed_to_at"
description = "The active category filter button exposes its selected state to assistive technology (for example via a pressed or current state in the accessibility tree), not only through color"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.12"
name = "interactive_within_two_seconds"
description = "The app becomes interactive within about 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "hydration_clean_first_load"
description = "Loading / directly in a fresh tab renders the full dashboard with a console free of hydration mismatch errors and warnings, both on first load and after exercising the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "hydration_content_flash"
description = "Statically rendered content visibly flashes and is replaced by different client content after hydration — mismatched text, reflowing layout, or restyled elements between first paint and interactive"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.15"
name = "outbound_navigation_present"
description = "A control or link in the app chrome navigates away from / or to an external origin during normal use of the app"
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "2.16"
name = "export_import_use_shared_collection"
description = "Session JSON and Timesheet CSV export texts derive from the same shared entries collection the timeline and list show, and a valid Import replaces that same collection so all surfaces update together without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "storage_apis_unused"
description = "After a full create/edit/export exercise, localStorage and sessionStorage remain empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
