[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Buttons, filter chips, timeline entry blocks, and heat-map cells each show a visibly distinct hover state such as a background, border, or shadow change when the pointer is over them"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Keyboard Tab focus is visibly indicated on interactive controls including filter buttons, form fields, and entry rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "toasts_ease_in_and_auto_dismiss"
description = "Starting a timer, saving a manual entry, and deleting an entry each surface a transient toast that eases in after the action and then dismisses on its own without user interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Undo, Redo, and branch selection performed through the real history-panel controls update the visible timeline, list, ratio, and chart"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "list_add_delete_filter_animations"
description = "Driven through the real UI controls: adding an entry animates the new row into the All entries list and the new block into the timeline, deleting an entry animates its row out rather than snapping, and switching category filters animates the surviving rows into their new positions"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "timer_tick_stable_layout"
description = "While the live timer runs, its elapsed display updates about once per second and stays legible without visibly jittering or reflowing the rest of the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "ratio_lean_animates_in_place"
description = "When entries change, the Meaningful ratio and its colored lean bar animate their update in place rather than snapping to the new value or requiring a reload"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "overlays_enter_transition_and_dismiss"
description = "The edit dialog, delete confirmation, tag manager, history panel, export drawer, import confirmation, interruption reason step, and command palette each appear as overlays anchored above the page with a brief enter transition, and each dismisses on cancel, on backdrop click, and on Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_instant_and_usable"
description = "With prefers-reduced-motion enabled on a fresh load, list, toast, and overlay animations are removed and state changes apply instantly while every feature remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "export_import_toasts_animate"
description = "Export copy/download and Import completion each surface a transient toast that eases in and dismisses on its own"
type = "binary"
weight = 0.5

