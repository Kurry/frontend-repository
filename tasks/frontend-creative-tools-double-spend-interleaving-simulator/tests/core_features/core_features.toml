[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "core_features.timeline_reordering"
name = "Phase Reordering Timeline"
description = "Phases can be reordered by snapping to slots on the logical-time ruler, and changing interleaving updates the active scenario."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.strategy_switch"
name = "Isolation Strategy Switch"
description = "Changing the isolation strategy (e.g. none to pessimistic-lock) recalculates conflict graphs and locking without altering phase assignments."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.step_scrubber"
name = "Step-by-step Scrubber"
description = "A scrubber allows deterministic execution playback, showing account snapshots, invariant updates, and local balances at each step."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.conflict_graph"
name = "Conflict Graph Generation"
description = "Read-write and write-write conflicts draw explicitly between phases and generate a cycle-detected serialization graph."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.resolution_composer"
name = "Conflict Resolution"
description = "Conflicts can be resolved by decisions like waiting, abort/retry, or reordering future phases."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.invariant_conservation"
name = "Invariant Conservation"
description = "A conservation indicator tracks total balance exactly at 150, and flags negative accounts at every step."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core_features that is NOT covered by any other criterion in this file."
type = "binary"
negate = true
weight = 1.0
