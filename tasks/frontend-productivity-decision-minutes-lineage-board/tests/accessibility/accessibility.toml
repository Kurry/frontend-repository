[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "AC-08-accessibility"
name = "AC-08-accessibility"
description = "Verifies keyboard accessibility for scheduling, bounding evidence, authoring amendments, and exporting without a pointer."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "interactive_elements_lack_keyboard_focus"
description = "Interactive elements lack keyboard focus."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "interactive_elements_lack_focus_styles"
description = "Interactive elements lack visible focus styles."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "focus_trapped_or_lost"
description = "Focus is trapped or improperly managed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "missing_or_incorrect_aria_roles"
description = "Missing or incorrect ARIA roles/states."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "dynamic_content_not_announced"
description = "Dynamic content is not announced."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "missing_form_labels"
description = "Missing form labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "poor_color_contrast"
description = "Poor color contrast."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "text_scaling_breaks_layout"
description = "Text scaling breaks the layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "animations_ignore_reduced_motion"
description = "Animations ignore prefers-reduced-motion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "images_lack_alt_text"
description = "Images lack alt text."
type = "binary"
negate = true
weight = 1.0
