schema_version = "1.3"

[task]
id = "frontend-productivity-decision-minutes-lineage-board"
name = "mercor-intelligence/frontend-productivity-decision-minutes-lineage-board"
description = "append-only meeting decision tracker"

[agent]
timeout_sec = 3600.0

[verifier]
timeout_sec = 14400.0

[environment]
workdir = "/app"
build_timeout_sec = 1200.0
memory_mb = 8192
cpus = 4

[[artifacts]]
source = "solution/app"
exclude = [
  "**/node_modules/**",
  "**/.next/**",
  "**/.nuxt/**",
  "**/.svelte-kit/**",
  "**/.astro/**",
  "**/dist-ssr/**",
  "**/coverage/**",
  "**/*.log",
  "**/.DS_Store",
  "**/build/**",
  "**/testing/**",
]

[[artifacts]]
source = "environment"

[[artifacts]]
source = "tests"

[[artifacts]]
source = "task.toml"

[[artifacts]]
source = "README.md"

[[artifacts]]
source = "instruction.md"
