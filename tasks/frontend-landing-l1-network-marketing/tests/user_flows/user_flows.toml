[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "land_scroll_interact_submit_confirm"
description = "Starting on a fresh load: scroll through the landing chapters, open the mega-menu and light-dismiss it, then submit a valid contact form and see an in-page success confirmation without navigating away."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "create_event_increments_manager_and_listings"
description = "Opening Events Manager and submitting a valid new upcoming event closes the form, increases the manager row count by exactly one, and the same event appears in Global Events landing listings whose status filter matches — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_event_updates_all_surfaces"
description = "Editing an event's title or status in Events Manager updates that same record everywhere it appears — the manager row, the landing listings, and any featured slot — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_event_removes_everywhere"
description = "Deleting an event removes its row from Events Manager, decreases the visible count by exactly one, and removes it from landing listings and featured slots in the same session."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "filter_flow_status_then_category"
description = "Applying a status filter in Events Manager narrows the rows; switching to a category filter recomputes the rows from the same shared collection; clearing all filters restores the full seeded-plus-created list exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "theme_toggle_recolors_without_reload"
description = "Toggling to dark mode recolors the sticky chrome, hero, chapters, and Events Manager together without reloading the document; toggling back restores the light styling; the events collection and any active filters remain unchanged by the toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "marketing_and_manager_mode_switch"
description = "Switching between Marketing Scroll mode and Events Manager mode (via Global Events View all or a header control) changes the visible context without a full page reload, and returning to Marketing Scroll keeps the shared events collection intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "mega_menu_open_close_preserves_scroll"
description = "Opening the hamburger mega-menu (Build, Solutions, Community, About panels) and closing it via light-dismiss or Escape restores the prior page scroll position and leaves landing chapters operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "invalid_create_blocks_and_names_field"
description = "Submitting an event create with an empty title or missing date does not add an event — the visible count stays unchanged and an inline validation message names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "After creating an event, applying a filter, opening the mega-menu, and toggling theme, a page reload returns the app to its seeded baseline: at least 6 seeded events, default theme, closed mega-menu, and default filters."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_flow_reflects_session"
description = "After creating or editing events and capturing at least one contact lead, opening Export catalog shows a JSON preview whose events and leads arrays reflect those session mutations and an ICS preview with matching VEVENT SUMMARY lines; Copy JSON shows a copied confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_restores_catalog"
description = "Exporting the catalog to JSON, deleting an event so the manager count drops, then importing that JSON restores the prior event set — the same titles and count reappear in Events Manager and matching landing listings."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "undo_redo_round_trip_on_delete"
description = "Deleting an event and pressing Undo restores it across manager, rollups, and landing listings; pressing Redo removes it again from all three."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "bulk_delete_and_sort_flow"
description = "Selecting at least two events and choosing Delete selected drops the manager count by the selected count; afterward, sorting the remaining rows by title reorders them from the shared collection without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "command_palette_to_export_catalog"
description = "Opening the command palette with Ctrl+K / Cmd+K, choosing Events Manager, then choosing Export catalog reaches those surfaces in-page; Escape closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "contact_lead_then_download_leads_json"
description = "Submitting a valid contact payload shows an in-page success state, appends one Session leads row (total +1), and Download leads JSON produces ridge-session-leads.json whose leads array includes that payload with counts.total matching the panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "second_lead_export_contains_both"
description = "After two successful contact submits with different emails, a subsequent Download leads JSON leads array contains both distinct payloads and counts.total equals 2; Undo last lead then omits the newest from the next export."
type = "binary"
weight = 1.0

