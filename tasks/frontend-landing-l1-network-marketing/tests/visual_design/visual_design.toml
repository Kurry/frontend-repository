[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "void_notch_composition_intact"
description = "The signature layout system is intact: light content modules float on large black void fields with dual corner language (large radii plus architectural diagonal notches) and the brand-first hero composition remains"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_manager_state_designed"
description = "Empty Events Manager state is visually present when no events remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "four_numbered_pillars"
description = "The Why Ridge chapter shows exactly four numbered pillars labelled 01, 02, 03, 04"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "ridge_radius_css_tokens"
description = "Reading computed styles on the document root exposes CSS custom properties named --ridge-radius-module (a large radius) and --ridge-radius-control (a small radius), plus void/ink/accent/surface color variables"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "expressive_display_typeface"
description = "All-caps chapter titles render in an expressive geometric display face served from the app's own origin — computed font-family is not Inter, Roboto, Arial, or a system-only stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "single_consistent_icon_set"
description = "One consistent icon style appears across the chrome, mega-menu, manager rows, and footer — no visibly mixed icon families"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "ridge_wordmark_and_title"
description = "The header shows a lowercase 'ridge' wordmark beside a sharp geometric mark in a saturated ember/alpine-red accent (not purple), and the document title names Ridge (e.g. 'Custom Blockchains for Enterprise | Ridge')"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "manager_dense_table_badges"
description = "Events Manager mode renders as a dense list/table with visible status badges and filter controls styled in the same visual system as the landing chapters"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "placeholder_partner_marks_distinct"
description = "The trust strip and any client wall show multiple visually distinct, original invented placeholder marks rather than repeated identical placeholders"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "mobile_375_layout_clean"
description = "At 375px width, the bento hero cells stack vertically, no content clips or overflows the viewport, no horizontal scrolling appears, and every chapter, form, and the Events Manager remain reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "breakpoint_choreography"
description = "Breakpoint behavior matches the spec: the mega-menu becomes a full-screen drawer at mobile widths, Get started renders as one column at mobile and three-up from the sm breakpoint, and the hero pull-in composition applies at 1024px and up"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "consistent_capitalization"
description = "Headings, nav labels, and CTAs use one consistent capitalization convention throughout the page and the Events Manager"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "institutional_copy_quality"
description = "Marketing copy reads as original, coherent institutional-tech voice for an enterprise blockchain product; error messages name the problem field and the fix, and empty states explain what belongs there and how to add it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.18"
name = "why_ridge_static_list_below_768"
description = "At a viewport narrower than 768px, the Why Ridge pillars render as a static vertical list — all four pillars fully readable in document order with no sticky stacking or cards covering one another"
type = "binary"
weight = 1.0


[[criterion]]
id = "3.20"
name = "export_catalog_void_notch_panel"
description = "Export catalog renders as a dedicated panel with JSON and ICS preview regions plus Copy/Download/Load controls using the same void/notch visual language as the landing — not a plain unstyled browser dialog"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "command_palette_ridge_overlay"
description = "The command palette is a centered overlay with a search field and listed destinations/actions; the active row is highlighted and the chrome matches Ridge rather than a default OS menu"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.22"
name = "manager_rollup_and_bulk_bar"
description = "Events Manager shows a live status rollup strip and, when rows are selected, a bulk action bar with selected count — both styled in the same visual system as the dense list/table"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.23"
name = "session_leads_panel_matches_token_system"
description = "Session leads panel uses the same void/notch surfaces and ember accent on Download leads JSON / Copy leads JSON / Undo last lead controls as the surrounding conversion forms and footer rather than a visually alien widget"
type = "binary"
weight = 1.0

