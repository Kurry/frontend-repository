[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_events_manager_shows_message_and_create"
description = "After deleting all events, Events Manager shows an empty state with a message and a control that opens the create flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "event_and_contact_forms_validate_inline"
description = "Event create/edit and contact/email forms validate inline per field before submit: each invalid field shows an error naming that field, and the submit control stays disabled until every required field is valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Validation errors on event create and contact forms name the offending field and the fix rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "contact_success_confirms_in_page"
description = "A valid contact submit shows an in-page success confirmation rather than navigating away or staying silent."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "filtered_empty_state_offers_clear_filters"
description = "When active Events Manager filters match no events, the list region shows an empty state with a clear-filters control that restores the full list."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "double_activate_create_adds_exactly_one"
description = "Double-activating the event create submit control adds exactly one event: the count increases by one and one new row appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "invalid_create_leaves_count_unchanged"
description = "Submitting an event create with an empty title or missing date does not add an event — the visible event count stays unchanged and an inline message names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "form_controls_use_semantic_labels"
description = "Event Manager and contact form fields use semantic inputs with visible labels (or accessible name equivalents) rather than unlabeled div shells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "mega_menu_light_dismiss_and_escape"
description = "The open mega-menu drawer closes via light-dismiss click outside the panel and via Escape, restoring the page underneath."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "contact_malformed_email_or_missing_consent"
description = "Submitting a contact form with a malformed email, without privacy consent, name shorter than 2 characters, missing interest, or a provided message shorter than 10 characters shows inline errors naming the field, does not show the success state, and appends no Session lead."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "empty_collection_export_still_valid"
description = "After deleting all events, status rollups show 0 / 0 / 0; Export JSON compiles a valid catalog with an empty events array (leads may still be non-empty); Export ICS is still a valid empty calendar (BEGIN:VCALENDAR and END:VCALENDAR with no VEVENT blocks)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_undo_history_inert"
description = "With an empty undo history the Undo control is disabled or inert, and activating it produces no state change and no console error."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "malformed_import_leaves_collection"
description = "Importing a malformed declared-catalog payload leaves the current events collection and leads log unchanged, shows an inline error naming the catalog, and does not blank the manager UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "bulk_delete_zero_selection_inert"
description = "Bulk Delete selected with zero rows selected is inert: no confirmation dialog, and the visible event count does not change."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "empty_leads_export_valid_schema"
description = "With zero leads, Download leads JSON still produces ridge-session-leads.json with version 1, the current theme, counts.total 0, and an empty leads array; Copy leads JSON copies that same empty-log JSON and still shows Copied confirmation; Undo last lead leaves the empty state unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "invalid_contact_then_valid_appends_one"
description = "A failed invalid contact submit followed immediately by a valid contact submit appends exactly one lead — the invalid attempt never appears in Session leads or either export."
type = "binary"
weight = 1.0

