[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Layout adapts from 1440px desktop to 375px mobile: bento hero cells stack vertically at mobile widths, and every chapter, form, and Events Manager remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px, primary interactive controls (hamburger, theme toggle, form submit, manager filters) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Display chapter titles and body copy resize between 1440px and 375px without becoming illegible at either width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "At 1440px and 375px, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "mega_menu_becomes_fullscreen_drawer"
description = "At mobile widths the mega-menu becomes a full-screen drawer opened from the oversized hamburger; sticky chrome still exposes the Ridge wordmark and theme toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "why_ridge_pile_desktop_only"
description = "At ≥768px the Why Ridge chapter uses the sticky card pile with progressively larger top offsets; below 768px the four pillars render as a static vertical list."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "get_started_column_reflow"
description = "Get started renders as 1 column at mobile widths and three-up from the sm breakpoint; the hero pull-in composition applies at 1024px and up."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "hero_and_grids_resize"
description = "The hero visual plane, Solutions grid, and News carousel size responsively to fit the layout at 1440px and 375px without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "sticky_chrome_accessible_all_widths"
description = "Sticky top chrome (Ridge wordmark, theme toggle, hamburger) remains reachable at 1440px and 375px without permanently obscuring chapter content."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_mobile_rechoreography"
description = "At 375px the brand-first bento hero, Why Ridge pillars, and Global Events chapter are re-choreographed into a stacked mobile composition that preserves hierarchy rather than a broken shrink of the desktop grid."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "At 1440px or 375px the layout breaks, overflows, or loses required chrome (sticky header, hamburger drawer, or Events Manager entry)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_narrow_width"
description = "At 375px body or chapter heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 1440px or 375px content is cropped or unnecessary scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_menu_missing_or_unresponsive"
description = "At 375px the hamburger is absent, or tapping it leaves the full-screen mega-menu drawer closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "sticky_chrome_obscures_content"
description = "Sticky chrome permanently obscures hero or chapter content with no recoverable scroll offset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_or_stacking_failure"
description = "At 1440px or 375px elements overlap incorrectly, or the Why Ridge sticky pile / static list stacking order breaks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "why_ridge_pile_on_mobile"
description = "Below 768px the Why Ridge pillars still behave as a sticky overlapping pile instead of falling back to a static vertical list."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "media_static_size_overflows"
description = "The hero visual plane or chapter imagery uses a static size that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "theme_or_manager_disappears_at_width"
description = "The theme toggle or Events Manager entry control disappears at 375px while remaining required chrome."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.20"
name = "palette_export_usable_at_375"
description = "At 375px width the command palette, Export catalog, and Session leads panel stay fully on-screen and operable rather than clipping off the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.21"
name = "bulk_bar_no_horizontal_scroll"
description = "At 375px width the bulk action bar wraps or stacks without introducing horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_or_palette_clipped_mobile"
description = "At 375px width Export catalog, Session leads, or the command palette clips off-screen or forces horizontal scroll"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
