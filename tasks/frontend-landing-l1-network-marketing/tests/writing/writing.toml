[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings, nav labels, and CTAs, they use one consistent capitalization convention throughout (including all-caps chapter titles such as RIDGE GLOBAL EVENTS)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "cta_and_manager_labels_specific"
description = "Where the app renders button or action labels, they use specific verbs for Ridge actions (for example View all, Create event, or contact send labels) rather than generic Submit/OK alone when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_field_and_fix"
description = "Where the app renders error messages on event create or contact forms, they name the problem field and the fix rather than only saying Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders Events Manager empty states (no events remaining, or filters match none), the copy explains what belongs there and how to add an event or clear filters."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "marketing_copy_spelling_grammar"
description = "Where the app renders body or marketing copy (hero mission, Why Ridge pillars, Get started, Global Events, Solutions, Community), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "ridge_terminology_consistent"
description = "Where the app renders the product name, terminology stays consistent as Ridge (lowercase ridge wordmark where shown) rather than mixing leftover real-network proper nouns."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "event_dates_formatted_consistently"
description = "Where the app renders event dates in Events Manager rows and Global Events listings, date formatting is consistent across surfaces."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_state_outcome"
description = "Where the app renders confirmation and success messages after a valid contact submit, they state what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "institutional_tech_voice"
description = "Where the app renders marketing copy, it reads in a coherent institutional-tech voice for an enterprise blockchain product rather than casual template filler."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "partner_marks_are_invented_names"
description = "Where the app renders trust-strip and partner marks, invented placeholder names appear — never real company logos, trademarks, or real-network proper nouns."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "export_import_labels_specific"
description = "Where the app renders export and import controls, labels use specific verbs (Export JSON, Export ICS, Copy, Download, Load catalog, Download leads JSON, Copy leads JSON, Undo last lead) rather than generic Submit/OK alone"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.12"
name = "copy_confirmation_states_outcome"
description = "Where the app renders Copy confirmation on Export or Session leads, the message states that the catalog or leads JSON was copied rather than a vague OK alone"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.13"
name = "empty_session_leads_copy_explains"
description = "Where the app renders an empty Session leads state, the copy explains that contact submissions will appear there"
type = "binary"
weight = 0.5

