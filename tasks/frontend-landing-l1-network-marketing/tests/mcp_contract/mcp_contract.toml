[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_contract_modules_bound"
description = "Contract modules browse-query-v1, form-workflow-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, form, entity, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, form, entity, and artifact tool handlers drive the same visible UI logic as on-page controls (theme/destinations including session-leads, contact validate/submit/cancel/reset, event create/select/update/delete/toggle, export/import/copy for json, ics, and leads-json)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented browse, form, entity, and artifact permitted_operations are available — no undeclared routes beyond the contract's module specs."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/set_theme/apply_filter/sort, form validate/submit/cancel/reset, entity create/update/delete/toggle, and artifact export/import/copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_event_operations_work"
description = "Entity operations create, select, update, delete, and toggle work for the bound entity event with fields title, date, city, category, status, and featured, and delete requires confirm=true."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_validate_submit_cancel_bound"
description = "Form-workflow operations validate, submit, cancel, and reset are bound for fields name, email, company, interest, privacy_consent, and message and surface the same validation/success UI as manual use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_filters_theme"
description = "Browse open works for declared destinations marketing-home, events-manager, global-events, export-catalog, and session-leads; apply_filter/clear_filter use status and category; sort uses date and title; set_theme updates light/dark via the same handlers as the theme toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / form-workflow-v1 / entity-collection-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound for export formats json, ics, and leads-json and import mode declared-catalog; invoking them drives the same Export catalog / Load catalog / Download leads JSON UI paths (without returning raw file contents in MCP results)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_leads_json_reflects_session"
description = "After a successful contact submit via UI or form MCP, invoking artifact.export with format leads-json acknowledges the live session lead log (same store as the visible Session leads panel / ridge-session-leads.json download)."
type = "binary"
weight = 1.0

