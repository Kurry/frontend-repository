[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "module_and_control_radius_tokens"
description = "Computed styles expose large module radii and smaller control radii consistent with --ridge-radius-module and --ridge-radius-control rather than arbitrary one-off corner values on every surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "display_typography_matches_spec"
description = "All-caps chapter titles use an expressive geometric display face distinct from body copy; body text remains smaller and secondary across Why Ridge, Get started, and Global Events."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_screenshots"
description = "At 1440px desktop width, composition matches /reference-screenshots/ overview and segment panels within a small tolerance for sticky chrome, brand-first bento hero, Why Ridge pile, Global Events, and footer density/proportions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Spec-required motion states are present via the real UI path: page-load entrance, Why Ridge sticky pile at ≥768px, Get started rise below 1024px, RIDGE GLOBAL EVENTS character-decode, and theme toggle rotate/fade."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_spec"
description = "Responsive behavior matches the spec: bento stacks on mobile, Why Ridge sticky pile only at ≥768px, hero pull-in at ≥1024px, Get started 1-column mobile / three-up from sm, mega-menu as full-screen drawer on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "notched_controls_and_modules"
description = "Light content modules on black fields use dual corner language (large radii plus architectural diagonal notches) and notched CTAs rather than unstyled browser-default buttons."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes oversized all-caps chapter titles from supporting body copy across the landing chapters."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states match the spec where specified: theme toggle sun/moon swap, notched CTA hover brighten + arrow nudge, event-row hover wash, and focus-visible rings on interactive controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_void_ink_accent"
description = "Color treatments follow the Ridge system: black-void modules, ink/surface tokens, and a saturated ember/alpine-red accent (not purple) on the geometric mark and interactive accents."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec_timing"
description = "Hover/press microinteractions follow the spec language (CTA brighten + arrow nudge, tile lift preserving notch silhouette, theme toggle animate) rather than instant snaps with no transition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "hardened_tools_match_ridge_system"
description = "Events Manager rollup/bulk bar, Export catalog panel, Session leads panel, and command palette match the Ridge void/notch and ember-accent system from the reference screenshots' visual language rather than introducing a second unrelated UI kit"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "session_leads_additive_without_breaking_order"
description = "Session leads sits near the footer after conversion forms without removing or reordering the reference landing chapters shown in the screenshots"
type = "binary"
weight = 1.0

