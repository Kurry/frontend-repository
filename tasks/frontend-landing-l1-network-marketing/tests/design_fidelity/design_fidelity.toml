[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "module_and_control_radius_tokens"
description = "Computed styles expose large module radii and smaller control radii consistent with --ridge-radius-module and --ridge-radius-control rather than arbitrary one-off corner values on every surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "display_typography_matches_spec"
description = "All-caps chapter titles use an expressive geometric display face distinct from body copy; body text remains smaller and secondary across Why Ridge, Get started, and Global Events."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_screenshots"
description = "At 1440px desktop width, composition matches /reference-screenshots/ overview and segment panels within a small tolerance for sticky chrome, brand-first bento hero, Why Ridge pile, Global Events, and footer density/proportions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Spec-required motion states are present via the real UI path: page-load entrance, Why Ridge sticky pile at ≥768px, Get started rise below 1024px, RIDGE GLOBAL EVENTS character-decode, and theme toggle rotate/fade."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_spec"
description = "Responsive behavior matches the spec: bento stacks on mobile, Why Ridge sticky pile only at ≥768px, hero pull-in at ≥1024px, Get started 1-column mobile / three-up from sm, mega-menu as full-screen drawer on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "notched_controls_and_modules"
description = "Light content modules on black fields use dual corner language (large radii plus architectural diagonal notches) and notched CTAs rather than unstyled browser-default buttons."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes oversized all-caps chapter titles from supporting body copy across the landing chapters."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states match the spec where specified: theme toggle sun/moon swap, notched CTA hover brighten + arrow nudge, event-row hover wash, and focus-visible rings on interactive controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_void_ink_accent"
description = "Color treatments follow the Ridge system: black-void modules, ink/surface tokens, and a saturated ember/alpine-red accent (not purple) on the geometric mark and interactive accents."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec_timing"
description = "Hover/press microinteractions follow the spec language (CTA brighten + arrow nudge, tile lift preserving notch silhouette, theme toggle animate) rather than instant snaps with no transition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "radius_tokens_contradicted"
description = "Visible module and control corners contradict the dual-radius system (large modules vs small controls) with arbitrary mismatched radii."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_ridge_palette"
description = "Surfaces or accents use purple-indigo gradients, glow spam, or cream-and-terracotta editorial washes outside the cool architectural Ridge palette."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440px chapter display titles or body copy are grossly mismatched versus the brand-first hierarchy (display titles not oversized, or body competing with display)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_motion_missing"
description = "Required animations are missing: no page-load entrance on a fresh load, no Why Ridge sticky pile at ≥768px, or no RIDGE GLOBAL EVENTS character-decode on enter-view."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary CTAs or form controls use unstyled browser-default appearance when the spec requires notched/token-styled Ridge controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_screenshots"
description = "At 1440px the sticky chrome / hero / Why Ridge / Global Events composition is grossly misaligned versus /reference-screenshots/ segment panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key regions (bento hero, Why Ridge pillars, Global Events headline, Events Manager) render off-screen or clipped at 1440px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure omits a required chapter (Why Ridge with pillars 01–04, Get started trio, Global Events, News carousel, Solutions grid, Community, or Events Manager mode)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/case throughout the landing chapters)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_spec"
description = "Hover language or theme swap microinteractions are missing or clearly deviate from the spec (instant snaps, no CTA arrow nudge, no event-row hover wash)."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.20"
name = "hardened_tools_match_ridge_system"
description = "Events Manager rollup/bulk bar, Export catalog panel, Session leads panel, and command palette match the Ridge void/notch and ember-accent system from the reference screenshots' visual language rather than introducing a second unrelated UI kit"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "session_leads_additive_without_breaking_order"
description = "Session leads sits near the footer after conversion forms without removing or reordering the reference landing chapters shown in the screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "tools_break_reference_language"
description = "Export catalog, Session leads, or command palette introduce a visually unrelated kit (default browser chrome, purple glow, cream editorial) that breaks fidelity to the Ridge reference language"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
