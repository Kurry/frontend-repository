[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.4"
name = "hydration_clean_console"
description = "First load and a full exercise of the app produce a console free of errors, hydration mismatch errors or warnings, and unhandled promise rejections, and the interactive islands become usable without throwing"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "interactive_within_two_seconds"
description = "The page is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "stable_layout_after_load"
description = "After first paint, no visible layout jumps occur as fonts or media finish loading, and the hero visual plane holds its reserved space from the start"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "smooth_full_page_scroll"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through every animated chapter with no visible hitching"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operable_focus_visible"
description = "Every interactive control — theme toggle, hamburger, mega-menu links, manager filters, form fields, CTAs — is reachable and operable with the keyboard alone and shows a visible focus indicator when focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "mega_menu_focus_trap_escape"
description = "While the mega-menu drawer is open, Tab keeps focus inside the drawer; pressing Escape closes it and focus returns to the hamburger control"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "decoded_headline_accessible_name"
description = "The RIDGE GLOBAL EVENTS heading exposes the full final phrase as its accessible name while the individually animated characters are hidden from the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "validation_announced_aria_live"
description = "Form validation messages are exposed through an aria-live polite region in addition to being shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "theme_toggle_accessible_name"
description = "The theme toggle exposes an accessible name that reflects its current state and updates when toggled"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.14"
name = "deep_link_parity"
description = "Loading the app's URL (and any route or deep link the UI exposes, such as an Events Manager route or section anchor) directly in a fresh tab renders the full page with the same chrome and seeded baseline as reaching it through in-app navigation — no 404s or half-rendered shells"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "in_memory_export_undo_state"
description = "After create/edit/delete, contact lead append, export, undo, and theme toggle, the app keeps working from in-memory client state: Export catalog and ridge-session-leads.json reflect the session and Undo restores mutations without reading browser storage APIs for events/leads/theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "filters_sorts_shared_collection"
description = "Status/category filters and date/title sorts recompute the visible Events Manager rows from one shared collection — changing sort after a filter still shows only the filtered membership"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "lead_log_and_exports_share_one_store"
description = "Shared-state coherence: after a successful contact submit, the Session leads list/total, Download leads JSON, and Export JSON leads array agree on counts and payload fields without reload"
type = "binary"
weight = 1.0

