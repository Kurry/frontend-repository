[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "first_viewport_brand_hero"
description = "On load, the first viewport is a brand-first single composition (not a dashboard): sticky Ridge chrome with a lowercase 'ridge' wordmark and geometric mark, a left bento mission cell, a right bento cell containing a local clock and a SCROLL affordance, and a dominant full-bleed atmospheric hero visual plane below"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_events_visible"
description = "After opening Events Manager (from Global Events 'View all' or a header control), at least 6 seeded events are visible, each showing a title, date, city, category tag(s), and a status of upcoming, featured, or past"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "created_event_title_visible"
description = "After creating an event titled 'Harbor Builder Summit' with a valid date, the text 'Harbor Builder Summit' is visible in the events list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "triple_create_count_delta"
description = "After adding 3 new events on top of the seed set, the events list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "status_filter_narrows"
description = "After filtering events by status (e.g. upcoming) with mixed statuses present, only matching events remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "edited_title_replaces_old"
description = "After editing an event title to 'Evening Validator Meetup', the text 'Evening Validator Meetup' is visible and the previous title is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "deleted_event_removed"
description = "After deleting an event, that event title is no longer visible in the events list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_state_after_all_deleted"
description = "After deleting all events, an empty state with an explanatory message is visible in Events Manager"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "empty_title_create_blocked"
description = "After submitting create with an empty required event title, the events count does not increase and an inline validation message naming the title field is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "mode_switch_without_reload"
description = "After switching between Marketing Scroll mode and Events Manager mode, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "theme_toggle_recolors_all_surfaces"
description = "After clicking the sun/moon theme toggle pill, the sticky chrome, landing chapters, and Events Manager all recolor between light and dark styling without the document reloading"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "hover_feedback_present"
description = "When hovering notched CTAs, event rows, or interactive tiles, a visible hover wash, brightness, or arrow nudge appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "why_ridge_sticky_or_fallback"
description = "On desktop width, scrolling Why Ridge pins pillars into a progressive sticky stack (or reduced-motion/mobile shows the vertical-list fallback)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "load_entrance_runs"
description = "On a fresh first load, watch the first viewport: the sticky chrome and bento cells animate into place rather than appearing pre-settled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "global_events_headline_decodes"
description = "Scroll to the Ridge Global Events chapter and confirm the headline resolves from scrambled decoy glyphs to RIDGE GLOBAL EVENTS"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "mega_menu_panels_light_dismiss"
description = "Opening the header hamburger shows a full-screen/drawer mega-menu with Build, Solutions, Community, and About panels, and clicking outside the open panel (light-dismiss) closes it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "header_hamburger_only_nav"
description = "The sticky header contains no traditional horizontal navigation link row — navigation lives only in the oversized hamburger mega-menu, and every mega-menu CTA stays in-page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "filter_flow_status_category_clear"
description = "Starting from the full events list with at least one created event added: applying a status filter narrows the rows to matches; switching to a category filter recomputes the rows from the same shared collection; clearing all filters restores the full seeded-plus-created list exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "missing_date_create_blocked"
description = "Submitting the event create form without a date adds no event — the visible event count stays unchanged — and an inline validation message naming the date field appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "create_flow_cross_surface"
description = "Full create flow: note the Events Manager row count, submit a valid new upcoming event, and confirm — without any reload — that the form closes, the manager row count increases by exactly one measured immediately around the submit, and the same event title appears in the Global Events landing listings whose status filter matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "edit_flow_cross_surface"
description = "Full edit flow: change an event's title or status in Events Manager and confirm the same record updates everywhere it appears — the manager row, the Global Events landing listings, and any featured slot showing it — without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "delete_flow_cross_surface"
description = "Full delete flow: delete an event that is visible on the landing chapters, and confirm its manager row disappears, the visible manager count decreases by exactly one measured immediately around the delete, and the same event vanishes from the landing listings and any featured slot in the same session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "theme_flow_preserves_state"
description = "Full theme flow: with an active events filter applied, toggle to dark mode and confirm chrome, hero, chapters, and Events Manager recolor together; toggle back and confirm light styling returns while the events collection contents and the active filter remain exactly as they were"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "reload_restores_seeded_baseline"
description = "Multi-facet reload probe: create an event, apply a filter, switch the theme, and open the mega-menu, then reload the page — the app returns coherently to its seeded baseline: the original seeded events (at least 6, without the created one), default theme, closed mega-menu, and default filters, never a mix of surviving and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "double_submit_adds_one_event"
description = "Rapidly double-activating the event create submit control adds exactly one event: the visible count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "filter_no_match_empty_state"
description = "When active filters match no events, the list region shows an empty state with a clear-filters control, and activating that control restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "empty_state_create_control"
description = "The Events Manager empty state shown after deleting all events includes a control that opens the create flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "contact_form_invalid_blocked"
description = "Submitting a contact/email form with a malformed email, without privacy consent, name shorter than 2 characters, missing interest, or a provided message shorter than 10 characters shows inline errors naming the offending field, the success state does not appear, and no Session lead is appended"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "contact_submit_gated_then_succeeds"
description = "The contact form's submit control stays disabled until every required field (name ≥2, email format, interest enum, privacy consent) is valid, and a valid submit then shows an in-page success state, appends one Session lead, with no page navigation and no outbound form POST in the network log"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "featured_flag_surfaces_on_landing"
description = "Marking an event as featured in Events Manager surfaces that event in the featured slots of the landing chapters, and unmarking (or deleting) it removes it from those slots"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "landing_chapters_present"
description = "Scrolling the landing page top to bottom passes through the featured initiative strip, Why Ridge chapter, Get started onboarding trio, placeholder-partner trust strip, developer resources, Network in action seeded lists, News & stories carousel, Solutions grid, Community block, and the Ridge Global Events chapter with its featured summit card"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "bento_clock_shows_live_time"
description = "The hero bento clock shows the current local time and updates while the page is open"
type = "binary"
weight = 0.5


[[criterion]]
id = "1.37"
name = "status_rollup_counts_live"
description = "Events Manager shows a live status rollup strip with exact counts for upcoming, featured, and past; creating a valid upcoming event increments the upcoming count by exactly one without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "sort_by_date_or_title_reorders"
description = "In Events Manager, sorting by date or title reorders the visible rows from the same shared collection, and toggling the active sort direction reverses that order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "bulk_delete_selected_removes_all"
description = "Selecting at least two events and activating Delete selected removes every selected row in one operation; the manager count drops by the selected count and those titles vanish from matching landing listings without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "export_json_contains_session_mutations"
description = "After creating an event titled Harbor Builder Summit and submitting one valid contact lead, opening Export catalog shows a JSON preview with top-level version, theme, events, leads, and counts keys whose events array includes Harbor Builder Summit with date, city, category, status, and featured fields and whose leads array includes that contact payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "export_ics_has_vevent_per_event"
description = "Opening Export catalog ICS preview shows a payload beginning with BEGIN:VCALENDAR, containing exactly one VEVENT per current event with a DTSTART and a SUMMARY naming the event title, and ending with END:VCALENDAR"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "export_copy_confirms"
description = "Activating Copy on the Export JSON (or ICS) preview shows a brief copied confirmation while the copied text matches the visible preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "import_declared_catalog_restores"
description = "After exporting the catalog to JSON, deleting an event so the manager count drops, then importing that exported JSON via Load catalog / declared-catalog, the prior event titles and count reappear in Events Manager and matching landing listings without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "undo_restores_deleted_event"
description = "Deleting an event and activating Undo restores that event to the manager list, status rollups, and landing listings together; Redo removes it again from all three"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "command_palette_navigates_in_page"
description = "Opening the command palette with Ctrl+K or Cmd+K (or the chrome Command control), choosing Events Manager, then choosing Export catalog navigates between those in-page surfaces without leaving the site; Escape closes the palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "session_leads_panel_live_count"
description = "Near the footer, a Session leads panel shows a live total count starting at 0 with empty-state copy; after a successful contact submit the total increments by exactly one and a newest-first lead row (kind contact, email, name/interest label) appears without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "download_ridge_session_leads_json"
description = "After at least one successful contact submit, activating Download leads JSON triggers a real download named ridge-session-leads.json whose body is live-compiled JSON with version 1, theme, counts.total, and a leads array entry containing id, kind contact, submittedAt, and the contact payload fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "copy_leads_json_shows_copied"
description = "Activating Copy leads JSON copies the same ridge-session-leads.json text and shows a visible Copied confirmation that clears within a few seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "undo_last_lead_decrements"
description = "With two or more leads present, Undo last lead removes only the newest row, decrements the Session leads total by exactly one, and leaves older leads visible; a subsequent Download leads JSON omits the undone entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "contact_lead_field_contract"
description = "A valid contact submit requires name at least 2 characters, email with @ and domain, interest one of Build/Solutions/Community/Enterprise, and privacy_consent true; optional company may be present; optional message when provided is at least 10 characters; the success state's lead payload matches those fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "event_field_contract_enums_and_featured"
description = "Creating or editing an event enforces title and city at least 2 characters, date as YYYY-MM-DD, category one of Summit/Meetup/Workshop/Hackathon/Webinar, status one of upcoming/featured/past, and the featured/status cross-field rule (featured true iff status is featured); invalid values show inline field errors and do not add or corrupt the row"
type = "binary"
weight = 1.0

