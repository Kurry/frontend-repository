[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "signature_microinteractions_polished"
description = "Notched CTAs brighten with arrow nudge, tiles ease lift while preserving notch silhouette, and event rows take a hover wash — microinteractions feel polished rather than unfinished stubs (verified via real hover on the UI path)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "scroll_storytelling_execution"
description = "On a fresh load, scroll-triggered storytelling (Why Ridge sticky pile at ≥768px, Get started rise below 1024px, RIDGE GLOBAL EVENTS character-decode) executes as a choreographed sequence rather than missing or janky stubs."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "hero_load_entrance_execution"
description = "The required page-load entrance — sticky chrome sliding down, bento cells via clip-path expansion, hero plane last — executes as a finished one-shot sequence on a fresh load rather than painting fully settled with no entrance."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "ridge_brand_narrative_arc"
description = "The long-form page reads as one Ridge institutional-tech narrative arc from brand-first hero through Why Ridge, Get started, Network in action, News, Solutions, Community, and Global Events rather than disconnected template blocks."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a1"
name = "designed_experience_narrative_arc"
description = "The page reads as a designed experience with a narrative arc — black-void modules, dual corner notches, and signature motion build on each other visually, and the Global Events decode is memorable rather than a template with effects sprinkled on."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a2"
name = "showcase_rechoreographed_at_narrow_widths"
description = "Impeccable execution across breakpoints: at 375px the showcase composition is re-choreographed (stacked bento, full-screen drawer, static Why Ridge list) rather than a broken shrink of the desktop layout."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "signature_motion_absent_or_stubbed"
description = "Signature motions are absent or stubbed: no page-load entrance on a fresh load, no Why Ridge sticky pile at ≥768px, and no RIDGE GLOBAL EVENTS character-decode via the real scroll path."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n2"
name = "experience_reads_as_generic_template"
description = "The page reads as a generic marketing template with default type/spacing and none of the Ridge notch, black-void module, or kinetic-type execution quality."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n5"
name = "page_flat_static_no_immersion"
description = "The page is flat and static with no load entrance, no scroll chapter motion, and no theme transition despite the instruction requiring them."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "11.8"
name = "catalog_operator_tooling_polish"
description = "Export JSON/ICS plus ridge-session-leads.json with live session fidelity, undo across surfaces, Session leads operator panel, and command-palette navigation read as polished tooling beyond a static marketing page — verified through the real UI paths"
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
