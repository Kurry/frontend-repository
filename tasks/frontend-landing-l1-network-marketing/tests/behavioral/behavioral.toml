[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting on the homepage: toggle theme to dark, open Events Manager and apply a status filter, create one valid upcoming event, and submit one valid contact lead; then reload. All facets coherently reset to the seeded baseline (default theme, closed mega-menu, default filters, at least 6 seeded events without the created row, Session leads total 0) — never a mixed partial survival of some facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "status_filter_derived_list_changes"
description = "Derived-view sensitivity: in Events Manager, apply a status filter and confirm the visible rows change to matching events only; clear the filter and confirm the full list restores exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_manager_and_landing"
description = "Cross-view echo: edit an event's title in Events Manager, then view Global Events landing listings without reload; the same updated title appears in both the manager row and matching landing listings."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: note the Events Manager row count, submit one valid new upcoming event, and confirm the count increases by exactly one with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_event_titles_different_rows"
description = "Input-dependent output: create two events with different titles via Events Manager; both rows appear with their respective titles rather than identical hardcoded labels."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_theme_and_create"
description = "Interleaved-flow integrity: toggle theme to dark, create a valid event in Events Manager, toggle theme back to light; the new event remains in the manager list and the final theme matches the last toggle — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_events"
description = "Edge-state round-trip: delete events until Events Manager shows its empty state, then create one valid event; the empty state clears and the manager list shows exactly one row while landing listings that match its status update accordingly."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_in_memory_state_survives_reload"
description = "After configuring theme, Events Manager filter, and a created event, a reload leaves an incoherent mix (for example dark theme survives while the created event resets, or a filter survives alone)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "filter_list_ignores_inputs"
description = "Applying different status or category filters in Events Manager leaves the visible row set identical (derived list ignores filter inputs)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_titles_produce_identical_rows"
description = "Creating two events with different titles yields byte-identical row labels or only one distinct title appears for both creates."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "edit_stale_until_reload_on_landing"
description = "After editing an event title in Events Manager, Global Events landing listings keep the prior title until a full page reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.9"
name = "export_then_import_round_trip"
description = "Starting from seeded events: create one upcoming event and one contact lead, open Export catalog and capture the JSON preview text, delete that event so the count drops, then import the captured JSON; the created title and prior count return in Events Manager and matching landing listings, and Session leads restore from the packet."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_after_delete_restores_export"
description = "Delete an event, confirm it is absent from Export JSON, press Undo, and confirm the title reappears in the manager list and in the next Export JSON preview together."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "sort_reversal_changes_order"
description = "Sort reversal: in Events Manager apply sort by title, note the first visible title, toggle sort direction, and confirm the first visible title changes (order reversed) without altering the underlying collection membership."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "rollup_sensitive_to_status_edit"
description = "Derived-view sensitivity: note the upcoming and past rollup counts, edit one upcoming event's status to past, and confirm upcoming decreases by one and past increases by one immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "lead_export_input_dependent_payloads"
description = "Input-dependent output: perform two contact submits with different emails/names; the exported ridge-session-leads.json leads payloads differ accordingly (not byte-identical hardcoded rows)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "undo_last_lead_updates_export_and_count"
description = "Cross-view echo: after Undo last lead, both the Session leads list/total and a subsequent Copy/Download leads JSON export omit the undone entry and show the decremented counts.total."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "theme_mirrored_in_lead_and_catalog_export"
description = "Toggle to dark, then Download leads JSON and Export JSON; both report theme dark matching the document; toggle back to light and export again reports theme light."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_ignores_session_work"
description = "After create/edit/delete or contact-lead mutations, Export JSON/ICS or ridge-session-leads.json remain byte-identical to the pre-mutation seed catalog or empty leads log."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_skips_export_or_rollups"
description = "Undo after delete restores the manager row but leaves Export JSON and/or status rollups stuck on the deleted state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "lead_exports_identical_despite_different_submits"
description = "Two successful contact submits with different emails/names produce exported leads arrays that are byte-identical or still empty."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
