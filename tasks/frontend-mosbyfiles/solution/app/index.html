<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Field Notes Archive—American Modernist Architecture</title>
  <meta name="description" content="A research-driven archive exploring the architects who built American Modernism—independently of Europe, and on their own radical terms." />
  <link rel="icon" href="/media/storyblok/f/290489675855311/512x512/e59ab9d052/favicon.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body class="__body">
  <div class="__app is-loading" id="app">
    <!-- Fixed centered header -->
    <header class="the-header" id="header">
      <button type="button" class="the-header__logo" data-nav="home" aria-label="Field Notes Archive home">Field Notes Archive</button>
      <nav class="the-nav" style="display:flex;gap:1.5rem"><button type="button" class="the-nav__item" id="navReadingList">Reading list</button>
        <button type="button" class="the-nav__item" data-nav="about">About</button>
      </nav>
    </header>

    <!-- Case sub-header (only on case routes) -->
    <div class="the-sub-header is-hidden" id="subHeader">
      <button type="button" class="the-sub-header__back" data-nav="home">Field Notes Archive</button>
      <span class="the-sub-header__cat" id="subHeaderCat"></span>
    </div>

    <div id="readingListDrawer" style="position:fixed;top:0;right:0;width:320px;height:100vh;background:#191919;border-left:1px solid rgba(255,255,255,.2);z-index:2500;transform:translateX(100%);transition:transform .4s cubic-bezier(.33,1,.68,1);padding:2rem;display:flex;flex-direction:column;gap:1rem;font-family:'IBM Plex Mono',monospace;color:#fff;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="margin:0;font-size:1.25rem;">Reading list</h2>
        <button type="button" id="closeReadingList" style="background:none;border:none;color:#fff;font-size:1.5rem;" aria-label="Close reading list">✕</button>
      </div>
      <div id="readingListContent" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;"></div>
      <button type="button" id="exportDossierBtn" style="padding:.5rem;background:#fff;color:#191919;border-radius:4px;">Export dossier</button>
      <button type="button" id="importDossierBtn" style="padding:.5rem;background:rgba(255,255,255,.1);color:#fff;border-radius:4px;">Import dossier</button>
      <input type="file" id="importDossierFile" style="display:none;" accept=".json" />
      <div id="importError" style="color:#ff6b6b;font-size:0.8rem;"></div>
    </div>

    <!-- Dossier Export Panel -->
    <div id="dossierExportPanel" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:none;align-items:center;justify-content:center;padding:2rem;opacity:0;transition:opacity .3s ease;">
      <div style="background:#191919;width:100%;max-width:800px;border-radius:8px;padding:2rem;transform:translateY(2rem);transition:transform .3s cubic-bezier(.33,1,.68,1);display:flex;flex-direction:column;gap:1rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h2 style="margin:0;font-family:'Founders Grotesk',sans-serif;font-size:2rem;text-transform:uppercase;color:#fff;">Export dossier</h2>
          <button type="button" id="closeExportPanel" style="background:none;border:none;color:#fff;font-size:1.5rem;" aria-label="Close export panel">✕</button>
        </div>
        <div style="display:flex;gap:1rem;font-family:'IBM Plex Mono',monospace;color:#fff;">
          <label><input type="radio" name="exportFormat" value="json" checked> Dossier JSON</label>
          <label><input type="radio" name="exportFormat" value="markdown"> Reading report markdown</label>
        </div>
        <textarea id="dossierPreview" readonly aria-label="Dossier preview" style="width:100%;height:300px;background:#111;color:#fff;font-family:monospace;padding:1rem;border:1px solid rgba(255,255,255,.2);border-radius:4px;resize:none;"></textarea>
        <div style="display:flex;gap:1rem;">
          <button type="button" id="copyDossierBtn" style="flex:1;padding:.75rem;background:rgba(255,255,255,.1);color:#fff;border-radius:4px;font-family:'IBM Plex Mono',monospace;">Copy</button>
          <button type="button" id="downloadDossierBtn" style="flex:1;padding:.75rem;background:#fff;color:#191919;border-radius:4px;font-family:'IBM Plex Mono',monospace;">Download</button>
        </div>
      </div>
    </div>

    <!-- Command Palette -->
    <div id="commandPalette" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:none;align-items:flex-start;justify-content:center;padding-top:10vh;opacity:0;transition:opacity .2s ease;">
      <div style="background:#191919;width:100%;max-width:600px;border-radius:8px;border:1px solid rgba(255,255,255,.2);transform:translateY(1rem);transition:transform .2s cubic-bezier(.33,1,.68,1);display:flex;flex-direction:column;">
        <input type="text" id="cmdInput" placeholder="Search destinations..." aria-label="Command palette search" style="width:100%;padding:1.5rem;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.2);color:#fff;font-family:'Founders Grotesk',sans-serif;font-size:1.5rem;outline:none;" />
        <ul id="cmdResults" style="list-style:none;margin:0;padding:0;max-height:400px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,.7);"></ul>
      </div>
    </div>

    <main id="views">
      <!-- HOME -->
      <section class="view is-active" id="view-home" data-route="home">
        <div class="section-hero">
          <h1 class="section-hero__title split-reveal" id="heroTitle">American modernism</h1>
          <p class="section-hero__desc">A research-driven archive exploring the architects who built American Modernism — independently of Europe, and on their own radical terms.</p>
        </div>
        <div class="home-controls" style="padding:0 var(--container-offset) 2rem; max-width: 1400px; margin: 0 auto; display:flex; gap:1rem; flex-wrap:wrap;">
          <select id="categoryFilter" aria-label="Category filter" style="background:var(--color-primary);color:var(--color-contrast);border:1px solid rgba(255,255,255,.3);padding:.5rem;border-radius:4px;font-family:'IBM Plex Mono',sans-serif;">
            <option value="all">All</option>
            <option value="organic">Organic & Early Modernism</option>
            <option value="expressive">Expressive</option>
            <option value="monumental">Monumental Modernism</option>
            <option value="place">Place / culture continuity</option>
          </select>
          <input type="text" id="homeSearch" placeholder="Search architects..." aria-label="Search architects" style="background:var(--color-primary);color:var(--color-contrast);border:1px solid rgba(255,255,255,.3);padding:.5rem;border-radius:4px;font-family:'IBM Plex Mono',sans-serif; flex:1; min-width:200px;" />
        </div>
        <div class="stack" id="stack"></div>
      </section>

      <!-- CASE -->
      <section class="view" id="view-case" data-route="case"></section>

      <!-- ABOUT -->
      <section class="view" id="view-about" data-route="about"></section>
    </main>

    <!-- Popup lightbox -->
    <div class="popup" id="popup" role="dialog" aria-modal="true" aria-label="Media popup">
      <div class="popup__bg" data-popup-close></div>
      <div class="popup__box">
        <button type="button" class="popup__close" data-popup-close aria-label="Close popup">✕</button>
        <div class="popup__media" id="popupMedia"></div>
        <div class="popup__info" id="popupInfo"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
