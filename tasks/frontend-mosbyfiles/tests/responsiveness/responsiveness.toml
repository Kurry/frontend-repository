[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "root_font_scales_across_breakpoints"
description = "Root font size scales by viewport as specified: 12px at or below 320, 13px through 768 (measured 13px at 390 with ~18px container offset), 14px through 1024, 15px above 1024, 16px at or above 1440 (measured 16px with ~34px container offset), and 18px at or above 1920."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "narrow_tap_targets_operable"
description = "At 390px width, architect tags, sibling tags, close buttons, and the About/home controls remain operable tap targets rather than unusable micro-hits."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_between_breakpoints"
description = "Between the mandated breakpoints (320, 480, 768, 900, 1024/1025, 1440, 1920), display and body type continue to scale through fluid clamp values rather than locking to a single fixed pixel size until the next breakpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "On any of the ten routes, content never clips or overflows the viewport at 320, 390, 768, 1024, 1440, or 1920 pixel widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "about_collapses_to_single_column"
description = "On narrow viewports the about route collapses from its desktop two-column layout to a single column with the essay above the gallery, both fully readable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "case_broken_grid_recomposes_narrow"
description = "At narrow widths the case broken-grid recomposes: the oversized architect name scales down but keeps its layered relationship with the folder sheet, sibling tags remain operable, and scrapbook items stay inside the viewport rather than collapsing into a plain static stack that loses the filing-cabinet metaphor."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "native_touch_scroll_on_narrow"
description = "On narrow viewports, native touch scrolling physics stay intact (smooth-scroll hijack does not fight touch scroll)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_key_widths"
description = "No horizontal scroll bar appears at 320, 390, 768, 1024, 1440, or 1920 pixel widths on any of the ten routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "stack_heights_and_tag_sizes_adapt"
description = "On tablet/mobile widths home stack category group heights reduce to ~20vh and ~15vh respectively; architect tags render at 1.625rem on desktop, 1.25rem at or below 1024, and 15px at or below 480; at 390 the hero paragraph drops to a 16px override."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_header_accessible_across_widths"
description = "The fixed home header (wordmark + About) and case sub-header remain reachable and usable across the specified widths without obscuring primary content permanently."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.40"
name = "narrow_panels_operable_at_390"
description = "At a 390 pixel width the reading-list drawer, command palette, and dossier export panel remain fully operable inside the viewport without horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.41"
name = "filter_search_wrap_at_390"
description = "At a 390 pixel width the home category filter and search field wrap or stack rather than overflowing the viewport."
type = "binary"
weight = 1.0

