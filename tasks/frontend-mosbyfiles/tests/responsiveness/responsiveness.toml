[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "root_font_scales_across_breakpoints"
description = "Root font size scales by viewport as specified: 12px at or below 320, 13px through 768 (measured 13px at 390 with ~18px container offset), 14px through 1024, 15px above 1024, 16px at or above 1440 (measured 16px with ~34px container offset), and 18px at or above 1920."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "narrow_tap_targets_operable"
description = "At 390px width, architect tags, sibling tags, close buttons, and the About/home controls remain operable tap targets rather than unusable micro-hits."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_between_breakpoints"
description = "Between the mandated breakpoints (320, 480, 768, 900, 1024/1025, 1440, 1920), display and body type continue to scale through fluid clamp values rather than locking to a single fixed pixel size until the next breakpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_key_widths"
description = "On any of the ten routes, content never clips or overflows the viewport at 320, 390, 768, 1024, 1440, or 1920 pixel widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "about_collapses_to_single_column"
description = "On narrow viewports the about route collapses from its desktop two-column layout to a single column with the essay above the gallery, both fully readable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "case_broken_grid_recomposes_narrow"
description = "At narrow widths the case broken-grid recomposes: the oversized architect name scales down but keeps its layered relationship with the folder sheet, sibling tags remain operable, and scrapbook items stay inside the viewport rather than collapsing into a plain static stack that loses the filing-cabinet metaphor."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "native_touch_scroll_on_narrow"
description = "On narrow viewports, native touch scrolling physics stay intact (smooth-scroll hijack does not fight touch scroll)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_key_widths"
description = "No horizontal scroll bar appears at 320, 390, 768, 1024, 1440, or 1920 pixel widths on any of the ten routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "stack_heights_and_tag_sizes_adapt"
description = "On tablet/mobile widths home stack category group heights reduce to ~20vh and ~15vh respectively; architect tags render at 1.625rem on desktop, 1.25rem at or below 1024, and 15px at or below 480; at 390 the hero paragraph drops to a 16px override."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_header_accessible_across_widths"
description = "The fixed home header (wordmark + About) and case sub-header remain reachable and usable across the specified widths without obscuring primary content permanently."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_specified_breakpoints"
description = "Layout breaks or overflows at one of the specified widths (320, 390, 768, 1024, 1440, or 1920) on home, about, or a case route."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "narrow_controls_too_small"
description = "At 390px, architect tags, close buttons, or About/home controls are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_jumps_only_at_breakpoints"
description = "Display or body type locks to a single fixed pixel size between breakpoints with abrupt jumps only when a breakpoint fires, ignoring fluid clamp scaling."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "horizontal_scroll_or_cropping"
description = "A horizontal scrollbar appears or content is cropped at 320, 390, 768, 1024, 1440, or 1920 on any route."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "about_two_column_stuck_on_narrow"
description = "On a narrow viewport the about route stays stuck in an unreadable two-column layout with essay and gallery colliding or clipped."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_header_obscures_content"
description = "The fixed header or case sub-header permanently obscures primary case or home content with no way to reach it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "case_grid_collapses_to_static_stack"
description = "At narrow widths the case layout collapses into a plain static stack that loses the layered filing-cabinet relationship between architect name, folder sheet, sibling tags, and scrapbook."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "scrapbook_or_media_overflows_viewport"
description = "Scrapbook items, portraits, or about-gallery images use static sizes that overflow the viewport at a specified width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "tags_or_close_disappear_at_width"
description = "Architect tags, sibling tags, or red circular close buttons disappear at a specific viewport width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.40"
name = "narrow_panels_operable_at_390"
description = "At a 390 pixel width the reading-list drawer, command palette, and dossier export panel remain fully operable inside the viewport without horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.41"
name = "filter_search_wrap_at_390"
description = "At a 390 pixel width the home category filter and search field wrap or stack rather than overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n40"
name = "panels_force_horizontal_scroll_390"
description = "At 390 pixel width, opening the reading list, command palette, or dossier export introduces a page-level horizontal scrollbar or clips primary controls off-screen."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
