[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "mara_voss_solo_sibling_non_navigating"
description = "On the Mara Voss case, the sibling tag region shows only Mara Voss's own tag, and activating that tag does not navigate away from the Mara Voss case."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "popup_locks_background_scroll"
description = "While a media popup is open, the page behind it cannot scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "every_close_path_stops_media"
description = "Every close path of a media popup — the red circular close button and the dimmed backdrop alike — stops any audio or video that is still playing and restores background scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "scrapbook_drag_clamps_to_region"
description = "A scrapbook item dragged and released at the boundary of the scrapbook region stays within the region and remains draggable afterward."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "overscroll_advances_exactly_one"
description = "Triggering the overscroll affordance once advances exactly one case in the architect sequence, never two."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "interactive_controls_use_semantic_tags"
description = "Architect tags, sibling tags, the overscroll affordance, About/home links, and red circular close buttons use semantic buttons or links rather than unlabeled non-interactive shells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "media_popup_close_button_and_backdrop"
description = "Media popups support both close paths specified by the reference: the red circular close button and clicking the dimmed backdrop both dismiss the overlay."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "overscroll_affordance_labelled"
description = "Each case route shows a bottom overscroll affordance labelled to open the next case so the advance action is discoverable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "mara_voss_sibling_navigates_away"
description = "On Mara Voss, activating the solo sibling tag navigates away from the Mara Voss case."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "popup_allows_background_scroll"
description = "While a media popup is open, the page behind it still scrolls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "close_leaves_media_playing"
description = "Closing a media popup via the red circular close button or dimmed backdrop leaves audio or video still playing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "scrapbook_item_escapes_region"
description = "A scrapbook item released at the scrapbook boundary escapes outside the region or becomes undraggable afterward."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_nonsemantic"
description = "Primary interactive archive controls (tags, close buttons, overscroll affordance) are non-semantic div/span shells without button/link roles."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "popup_not_dismissible"
description = "A media popup cannot be dismissed via the red circular close button or the dimmed backdrop."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "overscroll_label_missing_or_ambiguous"
description = "The case bottom overscroll control shows a blank or generic label (e.g. OK/Submit) instead of indicating opening the next case."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "overscroll_skips_or_jumps_two"
description = "A single overscroll trigger advances two or more cases, or skips the next architect in sequence."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "empty_note_pin_still_lists"
description = "Pinning a case with an empty field note still adds the architect to the reading list with an empty-note hint, and the dossier JSON still lists that architect among pins (empty note string allowed under the field contract)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "malformed_import_keeps_state"
description = "Importing malformed or empty dossier JSON, or JSON that violates the Dossier JSON field contract (wrong schemaVersion, missing pins/notes/scrapbookOffsets, unknown architect slug, duplicate pin, note over 500 characters, or x/y outside 0 through 100), leaves existing pins and notes unchanged, shows a visible validation message naming the offending field or payload, and does not crash the archive."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "undo_noop_when_empty_stack"
description = "Pressing Undo when no scrapbook drag has occurred leaves every scrapbook item in place and does not change the reading list or pins."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "filter_and_search_intersect"
description = "With both a category filter and a search query active, only tags that match both constraints stay operable; clearing either control re-expands the set according to the remaining constraint."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "escape_palette_keeps_media_popup"
description = "Closing the command palette with Escape while a media popup is open leaves the popup open and the media state unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "overlong_field_note_rejected"
description = "Committing a field note longer than 500 characters shows inline validation naming the note field and leaves the previously saved note, reading-list preview, and dossier preview unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "malformed_import_wipes_pins"
description = "Importing malformed or schema-invalid dossier JSON clears existing pins or notes or crashes the archive UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "empty_undo_mutates_state"
description = "Pressing Undo with an empty undo stack moves scrapbook items or clears pins/notes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n13"
name = "overlong_note_silently_accepted"
description = "A field note longer than 500 characters is saved without naming the note field and appears in the reading list or dossier preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
