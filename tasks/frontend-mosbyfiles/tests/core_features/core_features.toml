[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.4"
name = "category_cover_exact_fills"
description = "The category covers compute their exact fills: Organic & Early Modernism #1E4BD7, Expressive #0C7866, Monumental Modernism #581E70, and Place / culture continuity #D71E1E"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "folder_cover_3d_reveals_sheet"
description = "After opening a case via a tag, the folder cover transforms in 3D (a rotateY matrix3d transform), not a flat opacity fade, revealing the portrait sheet with a born/died line and biography"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "scrapbook_drag_stays_released"
description = "When dragging a scrapbook note or photo with the pointer, the item follows and stays at its released position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "offline_assets_and_empty_storage"
description = "After exercising navigation, popups, and media across the home, about, and case routes, the network log contains zero non-candidate-origin asset requests (no Storyblok, Vercel Blob, Vimeo, or web font hosts) and localStorage and sessionStorage remain empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "home_document_title_and_hero"
description = "The document title is exactly \"Field Notes Archive—American Modernist Architecture\" and the home hero shows the display title \"American modernism\" with a supporting paragraph"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "four_category_group_names"
description = "The home stack shows four category groups named exactly \"Organic & Early Modernism\", \"Expressive\", \"Monumental Modernism\", and \"Place / culture continuity\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "eight_architect_tags_by_category"
description = "All eight architect names appear as tags mapped to the correct categories: Ada Mercer and Elias North under Organic & Early Modernism, Mara Voss under Expressive, Julian Kade and Imani Vale and Pavel Rowan under Monumental Modernism, Lucian Shore and Mae Calder under Place / culture continuity"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "tag_click_swaps_case_route"
description = "Clicking an architect tag swaps the visible route to that case page without a full page reload, showing the architect name as the largest heading and the matching case document title (e.g. \"Julian Kade—Field Notes Archive\")"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "portrait_sheet_placeholder_content"
description = "Each case route reveals a portrait sheet carrying an original or generated placeholder portrait of the architect, a born and died line, and a biography, sitting under a folder cover in the architect's category color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "sibling_tags_swap_case"
description = "Each case shows rotated sibling tags for the other architects in its category, and clicking a sibling tag swaps to that sibling case (Julian Kade, Imani Vale, and Pavel Rowan link to each other)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "scrapbook_item_types_present"
description = "Each case shows a scrapbook of loose positioned items drawn from notes, photographs, a paperclip, a plan or drawing, and per architect a video poster, a PDF preview, or an audio card"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "louis_kahn_waveform_audio_parts"
description = "The Julian Kade case opens a waveform audio player with two parts julian_kade_part_1 and julian_kade_part_2 that draw waveform bars from local data and play and pause local audio"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "video_popup_local_media_closes"
description = "A video case (e.g. Mara Voss) opens a media popup that plays a local video with a local poster image, and the red close button and the dimmed backdrop both close the popup and stop the media"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "about_route_essay_gallery_and_hidden_header"
description = "The About route shows the exact document title \"About Field Notes Archive—The Archive & The Idea\" with the fixed home header hidden, a long-form essay that rejects a Bauhaus-only origin story, situates the archive in a Ukrainian architectural education, states the selection principles, and closes that the folder is open, a photo gallery whose captions name the Tide Court, the River Assembly Hall, the Northline Arts Building, and the East Archive Pavilion, an original placeholder archivist signature graphic, and a red circular close button that returns to home"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "ten_distinct_routes_render"
description = "All ten distinct routes are reachable (home, about, and the eight case routes ada-mercer, elias-north, mara-voss, julian-kade, imani-vale, pavel-rowan, lucian-shore, mae-calder), each loadable by its own URL as well as by in-app navigation, and every case route renders its architect heading without error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "overscroll_advances_exactly_one_case"
description = "Starting on the Julian Kade case: triggering the overscroll affordance at the bottom once advances to exactly one next architect case in sequence (never two), and the case sub-header category name, the largest heading, the folder cover color, and the document title all update to the new architect's values without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "footer_graphics_and_placeholder_credit"
description = "The footer, revealed inside the unfolded home stack cover, shows two wind rose graphics, an architectural scale graphic, a masked signature, and an original placeholder studio credit mark that is the only link presenting outbound navigation"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "fixed_header_wordmark_and_about_item"
description = "The home route shows a fixed centered header whose left element is an original placeholder Field Notes Archive wordmark that navigates back to home when clicked, and whose right element is a single About navigation item"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "category_unfold_reveals_footer"
description = "Each home category group shows a short category thesis line and a chevron affordance; clicking a category cover header unfolds that group, and unfolding the fourth category cover (Place / culture continuity) reveals the footer content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "case_document_titles_exact"
description = "Each case route's document title matches exactly: \"Ada Mercer—Field Notes Archive\", \"Elias North—Field Notes Archive\", \"Mara Voss—Field Notes Archive\", \"Julian Kade—Field Notes Archive\", \"Imani Vale—Field Notes Archive\", \"Pavel Rowan—Field Notes Archive\", \"Lucian Shore—Field Notes Archive\", and \"Mae Calder—Field Notes Archive\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "open_case_flow_full_chain"
description = "Starting fresh on the home route: clicking the Ada Mercer tag swaps to that case without a full page reload; in the same flow the fixed home header hides, a case sub-header appears showing a link back to home and the category name \"Organic & Early Modernism\", the document title becomes exactly \"Ada Mercer—Field Notes Archive\", and the case shows the architect name heading, the #1E4BD7 folder, the portrait sheet, the Elias North sibling tag, and the scrapbook; then clicking the sub-header home link returns to the home route with all four category groups and all eight architect tags still present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "sibling_swap_updates_all_surfaces"
description = "Starting on the Julian Kade case: clicking the Imani Vale sibling tag swaps to the Imani Vale case without a full page reload, the largest heading and the document title update to \"Imani Vale\" and \"Imani Vale—Field Notes Archive\", the folder cover stays the Monumental Modernism color #581E70, and the sibling tag region recomputes to link to Julian Kade and Pavel Rowan"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "media_popup_round_trip_scroll_lock"
description = "On a video case: clicking the video poster opens the popup, dims the page behind it, and disables background scroll (the page beneath cannot be scrolled while it is open); pressing play shows visible playing state in the player; closing via the red circular close button and, on a second open, via the dimmed backdrop both stop the media and restore background scroll, with the case beneath unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "scrapbook_reload_returns_seeded_positions"
description = "After dragging at least two scrapbook items to new positions on a case route, reloading that route returns every scrapbook item to its seeded position (in-memory state only)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "gehry_sole_sibling_tag_no_navigation"
description = "The Mara Voss case, alone in its category, shows only its own tag in the sibling tag region, and clicking that tag keeps the app on the Mara Voss case"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.39"
name = "boundary_drag_stays_in_region"
description = "A scrapbook item released at the boundary of the scrapbook region stays within the region and can still be dragged again afterward"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.40"
name = "category_filter_narrows_home_stack"
description = "On home: choosing Monumental Modernism in the category filter leaves only that group's three architect tags operable while the other three category groups are dimmed or hidden; choosing All restores all four groups and eight tags."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "home_search_filters_architect_tags"
description = "On home: typing a substring of Ada Mercer into the search field leaves the Ada Mercer tag operable and hides or disables non-matching tags; clearing the search restores all eight tags."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "pin_adds_to_reading_list"
description = "On a case: activating Pin adds that architect to the reading-list drawer and marks the control as pinned; activating again removes the architect from the reading list and clears the pinned mark."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "field_note_saves_to_list_and_dossier"
description = "On a case: committing a Field note whose body includes a distinct token (at most 500 characters) updates that architect's reading-list preview (when pinned) and appears under notes in the Export dossier JSON preview without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "scrapbook_undo_redo_restores_offsets"
description = "After dragging a scrapbook item to a new position via the real pointer path, Undo or Ctrl+Z restores the prior position inside the scrapbook region; Redo or Ctrl+Shift+Z reapplies the dragged position."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "command_palette_opens_and_navigates"
description = "Pressing Ctrl+K opens a command palette with a focused search input; typing enough of Imani Vale to highlight that case and pressing Enter swaps to the Imani Vale case without a full page reload and closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "dossier_export_contains_session_work"
description = "After pinning Julian Kade and committing a field note containing kade-note-alpha, the Export dossier Dossier JSON preview contains schemaVersion exactly field-notes-archive.dossier.v1, julian-kade inside pins, and kade-note-alpha under notes; Copy writes the visible preview text and Download offers a .json file for that format."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "dossier_markdown_report_lists_pins"
description = "With at least one pinned architect and a saved note, switching Export dossier to Reading report markdown shows that architect as a heading with the note beneath and a summary line stating pin and non-empty note counts."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "dossier_import_restores_pins_notes"
description = "After exporting Dossier JSON that conforms to the field contract (schemaVersion field-notes-archive.dossier.v1 with pins, notes, scrapbookOffsets), reloading to clear in-memory state, and importing that JSON, the reading list shows the same pins with the same note bodies."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "dossier_json_exposes_field_contract_keys"
description = "With any session state, the Export dossier Dossier JSON preview visibly includes the required top-level keys schemaVersion, pins, notes, and scrapbookOffsets, and schemaVersion equals field-notes-archive.dossier.v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "field_note_rejects_overlong_body"
description = "On a case: attempting to commit a Field note longer than 500 characters shows inline validation naming the note field and does not update the stored note, reading-list preview, or dossier JSON notes entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "invalid_dossier_import_rejects_schema"
description = "With at least one pin present, importing Dossier JSON with wrong schemaVersion or an unknown architect slug shows visible validation naming the offending field or payload and leaves the existing pin set and notes unchanged."
type = "binary"
weight = 1.0

