[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "category_and_display_title_casing"
description = "Where the app renders category names and display titles, they keep the specified strings and casing (Organic & Early Modernism, Expressive, Monumental Modernism, Place / culture continuity; hero American modernism) consistently."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "nav_and_affordance_labels_specific"
description = "Where the app renders navigation and action labels (About, overscroll to open the next case, close), they are specific rather than generic Submit/OK placeholders."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "editorial_prose_spelling_grammar"
description = "Where the app renders the hero paragraph, category thesis lines, architect biographies, and the about essay, rate how free the long-form editorial prose is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "architect_names_consistent"
description = "Where the app renders the eight fictional architect names (Ada Mercer, Elias North, Mara Voss, Julian Kade, Imani Vale, Pavel Rowan, Lucian Shore, Mae Calder), terminology stays consistent across home tags, case headings, sibling tags, and document titles."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "uppercase_nav_footer_monospace"
description = "Where the app renders navigation, footer, and monospace scrapbook labels, they keep one consistent uppercase convention."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "exact_document_titles"
description = "Where the app sets document titles, home is exactly Field Notes Archive—American Modernist Architecture; about is exactly About Field Notes Archive—The Archive & The Idea; and each case matches its exact string (e.g. Julian Kade—Field Notes Archive)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_or_lorem_visible"
description = "Lorem ipsum or placeholder filler text (TODO, Lorem, asdf, or template variables such as {{title}}) is visible anywhere in the shipped UI, including hero, theses, biographies, or the about essay."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as the hero title American modernism, category names, or primary navigation."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "architect_names_inconsistent"
description = "The same architect is named inconsistently across home tags, case headings, sibling tags, or document titles."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders hero, thesis, biography, or about essay copy unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.9"
name = "dossier_and_reading_list_labels_specific"
description = "Where the app renders reading-list empty state, dossier import validation naming the offending field or payload, field-note overlong validation naming the note field, and action labels such as Pin, Field note, Save note, Undo, Redo, Export dossier, Copy, Download, and Import dossier, labels stay specific and free of placeholder filler."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "new_chrome_uses_placeholder_labels"
description = "Reading-list, dossier, or pin/note chrome shows lorem ipsum, TODO, or generic OK/Submit placeholders instead of the specified action labels."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
