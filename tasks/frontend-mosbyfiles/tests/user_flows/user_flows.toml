[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "home_tag_opens_case_without_reload"
description = "Starting on home: clicking an architect tag (e.g. Julian Kade) swaps to that case without a full page reload; the fixed home header hides, a case sub-header appears with a home link and the category name, the document title becomes exactly Julian Kade—Field Notes Archive, and the case shows the architect name, category-colored folder, portrait sheet, sibling tags, and scrapbook."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "case_sub_header_home_returns_stack"
description = "From an open case: clicking the sub-header home link returns to the home route without a full page reload; all four category groups (Organic & Early Modernism, Expressive, Monumental Modernism, Place / culture continuity) and their eight architect tags are still present."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "sibling_tag_swaps_case_surfaces"
description = "From the Julian Kade case: clicking the Imani Vale sibling tag swaps to the Imani Vale case without a full page reload; the largest heading, folder color, and document title all update to Imani Vale's values, and the sibling region recomputes to link Julian Kade and Pavel Rowan."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "overscroll_advances_next_case"
description = "On a case route: triggering the bottom overscroll affordance labelled to open the next case swaps to the next architect in sequence without a full page reload; the sub-header category name, largest heading, folder color, and document title all update to the new architect."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "media_popup_play_and_close_round_trip"
description = "On a video case (e.g. Mara Voss): clicking the video-poster scrapbook item opens a popup that dims the page and disables background scroll; pressing play shows a visible playing state; closing via the red circular close button or the dimmed backdrop stops media, restores background scroll, and leaves the case beneath unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "deep_link_parity_ten_routes"
description = "Loading any of the ten routes directly by URL (home, about, and the eight cases ada-mercer through mae-calder) renders the same view, header or sub-header state, and exact document title as reaching that route through in-app navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "scrapbook_drag_resets_on_reload"
description = "On a case: drag one or more scrapbook items to new positions within the scrapbook region, then reload that case URL; every scrapbook item returns to its seeded position (in-memory client state, no persistence)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "about_close_returns_home"
description = "On the about route: the red circular close button returns to home; the fixed home header is forced hidden while on about and is available again on home."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "category_unfold_reveals_footer"
description = "On home: clicking a category cover header unfolds that group; unfolding the fourth category (Place / culture continuity) reveals the footer content (wind roses, scale, signature mask, studio credit)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "case_navigation_recovers_without_reload"
description = "After opening a case, navigating via sibling tags or overscroll, and returning home via the sub-header link, the archive remains fully operable without requiring a full page reload to recover."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "pin_note_dossier_pipeline"
description = "On Julian Kade: pin the case, commit a field note containing kade-note-alpha, open Export dossier, and confirm the Dossier JSON preview contains schemaVersion exactly field-notes-archive.dossier.v1, julian-kade inside pins, and kade-note-alpha under notes; unpinning removes that architect from the reading list and from the next compiled preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "scrapbook_undo_redo_flow"
description = "On a case: drag a scrapbook item to a new position, press Undo or Ctrl+Z so it returns to its prior position, then press Redo or Ctrl+Shift+Z so it returns to the dragged position."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "palette_navigates_to_case"
description = "Press Ctrl+K, type enough of Imani Vale to highlight that case result, press Enter; the app swaps to the Imani Vale case without a full page reload and the palette closes."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "category_filter_then_all"
description = "On home: choose Monumental Modernism so only that group's three tags remain operable, then choose All so all four groups and eight tags return."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "dossier_export_import_round_trip"
description = "Pin two architects with distinct field notes, export Dossier JSON that satisfies the field contract, reload to clear session state, import that JSON, and confirm the reading list shows both pins with the same note bodies."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "invalid_dossier_import_keeps_prior_pins"
description = "With at least one pin already present, import a dossier payload with wrong schemaVersion or an unknown architect slug; visible validation names the problem, the existing pin set stays unchanged, and the reading list still shows the prior pin."
type = "binary"
weight = 1.0

