[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "No console.error output or unhandled promise rejections appear in the browser log while exercising navigation, popups, and media across the routes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "The network log for the home, about, and every case route contains only candidate-origin asset requests, with content imagery resolving under local /media/storyblok/f paths, audio and waveform data under /media/blob/audio, and videos under /media/videos"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "Fonts resolve to the self-hosted families Signifier, Founders Grotesk, and IBM Plex Mono with no request to a web font service"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "The category cover backgrounds compute to the exact colors rgb(30, 75, 215), rgb(12, 120, 102), rgb(88, 30, 112), and rgb(215, 30, 30), which are hex #1E4BD7, #0C7866, #581E70, and #D71E1E, each with white text rgb(255, 255, 255)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "2_7"
description = "The page background computes to rgb(25, 25, 25) with text rgb(253, 250, 247) and gray body text rgb(120, 122, 127), and the fixed header background computes to rgba(25, 25, 25, 0.8) with a 1px rgba(255, 255, 255, 0.1) bottom border"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "localStorage or sessionStorage is written during the session"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "A route issues a request to a.storyblok.com, a Vercel Blob host, player.vimeo.com, or a Google Fonts host"
type = "binary"
weight = 1.0
negate = true
