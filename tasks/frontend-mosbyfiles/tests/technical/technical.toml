[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "console_clean_during_exercise"
description = "No console.error output or unhandled promise rejections appear in the browser log while exercising navigation, popups, and media across the routes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "local_media_path_network_only"
description = "The network log for the home, about, and every case route contains only candidate-origin asset requests, with content imagery resolving under local /media/storyblok/f paths, audio and waveform data under /media/blob/audio, and videos under /media/videos"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "self_hosted_open_license_fonts"
description = "Fonts resolve to three self-hosted families — a condensed grotesque display face, a serif text face, and IBM Plex Mono — loaded from the candidate origin with no request to a web font service"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "surface_text_and_header_computed_colors"
description = "The page background computes to rgb(25, 25, 25) with text rgb(253, 250, 247) and gray body text rgb(120, 122, 127), and the fixed header background computes to rgba(25, 25, 25, 0.8) with a 1px rgba(255, 255, 255, 0.1) bottom border"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "hydration_clean_console"
description = "The console shows no hydration mismatch errors or warnings on first load of any of the ten routes, and none after client-side navigation between routes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "deep_link_parity_all_routes"
description = "Loading each of the ten routes directly by its URL renders the same view as reaching it through in-app navigation, including the same header or sub-header state and the same exact document title, with no route 404ing or rendering a half-empty shell"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "routes_interactive_within_two_seconds"
description = "Every route becomes interactive within roughly 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "smooth_frames_and_rapid_navigation"
description = "Continuous scrolling and the folder open and close transitions hold a smooth frame rate with no visible hitching or input lag between wheel or trackpad movement and the page response, and rapid repeated navigation between cases stays responsive with no hangs or stuck transition states"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "split_headings_keep_accessible_label"
description = "The character-split display headings (hero title and case architect names) keep their full phrase available to assistive technology through a label on the heading container while the individual character spans stay out of the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "keyboard_operability_visible_focus"
description = "The header wordmark and About item, the architect tags, the sibling tags, the overscroll affordance, and every red circular close button are reachable and operable with the keyboard alone, each showing a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "popup_focus_moves_and_returns"
description = "Opening a media popup moves keyboard focus into the popup, and closing it returns focus to the element that opened it"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.16"
name = "single_store_surface_coherence"
description = "The header hidden state, the case sub-header category name, and the document title all follow the same active case the route shows: after any navigation path (tag, sibling, overscroll, deep link) no surface displays a stale or different case's value"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "semantic_controls_and_dialog"
description = "Interactive controls (header wordmark, About, architect tags, sibling tags, overscroll, close buttons) are semantic buttons or links with accessible names, and the open media popup behaves as a dialog that keeps keyboard focus inside until closed"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.19"
name = "layout_stable_after_first_paint"
description = "After first paint on a fresh load of home, about, and a case route, no visible layout jumps occur as fonts, portraits, or scrapbook media finish loading; folder and media regions hold their reserved space from the start"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "required_authored_asset_files_load"
description = "Browser network and playback evidence shows all portraits, scrapbook imagery, five distinct VP9 WebM/poster pairs, both Julian Kade audio files and waveform datasets, four gallery images, marks, and SVG artwork loading from same-origin paths with no 404, decode, or playback failure"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.40"
name = "in_memory_pins_notes_clear_on_reload"
description = "After pinning architects and saving field notes, a full page reload returns pins, notes, scrapbook offsets, and undo stacks to the seeded empty/baseline state (in-memory only; no localStorage persistence)."
type = "binary"
weight = 1.0

[[criterion]]
id = "10.41"
name = "dossier_compiles_from_live_store"
description = "Export dossier preview updates from the live shared store when pins, notes, or scrapbook offsets change, without requiring a document reload, and the JSON preview keeps schemaVersion field-notes-archive.dossier.v1 with pins, notes, and scrapbookOffsets keys."
type = "binary"
weight = 1.0

[[criterion]]
id = "10.42"
name = "field_note_and_import_show_named_validation"
description = "Invalid Field note (body over 500 characters) and schema-invalid Import dossier each show visible validation naming the offending field or payload before any state mutation."
type = "binary"
weight = 1.0

