[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_interactive_under_2s"
description = "Every route is interactive within roughly 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_all_ten_routes"
description = "No console errors, warnings, or hydration mismatch messages appear on any of the ten routes, on first load or after in-app navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "chrome_responds_without_multi_second_lag"
description = "Header, architect tags, and case chrome respond without multi-second lag after first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_folder_and_nav"
description = "The UI remains interactive during folder open/close and sibling/case navigation (controls stay clickable after transitions settle)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "scroll_and_folder_hold_frame_rate"
description = "Continuous scrolling and the folder open and close transitions hold a smooth frame rate with no visible hitching or dropped frames."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_case_navigation_stays_responsive"
description = "Rapid repeated navigation between cases stays responsive with no hangs and no stuck transition states."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_archive_session_stable"
description = "After an extended session of case navigation, scrapbook dragging, and media popup open/close, the page remains responsive without runaway resource use that freezes interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.a1"
name = "scroll_linked_overscroll_frame_rate"
description = "Scroll-linked overscroll lift and continuous home/case scrolling hold a smooth frame rate through the interaction on a 1440-wide viewport with no visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a2"
name = "smooth_scroll_inertia_settles"
description = "On desktop, smooth-scroll inertia settles naturally without lag between wheel or trackpad movement and the page response."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a4"
name = "layout_stable_after_load"
description = "After first paint, no visible layout jumps occur as fonts, portraits, or scrapbook media finish loading — folder and media regions reserve their space from the start; after server-rendered content appears there is no post-hydration content flash that reflows text, folders, or media."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass before a route is interactive on a local cold load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_or_hydration_errors"
description = "Console errors, warnings, or hydration mismatch messages appear on first load or after in-app navigation across the ten routes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.a3"
name = "heavy_assets_collapse_frame_rate"
description = "Heavy visual assets (portraits, WebM posters, scrapbook media) or folder transitions cause frame-rate collapse, delayed first render, or input latency during signature interactions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "folder_or_scroll_transitions_block"
description = "Folder open/close or smooth-scroll transitions block interaction for multiple seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "During folder open or hero reveal, primary controls (tags, About, close) become unresponsive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "hydration_flash_or_blank_load"
description = "After server-rendered content appears, text, folders, or media visibly flash/reflow as the client takes over, or the UI blocks with a blank page while resources load instead of reserved-space layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_nav_crashes_or_sticks"
description = "Rapid case navigation crashes the page or leaves a permanently stuck transition state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.40"
name = "palette_filter_dossier_stay_responsive"
description = "Opening the command palette, filtering the home stack, compiling the dossier preview after pin and note changes, and undoing a scrapbook drag stay responsive with no multi-second freezes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n40"
name = "dossier_compile_or_palette_hangs"
description = "Opening Export dossier after pin/note changes, or opening the command palette, hangs the UI for multiple seconds or leaves the archive unresponsive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
