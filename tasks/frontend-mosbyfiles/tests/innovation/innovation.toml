[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "folder_open_execution_quality"
description = "Score execution quality of the reference experience (not invention beyond it): the folder-open morph from stack slot into case layout with 3D cover rotateY feels polished and coherent rather than an unfinished opacity crossfade stub."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "choreographed_case_entrance_execution"
description = "On opening a case via a real home tag click, the choreographed sequence (cover open, character-staggered architect name, sibling tags rising, scrapbook rising/fading) executes smoothly as one timeline rather than four unrelated fades."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "filing_cabinet_narrative_arc"
description = "The archive reads as one Field Notes Archive filing-cabinet narrative from home stack through case folders and the about essay rather than disconnected template blocks."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a1"
name = "designed_experience_narrative_arc"
description = "The page reads as a designed experience with a narrative arc — home stack, case folders, scrapbook, and about build on each other visually and the signature folder interaction is memorable as faithful reference execution, not a template with effects sprinkled on."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a2"
name = "showcase_rechoreographed_at_narrow_widths"
description = "Impeccable execution across breakpoints: at 390 the showcase composition is re-choreographed (stack heights, tag sizes, case broken-grid, about single column) rather than a broken shrink of the desktop layout."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "signature_folder_motion_absent_or_stubbed"
description = "Signature reference motions are absent or stubbed: no 3D folder open/close, no choreographed case entrance, and no scrapbook rise when opening a case via the real UI path."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n2"
name = "recreation_feels_generic_template"
description = "The recreation reads as a generic portfolio template with default type/spacing and none of the reference's filing-cabinet stack, broken-grid case, or kinetic-type execution quality."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n5"
name = "archive_flat_static_no_immersion"
description = "The archive is flat and static with no folder morph, no stack hover/unfold language, and no scrapbook layering despite the reference requiring them."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.8"
name = "dossier_panel_execution_polish"
description = "Optional execution quality: the research dossier panel and reading-list drawer feel polished and coherent with the filing-cabinet archive rather than bolted-on default modals — still faithful to the reference language, not a competing product invention."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable execution-quality enhancement of the reference experience that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick, and must not invent design beyond the reference. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
