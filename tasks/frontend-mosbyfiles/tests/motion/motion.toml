[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "folder_open_3d_rotatey_inertial"
description = "Clicking an architect tag opens the folder with a three-dimensional rotateY cover rotation and position morph revealing the sheet, not a flat opacity crossfade; the opened cover computes a matrix3d transform (rotateY) with a transition of transform 0.8s cubic-bezier(0.33, 1, 0.68, 1) inertial easing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "hero_split_reveal_on_fresh_load"
description = "On a fresh page load of the home route, the hero title \"American modernism\" reveals by splitting into lines and characters that rise from a two-rem offset and fade from zero to full opacity in a staggered sequence"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "stack_cover_hover_and_unfold"
description = "Hovering a home category group lifts and rotates its cover and rotates its chevron; unfolding a group animates its expansion"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "architect_tag_hover_lift"
description = "Hovering a real architect tag lifts it upward via a translateY transform toward -10px with a drop shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "about_nav_and_close_hover"
description = "Hovering the About navigation item raises its opacity from a rest value of 0.8 toward 1 (opacity 0.65s transition), and the circular close button computes a scale(0.970) transform on hover over a transform 0.325s transition with its icon scaling"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "about_gallery_crossfade"
description = "The About gallery crossfades between its photographs, the images computing a transition of opacity 0.65s cubic-bezier(0.33, 1, 0.68, 1), with the active caption at full opacity and inactive captions hidden"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "scrapbook_drag_motion"
description = "Scrapbook notes and photographs can be dragged with the pointer and stay at their released position"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "media_popup_enter_leave_motion"
description = "Media popups enter and leave with a fading dimmed background, a rising info box, fading media, and a close button that scales up from a smaller size"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.9"
name = "sibling_folder_next_reentry"
description = "Clicking a sibling tag animates a folder-next re-entry with the architect name re-splitting into characters and the folder and sheet re-entering"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "wind_rose_and_header_scroll_hide"
description = "The wind roses rotate continuously as ambient motion via a keyframe animation of 40s infinite iteration, and the fixed header hides on scroll-down and returns on scroll-up on the home route while staying forced-hidden on About"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.11"
name = "folder_open_flat_opacity_only"
description = "The folder open and close is a flat opacity fade with no three-dimensional rotateY rotation or Flip-style morph"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.12"
name = "scrapbook_items_not_draggable"
description = "Scrapbook items are static and cannot be dragged with the pointer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.13"
name = "hover_feedback_missing"
description = "Hover feedback is missing on architect tags, the navigation item, and the stack covers, so the interface feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.14"
name = "case_open_reveals_name_tags_scrapbook"
description = "After clicking a real architect tag to open a case, the folder-open sequence runs as one orchestrated timeline: the cover rotates open, then the architect name reveals character by character with a horizontal stagger, then sibling tags rise into view, then scrapbook items rise from below while fading in — not four unrelated simultaneous fades"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "folder_close_on_return_home"
description = "Returning from a case to home via the sub-header home link rotates the folder cover back toward closed and fades the scrapbook out, rather than cutting instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.16"
name = "page_turn_control_flips_cover"
description = "The page turn control on a case flips the folder cover in three dimensions again, re-closing or re-opening the cover over the sheet"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.17"
name = "overscroll_scroll_linked_lift"
description = "Triggering the overscroll affordance at the bottom of a case through real scrolling lifts the current folder upward by roughly three quarters of the viewport as scroll-linked motion before swapping to the next case, rather than an instant snap navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "media_playback_motion_states"
description = "Video playback shows a themed media control surface whose controls fade after playback starts, and audio playback drives a waveform whose canvas opacity computes about 0.4 at rest and brightens toward 1 while playing"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.19"
name = "reduced_motion_collapses_timelines"
description = "With prefers-reduced-motion emulated and a fresh load, smooth scrolling is disabled and the folder open/close and hero split timelines collapse to their end state immediately while all text remains readable at essential opacity"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.20"
name = "smooth_scroll_inertia_and_transition_freeze"
description = "On desktop, continuous wheel or trackpad scrolling eases with inertia and settles naturally after input stops; during a real folder-open, folder-close, or sibling-navigation transition the smooth-scroll driver freezes and then unfreezes so scroll position does not fight the folder morph"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.21"
name = "overscroll_synced_to_scroll_driver"
description = "Triggering the overscroll affordance through real scrolling lifts the folder as scroll-linked motion synchronized with the same smooth-scroll driver used on the case route, rather than a disconnected timer snap"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.22"
name = "signature_motion_uses_linear_tweens"
description = "The folder-open cover rotation or the hero split reveal uses purely linear easing that starts and stops at constant speed with no inertial settle"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
