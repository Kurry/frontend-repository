[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_aligns_rem_baseline"
description = "At desktop width, spacing, header height, stack offsets, and scrapbook placements align to a consistent rem baseline with offsets landing on multiples of 0.25rem rather than arbitrary one-off pixel values."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec_metrics"
description = "At 1440px width typography matches the spec: condensed grotesque display at weight 700 uppercase (hero title ~145px, case architect name ~120px, about title 52px/3.25rem); serif body/tags at 20px for hero paragraph and tags; IBM Plex Mono nav at 16px/32px line-height, footer 12px uppercase, gallery captions 14px."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.41"
name = "block_fidelity_home_header_bar"
description = "Block: home header bar — fixed centered translucent dark bar with a hairline bottom border, monospace FIELD NOTES ARCHIVE wordmark centered-left and a single About nav item at right (reference: segment-01.png, also atop segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.42"
name = "block_fidelity_hero_title_paragraph"
description = "Block: hero title and paragraph — near-black page opening with a huge two-line condensed uppercase display title AMERICAN MODERNISM in cream above a centered gray serif supporting paragraph (reference: segment-01.png–segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.43"
name = "block_fidelity_cover_organic_early_modernism"
description = "Block: first filing cover — blue (#1E4BD7) ORGANIC & EARLY MODERNISM cover at the top of the four-cover stack with its thesis line, right chevron affordance, and two rounded white paper tag tabs (reference: segment-01.png–segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.44"
name = "block_fidelity_cover_expressive"
description = "Block: second filing cover — teal (#0C7866) EXPRESSIVE cover with its thesis line, chevron affordance, and a single rounded paper tag tab (reference: segment-01.png–segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.45"
name = "block_fidelity_cover_monumental_modernism"
description = "Block: third filing cover — purple (#581E70) MONUMENTAL MODERNISM cover with its thesis line, chevron affordance, and three rounded paper tag tabs (reference: segment-01.png–segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.46"
name = "block_fidelity_cover_place_culture_continuity"
description = "Block: fourth filing cover — red (#D71E1E) PLACE / CULTURE CONTINUITY cover with its thesis line, chevron affordance, and two rounded paper tag tabs closing the stack (reference: segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.47"
name = "block_fidelity_footer_unfolded_cover"
description = "Block: footer inside the unfolded fourth cover — IBM-Plex-Mono-styled uppercase micro-type with two rotating wind rose graphics, an architectural scale graphic, a masked archivist signature, and a fictional studio credit mark, revealed below the stack when the red cover unfolds (reference: below the red cover of segment-02.png, visible only in the unfolded state). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_folder_and_stack_motion_present"
description = "Reference-required motion states are present when driven via the real UI path: 3D folder open/close, stack hover lift/rotate, tag hover lift, and overscroll folder lift — not flat opacity-only substitutes."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns: root font scale at the mandated breakpoints, about collapsing to single column, case broken-grid recomposing at narrow widths, and stack/tag size reductions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "header_and_close_styling_match_spec"
description = "The fixed header computes to a translucent dark bar rgba(25,25,25,0.8) with 1px hairline bottom border rgba(255,255,255,0.1), blur 100px, height 3.75rem/60px, z-index 1000; the circular close button is a 54px red circle rgb(215,30,30) — not unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes uppercase display titles (hero, about, case architect names) from serif body/tags and IBM Plex Mono captions/nav."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover states match the reference where specified: category cover hover lift/rotate, architect tag translateY lift with drop shadow, About opacity 0.8→1, and close-button scale to ~0.970 on hover — verified via real hover on the controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "category_colors_and_surfaces_exact"
description = "Surface and accent colors match exactly: page background rgb(25,25,25)/#191919; cream text rgb(253,250,247); category covers #1E4BD7, #0C7866, #581E70, #D71E1E with white text; accent yellow #FFE927 only as a scarce case/stack background variant."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "folder_sheet_and_scrapbook_anatomy"
description = "Case pages present the folder as a portrait sheet near 210:297 (~0.707) with portrait, monospace born/died line, biography, and texture overlay; scrapbook ephemera (cream notes, rotated photos, paperclip, plan/PDF/video/audio cards) match the reference density and layering."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the rem/0.25rem baseline scale (arbitrary odd-pixel one-offs dominating stack or scrapbook layout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Category covers or chrome use colors outside the specified three-tier palette (wrong hex for the four category covers, or accent yellow flooding general chrome)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizes_mismatch_1440_spec"
description = "At 1440px, hero title, case architect name, about title, or body/tag sizes clearly mismatch the specified pixel/rem metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_folder_motion_missing"
description = "Folder open is a flat opacity crossfade or missing 3D rotateY morph when opening a case via a real home tag click."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "header_or_close_use_browser_defaults"
description = "The fixed header or red circular close button render as unstyled browser-default chrome instead of the specified translucent bar / 54px red circle."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Stack covers, scrapbook items, sibling tags, or about gallery elements render off-screen or clipped at the reference desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order, stack structure (four category groups with eight tags), case anatomy, or about essay/gallery structure visibly deviate from the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_undifferentiated"
description = "Display titles and body/tag text share the same size/weight treatment with no clear hierarchy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "hover_microinteractions_missing"
description = "Category cover hover, architect tag hover lift, About opacity transition, or close-button hover scale are missing when verified via real hover on those controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.40"
name = "hardened_chrome_does_not_break_reference_layout"
description = "At desktop 1440: home stack, case broken-grid, and about two-column layout still match the reference composition; category filter, search, reading list, palette, and dossier controls do not displace or replace the required filing-cabinet surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n40"
name = "new_chrome_replaces_reference_composition"
description = "Hardened chrome (filter/search/dossier/palette) replaces or obscures the reference home stack, case folder sheet, or about gallery composition at desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
