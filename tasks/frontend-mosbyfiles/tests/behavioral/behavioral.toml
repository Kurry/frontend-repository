[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_scrapbook_and_route_reload_reset"
description = "Starting on a case: drag scrapbook items to new positions and note the active architect; then reload that case URL. Scrapbook items coherently reset to seeded positions and the case returns to its seeded baseline — never a mixed survival of drag offsets while other facets reset (in-memory genre)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "case_surfaces_change_with_architect"
description = "Derived-view sensitivity: open Julian Kade then navigate to Imani Vale via sibling tag; the largest heading, folder cover color, document title, and sibling tag set all change meaningfully to Imani Vale's values rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "case_echo_across_header_title_heading"
description = "Cross-view echo: after opening Ada Mercer from a home tag, confirm without reload that the case sub-header category, the largest heading, and the document title all show Ada Mercer's values together — never a stale mix from a prior case."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "overscroll_advances_exactly_one_delta"
description = "Count-delta integrity: note the current architect on a case, trigger the overscroll affordance once, and confirm the visible case advances by exactly one architect in sequence with matching heading and document title — no off-by-one skip."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_tags_open_different_cases"
description = "Input-dependent output: clicking Ada Mercer versus Mara Voss on the home stack yields different case headings, folder colors, document titles, and scrapbook contents appropriate to each architect."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_media_and_sibling_nav"
description = "Interleaved-flow integrity: on a video case open the media popup, close it, then click a sibling tag to another case; the new case renders correctly with no stuck popup, and returning shows media closed — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "mara_voss_solo_sibling_edge_round_trip"
description = "Edge-state round-trip: open Mara Voss (solo sibling tag that does not navigate away), then navigate home and reopen another case; Mara Voss still shows only its own non-navigating sibling tag, and other cases still show their multi-sibling sets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_in_memory_state_survives_reload"
description = "After dragging scrapbook items on a case, a reload leaves an incoherent mix (e.g. some items keep dragged offsets while others reset, or popup/play state survives alone)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "case_surfaces_ignore_navigation"
description = "Navigating between architects leaves heading, folder color, and document title identical to the previous case (derived surfaces ignore the route input)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_tags_produce_identical_cases"
description = "Clicking two different architect tags (e.g. Ada Mercer vs Mara Voss) yields byte-identical heading, folder color, and document title."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "header_title_stale_until_reload"
description = "After a case or sibling navigation, the sub-header category or document title keeps the prior architect until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "dossier_tracks_pin_and_note_mutations"
description = "Derived-view sensitivity: pin Julian Kade, save note token kade-note-alpha, confirm Export dossier JSON contains schemaVersion field-notes-archive.dossier.v1, julian-kade in pins, and kade-note-alpha under notes; unpin and confirm the next compiled preview no longer lists that pin/token."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "dossier_round_trip_after_reload"
description = "Multi-facet reload round-trip (in-memory genre): after exporting a field-contract-valid dossier with two pins and notes, reload clears pins/notes; importing the JSON restores the same pin set and note bodies; scrapbook offsets included in the export also restore on those cases."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_then_new_drag_clears_redo"
description = "Interleaved scrapbook history: drag an item, undo, then perform a new drag; Redo stays disabled or is a no-op until another undo, and the new drag position remains."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "invalid_import_preserves_prior_pins"
description = "Edge-state integrity: with at least one pin present, import a dossier payload with wrong schemaVersion or an unknown architect slug; validation names the problem and the prior pin set and notes remain visible without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "dossier_identical_for_different_sessions"
description = "Two sessions with different pin/note sets produce identical Export dossier JSON preview text (export ignores session inputs)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "import_fails_to_restore_after_reload"
description = "After reload clears in-memory pins/notes, importing a valid previously exported dossier leaves the reading list empty or note bodies missing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "schema_invalid_import_mutates_session"
description = "Importing a schema-invalid dossier (wrong schemaVersion or unknown architect) changes the visible pin set or note bodies."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
