[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "filing_cabinet_stack_perspective"
description = "The home presents a filing-cabinet stack of four stacked colored category covers with attached paper architect tags, with three-dimensional perspective, not a flat equal-width list"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "portrait_sheet_under_colored_cover"
description = "Case pages present the folder as a portrait-proportion sheet with a texture overlay under a colored cover that opens away from the sheet"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "three_tier_palette_and_header_bar"
description = "The palette uses the near-black #191919 background with cream #fdfaf7 text and a translucent blurred dark header bar with a hairline bottom border; category cover fills and accent yellow #FFE927 stay scarce (covers and page-background variants only) rather than flooding general chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "three_local_open_license_type_families"
description = "Display titles (hero, case names, about title) compute to a bundled condensed grotesque display face at weight 700 uppercase; body and tag text compute to a bundled serif text face at weight 400 (hero paragraph and tags around 20px at 1440 width); navigation, footer, captions, and scrapbook labels compute to IBM Plex Mono (nav 16px with a 32px line height, footer 12px uppercase, captions 14px); all three families resolve locally"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "folder_sheet_header_and_close_metrics"
description = "The case folder sheet computes an aspect-ratio of 210 / 297 (measured ratio about 0.707), the fixed header and case sub-header each compute a height of 3.75rem (60px at the desktop root), and the circular close button computes a 54px diameter"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "root_font_and_container_offset_breakpoints"
description = "The root font-size and container offset scale by breakpoint: about 16px root with a 34px container offset at 1440 width, and about 13px root with an 18px container offset at 390 width where the hero paragraph drops to a 16px override"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "display_type_scale_metrics"
description = "At a 1440px viewport, the hero title \"American modernism\" renders around 145px, a case architect name renders around 120px, and the about title renders at 52px (3.25rem), each uppercase at weight 700 with a tight line height near 0.8"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "scrapbook_ephemera_styling"
description = "Scrapbook items read as visually distinct ephemera: cream sticky notes at about ninety-seven percent opacity, white-bordered photographs at slight rotations, a small paperclip graphic, plan/PDF/video previews on white cards, and an audio card, each carrying small monospace type labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "about_two_column_desktop_layout"
description = "At desktop width the about route lays out as two columns, the essay on the left and the photo gallery on the right, with gallery captions in IBM Plex Mono at 14px and sixty percent opacity"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "footer_monospace_row_with_mask_signature"
description = "The footer renders in IBM Plex Mono at 0.75rem uppercase with a 3.75rem gap between its two wind roses, architectural scale graphic, signature, and studio credit mark, and the signature is rendered through a CSS mask rather than an image tag"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "tag_and_stack_responsive_scale"
description = "Architect tags render at 1.625rem at desktop width, reduce to 1.25rem at or below 1024px, and reduce to 15px at or below 480px, and on tablet and mobile widths the home stack category group heights reduce (to about twenty and fifteen viewport units respectively)"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "about_single_column_mobile"
description = "On a narrow viewport (390px) the about route collapses from two columns to a single column with the essay above the gallery and both fully readable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "editorial_prose_and_uppercase_convention"
description = "The hero paragraph, category thesis lines, architect biographies, and about essay read as edited long-form editorial prose, and navigation, footer, and monospace scrapbook labels keep one consistent uppercase convention"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.19"
name = "case_broken_grid_composition"
description = "On a case route at desktop width, the layout reads as a controlled broken grid: the oversized display architect name layers behind or around the portrait folder sheet, sibling tags sit at rotated vertical offsets beside the sheet, and scrapbook items sit at irregular rotated positions while remaining legible and operable — not an equal-width card stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "fluid_clamp_type_scaling"
description = "Resizing the viewport between 390 and 1440 pixels scales display and body typography continuously through fluid clamp-driven sizes, with no abrupt locked size jumps that only change at breakpoint thresholds"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "baseline_aligned_spacing_tokens"
description = "Header height, stack offsets, and major section paddings land on a consistent rem baseline (multiples of 0.25rem at the desktop root) rather than arbitrary one-off pixel values that break the spacing rhythm"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.22"
name = "wcag_aa_text_contrast"
description = "Cream primary text on the dark #191919 surface and white text on the saturated category covers meet WCAG AA contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.24"
name = "scratch_authored_archive_inventory_craft"
description = "Field Notes Archive is visibly complete and art-directed: one wordmark, eight distinct fictional portraits, populated non-repeated scrapbook ephemera on every case, five video posters, four about-gallery photographs, signature and studio marks, two wind roses, scale, paperclip, plan/drawing, PDF, chevron, close, and media-control artwork all occupy their reference roles"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.40"
name = "reading_list_palette_dossier_match_tokens"
description = "The reading-list drawer, command palette, and dossier export panel use the near-black surface rgb(25,25,25) / hex 191919 and cream text rgb(253,250,247) / hex fdfaf7 with hairline borders rather than bright unrelated card chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.41"
name = "pin_control_filled_vs_rest"
description = "Pinned Pin controls show a filled state visually distinct from the unpinned rest state on case routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.42"
name = "filter_and_search_preserve_stack_composition"
description = "Category filter chips and the home search field sit in the home stack region without covering the Field Notes Archive wordmark or breaking the filing-cabinet stack composition."
type = "binary"
weight = 1.0

