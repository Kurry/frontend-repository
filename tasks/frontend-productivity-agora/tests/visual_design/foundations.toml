[judge]
judge = "claude-code"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
# Standards-based canonical (docs/plans/universal-dimensions.md): stamped
# byte-identical fleet-wide, hash-checked by `zto check-drift`. Merges into
# the `design` dimension at grading time via rewardkit's same-dimension
# multi-TOML reward merge (design.toml + foundations.toml both load under
# `tests/design/`) — this file is never the sole design.toml, and it never
# duplicates design.toml's solution-sourced criteria. This low weight keeps
# solution-sourced criteria dominating the merged dimension.
weight = 0.5

# The judge drives the running app through the Playwright MCP (rewardkit PR #2008).
# rewardkit registers this server (`claude mcp add`) and derives the judge's
# allow-list from it — omitting allowed_tools ⇒ the judge may call any
# mcp__playwright tool. The version is referenced, not hardcoded: rewardkit
# expandvars-expands ${PLAYWRIGHT_MCP_VERSION} (exported by tests/test.sh from
# tests/versions.env) at add time, so the pin stays in ONE place. --browser
# chromium is required — see tests/test.sh.
[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

# Typography, layout, and palette-quality foundations conformance (Material 3
# type roles / layout / color-system foundations + general readability
# conventions), graded identically for every task. Every criterion here is
# optional (self-scoping "where the app..." phrasing lets copy-light or
# simple apps pass vacuously) — this pack only widens the partial-credit
# gradient above whatever this task's own solution-sourced design.toml
# already grades. The enforceable WCAG contrast trio (1.4.3 Contrast
# Minimum, 1.4.11 Non-text Contrast, 1.4.1 Use of Color) is graded in the
# `accessibility` dimension, not here.

# ---------------------------------------------------------------------------
# Typography — M3 type roles + readability conventions
# ---------------------------------------------------------------------------

[[criterion]]
id = "FOUND-DESIGN-TYPE-001"
name = "found_design_type_001"
description = """Inspect the app's text across at least one primary view. Confirm at least three distinguishable type roles are visible (for example, a page/section title, body text, and a secondary/caption label) that differ from each other in size and/or weight — not a single flat text size used everywhere."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-TYPE-002"
name = "found_design_type_002"
description = """Inspect a representative block of body text (a paragraph, description, or list copy) via computed styles. Confirm its font-size is at least 14px, its line-height is roughly 1.4–1.6x the font-size, and on a wide viewport its text column does not stretch edge-to-edge — the line length stays in a comfortable reading range (roughly 45–75 characters) rather than spanning the full window width."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-TYPE-003"
name = "found_design_type_003"
description = """Inspect the font families used across the app's headings, body text, and labels via computed styles. Confirm at most two distinct typeface families are used in total, applied consistently by role (e.g. headings always use one family, body text always another), not mixed arbitrarily within the same role."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-TYPE-004"
name = "found_design_type_004"
description = """Compare a heading/title against nearby body text. Confirm the visual hierarchy between them is created by size and/or weight differences, not by rendering body text or running headings in ALL CAPS, nor by underlining text purely for emphasis."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-TYPE-005"
name = "found_design_type_005"
description = """Where the app renders a table or list with a column of numeric values (counts, prices, quantities, dates), inspect that column. Confirm the numerals align consistently down the column (for example, right-aligned or decimal-aligned) rather than each row's numbers sitting at a different, ragged horizontal position."""
type = "binary"
weight = 0.5
optional = true

# ---------------------------------------------------------------------------
# Layout — M3 layout foundations
# ---------------------------------------------------------------------------

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-001"
name = "found_design_layout_001"
description = """Inspect the padding and gaps between elements in a representative view (via computed styles or visual measurement). Confirm spacing values cluster on a consistent 4px/8px-multiple scale (e.g. 4, 8, 12, 16, 24, 32px) rather than showing arbitrary one-off values that break a visible rhythm."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-002"
name = "found_design_layout_002"
description = """Inspect a view with multiple elements (cards, form fields, list rows). Confirm their edges align to a common grid — the left edges of stacked elements line up, and text blocks share one consistent alignment (left-aligned, for left-to-right reading) rather than drifting or sitting at inconsistent alignments."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-003"
name = "found_design_layout_003"
description = """Where the app's view has more than one logical group of controls (for example, a toolbar plus a content area, or multiple form sections), inspect it. Confirm related controls are visually clustered together (via proximity, a divider, or a shared container) and separated from unrelated groups, with no control left floating orphaned between groups."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-004"
name = "found_design_layout_004"
description = """Resize the viewport to a compact width (below approximately 600px). Confirm the layout reflows to a single-pane / fewer-column arrangement appropriate for the narrow width — no region is left clipped, overlapping illegibly, or unreachable outside the visible viewport."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-005"
name = "found_design_layout_005"
description = """Inspect the app's overall page structure. Confirm its regions read as a deliberate layout — primary content is clearly dominant, and any supporting panes (sidebar, details panel, filters) are visually subordinate to it — rather than multiple regions competing for equal visual weight with no clear focal area."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-006"
name = "found_design_layout_006"
description = """Resize the viewport to a wide desktop width (about 1600px or more). Confirm any prose or paragraph-style content does not stretch edge-to-edge across the full window; it stays within a bounded, readable max-width rather than forming an extremely long line."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-LAYOUT-007"
name = "found_design_layout_007"
description = """Inspect the app's primary clickable controls (buttons, icons, list-row actions). Confirm most are comfortably sized — at least 48x48 CSS px, or at least 48px of click/tap area — with at least 8px of separation from adjacent targets, going beyond the bare 24px accessibility floor."""
type = "binary"
weight = 0.5
optional = true

# ---------------------------------------------------------------------------
# Color — palette quality (M3 color system). The enforceable WCAG contrast
# trio (1.4.3, 1.4.11, 1.4.1) is graded in the accessibility dimension, not
# duplicated here.
# ---------------------------------------------------------------------------

[[criterion]]
id = "FOUND-DESIGN-COLOR-001"
name = "found_design_color_001"
description = """Inspect each distinct background color/surface used in the app (cards, panels, buttons, page background). Confirm each background is paired with a legible 'on' color for its text/icons — no combination renders as gray-on-gray or an accent color placed on a similarly-saturated accent background."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-COLOR-002"
name = "found_design_color_002"
description = """Inspect the palette used across the app. Confirm at most one or two accent hues are used for emphasis and actions on top of a neutral base, rather than many competing saturated hues used decoratively throughout."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-COLOR-003"
name = "found_design_color_003"
description = """Where the app shows a destructive/error state and a success/positive state in more than one place, compare their colors across those places. Confirm destructive/error states consistently use one color family (e.g. always a red) and success/positive states consistently use one color family (e.g. always a green) app-wide, rather than the same meaning switching hue between screens."""
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "FOUND-DESIGN-COLOR-004"
name = "found_design_color_004"
description = """Where the app offers both a light and a dark theme, switch between them. Confirm every background/text pairing that was legible in one theme remains legible in the other — no combination becomes low-contrast or illegible after the theme switch."""
type = "binary"
weight = 0.5
optional = true
