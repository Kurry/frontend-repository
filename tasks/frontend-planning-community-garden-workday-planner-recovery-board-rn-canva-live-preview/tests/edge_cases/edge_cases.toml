[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"
[[criterion]]
id = "AC-06"
name = "exact_field_boundaries"
description = "The task form accepts title lengths 3 and 80, description lengths 0 and 240, volunteers 1 and 20, duration 15 and 240 in 15-minute steps, and dates 2026-01-01 and 2026-12-31, while rejecting each adjacent out-of-range value with a field-specific recovery message and zero record or event delta."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "greenhouse_cross_field_and_state_guard"
description = "A Greenhouse task with 8 volunteers is accepted and 9 is rejected, and a new or ordinary edited record cannot enter Recovery or Resolved without the canonical recovery-board action; rejected attempts preserve the prior record."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "atomic_import_aggregates_diagnostics"
description = "One invalid artifact containing multiple faults reports all applicable field and relationship diagnostics together, including paths and recovery actions, and leaves records, order, selection, filters, derived values, and history byte-for-byte unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "empty_and_noop_recovery"
description = "Clearing shows zero tasks with actionable Create and Import controls, while modal cancel, declined delete, same-position reorder, invalid submit, and repeated recovery activation produce zero entity and event-count deltas."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "invalid_import_partially_mutates"
description = "A malformed, duplicate-ID, unknown-enum, out-of-bound, stale-derived, contradictory-lane, dangling-reference, or corrupted-history import changes any visible session state before all diagnostics pass."
type = "binary"
negate = true
weight = 1.0
