[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"
[[criterion]]
id = "AC-01"
name = "signature_mutation"
description = "Starting from the clean fixture, moving 'Compost delivery failed' from Failed to Recovery path through the visible drag or button preserves its stable ID, changes status and recoveryBoardState.lane together, selects the card, changes Failed and Recovery by exactly one, and appends exactly one move_to_recovery event."
type = "binary"
weight = 1.0

[[criterion]]
id = "5.2"
name = "api_shaped_task_crud"
description = "Creating a valid task adds exactly one selected stable-ID record and one create event; editing, archiving or restoring, and confirmed deletion each update the collection, inspector, live preview, counts, and artifact preview on the first try without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "5.3"
name = "search_filter_and_reorder"
description = "Search matches title, description, or plot; each status filter shows only that state; clearing a no-match view restores the list; and Up or Down changes one task's order by exactly one while preserving its ID and selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "5.4"
name = "portable_artifact_exact_shape"
description = "The visible export preview and downloaded garden-workday-v1-recovery-board.json contain schemaVersion, regenerated RFC3339 exportedAt, records sorted by order then ID, exact record and recoveryBoardState fields, derived, history, selectionId, and filters reflecting the current session."
type = "binary"
weight = 1.0

[[criterion]]
id = "5.n1"
name = "recovery_double_activation_duplicates"
description = "After one successful failed-to-recovery mutation, repeating the drag or Move to recovery path action creates a duplicate card or an extra history event."
type = "binary"
negate = true
weight = 1.0
