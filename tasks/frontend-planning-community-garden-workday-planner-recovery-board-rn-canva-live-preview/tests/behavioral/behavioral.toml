[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"
[[criterion]]
id = "AC-13"
name = "artifact_round_trip"
description = "Recover and resolve 'Compost delivery failed', export, clear, import, reselect it, and export again; stable record order and IDs, selection, recovery lane, repair note, derived counts, filters, and history are semantically identical except for regenerated exportedAt."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "canonical_recovery_cross_view_echo"
description = "Measure Failed, Recovery, Resolved, and history before each real recovery action; the two actions each produce exact one-count and one-event deltas, and the collection, board, preview, inspector, query tool, and export agree immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "undo_then_branch_integrity"
description = "Resolve a recovery, undo it, then edit the restored Recovery task and resolve with a different valid note; selection, order, counts, event history, inspector, and export follow the restored branch with no value from the abandoned branch."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "input_dependent_derived_output"
description = "Create two tasks with different volunteer and duration inputs; each task appears once, and the derived volunteerHours and exported records differ by exactly the inputs rather than returning a fixed result."
type = "binary"
weight = 1.0
