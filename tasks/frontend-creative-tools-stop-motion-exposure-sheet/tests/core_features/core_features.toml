[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "CF-01"
name = "Exposure Sheet tracks and frames"
description = "Grid rows represent subject, prop, camera, lighting, dialogue, and audio cue tracks. Columns are frames."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-02"
name = "Ripple and Overwrite editing modes"
description = "Creates, splits, joins, trims, and moves exposure ranges. Downstream ranges correctly shift (ripple) or truncate (overwrite)."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-03"
name = "Stage and Onion Skins"
description = "Place and transform abstract objects with configurable previous/next onion skins showing exact frame offsets."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-04"
name = "Cue alignment and timing updates"
description = "Drag cues or ranges and see frames, seconds, shot duration, and downstream boundaries update."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-05"
name = "Prop and pose continuity"
description = "Tracks owner, position, orientation, damage state, and pose across intervals, highlighting conflicts when selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-06"
name = "Capture Event Ledger"
description = "Records capture, retake, mark-missing, invalidate, and restore events using an append-only, logical clock approach."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-07"
name = "Take branches and Cut Approval"
description = "Forks takes, replaces ranges, allows cut approval, and correctly marks the cut as stale upon later project changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "CF-08"
name = "Deterministic export artifacts"
description = "Exports JSON, CSV, SVG, and Markdown mapping precisely to the strict data shape requested."
type = "binary"
weight = 1.0
