[[criterion]]
id = "AC-07"
name = "responsive_design"
description = "Complete at 1440/768/375 → icon/canvas/anchor/path/constraint/variant/size-state mobile flows retain every action, 44-pixel targets, no overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsiveness that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = ["/tests/webmcp_stdio_server.mjs"]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = ["-y", "@playwright/mcp@0.0.76", "--browser", "chromium", "--cdp-endpoint", "$WEBMCP_CDP_ENDPOINT", "--isolated"]

[scoring]
aggregation = "weighted_mean"

[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = ["-y", "@playwright/mcp@0.0.76", "--browser", "chromium", "--cdp-endpoint", "$WEBMCP_RM_CDP_ENDPOINT", "--isolated", "--config", "/tests/playwright_rm_config.json"]
