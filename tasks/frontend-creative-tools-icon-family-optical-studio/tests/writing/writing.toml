[[criterion]]
id = "AC-10"
name = "writing_clarity"
description = "Trigger every path/constraint/variant/metric/size/export conflict → copy names exact icon/path/point/constraint/variant/size/value and recovery."
type = "binary"
weight = 1.0

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in writing clarity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
