[[criterion]]
id = "AC-11"
name = "innovative_coherence"
description = "Edit one constrained master path → optical family metrics, inherited variants, small-size behavior, interaction states, approval, and exported symbol system remain coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant, browser-observable defect in innovative features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0

[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = ["/tests/webmcp_stdio_server.mjs"]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = ["-y", "@playwright/mcp@0.0.76", "--browser", "chromium", "--cdp-endpoint", "$WEBMCP_CDP_ENDPOINT", "--isolated"]

[scoring]
aggregation = "weighted_mean"
