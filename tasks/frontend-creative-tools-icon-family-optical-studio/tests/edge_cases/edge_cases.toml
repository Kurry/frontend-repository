[[criterion]]
id = "AC-06"
name = "edge_cases"
description = "Test coordinate bounds, open/closed/winding, zero handle, point delete minimum, transform rounding, constraint cycle/overdetermination, override reset equality, ±0.5 hint, duplicate symbol/title id, stale approval, forged import → named recovery."
type = "binary"
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge cases that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
