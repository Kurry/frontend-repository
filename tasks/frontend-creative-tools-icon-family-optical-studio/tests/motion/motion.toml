[[criterion]]
id = "AC-03"
name = "causal_motion"
description = "Drag/transform, solve constraint, propagate inheritance, switch size/state/branch overlay, then repeat reduced → causal endpoints and values agree."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.1"
name = "animate_constraint_solve"
description = "Commit constraint solve → animates anchors moving into place."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion, constraints snap immediately with clear before/after outlines."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = ["/tests/webmcp_stdio_server.mjs"]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = ["-y", "@playwright/mcp@0.0.76", "--browser", "chromium", "--cdp-endpoint", "$WEBMCP_CDP_ENDPOINT", "--isolated"]

[scoring]
aggregation = "weighted_mean"
