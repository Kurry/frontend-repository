[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, Paint mode shows the canvas stage with the floating toolbar and brush/palette controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load (or after opening Gallery), at least 4 seeded saved boards are visible with names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After saving/creating a board named 'Harbor Signal' with a valid name, the text 'Harbor Signal' is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding 3 new boards on top of the seed set, Gallery shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After loading a seeded board from Gallery, the paint canvas cells update to that board's snapshot"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After editing a board name to 'Evening Grid', the text 'Evening Grid' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting a board, that board name is no longer visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After deleting all boards, an empty state is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "invalid_save_blocked_with_field_error"
description = "Submitting the Save board form with an empty or whitespace-only name adds no board: the gallery count stays the same, an inline validation message naming the name field appears before submit, and the save control stays disabled until the name is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After filtering Gallery by a tag or favorites (with mixed items present), only matching boards remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After switching between Paint and Gallery modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering toolbar buttons, swatches, or gallery rows, a visible hover wash or fill change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After selecting QR Brush with the white swatch and painting a cell, the cell shows a black QR mask on white; selecting the black swatch and painting shows a white QR on black"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After clicking Download or Share, the exported PNG includes a black footer band reading '/MADE WITH SHAPESHIFT GRID TOOL' and '<SHAPESHIFTFESTIVAL.COM>'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After painting at least one cell, the cell-size slider becomes locked/disabled, and clicking Clear re-enables it while resetting the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Saved boards collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Saved boards list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "QR Brush stamps a scannable festival-QR mask into the cell and recolors it per the active swatch: a white swatch yields a black QR on white, a black swatch yields a white QR on black, and any other swatch yields that color QR on white"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Download or Share exports a PNG of the canvas with an appended black footer band reading '/MADE WITH SHAPESHIFT GRID TOOL' on the left and '<SHAPESHIFTFESTIVAL.COM>' on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The cell-size slider rebuilds the grid and resamples the existing painting into the new grid (art preserved, not cleared), then locks to a disabled state after the first paint, image upload, or camera capture, and Clear re-enables it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Image upload or front-camera capture center-crops the source square and pixelizes it onto the grid; the camera opens an overlay offering Capture and Cancel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "Keyboard shortcuts work on the canvas: Q/B/E select the QR/Color/Eraser brushes, G toggles the grid overlay, Backspace undoes the last change, and keys 1-7 select palette colors"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "QR Brush fills the cell with a flat solid color and stamps no scannable QR mask, so the QR and Color brushes look identical"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Resizing the cell-size slider clears the existing painting instead of resampling it into the new grid"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "save_flow_multi_surface_probe"
description = "Starting from a blank canvas: paint several cells, open Save board, and submit the name 'Flow Probe' with a tag. Measured immediately around the submit, the gallery collection count increases by exactly one; the new card appears in Gallery mode with a thumbnail matching the painted cells and its tag; and switching Paint -> Gallery -> Paint shows the same new board both times without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "load_flow_paint_undo_chain"
description = "From Gallery mode, load a saved board: its cells appear on the paint canvas immediately and the app switches to Paint mode showing the loaded art; painting one further cell changes only that cell, and pressing Undo reverts exactly that one change while the rest of the loaded board stays intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "rename_delete_filter_integrity_chain"
description = "Renaming a board updates that same card's name in Gallery without changing the collection count; then deleting a board decreases the count by exactly one (measured immediately around the delete), removes its card, clears it from any current selection, and the deleted board's name appears under no tag filter afterwards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "favorite_filter_recompute_chain"
description = "Marking a board as favorite updates its indicator on the card immediately; choosing a tag filter recomputes the visible gallery to only boards with that tag; clearing the filter restores the full collection with the favorite indicator still shown on the same board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "reload_resets_all_facets_to_seed"
description = "After saving a new board, painting cells (locking the slider), and applying a tag filter, a page reload coherently returns every facet to the seeded baseline: a blank canvas, an unlocked cell-size slider, and exactly the seeded boards in Gallery with the board saved before the reload gone — never a mix of reset and surviving facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "tag_filter_no_match_empty_state"
description = "A tag filter that matches no boards shows the gallery empty state rather than a blank region, and clearing the filter restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "undo_without_history_safe_noop"
description = "Pressing Undo (or Backspace) with no paint history leaves the canvas unchanged and surfaces no error message or console exception"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "camera_cancel_leaves_canvas_untouched"
description = "Choosing Cancel in the camera overlay closes it without altering the canvas cells and leaves the cell-size slider unlocked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "drag_stroke_records_cell_once"
description = "Dragging a paint stroke back and forth over the same cell with the same brush and color paints continuously across cells, records that cell to undo history only once, and a single Undo reverts it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "grid_toggle_label_flips"
description = "Clicking the grid-overlay toggle flips its button label between 'Grid On' and 'Grid Off' and correspondingly shows or hides the hairline grid between cells"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.40"
name = "color_brush_fill_and_eraser_clear"
description = "Color Brush fills a painted cell solid with the active swatch color, and Eraser clears a painted cell back to blank"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
