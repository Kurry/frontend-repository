[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "paint_stage_toolbar_on_load"
description = "On load, Paint mode shows the canvas stage with the floating toolbar and brush/palette controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_boards_visible"
description = "On load (or after opening Gallery), at least 4 seeded saved boards are visible with names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "save_board_harbor_signal_visible"
description = "After saving/creating a board named 'Harbor Signal' with a valid name, the text 'Harbor Signal' is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "gallery_count_plus_three"
description = "After adding 3 new boards on top of the seed set, Gallery shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "load_seeded_board_updates_canvas"
description = "After loading a seeded board from Gallery, the paint canvas cells update to that board's snapshot"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "rename_board_evening_grid"
description = "After editing a board name to 'Evening Grid', the text 'Evening Grid' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "delete_board_removes_name"
description = "After deleting a board, that board name is no longer visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_gallery_after_delete_all"
description = "After deleting all boards, an empty state is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "invalid_save_blocked_with_field_error"
description = "Submitting the Save board form with a Board field-contract violation (empty or whitespace-only name, empty or whitespace-only tag, name over 40 characters, tag over 24 characters, or a duplicate name) adds no board: the gallery count stays the same, an inline validation message naming the offending field appears before submit, and the save control stays disabled until name and tag are valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "gallery_filter_matches_only"
description = "After filtering Gallery by a tag or favorites (with mixed items present), only matching boards remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "paint_gallery_mode_switch"
description = "After switching between Paint and Gallery modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "toolbar_gallery_hover_wash"
description = "When hovering toolbar buttons, swatches, or gallery rows, a visible hover wash or fill change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "console_clean_during_session"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "boards_crud_shared_state"
description = "Saved boards collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "two_interaction_modes"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "domain_state_beyond_crud"
description = "Domain state beyond CRUD is implemented (filters, favorites, mirror mode, or fill stats) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "boards_list_static_html_only"
description = "Saved boards list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "chrome_outbound_navigation"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "qr_brush_scannable_mask"
description = "QR Brush stamps a scannable festival-QR mask into the cell and recolors it per the active swatch: a white swatch yields a black QR on white, a black swatch yields a white QR on black, and any other swatch yields that color QR on white"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "branded_png_footer_export"
description = "Download or Share exports a PNG of the canvas with an appended black footer band reading '/MADE WITH SHAPESHIFT GRID TOOL' on the left and '<SHAPESHIFTFESTIVAL.COM>' on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "cell_slider_resample_and_lock"
description = "The cell-size slider rebuilds the grid and resamples the existing painting into the new grid (art preserved, not cleared), then locks to a disabled state after the first paint, image upload, or camera capture, and Clear re-enables it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "image_or_camera_pixelize"
description = "Image upload or front-camera capture center-crops the source square and pixelizes it onto the grid; the camera opens an overlay offering Capture and Cancel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "keyboard_shortcuts_tools_palette"
description = "Keyboard shortcuts work on the canvas: Q/B/E select the QR/Color/Eraser brushes, G toggles the grid overlay, Backspace undoes the last change, and keys 1-7 select palette colors"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "qr_brush_flat_fill_only"
description = "QR Brush fills the cell with a flat uniform color fill and stamps no scannable QR mask, so the QR and Color brushes look identical"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "slider_resize_clears_art"
description = "Resizing the cell-size slider clears the existing painting instead of resampling it into the new grid"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "save_flow_multi_surface_probe"
description = "Starting from a blank canvas: paint several cells, open Save board, and submit a valid Board payload with name 'Flow Probe' and a trimmed tag of at most 24 characters. Measured immediately around the submit, the gallery collection count increases by exactly one; the new card appears in Gallery mode with a thumbnail matching the painted cells and its tag; the Export session JSON boards array includes that board under the field-contract keys name, tag, favorite, and cells; and switching Paint -> Gallery -> Paint shows the same new board both times without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "load_flow_paint_undo_chain"
description = "From Gallery mode, load a saved board: its cells appear on the paint canvas immediately and the app switches to Paint mode showing the loaded art; painting one further cell changes only that cell, and pressing Undo reverts exactly that one change while the rest of the loaded board stays intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "rename_delete_filter_integrity_chain"
description = "Renaming a board updates that same card's name in Gallery without changing the collection count; then deleting a board decreases the count by exactly one (measured immediately around the delete), removes its card, clears it from any current selection, and the deleted board's name appears under no tag filter afterwards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "favorite_filter_recompute_chain"
description = "Marking a board as favorite updates its indicator on the card immediately; choosing a tag filter recomputes the visible gallery to only boards with that tag; clearing the filter restores the full collection with the favorite indicator still shown on the same board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "reload_resets_all_facets_to_seed"
description = "After saving a new board, painting cells (locking the slider), and applying a tag filter, a page reload coherently returns every facet to the seeded baseline: a blank canvas, an unlocked cell-size slider, and exactly the seeded boards in Gallery with the board saved before the reload gone — never a mix of reset and surviving facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "tag_filter_no_match_empty_state"
description = "A tag filter that matches no boards shows the gallery empty state rather than a blank region, and clearing the filter restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "undo_without_history_safe_noop"
description = "Pressing Undo (or Backspace) with no paint history leaves the canvas unchanged and surfaces no error message or console exception"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "camera_cancel_leaves_canvas_untouched"
description = "Choosing Cancel in the camera overlay closes it without altering the canvas cells and leaves the cell-size slider unlocked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "drag_stroke_records_cell_once"
description = "Dragging a paint stroke back and forth over the same cell with the same brush and color paints continuously across cells, records that cell to undo history only once, and a single Undo reverts it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "grid_toggle_label_flips"
description = "Clicking the grid-overlay toggle flips its button label between 'Grid On' and 'Grid Off' and correspondingly shows or hides the hairline grid between cells"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.40"
name = "color_brush_fill_and_eraser_clear"
description = "Color Brush fills a painted cell completely with the active swatch color, and Eraser clears a painted cell back to blank"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "slider_resize_before_paint_keeps_blank"
description = "Moving the cell-size slider before any painting rebuilds the grid at the new cell size while the board stays completely blank, with no stray painted cells appearing"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.42"
name = "session_json_field_contract_keys_visible"
description = "Opening Export and selecting session JSON shows a monospaced preview matching the Session field contract: schemaVersion exactly shapeshift-session-v1, plus visible keys cellSize (16–64), brushMode (qr|color|erase), paletteColor (white|black|red|yellow|green|blue|pink), gridOverlay, mirrorMode (off|horizontal|vertical), fillStats with painted/qr/colorFilled/blank, cells, and boards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "import_rejects_nonconforming_session_schema"
description = "Importing session JSON that fails the field contract (wrong schemaVersion, cellSize outside 16–64, brushMode or paletteColor or mirrorMode outside their closed enums, or a board missing name/tag/cells) shows an inline error naming the offending field or the import problem and leaves gallery count, canvas cells, and fill stats unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "export_omits_session_field_contract"
description = "With painted cells or saved boards present, the Export session JSON preview is missing schemaVersion shapeshift-session-v1 or omits required Session/Board/Cell field-contract keys (cellSize, brushMode, paletteColor, mirrorMode, fillStats, cells, boards, or a board's name/tag/favorite/cells)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.45"
name = "import_accepts_invalid_session_schema"
description = "Import accepts a parseable JSON document that violates the Session/Board/Cell field contract (wrong schemaVersion, invalid enums, or missing required keys) and mutates gallery, canvas, or fill stats without an inline error naming the import problem"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.46"
name = "mirror_mode_paints_partner_cell"
description = "With mirrorMode set to Horizontal or Vertical via the real toolbar control, painting one blank cell also paints its mirror-partner cell with the same brush and color in the same stroke; switching mirrorMode to Off then painting a different cell changes only that cell"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "fill_stats_track_paint_mutations"
description = "After painting QR and Color cells then erasing one cell, the live fill-stats readout updates painted, qr, colorFilled, and blank immediately so painted equals qr plus colorFilled and painted plus blank equals the total cell count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "mirror_off_still_paints_partner"
description = "With mirrorMode Off, painting a single cell also changes a distant mirror-partner cell as if Horizontal or Vertical mirror were active"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.49"
name = "fill_stats_stale_after_paint"
description = "After painting or erasing cells, the on-stage fill-stats readout stays at zeros or otherwise fails to match the visible painted/qr/colorFilled/blank cell counts"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
