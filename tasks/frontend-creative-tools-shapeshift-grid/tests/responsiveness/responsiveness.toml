[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Layout adapts gracefully from 1440px desktop (floating toolbar over centered canvas) to 375px mobile without broken stage or unreachable tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "On a 375px viewport, toolbar tools, swatches, and gallery actions present tap targets at least 44px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_across_breakpoints"
description = "Typography remains readable at both desktop and 375px mobile — title, toolbar labels, and gallery card text do not become illegibly tiny."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width the canvas and toolbar reflow to fit with no horizontal scrolling and no clipped controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "toolbar_docks_or_reflows_on_narrow"
description = "At small widths the floating toolbar may dock, but all brush modes, swatches, mirror control, fill stats, Export, Import, and actions stay reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "gallery_cards_reflow_single_column"
description = "Gallery cards reflow from a dense multi-column desktop arrangement to a single column at narrow widths without losing names, tags, or actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "touch_drag_paints_on_mobile"
description = "At 375px width, painting by touch drag works on the mobile layout — cells the stroke crosses fill in one gesture."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width, no horizontal scrolling appears on the paint stage or gallery."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_grid_sizes_responsively"
description = "The paint canvas and grid size responsively to fit the layout at desktop and mobile widths without a fixed size overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "docked_toolbar_actions_accessible"
description = "Fixed or docked toolbar controls (brush modes, swatches, and actions) remain accessible on mobile devices."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks or overflows at 1440px or 375px — toolbar, canvas, or gallery collide or spill off-screen."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "On mobile, toolbar tools, swatches, or gallery actions are too small or misaligned for reliable tapping."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_mobile"
description = "At 375px, title, toolbar, or gallery text is too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px, stage content is cropped or unnecessary scrollbars appear over the canvas or toolbar."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "toolbar_unreachable_on_narrow"
description = "On narrow viewports the toolbar is missing or unreachable so brush modes, swatches, or actions cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "docked_toolbar_obscures_canvas"
description = "The fixed/docked toolbar permanently obscures the paint canvas or gallery actions with no way to reach them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "gallery_cards_overlap_or_lose_actions"
description = "At narrow widths, gallery cards overlap or lose names, tags, or actions instead of reflowing to a readable single column."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "touch_paint_missing"
description = "On mobile, a touch-drag stroke leaves crossed cells blank or paints only the first/last cell instead of filling cells the stroke crosses."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "canvas_static_size_overflows"
description = "The paint canvas uses a static size that overflows the viewport on mobile."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "tools_disappear_at_narrow_width"
description = "Brush modes, swatches, or primary actions disappear at 375px width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_import_usable_at_375"
description = "At 375px width the Export and Import surfaces remain readable and operable without clipped format tabs, Copy/Download, or paste/file controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_import_clipped_at_375"
description = "At 375px width Export or Import controls are clipped, off-screen, or otherwise unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
