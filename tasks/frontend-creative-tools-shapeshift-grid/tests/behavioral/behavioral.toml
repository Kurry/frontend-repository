[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_reset"
description = "Starting on Paint: switch to Color Brush, pick a non-default swatch, paint at least 3 cells, switch to Gallery and save a uniquely named board, then reload. All facets coherently reset to the seeded baseline together — blank canvas, unlocked cell-size slider, and exactly the seeded boards in Gallery — never a mix of persisted user art with reset tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "tag_filter_then_clear_restores_list"
description = "Filter-reversal proof: note the full gallery list, filter by a seeded board's tag so the list narrows, then clear the filter; the full list restores exactly (same boards, same count), proving the visible list is derived from the shared collection rather than two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "gallery_list_responds_to_tag_filter"
description = "Derived-view sensitivity: apply a tag filter that matches a subset of boards; the visible gallery list changes meaningfully (fewer cards, only matching tags). Clearing the filter restores the full list rather than redrawing identically regardless of filter input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "paint_save_echo_across_modes"
description = "Cross-view echo: paint a recognizable pattern in Paint mode, save it with a valid name and tag, switch between Paint and Gallery without reload — the painted board remains intact in Paint and Gallery shows the new card with a thumbnail matching those cells."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "gallery_count_delta_exact"
description = "Count-delta integrity: note the gallery count, save one new uniquely named board, and confirm the count increases by exactly one; after deleting that board, confirm the count decreases by exactly one with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_paints_save_different_thumbnails"
description = "Input-dependent output: paint two clearly different patterns (for example red block vs blue block), save each with a distinct name; the two gallery thumbnails differ in the ways those painted cells dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_paint_and_gallery"
description = "Interleaved-flow integrity: start painting in Paint mode, switch to Gallery and favorite/filter a seeded board, return to Paint and continue; neither flow corrupts the other — painted cells and gallery facets remain coherent without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_gallery_then_repopulate"
description = "Edge-state round-trip: delete every board (empty-gallery state visible), then paint and save a new named board; the gallery count tracks through both transitions (zero then one) and the new card appears with a matching thumbnail."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After painting, changing tools/swatch, and saving a board, a reload leaves an incoherent mix (for example user art or the saved board survives while tools reset, or seeded boards are missing while canvas art remains)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "tag_filter_ignores_input"
description = "Applying or clearing a tag filter leaves the visible gallery list identical regardless of filter input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_paints_identical_thumbnails"
description = "Saving two boards painted with clearly different cell patterns yields visually identical thumbnails."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "load_board_stale_until_reload"
description = "After loading a saved board from Gallery, the paint canvas stays blank or stale until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_roundtrip_under_session_schema"
description = "Starting with a blank canvas: paint cells with a known paletteColor, set mirrorMode to horizontal or vertical, save one uniquely named board, open Export and confirm the preview shows schemaVersion shapeshift-session-v1 with brushMode, paletteColor, mirrorMode, fillStats, cells, and boards, Download or Copy that session JSON, then Import it. Confirm canvas cells, mirror mode, fill stats, and the saved board return under the same field-contract keys — proving the export contains the session's actual work."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_schema_rejection_preserves_studio"
description = "With painted cells and at least one gallery board already present: attempt Import with a payload that violates the Session field contract (wrong schemaVersion or missing required board keys). Confirm an inline error names the import problem, gallery count is unchanged, and canvas cells match the pre-import state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_preview_lacks_session_contract_keys"
description = "After painting cells and saving a board, the Export session JSON preview lacks schemaVersion shapeshift-session-v1 or omits Session/Board field-contract keys the instruction requires."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
