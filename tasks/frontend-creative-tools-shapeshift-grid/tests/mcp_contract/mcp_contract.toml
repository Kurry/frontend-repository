[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "structured_editor_entity_artifact_bound"
description = "Contract modules structured-editor-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for editor, entity, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed editor, entity, and artifact tool handlers drive the same visible UI logic as on-page controls (grid-cell color/brush/mirror updates, paint/erase/qr mode switches, board create/select/update/delete/toggle, and session-json/png export-import-copy)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_available"
description = "Only documented editor operations (select, update_property, switch_mode, preview, set_content), entity operations (create, select, update, delete, toggle), and artifact operations (export, import, copy) are available — no undeclared routes or modules."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for editor select / update_property / switch_mode / preview / set_content, entity create / select / update / delete / toggle, and artifact export / import / copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_grid_cell_operations_work"
description = "Editor operations select, update_property (color, brush, or mirror on grid-cell), switch_mode (paint / erase / qr), preview, and set_content update the paint stage the same way as the visible toolbar and canvas controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_modes_paint_erase_qr"
description = "Editor switch_mode is bound for paint, erase, and qr modes and matches the visible Color Brush / Eraser / QR Brush tool selection on the toolbar."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "entity_board_ops_bound"
description = "Entity operations create, select, update, delete, and toggle are bound for board with fields name, tag, favorite, and cells; delete requires confirm=true; invoking them updates Gallery the same way as the visible controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_session_json_and_png_bound"
description = "Artifact operations export, import, and copy are bound with export formats session-json and png and import mode session-json; export/import/copy update or reflect the same Export/Import UI surfaces as the visible controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and successful invocations for the bound editor, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works from the app's own registration without manual editing or test harness changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling for structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is unbound, missing, or a no-op."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "An editor, entity, or artifact tool handler updates a different cell/mode/board, applies a mismatched color or mirror, or leaves the paint stage / gallery out of sync with the invoked action."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings block (grid-cell / color / brush / mirror / paint / erase / qr / board fields / session-json / png / select / update_property / switch_mode / preview / set_content / create / update / delete / toggle / export / import / copy) are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise bound editor select/update_property/switch_mode/preview/set_content, entity create/select/update/delete/toggle, or artifact export/import/copy operations."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mcp_ui_state_desync"
description = "Invoking an editor update_property or switch_mode, or an entity toggle/update, leaves MCP-reported state inconsistent with the visible canvas tool/color/mirror or gallery board (for example erase mode in UI while paint remains active)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or an incomplete tool list for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works through manual or undocumented test hacks rather than the app's registered tool handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented despite being declared required."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: listed tools leave the live SHAPESHIFT Grid Tool UI unchanged when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "drag_paint_or_mirror_faked_via_webmcp"
description = "WebMCP is used to fake success for the mechanics-excluded drag-paint / brush stroke geometry path or mirror-partner cell painting during continuous drag instead of leaving those Playwright-only."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
