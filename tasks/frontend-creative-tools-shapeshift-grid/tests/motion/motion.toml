[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "toolbar_gallery_hover_animations"
description = "Required hover animations are present on the real UI path: primary action buttons fill/ease on hover; mode buttons, mirror control, and swatches show active fill/opacity/border changes; gallery board rows take a hover wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "paint_gallery_switch_keeps_hover"
description = "Paint/Gallery mode switches update without full reload and keep hover feedback on toolbar and gallery rows"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "hover_feedback_missing_on_tools"
description = "Omits hover feedback on toolbar buttons, mirror control, swatches, or gallery rows so the studio feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "cell_slider_lock_fade_and_toolbar_drag"
description = "Through the real UI controls: the cell-size control fades toward a muted disabled look when locked and restores on Clear, and the floating toolbar repositions by dragging its header"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "camera_overlay_fades"
description = "Opening the camera overlay through its real toolbar control fades it in, and closing it (Cancel or Capture) fades it out rather than snapping, while painting continues to update cells immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "gallery_card_enter_exit_animation"
description = "Saving a board through the real Save control animates its new card into the gallery, and deleting a board animates its card out rather than snapping away instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "validation_feedback_eased_in"
description = "Validation and save feedback appears with a brief eased transition rather than popping in instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "reduced_motion_removes_animation"
description = "With prefers-reduced-motion set on a fresh load, animations are removed and state changes apply instantly while every feature (painting, saving, loading, filtering, camera overlay, Export, and Import) remains usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_surface_enter_and_copy_confirm"
description = "Opening Export through its real control enters with a brief opacity/scale transition, and clicking Copy on Session JSON shows a short confirmation before resetting — verified on the real UI path, not a WebMCP shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "export_or_gallery_snaps_without_motion"
description = "Export opens by hard-cutting with no enter transition, or gallery save/delete cards only snap with no enter/exit motion when motion is allowed"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
