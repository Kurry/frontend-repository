[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "toolbar_gallery_capitalization_consistent"
description = "Where the app renders toolbar labels, gallery actions, and form labels, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders button or action labels, they use specific verbs appropriate to the studio (for example Save board, Clear, Grid On/Off) rather than generic Submit/OK alone when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_field_and_fix"
description = "Where the app renders validation messages for Save board, rename, or Import, they name the offending field-contract key and the fix (for example name, tag, or schemaVersion), not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_gallery_copy_explains_next_step"
description = "Where the app renders an empty gallery state (after delete-all or a zero-match tag filter), the copy explains what belongs there and how to save a board or clear the filter."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "stage_and_toolbar_copy_polished"
description = "Where the app renders the <SHAPESHIFT GRID TOOL> title, typewriter-style intro line, and toolbar chrome copy, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "board_terminology_consistent"
description = "Where the app renders labels for the same concept in multiple places, terminology stays consistent (board / gallery / cell / brush) rather than mixing conflicting synonyms across Paint and Gallery."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "export_footer_copy_consistent"
description = "Where the app renders export footer captions (/MADE WITH SHAPESHIFT GRID TOOL and <SHAPESHIFTFESTIVAL.COM>), formatting and product naming stay consistent with the on-stage branding."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "save_feedback_is_specific"
description = "Where the app renders confirmation or success messages after saving a board, they state what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as <SHAPESHIFT GRID TOOL>, toolbar labels, or primary gallery actions."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_board_terminology"
description = "The same concept is named inconsistently across Paint and Gallery (for example mixing unrelated terms for board vs gallery card vs cell)."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders toolbar labels, gallery names/tags, or validation messages unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
