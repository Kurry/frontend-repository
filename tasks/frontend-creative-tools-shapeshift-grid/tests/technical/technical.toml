[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "Solid stores holds board cells, saved boards, mode, and palette — shared across components"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "Implemented with Solid.js, Solid stores, and Tailwind CSS; no browser storage APIs for persistence"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "Uses localStorage or sessionStorage to persist boards or canvas state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "2_4"
description = "Manages the boards collection only in component-local signals only rather than Solid stores"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "The QR mask is generated client-side from a locally shipped QRious (or equivalent) under vendor/, encoding the fixed festival URL with no network calls"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "2_6"
description = "The QR mask or image is fetched from an external QR service or other network endpoint instead of generated locally"
type = "binary"
weight = 1.0
negate = true
