[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable storyboard workspace: header, scene board, and view-mode toggles remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, Add Scene, Tile/List/Slide toggles, sidebar toggle, kebab triggers, and header tools present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Header titles (Demo Projects, 1. Getting Started), Welcome to Docs!, and scene titles/descriptions remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, header, sidebar overlay, scene cards, and create form content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_at_1024"
description = "At widths of 1024px and below the left storyboard sidebar collapses behind a toggle that opens it as an overlay drawer; at desktop widths the sidebar is open beside the scene grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "scene_grid_steps_down_to_one_column"
description = "The scene grid steps down from multiple columns at desktop widths to fewer columns at tablet widths and a single column at 375px width, with a logical stacking order."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_operates_primary_controls"
description = "At 375px, tap/click on Add Scene, view-mode toggles, and the sidebar toggle operates those controls (no pointer-only dead zones that ignore tap)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page has no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "scene_images_and_grid_resize"
description = "Scene card images and the scene grid size responsively to fit the layout at 1440px and 375px without overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "header_and_mode_toggles_remain_reachable"
description = "Header tools and Tile/List/Slide toggles remain reachable and usable at every width from 1440px to 375px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks or overflows at 1440px, 1024px, or 375px — header, sidebar, or scene grid collide or spill."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px, Add Scene, view-mode toggles, or sidebar toggle are too small or misaligned for reliable tapping."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_mobile"
description = "At 375px, scene titles, Welcome to Docs!, or header labels are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px, scene cards or header content is cropped, or unnecessary horizontal scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_missing_or_unresponsive_narrow"
description = "At ≤1024px the sidebar toggle is missing or the collapsed sidebar cannot be opened as an overlay."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_board"
description = "Fixed header or overlay chrome obscures scene cards or Add Scene so the board cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px or 1024px, header tools, view-mode toggles, or scene cards overlap each other unusably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "primary_controls_ignore_tap_on_mobile"
description = "At 375px, Add Scene or Tile/List/Slide toggles ignore tap/click input (press registers no mode change or create-form open)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "scene_images_overflow_viewport"
description = "Scene images use a static size that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "header_or_mode_toggles_disappear"
description = "Header tools or Tile/List/Slide toggles disappear at 375px or 1024px."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "export_import_palette_usable_at_375"
description = "At 375px width Export, Import, Command palette, Undo/Redo, status filter, and search remain reachable and operable without page-level horizontal scrolling or overlay clipping."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_or_palette_offscreen_at_375"
description = "At 375px, the export drawer or command palette renders off-screen or is unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.12"
name = "canvas_templates_version_usable_at_375"
description = "At 375px width the Canvas view, the Templates control, Undo/Redo, and the Version history panel remain usable without page-level horizontal scrolling, and the version diff wraps or scrolls inside its own panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
