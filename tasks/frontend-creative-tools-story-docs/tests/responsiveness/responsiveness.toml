[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable storyboard workspace: header, scene board, and view-mode toggles remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, Add Scene, Tile/List/Slide toggles, sidebar toggle, kebab triggers, and header tools present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Header titles (Demo Projects, 1. Getting Started), Welcome to Docs!, and scene titles/descriptions remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, header, sidebar overlay, scene cards, and create form content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_at_1024"
description = "At widths of 1024px and below the left storyboard sidebar collapses behind a toggle that opens it as an overlay drawer; at desktop widths the sidebar is open beside the scene grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "scene_grid_steps_down_to_one_column"
description = "The scene grid steps down from multiple columns at desktop widths to fewer columns at tablet widths and a single column at 375px width, with a logical stacking order."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_operates_primary_controls"
description = "At 375px, tap/click on Add Scene, view-mode toggles, and the sidebar toggle operates those controls (no pointer-only dead zones that ignore tap)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page has no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "scene_images_and_grid_resize"
description = "Scene card images and the scene grid size responsively to fit the layout at 1440px and 375px without overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "header_and_mode_toggles_remain_reachable"
description = "Header tools and Tile/List/Slide toggles remain reachable and usable at every width from 1440px to 375px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_import_palette_usable_at_375"
description = "At 375px width Export, Import, Command palette, Undo/Redo, status filter, and search remain reachable and operable without page-level horizontal scrolling or overlay clipping."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.12"
name = "canvas_templates_version_usable_at_375"
description = "At 375px width the Canvas view, the Templates control, Undo/Redo, and the Version history panel remain usable without page-level horizontal scrolling, and the version diff wraps or scrolls inside its own panel"
type = "binary"
weight = 1.0

