[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_scene_grid"
description = "On first load, Tile mode shows at least 8 seeded scene cards, each with a scene number, an image, and a title/description"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "created_scene_visible"
description = "After creating a scene titled 'Harbor Opening' with valid required fields, the text 'Harbor Opening' is visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "count_delta_after_creates"
description = "After adding 3 new scenes on top of the seed set, the board shows exactly 3 more scenes than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "slide_mode_single_scene"
description = "After switching to Slide mode, the board collapses to a single centered active scene with prev and next controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "edited_text_replaces_old"
description = "After focusing a scene's description and editing it in place to 'Evening Cutaway', the text 'Evening Cutaway' is visible on the board and the previous text is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "deleted_scene_removed"
description = "After deleting a scene via its kebab menu delete action, that scene's title/description is no longer visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_state_after_last_delete"
description = "After deleting the last remaining scene, the board shows a clearly visible empty state with a message and an Add Scene path back into the create flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_create_blocked"
description = "After submitting create with a required title/description field empty, the visible scene count is unchanged and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "mode_toggles_relayout"
description = "The storyboard nav bar offers Tile, List, and Slide toggles; Tile and List re-lay the same scene set as a card grid and a stacked list respectively, without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "slide_prev_next_advance"
description = "After advancing prev/next in Slide mode (when multiple scenes exist), the active scene changes and the centered scene updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "hover_feedback_visible"
description = "When hovering scene cards, mode toggles, or header controls, a visible hover lift, wash, or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "welcome_line_visible"
description = "Welcome to Docs! is visible in the workspace chrome on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "sidebar_rows_and_controls"
description = "On load, a left storyboard sidebar shows the active Getting Started row plus sibling demo storyboards with an Add Storyboard control and a footer Help control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "kebab_edit_delete_operate"
description = "After opening a scene's kebab menu, edit and delete actions for that scene are available and operate on that scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "inert_controls_toast_demo"
description = "After clicking an inert control (a sidebar storyboard row, a header utility tool, Add Storyboard, or Help), a demo-only toast appears and the page does not navigate away"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "console_clean_session"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "crud_updates_shared_state"
description = "Scenes collection supports create, edit, and delete with cards and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "multiple_view_modes_switchable"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "view_mode_flow_chain"
description = "Starting in Tile mode, toggling Tile to List to Slide and back re-lays the same scene set with an identical scene count in each mode; no mode switch reloads the document"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "static_board_no_crud"
description = "Scenes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "outbound_link_navigation"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.24"
name = "product_header_composition"
description = "The product header shows a logo mark, the Demo Projects project label, the 1. Getting Started storyboard title, a kebab menu, and utility tools (notifications bell, dashboard, account)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "kebab_menu_decorative_only"
description = "Scene edit and delete are unreachable from any per-scene control; the scene kebab menu is decorative and triggers no edit or delete action"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "create_flow_chain"
description = "Starting from the seeded board in Tile mode, submitting a valid new scene from Add Scene closes the create form, adds exactly one new card so the visible scene count increases by one, assigns the next scene number in sequence, and switching to List mode and then Slide mode shows the same new scene without a reload, with the Slide prev/next range extended to include it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "edit_flow_cross_mode"
description = "After editing a scene's description in Tile mode, switching to List mode shows the edited text on the same scene, and Slide mode shows the edited text when that scene is the active slide, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "delete_flow_renumber_chain"
description = "After deleting a scene through its kebab menu, the visible scene count decreases by exactly one (measured immediately before and after), the remaining scenes are renumbered so numbering stays contiguous, and the Slide-mode prev/next range shrinks so navigation never lands on the deleted scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "double_submit_single_scene"
description = "Double-activating a valid create submit in quick succession adds exactly one scene: the count increases by one and exactly one new card appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "slide_bounds_no_wrap"
description = "In Slide mode the prev control is disabled on the first scene and the next control is disabled on the last scene; neither control wraps around"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "delete_active_slide_neighbor"
description = "Deleting the scene currently shown in Slide mode moves the active slide to a valid neighboring scene rather than showing a blank slide"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "inline_validation_names_field"
description = "Submitting the create form with a required field empty shows an inline per-field validation message naming the empty field, and the submit control stays disabled until the required fields are valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "drawers_open_seeded_rows"
description = "The notifications and account/storyboards right drawers open as demo chrome showing seeded rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "scene_tutorial_copy"
description = "Scene descriptions carry tutorial copy about the product itself (header tools, notifications, view modes, scene menus, add-scene flows) rather than generic filler"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.37"
name = "direct_entry_no_login_gate"
description = "First load opens the storyboard workspace directly (header, left storyboard nav, and scene grid all visible) with no login, signup, or admin gate appearing at any point"
type = "binary"
weight = 1.0


[[criterion]]
id = "1.38"
name = "scene_field_contract_enforced"
description = "Scene create/edit enforces the request-body field contract: title length 2–80, body length 8–2000, status one of draft/review/ready, optional cameraNote at most 200 characters; out-of-contract input shows inline errors naming the field and does not change the scene count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "status_filter_and_search"
description = "A status filter (All plus draft/review/ready) and a search control filter the board; selecting a status hides non-matching scenes, search matches title/body case-insensitively, and Tile/List/Slide show the same filtered subset and count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "scene_drag_reorder_renumbers"
description = "After dragging a scene to a new position in Tile or List, visible numbers renumber contiguously from 1 and Slide prev/next follows the new order without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "undo_redo_restore_board"
description = "After creating a scene, Undo restores the prior scene count and removes that scene; Redo re-applies the create so the same title returns — Tile/List/Slide stay consistent without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "command_palette_runs_handlers"
description = "Opening the command palette (control or Ctrl/Cmd+K) and activating Switch to List or Add Scene runs the same handler as the visible control: List mode becomes active or the create form opens, and the palette closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "export_drawer_live_format_previews"
description = "Export opens a drawer with markdown, json, and outline tabs whose previews regenerate from the live scenes collection; after creating a scene with a unique title, all three previews include that title, and the json preview is a StoryboardPackage with schemaVersion 1, project Demo Projects, storyboard 1. Getting Started, and a scenes array entry matching the field contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "import_storyboard_json_round_trip"
description = "After exporting a StoryboardPackage that includes a session-created scene, deleting scenes to diverge, then Import of that JSON, the collection count, Tile/List/Slide contents, and a fresh export reconstruct to match the imported package without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "status_badge_on_scenes"
description = "Each scene shows a status badge reading draft, review, or ready (not color-only)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n_export_omits_session"
name = "export_omits_session_mutations"
description = "After creating or editing a scene, the Export markdown/json/outline preview omits that scene's title or body — an incomplete session export"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n_import_accepts_invalid"
name = "import_accepts_invalid_package"
description = "Importing malformed StoryboardPackage JSON or a scene that fails the field contract still changes the board with no visible error"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
