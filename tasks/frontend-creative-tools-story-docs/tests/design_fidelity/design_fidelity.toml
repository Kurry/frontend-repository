[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "workspace_spacing_matches_reference_scale"
description = "At 1440px, spacing among the top header, left storyboard sidebar, storyboard nav bar (Tile/List/Slide), and multi-column scene grid follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the docs/storyboard composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "gabarito_typography_matches_spec"
description = "Workspace UI type matches the Gabarito-based light storyboard look from the spec/reference: header titles (Demo Projects, 1. Getting Started), Welcome to Docs!, and scene card copy read as one hierarchical system — not a default system UI stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: product header + left storyboard sidebar + Tile/List/Slide nav + multi-column imaged scene grid with Welcome to Docs! — a docs/storyboard workspace, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — scene enter stagger on first load, newly created card enter, deleted card exit with renumber settle, Tile/List/Slide re-layout, Slide prev/next advance, description edit wash, demo toasts, right drawers, export drawer slide, and command palette fade — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "Responsive behavior matches the reference patterns: at widths of 1024px and below the left sidebar collapses behind a toggle/overlay; the scene grid steps down toward a single column at 375px while header tools and view-mode toggles stay reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Buttons, Tile/List/Slide toggles, kebab menus, create-form fields, and drawers use the light/yellow storyboard chrome styling rather than unstyled browser-default controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_hierarchy_header_and_cards"
description = "Typography hierarchy clearly distinguishes header project/storyboard titles, Welcome to Docs!, scene numbers/titles, and body descriptions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, view-mode toggles, and form fields show distinct default, hover, focus (visible ring), disabled (for example Slide prev on first / next on last, or disabled create submit), and error treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "light_yellow_surface_treatments"
description = "Color, depth, and border treatments match the light workspace with yellow accent: header/sidebar chrome, scene cards, and yellow edit wash read as one coherent system per the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "hover_microinteractions_match_spec"
description = "Hover/press microinteractions match the spec when driven through real UI paths: scene cards ease upward with soft shadow, scene images brighten, and header/mode toggles ease background/press."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_workspace_scale"
description = "Visible sizing or spacing among header, sidebar, nav bar, and scene grid contradicts the reference scale with arbitrary one-off gaps."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_light_yellow_palette"
description = "Workspace colors fall outside the specified light/yellow docs palette in a way that clearly contradicts the reference (for example a dark marketing theme or unrelated accent system)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "scene_card_sizing_mismatches_reference"
description = "Scene card image/title sizing or grid density clearly mismatches the reference storyboard card anatomy at 1440px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_motion_missing"
description = "Required motion is missing or incorrect where the spec requires it (no scene enter stagger, no card enter/exit, no view-mode re-layout transition, or no drawer slide) when exercised via real UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary form or button controls (Add Scene submit, view-mode toggles, kebab menus) use unstyled browser-default appearance when the spec styles them as storyboard chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_1440"
description = "At 1440px the header, left sidebar, and scene grid are misaligned or broken relative to the reference desktop composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Header titles, sidebar rows, scene cards, or drawer content render off-screen or clipped at the reference desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order or structure clearly deviates from the reference: missing left storyboard sidebar, missing Tile/List/Slide nav, or a marketing-landing layout instead of the docs/storyboard workspace."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_undifferentiated"
description = "Header titles, Welcome to Docs!, scene titles, and description body text have no visible typographic distinction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "hover_microinteractions_missing"
description = "Scene-card hover lift/shadow, image brighten, or header/mode toggle hover feedback is missing when the pointer hovers the real UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
