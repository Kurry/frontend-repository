[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_chrome_and_toasts"
description = "Where the app renders headings (Welcome to Docs!, Demo Projects, 1. Getting Started), buttons (Add Scene, Tile, List, Slide), and toasts, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as Add Scene, Add Storyboard, Edit, and Delete rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders create-form validation messages, they name the empty field (title or description) and the fix, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_board_explains_next_step"
description = "Where the app renders the empty board state, the copy explains that no scenes remain and how to add one."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "tutorial_copy_polished"
description = "Where the app renders scene tutorial copy and chrome labels, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (scene vs card, Tile/List/Slide mode names, storyboard vs project), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "scene_number_formatting_consistent"
description = "Where the app renders scene numbers across Tile, List, and Slide, numbering format stays consistent and contiguous after deletes."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "demo_toasts_consistent_wording"
description = "Where the app renders demo-only toasts for inert controls, wording is consistent across header tools and sidebar rows rather than vague one-off affirmations."
type = "binary"
weight = 0.5


[[criterion]]
id = "15.9"
name = "filtered_empty_explains_clear"
description = "Where the app renders a filtered-empty board state, the copy explains that no scenes match and how to clear the filter or search."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "import_errors_name_field"
description = "Where the app renders import validation errors, they name the offending field or that the package is invalid, not only a bare rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "version_and_checklist_formats_consistent"
description = "Version timestamps use one consistent format throughout the Version history panel, checklist progress readouts use one consistent n/m format, and template names use the same wording in the Templates list and their injection toasts"
type = "binary"
weight = 0.5

