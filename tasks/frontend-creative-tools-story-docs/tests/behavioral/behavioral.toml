[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: create one valid scene, switch to List mode, then switch to Slide and advance at least one scene; then reload. Confirm every facet coherently resets to the seeded baseline — at least eight seeded scenes (the created scene gone), Tile mode, and slide index at the first scene — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "view_mode_reversal_proves_live_set"
description = "Mode-reversal proof (genre stand-in for sort reversal): note the scene count and titles in Tile, switch to List and confirm the same set/count, switch to Slide and confirm the same set is reachable via prev/next, then return to Tile. Confirm the identical scene set and count — proving modes derive from live data, not three hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "slide_range_derived_from_collection"
description = "Derived-view sensitivity: create one valid scene and confirm Slide prev/next range extends to include it; then delete a different scene and confirm the Slide range shrinks so prev/next never lands on the deleted scene — the slide bounds change meaningfully with collection inputs."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_tile_list_slide"
description = "Cross-view echo: edit a scene's description in Tile mode; without reload confirm List shows the same edited text on that record and Slide shows the edited text when that scene is the active slide."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure the visible scene count, submit one valid new scene from Add Scene, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_scene_bodies_different_outcomes"
description = "Input-dependent output: create a scene with description text A and note the board; create another with clearly different description text B. Confirm the two new cards differ in the ways the inputs dictate (not byte-identical descriptions)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_mode_switch"
description = "Interleaved-flow integrity: open Add Scene and fill title/description but do not submit; switch to List mode; then return and submit the create. Confirm exactly one new scene appears, List still shows the full set including it, and neither flow corrupted the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_board"
description = "Edge-state round-trip: delete every scene until the empty state is visible, then create two valid scenes via Add Scene; confirm the empty state clears, both new cards appear with contiguous numbering, and Tile/List/Slide all show count 2."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After creating a scene and switching view mode then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "slide_range_identical_after_mutations"
description = "Creating or deleting scenes leaves the Slide prev/next range visually identical — a derived surface ignoring its collection inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_bodies_produce_identical_cards"
description = "Creating two scenes with different description inputs yields identical card text on the board."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_mode_state_stale_until_reload"
description = "After editing a description or creating a scene in Tile, List or Slide still shows stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.9"
name = "export_contains_session_create"
description = "Full-pipeline export probe: measure collection, create a valid scene with a unique title and body meeting the field contract, open Export immediately — markdown/json/outline previews contain that exact title and body text, and the json scenes array includes a matching request-body object (session work product, not a seed-only snapshot)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_probe"
description = "Round-trip probe: create a scene, Download/copy StoryboardPackage JSON, delete all scenes (empty state), Import the package — collection count, Tile/List/Slide titles, and a fresh json export reconstruct to the imported document without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_after_create"
description = "Undo round-trip: create a valid scene (count +1), Undo (count restored, title gone), Redo (same title returns) — proving mutations are reversible from live store state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "filter_derived_view_sensitivity"
description = "Derived-view sensitivity: create a scene with status review and a unique title, set status filter to draft — the new scene disappears; set filter to review or All — it reappears; search for its unique title with All selected shows only that match across modes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_identical_after_create"
description = "Creating a scene with a unique title and body leaves the Export markdown/json/outline visually identical to the pre-create export (derived artifact ignoring session mutations)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "import_fails_to_restore"
description = "After Import of a valid previously exported StoryboardPackage, the board count or titles diverge from the imported document."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.13"
name = "checklist_toggle_to_export_pipeline"
description = "On a seeded scene with a checklist, note its progress readout, click one unchecked rendered checkbox, and confirm the readout increments by exactly one; open Export markdown and confirm that line now reads - [x]; toggle it back and confirm the readout and the next export return to the prior state — the checkbox, readout, and artifact all derive from one body source."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "version_diff_restore_probe"
description = "Edit a scene's body from text A to text B, then to text C. Open its Version history: three versions list newest first with timestamps; selecting the A version shows C-only text marked as removals and A-only text as additions (input-dependent diff, not a constant rendering); Restore A, confirm the board and Slide show A, and a fresh markdown and json export carry A."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "canvas_position_vs_order_probe"
description = "In Canvas, drag one card far from its start; switch to List and confirm the numbering and order are exactly as before the drag; switch back to Canvas and confirm the dragged card kept its position while the others did not move; Reset layout returns all cards to the grid — canvas position and board order are independent facets of live state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.16"
name = "template_injection_count_delta"
description = "Note the scene count and the advertised scene count of a named template; inject it and immediately confirm the board count increased by exactly that number, the new scenes sit at the end with status draft and contiguous numbers, and the json export's scenes array grew by the same number; a single Undo restores the prior count."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n7"
name = "diff_constant_regardless_of_inputs"
description = "The version diff renders the same additions/removals regardless of which version is selected or what the edits contained, or comparing identical versions shows spurious differences."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
