[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "scene_enter_delight_beyond_minimum"
description = "Beyond the required short fade/upward settle, scene-card enter includes an extra delightful microinteraction (for example a richer stagger curve, number pop, or image reveal) that remains browser-observable on a fresh load (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "slide_storytelling_beyond_basic_swap"
description = "Slide mode offers an advanced transition beat beyond a hard cut — for example a coordinated slide/fade with direction awareness when using real prev/next controls (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "tutorial_copy_as_guided_narrative"
description = "Scene tutorial copy reads as a guided product narrative that teaches header tools, notifications, view modes, scene menus, and add-scene flows in a memorable instructional sequence (bonus execution quality beyond bare placeholders)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "camera_note_or_visual_aid_extra"
description = "An optional camera-note treatment or similar per-scene visual aid adds usability beyond bare title/description/image cards while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_power_path_beyond_basics"
description = "Beyond basic Tab/Enter operability, the board supports a power-user keyboard path such as arrowing through Slide scenes or Esc-to-close create without leaving the workspace (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_in_memory"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last view mode until reload, or last active slide while navigating modes) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_docs_workspace_polish"
description = "The logo mark, Demo Projects / 1. Getting Started header, Welcome to Docs!, and yellow-accent chrome read as a cohesive branded docs/storyboard tool rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "description_edit_craft_beyond_minimum"
description = "In-place description editing craft goes beyond a plain contenteditable — soft yellow wash, dashed outline, and clear commit/blur feedback feel polished (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local Gabarito font rendering or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_storyboard_feel"
description = "The overall workspace feels competition-grade: scene grid density, Tile/List/Slide craft, and tutorial-copy polish read as a professional storyboard docs instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_list_only"
description = "The shipped UI is a bare unstyled list or plain text controls with no header/sidebar/scene-grid storyboard immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified docs/storyboard composition (header + left storyboard nav + Tile/List/Slide + imaged scene board)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
