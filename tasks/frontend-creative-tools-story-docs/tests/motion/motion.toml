[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_animations_present"
description = "When hovering via real pointer movement, scene cards ease upward with a soft shadow, scene images brighten, and header and mode toggles ease their background/press states"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_hover"
description = "Tile/List/Slide mode switches update without full reload and hover feedback still works after switching"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "edit_focus_yellow_wash"
description = "Focusing a scene description applies a soft yellow wash and dashed outline while editing"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "load_stagger_fade_rise"
description = "On a fresh page load, scene cards stagger in with a short fade and slight upward settle rather than appearing all at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "scroll_reveal_below_fold"
description = "On a fresh page load (not after prior scrolling), scene cards below the fold reveal with a short fade and rise as real scrolling brings them into view"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "card_add_remove_microinteractions"
description = "Using the real UI controls, a newly created scene card animates into place and a deleted card animates out while the remaining cards ease into their new positions and numbers, in both Tile and List modes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "view_mode_transition"
description = "Clicking the Tile / List / Slide toggles re-lays the same scene set with a brief transition rather than an instant snap, and switching may toast the mode name"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "slide_prev_next_transition"
description = "Clicking prev/next in Slide mode advances the active scene with a short slide or fade transition rather than an instant swap"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "toasts_slide_and_autodismiss"
description = "Demo-only and feedback toasts slide in, remain readable, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "drawers_slide_from_right"
description = "The notifications and account drawers slide in from the right when opened and slide out on close rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, staggers, reveals, and card transitions are removed and state changes apply instantly while every feature stays reachable"
type = "binary"
weight = 1.0


[[criterion]]
id = "4.13"
name = "export_drawer_and_palette_transition"
description = "Opening and closing the export drawer through real controls slides it from the right; the command palette opens with a brief fade rather than a hard cut"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "reorder_settle_animation"
description = "After a drag reorder via real UI gesture, cards settle into their new slots rather than snapping with no transition (unless prefers-reduced-motion is set)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.15"
name = "canvas_drag_and_reset_motion"
description = "Dragging a canvas card via the real pointer lifts it with a shadow and it settles on release; Reset layout eases the cards back to the grid rather than teleporting (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "version_panel_checklist_template_motion"
description = "The Version history panel enters with a slide or fade rather than snapping, checklist checkboxes tick with a brief transition, and template-injected scenes animate into the board via the real Templates control (unless prefers-reduced-motion is set)"
type = "binary"
weight = 0.5

