[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_scene_updates_all_modes"
description = "Create flow: submitting a valid new scene from Add Scene closes the create form, adds exactly one new card so the visible scene count increases by one, assigns the next scene number in sequence, and switching to List then Slide shows the same new scene without a reload, with the slide prev/next range extended to include it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_inline_validation"
description = "Create flow: submitting with a required title or description empty triggers immediate inline validation naming the empty field, adds no scene, and leaves submit disabled until valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_description_echoes_across_modes"
description = "Edit flow: editing a scene's description in Tile mode updates that same scene's text; switching to List shows the edited text on the same record and Slide shows the edited text when that scene is the active slide — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_renumbers_and_shrinks_slide_range"
description = "Delete flow: deleting a scene through its kebab menu removes its card, decreases the visible scene count by one, renumbers the remaining scenes so numbering stays contiguous, and shrinks the Slide-mode range so prev/next never lands on the deleted scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_mode_toggle_retains_scene_set"
description = "View-mode flow: toggling Tile to List to Slide and back re-lays the same scene set with an identical scene count in each mode; switching modes never reloads the document."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last remaining scene, the empty state is clearly visible with a message and an Add Scene path."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "reload_returns_seeded_baseline"
description = "Reload baseline: after creating or editing scenes and switching to List or Slide, reloading the page returns the app to its seeded state — at least eight seeded scenes, Tile mode, and slide index at the first scene — because all state is in-memory."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "sidebar_collapse_preserves_workflow"
description = "At widths of 1024px and below, the left sidebar collapses behind a toggle; opening it as an overlay drawer and closing it again preserves the scene board workflow (same scenes and view mode) without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "drawers_open_close_expected"
description = "Notifications and account drawers open as demo chrome with seeded rows and close via close control or Escape, returning to the workspace without navigating away."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload_dead_end"
description = "After dismissing a drawer, closing the create form via cancel, or switching view modes, the user can continue create/edit/delete without a full page reload — no navigation dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "filter_search_flow"
description = "Filter/search flow: set status to review so only review scenes remain, type a unique substring from one remaining title into search, confirm Tile/List/Slide show only that match, then clear search and set All to restore the full set without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "reorder_flow_renumbers"
description = "Reorder flow: drag a middle scene above the first in Tile or List; numbers renumber contiguously, the moved scene's title is first, and Slide prev/next walks the new order."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "undo_redo_flow"
description = "Undo/redo flow: create a valid scene (count +1), Undo removes it and restores the count, Redo returns the same title — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "command_palette_flow"
description = "Command-palette flow: open with Ctrl/Cmd+K, run Switch to List (List active), run Add Scene (create form opens)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "export_session_then_omit_on_delete"
description = "Export flow: create a valid scene with a unique title, open Export, confirm markdown/json/outline include that title (json scenes entry matches the field contract), then delete it and confirm the next export omits it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "import_round_trip_flow"
description = "Import flow: export json after a create, delete scenes to diverge, Import the JSON, and confirm collection count, Tile/List/Slide contents, and a fresh export match the imported package."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "checklist_flow"
description = "Checklist flow: click an unchecked rendered checkbox on a scene with a checklist — the box checks, the scene's progress readout increments, and the next markdown export shows that line as - [x]; toggling back restores - [ ] and the prior readout, all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "version_history_flow"
description = "Version flow: after two distinct body edits, the scene's Version history lists three timestamped versions newest first; selecting version 1 shows marked additions and removals; Restore makes version 1 current on the board and in Slide mode and enables Undo to reverse the restore."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.19"
name = "canvas_flow"
description = "Canvas flow: switch to Canvas, drag a card to a new spot, switch to List (order unchanged), return to Canvas (position kept), then Reset layout returns the cards to a tidy grid — with no reload and no change to numbering."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.20"
name = "template_flow"
description = "Template flow: injecting a named template appends its scenes at the end with status draft, shows a toast naming the template and scene count, and a single Undo removes the whole injection restoring the prior count."
type = "binary"
weight = 1.0

