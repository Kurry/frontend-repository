[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_scene_updates_all_modes"
description = "Create flow: submitting a valid new scene from Add Scene closes the create form, adds exactly one new card so the visible scene count increases by one, assigns the next scene number in sequence, and switching to List then Slide shows the same new scene without a reload, with the slide prev/next range extended to include it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_inline_validation"
description = "Create flow: submitting with a required title or description empty triggers immediate inline validation naming the empty field, adds no scene, and leaves submit disabled until valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_description_echoes_across_modes"
description = "Edit flow: editing a scene's description in Tile mode updates that same scene's text; switching to List shows the edited text on the same record and Slide shows the edited text when that scene is the active slide — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_renumbers_and_shrinks_slide_range"
description = "Delete flow: deleting a scene through its kebab menu removes its card, decreases the visible scene count by one, renumbers the remaining scenes so numbering stays contiguous, and shrinks the Slide-mode range so prev/next never lands on the deleted scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_mode_toggle_retains_scene_set"
description = "View-mode flow: toggling Tile to List to Slide and back re-lays the same scene set with an identical scene count in each mode; switching modes never reloads the document."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last remaining scene, the empty state is clearly visible with a message and an Add Scene path."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "reload_returns_seeded_baseline"
description = "Reload baseline: after creating or editing scenes and switching to List or Slide, reloading the page returns the app to its seeded state — at least eight seeded scenes, Tile mode, and slide index at the first scene — because all state is in-memory."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "sidebar_collapse_preserves_workflow"
description = "At widths of 1024px and below, the left sidebar collapses behind a toggle; opening it as an overlay drawer and closing it again preserves the scene board workflow (same scenes and view mode) without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "drawers_open_close_expected"
description = "Notifications and account drawers open as demo chrome with seeded rows and close via close control or Escape, returning to the workspace without navigating away."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload_dead_end"
description = "After dismissing a drawer, closing the create form via cancel, or switching view modes, the user can continue create/edit/delete without a full page reload — no navigation dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "scene_crud_unavailable_from_ui"
description = "Scene create (Add Scene), in-place description edit, or kebab delete cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "create_fails_to_appear_or_duplicates"
description = "Submitting a valid new scene either fails to add a visible card or adds duplicate cards for a single submit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "edits_desync_across_modes"
description = "After editing a scene description in Tile mode, List or Slide still shows the pre-edit text for that same scene without a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_mode_switch_breaks_or_loses_scenes"
description = "Switching among Tile, List, and Slide breaks the layout, reloads the document, or changes the scene count."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_board_broken_after_last_delete"
description = "After deleting all scenes, the board is blank or broken with no empty-state message and no Add Scene path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "modes_disagree_on_scene_set"
description = "Tile, List, and Slide disagree about which scenes exist or about the scene count for the same session state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_sidebar_cannot_reopen"
description = "At ≤1024px, after the sidebar collapses, the toggle cannot reopen it as an overlay drawer."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "drawer_blocks_with_no_exit"
description = "A notifications or account drawer blocks the workspace with no working exit (no close control and no Escape)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_create_lacks_feedback"
description = "An invalid create attempt (empty required title/description) provides no visible validation feedback naming the empty field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "dead_end_requires_reload"
description = "Recovering from a drawer, create form, or view-mode switch requires a full page reload — the UI reaches a dead end."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
