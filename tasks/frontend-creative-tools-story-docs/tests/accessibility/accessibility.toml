[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "storyboard_controls_keyboard_operable"
description = "Every interactive control — header tools (notifications bell, dashboard, account, kebab), sidebar storyboard rows, Add Storyboard, Help, Tile/List/Slide toggles, Add Scene, create/edit fields, per-scene kebab menus, drawer controls, and Slide prev/next — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "drawers_escape_and_return_focus"
description = "Open notifications or account drawers can be dismissed with Escape and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "scene_images_have_descriptive_alt"
description = "Scene card images carry descriptive alt text, and icon-only controls (header tools, kebabs, view-mode icons) expose accessible names."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "create_validation_announced_live"
description = "Create-form inline validation messages for empty required title/description fields are shown visually and announced through a polite ARIA live region."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "create_form_fields_explicitly_labeled"
description = "Add Scene create-form fields (title and description/body) use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "heading_order_workspace"
description = "Workspace headings follow a logical order with no skips (for example the Welcome to Docs! / storyboard title line into section headings), without jumping H1→H3."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example nav for the left storyboard sidebar and/or storyboard nav bar, and main for the scene board) so assistive technology can navigate the workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "light_workspace_contrast"
description = "Header titles (Demo Projects, 1. Getting Started), sidebar rows, scene titles/descriptions, and primary controls meet sufficient contrast against the light workspace surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_controls_and_menus"
description = "Header tools, view-mode toggles, Add Scene, kebab triggers, and form submits use semantic button/input roles rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "kebab_menu_keyboard_and_escape"
description = "Per-scene kebab menus open as keyboard-operable menus: arrow keys move between the edit and delete items and Escape closes the menu."
type = "binary"
weight = 1.0


[[criterion]]
id = "1.11"
name = "export_palette_dialogs_focus"
description = "The export drawer and command palette behave as dialogs: focus moves into them when opened, stays trapped while open, Escape dismisses them, and focus returns to the invoking control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "status_badges_not_color_only"
description = "Status badges include the status word draft, review, or ready — status is not conveyed by color alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "import_errors_announced_live"
description = "Import validation errors are shown visually and announced through a polite ARIA live region."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Header tools, Tile/List/Slide toggles, Add Scene, per-scene kebabs, create fields, drawer controls, or Slide prev/next cannot be activated or reached via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused storyboard controls (view-mode toggles, Add Scene, kebab items, create fields, drawer triggers) show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "icon_only_controls_lack_names"
description = "Icon-only header tools, kebab triggers, or view-mode icons lack accessible names/ARIA labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "create_error_color_only"
description = "Empty required-field validation on the create form is indicated by color alone with no text message naming the empty field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "drawers_fail_escape_or_focus_return"
description = "Pressing Escape leaves an open notifications or account drawer still visible, or closing the drawer leaves focus away from the control that opened it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_workspace_text"
description = "Scene descriptions, Welcome to Docs!, or header titles are unreadable due to poor contrast on the light workspace."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "create_errors_visual_only"
description = "Create-form validation feedback is visual only and is not announced to assistive technology (no live region or equivalent association)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "scene_images_missing_alt"
description = "One or more seeded scene images is missing descriptive alt text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Headings in the storyboard workspace are skipped or unordered (for example jumping from H1 to H3)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "reduced_motion_ignored"
description = "With prefers-reduced-motion set, scene-card staggers, scroll reveals, or card enter/exit transitions still animate instead of applying instantly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.14"
name = "checklist_checkboxes_real_keyboard_controls"
description = "Rendered checklist checkboxes inside scene bodies are real keyboard-operable controls: they can be focused and toggled with the keyboard, and toggling updates the checklist progress readout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "version_panel_keyboard_and_diff_text_marks"
description = "The Version history panel and its Restore controls are keyboard reachable, and diff additions and removals carry visible plus and minus text marks rather than color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "template_injection_announced_live"
description = "Template injection announces its result (template name and scene count) through a polite live region as well as a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
