[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_board_after_last_delete"
description = "After deleting the last remaining scene, the board shows a clearly visible empty state with a message and an Add Scene path back into the create flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "empty_required_fields_inline_validation"
description = "Submitting the create form with a required title or description empty adds no scene: the scene count is unchanged, an inline validation message names the empty field, and the submit control stays disabled until the required fields are valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_not_invalid_only"
description = "Create-form validation copy names the empty field (title or description) rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "inert_chrome_toasts_demo_only"
description = "Clicking inert chrome (sidebar storyboard rows, Add Storyboard, Help, notifications bell, dashboard, account, or header kebab) shows a demo-only toast rather than navigating away, and the document URL stays on the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_submit_creates_exactly_one"
description = "Double-activating a valid create submit adds exactly one scene: the visible scene count increases by one and one new card appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "slide_bounds_disable_prev_next"
description = "In Slide mode the prev control is disabled on the first scene and the next control is disabled on the last scene; neither wraps around."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "delete_active_slide_moves_to_neighbor"
description = "Deleting the scene currently shown in Slide mode moves the active slide to a valid neighboring scene rather than showing a blank slide."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_create_and_board_controls"
description = "Add Scene, create-form fields, view-mode toggles, kebab triggers, and Slide prev/next use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "drawer_close_paths"
description = "Notifications and account drawers close via an explicit close control and Escape, returning to the workspace without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "delete_kebab_is_discoverable_destructive"
description = "Per-scene kebab delete is a clearly labeled destructive action (Delete) distinct from edit, and completing it removes that scene from the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_board_shows_nothing"
description = "After the last scene is deleted, the board shows nothing — no empty-state message and no Add Scene path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "validation_errors_only_in_console"
description = "Empty required-field create failures surface only in the browser console with no visible inline field feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "inert_chrome_silent_or_navigates"
description = "Clicking an inert header/sidebar control either navigates away from the app or produces no visible feedback at all."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "delete_lacks_destructive_label"
description = "Scene delete proceeds from an unlabeled or non-destructive-looking control with no Delete labeling distinguishing it from edit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_controls_nonsemantic"
description = "Primary interactive controls (view-mode toggles, Add Scene, kebabs, drawer triggers) are non-semantic div/span click targets without button/role semantics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "drawers_not_keyboard_dismissible"
description = "With a notifications or account drawer open, keyboard users cannot dismiss it (no Escape path and no focusable close control)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "invalid_create_still_adds_scene"
description = "Submitting the create form with an empty required title or description still increases the scene count or enables submit while invalid."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_or_missing_action_labels"
description = "Primary actions show blank, placeholder, or ambiguous labels such as 'Submit', 'OK', or 'Button' instead of specific labels like Add Scene, Tile, List, Slide, Edit, or Delete."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "slide_wraps_or_lands_blank"
description = "In Slide mode, prev on the first scene or next on the last wraps around, or deleting the active slide leaves a blank slide with no valid neighbor."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "double_submit_duplicates_scene"
description = "Double-activating a valid create submit adds more than one scene or leaves duplicate cards for a single intended create."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "4.11"
name = "field_contract_bounds_rejected"
description = "Submitting create with title shorter than 2 characters, body shorter than 8 characters, or status outside draft/review/ready adds no scene, shows an inline validation message naming the invalid field, and leaves submit disabled until valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "filtered_empty_state"
description = "When the status filter or search matches nothing, the board shows an empty filtered state explaining that no scenes match and how to clear the filter or search."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "import_rejects_invalid_package"
description = "Importing malformed StoryboardPackage JSON, schemaVersion other than 1, project other than Demo Projects, storyboard other than 1. Getting Started, or a scene that fails the create/edit field contract leaves the collection unchanged and shows a visible error naming the problem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "undo_redo_noop_when_empty"
description = "Undo with no prior mutation leaves the board unchanged; Redo with nothing undone is a no-op (controls disabled or inert with no board change)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "import_mutates_on_invalid"
description = "An invalid StoryboardPackage import changes the scene collection without a visible error naming the problem."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "out_of_contract_create_succeeds"
description = "A create with title/body outside the field-contract bounds or an invalid status still increases the scene count."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
