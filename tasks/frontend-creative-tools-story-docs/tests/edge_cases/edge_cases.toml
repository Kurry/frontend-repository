[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_board_after_last_delete"
description = "After deleting the last remaining scene, the board shows a clearly visible empty state with a message and an Add Scene path back into the create flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "empty_required_fields_inline_validation"
description = "Submitting the create form with a required title or description empty adds no scene: the scene count is unchanged, an inline validation message names the empty field, and the submit control stays disabled until the required fields are valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_not_invalid_only"
description = "Create-form validation copy names the empty field (title or description) rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "inert_chrome_toasts_demo_only"
description = "Clicking inert chrome (sidebar storyboard rows, Add Storyboard, Help, notifications bell, dashboard, account, or header kebab) shows a demo-only toast rather than navigating away, and the document URL stays on the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_submit_creates_exactly_one"
description = "Double-activating a valid create submit adds exactly one scene: the visible scene count increases by one and one new card appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "slide_bounds_disable_prev_next"
description = "In Slide mode the prev control is disabled on the first scene and the next control is disabled on the last scene; neither wraps around."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "delete_active_slide_moves_to_neighbor"
description = "Deleting the scene currently shown in Slide mode moves the active slide to a valid neighboring scene rather than showing a blank slide."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_create_and_board_controls"
description = "Add Scene, create-form fields, view-mode toggles, kebab triggers, and Slide prev/next use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "drawer_close_paths"
description = "Notifications and account drawers close via an explicit close control and Escape, returning to the workspace without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "delete_kebab_is_discoverable_destructive"
description = "Per-scene kebab delete is a clearly labeled destructive action (Delete) distinct from edit, and completing it removes that scene from the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "field_contract_bounds_rejected"
description = "Submitting create with title shorter than 2 characters, body shorter than 8 characters, or status outside draft/review/ready adds no scene, shows an inline validation message naming the invalid field, and leaves submit disabled until valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "filtered_empty_state"
description = "When the status filter or search matches nothing, the board shows an empty filtered state explaining that no scenes match and how to clear the filter or search."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "import_rejects_invalid_package"
description = "Importing malformed StoryboardPackage JSON, schemaVersion other than 1, project other than Demo Projects, storyboard other than 1. Getting Started, or a scene that fails the create/edit field contract leaves the collection unchanged and shows a visible error naming the problem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "undo_redo_noop_when_empty"
description = "Undo with no prior mutation leaves the board unchanged; Redo with nothing undone is a no-op (controls disabled or inert with no board change)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "single_version_and_identical_diff"
description = "A scene with only one version shows no enabled Restore action, and comparing a version with itself (or one identical to current) shows an explicit no-differences state rather than an empty or broken diff."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "checkbox_toggle_no_side_effects"
description = "Toggling a rendered checklist checkbox changes only that line's checked state and the progress readout — the scene count, numbering, and version count stay unchanged."
type = "binary"
weight = 1.0

