[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the storyboard workspace becomes interactive within 2 seconds, with the seeded scene board (at least eight imaged scenes) already visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_including_hydration"
description = "No console errors or warnings appear on load or during a full exercise of the app (create, edit, delete, Tile/List/Slide switches, drawers), including export, import, undo, filter/search, and no hydration errors or warnings on the workspace route."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_mode_switch_responds_quickly"
description = "Toggling Tile, List, and Slide re-lays the board with UI response in under 100ms perceived immediacy (no multi-second hang before the mode change appears)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "workspace_visible_without_blank_flash"
description = "The workspace renders its content directly on load with no post-load content flash or visible layout jump as fonts and scene images finish loading; image regions hold their space."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_board_scrolls_without_lag"
description = "With at least eight seeded imaged scenes on the board, scrolling the grid/list and switching view modes shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_create_delete"
description = "During create and delete state changes (new card enter, deleted card exit, renumber), the UI remains interactive — view-mode toggles and other scenes stay operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "scene_motion_stays_smooth"
description = "Scene enter stagger, card enter/exit, and Slide prev/next transitions maintain smooth motion without visible hitching during normal use (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_mode_and_crud_no_hang"
description = "Rapid view-mode switching, filter/search changes, and repeated create/delete/undo/export actions stay responsive with no hangs or dropped interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_no_runaway"
description = "An extended session of mode switches, creates, edits, and deletes shows no runaway resource use that freezes the tab."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "image_regions_hold_space_while_loading"
description = "While scene images finish loading, their card regions hold reserved space so the board does not collapse then jump."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the storyboard workspace is interactive on local cold load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors, warnings, or hydration mismatch messages appear during load or create/edit/delete/view-mode flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "view_mode_switch_blocks_or_lags"
description = "Tile/List/Slide switches block the UI or lag for a multi-second pause before the board re-lays."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "create_delete_hangs_ui"
description = "Creating or deleting a scene causes the UI to hang or freeze."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "seeded_board_kills_frame_rate"
description = "With the seeded eight-plus scene board, scrolling or mode switching kills the frame rate into obvious stutter."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "During scene enter/exit or view-mode transition animations, input becomes unresponsive (clicks on toggles or Add Scene are dropped)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "fonts_or_images_cause_layout_jump"
description = "As fonts or scene images finish loading, the workspace visibly flashes different content or jumps layout because image regions did not reserve space."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Repeated create/delete and mode switching causes runaway browser resource usage that freezes or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed while the workspace settles after load — a blank screen with no header or board chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_use_crashes"
description = "Rapid view-mode switching or repeated create/delete crashes the app or leaves it unresponsive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.11"
name = "checklist_canvas_diff_template_responsive"
description = "Checklist toggles, canvas card drags, version diff rendering, and template injection complete without console errors, hangs, or dropped updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
