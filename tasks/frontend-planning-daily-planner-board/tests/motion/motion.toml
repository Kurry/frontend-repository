[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_across_chrome"
description = "Hovering nav items, board and header buttons, task cards, Add task affordances, and right-rail buttons shows a visible hover wash, border, or shadow change (verified via computed style while actually hovering) and a pointer cursor"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "toast_lifecycle_and_day_swap_in_place"
description = "A demo toast triggered by clicking a chrome-only control enters with a short ease, holds briefly, then exits on its own, and selecting a different calendar day swaps the panel contents in place without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "static_chrome_without_hover_feedback"
description = "Nav items, task cards, and right-rail buttons show no hover wash, border, or shadow change on pointer hover, so the board chrome feels static"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "task_add_remove_animates_with_gap_close"
description = "Driven through the real Add task and delete controls (not any state shortcut): a newly created task card animates into its column, a deleted card animates out, and the surrounding cards slide smoothly to close the gap rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "checkbox_toggle_animates_checked_state"
description = "Clicking a task's completion checkbox with the real control animates the checked state with a short transition, and the task's appearance updates immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "calendar_drag_follows_pointer_and_settles"
description = "While dragging a scheduled task's block on the calendar hour grid with a real pointer gesture, the block follows the pointer and settles into its new slot with a short ease rather than teleporting"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "footer_total_updates_without_lag"
description = "A column's planned-time footer total updates immediately when its tasks change, with no visible lag or stale intermediate value"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "reduced_motion_removes_animations"
description = "With prefers-reduced-motion enabled, animations are removed and state changes apply instantly while every flow remains fully functional"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, gesture, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
