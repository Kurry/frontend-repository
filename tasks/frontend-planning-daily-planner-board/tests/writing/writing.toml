[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_use_consistent_capitalization"
description = "Where the app renders headings and section titles (Cadence, Calendars, day headers, Export tabs), they use consistent capitalization throughout"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders action labels, they are specific verbs such as Add task, Export, Download ICS, Copy planner JSON, Import planner JSON, Rollover incomplete, Complete selected, and Undo rather than generic Submit or OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders validation or import errors, they name the problem and the fix in plain language (for example naming title or plannedTime) rather than only Invalid"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_use_plain_language"
description = "Where empty columns or empty filter results render messages, they use plain language with no placeholder or lorem text"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "channel_and_conflict_copy_is_clear"
description = "Where channel filter chips and the Conflicts drawer render copy, channel names and colliding task titles are readable and specific"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.6"
name = "export_tab_labels_are_specific"
description = "Where the export canvas renders tab and download labels, they specifically name ICS and Planner JSON"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "nav_ritual_labels_consistent"
description = "Where the left nav renders Daily rituals and Weekly rituals labels, capitalization and wording stay consistent with the board chrome"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "no_lorem_or_placeholder_copy"
description = "Where the app renders any user-visible string, no lorem ipsum, TODO, asdf, or template placeholders appear"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "generic_submit_ok_labels"
description = "Primary planner actions use only generic labels like Submit or OK where a specific verb is possible"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "opaque_validation_copy"
description = "Validation messages say only Invalid or Error with no field name or fix"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "placeholder_or_lorem_visible"
description = "Lorem ipsum, TODO, or scaffolding placeholder copy is visible in the shipped UI"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "inconsistent_capitalization_noise"
description = "Headings and buttons mix capitalization conventions in a noisy, inconsistent way across Cadence chrome"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in UI writing quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 0.5
