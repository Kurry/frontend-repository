[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "three_region_spacing_matches_reference"
description = "At desktop width, spacing among the left nav rail, central day columns, and right calendar rail matches the reference screenshots' dense planner composition within a small tolerance"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "day_column_headers_match_reference"
description = "Day column headers show weekday, date, and Reflect/Shutdown/Plan action labels in the same compact hierarchy visible in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "seeded_board_matches_reference_content"
description = "On load, Set up Cadence, Weekly planning, Daily planning, and Work appear in the July 18–20 columns with #work tags and chips consistent with the reference overview and segments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "task_add_remove_motion_matches_spec"
description = "Task add and remove use the specified enter/exit and gap-close motion rather than instantaneous pops when driven through real controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "calendar_panel_matches_reference"
description = "The Calendars panel's 1x zoom pill, Sat 18 header, Automatic Bill Payment - Sallie Mae all-day row, and 12 AM–11 PM hour ruler match the reference treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_planner_chrome"
description = "Board header buttons, Add task, and form controls use the same calm radii, padding, and light-surface treatment as the reference chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_hierarchy_matches_reference"
description = "Cadence wordmark, column headers, task titles, and metadata chips keep a clear hierarchy consistent with the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "hover_states_match_spec"
description = "Nav items, task cards, and right-rail buttons show the specified hover wash or border change rather than browser-default only"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "accent_and_surface_match_reference"
description = "The light surface and single accent used for active nav, Today, planned-time chips, and channel tags match the reference palette character"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "july18_today_marker_matches_reference"
description = "The July 18 column's today marker treatment is visually distinct in the same spirit as the reference"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_density"
description = "Visible spacing among rails and columns is sparse or marketing-like in a way that contradicts the dense reference planner"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_reference_character"
description = "Accent or surface colors read as a different product theme than the calm light Cadence reference"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "column_headers_missing_action_labels"
description = "Day columns omit Reflect/Shutdown/Plan action labels that the reference shows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_task_motion_missing"
description = "Task add/remove or checkbox completion motion is missing where the spec and reference imply motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "browser_default_form_controls"
description = "Add task or edit form controls use bare browser-default styling that breaks the reference chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_reference"
description = "At 1440 the three-region layout is misaligned versus the reference overview"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_vs_reference"
description = "Nav labels, column footers, or calendar hours render clipped relative to the reference framing"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "seeded_structure_deviates_from_reference"
description = "Seeded task placement or Set up Cadence subtasks deviate from the reference board structure"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_undifferentiated"
description = "Cadence wordmark, column headers, and task titles have no typographic distinction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "hover_microinteractions_missing"
description = "Hover feedback on nav, cards, or utility buttons is missing relative to the specified reference behavior"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
