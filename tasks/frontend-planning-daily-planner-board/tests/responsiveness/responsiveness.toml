[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "three_regions_visible_at_1440"
description = "At 1440px wide, the fixed left nav rail, central multi-day board, and fixed right calendar rail are all visible at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "board_scrolls_inside_region"
description = "The board scrolls horizontally inside its own region; the page body never scrolls horizontally at desktop widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "narrow_desktop_board_shrinks"
description = "At narrower desktop widths around 1024px, the central board region shrinks while remaining horizontally scrollable and the nav and calendar rails never overlap board content"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clipping_at_desktop_widths"
description = "At 1440 and 1024, no board column headers, task cards, or calendar hour labels clip outside the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_canvas_usable_at_1440_and_1024"
description = "The export canvas and bulk tray remain fully usable at 1440 and at 1024 without clipping their primary Download, Copy, or bulk action controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "rails_stay_readable_when_board_shrinks"
description = "When the board region shrinks, the left nav labels and right calendar panel stay readable and operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "day_columns_keep_equal_structure"
description = "Across supported desktop widths, day columns keep header, task area, Add task, and footer structure without collapsing into an unusable single strip"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.8"
name = "utility_strip_stays_accessible"
description = "The right utility strip buttons remain visible and clickable at 1440 and 1024"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.9"
name = "filter_popover_fits_viewport"
description = "Opening Filter at 1024 keeps channel chips and the search field inside the viewport without horizontal page scroll"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.10"
name = "header_controls_remain_reachable"
description = "Today, Filter, Board, Export, Undo, and Redo remain reachable at supported desktop widths"
type = "binary"
weight = 1.0

