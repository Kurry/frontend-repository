[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "conflict_drawer_polish_beyond_list"
description = "Beyond listing colliding titles, the Conflicts drawer offers a one-click jump or edit affordance that focuses one of the colliding tasks for resolution"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "rollover_preview_before_commit"
description = "Rollover incomplete shows a brief preview count or title list of tasks that will move to July 18 before the move commits"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "export_diff_hint_after_mutation"
description = "After a mutation, the Export entry point or canvas offers a subtle cue that artifacts are stale versus freshly recompiled"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "bulk_move_day_with_live_footer_preview"
description = "Move to day in the bulk tray previews how the destination column's planned-time total will change before confirm"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_chord_undo_redo"
description = "Undo and Redo also respond to standard keyboard chords in addition to the header controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "ics_uid_stability_across_exports"
description = "Repeated ICS exports for an unchanged task keep a stable UID per task so calendar apps can update rather than duplicate"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "empty_filter_coach_copy"
description = "When channel filter and search match nothing, the board shows coachful empty copy that names how to clear filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "today_column_scroll_into_view"
description = "Activating Today smoothly scrolls the July 18 column into view within the horizontal board"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "subtask_progress_on_card"
description = "Tasks with subtasks show a compact n of m progress cue on the card beyond the expanded checklist"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "import_paste_and_file_parity"
description = "Import accepts both file picker and paste with identical validation and success outcomes"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a delightful, browser-observable enhancement beyond the written specification that is NOT covered by any other criterion in this file and that a real planner user would value. If present, name the enhancement and cite the concrete evidence. If nothing beyond the spec stands out, answer no."
type = "binary"
weight = 1.0
