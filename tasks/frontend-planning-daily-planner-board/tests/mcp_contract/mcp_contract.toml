[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "The four contract-mandated modules — browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 — are initialized and bound to the task entity, board / calendar-day-panel / export-canvas destinations, and artifact export/import/copy operations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers for entity create/update/delete/toggle and artifact export/import call the same application logic as the visible Add task, edit, checkbox, Export, and Import controls so board state and tool results stay in sync"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations and routes from the contract are available — no undeclared destinations beyond board, calendar-day-panel, and export-canvas, and no undeclared entity fields beyond the contracted set"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation: session info, tool list, and invoke succeed for browse, entity, form, and artifact tools against the running Cadence board"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "The declared task entity operations — create, select, update, delete, and toggle — work over the contracted fields (title, done, channel, plannedTime, day, startTime, notes, subtasks), with delete requiring explicit confirm=true"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "The form-workflow validate, submit, and cancel operations are bound to the task form's contracted fields (title, done, channel, plannedTime, day, startTime, notes, subtasks) with normal validation and visible errors remaining active"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations are limited to board, calendar-day-panel, and export-canvas; filters are channel, search, and day — matching the declared bindings"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared module routes or capabilities are exposed beyond browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface the Cadence session and contracted tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_import_copy_bound"
description = "Artifact-transfer export, import, and copy operations are bound to the ics and planner-json formats and planner-json import mode, and invoking export returns payloads that match the visible Export canvas previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling is unbound, missing, or a no-op for the mandated Cadence modules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "Handlers do not match UI logic because a WebMCP entity create or toggle leaves the board card, calendar block, or export preview out of sync with the tool result"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or entity operations beyond the Cadence contract bindings are exposed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "Validation bypasses lead to inconsistent MCP and UI state — for example a tool create succeeds with an empty title while the UI form would reject it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for Cadence tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "No module contract is implemented where browse-query-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is declared required"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n11"
name = "artifact_export_omits_live_tasks"
description = "Artifact export via MCP returns ICS or planner JSON that omits tasks present on the visible board"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
