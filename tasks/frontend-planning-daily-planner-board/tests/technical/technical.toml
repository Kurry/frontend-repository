[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "cross_view_state_coherence"
description = "A task edited, completed, or deleted in one place is reflected consistently in the board card, the calendar panel when scheduled, and the affected column's planned-time total, all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "browser_storage_stays_empty"
description = "localStorage and sessionStorage remain empty after creating, editing, completing, and deleting tasks; app state is held in memory only"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "keyboard_operable_with_visible_focus"
description = "Every interactive control — nav items, Add task controls, task checkboxes, board header buttons, and right-rail buttons — is reachable and operable with the keyboard alone and shows a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "edit_dialog_traps_and_returns_focus"
description = "The task edit dialog exposes dialog semantics with aria-modal, traps focus while open, and returns focus to the control that opened it on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "checkbox_accessible_name_includes_title"
description = "Each task's completion checkbox exposes an accessible name that includes the task title"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.7"
name = "toast_announced_via_aria_live"
description = "The demo toast is announced through an aria-live polite region in addition to being shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.8"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "console_clean_including_hydration"
description = "During a full exercise of the app the browser console shows no errors, no warnings, no unhandled promise rejections, and no hydration mismatch messages — on first load and after in-app interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "deep_link_renders_complete_seeded_board"
description = "Loading the app URL directly renders the complete board with its seeded tasks and full chrome — the same view and state baseline as any in-app path, with no 404, blank shell, or half-rendered page"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "rapid_input_stays_responsive"
description = "Rapidly toggling checkboxes and adding several tasks in quick succession keeps the UI responsive with no hangs, dropped interactions, or views desyncing from each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "in_memory_persistence_via_export_artifacts"
description = "After mutations, localStorage and sessionStorage remain empty, and the session's durable end state is the Export canvas ICS and planner JSON artifacts plus the MCP query surface rather than browser storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "api_shaped_field_contract_enforced_in_ui"
description = "Add task and edit forms enforce the Task field contract with named inline errors for title, day, channel, plannedTime, and startTime bounds, and a successfully created task's fields match what a subsequent planner JSON export entry shows for that task"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "export_import_share_same_store"
description = "Importing planner JSON updates the same tasks collection the board, calendar panel, column footers, undo history, and export previews read — not a disconnected copy"
type = "binary"
weight = 1.0

