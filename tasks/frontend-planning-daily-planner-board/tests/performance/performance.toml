[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_including_hydration"
description = "During a full exercise including add, edit, filter, export recompile, and import attempts, the console shows no errors, no warnings, and no hydration mismatch messages"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "export_recompile_stays_snappy"
description = "After mutating a task, reopening Export shows updated ICS and planner JSON without a multi-second hang"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "filter_updates_without_blanking"
description = "Changing channel filter or search updates visible tasks promptly without blanking the entire board into an empty shell mid-update"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.5"
name = "twenty_one_columns_render_without_lag"
description = "The 21 day columns and seeded tasks render without perceived lag on first interactive paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Toggling checkboxes, bulk complete, and rollover keep the UI interactive with no frozen chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "add_remove_animations_stay_smooth"
description = "Task add/remove animations and calendar drag settle remain smooth under normal use without obvious stutter"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapidly toggling checkboxes, adding tasks, filtering, and recompiling export previews keeps the UI responsive with no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stays_stable"
description = "An extended session of creates, deletes, undos, and export opens shows no runaway slowdown or tab crash"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "deep_link_renders_seeded_board"
description = "Loading the app URL directly renders the complete seeded board without a prolonged blank shell"
type = "binary"
weight = 1.0

