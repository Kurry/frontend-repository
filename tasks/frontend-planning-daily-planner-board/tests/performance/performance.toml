[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_including_hydration"
description = "During a full exercise including add, edit, filter, export recompile, and import attempts, the console shows no errors, no warnings, and no hydration mismatch messages"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "export_recompile_stays_snappy"
description = "After mutating a task, reopening Export shows updated ICS and planner JSON without a multi-second hang"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "filter_updates_without_blanking"
description = "Changing channel filter or search updates visible tasks promptly without blanking the entire board into an empty shell mid-update"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.5"
name = "twenty_one_columns_render_without_lag"
description = "The 21 day columns and seeded tasks render without perceived lag on first interactive paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Toggling checkboxes, bulk complete, and rollover keep the UI interactive with no frozen chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "add_remove_animations_stay_smooth"
description = "Task add/remove animations and calendar drag settle remain smooth under normal use without obvious stutter"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapidly toggling checkboxes, adding tasks, filtering, and recompiling export previews keeps the UI responsive with no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stays_stable"
description = "An extended session of creates, deletes, undos, and export opens shows no runaway slowdown or tab crash"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "deep_link_renders_seeded_board"
description = "Loading the app URL directly renders the complete seeded board without a prolonged blank shell"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before interaction is possible on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings appear in the console during add, export, import, or filter flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "export_recompile_blocks_ui"
description = "Opening Export or switching ICS/JSON tabs blocks the UI for a noticeable multi-second hang"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "filter_hangs_ui"
description = "Applying a channel filter or search causes the UI to hang or freeze"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "board_scroll_kills_frame_rate"
description = "Horizontal board scrolling across 21 columns kills the frame rate into unusable jank"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during task add/remove or toast animations"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "hydration_flash_blocks_use"
description = "Pre-rendered content visibly flashes or is replaced after interactive, blocking early use of the board"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "memory_runaway_on_export_spam"
description = "Repeatedly opening Export and mutating tasks causes runaway browser resource usage or a tab crash"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank_shell"
description = "Nothing useful is displayed while the board first loads — only a blank shell past two seconds"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid checkbox toggles, bulk actions, or repeated import attempts"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
