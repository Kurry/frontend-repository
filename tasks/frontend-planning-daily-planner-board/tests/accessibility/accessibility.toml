[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — nav items, Add task, completion and selection checkboxes, board header buttons including Export Undo Redo, bulk tray actions, export and import controls, and right-rail buttons — is reachable and operable with the keyboard alone and shows a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "edit_dialog_manages_focus"
description = "The task edit dialog traps focus while open with aria-modal and returns focus to the control that opened it on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls in the nav rail, utility strip, and board header expose accessible names (for example Search, Export, Undo)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "completion_checkbox_names_include_title"
description = "Each task's completion checkbox exposes an accessible name that includes the task title"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "toast_and_copy_announced_live"
description = "Demo toasts and copied confirmations are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "conflicts_control_names_count"
description = "The Conflicts control exposes an accessible name that includes the current conflict count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "form_errors_associated_to_fields"
description = "Inline validation errors on Add task and edit are programmatically associated with the invalid field (for example via aria-describedby or aria-invalid)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "export_tabs_are_keyboard_operable"
description = "ICS and Planner JSON tabs on the export canvas are reachable and switchable with the keyboard alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "selection_checkbox_distinct_from_complete"
description = "Each task's selection checkbox is distinct from its completion checkbox and both expose distinct accessible names"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.10"
name = "focus_order_follows_board_chrome"
description = "Keyboard focus order moves logically through the left nav, board header, day columns, and right rail without trapping outside dialogs"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.n1"
name = "keyboard_traps_outside_dialogs"
description = "Keyboard focus is trapped in a region that is not a modal dialog, blocking Tab escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "icon_only_controls_lack_names"
description = "Icon-only Export, Undo, Redo, or utility-strip buttons lack accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "checkboxes_lack_task_titles"
description = "Completion checkboxes expose generic names that omit the task title"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "live_regions_missing_for_toasts"
description = "Demo toasts or copied confirmations appear visually with no aria-live announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "focus_indicator_absent"
description = "Interactive controls show no visible focus indicator when focused via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "dialog_lacks_aria_modal"
description = "The task edit dialog is shown without dialog semantics or aria-modal"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_not_associated_to_fields"
description = "Validation errors appear as disconnected text with no association to the invalid field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "export_tabs_mouse_only"
description = "Export canvas tabs can only be switched with the pointer and are unreachable by keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "conflicts_unnamed_for_assistive_tech"
description = "The Conflicts control exposes no accessible name or omits the conflict count"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "bulk_tray_not_keyboard_operable"
description = "Bulk tray actions cannot be reached or activated with the keyboard alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
