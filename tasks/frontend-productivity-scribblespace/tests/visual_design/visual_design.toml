[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "accent_and_canvas_tokens"
description = "Primary toolbar buttons compute to background #6D5BD0 with white text and the canvas background computes to the light lavender #F4F2FB, distinct from any note color."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "radius_and_shadow_system"
description = "Notes and flashcards render with about 8px corner rounding and a visible drop shadow so they read as raised above the canvas, while the toolbar and mini-map panel use the larger about 12px rounding."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "object_types_distinguishable"
description = "Notes, flashcards, and shapes are distinguishable at a glance beyond content (flashcard shows a flip icon and Front/Back label, shapes have no text-editing chrome, circles render as full circles)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "selection_outline_and_handles"
description = "A selected object shows an unmistakable accent selection outline distinct from its unselected resting state, multiple shift-selected objects all show it simultaneously, and a singly selected object additionally shows square corner handles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "active_tool_and_tab_accent"
description = "The active Connect tool and the active board tab are highlighted in the accent color, distinct from their inactive siblings, so the current mode and board are always clear."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "delete_confirm_warning_token"
description = "The delete-confirmation UI uses the warning token #E0A030 rather than blending in as a neutral control."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "narrow_layout_stays_usable"
description = "At about 375px wide the toolbar stays reachable via wrapping or horizontal scroll, the toolbar and mini-map do not overlap canvas content, the canvas stays pannable, and no page-level horizontal scroll appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "color_tokens_misapplied"
description = "The specified color tokens are misapplied: primary buttons render in a color other than #6D5BD0, the canvas background renders in a color other than the light lavender #F4F2FB, or notes lack the raised 8px-radius drop-shadow treatment."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "typography_scale_and_muted_ink"
description = "UI chrome renders in an Inter-first sans-serif stack, note and flashcard body text is visibly larger (about 16px) than the compact toolbar labels (about 14px), and muted ink such as the zoom readout and board-tab labels computes to the secondary color #6B6489."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.11"
name = "single_icon_set_with_labels"
description = "Every toolbar control, board tab, and panel action pairs an icon with its label, and all icons come from one visually consistent set with no control mixing icons from visibly different sets."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "stream_status_badge_colors"
description = "The live-event status renders as a distinct colored badge per state, so Active, Paused, Disconnected, Replaying, and Caught up are each visibly different."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.13"
name = "controls_survive_resize"
description = "Resizing between about 1440px and 375px wide keeps every control available (nothing disappears without a reachable replacement), and open dialogs and popovers stay fully on-screen."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
