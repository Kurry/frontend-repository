[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "accent_and_canvas_tokens"
description = "Primary accent #6D5BD0 is applied to primary buttons, active tool, focus rings, connector lines, and selection outlines; canvas background is #F4F2FB distinct from note colors; text primary #211D3A and secondary #6B6489 are used for ink and muted chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "radius_and_shadow_system"
description = "Notes and flashcards use border-radius 8px with a visible drop shadow; toolbar and mini-map use border-radius 12px; primary buttons are #6D5BD0 with #FFFFFF text, border-radius 8px, and a subtle shadow."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "object_types_distinguishable"
description = "Flashcards show a small flip icon and Front/Back side label, shapes have no text-editing chrome, and circles render as full circles so object types are distinguishable at a glance."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "selection_outline_and_handles"
description = "A selected object shows an unmistakable accent outline distinct from its resting state, and a singly selected object additionally shows square corner handles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "active_tool_and_tab_accent"
description = "The active Connect tool and the active board tab are visually highlighted in the accent color so mode and board are always clear."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "delete_confirm_warning_token"
description = "The delete-confirmation state uses warning #E0A030 distinctly from the primary accent."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "narrow_layout_stays_usable"
description = "At about 375px wide the toolbar stays reachable, the mini-map and toolbar do not overlap canvas content, and no page-level horizontal scroll appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "typography_scale_and_muted_ink"
description = "UI chrome uses the Inter / system-ui stack; note and flashcard body text is about 16px and toolbar labels about 14px; muted ink uses the secondary text token."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "single_icon_set_with_labels"
description = "Every toolbar control, board tab, and panel action pairs a consistent icon from one single icon set with its label; no control mixes icons from visibly different sets."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "stream_status_badge_colors"
description = "Live-event status badges for Active, Paused, Disconnected, Replaying, and Caught up are each visibly different colored treatments."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "controls_survive_resize"
description = "Between about 1440px and 375px wide no required control disappears without a reachable replacement, and dialogs stay fully on-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "empty_states_explicit"
description = "Empty board, no-results search, and empty Archive each show explicit empty-state copy rather than a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "export_modal_preview_surface"
description = "The Export workspace modal shows format tabs and a monospace preview on a recessed surface distinct from the canvas, with Copy and Download controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "undo_redo_disabled_appearance"
description = "Undo and Redo show a dimmed disabled appearance when their stacks are empty, distinct from the enabled resting state."
type = "binary"
weight = 1.0

