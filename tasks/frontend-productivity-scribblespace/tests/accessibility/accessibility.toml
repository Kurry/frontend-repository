[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Toolbar, board, panel, dialog, export, import, archive, and command-palette controls are reachable and operable with the keyboard alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Delete confirmation, Export workspace, Import, and Command palette trap focus while open, dismiss with Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-bearing toolbar and selection controls expose accessible names so each action is identifiable without relying on the icon alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Status changes (object added, deleted, archived, restored, board renamed, event applied, export copied) are announced in a polite live status line."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Board rename, note/flashcard text editors, and Import controls have explicit labels or accessible names associated with their fields and validation messages."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Visible section headings in chrome panels (Outline, Archive, live events, Export) follow a logical heading order without skipping levels arbitrarily."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Primary regions (toolbar/chrome and main canvas) are exposed with landmarks or equivalent structure for assistive navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Primary text on canvas background and button labels on primary accent meet readable contrast in the default theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Dialogs expose dialog semantics; tabs and toggle tools expose selected/pressed state to assistive technology, not only through color."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, entrance/flip/list animations are removed while features remain fully usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "nudge_controls_keyboard_alternative"
description = "Each singly selected object's Move and Grow / Shrink controls provide a keyboard-operable alternative to dragging and corner-handle resizing."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "undo_redo_and_palette_shortcuts"
description = "Canvas-level Undo/Redo work from Ctrl+Z / Ctrl+Shift+Z or Ctrl+Y when a text editor is not focused, and the Command palette opens from Ctrl+K (Cmd+K)."
type = "binary"
weight = 1.0

