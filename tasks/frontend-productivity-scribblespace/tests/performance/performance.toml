[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "No console errors or warnings appear during a full exercise of create, edit, connect, duplicate, archive, delete, undo, export, import, board switch, and live stream."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_switches_stay_responsive"
description = "Switching Canvas ↔ Outline and opening Export workspace respond without multi-second freezes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "stream_progress_stays_visible"
description = "While the live stream applies events, the status and applied-count readout update without leaving the UI blank."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "thirty_objects_without_lag"
description = "On a board with 30 or more objects, pan, zoom, and drag remain smooth without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Rapid create, undo/redo, and recolor leave controls responsive rather than hung."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Object entrance/exit and outline row animations do not visibly hitch the UI under normal use."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Twenty-five rapid New Note activations keep controls responsive with an exact final count."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "export_compile_stays_responsive"
description = "Compiling Export workspace previews for a board with dozens of objects updates without freezing the UI for multiple seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "import_reject_stays_stable"
description = "Rejecting a malformed Import leaves the UI responsive with no crash or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "Local cold load exceeds 2 seconds before the app is interactive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors appear during create/export/import/stream flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "View switches or dialog opens block interaction for multiple seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "stream_hangs_ui"
description = "Starting the live stream hangs the UI so controls stop responding."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_board_kills_frame_rate"
description = "A board with 30+ objects makes pan/zoom/drag unusably laggy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Entrance or flip animations block input until they finish in a way that drops interactions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "export_compile_blocks_rendering"
description = "Opening Export workspace freezes the page for multiple seconds on a moderately filled board."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Extended create/stream use causes sustained memory or CPU runaway that freezes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "During stream catch-up or import processing the UI goes blank with no status."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid create, undo, or import edge use crashes the page or throws uncaught errors."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
