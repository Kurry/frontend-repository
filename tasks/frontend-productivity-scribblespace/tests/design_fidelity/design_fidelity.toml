[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and control sizing follow the 4px scale and specified radii closely enough that the desktop chrome matches the reference screenshots' density."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the specified Inter/system stack and the body-vs-toolbar size relationship shown in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "Desktop layout of toolbar, board tabs, canvas, mini-map, and footer matches the reference overview composition at about 1440px."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes (object entrance, dialog enter, flashcard flip) animate in a manner consistent with the reference's interactive feel."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Narrow-width behavior keeps the same control set reachable as the reference intent, without inventing a conflicting alternate IA."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Primary buttons, tool toggles, and board tabs match the accent/radius/shadow system specified and visible in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Board tab labels, toolbar labels, and note body text show a clear hierarchy consistent with the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Selected object outline, active tool, and active board tab states match the accent treatments in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Canvas dotted grid, note elevation shadows, and panel surfaces match the soft lavender canvas treatment in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover and pressed microinteractions on toolbar controls match the reference's interactive chrome feel."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Control sizing or spacing clearly contradicts the 4px scale and radii in the instruction/reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Chrome colors fall outside the specified accent/background/ink/warning tokens in a way that breaks fidelity."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Notes, toolbar, or mini-map sizing grossly mismatches the reference proportions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required entrance, flip, or dialog transitions are missing or grossly wrong versus the motion spec/reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Specified toolbar or dialog controls render as unstyled browser defaults instead of the tokenized chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "Desktop layout is misaligned versus the reference at about 1440px (toolbar/canvas/footer relationships broken)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Reference-critical elements are clipped or offscreen at the desktop overview width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Overall structure deviates from the reference (missing board tabs, missing canvas stage, or unrelated shell)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Toolbar labels and note body text are undifferentiated in size/weight versus the reference hierarchy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/pressed microinteractions are absent or contradict the reference chrome feel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
