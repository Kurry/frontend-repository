[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "snap_guides_beyond_spec"
description = "Beyond required drag behavior, optional snap guides or alignment cues appear while dragging objects and remain browser-observable (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.2"
name = "richer_keyboard_map_beyond_spec"
description = "Beyond required Ctrl+K / Undo shortcuts, an optional denser keyboard map for object creation or board switching is documented in-UI and works (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.3"
name = "archive_review_rhythm_beyond_spec"
description = "Beyond required Archive Restore/Purge, an optional clearer archive review rhythm (for example bulk restore or dated groups) is visible (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.4"
name = "connector_label_or_style_polish"
description = "Beyond required connectors, optional connector labels or style variants add clarity without breaking the field contract (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.5"
name = "minimap_interaction_polish"
description = "Beyond required mini-map recenter, optional viewport drag-on-minimap or zoom-from-minimap polish is observable (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.6"
name = "export_preview_diff_hint"
description = "Beyond required export tabs, an optional hint showing what changed since last export/copy is visible in-session (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.7"
name = "branded_canvas_chrome_polish"
description = "Toolbar, board tabs, and empty-state composition read as a cohesive branded canvas tool rather than generic unstyled controls (bonus execution quality)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.8"
name = "outline_density_affordances"
description = "Beyond required Outline rows, optional density affordances such as type filters or compact rows improve scanning (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.9"
name = "local_offline_shell_quality"
description = "A genre-appropriate local enhancement (smooth offline shell, high-quality local fonts already allowed) is visible without CDN dependence (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_grade_canvas_feel"
description = "Overall canvas, multi-board, connector, undo, archive, and export polish read as a professional freeform-notes instrument rather than a wired demo (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.n1"
name = "bonus_breaks_required_contracts"
description = "An optional polish feature contradicts required in-memory, field-contract, or export/import behavior — for example writing boards to localStorage, or a bonus export format that replaces rather than supplements Workspace JSON."
type = "binary"
negate = true
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app includes a significant, browser-observable innovation beyond the specification that is NOT covered by any other criterion in this file and does not contradict required behaviors. If present, name it and cite concrete evidence. If nothing qualifies, answer no."
type = "binary"
weight = 1.0
