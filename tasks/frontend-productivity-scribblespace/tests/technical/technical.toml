[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "reload_returns_seeded_baseline"
description = "After creating boards, objects, connectors, and archive rows in-session, a full page reload returns coherently to Board 1 with zero objects and an empty archive — never a mix of surviving and cleared facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "per_board_session_isolation"
description = "Objects created on board A remain on board A when switching to board B within the session; board B starts empty until objects are added there."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "canvas_outline_coherent"
description = "A change made on the canvas (create, edit, delete, archive, restore) is reflected immediately in the Outline view and footer count without reload or stale duplicate values."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of creating, editing, connecting, duplicating, archiving, deleting, undoing, switching boards and views, exporting, importing, and running the live event stream."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "interactive_within_two_seconds"
description = "On a local cold load the app is interactive within 2 seconds with the seeded Board 1 empty canvas visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "smooth_with_thirty_objects"
description = "Canvas panning, zooming, and object dragging remain smooth without visible hitching on a board holding 30 or more objects."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "keyboard_only_operability"
description = "Toolbar, board, panel, dialog, export, import, archive, and command-palette controls are reachable and operable with the keyboard alone with a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "dialog_focus_trap_return"
description = "Delete confirmation, Export workspace, Import, and Command palette dialogs trap focus while open, dismiss with Escape, and return focus to the invoking control."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "polite_status_announcements"
description = "Status changes such as object added, deleted, archived, restored, board renamed, event applied, or export copied are announced in a polite live status line without moving focus."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "export_texts_derived_from_shared_state"
description = "After creating a note with distinctive text and renaming the board, Workspace JSON, Markdown, and Plain text export previews all reflect those same shared values without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "field_contract_validation_runtime"
description = "Board rename, note/flashcard text commits, and Import enforce the API-shaped field contracts in the UI: empty or over-60-character board names are rejected naming the board-name field; over-8000-character note text is rejected naming the text field; Import of JSON that fails schemaVersion scribblespace-workspace-v1, boards, activeBoardId, type/color enums, text length bounds, width/height minima, or connector endpoint rules is rejected naming the offending field and does not mutate the workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "created_records_match_export_schema"
description = "A note or flashcard created and edited through the visible controls appears in Workspace JSON with the same type, color enum, text/front/back, and geometry field names required by the create/update field contracts."
type = "binary"
weight = 1.0

