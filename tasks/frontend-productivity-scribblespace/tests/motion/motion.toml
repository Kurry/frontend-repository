[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_states_visible"
description = "Primary and secondary buttons, tool toggles, board tabs, and canvas objects each change appearance on pointer hover, distinct from resting and focus states — verified via computed style while hovering."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "pressed_scale_feedback"
description = "Buttons give an immediate pressed response (slight scale-down) on pointer-down before the triggered action completes — verified on the real UI control path."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "drag_lift_ghost_escape"
description = "Dragging an object shows a lift affordance and a dashed ghost outline at its origin, and pressing Escape mid-drag returns the object to its starting position — verified through the real drag gesture."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "connect_preview_line_follows"
description = "In connect mode a dashed preview line follows the cursor from the first picked object until the second object is clicked — verified through the real connect click sequence."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "focus_ring_distinct_from_hover"
description = "Keyboard focus shows an accent outline on interactive chrome distinct from the hover treatment."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hover_focus_inert"
description = "Interactive chrome shows no visible hover or focus appearance change during normal pointer and keyboard use."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.8"
name = "object_entrance_exit_animates"
description = "A newly placed object animates in with a brief scale-and-fade entrance, and a deleted or archived object animates out before disappearing — verified through the real New Note / Delete or Archive controls, not a state shortcut."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "outline_rows_animate_moves"
description = "Outline view rows animate smoothly to new positions when objects are added, removed, or restacked rather than snapping — verified through real create/delete on Outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "flip_transition_and_search_glow"
description = "Flipping a flashcard plays a visible flip transition rather than an instant swap, and search matches show an animated-feeling outer glow — verified through real Flip and search controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "dialog_popover_fade_scale"
description = "Delete confirmation, Export workspace, Import, Command palette, rename, and shape-menu overlays enter with a short fade-and-scale over a dimmed backdrop and exit the same way."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "reduced_motion_instant_usable"
description = "With prefers-reduced-motion set, entrance, flip, and list animations are removed and state changes apply instantly while every feature stays fully usable — verified on a fresh load with the preference set."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "copy_confirmation_autodismiss"
description = "Copy in the Export workspace modal shows a brief copied confirmation that auto-dismisses."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or interaction feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
