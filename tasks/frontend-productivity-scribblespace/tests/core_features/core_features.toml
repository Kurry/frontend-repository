[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "empty_first_load_state"
description = "On first load the app opens at the canvas with one board tab named Board 1, a centered 'This board is empty' / 'Add a note, flashcard or shape to get started' hint, and a footer reading '0 objects'."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "new_note_swatches_recolor"
description = "After clicking New Note, a draggable sticky note appears near the canvas center; when it is the sole selection a color picker of exactly 6 swatches appears, clicking a swatch recolors the note immediately with a check mark on the active swatch, and double-clicking the note and typing updates its body live."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "flashcard_flip_two_sides"
description = "After clicking New Flashcard, a two-sided card appears showing its Front with a flip icon and side label; the Flip control hides the Front and shows the Back, flipping again restores the Front, and each side keeps its own editable text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "shape_menu_place_and_recolor"
description = "New Shape opens a menu offering Rectangle, Circle, and Arrow; after placing all three, each shape appears, and recoloring a singly selected shape via its 6-swatch shape picker changes its color immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "footer_count_matches_objects"
description = "After creating a note, a flashcard, and a shape, the footer object count updates to '3 objects' consistent with the three visible objects."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "stacking_order_controls"
description = "When a shape is selected and Send to Back is used it renders behind an overlapping shape, and Bring to Front returns it to the top."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "shift_multi_select_delete"
description = "After selecting one note then shift-clicking a second, both show the selection outline and a 'N selected' count with Delete Selected, Duplicate Selected, Archive Selected, and Clear selection controls appears; Delete Selected, confirmed once, removes both notes from the board and moves them into the Archive vault."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "connector_create_and_remove"
description = "When the Connect tool is used to click a note then a flashcard, a persistent accent line joins them; the round Remove Connector control at its midpoint deletes only the line, leaving both objects."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "reload_resets_to_seeded_baseline"
description = "After placing at least one object and performing a full page reload, the app returns to the seeded baseline — one Board 1, zero objects, empty archive — with no prior session objects restored from browser storage."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "search_glow_count_no_results"
description = "When two notes contain 'lighthouse project' and a third does not, searching 'lighthouse' glows both matching notes (not the third), shows a match count, and pans the view to the first match; searching 'zzzznomatch' shows an explicit message reading No results for the query."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "boards_independent_rename"
description = "After creating a New Board with a distinctive name and adding a note there, the note is absent on the original board and present on the new board; renaming the new board updates its tab label."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "export_workspace_three_formats"
description = "Opening Export workspace shows Workspace JSON, Markdown outline, and Plain text tabs regenerated live; with a note, flashcard, and shape present, Workspace JSON preview includes schemaVersion scribblespace-workspace-v1, exportedAt, activeBoardId, and boards with those objects (type/color/geometry fields visible), Markdown lists them under the board heading, Plain text lists type labels with note body and flashcard front/back plus connectors, and Copy and Download controls are present on each tab."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "live_stream_lifecycle"
description = "In the live-events panel, Start begins applying the 12 events one note each, Pause halts application, Disconnect stops delivery, and the visible status changes accordingly (Idle, Active, Paused, Disconnected, Replaying, or Caught up)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "rapid_create_burst_exact"
description = "After clicking New Note 25 times in rapid succession, exactly 25 new notes exist, the controls stay responsive, and no blank screen or uncaught error occurs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "board_delete_never_strands"
description = "Deleting the active board switches to another existing board, and deleting the last remaining board creates a fresh default board rather than leaving a blank/undefined board."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "zoom_steps_clamped_reset"
description = "Zoom In / Zoom Out change zoom in 15 percent steps, the readout always shows the current percentage, zoom clamps at 25 percent and 300 percent under repeated presses, and Reset View returns the readout to 100 percent and recenters the view."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "stream_controls_and_readout"
description = "The live-events panel exposes Start, Pause, Disconnect, Reconnect, and Deliver Out of Order controls with a visible stream status and an 'N of 12 events applied' readout."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "reconnect_applies_exactly_once"
description = "Delivering an event out of order then Reconnecting applies the missing events in logical-timestamp order, and a second Reconnect applies nothing new so no update is double-applied."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "duplicate_event_ignored"
description = "Duplicate delivery of the same live event is ignored rather than applying it twice or adding a duplicate note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "canvas_pan_grid_shifts"
description = "Click-and-dragging empty canvas space pans the view, and the dotted-grid backdrop shifts with the pan so the movement is visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "note_edit_open_and_commit"
description = "A note body editor opens by double-clicking the note or by selecting it and pressing Enter; typing updates the note live, and Escape or clicking outside the editor commits the text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "bold_formatting_roundtrip"
description = "While editing a note body or flashcard side, a compact toolbar offers bold, italic, and bullet-list controls; selecting text and activating bold renders it bold immediately, activating bold again removes it, and committed formatting is preserved on the rendered object after the editor closes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "editor_undo_redo_scoped"
description = "While a text editor is open, an undo step reverses the most recent typing or formatting change and a redo step reapplies it, without altering any other object on the canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "corner_resize_min_size"
description = "A singly selected object shows four corner handles; dragging a handle resizes the object, notes and flashcards stop at width 120 and height 96, shapes stop at width and height 48, and the new size persists after deselecting within the session."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "nudge_move_grow_controls"
description = "A singly selected object exposes on-screen Move (left/up/down/right) and Grow / Shrink controls, and activating them nudges its position by 24px and its size by 24px as a non-drag alternative."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "1.38"
name = "connector_follows_moved_object"
description = "After connecting two objects, dragging one of them moves the connector endpoint with it so the line stays attached to both objects."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "connect_mode_helper_banner"
description = "Activating the Connect tool switches the canvas to a crosshair cursor and shows a helper banner reading 'Click an object to start a connector'."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "1.40"
name = "board_rename_inline_validation"
description = "Submitting an empty or over-60-character board name shows an inline error message naming the board-name field with the confirm control disabled, and the previous valid name stays in place until a valid name is submitted."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.56"
name = "note_create_payload_in_export"
description = "After New Note, recoloring to a closed swatch, and committing distinctive body text, Workspace JSON preview shows an objects entry with type note, that color hex from the closed note enum, text containing the distinctive body, and width/height at or above 120 and 96."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.57"
name = "flashcard_create_payload_in_export"
description = "After New Flashcard, editing Front and Back with distinctive strings, and flipping once, Workspace JSON preview shows an objects entry with type flashcard, front and back strings, flipped true, and a color from the closed note/flashcard hex enum."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "shape_create_payload_in_export"
description = "After placing a Rectangle via New Shape and recoloring with a shape swatch, Workspace JSON preview shows an objects entry with type rectangle, that shape hex from the closed shape enum, and width/height at or above 48."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.59"
name = "overlength_text_rejected"
description = "Committing a note body longer than 8000 characters shows a visible message naming the text field, keeps the prior valid text, and leaves Workspace JSON without the over-length string."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "board_delete_cancel_keeps"
description = "The board delete control opens a confirmation dialog; canceling leaves the board and its objects intact, and confirming removes the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "minimap_overview_recenters"
description = "A mini-map panel in the canvas corner shows a scaled overview of the current board's objects plus a rectangle marking the current viewport, and clicking within the mini-map recenters the main view on that point."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "outline_rows_inline_controls"
description = "The Outline view lists every object on the active board as rows with type label, color name, and flashcard flip state, and each row's inline Edit / Flip / Delete controls work, with the change immediately visible back in the canvas view."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "occupied_position_offset"
description = "Creating a second object of the same type without moving the first places it offset by about 28px from the occupied default position, so both objects remain individually visible and selectable."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "1.45"
name = "flow_note_create_export_json"
description = "Starting from an empty board, clicking New Note raises the footer object count by exactly one, removes the empty-canvas hint, shows the note in Outline without a reload, and Export workspace Workspace JSON preview includes schemaVersion scribblespace-workspace-v1 and an objects entry with type note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "flow_second_board_export_name"
description = "Creating a second board via New Board switches to an empty canvas showing the empty hint and a '0 objects' count while the first board keeps every object; renaming the new board updates its tab label immediately and every Export format preview shows the new name."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "flow_delete_archives_cascades"
description = "After connecting two notes, deleting one via Delete Selected (confirmed once) removes that note, every connector touching it, and its Outline row, moves the note into the Archive vault, and decreases the footer object count by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "flow_stream_counts_in_lockstep"
description = "Starting the live event stream raises the applied-events readout and the footer object count together, one note per applied event, and each added note also appears as a row in the Outline view; Pause halts both counts at the same value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "flow_export_import_round_trip"
description = "After creating notes on two boards, Download Workspace JSON, then create more objects that change the workspace, Import the downloaded file, and confirm both boards and the original objects are restored while the post-download additions are gone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "canvas_undo_redo_board_mutations"
description = "After placing a note then a flashcard, canvas-level Undo removes the flashcard from canvas, Outline, and footer count and enables Redo; Redo restores it; placing another object after undo disables Redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "duplicate_selected_offsets"
description = "With one note selected, Duplicate Selected increases the footer object count by exactly one, places a clone offset by about 28px with independent identity, and editing the clone's text does not change the original."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "archive_restore_purge"
description = "Archive Selected moves the selection into the Archive panel and off the canvas; Restore returns it to the board and Outline; Purge permanently removes that archive row."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "command_palette_new_note"
description = "Opening the Command palette via Ctrl+K (or Cmd+K), filtering to New Note, and pressing Enter places a note the same way the toolbar New Note control does and closes the palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "import_rejects_bad_schema"
description = "Importing Workspace JSON with wrong schemaVersion, missing boards/activeBoardId, type or color outside the closed enums, text/front/back over 8000 characters, width/height below create-contract minima, or connector endpoints that do not resolve on the same board shows an inline error naming the offending field and leaves the current boards and objects unchanged."
type = "binary"
weight = 1.0

