[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with empty storage, the app opens at the canvas with one board tab named Board 1, a centered 'This board is empty' / 'Add a note, flashcard or shape to get started' hint, and a footer reading '0 objects'."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After clicking New Note, a sticky note appears on the canvas; selecting it shows a color picker of 6 swatches, and double-clicking it and typing updates the note body live."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After clicking New Flashcard, a two-sided card appears showing its Front; using its Flip control hides the Front and shows the Back, and flipping again restores the Front."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding a Rectangle, a Circle, and an Arrow via New Shape, all three shapes appear, and recoloring a selected shape via its color swatch changes its color immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After creating a note, a flashcard, and a shape, the footer object count updates to '3 objects' consistent with the three visible objects."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When a shape is selected and Send to Back is used it renders behind an overlapping shape, and Bring to Front returns it to the top."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After selecting one note then shift-clicking a second, both show the selection outline and a 'N selected' count appears; Delete Selected, confirmed once, removes both notes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When the Connect tool is used to click a note then a flashcard, a persistent accent line joins them; its Remove Connector control deletes only the line, leaving both objects."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After placing at least one object and performing a full page reload, the object reappears with its position, size, text/color, and flashcard flip state preserved exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When two notes contain 'lighthouse project' and a third does not, searching 'lighthouse' glows both matching notes (not the third) and pans to a match; searching 'zzzznomatch' shows an explicit no-results message."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After creating a New Board with a distinctive name and adding a note there, the note is absent on the original board and present on the new board; renaming the new board updates its tab label."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When Export as Text is opened with a note, a flashcard, and a shape present, the copyable textarea lists all three with type labels and includes the note text and the flashcard front and back."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When the live-events panel is opened, Start / Pause / Disconnect / Reconnect / Deliver Out of Order controls and a visible status are shown; Deliver Out of Order then Reconnect applies the missing events, and a second Reconnect applies nothing new (no double-apply)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After clicking New Note 25 times in rapid succession, exactly 25 new notes exist, the controls stay responsive, and no blank screen or uncaught error occurs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On first load with empty storage the app opens directly at the canvas with one board tab (Board 1), a centered empty-board hint, and a '0 objects' footer."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Clicking New Note adds a sticky note; selecting it exposes a 6-color picker and double-clicking to type updates the note body live."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Clicking New Flashcard adds a two-sided card whose Flip control hides the Front and reveals the Back, and flipping again restores the Front."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "New Shape can place a Rectangle, a Circle, and an Arrow, and a selected shape recolors immediately via its color swatch."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Send to Back moves a selected shape behind an overlapping shape and Bring to Front returns it to the top."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Selecting a note then shift-clicking a second multi-selects both, and Delete Selected removes both after a single confirmation step."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "The Connect tool clicking one object then another draws a persistent connector, and its Remove Connector control deletes only that line while both objects remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Searching a shared word glows every matching note/flashcard (not non-matching ones) and pans to a match; a non-matching query shows an explicit no-results message."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "New Board creates an independent board so a note added there is absent on the original board, and renaming the board updates its tab label."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Deleting the active board switches to another existing board (or creates a fresh default) rather than leaving a blank/undefined board."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Export as Text opens a copyable textarea listing every object with its type label plus the note text and the flashcard front and back."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "The Zoom In / Zoom Out controls change the displayed zoom percentage and Reset View returns it to 100%."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "The live-events panel exposes Start, Pause, Disconnect, Reconnect, and Deliver Out of Order controls with a visible stream status and an 'N of 12 events applied' readout."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "Delivering an event out of order then Reconnecting applies the missing events in logical-timestamp order, and a second Reconnect applies nothing new so no update is double-applied."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "Duplicate delivery of the same live event is ignored rather than applying it twice or adding a duplicate note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "Selecting an object and using its Delete Selected control without confirming leaves the object in place; the object is removed only after the confirmation is accepted."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "Requesting a connector between two already-connected objects stacks a duplicate line instead of being a no-op with feedback."
type = "binary"
weight = 0.5
negate = true
optional = true
