[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: structured-editor-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with editor_*, entity_*, session_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor/entity/session/artifact operations change the same boards, objects, stream status, and export state the toolbar and dialogs use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: editor add/select/delete/update_property/set_content/switch_mode/preview on note|flashcard|shape (properties color, text, front, back, z-order; modes select, connect); entity create/select/update/delete on board (field name); session start/pause/connect/disconnect/advance with demos deliver-out-of-order and reconnect; artifact export/import/copy with formats json|markdown|text and import mode workspace-json; value_bounds cover board-name, schemaVersion, type/color enums, text length, geometry minima, and connector rules — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound editor, entity, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_board_create_select_update_delete"
description = "Entity operations for entity board work: create, select, update, and delete (delete requires confirm=true) update the visible board tabs and active board."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_object_ops_update_canvas"
description = "Editor operations for note/flashcard/shape work: add, select, delete, update_property, set_content, switch_mode, and preview update the visible canvas/Outline state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "session_and_artifact_ops_bound"
description = "Session operations start/pause/connect/disconnect/advance and demos deliver-out-of-order/reconnect are bound; artifact export/import/copy with formats json, markdown, and text and import mode workspace-json invoke without throwing when called through WebMCP (clipboard/file contents remain Playwright responsibilities)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond structured-editor-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_reflects_editor_create"
description = "After editor add of a note with distinctive text via WebMCP, artifact export (json) through WebMCP uses the same store so the visible Export workspace Workspace JSON preview contains schemaVersion scribblespace-workspace-v1 and that note text."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "entity_update_honors_board_name_contract"
description = "Entity update of board name with an empty or over-60-character value is rejected the same way as the visible rename form (inline field feedback, prior valid name kept), so MCP cannot bypass the board-name field contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.13"
name = "editor_add_note_matches_create_contract"
description = "After editor add of a note via WebMCP and set_content/update_property for distinctive text and a closed color, the visible Workspace JSON preview shows a type note object with those create-contract fields (text, color hex, geometry)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.14"
name = "value_bounds_surface_field_contracts"
description = "Bound value_bounds (or equivalent tool schemas) expose board-name length, schemaVersion scribblespace-workspace-v1, closed type/color enums, text length, geometry minima, and connector endpoint rules consistent with the instruction field contracts."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for structured-editor-v1, entity-collection-v1, command-session-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound editor/entity/session/artifact tool leaves canvas, boards, stream, or export state diverging from what the equivalent visible UI control would produce."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation via webmcp_session_info / list_tools / invoke_tool."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "WebMCP update/create paths bypass board-name or import field-contract validation and desync MCP state from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test harness hacks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "A required module among structured-editor-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 is not implemented."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation for the declared bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
