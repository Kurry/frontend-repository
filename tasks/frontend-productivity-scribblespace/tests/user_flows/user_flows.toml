[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_note_updates_all_surfaces"
description = "Create flow: New Note increases footer count by one, clears the empty hint, adds an Outline row with the color name, and Workspace JSON export preview gains a note entry — all without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_board_rename_inline"
description = "Create/rename flow: submitting an empty or over-60-character board name shows inline validation naming the board-name field and does not change the tab label."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "create_note_payload_round_trips_export"
description = "Create flow: New Note, set distinctive text and a closed swatch color, open Export workspace Workspace JSON, and confirm the objects entry shows type note with that text and color hex; Download then Import reconstructs the same note fields on canvas and in the preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_note_echoes_outline_export"
description = "Edit flow: changing a note's body and color updates the Outline row and the Workspace JSON / Plain text export previews to match without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_updates_archive_and_surfaces"
description = "Delete flow: confirming Delete Selected removes the object from canvas and Outline, moves it into Archive, updates the footer count, and removes it from export previews of the active board."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "canvas_outline_view_switch_keeps_state"
description = "View switch: toggling between Canvas and Outline keeps the same objects and selection-relevant state; edits in one view remain visible in the other without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_hint"
description = "Edge: after deleting or archiving the last object on a board, the empty-canvas hint returns and the footer reads '0 objects'."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_filters_highlights_matches"
description = "Search flow: typing a query highlights matching notes/flashcards, updates the match count, and a no-match query shows 'No results for the query'."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "live_panel_preserves_workflow"
description = "The Show live events panel can be opened and used (Start/Pause) without losing board objects or selection, and closing/hiding it returns to the canvas workflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Delete confirmation, Export workspace, Import, rename popover, shape menu, and Command palette open, complete or cancel, and dismiss without trapping the user."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "failed_import_recovers_without_reload"
description = "Recovery: a rejected Import leaves the prior workspace intact and the user can continue editing or open a valid Import without reloading the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_end_to_end"
description = "Artifact flow: create objects on two boards, Download Workspace JSON, mutate the workspace, Import the file, and confirm boards and objects match the downloaded artifact."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "undo_redo_in_session_flow"
description = "Undo flow: place two objects, Undo once (count and Outline drop by one), Redo restores; a new create after undo disables Redo."
type = "binary"
weight = 1.0

