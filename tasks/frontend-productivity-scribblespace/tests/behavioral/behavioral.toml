[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: create a note, create a second board and rename it, archive one object, open Outline, and start then pause the live stream; then reload. Confirm every facet coherently resets to the seeded baseline — one Board 1, zero objects, empty archive, stream idle — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "board_switch_reversal_proves_live_state"
description = "Board-switch reversal (genre stand-in for sort reversal): on board A create a distinctive note, switch to board B (empty), switch back to A. Confirm A's note returns identically — proving canvas contents are derived from the live active board, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "search_derived_view_sensitivity"
description = "Derived-view sensitivity: with two notes containing different words, search for each word in turn. Confirm glow/match count change meaningfully for each query rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "canvas_edit_echoes_outline_and_export"
description = "Cross-view echo: edit a note's text on the canvas; without reload confirm Outline row preview and Export Workspace JSON / Plain text previews reflect the new text."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "new_note_count_delta_exact"
description = "Count-delta integrity: measure footer object count, click New Note once, re-measure immediately — the count increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_note_text_different_export"
description = "Input-dependent output: create a note with text A and copy/export Plain text or Workspace JSON; clear via reload or new session path and create a note with clearly different text B; confirm the two export payloads differ in the ways the inputs dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_board_and_outline_flows"
description = "Interleaved-flow integrity: start renaming a board (open rename, do not confirm), switch to Outline and create a note via canvas controls, then cancel or complete rename; confirm the note remains and rename neither corrupted the note nor left boards inconsistent."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_board"
description = "Edge-state round-trip: delete/archive every object until the empty hint shows and count is 0, then New Note twice; confirm empty hint clears, both notes appear on canvas and Outline, and export lists both."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_preserves_boards"
description = "Mutate → derived → export → import: create notes on two named boards and a connector; confirm Export Workspace JSON contains schemaVersion scribblespace-workspace-v1 plus objects/connectors entries matching the note and connector create field contracts; Download; mutate away; Import the file; confirm boards, objects, and connector return while post-download additions are gone."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "create_payload_fields_echo_in_export"
description = "After creating a note with distinctive text and a closed color, and a flashcard with distinctive front/back, Workspace JSON objects entries show type, color, text/front/back, and geometry keys from the create contracts rather than omitting those fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_round_trip_restores_surfaces"
description = "Undo round-trip: place a note (Outline and footer update), Undo removes it everywhere those surfaces show it, Redo restores it everywhere — never a surface left stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring boards/objects/archive then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Changing search query or note text leaves Outline/export/search glow visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_export"
description = "Creating notes with different text yields byte-identical Workspace JSON or Plain text export payloads."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "After editing on the canvas, Outline or export previews still show stale values until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_text_ignores_session_mutations"
description = "After creating or editing objects, Export workspace previews are identical to the pre-mutation text — an export that omits the session's actual work."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_leaves_derived_surfaces_stale"
description = "After Undo of a create, Outline or footer count still shows the object while the canvas removed it (or the reverse)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
