[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Between about 1440px and 375px the canvas workspace reflows so toolbar, board tabs, and canvas remain usable without a broken desktop-only freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At about 375px wide primary toolbar and board controls remain large enough to activate without mis-taps on adjacent controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_remains_legible"
description = "Note body text and toolbar labels remain legible across the 375px–1440px range without unreadably tiny chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At widths from about 375px to 1440px, toolbar, dialogs, and canvas chrome avoid clipping or overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "At about 375px wide the toolbar stays reachable via wrapping or horizontal scroll and does not permanently hide New Note / Export / Import."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths panels (mini-map, live events, archive) stack or scroll logically rather than overlapping the canvas unreadably."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "canvas_stays_pannable_on_narrow"
description = "At about 375px wide the canvas remains pannable by dragging empty space."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At about 375px wide no page-level horizontal scroll appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_and_minimap_resize"
description = "Resizing the viewport keeps the canvas and mini-map within usable bounds without fixed overflow off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "export_import_reachable_narrow"
description = "At about 375px wide Export workspace, Import workspace, Archive, Undo, and Redo remain reachable by scrolling within stacked chrome rather than rendering permanently off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The layout breaks at an intermediate width between 375px and 1440px with overlapping or unreachable controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At about 375px wide primary controls are too small or misaligned to use."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Toolbar or board-tab text becomes unreadably small at narrow widths."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Required chrome is cropped or the page shows unnecessary page-level horizontal scrollbars at about 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "toolbar_breaks_by_width"
description = "The toolbar or board switcher becomes unusable at some width in the supported range."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed mini-map or toolbar overlays permanently obscure canvas objects with no way to reach them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Mini-map, toolbar, and canvas content overlap unreadably at some supported width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_narrow_actions_missing"
description = "At about 375px wide required create or export actions have no reachable replacement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "dialogs_overflow_narrow"
description = "Export, Import, or Command palette dialogs overflow off-screen at about 375px wide."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Required controls disappear at some size without a reachable replacement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
