[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Between about 1440px and 375px the canvas workspace reflows so toolbar, board tabs, and canvas remain usable without a broken desktop-only freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At about 375px wide primary toolbar and board controls remain large enough to activate without mis-taps on adjacent controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_remains_legible"
description = "Note body text and toolbar labels remain legible across the 375px–1440px range without unreadably tiny chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At widths from about 375px to 1440px, toolbar, dialogs, and canvas chrome avoid clipping or overflowing the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "At about 375px wide the toolbar stays reachable via wrapping or horizontal scroll and does not permanently hide New Note / Export / Import."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths panels (mini-map, live events, archive) stack or scroll logically rather than overlapping the canvas unreadably."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "canvas_stays_pannable_on_narrow"
description = "At about 375px wide the canvas remains pannable by dragging empty space."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At about 375px wide no page-level horizontal scroll appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_and_minimap_resize"
description = "Resizing the viewport keeps the canvas and mini-map within usable bounds without fixed overflow off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "export_import_reachable_narrow"
description = "At about 375px wide Export workspace, Import workspace, Archive, Undo, and Redo remain reachable by scrolling within stacked chrome rather than rendering permanently off-screen."
type = "binary"
weight = 1.0

