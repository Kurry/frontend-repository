[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Bottom-nav items, table action icons, and dialog buttons show a hover wash and a Material ripple/press feedback when actually hovered or clicked through the real control path"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Opening and closing the add/edit expense dialog animates the dialog and its backdrop in and out rather than appearing or disappearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Add, update, and delete actions show a snackbar that slides in from the bottom edge and auto-dismisses after a short delay"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "A budget progress bar's fill animates toward its new value when an expense is added, edited, deleted, or the period changes, rather than jumping instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Expanding and collapsing a Settings category row animates its height/opacity via the Material expansion panel transition when toggled through the real control"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "Interactive chrome shows no hover feedback at all — buttons, nav items, and table actions look identical when hovered as when idle"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "Dialog, snackbar, or progress-bar transitions only appear when state is forced through a non-UI shortcut and show no animation when triggered through the real control"
type = "binary"
weight = 0.5
negate = true
optional = true
