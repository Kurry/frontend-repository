[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens with no auth wall directly into a workspace with a top bar showing an account name and a '3/2020' period control, and a bottom nav with Dashboard, Expenses, and Settings"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the Dashboard shows 'Total budget' $6700.00, 'Total expenses' $1756.68, and 'Total left' $4943.32, plus a 'Budgets by category' list with Food, Shopping, Entertainment, Transport, and Cloths rows, each with a filled progress bar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the Expenses table for period 3/2020 shows 10 rows with columns Date, Counterparty, Category, Value, Actions, including a 2020-03-01 Rocky bowling Entertainment $235.42 row and a 2020-03-24 Mcdonalds Food $169.33 row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "Filtering the Expenses table to the Shopping category shows only the 3 Shopping rows (Wallmart $218.69, $51.74, $92.31) and hides all other categories"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "Opening the add-expense control and submitting amount 25.00, date 2020-03-05, category Food adds a 2020-03-05 / Food / $25.00 row to the Expenses table"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After adding that 25.00 Food expense, the Dashboard's Food row reads $460.66 / $2000.00 with 'left $1539.34', and the Total expenses reads $1781.68"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "Submitting the add-expense form with the amount field empty (or 0) shows a visible validation error and adds no new row to the Expenses table"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "Clicking the period control's previous arrow switches the period label to '2/2020' and the Expenses table shows the 5 February rows (Kfc, Kaufland, Johnys pub, Tube machine, Primark) instead of the March rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "On period 2/2020, the Dashboard's Food row reads $45.20 / $2000.00 and Total expenses reads $405.69"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "Deleting the 2020-02-05 Kfc Food $45.20 row removes it from the Expenses table and the Dashboard's Food row for 2/2020 drops to $0.00 / $2000.00"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "Reloading the page keeps the period at '2/2020', keeps the Kfc row deleted, and keeps the earlier 25.00 Food addition present when the period is switched back to 3/2020"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "In Settings, the Categories tab lists Food, Shopping, Entertainment, Transport, and Cloths; adding a new category named 'Travel' makes it appear in both the Categories list and the Expenses filter control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "window.webmcp_list_tools() returns tool entries including expense_create, expense_delete, browse_open, and browse_apply_filter with non-empty inputSchema objects"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "Invoking window.webmcp_invoke_tool('browse_apply_filter', { month: 2, year: 2020 }) switches the visible period to 2/2020 and the Expenses table to the February rows, matching what clicking the period control does"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console errors or uncaught exceptions occur while loading the app, adding an expense, changing the period, deleting an expense, and reloading"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The app opens with no authentication wall directly into a workspace recognisably a personal expense and budget tracker — a top bar with account name and period control, and a bottom nav for Dashboard, Expenses, Settings — not a generic dashboard or starter page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "On first load the Dashboard shows a non-zero Total budget, Total expenses, and Total left, and a Budgets by category list covering at least 5 categories (Food, Shopping, Entertainment, Transport, Cloths), each with a progress bar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "On first load the Expenses table for the initial period shows at least 10 seeded rows with Date, Counterparty, Category, and Value populated, not placeholder or lorem text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Adding a 25.00 Food expense on 2020-03-05 through the add-expense control adds that exact row to the Expenses table, raises the Dashboard's Food total by exactly 25.00, and advances the Food progress bar by the same amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Changing the reporting period to the prior seeded month swaps the visible Expenses rows to that period's expenses and recomputes every Dashboard category total, progress bar, and the Total budget/expenses/left summary from that period alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Deleting one expense removes its row from the Expenses table and lowers its category's Dashboard total and progress bar by exactly that expense's amount, leaving every other category and period unaffected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Editing an existing expense's amount, date, or category updates that same row in place and recomputes both the old and new category's Dashboard totals and progress bars"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Filtering the Expenses table by category shows only that category's rows for the current period and hides all others"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Submitting the add/edit expense form with an empty or non-positive amount, a missing date, or no category shows visible validation feedback and adds or changes no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Settings' Categories tab lets a category be added by name, renamed, or deleted, with every change immediately reflected in the Expenses category filter and the Dashboard's per-category list"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "The bottom navigation actually switches the visible workspace between Dashboard, Expenses, and Settings; it is not decorative chrome that leaves the same content on screen"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "The Dashboard's category totals and progress bars stay a constant value regardless of adding, editing, deleting expenses, or changing the period"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "Deleting an expense removes its amount from a category other than the one it belonged to, or leaves the deleted row visible in the table"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "An in-app control (nav item, period arrow, dialog action) performs an outbound navigation that leaves the app or loads content from another origin"
type = "binary"
weight = 1.0
negate = true
