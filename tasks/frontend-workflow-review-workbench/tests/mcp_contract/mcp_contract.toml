[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, form_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_review_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse navigation across review surfaces, the recommendation and step form flows, gate-re-run session controls, and the summary copy change the same portfolio rows, gate board, verdict hero banner, fix list, stepper, and timeline the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/apply_filter/clear_filter over destinations portfolio, bundle-workspace, gate-board, trial-inspector, fix-list, verdict-panel, bundle-summary, and timeline with filters hero-state, gate-plus-status, and timeline-event-kind; form validate/submit/cancel over recommendation, override-justification, and step-notes across workflow steps resolve-fix-item, unresolve-fix-item, select-recommendation, override-constraint, mark-step-done, unmark-step-done, and complete-bundling; session start/pause/resume with demos gate-re-run and re-run-step-retry; artifact copy of review-summary-text — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "gate_rerun_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: a completed re-run of ember-relay-router's Difficulty — Quartz-Mini gate leaves it inconclusive and recomputes the verdict hero banner, allowed recommendation set, constraint explanation, portfolio row gate chip and hero state, rollup counts, and calibration strip without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "fix_item_and_step_operations_work"
description = "Declared workflow steps all work: resolving or unresolving a fix item immediately recomputes the allowed recommendation set and its plain-language explanation with a REDESIGN resolution updating the hero banner and portfolio row; marking a step done unlocks the next step and updates the portfolio review-progress indicator, and un-marking re-locks all later steps while preserving their notes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "recommendation_form_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: only the currently allowed recommendation set is selectable, an out-of-set choice requires the override toggle plus a justification of at least 20 characters, and turning the override toggle off with an out-of-set recommendation saved reverts the recommendation to unset and removes the Override badge."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "bundling_gate_matches_spec"
description = "Sequencing rules match the allowed specification: a step can be marked done only when every earlier step is done, Complete bundling succeeds only when Verdict is done with a recorded recommendation, and completing it appends a timestamped bundling event to the timeline and flips the portfolio row to the Bundled badge."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: gate evidence is read-only — no tool edits a gate's score, status, reasons, or evidence text — copy of review-summary-text is the only artifact operation, and judge models stay limited to Sable-4 and Quartz-Mini."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: trial diff-mode picking, trial and criterion selection, and the three-pane highlight linkage stay driven through the visible selectors and breadcrumb, and chip animations, banner cross-fades, retry ticks, modal transitions, and clipboard stay Playwright territory."
type = "binary"
weight = 1.0

