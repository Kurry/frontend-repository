[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "single_store_coherence"
description = "All surfaces derive from one shared state: a gate flip from a re-run updates the gate card, hero banner, constraint explanation, portfolio row, rollups, and timeline together; a fix-item resolution, recommendation change, or step completion is reflected in every view where that fact appears, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after re-running gates, resolving fix items, saving overrides, writing notes, bundling, exporting, and importing, and a page reload returns the app to its seeded state — the 12 seeded bundles with seeded gate results, unset recommendations, empty notes, and no Bundled badges; persistence is the exportable Review Package JSON plus MCP"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "storage_persistence_used"
description = "localStorage or sessionStorage holds bundles, gate results, notes, recommendations, or UI state after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "console_clean_through_flows"
description = "The console is free of errors and warnings on first load and stays clean while filtering the portfolio, re-running gates, pausing and retrying steps, inspecting and diffing trials, resolving fix items, saving an override, and bundling"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "cold_load_interactive_2s"
description = "The app is interactive (portfolio rows and filters respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "responsive_during_rerun"
description = "While a re-run simulation is advancing, the UI stays responsive under rapid repeated input — quick bundle switches, rapid filter toggles, fast criterion selection changes — with no hangs, dropped interactions, or views showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "selection_state_single_source"
description = "The breadcrumb, pane highlights, and gate/trial/criterion selections always agree: no interaction sequence produces a breadcrumb path that names one record while the panes highlight another"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "derived_values_arithmetically_consistent"
description = "Displayed derived values are internally consistent: rollup counts sum to 12, each calibration cell's valid count never exceeds its total, difficulty gate statuses agree with their displayed score and valid-trial count, and the diff flip count equals the number of visibly flagged rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "rerun_results_not_identical"
description = "Two completed re-runs of the same gate produce byte-identical published output both times (identical scores, trial additions, and timeline timestamps), indicating hardcoded rather than simulated results"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.11"
name = "debug_artifacts_visible"
description = "Visible debug output, console.log spam, placeholder scaffolding, or leftover developer overlays appear in the running app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.12"
name = "app_serves_documented_path"
description = "The app serves on port 3000 via its documented start path and renders the portfolio without a blank or broken page"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "outbound_chrome_links_present"
description = "App chrome contains outbound navigational links that leave the app's origin"
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "2.14"
name = "export_import_share_field_contract"
description = "A successful recommendation/override save creates the same request-body shape that appears under that bundle in Review Package JSON, and a successful import accepts only documents that satisfy the review-certification/v1 field contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "export_preview_diverges_from_store"
description = "The Export Review Package JSON preview disagrees with the live portfolio/workspace about a bundle's recommendation, overrideJustification, resolved fix items, step notes, or Bundled state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
