[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_animations_required"
description = "Buttons ease background and shadow with a slight press effect on hover; portfolio rows, gate cards, trial entries, fix items, and timeline entries take a full-width hover wash; and form controls show focus rings — verified with the real pointer while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "rerun_step_status_motion"
description = "During a re-run started from the real Re-run gate control, the running step shows a continuous activity indicator, a completing step's status transitions with a short fade rather than snapping, and the retry backoff countdown ticks visibly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "gate_flip_emphasis_and_hero_crossfade"
description = "When a completed re-run flips a gate, the gate card's status chip transitions with a brief emphasis animation and the verdict hero banner cross-fades to its new state rather than snapping — driven through the real re-run, not a state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "fix_and_recommendation_transitions"
description = "Checking a fix item eases its resolved (struck or dimmed) treatment in, and the recommendation controls transition their enabled or disabled state with a short fade when the allowed set changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "inspector_highlight_motion"
description = "Selecting a criterion with a real click animates the highlight into the reasoning block and cited answer passages with a short ease, and moving the selection moves the highlights smoothly rather than jumping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "stepper_and_unlock_motion"
description = "The stepper's active-step indicator slides between steps, and unlocking a step animates its content in with a short expand"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "list_change_animations"
description = "New timeline entries animate into the list at their position, and portfolio rows animate in and out when filters change rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "overlay_transitions_timed"
description = "The override justification form, the diff-mode picker, the export drawer, and the import surface enter with a short opacity plus scale or slide transition of roughly 200 to 300 milliseconds and exit the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "toasts_slide_autodismiss"
description = "The Copy summary, Copy export, Download, and Import confirmation toasts slide in, remain readable long enough to scan, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, transitions apply instantly and no element animates, while every state change (gate flips, unlocks, resolutions, toasts) still lands"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "animation_jank_blocks_input"
description = "Animations cause visible layout jank or flicker, or block user input, while a re-run is advancing or lists are animating"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.12"
name = "hover_states_absent"
description = "Interactive elements show only browser-default hover and focus treatment with no designed motion feedback anywhere"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
