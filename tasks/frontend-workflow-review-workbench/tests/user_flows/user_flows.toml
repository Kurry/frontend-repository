[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "clean_bundle_certification_flow"
description = "Certifying a clean bundle end to end: opening juniper-lint-fixer (all gates pass) shows the READY FOR THE BENCHMARK hero; marking Resolve, Gate, and Audit done in order unlocks Verdict where APPROVE is enabled; selecting APPROVE, marking Verdict done, and opening Bundle shows a summary whose hero line reads READY FOR THE BENCHMARK and whose recommendation reads APPROVE; completing bundling stamps the timeline and the portfolio row gains the Bundled badge — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "gate_flip_rerun_flow"
description = "Flipping a gate through a re-run: on ember-relay-router the Difficulty — Quartz-Mini gate starts inconclusive with 2 valid trials; Re-run gate advances the four named steps with visible statuses, and on publish the gate leaves inconclusive while the hero banner, constraint explanation, allowed recommendation set, portfolio row gate chip and hero state, and calibration context all update in the same session"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "trial_audit_flow"
description = "Auditing a suspect trial: a difficulty gate's evidence link opens the trial inspector on that gate's trials; selecting an invalid trial shows which of its eight checks failed; selecting a negated criterion highlights the scorer's reasoning for it and the cited answer passages; entering diff mode against a valid trial flags the flipped checks with a flip count"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "fix_list_to_approval_flow"
description = "Working the fix list toward approval: on an all-gates-pass bundle with unresolved RERUN and FIX items, the allowed set shows APPROVE WITH CAVEATS and MAJOR CHANGES NEEDED with an explanation naming the unresolved items; resolving every item live changes the allowed set to APPROVE and APPROVE WITH CAVEATS and the explanation updates to say all items are resolved"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "honest_override_flow"
description = "Overriding the constraint honestly: with APPROVE excluded from the allowed set, toggling Override constraint and choosing APPROVE demands a justification of at least 20 characters — a shorter submission shows an inline message naming the justification field and saves nothing; a valid justification saves, shows the Override badge, and the Bundle summary prints the justification under the recommendation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "step_gating_flow_integrity"
description = "The 5-step gating holds through a full pass: each of Resolve, Gate, Audit, Verdict, Bundle stays locked with a named prerequisite notice until the earlier steps are done, and un-marking an earlier step re-locks the later ones while preserving their notes"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "portfolio_filter_flow"
description = "Filtering the portfolio by hero state and by a gate-plus-status combination narrows the rows to matching bundles with removable filter chips shown, and clearing the filters restores all 12 rows with the rollup strip still matching what is visible overall"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "breadcrumb_navigation_flow"
description = "Descending from the portfolio into a bundle, a gate, a trial, and a criterion extends the breadcrumb path at each step, and activating an earlier breadcrumb segment returns to that level with the corresponding record selected and highlighted, with workflow continuity preserved"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Overlay surfaces — the override justification form, the diff-mode trial picker, and any confirmation — open from their controls, complete their flow, and close cleanly, returning the reviewer to the surface they came from"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery without reload: canceling the override form, leaving diff mode, clearing filters, and navigating back from any depth via the breadcrumb or portfolio control all return to a working prior state with no dead ends"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "mutation_to_export_flow"
description = "Mutation-to-export: after recording a recommendation with a distinctive overrideJustification, resolving a fix item, writing a distinctive step note, and completing bundling, Export certification package Review Package JSON shows schemaVersion review-certification/v1 and those session values under the bundle, with Copy and Download available"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after session mutations, Copy or Download Review Package JSON, reload to seeds, Import that JSON, and confirm portfolio/workspace restore the mutated recommendation, overrideJustification, resolved fix state, notes, and Bundled badge with the next Export matching"
type = "binary"
weight = 1.0

