[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing follow one consistent scale across the portfolio, gate board, inspector, and stepper — no arbitrary one-off values visible in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "specified_layout_implemented"
description = "The specified compositions are implemented as written: rollup strip and calibration strip above the portfolio table with Export/Import certification package controls; workspace header with slug, hero banner, recommendation, and breadcrumb; left-rail stepper; six gate cards in the fixed order; three-pane inspector; export drawer with monospaced preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "specified_vocabulary_rendered_exactly"
description = "The fixed vocabulary renders exactly as specified: the three hero states, five gate statuses, four fix categories, four recommendations, eight check names, four re-run step names, and the five reviewer step names Resolve, Gate, Audit, Verdict, Bundle"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "The state changes the spec calls out animate as described — gate flip emphasis, hero cross-fade, fix-item resolve ease, step unlock expand, list enters and exits"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Responsive behavior matches the specified patterns: inspector stacks at 1024px and below, stepper goes horizontal and the table becomes cards at 768px and below, no overflow at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_is_coherent"
description = "Button and form radii, padding, and shadows are coherent across the app — controls of the same kind share one treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography carries the specified four-level hierarchy (app title, view titles, card headings, body/labels) distinguishably"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states — default, hover, focus ring, disabled, error — appear as specified, including the beyond-color-alone treatment for disabled recommendations"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "status_color_semantics_match_spec"
description = "Color semantics match the spec exactly: hero green/amber/red, gate pass green, fail red, errored purple, inconclusive amber, missing gray, applied wherever those states render"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "threshold_markers_match_spec"
description = "The 0.80 and 0.90 threshold markers and the minimum-3-valid-trials reference render beside their measured values as the spec describes"
type = "binary"
weight = 1.0

