[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "reviewer_keyboard_palette"
description = "Optional bonus: a reviewer-facing keyboard palette or shortcut layer for moving between gates, trials, and criteria beyond the required breadcrumb and selectors"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "dependency_chain_minimap"
description = "Optional bonus: a visual mini-map of the gate-to-fix-item-to-recommendation dependency chain that updates live as gates and fix items change"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "dark_mode_toggle"
description = "Optional bonus: a dark color mode toggle covering portfolio, workspace, inspector, and export/import surfaces consistently"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "review_duration_readout"
description = "Optional bonus: a per-bundle review-duration readout derived from the event timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "export_diff_or_package_compare"
description = "Optional bonus: a package compare or diff affordance that highlights what changed between two Review Package JSON snapshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "calibration_drilldown"
description = "Optional bonus: calibration-strip drilldown that opens the matching bundle's trial validity context beyond the required hover figures"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "timeline_scrubber"
description = "Optional bonus: a timeline scrubber or jump-to-event control that lands the workspace on the related gate, fix item, or verdict state"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "print_friendly_summary"
description = "Optional bonus: a printable review summary layout reachable from the export drawer that restates portfolio and bundle outcomes without changing store state"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "coachmarks_for_review_loop"
description = "Optional bonus: a dismissible coachmarks tour highlighting portfolio, gate re-run, and Export certification package without blocking the primary review loop"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_review_polish"
description = "Optional bonus: competition-level polish visible in the review loop beyond the required surfaces — for example coordinated status storytelling across hero, chips, and export"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
