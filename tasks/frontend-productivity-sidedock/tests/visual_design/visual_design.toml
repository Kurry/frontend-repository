[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Computed styles use --color-background #FAF4F2 for the page, --color-surface #EDE0DA for panels, --color-text-primary #1C1412 for text, --color-accent #E54610 for links and primary buttons, and --color-border #E4DEDC for borders"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Workspace titles and folder headings render in Cormorant Upright (or its serif fallback) at roughly 24 to 28px while body text and inputs use the Inter stack at roughly 15px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "workspace_accent_marks_tab_and_header"
description = "Each workspace tab shows its chosen accent as an underline or background tint and the active workspace header bar uses that same accent color so the active workspace color scheme is unmistakable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Two workspaces with different accent colors each show their color on their own tab and as the header bar color on their folder tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Monogram tiles across several generated hues render their letter in readable, sufficiently contrasting text against the generated background color"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The zero-workspace welcome, the empty-workspace prompt, and the no-search-results message each render as a distinct, worded empty state rather than a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "spacing_clusters_on_4px_scale"
description = "Computed padding, margin, and gap values on cards, buttons, and inputs cluster on multiples of the 4px base unit rather than arbitrary one-off values"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "layout_usable_375_to_1440"
description = "At roughly 375px wide the Add bookmark form and workspace tabs remain fully usable with long titles and URLs wrapping or truncating inside their containers, and at every width between 375px and 1440px the Pinned row, workspace tabs, and folder tree render without content clipping"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "consistent_icon_set_with_labels"
description = "Icons across toolbar, pin, and delete controls come from one consistent icon set with a uniform stroke weight, and each such control pairs its icon with a text label or accessible name"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "ui_copy_sentence_case_verbs_numerals"
description = "UI labels use sentence case, action buttons begin with a verb, quantities render as numerals, error messages name the problem and the fix, and empty states explain what belongs there and how to add it"
type = "binary"
weight = 0.5

