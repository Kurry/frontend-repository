[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "After creating content and performing a full page reload, the app re-renders its interactive UI cleanly and the exact created state reappears immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "A bookmark or workspace deleted before a reload does not reappear after the reload, confirming the deletion persisted"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "Navigating to / reaches an interactive UI (empty-state prompt or workspace tabs) rather than a blank page, an error overlay, or a noscript message"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "During load and the core workflow there are no failed same-origin network requests, and monogram icon generation makes no network request"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.10"
name = "keyboard_operable_controls"
description = "Workspace tabs, pin controls, reorder controls, the search scope toggle, and other interactive controls are each reachable and operable with the keyboard alone, showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "delete_dialog_traps_and_returns_focus"
description = "The delete confirmation opens as an accessible dialog that keeps Tab focus cycling inside it while open, and dismissing or canceling it returns focus to the triggering Delete control"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "inline_rename_keyboard_flow"
description = "Starting an inline rename moves focus into the edit field, Enter saves the new value, and Escape cancels and restores the prior name, all with the keyboard alone"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "toasts_announced_via_live_region"
description = "Toast confirmations render inside (or are mirrored into) a polite ARIA live region so assistive technology announces them in addition to the visual toast"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.14"
name = "interactive_within_two_seconds"
description = "On a local cold load, the app reaches an interactive UI (empty state or workspace tabs responding to input) within 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "virtualized_scroll_stays_smooth"
description = "With 10,000 items loaded, scrolling the virtualized list stays smooth with no sustained freeze, and the Rendered item count region keeps reporting a value far below 10,000 as rows enter and leave the DOM"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "forms_and_package_share_field_contracts"
description = "Create workspace, Add bookmark, folder create, SideDock package export preview, and SideDock package import all enforce the same observable field contracts: http/https url, title at most 120 characters, workspace name 1–40 characters, accentColor from the nine closed hex swatches, pinnedBookmarkIds length at most 8, and schemaVersion sidedock-package-v1"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "package_import_rejects_without_partial_mutation"
description = "Importing a SideDock package payload that violates the field contract does not partially mutate workspaces or pins; the prior session remains visible and an inline import error names the offending field or rule"
type = "binary"
weight = 1.0

