[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Create flow: submitting Add bookmark with a field-contract-valid url and title inserts exactly one row visible in the tree and in the SideDock package preview under the active workspace items."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: submitting Add bookmark with an empty or non-http/https url, or Create workspace with a blank name, triggers immediate inline validation naming the offending field and creates nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "inline_rename_updates_tree_and_pins"
description = "Edit flow: renaming a bookmark or folder inline (Enter to save) updates the tree row immediately; if the bookmark is pinned, the Pinned tile title updates too without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_folder_removes_contained_bookmarks"
description = "Delete flow: confirming Delete on a folder removes the folder and every bookmark it contained; search for a contained title returns no match; the package preview no longer contains those nodes."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "workspace_and_sidebar_view_switch"
description = "View/mode switch: creating/switching workspace tabs swaps the folder/bookmark tree; toggling Show sidebar view narrows to 375px and back while keeping the active workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "zero_workspaces_and_empty_workspace_states"
description = "Edge: with zero workspaces the Welcome to SideDock empty state with Create workspace is visible; an empty workspace shows a distinct prompt to add the first bookmark."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_scope_current_vs_all_workspaces"
description = "Search/filter: with two workspaces each holding a bookmark, scoping search to all workspaces while workspace A is active shows workspace B's match; switching scope back to current workspace removes it without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "package_panel_preserves_workspace"
description = "Package chrome: Export/Import SideDock package panels open and close without losing workspace tabs, tree selection, or Pinned row; reopening Export still reflects the session."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "delete_confirm_and_package_overlays"
description = "Overlays: Delete confirmation and SideDock package Export/Import panels support their flows and dismiss without trapping the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "pin_limit_and_import_recover_without_reload"
description = "Recovery: attempting a ninth pin is blocked with an eight-item limit message; a rejected package import shows a visible error and leaves the session unchanged — no reload required."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "sidedock_flows_unavailable"
description = "Create workspace, Add bookmark, inline rename, Delete, pin, or package Export/Import cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "bookmark_or_workspace_missing_or_duplicated"
description = "After a valid Add bookmark or Create workspace, the new row/tab fails to appear, appears duplicated, or package preview omits it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "rename_pin_or_package_desync"
description = "After rename, pin, or accentColor change, tree row, Pinned tile, workspace tab, and package preview disagree about the same values."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "workspace_or_sidebar_switch_breaks"
description = "Switching workspace tabs or Show sidebar view breaks layout or loses the active workspace unexpectedly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_sidedock_breaks_ui"
description = "Zero-workspace or empty-workspace states are blank/broken with no welcoming empty-state copy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "search_scopes_disagree"
description = "Current-workspace vs all-workspaces search scopes disagree about matches, or clearing search fails to restore the full tree."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "package_panel_cannot_reopen"
description = "After closing Export/Import SideDock package, the package controls cannot reopen the panel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "delete_or_package_overlay_blocks_exit"
description = "Delete confirmation or package panels block navigation with no cancel/close path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_bookmark_or_import_silent"
description = "An invalid Add bookmark/Create workspace submit or contract-invalid package Import provides no visible named-field or import error feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "sidedock_dead_end_requires_reload"
description = "A SideDock flow leaves a dead end that requires a full page reload to continue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "sidedock_package_round_trip_flow"
description = "SideDock package round trip: create a workspace, add a bookmark with a distinctive url and title that satisfy the field contract, pin it, confirm the Export SideDock package preview shows schemaVersion sidedock-package-v1 plus those values, Download or Copy that JSON, mutate the session away, Import the same JSON, and confirm workspace tabs, tree, Pinned row, sidebar view, and package preview match the pre-export session"
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
