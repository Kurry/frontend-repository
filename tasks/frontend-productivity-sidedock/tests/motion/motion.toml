[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Hovering a workspace tab, button, folder row, and bookmark row with the pointer shows a clearly visible hover state on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Tabbing through interactive controls with the keyboard shows a clearly visible focus ring on each that is distinct from its hover state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Pressing an interactive control (pointer-down without releasing) shows immediate pressed feedback before the triggered operation completes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Performing add, import, export, and delete each surfaces a transient toast that shares one consistent position, shape, and color and dismisses on its own"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Starting a real drag of a bookmark toward a folder and pausing over it shows a visible dragging state on the item and a valid-drop-target highlight on the folder"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "row_add_delete_reorder_animates"
description = "Adding a bookmark through the form animates the new row into position, deleting through the Delete control animates the row out, and reordering with the up and down controls slides rows to their new positions rather than snapping, all performed through the real UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "pin_unpin_tile_animates"
description = "Pinning a bookmark through its pin control animates its tile into the Pinned row, and unpinning through the tile animates the tile out"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "sidebar_toggle_animates_smoothly"
description = "Toggling Show sidebar view animates the content column between the full width and the narrow 375px width smoothly, with no layout flash or content jump in either direction"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "drag_abort_returns_item"
description = "Aborting a real drag of a bookmark or folder (releasing outside any valid drop target or pressing Escape) returns the item to its original position in the tree"
type = "binary"
weight = 0.5
optional = true

