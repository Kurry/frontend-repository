[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with empty storage, the app shows the Welcome to SideDock empty state with a Create workspace button and no workspace tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After creating a workspace, a color-coded tab appears, it becomes active, and an empty folder tree with the Add bookmark form is shown below"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "bookmark_create_matches_field_contract"
description = "After submitting the Add bookmark form with a valid http/https url and blank title, exactly one row appears whose title is derived from the URL path or domain and whose url matches the submitted address; submitting a second bookmark with an explicit title at most 120 characters uses that title verbatim"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After creating a folder, a subfolder inside it, and a further subfolder, the three-level nested structure renders with each folder indented under its parent"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After renaming a bookmark inline (click title, type, Enter) the new title is shown, and pressing Escape on another inline rename leaves that title unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After pinning a bookmark it appears in the Pinned row above the tree, and after unpinning from its tile it leaves the Pinned row while remaining in its folder"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After confirming deletion of a folder that contains a bookmark, the folder and the bookmark it contained are both removed from the tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After creating data (workspace, folder, bookmark with a note, and a pin) and performing a full page reload, the workspace, folder, bookmark, note, and pinned state all survive exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After typing a query, the bookmarks filter to matches, toggling scope to all workspaces surfaces a match from another workspace, and a query matching nothing shows a no results message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After toggling Show sidebar view, the content column constrains to a narrow fixed width with no horizontal scrolling, and toggling back restores the full view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After activating Load 10,000 items, the Virtualized items region reports 10000 total while the Rendered item count region stays far below 10,000"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "With 10,000 items loaded, after selecting an item, scrolling it out of the rendered window, applying then clearing a filter, the same item remains selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After importing a Netscape-format bookmarks HTML file, its folder structure and links appear in the active workspace, and each of add, import, export, and delete shows a transient toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After exercising create, edit, delete, drag, import, export, reload, and virtualization, no console errors or unhandled promise rejections have appeared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "export_active_and_all_workspaces_download"
description = "Activating Export bookmarks downloads the active workspace as Netscape-format bookmarks HTML whose link HREF and text encode bookmark url and title values from field-contract-valid records, activating Export all downloads every workspace, and each export shows a confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "empty_url_rejected_with_named_message"
description = "Submitting the Add bookmark form with an empty URL is rejected with the visible message Enter a URL to add a bookmark plus a warning toast, and no bookmark row is created"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "duplicate_bookmark_idempotent"
description = "Submitting a bookmark whose URL already exists at the same location creates no duplicate row, surfaces the message Bookmark already exists at this location, and leaves the existing bookmark unchanged"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "rapid_add_burst_exact_count"
description = "Repeating the Add bookmark action 25 times through the normal form controls yields an exact final visible count with controls staying responsive and no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "invalid_url_still_adds_row"
description = "Submitting the Add bookmark form with a blank or clearly invalid URL still adds a bookmark row to the tree"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "folder_delete_orphans_contained_bookmarks"
description = "Deleting a folder leaves the bookmarks it contained still visible in the tree instead of removing them with the folder"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.34"
name = "accent_color_picker_applies_immediately"
description = "The color swatch picker on a workspace tab offers nine preset colors, and picking a different swatch immediately recolors that tab and the workspace header bar to the chosen color without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "invalid_url_inline_error_clears_on_fix"
description = "Typing a URL value that is not a valid web address shows the inline message Enter a complete web address, such as https://example.com directly under the Bookmark URL field while still in the form, and correcting the value clears the message without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "monogram_deterministic_per_domain"
description = "Two bookmarks added for the same domain render monogram squares with the identical background color and the same first letter of the domain, while a bookmark for a different domain renders a monogram derived from that other domain, with no network request for icon generation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "note_preview_renders_under_title"
description = "After editing and saving a multi-line note inline on a bookmark, a preview snippet of that note renders under the bookmark title"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "drag_moves_item_into_and_out_of_folder"
description = "Dragging a bookmark onto a folder moves it inside that folder, and dragging it back out to the workspace root returns it to the root level of the tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "pin_limit_of_eight_enforced"
description = "With eight bookmarks pinned, attempting to pin a ninth is prevented, the pin control communicates the eight-item limit, and no ninth tile appears in the Pinned row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "cancel_delete_keeps_item_unchanged"
description = "Opening a Delete confirmation and canceling it leaves the folder or bookmark in place with its title, position, and contents unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "malformed_netscape_import_skips_invalid"
description = "Importing a malformed or unexpected Netscape-format file appends only entries that map to Bookmark and folder field-contract-valid records, skips invalid link targets, and keeps working with no blank screen or uncaught error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "flow_add_bookmark_search_reload_roundtrip"
description = "Starting from a workspace with a known bookmark count: submit the Add bookmark form with a url and optional title that satisfy the Bookmark create field contract and confirm the list gains exactly one row measured immediately around the submit whose title and url match that payload, confirm the SideDock package preview includes that bookmark's url and title, search for the new bookmark's title and confirm it appears in results, then perform a full page reload and confirm the same workspace, folder placement, and bookmark with the same title and URL are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "flow_search_scope_toggle_cross_workspace"
description = "After creating a second workspace and adding a bookmark to it, with the first workspace active: switching search scope to all workspaces shows that bookmark in the results, and switching scope back to the current workspace removes it from the results without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "flow_pin_rename_syncs_and_survives_reload"
description = "Pinning a bookmark adds its tile to the Pinned row while the bookmark stays visible in its folder, renaming that bookmark inline updates both the folder row and the pinned tile to the new title without a reload, and after a full page reload the Pinned row still shows the renamed tile"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "flow_folder_delete_search_and_reload_no_revival"
description = "Deleting a folder through its Delete control and confirmation removes the folder and every bookmark it contained from the tree, a search for a contained bookmark's title then returns no match, and a full page reload does not revive the deleted folder or its bookmarks"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "flow_updown_reorder_persists_reload"
description = "Reordering a bookmark with the up and down controls changes its rendered position immediately, and a full page reload shows the list in the same reordered sequence"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "flow_sidebar_view_survives_reload"
description = "Toggling Show sidebar view narrows the content column to the fixed 375px width without horizontal scrolling, and after a full page reload the app reopens still in sidebar view with the same active workspace"
type = "binary"
weight = 1.0


[[criterion]]
id = "1.48"
name = "sidedock_package_api_shaped_field_contract"
description = "After creating a workspace with a closed-enum accentColor and adding a bookmark that satisfies the Bookmark create field contract, the Export SideDock package JSON preview is a single object whose visible text includes schemaVersion sidedock-package-v1, sidebarView, activeWorkspaceId, pinnedBookmarkIds, and a workspaces entry with name, accentColor from the nine-color enum, and a bookmark node carrying url, title, note, and pinned"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "sidedock_package_export_import_round_trip"
description = "After creating a workspace, adding a distinctive bookmark url and title, and pinning it, Download or Copy the SideDock package JSON then Import that same document and confirm workspace tabs, tree, Pinned row, sidebar view, and package preview match the pre-export session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "workspace_create_field_contract_validation"
description = "Submitting Create workspace with a blank name or a name longer than 40 characters is rejected with an inline error naming the name field and adds no workspace tab; the accentColor picker offers only the nine closed-enum swatches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "title_overlength_rejected_by_bookmark_contract"
description = "Submitting the Add bookmark form with a valid url and a title longer than 120 characters is rejected with an inline error naming the title field and creates no bookmark row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "package_import_rejects_field_contract_failures"
description = "Importing parseable JSON that fails the SideDock package field contract (wrong schemaVersion, accentColor outside the nine-color enum, blank workspace name, non-http/https bookmark url, or pinnedBookmarkIds longer than 8) leaves workspaces, pins, and sidebar view unchanged and shows validation naming the offending field or rule"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "export_omits_session_mutations"
description = "After creating a workspace and adding a bookmark with a distinctive url and title, the SideDock package JSON preview omits that workspace name, accentColor, bookmark url, or bookmark title"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
