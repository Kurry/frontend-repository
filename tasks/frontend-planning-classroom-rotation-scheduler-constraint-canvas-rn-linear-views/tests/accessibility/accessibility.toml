[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "All interactive controls are keyboard accessible with Tab, Shift+Tab, Enter, or Space."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Modal dialogs trap focus and return it to the originating control on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "images_and_icons_have_alt_text"
description = "All images and icons have descriptive alt text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Errors and notifications are conveyed both visually and via ARIA live regions."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "All form elements use explicit label elements."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings follow a logical order with no skips, such as H1 to H2 to H3."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Skip-to-content or landmark navigation is present."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "All text and controls have sufficient color contrast."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Semantic HTML roles such as nav, main, and button are used."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "Animations respect the prefers-reduced-motion setting."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Controls cannot be activated or reached via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom components use non-semantic tags and lack ARIA roles or labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Color-only indicators are used for error or state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "Modals do not trap keyboard focus."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Text is unreadable due to poor contrast."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Error feedback is visual only and is not screen-reader accessible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Icon or image content is missing alt text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings are skipped or unordered, such as jumping from H1 to H3."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Animations ignore reduced-motion settings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "AC-08"
name = "alternate_input"
type = "behavioral"
description = "Repeat the signature interaction with keyboard and touch-equivalent controls. Alternate input produces identical state with visible focus and live feedback."
weight = 1
