[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "warm_amber_brown_palette"
description = "The interface uses the warm amber-and-brown palette: a deep brown (#713F12) header bar with yellow (#FDE047) FrameFlick branding, a cream page background, and off-white panel cards with hairline amber borders."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "three_column_desktop_layout"
description = "On a desktop viewport the editor uses a three-column layout (fixed left tools column, flexible center canvas stage on a warm tint, fixed right controls column) and collapses to a single stacked column on a narrow viewport with upload, canvas, and controls all reachable by scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "pill_buttons_and_accent_highlights"
description = "Primary buttons are fully pill-shaped with a yellow (#FDE047) fill, #713F12 text, and a layered depth shadow, and the selected background swatch, active frame option, and active toggle show a persistent yellow accent ring."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "canvas_container_and_placeholder"
description = "The canvas preview sits in a rounded container with a soft drop shadow and shows an Upload an image to get started placeholder before any image is loaded."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "unstyled_default_layout_shipped"
description = "At desktop width the layout is a single unstyled column with default browser fonts and none of the specified color tokens applied, so controls appear clipped, overlapping, or unreachable."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "color_tokens_exposed_as_custom_properties"
description = "The document exposes CSS custom properties resolving to --color-primary #FDE047, --color-accent #FDE047, --color-background #FFFFFF, --color-text-primary #713F12, and --color-link #713F12, and the rendered UI colors visibly agree with those token values."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.7"
name = "system_font_stack_and_16px_headings"
description = "Headings and body text render in the specified system ui-sans-serif font stack with no external webfont request in the network log, and the primary heading and section headings render at 16px."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.8"
name = "consistent_icon_set_across_controls"
description = "Panel section headers, the move controls, the export buttons, and the Collaboration connection controls all carry icons drawn from one consistent icon set used across the whole app."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.9"
name = "mobile_375_no_overflow_usable"
description = "At a 375px-wide viewport, no content clips or overflows the viewport, no horizontal scrolling appears, and the sliders, background swatches, and both header tabs remain visible and fully usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "consistent_capitalization_specific_labels"
description = "Headings and buttons use one consistent capitalization convention throughout the app, and action labels are specific verbs (such as Save preset, Apply to canvas, Download PNG) rather than generic labels like Submit or OK where a specific one is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "placeholder_or_unhelpful_copy_shipped"
description = "Placeholder or lorem text (Lorem, TODO, template variable names) is visible somewhere in the shipped UI, or an error message merely rejects input without naming the problem and the fix, or an empty state gives no explanation of what belongs there and how to add it."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.12"
name = "spacing_and_radius_scale"
description = "Panels and cards share a consistent base border radius of about 8px and spacing/padding steps in multiples of the 4px base unit, rather than arbitrary one-off values that vary from panel to panel."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "export_preview_monospace_block"
description = "The Export preview renders style JSON in a monospaced read-only block consistent with the FrameFlick tool surfaces."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n13"
name = "undo_export_icons_inconsistent"
description = "Undo/Redo, Before/After, or export controls use a different icon set or visual language from the rest of the panel icons."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
