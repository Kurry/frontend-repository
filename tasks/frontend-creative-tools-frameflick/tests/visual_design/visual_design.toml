[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The interface uses the warm amber-and-brown palette: a deep brown header bar with yellow FrameFlick branding, a cream page background, and off-white panel cards with hairline amber borders."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "On a desktop viewport the editor uses a three-column layout (left tools, center canvas stage, right controls) and collapses to a single stacked column on a narrow viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Primary buttons are fully pill-shaped with a yellow (#FDE047) fill and layered depth shadow, and the selected background swatch, active frame option, and active toggle show a persistent accent highlight."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The canvas preview sits in a rounded container with a soft drop shadow and shows an Upload an image to get started placeholder before any image is loaded."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "At desktop width the layout is a single unstyled column with default browser fonts and none of the specified color tokens applied, so controls appear clipped, overlapping, or unreachable."
type = "binary"
weight = 1.0
negate = true
