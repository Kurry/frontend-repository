[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Dragging the Padding, Corner radius, or Shadow slider with the real control updates the canvas composition live as the slider moves, with no separate submit step."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Dragging the screenshot on the canvas with the pointer shows a grabbing cursor and a Moving image status badge with a highlighted canvas outline, and pressing Escape mid-drag cancels back to the drag-start position."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Hovering a background swatch, frame option, or Recent thumbnail lifts it with a shadow, and the active option keeps a persistent accent ring."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Clicking Copy image briefly swaps its label to Copied! for about two seconds after a successful copy, then reverts."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Switching between the Editor and Collaboration tabs swaps the main view instantly without a full page reload and highlights the active tab."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "Moving a slider with its real control produces no intermediate live change to the canvas — the composition only updates on release, after a reload, or not at all."
type = "binary"
weight = 1.0
negate = true
