[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "sliders_update_canvas_live"
description = "Dragging the Padding, Corner radius, or Shadow slider with the real control updates the canvas composition live as the slider moves, with no separate submit step."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "drag_feedback_and_escape_cancel"
description = "Dragging the screenshot on the canvas with the pointer shows a grabbing cursor, a Moving image status badge, and a blue outline around the canvas while dragging; releasing commits the position and pressing Escape mid-drag cancels back to the drag-start position."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "hover_lift_and_active_ring"
description = "Hovering a background swatch, frame option, or Recent thumbnail lifts it with a shadow, and the active option keeps a persistent accent ring."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "copied_label_swap_and_revert"
description = "Clicking Copy image briefly swaps its label to Copied! for about two seconds after a successful copy, then reverts."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "tab_switch_no_reload"
description = "Switching between the Editor and Collaboration tabs swaps the main view instantly without a full page reload and highlights the active tab."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "slider_only_updates_on_release"
description = "Moving a slider with its real control produces no intermediate live change to the canvas — the composition only updates on release, after a reload, or not at all."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "preset_list_enter_exit_animation"
description = "Saving a preset through the real Save preset control animates the new entry into the Saved presets list, and confirming a delete animates the removed entry out rather than snapping."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "recent_thumbnail_animates_in"
description = "After uploading an image through the real upload control, the newly processed image's thumbnail animates into the Recent strip instead of appearing instantly."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "toggle_knob_slides_buttons_ease"
description = "Clicking the watermark toggle slides its knob between the off and on positions, and buttons ease their background and lift slightly on hover and press rather than switching state instantly."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "feedback_messages_eased_in"
description = "Inline validation messages and the Copied! confirmation appear with a brief eased transition rather than popping in."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "reduced_motion_instant_but_usable"
description = "With prefers-reduced-motion set, list and feedback animations are removed and state changes apply instantly, while every feature (upload, sliders, presets, tabs, Collaboration scenario) remains usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "copied_style_json_label_swap"
description = "Clicking Copy style JSON through the real control briefly swaps its label to Copied style! then reverts, matching the Copy image confirmation pattern."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.13"
name = "before_after_eased_swap"
description = "Activating the Before/After toggle through the real control crossfades or swaps the canvas composition over a short eased transition rather than a hard cut; with prefers-reduced-motion set the swap is instant."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "snapshot_list_enter_exit_animation"
description = "Saving a snapshot through the real Save snapshot control animates the new entry into the Snapshots list, and confirming a delete animates the removed entry out rather than snapping."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.n12"
name = "before_after_hard_cuts_always"
description = "The Before/After toggle always hard-cuts with no eased transition even when prefers-reduced-motion is unset."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (control, action, observed transition or lack of one) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
