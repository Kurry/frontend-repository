[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_4px_scale"
description = "At desktop width, panel gaps, card padding, and control spacing follow the 4px base spacing unit rather than arbitrary odd-pixel one-offs visible in computed styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_frameflick_spec"
description = "Heading and body text use the specified ui-sans-serif/system stack, and primary heading and section headings render at 16px as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_screenshots"
description = "At 1440 desktop width, the three-column editor (left tools, center canvas stage, right controls) and header Editor/Collaboration tabs match /reference-screenshots/ overview and segment panels within a small tolerance for structure and density; where a screenshot and the instruction text conflict, the text wins."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_change_motions_present"
description = "Spec-required motion states are present via the real UI path: background swatch/frame/preset hover lift, preset list entry animate-in on save and animate-out on confirmed delete, Recent thumbnail animate-in, and Copied! label swap after Copy image."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "stacked_narrow_layout_matches_spec"
description = "On a narrow viewport the three-column editor collapses to a single stacked column with upload panel, canvas preview, and style controls all reachable by scrolling, matching the responsiveness spec."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "pill_buttons_and_8px_card_radius"
description = "Primary buttons are fully pill-shaped with background #FDE047 and text #713F12 plus a soft layered inset-plus-outline shadow, and panels/cards use an 8px border radius rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "section_vs_body_type_hierarchy"
description = "Panel section headers are visually distinct from body/control labels within the 16px heading system so Background, Caption, Watermark, and Saved presets read as section titles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "selected_and_disabled_control_states"
description = "Selected background swatch, active Frame style option, and active toggles show a yellow accent ring; Save preset stays visually disabled while the name field is empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_tokens_and_surfaces_match"
description = "Color treatments match the spec: soft cream page background, deep-brown (#713F12) header with yellow (#FDE047) FrameFlick branding, off-white panels with hairline amber borders, and CSS custom properties --color-primary / --color-accent #FDE047, --color-background #FFFFFF, --color-text-primary and --color-link #713F12."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "hover_lift_and_button_ease_match_spec"
description = "Via the real pointer path, background swatches, frame options, and preset thumbnails lift and gain shadow on hover, and buttons ease their background and lift slightly on hover/press."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_preview_and_paste_dialog_match_spec"
description = "The Export preview shows style JSON in a monospaced read-only block, and the paste-settings dialog lists Background, Composition, Frame, Caption, and Watermark checkboxes with Confirm paste and Cancel — matching the visual_design spec."
type = "binary"
weight = 1.0

