[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "three_column_to_stacked_at_narrow"
description = "At 1440px the editor shows a three-column layout (left tools, center canvas, right controls); at 375px it collapses to a single stacked column with upload panel, canvas preview, and style controls all reachable by scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, primary interactive controls (tabs, swatches, sliders, Save preset, export buttons) present usable tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_desktop_and_mobile"
description = "Typography remains readable at both 1440px desktop and 375px mobile widths without collapsing into illegible sizes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "panels_reachable_when_stacked"
description = "At narrow width, the upload/Recent/Saved presets panel, canvas preview, and style controls remain reachable by scrolling rather than disappearing off-canvas with no access path."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_order_upload_canvas_controls"
description = "At 375px the stacked layout reflows in a logical order so upload tools, canvas preview, and style controls can each be reached without overlapping into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "sliders_swatches_tabs_usable_at_375"
description = "At 375px width, sliders, background swatches, and both Editor/Collaboration tabs remain fully usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_preview_sizes_to_layout"
description = "The canvas preview sizes responsively to fit the layout at 1440 and 375 widths without a fixed-size overflow past the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "header_tabs_remain_accessible"
description = "Editor and Collaboration header tabs remain accessible at both 1440px and 375px widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_and_paste_usable_at_375"
description = "At 375 pixel width, Export scale, undo/redo, and the paste-settings dialog remain fully visible and operable without horizontal page scrolling."
type = "binary"
weight = 1.0

