[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "three_column_to_stacked_at_narrow"
description = "At 1440px the editor shows a three-column layout (left tools, center canvas, right controls); at 375px it collapses to a single stacked column with upload panel, canvas preview, and style controls all reachable by scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, primary interactive controls (tabs, swatches, sliders, Save preset, export buttons) present usable tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_desktop_and_mobile"
description = "Typography remains readable at both 1440px desktop and 375px mobile widths without collapsing into illegible sizes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, content never clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "panels_reachable_when_stacked"
description = "At narrow width, the upload/Recent/Saved presets panel, canvas preview, and style controls remain reachable by scrolling rather than disappearing off-canvas with no access path."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_order_upload_canvas_controls"
description = "At 375px the stacked layout reflows in a logical order so upload tools, canvas preview, and style controls can each be reached without overlapping into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "sliders_swatches_tabs_usable_at_375"
description = "At 375px width, sliders, background swatches, and both Editor/Collaboration tabs remain fully usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_preview_sizes_to_layout"
description = "The canvas preview sizes responsively to fit the layout at 1440 and 375 widths without a fixed-size overflow past the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "header_tabs_remain_accessible"
description = "Editor and Collaboration header tabs remain accessible at both 1440px and 375px widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_1440_or_375"
description = "At 1440px or 375px the layout breaks, overflows, or loses required columns/stacked regions for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_unreadable_at_375"
description = "At 375px width body or panel heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 375px content is cropped or unnecessary horizontal scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "stacked_panels_unreachable"
description = "At narrow width a required region (upload panel, canvas preview, or style controls) is missing or unreachable by scrolling."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_canvas"
description = "Fixed header or panel chrome obscures the canvas preview or primary controls at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px stacking causes overlapping panels that hide interactive controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "tabs_or_sliders_unusable_at_375"
description = "At 375px the Editor/Collaboration tabs or style sliders cannot be operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "canvas_fixed_size_overflows"
description = "The canvas preview uses a static size that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_375"
description = "At 375px essential controls (Save preset, export buttons, or Background swatches) disappear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_and_paste_usable_at_375"
description = "At 375 pixel width, Export scale, undo/redo, and the paste-settings dialog remain fully visible and operable without horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "paste_dialog_offscreen_on_mobile"
description = "At 375 pixel width the paste-settings dialog or Export preview renders off-screen or forces horizontal page scrolling."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
