[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "root_loads_interactive_ui"
description = "Navigating to the app root reaches an interactive UI with the upload zone and canvas controls visibly rendered, with no blank page, framework error overlay, or noscript fallback."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "refresh_restores_persisted_state"
description = "A full page refresh after uploading an image, adjusting settings, saving a preset, and saving a named snapshot restores the active canvas settings exactly, keeps the preset and snapshot in their lists, and shows the uploaded image as a Recent thumbnail; undo/redo stacks are empty after refresh."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "image_persisted_as_compact_data_url"
description = "The uploaded image persisted in localStorage is represented as a compact data URL (not raw binary or a broken reference) and the persisted values are valid, parseable data."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.4"
name = "rapid_preset_repetitions_stay_stable"
description = "Driving the Saved presets workflow through 25 rapid deterministic repetitions leaves an exact final list count, keeps controls responsive, and produces no blank screen, uncaught error, or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "collab_operations_idempotent_either_order"
description = "Running the Collaboration scenario through offline queueing, reordered delivery, and reconnect applies each queued operation exactly once — delivering the same operation again leaves the Shared content unchanged — and both delivery orders converge to the same visible Shared content."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.12"
name = "cold_load_interactive_within_two_seconds"
description = "On a local cold load, the app renders and becomes interactive (controls respond to input) within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "keyboard_operable_with_visible_focus"
description = "Every interactive control — including the entire Collaboration scenario (Go offline, Go online, the conflict choices, and Apply to canvas) — is reachable and operable with the keyboard alone, and the focused control shows a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "delete_dialog_focus_trap_escape_return"
description = "The preset delete confirm dialog exposes role dialog, traps Tab focus while open, closes on Escape without deleting the preset, and returns focus to the Del control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "sliders_arrow_key_adjustable"
description = "Each slider (padding, corner radius, shadow, caption size, watermark opacity, zoom) can be adjusted with the arrow keys while focused, and its displayed value updates as it changes."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.16"
name = "keyboard_position_nudges_match_pointer"
description = "With no pointer involved, arrow-key nudges and the on-screen move buttons reposition the screenshot inside the canvas, performing the same moves as dragging."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.17"
name = "validation_announced_via_aria_live"
description = "Validation and rejection messages (unsupported file type, invalid hex color, empty or duplicate preset name) are exposed through an aria-live polite region in addition to being shown visually."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.19"
name = "slider_drag_rerenders_without_lag"
description = "Dragging any slider re-renders the canvas live with no visible lag or dropped updates, and the UI stays responsive throughout the drag."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.20"
name = "shared_state_coherence_export_and_undo"
description = "Shared-state coherence: a style change made via a slider or swatch is immediately reflected in the canvas and the Export preview JSON without reload; Undo restores both surfaces together."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "export_preview_uses_documented_settings_keys"
description = "The live Export preview JSON text exposes every documented RenderSettings key (backgroundPreset or customBackground, padding, cornerRadius, shadow, frame, canvasSize, caption fields, watermark fields including watermarkColor, zoom, positionX/positionY, exportScale) and updates those keys when the matching controls change."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "forms_enforce_render_settings_bounds"
description = "Form validation for preset save, snapshot save, hex inputs, and style JSON import enforces the same RenderSettings / PresetCreate / SnapshotCreate bounds and enums as the export preview: out-of-contract values surface named field errors and do not enter the live export payload as valid."
type = "binary"
weight = 1.0

