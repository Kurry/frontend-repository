[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings and section titles (FrameFlick branding, Background, Caption, Watermark, Saved presets, Collaboration labels), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "action_labels_are_specific_verbs"
description = "Where the app renders button or action labels, they use specific verbs such as Save preset, Apply to canvas, Download PNG, Copy image, Go offline, and Go online rather than generic Submit or OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders error messages, they name the problem and the fix — for example Unsupported file type. Choose a PNG or JPG image, Invalid color. Enter six hexadecimal digits after #, or an empty-name message that names the name field — not merely Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_canvas_explains_next_step"
description = "Where the app renders the empty canvas state, the copy Upload an image to get started explains what belongs there and how to add it."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_spelling_grammar"
description = "Where the app renders body or panel helper copy (drop zone Drop PNG/JPG here / Choose image / Replace image, shadow labels None through Hard, Collaboration Shared editor / Shared content), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "frameflick_terminology_consistent"
description = "Where the app renders labels for the same concept in multiple places, terminology stays consistent (Saved presets / Apply / Del, Caption, Watermark, Shared content) rather than mixing synonyms like preset vs theme or caption vs title inconsistently."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "slider_values_and_units_consistent"
description = "Where the app renders slider values and units, formatting is consistent: padding as a whole percent, corner radius in px, watermark opacity as percent, and zoom as percent."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "copied_confirmation_specific"
description = "Where the app renders confirmation after Copy image, it states Copied! rather than a vague affirmation."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as FrameFlick branding, Upload an image to get started, Download PNG, or Save preset."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "concept_names_inconsistent"
description = "The same concept is named inconsistently across surfaces (for example Saved presets in one place and Themes in another, or Shared content vs Shared caption without a clear mapping)."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders mandated labels, error messages, or the empty-canvas placeholder unreadable at 1440 or 375."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.9"
name = "style_export_action_labels_specific"
description = "Where the app renders export and history actions, labels use specific verbs such as Download style JSON, Copy style JSON, Import style JSON, Copy settings, Paste settings, Before/After, and Reset style rather than generic Submit or OK."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "invalid_style_json_message_vague"
description = "Where the app renders a malformed style-import error, the copy is only a vague Invalid without naming Invalid style JSON or the fix."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.10"
name = "hex_field_error_names_field_and_fix"
description = "Where the app renders an invalid hex rejection, the copy names the problem and the fix as Invalid color. Enter six hexadecimal digits after # rather than a bare Invalid or Zod/schema jargon."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n6"
name = "validation_exposes_schema_jargon"
description = "Where the app renders validation for hex or preset fields, the visible copy exposes schema-library jargon (for example Zod error codes) instead of user-facing named field messages."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.13"
name = "field_contract_import_error_names_field"
description = "Where the app renders a field-contract import rejection (missing key, out-of-enum, out-of-bounds, or invalid hex), the visible copy names the offending field or shows Invalid style JSON for unparseable input — not a bare Failed or schema-library jargon alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
