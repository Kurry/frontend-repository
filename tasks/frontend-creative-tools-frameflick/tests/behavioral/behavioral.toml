[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "persistence_multi_facet_round_trip"
description = "Starting in the Editor: upload an image, set background to Night, set padding to 12, save a preset named Warm Card, and note the Recent strip; then reload. All facets survive together — canvas settings, Warm Card in Saved presets, and the uploaded image as a Recent thumbnail — never a mixed partial survival."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "recent_order_reflects_processing"
description = "Process images so the Recent strip fills with multiple thumbnails; the newest processed image appears in the strip (up to 6) in an order consistent with processing rather than a hardcoded static thumbnail set that ignores new uploads."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "canvas_derived_from_style_inputs"
description = "Derived-view sensitivity: change background from Night to Ocean (or Custom hex), then change padding and frame style; the live canvas background, inset, and frame chrome each change meaningfully rather than redrawing identically regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "collaboration_caption_echo_to_editor"
description = "Cross-view echo: in Collaboration, converge Shared content and click Apply to canvas, then switch to the Editor tab without reload; the canvas caption shows the same converged text."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "preset_count_delta_exact"
description = "Count-delta integrity: note the Saved presets count, save one new uniquely named preset, and confirm the count increases by exactly one; after Del+confirm on that preset, confirm the count decreases by exactly one with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_presets_restore_different_looks"
description = "Input-dependent output: save two presets with different backgrounds/padding/frames, then Apply each; the canvas outcomes differ in the ways those stored settings dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_editor_and_collaboration"
description = "Interleaved-flow integrity: start configuring canvas settings in Editor, switch to Collaboration and perform an offline edit, return to Editor and save a preset; neither flow corrupts the other — canvas settings and the Collaboration queue/Shared content remain coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_presets_then_repopulate"
description = "Edge-state round-trip: delete all Saved presets (list empty), then save a new named preset; the list count tracks through both transitions (zero then one) and Apply restores that preset's settings."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring canvas settings, a Saved preset, and a Recent thumbnail, a reload leaves an incoherent mix (for example Warm Card survives while canvas settings reset, or Recent survives alone)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "canvas_ignores_style_inputs"
description = "Changing background swatch, padding, or frame style leaves the canvas composition visually identical to the pre-change state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_presets_identical_canvas"
description = "Applying two presets saved with clearly different settings yields a byte-identical / visually identical canvas outcome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "apply_to_canvas_stale_until_reload"
description = "After Apply to canvas from Collaboration, the Editor caption stays stale until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "style_recipe_reflects_session_mutations"
description = "Mutate background to Ocean and padding to 16, then inspect Export preview / Download style JSON: the artifact contains those session values; after further mutations the preview updates again without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_restores_export_preview"
description = "Change Night to Ocean and padding 8 to 18, Undo, and confirm both canvas and Export preview JSON return to Night and padding 8; Redo returns Ocean and padding 18."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "style_import_export_round_trip"
description = "Export style JSON, change several settings, import the file: visible style settings match the exported combination (background, padding, frame, caption)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "png_differs_across_style_inputs"
description = "Input-dependent PNG output: export at the same scale under two different style configurations; the downloaded compositions differ in the ways the styles dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_json_ignores_live_edits"
description = "Changing background or padding leaves the Export preview JSON text identical to its pre-edit content."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_skips_export_surface"
description = "Undo restores some canvas controls but the Export preview JSON stays at the post-mutation values."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.13"
name = "style_json_schema_round_trip_fields"
description = "Export style JSON after setting Ocean, padding 16, Browser frame, caption text with Above position and a caption color, and an enabled watermark at TR with a distinct watermarkColor; change those settings; import the JSON; every exported RenderSettings field reconstitutes on the canvas and the Export preview again shows the same keys and values including watermarkColor."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n7"
name = "import_drops_settings_fields"
description = "After importing a previously exported style JSON, one or more documented settings fields (background, padding, frame, caption, or watermark) remain at the post-change values instead of the exported combination."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.14"
name = "background_mutual_exclusion_in_export"
description = "With a named preset active, Export preview shows backgroundPreset as that preset name and customBackground as null; switching to a custom hex background shows backgroundPreset null and customBackground as the #RRGGBB hex — never both non-null or both null."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n8"
name = "background_mutual_exclusion_violated"
description = "After picking a preset swatch or a custom hex background, the Export preview shows both backgroundPreset and customBackground non-null, or both null, violating the RenderSettings mutual-exclusion rule."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
