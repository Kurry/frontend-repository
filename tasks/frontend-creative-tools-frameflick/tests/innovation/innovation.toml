[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "live_canvas_microinteraction_polish"
description = "Beyond bare slider wiring, the live canvas composition feedback feels polished — for example coordinated hover lift on swatches/frames, a Moving image status badge with blue outline while dragging, and eased Copied! / validation transitions that read as intentional craft."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "device_frame_composition_craft"
description = "Browser and Phone frame styles read as carefully composed mock chrome (traffic-light dots and screenshot.png address bar; phone bezel) rather than crude boxes around the screenshot."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "empty_state_and_replace_guidance"
description = "Upload empty-state and Replace image guidance feel finished and product-like, steering a first-time user from placeholder through first composition without dead ends."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "preset_and_recent_workflow_polish"
description = "Saved presets plus the Recent strip together form a delightful reuse workflow — named looks and per-image settings recall — beyond a minimal single-save list."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "pointerless_reposition_affordances"
description = "Arrow-key nudges, on-screen move buttons, and Reset position give a thoughtful alternative to drag for precise screenshot placement."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "collaboration_merge_experience_polish"
description = "The Collaboration scenario's offline queue, convergent Shared content, and explicit conflict choices (Use mine, Use theirs, Merge) feel like a polished concurrent-edit demo rather than a stub panel."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "warm_brand_composition"
description = "The amber-and-brown FrameFlick branding, cream workspace, and yellow pill CTAs read as a cohesive branded tool identity rather than a default admin template."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "export_confidence_feedback"
description = "Download PNG and Copy image give clear, confidence-building feedback (named download / Copied!) that elevates the export moment beyond a silent button."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "custom_background_and_caption_craft"
description = "Custom background picker/hex sync and caption position/size/color controls feel like intentional composition tools, not afterthought inputs."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_tool_feel"
description = "Taken together, live canvas dressing, presets, Recent recall, and Collaboration merge present competition-level tool craft visible to a real user."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.11"
name = "style_recipe_end_state_polish"
description = "Beyond bare PNG download, the live Export preview plus Download/Copy/Import style JSON round-trip reads as a polished portable recipe workflow a real operator would trust."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.12"
name = "undo_before_after_craft"
description = "Undo/Redo together with Before/After compare and Reset style feel like intentional non-destructive editing craft beyond minimum slider controls."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the FrameFlick spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
