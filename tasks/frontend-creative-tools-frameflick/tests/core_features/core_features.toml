[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "workspace_renders_at_root"
description = "On load, the app renders the editor workspace at / — the upload drop zone reading Drop PNG/JPG here with Choose image, the canvas preview showing the Upload an image to get started placeholder, and the right-hand style panels (Background, Style, Frame style, Canvas size, Caption, Watermark, Position & zoom)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "upload_via_picker_shows_replace_label"
description = "After uploading a PNG or JPG via the Choose image file picker, the image renders onto the working canvas and the drop zone label changes to Replace image."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "background_swatch_and_custom_color"
description = "After clicking a Background preset swatch, the canvas background changes instantly to that preset and the swatch is marked selected; after enabling Custom and setting a hex value, the background updates to exactly that custom color and the color picker and hex input stay in sync."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "padding_slider_live_round_trip"
description = "When the Padding slider is dragged from a low value to a high value, the inset margin between the screenshot and the canvas edge visibly increases live and the displayed value shows a whole percent; dragging it back down decreases the margin again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "corner_radius_and_shadow_sliders"
description = "When the Corner radius slider is set near 48px the screenshot's corners visibly round, and at 0 they return to sharp; when the Shadow slider moves from None toward Hard a drop shadow appears and visibly intensifies."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "frame_style_browser_phone_none"
description = "After selecting Browser from Frame style, a mock browser-chrome bar with three traffic-light dots and an address bar reading screenshot.png wraps the screenshot; selecting Phone shows a phone bezel instead; selecting None removes the frame."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "canvas_size_presets_recenter"
description = "After selecting each Canvas size preset (Square, Widescreen, Story, Original) the canvas visibly changes aspect ratio and the composition re-centers rather than staying pinned."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "caption_renders_and_invalid_hex_rejected"
description = "After typing caption text, adjusting its font-size slider, and setting its color, the caption renders on the canvas above or below the screenshot reflecting the text, size, and color; entering an invalid hex shows Invalid color. Enter six hexadecimal digits after # while the canvas keeps rendering the last valid color."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "watermark_corner_and_opacity"
description = "After enabling the Watermark toggle, typing a label, choosing a corner, and moving the opacity slider, a semi-transparent watermark renders in the chosen corner and its transparency tracks the slider; turning the toggle off removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "preset_save_apply_delete_lifecycle"
description = "After configuring a distinctive combination of settings and using Save preset with a name, the preset appears in the Saved presets list; changing settings then clicking Apply restores every stored setting; clicking Del and confirming removes it, and saving an empty name or a duplicate name is rejected with visible feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "export_download_and_copy"
description = "When Download PNG is clicked a file download named frameflick-export.png is triggered without crashing or altering the canvas, and Copy image shows a transient Copied! confirmation while the composition stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "refresh_restores_settings_presets_recents"
description = "After uploading an image, adjusting settings, and saving a preset, a full page refresh restores the active canvas settings exactly, keeps the saved preset in the Saved presets list, and shows the uploaded image as a Recent thumbnail; a deleted preset does not reappear after refresh."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "recent_switch_round_trip_keeps_per_image_settings"
description = "After uploading a first image with distinctive settings then a second image, the canvas shows the second image with settings retained; clicking the first image's Recent thumbnail first captures the current settings onto the second image, then reloads the first image with the settings last used on it, and switching back and forth shows each image with its own settings without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "collab_offline_merge_convergence"
description = "In the Collaboration tab, using Go offline then queueing two independently authored non-conflicting changes and going online converges both changes into the Shared content region in either order without dropping one; a conflicting change surfaces an explicit choice (Use mine, Use theirs, Merge) instead of silently overwriting."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "upload_via_drop_zone_and_picker"
description = "Uploading a PNG or JPG via both the drag-and-drop drop zone and the Choose image file picker loads the image onto the working canvas and renders it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "eight_plus_background_swatches"
description = "The Background panel shows at least 8 clickable preset swatches and clicking one re-renders the canvas background instantly behind the screenshot, marking that swatch selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "custom_color_overrides_and_is_overridden"
description = "Enabling Custom and setting a color via the picker or its synced hex input sets a custom background that overrides the active preset, with picker and hex staying in sync; picking a preset swatch afterward overrides the custom color again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "zoom_scales_image_not_canvas"
description = "The Zoom slider scales the screenshot itself while the canvas dimensions stay fixed, independent of the Canvas size setting."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "recent_strip_caps_at_six"
description = "Each processed image appears as a thumbnail in the Recent strip, and the strip shows at most the last 6 processed images."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "new_upload_keeps_current_settings"
description = "Uploading a new image replaces the working canvas while keeping the currently selected style settings applied to it."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "unsupported_file_silently_accepted"
description = "Uploading an unsupported non-image file silently replaces or clears the working canvas instead of showing the message Unsupported file type. Choose a PNG or JPG image while preserving the last valid canvas state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "empty_or_duplicate_preset_name_accepted"
description = "Saving a preset with an empty name or a name that already exists still creates a blank or duplicate preset entry instead of being rejected with visible feedback (an inline message naming the name field, or Preset \"name\" already exists)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "preset_apply_partial_restore"
description = "Clicking Apply on a saved preset restores only some of its stored settings, leaving other settings (background, padding, corner radius, shadow, frame, caption, watermark) at their changed values."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.34"
name = "flow_save_preset_count_and_refresh"
description = "Starting from a fresh load: upload an image, pick the Night swatch, set padding to 12, then save a preset named Warm Card. The Saved presets count, measured immediately before and after the save, increases by exactly one; the new entry appears with Apply and Del controls; and a full page refresh restores the canvas settings (Night background, padding 12), keeps Warm Card in the Saved presets list, and shows the uploaded image as a Recent thumbnail."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "flow_delete_preset_count_delta"
description = "Deleting a preset through Del and its confirm dialog decreases the Saved presets count by exactly one, measured immediately before and after the confirmation; the removed entry disappears from the list; and after a full page refresh the deleted preset does not reappear."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "flow_collab_queue_merge_apply_to_canvas"
description = "In the Collaboration scenario: after clicking Go offline, one edit in the Shared editor and one in the simulated peer editor each grow the queued-operations list by exactly one entry; clicking Go online empties the queue and merges both changes into the Shared content region; and clicking Apply to canvas then switching to the Editor tab shows that converged text as the canvas caption without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "double_save_creates_single_preset"
description = "Double-activating the preset save control in quick succession creates exactly one preset: the Saved presets count increases by exactly one and one new entry appears in the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "export_before_upload_is_safe"
description = "Before any image is loaded, the canvas region shows the Upload an image to get started placeholder and activating Download PNG or Copy image does not produce a broken or empty file state or an uncaught error."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.39"
name = "move_buttons_and_reset_position"
description = "The on-screen move buttons (up, left, right, down) shift the screenshot inside the canvas in the corresponding direction, and the Reset position control returns it to its starting position."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "preset_save_disabled_until_valid"
description = "While the preset name field is empty, the Save preset control is disabled and an inline validation message naming the name field appears before any submit; once a valid name is entered the control becomes enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "caption_position_above_below_switch"
description = "With caption text present, switching the caption position control between Above and Below moves the rendered caption from above the screenshot to below it on the canvas, and back."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.42"
name = "export_scale_and_style_aware_png"
description = "An Export scale control offers 1x, 2x (default), and 3x; Download PNG triggers a download named frameflick-export.png at the selected scale; two different style configurations (Night/padding 4 versus Ocean/padding 20 with Browser frame) produce visibly different exported PNG compositions."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "style_recipe_json_live_export"
description = "Download style JSON downloads frameflick-style.json compiled live from current settings, Copy style JSON shows Copied style!, and the Export preview panel updates when Ocean and padding 16 are set so the JSON contains those values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "style_json_import_round_trip"
description = "After exporting a style recipe with Ocean, padding 16, Browser frame, and a caption, changing settings and importing that JSON restores those exact visible settings without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "undo_redo_style_mutations"
description = "After changing background Night to Ocean and padding 8 to 18, Undo restores Night and padding 8 on the canvas and in the Export preview JSON; Redo reapplies Ocean and padding 18; Undo/Redo are disabled when their stacks are empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "before_after_and_reset_style"
description = "After dressing an uploaded image, activating Before shows the earlier undressed look and returning to After shows the current dressed look with settings retained; Reset style restores defaults for a fresh upload while keeping the current image."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "snapshots_save_apply_delete"
description = "Save snapshot with a valid name adds an entry to Snapshots (distinct from Saved presets); Apply restores that combination; Del with confirm removes it; an empty name is rejected with an inline message naming the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "copy_paste_settings_groups"
description = "After Copy settings on a Night-plus-Browser look, changing background and padding, then Paste settings with only Background checked restores Night while padding stays at the changed value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n42"
name = "style_json_omits_session_mutations"
description = "After changing Night to Ocean and padding to 16, the Export preview or downloaded style JSON omits those values or still shows the prior settings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n43"
name = "undo_does_not_restore_style"
description = "After a style mutation, Undo leaves the canvas and Export preview JSON at the post-mutation values instead of restoring the prior look."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n44"
name = "different_styles_identical_png_export"
description = "Exporting PNG for two clearly different style configurations yields visually identical compositions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.49"
name = "style_json_api_field_contract"
description = "The Export preview shows a RenderSettings object with every required field-contract key by name — backgroundPreset or customBackground, padding, cornerRadius, shadow, frame, canvasSize, captionText, captionPosition, captionSize, captionColor, watermarkEnabled, watermarkText, watermarkColor, watermarkOpacity, watermarkCorner, zoom, positionX, positionY, and exportScale — and after setting Ocean and padding 16 those values appear under the matching keys while every required key remains present."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "preset_create_payload_settings_complete"
description = "Saving a preset named Warm Card after configuring Night background, padding 12, Browser frame, a caption, and an enabled watermark with a distinct watermark color stores a PresetCreate record (name + RenderSettings) whose Apply restores every settings field in that combination including watermarkColor, matching the PresetCreate field contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "hex_named_field_error_not_generic"
description = "Entering an invalid custom-background, caption-color, or watermark-color hex shows Invalid color. Enter six hexadecimal digits after # as a named field error next to that hex input rather than only a generic schema or form-level message, and the Export preview never shows that invalid hex as a valid #RRGGBB value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n45"
name = "style_json_missing_api_keys"
description = "After configuring distinctive settings, the Export preview style JSON uses opaque or renamed keys so the documented RenderSettings names (padding, frame, captionColor, watermarkColor, watermarkCorner, and siblings) are not readable in the preview text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n46"
name = "hex_error_generic_schema_only"
description = "An invalid hex entry shows only a generic schema or Invalid form message with no named field error and without Invalid color. Enter six hexadecimal digits after #."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.52"
name = "import_rejects_invalid_render_settings"
description = "Import style JSON with parseable JSON that fails the RenderSettings field contract — missing a required key, frame/canvasSize/captionPosition/watermarkCorner/exportScale outside their closed enums, padding/cornerRadius/shadow/captionSize/watermarkOpacity/zoom outside their integer bounds, a hex that is not #RRGGBB, or a backgroundPreset/customBackground cross-field violation — shows a visible error naming the offending field (or Invalid style JSON when unparseable) and leaves the canvas settings unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "preset_create_name_bounds"
description = "Saving a preset with a name over 40 characters or whitespace-only shows an inline message naming the name field and leaves the Saved presets count unchanged; a valid trimmed unique name at or under 40 characters creates exactly one entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n47"
name = "import_accepts_out_of_contract_payload"
description = "Import style JSON with an out-of-enum frame, out-of-bounds padding, invalid hex, or backgroundPreset/customBackground cross-field violation applies the payload to the canvas without a named field or Invalid style JSON rejection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in a specified core feature or end-to-end user flow that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, resulting page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
