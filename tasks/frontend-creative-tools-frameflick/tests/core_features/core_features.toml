[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "workspace_renders_at_root"
description = "On load, the app renders the editor workspace at / — the upload drop zone reading Drop PNG/JPG here with Choose image, the canvas preview showing the Upload an image to get started placeholder, and the right-hand style panels (Background, Style, Frame style, Canvas size, Caption, Watermark, Position & zoom)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "upload_via_picker_shows_replace_label"
description = "After uploading a PNG or JPG via the Choose image file picker, the image renders onto the working canvas and the drop zone label changes to Replace image."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "background_swatch_and_custom_color"
description = "After clicking a Background preset swatch, the canvas background changes instantly to that preset and the swatch is marked selected; after enabling Custom and setting a hex value, the background updates to exactly that custom color and the color picker and hex input stay in sync."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "padding_slider_live_round_trip"
description = "When the Padding slider is dragged from a low value to a high value, the inset margin between the screenshot and the canvas edge visibly increases live and the displayed value shows a whole percent; dragging it back down decreases the margin again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "corner_radius_and_shadow_sliders"
description = "When the Corner radius slider is set near 48px the screenshot's corners visibly round, and at 0 they return to sharp; when the Shadow slider moves from None toward Hard a drop shadow appears and visibly intensifies."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "frame_style_browser_phone_none"
description = "After selecting Browser from Frame style, a mock browser-chrome bar with three traffic-light dots and an address bar reading screenshot.png wraps the screenshot; selecting Phone shows a phone bezel instead; selecting None removes the frame."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "canvas_size_presets_recenter"
description = "After selecting each Canvas size preset (Square, Widescreen, Story, Original) the canvas visibly changes aspect ratio and the composition re-centers rather than staying pinned."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "caption_renders_and_invalid_hex_rejected"
description = "After typing caption text, adjusting its font-size slider, and setting its color, the caption renders on the canvas above or below the screenshot reflecting the text, size, and color; entering an invalid hex shows Invalid color. Enter six hexadecimal digits after # while the canvas keeps rendering the last valid color."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "watermark_corner_and_opacity"
description = "After enabling the Watermark toggle, typing a label, choosing a corner, and moving the opacity slider, a semi-transparent watermark renders in the chosen corner and its transparency tracks the slider; turning the toggle off removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "preset_save_apply_delete_lifecycle"
description = "After configuring a distinctive combination of settings and using Save preset with a name, the preset appears in the Saved presets list; changing settings then clicking Apply restores every stored setting; clicking Del and confirming removes it, and saving an empty name or a duplicate name is rejected with visible feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "export_download_and_copy"
description = "When Download PNG is clicked a file download named frameflick-export.png is triggered without crashing or altering the canvas, and Copy image shows a transient Copied! confirmation while the composition stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "refresh_restores_settings_presets_recents"
description = "After uploading an image, adjusting settings, and saving a preset, a full page refresh restores the active canvas settings exactly, keeps the saved preset in the Saved presets list, and shows the uploaded image as a Recent thumbnail; a deleted preset does not reappear after refresh."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "recent_switch_round_trip_keeps_per_image_settings"
description = "After uploading a first image with distinctive settings then a second image, the canvas shows the second image with settings retained; clicking the first image's Recent thumbnail first captures the current settings onto the second image, then reloads the first image with the settings last used on it, and switching back and forth shows each image with its own settings without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "collab_offline_merge_convergence"
description = "In the Collaboration tab, using Go offline then queueing two independently authored non-conflicting changes and going online converges both changes into the Shared content region in either order without dropping one; a conflicting change surfaces an explicit choice (Use mine, Use theirs, Merge) instead of silently overwriting."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "upload_via_drop_zone_and_picker"
description = "Uploading a PNG or JPG via both the drag-and-drop drop zone and the Choose image file picker loads the image onto the working canvas and renders it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "eight_plus_background_swatches"
description = "The Background panel shows at least 8 clickable preset swatches and clicking one re-renders the canvas background instantly behind the screenshot, marking that swatch selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "custom_color_overrides_and_is_overridden"
description = "Enabling Custom and setting a color via the picker or its synced hex input sets a custom background that overrides the active preset, with picker and hex staying in sync; picking a preset swatch afterward overrides the custom color again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "zoom_scales_image_not_canvas"
description = "The Zoom slider scales the screenshot itself while the canvas dimensions stay fixed, independent of the Canvas size setting."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "recent_strip_caps_at_six"
description = "Each processed image appears as a thumbnail in the Recent strip, and the strip shows at most the last 6 processed images."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "new_upload_keeps_current_settings"
description = "Uploading a new image replaces the working canvas while keeping the currently selected style settings applied to it."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "unsupported_file_silently_accepted"
description = "Uploading an unsupported non-image file silently replaces or clears the working canvas instead of showing the message Unsupported file type. Choose a PNG or JPG image while preserving the last valid canvas state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "empty_or_duplicate_preset_name_accepted"
description = "Saving a preset with an empty name or a name that already exists still creates a blank or duplicate preset entry instead of being rejected with visible feedback (an inline message naming the name field, or Preset \"name\" already exists)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "preset_apply_partial_restore"
description = "Clicking Apply on a saved preset restores only some of its stored settings, leaving other settings (background, padding, corner radius, shadow, frame, caption, watermark) at their changed values."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.34"
name = "flow_save_preset_count_and_refresh"
description = "Starting from a fresh load: upload an image, pick the Night swatch, set padding to 12, then save a preset named Warm Card. The Saved presets count, measured immediately before and after the save, increases by exactly one; the new entry appears with Apply and Del controls; and a full page refresh restores the canvas settings (Night background, padding 12), keeps Warm Card in the Saved presets list, and shows the uploaded image as a Recent thumbnail."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "flow_delete_preset_count_delta"
description = "Deleting a preset through Del and its confirm dialog decreases the Saved presets count by exactly one, measured immediately before and after the confirmation; the removed entry disappears from the list; and after a full page refresh the deleted preset does not reappear."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "flow_collab_queue_merge_apply_to_canvas"
description = "In the Collaboration scenario: after clicking Go offline, one edit in the Shared editor and one in the simulated peer editor each grow the queued-operations list by exactly one entry; clicking Go online empties the queue and merges both changes into the Shared content region; and clicking Apply to canvas then switching to the Editor tab shows that converged text as the canvas caption without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "double_save_creates_single_preset"
description = "Double-activating the preset save control in quick succession creates exactly one preset: the Saved presets count increases by exactly one and one new entry appears in the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "export_before_upload_is_safe"
description = "Before any image is loaded, the canvas region shows the Upload an image to get started placeholder and activating Download PNG or Copy image does not produce a broken or empty file state or an uncaught error."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.39"
name = "move_buttons_and_reset_position"
description = "The on-screen move buttons (up, left, right, down) shift the screenshot inside the canvas in the corresponding direction, and the Reset position control returns it to its starting position."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in a specified core feature or end-to-end user flow that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, resulting page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
