[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app renders the editor workspace at / — the upload drop zone reading Drop PNG/JPG here with Choose image, the canvas preview showing the Upload an image to get started placeholder, and the right-hand style panels (Background, Style, Frame style, Canvas size, Caption, Watermark, Position & zoom)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After uploading a PNG or JPG via the Choose image file picker, the image renders onto the working canvas and the drop zone label changes to Replace image."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After clicking a Background preset swatch, the canvas background changes instantly to that preset and the swatch is marked selected; after enabling Custom and setting a hex value, the background updates to exactly that custom color and the color picker and hex input stay in sync."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "When the Padding slider is dragged from a low value to a high value, the inset margin between the screenshot and the canvas edge visibly increases live and the displayed value shows a whole percent; dragging it back down decreases the margin again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When the Corner radius slider is set near 48px the screenshot's corners visibly round, and at 0 they return to sharp; when the Shadow slider moves from None toward Hard a drop shadow appears and visibly intensifies."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After selecting Browser from Frame style, a mock browser-chrome bar with three traffic-light dots and an address bar reading screenshot.png wraps the screenshot; selecting Phone shows a phone bezel instead; selecting None removes the frame."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After selecting each Canvas size preset (Square, Widescreen, Story, Original) the canvas visibly changes aspect ratio and the composition re-centers rather than staying pinned."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After typing caption text, adjusting its font-size slider, and setting its color, the caption renders on the canvas above or below the screenshot reflecting the text, size, and color; entering an invalid hex shows Invalid color. Enter six hexadecimal digits after #."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After enabling the Watermark toggle, typing a label, choosing a corner, and moving the opacity slider, a semi-transparent watermark renders in the chosen corner and its transparency tracks the slider; turning the toggle off removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After configuring a distinctive combination of settings and using Save preset with a name, the preset appears in the Saved presets list; changing settings then clicking Apply restores every stored setting; clicking Del and confirming removes it, and saving an empty name or a duplicate name is rejected with visible feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When Download PNG is clicked a file download named frameflick-export.png is triggered without crashing or altering the canvas, and Copy image shows a transient Copied! confirmation while the composition stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After uploading an image, adjusting settings, and saving a preset, a full page refresh restores the active canvas settings exactly, keeps the saved preset in the Saved presets list, and shows the uploaded image as a Recent thumbnail; a deleted preset does not reappear after refresh."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After uploading a first image with distinctive settings then a second image, the canvas shows the second image with settings retained; clicking the first image's Recent thumbnail reloads it together with the settings last used on it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "In the Collaboration tab, using Go offline then queueing two independently authored non-conflicting changes and going online converges both changes into the Shared content region in either order without dropping one; a conflicting change surfaces an explicit choice (Use mine, Use theirs, Merge) instead of silently overwriting."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Uploading a PNG or JPG via both the drag-and-drop drop zone and the Choose image file picker loads the image onto the working canvas and renders it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The Background panel shows at least 8 clickable preset swatches and clicking one re-renders the canvas background instantly behind the screenshot, marking that swatch selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Enabling Custom and setting a color via the picker or its synced hex input sets a custom background that overrides the active preset, with picker and hex staying in sync; picking a preset swatch afterward overrides the custom color again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Moving the Padding slider from a low to a high value visibly increases the inset margin between the screenshot and the canvas edge, and the displayed value is a whole percent."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Setting the Corner radius slider near 48px visibly rounds the screenshot's own corners, and returning it to 0 makes the corners sharp again."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Moving the Shadow slider from None toward its maximum makes a drop shadow behind the screenshot appear and visibly intensify."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Selecting Browser from Frame style wraps the screenshot in a mock browser-chrome bar with three traffic-light dots and an address bar; Phone shows a phone bezel; None removes the frame."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Selecting each Canvas size preset (Square, Widescreen, Story, Original) resizes the canvas to that aspect ratio and re-centers the composition rather than leaving it pinned."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Typing caption text and adjusting its font-size slider and color renders a caption on the canvas above or below the screenshot reflecting the typed text, chosen size, and color."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Enabling the Watermark toggle, typing a label, choosing a corner, and moving the opacity slider renders a semi-transparent watermark in that corner whose transparency tracks the slider; disabling the toggle removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The Zoom slider scales the screenshot itself while the canvas dimensions stay fixed, independent of the Canvas size setting."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Clicking Download PNG triggers a file download and Copy image shows a transient Copied! confirmation."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "Save preset with a name adds it to the Saved presets list; clicking Apply on it restores every stored setting to the canvas; clicking Del and confirming removes it from the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "The Recent strip shows processed images as thumbnails and clicking a thumbnail reloads that image together with the settings last used on it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "Uploading a new image replaces the working canvas while keeping the currently selected style settings applied to it."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "In the Collaboration scenario, two independently authored non-conflicting changes queued offline both appear in the converged Shared content when going online, regardless of the order applied; a genuine conflict surfaces an explicit choice (Use mine, Use theirs, Merge)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "1_31"
description = "Uploading an unsupported non-image file silently replaces or clears the working canvas with no visible rejection message."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "1_32"
description = "Saving a preset with an empty name or a name that already exists still creates a blank or duplicate preset entry instead of being rejected with visible feedback."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "1_33"
description = "Clicking Apply on a saved preset restores only some of its stored settings, leaving other settings (background, padding, corner radius, shadow, frame, caption, watermark) at their changed values."
type = "binary"
weight = 1.0
negate = true
