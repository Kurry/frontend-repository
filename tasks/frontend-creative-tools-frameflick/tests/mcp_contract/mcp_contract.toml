[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "editor_entity_artifact_modules_bound"
description = "Contract modules structured-editor-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for editor, entity, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed editor, entity, and artifact tool handlers drive the same visible UI logic as on-page controls (style property updates, mode switches, preset create/select/delete, and style-json export/import/copy)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_including_artifact"
description = "Only documented editor operations (update_property, switch_mode, set_content, preview), entity operations (create, select, delete), and artifact operations (export, import, copy) are available — no undeclared routes or modules."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for editor update_property / switch_mode / set_content / preview, entity create / select / delete, and artifact export / import / copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_preset_create_select_delete"
description = "Entity operations create, select, and delete work for the preset entity (delete requires explicit confirm=true) and update the Saved presets list the same way as the visible controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_property_updates_bound"
description = "Editor update_property is bound for declared properties: background, custom-background, padding, corner-radius, shadow, frame-style, caption-text, caption-position, caption-size, caption-color, watermark, watermark-text, watermark-color, watermark-opacity, watermark-corner, zoom, and export-scale."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "editor_modes_and_value_bounds"
description = "Editor switch_mode accepts square, widescreen, story, and original; numeric properties respect declared bounds (padding 0-25, corner-radius 0-48, shadow 0-10, caption-size 12-64, watermark-opacity 5-100, zoom 20-200)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond structured-editor-v1 / entity-collection-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and successful invocations for the bound editor and entity tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works from the app's own registration without manual editing or test harness changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling for structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is unbound, missing, or a no-op."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "An editor or entity tool handler updates a different property, applies a mismatched preset, or leaves the canvas/Saved presets UI out of sync with the invoked action."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or entity operations beyond the Bindings block are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise bound editor update_property/switch_mode or entity create/select/delete operations."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_preset_state"
description = "Entity create bypasses preset name validation and leaves MCP state inconsistent with the visible Saved presets list (for example a nameless or duplicate row)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or an incomplete tool list for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works through manual or undocumented test hacks rather than the app's registered tool handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented despite being declared required."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: listed tools leave the live FrameFlick UI unchanged when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "mechanics_exclusions_faked_via_webmcp"
description = "WebMCP is used to fake success for mechanics-excluded paths (drag-to-reposition, drag-and-drop upload, Download PNG rasterization / Copy image clipboard, Collaboration merge convergence, or raw file path/blob args) instead of leaving those Playwright-only."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_style_json_export_import_copy"
description = "Artifact operations export, import, and copy work for style-json (and export for png is declared): invoking artifact export/copy updates the same Export preview / confirmation path as the visible Download style JSON and Copy style JSON controls with the documented RenderSettings keys including watermarkColor; import applies style settings like Import style JSON and rejects field-contract-invalid payloads the same way."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n11"
name = "artifact_export_omits_live_style"
description = "Artifact export/copy for style-json succeeds while the returned/visible recipe omits live canvas settings the UI just changed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
