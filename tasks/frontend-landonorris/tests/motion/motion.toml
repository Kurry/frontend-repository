[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "On the real page load the lime LOAD NORRIS preloader animates out to reveal the page and does not stay covering content"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Clicking the hamburger animates the dark-green overlay open from a clipped shape to full-screen, and the X and Escape controls animate it closed"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Hovering the STORE button runs a split-text reveal where the label slides to expose a second copy"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Hovering nav or footer text links shifts their color toward lime or lime-off"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Scrolling vertically through the pinned horizontal section drives the media row sideways so later cards scroll into view"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "Hovering a helmet card scales its base image up, wipes in a masked reveal image, and turns the card index label lime"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "4_7"
description = "Hovering the social video card plays the video and fades its placeholder image from opaque to transparent, and leaving the card pauses and restores the placeholder"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "4_8"
description = "The collaborator and footer partner marquees scroll continuously once their strip is in view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.9"
name = "4_9"
description = "The impact statement and footer statement fill their characters into the highlight color in sequence when scrolled into view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "4_10"
description = "Under prefers-reduced-motion reduce the page settles immediately, the preloader clears, and the continuous marquees do not run"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.11"
name = "4_11"
description = "The menu overlay snaps open or closed with no transition, or the hamburger does not open it at all"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.12"
name = "4_12"
description = "The social video card does not play on hover or its placeholder image never fades away"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.13"
name = "4_13"
description = "Interactive chrome and cards give no hover feedback so the page feels static under the pointer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.14"
name = "4_14"
description = "On the real hamburger click the menu overlay transitions clip-path and visibility over 0.75s on cubic-bezier(0.65, 0.05, 0, 1), with getAnimations reporting a 750ms duration"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "4_15"
description = "The collaborator and footer marquees use a 30s linear infinite keyframe animation that is play-state paused until the strip scrolls into view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.16"
name = "4_16"
description = "The social video placeholder fades via a 0.3s opacity transition on hover"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.17"
name = "4_17"
description = "The menu overlay opens with no clip-path transition or a duration far from 0.75s so it snaps rather than animating"
type = "binary"
weight = 0.5
negate = true
optional = true
