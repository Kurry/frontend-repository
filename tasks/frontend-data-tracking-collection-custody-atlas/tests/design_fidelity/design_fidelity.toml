[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "verify_span_evidence"
name = "verify_span_evidence"
description = "Span evidence correctly represents exact source documents."
type = "binary"
weight = 1.0

[[criterion]]
id = "verify_provenance_intervals"
name = "verify_provenance_intervals"
description = "Provenance intervals correctly exhibit collection time semantics."
type = "binary"
weight = 1.0

[[criterion]]
id = "verify_region_geometry"
name = "verify_region_geometry"
description = "Region geometry matches the required physical layout exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "verify_case_rules"
name = "verify_case_rules"
description = "Case rules enforce collection semantics (weight, adjacency, lighting) exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "verify_exposure_and_manifest"
name = "verify_exposure_and_manifest"
description = "Exposure accumulation and manifest custody records exhibit exact simulated collection constraints."
type = "binary"
weight = 1.0

[[criterion]]
id = "verify_csv_svg_markdown"
name = "verify_csv_svg_markdown"
description = "Exported CSV, SVG, and Markdown artifacts exactly mirror the on-screen catalog, placement, and loan semantics."
type = "binary"
weight = 1.0
