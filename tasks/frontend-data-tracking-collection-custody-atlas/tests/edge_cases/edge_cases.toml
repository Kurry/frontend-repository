[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "overlapping_gap_intervals"
name = "overlapping_gap_intervals"
description = "The system correctly enforces constraints against incompatible overlapping provenance intervals and allows explicit gaps."
type = "binary"
weight = 1.0

[[criterion]]
id = "unsupported_assertion"
name = "unsupported_assertion"
description = "Unsupported assertions remain visible and block certification until evidence is provided."
type = "binary"
weight = 1.0

[[criterion]]
id = "region_bounds"
name = "region_bounds"
description = "Condition region drawings are strictly constrained within exact boundaries of the object outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "exact_placement_rules"
name = "exact_placement_rules"
description = "Placements in exhibit cases enforce exact weight limits, light sensitivity, adjacency rules, and label clearance."
type = "binary"
weight = 1.0

[[criterion]]
id = "exposure_rest_threshold"
name = "exposure_rest_threshold"
description = "Rotation schedules strictly enforce maximum continuous and cumulative exposure thresholds and rest requirements."
type = "binary"
weight = 1.0

[[criterion]]
id = "stale_inspection"
name = "stale_inspection"
description = "An object with a stale condition review is blocked from entering display or loan states."
type = "binary"
weight = 1.0

[[criterion]]
id = "seal_checksum_mismatch"
name = "seal_checksum_mismatch"
description = "A custody transfer with a seal or checksum mismatch is strictly blocked and requires a manifest revision."
type = "binary"
weight = 1.0

[[criterion]]
id = "missing_object_rollback"
name = "missing_object_rollback"
description = "If an object is missing from a received manifest, users can roll back the transfer idempotently without duplicating custody events."
type = "binary"
weight = 1.0

[[criterion]]
id = "forged_import_recovery"
name = "forged_import_recovery"
description = "Forged imports with invalid checksums, overlapping intervals, or mismatched rules are atomically rejected with named recovery."
type = "binary"
weight = 1.0
