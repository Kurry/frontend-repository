[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "After a source edit the preview updates in place without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "On a syntax error the preview transitions to a visibly dimmed state and returns to full opacity once the source is valid again"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Clicking the header theme toggle recolors the surfaces and the rendered diagram together"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Buttons and editor tabs take a hover wash and show a visible focus ring on keyboard focus, with the active tab reading as a distinct state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Interactive buttons, tabs, and sample controls show no hover or focus feedback, appearing visually inert on pointer and keyboard interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "Switching samples or toggling the theme triggers a full page reload or navigation instead of an in-place update"
type = "binary"
weight = 0.5
negate = true
optional = true
