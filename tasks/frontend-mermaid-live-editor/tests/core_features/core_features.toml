[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens directly into a diagram-editing workspace (no auth wall) with a header reading Mermaid Live Editor, a source editor on the left, and a live diagram preview on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the source editor is seeded with a non-empty Mermaid flowchart (default includes an A[Christmas] node) and the preview renders that diagram, so both panes are non-empty before any interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After typing new Mermaid syntax into the source editor, the editor displays exactly the newly entered syntax"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After editing the source, the preview re-renders so the rendered diagram reflects the latest source edit rather than a cached earlier diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After making two source edits in sequence, the preview shows only the most recent source, not the intermediate one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When invalid Mermaid syntax is entered, an inline error region with a Syntax error heading appears and the preview visibly dims while keeping the last valid render"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After correcting invalid syntax back to valid, the error region clears and the corrected diagram renders"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When a Sample diagrams button (Flowchart, Class, Sequence, Entity Relationship, State, Mindmap) is clicked, the source is replaced and the preview re-renders as that diagram type with no residual marks from the prior diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After switching diagram types, the header diagram-type badge updates to name the current diagram type"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When the SVG action is clicked, a file downloads whose name identifies it as a Mermaid diagram and ends in the .svg extension (pattern mermaid-diagram-YYYY-MM-DD-HHmmss.svg)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When the theme toggle in the header is clicked, the app switches between light and dark and the rendered preview recolors with the theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When the editor Config tab is selected, the text area swaps to the Mermaid JSON config document without a full page reload, and selecting Code returns to the diagram source"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After editing the source and reloading the page, the last-edited source, active tab, and theme are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "Throughout editing, sample switching, and export, no control navigates away from the workspace and no console error or unhandled rejection is thrown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "The app opens directly into a diagram-editing workspace (no auth wall) with a source editor and a live diagram preview clearly presented as one linked pair"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "On first load the source editor is seeded with a non-empty Mermaid diagram and the preview renders it, so both panes are non-empty before any interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Typing new Mermaid syntax into the source editor makes the editor display exactly the newly entered syntax"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "After a source edit the preview re-renders so the rendered diagram reflects the latest source rather than a cached earlier diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "After two source edits in sequence the preview shows only the most recent source, not the intermediate diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Entering invalid Mermaid syntax surfaces an inline error region with a Syntax error heading and the parser message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Correcting invalid syntax back to valid clears the error region and renders the corrected diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Clicking a Sample diagrams button (Flowchart, Class, Sequence, Entity Relationship, State, Mindmap) replaces the source and re-renders the preview as that diagram type with no residual marks from the prior diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "A header badge names the current diagram type and updates when the diagram type changes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "1_24"
description = "Clicking SVG downloads a file whose name identifies it as a Mermaid diagram and ends in the .svg extension (pattern mermaid-diagram-YYYY-MM-DD-HHmmss.svg)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The editor offers Code and Config tabs; switching swaps which document the text area edits without a full page reload"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Export and copy controls are unavailable while the source is in a syntax-error state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "The primary screen is a static scaffold, starter template, or unrelated dashboard rather than a working diagram source editor with preview"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "Editing the source leaves the preview unchanged, or the preview shows a fixed image regardless of the source text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "The SVG export produces a file with a generic name or a wrong extension that does not end in .svg"
type = "binary"
weight = 0.5
negate = true
optional = true
