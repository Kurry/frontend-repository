[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The layout gives primary visual emphasis to the source editor and preview over header chrome and secondary metadata"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The controls that edit the source are visually grouped with the editor they affect, and export controls are grouped in their own Actions panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The editor and preview panes read as a coherent pair, with the source, diagram type, rendered marks, and export state presented consistently"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "Light and dark themes both keep the header, editor, panels, preview, and rendered diagram legible with adequate contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The source editor uses a monospace text area with a clearly distinguished active tab between Code and Config"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "At a 375px-wide viewport the editor and preview reflow into a single readable column with no clipped text or overlapping controls and no horizontal page scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The editor and preview render at equal visual weight with no clear focal area, or the diagram-editing surface is buried under unrelated chrome"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "A single flat text size is used everywhere with no distinguishable type hierarchy between the heading, editor, and panel labels"
type = "binary"
weight = 0.5
negate = true
optional = true
