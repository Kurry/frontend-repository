schema_version = "1.3"

[task]
name = "mercor-intelligence/frontend-material-theme-studio"
description = "Material theme design studio variant."

[agent]
timeout_sec = 3600.0

[agent.env]
CLAUDE_FORCE_OAUTH = "1"
CLAUDE_CODE_OAUTH_TOKEN = "${CLAUDE_CODE_OAUTH_TOKEN}"

[verifier]
timeout_sec = 14400.0

[verifier.env]
OPENAI_API_KEY = "${OPENAI_API_KEY}"
REWARDKIT_MODEL = "${REWARDKIT_MODEL:-}"

[environment]
workdir = "/app"
build_timeout_sec = 1200.0
memory_mb = 8192
cpus = 4

[[artifacts]]
source = "/app"
destination = "app"
exclude = [
    "node_modules",
    ".git",
    ".DS_Store",
    "dist",
    "build",
    "out",
    ".next",
    ".nuxt",
    ".svelte-kit",
    "storybook-static",
    ".cache",
    ".vite",
    ".turbo",
    ".parcel-cache",
    ".pnpm-store",
    ".yarn",
    ".npm",
    "coverage",
    "playwright-report",
    "test-results",
]
