[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/app/webmcp_stdio_server.mjs"]

[[judge.mcp_servers]]
name = "system"
command = "node"
args = ["/app/packages/webmcp/dist/index.js", "system"]

[[judge.mcp_servers]]
name = "browser"
command = "node"
args = ["/app/packages/webmcp/dist/index.js", "browser", "chromium"]

[schema]
version = 1

[[criterion]]
id = "motion.catchall"
title = "Motion not covered"
description = "Motion features are not covered by any specific criterion but lack evidence."
type = "behavioral"
polarity = "negative"
weight = 1

[[criterion]]
id = "motion.causal_motion"
title = "Motion connects state changes"
description = "Motion connects the acted-on item to its new state (e.g. morphing a resolved record) and has a reduced-motion equivalent."
type = "behavioral"
polarity = "negative"
weight = 1
