[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
command = "node"
args = ["/app/webmcp_stdio_server.mjs"]

[[judge.mcp_servers]]
name = "system"
command = "node"
args = ["/app/packages/webmcp/dist/index.js", "system"]

[[judge.mcp_servers]]
name = "browser"
command = "node"
args = ["/app/packages/webmcp/dist/index.js", "browser", "chromium"]

[schema]
version = 1

[[criterion]]
id = "core_features.catchall"
title = "Core features not covered"
description = "Core features are not covered by any specific criterion but lack evidence."
type = "behavioral"
polarity = "negative"
weight = 1

[[criterion]]
id = "core_features.signature_mutation"
title = "Recovery Board resolves conflict states"
description = "moving a failed record into a recovery path and repairing its downstream consequences updates the primary record, linked view, and status together."
type = "behavioral"
polarity = "negative"
weight = 1

[[criterion]]
id = "core_features.linked_views"
title = "Linked views update immediately"
description = "Edits in the desktop primary surface immediately update the mobile preview, charts, and timing notes without layout jumps or network dependence."
type = "behavioral"
polarity = "negative"
weight = 1
