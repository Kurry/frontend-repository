[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable studio: Themes list, token editor, and live preview remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, theme rows, Hold to add theme, Remove, Random, Export, Undo/Redo, Import, radius/size selectors, Depth/Noise toggles, preview tabs, and chrome dropdown triggers present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "studio_typography_readable_both_widths"
description = "Chrome labels, editor section headings, and theme row names remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width the Themes list, editor controls, and live preview do not clip content or overflow the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "navbar_chrome_usable_at_narrow_widths"
description = "The top navbar chrome remains visible at narrow widths and its version, theme, and language dropdowns remain usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_width_stacks_three_panels"
description = "Below desktop width the three-panel workspace stacks toward a single column with Themes, editor, and live preview in a logical order — all still reachable without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_theme_and_token_controls_tappable"
description = "At 375px width, tap/click activation works on theme rows, Hold to add theme, swatch pickers, and preview tabs (touch-equivalent pointer activation succeeds)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "preview_and_swatch_grids_resize"
description = "Live preview compositions and Color Palette swatch grids size responsively to fit the stacked layout at 375px without overflowing."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "sticky_navbar_remains_accessible"
description = "The sticky top navbar chrome and its interactive controls remain accessible at both 1440px and 375px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_common_breakpoints"
description = "The Themes | editor | preview layout breaks or overflows at 1440px or 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px width, theme rows, Hold to add theme, Remove, or chrome dropdown triggers are too small or misaligned for reliable tapping."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_mobile"
description = "Theme names, editor labels, or chrome text are too small to read at 375px width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px width, Themes, editor, or preview content is cropped or unnecessary scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "themes_panel_missing_at_narrow_width"
description = "At narrow widths the Themes list or editor panel is unresponsive or missing while still required for the flow."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "sticky_navbar_obscures_workspace"
description = "The sticky top navbar obscures theme rows, editor controls, or preview content at some viewport size with no way to reach the covered controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "stacked_panels_overlap_unusable"
description = "At 375px width, stacked Themes/editor/preview panels overlap so controls cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_mobile_controls_untappable"
description = "At 375px width, required theme selection, Hold to add theme, or preview tab controls cannot be activated by tap/click."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_preview_overflows"
description = "The live preview composition or Color Palette grid uses a static width that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_narrow_sizes"
description = "Hold to add theme, Remove, Random, CSS, or chrome dropdowns disappear at 375px while still required."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "artifact_import_contrast_usable_at_375"
description = "At 375px width the Artifact center, contrast matrix, Import panel, and color pickers stay fully visible and operable rather than rendering off-screen or requiring horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n20"
name = "artifact_center_clipped_on_mobile"
description = "At 375px width the Artifact center or Import panel clips Copy/Download/Apply controls or overflows the viewport horizontally."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
