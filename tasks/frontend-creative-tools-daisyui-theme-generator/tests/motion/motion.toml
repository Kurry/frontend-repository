[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hold_to_add_progress_motion"
description = "Through the real pointer path, holding Hold to add for about three seconds visibly fills its inset progress before success, releasing early visibly cancels/reset the fill, and successful completion gives the new My themes row a brief scale/fade entrance"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "preview_retheme_easing"
description = "Through real token controls and preview tabs, changing a token and then switching tabs causes preview chrome and background colors to ease smoothly between states without a snap, flash, or full reload"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "random_icon_rotation"
description = "Clicking Random through its real button changes the active tokens, eases the preview to the new colors, and advances the Random icon with a short rotate on each click"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "missing_hover_feedback"
description = "Theme rows, swatch chips, chrome controls, buttons, or compact selectors remain visually static on real pointer hover and press where the instruction requires a short wash or fill/border transition"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.5"
name = "editor_control_state_motion"
description = "Using the real editor controls reveals a color picker, changes radius and size buttons to an active fill/border, and slides Depth and Noise toggles between on and off with visible state feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "hover_focus_dropdown_and_copy_motion"
description = "Real hover over the announcement, chrome controls, theme rows, chips, buttons, and radius/size selectors produces short 0.15–0.2s-style feedback; dropdowns open with brief opacity/scale, keyboard focus is visible, and Copy shows a short confirmation that resets"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "motion_layout_jank"
description = "A required hold, row entrance, Random rotate, control-state change, token re-theme, tab change, dropdown, or copy-confirmation animation visibly flickers, shifts unrelated layout, blocks input, or ends in an incorrect visual state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.8"
name = "remove_row_exit_motion"
description = "Removing a custom theme through its real Remove control animates the row out of the My themes list rather than snapping it away instantly"
type = "binary"
weight = 1.0


[[criterion]]
id = "4.9"
name = "before_after_crossfade"
description = "Through the real Before/After compare toggle, the preview transitions with a brief crossfade rather than a hard cut between snapshot and live edit"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "artifact_center_enter_exit_motion"
description = "Opening and closing the Artifact center through its real Export control uses a brief opacity/scale transition, and Copy shows a short confirmation that resets"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "reduced_motion_keeps_flows"
description = "With prefers-reduced-motion set, hold-to-add, row enter/exit, compare crossfade, and Artifact center transitions reduce to instant changes while hold-to-add, undo, import, and export remain completable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n2"
name = "colorblind_filter_snaps_harshly"
description = "Changing the Color blindness filter snaps the preview with a harsh flash or layout jump instead of a short ease on the preview surface"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteraction quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (real control path, animated element, timing, or resulting state) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
