[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seeded defaults: complete Hold to add theme, rename it, edit a primary color, save a snapshot, switch preview to Color Palette, open Artifact center, then reload without a theme= hash. Confirm every facet coherently resets — 35 built-ins, My themes empty, no snapshots, empty undo/redo, Color blindness None, default theme, Components Demo — never a partial mix."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "builtin_select_reversal_proves_live_tokens"
description = "Selection-reversal proof (genre stand-in for sort reversal): select built-in 'cupcake' and note editor swatches and preview colors, select 'dracula' and confirm tokens change, then re-select 'cupcake'. Confirm cupcake's original unmodified tokens return in editor and preview — proving tokens are derived from live theme data, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "token_and_tab_derived_preview_sensitivity"
description = "Derived-view sensitivity: with a custom theme active, change primary color, then switch preview from Components Demo to Color Palette and back. Confirm the preview surfaces change meaningfully for each input (new primary color visible; Color Palette grid reflects the edit) rather than redrawing identically regardless of token/tab input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "name_edit_echoes_in_list_and_css_export"
description = "Cross-view echo: with a custom theme active, type a new name in the editor Name field. Confirm the same My themes row label and the theme name in the CSS, JSON, and Config artifact texts update to that name without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "hold_to_add_count_delta_exact"
description = "Count-delta integrity: measure the visible My themes row count, complete one Hold to add theme (~3s), and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_colors_different_preview_and_export"
description = "Input-dependent output: on a custom theme, set primary to a clearly red value and note preview plus Artifact center CSS/JSON; then set primary to a clearly blue value. Confirm the two outcomes differ in preview chrome and artifact texts in the ways the inputs dictate (not byte-identical)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_fork_and_tab_flows"
description = "Interleaved-flow integrity: select a built-in and start a color edit that forks a custom copy, switch the preview tab to Component Variants, return and rename the forked theme; confirm the fork remains active with the edited token, the tab switch did not drop the custom theme, and the original built-in still shows unmodified tokens when re-selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_my_themes"
description = "Edge-state round-trip: remove every custom theme (My themes empty state visible; 35 built-ins remain), then complete Hold to add theme twice; confirm the empty state clears, both new rows appear, and editor/preview track the newly active custom theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After creating a custom theme, editing tokens, and switching preview tabs then reloading without a theme= hash, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "preview_identical_across_different_tokens"
description = "Changing primary/secondary colors or radius/size tokens across clearly different values leaves the live preview and CSS export visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_themes_apply_identical_tokens"
description = "Selecting two built-in themes that declare different color tokens (for example cupcake vs dracula) yields identical editor swatches and preview colors."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "list_or_export_stale_until_reload"
description = "After renaming a custom theme or editing a token, My themes row labels, live preview, or CSS export still show stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.9"
name = "import_export_round_trip_probe"
description = "Export a custom theme as JSON after distinctive token edits, remove the theme, import that JSON, and confirm editor swatches, preview colors, contrast badges, and all three artifact formats reconstruct the exported values without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_restores_then_redo_reapplies"
description = "Edit a primary color so preview and artifact text change, Undo once and confirm all dependent surfaces revert together, then Redo and confirm they all match the edited values again."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "artifact_identical_after_divergent_edits"
description = "Two clearly different primary-color edits leave the Artifact center CSS/JSON/Config texts byte-identical — export ignoring session inputs."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.11"
name = "declared_theme_schema_round_trip_probe"
description = "Set distinctive valid contract values (primary #RRGGBB, radius.box enum, size.field enum, border enum, depth, fontFamily, darkColorScheme), export JSON, remove the theme, Import that JSON: confirm editor swatches, preview, Options toggle, and all three Artifact formats reconstruct those exact field values and hex/enum strings without reload, with CSS data-theme equal to JSON name."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "valid_create_matches_request_body_contract"
description = "After creating or editing a custom theme with a valid name and distinctive tokens, the Artifact center JSON tab shows a would-be request body whose name, colors.#RRGGBB values, radius/size/border enums, depth/noise, fontFamily, and options match the editor controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n6"
name = "import_accepts_contract_violations"
description = "Import accepts JSON missing a required colors key, carrying a non-#RRGGBB color / out-of-enum radius/size/border, or defaultDarkTheme true with darkColorScheme false, and still mutates My themes or the active theme."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
