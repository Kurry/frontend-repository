[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "theme_studio_controls_keyboard_operable"
description = "Every theme row, color swatch picker, radius and size selector, Depth/Noise toggle, preview tab, Hold to add theme, Remove, Undo/Redo, Artifact center controls, Import, snapshot rows, Color blindness filter, Font family control, and chrome dropdown is reachable and operable with the keyboard alone, each showing a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "chrome_dropdown_and_swatch_escape_returns_focus"
description = "Opening a chrome dropdown, color swatch picker, or the Artifact center moves focus into that overlay; pressing Escape closes it and returns focus to the control that opened it; the Artifact center traps focus while open (dialog semantics)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "theme_swatch_chips_have_accessible_names"
description = "Each theme row's four-swatch color preview exposes an accessible name or equivalent so assistive technology can identify the theme's color preview, not an unlabeled decorative cluster."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "copied_confirmation_uses_aria_live"
description = "After Copy on the Artifact center, the brief copied confirmation is announced through an aria-live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "name_field_explicitly_labeled"
description = "The editor Name field (placeholder 'mytheme') uses an explicit label element associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "panel_headings_follow_logical_order"
description = "Headings in the Themes panel, token editor sections (Change Colors, Radius, Sizes, Options), and preview chrome follow a logical order with no skipped levels."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "studio_landmarks_present"
description = "The three-panel workspace exposes semantic landmarks (for example nav for site chrome and main for the themes/editor/preview workspace) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "chrome_and_editor_contrast_in_default_theme"
description = "Text and controls in the site chrome and editor panels keep readable contrast against their surfaces in the default theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_buttons_for_studio_controls"
description = "Theme rows, Hold to add theme, Remove, Random, CSS, Copy, radius/size selectors, Depth/Noise toggles, preview tabs, and chrome dropdown triggers are exposed as buttons or equivalent interactive roles — not unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected_for_theme_studio"
description = "With prefers-reduced-motion set, Hold-to-add progress, My themes row enter/exit, Random icon rotate, dropdown open, and preview re-theme easing are removed or instant while every control remains operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "contrast_badges_not_color_only"
description = "Contrast matrix AA/AAA results are exposed as readable text (or equivalent accessible name), not conveyed by color alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "import_validation_accessible"
description = "Import validation messages for malformed or incomplete declared-theme JSON (missing required keys, non-#RRGGBB colors, out-of-enum radius/size/border/fontFamily, or defaultDarkTheme/darkColorScheme cross-field failures) are rendered in the DOM as text associated with the import control naming the offending field, not only as a color change."
type = "binary"
weight = 1.0

