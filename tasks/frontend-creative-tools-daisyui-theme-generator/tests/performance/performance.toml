[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the theme generator becomes interactive (theme rows and editor controls respond) within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No uncaught console errors appear during a full exercise of theme selection, token edits, preview tab switches, Hold-to-add create, rename, remove, Random, undo/redo, snapshot, import, and Artifact center export/copy/download."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "token_edit_rethemes_immediately"
description = "Changing a color, radius, size, effect, or font control re-themes the live preview and refreshes the Artifact center and contrast matrix immediately with no visible lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "studio_chrome_visible_on_load"
description = "While the app settles after load, the sticky navbar and three-panel workspace remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "thirty_five_themes_list_scrolls_smoothly"
description = "With all 35 built-in themes listed in the Themes panel, scrolling the list and selecting rows shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_preview_retheme"
description = "During live-preview re-theme easing after a token or tab change, theme rows, editor controls, and tabs remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_retheme_holds_stable_frame_rate"
description = "Driven through real token controls, preview chrome/background color easing maintains a smooth frame rate without visible hitching during continuous swatch or radius changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_token_edits_never_hang"
description = "Rapid repeated token edits (dragging through a color picker, clicking several radius options in quick succession) keep the UI responsive with no hangs, and every edit lands on the preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_theme_editing_avoids_resource_runaway"
description = "An extended session of selecting themes, forking, Random clicks, and token edits shows no runaway browser resource use that freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "malformed_hash_load_stays_responsive"
description = "Loading a malformed theme= hash falls back to the seeded default without hanging the UI or leaving a blank non-interactive page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "rapid_undo_redo_stays_responsive"
description = "Rapid repeated undo/redo after a burst of token edits keeps the UI responsive with no hangs, and every surface settles on a coherent token set."
type = "binary"
weight = 1.0

