[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the theme generator becomes interactive (theme rows and editor controls respond) within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No uncaught console errors appear during a full exercise of theme selection, token edits, preview tab switches, Hold-to-add create, rename, remove, Random, undo/redo, snapshot, import, and Artifact center export/copy/download."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "token_edit_rethemes_immediately"
description = "Changing a color, radius, size, effect, or font control re-themes the live preview and refreshes the Artifact center and contrast matrix immediately with no visible lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "studio_chrome_visible_on_load"
description = "While the app settles after load, the sticky navbar and three-panel workspace remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "thirty_five_themes_list_scrolls_smoothly"
description = "With all 35 built-in themes listed in the Themes panel, scrolling the list and selecting rows shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_preview_retheme"
description = "During live-preview re-theme easing after a token or tab change, theme rows, editor controls, and tabs remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_retheme_holds_stable_frame_rate"
description = "Driven through real token controls, preview chrome/background color easing maintains a smooth frame rate without visible hitching during continuous swatch or radius changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_token_edits_never_hang"
description = "Rapid repeated token edits (dragging through a color picker, clicking several radius options in quick succession) keep the UI responsive with no hangs, and every edit lands on the preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_theme_editing_avoids_resource_runaway"
description = "An extended session of selecting themes, forking, Random clicks, and token edits shows no runaway browser resource use that freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "malformed_hash_load_stays_responsive"
description = "Loading a malformed theme= hash falls back to the seeded default without hanging the UI or leaving a blank non-interactive page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before theme rows or editor controls become interactive on a local cold load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_theme_flows"
description = "Uncaught console errors appear during theme selection, token edits, tab switches, create, rename, remove, or export flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "token_edit_or_tab_transition_lags"
description = "Token edits or preview tab switches visibly lag or block interaction for a noticeable delay after the control is activated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "hold_or_export_hangs_ui"
description = "Hold-to-add progress or CSS export/copy causes the UI to hang or freeze until the action finishes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "theme_list_scroll_kills_frame_rate"
description = "Scrolling or selecting among the 35 built-in themes kills the frame rate or makes the Themes panel unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "retheme_animation_blocks_input"
description = "Input to theme rows or editor controls becomes unresponsive while preview re-theme easing runs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering of Themes/editor/preview while fonts or local assets finish loading, leaving a blank workspace."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory leaks or runaway browser resource usage occur during repeated Random clicks or continuous color-picker dragging."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed while the app loads — no navbar chrome and no three-panel workspace skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes or whitescreens under rapid radius clicking, continuous swatch dragging, or malformed theme= hash load."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "9.11"
name = "rapid_undo_redo_stays_responsive"
description = "Rapid repeated undo/redo after a burst of token edits keeps the UI responsive with no hangs, and every surface settles on a coherent token set."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n20"
name = "artifact_refresh_lags_token_edits"
description = "After a token edit, the Artifact center or contrast matrix remains visibly stale for a noticeable lag while the preview has already updated — derived surfaces falling behind."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
