[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "editor_entity_and_artifact_modules_bound"
description = "All three contract-mandated modules are initialized and bound: structured-editor-v1, entity-collection-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with editor_*, entity_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_theme_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor, entity, and artifact operations change the same theme list, editor tokens, preview, and Artifact center state the Themes/editor/export controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_theme_operations"
description = "Only documented operations from the bindings are available: editor select/update_property/preview on theme with modes edit/compare; entity create/select/update/delete on theme; artifact export/import/copy/convert with formats css/json/config — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound editor, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_theme_create_select_update_delete"
description = "Entity operations declared for entity 'theme' work: create, select, update (fields name and tokens), and delete (with confirm=true) update the visible My themes list and active theme state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_theme_select_update_preview"
description = "Editor operations declared for object type 'theme' work: select, update_property (properties color, radius, font), and preview update the visible editor and live preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_export_import_copy_bound"
description = "Artifact operations from the bindings — export, import, copy, and convert — with export formats css, json, and config, import mode declared-theme, and conversion modes css-to-json / json-to-config are bound and invoke without throwing when called through WebMCP."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond structured-editor-v1, entity-collection-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound editor/entity/artifact tool leaves My themes, editor tokens, live preview, or CSS export diverging from what the equivalent visible UI control would produce."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or entity operations beyond the Bindings (editor select/update_property/preview with modes edit/compare; entity create/select/update/delete; artifact export/import/copy/convert with formats css/json/config) are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared editor, entity, and artifact bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mcp_update_bypasses_shared_state"
description = "An editor update_property, entity update, or artifact export invocation updates a parallel copy of state, leaving visible Themes/editor/preview showing stale values that disagree with the MCP result (MCP/UI desync)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_not_implemented"
description = "structured-editor-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave theme list/editor/preview state unchanged when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "mechanics_exclusion_faked_via_mcp"
description = "Color-picker drag gestures or raw file path / base64 blobs are faked solely through WebMCP as a success path, bypassing the Playwright-observed mechanics exclusions."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "12.11"
name = "editor_modes_edit_and_compare"
description = "Editor modes edit and compare from the bindings are bound; switching compare via the contract updates the same Before/After preview state the visible compare toggle uses."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_export_covers_config_format"
description = "Invoking artifact export with format config (or convert json-to-config) succeeds without throwing and leaves the visible Artifact center Config tab reflecting the active theme's session tokens."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n11"
name = "mcp_export_omits_session_tokens"
description = "An artifact export/copy via WebMCP reports success while the visible Artifact center still omits the session's edited color/radius/font tokens."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract deviates from its declaration in a way not covered by any other criterion in this file. 'Significant' means a real automation/contract break, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
