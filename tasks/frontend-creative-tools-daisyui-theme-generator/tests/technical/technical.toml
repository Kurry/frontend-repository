[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "coherent_shared_theme_state"
description = "A theme change made in one visible surface is reflected immediately and consistently in the theme row, editor controls, every preview tab, URL hash, and CSS export without reload or stale duplicate values"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "in_memory_reload_rule"
description = "After changing custom collection state, active theme, editor tokens, preview tab, and chrome preference without relying on a #theme= payload, a fresh baseline load resets all those in-memory facets coherently rather than retaining a partial mixture"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "forbidden_browser_storage"
description = "After exercising create, rename, token editing, tab selection, and chrome-theme controls, localStorage, sessionStorage, IndexedDB, or another browser persistence store contains app theme or editor state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "cross_surface_state_desync"
description = "The same active theme datum shows conflicting values across the theme list, editor, preview, URL hash, or export surface during a normal interaction flow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "local_asset_network_hygiene"
description = "From a fresh load through representative theme editing, dropdown, icon, dialog, and animation interactions, the network log shows only same-origin app assets and same-document #theme= updates, with no CDN-hosted styles, scripts, icons, fonts, or product fetches"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "console_clean_full_flow"
description = "No console errors or unhandled promise rejections appear from first load through create, rename, token edit, preview-tab switch, Random, CSS/copy, hash-load, and remove flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "inline_form_validation_runtime"
description = "Theme create, rename, and token form controls expose visible field-level validation before invalid submission can mutate theme state, and correcting the field clears the error and permits the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "accessible_interactive_controls"
description = "Chrome menus, segmented tabs, toggles, toast feedback, and the CSS export surface are keyboard-operable through their visible controls, with focus remaining visibly trackable through the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "hash_round_trip_coherence"
description = "After changing independent facets—theme name and at least one color, radius, size, and effect token—opening the generated #theme= URL in a fresh page restores all payload-defined values coherently on first paint while unrelated in-memory facets follow their baseline rule rather than partially persisting"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "external_runtime_dependency"
description = "The app requires an outbound CDN or other external origin to obtain styling, icons, fonts, scripts, or product content, causing a missing or degraded interface when that request is blocked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.11"
name = "runtime_exception_or_broken_load"
description = "A normal instructed interaction produces a console exception, blank pane, frozen control, or full-page navigation that breaks the single-page editing session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.12"
name = "malformed_hash_fallback"
description = "Loading the app with a malformed or undecodable #theme= hash payload renders the seeded default theme with the full workspace usable and no uncaught console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "escape_closes_and_returns_focus"
description = "Pressing Escape while a chrome dropdown or a color swatch picker is open closes it and returns keyboard focus to the control that opened it"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.14"
name = "copy_confirmation_announced"
description = "The copied confirmation after the CSS export Copy action is exposed through an aria-live region in the DOM in addition to its visible feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.15"
name = "interactive_cold_load_budget"
description = "On a local cold load the app renders its three-panel workspace and responds to a first interaction (selecting a theme row) within roughly 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "rapid_edits_stay_responsive"
description = "Rapid repeated token edits, such as clicking through several radius and size options in quick succession, keep the editor and preview responsive with no hangs, dropped updates, or frozen controls"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick or unverifiable implementation preference. If present, name the defect and cite the concrete browser evidence (console entry, network request, storage entry, runtime state, or interaction result) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
