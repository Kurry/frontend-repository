[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "coherent_shared_theme_state"
description = "A theme change made in one visible surface is reflected immediately and consistently in the theme row, editor controls, every preview tab, contrast matrix, URL hash, and all three Artifact center formats without reload or stale duplicate values"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "in_memory_reload_rule"
description = "After changing custom themes, tokens, preview tab, snapshots, undo history, color-blindness filter, and chrome preference without a #theme= payload, a fresh baseline load resets all those in-memory facets coherently rather than retaining a partial mixture"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "local_asset_network_hygiene"
description = "From a fresh load through representative theme editing, dropdown, icon, dialog, and animation interactions, the network log shows only same-origin app assets and same-document #theme= updates, with no CDN-hosted styles, scripts, icons, fonts, or product fetches"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "console_clean_full_flow"
description = "No console errors or unhandled promise rejections appear from first load through create, rename, token edit, preview-tab switch, Random, undo/redo, snapshot, import, Artifact center copy/download, hash-load, and remove flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "inline_form_validation_runtime"
description = "Theme create, rename, and token form controls expose visible field-level validation before invalid submission can mutate theme state, and correcting the field clears the error and permits the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "accessible_interactive_controls"
description = "Chrome menus, segmented tabs, toggles, toast feedback, and the CSS export surface are keyboard-operable through their visible controls, with focus remaining visibly trackable through the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "hash_round_trip_coherence"
description = "After changing independent facets—theme name and at least one color, radius, size, and effect token—opening the generated #theme= URL in a fresh page restores all payload-defined values coherently on first paint while unrelated in-memory facets follow their baseline rule rather than partially persisting"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "malformed_hash_fallback"
description = "Loading the app with a malformed or undecodable #theme= hash payload renders the seeded default theme with the full workspace usable and no uncaught console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "escape_closes_and_returns_focus"
description = "Pressing Escape while a chrome dropdown or a color swatch picker is open closes it and returns keyboard focus to the control that opened it"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.14"
name = "copy_confirmation_announced"
description = "The copied confirmation after the CSS export Copy action is exposed through an aria-live region in the DOM in addition to its visible feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.15"
name = "interactive_cold_load_budget"
description = "On a local cold load the app renders its three-panel workspace and responds to a first interaction (selecting a theme row) within roughly 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "rapid_edits_stay_responsive"
description = "Rapid repeated token edits, such as clicking through several radius and size options in quick succession, keep the editor and preview responsive with no hangs, dropped updates, or frozen controls"
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "2.18"
name = "import_export_shared_state_contract"
description = "Importing a valid declared-theme JSON reconstructs the same visible theme state the JSON export produced across My themes, editor, preview, and Artifact center from shared in-memory state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "undo_shared_state_contract"
description = "Undo and redo operate on the same shared state the views render from, so editor, preview, contrast badges, and artifact text revert or reapply together"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "form_validation_matches_declared_theme_schema"
description = "Theme create/rename and Import enforce the declared-theme field contract in the UI: empty, over-length (>30), or illegal-character names are rejected with inline feedback naming the name field; Import of JSON that fails required keys or closed enums (radius, size, border, depth/noise, fontFamily) or the defaultDarkTheme→darkColorScheme cross-field rule is rejected with feedback naming the offending field and does not mutate themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "export_import_share_one_schema"
description = "JSON export text and a successful Import of that same text share one declared-theme would-be request body: after Import, editor controls and all three Artifact formats show the same name, #RRGGBB colors, radius/size/border enums, depth/noise, fontFamily, and options the export contained"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "name_and_dark_scheme_cross_field_contracts"
description = "After renaming a custom theme and toggling Dark color scheme, the JSON name equals the CSS data-theme attribute value and the Config theme identifier, and options.darkColorScheme in JSON matches the Options toggle — cross-field contracts visible without reload"
type = "binary"
weight = 1.0

