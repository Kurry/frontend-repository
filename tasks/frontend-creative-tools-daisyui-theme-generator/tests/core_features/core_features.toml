[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "initial_theme_workspace"
description = "On a wide first load, the app shows the Themes sidebar, dense editor, and live-preview pane, with My themes plus exactly 35 built-in presets in the instructed order and a four-swatch chip on every theme row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_custom_theme"
description = "After creating a valid custom theme named 'Harbor Dawn' through a visible create action, My themes increases by exactly one, 'Harbor Dawn' is selected, and its name and tokens appear in both the editor and live preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_count_delta"
description = "After recording the My themes count and creating three valid, uniquely named themes through the UI, the count is exactly three greater and all three names are visible without duplicates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "token_edits_retheme_preview"
description = "Changing each kind of editable token through its visible control—a base or semantic color, radius, field or selector size, border width, depth, and noise—immediately changes the corresponding CSS-variable-driven editor state and active live-preview tab without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "rename_updates_all_surfaces"
description = "After renaming the selected custom theme to 'Evening Tide', that name replaces the old name in My themes, the editor, the live preview, and exported CSS without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "remove_custom_theme"
description = "After removing the active custom theme through the visible Remove action, My themes decreases by exactly one, the removed name disappears, and the editor and preview move to a valid remaining selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_custom_theme_state"
description = "After removing all custom themes, My themes shows an empty state while built-in catalog themes remain available"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_theme_name_validation"
description = "Submitting custom-theme creation with an empty and then a whitespace-only name leaves the My themes count unchanged both times and shows visible inline validation feedback at the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "preview_tabs_swap_content"
description = "Switching among Components Demo, Component Variants, and Color Palette swaps the preview in place: Components Demo shows the instructed filter, calendar, tab/range, product, search/form, stats/progress, orders, chat/terminal, and pricing examples, while the other tabs show variants and labelled token swatches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "theme_selection_cross_panel_sync"
description = "Selecting a different built-in or custom theme row updates the active highlight, name, color/radius/size tokens, and current live-preview tab to that same theme without reload or stale values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "random_changes_live_theme"
description = "Two successive clicks on Random produce two visibly different token sets, with the editor and active live-preview tab matching each result rather than repeating a fixed output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "complete_editor_controls"
description = "The editor exposes the mytheme Name field, base-100/200/300/base-content plus all eight semantic face/content pairs, three five-choice radius groups, Depth and Noise toggles, two xs–xl size groups, border width, three Options toggles, Reset, Random, CSS, and Remove controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "hold_to_add_success_and_cancel"
description = "Holding Hold to add theme through its approximately three-second progress completion adds exactly one selected custom theme, while a separate early-release attempt resets the progress and leaves the count unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "css_export_reflects_all_tokens"
description = "After changing a color, radius, size, border, depth, and noise value, clicking CSS exposes declarations matching all those current values, and Copy writes that CSS to the clipboard and shows a brief confirmation that resets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "share_hash_updates_and_loads"
description = "After renaming and editing the active theme, the same-document URL contains an updated #theme= payload; opening that exact URL in a fresh page applies the same name and token values to the editor and preview on first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "custom_theme_crud_coherence"
description = "A custom theme can be created, renamed, token-edited, selected away from and back to, and removed, with the list, editor, preview, export, and count reflecting each action immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "chrome_controls_stay_in_place"
description = "The chrome shows the brand, version 5.6.18, approximately 41k stars, theme and language controls, and the version 5.6 announcement; version/theme/language open dropdowns in place while brand and stars remain inert without navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "options_and_reset"
description = "Default theme, Default dark theme, and Dark color scheme can each be toggled visibly, and after multiple token edits Reset restores the active theme's prior/default values coherently in the editor, list swatches, and preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "radius_targets_preview_components"
description = "Changing box, field, and selector radii among 0rem, 0.25rem, 0.5rem, 1rem, and 2rem visibly changes the corresponding card/modal/alert, button/input/select/tab, and checkbox/toggle/badge corner groups in the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "exact_builtin_catalog"
description = "The left Themes panel lists exactly the 35 instructed built-in names from light through silk, with no missing, duplicate, or extra built-in row, and every row has a four-swatch preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "builtin_fork_and_remove_protection"
description = "Editing a built-in creates exactly one selected editable copy in My themes while the preset remains unchanged, and attempting to remove the built-in leaves it listed and surfaces a visible notice"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "color_picker_updates_css_variable"
description = "Opening a base or semantic swatch picker and choosing a different color updates the matching displayed CSS variable and immediately recolors the corresponding face or content usage in the active preview tab"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "size_effect_and_border_targets"
description = "Changing field and selector sizes across xs–xl, border width, Depth, and Noise visibly resizes, re-borders, adds/removes depth, and adds/removes noise on the appropriate preview fields and selectors"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "token_edit_preview_stays_stale"
description = "Changing a color or radius control leaves the live preview unchanged so token edits do not re-theme the preview"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.25"
name = "static_theme_controls"
description = "Saved themes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "outbound_navigation"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "create_edit_preview_export_flow"
description = "Starting from the initial My themes count: create 'Harbor Dawn', change its primary color, box radius, field size, depth, and noise, switch to Color Palette, then open CSS; the count is exactly one higher and the selected row, editor values, preview styling, palette values, URL hash, and exported declarations all agree without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "remove_all_then_repopulate_flow"
description = "Starting with at least one custom theme, remove every custom theme and observe the empty My themes state while all 35 built-ins remain, then create a valid replacement and observe the empty hint disappear, the count become one, and the replacement become active in the editor and preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in a specified core behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (control, action sequence, or resulting page state) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
