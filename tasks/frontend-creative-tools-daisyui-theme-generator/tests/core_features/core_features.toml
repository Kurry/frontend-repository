[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "initial_theme_workspace"
description = "On a wide first load, the app shows the Themes sidebar, dense editor, and live-preview pane, with My themes plus exactly 35 built-in presets in the instructed order and a four-swatch chip on every theme row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_custom_theme"
description = "After creating a valid custom theme named 'Harbor Dawn' through a visible create action, My themes increases by exactly one, 'Harbor Dawn' is selected, and its name and tokens appear in both the editor and live preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_count_delta"
description = "After recording the My themes count and creating three valid, uniquely named themes through the UI, the count is exactly three greater and all three names are visible without duplicates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "token_edits_retheme_preview"
description = "Changing each kind of editable token through its visible control—a base or semantic color, radius, field or selector size, border width, depth, and noise—immediately changes the corresponding CSS-variable-driven editor state and active live-preview tab without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "rename_updates_all_surfaces"
description = "After renaming the selected custom theme to 'Evening Tide', that name replaces the old name in My themes, the editor, the live preview, and the CSS/JSON/Config artifact texts without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "remove_custom_theme"
description = "After removing the active custom theme through the visible Remove action, My themes decreases by exactly one, the removed name disappears, and the editor and preview move to a valid remaining selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_custom_theme_state"
description = "After removing all custom themes, My themes shows an empty state while built-in catalog themes remain available"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_theme_name_validation"
description = "Submitting custom-theme creation with an empty and then a whitespace-only name leaves the My themes count unchanged both times and shows visible inline validation feedback at the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "preview_tabs_swap_content"
description = "Switching among Components Demo, Component Variants, and Color Palette swaps the preview in place: Components Demo shows the instructed filter, calendar, tab/range, product, search/form, stats/progress, orders, chat/terminal, and pricing examples, while the other tabs show variants and labelled token swatches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "theme_selection_cross_panel_sync"
description = "Selecting a different built-in or custom theme row updates the active highlight, name, color/radius/size tokens, and current live-preview tab to that same theme without reload or stale values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "random_changes_live_theme"
description = "Two successive clicks on Random produce two visibly different token sets, with the editor and active live-preview tab matching each result rather than repeating a fixed output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "complete_editor_controls"
description = "The editor exposes the mytheme Name field, base-100/200/300/base-content plus all eight semantic face/content pairs, three five-choice radius groups, Font family control, Depth and Noise toggles, two xs–xl size groups, border width, three Options toggles, Reset, Random, Export/Artifact, Undo/Redo, and Remove controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "hold_to_add_success_and_cancel"
description = "Holding Hold to add theme through its approximately three-second progress completion adds exactly one selected custom theme, while a separate early-release attempt resets the progress and leaves the count unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "css_export_reflects_all_tokens"
description = "After changing a color, radius, size, border, depth, noise, and font value, opening the Artifact center CSS tab exposes declarations matching all those current values; Copy writes that text to the clipboard with confirmation, and Download offers a real file of the same text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "share_hash_updates_and_loads"
description = "After renaming and editing the active theme, the same-document URL contains an updated #theme= payload; opening that exact URL in a fresh page applies the same name and token values to the editor and preview on first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "custom_theme_crud_coherence"
description = "A custom theme can be created, renamed, token-edited, selected away from and back to, and removed, with the list, editor, preview, export, and count reflecting each action immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "chrome_controls_stay_in_place"
description = "The chrome shows the brand, version 5.6.18, approximately 41k stars, theme and language controls, and the version 5.6 announcement; version/theme/language open dropdowns in place while brand and stars remain inert without navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "options_and_reset"
description = "Default theme, Default dark theme, and Dark color scheme can each be toggled visibly, and after multiple token edits Reset restores the active theme's prior/default values coherently in the editor, list swatches, and preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "radius_targets_preview_components"
description = "Changing box, field, and selector radii among 0rem, 0.25rem, 0.5rem, 1rem, and 2rem visibly changes the corresponding card/modal/alert, button/input/select/tab, and checkbox/toggle/badge corner groups in the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "exact_builtin_catalog"
description = "The left Themes panel lists exactly the 35 instructed built-in names from light through silk, with no missing, duplicate, or extra built-in row, and every row has a four-swatch preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "builtin_fork_and_remove_protection"
description = "Editing a built-in creates exactly one selected editable copy in My themes while the preset remains unchanged, and attempting to remove the built-in leaves it listed and surfaces a visible notice"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "color_picker_updates_css_variable"
description = "Opening a base or semantic swatch picker and choosing a different color updates the matching displayed CSS variable and immediately recolors the corresponding face or content usage in the active preview tab"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "size_effect_and_border_targets"
description = "Changing field and selector sizes across xs–xl, border width, Depth, and Noise visibly resizes, re-borders, adds/removes depth, and adds/removes noise on the appropriate preview fields and selectors"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "create_edit_preview_export_flow"
description = "Starting from the initial My themes count: create 'Harbor Dawn', change its primary color, box radius, field size, depth, noise, and font, switch to Color Palette, then open the Artifact center; the count is exactly one higher and the selected row, editor values, preview styling, palette values, contrast badges, URL hash, and CSS/JSON/Config artifact texts all agree without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "remove_all_then_repopulate_flow"
description = "Starting with at least one custom theme, remove every custom theme and observe the empty My themes state while all 35 built-ins remain, then create a valid replacement and observe the empty hint disappear, the count become one, and the replacement become active in the editor and preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "double_remove_deletes_exactly_one"
description = "Rapidly double-activating a custom theme's Remove control deletes exactly that one theme: the My themes count decreases by one, not two, and no other theme disappears"
type = "binary"
weight = 1.0


[[criterion]]
id = "1.30"
name = "artifact_center_three_formats_live"
description = "Opening the Artifact center shows three format tabs — CSS, JSON, and Config — each regenerating live from the active theme; after editing a distinctive primary color and name, all three tabs contain those edited values rather than stale defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "artifact_copy_and_download"
description = "In the Artifact center, Copy puts the exact visible format text on the clipboard with a brief confirmation that resets, and Download triggers a real file download whose contents match that visible text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "import_declared_theme_round_trip"
description = "After exporting a custom theme as declared-theme JSON (with required name, colors hex keys, radius/size enums, depth/noise, fontFamily, options), removing it, pasting that JSON into Import and applying: My themes regains a theme with the same name and contract fields, and editor, preview, and Artifact center match the imported values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "undo_redo_restores_token_surfaces"
description = "After a color token edit that changes preview and artifact text, Undo restores the prior color across editor, preview, contrast badge, and artifact text together; Redo reapplies the edit across those same surfaces; empty stacks disable their controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "contrast_matrix_tracks_pairs"
description = "The Contrast matrix lists every semantic face/content pair from the declared-theme colors keys (and base-100/base-content) with live contrast ratios and AA/AAA pass/fail badges that recompute immediately when either color in a pair changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "color_blindness_filter_preview_only"
description = "Choosing Protanopia, Deuteranopia, or Tritanopia on the Color blindness filter applies a visible filter to the live preview only; editor swatches and artifact text stay unfiltered; switching back to None restores the unfiltered preview without changing stored tokens"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "font_family_token_updates_surfaces"
description = "Changing the Font family control among at least four bundled families updates preview body text and the font declaration in CSS, JSON, and Config artifact formats without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "snapshot_and_before_after_compare"
description = "Snapshot saves the active theme tokens into a named row with a four-swatch chip; selecting it restores those tokens; Before/After compare shows the snapshot distinct from the live edit, and turning compare off returns to the live edit alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "declared_theme_json_field_contract"
description = "With a custom theme active, the Artifact center JSON tab shows a single declared-theme object (the would-be request body) whose visible text includes required name; the full colors key set (base-100 through error-content) with #RRGGBB hex values; radius.box/field/selector as one of 0rem/0.25rem/0.5rem/1rem/2rem; size.field/selector as one of xs/sm/md/lg/xl; border as one of 0.5px/1px/1.5px/2px; depth and noise as 0 or 1; fontFamily as one of Outfit/system-ui/monospace/serif; and options.defaultTheme/defaultDarkTheme/darkColorScheme booleans"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "css_and_config_compiled_from_same_schema"
description = "After editing a distinctive primary hex, box radius enum, field size enum, border enum, depth, noise, and fontFamily, the CSS tab custom-properties block and the Config tab theme-config snippet both contain those same session values (matching the JSON tab), not a second disconnected token set, and the CSS data-theme value equals the JSON name"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "import_rejects_incomplete_declared_theme"
description = "Pasting Import JSON that omits a required colors key, uses a non-#RRGGBB color, sets radius/size/border/fontFamily outside the closed enums, or sets defaultDarkTheme true while darkColorScheme is false shows validation naming the offending field and leaves My themes count and the active theme unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "dark_color_scheme_cross_field_in_export"
description = "Toggling the Dark color scheme Options control updates options.darkColorScheme in the Artifact center JSON tab to true when checked and false when unchecked, matching the editor toggle without a reload"
type = "binary"
weight = 1.0

