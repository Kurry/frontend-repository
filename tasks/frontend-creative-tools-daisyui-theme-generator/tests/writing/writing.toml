[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_across_panels"
description = "Where the app renders control labels and section headings in the Themes panel, editor (Change Colors, Radius, Sizes, Options), and preview chrome, they keep one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_theme_actions"
description = "Where the app renders button or action labels, they use specific verbs such as 'Hold to add theme', 'Undo', 'Redo', 'Copy', 'Download', 'Import', and 'Snapshot' rather than generic 'Submit'/'OK' when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_name_field_and_fix"
description = "Where the app renders validation messages (for example empty theme name), they name the name field and the fix, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "my_themes_empty_copy_explains_next_step"
description = "Where the app renders the My themes empty state, the copy explains that created themes appear there and how to add one (Hold to add theme)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "preview_and_chrome_copy_polished"
description = "Where the app renders Components Demo preview copy and the announce strip ('version 5.6 is now available'), rate how free they are of spelling and grammatical errors and filler."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "token_terminology_consistent"
description = "Where the app renders labels for the same token family in multiple places (base, primary, secondary, accent, neutral, info, success, warning, error, radius, size), terminology stays consistent rather than inventing conflicting names for the same token."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "token_labels_name_css_variable_family"
description = "Where the app renders token controls, they are labeled with the declared-theme field or token family they edit (base-100 through error-content, radius.box/field/selector, size.field/selector, fontFamily, depth, noise) so an edit's target is unambiguous."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "copied_confirmation_is_specific"
description = "Where the app renders the Artifact center Copy confirmation, the copy states what happened (for example that the format was copied) rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "import_error_names_problem"
description = "Where the app renders Import validation or Artifact center error states, the copy names the offending declared-theme field (for example name, colors.primary, radius.box, border, fontFamily, or options.darkColorScheme) and the fix rather than a bare rejection."
type = "binary"
weight = 0.5

