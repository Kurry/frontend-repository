[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dense_three_panel_studio"
description = "At 1440×900, sticky top chrome sits above a dense tool-studio workspace with an approximately 14rem Themes panel, 17rem center editor, and live preview filling the remaining width"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "responsive_panel_reflow"
description = "Across desktop and narrow mobile viewports, the themes, editor, and preview regions remain identifiable and usable, reflowing toward one column without clipped controls, unreadable text, or page-wide horizontal overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "generic_equal_card_layout"
description = "Collapses into a single-column equal-card marketing layout with no distinct themes/editor/preview panels"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "dense_editor_visual_anatomy"
description = "The center editor reads as a compact professional control stack: mytheme Name field, aligned base-plus-eight-pair swatches, radius icon rows, xs–xl selectors, Font family control, Depth/Noise toggles, contrast matrix with AA/AAA badges, and prominent Random/Export/Undo/Redo actions with unambiguous selected states"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "theme_rows_and_hold_progress"
description = "Every theme row has a consistent four-swatch chip and name with a distinct active treatment; Hold to add has a visible inset progress track and the empty My themes state remains legible when no custom rows exist"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "token_driven_demo_surfaces"
description = "The active theme forms one coherent visual system across the packed preview's cards, stats, registration form, calendar, chat, product card, range, radial progress, orders, terminal, pricing, and token palette, with readable face/content pairings"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "studio_typography_and_grouping"
description = "Chrome typography has a consistent rounded display character comparable to Outfit, and hierarchy, spacing, borders, and grouping keep the dense catalog, editor, and preview content scannable"
type = "likert"
points = 5
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "chrome_dropdown_layout"
description = "Version, theme, and language dropdowns open aligned to their top-chrome triggers, with legible menu surfaces that remain within the viewport and preserve the studio layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "token_contrast_failure"
description = "A selectable theme or edited token combination makes essential editor or preview text visibly unreadable against its active surface because the paired face/content styling is not applied coherently"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.10"
name = "long_theme_name_containment"
description = "A custom theme renamed to a name of roughly 30 or more characters stays contained in its My themes row and the editor without overflowing the panel, overlapping neighbors, or breaking the three-panel layout"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.11"
name = "ui_copy_quality"
description = "Rendered UI copy is production-grade: control labels and section headings follow one consistent capitalization convention, token controls are labeled with the token or variable family they edit, the My themes empty state explains that created themes appear there and how to add one, and no placeholder or lorem text appears anywhere"
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "3.12"
name = "artifact_center_code_drawer"
description = "The Artifact center reads as a code drawer with format tabs (CSS/JSON/Config), a scrollable monospaced block, Copy, and Download — not a screenshot-shaped dead end or sparse unlabeled panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "snapshot_rows_four_swatch_chips"
description = "Snapshot rows show four-swatch chips consistent with theme rows, and Before/After compare keeps the preview composition readable while active"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.n2"
name = "artifact_center_unreadable_monospace"
description = "Artifact center preview text is unreadable: missing monospaced treatment, clipped code, or overlapping format tabs that hide Copy/Download"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick or taste disagreement. If present, name the defect and cite the concrete browser evidence (element, page state, viewport, or screenshot) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
