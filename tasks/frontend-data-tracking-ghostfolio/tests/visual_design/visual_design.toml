[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "primary_emphasis_net_worth_table"
description = "The dashboard gives primary visual emphasis to the net-worth figure and the holdings table over brand chrome and secondary metadata."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "add_control_grouped_with_list"
description = "The Add holding control is visually grouped with the holdings list and form it affects inside the holdings card."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "holdings_columns_tabular_numerals"
description = "Holdings rows align name, symbol, class, quantity, and value consistently across the table, with quantity and value rendered as tabular numerals."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "teal_accent_red_destructive"
description = "The app uses a single teal accent hue on a neutral base for brand mark, primary buttons, selection highlight, and allocation bars, with destructive and error states reserved to a distinct red family applied consistently."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "persistent_visible_field_labels"
description = "Every Add holding form input carries a persistent, visible label above the field, distinct from placeholder-only labeling."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "descriptive_document_title"
description = "The document has a lang attribute and a descriptive page title that names the portfolio product rather than a generic starter title."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "generic_scaffold_content_shipped"
description = "The UI reads as generic starter or placeholder content, or the document title is an uncustomized framework starter string."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "flat_type_or_illegible_pairing"
description = "The layout collapses into a single undifferentiated type role, or a background/text or accent pairing renders as gray-on-gray or otherwise illegible."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.12"
name = "wealth_dashboard_composition"
description = "The page composes as a calm wealth dashboard on a light, slightly green-tinted background: a top brand bar, a full-width net-worth summary card, then a two-column grid pairing a holdings card with a selected-holding detail card."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "white_cards_teal_accent"
description = "Content sits in white cards with generous padding, a large radius, hairline borders, and a soft shadow, and one teal accent hue carries the brand mark, primary buttons, selection highlight, and allocation bars over a neutral base."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "allocation_row_anatomy"
description = "Each allocation entry lists the class name, a proportional bar, and a right-aligned percentage, one entry per asset class present in the visible holdings."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "typography_role_hierarchy"
description = "Typography shows distinct roles: a large weighted net-worth figure and card titles, regular body text in the table, and small uppercase eyebrow labels on section headers."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "single_icon_family"
description = "The brand bar, buttons, empty states, and the sort indicator share one consistent visual icon family at consistent sizes, with no mixed icon styles or ad-hoc mismatched glyphs."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "overlapping_or_cutoff_text"
description = "At desktop width, overview text or controls overlap another element or are cut off by their container in the brand bar, cards, table, or detail panel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "inconsistent_or_random_palette"
description = "Color choices are random or inconsistent with the specified teal-on-neutral wealth-dashboard palette across brand, buttons, selection, and allocation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "buttons_read_as_plain_text"
description = "Primary buttons look similar to plain text or vice versa, so interactive affordances are visually unclear."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.17"
name = "live_market_value_in_form_chrome"
description = "The Add/Edit holding form shows a live market-value readout beside quantity and unit price, and Export portfolio / Import portfolio controls sit in the overview chrome near the holdings card."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "export_drawer_anatomy"
description = "The export drawer shows JSON and CSV tabs, a scrollable preview, and Copy / Download affordances without breaking the two-column wealth-dashboard composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n4"
name = "export_chrome_breaks_composition"
description = "Export or import chrome overlaps the holdings/detail cards, clips the preview, or collapses the wealth-dashboard composition into an unreadable stack at desktop width."
type = "binary"
negate = true
weight = 1.0



[[criterion]]
id = "3.20"
name = "export_drawer_visual_anatomy"
description = "The export drawer shows format tabs, a monospaced preview block, and Copy / Download actions using the same card/surface language as the rest of the wealth dashboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "transactions_ledger_card_language"
description = "The transactions ledger uses the same white-card language (padding, radius, hairline border, soft shadow) as the holdings card rather than unstyled browser defaults."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n5"
name = "export_drawer_unstyled_defaults"
description = "The export drawer or format tabs render as unstyled browser defaults that break the teal/neutral wealth-dashboard visual language."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.22"
name = "performance_summary_figure_group"
description = "The performance summary presents net worth, total cost basis, realized gain, unrealized gain, dividend income, total fees, and total return as a labeled figure group in the same white-card language, with gains shown in a positive/negative treatment (teal or red) that reads at a glance."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.23"
name = "performance_chart_axis_and_legend"
description = "The performance chart renders a portfolio-value line with axis labels; when Benchmark compare is on, the two series are visually distinguishable and labeled in a legend rather than sharing one indistinct color."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.24"
name = "batch_tray_visual_language"
description = "When rows are selected, the batch action tray shows the selected count and the bulk delete and bulk edit controls in the teal accent language above or beside the tables, without obscuring the selected rows."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.25"
name = "import_diagnostics_screen_visual"
description = "The CSV import diagnostics screen presents the schema-mapping controls and a row-level diagnostics table where valid and invalid rows are visually distinct (invalid rows flagged in the red family with the failing field named) plus a clearly labeled Commit control."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.26"
name = "four_labeled_export_tabs"
description = "The export drawer shows four labeled format tabs (Portfolio JSON, Holdings CSV, Activities CSV, Performance report) sharing the same tab and preview language."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n6"
name = "batch_or_diagnostics_unstyled"
description = "The batch action tray or the CSV import diagnostics screen renders as unstyled browser defaults that clash with the teal/neutral wealth-dashboard visual language."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "performance_gains_color_only_or_illegible"
description = "Performance summary gains and losses are indicated by color alone lacking legible value labels, or the gain/loss hues fall outside the teal/red palette, leaving the figures illegible at a glance."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
