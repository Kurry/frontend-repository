[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The dashboard gives primary visual emphasis to the net-worth figure and the holdings table over brand chrome and secondary metadata."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The Add holding control is visually grouped with the holdings list and form it affects."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Holdings rows align name, symbol, class, quantity, and value consistently across the table, with quantity and value rendered as tabular numerals."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "At 375 by 667 pixels the summary, allocation, and holdings reflow without clipped text or overlapping controls."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "The app uses a single accent hue on a neutral base, with destructive and error states reserved to a distinct red family applied consistently."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "Every form input carries a persistent, visible label distinct from its placeholder text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "3_7"
description = "Primary body text meets at least 4.5:1 contrast and interactive-control boundaries meet at least 3:1 contrast against their background."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "UI microcopy is concise and scannable, uses sentence case, and labels action buttons with a leading verb (Add holding, Save holding, Delete holding)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "The document has a lang attribute and a descriptive, non-scaffold page title."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "generic_scaffold_content_shipped"
description = "The UI reads as generic starter or placeholder content, or the page uses a scaffold title such as Vite App or React App."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "flat_type_or_illegible_pairing"
description = "The layout collapses into a single undifferentiated type role, or a background/text or accent pairing renders as gray-on-gray or otherwise illegible."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.12"
name = "wealth_dashboard_composition"
description = "The page composes as a calm wealth dashboard on a light, slightly green-tinted background: a top brand bar, a full-width net-worth summary card, then a two-column grid pairing a holdings card with a selected-holding detail card."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "white_cards_teal_accent"
description = "Content sits in white cards with generous padding, a large radius, hairline borders, and a soft shadow, and one teal accent hue carries the brand mark, primary buttons, selection highlight, and allocation bars over a neutral base."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "allocation_row_anatomy"
description = "Each allocation entry lists the class name, a proportional bar, and a right-aligned percentage, one entry per asset class present in the visible holdings."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "typography_role_hierarchy"
description = "Typography shows distinct roles: a large weighted net-worth figure and card titles, regular body text in the table, and small uppercase eyebrow labels on section headers."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "single_icon_family"
description = "The brand bar, buttons, empty states, and the sort indicator share one consistent visual icon family at consistent sizes, with no mixed icon styles or ad-hoc mismatched glyphs."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "desktop_two_column_layout"
description = "At a 1440-pixel-wide viewport the holdings card and the detail card sit side by side, with the net-worth summary spanning the full width above them."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "narrow_table_scrolls_in_region"
description = "At a 375-pixel-wide viewport the page never scrolls horizontally; when the holdings table is wider than the viewport it scrolls within its own region instead of overflowing the page."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.19"
name = "helpful_error_and_empty_copy"
description = "Where the app renders validation or error messages they name the field and the fix, and where it renders empty states the copy explains what belongs in the region and how to add it."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.20"
name = "placeholder_filler_text_visible"
description = "Placeholder or filler text (lorem ipsum, TODO, asdf, or template variable names such as {{title}}) is visible somewhere in the shipped UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
