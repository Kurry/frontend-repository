[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Selecting a holding through the real table row (click or keyboard) gives a visible selection and detail update that makes the chosen holding unambiguous."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Completing the Add holding flow with keyboard input keeps a visible focus indicator on the form controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Filtering by asset class visibly identifies which holdings currently match."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Interactive controls show distinct hover and focus treatments and immediate pressed feedback when actuated through the real control."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "The selected holding row is marked by more than color alone (a border or tint plus the detail update) when selected via the real row control."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "One core flow can be completed with the keyboard alone and with the pointer alone, reaching the same outcome by either input."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "Row selection and the detail update occur only through the real UI row control or keyboard, not through a hidden state or WebMCP shortcut lacking a visible control path."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "Focus and hover are not collapsed into one identical highlight, and no interactive control leaves focus invisible."
type = "binary"
weight = 0.5
negate = true
optional = true
