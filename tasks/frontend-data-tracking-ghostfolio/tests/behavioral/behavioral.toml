[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "Starting from the seeded overview: add a valid holding, apply a class filter, sort by market value, and select a row. Reload the page. Confirm the holdings collection, activities collection, and updated net-worth total survive from client storage (persistence genre). Filter and sort UI may reset, but holdings and activities must not partially revert to a mixed seed-plus-orphan state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "market_value_sort_reversal"
description = "Starting from the full holdings list: sort by market value ascending and record the exact row order of symbols, then sort descending. Confirm the order reverses relative to ascending, proving sort is derived from live market values rather than two hardcoded orders."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "filter_changes_derived_allocation"
description = "Apply the asset-class filter to one class, then to another class (or clear). Confirm the holdings table, net-worth total, meta line, and allocation percentages all change meaningfully with the filter — not an identical redraw regardless of class."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_table_and_detail"
description = "Select a holding, edit its quantity through the form, and save. Without reload, confirm the table row market value and the detail panel market value both equal new quantity times unit price, and the net-worth total reflects the delta."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "add_count_delta_exact"
description = "Record the holdings table row count and meta-line holding count, then save one new valid holding. Immediately after saving, both counts increase by exactly one and the net-worth total increases by exactly that holding's market value."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_different_holdings"
description = "Add two holdings through the form with different name/symbol/quantity/unit-price inputs. Confirm the two resulting rows and their market values differ in the ways the inputs dictate (not byte-identical hardcoded rows)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_filter_and_add"
description = "Start adding a holding in the form, switch the class filter to another class mid-flow, finish saving a valid holding in a class different from the active filter, then clear the filter. Confirm both prior holdings and the new holding appear exactly once with coherent totals."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_derived"
description = "Delete holdings until the table empty state appears with net worth zero and no allocation entries, then add a valid holding. Confirm the empty state clears, the new row appears, net worth equals that holding's market value, and allocation shows that class at 100 percent."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "mutate_then_export_contains_work"
description = "Add a valid holding with a distinctive symbol, then open Export portfolio. Confirm Portfolio JSON holdings and Holdings CSV both contain that symbol and its quantity/unitPrice/marketValue, proving export is compiled live from the session store."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_round_trip_probe"
description = "Mutate holdings or activities, export Portfolio JSON, clear or further mutate state if needed, then import that JSON. Confirm holdings names/quantities, activity symbols/types, and net worth match the exported mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "invalid_holding_payload_rejected"
description = "Attempt to save a holding with an invalid enum or broken cross-field rule. Confirm an inline field error appears, row count is unchanged, and export previews do not gain a new holding."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "buy_then_export_activity_present"
description = "Save a valid BUY activity, then confirm Activities CSV and Portfolio JSON activities array include that symbol, type BUY, quantity, and unitPrice matching the form inputs."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "sell_moves_gain_probe"
description = "Save a BUY activity for a symbol, note the holding's unrealized gain and the realized gain figure, then save a SELL of part of that position. Confirm realized gain increases by exactly (sell unit price minus average unit cost) times sell quantity, the holding's unrealized gain recomputes over the remaining quantity, and the Performance report preview's realizedGain and per-holding unrealizedGain both change to match — proving the figures are derived, not hardcoded."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "import_commit_probe"
description = "Import an Activities CSV that includes at least one invalid row. In the diagnostics screen, confirm the store is unchanged, exclude or fix the invalid row, and Commit. Confirm the ledger row count increases by exactly the number of valid committed rows, the summary states imported versus skipped, and the Activities CSV and Performance report previews include only the committed rows; then repeat and Cancel instead and confirm nothing changed."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "batch_delete_undo_probe"
description = "Select several holdings with the row checkboxes, record the row count and net worth, and bulk delete them. Confirm exactly those rows are removed and net worth, allocation, and the performance summary drop their contribution, then press Undo once and confirm every deleted row, the selection state, and every derived figure and export preview return to their pre-batch values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.16"
name = "benchmark_independence_probe"
description = "Toggle Benchmark compare on and record the benchmark series shape, then add a BUY activity. Confirm the portfolio series visibly changes while the benchmark series stays identical, proving the portfolio series is derived from the live ledger and the benchmark is a fixed seeded series."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.17"
name = "different_activities_different_total_return"
description = "Starting from the seeded state, apply one set of activities (for example a BUY then a DIVIDEND) and record total return, then Undo back and apply a different set (for example a BUY then a partial SELL). Confirm the two total-return values differ in the ways the inputs dictate, not a constant figure."
type = "binary"
weight = 1.0

