[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "overview_at_root_no_gate"
description = "On load, the root URL shows the portfolio overview (net-worth summary, allocation, holdings table, detail panel) with no login, signup, or onboarding gate."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_holdings_span_four_classes"
description = "On load, the holdings table lists at least four seeded holdings spanning the classes Equity, ETF, Cash, and Crypto, each row showing name, symbol, asset class, quantity, currency, and market value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "net_worth_equals_visible_sum"
description = "On load, the net-worth figure equals the sum of the visible holdings' market values, and the meta line reports how many holdings and how many classes are visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "allocation_percentages_sum_100"
description = "On load, the allocation breakdown shows one entry per visible asset class with a proportional bar and a percentage, and those percentages sum to 100."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "class_filter_recomputes_derived"
description = "After filtering to one asset class, the table narrows to that class and the net worth, meta line, and allocation recompute over the visible set."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "clear_filter_restores_full_list"
description = "After clearing the filter back to All classes, the full list of holdings reappears with no duplicated rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "selection_fills_detail_panel"
description = "After selecting a holding, the detail panel shows that holding's name, symbol, class, quantity, unit price, currency, data source, and market value and the row is visibly marked as selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "reselect_replaces_detail_fields"
description = "After selecting one holding and then another, every field in the detail panel switches to the second holding with no stale values from the first."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "add_holding_updates_totals"
description = "After using Add holding and saving a valid holding, the new row appears in the table and the net worth and allocation percentages update together."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "empty_name_blocks_add"
description = "After submitting the Add holding form with an empty name, or a name longer than 80 characters, an inline validation message naming the name field appears and no new row is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "reload_restores_persisted_holdings"
description = "After adding a holding and reloading the page, the same holdings, the updated net-worth total, and the newly added row all reappear from client storage with no login step."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "cross_class_add_filter_roundtrip"
description = "After filtering to one class, adding a holding in a different class, then returning to All classes, both the prior and the new holdings are identifiable exactly once each with no duplicates, and the net-worth total, meta line, and allocation percentages recompute over the full set."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "net_worth_frozen_after_change"
description = "The net-worth total stays unchanged after adding, editing, or deleting a holding whose market value should change it."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "sort_toggle_with_indicator"
description = "Activating a sortable column header orders the rows by that column; activating the same header again reverses the order, and a visible indicator on the header shows the active sort column and direction."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "sort_reversal_leaves_totals_unchanged"
description = "Starting from the full holdings list: sort by market value in one direction and note the exact row order, then sort in the other direction. The row order reverses exactly, and the net-worth total and allocation percentages are byte-identical to their pre-sort values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "add_flow_updates_all_surfaces"
description = "Record the row count, net-worth total, and meta line, then save a new valid holding through the form. Immediately after saving: the row count increases by exactly one, the net-worth total increases by exactly the new holding's quantity times unit price, the meta line's holding count increments, and the allocation breakdown recomputes its percentages, all in place with no reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "edit_flow_propagates_everywhere"
description = "Select a holding, edit its quantity through the form, and save. The table row, the detail panel, the net-worth total, and that class's allocation percentage all update together without a reload, and the changed market value equals the new quantity times the unit price everywhere it appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "delete_flow_clears_selection_and_totals"
description = "Record the row count and net-worth total, select a holding, and activate the delete control. The row count decreases by exactly one, the detail panel and selection no longer show the deleted holding, and the net-worth total and allocation breakdown drop exactly its contribution."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "submit_disabled_until_valid"
description = "The Add holding form shows a persistent visible label on every field, and the submit control stays disabled until every field holds a valid value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "inline_error_names_field_and_rule"
description = "Typing an invalid value (empty or malformed symbol, non-positive quantity, or negative unit price) shows an inline validation message directly at that field, naming the field and the rule it breaks, before the form is submitted."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "empty_state_after_last_delete"
description = "Deleting every holding one by one until none remain shows an empty state in the table region with a message and an Add holding control, the net-worth total reads zero, and the allocation region shows no class entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "empty_state_for_unmatched_filter"
description = "After deleting every holding of one asset class and then filtering to that class, the table region shows an empty-state message, the meta line reports zero visible holdings, and the allocation region shows no entries."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.38"
name = "double_save_creates_one_holding"
description = "Rapidly double-activating the save control on a valid Add holding form creates exactly one holding: the row count increases by one and exactly one new row appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "long_name_truncated_with_ellipsis"
description = "A holding whose name is longer than 40 characters and at most 80 is truncated with an ellipsis in its table row and shown in full in the detail panel."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.40"
name = "duplicate_rows_after_filter_roundtrip"
description = "After filtering to one class and clearing the filter back to all classes, some holding appears more than once in the table or a previously visible holding is missing."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.41"
name = "holding_field_contract_enums"
description = "The Add holding form requires currency as one of USD, EUR, CHF and data source as one of MANUAL, YAHOO, COINGECKO; saving with values outside those enums is blocked with an inline validation message and adds no holding."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "holding_cross_field_rules"
description = "Saving a holding that breaks a cross-field rule (Cash symbol not matching currency, Crypto with YAHOO data source, or Equity with COINGECKO data source) shows an inline validation message naming the field and rule and adds no holding."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "transactions_ledger_seeded"
description = "On load, the transactions ledger lists at least four seeded activities, each showing the activity fields currency, data source, date, fee, quantity, symbol, type, and unit price."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "activity_field_contract_validation"
description = "The Add activity form enforces the activity field contract: type in BUY/SELL/DIVIDEND/FEE/INTEREST/LIABILITY, ISO-8601 date ending with Z, fee >= 0, quantity > 0, and FEE/INTEREST requiring unit price 0; invalid values show inline messages and add no activity."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "buy_activity_updates_holding"
description = "Saving a valid BUY activity for an existing symbol increases that holding's quantity and market value, appends one ledger row, and updates net worth and allocation without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "export_drawer_three_formats"
description = "Export portfolio opens a drawer with Portfolio JSON, Holdings CSV, and Activities CSV tabs; each shows a monospaced preview compiled live from the current store, with Copy and Download controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "portfolio_json_schema_keys"
description = "Portfolio JSON preview is an object with meta, holdings, and activities keys; each holding includes name, symbol, assetClass, quantity, unitPrice, currency, dataSource, and marketValue; each activity includes currency, dataSource, date, fee, quantity, symbol, type, unitPrice, and comment."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "csv_headers_match_contracts"
description = "Holdings CSV preview starts with header name,symbol,assetClass,quantity,unitPrice,currency,dataSource,marketValue; Activities CSV preview starts with header currency,dataSource,date,fee,quantity,symbol,type,unitPrice,comment."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "export_reflects_session_mutations"
description = "After creating or editing a holding or saving an activity, the Portfolio JSON and matching CSV previews include that session mutation before Copy or Download."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "import_round_trip_portfolio_json"
description = "After mutating holdings or activities, importing a previously exported Portfolio JSON restores the holdings table, ledger, net worth, and all three export previews to match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "undo_reverses_mutation"
description = "After adding a holding or activity, Undo restores the prior holdings, activities, net worth, and export previews in one step, and shows enabled/disabled state matching availability."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n2"
name = "export_omits_session_work"
description = "After a visible holding create/edit/delete or activity save, the export preview omits that session mutation or still shows the deleted record."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "invalid_contract_payload_accepted"
description = "A holding or activity save accepts values outside the field contracts (invalid enum, non-positive quantity, or broken cross-field rule) and adds a row anyway."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.52"
name = "live_market_value_readout"
description = "While the Add or Edit holding form is open, a visible market-value readout equals quantity times unit price and updates as those inputs change; after save the same market value appears on the table row and in the detail panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
