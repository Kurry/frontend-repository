[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "overview_matches_reference_composition"
description = "At desktop width, the overview composition matches /reference-screenshots/overview.png and segment screenshots within small tolerance: top brand bar, full-width net-worth summary, then holdings and detail cards — text wins if screenshot and instruction conflict."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_roles_match_spec"
description = "Typography matches the spec hierarchy visible in the reference: large weighted net-worth figure and card titles, regular table body text, and small uppercase eyebrow labels for section headers."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "card_chrome_matches_spec"
description = "White cards show generous padding, large radius, hairline borders, and soft shadow consistent with the reference screenshots and the visual_design card treatment."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "teal_accent_and_red_destructive"
description = "A single teal accent carries brand mark, primary buttons, selection highlight, and allocation bars over a neutral base; a red family is reserved for destructive and error states, matching the specified palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "holdings_table_column_alignment"
description = "Holdings rows align name, symbol, class, quantity, and market value into consistent columns with tabular numerals for quantity and value, matching the reference table anatomy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "allocation_entry_anatomy_matches"
description = "Each allocation entry shows class name, proportional bar, and right-aligned percentage as in the reference allocation breakdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "add_control_grouping_matches"
description = "The Add holding control is grouped inside the holdings card directly above the form and table it affects, matching the specified layout grouping."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Default, hover, selected, and disabled control states for buttons, rows, and the class filter match the specified treatments (teal selection with left border; distinct hover wash)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "desktop_breakpoint_matches_reference"
description = "At about 1440px the holdings and detail cards sit side by side under a full-width net-worth summary as shown in the desktop reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "light_green_tinted_background"
description = "The page background reads as a light, slightly green-tinted wealth-dashboard surface rather than a stark white or unrelated dark theme, matching the calm composition in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "composition_deviates_from_reference"
description = "Section order or structure visibly deviates from the reference overview: missing brand bar, missing net-worth summary card, or holdings/detail not presented as the specified card pair."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_specified_palette"
description = "Primary accent colors fall outside the specified teal-on-neutral system, or destructive/error states use arbitrary unrelated hues instead of the reserved red family."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "browser_default_controls"
description = "Primary buttons, inputs, or table chrome use unstyled browser defaults when the spec and reference show styled shadcn-like card and control chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "elements_clipped_vs_reference"
description = "At the desktop reference width, key overview elements render clipped, off-screen, or overlapping in ways that contradict the reference screenshots."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "type_hierarchy_collapsed"
description = "Heading and body text collapse into one size and weight: the net-worth figure matches table body styling, or section eyebrows use the same size/case as body copy."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.11"
name = "export_chrome_respects_text_over_screenshots"
description = "Where Export portfolio / Import portfolio chrome is present per the instruction but absent from reference screenshots, the live app still matches the specified wealth-dashboard composition and the instruction text wins over screenshot absence."
type = "binary"
weight = 0.5



[[criterion]]
id = "3.12"
name = "new_surfaces_match_reference_language"
description = "Transactions ledger and export entry points extend the reference wealth-dashboard language (teal accent, white cards, calm green-tinted ground) rather than introducing a conflicting visual system; text wins if screenshot and instruction conflict."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n6"
name = "export_surfaces_clash_reference"
description = "Export drawer or ledger chrome clashes with the reference palette and card language so severely that the overview no longer reads as the same wealth dashboard product."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "3.13"
name = "new_surfaces_extend_reference_language"
description = "The performance summary, performance chart, batch action tray, and CSV import diagnostics screen extend the reference wealth-dashboard language (teal accent, white cards, calm green-tinted ground) rather than introducing a conflicting visual system; text wins if screenshot and instruction conflict."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n7"
name = "new_surfaces_clash_reference"
description = "The performance summary, chart, batch tray, or diagnostics chrome clashes with the reference palette and card language so severely that the overview no longer reads as the same wealth dashboard product."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference screenshots that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
