[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load of the root URL, the portfolio overview is interactive within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "hydration_clean_no_flash"
description = "Loading the root URL directly renders the complete overview with no hydration warnings or errors in the console and no visible content flash or layout jump after first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of adding, editing, filtering, sorting, selecting, deleting, exporting, and importing holdings."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "responsive_under_rapid_input"
description = "Under rapid repeated input (quick successive filter changes, sorts, selections, and form edits), the UI stays responsive with no hangs, freezes, or dropped interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "filter_sort_remain_snappy"
description = "Filtering by asset class and sorting table columns update the visible holdings and derived totals without perceptible multi-second lag on the seeded dataset."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_stay_interactive"
description = "While adding, editing, or deleting a holding, the UI remains interactive: controls stay operable and the page does not freeze waiting on client updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "allocation_updates_without_jank"
description = "When filtering or mutating holdings causes allocation percentages to change, the allocation breakdown updates without multi-second UI blocking or visible frame collapse."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after a local cold load before the portfolio overview becomes interactive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "hydration_errors_or_content_flash"
description = "A direct root load shows hydration mismatch errors/warnings in the console, or content visibly flashes/jumps to different layout or copy after first paint."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "console_errors_during_exercise"
description = "Console errors or warnings appear while adding, editing, filtering, sorting, selecting, deleting, exporting, or importing holdings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "rapid_input_hangs_or_crashes"
description = "Rapid repeated filter, sort, select, or form input hangs the UI, drops interactions, or crashes the page."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "mutations_block_rendering"
description = "Adding, editing, or deleting a holding blocks rendering for a multi-second freeze before the table and totals update."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "9.8"
name = "export_import_stay_responsive"
description = "Opening Export portfolio, switching JSON/CSV tabs, Copy/Download, and Import of a valid portfolio JSON complete without multi-second UI blocking on the seeded dataset."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n6"
name = "export_or_import_freezes_ui"
description = "Opening the export drawer or importing portfolio JSON freezes the UI for multiple seconds or drops subsequent interactions."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "9.9"
name = "derived_and_batch_stay_snappy"
description = "Recomputing the derived position math (cost basis, realized and unrealized gain, total return), rendering the time-series performance chart, and applying a bulk action over the selected rows complete without multi-second UI blocking on the seeded dataset."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n7"
name = "derived_or_batch_blocks_ui"
description = "Recomputing the position math, rendering the performance chart, or applying a bulk action freezes the UI for multiple seconds or drops subsequent interactions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
