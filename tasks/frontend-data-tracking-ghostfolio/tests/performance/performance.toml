[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load of the root URL, the portfolio overview is interactive within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "hydration_clean_no_flash"
description = "Loading the root URL directly renders the complete overview with no hydration warnings or errors in the console and no visible content flash or layout jump after first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of adding, editing, filtering, sorting, selecting, deleting, exporting, and importing holdings."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "responsive_under_rapid_input"
description = "Under rapid repeated input (quick successive filter changes, sorts, selections, and form edits), the UI stays responsive with no hangs, freezes, or dropped interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "filter_sort_remain_snappy"
description = "Filtering by asset class and sorting table columns update the visible holdings and derived totals without perceptible multi-second lag on the seeded dataset."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_stay_interactive"
description = "While adding, editing, or deleting a holding, the UI remains interactive: controls stay operable and the page does not freeze waiting on client updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "allocation_updates_without_jank"
description = "When filtering or mutating holdings causes allocation percentages to change, the allocation breakdown updates without multi-second UI blocking or visible frame collapse."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "export_import_stay_responsive"
description = "Opening Export portfolio, switching JSON/CSV tabs, Copy/Download, and Import of a valid portfolio JSON complete without multi-second UI blocking on the seeded dataset."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "derived_and_batch_stay_snappy"
description = "Recomputing the derived position math (cost basis, realized and unrealized gain, total return), rendering the time-series performance chart, and applying a bulk action over the selected rows complete without multi-second UI blocking on the seeded dataset."
type = "binary"
weight = 1.0

