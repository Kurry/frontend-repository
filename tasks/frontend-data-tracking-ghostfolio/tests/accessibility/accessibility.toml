[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_core_flow_complete"
description = "A core portfolio flow can be completed with the keyboard alone: Add holding form fields are reachable by Tab, the form submits on Enter when valid, holdings table rows can be selected with Enter or Space while focused, and Export portfolio, Import portfolio, and export format tabs are keyboard-reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "selected_row_exposes_aria_state"
description = "When a holdings table row is selected through the real row control, the row exposes its selected state to assistive technology (for example aria-selected or an equivalent programmatic state), not only through visual styling."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "live_region_announces_holding_changes"
description = "A visually hidden ARIA live region announces when a holding or activity is added, updated, or removed through the real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_associated_and_announced"
description = "Inline validation messages on the Add/edit holding form and on Import are programmatically associated with their fields and announced when they appear, as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "visible_keyboard_focus_indicators"
description = "Every interactive control (buttons, inputs, class filter, sortable headers, table rows) shows a clearly visible focus indicator when focused from the keyboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "form_fields_have_explicit_labels"
description = "Every Add holding form field (name, symbol, class, quantity, unit price) uses an explicit visible label element, not placeholder-only labeling."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_and_heading_order"
description = "The portfolio overview exposes semantic landmarks (for example main) and headings follow a logical order with no skips from H1 to deeper levels."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_meet_contrast"
description = "Primary body text and control labels on the light green-tinted dashboard meet at least WCAG AA contrast (about 4.5:1 for text; about 3:1 for interactive control boundaries)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "icons_have_accessible_names"
description = "Brand-bar, button, empty-state, and sort-indicator icons that convey meaning have descriptive accessible names (alt text or aria-label); decorative icons are hidden from the accessibility tree."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.10"
name = "reduced_motion_keeps_functionality"
description = "With prefers-reduced-motion enabled on a fresh load, animations are removed and every state change still completes with full functionality (add, delete, filter, select)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "export_drawer_focus_trap_escape"
description = "The export drawer traps focus while open, closes on Escape, and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "batch_controls_keyboard_and_count_exposed"
description = "The row selection checkboxes, select-all control, and bulk action tray controls are reachable and operable by keyboard, and the tray's selected count is exposed to assistive technology rather than conveyed by position alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "import_diagnostics_keyboard_and_announced"
description = "The CSV import diagnostics screen is keyboard-operable (schema mapping, inline row fixes, row exclusion, and Commit reachable by Tab), and each invalid row's failing-field message is programmatically associated with its row or cell and announced."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "benchmark_state_and_labeled_figures"
description = "The Benchmark compare toggle exposes its on/off state to assistive technology, and the performance summary figures are labeled text rather than color-only indicators of gain or loss."
type = "binary"
weight = 0.5

