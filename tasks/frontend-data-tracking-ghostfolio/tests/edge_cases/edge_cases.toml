[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "last_delete_shows_empty_state"
description = "Deleting the last remaining holding shows an empty state in the table region with a message and an Add holding control, the net-worth total reads zero, and the allocation region shows no class entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "unmatched_filter_empty_state"
description = "When the active class filter matches no holdings, the table region shows an empty-state message, the meta line reports zero visible holdings, and the allocation region shows no entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "double_save_creates_one"
description = "Double-activating the save control on a valid Add holding form creates exactly one holding: the row count increases by one and one new row appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "long_name_truncates_in_table"
description = "A holding name longer than 40 characters and at most 80 is truncated with an ellipsis in its table row and shown in full in the detail panel; a name longer than 80 characters is rejected naming the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "inline_validation_before_submit"
description = "Typing an invalid value (empty name, name over 80 characters, empty or malformed symbol, non-positive quantity, or negative unitPrice) shows an inline validation message at that field naming the field and the rule it breaks, before the form is submitted; the submit control stays disabled until every field is valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "toast_confirms_save_or_delete"
description = "Saving or deleting a holding raises a brief confirmation toast that remains readable and then dismisses."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "empty_state_copy_is_actionable"
description = "Where the table empty state renders after the last delete or an unmatched filter, the copy explains what belongs there and how to add a holding, and an Add holding control remains available."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_form_controls"
description = "Add holding inputs, the class filter, and primary action buttons use semantic form/button controls with persistent visible labels rather than unlabeled placeholder-only fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "After the last holding is deleted, the table region shows nothing usable: no empty-state message, no Add holding control, or the net-worth/allocation regions still show stale non-zero values."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "unmatched_filter_shows_stale_rows"
description = "When the active class filter matches no holdings, the table still lists non-matching rows or the meta line reports a non-zero visible count."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "double_save_creates_duplicates"
description = "Double-activating save on a valid Add holding form creates more than one new row for a single intended hold."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "long_name_clips_without_full_detail"
description = "A holding name longer than 40 characters overflows or clips unreadably in the table without an ellipsis, or the detail panel also truncates it instead of showing the full name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "validation_missing_or_console_only"
description = "Invalid Add holding input is surfaced only in the browser console, or save proceeds with empty name/symbol or non-positive quantity and adds a holding."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "destructive_delete_lacks_feedback"
description = "Deleting a holding produces no visible confirmation (toast or equivalent) and no immediate table/total update."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "add_control_missing_in_empty_state"
description = "In the empty table state after the last delete, the Add holding control is missing or inaccessible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.9"
name = "symbol_and_unit_price_rejected"
description = "A symbol that is empty, longer than 12 characters, or contains characters other than letters, digits, period, or hyphen is rejected naming the symbol field; a negative unit price is rejected naming the unit price field; neither invalid save mutates the holdings collection."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "empty_export_still_valid"
description = "With an empty holdings collection, Export portfolio still produces Holdings CSV with only the header line and Portfolio JSON with an empty holdings array; Copy still shows a copied confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "malformed_import_names_field"
description = "Importing malformed Portfolio JSON, Holdings CSV, or Activities CSV, or a payload that breaks the holding or activity field contracts, shows an inline error naming the import field and leaves holdings, activities, net worth, and allocation unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n8"
name = "malformed_import_mutates_state"
description = "Importing malformed Portfolio JSON or CSV mutates holdings or activities, or clears undo history as if the import succeeded."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "cross_field_violation_accepted"
description = "A holding save with a broken cross-field rule (Cash/currency mismatch or illegal data source for the asset class) succeeds and adds a row."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.12"
name = "cross_field_rule_blocks_save"
description = "Saving a holding that breaks a cross-field rule (Cash symbol not matching currency, Crypto with YAHOO, or Equity with COINGECKO) shows an inline validation message and adds no holding."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "fee_interest_requires_zero_unit_price"
description = "Saving an activity with type FEE or INTEREST and a non-zero unit price is blocked with an inline message naming unit price."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "sell_overshoot_blocked"
description = "Saving a SELL whose quantity exceeds the matching holding quantity is blocked with an inline message naming quantity and leaves holdings unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "empty_ledger_state"
description = "When the transactions ledger is empty, the ledger region shows an empty-state message and an Add activity control; export previews still compile."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "full_sell_moves_gain_to_realized"
description = "Selling the entire quantity of a holding removes it from the holdings table (or leaves it at zero quantity) and moves its gain from unrealized to realized: the performance summary's unrealized gain drops that holding's contribution and realized gain rises by the sold gain, with no double-counting."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "zero_valid_import_commit"
description = "Committing an Activities CSV import in which every row is invalid or excluded imports zero rows: the summary reports zero imported, the ledger and all export previews stay unchanged, and no undo step is recorded as if an import had succeeded."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "benchmark_toggle_empty_ledger"
description = "Toggling Benchmark compare while the activities ledger is empty still overlays and removes the seeded benchmark series; the portfolio series reads as empty or flat and toggling does not throw an error."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.19"
name = "bulk_delete_undo_restores_all"
description = "Bulk deleting several selected holdings and then pressing Undo once restores every deleted row, the selection state, and the net worth, allocation, and performance summary they contributed, not just the last row."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.20"
name = "bulk_edit_cross_field_blocked"
description = "A bulk edit that sets asset class or data source on several selected rows to a value that would break a cross-field rule for one of them is blocked for that row with a visible message, and the batch does not partially apply an invalid change."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.n10"
name = "full_sell_double_counts_gain"
description = "After selling an entire position, its gain is counted in both unrealized gain and realized gain, or the removed holding still contributes to net worth or the performance summary."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n11"
name = "zero_import_commit_mutates_or_records_undo"
description = "Committing an import with zero valid rows still mutates the activities collection or records an undo step as if rows had been imported."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
