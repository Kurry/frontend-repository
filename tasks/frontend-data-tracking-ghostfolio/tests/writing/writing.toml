[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Where the app renders headings, buttons, and labels on the portfolio overview, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_action_verbs"
description = "Where the app renders primary action labels, they use specific verbs such as Add holding, Save, Delete, Export portfolio, Import portfolio, Download JSON, Download CSV, or Copy rather than generic Submit or OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_field_and_fix"
description = "Where the app renders validation or error messages on the holding form, they name the field and the fix (for example that quantity must be positive), not only a bare Invalid rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states in the holdings table or allocation region, the copy explains what belongs there and how to add a holding."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_quality"
description = "Where the app renders body copy, brand subtitle, section eyebrows, or toast text, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "holding_terminology_consistent"
description = "Where the app renders labels for holdings, asset class, market value, and net worth across the table, detail panel, meta line, and allocation, terminology stays consistent rather than mixing synonyms for the same concept."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numeric_formatting_consistent"
description = "Where the app renders quantities, unit prices, market values, net worth, and allocation percentages, formatting is consistent (same decimal precision conventions and percentage presentation)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "toast_states_what_happened"
description = "Where the app renders confirmation toasts after save or delete, they state what happened (for example that a holding was saved or removed), not a vague affirmation only."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "export_import_labels_specific"
description = "Where the app renders export and import chrome, labels are specific (Export portfolio, Import portfolio, Download JSON, Download CSV, Copy), and import errors name the failing field from the holding payload contract."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "performance_labels_consistent"
description = "Where the app renders the performance figures, they are labeled with their real names (cost basis, realized gain, unrealized gain, dividend income, total fees, total return) consistently across the performance summary, the detail panel, and the Performance report export."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "import_summary_and_batch_labels_specific"
description = "Where the app renders the import diagnostics summary it states how many rows were imported and how many skipped rather than a bare number, and the batch action tray labels the selected count and its bulk actions (Delete selected, Edit selected) specifically."
type = "binary"
weight = 0.5

