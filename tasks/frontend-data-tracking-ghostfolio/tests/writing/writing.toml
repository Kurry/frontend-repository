[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Where the app renders headings, buttons, and labels on the portfolio overview, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_action_verbs"
description = "Where the app renders primary action labels, they use specific verbs such as Add holding, Save, Delete, Export portfolio, Import portfolio, Download JSON, Download CSV, or Copy rather than generic Submit or OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_field_and_fix"
description = "Where the app renders validation or error messages on the holding form, they name the field and the fix (for example that quantity must be positive), not only a bare Invalid rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states in the holdings table or allocation region, the copy explains what belongs there and how to add a holding."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_quality"
description = "Where the app renders body copy, brand subtitle, section eyebrows, or toast text, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "holding_terminology_consistent"
description = "Where the app renders labels for holdings, asset class, market value, and net worth across the table, detail panel, meta line, and allocation, terminology stays consistent rather than mixing synonyms for the same concept."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numeric_formatting_consistent"
description = "Where the app renders quantities, unit prices, market values, net worth, and allocation percentages, formatting is consistent (same decimal precision conventions and percentage presentation)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "toast_states_what_happened"
description = "Where the app renders confirmation toasts after save or delete, they state what happened (for example that a holding was saved or removed), not a vague affirmation only."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variable names such as {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as the brand bar, net-worth section title, primary buttons, or empty-state message."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_names"
description = "The same concept is named inconsistently across surfaces (for example Asset class in one place and Category in another for the same field)."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_unreadably"
description = "Truncated or overflowing text renders primary labels, validation messages, or empty-state copy unreadable outside the intentional >40-character table ellipsis case."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.9"
name = "export_import_labels_specific"
description = "Where the app renders export and import chrome, labels are specific (Export portfolio, Import portfolio, Download JSON, Download CSV, Copy), and import errors name the failing field from the holding payload contract."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "generic_export_import_copy"
description = "Export or import controls use only generic labels such as Submit or OK, or import errors omit the failing field name."
type = "binary"
negate = true
weight = 0.5



[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
