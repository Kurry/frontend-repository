[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "overview_serves_without_gate"
description = "The portfolio overview serves via the documented start path and appears interactive with no blank page, fatal error overlay, login wall, or generic starter content."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "shared_collection_coherence"
description = "Filter, add, edit, and delete all recompute the visible holdings, net-worth total, meta line, and allocation from one shared holdings collection rather than a second disconnected copy — a change in one surface is reflected everywhere without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "market_value_and_allocation_invariants"
description = "For visible holdings, each row's market value equals quantity times unit price, the net-worth total equals the sum of visible market values, and allocation percentages for visible classes sum to 100 percent."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "persistence_round_trip"
description = "After adding a holding and an activity, a full page reload restores the same holdings collection, activities collection, and the updated net-worth total from localStorage or equivalent client storage, with no login step."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "add_flow_console_clean"
description = "Adding a holding completes with no uncaught exception or unhandled promise rejection in the console."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "hydration_clean_console"
description = "The console is hydration-clean: no hydration mismatch errors or warnings on first load of the root route, and none after client-side interactions on the overview."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "deep_link_root_parity"
description = "Loading the root URL directly renders the same portfolio overview chrome, seeded holdings baseline, and layout as remaining on the root after in-app interactions — no blank shell and no alternate route content."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "same_origin_assets_only"
description = "Network activity during load and exercise shows only same-origin requests for scripts, styles, fonts, icons, and data — no CDN imports for those assets."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "ui_survives_rapid_interaction"
description = "Rapid successive filter, sort, select, and form interactions leave table, detail, and totals coherent with no desynced surfaces."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.10"
name = "no_debug_artifacts"
description = "The running app shows no debug overlays, leftover placeholder scaffolding, or console.log spam that clutters the console during normal portfolio flows."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.n1"
name = "persistence_absent_after_reload"
description = "After adding a holding and an activity and reloading the page, the holdings or activities collection reverts to the seeded baseline: the mandated client-storage persistence of holdings, activities, and totals is absent."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n2"
name = "external_requests_or_outbound_links"
description = "The network log shows requests to external origins for scripts, styles, fonts, icons, or data, or app chrome contains navigational links that leave the app."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n3"
name = "views_desync_on_mutation"
description = "After add, edit, delete, or filter, the same holding or total shows different values in the table, detail panel, net-worth summary, or allocation until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n4"
name = "console_errors_on_normal_flows"
description = "Console errors or unhandled promise rejections appear during normal add, edit, filter, sort, select, delete, export, or import flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n5"
name = "hydration_content_flash"
description = "Server-rendered or statically exported content visibly flashes and is replaced by different client content after hydration: mismatched text, reflowing layout, or restyled elements between first paint and interactive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n6"
name = "blank_or_broken_start_path"
description = "The documented start path fails to serve or renders a blank/broken page instead of the portfolio overview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n7"
name = "reload_violates_persistence_rule"
description = "Reload produces a state inconsistent with mandated persistence: holdings or net worth after reload diverge from the pre-reload persisted collection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n8"
name = "allocation_or_net_worth_invariant_broken"
description = "Visible allocation percentages fail to sum to 100, or the net-worth total disagrees with the sum of visible holdings' market values, or a row's market value disagrees with quantity times unit price."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.11"
name = "export_import_share_one_store"
description = "Export JSON/CSV and Import portfolio operate on the same shared holdings collection as the table and totals: after import, table rows, net worth, allocation, and a subsequent export all agree."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "payload_invariants_on_export"
description = "Every exported holding shows marketValue equal to quantity times unitPrice, assetClass is one of Equity, ETF, Cash, Crypto, and the JSON version field is 1."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n9"
name = "export_desynced_from_store"
description = "Export preview holdings disagree with the visible table (missing rows, wrong quantities, or marketValue not equal to quantity times unitPrice) after a create/edit/delete."
type = "binary"
negate = true
weight = 1.0



[[criterion]]
id = "2.13"
name = "derived_position_math_invariants"
description = "The shown and exported derived figures satisfy the position-math identities: a symbol's average unit cost equals its total BUY cost divided by its total BUY quantity, cost basis equals average unit cost times quantity, unrealized gain equals market value minus cost basis, and portfolio total return equals unrealized gain plus realized gain plus dividend income minus total fees."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "import_staging_isolated_from_store"
description = "The CSV import diagnostics staging state (parsed rows, schema mapping, per-row validity) is held separately and does not mutate the shared holdings/activities collections before Commit; committed rows land in the same one store the table, totals, and exports read from."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n10"
name = "derived_math_invariant_broken"
description = "A shown or exported derived figure violates the position-math identities: cost basis, unrealized gain, realized gain, dividend income, total fees, or total return disagrees with the values it should be computed from."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n11"
name = "batch_or_import_desyncs_store"
description = "After a bulk action or a committed import, the holdings table, performance summary, or export previews show different values for the same data until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console, storage, coherence, hydration, or stability) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, or page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
