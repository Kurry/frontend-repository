[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_and_entity_modules_bound"
description = "Contract-mandated modules browse-query-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound so webmcp_session_info / webmcp_list_tools surface tools for all three."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, entity, and artifact tool handlers call the same application logic as the visible UI for filter, select, create, update, delete, export, import, and copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "destination_portfolio_overview"
description = "Browse destinations include portfolio-overview, activities, and export-drawer; opening portfolio-overview reaches the portfolio overview at the root with no login gate, and opening export-drawer opens the export drawer."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "asset_class_filter_bound"
description = "The browse filter bindings asset-class and activity-type apply and clear through the same paths as the visible class filter and activity type filter controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "holding_entity_ops_work"
description = "Entity operations create, select, update, and delete for entity holding all work when invoked via WebMCP and update the visible table, detail, and totals."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "holding_fields_bound"
description = "Entity fields name, symbol, asset-class, quantity, unit-price, currency, and data-source are the closed field set used by create/update tools; values appear in the UI after successful ops."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "delete_requires_confirm"
description = "Entity delete for a holding requires explicit confirm=true; invoking delete without confirm does not remove the holding."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond browse-query-v1, entity-collection-v1, and artifact-transfer-v1, and no undeclared destinations, filters, entity operations, or artifact operations beyond the Bindings block, are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session data, the tool list, and successful invocations for the bound browse/entity tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "contract_exercisable_via_automation"
description = "The declared contract can be fully exercised via automation: open portfolio-overview, activities, or export-drawer; apply/clear asset-class and activity-type filters; create/select/update/delete a holding; and export/import/copy portfolio artifacts."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Required browse, entity, or artifact WebMCP tools are unbound, missing, or no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A WebMCP holding create/update/delete or asset-class filter apply leaves the UI out of sync with the tool result (handlers diverge from visible UI logic)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations, filters, entity types, entity operations, or artifact operations beyond the Bindings block are exposed through the tool list."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "delete_without_confirm_succeeds"
description = "Entity delete removes a holding when confirm=true is omitted, violating the contract restriction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_mcp_ui"
description = "Creating a holding via WebMCP with empty name, malformed symbol, non-positive quantity, or negative unit-price bypasses validation and desynchronizes MCP state from the visible form rules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_broken"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound for formats json and csv and import modes portfolio-json, holdings-csv, and activities-csv; invoking them drives the same export drawer / import path as the visible UI without returning raw file/blob/base64 contents in WebMCP results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "currency_and_data_source_fields_bound"
description = "Entity create/update accepts currency and data-source among the closed holding fields with the declared value bounds; successful ops show those values on the holding row or detail panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.13"
name = "export_drawer_destination"
description = "Browse destinations include portfolio-overview, activities, and export-drawer; opening export-drawer reaches the export surface with Portfolio JSON, Holdings CSV, and Activities CSV tabs."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n7"
name = "artifact_tools_missing_or_return_blobs"
description = "Artifact export/import/copy tools are missing, no-op, or return raw file paths, blobs, or base64 artifact contents in WebMCP results."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "export_mcp_diverges_from_ui"
description = "A WebMCP artifact export or import leaves the UI export preview or holdings table out of sync with the tool result."
type = "binary"
negate = true
weight = 1.0



[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract for browse-query-v1 / entity-collection-v1 / artifact-transfer-v1 with holding, asset-class/activity-type, and portfolio export/import bindings deviates from its declaration in a way NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to automation or a real user. If present, name the defect and cite concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

