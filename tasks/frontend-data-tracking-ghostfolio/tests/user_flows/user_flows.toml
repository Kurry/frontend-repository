[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "add_holding_updates_all_surfaces"
description = "After saving a new valid holding through the Add holding form, the table row count increases by exactly one, the net-worth total increases by exactly the new holding's market value, the meta line's holding count increments, and the allocation breakdown recomputes its percentages, all in place without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "filter_add_cross_class_roundtrip"
description = "Filtering to one asset class, adding a holding in a different class, then returning to all classes leaves both the prior and the new holdings identifiable exactly once each with no duplicates, and the totals and allocation recompute over the full set."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_quantity_propagates_everywhere"
description = "Editing the selected holding's quantity and saving updates the table row, the detail panel, the net-worth total, and that class's allocation percentage together without a reload; the changed market value equals the new quantity times the unit price everywhere it appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_clears_selection_and_totals"
description = "Deleting the selected holding decreases the row count by exactly one, clears it from the detail panel and the selection, and removes its contribution from the net-worth total and the allocation breakdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "sort_reversal_preserves_totals"
description = "Sorting the holdings by market value in one direction and then the other reverses the row order, and the net-worth total and allocation percentages stay unchanged by sorting alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "reload_restores_persisted_holdings"
description = "Adding a holding and then reloading the page restores the same holdings, the same updated net-worth total, and the new row from client storage, with no login step."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "invalid_add_blocked_inline"
description = "Attempting to save a holding with an empty name, a name longer than 80 characters, an empty or malformed symbol, a non-positive quantity, or a negative unitPrice is blocked with an inline validation message naming the affected field and adds no holding."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "select_then_reselect_replaces_detail"
description = "Selecting one holding then another fully replaces every field in the detail panel (name, symbol, class, quantity, unit price, market value) with no stale values from the previous selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "clear_filter_restores_full_list"
description = "After filtering to one class and clearing the filter, the full list of holdings reappears with no duplicates and derived totals recompute over all holdings."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload"
description = "After a blocked invalid save or after clearing a filter that showed an empty match, the user can correct the input or clear the filter and continue the portfolio workflow without a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "buy_activity_end_to_end"
description = "Saving a valid BUY activity for an existing symbol increases that holding quantity and market value, appends one ledger row, updates net worth and allocation, and includes the new activity in Portfolio JSON and Activities CSV previews without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_import_round_trip_flow"
description = "After mutating holdings or activities, Copy or Download Portfolio JSON then Import that same JSON: holdings names and quantities, activity symbols and types, net-worth total, and all three export previews match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "undo_after_add_restores"
description = "After adding a holding or activity, Undo restores the prior collections, net worth, and export previews in one step."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "add_holding_appears_in_exports"
description = "After saving a new valid holding, the Portfolio JSON and Holdings CSV export previews include the new holding without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "buy_then_sell_derived_pipeline"
description = "Saving a BUY activity for a symbol then a SELL of part of that position updates the derived figures together without a reload: the holding's cost basis and unrealized gain recompute, realized gain increases by (sell unit price minus average unit cost) times sell quantity, and the Performance report preview's realizedGain and per-holding unrealizedGain both change to match."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "import_diagnostics_commit_pipeline"
description = "Importing an Activities CSV opens the diagnostics screen; excluding or fixing the invalid rows and pressing Commit adds only the valid rows so the ledger row count increases by exactly the imported-row count, the summary states imported versus skipped, and the Activities CSV and Performance report previews include the committed rows; cancelling instead leaves the ledger and every preview unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "batch_delete_undo_roundtrip"
description = "Selecting several holdings with the row checkboxes and bulk deleting them removes exactly those rows and drops their contribution from net worth, allocation, and the performance summary; a single Undo restores every deleted row and every derived figure at once, and the export previews return to their pre-batch content."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "benchmark_toggle_then_activity_flow"
description = "Toggling Benchmark compare on shows a second labeled benchmark series and toggling it off removes it; adding a BUY activity afterward visibly changes the portfolio series while the benchmark series stays the same."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.19"
name = "mutate_then_performance_report_contains_work"
description = "After adding a holding or saving an activity, the Performance report preview reflects that work (the new symbol appears in its holdings rows and the performance figures move) before Copy or Download, without a reload."
type = "binary"
weight = 1.0

