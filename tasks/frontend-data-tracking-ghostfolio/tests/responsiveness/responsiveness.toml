[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "narrow_single_column_stack"
description = "At a 375-pixel-wide viewport the two-column grid collapses to a single column and the net-worth summary stacks, with no clipped text, no overlapping controls, and no horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "desktop_side_by_side_cards"
description = "At a 1440-pixel-wide viewport the holdings card and the detail card sit side by side with the net-worth summary spanning the full width above them."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "table_scrolls_in_own_region"
description = "At a 375-pixel-wide viewport, when the holdings table is wider than the viewport it scrolls within its own region instead of forcing horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_tap_targets_adequate"
description = "At about 375px width, primary controls (Add holding, save, delete, class filter) present tap targets at least about 44px in the smaller dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "typography_scales_across_breakpoints"
description = "Typography remains readable from 1440px desktop to 375px mobile: the large net-worth figure and card titles scale down without becoming illegible, and table body text stays readable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "allocation_and_cards_reflow"
description = "At narrow widths the allocation breakdown, holdings card, and detail card reflow in a logical stacking order without overlapping each other or the brand bar."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "form_usable_on_narrow"
description = "At about 375px width the Add holding form fields, labels, and submit control remain fully visible and usable without horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll_narrow"
description = "At about 375px width the document/body does not require horizontal page scrolling to reach any primary portfolio chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "export_import_usable_at_375"
description = "At about 375 pixel width the export drawer, import control, and holding form stay fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "new_surfaces_reflow_at_375"
description = "At about 375 pixel width the performance summary figure group, the performance chart, the batch action tray, and the CSV import diagnostics screen reflow to fit without horizontal page scrolling: the chart sizes down responsively, the diagnostics table scrolls within its own region, and the batch tray stays reachable."
type = "binary"
weight = 1.0

