[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "narrow_single_column_stack"
description = "At a 375-pixel-wide viewport the two-column grid collapses to a single column and the net-worth summary stacks, with no clipped text, no overlapping controls, and no horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "desktop_side_by_side_cards"
description = "At a 1440-pixel-wide viewport the holdings card and the detail card sit side by side with the net-worth summary spanning the full width above them."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "table_scrolls_in_own_region"
description = "At a 375-pixel-wide viewport, when the holdings table is wider than the viewport it scrolls within its own region instead of forcing horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_tap_targets_adequate"
description = "At about 375px width, primary controls (Add holding, save, delete, class filter) present tap targets at least about 44px in the smaller dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "typography_scales_across_breakpoints"
description = "Typography remains readable from 1440px desktop to 375px mobile: the large net-worth figure and card titles scale down without becoming illegible, and table body text stays readable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "allocation_and_cards_reflow"
description = "At narrow widths the allocation breakdown, holdings card, and detail card reflow in a logical stacking order without overlapping each other or the brand bar."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "form_usable_on_narrow"
description = "At about 375px width the Add holding form fields, labels, and submit control remain fully visible and usable without horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll_narrow"
description = "At about 375px width the document/body does not require horizontal page scrolling to reach any primary portfolio chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the layout breaks: overlapping cards, clipped text, or controls that cannot be reached."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "narrow_forces_page_horizontal_scroll"
description = "At about 375px width the page itself scrolls horizontally because the holdings table or cards overflow the viewport instead of scrolling inside a region."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "desktop_fails_two_column"
description = "At about 1440px width the holdings card and detail card remain stacked in a single column, or the net-worth summary is confined to a partial width instead of spanning the full width above them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "mobile_controls_too_small"
description = "At about 375px width primary controls are too small to tap reliably (well under about 44px) or misaligned so they collide."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "allocation_chart_overflows"
description = "At a narrow viewport the allocation bars/chart use a fixed width that overflows the viewport or clip their percentage labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "controls_disappear_at_narrow"
description = "At about 375px width the class filter, Add holding control, or delete control disappears or becomes unreachable."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.9"
name = "export_import_usable_at_375"
description = "At about 375 pixel width the export drawer, import control, and holding form stay fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n7"
name = "export_offscreen_on_narrow"
description = "At about 375px width the export drawer or import control renders off-screen or cannot be operated without horizontal page scroll."
type = "binary"
negate = true
weight = 1.0



[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
