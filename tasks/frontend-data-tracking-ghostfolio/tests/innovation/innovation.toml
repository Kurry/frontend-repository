[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "allocation_viz_execution_polish"
description = "The allocation breakdown executes with polished proportional bars and clear percentage readout that make class mix instantly scannable beyond a bare static list."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "coordinated_surface_updates"
description = "Mutating a holding produces a coordinated, polished update across net-worth, allocation, table, and detail that feels like one coherent dashboard rather than disconnected widgets."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "toast_and_selection_craft"
description = "Confirmation toasts and selection feedback are crafted with readable timing and clear hierarchy that elevate the wealth-dashboard experience beyond minimum functional feedback."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "tabular_data_legibility_craft"
description = "Holdings quantity and market-value columns use tabular numerals and alignment craft that make scanning and comparing values unusually clear for a portfolio table."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "empty_state_guidance_polish"
description = "Empty and unmatched-filter states guide the next action with polished copy and control placement that feels intentional rather than a blank gap."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "export_trust_summary_polish"
description = "Beyond the required export drawer, a polished wealth-ops touch helps trust the artifact — for example a summary strip naming holding count, activity count, and net worth above the preview — and is browser-observable without replacing required behavior."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "performance_return_breakdown_polish"
description = "The performance summary surfaces total return with a clear realized / unrealized / dividend / fee breakdown and coordinated updates across the summary, detail panel, chart, and Performance report that make the portfolio's performance instantly legible beyond a bare figure list."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable execution-quality enhancement of the specified Ghostfolio-style portfolio dashboard that is NOT covered by any other criterion in this file. Reward polished fidelity of the specified experience, not invention beyond the reference. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot). If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
