[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with no notes, the sidebar shows a friendly empty-state message hinting to create the first note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After using the New Note control, an untitled note appears at the top of the sidebar and the title field is focused so typing populates the title without an extra click."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After typing a title and body into the open note, that note's sidebar row shows the title, a one-line body preview, and a relative timestamp, and sorts to the top of the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After creating a second note and editing it, the second note sorts above the first, and a transient Saved label appears after the edit and clears on its own."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When a note's body is edited, the live word count and character count beneath the note update to reflect the exact text entered."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After pinning an older note, it appears above a newer unpinned note in the sidebar, and it stays above even after the newer note is edited."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "When the Search Notes input matches a word in one note's body, the list narrows to that note and the matched term is highlighted in its preview; clearing the search restores all rows; a search matching nothing shows a no-results message."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After inserting an image (file picker or drag-and-drop onto the body), the image renders inline within the open note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After using Duplicate on a note with text and an image, a new separate note appears with the same text and image, and editing the duplicate leaves the original unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When opened via its control or the Ctrl+K / Cmd+K shortcut, the Quick Switcher overlays a dimmed backdrop; typing narrows the list, the Down and Up arrows move and wrap the highlight, and Enter opens the highlighted note."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When Focus Mode is toggled, the sidebar hides and the note expands to full width; Exit Focus Mode or Escape restores the sidebar."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When Delete is used, an explicit confirm step appears; cancelling keeps the note, and confirming removes it permanently from the sidebar while other notes remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "workspace_refresh_restores_everything"
description = "Starting from a workspace with one note containing text, bold formatting, and an embedded image, plus a second pinned note, with the first note open in the editor: after a full page refresh every note is restored with identical text, the bold formatting, the inline image, the pinned note still above the unpinned one, and the previously selected note reopened in the editor — all facets restored coherently, never a mix of restored and reset state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After activating Load 10,000 Items, the Virtualized items region shows the full total while the Rendered item count stays far below 10,000, and selection and scroll position survive scrolling and filtering."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The sidebar lists notes sorted most-recently-edited first, each row showing title, a one-line body preview, and a relative timestamp"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Typing a title or body updates that note's sidebar row live and re-sorts it to the top; editing a different note moves it above the previously edited one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Using only the keyboard inside the Quick Switcher, the Down and Up arrows move the highlight and wrap at the ends, and after typing narrows the list the highlight re-clamps to a still-visible result before Enter opens it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "shortcuts_overlay_lists_all_combos"
description = "The Shortcuts control opens an overlay listing at least New Note, Quick Switcher, Focus Mode, and the editor's bold and italic combinations, each paired with its key combination; the overlay is dismissed by a visible close control or Escape and afterwards the note that was open is shown again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "export_txt_download_flattened"
description = "Confirming a valid export downloads the open note's text as a plain-text file named with the chosen filename; bold and other formatting are flattened to plain text and each embedded image is represented by a filename placeholder line in the exported text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "The note list is a static hardcoded set of rows with no working create, edit, or delete through the visible controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "Delete wipes the note in a single click with no confirmation step"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "1_32"
description = "Pin has no effect on ordering, or edit recency overrides pin so a pinned note falls below a newer unpinned note"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "1.33"
name = "formatting_toolbar_bold_toggle_roundtrip"
description = "A visible formatting toolbar offers at least bold, italic, heading, and bulleted list controls; activating Bold with text selected renders that text in bold weight in the body, and activating Bold again on the same selection returns the text to normal weight"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "formatting_shortcuts_match_toolbar"
description = "With text selected in the body, Ctrl+B (Cmd+B on macOS) toggles bold and Ctrl+I (Cmd+I) toggles italic, producing exactly the same result as the corresponding toolbar buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "editor_undo_redo_tracks_surfaces"
description = "In the body editor, Ctrl+Z reverses the most recent typing or formatting change and Ctrl+Y or Ctrl+Shift+Z re-applies it, with the sidebar preview and the word/character counters updating to match each undo and redo step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "app_shortcuts_work_while_editing"
description = "With the caret inside the note body editor, Alt+N still creates a new note and Ctrl+K (Cmd+K) still opens the Quick Switcher — the editor's formatting keymap does not swallow the app-level shortcuts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "export_dialog_inline_validation"
description = "The Export as .txt control opens a dialog with a filename field pre-filled from the note title; clearing the field to empty or entering an invalid filename shows an inline validation message naming the filename field before submit, keeps the confirm control disabled, and triggers no download until the value is valid again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "global_shortcuts_honored"
description = "Ctrl+Shift+F toggles Focus Mode, pressing ? while the caret is not in a text field opens the Shortcuts overlay, and Escape closes an open overlay or exits Focus Mode, all without breaking the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "last_delete_restores_empty_state"
description = "After deleting the last remaining note (through its confirm step), the sidebar returns to its empty-state message and the main area shows the welcome panel with its Create note button"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "non_image_drop_rejected_with_message"
description = "Dropping a non-image file onto the note body embeds nothing and shows a visible, specific message, and the note's existing content is unchanged afterwards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "new_note_flow_multi_surface"
description = "Counting the sidebar rows immediately before and after activating New Note: the count increases by exactly one, the new Untitled row sits at the top of the list, the editor opens that note with the title field focused, and opening the Quick Switcher shows the same note among its results without any reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "delete_flow_multi_surface"
description = "Starting with at least two notes and one open in the editor: confirming its delete removes it from the sidebar list, clears it from the editor selection, removes it from the Quick Switcher results, and updates any visible note counts, all without a reload; a later full page refresh does not revive it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "bold_roundtrip_switch_and_refresh"
description = "After applying bold to a selection, the text shows bold in that note after switching to another note and back through the Quick Switcher and again after a full page refresh; toggling bold off afterwards returns the text to normal weight in the body and everywhere it is previewed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "search_clear_restores_prior_order"
description = "Typing into Search Notes narrows the sidebar list to matching notes with the matched term highlighted in each matching preview, and clearing the search restores the full list in exactly the order it had before the search"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.45"
name = "duplicate_adds_exactly_one_note"
description = "Counting the sidebar rows immediately before and after using Duplicate: exactly one new note is added, and editing the duplicate's body changes only the duplicate's sidebar preview while the original's row text is untouched"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core note-taking features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
