[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "After New Note, sidebar count +1, Untitled row at top, title focused, and Quick Switcher lists the same note without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_export_and_title_inline_validation"
description = "Invalid Export as .txt filename or an over-length title triggers immediate inline validation naming the field; confirm stays disabled for bad filenames and no download occurs."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Editing title and body updates the sidebar row, counters, and Export Workspace JSON notes entry for that note without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Confirming delete removes the note from the sidebar, editor selection, Quick Switcher, and Workspace JSON notes array without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "focus_and_overlays_retain_note"
description = "Toggling Focus Mode and opening Quick Switcher or Shortcuts retains the open note; dismissing overlays returns to that note."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "After deleting the last note, sidebar empty-state and welcome panel appear, and Workspace JSON shows notes [] with selectedNoteId null."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_filters_sidebar_list"
description = "Search Notes narrows the sidebar with highlighted matches; clearing restores the prior full order."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "focus_mode_hides_and_restores_sidebar"
description = "Focus Mode: toggling Focus Mode hides the sidebar and expands the open note to full width; Exit Focus Mode or Escape restores the sidebar with the same open note — workflow continuity without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "quick_switcher_export_delete_overlays"
description = "Overlays: Quick Switcher, Export/Import Workspace, and delete confirmation open, complete their flows, and dismiss without trapping the editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery: navigation loss or error can be corrected without a reload (no dead ends)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "note_flows_unavailable"
description = "New Note, edit/save, delete, Search Notes, Focus Mode, or Export/Import Workspace cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_note_missing_or_duplicated"
description = "After New Note, the sidebar count fails to increase by exactly one, the Untitled row is missing/duplicated, or Quick Switcher omits it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "editor_sidebar_desync"
description = "After typing a title/body, the editor text, sidebar preview/timestamp, counters, and Export Workspace preview disagree about the same note."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "focus_or_switcher_breaks_selection"
description = "Entering/exiting Focus Mode or using Quick Switcher breaks layout or loses the open note selection unexpectedly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_notes_break_ui"
description = "After deleting the last note, the sidebar/welcome empty states are blank/broken with no Create note affordance."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "search_results_disagree"
description = "Search Notes and the sidebar disagree about matches, or clearing search fails to restore the prior full order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "focus_mode_cannot_restore_sidebar"
description = "After Focus Mode hides the sidebar, Exit Focus Mode / Escape cannot restore it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Overlays block navigation with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_note_or_import_silent"
description = "An invalid title (>200 chars) or contract-invalid Workspace Import provides no visible named-field or import error feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "swiftnote_dead_end_requires_reload"
description = "A SwiftNote flow leaves a dead end that requires a full page reload to continue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "artifact_end_state_export_import"
description = "Create two notes, pin one, embed an image, open Export Workspace — JSON shows schemaVersion swiftnote-workspace-v1 and both notes with required fields — then Import that JSON after a destructive clear or on a fresh path and the same titles, pins, and images return"
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
