[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "After New Note, sidebar count +1, Untitled row at top, title focused, and Quick Switcher lists the same note without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_export_and_title_inline_validation"
description = "Invalid Export as .txt filename or an over-length title triggers immediate inline validation naming the field; confirm stays disabled for bad filenames and no download occurs."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Editing title and body updates the sidebar row, counters, and Export Workspace JSON notes entry for that note without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Confirming delete removes the note from the sidebar, editor selection, Quick Switcher, and Workspace JSON notes array without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "focus_and_overlays_retain_note"
description = "Toggling Focus Mode and opening Quick Switcher or Shortcuts retains the open note; dismissing overlays returns to that note."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "After deleting the last note, sidebar empty-state and welcome panel appear, and Workspace JSON shows notes [] with selectedNoteId null."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "search_filters_sidebar_list"
description = "Search Notes narrows the sidebar with highlighted matches; clearing restores the prior full order."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "focus_mode_hides_and_restores_sidebar"
description = "Focus Mode: toggling Focus Mode hides the sidebar and expands the open note to full width; Exit Focus Mode or Escape restores the sidebar with the same open note — workflow continuity without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "quick_switcher_export_delete_overlays"
description = "Overlays: Quick Switcher, Export/Import Workspace, and delete confirmation open, complete their flows, and dismiss without trapping the editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery: navigation loss or error can be corrected without a reload (no dead ends)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "artifact_end_state_export_import"
description = "Create two notes, pin one, embed an image, open Export Workspace — JSON shows schemaVersion swiftnote-workspace-v1 and both notes with required fields — then Import that JSON after a destructive clear or on a fresh path and the same titles, pins, and images return"
type = "binary"
weight = 1.0

