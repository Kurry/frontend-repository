[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "VD-1"
name = "VD-1"
description = "The page background renders near-black (#000000), primary text renders white (#FFFFFF), and a primary control uses the coral accent family (#F45B69 / #F45B68)"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-2"
name = "VD-2"
description = "Type resolves to Roboto (or its declared fallback) with the primary heading at 55px, a secondary heading at 24px, and body text at 16px"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-3"
name = "VD-3"
description = "The Search Notes input and its adjoining Create note button form one pill: a white input with black text rounded only on the left and square on the right, beside a dark (#1A1A1A) button with white text rounded only on the right and square on the left, neither with a drop shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-4"
name = "quick_switcher_layered_highlight_treatment"
description = "The Quick Switcher renders unmistakably layered above the app over a dimmed backdrop, and the currently-highlighted result is clearly distinguished from the other results by a background fill and an accent left border"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-5"
name = "VD-5"
description = "Explicit empty and no-results states appear: a sidebar empty-state before any note, a no-results message on a non-matching search, and a welcome panel when no note is selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-6"
name = "VD-6"
description = "Sidebar row text stays clearly legible against the near-black background in both the hovered and the selected states"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-7"
name = "mobile_drawer_layout_usable"
description = "At approximately 375px wide the app renders without horizontal scrolling, the sidebar collapses behind a reachable hamburger toggle that opens it as an overlay, and the open note stays fully usable including its formatting toolbar"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-10"
name = "two_pane_shell_composition"
description = "On a wide desktop viewport the app shows a two-pane shell: a fixed left sidebar containing a brand wordmark, the Search Notes field, the note list, and footer stats with the Load 10,000 Items control, beside an editor pane containing a note-actions toolbar, a formatting toolbar, a large title field, the body area, and the word/character counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-11"
name = "selected_row_coral_tint_accent_border"
description = "The currently selected sidebar row carries a coral-tinted background and an accent left border that visibly distinguish it from unselected rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-12"
name = "bold_control_active_pressed_state"
description = "While the caret sits inside bold text, the formatting toolbar's Bold control renders in a pressed/active treatment visibly distinct from its idle state"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-13"
name = "consistent_icon_set"
description = "Icons across the sidebar, toolbars, dialogs, and toasts come from one visually consistent icon set, with no mixed icon styles"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-14"
name = "sidebar_rows_dense_aligned"
description = "Sidebar rows are dense and consistently aligned: title, one-line preview, and relative timestamp align across rows without ragged spacing or inconsistent truncation"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-15"
name = "informative_toasts_empty_states_validation_copy"
description = "Toasts name the action they confirm (e.g. note created, note deleted), empty states explain what belongs in the region and how to add it, and validation messages name the field and the fix"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-17"
name = "consistent_capitalization_and_verb_labels"
description = "Headings, buttons, and menu labels use one consistent capitalization convention throughout the app, and action labels are specific verbs such as Create note, Duplicate, and Export as .txt rather than generic labels like Submit or OK"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-19"
name = "shortcuts_overlay_combos_match_behavior"
description = "Every key combination listed in the Shortcuts overlay exactly matches a combination the running app actually honors when pressed"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-20"
name = "default_corner_radius_ten_px"
description = "Primary surfaces and controls (buttons, dialogs, note rows or panels) render with the default 10px corner radius rather than fully square or heavily varied rounding, consistent with a 4px base spacing rhythm"
type = "binary"
weight = 0.5
optional = true

