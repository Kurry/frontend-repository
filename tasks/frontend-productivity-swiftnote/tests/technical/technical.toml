[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "TI-1"
name = "TI-1"
description = "Navigating to the app reaches an interactive UI (sidebar, empty state, and a way to create a note) rather than a blank page, a framework error overlay, or a noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-2"
name = "TI-2"
description = "Creating a note with text and an embedded image plus a second pinned note survives a full page refresh with exact text, the inline image, and the pin ordering restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-3"
name = "TI-3"
description = "A note deleted before a full page refresh does not reappear after the refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-4"
name = "TI-4"
description = "No uncaught JavaScript errors or unhandled promise rejections appear in the console during load or while performing the core workflow (create, edit, embed image, pin, delete)"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-5"
name = "TI-5"
description = "At least 25 rapid consecutive New Note activations leave an exact final note count with the UI responsive and no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-11"
name = "keyboard_operable_with_focus_ring"
description = "Every interactive control (sidebar rows, toolbar and formatting buttons, dialog controls, the search field) is reachable and operable with the keyboard alone, and keyboard Tab focus shows a visible focus ring on each control it reaches"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-12"
name = "dialogs_trap_and_return_focus"
description = "The Quick Switcher, Shortcuts overlay, delete confirm, Export as .txt dialog, Export Workspace drawer, and Import Workspace surface behave as dialogs: focus moves into the dialog on open, stays trapped inside while it is open, Escape closes it, and focus returns to the invoking control on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-13"
name = "export_validation_live_region"
description = "The export dialog's validation message is exposed through a polite ARIA live region (visible in the DOM as aria-live=polite, role=status, or equivalent) in addition to being shown visually"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "TI-14"
name = "toolbar_buttons_expose_name_and_pressed"
description = "The formatting toolbar buttons expose accessible names such as Bold and Italic and reflect their active state through a pressed attribute (such as aria-pressed) that changes as the caret moves into and out of formatted text"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "TI-15"
name = "cold_load_interactive_under_2s"
description = "On a local cold load, the app reaches an interactive state (a note can be created or the search focused) within 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-16"
name = "virtualized_scroll_and_typing_stay_smooth"
description = "Scrolling the 10,000-item virtualized list stays smooth with no sustained freeze, and fast typing in the body editor keeps up without blocked keystrokes while the Saved indicator and counters update"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-17"
name = "cross_view_state_coherence"
description = "A change made in one view is immediately reflected in every other surface showing that datum without a reload: an edit updates the sidebar row, Quick Switcher entry, and counters together, with no surface showing stale data another surface already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-18"
name = "workspace_json_persists_via_import_and_refresh"
description = "After Import Workspace of a valid swiftnote-workspace-v1 document, a full page refresh still shows the imported notes, pins, and selection — import writes through the same persisted store as UI edits"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-19"
name = "forms_enforce_note_and_workspace_bounds"
description = "Form validation for Export as .txt filename, title length, and Import Workspace enforces the same field-contract bounds as the Workspace JSON shape: out-of-contract values surface named field errors and do not enter the live export payload as valid"
type = "binary"
weight = 1.0

