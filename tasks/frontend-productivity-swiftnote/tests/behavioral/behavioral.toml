[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_refresh_and_workspace_round_trip"
description = "Multi-facet round-trip: create two notes, pin one, embed an image, select one note; after a full page refresh all facets restore (text, pin, image, selection). Separately, Export Workspace then Import Workspace of that JSON reconstructs the same visible notes and selection — never a mix of restored and reset state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "edit_recency_and_pin_sort_live"
description = "Sort proof: edit note A then note B so B sorts above A among unpinned notes; pin A so A rises above B; unpin A so B returns above A — ordering is derived from live pin and edit-recency data rather than a hardcoded list."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "search_and_counters_track_edits"
description = "Derived-view sensitivity: type into Search Notes so the list narrows with highlighted matches, then edit the open note body and confirm word/character counters and the sidebar preview change with the text rather than staying identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_sidebar_switcher_and_export"
description = "Cross-view echo: rename a note title and change its body in the editor; without reload confirm the sidebar row, Quick Switcher entry, and Export Workspace JSON notes entry all reflect the new title and bodyHtml."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "new_note_count_delta_exact"
description = "Count-delta integrity: measure sidebar note count immediately before and after New Note; the delta is exactly +1 with the new Untitled row at the top and no lagging counter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_notes_different_workspace_exports"
description = "Input-dependent output: create two notes with different titles and bodies; confirm both appear distinctly in the sidebar and the Workspace JSON notes array lists both with those distinct titles and bodyHtml values rather than identical hardcoded output."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_edit_export_and_search"
description = "Interleaved-flow integrity: start editing note A, open Export Workspace, run a Search Notes query, return to the editor and finish editing note A; confirm the search state or clear restores correctly, note A kept its edits, and the Workspace JSON includes those edits without corrupting the other flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_and_export"
description = "Edge-state round-trip: delete every note (sidebar empty state and welcome panel visible; Export Workspace still compiles with an empty notes array and selectedNoteId null), then create two notes; confirm empty state clears, both notes appear, and Workspace JSON lists both."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After refresh or Workspace import, some note facets (title, pin, image, selection) restore while others silently revert, producing incoherent partial persistence."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Search results, word/character counters, or Workspace JSON export render identically regardless of note edits or search input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Creating two notes with different titles and bodies yields identical sidebar titles and identical Workspace JSON notes entries."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "After editing a note, the sidebar, Quick Switcher, or Workspace JSON export still shows stale title or body until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "workspace_export_import_pipeline"
description = "Full pipeline: create a note with a unique title and body, pin it, open Export Workspace — JSON contains that note under the field contract — then Import that JSON after deleting all notes; the unique title, body, and pin return and Export Workspace again lists them."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_ignores_session_mutations"
description = "Export Workspace JSON remains empty or otherwise omits visible session creates, edits, pins, or deletes — export not compiled live from the store."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
