[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "cf.1"
name = "meter_interval_reconciliation"
description = "The user can reconcile meter data by resolving duplicate timestamps, missing intervals, resets, and corrected readings. The UI must show a waterfall of raw-to-normalized changes and preserve the original rows in history."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.2"
name = "appliance_cycle_model"
description = "The user can map appliance cycles, observing phases with durations, watt profiles, interruptibility, and start windows. Moving a cycle updates the plan, and splitting an interruptible cycle enforces phase boundaries and maximum gaps."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.3"
name = "load_scheduling_grid"
description = "The user can drag flexible cycle blocks across a time-of-use grid. Invalid placements based on windows, dependencies, constraints, or phase gaps show exact blockers in a preview state without permanently mutating the plan."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.4"
name = "aggregate_and_peak_views"
description = "The aggregate view stacks load sums per interval. The UI separates the planned schedule from historic actual mappings, highlights circuit and household peak threshold violations, and correctly calculates background residual."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.5"
name = "tariff_and_impact_calculator"
description = "The app calculates energy cost using interval watt-minutes and a tariff conversion, plus fixed daily peak charges. Selecting a charge highlights the corresponding intervals, and a cost waterfall breaks down baseline, shifted, peak, and corrections."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.6"
name = "plan_branches_and_suggestions"
description = "The user can fork schedules into branches, compare differences in constraints, cost, and aggregate loads, and merge changes. Deterministic suggestions to resolve peaks or move cycles do not alter the actual meter history upon acceptance."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.7"
name = "execution_and_deviation_recovery"
description = "Logical clock execution correctly processes actual events (late starts, interruptions, deviations). The user can reschedule remaining phases, branch recovery, or mark missed cycles, with actual events strictly feeding the reconciliation ledger."
type = "binary"
weight = 1.0
