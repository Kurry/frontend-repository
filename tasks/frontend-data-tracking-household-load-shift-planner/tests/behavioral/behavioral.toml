[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "behav.1"
name = "exact_round_trip"
description = "Interleave meter corrections, schedule branch/split, execution interruption/deviation, recovery, undo plan-only, approval, and export/import. Intervals, events, units, and files must round-trip exactly, leaving the state identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "behav.2"
name = "clean_state_start"
description = "Starting from a clean state requires all milestones to become observable only after a real UI action, with exact before/after entity and event-count deltas."
type = "binary"
weight = 1.0

[[criterion]]
id = "behav.3"
name = "adversarial_ordering_convergence"
description = "Equivalent adversarial orderings (e.g., canonical edit before/after a merge, undo followed by branch, import after divergent local edits) converge. Cancelled actions correctly restore the complete prior snapshot including selection, filters, and history anchor."
type = "binary"
weight = 1.0

[[criterion]]
id = "behav.4"
name = "atomic_import"
description = "Importing is an atomic transaction. A rejected import (due to unknown enums, exact-boundary violations, duplicate/dangling IDs, or cross-field contradictions) causes zero state mutation and reports every diagnostic together."
type = "binary"
weight = 1.0

[[criterion]]
id = "behav.5"
name = "genre_correct_isolation"
description = "Reloading the page persists all explicitly promised state exactly. Transient previews, dialogs, hover, drag states, and invalid drafts do not leak into persistence."
type = "binary"
weight = 1.0
