[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "cyan_white_nearblack_tokens"
description = "The app applies its color tokens consistently: a bright cyan #34CDE3 background, white #FFFFFF card and panel surfaces, near-black #010101 accent for primary buttons and headings, and light cyan #AEEBF4 secondary text."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "poppins_type_scale"
description = "Typography uses the Poppins family with h1 at 32px bold, h2 at 20px semibold, body at 14px, and card prompt text at least 18px and centered."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "ten_px_spacing_and_pills"
description = "Paddings and margins follow a 10px base unit, cards and panels use a 10px corner radius, and every button is a fully rounded pill with a radius of at least 24px."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.4"
name = "primary_secondary_pill_buttons"
description = "Primary buttons use a near-black background with white text, a pill shape and a drop shadow, while secondary buttons and unselected chips use a white background with black text and a black border."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "category_intensity_color_coding"
description = "Category chips and intensity badges follow the assigned hues — Icebreaker blue, Truth teal, Dare orange, Wild magenta; Mild green, Spicy amber, Wild red — legible at a glance on a drawn card, and the selected intensity and toggled-on chips are filled or inverted versus unselected ones."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "inline_errors_visible_treatment"
description = "Attempting to start with fewer than 2 players, a duplicate name, a name longer than 20 characters, or zero categories shows a visible inline error next to the offending control, not merely a disabled button."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "narrow_viewport_legible"
description = "At about 375px wide the app renders without horizontal scrolling and the card, scoreboard, setup form, export controls, and live event feed stay legible and usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "live_feed_status_pill_states"
description = "The live event feed shows a status treatment whose idle, active, paused, disconnected, and caught-up states are visibly distinguishable."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.9"
name = "missing_category_color_coding"
description = "Category chips and intensity badges render with no distinguishing color coding, or drawn-card surfaces render on the cyan background instead of white so the intended palette is absent."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "non_pill_button_corners"
description = "Buttons render with square corners or an inconsistent mix of pill and square shapes rather than the required fully-rounded pills."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "2.11"
name = "consistent_icon_set"
description = "The primary play controls, the live-feed status pill, and the custom-card list actions carry crisp inline icons from one consistent visual family, sized to match their labels."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.12"
name = "dialogs_styled_like_app"
description = "Confirmation dialogs render as centered white panels over a dimmed backdrop, styled with the same pill-shaped buttons and corner radii as the rest of the app."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.13"
name = "no_overlap_across_widths"
description = "Between 1440px and 375px wide the single-column layout stays centered, buttons remain full pills at a comfortable tap size, and every control renders free of overlap or clipping at intermediate widths."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.14"
name = "writing_conventions_consistent"
description = "Headings and buttons follow one consistent capitalization convention, action labels are specific verbs such as Draw card, Start game, Undo last turn, Export Session and Save Progress, error messages name the problem and the fix, and empty states explain what belongs there and how to add it."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "placeholder_text_shipped"
description = "Placeholder or template filler text such as lorem ipsum or TODO appears somewhere in the shipped UI."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "2.16"
name = "winner_banner_and_win_target_visible"
description = "The First to 10 win-target readout is visible on setup and during play, and a Winner announcement banner naming the winning player is visually distinct from ordinary toasts with a highlighted scoreboard winner row."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "export_import_button_treatments"
description = "Export Session and Save Progress use the primary near-black pill treatment, while Import Session, Copy Session JSON and Resume Saved Session use the secondary white outlined pill treatment."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
