[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "persistence_multi_facet_reload"
description = "Starting a game with 3 named players, resolving at least one Done and one Skip, adding one custom card, then reloading: the same players in the same order, points, forfeits, current turn, and the custom card all survive together — never a mix where some facets persist and others silently reset."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.2"
name = "scoreboard_sort_proves_live_scores"
description = "With 3 players, resolve Done turns so standings change order on View scores; the scoreboard re-sorts by points descending from live totals rather than showing a fixed hardcoded order."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.3"
name = "category_filter_changes_drawn_cards"
description = "Start a game with only Dare selected and draw several cards (all Dare); return via Start new game, select only Truth, start again and draw several cards — every new draw shows Truth, proving the filter changes outcomes."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.4"
name = "done_echoes_scoreboard_and_turn"
description = "Press Done on a drawn card and without reload confirm the resolving player's scoreboard points rose by one and the turn indicator advanced to the next join-order player — play outcome echoes across card chrome and scoreboard."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.5"
name = "points_and_custom_card_count_delta"
description = "Measure a player's points and the custom-card list count immediately before and after one Done and one valid custom-card submit; points rise by exactly one and the list count rises by exactly one with no off-by-one."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.6"
name = "different_play_different_export"
description = "Play two short sessions with different Done/Skip patterns, Export Session each time, and confirm the two JSON documents differ in players points/forfeits and turnLog in the ways the play dictates — not identical hardcoded exports."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.7"
name = "interleaved_scores_and_live_feed"
description = "During play, open View scores, start the live event feed, resolve another Done, then reopen scores: points and turn order stay coherent with the feed running — neither flow corrupts the other."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.8"
name = "empty_custom_cards_then_repopulate"
description = "Before any custom card exists the list shows the empty-state message; after adding one card the empty state is gone and the card is listed; after confirmed delete the empty state returns — derived chrome tracks empty → populated → empty."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.n1"
name = "partial_persistence_incoherent"
description = "After mid-game play and reload, players/points survive but custom cards, current turn, or the Dare Night record silently revert (or the reverse), producing incoherent partial persistence."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n2"
name = "scoreboard_ignores_done_skip"
description = "Pressing Done or Skip leaves scoreboard points and forfeits identical regardless of those actions."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n3"
name = "different_play_identical_exports"
description = "Repeating play with observably different Done/Skip outcomes yields byte-identical Export Session JSON that ignores the play."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n4"
name = "scoreboard_stale_until_reload"
description = "After Done or Skip, View scores stays stale until a full page reload rather than reflecting the new points or forfeits immediately."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.9"
name = "save_resume_reload_round_trip"
description = "During play after at least one resolved turn, Save Progress, reload, Resume Saved Session: players, points, forfeits, and current turn match the checkpoint while the Dare Night record facet remains coherent."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.10"
name = "import_export_session_round_trip"
description = "Export Session after play, note players points and turnLog, Import Session that JSON on a cleared setup, and confirm the restored session matches those fields without inventing fabricated turns."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.11"
name = "winner_then_new_game_clean_restart"
description = "Drive a player to 10 points to show Winner, then confirm Start new game and confirm again: setup returns with cleared players/scores and no Winner banner while the Dare Night record remains if it was set."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.n5"
name = "export_missing_required_session_fields"
description = "Export Session JSON lacks schemaVersion dare-night-session-v1, omits winTarget 10, or drops required players/turnLog fields after real play."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
