[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "Contract modules command-session-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound so webmcp_list_tools surfaces session_*, entity_*, form_*, and artifact_* tools for this app."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Invoking bound session, entity, form, or artifact tools produces the same visible state changes as the matching UI controls (Start game, custom-card create/delete, Export/Import/Copy Session) via the same store commands."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Exposed tools stay within declared session operations, entity fields (prompt, category, intensity, name, outcome), form fields (player-name, card-prompt, card-category, card-intensity), and artifact operations (export, import, copy) with export format json — no invented modules."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool can exercise the bound operations without manual harness edits."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, delete, and toggle work for custom cards / player-related fields declared in Bindings when invoked through WebMCP with the same visible effects as the UI."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form operations validate, submit, cancel, and reset are bound for player-setup and add-custom-card workflow steps and keep normal inline validation active."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.7"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy for format json / import mode dare-night-session are bound and trigger the same Export Session, Import Session, and Copy Session JSON flows as the visible controls (file picker and clipboard remain Playwright-observed)."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra undeclared module routes or capabilities are exposed beyond the four mandated modules and their Bindings."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "webmcp_session_info returns usable session metadata, webmcp_list_tools lists the bound tools, and webmcp_invoke_tool returns structured results without errors for declared operations."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP tools register from the app's own implementation of the module_spec + Bindings without requiring edits to /tests or the verifier harness."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP session/entity/form/artifact tools are missing, unbound, or invoke as no-ops that leave the visible game state unchanged."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "A WebMCP invoke reports success while the visible UI stays on a mismatched setup/play/export state."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Tools expose undeclared destinations, entity fields, or artifact formats beyond the Bindings list."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The declared contract cannot be exercised from automation via webmcp_invoke_tool."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "A form or entity invoke bypasses validation and leaves MCP state disagreeing with the visible inline errors or roster/card list."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for declared operations."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks outside the app's registered tools."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "One of command-session-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is not implemented where declared required."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation for the declared bindings."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
