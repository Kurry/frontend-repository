[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "custom_card_empty_state"
description = "Before any custom card is added, the custom-card list shows a friendly empty-state message rather than a blank region."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.2"
name = "player_and_card_forms_validate_inline"
description = "Player name and custom-card forms show inline validation before submit for length, duplicate name, and enum fields."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.3"
name = "errors_name_field_and_rule"
description = "Validation errors name the field (name or prompt) and the broken rule (1-to-20 or 8-to-200) rather than only saying Invalid."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.4"
name = "actions_show_toasts_and_saved"
description = "Done, Skip, Deck reshuffled, custom-card add/delete, Save Progress, and Copied each show visible confirmation feedback."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.5"
name = "timer_and_stream_stay_responsive"
description = "While the 15-second round timer runs or the live feed is active, controls remain responsive rather than freezing with a blank loading wall."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.6"
name = "delete_and_new_game_confirm_cancel"
description = "Custom-card Delete and Start new game require confirmation; cancelling leaves the card or in-progress game in place."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.7"
name = "win_target_and_record_readable"
description = "The First to 10 win-target readout and Dare Night record line are visible guidance on setup without hidden controls."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.8"
name = "undo_unavailable_when_illegal"
description = "Undo last turn is unavailable at game start, after it was already used for the latest action, and after a Winner is declared."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.9"
name = "import_rejects_malformed_session"
description = "Importing malformed JSON, wrong schemaVersion, or a payload missing required session fields shows a visible rejection and leaves the live session unchanged."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.10"
name = "ninth_player_and_whitespace_rejected"
description = "Adding a 9th player is refused and an empty or whitespace-only name is never added to the roster."
type = "binary"
weight = 1.0
[[criterion]]
id = "4.n1"
name = "duplicate_name_silently_accepted"
description = "A case-insensitive duplicate player name is added to the roster without an inline error."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n2"
name = "short_prompt_silently_added"
description = "A custom-card prompt shorter than 8 characters is added to the list without an inline error naming prompt."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n3"
name = "save_progress_available_when_illegal"
description = "Save Progress stays enabled and claims success before any turn is resolved or after a Winner is declared."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n4"
name = "resume_shown_without_checkpoint"
description = "Resume Saved Session appears enabled when no checkpoint exists and fabricates a session."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n5"
name = "winner_still_allows_scoring"
description = "After Winner is declared, Done or Skip still changes points or forfeits."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n6"
name = "cancel_delete_still_removes_card"
description = "Cancelling the custom-card delete confirmation still removes the card."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n7"
name = "double_done_awards_two_points"
description = "Double-activating Done awards two points or advances two turns."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n8"
name = "reshuffle_repeats_last_card"
description = "Across an automatic deck reshuffle boundary, the same card is drawn twice in a row."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n9"
name = "import_corrupts_on_invalid_file"
description = "An invalid import corrupts players, scores, or custom cards instead of rejecting cleanly."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "4.n10"
name = "zero_categories_allows_start"
description = "Start game proceeds with every category deselected and no inline explanation."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case handling that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
