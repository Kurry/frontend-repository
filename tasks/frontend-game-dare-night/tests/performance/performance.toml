[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or hydration mismatch messages appear on load or during setup, play through a Winner, custom cards, export/import, and the live event feed."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.3"
name = "controls_respond_promptly"
description = "Draw card, Done, Skip, and category toggles respond promptly without multi-second UI stalls under normal use."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.4"
name = "timer_and_stream_nonblocking"
description = "The one-second countdown ticks and live event feed updates never freeze the UI; controls stay responsive while both run."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.5"
name = "export_json_stays_snappy"
description = "Export Session / Copy Session JSON remains responsive after a session with multiple turnLog entries."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Resolving turns and opening View scores keep the UI interactive without sustained jank."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.7"
name = "card_flip_stays_smooth"
description = "The card flip-and-fade transition completes smoothly without visible hitching on Draw card."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated activation of Done, Draw card, or live-stream Start leaves controls responsive with no hang or blank screen."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.9"
name = "extended_play_avoids_runaway"
description = "An extended play session through many draws/reshuffles does not visibly degrade into unusable lag."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.10"
name = "storage_unavailable_safe"
description = "When storage is unavailable, the app still loads playably rather than crashing the production build."
type = "binary"
weight = 1.0
