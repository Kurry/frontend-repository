[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Every interactive control on setup and play — including Start game, Draw card, Done, Skip, Export Session, Import Session, Save Progress, Resume Saved Session, category chips, and intensity buttons — is reachable and operable with the keyboard alone, with a visible Tab focus indicator."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "dialogs_manage_focus"
description = "Confirmation dialogs for Start new game and custom-card delete trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only or icon-leading controls expose accessible names matching their actions (Draw card, Delete, stream status) rather than unnamed graphics."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "validation_and_winner_live_regions"
description = "Inline validation errors and the Winner announcement are announced to assistive technology when they appear (live region or equivalent), not only painted visually."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Player name fields and custom-card prompt/category/intensity controls have explicit labels associated with the inputs."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Dare Night title and section headings (players, custom cards, scores, live event feed) follow a logical heading order without skipping levels."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "landmark_navigation_present"
description = "Setup and play screens expose landmark regions so the main game area, forms, and complementary panels are distinguishable."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "text_controls_have_contrast"
description = "Primary text on cyan #34CDE3 and white-on-near-black buttons meet readable contrast in the shipped theme."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "semantic_roles_for_toggles"
description = "Category chips and intensity buttons expose selected state to assistive technology, not only through color."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, card flip, toasts, dialog transitions, Winner celebration and confetti are replaced by instant state changes while the game remains playable."
type = "binary"
weight = 1.0
