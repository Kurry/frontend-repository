[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Every interactive control on setup and play — including Start game, Draw card, Done, Skip, Export Session, Import Session, Save Progress, Resume Saved Session, category chips, and intensity buttons — is reachable and operable with the keyboard alone, with a visible Tab focus indicator."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "dialogs_manage_focus"
description = "Confirmation dialogs for Start new game and custom-card delete trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only or icon-leading controls expose accessible names matching their actions (Draw card, Delete, stream status) rather than unnamed graphics."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "validation_and_winner_live_regions"
description = "Inline validation errors and the Winner announcement are announced to assistive technology when they appear (live region or equivalent), not only painted visually."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Player name fields and custom-card prompt/category/intensity controls have explicit labels associated with the inputs."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Dare Night title and section headings (players, custom cards, scores, live event feed) follow a logical heading order without skipping levels."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "landmark_navigation_present"
description = "Setup and play screens expose landmark regions so the main game area, forms, and complementary panels are distinguishable."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "text_controls_have_contrast"
description = "Primary text on cyan #34CDE3 and white-on-near-black buttons meet readable contrast in the shipped theme."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "semantic_roles_for_toggles"
description = "Category chips and intensity buttons expose selected state to assistive technology, not only through color."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, card flip, toasts, dialog transitions, Winner celebration and confetti are replaced by instant state changes while the game remains playable."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Primary play or export controls cannot be reached or activated with the keyboard alone."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n2"
name = "focus_indicators_missing"
description = "Focused interactive controls show no visible focus indicator."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Category chips or intensity buttons lack selected-state semantics for assistive technology."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Selected category/intensity or Winner state is conveyed by color alone with no text or semantic cue."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "Open confirmation dialogs allow Tab to escape to the page behind, or Escape leaves the dialog open."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n6"
name = "poor_contrast_unreadable"
description = "Body text or button labels are unreadable against their backgrounds in the cyan/white/near-black theme."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n7"
name = "errors_visual_only"
description = "Inline validation errors appear visually but are not exposed to assistive technology."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n8"
name = "icon_controls_unnamed"
description = "Icon-only controls lack accessible names."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Heading levels skip in a way that breaks the outline of setup/play sections."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Card flip, confetti, or Winner celebration still run full motion under prefers-reduced-motion."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
