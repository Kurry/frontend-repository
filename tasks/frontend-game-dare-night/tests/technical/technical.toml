[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "console_clean_no_hydration_issues"
description = "Loading the app and performing a full workflow of setup, draw, Done, Skip, adding a custom card, and exercising the live event feed produces a console free of errors, warnings, and hydration mismatch messages."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "A custom card added through the form still appears in the custom-card list and is drawable after a full page refresh, and the Dare Night record still shows after a refresh, proving localStorage persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "After resolving a couple of turns and performing a full page refresh, the app restores the same players in the same order, each player's points and forfeits, and the same current turn rather than returning to the setup screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "A custom card that is deleted and confirmed does not reappear in the list after a page refresh, proving the deletion itself persisted."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Toggling the round timer across several draws, driving 25 rapid repetitions of the primary game controls, and cycling the live event feed leave the final visible state exact with no overlapping countdown, accumulating duplicate loop, blank screen, or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "The DOM exposes a hidden element, attribute, or window global not mandated by the app that carries internal ground-truth state a real user could not reach through visible interaction."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "A judge-visible surface such as rendered text, DOM comments, alt text, the page title, or console output contains language addressed to an AI judge or grading system rather than a user."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "A core workflow shows a success or completion state without the underlying action occurring, such as a saved custom card that is absent after reload or an output that stays constant regardless of input."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.9"
name = "4_9"
description = "The app renders or behaves differently depending on whether it is driven by automation, keying UI or state on navigator.webdriver or other automation signals rather than user action."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.10"
name = "keyboard_operability_complete"
description = "Every interactive control on the setup and play screens is reachable and operable with the keyboard alone, with a visible focus indicator shown on each control as Tab moves through them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "dialog_focus_management"
description = "Confirmation dialogs trap Tab focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "selected_state_exposed_to_at"
description = "Category chips and intensity buttons expose their selected state in the accessibility tree rather than through color alone, and inline validation errors are rendered next to the field they describe and announced to assistive technology when they appear."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "interactive_within_two_seconds"
description = "On a local cold load the setup screen renders and responds to input within 2 seconds, and controls stay responsive while the round timer runs and the live event feed stream is active."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.14"
name = "hydrated_content_flash"
description = "Statically rendered content visibly flashes and is replaced by different client content after hydration — mismatched text, reflowing layout, or restyled elements between first paint and the islands becoming interactive."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, console message, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
