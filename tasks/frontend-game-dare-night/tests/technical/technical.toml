[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "console_clean_no_hydration_issues"
description = "Loading the app and performing a full workflow of setup, draw, Done, Skip, play through a Winner, adding a custom card, Export Session, Import Session, and exercising the live event feed produces a console free of errors, warnings, and hydration mismatch messages."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "custom_cards_and_record_persist"
description = "A custom card added through the form still appears in the custom-card list and is drawable after a full page refresh, and the Dare Night record still shows after a refresh, proving localStorage persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "midgame_and_checkpoint_restore"
description = "After resolving a couple of turns — with or without an explicit Save Progress — and performing a full page refresh, the app restores the same players in the same order, each player's points and forfeits, and the same current turn rather than returning to an empty setup screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "deleted_custom_card_stays_gone"
description = "A custom card that is deleted and confirmed does not reappear in the list after a page refresh, proving the deletion itself persisted."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "rapid_controls_remain_exact"
description = "Toggling the round timer across several draws, driving 25 rapid repetitions of the primary game controls including Done and Export Session, and cycling the live event feed leave the final visible state exact with no overlapping countdown, accumulating duplicate loop, blank screen, or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "keyboard_operability_complete"
description = "Every interactive control on the setup and play screens is reachable and operable with the keyboard alone, with a visible focus indicator shown on each control as Tab moves through them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "dialog_focus_management"
description = "Confirmation dialogs trap Tab focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "selected_state_exposed_to_at"
description = "Category chips and intensity buttons expose their selected state in the accessibility tree rather than through color alone, and inline validation errors are rendered next to the field they describe and announced to assistive technology when they appear."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "interactive_within_two_seconds"
description = "On a local cold load the setup screen renders and responds to input within 2 seconds, and controls stay responsive while the round timer runs and the live event feed stream is active."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.15"
name = "export_import_round_trip_technical"
description = "Export Session after play and Import Session of that dare-night-session-v1 JSON restores the same players, points, forfeits, and turn or winner state without console errors or a blank screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "field_contract_validation_blocks_submit"
description = "Player name outside 1 to 20 characters and custom-card prompt outside 8 to 200 characters keep their submit controls disabled with inline errors naming the fields; no partial invalid record is committed."
type = "binary"
weight = 1.0

