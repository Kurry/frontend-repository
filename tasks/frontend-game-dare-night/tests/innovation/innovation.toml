[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "polished_winner_celebration"
description = "Beyond the minimum Winner text, the finishing moment includes a polished celebration treatment that still respects reduced-motion."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.2"
name = "export_preview_clarity"
description = "Beyond a raw download, Export Session or Copy Session JSON offers a clear preview or confirmation that names dare-night-session-v1 fields the user is about to take away."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.3"
name = "live_bonus_integrates_with_scores"
description = "Beyond an isolated feed, live-bonus totals are presented in a way that clearly relates to the player roster without confusing base points."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.4"
name = "thoughtful_empty_and_resume_guidance"
description = "Beyond bare controls, empty custom-card and Resume Saved Session affordances explain the next step in plain language."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "11.5"
name = "intensity_weighting_feel"
description = "Beyond a labeled intensity toggle, Mild/Spicy/Wild produce a clearly felt difference in drawn-card mix during play."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app includes a noteworthy, browser-observable enhancement beyond the written specification that is not covered by any other criterion in this file and meaningfully improves Dare Night play, export clarity, or party hosting without breaking required behaviors. Name the enhancement and cite concrete evidence. If nothing beyond the spec is present, answer no."
type = "binary"
weight = 0.5
optional = true
