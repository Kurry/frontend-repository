[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "setup_screen_with_win_target_and_export"
description = "On load, the app shows a Dare Night setup screen with a players panel, Icebreaker/Truth/Dare/Wild category chips, Mild/Spicy/Wild intensity buttons, a round-timer switch, a custom-card form, a First to 10 win-target readout, Export Session and Import Session controls, and a Start game control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "start_requires_valid_setup"
description = "When fewer than 2 valid names are entered or all categories are deselected, Start game stays disabled and a visible inline error appears next to the offending control; after adding 2 unique names and keeping a category selected, Start game becomes enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "duplicate_name_rejected"
description = "When a name duplicating an existing player is entered, it is rejected with a visible inline error and is not added to the roster."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "start_game_shows_play_screen"
description = "After pressing Start game, the play screen appears without a full page reload and shows the first player's turn above a Draw card control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "draw_card_reveals_panel"
description = "After pressing Draw card, a white card panel reveals a category label, an intensity badge, and centered prompt text at least 18px, with the current player's name shown above it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "done_and_skip_resolve_turns"
description = "After pressing Done, the current player's points increase by 1 and the turn advances to the next player; after pressing Skip on a later turn, a forfeit is logged with no point and the turn advances."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "single_category_filters_deck"
description = "After starting a game with only one category selected and drawing several cards, every drawn card's category label matches that single selected category."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "custom_card_persists_after_refresh"
description = "After adding a custom card via the form, a transient confirmation appears and the card is listed; after a full page refresh the custom card still appears in the list, proving localStorage persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "custom_card_delete_confirmation"
description = "When a custom card's Delete control is pressed, a confirmation step is required, and cancelling it leaves the card in place while confirming removes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "scoreboard_lists_sorted_scores"
description = "After opening View scores, every player is listed with points and forfeits sorted by points descending, and resolving one more turn updates the scoreboard immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "round_timer_forfeit_on_zero"
description = "When the round timer is toggled on and a card is drawn, a 15-second countdown runs and, if it reaches zero before Done or Skip, the card is logged as a forfeit for the current player and the turn advances."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "deck_reshuffles_without_repeat"
description = "After drawing until the selected-category deck is exhausted, the deck reshuffles automatically, a Deck reshuffled confirmation appears, and the same card is not drawn twice in a row across the reshuffle boundary."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "undo_restores_prior_card"
description = "After pressing Done, Undo last turn is enabled; pressing it removes the awarded point, returns the turn to that same player, re-shows the exact card that was on screen rather than a new one, and cannot be used a second time on the already-reverted action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "live_feed_out_of_order_and_reconnect"
description = "On the live event feed, pressing Start begins delivery and the status reads Active; pressing Pause stops value changes; delivering events out of order and then Reconnect leaves the per-player bonus totals matching logical-timestamp order with duplicates ignored and the status reading Caught up."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "record_survives_reset_and_midgame_restore"
description = "After resolving turns to raise a player's total above any prior record, pressing Start new game and confirming returns to the setup screen with players and scores cleared and no Winner banner while the Dare Night record still shows the new higher total, and a mid-game refresh instead restores the same players, points, forfeits, and current turn."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "roster_requires_unique_names"
description = "The setup screen accepts 2 to 8 player names, requires each name, and rejects a case-insensitive duplicate with a visible inline error rather than adding it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "roster_caps_at_eight"
description = "The roster caps at 8 players and an empty or whitespace-only name is never added."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.18"
name = "second_category_filter_round_trip"
description = "After returning to setup from a game played with only Dare selected and starting a new game with only Truth selected, every card drawn in the new game shows the Truth category label, proving the toggles re-filter the deck between games rather than being cosmetic."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "wild_intensity_weights_deck"
description = "Selecting the Wild intensity weights the deck toward Wild-tagged cards, and exactly one intensity is active at a time."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.20"
name = "done_updates_three_surfaces_without_reload"
description = "With 3 players set up, pressing Start game, drawing a card, and pressing Done updates three surfaces at once without any page reload: the resolving player's scoreboard points rise by exactly one (count measured immediately around the press), the turn indicator above the card advances to the next player in join order, and the scoreboard ordering re-sorts if the new total changes the standings."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "double_activated_done_resolves_one_turn"
description = "Rapidly double-activating the Done button resolves exactly one turn: measured immediately around the double press, the resolving player's points rise by exactly one and the turn indicator advances exactly one position in join order."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "turn_rotation_fixed_join_order"
description = "With 3 or more players the turn rotates in a fixed repeating order that returns to the first player after the last."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "custom_card_drawable_and_empty_state"
description = "A custom card added through the form is mixed into the deck and drawable during play, and the custom-card list shows a friendly empty-state message before any card is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "short_custom_prompt_rejected_inline"
description = "Submitting the custom-card form with a prompt shorter than 8 characters is rejected with a visible message naming the field prompt and the 8-to-200 length rule, and the custom-card list count stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "custom_card_lifecycle_round_trip"
description = "Submitting a valid custom card raises the custom-card list count by exactly one and shows a transient confirmation; after a page refresh the same card is still listed and can still be drawn during play, and after its delete is confirmed and the page is refreshed the card stays gone from the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "record_line_names_holder_and_survives_reset"
description = "After a session where a player exceeds the previous best total, the setup screen's Dare Night record line names that player and their points, and the same record line persists after a page refresh and after a confirmed Start new game reset even though players and scores are cleared."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "event_log_and_bonus_totals_agree"
description = "While the live event feed stream is active, delivered values visibly change, and after a delivery sequence the applied-event log entries agree with the per-player live-bonus totals shown in the panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "undo_unavailable_when_illegal"
description = "Undo last turn reverts the most recent Done, Skip, or timer forfeit by restoring that player's points and forfeits, returning the turn to that player, and re-showing the exact card that was on screen; it is unavailable at game start and after it has already been used for the latest action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "start_new_game_preserves_record"
description = "Start new game asks for confirmation, then returns to the setup screen with players and scores cleared while the saved Dare Night record is preserved and reflects the highest single-player total reached."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "reconnect_catches_up_exactly_once"
description = "After pausing the live event feed and letting events accumulate, pressing Reconnect applies each missed event exactly once: the per-player live-bonus totals agree with the applied-event log with no double-applied entries, and the visible stream status reflects the caught-up state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "invalid_start_silently_commits"
description = "Start game commits a game with fewer than 2 players, a duplicate name, or zero categories selected instead of blocking it with an inline error."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "rapid_controls_corrupt_state"
description = "Rapidly repeating a control such as Done, Draw card, or the live-stream Start duplicates a transition, blanks the screen, or leaves the visible score or state inexact."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "selected_category_count_updates_live"
description = "Toggling a category chip flips it between selected and unselected and a visible live count of selected categories changes immediately with each toggle, matching the number of chips currently selected."
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "1.34"
name = "winner_declared_at_ten_points"
description = "When a player's points reach 10 via Done, the play screen shows a Winner announcement naming that player, Draw card / Done / Skip become unavailable, and the scoreboard marks that player as the winner — a decided end state from play."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "export_session_json_field_contract"
description = "After at least one Done and one Skip, Export Session or Copy Session JSON yields JSON with schemaVersion dare-night-session-v1, winTarget 10, players points and forfeits matching the scoreboard, and a turnLog that includes those outcomes — compiled live from the session, not a blank stub."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "save_progress_resume_across_reload"
description = "During an active game after at least one resolved turn, Save Progress shows a Saved confirmation; after a full page reload, Resume Saved Session restores the same players, points, forfeits, current turn, categories, intensity, and on-screen card if one was showing."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "import_session_round_trip"
description = "Exporting a playing or finished session and importing that dare-night-session-v1 JSON reconstructs players, points, forfeits, current turn or winner, custom cards, and turnLog to match the export."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "player_name_field_contract"
description = "Adding a player requires name as a trimmed string of length 1 to 20 inclusive that is unique ignoring case; a name longer than 20 characters or a case-insensitive duplicate shows an inline message naming the field name and is not added; Add stays disabled while name is invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "custom_card_payload_field_contract"
description = "A valid custom card requires prompt (8 to 200 chars), category (Icebreaker, Truth, Dare, or Wild), and intensity (Mild, Spicy, or Wild); Submit stays disabled until valid, and the listed card shows those same field values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "finished_game_blocks_scoring"
description = "After a Winner is declared, activating Draw card, Done, or Skip does not change any player's points or forfeits."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "export_omits_session_mutations"
description = "After awarding points or logging forfeits, Export Session or Copy Session JSON omits those mutations — players points/forfeits disagree with the scoreboard, or turnLog is empty/hardcoded — instead of reflecting the live session."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
