[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Pressing the Draw card button animates the card panel in with a short flip-and-fade transition rather than the card content snapping into place instantly."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Awarding a point, logging a forfeit, reshuffling the deck, and adding or deleting a custom card each show a transient toast that appears and then disappears on its own after a few seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Hovering a button, category chip, intensity button, or the card shows a visible hover state distinct from its resting state, and pressing a button gives immediate pressed feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Tabbing through the setup and play controls shows a clearly visible keyboard focus indicator on every interactive control."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "With the round timer on, the countdown updates each second and visibly pulses as it nears zero."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "Interactive controls show no hover state and the card content snaps in with no transition when the Draw card button is pressed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "Keyboard Tab focus is not visibly indicated on interactive controls, or focus becomes trapped inside a dialog with no way back out."
type = "binary"
weight = 0.5
negate = true
optional = true
