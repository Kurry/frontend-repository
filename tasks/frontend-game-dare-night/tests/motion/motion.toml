[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "draw_card_flip_fade_transition"
description = "Pressing the Draw card button animates the card panel in with a short flip-and-fade transition of roughly 0.2 to 0.4 seconds rather than the card content snapping into place instantly."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "toasts_auto_dismiss"
description = "Awarding a point, logging a forfeit, reshuffling the deck, and adding or deleting a custom card each show a transient toast that appears and then disappears on its own after a few seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "hover_and_pressed_feedback"
description = "Hovering a button, category chip, intensity button, or the card shows a visible hover state distinct from its resting state, and pressing a button gives immediate pressed feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "scoreboard_rows_ease_on_reorder"
description = "When a resolved turn changes the standings order, the scoreboard rows ease to their new positions rather than jumping instantly to the new order."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "timer_pulse_near_zero"
description = "With the round timer on, the countdown updates each second and visibly pulses as it nears zero."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "missing_hover_and_card_snap"
description = "Interactive controls show no hover state and the card content snaps in with no transition when the Draw card button is pressed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "confetti_misfires_or_loops"
description = "The confetti burst plays on a turn that sets no new record, loops ambiently in the background, or replays repeatedly for the same record moment."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.8"
name = "custom_card_list_animates"
description = "Adding a custom card animates the new list entry in, and a confirmed delete animates the entry out rather than removing it abruptly."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "toggle_fill_transition"
description = "Toggling a category chip or an intensity button transitions its fill and border to the new state rather than switching styles instantly."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "dialog_scoreboard_fade_scale"
description = "Confirmation dialogs and the scoreboard enter with a brief fade-and-scale transition and exit the same way rather than appearing and disappearing instantly."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "new_record_confetti_once"
description = "When a Done press made through the visible control raises a player's total above the previous all-time record, a brief confetti burst plays over the play screen exactly once for that record moment."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion enabled, the card flip, toasts, dialog transitions, the Winner celebration and the confetti burst are replaced by instant state changes and the game remains fully playable."
type = "binary"
weight = 1.0


[[criterion]]
id = "3.13"
name = "winner_celebration_on_finish"
description = "When a Done press made through the visible control brings a player to 10 points, a short Winner celebration burst plays tied to that finishing action rather than looping ambiently."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or animation that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
