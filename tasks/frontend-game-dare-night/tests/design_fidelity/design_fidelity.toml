[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_10px_scale"
description = "Paddings and margins on setup and play follow the 10px base spacing unit as multiples of 10px in the spirit of the reference overview."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Headings use Poppins-like sizing near h1 32px bold and h2 20px semibold with body near 14px and card prompts at least 18px centered, matching the instruction over conflicting screenshot type."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.3"
name = "layout_matches_reference_structure"
description = "The single-column centered Dare Night composition matches the reference overview structure for setup panels and play card area; where screenshots disagree with text, text wins."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.4"
name = "specified_state_changes_present"
description = "Selected category/intensity fills, Winner banner, and scoreboard sorting states called out in the instruction are visibly present."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.5"
name = "responsive_behavior_matches"
description = "Desktop and ~375px layouts keep the same single-column product identity shown in the reference, without inventing a conflicting dashboard chrome."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Primary near-black pills and secondary white outlined pills match the specified button treatments on Draw card, Done, Skip, and Start game."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.7"
name = "typography_hierarchy_clear"
description = "Dare Night title, section headings, and body/prompt text form a clear hierarchy consistent with the reference sections."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Selected vs unselected category chips and intensity buttons show the filled vs outlined treatments described."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.9"
name = "surface_treatments_match"
description = "White card/panel surfaces on cyan #34CDE3 match the bright cyan party look from the reference screenshots."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover/pressed feedback on pills and chips is present in the same restrained style as the reference UI."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.n1"
name = "sizing_contradicts_scale"
description = "Spacing or radii grossly contradict the 10px / 10px-radius / pill system in a way that breaks the reference look."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Primary surfaces use colors outside the cyan/white/near-black/light-cyan token set in a way that abandons the reference identity."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Card prompt text is clearly below 18px or headings collapse hierarchy versus the specified sizes."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n4"
name = "required_states_missing"
description = "Required selected-chip, Winner, or scoreboard states from the instruction are missing despite reference cues."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary controls look like unstyled browser defaults instead of the specified pills."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "Layout at 1440 or 375 clearly diverges from the single-column centered reference structure into a broken arrangement."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (card, players panel) are clipped or offscreen at the desktop overview width."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Overall structure invents a multi-dashboard chrome that no longer reads as the Dare Night reference composition."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text are visually undifferentiated versus the reference hierarchy."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n10"
name = "microinteractions_deviate"
description = "Hover/press feedback is absent or wildly unlike the restrained reference control feedback."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
