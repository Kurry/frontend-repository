[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings such as Dare Night and section titles, capitalization follows one consistent convention."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders actions, labels are specific verbs such as Draw card, Start game, Undo last turn, Export Session, Save Progress, and Resume Saved Session rather than generic labels."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders validation errors, messages name the problem and the fix (including field names name or prompt and length rules)."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders the custom-card empty state, copy explains what belongs there and how to add a card."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = "Where the app renders body copy on setup and play, wording is clear and free of obvious typos in primary chrome."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.6"
name = "terminology_consistent"
description = "Where the app names game concepts, it consistently uses Dare Night, points, forfeits, and Winner rather than swapping synonyms in primary chrome."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.7"
name = "numbers_and_targets_consistent"
description = "Where the app shows the win target and scores, First to 10 and point totals use consistent numeric wording."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.8"
name = "success_messages_specific"
description = "Where the app shows toasts such as Deck reshuffled, Saved, or Copied, the messages are specific to the action."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Where the app renders UI copy, placeholder lorem/TODO text is visible in shipped screens."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Where the app renders prominent headings or primary buttons, obvious spelling errors are present."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "15.n3"
name = "concept_names_inconsistent"
description = "Where the app names the same control, labels flip between inconsistent names for the same action across screens."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Where the app renders labels on pills and chips, text is truncated or overflowing in a way that hides the action name."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in writing that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
