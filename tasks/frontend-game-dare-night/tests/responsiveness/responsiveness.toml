[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Between 1440px and about 375px the single-column Dare Night layout stays centered and usable without a broken multi-column collapse."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "At about 375px wide, primary pills (Draw card, Done, Start game, Export Session) remain a comfortable tap size."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.3"
name = "typography_readable_across_widths"
description = "Headings and body text remain readable from 1440px down to 375px without shrinking into illegible sizes."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "no_clipping_or_overflow"
description = "Card, scoreboard, setup form, export controls, and live event feed avoid clipping or overflowing the viewport at 1440px and 375px."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "chrome_adapts_small_screens"
description = "Setup panels and play chrome reflow on small screens so Start game, Save Progress, and Export Session remain reachable."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "As width shrinks, players panel, category chips, and custom-card form stack in a readable order rather than overlapping."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "mobile_touch_controls_work"
description = "At 375px, category chips, intensity buttons, Done/Skip, and dialog confirms work with tap interaction."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At about 375px wide the app renders without horizontal scrolling."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.9"
name = "dialogs_fit_narrow_viewports"
description = "Confirmation dialogs and the scoreboard fit within the narrow viewport without off-screen actions."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.10"
name = "winner_and_export_reachable"
description = "On small screens the Winner banner and Export Session / Import Session controls remain visible and usable."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks between 1440px and 375px with overlapping or unusable regions."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "Primary controls are too small or misaligned to tap reliably at 375px."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n3"
name = "text_too_small_on_mobile"
description = "Card prompt or body text becomes unreadable at 375px."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scroll"
description = "Content is cropped or unnecessary horizontal scrollbars appear at common widths."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n5"
name = "panels_break_by_width"
description = "Players panel, scoreboard, or live feed become unusable at some width between 1440 and 375."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed chrome obscures the card, Winner banner, or primary actions."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Buttons, chips, or panels overlap at some width in the range."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n8"
name = "required_touch_actions_missing"
description = "Required tap actions (Draw, Done, category toggle) fail on a narrow viewport."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n9"
name = "dialogs_overflow_narrow"
description = "Dialogs overflow the narrow viewport so Confirm/Cancel cannot be reached."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Export Session, Save Progress, or Start game disappear at some tested width."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsiveness that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
