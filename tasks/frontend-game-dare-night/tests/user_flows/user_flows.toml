[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "setup_play_done_updates_surfaces"
description = "Completing setup with 3 players, Start game, Draw card, and Done updates scoreboard points (+1), turn indicator, and standings order without a page reload."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.2"
name = "invalid_setup_shows_inline_errors"
description = "Attempting Start game with fewer than 2 valid names or zero categories shows inline errors naming what to fix; Start game stays disabled until valid."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.3"
name = "category_filter_flow_round_trip"
description = "Playing with a single selected category then returning to setup and selecting a different single category yields only that new category's cards on the next game."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.4"
name = "custom_card_delete_updates_list"
description = "Adding a custom card then confirming Delete removes it from the list and from the drawable deck after refresh."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.5"
name = "view_scores_retains_live_totals"
description = "Opening View scores during play shows current points/forfeits; resolving another turn updates the same scoreboard without reload."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.6"
name = "empty_custom_list_after_last_delete"
description = "After deleting the last custom card, the friendly empty-state message is visible again."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.7"
name = "intensity_and_category_affect_deck"
description = "Changing intensity and category selection before Start game changes which cards appear during play rather than leaving draws cosmetic."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.8"
name = "live_feed_controls_preserve_play"
description = "Starting, pausing, and reconnecting the live event feed during play leaves the current turn and scores intact while bonus totals update per the feed rules."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.9"
name = "new_game_dialog_and_winner_flow"
description = "Driving a player to 10 points shows Winner; confirming Start new game returns to clean setup with Export/Import still available and no Winner banner."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.10"
name = "export_import_flow_without_reload_corruption"
description = "Export Session after play, Import Session that JSON, and continue or inspect scores without needing a full page reload to see restored state."
type = "binary"
weight = 1.0
[[criterion]]
id = "6.n1"
name = "primary_play_controls_missing"
description = "Draw card, Done, Skip, Start game, Export Session, or Save Progress are unavailable from the UI when the instruction requires them."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n2"
name = "done_duplicates_or_drops_points"
description = "A single Done press duplicates a point award or fails to advance the turn when it should."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n3"
name = "scoreboard_desyncs_from_turn"
description = "Scoreboard points disagree with the sequence of Done/Skip outcomes shown in the turn indicator flow."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n4"
name = "start_new_game_loses_record"
description = "A confirmed Start new game clears the Dare Night record along with players/scores."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n5"
name = "empty_custom_list_breaks_setup"
description = "The empty custom-card state blanks the setup screen or blocks Start game incorrectly."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n6"
name = "category_filter_disagrees_across_draws"
description = "During a single-category game, some drawn cards show a different category label than the selected filter."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n7"
name = "winner_flow_dead_ends"
description = "After Winner is shown there is no way to confirm Start new game and return to setup."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n8"
name = "export_dialog_blocks_navigation"
description = "Export or Import UI traps the user with no way to dismiss and continue playing or returning to setup."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n9"
name = "failed_import_lacks_feedback"
description = "Importing invalid JSON changes nothing and shows no visible rejection naming that the file is invalid."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n10"
name = "resume_requires_manual_rebuild"
description = "After Save Progress and reload, the only recovery path is manually re-entering players rather than Resume Saved Session."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
