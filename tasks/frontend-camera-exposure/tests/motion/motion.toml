[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Required hover animations are present; dial/meter/preview and mode switches animate as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Omits hover feedback on steppers or preset rows so controls feel static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Stepping a dial eases the exposure meter along the track by one increment (not an instant jump) and crossfades the shutter motion frame, driven through the real stepper controls"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "The help panel slides in from the right edge with opacity and the trigger glyph shifts from '?' to 'X' when open"
type = "binary"
weight = 0.5
optional = true
