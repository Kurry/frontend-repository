[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "run_suite_end_to_end"
description = "Selecting a suite and clicking Run Suite advances step statuses while the run log streams, the rollup reaches n of m complete, the results table populates, the bar chart redraws, the line chart gains one trend point, and a result row opens a detail panel whose prompt title, model, and score match that row — without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "create_suite_then_run"
description = "Submitting New Suite with a valid name (1 to 80 characters) and at least one prompt adds the entry with its prompt count; running it produces first results and an average score badge on the entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "failure_retry_flow"
description = "When a step exhausts retries and is marked failed, the rollup failure count increases; activating Retry resumes from that step and on success clears the failure while earlier steps' outputs remain unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "pause_resume_timeline_flow"
description = "Pausing freezes the step list and rollup at the current step; resuming continues from that step and the event timeline shows pause and resume transitions in order"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "sort_and_comparison_preserve_data"
description = "Sorting results by score ascending then descending reverses row order; toggling to comparison and back preserves matching prompt/model scores between views"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "export_flow_after_run"
description = "After completing a run, Export results shows a JSON results array whose length and scores match the table, a CSV tab with those promptTitle values, Download JSON/CSV named eval-run-results.json and eval-run-results.csv, and Copy showing Copied"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "import_round_trip_flow"
description = "Export JSON after a completed run, change the suite's latest results so the table no longer matches, then Import that JSON — the table, charts, suite badge, and a fresh export reconstruct to match the imported document"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "undo_redo_flow"
description = "Create a suite, activate Undo so the suite disappears and the count decreases by one, then Redo restores that suite with the same name and prompt count"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "reload_returns_seeded"
description = "After creating a suite, scheduling night mode, and opening the export drawer, a page reload returns seeded suites, historical runs, default view, no night-mode schedules, and no unsaved export drawer state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "delete_selected_empty_state_flow"
description = "Deleting the currently selected suite clears results and charts to an empty state with a message and a control to select or create a suite"
type = "binary"
weight = 1.0

