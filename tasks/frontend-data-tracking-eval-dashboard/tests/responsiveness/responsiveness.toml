[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "At desktop widths the suite sidebar is open by default beside the chart strip and results table; at 768px and below the sidebar collapses behind a toggle that opens it as an overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At 375px width, toolbar controls including Export results, Import results, Undo, Redo, and suite row actions remain usable tap targets"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "App title, panel headings, and table body text remain readable from desktop down to 375px without overlapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_below_768"
description = "At widths of 768 pixels and below, the suite sidebar collapses behind a toggle control that opens it as an overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "tables_scroll_in_containers"
description = "At 375px the results and comparison tables scroll within their own containers rather than forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "export_drawer_usable_on_narrow"
description = "The export drawer, import control, and Undo/Redo stay fully visible and operable at 375px rather than rendering off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px there is no page-level horizontal scrolling while browsing suites, results, comparison, and export"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_resize_to_width"
description = "Bar and line charts resize to fit the main column at desktop and 375px without overflowing"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "toolbar_remains_accessible"
description = "Fixed or sticky toolbar controls remain accessible at desktop and 375px widths"
type = "binary"
weight = 1.0

