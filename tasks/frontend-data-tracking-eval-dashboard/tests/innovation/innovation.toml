[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Beyond required motion, the app adds a polished microinteraction such as a subtle pass-rate sparkline on suite entries or a satisfying Copied confirmation treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_run_visualization"
description = "Beyond the required bar and line charts, the app adds an extra operator-helpful visualization such as a pass-rate sparkline or run-diff highlight after import"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_operator_hints"
description = "The app offers optional coachmarks or shortcut hints for Undo/Redo or Export results that go beyond bare chrome labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Charts or comparison cells provide extra usability such as click-to-filter from a bar or hover crosshair that is not strictly required"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_power_user_paths"
description = "The app supports power-user keyboard shortcuts for Undo/Redo or opening Export that go beyond basic tab operability"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "The app provides an optional preference such as default sort column or compact density that persists for the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_empty_and_export_copy"
description = "Empty states and export helper copy feel productized and specific to eval operations rather than generic placeholders"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "theme_polish_beyond_requirements"
description = "The app provides an optional density or accent personalization beyond the required Carbon chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "operator_quality_of_life"
description = "A quality-of-life affordance helpful to eval operators appears beyond the specification, such as copying a single result row or pinning a suite"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Overall polish and optional operator tools read as competition-level rather than a bare checklist implementation"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant, delightful innovation or polish beyond the specification that is NOT covered by any other criterion in this file. If present, name it and cite the concrete evidence. If already covered by another criterion in this file, answer no here."
type = "binary"
weight = 1.0
