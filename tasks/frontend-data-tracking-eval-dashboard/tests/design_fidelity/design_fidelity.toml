[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_dashboard_rhythm"
description = "Gaps between the sidebar, chart strip, results table, detail panel, and export drawer follow a regular spacing rhythm with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_hierarchy_matches_spec"
description = "The app title is larger than panel headings, which are larger than table body and label text, consistent across results, comparison, and export views"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_instruction_composition"
description = "The composition matches the specified left suite sidebar plus main chart strip over results table, with step list and timeline alongside during a run"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified transitions apply to result-row entry, chart bar growth, modal/drawer entry, and detail-panel slide when driven through real UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Sidebar collapse at 768px and no page-level horizontal scroll at 375px match the responsiveness specification"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "score_badge_colors_match_spec"
description = "Average score badges use green for 80 to 100, yellow for 60 to 79, and red below 60 as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "pass_fail_and_step_treatments_match"
description = "Pass/Fail badge colors and distinct pending/running/retrying/failed/complete step treatments match the visual specification across table and timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "chart_palette_consistent"
description = "Model-to-color mapping stays consistent between the bar chart and the comparison view"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "carbon_chrome_consistency"
description = "Modals, data table, tags/badges, toolbar, notifications, and form controls read as one consistent Carbon-based chrome system"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "export_drawer_matches_overlay_language"
description = "The export drawer tabs, preview, Download, and Copy affordances match the same overlay language as other dialogs"
type = "binary"
weight = 1.0

