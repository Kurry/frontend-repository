[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "result_rows_staggered_entry"
description = "During a run started from the real Run Suite control, result rows animate into the table one by one roughly 80 milliseconds apart rather than appearing all at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "chart_bars_grow_on_render"
description = "When a suite's results first render (driven through the real UI, not a state shortcut), the bar chart's bars grow from zero height over roughly 400 milliseconds rather than snapping to full height"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "step_status_transition_motion"
description = "Step status changes animate during a real run: the running step shows a continuous activity indicator, a completing step's status transitions with a short fade rather than snapping, and the retry backoff countdown ticks visibly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "hover_animations_required"
description = "Buttons ease background and shadow with a slight press effect on hover; suite entries, table rows, and timeline entries take a full-width hover wash; and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "modal_and_panel_transitions"
description = "The New Suite and confirmation modals enter and exit with a short opacity-plus-scale transition of roughly 200 to 300 milliseconds, the detail panel slides in from the side when a row is clicked and slides out when closed, and the scoring-breakdown disclosure expands with its chevron rotating"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "toasts_slide_autodismiss"
description = "After creating a suite, deleting a suite, and completing a run, a feedback toast slides in, remains readable long enough to scan, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "moon_badge_animates_in"
description = "Toggling Night Mode on through the real toggle animates the moon icon badge into the suite entry rather than making it appear instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, result rows and chart bars appear simultaneously without staggering or growth animation and modal, panel, and toast transitions apply instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "animation_jank_blocks_input"
description = "Animations cause visible layout jank or flicker, or block user input, while the run log is streaming or rows are animating into the table"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.10"
name = "export_drawer_slide"
description = "Driven by the real Export results control, the export drawer slides in from the side rather than snapping open, and exits the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
