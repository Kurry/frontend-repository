[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "never_run_empty_and_export"
description = "A never-run suite shows an empty state explaining that running populates results; Export results still opens with JSON version 1, suite metadata, an empty results array, and CSV with only the header line"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "suite_name_and_prompt_validation"
description = "Submitting New Suite with empty name, name longer than 80 characters, or zero prompts shows inline validation naming the field and adds no suite"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "night_window_cross_field_rules"
description = "Night Window rejects missing times, non-HH:MM values, and endTime not after startTime with inline messages naming the field, and does not save"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "import_passfail_score_mismatch"
description = "Importing JSON whose passFail is pass while score is below 70, or whose results omit promptTitle, shows an inline validation error and leaves current results unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_run_single_effect"
description = "Double-activating Run Suite starts exactly one run: one step-list fill, one results set, exactly one new trend point"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "double_create_single_suite"
description = "Double-activating New Suite Submit creates exactly one suite; the suite count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "rerun_caps_trend_at_seven"
description = "Running the same suite a second time replaces latest-run results, appends one trend point, and the trend chart never shows more than the last 7 runs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "long_title_truncation"
description = "A prompt title longer than 60 characters truncates with an ellipsis in the results row and shows in full in the detail panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "timeline_filter_empty_state"
description = "Filtering the event timeline to a status with no entries shows an empty state message in the timeline region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "undo_redo_noop_safe"
description = "Undo with no prior suite mutation leaves the suite list unchanged; Redo with nothing to redo is a no-op"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_never_run_shows_blank_table"
description = "A never-run suite shows a blank results table with no empty-state explanation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "invalid_import_mutates_results"
description = "An invalid import payload changes the results table or suite badge despite showing or omitting an error"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "double_submit_duplicates"
description = "Double-activating Run Suite or New Suite Submit produces duplicate runs or duplicate suite entries"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "delete_selected_leaves_stale_results"
description = "Deleting the selected suite leaves the previous suite's results or charts visible without an empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "trend_exceeds_seven_points"
description = "The trend chart plots more than the last 7 runs for a suite"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case handling that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
