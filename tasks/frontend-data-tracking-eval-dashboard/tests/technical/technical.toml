[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared state: a step advancing during a run updates the step list, the event timeline, and the rollup together; a completed run updates the suite entry, results table, both charts, and the export preview together; suite edit/delete and undo/redo are reflected in every view where the suite appears, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after creating, editing, deleting, running, pausing, scheduling, exporting, importing, and undoing suites, and a page reload returns the app to its seeded state (seeded suites, historical runs, default view, no night-mode schedules)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean"
description = "The console is free of errors and warnings on first load and stays clean while creating, editing, deleting, running, pausing, retrying, scheduling, exporting, importing, undoing, and redoing suites and switching views"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "cold_load_interactive_2s"
description = "The app is interactive (suite list and toolbar controls respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "responsive_during_streaming"
description = "While a run is streaming its log and advancing steps, the UI stays responsive under rapid repeated input — quick suite switches, rapid sort clicks, fast view toggles — with no hangs, dropped interactions, or views showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus"
description = "Every interactive control — suite entries, toolbar controls including Export results, Import results, Undo, and Redo, table headers, row actions, step retry and pause/resume controls, form fields — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), with a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "modal_focus_trap_escape"
description = "The New Suite, Edit Suite, and confirmation modals and the export drawer trap keyboard focus while open, close on the Escape key, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "aria_live_run_announcements"
description = "The completion of an eval run and a step entering the failed state are announced through an aria-live region in addition to their visual indication"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "labels_and_error_association"
description = "Form fields in the New Suite, Edit Suite, and night-window forms have visible labels, and each validation message names the field it belongs to and renders in association with that field"
type = "binary"
weight = 1.0


[[criterion]]
id = "2.12"
name = "export_import_live_from_store"
description = "Export JSON and CSV compile from the shared results store so a completed run changes the next export preview, and a successful Import updates the table, charts, and suite badge from that same store without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "schema_validation_visible"
description = "Suite, night-window, and import forms reject invalid API-shaped payloads with inline per-field errors naming the field, and do not mutate suites or results on rejection"
type = "binary"
weight = 1.0

