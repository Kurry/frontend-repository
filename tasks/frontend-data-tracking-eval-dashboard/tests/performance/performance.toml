[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive (suite list and toolbar respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser console shows no errors or warnings on load or during create, run, export, import, undo, and view toggles"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "export_drawer_opens_quickly"
description = "Opening Export results and switching JSON/CSV tabs applies without visible freezing"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "run_shows_streaming_progress"
description = "During a run, step statuses and the streaming run log provide progressive feedback rather than a blank wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "results_table_stays_responsive"
description = "Sorting and suite switches on a seeded results table remain responsive without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "While a run is streaming, suite switches, sort clicks, and view toggles remain interactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "chart_motion_stays_smooth"
description = "Chart bar growth and result-row stagger maintain smooth motion without jank during a real run"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid suite switches, sort clicks, view toggles, and export-drawer opens do not hang or drop interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "failed_step_stays_operable"
description = "When a step fails and shows Retry, the rest of the UI (pause/resume, suite list, export) remains operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the suite list and toolbar are interactive on local cold load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings appear in the console during run, export, import, or undo flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "export_or_sort_blocks_ui"
description = "Opening the export drawer or sorting the results table blocks or freezes the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "streaming_run_hangs_ui"
description = "A streaming run causes the UI to hang so suite switches or pause/resume cannot be activated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_results_kill_frame_rate"
description = "Seeded multi-prompt results and chart updates kill the frame rate during a run"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Row stagger or bar growth makes toolbar or table input unresponsive"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while charts or Carbon chrome finish loading"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Repeated runs visibly degrade responsiveness as if resources are leaking"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "During a run, the step list and run log stay blank with no progressive status"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid suite switches, double Run Suite, or export/import edge use"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
