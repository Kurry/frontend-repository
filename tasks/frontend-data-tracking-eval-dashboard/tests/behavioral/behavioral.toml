[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seeded"
description = "Multi-facet round-trip: create a suite, toggle Night Mode, sort results descending, open comparison, then reload — all facets coherently reset to the seeded baseline (seeded suites, historical runs, default view, no night-mode schedules), never a mix of persisted and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "score_sort_reversal"
description = "Sort-reversal proof: sort the results table by score ascending, note the order, then sort descending; the order reverses relative to ascending"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "charts_track_new_run"
description = "Derived-view sensitivity: complete a new run and confirm the bar chart redraws with new per-model averages and the trend line gains a new point rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "comparison_echoes_results"
description = "Cross-view echo: note a prompt's score in the results table, switch to comparison, and confirm the same prompt/model cell shows that score without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "suite_count_delta_exact"
description = "Count-delta integrity: measure the suite list count immediately before and after a valid New Suite submit; the delta is exactly +1"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "two_runs_differ"
description = "Input-dependent output: run the same suite twice and confirm the two result sets are not byte-identical in scores and latencies"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "export_contains_session_run"
description = "Full-pipeline export probe: complete a run, open Export results, and confirm the JSON results array length equals the visible table row count and each exported score matches the corresponding row"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "import_export_round_trip"
description = "Edge-state round-trip: export JSON after a run, overwrite latest results so the table differs, import the JSON, and confirm table, charts, suite badge, and a fresh export match the imported document"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_round_trip"
description = "Undo round-trip: create a suite, Undo removes it, Redo restores the same name and prompt count, and the suite count returns to the post-create value"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "export_omits_completed_run"
description = "After completing a run, the export JSON contains wrong scores relative to the visible results table or a mismatched result count"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_charts_ignore_run"
description = "Completing a new run leaves the bar chart and trend chart identical to their pre-run state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "identical_rerun_hardcoded"
description = "Two runs of the same suite yield byte-identical scores and latencies"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "partial_reload_persistence"
description = "After reload, some session mutations survive while others reset, producing incoherent partial persistence"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
