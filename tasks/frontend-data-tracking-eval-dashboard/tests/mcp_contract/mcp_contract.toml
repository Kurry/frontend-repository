[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All contract-mandated modules are initialized and bound: entity-collection-v1, command-session-v1, browse-query-v1, and artifact-transfer-v1"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers for suite entity ops, session start/pause/resume/restart, browse destinations, and artifact export/import/copy call the same application logic as the visible UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations and destinations from the contract bindings are available — no undeclared entity ops, destinations, or artifact formats"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation: suite create/select/update/delete/toggle, session start/pause/resume/restart, browse open to results/comparison/export-drawer, and artifact export/import/copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, delete, and toggle on suite work through WebMCP and update the visible suite list and related surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_operations_are_bound"
description = "Session operations start, pause, resume, and restart are bound and drive the same run controls as the visible Run Suite / pause / resume / restart UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations results, comparison, and export-drawer; filters timeline-status; and sorts prompt-title, model, score, latency, tokens, pass-fail match the allowed specification"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_transfer_bound"
description = "Artifact-transfer operations export, import, and copy are bound with export formats json and csv and import mode results-json; invoking export/import updates the same export drawer and results surfaces as the UI without returning raw file/blob/base64 contents"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface and invoke the registered tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling is unbound, missing, or a no-op for mandated suite, session, browse, or artifact operations"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "Handlers do not match UI logic because suite, run, or export/import actions mismatch or state does not sync between WebMCP and the visible dashboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations, entity operations, or artifact formats beyond the contract bindings are exposed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation for suite CRUD, session run controls, or artifact export/import/copy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "WebMCP form or import validation bypasses lead to inconsistent MCP and UI state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for mandated tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "A required module among entity-collection-v1, command-session-v1, browse-query-v1, or artifact-transfer-v1 is not implemented"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
