[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The app's main h1 heading computes to the ui-sans-serif/system-ui fallback stack at 96px, and an h2 heading computes to 48px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Ordinary body text, such as a task title, computes to the Arial fallback stack at 10px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "In the Light theme, the page background, primary text, and accent colors compute to #FFFFFF, #0F172B, and #00BC7D respectively"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "New Root Task, Add Child, and Export as Text render with a #00BC7D background, white text, 16px border radius, and a visible soft elevated shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Move Up, Move Down, Move To, and Archive render with a white background, #0F172B text, a visible #E2E8F0 border, 16px border radius, and no drop shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "Task-row panels render with sharp 0px corners and consistent spacing following an 8px-based rhythm"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The same tag's color chip renders identically on a node row, in the toolbar's tag filter bar, and in the Tag manager"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "3_8"
description = "At approximately 375px wide, the app shows no horizontal scrolling and no row or control overlaps or clips"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "3_10"
description = "Task-row panels or the primary/secondary buttons render with rounded corners instead of the specified sharp-cornered and 16px-radius button treatments"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.11"
name = "3_11"
description = "Button labels are long descriptive phrases or ALL CAPS instead of the short verb-led labels named in the spec (New Root Task, Add Child, Move Up, and so on)"
type = "binary"
weight = 0.5
negate = true
optional = true
