[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "cf.c1"
name = "renders_canvas"
description = "The application visually displays the essential elements for the negative stage and mask canvas: a synthetic negative, the 160x40 paper strip, zone dividers (z-00 to z-07), pass masks, selected mask handles, cell grid at inspection zoom, and live millimeter rulers."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c2"
name = "supports_dragging"
description = "Users can drag a mask edge (e.g., pass-04 left edge from 80 to 100). During the drag, a transient preview shows old/new outlines, exact bounds, changed cell patterns, and derived data before commitment."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c3"
name = "invalid_drag_snaps_back"
description = "If the user drags a mask boundary out of bounds or to an invalid configuration, the preview visibly resists and upon release snaps back to the original geometry without triggering a canonical mutation event."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c4"
name = "keyboard_traversal"
description = "Keyboard interactions (Alt+Arrow and Alt+Shift+Arrow) successfully move and resize the focused mask edge in exact millimeter increments."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c5"
name = "pass_stack"
description = "The pass stack correctly shows the pass order, authored and effective duration, exact mask dimensions, calibration source/revision, and the zones/cells covered."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c6"
name = "intersection_matrix"
description = "An intersection matrix accurately displays the crosses between passes and zones. Edge-touching passes yield zero-area overlaps without counting as covered cells."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c7"
name = "zones_update"
description = "Upon confirming the pass-04 mutation, exactly 192 cells are removed from its coverage, zone z-04 drops from 100 to 80 deciseconds, and the density curve, histogram, and contact sheet update correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c8"
name = "linked_evidence"
description = "Brushing a strip range (e.g., z-03...z-05) selects the intersecting cells, which highlights the identical selection on the density curve, histogram, contact sheet, cell inspector, and rank table."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c9"
name = "preferred_zone_decision"
description = "Selecting z-04 as the preferred zone creates a decision event with correct metrics, rationale, and sources. A subsequent pass mutation correctly marks this decision as stale, requiring reconfirmation while preserving the parent."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c10"
name = "calibration_rebase"
description = "A correction (e.g., output factor 1.0 to 0.9 for pass-04) changes the effective exposure (e.g., z-05 drops to 118.0) but does not alter the authored duration or mask bounds, and appending a rebase event preserves the original decision lineage."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c11"
name = "selective_undo"
description = "The event DAG accurately displays history. Selectively undoing a view-filter event leaves the structural pass mutation, zone decision, correction, and notes intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c12"
name = "approval_process"
description = "The review and approval step blocks completion until a valid pass edit, fresh zone decision, correction rebase, note, and zero dangling records exist, freezing the state hashes upon successful approval."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c13"
name = "export_artifact"
description = "Upon successful approval, exporting generates a valid ZIP file with manifest.json, darkroom-project.json, passes.csv, zone-samples.csv, test-strip-proof.svg, mask-plan.svg, events.ndjson, print-recipe.txt, and darkroom-project.schema.json."
type = "binary"
weight = 1.0

[[criterion]]
id = "cf.c14"
name = "json_import"
description = "Importing a valid project JSON reliably regenerates all derived visual evidence deterministically and correctly restores the session without changing the state incrementally on failure."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core_features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
