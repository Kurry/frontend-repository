[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_consistent_rhythm"
description = "Padding and gaps across the repository list, scan panel, tree, and export chrome follow a consistent spacing rhythm rather than arbitrary one-off gaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_instruction_hierarchy"
description = "Panel titles are visibly larger/heavier than row text as specified; repository, document, and timeline rows share one compact body size"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "two_panel_layout_matches_instruction"
description = "The desktop composition matches the specified left repository list / right tree-or-viewer workspace rather than an unrelated marketing or card-grid layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes — row enter/exit, progress fill, disclosure open/close, modal/export/palette enter — animate as described rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_instruction"
description = "The 1024px side-by-side vs stacked behavior and 375px no-page-horizontal-scroll rule match the instruction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_carbon_shell"
description = "Structured list, modal, progress, checkboxes, and toggles read as one coherent Carbon-based control system rather than mixed default browser widgets"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "status_chips_match_specified_language"
description = "Pending/running/complete/failed/retrying chips match the specified distinct labelled language"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "export_surface_matches_spec"
description = "Export presents format tabs, scrollable preview, and Copy/Download as specified rather than a bare download-only link with no preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "danger_and_focus_treatments_match"
description = "Failed steps and validation messages share one danger treatment; focus rings are visible on interactive controls as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "iconography_matches_single_set"
description = "Toolbar, rows, steps, timeline, export, and palette icons come from one consistent set at consistent sizes"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_rhythm"
description = "Adjacent scanner regions use chaotic unrelated spacing that breaks the composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_coherent_system"
description = "Surfaces and accents clash with no coherent Carbon/token system (random rainbow chrome)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "hierarchy_mismatches_instruction"
description = "Panel titles and row text are the same size/weight with no visible hierarchy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required row, progress, disclosure, or modal animations are missing or are instant hard cuts when motion is allowed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Primary list/progress/modal controls are unstyled browser defaults instead of the specified component system"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "At 1024px or 375px the layout is misaligned versus the specified side-by-side/stack rules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Export tabs, palette, or repository actions are clipped or off-screen at desktop or 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_instruction"
description = "The primary structure is not a repository-list-plus-tree/viewer scanner workspace"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_undifferentiated"
description = "Headings and body/row text are visually undifferentiated across panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable design-fidelity defect versus the instruction that is NOT covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered — even partially — by another criterion in this file, answer no here."
type = "binary"
negate = true
weight = 1.0
