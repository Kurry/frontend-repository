[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_consistent_rhythm"
description = "Padding and gaps across the repository list, scan panel, tree, and export chrome follow a consistent spacing rhythm rather than arbitrary one-off gaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_instruction_hierarchy"
description = "Panel titles are visibly larger/heavier than row text as specified; repository, document, and timeline rows share one compact body size"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "two_panel_layout_matches_instruction"
description = "The desktop composition matches the specified left repository list / right tree-or-viewer workspace rather than an unrelated marketing or card-grid layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes — row enter/exit, progress fill, disclosure open/close, modal/export/palette enter — animate as described rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_instruction"
description = "The 1024px side-by-side vs stacked behavior and 375px no-page-horizontal-scroll rule match the instruction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_carbon_shell"
description = "Structured list, modal, progress, checkboxes, and toggles read as one coherent Carbon-based control system rather than mixed default browser widgets"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "status_chips_match_specified_language"
description = "Pending/running/complete/failed/retrying chips match the specified distinct labelled language"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "export_surface_matches_spec"
description = "Export presents format tabs, scrollable preview, and Copy/Download as specified rather than a bare download-only link with no preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "danger_and_focus_treatments_match"
description = "Failed steps and validation messages share one danger treatment; focus rings are visible on interactive controls as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "iconography_matches_single_set"
description = "Toolbar, rows, steps, timeline, export, and palette icons come from one consistent set at consistent sizes"
type = "binary"
weight = 1.0

