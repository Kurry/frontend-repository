[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_stack"
description = "At 1024 pixels and above the repository list and the tree/viewer panel sit side by side; below 1024 pixels they stack vertically with the repository list first"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At 375px width primary controls (Add repository, Scan Now, checkboxes, Export) present adequately large tap targets rather than tiny overlapping hit areas"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_remains_readable"
description = "At narrow widths panel titles and row text remain readable without shrinking into illegible sizes"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears; the file viewer scrolls its long lines within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "Toolbar actions, Export tabs, Copy, Download, and the command palette stay fully visible and operable at small widths rather than rendering off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "Below 1024px the stacked order keeps the repository list first, then tree/viewer, with scan panel chrome still reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_width_controls_operable"
description = "At 375px width Scan selected, pattern toggles, and type filters remain operable without requiring horizontal page scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px width the document does not introduce page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "viewer_scrolls_internally"
description = "Long lines in the file viewer scroll within the viewer container rather than forcing page-level overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_overlays_remain_accessible"
description = "Export panel and command palette remain fully on-screen and closable at 375px width"
type = "binary"
weight = 1.0

