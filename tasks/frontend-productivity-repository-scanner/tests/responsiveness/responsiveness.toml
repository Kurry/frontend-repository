[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_stack"
description = "At 1024 pixels and above the repository list and the tree/viewer panel sit side by side; below 1024 pixels they stack vertically with the repository list first"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "At 375px width primary controls (Add repository, Scan Now, checkboxes, Export) present adequately large tap targets rather than tiny overlapping hit areas"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_remains_readable"
description = "At narrow widths panel titles and row text remain readable without shrinking into illegible sizes"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears; the file viewer scrolls its long lines within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "Toolbar actions, Export tabs, Copy, Download, and the command palette stay fully visible and operable at small widths rather than rendering off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "Below 1024px the stacked order keeps the repository list first, then tree/viewer, with scan panel chrome still reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_width_controls_operable"
description = "At 375px width Scan selected, pattern toggles, and type filters remain operable without requiring horizontal page scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px width the document does not introduce page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "viewer_scrolls_internally"
description = "Long lines in the file viewer scroll within the viewer container rather than forcing page-level overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_overlays_remain_accessible"
description = "Export panel and command palette remain fully on-screen and closable at 375px width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Crossing the 1024px breakpoint leaves overlapping panels or a broken two-column layout"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 375px width toolbar or row action hit targets are too small or misaligned to use reliably"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "At 375px width body or label text is illegibly small"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "At 375px width content is cropped or page-level horizontal scrollbars appear unnecessarily"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_or_list_breaks_by_width"
description = "The repository list becomes unreachable or collapses incorrectly below 1024px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed toolbar or overlay chrome obscures repository rows or Export controls at narrow width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Repository rows, filters, or Export tabs overlap illegibly at some tested width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_narrow_actions_missing"
description = "At 375px width Add repository, Scan Now, or Export cannot be activated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "viewer_forces_page_overflow"
description = "Long file-viewer lines force page-level horizontal overflow instead of scrolling inside the viewer"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable responsiveness defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
