[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_for_list_and_tree"
description = "Removing every repository shows designed empty states in the repository list and document tree; when type filters plus disabled patterns match no documents, the tree shows an empty-state message instead of a blank area."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "path_field_validates_inline"
description = "Empty, whitespace-only, and over-260-character paths show inline validation naming the path field before submit and add no row."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "import_and_pattern_errors_actionable"
description = "Import payloads that fail the Scan Index field contract and toggling off the last enabled pattern show actionable messages naming the offending field or problem."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "remove_asks_confirmation"
description = "Remove asks for confirmation before deleting a repository; canceling leaves the row and its documents intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "scan_shows_loading_and_progress"
description = "Scan Now shows an inline loading indicator and the scan panel progress bar / step statuses while the simulated scan runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_and_undo_paths"
description = "Destructive Remove supports cancel; Undo/Redo are disabled at empty-stack boundaries and never throw or corrupt repositories when activated there; a new mutation after Undo clears redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "no_concurrent_scan_and_empty_batch"
description = "Clicking Scan Now on a repository that is already scanning does not start a second concurrent scan; Scan selected with no checkboxes selected starts no scans."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_interactive_tags"
description = "Toolbar buttons, checkboxes, pattern toggles, Export tabs, and palette rows use semantic interactive elements (button, input, checkbox) rather than clickable bare divs without roles."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modals_support_escape_and_focus_return"
description = "Add repository, Export, and command palette close on Escape and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "long_scan_shows_progress_and_rollups"
description = "During a long simulated scan the progress bar, step list, and live rollups remain visible and update rather than leaving a blank waiting screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty repository list or zero-match filtered tree has no empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Path validation, pattern, or Import field-contract failures appear only in the console with no visible inline/message feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Scan Now, Copy, Download, or Import success/failure produces no visible feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Remove deletes a repository immediately with no confirmation step."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Primary scanner controls are non-semantic clickable elements without button/checkbox roles or keyboard operability."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Add repository, Export, or command palette cannot be dismissed with Escape."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Invalid path or Import field-contract failures display a confusing delay before any validation, or the visible message omits the field name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Primary actions lack discernible text labels (icon-only without accessible name) for Add repository, Scan Now, Export, or Import."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "import_accepts_invalid_field_contract"
description = "Importing JSON that fails the Scan Index field contract still replaces repositories, tree, or patterns."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable edge-case defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
