[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Multi-facet round-trip (in-memory): add a repository, run a scan, disable a pattern, expand a findings disclosure, select two checkboxes, and open Export; then reload. Confirm every facet coherently resets to the seeded baseline — at least 3 repositories with at least 8 documents each, default patterns enabled, empty undo/redo stacks, no scan running, no import overlay — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "type_filter_reversal_proves_live_tree"
description = "Filter-reversal proof (genre stand-in for sort reversal): check only CLAUDE.md and note the narrowed tree and counts, then check only README and note a different set, then uncheck all types. Confirm the full tree returns — proving the tree is derived from the live documents index, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "pattern_toggle_derived_scan_sensitivity"
description = "Derived-view sensitivity: disable the README pattern, rescan a repository, and confirm the tree shows no README documents for that repository afterward; re-enable the pattern, rescan, and confirm README documents return — not an identical tree regardless of pattern input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "rename_echoes_across_list_and_export"
description = "Cross-view echo: rename a repository display name; without reload confirm the new name appears in the repository row and in the Export Scan Index JSON / Inventory Markdown previews that reference that repository."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "add_repository_count_delta_exact"
description = "Count-delta integrity: measure the repository row count, submit one valid Add repository form, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_paths_different_export"
description = "Input-dependent output: add repository path A, export and note JSON/Markdown text; remove it (or undo), add a clearly different path B, export again. Confirm the two export texts differ in the ways the paths dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_scan_and_filter_flows"
description = "Interleaved-flow integrity: start a scan on one repository, switch type filters while it runs, open a document from another repository in the viewer, then pause the scan; confirm the filter and viewer state persist and the scan panel still matches the active scan without corrupting either flow."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_repositories"
description = "Edge-state round-trip: remove every repository (list and tree empty states visible), then add two valid repositories and scan one; confirm empty states clear, both rows appear, and the tree shows documents for the scanned repository."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_preserves_index"
description = "Mutate → derived → export → import: add a distinctive-path repository, complete a scan so its document count is non-zero, confirm Export JSON/Markdown reflect it; Download Scan Index JSON; mutate state away; Import the downloaded JSON; confirm list, tree, patterns, and Export return to the imported values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_round_trip_restores_all_surfaces"
description = "Undo round-trip: add a repository (list and Export update), Undo removes it and restores prior Export text everywhere those surfaces show repositories, Redo restores the same path and display name — never a surface left stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring repositories, patterns, selection, and Export then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_tree_identical_across_filters"
description = "Changing type filters or pattern toggles leaves the document tree visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_paths_produce_identical_export"
description = "Exporting after adding two different repository paths yields byte-identical Scan Index JSON / Inventory Markdown text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_stale_until_reload"
description = "After renaming a repository or completing a scan, the list, tree, rollups, or Export previews still show stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_text_ignores_session_mutations"
description = "After mutating repositories or scan results, Export JSON/Markdown text is identical to the pre-mutation text — an export that omits the session's actual work."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_leaves_export_stale"
description = "After Undo of an add or rename, Export previews still show the mutated repository while the list restored."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
