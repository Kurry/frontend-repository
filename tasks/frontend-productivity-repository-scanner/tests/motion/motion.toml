[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "repository_row_animate_in_out"
description = "Via the real Add repository / Remove UI controls (not a WebMCP shortcut): new repository rows animate in from opacity 0 over roughly 200 milliseconds on add, and a removed row animates out rather than vanishing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "progress_bar_smooth_fill"
description = "Via the real Scan Now UI path: the progress bar fills with a smooth linear transition tied to scan progress percentage, never jumping backward"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "step_status_chip_transitions"
description = "Via the real scan UI path: step status chips transition visibly between pending, running, and complete rather than swapping instantly, and newly appearing timeline entries slide in at the top of the log"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "disclosure_and_accordion_transitions"
description = "Via the real UI controls: findings disclosures and accordion groups open and close with a short height-and-opacity transition and a rotating chevron cue"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "modal_export_palette_enter_exit"
description = "Via the real UI controls on a fresh interaction: the Add repository modal, Export panel, and command palette enter and exit with a short opacity-and-scale (or fade) transition of roughly 200 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "hover_wash_system"
description = "Buttons ease background and shadow with a slight press effect; repository rows, document rows, and timeline entries take a visible hover wash; the document hover preview fades in; form controls show focus rings — verified via computed style while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "countdown_ticks_visibly"
description = "Via the real failure-path scan UI: the backoff countdown text updates each second while waiting (Playwright-observed ticking)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion set, the progress bar jumps to its current value instantly and row, disclosure, modal, palette, and export animations apply instantly while flows remain completable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_copy_download_confirmation_motion"
description = "Via the real Export Copy and Download controls: a short confirmation appears before resetting"
type = "binary"
weight = 0.5

