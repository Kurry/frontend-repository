[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "repository_row_animate_in_out"
description = "Driven through the real UI controls (never a state-shortcut tool call): a newly added repository row animates in from opacity 0 over roughly 200 milliseconds, and a removed row animates out rather than vanishing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "progress_bar_smooth_fill"
description = "During a real scan the progress bar fills with a smooth transition tied to the progress percentage, advancing continuously and never jumping backward"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "step_status_chip_transitions"
description = "Watching a real scan, step status chips transition visibly between pending, running, and complete rather than swapping instantly, and new timeline entries slide in at the top of the log"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "disclosure_and_accordion_transitions"
description = "The findings disclosures and document type accordion groups open and close with a short height-and-opacity transition and a rotating chevron cue when activated with the real pointer or keyboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "modal_enter_exit"
description = "The Add repository modal enters and exits with a short opacity-and-scale transition of roughly 200 milliseconds when opened and closed via its real triggers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "hover_wash_system"
description = "Verified with computed styles while hovering: buttons ease background and shadow with a slight press effect, repository rows, document rows, and timeline entries take a visible hover wash, the document hover preview fades in, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "countdown_ticks_visibly"
description = "During the retry backoff, the countdown text updates each second as a visible ticking change rather than staying frozen until the retry fires"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion set, the progress bar jumps to its current value instantly and row, disclosure, and modal animations apply instantly while every feature remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "animation_jank_or_flicker"
description = "Row add/remove, disclosure toggling, or scan progress causes visible layout jank, flicker, or animations that stutter or leave elements misaligned after settling"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n2"
name = "static_interactive_chrome"
description = "Buttons, rows, checkboxes, or accordion headers give no hover, focus, or press feedback at all, leaving the interactive chrome static under the pointer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
