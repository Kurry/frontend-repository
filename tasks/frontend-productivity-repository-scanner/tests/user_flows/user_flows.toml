[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "add_and_scan_end_to_end"
description = "Create/scan flow: submitting Add repository with a valid path adds exactly one row, clicking Scan Now runs the stepped simulated scan to completion, the row's document count and last-scanned timestamp update, and the new repository's documents appear grouped in the document tree — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_path_inline_validation"
description = "Create flow: submitting Add repository with an empty, whitespace-only, or over-260-character path shows an immediate inline validation message naming the path field, and the repository count is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "rename_updates_list_and_export"
description = "Edit flow: renaming a repository display name updates that row everywhere it is referenced and updates Export Scan Index JSON / Inventory Markdown previews that name the repository — without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "remove_updates_list_and_tree"
description = "Delete flow: confirming Remove deletes the repository row and removes its documents from the document tree in the same interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "tree_viewer_switch_retains_document"
description = "View/mode switch: opening a document switches the right panel to the file viewer without a full page reload; returning to the document tree retains the repositories and filter state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_remove_reveals_empty_states"
description = "Edge: after removing every repository, the repository list shows an empty state naming what belongs there with Add repository, and the document tree shows its own empty state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "type_filters_update_tree_counts"
description = "Filter flow: checking only one document type narrows the tree to that group with matching counts; unchecking all types restores every document; opening a document from the filtered tree shows its content in the viewer."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "failure_retry_and_pause_resume_flows"
description = "Durable-scan flows: on the simulated failure path the failing step shows retrying with attempt count and live backoff countdown, then failed with Retry step which completes the scan while earlier steps keep timestamps; Pause freezes progress and Resume continues from the checkpoint with rollups matching the step list."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_artifact_copy_download_dismiss"
description = "Artifact end-state overlay: Export opens with Scan Index JSON and Inventory Markdown tabs regenerated from the session; Copy confirms on the active tab; Download is available; Escape or close dismisses and returns to the scanner."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "batch_undo_palette_and_import_recover"
description = "Recovery without reload: Scan selected on two checked repositories updates both rows; Undo then Redo restore add/rename mutations; command palette jump-to focuses a seeded repository; Import of a valid previously exported Scan Index JSON reconstructs list/tree/patterns — no dead end requiring a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Add repository, Scan Now, Export scan index, or Import scan index cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "add_fails_to_appear_or_duplicates"
description = "Submitting a valid Add repository either fails to add a visible row or adds duplicate rows for a single submit (including double-activation)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "scan_or_export_desync_surfaces"
description = "After a completed scan or rename, the repository row, document tree, rollups, and Export previews disagree about document counts or names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "panel_switch_breaks_or_loses_selection"
description = "Switching between document tree and file viewer breaks navigation or loses the selected document/repository until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "After removing every repository the UI shows a blank broken region instead of the designed empty states, or Add repository is unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_tree_disagrees_with_counts"
description = "Type filter checkboxes narrow the tree but group/document counts disagree with the visible entries."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_panel_cannot_reopen"
description = "After closing Export, the Export control cannot reopen the artifact panel with live JSON/Markdown previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "modal_or_palette_blocks_workflow"
description = "Add repository modal, Export panel, or command palette traps the user with no Escape/close path back to the scanner."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_scan_or_import_lacks_feedback"
description = "A failed scan step that exhausts retries, or an Import that fails the field contract, provides no visible error summary or validation feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in an end-to-end user flow that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
