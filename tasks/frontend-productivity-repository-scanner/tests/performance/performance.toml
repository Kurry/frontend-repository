[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "No console errors or warnings appear on load or during a full exercise including scan failure path, batch scan, export, import, undo, and rapid filter toggling"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "filter_and_panel_transitions_responsive"
description = "Type filter toggles and tree/viewer panel switches respond under roughly 100ms of perceived lag without blocking the UI thread"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_scan_has_loading_indicators"
description = "While a scan is running, the inline loading indicator and progress bar are visible so async work is never a blank wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_tree_renders_without_lag"
description = "The seeded repositories and document tree (at least 3 repos × 8 documents) render without multi-second freezes on first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "While a scan is running, filtering, opening documents, pausing, and opening Export remain interactive without hangs or dropped clicks"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "progress_animation_stays_smooth"
description = "The progress bar fill and step status transitions maintain smooth motion without sustained frame drops during a normal scan"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated filter toggling, checkbox selection, and command-palette filtering cause no hangs, duplicated rows, or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_scan_session_stable"
description = "Completing multiple scans, exports, and undos in one session does not produce growing console errors or an unresponsive UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "import_failure_stays_responsive"
description = "Importing malformed Scan Index JSON shows validation without freezing or blanking the scanner"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "A local cold load takes more than 2 seconds before the scanner is interactive"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors or unhandled rejections appear during scan, export, import, or filter flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Filter toggles or panel switches visibly block interaction for a prolonged period"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "A running scan hangs the UI so Pause, filters, or Export cannot be activated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_tree_kills_frame_rate"
description = "Rendering the seeded document tree causes sustained jank that makes scrolling or filtering unusable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Row or modal animations block clicks or keyboard input until they finish"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "export_compile_blocks_rendering"
description = "Opening Export freezes the page for a prolonged blank period before previews appear"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Leaving a scan or countdown running causes runaway memory/CPU growth that freezes the tab"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "During a scan the UI shows a blank area with no loading indicator, progress bar, or step list"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
