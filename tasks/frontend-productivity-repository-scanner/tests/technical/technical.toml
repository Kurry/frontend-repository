[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "5.1"
name = "serves_clean_and_interactive_fast"
description = "The app serves from its documented start path, renders the full scanner UI (not a blank or broken page), and is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app, including a scan with the failure path, pause/resume, batch scan, filters, pattern toggles, export, import, undo/redo, command palette, and the viewer"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.3"
name = "browser_storage_used"
description = "localStorage, sessionStorage, or another browser storage API is non-empty after a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.4"
name = "reload_returns_seeded_baseline"
description = "After changing several facets (add a repository, run a scan, disable a pattern, select rows, open Export, expand disclosures) a page reload returns the app to its seeded baseline: at least 3 seeded repositories with at least 8 documents each, default patterns enabled, empty undo/redo stacks, and no scan running — all facets reset coherently, never a mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.5"
name = "cross_view_state_coherence"
description = "A change made in one view is immediately reflected everywhere the datum appears without a reload: a completed scan updates the repository row, document tree, rollups, and Export previews together; renaming a repository updates every reference; timeline, step list, and rollups never disagree"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.6"
name = "outbound_network_requests"
description = "The network log shows outbound requests to external origins (CDN scripts, fonts, icons, analytics, or data) during load or use of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.7"
name = "responsive_during_scan"
description = "While a scan is running, filtering the tree, opening documents, pausing, and opening Export all respond without hangs, dropped interactions, or view desyncs, and rapid repeated input causes no runtime exceptions in the console"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.8"
name = "full_page_reload_on_actions"
description = "A primary action — adding a repository, starting or pausing a scan, switching the right panel, toggling filters, exporting, or undoing — triggers a full page reload instead of updating client state in place"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "5.9"
name = "webmcp_registry_matches_ui"
description = "The page exposes window.webmcp_session_info, window.webmcp_list_tools, and window.webmcp_invoke_tool, and invoking a state-changing tool produces the same rendered result, step statuses, timeline trail, and export preview state as the equivalent visible control"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "5.10"
name = "export_import_share_field_contracts"
description = "Export Scan Index JSON and Import validate against the same visible field contract (schemaVersion, patterns, repository path, document type enum); a payload that fails those rules is rejected with named-field feedback and does not partially apply"
type = "binary"
weight = 1.0

[[criterion]]
id = "5.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
