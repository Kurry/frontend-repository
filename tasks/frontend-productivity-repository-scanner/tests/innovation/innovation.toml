[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_scan_microinteractions"
description = "Optional: beyond required motion, the scanner adds delightful microinteractions around scan completion, export success, or palette selection that feel intentional and on-brand"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Optional: motion goes beyond the required row/progress/disclosure set with polished choreography that still respects reduced-motion"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "guided_first_scan_onboarding"
description = "Optional: a guided first-scan coachmark or empty-state walkthrough helps a new user complete their first repository scan without blocking required flows"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "richer_findings_visualization"
description = "Optional: findings severity visualization goes beyond the required disclosure list with clearer hierarchy or grouping while remaining readable"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "keyboard_chord_hints_in_palette"
description = "Optional: the command palette shows keyboard chord hints for actions beyond the required Cmd/Ctrl+K open shortcut"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional: a non-required preference (density, timeline default filter, or export default tab) personalizes the scanner without breaking seeded reload behavior"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "polished_empty_state_illustration"
description = "Optional: empty states use polished illustration or composition work that stays on-brand with the Carbon shell"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional: a theme or contrast preference beyond the required surfaces improves readability without violating in-memory genre rules"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "Optional: platform flourishes appropriate to a repo scanner (richer inventory markdown sections, finding severity filters in export, or multi-repo compare hints) appear beyond the written spec"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Optional: overall polish and inventiveness reach competition-level quality while still delivering every required flow"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "Optional negative: the build is a bare minimum checklist with no optional polish, coachmarks, or platform flourishes beyond the written must-haves."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "Optional catch-all: the build demonstrates a significant innovative enhancement beyond the specification that is NOT covered by any other criterion in this file. If present, name the enhancement and cite concrete browser evidence. If nothing beyond the other criteria applies, answer no."
type = "binary"
weight = 0.5
