[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "two_panel_composition"
description = "At desktop width the left panel is the repository list with consistent row anatomy including checkboxes, and the right panel switches between the document tree and the file viewer without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "progress_and_inline_loading_render"
description = "Scan progress renders as a determinate progress bar in the scan panel plus an inline loading indicator in the scanning repository's row"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "accordion_groups_with_counts"
description = "Document type groups render as accordion sections in the tree panel with rotating chevrons and per-group counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "code_viewer_monospace_surface"
description = "The file viewer renders content in a monospace type treatment with visible line numbers on a contrasting code surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "status_chip_language_with_labels"
description = "Step statuses use one consistent chip and icon language: pending, running, complete, failed, and retrying are each visually distinct and carry a visible text label, not color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "typography_hierarchy"
description = "Typography keeps a clear hierarchy: panel titles visibly larger and heavier than row text; repository rows, document rows, and timeline entries share one compact body size"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "focus_ring_and_danger_treatment"
description = "All interactive controls show a visible focus ring on keyboard focus; failed steps and validation messages use one consistent danger red treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "single_icon_set_consistency"
description = "One icon set is used consistently across toolbar, rows, steps, timeline entries, export, and palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "export_and_palette_surfaces"
description = "Export appears as a panel or modal with format tabs (Scan Index JSON / Inventory Markdown), a scrollable preview block, and Copy/Download affordances; the command palette renders as a centered overlay with a filter input and highlighted action list"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n1"
name = "mobile_overflow_or_clipping"
description = "At 375px width content clips or overflows the viewport, or page-level horizontal scrolling appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.n2"
name = "unstyled_default_register"
description = "Primary scanner chrome (list, buttons, progress, export tabs) renders as unstyled browser-default controls without a coherent designed visual system"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable visual design defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
