[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "editor_microinteraction_beyond_minimum"
description = "Beyond required hover/focus, the editor or sample buttons include an extra delightful microinteraction on press or sample selection that remains browser-observable (bonus execution polish)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "preview_transition_beyond_basic_swap"
description = "Preview updates offer an advanced transition beyond a hard cut — for example a coordinated cross-fade when samples change or when recovering from a dimmed error state — verified through real UI controls (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_workspace"
description = "A brief guided first-run or coachmark introduces the Code/Config tabs, Sample diagrams, and Actions without blocking the tool (bonus beyond required seeded workspace)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "diagram_preview_extra_usability"
description = "An interactive preview aid beyond the required render — for example zoom/pan cues that stay Playwright-observed, or a clearer type badge treatment — adds usability while staying local (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "editor_power_user_affordances"
description = "Beyond basic typing and undo, the code editor exposes an extra power-user affordance such as find, fold, or multi-cursor that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_required"
description = "Beyond required persistence of source/tab/config/theme, the app offers a small personalization (for example remembering last sample or preview zoom) that survives reload (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_mermaid_tool_narrative"
description = "The Mermaid Live Editor header, two-region workspace, and panels read as a cohesive branded diagram tool rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "theme_craft_across_surfaces"
description = "Light/dark theming craft goes beyond bare compliance — coherent recolor of header, cards, editor, preview grid, and diagram palette without a conflicting second product look (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local editor fonts or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_live_editor_feel"
description = "The overall tool feels competition-grade: live preview fidelity, sample switching, and export polish read as a professional Mermaid instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_textarea_only"
description = "The shipped UI is a bare unstyled textarea or plain text controls with no linked live preview, sample panel, or Actions immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified two-region Mermaid source-and-preview composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
