[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_two_region_workspace"
description = "At 1440px, spacing among the header, narrower left column (tabbed editor, Sample diagrams, Actions), and wider right preview follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the linked editor-preview composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_editor_workspace_spec"
description = "Header title Mermaid Live Editor, tab labels, panel titles, and monospace editor source match the reference hierarchy — chrome sans labels distinct from monospace source — not a default system UI stack for the whole tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: two-region workspace with left editor/samples/actions stack and right diagram preview on a subtle grid backdrop, plus a small diagram-type badge in the header — a live editor tool, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — preview re-render after edit, preview dim on syntax error, error-region enter/leave, theme recolor, sample swap, copy confirmation — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At about 375px vs 1280px+, responsive behavior matches the reference patterns: phone width stacks to one readable column; desktop keeps editor and preview side by side."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "editor_and_panels_styled_not_browser_default"
description = "Code/Config tab strip, editor card, Sample diagrams and Actions cards (hairline borders and soft shadows), and primary export buttons use the studio treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_header_editor_preview"
description = "Typography hierarchy clearly distinguishes the Mermaid Live Editor header, denser panel titles, and monospace source/error message body."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Tabs, sample buttons, and export controls show distinct default, hover wash, visible focus ring, active/pressed, and disabled (syntax-error) treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_and_error_banner_match_spec"
description = "Light/dark theme surfaces recolor header, editor card, panels, and preview coherently; the error region uses a dark banner with a clearly destructive-colored icon and readable monospace message body as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover wash on buttons/tabs, error-region fade/slide, preview dim cross-fade, and copy-confirmation enter/dismiss follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

