[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "workspace_opens_without_auth"
description = "The root opens directly to a Mermaid Live Editor workspace with a source editor on the left and live diagram preview on the right, with no authentication wall or unrelated starter dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_source_and_preview"
description = "On first load the code document contains the non-empty Christmas flowchart and the preview immediately renders its nodes and edges, so both panes are populated before interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "latest_source_preview_flow"
description = "Replacing the source with a valid diagram shows exactly the typed text, then re-renders matching marks after a brief settle; making a distinct second edit removes the first edit's marks and leaves only the latest diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "syntax_error_recovery_flow"
description = "Starting from a valid render, entering invalid syntax shows a Syntax error region with parser detail, dims but retains the last valid preview, and disables export/copy; correcting the source clears the error, restores full opacity, renders the correction, and re-enables actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "sample_diagram_replacement"
description = "Flowchart, Class, Sequence, Entity Relationship, State, and Mindmap are all offered; choosing two different samples in sequence replaces source and preview each time with the selected type, updates the type badge, and leaves no residual marks"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "svg_export_download"
description = "With valid source, SVG downloads the current rendered diagram in a file named like mermaid-diagram-YYYY-MM-DD-HHmmss.svg, and changing the source before a second export produces content corresponding to the new diagram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "theme_recolors_app_and_diagram"
description = "Toggling the header theme changes the header, cards, editor, panels, preview surface, and rendered diagram between coherent light and dark palettes without reloading"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "code_config_document_roundtrip"
description = "Editing Code, switching to Config, changing its seeded theme value to another valid Mermaid Config theme enum (default, base, dark, forest, or neutral), then switching back preserves the exact Code text; returning to Config preserves its edit and the preview reflects the valid configuration"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "multi_facet_reload_roundtrip"
description = "After editing source and config, selecting Config as the active tab, and choosing dark theme, a full reload restores all four facets together and renders a preview consistent with the restored documents rather than a mixed baseline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "png_and_clipboard_actions"
description = "With valid source, PNG downloads an equivalent .png image and Copy image produces visible clipboard success feedback; both actions become unavailable in the syntax-error state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "editor_undo_redo_roundtrip"
description = "Through the visible code editor, typing two distinct changes, invoking Undo, and then Redo makes the editor and live preview round-trip from latest to prior and back to latest content without losing selection or corrupting syntax"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "config_inline_validation"
description = "Entering Config text that is not valid JSON, or valid JSON that fails the Mermaid Config field contract (missing theme, theme outside default|base|dark|forest|neutral, or a non-object root), shows an inline validation message naming the theme field or the config document before apply, preserves the last valid diagram configuration, and correcting to a valid theme enum clears the error and applies the config"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "in_app_controls_only"
description = "Editing, tab switching, sample selection, theme switching, export, import, and copy remain in the workspace with no outbound navigation or backend-dependent step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "code_editor_affordances"
description = "The source pane behaves as a real code editor: it renders monospace source with visible line numbers and syntax coloring that distinguishes keywords from node text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "empty_source_stability"
description = "Clearing the source to empty keeps the workspace stable: the preview shows the error treatment or an empty-source message rather than a stale diagram presented as current, and export controls become unavailable"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.32"
name = "session_json_field_contract_export"
description = "Session JSON preview/Copy/Download conforms to the MermaidSession field contract: a single object with required schemaVersion exactly mermaid-session-v1 plus code, config (theme closed enum default|base|dark|forest|neutral), appTheme (light|dark), activeTab (code|config), and diagramType (flowchart|class|sequence|entity-relationship|state|mindmap|pie|gantt); after editing source, config.theme, sample type, and dark app theme, the preview contains those live values and every required key"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "mmd_export_matches_source"
description = "With valid source, MMD downloads a .mmd file whose text matches the Code document exactly, and the control is unavailable while the source has a syntax error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "session_json_import_roundtrip"
description = "Import of a previously exported Session JSON that satisfies the MermaidSession field contract restores code, config.theme, appTheme, activeTab, and diagramType so editor, preview, badge, Config pane, and theme match without reload; Import of parseable JSON that fails the contract (wrong schemaVersion, illegal theme/appTheme/activeTab/diagramType, or missing keys) shows validation naming the offending field and changes nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "mmd_export_import_roundtrip"
description = "With valid source, MMD download text matches the Code document; Import of that same .mmd text replaces Code and re-renders the preview to match; after a distinctive source edit, a fresh MMD export contains the new source"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "non_editor_scaffold"
description = "The primary screen is a static scaffold, authentication page, unrelated dashboard, or fixed illustration rather than an editable Mermaid source-and-preview workspace"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "stale_or_static_preview"
description = "A valid source edit leaves the preview unchanged, two different sources produce the same marks, or marks from an earlier sample remain after replacement"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "broken_export_contract"
description = "An enabled SVG/PNG/MMD/Session JSON export produces no file, a wrong extension, content that omits the session's actual source or config.theme, Session JSON missing a required field-contract key, or an image/MMD export that remains enabled while syntax is invalid"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable core-feature defect that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence that demonstrates it. If the defect is already covered even partially by another criterion, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
