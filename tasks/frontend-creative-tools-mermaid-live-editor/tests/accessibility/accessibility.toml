[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_editor_controls"
description = "Every interactive control — Code and Config tabs, Sample diagrams buttons (Flowchart, Class, Sequence, Entity Relationship, State, Mindmap and any Pie/Gantt), SVG/PNG/MMD/Session JSON/Import/Copy image actions, and the header theme toggle — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "code_config_tabs_expose_active_state"
description = "The Code and Config tabs are keyboard-operable and expose their active state to assistive technology so the selected tab is programmatically distinguishable from the inactive one (for example aria-selected or equivalent)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icon_actions_have_accessible_names"
description = "The theme toggle and each icon-bearing action control (export, copy, samples, tabs) carry an accessible name describing the action, not just an unlabeled icon."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "syntax_error_announced_via_live_region"
description = "When invalid Mermaid syntax produces the Syntax error region beneath the editor, the message is exposed through an ARIA live region so its appearance is announced, not only shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "config_validation_associated_for_at"
description = "When Config contains invalid JSON or fails the Mermaid Config field contract, or Session JSON import fails its field contract, the inline validation message is associated for assistive technology (described-by, label wiring, or live region) naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "diagram_preview_accessible_label"
description = "The rendered diagram region carries an accessible label identifying it as the diagram preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the editor-plus-preview workspace and complementary or nav regions for samples/actions/header) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Header title, tab labels, sample/action labels, error-region text, and primary controls have sufficient color contrast against their surfaces in both light and dark themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_on_tabs_and_buttons"
description = "Code/Config tabs, sample buttons, export actions, and the theme toggle use semantic button/tab roles rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, preview dim/cross-fade, error-region enter/leave, theme recolor easing, and copy-confirmation motion are removed or reduced to instant state changes while edit, sample, export, and theme flows remain completable."
type = "binary"
weight = 1.0

