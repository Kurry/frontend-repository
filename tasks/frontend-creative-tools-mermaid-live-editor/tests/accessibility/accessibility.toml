[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_editor_controls"
description = "Every interactive control — Code and Config tabs, Sample diagrams buttons (Flowchart, Class, Sequence, Entity Relationship, State, Mindmap and any Pie/Gantt), SVG/PNG/MMD/Session JSON/Import/Copy image actions, and the header theme toggle — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "code_config_tabs_expose_active_state"
description = "The Code and Config tabs are keyboard-operable and expose their active state to assistive technology so the selected tab is programmatically distinguishable from the inactive one (for example aria-selected or equivalent)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icon_actions_have_accessible_names"
description = "The theme toggle and each icon-bearing action control (export, copy, samples, tabs) carry an accessible name describing the action, not just an unlabeled icon."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "syntax_error_announced_via_live_region"
description = "When invalid Mermaid syntax produces the Syntax error region beneath the editor, the message is exposed through an ARIA live region so its appearance is announced, not only shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "config_validation_associated_for_at"
description = "When Config contains invalid JSON or fails the Mermaid Config field contract, or Session JSON import fails its field contract, the inline validation message is associated for assistive technology (described-by, label wiring, or live region) naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "diagram_preview_accessible_label"
description = "The rendered diagram region carries an accessible label identifying it as the diagram preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the editor-plus-preview workspace and complementary or nav regions for samples/actions/header) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Header title, tab labels, sample/action labels, error-region text, and primary controls have sufficient color contrast against their surfaces in both light and dark themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_on_tabs_and_buttons"
description = "Code/Config tabs, sample buttons, export actions, and the theme toggle use semantic button/tab roles rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, preview dim/cross-fade, error-region enter/leave, theme recolor easing, and copy-confirmation motion are removed or reduced to instant state changes while edit, sample, export, and theme flows remain completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "editor_controls_unreachable_by_keyboard"
description = "A Code/Config tab, sample button, SVG/PNG/Copy image control, or theme toggle cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_controls"
description = "Focused tabs, sample buttons, export/copy controls, or the theme toggle show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Tabs, sample buttons, export actions, or the theme toggle use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "error_or_active_tab_color_only"
description = "Syntax-error state or the active Code/Config tab is conveyed by color alone with no text, selected-state attribute, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "tabs_lack_programmatic_active_state"
description = "After switching to Config, assistive technology cannot distinguish the active tab from the inactive Code tab (no aria-selected, aria-current, or equivalent)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_chrome_or_error"
description = "Header labels, tab text, action labels, or the Syntax error message body are unreadable due to poor contrast against their background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "syntax_error_visual_only"
description = "The Syntax error region appears visually only with no live-region or equivalent announcement for assistive technology."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "icon_actions_missing_names"
description = "The theme toggle or an icon-bearing export/copy/sample control is missing an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Workspace headings (Mermaid Live Editor, Syntax error, Sample diagrams, Actions) skip levels or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, preview dimming, error-region enter/leave, theme recolor, or copy-confirmation transitions still animate fully."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
