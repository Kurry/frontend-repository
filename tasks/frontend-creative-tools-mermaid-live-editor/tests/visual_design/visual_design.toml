[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "editor_preview_visual_priority"
description = "A narrower left region stacking editor, samples, and actions pairs with a wider preview region, giving the source and rendered diagram clear priority over header chrome and metadata"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "controls_grouped_by_purpose"
description = "Code and Config controls are grouped with the monospace editor, sample controls occupy their own panel, and SVG, PNG, and Copy image controls are grouped in a distinct Actions panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "preview_grid_and_type_badge"
description = "The preview centers a crisp rendered SVG over a subtle grid backdrop and the header displays a compact, legible badge naming the current diagram type"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "coherent_light_dark_surfaces"
description = "Light and dark themes keep header, editor, cards, panels, preview, controls, error text, and diagram marks readable with a coherent surface and contrast system"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "tab_card_and_alert_craft"
description = "The active editor tab is unmistakable, cards use consistent hairline borders and soft shadows, buttons and toggles share one polished component language, and the syntax error is a readable dark destructive banner with icon and monospace detail"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "phone_single_column_layout"
description = "At roughly 375px wide, editor, samples, actions, and preview reflow to one readable column with reachable exports, no clipped or overlapping controls, and no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "large_diagram_containment"
description = "Rendering a sample with many nodes keeps the drawing contained inside the preview region without overflowing the page or forcing horizontal scrolling of the whole document"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "consistent_icon_set"
description = "Icons in the header and panels come from one consistent visual set, rendered at consistent sizes and weights rather than a mix of mismatched icon styles"
type = "binary"
weight = 0.5

