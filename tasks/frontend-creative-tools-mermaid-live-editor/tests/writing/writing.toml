[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Where the app renders headings, tab labels (Code, Config), panel titles (Sample diagrams, Actions), and action labels, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_export_and_copy_labels"
description = "Where the app renders button or action labels, export controls name their format (SVG, PNG, MMD, Session JSON) and the copy control names what it copies (Copy image), rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem"
description = "Where the app renders error messages, the syntax-error region surfaces the parser's actual message, and Mermaid Config or MermaidSession validation messages name the offending field (theme, schemaVersion, appTheme, activeTab, diagramType, or the config document) and the rule that failed, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_source_explains_state"
description = "Where the app renders empty-source or error feedback after clearing the editor, the copy explains the empty/error state rather than leaving a blank unlabeled void."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "chrome_and_panel_copy_polished"
description = "Where the app renders header, tab, panel, and action copy, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (diagram type in samples vs header badge, Code/Config tab names, SVG/PNG/MMD/Session JSON export wording), terminology stays consistent."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "export_filename_pattern_readable"
description = "Where the app surfaces export naming or confirmation copy related to downloads, the mermaid-diagram naming pattern remains clear and consistently presented."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "copy_confirmation_is_specific"
description = "Where the app renders Copy image confirmation, the copy states what happened (image copied) rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as Mermaid Live Editor, Code, Config, Sample diagrams, Actions, SVG, PNG, MMD, Session JSON, Copy image, or Syntax error."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same diagram-type or export concept is named inconsistently across samples, header badge, and Actions in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Tab labels, panel titles, validation messages, or action labels are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
