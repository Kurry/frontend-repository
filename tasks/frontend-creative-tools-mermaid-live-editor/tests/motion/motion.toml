[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "live_preview_in_place_transition"
description = "Typing a valid source edit through the visible editor re-renders the preview in place after a brief settle without document navigation, blank-page flash, or a stale intermediate render"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "error_dim_and_recovery_transition"
description = "Entering invalid source visibly cross-fades the retained preview to a dimmed state and correcting it returns the newly rendered diagram to full opacity"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "coordinated_theme_transition"
description = "The visible theme toggle recolors surfaces and rendered diagram together in place, without mismatched intermediate colors or a full reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "control_microinteractions"
description = "Using real pointer and keyboard paths, buttons and tabs show a hover wash and focus ring, the active tab reads distinctly, and the pressed sample control gives immediate visible state feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "sample_and_tab_content_transition"
description = "Switching Code and Config or selecting different samples replaces the affected content smoothly in place while the preview and diagram-type badge settle to the same latest state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_behavior"
description = "With prefers-reduced-motion enabled before a fresh load, preview, error, tab, and theme transitions are removed or substantially reduced while state changes remain immediately understandable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "feedback_entry_motion"
description = "Triggered through the real UI controls, the syntax-error region enters with a brief fade or slide rather than popping instantly, and the Copy image confirmation slides or fades in, remains readable, and dismisses with a fade"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.5"
name = "missing_control_feedback"
description = "Buttons, tabs, sample controls, or keyboard-focused elements remain visually inert, or their active and pressed states cannot be distinguished during interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "reload_or_motion_desynchronization"
description = "A sample, tab, theme, error-recovery, or source-edit transition reloads the page, flashes unrelated content, or leaves editor, preview, badge, and controls in visibly different states"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence that demonstrates it. If the defect is already covered even partially by another criterion, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
