[judge]
  [judge.quality_standards]
    evaluation_basis = "Did the model build a complete, usable, and functioning application that fulfills the instructions?"
    score_levels = [
      "0.0 = Blank, non-functional, or explicitly breaks constraints.",
      "0.5 = Partial implementation; functional but shallow, incomplete, or missing key aspects.",
      "1.0 = Complete, deep, and fully meets all requirements."
    ]

[[criterion]]
id = "AC-13"
title = "Authored order/selection/geometry and domain state survive; invalid import is a no-op."
description = "Export, clear, import, and inspect the edited variant record and derived state. State must perfectly round-trip. Importing invalid data makes no changes."
eval_type = "browser"
weight = 1.0
