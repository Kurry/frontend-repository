[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All contract-mandated modules — browse-query-v1, entity-collection-v1, and artifact-transfer-v1 — are initialized and bound."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers for browse, entity, and artifact operations match visible UI command logic (create/update/delete/export/import/copy update the same surfaces as the chrome controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations and destinations from the contract are available (timeline, event-detail, filters, library, export-drawer; entity create/select/update/delete; artifact export/import/copy)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation through webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations declared in the contract — create, select, update, and delete — all work against the event entity and update Library/stage surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_fields_match_api_contract"
description = "Entity fields exposed for create/update include title, type, timestamp, media-refs, year, place, categories, summary, and detail matching the HistoryEvent field contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations and filters match the allowed specification (destinations include timeline, event-detail, filters, library, export-drawer; filters include category and search)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared module routes or capabilities are exposed beyond browse-query-v1, entity-collection-v1, and artifact-transfer-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation are correctly surfaced."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound; export formats include json and csv; import modes include timeline-json; invoking export/import updates the same export drawer / collection as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "workflow_postconditions_hold"
description = "Workflow completion holds: after entity create/edit/delete, the export drawer preview includes the mutated event title with type, timestamp, and mediaRefs; importing timeline-json replaces the events collection so Library list and stage pins match the imported document."
type = "binary"
weight = 1.0

