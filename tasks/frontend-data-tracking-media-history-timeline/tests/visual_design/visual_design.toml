[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "exploration_first_composition"
description = "Timeline stage plus scrubber/library composition stays exploration-first, not a marketing card stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_state_visually_present"
description = "Empty list/filter state is visually present when no events match"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "brochure_layout_replaces_stage"
description = "Replaces the timeline with a static brochure layout and no scrub/explore stage"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "era_bands_and_category_pins"
description = "The canvas axis draws about seven labelled era bands and adaptive year ticks, and pins carry their category color"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "expressive_typography_and_paper_atmosphere"
description = "Headings and body text render in an expressive typeface (computed font-family is not Inter, Roboto, Arial, or a system default stack), and the stage carries a warm or cool paper-toned atmosphere rather than a plain white background"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "brand_header_and_document_title"
description = "The brand header shows the product name MediaHistoryTimeline with History of Media and Communication as the brand signal, the first viewport is the timeline tool itself, and the document title reflects MediaHistoryTimeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "category_color_and_detail_hierarchy"
description = "Event pins or list rows show their category color, and the detail panel presents a clear hierarchy: a kicker (year and place), a prominent title, type, mediaRefs list, category pills, summary, and detail visually distinct from the title"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "consistent_icon_set_across_chrome"
description = "Icons across the chrome (mode switch, filters, about, undo/redo, export/import, form controls) come from one consistent icon set with a uniform stroke style — no mixed icon styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "distinct_component_state_treatments"
description = "Buttons, inputs, and scrubber thumbs show distinct default, hover, focus, and disabled treatments (verified via computed styles while in each state), form fields show a distinct error treatment, and Undo/Redo show disabled treatment when stacks are empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "desktop_layout_fits_without_horizontal_scroll"
description = "At 1024px width and above, the stage, scrubber, and chrome controls are all visible without horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "narrow_width_chrome_reflow_usable"
description = "At widths of 768px and below, the chrome reflows — the header controls stack or collapse and the Library/Filter surface uses the full width — while the stage, scrubber, filtering, detail panel, and export drawer all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "mobile_viewport_overflow_or_clipping"
description = "At 375px width, content clips or overflows the viewport, or horizontal page scrolling appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.13"
name = "consistent_capitalization_convention"
description = "Headings, buttons, and category labels use one consistent capitalization convention (title case or sentence case) throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "specific_verb_action_labels"
description = "Action labels are specific verbs such as Add event, Reset filters, Export timeline, Import timeline, Undo, and Redo rather than generic labels like Submit or OK where a specific one is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "helpful_validation_and_empty_state_copy"
description = "Validation messages name the field and the fix, import errors name the import field, and the empty state copy explains what matched nothing and how to recover"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "placeholder_or_lorem_text_shipped"
description = "Lorem-ipsum, TODO, template-variable, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.17"
name = "export_drawer_tabs_and_preview"
description = "The export drawer shows Timeline JSON and Events CSV tabs with a scrollable preview plus Download and Copy affordances"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "category_tally_visually_distinct"
description = "The category tally strip is visually distinct from Library rows and updates without a layout jump that obscures the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "visual_design.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
