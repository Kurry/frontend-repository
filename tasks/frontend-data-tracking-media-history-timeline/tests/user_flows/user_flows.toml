[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Create flow: submitting a valid HistoryEvent (title, type, timestamp, mediaRefs, year, place, categories, summary, detail) adds exactly one Library row showing title and type, increases the visible count by one, updates the category tally, and shows a stage pin when in range — without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: empty title, type outside the closed enum, non-Z or cross-field-invalid timestamp, empty mediaRefs, empty place, empty summary, empty detail, missing categories, or invalid year triggers immediate inline validation naming the field and adds no event"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Edit flow: editing title, type, timestamp, mediaRefs, or year updates the Library row, pin position when year changed, open detail (including type and mediaRefs), and a subsequent export's matching event object without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Delete flow: deleting an event removes its Library row and pin, clears selection/detail, decreases the visible count by one, and drops it from the next export"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "Mode switch between Scrub/Explore and Library/Filter changes the canvas without reload and keeps the shared collection, filters, and year window"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "After the last user-managed delete (or filtering to zero matches), the empty state is clear and visible in the list/stage region"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_all_surfaces"
description = "Filter flow: toggling a category or narrowing the year window updates Library rows, stage pins, and the category tally together"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "Filters drawer or collapsed chrome can be hidden and reopened with workflow continuity (filters and year window preserved)"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "About modal, Filters drawer, Export drawer, and detail panel open/close as expected for exploration, edit, and export flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery: empty-state reset/create, clearing import errors, or closing overlays corrects the flow without a reload (no dead ends)"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "bulk_flow_updates_list_and_stage"
description = "Bulk flow: checking at least 2 rows and applying bulk Set category merges the chosen closed-enum category into each checked event's categories without removing unrelated tags; bulk Delete with confirm removes every checked row and drops the count by exactly that number"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "undo_flow_restores_prior_state"
description = "Undo flow: after creating an event, Undo removes that row, decrements the visible count by one, and restores the category tally; Redo restores the created event"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "export_flow_contains_session_titles"
description = "Export flow: after creating Signal Tower Demo with type First Appearance, timestamp 1920-01-01T00:00:00.000Z, mediaRefs containing signal-tower-demo, and Evening Broadcast with type Mass Adoption, open Export timeline — JSON events contain both titles with matching type/timestamp/mediaRefs, document is media-history-timeline, totals.eventCount matches the live collection length, yearWindow matches the scrubber, CSV contains both titles under the contract header, and Copy shows Copied"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "import_round_trip_flow"
description = "Import round-trip: export JSON after mutations, clear to empty/user-cleared, Import that JSON — Library titles/types/mediaRefs, pins, year window, filters, and tally reconstruct, and a fresh export's events array matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "reload_returns_seeded_baseline"
description = "A page reload returns the seeded corpus, default categories, empty search, default year window, and empty undo/redo stacks"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "timeline_event_flows_unavailable"
description = "Create, edit, delete, bulk Set category/Delete, or Export/Import timeline cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_event_missing_or_duplicated"
description = "After a valid HistoryEvent create, the Library list is missing the new title, shows a duplicated row for it, or the stage lacks a pin for an in-window category-active event."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "library_stage_export_desync"
description = "After create/edit/delete, the Library row, stage pin, detail panel, category tally, and Timeline JSON export disagree about the same event."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "scrub_library_switch_breaks"
description = "Switching Scrub/Explore and Library/Filter breaks the stage layout or loses the selected pin/detail unexpectedly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_events_break_ui"
description = "After deleting all user-managed events (or filtering to zero), the Library/stage region is blank/broken with no designed empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "category_year_filters_disagree"
description = "Category filters, search, and year-window scrubber disagree about which events appear on the stage vs Library, or Reset filters fails to restore defaults."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "filters_or_export_drawer_cannot_reopen"
description = "After closing Filters, About, or Export/Import timeline drawers, those controls cannot reopen their panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Overlays block navigation with no exit option."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n9"
name = "failed_create_or_import_silent"
description = "An invalid HistoryEvent submit or contract-invalid Import provides no visible named-field or import error feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "timeline_dead_end_requires_reload"
description = "A Media History Timeline flow leaves a dead end that requires a full page reload to continue exploring or exporting."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_flow_missing_created_titles"
description = "After creating two distinctly titled events, the export JSON or CSV preview is missing one or both titles."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n12"
name = "undo_does_not_restore_create"
description = "After creating an event, Undo leaves the new row visible or the count unchanged."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
