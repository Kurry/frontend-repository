[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing follow a coherent scale across stage, scrubber, Library, and export drawer, with no arbitrary one-off values visibly breaking alignment."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the instruction: expressive headings/body (not Inter/Roboto/system defaults) with clear hierarchy on stage and detail."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "Layout matches reference screenshots to within a small tolerance at desktop — stage, scrubber/footer, and chrome composition — with instruction text winning on conflicts."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions or animations are applied to the state changes the spec calls out (detail open/close, list add/remove, drawer enter/exit, export drawer)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Responsive behavior matches the instruction patterns (desktop stage+scrubber visible; <=768 reflow; 375 no horizontal page scroll)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Button and form radii, padding, and states conform to a coherent styled chrome look rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography has a clear hierarchy that distinguishes brand, detail title, and body text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, active, disabled, error) match the instruction where specified, including disabled Undo/Redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Color, depth, and paper-stage surface treatments are precise per the instruction's warm/cool atmosphere."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Microinteraction feedback for hover and press follows the instruction (pin/row wash, scrubber brighten, focus rings)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict a coherent scale (misaligned scrubber/chrome)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Colors appear arbitrary and clash with the paper-stage atmosphere without category meaning."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Sizing mismatches the reference/instruction composition (stage cramped or scrubber missing at desktop)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Animations are missing or incorrect where the spec requires them (detail, drawers, list add/remove)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls use browser default styles when the spec styles them through the required component library and utility classes."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The grid or layout is misaligned at reference breakpoints."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Elements render off-screen or clipped relative to the reference composition."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order, content, or structure deviates from the reference on the primary stage viewport without instruction override."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text have no distinction in the detail panel or Library."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Microinteractions are missing or deviate from the provided reference/instruction hover language."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
