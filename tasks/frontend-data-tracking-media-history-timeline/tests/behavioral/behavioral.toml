[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: create an event, toggle a category, set a search, narrow the year window, then reload. All facets coherently reset to the seeded baseline (in-memory genre) — never a mix of surviving and reset facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Chronology proof: with mixed years visible, note Library order (earliest to latest); after creating an event with a year earlier than the first row, it appears before that row; after creating one later than the last visible row (within filters), it appears after — proving order is derived from live years rather than a hardcoded list."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: change the year window or category filter and confirm the category tally and visible pin set change meaningfully rather than redrawing identically regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: create or edit an event in Library/Filter mode and confirm the same title/year/type/mediaRefs appear on the stage pin and in an open detail without reload; export preview also reflects the change."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the visible event count immediately before and after a create; the delta is exactly +1. Repeat for delete with exactly -1."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: create two events with distinct titles, types, timestamps, mediaRefs, and years; the Library shows both distinct titles and the export JSON events array contains both distinct titles with matching type/timestamp/mediaRefs and years."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start creating event A, switch to Scrub/Explore, return and finish creating event B, then open Export — both intended events exist and neither flow corrupted the other's fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: drive user-managed events to empty (empty state visible), then create one valid event; Library, tally, and export totals track through both transitions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_round_trip_restores_export"
description = "Undo round-trip: create Signal Tower Demo, confirm export JSON contains that title, Undo, confirm export no longer contains that title and the count dropped by one, then Redo and confirm the title returns in export."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_byte_stable_titles"
description = "Import/export round-trip: after two creates, export JSON, clear user events, import the pack, and confirm a fresh export's events array contains the same two titles with the same type, timestamp, and mediaRefs values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "A facet of user-configured state silently reverts while others survive, producing incoherent partial persistence."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "A derived surface (category tally, pin set, or export totals) renders identically regardless of its inputs."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Repeating create with different titles yields identical Library rows or identical export event titles."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "State changes appear in one view but not another until reload."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n5"
name = "export_ignores_undo"
description = "After Undo removes a created event from the UI, the export preview still contains that event's title."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.11"
name = "api_payload_round_trip_in_export"
description = "Create Signal Tower Demo with type First Appearance, timestamp 1920-01-01T00:00:00.000Z, and mediaRefs containing signal-tower-demo; open Export — the JSON events entry for that title carries those exact type, timestamp, and mediaRefs values and document is media-history-timeline."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n6"
name = "export_strips_api_shaped_fields"
description = "After a valid create, the export JSON events entry for that event is missing type, timestamp ending with Z, or mediaRefs."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
