[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence_across_surfaces"
description = "A change made in one surface — creating, editing, deleting, bulk mutating, undoing, redoing, or importing — is immediately reflected in every other surface that shows the same data (Library list, stage pins, counts, category tally, detail panel, export preview) without a reload; no surface ever shows stale data another surface already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "seeded_reset_multi_facet_round_trip"
description = "Scripted probe: create an event, toggle a category off, type a search, narrow the year window, open Export once, and switch mode; confirm localStorage and sessionStorage remain empty throughout; then reload — every facet coherently returns to the seeded baseline (seeded corpus, default categories, empty search, default year window, empty undo stacks), never a mix of surviving and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "keyboard_operable_chrome_controls"
description = "Every chrome control (mode switch, Filters, About, Reset filters, Undo, Redo, Export timeline, Import timeline, form fields, scrubber thumbs, bulk actions) is reachable and operable with the keyboard alone, showing a visible focus indicator on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "dialogs_trap_and_return_focus"
description = "The About modal, Filters drawer, and Export drawer expose dialog semantics, trap keyboard focus while open, and return focus to the control that opened them on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "validation_exposed_to_assistive_tech"
description = "Form validation messages and import errors are exposed to assistive technology (e.g. an aria-live region, role=alert, or aria-describedby wiring on the field) in addition to being shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.7"
name = "interactive_within_two_seconds"
description = "On a local cold load, the app renders and is interactive (a pin or chrome control responds) within 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of the app — panning, zooming, filtering, creating, editing, deleting, bulk actions, undo/redo, exporting, importing, and stepping through details"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "stage_and_library_stay_smooth"
description = "Panning and scrubbing the stage stay smooth with no visible hitching while the pins reposition, and scrolling the Library list fast stays smooth through the full seeded corpus"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "export_compiled_from_live_store"
description = "Export JSON and CSV previews are compiled from the live session store under the HistoryEvent contract: after a create or edit, reopening or refreshing the export drawer shows the mutated title/type/timestamp/mediaRefs/detail without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "import_replaces_shared_store"
description = "A successful Timeline JSON import with document media-history-timeline replaces the shared events collection and filter/window fields so Library, stage, scrubber, tally, and a subsequent export all agree including type, timestamp, and mediaRefs"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "create_record_is_request_body_shape"
description = "After a valid create, the Library row and detail panel show the submitted HistoryEvent request-body fields (title, type, timestamp, mediaRefs, year, place, categories, summary, detail) and a subsequent Timeline JSON events entry matches that same shape"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "in_memory_only_no_storage"
description = "Throughout create, filter, export, and import exercises, localStorage and sessionStorage remain empty (good-app in-memory genre)"
type = "binary"
weight = 1.0

