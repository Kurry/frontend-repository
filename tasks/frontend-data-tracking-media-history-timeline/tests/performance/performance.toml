[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on local render."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings during panning, filtering, CRUD, bulk, undo/redo, export, and import."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = "UI transitions such as mode switch and export-drawer open respond without perceptible multi-second delay."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "Where export preview regeneration or import validation is noticeable, a loading or regenerating indication is shown; otherwise the UI stays responsive."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_collections_render_without_lag"
description = "The ~60-event Library list and stage pins render and scroll without perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during filter, create, undo, and export preview updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Stage pan/scrub and list add/remove animations maintain a smooth frame rate during use."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "The app does not hang or freeze under rapid scrubbing, filtering, or repeated create/undo."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session of pan/filter/export shows no memory leaks or runaway resource use."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "export_tab_switch_regenerates_smoothly"
description = "Opening the export drawer and switching between Timeline JSON and Events CSV regenerates the preview without freezing the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before interaction is possible on local render."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during flows."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Transitions block or lag."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "Async or simulated-async work causes the UI to hang or freeze."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Large data sets kill the frame rate during Library scroll or stage pan."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during animation."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while loading resources."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory leaks or runaway browser resource usage occur."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed while data is loading."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid or edge-case use."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n11"
name = "export_drawer_freezes_ui"
description = "Opening the export drawer or switching JSON/CSV tabs freezes the UI for a prolonged period."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
