[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_or_mutation_chip"
description = "Beyond the required export drawer, a polished archive-operator touch is visible — for example a compact export summary naming eventCount and the active year window above the preview, or a last-mutation chip naming the most recent create/edit/delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "keyboard_shortcuts_for_undo_redo"
description = "Beyond required toolbar buttons, keyboard shortcuts for Undo/Redo are available and visibly change the collection when used."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_about_onboarding"
description = "The About/help overlay provides guided how-to copy for scrubbing, filtering, and exporting that helps a first-time operator."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "tally_or_era_readout_polish"
description = "The category tally or era-band labeling provides extra usability beyond a bare list of pins."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_support"
description = "The app supports an alternative input path such as keyboard year-window nudges or command-style jump-to-year beyond the required scrubber."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Optional personalization such as a remembered default year window within the session (without browser storage) is visible."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "The brand header and About copy present a polished History of Media and Communication narrative without becoming a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Optional light paper-tone variants or density controls beyond the required atmosphere are available."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "Clipboard copy-with-confirmation and real file downloads for the timeline pack demonstrate polished export UX beyond a preview-only drawer."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Competition-level polish is visible to users in stage, export, or bulk workflows beyond a minimal CRUD timeline."
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
