[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_is_present"
description = "Empty state UI is present and renders when filters match nothing or all user-managed events are deleted, with a message and a reset/create control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "Inline validation appears on create/edit before submit for empty title, type outside the closed enum, non-Z or cross-field-invalid timestamp, empty mediaRefs, empty place, summary, detail, missing categories, and invalid year, naming each field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Error messages name the field and the fix rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Success or confirmation feedback appears after actions such as Copy (Copied) or completed import"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "async_work_shows_loading_state"
description = "Where import or export compilation takes noticeable time, a loading or regenerating indication is visible; otherwise rapid preview updates still leave the UI responsive"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_support_undo_or_cancel"
description = "Undo is available after create/edit/delete/bulk mutations, and bulk Delete requires an explicit confirm step"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "non_obvious_controls_have_help"
description = "About/help overlay or tooltips explain scrubbing, filtering, or export for non-obvious controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, and labels use semantic tags for chrome, forms, and bulk actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Modal/drawer close controls and Escape both close About, Filters, and Export overlays"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "long_flows_show_progress"
description = "Export drawer tab switches and import paste/validate provide visible progress or immediate preview feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "scrubber_handles_cannot_cross"
description = "Dragging one scrubber handle into the other stops at the minimum gap and the range readout never shows an inverted range"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "year_out_of_bounds_rejected"
description = "A year below -3200 or above 2024 is rejected with an inline error naming year and does not change the collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "bulk_with_none_checked_is_noop"
description = "Bulk Set category and bulk Delete with no rows checked perform no destructive change"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "malformed_import_rejected"
description = "Importing malformed JSON, document not media-history-timeline, or a pack missing required HistoryEvent fields (bad type, non-Z timestamp, empty mediaRefs, year/timestamp mismatch, or empty detail) shows an inline error naming the import field and leaves collection, filters, and stage unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "undo_redo_noop_when_empty"
description = "Undo with nothing to undo and Redo with nothing to redo leave the collection unchanged; controls show disabled treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "empty_export_still_valid_shape"
description = "With an empty user-managed set (or empty collection where allowed), Export still produces JSON with version 1, document media-history-timeline, live yearWindow/filters, events covering remaining rows (each carrying type, timestamp, and mediaRefs) or empty, and totals that match; Copy still shows Copied"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "media_refs_bounds_rejected"
description = "Submitting create with zero mediaRefs or more than six mediaRefs shows an inline error naming mediaRefs and does not increase the events count"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "wrong_document_import_rejected"
description = "Importing a Timeline JSON whose document field is not exactly media-history-timeline shows an inline error naming document or the import field and leaves the collection unchanged"
type = "binary"
weight = 1.0

