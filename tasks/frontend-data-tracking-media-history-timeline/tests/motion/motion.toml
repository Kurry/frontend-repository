[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_wash_and_focus_rings"
description = "Real pointer hover on a pin or list row shows a scale, glow, or hover wash; hovering scrubber thumbs and chrome buttons brightens them; and keyboard focus shows a visible focus-visible ring on interactive controls (verify hover via computed style while hovering)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_hover_feedback"
description = "Mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "omits_hover_feedback"
description = "Omits hover feedback on pins or list rows so the stage feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "pan_and_wheel_zoom_live"
description = "Dragging the stage pans the pins and wheel-zoom narrows or widens the visible year window about its midpoint, live and without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "stage_drag_does_nothing"
description = "Dragging or wheel-scrolling the stage does nothing because pins are rendered at fixed positions rather than from the visible year window"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "detail_panel_settle_transition"
description = "Opening and closing the event detail panel via the real UI (clicking a pin or row, then closing) plays a short opacity/transform settle rather than appearing and disappearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "list_row_add_remove_animates"
description = "Creating an event through the create form animates its row into the Library list, and deleting an event through the UI animates the row out rather than snapping, with the surrounding rows sliding smoothly into place"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "drawer_and_modal_slide_fade"
description = "The Filters drawer, About modal, and Export drawer enter and exit with a short slide/fade transition rather than appearing and disappearing instantly (opened via their chrome buttons)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "feedback_messages_animate"
description = "Feedback messages (validation errors, Copied confirmation, import errors) appear with visible motion — a short slide or fade — and dismiss the same way"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "reduced_motion_preference_respected"
description = "With prefers-reduced-motion: reduce emulated, non-essential fades and settles are shortened or removed while panning, scrubbing, and filtering remain fully functional"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "bulk_delete_rows_animate_out"
description = "Bulk Delete animates each removed Library row out rather than snapping the entire list away in one frame"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
