[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with empty storage, the app opens at / into the FandangoFury Stage-select map with Stage 1 (Plaza del Sol) unlocked and playable and the later Stage nodes shown as locked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After starting Stage 1 and pressing Z to land a Light Attack on an approaching bandit, a distinct attack animation plays, the enemy's health drops, and the on-screen combo counter shows 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After chaining Light, Light, then Heavy (Z, Z, X) against an enemy, a named Fiesta Combo fires with a distinct celebratory flash or label beyond the plain combo counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After a Dodge Roll (Space), a visible dodge cooldown indicator appears, and an immediate second Dodge Roll before it clears does not grant another invulnerability"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After landing hits until the Fury meter reads full, the Fiesta Fury control becomes enabled only then, and activating it fires a screen-wide hit on all enemies and resets the Fury meter to empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "During a Stage the combat HUD shows the Health bar, the Fury meter, and a 'Wave X of Y' indicator at once, and the current-wave number increments after a wave is cleared while the total stays fixed until a named Boss Duel begins"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After opening the Cantina with enough Pesos, the Max health upgrade shows its cost before purchase, and buying it decreases the Peso balance by exactly that cost while the next purchase's shown cost is strictly higher"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After opening the Masks screen, locked, unlocked-but-unequipped, and equipped Masks show visibly different card treatments, and equipping one Mask marks it equipped and unequips any previously equipped Mask"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After the fighter's Health reaches 0, a Derrota screen appears showing the Pesos earned that attempt, and its Try Again control restarts the current Stage from its first wave with Health restored to full"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After clearing a Stage's waves and defeating its Boss, a Victory screen summarizes Pesos earned and Masks found, and Continue returns to the Stage map with the next Stage node now unlocked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After establishing progress and performing a full page refresh, the unlocked Stages, equipped Mask, owned Masks, Peso balance, and purchased upgrades are all restored exactly as before the refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After opening Reset Progress and cancelling the confirmation, progress is unchanged; triggering it again and confirming wipes progress to Stage 1 defaults, and the reset survives a refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After opening the History panel, using Apply Scenario Change to make several changes, and clicking Undo, the visible state returns to the immediately prior snapshot, the History state region shows the current snapshot, Redo restores the undone state, and an invalid Undo or Redo control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After undoing one or more steps and then making a different change through the real controls, the History panel marks a separate selectable alternate branch rather than a single flat list, and selecting that branch restores its exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Light Attack (Z or the Strike button) and Heavy Attack (X or the Smash button) each play a distinct animation, deal different damage to the nearest in-range enemy whose health drops, and advance the on-screen combo counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Chaining Light, Light, then Heavy triggers a named Fiesta Combo that deals bonus damage, and an idle chain resets the next combo counter to 1 rather than continuing to climb"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Holding Block reduces the damage taken from an enemy attack compared with taking it unblocked, and a Dodge Roll grants brief invulnerability then a cooldown that prevents another dodge until it clears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Landing hits fills the Fury meter, the Fiesta Fury control is enabled only once the meter is full, and activating it hits all onscreen enemies and resets the meter to empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "The 'Wave X of Y' indicator's current-wave number increments after each wave is cleared while the total stays fixed, and clearing the final wave advances into a named Boss Duel with a labelled boss health bar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Defeating a Stage's Boss shows a Victory screen summarizing Pesos earned and Masks found, and its Continue control returns to the Stage map with the next Stage node now unlocked and selectable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Reaching 0 Health shows a Derrota screen with the Pesos earned that attempt, and its Try Again control restarts the current Stage from its first wave with Health restored to full"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "The Masks screen equips exactly one Mask at a time — equipping a second Mask unequips the first — and the equipped Mask grants its passive stat bonus"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The Cantina shows each upgrade's cost before purchase, buying it decreases the Peso balance by exactly that shown cost and applies the upgrade, and each subsequent purchase of the same upgrade costs strictly more than the previous one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The History panel exposes Undo, Redo, a region labelled History state showing the current snapshot, a snapshot list, and an Apply Scenario Change action, and Undo and Redo restore the exact adjacent visible states while an invalid Undo or Redo control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Undoing one or more steps and then making a different change through the real controls creates a selectable alternate branch, and selecting that branch restores its exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "Reset Progress is guarded by a confirmation step: cancelling leaves progress unchanged, and confirming wipes progress to Stage 1 defaults (only Stage 1 unlocked, no Mask equipped, no owned Masks, the starting Peso balance, no upgrades)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The combat scene is static or non-interactive: attacks do not damage enemies, waves do not advance, or the game does not progress against shared application state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Undoing and then making a different change silently discards or flattens the abandoned history states into one linear list instead of preserving them as a selectable branch"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "A success or completion state — a landed combo, a purchase, a Stage unlock, or a Victory — appears while the underlying action did not occur, or an outcome stays constant regardless of the inputs given"
type = "binary"
weight = 1.0
negate = true
