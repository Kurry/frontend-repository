[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load at /"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Loading / and exercising Stage-select, combat, pause, save checkpoint, resume, export, and import produces no console errors or hydration warnings"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "overlay_transitions_respond_quickly"
description = "Opening Cantina, Masks, Export Campaign, Import Campaign, or Pause responds promptly without multi-second UI freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "import_validation_stays_responsive"
description = "Campaign Import validation feedback appears without hanging the UI when given malformed or invalid JSON"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "full_wave_combat_without_lag"
description = "Sustained fighting through a full wave with multiple enemies on screen shows no visible hitching"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Pesos updates, Mask equip, Cantina purchase, and Export preview regeneration keep the UI interactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Attack animations, Fury fill, and Fiesta Fury effects maintain a smooth frame rate during play"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated Strike/Smash input causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "An extended session covering multiple waves, pause/resume, export, and return to Stage map avoids progressive slowdown or resource runaway"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "9.10"
name = "storage_unavailable_fallback"
description = "When storage is unavailable the production build does not crash on load; Stage map still renders"
type = "binary"
weight = 0.5
optional = true

