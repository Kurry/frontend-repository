[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load at /"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Loading / and exercising Stage-select, combat, pause, save checkpoint, resume, export, and import produces no console errors or hydration warnings"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "overlay_transitions_respond_quickly"
description = "Opening Cantina, Masks, Export Campaign, Import Campaign, or Pause responds promptly without multi-second UI freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "import_validation_stays_responsive"
description = "Campaign Import validation feedback appears without hanging the UI when given malformed or invalid JSON"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "full_wave_combat_without_lag"
description = "Sustained fighting through a full wave with multiple enemies on screen shows no visible hitching"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Pesos updates, Mask equip, Cantina purchase, and Export preview regeneration keep the UI interactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Attack animations, Fury fill, and Fiesta Fury effects maintain a smooth frame rate during play"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated Strike/Smash input causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "An extended session covering multiple waves, pause/resume, export, and return to Stage map avoids progressive slowdown or resource runaway"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "9.10"
name = "storage_unavailable_fallback"
description = "When storage is unavailable the production build does not crash on load; Stage map still renders"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "A local cold load to interactive Stage map exceeds 2 seconds"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors or uncaught exceptions appear during combat, pause/resume, export, or import flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Opening overlays or returning from Pause blocks input for a sustained lag"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "import_or_export_hangs_ui"
description = "Export preview generation or Import validation hangs the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "wave_combat_kills_frame_rate"
description = "A full wave with multiple enemies visibly tanks frame rate into hitching slideshow territory"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Fiesta Fury or victory particles block combat or Continue input for an extended period"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "Asset or script loading leaves a blank Stage map with no interactive controls after the 2s window"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Extended combat plus pause/export causes sustained memory/CPU runaway that freezes the tab"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Initial load shows a blank white/empty screen with no Stage-map structure until long after interactive should be ready"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid combat input, pause spam, or repeated Import of invalid JSON crashes or whitescreens the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

