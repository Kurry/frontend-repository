[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "From a desktop viewport down to about 375px wide, the Stage-select map and combat stage reflow without requiring horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "At about 375px wide, Strike, Smash, Block, Dodge, Fiesta Fury, and Pause remain large enough to tap"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "hud_text_legible_narrow"
description = "At narrow widths HUD text (Health, Fury, Wave X of Y, combo) stays legible rather than clipping or truncating into unreadability"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "Stage nodes, Pesos, and overlay content avoid clipped labels and unnecessary overflow scrollbars at desktop and ~375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "Stage-map chrome controls (Cantina, Masks, Settings, Export, Import, History, Reset) remain reachable at small widths rather than falling off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "overlays_reflow_logically"
description = "Cantina, Masks, Export Campaign, Import Campaign, and Pause overlays stack/reflow logically inside a 375px-wide viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "combat_buttons_usable_on_touch"
description = "On a narrow viewport the on-screen combat buttons remain operable for the primary attack and Pause actions"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At about 375px wide neither the combat scene nor Export/Import/Pause overlays introduce page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "combat_canvas_resizes"
description = "The combat stage/canvas resizes with the viewport so enemies and the fighter remain in view rather than a fixed overflow crop"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_hud_remains_accessible"
description = "Fixed HUD and action controls remain accessible and do not permanently cover Stage-map navigation after returning from combat"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The Stage map or combat HUD layout breaks (overlapping Stage nodes, unusable HUD) when resizing between desktop and ~375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At ~375px combat or Stage-map controls are too small to tap or misaligned into each other"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "hud_text_unreadable_on_narrow"
description = "HUD or Stage-map text becomes unreadably small or fully clipped at narrow widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "unnecessary_horizontal_scrollbars"
description = "Narrow viewports show unnecessary horizontal scrollbars while content could reflow"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "stage_chrome_breaks_by_width"
description = "Stage-map control chrome becomes unreachable or wraps into a broken overlapping cluster at small widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_hud_obscures_content"
description = "Fixed combat controls permanently obscure enemies, meters, or Stage-map titles with no way to reach them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Action buttons overlap visible enemies or meters at some tested width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_narrow_actions_missing"
description = "Required narrow-width combat actions (Strike/Smash/Pause) disappear or cannot be activated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_canvas_overflows"
description = "A fixed-size combat canvas overflows the viewport with no responsive resize"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "export_import_controls_disappear"
description = "Export Campaign, Import Campaign, or Resume Run controls disappear at narrow sizes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

