[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Every combat and menu button shows a visible hover state (background, border, or shadow change), and keyboard Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Driving a real Light-Light-Heavy attack chain through the combat controls animates the incrementing combo popup and shows a distinct celebratory Fiesta Combo flash beyond the plain counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Filling the Fury meter through real landed hits makes it visibly glow or pulse once full, and a boss's attack is preceded by an animated wind-up telegraph visually distinct from its normal attack"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "A visible dodge cooldown indicator counts down after a real Dodge Roll, and equipping a Mask through the Masks screen surfaces a brief transient confirmation rather than changing silently"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Undo, Redo, and branch selection performed through the real History-panel controls update the visible game state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "Interactive chrome such as combat and menu buttons shows no hover feedback and feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "The Fiesta Combo flash, the Fury ready glow, or the boss telegraph is absent when the combat is driven through the real attack, Fury, and boss controls"
type = "binary"
weight = 1.0
negate = true
