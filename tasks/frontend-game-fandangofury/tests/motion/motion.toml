[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_and_press_feedback"
description = "Every combat and menu button shows a visible hover state (background, border, or shadow change, verified via computed style while hovering) and a slight press feedback on click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "combo_popup_and_fiesta_flash"
description = "Driving a real Light-Light-Heavy attack chain through the combat controls animates the incrementing combo popup and shows a distinct celebratory Fiesta Combo flash beyond the plain counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "fury_fill_animates_and_boss_telegraph"
description = "The Fury meter visibly animates its fill incrementally as real landed hits accumulate and glows or pulses once full, and a boss attack is preceded by an animated wind-up telegraph visually distinct from its normal attack"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "dodge_cooldown_and_mask_confirm"
description = "A visible dodge cooldown indicator counts down after a real Dodge Roll, and equipping a Mask through the Masks screen surfaces a brief transient confirmation rather than changing silently"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "history_controls_animate_state"
description = "Undo, Redo, and branch selection performed through the real History-panel controls update the visible game state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "no_hover_feedback_on_controls"
description = "Interactive chrome such as combat and menu buttons shows no hover feedback and feels static on pointer hover"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.7"
name = "combat_motion_absent_on_real_path"
description = "The Fiesta Combo flash, the Fury ready glow, or the boss telegraph is absent when the combat is driven through the real attack, Fury, and boss controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.8"
name = "attack_animations_and_enemy_hit_flash"
description = "Light and Heavy attacks driven through the real combat controls each play a distinct short attack animation on the fighter, and a landed hit flashes the struck enemy"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "fiesta_fury_fullscreen_effect"
description = "Activating Fiesta Fury through the real control with a full meter plays a brief screen-wide special effect whose color reflects the currently equipped Mask"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "victory_particle_burst"
description = "Defeating the Boss through normal play fires a celebratory particle burst over the Victory screen at the moment it appears, triggered by the real boss defeat rather than any menu action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "health_bars_ease_depletion"
description = "The fighter and boss health bars ease smoothly as damage lands rather than snapping instantly between values"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.12"
name = "cantina_purchase_animates"
description = "Buying a Cantina upgrade through the real Buy control animates the Pesos balance change and the upgrade level indicator rather than snapping instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.13"
name = "overlay_enter_transition_and_escape"
description = "The Cantina, Masks, History, Fighter Settings, Export Campaign, Import Campaign, Pause, and reset-confirmation panels appear as overlays with a brief enter transition, and each dismisses on its close control or Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "export_copy_download_confirmation"
description = "Copy and Download on Export Campaign show a short confirmation before resetting, and Save Checkpoint shows a brief confirmation on the Stage-select map"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or animation behavior that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

