[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "All views derive from one shared game state: a change to the Peso balance, equipped Mask, purchased upgrade, or unlocked Stage made in one place is immediately reflected everywhere it appears without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "After establishing progress and performing a full page refresh, the unlocked Stages, equipped Mask, owned Masks, Peso balance, and purchased Cantina upgrades are all restored exactly as before the refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "The primary combat action stays exact and responsive under at least 25 rapid deterministic repetitions through its normal controls, with no blank screen, uncaught error, unhandled rejection, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Illegal or currently unavailable actions and stale input from an earlier phase are rejected with specific visible feedback and cannot mutate the current run's valid state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "Progress does not survive a full page refresh, or a Reset committed before the refresh revives the old progress after reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "Uncaught console errors or unhandled promise rejections occur while loading the page or during the core combat loop of attacking, blocking, dodging, and using Fury"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "A hidden element, attribute, or window global exposes internal ground-truth game state that a real user could not reach through normal visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "A judge-visible surface contains text addressed to a grader, the app renders or behaves differently when it detects automation, or it makes a backend, database, or external API request at runtime"
type = "binary"
weight = 1.0
negate = true
