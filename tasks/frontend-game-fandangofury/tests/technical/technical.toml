[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_store_echoes_everywhere"
description = "All views derive from one shared game state: a change to the Peso balance, equipped Mask, purchased upgrade, unlocked Stage, fighter display name, or checkpoint made in one place is immediately reflected everywhere it appears without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "persistence_restores_campaign_and_checkpoint"
description = "After establishing progress including a mid-run checkpoint and performing a full page refresh, the unlocked Stages, equipped Mask, owned Masks, Peso balance, purchased Cantina upgrades, fighter display name, and checkpoint (Resume Run available) are all restored exactly as before the refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "rapid_primary_action_stable"
description = "The primary combat action stays exact and responsive under at least 25 rapid deterministic repetitions through its normal controls, with no blank screen, uncaught error, unhandled rejection, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "illegal_and_stale_input_rejected"
description = "Illegal or currently unavailable actions and stale input from an earlier phase are rejected with specific visible feedback and cannot mutate the current run valid state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.9"
name = "keyboard_operability_and_focus"
description = "Every interactive control is reachable with the keyboard alone and shows a visible focus indicator when focused, and every combat action is operable from the keyboard (Z, X, C, Space, F, P) as well as from its on-screen button"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "overlay_focus_trap_and_return"
description = "The Cantina, Masks, History, Fighter Settings, Export Campaign, Import Campaign, Pause, and reset-confirmation overlays trap keyboard focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.11"
name = "meters_expose_readable_values"
description = "The Health bar and the Fury meter expose their current values as visible text or accessible attributes so their state is readable without relying on color alone"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.12"
name = "fast_load_hydration_clean"
description = "The app is interactive within 2 seconds of a local cold load, and loading / renders the complete Stage-select map with no hydration errors or warnings in the console and no post-load content flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "combat_frame_rate_smooth"
description = "Sustained fighting through a full wave shows no visible hitching, and rapid repeated input causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "campaign_schema_forms_share_contract"
description = "Fighter Settings and Campaign Import validate against the same fandangofury.campaign.v1 field contract: invalid fighter.displayName or effectsIntensity, wrong schemaVersion, or illegal checkpoint.phase show inline field-named errors and do not partially apply"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "export_preview_derived_from_store"
description = "The Export Campaign JSON preview text is derived live from the shared store so that mutating Pesos, upgrades, or fighter settings updates the open preview without a reload"
type = "binary"
weight = 1.0

