[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "All views derive from one shared game state: a change to the Peso balance, equipped Mask, purchased upgrade, or unlocked Stage made in one place is immediately reflected everywhere it appears without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "After establishing progress and performing a full page refresh, the unlocked Stages, equipped Mask, owned Masks, Peso balance, and purchased Cantina upgrades are all restored exactly as before the refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "The primary combat action stays exact and responsive under at least 25 rapid deterministic repetitions through its normal controls, with no blank screen, uncaught error, unhandled rejection, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Illegal or currently unavailable actions and stale input from an earlier phase are rejected with specific visible feedback and cannot mutate the current run's valid state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "2_5"
description = "Progress does not survive a full page refresh, or a Reset committed before the refresh revives the old progress after reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "Uncaught console errors or unhandled promise rejections occur while loading the page or during the core combat loop of attacking, blocking, dodging, and using Fury"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "A hidden element, attribute, or window global exposes internal ground-truth game state that a real user could not reach through normal visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "A judge-visible surface contains text addressed to a grader, the app renders or behaves differently when it detects automation, or it makes a backend, database, or external API request at runtime"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "keyboard_operability_and_focus"
description = "Every interactive control is reachable with the keyboard alone and shows a visible focus indicator when focused, and every combat action is operable from the keyboard (Z, X, C, Space, F) as well as from its on-screen button"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "overlay_focus_trap_and_return"
description = "The Cantina, Masks, History, Fighter Settings, and reset-confirmation overlays trap keyboard focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.11"
name = "meters_expose_readable_values"
description = "The Health bar and the Fury meter expose their current values as visible text or accessible attributes so their state is readable without relying on color alone"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.12"
name = "fast_load_hydration_clean"
description = "The app is interactive within 2 seconds of a local cold load, and loading / renders the complete Stage-select map with no hydration errors or warnings in the console and no post-load content flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "combat_frame_rate_smooth"
description = "Sustained fighting through a full wave shows no visible hitching, and rapid repeated input causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "outbound_navigation_leaves_app"
description = "Activating any control during a full exercise of the app navigates the browser away from / — to another route, another origin, or an external page — instead of acting through in-app state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect — console health, state coherence, persistence, accessibility, or performance — that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, console output, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
