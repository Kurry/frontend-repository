[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_combat_microinteractions"
description = "Beyond the required hit flash and combo popup, combat includes an extra delightful microinteraction (for example a unique Fiesta Combo flourish or Mask-equip sparkle) that still feels on-brand"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_combat_motion_polish"
description = "Attack, dodge, or Fury motion shows polish beyond a single static swap — layered anticipation/recovery or juice that remains readable"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_first_run_hints"
description = "The first-run Stage map or first combat offers light guided hints for attacks or Pause without blocking play"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "enhanced_festival_scene_graphics"
description = "The town-square combat scene or Stage map includes enhanced festival visual detail beyond flat colored rectangles"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "alternative_input_beyond_keys"
description = "Beyond the required keys and buttons, the app offers an extra helpful input convenience (for example hold-to-block affordance clarity or remappable hints) without breaking the required bindings"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Fighter Settings effects intensity or another allowed preference visibly personalizes combat feedback intensity"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_brand_narrative"
description = "Stage names, Victory/Derrota copy, and festival chrome tell a coherent FandangoFury narrative rather than generic Game Over placeholders"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "dynamic_theming_beyond_requirements"
description = "Equipped Masks or Stages introduce an extra visual theme shift beyond the minimum Fury color change"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "genre_appropriate_platform_features"
description = "Campaign Export/Import or Save Checkpoint feels productized (clear artifact drawer, schema version badge, or resume callout) beyond a bare text dump"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Overall combat feel, meta progression, and campaign artifact packaging read as a shippable festival action game rather than a minimal demo"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The experience is a bare minimum combat shell with no festival polish, no campaign artifact packaging, and no pause/save affordances beyond a static Stage map."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0

