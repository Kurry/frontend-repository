[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings (Stage-select title, Cantina, Masks, Fighter Settings, Export Campaign, Import Campaign, Pause, Victory, Derrota), capitalization is consistent across those surfaces"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders action labels, they are specific — Strike, Smash, Block, Dodge, Fiesta Fury, Pause, Resume, Save Checkpoint, Export Campaign, Import Campaign, Resume Run, Try Again, Continue — rather than generic OK/Submit where a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_field"
description = "Where the app renders validation errors (Fighter Settings, Campaign Import), the copy names the offending field and the problem rather than only Invalid"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_or_locked_states_explain"
description = "Where the app renders locked Stage or locked Mask treatment, the copy or labelling makes the locked state understandable as a next-step hint"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = "Where the app renders body copy on Victory, Derrota, Pause, or Export/Import hints, the prose is clear, specific, and free of obvious typos"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_is_consistent"
description = "Where the app names Pesos, Masks, Fury, Stages, and Campaign across chrome and overlays, terminology stays consistent (not mixing unrelated synonyms for the same control)"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numbers_and_units_consistent"
description = "Where the app renders Pesos, Wave X of Y, Health, and Fury numbers, units and formats stay consistent across HUD and Stage map"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders success confirmations (Save Checkpoint, Copy, purchase, Mask equip), the message is specific to the action completed"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_is_visible"
description = "Where the app renders text, visible placeholder lorem/TODO/copy-me strings appear in Stage map, combat, or overlays"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Where the app renders prominent titles or primary buttons, obvious misspellings or broken words appear"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "concept_names_are_inconsistent"
description = "Where the app renders labels for the same concept, Pesos/Masks/Fury/Campaign names flip between unrelated terms across adjacent screens"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_is_truncated_or_overflowing"
description = "Where the app renders labels on Stage nodes or HUD controls, text is truncated into unreadable fragments or overflows its container"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in writing quality that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 0.5

