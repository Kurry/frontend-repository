[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_festival_scale"
description = "Spacing and control sizing on the Stage-select map and combat HUD follow a consistent dense festival scale comparable to the reference screenshots, with text winning on conflicts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_festival_hierarchy"
description = "Typography hierarchy for the Stage title, Stage node labels, and HUD readouts matches the reference structure (title dominant, HUD secondary) even if exact fonts differ when text conflicts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_stage_map"
description = "Desktop Stage-select layout places title, Stage node row, Pesos/Masks readouts, and chrome controls in the same overall composition as the reference overview/segments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes from the instruction (combo popup, Fury ready, overlay enter) animate rather than only hard-cutting when the reference shows motion"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_intent"
description = "Narrow layouts keep the combat HUD and Stage chrome usable in the same spirit as the desktop reference rather than dropping required controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_festival_spec"
description = "Combat and Stage-map controls use the warm fiesta accent styling rather than unstyled native buttons that contradict the reference aesthetic"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Stage title, node names, and HUD numbers show clear typographic hierarchy rather than a single undifferentiated size"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Locked/unlocked Stage nodes and Mask card states match the instruction visual states in a way consistent with the reference treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Overlay and HUD surfaces use dark festival panels consistent with the reference rather than light flat cards that break the aesthetic"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover/press and meter-ready microinteractions are present in the spirit of the reference interactive chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Stage map or HUD sizing/spacing wildly contradicts the dense reference scale (huge empty voids or crushed overlapping controls)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_festival_palette"
description = "Primary surfaces abandon the dark festival-night palette for an unrelated bright default theme that contradicts reference and instruction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_required_hud"
description = "Required HUD meters or Stage nodes are sized so small or huge that they contradict both instruction legibility and reference composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required attack, Fury, or overlay enter motion from the instruction is missing entirely"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Primary Stage-map and combat controls use bare browser-default styling that contradicts the reference festival chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "At desktop width the Stage node row or HUD is misaligned into a broken composition unlike the reference overview"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Reference-critical Stage nodes, Pesos readout, or HUD meters are clipped or offscreen at the desktop layout"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "The Stage-select structure omits the Stage node row or chrome cluster present in the reference composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Stage title and supporting HUD/chrome text are typographically undifferentiated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Interactive chrome has no hover/press feedback where the reference interactive controls clearly respond"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the reference screenshots (with text winning conflicts) that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

