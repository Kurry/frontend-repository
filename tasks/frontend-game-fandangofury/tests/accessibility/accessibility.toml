[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive Stage-map, combat, overlay, Export, Import, and Pause control is reachable with the keyboard alone and shows a visible focus indicator when focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Cantina, Masks, History, Fighter Settings, Export Campaign, Import Campaign, Pause, and reset-confirmation overlays trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only or icon-leading controls (Cantina, Masks, Settings, History, Export, Import, Pause, Reset) expose accessible names via text or equivalent labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Save Checkpoint, Copy confirmation, Import validation errors, and illegal-action feedback are exposed in a way assistive tech can notice (visible text and/or live region), not color alone"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Fighter Settings fields (display name, effects intensity) and Import Campaign input have explicit labels associated with their controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Stage-select title and overlay titles (Cantina, Masks, Fighter Settings, Export Campaign, Import Campaign, Pause, History) follow a logical heading order without skipping levels chaotically"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "The Stage map and combat view expose landmark or region structure so primary navigation and main combat content are distinguishable"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "HUD text, Stage-map labels, and overlay controls maintain readable contrast against the dark festival surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Primary actions use button/link semantics and overlays behave as dialogs rather than unlabeled generic containers for interactive content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "When prefers-reduced-motion is set, non-essential overlay enter transitions and celebratory bursts are reduced or removed while Pause, Export, Import, and combat flows remain completable"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.11"
name = "combat_keys_and_pause_operable"
description = "Every combat action is operable from the keyboard (Z, X, C, Space, F) and Pause is operable via P as well as its on-screen button"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "meters_not_color_only"
description = "Health bar and Fury meter values are readable as text or accessible attributes, not color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Stage-map, combat, Export, Import, or Pause controls cannot be reached or activated with the keyboard alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused controls show no visible focus indicator or the indicator is fully obscured"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom combat or overlay controls lack button/dialog semantics required for assistive use"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Fury ready, Mask equipped, or Stage locked/unlocked state is conveyed by color alone with no text or accessible attribute"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "Export, Import, Pause, or reset-confirmation overlays do not trap focus and tab escapes into the page behind"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "HUD or overlay text contrast is so poor it is unreadable on the dark festival background"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Import or Fighter Settings errors appear only as a color change with no text naming the field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "icon_controls_missing_names"
description = "Icon-only Export, Import, Pause, or Reset controls lack accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Overlay and Stage titles skip heading levels in a way that breaks logical outline (e.g. jumping from h1 to h4 with no intermediates) across the primary screens"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, large full-screen Fiesta Fury or victory bursts still play unabated and block interaction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

