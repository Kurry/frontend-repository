[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: command-session-v1, browse-query-v1, entity-collection-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with session_*, browse_*, entity_*, and artifact_* prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: session start/pause/resume/restart/advance/stop, browse open to stage-map/masks/cantina/export-campaign/import-campaign, entity mask select/toggle, and artifact export/import/copy change the same shared campaign/combat state the on-screen controls use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: session start/pause/resume/restart/advance/stop; browse destinations stage-map, masks, cantina, export-campaign, import-campaign; entity mask select/toggle with fields name/bonus/equipped; artifact export/import/copy with format/mode campaign-json — no invented destinations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound session, browse, entity, and artifact tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_mask_select_toggle_work"
description = "Entity operations declared for entity mask work: select and toggle update the visible Masks equipped/unequipped treatment through the same path as the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_pause_resume_start_bound"
description = "Session operations start, pause, resume, restart, advance, and stop are bound and invoke without throwing when called through WebMCP (combat timing outcomes remain Playwright-observed)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_export_import_copy_campaign_json"
description = "Artifact operations export, import (mode campaign-json), and copy with export format campaign-json are bound and invoke without throwing when called through WebMCP (clipboard/file contents remain Playwright responsibilities)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond command-session-v1, browse-query-v1, entity-collection-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app own registration without requiring manual edits to /tests harness files"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "browse_opens_declared_destinations"
description = "Browse open to stage-map, masks, cantina, export-campaign, and import-campaign updates visible navigation/overlay state via the same handlers as UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for command-session-v1, browse-query-v1, entity-collection-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound session/browse/entity/artifact tool leaves Stage map, Masks, Export preview, or combat session state diverging from what the equivalent visible UI control would produce"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings are exposed on the WebMCP surface"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool cannot exercise the declared contract from automation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "A WebMCP path bypasses Campaign JSON or Fighter Settings validation and leaves MCP and UI campaign state inconsistent"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for the mandated modules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test harness hacks rather than app-registered tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "A required module among command-session-v1, browse-query-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "Invoking declared tools fails automated MCP contract validation for this app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

