[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "festival_night_palette"
description = "The Stage map and combat scene sit on deep near-black surfaces with warm fiesta accent hues (red, orange, gold, or teal) on controls, meters, and highlights"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "dense_combat_hud_legible"
description = "The combat HUD shows the fighter Health bar, Fury meter, Wave X of Y indicator, combo counter, and Peso balance legibly at once without opening another screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "combo_and_fiesta_visual_distinction"
description = "Combo feedback is a popup that increments per hit, and completing the Fiesta Combo shows a distinct celebratory flash and label clearly beyond the plain combo counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "festival_night_aesthetic_and_end_screens"
description = "The Victory screen uses a celebratory treatment distinct from the ordinary in-combat HUD, the Derrota screen reads as a clear defeat state, and the Pause overlay is visually distinct from both end screens"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "boss_telegraph_visually_distinct"
description = "Boss wind-up cues are visually distinct from the boss normal attack animation, giving a clear tell before the strike lands"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "flat_or_default_browser_chrome"
description = "The Stage map, combat HUD, or overlays render with flat unstyled browser-default controls that lack the festival accent treatment described for the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.7"
name = "mask_and_stage_states_undifferentiated"
description = "Locked, unlocked-but-unequipped, and equipped Mask cards look the same, or locked, unlocked, and completed Stage nodes are visually indistinguishable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.8"
name = "cantina_cost_hierarchy_legible"
description = "The Cantina shows each upgrade current level and its escalating cost with a clear hierarchy so the current tier and the next-tier cost are easy to tell apart"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "overlay_chrome_consistent"
description = "The Cantina, Masks, History, Fighter Settings, Export Campaign, Import Campaign, Pause, and reset-confirmation surfaces share one consistent overlay chrome — panel surface, title treatment, and close control styled the same way"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "history_panel_regions_distinct"
description = "The History panel presents the snapshot list, the labelled History state region, the Undo/Redo controls, the Apply Scenario Change action, and any alternate branch as distinguishable regions without overlapping the primary controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "consistent_icon_style"
description = "Menu and HUD controls use one consistent vector icon style — the Cantina, Masks, Settings, History, Export, Import, Pause, and Reset controls each carry a recognizable icon alongside their label"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "narrow_overlays_and_buttons_fit"
description = "At about 375px wide, combat action buttons stay large enough to tap and overlays including Export Campaign and Pause fit without horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "fury_button_enabled_vs_disabled"
description = "The Fury meter takes on an unmistakable ready treatment once full, and the Fiesta Fury button enabled look is visibly different from its disabled look"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "export_import_regions_distinct"
description = "Export Campaign presents a scrollable Campaign JSON preview, Copy, and Download as distinguishable regions; Import Campaign presents an input, apply control, and inline field-error space"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "health_danger_color_below_quarter"
description = "Fighter and boss health bars switch to a clear danger color treatment below roughly 25 percent remaining"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

