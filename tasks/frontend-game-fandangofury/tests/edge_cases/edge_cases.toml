[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "first_load_guidance_and_locked_stages"
description = "On first load with empty storage, Stage 1 is playable, later Stages show locked, and Stage-map controls (Cantina, Masks, Settings, Export, Import, History, Reset) are discoverable without a blank empty combat scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "fighter_and_import_inline_validation"
description = "Fighter Settings and Campaign Import show inline per-field validation before apply/submit for out-of-contract values (displayName bounds, effectsIntensity 0–100, schemaVersion, checkpoint.phase)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "illegal_action_feedback_actionable"
description = "Illegal combat actions (Fiesta Fury while not full, Dodge during cooldown) and Import failures show clear actionable feedback naming the problem rather than only Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "checkpoint_and_copy_confirmation"
description = "Save Checkpoint and Export Copy/Download show visible success confirmation after the action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "pause_overlay_as_run_status"
description = "While paused, the Pause overlay clearly indicates the run is frozen with Resume, Save Checkpoint, and Abandon Run available (genre stand-in for async loading feedback during a held state)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "reset_and_abandon_cancel"
description = "Reset Progress and Abandon Run support cancel on their confirmation step, leaving progress or the paused run unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "combat_key_hints_present"
description = "Non-obvious combat controls expose key hints or labels for Z/X/C/Space/F/P so players can discover Pause and attacks"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, and labels for Stage-map, combat HUD, Fighter Settings, and Import use semantic interactive tags rather than clickable bare text nodes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_close_paths"
description = "Modal overlays (Cantina, Masks, Settings, Export, Import, Pause, Reset confirm) close via an explicit close control and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "wave_progress_feedback"
description = "During a Stage, the Wave X of Y indicator provides ongoing progress feedback through the multi-wave combat flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "combo_idle_resets_to_one"
description = "Letting an attack chain lapse for 3 seconds resets the next combo counter back to 1 rather than continuing to climb"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "import_invalid_leaves_campaign_unchanged"
description = "Importing malformed or field-invalid Campaign JSON leaves Pesos, Masks, Stages, Fighter Settings, checkpoint, and Export preview unchanged while naming the offending field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "locked_stages_look_playable_with_no_feedback"
description = "Locked Stage nodes look identical to unlocked ones and provide no locked feedback when activated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Fighter Settings, Import, or illegal-action errors are surfaced only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "pause_save_or_import_silent"
description = "Pause, Save Checkpoint, Copy, or Import actions lack visible feedback and silently succeed or fail"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "reset_or_abandon_no_warning"
description = "Reset Progress or Abandon Run proceeds with no confirmation warning"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Primary combat or Stage-map actions are only non-semantic div/span click targets without button/input semantics"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Export, Import, Pause, or reset-confirmation overlays cannot be dismissed via Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Fighter Settings or Import validation feedback is missing or delayed with no UI indication before/at submit"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Strike, Smash, Pause, Export Campaign, Import Campaign, or Resume Run controls have ambiguous or missing labels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "no_guidance_for_resume_or_export"
description = "Resume Run and Export/Import Campaign flows have no in-app labelling or discoverable entry points on the Stage map"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Pause, Save Checkpoint, Export, or Import affordances are visually hidden or inaccessible during the phases that require them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

