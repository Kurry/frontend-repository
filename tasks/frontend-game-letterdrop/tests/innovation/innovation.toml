[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_score_and_power_feedback"
description = "Beyond bare score increments: valid-word, Bomb/Slow, and streak-multiplier feedback feels polished (count-up, distinctive toast timing, or tray/board juice) rather than a static number swap."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "tier_acceleration_feels_authored"
description = "Fall-speed and spawn-rate acceleration across Tier 1→2→3+ reads as intentional game feel (eased ramp, readable tier cue) rather than an abrupt unexplained snap."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "pre_start_guidance_polish"
description = "The pre-start board message Press Start game to begin! plus clear control labeling forms a light guided first-run path beyond a blank canvas."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "power_tiles_read_at_a_glance"
description = "Bomb and Slow tiles are visually distinct from ordinary letters and each other in a way that improves play readability beyond the minimum color swap."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "touch_and_click_parity_polish"
description = "Where present, click and tap selection on falling tiles feel equally reliable, with selection feedback that makes tray membership obvious."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "settings_personalization_beyond_mvp"
description = "playerName and startingTier settings feel integrated (History game-results show playerName; tier readout reflects startingTier) as personalization polish, not a disconnected stub form."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "achievement_unlock_moment"
description = "Unlocking Clean Sweep / Combo Master / Marathon (or milestone badges) delivers a memorable celebratory moment (toast + particle burst) tied to the real unlock."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "hud_state_at_a_glance"
description = "Streak badge, tier readout, Best Score, and danger line form a readable at-a-glance HUD language beyond sparse unlabeled numbers."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "offline_local_dictionary_polish"
description = "Bundled in-browser dictionary play feels complete offline — common short words clear regularly — as a platform-appropriate local experience."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_game_feel"
description = "Overall LetterDrop play feel (fall easing, clear juice, pause dim, history insert) reads competition-polished rather than a bare prototype loop."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.11"
name = "run_record_export_feels_useful"
description = "Optional polish: Export Run / Export History feels like a useful takeaway artifact (clear JSON preview, Copy confirmation, or history archive) beyond a bare download stub."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the LetterDrop spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
