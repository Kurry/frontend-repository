[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from a 1440px-wide viewport to roughly 375px, the LetterDrop HUD, view tabs, and canvas board reflow to fit without requiring a horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_comfortable"
description = "At roughly 375px wide, Start game, Submit Word, Pause/Resume, Undo Last Tile, and view tabs present tap targets large enough to activate comfortably (at least about 44px in the smaller dimension where the control is a discrete button)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "hud_type_readable_on_mobile"
description = "At 375px, HUD score/Best Score/tier readouts and button labels remain readable without shrinking into illegible type."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_at_desktop_or_mobile"
description = "At 1440px and at 375px, no HUD panel, tab bar, settings form, or board chrome clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "tabs_and_settings_usable_narrow"
description = "At roughly 375px, the Game/History/Achievements tabs and the Settings form remain fully usable (open, switch, and interact) without being cut off."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stacking_keeps_controls_reachable"
description = "At narrow widths, the board and control chrome stack or compress so Start game / Submit Word remain reachable above the fold or via normal scrolling of the page content."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "tiles_tappable_on_narrow_board"
description = "At roughly 375px, falling tiles on the scaled canvas remain large enough to tap/click to select into the current-word tray."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At roughly 375px wide, the document does not require horizontal scrolling to reach the board, HUD, or tabs."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_scales_to_viewport"
description = "The HTML5 canvas game board scales with the layout at 1440px and 375px so the six-column playfield fits within the available content width rather than overflowing."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_hud_controls_stay_accessible"
description = "If any run controls are sticky/fixed, they remain tappable at both 1440px and 375px and do not permanently cover the Submit Word or Pause controls."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "At 1440px or 375px, the HUD, tabs, or board overflow the viewport or break into an unusable layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At roughly 375px, primary run controls are too small or misaligned to tap reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "mobile_hud_text_illegible"
description = "At roughly 375px, score, Best Score, or tier text is too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_unnecessarily"
description = "At 1440px or 375px, board or HUD content is cropped or forces unnecessary scrollbars that hide controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "tabs_missing_at_narrow_width"
description = "At roughly 375px, the Game/History/Achievements tabs are missing, clipped, or cannot be activated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_board"
description = "A fixed/sticky chrome element permanently obscures the canvas board or the word tray at a common viewport size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At roughly 375px, HUD panels, tabs, or buttons overlap each other so labels or hit targets collide."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "tiles_untappable_when_scaled"
description = "At roughly 375px, canvas tiles are too small or mis-hit-tested to select into the word tray."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "canvas_static_size_overflows"
description = "The canvas board keeps a fixed desktop pixel size and overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_375"
description = "At roughly 375px, Start game, Submit Word, Pause, or Undo Last Tile disappears from the UI."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "export_save_reachable_at_375"
description = "At roughly 375px wide, Save Progress, Export Run, and Resume Saved Run remain reachable and operable without horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_save_unreachable_on_mobile"
description = "At roughly 375px, Save Progress, Export Run, or Resume Saved Run is clipped, off-screen, or otherwise unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

