[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The layout uses the light #F5F5F7 background with #007AFF reserved for the primary Submit Word action and key highlights."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Primary buttons (Submit Word, Pause) use blue #007AFF fill with light text and a full pill shape; secondary buttons (Undo Last Tile, Resume) use the light #E6EEF7 fill with blue text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "3_3"
description = "Bomb and Slow power tiles are visually distinct from ordinary letter tiles and from each other in shape and color."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The danger line is always visible and reads as a hazard distinct from the board background."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The active streak badge and difficulty tier are visually highlighted, and locked achievements are muted or grayscale turning to full color when unlocked."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "At roughly 375px wide the board and HUD scale to fit without horizontal scrolling and tiles stay comfortably tappable."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "viewport_overflow_or_clipping"
description = "At a 1440px or 375px viewport, content clips or overflows the viewport horizontally, or the view tabs, HUD, or settings form become unusable."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "state_highlight_indistinguishable"
description = "The active streak badge, difficulty tier readout, or unlocked achievements are visually indistinguishable from their inactive or locked counterparts."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.9"
name = "typography_scale_and_stack"
description = "Computed styles show an Arial-based system font stack with H1 at 34px and H2 and body text at 17px."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "spacing_and_radius_tokens"
description = "Panels and cards use a 6px border radius, spacing follows a consistent 4px-based scale, and primary and secondary buttons render as full pills with no shadow."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "consistent_chrome_and_icon_set"
description = "HUD panels, view tabs, dialogs, toasts, and the settings form share one consistent component style throughout the chrome, and every icon in the chrome comes from a single icon set applied consistently."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "inline_error_treatment_distinct"
description = "Inline validation messages in the settings form render in a clearly distinct error treatment directly under the field they name."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "ui_copy_quality"
description = "Where the app renders headings, button labels, empty states, and messages, the copy is free of spelling errors and placeholder text, uses one capitalization convention, and names the same concept consistently across surfaces."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
