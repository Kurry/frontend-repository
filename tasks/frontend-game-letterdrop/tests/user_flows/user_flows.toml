[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "full_run_round_trip"
description = "Without a page reload until the final step: press Start game, submit one valid word and confirm the HUD score rises and the streak meter increments; let a tile cross the danger line and confirm Game Over shows that run's final score; switch to History and confirm exactly one new top game-result with the same score, tilesCleared, durationSec, playerName, tierReached, and endedAt; if the final score beat the previous best, Best Score shows the new value; after a full page reload the History entry and Best Score remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "achievement_echo_flow"
description = "Fully clear the board during a run and confirm Board Cleared! plus an unlock toast at the clear; switch to Achievements and confirm Clean Sweep flipped from locked to unlocked in full color without a reload; after a full page reload Clean Sweep remains unlocked."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "streak_build_and_reset_flow"
description = "Three consecutive valid submissions show the streak meter at 3 and a multiplier badge next to the score; one invalid submission then resets the meter to zero and removes the badge; the next valid word scores without the streak multiplier."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "settings_name_history_round_trip"
description = "With at least one prior History entry recorded, save a new playerName in Settings, finish a run, and open History: the new game-result carries the new playerName while earlier entries keep their original playerName values."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "pause_integrity_flow"
description = "Pausing mid-run freezes the timer value and all tile positions with a Paused overlay; resuming continues the timer from the frozen value and tiles from the frozen positions; the score is unchanged by the pause itself."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "start_play_gameover_restart_loop"
description = "Start → play → Game Over → Play again (or Start game again) begins a fresh run: the board returns to an active falling-tile state, the run score resets for the new run, and prior History entries remain listed."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "tab_switch_retains_run_state"
description = "During an active run, switching from Game to History or Achievements and back to Game retains the same score, streak, and board state without ending the run or requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "settings_overlay_round_trip"
description = "Opening Settings, entering a one-character name (inline validation appears), correcting it to a valid 2–20 character name, and saving closes the form and returns to the game chrome without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "game_over_play_again_recovery"
description = "From the Game Over screen, activating Play again recovers into a playable run without a full page reload and without a navigation dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "invalid_word_keeps_run_alive"
description = "Submitting a non-dictionary word shakes the tray and shows a Not a word style message, resets the streak to zero, and leaves the run active so further tile taps and Submit Word remain available without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_game_flows_unavailable"
description = "Start game, Pause/Resume, Submit Word, or Play again after Game Over is missing or non-functional from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "history_entry_missing_or_duplicated"
description = "Finishing a run fails to add a History entry, or produces a duplicate top entry for a single finished run."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "score_desyncs_across_surfaces"
description = "After Game Over, the final score shown on the Game Over screen disagrees with the score on the new History entry or the Best Score update without a reload intervening."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "tab_switch_ends_or_corrupts_run"
description = "Switching between Game, History, and Achievements during a run ends the run, resets the score, or corrupts the board state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_history_ui_broken"
description = "Before any run has finished, the History tab is a blank region with no friendly empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "pause_leaks_motion_or_timer"
description = "While Paused, tiles continue falling or the run timer keeps advancing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "settings_cannot_reopen_after_close"
description = "After closing Settings, the Settings control cannot reopen the form."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "paused_or_gameover_overlay_traps"
description = "The Paused overlay or Game Over screen blocks returning to play with no Resume or Play again exit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_submit_lacks_feedback"
description = "An invalid word submission or empty-tray Submit Word leaves the tray and streak unchanged with neither an on-screen rejection message nor a disabled Submit Word control."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "restart_requires_full_reload"
description = "Recovering from Game Over into a new run requires a full page reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.11"
name = "export_after_play_flow"
description = "Finish a run that scored at least one valid word, open Export Run from Game Over or that History entry, and confirm the preview JSON contains format letterdrop-game-v1, schemaVersion 1, that final score, and each submitted word with its points; Export History then lists that same run under format letterdrop-history-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "save_resume_across_reload_flow"
description = "Start a run, submit at least one valid word, press Save Progress, fully reload, then press Resume Saved Run and confirm score, tray, streak, tier, and tile layout match the checkpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "import_run_json_round_trip_flow"
description = "Export a finished run as run-json, import that file, and confirm a History game-result appears with the same score, tilesCleared, durationSec, playerName, tierReached, endedAt, and words as the export."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_flow_dead_end"
description = "After Game Over, Export Run is missing or produces no downloadable/copyable artifact containing format letterdrop-game-v1 with the finished run's score and words."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n12"
name = "save_resume_flow_broken"
description = "After Save Progress mid-run and a full page reload, Resume Saved Run leaves the live score, tray, streak, tier, or board empty instead of the saved checkpoint."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

