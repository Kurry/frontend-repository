[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "tile_fall_smooth_gradual_acceleration"
description = "Tiles animate downward smoothly and the fall rate increases gradually rather than snapping between speeds."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "invalid_word_tray_shake"
description = "Submitting an invalid word (by clicking real tiles and Submit Word) shakes the word tray as its rejection feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "transient_toasts_fade"
description = "Valid-word scoring, power-tile activation, Board Cleared, and achievement unlocks each surface a transient toast that fades on its own without blocking play."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "pause_overlay_freeze_resume"
description = "Pressing the real Pause control dims the board with a Paused overlay and freezes tile motion, and Resume restarts motion from the frozen state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "hover_and_focus_visible_states"
description = "All buttons show a visible hover state and keyboard Tab focus is visible on every interactive control."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "toast_persists_or_blocks_play"
description = "A transient confirmation toast persists indefinitely or blocks further interaction with the board and controls."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.7"
name = "pause_fails_to_halt_motion"
description = "Pressing the real Pause control leaves the fall animation visibly running, or motion evidence only appears when game state is snapped through a shortcut rather than driven through the real controls."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "streak_meter_animates"
description = "Driven through real tile taps and Submit Word, the combo streak meter fills or animates as consecutive valid submissions accrue and resets visibly on an invalid submission."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "celebration_particle_bursts"
description = "Fully clearing the board and unlocking an achievement each fire a celebratory particle burst tied to that exact moment, triggered only by the real winning action performed through the UI, and the burst never loops ambiently."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "history_entry_animates_in"
description = "When a run ends, the new Match History entry animates into the top of the list rather than appearing instantly."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "settings_form_open_close_transition"
description = "The settings form opens and closes with a short transition, and buttons show hover and focus-visible transitions when hovered and keyboard-focused on the real controls."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
