[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "best_score_survives_reload"
description = "After a completed run that beats the previous best, a full page refresh restores the exact Best Score from localStorage."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "match_history_survives_reload"
description = "After a completed run, a full page refresh restores the exact Match History game-result rows (score, tilesCleared, durationSec, playerName, tierReached, endedAt) in the same most-recent-first order."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "achievements_survive_reload"
description = "After unlocking an achievement, a full page refresh keeps that achievement unlocked and still-locked ones locked."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "rapid_repetition_robustness"
description = "The main run withstands at least 25 rapid deterministic repetitions through the normal controls with an exact final visible state and no blank screen, uncaught error, or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "stale_input_rejected"
description = "Stale input from a paused or Game Over phase does not mutate the current run; illegal actions are rejected with specific visible feedback rather than corrupting state."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "branching_history_state_region"
description = "Undo, Redo, and a visible History state region support Apply Scenario Change: undo then a different change creates a selectable branch, and restoring a branch restores the exact prior visible board/run state."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "views_desync_same_datum"
description = "The same datum (live score, Best Score, streak, or History top-row score) shows conflicting values in two visible surfaces at once without a reload."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "debug_artifacts_visible"
description = "Visible debug output, leftover placeholder scaffolding, or verbose console.log spam appears in the running production UI during normal play."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "blank_or_broken_start_path"
description = "Loading / via the documented start path renders a blank or broken page instead of the LetterDrop shell."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "nondeterministic_baseline_on_reload"
description = "Two cold loads with the same persisted storage show different History rows, Best Score, or achievement unlock sets without user action."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.11"
name = "fabricated_persisted_data"
description = "Starting from a fresh context with empty storage, the app shows fabricated history entries, a non-zero Best Score, or pre-unlocked achievements instead of the empty history state and a zero Best Score."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.12"
name = "single_route_panels_via_client_state"
description = "Match History, Achievements, and Settings are shown and hidden within the single route / via client state without a full document navigation to another path."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "shared_store_coherence_across_tabs"
description = "A change made in one surface (score after a valid word, Clean Sweep unlock, saved playerName) is immediately reflected in every other surface showing that datum without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "app_serves_on_start_path"
description = "The app serves and runs via its documented npm start path on port 3000 with the LetterDrop UI interactive and no boot-time console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "console_clean_during_exercise"
description = "The browser console shows zero errors and no unhandled promise rejections while exercising start, play, pause, resume, save/resume, export/import, Game Over, restart, History, Achievements, and Settings."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "mandated_persistence_absent"
description = "After a completed run and achievement unlock, a full page refresh loses Best Score, Match History, unlocked achievements, or saved settings even though localStorage persistence is required."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.17"
name = "outbound_network_requests"
description = "Devtools shows outbound network requests to external origins (dictionary APIs, CDN scripts, remote fonts, or icon sets) during load or play."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.18"
name = "external_link_navigates_away"
description = "Chrome that looks like an in-app control is actually an external <a href> that navigates the tab away from the app origin during normal use."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.19"
name = "saved_settings_survive_reload"
description = "After saving playerName and startingTier in Settings, a full page refresh restores them: reopening the form shows the saved playerName and startingTier, and a new run still starts at the chosen tier."
type = "binary"
weight = 1.0


[[criterion]]
id = "2.20"
name = "save_checkpoint_survives_reload"
description = "After Save Progress mid-run, a full page refresh keeps the checkpoint available: Resume Saved Run restores the saved score, tray, streak, tier, and board rather than discarding it."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "console_clean_with_export_and_save"
description = "The browser console shows zero errors while exercising save/resume, Export Run, Export History, Import, Game Over, and History alongside ordinary play."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "export_import_round_trip_schema"
description = "Exporting a finished run as letterdrop-game-v1 JSON and re-importing it reconstructs History fields (score, tilesCleared, durationSec, playerName, tierReached, endedAt, words) without console errors or fabricated extra runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n22"
name = "checkpoint_lost_on_reload"
description = "After Save Progress, a full page refresh loses the mid-run checkpoint so Resume Saved Run is unavailable or restores an empty run."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console, storage, coherence, or runtime) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true

