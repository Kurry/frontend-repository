[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "session_browse_artifact_modules_bound"
description = "Contract modules command-session-v1, browse-query-v1, and artifact-transfer-v1 are initialized and bound so webmcp_list_tools surfaces session_*, browse_*, and artifact_* tools for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "session_handlers_match_ui_controls"
description = "Invoking session start/pause/resume/restart produces the same visible run-state changes as pressing Start game, Pause, Resume, and Play again/restart in the UI (same store commands)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_destinations_artifacts"
description = "Exposed tools stay within declared session operations (start, pause, resume, restart), browse destinations (game-board, match-history, achievements), and artifact operations/formats (export, import, copy; run-json, history-json) — no invented modules or undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool can exercise the bound session operations, browse destinations, and artifact export/import/copy triggers without manual harness edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "session_operations_all_work"
description = "Session operations start, pause, resume, and restart each change the visible run appropriately (run begins; board dims/freezes; motion continues; run resets) when invoked through WebMCP."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "browse_destinations_switch_panels"
description = "Browse open (or equivalent) to destinations game-board, match-history, and achievements switches the visible panel the same way as the Game, History, and Achievements tabs."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "destinations_match_bindings"
description = "Browse destinations match the Bindings list exactly: game-board, match-history, achievements — not arbitrary URLs or undeclared panels."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_export_import_copy_bound"
description = "Artifact tools for export, import, and copy are bound to run-json and history-json formats/modes and drive the same Export Run / Export History / Import / Copy UI paths (without returning raw file or clipboard contents in tool results)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_surface_ok"
description = "webmcp_session_info returns usable session metadata, webmcp_list_tools lists the bound tools, and webmcp_invoke_tool returns structured results without errors for declared operations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own implementation of the module_spec + Bindings without requiring edits to /tests or the verifier harness."
type = "binary"
weight = 1.0

