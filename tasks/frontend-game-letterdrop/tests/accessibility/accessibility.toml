[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "chrome_controls_keyboard_accessible"
description = "Canvas tile taps are exempt from per-element keyboard semantics, but Start game, Pause, Resume, Submit Word, Undo Last Tile, Save Progress, Resume Saved Run, Export Run, Play again, the Game/History/Achievements view tabs, and the Settings control are all reachable and activatable with Tab, Shift+Tab, Enter, or Space."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "settings_form_manages_focus"
description = "Opening the Settings form moves keyboard focus into the form; closing it (Save or dismiss) returns focus to the Settings control or another sensible chrome control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "chrome_icons_have_accessible_names"
description = "Where the chrome renders Iconify icons as meaningful controls (Settings, tabs, or run controls), each has an accessible name via aria-label, visually adjacent text, or equivalent — decorative icons are marked so they are ignored."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.4"
name = "toasts_and_errors_use_live_regions"
description = "Transient toasts (valid-word score, Bomb/Slow, Board Cleared!, achievement unlock) and the settings inline validation message are exposed to assistive tech via an ARIA live region or role=status/alert in addition to being visually visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "settings_fields_have_explicit_labels"
description = "In the Settings form, the playerName field and startingTier select each have an explicit associated label element naming the field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "heading_order_includes_letterdrop"
description = "The page exposes a logical heading order with LetterDrop as an H1 and subsequent chrome section titles (if any) not skipping levels (no H1→H3 jump)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_or_main_present"
description = "The document exposes at least one landmark such as main (or a role=main region) wrapping the game chrome so assistive tech can skip past repeated UI."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "hud_text_meets_contrast"
description = "HUD labels, score/Best Score readouts, view tabs, and primary button text on #007AFF / #E6EEF7 surfaces meet WCAG AA contrast against their backgrounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "chrome_uses_semantic_controls"
description = "View tabs and run controls (Start game, Pause, Resume, Submit Word, Undo Last Tile, Save) are implemented as buttons or links with button/link semantics, not unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, non-essential motion (toast fades, history list insert animation, settings open/close transition, celebratory particle bursts) is reduced or disabled while the game remains fully playable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "hud_score_announced_as_text"
description = "HUD score, Best Score, streak, and tier readouts are exposed as readable text (or an equivalent live region) so assistive tech can announce score changes without relying on the canvas alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "export_import_dialogs_manage_focus"
description = "Where Export Run, Export History, or Import opens a dialog, it takes focus when open, traps focus while open, closes on Escape, and returns focus to the control that opened it."
type = "binary"
weight = 1.0

