[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "history_empty_state_before_runs"
description = "Before any run has finished, the Match History panel shows a friendly empty-state message instead of a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "settings_inline_validation_before_submit"
description = "Typing a one-character playerName in Settings shows an inline validation message directly under the name field that names playerName and the 2–20 character length rule before any submit; Save stays disabled until valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "invalid_word_actionable_feedback"
description = "Submitting letters that do not form a dictionary word does not silently reject: the word tray shakes, an inline Not a word style message appears, and the streak resets to zero."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "valid_word_and_unlock_confirmations"
description = "Submitting a valid word, triggering Bomb/Slow, clearing the board, and unlocking an achievement each show a transient confirmation (toast or equivalent) that does not block further play."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "pre_start_board_guidance"
description = "Before a run starts, the canvas board reads Press Start game to begin! so the first-run control path is explained on screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_last_tile_available"
description = "During an active run with letters in the tray, Undo Last Tile removes the most recently tapped tile without submitting; the control is a visible cancel/undo affordance for tray selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "pause_and_resume_affordances_clear"
description = "During a run, Pause and Resume are clearly labeled controls; pausing shows a Paused overlay so the frozen state is obvious."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "settings_and_run_controls_semantic"
description = "Settings fields use labeled inputs/selects and run controls use button semantics with specific labels (Start game, Submit Word, Undo Last Tile, Pause, Resume, Save)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "settings_form_dismissible"
description = "The Settings form can be closed via Save when valid and has a clear dismiss/cancel path that returns to the game chrome without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "empty_tray_submit_rejected_safely"
description = "Pressing Submit Word with an empty tray does not end the run, deduct points, or reset the streak; it shows a visible rejection or the control is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_history_has_no_feedback"
description = "Before any run has finished, History shows nothing and provides no empty-state UI feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "invalid_word_errors_only_in_console"
description = "A non-dictionary Submit Word surfaces its failure only in the browser console with no on-screen tray shake or Not a word message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "power_or_score_actions_silent"
description = "A valid-word score, Bomb/Slow activation, Board Cleared!, or achievement unlock occurs with no visible confirmation toast."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "stale_phase_input_mutates_run"
description = "Clicks on the board after Game Over, or tile taps issued while paused, mutate the current run's score, tray, or board state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "run_controls_are_nonsemantic_divs"
description = "Primary run controls (Start game, Submit Word, Pause, Resume) are plain div/span click targets without button semantics or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "settings_not_keyboard_dismissible"
description = "The Settings overlay cannot be left via keyboard (no focusable dismiss/Save path) once opened."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "settings_validation_missing"
description = "A one-character playerName produces no inline validation under the field and Save remains enabled while invalid."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_run_button_labels"
description = "Primary run controls use ambiguous or missing labels (e.g. unlabeled icons only, or generic OK/Submit) instead of Start game, Submit Word, Pause, Resume, or Undo Last Tile."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "undo_empty_tray_errors"
description = "Activating Undo Last Tile when the tray is empty throws a visible error or crashes the UI instead of a no-op."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "rapid_activation_corrupts_transitions"
description = "Rapidly activating Start game, Pause, Resume, or Submit Word multiple times in quick succession produces a duplicate run, a duplicate history entry, or a corrupted score."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n11"
name = "fabricated_persistence_on_fresh_load"
description = "With no prior runs (empty storage), a reload shows fabricated History entries or a non-zero Best Score instead of the empty history state and a zero Best Score."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "4.11"
name = "malformed_import_rejected"
description = "Importing malformed JSON, a wrong format literal, schemaVersion other than 1, or a payload missing required game-result fields shows a visible rejection naming that the file is invalid and does not corrupt Match History or the live run."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "save_resume_gated_by_state"
description = "Save Progress is unavailable or clearly disabled when no run is active; Resume Saved Run is unavailable when no checkpoint exists."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n12"
name = "malformed_import_corrupts_history"
description = "Importing malformed JSON silently corrupts Match History or the live run without a visible rejection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.13"
name = "settings_out_of_bounds_rejected"
description = "Submitting Settings with playerName outside 2 to 20 characters or startingTier outside the enum 1, 2, 3 keeps Save disabled and shows an inline message naming the offending field; no partial save occurs."
type = "binary"
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

