[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "initial_load_shell"
description = "On load, the app opens at / with the title LetterDrop, view tabs Game, History and Achievements, a HUD showing Best Score, and a canvas board reading \"Press Start game to begin!\" with no login or backend."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "tiles_spawn_and_fall_six_columns"
description = "When Start game is pressed, letter tiles spawn at the top of the canvas board and fall downward through six columns at a steady rate, and more tiles keep spawning on a repeating interval so the board fills over time."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "tile_tap_builds_tray"
description = "After tapping two or more falling tiles, each tapped letter appears in the current-word tray beneath the board, and tapping an already selected tile removes it from the tray."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "valid_word_clears_and_scores"
description = "When Submit Word is pressed on tiles that spell a bundled-dictionary word, those tiles clear from the board, the score increases by an amount scaled to word length, and a transient confirmation such as +30 for \"CAT\"! appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "invalid_word_feedback_and_streak_reset"
description = "When Submit Word is pressed on letters that are not a dictionary word, the word tray shakes and an inline Not a word style message appears instead of a silent rejection, and the streak resets to zero."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "board_cleared_bonus_multiplier"
description = "After clearing every tile on the board through valid submissions, a Board Cleared! confirmation appears and the next scored word receives the bonus multiplier."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "danger_line_game_over"
description = "When an uncleared tile falls across the visible danger line, the run ends and a Game Over screen shows the final score with a Play again control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "streak_meter_thresholds"
description = "After several consecutive valid submissions, a visible streak meter grows and reaching thresholds of 3, 5 and 8 shows a temporary score-multiplier badge next to the score."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "bomb_and_slow_power_tiles"
description = "When a submitted word includes a Bomb tile its whole column clears and a \"Bomb! Column cleared\" toast appears; when it includes a Slow tile the fall speed drops for a few seconds and a named Slow toast appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "undo_last_tile_removes_recent"
description = "When Undo Last Tile is pressed, the most recently tapped tile is removed from the current-word tray without submitting the word."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "pause_resume_freezes_state"
description = "When Pause is pressed the tiles and timer freeze and the board dims with a Paused overlay; when Resume is pressed play continues from the exact same state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "history_list_and_empty_state"
description = "After finishing a run, the History tab lists that run most-recent-first with its score, tiles-cleared count and duration, and before any run finishes History shows a friendly empty-state message."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "achievements_locked_unlocked_states"
description = "On the Achievements tab, locked achievements appear muted or grayscale and named achievements such as Clean Sweep, Marathon and Combo Master turn to full color once their milestone is met, with a transient unlock confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "reload_restores_persisted_state"
description = "After a completed run, a full page refresh restores the exact Best Score, Match History rows, and unlocked achievements from localStorage, and never-created runs are not fabricated."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "branching_history_undo_redo"
description = "During an active run, using Apply Scenario Change adds a transition to the History state region; pressing Undo then applying a different change creates a selectable branch, and restoring a branch restores the exact prior visible board state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "tier_acceleration_readout"
description = "Fall speed and spawn rate increase as the score crosses thresholds and the current tier (Tier 1, Tier 2, Tier 3) is shown in a status readout."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "best_score_display_updates"
description = "Best Score is displayed at all times and updates only when a run's final score beats the previous best."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.30"
name = "nondictionary_word_scored"
description = "A submission of letters that are not in the bundled dictionary is scored, clears tiles, or triggers a Board Cleared bonus."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "external_dictionary_lookup"
description = "Word validity is resolved through an external dictionary API or any network request instead of entirely in-browser against a bundled word list."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "settings_form_inline_validation"
description = "The Settings control opens a form with a required player name field (2 to 20 characters) and a starting tier select (Tier 1, 2, or 3); typing a one-character name shows an inline message directly under the name field naming the field and the length rule before any submit, Save stays disabled while invalid, and correcting the name clears the message and enables Save."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "settings_save_applies_name_and_tier"
description = "Saving valid settings closes the form; each Match History entry recorded afterwards shows the saved player name, and a run started afterwards begins at the chosen starting tier shown in the tier readout."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "full_run_round_trip_flow"
description = "Scripted flow without reload until the final step: press Start game, submit one valid word and confirm the HUD score rises and the streak meter increments, let a tile cross the danger line and confirm Game Over shows that run's final score, switch to the History tab and confirm exactly one new top entry listing the same final score, tiles-cleared count and duration, confirm the Best Score readout shows the new value if it was beaten, then reload the page and confirm the History entry and Best Score are still present."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "achievement_unlock_echo_flow"
description = "Scripted flow: fully clear the board during a run and confirm the Board Cleared! confirmation plus an unlock toast appear at the moment of the clear, switch to the Achievements tab and confirm Clean Sweep flipped from locked to unlocked in full color without a reload, then reload the page and confirm Clean Sweep remains unlocked."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "streak_build_and_reset_flow"
description = "Scripted flow: three consecutive valid submissions show the streak meter at 3 and a multiplier badge next to the score; one invalid submission then resets the meter to zero and removes the badge, and the next valid word scores without the streak multiplier."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "settings_name_history_round_trip"
description = "Scripted flow: with at least one prior History entry recorded, save a new player name in the settings form, finish a run, and open the History tab; the new entry carries the new name while entries recorded before the change keep their original name."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "pause_integrity_flow"
description = "Scripted flow: pausing mid-run freezes the timer value and all tile positions; resuming continues the timer from the frozen value and the tiles from the frozen positions, and the score is unchanged by the pause itself."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "empty_tray_submit_rejected"
description = "Pressing Submit Word with an empty tray leaves the run, score, and streak unchanged, and either shows a visible rejection or the control is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "undo_empty_tray_noop"
description = "Activating Undo Last Tile when the tray is empty changes nothing on screen and produces no visible error."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.41"
name = "rapid_activation_duplicates_transitions"
description = "Rapidly activating Start game, Pause, Resume, or Submit Word multiple times in quick succession produces a duplicate run, a duplicate history entry, or a corrupted score instead of triggering each transition exactly once."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.42"
name = "stale_phase_input_mutates_run"
description = "Clicks on the board after Game Over, or tile taps issued while paused, mutate the current run's score, tray, or board state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.43"
name = "common_short_words_accepted"
description = "The bundled word list accepts everyday short words: submitting a tray spelling a common three-letter word such as CAT, DOG, or SUN is scored as valid rather than rejected."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
