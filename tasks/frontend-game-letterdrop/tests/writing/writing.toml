[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "chrome_headings_consistent_caps"
description = "Where the app renders headings and tab titles (LetterDrop, Game, History, Achievements, Settings), they use consistent capitalization throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "run_controls_use_specific_labels"
description = "Where the app renders run controls, labels are specific verbs matching the PRD (Start game, Submit Word, Undo Last Tile, Pause, Resume, Play again, Save, Save Progress, Resume Saved Run, Export Run, Export History) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders error messages, they name the problem: settings validation cites playerName and the 2–20 character rule (or startingTier when that field is wrong), invalid words show a Not a word style message, and Import rejection names that the file is invalid — not only Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "history_empty_state_explains"
description = "Where the app renders the Match History empty state before any run has finished, the copy explains that past runs belong there rather than a blank or cryptic stub."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "chrome_copy_spelling_grammar"
description = "Where the app renders chrome copy (title LetterDrop, pre-start Press Start game to begin!, Game Over, Board Cleared!, achievement names), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "letterdrop_terminology_consistent"
description = "Where the app renders labels for the same concept, terminology stays consistent (History vs Match History pairing is stable; streak/tier/Best Score are not renamed arbitrarily across HUD and panels)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "scores_and_tiers_formatted_consistently"
description = "Where the app renders scores, streak counts, and tier readouts (Tier 1, Tier 2, …), numeric formatting is consistent across HUD, Game Over, and History entries."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_toasts_are_specific"
description = "Where the app renders confirmations, they state what happened (e.g. +points for a word, Bomb! Column cleared, Slow, Board Cleared!, achievement unlock) rather than vague OK/Success alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_is_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as LetterDrop, Start game, Submit Word, Game Over, or Board Cleared!."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "concept_names_are_inconsistent"
description = "The same concept is named inconsistently across surfaces (e.g. Best Score vs High Score, History vs Matches) without a stable pairing."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_is_truncated_or_overflowing"
description = "Truncated or overflowing text renders HUD labels, tab names, or toast copy unreadable."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.9"
name = "export_save_confirmations_specific"
description = "Where the app renders Saved or Copied confirmations after Save Progress or Copy export, the copy states what happened rather than a vague OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered LetterDrop text exhibits a significant copy-quality defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
