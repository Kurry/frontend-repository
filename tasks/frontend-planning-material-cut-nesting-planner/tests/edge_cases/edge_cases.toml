[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "ec_1"
name = "invalid_cut_allowed"
description = "A non-guillotine cut is allowed to be created, or the cut tree is allowed to enter an invalid non-guillotine state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ec_2"
name = "defect_overlap_allowed"
description = "A piece is successfully placed overlapping a declared defect region, violating the defect boundaries without blocking."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ec_3"
name = "offcut_inventory_drift"
description = "Offcut inventory totals drift or fail to reconcile exactly against sheet area minus placed-part area plus the declared 3-mm kerf."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ec_4"
name = "completeness_invalid_tree"
description = "Completeness reports 100% even when there is an unplaced required part or an invalid cut tree."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ec_5"
name = "retry_multiple_increments"
description = "Rapid double-retry increments attempt counts more than once per single retry action."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ec_6"
name = "valid_cut_allowed"
description = "Attempt a valid guillotine cut. Confirm it is permitted and creates exactly two child regions."
type = "binary"
weight = 1.0
negate = false
