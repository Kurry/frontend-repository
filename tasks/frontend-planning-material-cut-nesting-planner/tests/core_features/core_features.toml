[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "cf_1"
name = "place_allocate"
description = "Place and allocate piece, checking constraints. Verify all linked panels update."
type = "binary"
weight = 1.0
negate = false

[[criterion]]
id = "cf_2"
name = "draw_cuts"
description = "Draw and order guillotine cuts, checking for valid edge-to-edge creation and separability."
type = "binary"
weight = 1.0
negate = false

[[criterion]]
id = "cf_3"
name = "retain_offcuts"
description = "Retain offcuts properly, verifying quantities, area, and deterministic lineage."
type = "binary"
weight = 1.0
negate = false

[[criterion]]
id = "cf_4"
name = "execute_recover"
description = "Execute sequence with a failure, trigger named recovery, then verify branch comparison and final certification."
type = "binary"
weight = 1.0
negate = false

[[criterion]]
id = "cf_5"
name = "export_geometry"
description = "Export plan and verify JSON geometry, SVG, CSV, and Markdown agree identically."
type = "binary"
weight = 1.0
negate = false
