[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "round_trip_interleaved_state"
description = "Interleave placement actions, cut reorders, offcut reservations, partial execution/damage branches, and undoing unexecuted-only actions. Then certify, export, and import the plan. Verify that the geometry, cut lineage, stock quantities, and file representations round-trip exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "import_transaction_atomicity"
description = "Attempt an import with invalid data (e.g. invalid cut tree, missing fields). Verify that the import acts as an atomic transaction: it completely rejects the invalid import, reports the diagnostics, and restores the complete prior snapshot with zero partial state mutation to the session."
type = "binary"
weight = 1.0
