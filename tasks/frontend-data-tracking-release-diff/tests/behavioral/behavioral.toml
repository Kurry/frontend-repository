[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "After sealing a cut, advancing rotation, and switching to Diff, a page reload coherently resets to the seeded versions, default selection, and seeded cycle with no session-cut versions remaining (in-memory genre)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Swap-pair proof: record added/removed/changed/unchanged counts for a base/compare pair, then swap the pickers; added and removed exchange exactly while changed and unchanged stay the same, proving counts derive from the selected manifests."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Changing the diff compare picker from 2.0.0 to 1.1.0 recomputes summary strip counts and row classification immediately rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "After sealing a cut, the new version appears in the sidebar and in Export Release pack JSON versions without a reload; after advancing rotation, the rotation panel cycle and export rotation.cycle match."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Measure sidebar version count immediately before and after a successful seal; the count increases by exactly one, and the timeline gains exactly one cut event."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Seal two cuts with different valid semver names and distinct notes tokens; Export Release pack JSON shows both names and both notes tokens as distinct versions entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Start a cut, switch to Diff and change pickers while the cut dialog remains available or after cancel, then complete a cut and advance rotation; sealed versions and rotation state remain coherent with export text."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Import round-trip: export conforming Release pack JSON, mutate rotation, import the pack, and confirm versions, task counts, and cycle restore; export again still satisfies schemaVersion larkspur-release-pack/v1 with required keys."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_pipeline_ends_at_pack_json"
description = "Full pipeline: seal a cut with notes token pack-probe-alpha, open Export release pack, and confirm Release pack JSON contains schemaVersion larkspur-release-pack/v1 and that notes token under versions; Copy places the exact preview text"
type = "binary"
weight = 1.0

