[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All views derive from one shared store: sealing a cut updates the sidebar, pickers, timeline, and Export Release pack JSON together; changing a diff picker recomputes classification and summary counts from the same manifests; advancing rotation updates panel, history, timeline, and export rotation.cycle in one action; a successful import replaces versions/rotation/timeline from that same store — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after cutting a release, exporting/importing a release pack, retrying a rank-stability check, advancing rotation, and switching tabs, and a page reload returns the app to its seeded state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "The console is free of errors and warnings on first load and stays clean after a complete cut with a failed-then-retried rank-stability check, export/import of Release pack JSON, diff pair changes, rotation advances, and copy actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "cold_load_interactive_2s"
description = "The app is interactive (sidebar and tab controls respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "rapid_input_stability"
description = "Under rapid repeated input (fast diff picker changes, quick tab switches, repeated rotation advances), the UI stays responsive with no hangs, and diff recomputation across two 20-plus-entry manifests shows no perceptible lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus"
description = "Every interactive control — sidebar entries, tabs, version pickers, the disclosure row, form fields, Export/Import controls, copy and download controls, Retry check, Advance rotation — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space), showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "dialog_focus_trap_escape"
description = "The cut dialog and the Export and Import panels trap focus while open, close on Escape, and return keyboard focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "aria_states_and_error_association"
description = "The unchanged disclosure exposes its expanded or collapsed state to assistive technology, form fields have visible labels, and each inline validation message names and is associated with the field it belongs to"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "no_outbound_chrome_links"
description = "App chrome contains zero navigational outbound links: tabs, sidebar entries, and controls change views through client state and never navigate to another origin"
type = "binary"
weight = 1.0


[[criterion]]
id = "2.12"
name = "cut_and_import_zod_field_contracts"
description = "Cut form and import validation enforce the declared field contracts client-side (semver unique name, notes max 500, Release pack JSON schemaVersion larkspur-release-pack/v1 with task-manifest entry rules); invalid cases show field-named errors and do not mutate the shared store"
type = "binary"
weight = 1.0

