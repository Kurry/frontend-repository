[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_on_chrome"
description = "Hovering with the real pointer shows visible feedback: buttons ease background and shadow with a slight press effect, sidebar version entries and table rows take a full-width hover wash, the copy control and tab triggers show a hover tint, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "cut_dialog_enter_exit"
description = "Opening the cut form through its real control shows a dialog entering with a short opacity-plus-scale transition of roughly 200 milliseconds, and closing it exits the same way rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "step_badges_animate"
description = "Driven by actually running a cut through the UI: the running step badge shows a continuous activity indicator and each badge transition (pending to running, running to complete or failed) crossfades rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "correlation_count_up"
description = "When the rank-stability step runs, the correlation value counts up to its final value rather than appearing instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.5"
name = "disclosure_animates_with_chevron"
description = "Activating the unchanged disclosure with the real pointer animates the row group open and closed while its chevron rotates, rather than the rows snapping in and out"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "list_microinteractions"
description = "Driven through the real UI controls (never a state-shortcut tool call): changing a diff picker animates rows entering and leaving the classified lists, a newly sealed version's sidebar entry animates in, and a new timeline event slides in at the top"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "toasts_slide_autodismiss"
description = "After a sealed cut and after a rotation advance, a toast slides in, remains readable long enough to scan, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "tab_switch_crossfade"
description = "Switching tabs crossfades the main canvas content without a full page reload"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly while every flow (cut, diff, rotation, copy) remains complete and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.20"
name = "export_import_panel_enter"
description = "Export release pack and Import release pack panels open with a short opacity and scale enter transition of roughly 200 milliseconds rather than appearing with no transition (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

