[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Cut-release flow: submit a valid unique semver with notes under the field contract, complete seal (retrying rank-stability if needed); the sidebar gains exactly one version, it is selected sealed, the timeline gains a cut event, and Export Release pack JSON lists that name and notes."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Invalid cut submission (empty/non-semver name, duplicate name, or notes over 500 characters) shows immediate inline validation naming the field and starts no cut."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Diff flow: pick 1.0.0 as base and 2.0.0 as compare, read summary counts, expand unchanged, then change compare to 1.1.0 and observe every kind count and row classification recompute immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Advance rotation changes active subsets, increments cycle by one, prepends history without repeating a subset in the prior 3 cycles, appends a timeline event, and Export Release pack JSON shows the new rotation.cycle."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "Switching among Manifest, Diff, Splits, and Rotation retains the selected version, diff picker pair, and sealed cuts without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "diff_or_timeline_empty_state"
description = "Edge: when a diff pair or filter matches nothing, and in any list region with no entries, a designed empty state explains what belongs there instead of a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "splits_view_and_diff_summary_coherence"
description = "Filter/derived views: Splits composition bars and Diff summary strip counts update immediately when the selected version or diff pair changes; they stay consistent with the shared manifests."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "sidebar_and_export_panel_continuity"
description = "Chrome: the releases sidebar stays usable while Cut release, Export release pack, and Import release pack panels open and close; returning to the sidebar keeps the selected sealed version."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Cut dialog, Export release pack, and Import release pack open, accept their flows (cut steps / format tabs / paste-or-file import), and close without trapping the app in a dead end."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "After a failed rank-stability check, Retry check can pass and finish the seal without a page reload; after a rejected import, the prior session remains operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "cut_diff_rotation_unavailable"
description = "Cut release, Diff pickers, Advance rotation, or Export/Import release pack cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "sealed_cut_missing_or_duplicated"
description = "After a successful seal, the new version fails to appear in the sidebar, appears duplicated, or Export omits it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "diff_rotation_export_desync"
description = "After a cut or rotation advance, sidebar selection, timeline events, and Export Release pack JSON disagree about versions or rotation.cycle."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_loses_diff_or_version"
description = "Switching Manifest/Diff/Splits/Rotation breaks layout or loses the selected version or diff picker pair while the session is open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_diff_or_list_breaks_ui"
description = "A no-match diff/filter or empty list region is blank/broken with no designed empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "diff_counts_disagree_across_surfaces"
description = "Diff summary strip counts disagree with the visible row classifications for the same base/compare pair."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_or_cut_panel_cannot_reopen"
description = "After closing Cut release or Export/Import release pack, those panels cannot be reopened from their controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "cut_or_export_overlay_blocks_exit"
description = "Cut release, Export, or Import panels block navigation with no cancel/close path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_cut_or_import_silent"
description = "An invalid cut submit, failed rank-stability step, or contract-invalid Import provides no visible named-field or status feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "release_diff_dead_end_requires_reload"
description = "A Larkspur Releases flow leaves a dead end that requires a full page reload to continue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "Export then import: after sealing a cut, export Release pack JSON that satisfies the field contract, advance rotation so the cycle differs, import the earlier JSON, and confirm version names, task counts, and rotation cycle return to the pack contents"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_omits_cut_in_flow"
description = "After a sealed cut with distinct notes, Export Release pack JSON omits that version or notes while the sidebar shows the sealed cut"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
