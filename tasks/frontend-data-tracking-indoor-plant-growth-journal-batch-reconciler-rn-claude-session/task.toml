schema_version = "1.3"

[task]
name = "mercor-intelligence/frontend-data-tracking-indoor-plant-growth-journal-batch-reconciler-rn-claude-session"
description = "Build an 'Indoor Plant Growth Journal — Batch Reconciler' using React and Tailwind CSS. The app features a domain-native UI for managing plant observations, derived batch reconciliation, and portable session artifacts (plant-growth-v1.json). The app strictly uses in-memory state, ensuring no localStorage or other persistence mechanisms are employed."

[agent]
timeout_sec = 3600.0

[verifier]
timeout_sec = 14400.0

[environment]
workdir = "/app"
build_timeout_sec = 1200.0
memory_mb = 8192
cpus = 4

[[artifacts]]
source = "/app"
destination = "app"
exclude = [
    "node_modules",
    ".git",
    ".DS_Store",
    "dist",
    "build",
    "out",
    ".next",
    ".nuxt",
    ".svelte-kit",
    "storybook-static",
    ".cache",
    ".vite",
    ".turbo",
    ".parcel-cache",
    ".pnpm-store",
    ".yarn",
    ".npm",
    "coverage",
    "playwright-report",
    "test-results",
]
