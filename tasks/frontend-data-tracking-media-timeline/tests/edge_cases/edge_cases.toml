[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_present_with_recovery"
description = "When filters or the year window match nothing, or all user-managed events are deleted, the list/stage region shows an empty state message plus a control that restores filters or opens create"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_timeline_event_contract"
description = "Create and edit forms show inline validation for empty title, type outside Milestone/Invention/Release/Publication/Broadcast, timestamp not ISO-8601 ending with Z or breaking the year cross-field rule, empty mediaRefs, year outside -4000..2100, empty place, empty summary, and zero categories before submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_failing_field"
description = "Validation and import error messages name the failing field and the fix rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_toast_or_confirmation"
description = "Create, delete, bulk actions, export copy, and import show visible success feedback such as a toast or confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_submit_adds_single_event"
description = "Double-activating create submit adds exactly one event: count increases by one and one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_after_destructive_actions"
description = "After delete or batch delete, Undo is enabled and restores the prior collection; cancel paths exist on batch-delete confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "about_helps_non_obvious_modes"
description = "About/help overlay explains Scrub/Explore and Library/Filter modes in complete sentences"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_interactive_tags"
description = "Mode switch, filters, scrubber inputs, undo/redo, export, and bulk actions use semantic buttons/inputs rather than clickable bare text nodes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_support_close_paths"
description = "Detail, About, export drawer, and batch confirmation close via Escape and a visible close or cancel control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "malformed_import_leaves_collection_unchanged"
description = "Importing malformed Timeline JSON or an events entry that breaks the TimelineEvent contract (bad type, non-Z timestamp, empty mediaRefs, or year/timestamp mismatch) shows an inline error naming the failing field and leaves events count and titles unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "zero_selection_bulk_is_noop"
description = "Batch delete or Batch categorize with zero selected rows does nothing and shows no confirmation; the tray stays hidden until at least one row is selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "redo_clears_after_new_mutation"
description = "After Undo restores a deleted event, Redo deletes it again; after a new create following an undo, Redo is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "bulk_skips_seeded_readonly"
description = "Bulk categorize and bulk delete never rewrite or remove seeded read-only events even when those rows are visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty filter match or emptied user-managed set shows nothing and provides no empty-state UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Create/import validation failures surface only in the browser console with no inline field message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Create, delete, bulk, export copy, or import succeeds or fails with no visible feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Batch delete removes selected events with no confirmation naming the selected count"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Primary interactive chrome is only non-semantic div or span click targets without button/input roles"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Detail, About, export drawer, or batch confirmation cannot be dismissed with Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Contract-violating create submits with no immediate inline field indication"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Export, bulk, or undo controls use ambiguous or missing labels where Timeline JSON, Batch delete, or Undo wording is required"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "malformed_import_mutates_collection"
description = "A malformed Timeline JSON import still changes the events count or titles"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Undo/redo, export, or multi-select checkboxes are visually hidden or inaccessible when the corresponding feature should be reachable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
