[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, Scrub/Explore mode shows a timeline stage with seeded event pins or markers for MediaTimeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load (or after opening Library/Filter), the events list shows multiple seeded events with title and year visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating an event titled 'Signal Tower Demo' with a valid year, the text 'Signal Tower Demo' is visible in the events list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding 3 new events on top of the initial user-managed count, the list shows exactly 3 more rows than before those creates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After filtering by a category/band (with mixed categories present), only matching events remain visible in the filtered list or stage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After editing an event title to 'Evening Broadcast', the text 'Evening Broadcast' is visible and the previous title is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting an event, that event's title is no longer visible in the events list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After deleting all user-managed events (or clearing the editable set), an empty state is visible in the list region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After submitting create with an empty required title, the events count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After adjusting the year scrubber/window, the set of visible pins or in-view count updates without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After switching between Scrub/Explore and Library/Filter modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering pins, list rows, or scrubber controls, a visible hover wash, scale, or glow appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After clicking an event pin, an in-page detail opens showing the year and place kicker, title, and body, and Next/Previous steps to another filtered event"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "As the year window moves, the current-era label changes to the era at the window midpoint"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After zooming or panning the stage, the 'N events in view' count updates without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Timeline events collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Renders visible validation feedback when create is submitted with empty required fields, and the collection count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Timeline events list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Clicking an event pin opens an in-page detail with kicker (year and place), title, category, and body, and Previous/Next controls or the arrow keys step through the currently filtered events while a close control or Escape returns to the stage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "At least five named era bands wash the stage and a current-era label updates to the era at the window midpoint as the year window moves"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The dual-handle year scrubber and numeric year from/to inputs set the visible window with a BCE/CE readout, and a fit-all/reset control returns to the full span"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Hovering an unclustered event pin reveals a label with title, place, and BCE/CE year, and overlapping same-year pins offset so each stays individually clickable"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "An event-count readout ('N events in view') and a result note ('Showing N of M catalogued events') update as filters and the year window change"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "Event pins render at fixed positions that ignore the year window, so scrubbing or zooming does not reposition or re-filter them"
type = "binary"
weight = 0.5
negate = true
optional = true
