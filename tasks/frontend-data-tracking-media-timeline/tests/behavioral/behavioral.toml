[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Configure several facets (create a user-managed event, disable a category, narrow the year window, select a library row), then reload: every facet coherently resets to the seeded baseline together — seeded corpus, default window, all categories, empty undo/redo, no selection, no user-created events — never a partial mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort the library Year ascending, note the first and last visible titles, then switch to Year descending; the order reverses relative to ascending, proving sort is derived from the live collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Narrow the year window or disable a category and confirm N events in view, the density strip counts, and Window Markdown export preview change meaningfully rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Create or edit an event in Library/Filter and confirm the same title/year appear on the Scrub/Explore pin or detail and in the Timeline JSON export preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Measure Showing N of M immediately before and after a valid create; the catalogued count increases by exactly one with no off-by-one or lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Create two events with different titles, types, timestamps, mediaRefs, and years; the library shows both distinct titles and types, pins sit at different year positions when both are in window, and Timeline JSON contains both titles with their matching type/timestamp/mediaRefs"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Start creating event A, switch to Scrub/Explore and adjust the year window, return and finish creating event B; both the window change and event B persist without corrupting each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Delete all user-managed events until the empty state shows, then create one valid event; list, density, counts, and export previews track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "mutate_density_export_pipeline"
description = "Create a user-managed event in an enabled category inside the current window: density for that category increments by one, N events in view increments when applicable, and Timeline JSON / Events CSV previews include the new title with type, timestamp ending with Z, and mediaRefs — all in one pipeline without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_round_trip_after_batch_delete"
description = "Batch delete two selected user-managed events, confirm both are gone from list and Timeline JSON, Undo restores both and the prior count, then Redo removes both again"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "export_import_round_trip_probe"
description = "After a create or edit, export Timeline JSON, clear user-managed events or otherwise diverge, then import that JSON; visible titles, types, years, mediaRefs, window, enabled categories, and a fresh export match the exported package"
type = "binary"
weight = 1.0

