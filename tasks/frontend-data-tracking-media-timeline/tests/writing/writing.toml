[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_use_consistent_capitalization"
description = "Where the app renders MediaTimeline headings, Library/Filter labels, and export drawer titles, they use one consistent capitalization convention"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders action labels, they use specific verbs such as Batch categorize, Batch delete, Export timeline, Copy, Download, Undo, and Redo rather than generic Submit or OK where a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders validation or import errors, they name the failing field and the fix (for example title, type, timestamp, mediaRefs, year, place, categories, or summary)"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty filter or empty user-managed collection states, the copy explains what matched nothing and how to restore filters or create an event"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = "Where the app renders About/help and Window Markdown body copy, rate how free it is of spelling and grammatical errors"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_is_consistent"
description = "Where the app renders the same concept in multiple places, terminology stays consistent (events, categories, eras, Timeline JSON) rather than mixing synonyms arbitrarily"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numbers_dates_and_units_are_consistent"
description = "Where the app renders years, they use consistent BCE/CE formatting across scrubber readout, pin labels, detail kicker, list rows, and Window Markdown headings"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders export Copy confirmation or import/create success feedback, the message states what happened rather than a vague OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "export_tab_labels_exact"
description = "Export drawer tab labels read Timeline JSON, Events CSV, and Window Markdown"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_is_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variable names) is visible anywhere in the shipped UI"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as MediaTimeline branding, About headings, or primary export buttons"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "concept_names_are_inconsistent"
description = "The same concept is named inconsistently across stage, library, and export surfaces"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_is_truncated_or_overflowing"
description = "Truncated or overflowing text renders era labels, density counts, or export tabs unreadable"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
