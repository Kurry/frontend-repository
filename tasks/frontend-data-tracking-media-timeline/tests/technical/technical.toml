[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherent_across_views"
description = "Events, the year window, filters, active mode, and selection behave as one shared client state: a change made in one view (an edit in the library, a filter toggle, a window change) is immediately reflected in every other surface showing that data — pins, counts, era label, open detail — without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "reload_returns_seeded_in_memory_baseline"
description = "A page reload returns the app to its seeded in-memory baseline — seeded corpus, default year window, all categories enabled, empty undo/redo stacks, no selection, no user-created events — and browser storage (localStorage, sessionStorage, IndexedDB) stays empty after a full exercise of create, filter, export, import, and undo"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "browser_storage_persists_state"
description = "Uses localStorage or sessionStorage to persist events or filters"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "views_desync_on_shared_data"
description = "After an edit, delete, or filter change, the same event or count shows different values in two places (for example the list row disagrees with the stage pin, detail panel, or a readout) until a reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "keyboard_operable_with_visible_focus"
description = "Every interactive control (mode switch, scrubber thumbs, year inputs, filters, pins or list equivalents, detail navigation, undo/redo, export drawer controls, selection checkboxes, bulk actions) is reachable and operable with the keyboard alone, with a visible focus ring"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "dialogs_close_on_escape_and_return_focus"
description = "The event detail panel/popup, About overlay, export drawer, and batch-delete confirmation behave as dialogs: Escape closes them and keyboard focus returns to the control that opened them; the export drawer traps focus while open"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "arrow_keys_step_detail_through_filtered_events"
description = "While the detail is open, the left and right arrow keys step Previous/Next through the currently filtered events"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.8"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "console_clean_during_full_exercise"
description = "No console errors or unhandled promise rejections appear during load or a full exercise of scrubbing, zooming, filtering, creating, editing, deleting, bulk actions, undo/redo, exporting, and importing"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "rapid_zoom_and_scrub_stay_responsive"
description = "Rapid wheel zoom and continuous scrubbing update pins, the era label, and readouts without hangs, visible hitching, or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "outbound_network_requests_present"
description = "Devtools shows network requests to other origins (CDN scripts, remote fonts, external APIs) during load or use of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.12"
name = "document_title_reflects_mediatimeline"
description = "The browser document title reflects MediaTimeline"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "export_previews_live_from_shared_state"
description = "Timeline JSON, Events CSV, and Window Markdown export previews recompute from the same shared events collection and window/filters as the stage and library; a create or delete changes the preview text without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "undo_redo_share_store_history"
description = "Undo and Redo reverse and reapply the same create/edit/delete/batch/import mutations the visible controls write, restoring list, pins, counts, and export previews together"
type = "binary"
weight = 1.0


[[criterion]]
id = "2.15"
name = "api_shaped_create_matches_export_payload"
description = "A successful create produces a library row and Timeline JSON event object that share the same API-shaped fields — title, type, timestamp ending with Z, mediaRefs, year, place, categories, summary, and source — so the visible record matches the would-be request body in the export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "events_csv_header_matches_field_contract"
description = "The Events CSV export preview header line is exactly title,type,timestamp,mediaRefs,year,place,categories,summary,source and each data line joins categories with a pipe and mediaRefs with a semicolon"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (state, storage, console, network, stability) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, network request, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
