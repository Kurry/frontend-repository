[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_list_pin_density_export"
description = "Creating a valid event (title, type, timestamp, mediaRefs, year, place, categories, summary) in Library/Filter mode adds exactly one row showing title and type, increases Showing N of M by one, shows the pin in Scrub/Explore when in window, increments the matching density count, and includes the new title with type/timestamp/mediaRefs in Timeline JSON and Events CSV previews without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_field_contract_errors"
description = "Submitting create with an empty title, type outside the closed enum, timestamp that is not ISO-8601 ending with Z or that breaks the year cross-field rule, empty mediaRefs, invalid year, empty place, empty summary, or zero categories shows inline per-field errors naming the failing fields and adds no event"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_list_pin_detail_export"
description = "Editing a user-managed event's title, type, timestamp, mediaRefs, or year updates the library row, stage pin and hover label, open detail panel, and Timeline JSON / Events CSV export previews without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_clears_surfaces_and_exports"
description = "Deleting a user-managed event removes its list row, pin, detail/selection, decreases both count readouts by one, and removes it from the export previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "mode_switch_retains_filters_and_window"
description = "Switching between Scrub/Explore and Library/Filter keeps the year window, category filters, search, and selection coherent without a full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_user_delete_reveals_empty_state"
description = "After deleting all user-managed events, the list region shows an empty state with a recovery control, and export previews still compile"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "category_filter_syncs_stage_list_density"
description = "Disabling a category filter removes that category's pins and library rows, lowers N events in view, and updates the density strip; clear-filters restores them exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "year_sort_reversal_flow"
description = "Switching Library year sort from Year ascending to Year descending reverses visible row order; switching back restores the prior order"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "detail_and_export_overlays_support_flows"
description = "Event detail, About, export drawer, and batch-delete confirmation open in-page and close via Escape or a close control without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "export_import_round_trip_flow"
description = "After mutating the collection, Copy or Download Timeline JSON then Import that same JSON reconstructs library titles, types, years, mediaRefs, enabled categories, year window, density counts, and export previews to the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "batch_delete_then_undo_flow"
description = "Selecting two user-managed events, confirming Batch delete, then Undo restores both events and the prior catalogued count; Redo deletes both again"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "batch_categorize_updates_exports"
description = "Selecting two user-managed events and Batch categorizing them to Photography sets both categories to Photography only in list badges, density counts, and the Timeline JSON preview; Undo restores prior categories"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "reload_clears_session_mutations"
description = "After create, filter, window, and undoable mutations, a page reload returns seeded corpus, default window, all categories, empty undo/redo, no selection, and no user-created events together"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.14"
name = "export_flow_contains_created_api_fields"
description = "After creating Signal Tower Demo (type Milestone, timestamp 1920-01-01T00:00:00.000Z, mediaRefs containing signal-tower-demo) and Evening Broadcast (type Broadcast), open Export timeline; Timeline JSON events contain both titles with matching type/timestamp/mediaRefs, Events CSV uses the contract header and both titles, and Copy shows confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Create, edit, delete, export, or import flows are not reachable from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "A successful create fails to show a new row or duplicates the event in the library list"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "After an edit, delete, filter, or export-affecting mutation, list, stage, density, and export previews disagree about the same event until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching Scrub/Explore and Library/Filter breaks the layout or silently drops an active multi-select"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying user-managed events or filtering to zero matches produces a blank broken region with no empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "After a category filter or year-window change, the stage pins and library list disagree about which events are visible"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_import_round_trip_fails"
description = "Importing a just-exported Timeline JSON leaves titles, types, mediaRefs, window, or export previews different from the pre-export mutated state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Detail, About, export drawer, or batch confirmation blocks returning to the stage with no Escape or close path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "An invalid create or malformed import provides no visible field-named feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Recovering from an empty filter state or closed overlay requires a full page reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
