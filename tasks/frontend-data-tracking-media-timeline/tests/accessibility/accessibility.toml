[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Mode switch, scrubber thumbs, year inputs, filters, pins or list equivalents, detail navigation, undo/redo, export drawer controls, selection checkboxes, and bulk actions are keyboard accessible with Tab, Shift+Tab, Enter, or Space and show a visible focus-visible ring"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Event detail, About overlay, export drawer, and batch-delete confirmation trap focus while open and return focus to the originating control on Escape or close"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "images_and_icons_have_alt_text"
description = "Icon-only controls (mode switch, close, undo/redo, export) expose accessible names via aria-label or equivalent"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Create, delete, bulk actions, export copy, and import completion are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Create, edit, and import form fields have visible labels associated with their inputs; validation messages name the field they belong to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings in Library/Filter, detail, About, and export drawer follow a logical order without skipping levels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Primary regions such as the stage, library, and export drawer use landmark roles or skip-capable structure"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Timeline labels, density counts, form text, and chrome controls have sufficient color contrast against their backgrounds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Semantic controls (button, input) and dialog roles are used for mode switch, forms, detail, and export drawer rather than clickable bare divs alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, non-essential fades shorten while pan, scrub, filter, export, and undo remain operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "arrow_keys_step_detail"
description = "While detail is open, left/right arrow keys step Previous/Next through the currently filtered events"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Undo/redo, export controls, multi-select checkboxes, or scrubber inputs cannot be activated via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused timeline chrome controls show no visible focus indicator"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom scrubber, mode switch, or export controls use non-semantic tags without ARIA roles or names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Category membership or validation state is conveyed by color alone with no text label"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "Export drawer or detail dialog does not trap keyboard focus while open"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Era labels, density counts, or export preview text are unreadable due to poor contrast"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Create/import errors or action confirmations are visual only with no aria-live announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Icon-only chrome controls are missing accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings jump levels in library, detail, or export surfaces"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Export drawer slide, toasts, or row animations ignore prefers-reduced-motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
