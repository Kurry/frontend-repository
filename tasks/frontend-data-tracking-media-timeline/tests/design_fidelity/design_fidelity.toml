[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Timeline stage, scrubber, density strip, and library spacing follow a coherent scale rather than arbitrary one-off gaps in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Expressive typography on MediaTimeline chrome and library rows matches the instruction's non-default type direction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "At desktop width, the stage-plus-scrubber composition and Library/Filter arrangement broadly match the reference overview/segment screenshots; where screenshot and instruction conflict, the instruction wins"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes — detail open/close, row create/delete, export drawer open, and mode switch — animate rather than only hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Responsive stacking of stage and Library/Filter below 768px matches the instruction's drawer/sheet or stack pattern"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Scrubber thumbs, filter controls, and export drawer chrome are styled as part of the paper-stage tool rather than bare browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Detail kicker, title, and body show a clear hierarchy; library rows distinguish title from year/place meta"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Hover and focus states on pins, list rows, scrubber thumbs, and chrome buttons are visibly distinct from default"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Paper stage atmosphere, era-band washes, and category-colored pins present a coherent surface treatment rather than a flat unthemed page"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Pin/list hover wash, detail settle, and export Copy confirmation follow the instruction's microinteraction intent"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible timeline chrome spacing collapses into cramped or arbitrary gaps that contradict a coherent scale"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Category colors and era washes appear as an incoherent clash with no shared palette discipline"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Scrubber or pin sizing makes the stage unusable relative to the reference tool composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required detail settle, row enter/exit, or export drawer motion is missing where the instruction requires it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Primary form and export controls use unstyled browser defaults when the instruction styles them as tool chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "Stage and library are misaligned or broken at 1440px or 375px relative to the instruction's composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Era labels, density strip, or export drawer render clipped or off-screen at desktop width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "The first viewport replaces the timeline tool with a marketing hero that contradicts the reference screenshots and instruction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Detail title and body or library title and meta have no typographic distinction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover and open/close microinteractions are entirely absent on pins, rows, and export chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
