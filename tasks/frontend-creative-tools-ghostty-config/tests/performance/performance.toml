[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the Ghostty config editor becomes interactive (sidebar and setting controls respond) within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of the editor, exports, and category navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "setting_change_responds_under_100ms"
description = "Changing a setting control updates the generated configuration and live preview with UI response in under 100ms (perceived immediate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "editor_chrome_visible_on_load"
description = "On load the editor chrome (sidebar, settings form, generated-config panel) remains visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "category_nav_stays_smooth"
description = "Switching among the eleven setting categories (Application through macOS) shows no perceived lag in form body updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_preview_retheme"
description = "While the live terminal preview re-themes after color/font/cursor edits, sliders and category switches remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_retheme_holds_stable_frame_rate"
description = "Driven through real controls, live preview re-theming and override-line enter/exit maintain a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_slider_and_toggle_never_hang"
description = "Dragging a slider or rapidly toggling switches updates the live preview and generated configuration without hangs, dropped interactions, or visible lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_edit_session_stable"
description = "After an extended session of many setting edits, category switches, and export actions, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "local_assets_load_without_blocking_shell"
description = "The editor shell appears and is usable before or as local assets finish loading — interactions are not blocked waiting on a remote fetch."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before a setting control can be registered."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n2"
name = "console_errors_during_editor_flows"
description = "Console errors, warnings, or unhandled rejections appear during editor, export, or category-navigation flows."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n3"
name = "category_or_toast_transition_blocks_ui"
description = "Category body transitions or toast enter/dismiss block the main thread so subsequent clicks queue with visible lag."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n4"
name = "preview_update_hangs_ui"
description = "Updating the live preview after a setting change hangs or freezes the UI until the re-theme completes."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n5"
name = "category_nav_janks"
description = "Switching categories produces sustained frame-rate collapse or multi-second jank."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n6"
name = "animation_blocks_slider_input"
description = "While preview re-theme or override-line animations run, sliders and switches ignore input."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n7"
name = "asset_load_blocks_first_paint_of_controls"
description = "The UI blocks rendering of the sidebar and settings form until all assets finish loading, leaving a blank interactive void."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_edits"
description = "Rapid slider or toggle use causes visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n9"
name = "blank_while_loading_editor"
description = "Nothing is displayed (blank page) while the editor loads — no sidebar, form, or config panel."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid slider/toggle use or after Reset all and re-editing."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.11"
name = "palette_search_responsive"
description = "Fuzzy filtering in the command palette and settings search stays responsive as the query changes with no visible lag between keystrokes and result updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.12"
name = "full_exercise_includes_hardened_flows"
description = "No console errors or warnings appear during a full exercise that includes import, undo/redo, command palette, Diff mode, and profiles in addition to editor and export flows."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n11"
name = "search_keystrokes_lag_visibly"
description = "Typing in the command palette or settings search shows visible lag or dropped keystrokes before results update."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
