[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_two_pane_reference"
description = "At 1440px, spacing among the translucent left sidebar, titled settings content, and right-hand generated-config panel follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the two-pane composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_settings_app_spec"
description = "Section titles, labeled setting rows, and monospace generated-config lines match the reference hierarchy: UI chrome uses the settings-app type scale and the config panel stays monospace."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: macOS-style window with window-dot chrome, translucent left category sidebar, settings form, right-hand generated-config panel, and dock-hosted terminal preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "State changes the spec calls out — category switches, override lines entering/leaving the generated-config panel, and toast feedback for Copy/Download/Reset — show transitions rather than hard cuts when driven through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "At about 375px vs 1440px, responsive behavior matches the reference patterns: desktop keeps sidebar + form + config panel together; narrow width stacks panes while keeping product identity."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Sliders, steppers, dropdowns, pill toggles, switches, color pickers, and export buttons use the styled macOS-settings treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_form_vs_config"
description = "Typography hierarchy clearly distinguishes section titles and labeled rows from denser notes and from the monospace generated-config output."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Controls show distinct default, hover, focus (visible ring), pressed, selected, and disabled treatments as specified — disabled Copy/Download/Reset all read as non-interactive while labels stay legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "terminal_panel_and_status_colors"
description = "Color and depth treatments match the spec: generated-config uses a terminal scheme (dark background, light text, colorized keys and values); danger/reset reads red and success feedback reads green."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Slider drag tracking, switch/pill selected-state animation, and toast enter/dismiss follow the specified microinteraction feel when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_window"
description = "Visible spacing between sidebar, settings form, and generated-config panel contradicts the reference two-pane composition (large empty voids or cramped collisions)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "colors_outside_settings_terminal_palette"
description = "Dominant chrome or config-panel colors fall outside the specified macOS-settings / terminal palette (for example a bright marketing theme replacing the editor window)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n3"
name = "pane_sizing_mismatches_reference"
description = "Sidebar width, settings form density, or generated-config panel proportions clearly mismatch the reference screenshots at 1440px."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n4"
name = "required_transitions_missing"
description = "Required transitions are missing where the spec requires them (category body snaps with no transition, override lines pop with no enter/exit, toasts appear with no motion)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Sliders, dropdowns, switches, or export buttons use unstyled browser default appearance when the spec styles them."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the two-pane settings composition is misaligned versus the reference (sidebar missing beside the form, config panel absent, or dock preview missing)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "At 1440px, sidebar categories, setting rows, or generated-config lines render clipped or off-screen compared to the reference composition."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_editor"
description = "Structure deviates from the reference: a marketing landing page or unrelated dashboard replaces the macOS-style categorized settings editor with generated-config preview."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_form_and_config"
description = "Section titles, setting labels, and generated-config lines are visually undifferentiated — no clear hierarchy between form chrome and monospace output."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on sidebar items, switches, or export buttons are missing or clearly deviate from the reference feel."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "hardened_surfaces_match_spec"
description = "Diff mode, command palette overlay, Import surface, and Profiles panel follow the specified chrome treatments rather than unstyled browser defaults, matching the macOS-settings craft of the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "diff_palette_browser_defaults"
description = "Diff mode or the command palette render as unstyled browser-default dialogs/lists that break the specified settings-app visual language."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
