[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "dock_preview_polish_beyond_minimum"
description = "Beyond a static color swatch, the macOS-style dock hosts a live interactive terminal preview that re-themes as settings change (bonus / optional excellence)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "history_back_forward_in_content_header"
description = "The titled content area includes a working back/forward history control for category navigation beyond bare sidebar clicks (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "theme_browser_delight"
description = "Theme selection on the Colors page offers a polished browsable theme set (for example named themes with preview swatches) beyond a plain text dropdown (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "palette_grid_extra_usability"
description = "The 16-color palette editor includes an extra usability aid beyond bare hex fields — for example a grid of pickers with live preview coupling (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_shortcuts_for_exports"
description = "Beyond basic Tab/Enter operability, the editor supports an alternate input such as a keyboard shortcut for Copy when overrides exist (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "per_setting_reset_affordance_polish"
description = "Per-setting reset affordances are polished and discoverable next to overridden controls, making single-override cleanup effortless (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "ghostty_branded_tool_narrative"
description = "The window chrome, header comments ("# Config generated by Ghostty Config"), and dock preview read as a cohesive Ghostty-branded configuration tool rather than a generic form (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "terminal_syntax_colorizing_craft"
description = "Generated-config syntax coloring (keys vs values vs comments) goes beyond bare monospace text into a readable terminal scheme (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local font rendering for the preview, or offline-capable asset caching via the app shell) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_config_tool_feel"
description = "The overall editor feels competition-grade: categorized form, live preview coupling, and generated-config sync read as a polished instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain text controls with no live terminal preview, generated-config panel, or macOS-style window immersion."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified two-pane Ghostty settings-and-preview composition."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "11.11"
name = "optional_coachmark_tour"
description = "Optional: a first-run coachmark tour highlights the generated-config panel, live dock preview, and command palette, is dismissible, and never blocks the editor (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.12"
name = "optional_theme_swatch_strip"
description = "Optional: a per-theme swatch strip on the Colors page previews palette colors before commit (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.13"
name = "optional_shortcut_hints_in_palette"
description = "Optional: keyboard shortcuts are listed beside command-palette results and export actions (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
