[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "sentence_case_ui_microcopy"
description = "Where the app renders section titles, notes, and control labels, they use concise sentence-case UI text with numerals for counts."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_export_actions"
description = 'Where the app renders button or action labels, they use specific verbs such as "Copy", "Download", and "Reset all" rather than generic "Submit"/"OK" when a specific label is possible.'
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_setting_and_format"
description = 'Where the app renders validation messages, they name the setting and the accepted range, format, or enum from the Ghostty field contract (for example font-size 4–60, cursor-style block/bar/underline/block_hollow, or #RRGGBB for colors), not only a bare rejection like "Invalid".'
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_config_copy_explains_state"
description = 'Where the app renders the zero-override empty state, the copy explains that there are no changes yet ("# No changes to the default config yet") rather than a blank panel.'
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "section_notes_polished"
description = "Where the app renders section notes explaining what a setting does, rate how free they are of spelling and grammatical errors and filler."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same setting in the form, generated-config keys, and preview chrome, terminology stays consistent (for example font-family / font-size / theme) rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "generated_output_key_equals_value"
description = "Where the app renders generated configuration text, comment lines start with # and every override renders as a key = value line under the two header comments using the contracted Ghostty keys and value shapes."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "toast_success_messages_specific"
description = "Where the app renders confirmation or success feedback after Copy, Download, or Reset all, the copy states what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI, including section notes."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as category names, section titles, export buttons, or header comments."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n3"
name = "inconsistent_setting_naming"
description = "The same setting concept is named inconsistently across the form label, generated key, and preview chrome in a way that would confuse a user."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Section titles, setting labels, validation messages, or generated-config lines are truncated or overflowing so the copy is unreadable."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.9"
name = "hardened_empty_states_explain_next_step"
description = "Where the app renders empty states for Diff no-differences, empty search filter, and empty Profiles list, the copy explains what belongs there and the next step."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "empty_profile_or_diff_copy_blank"
description = "The Diff no-differences state, empty search filter, or empty Profiles list is blank or uses placeholder copy instead of explaining the next step."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
