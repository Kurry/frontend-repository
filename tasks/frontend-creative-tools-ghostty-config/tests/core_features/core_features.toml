[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens into the configuration editor: a left sidebar listing setting categories (Application, Terminal, Clipboard, Window, Colors, Fonts, Keybinds, Mouse, GTK, Linux, macOS) beside a grouped settings form, not a welcome or marketing page."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, a generated-configuration preview panel is visible in the same view and shows the empty-state line \"# No changes to the default config yet\" with an override count of 0."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "When the main font-family setting is changed to a value, the generated configuration shows a line reading \"font-family = \" followed by that value, under the header line \"# Config generated by Ghostty Config\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After entering two different font-family values in succession, the generated font-family line follows the latest value, not the earlier one."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After resetting the edited font-family setting, its generated line is removed while any other override that was set remains unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When the base font size slider is changed, the generated configuration shows an updated \"font-size = \" line and the override count increases."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "When a cursor style is changed on the Colors page (block, bar, underline), the live cursor preview swaps its shape to match the selected style."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When a color theme is selected on the Colors page, the terminal preview recolors and the generated configuration adds a \"theme = \" line naming the chosen theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "When the Copy action is used with at least one override, visible feedback appears (a toast) and the generated configuration text is unchanged by the copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When the Reset all action is used, every override is cleared and the generated-config panel returns to \"# No changes to the default config yet\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After switching between setting categories via the sidebar, the active category is visually identified and the document does not fully reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After editing settings and reloading the page, the same view renders and the previously edited settings are restored from client storage."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When the font-family input is focused and edited using only the keyboard, a visible focus indicator is shown and typed text updates both the input and the generated font-family line."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "On resize to 375 by 667 pixels, the settings form and generated-config panel remain operable without horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load, the app opens into the configuration editor: a sidebar of setting categories (Application, Terminal, Clipboard, Window, Colors, Fonts, Keybinds, Mouse, GTK, Linux, macOS) beside a grouped settings form."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "On load, a generated-configuration preview panel is visible in the same view and shows \"# No changes to the default config yet\" with an override count of 0."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Changing the main font-family setting updates the generated configuration to a line reading font-family = the entered value, under the header line \"# Config generated by Ghostty Config\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "A setting control's current value, its live preview, and its generated configuration line agree with each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "After entering two different font-family values in succession, the generated font-family line follows the latest value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "After resetting the edited font-family setting, its generated line is removed (or empty) while any other override that was set remains unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Changing the base font size slider updates the generated font-size line and increases the override count."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Changing a cursor setting updates the live cursor preview so the previewed cursor responds to that setting."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Selecting a color theme on the Colors page recolors the terminal preview and adds a theme = the chosen theme line to the generated configuration."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "1_24"
description = "Using Copy with at least one override shows visible feedback and does not alter the generated configuration text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Using Download with at least one override produces a downloadable ghostty-config file, and Reset all clears every override back to the empty state."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Switching between setting categories via the sidebar keeps the active category identified and does not fully reload the document."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "After editing settings and reloading, the same view renders and the previously edited settings are restored from client storage."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The generated-config panel renders overrides as monospace key = value lines with an override count and an empty state, reachable in the primary workflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "The first usable view is not an unrelated product, welcome, roadmap, or framework default page instead of the settings editor with its generated-config preview."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Editing a setting does not leave the generated configuration line stale or in disagreement with the control's current value."
type = "binary"
weight = 1.0
negate = true
