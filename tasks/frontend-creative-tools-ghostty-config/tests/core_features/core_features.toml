[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "opens_into_settings_editor"
description = "On load, the app opens into the configuration editor: a left sidebar listing setting categories (Application, Terminal, Clipboard, Window, Colors, Fonts, Keybinds, Mouse, GTK, Linux, macOS) beside a grouped settings form, not a welcome or marketing page."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "empty_state_zero_overrides_on_load"
description = "On load, a generated-configuration preview panel is visible in the same view and shows the empty-state line \"# No changes to the default config yet\" with an override count of 0."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "font_family_updates_generated_line"
description = "When the main font-family setting is changed to a value, the generated configuration shows a line reading \"font-family = \" followed by that value, under the header lines \"# Config generated by Ghostty Config\" and \"# https://ghostty.zerebos.com\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "latest_font_family_wins_no_duplicate_lines"
description = "After entering two different font-family values in succession, the generated font-family line follows the latest value, and no duplicate font-family lines appear in the output."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "single_reset_preserves_other_overrides"
description = "After resetting the edited font-family setting, its generated line is removed (or shown empty) while every other override that was set keeps its line and value unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "font_size_slider_updates_line_and_count"
description = "When the base font size slider is changed, the generated configuration shows an updated \"font-size = \" line, the override count increases, and the live preview text size changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "cursor_style_swaps_preview_shape"
description = "When the cursor-style control is changed among block, bar, underline, and hollow block, the live cursor preview swaps its shape to match the selected style and the generated cursor-style line follows using block, bar, underline, or block_hollow (hollow block maps to block_hollow)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "theme_selection_recolors_and_adds_line"
description = "When a color theme is selected on the Colors page, the terminal preview recolors and the generated configuration adds a \"theme = \" line naming the chosen theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "copy_shows_feedback_without_mutation"
description = "When the Copy action is used with at least one override, visible feedback appears and, after the copy, the generated configuration text and the override count are identical to their pre-copy values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reset_all_restores_empty_state"
description = "When the Reset all action is used, every override is cleared and the generated-config panel returns to \"# No changes to the default config yet\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "category_switch_keeps_active_no_reload"
description = "After switching between setting categories via the sidebar, the active category is visually identified and the document does not fully reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "reload_restores_edited_settings"
description = "After editing settings and reloading the page, the same view renders and the previously edited settings are restored from client storage."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "keyboard_edit_font_family"
description = "When the font-family input is focused and edited using only the keyboard, a visible focus indicator is shown and typed text updates both the input and the generated font-family line."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "narrow_viewport_stays_operable"
description = "On resize to 375 by 667 pixels, the settings form and generated-config panel remain operable without horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "control_preview_generated_line_agree"
description = "A setting control's current value, its live preview, and its generated configuration line agree with each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "download_saves_ghostty_config_file"
description = "Using Download with at least one override saves a file named ghostty-config."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "generated_panel_monospace_key_value_lines"
description = "The generated-config panel renders overrides as monospace key = value lines with an override count and an empty state, reachable in the primary workflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "first_view_is_welcome_or_default_page"
description = "The first usable view is an unrelated product, welcome, roadmap, or framework default page instead of the settings editor with its generated-config preview."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "generated_line_stale_after_edit"
description = "After a setting is edited, its generated configuration line is stale or disagrees with the control's current value."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "invalid_value_inline_error_no_malformed_line"
description = "Typing an invalid value into a validated setting control shows an inline message next to the control naming that setting, and no malformed line is emitted into the generated configuration while the value is invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "colors_padding_opacity_update_config_and_preview"
description = "Editing the background color (default #282c34), the foreground color (default #ffffff), a 16-color palette entry, window padding, and background opacity each update the generated configuration and the live terminal preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "export_actions_disabled_at_zero_overrides"
description = "With zero overrides, the override count reads zero and the Copy, Download, and Reset all actions are disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "font_size_bounds_clamped"
description = "The font-size control defaults to 13 and cannot produce a value outside 4 to 60: dragging stops at the bounds, and a typed out-of-range value is rejected or clamped with the shown value staying inside the range."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "font_family_flow_round_trip"
description = "Starting from defaults: enter a new font-family value, then confirm in one pass that the generated font-family line shows the entered value, the override count increases by exactly one (measured immediately before and after the edit), and the live terminal preview re-renders; then switch to another category and back and confirm the control, the preview, and the generated line all still show the same value without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "theme_flow_enables_exports"
description = "Starting with zero overrides: select a theme on the Colors page and confirm in one pass that the live terminal preview recolors, a theme = the chosen theme line appears in the generated configuration, the override count updates, and the Copy and Download actions change from disabled to enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "single_reset_flow_count_and_preview"
description = "With font-family and at least one unrelated setting overridden: reset the font-family override and confirm its generated line is removed (or shown empty), the override count decreases by exactly one, the preview text returns to the default face, and the unrelated override keeps its line and value in both the panel and the preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "reset_all_flow_across_categories"
description = "After editing at least two settings in different categories: use Reset all and confirm every generated override line is removed, the override count returns to zero, the \"# No changes to the default config yet\" state returns, the live preview returns to defaults, and the Copy, Download, and Reset all actions become disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "reload_restores_all_facets_coherently"
description = "After editing settings in at least two different categories and switching to a non-default category: reload the page and confirm every facet is restored coherently from client storage - the edited controls, the live preview, the generated lines, the override count, and the active view all match their pre-reload state, with none silently reverted while others survive."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "import_applies_config_text"
description = "An Import control accepts pasted Ghostty config text (key = value lines); applying a valid paste sets matching overrides so the generated panel, controls, live preview, and override count all reflect the imported values."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "export_contains_session_mutations"
description = "After editing settings, Download and Copy contain those exact key = value override lines — never a stale or empty artifact while overrides exist."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "settings_search_filters_rows"
description = "A settings search field filters visible setting rows by label or key as the user types; clearing the query restores the full unfiltered form for the active category."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "command_palette_jumps_to_setting"
description = "Opening the command palette with Cmd+K or Ctrl+K, typing a fuzzy match, and choosing a result navigates to that setting's category, focuses the matching control, and closes the palette without a document reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "undo_redo_setting_mutations"
description = "Undo and Redo reverse and reapply setting mutations; after editing font-family then undoing, the generated line, override count, and live preview revert; Redo restores the edit on all three surfaces. Each control disables when its stack is empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "diff_mode_compares_overrides_to_defaults"
description = "A Diff mode toggle shows each overridden key's default and current values side by side with a distinct changed treatment; with zero overrides it shows an explicit no-differences state; toggling Diff does not clear overrides."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "named_profiles_save_and_apply"
description = "Save profile with a required name stores the current override set; selecting that profile after Reset all re-applies the same overrides to the editor, preview, and generated config; Delete removes the profile after confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "keybind_conflict_notice"
description = "On the Keybinds page, assigning the same shortcut trigger to two different actions shows a conflict notice naming both actions; the notice clears when the duplicate trigger is resolved."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "api_shaped_ghostty_field_contracts"
description = "The generated config is API-shaped like a real Ghostty create/update request body: overrides are key = value lines whose visible field contracts match the instruction — non-empty font-family; font-size 4–60; cursor-style in {block, bar, underline, block_hollow}; background/foreground/cursor-color as #RRGGBB; opacities 0–1; theme in {Dracula, Nord, Gruvbox Dark, Catppuccin Mocha, Solarized Dark - Patched, Builtin Dark}; clipboard-read/write in {ask, allow, deny}; copy-on-select in {true, false, clipboard}; window-decoration in {auto, none, client, server}; non-negative window-padding-x/y and scrollback-limit; palette N=#RRGGBB with N 0–255; keybind trigger=action with duplicate-trigger conflict; boolean true/false; non-empty profile-name. A valid setting edit, profile save, or Import creates that same would-be request body, and Export emits conforming lines containing the session's actual overrides."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "form_validation_matches_export_contracts"
description = "Form validation enforces the same Ghostty field contracts the export shape declares: an out-of-bound or out-of-enum value shows an inline message naming the offending field and does not emit a malformed override line into the generated configuration; Import of contract-invalid text is rejected the same way without mutating overrides."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n40"
name = "export_omits_session_overrides"
description = "With overrides present, Copy or Download produces empty, default-only, or otherwise incomplete config text that omits the session's actual key = value mutations."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n41"
name = "undo_does_not_restore"
description = "After a setting edit, Undo leaves the generated line, override count, or live preview unchanged from the post-edit state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n42"
name = "export_violates_ghostty_field_contracts"
description = "With overrides present, the generated or exported config emits values that violate the contracted Ghostty shapes — for example font-size outside 4–60, cursor-style outside block/bar/underline/block_hollow, a non-#RRGGBB color, opacity outside 0–1, theme outside the declared set, or clipboard values outside ask/allow/deny — or omits required contracted keys for overrides the session actually made."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.50"
name = "profile_rename_updates_name_only"
description = "A saved profile's Rename control opens an inline form pre-filled with the current name; submitting a valid new name updates the profile's name in the list while its stored override set and override count stay unchanged, and applying the renamed profile still re-applies the same overrides"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "profile_rename_conflict_rejected"
description = "Renaming a profile to another saved profile's name is rejected with a message naming the conflict, leaving both profiles' names and overrides unchanged; renaming a profile to its own current name is not treated as a conflict"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "profile_rows_show_override_count"
description = "Each saved profile row shows the profile name and its stored override count alongside Apply, Rename, and Delete controls"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.53"
name = "compare_themes_side_by_side"
description = "The Compare themes control on the Colors page opens a surface with two live terminal previews labelled A and B, each with its own selector offering exactly the six declared themes; changing one side's selection recolors only that side's preview, and neither the generated configuration nor the override count changes before an Apply"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "compare_apply_commits_theme"
description = "Choosing Apply on one compare side adds theme = that side's theme to the generated configuration, recolors the main live preview, and updates the override count exactly as a direct theme pick would; closing the compare surface without applying leaves overrides unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "import_then_diff_reviewable"
description = "After applying a valid Import, Diff mode lists every imported key with its default value beside the imported current value in the changed treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n43"
name = "compare_mutates_without_apply"
description = "Opening the Compare themes surface or changing a side's selector alters the generated configuration text or the override count before any Apply is chosen"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality (a specified core behavior broken or missing) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered - even partially - by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
