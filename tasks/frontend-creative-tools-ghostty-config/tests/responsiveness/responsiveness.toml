[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_two_pane_composition"
description = "At desktop widths (~1440px) the sidebar, settings form, and generated-config panel are visible together as the two-pane composition with the sidebar alongside."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At about 375px width, sidebar categories, setting controls, and export actions present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Section titles, setting labels, and generated-config text remain legible at both 1440px and about 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At about 375px width the stacked panes and controls do not clip content or overflow the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_adapts_at_narrow_width"
description = "At about 375px width the category sidebar adapts (stacks, collapses, or otherwise reflows) so categories remain reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_width_stacks_panes_logically"
description = "At about 375px width the layout reflows: panes stack in a logical order while controls stay operable and product identity remains."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_controls_tappable"
description = "At about 375px width, tap/click activation works on sidebar categories, primary setting controls, and export actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At about 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "preview_and_config_scale_with_viewport"
description = "The live terminal preview and generated-config panel size responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "export_actions_remain_reachable"
description = "Copy, Download, and Reset all remain reachable at both 1440px and about 375px — fixed positioning does not push them off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At about 375px or 1440px the editor layout breaks: overlapping panes, overflow, or unusable stacking."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At about 375px width, sidebar categories, setting controls, or export actions are too small or misaligned to operate reliably."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n3"
name = "text_unreadable_on_mobile"
description = "At about 375px width, setting labels or generated-config text are too small to read."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At about 375px or 1440px, editor content is cropped or unnecessary scrollbars appear for content that should fit the viewport."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n5"
name = "sidebar_missing_at_some_width"
description = "At some required width the category sidebar is unresponsive or missing so categories cannot be reached."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_controls"
description = "Fixed-position chrome (dock preview, export bar, or overlays) obscures setting controls so they cannot be used."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At about 375px width, sidebar, settings form, and generated-config panel overlap into an unusable stack."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n8"
name = "narrow_export_actions_not_activatable"
description = "At about 375px width, Copy, Download, or Reset all cannot be activated by tap/click when overrides exist."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n9"
name = "preview_or_config_static_overflow"
description = "The terminal preview or generated-config panel uses a static size that overflows the viewport at about 375px."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n10"
name = "panes_or_exports_disappear_at_width"
description = "At about 375px or 1440px, required panes (sidebar, settings form, generated-config) or export actions disappear from the layout."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.11"
name = "overlays_operable_at_375"
description = "At about 375px width, the command palette, Diff panel, Import surface, Profiles panel, and Compare themes surface (its two previews stacking vertically) remain fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "overlays_offscreen_at_375"
description = "At about 375px width, the command palette, Diff, Import, or Profiles surface renders off-screen or cannot be completed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
