[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "three_mandated_modules_bound"
description = "All three contract-mandated modules are initialized and bound: structured-editor-v1, artifact-transfer-v1, and browse-query-v1 (tools discoverable via webmcp_list_tools with editor_*, artifact_*, and browse_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_editor_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor, artifact, and browse operations change the same settings/preview/category/export state the form controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_available"
description = "Only documented operations from the bindings are available: editor select/update_property/delete/preview/switch_mode/add; artifact export/copy/import; browse open and setting-search filter — no invented destinations or modules."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound editor, artifact, and browse tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_ops_on_category_object_types"
description = "Editor operations declared for object types (application, terminal, clipboard, window, colors, fonts, keybinds, mouse, gtk, linux, macos) work: select, update_property, delete, and preview update the visible editor state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "artifact_export_and_copy_bound"
description = "Artifact operations from the bindings — export, copy, and import — are bound and invoke without throwing when called through WebMCP, matching the visible Download, Copy, and Import actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_and_themes"
description = "Browse destinations match the allowed list (application through macos, plus profiles and command-palette), filters include setting-search, and theme values match the declared set (Dracula, Nord, Gruvbox Dark, Catppuccin Mocha, Solarized Dark - Patched, Builtin Dark)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond structured-editor-v1, artifact-transfer-v1, and browse-query-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for structured-editor-v1, artifact-transfer-v1, or browse-query-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound editor/artifact/browse tool leaves control values, preview, generated config, or active category diverging from what the equivalent visible UI control would produce."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings (editor select/update_property/delete/preview/switch_mode/add; artifact export/copy/import; browse destinations, setting-search, and themes) are exposed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared editor, artifact, and browse bindings."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n5"
name = "mcp_update_bypasses_shared_state"
description = "An editor update_property or preview invocation updates a parallel copy of state, leaving visible controls/preview/generated config showing stale values that disagree with the MCP result (MCP/UI desync)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n8"
name = "required_modules_not_implemented"
description = "structured-editor-v1, artifact-transfer-v1, or browse-query-v1 is missing despite being declared required in the contract."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave the editor state unchanged when invoked."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n10"
name = "mechanics_exclusion_faked_via_mcp"
description = "Terminal-preview cursor blink, dock open/close, or color-picker/slider drag is faked solely through WebMCP as a success path, bypassing the Playwright-observed mechanics exclusions."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.11"
name = "artifact_import_bound"
description = "Artifact import is bound (import_modes config-text) and invokes without throwing through WebMCP, matching the visible Import action's shared-state effect."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "editor_switch_mode_edit_diff"
description = "Editor switch_mode between edit and diff updates the visible Diff/Edit surface via the same handlers as the Diff mode toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.13"
name = "browse_filter_setting_search"
description = "Browse apply_filter / clear_filter for setting-search updates the visible filtered settings rows the same way the settings search field does."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.14"
name = "profile_object_ops_bound"
description = "Editor operations on object type profile (add/select/delete with profile-name) work against the Profiles panel state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.15"
name = "value_bounds_match_ghostty_contracts"
description = "Value bounds declared in the Ghostty field contract (non-empty font-family; font-size 4–60; cursor-style in {block, bar, underline, block_hollow}; #RRGGBB colors; opacities 0–1; theme in the declared set; clipboard ask/allow/deny; copy-on-select true/false/clipboard; window-decoration auto/none/client/server; non-negative padding and scrollback-limit; palette N=#RRGGBB with N 0–255; keybind trigger=action with duplicate-trigger conflict; profile-name non-empty) are honored by editor update_property and artifact import/export the same way the visible controls enforce those contracts — invalid values are rejected with named field errors and export/import stay on the same schema."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n11"
name = "artifact_import_missing"
description = "Artifact import is unbound, missing, or a no-op when invoked despite being declared in the Bindings."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract deviates from its declaration in a way not covered by any other criterion in this file. 'Significant' means a real automation/contract break, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
