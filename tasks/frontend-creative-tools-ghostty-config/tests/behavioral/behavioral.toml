[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_survives_persistence"
description = "Starting from defaults: edit font-family, change font-size, select a theme on Colors, and leave Fonts as the active category; then reload. Confirm every facet survives — the same control values, live preview, generated lines (font-family, font-size, theme), override count, and active category — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "theme_a_b_a_proves_live_derivation"
description = "Theme round-trip proof (genre stand-in for sort reversal): select theme A and record the generated theme = line and preview colors; select a different theme B and confirm both change; re-select theme A. Confirm theme = and preview return to A's values — proving derivation from live theme state, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_preview_and_config_sensitivity"
description = "Derived-view sensitivity: change font-family, then font-size, then a base color. Confirm the generated-config lines and live terminal preview change meaningfully for each input rather than redrawing identically regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "control_preview_config_cross_echo"
description = "Cross-view echo: change cursor-style via the Fonts/Terminal controls; without reload, confirm the control value, the dock terminal cursor preview shape, and the generated cursor-style line all agree."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "override_count_delta_exact"
description = "Count-delta integrity: measure the override count, edit one previously-default setting to a new valid value, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_different_outputs"
description = "Input-dependent output: set font-family to value A and note the generated line and preview face; reset that setting; set font-family to a different value B. Confirm the two outcomes differ in the ways the inputs dictate (not byte-identical generated lines/preview)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_category_and_edit_flows"
description = "Interleaved-flow integrity: start editing font-family on Fonts, switch to Colors and select a theme, return to Fonts and finish/confirm the font-family value; confirm both the theme override and the font-family override remain correct without corrupting each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_overrides"
description = "Edge-state round-trip: after at least two overrides, Reset all (empty state and count zero visible), then edit two settings again; confirm the empty state clears, both new generated lines appear, the override count is 2, and export actions re-enable."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring several settings and the active category then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of all facets surviving together."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n2"
name = "preview_identical_across_different_inputs"
description = "Changing font-family, font-size, or theme across clearly different values leaves the live preview and generated-config output visually identical — a derived surface ignoring its inputs."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n3"
name = "different_themes_produce_identical_output"
description = "Selecting two different declared themes yields identical generated theme = lines and identical preview colors."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n4"
name = "category_switch_shows_stale_until_reload"
description = "After editing a setting, another surface (preview or generated-config panel) still shows stale values until a full page reload."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.9"
name = "export_import_full_pipeline"
description = "Mutate at least two settings, confirm generated lines track, export the config text, Reset all, Import the exported text, and confirm the session's actual overrides return on controls, preview, generated lines, and count — export omitting session work fails."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_round_trip_integrity"
description = "Edit font-family, Undo (surfaces revert), Redo (surfaces restore) — proving undo/redo operate on live history rather than no-ops."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "profile_apply_echoes_all_surfaces"
description = "Save a profile with two overrides, Reset all, apply the profile — generated panel, controls, and preview all echo the saved override set without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_omits_mutations_behavioral"
description = "An export taken after visible setting mutations omits those mutations from the artifact text while the UI still shows overrides."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.12"
name = "schema_contract_export_import_pipeline"
description = "Mutate font-size within 4–60, cursor-style to a contracted enum value (block/bar/underline/block_hollow), and a #RRGGBB color; confirm generated lines use those contracted shapes and Export contains them; Reset all; Import that export — restored controls and lines still satisfy the same Ghostty field contracts (keys, types, bounds, enums) as the pre-export would-be request body."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n6"
name = "round_trip_breaks_field_contracts"
description = "After export → Reset all → Import, a restored override violates its Ghostty field contract (wrong type, out-of-bound number, or out-of-enum value) or disagrees with the pre-export contracted shape, or a contract-invalid Import is accepted and mutates state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.13"
name = "compare_apply_isolation_probe"
description = "Compare isolation probe: record the generated configuration text, open Compare themes, set sides A and B to two different themes (both previews recolor differently), and confirm the recorded text is unchanged; Apply side B and confirm a theme = line naming B's theme appears; reopen compare and close it without applying — the configuration text stays byte-identical"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "profile_rename_round_trip_probe"
description = "Rename round-trip probe: save a profile holding two overrides, rename it to a new valid name, Reset all, then apply the renamed profile — the same two overrides reappear on the controls, preview, and generated panel, and the profile list shows only the new name with the same override count"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n7"
name = "compare_previews_identical_for_different_themes"
description = "With two different themes selected on sides A and B, the two compare previews render visually identical colors."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
