[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "motion.1"
name = "causal_retokenize_remap"
description = "Retokenize a syllable and remap its timing. Confirm a visible animation or transition clearly explains the cause of the remapping."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.2"
name = "causal_drag_resize"
description = "Drag and resize a syllable bar on the beat grid. Confirm smooth, causal motion during the drag and snap interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.3"
name = "causal_propagate_section_family"
description = "Propagate a section or family edit. Confirm visual feedback clearly illustrates the propagation to linked elements."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.4"
name = "causal_scrub_play_loop"
description = "Scrub, play, and loop the rehearsal timeline. Confirm the karaoke cursor moves smoothly and logically explains its position."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.5"
name = "causal_merge"
description = "Merge a wording branch. Confirm an animation logically resolves the differences into the final state."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.6"
name = "reduced_motion_parity"
description = "Enable reduced motion and perform the actions above. Confirm causal endpoints, text, and timing agree perfectly with the animated version, while persistent changed-token/time/span deltas remain."
type = "binary"
weight = 1.0
