[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "visual_design.1"
name = "legible_token_hierarchy"
description = "Inspect source, edited, stale, and mapped tokens. Confirm that the visual hierarchy remains distinct and legible across all these states simultaneously."
type = "binary"
weight = 1.0

[[criterion]]
id = "visual_design.2"
name = "stressed_misaligned_override"
description = "Mark tokens as stressed, misaligned, and overridden. Confirm the UI clearly differentiates these statuses visually without obscuring the base token."
type = "binary"
weight = 1.0

[[criterion]]
id = "visual_design.3"
name = "rhyme_motif_highlighting"
description = "Select a rhyme or motif family. Confirm the highlighted spans and connecting graph visually group the related elements effectively."
type = "binary"
weight = 1.0

[[criterion]]
id = "visual_design.4"
name = "master_inherited_override"
description = "View a master section, an inherited section, and a section with local overrides. Confirm the design clearly distinguishes their lineage and override status."
type = "binary"
weight = 1.0

[[criterion]]
id = "visual_design.5"
name = "playback_finding_approved"
description = "Observe the playback cursor, a validation finding, and the final approved state. Confirm these elements are highly visible and logically styled."
type = "binary"
weight = 1.0
