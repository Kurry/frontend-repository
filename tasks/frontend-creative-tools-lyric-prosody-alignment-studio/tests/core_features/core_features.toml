[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "core_features.1"
name = "edit_and_map_tokens"
description = "Edit a lyric line to split a syllable and map the new token to a timing interval. Confirm the UI reflects the updated tokens and timing exactly as mapped."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.2"
name = "stress_and_motif_graph"
description = "Mark stress (primary/secondary) on syllables and link them into a rhyme or motif family. Confirm the families form correctly and highlight associated tokens when selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.3"
name = "section_arrangement_and_repeats"
description = "Drag a section on the arrangement timeline and scope an edit to a repeated section. Confirm the edit propagates according to the selected scope (this, this-and-future, or master)."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.4"
name = "branch_and_compare"
description = "Create a wording branch for a line, edit it, and use the compare feature. Confirm differences in wording, timing, and properties are accurately highlighted."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.5"
name = "rehearse_and_recover"
description = "Run the logical rehearsal playback, triggering late/early events. Confirm the events are logged accurately and playback recovers gracefully from a pause."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.6"
name = "validate_approve_and_export"
description = "Resolve a deterministic prosody finding, approve the final version, and export. Confirm the downloaded JSON, LRC, CSV, SVG, and Markdown artifacts precisely reflect the final approved state without discrepancy."
type = "binary"
weight = 1.0
