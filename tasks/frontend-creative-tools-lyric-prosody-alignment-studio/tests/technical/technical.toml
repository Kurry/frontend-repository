[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "technical.1"
name = "interleave_actions_match"
description = "Interleave UI/WebMCP actions for lyric/mapping, timing, stress/graph, section/scope, branch, clock/rehearsal, validator, history, and transfer. Confirm that all IDs, rational positions, events, checksums, and exported files match identically across both interaction vectors."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.n1"
name = "preseeded_state_present"
description = "The application loads with authored work, completion, approval, export, or success evidence already preseeded, rather than starting from a genuinely clean state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.n2"
name = "divergent_canonical_paths"
description = "The pointer manipulation path and the keyboard/exact-value path result in divergent event counts, IDs, derived values, or WebMCP-observable states instead of converging to one canonical event."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.n3"
name = "adversarial_ordering_corruption"
description = "Adversarial action orderings (e.g., undo followed by branch, or cancel after preview) cause the application state to become corrupted, throw errors, or fail to converge to the expected prior snapshot."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.n4"
name = "partial_import_mutation"
description = "An invalid import attempt (e.g., unknown enums, cross-field contradictions) results in partial state mutation instead of being rejected atomically with zero state changes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.n5"
name = "state_leaks_on_reload"
description = "Transient previews, dialog states, hover effects, or invalid drafts leak into persistent state and survive a page reload instead of being correctly isolated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.n6"
name = "unhelpful_validation_errors"
description = "Validation error copy fails to identify the exact field, the rejected value or rule, and the specific recovery action, or correcting a value clears unrelated errors."
type = "binary"
negate = true
weight = 1.0
