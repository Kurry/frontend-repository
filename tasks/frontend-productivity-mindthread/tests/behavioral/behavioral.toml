[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_blank"
description = "Multi-facet round-trip: capture a spark, create a thread, assign the spark, add a tag, set status to Dormant, pin the thread, open Export, then reload. Confirm every facet coherently resets to the blank baseline — empty inbox, empty threads, empty undo history, closed export — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.2"
name = "inbox_order_reversal_via_capture_times"
description = "Sort-reversal stand-in: capture spark A then spark B; confirm B is above A (most-recent-first). After assigning both into a thread Timeline, confirm they appear oldest-first (A then B) — proving list order is derived from live timestamps rather than a hardcoded order."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.3"
name = "tag_filter_derived_view_sensitivity"
description = "Derived-view sensitivity: add distinct tags to two sparks, select one tag chip, and confirm the visible sparks/threads narrow to matches; clear filters and confirm the full lists restore — the derived filter view changes with its inputs."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.4"
name = "assign_echoes_inbox_timeline_today"
description = "Cross-view echo: assign an inbox spark to a thread; without reload confirm the inbox count drops, the thread Timeline contains the spark, and Today regroups it under that thread."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.5"
name = "capture_count_delta_exact"
description = "Count-delta integrity: measure the inbox spark count, capture one valid spark, and re-measure immediately — the count increases by exactly one."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.6"
name = "different_spark_texts_different_export"
description = "Input-dependent output: capture spark text A, note Workspace JSON; capture spark text B instead in a fresh session path (or after undo/delete of A); confirm Export Workspace JSON differs in the ways the inputs dictate."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.7"
name = "interleaved_capture_and_export_flows"
description = "Interleaved-flow integrity: start typing in the capture bar, open Export and note the pre-submit JSON, return and submit the spark, reopen Export; confirm the new spark appears in Workspace JSON and the typing interruption did not corrupt either flow."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.8"
name = "empty_then_repopulate_inbox"
description = "Edge-state round-trip: delete every spark until 'Capture your first spark' shows, then capture two sparks; confirm the empty state clears, both appear most-recent-first, and the inbox count is exactly two."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.9"
name = "export_import_round_trip_pipeline"
description = "Mutate → derived → export → import: capture, thread, assign, tag, reflect, set status; confirm Today and Export Workspace JSON (schemaVersion mindthread-workspace-v1 plus sparks/threads/reflections) reflect the work; Download Workspace JSON; mutate away; Import the JSON; confirm Home/Today/Archived/Export match the exported session."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.10"
name = "undo_round_trip_restores_surfaces"
description = "Undo round-trip: bulk-tag three sparks (filter counts update), Undo restores prior tags and counts everywhere including the Filter by tag panel, Redo reapplies the bulk tag — never a surface left stale."
type = "binary"
weight = 1.0
[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring sparks, threads, and filters then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the blank baseline."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Changing tags, status, or search leaves Today, search results, or Export text visually identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Capturing two different spark texts yields byte-identical Export Workspace JSON spark entries."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "After assign, status, or import, Home, Today, or Export still shows stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n5"
name = "export_text_ignores_session_mutations"
description = "After mutating sparks/threads/status, Export Workspace JSON or Today digest is identical to the pre-mutation text."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "14.n6"
name = "undo_leaves_derived_surfaces_stale"
description = "After Undo of a bulk tag or assignment, Filter by tag counts or Today still show the post-mutation state while the inbox restored."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
