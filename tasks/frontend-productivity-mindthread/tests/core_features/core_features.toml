[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with empty storage, the app opens on Home showing the Capture a spark bar, an Unthreaded inbox with the empty state 'Capture your first spark', and a threads column with the empty state 'No threads yet'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After typing text and pressing Enter or selecting Add Spark, a timestamped spark appears at the top of the Unthreaded inbox and the inbox count increases"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After submitting an empty capture, no spark is added and the inline message 'Enter a thought to add a spark' appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After selecting + New Thread with a non-empty title, a thread card appears showing the title, a spark count, and an 'updated Xh ago' relative time"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After choosing a thread in a spark's Assign to Thread selector, the spark leaves the Unthreaded inbox and the thread's spark count increases"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After opening a thread, the detail view shows a Timeline of its sparks in chronological order plus a stats line reading 'N sparks · N reflections · N days active'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After selecting Add Reflection on a timeline spark and saving text, a dated reflection appears indented and tinted beneath that spark and the reflection count increases"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After setting a thread's status with the Active / Dormant / Resolved segmented control, the status badge shows the same status and color on the thread card, the detail header, and the Archived screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After editing an unthreaded spark's text and saving, the updated text is shown; after selecting Delete, the spark and its reflections are removed from every view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After completing the two-step Merge Into… confirm, all sparks and reflections move into the target thread in chronological order and the emptied source thread disappears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After adding a tag to a spark, the Filter by tag panel lists that tag with a live count, and selecting the chip filters visible sparks and threads to matches with a 'No matching sparks' message when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When Search text is entered, results are grouped as Matching threads / sparks / reflections with the matching substring highlighted, and a no-results message appears when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After pinning a thread it moves into a separate Pinned section above the regular list; the Today view groups today's sparks by thread with an Unthreaded group; Archive moves a thread to the Archived view where Unarchive restores it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After creating sparks and a thread then performing a full page reload, the exact prior sparks, threads, reflections, tags, status, pin, and archive state are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After selecting Load 10,000 Items, the list shows a 'Rendered item count' far below 10,000, a 'Virtualized items' region, and a working Filter items field, confirming only the visible window is in the DOM"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "On load with empty storage, the app opens on Home showing the Capture a spark bar, an Unthreaded inbox reading 'Capture your first spark', and a threads column reading 'No threads yet'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Typing text and pressing Enter or selecting Add Spark creates a timestamped spark at the top of the Unthreaded inbox and increases the inbox count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Submitting an empty or whitespace-only capture adds no spark and shows the inline message 'Enter a thought to add a spark'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Selecting + New Thread with a non-empty title creates a thread card showing the title, a spark count, and an 'updated Xh ago' relative time"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Choosing a thread in a spark's Assign to Thread selector moves the spark out of the Unthreaded inbox and increases that thread's spark count; the New Thread… option creates a thread named from the spark text and assigns it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Opening a thread shows a detail view with a chronological Timeline of its sparks and a stats line reading 'N sparks · N reflections · N days active'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Selecting Add Reflection on a timeline spark and saving text appends a dated reflection indented and tinted beneath that spark and increases the reflection count; empty reflection text is rejected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Setting a thread's status with the Active / Dormant / Resolved segmented control updates its badge to the same status on the thread card, the detail header, and the Archived screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Editing an unthreaded spark updates its text everywhere; Delete removes the spark and its reflections from every view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Completing the two-step Merge Into… confirm moves all sparks and reflections into the target thread in chronological order and removes the emptied source thread"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Adding a tag to a spark lists it in the Filter by tag panel with a live count, and selecting the chip filters visible sparks and threads to matches with a 'No matching sparks' message when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "Entering Search text groups results as Matching threads / sparks / reflections with the matching substring highlighted, and shows a no-results message when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "Pinning a thread moves it into a separate Pinned section above the regular list; the Today view groups today's sparks by thread with an Unthreaded group; Archive moves a thread to the Archived view where Unarchive restores it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "After creating sparks and a thread then performing a full page reload, the exact prior sparks, threads, reflections, tags, status, pin, and archive state are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "Selecting Load 10,000 Items shows a 'Rendered item count' far below 10,000 in a 'Virtualized items' region with a working Filter items field, confirming only the visible window is in the DOM"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "1_31"
description = "The capture bar withstands at least 25 rapid consecutive submissions: the final spark count is exact, controls stay responsive, and the burst produces no blank screen, uncaught error, or freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "1_32"
description = "Invalid or extreme input (very long text, symbols, whitespace) is handled with specific visible feedback without damaging the last valid state, and repeated rapid empty submissions create no records"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.33"
name = "1_33"
description = "Empty or whitespace-only capture or thread-title input silently adds a record or shows a false success instead of the inline validation message"
type = "binary"
weight = 1.0
negate = true
