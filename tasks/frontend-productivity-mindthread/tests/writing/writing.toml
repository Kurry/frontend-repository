[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Headings and buttons use one consistent capitalization convention throughout Home, Today, Archived, Export, and Import."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Action labels are specific verbs such as Add Spark, Add Reflection, Export, Import, Copy, and Download rather than generic labels."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Inline errors name the problem and fix using the specified copy (Enter a thought to add a spark; Enter a title to create a thread; Enter some text to save the reflection) or field-contract messages for tag/import bounds."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Empty states use the exact specified copy (Capture your first spark; No threads yet; No sparks captured yet today; No matching sparks) explaining what belongs there."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.5"
name = "body_copy_well_written"
description = "Body/meta copy (timestamps, stats lines, export hints) is readable and free of obvious typos where rendered."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.6"
name = "terminology_consistent"
description = "Terminology stays consistent: spark/thread/reflection/export wording does not randomly switch synonyms across views."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.7"
name = "counts_and_times_consistent"
description = "Count phrases such as 'N sparks' and relative times like 'updated Xh ago' stay consistently formatted."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.8"
name = "success_messages_specific"
description = "Toasts after assign, merge, copy, and Import are specific rather than a generic Done."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "15.n1"
name = "placeholder_or_lorem_shipped"
description = "Placeholder or lorem text appears in the shipped UI."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "15.n2"
name = "generic_button_labels"
description = "Primary actions use only generic labels like Submit/OK where Add Spark/Export/Import are specified."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "15.n3"
name = "empty_state_copy_wrong"
description = "Empty-state or inline-error copy diverges from the exact strings specified in the instruction where those strings are required."
type = "binary"
negate = true
weight = 0.5
optional = true
[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
