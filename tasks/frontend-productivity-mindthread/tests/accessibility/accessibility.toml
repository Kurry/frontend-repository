[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Every interactive control — nav tabs, Add Spark, + New Thread, Assign to Thread, Pin, status segmented control, tag chips, Merge Into…, Archive, Export, Import, Undo, Redo, bulk checkboxes and tray actions — is reachable and operable with the keyboard alone, with a visible focus ring while focused."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "dialogs_manage_focus"
description = "The Merge Into… dialog, Export drawer, Import dialog, and command palette use role dialog, trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls (Pin, Archive, close, palette rows if icon-led) expose accessible names via aria-label or visible text."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Copy confirmation, bulk apply results, and Import success or failure are announced through a polite live region as well as shown visually."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Capture textarea, thread title, tag input, reflection editor, and Import field have visible labels or accessible names associated with the control."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "View headings (Home inbox, Today, Archived, thread detail, Export) follow a logical heading order without skipping levels arbitrarily."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "landmark_navigation_present"
description = "Primary chrome exposes landmarks (banner/nav/main or equivalent roles) so Home/Today/Archived and the capture region are distinguishable to assistive tech."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Primary text #262a3d on #f5f6fb/#ffffff and status badge text on indigo/amber/green backgrounds maintain readable contrast."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "semantic_roles_for_dialogs_and_tabs"
description = "Dialogs expose dialog semantics; nav tabs and the status segmented control expose appropriate selection semantics operable with arrow keys and Enter."
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion, spark enter/exit, pin reorder, drawer enter, and toast slide transitions do not rely on large motion that ignores the preference (instant or minimal transitions)."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "1.n1"
name = "keyboard_traps_outside_dialogs"
description = "Keyboard focus is trapped in a non-dialog region with no Escape path, or Tab cannot reach Export/Import/Undo."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n2"
name = "dialogs_lack_focus_management"
description = "Merge/Export/Import/command palette open without moving focus inside, or fail to return focus on close."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n3"
name = "icon_only_controls_unnamed"
description = "Icon-only Pin/Archive/close controls have no accessible name."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n4"
name = "validation_color_only"
description = "Inline validation is conveyed by color change alone with no adjacent text naming the field."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n5"
name = "status_conveyed_by_color_only"
description = "Active/Dormant/Resolved status is conveyed by color alone with no readable status text on the badge."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n6"
name = "focus_rings_missing"
description = "Focused interactive controls show no visible focus indicator."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n7"
name = "live_region_missing_for_copy_import"
description = "Copy confirmation or Import success/failure has no live-region announcement and no equivalent accessible text update."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n8"
name = "assign_status_not_keyboard_operable"
description = "Assign to Thread or the status segmented control cannot be operated with keyboard alone."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "1.n9"
name = "bulk_tray_not_keyboard_reachable"
description = "When sparks are selected, bulk tray actions are not keyboard reachable or lack visible focus indicators."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
