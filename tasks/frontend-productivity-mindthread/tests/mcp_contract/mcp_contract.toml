[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with browse_*, entity_*, form_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.2"
name = "handlers_match_visible_mindthread_ui"
description = "Exposed tool handlers call the same application logic as the visible UI: browse/entity/form/artifact operations change the same sparks, threads, filters, and export state the capture bar, Assign to Thread, status control, Export, and Import use."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse destinations home/today/archived/thread-detail/export-drawer and filter tag; entity spark create/select/update/delete/toggle with fields text/tags/thread/status/pinned/archived; form fields spark-text/thread-title with validate/submit/cancel; artifact export/import/copy with formats json/markdown and import mode workspace-json — no invented destinations."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound browse, entity, form, and artifact tools."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.5"
name = "entity_spark_operations_work"
description = "Entity operations declared for entity spark work: create, select, update, delete (confirm=true), and toggle update the visible inbox/thread/pin/archive state."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.6"
name = "form_spark_thread_validate_submit_cancel"
description = "Form operations validate, submit, and cancel for fields spark-text and thread-title are bound and keep normal validation/errors active."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.7"
name = "browse_destinations_and_tag_filter"
description = "Browse open/search/apply_filter/clear_filter match destinations home/today/archived/thread-detail/export-drawer and filter tag, updating the same visible navigation/filter state as the UI."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.8"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import (mode workspace-json), and copy with export formats json and markdown are bound and invoke without throwing when called through WebMCP (clipboard/file contents remain Playwright responsibilities)."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0
[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0
