[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing follows the 4px-multiple scale across capture bar, cards, and panels similarly to the reference overview/segments."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Heading/body/mono stacks and sizes follow the instruction (Poppins-class headings, Inter-class body, JetBrains Mono-class timestamps) in the spirit of the reference screenshots."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.3"
name = "layout_matches_reference_home"
description = "Home layout matches the reference composition: capture bar, Unthreaded inbox, and threads column as shown in overview/segments (text wins on conflicts)."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Spark enter/exit and pin reorder animate as specified rather than hard-cutting, consistent with the motion-capable reference feel."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Desktop vs narrow layouts keep the same information hierarchy as the reference without inventing a conflicting dashboard chrome."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Primary/secondary buttons, pills, and rounded-xl cards match the specified shape system and reference control styling."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Thread titles, inbox headers, body, and timestamp meta show a clear size/weight hierarchy as in the reference."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Hover/focus/active treatments on nav tabs and cards are present and consistent with the polished reference chrome."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.9"
name = "export_drawer_fits_visual_system"
description = "Export drawer uses the same surface #ffffff, primary indigo accents, and rounded-md controls as the rest of the app rather than a visually alien panel."
type = "binary"
weight = 1.0
[[criterion]]
id = "3.n1"
name = "layout_diverges_grossly_from_reference"
description = "Home layout grossly diverges from the reference overview (missing capture/inbox/threads regions) without instruction justification."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n2"
name = "palette_ignores_specified_tokens"
description = "App colors ignore the specified indigo/rose/off-white/status tokens in favor of an unrelated theme."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "3.n3"
name = "reference_screenshots_shipped_as_assets"
description = "Reference screenshots from /reference-screenshots are copied into the shipped app as UI assets."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
