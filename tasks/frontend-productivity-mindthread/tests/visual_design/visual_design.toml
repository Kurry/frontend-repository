[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The palette matches the tokens: primary indigo #4a5fc1 accents and buttons, rose #e0708a spark markers, off-white #f5f6fb background, and white #ffffff card surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Status badges use Active indigo, Dormant amber #d99a3d, and Resolved green #359b6b, and each status renders in that same color wherever the badge appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Typography follows the spec: Poppins-style rounded headings, Inter-style body at ~0.95rem, and JetBrains Mono timestamps and tag chips at ~0.72rem"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "The shape system reads correctly: rounded-xl thread cards and capture bar, fully-rounded pill badges and tag chips, and rounded-md dropdowns and search fields"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "The thread timeline visually distinguishes original sparks from appended reflections through indentation and a different background tint"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "The Unthreaded inbox, thread list, thread timeline, Today digest, and Archived screen show explanatory empty-state copy, and a zero-match tag filter or search shows an explicit no-match message rather than a blank panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "3_7"
description = "At roughly 375px wide the capture bar, thread cards, and timeline stay usable without horizontal scrolling and long spark text wraps rather than overflowing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "3_8"
description = "A thread's status badge shows different colors in different views, or badge colors do not match the Active/Dormant/Resolved token mapping"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "At ~375px wide content overflows horizontally or long spark text clips or forces sideways scrolling instead of wrapping"
type = "binary"
weight = 0.5
negate = true
optional = true
