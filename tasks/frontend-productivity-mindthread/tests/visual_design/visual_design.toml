[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "palette_tokens_match"
description = "The palette matches the tokens: primary indigo #4a5fc1 for thread accents and primary buttons, warm rose #e0708a for spark markers and highlights, cool off-white #f5f6fb app background, white #ffffff card and panel surfaces, primary text #262a3d, and secondary meta text #6b6f85 for timestamps, counts, and breadcrumbs"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "status_badge_color_mapping"
description = "Status badges use Active indigo #4a5fc1, Dormant amber #d99a3d, and Resolved green #359b6b, and each status renders in that exact color everywhere the badge appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "typography_stacks_and_scale"
description = "Typography follows the spec: rounded sans-serif headings (Poppins-style) from ~1.6rem thread titles down to ~1.0rem inbox headers, sans-serif body and UI chrome (Inter-style) at ~0.95rem, and monospace timestamps and tag chips (JetBrains Mono-style) at ~0.72rem"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "shape_system_radii"
description = "The shape system reads correctly: 12px rounded-xl thread cards and capture bar, fully-rounded pill status badges and tag chips, 6px rounded-md dropdowns and search fields, and spacing in multiples of the 4px base unit"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "reflection_indent_and_tint"
description = "The thread timeline visually distinguishes original sparks from appended reflections through indentation and a tinted primary-wash background so the evolution of a thread is easy to scan"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "empty_and_no_match_states_present"
description = "The Unthreaded inbox, thread list, thread timeline, Today digest, and Archived screen each show explanatory empty-state copy before any data exists, and a zero-match tag filter or search shows an explicit no-match message rather than a blank panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "responsive_375_to_1440_no_overflow"
description = "At roughly 375px wide the capture bar, thread cards, and timeline stay fully usable without horizontal scrolling with long spark text wrapping rather than overflowing, and no content clips or overflows the viewport at any width between 375px and 1440px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "badge_colors_inconsistent"
description = "A thread's status badge shows different colors in different views, or badge colors deviate from the Active indigo / Dormant amber / Resolved green token mapping"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "mobile_overflow_or_clipping"
description = "At ~375px wide content overflows horizontally or long spark text clips or forces sideways scrolling instead of wrapping"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.10"
name = "saved_reflection_formatting_visible"
description = "Bold text and bulleted lists inside saved reflections render with visibly heavier weight and real list markers, distinct from surrounding plain text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "exact_specified_copy_strings"
description = "Empty states, inline errors, and headers use the exact specified copy: 'Capture a spark', 'Capture your first spark', 'No threads yet', 'Enter a thought to add a spark', 'Enter a title to create a thread', 'Enter some text to save the reflection', 'No sparks captured yet today', and 'No matching sparks'"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "consistent_capitalization_specific_verbs"
description = "Buttons and headings use one consistent capitalization convention throughout, and action labels are specific verbs such as 'Add Spark' and 'Add Reflection' rather than generic labels like 'Submit' or 'OK'"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "placeholder_or_lorem_text_shipped"
description = "Placeholder or lorem text (e.g. 'Lorem ipsum', 'TODO', 'asdf', or template variable names) appears anywhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.14"
name = "button_treatments_match_spec"
description = "Primary buttons use the primary indigo background with white text, rounded-md corners, a subtle shadow, and no border; secondary buttons use a surface background, primary text, a 1px muted-gray border, and rounded-md corners"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
