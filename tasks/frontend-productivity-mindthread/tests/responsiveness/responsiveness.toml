[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "At roughly 1440px and 375px the capture bar, thread cards, timeline, Export drawer, bulk tray, and command palette remain usable without a desktop-only broken layout."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "Primary controls (Add Spark, nav tabs, Export, bulk tray actions) present adequately large tap targets at 375px."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "7.3"
name = "typography_wraps_across_breakpoints"
description = "Long spark text wraps rather than overflowing between 375px and 1440px."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "No content clips or overflows the viewport at any width between 375px and 1440px."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "chrome_adapts_small_screens"
description = "Top nav, Export drawer, and command palette stay fully visible/operable at small widths rather than rendering off-screen."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths, inbox and threads stack or reflow logically without overlapping unusable layers."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "touch_friendly_selectors"
description = "Assign to Thread and status segmented control remain operable at 375px width."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px wide there is no page-level horizontal scrolling for Home, Today, Archived, or Export."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.n1"
name = "mobile_layout_unusable"
description = "At 375px the capture bar or thread cards are unusable due to overflow or unreachable controls."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n2"
name = "export_drawer_offscreen_on_mobile"
description = "Export drawer or command palette renders off-screen or clipped at small widths with no way to operate Copy/Download."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n3"
name = "horizontal_scroll_at_375"
description = "Page-level horizontal scrolling appears at 375px during normal Home/Today use."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n4"
name = "text_overflows_cards"
description = "Long spark or thread title text overflows its card/panel instead of wrapping between 375 and 1440."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsiveness that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
