[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "At roughly 1440px and 375px the capture bar, thread cards, timeline, Export drawer, bulk tray, and command palette remain usable without a desktop-only broken layout."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_tap_targets_large_enough"
description = "Primary controls (Add Spark, nav tabs, Export, bulk tray actions) present adequately large tap targets at 375px."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "7.3"
name = "typography_wraps_across_breakpoints"
description = "Long spark text wraps rather than overflowing between 375px and 1440px."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "No content clips or overflows the viewport at any width between 375px and 1440px."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "chrome_adapts_small_screens"
description = "Top nav, Export drawer, and command palette stay fully visible/operable at small widths rather than rendering off-screen."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths, inbox and threads stack or reflow logically without overlapping unusable layers."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "touch_friendly_selectors"
description = "Assign to Thread and status segmented control remain operable at 375px width."
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px wide there is no page-level horizontal scrolling for Home, Today, Archived, or Export."
type = "binary"
weight = 1.0
