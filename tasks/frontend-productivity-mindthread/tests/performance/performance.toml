[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load — capture bar and empty inbox are usable."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No uncaught errors appear in the console during a full exercise including capture, assign, reflect, export, import, undo, and virtualized list."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.3"
name = "ui_transitions_stay_responsive"
description = "View switches among Home/Today/Archived/detail and opening Export respond without multi-second stalls."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.4"
name = "export_regen_stays_snappy"
description = "Opening Export after many mutations regenerates Workspace JSON and Today digest without freezing the UI."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.5"
name = "virtualized_10k_without_lag"
description = "Scrolling the 10,000-item virtualized panel stays smooth with DOM row count far below 10,000."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Rapid capture, tag filter toggles, and undo/redo keep controls interactive with no hang."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Spark enter/exit and toast slide animations do not visibly hitch the main thread during normal use."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "9.8"
name = "rapid_capture_burst_no_freeze"
description = "At least 25 rapid consecutive capture submissions keep an exact final count with no blank screen, uncaught error, or freeze."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.n1"
name = "cold_start_hangs_or_blank"
description = "Cold load hangs on a blank screen or spinner beyond a few seconds without becoming interactive."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "9.n2"
name = "console_errors_during_workflow"
description = "Uncaught console errors appear during capture/assign/export/import workflows."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "9.n3"
name = "export_or_undo_freezes_ui"
description = "Opening Export or rapid undo/redo freezes the UI for multiple seconds."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "9.n4"
name = "virtualized_list_blank_gaps"
description = "Virtualized scrolling shows blank gaps or mounts near-all 10,000 rows in the DOM."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "9.n5"
name = "rapid_input_freezes_app"
description = "Rapid capture or filter toggling freezes the app or drops inputs."
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
