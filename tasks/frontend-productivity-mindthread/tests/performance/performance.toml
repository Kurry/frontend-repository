[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load — capture bar and empty inbox are usable."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No uncaught errors appear in the console during a full exercise including capture, assign, reflect, export, import, undo, and virtualized list."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.3"
name = "ui_transitions_stay_responsive"
description = "View switches among Home/Today/Archived/detail and opening Export respond without multi-second stalls."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.4"
name = "export_regen_stays_snappy"
description = "Opening Export after many mutations regenerates Workspace JSON and Today digest without freezing the UI."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.5"
name = "virtualized_10k_without_lag"
description = "Scrolling the 10,000-item virtualized panel stays smooth with DOM row count far below 10,000."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "Rapid capture, tag filter toggles, and undo/redo keep controls interactive with no hang."
type = "binary"
weight = 1.0
[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Spark enter/exit and toast slide animations do not visibly hitch the main thread during normal use."
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "9.8"
name = "rapid_capture_burst_no_freeze"
description = "At least 25 rapid consecutive capture submissions keep an exact final count with no blank screen, uncaught error, or freeze."
type = "binary"
weight = 1.0
