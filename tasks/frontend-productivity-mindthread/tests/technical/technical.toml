[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "loads_interactive_quickly"
description = "Navigating to / in a fresh context reaches an interactive UI within a few seconds — the capture bar and Unthreaded inbox are visible — rather than a blank page or framework error overlay"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.2"
name = "console_clean_during_workflow"
description = "No uncaught JavaScript errors or unhandled promise rejections appear in the console during initial load or while driving the capture / assign / reflect / export / import workflow"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.3"
name = "reload_renders_cleanly"
description = "A full hard reload after creating data re-renders the app cleanly at the blank baseline with no error flash, blank screen, or stuck loading state"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.4"
name = "reload_returns_blank_baseline"
description = "After creating sparks, a thread, reflections, and tags then performing a full reload, the app returns to the blank first-load empty states rather than restoring session data from browser storage"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.5"
name = "storage_apis_remain_empty"
description = "After capturing, assigning, tagging, exporting, and importing through the UI, localStorage and sessionStorage remain empty (good-app in-memory rule)"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.6"
name = "shared_state_coherence"
description = "A status, assign, pin, archive, undo, or import change made in one place is reflected consistently in every other view that shows the same thread or spark, including Export previews, indicating a single shared collection rather than disconnected copies"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.7"
name = "no_failed_requests"
description = "No failed same-origin (4xx or 5xx) requests occur during load or the core workflow, ignoring the browser's automatic favicon probe"
type = "binary"
weight = 0.5
optional = true
[[criterion]]
id = "2.13"
name = "merge_dialog_focus_management"
description = "The Merge Into… dialog exposes role dialog, traps keyboard focus while open, closes on Escape, and returns focus to the control that opened it"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.14"
name = "keyboard_reach_and_operable_controls"
description = "Keyboard Tab reaches every interactive control (nav tabs, Add Spark, + New Thread, Assign to Thread, Pin, status control, tag chips, Merge Into…, Archive, Export, Import, Undo, Redo, bulk tray) with a visible focus ring on each, and the Assign to Thread selector and the status segmented control are operable with the keyboard alone using arrow keys and Enter"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.15"
name = "validation_visible_text_not_color_only"
description = "Inline validation messages render as visible text adjacent to their field, rather than a color change alone"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.16"
name = "virtualized_scroll_stays_smooth"
description = "Scrolling the loaded 10,000-item virtualized panel stays smooth with no blank gaps, and the rendered DOM row count stays far below 10,000 throughout the scroll"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.17"
name = "assets_all_same_origin"
description = "Every script, style, font, and icon request in the network log is same-origin — zero outbound requests to CDNs or external hosts during load and a full exercise of the app"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.18"
name = "export_import_share_workspace_schema"
description = "Workspace JSON produced by Export validates against the same mindthread-workspace-v1 field contract that Import accepts (schemaVersion, exportedAt, sparks, threads, reflections, status enums, and cross-field id rules); a downloaded then re-imported document restores matching visible state"
type = "binary"
weight = 1.0
