[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "cf_01"
title = "Allows dragging, rotating, and layering rectangular items without overlap"
description = "Verifies that items can be placed on the grid without overlap"
weight = 1.0

[[criterion]]
id = "cf_02"
title = "Updates canvas bounding previews on invalid placement snapbacks"
description = "Verifies snapback to original position on invalid placement"
weight = 1.0

[[criterion]]
id = "cf_03"
title = "Nests items inside pouches bounded to 2 depth layers and rejects cycles"
description = "Verifies pouch nesting respects max depth of 2 and prevents cyclic containment"
weight = 1.0

[[criterion]]
id = "cf_04"
title = "Computes accurate center of mass and balance per owner assignments"
description = "Verifies left/right imbalance is within 10 percent threshold"
weight = 1.0

[[criterion]]
id = "cf_05"
title = "Flags missing, duplicated, and unassigned kits logically on the graph"
description = "Verifies kit selection highlights relevant items in manifest"
weight = 1.0

[[criterion]]
id = "cf_06"
title = "Restricts layout branch forks and merges property-by-property without loss"
description = "Verifies forks copy exact layout state property by property"
weight = 1.0
