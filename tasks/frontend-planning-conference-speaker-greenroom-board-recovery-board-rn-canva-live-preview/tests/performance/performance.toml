[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_load_interactive_under_two_seconds"
description = "On a local cold load, the complete seeded workbench becomes interactive within 2 seconds with no layout jump, console error, page error, or non-local network request."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "large_fixture_mutation_latency"
description = "After loading exactly 104 records, a visible recovery mutation acknowledges within 100 milliseconds and the linked summary plus mobile preview settle within 500 milliseconds without unrelated-card instability."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "large_fixture_artifact_latency"
description = "With the 104-record fixture, opening or downloading export and validating/importing a valid artifact each complete within 2 seconds while the page stays responsive."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_interaction_stability"
description = "Rapid filter, selection, edit, move, undo, export, and import sequences produce no dropped interaction, duplicate event, stale row, freeze, or console/page error."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "large_collection_breaks_interaction"
description = "At the declared 104-record fixture, scrolling or any signature action visibly freezes, exceeds the stated settle budgets, or causes unrelated cards to flash and rebuild."
type = "binary"
negate = true
weight = 1.0
