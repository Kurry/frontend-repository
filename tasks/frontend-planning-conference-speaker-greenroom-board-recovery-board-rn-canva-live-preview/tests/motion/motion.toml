[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "8.1"
name = "real_drag_causal_motion"
description = "Through the real pointer drag path, a failed card lifts, the Recovery path highlights, and the dropped card settles into its new lane over roughly 220 milliseconds while linked preview and count evidence updates immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.2"
name = "visible_control_recovery_transitions"
description = "Using visible Move to recovery and Apply repair controls animates the acted-on stable-ID card between failed, Holding, and Live treatments rather than snapping or requiring a WebMCP shortcut."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.3"
name = "collection_and_dialog_transitions"
description = "Visible add, delete, reorder, filter, and import actions animate affected cards and surrounding layout; dialogs enter and exit over approximately 180–240 milliseconds without layout flash."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.4"
name = "hover_press_and_toast_feedback"
description = "While actually hovered and pressed, buttons, cards, chips, rows, timeline events, and drop targets show distinct computed-style feedback; confirmations enter, remain readable, and fade without blocking controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.5"
name = "reduced_motion_causal_parity"
description = "With prefers-reduced-motion active from fresh load, no meaningful timed transform or transition runs, while outlines, labels, counts, live announcements, and the complete recovery flow remain available."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.n1"
name = "motion_causes_jank_or_stale_layout"
description = "A card transition, dialog, filter, import, or toast causes visible layout jank, leaves the card in two lanes, blocks input, or settles with linked views still stale."
type = "binary"
negate = true
weight = 1.0
