[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "exact_boundaries_and_adjacent_rejection"
description = "Visible forms accept exact minima and maxima for every declared field—speakerName 2/80, sessionTitle 3/120, startMinute 480/1080, duration 15/90, mobileNote 160, shortLink 3/32—and reject each adjacent out-of-range value with field, rule, and recovery action named."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "repair_conflict_is_atomic"
description = "Applying a repair whose replacement interval overlaps another non-archived slot in the same room shows a start-time conflict naming the colliding speaker and makes zero changes to the record, lane, selection, counts, preview, or history."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "aggregated_import_diagnostics"
description = "One invalid import reports all unknown top-level keys, malformed fields, enum errors, non-five-minute values, duplicate IDs and short links, lane/status contradictions, dangling references, history gaps, and stale derived values together with record index or field paths."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "empty_and_filtered_recovery_states"
description = "Filtering to zero matches shows Clear filters, Add slot, and Import JSON actions; actually clearing all records shows empty lanes and zero totals while Add slot and Import JSON remain operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "correction_clears_only_corresponding_error"
description = "When an import or form has multiple field errors, correcting one invalid value clears only that field's diagnostic while unrelated diagnostics remain visible until corrected."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "invalid_transaction_partially_mutates"
description = "Any malformed import, duplicate activation, cancelled drag, incomplete repair, or invalid field updates some records or derived state before the whole transaction is accepted."
type = "binary"
negate = true
weight = 1.0
