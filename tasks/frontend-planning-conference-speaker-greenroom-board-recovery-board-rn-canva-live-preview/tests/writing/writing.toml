[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_greenroom_terminology"
description = "Where the app renders headings, buttons, statuses, and field labels, it consistently uses Speaker slots, Recovery path, Mobile preview, and Event timeline in sentence case."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_domain_action_labels"
description = "Where action labels appear, they use specific verbs such as Add slot, Move to recovery, Apply repair, Archive slot, Export JSON, Copy JSON, and Import JSON rather than generic Submit or OK."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "actionable_field_and_import_errors"
description = "Where validation or import errors render, they name the field or record path, rejected rule or value, and a specific correction; malformed multi-record imports remain readable as one diagnostic report."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.4"
name = "helpful_empty_and_confirmation_copy"
description = "Where empty states or confirmations render, they explain what is absent or what changed and name the next available action without placeholder, lorem, copied-brand, or template text."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_or_inconsistent_copy"
description = "The shipped UI visibly contains placeholder prose, TODO text, copied Canva branding, spelling errors in prominent controls, or inconsistent names for the same greenroom concept."
type = "binary"
negate = true
weight = 0.5
