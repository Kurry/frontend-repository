[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "canonical_desktop_composition"
description = "At 1440 by 900 pixels, the implementation matches the reference composition: approximately 280-pixel slot navigator, broad three-lane recovery canvas, approximately 320-pixel inspector with phone preview, summary ribbon, and event timeline, with no clipped regions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "canonical_mobile_composition"
description = "At 375 by 812 pixels, the implementation matches the reference mobile transformation into Slots, Recover, and Preview steps while retaining the same card, status, repair, and share-preview visual language."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "reference_state_tokens_and_card_anatomy"
description = "Board lanes, stable card anatomy, selection outline plus Selected text, failure coral, recovery amber, resolved mint, phone bezel, timing badge, share card, and monospaced artifact treatment reproduce the reference's domain-specific state hierarchy."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.n1"
name = "generic_crud_or_reference_structure_missing"
description = "The rendered result collapses into a generic CRUD table or omits the reference's recovery lanes, linked phone preview, summary ribbon, or event timeline."
type = "binary"
negate = true
weight = 1.0
