[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_canonical_recovery"
description = "From a fresh load, keyboard-only operation can select slot-maya, activate Move to recovery, enter a valid repair, and apply it; the same stable ID reaches resolved state with visible focus throughout."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "dialogs_trap_and_restore_focus"
description = "Add, edit, delete, clear, and import dialogs expose dialog semantics, keep Tab focus inside while open, close with Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "non_color_status_and_live_updates"
description = "Failed, Holding, Live, validation, import, repair, copy, and undo states are conveyed with text or icons in addition to color, and state changes are announced through a polite live region."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "mobile_targets_and_focus_continuity"
description = "At 375 by 812 pixels, all controls used in Slots, Recover, and Preview are at least 44 by 44 pixels, keyboard focus is visible, and focus remains on a meaningful control after each step change."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "pointer_only_or_color_only_recovery"
description = "The recovery flow is available only through pointer drag, or failed, holding, and resolved states rely on color alone without equivalent text evidence."
type = "binary"
negate = true
weight = 1.0
