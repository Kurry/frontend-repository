[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_three_surface_layout"
description = "At 1440 pixels wide, navigator, recovery canvas, and phone inspector are simultaneously visible with usable controls and no page-level horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_drawer_and_full_width_inspector"
description = "At 900 pixels, the navigator is available through the responsive Slots step, the recovery board stays primary, and the inspector is a usable full-width panel without overlap or clipped controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_three_step_canonical_flow"
description = "At 375 by 812 pixels, selecting slot-maya in Slots, moving it in Recover, applying repair, and viewing the Live card in Preview completes without losing selection or requiring desktop-only controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_targets_and_no_overflow"
description = "At 375 pixels, every canonical-flow control is at least 44 by 44 pixels and document scrollWidth exceeds clientWidth by no more than one pixel before and after recovery."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "responsive_content_clips_or_disappears"
description = "At 1440, 900, or 375 pixels, any required lane, form field, dialog action, phone detail, or event evidence clips, overlaps, becomes unreachable, or forces page-level horizontal scrolling."
type = "binary"
negate = true
weight = 1.0
