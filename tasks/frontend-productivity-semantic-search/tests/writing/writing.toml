[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_use_consistent_capitalization"
description = "Where the app renders headings and panel titles (results, history, saved searches, index, compare), they use one consistent capitalization convention throughout"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders action labels, they are specific verbs such as Save search, Index now, Download report, and Copy report rather than generic labels like Submit or OK when a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders errors and notices, they name the problem and the fix — the unmatched token value, the empty required field, what failed in an ingest step — not just a rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states (no results, empty history, empty saved list), the copy explains what belongs there and how to get it — such as loosening filters or lowering the threshold"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = "Where the app renders seeded document bodies, explanations, and notices, rate how free the copy is of spelling and grammatical errors"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_is_consistent"
description = "Where the app names the same concept in multiple places, terminology is consistent — always documents (not files here and docs there), always saved searches, always stale"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numbers_dates_and_units_are_consistent"
description = "Similarity scores render with two decimals everywhere they appear, and timestamps use one consistent format across history, steps, and the event timeline"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders confirmations, they state what happened — Search saved, Report copied, Indexed 120 documents — not vague affirmations"
type = "binary"
weight = 0.5

