[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "10.1"
name = "serves_clean_and_fast"
description = "The app serves via its documented npm start path on port 3000, renders a working interface (not a blank or broken page), and is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.2"
name = "shared_state_coherence"
description = "Deleting a document from the index panel immediately removes its card from any visible results, decreases the result count, and updates the index statistics — the same datum never shows different values in two places without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.3"
name = "reload_resets_to_seed"
description = "A page reload returns the app to its seeded baseline: the seeded corpus, an empty query, no history entries, no saved searches, no feedback, and a fully built index"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.4"
name = "console_stays_clean"
description = "No console errors or unhandled promise rejections appear on load or during a full exercise of searching, feedback, palette use, bulk operations, undo/redo, and a complete re-index run"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.5"
name = "derived_surfaces_agree"
description = "The Search report export, Library package export, the compare view, the cluster group counts, and the visible result list all agree with each other for the same query and corpus state — counts sum, rankings match, and export field contracts use the same ids, types, and scores shown on cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.7"
name = "api_shaped_exports_parse"
description = "Search report and Library package Download/Copy payloads parse as JSON with schemaVersion exactly 1; Search report includes request and results under the declared keys; Library package includes library exactly Semantic Search Library plus documents and savedSearches arrays whose objects match the DocumentUpsert and SavedSearch field contracts"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.6"
name = "rapid_interaction_stays_synced"
description = "Rapid interleaved interaction — quick threshold drags, fast feedback clicks, palette open/close, view switches during a re-index run — leaves all views consistent with each other, with no desynced counts or stale panels"
type = "binary"
weight = 1.0

