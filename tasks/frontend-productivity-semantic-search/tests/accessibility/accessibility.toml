[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — search input, threshold slider, chips, feedback controls, disclosures, palette entries, history checkboxes, bulk action bar, and run controls — is reachable and operable with Tab, Shift+Tab, Enter, Space, or arrow keys"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlays_manage_focus"
description = "The command palette, export modal, save-search form, and confirmation dialogs trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls (thumbs, close buttons, bulk checkboxes, status icons) carry accessible names or labels; decorative icons are hidden from the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "run_and_count_changes_announced"
description = "Completion of a re-index run, a step entering the failed state, and result-count changes from threshold or filter changes are announced through aria-live regions as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "The Save search and Add document form fields have visible labels, and validation messages are programmatically associated with their fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Panel and section headings follow a logical order with no skips (H1 for the app, H2 for panels, H3 within)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Landmark structure (main, navigation/complementary regions for the rail and panel) or a skip-to-content path is present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "All text — including score badges, highlighted excerpts, chips, and status treatments — meets sufficient color contrast against its background"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Interactive and structural elements use semantic roles — real buttons for actions, a slider role with value semantics for the threshold, list semantics for results and history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, staggered entrances, panel slides, re-rank movement, and countdown animations are removed while all functionality remains"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Some specified control (a chip's remove affordance, a feedback thumb, a palette entry, a run control) cannot be reached or activated via keyboard"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or visually obscured on cards, chips, or form controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom components (cards, chips, disclosure headers, palette rows) use non-semantic tags and lack ARIA roles or labels"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Pass/fail of a step, stale state, or overlap/unique marking is conveyed by color alone with no icon, text, or pattern"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "The palette, export modal, or a confirmation dialog lets Tab move focus into the background content while open"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Text somewhere in the app (highlight spans, warning treatments, badge values) is unreadable due to poor contrast"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Validation errors or run failures are conveyed visually only, with nothing exposed to assistive technology"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Meaningful icon or image content lacks an accessible name or alt text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings skip levels or are unordered (for example jumping from H1 to H4)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Animations continue unchanged when prefers-reduced-motion is set"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
