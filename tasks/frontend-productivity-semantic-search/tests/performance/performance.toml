[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to an interactive search input is under 2 seconds on local render"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or while exercising search, palette, feedback, bulk operations, and a re-index run"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "search_and_palette_feel_instant"
description = "Query results, palette fuzzy matches, and threshold filtering land within roughly 100 milliseconds of input with no perceptible lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "simulated_work_has_progress_indicators"
description = "The simulated re-index shows continuous progress (step statuses, M/N status bar) rather than a frozen or blank interface"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_corpus_renders_without_lag"
description = "A broad query matching most of the 120-plus-document corpus renders and scrolls its full result list smoothly without perceived lag or dropped frames"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_run"
description = "The UI remains fully interactive while a re-index run advances — searching, opening panels, and switching sections all work mid-run"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Staggered entrances, re-rank slides, and panel transitions hold a smooth frame rate with no visible stutter"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated input — fast palette typing, rapid slider drags, quick feedback clicks, fast section switches — never hangs or drops interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session with multiple searches, runs, and undo cycles shows no memory runaway or progressive slowdown"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the search input is usable on a local cold load"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings appear in the console during the exercised flows"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Panel, palette, or re-rank transitions visibly block input or lag behind the interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n4"
name = "simulated_work_hangs_ui"
description = "The simulated re-index freezes the interface or blocks interaction while it advances"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Broad queries over the full corpus visibly kill the frame rate while scrolling or filtering"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive while entrance or re-rank animations play"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n7"
name = "loading_state_is_blank"
description = "A blank region is displayed with no affordance while results, the palette, or the run panel prepare their content"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "9.n8"
name = "rapid_or_edge_use_crashes"
description = "The app crashes or becomes unusable under rapid or edge-case use"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
