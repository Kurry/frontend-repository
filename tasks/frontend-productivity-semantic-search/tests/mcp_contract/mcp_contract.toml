[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, entity_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_search_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse search/filter/sort, entity operations on documents, session re-index controls, and artifact export/copy drive the same result list, document detail, index panel, and export report the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/search/apply_filter/clear_filter/sort over destinations results, document-detail, history, saved-searches, compare, index-panel, and export-report with filters tag, type, before, similarity-threshold, group-by-topic, timeline-status and sort similarity-desc; entity create/select/update/delete/toggle on document (fields title, body, type, tags, feedback, saved-search-name, history-selection, compare-selection); session start/pause/resume plus the reindex-run demo; artifact export/copy of search-report-json — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_with_visible_postconditions"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed, and an invoked browse search renders cards sorted by descending score with a matching result count and chips for tag:/type:/before: tokens above the results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "document_entity_operations_work"
description = "Declared entity operations on document all work: create raises the stale count and the document appears in search results only after the re-index run completes; update and toggle (feedback up/down/none) change the visible card and its feedback marker; delete requires confirm=true."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "reindex_session_controls_are_bound"
description = "Session operations are bound to the real re-index run: start begins it, pause freezes at the current document, resume continues there, and the rollup and event timeline track the same steps, with the stale count returning to zero on completion."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "filters_and_threshold_match_declared_spec"
description = "Query filters match the allowed specification: the similarity threshold applies only in 0.05 increments across 0.0-1.0, removing a filter chip re-runs the query without it, and the compare destination marks overlap and unique documents with counts consistent with both result sets."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no arbitrary URL, selector, or undeclared route, feedback stays inside {up, down, none}, and the only export format is search-report-json whose request and results match the on-screen state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, entity, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: Cmd+K palette mechanics, arrow-key result selection, card animate-in and feedback re-rank movement, and the detail panel slide are left to real UI interaction, and no tool returns Copy-report clipboard contents."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "search_tools_missing_or_noop"
description = "WebMCP tooling for search, document CRUD, re-index, or export is unbound, missing, or a no-op that reports success while the result list, index panel, or export report stays unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_search_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked feedback toggle changes tool output while the card's position, score, and feedback marker stay stale, or a created document never raises the visible stale count."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_destinations_or_setters_exposed"
description = "Undeclared capabilities are exposed, such as destinations beyond the seven declared ones, a generic state setter or arbitrary patch object, or extra export formats beyond search-report-json."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "search_bounds_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — a similarity threshold off the 0.05 grid or outside 0.0-1.0, a document without title or body, a duplicate or empty saved-search name, or a delete/bulk delete without confirm=true — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared browse, entity, session, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (browse-query-v1, entity-collection-v1, command-session-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the search, document, and index state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — synthesizing the feedback re-rank slide movement, replaying undo/redo, or returning clipboard contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
