[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, entity_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_search_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse search/filter/sort, entity operations on documents, session re-index controls, and artifact export/copy drive the same result list, document detail, index panel, and export report the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/search/apply_filter/clear_filter/sort over destinations results, document-detail, history, saved-searches, compare, index-panel, and export-report with filters tag, type, before, similarity-threshold, group-by-topic, timeline-status and sort similarity-desc; entity create/select/update/delete/toggle on document (fields title, body, type, tags, feedback, saved-search-name, history-selection, compare-selection); session start/pause/resume plus the reindex-run demo; artifact export/copy of search-report-json — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_with_visible_postconditions"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed, and an invoked browse search renders cards sorted by descending score with a matching result count and chips for tag:/type:/before: tokens above the results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "document_entity_operations_work"
description = "Declared entity operations on document all work: create raises the stale count and the document appears in search results only after the re-index run completes; update and toggle (feedback up/down/none) change the visible card and its feedback marker; delete requires confirm=true."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "reindex_session_controls_are_bound"
description = "Session operations are bound to the real re-index run: start begins it, pause freezes at the current document, resume continues there, and the rollup and event timeline track the same steps, with the stale count returning to zero on completion."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "filters_and_threshold_match_declared_spec"
description = "Query filters match the allowed specification: the similarity threshold applies only in 0.05 increments across 0.0-1.0, removing a filter chip re-runs the query without it, and the compare destination marks overlap and unique documents with counts consistent with both result sets."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no arbitrary URL, selector, or undeclared route, feedback stays inside {up, down, none}, and the only export format is search-report-json whose request and results match the on-screen state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, entity, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: Cmd+K palette mechanics, arrow-key result selection, card animate-in and feedback re-rank movement, and the detail panel slide are left to real UI interaction, and no tool returns Copy-report clipboard contents."
type = "binary"
weight = 1.0

