[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "8.1"
name = "staggered_result_entrance"
description = "On a new search run through the real Search control, result cards animate in staggered at roughly 40 milliseconds per card, fading and translating up from about 8 pixels below their final position rather than appearing all at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.2"
name = "detail_panel_slide"
description = "Clicking a result card slides the detail side panel in from the right over roughly 200 milliseconds, and closing it slides it out rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.3"
name = "palette_transition_without_flicker"
description = "Opening the command palette with the real keyboard shortcut shows a short opacity and scale entrance, and its match list updates without flicker or layout jumping while typing"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.4"
name = "feedback_rerank_slides"
description = "Giving thumbs-up or thumbs-down through the real control makes the affected cards slide to their new ranking positions rather than snapping, so the boost or demotion reads as movement"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.5"
name = "disclosure_chevron_and_bars"
description = "The score-explanation disclosure expands with its chevron rotating, and the per-term contribution bars grow from zero width when first revealed"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.6"
name = "countdown_ticks_and_status_fades"
description = "During a re-index run started from the real Index Now control, the retry backoff countdown ticks visibly and a completing step's status transitions with a short fade rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.7"
name = "hover_system_required"
description = "While hovering with the real pointer: buttons ease background and shadow with a slight press effect on activation, result cards, history entries, and related rows take a full-width hover wash, and form controls show focus rings — verified via computed styles while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.8"
name = "toasts_slide_and_dismiss"
description = "Toasts for saves, deletions, copies, and index completion slide in, remain readable, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.9"
name = "reduced_motion_complete"
description = "With prefers-reduced-motion set, result cards appear immediately, the panel and palette appear instantly, and re-ranking applies without movement, while every feature remains fully usable"
type = "binary"
weight = 1.0

