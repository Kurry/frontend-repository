[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "no_match_empty_state_present"
description = "A query that matches nothing even by keyword renders a designed empty state explaining that no documents matched and suggesting removing filters or lowering the threshold, with a working recovery control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline_before_submit"
description = "The Save search and Add document forms validate inline before submit under their field contracts — empty or duplicate saved-search name, empty title, body shorter than 20 characters, or type outside guide|reference|prompt|checklist|paper|note name the field, and the submit controls stay disabled until the form is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Error and notice copy is actionable: the unknown-token notice names the unmatched value, the duplicate saved-search message names the conflict, and the failed-step summary explains what failed"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Saving a search, copying a report, deleting entries, and completing a re-index each produce visible success feedback (toast or inline confirmation)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "simulated_work_shows_progress"
description = "The simulated re-index shows live progress affordances — per-step statuses, the M/N status bar, and the backoff countdown — rather than an unexplained wait"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded_and_undoable"
description = "Destructive actions are guarded and recoverable: single and bulk deletions require confirmation naming the scope, and document deletions can be reverted via Undo"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "syntax_and_shortcuts_discoverable"
description = "Non-obvious features are discoverable in-app: the search syntax (tag:, type:, before:) and the Cmd+K shortcut are surfaced through placeholder text, hints, or tooltips"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, checkboxes, and the slider use semantic interactive elements with real labels rather than bare div or span wrappers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_support_close_paths"
description = "The export modal, save-search form, and command palette close via their close control, Escape, and (for modals) a background click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "boundary_values_handled"
description = "Boundary inputs behave: threshold at exactly 0.0 shows all results and at 1.0 hides all but perfect scores, a title longer than 80 characters truncates with an ellipsis on the card and shows in full in the panel, and undo/redo at empty stacks are disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_library_package_import_rejected"
description = "Importing malformed Library package JSON, schemaVersion other than 1, library other than Semantic Search Library, or a document or saved search that fails its field contract leaves the corpus and saved list unchanged and shows a visible error naming the problem"
type = "binary"
weight = 1.0

