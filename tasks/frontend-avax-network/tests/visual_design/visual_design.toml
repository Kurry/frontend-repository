[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Calls to action and panels use custom cut-corner frames rather than plain rectangles, with large-radius rounded section containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The Avalanche red accent is used for primary calls to action, active states, and the logo against the neutral canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Display headings render in uppercase Aeonik with tight leading and an oversized Network title, while body copy uses Inter"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Both light and dark themes present coherent surfaces: a white canvas in light and a near-black canvas in dark with legible contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "On a desktop viewport the hero composes three regions (Payments Collective, animated center, clock/date and scroll cue) and Why Avalanche uses a sticky heading with full-height stacked cards"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The layout is a flat single-column stack of equal-width blocks with no cut-corner geometry, no accent color, and no display type hierarchy"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "Dark mode is missing or leaves unreadable low-contrast surfaces after the theme toggle is used"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "The CTA accent red computes rgb(255, 57, 74) on primary buttons and .text-red elements (getComputedStyle color/fill)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "3_9"
description = "At 1440x900 the oversized Why Avalanche and Network / In Action display titles compute a font-size near 145px with line-height near 116px in the aeonik family, uppercase, and section headings compute near 47.9px"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "3_10"
description = "Headings resolve to the self-hosted aeonik family and body copy resolves to Inter (computed font-family), not a generic system fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "3_11"
description = "The accent color is a wrong or generic red/blue instead of rgb(255, 57, 74), or headings fall back to a system/serif font instead of aeonik"
type = "binary"
weight = 1.0
negate = true
