[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, / returns 200 and renders all homepage sections in order: navigation, hero, Why Avalanche, quick links, trusted marquee, Developer Hub, Network, News, Solutions, Community, events/support, Newsletter, Contact, and footer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the hero shows the Payments Collective card, the brand statement, a live local time and full date, and the four Why Avalanche cards read Fast. Powerful. Secure., Infinitely Scalable by Design, Customizable Layer 1s, and Global Community"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the Network section shows the transaction total 60,932,291 with a Live Stats badge and Latest blocks and Latest transactions tables of seven rows each"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "On load, the News carousel shows seven cards including Progmat is Now on Avalanche and The Avalanche Foundation Opens Up To $50,000 In Research Grants On Avalanche Network Economics"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When the theme toggle is clicked, the document root gains or loses its dark state and every surface, text, and accent recolors without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After clicking Next in the newsletter form, the step counter advances (1 of 5 to 2 of 5) and the progress bar grows; clicking Back returns to the prior step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After completing the five newsletter steps and submitting, the message Thank you for subscribing appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After submitting the contact form with valid first name, last name, email, project type, and message, the message Success! We'll be in touch. appears and the form clears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "When the contact form is submitted with required fields empty, native validation blocks it and no success message appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When project type Other is selected in the contact form, a conditional detail input is revealed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "On a viewport 1024px or narrower, the navigation is a hamburger drawer, Lenis smooth scrolling is off, and tapping the hamburger opens the overlay drawer and sets aria-expanded to true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When a lower section such as Network or Contact scrolls into view, it reveals with its heading character flash and line reveals rather than appearing pre-shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When the blog carousel is scrolled past and the viewport returns above it, the carousel resets to its first slide; the community feed stays empty with disabled previous/next arrows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "On hover, navigation labels and mega-menu link rows take an accent/wash change, buttons ease their frame, and the trusted-logo and footer wordmark marquees pause"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "The homepage renders every section in order: navigation, hero, Why Avalanche, quick links, trusted marquee, Developer Hub, Network, News, Solutions, Community, events/support, Newsletter, Contact, and footer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The four Why Avalanche cards read Fast. Powerful. Secure., Infinitely Scalable by Design, Customizable Layer 1s, and Global Community, numbered 01 to 04"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "The Network section shows the transaction total 60,932,291 with a Live Stats badge and Latest blocks and Latest transactions tables of seven rows each"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "The News carousel shows all seven titled cards, including Avalanche Payments Collective: How a Payments Ecosystem Took Shape on Avalanche and Progmat is Now on Avalanche"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The Solutions section shows six cards for Institutions and Capital Markets, Gaming, Enterprise and Consumer Apps, DeFi, NFTs, Arts, and Culture, and Infrastructure and Tooling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Clicking Next in the newsletter form advances the step counter from 1 of 5 to 2 of 5 and clicking Back returns a step, without blocking on per-step validity"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Submitting the completed five-step newsletter form shows Thank you for subscribing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Submitting the contact form with valid first name, last name, email, project type, and message shows Success! We'll be in touch. and clears the form"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Selecting project type Other in the contact form reveals a conditional detail input"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "1_24"
description = "The Events section shows an Avalanche Summit New York card dated Sep 16-17, 2026 and the support cards Questions about Avalanche?, Avalanche Team1, and The Community Hub"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "1_25"
description = "Submitting the contact form with required fields empty is blocked by validation and shows no success message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Any homepage section from the required order is missing, empty, or renders placeholder text instead of the seeded copy"
type = "binary"
weight = 1.0
