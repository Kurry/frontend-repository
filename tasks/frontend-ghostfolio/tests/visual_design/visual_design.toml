[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The dashboard gives primary visual emphasis to the net-worth figure and the holdings table over brand chrome and secondary metadata."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The Add holding control is visually grouped with the holdings list and form it affects."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Holdings rows align name, symbol, class, quantity, and value consistently across the table, with quantity and value rendered as tabular numerals."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "At 375 by 667 pixels the summary, allocation, and holdings reflow without clipped text or overlapping controls."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "The app uses a single accent hue on a neutral base, with destructive and error states reserved to a distinct red family applied consistently."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "Every form input carries a persistent, visible label distinct from its placeholder text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "3_7"
description = "Primary body text meets at least 4.5:1 contrast and interactive-control boundaries meet at least 3:1 contrast against their background."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "UI microcopy is concise and scannable, uses sentence case, and labels action buttons with a leading verb (Add holding, Save holding, Delete holding)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "The document has a lang attribute and a descriptive, non-scaffold page title."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "3_10"
description = "The UI does not read as generic starter or placeholder content and does not use a scaffold title such as Vite App or React App."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "3_11"
description = "The layout uses more than one distinguishable type role and no background/text or accent pairing renders as gray-on-gray or otherwise illegible."
type = "binary"
weight = 0.5
negate = true
optional = true
