[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "technique_switch_crossfade"
description = "Clicking a different technique in the sidebar with the real pointer cross-fades the form panel over roughly 150 milliseconds rather than swapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "dynamic_row_height_animation"
description = "Driven through the real Add and Remove controls (never a state-shortcut tool call): adding or removing an example, reasoning step, or constraint row animates the row's height over roughly 150 milliseconds rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "inline_error_easing"
description = "Triggering a validation error through a real submit attempt eases the inline message in below its field rather than snapping, and fixing the field clears it smoothly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.4"
name = "status_chip_transition"
description = "A sidebar status chip changing value (for example In progress to Generated after a real submit) animates its transition rather than swapping instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.5"
name = "modal_and_toast_motion"
description = "The save modal enters and exits with a short opacity and scale transition, and toasts slide in, remain readable long enough to scan, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "copy_and_library_microinteractions"
description = "The copy control's confirmation animates (icon swap or check morph), and library rows animate in on save and out on delete rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hover_system_present"
description = "Sidebar entries and library rows take a full-width hover wash, buttons ease background and shadow with a slight press effect, and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, all transitions apply instantly and every flow (technique switch, row add/remove, save, delete) remains fully usable"
type = "binary"
weight = 1.0

