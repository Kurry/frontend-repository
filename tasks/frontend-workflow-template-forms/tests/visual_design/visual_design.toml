[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "sidebar_form_preview_layout"
description = "At 1440px width a fixed-width left sidebar of roughly 200 pixels carries the technique list, and the main panel shows the active form above a preview panel below, as distinct visual regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "grouped_vertical_forms"
description = "Forms use a vertical layout with visibly grouped sections, selects and multi-line inputs share one styled treatment, and multi-line inputs show a character count"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "preview_monospace_container"
description = "The preview renders as a code-styled multi-line container in a monospace typeface with the copy control anchored to it, visually distinct from the editable form above"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "active_state_and_chip_colors"
description = "The active technique entry shows a selected background and left accent bar, and the lifecycle status chips use one consistent color language (neutral, in-progress, generated, saved) across all seven entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "component_states_and_icons"
description = "Buttons, inputs, selects, and chips show distinct default, hover, focus (visible ring), disabled, and error treatments, inline errors render in a consistent error color with their fields, and one icon set is used consistently across sidebar, forms, badges, and library rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "typographic_hierarchy"
description = "The technique title is visibly larger than section headings, which are larger than field labels and helper text, consistently across all seven forms and the library view, with a regular spacing rhythm between sections"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.7"
name = "responsive_narrow_layout"
description = "Below 768px width the sidebar collapses into a top select or drawer control that still reaches all seven techniques with form and preview stacked in one column, and at 375px width no content clips, dynamic rows and badges wrap, and no page-level horizontal scrollbar appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "default_browser_styling_or_overlap"
description = "Prominent controls (selects, text areas, modal fields, buttons) render with unstyled browser-default appearance, or form labels, badges, or preview text overlap or clip their containers at 1440px width"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
