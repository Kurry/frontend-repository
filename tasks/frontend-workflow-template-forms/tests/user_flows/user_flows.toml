[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "generate_and_save_few_shot_end_to_end"
description = "Generate and save: open Few-Shot, enter a task description and two example rows, attach one reference document, submit, confirm the preview contains the task and both examples, save from the modal with a valid title; library count increases by one and the Few-Shot sidebar chip reads Saved — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_technique_submit_inline_validation"
description = "Validation flow: on Chain-of-Thought, attempt to submit with the goal empty; an inline error names the goal field, no preview is generated, and submit stays disabled until the goal is valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "draft_retention_across_technique_switch"
description = "Draft retention: start filling Zero-Shot, switch to Role-Based, fill part of it, switch back; Zero-Shot still holds its entered values and its chip reads In progress."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_library_entry_updates_count"
description = "Delete flow: deleting a library entry removes its row and decreases the visible library count by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "library_to_form_round_trip"
description = "Round trip: open a seeded library entry; the matching technique form loads with saved values restored and preview populated; change one field, resubmit, and the preview reflects the change without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_library_shows_designed_empty_state"
description = "Edge: after deleting all library entries (beyond seed if required by the empty-state path), the Library view shows a designed empty state naming what belongs there rather than a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "technique_sidebar_status_chips_track_lifecycle"
description = "Technique sidebar: chips track lifecycle (neutral → In progress → Generated → Saved) as the user edits, submits, and saves; the active technique shows selected background and left accent."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "forms_library_switch_preserves_drafts"
description = "View switch: switching Forms ↔ Library without reload preserves in-progress form drafts and restores the prior technique selection when returning."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "save_export_and_attachment_overlays"
description = "Overlays: Save to Library confirmation, reference-document picker, and Export library panel support their flows and dismiss without trapping the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "export_import_recover_without_reload"
description = "Recovery: after save then Export library, delete, and Import of the prior JSON, the library reconstructs; a rejected import shows a visible error and changes nothing — no reload required."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_library_after_save_flow"
description = "Export library flow: save a valid Few-Shot prompt, open Export library, confirm template-library.json includes that title and technique and promptText matches the preview; Download or Copy succeed; after deleting the entry the next export omits it."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_library_round_trip_flow"
description = "Import round-trip: export JSON after a save, note entries length, delete to diverge, Import that JSON, and confirm the library and a fresh export reconstruct to match."
type = "binary"
weight = 1.0

