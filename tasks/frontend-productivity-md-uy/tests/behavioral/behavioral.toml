[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_round_trip"
description = "Multi-facet round-trip: edit the source, toggle theme, and save a valid profile, then reload. Source text, theme, and profile chip all survive from local client storage together — never a mix of restored and reset facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "present_slide_order_follows_source"
description = "Slide-order proof: with two three-dash delimiters creating three slides, Present shows slides in source order; editing the middle slide's heading updates only that slide's content, proving slides derive from live source rather than hardcoded decks."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "package_preview_tracks_source_edits"
description = "Derived-view sensitivity: type a distinctive line into the source and confirm the Document package preview markdown field changes to include that line rather than staying identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "source_preview_package_cross_echo"
description = "Cross-view echo: edit the source in Edit mode and confirm Preview HTML and the Document package markdown field both show the same new text without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "slide_count_delta_is_exact"
description = "Count-delta integrity: measure M in Slide N of M immediately before and after appending one three-dash delimiter plus a heading; M increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_profiles_change_package"
description = "Input-dependent output: save two different valid displayName values in sequence and confirm the profile chip and Document package profile.displayName each reflect the latest name, not the earlier one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_edit_and_profile_preserve_state"
description = "Interleaved-flow integrity: start a source edit, open the profile dialog and save a valid name, return to Edit and finish another source edit; neither flow corrupts the other's committed text or profile."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_package_round_trip"
description = "Edge-state round-trip: clear the document to empty placeholders and empty package markdown, then type new content; Preview and Document package markdown track through both transitions, and required package keys remain present while empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, source text, theme, or profile silently reverts while others survive, producing incoherent partial persistence."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "package_ignores_source_edits"
description = "The Document package markdown field renders identically regardless of source edits."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_profiles_produce_identical_package"
description = "Saving two different valid displayName values leaves Document package profile.displayName byte-identical."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "preview_or_package_stale_after_edit"
description = "Source edits appear in Edit mode but Preview or Document package stay stale until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
