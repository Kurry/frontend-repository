[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "chrome_hover_ease_and_focus_ring"
description = "Interactive chrome (mode buttons, copy, download, share, theme, new-document, dialog buttons) eases its background, border, or text color on hover and shows a visible focus ring, exercised through the real controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "theme_toggle_recolor_icon_swap"
description = "Clicking the theme toggle recolors the workspace surfaces and accents and swaps the sun and moon icons"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "copy_download_check_swap"
description = "Clicking Copy or Download through the real control briefly swaps the control's icon to a green confirmation check for about 0.8 seconds and then reverts, and the preview updates live as the source changes with no manual refresh"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "sync_badge_and_dialog_backdrop"
description = "While live sync is on, the Share button carries a small pinging dot badge, and the share and profile dialogs open centered over a dimmed backdrop"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "hover_feedback_missing"
description = "Interactive chrome shows no hover feedback — buttons and mode tabs do not change on hover when actually hovered"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "animation_only_via_shortcut"
description = "The theme, mode, or confirmation feedback only appears when state is set through a shortcut and shows no transition when the real control is clicked"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.7"
name = "mode_switch_pane_transition"
description = "Clicking between Edit, Preview, and Present through the real mode buttons animates the incoming pane with a brief fade or slide of roughly 150 to 250 milliseconds while the top bar and toolbar stay fixed in place, rather than the pane snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "dialog_open_close_transition"
description = "Opening the share or profile dialog through its real control plays a short opacity and scale transition over the dimming backdrop, and closing the dialog exits with a transition the same way rather than vanishing in a single frame"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "slide_navigation_transition"
description = "In Present mode, moving between slides via the Previous and Next buttons and via arrow keys plays a visible transition between slides through the real controls"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "reduced_motion_removes_transitions"
description = "With prefers-reduced-motion enabled and the page freshly loaded, pane and dialog transitions are removed and state changes apply instantly, while every feature (mode switch, dialogs, theme, copy, download) stays reachable and functional"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (control, action, observed frames or computed styles) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
