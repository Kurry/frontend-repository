[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "reload_restores_saved_revision"
description = "Reloading the page after editing restores the last saved revision from local client storage: the source pane reopens with the edited text and the preview renders that same edited text"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "room_id_resolves_after_reload"
description = "After reloading, the room id in the URL path and breadcrumb is unchanged and still resolves to the restored document"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "panes_share_one_document"
description = "Editing the source updates the preview from the same shared document, so the two panes never diverge into disconnected copies of the text"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "root_loads_interactive_workspace"
description = "The editor root loads as an interactive Markdown workspace with no blank page, fatal error overlay, or generic starter content"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "clean_console_and_requests"
description = "Editing the source and switching modes completes with no uncaught exception, unhandled rejection, or console error, and required same-origin requests avoid 4xx and 5xx responses (excluding a favicon probe)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "descriptive_title_and_lang"
description = "The document has a descriptive, non-generic title and the root html element carries a valid lang attribute"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.7"
name = "accessible_names_and_roles"
description = "Interactive controls (mode buttons, copy, download, share, import, theme, profile, join inputs) expose non-empty accessible names and correct roles in the accessibility tree"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.13"
name = "keyboard_operable_with_focus_ring"
description = "Every interactive control — including the Edit / Preview / Present mode group, copy, download, share, theme, profile, and the dialogs' controls — is reachable and operable with the keyboard alone, showing a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "dialogs_modal_focus_managed"
description = "The share and profile dialogs expose role dialog with aria-modal true, trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "confirmation_live_region"
description = "The copy and download confirmations are exposed to assistive technology through a polite live region (visible in the accessibility tree or via aria-live markup) in addition to their visual state"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.16"
name = "readable_contrast_both_themes"
description = "Text and controls keep readable contrast against their surfaces in both the light and dark themes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.17"
name = "interactive_within_two_seconds"
description = "On a local cold load the app becomes interactive within 2 seconds — the editor accepts typing and the mode controls respond"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.18"
name = "hydration_clean_console"
description = "The console is hydration-clean: no hydration mismatch errors or warnings on first load of the room route, and no console warnings appear during a full exercise of the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "preview_keeps_up_with_typing"
description = "During continuous typing in the source pane the preview keeps up without visible lag or dropped characters"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.21"
name = "deep_link_renders_full_shell"
description = "Loading the room's URL path directly in a fresh tab renders the complete workspace shell and state baseline with no 404, half-rendered shell, or missing chrome compared to in-app navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "document_package_field_contract_enforced"
description = "Profile, join, and Import package enforce the Document package field contracts in the UI: invalid displayName or non-#RRGGBB color are rejected with inline feedback naming the field; invalid roomId is rejected naming roomId; Import of JSON that fails required keys or closed enums (schemaVersion mduy-document-v1, roomId 10/20 A-Z, theme light|dark, profile bounds) is rejected with feedback naming the offending field and does not mutate source, theme, or profile"
type = "binary"
weight = 1.0

