[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_document_muted_placeholders"
description = "After selecting all source text and deleting it, the source pane and the preview each show a muted placeholder instead of stale content, and the Document package preview's markdown field is the empty string while other required keys remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "profile_and_join_validate_inline"
description = "The profile dialog and the join-room field show inline per-field validation before commit: empty/over-long displayName, non-#RRGGBB color, and invalid roomId each name the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_errors_name_fields"
description = "Profile, join, and Import package validation errors name the offending field or rule (displayName, color, roomId, schemaVersion, theme) rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_download_show_confirmation"
description = "Copy, Download Markdown, Copy package, and Download package each show a brief visible confirmation after a successful action."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "present_bounds_without_delimiter"
description = "In Present mode with no three-dash delimiter, the counter reads Slide 1 of 1, Previous and Next are disabled, and arrow keys change nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_restores_source_edit"
description = "After an edit in the source pane, the platform undo shortcut restores the prior source text and the preview follows; undo at the empty-history boundary does not corrupt the document."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "share_and_profile_dialog_titles"
description = "Share and profile dialogs expose clear titles (Share, Edit profile) and field labels so the join, profile, and import controls are identifiable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Mode buttons, Copy, Download, Share, Import, theme, profile, and join controls use semantic button/input tags with accessible names."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "dialogs_support_close_paths"
description = "Share and profile dialogs close via Escape and backdrop/close controls and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "schema_invalid_import_rejected"
description = "Importing malformed Document package JSON, or parseable JSON that fails the field contract (wrong schemaVersion, invalid roomId, theme outside light|dark, missing markdown or profile, empty/over-long displayName, or color not #RRGGBB), leaves source, theme, and profile unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_document_keeps_stale_preview"
description = "Clearing the source leaves a stale preview or Document package markdown that still shows the prior revision."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Profile, join, or Import package validation failures are surfaced only in the browser console with no inline UI feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Copy, Download Markdown, Copy package, or Download package succeed or fail with no visible confirmation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "schema_invalid_import_mutates_state"
description = "Import accepts a parseable JSON document that violates the Document package field contract and still mutates source, theme, or profile."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Mode, copy, download, share, import, or profile controls are non-semantic div or span click targets without button/input roles."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Share or profile dialog overlays cannot be dismissed via Escape."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Profile, join, or Import package validation feedback is missing or delayed with no UI indication naming the field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Copy, Download, Share, Import, or mode controls have ambiguous or missing labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "fake_connected_peer_on_empty_sync"
description = "With live sync on and no peer present, the connection indicator claims a connected user count greater than zero."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "invalid_join_still_navigates"
description = "Submitting an invalid roomId in the join field navigates away or changes the room without naming the roomId field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
