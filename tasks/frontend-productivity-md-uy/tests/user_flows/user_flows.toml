[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "edit_echo_reload_flow"
description = "In Edit mode, type a distinctive new line into the source, switch to Preview and see that line rendered as HTML while the breadcrumb room id stays unchanged; reload restores the same room with source and preview showing the edited text."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_profile_or_join_inline_validation"
description = "Submitting the profile dialog with empty/over-long displayName or non-#RRGGBB color, or submitting an invalid roomId in the join field, shows immediate inline validation naming the offending field and commits nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "source_edit_updates_preview_and_package"
description = "Editing the source updates Preview HTML and the Document package preview markdown field without a reload, while roomId and schemaVersion stay present."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "clear_source_shows_empty_placeholders"
description = "Selecting all source text and deleting it leaves muted placeholders in source and preview and an empty markdown string in the Document package preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "mode_switch_retains_source_and_profile"
description = "Switching through Edit, Preview, and Present keeps the same source text, room id, and profile chip without a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "slide_count_delta_flow"
description = "Appending a three-dash delimiter plus a new heading in Edit, then switching to Present, increases M in Slide N of M by exactly one; Next to the last slide shows the new heading and disables Next."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "artifact_export_import_round_trip"
description = "After a distinctive source edit and a valid profile save, Download Markdown and the Document package preview contain those values with schemaVersion mduy-document-v1; Download package then Import package reconstructs the same source, theme, and profile chip."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "theme_toggle_echoes_package"
description = "Toggling light/dark recolors the workspace and updates the Document package preview theme field to match without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "share_and_profile_overlays_flow"
description = "Share and profile dialogs open, accept interaction (sync toggle or valid profile save), and close without trapping the workspace; profile save updates the chip."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "deep_link_parity_without_dead_end"
description = "Opening the room URL path in a fresh tab renders the same workspace as in-app navigation; invalid join attempts stay on the current room with named validation rather than a dead end requiring reload."
type = "binary"
weight = 1.0

