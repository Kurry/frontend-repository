[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "opens_into_markdown_workspace"
description = "On load, the app opens directly (no auth wall) into a Markdown editing workspace with a source pane, a rendered preview control, a visible room id, and share controls — recognizably a peer-to-peer collaborative Markdown editor, not a generic scaffold or unrelated dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_document_renders_in_preview"
description = "On first load the source pane shows a seeded starter document containing a top-level heading, a subheading, a bullet list, an ordered list, a block quote, and a fenced code block, and switching to Preview renders all of those elements as HTML (heading levels, list markers, quote styling, code block)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "typing_inserts_at_cursor"
description = "After clicking into the source pane and typing text, the source pane immediately shows the newly entered text at the edit location"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "preview_shows_latest_edit"
description = "After editing the source and switching to Preview, the preview shows the latest edit rendered as HTML rather than the prior revision"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "successive_edits_no_stale_duplicate"
description = "After two successive edits, the preview reflects both edits once each and does not keep a stale duplicate of an earlier rendering"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "reload_restores_edited_text"
description = "After editing and reloading the page, the source pane reopens with the edited text and the preview renders that same edited text (local persistence restores the last saved revision)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "room_id_stable_across_reload"
description = "After reloading, the room id in the breadcrumb and the URL path is unchanged and still associated with the restored document"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "mode_control_swaps_pane"
description = "When the Edit / Preview / Present mode control is used, the main pane swaps between the source editor, the rendered preview, and the slideshow without a full page reload, only one pane is shown at a time, and the active mode is visually marked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "present_slide_counter_and_bounds"
description = "When Present mode is opened on content that contains a line of three dashes, it shows a Slide N of M counter with Previous and Next buttons that are disabled at the first and last slide"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "copy_and_download_with_confirmation"
description = "When the Copy control is clicked it copies the Markdown source and briefly shows a confirmation; when Download is clicked it saves a document.md file and briefly shows a confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "share_dialog_tabs_and_sync_indicator"
description = "Clicking the Share control opens a dialog titled Share with a Live sync tab and a Static tab; toggling live sync on flips a visible sync indicator on the Share button and reveals the room's shareable URL in a read-only field with a copy button, the Static tab generates a static import link, and the connection indicator honestly reads that zero users are connected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "theme_toggle_recolors_workspace"
description = "When the theme toggle is clicked, the whole workspace recolors between light and dark and the sun/moon icon swaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "profile_dialog_updates_chip"
description = "When the profile control is clicked, a dialog opens to set a display name and a color, and saving a valid profile updates the profile chip to show the chosen name and a dot in the chosen color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "room_id_format_matches_url"
description = "A room identifier is shown in the breadcrumb (brand md.uy, slash, monospace id) and matches the id in the URL path; it is a 10 or 20 character uppercase A-Z string and stays associated with the document across edits and mode switches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "source_pane_read_only_block"
description = "Typing into the source pane produces no change — the pane behaves as a static or read-only block instead of a live text editor"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "preview_frozen_after_edit"
description = "The preview stays frozen on the prior revision, or fails to update, after the source is edited"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "fake_connected_peer_claimed"
description = "The Share or connection UI claims a connected collaborator or live peer that does not actually exist (a fabricated participant count or fake presence), rather than honestly reporting that no users are connected"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "chrome_control_navigates_outbound"
description = "An in-app chrome control performs an outbound navigation that leaves the app or loads the document or app shell from another origin"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "undo_shortcut_restores_source"
description = "After making an edit in the source pane, pressing the platform undo shortcut restores the source text to its state before that edit, and the preview follows the restored text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "present_arrow_keys_navigate_slides"
description = "In Present mode with multiple slides, pressing the right and left arrow keys moves to the next and previous slide, matching the Previous and Next buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "profile_empty_name_inline_validation"
description = "Leaving the display name empty in the profile dialog shows an inline message naming the display name field before submit and keeps the save control disabled; attempting to submit with an empty name saves nothing — the chip keeps its previous name and color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "edit_echo_reload_flow"
description = "Scripted flow: in Edit mode, type a distinctive new line into the source pane, switch to Preview and see that exact line rendered as HTML while the breadcrumb room id stays unchanged; then reload the page and confirm the same room reopens with both the source pane and the preview showing the edited text and the room id unchanged in both the URL and the breadcrumb"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "slide_count_delta_flow"
description = "Scripted flow: in Edit mode, append a line of only three dashes plus one new heading line to the source; switching to Present shows the M in the Slide N of M counter increased by exactly one, pressing Next until the last slide shows the new heading with the Next button disabled, and switching back to Edit shows the same source including the added delimiter and heading"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "profile_echo_across_modes_flow"
description = "Scripted flow: save a display name and color in the profile dialog and see the chip's name and colored dot update immediately without a reload; reopening the dialog shows the saved values pre-filled, and the chip keeps the same name and color while switching through Edit, Preview, and Present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "deep_link_parity_flow"
description = "Scripted flow: opening the room's URL path directly in a fresh tab renders the same document workspace as reaching it through in-app controls — the same room id in the breadcrumb, the same source text in the editor, and the same rendered preview content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "empty_document_muted_placeholders"
description = "After selecting all source text and deleting it, the source pane and the preview each show a muted placeholder instead of stale content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "no_delimiter_single_slide"
description = "In Present mode with no three-dash delimiter in the source, the counter reads Slide 1 of 1, both Previous and Next are disabled, and pressing arrow keys changes nothing"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.39"
name = "double_copy_single_confirmation"
description = "Activating the Copy control twice in quick succession shows a single confirmation state rather than stacked or repeated confirmations"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.40"
name = "long_line_wraps_without_page_scroll"
description = "A very long unbroken line typed into the source wraps within the source pane and renders in the preview without causing horizontal page scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "A specified core behavior of the app is broken or missing in a way that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user of this Markdown editor, not a nitpick. If present, name the defect and cite the concrete browser evidence (element, action, resulting state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
