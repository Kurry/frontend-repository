[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens directly (no auth wall) into a Markdown editing workspace with a source pane, a rendered preview control, a visible room id, and share controls — recognizably a peer-to-peer collaborative Markdown editor"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the source pane is non-empty: it shows a seeded starter document containing a top-level heading, a subheading, a bullet list, an ordered list, a block quote, and a fenced code block"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the top-bar breadcrumb shows md.uy, a slash divider, and a monospace room id, and the same id appears in the browser URL path"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After clicking into the source pane and typing text, the source pane immediately shows the newly entered text at the edit location"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After editing the source and switching to Preview, the preview shows the latest edit rendered as HTML rather than the prior revision"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After two successive edits, the preview reflects both edits once each and does not keep a stale duplicate of an earlier rendering"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After editing and reloading the page, the source pane reopens with the edited text and the preview renders that same edited text (local persistence restores the last saved revision)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After reloading, the room id in the breadcrumb and the URL path is unchanged and still associated with the restored document"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "When the Edit / Preview / Present mode control is used, the main pane swaps between the source editor, the rendered preview, and the slideshow without a full page reload, and the active mode is visually marked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When Present mode is opened on content that contains a line of three dashes, it shows a Slide N of M counter with Previous and Next buttons that are disabled at the first and last slide"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When the Copy control is clicked it copies the Markdown source and briefly shows a confirmation; when Download is clicked it saves a document.md file"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When the Share control is clicked, a dialog titled Share opens with Live sync and Static tabs; toggling live sync flips a visible sync indicator on the Share button and reveals the room's shareable URL in a read-only field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When the theme toggle is clicked, the whole workspace recolors between light and dark and the sun/moon icon swaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When the profile chip is clicked, a dialog opens to set a display name and color, and the chip updates to the chosen name and color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "The app opens without an authentication wall into a workspace that is recognizably a peer-to-peer collaborative Markdown editor — a source pane, a rendered preview, a visible room id, and share controls are all present — not a generic scaffold or unrelated dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Clicking into the source pane and typing inserts the typed characters at the cursor, and the source pane immediately shows the newly entered text at that edit location"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "After editing the Markdown source and viewing the preview, the preview shows the latest edit rendered as HTML rather than the prior revision"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Making two successive edits and viewing the preview shows both edits reflected once each, with no stale duplicate of an earlier rendering kept alongside the new one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "On first load the source pane is non-empty with a seeded starter document containing a top-level heading, a subheading, a bullet list, an ordered list, a block quote, and a fenced code block, all of which render in the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "A room identifier is shown in the breadcrumb (brand md.uy, slash, monospace id) and matches the id in the URL path; it is a 10 or 20 character uppercase A-Z string and stays associated with the document across edits and mode switches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "The Edit / Preview / Present control swaps the main pane between the source editor, the rendered preview, and the slideshow without a full page reload, and the active mode is visually marked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Present mode splits the source on lines of three dashes into slides and shows a Slide N of M counter with Previous and Next buttons that are disabled at the first and last slide"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "The Copy control copies the current Markdown source with a brief confirmation, and the Download control saves the source as a document.md file"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "1_24"
description = "The Share control opens a dialog titled Share with Live sync and Static tabs; toggling live sync flips a visible sync indicator on the Share button and reveals the room's shareable URL in a read-only field with a copy button"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "1_25"
description = "A profile control opens a dialog to set a display name and color, and the profile chip updates to the chosen name and color"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "The source pane is a live editor whose typed text appears; it is not a static or read-only block where typing produces no change"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "The preview stays frozen on the prior revision, or fails to update, after the source is edited"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The Share or connection UI claims a connected collaborator or live peer that does not actually exist (a fabricated participant count or fake presence), rather than honestly reporting that no users are connected"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "An in-app chrome control performs an outbound navigation that leaves the app or loads the document or app shell from another origin"
type = "binary"
weight = 1.0
negate = true
