[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "deal_prompt_and_empty_history"
description = "Before the first hand the table shows the \"Deal first hand\" prompt rather than an empty board, and Hand history shows \"No hands played yet\""
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "raise_bounds_inline_before_confirm"
description = "Out-of-range raise amounts show inline validation naming the violated limit before confirm, and confirm stays disabled until legal"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "illegal_action_feedback_specific"
description = "Acting when it is not the human's turn or reusing stale raise input from a resolved hand is rejected with specific visible feedback rather than only a generic Invalid message"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "hand_end_announces_result"
description = "When a hand resolves by fold or showdown, the table shows a visible winner announcement rather than leaving the pot contested with no result"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_deal_starts_one_hand"
description = "Rapidly double-activating \"Deal next hand\" starts exactly one new hand, and hands-played increases by exactly one when it completes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "new_session_cancel_preserves"
description = "Cancelling the Start new session confirmation leaves table, stacks, stats, history, and badges unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "undo_disabled_states"
description = "Undo last action is unavailable before the human has acted on the current street and after the street advances; activating it when disabled does not change the pot or stacks"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_betting_controls"
description = "Betting controls, Save table, Undo last action, and Export actions use button or other semantic interactive elements rather than click-only plain text"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "session_modal_dismiss_paths"
description = "The Start new session confirmation can be dismissed via an explicit cancel control as well as completing confirm"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "malformed_import_rejected"
description = "Importing malformed session JSON or a non-feltrun-session-v1 schemaVersion shows an inline error naming the import field and leaves stacks, stats, and hand history unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "save_before_deal_restores_prompt"
description = "Save table with no prior deal still produces a restorable checkpoint that reloads to the pre-deal \"Deal first hand\" prompt rather than inventing a mid-hand board"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_history_no_feedback"
description = "An empty Hand history shows nothing and provides no \"No hands played yet\" empty-state copy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_in_console"
description = "Illegal raise or import failures surface only in the browser console with no on-page feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_silent_no_feedback"
description = "Deal, raise, rebuy, export copy, or save actions lack visible feedback and silently succeed or fail"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "new_session_no_warning"
description = "Start new session resets the table with no confirmation warning"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "controls_nonsemantic_only"
description = "Primary betting or export controls are only non-semantic div or span click targets with no button or input semantics"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "session_modal_not_dismissible"
description = "The Start new session confirmation cannot be dismissed without confirming the reset"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_missing_or_delayed"
description = "Raise-amount or import validation feedback is missing or delayed with no UI indication while confirm stays enabled"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_control_labels"
description = "Betting, export, or session controls use ambiguous or missing labels such as unlabeled icons only for Deal, Raise, Export, or Save"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "no_guidance_before_first_hand"
description = "Before the first hand there is no Deal first hand prompt or other in-app guidance on how to start"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "undo_or_save_inaccessible"
description = "Undo last action or Save table controls are visually hidden or inaccessible when the instruction requires them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
