[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "raise_to_history_to_export_chain"
description = "Raising a specific chip amount moves exactly that amount from the human stack into the pot; when the hand completes, Session stats hands-played increases by exactly one, the hand appears at the top of Hand history with pot, winner, and hand type, and the Export preview lists that same hand in handHistory with matching pot, winnerName, and handType — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "raise_invalid_inline_validation"
description = "Entering a raise amount below the legal minimum or above the human's stack shows an inline validation message naming the violated limit and keeps raise confirm disabled until the amount is legal"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "blind_level_advance_export_tracks"
description = "Completing the 8th hand of a blind level advances the blind-level indicator by exactly one level and increases both blinds; Session stats and Hand history carry over unchanged, and the export preview's session.blindLevel, smallBlind, and bigBlind match the advanced values"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "rebuy_then_reload_restores"
description = "When the human's stack reaches 0, Rebuy restores the stack to 1000 and increments rebuys by exactly 1; after a full page reload both the restored stack and incremented rebuys count remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "panel_toggles_retain_table_state"
description = "Toggling Hand history, Session stats, Badges, and Export panels does not reset chip stacks, the active hand, or the pot"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_history_before_first_hand"
description = "Before any hand is played, Hand history shows \"No hands played yet\" and the table shows the \"Deal first hand\" prompt"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "difficulty_switch_preserves_progress"
description = "Switching difficulty mid-session does not reset chip stacks, Session stats, or Hand history"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "history_drawer_preserves_workflow"
description = "On a narrow viewport, collapsing and reopening the stats/history/badges drawer leaves the table hand, stacks, and pot intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "new_session_confirm_overlay"
description = "\"Start new session\" opens a confirmation overlay; cancelling leaves every panel unchanged, and confirming resets table, stacks, stats, history, badges, and clears export handHistory to empty with inProgressHand null"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "undo_then_continue_hand"
description = "On the human's turn, raise, Undo last action to restore stack and pot, then take a different legal action — the hand advances normally without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "mid_hand_save_resume_flow"
description = "Mid-hand after the flop: Save table, note board/pot/stacks/side to act, reload — the table resumes with the same board, pot, stacks, street, and side to act"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_import_round_trip_flow"
description = "After completing at least one hand, Copy or Download the session JSON then Import that same text — visible stacks, Session stats, Hand history, badges, and difficulty match the pre-export state and the export preview matches again"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "collab_offline_merge_flow"
description = "In Collaboration scenario, queue two non-conflicting offline edits, reconnect, and apply either delivery order — Shared content converges identically without dropping either change"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_game_flows_unavailable"
description = "Deal first hand, betting controls, Export Copy/Download, Save table, or Undo last action are not reachable from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "completed_hand_missing_from_history"
description = "A completed hand fails to appear in Hand history or appears duplicated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "export_desyncs_from_panels"
description = "After a completed hand, Export preview handHistory or session stats disagree with the visible Hand history and Session stats panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "panel_toggle_resets_hand"
description = "Opening or closing Hand history, stats, badges, or Export resets the active hand, stacks, or pot"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_history_broken_ui"
description = "Before any hands, Hand history shows a broken blank region with no \"No hands played yet\" empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "save_resume_wrong_position"
description = "After Save table mid-hand and reload, the table resumes at a different board, street, pot, or side to act than was saved"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "drawer_cannot_reopen"
description = "On a narrow viewport the collapsed stats/history drawer cannot be reopened"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "session_confirm_blocks_exit"
description = "The Start new session confirmation has no cancel or dismiss path and blocks further play"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "import_fails_without_feedback"
description = "Importing invalid session JSON fails with no visible inline error naming the import field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "flow_dead_end_requires_reload"
description = "A betting, export, save/resume, or new-session flow dead-ends and requires a full page reload to recover"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.14"
name = "badge_toast_panel_and_reload_persistence"
description = "Earn a badge through real play and observe its transient toast at unlock, then confirm it remains listed in the Badges panel as another badge is earned; after a full page reload, the same earned badges remain listed"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "three_hand_reload_restores_full_session"
description = "After at least 3 completed hands, record chip stacks, blind level, Session stats, Hand history entries, badges, and difficulty; a full page reload restores every recorded facet exactly rather than a partial mixture"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "same_note_conflict_requires_explicit_choice"
description = "In Collaboration scenario, create two offline edits to the same note and reconnect; the UI presents an explicit keep-mine / keep-peer choice instead of silently overwriting, and Shared content shows exactly the version selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
