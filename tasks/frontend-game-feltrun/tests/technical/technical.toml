[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "interactive_within_two_seconds"
description = "Navigating to / on a local cold load reaches an interactive table within 2 seconds — not a blank page, a framework error overlay, or a noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "console_clean_full_session"
description = "Loading, dealing a hand, betting through a round, reaching showdown or fold, opening Hand history, using Rebuy when available, and using New Session produce no uncaught JavaScript errors or unhandled promise rejections in the console"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "reload_restores_persisted_state"
description = "After playing several hands so chips, blind level, hand count, win-rate stats, hand history, and badges have changed, a full page refresh restores all of them exactly as before"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "no_failed_same_origin_requests"
description = "Driving the core hand flow produces no failed same-origin (4xx/5xx) network requests, consistent with fully client-side hand logic (the browser's own /favicon.ico probe aside)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rapid_input_stays_responsive"
description = "Rapidly repeating the primary game action many times through the visible controls keeps the UI responsive with an exact final state and no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "illegal_actions_rejected_with_feedback"
description = "Acting when it is not the human's turn, entering an out-of-range raise, or reusing input left over from a resolved hand is rejected with specific visible feedback rather than silently mutating the current hand"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.11"
name = "keyboard_only_operation"
description = "Every betting control, panel toggle, and the raise slider is reachable and operable with the keyboard alone (Tab/Shift+Tab to reach, Enter/Space to activate, arrow keys to adjust the slider)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "session_dialog_traps_and_returns_focus"
description = "The \"Start new session\" confirmation behaves as a modal dialog: keyboard focus stays trapped inside it while open and returns to the control that opened it when it closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "badge_toast_polite_live_region"
description = "The badge-unlock toast is exposed to assistive technology through a polite live region (aria-live=\"polite\" or role=\"status\") in addition to its visual display"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.15"
name = "session_json_import_schema_validated"
description = "Importing malformed session JSON or a document whose schemaVersion is not feltrun-session-v1 shows an inline error naming the import field, leaves stacks and stats unchanged, and does not clear hand history"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "mid_hand_persists_across_reload"
description = "After saving an in-progress post-flop hand and performing a full page reload, the table restores the same board, pot, stacks, street, side to act, blind level, stats, hand history, badges, and difficulty"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "export_compiled_live_from_store"
description = "Completing a hand updates the Export panel preview without a full page reload so handHistory and session stats match the visible panels"
type = "binary"
weight = 1.0

