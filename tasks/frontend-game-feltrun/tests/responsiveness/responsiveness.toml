[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_to_mobile_table_adapts"
description = "From about 1440px to about 375px the poker table and betting controls remain usable; at ~375px stats/history/badges collapse into a toggleable drawer rather than clipping"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_usable"
description = "At about 375px wide, Deal, betting, Undo, Save, and Export controls remain large enough to activate without precise cursor aiming"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "dense_text_legible_mobile"
description = "At about 375px wide, chip amounts, equity percentage, and Session stats numbers stay legible and unclipped"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_375"
description = "At about 375px wide no content clips or overflows the viewport and no horizontal page scroll appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "drawer_adapts_side_panels"
description = "At about 375px wide the stats/history/badges panels use a toggleable drawer rather than remaining a clipped side column"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "export_controls_reachable_mobile"
description = "At about 375px wide the Export panel, Save table / Load saved table, Undo last action, and difficulty controls remain reachable without permanently covering the betting controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "betting_controls_tap_work"
description = "At about 375px wide Fold, Check/Call, Raise, All-in, and quick-bet shortcuts remain tappable and functional"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_mobile"
description = "At about 375px wide the page has no horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "table_felt_scales"
description = "The table felt and card layout scale to fit the narrow viewport without cutting off hole cards or community cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_betting_bar_accessible"
description = "If betting controls are fixed or sticky on small screens, they remain reachable and do not permanently obscure the community board"
type = "binary"
weight = 1.0

