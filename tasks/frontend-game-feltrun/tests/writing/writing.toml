[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "panel_headings_consistent_case"
description = "Where the app renders headings such as Session stats, Hand history, Badges, and Export, they use one consistent capitalization convention"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "action_labels_specific"
description = "Where the app renders actions, labels are specific verbs such as Deal first hand, Undo last action, Save table, and Export Copy rather than generic Submit or OK when a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders raise-amount or import errors, they name the problem and the fix (for example naming amount or the import field), not only Invalid"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_history_explains_next_step"
description = "Where Hand history is empty, the copy \"No hands played yet\" (or equivalent) explains what belongs there; the pre-deal table shows Deal first hand guidance"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_quality"
description = "Where the app renders body or instructional copy on the table chrome, rate how free it is of spelling and grammatical errors"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "hand_type_labels_readable"
description = "Where showdown hand-type labels appear (for example Two pair or Flush), they read as finished poker terminology rather than placeholder tokens"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "badge_names_specific"
description = "Where achievement badges are listed, names such as First win or Comeback kid are specific rather than Badge 1 style placeholders"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "export_labels_clear"
description = "Where Export Copy, Download, and Import labels appear, they clearly describe the session-artifact action"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum, TODO, asdf, or template variables like {{title}} are visible in the shipped UI"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "generic_only_action_labels"
description = "Primary actions are labeled only with generic Submit or OK where Deal, Raise, Export, or Save labels are possible"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "errors_say_only_invalid"
description = "Raise or import errors say only Invalid with no field or fix named"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "empty_state_silent"
description = "Empty Hand history shows no explanatory copy"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable writing defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 0.5
