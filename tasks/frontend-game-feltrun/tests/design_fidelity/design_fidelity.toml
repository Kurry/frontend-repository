[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "felt_spacing_matches_reference_scale"
description = "Spacing and sizing on the table chrome follow the tight 2px-based scale and ~5px radii from the instruction and reference screenshots, without large arbitrary one-off gaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "poppins_type_matches_reference"
description = "Typography matches the Poppins stack and approximate heading/body sizes called out in the instruction and visible in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "table_layout_matches_reference"
description = "At desktop width the table, seats, community board, and side panels compose like the reference screenshots (felt table center, chrome panels around it) within a small tolerance — HUD fidelity, not pixel-perfect landing parity"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "mandated_state_changes_animate"
description = "Equity street changes, history entrance, showdown reveal, and badge toast animate as the instruction specifies when driven through real play"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "mobile_drawer_matches_reference_pattern"
description = "At about 375px the stats/history collapse into a drawer pattern consistent with the instruction rather than keeping a clipped desktop sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_chrome_matches_felt_spec"
description = "Buttons, the raise slider, and panels use the near-black felt palette with primary #FFFF7D CTAs as in the instruction/reference"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "type_hierarchy_matches_reference"
description = "Section headings versus body/stat text show a clear hierarchy matching the large heading / large body scale in the instruction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "control_states_match_spec"
description = "Default, hover, and disabled states on betting and session controls are visually distinct as required"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_felt"
description = "Felt background #02070C, primary #FFFF7D, and accent #FFFE68 treatments match the design tokens in the instruction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_duration_intent"
description = "Badge toast auto-dismiss and equity transition feel brief and non-blocking as specified rather than multi-second blocking overlays"
type = "binary"
weight = 1.0

