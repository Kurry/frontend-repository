[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_table_microinteractions"
description = "Beyond the mandated equity transition and confetti, the table offers an extra delightful microinteraction during play (for example chip-fly into the pot or seat pulse on action) that feels intentional"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "richer_hand_review_motion"
description = "Beyond the required history entrance, the app offers an advanced hand-review affordance such as expanding a history row to replay streets or highlight the winning cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_first_hand_coachmark"
description = "A brief optional coachmark or tip helps a first-time player start the first hand without blocking play after dismiss"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "equity_or_odds_graphic_extra"
description = "Beyond the percentage readout, an optional equity graphic (bar, meter segments, or street markers) adds usability without replacing the numeric equity"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_betting_shortcuts"
description = "Optional keyboard shortcuts for Fold/Check/Call/Raise speed up play beyond Tab-focus activation alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "session_timeline_or_sparkline"
description = "An optional session sparkline or win/loss timeline summarizes results beyond the numeric Session stats counters"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "export_share_packaging_extra"
description = "Beyond the mandated session JSON, an optional second portable view (for example a human-readable hand-history text tab) adds shareability"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "difficulty_explainer"
description = "An optional short explanation of what Easy/Standard/Hard changes about AI behavior appears near the difficulty control"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant, browser-observable innovation or polish enhancement beyond the specification that is NOT covered by any other criterion in this file. If present, name the enhancement and cite the concrete evidence. If nothing beyond the specification is present, answer no."
type = "binary"
weight = 1.0
