[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load at /"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_session"
description = "No console errors or uncaught exceptions appear during dealing, betting, showdown, rebuy, undo, save/load, export/import, and panel toggling"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "betting_ui_stays_responsive"
description = "Using betting controls and quick-bet shortcuts keeps the UI responsive with no multi-second hangs between action and visible stack/pot update"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "export_preview_updates_promptly"
description = "After a completed hand the Export preview updates without a long freeze of the betting controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "history_list_stays_smooth"
description = "As Hand history grows across several completed hands, opening the panel and scrolling remain usable without multi-second lag"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "During showdown reveal, badge toast, and export copy confirmation the table controls remain interactive afterward"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "confetti_does_not_jank_table"
description = "A human-win confetti burst does not freeze the table or leave controls unresponsive after it finishes"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_betting_no_freeze"
description = "Rapid repeated input on betting controls produces no hangs, blank screen, or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "Playing through multiple hands with export and panel toggles shows no runaway slowdown that makes the table unusable"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "reload_resume_prompt"
description = "After reload of a saved mid-hand state the table becomes interactive again promptly with the restored position visible"
type = "binary"
weight = 1.0

