[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_persists"
description = "After several completed hands so chip stacks, blind level, Session stats, Hand history, badges, and difficulty have all changed, a full page reload restores every facet exactly — never a mix of restored and reset values"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "history_most_recent_first_order"
description = "After completing two hands with different pots, Hand history lists most-recent-first; the top entry matches the latest hand's pot and winner, proving order is derived from live completions rather than a hardcoded list"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "equity_and_export_track_streets"
description = "Advancing from preflop to flop to turn changes the hand-equity percentage to a new value each street, and completing the hand changes the Export preview handHistory relative to the pre-hand export"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_panel_echo_without_reload"
description = "Completing a hand updates Session stats hands-played, appends Hand history, and updates the Export preview handHistory and session.handsPlayed together without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "hands_played_exact_delta"
description = "Measure Session stats hands-played immediately before and after one completed hand; the count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_raises_different_pots"
description = "On two separate human turns (or hands), raise two different legal chip amounts; the pot and stack deltas differ by those amounts rather than producing identical chip movement"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_export_and_play"
description = "Complete a hand, open Export and note handHistory length, complete another hand, return to Export — handHistory length increases by one and the newest entry matches the latest hand without corrupting prior entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "new_session_clears_then_repopulate"
description = "After hands exist, confirm Start new session so Hand history is empty and export handHistory is empty; deal and complete a new hand — stats, history, and export repopulate from the new session only"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_behavioral_round_trip"
description = "Mutate the session with at least one completed hand, export the session JSON, import it back — visible stacks, stats, history, badges, and difficulty match the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "mid_hand_save_resume_probe"
description = "Save table mid-hand after the flop, reload, and confirm board, pot, stacks, street, and side to act match the saved position"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_incoherent"
description = "After reload, some facets (stacks, blinds, stats, history, badges, or difficulty) silently revert while others survive, producing incoherent partial persistence"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_ignores_completed_hands"
description = "The Export preview handHistory stays identical before and after completing a hand that changed the visible Hand history"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_raises_identical_chip_delta"
description = "Raising two different legal amounts produces the same pot and stack delta"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "history_stats_export_stale"
description = "A completed hand updates one of Hand history, Session stats, or Export preview but not the others until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
