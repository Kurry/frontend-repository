[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "betting_and_export_keyboard_accessible"
description = "Every betting control, panel toggle, slider, Undo last action, Save table, Load saved table, difficulty control, and Export Copy/Download/Import control is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space, arrows for the slider)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "session_modal_focus_trap"
description = "The Start new session confirmation traps focus while open and returns focus to the control that opened it on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls in the chrome expose accessible names (aria-label or equivalent) so their purpose is announced"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "toast_and_copy_live_regions"
description = "The badge-unlock toast and the export copied confirmation are announced via a polite live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "raise_and_import_have_labels"
description = "The raise-amount input and the session import field have explicit labels associated with the controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "Panel headings such as Session stats, Hand history, Badges, and Export follow a logical heading order without skipping levels in a way that breaks outline navigation"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.7"
name = "landmarks_or_regions_present"
description = "Primary regions (table, stats/history panels, export) are distinguishable via landmarks or labeled regions for assistive navigation"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "focus_visible_on_dark_felt"
description = "Keyboard focus is clearly visible on every interactive control and legible against the dark felt"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "validation_errors_announced"
description = "Raise-amount and import validation errors appear next to the field they describe and are announced to assistive technology when they appear"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "style_badges_not_color_alone"
description = "AI play-style badges are not distinguished by color alone — each also has a text label (Aggressive, Tight, or Bluffer) or icon-plus-text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_not_keyboard_reachable"
description = "Betting, Undo, Save, difficulty, or Export controls cannot be reached or activated with the keyboard alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "modal_loses_focus_management"
description = "The Start new session confirmation lets keyboard focus escape while open, or fails to return focus to the opener on close"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "toasts_not_announced"
description = "Badge-unlock or export-copied feedback is visual only with no polite live region announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "inputs_missing_labels"
description = "The raise-amount or import field has no accessible label"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "focus_indicator_missing"
description = "Focused betting or export controls show no visible focus indicator against the dark felt"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "errors_not_associated"
description = "Validation errors appear without association to the raise-amount or import field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "badges_color_only"
description = "AI play-style badges are distinguished only by color with no text label"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "icon_only_unnamed"
description = "Icon-only chrome controls lack accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "keyboard_trap_outside_modal"
description = "Keyboard focus becomes trapped in a non-modal region with no Escape or Tab escape path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "live_region_polite_missing_on_errors"
description = "Inline raise or import errors appear visually with no accessible live region update and no field error association"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
