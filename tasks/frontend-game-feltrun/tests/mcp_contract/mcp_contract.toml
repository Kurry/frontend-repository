[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_bound"
description = "Contract modules command-session-v1, browse-query-v1, structured-editor-v1, and artifact-transfer-v1 are initialized and bound"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "WebMCP session start/advance/restart, browse open to destinations, editor shared-note ops, and artifact export/import/copy invoke the same application logic as the visible Deal, panel, collaboration, and Export controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_exist"
description = "Only documented session operations, browse destinations (table, stats, hand-history, badges, export, collaboration), editor shared-note ops, and artifact operations export/import/copy with json / session-json are available"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_automation_exercisable"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool can exercise the declared Feltrun contract without manual harness edits"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "session_ops_drive_table"
description = "Declared session operations start, advance, restart, pause, and resume drive the same table lifecycle as the visible Deal / session controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "artifact_export_import_bound"
description = "artifact-transfer-v1 export (format json), import (mode session-json), and copy are bound and invoke the same Export panel handlers as the visible Copy/Download/Import controls (without returning raw file bytes in tool results)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_match"
description = "browse open destinations match the allowed set: table, stats, hand-history, badges, export, collaboration"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_capabilities"
description = "No extra undeclared modules, destinations, or artifact formats beyond the Feltrun contract bindings are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the declared Feltrun tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the delivered app without manual editing of test harness files"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling for session, browse, editor, or artifact-transfer is unbound, missing, or a no-op"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A WebMCP session, browse, editor, or artifact invoke mutates state differently from the matching visible UI control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations, session operations, or artifact formats are exposed beyond the contract bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise"
description = "The declared Feltrun contract cannot be exercised from automation via webmcp_list_tools / webmcp_invoke_tool"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "artifact_bypass_desyncs_export"
description = "Invoking artifact export/import via WebMCP leaves the Export panel preview or table state desynced from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or omits the mandated Feltrun modules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test harness hacks to appear bound"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_module_missing"
description = "command-session-v1, browse-query-v1, structured-editor-v1, or artifact-transfer-v1 is declared but not implemented"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation for the Feltrun assignment"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
