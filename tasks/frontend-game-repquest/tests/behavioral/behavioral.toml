[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "After logging sets, unlocking and equipping gear, saving a dailyGoal, and optionally saving a challenge checkpoint, a full page reload restores all of those facets coherently from localStorage — never a mix of restored and reset values"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.2"
name = "history_order_most_recent_first"
description = "With at least three logged sets of different reps, History lists them most recent first; after reload the same order and reps remain"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.3"
name = "derived_surfaces_track_log_and_delete"
description = "Logging a set changes weekly-chart today's bar, personal records when broken, and today's heat-map cell; deleting that set recomputes those derived surfaces from remaining entries"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.4"
name = "cross_view_echo_quest_history_gear"
description = "Logging a set on Quest updates History without reload; unlocking gear on Gear updates the quest-point balance and equipped appearance on Quest without reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.5"
name = "count_delta_exact_on_log"
description = "Measuring lifetime reps immediately before and after logging N reps shows a delta of exactly N with no off-by-one or lag"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.6"
name = "different_inputs_change_export"
description = "Logging two sessions with different reps (or different gear unlocks) produces Export Quest Log JSON whose sets/lifetimeReps/unlockedGearIds differ accordingly"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.7"
name = "interleaved_quest_and_challenge"
description = "Starting a challenge run, switching back to Quest to inspect History, then returning to Challenge preserves the in-progress run state and does not corrupt History totals"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.8"
name = "empty_to_repopulated_after_reset"
description = "Confirming Reset Quest empties History and zeros lifetime reps; logging a new set repopulates History, chart, and heat-map from that set alone"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.9"
name = "export_import_behavioral_round_trip"
description = "Mutate state (log sets, unlock gear), export Quest Log, reset, import the file: History reps, lifetimeReps, unlocked gear, and equipped appearance match the pre-reset export"
type = "binary"
weight = 1.0
[[criterion]]
id = "14.10"
name = "undo_restores_prior_snapshot"
description = "After logging a set then Undo, lifetime reps, streak, quest points, and History return to the prior snapshot values shown in the History state region"
type = "binary"
weight = 1.0
