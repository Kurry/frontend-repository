[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Headings, tab labels, and buttons use one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.2"
name = "action_labels_specific"
description = "Primary actions use specific labels such as Log reps, Export Quest Log, Import Quest Log, Save Progress, Resume Saved Run, Start run, End run rather than generic Submit/OK everywhere"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Validation and feedback messages name the problem and the fix (which field is invalid and what a valid value looks like); import rejection names that the file is invalid"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "The History empty state explains what belongs there and how to log a first set"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.5"
name = "victory_defeat_exact_words"
description = "Victory and Defeat copy uses those exact outcome words so the decided result is unambiguous"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.6"
name = "terminology_consistent"
description = "Domain terms (Quest Points, Daily Goal, Challenge, Zone Unlocked) stay consistent across tabs and banners"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.7"
name = "numbers_and_units_consistent"
description = "Rep counts and quest points use consistent numeric formatting and unit wording across Quest, History, and Challenge"
type = "binary"
weight = 0.5
[[criterion]]
id = "15.8"
name = "success_messages_specific"
description = "Success toasts for zone unlock, boss defeat, gear bought, Saved, and Copied are specific rather than a generic Success"
type = "binary"
weight = 0.5
