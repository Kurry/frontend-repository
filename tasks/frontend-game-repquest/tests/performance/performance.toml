[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.2"
name = "console_clean_full_session"
description = "No console errors appear during a full session covering logging, deleting, gear, mode switches, challenge Victory/Defeat, save/resume, export/import, undo/redo, and reset"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.3"
name = "controls_respond_promptly"
description = "Log Reps, mode switches, and Challenge Start/Pause/Resume respond without multi-second UI freezes"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.4"
name = "export_does_not_hang"
description = "Export Quest Log and Export Workout CSV complete without freezing the UI for multi-second hangs on a history of at least 25 sets"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.5"
name = "history_list_stays_responsive"
description = "With at least 25 History entries the list remains scrollable and Delete remains interactive without sustained lag"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "During character glide and chart updates the UI stays interactive for further Log Reps and tab switches"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.7"
name = "canvas_motion_stays_smooth"
description = "Canvas rendering stays smooth during character movement and chart updates with no visible freezes or blanked frames"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated Log Reps and Challenge controls leave the UI responsive with no blank screen"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "After an extended session of logging, mode switches, and exports the app remains usable without runaway slowdowns"
type = "binary"
weight = 1.0
[[criterion]]
id = "9.10"
name = "storage_unavailable_fallback"
description = "When storage is unavailable the shell still loads; when available, persistence works as specified"
type = "binary"
weight = 1.0
