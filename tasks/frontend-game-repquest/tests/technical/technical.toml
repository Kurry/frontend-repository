[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "console_clean_during_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections occur during a full exercise: logging sets, deleting history, gear purchases, mode switches, challenge Victory and Defeat, save/resume, export/import, undo/redo, and a guarded Reset Quest"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.2"
name = "refresh_restores_persisted_state"
description = "After logging sets and refreshing the page, lifetime reps, current waypoint, streak, quest points, unlocked zones and gear, equipped gear, the full rep history, settings, personal records, heat-map day totals, and any challenge checkpoint are restored exactly as they were"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.3"
name = "canvas_surfaces_render_and_resize"
description = "The quest map and weekly summary chart render inside canvas elements (not DOM or SVG chart markup) and redraw correctly, without distortion or blanking, after a viewport resize"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.4"
name = "stale_run_input_never_leaks"
description = "Rep input typed before a challenge run started, or left over from an ended run, never mutates lifetime reps or the current run once game state has moved past that phase"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.15"
name = "api_shaped_rep_set_create"
description = "A valid Log Reps submit creates a History record whose visible fields match the create-rep-set contract (reps in 1 through 9999, optional note up to 120 chars, setId, loggedAt timestamp)"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.16"
name = "api_shaped_settings_save"
description = "Saving Settings persists dailyGoal, reminderEnabled, and reminderHour as the settings request body and those values drive Quest goal and reminder banner behavior after reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.17"
name = "export_schema_fields_present"
description = "Export Quest Log JSON includes required top-level fields schemaVersion, exportedAt, dailyGoal, streak, lifetimeReps, questPoints, unlockedZones, unlockedGearIds, equippedGearId, defeatedBossIds, and sets"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.18"
name = "localstorage_guard_no_crash"
description = "With storage unavailable or blocked, the production build still loads the shell without crashing; when storage is available, refresh restores committed state"
type = "binary"
weight = 1.0
[[criterion]]
id = "2.19"
name = "shared_store_single_source"
description = "Logging a set updates lifetime reps, today's total, History, weekly chart, and export-bound values consistently from one shared state — panels never show conflicting totals for the same moment"
type = "binary"
weight = 1.0
