[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "console_clean_during_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections occur during a full exercise of the app: logging sets, deleting history entries, gear purchases, mode switches, undo/redo, and a guarded Reset Quest"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "refresh_restores_persisted_state"
description = "After logging sets and refreshing the page, lifetime reps, current waypoint, streak, quest points, unlocked zones and gear, equipped gear, and the full rep history are restored exactly as they were before the refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "canvas_surfaces_render_and_resize"
description = "The quest map and weekly summary chart render inside canvas elements (not DOM or SVG chart markup) and redraw correctly, without distortion or blanking, after a viewport resize"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "stale_run_input_never_leaks"
description = "Rep input typed before a challenge run started, or left over from an ended run, never mutates lifetime reps or the current run once game state has moved past that phase"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "state_lost_after_refresh"
description = "Lifetime reps, streak, quest points, unlocked zones/gear, equipped gear, or rep history are lost or reset to defaults after a full page refresh"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.6"
name = "hidden_state_exposed_to_judge"
description = "A hidden element, attribute, or window global exposes internal game state (computed totals, boss outcomes, quest points) that a real user could not reach through the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "fabricated_success_states"
description = "A success state (Zone Unlocked message, boss-defeated marker, gear unlocked) appears without the underlying condition (reps reached, minimum-rep set logged, quest points spent) actually having been met"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "automation_detection_branching"
description = "The app's behavior or visible controls differ depending on whether navigator.webdriver or another automation signal is present"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "keyboard_only_operability"
description = "Every interactive control (tabs, form fields, buttons, toggles) is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "reset_dialog_focus_management"
description = "The Reset Quest confirmation dialog traps keyboard focus while open, closes on Escape, and returns focus to the Reset Quest control on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "notifications_announced_aria_live"
description = "Transient notification banners (zone unlocked, boss defeated, gear bought, quest reset, daily reminder) are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "canvas_accessible_labels_and_text_mirror"
description = "Each canvas surface (quest map, weekly summary chart) carries an accessible label describing what it shows, and the numbers it visualizes (today's total, lifetime reps, per-day totals) are also available as visible text outside the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "cold_load_interactive_2s"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "canvas_stays_smooth"
description = "Canvas rendering stays smooth during character movement and chart updates, with no visible freezes or blanked frames, including during rapid successive log actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "external_network_requests_present"
description = "Devtools network activity shows outbound requests to CDNs or other third-party origins for scripts, styles, fonts, or icons while the app loads and runs"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console, network, storage, accessibility, performance, or state coherence) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
