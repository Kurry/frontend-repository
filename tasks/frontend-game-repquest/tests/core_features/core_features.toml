[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "quest_tab_initial_layout"
description = "On load, the Quest tab shows a canvas quest map with numbered waypoint markers and a character sprite on the path, a Log Reps form (number input plus Log reps button), the daily-goal progress indicator, a Current Streak counter, the History state region, Personal Records or streak heat-map surfaces, and the weekly summary chart, and the History tab shows the empty-state placeholder before any set is logged"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "log_reps_updates_totals_and_advances"
description = "After logging a set with a valid positive whole number of reps from 1 through 9999, today's total and lifetime reps increase by exactly that amount and the character visibly advances along the quest map canvas without a page reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "log_reps_inline_validation"
description = "While the Log Reps field holds an invalid value (empty, zero, negative, non-integer, or outside 1 through 9999), an inline error message names the reps field and the rule it breaks before submit, the Log reps control is disabled or rejects the submission, and today's total, lifetime reps, and the character position stay unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "zone_unlock_palette_and_notification"
description = "After logging enough reps to cross a waypoint into a new zone, the quest map canvas background switches to that zone's own distinct sky/ground palette and a Zone Unlocked notification appears exactly once for that zone, not again on later visits or later sets"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "boss_defeat_marker_and_bonus"
description = "After logging a qualifying set on a Boss Challenge waypoint (lifetime reps at or past the waypoint and the single set meeting its stated minimum reps), the boss marker permanently switches to a defeated treatment and bonus Quest Points are awarded"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "gear_unlock_and_equip"
description = "After earning enough quest points and unlocking a Gear Shop outfit, the outfit shows a full-color unlocked treatment instead of its prior muted/grayscale locked treatment, and selecting Equip immediately changes the character's appearance on the quest map canvas"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "delete_entry_recalculates_from_remaining"
description = "After deleting a History entry, exactly that entry disappears from the list and today's total, lifetime reps, quest points, unlocked zones, defeated bosses, the streak, personal records, and heat-map cells are recalculated from the remaining entries rather than by adjusting a running total"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "refresh_restores_all_facets_coherently"
description = "After logging sets, unlocking and equipping gear, setting a daily goal, and saving a challenge checkpoint when applicable, a full page refresh restores lifetime reps, the character's waypoint position, current streak, quest points, unlocked zones and gear, equipped gear, the full rep history, settings, personal records, heat-map day totals, and any challenge checkpoint exactly as they were — all facets coherently, never a mix of restored and reset values"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "mode_switch_round_trip_preserves_state"
description = "Switching Game Mode from Quest to Challenge and back preserves lifetime reps, today's total, quest points, the History list, and any in-progress challenge run state identically before and after the round trip, and only one mode's panel (map/log form or Boss Challenge panel) is visible at a time"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "undo_redo_steps_through_snapshots"
description = "After performing a recorded sequence of state-changing actions (log a set, update the daily goal, buy gear), each Undo updates the History state region's snapshot label and the displayed lifetime reps, streak, and quest points to the prior snapshot's values, and each Redo steps forward through the same sequence"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.11"
name = "undo_branching_preserves_branches"
description = "After Undo followed by a different action (not Redo), a new selectable branch appears in a branch list rather than the redo-able snapshots being overwritten or silently discarded, and selecting the earlier branch restores its exact prior visible state (lifetime reps, streak, quest points, History list)"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.12"
name = "reset_quest_confirmation_flow"
description = "Activating the Reset Quest control opens a confirmation dialog first; confirming wipes lifetime reps, streak, quest points, unlocked zones/gear, the full rep history, personal records, heat-map day cells, and any challenge checkpoint back to a fresh start, while Cancel leaves all state untouched"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.20"
name = "goal_progress_and_streak_tracking"
description = "The daily-goal progress indicator on the Quest tab tracks today's logged reps against the Settings dailyGoal target, and the Current Streak counter counts consecutive local-calendar days the goal was met, resetting to zero the first day the goal is missed"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.21"
name = "weekly_chart_daily_totals"
description = "The canvas-rendered weekly summary bar chart shows total reps per day for the last 7 calendar days with a visible daily-goal reference line, and days with zero reps still render a visible zero-height tick rather than a blank area"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.24"
name = "challenge_run_lifecycle_gating"
description = "In Challenge mode, the Start run / Pause / Resume / End run lifecycle (idle to active, active to paused, paused to active, active or paused to ended, restart back to idle) only allows transitions from their legal predecessor state; unavailable transitions are disabled controls, not silently ignored clicks"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.27"
name = "rapid_logging_integrity"
description = "Logging 25 rep sets back to back in immediate succession leaves lifetime reps, today's total, and the History list exactly matching the sum of what was entered, with no dropped, duplicated, or corrupted entries and no frozen or blank screen"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.28"
name = "apply_scenario_change_snapshot"
description = "The Apply scenario change control in the History state region visibly mutates state (rotating through a small set of scenario effects) and is recorded as its own snapshot in the same undo/redo history as other state-changing actions"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.31"
name = "log_set_flow_cross_surface"
description = "Starting on the Quest tab with the current today's total and lifetime reps noted, logging a valid set of 12 reps increases both totals by exactly 12 (measured immediately around the action), glides the character forward on the quest map, grows today's bar in the weekly summary chart, and switching to the History tab shows the new entry at the top with its rep count and timestamp, all without a page reload; after a full page refresh, today's total, lifetime reps, the character position, and the History entry all show the same values"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.32"
name = "delete_entry_flow_cross_surface"
description = "Starting with at least two logged sets, deleting one History entry removes exactly that entry from the list; returning to the Quest tab shows the recomputed today's total, lifetime reps, character position, and weekly chart without a reload, and a page refresh preserves the recomputed state"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.33"
name = "gear_purchase_flow_with_refresh"
description = "With the Quest Point balance noted, unlocking a Gear Shop outfit decreases the visible balance by exactly the outfit's cost and flips its card from locked to unlocked; equipping it immediately changes the character's appearance on the quest map, and after a full page refresh the balance, the unlocked state, and the equipped appearance are all preserved"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.34"
name = "daily_goal_save_rescales_surfaces"
description = "Saving a new dailyGoal value in Settings immediately re-scales the Quest tab progress indicator and moves the goal reference line on the weekly summary chart to the new target, without a page reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.35"
name = "daily_goal_invalid_rejected"
description = "Editing the dailyGoal field with an invalid value (empty, zero, negative, or non-integer) shows an inline error naming the field before submit, and the Save control leaves the previously saved goal in effect"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.36"
name = "daily_reminder_banner_logic"
description = "Settings offers reminderEnabled on/off and reminderHour (0 through 23); when reminderEnabled is on and reminderHour has passed today with the daily goal still unmet, an in-app reminder banner appears, and no banner appears when reminderEnabled is off or once the goal is met"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.37"
name = "history_list_order_and_details"
description = "The History tab lists every logged set with its rep count, optional note, and date/time, most recent first, each entry with its own Delete control"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.38"
name = "undo_redo_disabled_at_bounds"
description = "The Undo control is visibly disabled when there is nothing to undo, and the Redo control is visibly disabled when there is nothing to redo, rather than the clicks being silently ignored"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.39"
name = "log_outside_active_run_feedback"
description = "In Challenge mode, attempting to log reps while a run is not active shows visible feedback and the run state remains unchanged"
type = "binary"
weight = 0.5
[[criterion]]
id = "1.40"
name = "rep_set_note_field_contract"
description = "The Log Reps form accepts an optional note up to 120 characters; a valid submit with a note shows that note on the matching History row, and a note longer than 120 characters shows an inline error naming the note field without creating a History entry"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.41"
name = "settings_payload_fields"
description = "The Settings form exposes dailyGoal (1 through 9999), reminderEnabled (boolean), and reminderHour (0 through 23); saving valid values updates the Quest tab goal and reminder behavior from those fields, and invalid values show inline errors naming the field"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.42"
name = "challenge_difficulty_changes_target"
description = "In Challenge mode before a run starts, choosing Easy, Normal, and Hard shows three different boss minimum-rep targets (Hard greater than Normal, Normal greater than Easy) as a visible target number"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.43"
name = "challenge_victory_decided_outcome"
description = "Starting a challenge run, logging enough reps during the active run to meet the shown target, then ending or resolving the run shows a Victory result panel that names Victory and shows logged reps at or above the target"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.44"
name = "challenge_defeat_decided_outcome"
description = "Starting a challenge run and ending it before the target is met shows a Defeat result panel that names Defeat and the shortfall; Restart or New run returns to idle with zero run reps and no Defeat banner leftover from the prior run"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.45"
name = "challenge_save_and_resume"
description = "During an active or paused challenge run after at least one set logged in that run, Save Progress shows a Saved confirmation; after a full page refresh, Resume Saved Run restores the same difficulty, targetReps, and repsLogged"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.46"
name = "personal_records_live_update"
description = "The Personal Records panel shows bestSingleSet and bestDayTotal; logging a set that beats either record updates that readout immediately without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.47"
name = "streak_heatmap_28_days"
description = "A streak heat-map shows the last 28 local calendar days with visually distinct empty/zero, below-goal, and at-or-above-goal treatments, and logging reps for today updates today's cell without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.48"
name = "export_quest_log_contains_session"
description = "After logging at least two distinct sets and unlocking one gear item, Export Quest Log produces downloadable/copyable JSON whose sets array includes those exact reps and whose unlockedGearIds and lifetimeReps match the UI; Copy shows a Copied confirmation"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.49"
name = "export_workout_csv_matches_sets"
description = "Export Workout CSV downloads a CSV-shaped text file with header date,reps,note and one data row per logged set whose reps match the session History"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.50"
name = "import_quest_log_round_trip"
description = "After Export Quest Log, confirming Reset Quest, then Import Quest Log with that file reconstructs the same History list, lifetime reps, streak, quest points, unlocked gear, and equipped appearance; malformed JSON shows a visible invalid-file rejection and changes nothing"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.53"
name = "challenge_checkpoint_exact_field_contract"
description = "After starting a challenge run, choosing Hard, logging at least one set, and pausing, Save Progress produces a checkpoint whose browser-visible values show runStatus paused, the active bossWaypointId, difficulty Hard, repsLogged and targetReps matching the panel, and savedAt as a timestamp; after reload Resume Saved Run restores every one of those values exactly"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.54"
name = "quest_log_nested_schema_matches_live_state"
description = "Export Quest Log JSON contains schemaVersion, exportedAt, dailyGoal, streak, lifetimeReps, questPoints, unlockedZones, unlockedGearIds, equippedGearId, defeatedBossIds, and sets; every set contains setId, reps, loggedAt, and note when present, and all exported values match the live session"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.55"
name = "workout_csv_is_chronological"
description = "After logging sets at distinguishable times, Export Workout CSV uses the exact header date,reps,note and contains one row per History set in oldest-to-newest chronological order, with reps and notes matching the corresponding exported JSON sets"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.56"
name = "import_restores_complete_quest_state"
description = "After exporting a session with workout sets, an unlocked zone, a defeated boss, equipped gear, and changed daily-goal state, resetting and importing restores dailyGoal, streak, lifetimeReps, questPoints, unlockedZones, unlockedGearIds, equippedGearId, defeatedBossIds, full History, and derived records and heatmap state; a fresh export matches the restored state"
type = "binary"
weight = 1.0
