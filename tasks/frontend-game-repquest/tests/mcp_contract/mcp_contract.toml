[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_bound"
description = "Contract-mandated modules browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 are initialized and bound"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed tool handlers call the same application logic as the visible UI for destinations, rep-set entity ops, session ops, and artifact export/import/copy"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.3"
name = "only_documented_operations"
description = "Only documented operations and destinations from the contract bindings are available — no undeclared routes"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.4"
name = "contract_automation_exercisable"
description = "The contract can be exercised via webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool against the running page"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.5"
name = "entity_rep_set_ops_work"
description = "Entity operations create, delete, select, and toggle for entity rep-set work through WebMCP using fields reps, setId, gearId, and note within reps bounds 1 through 9999"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.6"
name = "browse_destinations_work"
description = "Browse destinations quest, history, gear, and settings open the matching visible tabs/panels via the same handlers as UI controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.7"
name = "session_ops_drive_challenge"
description = "Session operations start, pause, resume, stop, restart, and trigger_demo drive Challenge run lifecycle through the same handlers as the visible controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.8"
name = "artifact_ops_bound"
description = "Artifact operations export, import, and copy are bound with export formats json and csv and import mode quest-log"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.9"
name = "session_tool_apis_work"
description = "webmcp_session_info and webmcp_list_tools succeed and list the mandated prefixed tools without harness edits to the page"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP tools initialize from the app's own registration without requiring the judge to patch page globals"
type = "binary"
weight = 1.0
[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Mandated WebMCP tools are missing or no-op while the UI appears to succeed"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "WebMCP handlers mutate different state than the visible controls for the same operation"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Extra undeclared module routes or capabilities are exposed beyond the contract bindings"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n4"
name = "artifact_returns_raw_bytes"
description = "Artifact WebMCP tools return raw file paths, blobs, base64, or artifact contents in tool results"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "12.n5"
name = "required_module_missing"
description = "A required contract module (browse-query-v1, entity-collection-v1, command-session-v1, or artifact-transfer-v1) is missing"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "A significant MCP contract defect is present that is NOT covered by any other criterion in this file. If present, name it and cite concrete evidence. If already covered, answer no here."
type = "binary"
negate = true
weight = 1.0
