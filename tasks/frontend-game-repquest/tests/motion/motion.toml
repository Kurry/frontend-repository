[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "buttons_hover_state"
description = "All interactive buttons (Log Reps, Gear Shop Equip/Unlock, Reset Quest, History Delete, Settings Save/toggle, Game Mode, Start/Pause/Resume/End run, Undo/Redo/Apply scenario change) show a visible hover state, verified with a real pointer hover while inspecting computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "keyboard_focus_ring_visible"
description = "Reaching interactive controls with keyboard Tab shows a visible focus ring on every control across all four tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "character_glides_on_log"
description = "The character sprite advances smoothly (glides, not teleports) along the quest map canvas path when a new set is logged through the real Log Reps form"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "transient_notification_slide_and_dismiss"
description = "A transient notification banner slides or fades in when a zone unlocks, a boss is defeated, gear is bought, or the quest is reset, and dismisses itself shortly after without user action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "history_delete_reveals_on_hover"
description = "History Delete controls reveal on row hover or keyboard focus at desktop widths"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "control_missing_hover_and_focus"
description = "One or more of the required interactive controls (Log Reps, Gear Shop, Reset Quest, History Delete, Undo/Redo) has no visible hover state and no visible focus ring when reached by keyboard"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "character_snaps_instantly"
description = "The character position snaps instantly along the quest map with no glide or transition when reps are logged through the real Log Reps form, despite the motion requirement"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "boss_defeat_confetti_celebration"
description = "Defeating a boss by submitting the qualifying set through the real Log Reps form triggers a brief one-time confetti-style particle celebration over the quest map"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "history_entries_animate_in_out"
description = "Adding a set animates the new entry into the top of the History list, and deleting an entry through its real Delete control animates it out rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reminder_banner_attention_treatment"
description = "While visible, the Daily Reminder banner uses a noticeable attention treatment such as a pulse"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "confetti_loops_or_fires_for_ordinary_sets"
description = "The boss-defeat particle celebration loops ambiently, replays on later visits without a new boss defeat, or fires for ordinary non-qualifying sets"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.12"
name = "zone_palette_swaps_on_reach"
description = "Logging the set that carries lifetime reps across a zone boundary through the real Log Reps form swaps the quest map canvas background palette to the new zone's colors as soon as the zone is reached, without requiring a reload or tab switch to see the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction, observed frames) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
