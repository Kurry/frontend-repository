[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_challenge_moments"
description = "Beyond the required Victory confetti, the challenge loop includes an extra delightful moment (for example a distinct Victory sting, streak flourish, or boss intro) that feels intentional"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.2"
name = "advanced_map_or_chart_polish"
description = "The quest map or weekly chart includes polish beyond the minimum (parallax sky, waypoint pulse, chart hover readout) that aids readability"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.3"
name = "guided_first_run_help"
description = "A brief first-run tip or coachmark explains Log Reps or Challenge without blocking core play"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.4"
name = "enhanced_heatmap_interaction"
description = "Heat-map cells expose day totals on hover or focus beyond the minimum static grid"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.5"
name = "keyboard_power_user_paths"
description = "Power-user keyboard shortcuts (beyond Tab) accelerate Log Reps or mode switching without breaking mouse play"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.6"
name = "preference_personalization_extra"
description = "An optional preference (theme accent, reminder copy style, or chart density) personalizes the chrome beyond the required settings payload"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.7"
name = "quest_narrative_flavor"
description = "Zone unlock or boss copy carries light quest narrative flavor that stays consistent with RepQuest's fitness-quest identity"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.8"
name = "export_preview_polish"
description = "Export surfaces include a live preview pane of Quest Log JSON or CSV before download, updating as sets are logged"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.9"
name = "genre_appropriate_extras"
description = "A genre-appropriate extra (personal-best toast, weekly summary blurb, or difficulty tip) adds value without cluttering the first viewport"
type = "binary"
weight = 0.5
[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Overall execution shows competition-level craft: cohesive motion, clear competitive loop, and a useful export end state working together"
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The implementation includes a meaningful, browser-observable innovation or polish beyond the written specification that improves the RepQuest experience and is NOT covered by any other criterion in this file. If present, name it and cite concrete evidence. If nothing beyond the spec is present, answer no."
type = "binary"
weight = 1.0
