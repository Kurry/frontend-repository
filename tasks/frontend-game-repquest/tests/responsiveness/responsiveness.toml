[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "mobile_canvas_forms_scale"
description = "At about 375px wide, the quest map canvas, forms, weekly chart, heat-map, and export controls scale to fit their container without introducing horizontal scrolling"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.2"
name = "mobile_text_stays_legible"
description = "At about 375px, today's/lifetime totals, Current Streak, History labels, Settings labels, Victory/Defeat text, and Personal Records stay legible and reflow rather than truncating or overflowing"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.3"
name = "desktop_layout_usable"
description = "At about 1440px wide, tabs, Quest map, Challenge panel, Gear Shop, and Export/Import controls remain fully usable without clipping"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.4"
name = "content_avoids_clipping"
description = "At both desktop and ~375px widths, content avoids clipping and unnecessary horizontal scrollbars"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.5"
name = "chrome_adapts_small_screens"
description = "Tab bar and mode controls adapt on small screens so Quest, History, Gear, and Settings remain reachable"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At ~375px, panels stack in a readable order (map/progress, log form, chart/heat-map) rather than overlapping"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.7"
name = "tap_targets_large_enough"
description = "At ~375px, Log Reps, tab controls, and Challenge Start/End targets are large enough to tap without precise aiming"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.8"
name = "media_and_canvases_resize"
description = "Quest map and weekly chart canvases resize with the container rather than staying fixed-width and overflowing"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.9"
name = "fixed_controls_remain_accessible"
description = "Sticky or fixed controls (if any) remain accessible and do not obscure Log Reps or tab navigation at ~375px"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.10"
name = "small_screens_avoid_horizontal_scroll"
description = "At about 375px wide the page does not require horizontal scrolling to reach primary controls"
type = "binary"
weight = 1.0
[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks at ~375px or desktop widths with overlapping or unreachable controls"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "Primary mobile controls are too small or misaligned to use reliably"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Totals, streak, Victory/Defeat, or Settings labels become unreadable at ~375px"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Content is cropped or the page shows unnecessary horizontal scrollbars at target widths"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "7.n5"
name = "controls_disappear_at_sizes"
description = "Export/Import, Difficulty, or tab controls disappear at some viewport size"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "A significant responsiveness defect is present that is NOT covered by any other criterion in this file. If present, name it and cite concrete evidence. If already covered, answer no here."
type = "binary"
negate = true
weight = 1.0
