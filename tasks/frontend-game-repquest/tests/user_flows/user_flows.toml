[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "log_set_full_pipeline_to_history"
description = "Logging a valid set from the Quest tab increases today's total and lifetime reps by exactly the entered count, glides the character forward, grows today's weekly-chart bar, updates today's heat-map cell, and shows the new entry at the top of History with reps and timestamp without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.2"
name = "invalid_log_reps_inline_validation_flow"
description = "Submitting Log Reps with an invalid reps value shows an inline error naming reps before any totals change, and today's total and lifetime reps stay unchanged"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.3"
name = "daily_goal_edit_updates_surfaces"
description = "Saving a new dailyGoal in Settings immediately re-scales the Quest progress indicator and moves the weekly chart goal reference line without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.4"
name = "delete_history_recomputes_quest_surfaces"
description = "Deleting a History entry removes exactly that entry and returning to Quest shows recomputed today's total, lifetime reps, character position, and weekly chart without a reload"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.5"
name = "quest_challenge_mode_round_trip"
description = "Switching from Quest mode to Challenge mode and back preserves lifetime reps, today's total, quest points, History, and any in-progress challenge run state"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.6"
name = "last_delete_reveals_history_empty_state"
description = "Deleting the last History entry reveals the History empty-state placeholder explaining what belongs there"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.7"
name = "challenge_difficulty_then_victory_flow"
description = "Choosing a difficulty, starting a run, meeting the shown target with logged reps, and resolving the run shows Victory with logged reps at or above the target, then Restart returns to idle with zero run reps"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.8"
name = "export_import_round_trip_flow"
description = "After logging at least two sets and unlocking gear, Export Quest Log then Reset Quest then Import Quest Log reconstructs the same History reps, lifetime reps, unlocked gear, and equipped appearance"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.9"
name = "reset_dialog_cancel_and_confirm"
description = "Reset Quest opens a confirmation dialog; Cancel leaves state untouched; Confirm wipes lifetime reps, streak, quest points, history, and checkpoint to a fresh start"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.10"
name = "save_resume_challenge_after_reload"
description = "Save Progress during an active challenge run after logging a set, full page refresh, then Resume Saved Run restores difficulty, target, and repsLogged"
type = "binary"
weight = 1.0
[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Log Reps, Challenge Start/End, Export Quest Log, or Import Quest Log cannot be completed from visible controls alone"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n2"
name = "new_sets_missing_or_duplicated"
description = "Logging a set yields a duplicated History entry, or a lifetime-reps delta unequal to the entered reps"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A logged set, gear unlock, or import updates one surface (History, map, or export preview) while another still shows the prior values until reload"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n4"
name = "mode_switch_loses_quest_state"
description = "Switching between Quest and Challenge clears or corrupts lifetime reps, History, or quest points"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n5"
name = "empty_history_breaks_ui"
description = "With zero logged sets the History tab is blank with no placeholder, or controls become unusable"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n6"
name = "export_import_round_trip_fails"
description = "After export, reset, and import, History reps and unlocked gear disagree with the exported Quest Log"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n7"
name = "challenge_victory_path_unavailable"
description = "Meeting the challenge target leaves the result panel without a Victory announcement, or shows Defeat despite the target being met"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "A confirmation dialog, Victory/Defeat panel, or notification blocks tab navigation with no dismiss or Escape path"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "Invalid Log Reps, malformed Import, or logging outside an active challenge run fails silently with no visible feedback"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "After Challenge End, Reset cancel, or Import rejection the user cannot continue without a full page reload"
type = "binary"
negate = true
weight = 1.0
[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered by another criterion in this file, answer no here."
type = "binary"
negate = true
weight = 1.0
