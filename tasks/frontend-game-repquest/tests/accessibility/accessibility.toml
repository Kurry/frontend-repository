[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Every interactive control (tabs, form fields, buttons, toggles, Export/Import, Difficulty, Save Progress, Resume Saved Run) is reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.2"
name = "reset_dialog_focus_trap"
description = "The Reset Quest confirmation dialog traps focus while open, closes on Escape, and returns focus to the Reset Quest control on close"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls expose accessible names (aria-label or equivalent) so their purpose is available to assistive tech"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.4"
name = "notifications_aria_live"
description = "Transient notification banners (zone unlocked, boss defeated, gear bought, quest reset, daily reminder, export/import feedback, Victory, Defeat) are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Log Reps, Settings (dailyGoal, reminderEnabled, reminderHour), and note fields use explicit labels associated with their inputs"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Visible headings follow a logical order without skipping levels across Quest, History, Gear, and Settings"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.7"
name = "landmark_navigation_present"
description = "Primary regions use landmark structure (main/nav or equivalent roles) so tabs and play surfaces are reachable by landmark navigation"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Body text, totals, and primary controls maintain readable contrast against their backgrounds"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.9"
name = "canvas_labels_and_text_mirror"
description = "Each canvas surface (quest map, weekly summary chart) carries an accessible label describing what it shows, and today's total, lifetime reps, and per-day totals are also available as visible text outside the canvas"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.10"
name = "victory_defeat_not_color_only"
description = "Victory versus Defeat is distinguishable by text (the words Victory and Defeat), not by color alone"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.11"
name = "heatmap_has_text_summary"
description = "The streak heat-map exposes a text summary of recent day totals or an accessible description so the pattern is not color-only"
type = "binary"
weight = 1.0
[[criterion]]
id = "1.12"
name = "reduced_motion_respected"
description = "When prefers-reduced-motion is enabled, non-essential motion (confetti loops, attention pulses) is reduced or disabled while controls remain usable"
type = "binary"
weight = 1.0
