[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Each unlocked zone (Foothills, Canyon, Summit) shows its own visually distinct sky/ground palette on the quest map canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Boss Challenge waypoints render visibly larger and in a different color than normal waypoints, with a clearly different defeated treatment once cleared"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The daily-goal progress fill uses a clear color threshold that visually distinguishes below-half, at/above-half, and at/above-goal progress"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Locked Gear Shop items show a muted/grayscale treatment that turns full color once unlocked, and the currently equipped item is clearly marked as selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Before any set is logged, the History tab shows a friendly, specific placeholder message and the weekly chart shows all-zero bars rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "Notification, error, and empty-state copy is clear and specific to RepQuest (e.g. naming the zone, boss, or reps required) rather than generic placeholder text"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "Locked and unlocked Gear Shop items are visually indistinguishable, or the equipped item is not visibly marked among the unlocked options"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "At a ~375px-wide viewport, the app requires horizontal scrolling, or rep totals, streak, history entries, or settings labels are clipped or truncated instead of reflowing"
type = "binary"
weight = 1.0
negate = true
