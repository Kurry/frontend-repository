[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[dimensions.technical]
name = "Technical"
description = "Verifies technical details."

[[criterion]]
id = "technical.schema_contract_positive"
description = "The tool result and artifact contain the declared API-shaped fields."
type = "browser_observable"
weight = 1.0

[[criterion]]
id = "technical.export_positive"
description = "Exported JSON contains precise records and spatial state."
type = "browser_observable"
weight = 1.0

[[criterion]]
id = "technical.import_positive"
description = "Valid JSON import restores the session completely."
type = "browser_observable"
weight = 1.0

[[criterion]]
id = "technical.invalid_import_positive"
description = "Invalid or conflicting JSON imports reject the upload and display an error."
type = "browser_observable"
weight = 1.0

[[criterion]]
id = "technical.schema_contract"
description = "The tool result and artifact omit the declared API-shaped fields."
type = "browser_observable"
negate = true
weight = 1.0

[[criterion]]
id = "technical.export"
description = "Exported JSON fails to contain precise records and spatial state."
type = "browser_observable"
negate = true
weight = 1.0

[[criterion]]
id = "technical.import"
description = "Valid JSON import fails to restore the session completely."
type = "browser_observable"
negate = true
weight = 1.0

[[criterion]]
id = "technical.invalid_import"
description = "Invalid or conflicting JSON imports silently swallow errors or partially apply state instead of rejecting the upload and displaying an error."
type = "browser_observable"
negate = true
weight = 1.0
