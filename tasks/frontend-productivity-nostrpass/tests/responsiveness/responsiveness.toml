[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = """At widths of 768px and below the sidebar collapses to compact nav; at desktop widths the sidebar is open by default"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = """Primary controls remain large enough to activate at 375px width"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = """Titles and key labels remain legible from desktop down to 375px"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = """No content clips or overflows the viewport at 375px; npub/nsec and vault JSON wrap or truncate within surfaces"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = """Compact navigation still reaches Dashboard, Identities, Permissions, Audit log, and Settings"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.6"
name = "identities_grid_reflows"
description = """Identities grid reflows from multiple columns at desktop to a single column at 375px"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.7"
name = "export_drawer_usable_on_narrow"
description = """Export vault drawer remains usable at 375px without forcing page-level horizontal scroll"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = """No page-level horizontal scrolling appears at 375px width"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.9"
name = "stat_tiles_reflow"
description = """Dashboard stat tiles reflow or stack without overlapping at narrow widths"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = """Sidebar toggle and primary actions remain reachable when the viewport is narrow"""
type = "binary"
weight = 1.0


[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = """Layout breaks at 768px or 375px breakpoints."""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = """Mobile controls are too small or misaligned to use."""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = """Key labels or nicknames become unreadably small at 375px."""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = """Content is cropped or page-level horizontal scrollbars appear at 375px."""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = """Sidebar or compact nav breaks and cannot reach destinations by width."""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.n6"
name = "elements_overlap_at_some_size"
description = """Identity cards, pills, or toolbar controls overlap at some viewport size."""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "matrix_scrolls_inside_panel_at_375"
description = "At 375 pixel width the All identities matrix scrolls inside its own panel rather than forcing page-level horizontal overflow"
type = "binary"
weight = 0.5

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = """The app exhibits a significant, browser-observable responsiveness defect that is NOT covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered, answer no here."""
type = "binary"
negate = true
weight = 1.0
