[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "3.1"
name = "sidebar_shell_with_vault_brand"
description = """A persistent left sidebar holds a small vault brand mark and a vertical navigation list of Dashboard, Identities, Permissions, Audit log, and Settings with the active item visually distinct"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.2"
name = "consistent_icon_set"
description = """Navigation items, stat tiles, and permission rows each carry icons from one consistent icon set with no mixed icon styles across views"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.3"
name = "dashboard_identity_card_anatomy"
description = """The dashboard renders a single identity card with Active identity label, nickname, Key ready badge, monospace public-key surface with Copy npub, monospace masked private-key surface with reveal/hide, and Granted/Revoked pill badges for the four apps"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.4"
name = "stat_tiles_present"
description = """Below the identity card, three compact stat tiles show identity count, connected-app count, and audit-entry count"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.5"
name = "identities_grid_and_toolbar"
description = """Identities view shows a responsive card grid with search, sort, Undo/Redo, and Export vault controls; the active card is highlighted with an Active badge"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.6"
name = "permissions_panel_rows"
description = """Permissions view shows a panel naming the active identity with one row per application including a switch-style toggle"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.7"
name = "audit_entries_show_timestamps"
description = """Audit log entries render reverse-chronologically with timestamps"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.8"
name = "export_drawer_monospace_preview"
description = """The Export vault drawer shows a monospaced JSON preview with Copy, Download, and Import vault controls"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.9"
name = "both_themes_fully_styled"
description = """Dark and light theme surfaces are both fully styled for backgrounds, text, borders, and badges"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.10"
name = "monospace_for_keys_and_export"
description = """Monospace type is used for npub/nsec surfaces and the vault JSON preview; other UI uses the default sans type"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.11"
name = "control_state_treatments_both_themes"
description = """Buttons, inputs, and toggles show distinct default, hover, focus (visible ring), and disabled treatments in both themes"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.12"
name = "typography_has_clear_hierarchy"
description = """Typography shows a clear hierarchy: vault brand and view titles larger than card nicknames, which are larger than meta and key labels"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.13"
name = "sidebar_collapses_on_mobile"
description = """At 768px and below the sidebar collapses to a compact navigation control"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.14"
name = "identities_grid_single_column_at_375"
description = """At 375px width the Identities grid is a single column"""
type = "binary"
weight = 1.0


[[criterion]]
id = "3.15"
name = "content_overflows_viewport_at_375"
description = """At 375px width content clips or forces page-level horizontal scrolling because npub/nsec or vault JSON overflow their surfaces"""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.16"
name = "generic_unstyled_dashboard"
description = """The surface reads as a generic unstyled dashboard or starter page rather than a security-focused identity vault"""
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = """The app exhibits a significant, browser-observable visual design defect that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered by another criterion in this file, answer no here."""
type = "binary"
negate = true
weight = 1.0
