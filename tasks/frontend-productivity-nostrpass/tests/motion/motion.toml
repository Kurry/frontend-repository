[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Hovering nav items, buttons, identity cards, and the permission toggle shows a visible hover feedback wash (background/border/shadow change)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Clicking the theme control in Settings recolors the app surface immediately, with no flash of unstyled content and no full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Clicking the reveal-key control (a real click on the control, not a WebMCP state snap) visibly swaps the masked dot string for the real nsec value, and swaps back on a second click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Clicking the permission toggle switch animates its handle between the revoked and granted positions rather than jumping with no transition"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Switching the active identity changes the dashboard's displayed key and permission badges without a full page reload or visible flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "Interactive chrome has no hover state at all (buttons, nav items, and cards look identical hovered and unhovered)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "The reveal-key transition can only be observed by inspecting state directly (e.g. via WebMCP) because clicking the real control produces no visible change"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.8"
name = "new_identity_card_entrance_animates"
description = "Creating an identity through the real UI form makes the new card animate into the Identities grid with a brief entrance ease of roughly 150 to 300 milliseconds rather than appearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "audit_entry_animates_in_at_top"
description = "With the Audit log view visible, performing an action that records an entry makes the new entry animate in at the top of the list rather than snapping into place"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "confirmation_toast_slides_and_autodismisses"
description = "Creating an identity or changing a permission grant surfaces a brief confirmation toast that slides in, stays readable, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "reduced_motion_removes_animations"
description = "With prefers-reduced-motion set, entrance and toggle animations are removed and state changes apply instantly, while every feature (create, select, toggle, reveal, theme switch) remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
