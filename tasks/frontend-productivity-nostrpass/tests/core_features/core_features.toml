[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the dashboard view shows an active identity nickname, a public key rendered as an npub1-prefixed string, and a masked private key surface (no raw dashboard/starter placeholder content)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the Identities view lists at least 2 seeded identity cards, each with a distinct npub"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "identity_state_persisted_to_client_storage"
description = "After exercising the app (create, select, toggle, theme switch), localStorage (or equivalent client storage) holds persisted identity, active-identity, permission-grant, and theme state, and a reload restores all of it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "When the create-identity form is submitted with a label, a new identity card appears, the identity count increases by 1, and the new identity's npub differs from every existing identity's npub"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When the create-identity form is submitted with an empty label, a visible validation message appears and the identity count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When the create-identity form is cancelled, no new identity is added and the form closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After a newly created identity is added, it becomes the active identity and its data appears on the dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When an application's permission toggle is switched for the active identity, only that application's grant for that identity changes; the other three applications' grants for the same identity remain as they were"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After switching the active identity to a second seeded identity, the dashboard's displayed npub changes to the second identity's own key"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After switching identities, the Permissions view shows the second identity's own grants, not the grants that were toggled while the first identity was active"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When the reveal-key control is clicked, the masked nsec surface is replaced by a real nsec1-prefixed string for the active identity; clicking it again re-masks it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "The Audit log view lists at least one seeded entry on load and gains a new entry, shown first, after creating an identity, switching identities, or toggling a permission"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After reloading the page, the same identities (same npubs), the same active identity, and the same permission grants are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When the theme control in Settings is clicked, the app surface switches between light and dark without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Hovering interactive chrome (nav items, buttons, identity cards, permission toggle) shows a visible hover feedback wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Calling window.webmcp_list_tools() returns registered tools including an identity-create tool, an identity-select tool, and an application-permission toggle tool; invoking the toggle tool for the active identity and one named app changes that same toggle's visible state in the Permissions view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "The Audit log view records identity creation, identity selection, and permission toggle actions with the newest entry listed first"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "No control anywhere in the app performs outbound navigation (no working external links, no window navigation away from the app)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "The app is a static list of identity names with no working create/select/permission-toggle behavior (a non-interactive mock)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Cancelling the create-identity form still adds an identity, or leaves the collection changed"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "create_and_persist_flow_chain"
description = "Scripted flow: note the identity-count stat tile and Identities card count, submit the create-identity form with a valid label, and confirm — without any reload — that exactly one new card appears, the identity-count stat tile increased by exactly one, the dashboard shows the new identity's nickname and a freshly generated npub as active, and a creation entry sits at the top of the Audit log; then reload the page and confirm the new identity is still present with the same npub, is still the active identity, and the count still reflects it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "permission_toggle_flow_chain"
description = "Scripted flow: in the Permissions view toggle one application's grant for the active identity, then confirm — without a reload — that the dashboard's pill badge for that app flipped between Granted and Revoked, the connected-app stat tile changed by exactly one in the matching direction, and a grant/revoke entry sits at the top of the Audit log; then select a different identity and confirm its own grants are shown unmodified; finally reload the page and confirm the toggled grant on the first identity is restored exactly as set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "identity_switch_flow_chain"
description = "Scripted flow: from the Identities view select a second seeded identity and confirm — without a reload — that the dashboard's nickname, npub, and per-application pill badges all show that identity's own data, the Permissions view shows that identity's own grants rather than the previously active identity's, and a selection entry sits at the top of the Audit log; then reload the page and confirm the same identity is still active with the same npub"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "double_submit_creates_exactly_one"
description = "Rapidly double-activating the create-identity submit control creates exactly one identity: the card count and the identity-count stat tile each increase by exactly one, not two"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "reveal_state_not_carried_across_identities"
description = "Revealing one identity's nsec does not reveal any other identity's nsec, and after switching the active identity the dashboard's private-key surface for the new identity is masked rather than inheriting the previous identity's revealed state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "long_label_contained_in_card"
description = "Creating an identity with a label over 40 characters keeps the card layout intact: the label truncates or wraps within its card without overlapping the npub text or neighbouring cards"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.37"
name = "submit_disabled_until_label_valid"
description = "While the create-identity label field is empty or whitespace-only, an inline validation message naming the label field appears on interaction and the submit control stays disabled; entering a valid label enables submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
