[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = """Nav items, Select, Rename, Delete, reveal/hide, Copy npub, permission toggles, form fields, theme switch, Undo, Redo, Export vault, and Import vault are reachable and operable with the keyboard alone"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = """Delete and import confirmation dialogs move focus inside while open, close on Escape without applying, and return focus to the opener"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.3"
name = "images_and_icons_have_alt_text"
description = """Icon-only controls expose accessible names; decorative icons are hidden from assistive technology"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = """Validation messages, import errors, and copy/export confirmations are announced via a polite live region as well as shown visually"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = """Create, rename, and import fields have visible labels associated with their inputs"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = """View headings follow a logical order without skipping levels"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = """Sidebar navigation and main content use landmark roles or semantic nav/main regions"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = """Text keeps readable contrast in both light and dark themes, including badge and pill text"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = """Permission toggles expose switch semantics; buttons and links use appropriate roles"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = """With prefers-reduced-motion set, entrance and toggle animations are removed while features remain usable"""
type = "binary"
weight = 1.0


[[criterion]]
id = "1.11"
name = "matrix_switches_named_identity_and_app"
description = "Each All-identities matrix cell is a real switch whose accessible name names both its identity and its application, and Grant all/Revoke all controls are keyboard operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "rotation_dialog_manages_focus"
description = "The rotate-keys confirmation opens as a dialog: focus moves in while open, Escape closes without rotating, and focus returns to the invoking control"
type = "binary"
weight = 0.5

