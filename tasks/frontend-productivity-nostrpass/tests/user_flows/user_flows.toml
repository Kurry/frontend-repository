[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Create flow: submitting a valid identity label adds a card, increments the identity-count tile by one, activates the new identity on the dashboard, and includes it in the Export vault JSON preview"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: empty, whitespace-only, or over-40-character labels trigger inline validation naming the label field and add no identity"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.3"
name = "rename_flow_updates_related_displays"
description = "Rename flow: a valid rename updates the card label, the dashboard nickname when active, and the matching label in the Export vault JSON preview without a reload"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Delete flow: confirming delete on a non-sole identity removes the card, decreases the identity count by one, and drops the identity from the export preview"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.5"
name = "view_switch_retains_vault_state"
description = "View switch: navigating Dashboard, Identities, Permissions, Audit log, and Settings retains the same active identity, grants, and export-preview vault contents"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.6"
name = "search_empty_state_and_clear"
description = "Edge: a search that matches no identities shows an empty state with a clear-search control that restores every card"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.7"
name = "search_and_sort_update_grid"
description = "Search and sort: search narrows cards and Label A–Z versus Label Z–A reverses order from the live collection"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.8"
name = "sidebar_collapse_preserves_workflow"
description = "At 768px and below the sidebar collapses to a compact nav that still reaches all five destinations without losing the active identity"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.9"
name = "delete_and_import_dialogs_support_cancel"
description = "Delete and import confirmations can be cancelled without mutating identities, grants, theme, or the export preview"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.10"
name = "failed_import_recovers_without_reload"
description = "Recovery: a rejected import shows a field-named error and leaves the vault usable without a reload"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after a create or grant toggle, importing the exported vault JSON restores dashboard, Identities, Permissions, theme, and export preview to the pre-export mutated state including version nostrpass-vault-v1"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.12"
name = "undo_after_rename_or_delete_flow"
description = "Rename then Undo restores the prior label on card, dashboard, and export preview; delete then Undo restores the identity with the same npub and grants"
type = "binary"
weight = 1.0


[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Create, rename, delete, select, permission toggle, export, or import are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "New identities fail to show up or duplicate on create."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "Permission or active-identity changes are not synced across dashboard, Permissions, and export preview."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "View switching breaks layout or loses the active identity selection."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n5"
name = "blocked_last_delete_still_removes"
description = "Deleting the last remaining identity still removes it or leaves the UI broken."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Search results disagree with the cards actually shown."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "Collapsed sidebar cannot be re-opened to reach destinations."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Delete, import, or export overlays block navigation with no exit option."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed create, rename, or import provides no user feedback."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Navigation dead ends or requires reload for recovery."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
