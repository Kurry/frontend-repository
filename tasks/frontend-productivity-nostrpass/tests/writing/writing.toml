[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "15.1"
name = "headings_use_consistent_capitalization"
description = """Where the app renders headings and nav labels, capitalization is consistent across Dashboard, Identities, Permissions, Audit log, and Settings"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = """Where the app renders actions, labels use specific verbs such as Select, Rename, Delete, Export vault, Import vault, and Copy npub rather than generic OK"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = """Where the app renders validation or import errors, messages name the offending field and the fix"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = """Where the app renders a no-match search empty state, copy explains that no identities match and how to clear the search"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = """Where the app renders permission descriptions and audit lines, copy is complete phrases without lorem placeholder text"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.6"
name = "terminology_is_consistent"
description = """Where the app names identities, npub, nsec, and grants, terminology stays consistent across views"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.7"
name = "success_messages_are_specific"
description = """Where the app renders toasts after create, copy, export, or import, messages are specific to the action"""
type = "binary"
weight = 0.5


[[criterion]]
id = "15.n1"
name = "placeholder_copy_is_visible"
description = """Where the app renders UI copy, placeholder or lorem-ipsum text is visible."""
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = """Where the app renders prominent headings or errors, obvious typos or broken sentences appear."""
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.n3"
name = "concept_names_are_inconsistent"
description = """Where the app names the same concept, labels flip between conflicting terms across views."""
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.8"
name = "audit_entries_name_action_and_identity"
description = "Where the app renders audit entries, each names the action and the identity; rotation entries include shortened old and new npubs and bulk entries name the application and the number of identities changed."
type = "binary"
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = """The app exhibits a significant, browser-observable writing defect that is NOT covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered, answer no here."""
type = "binary"
negate = true
weight = 0.5
