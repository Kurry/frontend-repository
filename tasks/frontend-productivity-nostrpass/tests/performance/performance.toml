[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = """The app is interactive within 2 seconds of a local cold load"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.2"
name = "console_is_clean"
description = """No console errors or warnings appear during create, rename, delete, select, toggle, reveal, copy, export, import, theme switch, undo, redo, or reload"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = """View switches and permission toggles update the UI promptly without multi-second lag"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.4"
name = "export_preview_stays_responsive"
description = """Opening Export vault and regenerating the JSON preview after mutations stays responsive"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.5"
name = "identity_grid_renders_without_lag"
description = """The Identities grid with seeded plus newly created cards renders without visible lag"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = """Rapid identity switches and permission toggles leave the UI interactive"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = """Card entrance and toast animations do not visibly stutter under normal use"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = """Quickly toggling permissions or undoing and redoing produces no hangs or mixed-identity states"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.10"
name = "import_error_path_stays_responsive"
description = """Rejecting a bad import remains responsive and does not freeze the UI"""
type = "binary"
weight = 1.0


[[criterion]]
id = "9.11"
name = "bulk_apply_has_no_partial_states"
description = "A bulk Grant all or Revoke all across every identity applies as one immediate visible update with no per-row lag or partially applied intermediate states left on screen"
type = "binary"
weight = 1.0

