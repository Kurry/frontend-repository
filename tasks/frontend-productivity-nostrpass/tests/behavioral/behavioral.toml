[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: create an identity, toggle a grant, switch theme, then reload — all facets coherently reset to the seeded baseline (seeded identities, original active identity, original grants, seeded theme), never a mix of session and seed state"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: set Identities sort to Label A–Z, note order, then Label Z–A; the card order reverses relative to ascending, proving sort is derived from live data"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: toggle a permission grant and confirm the dashboard connected-app tile and Export vault JSON grants change meaningfully rather than staying identical"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: rename the active identity and confirm the new label appears on the Identities card, the dashboard nickname, and the Export vault JSON without reload"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the identity-count tile immediately before and after a valid create; the delta is exactly one"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: create two identities with different labels and confirm both cards show distinct labels and distinct npubs, and both appear distinctly in the export preview"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start create on Identities, switch to Permissions and toggle a grant, return and finish create — the grant change remains and the new identity appears without corrupting either flow"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.8"
name = "export_import_edge_round_trip"
description = "Edge-state round-trip: mutate the vault, export JSON, import it after confirmation — surfaces match the mutated vault; then reload and confirm return to seeded baseline"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.9"
name = "undo_round_trip_after_create"
description = "Undo round-trip: create an identity, confirm count and export include it, Undo — count, cards, and export match the pre-create state"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.10"
name = "export_pipeline_contains_session_work"
description = "Full-pipeline probe: create an identity and toggle one grant, then open Export vault — the JSON text contains the new label/npub/nsec and the updated grant boolean"
type = "binary"
weight = 1.0


[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, some session mutations survive while others reset, producing incoherent partial persistence instead of a full seeded baseline reset."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Dashboard connected-app count or export grants render identically regardless of permission toggles."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Creating identities with different labels yields identical labels or identical npubs in the UI or export."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "Rename or grant changes appear in one view but not another until reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.n5"
name = "export_omits_mutations_after_pipeline"
description = "After create and grant toggle, the Export vault JSON omits the new identity or still shows the prior grant."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.11"
name = "rotation_undo_exact_value_probe"
description = "Exact-value rotation probe: note the active identity's full npub text, rotate and confirm; the dashboard and Export vault show a different npub; Undo; the dashboard npub and the export preview match the noted string exactly, character for character"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "bulk_grant_matrix_probe"
description = "Bulk matrix probe: with at least three identities, note each identity's grant for one application, activate Grant all in that column; every cell in the column shows granted and the active identity's dashboard pill matches; a single Undo returns every identity to its noted prior state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "backup_delete_reimport_round_trip"
description = "Backup round-trip: export a backup of one identity (note its npub), delete that identity, then import the backup JSON; the identity returns with the same label, npub, nsec, and grants, the count returns to its prior value, and the vault export contains it again"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n6"
name = "bulk_undo_overcorrects"
description = "Undo after a bulk grant flips identities that already had the grant before the bulk action to revoked, or leaves some affected identities un-restored."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n7"
name = "audit_filter_mutates_log"
description = "Applying or clearing the audit action-type filter loses entries, reorders them, or otherwise changes the log content."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
