[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_are_designed"
description = "A no-match filter combination, an emptied grid, and a single-iteration poll each render a designed message with a next step (Clear filters, create guidance, needs-two-iterations note), never a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "New Persona, Edit, composition, poll setup, and bulk tag forms validate inline before submit with messages naming the offending field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and flow errors name the actual problem (trait must be 0 to 100, prompt body required, at least two iterations needed), not just 'Invalid'"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Create, clone, attach, bulk apply, and copy each produce visible success feedback naming what happened"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "streaming_shows_status"
description = "The test bench distinguishes waiting, streaming, and complete visibly, and stopping mid-stream leaves an honest frozen transcript"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded_and_undoable"
description = "Single and bulk delete require a confirmation naming the count, and undo restores deleted or archived personas exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "non_obvious_controls_have_help"
description = "Non-obvious controls — the blend weighting slider, variant tabs, the drop slot — carry hints, placeholder text, or tooltips explaining their use"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, selects, sliders, and labels across the toolbar, cards, and overlays use semantic elements rather than bare divs or spans"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "The editor modal and overlays close via their close control, Escape, and (for modals) a background click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "comparison_replacement_explained"
description = "Adding a persona to a full comparison replaces the older slot and the toast says so; cloning an archived persona yields an active clone"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty grid or no-match filter shows nothing at all — no message, no next-step control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "A failed form, poll, or run surfaces its error only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Create, attach, bulk apply, or copy silently succeeds or fails with no visible feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Delete or bulk delete executes immediately with no confirmation step"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Interactive affordances (card actions, facet entries, tray buttons, sliders) are bare divs or spans with no role or keyboard operability"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "A modal, overlay, or drawer cannot be dismissed via the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "An invalid form submits, mutates the collection, or gives no indication of what is wrong"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Primary controls carry ambiguous or missing labels (icon-only destructive actions with no accessible name, or generic 'OK' on data-changing steps)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "double_activation_double_applies"
description = "Double-activating New Persona's Submit creates two personas, or double-activating Run starts two overlapping streams"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "truncation_loses_data"
description = "A persona name longer than 40 characters is clipped with no way to see the full name in the editor or comparison"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
