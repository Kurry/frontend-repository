[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing across the toolbar, facet rail, grid, and views follow a consistent scale, with no arbitrary one-off values visible in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "specified_quantities_match"
description = "Specified quantities are implemented as written: at least 8 seeded personas across all 4 roles with distinct trait profiles, at least 6 distinct tags, at least 2 personas with 3 or more iterations, at least 4 scenarios, one seeded blended persona, 5 trait sliders, and at least 2 technique variant tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_spec"
description = "The realized layout matches the specified composition: view-switching toolbar, tag facet rail beside the 3/2/1-column card grid, bench with slot, scenario select, and transcript, comparison side by side"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "The state changes the spec calls out animate as specified: card entrance at roughly 200 milliseconds from scale 0.85, the flip at roughly 350 milliseconds with a midpoint swap, modals at 200 to 300 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Responsive behavior matches the spec: grid steps 3 to 2 to 1 columns, the facet rail collapses at 768 pixels and below, and the comparison stacks at narrow widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_is_consistent"
description = "Button, form, card, and badge radii, padding, and shadows are consistent across the library, bench, and comparison"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "The specified type hierarchy is realized: app title above view headings above card titles above body and label text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Default, hover, focus, disabled, and error component states are all present as specified, including the gated Submit and disabled Undo/Redo states"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "role_color_mapping_matches"
description = "The specified role color mapping is realized exactly — Coder blue, Writer green, Analyst cyan, Reviewer yellow — on card borders, the role filter, and comparison headers"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the app's own scale, producing uneven card gutters or misaligned panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "seed_quantities_wrong"
description = "Seeded quantities fall short of the spec (fewer than 8 personas, missing role coverage, fewer than 4 scenarios, missing iterations, tags, or the blended persona)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "required_animations_missing_or_wrong"
description = "A specified animation (card entrance, flip, modal, drawer, vote arrival) is missing or grossly off its specified behavior when driven through the real control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls render with browser default styles where the spec styles them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "elements_are_clipped_or_offscreen"
description = "Cards, charts, overlays, or drawers render off-screen or clipped at the specified breakpoints"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "structure_deviates_from_spec"
description = "The realized structure deviates from the spec — missing card elements (role border, tone badge, tag chips, preview), missing views, or missing trait axes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable deviation from the spec that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the deviation and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the deviation is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
