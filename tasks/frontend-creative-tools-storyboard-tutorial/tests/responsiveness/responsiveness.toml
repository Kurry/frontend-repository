[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable storyboard: header, Tile/List/Slide toggles, and the scene board remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, Tile/List/Slide toggles, Add Scene, slide previous/next, and header utility tools present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Header titles (Demo Projects, 1. Getting Started), scene descriptions, and control labels remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no content clips or overflows the viewport in Tile, List, or Slide mode."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "tile_grid_reflows_below_768"
description = "At widths of 768px and below, Tile mode reflows to fewer columns and the header condenses without losing the title or utility tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At 375px width, header, view toggles, and scene cards reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At 375px width, tap/click activation works on Tile/List/Slide toggles, Add Scene, slide previous/next, and scene description edit."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling in any view mode."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "scene_thumbnails_scale"
description = "Scene thumbnail images and the Tile multi-column grid size responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "slide_and_create_controls_accessible"
description = "In Slide mode and on the Add Scene form, previous/next, the N / total counter, and form fields stay fully visible and operable at 375px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the storyboard layout breaks: overlapping cards, overflow, or an unusable header/board stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px width, Tile/List/Slide toggles, Add Scene, slide previous/next, or header tools are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "board_text_unreadable_on_mobile"
description = "At 375px width, scene descriptions, header titles, or view-toggle labels are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 375px or 1440px, board content is cropped or unnecessary scrollbars appear for content that should fit the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "header_tools_missing_below_768"
description = "At 768px and below, the storyboard title or header utility tools are missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_board"
description = "Fixed-position header or back-to-top chrome obscures scene cards or view toggles so they cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px width, header, toggles, and scene cards overlap into an unusable stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "mobile_slide_or_create_inoperable"
description = "At 375px width, Slide previous/next or the Add Scene form cannot be opened or operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "thumbnails_static_size_overflow"
description = "Scene thumbnails or the Tile grid use a static size that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "At 375px or 1440px, required controls (Tile/List/Slide, Add Scene, or header title/tools) disappear from the layout."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "export_import_usable_at_375"
description = "At 375px width the Export center, Import surface, create form, and bulk action bar remain readable and operable without horizontal page scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.12"
name = "header_keeps_export_below_768"
description = "At widths of 768px and below the header still exposes Export and Import (or an equivalent reachable overflow) without losing the storyboard title"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_clipped_on_mobile"
description = "At 375px width Export or Import controls or preview text are clipped or force horizontal scrolling"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.13"
name = "presenter_and_filters_at_375"
description = "At 375px width the search field, shot-type chips, and Present control remain reachable and operable, and a running presenter keeps its scene content, countdown, progress readouts, and control strip visible and operable without horizontal page scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n12"
name = "presenter_clipped_at_375"
description = "At 375px width the presenter's countdown, progress readouts, or controls render clipped or off-screen, or the search field and filter chips force horizontal page scrolling"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
