[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_board_state_after_delete_all"
description = "Deleting every scene leaves a visible empty-board state that explains the board is empty and offers a way to add a scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "create_form_inline_validation"
description = "The Add Scene form validates title and description inline before submit: an empty required field shows a per-field message naming that field, and the submit control stays disabled until both fields are valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "empty_fields_block_scene_create"
description = "Submitting the create form with an empty required title or description adds no scene: the visible scene count is unchanged and an inline validation message names the empty field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "double_submit_adds_exactly_one_scene"
description = "Double-activating the create form's submit control adds exactly one scene: the count increases by one and one new card appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "slide_bounds_disable_without_wrap"
description = "In Slide mode the previous control is disabled at the first scene and the next control is disabled at the last scene; arrow keys at the bounds leave the centered scene unchanged (no wrap)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "inert_header_tools_toast_demo_only"
description = "Clicking an inert header utility control (notifications bell, dashboard, account, or kebab) raises a demo-only toast instead of navigating away or breaking the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "submit_disabled_until_create_valid"
description = "On the Add Scene form, the submit control remains disabled while title or description is empty/invalid and enables only after both fields are valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "board_controls_use_semantic_tags"
description = "Header tools, Tile/List/Slide toggles, Add Scene, slide previous/next, and create-form fields use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "create_form_cancel_leaves_board_unchanged"
description = "Cancelling or dismissing the Add Scene form without a valid submit leaves the scene count and board cards unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "slide_counter_tracks_bounds"
description = "In Slide mode the N / total counter tracks the centered scene; at the first scene N is 1 and previous is disabled, and at the last scene N equals total and next is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_board_has_no_feedback"
description = "After deleting every scene, the board region shows nothing and provides no empty-state feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "validation_errors_only_in_console"
description = "Add Scene validation failures are surfaced only in the browser console with no visible inline message naming the empty field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "create_or_delete_silent_failure"
description = "A valid Add Scene submit or a scene delete fails silently: the board cards and scene count stay unchanged with no visible feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "delete_lacks_destructive_affordance"
description = "Scene delete proceeds with no clear destructive affordance when that action is exposed on a scene card."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_controls_nonsemantic_only"
description = "Primary interactive controls (view toggles, Add Scene, slide nav, create fields) are non-semantic div/span wrappers with no button/input/label role."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "create_form_not_keyboard_dismissible"
description = "The open Add Scene form cannot be dismissed via keyboard (Escape or an equivalent cancel path)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Create-form validation feedback is missing or delayed with no UI indication while the submit control remains enabled for an empty required field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "primary_actions_ambiguous_labels"
description = "Primary Add Scene, Tile/List/Slide, or slide previous/next labels are missing or so generic that the action is ambiguous."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "slide_wraps_at_bounds"
description = "At the first or last scene in Slide mode, previous/next or Left/Right arrow keys wrap to the opposite end of the board."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "double_submit_creates_duplicates"
description = "Double-activating the create form's submit control creates more than one scene or increases the count by more than one."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "4.11"
name = "out_of_contract_duration_rejected"
description = "Entering a duration outside 1–300 on Add Scene adds no scene, leaves the count unchanged, and shows an inline validation message naming duration."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_undo_redo_disabled"
description = "On a fresh load with no mutations, Undo and Redo stay disabled and Ctrl+Z / Ctrl+Y change nothing on the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "bulk_delete_requires_two_selected"
description = "With fewer than two scenes selected, Delete selected is absent or disabled and activating it does not remove scenes."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "schema_invalid_import_rejected"
description = "Importing malformed Storyboard JSON or JSON failing the StoryboardDocument field contract (wrong schemaVersion, bad enums, duration bounds, missing keys) leaves scenes and view mode unchanged and shows a visible error naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "empty_board_total_duration_zero"
description = "After deleting every scene, Total duration shows 0 and the empty-board state still offers a way to add a scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "invalid_import_partially_applies"
description = "A schema-invalid Storyboard JSON import applies a partial subset of scenes or changes view mode despite the error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "out_of_bounds_duration_accepted"
description = "Add Scene accepts a duration below 1 or above 300 and still creates a scene."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.16"
name = "filtered_empty_state_with_clear"
description = "When search and shot-type filter together match no scene, the board shows a filtered-empty state naming that no scenes match with a Clear filters control that restores the full set, while the Total duration readout keeps the full-collection sum."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "presenter_bounds_and_empty_board"
description = "With an empty board or an empty filtered subset the Present control is disabled; in a running presentation, manual advance at the last scene and the final countdown reaching zero both land on the finished state — the presentation never wraps back to the first scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "bulk_bar_two_selection_threshold"
description = "The bulk action bar exposes Delete selected and Duplicate selected only when two or more scenes are selected; with fewer selected the actions are absent or disabled and activating them changes nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n13"
name = "empty_presenter_opens_blank"
description = "Starting Present with no scenes (or an empty filtered subset) opens a blank or broken presenter instead of the control being disabled."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
