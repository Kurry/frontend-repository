[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_board_eight_imaged_scenes"
description = "On first load, Tile mode shows at least 8 seeded imaged scenes, each numbered with a thumbnail and an editable description, and later scenes carry sequential getting-started copy (header tools, view modes, three-dot menu, Add Scene)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "created_scene_visible_on_board"
description = "After creating a scene titled 'Harbor Opening' with valid Scene field-contract fields (title, body, duration, shotType), the text 'Harbor Opening' is visible on the board with matching duration and shot-type badge"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "three_creates_add_exactly_three"
description = "After adding 3 new scenes on top of the seed set, the board shows exactly 3 more scenes than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "slide_mode_single_centered_scene"
description = "After switching to Slide (Tutorial) mode, a single centered active scene is visible with navigation affordances"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "edited_text_replaces_previous"
description = "After editing a scene description/title to 'Evening Cutaway', the text 'Evening Cutaway' is visible and the previous text is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "deleted_scene_removed_from_board"
description = "After deleting a scene, that scene's title/description is no longer visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_board_state_offers_add"
description = "After deleting every scene, a visible empty-board state explains that the board is empty and offers a way to add a scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_submit_blocked_with_validation"
description = "After submitting the create form with an empty required title or body, the visible scene count is unchanged and an inline validation message naming the empty field is shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "view_mode_switch_relayouts_without_reload"
description = "After switching among Tile, List, and Slide view modes, the same scene set re-lays out without a full page navigation or document reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "scene_one_welcome_line_and_doc_title"
description = "Scene 1's description opens with the line 'Welcome to Docs!' and the document title is '1. Getting Started — Docs'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "back_to_top_appears_after_scroll"
description = "After scrolling the board down past roughly 400px a back-to-top control appears; clicking it returns the board to the top and the control hides"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "crud_updates_derived_counts"
description = "The scenes collection supports create, edit, and delete from the UI, with scene numbering and the Slide N / total counter updating from the same shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "view_mode_and_slide_state_shared"
description = "View mode and slide index behave as shared client state: switching modes re-lays out the same scene set without a document reload, and the Slide counter total always matches the number of scenes currently on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "static_html_no_working_crud"
description = "Scenes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "outbound_link_navigation"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "slide_controls_keys_counter_bounds"
description = "Slide mode shows a single centered active scene with a previous/next control pair and an N / total counter; the Left/Right arrow keys and the controls advance the scene, and the controls are disabled at the first and last scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "placeholder_scenes_and_add_scene_control"
description = "The board ends with at least 2 empty camera placeholder scenes (each showing a centered add-image affordance) followed by an Add Scene control pairing a primary button with a dropdown chevron"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "inert_header_controls_toast_demo_only"
description = "Clicking an inert header control (kebab menu, notifications bell, dashboard, or account) raises a demo-only toast instead of navigating to another view or origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "edit_flow_cross_mode_chain"
description = "Starting in Tile mode, edit a scene's description to 'Cutaway to the harbor at dusk.'; then switch to List mode and Slide mode: the same numbered scene shows the updated text in both modes without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "slide_bounds_not_enforced"
description = "In Slide mode the previous/next controls stay enabled at the first and last scene (no boundary disable), or the Left/Right arrow keys do not advance the centered scene"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "create_flow_cross_mode_chain"
description = "Starting in Tile mode, count the visible scenes; create a scene via Add Scene with title 'Dawn Chase' and a valid description; the count increases by exactly one and the new scene appears numbered at the end of the grid; then switch to List mode ('Dawn Chase' is present) and to Slide mode (the N / total counter total increased by one) — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "delete_flow_renumber_chain"
description = "Delete a scene from the middle of the board: its card is removed, the remaining scenes renumber sequentially with no gaps, and in Slide mode the N / total counter total decreases by one with the previous/next controls disabling at the new first and last scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "slide_arrow_full_walk"
description = "Entering Slide mode at scene 1 and pressing the Right arrow repeatedly advances through every scene in order with the N / total counter incrementing each step; pressing Left repeatedly walks back the same sequence to scene 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "reload_returns_seeded_state"
description = "After creating a scene, switching to List mode, and advancing to a later slide, a page reload returns the app to its seeded state: the seeded scenes only, Tile mode active, and the first slide position — all facets reset together, never a mix of kept and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "double_submit_adds_exactly_one"
description = "Double-activating the create form's submit control in quick succession adds exactly one scene: the visible scene count increases by one and exactly one new card appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "arrow_keys_no_wrap_at_bounds"
description = "In Slide mode, pressing Left at the first scene and Right at the last scene leaves the centered scene and the N / total counter unchanged (no wrap-around)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "inline_validation_before_submit_names_field"
description = "Typing an invalid or empty value in a create-form field (title, body, duration, or shotType) shows an inline validation message directly under that field, naming the field, before any submit occurs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "create_submit_disabled_until_valid"
description = "In the Add Scene create form, the submit control is disabled while any Scene field-contract field is empty or invalid, and becomes enabled once title, body, duration, and shotType are all valid"
type = "binary"
weight = 1.0


[[criterion]]
id = "1.37"
name = "scene_field_contract_on_create"
description = "Add Scene create form enforces the Scene field contract: title (1–80), body/Description (1–500), duration integer 1–300, and shotType one of wide/medium/close-up/insert/pov; submit stays disabled until valid, and a successful create shows matching title, body, duration, and shot-type badge on the new card"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "invalid_duration_or_shot_type_rejected"
description = "Entering a duration outside 1–300 or leaving shot type unset/invalid on Add Scene shows an inline validation message naming duration or shotType, adds no scene, and leaves the visible scene count unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "total_duration_live_rollup"
description = "The nav bar Total duration equals the sum of every scene's duration in seconds and recomputes immediately after create, edit, delete, bulk delete, or reorder"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "multi_select_bulk_delete"
description = "Selecting at least two scenes reveals a bulk Delete selected control; confirming it removes every selected scene, renumbers survivors with no gaps, and updates Slide total and Total duration in one step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "undo_redo_scene_mutations"
description = "After create, edit, or delete, Undo restores the prior scenes collection, numbering, and Total duration and enables Redo; Redo reapplies the mutation; Undo/Redo disable at empty stacks; Ctrl+Z and Ctrl+Shift+Z (or Ctrl+Y) drive the same history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "export_center_storyboard_json_and_markdown"
description = "Export opens a center with live Storyboard JSON, Markdown shot list, and Printable outline previews plus Copy and Download on the active format; Storyboard JSON shows schemaVersion storyboard-tutorial-v1, title, viewMode (tile/list/slide), totalDuration, and scenes entries with id, title, body, duration, shotType, and order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "export_contains_session_mutations"
description = "After creating a scene with a distinctive title and duration, editing another scene's shot type, and switching to List, reopening Export shows those values under the field-contract keys in Storyboard JSON (viewMode list, new title/duration, updated shotType, matching totalDuration) and the Markdown shot list names the same title, shot type, and duration"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "import_round_trip_reconstructs_board"
description = "After exporting Storyboard JSON from a mutated board, changing the board further, then Importing that JSON reconstructs scenes, view mode, and Total duration to match the export without a reload, and both Export previews match the restored state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "scene_reorder_updates_order"
description = "Using Move earlier/later (or drag-reorder) on a scene changes board order, renumbers sequentially with no gaps, keeps Total duration unchanged, and makes Slide mode walk the new sequence"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n37"
name = "export_omits_session_mutations"
description = "After creating or editing a scene with distinctive field-contract values, the Storyboard JSON or Markdown export preview omits those session mutations or shows a static seeded-only document"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n38"
name = "schema_invalid_import_mutates_board"
description = "Importing malformed JSON or JSON that fails the StoryboardDocument field contract still changes the visible scenes collection or view mode"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n39"
name = "undo_does_not_restore_board"
description = "After a create, edit, or delete, activating Undo leaves the board, numbering, or Total duration unchanged from the post-mutation state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.46"
name = "search_and_shot_type_filter"
description = "The nav bar exposes a search field and shot-type chips (All plus Wide, Medium, Close-up, Insert, POV): typing a query narrows visible scenes to case-insensitive title/body matches, selecting a chip narrows to that shot type, using both intersects, a filtered-count readout shows N of M scenes, Tile/List/Slide show the same filtered subset (Slide total equals the filtered count), and clearing search plus selecting All restores the full set exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "bulk_duplicate_selected"
description = "With two or more scenes selected, Duplicate selected appends one copy per selected scene at the end of the board in board order — each copy keeping the source body, duration, and shot type with its title suffixed (copy) — renumbers sequentially, and increases Total duration by exactly the sum of the duplicated durations in one undoable step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "presenter_mode_playback"
description = "Activating Present replaces the workspace with a presenter showing one scene (image, number, title, body, shot-type badge) and a countdown starting at that scene's duration in seconds; when the countdown reaches zero the presenter auto-advances and the countdown resets to the new scene's duration; a Scene N of total readout and an overall progress bar track the run; End presentation or Escape exits back to the previous view mode with the board intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "presenter_pause_resume_manual_advance"
description = "In the presenter, Pause freezes the countdown and becomes Resume, resuming continues from the remaining seconds rather than restarting the scene; Right/Left arrow keys and the visible next/previous controls advance manually with the countdown resetting to the shown scene's duration; after the last scene the presenter shows a finished state with Restart and Exit rather than wrapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "printable_outline_export"
description = "The Export center's Printable outline tab shows a print-optimized outline compiled live from the store — board title, Total duration, and one row per scene in board order with number, title, shotType label, and duration in seconds — Copy and Download work on its text, and a Print control on that tab opens the browser print preview showing the outline layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n40"
name = "filter_desyncs_modes_or_total_duration"
description = "While a search or shot-type filter is active, Tile, List, and Slide disagree about the visible subset or count, or the Total duration readout changes to a filtered sum instead of keeping the full-collection sum"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n41"
name = "presenter_countdown_ignores_durations"
description = "In the presenter, two scenes with clearly different duration values show identical countdown lengths or identical auto-advance timing, or the countdown is a fixed interval that ignores each scene's duration"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core feature behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
