[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "scene_enter_delight_beyond_minimum"
description = "Beyond the required short fade/upward settle on first load, scene cards include an extra delightful microinteraction (for example a richer stagger cadence or soft glow settle) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "mode_reflow_storytelling_beyond_snap"
description = "Tile/List/Slide re-layout offers an advanced transition beat beyond basic reposition — for example coordinated card morphing or a memorable slide wipe — verified through real toggle interaction (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_getting_started_coachmarks"
description = "A brief guided first-run or coachmark flow introduces view modes, Add Scene, and the three-dot menu without blocking the workspace (bonus beyond required seeded tutorial copy)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "scene_overview_graphic_extra_usability"
description = "An interactive graphic beyond the required scene grid — for example a mini filmstrip overview or progress-through-tutorial cue — adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "alternate_board_input_beyond_click"
description = "Beyond basic Tab/Enter operability, the board supports an alternate input such as keyboard shortcuts for Add Scene or mode switching that stay discoverable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last-focused scene until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_docs_storyboard_narrative"
description = "The Welcome to Docs! line, Demo Projects chrome, and getting-started scene copy read as a cohesive branded tutorial narrative rather than generic unstyled cards (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "yellow_accent_craft_beyond_minimum"
description = "Yellow accent craft goes beyond bare compliance — cohesive accent application across toggles, edit wash, and toasts without inventing a conflicting second product look (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local Gabarito font rendering or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_storyboard_feel"
description = "The overall workspace feels competition-grade: scene card density, mode switching, and Slide presentation read as a professional storyboard instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_board_only"
description = "The shipped UI is a bare unstyled list or plain text controls with no product header, multi-column scene grid, or view-mode immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified docs/storyboard product chrome (Demo Projects header, getting-started tutorial board)."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "11.11"
name = "export_coachmark_after_first_edit"
description = "Optional: a brief coachmark points at Export after the first scene edit (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.12"
name = "presenter_rehearsal_summary"
description = "Optional: after a completed presenter run, a rehearsal summary appears (for example total time presented or per-scene overrun cues) beyond the required finished state (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
