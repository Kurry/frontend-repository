[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_storyboard_controls"
description = "Every interactive control — header tools, Tile/List/Slide toggles, scene actions, Add Scene create form, and slide previous/next — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_form_focus_management"
description = "When the Add Scene create form opens as a dialog or overlay, focus moves into the form; closing it returns focus to a sensible origin control such as Add Scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "scene_thumbnails_have_alt_text"
description = "Every scene thumbnail image carries descriptive alternative text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "create_validation_announced_live"
description = "Create-form validation messages are announced via an aria-live polite region as well as shown inline under the field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "create_fields_explicitly_labeled"
description = "The Add Scene title and description fields use explicit label elements associated with those controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Workspace headings (for example the storyboard title 1. Getting Started and section labels) follow a logical order with no skipped levels."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example header/nav for chrome and main for the scene board) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Header titles, scene description text, view toggles, and primary buttons meet sufficient contrast against their surfaces on the light workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "active_view_toggle_exposed_to_at"
description = "The active Tile, List, or Slide toggle exposes its pressed state to assistive technology (for example aria-pressed or an equivalent selected state), not only a visual highlight."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, scene entrance staggers and Tile/List/Slide layout animations are removed and state changes apply instantly while every feature — create, edit, delete, and slide navigation — stays usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "undo_redo_export_import_keyboard"
description = "Undo, Redo, Export, Import, multi-select checkboxes, and bulk Delete selected are reachable and operable with the keyboard alone with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "import_validation_announced_live"
description = "Import field-contract validation errors are announced via an aria-live polite region as well as shown inline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "search_chips_presenter_keyboard"
description = "The search field carries a programmatically associated label, each shot-type filter chip exposes its selected state to assistive technology, and the Present control plus all presenter controls (Pause/Resume, previous/next, End presentation) are keyboard reachable and operable with visible focus indicators"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "presenter_escape_and_announcements"
description = "In the presenter, pressing Escape always exits back to the board, and scene changes (manual or auto-advance) are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

