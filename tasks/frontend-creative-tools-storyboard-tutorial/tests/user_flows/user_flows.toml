[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_scene_updates_all_modes"
description = "Create flow: after submitting Add Scene with a valid title and description, the board scene count increases by exactly one, the new scene appears numbered at the end of the grid in Tile mode, and switching to List then Slide shows that same new scene with the Slide N / total counter total increased by one — all without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: leaving the title or description empty keeps the submit control disabled, shows an immediate inline validation message naming the empty field under that field, and adds no scene to the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_description_echoes_across_modes"
description = "Edit flow: changing a scene description in Tile mode, then switching to List and Slide, shows the updated text on that same numbered scene in every mode without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_renumbers_and_updates_slide_total"
description = "Delete flow: deleting a scene removes its card, renumbers the remaining scenes sequentially with no gaps, and reduces the Slide N / total counter total by one so previous/next disable at the new first and last scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_mode_switch_keeps_scene_set"
description = "View/mode switch: activating Tile, List, and Slide toggles re-lays out the same scene set without reloading the document; the active toggle stays visibly pressed and scene content remains intact across switches."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_board"
description = "Edge: after deleting every scene, a visible empty-board state explains the board is empty and offers a way to add a scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "slide_arrows_walk_full_sequence"
description = "Slide walk: entering Slide mode and pressing Right repeatedly advances through every scene in order while the N / total counter increments each step; pressing Left walks back the same sequence."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "back_to_top_returns_after_scroll"
description = "Board navigation: after scrolling the board down, a back-to-top control appears and returns the board to the top while the scene set and active view mode remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "create_form_closes_after_valid_submit"
description = "Create overlay: submitting a valid Add Scene form closes the create form and shows the new scene on the board without trapping navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_restores_seeded_baseline"
description = "Recovery: a page reload returns the app to its seeded state — seeded scenes visible, Tile mode active, and the first slide position — with no dead end requiring a second reload to recover."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "scene_crud_unavailable_from_ui"
description = "Add Scene create, description edit, or scene delete cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_scene_missing_or_duplicated"
description = "Submitting one valid Add Scene either fails to show a new card or creates duplicate cards for a single submit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "description_edit_desyncs_modes"
description = "After editing a scene description in Tile mode, List or Slide still shows the pre-edit text for that numbered scene until a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_scenes"
description = "Switching among Tile, List, and Slide breaks the layout or loses scenes from the shared set."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_board_state_broken"
description = "After deleting every scene, the board region is blank or broken with no empty-state explanation and no way to add a scene."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "slide_walk_skips_or_wraps"
description = "In Slide mode, Right/Left arrow walks skip scenes, wrap past the ends, or leave the N / total counter out of sync with the centered scene."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "back_to_top_missing_or_stuck"
description = "After scrolling the board down, the back-to-top control is missing, or activating it leaves the board stuck away from the top."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "create_form_blocks_with_no_exit"
description = "The Add Scene create form blocks the workspace with no working exit after open (no cancel/close path that returns to the board)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_create_lacks_feedback"
description = "An empty required title or description on Add Scene provides no visible inline validation naming the empty field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "reload_leaves_mixed_user_state"
description = "After creating or editing scenes and switching modes, a reload leaves a mix of user mutations with seeded baseline (for example a created scene survives while Tile mode resets, or vice versa)."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.11"
name = "create_updates_total_duration"
description = "Create flow: after a valid Add Scene with a known duration, Total duration increases by exactly that many seconds and the new card shows the matching duration and shot-type badge."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "bulk_delete_flow"
description = "Bulk delete flow: select at least two scenes, confirm Delete selected — every selected scene is gone, survivors renumber with no gaps, and Slide total plus Total duration update together without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "undo_redo_flow"
description = "Undo/redo flow: create a scene, Undo removes it and restores Total duration, Redo restores the scene; a new create after Undo leaves Redo disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "mutation_to_export_flow"
description = "Export flow: after creating a distinctive scene and switching to List, open Export — Storyboard JSON shows schemaVersion storyboard-tutorial-v1, viewMode list, and the session title/duration/shotType under field-contract keys; Markdown names the same; Copy shows Copied! confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "export_import_round_trip_flow"
description = "Round-trip flow: Download or Copy Storyboard JSON after a mutation, change the board, Import that document — scenes, view mode, and Total duration match the export without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_flow_missing_or_static"
description = "Export is missing, or after a session mutation the Storyboard JSON / Markdown preview stays identical to the pre-mutation seeded export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n12"
name = "import_round_trip_fails"
description = "Importing a previously exported valid Storyboard JSON fails to reconstruct the exported scenes, view mode, or Total duration."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.16"
name = "search_filter_flow"
description = "Search and filter flow: create a scene with a distinctive title and the POV shot type; typing a unique part of that title into search shows only that scene in Tile and List with the filtered count reading 1 of M; clearing search and selecting the POV chip shows only POV scenes including the new one; selecting All and clearing search restores the full set exactly — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "presenter_end_to_end_flow"
description = "Presenter flow: Present shows the first scene with its countdown at that scene's duration; Pause freezes the remaining seconds and Resume continues from them; a short scene's countdown reaching zero auto-advances with Scene N of total incrementing; advancing past the last scene shows the finished state with Restart and Exit; Exit returns to the previous view mode with the board, selection, and undo history intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "bulk_duplicate_flow"
description = "Duplicate flow: selecting two scenes and activating Duplicate selected appends both copies at the end with (copy) titles, renumbers sequentially, and updates the Slide counter total and Total duration together without a reload; Undo reverses the whole duplication in one step."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.19"
name = "outline_print_flow"
description = "Outline flow: after a session mutation, opening Export and selecting Printable outline shows the live outline (board title, Total duration, ordered scene rows), and activating Print opens the browser print preview of that outline layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n13"
name = "presenter_dead_end"
description = "The presenter cannot be exited (End presentation and Escape both fail), or exiting loses the board state, selection, or undo history that existed before presenting."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n14"
name = "filter_flow_desync"
description = "With a search query or shot-type chip active, switching among Tile, List, and Slide shows different subsets or counts for the same filter state."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
