[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_scene_updates_all_modes"
description = "Create flow: after submitting Add Scene with a valid title and description, the board scene count increases by exactly one, the new scene appears numbered at the end of the grid in Tile mode, and switching to List then Slide shows that same new scene with the Slide N / total counter total increased by one — all without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: leaving the title or description empty keeps the submit control disabled, shows an immediate inline validation message naming the empty field under that field, and adds no scene to the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_description_echoes_across_modes"
description = "Edit flow: changing a scene description in Tile mode, then switching to List and Slide, shows the updated text on that same numbered scene in every mode without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_renumbers_and_updates_slide_total"
description = "Delete flow: deleting a scene removes its card, renumbers the remaining scenes sequentially with no gaps, and reduces the Slide N / total counter total by one so previous/next disable at the new first and last scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_mode_switch_keeps_scene_set"
description = "View/mode switch: activating Tile, List, and Slide toggles re-lays out the same scene set without reloading the document; the active toggle stays visibly pressed and scene content remains intact across switches."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_board"
description = "Edge: after deleting every scene, a visible empty-board state explains the board is empty and offers a way to add a scene."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "slide_arrows_walk_full_sequence"
description = "Slide walk: entering Slide mode and pressing Right repeatedly advances through every scene in order while the N / total counter increments each step; pressing Left walks back the same sequence."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "back_to_top_returns_after_scroll"
description = "Board navigation: after scrolling the board down, a back-to-top control appears and returns the board to the top while the scene set and active view mode remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "create_form_closes_after_valid_submit"
description = "Create overlay: submitting a valid Add Scene form closes the create form and shows the new scene on the board without trapping navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_restores_seeded_baseline"
description = "Recovery: a page reload returns the app to its seeded state — seeded scenes visible, Tile mode active, and the first slide position — with no dead end requiring a second reload to recover."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "scene_crud_unavailable_from_ui"
description = "Add Scene create, description edit, or scene delete cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_scene_missing_or_duplicated"
description = "Submitting one valid Add Scene either fails to show a new card or creates duplicate cards for a single submit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "description_edit_desyncs_modes"
description = "After editing a scene description in Tile mode, List or Slide still shows the pre-edit text for that numbered scene until a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_scenes"
description = "Switching among Tile, List, and Slide breaks the layout or loses scenes from the shared set."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_board_state_broken"
description = "After deleting every scene, the board region is blank or broken with no empty-state explanation and no way to add a scene."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "slide_walk_skips_or_wraps"
description = "In Slide mode, Right/Left arrow walks skip scenes, wrap past the ends, or leave the N / total counter out of sync with the centered scene."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "back_to_top_missing_or_stuck"
description = "After scrolling the board down, the back-to-top control is missing, or activating it leaves the board stuck away from the top."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "create_form_blocks_with_no_exit"
description = "The Add Scene create form blocks the workspace with no working exit after open (no cancel/close path that returns to the board)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_create_lacks_feedback"
description = "An empty required title or description on Add Scene provides no visible inline validation naming the empty field."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "reload_leaves_mixed_user_state"
description = "After creating or editing scenes and switching modes, a reload leaves a mix of user mutations with seeded baseline (for example a created scene survives while Tile mode resets, or vice versa)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
