[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_lift_shadow_brighten"
description = "Hovering a scene card with the real pointer eases the card upward with a soft shadow and brightens the scene image, and hovering header controls or mode toggles eases their background or press treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_hover_feedback"
description = "Board/Slide mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "back_to_top_smooth_scroll"
description = "A back-to-top control appears only after the board is scrolled down past roughly 400px and smoothly returns the board to the top when clicked"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "entrance_stagger_on_fresh_load"
description = "On a fresh page load (not a revisit of an already-loaded page), the scene cards stagger in with a short fade and a slight upward settle"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "mode_switch_cards_animate_positions"
description = "Clicking the Tile, List, or Slide toggle (the real UI control, not a state shortcut) re-lays out the same scene set with the cards animating to their new positions rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "add_remove_renumber_animate"
description = "After creating a scene through the create form, the new card animates into the grid; after deleting a scene through its UI control, the card animates out and the remaining cards slide smoothly into their renumbered positions"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "toasts_slide_in_and_fade_out"
description = "Demo-only and mode-name toasts slide in, remain readable while shown, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "edit_focus_yellow_wash_dashed_outline"
description = "Focusing a scene description for editing applies a soft yellow wash and a dashed outline to it while editing is active"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "slide_advance_brief_transition"
description = "In Slide mode, activating the previous/next controls advances the centered active scene with a brief transition rather than an instant swap"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "reduced_motion_removes_animation"
description = "With prefers-reduced-motion set, entrance staggers and layout animations are removed and state changes apply instantly, while every feature stays usable"
type = "binary"
weight = 1.0


[[criterion]]
id = "4.13"
name = "export_import_panel_transition"
description = "Opening and closing the Export center or Import surface shows a brief opacity/scale transition of roughly 200 to 300 milliseconds rather than a hard cut (verified via real Export/Import controls)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "bulk_delete_cards_animate_out"
description = "Confirming Delete selected animates the removed cards out together and remaining cards settle into renumbered positions rather than vanishing in a single frame"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "copied_toast_fade"
description = "Copy on an Export format shows a Copied! toast that slides in and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "presenter_transitions_and_progress"
description = "Entering and exiting the presenter via the real Present and End presentation controls uses a brief transition, scene advances (manual and auto) transition with a short slide or fade rather than an instant swap, and the countdown and overall progress bar deplete or fill smoothly (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "filter_apply_animates_cards"
description = "Typing in search or toggling a shot-type chip via the real controls animates the affected scene cards out of and into the grid rather than snapping the layout in a single frame (unless prefers-reduced-motion is set)"
type = "binary"
weight = 0.5

