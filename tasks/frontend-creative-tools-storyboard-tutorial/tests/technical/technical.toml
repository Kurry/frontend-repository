[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence_across_views"
description = "A change made in one view is immediately reflected in every other surface showing that data without a reload: creating, editing, or deleting a scene updates the board, the scene numbering, and the Slide N / total counter together, with no view showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "storage_empty_and_reload_reseeds"
description = "No browser storage is used for persistence: localStorage and sessionStorage remain empty after a full exercise of the app, and a reload returns the seeded state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "keyboard_operable_with_visible_focus"
description = "Every interactive control — header tools, Undo/Redo, Export/Import, view toggles, scene actions, multi-select, bulk delete, the create form, and slide navigation — is reachable and operable with the keyboard alone (Tab/Shift+Tab plus Enter/Space or arrows), and the focused control shows a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "active_toggle_exposes_pressed_state"
description = "The active Tile/List/Slide view toggle exposes its pressed/selected state to assistive technology (e.g. aria-pressed, aria-selected, or an equivalent role state in the accessibility tree), not just a visual treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "validation_announced_via_aria_live"
description = "Create-form and Import validation messages are announced through an aria-live polite region (present in the DOM and populated when validation fires) in addition to being shown inline"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "scene_thumbnails_have_descriptive_alt"
description = "Every scene thumbnail image carries descriptive alternative text (non-empty alt that describes the scene, not a filename or generic placeholder)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "interactive_within_two_seconds"
description = "On a local cold load, the app renders and responds to interaction within 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "rapid_interaction_stays_responsive"
description = "Rapidly switching view modes and rapidly advancing slides stays responsive with no hangs, frozen frames, or dropped interactions, and the UI state stays consistent afterward"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "export_import_use_shared_store"
description = "Storyboard JSON Export previews and a successful Import reconstruct from the same shared in-memory scenes/viewMode store as the visible board — after Import, Tile/List/Slide and Total duration match the imported document without a second disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "field_contract_validation_before_submit"
description = "Scene create/edit and Storyboard JSON import reject out-of-contract payloads with visible per-field errors before mutating the board (empty title/body, duration outside 1–300, invalid shotType, wrong schemaVersion)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "filters_presenter_derive_from_store"
description = "Search results, shot-type filtered subsets, presenter playback, and the Printable outline all derive from the same shared scenes collection: after an edit or reorder, the filtered views, the next presenter run, and the outline preview reflect it immediately without a reload"
type = "binary"
weight = 1.0

