[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_reset"
description = "Starting on Tile: create a uniquely titled scene with a distinctive duration, switch to List then Slide and advance one step, edit a seeded scene body, then reload. All facets coherently reset to the seeded baseline together — seeded scenes (including Welcome to Docs! on scene 1), Tile mode active, first slide position, empty undo/redo, and seeded Total duration — never a mix of persisted user scenes with reset modes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "slide_order_forward_then_back"
description = "Order proof: in Slide mode note the scene sequence while pressing Right through at least three scenes, then press Left the same number of times; the centered scenes walk back in reverse order with the N / total counter tracking, proving order is derived from the live collection rather than hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "slide_counter_responds_to_navigation"
description = "Derived-view sensitivity: in Slide mode, advancing previous/next changes the centered scene and the N / total counter meaningfully; staying put leaves them unchanged rather than redrawing identically regardless of navigation input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "description_edit_echoes_across_modes"
description = "Cross-view echo: edit a scene description in Tile mode, then switch to List and Slide without reload — that same numbered scene shows the updated text in every mode."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "scene_count_delta_exact"
description = "Count-delta integrity: note the visible scene count, submit one valid Add Scene, and confirm the count increases by exactly one; after deleting that scene, confirm the count decreases by exactly one and the Slide total tracks with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_scenes_create_different_cards"
description = "Input-dependent output: create two scenes with clearly different titles and descriptions; the two new cards differ in the ways those inputs dictate and both appear on the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_mode_switch"
description = "Interleaved-flow integrity: open Add Scene and fill title, switch to List mode, return and complete description submit; then edit another scene — neither flow corrupts the other, and both resulting texts remain coherent without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_board_then_repopulate"
description = "Edge-state round-trip: delete every scene (empty-board state visible), then create a new valid scene; the board count tracks through both transitions (zero then one) and the new card appears with the entered title/description."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After creating a scene, switching modes, and editing a description, a reload leaves an incoherent mix (for example a user-created scene survives while Tile mode resets, or seeded scenes are missing while Slide position remains)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "slide_counter_ignores_navigation"
description = "Advancing previous/next in Slide mode leaves the centered scene and N / total counter identical regardless of navigation input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_creates_identical_cards"
description = "Creating two scenes with clearly different titles and descriptions yields visually identical cards or identical visible text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "mode_switch_stale_until_reload"
description = "After editing a scene description in Tile mode, List or Slide stays stale until a full page reload."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "14.9"
name = "export_pipeline_contains_session_work"
description = "Full export pipeline: create a scene with a distinctive title and duration, edit another scene's shotType, switch to List; open Export and confirm Storyboard JSON shows schemaVersion storyboard-tutorial-v1 plus those values under field-contract keys with matching totalDuration, and the Markdown shot list names the same title, shot type, and duration; Copy shows a confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "storyboard_import_round_trip_reconstructs"
description = "After exporting Storyboard JSON from a mutated session, change the board further, then Import that JSON — scenes, view mode, and Total duration reconstruct to match the export, and both export previews match the restored state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "total_duration_derived_sensitivity"
description = "Derived-view sensitivity: note Total duration, create a scene with duration 12, confirm Total duration increases by exactly 12; edit that duration to 20 and confirm Total duration increases by 8 more; delete it and confirm Total duration returns to the prior baseline."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "undo_round_trip_after_create"
description = "Undo round-trip: create a uniquely titled scene (count +1), Undo (count back, title gone, Total duration restored), Redo (title and duration return)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "schema_invalid_import_mutates_state"
description = "Importing parseable JSON that fails the StoryboardDocument field contract (wrong schemaVersion, missing scenes, or enum/bounds violations) still mutates scenes or view mode."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "export_omits_mutations_behavioral"
description = "After distinctive create/edit mutations, Export Storyboard JSON and Markdown remain identical to a pre-mutation capture."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.13"
name = "filter_probe_search_and_chip"
description = "Create a scene with a unique title and the POV shot type. Type a unique substring of that title into search: only that scene remains visible in Tile and List and the filtered count reads 1 of M. Clear search and select the POV chip: only POV scenes (including the new one) remain. Select All and clear search: the full set returns exactly — proving the filters derive from the live collection."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "duplicate_count_and_duration_delta"
description = "Note the scene count and Total duration, select two scenes with known durations, and activate Duplicate selected: immediately the count increases by exactly two, the copies appear at the end with (copy) titles, and Total duration increases by exactly the sum of the two durations. Undo removes both copies and restores the prior count and Total duration together."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "presenter_timing_input_dependent"
description = "Arrange two scenes with clearly different durations (for example 3 and 8 seconds, creating or editing as needed). Start Present: the first scene auto-advances after roughly its duration while the second holds visibly longer, and the Scene N of total readout increments on each advance. Edit a scene's duration and re-present: its countdown length changes accordingly — timing derives from live data."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.16"
name = "outline_full_pipeline_probe"
description = "Create a scene with a distinctive title and duration, then move another scene earlier. Open Export and select Printable outline: the outline lists the session's scenes in the current board order with the distinctive title and duration present and the moved scene at its new position, and the stated Total duration equals the live sum; Copy on the outline shows a confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n7"
name = "outline_ignores_session_mutations"
description = "After a create, reorder, or duration edit, the Printable outline preview remains identical to its pre-mutation content or disagrees with the board order and Total duration."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
