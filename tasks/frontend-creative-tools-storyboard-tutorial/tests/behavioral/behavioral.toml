[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_reset"
description = "Starting on Tile: create a uniquely titled scene, switch to List then Slide and advance one step, edit a seeded scene description, then reload. All facets coherently reset to the seeded baseline together — seeded scenes (including Welcome to Docs! on scene 1), Tile mode active, and first slide position — never a mix of persisted user scenes with reset modes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "slide_order_forward_then_back"
description = "Order proof: in Slide mode note the scene sequence while pressing Right through at least three scenes, then press Left the same number of times; the centered scenes walk back in reverse order with the N / total counter tracking, proving order is derived from the live collection rather than hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "slide_counter_responds_to_navigation"
description = "Derived-view sensitivity: in Slide mode, advancing previous/next changes the centered scene and the N / total counter meaningfully; staying put leaves them unchanged rather than redrawing identically regardless of navigation input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "description_edit_echoes_across_modes"
description = "Cross-view echo: edit a scene description in Tile mode, then switch to List and Slide without reload — that same numbered scene shows the updated text in every mode."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "scene_count_delta_exact"
description = "Count-delta integrity: note the visible scene count, submit one valid Add Scene, and confirm the count increases by exactly one; after deleting that scene, confirm the count decreases by exactly one and the Slide total tracks with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_scenes_create_different_cards"
description = "Input-dependent output: create two scenes with clearly different titles and descriptions; the two new cards differ in the ways those inputs dictate and both appear on the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_mode_switch"
description = "Interleaved-flow integrity: open Add Scene and fill title, switch to List mode, return and complete description submit; then edit another scene — neither flow corrupts the other, and both resulting texts remain coherent without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_board_then_repopulate"
description = "Edge-state round-trip: delete every scene (empty-board state visible), then create a new valid scene; the board count tracks through both transitions (zero then one) and the new card appears with the entered title/description."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After creating a scene, switching modes, and editing a description, a reload leaves an incoherent mix (for example a user-created scene survives while Tile mode resets, or seeded scenes are missing while Slide position remains)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "slide_counter_ignores_navigation"
description = "Advancing previous/next in Slide mode leaves the centered scene and N / total counter identical regardless of navigation input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_creates_identical_cards"
description = "Creating two scenes with clearly different titles and descriptions yields visually identical cards or identical visible text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "mode_switch_stale_until_reload"
description = "After editing a scene description in Tile mode, List or Slide stays stale until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
