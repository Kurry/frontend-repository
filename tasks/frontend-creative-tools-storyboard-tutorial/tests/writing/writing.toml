[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_chrome_and_board"
description = "Where the app renders headings, buttons, and toggles (Demo Projects, 1. Getting Started, Tile, List, Slide, Add Scene), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as Add Scene, Tile, List, and Slide rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders create-form validation messages, they name the empty field and the fix in plain language, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_board_explains_next_step"
description = "Where the app renders the empty-board state, the copy explains the board is empty and how to add a scene."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "tutorial_copy_polished"
description = "Where the app renders scene descriptions and instructional getting-started copy, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_modes"
description = "Where the app renders labels for the same concept in multiple places (scene vs card, Tile/List/Slide mode names, Add Scene), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "slide_counter_formatting_consistent"
description = "Where the app renders the Slide N / total counter, formatting stays consistent as the position advances (same separator and numeric style)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "demo_toast_copy_is_specific"
description = "Where the app renders confirmation feedback (demo-only toasts or mode-name toasts), the copy states what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as Demo Projects, 1. Getting Started, Welcome to Docs!, Add Scene, or Tile/List/Slide."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same scene or view-mode concept is named inconsistently across header, toggles, and board cards in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Header titles, validation messages, or button labels are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5


[[criterion]]
id = "15.9"
name = "field_contract_errors_name_fields"
description = "Where the app renders Scene or StoryboardDocument validation errors, they name the offending field (title, body, duration, shotType, schemaVersion, viewMode, or order) and the fix in plain language."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "export_import_specific_verbs"
description = "Where the app renders Export, Import, Copy, and Download controls, labels use those specific verbs rather than generic OK or Go."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n5"
name = "validation_errors_generic_only"
description = "Field-contract validation messages show only generic failure text without naming the offending field."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.11"
name = "presenter_filter_label_verbs"
description = "Where the app renders presenter and filter controls, labels use specific verbs (Present, Pause, Resume, End presentation, Clear filters, Print) rather than generic OK or Go, and the filtered-empty state explains that no scenes match and how to clear the search or filter."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n6"
name = "filtered_empty_copy_unhelpful"
description = "The filtered-empty state renders no explanatory copy, or its text fails to say how to clear the active search or filter."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
