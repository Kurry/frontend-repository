[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "docs_tool_chrome_density"
description = "Storyboard workspace with Tile/List/Slide density remains a docs tool, not a marketing landing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_board_state_visible"
description = "Empty board state is visually present when no scenes remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "nav_toggles_and_camera_placeholders"
description = "The storyboard nav bar exposes Tile, List, and Slide toggles with the currently active toggle visibly pressed, and placeholder scenes render a centered camera add-image button"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "header_composition_complete"
description = "The top header shows a logo mark, a Demo Projects project label, the storyboard title 1. Getting Started, a kebab menu, utility tools (notifications bell, dashboard, account), and Undo, Redo, Export, and Import controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "light_workspace_yellow_accent"
description = "The workspace renders a light theme with a rounded geometric sans-serif UI face and a yellow accent color on primary affordances"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "control_state_treatments_distinct"
description = "Buttons, toggles, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "consistent_icon_set_and_size"
description = "Icons across the header, nav bar, and scene actions come from one visually consistent set rendered at a consistent size"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "mode_layout_shapes_match_spec"
description = "Tile mode arranges scene cards in a multi-column grid, List mode stacks the same scenes in a single vertical column, and Slide mode presents one centered scene with a previous/next control pair and an N / total counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "tablet_reflow_at_768"
description = "At viewport widths of 768 pixels and below, the Tile grid reflows to fewer columns and the header condenses without losing the storyboard title or utility tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "tutorial_copy_instructional_sentences"
description = "Scene descriptions carry the sequential getting-started tutorial copy as complete instructional sentences"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "consistent_capitalization"
description = "Headings, buttons, and toggles use one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "messages_name_problem_and_fix"
description = "The empty-board state and the create-form / Import validation messages name the problem and the fix in plain language"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "hover_reveals_three_dot_actions"
description = "Hovering an imaged scene card with the real pointer reveals a three-dot actions button on that card"
type = "binary"
weight = 1.0


[[criterion]]
id = "3.18"
name = "export_center_visual_language"
description = "The Export center shows monospaced Storyboard JSON and Markdown shot list preview blocks plus a print-styled Printable outline preview, with clear format tabs or section labels and visible Copy and Download controls (and Print on the outline tab) distinct from board chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "shot_type_badge_and_duration_on_cards"
description = "Imaged scene cards show a shot-type badge and a duration readout in seconds, and the nav bar shows a live Total duration readout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "bulk_select_and_action_bar_visible"
description = "Scene selection checkboxes and the bulk action bar (when two or more scenes are selected) are visually distinct; selected cards show a clear selected treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.21"
name = "nav_bar_search_chips_present_control"
description = "The storyboard nav bar integrates a search field, shot-type filter chips with the active chip visibly selected and a filtered-count readout while filtering, and a Present control, all styled with the same light/yellow workspace language as the view toggles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.22"
name = "presenter_view_composition"
description = "The presenter view is visually distinct from the board: one scene dominates the viewport with its number, title, body, and shot-type badge, a per-scene countdown, a Scene N of total readout, an overall progress bar, and a compact control strip with Pause/Resume, previous/next, and End presentation"
type = "binary"
weight = 1.0

