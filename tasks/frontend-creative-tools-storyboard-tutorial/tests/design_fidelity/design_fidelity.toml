[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_storyboard_scale"
description = "At 1440px, spacing among the product header, Tile/List/Slide nav bar, and multi-column scene grid follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the docs/storyboard composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_geometric_sans_spec"
description = "Header titles and board UI use a rounded geometric sans-serif face consistent with the reference light workspace; scene description copy follows the tutorial hierarchy — not a default system UI stack for chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: product header (logo, Demo Projects, 1. Getting Started, kebab, utility tools) above a Tile multi-column scene grid with trailing camera placeholders and Add Scene — a docs/storyboard workspace, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — scene enter on first load, Tile/List/Slide re-layout, slide advance, create/delete card motion, and demo/mode toasts — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: at 768px and below the Tile grid reflows to fewer columns and the header condenses while remaining usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "View toggles, Add Scene (primary button plus dropdown chevron), create-form fields, and slide previous/next use the workspace treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_header_vs_scenes"
description = "Typography hierarchy clearly distinguishes header brand/titles (Demo Projects, 1. Getting Started), denser nav toggles, and scene description body copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, toggles, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "yellow_accent_and_card_surfaces"
description = "Surfaces match the light workspace with yellow accent: imaged scene cards, camera placeholder tiles with centered add-image affordance, and Slide's single centered scene with previous/next and N / total counter as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover upward settle/shadow on scene cards, image brighten, mode-toggle press, and description edit yellow wash with dashed outline follow the specified microinteraction feel when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_board"
description = "Visible spacing between header, view toggles, and scene cards contradicts the reference storyboard composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_ignore_light_yellow_workspace"
description = "Board and chrome surfaces ignore the specified light workspace with yellow accent and render an unrelated palette that fights the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "grid_sizing_mismatches_reference"
description = "At 1440px the Tile multi-column grid or scene card proportions are in clear mismatch with the reference overview composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_storyboard_animations_missing"
description = "Required animations are missing where the spec requires them (scene cards snap in with no entrance, mode switches hard-cut with no re-layout motion, slide advances with no transition)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Add Scene, view toggles, or create-form fields use unstyled browser default appearance when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the workspace is misaligned versus the reference (missing product header chrome, no multi-column Tile grid, or Slide missing previous/next and N / total)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "At 1440px, scene cards, placeholder tiles, or header tools render clipped or off-screen compared to the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_workspace"
description = "Structure deviates from the reference: a marketing landing or multi-page shell replaces the docs/storyboard workspace with Demo Projects header and getting-started board."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_header_and_scenes"
description = "Header titles and scene description copy are visually undifferentiated — no clear hierarchy between product chrome and tutorial body text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on scene cards, view toggles, or description edit wash are missing or clearly deviate from the reference feel."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "3.11"
name = "export_import_fit_storyboard_chrome"
description = "Export center and Import surfaces use the same light workspace / yellow-accent visual language as the reference storyboard chrome rather than an unrelated modal skin."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "export_breaks_reference_composition"
description = "Export or Import overlays obliterate the docs/storyboard composition with unrelated dense dashboard chrome that contradicts the reference workspace."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.12"
name = "hardened_surfaces_instruction_wins"
description = "The search field, shot-type chips, Present control, presenter view, and Printable outline tab follow the same light/yellow workspace language as the rest of the chrome; where the reference screenshots omit these hardened surfaces, the instruction text wins and their presence is not a fidelity deviation."
type = "binary"
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
