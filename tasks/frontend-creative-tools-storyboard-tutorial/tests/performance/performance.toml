[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the storyboard becomes interactive within 2 seconds, with the seeded imaged scenes already visible on the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of the app: view switching, create, edit, delete, and slide navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_and_slide_respond_under_100ms"
description = "Switching Tile/List/Slide or advancing slides via previous/next responds in under 100ms of perceived UI latency (immediate interaction feedback)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the product header and scene board remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_board_scrolls_without_lag"
description = "With at least 8 imaged scenes plus placeholder scenes on the board, scrolling the Tile grid and switching to List shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_mode_change"
description = "During Tile/List/Slide re-layout, header tools and view toggles remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "mode_and_slide_motion_holds_frame_rate"
description = "Driven through real UI controls, view-mode re-layout and slide advance transitions maintain a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_mode_and_slide_never_hang"
description = "Rapidly switching view modes or advancing slides stays responsive with no hangs or dropped interactions, and the active mode and Slide counter stay coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_board_session_stable"
description = "After an extended session of creates, edits, deletes, and mode switches, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; the header and scene grid hold their space as scene images settle."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "export_import_exercise_console_clean"
description = "Opening Export, switching JSON/Markdown previews, and attempting Import produces no console errors or warnings"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.12"
name = "total_duration_recomputes_without_jank"
description = "Creating, editing duration, or deleting scenes updates Total duration in place without layout jumps or hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.13"
name = "presenter_run_and_search_responsive"
description = "A full presenter run across several scenes ticks its countdown and auto-advances with no console errors, UI hangs, or layout jumps, and rapid typing in the search field re-filters the board without dropped keystrokes or lag"
type = "binary"
weight = 1.0

