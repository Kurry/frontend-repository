[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the storyboard becomes interactive within 2 seconds, with the seeded imaged scenes already visible on the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of the app: view switching, create, edit, delete, and slide navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_and_slide_respond_under_100ms"
description = "Switching Tile/List/Slide or advancing slides via previous/next responds in under 100ms of perceived UI latency (immediate interaction feedback)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the product header and scene board remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_board_scrolls_without_lag"
description = "With at least 8 imaged scenes plus placeholder scenes on the board, scrolling the Tile grid and switching to List shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_mode_change"
description = "During Tile/List/Slide re-layout, header tools and view toggles remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "mode_and_slide_motion_holds_frame_rate"
description = "Driven through real UI controls, view-mode re-layout and slide advance transitions maintain a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_mode_and_slide_never_hang"
description = "Rapidly switching view modes or advancing slides stays responsive with no hangs or dropped interactions, and the active mode and Slide counter stay coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_board_session_stable"
description = "After an extended session of creates, edits, deletes, and mode switches, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; the header and scene grid hold their space as scene images settle."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before view toggles or scene cards can be operated, or the seeded scenes are not yet listed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_board_flows"
description = "Console errors, warnings, or unhandled rejections appear during view switching, create, edit, delete, or slide navigation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "mode_or_slide_transition_blocks_ui"
description = "Tile/List/Slide re-layout or slide advance blocks the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "create_or_mode_change_hangs_ui"
description = "Submitting Add Scene or switching view modes hangs or freezes the UI until the transition completes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "board_janks_on_scroll_or_switch"
description = "Scrolling the seeded board or switching among Tile/List/Slide produces sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_board_input"
description = "While entrance, re-layout, or toast animations run, view toggles and scene controls ignore input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "The UI blocks rendering of the header and board until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_use"
description = "Rapid view-mode switching or slide advancing causes visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no header or board skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid mode switching, slide advancing, or after deleting all scenes and recreating."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
