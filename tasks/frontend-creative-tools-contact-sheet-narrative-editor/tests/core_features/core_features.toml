[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
description = "Cluster/compare: Select frames from the contact sheet, group them into a burst cluster, choose a representative, and compare frames in a synchronized loupe without losing active selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
description = "Rate/cull: Assign a star rating and a cull reason to frames, confirming that decisions update the frame metadata persistently and accurately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
description = "Crop/rotate: Draw a crop region and rotate the image by 90 degrees; original pixels must remain unaffected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
description = "Resolve duplicates/coverage: Reject duplicate frames with a note and resolve coverage gaps, ensuring the matrix matches the 12-slot requirement."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
description = "Sequence/branch/merge: Drag picked frames into a 12-slot story, create a branch with conflicting sequence choices, and resolve the merge successfully."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
description = "Review/approve/export: Review sequence continuity and duplicate picks; approving the edit freezes decisions and allows a clean export of JSON, CSV, SVG, and Markdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
description = "There are no linked surfaces, states, or artifacts that disagree with the active sequence/decisions."
type = "binary"
negate = true
weight = 1.0
