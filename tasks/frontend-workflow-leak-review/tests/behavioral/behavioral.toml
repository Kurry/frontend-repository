[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip (in-memory genre): submit a Confirm leak decision, move the threshold away from 0.75, toggle a mutation include flag, then reload without Import — threshold returns to 0.75, decisions clear, mutation toggles reset, and seeded submission states return together; never a mix of persisted and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "score_rank_order_is_live"
description = "Sort-order proof: the queue is ranked by similarity highest to lowest on load; after confirming a high-score row, the remaining visible order under the Review triggered filter still follows live scores rather than a hardcoded static list"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: drag the threshold and confirm Review triggered chips, score bands, and rollup counts change meaningfully rather than redrawing identically regardless of threshold"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: submit a decision in the evidence view and confirm the same verdict appears in the queue chip, rollup strip, audit timeline, and Review report JSON export preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure the Confirmed leak rollup immediately before and after one valid Confirm leak submit; the delta is exactly one with no lagging counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: submit Confirm clean with rationale token A on one row and Confirm leak with rationale token B on another; audit entries and Review report JSON decisions differ by those verdicts and tokens"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start a decision form on one submission, switch to canary and back, finish the decision, then toggle a mutation include flag — the decision and toggle both stick without corrupting each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "export_import_edge_round_trip"
description = "Edge-state round-trip: after decisions and toggles, export Review report JSON, reload to empty decisions, import the JSON, and confirm rollup, chips, audit, threshold, and mutation includes track through both transitions"
type = "binary"
weight = 1.0

