[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "Contract modules browse-query-v1, form-workflow-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_list_tools shows browse, form, entity, and artifact prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed form submit/cancel, entity toggle, browse open/filter, and artifact export/import/copy handlers drive the same visible UI logic as on-page controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations for the four modules are available — destinations queue, evidence-view, canary, mutation, audit; form fields verdict and rationale; artifact formats summary-text and review-report-json; import mode review-report-json"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be exercised via webmcp_invoke_tool for browse destinations/filters, form validate/submit/cancel, entity mutation-test toggle, and artifact export/copy/import of review-report-json"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "mutation_test_toggle_bound"
description = "Entity mutation-test toggle with field included works and re-derives the flip count the same way as the visible include toggle"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form operations validate, submit, and cancel are bound for verdict and rationale with the same validation bounds (confirm-clean|confirm-leak; rationale min 20 max 2000 characters) as the visible decision form"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations expose queue, evidence-view, canary, mutation, and audit, and filters expose review-state and audit-verdict matching the Bindings block"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra modules, destinations, or operations beyond the four declared modules and Bindings are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Browse, form, entity, or artifact MCP tooling is unbound, missing, or a no-op when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "A form submit, entity toggle, browse open/filter, or artifact export/import invocation updates MCP-reported state without matching the visible queue, audit, mutation, or export UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or operations outside the Bindings and permitted_operations lists are exposed via webmcp_list_tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared browse, form, entity, or artifact operations cannot be exercised from webmcp_invoke_tool"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "A form submit that bypasses rationale or verdict validation creates a decision in MCP state while the visible UI and audit timeline omit that decision, or shows a UI decision that MCP state omits"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for the declared leak-review tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks outside the declared Bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "One of browse-query-v1, form-workflow-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented where declared required"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation for the leak-review Bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
