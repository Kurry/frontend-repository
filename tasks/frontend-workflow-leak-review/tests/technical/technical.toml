[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All views derive from one shared collection: a decision submitted in the evidence view is immediately reflected in the queue chip, the triggered filter, the rollup strip, the audit timeline, and the Review report JSON export preview without a reload, and a threshold change re-derives bands, chips, and counts everywhere at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after moving the threshold, recording decisions, toggling mutation tests, and exporting; a page reload without Import returns the app to its seeded state (threshold 0.75, seeded submission states, empty decision timeline)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "console_clean_full_session"
description = "The console is free of errors, warnings, and unhandled promise rejections on first load and stays clean after switching views, dragging the threshold, stepping matched pairs, submitting decisions, and toggling mutation tests"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "cold_load_interactive_2s"
description = "The app is interactive (navigation and the threshold slider respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "rapid_input_stability"
description = "Under rapid repeated input (fast threshold scrubbing, quick view switches, rapid disclosure and toggle activation), the UI stays responsive with no hangs and no surface showing stale data another surface already updated, and rapidly double-activating the decision submit control records exactly one decision"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "keyboard_operability_focus"
description = "Every interactive control — navigation items, the threshold slider (adjustable with arrow keys and exposing its value to assistive technology), queue rows, filters, disclosure headers (exposing expanded/collapsed state programmatically), pair-stepping controls, form fields, toggles, and the copy control — is reachable and operable with the keyboard alone, with a visible focus indicator at each stop; validation messages are associated with the fields they name and decision results are announced via a polite live region"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "outbound_links_in_chrome"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "real_branding_in_seed_data"
description = "Seeded content references real products, companies, or people — task names, submitter names, code excerpts, or file names carry recognizable real-world brands or identities"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "api_shaped_validation_surfaces_inline"
description = "Decision create and Review report Import validate against the declared field contracts with inline per-field messages naming the offending field before any state change; a valid decision record matches the would-be request body (verdict confirm-clean|confirm-leak and rationale 20 to 2000 characters)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "export_import_same_schema"
description = "Review report JSON export and a successful Import conform to the same field contract (schemaVersion leak-review.report.v1 with threshold, rollup, submissions, decisions, and mutationSuites); invalid payloads are rejected without mutating state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
