[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_feedback_on_chrome"
description = "Hovering with the real pointer over buttons, queue rows, timeline entries, navigation items, and chips shows a visible hover treatment (wash, shadow, or background ease), and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "disclosure_height_transition"
description = "Activating a canary task disclosure header with the real pointer animates the section open and closed with a height transition of roughly 200 to 300 milliseconds and a chevron that rotates on open and close, rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "decision_row_animates_out_of_filter"
description = "Driven through the real UI controls (never a state-shortcut tool call): with the Review triggered filter active, submitting a valid decision animates that row out of the filtered list and animates the state chip change rather than both changing instantly, and the new decision entry animates into the top of the audit timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "threshold_drag_live_no_jank"
description = "Dragging the threshold slider with the real pointer updates score bands, triggered chips, and rollup numbers continuously during the drag with no visible jank or lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "toasts_slide_and_autodismiss"
description = "After submitting a decision and after copying an Export preview, a confirmation toast slides in, remains readable long enough to scan, and auto-dismisses with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, transitions are removed and state changes apply instantly while all disclosures, filters, and forms remain fully functional"
type = "binary"
weight = 1.0

