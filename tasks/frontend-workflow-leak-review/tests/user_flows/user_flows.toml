[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "triage_threshold_flow"
description = "Triage flow: on the queue, note the Review triggered count in the rollup strip, drag the threshold from 0.75 down to 0.60, and confirm additional Unreviewed rows at or above 0.60 flip to Review triggered, the rollup count rises to match, and the Review triggered filter shows exactly those rows — with no confirmed row changing state and no reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_decision_shows_inline_validation"
description = "Decision create flow: submitting with no verdict or a rationale outside 20 to 2000 characters shows immediate inline validation naming the offending field and records no decision"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "review_flow_end_to_end"
description = "Review flow: open a Review triggered submission, step matched pairs with Next until the last pair, choose Confirm leak, enter a rationale of at least 20 characters, and submit; the queue chip reads Confirmed leak, the row leaves the Review triggered filter, the Confirmed leak rollup increases by exactly one, and the audit timeline gains exactly one entry carrying that rationale"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "canary_failing_strip_flow"
description = "Canary flow: open the canary view, expand the task carrying the failing post-strip check, and confirm the alert banner names the file where the token survived while the placement checklist still shows per-token N of M counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "mutation_toggle_flow"
description = "Mutation flow: on a comparison card, note the flip count, toggle off one included flipped test, and confirm the flip count decreases by exactly one; toggle it back on and the original count is restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "artifact_export_end_state"
description = "Artifact end state: after one Confirm leak decision with a distinct rationale token, a threshold change, and one mutation include toggle, Export Review report JSON shows schemaVersion leak-review.report.v1, the new threshold, that decisions entry, matching rollup counts, and the toggled included boolean; Copy confirms; Download offers a .json file"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "export_import_round_trip_flow"
description = "Export then import: after session mutations, Download or Copy Review report JSON, reload to clear in-memory state, Import that JSON, and confirm queue chips, rollup, audit rationale, threshold, mutation toggles, and a subsequent export preview match the imported document"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "view_switch_retains_session_state"
description = "After recording a decision, switching among queue, canary, mutation, and audit views retains the confirmed chip, rollup counts, and audit entry without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_panel_supports_format_choice"
description = "The Export panel supports choosing Review report JSON or Summary text and shows a live-compiled monospaced preview for the active format"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_without_import_resets_seed"
description = "A page reload without Import returns the app to its seeded state: at least 12 submissions with seeded states, threshold 0.75, and an audit timeline empty of user-made decisions"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_review_flows_unavailable"
description = "Threshold triage, reviewer decision submit, Export, or Import are not operable from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "decision_missing_or_duplicated"
description = "A valid decision submit fails to show the confirmed chip or appends duplicate audit entries"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A decision or threshold change updates one surface but leaves the rollup strip, filter membership, or audit timeline stale until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching views breaks the layout or loses the selected submission / confirmed state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_triggered_filter_breaks_ui"
description = "When every triggered submission has been decided, the Review triggered filter shows a broken or blank UI instead of an explanatory empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "export_preview_disagrees_with_strip"
description = "The Review report JSON rollup counts disagree with the on-screen rollup strip after a decision or threshold change"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "import_round_trip_fails"
description = "After exporting valid Review report JSON and importing it following a reload, queue chips, threshold, or audit timeline show a state that mismatches the imported document"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "export_panel_blocks_navigation"
description = "The Export panel blocks navigation with no exit option"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_decision_lacks_feedback"
description = "An invalid decision submit provides no inline field feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "View navigation or Export/Import recovery requires a full page reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
