[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_triggered_and_audit_states"
description = "Before any decision, when the audit verdict filter matches nothing, and when every triggered submission has been decided, the respective region shows an explanatory empty state rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "decision_form_validates_inline"
description = "Submitting the decision form with no verdict, a rationale under 20 characters, or a rationale over 2000 characters shows inline messages naming the invalid fields before any state change"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_errors_name_field_and_rule"
description = "Decision and import validation messages name the offending field and the rule (for example rationale minimum length or schemaVersion) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "decision_and_copy_show_confirmation"
description = "Submitting a valid decision and copying an export each show visible confirmation feedback such as a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_submit_records_one_decision"
description = "Rapidly double-activating the decision submit control records exactly one decision: the timeline gains exactly one entry and rollup counts shift once"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "cancel_leaves_decision_unchanged"
description = "Cancelling the decision form leaves the submission state and audit timeline unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "threshold_extremes_track_rollup"
description = "Dragging the threshold to 0.95 triggers only scores at or above 0.95, and to 0.50 triggers every undecided score at or above 0.50; the rollup strip tracks both extremes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "pair_stepping_end_guards"
description = "Previous stays disabled on the first matched pair and Next on the last, and the position label never leaves the valid range"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_empty_decisions_still_schema_valid"
description = "Opening Export with no decisions yet still produces schema-valid Review report JSON with schemaVersion leak-review.report.v1, the current threshold, an empty decisions array, submissions covering the seeded queue, and rollup counts matching the strip"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "invalid_import_rejects_field_contract"
description = "Importing malformed JSON or a payload that breaks the Review report field contract leaves queue chips, threshold, audit timeline, and mutation toggles unchanged and shows validation naming the offending field or payload"
type = "binary"
weight = 1.0

