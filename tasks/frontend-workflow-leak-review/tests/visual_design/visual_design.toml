[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "review_console_register"
description = "The app presents a dense review-console layout: a fixed top bar with product name and view navigation, and per-view main regions built from data-dense surfaces (table rows, chips, checklists) rather than sparse marketing-style spacing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "score_bands_and_state_chips_distinct"
description = "The three score bands use three clearly distinct colors applied consistently wherever a score renders, and the four review-state chips (Unreviewed, Review triggered, Confirmed clean, Confirmed leak) are visually distinguishable from one another without reading their labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "evidence_panes_layout"
description = "At 1440px width the evidence view shows two equal-width panes side by side with pane headers and a visible divider, matched-excerpt text in a monospaced face, and one consistent highlight treatment for overlapping tokens in both panes"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "typography_hierarchy_consistent"
description = "View titles are visibly larger than section headings, which are larger than row and label text, and this hierarchy is consistent across the queue, evidence, canary, mutation, and audit views"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "component_state_treatments"
description = "Buttons, the slider, toggles, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "pass_fail_not_color_only"
description = "Pass and fail chips in the canary checklists pair their color with a visible icon or text label so the state is readable without color perception"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "responsive_stacking_and_no_overflow"
description = "At 768px width the evidence panes stack vertically while remaining usable, and at 375px width no content clips or overflows the viewport and no page-level horizontal scrolling appears, with the view navigation still reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "overlapping_or_clipped_content"
description = "At 1440px or 375px width, any text, chip, banner, or control overlaps another element or is clipped by its container"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "default_kit_styling_unthemed"
description = "The UI reads as unstyled defaults: browser-default form controls, a single flat unbranded surface, or component chrome with no cohesive palette or identity applied across views"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
