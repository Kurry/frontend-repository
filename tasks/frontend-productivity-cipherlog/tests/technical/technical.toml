[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "The app root reaches an interactive memo interface rather than a blank page, framework error overlay, or noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "During load and the core workflow no same-origin request returns a 4xx or 5xx status, ignoring the browser's own favicon probe"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "A full page refresh restores the exact committed state: channels and their custom drag order, memos with lock state, priority, text marks and both timestamps, the Decommissioned list, and the selected Theme Core"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Editing a memo updates that same record everywhere it appears and the channel filter and search recompute the visible list from the shared collection rather than diverging into a second disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "After a revealed locked memo, a full page refresh re-hides it as [ENCRYPTED] while its lock state and passcode requirement persist, confirming the reveal is session-only and not persisted"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "Repeating the create workflow 25 times through its normal controls keeps the final visible count exact, the UI responsive, and produces no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "A hidden element, attribute, or window global not mandated by the app exposes internal ground-truth (such as a memo's passcode or concealed body) that a real user could not reach through visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "The app renders or behaves differently depending on whether it is driven by automation, keying UI on navigator.webdriver or automation-specific signals"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "keyboard_operable_focus_visible"
description = "Every interactive control (buttons, selects, channel rows, memo cards, toolbar actions) is reachable and operable with the keyboard alone, and Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "dialogs_manage_focus_and_escape"
description = "The purge confirmation and the passcode prompt open as proper dialogs: focus moves into the dialog while it is open, Escape closes it without applying the action, and focus returns to the control that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "selects_keyboard_operable"
description = "The Channel, priority, and Theme Core selects are operable with the keyboard, opening with Enter or Space and moving through options with the arrow keys"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.13"
name = "errors_conveyed_as_text"
description = "Inline validation errors (blank title, duplicate channel, wrong passcode, contract-invalid import) are rendered as text associated with their field rather than conveyed by color alone"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.14"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear during a full exercise of the app, including create, lock, reveal, decommission, restore, purge, theme switching, and a page refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "rapid_typing_counts_keep_up"
description = "Typing rapidly in the memo body keeps the word and character counts updating live with no visible lag or dropped keystrokes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.17"
name = "partial_persistence_facet_reverts"
description = "After committing several facets (a created memo, its lock state or priority, a custom channel order, and a non-default Theme Core) and performing a full page refresh, at least one facet silently reverts to its default while others survive, leaving an incoherent mix of restored and lost state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.18"
name = "storage_unavailable_keeps_session_usable"
description = "When browser localStorage access is made unavailable before a fresh load, the root still renders the interactive CipherLog workspace without a blank screen or uncaught console error, and creating/editing a memo continues to work coherently for the current session"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, accessibility, or performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
