[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The page background renders #F5F5F7, primary buttons use background #007AFF with #FEFEFE text and a fully pill-shaped radius, and secondary buttons use background #E6EEF7 with #007AFF text and the same pill shape"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The [ENCRYPTED] placeholder is unmistakably styled as redacted with a blocked or censored treatment, not plain text, and appears in both the list preview and the full view while locked"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "High, Standard, and Low priority badges render as three visually distinguishable colors consistently wherever a memo is shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The three empty states (channels, memos, Decommissioned) use distinct copy appropriate to each section rather than one generic placeholder reused everywhere"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Typography follows the spec with h1 near 34px, h2 and body near 17px, cards near 6px radius, and memo body and count HUD in a monospace face; timestamps render small and muted"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "At about 375px wide the Channels sidebar collapses into a togglable panel with no horizontal scrolling and the heading, channel labels, and count HUD stay legible inside the viewport"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The [ENCRYPTED] state is plain unstyled text indistinguishable from body copy, or the redaction is missing from the list preview while a memo is locked"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "Priority badges are indistinguishable (same color across High, Standard, and Low) or a priority leaves the card with no badge at all"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "three_region_console_layout"
description = "At desktop width the app renders a three-region covert-console layout: a dark header bar carrying the CipherLog wordmark, a left Channels sidebar about 256px wide, and a centered main content column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "consistent_crisp_icon_set"
description = "Interactive icons in the header, sidebar, and memo cards render crisply at their displayed size and share one visual style (weight and geometry) across the app"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.11"
name = "no_overflow_between_breakpoints"
description = "Between desktop width and about 375px, no content clips or overflows the viewport, there is no horizontal scrolling, and all controls remain reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "error_copy_names_problem_and_fix"
description = "Error messages name the problem and the fix: the blank-title error names the Title field, the duplicate-channel error explains why the name was rejected, and the passcode errors say why the passcode failed"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.13"
name = "specific_consistent_labels"
description = "Control labels use one consistent capitalization convention and specific verbs (Create New Transmission, Add New Channel, Decommission, Restore, Purge) rather than generic labels like Submit or OK"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.14"
name = "placeholder_text_shipped"
description = "Lorem ipsum, 'TODO', template variable names, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design, layout, or rendered copy that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
