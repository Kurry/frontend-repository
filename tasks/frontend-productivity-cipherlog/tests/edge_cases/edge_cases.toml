[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "three_distinct_empty_states"
description = "On a first visit with nothing created, the Channels sidebar, the memo list, and the Decommissioned view each show their own distinct friendly empty-state message rather than a blank area or one shared placeholder."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline_before_submit"
description = "Transmission editor, Add New Channel, passcode prompt, and Import session show inline per-field validation naming the offending field before submit."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Error messages name the problem and the fix (blank title, duplicate channel, wrong or wrong-length passcode, contract-invalid import) rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Success or confirmation feedback appears after actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "async_work_shows_loading_state"
description = "Loading spinners or indicators are shown for async or simulated-async work."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_support_undo_or_cancel"
description = "Undo or cancel options are available where destructive actions exist."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "non_obvious_controls_have_help"
description = "Help or tooltips are present for non-obvious controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, and labels use semantic tags."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Modal close controls and background clicks both close the overlay."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "long_flows_show_progress"
description = "Long task flows provide progress or feedback steps."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty collection shows nothing and provides no UI feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Errors are surfaced only in the browser console."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Actions lack visible feedback and silently succeed or fail."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Destructive actions have no warnings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap interactive elements."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Modal overlays cannot be dismissed via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Validation feedback is missing or delayed with no UI indication."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Button text is ambiguous or missing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "non_obvious_flows_lack_guidance"
description = "Non-obvious flows have no in-app guidance at all."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Interactive affordances are visually hidden or inaccessible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "title_over_120_chars_rejected"
description = "Submitting a New Transmission with a title longer than 120 characters is blocked with an inline error naming the Title field and adds no memo."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "channel_name_over_40_chars_rejected"
description = "Add New Channel with a name longer than 40 characters is rejected with an inline error naming the name field and adds no channel."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.13"
name = "empty_session_export_still_schema_valid"
description = "With empty collections, Export session still produces JSON with version 1, the current themeCore, empty channels/memos/decommissioned arrays, and an exportedAt timestamp; Copy JSON still shows Copied."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "contract_invalid_import_applies_partial_state"
description = "Importing a session JSON that violates the field contract still mutates channels, memos, decommissioned, or Theme Core, or shows no named-field import error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
