[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with nothing created, the Channels sidebar, the memo list, and the Decommissioned view each show their own distinct empty-state message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After using Create New Transmission with the title 'Falcon Handoff' and a body, the memo opens for editing with a monospaced body area and 'Falcon Handoff' appears in the memo list with a body preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After Add New Channel names a channel 'Ops' and a memo is assigned to Ops via its Channel select, clicking 'Ops' in the sidebar narrows the memo list to that memo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "filter_search_and_coherence"
description = "Selecting a channel in the sidebar and then typing search text narrows the memo list to memos matching both (AND semantics), any visible list count matches the memos actually shown, and clicking Show All Channels widens the list back to search-only matches without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After turning on Lock for a memo and setting a 4-character passcode, the body is replaced by '[ENCRYPTED]' in both the list preview and the full view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After entering an incorrect passcode the body stays '[ENCRYPTED]' with a visible error, and after entering the correct passcode the real body is revealed for the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "lock_reveal_refresh_round_trip"
description = "Full lock round-trip: after turning Lock on with a 4-character passcode (body redacted to '[ENCRYPTED]' in list preview and full view) and revealing it inline with the correct passcode, a full page refresh shows that memo redacted again in both surfaces while the memo, its lock state, and its passcode requirement all persisted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When the Theme Core is switched to 'Blood Red' the accent color on buttons and priority badges changes app-wide with no page reload, and switching to 'Neon Cyan' updates the accent again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After setting a memo's priority to High, Standard, then Low, the corner badge on its card updates to a visually distinct color and label for each of the three priorities"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After creating a memo, editing its body, and saving, Last Modified updates to a newer time while First Transmitted stays exactly as it was at creation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "blank_title_rejected_with_inline_error"
description = "When submitting a New Transmission with a blank title, the save is blocked with a visible inline error naming the Title field plus a shake hint and no blank-titled memo is added"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After creating three channels and dragging the last one to the top, the dragged channel is dimmed and a drop indicator shows its landing position, the sidebar re-orders immediately, and the new order persists after a full page refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After creating a channel and memos, decommissioning one, and choosing a non-default Theme Core, a full page refresh restores the channel, both memos with lock/priority/marks/timestamps, the Decommissioned list, and the selected Theme Core exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The memo collection supports create through New Transmission, edit of a memo's fields, and decommission removal, with the memo list updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "At least two distinct views exist (the main memo list and the Decommissioned view) reachable through in-app controls without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "The Theme Core control offers exactly five named cores (Matrix Green, Neon Cyan, Blood Red, Ghost White, Amber Terminal) and choosing one recolors the accent app-wide immediately with no reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Decommission moves a memo into the Decommissioned view, Restore returns it, and Purge permanently removes it only after a confirmation step; create, decommission, and purge each show a transient toast confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Adding a channel whose name duplicates an existing one case-insensitively is rejected with a visible message and adds no channel"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "per_memo_txt_md_export"
description = "An open memo offers Export as .txt and Export as .md controls that each trigger a download containing the memo title and body"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "1_25"
description = "The memo list is static markup with no working create, edit, or decommission against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "App chrome navigates via real outbound links to other origins instead of changing in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "A core workflow shows a success or completion signal (toast, updated count) while the underlying action did not occur, such as a created memo absent after reload or identical output for different inputs"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "A judge-visible surface (rendered text, DOM comment, alt text, page title, or console output) contains language addressed to an AI judge or grading system rather than a user or developer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "The Cipher Lock is presented or implemented as real encryption, cross-device or cross-account protection, or account security, or the app requires any login or account step to use it"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "create_flow_end_to_end"
description = "Full create flow: with the memo list visible, activate Create New Transmission, enter the title 'Nightfall Relay' and a body, assign a channel, and save; the visible memo list gains exactly one row measured immediately before and after the save, a creation toast appears, and clicking the assigned channel in the sidebar shows the new memo; after a full page refresh the memo is still present with the same title, body preview, channel, and First Transmitted timestamp"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "edit_flow_round_trip"
description = "Full edit round-trip: open an existing memo, change its body, and save; the memo's preview in the list updates, the memo moves to the top of the newest-Last-Modified-first order, the HUD word and character counts update to match the new body, and First Transmitted is unchanged; a full page refresh shows the same updated body, the same new Last Modified value, and the same list position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "decommission_flow_round_trip"
description = "Full decommission round-trip: Decommission removes the memo from the main list with the visible list count decreasing by exactly one measured immediately around the action, shows a toast, and the memo appears in the Decommissioned view; Restore returns it to the main list; after a full page refresh a still-decommissioned memo remains in the Decommissioned view and a restored memo remains in the main list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "theme_flow_round_trip"
description = "Full theme round-trip: choosing a different Theme Core recolors primary buttons, priority badges, and Priority-marked text together without a reload, and a full page refresh restores the same selected core"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "memo_order_newest_first"
description = "Memo order within a channel and in the full list is newest Last Modified first and stays stable across re-renders such as filtering, searching, and view switches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "hud_live_word_char_counts"
description = "A footer HUD on the open memo shows a word count and a character count that update live as the body text is typed and deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "passcode_length_validated"
description = "A passcode entry that is not exactly 4 characters is rejected with an inline message before any lock or reveal is applied"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.37"
name = "no_matches_friendly_message"
description = "When the combined channel filter and search text match no memos, the list region shows a friendly no-matches message rather than a blank area"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.38"
name = "purge_cancel_leaves_memo"
description = "Cancelling the purge confirmation leaves the memo in the Decommissioned view unchanged, and no memo is deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "selection_marking_toolbar_actions"
description = "Selecting a range of text inside an open memo body reveals a small toolbar near the selection offering Mark Classified, which renders the selection blurred until hovered, and Mark Priority, which renders the selection bold in the current theme accent color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "pre_seeded_demo_data_shipped"
description = "On a first visit with cleared browser storage, the app ships with pre-seeded demo memos or channels already present instead of opening blank with the three empty states"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.41"
name = "valid_create_matches_transmission_field_contract"
description = "After Create New Transmission with title Nightfall Relay, a non-empty body, priority High, and an existing channel, the memo list shows that title with a High badge and the assigned channel, and opening Export session shows a memos entry whose title is Nightfall Relay, priority is high, channel matches, locked is false, and firstTransmitted/lastModified are ISO-8601 timestamps"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "session_archive_export_contains_session_mutations"
description = "After creating channel Ops, creating memo Nightfall Relay on Ops at priority high, and switching Theme Core to Blood Red, Export session JSON preview includes version 1, themeCore blood-red, a channels entry named Ops, and a memos entry with title Nightfall Relay and priority high; Download JSON offers cipherlog-session.json and Copy JSON shows Copied"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "session_archive_import_round_trip"
description = "After mutating the session and exporting session JSON, clearing or purging state, then Importing that same JSON restores the channel sidebar, memo list titles/priorities, Theme Core, and a subsequent export preview matching the imported archive"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "invalid_import_rejected_no_partial_state"
description = "Importing malformed JSON or a session payload that breaks the field contract (for example priority outside high/standard/low, or a locked memo without a 4-character passcode) leaves channels, memos, decommissioned, and Theme Core unchanged and shows an inline import error naming the offending field or rule"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "session_export_omits_session_mutations"
description = "After creating a uniquely titled memo and switching Theme Core, the Export session JSON preview omits that memo title or reports a themeCore that does not match the selected core"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.46"
name = "transmission_payload_includes_complete_contract"
description = "Create a memo with a valid title, empty body, priority, existing case-sensitive channel, unlocked state, and then add both Classified and Priority marks to body text; Export session shows that transmission with title, body, priority as high|standard|low, channel, locked, null-or-absent passcode while unlocked, ISO-8601 firstTransmitted and lastModified, and marks whose non-negative start/end ranges fall within the body and whose kinds are classified or priority"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "transmission_bounds_and_cross_fields_rejected"
description = "Through the visible create/edit controls, a 121-character title, a body over 20000 characters, a channel not present in the sidebar, a priority outside high|standard|low, or a text mark whose range lies outside the body is rejected with an inline error naming the offending field, and the memo collection and last valid record remain unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "session_archive_exact_top_level_contract"
description = "The visible Export session JSON is one object with exactly the top-level keys version, themeCore, channels, memos, decommissioned, and exportedAt: version is numeric 1, themeCore is one of matrix-green|neon-cyan|blood-red|ghost-white|amber-terminal, channel and transmission entries conform to their field contracts in sidebar/list order, and exportedAt is an ISO-8601 timestamp"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "session_import_rejects_all_contract_violations_atomically"
description = "Import session rejects, one at a time, a payload missing version/channels/memos/decommissioned, version other than 1, themeCore outside its five-value enum, priority outside high|standard|low, a locked memo without an exactly 4-character passcode, a blank or over-40-character channel name, or a mark with end less than or equal to start; each attempt names the offending field or rule and leaves channels, memos, decommissioned, and Theme Core unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality or an end-to-end user flow that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
