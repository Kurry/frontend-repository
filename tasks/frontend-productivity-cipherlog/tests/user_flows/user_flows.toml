[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_transmission_updates_list_and_channel"
description = "Create flow: activating Create New Transmission, entering a title and body that satisfy the transmission field contract, and saving adds exactly one row to the memo list with a creation toast, and the new memo appears under its assigned channel when that channel is clicked — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_transmission_inline_validation"
description = "Create flow: submitting a blank title, a title longer than 120 characters, or a priority outside high/standard/low triggers immediate inline validation naming the offending field (with a shake hint) and adds no memo."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_transmission_updates_list_hud_order"
description = "Edit flow: opening an existing memo, changing its body, and saving updates that memo's list preview, moves it to the top of newest-Last-Modified-first order, updates the HUD word/character counts, and leaves First Transmitted unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "decommission_and_purge_update_surfaces"
description = "Decommission flow: Decommission removes the memo from the main list (count decreases by exactly one), shows a toast, and places it in Decommissioned; Restore returns it; Purge after confirmation permanently removes it from Decommissioned."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "channel_and_decommissioned_view_switch"
description = "View/mode switch: clicking a channel filters the memo list to that channel; Show All Channels clears the filter; opening Decommissioned swaps to that view and returning restores the main list with prior search/filter state while the app stays open."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_channels_memos_decommissioned_states"
description = "Edge: with nothing created yet (or after purging the last memo), Channels, the memo list, and Decommissioned each show their own distinct friendly empty-state message rather than a blank area or one reused placeholder."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "channel_and_search_filter_coherence"
description = "Filter/search: selecting a channel then typing search text narrows the memo list to memos matching both; the visible count matches shown rows; Show All Channels widens back to search-only matches without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "session_archive_panel_preserves_workspace"
description = "Session archive chrome: Export session / Import session panels open and close without losing the Channels sidebar, memo list selection, or Theme Core; reopening Export still reflects the current session."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "lock_and_decommission_overlays"
description = "Overlays: Lock passcode prompt, Decommission/Purge confirmation, and Session archive panels support their flows and dismiss without trapping the workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "lock_reveal_and_import_recover_without_reload"
description = "Recovery: an incorrect lock passcode shows a named error and keeps the body redacted; correcting the passcode reveals the body; a rejected Import leaves collections unchanged and the UI operable — no reload required."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "transmission_flows_unavailable"
description = "Create New Transmission, edit/save, Decommission/Restore/Purge, or channel create cannot be completed from the visible UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_memo_missing_or_duplicated"
description = "After a valid transmission save, the new memo fails to appear in the list, appears duplicated, or is missing under its assigned channel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "edit_or_theme_desyncs_surfaces"
description = "After editing a memo body or switching Theme Core, list preview, full view, HUD counts, priority badges, and Theme Core accents disagree about the same memo or theme."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "channel_switch_breaks_or_loses_selection"
description = "Switching channels or opening Decommissioned breaks the layout or loses the open memo selection unexpectedly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collections_break_ui"
description = "Empty Channels, memo list, or Decommissioned regions show a broken/blank UI with no distinct empty-state message."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "channel_and_search_filters_disagree"
description = "Channel filter and search disagree about which memos are visible, or Show All Channels fails to restore the expected set."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "session_archive_panel_cannot_reopen"
description = "After closing Export session or Import session, the Session archive controls cannot reopen the panel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "lock_or_purge_overlay_blocks_exit"
description = "Lock, Purge confirmation, or Session archive overlays block navigation with no dismiss/cancel path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_save_lock_or_import_silent"
description = "A failed transmission save, invalid lock passcode, or contract-invalid Import provides no visible named-field feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "cipherlog_dead_end_requires_reload"
description = "A CipherLog flow leaves a dead end that requires a full page reload to continue editing, filtering, or exporting."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "session_archive_export_flow"
description = "Session archive export flow: after creating channel Ops, memo Nightfall Relay on Ops at priority high, and Theme Core Blood Red, Export session JSON shows version 1, themeCore blood-red, channels Ops, and memos Nightfall Relay with priority high; Download JSON and Copy JSON succeed with Copied confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "session_archive_import_round_trip_flow"
description = "Session archive import round-trip: export session JSON after mutations, clear or purge state, Import the same JSON, and confirm sidebar, memo list, Theme Core, and a subsequent export preview match the imported archive."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "import_mutates_on_invalid_payload"
description = "Importing a contract-invalid session JSON still changes visible collections or Theme Core."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
