[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Hovering the pointer over a sidebar channel, a button, and a memo card shows a visible hover state distinct from resting, and Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Dragging a channel through the real drag gesture visibly dims the dragged row and shows a drop-position indicator among the other channels before the drop, and the sidebar re-orders immediately on drop"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Selecting body text and using Mark Classified renders the range blurred until hovered, and Mark Priority renders a selected range bold in the accent color, both via the real selection toolbar"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Creating, decommissioning, and purging animate a transient toast, and submitting a blank title plays a brief shake animation on the inline error, all through the real UI controls"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Hover feedback is omitted on channels, buttons, or memo cards so interactive chrome feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "Dragging a channel shows no drag or drop feedback and the row snaps without any cue, or switching the Theme Core requires a full page reload to recolor"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "memo_enter_exit_animations"
description = "A newly created memo animates into the list rather than appearing instantly in place, and a decommissioned or purged memo animates out of the list it leaves, both observed through the real UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "selection_toolbar_appear_dismiss"
description = "The text-marking toolbar appears immediately next to a text selection in the open memo body and dismisses cleanly when the selection is cleared, without lingering or misplaced chrome"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.9"
name = "purge_dialog_transition"
description = "The purge confirmation dialog enters and exits with a brief transition rather than popping open and closed instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "theme_switch_recolors_instantly"
description = "Choosing a different Theme Core through the real selector recolors buttons, priority badges, and Priority-marked text together immediately, with no page reload and no element left showing the previous accent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
