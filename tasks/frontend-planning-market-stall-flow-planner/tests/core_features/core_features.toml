[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "core_features.1"
description = "Verify that the user can place, rotate, swap, group, and remove exact footprint polygons within zones."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.2"
description = "Verify that bounds, clearance, aisle width, entrances, accessible routes, emergency fixture corridors, and reserved zones are visible constraints when placing stalls."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.3"
description = "Verify that each vendor has footprint family, utility demand, category, arrival duration, equipment needs, preferred/forbidden neighbors, visibility request, and accessibility requirement."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.4"
description = "Verify that a constraint lens explains satisfied, violated, waived, and unresolved commitments by exact vendor and geometry."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.5"
description = "Verify that ports have exact capacity and routed connections consume capacity and maximum-length bounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.6"
description = "Verify that walking/service paths recompute around polygons and cannot cross stalls."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.7"
description = "Verify that selecting a path highlights affected vendors, arrival sequence, readiness, and export entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.8"
description = "Verify that vendor vehicle arrival, unload, setup, inspection, open, teardown, and departure blocks can be scheduled on entrance/service lanes."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.9"
description = "Verify that spatial route conflicts and temporal overlaps are coupled; boundary-touching is allowed where fixture rules permit."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.10"
description = "Verify that locked active blocks cannot move."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.11"
description = "Verify that tables, carts, tents, or cable covers can be reserved by exact unit and interval."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.12"
description = "Verify that substitute equipment changes footprint or setup duration and propagates into constraints and readiness."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.13"
description = "Verify that normal, rain, no-show, or blocked-lane layouts can be forked and compared for capacity, path lengths, utility load, vendor commitment score, lateness, and unplaced vendors."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.14"
description = "Verify that layouts can be merged per stall/vendor."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.15"
description = "Verify that the user can approve, advance clock, check in arrivals, trigger a partial setup, then resequence, relocate, substitute, or rollback unissued equipment."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.16"
description = "Verify that desktop links map, commitment matrix, arrival lanes, resources, and scenario compare."
type = "binary"
weight = 1.0
