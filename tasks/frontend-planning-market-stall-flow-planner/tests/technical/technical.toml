[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "technical.1"
description = "Verify that interleaving UI/WebMCP geometry, vendor/constraint, path/utility, schedule, equipment, branch/approval, clock/check-in/recovery, history, artifact, transfer, and reset operations results in canonical state matching."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.2"
description = "Verify that export is deterministic except for regenerated exportedAt, and reset/import recreates canonical state and equivalent files."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.3"
description = "Verify that imports reject out-of-bounds/overlap geometry, bad paths, port overcapacity, schedule/resource conflicts, invalid event order, derived values, or forged hashes atomically."
type = "binary"
weight = 1.0
[[criterion]]
id = "technical.4"
description = "Verify that the app begins from a genuinely clean state with no authored work, completion, approval, export, or success evidence preseeded, and milestones become observable only after real UI action with exact deltas."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.5"
description = "Verify that pointer/direct-manipulation paths and keyboard/exact-value paths converge to one canonical event with identical stable IDs, derived values, linked-view selection, history, WebMCP-observable state, persistence, and export bytes."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.6"
description = "Verify adversarial orderings (edit before/after merge, undo then branch, cancel transient preview, import after divergent local edits) converge equivalently, and cancelled actions restore the complete prior snapshot."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.7"
description = "Verify genre-correct reload behavior and isolation: persisted state survives reload exactly, while transient previews, dialogs, hover, drag, and invalid drafts do not leak into persistence, and separate sessions/imports do not silently share or overwrite state."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.8"
description = "Verify exact minimum, maximum, just-inside, and just-outside values for every bounded field, plus enum, format, uniqueness, and cross-field rules, with error copy identifying the field, rejected value/rule, and recovery action."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.9"
description = "Verify real browser mechanics for graded interactions: normal pointer actionability, computed style while actually hovered, keyboard traversal and named shortcuts, modal focus trap and opener return, live announcements, and non-color evidence."
type = "binary"
weight = 1.0

[[criterion]]
id = "technical.10"
description = "Verify that at the maximum declared fixture, direct manipulation acknowledges within 100 ms, linked/derived views settle within 500 ms, and export/import complete within 2 s without dropped interactions, stale views, layout jumps, or console errors."
type = "binary"
weight = 1.0
