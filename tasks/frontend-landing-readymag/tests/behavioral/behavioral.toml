[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting on the homepage: open the Solutions menu, wait until the slideshow advances off the first frame, and scroll until the workflow feature cards are revealed; then reload. All facets coherently reset (menus closed, slideshow on first frame, cards unrevealed until scrolled again) — never a mixed partial survival of some facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "slideshow_derived_opacity_changes"
description = "Derived-view sensitivity: leave the page idle through at least one 2200ms slideshow tick and confirm the newly active frame becomes opacity 1.0 while its neighbors drop to 0.35 — not an identical redraw regardless of the timer advance."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "solutions_expanded_echoes_panel"
description = "Cross-view echo: open the Solutions menu via the real trigger and confirm the panel lists all six labels while the trigger's expanded state is true; close via Escape and confirm the panel is gone and expanded state is false — without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "slideshow_wrap_count_integrity"
description = "Count-delta integrity: observe the slideshow through six advances from the first frame; after the sixth advance it wraps exactly once back to the first frame with a single active frame (no off-by-one skipping or stuck index)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "artboard_scale_input_dependent"
description = "Input-dependent output: at 1440px the artboard transform is none (scale 1); resize to 390px and confirm the transform becomes matrix(0.380859, 0, 0, 0.380859, 0, 0); the two widths yield different scale outputs."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_menu_and_slideshow"
description = "Interleaved-flow integrity: open Solutions, wait for at least one slideshow advance, close Solutions via Escape; the menu is closed with focus restored and the slideshow continues from its advanced index — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "scroll_reveal_edge_round_trip"
description = "Edge-state round-trip on a fresh load: confirm the four workflow cards start unrevealed, scroll them into view so they fade/rise with an 80ms stagger into their resting state, then reload; cards return to unrevealed until scrolled into view again."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_in_memory_state_survives_reload"
description = "After opening Solutions, advancing the slideshow, and revealing cards, a reload leaves an incoherent mix (e.g. menu stays open while slideshow resets, or cards stay pre-revealed while menus reset)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "slideshow_opacity_ignores_timer"
description = "Leaving the page idle across multiple 2200ms intervals leaves every slideshow frame at identical opacity (derived surface ignores the timer input)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "artboard_scale_identical_at_widths"
description = "Resizing between 1440px and 390px yields an identical artboard transform at both widths (scale stays fixed regardless of viewport width)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "menu_or_reveal_stale_until_reload"
description = "After closing Solutions or revealing cards via scroll, the panel expanded state or card resting state disagrees across surfaces until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "brief_preview_tracks_field_mutations"
description = "Derived-view sensitivity: change plan from Free trial to Team and toggle two interest chips; the live preview plan and interests array update to those exact values — not an identical redraw regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "brief_export_matches_preview_cross_surface"
description = "Cross-view echo: after filling the trial brief, the Download JSON / Copy brief artifact text matches the monospaced preview block character-for-character (same name, email, plan, team_size, interests)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "two_brief_exports_differ_by_inputs"
description = "Input-dependent output: export once with name Jordan Lee and interests Portfolios+Freelancers, then again with name Avery Lane and interests Editorials only — the two preview/export texts differ in name and interests as the inputs dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "import_export_round_trip_restores_brief"
description = "Multi-facet round-trip for the brief: export a filled schema-valid brief, activate Reset to the empty baseline, import the file — form chips/fields and preview restore together; a subsequent reload then coherently resets the in-memory brief to empty baseline (never a mixed partial survival)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "invalid_then_valid_brief_schema_round_trip"
description = "Edge-state round-trip: set Free trial with team_size 11-50 (Submit disabled, named cross-field error), then correct to Free trial + team_size 1 with empty interests and Submit — Trial brief ready appears and the preview is a conforming request body with no leftover error chrome blocking the panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "reset_then_undo_restores_brief"
description = "Fill a schema-valid brief, activate Reset (empty baseline preview with \"\" scalars and []), then Undo — form values and preview restore to the pre-Reset brief together."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "brief_preview_ignores_field_changes"
description = "Editing name, plan, or interests leaves the live preview JSON identical (derived surface ignores inputs)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_does_not_restore_brief"
description = "After toggling an interest chip, Undo leaves the chip selected and the preview interests array unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "schema_reject_then_accept_leaves_stale_errors"
description = "After fixing a cross-field or format error and submitting a valid brief, named validation errors remain stuck on screen and block reading the Trial brief ready message or the conforming preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n8"
name = "reset_undo_fails_to_restore"
description = "After Reset clears a filled brief, Undo leaves the empty baseline in place instead of restoring the pre-Reset form values and preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
