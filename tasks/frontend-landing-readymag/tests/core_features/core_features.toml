[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "header_placeholder_wordmark_and_nav"
description = "On load, a sticky white header stays fixed to the top of the viewport on scroll and shows a newly authored Canvasly wordmark in the logo position (which swaps to a distinct hover mark on hover), a Solutions control plus Pricing, Examples, Templates, and Learn links, and account actions on the right: a \"Log in\" text link and a \"Sign up\" pill button"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "hero_headline_subtitle_cta"
description = "On load, the hero shows the headline \"Design and launch outstanding websites\", the subtitle \"Design, prototype, collaborate, publish.\", and a \"Try Canvasly\" button followed by \"or choose your subscription plan\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "hello_ready_accent_cluster"
description = "On load, the oversized accent cluster reads \"Hello!\" in orange followed by \"Ready\" and \"?\" in purple near the hero transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "slideshow_auto_advances"
description = "When the six-image project slideshow is left running, its active (fully opaque) frame changes on its own about every 2.2 seconds while neighboring frames stay dimmed at 0.35 opacity"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "usecase_tiles_labels_and_colors"
description = "On load, six color-coded use-case tiles appear with the exact labels Portfolios (#FF88BA), Landing pages (#FFCB00), Editorials (#008BFF), Company websites (#A6A6A6), Design studios (#4AAC54), and by Canvasly team (#EC520B), all with white text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "support_band_copy_and_orb"
description = "On load, a dark #282828 support band shows \"Get the best support\" with \"around-the-clock support on business days\" emphasized in orange and an animated orange orb traveling a curved path"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "usecase_marquee_labels"
description = "On load, a traveling marquee row cycles through the oversized labels Company websites, Landing pages, Editorials, Presentations, Design studios, and Portfolios"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "closing_cta_copy"
description = "On load, the closing call-to-action shows \"Try for free\", a \"Try Canvasly\" button, and a \"View pricing\" link"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "footer_groups_copyright_email"
description = "The footer is a dark multi-column layout with four link groups carrying the exact labels — company (about, careers, reviews, terms of service, privacy policy, cookie policy), product (pricing, templates, product updates, affiliate program, referral program, npo discount), resources (examples, design almanac, design stories, help, forum, status, blog), solutions (portfolios, presentations, editorials, companies, freelancers, students) — ending with \"© 2026 Canvasly Inc.\" and \"support@canvasly.example\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "mobile_390_layout_adaptations"
description = "After resizing the viewport to about 390px wide, the floating hero card and desktop nav are hidden, the use-case tiles collapse to two columns, and no page-wide horizontal scrollbar appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "reduced_motion_resting_state"
description = "When prefers-reduced-motion is enabled, path travel, tilt, and reveal animation stop while every section remains visible in its final resting position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "feature_cards_exact_copy"
description = "Four feature cards render with the exact titles \"Enjoy easy workflow\", \"Streamline teamwork\", \"Attract with interactivity\", and \"Expand functionality to infinity\" and their described bodies, including the Attract card body that names video and vector motion"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "support_band_full_sentence"
description = "The support band shows \"Get the best support\" and the sentence \"Our agents offer around-the-clock support on business days and treat you with care.\" with \"around-the-clock support on business days\" emphasized"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "solutions_menu_a11y_and_items"
description = "The Solutions control is a button with accessible name \"Solutions menu\", aria-haspopup and aria-controls, and opens a menu (Portfolios, Presentations, Editorials, Companies, Freelancers, Students) on click or Enter with aria-expanded flipping to true; Escape closes it and returns focus to the trigger"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "landmarks_and_keyboard_focus"
description = "The page uses header, nav, main, section, article, and footer landmarks with one page-level heading, and interactive controls are keyboard reachable with visible focus"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "solutions_is_noninteractive_link"
description = "The Solutions control is a plain non-interactive link with no menu, no aria-haspopup, and no synchronized aria-expanded state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "chrome_nav_lands_on_missing_page"
description = "Activating a header, footer, CTA, tile, or Solutions-menu chrome link navigates away from the homepage to an application-error or \"Not found\" page, or a required header/footer chrome link is missing so navigation chrome is not present"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "solutions_menu_flow_cycles_cleanly"
description = "Scripted flow: click the Solutions trigger — its panel opens showing all six labels (Portfolios, Presentations, Editorials, Companies, Freelancers, Students) and the trigger reports aria-expanded=true; press Escape — the panel closes, aria-expanded returns to false, and focus is back on the trigger; reopen it and click outside the panel — it closes without activating the element beneath the click; repeat the open/close cycle once more with no leftover or orphaned panel remaining in the DOM"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "mobile_menu_flow_round_trip"
description = "Scripted flow: at desktop width note the scroll position, resize the viewport to 768px — the desktop navigation and the \"Log in\" link are hidden and a compact \"Menu\" button appears in the header; activate it — a mobile menu panel opens listing the navigation and account links; dismiss the panel and resize back to desktop width — the desktop header layout returns, no mobile panel remains, and the page's scroll position is unchanged throughout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "slideshow_wraps_seamlessly_unattended"
description = "Leaving the page idle with no manual control touched, the six-frame slideshow advances on its own timer through all six frames and, after the sixth, wraps back to the first with the same opacity treatment (active 1.0, neighbors 0.35) and no blank frame and no two fully opaque frames at any point across the wrap"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "scroll_reveal_reload_round_trip"
description = "On a fresh page load (verify on a fresh load — prior scrolling pollutes reveal state) the four workflow feature cards start unrevealed; scrolling the workflow section into view fades and raises them into place with a stagger; they remain in their revealed resting state while scrolling onward; reloading the page restores the unrevealed starting state until the section is scrolled into view again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "zoom_to_fit_rescale_flow"
description = "Resizing the viewport from 1440px down to 390px continuously rescales the whole 1024px design artboard to fit the viewport width, the scroll wrapper's height tracks the scaled document height, and at intermediate widths (e.g. 1024px, 768px, 560px, 390px) the full design width stays visible with no horizontal scrollbar and no cropped right edge"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "escape_on_closed_menu_inert"
description = "With the Solutions menu closed, pressing Escape does nothing: no console error, no visual change, and focus stays where it was"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.33"
name = "custom_cursor_follows_and_passes_clicks"
description = "On a fine-pointer desktop viewport, a 43px custom image cursor follows the pointer and swaps to a hover image while over links, buttons, and role=button elements, and clicking a link or button while the cursor image overlaps it activates the element beneath — the cursor layer keeps pointer-events: none and never intercepts the click"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "coarse_pointer_keeps_system_cursor"
description = "Under coarse-pointer conditions the custom image cursor is absent and the system cursor remains fully visible — the system pointer is never hidden without a visible replacement"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "hero_media_card_plays_local_clip"
description = "The hero contains a floating media card (rounded, shadowed) on the right that plays an original placeholder clip served from the app's own origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "reload_restores_initial_state"
description = "Scripted flow: open the Solutions menu, let the slideshow advance a few frames, and scroll toward the bottom; reloading the page then returns it to its initial state — menus closed, the slideshow back on its first frame, and the scroll-reveal sections unrevealed until scrolled into view again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "single_page_chrome_stays_on_homepage"
description = "Scripted flow: from the homepage, activate Pricing, Examples, Templates, Learn, View pricing, and at least one footer group link in turn — after each activation the URL remains a homepage path or homepage hash (no secondary route content such as a Pricing plans page), the sticky header and homepage sections remain available, and no blank/error/Not-found document replaces the homepage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "hero_gallery_three_marquee_rows"
description = "On load the hero shows three distinct animated gallery rows of original placeholder project thumbnails traveling continuously across the top of the hero"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core features or end-to-end flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
