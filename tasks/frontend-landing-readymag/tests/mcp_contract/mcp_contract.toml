[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_modules_bound"
description = "Contract modules browse-query-v1, command-session-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, session, form, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, session, form, and artifact tool handlers drive the same visible UI logic as on-page controls (section destinations, Solutions menu demo, slideshow advance, trial brief fields/submit/reset, and export/copy/import)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_available"
description = "Only documented browse, session, form (validate, submit, cancel, reset, advance, return), and artifact (import, export, copy, print_preview, convert) permitted operations are available — no undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open, session advance / trigger_demo, form validate/submit/reset, and artifact export/copy against the declared bindings."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "browse_destinations_include_trial_brief"
description = "Browse open works for declared destinations: hero, workflow, teams, support, closing, and trial-brief."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_advance_and_solutions_demo"
description = "Session operation advance advances the slideshow via the same logic as the idle timer path; demo solutions-menu via trigger_demo opens or toggles the Solutions panel with the same six labels and expanded state as the UI trigger."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "form_fields_and_ops_bound"
description = "Form fields name, email, plan, team_size, and interests plus form operations validate, submit, and reset are bound; invoking them updates the visible trial brief form and live preview through the same handlers as the UI; validate/submit reject drafts that fail the trial-signup field contract (formats, enums, bounds, or Free-trial/Team/Pro cross-field rules) with the same named field errors as the UI; form reset returns the empty baseline preview (product Canvasly, empty-string scalars, [] interests) like the Reset control."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_export_copy_import_bound"
description = "Artifact operations export, copy, and import are bound with export format json and import mode replace; export/copy reflect the session's current trial brief preview (Playwright observes download/clipboard contents)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Browse, session, form, or artifact MCP tooling is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A browse open, session advance, form submit/reset, or artifact export/copy invocation updates MCP-reported state without matching the visible section scroll, slideshow frame, Solutions panel, or trial brief preview (or the reverse)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_destinations_or_ops_exposed"
description = "Undeclared destinations or operations outside the Bindings/permitted_operations lists are exposed via webmcp_list_tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise browse open, session advance/trigger_demo, form validate/submit/reset, or artifact export/copy against the declared bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "artifact_export_omits_session_brief"
description = "Invoking artifact export or copy reports success while the visible trial brief preview still shows session mutations that the exported/copied text omits."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete module/tool data for the declared contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console stubs rather than app-registered handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_missing"
description = "browse-query-v1, command-session-v1, form-workflow-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed so list/invoke cannot reach real handlers."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "bindings_incomplete"
description = "Declared destinations (including trial-brief), session advance, demo solutions-menu, form fields/ops, or artifact export/copy/import are missing from the bound tool surface."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n11"
name = "form_submit_bypasses_trial_signup_schema"
description = "Invoking form validate or submit via MCP bypasses the trial-signup field contract and leaves UI/MCP state inconsistent with a manual invalid draft (e.g. success without named field errors when Free trial is paired with team_size 11-50, or Pro with zero interests)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
