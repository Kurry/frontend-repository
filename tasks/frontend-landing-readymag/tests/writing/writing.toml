[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_match_mandated_casing"
description = "Where the app renders headings and section titles (Design and launch outstanding websites, Enjoy easy workflow, Teams of all sizes create websites with Canvasly, Get the best support, Try for free), they keep the mandated casing and phrasing consistently."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "cta_labels_specific"
description = "Where the app renders primary action labels, they use the mandated specific copy (Try Canvasly, Sign up, Log in, Menu, View pricing, or choose your subscription plan) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "marketing_copy_spelling_grammar"
description = "Where the app renders body or marketing copy (hero subtitle, four feature-card bodies, support sentence), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "canvasly_terminology_consistent"
description = "Where the app renders the product name, terminology stays consistent as Canvasly / Canvasly Studio (not mixed with leftover source-product naming)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "copyright_year_and_email_exact"
description = "Where the app renders the footer copyright and support contact, they show exactly © 2026 Canvasly Studio and support@canvasly.example."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "mandated_feature_card_copy_exact"
description = "Where the app renders the four workflow feature cards, titles and bodies match exactly: Enjoy easy workflow; Streamline teamwork; Attract with interactivity; Expand functionality to infinity — each with its mandated body paragraph."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "tile_and_marquee_labels_exact"
description = "Where the app renders use-case tile and traveling marquee labels, they match the mandated sets: tiles Portfolios, Landing pages, Editorials, Company websites, Design studios, and by Canvasly team; marquee Company websites, Landing pages, Editorials, Presentations, Design studios, and Portfolios."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "footer_link_labels_exact"
description = "Where the app renders footer link labels, the four groups show the exact mandated labels for company, product, resources, and solutions columns."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "trial_brief_action_labels_specific"
description = "Where the app renders trial brief actions, labels stay specific (Download JSON, Copy brief, Import brief, Submit trial brief, Load sample brief, Reset, Undo, Redo) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.12"
name = "trial_brief_validation_and_success_copy"
description = "Where the app renders trial brief validation, messages name the field and the fix (for example Email must be a valid address, Name must be at least 2 characters, Team size must be 1 for Free trial, Interests required for Pro); the success line reads Trial brief ready — download or copy your JSON above."
type = "binary"
weight = 0.5

