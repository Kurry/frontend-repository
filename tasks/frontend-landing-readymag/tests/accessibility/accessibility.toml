[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "interactive_controls_keyboard_operable"
description = "Every interactive control (Solutions menu, nav links, Log in, Sign up, Menu, Try Canvasly, View pricing, use-case tiles, footer links) is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "solutions_menu_focus_and_expanded"
description = "The Solutions control is a button with accessible name Solutions menu, aria-haspopup=menu, aria-controls pointing at its panel, and aria-expanded that flips to true when open and false when closed; Escape closes the open menu and returns focus to the trigger."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "content_media_accessible_names"
description = "Content imagery that conveys meaning has descriptive alt text or accessible labels; the slideshow region carries an accessible label; the floating hero art, path-traveling orb, marquee decoration, and custom cursor are marked aria-hidden."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "The page has one page-level heading and ordered section headings following a logical outline with no skipped levels that break the structure."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_header_nav_main_footer"
description = "The document exposes semantic header, nav, main, section, article, and footer landmarks wrapping the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contrast_on_white_and_dark_surfaces"
description = "Text meets WCAG AA contrast on the white canvas and on the dark #282828 support-band and footer surfaces, including the orange emphasis text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_interactive_chrome"
description = "Every interactive item is a real link or button with a useful accessible name rather than a non-semantic div/span hit target."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_stops_kinetic_effects"
description = "With prefers-reduced-motion: reduce emulated on a fresh load, all offset-path travel, tilt, and reveal animation stops; every section shows in its final resting state (fully visible and correctly placed); and the system cursor is restored (custom cursor disabled)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.a1"
name = "split_copy_preserves_accessible_name"
description = "Where split animated copy is used, the container keeps the complete phrase as an accessible name (aria-label or equivalent) while individual character/word fragments are aria-hidden from the accessibility tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "A primary interactive control (Solutions, Menu, Sign up, Try Canvasly, or a nav/footer link) cannot be reached or activated via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused interactive controls show no visible focus indicator or the indicator is fully obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "The Solutions trigger, Menu button, or other custom interactive chrome uses non-semantic tags without ARIA roles/labels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "solutions_expanded_state_wrong"
description = "Opening or closing the Solutions menu leaves aria-expanded incorrect (stays false while open, or stays true while closed), or Escape fails to return focus to the trigger."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_unreadable_text"
description = "Body or UI text is unreadable due to contrast below WCAG AA on the white canvas or dark #282828 surfaces."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "decorative_media_not_hidden"
description = "The floating hero art, path-traveling orb, marquee decoration, or custom cursor remain exposed to the accessibility tree without aria-hidden."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.a4"
name = "split_heading_character_soup"
description = "A split/kinetic headline is exposed to the accessibility tree as character soup — no aria-label (or equivalent) on the container and the split spans are not aria-hidden."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings are skipped or unordered, such as jumping from H1 to H3 with no intervening H2."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, offset-path marquees, tilt accents, reveal animations, or the custom cursor continue to run instead of settling to resting states with the system cursor restored."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "command_palette_dialog_a11y"
description = "The command palette uses role dialog with aria-modal true, traps focus while open, closes on Escape, and returns focus to the control that opened it; the search input has an accessible name such as Search commands."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "trial_brief_labels_and_live_region"
description = "Trial brief fields use explicit labels for Name, Email, Plan, Team size, and Interests; Reset, Download JSON, Copy brief, Import brief, and Submit trial brief are real buttons with accessible names; validation errors and the Trial brief ready message are announced through a polite live region as well as shown visually; Undo and Redo expose disabled state when their stacks are empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n11"
name = "palette_or_brief_keyboard_inaccessible"
description = "The command palette or trial brief controls (fields, Download JSON, Copy brief, Undo/Redo) cannot be reached or operated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
