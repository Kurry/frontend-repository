[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_interactive_under_2s"
description = "The page is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load_and_exercise"
description = "No console errors, hydration mismatch warnings, or unhandled rejections appear on load or during a full scroll-through, Solutions/mobile menu exercise, and slideshow observation; loading the homepage directly shows no post-hydration content flash."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "chrome_interactions_remain_responsive"
description = "Solutions menu open/close, Menu panel, and primary CTA chrome respond without multi-second lag after first paint."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "full_page_scroll_without_lag"
description = "Scrolling the full homepage (hero through footer) remains usable without perceived multi-second freezes between sections."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_menus_and_slideshow"
description = "The UI remains interactive while menus open/close and the slideshow advances (controls stay clickable)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "marquees_tilts_orb_hold_frame_rate"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through the marquee rows, tilt accents, orb travel, and feature-card reveals."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_menu_toggle_never_freezes"
description = "Rapidly opening and closing the Solutions menu several times never freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_scroll_session_stable"
description = "After an extended scroll-through with menu exercises and slideshow observation, the page remains responsive without runaway resource use that freezes interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.a1"
name = "scroll_linked_animation_frame_rate"
description = "Scroll-linked feature-card reveals and continuous marquee/orb motion hold a smooth frame rate through the full page length on a 1440-wide viewport with no visible hitching during continuous scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a4"
name = "layout_stable_media_reserve_space"
description = "Layout is stable after load: media regions hold their space from first paint so no visible layout shift occurs as fonts, images, or the floating media card finish loading."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a6"
name = "interactive_before_heavy_media_finishes"
description = "The page becomes interactive before heavy media (hero marquee artwork, floating-card video, slideshow frames) finish loading; reserved media regions do not block first interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the page is interactive on a local cold load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors, hydration mismatch warnings, or unhandled rejections appear during load, scroll-through, menu exercise, or slideshow observation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.a3"
name = "heavy_assets_collapse_frame_rate"
description = "Heavy visual assets (hero marquees, floating-card video, orb path, or reveal scripts) cause frame-rate collapse, delayed first render, or input latency during signature scroll/hover interactions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "During hero intro, marquee travel, or feature-card reveals, primary controls (Solutions, Sign up, Try Canvasly) become unresponsive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering with a blank page while fonts, images, or the media card load instead of showing reserved-space layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_use_crashes_page"
description = "Rapid menu toggling or fast continuous scrolling crashes the page or leaves it permanently unresponsive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.11"
name = "brief_and_palette_remain_responsive"
description = "Rapid trial-brief field edits, undo/redo, and command-palette open/filter/close never freeze the page or drop pointer/keyboard input."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n11"
name = "brief_edits_freeze_page"
description = "Editing trial brief fields, toggling interests, or opening the command palette freezes the page or leaves controls unresponsive for multiple seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
