[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "same_origin_asset_requests"
description = "Every request the page makes is same-origin with the app or a data:/about: URL; no external font, image, video, CSS, or script CDN request fires (negative anchor: a remote font or analytics request is issued to an external host)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "console_clean_assets_ok"
description = "The page produces no uncaught JavaScript console errors and no failed asset request (no 4xx/5xx or net::ERR) for scripts, styles, images, fonts, or media"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "storage_apis_remain_empty"
description = "After exercising the page (menus, slideshow, full scroll-through), localStorage and sessionStorage remain completely empty — all state is held in memory, not browser storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "decorative_media_aria_hidden"
description = "The floating hero art, the path-traveling orb, the marquee decoration, and the custom cursor element are marked aria-hidden so they create no duplicate announcements, the cursor element keeps pointer-events: none, and the slideshow region carries an accessible label"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "text_contrast_meets_aa"
description = "Text meets WCAG AA contrast on the white canvas and on the dark #282828 support-band and footer surfaces, including the orange emphasis text on the dark band"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "interactive_within_2s_no_layout_shift"
description = "The page is interactive within 2 seconds of a local cold load, and media regions hold their space from first paint so no visible layout shift occurs as fonts, images, or the hero media card finish loading"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "smooth_scroll_frame_rate"
description = "Continuous scrolling from top to bottom holds a smooth frame rate through the marquee rows, tilt accents, orb travel, and reveals, with no sustained hitching or input lag"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "hydration_clean_direct_load"
description = "Loading the homepage URL directly renders the complete page with a console free of hydration mismatch errors or warnings, and no post-hydration content flash: no text, layout, or styling is visibly replaced between first paint and interactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "document_metadata_present"
description = "The document sets a language attribute, the title \"Canvasly – the design tool for outstanding websites\", a meta description \"Design, prototype, collaborate, publish.\", matching social title/description metadata with a social summary_large_image card and a local placeholder social image, and a favicon"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.12"
name = "html_first_landmarks_semantics"
description = "The homepage is HTML-first: real header/nav/main/section/footer landmarks and native button/link controls carry the chrome (not div-only click targets for Solutions or Menu), with keyboard focus indicators visible on those controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "required_authored_asset_files_load"
description = "Browser network and playback evidence shows the complete Canvasly marks, project art, local VP9 WebM/poster pair, illustrations, slideshow frames, tile graphics, cursor art, share image, and icons loading from same-origin paths with no 404, decode, or playback failure"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "brief_state_coherent_across_surfaces"
description = "Shared-state coherence: editing trial brief fields updates the live preview and any subsequent Download JSON / Copy brief artifact together without reload; undo restores form and preview together."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "reload_resets_brief_in_memory"
description = "After filling the trial brief and opening the command palette, a reload returns empty brief fields, closed palette, first slideshow frame, and closed menus — in-memory genre baseline, with localStorage/sessionStorage still empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "trial_brief_api_shaped_schema_validation"
description = "The trial brief form validates the trial-signup request-body field contract entirely client-side (no network request) with inline per-field errors naming the field and Submit trial brief disabled until valid; every preview keeps all seven required keys (empty-string unset scalars, [] interests); a valid submit produces that request-body object; Download JSON / Copy brief always emit the live preview; Import rejects non-conforming JSON without mutating the brief; Reset returns the empty baseline without a reload."
type = "binary"
weight = 1.0

