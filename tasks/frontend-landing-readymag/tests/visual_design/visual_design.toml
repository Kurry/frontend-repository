[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "canvas_and_surface_colors"
description = "By computed style, the support band and footer backgrounds are rgb(40, 40, 40) with rgb(255, 255, 255) text, the body background is rgb(255, 255, 255), and body text is rgb(40, 40, 40) (EXACT color match; CLOSE only for antialiasing)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "usecase_tile_exact_colors"
description = "By computed style, the six use-case tiles render color rgb(255, 255, 255) text on their EXACT backgrounds: Portfolios rgb(255,136,186) #FF88BA, Landing pages rgb(255,203,0) #FFCB00, Editorials rgb(0,139,255) #008BFF, Company websites rgb(166,166,166) #A6A6A6, Design studios rgb(74,172,84) #4AAC54, by Readymag team rgb(236,82,11) #EC520B, each with border-radius 16px"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "hero_title_type_scale_display_face"
description = "By computed style, the hero title (h1) is font-size 60px, weight 400, line-height 54px (the 0.9 ratio), letter-spacing -2px, color rgb(0,0,0), rendered in a bundled grotesque display face that is visibly distinct from the Inter stack of the nav and buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "orange_and_purple_accents"
description = "Primary orange #FF6600 (rgb(255, 102, 0)) appears on the \"Hello!\" accent and support-band emphasis, secondary orange #EC520B appears among brand accents such as button hover and the by-Readymag-team tile, and the Ready/? cluster uses purple #7A24FF (rgb(122, 36, 255))"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "media_card_and_slide_geometry"
description = "By computed style, the floating hero media card has border-radius 24px and box-shadow rgba(0,0,0,0.12) 0px 24px 80px, and each slideshow frame measures 276px by 180px with border-radius 12px"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "section_order_spacing_rhythm"
description = "The desktop composition presents the sections in order (hero, workflow with cards and slideshow, use-case tiles, dark support band, marquee, closing CTA, footer) with a coherent 4px-baseline spacing rhythm on the 1024px design (about 28px horizontal padding and 96px section vertical padding)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "copy_matches_prd_exactly"
description = "All rendered copy matches the PRD exactly with no invented claims (headline, subtitle, feature titles and bodies including the Attract card's \"Lottie\" wording, tile labels, support and closing copy)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "mobile_390_visual_coherence"
description = "At the mobile viewport (about 390px) the page keeps a coherent visual system: readable type hierarchy, correct colors, and proportional spacing with no clipped or overlapping content"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "usecase_tiles_gray_or_nonwhite"
description = "The use-case tiles render as gray or placeholder boxes instead of their six specified hex colors, or their text is not white"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "display_type_contrast_flattened"
description = "Display headings render in a generic default system font with no distinct display/UI type hierarchy, flattening the intended display-face versus Inter contrast"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "2.11"
name = "secondary_type_scale_measurements"
description = "By computed style at the 1024px design scale, the section heading measures 40px / line-height 38px / letter-spacing -1.8px, the card headings 28px / 28px / -1px, standard body text 18px / 20px / -0.8px, and header/footer utility text 12px"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.12"
name = "artboard_scale_transform_measurements"
description = "The page artboard computes width 1024px with transform-origin 0 0; at a 1440px viewport its computed transform is none (scale 1) and at a 390px viewport its computed transform is matrix(0.380859, 0, 0, 0.380859, 0, 0), with the scaled layers unclipped so the entire design width is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "tablet_768_layout_adaptations"
description = "At a 768px viewport the floating hero media card is hidden, the feature cards stack in one column, the use-case tiles form two columns, and the footer collapses to two columns, with the header and CTA controls usable and no horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "real_brand_assets_shipped"
description = "The page ships real third-party brand assets: the reference site's actual logo or wordmark files, its licensed display typeface, real project thumbnails, photography, or video lifted from the reference, or placeholder art/wordmark/cursor imagery that names or depicts real third-party brands, sites, or agencies instead of invented identities"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.15"
name = "placeholder_or_typo_copy_present"
description = "Lorem ipsum, TODO, or template placeholder text appears somewhere on the page, or prominent copy (headline, section headings, buttons, footer labels) contains spelling errors or casing inconsistent with the mandated strings"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.16"
name = "asymmetric_hero_broken_grid"
description = "At desktop width the hero reads as an asymmetric broken-grid composition: a multi-row gallery band above a left-biased headline/CTA stack, a floating media card overlapping the right side of the hero, and an oversized Hello!/Ready/? accent cluster that breaks the section rhythm below the CTA — not a centered equal-column stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "color_scarcity_accent_rule"
description = "Orange and purple stay scarce accents: orange is limited to Hello!, support emphasis/orb, and primary-button hover (plus categorical tile use where specified); purple appears on the Ready/? cluster; large page regions are not flooded with orange or purple fills"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "accent_colors_sprayed_as_washes"
description = "Orange or purple is used as a large page-wide background wash or repeated fill across multiple unrelated sections, breaking the scarce-accent rule"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design, layout, responsiveness, or rendered copy that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
