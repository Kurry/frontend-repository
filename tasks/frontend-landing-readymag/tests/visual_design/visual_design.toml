[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "By computed style, the support band and footer backgrounds are rgb(40, 40, 40) with rgb(255, 255, 255) text, the body background is rgb(255, 255, 255), and body text is rgb(40, 40, 40) (EXACT color match; CLOSE only for antialiasing)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "By computed style, the six use-case tiles render color rgb(255, 255, 255) text on their EXACT backgrounds: Portfolios rgb(255,136,186) #FF88BA, Landing pages rgb(255,203,0) #FFCB00, Editorials rgb(0,139,255) #008BFF, Company websites rgb(166,166,166) #A6A6A6, Design studios rgb(74,172,84) #4AAC54, by Readymag team rgb(236,82,11) #EC520B, each with border-radius 16px"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "By computed style, the hero title (h1) is font-size 60px, weight 400, line-height 54px (the 0.9 ratio), letter-spacing -2px, color rgb(0,0,0), in a Graphik display font-family distinct from the Inter UI stack of the nav/buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Primary orange (#FF6600) and secondary orange (#EC520B) appear on brand accents such as the \"Hello!\" accent, the support-band emphasis, and button hover states"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "By computed style, the floating hero media card has border-radius 24px and box-shadow rgba(0,0,0,0.12) 0px 24px 80px, and each slideshow frame measures 276px by 180px with border-radius 12px"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "The desktop composition presents the sections in order (hero, workflow with cards and slideshow, use-case tiles, dark support band, marquee, closing CTA, footer) with a coherent spacing rhythm on the 1024px design"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "2_7"
description = "All rendered copy matches the PRD exactly with no invented claims (headline, subtitle, feature titles and bodies, tile labels, support and closing copy)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "2_8"
description = "At the mobile viewport (about 390px) the page keeps a coherent visual system: readable type hierarchy, correct colors, and proportional spacing with no clipped or overlapping content"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "2_9"
description = "The use-case tiles render as gray or placeholder boxes instead of their six specified hex colors, or their text is not white"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "2_10"
description = "Display headings render in a generic default system font with no distinct display/UI type hierarchy, flattening the intended Graphik/Inter contrast"
type = "binary"
weight = 0.5
negate = true
optional = true
