[[criterion]]
id = "3.18"
name = "block_fidelity_teams_usecase_tiles"
description = "Block: teams use-case tiles — A Teams of all sizes heading over a 3x2 grid of color-coded rounded tiles with white labels for Portfolios (pink), Landing pages (yellow), Editorials (blue), Company websites (grey), Design studios (green), and an orange by-team tile (reference: segment-04.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
