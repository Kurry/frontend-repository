type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.20"
name = "block_fidelity_usecase_marquee_row"
description = "Block: use-case marquee row — Traveling row of oversized non-wrapping black labels on white naming Presentations, Design studios, Portfolios, Company websites, Landing pages, and Editorials (reference: segment-05.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.21"
name = "block_fidelity_closing_cta"
description = "Block: closing CTA — Centered closing block on white with a large Try for free heading, a grey subscription line, a dark CTA pill with an underlined View pricing link, and the instruction-mandated embedded trial-brief panel below the heading (reference: segment-05.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
