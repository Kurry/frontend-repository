[[criterion]]
id = "3.22"
name = "block_fidelity_footer_multicolumn"
description = "Block: footer multicolumn — Dark #282828 footer with four link-label groups and a bottom row placing copyright at left and a support email at right (reference: segment-05.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: hero intro timeline, continuous gallery marquees, feature-card scroll reveals, slideshow opacity advance, tilt accents, support-orb path travel, and custom cursor follow — verified via the real UI/scroll/pointer path on a fresh load where reveals apply."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_zoom_to_fit_matches_spec"
description = "Responsive behavior matches the zoom-to-fit contract: artboard width 1024px with transform-origin 0 0; scale = min(1, viewportWidth/1024); at 1440 transform none; at 390 matrix(0.380859, 0, 0, 0.380859, 0, 0); at ≤768 Menu chrome, stacked cards, two-column tiles, two-column footer."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "pills_cards_media_match_spec"
description = "Primary and ghost buttons are dark #282828 pills; floating hero media card uses 24px radius and 0 24px 80px rgba(0,0,0,0.12) shadow; slideshow frames are 276×180 with 12px radii; use-case tiles use 16px radius and 88px min-height — not unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes oversized display headlines from Inter utility/body copy across hero, sections, cards, and footer."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover states match the spec where specified: buttons lift 1–2px and shift to orange on hover; use-case tiles rotate -2deg and scale to 1.02; nav/footer underlines shift; header wordmark swaps to its hover mark — verified by hovering the real control."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_and_accents_exact"
description = "Color treatments match: canvas/inverse text #FFFFFF; primary text and dark surfaces #282828 (support band and footer); hero title rgba(0, 0, 0, 1); primary orange #FF6600 on Hello!, support emphasis, and orb; Ready/? purple #7A24FF; six tile fills exactly Portfolios #FF88BA, Landing pages #FFCB00, Editorials #008BFF, Company websites #A6A6A6, Design studios #4AAC54, by Canvasly team #EC520B with white text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions and slideshow opacity changes follow the reference language (0.35s ease-in-out slide opacity; inertial cubic-bezier(.56,.86,.59,1) reveals) rather than instant snaps or purely linear tweens for signature motion."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_baseline"
description = "Visible major section gaps use arbitrary odd-pixel spacing that contradicts the 4px baseline scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_canvasly_palette"
description = "Surfaces or accents wash the page with orange/purple fills outside the reserved accent roles, or use colors outside the specified Canvasly palette and categorical tile chip colors."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At the 1024px design scale the hero title or section headings are grossly mismatched versus the 60px / 40px reference metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no hero marquees, no feature-card scroll reveal on a fresh load, or no auto-advancing slideshow."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary CTAs or pills use unstyled browser default appearance when the reference uses dark #282828 pill styling."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (hero marquees, floating media card, feature cards, support band, footer) render off-screen or clipped at desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated homepage order (sticky header → oversized hero → workflow → Teams tiles → dark support band → traveling marquee → closing CTA with embedded trial brief builder → multi-column footer) or omits a required section."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.11"
name = "trial_brief_embedded_in_closing"
description = "The trial brief builder is embedded in the closing call-to-action region (not a separate route), preserving the reference closing composition while adding the Build your Canvasly trial brief panel with live JSON preview beneath the Try for free CTA."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or slideshow opacity microinteractions are missing or clearly deviate from the reference (instant snaps, no tile hover rotate/scale, no wordmark hover swap)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
