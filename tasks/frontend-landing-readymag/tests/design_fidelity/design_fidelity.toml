[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_4px_baseline_scale"
description = "At the 1024px design scale, section paddings and gaps follow the 4px baseline (28px horizontal padding, 96px section vertical padding, 120px closing padding, gaps of 16/32/48/56px) rather than arbitrary odd-pixel one-offs."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_reference_metrics"
description = "At the 1024px design scale typography matches the spec: hero title 60px / line-height 54px / -2px tracking / weight 400; closing title 60px / 57px / -2px; section heading 40px / 38px / -1.8px; card heading 28px / 28px; large body 21px / 24px; standard body 18px / 20px; header/footer utility 12px; Hello!/Ready cluster about 132px; display grotesque and Inter stacks stay visibly distinct."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "block_fidelity_sticky_header_nav"
description = "Block: sticky header nav — Sticky white bar with a hairline bottom border holding a round monogram logo at left, a centered Solutions / Pricing / Examples / Templates / Learn nav, and a Log in link beside a dark Sign up pill at right (reference: segment-01.png, persists in all segments). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.13"
name = "block_fidelity_hero_gallery_marquees"
description = "Block: hero gallery marquees — Three stacked marquee rows of colorful project thumbnails scrolling across the top of the hero (reference: segment-01.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.14"
name = "block_fidelity_hero_headline_cta"
description = "Block: hero headline and CTA — Oversized black headline reading Design and launch outstanding websites over a grey subtitle, a dark Try pill with an underlined subscription-plan link, and a tilted orange floating Mobile editor media card overlapping the right edge (reference: segment-01.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.15"
name = "block_fidelity_hello_ready_accent_cluster"
description = "Block: Hello/Ready accent cluster — Oversized playful grid-breaking type placing an orange Hello! beside a tilted purple Ready? on white whitespace (reference: segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.16"
name = "block_fidelity_workflow_feature_cards"
description = "Block: workflow feature cards — An Enjoy easy workflow heading and intro paragraph followed by four scroll-reveal feature cards in two columns covering easy workflow, streamlined teamwork, attracting with interactivity, and expanded functionality (reference: segment-02.png–segment-03.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
weight = 1.0

[[criterion]]
id = "3.17"
name = "block_fidelity_project_slideshow_strip"
description = "Block: project slideshow strip — Horizontal six-frame project slideshow with the active frame opaque and its neighbors dimmed to roughly 0.35 opacity (reference: segment-03.png–segment-04.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
points = 5
