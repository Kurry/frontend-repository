[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "zoom_to_fit_scale_at_1440_and_390"
description = "Zoom-to-fit is the responsive model: at 1440px the 1024px artboard's computed transform is none (scale 1); at 390px the measured transform is matrix(0.380859, 0, 0, 0.380859, 0, 0) (390/1024); scaled layers stay unclipped so the entire design width is visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 768px and below, primary interactive controls (Menu, Sign up, Try Canvasly, Solutions where shown) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "type_scales_via_artboard_zoom"
description = "Between 1440 and 390 widths, typography scales via the 1024px artboard zoom-to-fit transform rather than abrupt per-heading breakpoint size jumps that break hierarchy."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_at_1440_768_390"
description = "At 1440, 768, and 390 widths, content never clips or overflows the viewport; the full design width stays visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_collapses_to_menu_at_768"
description = "On viewports 768px and narrower the desktop navigation and the account Log in link are hidden and a compact Menu button appears in the header; activating it opens a mobile menu panel listing navigation and account links."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "cards_tiles_footer_reflow_at_768"
description = "At 768px and below the floating hero media card is hidden, the feature cards stack in one column, the use-case tiles form two columns, and the footer collapses to two columns, with header and CTA controls remaining usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_menu_tap_works"
description = "At 768px, tapping the Menu button opens the mobile menu panel and the listed navigation and account links are operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scrollbar_any_width"
description = "No unintended horizontal scrollbar appears at 1440, 768, or 390 widths while the scaled artboard remains fully visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "media_scales_with_artboard"
description = "Hero marquees, slideshow frames, use-case tiles, and the floating media card (when shown) size with the zoom-to-fit artboard rather than overflowing at 768 or 390."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "sticky_header_usable_all_widths"
description = "The sticky white header remains reachable and usable at 1440, 768, and 390; primary CTA controls remain accessible without horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_rechoreographed_at_390"
description = "At 390 the asymmetric hero, stacked feature cards, two-column tiles, and collapsed footer are re-choreographed into a readable mobile composition rather than a broken shrink of the desktop broken-grid."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_key_widths"
description = "At 1440, 768, or 390 the layout breaks, overflows, or loses required chrome (desktop nav vs Menu button) for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 768px and below primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_390"
description = "At 390 width body or heading text is too small to read or collapses illegibly despite zoom-to-fit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 1440, 768, or 390 content is cropped on the right edge or an unintended horizontal scrollbar appears."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_menu_missing_or_unresponsive"
description = "At 768px and below the Menu button is absent from the header, or activating it leaves the mobile menu panel closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "sticky_header_obscures_content"
description = "The sticky header permanently obscures hero or section content with no recoverable scroll offset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_or_stacking_failure"
description = "At 1440, 768, or 390 elements overlap incorrectly or stacking order breaks the hero/media-card/tile composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "desktop_chrome_on_mobile_or_inverse"
description = "At 768px and below the full desktop nav and Log in link remain as the only nav path with no Menu button, or at wide desktop the Menu drawer is the only nav with desktop links unavailable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "media_static_size_overflows"
description = "Hero marquee rows, slideshow frames, or the floating media card use a static size that overflows the viewport at 390 or 768."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "cta_controls_disappear_at_width"
description = "Header or closing Try Canvasly / Sign up controls disappear at 390 or 768 while remaining required chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.11"
name = "trial_brief_stacks_at_768"
description = "At 768px and below the trial brief panel stacks fields above the preview; Download JSON, Copy brief, Import brief, Reset, Undo, and Redo remain visible and tappable without clipping or horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "brief_or_palette_clipped_at_narrow"
description = "At 768 or 390 the trial brief controls or command palette clip off-screen or require page-level horizontal scrolling to operate."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
