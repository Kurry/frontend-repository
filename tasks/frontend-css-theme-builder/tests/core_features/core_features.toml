[judge]
judge = "claude-code"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "stagehand-webmcp"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@browserbasehq/stagehand@3.7.0",
  "mcp",
  "--env",
  "LOCAL",
  "--chrome-version",
  "151.0.7922.34",
  "--enable-webmcp",
  "--tools",
  "webmcp_session_info,webmcp_list_tools,webmcp_invoke_tool",
  "--disable-tools",
  "act,observe,extract,agent",
  "--cdp-port",
  "$WEBMCP_CDP_PORT",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "Every checklist-* criterion in this Core Features dimension passes during the agent verifier run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "Saved themes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.4"
name = "1_4"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "checklist-1"
name = "checklist_1"
description = "On load, the Themes sidebar lists My themes and a built-in theme catalog with swatch preview chips, and the three-panel workspace (themes | editor | preview) is visible at a wide viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-2"
name = "checklist_2"
description = "After creating a custom theme named 'Harbor Dawn' with valid required fields (hold-to-add or New), the text 'Harbor Dawn' is visible under My themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-3"
name = "checklist_3"
description = "After adding 3 new custom themes on top of any existing custom set, My themes shows exactly 3 more rows than before those creates"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-4"
name = "checklist_4"
description = "After changing a semantic color or radius control on the active custom theme, the live preview re-themes to match the new tokens without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-5"
name = "checklist_5"
description = "After editing a custom theme name to 'Evening Tide', the text 'Evening Tide' is visible in My themes and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-6"
name = "checklist_6"
description = "After deleting/removing a custom theme, that theme name is no longer visible under My themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-7"
name = "checklist_7"
description = "After removing all custom themes, My themes shows an empty state while built-in catalog themes remain available"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-8"
name = "checklist_8"
description = "After submitting create with an empty required theme name, the custom themes count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-9"
name = "checklist_9"
description = "After switching from Components Demo to Color Palette (or Component Variants) preview tab, the preview pane swaps dense demos without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-10"
name = "checklist_10"
description = "After switching focus between Themes list selection and Editor/Generator controls, both modes remain usable and the active theme stays in sync across panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-11"
name = "checklist_11"
description = "After clicking Random on a custom (or forked) theme, editor color tokens and the live preview change"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-12"
name = "checklist_12"
description = "When hovering theme rows, chrome controls, swatch chips, or primary buttons, a visible hover wash, tilt, or fill/border transition appears"
type = "binary"
weight = 1.0
