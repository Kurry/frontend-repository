[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "The font-family control's label or surrounding text predicts its outcome, and operating the visible control gives immediate visual feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Focusing the font-family input with the keyboard keeps focus visible, and typing (through the real input, not a scripted state injection) updates both the input and the generated font-family line."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Moving among setting categories and export actions keeps the current location or selection visually identifiable at every step, including the active sidebar item."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Interactive controls render hover and focus as different visual treatments, and controls of the same kind share one consistent state language."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Pressing a control shows visible pressed feedback immediately on pointer-down, before the resulting operation finishes."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "When the export actions are disabled (zero overrides) they read as non-interactive while their labels stay legible."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "Focus and hover are not collapsed into one identical highlight standing in for both states."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "The active-category and preview feedback are produced by operating the visible controls, not solely by a scripted state shortcut, and no interactive control is left with no hover, focus, or pressed feedback at all."
type = "binary"
weight = 1.0
negate = true
