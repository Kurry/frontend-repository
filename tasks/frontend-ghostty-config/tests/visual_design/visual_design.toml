[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "At desktop width the composition establishes a two-pane settings-and-preview layout with grouped controls, sliders or inputs, color values, and monospace configuration output."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The first viewport gives greater visual emphasis to the categorized settings form and its generated-config preview than to secondary metadata, notes, or badges."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The generated-config output is monospace and uses a terminal-style color scheme (dark background, light text, colorized keys and values) rather than plain unstyled text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "At least three distinguishable type roles are visible (section title, body text, secondary label) differing in size and/or weight."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "Primary body text meets a contrast ratio of at least 4.5 to 1 against its background in the editor."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "UI microcopy is concise sentence-case text and uses numerals for counts (for example the override count), rather than Title Case or spelled-out numbers."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The editor is not rendered as generic unstyled cards or framework defaults lacking a deliberate settings-and-preview identity."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "The visible state change when font-family is edited does not cause overlapping or jumping content in the layout."
type = "binary"
weight = 0.5
negate = true
optional = true
