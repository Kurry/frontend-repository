[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_my_themes_hint_after_remove_all"
description = "After removing all custom themes, My themes shows an empty-state hint while the 35 built-ins remain listed and selectable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "theme_name_inline_validation_before_apply"
description = "On theme create/rename, an empty, whitespace-only, over-length, or illegal-character name shows a validation message naming the name field before the value is applied, and the invalid value is not applied."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_and_fix"
description = "Theme-name validation copy names the name field and the fix rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "random_shows_confirmation_toast"
description = "Clicking Random replaces color tokens, re-themes the preview, and shows a brief confirmation toast that slides in and auto-dismisses."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "early_hold_release_cancels_add"
description = "Releasing Hold to add theme before the ~0.7s progress completes cancels the add: the progress fill resets and the My themes count does not change."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "builtin_remove_blocked_with_notice"
description = "Attempting to remove a built-in preset removes nothing and surfaces a notice explaining that built-ins cannot be removed."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hold_progress_guides_nonobvious_control"
description = "Hold to add theme shows a visible inset progress fill sweeping across the button during the ~0.7s hold so the press-and-hold affordance is guided in-app."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "theme_controls_use_semantic_tags"
description = "Theme name field, Hold to add, Remove theme, Random, CSS export, segmented radius/size choices, and toggles use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_modal_close_paths"
description = "The Export modal closes via Close, backdrop click, and Escape, returning to the workspace without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "rapid_random_leaves_one_coherent_set"
description = "Rapidly clicking Random at least three times in a row leaves exactly one coherent token set applied — the editor rows, preview, and Color Palette tab agree with each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_my_themes_shows_nothing"
description = "After the custom themes collection is empty, My themes shows nothing — no empty-state hint or add guidance."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "validation_errors_only_in_console"
description = "Invalid theme-name create/rename failures surface only in the browser console with no visible inline field feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "random_or_token_edit_silent"
description = "Clicking Random or editing a color/radius/size token produces no visible change to editor, preview, or palette (silent failure)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "remove_theme_no_destructive_affordance"
description = "Remove theme proceeds with no visible destructive affordance (no Remove labeling or notice) distinguishing it from a non-destructive action."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_controls_are_nonsemantic"
description = "Primary interactive controls (theme rows, Hold to add, Random, CSS export, tabs, dropdowns) are non-semantic div/span click targets without button/role semantics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "export_not_keyboard_dismissible"
description = "With the Export modal open, keyboard users cannot dismiss it (no Escape path and no focusable Close control)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "early_hold_still_adds_theme"
description = "Releasing Hold to add theme before ~0.7s still adds a custom theme or leaves the progress fill stuck without resetting."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_or_missing_action_labels"
description = "Primary actions show blank, placeholder, or ambiguous labels such as 'Submit', 'OK', or 'Button' instead of specific labels like Hold to add theme, Reset theme, Remove theme, or Copy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "malformed_hash_breaks_ui"
description = "Loading a URL whose #theme= payload is malformed or undecodable breaks the UI or throws a console error instead of falling back to the default seeded theme."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "long_name_overflows_sidebar_row"
description = "A very long theme name overflows or breaks the sidebar row layout instead of truncating with an ellipsis while the editor name field still shows the full value."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "undo_redo_disabled_at_empty_boundary"
description = "Undo and Redo are visibly disabled when their stacks are empty and activating them at that boundary never throws or corrupts themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_snapshot_name_rejected"
description = "Saving a snapshot with an empty, whitespace-only, or over-length (>64) name adds nothing to the Snapshots list and shows validation naming the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "malformed_theme_json_import_rejected"
description = "Importing malformed Theme JSON leaves My themes, editor, preview, and Export unchanged and shows visible validation feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "new_edit_after_undo_clears_redo"
description = "After Undo, performing a new token edit clears the redo stack and disables Redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "schema_invalid_theme_json_import_rejected"
description = "Importing parseable JSON that fails the Theme JSON field contract — missing a required color or radius key, a --color-* value that is empty or neither oklch(...) nor #RRGGBB, color-scheme outside light|dark, a radius/size/border/depth/noise value outside its closed enum, an empty/illegal name, or a color-scheme/Dark-option cross-field disagreement — leaves My themes, editor, preview, and Export unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "illegal_or_overlong_theme_name_rejected"
description = "A theme name longer than 64 characters, or containing characters outside lowercase letters, digits, hyphens, and underscores, is rejected with validation naming the name field and is not applied (My themes count and active name stay unchanged)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "invalid_color_format_import_rejected"
description = "Importing Theme JSON where --color-primary is an empty string or a non-color token (neither oklch(...) nor #RRGGBB) leaves My themes, editor, preview, and Export unchanged and shows validation naming --color-primary."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "undo_at_boundary_throws_or_corrupts"
description = "Activating Undo or Redo when that stack is empty throws a console error or corrupts the theme list/editor state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "malformed_import_mutates_themes"
description = "Importing malformed Theme JSON still mutates My themes, editor tokens, or Export previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n13"
name = "schema_invalid_import_mutates_themes"
description = "Importing JSON that fails the Theme JSON field contract (wrong enums, invalid color format, missing required keys, or cross-field color-scheme disagreement) still mutates My themes, editor tokens, or Export previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n14"
name = "invalid_color_format_accepted_on_import"
description = "Import accepts a --color-* value that is empty or neither oklch(...) nor #RRGGBB and still mutates editor tokens or Export previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
