[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_my_themes_hint_after_remove_all"
description = "After removing all custom themes, My themes shows an empty-state hint while the 35 built-ins remain listed and selectable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "theme_name_inline_validation_before_apply"
description = "On theme create/rename, an empty, whitespace-only, over-length, or illegal-character name shows a validation message naming the name field before the value is applied, and the invalid value is not applied."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_and_fix"
description = "Theme-name validation copy names the name field and the fix rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "random_shows_confirmation_toast"
description = "Clicking Random replaces color tokens, re-themes the preview, and shows a brief confirmation toast that slides in and auto-dismisses."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "early_hold_release_cancels_add"
description = "Releasing Hold to add theme before the ~0.7s progress completes cancels the add: the progress fill resets and the My themes count does not change."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "builtin_remove_blocked_with_notice"
description = "Attempting to remove a built-in preset removes nothing and surfaces a notice explaining that built-ins cannot be removed."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hold_progress_guides_nonobvious_control"
description = "Hold to add theme shows a visible inset progress fill sweeping across the button during the ~0.7s hold so the press-and-hold affordance is guided in-app."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "theme_controls_use_semantic_tags"
description = "Theme name field, Hold to add, Remove theme, Random, CSS export, segmented radius/size choices, and toggles use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_modal_close_paths"
description = "The Export modal closes via Close, backdrop click, and Escape, returning to the workspace without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "rapid_random_leaves_one_coherent_set"
description = "Rapidly clicking Random at least three times in a row leaves exactly one coherent token set applied — the editor rows, preview, and Color Palette tab agree with each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "undo_redo_disabled_at_empty_boundary"
description = "Undo and Redo are visibly disabled when their stacks are empty and activating them at that boundary never throws or corrupts themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_snapshot_name_rejected"
description = "Saving a snapshot with an empty, whitespace-only, or over-length (>64) name adds nothing to the Snapshots list and shows validation naming the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "malformed_theme_json_import_rejected"
description = "Importing malformed Theme JSON leaves My themes, editor, preview, and Export unchanged and shows visible validation feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "new_edit_after_undo_clears_redo"
description = "After Undo, performing a new token edit clears the redo stack and disables Redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "schema_invalid_theme_json_import_rejected"
description = "Importing parseable JSON that fails the Theme JSON field contract — missing a required color or radius key, a --color-* value that is empty or neither oklch(...) nor #RRGGBB, color-scheme outside light|dark, a radius/size/border/depth/noise value outside its closed enum, an empty/illegal name, or a color-scheme/Dark-option cross-field disagreement — leaves My themes, editor, preview, and Export unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "illegal_or_overlong_theme_name_rejected"
description = "A theme name longer than 64 characters, or containing characters outside lowercase letters, digits, hyphens, and underscores, is rejected with validation naming the name field and is not applied (My themes count and active name stay unchanged)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "invalid_color_format_import_rejected"
description = "Importing Theme JSON where --color-primary is an empty string or a non-color token (neither oklch(...) nor #RRGGBB) leaves My themes, editor, preview, and Export unchanged and shows validation naming --color-primary."
type = "binary"
weight = 1.0

