[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_three_panel_scale"
description = "At 1440px, spacing among the sticky top chrome and the three-panel workspace (themes ~14rem | editor ~17rem | live preview filling remaining width) follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the studio composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_outfit_chrome_spec"
description = "Chrome labels and studio headings use Outfit (or an equivalent bundled geometric sans) consistent with the reference; preview text follows the active theme — not a default system UI stack for chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: sticky top navbar chrome above themes | editor | live preview — a dense tool-studio, not a marketing landing or equal-width card stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — Hold-to-add completion, new theme row enter, custom theme remove exit, Random toast, preview re-theme, Before / After and vision-mode shifts, Export modal open/close — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: below 768px the three panels stack vertically and remain usable; overlays stay operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "editor_controls_styled_not_browser_default"
description = "Theme rows' four-swatch chips, Change Colors face swatches and content \"A\" badges, radius/size segmented choices, Depth/Noise toggles, and primary buttons use the studio treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_chrome_vs_editor_vs_preview"
description = "Typography hierarchy clearly distinguishes chrome brand/controls, denser editor section titles and token rows, and preview demo copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, inputs, and segmented choices show distinct default, hover, focus (visible ring), active-selection, and error treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_driven_by_active_theme_tokens"
description = "Surfaces are driven by the active data-theme / theme tokens: the preview frame recolors from the token set, and demos use cards, stats, forms, chat, code mockups, radial-progress, and a palette grid of 16 labelled swatches as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover wash on announce strip, chrome controls, theme rows, and swatch chips (~0.15–0.2s ease), Hold-to-add progress (~0.7s), and export-modal opacity/scale follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "contrast_export_snapshot_surfaces_present"
description = "Relative to the hardened spec, the studio shows the Contrast matrix, Export format tabs (CSS / Theme JSON / theme-extension), Snapshots with Before / After, and preview vision-mode control in addition to the three-panel reference composition."
type = "binary"
weight = 1.0

