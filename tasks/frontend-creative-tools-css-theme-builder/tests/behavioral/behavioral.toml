[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: complete Hold to add theme once, rename the custom theme, edit its primary color, Save snapshot, switch the preview tab to Color Palette, choose Deuteranopia, and choose a non-default chrome theme; then reload without a #theme= payload. Confirm every facet coherently resets to the seeded baseline — 35 built-ins, no custom themes beyond seed, default active theme, empty undo/redo, no snapshots beyond seed, vision None, and default chrome — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "tab_and_selection_reversal_proves_live_state"
description = "Selection-reversal proof (genre stand-in for sort reversal): select built-in light and note editor/preview tokens, select built-in dark and note the different tokens, then re-select light. Confirm light's tokens return identically — proving editor and preview are derived from the live active theme, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "token_edit_derived_preview_sensitivity"
description = "Derived-view sensitivity: with a custom theme active, change primary to a clearly different color, then change Radius Boxes to a different preset. Confirm the live preview and Color Palette primary swatch change meaningfully for each input rather than redrawing an identical surface regardless of edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "editor_edit_echoes_in_list_and_palette"
description = "Cross-view echo: edit a custom theme's primary color in the editor; without reload confirm the same row's four-swatch chip in My themes, the live preview surfaces, and the Color Palette tab's primary swatch value all reflect the new color."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "hold_to_add_count_delta_exact"
description = "Count-delta integrity: measure the My themes count, complete one Hold to add theme hold (~0.7s), and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_token_edits_different_outcomes"
description = "Input-dependent output: on a custom theme, set primary to color A and note preview/palette; then set primary to a clearly different color B. Confirm the two outcomes differ in the ways the inputs dictate (not byte-identical preview/palette states)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_tab_flows"
description = "Interleaved-flow integrity: start Hold to add theme (press but do not complete), switch the preview tab to Component Variants, then complete a separate Hold to add to finish creating one custom theme; confirm exactly one new My themes row appears, the tab switch persisted, and neither flow corrupted the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_my_themes"
description = "Edge-state round-trip: remove every custom theme (empty-state hint visible, 35 built-ins still listed), then complete Hold to add twice; confirm the empty state clears, both new rows appear, and editor/preview track the active custom theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_preserves_tokens"
description = "Mutate → derived → export → import: on a custom theme set primary to color A and Radius Boxes to a non-default preset; confirm Contrast and all three Export previews reflect A; Download Theme JSON; change tokens away from A; Import the downloaded JSON; confirm editor, preview, Contrast, and Export return to A's values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_round_trip_restores_all_surfaces"
description = "Undo round-trip: edit primary to B (preview, Contrast, Export update), Undo restores prior primary everywhere those surfaces show it, Redo reapplies B everywhere — never a surface left stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "theme_json_contract_round_trip_probe"
description = "Mutate → export contract → import: on a custom theme set primary, Radius Boxes to a non-default rem preset, and Dark color scheme on; open Theme JSON and confirm visible text includes name, color-scheme dark, --color-primary, --radius-box from the closed enum, and --depth/--noise as 0 or 1; Download; toggle scheme off and change tokens; Import the downloaded JSON; confirm editor, preview, Contrast, Export, and color-scheme option restore the exported contract values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "schema_invalid_import_leaves_state"
description = "Starting from a known custom theme selection, attempt Import of parseable JSON missing a required --color-* key, with --color-primary neither oklch(...) nor #RRGGBB, or with --radius-box outside the closed rem enum; confirm My themes count, editor tokens, preview, and Export stay unchanged and validation names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "form_created_record_is_request_body"
description = "Create a custom theme with a valid name, set Dark color scheme on, edit primary to a distinct oklch or #RRGGBB value, then open Theme JSON: the preview object carries that same name, color-scheme dark, and primary under --color-primary — the form-created record is the would-be request body."
type = "binary"
weight = 1.0

