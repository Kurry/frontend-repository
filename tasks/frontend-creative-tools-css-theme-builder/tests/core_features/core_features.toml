[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "initial_theme_workspace"
description = "On a wide first load, the app shows the Themes sidebar, theme editor, and live-preview pane, with My themes plus exactly 35 named built-in presets from light through silk and a four-swatch chip on every theme row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "create_custom_theme"
description = "After creating a valid custom theme named 'Harbor Dawn' through a visible New action, My themes increases by exactly one, 'Harbor Dawn' is selected, and its name and tokens appear in both the editor and live preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_count_delta"
description = "After recording the My themes count and creating three valid, uniquely named themes through the UI, the count is exactly three greater and all three names are visible without duplicates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "token_edits_retheme_preview"
description = "Changing each kind of editable token through its visible control—a color, radius, field or selector size, border width, depth, noise, and dark-color-scheme option—immediately changes the corresponding editor state and live-preview styling without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "rename_updates_all_surfaces"
description = "After renaming the selected custom theme to 'Evening Tide', that name replaces the old name in My themes, the editor, and every Export format preview (CSS, Theme JSON, theme-extension) without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "remove_custom_theme"
description = "After removing the active custom theme through the visible Remove action, My themes decreases by exactly one, the removed name disappears, and the editor and preview move to a valid remaining selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_custom_theme_state"
description = "After removing all custom themes, My themes shows an empty state while built-in catalog themes remain available"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_theme_name_validation"
description = "Submitting theme creation with an empty name, a whitespace-only name, and a name that violates the Theme JSON name contract (over 64 characters or illegal characters) leaves the custom-theme count unchanged each time and shows visible inline validation feedback naming the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "preview_tabs_swap_content"
description = "Switching among Components Demo, Component Variants, and Color Palette swaps the preview pane in place: the first shows the specified dense component examples, the second shows button/form/alert variants, and the third shows 16 labelled token swatches with values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "theme_selection_cross_panel_sync"
description = "Selecting a different built-in or custom theme row updates the active highlight, editable name and tokens, and current live-preview tab to that same theme without reload or stale values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "random_changes_live_theme"
description = "Two successive clicks on Random produce two fresh, visibly different OKLCH color-token sets and light/dark schemes, with the editor and live preview matching each result and a confirmation toast appearing after each click"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "complete_editor_controls"
description = "The editor exposes an editable name, Random and CSS-export controls, all 11 semantic face/content color pairs, three five-choice radius groups, Depth and Noise toggles, two five-step size groups, four border-width choices, three option checkboxes, Reset theme, and Remove theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "export_formats_copy_download_dismiss"
description = "Opening Export shows CSS, Theme JSON, and theme-extension tabs regenerated from the active theme (Theme JSON showing the API-shaped field contract keys); each tab's Copy writes that format's text with confirmation, Download triggers a real file whose contents match the preview, and Close, backdrop, or Escape dismiss the modal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "builtin_edit_forks_copy"
description = "After recording a built-in preset's name and swatches and editing one of its tokens, My themes gains exactly one selected editable copy that the live preview now tracks, the built-in catalog still lists all 35 presets, and reselecting the built-in shows its original name and swatches unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "share_hash_updates_and_loads"
description = "After renaming and recoloring the active theme, the same-document URL contains an updated #theme= payload; opening that exact URL in a fresh page applies the same name and token values on first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "chrome_dropdowns_stay_in_place"
description = "Choosing a chrome theme option (light / dark / cupcake / synthwave) recolors the app shell and marks that option active, and the version, chrome-theme, and language dropdowns open in place without navigating"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "hold_to_add_success_and_cancel"
description = "Pressing and holding the Hold to add theme control for its full duration completes a progress fill and adds a new custom theme, while releasing early adds nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "builtin_removal_protection"
description = "Attempting to remove a built-in preset through the UI removes nothing—the catalog still lists all 35 presets afterward—and a visible notice explains that built-ins cannot be removed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "reset_restores_selected_theme"
description = "After changing multiple tokens on a custom theme, Reset theme restores that theme's prior/default token values coherently in the editor, list swatches, and live preview without changing the selected theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "content_color_picker_updates_preview"
description = "Opening a semantic row's content 'A' picker and choosing a different content color updates that paired content token and the corresponding preview text color without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "create_edit_preview_export_flow"
description = "Starting from the initial My themes count: create 'Harbor Dawn', change its primary color and box radius, switch to Color Palette, then open Export; the count is exactly one higher, and the selected row swatches, editor values, 16-swatch palette, preview styling, Contrast primary pair, and all three Export format previews show the same changed theme without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "remove_all_then_repopulate_flow"
description = "Starting with at least one custom theme, remove every custom theme and observe the empty My themes hint while all 35 built-ins remain, then create a valid replacement and observe the hint disappear, the count become one, and the replacement become active in the editor and preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "plain_reload_restores_seed"
description = "After creating a custom theme and editing several tokens, a plain page reload without a #theme= payload returns the app to its seeded baseline: 35 built-in presets listed, no custom themes beyond the seed, and the default theme active in the editor and preview—never a partial mix of old and new state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "malformed_hash_payload_fallback"
description = "Loading a URL whose #theme= payload is malformed or undecodable renders the default seeded theme with a fully usable interface and no console error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "long_theme_name_truncation"
description = "A custom theme given a very long name shows that name truncated with an ellipsis in its sidebar row while the editor name field shows the full value"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.30"
name = "rapid_random_stays_coherent"
description = "After clicking Random five or more times in quick succession, exactly one coherent token set remains applied: the editor color rows, live preview, and Color Palette tab values all agree with each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "undo_redo_token_and_duplicate"
description = "After editing a custom theme's primary color, Undo restores the previous primary in editor, list swatch, preview, Contrast, and Export; Redo reapplies it. After Duplicate adds exactly one matching custom theme, Undo removes that duplicate and restores prior selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "contrast_matrix_live_aa_aaa"
description = "The Contrast panel lists every face/content pair from the 11 Change Colors rows with a live numeric ratio plus AA and AAA pass/fail badges; changing a face or content color immediately updates that pair's ratio and badges, and failing pairs show a distinct warning treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "snapshots_and_before_after"
description = "Save snapshot with a valid name adds a Snapshots row; restoring it writes those tokens into editor and preview; after further edits, Before / After flips the preview between the snapshot tokens and the live edits without losing either set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "vision_mode_filters_preview_only"
description = "Choosing Deuteranopia on the preview vision-mode control applies a client-side color-vision simulation to the preview pane while editor swatches stay unfiltered; choosing None clears the simulation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "import_theme_json_round_trip"
description = "After editing tokens and downloading Theme JSON from Export, Import of that same document reconstructs the same name and tokens in editor, My themes swatches, preview, Contrast, and all three Export format previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "duplicate_custom_theme"
description = "With a custom theme active, Duplicate adds exactly one new My themes row whose tokens match the source, selects the duplicate, and leaves the source row intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "theme_json_api_shaped_field_contract"
description = "The Theme JSON export preview is a single object whose visible text includes the required field contract: name; color-scheme exactly light or dark; the twenty --color-* keys each valued as oklch(...) or #RRGGBB; --radius-box/--radius-field/--radius-selector each from the closed rem enum; --size-field/--size-selector each from the closed size-step enum; --border from the four-width enum; and --depth/--noise each 0 or 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "created_theme_record_matches_theme_json"
description = "After creating or renaming a custom theme and editing its tokens through the form controls, the Theme JSON preview for that theme shows the same name, color-scheme, and token field names/values the create/rename/token forms produced — the created record is the would-be request body / export payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "snapshot_field_contract_name_and_theme"
description = "Save snapshot with a valid name adds a Snapshots row whose restored theme matches the Theme JSON field contract (name, color-scheme, --color-* in oklch/#RRGGBB, closed radius/size/border/depth/noise); empty or over-length snapshot names show validation naming the name field and add nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "color_scheme_cross_field_with_dark_option"
description = "With Dark color scheme checked, Theme JSON shows color-scheme dark; unchecking it updates color-scheme to light in the export preview without reload — the cross-field rule between the option and the payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "base_rows_share_single_base_content"
description = "In Change Colors, base-100, base-200, and base-300 share one paired base-content: changing the content 'A' color on any one of the three base rows updates the shared base-content value shown on all three base rows and the preview's base text color together, while each of the other eight semantic rows keeps its own independent paired content color"
type = "binary"
weight = 1.0

