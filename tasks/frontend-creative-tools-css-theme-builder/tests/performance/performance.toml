[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the CSS theme builder becomes interactive within 2 seconds, with the 35 built-in presets already listed."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise: creating, renaming, duplicating, editing, undoing, removing themes, switching preview tabs, exporting all three formats, importing Theme JSON, toggling snapshots/before-after, changing vision mode, and loading a shared #theme= payload."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "token_edit_rethemes_under_100ms"
description = "Editing a color swatch, radius, size, or depth/noise toggle re-themes the live preview and refreshes Contrast ratios with UI response in under 100ms (perceived immediate), including while dragging a color picker."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the sticky chrome and three-panel workspace remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "builtin_catalog_scrolls_without_lag"
description = "With all 35 built-in presets listed in the themes sidebar, scrolling the catalog and selecting rows shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_retheme"
description = "During live-preview recolor easing after a token edit or tab switch, editor controls and theme rows remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "preview_retheme_holds_stable_frame_rate"
description = "Driven through real token controls, preview chrome/background color easing maintains a smooth frame rate without visible hitching during continuous edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_token_edits_never_hang"
description = "Rapid repeated token edits and undo/redo (dragging a color picker, clicking at least three radius options or Random in quick succession, then Undo twice) keep the UI responsive with no hangs and leave editor, preview, Contrast, and palette in agreement."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_theme_session_stable"
description = "After an extended session of many token edits, tab switches, creates, and removes, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; panels and the preview grid hold their space as the app settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before theme rows or editor controls can be operated, or the 35 presets are not yet listed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_theme_flows"
description = "Console errors, warnings, or unhandled rejections appear during create, rename, edit, remove, tab switch, CSS export, or shared-payload flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "retheme_or_tab_transition_blocks_ui"
description = "Preview recolor or tab-pane swap blocks the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "token_edit_hangs_ui"
description = "Updating the live preview after a token edit hangs or freezes the UI until the transition completes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "catalog_janks_on_scroll_or_select"
description = "Scrolling or selecting among the 35 built-in presets produces sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_editor_input"
description = "While preview recolor or toast animations run, editor token controls and theme rows ignore input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "The UI blocks rendering of chrome and panels until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_edits"
description = "Rapid token edits or Random clicks cause visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no chrome or three-panel skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid Random clicks, color-picker dragging, or after removing all custom themes and recreating."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
