[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.2"
name = "coherent_shared_theme_state"
description = "A theme change made in one visible surface is reflected immediately and consistently in the theme row, editor controls, every preview tab, and CSS export without reload or stale duplicate values"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "local_asset_network_hygiene"
description = "From a fresh load through representative theme editing, dropdown, icon, dialog, and animation interactions, the network log shows only same-origin app assets and the allowed same-document #theme= update, with no CDN-hosted styles, scripts, icons, fonts, or product fetches"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "console_clean_full_flow"
description = "No console errors or unhandled promise rejections appear from first load through create, rename, duplicate, token edit, undo/redo, snapshot, vision mode, preview-tab switch, Random, export all three formats, import, hash-load, and remove flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "inline_form_validation_runtime"
description = "Theme create and rename/token form controls expose visible field-level validation before invalid submission can mutate theme state, and correcting the field clears the error and permits the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "accessible_interactive_primitives"
description = "Chrome menus, selects, toggles, toast feedback, and the CSS export dialog are keyboard-operable through their visible controls; the dialog responds to Escape and focus remains visibly trackable through the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "hash_round_trip_coherence"
description = "After changing independent facets—theme name, at least two token types, preview tab, and chrome theme—opening the generated #theme= URL in a fresh page restores the payload-defined theme coherently on first paint while non-payload in-memory facets follow the instruction's baseline rule rather than partially persisting"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "keyboard_only_operation"
description = "Every interactive control—theme rows, token pickers, segmented choices, toggles, chrome dropdowns, and preview tabs—is reachable and operable with the keyboard alone with a visible focus indicator; within dropdowns and tabs, arrow keys move through options, Enter or Space selects, and the selected option is exposed as active to assistive technology"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "export_dialog_focus_management"
description = "The open Export modal exposes role dialog with aria-modal true, keeps Tab focus trapped inside it, closes on Escape, and returns focus to the control that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "validation_message_a11y_association"
description = "The theme-name validation message is rendered visually and programmatically associated with the name field (for example via aria-describedby or an equivalent exposed relation) so assistive technology announces it"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.15"
name = "token_picker_accessible_names"
description = "Each color picker and each content 'A' badge carries an accessible name identifying which semantic token it edits (for example 'primary content'), verifiable in the accessibility tree"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.16"
name = "interactive_within_two_seconds"
description = "On a local cold load the app is interactive within 2 seconds, with all 35 built-in presets already listed"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "lag_free_token_editing"
description = "Token edits re-theme the live preview immediately with no visible lag, including while dragging a color picker, and rapid repeated edits leave the UI responsive rather than hanging"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "export_texts_derived_from_shared_state"
description = "After editing primary and radius on a custom theme, Export CSS, Theme JSON, and theme-extension previews all reflect those same shared-token values without a reload — derived live, not a disconnected static snippet"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "theme_form_validation_matches_field_contract"
description = "Theme create/rename and Import enforce the Theme JSON field contract in the UI: empty, over-length (>64), or illegal-character names are rejected with inline feedback naming the name field; Import of JSON that fails required keys, oklch/#RRGGBB color formats, closed enums (color-scheme, radius, size, border, depth/noise), or the color-scheme cross-field rule is rejected with feedback naming the offending field and does not mutate themes"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "color_scheme_cross_field_matches_export"
description = "Toggling the Dark color scheme option updates the Theme JSON color-scheme field to dark when checked and light when unchecked, matching the editor option without a reload — a cross-field contract between the option and the export payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "document_title_reflects_theme_builder"
description = "The browser document title reflects the CSS theme builder product rather than a scaffold default such as 'Vite App' or an empty title"
type = "binary"
weight = 1.0

