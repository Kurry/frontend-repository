[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.2"
name = "coherent_shared_theme_state"
description = "A theme change made in one visible surface is reflected immediately and consistently in the theme row, editor controls, every preview tab, and CSS export without reload or stale duplicate values"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "forbidden_browser_storage"
description = "After exercising create, rename, token editing, tab selection, and chrome-theme controls, localStorage, sessionStorage, IndexedDB, or another browser persistence store contains app theme or editor state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "cross_surface_state_desync"
description = "The same active theme datum shows conflicting values across the theme list, editor, preview, URL hash, or export modal during a normal interaction flow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "local_asset_network_hygiene"
description = "From a fresh load through representative theme editing, dropdown, icon, dialog, and animation interactions, the network log shows only same-origin app assets and the allowed same-document #theme= update, with no CDN-hosted styles, scripts, icons, fonts, or product fetches"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "console_clean_full_flow"
description = "No console errors or unhandled promise rejections appear from first load through create, rename, token edit, preview-tab switch, Random, export/copy, hash-load, and remove flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "inline_form_validation_runtime"
description = "Theme create and rename/token form controls expose visible field-level validation before invalid submission can mutate theme state, and correcting the field clears the error and permits the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "accessible_interactive_primitives"
description = "Chrome menus, selects, toggles, toast feedback, and the CSS export dialog are keyboard-operable through their visible controls; the dialog responds to Escape and focus remains visibly trackable through the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "hash_round_trip_coherence"
description = "After changing independent facets—theme name, at least two token types, preview tab, and chrome theme—opening the generated #theme= URL in a fresh page restores the payload-defined theme coherently on first paint while non-payload in-memory facets follow the instruction's baseline rule rather than partially persisting"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "external_runtime_dependency"
description = "The app requires an outbound CDN or other external origin to obtain styling, icons, fonts, scripts, or product content, causing a missing or degraded interface when that request is blocked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.11"
name = "runtime_exception_or_broken_load"
description = "A normal instructed interaction produces a console exception, blank pane, frozen control, or full-page navigation that breaks the single-page editing session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.12"
name = "keyboard_only_operation"
description = "Every interactive control—theme rows, token pickers, segmented choices, toggles, chrome dropdowns, and preview tabs—is reachable and operable with the keyboard alone with a visible focus indicator; within dropdowns and tabs, arrow keys move through options, Enter or Space selects, and the selected option is exposed as active to assistive technology"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "export_dialog_focus_management"
description = "The open CSS-export modal exposes role dialog with aria-modal true, keeps Tab focus trapped inside it, closes on Escape, and returns focus to the control that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "validation_message_a11y_association"
description = "The theme-name validation message is rendered visually and programmatically associated with the name field (for example via aria-describedby or an equivalent exposed relation) so assistive technology announces it"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.15"
name = "token_picker_accessible_names"
description = "Each color picker and each content 'A' badge carries an accessible name identifying which semantic token it edits (for example 'primary content'), verifiable in the accessibility tree"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.16"
name = "interactive_within_two_seconds"
description = "On a local cold load the app is interactive within 2 seconds, with all 35 built-in presets already listed"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "lag_free_token_editing"
description = "Token edits re-theme the live preview immediately with no visible lag, including while dragging a color picker, and rapid repeated edits leave the UI responsive rather than hanging"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "post_load_layout_jumps"
description = "After first paint, panels or the preview grid visibly jump, reflow, or shift position as the app settles"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick or unverifiable implementation preference. If present, name the defect and cite the concrete browser evidence (console entry, network request, storage entry, runtime state, or interaction result) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
