[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "hold_to_add_creates_custom_theme"
description = "Create flow: holding Hold to add theme to completion (~0.7s) increases the My themes count by exactly one, the new row appears and becomes the highlighted active row, the editor shows its name and tokens, and the live preview recolors to its token set — all without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_theme_name_inline_validation"
description = "Create/rename flow: submitting an empty or whitespace-only theme name shows an immediate inline validation message naming the name field, and the invalid value is not applied (My themes count stays the same)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "rename_and_token_edit_update_all_surfaces"
description = "Edit flow: renaming a custom theme in the editor updates that same row's name in My themes immediately; editing its primary color updates that row's four-swatch chip, the live preview surfaces, the Color Palette tab's primary swatch value, the Contrast panel's primary pair, and every Export format preview — without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "remove_custom_theme_updates_all_surfaces"
description = "Delete flow: removing the active custom theme deletes its row from My themes, drops the My themes count by exactly one, clears it from active selection (a remaining theme or default becomes active), and the preview recolors accordingly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "preview_tab_switch_retains_theme"
description = "View/mode switch: switching Live Preview tabs among Components Demo, Component Variants, and Color Palette swaps the pane in place without reload and keeps the same active theme tokens applied."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_custom_remove_shows_empty_state"
description = "Edge: after removing the last custom theme, My themes shows the empty-state hint while the built-in catalog still lists all 35 presets."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "fork_builtin_adds_exactly_one_custom"
description = "Fork flow: selecting a built-in preset then changing one of its tokens adds exactly one new entry to My themes (an editable copy) while the built-in catalog still contains all 35 presets unchanged, and the preview tracks the forked copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "chrome_dropdowns_preserve_workflow"
description = "Chrome dropdowns (version, chrome theme-picker light/dark/cupcake/synthwave, language EN/ES/FR/JA) open and close in place without navigating away; after choosing a chrome theme option the workspace editor/preview state remains and the shell recolors with that option marked active."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_artifact_formats_copy_and_dismiss"
description = "Artifact end-state overlay: Export opens with CSS, Theme JSON, and theme-extension tabs regenerated from the active theme; Copy confirms on the active tab; Download is available; Close, backdrop, or Escape dismisses and returns to the workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "share_hash_round_trip_without_dead_end"
description = "Share round-trip: after editing tokens the #theme= hash payload changes; opening the app fresh at a URL carrying that payload renders the same theme on first paint (editor tokens, list selection, and preview colors match). A plain reload without #theme= returns to the seeded baseline (35 built-ins, no custom themes beyond seed, default active) — no dead end requiring a second reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "duplicate_then_undo_redo_flow"
description = "Duplicate then undo: with a custom theme active, Duplicate increases My themes by exactly one with matching tokens; Undo removes that duplicate and restores the prior selection and preview; Redo restores the duplicate again — all without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_import_theme_json_round_trip_flow"
description = "Artifact end state: edit primary and Radius Boxes, open Export and confirm CSS, Theme JSON, and theme-extension each contain the edits and Theme JSON still shows required name, color-scheme, color (oklch or #RRGGBB), radius, size, border, depth, and noise keys; Download Theme JSON then Import that document reconstructs the same visible name and tokens in editor, preview, Contrast, and Export."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "create_record_appears_in_theme_json_export"
description = "Create a custom theme with a valid name, edit primary and box radius, open Theme JSON: the preview object carries that same name and the edited token values under the required contract keys — the form-created record is the would-be request body / export payload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "schema_validation_create_and_import_flow"
description = "Schema validation flow: attempt create/rename with an illegal or over-length name (My themes unchanged, name field named); Import JSON missing a --color-* key or with a non-oklch/non-#RRGGBB color (state unchanged, offending field named); then a valid create yields Theme JSON whose payload shape matches the form-produced request body."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "snapshot_before_after_flow"
description = "Snapshots flow: Save snapshot under a valid name after editing tokens (snapshot theme matches the Theme JSON field contract), change tokens further so the preview differs, then toggle Before / After and confirm the preview flips between the snapshot tokens and the live edits without losing either set."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "vision_mode_deuteranopia_flow"
description = "Vision mode: with Components Demo visible, choose Deuteranopia and confirm the preview pane's colors change under simulation while editor swatches stay unfiltered; choosing None restores the unfiltered preview."
type = "binary"
weight = 1.0

