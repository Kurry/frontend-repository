[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dense_three_panel_studio"
description = "At 1440×900, a sticky announce/navbar area sits above a dense tool-studio workspace with an approximately 14rem Themes sidebar, 17rem editor, and live preview filling the remaining width"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "responsive_panel_reflow"
description = "At 768px width and below the themes, editor, and preview regions reflow vertically and remain fully usable, and at 375px width no content clips or overflows the viewport and no page-wide horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "generic_equal_card_layout"
description = "Collapses into a single-column equal-card marketing layout with no distinct themes/editor/preview panels"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "theme_row_visual_anatomy"
description = "Every theme row has a clearly ordered four-swatch primary/secondary/accent/neutral chip and name, with a visually distinct active row; the empty My themes hint remains legible when no custom rows exist"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "compact_editor_visual_anatomy"
description = "The Change Colors editor presents 11 aligned face-swatch rows with round content 'A' badges, while radius, size, effect, and border controls use compact segmented choices with an unambiguous active state and Hold to add has a visible inset progress track"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "token_driven_preview_surfaces"
description = "The active theme produces a coherent palette across preview cards, stats, forms, chat, code mockup, radial progress, controls, and the 16 labelled palette swatches, with readable face/content color pairings"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "studio_typography_and_grouping"
description = "Chrome typography has a consistent rounded display character comparable to Outfit, and hierarchy, spacing, borders, and grouping keep the dense catalog, editor sections, and preview labels scannable"
type = "likert"
points = 5
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "export_modal_and_dropdown_layout"
description = "Export opens as a centered modal/drawer with CSS / Theme JSON / theme-extension format tabs, a scrollable code block, Copy and Download affordances, and a hint line, while version, theme, and language menus align to their chrome triggers without clipping or leaving the viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "token_contrast_failure"
description = "A selectable built-in theme or edited token combination makes essential editor or preview text visibly unreadable against its active surface because the paired face/content styling is not applied coherently"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.10"
name = "distinct_control_state_treatments"
description = "Buttons, inputs, and segmented choices show visibly distinct default, hover, focus (visible ring), active-selection, disabled (empty Undo/Redo), and error treatments rather than a single unchanging style"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "small_width_overlays_operable"
description = "At small viewport widths, the chrome dropdowns, the CSS-export modal, and the color pickers stay fully visible and operable within the viewport rather than rendering off-screen or clipped"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "consistent_specific_labels"
description = "Chrome labels, editor section titles, and buttons follow one consistent capitalization convention, and action labels are specific—Hold to add theme, Reset theme, Remove theme, Duplicate, Export, Copy, Download, Save snapshot—rather than generic where a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "empty_state_and_validation_copy"
description = "The My themes empty state explains that no custom themes exist yet and how to add one, and theme-name validation messages name the field and the fix rather than a bare rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "placeholder_copy_shipped"
description = "Lorem ipsum, 'TODO', template-variable, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "3.15"
name = "contrast_matrix_visual_anatomy"
description = "The Contrast panel reads as a compact matrix of pair name, numeric ratio, and AA/AAA badges with a distinct warning treatment on failing pairs, sitting in the editor without breaking the three-panel studio"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "snapshots_and_vision_controls_placed"
description = "Snapshots list and Before / After sit near the editor, and the vision-mode control sits on the preview chrome, without collapsing the themes | editor | preview composition"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick or taste disagreement. If present, name the defect and cite the concrete browser evidence (element, page state, viewport, or screenshot) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
