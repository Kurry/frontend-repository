[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hold_to_add_progress_motion"
description = "Through the real pointer control path, holding Hold to add for about 0.7 seconds visibly sweeps the inset progress fill before success, releasing early visibly cancels/reset the fill, and successful completion gives the new row a brief scale/fade entrance"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "preview_retheme_easing"
description = "Through real token controls and preview tabs, changing a token and then switching tabs causes preview chrome and background colors to ease smoothly between states without a snap, flash, or full reload"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "hover_focus_and_dropdown_motion"
description = "Real pointer hover over the announce strip, chrome controls, theme rows, chips, buttons, and radius/size selectors produces short 0.15–0.2s-style color/fill/border feedback; opening a dropdown produces a brief opacity/scale transition and keyboard focus shows a visible outline"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "random_and_copy_feedback"
description = "Clicking Random through its real button shows a brief animated confirmation toast, and clicking Copy or Download in the Export modal shows a short confirmation that resets rather than remaining permanently"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "remove_row_animates_out"
description = "Removing a custom theme through its real Remove control animates the row out of the My themes list rather than the list snapping instantly to its new arrangement"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "export_modal_enter_exit_transition"
description = "Opening the Export modal through its real control and dismissing it each show a brief opacity/scale transition rather than the dialog appearing and disappearing in a single frame"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "reduced_motion_flows_completable"
description = "With prefers-reduced-motion enabled on a fresh load, animations are removed or reduced to instant state changes while every flow—including hold-to-add, Random, undo/redo, export, import, and remove—remains completable through the same controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "before_after_and_vision_ease"
description = "Through real controls, Before / After toggles and vision-mode changes ease the preview recolor rather than hard-cutting when motion is allowed"
type = "binary"
weight = 0.5

