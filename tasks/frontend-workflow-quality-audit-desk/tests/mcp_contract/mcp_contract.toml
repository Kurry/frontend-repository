[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, form_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_audit_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse navigation and filtering, feedback and verdict form flows, check-run session controls, and artifact copy/export/import change the same queue rows, check chips, stage badges, rollup strip, bar charts, export previews, and timeline the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/apply_filter/clear_filter/sort over destinations queue, task-detail, reviewers, reviewer-detail, and report with filters check-outcome, criterion-outcome, lifecycle-stage, and reviewer and column sorts; form validate/submit/cancel over reviewer, feedback-verdict, findings, criterion-verdict, fail-rationale, escalation-category, escalation-summary, and resolution-note across workflow steps add-feedback-entry, set-criterion-verdict, escalate-task, apply-simulated-fixes, and resolve-task; session start/pause/resume with demos check-run, batch-run-filtered, and re-audit-run; artifact copy/export/import over formats audit-package-json and audit-report-markdown — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "check_run_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: a finished check run coherently updates the task's nine check chips, the queue row checks summary, the stage badge (pending to checked, or held on any failure), the rollup strip and both bar charts, and the audit timeline from one outcome."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "feedback_and_verdict_operations_work"
description = "Declared form steps all work: a valid feedback entry appends exactly one thread entry, increments the queue row entry count, updates that reviewer's rollup cell and detail view, and stamps the timeline; criterion verdicts recompute the Admitted/Held outcome banner naming each failing criterion, the queue criteria summary, and the criterion failure-ranking chart without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "audit_form_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: fail rationale requires at least 15 characters, findings and escalation summary at least 20, criterion verdict toggles stay disabled until the task's first completed check run, escalate is allowed only from held, and resolve only from escalated or from a re-audited task with 9 of 9 checks and 10 of 10 criteria passing."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "rerun_determinism_matches_spec"
description = "Session runs match the declared spec: re-running an unfixed held task reproduces the same final pass/fail outcomes; after apply-simulated-fixes a re-run flips every previously failing check to pass while passing checks stay passing and the stage becomes re-audited; rollup cell activation applies the matching queue filter with its removable chip."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: reviewers stay limited to the nine seeded names, checks and admission criteria to their declared closed sets, repositories to the seven seeded orgs, and artifact operations stay limited to copy, export, and import of audit-package-json and audit-report-markdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: chart growth animation and pointer-hover tooltips, guidance disclosure chevrons, task-detail slide transitions, retry backoff ticks, queue row enter/exit animation, and clipboard and toast timing stay Playwright territory."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "audit_tools_missing_or_noop"
description = "WebMCP tooling for check runs, feedback, verdicts, escalation, or the report copy is unbound, missing, or a no-op that reports success while the check chips, stage badge, or rollup strip stay unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_audit_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked feedback entry changes tool output without appending the thread entry and reviewer rollup update, or a criterion verdict flips tool state while the outcome banner and failure-ranking chart stay stale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_audit_capabilities_exposed"
description = "Undeclared capabilities are exposed, such as reviewers outside the nine seeded names, lifecycle stages outside the declared seven-value set, artifact formats beyond audit-package-json and audit-report-markdown, or a generic state setter."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "audit_gating_bypassed_via_tools"
description = "A tool accepts input outside the declared bounds — a feedback verdict outside its four-value set, an under-length rationale or findings text, an escalation from a non-held stage, or a resolve without the required passing state — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared browse, form, session, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (browse-query-v1, form-workflow-v1, command-session-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the audit, feedback, and lifecycle state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — synthesizing chart hover tooltips, replaying disclosure or slide animations, or returning report clipboard contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
