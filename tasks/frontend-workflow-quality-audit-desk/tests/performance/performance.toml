[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to an interactive Queue view with all seeded records is under 2 seconds on local render"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or while exercising the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = "UI transitions — opening the detail view, toggling filters, switching views — respond in under 100ms"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "simulated_work_shows_indicators"
description = "Simulated runs and batch runs show progress indicators (step statuses, retry countdowns, task m of n) rather than freezing silently"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_queue_renders_without_lag"
description = "The queue with at least 42 seeded records sorts, filters, and scrolls without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_runs"
description = "The UI remains interactive while a run or batch run advances — filters, view switches, and detail navigation still respond"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Step transitions, row animations, and chart bar growth maintain a smooth frame rate"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated input — quick filter changes, rapid sort clicks, fast view switches, and reopening Report after mutations — never hangs or drops interactions, including while a run is in progress; export preview regeneration after a mutation completes without a blank freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session of runs, verdicts, and feedback shows no memory leaks or runaway resource use"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "long_operations_keep_page_alive"
description = "During the longest operations (a full batch run over a filtered set) the page stays responsive and shows continuous progress rather than a blank or frozen region"
type = "binary"
weight = 1.0

