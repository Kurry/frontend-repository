[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_present"
description = "Empty state UI renders where specified: the queue shows an empty state with Clear filters when filters match nothing, and the Markdown appendix explains that audited records will appear there before any record is touched while Audit Package JSON still shows a complete seeded package"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "all_forms_validate_inline"
description = "The feedback form, fail-rationale field, escalation form, and resolution form all validate inline before submit, with per-field messages"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation messages name the field and the rule — the 15-character rationale minimum and the 20-character findings and summary minimums — rather than only saying invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Visible confirmation follows actions: toasts after adding an entry, completing a run, escalating, resolving, copying or downloading an export, and importing a package"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "simulated_async_shows_progress"
description = "Simulated async work shows progress affordances: run steps advance visibly with statuses, the retry countdown ticks, and batch runs show task m of n"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "forms_support_cancel"
description = "The escalation and resolution forms can be canceled, leaving the record's stage and data unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "guidance_available_for_non_obvious_controls"
description = "Non-obvious surfaces carry in-app guidance: criterion guidance disclosures show guidance text, chart bars show tooltips on hover, and the rubric panel explains why toggles are disabled before the first run"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, selects, and labels use semantic elements rather than bare divs and spans"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Modals and overlay forms close via their close control, Escape, and (where a scrim is shown) a background click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "boundary_values_enforced_exactly"
description = "Boundary validation is exact: a 14-character rationale is rejected and 15 accepted; a findings entry under 20 characters is rejected with a message naming the findings field and adds no entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_import_rejected"
description = "Importing malformed Audit Package JSON or a document that breaks the field contract (schemaVersion not quality-audit-package-v1, missing required keys, or feedback findings under 20 characters) shows a visible error naming the offending field and leaves record counts and stages unchanged"
type = "binary"
weight = 1.0

