[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — queue rows, column headers, filter controls, rollup cells, check chips, verdict toggles, disclosures, run controls, form fields, and copy controls — is reachable and operable with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Modals and overlay forms trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-bearing controls and status icons carry accessible names or alt text describing their action or state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "run_and_stage_changes_announced"
description = "The completion of a run, a step entering the failed state, and a record changing lifecycle stage are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "All form fields — reviewer select, verdict select, findings, rationale, category, summary, resolution note — have visible labels, and validation messages are programmatically associated with their fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings follow a logical order with no skips across the Queue, Reviewers, Report, and detail views"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Landmark or skip-to-content navigation is present so keyboard and screen-reader users can bypass the rail and reach the main content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "All text, badges, chips, and controls meet sufficient color contrast, including the amber, violet, and teal stage badges"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "disclosures_expose_expanded_state"
description = "Guidance disclosures expose their expanded or collapsed state to assistive technology, and stage badges and check chips convey their state in text, not by color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "Animations respect the prefers-reduced-motion setting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Some interactive control (a rollup cell, check chip, verdict toggle, or disclosure) cannot be reached or activated via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or visually obscured on some controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom chips, toggles, or cells are built from non-semantic tags without ARIA roles or labels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Pass/fail, verdicts, or stages are indicated by color alone with no text or icon distinction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "An open modal lets keyboard focus escape into the page behind it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Text somewhere in the app is unreadable due to poor contrast"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Validation or run-failure feedback is visual only, with no screen-reader-accessible message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Icon or image content lacks any accessible name where one is needed to understand state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Heading levels are skipped or unordered, such as jumping from H1 to H3"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Animations continue to play with reduced-motion set"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant accessibility barrier that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
