[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — queue rows, column headers, filter controls, rollup cells, check chips, verdict toggles, disclosures, run controls, form fields, format switch, Copy, Download, and Import package — is reachable and operable with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Modals and overlay forms, including the import surface, trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-bearing controls and status icons carry accessible names or alt text describing their action or state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "run_and_stage_changes_announced"
description = "The completion of a run, a step entering the failed state, a record changing lifecycle stage, and copy/download/import confirmations are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "All form fields — reviewer select, verdict select, findings, rationale, category, summary, resolution note — have visible labels, and validation messages are programmatically associated with their fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings follow a logical order with no skips across the Queue, Reviewers, Report, and detail views"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Landmark or skip-to-content navigation is present so keyboard and screen-reader users can bypass the rail and reach the main content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "All text, badges, chips, and controls meet sufficient color contrast, including the amber, violet, and teal stage badges"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "disclosures_expose_expanded_state"
description = "Guidance disclosures expose their expanded or collapsed state to assistive technology, and stage badges and check chips convey their state in text, not by color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "Animations respect the prefers-reduced-motion setting"
type = "binary"
weight = 1.0

