[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "feedback_entry_flow_updates_all_surfaces"
description = "Adding a valid feedback entry from a record's detail view appends it to the thread and the new entry is reflected everywhere it should appear: the queue row's entry count, the reviewer's rollup cell, the Reviewers view, and that reviewer's detail view"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_form_shows_inline_validation"
description = "Submitting the feedback form, a fail rationale, or the escalation form with an invalid field triggers immediate inline validation naming the field, before any state changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "verdict_edit_updates_related_displays"
description = "Changing a criterion verdict updates every related display without a reload: the admission outcome banner, the queue row's criteria summary, the criterion rollup cell, the failure-ranking chart, and the stage badge"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "escalation_flow_updates_all_surfaces"
description = "Escalating a held record with a category and summary moves its stage to escalated in the detail view, the queue row badge, the state machine strip, the Report view's escalated count, and the Audit Package JSON tasks/escalation fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "Switching from the Queue view to Reviewers or Report and back retains the applied filters, search text, and sort; returning to an open record's detail shows the same panels and disclosure states"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_filter_result_recoverable"
description = "Filtering the queue to zero matches shows a clear empty state, and the Clear filters control restores the full queue with the rollup strip unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "rollup_click_filters_everywhere"
description = "Clicking a rollup cell applies the matching filter: the chip appears, the table narrows to matching records, and the visible row count agrees with the cell's underlying tally"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "The navigation rail (collapsed behind its toggle at narrow widths) and the guidance disclosures can be closed and reopened without losing workflow context — the open record, run state, and filters persist"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "The escalation form, resolve form, and any confirmation overlays open, validate, submit, and cancel as expected; canceling changes no record state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Every flow dead end is recoverable without a reload: a paused run can be resumed after navigating away, filters can be cleared, the detail view can be closed back to the queue, and an abandoned form can be reopened cleanly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "mutation_to_export_flow"
description = "Fail a criterion with a distinctive rationale and add a feedback entry with distinctive findings, then open Report: Audit Package JSON shows schemaVersion quality-audit-package-v1 and those exact strings under the field-contract keys for that task; Copy and Download are available"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_import_round_trip_flow"
description = "After a session mutation, export Audit Package JSON, import that same text, and confirm the visible queue stages, rollups, and the next export preview match the pre-export mutated state"
type = "binary"
weight = 1.0

