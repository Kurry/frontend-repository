[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "feedback_entry_flow_updates_all_surfaces"
description = "Adding a valid feedback entry from a record's detail view appends it to the thread and the new entry is reflected everywhere it should appear: the queue row's entry count, the reviewer's rollup cell, the Reviewers view, and that reviewer's detail view"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_form_shows_inline_validation"
description = "Submitting the feedback form, a fail rationale, or the escalation form with an invalid field triggers immediate inline validation naming the field, before any state changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "verdict_edit_updates_related_displays"
description = "Changing a criterion verdict updates every related display without a reload: the admission outcome banner, the queue row's criteria summary, the criterion rollup cell, the failure-ranking chart, and the stage badge"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "escalation_flow_updates_all_surfaces"
description = "Escalating a held record with a category and summary moves its stage to escalated in the detail view, the queue row badge, the state machine strip, and the Report view's escalated count"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "Switching from the Queue view to Reviewers or Report and back retains the applied filters, search text, and sort; returning to an open record's detail shows the same panels and disclosure states"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_filter_result_recoverable"
description = "Filtering the queue to zero matches shows a clear empty state, and the Clear filters control restores the full queue with the rollup strip unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "rollup_click_filters_everywhere"
description = "Clicking a rollup cell applies the matching filter: the chip appears, the table narrows to matching records, and the visible row count agrees with the cell's underlying tally"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "The navigation rail (collapsed behind its toggle at narrow widths) and the guidance disclosures can be closed and reopened without losing workflow context — the open record, run state, and filters persist"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "The escalation form, resolve form, and any confirmation overlays open, validate, submit, and cancel as expected; canceling changes no record state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Every flow dead end is recoverable without a reload: a paused run can be resumed after navigating away, filters can be cleared, the detail view can be closed back to the queue, and an abandoned form can be reopened cleanly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Running checks, reviewing criteria, adding feedback, or escalating is unavailable from the visible UI on records that should offer it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "feedback_entries_missing_or_duplicated"
description = "A submitted feedback entry fails to appear in the thread, or appears more than once from a single submission"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A run outcome, verdict, or feedback entry appears in one surface but a related surface (queue row, rollup, report) still shows the old value"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching views breaks the layout, drops the applied filters, or loses the selected record"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_filter_state_broken"
description = "Filtering to zero matches produces a broken or blank table region with no message or recovery control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The queue's visible rows disagree with the rollup cell or filter chip that produced them (for example a fail-filter cell tallies 5 while the filtered table shows a different set)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "The collapsed navigation rail or a collapsed disclosure cannot be reopened"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "An open modal or form overlay traps the user with no working close, cancel, or Escape path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A rejected submission or a failed run step leaves no visible feedback explaining what happened"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Some navigation state (an open detail view, a paused run, an applied filter combination) can only be escaped by reloading the page"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "A critical end-to-end flow fails in a way that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
