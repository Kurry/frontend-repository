[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "The layout adapts gracefully from 1440px desktop to 375px mobile: navigation rail, rollup strip, queue table, detail panels, and report all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "Interactive controls — rows, chips, toggles, disclosures, form controls — present tap targets of at least 44px at mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Typography stays legible at both desktop and mobile widths, with the heading hierarchy preserved"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px width no content clips or overflows the viewport, and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_rail_collapses_at_768"
description = "At widths of 768 pixels and below the navigation rail collapses behind a toggle control that opens it as an overlay; at desktop widths the rail is visible by default"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "detail_panels_stack_in_order"
description = "At narrow widths the detail view's panels stack vertically in the order state machine, check chips, rubric, feedback, timeline, with every control still reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "touch_targets_operate_on_mobile"
description = "At mobile width, tapping queue rows, check chips, disclosures, and verdict toggles operates them exactly as clicking does at desktop width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "tables_scroll_in_own_containers"
description = "The queue table and the rollup strip scroll within their own containers at narrow widths rather than forcing the page to scroll horizontally"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_resize_responsively"
description = "The rollup charts resize to fit their containers across widths without overflowing or collapsing to unreadable size"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Persistent controls (the rail toggle, Run checks, Copy export) remain visible and reachable at every width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_controls_usable_at_375"
description = "At 375 pixel width, Copy, Download, and Import package remain usable within the viewport without page-level horizontal scrolling"
type = "binary"
weight = 1.0

