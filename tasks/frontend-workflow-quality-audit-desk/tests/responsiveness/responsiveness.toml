[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "The layout adapts gracefully from 1440px desktop to 375px mobile: navigation rail, rollup strip, queue table, detail panels, and report all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "Interactive controls — rows, chips, toggles, disclosures, form controls — present tap targets of at least 44px at mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Typography stays legible at both desktop and mobile widths, with the heading hierarchy preserved"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px width no content clips or overflows the viewport, and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "nav_rail_collapses_at_768"
description = "At widths of 768 pixels and below the navigation rail collapses behind a toggle control that opens it as an overlay; at desktop widths the rail is visible by default"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "detail_panels_stack_in_order"
description = "At narrow widths the detail view's panels stack vertically in the order state machine, check chips, rubric, feedback, timeline, with every control still reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "touch_targets_operate_on_mobile"
description = "At mobile width, tapping queue rows, check chips, disclosures, and verdict toggles operates them exactly as clicking does at desktop width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "tables_scroll_in_own_containers"
description = "The queue table and the rollup strip scroll within their own containers at narrow widths rather than forcing the page to scroll horizontally"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_resize_responsively"
description = "The rollup charts resize to fit their containers across widths without overflowing or collapsing to unreadable size"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Persistent controls (the rail toggle, Run checks, Copy export) remain visible and reachable at every width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The layout breaks or overflows at common breakpoints between 1440px and 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Controls are too small to tap or visibly misaligned at mobile widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Body, label, or chip text becomes too small to read at some widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Content is cropped, or unnecessary scrollbars appear around panels that fit their space"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "rail_missing_or_stuck_at_some_width"
description = "The navigation rail is missing, cannot be opened, or cannot be closed at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "A fixed or sticky element (rail overlay, toolbar, toast) obscures content or controls at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Rollup cells, chips, chart labels, or panels overlap each other at some viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "mobile_taps_do_nothing"
description = "Tapping a control on mobile that works via click on desktop produces no response"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "A chart or table keeps a static size and overflows the viewport at narrow widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Required controls (filters, Run checks, verdict toggles, Copy export) disappear entirely at specific sizes with no alternate access"
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "7.11"
name = "export_controls_usable_at_375"
description = "At 375 pixel width, Copy, Download, and Import package remain usable within the viewport without page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
