[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_coherently"
description = "Multi-facet round-trip: apply a stage filter and a column sort, run checks on a pending record, fail one criterion with a typed rationale, and add a feedback entry; then reload. All facets coherently reset to the seeded baseline — the seeded stages and check results return, the rationale, feedback entry, filters, and sort are gone, the export history is empty, and the import surface is closed — never a mix of kept and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "queue_sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort the queue by a column (for example checks summary) ascending, note the order, then sort descending; the order reverses correctly relative to ascending, proving sort derives from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "rollups_respond_to_run_outcomes"
description = "Derived-view sensitivity: complete a run whose record has seeded failing checks and confirm the affected check pass-rate cells, the check chart bars, and the criterion failure ranking change meaningfully rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "verdict_echoes_across_views"
description = "Cross-view echo: fail a criterion in the detail view and confirm the same record's criteria summary in the queue row, the criterion rollup cell, and the Report view's failure ranking update without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "feedback_count_delta_is_exact"
description = "Count-delta integrity: read a record's feedback entry count and its reviewer's rollup cell immediately before and after submitting one valid entry; both increase by exactly one with no lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_report"
description = "Input-dependent output: escalate one held record with category Spec conflict and a distinctive summary, and fail a criterion on another record with a distinctive rationale; the Audit Package JSON tasks entries and the Markdown appendix show each record with its own category, summary, and rationale text — the two outcomes differ as their inputs dictate"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_run_and_feedback_flows"
description = "Interleaved-flow integrity: start a run on record A, pause it mid-step, open record B and add a feedback entry, then return to A and resume; A continues from its checkpoint with completed steps unchanged and B's new entry is intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_filter_round_trip_tracks"
description = "Edge-state round-trip: filter the queue to zero matches, confirm the empty state, then clear filters; the full queue returns and the rollup strip values are unchanged by the excursion"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "full_pipeline_reflected_in_export"
description = "Full-pipeline probe: filter the queue and batch-run checks over the filtered set, fail a criterion with a typed rationale on one record, escalate a held record with a category and summary, apply fixes and re-run checks on another held record, then open Report and copy Audit Package JSON. The export must show schemaVersion quality-audit-package-v1, the batch's new check outcomes in checkPassRates, the failed criterion and its exact rationale under tasks, the escalation fields, the re-audited record's flipped outcomes, and a new timestamped exportHistory entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_reconstructs_desk"
description = "Export/import pipeline: mutate the desk (run, fail a criterion, or add feedback), export Audit Package JSON, import that JSON, and confirm visible queue stages, rollups, and the next export preview match the exported document"
type = "binary"
weight = 1.0

