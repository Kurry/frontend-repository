[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "serves_clean_on_start_path"
description = "The app serves via its documented start path on port 3000 and renders the Queue view with the seeded records, with no errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "shared_state_coherence"
description = "Shared-state coherence: a change made in one surface (a completed run, a verdict, a feedback entry) is immediately reflected in every other surface showing that data — queue row, detail panels, rollup strip, charts, and both Report export previews — without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "storage_stays_empty"
description = "After a full exercise of the app (runs, verdicts, feedback, escalation, fixes, export copy/download, import), localStorage, sessionStorage, and other browser storage remain empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "reload_returns_seeded_baseline"
description = "A page reload returns the app to its seeded state: the seeded records with their original stages, check results, and feedback, the default Queue view, an empty export history, and a closed import surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "console_clean_through_flows"
description = "No console errors or unhandled promise rejections appear on load or while exercising runs, batch runs, pause/resume, verdicts, feedback, escalation, re-audit, export copy/download, and import"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "no_outbound_network_requests"
description = "Only same-origin requests appear in the network log while loading and exercising the app; no CDN, font, icon, analytics, or API requests leave the origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "views_reachable_via_client_state"
description = "The Queue, Reviewers, Report (including format switch and import surface), and task detail views are all reachable from the in-app navigation, and switching between them never triggers a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_keeps_state_synced"
description = "Rapid interaction — fast filter toggling, quick sort clicks, switching views while a run advances — leaves all surfaces consistent, with no view showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "deterministic_state_renders_consistently"
description = "Two loads of the same seeded state render the same records, stages, check outcomes, and rollup values"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "export_import_share_field_contract"
description = "Audit Package JSON export and a successful import conform to the same visible field-contract keys (schemaVersion quality-audit-package-v1, datasetSummary, tasks, and related arrays); after a valid import the next export preview matches the imported document"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "audit_package_aggregate_arrays_exact"
description = "Audit Package JSON has schemaVersion quality-audit-package-v1 and exportedAt ending in Z; datasetSummary contains integer admitted, held, escalated, resolved, and total; checkPassRates has exactly nine check-ordered objects with closed-set check, integer passes/fails, and numeric passRate; criterionFailureRanking has exactly ten closed-set criteria ordered by failures descending; reviewerActivity entries use seeded reviewer names, integer entryCount, and verdictMix integer counts for Approve, Approve with caveats, Needs edit, and Reject"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.12"
name = "audit_package_task_and_history_contract_exact"
description = "Every session-touched Audit Package task has slug, one of the seven lifecycle stages, exactly nine closed-set checks with status pass/fail/not-run, failedCriteria records with criterion/fail/15-character rationale, feedback records with seeded reviewer/closed verdict/20-character findings, null-or-valid escalation and resolution records, and exportHistory entries whose exportedAt ends in Z and format is json or markdown"
type = "binary"
weight = 1.0

