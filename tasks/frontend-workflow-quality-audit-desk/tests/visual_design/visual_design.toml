[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "nav_rail_and_queue_layout"
description = "The app shows a left navigation rail with entries for Queue, Reviewers, and Report; the Queue view places the rollup strip and its two charts above the table; the Report view shows a format switch, monospaced export preview, Copy, Download, Import package, and export history"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "detail_panels_visually_distinct"
description = "The detail view groups the state machine strip, check chips, rubric panel, feedback thread, and timeline into visually distinct panels with clear boundaries"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "stage_badge_color_mapping"
description = "Lifecycle stage badges use one consistent color mapping everywhere they appear: pending neutral gray, checked blue, admitted green, held amber, escalated red, re-audited violet, resolved teal"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "check_chip_state_treatments"
description = "Check chips are visually distinct at a glance — pass green, fail red, not run neutral outline — and the same pass/fail colors carry into the rollup cells, the run steps, and the report's check table"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "verdict_chip_treatments"
description = "Verdict chips use four distinct treatments — Approve green, Approve with caveats amber, Needs edit blue, Reject red — consistent between the thread, the reviewer detail view, and the report"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "run_status_treatments_consistent"
description = "Run step statuses pending, running, retrying, failed, and complete each carry a distinct color or icon treatment, consistent between the step list and the run evidence log"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "chart_palette_and_ordering"
description = "The two rollup charts share one accent palette, and the same check-to-position and criterion-to-position ordering is used in the rollup cells, the charts, and the report tables"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "typographic_hierarchy"
description = "Typography shows a clear hierarchy — app title larger than view headings, which are larger than panel headings, which are larger than table body and label text — consistent across views"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "spacing_rhythm_consistent"
description = "Spacing follows a consistent rhythm: gaps between the rollup strip, table, and detail panels are visually regular, with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "component_state_treatments"
description = "Buttons, inputs, selects, toggles, and chips show distinct default, hover, focus (visible ring), disabled, and error treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "single_consistent_icon_set"
description = "One consistent icon set is used throughout the navigation rail, stage badges, check chips, run steps, row actions, and export controls, with no mismatched icon styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n1"
name = "stage_color_mapping_inconsistent"
description = "The same lifecycle stage renders with different colors in different places, or two different stages share a color treatment that makes them indistinguishable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n2"
name = "text_overlaps_or_clips_at_desktop"
description = "At 1440px width, any heading, table cell, chip, chart label, or panel text overlaps another element or is clipped by its container"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n3"
name = "controls_look_like_plain_text"
description = "Interactive controls are visually indistinguishable from passive text, or default browser-styled widgets appear amid the styled interface"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n4"
name = "status_conveyed_by_color_only"
description = "Check chip or stage badge states are distinguishable only by color, with no text or icon difference between pass and fail or between stages"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n5"
name = "density_or_alignment_breaks"
description = "The queue table, rollup strip, or detail panels show crooked or misaligned components, or a visual density so cramped or so sparse that scanning the data is impaired"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
