[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens at / into the ClockCraft dashboard with header stats, a Live timer, a Today's timeline, a Weekly overview, and an All entries list, and both the timeline and the list show a friendly empty state because no entries exist yet"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After adding a manual entry named 'Deep Work' with category Meaningful and a duration in minutes, 'Deep Work' appears in the All entries list and the Today's timeline with a green Meaningful chip and its duration shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After adding a second entry, the entry list and timeline show exactly one more entry than before, and the header Today's minutes and Meaningful ratio update immediately without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After starting the Live timer for an activity with a category and waiting a few seconds, the elapsed display increases about once per second, and clicking Stop timer saves a new entry whose duration reflects the elapsed time"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After opening the edit dialog for an entry and changing its name to 'Evening Reading' and its duration, the list and timeline show 'Evening Reading' with the new duration and the previous name is no longer visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After clicking an entry's Delete control and cancelling the confirmation, the entry is still present; after deleting again and confirming, the entry is no longer visible in the list or the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After creating a custom tag in the tag manager and assigning it to an entry, that tag is visible on or beside the entry in the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When the Meaningful category filter is selected, only Meaningful entries remain visible in the timeline and list and the Meaningful filter button is visibly highlighted; selecting All restores every entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After typing an activity name or tag into the search input, the list narrows to matching entries, and a search that matches nothing shows an explicit no-results message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After logging entries of different durations, the Today's timeline blocks are visibly proportional to duration — a 60-minute entry renders roughly twice as tall as a 30-minute entry — and the Weekly overview shows today's bar with a category-colored segment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After creating an entry and performing a full page refresh, the saved entry, its category, its assigned tag, and the streak are restored exactly, and an entry deleted before the refresh does not reappear"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering buttons, filter chips, and timeline entry blocks, a visible hover state (background, border, or shadow change) appears, and keyboard Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After opening the history panel via View history, making several changes, and clicking Undo, the visible timeline and list return to the immediately prior state, the History state region shows the current snapshot, and Redo restores the undone state while an invalid Undo or Redo control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After undoing one or more steps and then making a different change through the real controls, the history panel shows a separate selectable alternate branch, and selecting that branch restores its exact prior visible state rather than a flattened history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The entry collection supports create, edit, and delete through visible controls, with the Today's timeline, the All entries list, and the header stats all updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Starting the Live timer increases the elapsed display about once per second, and clicking Stop timer saves a new entry whose duration reflects the elapsed time rather than zero or a fixed placeholder"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Starting a new timer while one is already running automatically stops and saves the previous activity as a completed entry with a nonzero duration and leaves only the new timer live"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The Add entry manually form logs a past activity from a name, category, start time, and duration in minutes without a live timer, and the entry appears in the list and timeline with those values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Every entry shows exactly one category as a visually distinct colored chip everywhere it appears, and the category selector is required and defaults to a valid Meaningful, Neutral, or Draining value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "A custom tag created in the tag manager can be assigned to an entry and is then visible on or beside that entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "The category filter buttons narrow the timeline and list to the chosen category, and the search input narrows the list by activity name or tag with an explicit no-results message when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "The Meaningful ratio, Today's minutes, weekly chart, and streak recompute immediately with no reload when an entry is started, stopped, added, edited, or deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The Weekly overview shows seven day bars split into Meaningful, Neutral, and Draining segments sized to minutes, and today's bar grows a matching segment after an entry is logged for today rather than staying a static placeholder"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The history panel exposes Undo, Redo, a region labelled History state, a snapshot list, and an Apply scenario change action, and Undo and Redo restore the exact adjacent visible states while an invalid Undo or Redo control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Undoing one or more steps and then making a different change through the real controls creates a selectable alternate branch, and selecting that branch restores its exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The Meaningful streak counter reflects a multi-day streak built from prior days on which Meaningful minutes exceeded Draining minutes rather than resetting to one"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The entry list is static markup with no working create, edit, or delete against shared application state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Deleting an entry happens with no confirmation step, or cancelling the delete confirmation still removes the entry"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Undoing and then making a different change silently discards or flattens the abandoned history states instead of preserving them as a selectable branch"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "A success signal such as a toast, a saved entry, or an updated ratio appears while the underlying entry is absent, or a value stays constant regardless of the input given"
type = "binary"
weight = 1.0
negate = true
