[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "12.1"
name = "browse_entity_artifact_modules_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, entity, and artifact prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_shell_logic"
description = "Exposed browse, entity, and artifact tool handlers drive the same visible UI logic as the shell, Projects Board, Export, and Archive (destinations, theme, filters, project CRUD, and export/import/copy)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops_and_destinations"
description = "Only documented browse, entity, and artifact operations are available, with destinations limited to terminal-home, project-detail, about, export-center, and archive-vault — no undeclared routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/set_theme/apply_filter/clear_filter, entity create/select/update/delete, and artifact export/import/copy against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_project_crud_ops_work"
description = "Entity operations create, select, update, and delete work for the project entity (delete requires confirm=true) and update the same Projects Board / /work / export surfaces as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_fields_name_slug_blurb_tags_status_type_year"
description = "Entity create/update accept the declared fields name, slug, blurb, tags, status, type, and year and surface the same validation failures as the visible create/edit path when required values are missing or violate the project field contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "destinations_filters_themes_match_bindings"
description = "Browse destinations include terminal-home, project-detail, about, export-center, and archive-vault; filters include status and tag; themes include dark, light, retro, and glass; browsable entity is projects."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_modules"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / entity-collection-v1 / artifact-transfer-v1 and the declared Bindings are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_apis_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results for the bound tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the delivered app without manual editing of the test harness or stdio bridge."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound for export formats json and markdown and import mode declared-portfolio, and invoking them updates or reads the same Export view surfaces as the UI."
type = "binary"
weight = 1.0

