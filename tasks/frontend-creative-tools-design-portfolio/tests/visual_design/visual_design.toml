[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "terminal_wallpaper_composition"
description = "A full-bleed atmospheric wallpaper frames one centered terminal window with macOS traffic lights and the title designer@portfolio ~ /portfolio, reading as a terminal tool rather than a multi-section marketing page"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "terminal_content_hierarchy"
description = "JetBrains Mono styling, ASCII art, the two-column welcome box, echoed prompts, headings, skill bars, testimonials, awards, and project detail chips form a legible dense hierarchy inside the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "four_coherent_themes"
description = "Dark, light, retro, and glass themes restyle the complete terminal coherently; retro visibly uses CRT scanline/glow cues and glass uses translucent surfaces while text remains readable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "material_style_dense_controls"
description = "Buttons, overlay controls, feedback banners or snackbars, tooltips, forms, and dense controls share a polished component treatment that fits the terminal chrome rather than browser-default styling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "projects_board_visual_structure"
description = "Projects Board uses dense cards or rows with consistent status badges, tag chips, stat chips, aligned controls, and a clearly styled empty state inside the terminal body"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "overlay_visual_fidelity"
description = "The exit overlay changes titlebar text to an exit path and shows red kill lines plus reconnect controls, while matrix and confetti canvases visibly cover the viewport without displacing terminal layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "responsive_terminal_layout"
description = "At roughly 375px wide the terminal remains readable, welcome content and project rows adapt without clipped text or page-level horizontal overflow, and all prompt and overlay controls remain reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "breakpoint_reflow_768_and_mobile"
description = "At 768px and below the terminal window expands toward full width and the two-column welcome box stacks into a single column, while Projects Board cards reflow from a multi-column grid at desktop widths to a single column at narrow widths without clipping card content"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "terminal_copy_quality"
description = "Terminal output, /help descriptions, and section copy use one consistent capitalization and tone, command descriptions state specifically what each command does, and error or validation messages name the problem and the fix rather than a bare failure word"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "export_and_palette_visual_structure"
description = "Export view shows a monospaced Portfolio JSON / Resume Markdown preview with Copy and Download affordances, and the command palette reads as a centered overlay with kind-labeled result rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "bulk_bar_and_stats_strip_chrome"
description = "Projects Board includes a compact stats strip and a bulk actions bar that visually belong to the terminal chrome rather than a disconnected dashboard widget."
type = "binary"
weight = 1.0

