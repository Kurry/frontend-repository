[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "post_boot_terminal_welcome"
description = "After dismissing boot, ASCII YOUR NAME art appears above the two-column greeting, rocket, subtitle/email, Capabilities, and Navigation welcome box, followed by a focused command input"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_projects_and_shortcuts"
description = "Running /work or opening Projects Board shows at least six seeded case studies, and invoking a seeded shortcut such as /signals opens a detail block with type/year, blurb, tags, and stat chips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "project_create_cross_view_flow"
description = "Starting from the seeded project count, creating Harbor Atlas with valid name, blurb, status, tags, and stats increases the count by exactly one; it then appears in /work, Projects Board, its detail surface, and matching filters without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "project_edit_cross_view_flow"
description = "Editing one project to Evening Terminal updates that same record in Projects Board, /work output, its shortcut detail, tags/status filters, and derived count without recreating or duplicating it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "project_delete_cross_view_flow"
description = "Deleting a selected project decreases the measured count by exactly one and removes it from Projects Board, /work output, shortcut lookup, and every matching filter on the first try"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "projects_empty_state"
description = "After deleting every project through visible controls, Projects Board and /work show a meaningful empty-project state rather than a blank body"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "project_inline_validation"
description = "Submitting project create or edit with an empty required name shows an inline field-specific error before submission and leaves the measured project count and last valid record unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "terminal_board_mode_switch"
description = "Switching between Terminal CLI and Projects Board through /work board or the visible mode control replaces the terminal body without a document reload or URL navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "session_theme_commands"
description = "Running /dark, /light, /retro, and /glass applies four visibly distinct root-level themes without reload, while /themes lists the choices"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "boot_dismissal_paths"
description = "On a fresh load, sequential boot status lines end in a ready line and Press Enter to continue; Enter, pointer click, and touch-capable activation each dismiss boot into the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "command_catalog_and_clear"
description = "Slash commands echo their input and produce matching staggered output for /help, /about, /work, /clients, /skills, /philosophy, /social, /articles, /testimonials, /awards, /contact, and /privacy, while /clear wipes prior output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "discoverable_easter_eggs"
description = "/secrets or /easter-eggs lists working hidden commands; /matrix starts green rain, /konami or the keyboard code triggers confetti, sudo hire designer reaches 100%, and the listed shell-themed extras print themed output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "autocomplete_history_and_aliases"
description = "Typing a partial command opens matching suggestions, Tab completes the highlighted command, arrow keys traverse history, and an alias, bare-word fuzzy match, and natural-language phrase each resolve to their intended command"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "window_chrome_controls"
description = "Red close opens the kill-style exit overlay and Reopen restores the terminal; yellow minimize switches from blurred to sharp wallpaper; green maximize expands the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "cookie_consent_privacy_flow"
description = "After boot, choosing Accept or Decline dismisses the consent banner without an exception and /privacy reports the selected in-memory status; a fresh reload coherently returns consent to not-set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "quick_info_inert_controls"
description = "/linkedin, /facebook, /instagram, /phone, /email, /agency, and /location print placeholder values inline, and all social, contact, award, and exit-overlay controls keep the current URL and tab unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "section_title_without_navigation"
description = "Running multiple section commands changes the document title to the active section while the URL remains unchanged and the single-page terminal stays mounted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "stubbed_terminal_commands"
description = "One or more required section, project, clear, or easter-egg commands behaves as a decorative stub, prints unrelated output, or leaves the promised visible state unchanged"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "static_or_desynchronized_projects"
description = "Project create, edit, delete, shortcut, board, list, or filter surfaces show static or mutually inconsistent records after a visible project mutation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "outbound_navigation_present"
description = "A social, contact, award, close-overlay, or command control navigates to another URL, opens a new tab, or invokes mailto or tel"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable core-feature defect that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence that demonstrates it. If the defect is already covered even partially by another criterion, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
