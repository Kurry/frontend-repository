[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "post_boot_terminal_welcome"
description = "After dismissing boot, ASCII YOUR NAME art appears above the two-column greeting, rocket, subtitle/email, Capabilities, and Navigation welcome box, followed by a focused command input"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_projects_and_shortcuts"
description = "Running /work or opening Projects Board shows at least six seeded case studies, and invoking a seeded shortcut such as /signals opens a detail block with type/year, blurb, tags, and stat chips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "project_create_cross_view_flow"
description = "Starting from the seeded project count, creating Northline Atlas with valid name, blurb, status, tags, and stats increases the count by exactly one; it then appears in /work, Projects Board, its detail surface, matching filters, /stats, and the Portfolio JSON export preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "project_edit_cross_view_flow"
description = "Editing one project to Evening Terminal updates that same record in Projects Board, /work output, its shortcut detail, tags/status filters, /stats when tags change, the export preview, and derived count without recreating or duplicating it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "project_delete_cross_view_flow"
description = "Deleting a selected project decreases the measured count by exactly one and removes it from Projects Board, /work output, shortcut lookup, every matching filter, /stats, and the export preview on the first try"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "projects_empty_state"
description = "After deleting every active project through visible controls, Projects Board and /work show a meaningful empty-project state rather than a blank body, and /stats shows zero active projects"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "project_inline_validation"
description = "Submitting project create or edit with an empty required name, illegal slug, status outside shipped|wip|archived, tags outside 1–8 unique entries, or year outside 1990–2100 shows an inline field-specific error naming the offending field before submission and leaves the measured project count and last valid record unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "terminal_board_mode_switch"
description = "Switching between Terminal CLI and Projects Board through /work board or the visible mode control replaces the terminal body without a document reload or URL navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "session_theme_commands"
description = "Running /dark, /light, /retro, and /glass applies four visibly distinct root-level themes without reload, while /themes lists the choices"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "boot_dismissal_paths"
description = "On a fresh load, sequential boot status lines end in a ready line and Press Enter to continue; Enter, pointer click, and touch-capable activation each dismiss boot into the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "command_catalog_and_clear"
description = "Slash commands echo their input and produce matching staggered output for /help, /about, /work, /clients, /skills, /philosophy, /social, /articles, /testimonials, /awards, /contact, /privacy, /stats, /export, /import, /archive, /undo, and /redo, while /clear wipes prior output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "discoverable_easter_eggs"
description = "/secrets or /easter-eggs lists working hidden commands; /matrix starts green rain, /konami or the keyboard code triggers confetti, sudo hire designer reaches 100%, and the listed shell-themed extras print themed output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "autocomplete_history_and_aliases"
description = "Typing a partial command opens matching suggestions, Tab completes the highlighted command, arrow keys traverse history, and an alias, bare-word fuzzy match, and natural-language phrase each resolve to their intended command"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "window_chrome_controls"
description = "Red close opens the kill-style exit overlay and Reopen restores the terminal; yellow minimize switches from blurred to sharp wallpaper; green maximize expands the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "cookie_consent_privacy_flow"
description = "After boot, choosing Accept or Decline dismisses the consent banner without an exception and /privacy reports the selected in-memory status; a fresh reload coherently returns consent to not-set; Portfolio JSON export consent matches /privacy"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "quick_info_inert_controls"
description = "/linkedin, /facebook, /instagram, /phone, /email, /agency, and /location print placeholder values inline, and all social, contact, award, and exit-overlay controls keep the current URL and tab unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "section_title_without_navigation"
description = "Running multiple section commands changes the document title to the active section while the URL remains unchanged and the single-page terminal stays mounted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "filter_flow_round_trip"
description = "Applying a status or tag filter in Projects Board recomputes the visible cards from the shared collection, clearing the filter restores the full set exactly, and editing a project's status moves it between the corresponding filter results without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "theme_mode_state_continuity"
description = "Running /retro then toggling into Projects Board keeps the retro theme applied, switching back to Terminal CLI preserves the prior output buffer and up-arrow command history, and no step in the chain reloads the document"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "unknown_command_feedback"
description = "Typing an unrecognized command echoes the input and prints a command-not-found style message pointing at /help, while existing output stays intact and no exception is thrown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "clear_preserves_session_state"
description = "After /clear wipes prior output, the prompt remains usable, pressing the up arrow still recalls earlier commands, and a subsequent /work still lists the full seeded project collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "double_submit_single_create"
description = "Double-activating the project create submit control adds exactly one project: the board card count increases by one and exactly one new entry appears in subsequent /work output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "search_syntax_status_and_tag"
description = "In Projects Board or via /work, a search field accepts status:shipped / status:wip / status:archived and tag:Name syntax; applying a query recomputes visible projects, and clearing restores the full set exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "syntax_matches_filter_controls"
description = "A status or tag filter control and a syntax query that express the same constraint show the same visible project set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "stats_rollup_live_derived"
description = "/stats prints total count, per-status counts, and top tag frequencies derived from the current collection; creating, editing status/tags, deleting, bulk-updating, restoring, or undoing changes the figures on the next /stats run without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "board_stats_strip_matches_stats"
description = "The Projects Board stats strip status counts always match the /stats numbers for the current active collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "bulk_select_and_actions_bar"
description = "In Projects Board each card/row has a checkbox; Select all checks every visible card; a bulk actions bar appears with the live selected count whenever at least one project is selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "bulk_archive_updates_surfaces"
description = "Selecting multiple projects and choosing Archive selected removes them from the board and /work, places them in /archive, drops /stats total by the selected count, clears selection, and removes them from the Portfolio JSON preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "archive_restore_returns_project"
description = "/archive lists archived projects; Restore on a row returns that project to the active collection with prior fields, increases board card count by exactly one, and removes it from the vault"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "command_palette_fuzzy_activate"
description = "Ctrl+K (Cmd+K) opens a focused command palette; typing fuzzy-matches commands, projects, themes, and views; arrow keys move the highlight and Enter activates; Escape closes and returns focus to the command input"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "palette_kind_labels_and_empty"
description = "Each palette result row shows a kind label (Command, Project, Theme, or View); a query matching nothing shows an empty-state line rather than a blank list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "undo_redo_project_mutations"
description = "Undo and Redo (toolbar, /undo /redo, and Ctrl+Z / Ctrl+Shift+Z) reverse and reapply create/edit/delete/bulk/archive/restore; empty stacks disable the controls; a new mutation after undo clears the redo stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "undo_restores_export_and_stats"
description = "After a project mutation, Undo restores the exact prior state across Projects Board, /work, shortcuts, filters, /stats, Archive vault, and the export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "export_two_tabs_live_compile"
description = "/export or Export view shows Portfolio JSON and Resume Markdown tabs compiled live from session state; creating, editing, deleting, archiving, restoring, or undoing a project updates both tabs without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "export_copy_and_download"
description = "Copy export puts the exact visible preview text on the clipboard with visible confirmation; Download offers the active tab as portfolio.json or resume.md"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "export_counts_match_stats"
description = "Portfolio JSON project count and status tallies match /stats and the board stats strip for the current session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "import_valid_portfolio_json"
description = "/import or Export Import accepts a valid Portfolio JSON payload and replaces the active projects collection so board, /work, /stats, and export preview match the imported projects"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "import_export_round_trip_parity"
description = "Exporting current portfolio JSON and immediately re-importing that same JSON reconstructs the same visible project names, statuses, tags, slugs, and stats on the board and in /work"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "portfolio_json_api_shaped_field_contract"
description = "The Portfolio JSON export preview is a single object whose visible text includes the required field contract: version exactly \"1.0\"; theme exactly one of dark, light, retro, or glass; consent exactly one of accepted, declined, or not-set; and a projects array whose entries show name, slug, blurb, status (shipped|wip|archived), tags, stats, type, and year"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "created_project_record_matches_portfolio_json"
description = "After creating a project through the form with valid name, slug, blurb, status, tags, stats, type, and year, the Portfolio JSON projects[] entry for that project shows the same field names and values the form produced — the created record is the export payload"
type = "binary"
weight = 1.0

