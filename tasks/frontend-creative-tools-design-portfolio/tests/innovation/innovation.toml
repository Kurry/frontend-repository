[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "11.1"
name = "easter_egg_delight_beyond_stubs"
description = "Hidden easter eggs feel finished and delightful: /matrix rain, /konami confetti, and sudo hire designer progress read as polished moments rather than unfinished stubs."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "crt_and_glass_theme_craft"
description = "/retro reads as a convincing CRT look (scanline/glow feel) and /glass as translucent glass, going beyond a flat class rename with no visual character."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "boot_sequence_narrative"
description = "On a fresh load, the sequential boot status lines ending in a ready prompt create a guided onboarding narrative into the portfolio shell."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "ascii_art_and_pixel_rocket_craft"
description = "Post-boot ASCII YOUR NAME art and the pixel/ASCII rocket in the welcome box provide distinctive interactive graphic craft beyond plain text dump."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "konami_and_shell_extras_as_alt_input"
description = "The Konami keyboard code and shell-themed extras (for example whoami, ls, git log) offer playful alternative input paths discoverable via /secrets."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "session_theme_personalization"
description = "Session-scoped theme switching across dark, light, retro, and glass lets the user personalize the terminal look without reload."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "designer_portfolio_narrative_arc"
description = "Section commands (/about, /philosophy, /work, /awards, /testimonials) read as one coherent designer-portfolio narrative rather than disconnected dumps."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "macos_chrome_immersion"
description = "macOS-style traffic-light chrome, wallpaper depth (blurred/sharp minimize), and the kill-style exit overlay create immersive windowing beyond a bare terminal box."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "natural_language_command_matching"
description = "Natural-language phrases resolve to the correct commands, adding intent matching beyond exact slash syntax alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "dual_mode_cli_and_board_polish"
description = "Terminal CLI and Projects Board modes feel like one polished product with coherent shared projects rather than two disconnected demos."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "easter_eggs_are_stubs"
description = "Required easter eggs are decorative stubs: /matrix, /konami, or sudo hire designer leave the promised canvas/progress state unchanged."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n2"
name = "themes_are_generic_renames"
description = "Theme commands only rename a class with no visible CRT/glass character — retro and glass look identical to dark aside from a label."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n3"
name = "boot_lacks_narrative_presence"
description = "Boot skips straight to a static prompt with no sequential status-line narrative or ready prompt."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n5"
name = "shell_feels_flat_static"
description = "The shell is flat and static: no boot presence, no theme character, and no easter-egg moments despite the spec requiring them."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n8"
name = "no_delightful_moments"
description = "The running app has no delightful moments — missing working matrix/confetti/progress easter eggs and lifeless theme switches."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.11"
name = "portable_portfolio_package_delight"
description = "Optional: the live Portfolio JSON + Resume Markdown export package feels like a finished takeaway artifact a designer would actually download, beyond a static dump."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.12"
name = "command_palette_craft"
description = "Optional: the Ctrl+K command palette feels keyboard-first and fast, with clear kind labels and empty-state craft beyond a bare filtered list."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
