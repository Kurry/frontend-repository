[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting after boot: create a project named Northline Studio, switch theme with /retro, open Projects Board, Accept the cookie banner, archive one project, and open Export; then reload. All facets coherently reset to the seeded baseline (boot replays, /work shows only seeded projects, theme/mode/consent/archive/undo/export return to defaults) — never a mixed partial survival."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "board_filter_derived_view_sensitivity"
description = "Derived-view sensitivity: apply a status:shipped syntax query or status filter in Projects Board and confirm the visible card set changes meaningfully; clear the query/filter and confirm the full seeded set returns exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_board_work_detail_export"
description = "Cross-view echo: edit a seeded project's name, then without reload confirm Projects Board, /work output, that project's shortcut detail, and the Portfolio JSON export preview all show the edited name."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure the Projects Board card count, /work entry count, and /stats total immediately before and after creating one valid project; all three increase by exactly one with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_project_names_different_outputs"
description = "Input-dependent output: create two projects with different names (Northline Studio then Coral Relay); their board cards, /work lines, shortcut detail blocks, and Portfolio JSON entries differ according to those names."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_theme"
description = "Interleaved-flow integrity: start creating a project, run /retro to switch theme, finish creating the project, then open Projects Board and Export; the new project is present in board and Portfolio JSON, the retro theme remains applied, and neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_projects"
description = "Edge-state round-trip: delete every active project until empty states show in Board and /work, then create one valid project; both surfaces leave the empty state and show exactly that one project, and /stats total equals 1."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "bulk_archive_undo_restores_export"
description = "Full-pipeline probe: select three board projects, Archive selected, confirm they leave the board and export preview and appear in /archive with /stats down by three; press Ctrl+Z and confirm all three return to the board, /stats prior totals, and Portfolio JSON names."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_round_trip_probe"
description = "Round-trip: create Northline Atlas with a valid project field-contract payload, open Export and confirm Portfolio JSON contains Northline Atlas under projects[] with required version/theme/consent/projects keys, copy that JSON, delete Northline Atlas, import the copied JSON, and confirm Northline Atlas returns on the board and in /work with the same status, tags, slug, and stats."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "artifact_field_contract_probe"
description = "Full-pipeline probe: create or edit a project, switch to /retro, Accept cookie consent, open Export, and confirm Portfolio JSON shows version exactly \"1.0\", theme exactly \"retro\", consent exactly \"accepted\", and a projects entry whose name, slug, blurb, status, tags, stats, type, and year match the form values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "schema_invalid_import_leaves_state"
description = "Edge-state: import a parseable JSON payload that fails the Portfolio JSON field contract (for example version \"2.0\" or status \"draft\"); board card count, /work listing, and export preview stay unchanged and a validation message names the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "stats_sensitive_to_status_edit"
description = "Derived-view sensitivity: edit one project's status from shipped to wip and confirm /stats shipped count decreases by one and wip increases by one without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_in_memory_state_survives_reload"
description = "After configuring theme, mode, a created project, consent, and archive state, a reload leaves an incoherent mix (for example the created project survives while theme resets, or consent stays accepted while projects reset)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "board_filter_ignores_status_input"
description = "Applying different status or tag filters or syntax queries leaves the Projects Board card set identical regardless of the filter input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_names_yield_identical_records"
description = "Creating two projects with different names yields byte-identical board cards, detail blocks, and Portfolio JSON entries that ignore the distinct inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "edit_stale_until_reload_across_views"
description = "After editing a project name, Projects Board, /work, or the export preview still shows the old name until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_hardcoded_ignores_session"
description = "Portfolio JSON export content stays identical before and after creating a distinctly named project in the session."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_skips_export_or_stats"
description = "After bulk archive, Undo restores the board but leaves /stats or the export preview in the archived state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "export_lacks_api_shaped_contract"
description = "After creating a valid project and opening Export, the Portfolio JSON preview lacks required version/theme/consent/projects keys or shows project entries that omit name, slug, blurb, status, tags, stats, type, or year."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
