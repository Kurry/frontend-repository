[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "7.1"
name = "terminal_adapts_1440_to_375"
description = "At 1440px the terminal window is centered over the wallpaper with visible margins; resizing to 375px keeps the terminal usable with the command input visible and no broken overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_banner_and_chrome"
description = "At 375px width, cookie-banner Accept/Decline, titlebar dots, and primary board/filter controls present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "monospace_type_readable_across_widths"
description = "JetBrains Mono terminal copy remains legible at both 1440px and 375px without collapsing into unreadably tiny glyphs."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no terminal content, welcome box, or board card clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "narrow_width_expands_terminal_window"
description = "At widths of 768px and below, the terminal window expands toward full width rather than remaining a narrow centered desktop card that leaves unusable side gutters."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "welcome_box_stacks_at_768"
description = "At widths of 768px and below, the two-column post-boot welcome box stacks into a single column with Capabilities and Navigation still readable in order."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "boot_dismissible_by_touch"
description = "On a fresh load, boot can be dismissed via touch-capable activation as well as Enter/click, revealing the post-boot terminal."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page shows no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "board_grid_and_canvases_reflow"
description = "Projects Board cards reflow from a multi-column grid at desktop widths to a single column at narrow widths without clipping card content; matrix-rain and confetti canvases size to the viewport when active."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "command_input_usable_at_narrow_widths"
description = "At 375px and 768px the command input remains visible and usable for typing a command after boot."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_palette_usable_at_375"
description = "At 375px width the command palette, export preview, and archive vault remain fully visible and operable; previews scroll within their own containers rather than forcing page-level horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.12"
name = "bulk_bar_usable_at_narrow"
description = "At 768px and below the bulk actions bar and board stats strip remain usable without clipping action labels."
type = "binary"
weight = 1.0

