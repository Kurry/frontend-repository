[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_surface_coherence"
description = "Project mutations, command history, output, autocomplete, theme, active mode, filters, and consent remain mutually coherent across every visible terminal and board surface during interleaved interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "local_assets_and_theme_tokens"
description = "Computed styles expose the required theme-token behavior and locally rendered component styling, while the browser network log shows scripts, styles, fonts, icons, and animation assets loading from the app origin with no third-party CDN requests"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "in_memory_reload_reset"
description = "After creating and filtering a project, changing mode and theme, building command history, and setting consent, a full reload coherently resets all facets to the seeded session baseline with browser localStorage and sessionStorage empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "console_clean_primary_flows"
description = "Initial load and the boot, command, project CRUD, filter, theme, window, consent, form-validation, and easter-egg flows produce no uncaught exception, unhandled rejection, hydration-style mismatch warning, or failed same-origin asset request"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "single_page_route_coherence"
description = "Section-title changes, theme changes, mode switches, inert controls, and close/reopen behavior keep the same URL and mounted single-page state without a blank screen or content flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "form_error_state_integrity"
description = "Invalid and extreme project form input against the project field contract (empty name/slug, illegal slug characters, status outside shipped|wip|archived, tags outside 1–8, year outside 1990–2100) produces specific inline per-field feedback before submit, preserves the last valid state, and repeated identical submissions do not create duplicate records"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "keyboard_operability_and_focus"
description = "The command input, autocomplete rows (arrow keys move the highlight, Tab or Enter completes), board cards and filters, banner buttons, titlebar dots, and overlay CTAs are all reachable and operable with the keyboard alone with a visible focus indicator, and the exit overlay keeps focus within it while open and can be dismissed from the keyboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "live_region_and_decorative_canvases"
description = "Form and command validation messages are exposed to assistive technology through a polite live region as well as visually, while the matrix-rain and confetti canvases are hidden from the accessibility tree and leave keyboard focus and the command input unblocked"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "load_and_rapid_input_performance"
description = "The app is interactive within 2 seconds of a local cold load with boot starting promptly, rapid repeated command entry stays responsive with no hangs or dropped keystrokes, and the matrix-rain canvas animates while the command input remains responsive with /clear or dismissal stopping its work"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "undo_export_state_coherence"
description = "Undo and redo of a project mutation keep Projects Board, /work, /stats, archive, and export preview mutually coherent without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "import_replaces_shared_collection"
description = "Importing a valid Portfolio JSON replaces the active projects collection such that board, /work, /stats, and export preview all reflect the imported set from the same shared state."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "project_form_validation_matches_field_contract"
description = "Project create/edit and Import enforce the declared field contracts in the UI: empty or illegal name/slug, status outside shipped|wip|archived, tags outside 1–8 unique entries, or year outside 1990–2100 are rejected with inline feedback naming the field; Import of JSON that fails required version/theme/consent/projects keys or closed enums is rejected with feedback naming the offending field and does not mutate projects"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "theme_consent_cross_field_match_export"
description = "Switching theme via /retro and choosing Accept on consent updates the Portfolio JSON theme field to retro and consent field to accepted without a reload — a cross-field contract between session state and the export payload"
type = "binary"
weight = 1.0

