[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "15.1"
name = "terminal_headings_consistent_case"
description = "Where the app renders terminal headings, /help group titles, and section copy, they use one consistent capitalization convention and tone throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "command_descriptions_are_specific"
description = "Where /help renders command descriptions, they say what each command does in specific terms rather than generic labels like Submit or OK."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_copy_names_field_and_fix"
description = "Where the app renders create/edit or import validation errors against the project or Portfolio JSON field contract, they name the problem and the fix (for example which field is empty, illegal, or out of enum), never a bare failure word alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_projects_copy_explains_create"
description = "Where the app renders the empty projects state in Projects Board or /work, the copy explains what belongs there and how to create a project."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "section_copy_spelling_grammar"
description = "Where the app renders body or section copy (/about bio, /philosophy, testimonials, award rows), rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "project_terminology_consistent"
description = "Where the app renders labels for projects/case studies across /work, Projects Board, and detail blocks, terminology stays consistent rather than mixing unrelated nouns for the same concept."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "stat_chips_and_percentages_consistent"
description = "Where the app renders project stat chips and /skills percentages, numeric formatting is consistent (same percent style and chip presentation)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "privacy_status_copy_is_specific"
description = "Where /privacy renders consent status, it states accepted, declined, or not set specifically rather than a vague affirmation."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "identity_details_are_placeholders"
description = "Where the app renders name, email, phone, or social values, they read as clearly placeholder identity details rather than real personal data."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "lorem_or_template_filler_visible"
description = "Lorem ipsum or template filler (TODO, Lorem, asdf, or variables like {{title}}) is visible anywhere in the shipped terminal UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_terminal_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as the ready line, welcome greeting, /help headings, or primary banner buttons."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "project_terms_inconsistent"
description = "The same project/case-study concept is named inconsistently across /work, Projects Board, and detail output."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "terminal_copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders command output, welcome-box copy, or board labels unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.10"
name = "export_and_undo_labels_specific"
description = "Where the app renders export tab labels and undo history labels, they read Portfolio JSON / Resume Markdown and use specific verbs such as Created, Edited, Archived, or Restored rather than generic Done."
type = "binary"
weight = 1.0

[[criterion]]
id = "15.11"
name = "empty_archive_filter_palette_copy"
description = "Where the app renders empty archive, empty filter results, or empty palette query states, the copy explains what belongs there and how to recover."
type = "binary"
weight = 1.0

[[criterion]]
id = "15.n5"
name = "generic_undo_or_export_labels"
description = "Export tabs or undo history use only generic labels such as Done or OK where specific Portfolio JSON / Resume Markdown or action verbs are specified."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
