[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "boot_and_post_boot_motion"
description = "On a fresh load through the real prompt controls, boot lines reveal sequentially and dismissal makes the ASCII art and welcome box fade or slide in before focus settles on the command prompt"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "cli_output_and_mode_motion"
description = "A visible thinking indicator precedes staggered command output, and switching between Terminal CLI and Projects Board updates in place with a perceptible transition rather than a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "skill_bar_growth"
description = "Running /skills through the visible command prompt renders at least ten labeled bars whose widths visibly animate from zero to distinct target percentages"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "window_and_theme_feedback"
description = "Theme changes recolor in place, minimize crossfades blurred and sharp wallpaper, maximize visibly expands the terminal, and reopening the closed terminal restores it with coherent transition feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "easter_egg_canvas_motion"
description = "Invoking /matrix produces continuous moving green character rain, /konami produces a confetti burst, and sudo hire designer visibly advances a progress bar to 100%"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "required_hover_microinteractions"
description = "Using the real pointer path, titlebar dots ease opacity, project cards or rows ease border and background, autocomplete rows highlight, and social and close-overlay buttons visibly ease on hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_behavior"
description = "With prefers-reduced-motion enabled before a fresh load, staggered entry and continuous canvas effects are disabled or substantially reduced while every resulting state remains usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "board_card_enter_exit_animation"
description = "Creating a project through the visible form or command animates its new card or row into the Projects Board, and deleting one through the visible control animates it out, rather than the board snapping rows in or out with no transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "feedback_message_transition"
description = "Validation errors and confirmation messages appear with a brief fade or slide transition rather than popping in with no motion"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.3"
name = "missing_or_snapping_microinteractions"
description = "Required boot, output, skill-bar, window, canvas, or hover feedback snaps with no perceptible transition, or one of the specified pointer targets remains visually inert"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.9"
name = "motion_blocks_interaction"
description = "An animation traps input, obscures terminal controls after completion, causes a major layout jump, or continues intensely under reduced-motion preference"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.12"
name = "palette_and_export_motion"
description = "Via the real UI path, the command palette opens/closes with a brief opacity or scale transition, and Export Copy shows a short confirmation transition before resetting."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "archive_board_row_exit"
description = "Archiving a selected project through the visible bulk or per-project control animates its card/row out of the Projects Board rather than snapping it away with no transition."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n2"
name = "palette_or_export_snaps"
description = "The command palette or export confirmation snaps with no perceptible transition when opened or confirmed via the real UI path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence that demonstrates it. If the defect is already covered even partially by another criterion, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
