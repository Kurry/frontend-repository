[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "9.1"
name = "cold_start_interactive_under_two_seconds"
description = "On a local cold load, the app becomes interactive within 2 seconds and the boot animation starts promptly."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_across_shell_flows"
description = "No console errors or warnings appear during boot, command entry, project CRUD, theme switching, mode switching, or easter eggs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "theme_and_mode_transitions_snappy"
description = "Theme switches via /dark /light /retro /glass and mode toggles between Terminal CLI and Projects Board respond without multi-second UI lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "thinking_indicator_before_command_output"
description = "Section commands show a CLI thinking indicator during the short wait before staggered output, rather than freezing the shell with a blank body."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_board_and_work_scroll_smooth"
description = "With the seeded project collection (at least six case studies), /work listing and Projects Board scrolling/filtering feel responsive without perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_command_output"
description = "While staggered command output is revealing, the command input remains focusable and the shell does not freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "matrix_rain_smooth_with_responsive_input"
description = "While /matrix rain is animating, the canvas motion stays visually smooth and the command input remains responsive to typing."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_commands_stay_responsive"
description = "Rapid repeated command entry stays responsive with no hangs, dropped keystrokes, or frozen output."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "matrix_work_stops_on_clear_or_dismiss"
description = "Running /clear or dismissing the matrix effect stops its ongoing animation work so the shell remains light afterward."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "boot_visible_immediately_on_load"
description = "On cold load the boot sequence is visible promptly rather than a prolonged blank wallpaper with no terminal chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the app is interactive on a local cold load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_shell_flows"
description = "Console errors or warnings appear during boot, command entry, CRUD, theme/mode switching, or easter eggs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "theme_or_mode_transition_lags"
description = "Theme or mode transitions visibly block or lag for a prolonged period before the UI settles."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "command_output_hangs_shell"
description = "A section command causes the terminal UI to hang or freeze until the output finishes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "seeded_collection_kills_frame_rate"
description = "Scrolling or filtering the seeded Projects Board visibly kills frame rate or stalls input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "matrix_blocks_command_input"
description = "While matrix-rain is animating, the command input becomes unresponsive to keystrokes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "blank_screen_while_booting"
description = "Cold load shows a prolonged blank screen with no boot lines or terminal chrome before interaction is possible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "matrix_keeps_running_after_clear"
description = "After /clear or an explicit dismiss, the matrix-rain canvas keeps consuming animation work in the background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_blank_during_commands"
description = "During command resolution the terminal body stays completely blank with no thinking indicator and no prior context."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_commands_crash_or_freeze"
description = "Rapid repeated command entry crashes the page or freezes the output buffer."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.11"
name = "export_recompile_stays_responsive"
description = "After a project create, delete, or archive, the export preview recompiles promptly with no multi-second freeze of the shell or command input."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.12"
name = "rapid_undo_redo_responsive"
description = "Rapid repeated undo/redo stays responsive with no hangs, dropped keystrokes, or frozen board/export surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n11"
name = "export_or_undo_freezes_shell"
description = "Export recompile or undo/redo freezes the terminal UI for a prolonged period or drops subsequent keystrokes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
