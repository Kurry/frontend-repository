[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "3.1"
name = "terminal_spacing_matches_reference_rhythm"
description = "At desktop width, spacing between titlebar, ASCII art, welcome box columns, and the command prompt follows a consistent terminal rhythm matching the reference screenshots rather than arbitrary one-off gaps."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "jetbrains_mono_throughout"
description = "Typography uses JetBrains Mono monospace throughout the terminal chrome and output, matching the spec rather than a mixed proportional stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px, the full-bleed wallpaper with a centered macOS-chrome terminal titled designer@portfolio ~ /portfolio matches the reference overview composition within a small tolerance."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Specified state changes animate via the real UI path: boot line reveals, staggered command output, /skills bars filling, and board card enter/exit on create/delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_stack_matches_spec"
description = "At ≤768px the terminal expands toward full width and the welcome box stacks to one column as specified, matching the reference's narrow-width behavior."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "material_chrome_fits_terminal"
description = "Buttons, overlays, snackbars/tooltips, and dense board controls share one consistent treatment that fits the terminal chrome rather than reading as a separate default-browser kit."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "output_hierarchy_clear"
description = "Command output shows clear hierarchy among echoed prompt lines, section headings, skill bars, award/testimonial rows, and project detail blocks with tag and stat chips."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "hover_states_match_spec"
description = "Via real pointer hover, titlebar dots ease opacity, project cards/rows ease border-color and background, autocomplete rows highlight, and social/close buttons ease — matching the specified hover language."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "theme_surfaces_match_variants"
description = "Dark (default), light, retro CRT, and glass theme surfaces show precise color/depth/border treatments distinct from each other per the design."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_duration"
description = "Hover and press microinteractions on titlebar dots, board rows, and autocomplete suggestions use short ease transitions rather than instant snaps or multi-second delays."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_terminal_rhythm"
description = "Visible major gaps in the terminal layout contradict a consistent spacing rhythm (arbitrary large empty regions or cramped collisions between ASCII art and the welcome box)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_theme_system"
description = "Surfaces use colors unrelated to the dark/light/retro/glass theme system (random accents that break the terminal palette)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "titlebar_or_window_sizing_mismatch"
description = "Titlebar traffic lights or terminal window sizing visibly mismatch the macOS-chrome reference proportions at 1440px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing"
description = "Boot line reveals, staggered command output, skill-bar fills, or board card enter/exit animations are missing where the spec requires them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Banner buttons, overlay CTAs, or board filters render as unstyled browser-default controls when the terminal chrome styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "welcome_or_board_misaligned"
description = "At 1440px the two-column welcome box or Projects Board cards are misaligned relative to the reference terminal body."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "ascii_or_output_clipped"
description = "ASCII name art, welcome-box columns, or command output render clipped or off-screen at desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "composition_deviates_from_reference"
description = "The first viewport reads as a multi-section marketing landing rather than one terminal-over-wallpaper composition matching the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_heading_body_distinction_in_output"
description = "Section headings and body lines in command output have no visual distinction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "hover_microinteractions_missing"
description = "Titlebar dots, project cards/rows, autocomplete rows, or social/close buttons show no hover transition via the real pointer path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_archive_palette_match_spec"
description = "Export two-tab preview, archive vault rows with Restore, and the command palette overlay match the specified terminal-chrome treatments rather than unrelated modal styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "board_bulk_and_stats_match_spec"
description = "Projects Board selection checkboxes, bulk actions bar, and stats strip follow the dense terminal board pattern described in the spec and reference composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "hardened_surfaces_missing_from_spec"
description = "Export center, archive vault, command palette, or bulk board chrome is missing or visually contradicts the specified terminal portfolio structure."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
