[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "coachmark_first_run_tip"
description = "Beyond the specified flows, the workspace offers a tasteful coachmark or first-run tip pointing at palette drag, Run, and Artifact export without blocking interaction, and it dismisses permanently for the session once acknowledged"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "minimap_or_fit_to_view"
description = "Optional excellence: a compact minimap or fit-to-view control helps reorient a large graph without replacing pan and zoom"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "execution_craft_beyond_baseline"
description = "Execution quality beyond the baseline: run progression, retry countdown, and artifact live-compile feel polished and intentional rather than abrupt stubs"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "thoughtful_empty_and_validity_ux"
description = "Empty-canvas and incomplete-graph validity messaging goes beyond a bare error — clear next-step guidance that still matches the specification"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "keyboard_power_user_affordances"
description = "Power-user keyboard affordances (documented shortcuts for undo/redo, artifact toggle, or multi-select) that remain optional and never replace pointer paths"
type = "binary"
weight = 0.5


[[criterion]]
id = "11.n1"
name = "blocking_coachmark_traps_user"
description = "A first-run tip or coachmark overlays the canvas in a way that traps focus or blocks Run, palette drag, or Artifact export with no dismiss control."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a significant, browser-observable excellence or inventive refinement beyond the specification that is NOT covered by any other criterion in this file and would delight a real workflow author. Name the refinement and cite concrete evidence. Do not fail ordinary compliance gaps here — those belong in other dimensions."
type = "binary"
weight = 0.5
