[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Every interactive control — palette entries, toolbar buttons including Undo, Redo, Artifact, Delete selected, Run/Pause/Resume/Retry/Save, node disclosures, timeline filters and entries, modal fields, panel toggles, artifact format tabs, Copy, Download, and Import — is reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Modal dialogs (configuration, save, confirmation, import) use role dialog with aria-modal true, trap focus while open, close on Escape, and return focus to the originating control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Toolbar and status icons that convey meaning expose descriptive accessible names (aria-label or equivalent); purely decorative icons are hidden from the accessibility tree"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Validation errors, run state transitions (started, retrying, failed, complete), copy confirmation, and import validation failures are conveyed both visually and via an aria-live region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "form_fields_labeled"
description = "Every configuration, save, and import field has an explicit associated label; validation messages are associated with their fields and name the field key"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "heading_and_landmark_structure"
description = "Panel titles (Palette, Saved Workflows, Timeline, Artifact) and main regions use a logical heading order and landmark roles so the workspace is navigable by structure"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "keyboard_node_first_class"
description = "Node selection can be cycled from the keyboard with a visible highlight; Enter opens the selected node's configuration; Delete removes the selected node, edge, or multi-selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "status_not_color_alone"
description = "Every status badge and the graph-validity badge carries a text label; status is never conveyed by color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "focus_indicators_visible"
description = "Focused controls show a visible focus ring that is not obscured by overlapping chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_still_operable"
description = "With prefers-reduced-motion set, all flows — run, undo, import, export — remain completable with keyboard and pointer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Primary controls (Run, Artifact, Undo, configuration Save, Import) cannot be activated or reached via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing"
description = "Interactive controls have no visible focus indicator when focused via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "modals_lose_focus_trap"
description = "While a configuration, save, confirmation, or import modal is open, Tab moves focus to controls behind the dialog, or Escape leaves the dialog open"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "status_color_only_a11y"
description = "Status or validity is shown only as a color swatch with no text alternative"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "errors_visual_only"
description = "Validation or import errors appear visually only with no aria-live announcement and no field association"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility barrier that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
