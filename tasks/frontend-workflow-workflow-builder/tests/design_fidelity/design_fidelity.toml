[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_rhythm_consistent"
description = "Spacing between palette, canvas, toolbar, Artifact panel, Saved Workflows, and timeline follows a consistent rhythm with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_hierarchy_matches_spec"
description = "Typography matches the specified hierarchy: panel titles larger than node titles, which are larger than metadata and monospaced artifact text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_instruction_composition"
description = "Layout matches the instruction composition: left palette, central canvas, collapsible right Saved Workflows, toolbar above, Artifact when open, timeline below — not a collapsed single-column dump at desktop width"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the spec calls out (node drop, run pulse, modal enter/exit, panel slide, copy confirmation) rather than omitting them"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "node_type_colors_match_spec"
description = "Node left-border colors match the specified mapping: blue Prompt, purple Agent, orange Eval, yellow Condition, green Output, including palette entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "status_palette_matches_spec"
description = "Status badge colors match the specified palette: pending gray, running blue, retrying amber, failed red, complete green"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "artifact_monospace_distinct"
description = "The Artifact preview monospaced block is visually distinct from the canvas chrome as specified"
type = "binary"
weight = 1.0

