[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "dot_grid_canvas_background"
description = "The canvas background shows a light gray dot-grid pattern visually distinct from the surrounding panel chrome, and node tiles carry a colored left border per type — blue Prompt, purple Agent, orange Eval, yellow Condition, green Output — with the palette entries using the same per-type color coding"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "edge_styling_and_selection"
description = "Edges render as smooth bezier curves in a mid gray, and a selected edge renders in the primary accent blue, visibly distinct from unselected edges"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "status_badge_palette_consistent"
description = "Status badges use one consistent palette everywhere (canvas nodes, timeline, rollup): pending neutral gray, running blue with an active indicator, retrying amber, failed red, complete green — every badge naming its state in text, never color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "workspace_layout_composition"
description = "The layout composes as left palette, central canvas, collapsible Saved Workflows panel, toolbar with Run/Pause/Resume/Retry/Undo/Redo/Save/Artifact/Delete selected (when multi-select active)/rollup, Artifact panel with format tabs and Copy/Download/Import when open, and timeline below; one consistent icon set and clear type hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "component_states_styled"
description = "Buttons, selects, and inputs show distinct default, hover, focus (visible ring), disabled, and error treatments, with no bare browser-default-styled controls anywhere"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "multi_select_and_validity_chrome"
description = "Multi-selected nodes share a distinct selection chrome stronger than single-select; the Artifact preview uses a monospaced block; the graph-validity badge uses valid (green-tinted) vs incomplete (amber-tinted) treatments and always includes a text label"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "responsive_panels_collapse"
description = "At 1024 pixels the Saved Workflows panel collapses behind a toggle, at 768 pixels the palette collapses and Artifact stacks below the canvas when open with timeline still reachable, and at 375 pixels no content clips or overflows and no page-level horizontal scrollbar appears while the canvas remains pannable"
type = "binary"
weight = 1.0

