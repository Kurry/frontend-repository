[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from seed: add a node, save a configuration, save a named workflow, open Artifact, run once, undo once, then reload. Confirm every facet coherently resets — seeded 5-node graph, empty timeline, no saved-run state, empty undo/redo, artifact previews matching the seed — never a partial mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "timeline_filter_reversal_proves_live"
description = "Filter-reversal proof: after a run with mixed statuses, filter timeline to failed (narrowed list), then clear/all — the full ordered log returns with the same entries, proving the filter derives from live timeline data rather than two hardcoded lists"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "config_edit_derived_artifact_sensitivity"
description = "Derived-view sensitivity: change an Agent timeout_seconds or a node title and confirm both Workflow Definition JSON and Mermaid previews change meaningfully to include the new values rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "config_echoes_badge_and_export"
description = "Cross-view echo: save a distinctive Prompt configuration; confirm the canvas configuration badge and the JSON config.prompt field both show that same prompt name without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "palette_drop_count_delta_exact"
description = "Count-delta integrity: measure visible node count, drop one palette node, re-measure immediately — count increases by exactly one; JSON nodes array length matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_timeouts_different_export"
description = "Input-dependent output: set Agent timeout_seconds to 5 and note JSON; set it to 120; confirm the two JSON exports differ in timeout_seconds exactly as the inputs dictate"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_run_and_export_flows"
description = "Interleaved-flow integrity: start a run, pause mid-run, open Artifact and confirm JSON still lists all nodes, resume to completion; confirm rollup reaches n of m complete and artifact preview was never wiped by the pause"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_canvas_then_reseed_via_import"
description = "Edge-state round-trip: delete all nodes (empty-canvas run message and artifact empty-state visible), Import a previously exported valid Workflow Definition JSON; confirm nodes/edges return and both artifact formats match the import"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "import_export_round_trip_probe"
description = "Export Workflow Definition JSON after distinctive title and timeout_seconds edits, delete nodes so the canvas differs, Import that JSON, and confirm canvas, badges, validity badge, and both artifact formats reconstruct the exported values without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_restores_then_redo_reapplies"
description = "Delete a node so JSON omits it, Undo once and confirm the node and JSON entry return together, then Redo and confirm they disappear again across canvas and artifact"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "schema_field_contract_round_trip"
description = "Set distinctive valid contract values (title, timeout_seconds within 1–300, prompt/agent/rubric from seeds), export JSON, clear canvas, Import: confirm those exact field keys and values reappear in configuration modals and JSON preview"
type = "binary"
weight = 1.0

