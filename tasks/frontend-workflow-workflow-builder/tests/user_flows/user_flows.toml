[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "author_connect_run_updates_artifacts"
description = "Author then run: drag a Prompt node from the palette, connect it with a compatible edge, press Run — the new node advances pending→running→complete in topological order, the rollup counts it, and both Workflow Definition JSON and Mermaid previews include the new node and edge"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "seeded_agent_retry_recovers"
description = "Watch a failure recover: press Run and observe the seeded Agent node retry with attempt counter and backoff countdown, succeed on the third attempt; the timeline shows retry-scheduled entries and the run finishes complete"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "retry_from_failed_preserves_upstream"
description = "After driving a run to a failed state (exhausted retries), Retry from failed node resumes at that node while upstream nodes keep frozen outputs, timestamps, and complete badges"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "pause_resume_mid_run"
description = "Pause mid-run freezes progression and the rollup; Resume continues from exactly the next node with completed nodes untouched"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "save_load_reload_round_trip"
description = "Save the canvas under a new name, load a different saved workflow through confirmation, then load the first back — canvas nodes/edges and artifact previews match the saved graph each time"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "export_import_round_trip_flow"
description = "Configure a distinctive node title and Agent timeout_seconds, export Workflow Definition JSON, alter the canvas, Import the JSON — canvas, badges, validity badge, and both artifact formats reconstruct the exported graph without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "undo_redo_flow"
description = "After a delete or configuration save that changes the artifact preview, Undo restores prior canvas and both preview texts together; Redo reapplies across those surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "bulk_delete_then_undo_flow"
description = "Multi-select two nodes, Delete selected (both nodes and edges gone; JSON omits them), Undo once — both nodes and edges return together"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "reload_returns_seeded_baseline_flow"
description = "A page reload returns seeded example workflow, empty timeline, no saved-run state, empty undo/redo stacks, and artifact previews matching the seeded graph"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "artifact_panel_toggle_preserves_canvas"
description = "Opening and closing the Artifact panel via the toolbar toggle keeps the canvas graph and run state intact; format tab switches between JSON and Mermaid without losing preview content"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_authoring_flows_unavailable"
description = "Palette drop, edge connect, Run, Save/load, or Artifact export/import are not enabled from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_nodes_missing_from_export"
description = "A newly authored node appears on the canvas but is missing from the Workflow Definition JSON and Mermaid previews"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "run_and_artifact_desync"
description = "After a run or configuration save, canvas badges, rollup, and artifact previews disagree about the same graph state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "import_fails_silently"
description = "Import of valid Workflow Definition JSON leaves the canvas unchanged with no success feedback and no validation message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_canvas_breaks_artifact_ui"
description = "Clearing every node leaves the Artifact panel crashed, blank without an empty-state explanation, or throwing console errors"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "undo_breaks_subsequent_run"
description = "After Undo restores a deleted node, pressing Run fails to execute or leaves badges stuck"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_panels_cannot_reopen"
description = "Collapsed Saved Workflows or Artifact chrome cannot be re-opened from the toolbar toggle"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Configuration, save, confirmation, or import overlays block the canvas with no Escape/close exit"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_run_lacks_feedback"
description = "A failed run (exhausted retries) provides no failed badge, no rollup failure count change, and no timeline failure entry"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "export_import_dead_end"
description = "Export/import round-trip requires a full page reload to see reconstructed nodes, or leaves the user with no recovery path after a failed import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
