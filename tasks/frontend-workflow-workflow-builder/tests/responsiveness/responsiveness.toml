[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_layout_all_panels"
description = "At desktop widths (≥1280px) the palette, canvas, Saved Workflows side panel, toolbar, and timeline are all visible without horizontal page scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "collapse_at_1024"
description = "At 1024 pixels and below the Saved Workflows panel collapses behind a toggle that can reopen it"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "collapse_at_768_artifact_stacks"
description = "At 768 pixels and below the palette collapses to a compact strip or toggle, the Artifact panel stacks below the canvas when open, and the timeline remains reachable below the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_375_no_clip"
description = "At 375 pixels wide no content clips or overflows the viewport and no page-level horizontal scrollbar appears; the canvas remains pannable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "toolbar_wraps_primary_actions"
description = "At 375 pixels toolbar controls wrap or overflow into a compact menu without clipping primary Run and Artifact actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "tap_targets_mobile"
description = "UI controls remain usable tap targets on mobile widths (approximately 44px where interactive)"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "artifact_preview_scrolls"
description = "At narrow widths the Artifact monospaced preview scrolls within its panel rather than forcing page-level horizontal overflow"
type = "binary"
weight = 1.0

