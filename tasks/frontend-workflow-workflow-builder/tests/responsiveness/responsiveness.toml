[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_layout_all_panels"
description = "At desktop widths (≥1280px) the palette, canvas, Saved Workflows side panel, toolbar, and timeline are all visible without horizontal page scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "collapse_at_1024"
description = "At 1024 pixels and below the Saved Workflows panel collapses behind a toggle that can reopen it"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "collapse_at_768_artifact_stacks"
description = "At 768 pixels and below the palette collapses to a compact strip or toggle, the Artifact panel stacks below the canvas when open, and the timeline remains reachable below the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "mobile_375_no_clip"
description = "At 375 pixels wide no content clips or overflows the viewport and no page-level horizontal scrollbar appears; the canvas remains pannable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "toolbar_wraps_primary_actions"
description = "At 375 pixels toolbar controls wrap or overflow into a compact menu without clipping primary Run and Artifact actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "tap_targets_mobile"
description = "UI controls remain usable tap targets on mobile widths (approximately 44px where interactive)"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "artifact_preview_scrolls"
description = "At narrow widths the Artifact monospaced preview scrolls within its panel rather than forcing page-level horizontal overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "375_horizontal_scrollbar"
description = "At 375px a page-level horizontal scrollbar appears or content is clipped off-screen"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "panels_unusable_at_768"
description = "At 768px the palette, Artifact, or timeline cannot be reached after collapse"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "desktop_overlap_at_1440"
description = "At 1440px panels overlap so node titles or toolbar labels become unreadable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable responsiveness defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
