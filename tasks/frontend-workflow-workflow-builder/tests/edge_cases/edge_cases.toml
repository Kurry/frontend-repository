[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_canvas_run_message"
description = "Pressing Run with an empty canvas (all nodes deleted) shows a visible message that there is nothing to run and starts no execution"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "delete_node_removes_edges"
description = "Deleting a node that has edges removes those edges in the same interaction; the edge count visibly drops"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "run_pause_resume_availability"
description = "The Run control is disabled while a run is already in progress; Pause is only available during a run and Resume only while paused"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "save_empty_name_validation"
description = "Saving a workflow with an empty name shows an inline validation message naming the name field and stores nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "timeline_entry_deleted_node_inert"
description = "Selecting a timeline entry whose node was deleted after the run shows the entry as inert (no crash, no dangling highlight)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_redo_empty_stacks_disabled"
description = "Undo with an empty stack and Redo with an empty redo stack are disabled and produce no console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "import_malformed_rejects"
description = "Import with malformed JSON or a payload missing required keys shows an inline message naming the problem and leaves the canvas unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "artifact_empty_canvas_state"
description = "Opening the Artifact panel with an empty canvas shows an empty-state line naming how to add nodes from the palette (or disables Download with a visible reason) — never a blank crash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "copy_exports_visible_text"
description = "Copying the export mid-edit copies exactly the text currently visible in the preview block"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "timeout_out_of_bounds_named"
description = "Entering timeout_seconds outside 1–300 on an Agent node shows an inline message naming timeout_seconds and keeps Save disabled"
type = "binary"
weight = 1.0

