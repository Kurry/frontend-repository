[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_canvas_run_message"
description = "Pressing Run with an empty canvas (all nodes deleted) shows a visible message that there is nothing to run and starts no execution"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "delete_node_removes_edges"
description = "Deleting a node that has edges removes those edges in the same interaction; the edge count visibly drops"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "run_pause_resume_availability"
description = "The Run control is disabled while a run is already in progress; Pause is only available during a run and Resume only while paused"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "save_empty_name_validation"
description = "Saving a workflow with an empty name shows an inline validation message naming the name field and stores nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "timeline_entry_deleted_node_inert"
description = "Selecting a timeline entry whose node was deleted after the run shows the entry as inert (no crash, no dangling highlight)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_redo_empty_stacks_disabled"
description = "Undo with an empty stack and Redo with an empty redo stack are disabled and produce no console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "import_malformed_rejects"
description = "Import with malformed JSON or a payload missing required keys shows an inline message naming the problem and leaves the canvas unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "artifact_empty_canvas_state"
description = "Opening the Artifact panel with an empty canvas shows an empty-state line naming how to add nodes from the palette (or disables Download with a visible reason) — never a blank crash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "copy_exports_visible_text"
description = "Copying the export mid-edit copies exactly the text currently visible in the preview block"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "timeout_out_of_bounds_named"
description = "Entering timeout_seconds outside 1–300 on an Agent node shows an inline message naming timeout_seconds and keeps Save disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "double_run_starts_two_executions"
description = "Double-activating Run starts two overlapping executions with duplicate rollup sequences or interleaved timeline chaos"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "import_accepts_invalid_type_enum"
description = "Import accepts a node type outside prompt|agent|eval|condition|output and still mutates the canvas"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "empty_name_silently_saves"
description = "Saving with an empty workflow name stores an entry in Saved Workflows with no validation feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "pause_available_when_idle"
description = "Pause is clickable and appears active while no run is in progress"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "delete_leaves_orphan_edges"
description = "Deleting a connected node leaves orphan edges pointing at missing nodes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "validation_says_only_invalid"
description = "Configuration or import validation shows only a generic Invalid message with no field name"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "undo_during_run_scrambles_badges"
description = "Activating Undo during an in-progress run rewinds execution badges or scrambles the rollup"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "multi_select_delete_noops"
description = "Delete selected with two nodes multi-selected leaves both nodes on the canvas"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable edge-case or recovery defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
