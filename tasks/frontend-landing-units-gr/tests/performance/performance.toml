[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_interactive_under_2s"
description = "The homepage is interactive within 2 seconds of a local cold load, with the documented 0.2s reveal gate and intro timeline the only intentional delays."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load_and_exercise"
description = "No console errors, warnings, or hydration mismatch warnings appear on load or during a full exercise of the page — menu, carousel, consent banner, shortlist, booking inquiry/export, FAQ, command palette, hover, and full-page scroll included — on the root route."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "chrome_responds_without_multi_second_lag"
description = "Hamburger, carousel next/previous, and consent buttons respond without multi-second lag after first paint (chrome interactions feel under ~100ms once the intro has settled)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "long_page_scroll_without_lag"
description = "Scrolling the full long-form homepage (hero through footer) remains usable without perceived multi-second freezes between sections."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_menu_and_carousel"
description = "The UI remains interactive during menu open/close and living carousel paging (controls stay clickable)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "scroll_marquees_cursor_hold_frame_rate"
description = "After the intro settles, continuous scrolling from top to bottom holds a smooth frame rate through marquees, cursor motion, and scroll reveals with no visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_carousel_clicks_never_freeze"
description = "Rapidly clicking the living carousel next control several times never freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_scroll_session_stable"
description = "After an extended scroll-through with menu open/close and carousel paging, the page remains responsive without runaway resource use that freezes interaction."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "deep_link_root_matches_settled_page"
description = "Loading the root URL directly renders the same settled page as any in-page interaction path, with no content flash beyond the documented opacity gate."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a1"
name = "scroll_linked_animation_frame_rate"
description = "Scroll-linked section reveals and continuous marquee motion hold a smooth frame rate through the full page length on a 1440-wide viewport with no visible hitching during continuous scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a2"
name = "smooth_scroll_feels_continuous"
description = "Continuous page scrolling feels smooth with natural inertial settle; scroll-triggered section reveals stay synced with the live scroll position during that continuous scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a4"
name = "layout_stable_after_load"
description = "After first paint, media regions hold their space so fonts and images finishing load cause no visible layout jumps; the hero photograph (about 1253x850 at 1440px) is the LCP image."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.a6"
name = "fonts_swap_and_motion_after_paint"
description = "Fonts are self-hosted and load with font-display swap; client motion scripts attach after first paint without blocking navigation chrome beyond the documented opacity gate."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "inquiry_export_never_freezes"
description = "Opening the booking inquiry overlay and exporting a JSON or Markdown packet never freezes the page or blocks interaction for multiple seconds."
type = "binary"
weight = 1.0

