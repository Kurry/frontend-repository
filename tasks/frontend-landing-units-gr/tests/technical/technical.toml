[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "te-noerror"
name = "te-noerror"
description = "The homepage loads and runs (including the carousel, hamburger menu, and scroll interactions) with no uncaught console errors and no failed asset requests"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-sameorigin"
name = "te-sameorigin"
description = "Every request the page makes is same-origin or a data:/about: URL, with no external font, image, video, CSS, or JavaScript CDN request"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-nostorage"
name = "te-nostorage"
description = "After exercising the carousel, the hamburger menu, and the cookie banner, localStorage and sessionStorage remain empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-semantics"
name = "te-semantics"
description = "The page uses header, navigation, main, footer, heading, link, and button semantics with useful accessible names on controls that are keyboard reachable"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "te-nooverflow"
name = "te-nooverflow"
description = "At the desktop, tablet (~768px), and mobile (~390px) widths there is no unintended horizontal page overflow (scrollWidth minus clientWidth stays within 2px at scroll origin)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "te-neg-storage"
name = "te-neg-storage"
description = "localStorage or sessionStorage is populated after interacting with the page (menu or consent state persisted to browser storage)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "te-neg-external"
name = "te-neg-external"
description = "The page issues a request to an external origin (a units.gr asset, a font/image/script CDN, or an analytics endpoint)"
type = "binary"
weight = 1.0
negate = true
