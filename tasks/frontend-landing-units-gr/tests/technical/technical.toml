[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "te-noerror"
name = "console_clean_during_exercise"
description = "The homepage loads and runs (including the carousel, hamburger menu, consent banner, shortlist, booking inquiry/export, FAQ, command palette, hover, and full-page scroll) with no uncaught console errors or warnings and no failed asset requests"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-sameorigin"
name = "all_requests_same_origin"
description = "Every request the page makes is same-origin or a data:/about: URL, with no external font, image, video, CSS, or JavaScript CDN request"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-nostorage"
name = "browser_storage_stays_empty"
description = "After exercising the carousel, the hamburger menu, the cookie banner, shortlist toggles, booking inquiry, export/import, FAQ, and command palette, localStorage and sessionStorage remain empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-semantics"
name = "semantic_landmarks_and_names"
description = "The page uses semantic HTML landmarks first — header, navigation, main, and footer are present — with heading order that does not skip levels from the hero H1, and useful accessible names on controls that are keyboard reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-nooverflow"
name = "no_horizontal_overflow_any_breakpoint"
description = "At the desktop, tablet (~768px), and mobile (~390px) widths there is no unintended horizontal page overflow (scrollWidth minus clientWidth stays within 2px at scroll origin)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "te-interactive2s"
name = "interactive_within_two_seconds"
description = "The homepage is interactive within 2 seconds of a local cold load, with the documented 0.2s reveal gate and intro timeline the only intentional delays"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-keyboard"
name = "keyboard_operates_all_controls"
description = "The hamburger, the menu overlay's links and close control, the carousel next/previous controls, the consent banner's Αποδοχή / Απόρριψη buttons, and the footer links are all reachable and operable with the keyboard alone, with a visible focus indicator on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-langalt"
name = "lang_el_and_descriptive_alt_text"
description = "The document declares html lang \"el\", and every placeholder photograph and icon image carries descriptive alt text (or empty alt when purely decorative)"
type = "binary"
weight = 0.5

[[criterion]]
id = "te-hydration"
name = "hydration_clean_console"
description = "No hydration mismatch errors or warnings appear in the console on first load of the root route or after exercising the page's interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-deeplink"
name = "direct_root_load_matches_settled_page"
description = "Loading the root URL directly renders the same settled page as any in-page interaction path, with no content flash beyond the documented 0.2s opacity gate and no half-rendered shell"
type = "binary"
weight = 0.5

[[criterion]]
id = "te-stablescroll"
name = "no_layout_shift_smooth_animations"
description = "After first paint, media regions hold their space so fonts and images finishing load cause no visible layout jumps; after the intro settles, continuous scrolling from top to bottom holds a smooth frame rate through marquees, cursor motion, and scroll reveals with no visible hitching"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-touchscroll"
name = "native_touch_scroll_below_1024"
description = "At a viewport below 1024px, touch or trackpad scrolling still moves the page with native-feeling physics (no trapped hijacked scroll), and the mobile bar plus hamburger remain usable while scrolling"
type = "binary"
weight = 0.5

[[criterion]]
id = "te-authored-assets-load"
name = "required_authored_asset_files_load"
description = "Browser network/render evidence shows every required Noma image, map, SVG/icon, animation JSON plus fallback, and cursor asset loading from same-origin paths with no 404, transparent/broken response, image decode, or vector-animation parse failure"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-shared-store-coherence"
name = "shortlist_inquiry_export_store_coherence"
description = "Shared-state coherence: toggling a studio onto the shortlist is immediately reflected in the shortlist drawer and Monthly estimate, and a subsequent inquiry Export JSON includes that same shortlist under shortlist[].tier / monthly_rent_eur with monthly_estimate_eur matching the sum, without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "te-export-schema-keys-present"
name = "export_json_has_inquiry_schema_keys"
description = "After a valid inquiry submit, inspecting the Export JSON (download or Copy packet text) shows top-level keys inquiry, shortlist, and monthly_estimate_eur, and inquiry includes full_name, email, phone, studio_tier, move_in_month, message, privacy_consent, and submitted"
type = "binary"
weight = 1.0

