[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "mobile_menu_opens_with_four_nav_links"
description = "At 390px width: tapping the hamburger opens the full-screen menu overlay with all four numbered nav links visible (01 Student Homes, 02 Our way of living, 03 Community, 04 Επικοινωνία) and the body gains its menu-open state while the page behind stops scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "mobile_menu_close_restores_scroll_position"
description = "At 390px width with the menu open: activating the close control fades the overlay out, removes the menu-open state, and the underlying scroll position is exactly where it was — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "carousel_next_advances_one_slide"
description = "On the living section: clicking the next control once advances the carousel by exactly one slide — the visible slide title changes from Community living spaces to Ασφάλεια and its amenity list swaps accordingly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "carousel_previous_returns_first_slide"
description = "After advancing one slide on the living carousel: clicking the previous control returns to the first slide with title Community living spaces and its original amenity list intact."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "carousel_resets_to_first_on_reload"
description = "After advancing the living carousel away from slide one, a full page reload returns the carousel to its first slide (Community living spaces), proving carousel position was session state only."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "consent_banner_appears_after_load"
description = "Shortly after a fresh load the cookie consent banner is visible with copy Χρησιμοποιούμε cookies and Αποδοχή / Απόρριψη buttons."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "consent_dismiss_preserves_page_state"
description = "After scrolling and advancing the living carousel one slide: clicking Αποδοχή (or Απόρριψη) removes the consent banner while scroll position and the open carousel slide remain unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "consent_reappears_after_reload"
description = "After dismissing the consent banner, a full page reload returns the app to its seeded baseline: the intro plays again, the carousel shows slide one, and the consent banner reappears because dismissal was held only in memory."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "sidebar_nav_scrolls_in_page"
description = "At 1440px: activating a numbered sidebar nav item (e.g. 01 Student Homes or 03 Community) smoothly scrolls within the same homepage document to the matching section without leaving the root route."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "book_cta_scrolls_or_noops_on_homepage"
description = "Activating a Book your Studio CTA from the sidebar or hero opens the booking inquiry overlay on this homepage — it never navigates to another route or external origin."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "shortlist_flow_count_and_estimate"
description = "Shortlist flow: toggle Kick then Boost onto the shortlist; badge count becomes 2, the drawer lists both tiers with exact rents, and Monthly estimate reads 1330€."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "shortlist_undo_then_redo"
description = "After Kick and Boost are shortlisted, Undo once drops Boost and the estimate to 640€; Redo restores Boost and 1330€ without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "booking_submit_export_flow"
description = "Booking and export flow: open Book your Studio, submit a valid create-inquiry body (full_name ≥2 chars, valid email, phone ≥10 digits, studio_tier Flex, move_in_month YYYY-MM current-or-future, privacy_consent checked); success shows Inquiry ready — export your packet; Export JSON has inquiry.studio_tier Flex, matching inquiry.full_name, and monthly_estimate_eur consistent with the shortlist; Copy packet shows a Copied confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "import_round_trip_restores_session"
description = "Import round-trip: with a non-empty shortlist and filled inquiry, Export JSON, clear shortlist and reset the form, then Import packet; shortlist selections, Monthly estimate, and inquiry fields match the exported session again."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "faq_accordion_exclusive_expand"
description = "FAQ flow: open Τι περιλαμβάνει το ενοίκιο; then open Πότε μπορώ να κλείσω studio; — the first collapses and the second expands."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "command_palette_flow"
description = "Command palette flow: press Cmd+K or Ctrl+K, choose typical-unit, confirm scroll to typical-studio and palette close; open again and Escape dismisses without navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "schema_rejection_flow_per_field"
description = "Schema rejection flow: submit once with empty full_name, once with email not-an-email, once with phone 123, once with move_in_month 13/2026, and once with privacy unchecked — each attempt keeps the overlay open, shows an inline error naming that field, and never shows Inquiry ready — export your packet or export controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "schema_invalid_import_rejected_flow"
description = "After a valid session exists, importing a JSON object that drops email or sets studio_tier to Ultra shows a visible import error and leaves the prior shortlist and inquiry fields unchanged."
type = "binary"
weight = 1.0

