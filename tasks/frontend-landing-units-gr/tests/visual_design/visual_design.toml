[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "vd-canvas"
name = "warm_canvas_exact_hex"
description = "The body background computes to exactly #f4e9e1 (rgb(244, 233, 225)) with black body text rgb(0, 0, 0)"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-bands"
name = "brand_band_exact_colors"
description = "The full-bleed brand bands render with their exact computed colors: the red marquee at rgb(234, 55, 55), the blue marquee at rgb(0, 114, 227), and the orange Book band at rgb(255, 92, 56)"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-type"
name = "display_type_scale_open_license"
description = "At the 1440px desktop viewport the hero H1 renders at 72px font-size / 72px line-height in a heavy open-license display face (weight 850) with color rgb(255, 255, 255), clearly distinct from the open-license body face used for long-form copy (body copy about 15px / 18px at weight 400)"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-shell"
name = "sidebar_shell_and_mobile_collapse"
description = "On desktop the composition is an asymmetric shell: a fixed left sidebar of numbered colored nav cards (about 122px wide) sits beside a right-offset main column whose left margin is about 167px at 1440px width, and below 1024px the layout collapses to a single stacked column (main left margin 0) with a mobile bar and hamburger"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-cards"
name = "rounded_cards_and_pill_chips"
description = "Content cards use rounded corners (border radius about 37.5px at 1440px, 30px at <=1023px) with hairline black borders and pill-shaped labels/chips (transparent fill, 1px solid rgb(0, 0, 0) border, 100px radius)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "vd-order"
name = "section_rhythm_in_order"
description = "Sections appear in order: hero, locations, red marquee, living, blue marquee, typical-unit, community, blue arrows-header, what-we-stand-for, insta-feed, orange arrows-header, footer"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "vd-neg-canvas"
name = "canvas_color_wrong"
description = "The body background is not #f4e9e1 / rgb(244, 233, 225) (for example a plain white or gray canvas)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "vd-neg-flat"
name = "bands_flat_or_off_palette"
description = "The marquee and arrows-header bands are not full-bleed colored bands, or the brand palette is rendered flat/monochrome instead of the documented brand hexes"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "vd-cardsurfaces"
name = "info_card_and_tile_exact_hexes"
description = "The colored surfaces measure their exact brand hexes: the locations info card is yellow rgb(255, 178, 0), the community info card is red rgb(234, 55, 55), the Stories panel is purple rgb(171, 84, 247), the what-we-stand-for cards are blue rgb(0, 114, 227), and the three social-feed tiles are rgb(199, 157, 252), rgb(255, 178, 0), and rgb(27, 227, 73)"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-marqueepairs"
name = "marquee_contrast_pairs_readable"
description = "The red marquee shows yellow text rgb(255, 178, 0) and the blue marquee shows green text rgb(27, 227, 73), and text on the colored bands and cards stays clearly readable rather than tone-on-tone illegible"
type = "binary"
weight = 0.5

[[criterion]]
id = "vd-mobilestack"
name = "mobile_single_column_no_overflow"
description = "Below 1024px the sidebar is replaced by a mobile bar showing the placeholder wordmark, a \"Book your Unit\" button, and a hamburger; the locations and typical-unit sections collapse from two columns to one; and at 390px width no content clips or overflows the viewport and no horizontal scrollbar appears while the marquee bands keep looping full-width"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-fluidtokens"
name = "fluid_tokens_shrink_below_1024"
description = "At a viewport <=1023px wide the marquee text renders at 14px and the card border-radius token resolves to about 30px, per the fluid token system"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "vd-brokengrid"
name = "hero_cta_overlaps_photograph"
description = "At desktop width the hero Book CTA black pill overlaps the lifestyle photograph's lower edge while its label stays fully legible against the image, rather than sitting in a separate non-overlapping equal-column stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-threetier"
name = "three_tier_tokens_compute"
description = "Computed styles expose the three token tiers: theme ink/paper (--color-1 #000 and --color-2 #fff under the light theme), fluid layout tokens (--box-padding, --border-radius, --gap, --sidebar-width resolving through clamp()/vw), and named brand surface utilities matching the documented hexes on their designated bands and cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-fluidtype"
name = "fluid_type_scales_continuously"
description = "Resizing the viewport between 1440 and 390 pixels scales display and body typography fluidly via clamp()/vw with no abrupt size jumps beyond the documented <=1023px marquee 14px and radius 30px overrides"
type = "binary"
weight = 0.5

[[criterion]]
id = "vd-neg-equalstack"
name = "equal_width_plain_stack_shell"
description = "At desktop width the page is an equal-width plain stack of centered columns instead of the asymmetric fixed-sidebar plus right-offset content shell"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "vd-copyexact"
name = "specified_copy_exact_and_bilingual"
description = "All specified copy strings render exactly as written — the hero headline and supporting line, the five red-marquee and four blue-marquee phrases, the amenity slide titles, the pricing tiers, the nav labels, and the footer address block — preserving the bilingual register of Greek body copy alongside English display slogans"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-placeholdermedia"
name = "placeholder_media_matches_reference_shapes"
description = "All photography, gallery tiles, the map panel art, and the animated vector icon render as original or generated placeholder media at the same aspect ratios, dimensions, and placements as the reference composition, with the gallery tiles at the reference's tile sizes"
type = "binary"
weight = 0.5

[[criterion]]
id = "vd-neg-brandassets"
name = "real_brand_assets_shipped"
description = "The shipped page includes copyrighted, trademarked, scraped, stock, source-site, screenshot-derived, or otherwise third-party-controlled creative material—or a recognizable trace, near-copy, or derivative—including a source wordmark/logo, recognizable photography, proprietary font, third-party/social mark, map artwork, animation artboard, metadata, or hidden/preloaded asset instead of the fictional Noma system"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "vd-neg-filler"
name = "filler_text_or_mojibake_visible"
description = "Lorem-ipsum or placeholder filler text (\"TODO\", \"Lorem\", template variable names) is visible in the shipped UI, or Greek copy shows machine-garbled diacritics or mojibake, or headings and buttons mix capitalization conventions inconsistently"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "vd-authored-media-inventory"
name = "scratch_authored_media_inventory_craft"
description = "The Noma identity and complete media inventory are visibly art-directed: wordmark, hero photograph, illustrated map with both markers, vector animation and fallback, four amenity images, eight feature icons, multi-image studio gallery, two community photos, three values icons, three feed artworks, three social-style icons, both arrow variants, carousel arrows, and custom cursor occupy the reference roles without repetition"
type = "binary"
weight = 1.0

[[criterion]]
id = "vd-neg-missing-source-media"
name = "missing_reused_or_source_media"
description = "A required Noma surface is omitted, empty, broken, reused where distinct art is required, reduced to a generic gradient/emoji/text placeholder, or exposes a source-site name, domain/email, logo silhouette, social-platform logo, recognizable source media, metadata, or destination"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "visual_design.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
