[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting on the homepage at 390px: open the menu (menu-open state), advance the living carousel one slide, and dismiss the consent banner; then reload. All facets coherently reset to the seeded baseline (menu closed, carousel slide one Community living spaces, consent banner visible again) — never a mixed partial survival of some facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "carousel_derived_slide_changes"
description = "Derived-view sensitivity: click living carousel next once and confirm the visible slide title and amenity list both change from Community living spaces to Ασφάλεια (and its amenities); click previous and both restore to the first slide — not an identical redraw regardless of control."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "menu_open_state_echo_on_body"
description = "Cross-view echo: at 390px open the menu via the hamburger and confirm the overlay is visible and the body carries the menu-open state in the same pass; close and both the overlay and menu-open state clear without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "carousel_slide_count_delta"
description = "Count-delta integrity: note the living carousel is on slide one (Community living spaces), click next once, and confirm it advances by exactly one slide to Ασφάλεια with no skipped slide or lagging title."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "consent_accept_vs_reject_same_removal"
description = "Input-dependent output: on two fresh loads, dismiss via Αποδοχή on the first and Απόρριψη on the second; both remove the banner, and in both cases a subsequent reload restores the banner (dismissal path does not persist across reload)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_carousel_and_consent"
description = "Interleaved-flow integrity: advance the living carousel one slide, dismiss the consent banner, then click previous to return to Community living spaces; the carousel returns to slide one and the banner stays dismissed — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "menu_scroll_lock_edge_round_trip"
description = "Edge-state round-trip: at 390px note scroll position, open the menu (background scroll locked), close it, and confirm scroll position is unchanged and scrolling works again; reopen and close once more — lock and unlock track both transitions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_in_memory_state_survives_reload"
description = "After configuring menu-open, carousel position, and consent dismissal, a reload leaves an incoherent mix (e.g. consent stays dismissed while carousel resets, or carousel position survives alone)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "carousel_ignores_next_previous"
description = "Clicking living carousel next or previous leaves the visible slide title and amenity list identical to the pre-click values (derived surface ignores the input)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "consent_reload_keeps_banner_gone"
description = "After dismissing consent, a reload leaves the banner gone (byte-identical 'already dismissed' outcome) instead of restoring the seeded banner."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "menu_open_state_stale_until_reload"
description = "After opening or closing the menu, the overlay visibility and body menu-open state disagree until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_input_dependent_packet"
description = "Input-dependent output: run two booking+export sessions with different full names and different shortlisted tiers; the two Export JSON packets differ in inquiry.full_name and in shortlist/monthly_estimate_eur content."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_coherence"
description = "Multi-facet round-trip via artifact: configure shortlist Kick+Flex and a filled inquiry, Export JSON, clear both surfaces, Import packet; shortlist, Monthly estimate, and inquiry fields all restore together — never a mixed partial restore."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "monthly_estimate_derived_sensitivity"
description = "Derived-view sensitivity: with Kick shortlisted (estimate 640€), add Flex; Monthly estimate changes to 1380€; remove Kick; estimate becomes 740€ — not an identical redraw regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "shortlist_count_delta_integrity"
description = "Count-delta integrity: note shortlist badge count, toggle Boost on once, and confirm the count increases by exactly one with Boost listed and estimate increased by 690."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "export_estimate_matches_shortlist_sum"
description = "Schema coherence: after shortlisting Kick and Boost and submitting a valid inquiry, Export JSON has monthly_estimate_eur equal to 1330 and shortlist monthly_rent_eur values 640 and 690 — matching the on-screen Monthly estimate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_identical_across_different_inputs"
description = "Repeating booking+export with different names or shortlists yields byte-identical packet contents."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "estimate_ignores_shortlist_changes"
description = "Changing shortlist selections leaves Monthly estimate identical regardless of which studios are selected."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "export_estimate_mismatches_shortlist_rents"
description = "Export JSON monthly_estimate_eur disagrees with the sum of shortlist monthly_rent_eur values after a visible shortlist mutation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
