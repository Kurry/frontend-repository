[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "breakpoint_1024_sidebar_vs_mobile_bar"
description = "At >=1024px the fixed sidebar stays open with numbered nav; below 1024px the sidebar is replaced by a mobile bar showing the Noma wordmark, a Book your Studio button, and a hamburger button."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 390px, primary interactive controls (hamburger, Book your Studio, menu close, carousel next/previous, consent buttons) present tap targets at least about 44px in height or width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "fluid_type_and_radius_tokens"
description = "Between 1440 and 390 widths, typography scales fluidly via clamp()/vw with no abrupt size jumps beyond the documented <=1023px overrides; at <=1023px marquee text drops to 14px and the card border-radius token resolves to about 30px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_390"
description = "At 390px width no content clips or overflows the viewport; marquee bands keep looping full-width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_to_mobile_bar"
description = "Below 1024px the fixed ~122px desktop sidebar is hidden and the mobile bar (wordmark, Book CTA, hamburger) is the operable chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "locations_and_studio_stack_to_one_column"
description = "Below 1024px the layout collapses to a single stacked column (main left margin 0), and the locations and typical-studio sections collapse from two columns to one."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_hamburger_opens_menu"
description = "At 390px, tapping the hamburger opens the full-screen menu overlay with the four numbered nav links."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scrollbar_at_390"
description = "At 390px width no horizontal scrollbar appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "images_and_map_resize"
description = "Hero photograph, map panel, amenity-slide images, studio gallery tiles, and community photos size responsively at 1440, 768, and 390 without fixed-size overflow."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "custom_cursor_desktop_only"
description = "The custom block cursor renders on desktop only: display block at 1440px, display none at 390px and 768px."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_product_breakpoints"
description = "At 1440, 1023/1024, or 390 the layout breaks, overflows, or loses required chrome (sidebar vs mobile bar) for that width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "At 390px primary controls are too small to tap reliably or visibly misaligned."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "type_unreadable_at_narrow_width"
description = "At 390px body or heading text is too small to read or collapses illegibly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_spurious_scrollbars"
description = "At 1440, 768, or 390 content is cropped or unnecessary horizontal scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "mobile_nav_missing_or_unresponsive"
description = "Below 1024px the hamburger is absent from the mobile bar, or tapping it leaves the menu overlay closed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_sidebar_obscures_content"
description = "At 1440px the fixed sidebar permanently obscures hero or section content with no recoverable main-column offset (~167px left margin)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_or_stacking_failure_at_width"
description = "At 1440, 768, or 390 elements overlap incorrectly or stacking order breaks cards, marquees, or the hero Book CTA legibility."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "desktop_chrome_on_mobile_or_inverse"
description = "Below 1024px the fixed desktop sidebar remains the only nav path without a working hamburger, or at >=1024px the mobile bar/hamburger is the only nav with the sidebar unavailable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "media_static_size_overflows"
description = "Hero, map, gallery, or community imagery uses a static size that overflows the viewport at 390 or 768."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "book_cta_or_hamburger_disappears"
description = "Below 1024px the Book your Studio button or hamburger disappears from the mobile bar while remaining required chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.a1"
name = "showcase_composition_reflow_preserves_hierarchy"
description = "At 390px the asymmetric sidebar-plus-main desktop composition is re-choreographed into a stacked mobile composition (mobile bar, single-column sections) that preserves hierarchy rather than a broken shrink of the 122px sidebar shell."
type = "binary"
weight = 0.5

[[criterion]]
id = "7.11"
name = "overlays_usable_at_390"
description = "At 390px the booking inquiry overlay, shortlist drawer, FAQ accordion, and command palette remain fully visible and operable without clipped fields or off-screen dismiss controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "inquiry_overlay_clipped_on_mobile"
description = "At 390px the booking inquiry overlay or shortlist drawer clips required fields or hides its Close/dismiss control off-screen."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
