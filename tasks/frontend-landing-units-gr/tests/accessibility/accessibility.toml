[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "interactive_controls_keyboard_operable"
description = "Every interactive control (sidebar/mobile nav items, Book CTAs, hamburger, menu close, carousel next/previous, shortlist toggles, Undo/Redo, FAQ items, inquiry fields, consent Αποδοχή / Απόρριψη, footer links) is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "menu_overlay_keyboard_operable"
description = "At 390px, the hamburger, the open menu overlay's four nav links, and its close control are all reachable and operable with the keyboard alone while the menu is open."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "photographs_and_icons_have_alt"
description = "Every photograph and icon image carries descriptive alt text (or empty alt when purely decorative), including the hero lifestyle image, map markers, amenity slides, feature icons, community photos, and social-style icons."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order_from_hero_h1"
description = "Headings follow a logical order from the hero H1 (Home of the uniquely awesome.) without skipping levels that break the outline."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_header_nav_main_footer"
description = "Page chrome uses semantic HTML landmarks: header, navigation, main, and footer are present."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contrast_on_colored_bands_and_cards"
description = "Text on colored bands and cards stays readable at WCAG-AA contrast or better using the mandated contrast pairs (e.g. red marquee yellow text on rgb(234,55,55); blue marquee green text on rgb(0,114,227)), never tone-on-tone illegible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_interactive_chrome"
description = "Interactive chrome uses real controls (links/buttons) with semantic roles for nav, Book CTAs, hamburger, carousel arrows, and consent buttons rather than canvas-only hit targets."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_keeps_content_reachable"
description = "With prefers-reduced-motion emulated on a fresh load, the skeleton intro, marquee loops, cursor motion, and scroll reveals are disabled while all content remains present, readable, and reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "html_lang_el"
description = "The document declares html lang el."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "inquiry_dialog_focus_trap_escape"
description = "The booking inquiry overlay uses a dialog with aria-modal true, traps focus while open, closes on Escape, and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "inquiry_errors_live_region"
description = "Inquiry validation errors and the success copy Inquiry ready — export your packet are announced through a polite live region as well as shown visually."
type = "binary"
weight = 1.0

