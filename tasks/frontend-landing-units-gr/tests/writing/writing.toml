[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings and section titles, they keep one consistent capitalization convention throughout the page."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "cta_labels_specific"
description = "Where the app renders primary action labels, they use the specific PRD strings (Book your Studio, Γνώρισε τα Studios, Μπες στο Community, Αποδοχή, Απόρριψη, Add to shortlist / Remove from shortlist, Export JSON, Export Markdown, Copy packet) rather than generic Submit/OK alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "marketing_copy_spelling_grammar"
description = "Where the app renders body or marketing copy (hero supporting line, section paragraphs, amenity lists), rate how free it is of spelling and grammatical errors, including intact Greek diacritics."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "noma_terminology_consistent"
description = "Where the app renders the product name and studio labels, terminology stays consistent as Noma / Noma Parkside and the Kick/Boost/Flex Studio tier names (not mixed with leftover source-site naming)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "pricing_tiers_exact_formatting"
description = "Where the app renders pricing, the tiers appear exactly as Kick Studio 640€/μήνα, Boost Studio 690€/μήνα, and Flex Studio 740€/μήνα."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "hero_and_nav_copy_exact"
description = "Where the app renders the hero and nav, copy matches exactly: headline Home of the uniquely awesome.; supporting line All-inclusive φοιτητική διαμονή με όλα όσα χρειάζεσαι για να ζεις, να σπουδάζεις και να συνδέεσαι.; nav labels 01 Student Homes, 02 Our way of living, 03 Community, 04 Επικοινωνία; tagline Unique student homes."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "marquee_phrases_exact"
description = "Where the app renders marquee bands, the red band loops exactly Social areas / Private kitchen & bathroom / 24/7 Security / Fast and reliable maintenance / Smart living and the blue band loops exactly Super-fast WiFi / 24/7 Hot water / Electric bike stations / Elevator access."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "footer_address_block_exact"
description = "Where the app renders the footer address block, it shows exactly Noma Parkside, Σειρήνων 47, 16121 Καισαριανή, Αθήνα, hello@noma.example, and (+30) 6940006565, plus links Our way of living / FAQs / Book your Studio and policies Πολιτική Απορρήτου / Πολιτική Cookies / Όροι Χρήσης."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "bilingual_register_preserved"
description = "Where the app renders bilingual copy, Greek body copy and labels sit alongside English display slogans with no machine-garbled diacritics or mojibake anywhere."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.12"
name = "amenity_slide_titles_exact"
description = "Where the app renders living carousel slide titles, they match Community living spaces, Ασφάλεια, Υποστήριξη, and Smart Living in order."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variables like {{title}}) is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_typos"
description = "Spelling or grammatical errors appear in prominent copy such as Home of the uniquely awesome., Book your Studio, or nav labels."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "source_brand_names_in_copy"
description = "Rendered copy still names a source-site brand, domain, email, or distinctive source copy instead of the fictional Noma system (e.g. non-noma.example contact addresses)."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders mandated headings, marquee phrases, pricing tiers, or footer address copy unreadable at 1440 or 390."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.13"
name = "inquiry_and_shortlist_copy_exact"
description = "Where the app renders shortlist/inquiry chrome, the empty state No studios shortlisted yet, success Inquiry ready — export your packet, Copied confirmation, privacy label Συμφωνώ με την Πολιτική Απορρήτου, and the three FAQ questions appear exactly."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.14"
name = "inquiry_validation_names_fields"
description = "Where the app renders inquiry validation errors, they name the problem and the fix in field-contract terms (for example that email must be a valid address, phone needs at least ten digits, move_in_month must be YYYY-MM, or privacy consent must be checked), not only Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
