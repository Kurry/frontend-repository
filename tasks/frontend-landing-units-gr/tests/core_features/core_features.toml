[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "hero_settled_headline_and_cta"
description = "On load, once the skeleton intro settles the hero shows the display headline \"Home of the uniquely awesome.\" and a \"Book your Studio\" call-to-action button, with no full-viewport loader remaining"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "root_title_and_canvas_color"
description = "On load, the document body background color computes to exactly #f4e9e1 (rgb(244, 233, 225)) with black text and the document title is \"Αρχική - Noma\""
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "sidebar_nav_labels_and_chrome"
description = "On load at desktop width, the sidebar/header shows a placeholder Noma wordmark with the tagline \"Unique student homes\", the numbered nav labels 01 Student Homes, 02 Our way of living, 03 Community, 04 Επικοινωνία, a persistent \"Book your Studio\" CTA, an inert \"English\" control, and three distinct social-style icons"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "red_marquee_phrases_loop"
description = "After the page settles, the red marquee band (background rgb(234, 55, 55)) is continuously looping horizontally and contains the phrases Social areas, Private kitchen & bathroom, 24/7 Security, Fast and reliable maintenance, and Smart living"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "blue_marquee_phrases_loop"
description = "After the page settles, the blue marquee band (background rgb(0, 114, 227)) is continuously looping horizontally and contains the phrases Super-fast WiFi, 24/7 Hot water, Electric bike stations, and Elevator access"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "carousel_next_prev_step"
description = "Clicking the living carousel next control advances the amenity carousel by one slide across the slides Community living spaces, Ασφάλεια, Υποστήριξη, and Smart Living, and clicking the previous control moves it back"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "pricing_tiers_exact"
description = "On the typical-studio section, the pricing list reads Kick Studio 640€/μήνα, Boost Studio 690€/μήνα, and Flex Studio 740€/μήνα"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "hamburger_opens_menu_overlay"
description = "When the hamburger button is clicked at a mobile viewport, a full-screen menu overlay opens listing the nav links, and its close control dismisses it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "hover_and_focus_feedback"
description = "When a nav item or button is hovered, it shows a clear color/fill/underline or wash feedback, and keyboard focus remains visible on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "custom_cursor_desktop_only"
description = "On load at desktop width (>=1024px) the custom block cursor is present (display block), and at a 390px-wide mobile viewport the custom cursor is hidden (display none)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "consent_banner_appears"
description = "Shortly after load, the consent banner \"Χρησιμοποιούμε cookies\" appears as page chrome with Αποδοχή and Απόρριψη buttons, and clicking either button removes the banner"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "book_cta_reachable_no_navigation"
description = "On load, a \"Book your Studio\" CTA is present in the header/sidebar and reachable within two clicks; activating it opens the booking inquiry overlay on this homepage, and other chrome (nav items, footer links, social icons, or the \"English\" control) either scrolls within this homepage or performs a no-op — never navigating to another route, opening an external origin, or reaching a 404"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "insta_feed_section_content"
description = "On the social-feed section, a black \"Our way of living\" strip bar, a \"Stories\" / \"Staying connected\" panel, and a three-tile colored feed mosaic are present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "studio_features_eight_icons_and_cta"
description = "The typical-studio section shows the label \"Τα Studios\" and heading \"Μια νέα εμπειρία φοιτητικής διαμονής\", lists the eight studio features Πλήρως επιπλωμένα, Γραφείο, Ιδιωτική κουζίνα, Ιδιωτικό μπάνιο, Smart TV, Κλιματισμός, Super-Fast WiFi, and Μπαλκόνι, and shows a \"Γνώρισε τα Studios\" CTA"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.20"
name = "locations_card_and_map_markers"
description = "The locations section shows the yellow info card heading \"Σημεία που κάνουν τη ζωή σου εύκολη\" with the chips \"Σύντομα κοντά σου\" and \"Έτοιμα να μπεις!\" beside a map panel carrying the \"Noma Parkside\" marker"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.21"
name = "community_and_stand_for_content"
description = "The community section shows the heading \"Η κοινότητα, όπως τη ζούμε\" and the what-we-stand-for row shows the three items Οι Άνθρωποι, Το Design, and Η Φροντίδα"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.23"
name = "footer_address_and_policies"
description = "The footer shows the Noma Parkside address block with the email hello@noma.example and phone (+30) 6940006565 plus the policies list Πολιτική Απορρήτου, Πολιτική Cookies, and Όροι Χρήσης"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "menu_flow_scroll_position_round_trip"
description = "At a 390px-wide viewport, scroll partway down the page, then tap the hamburger: the full-screen menu overlay opens with all four numbered nav links visible, the body carries a menu-open state, and the page behind stops scrolling; activating the close control fades the overlay out, removes the menu-open state, and the underlying scroll position is exactly where it was — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "carousel_flow_reload_resets_to_first_slide"
description = "On the living section, clicking the next control once changes the visible slide title from Community living spaces to Ασφάλεια with its amenity list swapping accordingly; clicking the previous control returns to the first slide with its original amenity list intact; after a full page reload the carousel is back on its first slide"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "consent_flow_seeded_baseline_on_reload"
description = "On a fresh load the consent banner is visible shortly after load; clicking Αποδοχή removes the banner while the current scroll position and open carousel slide are untouched; reloading the page returns the app to its seeded baseline — the intro plays again, the carousel shows its first slide, and the consent banner reappears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "rapid_carousel_next_stays_in_bounds"
description = "Rapidly clicking the carousel next control many times never blanks the carousel or skips past its bounds, and at the last slide a further next click leaves a valid slide fully visible (either stopping at the last slide or looping to the first)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "menu_open_resize_leaves_page_usable"
description = "After opening the menu overlay at a 390px-wide viewport and then resizing the viewport to 1440px, the desktop sidebar is shown and the page is fully usable, with no scroll lock or leftover overlay blocking interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "scroll_revisit_keeps_reveals_settled"
description = "After scrolling the full page to the footer and back to the top, every previously revealed section remains visible in its settled state — no already-played one-time scroll reveal replays and no section is left stuck invisible"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.32"
name = "hero_photo_and_supporting_line"
description = "The hero section shows a full-bleed placeholder lifestyle photograph behind the headline together with the supporting line \"All-inclusive φοιτητική διαμονή με όλα όσα χρειάζεσαι για να ζεις, να σπουδάζεις και να συνδέεσαι.\""
type = "binary"
weight = 0.5

[[criterion]]
id = "1.33"
name = "single_page_chrome_stays_on_homepage"
description = "After clicking numbered nav items, opening Book your Studio (inquiry overlay), a footer link, a social icon, and the \"English\" control in sequence, the document remains on the homepage root with no route change, no external-origin navigation, and no application-error or Not-found page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "living_card_content_and_looping_icon"
description = "The living section's red-tint info card shows the label \"All-Inclusive Living\", the heading \"One Studio. An entire universe.\", the subtitle \"Το ενοίκιό σου καλύπτει τα πάντα\", and a bundled vector animation icon that is continuously looping in the settled state"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.35"
name = "arrows_header_bands_headings_present"
description = "The blue arrows-header band displays the heading \"Αυτό που μας καθορίζει\" between yellow arrow groups, and the orange arrows-header band (background rgb(255, 92, 56)) presents a \"Book your Studio\" band CTA between blue arrow groups"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.36"
name = "studio_shortlist_toggle_and_estimate"
description = "On the typical-studio section, toggling Kick then Boost onto the shortlist raises the shortlist badge count to 2, lists Kick Studio 640€/μήνα and Boost Studio 690€/μήνα in the shortlist drawer, and shows Monthly estimate 1330€"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "shortlist_undo_redo_round_trip"
description = "After adding Kick then Boost to the shortlist, Undo once removes Boost (count and Monthly estimate drop by 690 while Kick remains); Redo restores Boost and 1330€ — verified via the real Undo/Redo controls without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "booking_inquiry_opens_from_book_cta"
description = "Activating a Book your Studio control opens the booking inquiry overlay titled Book your Studio with fields for full name, email, phone, studio tier, move-in month, message, and the privacy consent checkbox Συμφωνώ με την Πολιτική Απορρήτου"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "valid_inquiry_reveals_export_controls"
description = "Submitting a create-inquiry body that satisfies the field contract (full_name ≥2 trimmed chars, valid email, phone with ≥10 digits, studio_tier Kick/Boost/Flex, move_in_month YYYY-MM current-or-future, message ≤500 when present, privacy_consent true) shows Inquiry ready — export your packet and reveals Export JSON, Export Markdown, and Copy packet controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "export_packet_reflects_session_mutations"
description = "After shortlisting Flex and submitting an inquiry with a distinctive full name, Export JSON produces a packet with inquiry.full_name matching that name, inquiry.studio_tier Flex, inquiry.privacy_consent true, a shortlist entry for Flex with monthly_rent_eur 740, and monthly_estimate_eur equal to the shortlist rent sum — not a static payload that ignores the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "faq_three_seeded_accordions"
description = "The FAQ block lists exactly three seeded questions Τι περιλαμβάνει το ενοίκιο;, Πότε μπορώ να κλείσω studio;, and Πώς επικοινωνώ με τη Noma;, and opening one expands its answer while collapsing any other open item"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "command_palette_opens_and_navigates"
description = "Pressing Cmd+K or Ctrl+K opens the command palette; choosing typical-unit scrolls to the typical-studio section and closes the palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "inquiry_field_contract_rejects_invalid"
description = "Submitting the booking inquiry with a malformed email (for example not-an-email), a phone with fewer than ten digits, or move_in_month not in YYYY-MM keeps the overlay open, shows an inline error naming the offending field, and never reveals Inquiry ready — export your packet or export controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "export_json_conforms_to_inquiry_schema"
description = "After a valid submit, the Export JSON text is a top-level object with inquiry (full_name, email, phone, studio_tier, move_in_month, message, privacy_consent, submitted), shortlist (tier + monthly_rent_eur pairs), and monthly_estimate_eur; studio_tier and each shortlist.tier are exactly Kick, Boost, or Flex"
type = "binary"
weight = 1.0

