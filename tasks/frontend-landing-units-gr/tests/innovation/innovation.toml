[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "execution_quality_of_signature_interactions"
description = "Score execution quality of the reference experience (not invention beyond it): skeleton intro timeline, custom cursor follow/press, shape-overlay button morphs, and marquee loops feel polished and coherent rather than unfinished stubs."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "scroll_storytelling_execution"
description = "On a fresh load, scroll-triggered section storytelling (info blocks fading/rising from opacity 0 / y 40) executes smoothly as a choreographed sequence rather than a janky or missing recreation of the reference motion."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "home_skeleton_intro_execution"
description = "The home-skeleton intro timeline (skeleton rise/sweep, hero image-wrap height reveal, headline/button stagger) executes as a finished sequence matching the reference ambition on a fresh load via the real UI path."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "noma_brand_narrative_arc"
description = "The long-form page reads as one Noma Student Homes narrative arc from hero through locations, living, studios, community, values, social feed, and book band rather than disconnected template blocks."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a1"
name = "designed_experience_narrative_arc"
description = "The page reads as a designed experience with a narrative arc — sections build on each other visually and the signature intro/scroll interaction is memorable as faithful reference execution, not a template with effects sprinkled on."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a2"
name = "showcase_rechoreographed_at_narrow_widths"
description = "Impeccable execution across breakpoints: at 390 the showcase composition is re-choreographed (mobile bar, stacked sections, working menu) rather than a broken shrink of the desktop sidebar shell."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "signature_motion_absent_or_stubbed"
description = "Signature reference motions are absent or stubbed: no skeleton intro, no scroll reveals, and no marquee loops on a fresh load via the real UI path."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n2"
name = "recreation_feels_generic_template"
description = "The recreation reads as a generic marketing template with default type/spacing and none of the reference's asymmetric sidebar, loud brand bands, or kinetic intro execution quality."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n5"
name = "page_flat_static_no_immersion"
description = "The page is flat and static with no scroll storytelling, no intro timeline, and no marquee/hover language despite the reference requiring them."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.8"
name = "shortlist_export_execution_polish"
description = "Score execution quality of the hardened shortlist-to-export path: toggles, Monthly estimate, inquiry success, and packet export feel finished and coherent with the Noma homepage rather than bolted-on stubs."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable execution-quality enhancement of the reference experience that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick, and must not invent design beyond the reference. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
