[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "mo-fouc"
name = "body_opacity_gate_no_fouc"
description = "The body is opacity-gated at load (starts hidden) and is revealed after scripting runs rather than flashing unstyled content"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-skeleton"
name = "skeleton_intro_hero_height_reveal"
description = "On a fresh load the signature home-skeleton intro timeline plays as one orchestrated sequence: skeleton items rise then sweep away, the hero image-wrap reveals via a height animation from 0 to full, the headline and Book CTA stagger in, and the skeleton container is removed"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-herostagger"
name = "hero_headline_cta_stagger_in"
description = "The hero headline and CTA stagger into place from a lower, faded start as the intro completes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-marquee-red"
name = "red_marquee_constant_linear_loop"
description = "In the settled state the red marquee (rgb(234, 55, 55)) continuously loops its phrases horizontally: its track translateX advances measurably (roughly 100px per second) between two samples with no easing"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-marquee-blue"
name = "blue_marquee_constant_loop"
description = "In the settled state the blue marquee (rgb(0, 114, 227)) is continuously looping its phrases horizontally at a constant speed"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-menu"
name = "menu_overlay_fade_open_close"
description = "Clicking the hamburger control opens the full-screen menu overlay with an opacity fade and adds a menu-open state, and the close control fades it back out"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-swiper-motion"
name = "carousel_slide_transition_visible"
description = "Clicking the living carousel next control produces a visible slide transition (roughly 800ms) rather than an instant jump"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-cursor-press"
name = "cursor_press_scale_down_release_restore"
description = "On a desktop viewport, pressing the mouse button scales the custom block cursor down and releasing restores it"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-arrows"
name = "arrows_bands_repeating_bounce"
description = "The arrows-header bands animate their arrow groups with a repeating bounce"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-hover"
name = "hover_feedback_on_interactive_chrome"
description = "Hovering nav items, buttons, CTAs, shortlist toggles, and FAQ items produces clear color/fill/underline or wash feedback, and keyboard focus remains visible on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-scrollreveal"
name = "scroll_reveal_fade_rise_once"
description = "On a fresh page load, scrolling down the page reveals section info blocks in sequence: each fades and rises into place from a lower, transparent start (opacity 0 / y 40), and each reveal plays only once per load (verified by real scrolling, never a state shortcut)"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-reducedmotion"
name = "reduced_motion_disables_loops_keeps_content"
description = "With prefers-reduced-motion emulated on a fresh load, the skeleton intro, marquee loops, cursor motion, and scroll reveals are disabled while all page content remains present and readable"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-shapeoverlay"
name = "hover_shape_overlay_morph"
description = "Hovering a menu or color button fills it with a shape overlay whose paths morph from closed toward open over roughly a second, drawing from the brand overlay color family (#EA3737, #004E9B, #FFB200, #FF5C38, #0072E3)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-bodytransition"
name = "body_background_transition_token"
description = "getComputedStyle on the body reports a background transition of 1.8s with cubic-bezier(0.19, 1, 0.22, 1) easing"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-inertial"
name = "non_marquee_motion_uses_inertial_easing"
description = "On a fresh load, the skeleton intro rise/sweep, hero height reveal, cursor press scale, and menu overlay fade settle with inertial easing (back.out, circ.out, power2.inOut, or cubic-bezier momentum) rather than starting and stopping at constant linear speed; marquees may remain linear"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-smoothscroll"
name = "smooth_scroll_synced_reveals"
description = "Continuous scrolling from top toward the footer feels smooth with natural inertial settle, and scroll-triggered section reveals fire at the correct scroll positions during that continuous scroll rather than snapping ahead of or lagging behind the visible viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-inquiry-overlay-fade"
name = "inquiry_and_palette_fade_via_ui"
description = "Opening and closing the booking inquiry overlay and the command palette via the real UI controls shows a short opacity fade (~0.3–0.5s); verified through the real controls, never a state shortcut"
type = "binary"
weight = 0.5

[[criterion]]
id = "mo-faq-expand"
name = "faq_accordion_expand_collapse_motion"
description = "Opening and closing a FAQ accordion item via the real control shows a brief height/opacity transition rather than an instant snap"
type = "binary"
weight = 0.5

[[criterion]]
id = "8.a2"
name = "scroll_storytelling_section_reveals"
description = "On a fresh load, real scrolling down the page drives sequential scroll storytelling: section info blocks fade and rise from opacity 0 / y 40 into place in scroll order so colored bands and cards read as a progressive narrative rather than all appearing fully settled at once (never a WebMCP state shortcut)"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a3"
name = "pointer_reactive_cursor_depth"
description = "On a fine-pointer desktop viewport, the custom cursor wrap continuously follows pointer position with short circ.out easing, and pressing/releasing the mouse scales it toward 0.2 then back to 1 over about 0.6s while the page stays fully usable (verified by real pointer movement, not a state shortcut)"
type = "binary"
weight = 1.0

[[criterion]]
id = "8.a8"
name = "interactive_shape_overlay_vectors"
description = "Menu and color-button shape-overlay SVG paths stay crisp at the desktop viewport and respond to real hover state by morphing from closed toward open over about 0.9s with brand overlay colors, rather than looping identically regardless of hover"
type = "binary"
weight = 0.5

