[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "mo-fouc"
name = "mo-fouc"
description = "The body is opacity-gated at load (starts hidden) and is revealed after scripting runs rather than flashing unstyled content"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-skeleton"
name = "mo-skeleton"
description = "On first load a skeleton intro plays and the hero image-wrap reveals via a height animation from 0 to full, after which the skeleton container is removed"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-herostagger"
name = "mo-herostagger"
description = "The hero headline and CTA stagger into place from a lower, faded start as the intro completes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-marquee-red"
name = "mo-marquee-red"
description = "In the settled state the red marquee (rgb(234, 55, 55)) continuously loops its phrases horizontally: its track translateX advances measurably (roughly 100px per second) between two samples with no easing"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-marquee-blue"
name = "mo-marquee-blue"
description = "In the settled state the blue marquee (rgb(0, 114, 227)) is continuously looping its phrases horizontally at a constant speed"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-menu"
name = "mo-menu"
description = "Clicking the hamburger control opens the full-screen menu overlay with an opacity fade and adds a menu-open state, and the close control fades it back out"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-swiper-motion"
name = "mo-swiper-motion"
description = "Clicking the living Swiper next control produces a visible slide transition (roughly 800ms) rather than an instant jump"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-cursor-press"
name = "mo-cursor-press"
description = "On a desktop viewport, pressing the mouse button scales the custom block cursor down and releasing restores it"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-arrows"
name = "mo-arrows"
description = "The arrows-header bands animate their arrow groups with a repeating bounce"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "mo-hover"
name = "mo-hover"
description = "Hovering nav items, buttons, and CTAs produces clear color/fill/underline or wash feedback, and keyboard focus remains visible on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "mo-neg-static"
name = "mo-neg-static"
description = "The marquee bands are static and do not loop in the settled state (their track transform does not change between samples)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mo-neg-cursor"
name = "mo-neg-cursor"
description = "The custom block cursor is shown at a 390px-wide mobile viewport instead of being hidden below 1024px"
type = "binary"
weight = 0.5
negate = true
optional = true
