[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_fluid_token_scale"
description = "At 1440px, section gaps, card padding, and sidebar offset follow the fluid token rhythm (--box-padding 2.083vw, --gap, --border-radius, --sidebar-width via clamp()/vw) rather than arbitrary odd-pixel one-offs visible in computed styles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_reference_metrics"
description = "At 1440px typography matches the spec: hero H1 at 72px / 72px line-height in the display face weight 850, color rgb(255,255,255); section headings about 33px / 33px display weight 850; nav labels 12px / 14.4px body weight 700; body copy about 15px / 18px body weight 400."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_pixel_match_reference_screenshots"
description = "At 1440 desktop width, composition matches /reference-screenshots/ overview and segment panels to near pixel-parity for the fixed sidebar shell (~122px / ~167px main offset), hero, marquees, living carousel, studios, community, and footer density/proportions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: skeleton intro timeline, scroll section reveals, marquee loops, arrows-header bounce, and menu overlay fade — verified via the real UI/scroll path on a fresh load where required."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns at the 1023/1024px product breakpoint: fixed sidebar vs mobile bar, two-column locations/studios vs stacked, custom cursor on desktop only."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "cards_chips_and_pills_match_spec"
description = "Rounded content cards (border-radius about 37.5px at 1440 / 30px at <=1023px), pill chips/labels (transparent fill, 1px rgb(0,0,0) hairline border, 100px radius), and Book CTA black pill styling match the reference rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes heavy display headlines (weight 850) from body face long-form copy across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover states match the reference where specified: nav items, buttons, CTAs, and footer links show clear color/fill/underline or wash feedback; menu and color buttons carry shape-overlay morph on hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_exact_hexes"
description = "Measured brand surfaces match exactly: body canvas rgb(244,233,225); red marquee rgb(234,55,55) with yellow text rgb(255,178,0); blue marquee rgb(0,114,227) with green text rgb(27,227,73); orange book band rgb(255,92,56); locations card rgb(255,178,0); community card rgb(234,55,55); Stories panel rgb(171,84,247); what-we-stand-for cards rgb(0,114,227)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions follow the reference language with documented timings (cursor press scale to 0.2 over ~0.6s circ.out; menu overlay fade ~0.5s; living carousel slide transition ~800ms) via the real UI path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_token_scale"
description = "Visible major section gaps or sidebar offset use arbitrary odd-pixel spacing that contradicts the fluid --box-padding / --gap / --sidebar-width token scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_brand_palette"
description = "Surfaces or accents use colors outside the specified Noma brand palette (canvas #f4e9e1 and the named yellow/orange/green/purple/red/blue hexes) — e.g. an arbitrary purple-on-white theme wash."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "type_sizing_mismatches_spec"
description = "At 1440px the hero H1 or section headings are grossly mismatched versus the ~72px / ~33px reference metrics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_reference_motion_missing"
description = "Required reference animations are missing: no skeleton intro, no scroll reveals, or no marquee loops."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_defaults"
description = "Primary CTAs, chips, or cards use unstyled browser default appearance when the reference uses token-styled pills/cards."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_vs_screenshots"
description = "At 1440 the sidebar/hero/marquee/living/studio composition is grossly misaligned versus /reference-screenshots/ segment panels."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Key reference regions (sidebar, hero Book CTA, marquees, living carousel, footer) render off-screen or clipped at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "section_order_or_structure_deviates"
description = "Section order, content, or structure deviates from the mandated order (hero → locations → red marquee → living → blue marquee → typical-studio → community → blue arrows-header → what-we-stand-for → social-feed → orange arrows-header → footer) or omits a required section."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_body_undifferentiated"
description = "Heading and body text have no visual distinction (same size/family/weight throughout)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover language or cursor/menu microinteractions are missing or clearly deviate from the reference (instant snaps, no marquee motion, no nav hover feedback)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.11"
name = "hardened_overlays_do_not_break_reference_shell"
description = "When the shortlist drawer or booking inquiry overlay is closed, the desktop sidebar shell, section order, and brand band composition still match the reference screenshots at 1440; overlays layer above without permanently shifting the shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "overlays_permanently_distort_shell"
description = "Opening then closing the shortlist drawer or booking inquiry permanently distorts the reference sidebar offset, section order, or brand band composition at 1440."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
