description = "Measured brand surfaces match exactly: body canvas rgb(244,233,225); red marquee rgb(234,55,55) with yellow text rgb(255,178,0); blue marquee rgb(0,114,227) with green text rgb(27,227,73); orange book band rgb(255,92,56); locations card rgb(255,178,0); community card rgb(234,55,55); Stories panel rgb(171,84,247); what-we-stand-for cards rgb(0,114,227)."
