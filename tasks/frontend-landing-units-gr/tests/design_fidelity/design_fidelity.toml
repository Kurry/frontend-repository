description = "Responsive behavior matches the reference patterns at the 1023/1024px product breakpoint: fixed sidebar vs mobile bar, two-column locations/studios vs stacked, custom cursor on desktop only."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "cards_chips_and_pills_match_spec"
description = "Rounded content cards (border-radius about 37.5px at 1440 / 30px at <=1023px), pill chips/labels (transparent fill, 1px rgb(0,0,0) hairline border, 100px radius), and Book CTA black pill styling match the reference rather than unstyled browser defaults."
