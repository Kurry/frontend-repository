description = "Default/hover states match the reference where specified: nav items, buttons, CTAs, and footer links show clear color/fill/underline or wash feedback; menu and color buttons carry shape-overlay morph on hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
