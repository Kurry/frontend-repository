[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "chrome_links_stay_on_homepage"
description = "All homepage chrome links (numbered nav items, the English control, footer links, social icons) either scroll within this document or are non-navigating stubs; Book your Studio opens the in-page inquiry overlay; no interaction leads to an application-error or Not-found page and no request leaves the origin."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "rapid_carousel_next_stays_in_bounds"
description = "Rapidly clicking the living carousel next control repeatedly never blanks the carousel or skips past its bounds; at the last slide a further next click leaves a valid slide fully visible (either stopping at the last slide or looping to the first)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "menu_open_resize_to_desktop_usable"
description = "Opening the menu overlay at 390px and then resizing the viewport to 1440px leaves the page fully usable: the desktop sidebar is shown and no scroll lock or leftover overlay blocks interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "consent_dismiss_reappears_after_reload"
description = "Dismissing the consent banner and then reloading shows the banner again; no browser storage is read or written at any point during dismiss or reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "scroll_reveals_do_not_retrigger"
description = "Scrolling the full page to the footer and back does not re-trigger already-played one-time scroll reveals, and no section is left stuck invisible."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "consent_action_gives_visible_feedback"
description = "Clicking Αποδοχή or Απόρριψη immediately removes the consent banner from view (visible confirmation of the action) rather than leaving it stuck on screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "carousel_controls_stay_labeled"
description = "Living carousel next/previous controls remain identifiable as interactive controls with readable affordances after rapid clicking and after a reload back to slide one."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "menu_and_consent_use_semantic_controls"
description = "The hamburger, menu close control, and consent Αποδοχή / Απόρριψη buttons use semantic button (or equivalent) controls rather than unlabeled div shells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "menu_overlay_dismissible"
description = "At 390px the open full-screen menu overlay can be dismissed via its close control, restoring page scrolling without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "english_control_is_inert_stub"
description = "Activating the English language control performs a no-op or in-page stub on this homepage-only build — it never navigates away or opens an external locale URL."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "chrome_leads_to_error_or_external"
description = "A nav item, Book CTA, footer link, social icon, English control, or wordmark leads to an application-error/Not-found page or a request that leaves the origin (Book CTA leaving the document counts)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "carousel_blanks_or_skips_bounds"
description = "Rapid next clicks blank the living carousel or leave no valid slide fully visible past its bounds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "resize_leaves_scroll_lock_or_overlay"
description = "After opening the menu at 390px and resizing to 1440px, a scroll lock or leftover overlay still blocks desktop interaction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "consent_persists_via_browser_storage"
description = "After dismissing consent and reloading, the banner stays gone because localStorage, sessionStorage, or another browser storage API retained the dismissal."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "section_stuck_invisible_after_scroll"
description = "After scrolling to the footer and back, a section that should be visible remains stuck invisible or a one-time scroll reveal re-fires incorrectly leaving broken layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "menu_not_keyboard_dismissible"
description = "At 390px the open menu overlay cannot be dismissed via keyboard (focusable close control or equivalent) when keyboard navigation is used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "consent_click_silent_no_removal"
description = "Clicking Αποδοχή or Απόρριψη produces no visible change — the consent banner remains on screen with no feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "primary_controls_labels_ambiguous"
description = "Hamburger, menu close, carousel next/previous, or consent buttons lack readable labels or use ambiguous blank text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "carousel_controls_become_inoperable"
description = "After rapid next clicking, the living carousel next or previous control becomes permanently inoperable or invisible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "interactive_affordances_hidden"
description = "Required interactive affordances (hamburger below 1024px, carousel arrows, consent buttons) are visually hidden or inaccessible when their viewport context requires them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "inquiry_invalid_submit_inline_errors"
description = "Submitting the booking inquiry with any field-contract violation — empty full_name, email without a domain dot, phone with fewer than ten digits, move_in_month not YYYY-MM, message over 500 characters, or unchecked privacy_consent — keeps the overlay open, shows inline errors naming each offending field and the fix, and never shows Inquiry ready — export your packet or export controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "rapid_shortlist_toggle_stays_coherent"
description = "Toggling the same studio tier on and off rapidly never leaves the badge count, drawer rows, and Monthly estimate disagreeing with each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "undo_empty_history_noop"
description = "Undo when the shortlist history is empty leaves the shortlist unchanged (no negative count, no blank drawer crash); Redo when nothing was undone is a no-op."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "malformed_import_shows_error"
description = "Importing a malformed JSON, a non-inquiry object, or a packet missing required inquiry keys / using studio_tier outside Kick/Boost/Flex / carrying a shortlist rent that does not match Kick 640 / Boost 690 / Flex 740 shows a visible import error and does not wipe a valid shortlist already on screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "past_or_invalid_move_in_month_rejected"
description = "Submitting with move_in_month set to a past month or a non YYYY-MM value (for example 13/2026) keeps the overlay open, shows an inline error naming move_in_month, and never reveals export controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "invalid_inquiry_shows_success_or_export"
description = "An invalid booking inquiry submit shows Inquiry ready — export your packet or reveals export controls despite a field-contract violation (missing required fields, malformed email/phone/month, or unchecked privacy consent)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "malformed_import_wipes_shortlist"
description = "Importing malformed or schema-invalid JSON silently clears a valid shortlist without a visible import error."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
