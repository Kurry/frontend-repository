[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Hovering and pressing the wizard's actual buttons eases their border, shadow, and scale, and the press feedback appears immediately on pointer-down"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Swatch rows and per-bitmap rows take a full-width hover wash when the pointer moves over them"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Tabbing through the interactive controls shows a clearly visible keyboard focus ring distinct from the hover state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Advancing or returning between steps using the visible Continue, Generate, and Back buttons swaps the active step body in place without a full page reload and updates the progress bar to the current step"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Interactive controls show no hover or focus feedback, so buttons and rows read as static under pointer and keyboard interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "Changing the step triggers a full page reload or outbound navigation instead of swapping the step body in place"
type = "binary"
weight = 1.0
negate = true
