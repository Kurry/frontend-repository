[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "core_features.1"
name = "edit_panels"
description = "Edit panels, stage objects, order balloons, track continuity, branch/merge, resolve/proof, and export -> geometry, order, facts, revisions, and files agree."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.2"
name = "test_geometry"
description = "Split, merge, resize, reorder, and gutter-align panels on page and spread views. Verify exact normalized coordinates with minimum sizes and print-safe/bleed bounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.3"
name = "test_staging"
description = "Place abstract character and prop tokens with pose, facing, depth, handedness, held-by, entrance/exit, and camera-side state. Move/rotate/flip operations update local coordinates and screen direction."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.4"
name = "test_balloons"
description = "Create dialogue, thought, caption, and sound-effect objects; edit tail target, bounds, speaker, and order. Reading path follows locale fixture, panel order, and manual overrides."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.5"
name = "test_continuity"
description = "Track costume, injury, prop ownership, location, time, lighting, facing, knowledge, and dialogue facts across panel intervals."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.6"
name = "test_branches"
description = "Fork a beat, change panels/staging/dialogue, compare ghosted geometry and continuity deltas, then merge per object/property."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.7"
name = "test_issues"
description = "Resolve, waive with reason, or jump to loci for geometry, reading order, balloon, continuity, page-turn, and print violations."
type = "binary"
weight = 1.0

[[criterion]]
id = "core_features.8"
name = "missing_edit_panels"
description = "Panels cannot be edited, stage objects cannot be placed, or continuity tracks are missing from the UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "core_features.9"
name = "missing_geometry_validation"
description = "Panel geometry operations allow sizes below minimum or ignore print-safe bounds."
type = "binary"
weight = 1.0
negate = true
