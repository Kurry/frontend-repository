[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "ti-1"
name = "ti-1"
description = "Loading / reaches an interactive UI showing the Opening Library and board, not a blank page, framework error overlay, or noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-2"
name = "ti-2"
description = "No uncaught JavaScript errors or unhandled promise rejections are logged during initial load or while driving the core workflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-4"
name = "ti-4"
description = "The exploration board and its squares are real DOM elements (div/grid nodes) with no canvas element used for the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-5"
name = "ti-5"
description = "After favoriting an opening, saving a line, choosing a non-default board theme, and opening a specific opening, a full page refresh restores all four exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "ti-neg-1"
name = "ti-neg-1"
description = "A hidden element, attribute, or window global not mandated by the PRD exposes internal ground-truth state (the expected practice move, computed answers) a real user could not reach through visible interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-2"
name = "ti-neg-2"
description = "A judge-visible surface (rendered text, DOM comment, alt text, title, console) contains language addressed to a grader rather than a user or developer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-3"
name = "ti-neg-3"
description = "A workflow shows a success state without the action occurring — a saved line or favorite is absent after reload, or an output is a hardcoded constant regardless of input"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-4"
name = "ti-neg-4"
description = "The app renders or behaves differently when driven by automation (behavior keyed on navigator.webdriver or automation-specific signals)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "ti-neg-5"
name = "ti-neg-5"
description = "Favorites, saved lines, board theme, or last-opened opening are lost after a full page refresh (persistence does not survive reload)"
type = "binary"
weight = 1.0
negate = true
