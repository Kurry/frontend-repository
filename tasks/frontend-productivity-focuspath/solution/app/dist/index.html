<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusPath</title>
    <!--
      No external font network dependency: a render-blocking cross-origin
      stylesheet link here would stall this module script's execution until
      that fetch resolves (or times out), which can leave the app unpainted
      indefinitely in a restricted-network environment. Typography relies
      entirely on the system-available fallbacks declared in global.css
      ("Fraunces"/Georgia serif for titles, "Inter"/system-ui sans for body),
      so the app renders deterministically with zero network round-trips.
    -->
    <!--
      Qwik's own runtime (`render()` from `@builder.io/qwik`, used by
      src/entry.csr.tsx for this csr:true, no-qwik-city SPA) never injects the
      "qwikloader" bootstrap script in a production build — that
      auto-injection only happens (a) via `renderToStream` in real SSR, or
      (b) via Vite's dev-only `@builder.io/qwik/vite-client` proxy, which is
      swapped in only while running `vite dev`. A `vite build` + static
      `npm start` serve (this app's production path) goes through neither, so
      every onClick$/onInput$ handler in the whole app is a dead QRL
      reference with nothing to resolve it: the loader is "absolutely
      required for Qwik to work... for any interactivity to happen" (Qwik
      docs). Without it the initial paint still renders (App() runs once
      synchronously) but the app is permanently frozen after that — no click,
      key press, or input ever does anything, on any screen, forever. Loading
      the loader's unmodified build output here (byte-identical to the
      pinned @builder.io/qwik@1.20.0 package's dist/qwikloader.js, vendored to
      public/ since this project has no SSR entry to source it from at
      request time) restores exactly the behavior real Qwik SSR gives every
      page for free.
    -->
    <script type="module" id="qwikloader" src="/qwikloader.js" async></script>
    <style>

        --color-primary: #2b6f6e;
        --color-accent: #c98a3d;
        --color-background: #f6f5f0;
        --color-surface: #ffffff;
        --color-success: #3f9d6b;
        --color-warning: #d9a441;
        --color-error: #c1483f;
        --color-text-primary: #232823;
        --color-text-secondary: #6b7268;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: var(--color-background);
        color: var(--color-text-primary);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 0.95rem;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BWsCfxEf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C2FVGGOw.css">
