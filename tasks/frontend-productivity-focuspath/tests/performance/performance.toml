[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on local render for the FocusPath overview."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "Browser devtools show no errors or warnings during create, edit, reorder, focus, complete, export, import, undo, and live stream exercise."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "step_toggle_responds_promptly"
description = "Toggling a step checkbox updates percentage and path node state with no multi-second hitch."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "stream_status_updates_without_block"
description = "Starting, pausing, and reconnecting the live stream updates status without freezing the rest of the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "many_milestones_remain_smooth"
description = "A goal with many milestones and steps keeps path scrolling and step toggles responsive without sustained jank."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during goal create, Mark Goal Complete, Export open, and Import confirm."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "path_animations_smooth"
description = "Milestone fill-in and progress-bar width animations maintain smooth playback without stuttering under normal use."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated create submits, focus toggles, and undo/redo leave the UI responsive with no hang or blank screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "An extended session of create, complete, export, and stream exercise shows no runaway growth that freezes the tab."
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "export_preview_regenerates_live"
description = "Opening Export after edits regenerates Path Pack JSON and Markdown previews promptly from live state without a long blank preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before interaction is possible on local render."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_exercise"
description = "Console errors or unhandled rejections appear during a full exercise of goals, focus, export, or stream controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "ui_hangs_under_rapid_input"
description = "Rapid repeated input hangs the UI, drops interactions, or blanks the page."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

