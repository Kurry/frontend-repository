[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_goal_appears_overview_and_detail"
description = "Create flow: submitting + New Goal with a valid title and accent swatch adds exactly one overview card and opening it shows the same title, target date, motivation, and accent."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: submitting New Goal with a blank title shows inline \"Goal title is required\" next to the title field and adds no card."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_goal_updates_card_and_export"
description = "Edit flow: inline-editing a goal title updates the overview card and the Path Pack JSON / Markdown export previews without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_goal_removes_card_and_focus"
description = "Delete flow: confirming delete on a goal removes its overview card and any of its steps from Today's Focus immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "overview_detail_switch_retains_progress"
description = "View switch: opening a goal detail, checking a step, and returning to the overview keeps the raised percentage on that goal's card without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last active goal, the overview shows \"Set your first goal to start building a path\" with a + New Goal call to action."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "focus_panel_tracks_three_cap"
description = "Focus flow: toggling Focus Today on three steps fills the panel; a fourth attempt is rejected with the inline limit message while the panel still shows exactly three."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "completed_goals_toggle_preserves_readonly"
description = "Completed Goals chrome: after Mark Goal Complete, toggling the Completed Goals section closed and open again still shows the goal with a read-only path."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_import_confirm_flow"
description = "Artifact flow: Export opens with Path Pack JSON and Markdown tabs; Download then Import with confirmation replaces the session so overview and Export match the pack; canceling Import leaves the session unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "command_palette_recovers_navigation"
description = "Recovery: from a detail view, open the command palette and choose another goal; navigation lands on that goal's detail without requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "undo_after_mark_complete_restores_active"
description = "Undo flow: after Mark Goal Complete moves a goal to Completed Goals, Undo restores it to the active list at 100% with Mark Goal Complete available again."
type = "binary"
weight = 1.0

