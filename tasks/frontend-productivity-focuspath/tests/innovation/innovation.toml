[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_path_microinteractions"
description = "Beyond the required node fill-in, the milestone path or Today's Focus offers an extra delightful microinteraction that makes progress feel tangible."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_progress_visualization"
description = "The app adds an advanced progress visualization beyond the required percentage bar and path nodes (for example a richer velocity gauge treatment)."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_first_goal_coaching"
description = "The app offers optional guided coaching or coachmarks that help a new user build their first milestone path without blocking the empty-state CTA."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enriched_export_preview"
description = "Export goes beyond bare JSON/Markdown with an enhanced preview affordance (syntax highlighting, section jump, or print-friendly framing) while still shipping the required formats."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_power_user_extras"
description = "Beyond required Ctrl/Cmd+K and undo shortcuts, the app adds extra keyboard power-user shortcuts that speed roadmap editing."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "The app provides optional personalization (for example density or path orientation preference) beyond the required features."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_focus_narrative"
description = "The app presents a polished productivity narrative or motivational framing around Why this matters that feels authored rather than generic."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "theme_or_accent_personalization"
description = "Beyond the required 8 goal accent swatches, the app offers an optional chrome personalization that stays within the calm palette."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "offline_friendly_extras"
description = "Where appropriate for an in-memory app, the app adds offline-friendly extras (for example a visible session summary) without using forbidden browser storage."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_roadmap_craft"
description = "Competition-level craft is visible: the path, focus, velocity, and export surfaces feel like a tool an operator would adopt, not a thin demo."
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant, browser-observable innovation or craft excellence beyond the specification that is NOT covered by any other criterion in this file. If present, name it and cite concrete evidence. If nothing beyond other criteria qualifies, answer no."
type = "binary"
weight = 1.0

