[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_overview_cta_present"
description = "With zero goals the overview shows \"Set your first goal to start building a path\" together with a + New Goal call to action."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline_field_names"
description = "Inline validation appears on goal, milestone, step, and Import forms before submit, naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Error and limit messages name the problem and the fix (for example complete or unfocus one first; title must be at most 80 characters) rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_export_shows_confirmation"
description = "Copy on an Export tab shows a visible confirmation after placing text on the clipboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "stream_status_visible_while_running"
description = "While the live activity stream is started, a visible stream status distinguishes running from paused or disconnected states."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "delete_supports_confirm_or_undo"
description = "Destructive delete of a goal, milestone, or step requires an inline confirm step, and Undo can restore a deleted goal."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "zero_step_milestone_cannot_complete"
description = "A milestone with zero steps shows \"Add a step to make progress\" and offers no control that marks it complete."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "fourth_focus_rejected_keeps_three"
description = "Toggling a 4th step into Today's Focus is rejected with an inline message; the panel keeps showing exactly the existing 3."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "stale_focus_date_clears_without_mutating_steps"
description = "When todaysFocus.focusDate differs from today (via Import of yesterday's focusDate), the panel clears selections without altering underlying step completion."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_submit_creates_one_record"
description = "Double-submitting any create form creates exactly one record: the relevant count increases by one and one new item appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_import_leaves_state"
description = "Importing malformed Path Pack JSON or JSON that fails the field contract leaves goals, focus, and Export unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "undo_redo_empty_stack_safe"
description = "Undo and Redo are disabled at empty-stack boundaries and never throw or corrupt goals when activated there; a new edit after Undo clears the redo stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "blank_title_creates_goal"
description = "A blank required title is accepted and creates a goal or milestone anyway."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "native_alert_for_validation"
description = "Validation, focus-limit, delete confirm, Export, or Import uses a native browser alert() or confirm() dialog."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "fourth_focus_accepted"
description = "A fourth Focus Today toggle is accepted and the panel lists more than three focused steps."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "zero_step_milestone_markable_complete"
description = "A zero-step milestone can be marked complete without adding steps."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "invalid_import_mutates_session"
description = "An invalid Path Pack Import still replaces or partially mutates the current goals/focus session."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "double_submit_duplicates_records"
description = "Rapid double-submit of a create form creates two records."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "stream_duplicate_double_applies"
description = "Delivering the same live stream event twice changes the applied-event ledger twice."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case handling that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

