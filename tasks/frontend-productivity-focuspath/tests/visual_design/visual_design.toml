[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The milestone path is built from divs and borders — circular nodes, thin connectors, dashed upcoming styling — with node/connector fill matching the completion the progress bar reports."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The palette matches the spec: teal primary buttons and path lines, gold active-milestone highlight, green completed nodes/steps, amber Needs Attention badge, red delete controls, off-white app background on white cards."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Typography follows the spec: serif (Fraunces/Georgia) goal and milestone titles, sans (Inter/system-ui) body chrome, and monospace target dates."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "Primary buttons use a teal fill with white text and rounded corners while secondary controls use a bordered light surface, giving a clear visual hierarchy."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "Delete confirmations and the Today's Focus limit message appear as native browser alert()/confirm() dialogs rather than inline styled UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The active milestone, completed milestones, and upcoming milestones are visually indistinguishable, or node fill contradicts the reported completion percentage."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "consistent_component_language"
description = "Buttons, form fields, badges, progress bars, and inline alerts share one consistent component language across all views, restyled to the task's teal/gold/off-white palette rather than left in a default component-library theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "single_icon_set"
description = "Icons across the header, buttons, badges, and stream controls come from a single consistent icon set, with no mixed icon styles and no emoji standing in for icons."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "spec_corner_radii"
description = "Milestone nodes are fully rounded circles, goal cards and step rows use 8px rounded corners, and form fields use 6px rounded corners, per computed styles."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "mobile_vertical_path_no_overflow"
description = "At about 375px viewport width the roadmap switches from a horizontal to a vertical stacked path with no horizontal scrolling, the Today's Focus panel moves below the path, no content clips or overflows the viewport, and all controls remain reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "desktop_path_focus_side_by_side"
description = "At desktop widths of 1024px and above, the goal detail view shows the milestone path and the Today's Focus panel side by side."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "specific_labels_consistent_case"
description = "Headings, buttons, and badges use one consistent capitalization convention throughout, and action labels are specific (+ New Goal, + Add Milestone, Mark Goal Complete, Focus Today) rather than generic labels like OK or Go."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "actionable_error_and_empty_copy"
description = "Error and limit messages name the problem and the fix, and empty states explain what belongs there and how to add it."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "placeholder_text_shipped"
description = "Lorem ipsum, TODO, template-variable, or other placeholder text is visible somewhere in the shipped UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.15"
name = "svg_path_element_in_roadmap"
description = "The milestone roadmap is rendered with an SVG path element or charting/diagramming library output instead of divs and borders."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.16"
name = "single_page_view_switching"
description = "The goals overview, a goal's detail path view, and the Completed Goals section render as views within the single / page — switching between them never navigates to a separate route."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
