[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "milestone_path_divs_and_borders"
description = "The milestone path is built from divs and borders — circular nodes, thin connectors, dashed upcoming styling — with node/connector fill matching the completion the progress bar reports."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "calm_productivity_palette"
description = "The palette matches the spec: teal #2b6f6e primary buttons and path lines, gold #c98a3d active-milestone highlight, green #3f9d6b completed nodes/steps, amber #d9a441 Needs Attention badge, red #c1483f delete controls, off-white #f6f5f0 app background on white #ffffff cards."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "serif_sans_mono_typography"
description = "Typography follows the spec: serif (Fraunces/Georgia) goal and milestone titles, sans (Inter/system-ui) body chrome, and monospace target dates."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "primary_secondary_button_hierarchy"
description = "Primary buttons (+ New Goal, + Add Milestone, Mark Goal Complete, Export Download) use a teal fill with white text and rounded corners while secondary controls (reorder, Focus Today, Undo, Redo, Import) use a bordered light surface, giving a clear visual hierarchy."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "native_alert_instead_of_inline_ui"
description = "Delete confirmations, the Today's Focus limit message, Export, Import, or the command palette appear as native browser alert()/confirm() dialogs rather than inline styled UI."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "milestone_states_indistinguishable"
description = "The active milestone, completed milestones, and upcoming milestones are visually indistinguishable, or node fill contradicts the reported completion percentage."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "consistent_component_language"
description = "Buttons, form fields, badges, progress bars, and inline alerts share one consistent component language across all views, restyled to the task's teal/gold/off-white palette rather than left in a default component-library theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "single_icon_set"
description = "Icons across the header, buttons, badges, stream controls, Export, and command palette come from a single consistent icon set, with no mixed icon styles and no emoji standing in for icons."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "spec_corner_radii"
description = "Milestone nodes are fully rounded circles, goal cards and step rows use 8px rounded corners, and form fields use 6px rounded corners, per computed styles."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.10"
name = "mobile_vertical_path_no_overflow"
description = "At about 375px viewport width the roadmap switches from a horizontal to a vertical stacked path with no horizontal scrolling, the Today's Focus panel moves below the path, no content clips or overflows the viewport, and all controls remain reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_drawer_visual_anatomy"
description = "Export appears as a drawer or modal with format tabs (Path Pack JSON / Markdown report), a scrollable text preview, and Copy and Download affordances."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "desktop_path_focus_side_by_side"
description = "At desktop widths of 1024px and above the detail view shows the milestone path and the Today's Focus panel side by side."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "svg_path_or_chart_library_path"
description = "The milestone path is rendered with an SVG path element or a charting/diagramming library rather than divs and borders."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "default_daisyui_theme_untouched"
description = "Buttons, badges, or alerts remain in an obvious default DaisyUI theme look rather than the specified teal/gold/off-white palette."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "visual_design.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true

