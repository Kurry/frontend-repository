[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Completing a milestone's final step by clicking its real checkbox animates the node filling in as it transitions to the completed solid state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Navigating between the overview and a goal's detail view by clicking the real controls transitions smoothly rather than cutting abruptly."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Milestone nodes, checklist rows, and Focus Today toggles show a visible hover state and a visible keyboard focus outline when hovered/focused via the real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Milestone nodes, step rows, and toggles present no hover or keyboard-focus affordance, appearing visually inert to pointer and keyboard interaction."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "add_delete_reorder_animate"
description = "Adding a goal card, milestone, or step through the real UI animates the new item into place rather than snapping; deleting one animates it out; moving a milestone with the up/down reorder buttons slides it to its new position instead of teleporting."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "inline_feedback_transitions_in"
description = "Inline feedback (validation messages, the Today's Focus limit message, delete confirms) appears with a brief transition rather than popping in instantly."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "progress_bar_animates_fill"
description = "Toggling a step via its real checkbox animates the goal progress bar's fill width to the new percentage rather than jumping instantly."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, animations are removed or reduced to near-instant while every state change (step toggles, milestone completion, view switches) still lands correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
