[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "milestone_node_fill_animates"
description = "Completing a milestone's final step by clicking its real checkbox animates the node filling in as it transitions to the completed filled state."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "overview_detail_transition_smooth"
description = "Navigating between the overview and a goal's detail view by clicking the real controls transitions smoothly rather than cutting abruptly."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "hover_and_focus_washes"
description = "Milestone nodes, checklist rows, and Focus Today toggles show a visible hover state and a visible keyboard focus outline when hovered/focused via the real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "add_delete_reorder_animate"
description = "Adding a goal card, milestone, or step through the real UI animates the new item into place rather than snapping; deleting one animates it out; moving a milestone with the up/down reorder buttons slides it to its new position instead of teleporting."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "inline_feedback_transitions_in"
description = "Inline feedback (validation messages, the Today's Focus limit message, delete confirms) appears with a brief transition rather than popping in instantly."
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "progress_bar_animates_fill"
description = "Toggling a step via its real checkbox animates the goal progress bar's fill width to the new percentage rather than jumping instantly."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, animations are removed or reduced to near-instant while every state change (step toggles, milestone completion, view switches, Export open) still lands correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "export_and_palette_enter_exit"
description = "The Export drawer or modal and the command palette enter and exit with a brief opacity and scale transition when opened and closed via the real controls; Copy and Download show a short confirmation before resetting."
type = "binary"
weight = 0.5

