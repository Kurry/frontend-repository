[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_4px_scale"
description = "Spacing and sizing follow the 4px base unit from the instruction, with no arbitrary one-off gaps that break the calm overview/detail rhythm visible in the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_instruction"
description = "Typography matches the instruction: serif goal/milestone titles, sans body chrome, monospace target dates."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_overview"
description = "At desktop width the goals overview layout (header, cards, Today's Focus / stream regions) matches /reference-screenshots/ overview composition within a small tolerance; where screenshot and text conflict, the instruction text wins."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the instruction calls out: add/delete items, milestone completion fill-in, overview-detail navigation, and Export/palette enter."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_instruction"
description = "Responsive behavior matches the instruction: vertical path at ~375px, side-by-side path and Today's Focus at >=1024px."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Button and form radii (6px fields/buttons, 8px cards/rows), padding, and primary button shadow conform to the visual_design spec."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography has a clear hierarchy distinguishing the FocusPath header, goal titles, milestone titles, and body/UI chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, focus, disabled for Undo/Redo empty and locked reorder) are visibly distinct per the instruction."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_palette"
description = "Color, card surfaces, and badge treatments match the specified teal/gold/green/amber/red palette on off-white/white grounds."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "path_microinteractions_match_spec"
description = "Path node hover/focus washes and completion fill-in follow the motion/visual instruction rather than omitting feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_anatomy_matches_instruction"
description = "Export drawer/modal anatomy matches the instruction: Path Pack JSON and Markdown tabs, scrollable preview, Copy and Download."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the specified 4px scale or corner radii in a way that diverges sharply from the reference overview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "palette_contradicts_reference"
description = "The shipped palette clearly contradicts the instruction's teal/gold/off-white system (for example default purple theme or stark unrelated colors) while claiming to recreate the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable design-fidelity defect versus the instruction and reference screenshots that is NOT covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered — even partially — by another criterion, answer no here."
type = "binary"
negate = true
weight = 1.0

