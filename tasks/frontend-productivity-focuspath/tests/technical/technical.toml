[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "reload_resets_to_empty_overview"
description = "After creating goals, milestones, steps, Today's Focus selections, and Completed Goals entries, a full page refresh returns the empty overview with empty undo/redo stacks and no revived session data."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "deleted_items_stay_gone_in_session"
description = "A goal, milestone, or step deleted in the current session stays gone until Undo or Import restores it; it does not spontaneously reappear while navigating overview and detail views."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "interactive_load_no_blank"
description = "The app reaches an interactive UI on load and hard reload with no blank page, framework error overlay, or noscript fallback."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "A full exercise of the app — creating, editing, reordering, focusing, completing, deleting, exporting, importing, undoing, and driving the live stream controls — produces no console errors or warnings, uncaught JavaScript exceptions, or unhandled promise rejections."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "rapid_create_25_exact_count"
description = "Driving the primary collection through 25 rapid deterministic repetitions keeps an exact final count with responsive controls and no blank screen, uncaught error, or sustained freeze."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.7"
name = "stream_idempotent_reconnect"
description = "Delivering a duplicate live event does not double-apply it, and reconnecting catches up missed events exactly once without an accumulating loop."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "keyboard_operable_visible_focus"
description = "Every interactive control (buttons, checkboxes, reorder arrows, Focus Today toggles, stream controls, Undo, Redo, Export, Import, command palette) is reachable and operable with the keyboard alone, showing a visible focus indicator as it is reached."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "labeled_fields_adjacent_errors"
description = "Form fields carry visible labels, and inline validation messages are rendered in the DOM adjacent to the field they describe and name the field and rule (title length, YYYY-MM-DD, accent palette)."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "state_distinguishable_without_color"
description = "Checked versus unchecked step states, disabled reorder controls, and the read-only completed path are each distinguishable without relying on color alone (e.g. via icons, strikethrough, borders, or text)."
type = "binary"
weight = 0.5

[[criterion]]
id = "2.15"
name = "interactive_within_2s"
description = "The app is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "cross_view_state_coherence"
description = "A change made in one view (a step toggle, an inline edit, a focus toggle, an export preview refresh) is immediately reflected in every other view showing that datum — overview card, detail path, Today's Focus panel, Daily Velocity, and Export previews — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "export_dialog_focus_management"
description = "The open Export drawer or modal uses dialog semantics, keeps Tab focus trapped inside it, closes on Escape, and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "path_pack_schema_validation_runtime"
description = "Import of parseable JSON that fails the Path Pack field contract (wrong format string, missing activeGoals, accentColor outside the 8 swatches, or title over max length) leaves goals and Export unchanged and shows validation naming the offending field."
type = "binary"
weight = 1.0

