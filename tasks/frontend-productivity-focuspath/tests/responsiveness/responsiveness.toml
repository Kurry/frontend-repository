[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Layout adapts from 1440px desktop (path and Today's Focus side by side at >=1024px) to about 375px mobile (vertical stacked path)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_reachable"
description = "At 375px width, + New Goal, Focus Today, reorder, Export, and stream controls remain reachable and tappable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_narrow"
description = "Goal titles and body chrome remain readable at 375px without overlapping or truncating into illegibility."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_375"
description = "At 375px width no content clips or overflows the viewport and page-level horizontal scrolling does not appear."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_palette_usable_narrow"
description = "Export, Import, and the command palette stay fully visible and operable at small widths rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "focus_panel_stacks_below_path"
description = "At about 375px the Today's Focus panel moves below the path rather than beside it."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "path_vertical_no_horizontal_scroll"
description = "At about 375px the roadmap switches to a vertical stacked path with no horizontal scrolling of the path."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "Small screens have no page-level horizontal scrolling while exercising overview, detail, and Export."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "desktop_side_by_side_detail"
description = "At 1024px and above the detail view shows the milestone path and Today's Focus panel side by side."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "header_controls_remain_accessible"
description = "Header controls (+ New Goal, Undo, Redo, Export, Import, command palette) remain accessible across desktop and 375px widths."
type = "binary"
weight = 1.0

