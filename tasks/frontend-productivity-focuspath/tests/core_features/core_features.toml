[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with no data, the overview shows \"Set your first goal to start building a path\" and a \"+ New Goal\" call to action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "When \"+ New Goal\" is clicked, an inline form opens offering a required title, optional target date, exactly 8 fixed accent-color swatches (not a free-form picker), and a \"Why this matters\" note; submitting a goal titled \"Learn Piano\" adds a card showing its accent color and a 0% progress bar."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating three goals with target dates next month, next week, and none, the overview lists them nearest-target-date first with the no-date goal sorted last."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After opening a goal and adding three milestones with \"+ Add Milestone\", they render as numbered nodes connected by a line in order, with the first as the highlighted active node and the others as outlined/dashed upcoming nodes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When every action step of the first milestone is checked, the milestone auto-completes the instant the last step is checked, its node/connector become solid, and the second milestone becomes the highlighted active one."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After a milestone completes, its up/down reorder controls are disabled and an inline note reads \"Reordering disabled — an earlier milestone is complete\" (or \"— this milestone is complete\"); reordering two still-incomplete milestones with the buttons swaps their order."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "On a milestone with zero steps, \"Add a step to make progress\" is shown and no control marks it complete; adding two steps and checking both auto-completes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "On a goal with 4 steps across two milestones, completing 2 shows 50% and completing a 3rd live-updates to 75% as both a number and a matching progress-bar fill in the detail header, aggregating across milestones."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After toggling \"Focus Today\" on 4 steps across two goals, the Today's Focus panel lists only the first 3 with quick-complete checkboxes and the 4th toggle shows an inline message to complete or unfocus one first."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When the app's stored focus-date is changed to a non-today value via browser_evaluate and the page is reloaded, the Today's Focus panel is empty while the underlying steps' complete/incomplete state is unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When a goal is seeded (matching the created localStorage schema) with an incomplete milestone whose latest step-completion/creation date is more than 7 days ago, both its overview card and detail view show a \"Needs Attention\" badge, which clears after completing a fresh step dated today."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "\"Mark Goal Complete\" is absent below 100% and appears only at 100%; confirming it moves the goal into a toggle-visible \"Completed Goals\" section with a recorded date and a read-only path whose steps cannot be toggled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After creating a goal with milestones, completed/incomplete steps, and a Today's Focus selection, a full page refresh restores the exact state; a deleted goal, milestone, or step is not revived after refresh."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "The live activity stream exposes Start, Pause, Reconnect, and \"Deliver Out of Order\" controls with a visible status; starting, delivering out of order, and reconnecting resolves the applied-event ledger in logical-timestamp order with each event applied exactly once and no duplicates."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "milestone_reverts_on_uncheck"
description = "After a milestone has auto-completed, unchecking one of its steps via its real checkbox reverts the milestone to incomplete: its node loses the solid completed fill, it becomes the highlighted active milestone again, and the goal's percentage drops accordingly."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Goal title, target date, and motivation, and milestone and step titles, are all editable inline and reflect immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Deleting a goal or milestone through its inline confirm step also removes its nested milestones and steps from the path."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "zero_milestone_empty_state"
description = "Opening a goal that has zero milestones shows \"Add your first milestone to build this path\" in place of the roadmap."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "blank_title_accepted"
description = "Submitting the New Goal form with a blank title adds a goal anyway, or rejects it without an inline \"Goal title is required\" message rendered next to the title field."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "Reorder up/down controls stay enabled on a milestone when it or an earlier milestone is already complete, letting completed order be shuffled."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "A goal's completion percentage reflects only a single milestone's steps rather than aggregating across all its milestones."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "submit_disabled_until_title_valid"
description = "The New Goal form's submit control is disabled while the title field is empty and becomes enabled as soon as a non-empty title is typed."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "all_forms_inline_field_errors"
description = "Each form in the app (goal create and edit, milestone add, step add and edit) validates before submit and shows an inline per-field error message that names the field, rendered next to the offending field rather than as a browser alert."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "flow_create_goal_roundtrip"
description = "Starting from an overview with at least two dated goals, create a goal whose target date falls between theirs: exactly one new card appears in the correct sort position, opening it shows the same title, target date, motivation note, and accent color, and after a full page refresh the same goal reappears with identical fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "flow_steps_progress_cross_view"
description = "Add a milestone with two steps and check both in the detail view: the milestone's node fills solid and the detail progress bar and percentage rise; returning to the overview shows the same raised percentage and steps-completed count on that goal's card without a reload; reloading the page restores the same checked steps, node fill, and percentages exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "flow_focus_quick_complete_roundtrip"
description = "Toggle three steps from two different goals into Today's Focus so all three appear in the panel; ticking one focused step's quick-complete checkbox marks the same step complete in its milestone checklist and updates that goal's percentage on both the detail view and its overview card without a reload; after a refresh, the remaining focus selections and the completed step are all restored."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "flow_goal_completion_chain"
description = "Count the active goal cards, then check the final remaining step of a goal's last incomplete milestone: the milestone auto-completes, the goal reads 100%, and \"Mark Goal Complete\" appears; confirming it decreases the active-goal card count by exactly one (measured immediately around the action), shows the goal inside the toggle-visible Completed Goals section with a recorded completion date and a read-only path, and a refresh keeps the goal in Completed Goals without reviving it in the active list."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "flow_delete_goal_cascades"
description = "With one of a goal's steps toggled into Today's Focus, delete that goal through its inline confirm step: its card leaves the overview and its step leaves the Today's Focus panel immediately, and a subsequent refresh revives neither the goal nor any of its milestones or steps."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "double_submit_idempotent"
description = "Rapidly activating a create form's submit control twice in quick succession creates exactly one record: the relevant count increases by one and exactly one new item appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "invalid_input_preserves_state"
description = "Submitting invalid or extreme input (a blank required title, an out-of-range date, or absurdly long text) is rejected with a specific inline message naming the field, and the previously committed data is left untouched."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "stream_duplicate_and_order_convergence"
description = "On the live activity stream, delivering the same event twice changes the applied-event ledger only once, and delivering a set of events out of order settles the ledger into the same final state as delivering them in order."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core feature behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
