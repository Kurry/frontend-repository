[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "three_column_chat_primary"
description = "At desktop width the workspace uses a three-column communication layout with the chat transcript and composer as the visually primary center column, session/identity on one side and the file-transfer queue as secondary content on the other"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "badge_state_colors_distinct"
description = "The connection badge is a small pill using a visually distinct background/text color for each of the idle, connecting, waiting, and disconnected states"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "theme_toggle_recolors_only"
description = "A chrome control near the top of the page switches the whole workspace between a light and a dark surface, recoloring backgrounds, borders, and text while keeping the same layout and badge color coding"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "chat_bubbles_distinguish_sender"
description = "Chat bubbles visually distinguish the local user's own sent messages (right-aligned, filled accent color) from the seeded demo/loopback lines (left-aligned, neutral surface)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "mobile_restack_order"
description = "At 375 by 667 pixels the three columns restack vertically in session, chat, then file-transfer order, and the chat transcript and composer remain reachable without horizontal scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "badge_states_visually_identical"
description = "The app fails this criterion if all four connection-badge states render with identical or near-identical color treatment, leaving state distinguishable only by reading the label text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.7"
name = "queue_visually_dominates_chat"
description = "The app fails this criterion if the file-transfer queue is given equal or greater visual weight than the chat transcript, rather than remaining secondary"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "2.8"
name = "queue_table_name_size_status_columns"
description = "The file queue renders as a compact table with a selection checkbox, drag handle, Name, Size, Status, and Progress per row"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "consistent_icon_set_on_controls"
description = "Every labeled control and status region (session, chat, file-transfer, and theme controls) pairs its text with a small icon, and all icons share one consistent visual style and stroke weight"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "no_viewport_overflow_at_375"
description = "At 375 pixel width no content clips or overflows the viewport and no horizontal scrollbar appears on the page; if the queue table is wider than its panel it scrolls inside that panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "verb_labels_consistent_capitalization"
description = "Control labels are specific verbs or verb phrases (Join Room, Leave Room, Send) and follow one consistent capitalization convention across the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.12"
name = "demo_lines_labeled_as_demo"
description = "The seeded transcript lines are explicitly labeled as local/demo content so they cannot be read as messages from a real peer"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "empty_states_name_next_step"
description = "The file-queue empty state and the disabled-composer note each name the situation and what the user can do next"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.14"
name = "placeholder_text_visible"
description = "The app fails this criterion if lorem ipsum or placeholder text (\"TODO\", \"Lorem\", \"asdf\", template variable names like {{title}}) is visible anywhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "2.15"
name = "export_import_controls_in_chrome"
description = "Export Session and Import Session controls are visible in the communication workspace chrome alongside the session, chat, and file-transfer panels rather than buried behind an unrelated route"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.16"
name = "queue_status_pills_distinct_colors"
description = "Each of the five queue statuses (Not Started, Transferring, Paused, Completed, Canceled) renders as a small pill with a visually distinct background/text color, legible at a glance rather than only from its label"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "progress_bar_with_numeric_readout"
description = "Each queue row's progress renders as a horizontal bar paired with a numeric readout showing percent plus bytes transferred of total"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "bulk_bar_only_with_selection"
description = "The bulk action bar is hidden with nothing selected and appears with the selected count beside Remove Selected and Retry Selected once at least one row is checked"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.19"
name = "transfer_log_timestamped_list"
description = "The transfer log renders as a timestamped list, newest entry first, each entry pairing the event name with its file name"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design, layout, responsiveness, or UI copy that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
