[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "command_session_and_artifact_transfer_bound"
description = "Contract-mandated modules command-session-v1 and artifact-transfer-v1 are initialized and bound."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "session_and_artifact_handlers_match_ui"
description = "session connect/disconnect/start/pause/resume/stop/restart and artifact import/export/copy handlers drive the same badge, queue rows, progress readouts, and Session Pack/Transcript surfaces as Join Room, Leave Room, choose-file, the per-row transfer controls, Export Session, Export Transcript, and Copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_session_and_artifact_ops"
description = "Only declared operations are available: session connect/disconnect/start/pause/resume/stop/restart and artifact import/export/copy with export formats session-json and transcript-markdown."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "session_and_artifact_tools_automation_exercisable"
description = "The declared session tools (connect, disconnect, start, pause, resume, stop, restart) and artifact tools (import, export, copy) can be exercised via webmcp_invoke_tool automation."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "session_connect_disconnect_work"
description = "Declared session operations connect and disconnect update the visible connection badge through the same state machine as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_connect_respects_room_id_contract"
description = "Invoking session_connect with an empty or illegal room_id does not advance the badge out of idle and aligns with the JoinSession field-contract rejection visible in the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_export_format_is_session_json"
description = "Artifact export is bound to the declared session-json and transcript-markdown export formats that surface the Session Pack JSON and markdown transcript in the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond command-session-v1 and artifact-transfer-v1, and no undeclared operations beyond the declared session (connect, disconnect, start, pause, resume, stop, restart) and artifact (import, export, copy) sets, are exposed."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "webmcp_session_list_invoke_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are present and callable; list_tools includes the declared session and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "webmcp_initializes_on_load"
description = "WebMCP tools initialize on app load without manual editing or test-harness changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "session_or_artifact_tools_missing_or_noop"
description = "session_connect, session_disconnect, artifact_import, artifact_export, or artifact_copy is unbound, missing, or a no-op."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "Handlers do not match UI logic because actions mismatch or state does not sync."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_webmcp_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the weblink contract bindings are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "webmcp_bypasses_field_contract"
description = "WebMCP session_connect accepts an illegal room_id that the Join Room UI rejects, desyncing MCP and UI field-contract state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "command_session_or_artifact_module_missing"
description = "command-session-v1 or artifact-transfer-v1 is declared but not implemented."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.11"
name = "session_transfer_tools_respect_row_state"
description = "Declared session start/pause/resume/stop operations respect row state through the same machine as the UI: pause on a Paused row or resume on a row that was never started produces no fabricated progress and no desync between tool result and the visible row"
type = "binary"
weight = 0.5

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
