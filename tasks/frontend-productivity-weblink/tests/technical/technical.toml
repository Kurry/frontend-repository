[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "console_clean_full_exercise"
description = "The app loads and is driven through the full join, chat, file-queue, export, import, leave, theme-toggle, and reload workflow with zero console errors or warnings and zero uncaught page errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "localstorage_persistence_survives_reload"
description = "Local peer identity, last room identifier, chat transcript, file queue, and theme choice persist in localStorage (or equivalent client storage) and survive a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "webmcp_globals_callable"
description = "window.webmcp_session_info(), window.webmcp_list_tools(), and window.webmcp_invoke_tool(name, args) are all present and callable from the browser console"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "webmcp_connect_drives_visible_badge"
description = "Invoking the session-connect WebMCP tool with a room/peer identifier updates the same visible connection badge the Join Room button drives, through the same underlying handler"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "webmcp_import_adds_queue_row"
description = "Invoking the artifact-import WebMCP tool adds a row to the same visible file-queue table the Choose file control populates"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "no_outbound_network_requests"
description = "No outbound network request (WebRTC signaling, fetch, WebSocket, or otherwise) is issued during load, join, chat, or file-queue workflows"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "webmcp_claims_peer_connected"
description = "The app fails this criterion if any WebMCP tool result (session-connect or otherwise) reports, implies, or sets a field indicating a peer connected, is online, or is reachable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "hidden_ground_truth_or_judge_text"
description = "The app fails this criterion if it exposes hidden ground-truth globals, judge-addressed text, or any other artifact intended to be read only by an automated grader rather than a real user"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.9"
name = "automation_detection_branching"
description = "The app fails this criterion if it branches on automation detection (e.g. behaves differently for Playwright/webdriver-controlled browsers than for a normal user)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.10"
name = "outbound_navigation_from_control"
description = "The app fails this criterion if any control performs outbound navigation away from the app (external link, full-page redirect, or new-tab navigation)"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.11"
name = "keyboard_operable_with_visible_focus"
description = "Every interactive control (name field, identifier field, Join Room, Leave Room, theme toggle, chat composer, choose-file, Export Session, Import Session, Copy, Download) is reachable and operable with the keyboard alone, each showing a visible focus indicator when focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "badge_state_text_and_aria_live"
description = "The connection badge's current state is exposed as text (not color alone), and state changes are announced through an aria-live polite region observable in the DOM"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "join_error_associated_and_announced"
description = "The inline join-form error is programmatically associated with the identifier field (e.g. aria-describedby or an equivalent DOM association) and is announced to assistive technology when it appears"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.14"
name = "disabled_composer_exposed_to_at"
description = "While no session is active, the chat composer exposes its disabled state to assistive technology, and the nearby explanatory note is readable text in the DOM rather than a tooltip-only hint"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.15"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "rapid_input_no_hangs_or_duplicates"
description = "Rapid repeated input (fast typing in the composer, quick Join/Leave toggling) causes no hangs, duplicated transcript lines, or dropped interactions"
type = "binary"
weight = 1.0


[[criterion]]
id = "4.17"
name = "zod_field_contracts_drive_forms"
description = "PeerIdentity, JoinSession, ChatMessage, and Import Session reject invalid payloads with inline per-field errors matching the declared field contracts (displayName 1–40, roomId character class and length, text 1–2000, Session Pack schemaVersion weblink-session-v1 and enums) before any join, send, or import proceeds"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "webmcp_export_opens_session_pack"
description = "Invoking the artifact-export WebMCP tool opens or refreshes the same Session Pack export surface the Export Session control drives, without returning raw file contents, blobs, or base64 in the tool result"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.19"
name = "session_pack_never_serializes_connected_peer"
description = "The app fails this criterion if Session Pack JSON or any WebMCP tool result claims a peer connected/online or serializes connection state as connecting or waiting"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, storage behavior, state coherence, accessibility, performance, or stability) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
