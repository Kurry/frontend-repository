[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_queue_state_present"
description = "When the file queue is empty, an empty-state message explains that chosen files will appear there."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "field_contracts_validate_inline"
description = "PeerIdentity, JoinSession, ChatMessage, and Import Session validate inline before commit, naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_contract_errors_name_field"
description = "Field-contract errors name the field (displayName, roomId, text, or the import offender) rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_session_pack_shows_confirmation"
description = "Copy in Export Session shows a visible confirmation after placing Session Pack JSON on the clipboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "connecting_badge_shows_in_progress"
description = "Immediately after a valid Join Room, the connection badge shows a connecting label before settling to waiting for peer within 5 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "leave_room_cancels_pending_attempt"
description = "Leave Room cancels a connecting or waiting attempt immediately, returning the badge to disconnected without requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "disabled_composer_note_explains_why"
description = "While idle or disconnected, the disabled composer has a nearby note explaining that sending is unavailable because no session is active."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, and labels use semantic tags."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_import_surfaces_support_close"
description = "Export Session and Import Session surfaces can be dismissed via an explicit close control and/or Escape."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "long_flows_show_progress"
description = "Long task flows provide progress or feedback steps."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_queue_has_no_feedback"
description = "An empty file queue shows nothing and provides no empty-state feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Errors are surfaced only in the browser console."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Actions lack visible feedback and silently succeed or fail."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "destructive_actions_lack_warning"
description = "Destructive actions have no warnings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap interactive elements."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Modal overlays cannot be dismissed via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "field_contract_feedback_missing_or_delayed"
description = "Field-contract validation feedback for roomId, displayName, text, or Import is missing or delayed with no UI indication."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Button text is ambiguous or missing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "non_obvious_flows_lack_guidance"
description = "Non-obvious flows have no in-app guidance at all."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Interactive affordances are visually hidden or inaccessible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "reload_mid_transfer_restores_paused"
description = "Reloading the page while a row is Transferring restores that row as Paused at its saved progress readout — never as Transferring and never reset to zero"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "remove_all_returns_empty_state"
description = "Selecting every queue row and clicking Remove Selected returns the queue to its empty-state message, hides the bulk action bar, and clears the select-all checkbox"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "import_rejects_invalid_transfer_fields"
description = "Importing a Session Pack whose fileQueue contains status transferring, a bytesTransferred outside 0 to sizeBytes, or a transferLog event outside the closed enum shows validation naming the offending field and changes nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "zero_byte_file_completes_cleanly"
description = "Starting a transfer for a zero-byte file completes it immediately at 100 percent with no malformed readout (no NaN, Infinity, or negative values)"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.n11"
name = "log_rewrites_history"
description = "Cancel, Retry, or Remove rewrites or deletes earlier transfer-log entries instead of appending new ones."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
