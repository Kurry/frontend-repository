[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_round_trip"
description = "Multi-facet reload round-trip: edit displayName, enter a valid roomId, send one chat line while connecting/waiting, queue one file and start then pause its transfer, and toggle theme, then reload. Every facet (name, client ID, roomId, seeded plus sent transcript, file queue with the row Paused at its saved progress, transfer log, theme) is restored from local storage — never a mix of restored and reset facets — and the connection badge resumes at idle or disconnected."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "session_pack_preview_tracks_mutations"
description = "Derived Session Pack proof: note the Export Session preview, then change displayName and send a distinctive chat line; reopening Export shows those new values in peer.displayName and messages, proving the preview is derived from live store state rather than a static snapshot."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "badge_and_composer_track_session_state"
description = "Derived-view sensitivity: Join Room moves the badge from idle through connecting to waiting and enables the composer; Leave Room returns disconnected and disables the composer with its note — both surfaces track session state rather than staying identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "chat_and_export_cross_echo"
description = "Cross-view echo: send a distinctive chat line while waiting, then open Export Session without reload; the Session Pack messages array contains that same text."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "transcript_and_queue_count_deltas"
description = "Count-delta integrity: measure transcript lines immediately before and after one valid send (delta exactly +1); measure queue rows immediately before and after choosing one file (delta exactly +1)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_room_ids_and_messages_differ"
description = "Input-dependent output: join with roomId A and send message text A, note the Session Pack; leave and join with roomId B and send text B; Export shows roomId B and text B, not A."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_chat_and_queue_preserve_state"
description = "Interleaved-flow integrity: while waiting, send a chat line, queue a file, toggle theme, then send a second chat line; both transcript lines and the queue row remain, and Export Session contains all of them with the matching theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "import_rejected_then_valid_round_trip"
description = "Edge-state round-trip: attempt Import Session with JSON that fails the field contract (state unchanged with a named error), then Import a valid previously downloaded Session Pack; panels and a fresh Export reconstruct the pack."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_localstorage_persistence"
description = "After reload, some of displayName, roomId, transcript, file queue, or theme silently revert while others survive, producing incoherent partial persistence."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "session_pack_ignores_mutations"
description = "The Session Pack export preview renders identically regardless of displayName, roomId, chat, file-queue, or theme mutations."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_session_inputs_identical_export"
description = "Joining different roomIds or sending different chat texts yields byte-identical Session Pack export previews."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "export_stale_until_reload"
description = "Session mutations appear in the panels but not in Export Session until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "transfer_pause_resume_checkpoint_probe"
description = "Checkpoint probe: Start a transfer, Pause it, and record the exact bytes readout; Resume and let it finish; at no point after Resume is the readout lower than the recorded value, the row completes at exactly 100 percent, and Export Session shows that row Completed with bytesTransferred equal to sizeBytes"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "batch_remove_count_delta"
description = "Batch count delta: queue three files, select exactly two via checkboxes, and click Remove Selected; the queue row count drops by exactly two, the unselected row survives with its name intact, the transfer log gains one removed entry per deleted file, and the Session Pack fileQueue length matches the visible count"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "reorder_echoes_to_export"
description = "Order echo: drag a queue row to a new position, then open Export Session without reload; the fileQueue array serializes rows in the new on-screen order, and reloading preserves the same order"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "transcript_export_input_dependent"
description = "Input-dependent transcript: send distinctive text A and open Export Transcript (contains A); send distinctive text B and reopen; the regenerated markdown contains both A and B in transcript order — never a stale document missing B"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "progress_ignores_pause_or_rewinds"
description = "A paused row's readout keeps advancing while Paused, or Resume restarts the readout from zero instead of the frozen value."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n6"
name = "transfer_log_static_or_rewritten"
description = "Queue lifecycle actions add no transfer-log entries, or later actions rewrite or delete earlier log entries instead of appending."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
