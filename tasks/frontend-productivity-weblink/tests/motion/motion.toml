[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "buttons_hover_feedback"
description = "Join Room, Leave Room, the theme toggle, and the choose-file control each show a hover feedback change (background, border, or shadow) on pointer hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "badge_color_transitions_smoothly"
description = "The connection badge transitions its background/text color smoothly rather than snapping instantly whenever the connection state changes (idle to connecting, connecting to waiting, waiting to disconnected)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "row_hover_wash_and_composer_focus_ring"
description = "File queue rows show a background tint when the pointer hovers over them, and the chat composer input shows a visible focus ring when focused"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "theme_switch_transitions_smoothly"
description = "Switching between light and dark surfaces recolors backgrounds, borders, and text with a short smooth transition rather than an instant flip"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "no_hover_feedback_on_primary_buttons"
description = "The app fails this criterion if Join Room, Leave Room, or the theme toggle show no hover feedback at all"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "composer_state_change_without_feedback"
description = "The app fails this criterion if the chat composer's enabled/disabled transition (idle/disconnected versus connecting/waiting) happens with no visible feedback at the moment of the state change"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.7"
name = "buttons_scale_down_on_press"
description = "Join Room, Leave Room, the theme toggle, and the choose-file control each apply a brief scale-down while pressed, verified by pressing the real controls"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.8"
name = "message_and_row_entrance_animation"
description = "A newly sent chat message animates into the transcript with a brief slide/fade rather than appearing instantly, and a newly added file queue row animates in the same way — both verified through the real composer and choose-file controls, not a state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "join_error_animates_in"
description = "The inline join-form error appears with a short fade or slide rather than popping in instantly, verified by activating Join Room with an empty identifier"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "reduced_motion_removes_animations"
description = "On a fresh load with prefers-reduced-motion set, entrance and transition animations are removed and state changes apply instantly, while joining, chatting, queueing files, and theme switching all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions (jank, jarring or broken animation, missing specified feedback) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
