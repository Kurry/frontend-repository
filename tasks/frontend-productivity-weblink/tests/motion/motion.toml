[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "buttons_hover_feedback"
description = "Join Room, Leave Room, the theme toggle, choose-file, Export Session, Import Session, Copy, and Download each show a hover feedback change (background, border, or shadow) on pointer hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "badge_color_transitions_smoothly"
description = "The connection badge transitions its background/text color smoothly rather than snapping instantly whenever the connection state changes (idle to connecting, connecting to waiting, waiting to disconnected)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "row_hover_wash_and_composer_focus_ring"
description = "File queue rows show a background tint when the pointer hovers over them, and the chat composer input shows a visible focus ring when focused"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "theme_switch_transitions_smoothly"
description = "Switching between light and dark surfaces recolors backgrounds, borders, and text with a short smooth transition rather than an instant flip"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "buttons_scale_down_on_press"
description = "Join Room, Leave Room, the theme toggle, choose-file, Export Session, Import Session, Copy, and Download each apply a brief scale-down while pressed, verified by pressing the real controls"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.8"
name = "message_and_row_entrance_animation"
description = "A newly sent chat message animates into the transcript with a brief slide/fade rather than appearing instantly, and a newly added file queue row animates in the same way — both verified through the real composer and choose-file controls, not a state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "join_error_animates_in"
description = "Inline field-contract errors (join, display name, composer, import) appear with a short fade or slide rather than popping in instantly, verified by activating Join Room with an empty identifier"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "reduced_motion_removes_animations"
description = "On a fresh load with prefers-reduced-motion set, entrance and transition animations are removed and state changes apply instantly, while joining, chatting, queueing files, exporting, importing, and theme switching all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "progress_fill_animates_smoothly"
description = "Started via the real Start control, a row's progress bar fill animates smoothly between increments rather than jumping in hard steps, with the numeric readout updating in the same moment"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.12"
name = "bulk_bar_and_log_entries_animate"
description = "The bulk action bar slides or fades in when the first row is selected and out when the selection clears, and new transfer-log entries animate in with a brief slide or fade"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "drag_lift_and_settle_feedback"
description = "While a queue row is dragged by its handle it lifts visually (shadow or slight scale) and settles into its new position on drop, verified through a real drag"
type = "binary"
weight = 0.5

