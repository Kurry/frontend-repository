[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_use_consistent_capitalization"
description = "Where the app renders headings and section titles, they use consistent capitalization (one convention — title case or sentence case — throughout)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders button or action labels, they are specific verbs or verb phrases (Join Room, Leave Room, Send, Export Session, Import Session, Copy, Download), not generic (Submit, OK) when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_problem_and_fix"
description = "Where the app renders field-contract error messages, they name the offending field (displayName, roomId, text, or import offender), not just a rejection (Invalid)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders the empty file-queue state and the disabled-composer note, the copy explains the situation and what the user can do next."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = "Where the app renders body or marketing copy, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_is_consistent"
description = "Where the app renders labels for the same concept in multiple places, terminology is consistent (not 'task' here and 'todo' there)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numbers_dates_and_units_are_consistent"
description = "Where the app renders numbers, dates, and units, formatting is consistent (same date format, same decimal precision, units labeled)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders Copy confirmation after Export Session, the message states that the Session Pack was copied, not a vague affirmation."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "status_labels_use_closed_enum"
description = "Where the app renders queue statuses, the five labels (Not Started, Transferring, Paused, Completed, Canceled) are worded identically everywhere they appear (row pills, transfer log, export preview), and no transfer copy claims a remote peer received or downloaded a file."
type = "binary"
weight = 0.5

