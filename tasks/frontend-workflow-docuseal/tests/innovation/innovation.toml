[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_field_microinteractions"
description = "Beyond bare placement, field entrance, submitter halo, and toast feedback feel polished and intentional (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "polished_export_motion"
description = "Export modal enter/exit and Copy confirmation feel competition-grade rather than an instant teleport (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "guided_empty_or_first_run_hints"
description = "The workspace offers helpful first-run or empty-field guidance beyond a bare zero count (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "rich_signing_status_visualization"
description = "Signing progress visualization goes beyond a plain text pill — for example clearer party-step treatment (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "keyboard_power_user_shortcuts"
description = "Beyond Delete and Undo/Redo chords, additional discoverable keyboard shortcuts speed field editing (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "submitter_or_template_personalization"
description = "Users can personalize submitter colours or template presentation beyond the minimum seed (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "cohesive_docuseal_brand_chrome"
description = "Docuseal wordmark and editor chrome read as a cohesive product brand rather than generic admin chrome (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "theme_or_density_beyond_requirements"
description = "Optional density or chrome theme controls appear beyond the required Build/Preview modes (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "offline_friendly_persistence_polish"
description = "Reload persistence and export/import feel like a durable local package workflow beyond the minimum (bonus)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_template_studio"
description = "The overall studio feels competition-grade: multi-select batch reassign, undo timeline, and Template JSON export polish read as a professional signing instrument (bonus)"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
