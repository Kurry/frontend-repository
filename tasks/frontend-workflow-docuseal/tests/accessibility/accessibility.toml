[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Every interactive control — top-bar actions including Undo, Redo, Export and Import, template rows, submitter rows, palette buttons, and panel inputs and buttons — is reachable and operable with the keyboard alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "export_modal_manages_focus"
description = "The Export modal traps focus while open, closes on Escape, and returns focus to the control that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Palette type glyphs and icon-only controls expose accessible names so their purpose is announced"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "toast_uses_live_region"
description = "Placements, reassignments, deletions, exports and imports are conveyed visually and via an aria-live status region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Field-name, template-name, add-submitter, and Import inputs use explicit labels associated with their controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings in the workspace follow a logical order with no skips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Landmark regions (for example main, complementary navigation for the rail) are present so assistive technology can navigate the three-pane layout"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Text and controls in the top bar, rail, canvas labels, and panel have sufficient color contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Semantic HTML roles such as button, dialog, and status are used for Export, palette actions, and toasts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "Animations respect the prefers-reduced-motion setting while Export, Import, undo/redo, and field flows remain completable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Undo, Redo, Export, Import, palette types, or panel controls cannot be activated or reached via keyboard"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured on top-bar or panel controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom components for palette types or Export use non-semantic tags and lack ARIA roles or labels"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Signing status or validation errors are indicated by color alone with no text cue"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "export_fails_to_trap_focus"
description = "The Export modal does not trap keyboard focus while open"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Text on the canvas field labels or panel is unreadable due to poor contrast"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Field-name or Import error feedback is visual only and is not associated for assistive technology"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Icon-only Export, Import, Undo, or Redo controls are missing accessible names"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings are skipped or unordered in the editor chrome"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Field entrance, toast, or Export modal animations ignore reduced-motion settings"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.11"
name = "undo_redo_expose_disabled_state"
description = "Undo and Redo expose their disabled state to assistive technology when their stacks are empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
