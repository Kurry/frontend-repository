[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_wash_and_press_down"
description = "Buttons, template rows, submitter rows, and palette buttons ease a hover wash on hover and show a slight press-down on click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "focus_ring_distinct_from_hover"
description = "Interactive controls show a visible keyboard focus ring on focus that is distinct from their hover treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "canvas_updates_in_place_no_reload"
description = "Placing, selecting, reassigning, duplicating, and deleting a field update the document canvas in place without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "selection_ring_and_submitter_hover_halo"
description = "Selecting a field applies a selection ring and reveals its handle, and hovering a field box shows a soft colour halo in the field submitter colour"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "toast_fades_in_and_out"
description = "Action feedback appears in a short-lived toast that fades in and out and is exposed as an aria-live status region"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.8"
name = "field_entrance_and_exit_animate"
description = "Placing a field by clicking a palette button animates the new field box into place with a brief entrance (fade/scale) rather than popping in, and deleting a field via the panel Delete field control animates it out — both verified through the real UI controls, not a WebMCP state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "submitter_row_animates_into_list"
description = "Clicking the Add submitter control animates the new row into the submitters list rather than it appearing instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "mode_switch_and_pill_update_in_place"
description = "The Build/Preview mode switch and the signing-status pill update in place without a page reload, and switching to Preview changes the field boxes to a dashed fillable affordance"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "export_modal_enter_exit_transition"
description = "Opening and closing Export through the real Export control shows a brief opacity/scale enter and exit transition on the modal"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "reduced_motion_keeps_flows_completable"
description = "With prefers-reduced-motion enabled on a fresh load, animations are removed or reduced to instant state changes while every flow — place, delete, undo/redo, export, and import — remains completable through the same controls"
type = "binary"
weight = 1.0

