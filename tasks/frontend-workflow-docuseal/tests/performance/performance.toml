[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive document workspace is under 2 seconds on local render"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings during place, edit, export, import, undo, and signing flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "field_updates_respond_immediately"
description = "Placing, selecting, reassigning, and deleting fields update the canvas immediately with no perceptible multi-second lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "export_regeneration_stays_responsive"
description = "Opening Export and switching Template JSON / Signing summary tabs regenerates previews without freezing the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "many_fields_render_without_lag"
description = "Placing many fields in succession keeps the canvas and counts responsive without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during undo/redo, template switches, and Export open/close"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "field_entrance_animations_smooth"
description = "Field entrance/exit animations maintain smooth motion when motion is allowed"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid palette clicks and undo/redo do not hang or freeze the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "import_parse_has_fallback_feedback"
description = "Malformed Import shows validation feedback without hanging the UI"
type = "binary"
weight = 1.0

