[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "At desktop width the workspace is a document canvas with a field palette, submitter colours, property controls, and a signing preview rather than a grid of generic equal-weight dashboard cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The document canvas and its placed fields are the primary visual focus, with secondary metadata (template summary, counts) kept visually subordinate in the side panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Each submitter owns a distinct colour and placed fields are tinted with their submitter's colour (fill, border, and label) so a field's owner is readable at a glance"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "The selected field is visually distinguished from unselected fields by a selection ring or handle, not by colour alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The signing status is communicated with a text label in addition to colour, and a field's required state carries a non-colour cue"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "At mobile width the three panes reorganise into a coherent stacked column that preserves the primary-before-secondary hierarchy, with the controls to open a template and place a field reachable without horizontal scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "The layout is a generic equal-width card grid or a centered marketing hero with no document canvas, field palette, or submitter colours"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "All placed fields render in one identical colour regardless of their assigned submitter, so field ownership is not visually distinguishable"
type = "binary"
weight = 0.5
negate = true
optional = true
