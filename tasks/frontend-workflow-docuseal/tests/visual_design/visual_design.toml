[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "three_pane_editor_composition"
description = "At desktop width the workspace is a three-pane document-editor composition under a full-width top bar — a left tool rail, a center document canvas with a field palette, submitter colours and property controls — rather than a grid of generic equal-weight dashboard cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "canvas_is_primary_visual_focus"
description = "The document canvas and its placed fields are the primary visual focus, with secondary metadata (template summary, counts) kept visually subordinate in the side panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "fields_tinted_by_submitter_colour"
description = "Each submitter owns a distinct colour and placed fields are tinted with their submitter colour (fill, border, and label) so a field owner is readable at a glance"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "selected_field_ring_not_colour_alone"
description = "The selected field is visually distinguished from unselected fields by a selection ring or handle, not by colour alone; multi-selected fields share a selection treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "status_and_required_have_text_cues"
description = "The signing status is communicated with a text label in addition to colour, and a field required state carries a non-colour cue"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "panes_stack_single_column_at_mobile"
description = "At around 375px width the three panes stack into a single scrollable column that preserves the primary-before-secondary order, with the field-type palette and the document canvas reachable without horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "generic_layout_without_editor_anatomy"
description = "The layout is a generic equal-width card grid or a centered marketing hero with no document canvas, field palette, or submitter colours"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "fields_share_one_colour_regardless_of_owner"
description = "All placed fields render in one identical colour regardless of their assigned submitter, so field ownership is not visually distinguishable"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.9"
name = "page_sheets_render_faux_document_body"
description = "Page sheets on the canvas render as white pages with a faint page label and a faux document body (title, subtitle, and grey text-line placeholders), with colour-tinted field boxes positioned on the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "palette_glyphs_and_panel_control_anatomy"
description = "Field-type palette buttons pair a small type glyph with the type label from one consistent icon set, and the properties panel uses labelled inputs, a type badge, a submitter select with a colour dot, a required checkbox, Duplicate field, and a destructive-styled Delete field button"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "hairline_borders_and_status_pill_colours"
description = "Cards and panels use hairline borders and subtle shadows, and the status pill changes colour by state — neutral in draft, amber while awaiting, green when completed"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "mobile_viewport_clipping_or_overflow"
description = "At 375px width, content clips or overflows the viewport, or horizontal scrolling of the page appears"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.13"
name = "ui_copy_specific_and_consistent"
description = "Where the app renders headings, button labels, validation messages, and status text, the copy is specific and consistent — action labels name the action (Send for signing, Delete field, Export, Import), validation messages name the problem field, terminology for template/field/submitter matches across surfaces, and prominent copy is free of spelling errors"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "placeholder_or_lorem_text_visible"
description = "Lorem ipsum, TODO, template-variable names, or other unfinished placeholder text is visible somewhere in the shipped UI chrome (the faux document-body text lines on the page sheets are part of the design and do not count)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.15"
name = "export_modal_and_undo_disabled_treatment"
description = "Export appears as a centered modal or drawer with Template JSON / Signing summary tabs, a scrollable preview, and Copy/Download affordances; Undo and Redo show a disabled treatment when their stacks are empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
