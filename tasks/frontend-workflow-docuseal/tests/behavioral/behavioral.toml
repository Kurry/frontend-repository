[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "Multi-facet round-trip: place a field, reassign another field, add a submitter, and advance signing status, then reload. All facets survive together coherently via persistence — never a mix of restored and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "template_order_swap_proves_live_lists"
description = "Template-list proof: note the open template fields, switch to a second template, then return; each template shows its own live field set rather than one hardcoded canvas for every row"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_derived_view_tracks_edits"
description = "Derived-view sensitivity: rename a placed field and reassign its submitter, then open Export; Template JSON and Signing summary change to include the new name and submitter rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_canvas_panel_export"
description = "Cross-view echo: change a field name in the properties panel and confirm the canvas label and both Export format previews show the same name without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "place_field_count_delta_exact"
description = "Count-delta integrity: measure the open template field count immediately before and after placing a palette field; the delta is exactly one with no off-by-one or lagging counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_field_names_change_export"
description = "Input-dependent output: place two fields with different names; the two Export Template JSON previews differ in those name values as the inputs dictate"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_template_and_export_flows"
description = "Interleaved-flow integrity: place a field on template A, switch to template B and place another field, return to A and open Export — template A export contains only A fields, not B fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_fields_then_repopulate_tracks_counts"
description = "Edge-state round-trip: delete all fields to a zero count, then place new fields; panel summary, rail counts, and Export field arrays track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_round_trip_restores_export"
description = "After placing and renaming a field so Export contains the new name, Undo restores the prior name on the canvas and in the Export Template JSON preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_preserves_fields"
description = "Export Template JSON after mutations, Import that document into a cleared or different open template state, and confirm canvas fields and Export previews match the imported package"
type = "binary"
weight = 1.0

