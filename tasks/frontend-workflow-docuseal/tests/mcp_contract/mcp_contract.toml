[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "All four contract-mandated modules are initialized and bound: structured-editor-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with editor_, entity_, form_, and artifact_ prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor/entity/form/artifact operations change the same templates, fields, submitters, signing status, and export state the palette, panel, Send for signing, Export, and Import use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented operations from the bindings are available: editor add/select/delete/update_property/preview/switch_mode on the thirteen field types (properties name, required, submitter; modes build, preview); entity create/select/update/delete on submitter (fields name, color); form validate/submit/advance; artifact export/import/copy with export formats json and markdown and import mode template-package — no invented destinations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound editor, entity, form, and artifact tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, and delete on submitter work through WebMCP and update the visible submitters list and colours"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form operations validate, submit, and advance are bound and drive the same Send for signing / Advance status changes as the visible controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_export_import_copy_formats"
description = "Artifact operations export, import (mode template-package), and copy with export formats json and markdown are bound and invoke without throwing when called through WebMCP (clipboard/file contents remain Playwright responsibilities)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra modules beyond structured-editor-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "Session info, tool list, and invocation are correctly surfaced for the bound Docuseal tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for structured-editor-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "Invoking a bound editor/entity/form/artifact tool leaves canvas fields, submitters, status, or Export state diverging from what the equivalent visible UI control would produce"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings are exposed"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared editor, entity, form, and artifact bindings"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "Validation bypasses via WebMCP lead to inconsistent MCP and UI state (for example an invalid field name applied only through tools)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for the mandated modules"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "One or more of structured-editor-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is not implemented despite being declared required"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n11"
name = "raw_artifact_bytes_in_mcp"
description = "Raw file paths, blobs, base64, or artifact contents appear in WebMCP arguments or results, violating the mechanics exclusion that those remain Playwright responsibilities"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
