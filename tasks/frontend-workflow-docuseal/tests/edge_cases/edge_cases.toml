[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "zero_fields_document_sheets_remain"
description = "After deleting every field, document sheets remain rendered with a panel summary field count of zero rather than a blank broken canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline_before_submit"
description = "Inline validation appears on the field-name editor, template-name field, add-submitter input, and Import before any submit-style action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Validation and Import error messages name the offending field and the fix rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_toast_confirmation"
description = "Success feedback (toast or equivalent) appears after place, reassign, delete, duplicate, export, and import actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "send_for_signing_shows_progress_feedback"
description = "Send for signing and Advance provide visible status-pill progress through awaiting parties to Completed"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_for_destructive_field_actions"
description = "Undo is available after destructive field actions (delete, batch reassign) and restores the prior canvas state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "export_import_controls_are_discoverable"
description = "Export and Import are labelled top-bar controls discoverable without hunting through unlabeled icons alone"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, and labels for palette, panel, Undo/Redo, Export, and Import use semantic tags"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_modal_close_paths"
description = "Export modal close controls and Escape both dismiss the overlay and return focus to the workspace"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "signing_advance_shows_step_progress"
description = "Long signing flows provide visible step progress via the status pill as Advance walks each submitter"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "overlong_field_name_rejected"
description = "A field name longer than 80 characters is rejected with validation naming the name field and is not applied to the canvas label"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "overlong_template_name_rejected"
description = "A template name longer than 120 characters is rejected with validation naming the name field and is not applied"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "undo_redo_disabled_at_empty_boundary"
description = "Undo and Redo are disabled at empty-stack boundaries and activating them there does not throw or corrupt fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "malformed_template_json_import_rejected"
description = "Importing malformed Template JSON leaves the canvas, submitters, status, and Export unchanged and shows visible validation feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "schema_invalid_import_rejected"
description = "Importing parseable JSON that fails the Template JSON field contract (status outside draft|pending|completed, type outside the closed enum, submitter matching no submitters name, empty names, or non-positive w/h) leaves the workspace unchanged and shows validation naming the offending field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "new_edit_after_undo_clears_redo"
description = "Performing a new field edit after an Undo clears the redo stack and disables Redo"
type = "binary"
weight = 1.0

