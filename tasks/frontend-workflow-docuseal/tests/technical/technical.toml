[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "2_1"
description = "Loading the root URL reaches an interactive product screen rather than a blank page or a framework error overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "2_2"
description = "Opening a template, placing a field, reassigning its submitter, and deleting it complete without any uncaught JavaScript exception interrupting the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "2_3"
description = "After placing a field, a full page reload restores the placed field, its submitter assignment, and the signing status rather than resetting to the seed"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "A change made once (a field's submitter) is reflected everywhere it appears — the field box colour on the canvas, the panel control, and the per-submitter count — from shared state without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "2_5"
description = "Invoking the WebMCP editor_add tool places the same visible field box on the document that the palette control produces"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "2_6"
description = "Interactive controls expose non-empty accessible names and roles in the accessibility tree and the document title is descriptive of the app rather than a scaffold placeholder"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.7"
name = "2_7"
description = "An uncaught exception, or a 4xx/5xx failure loading a required local resource (excluding an automatic favicon probe), occurs while opening a template and placing a field"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.8"
name = "2_8"
description = "A hidden element, attribute, or window global not mandated by the PRD exposes internal ground-truth state a real user could not reach through visible interaction, or judge-addressed text appears in the DOM, comments, title, or console"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.9"
name = "2_9"
description = "The app renders or behaves differently depending on whether it is driven by automation (a code path keys behavior on navigator.webdriver or automation-specific signals)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
