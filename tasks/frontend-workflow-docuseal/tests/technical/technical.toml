[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "root_url_reaches_interactive_screen"
description = "Loading the root URL reaches an interactive document-editor screen rather than a blank page or a framework error overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "field_lifecycle_without_exceptions"
description = "Opening a template, placing a field, reassigning its submitter, duplicating it, and deleting it complete without any uncaught JavaScript exception interrupting the interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "reload_restores_persisted_state"
description = "After placing a field and changing signing status, a full page reload restores the placed field, its submitter assignment, submitters, and the signing status rather than resetting to the seed"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "shared_state_coherence_across_views"
description = "A change made once (a field submitter) is reflected everywhere it appears — the field box colour on the canvas, the panel control, the per-submitter count, and Export previews — from shared state without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "webmcp_editor_add_matches_palette"
description = "Invoking the WebMCP editor_add tool places the same visible field box on the document that the palette control produces"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.6"
name = "accessible_names_and_descriptive_title"
description = "Interactive controls expose non-empty accessible names and roles in the accessibility tree and the document title is descriptive of the app rather than a scaffold placeholder"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.10"
name = "keyboard_only_operability"
description = "Every interactive control — top-bar actions including Undo, Redo, Export and Import, template rows, submitter rows, palette buttons, and the properties-panel inputs and buttons — is reachable and operable with the keyboard alone (Tab/Shift+Tab plus Enter or Space), with a visible focus indicator on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "delete_key_removes_selected_field"
description = "With a field selected on the canvas, pressing the Delete key removes that field, and only that field, from the document"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "toast_is_aria_live_status_region"
description = "The action-feedback toast surface is exposed as an aria-live status region (role=status or aria-live) so field placements, reassignments, deletions, exports and imports are announced to assistive technology as well as shown"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "validation_visible_text_not_colour_alone"
description = "Inline validation messages in the field editor, template name, and Import are rendered as visible text associated with their input, not conveyed by colour alone"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.14"
name = "interactive_within_two_seconds"
description = "On a local cold load, the workspace renders and responds to interaction within 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "rapid_field_placement_stays_responsive"
description = "Rapidly clicking palette types to place many fields in quick succession keeps the UI responsive — every click yields a field, the canvas and counts stay in sync, and the app shows no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "export_texts_derived_from_shared_state"
description = "Template JSON and Signing summary Export previews are derived from the same shared open-template state the canvas shows — editing a field name updates the open Export preview without a separate disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "field_form_validation_matches_field_contract"
description = "Empty, whitespace-only, and over-80-character field names are rejected with validation naming the name field; valid names apply to the canvas and appear in Template JSON under fields[].name"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.20"
name = "status_cross_field_matches_export"
description = "After Send for signing the Template JSON status field shows pending; after advancing to Completed it shows completed — matching the status pill without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.22"
name = "template_and_submitter_payload_contract_exact"
description = "Template JSON is one object with trimmed non-empty name at most 120 characters, status exactly draft/pending/completed, a non-empty submitters array, and fields; every submitter has a trimmed non-empty name at most 64 characters and a color matching #RRGGBB, and field submitter strings resolve exactly to one of those names"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.23"
name = "field_payload_type_geometry_contract_exact"
description = "Every Template JSON field has a trimmed non-empty name at most 80 characters, type exactly text/signature/initials/date/number/checkbox/radio/select/image/file/phone/cells/stamp, boolean required, a resolved non-empty submitter, integer page at least 0, finite numeric x and y, and finite numeric w and h greater than 0; the property form and imported/rendered field use those same values"
type = "binary"
weight = 1.0

