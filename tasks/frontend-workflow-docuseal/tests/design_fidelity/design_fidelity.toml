[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing in the three-pane editor follow a consistent scale, with no arbitrary one-off gaps that break alignment between rail, canvas, and panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_editor_hierarchy"
description = "Typography distinguishes top-bar title/template name, rail labels, canvas field labels, and panel headings"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_three_pane"
description = "At desktop width the layout matches the reference three-pane document editor anatomy (top bar, left rail, canvas, right panel) within a small tolerance"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Field place/delete, submitter add, Export open/close, and toast feedback animate as the motion section requires when driven through real controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Responsive stacking at ~375px matches the specified primary-before-secondary single-column reflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Palette buttons, panel inputs, status pill, and Export controls use hairline borders, subtle shadows, and non-default control styling consistent with the visual design section"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Docuseal wordmark, template name, and panel summary text show a clear hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Default, hover, focus, active-selection, and disabled (Undo/Redo empty) states are visibly distinct where specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Page sheets, field tints by submitter colour, and status-pill state colours match the specified treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover wash on chrome/rows/palette, field entrance, and Export modal opacity/scale follow the specified microinteraction timing when driven through real controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values break the three-pane alignment or look arbitrarily inconsistent"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_submitter_system"
description = "Field colours ignore the submitter colour system so ownership is not readable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Palette or panel control sizing mismatches the dense editor anatomy"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required animations are missing where the spec requires them (field place/delete snap with no entrance/exit, Export teleports)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Palette, selects, or Export dialog use unstyled browser defaults when the spec styles them"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The three-pane grid is misaligned at 1440px or broken at 375px relative to the specified reflow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Rail, canvas, Export modal, or panel elements render off-screen or clipped"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order or structure omits the document canvas, field palette, or properties panel shown in the reference"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Top-bar title, rail labels, and panel body text have no typographic distinction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover wash, field entrance, or Export modal motion are missing or deviate from the specified treatments"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.11"
name = "export_undo_surfaces_present"
description = "Export modal surfaces and Undo/Redo disabled treatments are present in the chrome as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
