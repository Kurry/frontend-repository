[judge]
dimensions = [
  "core_features",
  "visual_design",
  "motion",
  "technical",
  "user_flows",
  "edge_cases",
  "responsiveness",
  "accessibility",
  "performance",
  "writing",
  "innovation",
  "design_fidelity",
  "behavioral",
]

[[criterion]]
id = "AC-13"
title = "artifact_round_trip"
description = "Authored order/selection/geometry and domain state survive; invalid import is a no-op."
evaluation_steps = [
  "Export, clear, import, and inspect the edited variant record and derived state.",
  "Observe that the state survives round trips and invalid import is rejected without modifying state."
]
weight = 1.0
