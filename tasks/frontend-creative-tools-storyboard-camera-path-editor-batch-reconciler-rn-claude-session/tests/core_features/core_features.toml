[judge]
dimensions = [
  "core_features",
  "visual_design",
  "motion",
  "technical",
  "user_flows",
  "edge_cases",
  "responsiveness",
  "accessibility",
  "performance",
  "writing",
  "innovation",
  "design_fidelity",
  "behavioral",
]

[[criterion]]
id = "AC-01"
title = "signature_mutation"
description = "The batch reconciler mutation changes the primary record, linked view, and status together."
evaluation_steps = [
  "group selected records into a batch and reconcile aggregate totals.",
  "Observe that the primary records update.",
  "Observe that the linked view (derived summary) updates.",
  "Observe that the status updates to 'changed' and 'reconciled'."
]
weight = 1.0
