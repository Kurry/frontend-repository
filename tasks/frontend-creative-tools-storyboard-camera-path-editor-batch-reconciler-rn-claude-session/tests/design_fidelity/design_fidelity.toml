[judge]
dimensions = [
  "core_features",
  "visual_design",
  "motion",
  "technical",
  "user_flows",
  "edge_cases",
  "responsiveness",
  "accessibility",
  "performance",
  "writing",
  "innovation",
  "design_fidelity",
  "behavioral",
]

[[criterion]]
id = "AC-12"
title = "source_fidelity"
description = "The visual and interaction thesis is coherent without copying unrelated screens."
evaluation_steps = [
  "Compare the implementation with the cited source interaction vocabulary.",
  "Observe that the design is domain-appropriate and coherent."
]
weight = 1.0
