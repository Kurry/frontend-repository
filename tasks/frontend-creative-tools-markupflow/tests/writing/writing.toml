[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_chrome_and_panels"
description = "Where the app renders header labels, tool-rail section titles (Shapes, Effects, Style), Layers / Saved projects / Collaboration headings, and buttons, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as Export PNG, Try sample image, Choose image, Go offline, Go online, Reset workspace, Save, Open, Update, and Delete rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders SavedProjectCreate/SnapshotCreate name validation, Import project field-contract errors, or Collaboration conflict messages, they name the problem and the way forward (name field / schemaVersion / geometry field / Keep local / Keep remote / Merge both), not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states, the drop zone names its two ways to load an image (Drop an image here / Choose image / Try sample image) and the empty Layers panel explains that annotations will appear there."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "studio_copy_polished"
description = "Where the app renders workspace labels, empty-state copy, and Collaboration notes (Syncing..., pending-changes), rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (Layers vs annotation, Saved projects vs project, edit/preview), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "tool_and_style_labels_consistent"
description = "Where the app renders tool names and style names (Rectangle, Oval, Plain, Bold caption, Thin/Medium/Thick), the same labels appear consistently on the tool rail, Layers type labels, and text style bar."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_or_status_messages_are_specific"
description = "Where the app renders confirmation or status feedback (Collaboration Syncing... / pending-changes note, save success if shown), the copy states what is happening rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "history_versions_empty_state_copy"
description = "Where the app renders empty History and Versions panels, the copy explains how entries appear (actions / snapshots) rather than leaving a blank region"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.10"
name = "specific_export_and_preset_verbs"
description = "Where the app renders export and preset controls, labels use specific verbs/names such as Export project JSON, Import project, Copy project JSON, Save snapshot, Blur redaction, and Callout arrow rather than generic Submit/OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.11"
name = "import_errors_name_offending_field"
description = "Where the app renders an Import project rejection for a field-contract failure, the message names the offending field or rule (for example schemaVersion, imageDataUrl, strokeWidth, fontSize, width, or x2) rather than only a generic Import failed"
type = "binary"
weight = 0.5

