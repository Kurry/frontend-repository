[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "MO-1"
name = "MO-1"
description = "Every toolbar button, palette swatch, stroke button, and Layers row shows a visible hover state distinct from its resting state"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-2"
name = "MO-2"
description = "Tabbing through toolbar buttons, swatches, and Layers rows shows a clearly visible keyboard-focus outline on each focused control"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-3"
name = "MO-3"
description = "Selecting a different tool updates the active-tool highlight immediately with no stale highlight left on the previously selected tool"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-4"
name = "MO-4"
description = "Every annotation appears on the canvas the instant the pointer is released while drawing it, with no separate apply or confirm step"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-5"
name = "MO-5"
description = "While a Layers row is dragged with the real drag gesture it is visually distinguished (reduced opacity or elevated shadow) and a drop-position indicator appears on the target row before the drop"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-6"
name = "MO-6"
description = "While drawing a shape, a live dashed preview follows the pointer during the drag and is replaced by the committed annotation on release"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-N1"
name = "MO-N1"
description = "Toolbar buttons, swatches, or Layers rows show no hover or focus feedback, appearing static under pointer hover and keyboard focus"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO-N2"
name = "MO-N2"
description = "The Undo and Redo buttons are not visibly disabled when there is nothing to undo or redo, appearing identical to their enabled state"
type = "binary"
weight = 0.5
negate = true
optional = true
