[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "MO-1"
name = "hover_states_on_all_controls"
description = "Every toolbar button, palette swatch, stroke button, and Layers row shows a visible hover state distinct from its resting state"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-2"
name = "keyboard_focus_outline_visible"
description = "Tabbing through toolbar buttons, swatches, and Layers rows shows a clearly visible keyboard-focus outline on each focused control"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-3"
name = "active_tool_highlight_updates_instantly"
description = "Selecting a different tool updates the active-tool highlight immediately with no stale highlight left on the previously selected tool"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-4"
name = "annotation_commits_on_pointer_release"
description = "Every annotation appears on the canvas the instant the pointer is released while drawing it, with no separate apply or confirm step"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-5"
name = "drag_row_opacity_and_drop_indicator"
description = "While a Layers row is dragged with the real drag gesture it takes reduced opacity or an elevated shadow and the target row shows an accent drop-position border before the drop, and on drop the canvas re-renders in the new stacking order"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-6"
name = "live_dashed_drawing_preview"
description = "While drawing a shape, a live dashed preview follows the pointer during the drag and is replaced by the committed annotation on release"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-7"
name = "layers_row_add_delete_animates"
description = "Adding an annotation through real canvas drawing animates its new Layers row into the list rather than snapping, and deleting an annotation via its row's Delete control animates the row out with the remaining rows settling smoothly into place"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-8"
name = "saved_project_row_animates_in"
description = "Submitting a valid project name animates the new Saved projects row into the list rather than snapping it in"
type = "binary"
weight = 0.5

[[criterion]]
id = "MO-9"
name = "theme_toggle_recolors_every_surface"
description = "Clicking the header theme toggle recolors every surface — header, tool rail, canvas region, and right panels — with no region left in the previous theme's colors"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-10"
name = "collab_offline_and_syncing_indicators"
description = "In the Collaboration scenario, clicking Go offline surfaces a pending-changes note while offline, and clicking Go online shows a Syncing... pulse while reconnecting"
type = "binary"
weight = 0.5

[[criterion]]
id = "MO-11"
name = "reduced_motion_removes_animations"
description = "On a fresh load with prefers-reduced-motion enabled, list and panel animations are removed and every state change (add, delete, save, theme switch) still applies instantly and completely"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-N1"
name = "controls_static_under_hover_focus"
description = "Toolbar buttons, swatches, or Layers rows show no hover or focus feedback, appearing static under pointer hover and keyboard focus"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO-N2"
name = "undo_redo_lack_disabled_appearance"
description = "The Undo and Redo buttons are not visibly disabled when there is nothing to undo or redo, appearing identical to their enabled state"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "MO-N3"
name = "state_change_triggers_full_reload"
description = "Switching between the edit and preview views, or any other state change, triggers a full page reload instead of updating the canvas and panels in place"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
