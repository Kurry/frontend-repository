[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "draw_rectangle_updates_layers_and_undo"
description = "Create flow: after loading an image (Try sample image or Choose image) and drawing one rectangle with an active color selected, the Layers panel gains exactly one new row labeled as a rectangle with a color chip matching the active color, and Undo switches from disabled to enabled — without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_project_name_inline_validation"
description = "Create/save flow: submitting Saved projects with an empty or invalid name shows an immediate inline validation message naming the name field, and the Saved projects list count stays the same."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "layer_select_and_style_update_surfaces"
description = "Edit flow: clicking a Layers row (not Delete) selects it and draws a dashed selection outline on the matching canvas annotation; changing the selected annotation's color, stroke, text style, or font size updates that annotation in place on the canvas without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_layer_clears_row_canvas_selection"
description = "Delete flow: clicking Delete on a Layers row removes that row, removes the matching mark from the canvas, clears any selection outline that referenced it, and enables Undo so the deletion can be stepped back."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "edit_preview_mode_switch_retains_annotations"
description = "View/mode switch: clicking preview hides the tool rail to show the annotated result; clicking edit restores the tool rail; the active view button is visibly marked, and annotations remain on the canvas without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_layers_empty_state"
description = "Edge: after deleting the last remaining annotation, the Layers panel shows its empty-state message while the loaded image stays intact on the canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "save_reset_open_restores_project"
description = "Save/open flow: saving under a new project name adds exactly one Saved projects row; Reset workspace clears the canvas and Layers panel; Open on that saved row restores the saved image and every annotation onto both the canvas and the Layers list."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "undo_redo_keyboard_syncs_surfaces"
description = "History flow: after drawing two shapes, pressing Ctrl+Z removes the most recent shape from both the canvas and the Layers list and enables Redo; activating Redo restores it to both surfaces; drawing a new shape after an undo returns Redo to disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "layer_move_buttons_restack_canvas"
description = "Reorder flow: with at least three overlapping annotations, clicking a Layers row's up or down move button changes the row order in the panel and immediately changes which annotation renders frontmost on the canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "collab_conflict_resolves_without_dead_end"
description = "Collaboration recovery: after a conflict surfaces Keep local / Keep remote / Merge both, picking any choice updates Shared content and returns the panel to a usable editing state without requiring a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "flow_preset_to_export_json"
description = "End-to-end: load sample image, activate Callout arrow, confirm Layers gains exactly two rows (arrow and text), Export project JSON, and confirm the preview text includes schemaVersion markupflow-project-v1, imageDataUrl beginning with data:image/, imageWidth, imageHeight, the annotations array, both annotation types with type/color/strokeWidth, the arrow's x2 and y2, and the text annotation's textStyle and fontSize fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "flow_style_copy_paste"
description = "End-to-end: draw Thick color-A rectangle, Copy style, draw Thin color-B oval, select oval, Paste style — oval updates to Thick and color A; rectangle unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "flow_snapshot_compare_restore"
description = "End-to-end: with annotations present, Save snapshot, draw one more shape, Restore snapshot (extra shape gone), Compare (base image only), end Compare (annotated view restored)"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "flow_project_json_round_trip"
description = "End-to-end: draw at least two shapes, reorder Layers, Download project JSON, Reset workspace, Import project — same annotations and stacking order return on canvas and Layers; then Import a non-conforming payload (wrong schemaVersion, imageDataUrl without data:image/ prefix, missing required fields, or geometry missing width/height or x2/y2 for the type) and confirm an inline error names the import problem while canvas and Layers stay unchanged"
type = "binary"
weight = 1.0

