[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_persists_workspace"
description = "Starting from a loaded sample image: draw a rectangle, switch to preview mode, save the work under a new project name, and reorder a Layers row with up/down; then reload. Confirm every facet survives — same image, same rectangle on canvas and Layers, preview mode still active (or restored per UI), saved project row still present, and stacking order still in effect — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "layer_order_reversal_proves_live_stack"
description = "Stack-order reversal proof (genre stand-in for sort reversal): with at least three overlapping annotations, move the bottom Layers row to the top with up/down and note which annotation is frontmost; then reverse the order back. Confirm frontmost annotation reverses correctly — proving stacking is derived from the live Layers list, not two hardcoded canvas snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "color_and_stroke_derived_canvas_sensitivity"
description = "Derived-view sensitivity: pick color A and Thin, draw a shape and note its appearance; then pick a clearly different color B and Thick and draw another. Confirm the two shapes differ in color and stroke thickness rather than redrawing identically regardless of Style inputs."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "draw_echoes_in_layers_and_canvas"
description = "Cross-view echo: draw an oval on the canvas; without reload confirm the Layers panel gains a matching oval row with a color chip for the active color, and selecting that row outlines the same oval on the canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "draw_count_delta_exact"
description = "Count-delta integrity: measure the Layers row count, complete one rectangle drag release, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_tools_different_outcomes"
description = "Input-dependent output: on a loaded image, draw with Rectangle then with Arrow (or Blur vs Pixelate). Confirm the two outcomes differ in the ways the tools dictate (visually distinct shapes/effects and distinct Layers type labels) — not byte-identical marks."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_draw_and_preview_flows"
description = "Interleaved-flow integrity: start drawing a shape (press but do not release), switch the header to preview then back to edit, then complete a separate finished rectangle drag; confirm exactly one new Layers row appears for the completed drag, preview/edit switching still works, and neither flow corrupted the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_layers"
description = "Edge-state round-trip: delete every annotation until the Layers empty-state message is visible (image still loaded), then draw two new shapes; confirm the empty state clears, both new rows appear, and the canvas shows both marks."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "project_json_export_import_round_trip_probe"
description = "Starting with a loaded sample image: draw two distinct shapes, reorder Layers so a known annotation is frontmost, Download project JSON (confirm preview shows schemaVersion markupflow-project-v1, imageDataUrl beginning with data:image/, imageWidth, imageHeight, and annotations with type/color/strokeWidth plus type geometry keys), Reset workspace (empty Layers), Import that JSON. Confirm the same two type labels, the same frontmost stacking, and the same canvas marks return — proving the export contains the session's actual work under the MarkupFlowProject schema."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "copy_json_input_dependent"
description = "Input-dependent export: Copy project JSON with zero annotations (image only if required) then again after adding a Callout arrow preset; the two clipboard/preview payloads differ and the second includes arrow and text plus schemaVersion markupflow-project-v1, the arrow's x2/y2, and the text annotation's textStyle and fontSize."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "import_schema_rejection_preserves_workspace"
description = "With annotations already on canvas: attempt Import project with a payload that violates the MarkupFlowProject or Annotation field contract (wrong schemaVersion, missing required annotation keys, or a rectangle without positive width/height). Confirm an inline error names the import problem, Layers row count is unchanged, and canvas marks match the pre-import state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "geometry_cross_field_visible_in_export"
description = "After drawing a rectangle and an arrow on a loaded sample image, open Export project JSON and confirm the preview text shows the rectangle with positive width and height and the arrow with x2 and y2 under those field names — the Annotation geometry cross-field contract."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "history_jump_then_new_draw_discards_redo"
description = "Interleaved history: draw three shapes, jump History to the first add, confirm only that snapshot's marks remain, then draw a new shape and confirm Redo is disabled (redo branch discarded)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "compare_does_not_mutate_store"
description = "Edge-state: with annotations present, activate Compare (annotations hidden), end Compare, and confirm Layers row count and marks match the pre-Compare state — Compare must not delete annotations."
type = "binary"
weight = 1.0

