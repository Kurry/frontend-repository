[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "VD-1"
name = "VD-1"
description = "The workspace uses the dark theme tokens: background near #1F242E, surface panels near #2A303B, borders near #3A414D, with light primary text near #F3F4F6 for readable contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-2"
name = "VD-2"
description = "The Export PNG button uses the #0000EE primary background with white text and the active toolbar tool uses the #0079FD accent background with a white icon, distinguishing it from inactive tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-3"
name = "VD-3"
description = "Toolbar section labels (Shapes, Effects, Style) render small, semi-bold, uppercase, and muted while the Layers heading renders larger and bolder, giving a clear type hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-4"
name = "VD-4"
description = "Toolbar buttons are square with an 8px radius and panels use a 12px radius with a 1px border, and spacing across the rail and panels reads as multiples of a 4px base unit"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-5"
name = "VD-5"
description = "The palette shows at least six preset swatches plus a custom color input and the selected swatch shows a clear selected-state indicator such as a ring or check"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-6"
name = "VD-6"
description = "Switching between the dark and light themes keeps every background and text pairing legible in both themes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-N1"
name = "VD-N1"
description = "The active tool is not visually distinguished from inactive tools, or the highlight is only a tooltip rather than a background, border, or icon-color change"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "VD-N2"
name = "VD-N2"
description = "The three regions compete for equal visual weight with no dominant canvas, or arbitrary off-scale spacing breaks the visible rhythm"
type = "binary"
weight = 0.5
negate = true
optional = true
