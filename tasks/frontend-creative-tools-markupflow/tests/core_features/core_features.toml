[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "workspace_loads_with_all_regions"
description = "On load, the workspace shows the header (edit/preview, Undo, Redo, Compare, Save snapshot, Export PNG, Export project JSON, Import project, Copy project JSON), the Shapes/Effects/Style/Presets tool rail, an empty canvas drop zone with Choose image and Try sample image buttons, and right-column Layers (with History/Versions) showing a friendly no-annotations-yet message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "sample_image_renders_demo_scene"
description = "When Try sample image is clicked before any file is loaded, a built-in demo scene renders immediately on the canvas and the drop-zone empty state is replaced"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "four_shape_tools_draw_distinct_shapes"
description = "After selecting Rectangle, Oval, Line, and Arrow in turn and click-dragging each on the canvas, four visually distinct shapes appear (rectangle, ellipse, straight line, and a line ending in a filled arrowhead), each persisting when the pointer is released"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "text_tool_styles_and_size_change_live"
description = "After selecting Text and clicking the canvas, an inline text box appears offering all five named styles (Plain, Bold caption, Outline, Highlight box, Shadow) and a font-size slider from 10 to 72; typing changes the rendered text live, and switching style and moving the slider visibly change its appearance and size"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "blur_and_pixelate_visibly_distinct"
description = "After dragging a Blur rectangle and then a Pixelate rectangle over the image, the pixels under each region are visibly obscured and the mosaic pixelation looks distinct from the blur"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "spotlight_dims_and_loupe_magnifies"
description = "After dragging a Spotlight oval the area outside the oval is dimmed while inside stays bright, and after clicking with the Loupe a magnifier callout shows a zoomed circular view joined to the source point by a thin line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "color_and_stroke_apply_to_next_shape"
description = "After picking a color swatch and the Thick stroke then drawing a shape, the shape uses that color and a visibly thicker stroke than one drawn with Thin, and the custom color input changes the active drawing color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "layer_row_select_outline_and_delete"
description = "When a Layers row is clicked it selects that annotation and a dashed outline appears around the matching shape on the canvas; clicking its Delete control removes only that annotation from both the list and the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "layer_drag_reorder_restacks_canvas"
description = "After adding at least three annotations, dragging a Layers row to a new position shows a drag state on the dragged row and a drop indicator on the target, and dropping re-renders the canvas so the topmost Layers row draws frontmost"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "undo_redo_step_history_with_disabled_states"
description = "After adding two annotations, clicking Undo removes them in reverse order and enables Redo, clicking Redo reapplies them in order, and each button is visibly disabled when there is nothing to undo or redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "new_action_after_undo_discards_redo"
description = "When a new annotation is added after an Undo, the Redo button returns to its disabled state (the undone annotation is discarded)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "export_png_downloads_client_side"
description = "When Export PNG is clicked after adding annotations, a client-side .png download is triggered from an in-browser Blob with no network upload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "annotations_and_effects_survive_reload"
description = "After loading an image and adding blur, pixelate, and shape annotations, reloading the page restores the same image and every annotation with its pixel effect re-rendered, and reordering the layers then reloading restores the reordered stacking order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "collab_converges_and_surfaces_conflicts"
description = "In the Collaboration scenario, two non-conflicting edits both appear in the converged Shared content in either apply order, and creating a conflict surfaces an explicit Keep local / Keep remote / Merge both choice instead of silently overwriting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "mobile_stack_keeps_hover_focus_states"
description = "At a ~375px viewport width the layout stacks vertically with no horizontal page scrolling and the tool rail scrolls horizontally rather than overflowing, while hover and focus states remain visible on toolbar buttons, swatches, and layer rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "text_tool_full_style_bar_present"
description = "The Text tool places an editable text box and offers all five named styles (Plain, Bold caption, Outline, Highlight box, Shadow) plus a font-size control; switching style and size visibly changes the rendered text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "keyboard_shortcuts_drive_history"
description = "Undo and Redo step backward and forward through the annotation history in correct order and can also be driven by the Ctrl+Z / Ctrl+Shift+Z keyboard shortcuts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "saved_project_open_update_delete"
description = "A named project can be saved, then opened, updated, and deleted from the Saved projects list, and opening a saved project restores its image and annotations"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "named_tool_is_inert"
description = "One or more named tools are inert: a shape, effect, text, undo/redo, delete, or export control is present but produces no visible change on the canvas or Layers panel when used"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "deleted_annotation_lingers"
description = "Deleting an annotation, or undoing, leaves the removed annotation still drawn on the canvas or still listed in the Layers panel"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "choose_image_and_drop_load_client_side"
description = "Loading an image file by clicking Choose image or by dragging it onto the drop zone renders it on the canvas, with no upload request appearing in the network log (the file is read entirely in the browser)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "edit_preview_mode_switch"
description = "Clicking the header preview button hides the tool rail to show the annotated result and clicking edit restores it, and the active view button is visibly marked in each mode"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "save_form_validates_project_name"
description = "The Save control in the Saved projects form stays visibly disabled while the project name field is empty, and submitting with an invalid name (empty after trim, or longer than 80 characters) shows an inline validation message naming the name field while the Saved projects list count stays unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "tiny_drag_creates_no_annotation"
description = "A click-drag on the canvas shorter than a small threshold creates no annotation: the Layers row count is unchanged and the Undo button's enabled/disabled state does not change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "empty_history_keyboard_noop"
description = "With nothing drawn, the Undo and Redo buttons are both disabled and pressing Ctrl+Z or Ctrl+Y changes nothing on the canvas or in the Layers panel"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.36"
name = "last_delete_restores_empty_layers_state"
description = "Deleting the last remaining annotation returns the Layers panel to its empty-state message while the loaded image stays intact on the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "conflict_preserves_prior_converged_text"
description = "When conflicting Collaboration edits are created, the Shared content region keeps its prior converged text unchanged until the user picks Keep local, Keep remote, or Merge both — neither side is silently dropped"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "flow_draw_rectangle_layers_undo_reload"
description = "Starting from a loaded image with an active color selected: draw one rectangle, then confirm the Layers panel gained exactly one new row labeled as a rectangle with a color chip matching the active color, the Undo button switched from disabled to enabled, and after a full page reload the same rectangle is restored on the canvas and the same row appears in the Layers list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "flow_save_reset_open_reload_roundtrip"
description = "Starting with an image and at least one annotation: save under a new project name and confirm the Saved projects list gained exactly one row; click Reset workspace and confirm the canvas and Layers panel clear; click Open on the saved row and confirm the saved image and every annotation are restored onto both the canvas and the Layers list; after a full page reload the saved row is still present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "flow_delete_clears_row_canvas_selection"
description = "Starting with an annotation selected so its dashed outline is visible: click Delete on its Layers row and confirm in one pass that the row disappears, the matching mark is gone from the canvas, no selection outline remains anywhere, and the Undo button is enabled so the deletion can be stepped back"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "flow_undo_redo_syncs_canvas_and_layers"
description = "Starting from an empty canvas: draw two shapes, press Ctrl+Z and confirm the most recent shape disappears from both the canvas and the Layers list while Redo becomes enabled; activate Redo and confirm the shape returns to both surfaces; then draw a new shape after another undo and confirm Redo returns to disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "flow_move_buttons_reorder_and_persist"
description = "Starting with at least three annotations that visibly overlap: click a Layers row's up or down move button and confirm the row order changes in the panel, the annotation stacking on the canvas changes immediately so the topmost row renders frontmost, and after a full page reload the new order is still in effect in both the panel and the canvas"
type = "binary"
weight = 1.0

# HARDEN_MARKUPFLOW_V1

[[criterion]]
id = "1.43"
name = "four_named_markup_presets_present"
description = "The Presets section lists exactly four named recipes — Blur redaction, Callout arrow, Highlight band, and Spotlight focus — as distinct activatable controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "callout_arrow_preset_adds_arrow_and_text"
description = "After loading an image and activating Callout arrow, the Layers panel gains exactly two new rows (arrow and text with Bold caption reading Callout), Undo becomes enabled, and both marks appear on the canvas without a separate apply step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "blur_highlight_spotlight_presets_add_one_each"
description = "On a loaded image, Blur redaction adds exactly one Blur row, Highlight band adds exactly one Highlighter row, and Spotlight focus adds exactly one Spotlight row, each selected or visible on the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "copy_paste_style_updates_selection"
description = "After drawing a Thick color-A rectangle, Copy style, drawing a Thin color-B oval, selecting the oval, and Paste style, the oval updates to Thick and color A on the canvas while the rectangle stays unchanged; Paste style is disabled before any Copy style"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "history_panel_lists_and_jumps"
description = "After drawing a shape, the History panel shows a newest-on-top human-readable entry for the add; clicking an older History entry restores that prior canvas and Layers snapshot and makes newer entries redoable until a new mutation discards the redo branch"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "snapshot_restore_and_compare"
description = "With annotations present, Save snapshot under a non-empty name adds a Versions row; drawing one more shape then Restore removes the extra shape from canvas and Layers; Compare hides every annotation so only the base image shows, and ending Compare restores the annotated view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "export_project_json_live_compiled"
description = "After adding annotations, Export project JSON shows a read-only preview compiled LIVE from the store that conforms to MarkupFlowProject: schemaVersion exactly markupflow-project-v1, imageDataUrl beginning with data:image/, positive imageWidth and imageHeight, and an annotations array whose entries carry id, type, x, y, color, and strokeWidth (thin/medium/thick) with type-specific geometry/text fields; Download project JSON triggers a client-side .json Blob download with no network upload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "copy_project_json_reflects_session"
description = "Copy project JSON writes the live-compiled project text to the clipboard and shows a brief copied confirmation; a copy taken after adding annotations differs from a copy taken before those annotations"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "import_project_json_round_trip"
description = "After drawing at least two shapes and reordering Layers, Download project JSON, Reset workspace, then Import project with that file restores the same annotations and stacking order onto canvas and Layers"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "annotation_export_fields_match_contract"
description = "After drawing a rectangle and a text annotation, the Export project JSON preview shows those annotations with type, color as #RRGGBB, strokeWidth as thin/medium/thick, the rectangle's positive width and height, and for text the textStyle (plain/bold-caption/outline/highlight-box/shadow) and fontSize between 10 and 72 — the same Annotation field-contract names, enums, and bounds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "import_rejects_nonconforming_project_schema"
description = "Importing a project JSON that fails the MarkupFlowProject or Annotation field contract (wrong schemaVersion, missing annotations, imageDataUrl not beginning with data:image/, invalid type or strokeWidth enum, fontSize outside 10–72, or a rectangle missing positive width/height) shows an inline error naming the import problem and leaves canvas and Layers unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "saved_project_name_field_contract"
description = "The SavedProjectCreate form enforces the API-shaped name contract: empty name keeps Save disabled; a name over 80 characters shows an inline validation message naming the name field and adds no Saved projects row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "arrow_and_loupe_geometry_fields_in_export"
description = "After drawing an arrow and placing a loupe, the Export project JSON preview shows the arrow annotation with x2 and y2 numbers and the loupe annotation with cx and cy numbers under those field names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n2"
name = "export_omits_session_annotations"
description = "Export project JSON or Copy project JSON produces a payload that omits annotations the user just drew, or invents annotations that are not on the canvas"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "preset_or_paste_style_inert"
description = "A named Preset control or Paste style is present but produces no visible Layers/canvas change when activated under valid conditions (image loaded / style copied)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "export_missing_required_schema_fields"
description = "With annotations present, the Export project JSON preview is missing schemaVersion markupflow-project-v1, imageDataUrl beginning with data:image/, imageWidth, imageHeight, annotations, or an annotation's required id/type/x/y/color/strokeWidth fields"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "import_accepts_invalid_schema"
description = "Import project accepts a payload that violates the MarkupFlowProject or Annotation field contract (wrong schemaVersion, invalid enums, missing required keys, or geometry cross-field violations) and mutates canvas or Layers without an inline error naming the import problem"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "export_omits_type_geometry_keys"
description = "After drawing a rectangle and an arrow, the Export project JSON preview shows those annotations but omits the rectangle's width/height or the arrow's x2/y2 fields the Annotation field contract requires"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in its core annotation-studio features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
