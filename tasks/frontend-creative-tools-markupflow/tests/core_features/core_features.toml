[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the workspace shows the header (edit/preview, Undo, Redo, Export PNG), the Shapes/Effects/Style tool rail, an empty canvas drop zone with Choose image and Try sample image buttons, and a Layers panel showing a friendly no-annotations-yet message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "When Try sample image is clicked before any file is loaded, a built-in demo scene renders immediately on the canvas and the drop-zone empty state is replaced"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After selecting Rectangle, Oval, Line, and Arrow in turn and click-dragging each on the canvas, four visually distinct shapes appear (rectangle, ellipse, straight line, and a line ending in a filled arrowhead), each persisting when the pointer is released"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After selecting Text and clicking the canvas, an inline text box appears and switching its style from Plain to Outline or Highlight box, and moving the font-size slider, visibly changes the rendered text's appearance and size"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After dragging a Blur rectangle and then a Pixelate rectangle over the image, the pixels under each region are visibly obscured and the mosaic pixelation looks distinct from the blur"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After dragging a Spotlight oval the area outside the oval is dimmed while inside stays bright, and after clicking with the Loupe a magnifier callout shows a zoomed circular view joined to the source point by a thin line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After picking a color swatch and the Thick stroke then drawing a shape, the shape uses that color and a visibly thicker stroke than one drawn with Thin, and the custom color input changes the active drawing color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When a Layers row is clicked it selects that annotation and a dashed outline appears around the matching shape on the canvas; clicking its Delete control removes only that annotation from both the list and the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After adding at least three annotations, dragging a Layers row to a new position shows a drag state on the dragged row and a drop indicator on the target, and dropping re-renders the canvas so the topmost Layers row draws frontmost"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After adding two annotations, clicking Undo removes them in reverse order and enables Redo, clicking Redo reapplies them in order, and each button is visibly disabled when there is nothing to undo or redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When a new annotation is added after an Undo, the Redo button returns to its disabled state (the undone annotation is discarded)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When Export PNG is clicked after adding annotations, a client-side .png download is triggered from an in-browser Blob with no network upload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After loading an image and adding blur, pixelate, and shape annotations, reloading the page restores the same image and every annotation with its pixel effect re-rendered, and reordering the layers then reloading restores the reordered stacking order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "In the Collaboration scenario, two non-conflicting edits both appear in the converged Shared content in either apply order, and creating a conflict surfaces an explicit Keep local / Keep remote / Merge both choice instead of silently overwriting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "At a ~375px viewport width the layout stacks vertically with no horizontal page scrolling and the tool rail scrolls horizontally rather than overflowing, while hover and focus states remain visible on toolbar buttons, swatches, and layer rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Clicking Try sample image before any file is loaded draws a built-in demo scene onto the canvas immediately, making the tool usable without an upload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "With an image loaded, drawing with Rectangle, Oval, Line, and Arrow produces four visually distinct annotations (rectangle, ellipse, straight segment, and a segment ending in a filled arrowhead) that persist after the pointer is released"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "The Text tool places an editable text box and offers all five named styles (Plain, Bold caption, Outline, Highlight box, Shadow) plus a font-size control; switching style and size visibly changes the rendered text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "The Blur tool visibly obscures pixels under a dragged rectangle and the Pixelate tool applies a mosaic that is visibly distinct from the blur"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "The Spotlight tool dims everything outside a dragged oval, and the Loupe tool drops a magnifier callout with a zoomed circular view joined to its source point by a thin line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Selecting a color swatch or custom color and a Thin/Medium/Thick stroke applies that exact color and thickness to the next drawn shape, with Thick visibly thicker than Thin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "The Layers panel lists every annotation by type in creation order, each Delete control removes only its annotation from list and canvas, and clicking a row highlights the matching annotation on the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Dragging a Layers row to a new position, using the real drag-and-drop gesture, reorders the list and immediately re-renders the canvas so the topmost Layers row draws frontmost"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Undo and Redo step backward and forward through the annotation history in correct order and can also be driven by the Ctrl+Z / Ctrl+Shift+Z keyboard shortcuts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Export PNG triggers a client-side .png download from an in-browser Blob after annotations are added, with no network upload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "A named project can be saved, then opened, updated, and deleted from the Saved projects list, and opening a saved project restores its image and annotations"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "In the Collaboration scenario two non-conflicting edits converge to the same Shared content in either apply order, and a conflict surfaces an explicit Keep local / Keep remote / Merge both choice"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The empty state shows a labeled drop zone with Choose image and Try sample image before an image loads, and a friendly message in the Layers panel before any annotation is added"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "One or more named tools are inert: a shape, effect, text, undo/redo, delete, or export control is present but produces no visible change on the canvas or Layers panel when used"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Deleting an annotation, or undoing, leaves the removed annotation still drawn on the canvas or still listed in the Layers panel"
type = "binary"
weight = 1.0
negate = true
