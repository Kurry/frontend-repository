[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_studio_controls"
description = "Every interactive control — toolbar tools (Shapes, Effects, Style, Presets), header actions (edit/preview, Reset workspace, theme toggle, Undo, Redo, Compare, Save snapshot, Export PNG, Export project JSON, Import project, Copy project JSON), Copy/Paste style, color swatches, Layers row Delete/up/down, History entries, Versions Restore/Delete, Saved projects controls, and Collaboration Keep local / Keep remote / Merge both — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a focus outline distinct from rest and hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "conflict_choice_keyboard_operable"
description = "When a Collaboration conflict surfaces Keep local / Keep remote / Merge both, the three choices are operable entirely from the keyboard (focusable and activatable with Enter/Space) without requiring a pointer."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icon_only_controls_have_accessible_names"
description = "Icon-only toolbar tools and header actions expose accessible names so each tool and action is identifiable without relying on the icon alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_conflict_announced"
description = "Saved-projects name validation messages and Collaboration conflict prompts are conveyed visually and associated for assistive technology (for example via described-by or an ARIA live region)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "project_name_field_explicitly_labeled"
description = "The Saved projects name field uses an explicit label element associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "active_tool_and_swatch_expose_selected"
description = "The active tool and the selected color swatch expose their selected state to assistive technology (for example aria-pressed, aria-checked, or selected), not only through color."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the annotation workspace, and nav or complementary regions for the tool rail / Layers panel) so assistive technology can navigate the studio."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "chrome_and_panel_contrast"
description = "Header labels, tool-rail section labels (Shapes, Effects, Style), Layers heading, and primary controls meet sufficient contrast against their dark (#1F242E / #2A303B) or light-theme surfaces after theme toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_buttons_for_tools_and_actions"
description = "Toolbar tools, header actions, Layers Delete/up/down, and Saved projects Open/Update/Delete use button (or equivalent role) semantics rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected_for_lists"
description = "With prefers-reduced-motion set, Layers row enter/exit, Saved projects row enter, and Collaboration Syncing pulse animations are removed while every state change (add, delete, save, reconnect) still applies instantly and completely."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "export_import_history_keyboard_reachable"
description = "Export project JSON, Import project, Copy project JSON, History entries, Versions Restore/Delete, preset controls, Copy style, Paste style, Save snapshot, and Compare are reachable and operable with the keyboard alone with a clear focus outline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "compare_pressed_state_exposed"
description = "When Compare is active, the control exposes pressed/selected state to assistive technology (for example aria-pressed), not only through color"
type = "binary"
weight = 1.0

