[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "TI-1"
name = "image_and_effects_survive_reload"
description = "After loading an image and adding blur, pixelate, and shape annotations, a full page reload restores the same image and every annotation with its pixel effect re-rendered on the canvas, not as empty or unrendered list entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-2"
name = "layer_order_persists_across_reload"
description = "Reordering the Layers list and then reloading the page restores the reordered layer order and the resulting canvas stacking order"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-3"
name = "history_branch_discards_redo_stack"
description = "Adding a new annotation after an Undo returns Redo to its disabled state, confirming the redo branch is discarded when history branches"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-4"
name = "corrupt_storage_recovers_cleanly"
description = "A corrupt or malformed saved state written to localStorage before reload does not crash the app or show a raw error; it recovers to a clean, usable empty-canvas state"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-5"
name = "console_clean_through_core_workflow"
description = "No uncaught JavaScript errors, console.error entries, or console warnings appear during initial load or while performing the full workflow (load sample, draw shapes, apply effects, reorder layers, undo/redo, save a project, export)"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-6"
name = "single_shared_state_coherence"
description = "A change made through one control is reflected everywhere it appears (Layers list, canvas, and derived counts) from a single shared collection rather than a disconnected copy"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "TI-7"
name = "keyboard_reachability_and_focus"
description = "Every interactive control — toolbar tools, header actions, swatches, Layers row controls, and Saved projects controls — can be reached with the keyboard alone and shows a clear focus outline distinct from both its rest and hover appearance"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-8"
name = "accessible_names_and_selected_state"
description = "Icon-only toolbar and header buttons expose accessible names identifying each tool and action, and the active tool and selected color swatch expose their selected state to assistive technology (e.g. aria-pressed or aria-checked), not only through color"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-9"
name = "keyboard_history_and_conflict_choice"
description = "Ctrl+Z, Ctrl+Shift+Z, and Ctrl+Y operate undo and redo without pointer use, and the Keep local / Keep remote / Merge both conflict choice can be reached and activated entirely from the keyboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-10"
name = "interactive_within_two_seconds"
description = "On a local cold load the app renders and responds to a first interaction within 2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-11"
name = "drawing_and_reorder_stay_responsive"
description = "The live drawing preview follows the pointer with no visible lag, rapid repeated undo/redo does not hang or drop interactions, and moving a Layers row re-renders the canvas immediately with no visible delay between the row move and the stacking change"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-12"
name = "first_load_starts_blank"
description = "On a first load with browser storage cleared, the app starts with an empty canvas showing the drop-zone empty state and an empty Layers panel — no pre-seeded image, annotations, or saved projects — without console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-N1"
name = "hidden_ground_truth_state"
description = "A hidden element, attribute, or unexpected window global exposes internal ground-truth state a real user could not reach through the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N2"
name = "fabricated_success_signal"
description = "A success or completion signal appears while the underlying action did not occur — e.g. an annotation counted or a project reported saved that is absent after reload, or export output that is identical regardless of the annotations present"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N3"
name = "image_uploaded_off_device"
description = "The app uploads or sends a loaded image off the device (an outbound network request carrying image data) instead of reading and annotating it entirely client-side"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N4"
name = "mobile_overflow_or_resize_errors"
description = "At a ~375px viewport width the page body scrolls horizontally or throws console errors on resize"
type = "binary"
weight = 0.5
negate = true
optional = true

# HARDEN_MARKUPFLOW_V1

[[criterion]]
id = "TI-13"
name = "versions_and_export_text_in_shared_store"
description = "Saving a snapshot, restoring it, and compiling Export project JSON all stay coherent with Layers and canvas from one shared store — restoring a snapshot updates every surface together, and the JSON preview matches the live annotation set without a disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-14"
name = "project_json_round_trip_persists_semantics"
description = "Importing a previously exported MarkupFlow project JSON restores image, annotations, and layer order into the same shared store; a subsequent reload still shows the imported workspace (localStorage persistence of image + annotations)"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-15"
name = "export_import_share_api_shaped_schema"
description = "Export project JSON and Import project use the same MarkupFlowProject and Annotation field contracts: a conforming export re-imports cleanly, and the live preview's schemaVersion, imageDataUrl (data:image/…), imageWidth, imageHeight, and annotations field names (including type-specific geometry keys) match the payload Import accepts — validation rejects non-conforming shapes with named field/import errors before mutating the store"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-16"
name = "saved_and_snapshot_forms_share_annotation_contract"
description = "SavedProjectCreate and SnapshotCreate forms validate name (trimmed non-empty, at most 80 characters) and store annotations that conform to the same Annotation field contract Export project JSON emits — opening a saved project or restoring a snapshot yields annotations whose exported JSON still shows the required id/type/x/y/color/strokeWidth and type-specific geometry/text keys"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-N5"
name = "export_json_static_or_stale"
description = "Export project JSON / Copy project JSON remains a static stale payload after the user adds or deletes annotations — the preview/copy text ignores the live session mutations"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N6"
name = "form_schema_diverges_from_export"
description = "SavedProjectCreate or SnapshotCreate name validation, or Import validation, accepts values the MarkupFlowProject or Annotation field contract forbids (or rejects values that contract allows), so form records and export payloads disagree on required fields, enums, bounds, or geometry cross-field rules"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, persistence coherence, state integrity, accessibility, performance) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
