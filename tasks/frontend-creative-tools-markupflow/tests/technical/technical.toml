[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "TI-1"
name = "TI-1"
description = "After loading an image and adding blur, pixelate, and shape annotations, a full page reload restores the same image and every annotation with its pixel effect re-rendered on the canvas, not as empty or unrendered list entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-2"
name = "TI-2"
description = "Reordering the Layers list and then reloading the page restores the reordered layer order and the resulting canvas stacking order"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-3"
name = "TI-3"
description = "Adding a new annotation after an Undo returns Redo to its disabled state, confirming the redo branch is discarded when history branches"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-4"
name = "TI-4"
description = "A corrupt or malformed saved state written to localStorage before reload does not crash the app or show a raw error; it recovers to a clean, usable empty-canvas state"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-5"
name = "TI-5"
description = "No uncaught JavaScript errors or console.error entries appear during initial load or while performing the core workflow (load sample, draw a shape, add text, apply a blur, export)"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-6"
name = "TI-6"
description = "A change made through one control is reflected everywhere it appears (Layers list, canvas, and derived counts) from a single shared collection rather than a disconnected copy"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "TI-N1"
name = "TI-N1"
description = "A hidden element, attribute, or unexpected window global exposes internal ground-truth state a real user could not reach through the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N2"
name = "TI-N2"
description = "A success or completion signal appears while the underlying action did not occur — e.g. an annotation counted or a project reported saved that is absent after reload, or export output that is identical regardless of the annotations present"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N3"
name = "TI-N3"
description = "The app implements an out-of-scope feature by uploading or sending a loaded image off the device instead of reading and annotating it entirely client-side"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-N4"
name = "TI-N4"
description = "At a ~375px viewport width the page body scrolls horizontally or throws console errors on resize"
type = "binary"
weight = 0.5
negate = true
optional = true
