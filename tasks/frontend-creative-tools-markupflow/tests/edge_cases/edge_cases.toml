[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_layers_message_when_no_annotations"
description = "When the Layers panel has no annotations it shows a friendly message explaining that annotations will appear there, rather than a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "project_name_inline_validation_before_save"
description = "On Saved projects submit, an empty or invalid name shows an inline validation message naming the name field before anything is saved, and the Saved projects list count stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_and_fix"
description = "Saved-projects name validation copy names the name field and the way forward rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "tiny_drag_creates_no_annotation"
description = "A click-drag on the canvas shorter than a small threshold creates no annotation: the Layers row count is unchanged and Undo availability does not change."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "empty_history_undo_redo_disabled"
description = "With nothing drawn, Undo and Redo are both visibly disabled and pressing Ctrl+Z or Ctrl+Y changes nothing on the canvas or in the Layers panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "last_delete_keeps_image_and_empty_layers"
description = "Deleting the last remaining annotation returns the Layers panel to its empty-state message and leaves the loaded image intact on the canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "corrupt_storage_falls_back_clean"
description = "On first-ever load, and when a stored value is missing or corrupt, the app falls back to a clean empty workspace (empty canvas drop zone and empty Layers message) without crashing and without console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "studio_controls_use_semantic_tags"
description = "Toolbar tools, header actions, project name field, Layers Delete/up/down, and Collaboration Go offline / Go online use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "conflict_keeps_prior_until_choice"
description = "Creating conflicting Collaboration edits never silently drops either side: the Shared content region keeps its prior converged text until the user picks Keep local, Keep remote, or Merge both."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "save_disabled_while_name_empty"
description = "The Saved projects Save control stays visibly disabled while the project name field is empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "paste_style_disabled_before_copy"
description = "Paste style stays visibly disabled and changes nothing when no style has been copied yet"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_snapshot_name_disabled"
description = "Save snapshot stays disabled while the snapshot name is empty and adds no Versions row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "malformed_import_keeps_workspace"
description = "Importing a malformed project JSON, or one that fails the MarkupFlowProject or Annotation field contract (wrong schemaVersion, missing imageDataUrl/annotations, imageDataUrl not beginning with data:image/, invalid type/strokeWidth/textStyle enum, fontSize outside 10–72, color not #RRGGBB, or geometry missing width/height, x2/y2, or cx/cy for the type), shows an inline error naming the import problem, leaves canvas and Layers unchanged, and produces no console crash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "geometry_violation_import_rejected"
description = "Importing a parseable project JSON whose annotations array contains a rectangle without positive width and height, or an arrow without x2 and y2, shows an inline error naming the geometry field and leaves canvas and Layers unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "export_disabled_without_image"
description = "With no image loaded, Export project JSON and Copy project JSON stay disabled or show an empty-state hint and do not invent annotations"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "name_over_80_chars_rejected"
description = "Submitting Saved projects or Save snapshot with a name longer than 80 characters shows an inline validation message naming the name field and adds no row"
type = "binary"
weight = 1.0

