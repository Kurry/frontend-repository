[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_layers_message_when_no_annotations"
description = "When the Layers panel has no annotations it shows a friendly message explaining that annotations will appear there, rather than a blank region."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "project_name_inline_validation_before_save"
description = "On Saved projects submit, an empty or invalid name shows an inline validation message naming the name field before anything is saved, and the Saved projects list count stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_and_fix"
description = "Saved-projects name validation copy names the name field and the way forward rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "tiny_drag_creates_no_annotation"
description = "A click-drag on the canvas shorter than a small threshold creates no annotation: the Layers row count is unchanged and Undo availability does not change."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "empty_history_undo_redo_disabled"
description = "With nothing drawn, Undo and Redo are both visibly disabled and pressing Ctrl+Z or Ctrl+Y changes nothing on the canvas or in the Layers panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "last_delete_keeps_image_and_empty_layers"
description = "Deleting the last remaining annotation returns the Layers panel to its empty-state message and leaves the loaded image intact on the canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "corrupt_storage_falls_back_clean"
description = "On first-ever load, and when a stored value is missing or corrupt, the app falls back to a clean empty workspace (empty canvas drop zone and empty Layers message) without crashing and without console errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "studio_controls_use_semantic_tags"
description = "Toolbar tools, header actions, project name field, Layers Delete/up/down, and Collaboration Go offline / Go online use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "conflict_keeps_prior_until_choice"
description = "Creating conflicting Collaboration edits never silently drops either side: the Shared content region keeps its prior converged text until the user picks Keep local, Keep remote, or Merge both."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "save_disabled_while_name_empty"
description = "The Saved projects Save control stays visibly disabled while the project name field is empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_layers_shows_nothing"
description = "When the annotation collection is empty, the Layers panel shows nothing — no empty-state message or add guidance."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "validation_errors_only_in_console"
description = "Invalid project-name save failures surface only in the browser console with no visible inline field feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "draw_or_delete_silent"
description = "Drawing a shape, deleting a Layers row, or undoing produces no visible change to the canvas or Layers list (silent failure)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "delete_annotation_no_destructive_affordance"
description = "Layers Delete proceeds with no visible destructive affordance (no Delete labeling) distinguishing it from a non-destructive row click."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_controls_are_nonsemantic"
description = "Primary interactive controls (toolbar tools, header actions, Layers rows, Save/Open) are non-semantic div/span click targets without button/role semantics."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "conflict_choice_not_keyboard_dismissible"
description = "With Keep local / Keep remote / Merge both visible, keyboard users cannot complete conflict resolution (choices unreachable or non-activatable)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "tiny_drag_still_creates_annotation"
description = "A click-drag shorter than the small threshold still creates a Layers row or enables Undo."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_or_missing_action_labels"
description = "Primary actions show blank, placeholder, or ambiguous labels such as 'Submit', 'OK', or 'Button' instead of specific labels like Export PNG, Try sample image, Go offline, or Save."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "corrupt_storage_crashes_workspace"
description = "A missing or corrupt stored workspace value crashes the UI or throws a console error instead of falling back to a clean empty workspace."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "conflict_silently_overwrites"
description = "Conflicting Collaboration edits silently overwrite Shared content without showing Keep local / Keep remote / Merge both."
type = "binary"
negate = true
weight = 1.0

# HARDEN_MARKUPFLOW_V1

[[criterion]]
id = "4.11"
name = "paste_style_disabled_before_copy"
description = "Paste style stays visibly disabled and changes nothing when no style has been copied yet"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_snapshot_name_disabled"
description = "Save snapshot stays disabled while the snapshot name is empty and adds no Versions row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "malformed_import_keeps_workspace"
description = "Importing a malformed project JSON, or one that fails the MarkupFlowProject or Annotation field contract (wrong schemaVersion, missing imageDataUrl/annotations, imageDataUrl not beginning with data:image/, invalid type/strokeWidth/textStyle enum, fontSize outside 10–72, color not #RRGGBB, or geometry missing width/height, x2/y2, or cx/cy for the type), shows an inline error naming the import problem, leaves canvas and Layers unchanged, and produces no console crash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "geometry_violation_import_rejected"
description = "Importing a parseable project JSON whose annotations array contains a rectangle without positive width and height, or an arrow without x2 and y2, shows an inline error naming the geometry field and leaves canvas and Layers unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "export_disabled_without_image"
description = "With no image loaded, Export project JSON and Copy project JSON stay disabled or show an empty-state hint and do not invent annotations"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "name_over_80_chars_rejected"
description = "Submitting Saved projects or Save snapshot with a name longer than 80 characters shows an inline validation message naming the name field and adds no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "malformed_import_crashes_or_mutates"
description = "A malformed or field-contract-invalid project JSON import crashes the UI, throws a console error, or mutates the live canvas/Layers without a clear inline error"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n12"
name = "paste_style_applies_without_copy"
description = "Paste style applies a style change when Copy style has not been used in the session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n13"
name = "oversized_name_silently_accepted"
description = "A Saved projects or Save snapshot name longer than 80 characters is accepted and adds a row with no inline validation naming the name field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
