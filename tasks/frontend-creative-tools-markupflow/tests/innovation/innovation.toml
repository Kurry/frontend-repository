[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "draw_preview_delight_beyond_minimum"
description = "Beyond the required live dashed draw preview, shape drawing includes an extra delightful microinteraction on commit (for example a brief settle flash, ink-pop, or subtle stroke ease) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "loupe_or_spotlight_storytelling_polish"
description = "Loupe or Spotlight offers an advanced transition or storytelling beat beyond basic placement — for example a memorable magnifier expand or dimming wipe — verified through real tool interaction (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_annotation_studio"
description = "A brief guided first-run or coachmark flow introduces Try sample image, the tool rail groups, and Layers without blocking the studio (bonus beyond required empty-state copy)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "histogram_or_annotation_aid_extra_usability"
description = "An interactive graphic beyond the required canvas — for example an annotation count chip, color-usage strip, or zoom mini-map — adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "alternate_annotation_input_beyond_drag"
description = "Beyond basic click-drag drawing, the studio supports an alternate annotation input such as keyboard nudging of a selected shape or numeric size entry (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the session, the app offers a small personalization beyond requirements (for example remembering last active tool or last stroke width after reload via the mandated persistence) that improves return use (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_markupflow_narrative_polish"
description = "The MarkupFlow title, dark studio chrome, and three-region composition read as a cohesive branded annotation instrument rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "theme_toggle_craft_beyond_bare_swap"
description = "Theme toggle craft goes beyond bare dark/light compliance — cohesive tokenized accents across header, panels, and Layers without inventing a conflicting second product (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local icon rendering or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_annotation_studio_feel"
description = "The overall studio feels competition-grade: draw preview feel, layer reorder polish, Export PNG, Export project JSON round-trip, presets, and snapshot/compare flows read as a professional image annotation instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.11"
name = "preset_recipe_craft_beyond_bare_add"
description = "Markup presets go beyond bare list append — for example a brief placement guide, smart default sizing relative to the image, or coordinated Callout arrow text placement that reads intentional (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.12"
name = "compare_and_history_power_user_polish"
description = "Compare and History feel power-user grade: clear active Compare treatment and scannable History labels that match tool names (bonus execution quality)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
