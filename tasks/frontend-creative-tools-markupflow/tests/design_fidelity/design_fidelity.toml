[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_three_region_scale"
description = "At 1440px, spacing among the header, left tool rail (~88px), central canvas, and right Layers panel (~256–288px) follows a 4px base scale matching the reference screenshots — no arbitrary one-off gaps that break the annotation-studio composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_studio_spec"
description = "UI text uses the Segoe UI / -apple-system / BlinkMacSystemFont / Helvetica / Arial / sans-serif stack; tool-rail section labels render ~11–13px semi-bold uppercase muted, and the Layers heading renders larger and bolder (~16–18px, weight 700) consistent with the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: header with MarkupFlow title and actions above a three-region workspace (tool rail | canvas | Layers/Saved projects/Collaboration) — a dark annotation studio, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — new Layers row enter, layer delete exit, Saved projects row enter, drag-row opacity/shadow, and theme toggle recolor — show the specified transitions rather than hard cuts when driven through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At ~375px vs 1280px+, responsive behavior matches the reference patterns: at 375px the layout stacks vertically with a horizontally scrollable tool rail; at desktop widths all three regions are visible simultaneously without overlap."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Toolbar buttons (8px radius, transparent at rest / surface on hover / accent+check when active), Export PNG (primary #0000EE with white text), and panels (12px radius, surface #2A303B, 1px border #3A414D) use the studio treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_rail_vs_layers"
description = "Typography hierarchy clearly distinguishes muted uppercase tool-rail section labels (Shapes, Effects, Style) from the larger bolder Layers heading and body/secondary text (#F3F4F6 / #9CA3AF)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Toolbar tools, swatches, stroke buttons, Undo/Redo, and Layers rows show distinct default, hover, focus, active-selection (accent #0079FD with white/check), and disabled (dimmed Undo/Redo) treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_and_surfaces_match_tokens"
description = "Dark workspace surfaces use background #1F242E, panels #2A303B, borders #3A414D, primary text #F3F4F6, secondary #9CA3AF, primary action #0000EE, and active-tool accent #0079FD; light theme via the header toggle keeps pairings legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover states on toolbar buttons, swatches, stroke buttons, and Layers rows, plus live dashed draw-preview while dragging a shape, follow the specified microinteraction feel when driven through real pointer controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "right_column_includes_history_versions"
description = "At 1440px the right column includes Layers plus History and Versions panels in the annotation-studio composition matching the hardened spec (not only a bare Layers list)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "presets_group_in_tool_rail"
description = "At 1440px the left tool rail shows a Presets group with the four named recipes in addition to Shapes, Effects, and Style"
type = "binary"
weight = 1.0

