[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_three_region_scale"
description = "At 1440px, spacing among the header, left tool rail (~88px), central canvas, and right Layers panel (~256–288px) follows a 4px base scale matching the reference screenshots — no arbitrary one-off gaps that break the annotation-studio composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_studio_spec"
description = "UI text uses the Segoe UI / -apple-system / BlinkMacSystemFont / Helvetica / Arial / sans-serif stack; tool-rail section labels render ~11–13px semi-bold uppercase muted, and the Layers heading renders larger and bolder (~16–18px, weight 700) consistent with the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: header with MarkupFlow title and actions above a three-region workspace (tool rail | canvas | Layers/Saved projects/Collaboration) — a dark annotation studio, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — new Layers row enter, layer delete exit, Saved projects row enter, drag-row opacity/shadow, and theme toggle recolor — show the specified transitions rather than hard cuts when driven through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At ~375px vs 1280px+, responsive behavior matches the reference patterns: at 375px the layout stacks vertically with a horizontally scrollable tool rail; at desktop widths all three regions are visible simultaneously without overlap."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Toolbar buttons (8px radius, transparent at rest / surface on hover / accent+check when active), Export PNG (primary #0000EE with white text), and panels (12px radius, surface #2A303B, 1px border #3A414D) use the studio treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_rail_vs_layers"
description = "Typography hierarchy clearly distinguishes muted uppercase tool-rail section labels (Shapes, Effects, Style) from the larger bolder Layers heading and body/secondary text (#F3F4F6 / #9CA3AF)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Toolbar tools, swatches, stroke buttons, Undo/Redo, and Layers rows show distinct default, hover, focus, active-selection (accent #0079FD with white/check), and disabled (dimmed Undo/Redo) treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_and_surfaces_match_tokens"
description = "Dark workspace surfaces use background #1F242E, panels #2A303B, borders #3A414D, primary text #F3F4F6, secondary #9CA3AF, primary action #0000EE, and active-tool accent #0079FD; light theme via the header toggle keeps pairings legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Hover states on toolbar buttons, swatches, stroke buttons, and Layers rows, plus live dashed draw-preview while dragging a shape, follow the specified microinteraction feel when driven through real pointer controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_studio"
description = "Visible spacing between header, tool rail, canvas, and Layers panel contradicts the reference studio composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_ignore_specified_palette"
description = "Workspace chrome uses a fixed unrelated palette that ignores the specified dark tokens (or light-theme pairings) after theme toggle."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "region_sizing_mismatches_reference"
description = "At 1440px the tool rail or Layers panel is sized or proportioned in clear mismatch with the reference (~88px rail / ~256–288px Layers / flexible canvas)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_studio_animations_missing"
description = "Required animations are missing where the spec requires them (Layers rows snap in/out with no enter/exit, Saved projects row snaps in, drag-row shows no opacity/shadow change)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Toolbar tools, Export PNG, project name field, or panel chrome use unstyled browser default appearance when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the three-region workspace is misaligned versus the reference (missing tool rail or Layers panel, regions overlapping, or canvas not centered)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "At 1440px, tool-rail sections, canvas drop zone, or Layers/Saved projects/Collaboration panels render clipped or off-screen compared to the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_studio"
description = "Structure deviates from the reference: a marketing landing or multi-page shell replaces the dark three-region MarkupFlow annotation studio."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_rail_and_layers"
description = "Tool-rail section labels and the Layers heading are visually undifferentiated — no clear hierarchy between muted uppercase groups and the larger Layers title."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on toolbar tools, swatches, stroke buttons, or Layers rows are missing or clearly deviate from the reference feel."
type = "binary"
negate = true
weight = 1.0

# HARDEN_MARKUPFLOW_V1

[[criterion]]
id = "3.11"
name = "right_column_includes_history_versions"
description = "At 1440px the right column includes Layers plus History and Versions panels in the annotation-studio composition matching the hardened spec (not only a bare Layers list)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "presets_group_in_tool_rail"
description = "At 1440px the left tool rail shows a Presets group with the four named recipes in addition to Shapes, Effects, and Style"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n11"
name = "hardened_panels_missing_from_composition"
description = "History, Versions, or Presets are missing from the desktop composition despite being required by the instruction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
