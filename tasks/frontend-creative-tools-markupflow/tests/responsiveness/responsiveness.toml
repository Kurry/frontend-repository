[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1280_to_375"
description = "Resizing from 1280px+ desktop to ~375px mobile keeps a usable MarkupFlow studio: tool rail, canvas region, and Layers panel remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At ~375px width, toolbar tools, header actions (Undo, Redo, Export PNG, theme toggle), Choose image / Try sample image, and Layers Delete/up/down present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Header title, tool-rail section labels, Layers heading, and button labels remain legible at both 1280px+ and ~375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At ~375px width, workspace content never clips or overflows the viewport into an unusable layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "tool_rail_scrolls_horizontally_at_375"
description = "At ~375px width the layout stacks vertically and the tool rail becomes horizontally scrollable rather than wrapping awkwardly or overflowing the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At ~375px width, header, tool rail, canvas, and Layers/Saved projects/Collaboration reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At ~375px width, tap/click activation works on toolbar tools, Try sample image, Layers rows, and Saved projects Save/Open."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll_at_375"
description = "At ~375px width the page does not produce horizontal page scrolling (the tool rail may scroll internally)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "canvas_scales_to_fit_viewport"
description = "At ~375px width the canvas region scales its content to fit the viewport width so the loaded image and its annotations remain fully visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "desktop_three_regions_visible"
description = "At desktop widths (1280px and above) all three regions — tool rail, canvas, and the right column (Layers / History / Versions / Saved projects / Collaboration) — are visible simultaneously without overlap."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_desktop"
description = "At ~375px or 1280px+ the three-region annotation-studio layout breaks: overlapping regions, overflow, or unusable stacking."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At ~375px width, toolbar tools, header actions, Try sample image, or Layers controls are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "studio_text_unreadable_on_mobile"
description = "At ~375px width, tool-rail labels, Layers heading, or primary button labels are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At ~375px or 1280px+, workspace content is cropped or unnecessary page-level scrollbars appear for content that should fit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "region_missing_at_narrow_width"
description = "At ~375px width, the tool rail, canvas region, or Layers panel is missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_workspace"
description = "Fixed-position header chrome obscures the canvas, tool rail, or Layers controls so they cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At ~375px width, tool rail, canvas, and Layers panel overlap into an unusable stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "mobile_canvas_or_tools_inoperable"
description = "At ~375px width, drawing tools cannot be selected or the canvas cannot receive a draw/drag interaction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "canvas_static_size_overflows"
description = "The canvas uses a static size that overflows the viewport at ~375px so the loaded image or annotations are not fully visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "At ~375px or 1280px+, required controls (toolbar tools, Undo/Redo, Export PNG, Layers panel, or Try sample image) disappear from the layout."
type = "binary"
negate = true
weight = 1.0

# HARDEN_MARKUPFLOW_V1

[[criterion]]
id = "7.11"
name = "export_history_reachable_at_375"
description = "At ~375px width, Export project JSON, Import project, History, and Versions remain reachable by scrolling within the stacked layout rather than rendering permanently off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_or_history_offscreen_at_375"
description = "At ~375px width, Export project JSON, History, or Versions cannot be reached because they render off-screen with no scroll path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
