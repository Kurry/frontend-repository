schema_version = "1.3"

[task]
name = "mercor-intelligence/frontend-creative-tools-board-game-scenario-builder-constraint-canvas-rn-linear-views"
description = "A single-page React application for managing scenario cards using a domain-native Constraint Canvas and Linear-inspired filtered views."

[agent]
timeout_sec = 3600.0

[verifier]
timeout_sec = 14400.0

[environment]
workdir = "/app"
build_timeout_sec = 1200.0
memory_mb = 8192
cpus = 4

[[artifacts]]
source = "/app"
destination = "app"
exclude = [
    "node_modules",
    ".git",
    ".DS_Store",
    "dist",
    "build",
    "out",
    ".next",
    ".nuxt",
    ".svelte-kit",
    "storybook-static",
    ".cache",
    ".vite",
    ".turbo",
    ".parcel-cache",
    ".pnpm-store",
    ".yarn",
    ".npm",
    "coverage",
    "playwright-report",
    "test-results",
]
