[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "dropzone_immediate_feedback"
description = "The drop zone gives immediate feedback through the real control: a highlighted border and slight scale on dragover, a pressed feedback on click, a visible focus ring when tabbed to, and identical activation from Enter, Space, and a pointer click."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "hover_wash_distinct_from_focus"
description = "Navbar items, buttons, list rows, and cards take a hover wash that is a different visual treatment from their focus ring, applied consistently across controls of the same kind."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "pressed_state_before_result"
description = "Pressed feedback appears immediately on pointer-down, before the triggered action completes, so the Convert and Download controls never feel unresponsive in the gap before their result."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "selection_rings_reverse_same_control"
description = "Selecting a queue row via its checkbox (inset ring) and selecting a category card (accent ring, aria-pressed) are marked beyond color alone, and each selection reverses through the same control that set it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "status_pill_transitions_not_snap"
description = "Driven through the real Convert control, each file's status pill visibly moves Ready to Converting to Done (or Failed) with a brief transition rather than an instant swap, and the counts line updates live alongside the status changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "gesture_only_action_present"
description = "A conventional action (add file, change format, convert, download, remove, batch set format, undo, save preset) is available only through a drag or other gesture, with no discoverable button or keyboard equivalent."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "feedback_only_via_state_shortcut"
description = "Interactive-state feedback (hover, focus, pressed, selected, batch tray reveal) appears only when state is changed through a WebMCP call or other non-UI shortcut, and is absent when the real UI controls are exercised directly."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "queue_rows_animate_in_and_out"
description = "Triggered through the real UI controls, adding a file animates its new row into the queue rather than snapping in, removing a file animates its row out, and Clear queue clears the rows with the same animated treatment."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "route_view_transition_soft"
description = "Switching between Convert, Settings, and About through the navbar transitions the view content with a short fade or slide rather than a hard cut."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_flows_completable"
description = "With prefers-reduced-motion set, row and view animations are removed and state changes apply instantly, while the full add-convert-download, batch, undo, and session-export flows remain completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "theme_toggle_icon_reflects_theme"
description = "The theme toggle's icon reflects the current theme and updates when toggled, while the whole surface swaps between light and dark."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.12"
name = "session_export_panel_enter_exit"
description = "Triggered through the real UI control, the Session export panel enters and exits with a brief opacity or scale transition rather than a hard snap."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "copy_confirmation_brief_reset"
description = "Copy on a session export tab shows a short copied confirmation before resetting, verified through the real Copy control."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "batch_tray_enter_exit_feedback"
description = "Triggered through real selection checkboxes, the batch tray uses short enter/exit feedback rather than a hard snap when multi-select becomes active or clears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "preset_list_add_remove_feedback"
description = "Triggered through real Save preset / Delete preset controls, preset list add/remove uses short enter/exit feedback rather than hard snaps."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.n12"
name = "session_export_or_batch_tray_hard_snap"
description = "Opening Session export or revealing the batch tray hard-snaps with no enter/exit transition when prefers-reduced-motion is not set."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
