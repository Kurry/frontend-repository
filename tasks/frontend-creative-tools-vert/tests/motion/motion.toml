[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "The drop zone gives immediate feedback through the real control: a highlighted border on dragover, a pressed feedback on click, a visible focus ring when tabbed to, and identical activation from Enter, Space, and a pointer click."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Navbar items, buttons, list rows, and cards take a hover wash that is a different visual treatment from their focus ring, applied consistently across controls of the same kind."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Pressed feedback appears immediately on pointer-down, before the triggered action completes, so the Convert and Download controls never feel unresponsive in the gap before their result."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Selecting a queue row (inset ring) and selecting a category card (accent ring, aria-pressed) are marked beyond color alone, and each selection reverses through the same control that set it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "Status transitions and the counts line update live through an aria-live region as each file moves Ready to Converting to Done, so the change is announced without moving focus, and the full convert-and-download flow is completable with keyboard alone and with pointer alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "No conventional action (add file, change format, convert, download, remove) is available only through a drag or other gesture without a discoverable button or keyboard equivalent."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "Interactive-state feedback (hover, focus, pressed, selected) must be produced by exercising the real UI controls, not appear only when state is changed through a WebMCP call or other non-UI shortcut."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
