[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "sentence_case_microcopy"
description = "Where the app renders headings, section titles, and UI microcopy, they follow a consistent sentence-case convention (hero, drop-zone title, empty state, catalog headings, Session export labels) rather than mixing random capitalization styles."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "verb_first_action_labels"
description = "Where the app renders button or action labels, they use specific verb-first labels such as Convert, Download, Remove, Clear queue, Batch set format, Batch remove, Download all done, Undo, Redo, Save preset, Apply preset, Copy, and Download session rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_state_problem_plainly"
description = "Where the app renders error, Unsupported, or field-validation messages (including Settings quality, empty or over-length preset name, and session import field-contract failures such as schemaVersion), they name the field or problem plainly without codes or blame, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_queue_explains_next_step"
description = "Where the app renders the empty queue state, the copy includes \"Your conversion queue is empty\" and guidance that a local file is needed."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "hero_and_help_copy_polished"
description = "Where the app renders the hero headline, drop-zone helper text, About/Privacy copy, and catalog labels, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent"
description = "Where the app renders labels for the same concept in multiple places (Convert to, queued/ready/done counts, Ready/Converting/Done statuses, presets, session export), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numeral_counters_consistent"
description = "Where the app renders numeral counters and sizes, formatting is consistent (for example \"1 queued, 0 ready, 1 done\" style counts and readable input/output sizes)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "status_and_success_copy_specific"
description = "Where the app renders status or completion feedback (Done status, enabled Download, counts updates, copied confirmation), the copy/state names what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "batch_and_preset_copy_names_fields"
description = "Where the app renders Session export labels, batch confirmation copy, and preset validation, the copy names the field or count involved rather than generic Submit or OK."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as \"The file converter you'll love.\", \"Drop or click to convert\", Convert, Download, Remove, Batch set format, or Clear queue."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same queue, preset, or format concept is named inconsistently across the drop zone, queue rows, counts line, batch tray, and Settings in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Button labels, validation messages, or section titles (not intentional long-filename ellipsis in queue rows) are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
