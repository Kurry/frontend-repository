[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_converter_controls"
description = "Every interactive control — the drop zone, Add sample png/svg, Convert, Download, Remove, Clear queue, Cancel, Convert-to selectors, selection checkboxes, batch actions (Batch set format, Batch remove, Download all done), Undo/Redo, navbar links (Upload, Convert, Settings, About), theme toggle, catalog category cards, Settings fields including default Convert-to, preset Save/Apply/Delete, and Session export Copy/Download/Import — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus ring when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "dropzone_enter_space_opens_picker"
description = "Focusing the drop zone and pressing Enter or Space opens the local file picker exactly as a pointer click does."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "status_and_counts_aria_live"
description = "Status changes are announced: the counts line and each status pill update via an aria-live region so conversion progress is announced without moving focus."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "category_aria_pressed"
description = "The active catalog category card exposes its pressed state through aria-pressed as well as its accent ring."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "settings_fields_explicitly_labeled"
description = "Settings form controls (output quality, keep-metadata toggle, default Convert-to target, theme choice), preset save name field, and Session export import validation messages use explicit labels or associations naming the offending field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "Headings follow a logical order with no skips across the workspace hero, queue, catalog, Settings, Session export, and About views."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_present"
description = "The app exposes semantic landmarks (for example nav for the pill navbar and main for the converter workspace) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "contrast_light_and_dark"
description = "Text and controls meet sufficient contrast against their surfaces in both the light and dark themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "status_not_color_alone"
description = "Each per-file status (Ready, Converting, Done, Failed, Unsupported) carries a text label and a glyph, never color alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, queue row enter/exit animations, batch-tray/preset transitions, Session export panel motion, and Convert/Settings/About view transitions are removed and state changes apply instantly while every convert-and-download flow remains completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "copy_and_import_announced_live"
description = "Session export Copy confirmation and import validation errors are announced through an aria-live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "dialog_focus_trap_batch_and_export"
description = "Batch-remove confirmation and Session export use dialog semantics: focus moves in on open, stays trapped while open, and returns to the invoking control on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "converter_controls_unreachable_by_keyboard"
description = "A primary converter control (drop zone, Convert, Download, Remove, Clear queue, Convert-to selector, selection checkbox, batch action, Undo/Redo, navbar link, theme toggle, preset control, Session export control, or category card) cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing"
description = "Focused interactive controls (drop zone, buttons, selectors, checkboxes, batch actions, Undo/Redo, navbar items, Settings fields, or Session export controls) show no visible focus ring or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Primary interactive controls use non-semantic tags without button/role semantics or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "status_conveyed_by_color_only"
description = "Per-file Ready/Converting/Done/Failed/Unsupported state is conveyed by color alone with no text label or glyph."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "full_flow_keyboard_incomplete"
description = "The convert-and-download flow cannot be completed with keyboard alone to the same result as pointer (sample add → Convert → Download)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast"
description = "Hero, queue row, catalog card, batch tray, or Settings label text is unreadable due to poor contrast in light or dark theme."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "status_changes_not_announced"
description = "Conversion progress updates the counts line or status pills visually only, with no aria-live (or equivalent) announcement for assistive technology."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "icons_missing_accessible_names"
description = "Meaningful navbar, drop-zone, status, batch, or catalog icons that convey actions or status are missing alt text or an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Workspace or Settings headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, queue row enter/exit, batch-tray reveal, Session export panel, or Convert/Settings/About view transitions still animate fully."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n11"
name = "dialog_focus_not_trapped"
description = "Batch-remove confirmation or Session export opens without moving focus in, trapping focus, or returning focus to the invoking control on close."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
