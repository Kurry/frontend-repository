[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the converter workspace opens directly with no login or splash: a centered pill navbar (VERT, Upload, Convert, Settings, About, theme toggle), the hero headline \"The file converter you'll love.\", a drop zone titled \"Drop or click to convert\", the conversion queue, and the \"VERT supports...\" catalog are all visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the conversion queue shows the empty state \"Your conversion queue is empty\" with guidance that a local file is needed and the counts line \"0 files queued\", and shows no progress bar, checkmark, or enabled Download control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, the \"VERT supports...\" section renders four category cards (Images, Audio, Documents, Video); the Images card lists real image extensions including .png, .jpeg, .webp, and .svg, and the Video card reads \"Server supported\" while the others read \"Local supported\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "When the drop zone is focused with the keyboard and Enter or Space is pressed, the native file picker opens, matching the behavior of clicking the drop zone, and the focused drop zone shows a visible focus ring."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After clicking \"Add sample png\", a file row appears in the queue showing the filename, a \".png\" source format, a \"Convert to\" selector, the input size, and a Ready status, and the counts line updates to include 1 queued and 1 ready."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After adding a sample file and clicking Convert, the row moves to a Done status showing a green check and a converted output size, the counts line updates to \"1 queued, 0 ready, 1 done\", and the row's Download control becomes enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After a file reaches Done, changing its \"Convert to\" selector to a different target returns the row to a Ready status so it can be reconverted, and clearing that row's prior result."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After adding a sample png with target jpeg and converting it, then adding another sample png with target webp and converting it, the two completed rows show different output sizes, confirming the conversion is real rather than a constant hardcoded result."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After clicking a queued file row it becomes the selected row with a visible inset ring, and clicking its Remove control drops the row from the queue and decrements the counts line."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When window.webmcp_invoke_tool('entity_create', {sample:'png'}) then window.webmcp_invoke_tool('artifact_convert', {}) are called, the visible queue gains a file row that reaches a Done status, matching what the UI Convert control produces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After opening Settings and changing the Output quality control, then reloading the page, the Settings view still shows the changed quality value and the theme choice, confirming these persist in client storage."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After reloading the app before adding any file, exactly one empty conversion queue with the empty-state message is shown and no phantom file row or false Done state appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "When the theme toggle in the navbar is activated, the whole surface switches between light and dark and every text-on-surface pairing remains legible; toggling again returns to the original theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When the viewport is resized to 375 by 667 pixels, the hero stacks, the catalog collapses to one column, and the drop zone, queue controls, and format selectors remain operable with no horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load the converter workspace opens directly (no login or splash) with the pill navbar (VERT, Upload, Convert, Settings, About, theme toggle), the hero headline \"The file converter you'll love.\", the \"Drop or click to convert\" drop zone, the conversion queue, and the \"VERT supports...\" catalog all visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "On load the conversion queue shows the empty state \"Your conversion queue is empty\" with guidance that a local file is needed and the counts line \"0 files queued\", with no progress bar, checkmark, or enabled Download control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "On load the \"VERT supports...\" section renders four category cards (Images, Audio, Documents, Video); the Images card lists real extensions including .png, .jpeg, .webp and .svg, and the Video card reads \"Server supported\" while the others read \"Local supported\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "When the drop zone is focused and Enter or Space is pressed the local file picker opens, matching a click on the drop zone, and the focused drop zone shows a visible focus ring."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "After clicking \"Add sample png\" a file row appears showing the filename, a .png source format, a \"Convert to\" selector, the input size, and a Ready status, and the counts line updates to 1 queued and 1 ready."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "After adding a sample file and clicking Convert the row reaches a Done status with a green check and a converted output size, the counts line reads \"1 queued, 0 ready, 1 done\", and the Download control becomes enabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "After a file reaches Done, changing its \"Convert to\" selector to a different target returns the row to a Ready status so it can be reconverted and clears the prior result."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Clicking a completed row's Download saves a real converted file to disk with the correct target extension; the Download control stays disabled until that row is Done."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "A file whose format cannot be decoded is added with an Unsupported status and a plain-language reason, and is never shown a Done or download-ready state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "After clicking a queued row it becomes the selected row with a visible inset ring, and clicking its Remove control drops the row from the queue and decrements the counts line; Clear queue empties the whole queue."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Selecting a \"VERT supports...\" category card marks it active (accent ring, aria-pressed) and the active category is remembered after a reload."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Settings exposes an Output quality control (1 to 100) that changes jpeg and webp output bytes, a keep-metadata toggle, and a light/dark theme choice; About and Privacy explain conversion is local and remain reachable with no file selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "Adding multiple files and converting processes each to its own selected target, moving each row independently through Converting to Done and keeping the counts line consistent with the rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "At 375 by 667 pixels the hero stacks, the catalog collapses to one column, and the drop zone, queue controls, and format selectors remain operable with no horizontal page scrolling."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "The app must not present a conversion success (Done, checkmark, output size, or enabled Download) for a file that has not actually been converted, and the empty queue must not display any file row or progress while no file has been added."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
