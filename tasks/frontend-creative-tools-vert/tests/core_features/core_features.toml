[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "workspace_renders_on_load"
description = "On load, the converter workspace opens directly with no login or splash: a centered pill navbar (VERT, Upload, Convert, Settings, About, theme toggle), the hero headline \"The file converter you'll love.\", a drop zone titled \"Drop or click to convert\", the conversion queue, and the \"VERT supports...\" catalog are all visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "empty_queue_initial_state"
description = "On load, the conversion queue shows the empty state \"Your conversion queue is empty\" with guidance that a local file is needed and the counts line \"0 files queued\", and shows no progress bar, checkmark, or enabled Download control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "catalog_four_category_cards"
description = "On load, the \"VERT supports...\" section renders four category cards (Images, Audio, Documents, Video); the Images card lists real image extensions including .png, .jpeg, .webp, and .svg, and the Video card reads \"Server supported\" while the others read \"Local supported\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "dropzone_keyboard_activation"
description = "When the drop zone is focused with the keyboard and Enter or Space is pressed, the native file picker opens, matching the behavior of clicking the drop zone, and the focused drop zone shows a visible focus ring."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "sample_png_adds_queue_row"
description = "After clicking \"Add sample png\", a file row appears in the queue showing the filename, a \".png\" source format, a selection checkbox, a \"Convert to\" selector defaulting to the Settings default Convert-to target when set (otherwise a sensible target), the input size, and a Ready status, and the counts line updates to include 1 queued and 1 ready."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "add_convert_download_chain"
description = "Starting from the empty queue, clicking \"Add sample png\" makes the empty-state message disappear and the counts line leave \"0 files queued\"; clicking Convert then moves that row through Converting to Done with a converted output size shown, updates the counts line to \"1 queued, 0 ready, 1 done\", and enables that row's Download control — all without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "retarget_done_row_resets_ready"
description = "After a file reaches Done, changing its \"Convert to\" selector to a different target returns the row to a Ready status, disables its Download control, and updates the counts line; running Convert again completes it to Done with an output size shown for the new target."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "dual_target_outputs_differ"
description = "After converting the same source file twice, once to webp and once to jpeg, the two completed rows show different output sizes (confirming the conversion is real rather than a constant hardcoded result), and each row's Download saves a file whose extension matches its selected target."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "multi_surface_persistence_chain"
description = "After selecting a catalog category, switching the theme, changing the Settings quality and default Convert-to target, and saving a conversion preset, reloading the page restores the active category, theme, quality, default target, and presets list, while the conversion queue returns to a single empty state with \"0 files queued\" and no phantom row, progress, or download success."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "fresh_reload_single_empty_queue"
description = "After reloading the app before adding any file, exactly one empty conversion queue with the empty-state message is shown and no phantom file row or false Done state appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "theme_toggle_switches_surface"
description = "When the theme toggle in the navbar is activated, the whole surface switches between light and dark and every text-on-surface pairing remains legible; toggling again returns to the original theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "download_saves_correct_extension"
description = "Clicking a completed row's Download saves a real converted file to disk with the correct target extension; the Download control stays disabled until that row is Done."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "undecodable_file_marked_unsupported"
description = "A file whose format cannot be decoded is added with an Unsupported status and a plain-language reason, and is never shown a Done or download-ready state; its Download control never enables."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "row_select_remove_and_clear"
description = "Each queue row exposes a selection checkbox; checking it marks the row selected (inset ring) and reveals the batch tray; clicking Remove drops the row from the queue and decrements the counts line; Clear queue empties the whole queue."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "active_category_marked_and_persists"
description = "Selecting a \"VERT supports...\" category card marks it active (accent ring, aria-pressed) and the active category is remembered after a reload."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "settings_and_about_content"
description = "Settings exposes output quality (1 to 100), keep-metadata toggle, default Convert-to target (png, jpeg, jpg, or webp), and light/dark theme; About and Privacy explain conversion is local and files are never uploaded, and remain reachable with no file selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "multi_file_independent_targets"
description = "Adding multiple files and converting processes each to its own selected target, moving each row independently through Converting to Done and keeping the counts line consistent with the rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "false_success_shown"
description = "The app presents a conversion success (Done, checkmark, output size, or enabled Download) for a file that has not actually been converted, or the empty queue displays a file row or progress while no file has been added."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "route_urls_share_chrome_and_theme"
description = "Navigating to Convert, Settings, or About by entering its URL directly renders the same view as reaching it through the navbar, with the shared pill navbar and the current theme intact on every route."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "dropzone_helper_names_inputs"
description = "Before any file is chosen, the drop zone's helper text names the supported local input formats (png, jpg, jpeg, webp, gif, bmp, and svg)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.32"
name = "sample_svg_adds_and_converts"
description = "Clicking \"Add sample svg\" adds a queue row with an .svg source format without opening the local file picker, and running Convert transcodes it to its selected raster target, reaching Done with an output size shown."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "cancel_stops_in_progress_run"
description = "Activating Cancel during an in-progress conversion run stops the run: no row left mid-run shows Done, and the counts line matches the rows actually completed."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "double_convert_runs_each_file_once"
description = "With ready files queued, activating Convert twice in quick succession converts each ready file exactly once: the done count increases only by the number of ready rows and no duplicate rows are created."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "long_filename_truncates_cleanly"
description = "A queued file with a long filename is truncated with an ellipsis in its queue row without breaking the row layout, and its download still uses the full name with the correct extension."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.36"
name = "quality_setting_affects_output_size"
description = "After lowering the output quality in Settings, reconverting the same file to jpeg yields a smaller output size on the completed row than the same conversion at quality 100, showing the setting flows into the conversion result."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "remove_last_file_restores_empty_state"
description = "Removing the only queued file restores the explicit empty state and the \"0 files queued\" counts line, and adding a file again works immediately from that state."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "quality_field_inline_validation"
description = "Entering an output-quality value outside 1 to 100 in Settings shows an inline validation message naming the quality field before submit, and the invalid value is never applied to conversions."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "queue_row_field_contract"
description = "After adding the sample png, the queue row shows QueueFile field-contract fields: non-empty name, from in png|jpg|jpeg|webp|gif|bmp|svg, to in png|jpeg|jpg|webp, status Ready (then Done after Convert), a selection checkbox (selected boolean), and a non-negative inputSize; when Done, a non-negative outputSize is shown."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "session_json_export_field_contract"
description = "After converting a sample file with a non-default quality and at least one named preset visible, the session JSON export preview is a ConversionSessionDocument: schemaVersion exactly vert-session-v1, quality, keepMetadata, theme (light|dark), activeCategory (Images|Audio|Documents|Video), defaultTarget (png|jpeg|jpg|webp), presets array of ConversionPreset objects (name, target, quality), files array of QueueFile metadata (name, from, to, status, selected, inputSize, outputSize when Done), and exportedAt ending in Z — matching the visible store, with no raw file bytes, blobs, or base64 payloads."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "conversion_session_import_round_trip"
description = "After mutating settings and presets with at least one file still queued, exporting session JSON then Importing that same ConversionSessionDocument restores Settings quality/keep-metadata/theme/default target, the presets list, and Convert-to targets on currently queued files that match by filename, and the session JSON export preview matches that imported state including schemaVersion vert-session-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "session_export_omits_session_mutations"
description = "After lowering quality, saving a preset, and converting a sample file, the session JSON or conversion-report export omits the lowered quality, omits the saved preset, or omits a per-file entry reflecting the converted row's name/from/to/status."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.43"
name = "batch_tray_reveals_on_multi_select"
description = "Selecting one or more queue rows via their selection checkboxes reveals a batch tray with Batch set format, Batch remove, and Download all done; with zero selected the tray stays hidden."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "batch_set_format_applies_target"
description = "With two queued files selected, Batch set format to webp sets Convert-to to webp on both selected rows; any previously Done selected row returns to Ready with Download disabled, and the session JSON export preview lists both files' to as webp."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "batch_remove_confirms_and_removes"
description = "Batch remove asks for confirmation that names the selected count of rows to remove, then removes exactly those selected rows and updates the counts; with zero selected the tray stays hidden and Batch remove does nothing."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "download_all_done_triggers_downloads"
description = "Download all done triggers a real file download for every selected Done row, or for every Done row in the queue when none are selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "seeded_conversion_presets_at_least_three"
description = "On first load, Settings (or an adjacent presets strip on Convert) lists at least 3 seeded named conversion presets, each with a name, a default target format (png, jpeg, jpg, or webp), and a quality from 1 to 100."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "save_preset_adds_named_preset"
description = "Saving a ConversionPreset named \"Web ready\" with target webp and quality 80 increases the visible preset count by exactly one and the session JSON presets entry shows those same name/target/quality values; empty, whitespace-only, or over-length (greater than 64) names are rejected with an inline message naming the name field and add no preset."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "apply_preset_writes_quality_and_targets"
description = "Applying a preset writes that preset's quality into Settings and its target into every selected queue row, or into every Ready row when none are selected; Done rows that receive a new target return to Ready."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "delete_preset_decrements_count"
description = "Delete preset removes the named preset after confirmation; seeded and user presets alike can be deleted, and the visible preset count decreases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "undo_restores_queue_or_preset"
description = "Undo reverses the most recent mutating queue or preset action (add, remove, clear, retarget, batch set format, batch remove, save preset, or delete preset) and restores the prior queue rows, counts, selection, and presets list; Undo/Redo controls show enabled and disabled states that match whether a step is available."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "redo_reapplies_and_clears_on_new_mutation"
description = "Redo reapplies the most recently undone action with the same completeness; after Undo removes a queued file, Redo removes it again; performing a new mutating add after an undo clears the redo stack and disables Redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "session_export_two_formats_live"
description = "The Session export panel compiles LIVE from the current store and offers session JSON and conversion-report markdown tabs; each preview regenerates whenever the queue, settings, or presets change, with a monospaced preview and Copy / Download / Import controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "conversion_report_markdown_summarizes"
description = "The conversion-report markdown export summarizes settings, preset names, and one line per queued file with name, formats, status, and sizes matching the visible session."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "session_export_copy_and_download"
description = "On a session JSON or conversion-report tab, Copy writes the visible preview text to the clipboard and shows a brief copied confirmation; Download starts a file download of that same preview text."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.56"
name = "default_convert_to_applies_on_add"
description = "Setting a default Convert-to target in Settings (for example webp) causes newly added files to default their Convert-to selector to that target."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n43"
name = "batch_tray_visible_with_zero_selected"
description = "The batch tray (Batch set format, Batch remove, Download all done) is visible while zero queue rows are selected."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n44"
name = "empty_preset_name_still_adds"
description = "Saving a preset with an empty or whitespace-only name increases the visible preset count or adds a blank-named preset."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n45"
name = "undo_fails_to_restore_queue_or_presets"
description = "After removing a queued file or deleting a preset, Undo leaves the queue counts or presets list unrestored."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.57"
name = "settings_update_field_contract"
description = "Changing Settings quality within 1–100, keep-metadata, default Convert-to (png|jpeg|jpg|webp), and theme (light|dark) applies a SettingsUpdate payload whose values appear under the matching keys in the live session JSON export preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "schema_invalid_session_import_rejected"
description = "Importing parseable JSON that fails the ConversionSessionDocument field contract — schemaVersion not exactly vert-session-v1, a missing required key, a preset target outside png|jpeg|jpg|webp, or a file from/to/status outside its closed enum — shows an inline error naming the offending field (or the import field) and leaves quality, presets, and queue targets unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n46"
name = "session_json_missing_schema_version"
description = "After a valid conversion and settings mutation, the session JSON export preview omits schemaVersion vert-session-v1 or omits a required ConversionSessionDocument key (quality, keepMetadata, theme, activeCategory, defaultTarget, presets, files, or exportedAt)."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
