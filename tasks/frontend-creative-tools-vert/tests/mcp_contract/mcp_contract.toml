[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "three_mandated_modules_bound"
description = "All three contract-mandated modules are initialized and bound: artifact-transfer-v1, entity-collection-v1, and command-session-v1 (tools discoverable via webmcp_list_tools with artifact_*, entity_*, and session_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_converter_ui"
description = "Exposed tool handlers call the same application logic as the visible UI: artifact/entity/session operations change the same conversion queue, per-file targets/status/selection, presets, convert/cancel/download state, and session-export previews the drop zone, Convert, Cancel, Download, batch tray, and Session export controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: artifact import/convert/export/copy with conversion modes (png-to-jpeg, png-to-webp, jpeg-to-png, jpeg-to-webp, webp-to-png, webp-to-jpeg, gif-to-png, bmp-to-png, svg-to-png), export formats png/jpeg/jpg/webp/session-json/conversion-report, and import mode conversion-session; entity create/select/update/delete/toggle on file (fields name, from, to, status, selected); session start/stop — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound artifact, entity, and session tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_file_create_select_update_delete_toggle"
description = "Entity operations declared for entity file work: create, select, update, delete (delete requires confirm=true), and toggle update the visible conversion queue rows, selection checkboxes, and counts."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_start_stop_bound"
description = "Session operations start and stop are bound and invoke the same convert-run / cancel logic as the visible Convert and Cancel controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_import_convert_export_copy_bound"
description = "Artifact operations import, convert, export, and copy with the declared conversion modes, export formats (including session-json and conversion-report), and import mode conversion-session are bound and invoke without throwing when called through WebMCP (file picker interaction and downloaded bytes remain Playwright responsibilities)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond artifact-transfer-v1, entity-collection-v1, and command-session-v1, and no undeclared operations beyond the Bindings list (including no queue reorder), are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "visible_postconditions_session_export"
description = "After WebMCP artifact export of session-json or conversion-report (or equivalent store mutation), the visible Session export previews reflect queue, settings, and preset mutations — matching the workflow-completion binding — and the session-json preview still shows ConversionSessionDocument keys including schemaVersion vert-session-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "visible_postconditions_batch_set_format"
description = "A WebMCP-driven or UI-equivalent batch set format updates selected rows' to field and resets Done to Ready, matching the workflow-completion binding and the visible queue."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for artifact-transfer-v1, entity-collection-v1, or command-session-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound artifact/entity/session tool leaves the conversion queue, per-file status/selection, presets, or session-export preview diverging from what the equivalent visible UI control would produce."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings (artifact import/convert/export/copy; entity create/select/update/delete/toggle; session start/stop) are exposed — including a queue reorder operation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared artifact, entity, and session bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mcp_update_bypasses_shared_state"
description = "An entity update/toggle or artifact convert/export invocation updates a parallel copy of state, leaving visible queue rows/counts or session-export previews showing stale values that disagree with the MCP result (MCP/UI desync)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_not_implemented"
description = "One or more of artifact-transfer-v1, entity-collection-v1, or command-session-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave queue/convert/export state unchanged when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "mechanics_exclusion_faked_via_mcp"
description = "Raw file paths, blobs, base64, or artifact contents appear in WebMCP arguments or results, violating the mechanics exclusion that file picker interaction and downloaded artifacts remain Playwright responsibilities."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n11"
name = "missing_conversion_report_or_toggle"
description = "Export formats omit conversion-report, entity operations omit toggle, or entity fields omit selected despite those bindings being declared."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract deviates from its declaration in a way not covered by any other criterion in this file. 'Significant' means a real automation/contract break, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
