[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "dropzone_delight_beyond_minimum"
description = "Beyond the required dragover highlight, the drop zone includes an extra delightful microinteraction on add or drop (for example a richer press pop or success flash) that remains browser-observable (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.2"
name = "status_transition_polish_beyond_swap"
description = "Status pills offer an advanced transition beat beyond a hard label swap — for example a brief glyph morph or count-line choreography — verified through a real Convert run (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.3"
name = "guided_first_run_for_converter"
description = "A brief guided first-run or coachmark introduces the drop zone, sample affordances, and Convert without blocking the tool (bonus beyond required empty-state copy)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.4"
name = "format_catalog_extra_usability"
description = "An interactive catalog aid beyond the required four category cards — for example a searchable format list or hover format tip — adds usability while staying local (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.5"
name = "power_user_queue_shortcuts_beyond_batch"
description = "Beyond the required batch tray and Undo/Redo, the queue offers an extra power-user path such as select-all, keyboard multi-retarget of focused rows, or sticky last-used batch format (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_required"
description = "Within allowed client storage, the app offers a small personalization beyond the required theme/category/quality/default-target/presets persistence (for example remembering last Session export format tab) (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.7"
name = "branded_vert_narrative_polish"
description = "The VERT pill brand, hero line, and magenta-to-blush converter surface read as a cohesive branded tool narrative rather than generic unstyled controls (bonus execution quality)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.8"
name = "theme_craft_beyond_bare_toggle"
description = "Light/dark theming craft goes beyond a bare toggle — cohesive tokenized accents across navbar, drop zone, queue pills, batch tray, and catalog without inventing a conflicting second product (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.9"
name = "local_offline_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality bundled type or a clearly offline-capable shell with no CDN) is visible without network dependence (bonus)."
type = "binary"
optional = true
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_converter_feel"
description = "The overall tool feels competition-grade: sample-to-download speed, real codec conversion feedback, live session export, and queue density read as a professional local converter rather than a wired demo (bonus)."
type = "binary"
optional = true
weight = 0.5


[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain file input with no pill navbar, hero, drop-zone card, queue worklist, batch tray, or format catalog immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified single-product converter composition (gradient page, pill navbar, hero + dominant drop zone)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
