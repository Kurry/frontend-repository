[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on a local render: the converter workspace (navbar, hero, drop zone, empty queue, seeded presets, catalog) is usable within that window."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_all_routes"
description = "No console errors, warnings, or hydration mismatch messages appear on Convert, Settings, or About — on first load or after client-side navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "ui_transitions_respond_quickly"
description = "Navbar route switches and theme toggles begin responding in under 100ms of the pointer/keyboard action (no multi-second UI stall)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "converting_shows_status_progress"
description = "While Convert runs, Converting status on affected rows (and live counts updates) give visible progress feedback for the async work."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "multi_file_queue_stays_responsive"
description = "With several queued files visible, scrolling the queue and interacting with Convert-to selectors and selection checkboxes remains without perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "conversion_keeps_page_interactive"
description = "Converting a file keeps the page responsive: the navbar, theme toggle, and other queue rows stay interactive while a conversion runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "row_and_view_animations_smooth"
description = "Queue row enter/exit and Convert/Settings/About view transitions maintain smooth motion without visible hitching when exercised through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapidly clicking sample add, Convert, batch actions, Undo, or theme toggle does not hang or freeze the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "no_layout_jumps_after_paint"
description = "After first paint no visible layout jumps occur; the queue and catalog regions hold their space as content settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "extended_session_stable"
description = "An extended session of add → convert → batch → undo → preset save → session export → remove → clear → settings changes shows no runaway resource use that freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "session_export_recompiles_without_freeze"
description = "Session export previews recompile without freezing the queue controls after a retarget, preset save, or conversion."
type = "binary"
weight = 1.0

