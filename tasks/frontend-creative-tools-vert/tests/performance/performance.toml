[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on a local render: the converter workspace (navbar, hero, drop zone, empty queue, seeded presets, catalog) is usable within that window."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_all_routes"
description = "No console errors, warnings, or hydration mismatch messages appear on Convert, Settings, or About — on first load or after client-side navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "ui_transitions_respond_quickly"
description = "Navbar route switches and theme toggles begin responding in under 100ms of the pointer/keyboard action (no multi-second UI stall)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "converting_shows_status_progress"
description = "While Convert runs, Converting status on affected rows (and live counts updates) give visible progress feedback for the async work."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "multi_file_queue_stays_responsive"
description = "With several queued files visible, scrolling the queue and interacting with Convert-to selectors and selection checkboxes remains without perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "conversion_keeps_page_interactive"
description = "Converting a file keeps the page responsive: the navbar, theme toggle, and other queue rows stay interactive while a conversion runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "row_and_view_animations_smooth"
description = "Queue row enter/exit and Convert/Settings/About view transitions maintain smooth motion without visible hitching when exercised through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapidly clicking sample add, Convert, batch actions, Undo, or theme toggle does not hang or freeze the app."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "no_layout_jumps_after_paint"
description = "After first paint no visible layout jumps occur; the queue and catalog regions hold their space as content settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "extended_session_stable"
description = "An extended session of add → convert → batch → undo → preset save → session export → remove → clear → settings changes shows no runaway resource use that freezes the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "session_export_recompiles_without_freeze"
description = "Session export previews recompile without freezing the queue controls after a retarget, preset save, or conversion."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the converter workspace is interactive on local render."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors, warnings, or hydration mismatches appear during Convert/Settings/About navigation or convert flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "route_or_theme_transitions_block"
description = "Route switches or theme toggles block or lag for a noticeable multi-second stall."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "conversion_hangs_ui"
description = "Running Convert freezes the navbar, theme toggle, or other queue rows until the run finishes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "multi_file_queue_janks"
description = "A queue with several files kills interactivity — scrolling or changing Convert-to selectors becomes unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Row enter/exit or view-transition animation makes Convert, Download, or navbar input unresponsive."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_first_paint"
description = "The UI blocks rendering of the converter workspace while loading resources, leaving a blank page past first paint."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_over_session"
description = "Repeated convert/clear/export cycles cause runaway browser resource usage that freezes or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "layout_jumps_after_paint"
description = "After first paint the queue or catalog visibly jumps or reflows as content settles without reserved space."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_use_crashes"
description = "The app crashes or becomes a blank page under rapid sample-add / Convert / Cancel / Undo use."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n11"
name = "export_recompile_freezes_queue"
description = "After a retarget, preset save, or conversion, regenerating the session export preview freezes queue controls for a multi-second stall."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
