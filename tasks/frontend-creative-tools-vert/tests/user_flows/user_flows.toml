[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "sample_png_convert_download_chain"
description = "Create/convert flow: clicking \"Add sample png\" appends exactly one queue row, the counts line changes from \"0 files queued\" to reflect one queued file, and the empty-state message disappears; running Convert moves that row through Converting to Done, updates the counts line to show one done, and enables that row's Download — all without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "settings_quality_invalid_blocked"
description = "Settings flow: entering a quality outside 1 to 100 shows immediate inline validation naming the quality field, and the invalid value is not applied."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "retarget_done_row_returns_to_ready"
description = "Edit flow: changing a Done row's \"Convert to\" target returns that row to Ready, disables its Download control, and updates the counts line; running Convert again completes it to Done with an output size shown for the new target."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "remove_file_updates_queue_and_counts"
description = "Delete flow: removing a queued file drops its row from the queue and the counts; removing the only queued file restores the empty state and \"0 files queued\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "route_switch_retains_theme_and_navbar"
description = "View/mode switch: navigating to Convert, Settings, or About by navbar or URL renders the matching view with the shared navbar and theme intact, without losing the theme choice."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_remove_reveals_empty_state"
description = "Edge: after removing the only queued file, the empty state \"Your conversion queue is empty\" and \"0 files queued\" are clear and visible, and adding a file again works immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "webp_vs_jpeg_different_outputs"
description = "Convert flow: converting the same source file twice, once to webp and once to jpeg, produces two completed rows whose output sizes differ, and each Download saves a file whose extension matches its selected target."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "quality_setting_flows_into_jpeg_size"
description = "Settings→convert flow: lowering output quality in Settings and reconverting the same file to jpeg yields a smaller output size on the completed row than the same conversion at quality 100."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "catalog_theme_quality_preset_persist_queue_resets"
description = "Persistence flow: selecting a catalog category, switching the theme, changing the quality setting, and saving a preset, then reloading, restores the active category, theme, quality, and presets list, while the conversion queue returns to a single empty state with \"0 files queued\" and no phantom row, progress, or download success."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "about_privacy_reachable_without_file"
description = "Recovery/navigation: About and Privacy views remain reachable from the navbar without selecting a file, and returning to Convert restores the workspace without a dead-end reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "session_export_import_chain"
description = "Artifact end state: after converting at least one file and changing quality, open Session export — the session JSON preview shows schemaVersion vert-session-v1 and quality/per-file status/to/outputSize matching the visible store; Copy shows a brief copied confirmation; Download starts a file of that same text; change settings away; Import the same JSON and confirm Settings, presets, matching queue Convert-to targets, and schemaVersion restore without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "batch_set_format_updates_export"
description = "Batch flow: selecting two queued files, running Batch set format to webp, and confirming both rows show webp as Convert-to (Done rows returned to Ready) updates the session JSON export preview so both files list to as webp — all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "save_and_apply_preset_flow"
description = "Preset flow: saving a ConversionPreset named Web ready with target webp and quality 80 increases the visible preset count by exactly one and the session JSON presets entry shows those name/target/quality values; applying it writes quality 80 into Settings and webp into the selected (or all Ready) rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "undo_redo_remove_round_trip"
description = "Undo/redo flow: Undo after removing a queued file restores that row and the prior counts; Redo removes it again; after a new add following an undo, Redo is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_convert_flow_unavailable"
description = "Adding a sample file, running Convert, or downloading a completed result cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "sample_add_missing_or_duplicated"
description = "Clicking \"Add sample png\" either fails to add a visible queue row or adds duplicate rows for a single click."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "convert_desyncs_row_and_counts"
description = "After Convert completes, the row status, enabled Download, and counts line disagree about whether the file is Done."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "route_switch_breaks_or_loses_theme"
description = "Switching among Convert, Settings, and About breaks the layout or loses the active theme / navbar."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_queue_region_broken"
description = "After removing the last queued file, the queue region is blank or broken with no empty-state copy, or \"0 files queued\" is missing."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "same_targets_identical_output_sizes"
description = "Converting the same source once to webp and once to jpeg yields identical output sizes (or identical download extensions), showing hardcoded rather than real conversion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "retarget_leaves_download_enabled"
description = "Changing a Done row's Convert-to target leaves Download enabled or leaves the row Done instead of returning it to Ready."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "reload_leaves_phantom_queue_success"
description = "After reload, the queue shows a phantom file row, progress, checkmark, or download-ready control instead of a single empty \"0 files queued\" state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_or_unsupported_silent"
description = "An Unsupported or Failed conversion provides no visible status feedback naming the problem."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Leaving Settings or About requires a full page reload to recover the converter workspace — a navigation dead end."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n11"
name = "session_import_does_not_restore_settings"
description = "Importing a previously exported valid session JSON after changing quality/theme/presets/default target leaves those surfaces unchanged — no round-trip restore."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n12"
name = "batch_set_format_skips_selected_rows"
description = "After Batch set format to webp on two selected rows, one or both still show a different Convert-to target, or a selected Done row stays Done with Download enabled."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n13"
name = "undo_redo_broken_after_remove"
description = "After removing a queued file, Undo fails to restore the row/counts, or after Undo then a new add, Redo remains enabled and resurrects the cleared redo stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.15"
name = "create_record_matches_session_json_body"
description = "Create record is request body: save a valid ConversionPreset and change Settings quality and defaultTarget, then open session JSON — the preview carries schemaVersion vert-session-v1, those SettingsUpdate fields, the saved preset under ConversionPreset keys, and files entries under QueueFile keys matching the visible store."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "schema_validation_reject_then_valid_export"
description = "Schema validation flow: Save preset with an empty name leaves preset count unchanged with name field named; Settings quality outside 1–100 is not applied with quality field named; Import JSON with schemaVersion not vert-session-v1 leaves store unchanged with offending field named; then a valid save and export yields session JSON whose payload shape matches the form-produced request bodies."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n14"
name = "schema_invalid_import_still_applies"
description = "Importing session JSON with schemaVersion not vert-session-v1, or with a preset/file enum outside its closed set, still mutates Settings, presets, or queue targets."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
