[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "gradient_workspace_styling"
description = "The workspace reads as a focused, styled converter surface (magenta-to-blush vertical gradient page background, floating rounded white navbar pill, prominent white drop-zone card) rather than generic unstyled cards or framework defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "dropzone_visual_focal_point"
description = "The drop zone is the visual focal point of the first viewport — a rounded card with a circular magenta upload glyph, a large title, and supporting helper text — clearly more prominent than secondary metadata, the catalog, or the footer."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "status_pill_color_glyph_coding"
description = "Per-file status is shown as a pill coded by color, glyph, and text together (muted Ready, amber Converting, green Done, red Failed and Unsupported), applied consistently across rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "type_hierarchy_and_spacing_scale"
description = "Typography uses at least three distinguishable roles (oversized hero, section/card headings, body and muted captions) and spacing clusters on a consistent 4 and 8 pixel scale, with one magenta accent family on a light neutral base, green reserved for success and red for error."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "dual_theme_legibility"
description = "Both light and dark themes keep every text-on-surface pairing legible (body text meets AA contrast), and interactive controls show a visible focus indicator in both themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "concise_sentence_case_microcopy"
description = "UI microcopy is concise UI writing in sentence case: verb-first buttons (Convert, Download, Remove, Clear queue), numeral counters (\"1 queued, 0 ready, 1 done\"), second-person help text, and error or unsupported messages that state the problem plainly without codes or blame."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "meaning_conveyed_by_color_alone"
description = "A status, category, or validity meaning is conveyed by color alone: a status pill, error message, or active state loses its meaning without color perception because it lacks a text label or glyph."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "framework_default_or_shouty_labels"
description = "The interface reads as framework-default or unstyled, or headings, buttons, or labels use Title Case or ALL-CAPS for emphasis or underline text purely for emphasis."
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.9"
name = "queue_row_worklist_anatomy"
description = "Each queue row reads as a dense worklist entry: the filename emphasized, a muted sub-line for formats and sizes, a compact format selector, a pill-shaped status indicator, and right-aligned Download and Remove actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "catalog_card_grid_details"
description = "The \"VERT supports...\" section is a four-up card grid where each card shows a category icon, a bold category name, a support label (Video reads \"Server supported\" in the accent color, the others \"Local supported\"), a status line, and a scrollable list of real format extensions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "single_consistent_icon_family"
description = "Icons across the navbar, drop zone, status pills, and category cards come from one consistent glyph family with a matching visual style — no mixed icon styles."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.12"
name = "narrow_viewport_layout_operable"
description = "At a 320-pixel-wide viewport the hero stacks, the catalog collapses to one column, file rows stack, and the drop zone, queue controls, and format selectors remain operable with no horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
