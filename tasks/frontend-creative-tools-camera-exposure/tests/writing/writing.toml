[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "uppercase_convention_on_dial_meter_mode"
description = "Where the app renders dial titles, meter captions (UNDER EXPOSED / OVER EXPOSED), and mode labels, they keep one consistent uppercase convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific verbs such as Apply preset, Reset, Download PNG, Download JPEG, Download edit stack, Copy edit stack, and Import edit stack rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders validation messages (empty preset name, empty snapshot name, invalid edit-stack import), they name the problem and the fix."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_presets_copy_explains_next_step"
description = "Where the app renders the empty presets state, the copy explains that no presets exist and how to create one."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "help_explainers_polished"
description = "Where the app renders the three help explainer paragraphs (Aperture, Shutter Speed, ISO), rate how free they are of spelling and grammatical errors and filler."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (APERTURE vs Aperture in help, SPEED vs Shutter Speed, ISO, presets, look packs), terminology stays consistent."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "stop_readout_formatting_consistent"
description = "Where the app renders stop values, formatting is consistent: aperture as f/N, shutter as 1/N, ISO as a bare integer — the same conventions in dials and preset stop readouts."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "import_error_names_invalid_file"
description = "Where the app renders edit-stack import errors, the copy names the invalid file or field rather than a bare rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text (TODO, Lorem, asdf, or template variable names) is visible anywhere in the shipped UI, including help explainers."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as dial titles, meter captions, mode labels, or primary action buttons."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same dial, look pack, or export concept is named inconsistently across surfaces in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Dial titles, meter captions, preset names, export labels, or validation messages are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.9"
name = "scene_names_exact_everywhere"
description = "The five scene names Daylight Courtyard, Alpine Midday, Stadium Floodlights, Candlelit Study, and Neon Alley Night render exactly and consistently wherever they appear, including the settings card and the edit-stack JSON"
type = "binary"
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. If present, name the defect and cite evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
