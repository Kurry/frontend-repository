[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "Press the aperture stepper toward open: the f-number readout lowers and the preview visibly brightens with more background blur"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "Step the shutter dial from its slowest toward its fastest stop: distinct motion frames advance in order and the meter moves toward UNDER EXPOSED"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "Apply a seeded preset: all three dial readouts change to the preset's stops and the preview and meter update to match"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "On load, Meter/Lab mode shows the photo preview with aperture, shutter, and ISO dials plus the exposure meter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "On load (or after opening Presets/Compare), the presets list shows at least 6 seeded exposure looks with names and stop readouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After creating a preset named 'Golden Hour Soft' with valid stops, the text 'Golden Hour Soft' is visible in the presets list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After adding 3 new presets on top of the seed set, the presets list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After editing a preset name to 'Night Street Grain', the text 'Night Street Grain' is visible in the list and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After deleting a preset, that preset's name is no longer visible in the presets list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After deleting all presets, an empty state message is visible and no preset rows remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After submitting create with an empty required preset name, the presets count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After filtering presets by favorites or a look tag (with mixed items present), only matching presets remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After switching between Meter/Lab and Presets/Compare modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "When hovering steppers, preset rows, or primary controls, a visible hover wash, brightness, or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Exposure presets collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Exposure presets list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Pressing a dial's up/down stepper moves exactly one stop along that control's list and updates that dial's readout on the same press; APERTURE reads f/N (default f/16), SPEED reads 1/N (default 1/60), and ISO reads a bare integer (default 100)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The aperture stepper is inverted relative to the raw f-number: the open direction widens the aperture toward a lower f-number (e.g. f/16 to f/11) and the other direction narrows it toward a higher f-number"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "1_25"
description = "Pressing a dial updates the whole preview together on that press — frame brightness, depth-of-field blur, the visible shutter motion frame, the ISO noise overlay opacity, and the vertical exposure meter indicator all respond"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Each shutter stop shows its own distinct motion frame and stepping from slow to fast advances the frames in order"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "At the first or last stop of a control the stepper button fades to invisible and stops responding to clicks so the value cannot step past the edge, and the exposure meter dot is likewise capped at the track ends"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "Reset returns all three dials to their defaults (f/16, 1/60, ISO 100), restores the default preview, and re-centers the exposure meter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "The '?' help trigger opens a side help panel carrying distinct Aperture, Shutter Speed, and ISO explainer paragraphs and its glyph swaps to 'X' to close again; opening or closing help never navigates away or reloads"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "Pressing the dial steppers changes the readout number but the photo preview (brightness, blur, noise, or exposure meter) does not respond"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "preset_lifecycle_cross_mode_chain"
description = "Starting in Presets/Compare with the seeded list: create a valid preset and confirm the form closes and the visible preset row count increases by exactly one (measured immediately before and after); switch to Meter/Lab and back and confirm the same new preset row is still present without a reload; edit that preset's name and confirm the same row shows the new name (and any compare panel showing it updates); delete it and confirm the row count decreases by exactly one and the preset no longer appears in the list, in any selection, or in favorites/tag filter results"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "apply_look_cross_mode_chain"
description = "Applying a preset from Presets/Compare then switching to Meter/Lab shows, without a reload: all three dial readouts at the preset's values, the preview stack (brightness, blur, motion frame, grain) matching those stops, and the exposure meter at the corresponding position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "dial_meter_round_trip_preserved_across_modes"
description = "From the defaults (f/16, 1/60, ISO 100): stepping aperture one stop toward open brightens the frame, strengthens the blur, and moves the meter one increment toward over-exposed; stepping back one stop returns the frame, blur, and meter to the default state; then switching to Presets/Compare and back preserves the current dial values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "favorites_echo_filter_chain"
description = "Marking a preset favorite shows its favorite badge in the list immediately; switching the filter to favorites-only shows that preset among the results; unmarking it while the favorites-only filter is active removes it from the visible list on the same action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "double_submit_creates_exactly_one_preset"
description = "Double-activating the preset create submit control in quick succession creates exactly one preset: the visible row count increases by exactly one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "inline_field_errors_disable_submit"
description = "In the preset create or edit form, an invalid field shows an error message naming that field next to it before submit, and the submit control stays disabled until every required field is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "direct_entry_default_dial_values"
description = "On first load the full-viewport photo preview with overlaid dials renders immediately with APERTURE at f/16, SPEED at 1/60, and ISO at 100"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "login_gate_or_multipage_shell_blocks_simulator"
description = "A login screen, admin gate, or multi-page shell must be traversed before the simulator preview and dials appear"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.39"
name = "iso_grain_capped_at_max"
description = "Stepping ISO to its maximum stop (3200) makes the tiled grain overlay clearly more visible than at ISO 100, yet the underlying photo remains discernible (the grain never fully hides it)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core feature behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
