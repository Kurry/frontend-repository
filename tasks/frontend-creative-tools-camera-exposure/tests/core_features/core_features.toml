[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "aperture_open_brightens_and_blurs"
description = "Press the aperture stepper toward open: the f-number readout lowers and the preview visibly brightens with more background blur"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "shutter_steps_advance_motion_frames"
description = "Step the shutter dial from its slowest toward its fastest stop: distinct motion frames advance in order and the meter moves toward UNDER EXPOSED"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "apply_seeded_preset_updates_dials"
description = "Apply a seeded preset: all three dial readouts change to the preset's stops and the preview and meter update to match"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "meter_lab_shows_preview_dials_meter"
description = "On load, Meter/Lab mode shows the photo preview with aperture, shutter, and ISO dials plus the exposure meter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "seeded_presets_at_least_six"
description = "On load (or after opening Presets/Compare), the presets list shows at least 6 seeded exposure looks with names and stop readouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "create_preset_golden_hour_soft_visible"
description = "After creating a preset named 'Golden Hour Soft' with valid stops and lookTag, the text 'Golden Hour Soft' is visible in the presets list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "adding_three_presets_increments_count"
description = "After adding 3 new presets on top of the seed set, the presets list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "edit_preset_name_night_street_grain"
description = "After editing a preset name to 'Night Street Grain', the text 'Night Street Grain' is visible in the list and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "delete_preset_removes_name"
description = "After deleting a preset, that preset's name is no longer visible in the presets list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "delete_all_shows_empty_state"
description = "After deleting all presets, an empty state message is visible and no preset rows remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "empty_name_rejects_create"
description = "After submitting create with an empty required preset name, the presets count does not increase and validation feedback naming the name field is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "filter_favorites_or_tag"
description = "After filtering presets by favorites or a look tag (with mixed items present), only matching presets remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "mode_switch_without_navigation"
description = "After switching between Meter/Lab and Presets/Compare modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "presets_crud_shared_state"
description = "Exposure presets collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "favorites_and_tag_filters_recompute"
description = "Favorites and look-tag filters recompute the visible preset list from the shared collection when toggled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "stepper_moves_one_stop_with_formats"
description = "Pressing a dial's up/down stepper moves exactly one stop along that control's list and updates that dial's readout on the same press; APERTURE reads f/N (default f/16), SPEED reads 1/N (default 1/60), and ISO reads a bare integer (default 100)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "aperture_stepper_inverted"
description = "The aperture stepper is inverted relative to the raw f-number: the open direction widens the aperture toward a lower f-number (e.g. f/16 to f/11) and the other direction narrows it toward a higher f-number"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "dial_updates_whole_preview_stack"
description = "Pressing a dial updates the whole preview together on that press — frame brightness, depth-of-field blur, the visible shutter motion frame, the ISO noise overlay opacity, and the vertical exposure meter indicator all respond"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "shutter_distinct_motion_frames_ordered"
description = "Each shutter stop shows its own distinct motion frame and stepping from slow to fast advances the frames in order"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "stop_edge_and_meter_capped"
description = "At the first or last stop of a control the stepper button fades to invisible and stops responding to clicks so the value cannot step past the edge, and the exposure meter dot is likewise capped at the track ends"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "reset_restores_defaults"
description = "Reset returns all three dials to their defaults (f/16, 1/60, ISO 100), zeros Contrast/Highlights/Shadows, restores the default scene Daylight Courtyard, restores the default preview, re-centers the exposure meter, and clears the active look pack and snapshot selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "help_panel_aperture_shutter_iso"
description = "The ? help trigger opens a side help panel carrying distinct Aperture, Shutter Speed, and ISO explainer paragraphs and its glyph swaps to X to close again; opening or closing help never navigates away or reloads"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "preset_lifecycle_cross_mode_chain"
description = "Starting in Presets/Compare with the seeded list: create a valid preset and confirm the form closes and the visible preset row count increases by exactly one (measured immediately before and after); switch to Meter/Lab and back and confirm the same new preset row is still present without a reload; edit that preset's name and confirm the same row shows the new name; delete it and confirm the row count decreases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "apply_look_cross_mode_chain"
description = "Applying a preset from Presets/Compare then switching to Meter/Lab shows, without a reload: all three dial readouts at the preset's values, the preview stack matching those stops, and the exposure meter at the corresponding position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "dial_meter_round_trip_preserved_across_modes"
description = "From the defaults (f/16, 1/60, ISO 100): stepping aperture one stop toward open brightens the frame, strengthens the blur, and moves the meter one increment toward over-exposed; stepping back one stop returns the frame, blur, and meter to the default state; then switching to Presets/Compare and back preserves the current dial values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "favorites_echo_filter_chain"
description = "Marking a preset favorite shows its favorite badge in the list immediately; switching the filter to favorites-only shows that preset among the results; unmarking it while the favorites-only filter is active removes it from the visible list on the same action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "double_submit_creates_exactly_one_preset"
description = "Double-activating the preset create submit control in quick succession creates exactly one preset: the visible row count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "inline_field_errors_disable_submit"
description = "In the preset create or edit form, an invalid field shows an error message naming that field next to it before submit, and the submit control stays disabled until every required field is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "direct_entry_default_dial_values"
description = "On first load the full-viewport photo preview with overlaid dials renders immediately with APERTURE at f/16, SPEED at 1/60, and ISO at 100"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "iso_grain_capped_at_max"
description = "Stepping ISO to its maximum stop (3200) makes the tiled grain overlay clearly more visible than at ISO 100, yet the underlying photo remains discernible"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.40"
name = "dial_stop_lists_match_spec"
description = "Stepping each dial across its full range traverses exactly the specified stops: aperture f/22, 16, 11, 8, 5.6, 4, 2.8, 1.8; shutter 1/2, 1/4, 1/8, 1/15, 1/30, 1/60, 1/125, 1/250, 1/500, 1/1000; ISO 50, 100, 200, 400, 800, 1600, 3200"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.41"
name = "live_ev_readout_updates"
description = "A live EV readout near the dials shows 0.0 EV at defaults and updates when a dial or light slider changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "light_sliders_update_preview"
description = "Moving Contrast, Highlights, or Shadows away from 0 (range -100 to 100 with live integer readout) visibly changes the preview tones on the same gesture and updates the histogram"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "histogram_shifts_with_exposure"
description = "Brightening the frame (wider aperture or higher ISO) visibly shifts histogram mass toward the right; darkening shifts it toward the left — the histogram is not static"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "look_packs_apply_multi_control_state"
description = "Clicking Warm, Subtle, Strong, or B&W applies a multi-control edit state in one press (dials and light sliders update, preview and histogram match); B&W removes visible color while the other packs keep a color image; the active pack shows a selected treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "before_after_hold_shows_original"
description = "Holding the Before/After control shows the original unedited photo for the hold duration and releasing returns to the current edit state without changing stored dial or slider values — probe via the real hold control, not a state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "snapshot_save_apply_delete"
description = "Saving a named snapshot stores the current dials, light sliders, and look pack; Apply restores that exact edit state; Delete removes the row; an empty snapshot name is rejected with inline validation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "undo_redo_edit_mutations"
description = "After a dial step, a light-slider change, and a scene selection, Undo reverses each mutation in order (including the scene change) and restores the prior preview; Redo reapplies them; a new edit after Undo clears and disables Redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "download_png_bakes_pixels"
description = "Download PNG triggers a real file download named exposure-export.png whose pixels carry the current dial, slider, look-pack, blur, and grain edits — not a CSS-filter-only preview recipe"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "download_jpeg_bakes_pixels"
description = "Download JPEG triggers a real file download named exposure-export.jpg with the current edits baked into the image pixels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "two_edit_states_different_exports"
description = "Exporting PNG at defaults versus after opening aperture two stops with Contrast raised produces two visibly different image files; the active on-screen preview matches the tonal look of the just-exported file"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "edit_stack_json_export_and_copy"
description = "Download edit stack downloads JSON compiled live from aperture, shutter, ISO, Contrast, Highlights, Shadows, active look pack, and snapshots with schemaVersion camera-exposure.edit-stack.v1; Copy edit stack copies the same text and shows a visible confirmation that reverts after a moment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "edit_stack_import_restores_state"
description = "After editing dials/sliders, selecting a non-default scene, and saving a snapshot, exporting the edit stack, Resetting, then importing that JSON restores dials, sliders, look pack, scene, snapshots, preview, histogram, and meter to the exported state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "edit_stack_schema_fields_present"
description = "A valid Download edit stack document includes required fields schemaVersion (exactly camera-exposure.edit-stack.v1), aperture, shutter, iso, contrast, highlights, shadows, lookPack, scene (exactly one of Daylight Courtyard, Alpine Midday, Stadium Floodlights, Candlelit Study, Neon Alley Night), and snapshots, with stop and slider values inside the documented bounds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "preset_payload_field_contract"
description = "Creating a valid preset with name, aperture, shutter, iso, and lookTag within the documented bounds adds a row whose stop readout matches the submitted payload; out-of-list stops are rejected with a field-named error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.57"
name = "preview_effects_are_real_canvas_pixels"
description = "The preview's capture effects (frame brightness, depth-of-field blur, ISO grain) are real pixel operations on a canvas surface, not CSS-only decoration: the rendered bitmap carries them, which is why a Download PNG/JPEG at a strong edit state reproduces the same brightness, blur, and grain seen on screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "scenes_strip_five_named_scenarios"
description = "A Scenes strip offers exactly five scenarios with these names and stated light offsets: Daylight Courtyard (0 EV, active by default), Alpine Midday (+2 EV), Stadium Floodlights (+1 EV), Candlelit Study (-2 EV), and Neon Alley Night (-3 EV); the active scene chip shows a selected treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.59"
name = "scene_select_shifts_ev_meter_preview_histogram"
description = "Selecting a scene applies its light offset on the same press while the three dials keep their current stops: the EV readout shifts by the scene's offset, the meter moves accordingly, the preview brightness changes, and the histogram reshapes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.60"
name = "identical_dials_different_scenes_differ"
description = "With identical dial stops, two different scenes (e.g. Neon Alley Night vs Alpine Midday) produce visibly different preview brightness, EV numbers, and histogram shapes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.62"
name = "bracket_panel_controls_and_validated_base_name"
description = "A Bracket panel offers a frame-count choice of 3 or 5, a step choice of 1 or 2 stops, and a required base-name field validated inline (non-empty, at most 40 characters) before Generate bracket can succeed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.63"
name = "generate_bracket_creates_preset_series"
description = "Generate bracket creates the whole series as saved presets in one action: the visible preset count increases by exactly the chosen frame count; each frame keeps the current aperture and ISO and shifts only the shutter along the discrete stop list by the step per frame, centered on the current shutter; frame names are the base name suffixed with the signed EV delta (count 3 step 1 gives -1 EV, 0 EV, +1 EV; count 5 step 2 gives -4 EV, -2 EV, 0 EV, +2 EV, +4 EV)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.64"
name = "bracket_thumbnail_strip_ordered_darkest_to_brightest"
description = "A bracket preview strip renders the generated series as thumbnails ordered darkest to brightest; with a mid-list shutter and a nonzero step, adjacent thumbnails differ visibly in brightness"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.67"
name = "clipping_zebras_toggle_over_and_under"
description = "Independent Highlight zebras and Shadow zebras toggles overlay striped hatching on near-white and near-black preview regions respectively; at default dials in Daylight Courtyard neither overlay covers any meaningful area; pushing exposure far over-exposed makes highlight-zebra coverage appear and grow, and pushing far under-exposed makes shadow-zebra coverage appear and grow"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.68"
name = "histogram_clipping_indicators_independent_of_toggles"
description = "The histogram carries a highlight-clipping indicator at its right edge and a shadow-clipping indicator at its left edge that light up whenever clipped regions exist in the current render, whether or not the zebra toggles are on"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.70"
name = "ab_slots_capture_state_compare_gated"
description = "Set A and Set B capture the complete current exposure state (dials, light sliders, scene, look pack) into slots A and B; a filled slot shows a summary of its stored stops; the Compare control is available only once both slots are filled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.71"
name = "compare_wipe_split_draggable"
description = "Compare view shows one preview split by a draggable vertical wipe handle: left of the handle renders slot A's exposure state and right of it renders slot B's, with A and B labels visible on their sides; dragging the handle moves the split continuously and clamps at the preview edges; leaving Compare returns to the live edit state without altering either slot — probe via the real wipe handle, not a state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.73"
name = "settings_card_png_readable_pixels"
description = "Download settings card downloads a real PNG file named exposure-settings-card.png rendered client-side whose pixels carry the current aperture (f/N), shutter (1/N), ISO, EV, and active scene name as readable text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.75"
name = "edit_stack_scene_key_and_enum_import"
description = "The edit-stack JSON carries a required scene key holding exactly one of the five scene names; importing a document whose scene is not one of the five names is rejected as invalid, and a valid export/import round trip restores the scene along with the other fields"
type = "binary"
weight = 1.0

