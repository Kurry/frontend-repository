[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "stop_edge_button_invisible"
description = "At each stop-list edge the corresponding stepper button fades to invisible and stops responding so the value cannot step past the first or last stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "meter_clamped_at_track_ends"
description = "A further step in the same direction at a meter track end cannot push the indicator past that end"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "empty_preset_name_rejected"
description = "Submitting create with an empty preset name adds no row and shows validation feedback naming the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "double_submit_one_preset"
description = "Double-activating the preset submit control creates exactly one preset: row count increases by one"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "empty_presets_list_message"
description = "After deleting every preset the list region shows an empty state explaining that no presets exist and how to create one"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "empty_snapshot_name_rejected"
description = "Saving a snapshot with an empty name adds no snapshot and shows inline validation naming the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "light_sliders_clamp_bounds"
description = "Light sliders clamp at -100 and 100; dragging past either end leaves the value at the clamp and the readout shows that bound"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "malformed_import_keeps_state"
description = "Importing a malformed edit-stack JSON (missing schemaVersion, wrong schemaVersion, out-of-bounds contrast, or non-enum lookPack) shows a visible error naming that the file is invalid and leaves the current edit state unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "undo_redo_disabled_when_empty"
description = "Before any edit, Undo and Redo are disabled; after Undo empties the undo stack, Undo disables again"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "iso_max_grain_still_shows_photo"
description = "At ISO 3200 the grain overlay is clearly stronger than at ISO 100 but the underlying photo remains discernible"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "help_open_close_no_navigation"
description = "Opening and closing help never navigates away or reloads the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "reset_clears_look_and_snapshots_selection"
description = "Reset clears the active look pack selection and snapshot selection while restoring default dials and zeroed sliders"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "edge_stepper_still_advances"
description = "At a stop-list edge the faded stepper still advances or wraps the value past the first or last stop"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "meter_escapes_track"
description = "The exposure meter indicator renders outside the visible track at extreme stop combinations"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "empty_name_still_adds_preset"
description = "Submitting an empty preset name still adds a preset row"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "double_submit_duplicates_preset"
description = "Double-activating preset submit creates two or more rows for one intended create"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "empty_list_shows_blank_region"
description = "After deleting all presets the list region is blank with no empty-state message or create affordance"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "malformed_import_corrupts_state"
description = "Importing malformed edit-stack JSON corrupts dials, clears the preview, or crashes the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "slider_past_bounds_unbounded"
description = "Light slider values display or apply outside the -100 to 100 range"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "undo_enabled_with_empty_stack"
description = "Undo remains enabled and clickable when there are no mutations to reverse"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.13"
name = "bracket_empty_base_name_creates_nothing"
description = "Generate bracket with an empty base-name field creates no presets: the visible preset count stays the same and inline validation names the base-name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "bracket_clamps_at_shutter_list_ends"
description = "Generating a bracket at the shutter list's fastest or slowest stop clamps out-of-range frames at the end stop and visibly marks those rows as clamped instead of inventing stops outside the discrete list"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "zebras_on_without_clipping_show_no_stripes"
description = "With both zebra toggles on but no clipped regions in the current render (default dials in Daylight Courtyard), no striped hatching appears anywhere on the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "wipe_handle_clamps_at_preview_edges"
description = "The Compare wipe handle cannot be dragged past either preview edge — at the extremes one slot's render fills the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n9"
name = "compare_available_with_unfilled_slots"
description = "The Compare control activates and opens the comparison while fewer than two A/B slots are filled"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant edge-case failure not covered by any other criterion in this file. Name the defect and cite concrete evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
