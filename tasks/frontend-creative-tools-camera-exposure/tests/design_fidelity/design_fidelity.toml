[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "8.1"
name = "overview_composition_matches_reference"
description = "At desktop width the Meter/Lab composition matches the reference overview: edge-to-edge preview, left meter, overlaid dials, help trigger placement — allowing for hardened chrome additions (EV, histogram, sliders, export) that the text requires."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.2"
name = "dial_chrome_matches_reference_style"
description = "Dial titles, chevron steppers, and large value readouts match the condensed dark-chrome style shown in the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.3"
name = "meter_captions_match_reference"
description = "The vertical meter carries UNDER EXPOSED and OVER EXPOSED end captions as in the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.4"
name = "help_panel_side_overlay_matches"
description = "The help panel overlays from the side as in the reference segments rather than a centered modal card alien to the lab."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.5"
name = "brand_chip_placement_matches"
description = "The Camera Exposure Simulator brand chip sits bottom-centered in a small red-tinted uppercase treatment consistent with the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.6"
name = "text_wins_over_screenshot_conflicts"
description = "Where hardened features (histogram, light sliders, look packs, export controls) are required by the text but absent from screenshots, the running app includes the text-required surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.n1"
name = "ignores_reference_lab_layout"
description = "The shipped layout ignores the reference full-viewport overlaid lab and substitutes an unrelated dashboard or marketing shell."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "8.n2"
name = "ships_reference_screenshots_as_assets"
description = "Reference screenshots from /reference-screenshots are copied into the app as shipped assets or decorative images."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant design-fidelity defect versus the reference not covered by any other criterion in this file. If present, name the defect and cite evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
