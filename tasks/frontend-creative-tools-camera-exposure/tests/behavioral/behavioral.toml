[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from defaults: step aperture and ISO off default, create a valid preset, mark one favorite, save a snapshot, apply a look pack; then reload. Confirm every facet coherently resets — dials f/16, 1/60, ISO 100, zeroed sliders, centered meter, empty snapshots, empty undo/redo, no active look pack, and exactly the seeded presets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "favorites_filter_reversal_proves_live_list"
description = "Mark at least two presets favorite, switch to favorites-only and record the exact visible names, clear the filter, then re-enable favorites-only. Confirm the favorites-only set returns identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "filter_derived_list_sensitivity"
description = "With mixed favorites and look tags present, switch the presets filter from all → favorites-only → a specific look tag → all. Confirm the visible list membership changes meaningfully for each input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "apply_preset_echoes_in_meter_lab"
description = "In Presets/Compare apply a seeded preset whose stops differ from the current dials; switch to Meter/Lab without reload. Confirm all three dial readouts, the preview stack, and the meter position match that preset."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "preset_create_count_delta_exact"
description = "In Presets/Compare measure the visible preset row count, create one valid preset, and re-measure immediately — the count increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_stops_different_preview"
description = "From defaults, step aperture two stops toward open and note brightness/blur/meter; reset; then step ISO upward two stops and note brightness/grain/meter. Confirm the two outcomes differ in the ways the inputs dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_dial_flows"
description = "Start creating a preset (open form, enter a name), switch to Meter/Lab and step a dial, return to Presets/Compare and finish creating a second valid preset; confirm the dial change persisted and exactly one new completed preset appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_presets"
description = "Delete every preset (empty state visible), then create two valid presets; confirm the empty state clears, both new rows appear, and favorites/tag filters operate on the repopulated collection."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "pixel_export_input_dependent"
description = "Export PNG at a bright edit state and again at a dark edit state; the two downloaded bitmaps differ visibly, proving export is input-dependent rather than a hardcoded file."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "edit_stack_round_trip_schema_coherent"
description = "Mutate dials and sliders, save a snapshot, Download edit stack (confirm schemaVersion camera-exposure.edit-stack.v1 and bounds), Reset, Import — every restored facet matches the export including lookPack and snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring dials and presets then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "preview_identical_across_different_stops"
description = "Stepping aperture, shutter, or ISO across clearly different stops leaves brightness, blur, motion frame, grain, and meter visually identical."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_presets_apply_identical_dials"
description = "Applying two presets that declare different aperture/shutter/ISO values yields identical dial readouts and preview/meter state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "mode_switch_shows_stale_dials_until_reload"
description = "After applying a preset or stepping dials, the other mode still shows stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "edit_stack_export_missing_schema_fields"
description = "A Download edit stack artifact is missing schemaVersion, stop fields, slider fields, lookPack, or snapshots, or carries values outside the documented bounds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered — even partially — answer no."
type = "binary"
negate = true
weight = 1.0
