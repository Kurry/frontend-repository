[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "mobile_help_trigger_present"
description = "A separate mobile help trigger exists alongside the desktop one; at mobile widths the mobile badge opens the same help panel content."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "operable_at_375_no_hscroll"
description = "At 375 pixel width the preview stays edge-to-edge, the dials, meter, EV readout, histogram, light sliders, and export controls remain visible and operable, and no content clips or produces horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "export_snapshot_undo_reachable_375"
description = "Export controls, snapshot strip, undo/redo, and look packs remain reachable at 375 pixel width — they may scroll within their own containers but must not force page-level horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "desktop_1440_matches_composition"
description = "At desktop widths (1440 pixels) the layout matches the reference composition: meter on the left, dials overlaid on the preview, help trigger in its corner position."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "presets_mode_usable_narrow"
description = "At 375 pixel width, Presets/Compare list rows, create/edit form, and filters remain usable without horizontal page scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "horizontal_scroll_at_375"
description = "At 375 pixel width the document produces page-level horizontal scrolling or clips primary dial/meter/export controls off-screen."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "export_unreachable_on_narrow"
description = "At 375 pixel width Download PNG, Download JPEG, or Download edit stack cannot be reached without horizontal page scroll."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "desktop_composition_collapses"
description = "At 1440 pixels the meter/dials/help composition collapses into a stacked or card layout that ignores the reference overlaid lab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.6"
name = "scene_bracket_zebra_ab_reachable_375"
description = "At 375px width the Scenes strip, the Bracket panel, the zebra toggles, and the A/B compare controls remain reachable — they may scroll within their own containers but do not force page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant responsiveness defect not covered by any other criterion in this file. If present, name the defect and cite evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
