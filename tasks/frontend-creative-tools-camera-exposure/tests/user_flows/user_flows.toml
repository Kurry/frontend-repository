[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "preset_lifecycle_create_edit_delete"
description = "In Presets/Compare, creating a valid preset closes the form and increases the visible row count by exactly one; switching to Meter/Lab and back shows the same new preset; editing its name updates the same row; deleting it decreases the count by exactly one and removes it from selection and filter results"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "apply_preset_updates_meter_lab"
description = "Applying a preset from Presets/Compare then viewing Meter/Lab shows dials, preview stack, and meter matching the preset without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "dial_meter_round_trip_across_modes"
description = "From defaults, stepping aperture one stop toward open brightens the frame, strengthens blur, and moves the meter toward over-exposed; stepping back restores defaults; switching modes preserves dial values"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "favorites_filter_echo"
description = "Marking a preset favorite shows its badge immediately; favorites-only filter includes it; unmarking while that filter is active removes it from the visible list on the same action"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "pixel_export_two_states_differ"
description = "From defaults, open aperture two stops and raise Contrast, Download PNG (exposure-export.png); then darken (narrow aperture, lower Shadows) and Download PNG again — the second file is visually darker/different from the first when both are inspected"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "edit_stack_export_import_round_trip"
description = "After dial and slider edits plus a named snapshot, Download edit stack, Reset, then Import edit stack — dials, sliders, snapshots, preview, histogram, and meter return to the exported state without a reload; imported JSON satisfies schemaVersion camera-exposure.edit-stack.v1"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "undo_then_redo_chain"
description = "Step a dial, move a light slider, Undo twice so both reverse, then Redo twice so both reapply in order with matching preview state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "reload_returns_seeded_baseline"
description = "After dial edits, a scene change, turning on a zebra toggle, filling an A/B slot, creating a preset, saving a snapshot, and applying a look pack, a page reload returns defaults (f/16, 1/60, ISO 100), zeroed sliders, scene Daylight Courtyard, no zebra overlays, empty A/B slots, centered meter, empty snapshots, empty undo/redo, and exactly the seeded presets"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "look_pack_then_export_contains_look"
description = "Apply the Strong look pack, confirm preview and sliders match that pack, then Download edit stack — the JSON includes lookPack equal to Strong reflecting the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "before_after_then_continue_editing"
description = "After editing away from defaults, hold Before/After to see the original, release to return to the edited look, then continue stepping a dial — the edit state was not wiped by the hold"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "snapshot_apply_after_further_edits"
description = "Save a snapshot at a distinctive edit state, change dials away from it, then Apply the snapshot — dials, sliders, look pack, preview, and histogram all return to the snapshot's stored combination"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "create_preset_then_export_edit_stack"
description = "Create a valid preset, then Download edit stack — the export still reflects current dial/slider state and snapshots; creating a preset does not clear the edit buffer"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "scene_shift_flow"
description = "With dials at defaults in Daylight Courtyard, selecting Neon Alley Night drops the EV readout by 3, moves the meter toward under-exposed, darkens the preview, and shifts the histogram left while all three dial readouts stay at f/16, 1/60, 100; then selecting Alpine Midday raises EV above default and brightens the preview — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "bracket_then_inspect_flow"
description = "Setting frame count 5, step 1, base name Dusk, then Generate bracket increases the preset count by exactly five, adds rows Dusk -2 EV through Dusk +2 EV, and shows five bracket thumbnails ordered darkest to brightest; applying the Dusk +2 EV preset writes its shifted shutter into the dials"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "zebra_discovery_flow"
description = "At defaults in Daylight Courtyard with both zebra toggles on, no stripes cover the preview; opening the aperture and raising ISO until highlight zebras appear over the brightest regions lights the histogram's right-edge clipping indicator; reversing to a strongly under-exposed combination makes shadow zebras appear and lights the left-edge indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "ab_wipe_compare_flow"
description = "Capturing a bright exposure state with Set A, changing to a clearly darker state and capturing with Set B, then opening Compare shows the preview split with A's brighter render left of the handle and B's darker render right of it; dragging the handle right reveals more of A's render and the split follows the pointer continuously; leaving Compare restores the live state with both slots intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "settings_card_differencing_flow"
description = "Download settings card, then change ISO two stops and select a different scene, then Download settings card again — the two card files are visibly different and the second card's rendered text matches the new aperture, shutter, ISO, EV, and scene readouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "export_identical_across_edit_states"
description = "Two PNG exports taken at clearly different edit states (bright opened aperture vs dark narrowed aperture) are visually identical or omit the edits"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "import_fails_to_restore_edits"
description = "After a valid edit-stack export and Reset, importing that JSON leaves dials, sliders, or snapshots at the reset defaults instead of restoring the exported state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "undo_does_not_restore_preview"
description = "After a dial or slider change, Undo leaves the preview/meter/histogram still showing the post-edit state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "mode_switch_drops_dial_state"
description = "After stepping dials in Meter/Lab, switching to Presets/Compare and back resets dials to defaults without the user pressing Reset"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "favorites_filter_ignores_toggle"
description = "Toggling a preset favorite while favorites-only is active leaves the visible list unchanged"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "reload_keeps_session_edits"
description = "After dial/slider edits and a reload, user session edits survive in memory/storage contrary to the in-memory good-app seeded baseline"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "look_pack_does_not_update_preview"
description = "Clicking Warm, Subtle, Strong, or B&W changes only a selected chip while the preview, dials, and histogram stay at their prior values"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "flow_dead_ends_without_export"
description = "After completing an edit session there is no reachable Download PNG, Download JPEG, or Download edit stack control that produces a downloadable artifact"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "scene_select_also_moves_dials"
description = "Selecting a scene changes the aperture, shutter, or ISO dial readouts instead of leaving all three dials on their current stops while only EV, meter, preview, and histogram shift"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "leaving_compare_loses_slots_or_live_state"
description = "Leaving the Compare view clears or alters the stored A/B slots, or fails to return the lab to the live edit state it held before Compare"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant end-to-end flow failure not covered by any other criterion in this file. Name the defect and cite concrete browser evidence. If already covered — even partially — by another criterion here, answer no."
type = "binary"
negate = true
weight = 1.0
