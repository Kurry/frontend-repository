[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "full_viewport_lab_composition"
description = "The first viewport reads as one full-viewport lab composition: edge-to-edge photo preview behind overlaid dials, not a dashboard card grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "condensed_display_type_dark_chrome"
description = "Condensed display UI type (Oswald/Bebas-style) with dark chrome dials, white values, and red accent on help trigger and meter emphasis is visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "three_circular_dials_and_meter"
description = "Three circular dial controls titled APERTURE / SPEED / ISO with up/down chevron steppers and large value readouts are present; vertical exposure meter on the left shows UNDER EXPOSED / OVER EXPOSED captions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "ev_histogram_sliders_in_chrome"
description = "EV readout, live histogram, Contrast/Highlights/Shadows sliders, look-pack chips, Before/After, Snapshots strip, Undo/Redo, and export controls sit in the lab chrome without breaking the overlaid dial composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "help_glyph_badge"
description = "Help trigger is a compact glyph badge showing ? that reads X while the panel is open."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "presets_dense_list_not_cards"
description = "Presets/Compare mode uses a dense list or strip of looks with name, stop readout, and favorite/tag badges — not a marketing card grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "motion_stack_local_imagery"
description = "The preview shows a motion stack of local frames plus depth plate and tiled noise overlay from local assets."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "brand_chip_bottom_centered"
description = "An inert brand chip reading Camera Exposure Simulator appears as a small red-tinted uppercase bottom-centered label."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "component_state_treatments"
description = "Steppers, buttons, sliders, and form fields show distinct default, hover, focus (visible ring), disabled, and error treatments."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "dashboard_card_grid_layout"
description = "The lab is presented as a dashboard of equal-weight cards that breaks the full-viewport overlaid composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "missing_dial_or_meter_chrome"
description = "One or more of the three titled dials or the vertical exposure meter with UNDER/OVER captions is missing from Meter/Lab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "marketing_hero_competes"
description = "Marketing sections or competing hero cards crowd out the edge-to-edge photo preview lab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "visual_design.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant visual-design defect not covered by any other criterion in this file. If present, name the defect and cite evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
