[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_and_focus_treatments_per_spec"
description = "Verified with the real pointer: the help trigger brightens on hover, enabled stepper buttons keep a pointer cursor, preset rows, look-pack chips, and primary buttons take a visible hover wash, and steppers/controls show focus-visible rings when keyboard-focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_keeps_hover_feedback"
description = "Mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "omits_hover_feedback_on_controls"
description = "Under a real pointer hover, steppers, look-pack chips, or preset rows keep a static resting appearance visually identical to their non-hovered default state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.4"
name = "meter_eases_one_increment_per_stop"
description = "Driven through the real stepper controls, each stop change eases the exposure meter indicator along the vertical track by one increment over roughly half a second — continuous travel that stops at the track ends"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "help_panel_slides_from_right"
description = "The help panel slides in from the right edge with opacity and the trigger glyph shifts from ? to X when open"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "stepper_edge_opacity_transitions"
description = "Stepping a dial to (and away from) a stop-list edge fades the affected up/down control's opacity with a short transition as it disables/enables — verified by clicking the real stepper controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "preview_stack_eases_not_snaps"
description = "Driven through the real stepper or light-slider controls, an edit eases the preview stack — brightness, depth-of-field blur, shutter motion-frame crossfade (about 0.2s), noise opacity, and light-slider tones — rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "histogram_eases_on_edit"
description = "When dials or light sliders change through the real controls, histogram bars ease into their new shape rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "preset_apply_eases_dials_and_preview"
description = "Applying a preset or look pack through its visible UI control eases the dials and preview toward the saved stops rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "preset_list_row_and_validation_transitions"
description = "A newly created preset row animates into the list, a deleted row animates out, and inline validation feedback appears with a short transition rather than popping in"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "reduced_motion_removes_easing_keeps_function"
description = "With prefers-reduced-motion set, easing and slide effects are removed and dial, meter, preview, histogram, panel, and list state changes apply instantly while every feature stays usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "meter_hard_jumps_between_positions"
description = "Stepping a dial through the real stepper controls makes the exposure meter indicator teleport between positions with no visible travel along the track"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered — even partially — answer no."
type = "binary"
negate = true
weight = 1.0
