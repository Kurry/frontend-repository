[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Required hover animations are present; dial/meter/preview and mode switches animate as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Omits hover feedback on steppers or preset rows so controls feel static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Stepping a dial eases the exposure meter along the track by one increment (not an instant jump) and crossfades the shutter motion frame, driven through the real stepper controls"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "The help panel slides in from the right edge with opacity and the trigger glyph shifts from '?' to 'X' when open"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "stepper_edge_opacity_transitions"
description = "Stepping a dial to (and away from) a stop-list edge fades the affected up/down control's opacity with a short transition as it disables/enables, while pressed steps update the dial value immediately with no page reload — verified by clicking the real stepper controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "preview_stack_eases_not_snaps"
description = "Driven through the real stepper controls, a stop change eases the preview stack — brightness filter, depth-of-field blur, shutter motion-frame crossfade (about 0.2s), and noise opacity — rather than snapping instantly between states"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "preset_apply_eases_dials_and_preview"
description = "Applying a preset through its visible UI control eases the dials and preview toward the saved stops rather than hard-cutting, and the Meter/Lab and Presets/Compare regions swap without a full page reload"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "preset_list_row_and_validation_transitions"
description = "A newly created preset row animates into the list, a deleted row animates out, and inline validation feedback appears with a short transition rather than popping in — all driven through the real create/delete/submit controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_removes_easing_keeps_function"
description = "With prefers-reduced-motion set, easing and slide effects are removed and dial, meter, preview, and panel state changes apply instantly while every feature stays usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "meter_hard_jumps_between_positions"
description = "Stepping a dial through the real stepper controls makes the exposure meter indicator teleport between positions with no visible travel along the track"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
