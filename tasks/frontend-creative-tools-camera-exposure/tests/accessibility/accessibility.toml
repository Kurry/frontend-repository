[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_lab_controls"
description = "Every stepper, mode switch, help trigger, reset, light slider, look pack, Before/After, snapshot, undo/redo, export/import, and preset control is reachable and operable with the keyboard alone, each showing a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "help_panel_focus_trap_and_return"
description = "The help panel is announced as a dialog or complementary region; opening it via the ? trigger moves keyboard focus into the panel, and closing it (glyph reads X) returns focus to the trigger."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "preview_imagery_has_accessible_name"
description = "The photo preview stack imagery exposes a descriptive accessible name or alt text so assistive technology can identify the preview surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "preset_validation_announced"
description = "Preset form, snapshot name, and import validation messages are shown visually and associated with their fields so assistive technology announces them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "preset_form_fields_explicitly_labeled"
description = "Every preset create/edit form field (name, aperture, shutter, ISO, lookTag) uses an explicit label associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "dial_and_slider_readouts_real_text"
description = "Each dial's current value and each light-slider readout is readable as real DOM text by assistive technology."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "export_controls_accessible_names"
description = "Download PNG, Download JPEG, Download edit stack, Copy edit stack, and Import edit stack expose accessible names that identify the action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "lab_landmarks_present"
description = "The lab exposes semantic landmarks (for example main for the simulator stage and complementary/dialog for help)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "dial_and_meter_text_contrast"
description = "Dial titles, value readouts, meter captions (UNDER EXPOSED / OVER EXPOSED), and primary controls meet sufficient contrast against the dark chrome and photo preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "semantic_buttons_for_controls"
description = "Steppers, mode switches, reset, help trigger, look packs, export actions, and preset actions are exposed as buttons (or equivalent interactive roles), not unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "reduced_motion_respected_for_lab"
description = "With prefers-reduced-motion set, dial, meter, preview, histogram, help-panel, and list animations are removed or instant while every control remains operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "lab_controls_unreachable_by_keyboard"
description = "A stepper, mode switch, help trigger, reset, light slider, export control, or preset control cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "help_focus_lost_on_close"
description = "Closing the help panel leaves keyboard focus stranded or jumps to an unrelated control instead of returning to the trigger."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "validation_not_announced"
description = "Preset or import validation errors are visual-only with no programmatic association or live-region announcement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "export_controls_unlabeled"
description = "Download PNG, Download JPEG, or edit-stack export/import controls lack accessible names identifying the action."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.12"
name = "scene_and_zebra_state_programmatic"
description = "Scene chips and zebra toggles expose their selected or pressed state programmatically (for example aria-pressed or aria-selected), not only by color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "wipe_handle_keyboard_operable"
description = "The Compare wipe handle is keyboard-operable: arrow keys move the split while it is focused"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "bracket_base_name_labeled_and_associated"
description = "The bracket base-name field has an associated label and its validation message is programmatically associated with the field"
type = "binary"
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant accessibility defect not covered by any other criterion in this file. If present, name the defect and cite evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
