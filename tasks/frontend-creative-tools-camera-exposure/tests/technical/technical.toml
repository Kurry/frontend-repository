[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "serves_via_npm_start_on_3000"
description = "The app serves and runs via its documented start path (npm start on port 3000) and renders the simulator lab with no blank/broken page."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "shared_state_coherence_dials_preview_meter"
description = "Dial, slider, scene, zebra, bracket, A/B, look-pack, snapshot, and preset changes from any control update one shared state: preview, meter, histogram, EV, and export artifacts never disagree with each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "localstorage_or_sessionstorage_used"
description = "After exercising dials, presets, favorites, exports, and mode switches, localStorage or sessionStorage is non-empty — browser storage APIs were used despite the in-memory-only requirement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.4"
name = "reload_resets_all_facets_to_seed"
description = "After changing several independent facets (step two dials, move a light slider, select a non-default scene, turn on a zebra toggle, fill an A/B slot, create a preset, save a snapshot, apply a look pack), a page reload returns the app coherently to its seeded state — default dials, zeroed sliders, Daylight Courtyard scene, zebra toggles off, empty A/B slots, empty snapshots, and exactly the seeded presets."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "keyboard_reachable_with_focus_ring"
description = "Every stepper, mode switch, help trigger, reset, light slider, look pack, Before/After, snapshot, undo/redo, export/import, and preset control is reachable and operable with the keyboard alone, each showing a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "help_panel_dialog_focus_management"
description = "The help panel is exposed as a dialog or complementary region; opening it moves keyboard focus into the panel and closing it returns focus to the trigger."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "dial_readouts_are_real_text"
description = "Each dial's current value and each light-slider readout is rendered as real DOM text readable by assistive technology."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "validation_messages_programmatically_associated"
description = "Preset, snapshot, and import validation messages are shown visually and are programmatically associated with their fields so assistive technology announces them."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "interactive_within_two_seconds"
description = "On a local cold load the app renders and responds to a first dial press within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "rapid_stepper_presses_stay_coherent"
description = "Rapid repeated stepper presses stay responsive: every press lands, the readouts never desynchronize from the preview and meter, and the UI never hangs."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "external_network_requests_for_assets"
description = "Devtools network activity shows outbound requests to other origins (CDN scripts, remote fonts, or remote imagery) — depth plate, motion frames, noise texture, fonts, and libraries must all load from local assets."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.12"
name = "document_title_camera_exposure_simulator"
description = "The browser tab's document title reads 'Camera Exposure Simulator'"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "console_errors_or_warnings_during_full_exercise"
description = "Console errors, warnings, or unhandled promise rejections appear during a full exercise of dials, sliders, look packs, presets, snapshots, undo/redo, pixel export, and edit-stack import/export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.14"
name = "both_modes_reachable_without_reload"
description = "Meter/Lab and Presets/Compare are both reachable from the UI and render their regions without a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "views_stay_coherent_under_rapid_mode_switch"
description = "Rapidly switching between Meter/Lab and Presets/Compare while changing dials keeps a single coherent state."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "debug_artifacts_visible_in_ui"
description = "Visible debug artifacts appear in the running app (console.log spam overlays, leftover placeholder scaffolding, or debug panels meant for development)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.17"
name = "outbound_anchor_navigates_away"
description = "An external anchor control in the lab chrome navigates the browser away from the app origin."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.18"
name = "reload_state_violates_in_memory_rule"
description = "After reload, user-created presets or off-default dial values survive in a way that contradicts the in-memory seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.19"
name = "nondeterministic_seed_on_reload"
description = "Two cold loads of the same app show different seeded preset sets or different default dial values when the spec requires a deterministic seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.20"
name = "pixel_export_stays_responsive"
description = "Download PNG or Download JPEG completes without freezing the UI for more than a brief moment; the lab remains operable after the download."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect not covered by any other criterion in this file. If present, name the defect and cite concrete evidence. If already covered — even partially — answer no."
type = "binary"
negate = true
weight = 1.0
