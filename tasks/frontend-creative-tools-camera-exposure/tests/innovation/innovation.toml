[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "compare_mode_polish_beyond_minimum"
description = "Beyond the minimum apply-a-look path, Presets/Compare offers a polished side-by-side compare of two presets that makes stop differences easy to scan (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "zebra_or_clipping_hints"
description = "The preview includes zebra/clipping hints or an equivalent exposure visualization aid beyond the required meter and histogram (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_run_for_dials"
description = "A brief guided first-run or coachmark flow introduces EV and the histogram without blocking the simulator (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "stop_delta_caption"
description = "A stop-delta caption versus defaults or a chosen baseline helps users learn exposure changes (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_chord_or_alternate_dial_input"
description = "Beyond basic Tab/Enter operability, the lab supports arrow-key stepping when a dial is focused (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "export_format_quality_polish"
description = "Pixel export or edit-stack UX includes polish beyond the minimum (for example quality/size options that observably change the download, or a live JSON preview pane) (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "brand_chip_narrative_polish"
description = "The inert Camera Exposure Simulator brand treatment and lab chrome read as a cohesive branded tool narrative (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "theme_accent_craft_beyond_minimum"
description = "Red-accent / dark-chrome craft goes beyond bare compliance across help, meter, look packs, and badges (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "competition_level_lab_feel"
description = "The overall lab feels competition-grade: dial feel, true pixel export, and edit-stack round-trip read as a polished instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "11.n1"
name = "barebones_unstyled_form_only"
description = "The shipped UI is a bare unstyled form or plain text controls with no live photo preview stack, dials, meter immersion, or exportable finished image."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. If present, name the enhancement and cite evidence. If already covered — even partially — answer no."
type = "binary"
weight = 1.0
