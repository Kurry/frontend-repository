[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "no_console_errors_full_exercise"
description = "No console errors or warnings appear during a full exercise of dials, light sliders, look packs, help, modes, presets, snapshots, undo/redo, before/after, pixel export, and edit-stack import/export."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "rapid_stepper_stays_responsive"
description = "Rapid repeated stepper presses stay responsive: every press lands, readouts never desynchronize from the preview, and the UI never hangs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "pixel_export_no_long_freeze"
description = "Pixel export completes without freezing the UI for more than a brief moment; the lab remains operable after download."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "histogram_updates_without_jank"
description = "Moving light sliders or stepping dials updates the histogram and preview without multi-second freezes or dropped interactivity."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_over_two_seconds"
description = "On a local cold load the lab is not interactive within 2 seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_spam_during_exercise"
description = "Console errors or warnings appear during a normal exercise of dials, export, and presets."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "export_freezes_ui"
description = "Download PNG or Download JPEG freezes the UI for a prolonged period or leaves the lab unresponsive after download."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.6"
name = "bracket_and_wipe_stay_smooth"
description = "Generating a five-frame bracket completes without freezing the UI, and dragging the wipe handle end to end keeps both renders tracking the gesture smoothly"
type = "binary"
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant performance defect not covered by any other criterion in this file. If present, name the defect and cite evidence. If already covered, answer no."
type = "binary"
negate = true
weight = 1.0
