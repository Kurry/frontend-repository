[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the transactions list shows at least 8 seeded rows with payee, category, and amount visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After creating a transaction with payee 'Ada Books' and a valid amount, the text 'Ada Books' is visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After adding 3 new transactions on top of the seed set, the list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After creating an expense transaction, Total Expenses (or Net) KPI updates to reflect the new amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After editing a payee from the seeded value to 'Evening Market', the text 'Evening Market' is visible and the previous payee is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After deleting a transaction, that payee is no longer visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting all transactions, an empty state message is visible and no transaction rows remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After submitting create with an empty required payee or amount, the transactions count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After filtering transactions by a category (with mixed categories present), only matching rows remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After switching between Breakdown and Trends chart tabs, the chart panel swaps without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After focusing the transactions list versus the chart panel (list vs chart interaction modes), both remain usable without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering sidebar items, transaction rows, or primary buttons, a visible hover wash or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After selecting multiple transaction rows and running bulk categorize or bulk delete, the selected rows update category together or disappear from the list and KPIs/charts reflect the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "In Breakdown view, the flow shows income-source nodes feeding an Income hub that splits into a Net Income node and expense-category nodes, with a per-category legend listing amount and share percentage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "In Trends view, hovering a doughnut slice reveals a tooltip showing that category's amount and percentage of total expenses"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The transaction summary strip (count, largest, average, total income, first/last dates) reflects the current collection and updates after a transaction is added or deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Transactions list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.19"
name = "1_19"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.20"
name = "1_20"
description = "Summary metric cards (Total Income, Total Expenses, Net Income, Savings Rate) derive from the transactions collection, with Net Income equal to income minus expenses, and they update when a transaction is created, edited, or deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Breakdown view renders a sankey-style flow (income-source nodes feeding an Income hub that splits into a Net Income node plus expense-category nodes) with node amount labels and a per-category legend showing each category's amount and share percentage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Trends view renders a doughnut of expense categories with a legend showing each category's amount and percentage of total expenses, and hovering a slice reveals a tooltip with that amount and percentage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "A transaction summary strip below the table shows total count, largest transaction, average transaction, total income, and first/last transaction dates derived from the current collection"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "1_24"
description = "Category and income-vs-expense filters recompute the visible list from the shared collection, and a filter matching nothing shows an empty state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Submitting create with an empty payee or missing amount does not add a row and shows visible validation feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Summary metric cards show static or hardcoded totals that do not change when transactions are added or deleted"
type = "binary"
weight = 1.0
negate = true
