[judge]
judge = "claude-code"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "stagehand-webmcp"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@browserbasehq/stagehand@3.7.0",
  "mcp",
  "--env",
  "LOCAL",
  "--chrome-version",
  "151.0.7922.34",
  "--enable-webmcp",
  "--tools",
  "webmcp_session_info,webmcp_list_tools,webmcp_invoke_tool",
  "--disable-tools",
  "act,observe,extract,agent",
  "--cdp-port",
  "$WEBMCP_CDP_PORT",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "Every checklist-* criterion in this Core Features dimension passes during the agent verifier run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "Transactions list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.4"
name = "1_4"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "checklist-1"
name = "checklist_1"
description = "On load, the transactions list shows at least 8 seeded rows with payee, category, and amount visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-2"
name = "checklist_2"
description = "After creating a transaction with payee 'Ada Books' and a valid amount, the text 'Ada Books' is visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-3"
name = "checklist_3"
description = "After adding 3 new transactions on top of the seed set, the list shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-4"
name = "checklist_4"
description = "After creating an expense transaction, Total Expenses (or Net) KPI updates to reflect the new amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-5"
name = "checklist_5"
description = "After editing a payee from the seeded value to 'Evening Market', the text 'Evening Market' is visible and the previous payee is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-6"
name = "checklist_6"
description = "After deleting a transaction, that payee is no longer visible in the transactions list"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-7"
name = "checklist_7"
description = "After deleting all transactions, an empty state message is visible and no transaction rows remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-8"
name = "checklist_8"
description = "After submitting create with an empty required payee or amount, the transactions count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-9"
name = "checklist_9"
description = "After filtering transactions by a category (with mixed categories present), only matching rows remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-10"
name = "checklist_10"
description = "After switching between Breakdown and Trends chart tabs, the chart panel swaps without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-11"
name = "checklist_11"
description = "After focusing the transactions list versus the chart panel (list vs chart interaction modes), both remain usable without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-12"
name = "checklist_12"
description = "When hovering sidebar items, transaction rows, or primary buttons, a visible hover wash or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-13"
name = "checklist_13"
description = "After selecting multiple transaction rows and running bulk categorize or bulk delete, the selected rows update category together or disappear from the list and KPIs/charts reflect the change"
type = "binary"
weight = 1.0
