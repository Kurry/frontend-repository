[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "6.1"
name = "verdict_review_end_to_end"
description = "Reviewing a verdict end to end: open a task, open a trial, select a failed criterion, follow its evidence link to the highlighted scorer inspection step, see the implicated agent step outlined, and read both step details without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_adjudication_inline_validation"
description = "Adjudication flow: submitting with classification unset or rationale under 20 characters shows inline errors naming each invalid field and records nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "adjudicate_updates_row_summary_badge"
description = "Adjudicating a flip: completing the form as rubric-bug with a rationale of at least 20 characters marks the row, increases the matching summary count by one, and updates the trial badge in the task table without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "compare_rescores_and_flips_filter"
description = "Comparing rescores: switching the active label changes the verdict table and rollup, picking two labels shows per-dimension deltas, enabling flips-only leaves only flipped criteria with their flags"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "batch_then_export_flow"
description = "Batch then export: with flips-only on, select at least two flipped criteria, Apply classification to selected as agent-bug with a valid shared rationale, confirm selected rows are marked and summary counts move, open Export review package, and confirm Review Package JSON lists those adjudications with matching summaryCounts and the Markdown memo names the same criterion ids"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "mutation_to_export_flow"
description = "Mutation-to-export: after one valid adjudication, reopening Export shows that criterionId and classification in the JSON adjudications array and Markdown memo, with Copy and Download available on the active tab"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "undo_after_adjudicate_flow"
description = "Undo after adjudicate: record a valid adjudication, confirm the row mark and summary count, Undo once, and confirm the mark, counts, badge, and Export preview restore the prior state; Redo restores the adjudication again"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after adjudicating at least one criterion, importing that Review Package JSON reconstructs row marks, summary counts, badge, and the next Export preview to match the package"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "walk_agent_trajectory_flow"
description = "Walking the agent trajectory: arrow through agent steps, confirm file tree badges track the active step, open a changed code file and copy with visible confirmation, and watch a terminal step stream progressively"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "command_palette_export_flow"
description = "Command palette jump: open with Ctrl+K or Cmd+K, choose Export review package, and confirm the export drawer opens with live previews"
type = "binary"
weight = 1.0

