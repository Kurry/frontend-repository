[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "4.1"
name = "hover_washes_required"
description = "Hovering with the real pointer shows a full-width hover wash on verdict rows, trial table rows, timeline entries, and tree rows, buttons ease background and shadow with a slight press effect, and form controls show focus rings — verified while hovering, not from static styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "linked_highlight_eases_in"
description = "Selecting a criterion through the real verdict-table controls scrolls each trajectory smoothly to its linked step and fades the outline in rather than snapping, and switching between the agent and scorer panes transitions with a short slide or cross-fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "label_switch_rollup_animation"
description = "Switching the active label through the real label switcher cross-fades the verdict table content and animates the rollup bar segments to their new proportions over roughly 200 to 300 milliseconds rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "flips_filter_row_animation"
description = "Enabling the flips-only filter through the real control animates non-flipped rows out of the table and animates them back in when the filter is disabled, rather than the table snapping between states"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "disclosure_and_streaming_motion"
description = "Reasoning regions and tool output panels expand and collapse with an eased height transition while the chevron rotates over roughly 0.2 seconds, and terminal output streams incrementally with a streaming indicator that visibly changes when complete"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "adjudication_mark_emphasis"
description = "Submitting a valid adjudication through the real form animates the classification mark onto the criterion row and the summary panel count updates with a brief emphasis transition rather than changing silently; bulk apply similarly animates marks onto every selected flipped row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly, while every flow (criterion selection, label switching, filtering, adjudication, bulk apply, undo/redo, export, and import) remains complete and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_drawer_and_copy_motion"
description = "Opening Export review package through the real control enters the drawer with a brief opacity or scale transition, and Copy shows a short confirmation before resetting — verified via the real UI path, not a WebMCP shortcut"
type = "binary"
weight = 1.0

