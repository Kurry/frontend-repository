[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "4.1"
name = "no_flips_empty_state"
description = "With the flips-only filter active, switching to a label pair with no flips shows a designed empty state naming that no criteria flipped, with a control that clears the filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "adjudication_and_bulk_validate_inline"
description = "Adjudication and bulk-apply forms show inline per-field validation before a successful submit when classification is unset or rationale is outside 20–2000 characters"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_fields"
description = "Validation and import errors name the offending field and the rule broken rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_and_import_confirmation"
description = "Export Copy shows visible confirmation, and a successful import shows visible confirmation that adjudications were applied"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "terminal_streaming_affordance"
description = "Terminal-bearing steps show a streaming-versus-complete status affordance while output appears progressively"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_at_empty_stack"
description = "Undo with an empty history leaves adjudications unchanged and the Undo control stays disabled; Redo with an empty forward stack stays disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "screenshot_step_placeholder"
description = "Selecting a criterion whose evidence links to a scorer step with a screenshot shows the placeholder screenshot frame in that step's detail with descriptive alternative text"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_controls"
description = "Buttons, inputs, checkboxes, and labels for adjudication, bulk apply, export, and import use semantic interactive elements rather than clickable plain text alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_close_paths"
description = "The adjudication form, export drawer, import surface, and command palette each close via an explicit control and Escape, returning focus to the opener"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "import_rejects_bad_contract"
description = "Importing malformed Review Package JSON or a document that breaks the field contract shows visible validation naming the offending field and leaves adjudication counts unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "arrow_keys_stop_at_ends"
description = "Arrow-key navigation in either trajectory stops at its first and last steps without wrapping or console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "double_submit_single_record"
description = "Double-activating the adjudication submit control records exactly one adjudication for that criterion"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_flips_has_no_feedback"
description = "A flips-only view with no flips shows a blank region with no empty-state copy and no control to clear the filter"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Validation or import failures are surfaced only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Adjudication, copy, or import actions lack visible feedback and silently succeed or fail"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "import_mutates_without_validation"
description = "Importing a document that violates the Review Package field contract still mutates adjudications"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap the only interactive path for adjudicate, export, or import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "The export drawer, import surface, or command palette cannot be dismissed via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Adjudication or bulk-apply validation feedback is missing or delayed with no UI indication"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Export, Import, Adjudicate, or Apply classification controls have ambiguous or missing labels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "undo_corrupts_or_errors"
description = "Activating Undo or Redo at empty-stack boundaries throws, corrupts adjudications, or enables the control incorrectly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "rationale_overlength_accepted"
description = "A rationale longer than 2000 characters is accepted and recorded without validation naming the rationale field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
