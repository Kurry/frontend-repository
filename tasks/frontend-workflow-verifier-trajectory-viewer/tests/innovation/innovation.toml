[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "11.1"
name = "coachmarks_tour_optional"
description = "Optional: a short coachmarks tour highlights the verdict table, Export review package, and the flips-only filter on first visit, is dismissible, and never blocks the primary review workflow"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "review_activity_feed_optional"
description = "Optional: a compact review activity feed lists the last several adjudication mutations with timestamps, derived from the same store as the summary panel"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "command_palette_polish_beyond_jump"
description = "Optional: the command palette fuzzy-filters Jump to trial and action entries as the user types, beyond a static unfiltered list"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "export_memo_readable_polish"
description = "Optional: the Review Memo Markdown preview includes clear section headings and readable bullets that go beyond a bare dump of ids"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "bulk_bar_contextual_polish"
description = "Optional: the bulk selection bar shows a live selected-count and clears selection with an explicit control after Apply classification to selected"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "comparison_delta_sparklines"
description = "Optional: the comparison strip adds compact visual cues for per-dimension improvement versus regression beyond signed numbers alone"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "keyboard_cheatsheet_optional"
description = "Optional: a dismissible keyboard cheatsheet documents arrow scrubbing, Ctrl/Cmd+K, and Undo/Redo without blocking review"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "density_toggle_optional"
description = "Optional: a density control tightens or loosens verdict table and timeline row spacing beyond the default dense register"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "print_friendly_memo_optional"
description = "Optional: a print-optimized view of the Review Memo Markdown formats cleanly for paper or PDF without breaking the main workspace"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_review_polish"
description = "Competition-level polish is visible in the review console beyond MVP: cohesive instrument chrome, purposeful motion, and a complete export end state"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "innovation_is_generic_review_shell"
description = "Beyond the mandated review console surfaces, the UI reads as a generic log viewer shell with no review-operator polish or optional enhancement."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
