[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on local render; task rows respond within that window"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "No console errors or warnings appear on load or during a full exercise including export, import, bulk apply, and undo"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "label_and_filter_transitions_snappy"
description = "Label switches and flips-filter toggles update the verdict table without multi-second hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "terminal_streaming_nonblocking"
description = "Terminal streaming never blocks interaction with the verdict table, timelines, or export drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "trajectories_scroll_without_lag"
description = "Arrowing through 12+ agent steps and 8+ scorer steps stays responsive without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during adjudication, bulk apply, undo, and export reopen"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Label-switch rollup animation, flips-filter row animation, and linked-highlight easing remain smooth without dropping the UI into an unresponsive state"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapidly switching labels, toggling flips-only, and reopening Export does not hang or freeze the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "export_reopen_stays_snappy"
description = "Reopening Export review package after mutations regenerates previews without multi-second freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "undo_redo_responsive"
description = "Rapid undo/redo through several adjudication mutations stays responsive with no hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before interaction is possible on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors or warnings appear during load or during export/import/undo flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Label-switch or flips-filter transitions block interaction for seconds"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "terminal_streaming_hangs_ui"
description = "Terminal streaming causes the UI to hang or freeze"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "trajectory_scrub_kills_frame_rate"
description = "Arrowing through trajectories kills responsiveness"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during rollup or flips-filter animation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "export_freezes_ui"
description = "Opening or regenerating Export review package freezes the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "undo_hangs"
description = "Undo or Redo hangs the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "import_locks_ui"
description = "Import parsing locks the UI with no feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid label switching, bulk apply, or export reopen"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
