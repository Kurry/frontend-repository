[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "At 1440px the trajectories can show side by side; at 1024px and below the workspace collapses to one pane with the pane switcher visible; at 375px the layout remains usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "Adjudicate, Export, Import, flips filter, and pane switcher controls remain usable tap targets on a 375px viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Page titles, section headings, and verdict table text remain readable from 1440px to 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px, no content clips or overflows the viewport and no page-level horizontal scrolling appears; verdict table, code blocks, terminal, and export drawer scroll within their containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "Pane switcher, bulk bar, and export/import surfaces adapt for smaller screens without disappearing off-canvas permanently"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "When panes collapse below 1024px, agent/judge switching and the verdict table reflow logically without covering each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "selections_persist_across_pane_switch"
description = "At narrow widths, criterion selection and active steps persist when switching between agent and scorer panes"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px width the page has no horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "export_drawer_usable_narrow"
description = "The export drawer including format tabs, Copy, and Download stays fully visible and operable at 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Pane switcher, Undo/Redo, and Export controls remain accessible at desktop and mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks or overflows at 1440px, 1024px, or 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Export, Adjudicate, or pane switcher controls are too small or misaligned on mobile"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Verdict table or export preview text is too small to read at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Verdict table, trajectories, or export drawer are cropped or force page-level horizontal scrollbars at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "pane_switcher_missing_narrow"
description = "The pane switcher is missing or unusable at widths of 1024px and below"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed chrome obscures the verdict table or export controls at some viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Trajectory panes, verdict table, or export drawer overlap illegibly at some viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "export_unusable_on_mobile"
description = "Export or import controls are unavailable on mobile where the spec requires them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "code_blocks_overflow_page"
description = "Code blocks or terminal output use a static width and overflow the viewport at 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Undo, Redo, Export, or flips filter controls disappear at specific sizes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
