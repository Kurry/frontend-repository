[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: open a trial, switch the active label, enable flips-only, record an adjudication, then reload — the app coherently resets to the seeded baseline (3-task list, default labels, no adjudications, empty undo stacks), never a mix of persisted and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "label_switch_reversal_proves_live"
description = "Sort-equivalent proof via labels: switch from label A to label B and note at least one differing criterion verdict, then switch back to A; the original verdicts and rollup scores return, proving results are derived from live label data rather than a single hardcoded table"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_derived_view_tracks_mutations"
description = "Derived-view sensitivity: record a valid adjudication and confirm the Export review package JSON adjudications array and summaryCounts change to include it; Undo and confirm the export preview drops it again"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_row_summary_export_echo"
description = "Cross-view echo: submit a valid adjudication and confirm the criterion row mark, summary panel count, trial badge, and Export preview all reflect that classification without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure a summary classification count immediately before and after a new valid adjudication on a previously unadjudicated criterion; the matching count increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_classifications_change_export"
description = "Input-dependent output: adjudicate the same criterion once as agent-bug and once (after undo or replace) as scorer-error with different rationales; the Export JSON classification and rationale fields differ accordingly"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_compare_and_adjudicate"
description = "Interleaved-flow integrity: enable flips-only and select a flipped criterion, switch compared labels so flips change, then complete an adjudication on a still-visible failed or flipped row; neither the comparison strip nor the adjudication corrupts the other surface"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_tracks_export"
description = "Edge-state round-trip: after adjudications exist, Undo until none remain (summary counts at zero and export adjudications empty), then record one valid adjudication; the row mark, summary counts, badge, and Export preview all show exactly that one record"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_round_trip_restores_export"
description = "Undo round-trip: after a valid adjudication, Undo restores prior marks/counts/export; Redo restores the adjudication and export contents again"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_reconstructs_state"
description = "Export/import pipeline: mutate adjudications, export Review Package JSON, import that JSON after clearing via Undo, and confirm visible marks, summary counts, and the next Export preview match the exported document"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, some facets (for example adjudications) survive while others reset, or vice versa, producing incoherent partial persistence in this in-memory genre"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_ignores_session_inputs"
description = "A derived export surface renders identically regardless of whether adjudications were recorded in the session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_classifications_identical_export"
description = "Adjudicating with different classifications yields export entries that are byte-identical including the classification field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "Adjudication state changes appear in one view (row, summary, badge, or export) but not another until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
