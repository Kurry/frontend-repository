[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "Cold start to interactive is under 2 seconds on a local load with all 60 or more seeded seeds present in the queue"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or during filtering, triaging, authoring, harvesting, exporting, and importing"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "interactions_respond_under_100ms"
description = "Filter toggles, sort clicks, pane switches, and chip applications respond in under 100 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "simulated_work_shows_indicators"
description = "The simulated harvest shows visible activity indicators (running step, backoff countdown) for the duration of its simulated latency"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "sixty_seed_queue_stays_fast"
description = "The 60-plus-row queue renders, scrolls, filters, and sorts without perceived lag, blank stalls, or layout jumps"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "interactive_during_state_changes"
description = "The UI remains interactive during batch triage updates, gate re-derivation, and export generation"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_stay_smooth"
description = "Badge transitions, list animations, banner changes, and view transitions maintain a smooth frame rate with no visible stutter"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid repeated input — fast filter toggles, rapid sort clicks, quick pane switches, repeated batch selections — causes no hangs or dropped interactions, including while a harvest simulation is running"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stays_stable"
description = "An extended session of repeated triage, authoring, harvest, and export cycles shows no slowdown, memory runaway, or degradation"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "harvest_failures_degrade_gracefully"
description = "Simulated harvest failures and retries never blank or corrupt the surrounding UI — the step list, golden pane, and timeline stay rendered and current through failure, retry, and resume"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the queue and top-bar controls respond on a local cold load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings appear in the console during triage, authoring, harvest, or export flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "View or pane transitions block input or visibly lag"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "harvest_hangs_ui"
description = "The simulated harvest freezes or hangs the rest of the UI while it advances"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_queue_kills_frame_rate"
description = "Scrolling or filtering the 60-plus-row queue drops the frame rate to visible jank"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive while list, banner, or badge animations play"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while fonts, icons, or scripts load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory leaks or runaway browser resource usage occur over a session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_screen_during_startup"
description = "Nothing is displayed while the seeded manifest initializes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes or becomes unusable under rapid or edge-case use"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
