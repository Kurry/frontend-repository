[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing follow one consistent scale — shared row heights, regular pane paddings, even gaps — with no arbitrary one-off values visible in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the specified system: monospaced seed ids, commit hashes, and manifest text, and a sans-serif hierarchy of app title above pane headings above table body and label text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_specified_composition"
description = "The layout matches the specified composition at desktop width: top bar with view switcher, rollup above or beside the queue, filter and chip row above the table, the workbench's header strip plus multi-pane body, and Export center with format tabs plus monospace preview and Copy/Download"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "The state changes the spec calls out — triage chip transitions, list add/remove, gate banner changes, harvest step progression, view switches — carry their specified transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "breakpoint_behavior_matches_spec"
description = "Responsive behavior matches the specified patterns: pane stacking at 1024 pixels, the rollup strip and column hiding at 768, and container-scrolling table and manifest at 375"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_is_systematic"
description = "Buttons, form controls, chips, and dialogs share consistent radii, padding, and shadow treatments from one system"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "semantic_color_mapping_precise"
description = "The specified semantic color mapping is implemented precisely: slate draft, green authored, red rejected, amber harvest-pending and warnings, violet hard difficulty, identical across queue, rollup, and timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, focus, disabled, error) are present and distinct exactly where the spec calls for them"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "protected_surfaces_styled_per_spec"
description = "The specified special treatments render as described: the locked 1.4 row's lock icon and distinct background, the gate banner's unmet-item and all-clear states, and the amber foil warning"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover and press feedback follows the spec in duration and motion, including the 200 to 300 millisecond dialog transitions"
type = "binary"
weight = 1.0

