[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing follow one consistent scale — shared row heights, regular pane paddings, even gaps — with no arbitrary one-off values visible in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the specified system: monospaced seed ids, commit hashes, and manifest text, and a sans-serif hierarchy of app title above pane headings above table body and label text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_specified_composition"
description = "The layout matches the specified composition at desktop width: top bar with view switcher, rollup above or beside the queue, filter and chip row above the table, the workbench's header strip plus multi-pane body, and Export center with format tabs plus monospace preview and Copy/Download"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "The state changes the spec calls out — triage chip transitions, list add/remove, gate banner changes, harvest step progression, view switches — carry their specified transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "breakpoint_behavior_matches_spec"
description = "Responsive behavior matches the specified patterns: pane stacking at 1024 pixels, the rollup strip and column hiding at 768, and container-scrolling table and manifest at 375"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_is_systematic"
description = "Buttons, form controls, chips, and dialogs share consistent radii, padding, and shadow treatments from one system"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "semantic_color_mapping_precise"
description = "The specified semantic color mapping is implemented precisely: slate draft, green authored, red rejected, amber harvest-pending and warnings, violet hard difficulty, identical across queue, rollup, and timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, focus, disabled, error) are present and distinct exactly where the spec calls for them"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "protected_surfaces_styled_per_spec"
description = "The specified special treatments render as described: the locked 1.4 row's lock icon and distinct background, the gate banner's unmet-item and all-clear states, and the amber foil warning"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover and press feedback follows the spec in duration and motion, including the 200 to 300 millisecond dialog transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the consistent scale — uneven row heights, mismatched pane paddings, or irregular gaps"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_break_semantic_mapping"
description = "A status, difficulty, or warning surface uses a color outside the specified semantic mapping, or the same state renders different colors in different surfaces"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "identity_text_not_monospaced"
description = "Seed ids, commit hashes, or the manifest text render in the interface sans-serif rather than the specified monospaced face"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "A transition the spec requires (triage chip, list change, gate banner, dialog, view switch) is missing or plainly deviates from the specified behavior"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls use browser default styles where the spec styles them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The grid or layout is misaligned at the specified 1440, 1024, 768, or 375 pixel widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Elements render off-screen or clipped at a specified breakpoint"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_spec"
description = "The composition deviates from the specified structure — a missing rollup panel, chip row, gate banner, or workbench pane, or panes in an order that contradicts the spec"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text show no clear hierarchy distinction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_spec"
description = "Hover or press microinteractions are missing or deviate from the specified duration and motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
