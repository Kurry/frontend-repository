[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "triage_to_authored_end_to_end"
description = "Triage-to-authored flow: filter the queue to draft quartz-orm seeds, open quartz-orm-issue-142, accept it, author the question, keep the 1.1 to 1.5 rubric with 1.4 locked, add a 2.x negative criterion and 3 resolving foils, satisfy the golden condition, watch the gate banner empty, and mark the seed authored — the queue badge, both rollup counts, and the timeline transition all change in the same session without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "export_closes_the_loop"
description = "Export flow: after marking a seed authored, Export center shows package-manifest with schemaVersion seed-package-manifest-v1 carrying the exact authored values, snapshot with schemaVersion dataset-snapshot-v1 matching rollup byStatus, and studio-package with schemaVersion seed-dataset-studio-v1 and studio Seed Dataset Studio; Download or Copy confirms visibly and the timeline gains an export entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "import_round_trip_flow"
description = "Import round-trip flow: export a DatasetStudioPackage after authoring, diverge the seed's question or foil cap, Import the JSON, and confirm workbench fields and a fresh export reconstruct to match the imported package without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "batch_reject_with_undo_recovery"
description = "Batch flow: multi-select at least 3 draft seeds, batch reject them with class insufficient-signal and one justification, confirm the rejected rollup and insufficient-signal breakdown each grew by the selection size while draft shrank by the same amount, then Undo restores every affected seed and every rollup figure to its prior value"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "cross_link_navigation_flow"
description = "Cross-link flow: a rollup cell click lands on the filtered queue whose row count matches the cell figure, and a foil's expects-fail chip jumps to its criterion in the rubric pane; deleting that criterion immediately flags the foil with a warning naming the id and adds the unresolved-reference condition to the gate banner"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "dangling_reference_repair_flow"
description = "Repair flow: with a foil flagged for a deleted criterion, remapping its expects-fail selection to an existing id clears the warning and removes the gate banner condition in the same interaction, after which Mark authored becomes available"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "view_switch_retains_state"
description = "Switching from the queue (with filters, search, and a selection applied) to the workbench and back retains the queue's filters, sort, and selection, and switching away from the workbench and back retains its pane contents and checklist state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filter_surfaces_agree"
description = "The matching-seeds count label, the visible table rows, and the rollup figure for the same slice agree with each other whenever filters, search, or chips change what is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "selection_toolbar_lifecycle"
description = "Checking rows summons the selection toolbar with an accurate selected count, unchecking all rows or completing a batch action dismisses or resets it, and the selection never silently includes rows hidden by a filter change"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_flows"
description = "The reject form and confirmation dialogs open from their triggering controls, complete their action on valid submit, and cancel without side effects — a canceled rejection leaves the seed, rollups, and timeline unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flows_recover_without_reload"
description = "Every flow dead end is recoverable without a reload: an empty filtered queue offers Clear all, a gate-blocked seed names what to fix, a mistaken batch offers Undo, and closing the export view returns to the studio with state intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Accepting, rejecting, authoring, marking authored, exporting, or importing a seed package is not reachable from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "batch_misses_or_double_applies"
description = "A batch triage action skips some selected seeds, applies twice to others, or changes seeds that were not selected"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "flow_surfaces_desync"
description = "A completed flow leaves the queue, rollup panel, timeline, or export text disagreeing about a seed's state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_loses_work"
description = "Switching between Queue and Workbench discards workbench edits, checklist state, queue filters, or the current selection"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "emptied_slice_breaks_ui"
description = "Rejecting or filtering away every visible seed produces a broken or blank region instead of the named empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "rollup_click_through_mismatch"
description = "A rollup cell click-through lands on a queue whose visible row count disagrees with the figure on the clicked cell"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "Collapsed or overlay chrome (the mobile rollup strip, a collapsed pane, or the selection toolbar) cannot be reopened or re-summoned once dismissed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_traps_with_no_exit"
description = "The reject form, a confirmation dialog, or the export view blocks the app with no cancel, close, or Escape path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "blocked_flow_lacks_feedback"
description = "A blocked or failed flow — a disabled Mark authored, an invalid form, or an exhausted harvest step — gives no visible feedback explaining why"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "dead_end_requires_reload"
description = "A navigation state can only be corrected by reloading the page"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
