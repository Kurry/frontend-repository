[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: structured-editor-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the editor_*, form_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_seed_workbench_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor operations on questions, checklist items, criteria, foils, and golden answers, triage form flows, harvest session controls, and artifact export/copy change the same queue, workbench panes, gate banner, timeline, and export previews the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: editor select/add/delete/update_property/set_content on question, under-specification-checklist-item, positive-criterion, negative-criterion, foil, and golden-answer with the declared properties; form validate/submit/cancel over reject-class, reject-justification, batch-reject fields, and harvest-pending-justification across workflow steps accept-for-authoring, reject-seed, batch-reject, undo-triage, mark-authored, and export-package; session start/pause/resume with demos harvest-run and harvest-step-retry; artifact export/copy with formats package-manifest-json, dataset-snapshot-json, and commit-hash — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "triage_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: an invoked triage (single or batch) updates the seed's queue status badge, the rollup counts by exactly the selection size, and the seed timeline in one interaction, and undo-triage restores all three to their prior values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "rubric_editor_operations_stay_referentially_sound"
description = "Declared editor operations keep referential integrity live: adding rubric criterion 1.6 makes 1.6 immediately selectable in every foil's expects-fail options, deleting a referenced criterion flags the foil with a dangling-reference warning naming the missing id, and the gate banner adds or removes exactly the named unmet condition in the same interaction that changes its input."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "triage_form_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: reject-class stays inside its five-value enum, reject and harvest-pending justifications require at least 20 characters, and mark-authored succeeds only when the gate passes — question text present, at least 3 foils, every expects-fail id resolving, and a golden answer present or harvest-pending justified."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "harvest_session_matches_spec"
description = "Session operations match the declared harvest lifecycle: a harvest completing all 5 steps fills the golden pane, clears harvest-pending, and stamps a harvest completion on the timeline; pause freezes at the current step and resume continues there."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: the locked criterion 1.4 runtime-evidence gate refuses delete attempts in place with an explanatory message, seeds stay limited to the six seeded repositories, foil expects-fail ids stay limited to the seed's current rubric criterion ids, and exports stay inside the three declared formats."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound editor, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: queue filtering, incremental search, sort toggles, saved filter chips, and rollup click-throughs stay driven through the visible controls, and chip transitions, harvest activity ticks, crossfades, the file picker, and clipboard stay Playwright territory."
type = "binary"
weight = 1.0

