[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: structured-editor-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the editor_*, form_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_seed_workbench_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: editor operations on questions, checklist items, criteria, foils, and golden answers, triage form flows, harvest session controls, and artifact export/copy change the same queue, workbench panes, gate banner, timeline, and export previews the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: editor select/add/delete/update_property/set_content on question, under-specification-checklist-item, positive-criterion, negative-criterion, foil, and golden-answer with the declared properties; form validate/submit/cancel over reject-class, reject-justification, batch-reject fields, and harvest-pending-justification across workflow steps accept-for-authoring, reject-seed, batch-reject, undo-triage, mark-authored, and export-package; session start/pause/resume with demos harvest-run and harvest-step-retry; artifact export/copy with formats package-manifest-json, dataset-snapshot-json, and commit-hash — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "triage_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: an invoked triage (single or batch) updates the seed's queue status badge, the rollup counts by exactly the selection size, and the seed timeline in one interaction, and undo-triage restores all three to their prior values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "rubric_editor_operations_stay_referentially_sound"
description = "Declared editor operations keep referential integrity live: adding rubric criterion 1.6 makes 1.6 immediately selectable in every foil's expects-fail options, deleting a referenced criterion flags the foil with a dangling-reference warning naming the missing id, and the gate banner adds or removes exactly the named unmet condition in the same interaction that changes its input."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "triage_form_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: reject-class stays inside its five-value enum, reject and harvest-pending justifications require at least 20 characters, and mark-authored succeeds only when the gate passes — question text present, at least 3 foils, every expects-fail id resolving, and a golden answer present or harvest-pending justified."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "harvest_session_matches_spec"
description = "Session operations match the declared harvest lifecycle: a harvest completing all 5 steps fills the golden pane, clears harvest-pending, and stamps a harvest completion on the timeline; pause freezes at the current step and resume continues there."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: the locked criterion 1.4 runtime-evidence gate refuses delete attempts in place with an explanatory message, seeds stay limited to the six seeded repositories, foil expects-fail ids stay limited to the seed's current rubric criterion ids, and exports stay inside the three declared formats."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound editor, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: queue filtering, incremental search, sort toggles, saved filter chips, and rollup click-throughs stay driven through the visible controls, and chip transitions, harvest activity ticks, crossfades, the file picker, and clipboard stay Playwright territory."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "seed_studio_tools_missing_or_noop"
description = "WebMCP tooling for triage, the rubric editor, harvest runs, or export is unbound, missing, or a no-op that reports success while the queue badges, gate banner, or export previews stay unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_workbench_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked mark-authored reports success while the gate banner still lists unmet conditions, or a batch reject changes tool output without moving the rollup counts by the selection size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_seed_capabilities_exposed"
description = "Undeclared capabilities are exposed, such as a tool that deletes the locked criterion 1.4, seeds outside the six seeded repositories, extra export formats, or a generic state setter."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "authoring_gate_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — a rejection with an under-20-character justification, mark-authored despite a failing gate, a foil correctness cap outside 0-40 percent, or an expects-fail id outside the seed's current criterion ids — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared editor, form, session, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (structured-editor-v1, form-workflow-v1, command-session-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the queue, workbench, and harvest state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — driving queue search/sort/filter navigation that the contract leaves to the visible controls, or returning clipboard contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
