[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
    "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
    "webmcp_session_info",
    "webmcp_list_tools",
    "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
    "-y",
    "@playwright/mcp@0.0.76",
    "--browser",
    "chromium",
    "--cdp-endpoint",
    "$WEBMCP_CDP_ENDPOINT",
    "--isolated",
    "--output-dir",
    "/logs/verifier/screenshots",
]
allowed_tools = [
    "browser_navigate",
    "browser_navigate_back",
    "browser_resize",
    "browser_tabs",
    "browser_click",
    "browser_close",
    "browser_console_messages",
    "browser_drag",
    "browser_evaluate",
    "browser_file_upload",
    "browser_fill_form",
    "browser_handle_dialog",
    "browser_hover",
    "browser_network_requests",
    "browser_press_key",
    "browser_select_option",
    "browser_snapshot",
    "browser_take_screenshot",
    "browser_type",
    "browser_wait_for",
]

[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
    "-y",
    "@playwright/mcp@0.0.76",
    "--browser",
    "chromium",
    "--cdp-endpoint",
    "$WEBMCP_RM_CDP_ENDPOINT",
    "--isolated",
    "--output-dir",
    "/logs/verifier/screenshots",
]
allowed_tools = [
    "browser_navigate",
    "browser_resize",
    "browser_snapshot",
    "browser_take_screenshot",
    "browser_evaluate",
    "browser_console_messages",
    "browser_wait_for",
    "browser_press_key",
    "browser_click",
    "browser_hover",
]

[[criterion]]
id = "AC-02"
title = "Visual hierarchy of hooks and desk"
description = "At 1440x900, the four patterned hooks and badge rail dominate while alphabet ribbon, arrivals/profile, routes, issues, rehearsal, and history form a deliberate welcome desk; overflow, preview, invalid, selected, redirected, branched, rehearsed, and approved states remain legible without color alone."
weight = 1.0
