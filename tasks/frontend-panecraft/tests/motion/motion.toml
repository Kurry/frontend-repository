[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Hovering the pointer over page tabs, primary buttons, Data Source Library cards, and table rows produces a visible hover response on each"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Pressing Tab through the workspace moves a visible 2px primary-color focus outline across interactive controls, and a pane's Edit/Move/Resize/Delete control row is reachable by keyboard focus even without hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Hovering a pane card on a wide viewport reveals its Edit/Move/Resize/Delete control row that is hidden at rest"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "Clicking Copy Link in the Share panel shows a transient Copied! confirmation that appears immediately and clears on its own without trapping the user in the panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "With a pane's refresh interval set to Every 30s the Last updated Xs ago label advances and the recomputed value updates in place without a layout jump or flicker in the rest of the page"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "The active page tab is distinguished from inactive tabs by a bottom border in the primary color and bold text when it is selected"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "Interactive chrome and pane cards give no hover feedback and the pane control row never reveals on hover, so the page feels static under the pointer"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "4_8"
description = "Keyboard Tab focus shows no visible focus indicator on interactive controls, or clicking Copy Link gives no visible confirmation"
type = "binary"
weight = 1.0
negate = true
