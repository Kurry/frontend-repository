[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with empty storage the workspace opens directly at the root with a PaneCraft header, a Dashboard page tab, a Data Source Library listing Website Analytics, Sales Sheet, and Support Tickets, and three default panes already present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After clicking Sales Sheet in the Data Source Library a preview modal opens listing raw rows in a table, and typing Hardware into its Filter preview rows input narrows the table to only matching rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After using Create Pane and stepping through choose-source (Website Analytics), choose-type (all five of Line Chart, Bar Chart, Donut Chart, Data Table, Counter are offered; pick Line Chart), and configure (pick a metric column and a separate dimension column), the finished line chart pane appears on the current page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After clicking a pane's Edit control and changing its metric to a different column, the pane updates in place to the new metric without losing its grid position or being recreated"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After clicking a pane's Delete control, cancelling the confirmation keeps the pane, and triggering Delete again and confirming removes the pane from the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After Add Page creates a new active tab, adding a pane to it and switching back to the original page confirms the new pane does not appear there, and renaming the new page updates its tab label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After using a pane's Move Right (or Move Down) control the layout updates, its Small/Medium/Large toggle resizes it, and the move controls disable when the pane reaches a grid boundary"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After setting a pane's Refresh dropdown to Every 30s a Last updated Xs ago label appears and counts up, and the pane's displayed value changes by a small deterministic jitter on each simulated tick; returning it to Off stops the label and the value changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After adding two Website Analytics time-series panes and changing the shared date-range control from its default to Last 7 Days and then Last 90 Days, both panes update simultaneously to reflect each range"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After configuring a pane so its combination yields zero rows for the current range the pane shows No data for this range, and widening the range back to Last 90 Days restores real chart data in the same pane"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After creating a page, adding a pane with a non-default refresh interval, reordering and resizing it, and performing a full page reload, the page, the pane's type/source/metric/size/order, and its refresh-interval are all restored exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After opening the Collaboration Scenario, queueing two independently authored non-conflicting changes and applying them in either offered order (Apply A then B, Apply B then A) both appear in the converged Shared content with neither dropped, and a conflicting change surfaces an explicit resolution choice"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After opening the Share panel it shows a monospace read-only panecraft.local/view link and a Public/Private toggle, and clicking Copy Link shows a transient Copied! confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After exercising the create, edit, delete, refresh, date-range, and collaboration workflows no uncaught console errors or unhandled promise rejections have appeared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load with empty storage the workspace opens at the root with a PaneCraft header, a Dashboard page tab, a Data Source Library listing Website Analytics, Sales Sheet, and Support Tickets, and three default panes already present"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Clicking a Data Source Library entry opens a preview modal listing that source's raw rows in a table, and typing into its Filter preview rows input narrows the table to only rows matching the typed text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Create Pane steps through choose-source, choose-type offering exactly Line Chart, Bar Chart, Donut Chart, Data Table, and Counter, and configure with a metric column plus a separate dimension column for charts, then adds the finished pane to the current page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "A pane's Edit control reopens its configuration and changing the metric updates the pane in place without losing its grid position or recreating it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "A pane's Delete control asks for confirmation; cancelling keeps the pane and confirming removes it from the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Add Page creates a new active tab whose panes are independent of other pages, switching pages keeps each page's panes separate, and a page can be renamed inline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "A pane's Move Up/Down/Left/Right controls reposition it within the grid and each direction's control disables when the pane is at that grid boundary"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "A pane's Small/Medium/Large size toggle immediately changes how many grid columns the pane spans"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Setting a pane's Refresh dropdown to Every 30s shows a Last updated Xs ago label that counts up and recomputes the value by a small deterministic jitter each simulated tick, and returning it to Off stops the label and the self-updating value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Changing the shared date-range control updates every time-series pane on the current page simultaneously to reflect the new window rather than a single pane in isolation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "A page with zero panes shows Create your first pane to build this page, a pane whose combination yields zero rows shows No data for this range, and widening the range restores real chart data in the same pane"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "The Collaboration Scenario merges two independently authored non-conflicting changes so both appear in the converged Shared content whether applied A-then-B or B-then-A, and a conflicting change surfaces an explicit resolution choice instead of silently overwriting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The Share panel shows a read-only panecraft.local/view mock link and a Public/Private access toggle and Copy Link copies the link"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "The Saved analysis collection supports creating, editing, and deleting named analyses with Overview and Table views and combined search/filter/sort/selection and a clear-controls action, rejecting duplicate names without corrupting the bundled data"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "The app starts empty or requires connecting an external service before panes are usable instead of shipping the three bundled sources and a default page of panes"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Changing the shared date range updates only one pane, or the Create Pane wizard omits one of the five required pane types"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "The two collaboration delivery orders diverge to different visible results, drop a non-conflicting change, or a conflict silently overwrites without offering a resolution choice"
type = "binary"
weight = 1.0
negate = true
