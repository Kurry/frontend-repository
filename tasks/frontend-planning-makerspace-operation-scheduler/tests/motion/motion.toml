[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "motion.1"
name = "causal_routing_animation"
description = "Move or resize an operation, or change an allocation. Confirm that dependency paths (edges) and setup blocks reroute or update smoothly, providing visual causality for the change rather than abruptly snapping."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.2"
name = "recovery_provenance_animation"
description = "Trigger an outage repair merge or a partial-run recovery. Confirm that the UI animates the provenance of the changes (e.g., how the locked/in-progress items shift or remain), making the transformation easy to follow."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.3"
name = "reduced_motion_parity"
description = "Enable prefers-reduced-motion in the browser, then perform a move, resize, batch, or check-in operation. Confirm that the animations are skipped or replaced with subtle fades, but the causal endpoints, data totals, and final visual states still match exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "motion.n1"
name = "abrupt_state_snapping"
description = "When dragging or resizing an operation in the scheduling lanes, the block simply snaps to its final position without any transition, or dependent setup blocks and paths jump without visual tweening."
type = "binary"
negate = true
weight = 0.5
