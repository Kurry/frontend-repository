[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "MO-1"
name = "MO-1"
description = "Sending, pinning, archiving, and deleting a note through their visible controls each surface a transient toast confirmation that auto-dismisses after roughly 2.5 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-2"
name = "MO-2"
description = "Attempting to send a blank note via the Send control plays a short shake on the composer input row alongside a visible inline error"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-3"
name = "MO-3"
description = "Hovering the Send control, a tag chip, and a note action control shows a visible hover state distinct from resting, and Tab focus shows a visible outline/ring on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-4"
name = "MO-4"
description = "Selecting a tag and opening Calendar or Archived update the timeline in place without a full page reload, with the active control reflecting the current view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-NEG-1"
name = "MO-NEG-1"
description = "Interactive controls (Send, tag chips, note actions) show no hover or focus feedback, appearing inert"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO-NEG-2"
name = "MO-NEG-2"
description = "A blank note submission is only silently blocked by a disabled control with no visible error or shake explanation"
type = "binary"
weight = 0.5
negate = true
optional = true
