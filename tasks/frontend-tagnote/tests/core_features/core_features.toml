[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load with an empty timeline, a friendly empty-state prompt invites the user to send the first note rather than showing a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After typing a note and clicking Send (or pressing Enter), the note appears under a Today date header with its exact text and the composer input clears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After sending a note reading call mom #family #todo, the bubble shows exactly two tag chips reading family and todo beneath its text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After sending a note containing an https:// URL and no typed tags, the note automatically gains a link tag chip and the URL renders as a clickable anchor inside the bubble"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When one note contains #Work and another contains #work, the tag rail lists a single work tag with a usage count of 2 and clicking it filters the timeline to both notes, showing case-insensitive deduplication"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When a tag is clicked in the rail, the timeline filters to only notes carrying it and a Clear filter control appears; clicking the same tag again restores the full timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After marking a shared tag as a TODO tag and checking one of its two notes done, that tag's filtered view splits into an Open section containing the unchecked note and a Done section containing the checked note"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When a note is Pinned it moves into a Pinned section above the chronological timeline, and Unpin returns it to its original chronological position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After Editing a note whose text originally had one tag, changing the text to a different tag plus a URL and saving, the note shows the new tag chip and an auto-added link chip while the original tag no longer applies"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "When Delete is used a confirmation step appears; canceling leaves the note in place and confirming permanently removes it from the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After archiving a note it disappears from the main timeline and appears in the Archived view, and Unarchive restores it to its original chronological position in the main timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When the Calendar control is opened, today's day cell shows a marker; clicking that day filters the timeline to notes created today and clicking it again clears the filter and restores the full timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After creating, pinning, tagging, and marking notes done, a full page refresh restores every note with its text, tags, TODO designation, done state, pin state, and archive state exactly as before"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After creating several visible changes then undoing and making a different change, the History panel exposes a History state region and a separately selectable branch that restores its exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Sending a note through the composer appends exactly one note under a Today date header with the exact typed text and clears the input"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Inline hash-word tokens in a note become tag chips beneath it: call mom #family #todo yields exactly two chips family and todo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Case-insensitive tag dedup: #Work and #work resolve to one work tag counted 2 in the rail, and filtering by it shows both notes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "A note containing an http(s) URL automatically gains a link tag and renders the URL as a clickable anchor inside the bubble"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Clicking a tag in the rail filters the timeline to notes carrying it and shows a Clear filter affordance; clicking it again clears the filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Marking a tag as a TODO tag adds a checkbox to its notes and splits that tag's filtered view into Open (unchecked) and Done (checked) sections"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Pin moves a note into a Pinned section above the chronological timeline and Unpin returns it to its original chronological position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Archive moves a note into a separate Archived view and Unarchive restores it to its original chronological position in the main timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Editing a note re-derives tags and links entirely from the new text: a removed token drops its tag and a newly typed tag or URL is added"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Delete requires a confirmation step: canceling keeps the note, confirming permanently removes it from the timeline and tag counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Attaching a file shows a chip with the file name and human-readable size and auto-adds a file tag to the note"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "Search filters the visible list across both note text and tag names, narrows within an active tag filter, and shows a no results message when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The timeline groups notes under Today / Yesterday / full-date headers keyed to original creation date, and editing a note does not move it to a new date group"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "The Calendar month grid marks days that have notes, filters the timeline to a clicked day's notes, clears on a second click, and navigates months via Previous and Next"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "1_29"
description = "Undo/Redo plus Apply Scenario Change model an explicit history: the History panel shows a History state region and undoing then making a different change yields a separately selectable branch that restores its exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "1_30"
description = "The note list is static or read-only markup: Send, Edit, Pin, Archive, or Delete controls do not actually mutate the collection"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.31"
name = "1_31"
description = "Editing a note accumulates tags instead of re-deriving them, so a tag removed from the text still shows as a chip"
type = "binary"
weight = 1.0
negate = true
