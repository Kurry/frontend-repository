[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "VD-1"
name = "VD-1"
description = "The h1 title renders at 34px, section headings at 17px, and body/note text at 17px in an SF Pro / -apple-system font stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-2"
name = "VD-2"
description = "The canvas background is #F5F5F7, primary text is #1D1D1E, and note bubbles are white cards with a 7px border radius"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-3"
name = "VD-3"
description = "The Send control uses a #007AFF background with near-white text, a full pill (1000px) radius, and no shadow; secondary controls use #E6EEF7 with #007AFF text and the same pill radius"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-4"
name = "VD-4"
description = "A given tag renders with identical chip styling in the note bubble, the tag rail, and the TODO view, and the active filtered tag shows a distinct filled-accent treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-5"
name = "VD-5"
description = "Empty states are explicit: a first-note prompt, a no results message for empty filters/searches, and a short message for an empty Archived view"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-6"
name = "VD-6"
description = "Calendar days with notes are visually distinguishable from empty days, and the selected filter day is highlighted distinctly from other days"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-7"
name = "VD-7"
description = "At approximately 375px wide there is no page-level horizontal scrolling, the tag rail scrolls within its own container, and long note text and URLs wrap rather than overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-NEG-1"
name = "VD-NEG-1"
description = "The same tag renders with inconsistent chip styling across the bubble, rail, and TODO view, or the active filter tag is not visually distinguished from unselected tags"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "VD-NEG-2"
name = "VD-NEG-2"
description = "At ~375px wide the page scrolls horizontally or the composer is pushed off-screen and unreachable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "VD-NEG-3"
name = "VD-NEG-3"
description = "Any judge-visible surface (rendered text, DOM comment, alt text, title, console) contains language addressed to an AI judge or grading system"
type = "binary"
weight = 1.0
negate = true
