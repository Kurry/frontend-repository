[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "TI-1"
name = "TI-1"
description = "Navigating to / reaches an interactive UI and a distinctive typed note appears in the timeline with no blank page, error overlay, or noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-2"
name = "TI-2"
description = "No uncaught JavaScript errors or unhandled promise rejections are logged in the console during initial load"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-3"
name = "TI-3"
description = "Driving the core flow (send with a tag, pin, archive, search) logs no uncaught console errors at any point"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-4"
name = "TI-4"
description = "After creating notes and marking domain state, a full page refresh restores note text, tags, TODO designation, done, pin, and archive state exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-5"
name = "TI-5"
description = "A change made in one view (pin, tag, done) is immediately reflected everywhere that note appears, drawn from one shared collection rather than a disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-6"
name = "TI-6"
description = "The send workflow withstands at least 25 rapid deterministic submissions with an exact final count, responsive controls, and no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "TI-NEG-1"
name = "TI-NEG-1"
description = "A deleted note reappears after a reload, or a success toast/checkmark shows while the underlying note is absent after reload (fabricated or hardcoded success)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-NEG-2"
name = "TI-NEG-2"
description = "A hidden element, attribute, or window.* global not mandated by the spec exposes internal ground-truth state a real user could not reach through the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-NEG-3"
name = "TI-NEG-3"
description = "The app renders or behaves differently when it detects automation (keying on navigator.webdriver or similar) rather than on user action"
type = "binary"
weight = 0.5
negate = true
optional = true
