[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_experiment_upsert_everywhere"
description = "Create flow: submitting a valid ExperimentUpsert through the designer adds a Pending library row whose name, variant titles, sample size, and Edit prefill match the submitted payload fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_upsert_inline_validation"
description = "Create flow: submitting the designer with an empty name or hypothesis, a model outside the closed enum, a temperature outside 0 to 2, or allocations not summing to 100 triggers immediate inline validation naming the field or rule, before any experiment is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_updates_row_and_panel"
description = "Edit flow: saving edits to a pending experiment updates the library row and any open panel header without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_removes_from_all_surfaces"
description = "Delete flow: a deleted experiment disappears from the library table, the selection, and any open results panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "tab_switch_retains_state"
description = "View switch: switching between the Results, Monitoring, Matrix, Analytics, and Inspector tabs retains the experiment context, applied sample-table sort, and inspector variant choice."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_library_state_visible"
description = "Edge: deleting or filtering away every visible experiment shows a clear empty state with a message and a Clear filters or create control."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_and_search_consistent"
description = "Edge: status filters and search narrow the table consistently — the row count, bulk-selection scope, and empty state all agree with the applied filters."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "panel_close_reopen_continuity"
description = "Collapsible chrome: closing the results panel and reopening the same experiment restores its tabs and content with workflow continuity."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "dialogs_and_export_import_flows"
description = "Overlays: the designer, preview playground, decision dialog, Export report panel with Copy/Download/Import, and confirmation dialogs open, complete, and cancel as expected without losing surrounding state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload"
description = "Recovery: canceling the designer mid-edit, dismissing a confirmation, or closing the panel never dead-ends the app; every flow is recoverable without a reload."
type = "binary"
weight = 1.0


[[criterion]]
id = "6.11"
name = "export_after_mutations_flow"
description = "Export after mutations: flag one outlier on a completed experiment, open Export report, and confirm statistics and flaggedResponseIds reflect the flag; decide with a rationale, reopen Export, and confirm status is decided and decision carries the choice and rationale with schemaVersion ab-experiment-report-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_flow"
description = "Import round trip: Download a contract-valid experiment-report.json after a flag and decision, reload to seeded state, Import it, and confirm decision, flags, statistics, and a fresh export reconstruct; Import of schemaVersion other than ab-experiment-report-v1 leaves state unchanged with a named-field error."
type = "binary"
weight = 1.0

