[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_experiment_appears_everywhere"
description = "Create flow: an experiment created through the designer appears in the library table with its name, variant titles, sample size, and Pending badge, and its Edit prefill matches what was entered."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_designer_inline_validation"
description = "Create flow: submitting the designer with an empty name or hypothesis, or allocations not summing to 100, triggers immediate inline validation naming the field or rule, before any experiment is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_updates_row_and_panel"
description = "Edit flow: saving edits to a pending experiment updates the library row and any open panel header without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_removes_from_all_surfaces"
description = "Delete flow: a deleted experiment disappears from the library table, the selection, and any open results panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "tab_switch_retains_state"
description = "View switch: switching between the Results, Monitoring, Matrix, Analytics, and Inspector tabs retains the experiment context, applied sample-table sort, and inspector variant choice."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "empty_library_state_visible"
description = "Edge: deleting or filtering away every visible experiment shows a clear empty state with a message and a Clear filters or create control."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_and_search_consistent"
description = "Edge: status filters and search narrow the table consistently — the row count, bulk-selection scope, and empty state all agree with the applied filters."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "panel_close_reopen_continuity"
description = "Collapsible chrome: closing the results panel and reopening the same experiment restores its tabs and content with workflow continuity."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "dialogs_support_expected_flows"
description = "Overlays: the designer, preview playground, decision dialog, and confirmation dialogs open, complete, and cancel as expected without losing surrounding state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload"
description = "Recovery: canceling the designer mid-edit, dismissing a confirmation, or closing the panel never dead-ends the app; every flow is recoverable without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Creating, editing, deleting, running, flagging, or deciding (the primary flows) are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "A newly created experiment fails to appear in the library or appears duplicated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A flag, decision, or edit is not synced across the library, panel, and export surfaces."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching results tabs breaks the layout or loses the selected experiment or variant."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying the library produces broken or missing UI instead of the designed empty state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The filtered table, its row count, and the bulk-selection scope disagree about which experiments are visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "A closed results panel cannot be reopened."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "The designer, playground, or a confirmation dialog blocks the app with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed or invalid submit gives no user feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "A navigation dead end requires a reload to recover — for example a decided experiment's locked panel with no way back to the library."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
