[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "progress_fills_continuously"
description = "During a run started from the real Run control, per-variant progress bars fill continuously, updating at least every 200 milliseconds rather than jumping in large steps"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "results_panel_slide_250ms"
description = "Clicking an experiment row slides the results panel in from the right over roughly 250 milliseconds, and closing it slides the panel out"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "chart_bars_grow_on_tab"
description = "Switching to a results tab through the real tab control grows the chart bars from zero height over roughly 400 milliseconds rather than snapping to full height"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "row_enter_exit_animation"
description = "Newly created library rows animate in and bulk-archived rows animate out through the real controls, rather than appearing or vanishing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "flag_and_stat_transitions"
description = "Flagging an outlier through the real Flag control animates the flag treatment on, and the dependent stat tiles transition to their new values rather than snapping"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.6"
name = "hover_animations_required"
description = "Buttons ease background and shadow with a slight press effect on hover; table rows, timeline entries, and inspector rows take a full-width hover wash; and form controls show focus rings"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "modal_scale_opacity_transition"
description = "The designer and decision modals enter and exit with a short opacity-plus-scale transition of roughly 200 to 300 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "toasts_slide_autodismiss"
description = "Feedback toasts after creating, deciding, promoting, archiving, and exporting slide in, remain readable long enough to scan, and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, progress jumps directly to current values, the results panel appears instantly, and modal, row, chart, and toast transitions apply instantly"
type = "binary"
weight = 1.0

