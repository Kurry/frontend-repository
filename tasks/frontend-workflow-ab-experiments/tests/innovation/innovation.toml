[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "linked_chart_highlighting"
description = "Optional polish: hovering a variant series on the grouped bar, monitoring, or matrix surfaces linked-highlights the same variant across the other results charts."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "timeline_scrub_or_jump"
description = "Optional polish: the run event timeline offers a jump-to-milestone or filter chip interaction beyond bare chronological listing."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "first_run_coachmarks"
description = "Optional polish: a short coachmark or empty-library guidance steers a new operator toward New Experiment, Run, and Export report."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_interactive_graphics"
description = "Data visualizations — the distribution strip, difference chart with confidence band, monitoring convergence chart, and radial wheels — provide extra usability beyond the minimum, such as richer tooltips, legends, or linked highlighting."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_power_user_shortcuts"
description = "Optional polish: keyboard shortcuts beyond basic tab order accelerate common actions such as opening New Experiment or Export report."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "saved_filter_presets"
description = "Optional polish: operators can save or reapply a library status-filter and search combination as a named preset."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "experiment_narrative_summary"
description = "Optional polish: the Export panel or results header includes a short plain-language narrative of winner, power, and decision beyond raw statistics."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "theme_density_toggle"
description = "Optional polish: a density or theme control beyond requirements adjusts table and chart chrome without breaking the Carbon look."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "offline_export_resilience"
description = "Optional polish: Export report and Copy remain usable if the clipboard API is unavailable, with a visible fallback such as selectable preview text."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_studio_polish"
description = "Competition-level innovation is visible: the studio feels like a real prompt-eval console rather than a thin CRUD demo, especially around run monitoring and the Experiment Report pack."
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The demo is purely spec-compliant, barebones, and unenhanced around charts, run monitoring, and Export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "Interactions and visuals are generic dashboard chrome with no experimentation-studio identity."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n3"
name = "experience_lacks_polish_guidance_story"
description = "The app has no polish, guidance, or narrative around designing, running, and exporting experiments."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n4"
name = "experience_lacks_extra_polish"
description = "The app has no extra visual or interactive polish on results charts or the Export panel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n5"
name = "interface_is_flat_and_static"
description = "The UI is flat and static with no immersion during runs or results exploration."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n6"
name = "helpful_platform_capabilities_ignored"
description = "Modern platform capabilities such as clipboard copy confirmation for the Experiment Report are ignored where they would clearly help."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n7"
name = "personalization_is_impossible"
description = "Operators cannot personalize any repeatable workflow convenience beyond the hard requirements."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n8"
name = "delightful_moments_are_absent"
description = "The app has no delightful moments during run completion, decision, or export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n9"
name = "design_has_no_twist"
description = "The design repeats a generic admin-table pattern without an experimentation twist."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n10"
name = "effort_stops_at_mvp"
description = "The app shows minimal effort beyond an MVP library table with no depth in results or export."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
