[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: form-workflow-v1, command-session-v1, entity-collection-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the form_*, session_*, entity_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_experiment_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: the designer and decision form flows, session run controls, entity operations on experiment, and the report export change the same library rows, progress bars, results panel, timeline, and prompt library the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: form validate/submit/cancel across the workflow steps experiment-designer, new-criterion-form, decision-dialog, and promote-winner-confirm with the declared fields (experiment-name, hypothesis, success-metric, minimum-sample-size, variant fields, traffic-allocation, criterion fields, pass-threshold, decision-choice, decision-rationale); session start/pause/resume/trigger_demo with the preview-run demo; entity select/toggle/delete on experiment (fields archived, outlier-flag); artifact export with the experiment-report format — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "designer_submit_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: a valid designer submit through the form tools adds exactly one Pending row and increments the visible experiment count, and a criterion added via the new-criterion-form appears in the success-metric select without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "outlier_flag_entity_operations_work"
description = "Declared entity operations on experiment all work: toggling an outlier flag recomputes the summary strip, charts, matrix cells, and radial percentages with a visible change and unflagging restores them; flagging every response of a variant yields the insufficient-data state; flag controls are disabled on decided (locked) experiments; delete requires explicit confirm=true."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "designer_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: traffic allocations must sum to exactly 100 percent with Submit disabled otherwise and no auto-redistribution on variant removal, minimum sample size stays inside 1-500, pass-threshold inside 0-100, and a confirmed decision requires a rationale before it sets status Decided and locks Edit and Flag controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "run_session_operations_match_spec"
description = "Session operations match the declared lifecycle: start fills per-variant progress bars to the sample target and flips the badge to Completed populating the results panel; pause freezes every variant's count and resume continues from exactly those counts with paused/resumed timeline entries in order."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no browse-style navigation tools (library search, status chips, Archived toggle, and results tabs are UI-only per the exclusions), variant models stay inside {Larkspur-2, Cobalt-Mini, Meridian-XL, Fernwave-1}, decision-choice inside {declare-winner, inconclusive, stop-early}, and export stays limited to the experiment-report format."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound form, session, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: search-as-you-type narrowing, progress-bar fill cadence, results-panel slide-in and chart grow-from-zero, monitoring-chart hover tooltips, header-click sorting, and undo/redo are left to real UI interaction, and downloaded report files stay Playwright territory."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "experiment_tools_missing_or_noop"
description = "WebMCP tooling for the designer, run lifecycle, outlier flags, or report export is unbound, missing, or a no-op that reports success while the library rows, results panel, or timeline stay unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_experiment_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked outlier toggle changes tool output while the summary strip, matrix cells, and radials stay stale, or a decision recorded via tools skips the rationale, the locked indicator, or the promoted prompt-library head."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_experiment_capabilities_exposed"
description = "Undeclared capabilities are exposed, such as browse/navigation tools the contract never assigns, entity create or update operations on experiment beyond select/toggle/delete, or extra export formats."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "designer_bounds_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — allocations not summing to 100 percent, a variant count outside 2-4, a model outside the four-value enum, a sample size outside 1-500, a flag toggle on a locked decided experiment, or a delete without confirm=true — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared form, session, entity, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (form-workflow-v1, command-session-v1, entity-collection-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the experiment, run, and decision state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — synthesizing progress-bar cadence, driving the library search or sort mechanics, or replaying undo/redo — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
