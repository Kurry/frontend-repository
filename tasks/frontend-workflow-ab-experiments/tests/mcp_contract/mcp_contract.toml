[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: form-workflow-v1, command-session-v1, entity-collection-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the form_*, session_*, entity_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_experiment_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: the designer and decision form flows, session run controls, entity operations on experiment, and the report export change the same library rows, progress bars, results panel, timeline, and prompt library the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: form validate/submit/cancel across the workflow steps experiment-designer, new-criterion-form, decision-dialog, and promote-winner-confirm with the declared fields (experiment-name, hypothesis, success-metric, minimum-sample-size, variant fields, traffic-allocation, criterion fields, pass-threshold, decision-choice, decision-rationale); session start/pause/resume/trigger_demo with the preview-run demo; entity select/toggle/delete on experiment (fields archived, outlier-flag); artifact export with the experiment-report format — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "designer_submit_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: a valid designer submit through the form tools adds exactly one Pending row and increments the visible experiment count, and a criterion added via the new-criterion-form appears in the success-metric select without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "outlier_flag_entity_operations_work"
description = "Declared entity operations on experiment all work: toggling an outlier flag recomputes the summary strip, charts, matrix cells, and radial percentages with a visible change and unflagging restores them; flagging every response of a variant yields the insufficient-data state; flag controls are disabled on decided (locked) experiments; delete requires explicit confirm=true."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "designer_validation_is_bound"
description = "Form validation, error, and cancel operations are clearly bound: traffic allocations must sum to exactly 100 percent with Submit disabled otherwise and no auto-redistribution on variant removal, minimum sample size stays inside 1-500, pass-threshold inside 0-100, and a confirmed decision requires a rationale before it sets status Decided and locks Edit and Flag controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "run_session_operations_match_spec"
description = "Session operations match the declared lifecycle: start fills per-variant progress bars to the sample target and flips the badge to Completed populating the results panel; pause freezes every variant's count and resume continues from exactly those counts with paused/resumed timeline entries in order."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no browse-style navigation tools (library search, status chips, Archived toggle, and results tabs are UI-only per the exclusions), variant models stay inside {Larkspur-2, Cobalt-Mini, Meridian-XL, Fernwave-1}, decision-choice inside {declare-winner, inconclusive, stop-early}, and export stays limited to the experiment-report format."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound form, session, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: search-as-you-type narrowing, progress-bar fill cadence, results-panel slide-in and chart grow-from-zero, monitoring-chart hover tooltips, header-click sorting, and undo/redo are left to real UI interaction, and downloaded report files stay Playwright territory."
type = "binary"
weight = 1.0

