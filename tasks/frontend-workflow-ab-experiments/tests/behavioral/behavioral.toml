[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seeded"
description = "Multi-facet round-trip: apply a status filter, flag one outlier in a completed experiment's inspector, sort the sample table by score delta, and create a new experiment, then reload the page. All four facets coherently reset to the seeded baseline (seeded experiments and criteria, no unseeded flags, default sort and filters) — never a mix of surviving and reset facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sample_table_sort_reversal"
description = "Sort-reversal proof: sort the sample-level table by score delta ascending, note the row order, then sort descending; the order reverses correctly relative to ascending, proving sort derives from live sample data rather than two hardcoded orders."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "flag_recomputes_derived_surfaces"
description = "Derived-view sensitivity: flag one outlier response in the inspector and confirm the p-value, per-variant means, matrix cells, and radial pass-rate percentages all visibly change; unflag it and confirm they return to their prior values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "decision_echoes_across_views"
description = "Cross-view echo: record a decision in the decision dialog and confirm the library row's status badge changes to Decided and the results panel header shows the decision and rationale, without a reload; likewise an experiment rename from the designer updates both the library row and the open panel header."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "experiment_count_delta_exact"
description = "Count-delta integrity: note the visible experiment count, create one experiment, and confirm the count increased by exactly one; then bulk-delete two selected experiments and confirm the count decreased by exactly two immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "full_pipeline_to_export_json"
description = "Full-pipeline probe: design a new experiment via ExperimentUpsert with differently configured variants, run it to completion, flag one outlier and confirm summary statistics change, declare a winner with DecisionUpsert rationale, then open Export report and confirm schemaVersion ab-experiment-report-v1, post-flag statistics, flaggedResponseIds, and the decision rationale — each stage feeding the next"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_designer_and_run"
description = "Interleaved-flow integrity: open the designer and partially fill it, leave to start a run on another pending experiment, return to the designer and complete the creation; confirm the run progressed independently and the created experiment matches what was entered, with neither flow corrupting the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "flag_all_then_restore_round_trip"
description = "Edge-state round-trip: flag every response of one variant so the summary shows the insufficient-data state, then unflag them; the summary strip, charts, matrix, and radial wheels track through both transitions back to their original values."
type = "binary"
weight = 1.0


[[criterion]]
id = "14.9"
name = "import_export_round_trip_probe"
description = "Import/export round-trip: on a completed experiment, flag one outlier and declare a winner with a rationale, Download experiment-report.json, reload to seeded state, Import that file onto the matching experiment, and confirm decision header, locked controls, flagged inspector treatment, summary statistics, and a fresh export reconstruct to match; then Import a payload with schemaVersion other than ab-experiment-report-v1 and confirm state is unchanged with a named-field error"
type = "binary"
weight = 1.0

