[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive library table and toolbar is under 2 seconds on local render."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or during design, run, flag, decide, export, and import flows."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "tab_and_filter_transitions_snappy"
description = "Results-tab switches, status-filter toggles, and sample-table sorts respond without multi-second stalls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "run_shows_loading_indicators"
description = "Simulated runs show loading affordances: inline loading on the running row, filling per-variant progress bars, and numeric sample fractions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "sample_and_inspector_lists_stay_fluid"
description = "The sample-level table and inspector list render their full simulated result sets without perceived lag, and sorting or filtering them stays immediate."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive while a run is filling progress bars and appending timeline entries, including opening Export report."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "chart_animations_maintain_frame_rate"
description = "Chart grow-from-zero, progress fill, and results-panel slide maintain smooth motion without visible frame drops during a typical run."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Quick tab switches, rapid sort clicks, and fast filter toggles do not hang or freeze the app, including while a run is in progress."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session of repeated runs, flag toggles, and export/import cycles shows no runaway memory growth that freezes the tab."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "underpowered_and_import_errors_stay_responsive"
description = "Underpowered summary state and Import validation errors render without blocking the library or other tabs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before the library table and toolbar are interactive on local render."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during design, run, export, or import flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Results-tab switches or filter toggles block or lag for multiple seconds."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "A simulated run freezes the UI so pause, tabs, or Export cannot be used while progress bars should be filling."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Opening the sample table or inspector for a completed experiment kills interactivity or drops frames badly."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during progress-bar fill or results-panel slide animation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while assembling the Export report JSON preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory or CPU runaway occurs after several run and export cycles."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed while a run is collecting samples — no progress bars, fractions, or loading indicator."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid tab switches, sort clicks, or repeated Import of invalid JSON."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
