[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive library table and toolbar is under 2 seconds on local render."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or during design, run, flag, decide, export, and import flows."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "tab_and_filter_transitions_snappy"
description = "Results-tab switches, status-filter toggles, and sample-table sorts respond without multi-second stalls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "run_shows_loading_indicators"
description = "Simulated runs show loading affordances: inline loading on the running row, filling per-variant progress bars, and numeric sample fractions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "sample_and_inspector_lists_stay_fluid"
description = "The sample-level table and inspector list render their full simulated result sets without perceived lag, and sorting or filtering them stays immediate."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive while a run is filling progress bars and appending timeline entries, including opening Export report."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "chart_animations_maintain_frame_rate"
description = "Chart grow-from-zero, progress fill, and results-panel slide maintain smooth motion without visible frame drops during a typical run."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Quick tab switches, rapid sort clicks, and fast filter toggles do not hang or freeze the app, including while a run is in progress."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "underpowered_and_import_errors_stay_responsive"
description = "Underpowered summary state and Import validation errors render without blocking the library or other tabs."
type = "binary"
weight = 1.0

