[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared state: advancing samples updates the progress bars, event timeline, and monitoring chart together; flagging an outlier updates the summary strip, charts, matrix, radial wheels, and Export report JSON together; and an experiment edit, archive, decision, or Import is reflected in every view where it appears, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after creating, editing, running, pausing, flagging, deciding, archiving, exporting, and importing, and a page reload returns the app to its seeded state (seeded experiments and criteria, default view, no unseeded decisions or flags)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean"
description = "The console is free of errors and warnings on first load and stays clean while designing, previewing, running, pausing, flagging, deciding, undoing, archiving, exporting, importing, and switching tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "cold_load_interactive_2s"
description = "The app is interactive (library table and toolbar controls respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "responsive_during_run"
description = "While a run is filling progress bars, the UI stays responsive under rapid repeated input — quick tab switches, rapid sort clicks, fast filter toggles — with no hangs, dropped interactions, or views showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "statistics_react_to_data"
description = "The p-value, confidence interval, win rate, matrix values, and Export report statistics object are computed from the current sample data excluding flagged outliers: flagging outliers or completing additional samples changes them, and the same quantities agree wherever they are shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "keyboard_operability_focus"
description = "Every interactive control — table rows and headers, filters, bulk actions, designer fields and allocation sliders, tabs, flag controls, pause/resume, undo/redo, export, copy, and import — is reachable and operable with the keyboard alone (Tab/Shift+Tab, Enter/Space, arrow keys on sliders), with a visible focus indicator at each stop"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "modal_focus_trap_escape"
description = "The designer, decision, and confirmation modals trap keyboard focus while open, close on the Escape key, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "aria_live_announcements"
description = "Run completion, a decision being recorded, and the significance verdict activating are announced through an aria-live region in addition to their visual indication"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "labels_slider_values_errors"
description = "Form fields in the designer, criterion form, and decision dialog have visible labels, the allocation sliders expose their current value to assistive technology, and each validation message names the field or rule it belongs to and renders in association with it"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "fictional_model_names_only"
description = "Every model name rendered anywhere in the UI is fictional; no real AI provider or model brand names appear"
type = "binary"
weight = 1.0


[[criterion]]
id = "2.14"
name = "export_import_end_state_contract"
description = "Export produces schema-valid Experiment Report JSON with schemaVersion ab-experiment-report-v1 reflecting session flags and decisions, and Import of a contract-valid report restores decision and flags while contract-invalid import refuses partial mutation — the good-app end state without browser storage"
type = "binary"
weight = 1.0

