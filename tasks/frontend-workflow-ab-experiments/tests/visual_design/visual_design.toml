[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "library_and_slide_panel_layout"
description = "The experiment library table fills the main area and opening an experiment slides a results panel in from the right containing the Results, Monitoring, Matrix, Analytics, and Inspector tabs, while the designer, decision, and Export report dialogs render as modal or panel overlays"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "status_tag_color_mapping"
description = "The library table shows columns name, variants, sample size, status, started, and actions in that order, and status badges use tag treatments of gray for pending, blue for running, teal for paused, green for completed, purple for decided, and a muted treatment for archived"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "consistent_variant_series_colors"
description = "The first variant renders in the brand accent and each additional variant in a distinct supporting accent, with the same variant-to-color mapping used across the grouped bar chart, distribution strip, difference chart, monitoring chart, and matrix highlights"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "summary_strip_badge_treatments"
description = "The summary strip renders as a horizontal row of four labeled stat tiles where the winner badge is green when significant, yellow with the Not significant label when not, gray for Tie, and the Underpowered state uses a neutral informational treatment that is never green or yellow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "confidence_band_translucent_fill"
description = "The difference chart's 95 percent confidence band renders as a translucent fill around the delta line, visually distinct from the line itself"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "radial_wheels_consistent"
description = "Each radial criterion wheel shows its pass percentage in the ring center with the ring fill proportional to the value, and rings for different criteria are visually consistent in size and stroke"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_and_spacing_rhythm"
description = "Typography shows a clear hierarchy (app title larger than panel and tab headings, which are larger than table body and label text) and gaps between the table, panel, chart blocks, and stat tiles follow a visually regular rhythm with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "control_states_and_icon_set"
description = "Buttons, inputs, selects, sliders, and toggles show distinct default, hover, focus (visible ring), disabled, and error treatments, and one consistent icon set is used across the toolbar, row actions, tabs, and flag controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "responsive_panel_and_containers"
description = "At widths of 768 pixels and below the results panel opens full-width over the library with a visible back control while desktop widths show it alongside, and at 375 pixel width no content clips or overflows the viewport, no page-level horizontal scrolling appears, and the library table, matrix, and sample table scroll within their own containers"
type = "binary"
weight = 1.0

