[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_studio_rhythm"
description = "Gaps between the library table, results panel, chart blocks, summary tiles, and Export panel follow a visually regular spacing rhythm with no crowded or orphaned regions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_studio_hierarchy"
description = "Typography matches the instruction hierarchy: app title larger than panel and tab headings, which are larger than table body and label text, including Export panel headings."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_library_and_panel_spec"
description = "Layout matches the specified library-plus-sliding-results-panel composition with modal designer and decision dialogs, within a small tolerance at desktop and 768px breakpoints."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions apply to the state changes the spec calls out: results panel slide-in, progress fill, chart bar growth, row enter/exit, modal transitions, and flag/stat updates."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Responsive behavior matches the spec: full-width results panel with back control at 768px and below, alongside panel on desktop, and no page-level horizontal scroll at 375px."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_carbon_chrome"
description = "Buttons, inputs, selects, sliders, tags, and tiles show distinct default, hover, focus, disabled, and error treatments consistent with the studio chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography has a clear hierarchy that distinguishes the app title, results tab labels, summary tile labels, and table body text."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states match the spec, including disabled Submit while allocations do not sum to 100, locked Edit/Flag after a decision, and disabled Undo/Redo when the stacks are empty."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Status badge colors (gray pending, blue running, teal paused, green completed, purple decided, muted archived), winner-badge treatments, and confidence-band translucent fill match the specified surface treatments."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover wash on table/timeline/inspector rows, button press easing, and toast slide/auto-dismiss follow the specified microinteraction feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing between the library, panel, charts, and Export surfaces is irregular or cramped relative to the specified rhythm."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Status badges or winner verdict colors fall outside the specified pending/running/paused/completed/decided/archived and green/yellow/gray mappings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Summary tiles, chart blocks, or Export preview sizing mismatches the specified dense analytics layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required panel slide, progress fill, chart growth, or modal transitions are missing or incorrect."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Form or button controls use unstyled browser defaults when the studio styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The library-versus-panel grid is misaligned at desktop or 768px breakpoints."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Library cells, summary tiles, or Export JSON text render clipped or off-screen at the specified widths."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order or tab structure of Results/Monitoring/Matrix/Analytics/Inspector/Export deviates from the specified studio structure."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text have no distinction across the library and results panel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover wash, toast motion, or button press feedback is missing where the spec requires it."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
