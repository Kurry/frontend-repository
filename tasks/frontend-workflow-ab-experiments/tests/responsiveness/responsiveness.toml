[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "Layout adapts gracefully from 1440px desktop to 375px mobile: the library table, results panel, charts, summary tiles, and Export panel reflow without breakage."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "Row actions, tabs, Flag outlier, pause/resume, Export, Copy, Download, and Import are tap targets at least 44px on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "App title, panel headings, table body, and summary tile labels resize readably between mobile and desktop."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "No content clips or overflows the viewport at any width; the matrix, sample table, and Export JSON preview scroll within their own containers."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "panel_fullwidth_with_back"
description = "At widths of 768 pixels and below the results panel opens full-width over the library with a visible back control returning to the table; at desktop widths it opens alongside."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "Summary strip tiles, chart blocks, and matrix columns stack logically at narrow widths without overlapping the library controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "Tap targets for filters, tabs, Flag outlier, and Export controls work on a touch-width viewport where present."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375 pixel width no page-level horizontal scrolling appears for the library, results tabs, or Export panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_resize_responsively"
description = "The grouped bar, distribution, difference, monitoring, and radial charts resize responsively to fit their containers at every width."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Header Undo/Redo and Export controls remain reachable on mobile without being covered by the full-width results panel back control."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "Layout breaks or overflows at 1440px, 768px, or 375px for the library, results panel, or Export JSON preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small_or_misaligned"
description = "Row actions, tabs, or Export controls are too small or misaligned on mobile."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_too_small_on_devices"
description = "Summary tile or chart-axis text is too small to read at 375px width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_or_unnecessary_scrollbars"
description = "Matrix, sample table, or Export preview content is cropped or forces page-level horizontal scrollbars."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = "At 768px and below the results panel stays beside the library as a side panel with no full-width overlay and no back control returning to the table."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed header controls obscure the library table or Export panel content."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Summary tiles and charts overlap at some viewport size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_mobile_touch_actions_missing"
description = "Required tap actions for filters, tabs, or Flag outlier are unavailable on a touch-width viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "Charts use a static size and overflow their container or the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Undo/Redo, Export, or Import controls disappear at specific sizes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
