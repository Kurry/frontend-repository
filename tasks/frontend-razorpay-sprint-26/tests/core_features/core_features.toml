[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load of /sprint/26 a full-viewport black preloader (#site-loader) with the Razorpay Sprint logo and a #305eff progress bar appears, then exits upward and is removed within about 10 seconds, leaving the page settled with no loader overlay remaining."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "The fixed segment nav shows all six labels in order: 01.AGENTIC STACK, 02.INTERNATIONAL PAYMENTS, 03.PAYMENT GATEWAY, 04.D2C, 05.MARKETING, 06.BUSINESS BANKING, with hairline dividers between segments."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "The Three.js hero shows the billboard copy SPRINT 26 / 100+ LAUNCHES & UPDATES, a bottom-center pill reading SCROLL TO SEE 100+ UPDATES, and a top-left white Razorpay / SPRINT '26 brand mark over the WebGL canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "Clicking the 01.AGENTIC STACK segment nav link scrolls #agentic-stack into view; clicking each of the six links (#agentic-stack, #international, #payment-gateway, #D2C, #Marketers, #finance) scrolls that section in and marks its nav cell active."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "The clicked/active segment nav cell renders with the electric-blue #0039ff (rgb(0,57,255)) background, and scrolling updates a scroll-spy active indicator using #305eff."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "Hovering the vertical GET ACCESS rail transitions its background to #305eff; the rail link points at the Typeform signup and opens in a new tab (target _blank)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "Clicking an executive play control opens the full-viewport video modal playing a local MP4 and locks body scroll (document.body overflow hidden) while it is open; closing it unlocks scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "A feature card shows a lazily hydrated Rive canvas visual (for example the Subscription Recovery Agent card) that mounts a canvas as it scrolls into view."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "The word-reveal heading THE AGENTIC ERA is split into the words THE, AGENTIC, and ERA that reveal in sequence as it scrolls into view."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "Executive quotes render verbatim, including Prabu Ram, SVP, Engineering and the quote 'This shift will redefine commerce as we know it. Not because payments got faster. But because it got intelligent.'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "Resizing to 390px wide swaps the desktop segment nav for a hamburger menu whose Roman-numeral labels read I.AGENTIC STACK through VI.BUSINESS BANKING, and disables the stacked-section overlap."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "The footer shows Copyright © Razorpay FTX26, the copy AI-native fintech. / Built from India. For the world., Instagram and LinkedIn links, and a /SPRINT'26 word-mark."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "Using browser_network_requests, every request the page makes is same-origin with http://127.0.0.1:3000 or a data:/blob: URL: zero external CDN requests for fonts, scripts, images, video, GLB, Draco, or CSS."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "The document title is exactly 'Razorpay Sprint 2026: The Age of AI-Native Payments', the page produces no uncaught console errors, and no asset request fails (no 4xx/5xx or net::ERR)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Loading /sprint/26 shows the full-viewport black #site-loader preloader, which then exits and is removed, leaving the header, nav, and hero settled in their final positions with no loader overlay remaining."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The fixed segment nav renders all six labels in order: 01.AGENTIC STACK, 02.INTERNATIONAL PAYMENTS, 03.PAYMENT GATEWAY, 04.D2C, 05.MARKETING, 06.BUSINESS BANKING."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Clicking each segment nav link with the real nav control (#agentic-stack, #international, #payment-gateway, #D2C, #Marketers, #finance) scrolls that section into view and marks its nav cell active."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "The Three.js hero shows the billboard SPRINT 26 / 100+ LAUNCHES & UPDATES and a bottom-center pill reading SCROLL TO SEE 100+ UPDATES over the WebGL canvas."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Clicking an executive play control with the real UI control opens a full-viewport video modal that plays a local MP4."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "The six stacked sections each pair an executive portrait, name, role, and pull quote with a feature-card grid; quotes appear verbatim including Prabu Ram, SVP, Engineering 'This shift will redefine commerce as we know it. Not because payments got faster. But because it got intelligent.'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Feature card names appear verbatim within their sections, for example Payments on In-App Chats, Voice Payments, Localised Checkout, Biometric Card Authentication, Quick Buy 2.0, and AI-powered Multi-Bank Routing."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "The persistent vertical GET ACCESS rail links to the Typeform signup and opens in a new tab (target _blank, rel noopener noreferrer)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "The Agentic Stack section opens with an Agentic Stack watermark and runs its five sub-bands in order: 01/A Agentic Payments, 01/B Agentic Platform, 01/C Agent Studio, 01/D Payment for Builders, 01/E Agentic Business Banking."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.24"
name = "1_24"
description = "Scrolling the page updates a scroll-spy that highlights the nav cell for whichever section is currently in view, without a click."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.25"
name = "1_25"
description = "Clicking a segment nav link or play control leads to an application-error or Not found page, or no video modal opens because the play control is missing or inert."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "The rendered copy invents section, feature, or quote text that does not appear in the PRD (for example a fabricated executive name or feature card not listed in the content requirements)."
type = "binary"
weight = 1.0
negate = true
