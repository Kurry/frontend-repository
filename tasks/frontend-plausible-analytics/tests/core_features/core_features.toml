[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the root URL shows the analytics dashboard (metric tiles, a Visitors chart, and Top Sources / Top Pages / Countries panels) with no login, signup, SSO, or invite gate"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the four metric tiles read exactly Unique visitors 16,840, Total pageviews 47,220, Bounce rate 44%, Visit duration 98s"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, Top Sources shows Google 7,200, Direct 4,800, Twitter 1,600, Newsletter 980; Top Pages shows / 12,800, /pricing 5,600, /blog 3,900, /docs 2,800; Countries shows United States 6,400, United Kingdom 2,400, Germany 1,900, Canada 1,200"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "On load, the Visitors chart renders one bar per time bucket (ten bars for Last 30 days) rising left to right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After clicking the Google row in Top Sources, a filter pill reading Source: Google appears and the metric tiles change from the unfiltered values to the Google segment (Unique visitors 7,200)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After applying the Google source filter, the Top Pages and Countries panels recompute to different row values than the unfiltered view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After clicking a Countries row while a source filter is active, only one filter pill is shown (the latest, Country-dimension) rather than two stacked filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After clicking Clear filter, the metric tiles return to 16,840 / 47,220 / 44% / 98s and no filter pill remains"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After changing the date range to Last 7 days, the metric tiles and the trend chart recompute (fewer bars) with no leftover rows from the previous range"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After changing the site to shop.example.com, the metric tiles and all three breakdown panels update together and any active filter pill is cleared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After changing the sort to Name A-Z, the rows in the breakdown panels reorder alphabetically"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When a breakdown row is reached by keyboard focus, it shows a visible focus indicator, and pressing Enter or Space applies its filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After applying a filter and reloading the page, the filter pill and its recomputed metric tiles are restored from client storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When the theme toggle is used, every surface, text color, and the chart bars recolor between the light and dark themes and remain legible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "On load, the root URL shows the analytics dashboard (metric tiles, Visitors chart, and Top Sources / Top Pages / Countries panels) with no login, signup, SSO, or invite gate"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "On load, the four metric tiles read exactly Unique visitors 16,840, Total pageviews 47,220, Bounce rate 44%, Visit duration 98s"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "On load, Top Sources, Top Pages, and Countries show the exact seeded top-four rows (Google 7,200 / Direct 4,800 / Twitter 1,600 / Newsletter 980; / 12,800 / /pricing 5,600 / /blog 3,900 / /docs 2,800; United States 6,400 / United Kingdom 2,400 / Germany 1,900 / Canada 1,200)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "On load, the Visitors chart renders one bar per time bucket (ten bars for Last 30 days) rising left to right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "After clicking the Google row in Top Sources, a Source: Google filter pill appears and the metric tiles change to the Google segment (Unique visitors 7,200)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "After applying the Google source filter, the Top Pages and Countries panels recompute to different row values than the unfiltered view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "After clicking a Countries row while a source filter is active, only one (latest) filter pill is shown rather than two stacked filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "After clicking Clear filter, the metric tiles return to 16,840 / 47,220 / 44% / 98s and no filter pill remains"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "After changing the date range to Last 7 days, the metric tiles and trend chart recompute (fewer bars) with no leftover rows from the previous range"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "After changing the site to shop.example.com, the metric tiles and all three panels update together and any active filter pill is cleared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "After changing the sort to Name A-Z, the breakdown panel rows reorder alphabetically"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "1_26"
description = "When a breakdown row is reached by keyboard focus it shows a visible focus indicator, and pressing Enter or Space applies its filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The metric tiles for a filtered segment are computed from the seed and differ across segments (e.g. Direct differs from Google), not a single hardcoded set of numbers reused for every filter"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "1_28"
description = "Selecting a breakdown row does not leave the previous segment's numbers or a stale second pill in place after the view recomputes"
type = "binary"
weight = 1.0
negate = true
