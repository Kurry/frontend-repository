[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "At desktop width the layout is a single analytics dashboard with top metric tiles, a dominant trend chart, and sources/pages/countries panels rather than a login-centered or marketing layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The summary metrics and the visitors trend are the primary visual focus: large bold numbers over muted labels and a full-width chart card taller than the panels below"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The active filter state is distinguished by a visible pill reading Dimension: value, with the accent hue used for the pill, active row, and focus ring over an otherwise neutral palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Body text meets AA contrast (at least 4.5:1) against its surface in both the light and the dark theme, and every legible pairing stays legible after the theme switch"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The document title is descriptive (names the app and current site) and the root html element carries a valid lang attribute, not a scaffold placeholder"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "UI labels, headings, buttons, and counts use sentence case and numerals, with short labels carrying no terminal period"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "At mobile width the metric tiles, chart, and panels reflow into a single stacked column that preserves the metrics-then-chart-then-panels hierarchy with no region clipped or horizontally scrolled"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "Prose or paragraph content, if any, does not stretch edge to edge on a wide viewport; content stays within a bounded readable max width"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "The active (filtered) row and the filter state are not conveyed by color alone; a pill text and row emphasis mark the state without relying on hue"
type = "binary"
weight = 1.0
negate = true
