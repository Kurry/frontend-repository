[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "no_contract_declared_ui_complete"
description = "This task declares no WebMCP action contract. Every state-changing feature — dataset creation, row CRUD, import, verification, thresholds, merge, pivot, snapshots, splits, bulk actions, undo/redo, export, attach — is fully drivable through the visible UI controls alone, with no functionality gated behind a hidden automation interface"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "graceful_absence_of_tooling"
description = "If WebMCP endpoints (webmcp_session_info, webmcp_list_tools, webmcp_invoke_tool) are absent or empty, the app itself remains fully functional — nothing in the product depends on automation tooling being present"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "undeclared_automation_mutates_state"
description = "The page exposes undeclared automation globals or hidden endpoints that mutate application state outside the visible UI command paths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "automation_bypasses_validation"
description = "Some exposed programmatic path creates or mutates data while bypassing the validation the visible forms enforce, leaving UI and state inconsistent"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app deviates from its automation posture (no declared contract; UI-drivable state only) in a significant, browser-observable way that is NOT covered by any other criterion in this file. If present, name the deviation and cite the concrete evidence (global, endpoint, element) that demonstrates it. If the deviation is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
