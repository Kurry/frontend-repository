[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: entity-collection-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the entity_*, form_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_dataset_grid_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: entity operations on dataset-row, form flows for dataset setup and import, the duplicate-scan session, and artifact import/export change the same grid, sidebar counts, pivot, capacity gauge, and export tabs the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: entity create/select/update/delete/toggle on dataset-row (fields including schema-field-values, expected-output, verified, split, bulk-selection, unverified-only-filter, merge-surviving-values, dismiss-duplicate-group, pivot buckets, pivot-aggregation, snapshot-selection, eval-suite-attachment); form validate/submit/cancel/reset/advance/return over the declared fields with workflow steps import-source, import-mapping, import-diagnostics, import-commit; session start plus the duplicate-scan demo; artifact import/export/copy with import modes sample-csv-fixture and pasted-csv and export formats rows-csv and dataset-card-text — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "import_commit_shows_declared_postconditions"
description = "The contract can be fully exercised via automation: an import committed through the form workflow raises the sidebar row count by exactly the included row count, shows the rows in the grid, grows the capacity gauge, and changes the pivot and both export tabs."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "dataset_row_entity_operations_work"
description = "Declared entity operations on dataset-row all work: an invoked numeric cell update recomputes the formula result, adds or clears threshold flags across the cap, updates the dataset card stats, and appears as a changed cell in a snapshot diff; toggling verified updates the Verified badge immediately, and the unverified-only filter hides and restores rows without mutating data."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_validation_enforced_at_every_entry_point"
description = "Form validation, error, and cancel operations are clearly bound: cell commits validate against the dataset's record contract everywhere rows enter (grid inline edit, Add Row, Edit Row, import diagnostics), split percentages must sum to 100, and all three threshold-rule fields are required."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "duplicate_scan_and_split_match_spec"
description = "The duplicate-scan session advances scanning-rows, grouping-matches, and done stages and lists the seeded groups; merging one shrinks the row count by group size minus one and a re-scan omits it; applying a valid split labels every row with the proportion bar matching the grid's split column."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: WebMCP import uses only the seeded fixture or pasted-CSV modes and never carries raw file bytes, formulas stay inside SUM/AVERAGE/MIN/MAX/COUNT, and row, bulk, and dataset deletes require confirm=true."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound entity, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: the file picker and CSV dropzone, virtualized-grid scrolling, the pivot chip drag gesture (bucket assignment as state goes through the pivot bindings), and undo/redo and inline-cell keyboard mechanics are left to real UI interaction."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "dataset_tools_missing_or_noop"
description = "WebMCP tooling for dataset rows, import workflow, duplicate scan, or export is unbound, missing, or a no-op that reports success while the grid, sidebar counts, or export tabs stay unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_grid_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked cell update changes tool output while the visible grid cell, formula result, and dataset card stats stay stale, or a merge reports success without shrinking the visible row count."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_import_or_setter_capabilities"
description = "Undeclared capabilities are exposed, such as raw file bytes or filesystem paths in import arguments, export formats beyond rows-csv and dataset-card-text, or a generic state setter that patches rows outside the record contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "record_contract_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — a category field without an allowed-values list, split percentages not summing to 100, a threshold comparator outside {above, below}, a pivot aggregation outside {count, sum, average}, or a delete without confirm=true — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared entity, form, session, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (entity-collection-v1, form-workflow-v1, command-session-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the grid, import, and scan state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — replaying the pivot chip drag gesture, driving undo/redo, or returning export Copy clipboard contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
