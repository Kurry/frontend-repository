[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_reset"
description = "Multi-facet round-trip: enable Show unverified only, apply a split, add a threshold rule, and create a row, then reload the page. All facets coherently reset to the seeded baseline — the seeded datasets and counts, seeded rules and snapshots only, default view, empty undo history — never a mix of surviving and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "import_pipeline_full_track"
description = "Full import pipeline probe: note the sidebar row count, capacity figures, a pivot summary value, and the export Rows CSV line count; run the wizard from a seeded sample CSV through mapping, fix at least one flagged diagnostic cell, exclude one row, and commit. The sidebar count rises by exactly the included row count, the imported rows are findable in the grid, the capacity gauge grows, the pivot summaries change, and both export tabs (Rows CSV and Dataset Package JSON) change"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "edit_ripple_track"
description = "Edit ripple probe: display a formula result over a numeric column, snapshot the dataset, then edit one cell in that column across a threshold cap. The formula result changes to the correct new value, the row's flag state updates, Dataset Package JSON stats for that column change, and a diff of a new snapshot against the earlier one shows exactly that cell changed"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "merge_count_delta_exact"
description = "Count-delta integrity: note the row count, merge a duplicate group of size k, and confirm the count decreased by exactly k minus 1 with the group gone from a re-run scan"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: two different formulas over two different columns show different results, and two different split percentage sets produce visibly different proportion bars and stratification counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "undo_redo_round_trip"
description = "Undo integrity: apply a bulk Mark verified to several rows, undo once, and confirm every affected row and the Verified badge return to their exact prior values; redo reapplies them exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start the import wizard, leave it at the mapping step to edit a grid cell, then return and complete the wizard; both the cell edit and the committed import land correctly with neither flow corrupting the other"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: drive a small dataset to empty (counts, gauge, and badges track to zero and the empty state shows), then repopulate via Add Row or import; all derived surfaces track back up"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "pivot_identical_after_data_change"
description = "The pivot table renders identical summary values after an edit, import, or merge that changed the data it aggregates"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_missing_session_edits"
description = "The export Rows CSV tab or Dataset Package JSON omits rows or edits made during the session — the exported text reflects the seeded data rather than the live state, or required keys schemaVersion/dataset/stats are missing"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.9"
name = "package_export_import_round_trip"
description = "Package round-trip probe: add a row with a distinctive expectedOutput token, toggle it verified, save a uniquely named snapshot, export Dataset Package JSON showing schemaVersion dataset-manager.package/v1 with that token and snapshot name, edit another cell so live state differs, Import the earlier package, and confirm the grid, verified badge, snapshot list, and a fresh export match the imported package"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Two different formulas, two different split configurations, or two different imports yield byte-identical displayed output"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_surface_state_is_stale"
description = "A change appears in the grid but a derived surface (badge, gauge, stratification, formula result) stays stale until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
