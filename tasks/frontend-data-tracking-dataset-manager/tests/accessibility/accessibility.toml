[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_reaches_everything"
description = "Sidebar entries, toolbar controls, grid cells and row actions, wizard steps, panel forms, and tray actions are all reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "cell_keyboard_editing"
description = "A focused grid cell opens its inline editor with Enter and cancels with Escape, entirely from the keyboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "modals_manage_focus"
description = "Modals and the export drawer trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "live_region_announcements"
description = "Import commit completion, bulk apply results, and merge completion are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Every form field across New Dataset, Add Row, thresholds, splits, the wizard, and Import package has a visible label, and validation messages are programmatically associated with their fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Page and panel headings follow a logical order with no skipped levels"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.7"
name = "state_not_color_only"
description = "Verified, flagged, split, and diff states are conveyed by icon or text in addition to color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "All text and controls — including badge text, flagged cells, and diff treatments — keep sufficient color contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "The app uses semantic structure: real buttons for actions, a table or grid role for the data grid, and landmark regions for sidebar and main content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, batch animations, slides, and gauge transitions are replaced by instant changes while all functionality remains"
type = "binary"
weight = 1.0

