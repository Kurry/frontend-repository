[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "The layout adapts gracefully from 1440 pixel desktop to 375 pixel mobile: sidebar, toolbar, grid, and panels reflow without breakage"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "sidebar_collapses_behind_toggle"
description = "At widths of 768 pixels and below the sidebar collapses behind a toggle control that opens it as an overlay; at desktop widths it is open by default"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Headings, grid text, and labels remain readable at both desktop and 375 pixel widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "wide_surfaces_scroll_in_containers"
description = "The grid, the mapping table, and the snapshot diff scroll horizontally within their own containers at narrow widths rather than widening the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths the toolbar, panels, and tray stack in a logical order with the primary grid content reachable first"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_tap_targets_are_large_enough"
description = "Row actions, toggles, and tray controls present tap targets of at least 44 pixels at mobile widths"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.8"
name = "overlays_fit_small_screens"
description = "Modals, the import wizard, and the export drawer fit within a 375 pixel viewport with their controls reachable and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "gauge_and_bar_resize"
description = "The capacity gauge and the split proportion bar resize to their containers rather than overflowing at any width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "The bulk tray and toolbar remain visible and operable at every width without covering the content they act on"
type = "binary"
weight = 1.0

