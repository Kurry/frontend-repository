[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "layout_composition"
description = "The layout matches the spec: a left sidebar with the dataset list above the instrumentation panel, a main area with a toolbar (import, export, pivot toggle, undo/redo, formula bar) above the grid, and side panels for thresholds, splits, and snapshots reachable from the toolbar"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "selected_vs_hover_sidebar"
description = "The active dataset entry uses a visibly selected layer background distinct from the hover wash, and inactive entries show the hover wash only while hovered (verified with the pointer actually hovering)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "verified_iconography"
description = "Verified rows show a checkmark icon in the success color and unverified rows show a dash icon in the secondary text color, distinguishable by icon shape and not color alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "flag_and_diagnostic_treatments"
description = "Threshold-flagged cells carry a warning-tinted background with a row flag icon, and diagnostic-step problem cells use the error color with the problem message adjacent to the cell"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "diff_color_language"
description = "In the snapshot diff, added rows carry a green-tinted treatment, removed rows a red-tinted treatment, and changed cells show old and new values with the old value struck through"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "mapping_table_anatomy"
description = "The import mapping step renders as a table with one assignment select per CSV column row, and header-matched columns show their assignment pre-selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "dense_legible_grid"
description = "The grid keeps a fixed header row, consistent row heights, right-aligned numeric cells, and column headers visually distinct from data cells"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "typography_hierarchy"
description = "Typography shows a clear hierarchy — app title larger than panel headings, which are larger than grid body and label text — consistent across the grid, pivot, and panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "spacing_rhythm"
description = "Spacing between the sidebar, toolbar, grid, and panels follows a visually regular rhythm with no crowded or orphaned regions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "control_state_treatments"
description = "Buttons, inputs, selects, and toggles show distinct default, hover, focus (visible ring), disabled, and error treatments, checked through the real pointer and keyboard states"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "consistent_icon_set"
description = "One consistent icon set is used across the toolbar, sidebar, row actions, and status indicators, with no mixed icon styles"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.12"
name = "export_drawer_anatomy"
description = "The export drawer shows tabs labeled Rows CSV and Dataset Package JSON, a monospaced preview block, and Copy, Download, and Import package actions"
type = "binary"
weight = 1.0

