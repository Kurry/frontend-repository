[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "10.1"
name = "serves_cleanly"
description = "The app serves from its documented start path on port 3000 and renders the seeded workspace with no console errors or unhandled promise rejections on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.2"
name = "shared_state_coherence"
description = "A change made in one surface is immediately reflected in every other surface showing or deriving from that data without a reload: a cell edit updates the formula result, threshold flags, pivot summaries, dataset card stats, and capacity figures wherever they are visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.3"
name = "storage_stays_empty"
description = "After a full exercise of the app (create, import, edit, merge, split, export), localStorage and sessionStorage are both empty and no other browser storage API holds app data"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.4"
name = "reload_resets_to_seed"
description = "A page reload returns the app to its seeded baseline: the seeded datasets and row counts, seeded snapshots and threshold rules only, empty undo history, and the default view"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.5"
name = "console_clean_during_flows"
description = "No console errors or unhandled rejections appear while exercising the import wizard, inline editing, dedup scan and merge, pivot, snapshots and diff, splits, bulk tray, undo/redo, and export"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.6"
name = "same_origin_only"
description = "Only same-origin requests appear in the network log during load and a full exercise — no CDN, font, icon, analytics, or API calls to other origins"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.7"
name = "rapid_input_stays_coherent"
description = "Rapid interaction — fast verified toggles across rows, quick undo/redo sequences, rapid dataset switches — leaves all derived counts (sidebar, badges, gauge) consistent with the grid contents"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.8"
name = "forms_validate_before_mutation"
description = "Every form (New Dataset, Add Row, threshold rule, splits, snapshot name, attach) shows inline per-field validation before submit and an invalid submit never mutates the collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.9"
name = "no_debug_artifacts"
description = "The running app shows no debug overlays, placeholder scaffolding, or console.log spam during normal use"
type = "binary"
weight = 0.5

[[criterion]]
id = "10.n1"
name = "browser_storage_used"
description = "localStorage, sessionStorage, or another browser storage API is non-empty after exercising the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "10.n2"
name = "outbound_requests_present"
description = "The network log shows outbound requests to other origins for scripts, fonts, icons, styles, or data during load or use"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "10.n3"
name = "views_desync"
description = "The same datum shows different values in two places (for example the sidebar row count disagreeing with the grid, or the Verified badge disagreeing with the visible checkmarks) without a reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "10.n4"
name = "chrome_navigates_away"
description = "An app-chrome link or control navigates the browser away from the app's origin"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, network entry) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
