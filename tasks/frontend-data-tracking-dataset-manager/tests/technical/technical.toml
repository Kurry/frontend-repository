[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "10.1"
name = "serves_cleanly"
description = "The app serves from its documented start path on port 3000 and renders the seeded workspace with no console errors or unhandled promise rejections on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.2"
name = "shared_state_coherence"
description = "A change made in one surface is immediately reflected in every other surface showing or deriving from that data without a reload: a cell edit updates the formula result, threshold flags, pivot summaries, Dataset Package JSON stats, and capacity figures wherever they are visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.3"
name = "storage_stays_empty"
description = "After a full exercise of the app (create, CSV import, package export/import, edit, merge, split), localStorage and sessionStorage are both empty and no other browser storage API holds app data"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.4"
name = "reload_resets_to_seed"
description = "A page reload returns the app to its seeded baseline: the seeded datasets and row counts, seeded snapshots and threshold rules only, empty undo history, and the default view"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.5"
name = "console_clean_during_flows"
description = "No console errors or unhandled rejections appear while exercising the import wizard, inline editing, dedup scan and merge, pivot, snapshots and diff, splits, bulk tray, undo/redo, Dataset Package JSON export, and Import package"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.6"
name = "same_origin_only"
description = "Only same-origin requests appear in the network log during load and a full exercise — no CDN, font, icon, analytics, or API calls to other origins"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.7"
name = "rapid_input_stays_coherent"
description = "Rapid interaction — fast verified toggles across rows, quick undo/redo sequences, rapid dataset switches — leaves all derived counts (sidebar, badges, gauge) consistent with the grid contents"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.8"
name = "forms_validate_before_mutation"
description = "Every form (New Dataset, Add Row, threshold rule, splits, snapshot name, attach, Import package) shows inline per-field validation before submit and an invalid submit never mutates the collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "10.9"
name = "no_debug_artifacts"
description = "The running app shows no debug overlays, placeholder scaffolding, or console.log spam during normal use"
type = "binary"
weight = 0.5

[[criterion]]
id = "10.10"
name = "package_export_matches_live_store"
description = "After a cell edit, verified toggle, and snapshot save, reopening Export shows Dataset Package JSON whose dataset.rows, stats.verifiedCount, and dataset.snapshots match the live UI under schemaVersion dataset-manager.package/v1"
type = "binary"
weight = 1.0

