[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Creating a dataset via New Dataset and then adding a row via Add Row updates every surface: the sidebar entry and its row count, the grid, and the capacity breakdown, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Submitting New Dataset with an empty name, a schema field name with spaces, a category field with empty allowedValues, or a threshold rule with a missing cap triggers immediate inline validation naming the field and nothing is created"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_ripples_to_derived"
description = "Editing a numeric cell through the inline editor updates the formula bar result reading that column, adds or clears a threshold flag when the value crosses a cap, and changes the Dataset Package JSON stats for that column"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Deleting a row after confirmation removes it from the grid and decrements the sidebar row count, the verified badge if it was verified, the capacity gauge, and the split stratification counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "grid_pivot_switch_retains_state"
description = "Switching from the grid to the pivot view and back retains the active filter, the current selection, and the pivot's bucket assignments"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Deleting the last row of a dataset reveals an empty state naming the dataset with Add Row and Import CSV controls that work"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filter_updates_all_surfaces"
description = "Enabling Show unverified only hides verified rows in the grid AND narrows the export drawer's Rows CSV tab to the same visible set; disabling restores both exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "The threshold, splits, and snapshot panels and the export drawer can each be opened, closed, and reopened without losing their configured state (rules, percentages, snapshot selection)"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "wizard_and_overlay_flows"
description = "The import wizard advances source, mapping, diagnostic, and commit in order with working Back navigation, and merge and delete confirmations confirm or cancel as expected"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Canceling the import wizard mid-diagnostic, or dismissing a merge flow, returns to the grid with the dataset untouched and no dead end requiring a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Creating a dataset, adding or editing or deleting a row, importing CSV, exporting Dataset Package JSON, or importing a package is not achievable from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_rows_missing_or_duplicated"
description = "A committed import or a submitted Add Row produces missing rows, duplicated rows, or a row count that disagrees with what was committed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A verified toggle, split apply, or merge updates one display but leaves another (badge, sidebar count, stratification readout) stale until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching between the grid, pivot, or a panel breaks the layout or drops the current dataset selection or row selection"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_dataset_breaks_ui"
description = "Emptying a dataset produces a broken grid, errors, or a blank region instead of the specified empty state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The grid, the Verified badge, and the export Rows CSV tab disagree about which rows are currently visible under the active filter"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "A collapsed sidebar, closed panel, or closed drawer cannot be reopened from the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "A modal, wizard step, or drawer blocks the app with no working close, cancel, or Escape path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "An invalid formula, an unmappable CSV paste, an invalid split total, or a failed Dataset Package JSON import fails silently with no visible message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Some flow (wizard, merge, diff, poll of panels) reaches a state that can only be escaped by reloading the page"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_after_mutations_includes_session"
description = "Add a row with a distinctive expectedOutput token, toggle it verified, save a uniquely named snapshot, open Export, and confirm Dataset Package JSON shows schemaVersion exactly dataset-manager.package/v1, contains that expectedOutput under dataset.rows, reflects the verified toggle in stats.verifiedCount, lists the new snapshot name, and keeps every required top-level key; Copy places that JSON on the clipboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_package_restores_exported_state"
description = "After exporting a conforming Dataset Package JSON, changing live state, and Importing that package, the grid, verified badge, snapshot list, and a subsequent export return to the imported contents; a package with the wrong schemaVersion is rejected with a named-field error and leaves state unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_flow_missing_or_static"
description = "Export is missing, stuck on seeded text after session mutations, or produces Dataset Package JSON without schemaVersion dataset-manager.package/v1"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
