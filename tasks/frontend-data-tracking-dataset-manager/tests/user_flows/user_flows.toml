[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Creating a dataset via New Dataset and then adding a row via Add Row updates every surface: the sidebar entry and its row count, the grid, and the capacity breakdown, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Submitting New Dataset with an empty name, a schema field name with spaces, a category field with empty allowedValues, or a threshold rule with a missing cap triggers immediate inline validation naming the field and nothing is created"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_ripples_to_derived"
description = "Editing a numeric cell through the inline editor updates the formula bar result reading that column, adds or clears a threshold flag when the value crosses a cap, and changes the Dataset Package JSON stats for that column"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Deleting a row after confirmation removes it from the grid and decrements the sidebar row count, the verified badge if it was verified, the capacity gauge, and the split stratification counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "grid_pivot_switch_retains_state"
description = "Switching from the grid to the pivot view and back retains the active filter, the current selection, and the pivot's bucket assignments"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Deleting the last row of a dataset reveals an empty state naming the dataset with Add Row and Import CSV controls that work"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filter_updates_all_surfaces"
description = "Enabling Show unverified only hides verified rows in the grid AND narrows the export drawer's Rows CSV tab to the same visible set; disabling restores both exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "The threshold, splits, and snapshot panels and the export drawer can each be opened, closed, and reopened without losing their configured state (rules, percentages, snapshot selection)"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "wizard_and_overlay_flows"
description = "The import wizard advances source, mapping, diagnostic, and commit in order with working Back navigation, and merge and delete confirmations confirm or cancel as expected"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Canceling the import wizard mid-diagnostic, or dismissing a merge flow, returns to the grid with the dataset untouched and no dead end requiring a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_after_mutations_includes_session"
description = "Add a row with a distinctive expectedOutput token, toggle it verified, save a uniquely named snapshot, open Export, and confirm Dataset Package JSON shows schemaVersion exactly dataset-manager.package/v1, contains that expectedOutput under dataset.rows, reflects the verified toggle in stats.verifiedCount, lists the new snapshot name, and keeps every required top-level key; Copy places that JSON on the clipboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_package_restores_exported_state"
description = "After exporting a conforming Dataset Package JSON, changing live state, and Importing that package, the grid, verified badge, snapshot list, and a subsequent export return to the imported contents; a package with the wrong schemaVersion is rejected with a named-field error and leaves state unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "csv_import_pipeline_updates_all_surfaces"
description = "Choose a seeded sample CSV, adjust one column mapping, fix a flagged diagnostic cell, exclude one bad row, and Commit through the real wizard controls; the sidebar count rises by exactly the included-row count, the new rows appear in the grid, the capacity gauge grows, pivot summaries change, and both export tabs change without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "numeric_edit_ripple_reaches_snapshot_diff"
description = "Take a snapshot, then edit a numeric cell through the inline grid editor so it crosses a threshold cap; the formula result, threshold flag, Dataset Package JSON numeric stats, and a diff against that snapshot all update, with the diff showing that exact changed cell"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "duplicate_merge_rescan_round_trip"
description = "Run the duplicate scan to surface the seeded groups, merge one group through the real Merge flow, verify the row count decreases by exactly the group size minus one, then rerun the scan and confirm that merged group is absent"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "bulk_verify_then_undo_restores_five_rows"
description = "Select 5 rows, apply Mark verified through the bulk tray, and measure the Verified badge increase by exactly the number that were newly verified; one real Undo restores all five rows' prior verified states and the prior badge count"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "split_distribution_stays_coherent_after_delete"
description = "Apply an 80/10/10 split, confirm every grid row has a split label and the proportion bar plus verified/unverified stratification match those labels, then delete rows and confirm both derived split surfaces update to the remaining grid rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "reload_restores_seeded_dataset_baseline"
description = "After adding rows, rules, snapshots, and undo history, a full page reload returns every facet to the seeded datasets and row counts, only seeded snapshots and threshold rules remain, and Undo is disabled because history is empty"
type = "binary"
weight = 1.0

