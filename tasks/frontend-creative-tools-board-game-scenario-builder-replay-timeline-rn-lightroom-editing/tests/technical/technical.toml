[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "AC-04"
name = "schema_contract"
description = "Query the current state and export after the mutation. The tool result and artifact contain the declared API-shaped fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.1"
name = "create_flow_updates_all_surfaces"
description = "Create flow: a new item can be created via the UI and appears everywhere it should."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: invalid submission triggers immediate inline validation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_flow_updates_related_displays"
description = "Edit flow: edits save and update all related displays."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_flow_updates_all_surfaces"
description = "Delete flow: the item is removed from all lists/panes after deletion."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_state"
description = "View/mode switch: the view changes properly, with state retained."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after the last delete, the empty state is clear and visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_all_surfaces"
description = "Edge: filtering reveals/hides items everywhere as expected."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsible_chrome_preserves_workflow"
description = "Collapsible chrome (sidebar, panel) can be hidden and reopened with workflow continuity."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_expected_flows"
description = "Overlays behave as expected for details, edits, confirmations."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery: navigation loss or error can be corrected without a reload (no dead ends)."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Create/edit/delete (or genre-equivalent primary flows) are not enabled from the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "New items fail to show up or duplicate."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "State changes are not synced across displays."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "View/mode switching breaks layout or loses selection."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "Emptying the collection produces broken or missing UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Filtered views disagree with each other about what is visible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_chrome_cannot_reopen"
description = "Collapsed chrome can't be re-opened."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Overlays block navigation with no exit option."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed flow provides no user feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Navigation dead ends or requires reload for recovery."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
