[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "swatch_copy_delight_beyond_minimum"
description = "Beyond the required on-swatch copied confirmation, copy feedback includes an extra polished microinteraction (for example a brief ink flash, checkmark morph, or coordinated live-region phrasing) that feels crafted rather than bare (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "scroll_storytelling_beyond_minimum"
description = "Scroll-triggered editorial pacing or reveals go beyond a flat dump of the library — sections stage with intentional rhythm while remaining fully usable (bonus; verify on a fresh load via real scrolling)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_first_browse_hint"
description = "A brief guided first-run hint or coachmark introduces the three Browse layouts, export drawer, or historical-name pairing without blocking the archive (bonus beyond the required editorial intro)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "hue_index_or_relationship_aid"
description = "An interactive graphic beyond the required Nomenclature rows and contrast matrix (for example a compact hue spectrum strip) adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "keyboard_shortcut_for_power_users"
description = "Beyond basic Tab/Enter operability, the archive supports an alternate power-user input such as arrow-key layout switching, a shortcut to open Export, or Ctrl/Cmd+Z for undo when focus is not in a text field (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_spec"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last Browse layout until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "object_and_archive_brand_narrative"
description = "The Object and Archive / o+a brand treatment, script lockup, and editorial field read as a cohesive fine-art archive narrative rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "cream_editorial_craft_beyond_minimum"
description = "Cream-field / near-black editorial craft goes beyond bare compliance — cohesive hairline rules, mono hex meta, and italic historical names feel intentional across Browse layouts and Export (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "contrast_matrix_usability_polish"
description = "Beyond listing ratios, the contrast matrix offers an extra usability polish (for example sorting pairs by worst contrast first, or highlighting failing pairs) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_archive_feel"
description = "The overall archive feels competition-grade: nomenclature index, palette cards, contrast matrix, vision simulation, and export drawer read as a polished fine-art tool rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true


[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0

