[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "required_hover_animations"
description = "Verified by real pointer hover: nomenclature swatches outline on hover, palette-card swatches outline and fade in their hex labels, swatch tiles fade in overlays, view-toggle inactive options show a brief indicator fill, and palette list rows in Detail mode take a hover wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "mode_switch_no_reload"
description = "Browse/Detail mode switches and switches among the three Browse layouts update without a full reload and keep hover feedback working"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "subscribe_popup_fade"
description = "The subscribe popup fades in after idle time or scrolling past roughly half the page, and dismissing or submitting it fades it out and keeps it dismissed for the session"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "create_delete_card_animation"
description = "Driven through the real UI controls (not a state shortcut): creating a palette animates its card into the Palette view and deleting one animates it out rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "editor_swatch_row_animates"
description = "Adding or removing a swatch inside the create/edit form, via the real UI controls, animates the swatch row to its new arrangement rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "favorite_toggle_animates"
description = "Clicking the favorite/featured flag control animates the flag's state change rather than swapping instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "copy_confirmation_transitions"
description = "The on-swatch copied confirmation appears with a brief transition and then clears on its own, rather than popping in and lingering"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.9"
name = "scroll_reveals_pause_for_overlays"
description = "On a fresh page load, scroll-driven reveals or smooth scrolling pace the editorial page, and while an overlay that needs native scroll locking (the subscribe popup, Export drawer, or a modal editor panel) is open, smooth-scroll is paused so the overlay scrolls natively"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, scroll reveals and list animations are removed and state changes apply instantly, while every feature stays reachable and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "export_drawer_enter_exit"
description = "Driven through the real Export control: the Export drawer enters and exits with a brief opacity/scale transition rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "export_copy_confirmation_motion"
description = "Export Copy shows a short copied confirmation with a brief transition before resetting"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.13"
name = "vision_simulation_eases"
description = "When prefers-reduced-motion is not set, changing vision-simulation mode eases the filter across the canvas rather than a hard cut"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.14"
name = "swatch_drag_follows_pointer"
description = "Dragging a swatch to reorder moves it with the pointer while the remaining swatches part and settle into the new order rather than snapping on release"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "batch_archive_and_panel_transitions"
description = "Batch archive animates the affected cards out of the default layouts, and the comparison view and catalog sheet open with a brief transition rather than a hard cut"
type = "binary"
weight = 0.5

