[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_library_on_load"
description = "On load, Browse mode shows a non-empty palette library (nomenclature, palette cards, or swatches) with multiple seeded items"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "six_seeded_palettes_visible"
description = "On load (or after opening the manage/detail list), at least 6 user-manageable palettes are available with names visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "created_palette_name_appears"
description = "After creating a palette named 'Harbor Coastal' with valid swatches, the text 'Harbor Coastal' is visible in the library"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "create_count_delta_exact"
description = "After adding 3 new palettes on top of the seed set, the manage/list count shows exactly 3 more than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "edited_name_replaces_old"
description = "After editing a palette name to 'Evening Ochre', the text 'Evening Ochre' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "deleted_palette_removed"
description = "After deleting a palette, that palette name is no longer visible in the library"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_state_after_delete_all"
description = "After deleting all user palettes, the library region shows a clear empty state with a visible way to start a new palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "browse_detail_mode_round_trip"
description = "After opening Detail/Editor for a palette and returning to Browse, both modes work without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "favorite_state_across_views_and_modes"
description = "Starting in Palette view: toggle a palette's favorite/featured flag on, switch to Nomenclature and Swatch layouts, then open and close Detail/Editor for that palette — the same favorite state is shown on every surface throughout, without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "static_library_no_working_crud"
description = "Palettes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.18"
name = "chrome_navigates_outbound"
description = "App chrome (logo, menu, cart, painting/source titles, footer links) navigates via real outbound links to other origins instead of staying in-app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.19"
name = "view_toggle_indicator_states"
description = "Switching among Nomenclature, Palette, and Swatch views updates the canvas in place, and the active view toggle shows a filled circular indicator while the other options show an outline-only circle"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "swatch_copy_confirmation"
description = "Clicking a swatch in any view copies its hex to the clipboard and shows a brief on-swatch copied confirmation that clears after about a second"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "historical_names_from_dataset"
description = "Each swatch shows a nearest historical color name (with a short note) derived from the bundled color-name dataset in the Nomenclature and Swatch views"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "period_filter_cross_layout_round_trip"
description = "Choosing a period in the filter hides non-matching items across all three layouts at once (verify each layout), a period matching nothing shows an empty state in the library region, and returning to the all-periods choice restores the full collection identically in each layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "invalid_create_rejected"
description = "Submitting an invalid create (empty palette name, empty artist, out-of-list period, fewer than 3 swatches, or invalid hex) does not add a palette — the palette count is unchanged — and shows visible validation feedback naming the problem"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "create_flow_multi_surface"
description = "Scripted probe: note the visible palette count, then create a valid palette with a distinctive name and at least 3 swatches using hex values not present in any seeded palette. Immediately after saving, the palette count increased by exactly one, the new palette appears as a card in Palette view, its new hexes appear as rows in the Nomenclature index (deduplicated by hex), and they appear as tiles in Swatch view — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "edit_flow_propagates_everywhere"
description = "Scripted probe: open a palette in Detail/Editor, change its name and its period tag, and save. Without a reload, its Palette-view card shows the new name, the source-title column of its Nomenclature rows shows the new name, and the palette moves in or out of the current period filter's results to match its new period"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "delete_flow_multi_surface"
description = "Scripted probe: select a palette that has at least one swatch hex unique to it, note the visible palette count, then delete it. Its card disappears from Palette view, its unique swatches drop from the Nomenclature index and Swatch view, any selection pointing at it is cleared, and the palette count decreased by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "reload_resets_to_seeded_state"
description = "Scripted probe: create a palette, switch to Swatch view, apply a period filter, toggle a favorite flag, and open Export — then reload. The app returns coherently to its seeded baseline — the seeded palettes only, Nomenclature active, all-periods filter, Name A–Z sort, empty undo/redo, vision simulation None, and no palette selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "save_disabled_until_fields_valid"
description = "In the palette create/edit form, an empty name, empty artist, or fewer than 3 swatches shows an inline message naming the offending field before submit, and the save control stays disabled until every field is valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "rapid_copy_no_stuck_labels"
description = "Clicking several swatches in quick succession shows each copied confirmation on the swatch that was clicked, and every confirmation clears on its own after about a second with no stuck labels"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.31"
name = "subscribe_popup_lifecycle"
description = "The subscribe popup appears after roughly 45 seconds of idle or after scrolling past about half the page; submitting a value that is not a valid email address (missing at-sign or domain) shows an inline message naming the email field and does not dismiss; closing or submitting a valid email dismisses it, and it stays dismissed for the rest of the session despite further idle time or scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "nomenclature_dedup_and_hue_order"
description = "The Nomenclature view lists exactly one row per unique swatch hex (a hex shared by two palettes appears once), ordered by hue with low-saturation / near-black colors bucketed at the end of the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "editorial_intro_opens_library"
description = "The app opens directly into the library — an editorial intro (eyebrow, headline, and a two-column note about the historical-name pairing) above the browsable palette section — with no login, cart checkout, or multi-page routing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "palette_view_cards_title_artist"
description = "In Palette view, each palette renders as a card of its swatches together with that palette's title and artist, and hovering a card swatch reveals its hex label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "duplicate_palette_copy_suffix"
description = "Duplicating a selected palette increases the visible count by exactly one and inserts a card whose name is the original name plus the suffix '(copy)', with the same period and swatch order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "name_sort_reverses_palette_cards"
description = "Switching the name sort from Name A–Z to Name Z–A reverses the visible Palette-view card order relative to the other choice; switching back restores the previous order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "batch_favorite_three_palettes"
description = "Selecting three Palette-view cards and activating Batch favorite toggles the favorite flag on all three at once; the same three flags remain after switching layouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "batch_delete_decrements_by_selection"
description = "Selecting two palettes and confirming Batch delete decreases the visible palette count by exactly two and removes both cards from Palette view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "contrast_matrix_lists_pairs"
description = "Opening Detail/Editor for a palette with at least 3 swatches shows a WCAG contrast matrix listing unique unordered swatch pairs with contrast ratios and AA (4.5:1) / AAA (7:1) pass/fail marks"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "contrast_matrix_live_recolor"
description = "Recoloring a swatch in Detail/Editor changes at least one listed contrast ratio or pass/fail mark in the contrast matrix without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "vision_simulation_deuteranopia"
description = "Choosing Deuteranopia on the vision-simulation control visibly alters swatch appearance on the library canvas relative to None; choosing None restores the unfiltered appearance"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "undo_restores_delete"
description = "After deleting a palette via the UI, Undo restores that palette's card, swatches, and the prior visible count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "redo_disabled_after_new_action"
description = "After Undo restores a deleted palette, performing a new create clears the redo stack so Redo is disabled and cannot re-delete via redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "export_drawer_four_formats"
description = "The Export drawer offers CSS, utility-theme, SCSS, and archive JSON format tabs, each showing a monospaced live preview compiled from the current store"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "export_reflects_session_create"
description = "After creating a valid palette with a distinctive hex not in the seed set, that hex appears in the CSS / utility-theme / SCSS export previews and the new palette's id, name, artist, period, swatches, and favorite flag appear in the archive JSON preview before any download or copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "export_omits_deleted_palette"
description = "After deleting a palette, that palette's name is absent from the archive JSON export preview and its unique hexes are absent from the CSS preview when no other palette still uses them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "export_copy_and_download"
description = "Export Copy writes the visible preview text to the clipboard with a brief copied confirmation, and Download starts a file download of that same preview text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "import_archive_json_applies"
description = "Importing a valid archive JSON replaces the library so visible palette names, artists, periods, swatches, and favorite flags match the imported payload, and the archive JSON export preview matches that imported state including version palette-archive.v1 and each palette's id, name, artist, period, swatches, and favorite"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "archive_json_api_shaped_fields_visible"
description = "The archive JSON export preview is API-shaped: a top-level version string exactly palette-archive.v1 and a palettes array whose entries visibly include id, name, artist, period (a closed-list value), swatches as six-digit hex strings with a leading number-sign, and favorite boolean — and after creating a valid palette those fields for the new record appear in the preview without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "create_form_enforces_palette_field_contract"
description = "Palette create/edit rejects empty name, empty artist, a period outside the closed period list, fewer than 3 or more than 12 swatches, or a swatch that is not a six-digit hex with a leading number-sign: each case shows an inline message naming the offending field, the save control stays disabled until valid, and the palette count is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "form_record_matches_archive_json_shape"
description = "After a successful create with distinctive name, artist, closed-list period, and at least 3 valid hex swatches, the new Palette-view card shows that name and artist and the archive JSON palettes entry for it carries the same name, artist, period, swatches, and favorite values (the form record matches the export shape)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n35"
name = "export_omits_session_mutations"
description = "After a create, edit, delete, duplicate, favorite toggle, or batch action that is visible in the library, the Export drawer previews still omit that session mutation (stale or seed-only export text)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n36"
name = "undo_does_not_restore"
description = "After deleting or batch-deleting a palette via the UI, Undo leaves the collection unchanged — the deleted palettes stay gone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n37"
name = "contrast_matrix_static_after_recolor"
description = "Recoloring a swatch in Detail/Editor leaves every contrast-matrix ratio and pass/fail mark identical — a derived surface ignoring its inputs"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n38"
name = "invalid_palette_payload_still_saves"
description = "Submitting a palette create/edit with empty artist, an out-of-list period, or an invalid hex swatch still adds or updates a palette — field-contract validation is skipped"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n39"
name = "archive_json_missing_required_fields"
description = "The archive JSON export preview omits required API-shaped fields (version palette-archive.v1, or palette id/name/artist/period/swatches/favorite) even when the library has palettes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality or an end-to-end user flow that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

