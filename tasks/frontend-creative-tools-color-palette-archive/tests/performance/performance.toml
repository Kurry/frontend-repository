[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the palette archive becomes interactive with all seeded palettes visible within 2 seconds."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise of switching layouts, creating, editing, deleting, duplicating, filtering, sorting, favoriting, batch actions, undo/redo, contrast matrix updates, vision simulation, exporting, importing, and copying."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "view_switch_responds_under_100ms"
description = "Switching among Nomenclature, Palette, and Swatch via the view toggle updates the canvas with UI response in under 100ms (perceived immediate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "color_name_data_does_not_blank_ui"
description = "While the bundled color-name dataset populates historical names, the library chrome and seeded palettes remain visible rather than a blank screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_library_scrolls_smoothly"
description = "With at least 6 seeded palettes and their swatches visible across layouts, scrolling the library and switching views shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_layout_and_editor"
description = "The UI remains interactive while switching layouts, opening Detail/Editor or Export, applying period filters, and toggling vision simulation — controls accept input during those state changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "list_animations_stay_smooth"
description = "Palette card enter/exit and swatch row rearrange animations (when motion is enabled) maintain smooth playback without visible hitching during create/delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_swatch_copies_no_freeze"
description = "Rapid successive swatch clicks, fast view-toggle switching, and rapid undo/redo leave the app responsive with no hang or freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "contrast_matrix_recompute_no_freeze"
description = "Contrast-matrix recomputation after a swatch edit completes without freezing the editor controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "historical_names_load_gracefully"
description = "If historical color names populate after first paint, the Nomenclature/Swatch labels fill in gracefully without blocking interaction with the seeded library."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.11"
name = "search_and_catalog_responsive"
description = "Typing in search and toggling facet chips filters the seeded collection without visible input lag, and catalog-sheet compilation and comparison delta recomputation complete without freezing the UI"
type = "binary"
weight = 1.0

