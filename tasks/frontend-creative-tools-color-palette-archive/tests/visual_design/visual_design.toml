[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "editorial_cream_composition"
description = "The page reads as a cream editorial field with near-black foreground and hairline rules — not a dashboard or promo-card grid — with distinct browse layouts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_state_visually_clear"
description = "Empty library state is visually present and clear when the collection or filter result is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "nomenclature_four_column_index"
description = "Nomenclature rows read as a four-column index (swatch chip, hex value, historical name with note, and source title and artist) separated by hairline rules"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "swatch_labels_auto_contrast"
description = "Swatch tiles fill edge-to-edge with their color and their hex and name labels auto-contrast (dark ink on light swatches, light ink on dark) so they stay legible on every swatch, including very light and very dark ones"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "sticky_header_lockup"
description = "A sticky header shows the script / O&A lockup, a centered MENU, and a CART, and it stays pinned while the page scrolls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "expressive_type_pairing"
description = "Typography pairs an expressive display face for titles with monospaced hex metadata and italicized historical color names"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "library_controls_row_layout"
description = "The library controls row shows the view toggles with circular fill indicators and places period filter, name sort, vision-simulation, and undo/redo as a coherent controls strip"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.9"
name = "single_consistent_icon_set"
description = "One icon set is used consistently across chrome and controls, with no mixed icon styles"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "multi_column_inert_footer"
description = "A multi-column footer sits behind the main content, styled as inert chrome whose links look interactive but stay on the page"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "export_drawer_visual_anatomy"
description = "Export drawer shows format tabs, a monospaced preview block, and Copy / Download actions as a focused drawer — not a bare unstyled textarea dumped on the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "selection_tray_and_contrast_matrix_surfaces"
description = "When multi-select is active, a compact selection tray appears for Batch favorite / Batch delete; Detail/Editor shows the contrast matrix beneath the swatch editor as a readable table/list"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "hover_focus_states_editorial"
description = "Visual focus and hover states on view toggles, swatches, cards, and export controls align to the cream editorial visual language rather than generic browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "document_title_and_brand_lockup"
description = "The document title includes 'Palette Library' and the on-page brand reads as Object and Archive / o+a"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "facet_comparison_catalog_surfaces"
description = "The search input, tag facet chips with counts, and Archived toggle read as a coherent facet row in the controls strip; the comparison view reads as two aligned palette columns with per-pair delta readouts; the catalog sheet reads as a print-styled document distinct from the library canvas"
type = "binary"
weight = 1.0

