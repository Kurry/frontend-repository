[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from Browse: switch to Palette view, apply a non-all period filter, switch Name sort to Z–A, create a valid palette, toggle a favorite, select two cards, set vision simulation to Deuteranopia, open Export, and open Detail/Editor; then reload. Confirm every facet coherently resets to the seeded baseline — seeded palettes only, Nomenclature active, all-periods filter, Name A–Z, empty undo/redo, vision None, no selection — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "name_sort_reversal_proves_live_list"
description = "Sort-reversal proof: with at least 6 named palettes visible in Palette view, choose Name A–Z and record the exact card title order, then choose Name Z–A. Confirm the order reverses correctly relative to ascending, proving sort is derived from live data rather than two hardcoded orders."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "period_filter_derived_view_sensitivity"
description = "Derived-view sensitivity: with mixed period tags present, switch the period filter from all → a specific period → another period → all. Confirm visible membership in Nomenclature, Palette, and Swatch changes meaningfully for each input rather than redrawing an identical set regardless of filter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "edit_echoes_across_layouts_and_export"
description = "Cross-view echo: in Detail/Editor rename a palette and change its period; close to Browse and open Export without reload. Confirm the Palette-view card title, Nomenclature source title column, period-filter membership, and archive JSON export all reflect the edit."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure the visible palette count, create one valid palette via the UI, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_different_palettes_and_exports"
description = "Input-dependent output: create two valid palettes with different names and distinct swatch hex sets; confirm both appear with those distinct names/swatches and the export JSON/CSS previews differ appropriately rather than identical hardcoded output."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_filter_and_export"
description = "Interleaved-flow integrity: start creating a palette (open editor, enter a name), switch to Swatch view and apply a period filter, open Export on another format tab, return and finish creating a second valid palette; confirm the filter state persisted, exactly one new completed palette appears, and export previews include it without corrupting the other flow's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_library_and_export"
description = "Edge-state round-trip: delete every palette (empty state visible; export still compiles), then create two valid palettes; confirm the empty state clears, both new cards/index entries appear across layouts, period filtering operates on the repopulated collection, and export JSON lists both new palettes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "batch_delete_undo_export_pipeline"
description = "Full pipeline: select two palettes, confirm Batch delete (count −2, both absent from archive JSON), then Undo — both palettes return, count restores, and export JSON again contains both names and swatches."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_round_trip_integrity"
description = "Mutate the collection (create a palette with a unique hex), Copy the archive JSON export text, then Import that text: visible library state and the export preview match the mutated pre-export state (round-trip)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "contrast_matrix_input_dependent"
description = "Open Detail/Editor for a palette with ≥3 swatches, note a contrast ratio for a pair, recolor one of those swatches to a clearly different luminance, and confirm that pair's ratio and/or pass/fail mark changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "api_shaped_create_to_export_pipeline"
description = "Full pipeline: create a valid palette with distinctive name, artist, closed-list period, and unique hex swatches; confirm the Palette-view card and Nomenclature source show name/artist; open Export JSON and confirm version palette-archive.v1 plus the new palette's id, name, artist, period, swatches, and favorite are present; Copy then Import that JSON and confirm the library and export preview still match."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_after_reload"
description = "After configuring view, filter, sort, favorites, vision mode, and a created palette then reloading, some user-configured facets survive while others reset — incoherent partial persistence instead of a full return to the seeded baseline."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "period_filter_identical_across_inputs"
description = "Switching among distinct period filter choices leaves the visible library membership identical — a derived surface ignoring its inputs."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_creates_yield_identical_output"
description = "Creating two palettes with different names and swatch sets yields identical visible names and swatch sets, or identical export preview text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "layout_shows_stale_edit_until_reload"
description = "After editing a palette's name or period, another Browse layout or the archive JSON export still shows the stale values until a full page reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_ignores_session_mutations"
description = "Export previews remain seed-only or otherwise omit visible session creates/edits/deletes/favorites — export not compiled live from the store."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n6"
name = "undo_fails_batch_or_delete_restore"
description = "After Batch delete or a single delete, Undo leaves the deleted palettes gone and the export favorite/membership fields stuck at the post-delete state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "export_drops_api_shaped_fields"
description = "After a valid create, the archive JSON export preview is missing version palette-archive.v1 or any of id, name, artist, period, swatches, or favorite for the new palette — export not conforming to the API-shaped archive schema."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.13"
name = "reorder_export_pipeline"
description = "Record a palette's swatch order from the archive JSON preview, reorder one swatch via the UI, and confirm the swatches array order in a fresh export changes to match the visible order; a second, different reorder yields a correspondingly different exported order"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "tag_search_derived_sensitivity"
description = "Add a distinctive tag to one palette, confirm searching that tag or activating its facet chip isolates exactly that palette, then remove the tag and confirm the same search matches nothing and the chip count updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "notes_edit_catalog_pipeline"
description = "Two different provenance notes saved on the same palette produce two different rendered catalog-sheet entries and two different notes strings in the archive JSON export"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n8"
name = "comparison_deltas_static_after_swap"
description = "Swapping one compared palette for another with different swatches leaves every displayed delta value unchanged"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "A behavioral probe reveals stale, hardcoded, or incoherent state handling not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

