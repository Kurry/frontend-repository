[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_entity_and_artifact_modules_bound"
description = "All three contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with browse_*, entity_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse destinations/filters/sorts, entity create/select/update/delete/toggle, and artifact export/import/copy change the same palette library and export state the view toggles, period filter, name sort, editor, and Export drawer use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_browse_entity_artifact_ops"
description = "Only documented operations from the bindings are available: browse destinations archive-grid, palette-detail, filters, and export-drawer; filter period; sorts name-asc and name-desc; entity palette with create, select, update, delete, and toggle; artifact export, import, and copy with formats css, utility-theme, scss, and json and import mode archive-json — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound browse, entity, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_palette_crud_and_toggle"
description = "Entity operations declared for palette work: create, select, update, delete (with confirm=true), and toggle update the visible library state (collection, selection, favorite, period)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_fields_name_artist_swatches_favorite_period"
description = "Entity field updates accept the declared fields name, artist, swatches, favorite, period, tags, notes, and archived and produce visible changes consistent with those fields on the palette surfaces, facet counts, and archive JSON export preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_filters_sorts_match"
description = "Browse destinations archive-grid, palette-detail, filters, export-drawer, and comparison, plus filters period, tag, and archived and sorts name-asc/name-desc, match the allowed specification and update visible navigation/filter/sort/export state via the same handlers as UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, copy, and print_preview are bound: export formats css, utility-theme, scss, and json, import mode archive-json, and a catalog-sheet print preview are available without putting raw file paths, blobs, or base64 artifact contents in WebMCP arguments or results."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for browse-query-v1, entity-collection-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound browse, entity, or artifact tool leaves library layout, selection, palette fields, or export preview diverging from what the equivalent visible UI control would produce."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, sorts, entity operations, or artifact formats beyond the Bindings are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared browse, entity, and artifact bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mcp_create_bypasses_validation"
description = "An entity create or update invocation bypasses validation and leaves MCP/UI state inconsistent (invalid palette accepted via MCP while the UI would reject it, or UI and tool results disagree)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_not_implemented"
description = "browse-query-v1, entity-collection-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave the library or export state unchanged when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "mcp_fakes_ui_success_paths"
description = "Missing tools create fake UI success paths — the library or export shows success or updated counts without the underlying entity/browse/artifact handler running."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n11"
name = "artifact_args_contain_raw_blobs"
description = "WebMCP artifact tool arguments or results include raw file paths, blobs, or base64 artifact contents contrary to the artifact-transfer restrictions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract deviates from its declaration in a way not covered by any other criterion in this file. 'Significant' means a real automation/contract break, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

