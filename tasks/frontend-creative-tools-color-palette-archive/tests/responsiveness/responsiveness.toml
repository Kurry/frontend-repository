[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable archive: sticky header, library controls, and the active Browse layout remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, view toggles, period filter, name sort, vision simulation, undo/redo, favorite flags, editor fields, export controls, and primary chrome controls present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "type_readable_both_widths"
description = "Editorial intro type, nomenclature labels, and hex meta remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width no content clips or overflows the viewport and no horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sticky_header_and_controls_usable_narrow"
description = "Below 768px the sticky header (script lockup, MENU, CART) and library controls row remain usable; chrome adapts rather than disappearing or becoming unreachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "nomenclature_reflows_below_768"
description = "Below 768px the nomenclature index reflows so each entry keeps its swatch chip, hex, historical name with note, and source legible without truncating mid-word; at desktop widths the four-column index layout holds."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "swatch_and_card_tap_works_narrow"
description = "At 375px width, tapping a swatch still copies hex with visible confirmation, and palette cards remain tappable to open Detail/Editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page has no horizontal scrolling while browsing Nomenclature, Palette, or Swatch layouts, or while Export drawer and Detail/Editor are open."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "palette_and_swatch_grids_reduce_columns"
description = "Palette cards and swatch tiles reduce their column count at narrower widths so tiles stay legible and fit the layout without overflowing."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "detail_editor_export_fit_375"
description = "The Detail/Editor panel, contrast matrix, and Export drawer fit within a 375px-wide viewport with all fields and controls reachable without horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "selection_tray_undo_reachable_375"
description = "The multi-select tray and undo/redo controls remain reachable at 375px width without permanently covering primary actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.12"
name = "facets_comparison_catalog_at_375"
description = "At 375 pixel width the search input, tag facet chips, Archived toggle, comparison view, and catalog sheet remain reachable and operable without horizontal scrolling, with comparison columns allowed to stack while per-pair deltas stay legible"
type = "binary"
weight = 1.0

