[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "A change made in one surface (creating, editing, deleting, favoriting, or filtering a palette) is immediately reflected in every other view showing that data — Browse layouts, Detail/Editor, and filter results — without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "cold_load_interactive_fast"
description = "The app serves from its documented start path and is interactive within 2 seconds of a local cold load, with all seeded palettes visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "browser_storage_used"
description = "Uses localStorage or sessionStorage to persist palettes or filters"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "views_desync_stale_data"
description = "The same datum shows different values in two places — e.g. a palette renamed in the editor still shows its old name in a Browse layout, or a deleted palette's swatches linger in one view until reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "The browser console stays free of errors, warnings, and unhandled promise rejections during a full exercise of the app: switching layouts, creating, editing, deleting, filtering, favoriting, and copying"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "keyboard_operable_with_focus"
description = "Every interactive control — view toggles, period filter, swatches, favorite flags, editor fields, popup controls — is reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "dialog_focus_management"
description = "The Detail/Editor panel and the subscribe popup use dialog semantics: focus moves into them on open, stays trapped while they are open, and returns to the invoking control on close"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "copy_announced_aria_live"
description = "Copying a swatch's hex announces the confirmation through an aria-live polite region in addition to the on-swatch label"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.9"
name = "outbound_network_requests"
description = "Network requests to other origins (CDN scripts, fonts, icon sets, or a remote color-name dataset) appear in devtools during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.10"
name = "interactions_stay_smooth"
description = "Switching among the three layouts, filtering, and opening the editor stay smooth, with no hangs or dropped interactions even under rapid input"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
