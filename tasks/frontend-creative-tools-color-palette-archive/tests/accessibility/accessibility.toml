[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_archive_controls"
description = "Every interactive control — view toggles, period filter, name sort, vision simulation, undo/redo, selection checkboxes, batch actions, swatches, favorite flags, editor fields, export controls, and popup controls — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space), each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "editor_export_popup_focus_trap"
description = "The Detail/Editor panel, Export drawer, batch-delete confirmation, and the subscribe popup use dialog semantics: focus moves into them on open, stays trapped while open, and returns to the invoking control on close."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "chrome_icons_have_accessible_names"
description = "Icon-only chrome controls (MENU, CART, favorite flags, undo/redo, and similar) expose descriptive accessible names or labels so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "swatch_and_export_copy_announced_live"
description = "Copying a swatch's hex and copying export preview text announce the confirmation through an aria-live polite region in addition to the visible label."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "editor_subscribe_import_fields_labeled"
description = "Every palette create/edit field (name, artist, period, swatches), the subscribe email field, and the archive import field uses an explicit label element associated with the control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Archive headings (editorial intro through library sections and export) follow a logical order with no skips such as H1 jumping directly to H3."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_present"
description = "The page exposes semantic landmarks (for example main for the library and complementary/dialog for Detail/Editor, Export, or subscribe) so assistive technology can navigate the chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "auto_contrast_swatch_labels"
description = "Auto-contrast swatch labels keep legible contrast against every swatch color, including very light and very dark swatches, and chrome text meets sufficient contrast on the cream field."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_for_controls"
description = "View toggles, period filter, name sort, favorite flags, batch actions, and primary actions use semantic HTML roles such as button, and the page uses nav/main landmarks rather than unlabeled div soup for structure."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, scroll reveals and list animations are removed and state changes apply instantly while every feature (views, filter, sort, editor, export, copy, favorites, vision simulation) stays reachable — verified on a fresh load."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "contrast_matrix_not_color_only"
description = "Contrast-matrix pass/fail marks include a text label such as Pass or Fail alongside any color cue — not color alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "View toggles, period filter, name sort, vision simulation, undo/redo, selection checkboxes, batch actions, swatches, favorite flags, editor fields, export controls, or popup controls cannot be activated or reached via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing"
description = "Focused interactive controls lack a visible focus indicator or the indicator is fully obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom view toggles, favorite flags, batch actions, or swatch buttons use non-semantic tags and lack ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "period_favorite_or_passfail_color_only"
description = "Active period filter, favorite state, or contrast-matrix pass/fail is conveyed by color alone with no text, icon change, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "overlays_fail_to_trap_focus"
description = "Detail/Editor, Export drawer, batch-delete confirmation, or the subscribe popup leaves keyboard focus outside the dialog or allows Tab to escape the overlay while open."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "swatch_labels_unreadable_contrast"
description = "Hex or historical-name labels on very light or very dark swatches are unreadable due to poor contrast."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "copy_feedback_visual_only"
description = "Swatch or export copy confirmation is visual only with no aria-live or equivalent announcement for assistive technology."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "icon_controls_missing_names"
description = "Icon-only MENU, CART, undo/redo, or favorite controls are missing accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Headings are skipped or unordered, such as jumping from H1 to H3 across the editorial intro and library."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, scroll reveals or list enter/exit animations still play on a fresh load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

