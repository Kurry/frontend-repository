[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_palette_updates_all_layouts_and_export"
description = "Starting in Browse with the seeded library: create a valid palette via the editor; confirm the visible palette count increases by exactly one, the new card appears in Palette view, its swatches join Nomenclature and Swatch tiles, and the Export drawer CSS/utility-theme/SCSS/JSON previews include the new palette's hexes and metadata — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_palette_create_inline_validation"
description = "In the create editor, submit with an empty name, empty artist, out-of-list period, fewer than 3 swatches, or an invalid hex: no new palette is added and an inline validation message naming the offending field is visible immediately, with the save control staying disabled until every field is valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_palette_echoes_everywhere_including_export"
description = "Edit a palette's name, artist, and period in Detail/Editor mode: the Palette-view card, the source title and artist columns of its Nomenclature rows, its membership under the current period filter, and the archive JSON export preview all update to the new values without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_palette_clears_all_surfaces_and_export"
description = "Delete a palette: its card disappears from Palette view, its unique swatches drop from Nomenclature and Swatch, any selection pointing at it clears, the visible palette count decreases by exactly one, and it is removed from the archive JSON export preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_toggle_retains_favorites_and_filter"
description = "With a favorite flagged and a non-all period filter active, switch among Nomenclature, Palette, and Swatch via the view toggle: the active option shows a filled circular indicator, the canvas updates without a full reload, and the favorite flag plus filter membership stay coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_shows_library_empty_state"
description = "After deleting every user palette, the library region shows a clear empty state with a visible way to start a new palette, and export previews still compile without errors."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "period_filter_updates_all_three_layouts"
description = "Choosing a specific period hides non-matching items across Nomenclature, Palette, and Swatch at once; returning to the all-periods choice restores the full collection identically in each layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "detail_editor_open_close_keeps_browse_state"
description = "Open Detail/Editor for a selected palette, then close it back to Browse: the prior view toggle selection, period filter, name sort, and favorite flags remain intact with no navigation away and no reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "subscribe_popup_and_editor_overlays_dismiss"
description = "When the subscribe popup appears (after idle or deep scroll) or Detail/Editor / Export drawer is open, each overlay can be dismissed via its close path and returns the user to a usable Browse library without trapping them."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_resets_seeded_browse_baseline"
description = "After creating a palette, switching to Palette view, applying a period filter, sorting Z–A, selecting cards, and opening Export: a page reload returns the seeded palettes, Nomenclature layout active, all-periods filter, Name A–Z sort, empty undo/redo, vision None, and no palette selected."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "duplicate_flow_adds_copy_and_export"
description = "Duplicate a palette: count increases by exactly one, a card with the '(copy)' suffix appears, and that copy's metadata is present in the archive JSON export preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "name_sort_reversal_flow"
description = "Switch Name sort from A–Z to Z–A and confirm Palette-view card order reverses relative to the prior sort; switch back and confirm the previous order restores."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "batch_favorite_then_undo_flow"
description = "Select three palettes, run Batch favorite so all three flags toggle, switch layouts and confirm flags persist, then Undo — all three flags return to their prior values and the export preview favorite fields match."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "batch_delete_then_undo_flow"
description = "Select two palettes, confirm Batch delete (count decreases by exactly two), then Undo — both palettes and the prior count are restored and both reappear in the archive JSON export."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "contrast_matrix_and_vision_flow"
description = "Open Detail/Editor and confirm the contrast matrix lists pair ratios; recolor one swatch and confirm at least one ratio/pass mark changes; close editor, set vision simulation to Deuteranopia and confirm swatches visibly shift vs None."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "export_import_round_trip_flow"
description = "After mutating the collection (create or edit at least one palette), Copy or Download the archive JSON, then Import that same JSON text — visible names, artists, periods, swatches, and favorite flags match the pre-export mutated state, and the export preview matches again including version palette-archive.v1 and each palette's id, name, artist, period, swatches, and favorite."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "create_echoes_api_shaped_export_fields"
description = "Create a valid palette with distinctive name, artist, closed-list period, and at least 3 valid hex swatches: Palette-view card shows name and artist, and the archive JSON preview includes that palette's id, name, artist, period, swatches, and favorite without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "reorder_to_export_flow"
description = "Drag a palette's first swatch to the third position (or use move-down twice), close and reopen Detail confirming the order held in the editor and on the Palette-view card, then open Export and confirm that palette's swatches array lists the hexes in the new order"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.19"
name = "search_facet_narrow_clear_flow"
description = "Type a seeded artist fragment into search and confirm only matching palettes remain across all three layouts, activate a tag facet chip and confirm the set narrows conjunctively, then clear all and confirm the full collection returns"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.20"
name = "comparison_swap_flow"
description = "Select exactly two palettes, open Compare, confirm aligned swatch pairs show hue-degree and lightness deltas, swap one compared palette for a third, and confirm the deltas update without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.21"
name = "provenance_note_to_catalog_flow"
description = "Write a markdown note with a heading and a bold phrase, Preview it rendered, save, and confirm the rendered note appears in Detail and in the Catalog sheet while the archive JSON export carries it as the notes string"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.22"
name = "bulk_tag_archive_restore_undo_flow"
description = "Select three palettes, Batch tag them (facet count includes them), Batch archive two (default layouts drop both while the Archived facet reveals them), Restore one, then Undo repeatedly and confirm each step reverses in order"
type = "binary"
weight = 1.0

