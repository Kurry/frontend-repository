[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_editorial_scale"
description = "At 1440px, spacing among the sticky header, editorial intro, library controls, and nomenclature rows follows a consistent editorial scale matching the reference screenshots — no arbitrary one-off gaps that break the archive composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_expressive_pairing"
description = "Titles use expressive display pairing, hex meta uses mono, and historical color names use italic treatment consistent with the visual spec and reference screenshots — not a single default UI stack for all of those roles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: sticky script/MENU/CART chrome, editorial intro above the library, view toggles with circular indicators, period filter on the right, and four-column nomenclature rows with hairline rules."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — view toggle, palette create/delete card motion, favorite flag, swatch copy confirmation, export drawer enter/exit, subscribe overlay — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: nomenclature reflows, palette/swatch grids reduce columns, sticky header and library controls remain usable, Detail/Editor and Export fit the narrow viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "View toggles, period filter, name sort, editor fields, export controls, and primary actions use styled radii, padding, and surfaces consistent with the cream editorial system rather than bare browser-default form chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_type_hierarchy"
description = "Typography hierarchy clearly distinguishes the editorial headline, library section labels, historical names, hex meta, and export preview monospace."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "view_toggle_and_hover_states_match_spec"
description = "Component states match the spec where specified: active view option shows a filled circular indicator, inactive options outline-only, and hover outlines/washes appear on nomenclature swatches, palette-card swatches, and swatch tiles (verified via real pointer hover)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "cream_field_and_hairline_treatments"
description = "Cream editorial field, near-black foreground, and hairline rules on nomenclature rows match the specified surface treatments rather than a dashboard card-grid look."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_duration"
description = "Microinteraction feedback for swatch copy (~1s clear), favorite toggle, export copy confirmation, and hover outlines follows the spec in duration and motion when exercised through the real UI path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "export_and_contrast_surfaces_match_spec"
description = "Export drawer format tabs with monospaced preview and the Detail/Editor contrast matrix are present as specified surfaces, not omitted or replaced by unrelated chrome."
type = "binary"
weight = 1.0

