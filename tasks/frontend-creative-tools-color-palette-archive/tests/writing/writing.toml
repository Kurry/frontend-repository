[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings and section titles (editorial intro, library controls, Detail/Editor, Export drawer), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders button or action labels, they use specific verbs appropriate to the archive (for example Batch delete, Copy export, Undo, Duplicate) rather than generic Submit/OK alone when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_field_and_fix"
description = "Where the app renders validation messages for palette create/edit (name, artist, period, swatches), subscribe email, or archive import field-contract failures, they name the field and the fix, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_library_copy_explains_next_step"
description = "Where the app renders an empty library state (after delete-all or a zero-match period filter), the copy explains what belongs there and how to start a new palette or clear the filter."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "editorial_and_historical_notes_polished"
description = "Where the app renders the editorial intro and historical color-name notes, rate how free the prose is of spelling and grammatical errors and how complete each note phrase reads."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "palette_terminology_consistent"
description = "Where the app renders labels for the same concept in multiple places, terminology stays consistent (palette / swatch / period / historical name / export) rather than mixing conflicting synonyms across Browse, Detail, and Export."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "hex_formatting_consistent"
description = "Where the app renders hex values across Nomenclature, Palette, Swatch, contrast matrix, and export previews, formatting is consistent (same case and # prefix convention)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "copy_and_dismiss_messages_specific"
description = "Where the app renders confirmation microcopy (on-swatch copied feedback, export copied confirmation, batch-delete confirmation, subscribe dismiss/success), it states what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.9"
name = "contrast_and_export_headers_specific"
description = "Where the app renders contrast-matrix headers and export format tab labels, they use specific wording (for example Contrast, CSS vars, utility-theme snippet, SCSS map, JSON) rather than generic placeholders."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as the editorial headline, library headings, export labels, or primary action labels."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_palette_terminology"
description = "The same concept is named inconsistently across Browse layouts, Detail/Editor, and Export (for example mixing unrelated terms for palette vs swatch vs period)."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_truncated_or_overflowing"
description = "Truncated or overflowing text renders historical names, hex labels, contrast-matrix rows, export preview, or editorial intro copy unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

