[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "room_state_floorplan_loci"
name = "room_state_floorplan_loci"
description = "Verify that rooms and fixtures are selectable SVG loci with distinct inspection status, severity, work, and verification overlays. They can be selected individually or via a lasso, creating a work scope without merging fixture identities, and maintain coordinates across zoom/pan."
type = "binary"
weight = 1.0

[[criterion]]
id = "findings_evidence_ledger"
name = "findings_evidence_ledger"
description = "Record a finding. Verify it captures fixture, category, severity, note, evidence hash, captured-at time, and supersession. Select the evidence and confirm it traces finding, decision, task, verification, and export correctly, distinguishing zero findings from uninspected."
type = "binary"
weight = 1.0

[[criterion]]
id = "work_graph_timeline"
name = "work_graph_timeline"
description = "Create tasks from findings and schedule them. Verify dependency definition, assignee, duration, room access, inventory, and verification rule are tracked. Drag/resize on worker lanes updates these correctly. Cycles or overlaps remain previews."
type = "binary"
weight = 1.0

[[criterion]]
id = "inventory_key_custody"
name = "inventory_key_custody"
description = "Reserve, issue, consume, return, or substitute inventory units and check keys out/in. Verify custody events are append-only, counts cannot go negative, duplicate event ids are idempotent, and task readiness cites exact lot/key evidence."
type = "binary"
weight = 1.0

[[criterion]]
id = "scope_branches_approval"
name = "scope_branches_approval"
description = "Branch a fixture decision (e.g. repair, replace). Compare cost, time, dependencies, inventory, and unresolved findings. After approval, verify the evidence and schedule basis are frozen. A later change must correctly mark the decision as stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "dispatch_verification_handoff"
name = "dispatch_verification_handoff"
description = "Advance the clock and dispatch tasks, recording progress and verifying with evidence. At a partial handoff (e.g. 19/22 tasks), verify the app exposes blocked rooms, missing key returns, and stale verification, and allows recovery via resequence or conditional packet."
type = "binary"
weight = 1.0

[[criterion]]
id = "responsive_command_surface"
name = "responsive_command_surface"
description = "Verify that the desktop view links floorplan, evidence, timeline, inventory, branch compare, and readiness. Change viewport to tablet and verify synchronized panes. Change to mobile and verify room cards, evidence sheet, day schedule, custody stepper, and handoff checklist are present with all actions."
type = "binary"
weight = 1.0
