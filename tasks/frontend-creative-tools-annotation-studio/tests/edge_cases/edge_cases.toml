[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "double_submit_single_save"
description = "Double-activating Submit & Next saves exactly one annotation: the queue count decrements by one and history gains one entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "skip_all_then_proceed"
description = "Skipping every item in a suite leaves the queue showing the same items in skip order with the skipped badge equal to the number of skips, and submitting then proceeds from the front of the reordered queue"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "empty_stacks_disable_undo_redo"
description = "Undo with an empty history and Redo with an empty redo stack are disabled; activating them does nothing and produces no console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "sliver_box_discarded"
description = "Drawing a box with width or height below 8 image pixels is discarded rather than creating an unusable sliver region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "last_region_delete_empty_state"
description = "Deleting the last region on an item leaves the image visible with an empty region list and a short empty-state line explaining how to draw a region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "comment_cap_round_trip"
description = "At exactly 500 characters the comments counter shows 0 remaining and further input is prevented, and the saved annotation shows the full 500-character comment in history"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "select_attribute_needs_options"
description = "Submitting the class form with a select-kind attribute and an empty option list shows an inline message naming the attribute options field and saves nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "assist_on_complete_suite"
description = "Running Assist on a fully annotated suite shows a message that there is nothing to pre-label instead of starting an empty run"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "timeline_filter_empty_state"
description = "Filtering the assist event timeline to a status with no entries shows an empty-state message in the timeline region rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "copy_matches_visible_preview"
description = "Copying the export mid-update copies exactly the text currently visible in the preview block"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "dispute_reason_boundary_rejected"
description = "Submitting DisputeCreate with an empty reason or a reason longer than 200 characters changes no review state and names the reason field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "import_rejects_bad_labels_package"
description = "Importing malformed Labels JSON or JSON that fails the LabelsPackage field contract (missing schemaVersion/taxonomy/metadataFields/items, schemaVersion not annotation-studio-labels-v1, review_state or rating outside closed sets, score outside 1–5, or region classId absent from taxonomy) leaves taxonomy, annotations, and review states unchanged and shows a visible error naming the offending field"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "seeded_export_opens_valid_package"
description = "Export with only the seeded history and no new session submit still opens and shows a LabelsPackage that includes schemaVersion annotation-studio-labels-v1 and every required LabelsPackage key; Download, Copy, and Import remain available"
type = "binary"
weight = 1.0

