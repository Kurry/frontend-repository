[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_to_mobile_adapts"
description = "The layout adapts gracefully from 1440px desktop to 375px mobile: sidebar, card, region area, and tables reflow without breakage"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets"
description = "Primary controls (rating buttons, Submit & Next, bulk bar actions, palette rows) are tap targets of at least 44px on mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_scales"
description = "Typography remains readable at both desktop and mobile widths with no unreadably small text"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_viewport_clipping"
description = "No content clips or overflows the viewport at any width between 1440px and 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_at_768"
description = "At widths of 768 pixels and below the queue sidebar collapses behind a toggle control that opens it as an overlay; at desktop widths it is open by default"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_order_logical"
description = "At narrow widths the annotation card stacks logically: prompt, image area, response, rating, sliders, comments, metadata fields in a sensible order"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "region_canvas_touch_scale"
description = "The region annotation image scales to fit its container at every width while boxes keep their relative positions"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll"
description = "At 375px width there is no page-level horizontal scrolling; the agreement table and export preview scroll within their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "tables_scroll_in_containers"
description = "Wide surfaces (agreement table, export preview, event timeline) size responsively and scroll inside their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_reachable"
description = "The toolbar, undo/redo, and view switcher remain accessible at every width"
type = "binary"
weight = 1.0

