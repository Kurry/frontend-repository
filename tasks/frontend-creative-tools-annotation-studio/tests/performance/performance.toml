[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_2s"
description = "Cold start to an interactive studio is under 2 seconds on local serve"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_free_of_errors"
description = "No errors or warnings appear in the console on load or during flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_fast"
description = "UI transitions (view switches, palette open, card advance) respond in under roughly 100 milliseconds from input"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_indicated"
description = "Simulated async work (assist steps, backoff countdowns) shows visible progress indication rather than a frozen UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_collections_smooth"
description = "The seeded queues, agreement table, and export preview render and scroll without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_run"
description = "The UI remains interactive while an assist run advances — the user can annotate, switch views, and open the palette mid-run"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_stay_smooth"
description = "List, card, and chip animations hold a smooth frame rate without stutter"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_no_hangs"
description = "Rapid repeated input (fast slider drags, rapid undo/redo, quick suite switches) causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "An extended session (multiple runs, many annotations, repeated exports) shows no runaway slowdown or memory-driven degradation"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_blank_loading_gaps"
description = "No surface renders as an unexplained blank area while its data is being prepared"
type = "binary"
weight = 1.0

