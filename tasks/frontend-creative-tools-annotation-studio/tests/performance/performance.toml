[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_2s"
description = "Cold start to an interactive studio is under 2 seconds on local serve"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_free_of_errors"
description = "No errors or warnings appear in the console on load or during flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_fast"
description = "UI transitions (view switches, palette open, card advance) respond in under roughly 100 milliseconds from input"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_indicated"
description = "Simulated async work (assist steps, backoff countdowns) shows visible progress indication rather than a frozen UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_collections_smooth"
description = "The seeded queues, agreement table, and export preview render and scroll without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_run"
description = "The UI remains interactive while an assist run advances — the user can annotate, switch views, and open the palette mid-run"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_stay_smooth"
description = "List, card, and chip animations hold a smooth frame rate without stutter"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_no_hangs"
description = "Rapid repeated input (fast slider drags, rapid undo/redo, quick suite switches) causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "An extended session (multiple runs, many annotations, repeated exports) shows no runaway slowdown or memory-driven degradation"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_blank_loading_gaps"
description = "No surface renders as an unexplained blank area while its data is being prepared"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "slow_first_interaction"
description = "More than 2 seconds pass before the app is interactive on local load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_noise_during_flows"
description = "Errors or warnings appear in the console during normal flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "laggy_transitions"
description = "View or card transitions visibly block or lag"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "simulated_async_freezes_ui"
description = "The assist simulation hangs or freezes the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Scrolling the seeded queue or agreement table visibly drops frames"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "input_unresponsive_during_animation"
description = "Input is unresponsive while animations play"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "render_blocking_loads"
description = "The UI blocks rendering while assets load"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "resource_usage_runaway"
description = "Extended use shows memory leaks or runaway resource use"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "nothing_shown_while_loading"
description = "Nothing is displayed while data loads"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crashes_under_rapid_use"
description = "The app crashes under rapid or edge-case use"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
