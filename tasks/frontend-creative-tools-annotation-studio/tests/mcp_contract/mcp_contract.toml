[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: entity-collection-v1, structured-editor-v1, command-session-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with entity_*, editor_*, session_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: entity/editor/session/artifact operations change the same queue items, taxonomy, regions, assist run, and Export/Import state the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: entity select/update/toggle/reorder on queue-item (fields including rating, scores, comment, metadata-values, review_state, dispute-reason, resolved-rating, skip, bulk-selection, suggested-rating-accept); editor select/add/delete/update_property/switch_mode/preview on taxonomy-class, metadata-field, and region (properties including name, color, icon, shortcut, attributes, attribute-values, field-kind, options, class-id, x, y, w, h; modes annotate/taxonomy/review-queue/agreement/history/export); session start/pause/resume for assist-run; artifact export/import/copy with export formats annotations-jsonl, labels-json, stats-summary-text and import mode labels-json — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound entity, editor, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_queue_item_ops_work"
description = "Entity operations declared for queue-item work: select, update, toggle, and reorder update the visible queue selection, ratings, review states, skips, and bulk selection."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_taxonomy_region_ops_work"
description = "Editor operations for taxonomy-class, metadata-field, and region work: select, add, delete, update_property, switch_mode, and preview update the visible taxonomy list, metadata controls, region list, and editor modes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "artifact_export_import_copy_formats"
description = "Artifact operations export, import (mode labels-json), and copy with export formats annotations-jsonl, labels-json, and stats-summary-text are bound and invoke without throwing when called through WebMCP (clipboard/file contents remain Playwright responsibilities)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond entity-collection-v1, structured-editor-v1, command-session-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for entity-collection-v1, structured-editor-v1, command-session-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound entity/editor/session/artifact tool leaves queue chips, taxonomy, regions, assist steps, or Export preview diverging from what the equivalent visible UI control would produce."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings (including inventing artifact formats outside annotations-jsonl/labels-json/stats-summary-text or import modes outside labels-json) are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared entity, editor, session, and artifact bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mcp_update_bypasses_shared_state"
description = "An editor add/update_property or entity update invocation updates a parallel copy of state, leaving visible History/Export showing stale values that disagree with the MCP result (MCP/UI desync)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks rather than the app's registered tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "One of entity-collection-v1, structured-editor-v1, command-session-v1, or artifact-transfer-v1 is not implemented where declared required."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "artifact_import_export_unbound"
description = "Artifact import (labels-json) or export formats annotations-jsonl/labels-json/stats-summary-text are missing from the bound artifact tools despite being declared in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
