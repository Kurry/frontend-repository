[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_gallery_state_after_delete_all"
description = "After deleting all boards, Gallery mode shows an empty state with a message explaining the gallery is empty and how to save a board."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "save_form_inline_validation"
description = "The Save board form validates against the Board field contract before submit: empty/whitespace name, empty/whitespace tag, name over 40 characters, tag over 24 characters, or a duplicate name each show a per-field message naming the offending field, and the save control stays disabled until name and tag are valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "empty_name_blocks_save_count"
description = "Submitting the Save board form with an empty name must not add a board — the gallery count stays the same and the inline validation message names the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "zero_match_tag_filter_empty_state"
description = "A tag filter that matches no boards shows the empty state rather than a blank region, and clearing the filter restores the list."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "undo_empty_history_noop"
description = "Pressing Undo with no history is a safe no-op: the canvas does not change and no error appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "same_cell_stroke_records_once"
description = "Dragging a paint stroke back and forth over the same cell with the same brush and color records the cell to undo history only once, so one Undo reverts it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "cell_slider_locks_until_clear"
description = "After the first paint, image upload, or camera capture, the cell-size slider locks and fades to a muted disabled look; Clear empties the board and re-enables it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "toolbar_and_gallery_controls_semantic"
description = "Toolbar tools, swatches, gallery save/rename/delete/favorite controls, and form fields use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "camera_cancel_leaves_board_and_slider"
description = "Cancel in the camera overlay closes it without altering the canvas or locking the slider."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "resize_before_and_after_paint"
description = "Resizing the cell slider before any paint keeps the board blank; resizing after painting resamples the art into the new grid rather than clearing it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "import_schema_invalid_session_rejected"
description = "Importing malformed session JSON, or parseable JSON that fails the Session/Board/Cell field contract (wrong schemaVersion, cellSize outside 16–64, brushMode/paletteColor/mirrorMode outside closed enums, Cell kind/color mismatch, Board missing required keys, or fillStats that do not sum to the cell count), shows an inline error naming the offending field or the import problem, leaves gallery count, canvas cells, and fill stats unchanged, and produces no console crash."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "mirror_center_cell_records_once"
description = "With mirrorMode Horizontal or Vertical on an odd-width grid, painting the center cell (partner coincides with itself) writes that cell only once and a single Undo reverts it."
type = "binary"
weight = 0.5
