[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "toolbar_gallery_capitalization_consistent"
description = "Where the app renders toolbar labels, gallery actions, and form labels, they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders button or action labels, they use specific verbs appropriate to the studio (for example Save board, Clear, Grid On/Off) rather than generic Submit/OK alone when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_field_and_fix"
description = "Where the app renders validation messages for Save board, rename, or Import, they name the offending field-contract key and the fix (for example name, tag, or schemaVersion), not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_gallery_copy_explains_next_step"
description = "Where the app renders an empty gallery state (after delete-all or a zero-match tag filter), the copy explains what belongs there and how to save a board or clear the filter."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "stage_and_toolbar_copy_polished"
description = "Where the app renders the <SHAPESHIFT GRID TOOL> title, typewriter-style intro line, and toolbar chrome copy, rate how free it is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "board_terminology_consistent"
description = "Where the app renders labels for the same concept in multiple places, terminology stays consistent (board / gallery / cell / brush) rather than mixing conflicting synonyms across Paint and Gallery."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "export_footer_copy_consistent"
description = "Where the app renders export footer captions (/MADE WITH SHAPESHIFT GRID TOOL and <SHAPESHIFTFESTIVAL.COM>), formatting and product naming stay consistent with the on-stage branding."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "save_feedback_is_specific"
description = "Where the app renders confirmation or success messages after saving a board, they state what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5
