[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]

[[criterion]]
id = "AC-03"
name = "causal_motion"
description = "Motion connects the acted-on item to its new state and has a reduced-motion equivalent."
type = "binary"
weight = 1.0
