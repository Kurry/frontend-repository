[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]

[[criterion]]
id = "AC-05"
name = "complete_user_flow"
description = "Create, edit, mutate, undo, and complete one record. The end-to-end job is recoverable without reload."
type = "binary"
weight = 1.0
