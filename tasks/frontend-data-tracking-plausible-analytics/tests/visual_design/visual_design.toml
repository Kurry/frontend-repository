[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dashboard_layout_composition"
description = "At desktop width the layout is a single analytics dashboard on a light neutral page background — top bar, then a row of four metric tiles, then a dominant trend chart card, then a three-column row of breakdown panels — rather than a login-centered or marketing layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "metrics_and_trend_primary_focus"
description = "The summary metrics and the visitors trend are the primary visual focus: large bold numbers over small muted labels and a chart card that spans the full content width and stands taller than the panels below"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "filter_pill_accent_treatment"
description = "The active filter state is distinguished by a visible pill reading Dimension: value, with the accent hue used for the pill, active row, and focus ring over an otherwise neutral palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "aa_contrast_both_themes"
description = "Body text meets AA contrast (at least 4.5:1) against its surface in both the light and the dark theme, and every legible pairing stays legible after the theme switch"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "descriptive_title_and_lang"
description = "The document title is descriptive (names the app and current site) and the root html element carries a valid lang attribute, not a scaffold placeholder"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "sentence_case_numeral_labels"
description = "UI labels, headings, buttons, and counts use sentence case and numerals, action labels are specific (Clear filter, Add site, Export report, Compare previous) rather than generic, short labels carry no terminal period, and empty states explain what belongs there rather than showing bare nothing-text"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "mobile_single_column_stack"
description = "At 375px width the metric tiles, chart, and breakdown panels reflow into a single stacked column preserving the metrics-then-chart-then-panels hierarchy, the site, date-range, and clear-filter controls stay reachable, and no content clips, overflows the viewport, or produces a horizontal scrollbar"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "card_surface_treatment"
description = "The metric tiles, chart card, and breakdown panels share one card treatment: white surfaces (dark equivalents in dark theme) with a subtle 1px border, corner radius near 12px, and a soft shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "indigo_gradient_bars_single_accent"
description = "The visitor bars use an indigo vertical gradient (lighter at the top, deeper indigo at the bottom), and indigo is the single accent hue — used for the logo mark, filter pill, active rows, and focus rings — over an otherwise neutral slate palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "sticky_topbar_brand_cluster"
description = "The top bar is sticky with a hairline bottom border and shows a brand cluster (gradient logo mark, the title Plausible Analytics, and a subtitle naming the current site) on the left and the site selector, date-range selector, sort selector, and theme toggle on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "breakdown_rows_two_column_counts"
description = "Breakdown rows read as a two-column list: a left-aligned name and a right-aligned count in a muted color rendered with tabular figures so digits align vertically across rows"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "consistent_icon_set"
description = "Icons in the top bar, selectors, filter pill, and empty states share one consistent visual style with a uniform stroke weight, with no mixed icon styles across the UI"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "export_drawer_format_tabs"
description = "The export drawer shows format tabs labeled Stats JSON and Breakdown CSV, a monospaced preview block, and Copy / Download / Import actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.17"
name = "high_bounce_not_color_only"
description = "The High bounce alert uses the exact text label High bounce in addition to any accent color so the alert is not color-only"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "compare_chips_beside_metrics"
description = "When Compare previous is on, percent-change chips sit beside the metric values without replacing or crowding out the primary metric numbers"
type = "binary"
weight = 1.0

