[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "segment_filter_updates_export_previews"
description = "Clicking the Google Top Sources row shows Source: Google, changes all four metric tiles, redraws the trend, recomputes the other panels, and updates the Stats JSON export preview filters and results to match — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "clear_filter_restores_export_and_tiles"
description = "Activating Clear filter after a Google filter restores metric tiles to 16,840 / 47,220 / 44% / 98s, clears the pill, and returns Stats JSON preview filters to an empty array with unfiltered results"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "add_site_field_contract_validation"
description = "Opening Add site with empty name, malformed domain, or missing timezone shows inline validation naming the failing field and adds no site"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "add_site_appears_in_selector_and_export"
description = "Submitting a valid Add site form (name, domain, timezone) increases the site selector by exactly one and includes that domain, name, and timezone in the Stats JSON sites array"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "site_or_range_change_clears_filter_and_exports"
description = "Changing the site or date range recomputes tiles, trend, and panels together, clears any active filter pill, and refreshes both export previews for the new selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "bounce_ceiling_flow_and_export_field"
description = "Setting the bounce-rate ceiling to 40 on the default 44% bounce view shows High bounce; setting it to 60 removes the label; Stats JSON bounce_rate_ceiling matches the control"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "compare_previous_flow"
description = "Turning Compare previous on shows percent-change chips on all four tiles; changing the date range while compare stays on changes at least one chip; turning compare off removes every chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "undo_redo_after_add_site"
description = "After adding a site, Undo restores the prior selector count; Redo re-adds the site; after a new filter following an undo, Redo is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_import_round_trip_flow"
description = "After adding a site or applying a filter, Copy or Download Stats JSON then Import that same JSON — site list, filter, tiles, ceiling, compare mode, and both export previews match the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "deep_link_parity_dashboard"
description = "Loading the root URL directly renders the same complete dashboard (tiles, chart, panels, top-bar controls) as reaching it through in-app interaction, with no missing panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_filter_flow_unavailable"
description = "Segment filter, clear filter, or Export report controls are missing or non-functional from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_site_missing_or_duplicated"
description = "A valid Add site submit fails to add exactly one selectable site, or duplicates the entry"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "export_desynced_from_tiles"
description = "After a filter or site change, the Stats JSON preview results disagree with the visible metric tiles"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "compare_toggle_breaks_tiles"
description = "Turning Compare previous on or off blanks metric tiles or leaves stale chips after compare is off"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_new_site_shows_prior_numbers"
description = "Selecting a newly added unseeded site still shows the previous site's metric numbers instead of zeros and an empty-state message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_panels_disagree"
description = "After a source filter, Top Pages and Countries still show the unfiltered default row values"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_drawer_cannot_reopen"
description = "After closing the export drawer it cannot be reopened from Export report"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "export_drawer_blocks_without_escape"
description = "The export drawer or Add site dialog blocks navigation with no Escape or close path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_import_no_feedback"
description = "A malformed Stats JSON import provides no inline error naming the import field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "undo_dead_end_requires_reload"
description = "After a mistaken add-site or filter, Undo cannot restore the prior state and recovery requires a full reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.11"
name = "stacked_filter_saved_segment_flow"
description = "From the default view, click Google then /pricing so two pills stack; save a named segment; clear filters; apply the saved segment — both pills, recomputed numbers, and Stats JSON filters with dimension/value keys return, and saved_segments contains the named segment"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "add_goal_field_contract_flow"
description = "Open Add goal with an empty name or whitespace match_key for event — inline validation names the failing field and submit stays disabled; submit a valid name, goal_type event, and match_key — Goals panel gains exactly one new row and Stats JSON goals includes name, goal_type, and match_key"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "threshold_floor_and_ceiling_flow"
description = "On example.com Last 30 days, set bounce-rate ceiling to 40 and unique-visitors floor to 20,000 — High bounce and Low traffic labels appear and Stats JSON bounce_rate_ceiling and visitor_floor match; restoring 60 and 0 removes both labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "custom_range_flow"
description = "Choose Custom, enter a valid narrower from/to than Last 30 days, and apply — metric tiles differ from Last 30 days, the top-bar period shows the custom span, and Stats JSON period matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "per_panel_csv_after_filter_flow"
description = "Apply the Google source filter, then export Top Pages per-panel CSV — the CSV starts with dimension,name,visitors and lists the filtered Top Pages rows then visible, not the unfiltered defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "add_goal_flow_dead_end"
description = "Add goal is missing, or a valid submit fails to append a Goals panel row and Stats JSON goals entry with name, goal_type, and match_key"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

