[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persistence_round_trip"
description = "Multi-facet round-trip: select a non-default site, date range, and sort, apply a segment filter, set a non-default bounce-rate ceiling, turn compare previous on, switch theme, then reload — all facets including ceiling and compare chips survive together from client storage, never a mix of restored and reverted facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_live_panels"
description = "Sort-reversal proof: switch sort from most visitors to fewest visitors and confirm each breakdown panel reverses; switch back to most visitors and confirm the original order restores"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_export_and_tiles_track_filter"
description = "Derived-view sensitivity: apply Google then Direct source filters and confirm metric tiles, trend bars, other panels, and Stats JSON preview results all change between the two filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_tiles_and_export_echo"
description = "Cross-view echo: change the bounce-rate ceiling so High bounce appears or disappears on the tile and confirm Stats JSON bounce_rate_ceiling matches in the export preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "add_site_count_delta_exact"
description = "Count-delta integrity: measure the site selector entry count immediately before and after a valid Add site submit; the delta is exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_segments_different_exports"
description = "Input-dependent output: export Stats JSON under the Google filter and under no filter; the two previews differ in filters and results values"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_filter_and_export"
description = "Interleaved-flow integrity: apply a filter, open Export report and note Stats JSON results, clear the filter without closing the drawer, switch to Breakdown CSV and back to Stats JSON — the preview shows unfiltered results and no filter entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "export_import_edge_round_trip"
description = "Edge-state round-trip: add a site, export Stats JSON, import it after changing site selection — imported sites list and metrics match the exported mutated state; derived tiles and export previews track"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_then_new_mutation_clears_redo"
description = "After Undo of an add-site, performing a new segment filter disables Redo so the cleared redo stack cannot resurrect the undone site"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_incoherent"
description = "After reload, the filter pill or compare chips revert while site or theme survive, or the reverse — incoherent partial persistence"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_ignores_filter_input"
description = "Stats JSON preview results stay identical after applying a segment filter that visibly changes the metric tiles"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_filters_identical_export"
description = "Two different segment filters produce byte-identical Stats JSON preview text including identical results values"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "export_stale_until_reload"
description = "Filter or ceiling changes update the tiles but the export preview stays stale until a full page reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.10"
name = "stacked_filters_goals_export_chain"
description = "Full pipeline: stack Source: Google and Page: /pricing, confirm Goals and funnel recompute, confirm Stats JSON filters are two dimension/value objects and goals entries include goal_type and match_key, then clear filters — tiles, Goals, funnel, and export filters restore to the unfiltered state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "add_goal_export_import_round_trip"
description = "Add a valid goal, confirm it appears in Stats JSON goals with name, goal_type, and match_key, export then import that Stats JSON — the Goals panel and goals array still include that goal object"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "visitor_floor_export_echo"
description = "Set unique-visitors floor to 20,000 so Low traffic appears; Stats JSON visitor_floor is 20000 in the export preview without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "goal_export_omits_field_contract_keys"
description = "After adding a goal, the Stats JSON goals entry is missing goal_type or match_key, or omits the new goal entirely while the Goals panel shows it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

