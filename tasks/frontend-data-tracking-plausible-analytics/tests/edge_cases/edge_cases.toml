[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_new_site_state"
description = "A newly added site with no seeded traffic shows zero-value metric tiles and empty breakdown panels with an explanatory message, not leftover prior-site numbers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "add_site_inline_validation_all_fields"
description = "Inline validation appears on Add site for empty name, malformed domain, and missing timezone before submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_messages_name_fields"
description = "Validation and import errors name the specific field (domain, timezone, bounce-rate ceiling, or import) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "export_copy_confirmation"
description = "After Copy in the export drawer, a brief copied confirmation is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "same_dimension_replaces_cross_stacks"
description = "Clicking a second row within the same dimension replaces that dimension's pill in place; clicking a row from a different dimension adds a new pill so up to three pills (source, page, country) can be present at once"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_after_mutation"
description = "After add site, apply/clear filter, ceiling change, or compare toggle, Undo is enabled and reverses that action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "ceiling_bounds_help"
description = "The bounce-rate ceiling control communicates the 0 through 100 bound via validation when out of range"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_controls"
description = "Breakdown rows, Export report, Undo, Redo, and Compare previous use semantic button or equivalent operable controls with accessible names"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "dialogs_close_on_escape"
description = "Add site, Add goal, and the export drawer close on Escape and via an explicit close control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "empty_breakdown_csv_header_only"
description = "When panels are empty for a new site, Breakdown CSV still compiles with the header line dimension,name,visitors and no stale prior-site data lines"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "empty_segment_save_names_filters_field"
description = "Saving a segment with no active filters shows an inline message naming the filters field and does not create a saved-segment entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "add_goal_invalid_match_key_rejected"
description = "An event goal whose match_key includes whitespace, or a page goal whose match_key does not start with a slash, shows an inline message naming the match_key field and does not add a Goals panel row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "zero_intersection_empty_goals_message"
description = "Stacking filters whose intersection has no visitors shows zero-value metric tiles and empty breakdown, Goals, and funnel panels with a message, not leftover numbers from a broader stack"
type = "binary"
weight = 1.0

