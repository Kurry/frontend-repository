[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_new_site_state"
description = "A newly added site with no seeded traffic shows zero-value metric tiles and empty breakdown panels with an explanatory message, not leftover prior-site numbers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "add_site_inline_validation_all_fields"
description = "Inline validation appears on Add site for empty name, malformed domain, and missing timezone before submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_messages_name_fields"
description = "Validation and import errors name the specific field (domain, timezone, bounce-rate ceiling, or import) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "export_copy_confirmation"
description = "After Copy in the export drawer, a brief copied confirmation is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "single_filter_no_stack"
description = "Clicking a second breakdown row while a filter is active shows only one filter pill (the latest), never stacked filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_after_mutation"
description = "After add site, apply/clear filter, ceiling change, or compare toggle, Undo is enabled and reverses that action"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "ceiling_bounds_help"
description = "The bounce-rate ceiling control communicates the 0 through 100 bound via validation when out of range"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_controls"
description = "Breakdown rows, Export report, Undo, Redo, and Compare previous use semantic button or equivalent operable controls with accessible names"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "dialogs_close_on_escape"
description = "Add site and the export drawer close on Escape and via an explicit close control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "empty_breakdown_csv_header_only"
description = "When panels are empty for a new site, Breakdown CSV still compiles with the header line dimension,name,visitors and no stale prior-site data lines"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_site_no_feedback"
description = "An empty newly added site shows a blank main region with no zero tiles and no empty-state message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_in_console"
description = "Add site, ceiling, or import errors appear only in the browser console with no inline UI message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "silent_failed_import"
description = "Import of malformed Stats JSON silently fails with no visible feedback and no unchanged-state guarantee"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "undo_missing_after_add_site"
description = "After adding a site there is no Undo control or Undo does nothing"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "nonsemantic_filter_rows"
description = "Breakdown filter rows are non-semantic div or span elements without button/role semantics"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Add site or export drawer cannot be dismissed via Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_missing_or_delayed"
description = "Invalid domain or timezone input reaches a successful submit with no inline field message, or the only feedback appears after a site was already added"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_export_actions"
description = "Export drawer Copy or Download labels are missing or generic (e.g. only Submit) so the action is unclear"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "stacked_filters_allowed"
description = "Two filter pills remain visible at once after clicking a second breakdown row"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "ceiling_oob_still_applies"
description = "A bounce-rate ceiling outside 0 through 100 still applies and toggles High bounce without inline validation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

