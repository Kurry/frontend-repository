[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "breakdown_rows_keyboard_filter"
description = "Breakdown rows are keyboard operable: focus shows a visible indicator, and Enter or Space applies the row filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "selectors_keyboard_operable"
description = "Site, date-range, and sort selectors open with the keyboard, move with arrows, commit with Enter, and close with Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "top_bar_controls_focus_rings"
description = "Undo, Redo, Compare previous, bounce-rate ceiling, Export report, and the theme toggle show a visible focus ring on keyboard focus"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "core_flow_keyboard_and_pointer"
description = "The core flow (choose site, choose range, apply a row filter, clear it, open export, copy) is completable with the keyboard alone and with the pointer alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "dialogs_trap_focus"
description = "Add site, Add goal, and the export drawer trap focus while open, close on Escape, and return focus to the opener"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "validation_assistive"
description = "Inline validation for Add site, Add goal, bounce-rate ceiling, and import is exposed to assistive technology as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "high_bounce_and_chips_not_color_only"
description = "High bounce, Low traffic, and compare percent-change chips convey state with text in addition to color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "export_live_region"
description = "Export copy and import completion are announced through an aria-live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "form_labels_present"
description = "Add site fields (site name, domain, timezone), Add goal fields (name, goal_type, match_key), and the bounce-rate ceiling control have visible labels associated with their inputs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "landmark_or_main"
description = "The dashboard main content is in a main landmark or equivalent so the analytics region is identifiable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "segments_range_and_panel_exports_keyboard"
description = "The Segments menu, the Save segment control, the custom date-range inputs, and each panel's per-panel export control are reachable and operable with the keyboard alone, and each filter pill's remove affordance is a focusable control with an accessible name"
type = "binary"
weight = 1.0

