[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "sentence_case_ui"
description = "All UI text is sentence case; headings, labels, and counts use numerals; short labels carry no terminal period"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_action_labels"
description = "Action labels are specific — Clear filter, Add site, Add goal, Export report, Compare previous, Save segment — rather than generic Submit/Click here"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "export_tab_labels_exact"
description = "Export drawer tab labels read exactly Stats JSON and Breakdown CSV"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "high_bounce_and_low_traffic_phrasing"
description = "The High bounce and Low traffic flags use those exact phrasings"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "validation_names_field"
description = "Validation messages name the field and the fix (domain, timezone, bounce-rate ceiling, visitor floor, match_key, filters, or import)"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.6"
name = "empty_states_explain"
description = "Empty breakdown states explain what belongs there rather than showing bare nothing or lorem text"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "no_placeholder_lorem"
description = "No placeholder or lorem text appears anywhere in the shipped UI"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "brand_title_present"
description = "The title Plausible Analytics appears in the top bar brand cluster"
type = "binary"
weight = 0.5

