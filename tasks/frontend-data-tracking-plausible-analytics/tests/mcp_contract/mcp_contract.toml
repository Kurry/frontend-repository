[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_form_artifact_modules_bound"
description = "browse-query-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound as declared in the webmcp action contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed browse, form, and artifact tool handlers invoke the same store commands as the visible site selector, filters, Add site, ceiling, and Export report controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops"
description = "Only documented operations and bindings are available — destinations example.com, blog.example.com, shop.example.com, export-drawer, goals-view; filters source/page/country/period/saved-segment/custom-range; sorts most-visitors/fewest-visitors/name-az; themes light/dark; artifact formats stats-json, breakdown-csv, and panel-csv"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_automation_exercisable"
description = "The contract can be fully exercised via automation: open a destination, apply and clear a filter, sort, set theme, validate/submit/cancel forms, and export/import/copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "form_fields_bound"
description = "Form fields site-name, domain, timezone, bounce-rate-ceiling, visitor-floor, segment-name, custom-from, custom-to, goal-name, goal-type, goal-match-key, and import are bound with validate, submit, and cancel operations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_validation_stays_active"
description = "Form validate/submit through WebMCP still surfaces the same inline validation as the visible Add site, Add goal, and ceiling controls; invalid submit adds no site or goal"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_and_filters"
description = "Browse destinations and filters match the allowed specification including export-drawer, goals-view, and period/source/page/country/saved-segment/custom-range filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules"
description = "No extra or undeclared module routes or capabilities beyond browse-query-v1, form-workflow-v1, and artifact-transfer-v1 are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface and invoke the bound tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "MCP tooling for browse, form, or artifact modules is unbound, missing, or a no-op"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "WebMCP apply_filter, open, or export handlers diverge from UI logic so UI and tool state disagree"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities"
description = "Undeclared destinations, form fields, or artifact formats are exposed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise"
description = "The declared contract cannot be exercised from automation for filter, form submit, or export"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desync"
description = "WebMCP form submit bypasses validation and desyncs MCP state from the visible Add site rules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete tool lists for the mandated modules"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks rather than window.webmcp_* tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_module_missing"
description = "browse-query-v1, form-workflow-v1, or artifact-transfer-v1 is declared but not implemented"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation against the declared bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

