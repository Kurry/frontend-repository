[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_strip"
description = "A structured export summary strip names site domain, period, and visitors total above the preview"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "undo_redo_keyboard_shortcuts"
description = "Keyboard shortcuts for Undo/Redo work in addition to the visible controls"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "export_active_filter_chip"
description = "A compact chip in the export drawer header shows the active filter stack when filters are applied"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "compare_chip_polished_sign"
description = "Compare percent-change chips use clear signed formatting (for example +12% / -5%) that is easy to scan"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "ceiling_live_hint"
description = "The bounce-rate ceiling control shows a concise live hint of the current bounce rate beside the input"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "report_filename_includes_site"
description = "Downloaded Stats JSON or Breakdown CSV filenames include the current site domain"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "timezone_shown_in_subtitle"
description = "The top-bar subtitle or site cluster shows the selected site timezone alongside the domain"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "empty_export_guidance"
description = "When Breakdown CSV has only a header, the preview area explains that empty panels export header-only rows"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "polished_focus_rings"
description = "Focus rings on breakdown rows and export actions are clearly visible and consistent with the indigo accent"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "trusted_artifact_affordance"
description = "Any additional browser-observable polish that helps an operator trust the report artifact without replacing a required behavior"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "novelty_replaces_required_export"
description = "A novelty control or decorative flourish replaces the required Export report drawer, Stats JSON preview, or Breakdown CSV tab so the mandated artifact surface is missing"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant, browser-observable innovation or polish beyond the specification that is NOT covered by any other criterion in this file. If present, name it and cite the concrete evidence. If nothing beyond the other criteria qualifies, answer no."
type = "binary"
weight = 1.0

