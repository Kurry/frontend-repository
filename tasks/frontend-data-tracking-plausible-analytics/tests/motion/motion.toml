[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "filter_feedback_pill_and_tiles"
description = "After applying a breakdown filter through a real row click, completion is apparent from the filter pill and the updated metric tiles and chart"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "distinct_hover_and_focus_treatments"
description = "Breakdown rows take an accent hover wash and a distinct, clearly visible focus ring — hover and focus are different visual treatments, not one shared highlight standing in for both"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "chart_bars_eased_height_transition"
description = "The chart bars animate their height with a short eased transition when the segment, site, or date range is changed through the real controls, rather than swapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "immediate_press_feedback"
description = "Buttons and the theme toggle ease their background and border on hover and show slight press feedback immediately on pointer-down, before the resulting recompute finishes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "keyboard_and_pointer_flow_parity"
description = "The core flow (choose site, choose date range, apply a row filter, clear it) is completable with the keyboard alone and, equivalently, with the pointer alone, reaching the same outcome"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "sort_reorder_animates"
description = "Changing the sort through its real selector animates the breakdown rows to their new positions with a visible transition rather than snapping them instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "filter_pill_enter_exit_animation"
description = "The filter pill animates in when a filter is applied via a real row click and animates out when cleared via the pill or the Clear filter control, rather than appearing and disappearing instantly, and the active row reflects the current filter state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "add_site_dialog_eased_transition"
description = "The Add site form enters and exits with a short eased transition of roughly 200 to 300 milliseconds when opened and closed through its real controls, rather than appearing instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.15"
name = "add_goal_dialog_eased_transition"
description = "The Add goal form enters and exits with a short eased transition of roughly 200 to 300 milliseconds when opened and closed through its real controls, rather than appearing instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set on a fresh load, transitions are removed or reduced to fades, and every state change (filter, sort, site, theme, dialog, export drawer, compare) still applies instantly and completely"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "export_drawer_eased_transition"
description = "The export drawer enters and exits with a short eased transition of roughly 200 to 300 milliseconds when opened and closed through Export report, rather than appearing instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.13"
name = "export_copy_toast_motion"
description = "Feedback toasts after export copy and successful import slide in, remain readable, and auto-dismiss with a fade when those actions are triggered through the real controls"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.14"
name = "compare_chips_ease_in_out"
description = "Compare percent-change chips ease in when compare turns on through the real control and ease out when it turns off, rather than popping instantly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.16"
name = "funnel_and_goals_eased_updates"
description = "When the site, range, or filter stack changes through the real controls, the funnel step bars animate their width and the Goals conversion figures update with a short eased transition rather than snapping instantly (unless prefers-reduced-motion is set)"
type = "binary"
weight = 1.0

