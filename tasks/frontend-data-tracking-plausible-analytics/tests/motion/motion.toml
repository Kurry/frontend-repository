[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "After applying a breakdown filter, completion is apparent from the filter pill and the updated metric tiles and chart"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Breakdown rows and buttons show distinct hover and focus treatments (a hover wash versus a focus ring), not one shared highlight standing in for both"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "The chart bars animate their height with a short eased transition when the segment, site, or date range changes rather than swapping instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Pressed feedback on buttons and the theme toggle appears immediately on pointer-down, before the resulting recompute finishes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "The core flow (choose site, choose date range, apply a row filter, clear it) is completable with the keyboard alone and, equivalently, with the pointer alone, reaching the same outcome"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "4_6"
description = "Applying and clearing a filter must go through the real row-button and clear controls, not only through a WebMCP or state shortcut, and the visible pill tracks that interaction"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "No interactive control responds to a pointer click but not to Enter or Space while focused (or vice versa), leaving a step reachable by only one input method"
type = "binary"
weight = 1.0
negate = true
