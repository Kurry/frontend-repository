[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The dashboard is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load"
description = "No console errors, warnings, or hydration mismatch messages appear on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_during_exercise"
description = "No console errors or warnings appear during a full exercise including export drawer open and format tab switches"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_filter_responsive"
description = "Rapid repeated filter, sort, site, theme, compare, and ceiling changes stay responsive with no hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "no_post_hydration_flash"
description = "After first paint there is no post-hydration content flash: the shell does not visibly re-render or shift as the app becomes interactive"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "export_preview_regenerates_smoothly"
description = "Opening the export drawer and switching between Stats JSON and Breakdown CSV regenerates the preview without freezing the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "direct_url_full_shell"
description = "Loading the served URL directly always renders the full dashboard shell promptly"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "import_does_not_freeze"
description = "Importing a Stats JSON report completes without freezing the UI for multiple seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "theme_switch_responsive"
description = "Theme toggle recolors surfaces without multi-second jank"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "add_site_submit_responsive"
description = "Add site submit updates the selector without a multi-second hang"
type = "binary"
weight = 1.0

