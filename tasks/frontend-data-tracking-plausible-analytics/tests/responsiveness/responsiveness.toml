[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "mobile_single_column_stack"
description = "At mobile width the metric tiles, chart, and breakdown panels reflow into a single stacked column preserving metrics-then-chart-then-panels hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "top_controls_reachable_mobile"
description = "At mobile width the site, date-range, clear-filter, undo, redo, compare, ceiling, and export controls stay reachable without horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "no_clip_at_375"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrollbar appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "export_drawer_usable_375"
description = "The export drawer stays fully visible and operable at 375 pixel width rather than rendering off-screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "ceiling_and_compare_usable_375"
description = "The bounce-rate ceiling control and Compare previous control stay fully visible and operable at 375 pixel width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "desktop_three_column_panels"
description = "At desktop width the three breakdown panels appear in a three-column row under the trend chart"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "centered_max_width"
description = "On a wide viewport dashboard content stays within a centered max width near 1120px rather than stretching edge to edge"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "sticky_top_bar_usable"
description = "The sticky top bar remains usable across viewport widths without overlapping metric numbers unreadably"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "panels_readable_tablet"
description = "At tablet width breakdown panel names and counts remain readable without overlapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "theme_toggle_reachable_mobile"
description = "The theme toggle remains reachable and operable at 375 pixel width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "goals_funnel_custom_range_usable_375"
description = "At 375px width the Goals panel, the funnel, the Segments menu and Save segment control, the custom date-range from/to inputs, and each panel's per-panel export control remain fully visible and operable in the stacked column without page-level horizontal scrolling"
type = "binary"
weight = 1.0

