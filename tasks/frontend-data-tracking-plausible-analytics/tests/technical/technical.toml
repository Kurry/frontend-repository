[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "filter_ceiling_compare_restored"
description = "After applying a filter, setting a non-default bounce-rate ceiling, and enabling compare previous, a reload restores the pill, ceiling, compare chips, and recomputed tiles from client storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "local_resources_load_clean"
description = "Loading the dashboard and clicking a breakdown row loads all required local resources with no 4xx or 5xx responses (ignoring an automatic favicon probe)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "console_clean_full_exercise"
description = "A full exercise (filter, clear, sort, site, theme, compare, ceiling, Add site, open export, copy, import) completes with no console errors, warnings, or unhandled rejections"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "reload_renders_clean"
description = "A full reload of the dashboard re-renders cleanly without a blank page, error overlay, or hydration failure flash"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "shared_state_coherence"
description = "Metric tiles, trend, panels, compare chips, High bounce label, and both export previews derive from one shared state so a filter or period change updates them consistently"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "selectors_keyboard_operable"
description = "The site, date-range, and sort selectors open with the keyboard, move through options with arrow keys, commit with Enter, and close with Escape, with a visible focus ring"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "dialog_and_drawer_focus_trap"
description = "The Add site form and the export drawer trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "validation_exposed_assistive"
description = "Inline validation messages in Add site, bounce-rate ceiling, and import are exposed in the accessibility tree, not shown visually only"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "interactive_within_two_seconds"
description = "The dashboard is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "rapid_interaction_no_hangs"
description = "Rapid repeated filter, sort, site, theme, compare, and ceiling changes stay responsive with no hangs, dropped interactions, or stale panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "hydration_clean_console"
description = "The console shows no hydration mismatch errors or warnings on first load, and none appear during a full exercise of the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "deep_link_parity_no_placeholder_flash"
description = "Loading the root URL directly renders the same complete dashboard as in-app navigation, with no missing panels and no flash of placeholder content after first paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "persistence_mandated_fields"
description = "After configuring site, range, sort, theme, filter stack, saved segments, added sites, added goals, bounce-rate ceiling, visitor floor, and compare previous, a reload restores those fields from localStorage or equivalent client storage as mandated for this framework-rebuild task"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "stats_json_schema_keys_present"
description = "The Stats JSON export preview includes the required keys schema_version, site, period, filters, saved_segments, compare_previous, bounce_rate_ceiling, visitor_floor, results, timeseries, breakdowns, goals, funnel, and sites with schema_version exactly plausible-stats-v1, and each goals entry includes name, goal_type, and match_key"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.21"
name = "api_shaped_form_validation_gates"
description = "Add site, Add goal, and Save segment forms surface inline per-field errors before submit and keep submit disabled until valid against their field contracts (site name/domain/timezone; goal name/goal_type/match_key; segment name plus non-empty filters)"
type = "binary"
weight = 1.0

