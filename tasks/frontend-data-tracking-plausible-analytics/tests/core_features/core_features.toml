[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "dashboard_loads_without_auth_gate"
description = "On load, the root URL shows the analytics dashboard (metric tiles, a Visitors chart, and Top Sources / Top Pages / Countries panels) with no login, signup, SSO, or invite gate"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "default_metric_tiles_exact_values"
description = "On load, the four metric tiles read exactly Unique visitors 16,840, Total pageviews 47,220, Bounce rate 44%, Visit duration 98s"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "default_breakdown_rows_exact_values"
description = "On load, Top Sources shows Google 7,200, Direct 4,800, Twitter 1,600, Newsletter 980; Top Pages shows / 12,800, /pricing 5,600, /blog 3,900, /docs 2,800; Countries shows United States 6,400, United Kingdom 2,400, Germany 1,900, Canada 1,200 — top four rows per panel, name left and count right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "trend_chart_bar_per_bucket"
description = "On load, the Visitors chart below the metric tiles renders one bar per time bucket rising left to right, consistent with the same seeded data the metric tiles show"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "google_filter_pill_and_tiles"
description = "After clicking the Google row in Top Sources, a filter pill reading Source: Google appears and all four metric tiles change away from their unfiltered values (16,840 / 47,220 / 44% / 98s) to the Google segment's numbers"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "filtered_panels_recompute"
description = "After applying the Google source filter, the Top Pages and Countries panels recompute to different row values than the unfiltered view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "latest_filter_replaces_previous"
description = "After clicking a Countries row while a source filter is active, only one filter pill is shown (the latest, Country-dimension) rather than two stacked filters"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "pill_and_clear_control_both_remove_filter"
description = "Both removal paths work: clicking the filter pill itself and clicking the Clear filter control each remove the active segment filter, returning the metric tiles to 16,840 / 47,220 / 44% / 98s with no stale filter pill left behind"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "date_range_change_recomputes_together"
description = "After changing the date range to Last 7 days, the metric tiles and the trend chart recompute to different values and bars, with no leftover rows from the previous range in any panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "site_switch_recomputes_and_clears_filter"
description = "After changing the site to shop.example.com, the metric tiles and all three breakdown panels update together and any active filter pill is cleared"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "sort_name_az_reorders_panels"
description = "After changing the sort to Name A-Z, the rows in all three breakdown panels reorder alphabetically"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "breakdown_row_keyboard_filter"
description = "When a breakdown row is reached by keyboard focus, it shows a visible focus indicator, and pressing Enter or Space applies its filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "filter_persists_across_reload"
description = "After applying a filter and reloading the page, the filter pill and its recomputed metric tiles are restored from client storage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "theme_toggle_recolors_everything"
description = "When the theme toggle is used, every surface, text color, and the chart bars recolor between the light and dark themes and remain legible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "hardcoded_segment_numbers"
description = "Two different segment filters (e.g. Google and Direct) render identical metric tile numbers, revealing a single hardcoded set of values reused for every filter instead of computation from the seeded data"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "stale_numbers_or_pill_after_refilter"
description = "After selecting a new breakdown row, the previous segment's numbers or a stale second filter pill remain visible once the view recomputes"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "add_site_inline_validation_gates_submit"
description = "In the Add site form, an empty site name, empty/malformed domain, or missing timezone shows an inline validation message naming that specific field before any submit, and the submit control stays disabled until name, domain, and timezone are all valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "add_site_flow_new_site_dashboard"
description = "Starting from the dashboard: open Add site, fill a valid name, domain, and timezone, and submit — the form closes, the site selector's entry count increases by exactly one, selecting the new site shows that site's own dashboard (for an unseeded site: zero-value metric tiles and empty breakdown panels with an explanatory message), and Stats JSON export includes that site's domain, name, and timezone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "double_submit_adds_one_site"
description = "Double-activating the Add site submit control in quick succession adds exactly one new entry to the site selector, measured as a count delta of one immediately around the action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "malformed_domain_still_adds_site"
description = "Submitting the Add site form with an empty or malformed domain still adds an entry to the site selector, or leaves the selector count unchanged without any inline message naming the domain field"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "sort_reversal_round_trip"
description = "Switching the sort from most visitors to fewest visitors reverses each breakdown panel's row order, and switching back to most visitors restores the original order in all three panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "segment_filter_chain_all_surfaces"
description = "Scripted from the default example.com / Last 30 days view: clicking the Google row in Top Sources shows a Source: Google pill, changes all four metric tiles away from 16,840 / 47,220 / 44% / 98s, visibly redraws the trend chart bars, and recomputes the Top Pages and Countries rows, all without a reload; activating Clear filter then restores every one of those surfaces to the exact unfiltered values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "multi_facet_reload_round_trip"
description = "After selecting a non-default site, date range, and sort, applying a segment filter, switching the theme, setting a non-default bounce-rate ceiling, and turning compare previous on, a full page reload restores the same site, range, sort, theme, filter pill, ceiling, compare chips, and recomputed numbers — all facets coherently, never a mix of restored and reverted facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "seeded_selector_breadth"
description = "The site selector lists at least three selectable sites and the date-range selector offers at least four date ranges, each producing a non-empty dashboard when selected on the default site"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "range_change_clears_active_filter_chain"
description = "Scripted with the Source: Google filter active on example.com: changing the date range to a different range recomputes the metric tiles, trend chart, and all three breakdown panels together for the new range, clears the segment filter and its pill, and leaves no rows from the previous selection in any panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "sites_api_field_contract_rejects_protocol_domain"
description = "Entering a domain that includes a protocol such as https://, a path, a port, uppercase letters, or whitespace shows an inline validation message naming the domain field, keeps submit disabled or rejects submit, and does not add a site to the selector"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "timezone_enum_required_on_add_site"
description = "The Add site form requires timezone to be one of UTC, America/New_York, Europe/London, or Asia/Tokyo; leaving it unset shows an inline message naming the timezone field and adds no site"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "compare_previous_shows_percent_chips"
description = "Turning Compare previous on shows a signed percent-change chip on each of the four metric tiles; turning it off removes every chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "compare_chips_change_with_period"
description = "With Compare previous on, switching from one date range to another changes at least one percent-change chip value"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "bounce_ceiling_toggles_high_bounce_label"
description = "On example.com Last 30 days (bounce rate 44%), setting the bounce-rate ceiling to 40 shows a High bounce text label on the bounce-rate tile; setting the ceiling back to 60 removes that label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "bounce_ceiling_out_of_bounds_rejected"
description = "Entering a bounce-rate ceiling below 0 or above 100 shows an inline validation message naming the bounce-rate ceiling field and does not change the High bounce label state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "undo_redo_add_site_round_trip"
description = "After adding a site, Undo restores the prior site-selector count and removes the new domain; Redo re-adds it; Undo and Redo show enabled/disabled states matching whether a step is available"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "export_drawer_stats_json_schema"
description = "Opening Export report shows Stats JSON and Breakdown CSV tabs; the Stats JSON preview includes schema_version exactly plausible-stats-v1 plus site, period, filters, compare_previous, bounce_rate_ceiling, results, timeseries, breakdowns, and sites keys, with results values matching the four metric tiles"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "breakdown_csv_header_and_rows"
description = "The Breakdown CSV preview starts with the header line dimension,name,visitors and includes one data line per currently shown Top Sources, Top Pages, and Countries row using dimension values source, page, and country"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "export_reflects_session_filter_mutation"
description = "After applying the Google source filter, the Stats JSON preview's filters array and results values match the filtered metric tiles before any copy or download; clearing the filter updates the preview back to the unfiltered values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "export_copy_and_download_controls"
description = "In the export drawer, Copy writes the visible preview text to the clipboard and shows a brief copied confirmation, and Download starts a file download of that same preview text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "import_stats_json_round_trip"
description = "After mutating the dashboard (add a site or apply a filter), exporting Stats JSON and importing that same JSON restores the site list, selected site, filter pill, metric tiles, ceiling, compare mode, and both export previews to the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "export_omits_session_mutations"
description = "After applying a segment filter or adding a site, the Stats JSON or Breakdown CSV preview still shows the pre-mutation unfiltered default numbers, or the new site is absent from the sites array, so the export text fails to include the session's visible work"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.51"
name = "malformed_import_mutates_dashboard"
description = "Importing malformed Stats JSON or JSON missing schema_version, results, or sites changes the site count or filter state as if the import succeeded, or clears undo history without showing an inline error naming the import field"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core dashboard functionality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
