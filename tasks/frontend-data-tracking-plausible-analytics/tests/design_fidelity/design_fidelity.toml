[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "overview_matches_dashboard_shell"
description = "Relative to overview.png, the built app shows the same overall dashboard shell: top bar, metric tiles, trend chart, and breakdown panels in that vertical order"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "metric_tile_arrangement"
description = "Relative to the reference screenshots, four summary metric tiles appear in a horizontal row above the trend chart at desktop width"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "breakdown_panels_present"
description = "Relative to the reference, Top Sources, Top Pages, and Countries panels are present under the chart"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "indigo_accent_alignment"
description = "Relative to the reference, indigo accent treatment appears on interactive emphasis (logo, active filter, bars) over a neutral slate palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "text_wins_over_screenshots"
description = "Where a screenshot and the instruction text conflict, the running app follows the instruction text (including Export report, Compare previous, and bounce-rate ceiling controls even if absent from screenshots)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "card_surfaces_similar"
description = "Metric, chart, and panel cards use light bordered rounded surfaces similar to the reference composition"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "top_bar_brand_cluster"
description = "The top bar brand cluster includes a logo mark and Plausible Analytics title similar to the reference hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "segment_filter_pill_visible"
description = "When a segment is applied, a filter pill is visible in a placement consistent with the reference filter treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "chart_dominates_width"
description = "The visitors trend chart spans the content width and stands taller than the breakdown panels, matching the reference emphasis"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "no_login_gate_vs_reference"
description = "The first screen is the dashboard itself, not a login or marketing gate absent from the reference"
type = "binary"
weight = 1.0

