[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the terminal portfolio becomes interactive within 2 seconds — boot can be dismissed and the command prompt accepts input."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_hardened_exercise"
description = "No console errors or warnings appear during a full exercise: dismissing boot, running section commands, creating/editing/deleting a project, batch featured/delete, undo/redo, Config Studio identity/skills, export/import, profiles, switching themes and modes, filtering/sorting the board, and accepting or declining cookie consent."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "command_output_responds_under_100ms"
description = "After the thinking indicator, typed slash commands begin revealing output with UI response in under 100ms from key commit (perceived immediate start of the result path)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "thinking_indicator_while_command_resolves"
description = "While a slash command resolves, a short thinking indicator is visible before the formatted output block — not a blank hang with no feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_projects_board_scrolls_smoothly"
description = "With at least 6 seeded projects listed in Projects Board and /work, scrolling the board and switching filters shows no perceived lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_output_reveal"
description = "During staggered CLI output reveal or skill-bar fill, the prompt and mode toggle remain interactive — the UI does not freeze until animations finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "easter_egg_canvases_hold_stable_frame_rate"
description = "Driven through real UI paths (/konami or Konami keys, /matrix), confetti and matrix canvases animate briefly at a stable frame rate without sustained hitching, then clear."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_typing_never_hangs"
description = "Rapid typing and quickly issued back-to-back commands stay responsive with no dropped characters, hangs, or frozen prompt."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_shell_session_stable"
description = "After an extended session of many commands, theme switches, creates, and deletes, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_boot_settle"
description = "After boot dismiss and first interactive paint, no visible layout jumps occur; the terminal window and wallpaper hold their space as fonts and chrome settle."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before boot can be dismissed or the command prompt can accept input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_shell_flows"
description = "Console errors, warnings, or unhandled rejections appear during boot dismiss, slash commands, project CRUD, theme/mode switch, board filter, or consent flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "command_or_mode_transition_blocks_ui"
description = "CLI output reveal or Terminal↔Board mode switch blocks the main thread so subsequent keystrokes queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "thinking_path_hangs_ui"
description = "The thinking indicator path hangs or freezes the UI until the command finishes, leaving the prompt unusable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "board_janks_on_scroll_or_filter"
description = "Scrolling Projects Board or toggling status/tag filters produces sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_prompt_input"
description = "While staggered output reveal, skill-bar fill, or easter-egg canvases run, the command prompt ignores typed characters."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_shell"
description = "The UI blocks rendering of wallpaper and terminal chrome until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_commands"
description = "Rapid back-to-back commands or repeated easter-egg triggers cause visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no wallpaper or terminal shell skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid typing, back-to-back commands, or after deleting all projects and recreating."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.11"
name = "export_recompile_stays_responsive"
description = "Export preview recompiles promptly after project or identity mutations with no multi-second freeze of the shell or dropped prompt input."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n11"
name = "export_mutation_freezes_shell"
description = "After a create or identity save, the shell freezes for multiple seconds while Export Center recompiles."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
