[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.2"
name = "2_2"
description = "No browser storage is used for persistence: localStorage and sessionStorage remain empty after a full exercise of the app, and a reload returns the seeded state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "2_4"
description = "Running a section command updates the document title without a full document navigation"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "2.5"
name = "reload_resets_to_seeded_baseline"
description = "After creating a project, changing theme, featuring a pin, and editing identity, a plain reload returns the app to its seeded projects, skills, theme, and identity with empty undo stacks — no browser storage persistence."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "export_import_round_trip_technical"
description = "Exporting Portfolio JSON then re-importing that same document reconstructs the same visible project names, statuses, tags, years, featured flags, skills, and identity fields without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "api_shaped_validation_blocks_invalid_payload"
description = "Invalid API-shaped payloads are rejected observably: empty name, uppercase slug, status outside shipped/wip/archived, year outside 2000 to 2100, skill proficiency outside 0 to 100, and featured count above 3 each show field-named validation and mutate no collection."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "shared_state_across_modes_and_export"
description = "Projects Board, /work, Config Studio, and Export Center all read the same live collections: a create or identity save updates every surface without requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "consent_reflected_in_privacy_and_export"
description = "Cookie-consent Accept or Decline updates /privacy output and the Portfolio JSON consent field to accepted or declined; before any choice both read not_set."
type = "binary"
weight = 1.0

