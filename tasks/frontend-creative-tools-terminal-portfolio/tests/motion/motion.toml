[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "required_hover_animations_ease"
description = "Verified by real pointer hover: titlebar dots ease opacity on hover, project cards/rows ease border-color and background, autocomplete rows highlight on hover/active, and social/close buttons ease on hover — transitions ease rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "CLI/Board mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "/skills prints proficiency bars that animate from zero width to their target width"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "The Konami sequence or /konami fires a confetti burst and /matrix starts a green-rain canvas that plays briefly then clears"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "boot_typewriter_cadence"
description = "On a fresh page load, the boot sequence prints its status lines sequentially with a typewriter cadence — lines appear one after another over time, not all at once in a single paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "post_boot_enter_animation"
description = "After dismissing boot via Enter/click, the ASCII name art and welcome box fade or slide in rather than popping, and the command prompt takes focus"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "thinking_then_staggered_reveal"
description = "Typing a section command shows a brief thinking indicator, then the command's output block reveals with a staggered animation rather than appearing fully formed in one frame"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "board_card_enter_exit_animation"
description = "Verified through the real UI create and delete paths (not a state shortcut): creating a project animates its new card into the Projects Board, and deleting a project animates its card out rather than removing it instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "feedback_lines_fade_in"
description = "Validation and confirmation feedback lines appear with a brief fade rather than popping in fully opaque"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled on a fresh load, staggered/enter animations are disabled or substantially reduced while the app remains fully usable"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.12"
name = "export_tab_and_copy_motion"
description = "Verified through real UI controls: switching Export Center format tabs eases rather than hard-cuts, and Copy confirmation briefly changes state before resetting"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "mode_switch_includes_config_studio"
description = "Switching among Terminal CLI, Projects Board, and Config Studio updates the terminal body without a full reload and without a hard visual pop of the entire window"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "export_and_config_surfaces_fade_in"
description = "Opening Export Center and opening Config Studio through their real commands or mode controls gives each surface a short opacity entrance transition rather than making the complete surface appear instantly"
type = "binary"
weight = 1.0

