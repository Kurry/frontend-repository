[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "required_hover_animations_ease"
description = "Verified by real pointer hover: titlebar dots ease opacity on hover, project cards/rows ease border-color and background, autocomplete rows highlight on hover/active, and social/close buttons ease on hover — transitions ease rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "CLI/Board mode switches update without full reload and keep hover feedback"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "4_3"
description = "Omits hover washes on project rows or chrome so the terminal feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "/skills prints proficiency bars that animate from zero width to their target width"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "4_5"
description = "The Konami sequence or /konami fires a confetti burst and /matrix starts a green-rain canvas that plays briefly then clears"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "boot_typewriter_cadence"
description = "On a fresh page load, the boot sequence prints its status lines sequentially with a typewriter cadence — lines appear one after another over time, not all at once in a single paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "post_boot_enter_animation"
description = "After dismissing boot via Enter/click, the ASCII name art and welcome box fade or slide in rather than popping, and the command prompt takes focus"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "thinking_then_staggered_reveal"
description = "Typing a section command shows a brief thinking indicator, then the command's output block reveals with a staggered animation rather than appearing fully formed in one frame"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "board_card_enter_exit_animation"
description = "Verified through the real UI create and delete paths (not a state shortcut): creating a project animates its new card into the Projects Board, and deleting a project animates its card out rather than removing it instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "feedback_lines_fade_in"
description = "Validation and confirmation feedback lines appear with a brief fade rather than popping in fully opaque"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.11"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled on a fresh load, staggered/enter animations are disabled or substantially reduced while the app remains fully usable"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.12"
name = "export_tab_and_copy_motion"
description = "Verified through real UI controls: switching Export Center format tabs eases rather than hard-cuts, and Copy confirmation briefly changes state before resetting"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "mode_switch_includes_config_studio"
description = "Switching among Terminal CLI, Projects Board, and Config Studio updates the terminal body without a full reload and without a hard visual pop of the entire window"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n2"
name = "export_tabs_hard_cut_only"
description = "Export Center tab switches and Copy confirmation snap with no transition or feedback motion at all"
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable motion or microinteraction defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
