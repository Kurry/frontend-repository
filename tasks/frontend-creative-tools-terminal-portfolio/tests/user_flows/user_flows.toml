[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_project_updates_all_surfaces"
description = "Create flow: submitting a valid new project through the in-terminal create path increases the /work listing count by exactly one, shows a new card with the correct status badge in Projects Board, resolves a new per-project shortcut to that project detail card, and adds the project name to the Portfolio JSON export preview — all without a reload; reloading then returns the app to its seeded projects only."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_inline_validation"
description = "Create flow: submitting with an empty project name or an uppercase slug shows immediate inline validation naming the offending field and its contract rule, and the projects count stays unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "rename_project_updates_all_surfaces"
description = "Edit flow: renaming a seeded project updates that same record everywhere it appears — the Projects Board card, the /work listing row, the project detail card, its autocomplete entry, and the export previews — without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_project_updates_all_surfaces"
description = "Delete flow: deleting a project removes its card from Projects Board, drops the /work listing count by exactly one, makes its former shortcut print a command-not-found line, and removes its name from Portfolio JSON and Terminal Config previews."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "theme_and_mode_switch_retains_theme"
description = "Theme and mode flow: running /retro recolors the terminal, /themes marks retro as the active swatch, switching through Projects Board and Config Studio keeps retro applied, and Theme CSS export shows the retro data-theme block — no step reloads the document."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting every project, the empty projects state is clear and visible in both Projects Board and /work output."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filter_narrows_and_clears_exactly"
description = "Filter and sort flow: applying a status, tag, or featured filter in Projects Board narrows the visible cards; clearing restores the full collection exactly; switching name sort A to Z versus Z to A reverses order; a project created while a matching filter is active appears immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "red_dot_close_and_reopen_preserves_workflow"
description = "Closing the terminal with the red traffic light shows the exit overlay; Reopen restores the terminal with output history and theme intact so the workflow continues without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "cookie_consent_records_choice"
description = "After boot, the cookie-consent banner Accept or Decline records the choice in session state (banner dismisses accordingly) without navigating away or throwing when analytics is absent."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "unknown_command_recovers_without_reload"
description = "Recovery: an unknown command prints a command-not-found hint and leaves the prompt usable for the next command — no dead end requiring a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: create Northline Atlas with valid required fields, confirm Portfolio JSON contains Northline Atlas, Copy the JSON, delete Northline Atlas, Import that payload, and confirm Northline Atlas returns on the board and in /work with the same status, tags, and year."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "undo_round_trip_flow"
description = "Undo round-trip: delete a project via the UI, confirm it is gone from board and export, Undo once to restore card, shortcut, and export entry, then perform a new create and confirm Redo is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "config_studio_identity_skills_flow"
description = "Config Studio flow: saving a valid new displayName and email updates /about and /email plus identity fields in Portfolio JSON and Terminal Config; creating a skill with proficiency 72 updates /skills and the Portfolio JSON skills array."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "featured_batch_and_profile_flow"
description = "Featured and profile flow: featuring two projects shows them in featuredSlugs; Batch delete of two selected projects removes exactly those two; Save profile then change theme and re-apply restores the saved theme and featured pins."
type = "binary"
weight = 1.0

