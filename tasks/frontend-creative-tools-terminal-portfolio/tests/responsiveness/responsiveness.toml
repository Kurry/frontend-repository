[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable terminal portfolio: wallpaper, terminal window, prompt, and mode toggle remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, traffic lights, mode toggle, consent Accept/Decline, board filters, and the command input present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Terminal output, welcome-box labels, and prompt text remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no content clips or overflows the viewport, and the command input remains visible and usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "terminal_expands_below_768"
description = "At widths of 768px and below the terminal window expands to nearly the full viewport width and the two-column welcome box stacks into one column."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "welcome_box_stacks_logically"
description = "At 375px width, the welcome box capabilities and navigation columns reflow into a logical single-column stack without covering each other."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At 375px width, tap/click activation works on traffic lights, mode toggle, board filters, consent buttons, and the command prompt path (including boot dismiss via touch)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "board_and_export_scale_narrow"
description = "Projects Board card grid reduces to a single column at narrow widths without losing status badges, featured indicators, or filters, and Export Center / Config Diff scroll within their containers rather than forcing page-level horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "prompt_export_config_operable_375"
description = "At 375px width, the command input, autocomplete dropdown, Export Center preview, Config Studio form, cookie-consent banner, and exit/Reopen overlay stay fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the terminal-over-wallpaper layout breaks: overlapping chrome, overflow, or an unusable stacked pile."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px width, traffic lights, mode toggle, consent buttons, board filters, or the command input are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "terminal_text_unreadable_on_mobile"
description = "At 375px width, welcome labels, command output, or prompt text are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 375px or 1440px, terminal content is cropped or unnecessary scrollbars appear for content that should fit the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "welcome_or_board_missing_below_768"
description = "At 768px and below, the welcome box, Projects Board filters, or command prompt is missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_prompt"
description = "Fixed-position titlebar, consent banner, or overlay obscures the command input so it cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px width, welcome columns, board cards, and chrome overlap into an unusable stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "mobile_board_filters_inoperable"
description = "At 375px width, Projects Board status/tag filters or mode toggle cannot be opened or operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "board_grid_static_size_overflows"
description = "The Projects Board card grid or an easter-egg canvas uses a static size that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "At 375px or 1440px, required controls (command input, traffic lights, mode toggle, or board filters) disappear from the layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_center_usable_at_375"
description = "At 375px width, Export Center tabs, monospaced preview, and Copy/Download remain usable without horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n11"
name = "export_or_config_clipped_at_375"
description = "At 375px width, Export Center or Config Studio content clips off-screen or forces horizontal page scrolling."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
