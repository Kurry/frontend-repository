[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "natural_language_intent_beyond_aliases"
description = "Beyond required aliases and fuzzy matching, natural-language intent matching maps a typed phrase (for example 'show my work' or 'email me') to the closest command with a visible resolution — bonus polish over bare slash commands."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "easter_egg_canvas_craft_beyond_minimum"
description = "Konami confetti and /matrix green-rain go beyond a minimal flash — layered particles or denser rain that still clear after a moment, verified through the real key/command path (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "guided_boot_narrative_beyond_status_lines"
description = "The boot sequence includes a brief narrative beat beyond sequential status lines (for example persona taglines or staged capability reveals) that still dismisses on Enter/click/touch (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "skills_bars_extra_readout"
description = "Beyond animating proficiency bars to width, /skills adds an extra usability cue such as numeric percents, tier labels, or category grouping that remains browser-observable (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "history_autocomplete_power_user_polish"
description = "Command history and autocomplete include an extra power-user affordance beyond up/down and Tab/Enter — for example reverse-search, recent-command chips, or fuzzy ranking highlights (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the in-memory session, the app offers a small personalization beyond requirements (for example remembering last mode or last theme swatch highlight until reload) without using browser storage APIs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "branded_designer_cli_narrative"
description = "ASCII name art, welcome box, and portfolio command copy read as a cohesive fictional designer CLI brand rather than generic unstyled shell chrome (bonus execution quality)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "glass_or_retro_craft_beyond_token_swap"
description = "Glass and/or retro theme craft goes beyond a bare background swap — cohesive accent treatments across titlebar, prompt, badges, and board cards without inventing a conflicting second product (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "local_mono_wallpaper_enhancement"
description = "A genre-appropriate local enhancement (high-quality bundled JetBrains Mono rendering and atmospheric wallpaper assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_terminal_portfolio_feel"
description = "The overall experience feels competition-grade: boot cadence, CLI thinking/reveal, board density, and theme craft read as a professional terminal portfolio rather than a wired demo (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_plain_text_shell_only"
description = "The shipped UI is a bare unstyled text area with no atmospheric wallpaper, traffic-light window chrome, or themed terminal immersion."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_dashboard_template_look"
description = "The experience is a generic dashboard/card-grid template that ignores the specified terminal-over-wallpaper CLI portfolio composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.11"
name = "config_diff_craft_beyond_minimum"
description = "Config Diff goes beyond a bare text dump — side-by-side or clearly marked changed treatments for identity, projects, skills, theme, and featured pins (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.12"
name = "terminal_config_interop_polish"
description = "Terminal Config and Theme CSS read as drop-in interoperable artifacts a designer could paste into a real shell/theme setup, not placeholder stubs (bonus)."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
