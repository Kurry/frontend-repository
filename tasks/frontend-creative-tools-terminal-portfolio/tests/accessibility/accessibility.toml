[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "keyboard_operable_all_primary_controls"
description = "After boot, every interactive control — traffic lights, mode toggle, board filters and sort, selection checkboxes, batch actions, featured toggles, consent buttons, undo/redo, export Copy/Download, Config Studio fields, and the command prompt — is reachable and operable with the keyboard alone, each showing a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "prompt_receives_focus_after_boot"
description = "After dismissing the boot sequence (Enter, click, or touch), the command prompt receives focus so typing immediately enters a command without an extra click."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "traffic_lights_have_accessible_labels"
description = "The macOS-style traffic-light window controls carry accessible names describing close, minimize, and maximize (not unlabeled colored dots alone)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "command_output_announced_via_live_region"
description = "New command output appended to the terminal is announced through an aria-live polite region (or equivalent) so assistive technology hears each result as it appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_explicitly_labeled"
description = "Project create/edit, identity profile, skill, and import form fields use explicit labels associated with each control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "autocomplete_keyboard_navigation"
description = "The autocomplete dropdown is navigable with up/down arrows, Enter or Tab selects the highlighted entry, and Escape closes it without changing the input value."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "terminal_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the terminal workspace) so assistive technology can navigate past wallpaper chrome to the interactive shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "readable_contrast_in_all_four_themes"
description = "Terminal text and primary controls keep readable contrast against the terminal background in all four themes — dark, light, retro, and glass."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "controls_use_button_semantics"
description = "Traffic lights, mode toggle, filter controls, consent buttons, and board interactive cards use button/role semantics with accessible names rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, boot typewriter cadence, post-boot ASCII/welcome enter, staggered CLI output reveal, and skill-bar width animations are removed or reduced to instant state changes while boot dismiss, commands, and mode switch remain completable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "validation_announced_live_region"
description = "Form and export validation messages are exposed through a polite live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "featured_not_color_alone"
description = "Featured indicators and status badges are conveyed by text or icon plus color, never color alone."
type = "binary"
weight = 1.0

