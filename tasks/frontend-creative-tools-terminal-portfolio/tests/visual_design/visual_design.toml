[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "Terminal-over-wallpaper composition with CLI and Projects Board density remains tool-like"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "Empty projects state is visually present when the collection is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Replaces the terminal with a static marketing portfolio and no command shell"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "/themes lists selectable theme swatches with the currently active theme visibly marked"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "The theme list or swatches give no indication of which theme is currently active"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.6"
name = "wallpaper_terminal_composition"
description = "A full-bleed atmospheric wallpaper renders behind a centered terminal window with a macOS traffic-light titlebar — one terminal-over-wallpaper composition, not a multi-section marketing landing"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "jetbrains_mono_throughout"
description = "Terminal text renders in the JetBrains Mono typeface (visible in computed font-family) consistently across prompt, output, and board surfaces, served from the app's own origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "four_themes_recolor_coherently"
description = "Each of the four themes — dark (default), light, retro, and glass — recolors the terminal background, text, accents, and window chrome as one coherent scheme, not a partial recolor that leaves some surfaces in the old theme"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "board_cards_show_status_and_featured"
description = "Projects Board mode renders dense project cards or rows inside the terminal body, each with a visible status badge and a featured indicator when featured"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "consistent_icon_style"
description = "Icons across social cards, window controls, and board badges share a single consistent visual style (stroke weight and family), with no mixed icon sets or raw mismatched glyphs"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "tablet_width_layout_stacks"
description = "At viewport widths of 768px and below, the terminal window expands to nearly the full viewport width and the two-column welcome box stacks into one column"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "mobile_375_no_overflow"
description = "At 375px viewport width, no content clips or overflows the viewport, no horizontal scrolling appears, and the command input remains visible and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "board_single_column_narrow"
description = "At narrow widths, Projects Board reduces its card grid to a single column without losing status badges or filter controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "help_descriptions_specific"
description = "/help command descriptions are specific to what each command actually prints, not generic filler repeated across entries"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "consistent_capitalization_convention"
description = "Headings, command output labels, and button text follow one consistent capitalization convention throughout the app"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.16"
name = "actionable_messages_and_empty_states"
description = "Error and validation messages name the problem and the fix, and empty states explain what belongs there and how to add it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "placeholder_filler_text_present"
description = "Lorem ipsum, 'TODO', template variable names, or other placeholder filler text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.18"
name = "coherent_fictional_portfolio_copy"
description = "Portfolio copy (about, philosophy, testimonials, project blurbs) reads as coherent original content for one consistent fictional designer identity, free of spelling and grammatical errors in prominent text"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.19"
name = "export_center_monospace_tabs"
description = "Export Center presents Portfolio JSON, Terminal Config, and Theme CSS as monospaced preview tabs with Copy and Download affordances inside the terminal composition"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.20"
name = "config_studio_dense_form"
description = "Config Studio shows a dense identity form, skills list with proficiency controls, featured pin summary, and Profiles list inside the terminal body rather than a separate marketing layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n5"
name = "export_center_missing_or_card_grid"
description = "Export Center is missing, or the artifact preview is a non-monospaced card grid that omits Portfolio JSON, Terminal Config, and Theme CSS text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
