[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting after boot: create a valid project, switch to Projects Board, apply a status filter, open Export Center, and run /retro; then reload. Confirm every facet coherently resets to the seeded baseline — only seeded projects, default theme, default mode/filters, and seed-matching export previews — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "filter_clear_reversal_proves_live_data"
description = "Filter-reversal proof (genre stand-in for sort reversal): in Projects Board apply a status filter and note the narrowed card set, then clear the filter. Confirm the full seeded collection returns exactly — proving the board is derived from live project data rather than two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "theme_and_filter_derived_view_sensitivity"
description = "Derived-view sensitivity: run /light and confirm terminal colors change, then apply a tag filter on Projects Board and confirm the visible card set changes meaningfully — not identical redraws regardless of theme or filter input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "create_echoes_in_work_board_and_shortcut"
description = "Cross-view echo: create a valid project named with a unique title; without reload confirm /work listing count increased by one, Projects Board shows a new card with that title and status badge, the new per-project shortcut opens that project detail card, and Portfolio JSON contains the title."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure the /work listing count, submit one valid new project, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_project_names_different_outcomes"
description = "Input-dependent output: create a project titled AlphaProbe, note board/detail text; then create a project titled BetaProbe. Confirm the two outcomes differ in the ways the inputs dictate (distinct cards/titles, not byte-identical hardcoded output)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_mode_flows"
description = "Interleaved-flow integrity: start the in-terminal create path (open form but do not submit), switch to Projects Board and back, then complete a separate valid create; confirm exactly one new project appears, mode switching still works, and neither flow corrupted the other's state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_projects"
description = "Edge-state round-trip: delete every project (empty state visible in Board and /work), then create two valid projects; confirm the empty state clears, both new cards appear, /work count is exactly two, and both shortcuts resolve."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_pipeline_ends_at_artifact_text"
description = "Full-pipeline probe: create a project named Northline Atlas, feature it, save identity displayName to Northline Operator, open Export Center — Portfolio JSON contains Northline Atlas and Northline Operator with featuredSlugs including the new slug, Terminal Config shows the matching display_name and featured line, and Theme CSS matches the active theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_probe"
description = "Round-trip probe: export Portfolio JSON after creating Northline Atlas, delete Northline Atlas, import the copied JSON, and confirm board, /work, featured state, and all three export tabs reconstruct the pre-delete Northline Atlas record."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_restores_export"
description = "Undo round-trip probe: delete a seeded project via the UI path (not a state shortcut), confirm absence from board and Portfolio JSON, Undo once, and confirm the card, shortcut, and export entry all return together."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "different_identity_inputs_different_exports"
description = "Input-dependent output: save identity displayName as AlphaStudio then export; save as BetaStudio then export — Terminal Config display_name and Portfolio JSON identity.displayName differ exactly as the inputs dictate."
type = "binary"
weight = 1.0

