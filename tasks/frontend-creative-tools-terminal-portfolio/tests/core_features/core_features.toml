[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load after dismissing boot, the terminal shows a live command prompt and welcome/output chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After opening Projects Board or running /work, at least 6 seeded projects are visible with names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating a project named 'Harbor Atlas' with valid required fields, the text 'Harbor Atlas' is visible in the projects list or board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding 3 new projects on top of the seed set, the projects list shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After filtering projects by status (e.g. wip) with mixed statuses present, only matching projects remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After editing a project name to 'Evening Terminal', the text 'Evening Terminal' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting a project, that project name is no longer visible in the projects list or board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After deleting all projects, an empty state is visible in Projects Board or /work output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After submitting create with an empty required project name, the projects count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After switching between Terminal CLI mode and Projects Board mode, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After running a theme command (/dark, /light, /retro, or /glass), documentElement theme classes update without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering project rows/cards, autocomplete rows, or titlebar controls, a visible hover wash or highlight appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "Typing an unknown slash-command (e.g. /nope) prints a visible command-not-found line with a hint rather than doing nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "Running /skills renders proficiency bars that animate from zero to their target width"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Clicking the red titlebar dot closes the terminal to an exit overlay with a Reopen control that restores it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Projects collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Projects list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Typing a section slash-command (/about, /work, /skills, etc.) echoes the command and prints its formatted output block, and quick-info commands (/email, /phone, /linkedin, etc.) print their own focused cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Typing into the prompt shows an autocomplete dropdown that filters as you type, and Tab or Enter completes the highlighted command"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "An unrecognized slash-command produces no visible output or error line (silent failure)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "boot_dismiss_reveals_shell"
description = "On a fresh load, a boot sequence prints sequential status lines, and pressing Enter (or click/touch) dismisses boot revealing ASCII name art, a two-column welcome box (capabilities + navigation), and a focused command prompt"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "help_lists_commands_grouped"
description = "Running /help prints the available commands grouped by section rather than a flat undifferentiated dump"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "arrow_history_recalls_commands"
description = "After running two different commands, pressing the up arrow at the prompt recalls the most recent command, and pressing up again recalls the earlier one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "fuzzy_and_intent_matching"
description = "Typing a bare word (e.g. 'work') or a natural-language phrase (e.g. 'show me your projects') resolves to the closest matching command's output instead of a command-not-found error"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.32"
name = "clear_command_empties_output"
description = "Running /clear empties the terminal output buffer, leaving a clean prompt ready for input"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.33"
name = "project_shortcut_opens_detail"
description = "Typing a seeded project's per-project shortcut command prints that project's detail card in the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "cookie_consent_records_choice"
description = "A cookie-consent banner appears after boot, and clicking Accept or Decline dismisses it and records the choice for the session without any console error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "create_form_inline_field_validation"
description = "The project create/edit form validates per field before submit: an inline message names each invalid field, and the submit control stays disabled or inert until all required fields are valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "create_flow_multi_surface_chain"
description = "Starting from the seeded state: create a valid new project through the in-terminal create path, then confirm without any reload that the /work listing count increased by exactly one (measured immediately before and after), a new card with the correct status badge appears in Projects Board, and the new per-project shortcut command resolves to the new project's detail card; then reload the page and confirm the app returns to its seeded projects only"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "edit_flow_multi_surface_chain"
description = "Rename a seeded project via the edit path, then confirm without a reload that the new name appears on its Projects Board card, in the /work listing row, on the project's detail card, and in its autocomplete entry, with the old name gone from all four surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "delete_flow_multi_surface_chain"
description = "Delete a seeded project, then confirm without a reload that its card is removed from Projects Board, the /work listing count dropped by exactly one (measured immediately before and after), and typing its former shortcut prints a command-not-found line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "filter_flow_round_trip_chain"
description = "In Projects Board with mixed statuses present: apply a status or tag filter and confirm only matching cards remain; create a new project matching the active filter and confirm it appears in the filtered view immediately; then clear the filter and confirm the full collection (including the new project) is restored exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "theme_mode_flow_chain"
description = "Run /retro and confirm the terminal recolors, run /themes and confirm retro is marked as the active swatch, then switch to Projects Board and back to Terminal CLI and confirm the retro theme is still applied — with no step causing a document reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "double_submit_adds_exactly_one"
description = "Double-activating the create submit control in quick succession adds exactly one project: the collection count increases by one and exactly one new card appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "history_arrow_on_fresh_prompt_inert"
description = "On a fresh session before any command has been typed, pressing the up arrow leaves the prompt unchanged with no visible errors and no console errors"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.43"
name = "reopen_restores_history_and_theme"
description = "After switching to a non-default theme and running several commands, closing the terminal with the red dot and pressing Reopen restores the terminal with its output history and the chosen theme intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "A specified core behavior of the app is broken or missing in a way that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (element, page state, console output) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
