[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load after dismissing boot, the terminal shows a live command prompt and welcome/output chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After opening Projects Board or running /work, at least 6 seeded projects are visible with names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After creating a project named 'Northline Atlas' with valid required fields, the text 'Northline Atlas' is visible in the projects list or board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding 3 new projects on top of the seed set, the projects list shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After filtering projects by status (e.g. wip) with mixed statuses present, only matching projects remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After editing a project name to 'Evening Terminal', the text 'Evening Terminal' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting a project, that project name is no longer visible in the projects list or board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After deleting all projects, an empty state is visible in Projects Board or /work output"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After submitting create with an empty required project name, the projects count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "three_modes_switchable"
description = "After switching among Terminal CLI, Projects Board, and Config Studio modes, the main canvas shows the selected mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After running a theme command (/dark, /light, /retro, or /glass), documentElement theme classes update without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "When hovering project rows/cards, autocomplete rows, or titlebar controls, a visible hover wash or highlight appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "Typing an unknown slash-command (e.g. /nope) prints a visible command-not-found line with a hint rather than doing nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "Running /skills renders proficiency bars that animate from zero to their target width"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Clicking the red titlebar dot closes the terminal to an exit overlay with a Reopen control that restores it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Projects collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "three_distinct_modes"
description = "At least three distinct views or interaction modes (Terminal CLI, Projects Board, Config Studio) are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Projects list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Typing a section slash-command (/about, /work, /skills, etc.) echoes the command and prints its formatted output block, and quick-info commands (/email, /phone, /linkedin, etc.) print their own focused cards"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Typing into the prompt shows an autocomplete dropdown that filters as you type, and Tab or Enter completes the highlighted command"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "An unrecognized slash-command produces no visible output or error line (silent failure)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "boot_dismiss_reveals_shell"
description = "On a fresh load, a boot sequence prints sequential status lines, and pressing Enter (or click/touch) dismisses boot revealing ASCII name art, a two-column welcome box (capabilities + navigation), and a focused command prompt"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "help_lists_commands_grouped"
description = "Running /help prints the available commands grouped by section rather than a flat undifferentiated dump"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "arrow_history_recalls_commands"
description = "After running two different commands, pressing the up arrow at the prompt recalls the most recent command, and pressing up again recalls the earlier one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "fuzzy_and_intent_matching"
description = "Typing a bare word (e.g. 'work') or a natural-language phrase (e.g. 'show me your projects') resolves to the closest matching command's output instead of a command-not-found error"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.32"
name = "clear_command_empties_output"
description = "Running /clear empties the terminal output buffer, leaving a clean prompt ready for input"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.33"
name = "project_shortcut_opens_detail"
description = "Typing a seeded project's per-project shortcut command prints that project's detail card in the terminal"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "cookie_consent_records_choice"
description = "A cookie-consent banner appears after boot, and clicking Accept or Decline dismisses it and records the choice for the session without any console error"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "create_form_field_contracts"
description = "The project create/edit form validates the API-shaped field contracts before submit: inline messages name each invalid field and rule (empty name, uppercase slug, status outside shipped/wip/archived, year outside 2000 to 2100, more than 5 tags), and submit stays disabled or inert until valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "create_flow_multi_surface_chain"
description = "Starting from the seeded state: create a valid new project through the in-terminal create path, then confirm without any reload that the /work listing count increased by exactly one (measured immediately before and after), a new card with the correct status badge appears in Projects Board, and the new per-project shortcut command resolves to the new project's detail card; then reload the page and confirm the app returns to its seeded projects only"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "edit_flow_multi_surface_chain"
description = "Rename a seeded project via the edit path, then confirm without a reload that the new name appears on its Projects Board card, in the /work listing row, on the project's detail card, and in its autocomplete entry, with the old name gone from all four surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "delete_flow_multi_surface_chain"
description = "Delete a seeded project, then confirm without a reload that its card is removed from Projects Board, the /work listing count dropped by exactly one (measured immediately before and after), and typing its former shortcut prints a command-not-found line"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "filter_flow_round_trip_chain"
description = "In Projects Board with mixed statuses present: apply a status or tag filter and confirm only matching cards remain; create a new project matching the active filter and confirm it appears in the filtered view immediately; then clear the filter and confirm the full collection (including the new project) is restored exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "theme_mode_flow_chain"
description = "Run /retro and confirm the terminal recolors, run /themes and confirm retro is marked as the active swatch, then switch to Projects Board and back to Terminal CLI and confirm the retro theme is still applied — with no step causing a document reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "double_submit_adds_exactly_one"
description = "Double-activating the create submit control in quick succession adds exactly one project: the collection count increases by one and exactly one new card appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "history_arrow_on_fresh_prompt_inert"
description = "On a fresh session before any command has been typed, pressing the up arrow leaves the prompt unchanged with no visible errors and no console errors"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.43"
name = "reopen_restores_history_and_theme"
description = "After switching to a non-default theme and running several commands, closing the terminal with the red dot and pressing Reopen restores the terminal with its output history and the chosen theme intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "duplicate_project_copy_suffix"
description = "Duplicating a selected project increases the visible count by exactly one and inserts a card whose name is the original name plus the suffix \" (copy)\", with the same status, tags, summary, and year, and a unique slug"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "name_sort_reverses_board_cards"
description = "Switching the Projects Board name sort from A to Z to Z to A reverses the visible card order relative to the other choice; switching back restores the previous order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "featured_toggle_persists_across_modes"
description = "Toggling a project featured flag on Projects Board shows the featured indicator on that card, and the same flag state remains after switching to Terminal CLI and back without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "batch_featured_three_projects"
description = "Selecting three Projects Board cards and activating Batch featured toggles the featured flag on all three at once when under the three-featured cap; the same three flags remain after switching modes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "batch_delete_decrements_by_selection"
description = "Selecting two projects and confirming Batch delete decreases the visible project count by exactly two and removes both cards from Projects Board and the export previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "undo_restores_delete"
description = "After deleting a project via the UI (shell command or board control), Undo restores that project card, shortcut, prior visible count, and its entry in the Portfolio JSON export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "redo_disabled_after_new_action"
description = "After Undo restores a deleted project, performing a new create clears the redo stack so Redo is disabled and cannot re-delete via redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "export_surface_three_formats"
description = "The Export Center (via /export or an Export control) offers Portfolio JSON, Terminal Config, and Theme CSS format tabs, each showing a monospaced live preview compiled from the current store"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "export_reflects_session_create"
description = "After creating a valid project with a distinctive name, that name appears in the Portfolio JSON export preview and its slug appears in Terminal Config when featured (or the project object is present when not featured) before any download or copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "export_omits_deleted_project"
description = "After deleting a project, that project name is absent from the Portfolio JSON export preview and from the Terminal Config preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "export_includes_theme_featured_identity"
description = "After running /retro, featuring a project, and saving a distinctive identity displayName, the Portfolio JSON preview includes theme retro, that project in featuredSlugs, and the new displayName under identity; Theme CSS shows a retro data-theme block"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "export_copy_and_download"
description = "Export Copy writes the visible preview text to the clipboard with a brief copied confirmation, and Download starts a file download of that same preview text for the active tab (portfolio.json, terminal.config, or theme.css)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.56"
name = "import_portfolio_json_applies"
description = "Importing a valid declared-portfolio JSON replaces the collection so visible project names, statuses, tags, years, featured flags, skills, and identity match the imported payload, and all three export tabs match that imported state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n44"
name = "export_omits_session_mutations"
description = "After a create, edit, delete, duplicate, featured toggle, batch action, identity save, skill edit, or theme change that is visible in the shell or board, the Export Center previews still omit that session mutation (stale or seed-only export text)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n45"
name = "undo_does_not_restore"
description = "After deleting or batch-deleting a project via the UI, Undo leaves the collection unchanged — the deleted projects stay gone from board and export"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n46"
name = "sort_identical_across_directions"
description = "Switching name sort between A to Z and Z to A leaves the Projects Board card order visually identical — a derived surface ignoring its inputs"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.57"
name = "portfolio_json_api_shaped_fields_visible"
description = "Portfolio JSON preview visibly includes schemaVersion 1.0 and the field names identity, theme, consent, projects, skills, featuredSlugs, and profiles with enum values drawn from the live session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "terminal_config_key_value_header"
description = "Terminal Config preview starts with the comment line # terminal-portfolio config and shows key = value lines for theme, display_name, email, location, and featured"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.59"
name = "theme_css_active_theme_block"
description = "Theme CSS preview shows a :root[data-theme=...] custom-properties block for the active theme with background, text, accent, and chrome token declarations"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.60"
name = "config_studio_identity_save"
description = "In Config Studio, saving a valid new displayName and email updates /about and /email output and the identity fields in Portfolio JSON and Terminal Config without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.61"
name = "skills_crud_updates_bars_and_export"
description = "Creating or editing a skill with proficiency 72 adds or updates a /skills bar that reaches that width and appears with proficiency 72 in the Portfolio JSON skills array"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.62"
name = "featured_fourth_rejected"
description = "With three projects already featured, attempting to feature a fourth shows a featured-limit validation message and leaves the fourth project unfeatured"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.63"
name = "named_profile_save_and_apply"
description = "Saving a named shell profile with a non-default theme and at least one featured project, then changing theme and clearing featured pins, then applying that profile restores theme, featured pins, and matching export preview values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.64"
name = "config_diff_shows_changes"
description = "After mutating identity or projects away from seed, Config Diff marks changed fields with a distinct changed treatment; with no mutations it shows an explicit no-differences state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.65"
name = "slug_uppercase_rejected"
description = "Submitting project create with a slug containing uppercase letters does not increase the projects count and shows validation naming the slug field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n47"
name = "export_formats_missing_config_or_css"
description = "Export Center lacks a live Terminal Config or Theme CSS preview tab, leaving only a partial artifact surface"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n48"
name = "form_payload_disagrees_with_export_record"
description = "After creating a valid project, the Portfolio JSON project object omits required contract fields (name, slug, summary, status, tags, year, featured) or shows values that disagree with the create form"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n49"
name = "featured_cap_not_enforced"
description = "Four or more projects simultaneously show featured indicators with no featured-limit validation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "A specified core behavior of the app is broken or missing in a way that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (element, page state, console output) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
