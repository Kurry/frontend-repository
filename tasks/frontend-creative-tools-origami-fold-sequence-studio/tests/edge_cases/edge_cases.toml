[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "edge_tangent_crease"
description = "A crease drawn exactly tangent to an existing vertex or edge does not erroneously split faces or produce degenerate polygons."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "edge_noncontiguous_layers"
description = "When a user attempts to select noncontiguous layers for a single fold, the app shows an error state and prevents the fold."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "edge_rehearsal_wrong_side"
description = "During rehearsal, an injected wrong-side action presents the user with an exact diagnostic and allows rewinding to a valid checkpoint."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "edge_incompatible_merge"
description = "Merging a branch into another is rejected unless their state checksums are equivalent, without silently discarding divergent history."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n5"
name = "edge_invalid_import_leak"
description = "When importing an invalid artifact dossier containing corrupt geometry or forged checksums, the app partially mutates state instead of rejecting the import atomically."
type = "binary"
negate = true
weight = 1.0
