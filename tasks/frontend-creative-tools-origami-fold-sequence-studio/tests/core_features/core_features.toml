[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "1.1"
name = "core_landmarks_crease_fold"
description = "The app supports drawing a crease using exact landmarks or coordinates, selecting layers, and committing the fold, resulting in split faces and correctly reflected geometry."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "core_invalid_geometry_rejection"
description = "A user action that results in nondegenerate faces or self-intersecting geometry displays an exact preview of the error but never mutates canonical state when rejected."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "core_step_remap_branch"
description = "Editing an earlier step allows remapping missing landmarks in descendants or branching the instruction sequence into a new timeline."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "core_annotation_placement"
description = "The user can place fold arrows, turn-over symbols, and explanatory text on a before/after diagram, with annotations visually bound to canonical geometry IDs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "core_rehearsal"
description = "The rehearsal mode allows scrubbing, pausing, and stepping through folds one at a time."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "core_export_dossier"
description = "Exporting a sequence produces a downloadable dossier containing canonical JSON, SVG instruction diagrams, CSV ledgers, and Markdown instructions."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "core_import_reconstruct"
description = "Importing a dossier exactly reconstructs the layer states, landmarks, geometries, and history timelines, matching the exported values."
type = "binary"
weight = 1.0
