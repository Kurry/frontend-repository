[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[dimension]
id = "core_features"
name = "Core Features"
description = "Core features implemented correctly."

[[criterion]]
id = "cf_1"
title = "Forecast contract composer creates valid forecasts"
description = "The forecast contract composer correctly defines and commits forecasts, rejecting past dates and ensuring probabilities sum properly."
weight = 1.0

[[criterion]]
id = "cf_2"
title = "Evidence and dependency graph"
description = "The user can bind exact source spans to forecasts and connect forecasts via conditional edges, highlighting affected items."
weight = 1.0

[[criterion]]
id = "cf_3"
title = "Commitments and amendments"
description = "Committing freezes state; changing probabilities creates a timestamped amendment; earlier versions are viewable."
weight = 1.0

[[criterion]]
id = "cf_4"
title = "Outcome packet and adjudication"
description = "Users select resolved, invalid, extended, or disputed outcomes. Categorical ones allow one winner."
weight = 1.0

[[criterion]]
id = "cf_5"
title = "Score and calibration views"
description = "Computes Brier score using last committed probability. Shows reliability bins and count/mean frequency."
weight = 1.0

[[criterion]]
id = "cf_6"
title = "Counterfactual and dependency lens"
description = "User can preview how another probability alters scores without committing. Shows waterfall decomposition."
weight = 1.0

[[criterion]]
id = "cf_7"
title = "Review workflow"
description = "Users pin evidence, write reviews, compare beliefs. Adjudication changes mark review stale."
weight = 1.0

[[criterion]]
id = "cf_8"
title = "Export canonical artifacts"
description = "Export produces a canonical Session JSON, a CSV ledger, and an SVG score report."
weight = 1.0

[[criterion]]
id = "cf_9"
title = "Import session JSON"
description = "Importing a valid Session JSON exactly reconstructs the application state."
weight = 1.0
