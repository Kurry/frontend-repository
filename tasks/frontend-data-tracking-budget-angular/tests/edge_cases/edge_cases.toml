[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_period_shows_empty_state"
description = "Navigating to a reporting period with no expenses shows a zeroed Total expenses figure, empty progress bars, and an empty Expenses table with a visible empty-state message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "expense_form_validates_field_contract"
description = "Submitting the add/edit expense dialog with an empty or non-positive amount, a missing or non-YYYY-MM-DD date, or no category shows inline validation naming each invalid field before commit and adds or changes no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Validation and import errors name the offending field and the problem rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "snackbar_confirms_mutations"
description = "Snackbar confirmations appear after add, update, delete, bulk actions, export copy, and import"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "empty_filter_shows_empty_state"
description = "Selecting a category filter that matches no expenses in the current period shows an empty-state message in the table region, and clearing the filter restores the full row set"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_after_destructive"
description = "After a destructive expense delete or bulk delete, Undo is enabled and can restore the prior Expenses rows and Dashboard totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "chart_tooltip_names_category"
description = "Hovering a spending-breakdown chart segment shows a tooltip naming the category and its amount"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Bottom-nav items, dialog actions, table actions, and form fields use semantic interactive elements (buttons, inputs, labels) rather than clickable bare divs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "dialogs_support_close_paths"
description = "The add/edit expense dialog and export drawer support Cancel/Close controls and Escape (and backdrop where applicable) to dismiss without applying a pending create"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_submit_and_empty_bulk_safe"
description = "Double-activating the dialog confirm creates or applies exactly one change; Bulk delete with no rows selected is unavailable (tray hidden or actions disabled)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "import_malformed_json_rejected"
description = "Importing malformed or empty JSON shows an inline error naming the problem and leaves the current expenses, categories, and totals unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "import_contract_invalid_rejected"
description = "Importing parseable JSON that fails the BudgetDocument field contract — missing displayName, activePeriod, categories, or expenses; activePeriod.month outside 1–12; expense value not greater than 0 or datetime not YYYY-MM-DD; period/datetime mismatch; or unknown categoryId — shows an inline error naming the offending field and leaves expenses, categories, and totals unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "category_name_contract_rejected"
description = "Adding or renaming a category with an empty, whitespace-only, over-40-character, or duplicate name shows validation naming the name field and does not change the Categories list"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty Expenses period or empty filter result shows nothing and provides no empty-state UI feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Validation or import failures are surfaced only in the browser console with no inline UI error"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Add, delete, copy, or import actions lack visible feedback and silently succeed or fail"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "import_mutates_on_invalid_contract"
description = "Importing JSON that fails the BudgetDocument field contract still mutates expenses, categories, display name, or totals"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "interactive_elements_use_nonsemantic_tags"
description = "Non-semantic div or span tags wrap primary interactive controls (nav, dialog actions, table actions) without button/input roles"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "The add/edit expense dialog or export drawer cannot be dismissed via Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_missing_or_delayed"
description = "Expense field-contract validation feedback is missing or delayed with no UI indication naming the invalid field"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous_or_missing"
description = "Primary actions use ambiguous or missing labels instead of specific verbs such as Add expense, Bulk delete, Export, or Import JSON"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "undo_empty_stack_corrupts_state"
description = "Undo at an empty undo stack or Redo at an empty redo stack changes the Expenses table or Dashboard totals"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "affordances_hidden_or_inaccessible"
description = "Export, Import JSON, Undo/Redo, or bulk action affordances are visually hidden or inaccessible when their preconditions are met"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
