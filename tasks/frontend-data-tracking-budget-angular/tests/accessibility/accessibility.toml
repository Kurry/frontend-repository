[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Bottom-nav items, period arrows, category filter, table actions, dialog fields and buttons, Settings controls, Export, Import JSON, Undo, Redo, and bulk actions are reachable and operable with the keyboard alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "The add/edit expense dialog and the export drawer move focus inside on open, trap focus while open, close on Escape, and return focus to the invoking control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "images_and_icons_have_alt_text"
description = "Meaningful icons in the bottom nav, table actions, floating action button, and chrome expose accessible names or alt text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Validation messages, snackbar confirmations, and Copied feedback are announced via a polite live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Add/edit expense fields (Amount, Date, Category, Counterparty), account displayName, and category name inputs have programmatically associated labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Dashboard, Expenses, Settings, and Export headings follow a logical order without skipping levels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Landmark regions such as navigation and main are present so the bottom nav and workspace content are distinguishable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Text and controls on the pink/magenta accent chrome and light neutral surfaces meet readable contrast against their backgrounds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Interactive controls use semantic roles (button, dialog for the expense dialog, complementary or dialog for the export drawer, navigation for the bottom nav)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, dialog, drawer, row, and progress-bar animations are removed or minimized while every feature stays reachable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Primary controls such as Export, Import JSON, Undo, or table edit/delete cannot be activated or reached via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused interactive controls lack a visible focus indicator or the indicator is obscured"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Bottom-nav items, bulk tray actions, or export format tabs use non-semantic tags without accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Over-budget category state or invalid field state is conveyed by color only with no text"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "The add/edit expense dialog or export drawer fails to trap focus while open"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Top-bar, progress-bar overlay, or Expenses table text is unreadable due to poor contrast"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Expense validation or Import JSON errors are visual only with no live-region announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Meaningful icons or images lack accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings are skipped or unordered in the budget workspace, such as jumping from H1 to H3"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Dialog, drawer, or progress-bar animations ignore prefers-reduced-motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.11"
name = "selection_checkboxes_and_tray_keyboard"
description = "The Expenses row selection checkboxes and the header select-all are keyboard reachable and operable, and the bulk action tray's selected-row count and actions are focusable and announced"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "import_export_outcomes_live_region"
description = "CSV import and JSON export/import outcomes — the diagnostic summary, imported-versus-skipped counts, Copied confirmation, and import errors — are announced via a polite live region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "overage_states_not_color_only"
description = "Projected overage, Over threshold, and rule-generated states expose an accessible name or visible text and are not conveyed by color or icon alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
