[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_persists_session"
description = "Multi-facet round-trip: add a valid expense, change the reporting period, rename a category, and edit the display name, then reload — every facet survives from local client storage (period, expense list including the add, category name, display name) with no facet silently reverting to seed"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "period_swap_proves_live_derived_data"
description = "Period-swap proof: note Dashboard totals and Expenses rows on 3/2020, switch to 2/2020 and confirm different rows and totals, then switch back — order and figures restore exactly, proving derived surfaces track live period data rather than hardcoded snapshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "category_filter_changes_table"
description = "Derived-view sensitivity: filter Expenses to Shopping and confirm only Shopping rows remain with a different count than the unfiltered set; clearing the filter restores the full period row set"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "expense_echoes_on_dashboard"
description = "Cross-view echo: add a valid Food expense on Expenses, then open Dashboard without reload — Total expenses rises by exactly that amount and the Food progress bar advances by the same amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "add_expense_count_delta_exact"
description = "Count-delta integrity: measure Expenses row count immediately before and after submitting a valid add; the delta is exactly +1 with no off-by-one or lagging count"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_amounts_change_totals"
description = "Input-dependent output: add a 10.00 Food expense and note Total expenses, then add a 40.00 Food expense — the second add raises Total expenses by 40.00 rather than repeating the first delta"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_add_and_period_preserve_state"
description = "Interleaved-flow integrity: start adding an expense on 3/2020, cancel or close, switch period to 2/2020, add a valid expense there, return to 3/2020 — March rows are unchanged and the February add appears only on 2/2020"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_period_then_repopulate"
description = "Edge-state round-trip: navigate to a period with no expenses (zeroed totals and empty-state table), add a valid expense, then confirm Total expenses, category progress, chart segment, and table row all leave the empty state together"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "mutate_export_import_field_contract"
description = "Mutate → export contract → import: add a valid expense under the expense field contract; open JSON Export and confirm visible text includes displayName, activePeriod, categories, expenses, and the new expense's value, datetime, categoryId, counterparty, and period; Download; change display name and delete one expense; Import the downloaded BudgetDocument — display name, deleted expense, Dashboard totals, and export preview restore the exported contract values"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "bulk_categorize_then_undo_restores"
description = "Bulk categorize then undo: select at least two expenses in different categories, bulk-categorize them to Food, confirm both rows show Food and the Dashboard Food total rises by their combined amounts; Undo restores the prior categories and totals exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After multi-facet edits and reload, a facet of user-configured state (period, expense list, category name, or display name) silently reverts while others survive"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "Dashboard totals, progress bars, or chart segments render identically after a period change or a category filter change"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Adding two expenses with different amounts yields identical Total expenses deltas or identical export lines for both"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "An expense add or delete appears in the Expenses table but Dashboard totals stay stale until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_lacks_contract_or_omits_mutation"
description = "After adding a valid expense, the JSON BudgetDocument preview lacks required API field names (displayName, activePeriod, categories, expenses) or omits the session's new expense — a shape that cannot round-trip through Import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.11"
name = "csv_import_pipeline_tracks_to_export"
description = "Full CSV pipeline: load a Transactions CSV mixing valid and invalid rows, confirm the diagnostic screen leaves Dashboard totals unchanged, press Commit, then confirm the Dashboard Total expenses rose by exactly the sum of the committed valid rows and the JSON export's expenses array now contains those rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "recurring_rule_pipeline_tracks_to_export"
description = "Rule pipeline: create a recurring rule, switch to a period, confirm exactly one rule-generated row appears and the period's Total expenses and that category's variance include the rule value, then open Export and confirm the instance appears in expenses with recurring true and the rule appears in recurringRules"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "projection_input_sensitivity"
description = "Projection sensitivity: note a category's projected total, add a valid expense to that category in the current period, and confirm the projected total changes rather than repeating; two categories with different spent-so-far show different projected totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.14"
name = "bulk_delete_then_undo_round_trip"
description = "Bulk delete round-trip: select at least two rows, Bulk delete, confirm the rows and the affected categories' totals, progress bars, variance, and chart segments drop, then Undo and confirm every deleted row and every one of those figures is restored in one step"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.15"
name = "export_import_round_trip_restores_rules_threshold"
description = "Extended round-trip: after creating a recurring rule and setting the threshold, Download the Budget report JSON, delete the rule and change the threshold, then Import the downloaded document — the recurring rule, threshold, expenses, and Dashboard variance restore to the exported values without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n6"
name = "committed_csv_rows_desync_from_totals"
description = "After a committed CSV import, the new rows appear in the Expenses table but the Dashboard totals or JSON export preview do not include them until a reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n7"
name = "bulk_undo_partial_restore"
description = "Undo of a bulk delete restores only some of the deleted rows or leaves Dashboard totals, progress bars, or variance at their post-delete values instead of the exact prior state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
