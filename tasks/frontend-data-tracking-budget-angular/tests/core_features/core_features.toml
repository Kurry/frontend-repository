[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "opens_into_workspace_no_auth_wall"
description = "On load, the app opens with no auth wall directly into a workspace with a top bar showing an account name and a '3/2020' period control, and a bottom nav with Dashboard, Expenses, and Settings"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_dashboard_totals_and_category_rows"
description = "On load, the Dashboard shows 'Total budget' $6700.00, 'Total expenses' $1756.68, and 'Total left' $4943.32, plus a 'Budgets by category' list with Food, Shopping, Entertainment, Transport, and Cloths rows, each with a filled progress bar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "seeded_expenses_table_ten_rows"
description = "On load, the Expenses table for period 3/2020 shows 10 rows with columns Date, Counterparty, Category, Value, Actions, including a 2020-03-01 Rocky bowling Entertainment $235.42 row and a 2020-03-24 Mcdonalds Food $169.33 row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "shopping_filter_shows_only_shopping_rows"
description = "Filtering the Expenses table to the Shopping category shows only the 3 Shopping rows (Wallmart $218.69, $51.74, $92.31) and hides all other categories"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "valid_submit_closes_dialog_adds_one_row"
description = "Opening the add-expense control and submitting amount 25.00, date 2020-03-05, category Food closes the dialog and inserts exactly one new 2020-03-05 / Food / $25.00 row into the Expenses table"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "add_updates_food_total_and_summary"
description = "After adding that 25.00 Food expense, the Dashboard's Food row reads $460.66 / $2000.00 with 'left $1539.34', and the Total expenses reads $1781.68"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "prev_period_swaps_to_february_rows"
description = "Clicking the period control's previous arrow switches the period label to '2/2020' and the Expenses table shows the 5 February rows (Kfc, Kaufland, Johnys pub, Tube machine, Primark) instead of the March rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "february_dashboard_totals_correct"
description = "On period 2/2020, the Dashboard's Food row reads $45.20 / $2000.00 and Total expenses reads $405.69"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "delete_kfc_zeroes_february_food"
description = "Deleting the 2020-02-05 Kfc Food $45.20 row removes it from the Expenses table and the Dashboard's Food row for 2/2020 drops to $0.00 / $2000.00"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "reload_preserves_period_delete_and_addition"
description = "Reloading the page keeps the period at '2/2020', keeps the Kfc row deleted, and keeps the earlier 25.00 Food addition present when the period is switched back to 3/2020"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "new_category_appears_in_list_and_filter"
description = "In Settings, the Categories tab lists Food, Shopping, Entertainment, Transport, and Cloths; adding a new category named 'Travel' makes it appear in both the Categories list and the Expenses filter control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "dashboard_nonzero_totals_five_categories"
description = "On first load the Dashboard shows a non-zero Total budget, Total expenses, and Total left, and a Budgets by category list covering at least 5 categories (Food, Shopping, Entertainment, Transport, Cloths), each with a progress bar"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "seeded_rows_populated_not_placeholder"
description = "On first load the Expenses table for the initial period shows at least 10 seeded rows with Date, Counterparty, Category, and Value populated, not placeholder or lorem text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "add_raises_food_total_by_exact_amount"
description = "Adding a 25.00 Food expense on 2020-03-05 through the add-expense control adds that exact row to the Expenses table, raises the Dashboard's Food total by exactly 25.00, and advances the Food progress bar by the same amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "period_change_recomputes_all_dashboard_figures"
description = "Changing the reporting period to the prior seeded month swaps the visible Expenses rows to that period's expenses and recomputes every Dashboard category total, progress bar, and the Total budget/expenses/left summary from that period alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "delete_lowers_only_its_own_category"
description = "Deleting one expense removes its row from the Expenses table and lowers its category's Dashboard total and progress bar by exactly that expense's amount, leaving every other category and period unaffected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "edit_expense_recomputes_both_categories"
description = "Editing an existing expense's amount, date, or category through the row's edit action opens the dialog pre-filled with that expense's values, updates that same row in place rather than adding a second row, and recomputes both the old and the new category's Dashboard totals, progress bars, and chart segments to reflect the move"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "invalid_submit_blocks_and_names_fields"
description = "Submitting the add/edit expense form with an empty or non-positive amount, a missing date, or no category shows visible validation feedback and adds or changes no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "category_crud_reflects_in_filter_and_dashboard"
description = "Settings' Categories tab lets a category be added by name, renamed, or deleted, with every change immediately reflected in the Expenses category filter and the Dashboard's per-category list"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.26"
name = "bottom_nav_decorative_only"
description = "The bottom navigation is decorative chrome: activating Dashboard, Expenses, or Settings leaves the same content on screen instead of switching the visible workspace"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "dashboard_totals_static_regardless_of_changes"
description = "The Dashboard's category totals and progress bars stay a constant value regardless of adding, editing, deleting expenses, or changing the period"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.28"
name = "delete_hits_wrong_category_or_row_persists"
description = "Deleting an expense removes its amount from a category other than the one it belonged to, or leaves the deleted row visible in the table"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "control_navigates_offsite"
description = "An in-app control (nav item, period arrow, dialog action) performs an outbound navigation that leaves the app or loads content from another origin"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "chart_matches_totals_with_tooltip"
description = "The Dashboard renders a spending-breakdown chart whose segments or bars correspond to the current period's per-category totals, and hovering a segment shows a tooltip naming the category and its amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "add_flow_propagates_all_surfaces"
description = "Starting from a fresh load on period 3/2020, note the Dashboard's Total expenses and the Expenses row count, then add a valid expense through the add dialog: the Expenses table gains exactly one row for that period (count delta measured immediately around the submit), the Dashboard's Total expenses rises by exactly the entered amount, that category's progress bar advances accordingly, the spending-breakdown chart redraws to include the new amount, and switching to the Dashboard and back to Expenses shows the same new row without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "delete_flow_shrinks_chart_segment"
description = "Deleting one expense from the Expenses table removes its row immediately and lowers its category's Dashboard total, that category's progress bar, and its chart segment by exactly that expense's amount, while every other category's figures and the other period's rows remain unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "period_roundtrip_restores_exact_state"
description = "Changing the reporting period swaps the visible Expenses rows and recomputes every Dashboard total, progress bar, and chart segment from that period's expenses only, and stepping back to the prior period restores exactly the rows and totals it showed before — no rows or amounts from the other period leak in"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "category_rename_propagates_everywhere"
description = "Renaming a category in Settings updates that category's name in the Expenses category filter, in the Dashboard's per-category list, and in existing expense rows that used it, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "account_display_name_editable"
description = "Settings' Account tab shows an editable display name, and changing it updates the account name shown in the top bar"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.36"
name = "double_submit_adds_at_most_one_row"
description = "Double-activating the add/edit dialog's confirm action in quick succession creates or applies exactly one change: the Expenses row count changes by at most one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "empty_filter_result_shows_empty_state"
description = "Selecting a category filter that matches no expenses in the current period shows an empty-state message in the table region rather than a blank area, and clearing the filter restores the full row set for that period"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "empty_period_shows_zeroed_state"
description = "Navigating to a reporting period with no expenses shows a zeroed Total expenses figure, empty progress bars, and an empty Expenses table with a visible empty-state message, with no console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "last_delete_empties_category_not_list"
description = "Deleting the last expense in a category drops that category's spent amount to zero — its progress bar empties and its chart segment disappears — while the category itself remains listed on the Dashboard and in the filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality or a broken end-to-end flow that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, action sequence) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
