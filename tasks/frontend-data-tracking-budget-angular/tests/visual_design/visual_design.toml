[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "mobile_workspace_layout"
description = "The layout reads as a mobile-app workspace: a filled single-color top bar, a scrollable content area, and a fixed bottom navigation, with elevated cards, a dense data table, progress bars, a modal dialog, and tabbed Settings rather than a plain unstyled HTML dump"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "pink_accent_used_consistently"
description = "The Dashboard's category rows show a filled progress bar with the '$spent / $limit' amount overlaid, and a single pink/magenta brand accent color is used consistently for the top bar, the floating add button, the active bottom-nav item, the progress-bar fill, and primary buttons, with light neutral surfaces elsewhere and cards with subtle elevation and rounded corners"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "dense_table_with_corner_fab"
description = "The Expenses table is dense and column-aligned (Date, Counterparty, Category, Value, Actions) with a visible floating action button for adding an expense positioned consistently in the corner"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "form_fields_and_expansion_panels"
description = "The add/edit expense dialog and the Settings category rows use labeled form fields, selects, and expandable rows with legible labels and inline error text for invalid fields"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "narrow_viewport_fits_nav_stays_fixed"
description = "At a 375px-wide viewport every view fits without clipped text, overlapping controls, or horizontal page scrolling, the bottom navigation remains fixed and tappable, and the Expenses table remains readable"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "chart_card_labeled_consistent_colors"
description = "The spending-breakdown chart sits in a card alongside the summary and category cards, uses one consistent color per category, and labels or legends each category so segments are identifiable without any interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "single_icon_style_throughout"
description = "One consistent icon style is used across the app: bottom-nav items, table row actions, dialog controls, and the floating action button all draw from the same icon set with no mixed styles or missing glyphs"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "desktop_column_centered_capped"
description = "On a desktop-width viewport the single-column layout stays centered and capped at a readable width, with the top bar and fixed bottom navigation spanning the app column rather than stretching content edge to edge"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "dialog_fits_narrow_viewport"
description = "At a 375px-wide viewport the add/edit expense dialog fits within the viewport with all four fields and both actions reachable without content being cut off"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.12"
name = "validation_copy_names_field_and_fix"
description = "Inline validation messages in the add/edit expense dialog name the offending field and the field-contract problem (e.g. that the amount must be a positive number, or the date must be YYYY-MM-DD) rather than a bare 'Invalid' or generic rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "summary_card_rows_above_category_card"
description = "The Dashboard shows a summary card with Total budget, Total expenses, and Total left as label/value rows above a 'Budgets by category' card, and each category row shows its name and its 'left $X.XX' amount on one line"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.15"
name = "export_drawer_format_preview"
description = "The Export drawer shows CSV and JSON format tabs, a monospaced preview block, and Copy / Download actions, with Undo and Redo visible in the chrome near Export"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.16"
name = "bulk_tray_variance_csv_and_settings_chrome"
description = "The bulk action tray shows the selected-row count with Bulk categorize and Bulk delete actions; the Dashboard variance surface shows per-category limit, spent, signed variance, and projected figures with distinct Projected overage and Over threshold treatments; the CSV import diagnostic renders a per-row status table with Exclude and inline-fix controls; and Settings presents the three tabs Account, Categories, and Recurring"
type = "binary"
weight = 1.0

