[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The layout reads as a Material mobile-app workspace: a solid-color top bar, a scrollable content area, and a fixed bottom navigation, all using real Angular Material components (cards, table, progress bar, dialog, tabs) rather than plain unstyled HTML"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "pink_accent_used_consistently"
description = "The Dashboard's category rows show a filled progress bar with the '$spent / $limit' amount overlaid, and a single pink/magenta brand accent color is used consistently for the top bar, the floating add button, the active bottom-nav item, the progress-bar fill, and primary buttons, with light neutral surfaces elsewhere and cards with subtle elevation and rounded corners"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "The Expenses table is dense and column-aligned (Date, Counterparty, Category, Value, Actions) with a visible floating action button for adding an expense positioned consistently in the corner"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "3_4"
description = "The add/edit expense dialog and the Settings category rows use Material form fields, selects, and expansion panels with legible labels and inline error text for invalid fields"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "3_5"
description = "At a 375px-wide viewport the top bar, content, and bottom nav reflow without clipped text, overlapping controls, or horizontal page scrolling"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "3_6"
description = "The workspace is an unstyled or flat dump with no visual hierarchy — Dashboard, Expenses, and Settings are visually indistinguishable from each other or from a generic scaffold"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.7"
name = "narrow_viewport_clips_or_overflows"
description = "At a 375px-wide viewport the content clips, controls overlap, or the page requires horizontal scrolling to reach the expense table or its actions"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "3.8"
name = "chart_card_labeled_consistent_colors"
description = "The spending-breakdown chart sits in a card alongside the summary and category cards, uses one consistent color per category, and labels or legends each category so segments are identifiable without any interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "single_icon_style_throughout"
description = "One consistent icon style is used across the app: bottom-nav items, table row actions, dialog controls, and the floating action button all draw from the same icon set with no mixed styles or missing glyphs"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "desktop_column_centered_capped"
description = "On a desktop-width viewport the single-column layout stays centered and capped at a readable width, with the top bar and fixed bottom navigation spanning the app column rather than stretching content edge to edge"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "dialog_fits_narrow_viewport"
description = "At a 375px-wide viewport the add/edit expense dialog fits within the viewport with all four fields and both actions reachable without content being cut off"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.12"
name = "validation_copy_names_field_and_fix"
description = "Inline validation messages in the add/edit expense dialog name the offending field and the problem (e.g. that the amount must be a positive number) rather than a bare 'Invalid' or generic rejection"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "placeholder_text_shipped"
description = "Lorem ipsum, 'TODO', template variable names, or other placeholder text is visible somewhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design (layout, palette, typography, density, alignment, or rendered copy) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
