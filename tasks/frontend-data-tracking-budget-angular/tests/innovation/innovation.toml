[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_strip_beyond_spec"
description = "Optional: a structured export summary strip naming expense count and Total expenses above the preview helps operators trust the artifact beyond the required tabs"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "last_mutation_chip"
description = "Optional: a compact last-mutation chip names the most recent add, edit, delete, or import beyond the required snackbars"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "over_budget_forecast_hint"
description = "Optional: an over-budget forecast or remaining-days hint on category rows exceeds the required distinct over-budget treatment"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "period_compare_sparkline"
description = "Optional: a tiny period-compare sparkline or delta vs prior period on the summary card exceeds the required totals"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "delightful_export_microinteractions"
description = "Optional: export Download or Copy offers a delightful microinteraction beyond the required Copied confirmation"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "bulk_tray_progress_feedback"
description = "Optional: bulk categorize/delete shows richer progress or undo toast detail beyond the required tray actions"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "polished_budget_brand_moments"
description = "Optional: polished brand moments on the pink/magenta chrome (mark animation or period transition) exceed the required accent usage"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "import_diff_preview"
description = "Optional: Import JSON offers a before/after diff preview of expense counts beyond the required accept/reject path"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "keyboard_shortcut_cheat_sheet"
description = "Optional: a keyboard shortcut cheat sheet for Export, Undo, and Add expense exceeds the required keyboard operability"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_budget_polish"
description = "Optional: overall personal-finance polish visibly exceeds the specification in ways a real operator would notice"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "optional_enhancement_breaks_required_export"
description = "An optional enhancement blocks or replaces the required Export CSV/JSON download, Copy, or Import JSON path"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user. If present, name the enhancement and cite the concrete evidence. If nothing beyond the covered optional items stands out, answer no."
type = "binary"
weight = 0.5
