[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Top bar, cards, bottom nav, and table spacing follow a consistent scale with no arbitrary one-off gaps visible against the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Account name, period label, summary labels, and section titles match the mobile-budget typography hierarchy shown in the reference screenshots"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference"
description = "At desktop width the top bar, summary card, Budgets by category, chart card, Expenses table, and bottom nav match the reference layout within a small tolerance; text wins on conflicts"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Add, delete, dialog open/close, and progress-bar fill show the motion the instruction requires when driven through real UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "Narrow-viewport single-column stacking with fixed bottom nav matches the reference mobile-app pattern"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Pink/magenta primary buttons, floating action button, and dialog actions use the brand accent radii and elevation from the visual design rather than unstyled browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Summary values, category names, and table body text are visually distinct in hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Active bottom-nav item, over-budget category row, and disabled dialog submit states are visually distinct from defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Light neutral card surfaces with subtle elevation and rounded corners match the reference card treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover wash and ripple/press feedback on nav items and dialog actions follow the required motion timing character"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible card or nav spacing contradicts the consistent mobile-budget scale in the references"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Primary chrome uses colors outside the pink/magenta accent plus light neutral surfaces described in the instruction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Top bar, floating action button, or bottom-nav sizing grossly mismatches the reference proportions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required dialog, snackbar, or progress-bar animations are missing when triggered through real UI controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Primary buttons or dialog controls use unstyled browser defaults when the instruction styles them with the brand accent"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "Summary, category list, and chart cards are misaligned relative to the reference at desktop width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Bottom nav, floating action button, or Export controls render off-screen or clipped at the reference viewport"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order of summary, Budgets by category, and chart on Dashboard grossly deviates from the reference without instruction justification"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Summary labels and values or table headers and cells have no typographic distinction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover and press feedback on primary chrome are missing entirely relative to the instructed motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
