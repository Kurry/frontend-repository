[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_wash_and_ripple_feedback"
description = "Bottom-nav items, table action icons, and dialog buttons show a hover wash and a Material ripple/press feedback when actually hovered or clicked through the real control path"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "dialog_and_backdrop_animate_in_out"
description = "Opening and closing the add/edit expense dialog animates the dialog and its backdrop in and out rather than appearing or disappearing instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "snackbar_slides_in_and_autodismisses"
description = "Add, update, delete, bulk actions, export copy, and import show a snackbar that slides in from the bottom edge and auto-dismisses after a short delay"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "progress_bar_fill_animates_to_new_value"
description = "A budget progress bar's fill animates toward its new value when an expense is added, edited, deleted, or the period changes, rather than jumping instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "expansion_panel_height_opacity_transition"
description = "Expanding and collapsing a Settings category row animates its height/opacity via the Material expansion panel transition when toggled through the real control"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "no_hover_feedback_on_interactive_chrome"
description = "Interactive chrome shows no hover feedback at all — buttons, nav items, and table actions look identical when hovered as when idle"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "animations_absent_via_real_controls"
description = "Dialog, snackbar, or progress-bar transitions only appear when state is forced through a non-UI shortcut and show no animation when triggered through the real control"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "4.8"
name = "table_rows_animate_in_and_out"
description = "Adding an expense through the dialog animates its new row into the Expenses table, and deleting an expense through its row action animates the row out, rather than the table snapping instantly to the new state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "chart_segments_animate_on_change"
description = "After adding, editing, or deleting an expense or changing the period through the real UI controls, the spending-breakdown chart animates its segments to their new proportions rather than redrawing abruptly"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.10"
name = "view_switch_swaps_without_reload"
description = "Switching between Dashboard, Expenses, and Settings via the bottom navigation swaps the main content without a full page reload, and the active bottom-nav item is visually distinguished from the inactive ones"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "export_drawer_animates_in_out"
description = "Opening and closing the Export drawer through the real Export control animates the drawer with a short opacity and slide transition rather than snapping open or closed"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions (missing, jarring, janky, or broken animation and feedback, verified through the real UI control path on a fresh load where relevant) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
