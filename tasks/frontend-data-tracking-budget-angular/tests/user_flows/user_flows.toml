[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "create_expense_updates_all_surfaces"
description = "Create flow: submitting a valid expense under the field contract adds exactly one Expenses row for that period, raises Dashboard Total expenses and the category progress by the entered amount, and redraws the chart — all without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_inline_validation"
description = "Create flow: submitting with empty/non-positive amount, missing or non-YYYY-MM-DD date, or no category triggers immediate inline validation naming each field and adds no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_expense_updates_related_displays"
description = "Edit flow: changing an expense amount, date, or category updates the same row in place and recomputes both the old and new category Dashboard totals, progress bars, and chart segments"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_expense_updates_all_surfaces"
description = "Delete flow: deleting one expense removes its row and lowers its category Dashboard total, progress bar, and chart segment by exactly that amount"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "bottom_nav_switches_views"
description = "View switch: activating Dashboard, Expenses, or Settings swaps the main content without a full page reload and distinguishes the active bottom-nav item"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_category_expense_empty_progress"
description = "Edge: deleting the last expense in a category zeroes that category's spent amount and empties its progress bar while the category remains listed"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "category_filter_updates_table"
description = "Edge: filtering by category reveals only matching Expenses rows and clearing the filter restores the full period set"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "category_rows_expand_collapse"
description = "Settings Categories expandable rows can be expanded and collapsed with the edit name field reachable, preserving workflow continuity"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "dialogs_support_expected_flows"
description = "Add/edit expense dialog and Export drawer open, accept Cancel/Close or Escape, and return focus/workflow to the workspace without trapping navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "failed_import_recovers_without_reload"
description = "Recovery: a failed Import JSON (malformed or contract-invalid) shows feedback and leaves prior expenses intact so the user can continue without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "artifact_end_state_export_import"
description = "Artifact end state: add a valid expense, open Export, confirm CSV and JSON previews contain the new expense and JSON still shows required displayName, activePeriod, categories, and expenses keys; Copy confirms; Download JSON then Import that BudgetDocument reconstructs the same visible rows, categories, display name, and Dashboard totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "form_created_record_is_export_payload"
description = "Create a valid expense through the form, open Export JSON: the expenses entry carries the same value, datetime, categoryId, counterparty, and period the form produced — the form-created record is the export payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Add, edit, delete, Export, or Import JSON flows are not enabled from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "new_items_missing_or_duplicated"
description = "A valid expense create fails to show a new row or duplicates the row"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "Expense mutations update the table but not Dashboard totals, or update Dashboard but not the export preview, without reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_or_loses_selection"
description = "Switching Dashboard/Expenses/Settings breaks layout or loses the active reporting period"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_collection_breaks_ui"
description = "An empty period or empty filter produces broken or missing UI instead of an empty-state message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "The Expenses category filter and Dashboard category list disagree about which categories exist after a rename"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "export_omits_session_work"
description = "After editing primary session state (add expense), at least one Export format tab (CSV or JSON) still shows the pre-edit values — the artifact omits the session's work"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_blocks_navigation"
description = "Add/edit or Export overlays block navigation with no exit option"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_flow_lacks_feedback"
description = "A failed create validation or failed Import provides no user feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "navigation_dead_end_requires_reload"
description = "Navigation dead ends or requires reload for recovery after dialog or import failure"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.13"
name = "bulk_categorize_then_undo"
description = "Selecting at least two expenses in different categories and bulk-categorizing them to one category updates both rows and the Dashboard totals; Undo then restores the prior categories and totals exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "bulk_delete_then_undo_multi_surface"
description = "Selecting at least two rows and activating Bulk delete removes them and drops the affected categories' totals, progress bars, variance figures, and chart segments together; Undo restores every deleted row and every one of those figures in one step"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "recurring_rule_generates_period_instance"
description = "After adding a recurring rule (for example Rent, 1200, an existing category, day 1), switching to a reporting period shows exactly one rule-generated row dated that day, marked as recurring, with the period's Total expenses and that category's spent including it"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "csv_import_diagnostic_commit_valid_only"
description = "Importing a CSV that mixes valid and invalid rows shows a diagnostic screen listing each row's validity and naming the failing field on invalid rows while the table and totals stay unchanged; Commit then adds only the valid rows and the summary reports imported versus skipped counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "threshold_flow_label_and_export"
description = "Setting the spending threshold to a percent a seeded category already exceeds gives that category's row the Over threshold label, and the exported Budget report JSON settings.thresholdPercent and that category's overThreshold reflect it; raising the threshold above the category's ratio clears the label"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.18"
name = "projection_sensitivity_flow"
description = "A category's projected end-of-period total changes after adding a valid expense to that category in the current period, and two categories with different spent-so-far amounts show different projected totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "bulk_or_recurring_leaves_stale_dashboard"
description = "After a bulk categorize, bulk delete, or recurring-rule mutation, the Dashboard totals, progress bars, variance figures, or chart segments still show the pre-mutation values until a reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
