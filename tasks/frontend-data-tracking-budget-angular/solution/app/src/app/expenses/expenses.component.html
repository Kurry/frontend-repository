<div class="expenses">
  <div class="filter-bar">
    <mat-form-field class="filter-field">
      <mat-label>Filter by category</mat-label>
      <mat-select [value]="(filterCategoryId$ | async) ?? ''" (selectionChange)="onFilterChange($event.value)">
        <mat-option value="">All categories</mat-option>
        <mat-option *ngFor="let c of categories$ | async" [value]="c.id">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="(expenses$ | async) ?? []" class="expense-table">
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let e">{{ e.datetime }}</td>
    </ng-container>

    <ng-container matColumnDef="counterparty">
      <th mat-header-cell *matHeaderCellDef>Counterparty</th>
      <td mat-cell *matCellDef="let e">{{ e.counterparty }}</td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let e">{{ categoryName(categories$ | async, e.categoryId) }}</td>
    </ng-container>

    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef>Value</th>
      <td mat-cell *matCellDef="let e">${{ e.value.toFixed(2) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let e">
        <button mat-button class="edit-btn" [attr.aria-label]="'Edit expense ' + e.id" (click)="openEditDialog(e)"><span class="material-symbols-outlined">edit</span></button>
        <button mat-button class="delete-btn" [attr.aria-label]="'Delete expense ' + e.id" (click)="deleteExpense(e)"><span class="material-symbols-outlined">delete</span></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p class="empty-state" *ngIf="(expenses$ | async)?.length === 0">No expenses for this period. Click the '+' button to add an expense.</p>

  <button mat-fab class="add-fab" aria-label="Add expense" (click)="openAddDialog()"><span class="material-symbols-outlined">add</span></button>
</div>
