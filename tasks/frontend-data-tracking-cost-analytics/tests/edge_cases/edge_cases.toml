[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_designed"
description = "The zero-event table state, the all-series-off chart message, and an empty report history each render a designed empty state with a message, not a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "The budget-cap, date-range, team-ceiling, save-view, schedule, and recategorize forms validate inline before submit against their request-body field contracts"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and formula errors name the problem and the fix — the offending field or the accepted formula forms — not just a rejection"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Recategorizing, saving a view, generating a report, and exporting each give visible success feedback such as a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "recomputation_shows_activity"
description = "Heavier recomputations (bulk recategorize over a large selection, what-if drag) keep the UI visibly live — updated numbers or an activity affordance, never a silent frozen dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded"
description = "Saved-view deletion requires confirmation, and bulk recategorization is reversible through Undo"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "nonobvious_controls_have_help"
description = "Non-obvious controls — the formula box, what-if sliders, capacity gauge, compare toggle — carry tooltips or descriptive labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, checkboxes, and labels across the dashboard use semantic elements"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_close_paths"
description = "Forms and menus close via their close control, Escape, and a background click where appropriate"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "multi_step_flows_show_progress"
description = "Multi-step flows — select then recategorize, configure then run a schedule — show their intermediate state (selection count, active schedule summary) at each step"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_request_bodies_rejected"
description = "capUsd of 0 or negative, ceilingUsd of 0 or negative, a ceiling save whose sum would exceed monthly capUsd, a saved-view name shorter than 2 characters, a schedule with empty sections, a recategorize Apply with neither team nor feature, and a date range with to before from each show a named inline error and leave prior state intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "zero_match_export_still_valid"
description = "With a zero-event filter scope, Download JSON still produces schemaVersion 1, totals with eventCount 0 and cost 0, and an empty events array; Download CSV still carries the header row"
type = "binary"
weight = 1.0

