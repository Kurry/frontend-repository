[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_designed"
description = "The zero-event table state, the all-series-off chart message, and an empty report history each render a designed empty state with a message, not a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "forms_validate_inline"
description = "The budget-cap, date-range, team-ceiling, save-view, schedule, and recategorize forms validate inline before submit against their request-body field contracts"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_are_actionable"
description = "Validation and formula errors name the problem and the fix — the offending field or the accepted formula forms — not just a rejection"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_confirmation"
description = "Recategorizing, saving a view, generating a report, and exporting each give visible success feedback such as a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "recomputation_shows_activity"
description = "Heavier recomputations (bulk recategorize over a large selection, what-if drag) keep the UI visibly live — updated numbers or an activity affordance, never a silent frozen dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "destructive_actions_guarded"
description = "Saved-view deletion requires confirmation, and bulk recategorization is reversible through Undo"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "nonobvious_controls_have_help"
description = "Non-obvious controls — the formula box, what-if sliders, capacity gauge, compare toggle — carry tooltips or descriptive labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, checkboxes, and labels across the dashboard use semantic elements"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_close_paths"
description = "Forms and menus close via their close control, Escape, and a background click where appropriate"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "multi_step_flows_show_progress"
description = "Multi-step flows — select then recategorize, configure then run a schedule — show their intermediate state (selection count, active schedule summary) at each step"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_state_missing"
description = "An emptied surface (zero-match filters, empty chart, no snapshots) shows nothing with no feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_console_only"
description = "A validation, formula, or recomputation error is surfaced only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "silent_success_or_failure"
description = "Recategorizing, exporting, or generating a report gives no visible feedback either way"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "unguarded_destruction"
description = "Deleting a saved view or overwriting tags happens with no warning, confirmation, or undo path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "divs_wrap_interactives"
description = "Non-semantic div or span elements wrap the table's or header's interactive controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "The save-view form, schedule form, or a menu cannot be dismissed with the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "validation_feedback_delayed"
description = "Form validation feedback is missing or appears only after a silent delay"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "ambiguous_button_text"
description = "Bulk-action or export button text is ambiguous or missing, leaving the action unclear"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "no_guidance_for_flows"
description = "The what-if, formula, or schedule flows have no in-app guidance at all"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "hidden_affordances"
description = "Interactive affordances such as legend toggling, chip removal, or the disclosure are visually hidden with no discoverable path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.11"
name = "invalid_request_bodies_rejected"
description = "capUsd of 0 or negative, ceilingUsd of 0 or negative, a ceiling save whose sum would exceed monthly capUsd, a saved-view name shorter than 2 characters, a schedule with empty sections, a recategorize Apply with neither team nor feature, and a date range with to before from each show a named inline error and leave prior state intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "zero_match_export_still_valid"
description = "With a zero-event filter scope, Download JSON still produces schemaVersion 1, totals with eventCount 0 and cost 0, and an empty events array; Download CSV still carries the header row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "invalid_body_mutates_state"
description = "An invalid request body (zero cap, over-allocation ceiling, empty schedule sections, or backwards range) mutates the prior cap, ceilings, schedule, or range"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
