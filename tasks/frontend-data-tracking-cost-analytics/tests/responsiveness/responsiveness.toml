[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "The layout adapts gracefully from 1440 pixel desktop to 375 pixel mobile — tiles, charts, panels, and the table all remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets"
description = "Legend entries, chips, checkboxes, sliders, and header controls are tap targets of at least 44 pixels at mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_scales"
description = "Tile values, headings, and table text resize appropriately between desktop and mobile"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_viewport_clipping"
description = "No tile, chart, panel, or table content clips or overflows the viewport at any width between 1440 and 375 pixels"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chart_region_stacks_at_768"
description = "At widths of 768 pixels and below the chart region stacks vertically, the budget panel and anomaly list move below the charts, and the header controls collapse into a menu"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths the KPI strip, charts, panels, and table stack in a logical reading order"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "touch_paths_work"
description = "On a touch viewport, tapping legend entries, chips, rows, and disclosures works, and the what-if sliders are adjustable by touch"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_page_horizontal_scroll"
description = "At 375 pixel width no page-level horizontal scrolling appears; the event table scrolls within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_resize_responsively"
description = "Both charts and the wheel resize to their containers rather than forcing a fixed width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_reachable"
description = "The budget cap, undo/redo, and export controls remain reachable at every width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The layout breaks or overflows at common breakpoints between 1440 and 375 pixels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_unusable"
description = "Sliders, chips, or checkboxes are too small or misaligned to use at mobile widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_unreadably_small"
description = "Tile or table text becomes too small to read at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "cropped_content_or_stray_scrollbars"
description = "Content is cropped or unnecessary scrollbars appear around the charts or panels"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "header_menu_missing_at_widths"
description = "The collapsed header menu is unreachable or missing at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_content"
description = "Fixed header chrome obscures tiles, charts, or table rows at some width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_some_size"
description = "Panels or charts overlap each other at some viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "touch_slider_impossible"
description = "At touch widths the what-if sliders cannot be adjusted by any means"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_charts_overflow"
description = "A chart, wheel, or the table uses a static size that overflows the viewport"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Export, undo/redo, or bulk-action controls disappear entirely at specific widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
