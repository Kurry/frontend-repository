[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All derived surfaces recompute from one shared state: a recategorization, ceiling edit, what-if rate, filter change, or undo is reflected together in the KPI tiles, both charts, the wheel, the anomaly list, the formula result, the gauge, and the table without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_seeded_reload"
description = "localStorage and sessionStorage remain empty after filtering, recategorizing, repricing, saving views, scheduling, generating reports, and exporting, and a page reload returns the app to its seeded state (seeded events, original rates and ceilings, no saved views or snapshots, default range)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "storage_apis_exercised"
description = "localStorage, sessionStorage, or another browser storage API holds events, rates, views, snapshots, or UI state after exercising the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.4"
name = "console_errors_during_flows"
description = "Console errors or unhandled promise rejections appear on load or during filtering, recategorizing, repricing, formula entry, scheduling, or exporting"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.5"
name = "outbound_network_requests"
description = "The app issues outbound network requests beyond its own origin while loading or during any flow"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.6"
name = "rapid_input_keeps_sync"
description = "Rapid dimension switches, legend toggles, and chip removals leave every surface consistent — no chart or tile shows an aggregate another surface already updated differently"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "same_datum_diverges"
description = "The same datum shows different values in two places — for example a day's spend differs between the spend chart tooltip, the breakdown chart, and the exported report at the same moment"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.8"
name = "all_views_reachable"
description = "Every documented surface — charts, budget panel, wheel, anomaly list, table, saved views, unit-cost explorer, estimator, formula box, schedule form, report history, exports — is reachable through in-app controls and renders without errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "external_navigation_leak"
description = "Any app-chrome link or control navigates away from the app's origin"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.10"
name = "request_body_schemas_enforced"
description = "Budget-cap, date-range, team-ceiling, save-view, report-schedule, and recategorize forms reject invalid values with named inline errors and disabled submit until valid, matching the request-body field contracts (capUsd > 0, from ≤ to, ceiling sum ≤ capUsd, name 2–60, frequency/sections enums, at least one of team or feature on recategorize)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "export_conforms_to_same_schemas"
description = "Cost-report JSON and CSV use the same field names and enums as the usage-event and form contracts — promptTokens/completionTokens camelCase in JSON and CSV header, model in the five seeded names, dimension in model|team|feature — so table, forms, and export agree"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n5"
name = "form_export_schema_drift"
description = "Exported event keys or form enums disagree with the usage-event field contract (for example snake_case prompt_tokens in JSON while the table contract requires promptTokens, or a dimension value outside model|team|feature)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable defect in technical quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
