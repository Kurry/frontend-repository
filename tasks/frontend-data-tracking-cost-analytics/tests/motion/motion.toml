[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "kpi_count_up"
description = "On a fresh load, KPI values count up from zero to their current value over roughly 600 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "charts_grow_on_render"
description = "On a fresh load and on range changes driven through the real controls, chart lines and bars grow from zero over roughly 500 milliseconds rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "wheel_ring_sweep"
description = "The radial attainment rings sweep to their percentages when the wheel first renders and animate to new values when a ceiling edit or recategorization changes them"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "what_if_smooth_updates"
description = "Dragging a what-if slider animates the dependent numbers and bars smoothly during the drag rather than snapping once on release"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "disclosure_and_chips_motion"
description = "The anomaly explanation disclosure expands and collapses with a smooth height transition and rotating chevron, filter chips animate in and out, and the bulk action bar slides in when a selection starts"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "gauge_eases"
description = "The capacity gauge fill eases to its new value when a report is generated or a view is saved"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hover_system"
description = "Buttons ease background and shadow with a slight press effect; table rows, legend entries, and anomaly entries take a full-width hover wash; form controls show focus rings — verified with the real pointer while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "modal_and_toast_motion"
description = "Modals and the schedule form enter with a roughly 200 to 300 millisecond opacity and scale transition and exit the same way, and feedback toasts slide in and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion set, count-ups, chart growth, ring sweeps, and transitions apply instantly while every flow stays fully usable"
type = "binary"
weight = 1.0

