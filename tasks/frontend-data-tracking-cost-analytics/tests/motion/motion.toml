[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "kpi_count_up"
description = "On a fresh load, KPI values count up from zero to their current value over roughly 600 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "charts_grow_on_render"
description = "On a fresh load and on range changes driven through the real controls, chart lines and bars grow from zero over roughly 500 milliseconds rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "wheel_ring_sweep"
description = "The radial attainment rings sweep to their percentages when the wheel first renders and animate to new values when a ceiling edit or recategorization changes them"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "what_if_smooth_updates"
description = "Dragging a what-if slider animates the dependent numbers and bars smoothly during the drag rather than snapping once on release"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "disclosure_and_chips_motion"
description = "The anomaly explanation disclosure expands and collapses with a smooth height transition and rotating chevron, filter chips animate in and out, and the bulk action bar slides in when a selection starts"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "gauge_eases"
description = "The capacity gauge fill eases to its new value when a report is generated or a view is saved"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hover_system"
description = "Buttons ease background and shadow with a slight press effect; table rows, legend entries, and anomaly entries take a full-width hover wash; form controls show focus rings — verified with the real pointer while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "modal_and_toast_motion"
description = "Modals and the schedule form enter with a roughly 200 to 300 millisecond opacity and scale transition and exit the same way, and feedback toasts slide in and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "reduced_motion_fallback"
description = "With prefers-reduced-motion set, count-ups, chart growth, ring sweeps, and transitions apply instantly while every flow stays fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "intro_motion_absent"
description = "On a fresh load neither the KPI count-up nor the chart growth animation occurs — all values and plots snap in with no motion anywhere"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "animation_causes_jank"
description = "Chart, chip, or slider animations cause visible layout shift, flicker, or tooltip misalignment after settling"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "motion.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion and microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
