[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "recategorize_flow_lands_everywhere"
description = "Bulk-recategorizing selected events updates the table tags and every aggregate — tiles, both charts, budget panel, anomaly list, formula result — consistently in one pass"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_forms_inline_validation"
description = "Submitting a zero capUsd, a one-character saved-view name, a schedule with zero sections, a backwards date range, or a recategorize with neither team nor feature triggers immediate inline validation naming the field and creates or applies nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "ceiling_edit_updates_displays"
description = "Editing a team ceiling updates the budget panel, wheel ring, and overage state everywhere without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "saved_view_delete_flow"
description = "Deleting a saved view after confirmation removes it from the menu while the currently applied filters remain active"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switches_retain_state"
description = "Switching breakdown dimensions, toggling stacked/grouped, and toggling compare mode retain the applied filters, selection, and sort"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "zero_match_empty_state"
description = "Driving the filters to a zero-event combination shows the designed empty state with a clear-filters control that restores the full dataset"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "drilldown_filter_flow"
description = "A segment drill-down filters the table, updates the formula result, and its chip removal restores the wider dataset everywhere"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "collapsed_chrome_continuity"
description = "Collapsing header controls into the narrow-width menu and reopening them preserves the configured cap, filters, and range"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_support_flows"
description = "The save-view form, schedule form, confirmation dialogs, and anomaly disclosures each open, complete their flow, and close without losing surrounding state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "recovery_without_reload"
description = "A mis-step — an invalid formula, an abandoned form, an accidental drill-down — recovers to a working dashboard without a reload or dead end"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "what_if_export_pipeline"
description = "The what-if pipeline works end to end: dragging a rate slider repricing every surface, exporting during the what-if produces matching repriced figures, and Revert restores every number exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "export_field_contract_flow"
description = "After recategorizing selected events and editing a team ceiling, Download JSON produces schemaVersion 1 with generatedAt ending in Z, events matching the usage-event field contract, byTeam reflecting the recategorization, teamCeilings reflecting the edited ceiling; Download CSV uses header timestamp,model,feature,team,promptTokens,completionTokens,cost,tag; Copy shows Copied"
type = "binary"
weight = 1.0

