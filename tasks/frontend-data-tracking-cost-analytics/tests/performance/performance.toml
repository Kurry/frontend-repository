[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_2s"
description = "Cold start to interactive is under 2 seconds on local render with the seeded tiles, charts, and table visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean"
description = "Browser devtools show no errors or warnings on load or across filtering, recategorizing, repricing, formula, schedule, and export flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "interactions_respond_fast"
description = "Dimension switches, legend toggles, and chip removals respond in under 100 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "recomputation_indicated"
description = "Recomputation-heavy actions keep visible feedback — updating numbers, easing bars — rather than a silent stall"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_table_renders_smoothly"
description = "The 1,000-plus-row event table scrolls and sorts without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_updates"
description = "The UI stays interactive while aggregates recompute — typing in the estimator and scrolling the table work during a what-if drag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_hold_frame_rate"
description = "Chart growth, ring sweeps, and slider-driven updates hold a smooth frame rate"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_never_freezes"
description = "Rapid legend toggling, quick chip removal, and fast slider scrubbing never hang or freeze the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "Repeated filtering, repricing, and report generation across an extended session shows no runaway slowdown or memory growth symptoms"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "heavy_actions_degrade_gracefully"
description = "A bulk recategorization over a large selection completes with the UI responsive throughout"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "slow_local_load"
description = "More than 2 seconds pass before the dashboard is interactive on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_present"
description = "Errors or warnings appear in the console during dashboard flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Chart or panel transitions block or visibly lag"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "recomputation_hangs_ui"
description = "A recomputation (what-if, recategorize, filter) hangs or freezes the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_table_kills_frame_rate"
description = "The 1,000-row table drops the frame rate to visible jank during scrolling or sorting"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "input_unresponsive_during_animation"
description = "Input becomes unresponsive while charts or rings animate"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "rendering_blocked_by_loading"
description = "The UI blocks rendering while seeded data initializes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "resource_runaway"
description = "Memory or CPU visibly runs away across repeated repricing and filtering"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "A blank screen shows while the dashboard initializes, with no loading affordance"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_use_crashes"
description = "Rapid or edge-case use crashes the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
