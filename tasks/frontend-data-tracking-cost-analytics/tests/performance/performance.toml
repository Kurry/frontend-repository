[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_2s"
description = "Cold start to interactive is under 2 seconds on local render with the seeded tiles, charts, and table visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean"
description = "Browser devtools show no errors or warnings on load or across filtering, recategorizing, repricing, formula, schedule, invalid-form rejection, and Download JSON / CSV export flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "interactions_respond_fast"
description = "Dimension switches, legend toggles, and chip removals respond in under 100 milliseconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "recomputation_indicated"
description = "Recomputation-heavy actions keep visible feedback — updating numbers, easing bars — rather than a silent stall"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "large_table_renders_smoothly"
description = "The 1,000-plus-row event table scrolls and sorts without perceived lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_updates"
description = "The UI stays interactive while aggregates recompute — typing in the estimator and scrolling the table work during a what-if drag"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_hold_frame_rate"
description = "Chart growth, ring sweeps, and slider-driven updates hold a smooth frame rate"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_never_freezes"
description = "Rapid legend toggling, quick chip removal, and fast slider scrubbing never hang or freeze the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "Repeated filtering, repricing, and report generation across an extended session shows no runaway slowdown or memory growth symptoms"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "heavy_actions_degrade_gracefully"
description = "A bulk recategorization over a large selection completes with the UI responsive throughout"
type = "binary"
weight = 1.0

