[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "hover_feedback_present"
description = "While hovering with the real pointer, toolbar buttons ease background or shadow with a slight press effect on activation, table rows take a full-width hover wash, and overflow menu items highlight, confirmed via computed styles while the hover is held"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "rows_animate_in_and_out"
description = "Registering an agent through the real form animates the new row in from transparency over roughly 200 milliseconds, and removing an agent animates its row out rather than snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "status_badge_color_transition"
description = "Changing an agent's status through a real control (retry, run start, pause, resume, or bulk action) animates the badge background color change over roughly 300 milliseconds rather than swapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "step_ticks_and_progress_fill"
description = "While a run advances, each step's status icon changes with a short scale or fade transition and the overall progress indicator fills smoothly rather than jumping"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "backoff_countdown_animates"
description = "During a retrying step, the backoff countdown visibly updates each second and the retrying state carries a subtle pulse while waiting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "panel_slide_and_tab_crossfade"
description = "Opening an agent's detail panel slides it in from the right and closing slides it out, and switching between Configuration, History, and Activity tabs cross-fades content without layout jumps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "summary_expand_with_chevron"
description = "Activating a row's current-work summary expands it with a smooth height transition and a rotating chevron cue, and collapsing reverses both"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "modal_and_toast_transitions"
description = "The register and edit modal enters and exits with a short opacity and scale transition of roughly 200 to 300 milliseconds, and confirmation toasts after register, remove, and bulk actions slide in and auto-dismiss with a fade"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, transitions apply instantly and every flow (registration, runs, pause and resume, panel, timeline) remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "surfaces_snap_without_motion"
description = "Rows, badges, the detail panel, or modals appear, disappear, or change state instantly with no transition anywhere when driven through the real controls, leaving the app without the specified microinteractions"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file — for example animation that causes layout jank or flicker. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
