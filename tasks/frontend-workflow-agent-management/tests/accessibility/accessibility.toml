[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "console_controls_keyboard_operable"
description = "Table checkboxes, row actions, overflow menus, tabs, filters, run/pause controls, Register, Export fleet, Import fleet, Undo/Redo, and the command palette are reachable and operable with the keyboard alone, each with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlays_trap_and_restore_focus"
description = "The register/edit modal, export drawer, import surface, and command palette trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "status_icons_have_text_labels"
description = "Status badges and step status icons convey state with readable text or accessible names in addition to color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "live_region_announces_status_and_copy"
description = "Status changes, run completions, and export copy confirmation are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "form_fields_labeled_and_associated"
description = "Register/edit and import fields have visible labels, and validation messages are associated with their fields so each message names the field it belongs to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "Page title and panel/section headings follow a logical heading order without skips across the table and detail panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_present"
description = "Main console regions expose landmarks (for example main, complementary for the detail panel) so assistive tech can navigate the table vs panel"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "detail_panel_keyboard_dismissible"
description = "The detail panel is dismissible from the keyboard without requiring a pointer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "checkbox_selection_exposed"
description = "Row checkbox selection state is exposed to assistive technology, not only through visual styling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "disabled_controls_not_focus_traps"
description = "Disabled bulk controls and disabled Undo/Redo do not trap keyboard focus or appear operable when their stacks/selection are empty"
type = "binary"
weight = 0.5

