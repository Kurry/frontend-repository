[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "console_controls_keyboard_operable"
description = "Table checkboxes, row actions, overflow menus, tabs, filters, run/pause controls, Register, Export fleet, Import fleet, Undo/Redo, and the command palette are reachable and operable with the keyboard alone, each with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlays_trap_and_restore_focus"
description = "The register/edit modal, export drawer, import surface, and command palette trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "status_icons_have_text_labels"
description = "Status badges and step status icons convey state with readable text or accessible names in addition to color"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "live_region_announces_status_and_copy"
description = "Status changes, run completions, and export copy confirmation are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "form_fields_labeled_and_associated"
description = "Register/edit and import fields have visible labels, and validation messages are associated with their fields so each message names the field it belongs to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_logical_order"
description = "Page title and panel/section headings follow a logical heading order without skips across the table and detail panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_present"
description = "Main console regions expose landmarks (for example main, complementary for the detail panel) so assistive tech can navigate the table vs panel"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "detail_panel_keyboard_dismissible"
description = "The detail panel is dismissible from the keyboard without requiring a pointer"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "checkbox_selection_exposed"
description = "Row checkbox selection state is exposed to assistive technology, not only through visual styling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "disabled_controls_not_focus_traps"
description = "Disabled bulk controls and disabled Undo/Redo do not trap keyboard focus or appear operable when their stacks/selection are empty"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.n1"
name = "keyboard_cannot_complete_core_flow"
description = "A core flow (register, open detail, export, or pause) cannot be completed with the keyboard alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "modal_focus_escapes_or_lost"
description = "While a modal, drawer, or palette is open, focus escapes the overlay or is lost on close"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "status_color_only"
description = "Agent or step status is conveyed by color alone with no text or accessible name"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "no_live_region_for_status"
description = "Status changes or export copy confirmation have no aria-live announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "unlabeled_form_fields"
description = "Register or import fields lack visible labels or associate validation messages incorrectly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "focus_indicator_missing"
description = "Interactive controls show no visible focus indicator when focused from the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "escape_does_not_close_overlay"
description = "Escape fails to close the register modal, export drawer, import surface, or command palette"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "panel_pointer_only_dismiss"
description = "The detail panel can only be dismissed with a pointer and has no keyboard dismiss path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "checkbox_state_not_exposed"
description = "Row checkbox selection is visual-only and not exposed to assistive technology"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "1.n10"
name = "palette_inaccessible"
description = "The command palette cannot be opened or operated from the keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
