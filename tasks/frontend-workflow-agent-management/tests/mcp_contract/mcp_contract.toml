[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with browse_*, entity_*, session_*, and artifact_* prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed tool handlers call the same application logic as the visible UI: browse destinations/filters, entity create/select/update/delete/toggle, session start/pause/resume/restart, and artifact export/import/copy change the same registry, run state, and export preview the table and controls use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_operations"
description = "Only documented operations from the bindings are available: destinations agent-registry, detail-configuration, detail-history, detail-activity, export-fleet; filters status and timeline-status-kind; entity agent with create/select/update/delete/toggle; session demos work-run and seeded-failure-retry-scenario; artifact formats fleet-json and import mode fleet-snapshot — no invented destinations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_automation_exercisable"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound browse, entity, session, and artifact tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_operations_work"
description = "Entity operations create, select, update, delete, and toggle work on agent and produce visible registry changes consistent with the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_create_honors_field_contract"
description = "Entity create/update for agent honors the same field contract as the register/edit UI (name bounds/uniqueness, closed agent-type and editor-integration enums, access-key length and charset) and keeps normal visible validation active"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_and_filters"
description = "Browse destinations agent-registry, detail-configuration, detail-history, detail-activity, and export-fleet, plus filters status and timeline-status-kind, match the allowed specification and update visible navigation/filter/export state via the same handlers as UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "session_operations_bound"
description = "Session operations start, pause, resume, and restart are bound for work-run and seeded-failure-retry-scenario demos without claiming timed visuals from tool output"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound: export format fleet-json and import mode fleet-snapshot are available without putting raw file paths, blobs, or base64 artifact contents in WebMCP arguments or results"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for browse-query-v1, entity-collection-v1, command-session-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "Invoking a bound browse, entity, session, or artifact tool leaves registry, run state, or export preview diverging from what the equivalent visible UI control would produce"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, entity operations, or artifact formats beyond the Bindings are exposed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared browse, entity, session, and artifact bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desync"
description = "Entity tools bypass field-contract validation and leave MCP and UI registry state inconsistent"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for mandated tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test hacks"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_module_missing"
description = "browse-query-v1, entity-collection-v1, command-session-v1, or artifact-transfer-v1 is not implemented despite being declared required"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave the registry or export state unchanged when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "artifact_args_contain_raw_blobs"
description = "WebMCP artifact tool arguments or results include raw file paths, blobs, or base64 artifact contents contrary to the artifact-transfer restrictions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
