[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with browse_*, entity_*, session_*, and artifact_* prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed tool handlers call the same application logic as the visible UI: browse destinations/filters, entity create/select/update/delete/toggle, session start/pause/resume/restart, and artifact export/import/copy change the same registry, run state, and export preview the table and controls use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_operations"
description = "Only documented operations from the bindings are available: destinations agent-registry, detail-configuration, detail-history, detail-activity, export-fleet; filters status and timeline-status-kind; entity agent with create/select/update/delete/toggle; session demos work-run and seeded-failure-retry-scenario; artifact formats fleet-json and import mode fleet-snapshot — no invented destinations"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_automation_exercisable"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound browse, entity, session, and artifact tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_operations_work"
description = "Entity operations create, select, update, delete, and toggle work on agent and produce visible registry changes consistent with the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "entity_create_honors_field_contract"
description = "Entity create/update for agent honors the same field contract as the register/edit UI (name bounds/uniqueness, closed agent-type and editor-integration enums, access-key length and charset) and keeps normal visible validation active"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_and_filters"
description = "Browse destinations agent-registry, detail-configuration, detail-history, detail-activity, and export-fleet, plus filters status and timeline-status-kind, match the allowed specification and update visible navigation/filter/export state via the same handlers as UI controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "session_operations_bound"
description = "Session operations start, pause, resume, and restart are bound for work-run and seeded-failure-retry-scenario demos without claiming timed visuals from tool output"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "artifact_export_import_copy_bound"
description = "Artifact operations export, import, and copy are bound: export format fleet-json and import mode fleet-snapshot are available without putting raw file paths, blobs, or base64 artifact contents in WebMCP arguments or results"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP initialization works without manual editing or test harness changes"
type = "binary"
weight = 1.0

