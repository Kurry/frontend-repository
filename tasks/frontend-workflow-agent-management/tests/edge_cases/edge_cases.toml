[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_registry_or_filter_empty_state"
description = "Removing the last agent or applying a status filter with zero matches shows a designed empty state in the table region rather than a bare table; zero-match filter empty state names the filter and offers clear-filter"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "field_contract_inline_validation"
description = "Name length 1 or 41, duplicate name ignoring case, access key length 15 or 65, or access key with a space shows an inline error naming the field before submit and adds no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_rule"
description = "Validation and import errors name the field and the rule broken (for example access key must be 16 to 64 characters) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "toasts_after_mutations_and_export"
description = "Register, remove, bulk actions, export copy, and import show visible confirmation feedback that auto-dismisses"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "run_steps_show_progress_feedback"
description = "While a simulated run is active, step statuses and the n of m progress indicator provide continuous visible progress feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "remove_confirm_and_undo"
description = "Remove requires an explicit confirm step, and Undo is available afterward to restore the removed agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "cancel_and_double_submit_safe"
description = "Cancel on register/edit leaves the registry unchanged; double-activating submit creates exactly one agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "import_rejects_malformed_contract"
description = "Importing malformed fleet JSON or a document that violates the field contract shows an inline import error, leaves row count and names unchanged, and does not clear undo history as a successful import"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "empty_undo_redo_disabled"
description = "Undo with an empty history leaves the registry unchanged and stays disabled; Redo with an empty forward stack stays disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "palette_escape_no_mutation"
description = "Opening the command palette and pressing Escape closes it without adding or removing an agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "pause_all_idle_selection_noop"
description = "Pause All with only idle or offline agents selected leaves statuses unchanged and introduces no inconsistent badges"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.12"
name = "export_empty_agents_compiles"
description = "With an empty registry, Export fleet still compiles JSON with an empty agents array and zeroed rollup counts without errors"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.n1"
name = "empty_collection_no_feedback"
description = "An empty registry or zero-match filter shows nothing and provides no empty-state UI feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_in_console"
description = "Field-contract or import failures surface only in the browser console with no inline UI message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Register, remove, export copy, or import succeed or fail silently with no visible confirmation or error"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "remove_lacks_confirm"
description = "Remove deletes an agent immediately with no confirmation step"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "invalid_payload_creates_agent"
description = "A payload that breaks the name, enum, or access-key field contract still creates a registry row"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "modal_not_escape_dismissible"
description = "The register modal, export drawer, import surface, or command palette cannot be dismissed via Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "import_mutates_on_invalid"
description = "An invalid import changes the registry row count or agent names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "selection_stale_after_remove"
description = "Removing a checkbox-selected agent leaves it in the selection or leaves bulk controls enabled with an empty selection"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
