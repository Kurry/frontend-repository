[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_console_rhythm"
description = "Spacing follows one consistent rhythm across the toolbar, table, and detail panel with no arbitrary one-off gaps visible in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_hierarchy"
description = "Typography matches the specified hierarchy: page title larger than panel headings, which are larger than table body and timeline text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_console_composition"
description = "The rendered layout matches the described console composition — full-width table, toolbar with Register/Export/Import/Undo/Redo/bulk/filter, 320px detail panel with three tabs, and export/import surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "The state changes the spec calls out — row add/remove, badge status change, step ticks, panel slide, summary expand, modal/drawer/palette enter — carry their specified transitions through real controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_spec"
description = "The 768px overlay panel pattern and the 375px container-scroll behavior match the specified responsive patterns"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "carbon_kit_styling_consistent"
description = "Data table, modals, tags/badges, tabs, notifications, and drawers share one consistent Carbon kit styling — radii, padding, and shadows do not vary arbitrarily between surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "status_mapping_matches_spec"
description = "Status color mapping matches the spec everywhere: blue running, green idle, teal paused, red error, gray offline, with a distinct error cell treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "export_surface_matches_spec"
description = "The export fleet surface matches the specified monospaced JSON preview with Copy and Download actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "rollup_tiles_match_spec"
description = "The rollup strip matches the specified compact stat-tile treatment sharing one visual language"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "icon_set_consistent"
description = "One consistent icon set is used across toolbar, timeline, steps, and empty states"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "layout_diverges_from_console_spec"
description = "The layout diverges from the specified console composition (missing docked panel, missing toolbar export/import, or card-grid substitute for the data table)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "status_colors_wrong_mapping"
description = "Status badges use an incorrect or inconsistent color mapping relative to the specified blue/green/teal/red/gray system"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "mixed_component_visual_languages"
description = "Surfaces mix incompatible visual languages (for example ad-hoc CSS buttons beside Carbon table chrome) so the console no longer reads as one kit"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "export_surface_missing_or_wrong"
description = "Export fleet is missing, or its preview is not a monospaced structured JSON surface with Copy/Download"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "spacing_chaos"
description = "Toolbar, table, and panel spacing is chaotic with overlapping or colliding regions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "type_hierarchy_absent"
description = "Page title, panel headings, and body text are visually indistinct with no hierarchy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "responsive_patterns_ignored"
description = "Narrow widths ignore the overlay-panel and container-scroll patterns and break the layout"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "motion_specs_absent"
description = "Specified transitions for rows, badges, panel, and drawers are entirely absent when driven through real controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "icon_sets_mixed"
description = "Multiple unrelated icon styles are mixed across the console"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "3.n10"
name = "error_treatment_missing"
description = "Error-status rows lack the specified distinct error treatment beyond a plain badge"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the specified console that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
