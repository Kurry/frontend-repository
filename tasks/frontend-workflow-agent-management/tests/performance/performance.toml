[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load with the seeded registry table visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear on load or during a full exercise including simulated runs, export, import, undo, and bulk pause/resume"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "ui_stays_responsive_under_runs"
description = "While multiple agents run simultaneously, filtering, selection, panel switches, and export reopen respond without multi-second hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "run_progress_shows_live_feedback"
description = "Active simulated runs show continuous step and n of m progress updates rather than freezing the UI until completion"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_registry_renders_smoothly"
description = "The seeded set of at least 8 agents renders in the table without perceived hitching on first load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "rapid_filter_no_dropped_input"
description = "Rapid repeated status filter toggles and selection changes cause no dropped interactions or stuck controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "export_reopen_stays_snappy"
description = "Reopening Export fleet after mutations regenerates the preview without multi-second freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "undo_redo_responsive"
description = "Rapid undo/redo through several registry mutations stays responsive with no hangs"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.9"
name = "no_layout_thrash_on_ticks"
description = "Step-status ticks during a run do not cause visible layout thrashing or jank that freezes the table"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "import_parse_feedback_timely"
description = "Import validation feedback for malformed JSON appears promptly without locking the UI indefinitely"
type = "binary"
weight = 0.5

