[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load with the seeded registry table visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear on load or during a full exercise including simulated runs, export, import, undo, and bulk pause/resume"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "ui_stays_responsive_under_runs"
description = "While multiple agents run simultaneously, filtering, selection, panel switches, and export reopen respond without multi-second hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "run_progress_shows_live_feedback"
description = "Active simulated runs show continuous step and n of m progress updates rather than freezing the UI until completion"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "seeded_registry_renders_smoothly"
description = "The seeded set of at least 8 agents renders in the table without perceived hitching on first load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "rapid_filter_no_dropped_input"
description = "Rapid repeated status filter toggles and selection changes cause no dropped interactions or stuck controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "export_reopen_stays_snappy"
description = "Reopening Export fleet after mutations regenerates the preview without multi-second freezes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "undo_redo_responsive"
description = "Rapid undo/redo through several registry mutations stays responsive with no hangs"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.9"
name = "no_layout_thrash_on_ticks"
description = "Step-status ticks during a run do not cause visible layout thrashing or jank that freezes the table"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.10"
name = "import_parse_feedback_timely"
description = "Import validation feedback for malformed JSON appears promptly without locking the UI indefinitely"
type = "binary"
weight = 0.5

[[criterion]]
id = "9.n1"
name = "cold_start_over_two_seconds"
description = "Cold start to interactive exceeds 2 seconds on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_exercise"
description = "Console errors or warnings appear during load or during runs/export/import"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "ui_hangs_under_concurrent_runs"
description = "With multiple agents running, the UI hangs or drops interactions for seconds at a time"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "export_freezes_ui"
description = "Opening Export fleet freezes the page for multiple seconds or leaves the preview blank while the UI stays unresponsive"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "filter_spam_breaks_controls"
description = "Rapid filter or selection changes leave controls unresponsive"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "run_ticks_jank_table"
description = "Step ticks cause sustained jank that makes the table unusable while a run is active"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "undo_hangs"
description = "Undo or redo hangs the UI for multiple seconds"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "9.n8"
name = "import_locks_ui"
description = "Import validation locks the UI indefinitely with no feedback"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "9.n9"
name = "seeded_table_hitches"
description = "First paint of the seeded registry visibly hitchs or freezes before becoming interactive"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "9.n10"
name = "progress_freezes_until_end"
description = "A running agent's progress UI stays frozen until the entire run completes with no intermediate step updates"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
