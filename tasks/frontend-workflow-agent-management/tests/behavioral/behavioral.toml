[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_reload_resets_coherently"
description = "Multi-facet round-trip: register an agent, apply a status filter, open a detail panel, then reload — the app coherently resets to the seeded baseline (seeded agents, no filter, no panel, empty undo stacks), never a mix of persisted and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "status_filter_union_proves_live"
description = "Status-filter proof: select one status and note the visible set, then add a second status; the visible set becomes the union of both, and clearing restores all agents, proving filters derive from the live collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_derived_view_tracks_mutations"
description = "Derived-view sensitivity: register an agent or change a status, reopen Export fleet, and confirm the JSON agents array and rollup counts change to match the session rather than redrawing identical hardcoded text"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_row_panel_export_echo"
description = "Cross-view echo: edit an agent's name in the modal and confirm the table row, detail panel Configuration tab, and Export fleet preview all show the new name without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "rollup_count_delta_exact"
description = "Count-delta integrity: measure the rollup total immediately before and after a valid register; the delta is exactly plus one with no lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_agents_different_export"
description = "Input-dependent output: register two agents with different valid names and confirm the Export fleet JSON contains both distinct names rather than identical entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_register_and_run"
description = "Interleaved-flow integrity: start registering an agent, cancel, start a run on another agent, then complete a new register — the running agent's progress continues and the new agent appears once without corrupting either flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_tracks_export"
description = "Edge-state round-trip: remove agents down to empty (empty state visible, export agents array empty), then register one valid agent; the table, rollup total, and Export preview all show exactly that one agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "undo_round_trip_restores_export"
description = "Undo round-trip: remove an agent, confirm it disappears from Export preview, Undo once, and confirm the agent returns in the table and Export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "export_import_reconstructs_state"
description = "Export/import pipeline: mutate the registry, export fleet JSON, import that JSON, and confirm visible names, statuses, and rollup counts match the exported document"
type = "binary"
weight = 1.0

