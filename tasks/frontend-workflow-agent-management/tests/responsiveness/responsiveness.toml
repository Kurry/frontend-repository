[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_docked_panel_layout"
description = "At desktop widths around 1440 pixels the detail panel is docked at approximately 320 pixels beside the table with the toolbar usable in one row or a deliberate wrap"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_panel_becomes_overlay"
description = "At widths of 768 pixels and below the detail panel opens as a dismissible overlay covering the table rather than staying a squeezed dock"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_horizontal_scroll"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "table_scrolls_in_container"
description = "At 375 pixel width the data table scrolls within its own container instead of forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_import_usable_on_mobile"
description = "At 375 pixel width the export preview and import surface remain fully usable and scroll within their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "toolbar_wraps_without_overlap"
description = "On narrow widths the toolbar controls (Register, Export, Import, bulk, filters) wrap or collapse without overlapping the table or each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "tap_targets_adequate_mobile"
description = "Primary controls on mobile (row actions, Register, Export, checkboxes) present tap targets large enough to use without precise pointing"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.8"
name = "typography_readable_across_breakpoints"
description = "Page title, table text, and panel headings remain readable from 1440 down to 375 without overlapping or truncating into illegibility"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "palette_usable_narrow"
description = "The command palette remains usable as an overlay at 375 pixel width without clipping its search field or results"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.10"
name = "rollup_strip_adapts"
description = "The rollup strip remains readable at narrow widths by wrapping or scrolling within its region rather than overflowing the viewport"
type = "binary"
weight = 0.5

