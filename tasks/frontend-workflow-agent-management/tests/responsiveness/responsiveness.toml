[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_docked_panel_layout"
description = "At desktop widths around 1440 pixels the detail panel is docked at approximately 320 pixels beside the table with the toolbar usable in one row or a deliberate wrap"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_panel_becomes_overlay"
description = "At widths of 768 pixels and below the detail panel opens as a dismissible overlay covering the table rather than staying a squeezed dock"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_horizontal_scroll"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "table_scrolls_in_container"
description = "At 375 pixel width the data table scrolls within its own container instead of forcing page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_import_usable_on_mobile"
description = "At 375 pixel width the export preview and import surface remain fully usable and scroll within their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "toolbar_wraps_without_overlap"
description = "On narrow widths the toolbar controls (Register, Export, Import, bulk, filters) wrap or collapse without overlapping the table or each other"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "tap_targets_adequate_mobile"
description = "Primary controls on mobile (row actions, Register, Export, checkboxes) present tap targets large enough to use without precise pointing"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.8"
name = "typography_readable_across_breakpoints"
description = "Page title, table text, and panel headings remain readable from 1440 down to 375 without overlapping or truncating into illegibility"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "palette_usable_narrow"
description = "The command palette remains usable as an overlay at 375 pixel width without clipping its search field or results"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.10"
name = "rollup_strip_adapts"
description = "The rollup strip remains readable at narrow widths by wrapping or scrolling within its region rather than overflowing the viewport"
type = "binary"
weight = 0.5

[[criterion]]
id = "7.n1"
name = "desktop_layout_broken"
description = "At 1440 pixels the table, docked panel, or toolbar overlap, clip, or leave unusable gaps that break the console composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_page_scrolls_horizontally"
description = "At 375 pixels the page scrolls horizontally or content clips outside the viewport"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "panel_stays_docked_on_narrow"
description = "At 768 pixels and below the detail panel remains a cramped side dock that squeezes the table instead of becoming an overlay"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "export_unusable_on_mobile"
description = "At 375 pixels Export fleet or Import fleet cannot be used because the preview or controls are clipped or off-screen"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "toolbar_overlaps_table"
description = "On narrow widths toolbar controls overlap the table rows or each other so labels are unreadable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "table_forces_page_overflow"
description = "The data table forces page-level horizontal overflow instead of scrolling in its own container"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "text_illegible_at_375"
description = "At 375 pixels headings or table text are truncated or overlapping into illegibility"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "palette_clipped_on_mobile"
description = "The command palette search field or results are clipped or unreachable at 375 pixels"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "7.n9"
name = "rollup_overflows_viewport"
description = "The rollup strip overflows the viewport horizontally on narrow widths with no internal wrap or scroll"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "7.n10"
name = "controls_too_small_to_tap"
description = "Primary mobile controls are so small they cannot be activated reliably by touch"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable responsiveness defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
