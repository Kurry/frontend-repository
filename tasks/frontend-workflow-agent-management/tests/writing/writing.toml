[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders headings and section titles (page title, panel tabs, toolbar), they use one consistent capitalization convention throughout"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_verbs"
description = "Where the app renders action labels, they use specific verbs such as Register Agent, Export fleet, Import fleet, Pause All, Resume All, Copy, and Download rather than generic Submit or OK when a specific label is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_field_and_rule"
description = "Where the app renders validation or import errors, they name the field and the rule broken (for example access key must be 16 to 64 characters), not only Invalid"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states (zero-match filter, empty registry, empty Activity prompts), the copy explains what belongs there and how to clear the filter or register an agent"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_quality"
description = "Where the app renders body or helper copy in the console, rate how free it is of spelling and grammatical errors"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "agent_terminology_consistent"
description = "Where the app labels the same concept in multiple places, terminology is consistent (agent vs row, Export fleet vs export) rather than mixing synonyms arbitrarily"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "timestamps_and_counts_consistent"
description = "Where the app renders timestamps, attempt counters, and n of m progress figures, formatting is consistent across the table, timeline, and Activity tab"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_specific"
description = "Where the app renders confirmation toasts after register, remove, export copy, or import, they state what happened rather than vague affirmations"
type = "binary"
weight = 0.5

