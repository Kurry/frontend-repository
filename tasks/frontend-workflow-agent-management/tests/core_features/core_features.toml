[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_registry_complete"
description = "On load, the agent table contains at least 8 seeded agents visible without pagination, spanning at least 3 editor integrations and covering idle, running, error, and offline statuses, and each row shows name, type, editor integration, a status badge, and a last-seen timestamp"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "rollup_strip_tracks_collection"
description = "A summary strip above the table shows per-status counts plus a total that match the actual rows, and the counts update in the same interaction as any status change or registration"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "error_retry_transitions_to_idle"
description = "An agent in error status shows a Retry control in its row; activating it flips the status badge to idle and appends a matching entry to that agent's event timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "register_valid_agent_appears"
description = "Submitting Register Agent with a payload that satisfies the field contract (name 2 to 40 unique chars, agent type and editor integration from their closed sets, access key 16 to 64 letters/digits/hyphen/underscore) closes the modal and adds exactly one new idle row with a fresh last-seen timestamp, and the rollup total increases by one"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "register_invalid_shows_inline_errors"
description = "Submitting the registration form with an empty name, a name outside 2 to 40 characters, a duplicate name ignoring case, a missing type, a missing editor integration, an empty access key, an access key outside 16 to 64 characters, or disallowed access-key characters shows an inline error naming each invalid field, adds no row, and the submit control stays disabled until required fields are valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "detail_panel_tabs_render"
description = "Clicking an agent row opens a right-docked panel naming the agent with its status badge and three tabs: Configuration showing name, type, editor integration, a masked access key, and status; History showing the last 10 status events with timestamps in reverse chronological order; Activity listing today's executed prompts with timestamps or a designed empty state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "edit_prefilled_updates_in_place"
description = "The panel's Edit button opens the registration modal pre-filled with the agent's current values, and saving a change updates both the registry row and the open panel without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "remove_requires_confirm"
description = "The row overflow menu offers a Remove action that deletes the agent only after an explicit confirm step, after which the row disappears and the rollup counts decrease accordingly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "start_run_advances_steps"
description = "Scripted probe: start a run on an idle agent through the real control; its badge flips to running, the Activity tab shows a progress list of at least 5 named steps, step statuses advance visibly from pending to running to complete over the following seconds, and the n of m complete indicator updates with each tick"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "retry_backoff_countdown_visible"
description = "In the seeded failure scenario, the failing step shows a retrying state with a visible attempt counter and a backoff countdown (for example waiting 5s before retry 2 of 3) that counts down on screen before the retry begins"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "manual_retry_resumes_from_step"
description = "A step that exhausts its retries is marked failed with an inline error summary and a manual retry control, and activating it resumes the run from that step while previously completed steps keep their original timestamps and outputs unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "run_completion_returns_idle"
description = "When all steps of a run complete, the run is marked complete with a visible total duration and the agent's status badge returns to idle"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "pause_checkpoint_resume"
description = "Scripted probe: pause a running agent mid-run and confirm the badge shows paused, the step list freezes with a visible checkpoint on the in-progress step, and after resuming the run continues from exactly that step with earlier completed steps' timestamps unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "bulk_pause_resume_selection"
description = "Scripted probe: select at least three agents by checkbox including running ones, activate Pause All, and confirm every selected running agent's badge flips to paused and the rollup counts shift in one action; Resume All then returns the paused selections to running"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "timeline_appends_and_filters"
description = "Every status transition, retry, checkpoint, and manual action appends a timestamped entry to the agent's History timeline in the same interaction; a filter control narrows the timeline by status kind and clearing it restores all entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "timeline_entry_highlights_step"
description = "Selecting a timeline entry that refers to a run step highlights that step in the Activity tab's progress list"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.17"
name = "work_summary_disclosure_behavior"
description = "Each agent row's collapsible current-work summary is collapsed by default, expands on activation, remembers its open state per agent while the app stays open, shows an active indicator plus the in-progress step name while running, and shows a duration summary line after the last run completes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "status_filter_union_and_clear"
description = "Selecting multiple statuses in the filter toolbar shows the union of matching agents, clearing the filter restores all agents, the rollup strip continues to reflect the full collection while a filter is active, and a zero-match filter shows a designed empty state with a clear-filter control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "cancel_and_double_submit_guarded"
description = "Cancel on the register or edit modal leaves the registry unchanged, and rapidly double-activating the submit control creates exactly one agent"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "removed_agent_leaves_selection"
description = "Removing an agent that is checkbox-selected also drops it from the selection, and the bulk controls disable when the selection becomes empty"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.23"
name = "fleet_export_live_snapshot"
description = "Export fleet opens a preview of structured fleet JSON with version, exported-at ISO-8601 timestamp, rollup counts matching the strip, and an agents array whose entries carry name, agentType, editorIntegration, accessKey, status, lastSeen, timeline, and run; after a register or status mutation the reopened preview includes that mutation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "export_copy_and_download"
description = "The export surface offers Copy, which places the exact visible preview text on the clipboard with visible confirmation, and Download, which starts a .json file download of that same text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "fleet_import_round_trip"
description = "Importing a previously exported valid fleet JSON reconstructs the registry so visible names, statuses, and rollup counts match the pre-export mutated state, and the next Export preview matches those values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "undo_redo_registry_mutations"
description = "After a register, edit, or remove, Undo restores the prior registry rows and rollup counts and Redo reapplies them; Undo and Redo controls are disabled when their stacks are empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "command_palette_jump_and_actions"
description = "Ctrl+K or Cmd+K opens a command palette listing Jump to agent entries plus Register Agent, Export fleet, Undo, and Redo; choosing a Jump entry opens that agent's detail panel and Escape closes the palette without mutating the registry"
type = "binary"
weight = 1.0

