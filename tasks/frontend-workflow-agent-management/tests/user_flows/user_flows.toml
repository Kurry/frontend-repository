[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "registration_updates_all_surfaces"
description = "Registration flow: submitting a valid create-agent payload adds exactly one idle row, increases the rollup total by one, shows the submitted configuration in the detail panel, and includes the agent in the Export fleet JSON agents array — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_register_inline_validation"
description = "Registration flow: submitting empty required fields or a payload that breaks the field contract (name length/uniqueness, access-key length/charset, missing enums) shows inline errors naming each field and creates no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_updates_row_panel_export"
description = "Edit flow: saving a valid edit updates the registry row, the open detail panel, and the next Export fleet preview for that agent's name/type/editorIntegration without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "remove_updates_rollup_and_export"
description = "Remove flow: confirming Remove deletes the row, decreases rollup counts, and drops the agent from the next Export fleet agents array"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "run_flow_to_idle_with_timeline"
description = "Run flow: starting a run on an idle agent flips the badge to running, advances at least two steps with n of m updating, returns to idle on completion with a duration, and appends matching timeline entries"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "failure_recovery_manual_retry"
description = "Failure and recovery flow: on the seeded failure scenario, a step enters retrying with attempt counter and backoff countdown, exhausts retries to failed, and manual retry resumes from that step with earlier step timestamps unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "pause_resume_checkpoint_flow"
description = "Pause flow: pausing a running agent freezes the step list with a visible checkpoint and paused badge; resuming continues from that step without re-running completed steps"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "bulk_pause_resume_flow"
description = "Bulk flow: selecting three agents including running ones, Pause All flips every selected running agent to paused and shifts rollup counts in one action; Resume All returns them to running"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "mutation_to_export_flow"
description = "Mutation-to-export: after registering a valid agent, Export fleet preview contains that agent's name and rollup.total matches the on-screen total, with Copy and Download available"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "undo_after_remove_flow"
description = "Undo after remove: removing an agent updates the row and rollup, then Undo once restores the agent row, rollup counts, and Export preview to the prior state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after a registry mutation, importing the exported fleet JSON reconstructs the same visible names, statuses, and rollup counts, and the next Export preview matches again"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "command_palette_jump_flow"
description = "Command palette jump: opening with Ctrl+K or Cmd+K and choosing a Jump to agent entry opens that agent's detail panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable"
description = "Register, Export fleet, Import fleet, run start, or pause/resume controls are missing or non-functional from the UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "register_duplicates_or_missing"
description = "A valid register creates zero rows, or rapidly double-submitting creates more than one identical agent"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "run_or_status_desyncs_surfaces"
description = "During run, pause, bulk, or edit flows, the row badge, rollup strip, detail panel, and timeline disagree about the agent's status until a reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "export_flow_dead_end"
description = "Export fleet opens but provides no usable preview text, or Copy/Download are absent so the operator cannot leave with the snapshot"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_registry_breaks_console"
description = "Removing the last agent or filtering to zero matches leaves a broken table with no empty state and no clear-filter or register path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "import_round_trip_corrupts_registry"
description = "After export-then-import of a valid snapshot, visible names, statuses, or rollup counts disagree with the pre-export mutated state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "undo_does_not_restore_remove"
description = "After a confirmed remove, Undo leaves the agent missing or rollup counts wrong"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "palette_or_modal_traps_without_exit"
description = "The command palette, export drawer, import surface, or register modal blocks further work with no Escape or dismiss path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
