[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "console_layout_composition"
description = "At 1440 pixel width the app composes as a full-width data table with checkbox selection and per-row overflow menus, a toolbar carrying Register Agent, Export fleet, Import fleet, Undo, Redo, the bulk controls, and the status filter, and a right-docked detail panel approximately 320 pixels wide with Configuration / History / Activity tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "status_color_mapping_consistent"
description = "Status badges use one consistent color mapping everywhere they appear (table, panel, rollup strip): blue running, green idle, teal paused, red error, gray offline, and the error status cell carries a visibly distinct error treatment beyond a plain badge"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "rollup_tiles_and_status_icons"
description = "The rollup strip renders as compact stat tiles sharing one visual treatment, and timeline entries and progress steps use consistent per-status iconography"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "type_hierarchy_clear"
description = "A clear typographic hierarchy is visible: page title larger than panel headings, which are larger than table body and timeline text, consistent across the table and detail panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "spacing_and_dividers_consistent"
description = "Spacing follows one consistent rhythm across the toolbar, table, and detail panel, with hairline dividers separating timeline entries and step rows, and one consistent icon set used throughout"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "control_states_distinct"
description = "Buttons, inputs, tabs, and filter controls show distinct default, hover, focus (visible ring), and disabled treatments, confirmed by inspecting computed styles while the state is active"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "visual_polish_rating"
description = "Rate the overall visual polish of the console: coherent palette, disciplined admin density, and a designed rather than default-template appearance"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "2.10"
name = "export_drawer_monospace_preview"
description = "The export fleet surface shows a monospaced JSON preview block with Copy and Download actions, visually consistent with the console's toolbar and panel language"
type = "binary"
weight = 1.0

