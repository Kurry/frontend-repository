[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "coachmarks_tour_bonus"
description = "Optional: a short dismissible coachmarks tour highlights the registry table, Export fleet, and command palette on first visit without blocking the primary workflow (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.2"
name = "fleet_activity_feed_bonus"
description = "Optional: a compact fleet activity feed lists recent registry mutations and run completions with timestamps derived from the same store as timelines (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.3"
name = "printable_fleet_summary_bonus"
description = "Optional: a printable fleet summary layout reachable from the export drawer restates rollup counts and agent statuses without changing store state (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.4"
name = "backoff_visual_polish_bonus"
description = "Optional: retry backoff presentation includes an extra polished cue beyond the required countdown and pulse (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.5"
name = "palette_fuzzy_match_bonus"
description = "Optional: the command palette fuzzy-matches agent names beyond exact prefix search (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.6"
name = "session_density_preference_bonus"
description = "Optional: within the in-memory session, a small density or column-visibility preference improves the table without using browser storage APIs (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.7"
name = "console_brand_narrative_bonus"
description = "Optional: the fleet console presents a cohesive operations-brand treatment beyond bare Carbon defaults (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.8"
name = "timeline_deep_linking_bonus"
description = "Optional: selecting a timeline entry not only highlights the step but also switches to the Activity tab automatically when needed (bonus if beyond the required highlight)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.9"
name = "export_diff_hint_bonus"
description = "Optional: the export surface shows a brief hint of what changed since the last export without blocking Copy/Download (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.10"
name = "competition_level_fleet_console"
description = "The overall console feels competition-grade: registry, live runs, export snapshot, and undo read as a polished fleet tool rather than a wired demo (bonus)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "11.n1"
name = "barebones_unstyled_table_only"
description = "The shipped UI is a bare unstyled table or plain form with no rollup strip, detail panel, or export surface immersion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "generic_admin_template_look"
description = "The experience is a generic unstyled admin template that ignores the specified Carbon console composition and status system"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
