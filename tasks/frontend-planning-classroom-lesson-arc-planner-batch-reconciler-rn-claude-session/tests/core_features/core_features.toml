[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"
[[criterion]]
id = "AC-01"
name = "signature_interaction"
description = "group selected records into a batch and reconcile aggregate totals. The batch reconciler mutation changes the primary record, linked view, and status together."
type = "boolean"
weight = 1

[[criterion]]
id = "CF-01"
name = "lesson_blocks_collection"
description = "The application must provide a Lesson Blocks collection allowing users to create edit archive and filter lesson blocks with explicit domain statuses."
type = "boolean"
weight = 1

[[criterion]]
id = "CF-02"
name = "batch_reconciler_surface"
description = "The application must provide a Batch Reconciler surface allowing users to group selected records into a batch and reconcile aggregate totals."
type = "boolean"
weight = 1

[[criterion]]
id = "CF-03"
name = "undo_mutation"
description = "The application must allow users to undo the last mutation and inspect the linked representation."
type = "boolean"
weight = 1

[[criterion]]
id = "CF-04"
name = "export_artifact"
description = "The application must allow exporting the current artifact to a JSON file named lesson-arc-v1-batch-reconciler.json."
type = "boolean"
weight = 1

[[criterion]]
id = "CF-05"
name = "import_artifact"
description = "The application must allow clearing the session and importing the artifact with field level validation."
type = "boolean"
weight = 1
