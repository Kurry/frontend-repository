[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "All interactive buttons (Log Reps, Gear Shop Equip/Unlock, Reset Quest, History Delete, Settings Save/toggle, Game Mode, Start/Pause/Resume/End run, Undo/Redo/Apply scenario change) show a visible hover state driven by the real control"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Keyboard Tab focus shows a visible focus ring on every interactive control across all four tabs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "The character sprite glides smoothly along the quest map canvas path when a new set is logged, rather than jumping instantly to its new position"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "4_4"
description = "A transient notification visibly enters and then dismisses itself for zone unlocks, boss defeats, gear purchases, undo/redo, and quest reset"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "History Delete controls reveal on row hover or keyboard focus at desktop widths"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "4_6"
description = "One or more of the required interactive controls (Log Reps, Gear Shop, Reset Quest, History Delete, Undo/Redo) has no visible hover state and no visible focus-visible ring"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.7"
name = "4_7"
description = "The character position snaps instantly along the quest map with no glide or transition when reps are logged, despite the motion requirement"
type = "binary"
weight = 1.0
negate = true
