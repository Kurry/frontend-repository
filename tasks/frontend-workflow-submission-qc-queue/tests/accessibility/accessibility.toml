[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_are_keyboard_accessible"
description = "Queue rows, row checkboxes, filters, sort, bulk actions, review controls, finding disclosures, drawer, date-range, re-check, undo/redo, export format switch, copy/download, and command palette are keyboard accessible with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_manage_focus"
description = "Review action dialogs, the contributor drawer, and the command palette trap focus while open, close on Escape, and return focus to the originating control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls (close, undo, redo, copy confirmation, tier/stage icons) expose accessible names via text or aria-label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "feedback_uses_live_regions"
description = "Validation errors, gate explanations, copy export confirmation, and bulk action feedback are conveyed visually and via ARIA live regions where confirmations appear"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Add finding, Request revision, Override, and bulk action fields use explicit labels; each validation message names its field and is associated with it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Queue, detail, Export, and drawer headings follow a logical order without skipping levels in a way that breaks navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_is_present"
description = "Main queue/detail/export regions are exposed as landmarks (main/navigation or equivalent roles) so keyboard users can move between them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Stage tags, tier chips, gate banner text, body copy, and controls have sufficient color contrast against their backgrounds"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_are_used"
description = "Interactive controls use semantic button/link/checkbox roles; queue selection checkboxes are real checkboxes or correctly ARIA-checked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, drawer, finding, gate, bar, step, toast, palette, and bulk-bar animations are removed while triage flows remain available"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Primary triage controls cannot be activated or reached via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured on queue rows, form fields, or export controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom components use non-semantic tags and lack ARIA roles or labels for checkboxes, disclosures, or palette results"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Stage, tier, or gate state is conveyed by color alone with no text label or icon"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "disclosures_lack_expanded_state"
description = "Evidence disclosures present an expanded or collapsed visual state in the UI but expose neither aria-expanded nor an equivalent accessibility-tree state"
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
