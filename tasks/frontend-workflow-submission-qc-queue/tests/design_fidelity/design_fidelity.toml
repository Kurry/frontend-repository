[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Queue toolbar, table, detail panels, and Export preview spacing follow a consistent scale with no arbitrary one-off gaps that break the ops-console rhythm described in the instruction"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the instruction hierarchy: submission titles larger than section headings, which are larger than metadata and body text; export preview is monospaced"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_ops_console"
description = "Layout matches the instruction's ops-console composition: filter toolbar above full-width queue table; detail with gate banner spanning the top and findings beside failure-profile; Export as a distinct view"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the instruction calls out (drawer, finding add/override, gate swap, profile bars, re-check steps, toasts, palette, bulk bar)"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Responsive behavior matches the instruction: table condenses at 768px, findings stack above profile, 375px has no page-level horizontal scroll, drawer goes full-width"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Buttons, selects, inputs, and toggles show the instructed default, hover, focus, disabled, and error treatments; disabled Approve is visibly muted beside its explanation"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "typography_has_clear_hierarchy"
description = "Typography has a clear hierarchy that distinguishes submission titles, section headings, and body/metadata text across queue, detail, drawer, and Export"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Component states (default, hover, active/selected, disabled, error) match the instruction where specified, including selected queue rows distinct from hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surface_treatments_match_spec"
description = "Stage tags, payout tags, tier chips, and gate banner treatments follow the instructed severity language and remain consistent across surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec"
description = "Hover and press microinteractions follow the instruction (button press, row wash, chip lift, focus rings) with durations that feel intentional rather than instant snaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the consistent ops-console scale (crowded or orphaned regions in queue/detail/export)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "layout_contradicts_instruction_composition"
description = "The first working views contradict the instructed composition (missing gate banner region, missing export view, or findings/profile arrangement that ignores the adjoining/stacked rules)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "stage_tier_treatments_inconsistent"
description = "The same stage or tier renders with inconsistent treatments across queue, detail, drawer, or timeline"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the instruction that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
