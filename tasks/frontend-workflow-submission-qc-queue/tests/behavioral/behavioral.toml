[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: open a submission, add a finding, apply a stage filter, select two rows for bulk hold, open Export and note the preview, then reload. All facets coherently reset to the seeded baseline — seeded submissions/stages/findings/payouts, no filters, empty undo history, export matching the seeded package — never a mix of persisted and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Sort-reversal proof: sort the queue by open finding count ascending, note the order, then sort descending; the order reverses correctly relative to ascending without changing the visible row count, proving sort is derived from live data rather than two hardcoded orders"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: narrow the failure-profile date range and confirm bars/percentages/mean scores change; restore the full range and confirm original values return; separately, add a blocker and confirm the gate banner and export gate_status both flip"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: request revision on a submission in the detail view and confirm the queue row stage, contributor drawer timeline, and Export preview history/stage all update to needs-revision without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure a submission's open finding count (or blocker chip count) immediately before and after submitting a valid Add finding; the delta is exactly +1 with no off-by-one or lagging counter, and the export open_finding_counts match"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: add two findings with different tiers and categories (for example blocker/correctness vs minor/tooling) and confirm the findings list, queue chips, and export findings array differ accordingly rather than producing identical records"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start Add finding on submission A, switch to submission B and complete a Request revision, return to A and finish Add finding; A's new finding and B's needs-revision stage both persist without corrupting each other, and Export reflects both"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: override every finding on a submission so open tier chips are zero and the gate is passed, then add a new blocker; chips, gate, and export regenerate through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "mutate_export_pipeline"
description = "Full-pipeline probe: Hold payout on two selected rows via the bulk bar, open Export, confirm both submissions show payout_state held in the JSON preview, Copy export and observe confirmation; then Undo and confirm the preview restores prior payout states"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "A facet of user-configured state silently reverts while others survive a reload, producing incoherent partial persistence instead of a full seeded reset"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "derived_surface_ignores_inputs"
description = "A derived surface (gate banner, failure-profile bars, or export preview) renders identically regardless of its inputs"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_inputs_produce_identical_output"
description = "Repeating Add finding with different tier/category/description inputs yields byte-identical finding records in the UI or export"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "State changes appear in one view but not another (queue vs detail vs export) until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
