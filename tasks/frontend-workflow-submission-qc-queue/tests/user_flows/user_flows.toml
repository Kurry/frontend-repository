[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "triage_end_to_end_flow"
description = "Triage end to end: open a submitted submission, move it to in-review, add a blocker finding and observe the gate banner read gate failed and the queue row gain a blocker chip, then override that finding with justification and observe the finding struck-through, the gate flip to passed, and the queue chips update — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "revision_loop_flow"
description = "Revision loop: on an in-review submission add a major finding, request a revision with a valid 20-plus-character summary, observe the stage move to needs-revision in the detail view, the queue row, and the contributor timeline (new timestamped event), then mark it revised and observe the stage return to in-review"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "approval_gate_flow"
description = "Approval gate: attempt to approve an in-review submission that has an open blocker and observe the disabled control with its explanation; resolve the blocker by override, approve, and observe stage approved and payout released in both detail and queue"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "profile_sensitivity_flow"
description = "Profile sensitivity: record two criteria's failure rates in the failure-profile panel, narrow the date range and observe the bars and percentages change, then restore the full range and observe the original values return exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "bulk_hold_and_export_flow"
description = "Bulk hold and export: select at least two queue rows, activate Hold payout, confirm both rows show held (unless already released), open Export, confirm the QC package JSON lists those submissions with payout_state held, copy the export and see the confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "undo_after_mutation_flow"
description = "Undo after mutation: add a finding, confirm it appears in the detail list and the export preview, activate Undo, and confirm the finding is gone from the list, the gate and queue chips restore, and the export preview no longer contains that finding"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filters_update_all_surfaces"
description = "Filtering the queue by stage or contributor updates the visible row set immediately; clearing filters restores all rows; zero-match filters show the designed empty state with a clear-filters control"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "drawer_and_palette_support_flows"
description = "Contributor drawer and command palette support expected flows: drawer opens from a contributor name and closes via close control, outside click, and Escape with focus return; palette opens via Ctrl/Cmd+K, navigates to a submission or Export view, and closes on Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "finding_revision_override_approve_overlays"
description = "Overlays: Add finding, Request revision, Override, and Approve dialogs/forms open with their field contracts, accept valid submits or cancel cleanly, and dismiss without trapping the queue/detail workspace."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flow_recovers_without_reload"
description = "Recovery: after a failed validation (short revision summary or invalid finding), correcting the field and resubmitting completes the flow without a reload; no dead ends require refreshing the page"
type = "binary"
weight = 1.0

