[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "first_note_empty_state"
description = "Empty state UI is present when the timeline has no notes, inviting the user to send the first note"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "composer_and_import_inline_validation"
description = "Inline validation appears on the composer text field and on Import Session JSON before a bad submit mutates state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Error messages name the offending field (text, schemaVersion, marks style) and the fix rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_toast_confirmation"
description = "Success toasts appear after send, pin, archive, bulk apply, delete, and copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "export_import_panels_show_busy_feedback"
description = "Export Copy/Download and Import processing show brief visible confirmation or progress rather than freezing silently"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "delete_supports_cancel"
description = "Delete confirmation and Delete selected offer cancel paths that leave notes unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "todo_and_syntax_affordances_discoverable"
description = "Make TODO on tag chips and search syntax chips are visible affordances for non-obvious filtering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, checkboxes, and dialogs use semantic tags"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modals_support_close_paths"
description = "Delete, Export, and Import overlays close via explicit controls and Escape"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "history_panel_shows_state"
description = "The History panel provides a History state region so long undo/redo flows show current position"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_timeline_no_feedback"
description = "An empty timeline shows nothing and provides no UI feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n2"
name = "errors_only_in_console"
description = "Composer or Import errors are surfaced only in the browser console"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Send, archive, bulk, or copy actions lack visible feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n4"
name = "delete_lacks_warning"
description = "Delete or Delete selected has no confirmation warning"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n5"
name = "interactive_nonsemantic_wrappers"
description = "Non-semantic div or span tags wrap interactive Send, Export, or bulk controls"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n6"
name = "modal_not_keyboard_dismissible"
description = "Delete, Export, or Import overlays cannot be dismissed via Escape"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n7"
name = "validation_missing_or_delayed"
description = "Validation feedback for blank send or invalid import is missing or delayed with no UI indication"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n8"
name = "button_text_ambiguous"
description = "Export, Import, or bulk action button text is ambiguous or missing"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n9"
name = "syntax_chips_lack_guidance"
description = "Search syntax chips are absent so tag: and done: filters have no in-app guidance"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.n10"
name = "bulk_checkboxes_inaccessible"
description = "Note selection checkboxes are visually hidden or inaccessible"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.11"
name = "overlength_text_rejected"
description = "Submitting composer text longer than 2000 characters shows validation naming the text field and appends no note"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "invalid_import_preserves_session"
description = "Importing malformed or field-contract-invalid Session JSON leaves notes, todoTags, and Export unchanged with visible validation"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "bulk_zero_selection_noop"
description = "Archive selected, Pin selected, and Delete selected with zero checkboxes selected start no mutations"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n11"
name = "overlength_silently_accepted"
description = "Composer text longer than 2000 characters is accepted and appended without naming the text field"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
