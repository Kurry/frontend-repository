[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "send_note_appears_everywhere"
description = "Create flow: typing call mom #family #todo and sending adds exactly one Today bubble and raises family and todo rail counts by one without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "blank_send_inline_validation"
description = "Create flow: blank or whitespace-only Send shows an inline validation message naming the text field and adds no note"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_updates_bubble_and_export"
description = "Edit flow: editing a note text and tags updates the bubble chips and the Session JSON export preview without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_removes_from_all_surfaces"
description = "Delete flow: confirming Delete removes the note from the timeline, filtered views, rail counts, and Session JSON notes array"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "calendar_archived_export_view_switch"
description = "View switch: Calendar, Archived, and Export panels open in place without a full page reload and return to the timeline with notes intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_shows_first_note_empty"
description = "Edge: after deleting the last note, the first-note empty-state prompt is visible in the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "tag_and_syntax_filters_agree"
description = "Edge: tag rail filter and tag:family syntax chip both narrow to the same family-tagged notes; clearing restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "bulk_tray_preserves_workflow"
description = "Bulk tray: selecting notes raises the tray with the correct count; clearing selection dismisses the tray and leaves notes operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "delete_and_export_overlays"
description = "Overlays: delete confirmation, Export panel, and Import panel support expected confirm/cancel/close paths without trapping the user"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "failed_import_recovers_without_reload"
description = "Recovery: a failed Import validation leaves the prior session intact and the user can continue sending notes without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable"
description = "Send, Edit, Delete, Export, or Import primary flows are not enabled from the UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n2"
name = "new_notes_missing_or_duplicated"
description = "New notes fail to show up or duplicate on Send"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n3"
name = "state_desync_across_surfaces"
description = "Pin, archive, or done state is not synced across timeline, Archived view, and Export"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n4"
name = "view_switch_breaks_timeline"
description = "Switching Calendar/Archived/Export breaks layout or loses the notes collection"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n5"
name = "empty_timeline_breaks_ui"
description = "Emptying the timeline produces broken or missing UI instead of the first-note empty state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n6"
name = "filtered_views_disagree"
description = "Tag filter, search syntax chip, and Archived view disagree about which notes are visible"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n7"
name = "bulk_tray_cannot_dismiss"
description = "The bulk tray cannot be dismissed by clearing selection"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n8"
name = "overlay_blocks_without_exit"
description = "Delete, Export, or Import overlays block navigation with no Escape or close control"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n9"
name = "failed_import_no_feedback"
description = "A failed Import provides no user feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.n10"
name = "export_dead_end_requires_reload"
description = "After Export or Import the user cannot return to the timeline without a reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "6.11"
name = "artifact_end_state_flow"
description = "Artifact end-state flow: send distinctive #family note, pin it, open Export, confirm Session JSON schemaVersion tagnote-session/v1 contains the text and pinned true, Copy confirms, Download then Import after reload restores the bubble and pin"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "bulk_archive_then_undo_flow"
description = "Bulk then undo flow: Archive selected on 2 notes moves both to Archived; Undo restores both to the main timeline with prior rail counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_omits_session_work"
description = "The artifact end-state Export preview omits the distinctive note text or pin state from the session"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
