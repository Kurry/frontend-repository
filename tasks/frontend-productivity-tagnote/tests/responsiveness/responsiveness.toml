[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "no_horizontal_scroll_375"
description = "At approximately 375px wide there is no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tag_rail_and_chips_scroll_locally"
description = "At ~375px the tag rail and search syntax chips scroll horizontally inside their own containers rather than breaking the layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "composer_pinned_narrow"
description = "At ~375px the composer stays pinned and legible at the bottom"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "export_bulk_usable_narrow"
description = "At ~375px Export tabs, Copy, Download, and the bulk tray stay fully visible and operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "desktop_centered_column"
description = "At desktop widths the single centered column keeps its maximum width while the canvas fills remaining space"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "long_url_wraps"
description = "A long unbroken URL wraps inside its bubble rather than overflowing the column at narrow and desktop widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "Touch gestures such as swipe and tap work on mobile where present."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "Small screens have no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "media_and_canvases_resize"
description = "Images, grids, and canvases size responsively to fit the layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Fixed controls remain accessible on all devices."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "page_scrolls_horizontally_375"
description = "At ~375px the page scrolls horizontally"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n2"
name = "composer_unreachable_narrow"
description = "At ~375px the composer is pushed off-screen or unreachable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n3"
name = "export_clipped_narrow"
description = "At ~375px Export or bulk tray controls are clipped or inoperable"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n4"
name = "desktop_column_stretches_full"
description = "At desktop width the content column stretches edge-to-edge with no centered max-width treatment"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n5"
name = "sidebar_or_menu_breaks_by_width"
description = "The sidebar or menu is unresponsive or missing at some widths."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_positions_obscure_content"
description = "Fixed positions obscure content."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "elements_overlap_at_some_size"
description = "Stacking or overlap issues appear at some viewport size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "required_mobile_touch_actions_missing"
description = "Touch actions are not available on mobile where the spec requires them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "fixed_size_media_overflows"
description = "Images, charts, or canvases use a static size and overflow the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Controls disappear at specific sizes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
