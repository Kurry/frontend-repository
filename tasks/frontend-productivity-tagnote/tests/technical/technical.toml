[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "TI-1"
name = "TI-1"
description = "Navigating to / reaches an interactive UI and a distinctive typed note appears in the timeline with no blank page, error overlay, or noscript fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-2"
name = "TI-2"
description = "No uncaught JavaScript errors or unhandled promise rejections are logged in the console during initial load"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-3"
name = "console_clean_during_full_exercise"
description = "Driving a full exercise of the app's features (send with a tag, edit, pin, archive, delete, filter, search, calendar, undo/redo) logs no console errors or warnings at any point"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-4"
name = "reload_returns_empty_seeded_baseline"
description = "After creating notes and marking domain state, a full page refresh returns the app to the empty seeded baseline (empty timeline, empty rail) rather than restoring prior notes — in-memory genre"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-5"
name = "TI-5"
description = "A change made in one view (pin, tag, done) is immediately reflected everywhere that note appears, drawn from one shared collection rather than a disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-6"
name = "rapid_25_send_burst_stability"
description = "The send workflow withstands at least 25 rapid deterministic submissions through the Send control with the final visible note count exact, controls responsive, and no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-NEG-1"
name = "browser_storage_used_or_fake_persist"
description = "After exercising send/pin/archive/export, localStorage or sessionStorage is non-empty, or a success toast claims persistence while a reload still shows notes from the prior session (good-app in-memory violation)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-NEG-2"
name = "TI-NEG-2"
description = "A hidden element, attribute, or window.* global not mandated by the spec exposes internal ground-truth state a real user could not reach through the visible UI"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-NEG-3"
name = "TI-NEG-3"
description = "The app renders or behaves differently when it detects automation (keying on navigator.webdriver or similar) rather than on user action"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "TI-7"
name = "visible_focus_logical_tab_order"
description = "Keyboard Tab focus is clearly visible on interactive controls (an accent outline/ring) and moves in a logical reading order from the top bar through the tag rail, timeline, and composer"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-8"
name = "delete_dialog_focus_trap_escape"
description = "The delete confirmation dialog traps keyboard focus while open, closes without deleting when Escape is pressed, and returns focus to the control that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-9"
name = "composer_error_aria_live"
description = "The composer's inline validation error is exposed through an aria-live polite region in addition to being shown visually"
type = "binary"
weight = 0.5

[[criterion]]
id = "TI-10"
name = "icon_controls_accessible_names"
description = "Icon-only controls expose accessible names describing their action (visible in the accessibility tree as aria-label or equivalent)"
type = "binary"
weight = 0.5

[[criterion]]
id = "TI-11"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load, with no blank screen or blocking spinner past that point"
type = "binary"
weight = 0.5

[[criterion]]
id = "TI-NEG-4"
name = "unescaped_note_html_executes"
description = "A note whose text contains HTML markup (for example a script or img tag with an event handler) renders or executes it as live markup instead of showing the characters as literal text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI-NEG-5"
name = "chrome_navigates_off_app"
description = "App chrome contains an outbound navigational link, or activating any in-app control navigates the browser away from the app's origin"
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "TI-12"
name = "in_memory_store_coherence_across_surfaces"
description = "A pin, archive, or done toggle updates the timeline bubble, the Archived or TODO split view, and the Export Session JSON preview from one shared collection without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-13"
name = "session_json_and_composer_share_field_contract"
description = "Composer rejection of blank or over-length text and Import rejection of Session JSON that violates the same text/marks/boolean rules both name the offending field and leave the last valid notes collection intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "TI-NEG-6"
name = "export_preview_stale_after_mutation"
description = "After sending or pinning a note, reopening Export shows Session JSON identical to the pre-mutation preview (export not compiled live from the store)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "TI.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console health, state coherence, persistence, stability) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, storage state, desynced views) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
