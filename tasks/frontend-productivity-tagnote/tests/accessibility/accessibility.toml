[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Top bar controls, tag rail chips, search syntax chips, note actions, selection checkboxes, bulk tray actions, Export/Import controls, and the composer are keyboard accessible with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "dialogs_manage_focus"
description = "Delete confirmation, Export panel, and Import panel trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls expose accessible names describing their action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_uses_live_regions"
description = "Composer inline validation and Import validation messages are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Composer and Import fields use visible labels or accessible names associated with the controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "TagNote title and date-section headings follow a logical order without skips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_regions_present"
description = "The shell exposes landmark regions (banner/main/complementary or equivalent) so the timeline and composer are distinguishable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Primary ink on #F5F5F7 canvas and #007AFF controls on near-white text keep sufficient contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_used"
description = "Interactive controls use button/input semantics rather than clickable bare divs for Send, Export, and note actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, shake, bubble, toast, tray, and export animations are removed while features remain usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Bulk checkboxes, Export tabs, or syntax chips cannot be reached via keyboard"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "dialogs_lose_focus"
description = "Delete, Export, or Import overlays leave keyboard focus unmanaged while open (focus escapes the dialog) or leave focus stranded away from the opener on close"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "icon_only_unnamed"
description = "Icon-only note actions lack accessible names"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "errors_not_announced"
description = "Composer or Import errors are visual-only with no live region"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "unlabeled_composer"
description = "The composer text surface has no accessible name or label"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Text is unreadable due to poor contrast."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Error feedback is visual only and is not screen-reader accessible."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Icon or image content is missing alt text."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Headings are skipped or unordered, such as jumping from H1 to H3."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Animations ignore reduced-motion settings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
