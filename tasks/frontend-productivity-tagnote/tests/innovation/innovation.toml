[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "command_palette_bonus"
description = "Optional: a command palette jumps to tags, Export, or Import beyond the required controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "richer_markdown_export_styling"
description = "Optional: Timeline Markdown export offers richer styling controls beyond the required report"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "todo_setup_coachmarks"
description = "Optional: coachmarks guide the first Make TODO setup while staying on-brand"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "enhanced_history_visualization"
description = "Optional: History branch visualization is clearer than a plain list while remaining usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_chord_hints"
description = "Optional: keyboard chord hints surface undo/redo or export shortcuts"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "tag_analytics_beyond_counts"
description = "Optional: tag usage insights beyond the required rail counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_empty_illustration"
description = "Optional: polished empty-state illustration work that stays on-brand with the TagNote shell"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "import_diff_preview"
description = "Optional: Import shows a diff preview of incoming notes before commit"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "print_friendly_timeline"
description = "Optional: a print-friendly timeline layout beyond the required markdown export"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_polish"
description = "Optional: competition-level interaction polish visibly beyond the specification"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app includes a significant, browser-observable enhancement beyond the required TagNote specification that is NOT covered by any other criterion in this file. Name the enhancement and cite the concrete evidence. If already covered by another criterion, answer no here."
type = "binary"
weight = 1.0
