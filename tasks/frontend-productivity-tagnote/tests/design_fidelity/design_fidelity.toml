[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_4px_scale"
description = "Spacing and gaps follow the 4px-multiple scale described in the visual design, with no arbitrary one-off crowding in the shell"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the spec: h1 at 34px, section h2 at 17px, body/note text at 17px in the SF Pro / -apple-system stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_shell"
description = "Desktop layout matches the reference screenshots shell (centered column, sticky top bar and composer, tag rail above timeline) within a small tolerance; where screenshots and text conflict, text wins"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "list_and_view_transitions_present"
description = "Add/remove/move bubble transitions and Calendar/Archived/Export view switches animate as specified rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "narrow_behavior_matches_spec"
description = "At ~375px the tag rail scrolls locally, notes wrap, and the composer stays pinned as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "pill_controls_match_spec"
description = "Primary #007AFF pills and secondary #E6EEF7 pills match the specified radius and shadow-free treatment"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "hierarchy_title_vs_body"
description = "The TagNote title is visually larger than section headers, which are distinct from 17px note body text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "hover_active_states_match"
description = "Hover and active press states on Send, chips, and bubbles match the specified treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_match_palette"
description = "Canvas #F5F5F7, white note cards, #FFCC00 pin badge, and #007AFF links match the specified palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "export_bulk_chrome_matches"
description = "Export panel tabs/preview and the bulk tray match the specified chrome language rather than an unstyled default"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_scale"
description = "Visible sizing or spacing values contradict the 4px scale with cramped or uneven shell regions"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n2"
name = "typography_mismatches_spec"
description = "Heading or body sizes clearly contradict the 34/17/17px spec"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n3"
name = "shell_diverges_from_reference"
description = "The desktop shell layout diverges grossly from the reference screenshots without instruction text justifying the change"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n4"
name = "pill_controls_wrong_treatment"
description = "Primary/secondary pills use wrong colors, add unexpected shadows, or lose the full pill radius"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n5"
name = "palette_wrong"
description = "Canvas, card, pin badge, or link colors clearly contradict the specified palette"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "The grid or layout is misaligned at reference breakpoints."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Elements render off-screen or clipped."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order, content, or structure deviates from the reference on fidelity tasks."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "Heading and body text have no distinction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Microinteractions are missing or deviate from the provided reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
