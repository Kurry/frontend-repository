[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "MO-1"
name = "toast_confirmations_fade_autodismiss"
description = "Sending, pinning/unpinning, archiving/unarchiving, attaching a file, bulk applying, and deleting a note through their visible controls each surface a transient toast confirmation that animates in immediately and auto-dismisses with a fade after roughly 2.5 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-2"
name = "MO-2"
description = "Attempting to send a blank note via the Send control plays a short shake on the composer input row alongside a visible inline error"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-3"
name = "hover_and_press_feedback"
description = "Hovering the Send control, a tag chip, a search syntax chip, a note action control, and a note bubble each shows a visible hover state distinct from resting, and pressing Send or another button depresses it slightly while active"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-4"
name = "MO-4"
description = "Selecting a tag and opening Calendar or Archived update the timeline in place without a full page reload, with the active control reflecting the current view"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "MO-NEG-1"
name = "MO-NEG-1"
description = "Interactive controls (Send, tag chips, note actions) show no hover or focus feedback, appearing inert"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO-NEG-2"
name = "MO-NEG-2"
description = "A blank note submission is only silently blocked by a disabled control with no visible error or shake explanation"
type = "binary"
weight = 0.5
negate = true
optional = true

[[criterion]]
id = "MO-5"
name = "list_add_remove_move_animates"
description = "Sending a note animates the new bubble into the timeline rather than snapping in, deleting or archiving a note animates the bubble out, and pinning a note animates it into the Pinned section — each verified by activating the real visible control, not a state shortcut"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-6"
name = "reduced_motion_disables_animation"
description = "With prefers-reduced-motion set, the shake, bubble, toast, tray, and export animations are removed and state changes apply instantly while every feature remains fully usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-7"
name = "bulk_tray_slide"
description = "The bulk tray slides up when the first note is selected via the real checkbox and slides away when the selection clears — verified through the visible UI path"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-8"
name = "export_panel_enter_exit"
description = "The Export panel enters and exits with a short opacity-and-scale transition of roughly 200 milliseconds when opened and closed through the visible Export control"
type = "binary"
weight = 1.0

[[criterion]]
id = "MO-NEG-3"
name = "bulk_tray_snaps_without_motion"
description = "With motion enabled, the bulk tray appears or disappears with no visible slide/transition when selection changes"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "MO.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (control exercised, observed transition or lack of it) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
