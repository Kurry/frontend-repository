[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Headings, buttons, chips, and toasts use one consistent capitalization convention throughout"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_action_labels"
description = "Action labels use specific verbs such as Send, Export, Import, Copy, Download, Archive selected, Pin selected, and Delete selected rather than generic OK or Go"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "empty_states_explain_region"
description = "Empty states explain what belongs in the timeline, filter results, and Archived view and how to add content"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "errors_name_problem_and_fix"
description = "Validation messages name the problem and the fix for blank text, over-length text, and invalid Import payloads"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "no_placeholder_lorem"
description = "No placeholder or lorem text appears anywhere in the shipped UI"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.6"
name = "toast_copy_names_action"
description = "Toasts name the action they confirm (sent, archived, copied) rather than generic Success"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "numbers_dates_and_units_are_consistent"
description = "Where the app renders numbers, dates, and units, formatting is consistent (same date format, same decimal precision, units labeled)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders confirmation and success messages, they state what happened ('Entry saved'), not vague affirmations."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "inconsistent_capitalization"
description = "Capitalization conventions clash across top bar, chips, and toasts"
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n2"
name = "generic_button_labels"
description = "Primary actions use only generic labels like OK or Submit where specific verbs are specified"
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n3"
name = "empty_states_are_blank_or_lorem"
description = "Empty states are blank or use lorem/placeholder copy"
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n4"
name = "errors_are_unspecific"
description = "Validation messages only say Invalid without naming the field"
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
