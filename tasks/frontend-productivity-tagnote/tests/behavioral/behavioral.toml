[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_reset"
description = "Multi-facet round-trip (in-memory): send a note with #family, pin it, apply the family tag filter, then reload. Notes, pin state, and the active filter all coherently reset to the empty seeded baseline — never a mix of surviving notes with reset chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "calendar_day_filter_reversal"
description = "Sort/filter reversal proof: open Calendar, click a marked day to filter to that day notes, note the visible set, then click the same day again; the full timeline restores, proving the day filter is derived from live data"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_tracks_mutations"
description = "Derived-view sensitivity: send note alpha-one #family, open Export Session JSON and confirm it contains alpha-one; edit the note text to alpha-two and reopen Export; the preview contains alpha-two and no longer lists alpha-one as current text"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "archive_echo_rail_and_export"
description = "Cross-view echo: archive a note that uniquely carries tag solo; without reload the main timeline loses the bubble, the rail drops solo, the Archived view lists the note, and Session JSON shows archived true for that note"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "send_count_delta_exact"
description = "Count-delta integrity: measure the visible note count immediately before and after sending one valid note; the delta is exactly one with no lagging counter"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_notes_different_exports"
description = "Input-dependent output: send note-AAA, note its Session JSON preview, reload to empty, send note-BBB; the two Session JSON previews differ in the notes text they contain"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_edit_and_export"
description = "Interleaved-flow integrity: start Editing a note, open Export and confirm the pre-edit text is still exported, Cancel the edit, then send a new note; neither flow corrupted the other and the canceled edit did not land"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_rail_and_export"
description = "Edge-state round-trip: delete every note until the first-note empty state shows and Export notes array is empty; send a new note; the rail, timeline, and Session JSON notes array all repopulate together"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_in_memory_state_survives_reload"
description = "After sending and pinning notes, a reload leaves an incoherent mix (some notes survive while filters/rail reset, or export panel state survives alone)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n2"
name = "export_identical_regardless_of_notes"
description = "Session JSON or Timeline Markdown export preview renders identically before and after sending a distinctive note (derived export ignores inputs)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n3"
name = "different_notes_identical_export"
description = "Two sessions that sent different distinctive note texts produce byte-identical Session JSON preview text"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n4"
name = "rail_stale_until_reload"
description = "After archiving a note that uniquely used a tag, the tag rail still shows that tag until a full page reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.9"
name = "import_export_round_trip_pipeline"
description = "Full pipeline: send distinctive text with #todo, mark todo as TODO tag, check the note done, Export Session JSON (confirm schemaVersion tagnote-session/v1 and done true), reload to empty baseline, Import the JSON, and confirm the bubble, TODO checkbox Done placement, and rail counts match"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_restores_after_bulk_archive"
description = "Select 2 notes, Archive selected, confirm both leave the main timeline; Undo restores both bubbles and prior rail counts exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "undo_does_not_restore_bulk_archive"
description = "After Archive selected on 2 notes, Undo leaves both notes still archived or restores only one of them"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n6"
name = "export_omits_done_or_todotags"
description = "After marking a TODO tag and checking a note done, Session JSON omits that tag from todoTags or shows done false for that note"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
