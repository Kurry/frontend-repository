[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "single_page_experience_title"
description = "On load the experience serves a single-page app at route / only (no second document ever loads), and the browser tab title reads exactly The Heron & Loom Polo Atelier Experience"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "preloader_shows_then_clears"
description = "On a fresh load a full-viewport preloader shows an animated origami-style heron line-art logo, the words Welcome to the Heron & Loom Polo Atelier, and a loading progress indicator that reaches completion and then clears to reveal the lobby rather than permanently blocking content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "lobby_contents_and_cta"
description = "The lobby introduces the tour with a floating origami-heron mascot, drifting knitted polo shirts, the headline The Polo Atelier Experience, a one-paragraph invitation, a Begin the tour call-to-action, and a persistent sound toggle"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "begin_advances_to_first_hall"
description = "Activating Begin the tour advances from the lobby to the first machine hall (Knitting) within the same page as a client-side state change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "three_halls_fixed_order_progress_rail"
description = "The tour has exactly three machine halls in the fixed order Knitting, Dyeing, Embroidering, plus a progress rail that always shows which halls are completed, which is active, and which are locked"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "hall_scene_arcade_button_and_orbit"
description = "Each machine hall renders an interactive 3D scene of a stylized factory machine on a floating platform with an oversized arcade-style push button in the foreground; the scene supports pointer-drag orbiting within clamped bounds and shows idle ambient animation (soft bobbing, blinking indicator lamps, drifting steam particles)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "press_hold_charges_meter"
description = "Pressing and holding the arcade button (mouse down or touch) visibly depresses the button cap and fills a charge meter over about one second of hold, and a completed charge triggers the machine run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "early_release_drains_no_run"
description = "Releasing the arcade button before the charge meter completes visibly drains the meter and does not trigger a machine run or append a run-log entry, and the hall stays incomplete"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "staged_machine_run_completes_hall"
description = "A completed charge plays a staged, non-interruptible machine run of roughly four to seven seconds in which the machine visibly processes the polo, ending with the transformed polo presented under a spotlight and the hall marked complete on the progress rail"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "per_hall_signature_transformation"
description = "Each hall's run performs its signature transformation: Knitting assembles a wireframe polo into knitted fabric, Dyeing submerges the white polo and lifts it out in the chosen dye color, and Embroidering stitches the heron crest onto the chest"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "ordered_hall_unlocking"
description = "A hall unlocks only after the previous hall's machine has been run; the next hall in order becomes active after the current run completes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "sound_toggle_persists_across_chapters"
description = "A persistent sound toggle is visible in the chrome across all chapters and its on/off state is reflected wherever it appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "six_named_dye_swatches"
description = "The Dyeing hall exposes a swatch picker of exactly six named dye colors — Marsh Green, River Blue, Clay Red, Sand, Ink, Chalk — each rendered as a distinct labeled swatch"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "swatch_selection_drives_dye_run"
description = "The selected dye swatch drives the dye run's resulting polo color and is reflected in the run log entry for the dyeing run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "dye_color_persists_through_session"
description = "The chosen dye color persists through the rest of the session, including the confirmation summary card and the atelier-pass export, rather than resetting to a default"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "run_log_appends_entries"
description = "Every machine run appends an entry to a visible session run log recording the hall, a timestamp, the outcome, and for dyeing the chosen color; entries accumulate rather than overwriting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "chrome_stays_single_page"
description = "Activating any chapter chrome (Begin the tour, progress rail items, swatch picker, sound toggle, form controls, overlays, export controls) changes client-side state within the single page without reloading the document or leaving the origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "paper_atelier_visual_world"
description = "The rendered experience expresses an original paper-atelier visual world — warm off-white paper field, deep botanical green primary, a warm clay accent, ink-dark text, subtle grain and knit-line texture, rounded card geometry — rather than an unstyled component-library default theme"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.31"
name = "distinct_machine_silhouettes"
description = "The three machine scenes share one material language (matte painted metal, brass accents, fabric surfaces, emissive lamps) while each hall keeps a distinct silhouette and signature mechanism — a needle carriage for Knitting, a dye vat and hoist for Dyeing, an embroidery gantry for Embroidering"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "showcase_moment_after_three_halls"
description = "Completing all three halls presents the finished polo in a showcase moment and unlocks the prize-draw entry chapter via a Claim your entry call-to-action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "arcade_button_signature_object"
description = "The arcade push button reads as a three-part signature object (cap, collar, base) with a visible pressed state, a circumferential charge meter, and lamp feedback tied to charge state rather than a flat default button"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.34"
name = "prize_form_fields_and_countries"
description = "The prize-draw entry form collects first name, last name, email, a country select with exactly the eight options United States, United Kingdom, France, Germany, Spain, Italy, Japan, Australia, and a required terms-of-participation checkbox"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "hall_run_flow_probe"
description = "Scripted hall-run flow: from the Knitting hall press and hold the arcade button to full charge, confirm the button cap depresses and the charge meter fills over about one second, confirm the staged run plays and ends with a spotlighted polo, and confirm the Knitting hall is marked complete on the progress rail and a run-log entry was appended — all within the single page with no document reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "prize_form_validation_probe"
description = "Scripted validation flow: submit the prize-draw form with an empty first name, a malformed email (e.g. name@), and the terms checkbox unchecked; confirm three inline per-field errors render, focus moves to the first invalid field, and no confirmation chapter appears; correcting all fields allows a valid submission that advances to the confirmation chapter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "charge_cancel_probe"
description = "Scripted charge-cancel flow: in a hall, press the arcade button briefly and release before full charge, confirm the meter visibly drains and no run triggers, no run-log entry is created, and the hall stays incomplete; repeat the press-and-release cycle at least twice more and confirm it keeps working with no stuck intermediate charge state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "reload_baseline_probe"
description = "Scripted reload baseline: run a hall, pick a dye color, and open the prize-draw form, then reload; confirm the preloader plays again, the experience returns to the lobby with no completed halls, an empty run log, no chosen dye color, and no entrant data, and no prior visit state persists"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "rapid_button_no_double_run"
description = "Rapidly re-activating a machine button during an in-progress run never starts a second overlapping run, never duplicates run-log entries, and never corrupts the progress rail"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "rules_overlay_focus_return"
description = "Opening the rules overlay from the terms label and closing it via its close control or Escape returns focus to the checkbox label and never navigates away from the page"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.41"
name = "terms_required_blocks_submit"
description = "Submitting the prize-draw form with the terms-of-participation checkbox unchecked is blocked: an inline error names the terms field and no confirmation chapter appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "double_submit_single_confirmation"
description = "Double-activating the prize-draw submit control on one valid entry creates exactly one entrant record and shows exactly one Congratulations confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "webgl_fallback_tour_completable"
description = "With WebGL rendering unavailable, each machine hall falls back to a static 2D illustrated composition of the same machine with the arcade button still fully functional (charge, staged 2D run, log, progress), and the tour remains completable end to end"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "locked_hall_affordance"
description = "From the Knitting hall with nothing run yet, attempting to jump to Embroidering via the progress rail does not activate the locked hall and shows a visible locked affordance explaining that halls unlock in order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "authored_asset_surface_inventory"
description = "Across the rendered experience, every major authored surface is populated: the animated origami-heron preloader logo, the lobby mascot and drifting polos, the three distinct machine scenes, the six dye swatches, the heron crest embroidery motif, the rotate-device illustration, and the paper/knit-line decorative patterns are all visible in their intended chapters"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "rotate_device_overlay"
description = "On viewports in portrait orientation below tablet width, a full-screen rotate-device overlay with an original illustration and the exact text Rotate your device to continue covers the experience until orientation or size changes, and the underlying state is preserved"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "run_count_updates_immediately"
description = "Completing a machine run immediately increments a visible run count / run-log length that matches the number of runs performed, with no lagging or off-by-one readout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "replay_after_completion_appends"
description = "After the tour is complete, navigating back to a completed hall via the progress rail and re-running the machine is allowed and appends further run-log entries rather than overwriting the existing log"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "confirmation_summary_card"
description = "The confirmation chapter shows the exact headline Congratulations, a confirmation paragraph, and a summary card presenting the entrant name, the completed halls, the chosen dye color, and the run count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "export_controls_present"
description = "The confirmation chapter exposes a Download pass control and a Copy pass control that emit an atelier-pass JSON document, with copy-with-confirmation feedback on the Copy control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "export_reflects_session_state"
description = "The atelier-pass JSON compiled by Download or Copy reflects the session's actual state — the entrant fields, the ordered run log, the chosen dye color, and the hall completion states — and an export that omits any session run, the chosen dye color, or the entrant is invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "atelier_pass_schema_shape"
description = "The atelier-pass JSON conforms to the documented shape { pass_id, entrant { first_name, last_name, email, country }, dye_color, halls { knitting, dyeing, embroidering as booleans }, runs [{ hall, at, outcome, color? }] }, with a generated pass_id and one runs entry per machine run performed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "rules_overlay_in_page_only"
description = "The terms-of-participation label opens an in-page rules overlay describing the fictional prize draw in plain language; the label and overlay never link to or navigate to an external site"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "state_exists_as_dom_text"
description = "All meaningful session state also exists as readable DOM text (progress rail labels, run log entries, summary card fields) in addition to the 3D scenes, so the tour state is observable without reading the canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "country_enum_closed"
description = "The country select accepts only the eight declared options (United States, United Kingdom, France, Germany, Spain, Italy, Japan, Australia) and no other value; the chosen country is recorded and appears in the atelier-pass export"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.56"
name = "email_schema_validation"
description = "The prize-draw email field is schema-validated: a value without a domain (e.g. name@) is rejected with an inline error naming the email field, and a whitespace-only first or last name is rejected, while trimmed values are what a successful submission records"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.57"
name = "copy_pass_fallback_on_denied_clipboard"
description = "When clipboard access is unavailable or denied, Copy pass degrades to a visible fallback (selectable JSON shown in a dialog) rather than failing silently"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "no_browser_storage_used"
description = "Exercising the full experience writes nothing to localStorage, sessionStorage, cookies, or any other browser storage API; storage inspection stays empty across the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.59"
name = "local_offline_assets_only"
description = "Every font, image, model, texture, audio file, script, and stylesheet loads from the same origin; devtools network shows no CDN, analytics, tag-manager, or remote font/model host requests at runtime"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.60"
name = "no_source_brand_appears"
description = "No source-brand element appears anywhere in the rendered experience: no crocodile mascot, no real brand name Lacoste or its logotype, and no source-site links or copied source copy; every mark and word is the fictional Heron & Loom house"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.61"
name = "core_features_catch_all"
description = "Open-ended: a specified core behavior of the Heron & Loom Polo Atelier Experience (preloader, lobby, halls, charge-and-run, dye swatches, run log, prize-draw form, confirmation, atelier-pass export, sound toggle, rotate overlay, or WebGL fallback) is broken or missing in a way not covered by any other criterion in this dimension"
type = "binary"
weight = 1.0
