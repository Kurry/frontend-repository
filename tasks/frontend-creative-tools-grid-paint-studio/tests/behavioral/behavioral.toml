[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_reset"
description = "Starting on Paint: switch to Color Brush, pick a non-black swatch, paint at least 3 cells, enable Mirror Horizontal, switch to Gallery and save a uniquely named board, snap a version, then reload. All facets coherently reset to the seeded baseline together — 4 seeded boards, blank canvas at cell size 40, QR Brush active, black swatch, Mirror Off, Vision Off, empty undo/redo — never a mix of persisted user art with reset tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "tag_filter_then_clear_restores_list"
description = "Filter-reversal proof: note the full gallery list, filter by a seeded board's tag so the list narrows, then clear the filter; the full list restores exactly (same boards, same count), proving the visible list is derived from the shared collection rather than two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "gallery_list_responds_to_tag_filter"
description = "Derived-view sensitivity: apply a tag filter that matches a subset of boards; the visible gallery list changes meaningfully (fewer cards, only matching tags). Clearing the filter restores the full list rather than redrawing identically regardless of filter input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "paint_save_echo_across_modes"
description = "Cross-view echo: paint a recognizable pattern in Paint mode, save it from Gallery with a valid name, open Export center — Project JSON includes that board name and cell pattern — return to Paint without reload and the painted board remains untouched."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "gallery_count_delta_exact"
description = "Count-delta integrity: note the gallery count, save one new uniquely named board, and confirm the count increases by exactly one; after deleting that board, confirm the count decreases by exactly one with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_paints_save_different_thumbnails"
description = "Input-dependent output: paint two clearly different patterns (for example red block vs blue block), save each with a distinct name; the two gallery thumbnails differ in the ways those painted cells dictate, and Export center Project JSON differs between the two sessions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_paint_and_gallery"
description = "Interleaved-flow integrity: start painting in Paint mode, switch to Gallery and favorite/filter a seeded board, return to Paint and continue the stroke/tool state; neither flow corrupts the other — painted cells and gallery facets remain coherent without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_gallery_then_repopulate"
description = "Edge-state round-trip: delete every board (empty-gallery state visible), then paint and save a new named board; the gallery count tracks through both transitions (zero then one) and the new card appears with a matching thumbnail."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_probe"
description = "Export then Import Project JSON after Clear: board cells, gallery boards (including SavedBoard name/tag/favorite), versions, histogram bars, tool/swatch/mirror/vision, and cell lock reconstruct from the ProjectDocument payload rather than remaining blank or seeded-only."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_redo_histogram_round_trip"
description = "Paint, undo, redo: canvas cells and histogram bars return to the post-paint state on redo and to the prior state on undo, proving both surfaces share one board history."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "mirror_fill_export_consistency"
description = "With Mirror Both, paint one cell then open Export center: Project JSON cell data includes both the painted cell and its mirrors, matching what the canvas shows."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "project_document_schema_round_trip_probe"
description = "Schema round-trip: paint cells, save a board with a closed-enum tag, confirm Export Project JSON shows ProjectDocument keys and that SavedBoard boards entry (name, tag, favorite, cellSize, cells); Clear; Import the same JSON; gallery card name/tag/favorite, canvas cells, and Project JSON text all match the pre-Clear export."
type = "binary"
weight = 1.0

