[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "coherent_board_and_gallery_state"
description = "A board change made through painting, filling, loading, saving, renaming, deleting, favoriting, filtering, bulk actions, import, or version snap is reflected immediately and consistently across the canvas, toolbar indicators, histogram, Gallery rows, Export center text, thumbnails, counts, and active mode without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "in_memory_reload_rule"
description = "After changing board cells, undo/redo history, active tool, palette, mirror, vision, saved boards, versions, mode, favorite state, and filters, a fresh page load resets all facets coherently to the seeded in-memory baseline rather than retaining a partial mixture"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "forbidden_browser_storage"
description = "After exercising painting, gallery CRUD, favorites, filters, export/import, versions, and mode changes, localStorage, sessionStorage, IndexedDB, or another browser persistence store contains app board or UI state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "cross_surface_state_desync"
description = "The same board datum shows conflicting values between the canvas, histogram, saved thumbnail, Gallery metadata, Export center Project JSON, filters, count, or active selection during a normal interaction flow"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "stroke_batched_undo_redo_history"
description = "Each completed pointer stroke, fill, or mirror-expanded write pushes exactly one undo step; Undo (or Backspace/Ctrl+Z) reverts the whole most-recent step; Redo restores it; a new paint after undo clears the redo stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "undo_capacity_and_rapid_input"
description = "After more than 100 short completed strokes, the app remains responsive, preserves a bounded history of approximately 100 undo steps, and repeated Undo never corrupts the remaining canvas or toolbar state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "local_asset_and_qr_network_hygiene"
description = "From a fresh load through QR painting, icons, dialogs, camera chrome, command palette, and animation interactions, the network log shows only same-origin app assets; QR glyph generation and the fixed studio payload cause no backend, CDN, font, icon, script, or image request"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "console_clean_full_flow"
description = "No console errors or unhandled promise rejections appear from first load through paint/fill/undo/redo/clear, resolution, upload, camera cancel, Gallery CRUD/bulk/filter/load, Export center copy/download, Import Project, toolbar drag, and share-fallback flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "inline_form_validation_runtime"
description = "Saved-board create/rename (name uniqueness, max 40, closed-enum tag), version name (max 40), and Import Project error paths (including cells/cellSize cross-field mismatch) expose visible field-level validation before invalid submission can mutate collections, and correcting the field clears the error and permits the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "keyboard_and_pointer_handler_parity"
description = "For QR/Color/Flood Fill/Eraser, grid toggle, Mirror, Undo/Redo, palette 1–7, and Ctrl/Cmd+K, invoking a keyboard shortcut and its corresponding visible control from equivalent starting states produces the same active indicator and result"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "large_grid_interaction_performance"
description = "At the smallest allowed desktop cell size, continuous pointer painting, flood fill, grid-overlay toggling, undo/redo, and Gallery/Export switching remain responsive with no visible freeze, skipped stroke segments, or stale canvas redraw"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "export_derives_from_live_store"
description = "Export center Project JSON and CSS palette text recompile from the live shared session state: painting a cell or saving a board changes the visible export text without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "api_shaped_project_schema_coherence"
description = "After a valid Save board, the gallery card's name, tag, and favorite match the corresponding boards entry in Export center Project JSON under the same SavedBoard field names (request-body shape); Import of that ProjectDocument restores the same name, tag, favorite, and cells without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.n1"
name = "partial_state_after_reload"
description = "After a full interaction session, reload leaves some user mutations persisted while others reset, or seeded boards are missing while canvas art remains"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n2"
name = "cdn_or_external_asset_fetch"
description = "During normal studio use, the network log shows CDN, font, icon, or script fetches from a non-same-origin host for app assets"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "2.n3"
name = "console_errors_during_flows"
description = "Console errors or unhandled rejections appear during paint, gallery, export, or import flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "technical.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical or state-management defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

