[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "qr_brush_recolor_craft"
description = "Beyond bare cell fills, QR Brush mask recoloring with the active swatch (white→black glyph on white, black→white glyph on black, color→colored glyph on white) feels like a polished creative mechanic."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "typewriter_bracket_intro"
description = "The angle-bracket typewriter intro (e.g. <YOU ARE THE ALGORITHM>) reads as intentional brand motion beyond a static headline."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "draggable_toolbar_craft"
description = "The floating /GRID PAINT TOOLS panel that drags and clamps within the stage feels like a finished creative-tool workspace, not a static bar."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "gallery_thumbnail_workflow"
description = "Saved-board thumbnails plus favorite/tag filter and bulk selection form a delightful recall workflow beyond a minimal name-only list."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "camera_capture_pixelize_polish"
description = "In-toolbar camera overlay with Capture center-crop pixelization feels like a thoughtful import path, not a stub file picker only."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "export_center_artifact_craft"
description = "Export center with live Project JSON, CSS palette vars, branded PNG, and copy confirmation elevates export beyond a silent dump."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "saturated_blue_studio_identity"
description = "The saturated blue page field, light paint stage, and condensed angle-bracket branding read as a cohesive Grid Paint Studio identity rather than a default admin template."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "symmetry_fill_histogram_craft"
description = "Mirror symmetry, Flood Fill, and the live histogram together feel like intentional painting craft rather than a minimal three-tool sketch pad."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "vision_and_versions_craft"
description = "Color-blindness Vision preview plus named version snapshots with Compare feel like thoughtful accessibility and iteration tools beyond the baseline paint loop."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_tool_feel"
description = "Taken together, QR Brush, Flood Fill, Mirror, Export center, command palette, and gallery bulk actions present competition-level creative-tool craft visible to a real user."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.11"
name = "optional_undo_timeline_bonus"
description = "Optional: a scrubbable undo timeline slider previews board states while dragging — bonus polish beyond the required Undo/Redo controls."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the Grid Paint Studio spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0

