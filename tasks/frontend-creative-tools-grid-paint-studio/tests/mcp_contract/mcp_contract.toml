[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_modules_bound"
description = "Contract modules structured-editor-v1, entity-collection-v1, artifact-transfer-v1, and command-session-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for editor, entity, artifact, and session prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Exposed editor, entity, artifact, and session tool handlers drive the same visible UI logic as on-page controls (grid-cell color updates, board create/update/delete/toggle, export/import/copy, and session start/stop/restart)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops"
description = "Only documented editor operations (select, update_property, switch_mode, preview), entity operations (create, select, update, delete, toggle), artifact operations (export, import, copy), and session operations (start, stop, restart) are available — no undeclared routes or modules."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_automation"
description = "The contract can be fully exercised via webmcp_invoke_tool for editor, entity, artifact, and session operations against the bound values."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_grid_cell_operations_work"
description = "Editor operations select, update_property (color on grid-cell), switch_mode (qr / color / fill / erase), and preview update the paint stage the same way as the visible toolbar and canvas controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "editor_modes_include_fill"
description = "Editor modes include qr, color, fill, and erase, and switch_mode changes the active tool indicator to match."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "entity_board_crud_and_toggle"
description = "Entity board operations create, select, update, delete, and toggle (favorite) mutate the gallery the same way as the visible Gallery controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "entity_fields_name_tag_favorite"
description = "Entity fields name, tag, and favorite are bound for SavedBoard records (tag from the closed enum pattern|portrait|abstract|logo|study|signal) and update_property/toggle paths affect those fields in the visible gallery and Project JSON boards."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "artifact_export_import_copy"
description = "Artifact operations export, import, and copy are bound for formats project-json, png, and css-palette (and import mode project-json) and invoke the same Export center / Import Project handlers as the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "session_camera_ops"
description = "Session operations start, stop, and restart drive the camera session chrome the same way as the visible Camera controls (without proving capture pixels via tool output alone)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "mechanics_exclusions_honored"
description = "Drag-paint gestures, camera overlay capture, and toolbar drag remain Playwright-observed; WebMCP args do not carry raw file paths or blobs."
type = "binary"
weight = 1.0

