[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "narrow_cell_range_band"
description = "On a narrow/touch viewport, the Cell range control spans a narrower approximately 36–48 band instead of the desktop 16–64 range."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "toolbar_docks_on_narrow"
description = "On narrow viewports the toolbar docks as a fixed panel instead of floating free, and every tool, swatch, Mirror, and action remains reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "touch_drag_paints_continuously"
description = "Touch drag paints continuously across cells just as pointer drag does on desktop."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_horizontal_scroll_at_375"
description = "At 375 pixel width, no content clips or overflows the viewport and no page-level horizontal scrolling appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_and_histogram_at_375"
description = "At 375 pixel width, Export center previews and the histogram stack or scroll within their regions without forcing page-level horizontal scroll."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "gallery_usable_at_narrow"
description = "At narrow widths, gallery cards, checkboxes, bulk bar, and empty states remain readable and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "desktop_toolbar_floats"
description = "At desktop widths the toolbar floats over the stage and is draggable; paint stage and histogram remain usable together."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "clipped_controls_at_375"
description = "At 375 pixel width, toolbar controls, swatches, Export previews, or gallery actions are clipped or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "horizontal_scroll_at_375"
description = "At 375 pixel width, the page shows horizontal scrolling or content overflowing the viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "narrow_toolbar_hides_tools"
description = "On a narrow viewport, one or more tools, swatches, or Export/Share actions are missing or unreachable from the docked toolbar."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable responsiveness or layout defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

