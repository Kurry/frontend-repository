[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_and_active_feedback"
description = "Through real pointer hover and clicks, primary toolbar actions ease/fill, tool buttons and swatches change fill/opacity/border for hover and active states, and Gallery rows show a hover wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "paint_gallery_and_board_load_motion"
description = "Using the real Paint/Gallery control swaps modes without a full reload, and loading a board returns to Paint with the canvas updating immediately rather than flashing an intermediate stale pattern"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.3"
name = "missing_hover_feedback"
description = "Toolbar actions, mode buttons, palette swatches, or Gallery rows remain visually static on real pointer hover where the instruction requires fill, opacity, border, or wash feedback"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.4"
name = "desktop_toolbar_drag"
description = "Grabbing the /GRID PAINT TOOLS header and dragging repositions the floating toolbar, which stays clamped within the stage while tool, palette, grid state, and painted board survive the drag"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "camera_overlay_fade"
description = "Opening the in-toolbar camera overlay fades it in and closing it fades it out rather than snapping instantly"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.6"
name = "cell_lock_transition"
description = "Painting the first cell through the real canvas path eases the Cell control toward a visibly muted disabled state, and clicking Clear restores its enabled appearance without a jarring flash"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "typewriter_intro_fresh_load"
description = "On a fresh page load, the angle-bracketed intro types on progressively and settles into complete, aligned text without reflowing the stage"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.8"
name = "paint_feedback_and_drag_jank"
description = "A real paint/touch stroke, toolbar drag, mode switch, cell-lock transition, or camera overlay interaction visibly lags behind input, flickers, shifts unrelated layout, loses state, or ends in an incorrect position or visual state"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteraction quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (real control path, gesture, animated element, timing, or resulting state) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
