[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "8.1"
name = "toolbar_drag_repositions"
description = "On desktop, grabbing the /GRID PAINT TOOLS header repositions the floating toolbar within the stage through a real drag gesture."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.2"
name = "hover_on_actions_modes_swatches"
description = "Through real pointer hover (computed style while hovering), primary action buttons ease fill on hover; mode buttons and swatches show active fill/opacity/border changes; gallery board rows take a hover wash."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.3"
name = "cell_lock_fade_muted"
description = "When Cell locks after first paint, the control fades toward a muted disabled look; Clear restores its enabled appearance."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.4"
name = "mode_switch_no_reload"
description = "Switching among Paint, Gallery, and Export center updates the main surface without a full page reload; loading a board updates the canvas immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.5"
name = "camera_overlay_fade"
description = "Through the real Camera control path, the capture overlay fades in when opened and fades out when Cancel closes it."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.6"
name = "gallery_card_enter_exit"
description = "Saving a board animates the new card into the gallery list, and deleting a board animates its card out rather than snapping, observed through the real Save/Delete controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.7"
name = "toast_or_validation_entrance"
description = "Validation and save feedback (toasts or inline confirmations) appear with a short entrance motion and dismiss with a fade."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.8"
name = "paint_and_fill_immediate"
description = "Painting updates cells immediately with no perceptible lag between the stroke and the fill; Flood Fill paints the region in one visible update."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.9"
name = "histogram_bar_easing"
description = "When the board changes through a real paint or clear, histogram bars ease to their new heights rather than only snapping with no transition (unless prefers-reduced-motion is set)."
type = "binary"
weight = 0.5

[[criterion]]
id = "8.10"
name = "compare_and_copy_transitions"
description = "Compare enter/exit crossfades the split view through the real Compare control; Copy confirmation swaps its icon or label briefly then reverts."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.11"
name = "reduced_motion_instant"
description = "With prefers-reduced-motion set, enter/exit and histogram easing apply instantly while paint, gallery, export, and mode switches remain usable."
type = "binary"
weight = 1.0

