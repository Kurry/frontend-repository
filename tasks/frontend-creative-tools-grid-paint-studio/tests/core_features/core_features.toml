[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "paint_stage_first_load"
description = "On first load the app opens directly to Paint mode with the <GRID PAINT STUDIO> title, angle-bracketed typewriter tagline, floating dark toolbar, large centered canvas, QR Brush active, black active swatch, and no login or splash screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "seeded_gallery_boards"
description = "Opening Gallery on first load shows at least four seeded saved boards, each with a name, cell-snapshot thumbnail, and tag"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "save_board_create"
description = "After painting a recognizable pattern and saving it as 'Harbor Signal', the gallery count increases by exactly one and a 'Harbor Signal' entry shows a matching cell-snapshot thumbnail and tag"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "save_count_delta"
description = "After adding 3 new boards on top of the seed set, Gallery shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "load_board_to_canvas"
description = "Loading a saved board from Gallery returns to Paint mode and writes that board's thumbnail pattern into the shared canvas while preserving its colors and cell arrangement"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "rename_board"
description = "After renaming a saved board to 'Evening Grid', that same gallery record shows the new name, its old name disappears, and its thumbnail, tag, and favorite state remain attached"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "delete_board"
description = "After deleting a selected saved board, the gallery count decreases by exactly one, that board name disappears from unfiltered and matching filtered views, and no stale selection remains"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_gallery_state"
description = "After deleting all boards, an empty state is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "invalid_board_name_validation"
description = "Submitting Save board with an empty and then a whitespace-only name leaves the gallery count unchanged both times and shows visible inline validation feedback at the name field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "favorite_and_tag_filters"
description = "With mixed seeded boards visible, favoriting one board updates its control immediately, the favorites filter shows exactly favorited boards, and choosing a tag shows exactly boards carrying that tag; clearing filters restores the full collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "paint_gallery_mode_switch"
description = "After switching between Paint and Gallery modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "cell_resolution_retiles_and_resamples"
description = "Before painting, moving Cell from its default 40 to two distinct allowed values rebuilds the board to floor(1024 / cell) rows and columns each time; after loading a nonblank saved board, changing an available Cell value resamples that artwork into the new cell count rather than clearing it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "qr_brush_color_rules"
description = "Through real canvas strokes with QR Brush active, a white swatch produces a black QR glyph on white, black produces a white glyph on black, and a colored swatch produces that color's QR glyph on white"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "cell_lock_and_clear"
description = "After the first painted cell and separately after an image import, Cell becomes visibly muted and disabled; Clear empties the canvas, clears the artwork lock, and re-enables Cell"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "toolbar_tool_and_grid_controls"
description = "QR Brush, Color Brush, and Eraser each become the sole active tool when clicked, and clicking the grid button alternates its label between Grid On and Grid Off while the hairline cell overlay visibly shows and hides"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "continuous_stroke_and_undo"
description = "A single real pointer press-drag across multiple cells paints every crossed cell continuously and adds exactly one history step; one Undo or Backspace restores the entire pre-stroke pattern rather than reverting only one cell"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "static_gallery_controls"
description = "Saved boards list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.18"
name = "tool_writes_wrong_cell_type"
description = "A real Color Brush stroke writes QR glyph masks, an Eraser stroke leaves painted content, or a QR Brush stroke writes only a solid whole-cell fill, showing that the active tool does not determine the cell result"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.19"
name = "qr_mask_fixed_payload_and_colors"
description = "With QR Brush active, painting a cell fills it with a QR-glyph mask that recolors with the active swatch: a white swatch yields a black glyph on white, a black swatch a white glyph on black, and a colored swatch that color's glyph on a white ground"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "exact_seven_color_palette"
description = "Exactly seven square palette swatches (black, white, red, yellow, green, blue, pink) select the active color, the active swatch is visibly ringed, and the choice tints both solid fills and QR cells"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "color_brush_and_eraser"
description = "Using real canvas strokes, Color Brush fills whole crossed cells with the active swatch and Eraser returns the crossed painted cells to the blank state without changing other cells"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "cell_resolution_unlocked_mid_art"
description = "The Cell range control stays adjustable after painting has begun, letting the grid resolution change mid-artwork instead of locking"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "keyboard_shortcut_parity"
description = "Keyboard shortcuts drive the tools: Q/B/E switch to QR/Color/Eraser, G toggles the grid overlay, Backspace undoes, and number keys 1-7 pick the matching palette swatch"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "download_branded_png"
description = "Download produces grid_paint.png from the current board with no hairline grid overlay and with a black footer strip captioned '/MADE WITH GRID PAINT STUDIO' on the left and '<GRIDPAINT.STUDIO>' on the right"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "upload_pixelizes_image"
description = "Upload opens a file picker and, after choosing an image, fills the board with one averaged color per grid cell from a cover-scaled, centered version of the image and locks the Cell control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "camera_capture_and_cancel"
description = "Camera opens an in-toolbar front-facing preview overlay; Cancel closes it without changing the board, while Capture center-crops a square frame, pixelizes it into cells, closes the overlay, and locks Cell"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "share_or_download_fallback"
description = "Share attempts to hand the same branded PNG to the native share sheet when sharing is available and otherwise triggers the same grid_paint.png download fallback"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "paint_save_filter_load_flow"
description = "Starting from a recorded gallery count: paint one multicolor stroke pattern, save it as 'Harbor Signal' with a tag, favorite it, filter by that tag and favorites, load it, and return to Paint; the count is exactly one higher, filtered Gallery shows the same record and thumbnail, and the canvas reproduces the saved pattern without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "rename_delete_empty_repopulate_flow"
description = "Rename a saved board, then delete every board and observe the empty-gallery state, then paint and save a valid replacement; the old names remain absent, the empty state clears, the count becomes one, and the replacement can load back into Paint mode"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "tool_palette_undo_clear_flow"
description = "Starting on a blank board, choose a numbered colored swatch, use B to paint one multi-cell stroke, use E for a second erasing stroke, press Backspace once, then Clear; each active indicator matches the shortcut, the undo restores the whole erased stroke only, Clear blanks the board, and Cell is enabled again"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in a specified core behavior that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence (control, gesture sequence, canvas result, downloaded artifact, or resulting page state) that demonstrates it. If the defect is already covered—even partially—by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
