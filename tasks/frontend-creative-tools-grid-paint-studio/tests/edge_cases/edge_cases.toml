[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_gallery_state_after_delete_all"
description = "Deleting every board shows an empty-gallery state in the list region that explains the gallery is empty and how to save a board."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "save_rename_inline_validation"
description = "The Save board and rename forms validate name and tag inline before submit: an invalid or empty name, duplicate name, name over 40 characters, or tag outside pattern|portrait|abstract|logo|study|signal shows a per-field message naming that field, and the submit control stays disabled until every required field is valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "empty_name_blocks_save_count"
description = "Saving a board with an empty name adds nothing to the gallery, surfaces visible validation feedback naming the name field, and leaves the gallery count unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "zero_match_tag_filter_empty_state"
description = "When the tag filter matches no boards, the list region shows an empty state; clearing the filter restores the full list."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "camera_denied_shows_message"
description = "Denying camera access shows a visible message instead of a broken overlay, and the paint stage remains usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_redo_empty_and_capacity"
description = "Undo with no strokes and Redo with an empty redo stack are disabled; activating them changes nothing and causes no errors; after roughly 100 strokes the oldest undo steps drop off while Undo keeps reverting the most recent ones."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "cell_locked_until_clear"
description = "Moving the Cell control after art exists is impossible: the control stays visibly muted/disabled until Clear empties the board and re-enables it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "toolbar_and_gallery_controls_semantic"
description = "Toolbar tools, swatches, Upload/Camera/Undo/Redo/Clear/Export/Share, gallery save/rename/delete/favorite/bulk controls, and command palette results use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "camera_cancel_leaves_board_unchanged"
description = "Cancelling the camera overlay leaves the board exactly as it was — Cancel closes the overlay without painting."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_save_creates_one_entry"
description = "Double-activating Save board creates exactly one gallery entry: the count increases by one and one new card appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "flood_fill_noop_on_matching_target"
description = "Flood Fill on a board where every cell in the contiguous region already matches the active swatch fill target changes nothing and does not push an undo step."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "malformed_import_rejected"
description = "Importing malformed Project JSON, or JSON that omits a required ProjectDocument key, uses tool/swatch/mirror/vision outside their closed enums, carries cells whose dimensions disagree with cellSize, or carries boards/versions that violate SavedBoard / VersionSnapshot rules, shows a visible error naming the offending field (or the payload), leaves the board and gallery unchanged, and does not lock Cell."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "compare_requires_two_sides"
description = "Compare with fewer than two sides selected shows a short message explaining that two versions (or a version and the live board) must be chosen, and does not enter the split view."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "bulk_delete_disabled_when_none_selected"
description = "With zero gallery checkboxes checked, the bulk action bar stays hidden or its Delete selected action stays disabled so nothing is deleted."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "vision_never_rewrites_cells"
description = "Vision preview filters never rewrite stored cell colors: toggling Vision Off restores the original swatch appearance of every painted cell."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "empty_version_name_blocked"
description = "Snap version with an empty name or a name over 40 characters shows inline validation naming the name field and adds nothing to the Versions list."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "duplicate_board_name_rejected"
description = "Submitting Save board or rename with a name that already exists on another board (after trim) leaves the gallery count unchanged and shows an inline error naming the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "invalid_tag_rejected"
description = "Save board with a missing tag or a tag outside pattern, portrait, abstract, logo, study, signal shows an inline error naming the tag field and does not increase the gallery count."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.19"
name = "overlong_board_name_rejected"
description = "A board name longer than 40 characters is rejected with an error naming the name field so no card is saved with a name over 40 characters."
type = "binary"
weight = 1.0

