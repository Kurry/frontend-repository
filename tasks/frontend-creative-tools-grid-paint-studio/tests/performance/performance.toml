[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load, with the paint stage, toolbar, and seeded gallery reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise of painting, filling, importing, exporting, saving, bulk gallery actions, and mode switches."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "smooth_rapid_drag_strokes"
description = "Rapid drag strokes across the grid keep painting smoothly with no hangs, dropped cells, or visible frame stutter."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "cell_rebuild_no_freeze"
description = "Rebuilding the grid via the Cell control completes without freezing the page, even at the largest cell count (smallest cell size)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "flood_fill_and_export_responsive"
description = "Flood Fill on a nearly full board and Project JSON recompilation after edits finish without locking the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "histogram_updates_without_jank"
description = "Histogram bar updates after paint/clear remain responsive without multi-second freezes or layout thrash."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "mode_switch_stays_responsive"
description = "Switching among Paint, Gallery, and Export center under repeated input stays responsive with no hangs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_over_two_seconds"
description = "The app takes more than 2 seconds to become interactive on a local cold load."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "paint_or_fill_hangs"
description = "Rapid painting or Flood Fill hangs the page, drops cells, or freezes input for a noticeable period."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "console_noise_during_exercise"
description = "Console errors or warnings appear during a full exercise of paint, gallery, export, and import flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable performance defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

