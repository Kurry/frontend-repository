[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "overview_stage_matches_reference"
description = "Relative to /reference-screenshots/overview.png and segment shots, the desktop paint stage shows a saturated blue field, light centered canvas, angle-bracket title, and floating dark toolbar in the same overall composition (text wins on conflicts)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "toolbar_control_order_fidelity"
description = "Relative to the reference screenshots, the floating toolbar presents Cell, tool modes, grid toggle, swatches, and action cluster in a comparable left-to-right tool-strip order (instruction text wins if it adds Flood Fill, Mirror, Redo, or Export)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "seven_swatch_strip_fidelity"
description = "Relative to the reference, seven square palette swatches appear as a compact strip with a clear active ring treatment."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "canvas_dominance_fidelity"
description = "Relative to the reference, the large centered canvas remains the dominant visual plane under the toolbar rather than shrinking into a side card."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "gallery_dense_list_fidelity"
description = "Relative to reference gallery segments (where shown), Gallery presents dense board rows/cards with names and tags rather than sparse marketing tiles."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "typewriter_intro_fidelity"
description = "Relative to the reference, an angle-bracketed typewriter-style intro line appears above the stage near the title."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "high_contrast_ink_on_light_stage"
description = "Relative to the reference, the paint stage uses a light/white field with high-contrast ink controls rather than an inverted dark canvas shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "segment_overlap_continuity"
description = "Scrolling through desktop segments matching segment-01/segment-02 continuity, the toolbar-to-canvas relationship stays coherent without a different product shell appearing mid-page."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.n1"
name = "unrelated_layout_vs_reference"
description = "The desktop layout is unrelated to the reference screenshots (for example a multi-column admin dashboard) while still claiming to be Grid Paint Studio."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "missing_angle_bracket_branding"
description = "The <GRID PAINT STUDIO> angle-bracket title treatment from the reference/instruction is absent from the first paint viewport."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "toolbar_not_floating_dark"
description = "At desktop width, there is no floating dark toolbar over the stage comparable to the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable departure from the reference screenshots that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

