[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "pane_and_chrome_controls_keyboard_operable"
description = "Every interactive control — page tabs, Add Page, Create Pane, Data Source Library cards, shared date-range options, and each pane's Edit, Move Up/Down/Left/Right, Small/Medium/Large, Refresh, Delete, and Share — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlay_focus_trap_and_return"
description = "The source preview modal, Create Pane wizard, Share panel, Export center, Collaboration Scenario modal, and confirmation dialogs trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Meaningful icons in the header, pane control row, and Data Source Library expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "copied_and_validation_live_regions"
description = "The transient Copied! confirmation after Copy Link and inline validation errors are announced through an aria-live polite region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "wizard_and_forms_explicitly_labeled"
description = "Form fields in the Create Pane wizard, page rename, saved-analysis create/edit, preview Filter preview rows, and Collaboration Scenario editors use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Workspace headings (PaneCraft title, page/pane section titles, saved-analysis headings) follow a logical order with no skips such as H1 to H3."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "workspace_landmarks_present"
description = "The app exposes semantic landmarks (for example nav or banner for the PaneCraft header and main for the dashboard workspace) so assistive technology can navigate the tool."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "focus_outline_primary_2px"
description = "Keyboard Tab focus is visible as a 2px outline in the primary color (#E8536B or the --color-primary token) on every interactive control."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "pane_keyboard_focus_reveals_controls"
description = "Keyboard focus on a pane reveals its control row (Edit/Move/Resize/Delete) without requiring a pointer hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion enabled, pane enter/exit, dialog opacity/scale, tab, feedback, and chart transitions are removed or substantially reduced while every final state remains clear and reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "pane_controls_unreachable_by_keyboard"
description = "A pane Edit, Move, Resize, Delete, Refresh, or Share control, or Create Pane / Add Page, cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focused page tabs, primary buttons, wizard fields, or pane controls show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Page tabs, Data Source Library cards, or pane Move/Resize controls use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "status_or_error_color_only"
description = "Support Tickets status (Open/In Progress/Resolved) or form error state is conveyed by color alone with no text, badge label, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "overlays_fail_to_trap_focus"
description = "With the preview modal, pane wizard, Share panel, Export center, or a confirmation dialog open, Tab moves focus to controls behind the overlay without trapping focus."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_on_chrome_or_panes"
description = "PaneCraft header text, pane titles, primary button labels, or body/table text is unreadable due to poor contrast against its background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "copied_or_errors_visual_only"
description = "Copied! confirmation or inline validation errors are visual only with no aria-live or equivalent screen-reader announcement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "meaningful_icons_missing_names"
description = "Meaningful header, pane-control, or library icons that convey actions are missing alt text or an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_skipped"
description = "Workspace headings skip levels (for example jumping H1 to H3) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, pane enter/exit, dialog opacity/scale, tab, or chart transitions still animate fully."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
