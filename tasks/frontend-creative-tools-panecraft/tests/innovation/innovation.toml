[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "pane_enter_polish_beyond_minimum"
description = "Beyond the required enter animation, newly created panes include an extra delightful microinteraction (for example a richer settle, staggered control reveal, or celebratory highlight) that remains browser-observable (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "chart_transition_storytelling"
description = "Chart panes offer an advanced transition beat beyond basic mark swaps — for example coordinated crossfades or memorable axis reflows when the date range changes — verified through real date-range interaction (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "guided_first_run_for_builder"
description = "A brief guided first-run or coachmark flow introduces Create Pane, the Data Source Library, date-range filtering, or Export after a pane edit without blocking the tool (bonus beyond required empty-state copy)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "chart_tooltip_or_analysis_extra_usability"
description = "An interactive graphic aid beyond the required hover tooltip — for example crosshair sync across panes or a mini sparkline in saved-analysis cards — adds usability while staying local and browser-observable (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "keyboard_pane_nudge_beyond_buttons"
description = "Beyond basic Tab/Enter operability, panes support an alternate grid input such as arrow-key nudging for Move when focused (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "session_personalization_beyond_requirements"
description = "Within the session, the app offers a small personalization beyond requirements (for example remembering last date-range preference or last saved-analysis view) that is visible without inventing forbidden external APIs (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "branded_builder_narrative_polish"
description = "The PaneCraft header, page tabs, and pane cards read as a cohesive branded dashboard-builder narrative rather than generic unstyled controls (bonus execution quality)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "status_and_share_craft_beyond_minimum"
description = "Status pill badges and the Share panel's monospace link treatment go beyond bare compliance — cohesive tokenized accents across badges, toasts, and share chrome (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "local_platform_enhancement"
description = "A genre-appropriate local enhancement (for example high-quality local Poppins rendering or offline-capable app shell assets) is visible without CDN dependence (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "competition_level_dashboard_builder_feel"
description = "The overall builder feels competition-grade: wizard flow, chart hover, refresh jitter labeling, and collaboration scenario polish read as a professional dashboard instrument rather than a wired demo (bonus)."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
