[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_persists_all_facets"
description = "Starting from seed: create and rename a page, add a pane, move it, resize it to Large, set refresh to Every 30s, and leave that page active; then reload. Confirm every facet survives together — page list, active tab, and every pane facet (type, source, metric, dimension, size, order, refresh interval) — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "saved_analysis_sort_reversal"
description = "Sort-reversal proof: in the saved-analysis Table view, sort ascending, note the order, then sort descending; the order reverses correctly relative to ascending, proving sort is derived from live data rather than two hardcoded orders."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "date_range_derived_chart_sensitivity"
description = "Derived-view sensitivity: with at least two time-series panes visible, switch the shared date range from Last 30 Days to Today Only (and optionally Last 7 / Last 90). Confirm every affected pane's marks or values change meaningfully rather than redrawing identically regardless of input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "saved_analysis_echoes_across_views"
description = "Cross-view echo: create or edit a named saved analysis; without reload confirm the same item appears with the same name/source/metric in both Overview cards and Table views."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_pane_count_delta_exact"
description = "Count-delta integrity: measure the active page's pane count, complete one valid Create Pane wizard, and re-measure immediately — the count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_pane_configs_different_outcomes"
description = "Input-dependent output: create two panes (or edit one twice) with clearly different source/metric/dimension choices. Confirm the two outcomes differ in the ways the inputs dictate (not byte-identical chart/counter values)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_page_and_pane_flows"
description = "Interleaved-flow integrity: start Create Pane on page A (open wizard but do not finish), switch to page B and complete a separate Create Pane there, then return and finish or cancel A's wizard; confirm page B gained exactly one pane, page A's unfinished flow did not corrupt B, and neither page shows the other's panes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_page_then_repopulate"
description = "Edge-state round-trip: delete every pane on a page until Create your first pane to build this page appears, then complete Create Pane once; confirm the empty state clears and the new pane renders with source-dependent content."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_pipeline_contains_session_work"
description = "Full export pipeline: mutate a page name, pane metric, date range, and saved analysis; open Export and confirm Workspace JSON shows schemaVersion panecraft-workspace-v1 plus those values under field-contract keys, and the Markdown report names the same page, metric, and saved analysis; Copy on the active format shows a confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "workspace_import_round_trip_reconstructs"
description = "After exporting Workspace JSON from a mutated session, change the workspace further or clear user panes if offered, then Import that JSON — pages, panes, date range, and saved analyses reconstruct to match the export, and both export previews match the restored state."
type = "binary"
weight = 1.0

