[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_chrome_and_tabs"
description = "Where the app renders headings, buttons, and tab labels (PaneCraft, Dashboard, Add Page, Create Pane, Data Source Library), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as Add Page, Create Pane, and Copy Link rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders error messages for PaneConfig, Page, SavedAnalysis, or WorkspaceDocument field-contract failures, they name the offending field and the fix, not only a bare rejection like Invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_use_specified_copy"
description = "Where the app renders empty states, they use the exact specified messages Create your first pane to build this page and No data for this range and make the next action clear."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "workspace_copy_polished"
description = "Where the app renders pane titles, library labels, wizard step copy, and Share panel text, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (pane vs chart pane, page tab vs page, saved analysis), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "date_and_number_formatting_consistent"
description = "Where the app renders numbers, dates, and units (chart tooltips, Last updated Xs ago, preview row counts, counter panes), formatting is consistent across surfaces."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders confirmation feedback (Copied! after Copy Link or Export Copy), the copy states what happened rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as PaneCraft, Add Page, Create Pane, Copy Link, or the specified empty-state messages."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same pane, page, or saved-analysis concept is named inconsistently across tabs, wizard, library, and Share panel in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Button labels, validation messages, empty-state copy, or pane titles are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
