[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_token_scale"
description = "At 1440px, spacing among the dark navy header, page tabs, Data Source Library, and four-column pane grid follows the 4px spacing unit and reference composition — no arbitrary one-off gaps that break the dashboard builder layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_poppins_spec"
description = "Typography matches the spec: Poppins (or bundled equivalent) with the app title at 26–32px weight 600 in text-primary, pane titles 15px weight 600, body/table 14px weight 400 in text-secondary, counter big numbers 30px weight 700, and Last updated labels 12px in text-secondary."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: PaneCraft navy header, page tabs, Data Source Library, and a populated four-column pane grid with three default panes — a dashboard builder, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — newly created pane enter, deleted pane exit, overlay open/close (~200–300ms opacity/scale), Copy Link green flash, and chart mark transitions on source/metric/date-range change — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "At 375px vs 1024px+, responsive behavior matches the reference: single-column pane grid and scrollable page tabs at ~375px; four-column grid, library, and header controls visible without overlap at desktop."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Primary actions (Add Page, Create Pane, Copy Link) use primary background with white text and 6px corners; secondary controls (Edit, Share, Refresh) use white background, 1px border in border color, and text-primary — not unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_title_pane_body_counter"
description = "Typography hierarchy clearly distinguishes the PaneCraft title, pane titles, body/table text, counter big numbers, and Last updated microcopy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Active page tabs show a primary-color bottom border and bold text; size-toggle selected state is visually distinct; pane control rows become visible on hover or focus as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_tokens_and_status_pills"
description = "Surfaces use the specified tokens (primary #E8536B, secondary #051441, accent #1ABF68, background #FFFFFF, surface #F7F8FC, border #E3E6F0); pane cards sit on surface with 6px corners and 1px border; Support status pills use accent green for Resolved, primary pink for Open, and amber for In Progress; Share mock link is monospace in a bordered box."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Overlay enter/exit (~200–300ms opacity/scale), Copy Link accent-green confirmation (~2s auto-clear), and hover responses on buttons/tabs/library cards follow the specified microinteraction timing when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_reference_builder"
description = "Visible spacing between header, tabs, library, and pane grid contradicts the reference dashboard composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_specified_palette"
description = "Chrome or pane surfaces use colors clearly outside the specified token palette (primary, secondary, accent, background, surface, border, text-primary, text-secondary)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "pane_or_title_sizing_mismatches_spec"
description = "App title, pane title, body, counter number, or Last updated sizing clearly mismatches the specified pixel/weight scale."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_builder_animations_missing"
description = "Required animations are missing where the spec requires them (new panes snap in, deletions vanish in one frame, overlays teleport, chart marks hard-cut on date-range change)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Add Page, Create Pane, Copy Link, Edit, Share, or Refresh use unstyled browser default appearance when the spec styles them."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_grid_misaligned_vs_reference"
description = "At 1024px or above the four-column pane grid, Data Source Library, or header controls are misaligned or overlapping versus the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen"
description = "Header, tabs, library cards, pane cards, or overlays render off-screen or clipped at the reference desktop width."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "Section order or structure clearly deviates from the reference: missing PaneCraft header, missing Data Source Library, or default workspace not showing three populated panes on Dashboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_undifferentiated"
description = "PaneCraft title, pane titles, and body/table text have no visible size or weight distinction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_spec"
description = "Hover feedback, Copy Link confirmation, or overlay transitions are missing or clearly deviate from the specified durations and treatments."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
