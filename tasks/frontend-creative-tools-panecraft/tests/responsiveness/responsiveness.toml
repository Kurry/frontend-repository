[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to roughly 375px mobile keeps a usable PaneCraft workspace: header, page tabs, library or its mobile equivalent, and panes remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At roughly 375px width, Add Page, Create Pane, page tabs, pane Edit/Delete/Share, and date-range controls present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "PaneCraft title, pane titles, and body/table text remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At roughly 375px width, pane cards, header controls, and library content never clip or overflow the viewport at the page level."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "page_tabs_scrollable_on_mobile"
description = "At roughly 375px wide the page tabs stay scrollable and usable rather than disappearing or becoming unreachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "pane_grid_collapses_to_one_column"
description = "At roughly 375px wide the pane grid collapses to a single column with a logical stacking order and no overlapping panes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At roughly 375px width, tap/click activation works on page tabs, Create Pane, date-range options, and pane Edit/Share controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At roughly 375px width the page does not produce horizontal scrolling at the page level."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_and_grid_scale"
description = "Chart panes, data tables, and the pane grid size responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_operable_at_small_widths"
description = "At roughly 375px wide the preview modal, pane wizard, Share panel, Export center, and saved-analysis views remain readable and operable without clipped controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_desktop"
description = "At roughly 375px or at 1024px+ the PaneCraft layout breaks: overlapping panes, overflow, or unusable stacking."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At roughly 375px width, Add Page, Create Pane, page tabs, or pane Edit/Delete/Share are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "text_unreadable_on_mobile"
description = "At roughly 375px width, pane titles, body/table text, or header labels are too small to read."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At roughly 375px or desktop widths, workspace content is cropped or unnecessary page-level horizontal scrollbars appear."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "tabs_or_library_missing_on_mobile"
description = "At roughly 375px width, page tabs or access to the Data Source Library is missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_header_obscures_panes"
description = "A fixed header or control bar obscures pane content or primary actions at some viewport size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "panes_overlap_at_some_size"
description = "Pane cards, tabs, or overlays overlap into an unusable pile at some viewport size."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "desktop_four_column_missing"
description = "At desktop widths of 1024px and above, the four-column grid, Data Source Library, or header controls are missing or overlap."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "charts_static_size_overflow"
description = "Chart panes or data tables use a static size and overflow the viewport at roughly 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_sizes"
description = "Create Pane, Share, date-range, or pane Edit controls disappear at specific viewport sizes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
