[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "exact_brand_palette"
description = "Computed root tokens and rendered surfaces match primary #E8536B, secondary #051441, accent #1ABF68, background #FFFFFF, surface #F7F8FC, border #E3E6F0, primary text #051441, and secondary text #677294"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "poppins_type_scale"
description = "Computed typography uses Poppins with system fallback and visibly follows the specified hierarchy: app title 26–32px/600, pane title 15px/600, body/table 14px/400, counter 30px/700, and update label 12px"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "support_status_badges"
description = "Support status pills are distinguishable at a glance, with Resolved accent green, Open primary pink, and In Progress neutral amber plus readable text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "component_and_pane_surface_system"
description = "Primary actions use pink backgrounds, white text, and 6px corners; secondary controls use white bordered surfaces; dialogs, tabs, toggles, selects, tables, confirmations, feedback, and pane cards share consistent density, borders, and state styling"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "share_link_visual_treatment"
description = "The Share mock link is monospace in a distinct bordered read-only box, separated clearly from access toggle and Copy Link action"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "phone_responsive_workspace"
description = "At roughly 375px wide the pane grid becomes one column, page tabs remain scrollable and usable, dialogs and tables remain readable, and the page has no horizontal overflow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "active_and_empty_state_clarity"
description = "The active page tab uses a primary bottom border and bold text, selected size and access states are clear, chart and counter panes have consistent hierarchy, and both page and no-data empty messages are centered and legible"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "indistinguishable_status_or_state"
description = "Status badges, active tabs, selected sizes, access states, or empty states rely on indistinguishable styling or unreadable color contrast"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.8"
name = "brand_or_responsive_visual_breakage"
description = "Rendered brand colors contradict the specified tokens, controls use visibly inconsistent browser defaults, or the 375px layout clips, overlaps, or scrolls horizontally at page level"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "copy_quality_consistent"
description = "Headings, buttons, and tab labels follow one consistent capitalization convention, action labels are specific verbs such as Add Page and Create Pane, and no placeholder, lorem ipsum, or debugging text appears anywhere in the UI"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "export_center_monospace_previews"
description = "The Export center shows monospaced Workspace JSON and Markdown report preview blocks with clear format tabs or section labels and visible Copy and Download controls distinct from the rest of the workspace chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable visual-design defect that is NOT covered by any other criterion in this file. Significant means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete browser evidence that demonstrates it. If the defect is already covered even partially by another criterion, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
