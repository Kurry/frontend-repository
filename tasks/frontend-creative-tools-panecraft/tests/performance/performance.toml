[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the PaneCraft workspace becomes interactive within 2 seconds, with PaneCraft header, Dashboard, Data Source Library, and the three default panes already visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors or warnings appear during a full exercise: creating/editing/deleting panes and pages, date-range changes, refresh ticks, Share/Copy Link, saved analyses, and Collaboration Scenario offline/online merges."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "date_range_and_refresh_respond_quickly"
description = "Changing the shared date range or a pane's source/metric/dimension updates affected pane content with UI response under 100ms perceived delay (immediate recompute), without a full page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the navy header, page tabs, and pane grid remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "source_preview_large_tables_smooth"
description = "Opening Website Analytics (90 rows), Sales Sheet (60 rows), or Support Tickets (50 rows) in the preview modal and filtering rows shows no perceived lag while typing."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_recompute"
description = "During simulated refresh ticks and date-range recomputes, page tabs and other pane controls remain interactive — the UI does not freeze until updates finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "chart_updates_hold_stable_frame_rate"
description = "Driven through real date-range and metric controls, chart mark transitions maintain a smooth frame rate without visible hitching during continuous changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_never_hangs"
description = "Rapid repeated input (at least several Create Pane attempts, date-range toggles, or move/resize actions in quick succession) keeps the UI responsive with no hangs or dropped interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_session_stable"
description = "After an extended session of pane CRUD, page switches, refresh ticks, and collaboration toggles, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "refresh_updates_in_place_no_layout_jump"
description = "Simulated refresh ticks and date-range recomputes update pane content in place without shifting surrounding panes or the page layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before pane controls or Create Pane can be operated, or the default three panes are not yet listed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_builder_flows"
description = "Console errors, warnings, or unhandled rejections appear during pane/page CRUD, date-range changes, refresh ticks, Share, saved analyses, or collaboration flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "recompute_or_overlay_transition_blocks_ui"
description = "Date-range recompute, refresh tick, or overlay open/close blocks the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "refresh_or_recompute_hangs_ui"
description = "A simulated refresh tick or date-range recompute hangs or freezes the UI until the update completes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "preview_table_janks_on_filter"
description = "Filtering a 50–90 row source preview produces sustained frame-rate collapse or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_builder_input"
description = "Pane enter/exit or overlay transitions make input unresponsive until the animation finishes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering behind a blank screen while loading workspace resources after navigation to the root."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "An extended PaneCraft session shows memory leaks or runaway browser resource usage that freezes interaction."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed while the workspace or a source preview is loading — a blank region with no shell or indicator."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes or goes blank under rapid pane CRUD, date-range toggling, or collaboration offline/online switching."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
