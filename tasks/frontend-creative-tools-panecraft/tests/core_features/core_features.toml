[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_workspace_baseline"
description = "With task storage empty, the root opens without login to PaneCraft, Dashboard, the three bundled source cards, and three populated default panes: Traffic trend, Revenue by category, and Open support volume"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "source_preview_filter_flow"
description = "Opening Sales Sheet shows its raw table and headers with a total count; typing Hardware narrows rows and updates the match count, and clearing the input restores the full 60-row source"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "pane_wizard_creation_flow"
description = "Starting from the current pane count, Create Pane steps through source, exactly five offered types, and valid metric plus chart dimension; completing a Line Chart increases the count by exactly one and renders source-dependent marks on the active page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "pane_edit_in_place_chart_sensitivity"
description = "Editing a chart pane to a different valid source, metric, or dimension changes its title or values and rendered marks meaningfully while preserving pane identity, size, grid position, and page membership"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "pane_delete_confirmation_flow"
description = "Cancelling pane deletion preserves the same pane and count; confirming a second attempt decreases the count by exactly one and removes it from the active page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "page_independence_lifecycle"
description = "Add Page creates and activates a named tab; adding a pane there keeps it absent from Dashboard, renaming updates the tab, cancelling page deletion keeps it, confirming removes it, and the last remaining page cannot be deleted"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "pane_grid_move_and_resize"
description = "Move Up, Down, Left, and Right visibly reposition a pane within the four-column grid and disable at their boundaries; Small, Medium, and Large immediately span one, two, and four columns respectively"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "deterministic_refresh_flow"
description = "Setting Every 30s shows a self-advancing Last updated label and each simulated tick changes the displayed value according to the documented deterministic jitter; returning to Off stops both the label and self-updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "shared_date_range_chart_sensitivity"
description = "With at least two time-series panes visible, switching Today Only, Last 7 Days, Last 30 Days, and Last 90 Days recomputes every affected pane together, and at least two windows produce meaningfully different marks or values"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "no_data_chart_recovery"
description = "A zero-row pane shows No data for this range instead of blank chart chrome; widening to a range with rows restores source-dependent chart marks in the same pane without recreation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "workspace_persistence_flow"
description = "After creating and renaming a page, adding and editing a pane, moving and resizing it, setting a non-Off refresh interval, and selecting that page, a full reload restores page, active tab, pane type/source/metric/dimension/size/order, and refresh interval together"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "collaboration_convergence_flow"
description = "Offline changes from Author A and B both appear after reconnect in either offered delivery order, both orders converge to identical Shared content, replaying an applied operation adds nothing, and a conflict waits for Keep A, Keep B, or Merge Both before resolving"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "share_panel_clipboard_flow"
description = "Share opens a monospace read-only panecraft.local/view/<page-id> value and Public/Private toggle; Copy Link writes that link and immediately shows a transient Copied confirmation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "page_and_pane_empty_states"
description = "A zero-pane page says Create your first pane to build this page, while a zero-row pane independently says No data for this range and can recover when its inputs widen"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "saved_analysis_collection_flow"
description = "Starting from its count, creating a valid named saved analysis increases it by one and shows the same item in Overview and Table; editing updates both, combined search/source/sort/selection derives one coherent result, Clear restores all, delete removes it, and a duplicate name leaves count and bundled data unchanged with inline feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "seed_data_volume_and_shape"
description = "Source previews expose 90 Website Analytics daily rows with required fields, 60 Sales orders across Hardware, Software, and Services, and 50 Support Tickets across required categories and statuses with resolution hours only on resolved rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "form_inline_validation"
description = "Invalid pane, page-name, saved-analysis, or conflict-resolution input that breaks the PaneConfig, Page, or SavedAnalysis field contract shows a specific inline per-field error naming the offending field before submit and preserves the last valid visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "workspace_json_api_shaped_field_contract"
description = "The Workspace JSON export preview is a single object whose visible text includes the WorkspaceDocument field contract: schemaVersion exactly panecraft-workspace-v1; activePageId; dateRange exactly one of today, last-7-days, last-30-days, last-90-days; pages with id/name/panes; savedAnalyses; and pane entries carrying source (website-analytics/sales-sheet/support-tickets), type (line/bar/donut/table/counter), metric, size (small/medium/large), and refreshInterval (off/30s/5m) from their closed enums"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "created_pane_record_matches_paneconfig"
description = "After completing Create Pane or Edit with a valid configuration, the new or updated pane's visible type/source/metric/dimension/size/refresh match the submitted PaneConfig, and the Workspace JSON preview for that pane shows the same field names and enum values — the created record is the export payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "export_contains_session_mutations"
description = "After creating or renaming a page, adding or editing a pane with a distinctive metric, changing the shared date range, and creating a saved analysis, both Workspace JSON and Markdown report previews contain those session values under the field-contract keys"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "workspace_import_round_trip"
description = "After downloading Workspace JSON from a mutated session, Import of that same document reconstructs the same pages, panes, date range, and saved analyses in the UI and in both export previews without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "chart_hover_tooltip_follows_point"
description = "Hovering a data point or bar in a chart pane shows a tooltip with that point's label and value, and moving to another point moves the tooltip to the newly hovered point"
type = "binary"
weight = 0.5

