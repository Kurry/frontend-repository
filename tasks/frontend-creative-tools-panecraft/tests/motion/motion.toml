[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "workspace_hover_microinteractions"
description = "Using the real pointer path, buttons, page tabs, table rows, dropdowns, source cards, pane cards, and primary actions each show a visible hover response consistent with their role"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "keyboard_focus_feedback"
description = "Tabbing through the workspace shows a 2px primary-color focus outline on every interactive control and reveals the pane action row without requiring hover"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "pane_control_row_transition"
description = "On a wide viewport, moving the pointer onto a pane or focusing it fades in the hidden Edit, Move, Resize, and Delete row, and leaving returns it without a layout jump"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_feedback_transition"
description = "Clicking Copy Link immediately turns the control accent green with a Copied confirmation, then clears after about two seconds without closing or trapping the Share panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "refresh_in_place_update"
description = "With refresh enabled, the elapsed label advances and recomputed value transitions in place without flicker, blank chart, or movement of surrounding panes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "tab_badge_and_toggle_state_feedback"
description = "Changing active page, support status, pane size, or access toggle gives an immediate visible state transition through the specified tab, pill, and selected-control treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "pane_and_chart_state_transitions"
description = "Creating, deleting, moving, or resizing a pane and changing chart source, metric, dimension, or date range produces a perceptible in-place transition; chart marks redraw to the latest data rather than snapping through stale content"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "reduced_motion_behavior"
description = "With prefers-reduced-motion enabled before a fresh load, pane, control-row, tab, feedback, and chart-state transitions are disabled or substantially reduced while every final state remains clear"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "dialog_wizard_enter_exit_transition"
description = "Opening and closing the source preview modal, pane wizard, Share panel, Export center, and confirmation dialogs each show a brief opacity and scale transition of roughly 200 to 300 milliseconds rather than an instant pop"
type = "binary"
weight = 0.5

