[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: entity-collection-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1 (tools discoverable via webmcp_list_tools with entity_*, form_*, session_*, and artifact_* prefixes)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_pane_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: entity/form/session/artifact operations change the same pane list, wizard state, refresh/collaboration session state, and export/import surfaces that Create Pane, Edit, Delete, Move, Collaboration Scenario, and Export center use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: entity pane create/select/update/delete/reorder with fields source, type, metric, dimension, size, refresh-interval and value bounds size small/medium/large, refresh-interval off/30s/5m, type line/bar/donut/table/counter, source website-analytics/sales-sheet/support-tickets; form fields data-source, pane-type, metric-column, dimension-column with validate/submit/cancel/advance/return and steps choose-source/choose-type/configure; session start/pause/stop/connect/disconnect/advance with demos refresh-tick, collaboration-scenario, go-offline, go-online; artifact export/import/copy with export formats workspace-json and markdown-report and import mode workspace — no invented destinations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed for the bound entity, form, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "entity_pane_create_select_update_delete_reorder"
description = "Entity operations declared for entity pane work: create, select, update, delete (delete requires confirm=true), and reorder update the visible pane grid state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_wizard_validate_submit_cancel_advance"
description = "Form operations validate, submit, cancel, advance, and return for the Create Pane workflow steps (choose-source, choose-type, configure) update the visible wizard and resulting pane state."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "session_demos_refresh_and_collaboration"
description = "Session operations start, pause, stop, connect, disconnect, and advance with demos refresh-tick, collaboration-scenario, go-offline, and go-online are bound and invoke without throwing when called through WebMCP (timing, hover, and merge visuals remain Playwright responsibilities)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_modules_or_ops"
description = "No extra modules beyond entity-collection-v1, form-workflow-v1, command-session-v1, and artifact-transfer-v1, and no undeclared operations beyond the Bindings list, are exposed on the WebMCP surface."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_import_copy_bound"
description = "Artifact-transfer-v1 operations export, import, and copy are bound for formats workspace-json and markdown-report and import mode workspace, and invoking them drives the same Export center / Import workspace surfaces as the visible UI (file picker, clipboard contents, and downloaded bytes remain Playwright responsibilities)."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_tools_invoke_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced and return coherent session/tool data for this app."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP initialization works from the app's own registration without requiring manual edits to /tests harness files."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP tooling for entity-collection-v1, form-workflow-v1, command-session-v1, or artifact-transfer-v1 is unbound, missing, or a no-op when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_state"
description = "Invoking a bound entity/form/session tool leaves pane grid, wizard, or collaboration state diverging from what the equivalent visible UI control would produce."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared modules, destinations, or operations beyond the Bindings (entity pane create/select/update/delete/reorder; form validate/submit/cancel/advance/return; session start/pause/stop/connect/disconnect/advance and declared demos; artifact export/import/copy with workspace-json and markdown-report) are exposed."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_list_tools / webmcp_invoke_tool cannot exercise the declared entity, form, session, and artifact bindings."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "mcp_update_bypasses_shared_state"
description = "An entity update or form submit invocation updates a parallel copy of state, leaving visible panes showing stale values that disagree with the MCP result (MCP/UI desync)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete data for the mandated modules."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console-only stubs rather than app-registered tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_modules_not_implemented"
description = "One or more of entity-collection-v1, form-workflow-v1, command-session-v1, or artifact-transfer-v1 is not implemented despite being declared required in the contract."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented_out"
description = "The WebMCP interface is commented out or only stubbed so tools list as present but leave pane/wizard/session state unchanged when invoked."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "mechanics_exclusion_faked_via_mcp"
description = "Date-range recompute visuals, chart hover tooltips, refresh-tick timing, or merge convergence visuals are asserted solely via WebMCP results instead of remaining Playwright-observed as required by the mechanics exclusions."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The MCP contract deviates from its declaration in a way not covered by any other criterion in this file. 'Significant' means a real automation/contract break, not a nitpick. If present, name the defect and cite the concrete evidence. If already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
