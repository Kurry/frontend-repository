[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "multi_facet_workspace_persistence"
description = "After changing pages, active page, panes, pane configuration, size, order, refresh interval, saved analyses, and collaboration content, a full reload restores every user-configured facet coherently rather than a partial mix"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "bundled_sources_separate_from_user_state"
description = "After user-state persistence and reload, all three bundled sources retain their original row counts and content while the configured refresh interval and user-created records restore independently"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "console_clean_primary_flows"
description = "Initial load and source preview, pane, page, date-range, refresh, share, saved-analysis, persistence, and collaboration flows produce no uncaught error, unhandled rejection, blank screen, or failed same-origin asset request"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "shared_state_surface_coherence"
description = "Page tabs, pane grid, charts, tables, counters, filters, saved-analysis views, and collaboration content all show the same latest user state during interleaved actions without requiring reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "rapid_repetition_robustness"
description = "Twenty-five rapid deterministic pane and saved-analysis operations through normal controls end at the exact expected counts with responsive controls, preserved last valid state, and no sustained freeze or error"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "local_assets_and_theme_tokens"
description = "Computed styles expose the specified token and polished component states, while scripts, styles, icons, charts, collaboration helpers, and motion assets load from the app origin with no third-party CDN request"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "storage_unavailable_guard"
description = "When persistent storage access is unavailable, the root still renders bundled sources and a usable seeded workspace, mutations work for the session, and a specific visible warning appears without uncaught exceptions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "root_only_offline_operation"
description = "The root remains fully usable without backend or external API traffic, other paths redirect home or remain harmless, and no app control performs outbound navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.15"
name = "dialog_keyboard_and_announcements"
description = "The source preview modal, pane wizard, Share panel, Export center, and confirmation dialogs trap focus while open, close on Escape, and return focus to their opening control, and the transient Copied confirmation and inline validation errors are exposed through an aria-live polite region"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "fast_interactive_cold_load"
description = "On a local cold load the workspace renders its seeded content and responds to a first interaction within roughly 2 seconds"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.17"
name = "form_validation_matches_field_contracts"
description = "Pane create/edit, page name, saved-analysis, and Workspace JSON import forms reject payloads that violate the PaneConfig, Page, SavedAnalysis, or WorkspaceDocument field contracts with inline errors naming the offending field, and valid submits produce records whose exported fields match the submitted values"
type = "binary"
weight = 1.0

