[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_facets_reset_together"
description = "After classifying a row, moving the threshold, pinning a baseline, and opening Export, a page reload resets every facet together to the seeded grid, default threshold, no classifications, empty timeline, no baseline, and empty undo history — never a mix of surviving and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "threshold_extremes_reclassify_live"
description = "Moving the sigma threshold to its maximum classifies all variance rows stable and to its minimum classifies all or nearly all divergent, with the divergent rollup matching visible chips — proving stability is derived live rather than from two hardcoded lists"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_json_tracks_threshold_and_triage"
description = "Changing the sigma threshold or saving a Classification changes the Export JSON sigmaThreshold and triage array in the same session without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "rerun_echoes_across_heatmap_variance_export"
description = "After a completed re-run, the heatmap cell mean, dependent variance coefficients, and Export JSON cells entry for that model and harness all reflect the new trials without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "triage_summary_delta_exact"
description = "Measuring the matching triage summary total immediately before and after a valid Classification submit shows a delta of exactly one (or exact bulk count) with no off-by-one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_classifications_different_badges"
description = "Submitting capability-gap versus spec-defect on otherwise identical valid rationales produces different row badges and increments different triage summary totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_rerun_and_triage_preserve_state"
description = "Starting a re-run on one cell, classifying a divergent row while it runs or after, and opening Export leaves both the timeline entry and the Classification badge intact without corrupting either flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "filter_empty_then_restore_round_trip"
description = "Filtering until empty shows the empty state, then clear-filters restores the full heatmap and variance rows with coefficients and chips coherent again"
type = "binary"
weight = 1.0

