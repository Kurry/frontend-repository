[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "filter_empty_state_present"
description = "When model, harness, or task-category filters match nothing, each affected region shows a designed empty state rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "classification_form_validates_inline"
description = "The Classify and bulk Apply classification forms show inline per-field errors for Classification field-contract violations before submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_contract_errors_name_fix"
description = "Classification and Import errors name the offending field and the fix (for example rationale must be at least 15 characters, schemaVersion must be 1) rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_and_toasts_confirm"
description = "Copy in the export drawer shows a brief copied confirmation, and completed re-run or saved classification shows a toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rerun_shows_in_progress"
description = "While a cell re-run is running, that cell shows an in-progress indicator and a loading affordance wherever its data is displayed"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_and_cancel_on_triage"
description = "Cancel on the Classify form leaves totals unchanged, and Undo restores a saved classification or threshold move"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "cell_tooltip_lists_rewards"
description = "Heatmap cell hover tooltips list per-trial rewards so score composition is understandable without leaving the grid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "triage_controls_use_semantic_tags"
description = "Classify, Re-run, Export, Import, and threshold slider controls use semantic button or input elements rather than clickable bare divs alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "drawer_supports_close_paths"
description = "The cell drawer closes from its close control and by clicking outside it; the command palette closes on Escape and backdrop click"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "rerun_progress_list_ticks"
description = "A re-run shows queued then running with a per-trial progress list that ticks each trial complete before the run reaches complete"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "bulk_action_requires_two_divergent_rows"
description = "With zero or one divergent row selected, Apply classification is hidden or disabled; selecting a second divergent row reveals and enables it, and clearing the selection hides the bulk action bar again."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_filter_has_no_feedback"
description = "A no-match filter state leaves the heatmap or variance region blank with no empty-state message or clear-filters control"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "import_errors_only_in_console"
description = "Import or Classification field-contract failures surface only in the browser console with no inline UI error"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "classify_lacks_visible_feedback"
description = "Saving a valid Classification or completing a re-run produces no visible badge, summary, timeline, or toast feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "bulk_apply_without_valid_form"
description = "Bulk Apply classification badges selected rows even when the Classification form still fails the field contract"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "heatmap_controls_nonsemantic_only"
description = "Primary heatmap cell, Classify, and Export controls are only nonsemantic div or span click targets with no button or input semantics"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n6"
name = "drawer_not_escape_dismissible"
description = "The open cell drawer or command palette cannot be dismissed with Escape"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n7"
name = "classification_validation_missing"
description = "Classification field-contract validation feedback is missing until after a failed submit has already mutated triage totals"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n8"
name = "primary_actions_ambiguous_labels"
description = "Primary actions that should read Classify, Re-run, Export, or Import use blank or ambiguous labels such as OK or Submit only"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n9"
name = "empty_chart_lacks_guidance"
description = "Toggling every chart series off leaves a blank panel with no designed empty-chart message"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n10"
name = "export_import_affordances_hidden"
description = "Export or Import controls are visually hidden or unreachable after a normal load of the calibration console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
