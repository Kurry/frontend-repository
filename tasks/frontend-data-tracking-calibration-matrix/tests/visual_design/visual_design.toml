[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "heatmap_anchor_composition"
description = "The heatmap grid is the visual anchor of the default view, with the variance view, triage summary, chart panel, and timeline reachable as tabs or surrounding panels; data surfaces are dense with generous, consistent section padding"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "continuous_color_ramp"
description = "Heatmap cells use one continuous red to amber to green color ramp mapped to mean score — low cells read red, mid cells amber, high cells green — and cell text (score and trial count) keeps readable contrast against every ramp color"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "chip_system_consistent"
description = "Classification chips form one consistent system: a calm tint for stable, a warning tint for divergent, and distinct labeled badges for capability-gap and spec-defect that read as related but visually different from the stable/divergent pair"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "typography_and_tabular_figures"
description = "A clear type hierarchy is visible (view titles largest, panel headings next, cell and row text smallest), and numeric columns use tabular figures so scores, coefficients, runtimes, and costs align vertically"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "drawer_table_and_chart_layout"
description = "The drawer presents a dense trial table with right-aligned numeric columns and the distribution chart adjacent to it, styled consistently with the main surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "slider_value_and_icons"
description = "The threshold slider shows its current numeric value beside it at all times, and one consistent icon set is used across the chrome with no mixed icon styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "responsive_stack_and_heatmap_scroll"
description = "Below 1024 pixels the panels stack vertically and the drawer becomes full-width; at 375 pixels no content clips or overflows the viewport, the heatmap scrolls horizontally within its own container, and model names stay legible"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "consistent_surface_system"
description = "Cards, drawer, and panels share consistent corner radii, shadow depth, and border treatments across all views"
type = "binary"
weight = 0.5

