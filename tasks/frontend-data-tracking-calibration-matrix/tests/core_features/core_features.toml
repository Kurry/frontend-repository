[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_heatmap_grid"
description = "On load, the heatmap shows at least 6 fictional model rows by at least 4 fictional harness columns; every cell displays a mean score to 2 decimal places and a trial count, and cells are colored on a red to amber to green scale that visibly tracks the score"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "cell_hover_tooltip_trials"
description = "Hovering a heatmap cell with the real pointer shows a tooltip listing that cell's per-trial rewards, and the listed rewards are consistent with the cell's displayed mean and trial count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "cell_click_opens_drawer"
description = "Clicking a heatmap cell opens a drawer showing the model and harness names, a trial list with trial id, reward, runtime, and cost per row, and a mini distribution chart of the rewards; the drawer closes from its close control and by clicking outside it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "variance_rows_with_cv"
description = "The variance view lists per-task rows showing task name, category, per-harness mean scores, and a coefficient of variation to 2 decimal places, each carrying a stable or divergent classification chip relative to the displayed sigma threshold"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "threshold_slider_reclassifies_live"
description = "Scripted probe: record the divergent rollup, move the threshold slider down until at least one stable row turns divergent, and confirm the chip flips and the rollup increments in the same interaction with no reload; moving the slider back restores the prior classification and rollup"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "slider_extremes_consistent"
description = "At the slider maximum all rows classify stable, at the minimum all or nearly all classify divergent, and at every tested position the divergent rollup equals the number of visible divergent chips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "classification_field_contract_validation"
description = "The Classify form validates the Classification field contract: classification must be exactly capability-gap or spec-defect and rationale a trimmed string of at least 15 and at most 500 characters; a too-short rationale or out-of-enum classification shows an inline message naming the offending field, submit stays disabled until valid, and an invalid submission changes no triage total"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "triage_badges_and_summary"
description = "Submitting a valid classification badges the row with the chosen classification and increments the matching triage summary total (capability-gap, spec-defect, unclassified divergent); the three totals always sum to the current divergent count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "reclassify_moves_between_totals"
description = "Reclassifying an already-classified row from capability-gap to spec-defect moves it between the two totals (one decrements, the other increments) rather than double-counting"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "filters_narrow_both_views"
description = "Applying a harness filter removes that harness column from the heatmap and removes its scores from every variance coefficient computation in the same interaction; model and task-category filters likewise narrow both views, and clearing filters restores the full grid and rows exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "empty_state_on_no_match"
description = "When filters combine to match nothing, the heatmap and variance regions each show a designed empty state with a clear-filters control that restores the data, rather than a blank or broken area"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "rerun_status_progression"
description = "Starting a cell Re-run walks the visible statuses queued, then running with a progress list showing one line per trial that ticks complete as each simulated trial finishes, then complete; while running, the cell shows an in-progress indicator and a loading affordance appears wherever that cell's data is shown"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "rerun_updates_all_surfaces"
description = "Scripted probe: record a cell's mean score and trial count, run a re-run to completion, and confirm the cell's score and trial count changed, the hover tooltip lists the new per-trial rewards, the drawer trial list shows the new trials, and every variance row including that model and harness recomputed its coefficient and classification coherently"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "rerun_timeline_appends"
description = "Each completed re-run appends exactly one entry to the event timeline, newest first, showing a timestamp, model, harness, and resulting mean"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "rerun_double_activation_single_run"
description = "Starting a re-run disables that cell's Re-run control until completion; double-activating it starts exactly one run and appends exactly one timeline entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "chart_model_selector_redraws"
description = "The chart panel renders grouped bars of score by harness for the selected model, and changing the model selector redraws the bars with values matching that model's heatmap row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "chart_series_toggle_and_tooltip"
description = "Toggling a harness series off from the chart legend removes its bars and toggling it back restores them; hovering a bar with the real pointer shows a tooltip with the harness name and score; toggling every series off shows a designed empty-chart message"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "cancel_leaves_triage_unchanged"
description = "Using Cancel on the Classify form leaves the row's chip, any existing badge, and all triage summary totals unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "reload_resets_to_seed"
description = "After re-running a cell, classifying a row, and moving the threshold, a page reload returns the app to its seeded state: the seeded grid values, default threshold, no classifications, and an empty re-run timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "rerun_scores_never_change"
description = "Repeated re-runs of the same cell produce byte-identical rewards and an unchanged mean every time, indicating hardcoded run output rather than re-randomized simulation"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.21"
name = "disconnected_variance_copy"
description = "The variance view or chart renders from a disconnected data copy: after a completed re-run or an applied filter, its values contradict the heatmap for the same model and harness until a reload"
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "1.22"
name = "baseline_pin_shows_signed_deltas"
description = "Pin baseline captures current per-cell means; after a completed re-run that changes a cell mean, that cell shows a signed delta to 2 decimal places beside the live mean; Clear baseline removes every delta readout in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "bulk_triage_applies_classification_contract"
description = "Selecting two or more divergent rows reveals Apply classification; submitting a valid Classification payload badges every selected row and shifts triage summary totals by exactly that count without double-counting; stable rows cannot be selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "undo_redo_classification_and_threshold"
description = "Undo reverses the most recent threshold move or classification (single or bulk) and restores chips, badges, and triage summary totals exactly; Redo reapplies that edit; both controls are disabled when their stack is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "command_palette_opens_export"
description = "Pressing Control-K or Command-K opens a command palette listing at least heatmap, variance, chart, timeline, and export; choosing export opens the export drawer and closes the palette; Escape closes the palette without changing state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "calibration_pack_json_field_contract"
description = "After opening Export, the JSON tab preview is a CalibrationPack object showing required keys schemaVersion (integer 1), document (meridian-calibration), sigmaThreshold, models, harnesses, cells, varianceRows, timeline, baseline, filters, and triage, with nested Classification payloads under triage matching the Classification field contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "variance_csv_field_contract"
description = "The CSV tab preview begins with a header naming task, category, one column per current harness, coefficientOfVariation, stability, and classification, followed by one line per variance task whose classification cell is empty or exactly capability-gap or spec-defect"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "export_reflects_session_mutations"
description = "Scripted probe: classify a divergent row, complete a re-run, move the threshold, open Export, and confirm the JSON triage array includes the new Classification, cells reflect the updated mean and trial rewards, and sigmaThreshold equals the live slider — Copy shows a brief copied confirmation and Download triggers a real file download"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "import_calibration_pack_round_trip"
description = "After classifying at least two divergent rows, export CalibrationPack JSON, reload to seeded state, restore the divergent set with the threshold if needed, import that JSON, and confirm the same badges and triage summary totals return"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "import_rejects_invalid_field_contract"
description = "Importing unparseable JSON, schemaVersion not 1, document outside meridian-triage or meridian-calibration, missing entries/triage, or a Classification entry that breaks the Classification field contract shows an inline error naming the offending field and leaves badges and summary totals unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "export_omits_session_or_breaks_schema"
description = "After a saved classification or completed re-run, the Export JSON omits that session work from triage or cells, or the preview is missing a required CalibrationPack key such as schemaVersion, document, or triage"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.32"
name = "valid_classify_payload_mismatches_contract"
description = "A successful Classify submit badges a row with a classification outside capability-gap and spec-defect, or persists a rationale shorter than 15 characters against the Classification field contract"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.33"
name = "classification_task_and_rationale_bounds"
description = "In both single-row and bulk Classify forms, the would-be Classification request body uses the selected variance-row task as a trimmed non-empty task no longer than 80 characters and a trimmed rationale from 15 through 500 characters; empty or over-80 task and whitespace-only, under-15, or over-500 rationale show inline errors naming the field and apply no badge or summary change."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "repin_baseline_replaces_prior_snapshot"
description = "Pin a baseline, complete a re-run so one or more signed deltas appear, then activate Pin baseline again: the prior snapshot is replaced by the current per-cell means and every delta is recalculated from the replacement baseline, with unchanged current means reading zero or showing no delta."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "undo_redo_baseline_pin_and_clear"
description = "After Pin baseline, Clear baseline, or replacement pin through the visible controls, Undo restores the exact preceding baseline snapshot and signed two-decimal delta readouts, and Redo reapplies the pin or clear across every heatmap cell."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "command_palette_search_and_actions"
description = "Opening the command palette lists heatmap, variance, chart, timeline, export, filter-clear, and pin-baseline; typing a partial command narrows the list to matching labels, choosing filter-clear clears active filters, choosing pin-baseline captures the current means, and each chosen action closes the palette without navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "calibration_pack_nested_field_contract"
description = "The CalibrationPack JSON preview's cells objects visibly include model, harness, numeric mean, non-negative integer trialCount, and trials with id/reward/runtime/cost; varianceRows include task/category, per-harness means, numeric coefficientOfVariation, stable|divergent stability, and null-or-valid Classification triage; timeline entries include timestamp/model/harness/mean; baseline is null or cells of model/harness/mean; filters contains model/harness/taskCategory arrays; and triage contains every current valid Classification."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "valid_triage_pack_import_is_undoable"
description = "Importing a valid TriagePack with schemaVersion 1, document meridian-triage, and entries containing valid Classification payloads applies those entries only to matching divergent rows, updates badges and all triage summary totals, and one Undo restores the exact pre-import badges and totals."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core features or user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, action sequence, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
