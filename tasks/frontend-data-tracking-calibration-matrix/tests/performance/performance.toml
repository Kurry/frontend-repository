[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load with heatmap cells and filters responding"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "No console errors or warnings appear on load or during a full exercise including re-run, triage, rapid slider movement, Export, and Import"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_promptly"
description = "View switches, filter toggles, and export tab switches respond promptly without multi-second stalls"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "A running re-run shows in-progress and per-trial progress indicators rather than a frozen UI with no feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "heatmap_variance_render_without_lag"
description = "The seeded heatmap and variance rows render without perceptible lag on first interactive paint"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI stays responsive during a running re-run and while moving the threshold slider"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Drawer slide, chip crossfade, and chart bar transitions remain smooth enough to follow during real UI use"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid threshold slider movement and repeated filter changes do not hang or freeze the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "export_preview_regenerates_without_freeze"
description = "Opening Export and switching between JSON and CSV regenerates the preview without freezing the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before heatmap cells and filters become interactive on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Console errors appear during re-run, triage, Export, or Import flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "View switch or export drawer open blocks interaction for a prolonged lag"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "async_work_hangs_ui"
description = "A running re-run or Import parse hangs the UI with no progress feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_data_kills_frame_rate"
description = "Interacting with the seeded heatmap and variance table drops responsiveness to an unusable level"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Drawer or chip animations block further input until they finish"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "Font, chart, or icon loading blocks first interactive paint of the heatmap beyond two seconds"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Repeated re-runs visibly accumulate runaway resource use that degrades the session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "During a re-run the affected cell and dependent surfaces go blank with no loading affordance"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "Rapid slider movement or repeated Export tab switching crashes or hard-locks the app"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
