[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "calibration_controls_keyboard_accessible"
description = "Heatmap cells, filters, threshold slider, Classify, Re-run, chart legend toggles, drawer chrome, Export, and Import are keyboard accessible with Tab, Shift+Tab, Enter, or Space and show a visible focus indicator; the slider responds to arrow keys"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "drawer_and_palette_manage_focus"
description = "The cell drawer traps focus while open, closes on Escape, and returns focus to the opening cell; the command palette and export drawer likewise return focus on dismiss"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls such as close, Export, and palette actions expose accessible names via aria-label or equivalent"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "rollup_and_toasts_live_regions"
description = "Divergent rollup changes on threshold moves and classification/re-run feedback are conveyed visually and through a polite aria-live region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "classification_fields_labeled"
description = "Classification form fields and Import paste controls have visible labels; validation messages name the fields they belong to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "console_headings_logical_order"
description = "Headings for heatmap, variance, chart, timeline, and Export follow a logical order without skipping levels"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_for_console_regions"
description = "Primary regions such as the heatmap canvas, variance panel, and export drawer use landmark roles or skip-capable structure"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "ramp_and_chip_contrast"
description = "Cell score text keeps readable contrast against every red-amber-green ramp color, and chips/badges meet readable contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_roles_for_controls"
description = "Semantic controls and dialog/drawer roles are used for Classify, Re-run, Export, and the cell drawer rather than clickable bare divs alone"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_keeps_flows"
description = "With prefers-reduced-motion set, animations are removed or shortened while re-run, triage, filters, Export, and Import remain complete"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_unreachable_by_keyboard"
description = "Heatmap cells, Classify, threshold slider, Export, or Import cannot be activated via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_or_obscured"
description = "Focus indicators are missing or obscured on heatmap cells, the threshold slider, Classify, or Export controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Custom heatmap cell or chip controls lack button/checkbox semantics needed for assistive tech"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "state_uses_color_only"
description = "Stable/divergent or capability-gap/spec-defect state is conveyed by color alone without text labels on chips or badges"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "modals_fail_to_trap_focus"
description = "The cell drawer, export drawer, or command palette fails to trap focus while open"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "poor_contrast_makes_text_unreadable"
description = "Score text on ramp-colored cells or chip labels fail readable contrast"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "errors_are_visual_only"
description = "Classification or Import field-contract errors appear only visually with no accessible association or live-region announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "media_is_missing_alt_text"
description = "Informative icons for Export, close, or palette actions lack accessible names"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "heading_order_is_skipped"
description = "Heading levels skip in the calibration console so panel structure is unclear"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "Drawer, re-run, or chip animations ignore prefers-reduced-motion and keep full motion"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
