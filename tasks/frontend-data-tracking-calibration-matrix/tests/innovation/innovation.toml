[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_or_schema_badge"
description = "Beyond required export, a compact CalibrationPack summary strip or live schemaVersion badge appears above the export preview and updates with session state"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "score_count_up_or_chip_crossfade_polish"
description = "Beyond baseline motion, re-run score count-up or threshold chip crossfade feels polished and readable during real UI control use"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "optional_operator_coachmarks"
description = "Optional coachmarks or first-run tips explain heatmap, variance triage, or Export without blocking the required flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "chart_or_distribution_extra_affordance"
description = "The score-by-harness chart or drawer distribution chart adds an extra readability affordance such as clearer legend focus or linked highlighting"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_undo_redo_shortcuts"
description = "Beyond clicking toolbar controls, keyboard shortcuts trigger Undo or Redo while focus is in the calibration console"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "chart_model_memory_within_session"
description = "Within a session, the chart model selector or series visibility preference stays sticky as the operator moves among views"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "meridian_console_brand_presence"
description = "Meridian Calibration reads as a named analytics console brand in the header rather than a generic untitled dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "optional_density_or_theme_touch"
description = "An optional density or theme touch beyond the required ramp and chips is available without breaking contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "copy_calibration_pack_frictionless"
description = "Copying CalibrationPack JSON or Variance CSV is one obvious control away with clear confirmation, reducing export friction"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "operator_trust_affordances"
description = "Operator-trust affordances such as export summary counts or schemaVersion visibility make the session artifact easier to verify"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The console meets only the minimum letter of the spec with no observable polish beyond required controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "The UI reads as a generic unbranded admin template with no Meridian Calibration identity"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n3"
name = "experience_lacks_polish_guidance_story"
description = "No optional guidance, summary strip, or keyboard affordance helps an operator trust Export or triage"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n4"
name = "experience_lacks_extra_polish"
description = "Heatmap, chart, and export surfaces show no extra polish beyond bare required widgets"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n5"
name = "interface_is_flat_and_static"
description = "Aside from required motion, the interface feels entirely flat and static with no microinteraction polish"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n6"
name = "helpful_platform_capabilities_ignored"
description = "Clipboard copy confirmation or download affordances for CalibrationPack are awkward or missing beyond the letter of Export"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n7"
name = "personalization_is_impossible"
description = "Chart model or series choices reset when navigating views within the same session"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n8"
name = "delightful_moments_are_absent"
description = "Completed re-run and classification moments have no toast or motion polish at all"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n9"
name = "design_has_no_twist"
description = "The calibration console has no distinctive visual or interaction twist beyond a stock table grid"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n10"
name = "effort_stops_at_mvp"
description = "Implementation stops at MVP widgets with no operator-trust extras around Export or triage"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
