[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "export_summary_or_schema_badge"
description = "Beyond required export, a compact CalibrationPack summary strip or live schemaVersion badge appears above the export preview and updates with session state"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "score_count_up_or_chip_crossfade_polish"
description = "Beyond baseline motion, re-run score count-up or threshold chip crossfade feels polished and readable during real UI control use"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "optional_operator_coachmarks"
description = "Optional coachmarks or first-run tips explain heatmap, variance triage, or Export without blocking the required flows"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "chart_or_distribution_extra_affordance"
description = "The score-by-harness chart or drawer distribution chart adds an extra readability affordance such as clearer legend focus or linked highlighting"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "keyboard_undo_redo_shortcuts"
description = "Beyond clicking toolbar controls, keyboard shortcuts trigger Undo or Redo while focus is in the calibration console"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "chart_model_memory_within_session"
description = "Within a session, the chart model selector or series visibility preference stays sticky as the operator moves among views"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "meridian_console_brand_presence"
description = "Meridian Calibration reads as a named analytics console brand in the header rather than a generic untitled dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "optional_density_or_theme_touch"
description = "An optional density or theme touch beyond the required ramp and chips is available without breaking contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "copy_calibration_pack_frictionless"
description = "Copying CalibrationPack JSON or Variance CSV is one obvious control away with clear confirmation, reducing export friction"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "operator_trust_affordances"
description = "Operator-trust affordances such as export summary counts or schemaVersion visibility make the session artifact easier to verify"
type = "binary"
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
