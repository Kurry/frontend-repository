[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All surfaces derive from one shared trial collection: a completed re-run updates the cell, tooltip, drawer, variance rows, and chart together; filters narrow the heatmap and variance computations in one interaction; threshold and classifications update chips, rollups, and totals together — all without a reload and with no view showing stale data another view already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after re-running cells, classifying rows, moving the threshold, and filtering, and a page reload returns the app to its seeded state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "storage_persistence_used"
description = "localStorage or sessionStorage holds trials, classifications, threshold, filters, or UI state after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "The console is free of errors and warnings on first load and stays clean after a complete re-run, triage classifications, rapid slider movement, filter changes, chart interactions, Export preview switches, and Import attempts"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "cold_load_interactive_2s"
description = "The app is interactive (heatmap cells and filter controls respond) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "slider_and_rerun_responsiveness"
description = "Moving the threshold slider reclassifies all rows without perceptible lag, and the UI stays responsive during a running re-run and under rapid repeated input with no hangs"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus"
description = "Every interactive control — heatmap cells, filters, the threshold slider, Classify and Re-run controls, chart legend toggles, drawer chrome — is reachable and operable with the keyboard alone, with a visible focus indicator at each stop, and the slider responds to arrow keys"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "drawer_focus_trap_escape"
description = "The drawer traps focus while open, closes on Escape, and returns keyboard focus to the heatmap cell that opened it"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "validation_association_and_live_region"
description = "Triage form fields have visible labels with validation messages associated with the fields they name, and the divergent rollup change is announced through a polite live region when the threshold moves"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "no_outbound_chrome_links"
description = "App chrome contains zero navigational outbound links: tabs, panels, and controls change views through client state and never navigate to another origin"
type = "binary"
weight = 1.0


[[criterion]]
id = "2.12"
name = "api_shaped_form_schemas_surface_inline_errors"
description = "Classify, bulk Apply classification, and Import paste validate against the Classification / CalibrationPack / TriagePack field contracts with inline per-field errors before submit, and a valid Classify submit produces a record matching that Classification request body"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "seeded_dataset_meets_required_distribution"
description = "On first load the browser-visible data contains at least 6 fictional models, at least 4 fictional harnesses, at least 12 variance tasks spanning at least 3 categories, and each heatmap cell exposes 3 through 6 trials with varied rewards; at the default threshold both stable and divergent rows are visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
