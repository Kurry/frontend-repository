[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "headings_consistent_capitalization"
description = "Where the app renders Meridian Calibration headings and panel titles such as heatmap, variance, chart, timeline, and Export, they use one consistent capitalization convention"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "actions_use_specific_labels"
description = "Where the app renders primary actions, labels are specific verbs such as Classify, Re-run, Pin baseline, Export, and Import rather than only generic Submit or OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "errors_name_field_contract_fix"
description = "Where the app renders Classification or Import errors, they name the offending field and the fix (for example rationale must be at least 15 characters, schemaVersion must be 1)"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_recovery"
description = "Where the app renders filter empty states or an empty-chart message, the copy explains what matched nothing and how to recover with clear-filters or series toggles"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "body_copy_is_well_written"
description = "Where the app renders body or help copy in the calibration console, rate how free it is of spelling and grammatical errors"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_is_consistent"
description = "Where the app names capability-gap, spec-defect, divergent, stable, and CalibrationPack concepts, the same terms are used across variance chips, triage summary, and Export"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "scores_use_two_decimal_consistency"
description = "Where the app renders mean scores, coefficients of variation, and baseline deltas, numeric precision stays consistently at two decimal places"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders export Copy confirmation or classification/re-run toasts, the message states what happened rather than a vague OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_is_visible"
description = "Placeholder copy such as lorem ipsum, TODO, or Insert text here is visible in the shipped calibration UI"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_errors"
description = "Spelling or grammatical errors appear in prominent copy such as Meridian Calibration branding, Export drawer labels, or Classify/Import errors"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "concept_names_are_inconsistent"
description = "The same classification concept is named inconsistently across chips, triage summary, and Export (for example mixing capability gap and capability-gap without a single canonical form)"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "copy_is_truncated_or_overflowing"
description = "Truncated or overflowing text makes heatmap scores, variance chips, or Export tab labels unreadable"
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app exhibits a significant, browser-observable defect in rendered copy quality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
