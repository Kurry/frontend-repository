[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "browse_entity_session_artifact_modules_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, command-session-v1, and artifact-transfer-v1 are initialized and bound for the calibration console"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_classify_and_rerun_ui"
description = "WebMCP entity classification create/update and session cell-re-run start invoke the same store commands as the visible Classify and Re-run controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_destinations_and_ops"
description = "Only declared destinations (heatmap, variance, chart, timeline, cell-drawer, export, import), filters, entity operations create/select/update, session start/cell-re-run, and artifact export/import/copy for calibration-json and variance-csv are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_via_webmcp"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool can exercise browse, entity classification, session re-run, and artifact export/import/copy bindings against the live page"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "classification_entity_ops_work"
description = "Entity operations create, select, and update on classification work with entity fields classification and rationale and update visible badges through the same handlers as the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "classification_validation_bound"
description = "Classification create/update rejects invalid Classification field-contract payloads coherently in UI and MCP paths without desyncing triage totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_and_filters_match"
description = "Browse destinations and filters match the contract: heatmap, variance, chart, timeline, cell-drawer, export, import and model, harness, task-category, sigma-threshold, chart-model, chart-series"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_undeclared_mcp_capabilities"
description = "No extra undeclared destinations, entity fields, session demos, or artifact formats beyond the calibration-matrix contract are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_info_list_invoke_work"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed against the bound calibration tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_from_app_registration"
description = "MCP tools initialize from the app's own registration without manual test-harness edits"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Browse, entity classification, session re-run, or artifact export/import/copy tools are missing, unbound, or no-ops that leave visible calibration state unchanged"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "A WebMCP classification or re-run leaves badges, cells, or timeline out of sync with the same action taken through the visible UI"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or entity operations beyond the calibration-matrix bindings are exposed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Automation cannot list or invoke the declared browse, entity, or session tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "An MCP classification update bypasses the Classification field contract and desyncs MCP-reported state from visible triage totals"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or tool invocation returns errors or incomplete data for the declared calibration tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual hacks outside the declared contract"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "One of browse-query-v1, entity-collection-v1, command-session-v1, or artifact-transfer-v1 is declared but not implemented"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "Automated MCP contract validation against the declared calibration bindings fails"
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "12.11"
name = "artifact_formats_bound"
description = "Artifact operations export, import, and copy are bound for formats calibration-json and variance-csv with import modes calibration-json and triage-json"
type = "binary"
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
