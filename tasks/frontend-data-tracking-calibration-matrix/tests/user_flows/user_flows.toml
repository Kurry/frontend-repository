[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "triage_flow_updates_badge_and_summary"
description = "Scripted probe: move the threshold until a row is divergent, submit a valid Classification with classification spec-defect and a rationale of at least 15 characters, and confirm the row badge and the spec-defect triage summary total each update in the same interaction with no reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_classification_shows_field_errors"
description = "Submitting Classify with a rationale under 15 characters or without a closed-enum classification shows inline errors naming the offending Classification field and changes no triage summary total"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "reclassify_updates_summary_totals"
description = "Reclassifying a badge from capability-gap to spec-defect moves the triage summary totals between those two counts without double-counting and keeps the row badge in sync"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "clear_baseline_removes_deltas"
description = "After pinning a baseline and completing a re-run that creates a signed delta, Clear baseline removes every delta readout from the heatmap in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_filters_and_threshold"
description = "Switching among heatmap, variance, chart, and timeline retains the active filters, sigma threshold, and triage badges without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "filters_empty_state_offers_clear"
description = "When filters match nothing, the heatmap and variance regions show a designed empty state with a clear-filters control that restores the seeded grid and rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "harness_filter_updates_heatmap_and_cv"
description = "Applying a harness filter removes that column from the heatmap and recomputes every variance coefficient of variation in the same interaction; clearing filters restores both surfaces exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "drawer_close_preserves_grid_state"
description = "Opening a cell drawer then closing it via the close control or outside click returns to the heatmap with filters, threshold, and triage state preserved"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_drawer_and_palette_overlays"
description = "The export drawer and command palette open as overlays from their controls, support Escape or backdrop dismiss where specified, and leave underlying calibration state intact when closed without applying Import"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "import_error_recovers_without_reload"
description = "After a failed Import that shows a field-contract error, correcting the payload and importing a valid CalibrationPack or TriagePack applies badges without requiring a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "classify_export_import_unavailable"
description = "Classify, Export, or Import controls are missing from the UI so Classification payloads and CalibrationPack artifacts cannot be produced"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "classification_missing_or_double_counted"
description = "A valid Classification submit fails to badge the row, or reclassification double-counts the same row in both triage summary totals"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "export_preview_desyncs_from_live"
description = "After a classification or re-run, the Export JSON preview disagrees with the live triage badges or cell means until a reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_loses_triage_selection"
description = "Switching views clears bulk divergent-row selection or triage badges unexpectedly"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "filtered_empty_breaks_export_drawer"
description = "Opening Export after filtering every harness out breaks the drawer or leaves the CSV tab blank instead of designed empty-table copy"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "heatmap_variance_filter_disagree"
description = "After the same harness filter, the heatmap and variance view disagree about which harnesses or scores remain"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "drawer_or_export_cannot_reopen"
description = "After closing the cell drawer or export drawer, the same control cannot reopen it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "palette_blocks_without_escape"
description = "The command palette or export drawer blocks navigation with no Escape or close path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "invalid_import_lacks_feedback"
description = "An invalid Import that violates the TriagePack or CalibrationPack field contract applies no classifications and also shows no inline error naming the problem"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "triage_flow_requires_reload"
description = "Completing Classify, Export, or Import requires a full page reload before the next calibration action works"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
