[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dense_console_spacing_scale"
description = "Heatmap, variance, triage summary, and export drawer spacing follow one consistent dense analytics scale rather than arbitrary gaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "tabular_figures_and_hierarchy"
description = "View titles, panel headings, and cell/row text follow the stated hierarchy, and numeric score columns use tabular figures"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "heatmap_anchor_layout"
description = "The heatmap is the visual anchor of the default view with variance, triage, chart, and timeline as surrounding tabs or panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "drawer_slider_rerun_animate"
description = "Cell drawer open/close, threshold chip changes, and re-run progress animate rather than only hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "stack_below_1024_matches_spec"
description = "Below 1024px panels stack vertically and the drawer becomes full-width as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "chips_slider_export_styled"
description = "Classification chips, threshold slider, and export drawer chrome are styled as console controls rather than bare browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "console_type_hierarchy_clear"
description = "View titles are largest, panel headings next, and cell/row text smallest with clear hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "stable_divergent_badge_states"
description = "Stable, divergent, capability-gap, and spec-defect chip/badge states are visually distinct and labeled"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "shared_radius_shadow_borders"
description = "Cards, drawer, and panels share consistent corner radii, shadow depth, and border treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "hover_wash_and_copy_confirm"
description = "Heatmap cell hover lift, variance row hover wash, and export Copy confirmation match the intended microinteractions"
type = "binary"
weight = 1.0

