[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dense_console_spacing_scale"
description = "Heatmap, variance, triage summary, and export drawer spacing follow one consistent dense analytics scale rather than arbitrary gaps"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "tabular_figures_and_hierarchy"
description = "View titles, panel headings, and cell/row text follow the stated hierarchy, and numeric score columns use tabular figures"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "heatmap_anchor_layout"
description = "The heatmap is the visual anchor of the default view with variance, triage, chart, and timeline as surrounding tabs or panels"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "drawer_slider_rerun_animate"
description = "Cell drawer open/close, threshold chip changes, and re-run progress animate rather than only hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "stack_below_1024_matches_spec"
description = "Below 1024px panels stack vertically and the drawer becomes full-width as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "chips_slider_export_styled"
description = "Classification chips, threshold slider, and export drawer chrome are styled as console controls rather than bare browser defaults"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "console_type_hierarchy_clear"
description = "View titles are largest, panel headings next, and cell/row text smallest with clear hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "stable_divergent_badge_states"
description = "Stable, divergent, capability-gap, and spec-defect chip/badge states are visually distinct and labeled"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "shared_radius_shadow_borders"
description = "Cards, drawer, and panels share consistent corner radii, shadow depth, and border treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "hover_wash_and_copy_confirm"
description = "Heatmap cell hover lift, variance row hover wash, and export Copy confirmation match the intended microinteractions"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "sizing_or_spacing_contradicts_scale"
description = "Heatmap or variance spacing contradicts the dense console scale with large empty voids or cramped collisions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_fall_outside_palette"
description = "Heatmap ramp or chip colors clash so scores or labels lose readable contrast against cell backgrounds"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "sizing_mismatches_spec"
description = "Cell score text or chip labels are sized so two-decimal scores or classification text are unreadable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_animations_missing_or_wrong"
description = "Required drawer slide, re-run progress, or threshold chip crossfade is missing or snaps"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "specified_controls_use_browser_defaults"
description = "Threshold slider, Classify, or Export controls render as unstyled browser defaults when the console styles them"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "layout_misaligned_at_breakpoints"
description = "At 1024px or 375px the heatmap, panels, or export drawer misalign or overflow"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_are_clipped_or_offscreen"
description = "Heatmap model names, triage summary, or export tabs render clipped or off-screen at desktop width"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference"
description = "The default view buries the heatmap so the console no longer reads as a calibration heatmap-first tool"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "heading_and_body_text_undifferentiated"
description = "View titles, panel headings, and cell text are visually undifferentiated"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover and open/close microinteractions are absent on heatmap cells, rows, and export chrome"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
