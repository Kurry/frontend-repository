[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, Board mode shows at least 8 seeded scene cards with images and descriptions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After creating a scene titled 'Harbor Opening' with valid required fields, the text 'Harbor Opening' is visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After adding 3 new scenes on top of the seed set, the board shows exactly 3 more scenes than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After switching to Slide (Tutorial) mode, a single centered active scene is visible with navigation affordances"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After editing a scene description/title to 'Evening Cutaway', the text 'Evening Cutaway' is visible and the previous text is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After deleting a scene, that scene's title/description is no longer visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting all scenes, an empty state is visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After submitting create with an empty required title/description, the scenes count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After switching among Tile, List, and Slide view modes, the scene set re-layouts without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After advancing prev/next in Slide mode (when multiple scenes exist), the active scene index changes and the centered scene updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When hovering scene cards, mode toggles, or header controls, a visible hover lift, wash, or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "Welcome to Docs! is visible in the workspace chrome on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "In Slide mode with multiple scenes, pressing the Right arrow key advances the centered scene and the N / total counter increments; at the last scene the next control is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "The board ends with at least 2 camera placeholder scenes and an Add Scene control that pairs a primary button with a dropdown chevron"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After scrolling the board down past roughly 400px a back-to-top control appears; clicking it smoothly returns to the top and the control hides"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Scenes collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Renders visible validation feedback when create is submitted with empty required fields, and the collection count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Scenes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Slide mode shows a single centered active scene with a previous/next control pair and an N / total counter; the Left/Right arrow keys and the controls advance the scene, and the controls are disabled at the first and last scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The board ends with at least 2 empty camera placeholder scenes (each showing a centered add-image affordance) followed by an Add Scene control pairing a primary button with a dropdown chevron"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Clicking an inert header control (kebab menu, notifications bell, dashboard, or account) raises a demo-only toast instead of navigating to another view or origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Editing a scene's title/description updates that same scene in Tile, List, and Slide modes, and deleting a scene renumbers the remaining scenes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "In Slide mode the previous/next controls stay enabled at the first and last scene (no boundary disable), or the Left/Right arrow keys do not advance the centered scene"
type = "binary"
weight = 1.0
negate = true
