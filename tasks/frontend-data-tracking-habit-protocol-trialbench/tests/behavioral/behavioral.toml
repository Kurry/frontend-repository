[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "boundary_move_provenance"
description = "After a boundary move, every day's governing version updates in dose, outcome, confounder, branch, and evaluator views in one transition, while each observation's recorded original-version provenance fields remain byte-identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "audit_trail_contract"
description = "The 6 adherence states stay distinguishable: retrospective entry never overwrites original log, correcting appends rather than rewrites, rapid double-log produces exactly one entry, and a completely skipped/excused phase shows named empty analysis rather than stale derived statistics."
type = "binary"
weight = 1.0

[[criterion]]
id = "live_brushing_gesture"
description = "Brushing a date range across the phase timeline and heatmap recomputes linked views live during the brush (not only on release), with keyboard paths producing identical filter states, and clearing the brush restoring full-range recompute."
type = "binary"
weight = 1.0

[[criterion]]
id = "immutable_branch_lineage"
description = "A branch copies protocol definition and shares immutable observation records; neither branch deletion nor merge touches observation rows. Evaluator findings cite exact branch/version computed from, keeping old finding in history upon recomputing after boundary moves."
type = "binary"
weight = 1.0

[[criterion]]
id = "lagged_effect_simultaneous"
description = "Comparing lagged effects renders both date windows simultaneously from the shared filtered state with per-metric deltas named; switching the comparison window never rewrites underlying observations."
type = "binary"
weight = 1.0

[[criterion]]
id = "reproducible_record_exactness"
description = "The experiment record export (tabular + JSON) has exact columns/fields, stable sort order, regenerated exportedAt, per-field import diagnostics on failure with zero mutation, and re-export after import is field-identical modulo timestamps."
type = "binary"
weight = 1.0
