[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization_chrome_and_panels"
description = "Where the app renders headings, buttons, and panel titles (PortfolioFrame, Profile Header, Projects, Skills, Testimonials, Contact, Completeness, History, Drafts, Download PDF), they use one consistent capitalization convention throughout."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "specific_verbs_on_actions"
description = "Where the app renders button or action labels, they use specific labels such as Add Project, Save As Draft, Download PDF, Undo, Redo, Move Up, and Move Down rather than generic Submit/OK when a specific label is possible."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "validation_names_problem_and_fix"
description = "Where the app renders Add Project Title validation or duplicate-skill rejection messages, they name the field/problem and the fix, not only a bare rejection like 'Invalid'."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Where the app renders empty states (preview start-building prompt, empty projects grid, testimonials row, skills, or drafts list), the copy explains what belongs there and how to add it."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "chrome_and_panel_copy_polished"
description = "Where the app renders chrome labels, panel titles, empty-state copy, and validation messages, rate how free the text is of spelling and grammatical errors."
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "15.6"
name = "terminology_consistent_across_surfaces"
description = "Where the app renders labels for the same concept in multiple places (Projects vs project card, Testimonials, Completeness, Drafts, History), terminology stays consistent rather than inventing conflicting names."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "completeness_count_formatting_consistent"
description = "Where the app renders the Completeness \"x of y complete\" count and related recommended-field labels, formatting is consistent across updates (same phrasing and numeric style)."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.8"
name = "success_messages_are_specific"
description = "Where the app renders confirmation feedback after Save As Draft, the copy states what happened (draft saved / named draft appears) rather than a vague affirmation alone."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "placeholder_copy_visible"
description = "Lorem ipsum or placeholder text ('TODO', 'Lorem', 'asdf', or template variable names such as '{{title}}') is visible anywhere in the shipped UI."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n2"
name = "prominent_copy_has_spelling_errors"
description = "Spelling or grammatical errors appear in prominent copy such as PortfolioFrame, Download PDF, Save As Draft, Completeness, History, or primary Add buttons."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n3"
name = "inconsistent_concept_naming"
description = "The same section or draft concept is named inconsistently across editor, preview, Completeness, and Drafts panels in a way that would confuse a user."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "15.n4"
name = "truncated_or_overflowing_labels"
description = "Panel titles, validation messages, or button labels are truncated or overflowing so the copy is unreadable."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "The app's rendered text exhibits a significant copy-quality defect not covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
