[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The app uses a warm off-white background with white surface cards and hairline borders, giving a clean single-user builder look with a distinct editor panel and preview canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The color tokens resolve to the specified values (primary violet #7C3AED, accent orange #F97316, background #FAFAF9, surface #FFFFFF, text #1C1917, muted #78716C, border #E7E5E4) and are visibly applied across chrome buttons, links, cards, and borders rather than declared and unused"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Headings use the Poppins font stack and body text uses the Inter font stack, with the preview's profile name at 30px semi-bold, section titles at 20px semi-bold, and body copy at 15px regular"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Primary buttons render as a violet fill with white text at a full pill radius with no shadow, and secondary buttons are white with violet text and a 1px border at the same pill radius, over an 8px spacing base with 16px card radii"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Each of the four themes renders its specified accent and supporting tone pair (Sunrise #F97316/#FDE68A, Slate #475569/#CBD5E1, Forest #15803D/#BBF7D0, Blossom #DB2777/#FBCFE8) within the preview's content blocks only"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "The Completeness panel distinguishes complete from incomplete items by more than the count alone, for example a check mark or strikethrough for complete items versus a plain marker for incomplete ones"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "Friendly empty states are visually present — the preview invites the user to start building and the projects grid, testimonials row, and drafts list show explicit hints — rather than blank areas"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "3_8"
description = "Selecting a theme recolors the surrounding editor chrome rather than only the preview content, or the preview's accent color does not change when a different theme is selected"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "3_9"
description = "Primary and secondary buttons render without the pill radius, or cards and panels use square corners or drop shadows instead of the specified 16px hairline-bordered card system"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.10"
name = "3_10"
description = "At approximately 375px wide the document scrolls horizontally, or the preview's profile name heading, the section headings, or the completeness count clip or become illegible instead of reflowing"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
