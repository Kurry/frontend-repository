[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "3_1"
description = "The app uses a warm off-white background with white surface cards and hairline borders, giving a clean single-user builder look with a distinct editor panel and preview canvas"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "3_2"
description = "The color tokens resolve to the specified values (primary violet #7C3AED, accent orange #F97316, background #FAFAF9, surface #FFFFFF, text #1C1917, muted #78716C, border #E7E5E4) and are visibly applied across chrome buttons, links, cards, and borders rather than declared and unused"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "3_3"
description = "Headings use the Poppins font stack and body text uses the Inter font stack, with the preview's profile name at 30px semi-bold, section titles at 20px semi-bold, and body copy at 15px regular"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "3_4"
description = "Primary buttons render as a violet fill with white text at a full pill radius with no shadow, and secondary buttons are white with violet text and a 1px border at the same pill radius, over an 8px spacing base with 16px card radii"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "3_5"
description = "Each of the four themes renders its specified accent and supporting tone pair (Sunrise #F97316/#FDE68A, Slate #475569/#CBD5E1, Forest #15803D/#BBF7D0, Blossom #DB2777/#FBCFE8) within the preview's content blocks only"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "3_6"
description = "The Completeness panel distinguishes complete from incomplete items by more than the count alone, for example a check mark or strikethrough for complete items versus a plain marker for incomplete ones"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.7"
name = "3_7"
description = "Friendly empty states are visually present — the preview invites the user to start building and the projects grid, testimonials row, and drafts list show explicit hints — rather than blank areas"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.11"
name = "export_package_monospaced_preview"
description = "The Export package panel presents Portfolio JSON and Markdown resume as monospaced preview text with Copy and Download controls, matching the builder chrome spacing and accent rather than a screenshot-style dead end"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "status_and_featured_chip_treatment"
description = "Project status chips (shipped, wip, concept) and the Featured treatment read as distinct accents on project cards using the active theme's supporting tone language"
type = "binary"
weight = 0.5
optional = true

