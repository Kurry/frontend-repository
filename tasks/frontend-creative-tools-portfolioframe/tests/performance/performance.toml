[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_under_two_seconds"
description = "On a local cold load the PortfolioFrame builder becomes interactive within 2 seconds, with the empty-state start-building prompt visible."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_full_exercise"
description = "No console errors appear during a full exercise of the builder — creating, editing, deleting, reordering sections, theming, saving and loading drafts, and walking Undo/Redo history."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "preview_updates_under_100ms"
description = "Typing into Profile Header fields or selecting a theme/density updates the live preview with UI response in under 100ms (perceived immediate)."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "shell_visible_while_settling"
description = "While the app settles after first paint, the top bar and two-pane editor/preview shell remain visible rather than a blank white screen with no controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "primary_workflow_smooth_under_25_reps"
description = "The primary content workflow (add project or skill through normal controls) stays exact and responsive under at least 25 rapid repetitions without a blank screen, uncaught error, or sustained freeze."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "ui_interactive_during_preview_updates"
description = "During preview recolor, density re-space, or card enter animations, editor controls remain interactive — the UI does not freeze until transitions finish."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "card_and_reorder_animations_hold_frame_rate"
description = "Driven through real UI controls, project/testimonial card enter-exit and section Move Up/Down reorder animations maintain a smooth frame rate without visible hitching."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_never_hangs"
description = "Rapid repeated Add Project/Testimonial submits, skill adds, theme switches, and Undo/Redo keep the UI responsive with no hangs and leave editor and preview in agreement."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_builder_session_stable"
description = "After an extended session of many creates, deletes, reorders, theme changes, draft saves/loads, and history walks, the tab remains responsive without runaway memory growth that freezes the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "no_layout_jumps_after_first_paint"
description = "After first paint no visible layout jumps occur; the editor panel and preview canvas hold their space as the app settles."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "cold_load_exceeds_two_seconds"
description = "More than 2 seconds pass after local cold load before editor fields or preview controls can be operated."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_builder_flows"
description = "Console errors, warnings, or unhandled rejections appear during create, edit, delete, reorder, theme, draft, or history flows."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "preview_or_reorder_transition_blocks_ui"
description = "Preview recolor, density change, or section reorder blocks the main thread so subsequent clicks queue with visible lag."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "state_change_hangs_ui"
description = "Updating the live preview after a Profile Header edit, theme select, or draft load hangs or freezes the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "rapid_reps_jank_or_blank"
description = "At least 25 rapid repetitions of the primary add workflow produce sustained frame-rate collapse, a blank screen, or multi-second jank."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_editor_input"
description = "While card enter-exit or section reorder animations run, editor form fields and controls ignore input."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "settle_blocks_first_paint_of_controls"
description = "The UI blocks rendering of the top bar and two-pane shell until all assets finish loading, leaving a blank interactive void."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "runaway_resources_after_rapid_edits"
description = "Rapid creates, theme switches, or Undo/Redo cause visible memory/CPU runaway that degrades or crashes the tab."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "blank_while_loading"
description = "Nothing is displayed (blank page) while the app loads — no top bar or editor/preview skeleton."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "crash_under_rapid_or_edge_use"
description = "The app crashes or becomes permanently unresponsive under rapid Add Project/Testimonial submits, after emptying all collections and recreating, or while walking History branches."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
