[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_8px_builder_scale"
description = "At 1440px, spacing among the top bar, left editor panel, and right preview canvas follows an 8px base unit matching the reference screenshots — no arbitrary one-off gaps that break the two-pane PortfolioFrame composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_poppins_inter_spec"
description = "Heading text uses a Poppins-first stack and body text an Inter-first stack; the preview profile name renders at about 30px semi-bold as h1, section titles at about 20px semi-bold as h2, and body copy at about 15px regular, matching the reference."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_two_pane_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: PortfolioFrame wordmark and Download PDF in the top bar, left editor panel and right live preview as distinct white surfaces on the warm off-white (#FAFAF9) app background — a two-pane builder, not a marketing landing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_builder_state_changes_animate"
description = "State changes the spec calls out — adding/deleting a project or testimonial card, adding a skill chip, Move Up/Down section reorder, and draft list entry — show the specified transitions rather than hard cuts when driven through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_stack_matches_reference_patterns"
description = "At 375px vs 1440px, responsive behavior matches the reference patterns: editor and preview stack into a single column at about 375px with no horizontal page scrolling, and the testimonials row scrolls within its own container."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "buttons_chips_cards_match_shape_system"
description = "Primary buttons are filled violet pills at full 999px radius with white text and no shadow; secondary buttons are white with violet text and a 1px border at the same pill radius; project/testimonial cards use 16px radius with hairline borders; skill/category chips are rounded pills tinted with the active theme's supporting tone."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_chrome_vs_preview"
description = "Typography hierarchy clearly distinguishes the PortfolioFrame chrome/wordmark, denser editor panel labels, and the preview's profile name / section titles / body copy."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_builder_spec"
description = "Buttons, theme swatches, section toggles, and History entries show distinct default, hover, focus, and disabled treatments as specified (disabled Undo/Redo and disabled Move Up/Down read as non-interactive)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "tokens_and_themes_match_spec_colors"
description = "Chrome uses the specified CSS custom-property tokens (primary #7C3AED, accent #F97316, background #FAFAF9, surface #FFFFFF, text #1C1917 / muted #78716C, border #E7E5E4); selecting Sunrise/Slate/Forest/Blossom recolors only preview headings, chips, and accent text with each theme's paired accent and supporting tone."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_hover_matches_spec"
description = "Buttons, theme swatches, section toggles, and history entries each show a visible hover state (background, border, or shadow change) when the pointer is over them, verified through real pointer hover."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "spacing_contradicts_two_pane_reference"
description = "Visible spacing between top bar, editor panel, and preview canvas contradicts the reference two-pane composition (large empty voids or cramped collisions)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "colors_outside_specified_palette"
description = "Chrome or preview surfaces use colors outside the specified token/theme palette (for example an unrelated purple-on-white marketing theme that ignores #7C3AED / #FAFAF9 / the four named preview themes)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n3"
name = "preview_type_sizing_mismatches_spec"
description = "Preview profile name, section titles, or body copy are sized in clear mismatch with the specified ~30px / ~20px / ~15px hierarchy."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n4"
name = "required_builder_animations_missing"
description = "Required animations are missing where the spec requires them (new project/testimonial cards snap in with no enter motion, skill chips appear with no motion, section reorder teleports, draft list entry has no enter feedback)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n5"
name = "controls_use_browser_default_styles"
description = "Primary/secondary buttons, section toggles, or form controls use unstyled browser default appearance when the spec styles them as DaisyUI chrome pills and switches."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n6"
name = "desktop_layout_misaligned_vs_reference"
description = "At 1440px the two-pane builder is misaligned versus the reference (missing top bar wordmark/Download PDF, editor and preview not reading as distinct surfaces, or equal-width marketing card stack)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n7"
name = "elements_clipped_or_offscreen_vs_reference"
description = "At 1440px, editor sections, preview cards, or the Completeness panel render clipped or off-screen compared to the reference composition."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n8"
name = "structure_deviates_from_reference_builder"
description = "Structure deviates from the reference: a marketing landing or multi-page shell replaces the single-route two-pane PortfolioFrame builder."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n9"
name = "no_hierarchy_between_chrome_and_preview"
description = "Chrome labels and preview section titles are visually undifferentiated — no clear hierarchy between editor chrome and the assembled document preview."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n10"
name = "microinteractions_deviate_from_reference"
description = "Hover/press microinteractions on buttons, theme swatches, section toggles, or history entries are missing or clearly deviate from the reference feel."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in fidelity to the spec or reference that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
