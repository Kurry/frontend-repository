[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "builder_controls_keyboard_operable"
description = "Every interactive editor control — Profile Header fields, Add Project and Add Testimonial forms, Skills Add, section show/hide toggles, Move Up/Down, theme swatches (Sunrise/Slate/Forest/Blossom), Density, drafts Save As Draft/Load/Delete, layout presets, bulk project checkboxes and bulk actions, Export package tabs/Copy/Download/Import, History panel Undo/Redo/Apply Scenario Change/branch selection, command palette, and Download PDF — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "focus_visible_on_builder_controls"
description = "Keyboard Tab focus is visibly indicated on form fields, theme swatches, section toggles, reorder buttons, Density controls, and History panel entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "chrome_icons_have_accessible_names"
description = "Meaningful chrome icons for section toggles, reorder controls, delete controls, and the drafts panel expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_save_feedback_announced"
description = "Inline validation and duplicate-rejection messages render adjacent to the field they describe, and the transient draft-save confirmation is exposed to assistive technology (for example via an ARIA live region) as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "editor_forms_explicitly_labeled"
description = "Profile Header, Add Project, Add Testimonial, Skills, Contact, and Save As Draft form fields use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "preview_heading_order_logical"
description = "In the assembled preview, the profile name renders as an h1 and section titles as h2s with no skipped heading levels (for example no jump from h1 to h3)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "builder_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the builder workspace, and navigation or complementary regions for editor chrome vs preview) so assistive technology can navigate the two-pane PortfolioFrame shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "chrome_and_preview_text_contrast"
description = "Editor chrome labels, primary buttons, preview body copy, and completeness panel text meet sufficient contrast against their warm off-white / white surfaces in the default chrome theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "toggles_and_buttons_use_semantics"
description = "Section show/hide toggles, theme swatches, Move Up/Down, Undo/Redo, and primary actions use button/switch semantics with accessible names rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_removes_list_animations"
description = "With prefers-reduced-motion set, project/testimonial/skill enter-exit and section reorder animations are removed and every state change — add, delete, reorder, theme, density, draft save — still applies instantly through the real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "builder_controls_unreachable_by_keyboard"
description = "A form field, theme swatch, section toggle, Move Up/Down control, Density control, drafts control, or History panel control cannot be reached or activated via keyboard alone."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing_on_builder"
description = "Focused form fields, theme swatches, section toggles, reorder buttons, or History entries show no visible focus indicator or the indicator is obscured."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "custom_controls_lack_semantics"
description = "Section toggles, theme swatches, or reorder controls use non-semantic tags without ARIA roles or accessible names."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "section_toggle_or_complete_color_only"
description = "A section's show/hide state or Completeness complete/incomplete state is conveyed by color alone with no thumb position, check mark, struck-through label, or other non-color cue."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n5"
name = "disabled_undo_redo_still_focus_trap"
description = "When Undo or Redo is disabled, the control still traps keyboard users without reading as non-interactive, or focus is lost with no recoverable path after using History panel controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n6"
name = "unreadable_contrast_on_chrome_or_preview"
description = "Editor chrome labels, primary pill buttons, or preview body copy are unreadable due to poor contrast against their background."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n7"
name = "validation_or_save_feedback_visual_only"
description = "Add Project Title validation, duplicate-skill rejection, or draft-save confirmation is visual only and is not associated for assistive technology (no adjacent field wiring or live region)."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n8"
name = "meaningful_icons_missing_names"
description = "Meaningful section-toggle, reorder, delete, or drafts-panel icons that convey actions are missing alt text or an accessible name."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n9"
name = "preview_heading_order_skipped"
description = "Preview headings skip levels (for example jumping from the profile h1 to an h3 section title) or have no coherent order."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n10"
name = "animations_ignore_reduced_motion"
description = "With prefers-reduced-motion set, adding/deleting a project or testimonial, adding a skill chip, or reordering a section still plays the full enter/exit or reorder animation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
