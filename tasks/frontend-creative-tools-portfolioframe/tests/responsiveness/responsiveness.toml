[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to about 375px mobile keeps a usable PortfolioFrame builder: editor controls and live preview remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, Add Project/Testimonial submits, section toggles, Move Up/Down, theme swatches, Density, Save As Draft, and Download PDF present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "preview_headings_readable_both_widths"
description = "The preview's name heading, section headings, and the Completeness \"x of y complete\" count stay legible at both 1440px and 375px — type scales or reflows rather than clipping."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, editor panels and preview content never clip or overflow the viewport (page-level)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "editor_preview_stack_at_375"
description = "At about 375px wide the editor and preview stack into a single column and both regions remain fully usable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_stack_order_stays_usable"
description = "At 375px width, editor and preview reflow into a logical stacking order without covering each other into an unusable pile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "testimonials_horizontal_scroll_container"
description = "At every viewport width including 375px, the testimonials row scrolls horizontally within its own container rather than overflowing the page."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling (testimonials may scroll inside their own container only)."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "preview_grid_scales_with_viewport"
description = "The preview's project grid and section blocks size responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "top_bar_controls_remain_accessible"
description = "The PortfolioFrame wordmark area and Download PDF control remain accessible and operable at 375px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_375_or_1440"
description = "At 375px or 1440px the two-pane PortfolioFrame layout breaks: overlapping panels, page overflow, or unusable stacking."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "mobile_controls_too_small"
description = "At 375px width, Add controls, section toggles, theme swatches, Density, or Download PDF are too small or misaligned to operate reliably."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "preview_text_unreadable_on_mobile"
description = "At 375px width, the preview name heading, section headings, or Completeness count are too small to read or are clipped."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "content_cropped_with_spurious_scrollbars"
description = "At 375px or 1440px, builder content is cropped or unnecessary page-level scrollbars appear for content that should fit or stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "editor_or_preview_missing_at_375"
description = "At about 375px wide, the editor panel or live preview region is missing or unreachable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_chrome_obscures_builder"
description = "Fixed-position top bar chrome obscures editor controls or preview content so they cannot be used."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_narrow_width"
description = "At 375px width, editor and preview panels overlap into an unusable stack."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "testimonials_overflow_page"
description = "At 375px or 1440px, the testimonials row overflows the page horizontally instead of scrolling within its own container."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "project_grid_static_size_overflows"
description = "The preview project grid uses a static size that overflows the viewport at 375px."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_disappear_at_width"
description = "At 375px or 1440px, required controls (Add Project, section toggles, theme picker, Density, Save As Draft, or Download PDF) disappear from the layout."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout and adaptivity that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
