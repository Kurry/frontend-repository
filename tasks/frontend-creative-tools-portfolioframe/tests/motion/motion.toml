[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "4_1"
description = "Buttons, theme swatches, and section toggles each show a visibly distinct hover state such as a background, border, or shadow change when the pointer is over them"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "4_2"
description = "Keyboard Tab focus is visibly indicated on interactive controls including form fields, theme swatches, section toggles, and reorder buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "4_3"
description = "Saving a draft gives immediate transient feedback that the save succeeded, such as the draft appearing in the list right away or a brief confirmation message"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.4"
name = "4_4"
description = "Undo, Redo, Apply Scenario Change, and branch selection performed through the real History-panel controls update the visible assembled preview"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.5"
name = "4_5"
description = "Interactive chrome such as buttons, theme swatches, and section toggles shows no hover feedback and feels static on pointer hover"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.6"
name = "copy_export_confirmation_feedback"
description = "Activating Copy export through the real Export package control shows a brief visible confirmation that appears then reverts, and Import success updates editor and preview without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "bulk_delete_and_add_card_motion"
description = "Adding a project or testimonial through the real form controls animates the new card into the preview, and Delete selected removes selected cards with exit motion rather than an instant snap"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n6"
name = "copy_export_no_confirmation"
description = "Copy export completes with no visible confirmation feedback, or Import success leaves the preview showing stale pre-import content until a reload"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "4.8"
name = "skill_chip_enters_without_duplicate_motion"
description = "Using the real Skills input to add a distinct skill animates the new chip into the preview's Skills section, while attempting a case-insensitive duplicate creates no second chip and triggers no chip-entry motion"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "section_reorder_animates_through_controls"
description = "Using the real Move Up or Move Down control animates the affected preview section from its old position to its new position rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "theme_and_density_transition_in_place"
description = "Using the real Theme and Density controls visibly transitions preview accent colors and block spacing in place without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "section_visibility_updates_immediately"
description = "Using a section's real show/hide toggle updates the assembled preview immediately, with no reload or stale intermediate section state"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "download_pdf_opens_native_print_preview"
description = "Activating Download PDF through the real top-bar control opens the browser's native print preview for the assembled document"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "reduced_motion_removes_list_and_reorder_animation"
description = "With prefers-reduced-motion enabled, project, testimonial, skill, draft-list, and section-reorder animations are removed while every corresponding state change still applies immediately through the real controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "disabled_history_controls_read_inactive"
description = "When no adjacent history snapshot is available, the real Undo or Redo control has a visibly non-interactive disabled state; when available, Undo, Redo, Apply Scenario Change, and branch selection update the preview immediately"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "history_preset_and_palette_results_hover"
description = "History entries, layout preset controls, and command-palette results each show a visible background, border, or shadow transition when hovered through the real pointer path"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "single_card_delete_exit_motion"
description = "Deleting a single project or testimonial through its real Delete control animates that card out of the preview rather than removing it in an instantaneous snap"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "draft_entry_animates_on_save"
description = "Saving a valid draft through Save As Draft animates the new entry into the drafts list and gives immediate visible success feedback"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.catchall"
name = "motion_catchall"
description = "The app exhibits a significant, browser-observable defect in motion or microinteractions that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, interaction performed, observed behavior) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
