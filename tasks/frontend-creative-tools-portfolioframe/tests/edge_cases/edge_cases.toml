[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_regions_show_hints"
description = "On first load and whenever projects, testimonials, skills, or drafts are empty, those regions show an explicit empty-state hint rather than a blank area; the preview invites the user to start building."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "add_project_title_inline_validation"
description = "Attempting to submit the Add Project form with an empty Title shows an inline error message naming the Title field next to that field, the submit control stays disabled while required fields are invalid, and no project card is appended."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_field_and_fix"
description = "Add Project Title validation and case-insensitive duplicate-skill rejection copy name the field/problem and the fix rather than only saying 'Invalid'."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "draft_save_shows_confirmation"
description = "Saving a draft via Save As Draft adds the new entry to the drafts list immediately and gives transient confirmation that the save succeeded (new draft appears right away, or a brief confirmation message appears)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "duplicate_skill_rejected_inline"
description = "Attempting to add a skill that duplicates an existing one ignoring letter case is rejected with a visible inline message and creates no second chip."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_after_content_changes"
description = "After adding, editing, or deleting a project, testimonial, or skill, or editing a Profile Header field, Undo is enabled and reverts the most recent content change; Undo is disabled when there is nothing to undo."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "move_controls_disabled_at_ends"
description = "Move Up is disabled for the first visible section and Move Down for the last, and the disabled controls read as non-interactive."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "builder_controls_use_semantic_tags"
description = "Add Project/Testimonial submits, Skills Add, section toggles, Move Up/Down, theme swatches, Density, drafts controls, and Undo/Redo use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "deleted_draft_stays_gone_after_reload"
description = "Deleting a draft removes it from the drafts list immediately, and a full page reload does not revive a draft that was deleted before the reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "rapid_duplicate_submit_creates_one"
description = "Rapid duplicate submissions of the Add Project or Add Testimonial form create exactly one record, not two."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "malformed_import_shows_error"
description = "Importing a malformed Portfolio JSON shows a visible error naming that the package could not be read and leaves Name, projects, theme, and density unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "bulk_bar_hidden_when_none_selected"
description = "With no projects checked, the bulk actions bar is hidden or Delete selected is disabled and produces no change to the project list."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "second_featured_pin_leaves_one"
description = "Pinning a second featured project leaves exactly one Featured treatment visible; the previous featured project loses the treatment immediately."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "palette_empty_query_shows_hint"
description = "A command palette query with no matches shows an empty-state line inside the palette rather than a blank overlay."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "project_status_enum_and_title_bounds"
description = "Submitting Add Project with Status outside shipped|wip|concept, an empty Category Tag, or a Title longer than 80 characters shows an inline error naming that field and appends no card."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "testimonial_quote_bound_and_draft_duplicate_name"
description = "Submitting Add Testimonial with a Quote longer than 400 characters shows an inline error naming quote; Save As Draft with a case-insensitive duplicate name shows an inline error naming name and adds no second draft."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "import_wrong_schema_version_rejected"
description = "Importing parseable JSON whose schemaVersion is not exactly portfolioframe-v1, or that has two projects with featured true, shows a visible error naming the import problem or offending field and leaves Name, projects, theme, and density unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "contact_email_missing_at_rejected"
description = "Entering a non-empty Contact email that lacks @ shows an inline error naming the email field and does not commit that invalid email into the preview Contact section."
type = "binary"
weight = 1.0

