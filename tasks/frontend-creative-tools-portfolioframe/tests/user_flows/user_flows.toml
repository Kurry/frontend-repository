[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "add_project_updates_preview_and_completeness"
description = "Create flow: after submitting a valid project through the Add Project form, the preview's project grid shows exactly one more card, and the Completeness panel's \"x of y complete\" count reflects the projects section the moment it first gains content — without a page reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_project_title_inline_validation"
description = "Create flow: attempting to submit Add Project with an empty Title shows immediate inline validation naming the Title field and appends no card."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "profile_and_project_edits_update_preview"
description = "Edit flow: typing into Profile Header Name/Title/Bio updates the preview header immediately; editing an existing project's Title updates that project's card in the preview without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_project_or_testimonial_updates_preview"
description = "Delete flow: deleting a project removes its card from the preview grid and deleting a testimonial removes its entry from the testimonials row on the first try."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "theme_and_density_switch_retains_content"
description = "Mode switch: selecting Forest recolors the preview's headings, chips, and accent text in place and switching Density to Compact tightens the preview's padding and gaps, while editor and preview content remain and the editor chrome's own colors never change."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_state"
description = "Edge: after deleting the last project, testimonial, or skill, that region of the preview returns to its explicit empty-state hint rather than a blank area."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "section_hide_reorder_restore_flow"
description = "Section flow: hiding Testimonials removes it from the preview while its entries remain in the editor; using Move Up to reorder another section visibly changes the preview's section order; turning Testimonials back on restores it in its remembered position."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "skill_undo_redo_history_flow"
description = "History flow: adding a skill shows the new chip in the preview; pressing Undo removes exactly that chip and enables Redo; pressing Redo restores the same chip; the History panel lists these transitions as selectable snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "draft_save_load_replaces_full_state"
description = "Drafts flow: saving the current content under a typed name via Save As Draft adds exactly one entry to the drafts list; choosing Load replaces the editor fields, preview content, section order and visibility, and the active theme and density with that draft's exact values without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "project_and_draft_survive_reload"
description = "Persistence recovery: after submitting a valid project and saving a named draft, a full page reload still shows the same project card and still lists the draft — no dead end requiring re-entry."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_builder_flows_unavailable"
description = "Add Project, edit Profile Header, delete a project/testimonial, Save As Draft, or Load draft cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "create_fails_to_appear_or_duplicates"
description = "Submitting a valid Add Project or Add Testimonial either fails to show a preview card or creates duplicate cards from a single submit."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "editor_preview_desync"
description = "After editing Profile Header, a project, Contact, theme, or density, the editor and live preview disagree about the same content without a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "theme_or_density_breaks_or_loses_content"
description = "Selecting a theme or switching Density breaks the layout or clears editor/preview content that should remain."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "empty_regions_broken_after_last_delete"
description = "After deleting the last project, testimonial, or skill, the preview region is blank/broken with no empty-state hint."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "section_restore_loses_position"
description = "Turning a hidden section back on appends it at the end instead of restoring it in its remembered position, or hide/show loses its editor entries."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "undo_redo_cannot_complete_history_walk"
description = "After a content change, Undo cannot revert it, or after Undo, Redo cannot restore it, leaving the History walk incomplete."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "load_draft_fails_or_partially_applies"
description = "Loading a saved draft fails to replace editor, preview, section order/visibility, theme, and density with the draft's exact values, or applies only a partial subset."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_validation_silent"
description = "An empty Title Add Project attempt or case-insensitive duplicate skill provides no visible validation feedback naming the field/problem."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "reload_loses_project_or_draft"
description = "After creating a project and saving a draft, a full page reload loses the project card or the draft entry, requiring re-entry."
type = "binary"
negate = true
weight = 1.0


[[criterion]]
id = "6.11"
name = "export_package_end_to_end_flow"
description = "Export package flow: filling Profile Header Name with a unique string, adding a uniquely titled project, switching to Portfolio JSON, and activating Copy export puts text containing both unique strings on the clipboard with visible confirmation; Markdown resume shows the same Name and project title; Download export matches the visible tab."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_flow"
description = "Import round trip: after building content, downloading Portfolio JSON, clearing or replacing working state, and importing that JSON, the preview, editor fields, theme, density, section order, and Completeness count match the pre-export state and the export preview again contains the same project titles."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "bulk_delete_with_undo_flow"
description = "Bulk delete with undo: selecting three projects and choosing Delete selected removes all three from the preview and from both export tabs; pressing Undo restores all three cards, their statuses, and the export text exactly as before the bulk delete."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "layout_preset_and_palette_flow"
description = "Applying Compact stack changes section order, visibility, theme, and density together and updates Export package preview; Undo restores the prior layout; opening the command palette with Ctrl+K, typing part of Export package, and pressing Enter opens the Export package panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n11"
name = "export_flow_unreachable"
description = "Copy export, Download export, or Import package cannot be completed from the visible UI controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n12"
name = "export_preview_desyncs_after_edit"
description = "After editing the profile Name or adding a project, the Export package preview still shows stale text that omits the new values until a reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
