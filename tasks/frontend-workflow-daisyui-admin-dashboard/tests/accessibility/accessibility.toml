[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "8.1"
name = "keyboard_reaches_directory_controls"
description = "Sidebar items, header controls, table row actions, form fields, command palette, export drawer controls, and Archive Restore are reachable and operable with the keyboard alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.2"
name = "visible_focus_indicators"
description = "Focused interactive controls show a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.3"
name = "overlays_escape_and_focus_return"
description = "Popovers, the command palette, and the export drawer close on Escape and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.4"
name = "palette_and_drawer_trap_focus"
description = "While open, the command palette and export drawer trap focus within their surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.5"
name = "validation_announced_aria_live"
description = "Form validation messages are announced through an aria-live polite region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.6"
name = "mutation_announcements_aria_live"
description = "Create, archive, restore, export copy, and import completion are announced through an aria-live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.7"
name = "checkboxes_and_icon_buttons_labeled"
description = "Row selection checkboxes and icon-only buttons carry accessible labels."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.8"
name = "status_and_role_not_color_only"
description = "Status and role badges convey state with text labels in addition to color."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.9"
name = "form_fields_have_visible_labels"
description = "Add/Edit form fields have visible labels associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "8.n1"
name = "controls_not_keyboard_operable"
description = "Primary directory controls cannot be activated or reached via keyboard."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "8.n2"
name = "focus_indicators_missing"
description = "Focus indicators are missing or obscured on interactive controls."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "8.n3"
name = "overlays_leave_focus_stranded"
description = "After Escape closes the command palette, export drawer, or a popover, keyboard focus remains trapped in a hidden layer or jumps to an unrelated control instead of returning to the opener."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "8.n4"
name = "validation_visual_only"
description = "Form validation errors are visual only with no aria-live announcement."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
