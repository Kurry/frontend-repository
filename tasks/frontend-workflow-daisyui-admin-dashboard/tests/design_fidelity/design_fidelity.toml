[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "3.1"
name = "overview_mosaic_matches_reference_density"
description = "Relative to /reference-screenshots overview and segments, Operations Overview keeps an asymmetric mosaic with a primary inverse Revenue run rate spotlight rather than a flat equal-width stack."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "users_table_density_matches_reference"
description = "Relative to reference screenshots, All Users keeps dense admin table, KPI strip, filters, and form density rather than sparse marketing cards."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "sidebar_brand_and_account_footer_present"
description = "Relative to reference chrome, the sidebar shows Pineapple Tech branding and the Ari Lane Admin account footer treatment."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "chart_accent_family_aligned"
description = "Overview chart accents stay in the teal/amber/sky/rose/orange family consistent with the reference screenshots."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.5"
name = "export_and_palette_do_not_break_shell"
description = "Export drawer and command palette overlay the existing shell without replacing the reference drawer+canvas composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "overview_collapses_to_equal_width_stack"
description = "Operations Overview is laid out as a uniform equal-width single-column stack with no mixed mosaic spans relative to the reference."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "reference_chrome_missing_or_genericized"
description = "Pineapple Tech sidebar branding or the Ari Lane Admin footer is missing or replaced by unrelated generic chrome."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the reference screenshots that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
