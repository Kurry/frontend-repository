[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "7.1"
name = "desktop_drawer_open_by_default"
description = "At a large desktop viewport (~1440px) the drawer sidebar is open by default showing Pineapple Tech nav."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_hamburger_overlay_drawer"
description = "At a small viewport the sidebar collapses to a hamburger control that opens an overlay drawer."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "no_clip_or_page_scroll_at_375"
description = "At 375px width no content clips and the page shows no horizontal scrolling; wide tables scroll inside their region."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "export_drawer_usable_at_375"
description = "At 375px the export drawer stays fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "command_palette_usable_at_375"
description = "At 375px the command palette overlay stays fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "archive_view_usable_at_375"
description = "At 375px the Archive view stays fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "add_user_form_usable_at_375"
description = "At 375px the Add User form sections remain usable without clipped required fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "kpi_strip_wraps_or_scrolls_cleanly"
description = "At 375px the All Users KPI strip (Total/Active/Paying/Suspended) remains readable without overlapping into other chrome."
type = "binary"
weight = 1.0

