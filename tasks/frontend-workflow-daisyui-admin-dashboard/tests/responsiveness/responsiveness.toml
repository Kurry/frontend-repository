[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "7.1"
name = "desktop_drawer_open_by_default"
description = "At a large desktop viewport (~1440px) the drawer sidebar is open by default showing Pineapple Tech nav."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_hamburger_overlay_drawer"
description = "At a small viewport the sidebar collapses to a hamburger control that opens an overlay drawer."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "no_clip_or_page_scroll_at_375"
description = "At 375px width no content clips and the page shows no horizontal scrolling; wide tables scroll inside their region."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "export_drawer_usable_at_375"
description = "At 375px the export drawer stays fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "command_palette_usable_at_375"
description = "At 375px the command palette overlay stays fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "archive_view_usable_at_375"
description = "At 375px the Archive view stays fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "add_user_form_usable_at_375"
description = "At 375px the Add User form sections remain usable without clipped required fields."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "kpi_strip_wraps_or_scrolls_cleanly"
description = "At 375px the All Users KPI strip (Total/Active/Paying/Suspended) remains readable without overlapping into other chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "mobile_layout_clips_or_overflows"
description = "At 375px content clips, overlaps unreadable, or the page scrolls horizontally."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "export_or_palette_offscreen_on_mobile"
description = "At 375px the export drawer or command palette is off-screen or inoperable."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "drawer_broken_across_breakpoints"
description = "Drawer behavior is broken: missing on desktop when it should be open, or no hamburger/overlay path on small viewports."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsiveness that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
