[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "6.1"
name = "create_user_updates_list_kpis_logs_export"
description = "Create flow: submit Add User with a valid API-shaped payload — All Users gains exactly one row, Total KPI increases by one, User Logs gains a create entry for that email, and both Directory JSON and Users CSV previews include the new user without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_create_shows_field_named_errors"
description = "Create flow: submitting with empty required fields or contract violations (bad email, short temporaryPassword, overlong firstName/notes) shows field-named inline validation and adds no row."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "edit_role_echoes_filters_logs_export"
description = "Edit flow: saving a role change updates the row badge, role-filter membership, User Logs, and Directory JSON role for that user without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "archive_delete_updates_all_surfaces"
description = "Archive flow: Delete removes the user from All Users and KPIs, clears selection membership, lists the record in Archive, and moves it from Directory JSON users into archive."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "view_switch_retains_directory_state"
description = "View switch: moving between Operations Overview, All Users, User Logs, Archive, and Add User keeps the same users/archive/log store — returning to All Users shows prior mutations without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "archive_all_reveals_empty_state"
description = "Edge: after archiving every active user, All Users shows an empty state, Archive lists the archived records, and export previews still compile."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "status_filter_and_kpi_surfaces_agree"
description = "Filter flow: Active→Suspended updates Active/Suspended KPIs, status badge, Active/Suspended filter membership, logs, and Directory JSON status together."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "command_palette_preserves_workflow"
description = "Command palette: open with Control+K/Meta+K, navigate to Archive or Export directory, and continue the workflow — palette closes and the target surface is usable without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "export_drawer_and_restore_overlays"
description = "Overlays: export drawer opens with Directory JSON/Users CSV tabs; Archive Restore and popovers/command palette behave as specified for confirmations and navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "duplicate_and_restore_recover_without_reload"
description = "Recovery: Duplicate then submit with a new email, and separately Restore an archived user — both succeed without reload and leave All Users, Archive, logs, and exports coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_import_round_trip_flow"
description = "After create/edit plus at least one archive, Copy or Download Directory JSON then Import it — All Users, Archive, KPIs, and both export previews match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "sort_name_az_highest_spend_round_trip"
description = "Sort flow: Name A-Z orders alphabetically; Highest spend reorders by payments descending; switching back restores Name A-Z order without changing the visible count."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "create_payload_matches_export_record"
description = "After Add User with a distinctive email plus sendInvitation true and a closed permission id selected, Directory JSON users entry for that email carries the same firstName/lastName/email/role/status/sendInvitation/permissions field names as the submitted request body."
type = "binary"
weight = 1.0

