[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "9.1"
name = "cold_load_interactive_under_2s"
description = "The app is interactive within 2 seconds of a local cold load."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during a full exercise including view switches, create/edit/archive/restore, filters, sort, bulk actions, command palette, export drawer, and theme toggle."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "rapid_filter_sort_stays_responsive"
description = "Rapid filter toggling and quick sort switches leave the UI responsive with no hangs or dropped interactions."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "command_palette_rapid_open_close"
description = "Repeated command palette open/close stays responsive with no hangs."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "export_preview_switch_no_freeze"
description = "Opening the export drawer and switching between Directory JSON and Users CSV regenerates the preview without freezing the UI."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "kpi_trend_redraw_stays_smooth"
description = "Creating or archiving a user redraws KPI trend charts without multi-second freezes."
type = "binary"
weight = 0.5

