[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.3"
name = "browser_storage_persistence_present"
description = "localStorage, sessionStorage, or another browser storage API holds app data (users, theme, filters, or UI state) after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "external_origin_asset_requests"
description = "Devtools network activity shows outbound requests to CDNs or other external origins for scripts, styles, fonts, icons, chart assets, or avatar images instead of everything loading from the app's own origin"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.6"
name = "edit_coherent_across_views"
description = "Editing a user updates that same record everywhere it appears — list row, role/status badges, and filtered views — rather than diverging into a second disconnected copy"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "keyboard_operability_visible_focus"
description = "Every interactive control — sidebar items, header controls, table row actions, form fields, command palette, export drawer controls, and Archive Restore — is reachable and operable with the keyboard alone, and the focused control shows a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "popover_escape_and_focus_return"
description = "The notifications, profile, and sidebar account popovers, the command palette, and the export drawer close when Escape is pressed and keyboard focus returns to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.9"
name = "validation_announced_aria_live"
description = "Form validation messages are exposed through an aria-live polite region in the DOM in addition to being shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "checkbox_and_icon_button_labels"
description = "Row selection checkboxes and icon-only buttons carry accessible labels (aria-label, aria-labelledby, or an associated label element)"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.11"
name = "cold_load_interactive_under_2s"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.12"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear during a full exercise of the app (view switches, create/edit/archive/restore, filters, sort, bulk actions, command palette, export drawer, theme toggle, popovers)"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.13"
name = "rapid_input_stays_responsive"
description = "Rapid repeated input — fast filter toggling and quick sort switches — leaves the UI responsive with no hangs, freezes, or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.14"
name = "reload_seeded_reset_multi_facet"
description = "After changing the theme, applying a filter and a sort, selecting rows, and creating a user, a page reload returns the app coherently to its seeded baseline — the seeded users, the default view, cleared filters and selection, and the default theme — with every facet reset together, never a mix of survived and reset state"
type = "binary"
weight = 1.0


[[criterion]]
id = "2.15"
name = "export_and_import_share_store"
description = "Directory JSON and Users CSV compile from the same in-memory store the UI renders: after create and archive, opening the export drawer shows those mutations, and a successful Directory JSON import updates All Users, Archive, KPIs, and both previews together"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "field_contract_enforced_before_store_write"
description = "Invalid API-shaped payloads (overlong firstName, email without domain dot, temporaryPassword under 8 on create, or unknown permission ids) never increase the users count; valid submits write the composed display name and enum badges from those fields"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.17"
name = "created_record_is_request_body"
description = "A successful Add User stores a record whose Directory JSON users entry uses the UserCreate request-body field names (firstName, lastName, email, role, status, and when set sendInvitation, twoFactorEnabled, productAccess, permissions) rather than inventing a divergent key set"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical defect (console, network, state coherence, stability, or accessibility) that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, console line, network request, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
