[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "4.1"
name = "empty_active_list_state_present"
description = "When All Users has zero active rows (all archived or filters match nothing), an empty state message is visible in the list region."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "add_edit_forms_validate_inline"
description = "Add User and Edit User show inline per-field validation for the API-shaped contract before a successful submit."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_and_import_errors_actionable"
description = "Validation and import errors name the field and the fix rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "create_archive_restore_export_feedback"
description = "Create, archive, restore, export copy, and import show visible success or confirmation feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "cancel_leaves_collection_unchanged"
description = "Cancel on Add or Edit leaves the active users count, names, and Archive unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "archive_provides_restore_path"
description = "Destructive Delete archives rather than hard-erasing: Archive exposes Restore that returns the user to All Users."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "double_submit_creates_one_user"
description = "Double-activating Add User submit creates exactly one user (count +1, one new row)."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "bulk_noop_without_selection"
description = "Bulk Change status/role with zero rows checked is disabled or a no-op; bulk Export with zero selected still opens the export drawer."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "malformed_import_rejected"
description = "Importing malformed Directory JSON or Users CSV shows an inline error naming the import field and leaves users count and Archive unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "field_bounds_block_create"
description = "Overlong firstName (>40), notes (>280), phone with fewer than 7 digits, or temporaryPassword shorter than 8 on Create is blocked with a field-named error and adds no row."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "An empty active All Users collection shows nothing and provides no empty-state UI feedback."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Validation or import errors are surfaced only in the browser console."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Create, archive, restore, export copy, or import lacks visible feedback and silently succeeds or fails."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "delete_hard_erases_without_archive"
description = "Delete permanently erases users with no Archive entry and no Restore path."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "malformed_import_mutates_collection"
description = "Malformed Directory JSON or Users CSV import still changes the users count or Archive membership."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case handling that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
