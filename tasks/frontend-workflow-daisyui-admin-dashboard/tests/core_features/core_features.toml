[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_users_table_columns"
description = "On load, All Users opens non-empty with at least 8 seeded users; every seeded user is reachable in the table (paging through the pagination chrome counts), and each row shows name, email, a role badge, a status badge (Active | Invited | Suspended), payments total, products count, and a last-active label"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "created_user_visible_in_list"
description = "After creating a user with first name 'Ada', last name 'Lovelace', and a valid email, the text 'Ada Lovelace' (or equivalent full name) is visible in the All Users list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "three_adds_three_more_rows"
description = "After adding 3 new users on top of the seed set, the All Users table shows exactly 3 more rows than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "suspended_badge_distinct"
description = "After changing a user's status from Active to Suspended, that user shows a Suspended badge/state that is visually distinct from Active users"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "edited_name_replaces_old"
description = "After editing a user's name from the seeded value to 'Evening Runner', the text 'Evening Runner' is visible in the list and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "deleted_user_gone_from_list"
description = "After archiving a user via Delete, that user's name is no longer visible anywhere in the All Users list and the same record appears in Archive"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "empty_state_after_delete_all_or_zero_match_filter"
description = "After archiving all users, and separately when applied filters match zero users, the All Users list region shows an empty state message and no active user data rows remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "invalid_submit_adds_no_row"
description = "After submitting Create user with an empty required name or email field, the users count in the list does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "status_filter_narrows_list"
description = "After filtering All Users by status Suspended (with at least one Suspended and one Active user present), only Suspended users remain visible in the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "sidebar_view_swap_no_reload"
description = "After switching from Operations Overview to All Users via the sidebar, the main canvas shows the users table/KPIs (not the overview mosaic), and switching back restores Operations Overview without a full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "additional_users_modes_open"
description = "After opening at least two additional Users modes from Roles, Permissions, User Logs, User Stats, User Payments, or User Products via the sidebar, each opened mode shows its domain UI (filters/tables) and the URL does not navigate to an external origin"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "theme_toggle_recolors_no_reload"
description = "After clicking the sun/moon theme swap, data-theme flips between light and dark and surfaces recolor without reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "bulk_action_applies_to_selection"
description = "After selecting multiple All Users rows and running a bulk action (Change status, Change role, or Delete/archive), the selected users update or move to Archive together and KPIs reflect the change"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "header_search_filters_users"
description = "After typing a seeded user's name into the header search field, the All Users list narrows to matching users; clearing the field restores the full list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "notifications_popover_seeded_rows"
description = "After clicking the header notifications bell, a popover opens showing 4 seeded notification rows and the bell shows an error indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "account_footer_popover_upward"
description = "After clicking the sidebar account footer (Ari Lane / Admin), a popover opens upward listing Profile settings, Docs, API settings, and Logout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "crud_updates_shared_state"
description = "Users collection supports create, edit, and delete with list rows and KPI counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "domain_state_beyond_crud"
description = "Domain state beyond CRUD is implemented: status badges, role assignment, list filters/sort that recompute visible users, bulk status/role/archive on selected rows, live User Logs, Archive vault, and directory export previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "static_html_no_working_crud"
description = "Users list is static HTML only with no working create/edit/archive against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.24"
name = "chrome_outbound_link_navigation"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.27"
name = "header_profile_popover_items"
description = "Clicking the header profile control opens a popover listing Profile, Inbox (with a badge), Settings, and Logout"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "search_field_decorative_only"
description = "Typing a seeded user's name into the header search field leaves the All Users row set identical to the unfiltered list (search is decorative)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.29"
name = "sidebar_shell_nav_groups"
description = "The sidebar shows Pineapple Tech branding, at least 14 collapsible nav groups including a Users group containing All Users, Add User, Roles, Permissions, User Logs, User Stats, User Payments, User Products, and Archive, a top-level Dashboard item, and a sticky account footer with an online avatar, the name 'Ari Lane', and the role 'Admin'"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "overview_content_complete"
description = "Operations Overview renders breadcrumbs (Dashboard › Operations Overview), header actions (New product / Export / System health), a KPI stats strip (Revenue / Orders / Active users / Support SLA), chart cards including a revenue/demand column chart, an order-status pie, a primary inverse revenue run-rate column card, an acquisition mix pie, a marketing line, and a fulfillment line, plus operational panels such as an activity table, governance radial + progress, priority queue, and uptime bars"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "add_user_form_sections_and_inline_validation"
description = "The Add User form presents Profile (firstName, lastName, email, phone, notes), Access (temporaryPassword, accountSegment, send invitation), Account settings (status, role, 2FA / product-access toggles), and Permissions checkboxes; validation enforces the API-shaped field contract (firstName/lastName 1-40, email with domain dot, temporaryPassword min 8 on create, role in Admin|Manager|Member|Viewer, status in Active|Invited|Suspended, accountSegment in Internal|Partner|External, phone 7-15 digits when present, notes max 280); submit stays disabled until valid; correcting an invalid field clears that field's inline error without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "add_user_flow_chain"
description = "Starting on All Users, record the KPI Total value and the pagination total, then submit Add User with valid fields: without a reload, the table gains exactly one row, the Total KPI increases by exactly one and its inline trend chart redraws, the pagination total reflects the new count, and opening another Users mode afterward shows derived data reflecting the same enlarged collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "status_change_flow_chain"
description = "Changing a user's status from Active to Suspended immediately decreases the Active KPI by exactly one and increases the Suspended KPI by exactly one, swaps that row's status badge, and moves the user out of the Active status filter's results and into the Suspended filter's results, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "role_edit_flow_chain"
description = "Editing a user's role from the row's Edit action updates that row's role badge, changes which role-filter result set includes the user, and updates the KPI strip in the same session without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "delete_flow_chain"
description = "Archiving a user via the row Delete action, and separately running bulk Delete on two checkbox-selected rows, removes exactly those rows from All Users, decreases the Total KPI by the number archived, drops them from every active filtered view, clears them from the selection, and shows them in Archive"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "sort_round_trip"
description = "Applying the Name A-Z sort orders the visible rows alphabetically by name; switching to Highest spend reorders the same rows by payments total from highest to lowest; switching back to Name A-Z restores the alphabetical order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "theme_flow_across_views"
description = "Toggling the theme recolors both Operations Overview and the Users views without reloading the document, and the chosen theme persists while switching between views within the session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "cancel_leaves_collection_unchanged"
description = "Pressing Cancel on the Add or Edit user form leaves the users collection unchanged: no row is added, removed, or modified and the KPI counts stay the same"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "double_submit_creates_one_user"
description = "Double-activating the Add User submit control in quick succession creates exactly one user: the users count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "bulk_action_without_selection_noop"
description = "Running a bulk action with no rows checked changes no data: the bulk controls are disabled or act as a no-op, and every row, badge, and KPI stays the same"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "edit_form_prefilled_updates_everywhere"
description = "Choosing a row's Edit action opens the form prefilled with that user's existing data, and saving updates the row everywhere it appears (list row, badges, and any filtered view) without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "active_sidebar_item_tracks_view"
description = "After switching views via the sidebar (e.g. Operations Overview, then All Users, then a Roles/Permissions mode), the sidebar visibly marks the item matching the currently displayed view as active, and the previous item loses its active styling"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "all_users_kpi_filter_sort_bulk_pagination_chrome"
description = "The All Users view shows a KPI strip labeled Total / Active / Paying / Suspended whose cards each render a small inline trend chart, role and status filter controls, a sort control offering Last active, Newest, Highest spend, and Name A-Z, bulk action controls for Export, Change status, Change role, and Delete, and pagination chrome under the table"
type = "binary"
weight = 1.0


[[criterion]]
id = "1.44"
name = "user_field_contract_blocks_invalid"
description = "Submitting Add User with firstName longer than 40 characters, an email missing a domain dot, a temporaryPassword shorter than 8 characters, or notes longer than 280 characters shows a field-named inline error for the offending field, keeps submit blocked or rejects the add, and does not increase the users count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "closed_role_status_enums_only"
description = "Role and status controls on Add/Edit and bulk change only offer the closed enums Admin/Manager/Member/Viewer and Active/Invited/Suspended — no free-text role/status entry is available"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.57"
name = "optional_api_toggles_in_create_payload"
description = "Add User exposes sendInvitation, twoFactorEnabled, and productAccess as boolean toggles and Permissions checkboxes limited to the closed ids users.read, users.write, billing.view, products.manage, and settings.edit; a create with sendInvitation true yields an Invited user (unless status was explicitly set) and Directory JSON for that user reflects the chosen boolean/permission fields under the same names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.58"
name = "bulk_update_field_contract"
description = "Bulk Change status and Change role dialogs require a checkbox selection and only accept the closed status/role enums; submitting a valid bulk change updates every selected row's badge and Directory JSON field for that enum"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "command_palette_opens_and_navigates"
description = "Pressing Control+K or Meta+K, or activating the Command palette control, opens a command palette overlay; choosing All Users, Archive, or Operations Overview closes the palette and switches the main canvas to that view without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "command_palette_export_and_theme"
description = "From the command palette, choosing Export directory opens the export drawer, and choosing Toggle theme flips light/dark without a reload; Escape closes the palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "archive_vault_restore_round_trip"
description = "After archiving a user via Delete, Archive lists that user's name and email with a Restore action; choosing Restore returns the user to All Users, increases Total by one, and removes the row from Archive without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "user_logs_append_on_mutations"
description = "After creating a user, archiving a user, and changing a user's status, User Logs shows new top-of-list entries naming those actions and the target user email or display name — not a static seed-only decorative list that ignores the mutations"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "duplicate_user_creates_invited_copy"
description = "Choosing Duplicate on a row opens Add User prefilled from that user's payload with email cleared and status Invited; submitting with a new valid email adds exactly one new row and leaves the source row unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "directory_export_drawer_formats"
description = "Export directory (from header, overview Export, bulk Export, or command palette) opens an export drawer with tabs labeled Directory JSON and Users CSV, each showing a monospaced live preview plus Copy and Download actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "directory_json_schema_and_session_mutations"
description = "Directory JSON preview includes schemaVersion exactly pineapple-directory-v1, users, archive, activityLog, kpis, filters, sort, theme, and activeView; after creating a user with a distinctive email and archiving another user, the new email appears under users, the archived user appears under archive and not under users, and activityLog reflects the mutations before copy or download"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "users_csv_header_and_rows"
description = "Users CSV preview starts with the exact header firstName,lastName,email,phone,role,status,payments,products,lastActive and includes one data line per active user; after creating a user with a distinctive firstName, that firstName appears in a CSV data line before copy or download"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "export_import_directory_round_trip"
description = "After mutating the collection (create or edit at least one user and archive at least one user), importing the copied Directory JSON restores All Users names/statuses, Archive membership, KPI totals, and both export previews to the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.55"
name = "export_omits_session_mutations"
description = "After a create, edit, archive, restore, duplicate, or bulk change that is visible in the UI, the Directory JSON or Users CSV export preview still omits that session mutation (stale or seed-only export text)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.56"
name = "delete_permanently_erases_without_archive"
description = "Choosing Delete permanently erases the user with no Archive row and no way to Restore the record in the same session"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.59"
name = "users_csv_import_updates_collection"
description = "Importing pasted Users CSV text whose rows satisfy the UserCreate field names and enums merges or replaces the active users collection so All Users and the next Users CSV preview match the imported rows; CSV rows violating the enums or bounds show an inline error naming the field and leave the users count and Archive unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.60"
name = "exported_at_timestamp_regenerates"
description = "The Directory JSON exportedAt field is an ISO-8601 timestamp string that updates when the preview regenerates: after a further user mutation, reopening Export directory shows a newer exportedAt value than the earlier preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.catchall"
name = "core_features_catchall"
description = "The app exhibits a significant, browser-observable defect in core functionality that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
