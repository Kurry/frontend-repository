[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seed"
description = "Multi-facet round-trip: toggle theme, switch to All Users, create a user, archive another, open export drawer; then reload. Every facet coherently resets to the seeded baseline — seeded users restored, Archive empty, created user gone, default theme/view — never a mix of survived and reset state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_name_az_vs_highest_spend_reversal"
description = "Sort-reversal proof: apply Name A-Z and note order, then Highest spend; order changes by payments descending relative to Name A-Z; switching back restores alphabetical order, proving sort is derived from live data."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_preview_tracks_mutations"
description = "Derived-view sensitivity: create a user with a distinctive email then archive a different user; Directory JSON users/archive arrays and Users CSV change meaningfully to include/exclude those records rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_users_logs_archive_export"
description = "Cross-view echo: archive a user from All Users; Archive lists them, User Logs gains an archive entry, Total KPI decreases, and Directory JSON moves the record from users to archive — all without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure Total KPI immediately before and after a valid Add User submit; the delta is exactly +1 with no lagging counter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_emails_different_export_rows"
description = "Input-dependent output: create two users with different emails via the same Add User flow; All Users and both export previews show two distinct emails rather than identical outcomes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_duplicate_and_archive"
description = "Interleaved-flow integrity: start Duplicate on user A, switch to Archive view, restore or inspect, return and finish Duplicate submit for A with a new email — source A unchanged, new Invited user present, no corrupted Archive state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "archive_all_then_restore_repopulates"
description = "Edge-state round-trip: archive all active users (All Users empty state), then Restore one; Total becomes 1, that user appears in All Users and Directory JSON users, and leaves Archive."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_preserves_mutations"
description = "After create/edit plus archive, export Directory JSON and import it back — All Users names/statuses, Archive membership, KPI totals, and both export previews match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "request_body_fields_survive_export_import"
description = "Create a user with distinctive firstName/email, sendInvitation true, and a closed permission id; confirm Directory JSON users entry uses those request-body field names; export then import Directory JSON and confirm the restored user still carries sendInvitation and that permission id."
type = "binary"
weight = 1.0

