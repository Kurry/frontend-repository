[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"


[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_seed"
description = "Multi-facet round-trip: toggle theme, switch to All Users, create a user, archive another, open export drawer; then reload. Every facet coherently resets to the seeded baseline — seeded users restored, Archive empty, created user gone, default theme/view — never a mix of survived and reset state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_name_az_vs_highest_spend_reversal"
description = "Sort-reversal proof: apply Name A-Z and note order, then Highest spend; order changes by payments descending relative to Name A-Z; switching back restores alphabetical order, proving sort is derived from live data."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "export_preview_tracks_mutations"
description = "Derived-view sensitivity: create a user with a distinctive email then archive a different user; Directory JSON users/archive arrays and Users CSV change meaningfully to include/exclude those records rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_users_logs_archive_export"
description = "Cross-view echo: archive a user from All Users; Archive lists them, User Logs gains an archive entry, Total KPI decreases, and Directory JSON moves the record from users to archive — all without reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "create_count_delta_exact"
description = "Count-delta integrity: measure Total KPI immediately before and after a valid Add User submit; the delta is exactly +1 with no lagging counter."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_emails_different_export_rows"
description = "Input-dependent output: create two users with different emails via the same Add User flow; All Users and both export previews show two distinct emails rather than identical outcomes."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_duplicate_and_archive"
description = "Interleaved-flow integrity: start Duplicate on user A, switch to Archive view, restore or inspect, return and finish Duplicate submit for A with a new email — source A unchanged, new Invited user present, no corrupted Archive state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "archive_all_then_restore_repopulates"
description = "Edge-state round-trip: archive all active users (All Users empty state), then Restore one; Total becomes 1, that user appears in All Users and Directory JSON users, and leaves Archive."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_preserves_mutations"
description = "After create/edit plus archive, export Directory JSON and import it back — All Users names/statuses, Archive membership, KPI totals, and both export previews match the pre-export mutated state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_is_incoherent"
description = "After reload, some facets (theme, created user, Archive) survive while others reset, producing incoherent partial persistence in this in-memory genre."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n2"
name = "export_ignores_session_inputs"
description = "Directory JSON or Users CSV export preview renders identically regardless of create/archive/edit mutations visible in the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n3"
name = "different_emails_produce_identical_export"
description = "Creating users with different emails yields identical export preview rows or identical visible outcomes."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "14.n4"
name = "cross_view_state_is_stale"
description = "Archive, User Logs, KPIs, or export preview stay stale after All Users mutations until reload."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
