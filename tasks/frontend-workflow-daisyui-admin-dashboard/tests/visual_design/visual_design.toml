[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "mosaic_overview_dense_users_views"
description = "Operations Overview keeps an asymmetric 12-column mosaic with a primary inverse Revenue run rate card; Users views use dense admin tables/forms"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "badges_distinct_empty_state_visible"
description = "Role and status use distinct badge treatments; empty list state is visually present when the collection or filter result is empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "chart_accent_palette_radial_wash"
description = "Operations Overview chart cards use the teal/amber/sky/rose/orange accent palette and a soft radial accent wash sits on the main canvas"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "overview_flat_equal_width_stack"
description = "Lays out Operations Overview as a uniform equal-width single-column card stack with no mixed mosaic spans"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.5"
name = "card_surfaces_and_density_elements"
description = "Cards across the app show subtle layered shadows and hairline borders, and the views use dense admin building blocks — stat blocks, badges, progress and radial-progress indicators, tables, and list rows — rather than sparse plain panels"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.6"
name = "icon_family_avatars_header_chrome"
description = "One consistent line-style icon family appears across the sidebar, header, and tables; avatar images render locally without broken-image placeholders; the utility header shows a search pill and circular ghost icon buttons"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "responsive_drawer_breakpoints"
description = "At a large desktop viewport the drawer sidebar is open by default; after resizing to a small viewport a hamburger control appears and opens the sidebar as an overlay drawer"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "mobile_content_clips_or_overflows"
description = "At 375px viewport width, content clips, the page scrolls horizontally, or a wide data table overflows the viewport instead of scrolling within its own region"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.9"
name = "copy_capitalization_and_verb_labels"
description = "Headings, buttons, and menu items follow one consistent capitalization convention throughout the app, and action labels are specific verbs such as 'Add user', 'Export directory', and 'Restore' rather than generic labels where a specific one is possible"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.10"
name = "validation_and_empty_state_copy"
description = "Where the app renders validation messages they name the field and the fix, and where it renders empty states the copy explains what belongs in the region and how to add it"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.11"
name = "placeholder_text_in_shipped_ui"
description = "Placeholder text (lorem ipsum, 'TODO', 'asdf', or template variable names like '{{title}}') is visible anywhere in the shipped UI"
type = "binary"
weight = 1.0
negate = true


[[criterion]]
id = "3.12"
name = "export_drawer_and_command_palette_chrome"
description = "The export drawer shows Directory JSON and Users CSV tabs with a monospaced preview and Copy/Download actions; the command palette is a centered elevated overlay with a search field and scrollable command list; Archive rows use a quieter muted treatment distinct from active rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "export_drawer_missing_or_undifferentiated"
description = "The export drawer lacks format tabs, monospaced preview, or Copy/Download, or the command palette is indistinguishable from a plain text field with no command list"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "3.catchall"
name = "visual_design_catchall"
description = "The app exhibits a significant, browser-observable defect in visual design that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
