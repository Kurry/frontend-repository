[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "game_controls_keyboard_accessible"
description = "Start match, Flag Mode, Hint, Pause/Resume, Sound, Undo, Redo, Apply Scenario Change, Rematch, New match, Export Match, Export Archive, Import, Save Progress, and Resume Saved Match are reachable and operable with the keyboard alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "overlays_manage_focus"
description = "Round Result and Match Complete present as dialogs: they take focus when they open and return focus to game controls when play continues."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Ore, mine, flag, strike, and sound icons expose accessible names or text equivalents rather than being nameless images."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "turn_live_region"
description = "Turn changes are announced through a polite live region so the active side is conveyed without relying on color alone."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "setup_fields_labelled"
description = "The setup form fields playerName and difficulty have visible labels, and inline validation messages are associated with the fields they name."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "visible_focus_indicators"
description = "Every focused control shows a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "strike_counts_as_text"
description = "Strike counts are exposed as text, not only as filled icons."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "disabled_states_exposed"
description = "Disabled controls (Undo at root, Redo with no child, spent Hint, Save Progress with no match, Resume Saved Match with no checkpoint) are exposed as disabled rather than silently ignoring activation."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "history_state_readable"
description = "The History state region exposes its snapshot as readable text for assistive technology."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "export_import_keyboard_operable"
description = "Export Match, Export Archive, Import, Copy, Save Progress, and Resume Saved Match are keyboard operable with visible focus."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "keyboard_traps_in_overlays"
description = "Keyboard focus is trapped in Round Result or Match Complete with no way to reach Rematch, next round, or New match."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n2"
name = "turn_only_by_color"
description = "Whose turn it is is conveyed only by color with no text or live-region announcement."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n3"
name = "unlabelled_setup_fields"
description = "playerName or difficulty inputs lack visible labels."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n4"
name = "no_focus_indicator"
description = "Focused controls show no visible focus indicator."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.n5"
name = "disabled_controls_silently_ignored"
description = "Activating a disabled Undo, spent Hint, or Resume-without-checkpoint control is silently ignored without disabled semantics."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
