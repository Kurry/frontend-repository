[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_bound"
description = "Contract modules command-session-v1, browse-query-v1, and artifact-transfer-v1 are initialized and bound so webmcp_list_tools surfaces session_*, browse_*, and artifact_* tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui"
description = "Invoking session start/pause/resume/restart/stop and artifact export/import/copy produces the same visible state changes as the corresponding UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_ops"
description = "Exposed tools stay within declared session operations (start, pause, resume, restart, stop), browse destinations (game-board, stats, match-log, export-center), filters (difficulty), and artifact operations/formats (export/import/copy; match-json, match-archive-json) — no invented modules."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_automation_exercisable"
description = "webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool can exercise bound session, browse, and artifact operations without manual harness edits."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "session_operations_work"
description = "Session operations start, pause, resume, restart, and stop each change the visible match appropriately when invoked through WebMCP."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "artifact_ops_bound"
description = "Artifact operations export, import, and copy are bound and invoke the same export/import/copy handlers as the visible Export Match, Export Archive, Import, and Copy controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "destinations_and_filters_match"
description = "Browse destinations match Bindings exactly (game-board, stats, match-log, export-center) and the difficulty filter matches the declared filter binding."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "no_extra_undeclared_capabilities"
description = "No extra undeclared module routes or entity CRUD capabilities are exposed beyond the three mandated modules as bound."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_list_invoke_ok"
description = "webmcp_session_info returns usable session metadata, webmcp_list_tools lists the bound tools, and webmcp_invoke_tool returns structured results without errors for declared operations."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_init_without_harness_edits"
description = "MCP tools register from the app's own implementation of the module_spec + Bindings without requiring edits to /tests or the verifier harness."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "WebMCP session/browse/artifact tools are missing, unbound, or invoke as no-ops that leave the visible match/panel/export unchanged."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui"
description = "A WebMCP invoke updates tool output as success while the visible UI stays on a mismatched match state, panel, or export preview."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Tools expose undeclared destinations, session operations, or artifact formats beyond the Bindings list."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "The contract cannot be exercised from automation via webmcp_list_tools / webmcp_invoke_tool."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n5"
name = "artifact_returns_raw_blobs"
description = "Artifact tool results include raw file paths, blobs, or base64 artifact contents contrary to the artifact-transfer restrictions."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "The session or tool API returns errors or incomplete data for declared operations."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP relies on manual or undocumented test harness edits to appear functional."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n8"
name = "required_module_missing"
description = "command-session-v1, browse-query-v1, or artifact-transfer-v1 is declared but not implemented."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n9"
name = "mcp_stubbed_or_commented"
description = "The MCP interface is commented out or only stubbed."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "Bound tools fail basic list/invoke checks for the mandated modules."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
