[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "specific_control_verbs"
description = "Control labels use consistent capitalization and specific verbs (Start match, Apply Scenario Change, Rematch, Export Match, Save Progress, Resume Saved Match) rather than generic labels."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "rejection_messages_name_why"
description = "Rejection messages for illegal actions name what was attempted and why it is unavailable; import rejections name that the file is invalid."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "round_result_plain_language"
description = "The Round Result overlay states the winner and the reason in plain language."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "empty_states_explain_next_step"
description = "Stats and Match log empty states explain that no matches have been played yet and how to start one."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "no_lorem_placeholder"
description = "No placeholder or lorem text appears anywhere in the shipped UI."
type = "binary"
weight = 0.5

[[criterion]]
id = "15.n1"
name = "generic_or_missing_labels"
description = "Primary controls use generic labels like Submit/OK/Button or missing labels where Export Match or Save Progress is expected."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n2"
name = "opaque_error_copy"
description = "Illegal-action or import errors say only Invalid or Error without naming the field or reason."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "15.n3"
name = "lorem_or_placeholder_copy"
description = "Lorem ipsum or placeholder copy appears in Stats, Match log, or overlays."
type = "binary"
weight = 0.5
negate = true

[[criterion]]
id = "writing.catchall"
name = "writing_catchall"
description = "Where the app renders user-facing copy, a significant writing defect not covered by any other criterion in this file is present. If present, name it and cite evidence. If already covered — even partially — by another criterion, answer no here."
type = "binary"
weight = 0.5
negate = true
