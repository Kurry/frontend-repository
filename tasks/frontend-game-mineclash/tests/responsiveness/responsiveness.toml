[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "narrow_grid_scales_tappable"
description = "At a narrow viewport around 375px wide the grid scales down (roughly 28px minimum tiles) and stays tappable without horizontal scrolling, with score and strike panels stacking above the grid."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "narrow_no_horizontal_scroll"
description = "At 375px width the setup screen, HUD, history panel, overlays, Match log, export controls, and Stats view reflow to a single column without horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "desktop_layout_usable"
description = "At desktop widths around 1440px the board, score panels, history panel, and Match log remain fully usable without clipping primary controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "overlays_reflow_narrow"
description = "Round Result and Match Complete overlays remain readable and operable at 375px without clipped buttons."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "export_controls_reachable_narrow"
description = "Export Match, Export Archive, Import, Save Progress, and Resume Saved Match remain reachable at 375px without being pushed off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "narrow_horizontal_overflow"
description = "At 375px width primary game chrome requires horizontal scrolling or clips essential controls."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n2"
name = "tiles_untappable_narrow"
description = "At 375px width grid tiles are too small or overlapped to tap reliably."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n3"
name = "desktop_clips_hud"
description = "At 1440px the score panels, history panel, or turn banner clip or overlap unreadably."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "7.n4"
name = "overlay_buttons_unreachable_narrow"
description = "At 375px Rematch, New match, or Export Match on Match Complete cannot be reached."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable responsiveness defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
