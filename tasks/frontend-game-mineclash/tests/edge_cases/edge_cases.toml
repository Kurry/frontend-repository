[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "stats_empty_before_first_match"
description = "Before any match has been played, the Stats view shows the friendly No matches played yet message rather than blank or zero rows."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "setup_form_inline_validation"
description = "On setup, invalid playerName or missing difficulty shows inline per-field validation naming the field before submit, and Start match stays disabled until valid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "illegal_actions_name_why"
description = "Acting out of turn, revealing an already-revealed or flagged tile, using a hint past the limit, or revealing while paused is rejected with specific visible feedback naming why."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "save_and_copy_confirmations"
description = "Save Progress shows a Saved confirmation and Copy on an export shows a Copied confirmation; both are visible and transient."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "rival_thinking_indicator"
description = "During the Rival turn a visible Rival is thinking indicator is shown for the thinking delay rather than an instant silent jump."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_for_moves"
description = "After a reveal, flag, or hint, Undo is available to restore the prior board and scores; Undo at the history root is disabled."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "hint_limit_and_floor"
description = "The Hint control is disabled after 2 uses in the round; using a hint at a score below 3 floors the score at 0 rather than going negative."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "semantic_controls"
description = "Primary game controls (Start match, Flag Mode, Hint, Pause/Resume, Export Match, Save Progress) use semantic button/input elements rather than clickable bare divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "overlays_have_close_paths"
description = "Round Result and Match Complete overlays support continuing play (next round, Rematch, or New match) without trapping the player."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "match_progress_visible"
description = "During a best-of-3 match the current round number and round-win progress toward 2 wins are visible so the player can read match progress."
type = "binary"
weight = 1.0

