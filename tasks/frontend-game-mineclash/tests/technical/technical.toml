[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "stats_persist_after_refresh"
description = "After completing a match and refreshing the page, the Stats view still shows the exact previously recorded matches played, matches won, total ore mined, and best single-round score under the difficulty played, and the Match log still lists the committed match-result entry"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "sound_and_difficulty_persist"
description = "The Sound on/off setting and the remembered playerName and difficulty selection are restored to their prior values after a full page refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "rapid_reveal_stress_stable"
description = "Performing at least 25 rapid reveal-and-turn repetitions through the normal controls leaves an exact, consistent visible state with responsive controls and no blank screen, uncaught error, or sustained freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "illegal_actions_leave_state_intact"
description = "After attempting illegal or unavailable actions (acting out of turn, clicking an already-revealed tile, using a Hint past the limit, or clicking while paused), the score, strikes, board, and history remain exactly as they were before the attempts"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "keyboard_operable_visible_focus"
description = "Every button and toggle (Start match, Flag Mode, Hint, Pause/Resume, Sound, Undo, Redo, Apply Scenario Change, Rematch, New match, Export Match, Export Archive, Import, Save Progress, Resume Saved Match) is reachable and operable with the keyboard alone, and every focused control shows a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "overlays_take_and_return_focus"
description = "The Round Result overlay and Match Complete screen present as dialogs: they take focus when they open and return focus to the game controls when play continues"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.12"
name = "turn_and_strike_announced_as_text"
description = "Turn changes are announced through a polite live region so the active side is conveyed without relying on color alone, and strike counts are also exposed as text rather than only as filled icons"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.13"
name = "history_text_and_disabled_semantics"
description = "The 'History state' region exposes its snapshot as readable text, and disabled controls (Undo at the root, Redo with no child, a spent Hint) are exposed as disabled to assistive technology rather than silently ignoring activation"
type = "binary"
weight = 0.5

[[criterion]]
id = "2.14"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load, opening directly into the setup screen"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.16"
name = "responsive_during_rival_delay"
description = "The board, score panels, and history panel stay responsive during the Rival's thinking delay, queued Player input never fires during the Rival's turn, and a Rival move scheduled before a pause, undo, or round end never mutates the current round's state"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.18"
name = "checkpoint_survives_refresh"
description = "After Save Progress during a round and a full page refresh, Resume Saved Match is available and restores the checkpoint scores, strikes, turn, and visible board"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.19"
name = "import_rejects_invalid_payload"
description = "Importing malformed JSON or a match payload missing required fields shows a visible rejection and leaves Match log, Stats, and the live board unchanged"
type = "binary"
weight = 1.0

