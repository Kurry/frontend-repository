[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "dark_stone_theme_identity_colors"
description = "The interface uses the dark stone theme with amber ore accents, a sky-blue You panel, and a warm-orange Rival panel"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "active_panel_glow_in_identity_color"
description = "The active side's score panel is outlined and softly glows in that side's identity color while the other side's panel is muted"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.3"
name = "mine_tile_red_tinted_marking"
description = "A revealed mine tile is marked with a distinct mine icon and a red-tinted background that persists for the rest of the round"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "strike_states_visibly_distinct"
description = "Each side's row of 3 Strike icons shows a visibly distinct 0, 1, 2, and 3 state, with the 2-strike near-loss state in a warning color"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "grid_scales_and_stacks_at_375"
description = "At roughly a 375px-wide viewport the grid scales down to smaller tiles (roughly a 28px minimum) and stays tappable without horizontal scrolling while the score and strike panels stack above the grid"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.8"
name = "semantic_status_colors"
description = "Success green marks safe hints and round wins, warning yellow marks the 2-strike near-loss state and mine hints, and error red marks mine hits and round losses"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "sans_headings_mono_grid_numbers"
description = "Headings render in a sans-serif stack with an h1 near 30px and h2 near 22px over 16px sans-serif body text, while grid numbers, coordinates, and scores render in a monospace stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "radii_and_button_treatments"
description = "Grid tiles use a small (about 4px) corner radius, buttons about 8px, and panels about 12px; primary buttons (Start match, Rematch, Apply Scenario Change) are amber with near-black text and a soft drop shadow, while secondary buttons (Flag mode, Hint, Pause, New match) are transparent with an amber border and amber text and no shadow"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "consistent_icon_set"
description = "The ore, mine, flag, strike, sound, and empty-state icons share one consistent icon style with uniform stroke and weight, with no mismatched glyph styles across the app"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "stats_empty_state_composition"
description = "The Stats empty state shows an icon plus the heading 'No matches played yet' and an explanatory line telling the player how to start a match, rather than blank zero rows"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.13"
name = "control_labels_consistent_verbs"
description = "Control labels use one consistent capitalization convention and specific verbs (Start match, Apply Scenario Change, Rematch) rather than generic labels like Submit or OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "rejection_and_result_copy_clear"
description = "Rejection messages for illegal actions name what was attempted and why it is unavailable, and the Round Result overlay states the winner and the reason in plain language"
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "score_panels_show_label_target_strikes"
description = "During a round each of the two score panels (You and Rival) shows the side label, the live score displayed against the Target Score, and a row of 3 Strike icons"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "match_log_and_empty_state_chrome"
description = "The Match log shows playerName, difficulty, winner, and round-win counts on rows; its empty state shows a friendly heading and explanatory line rather than a blank region"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "copied_and_saved_confirmations"
description = "Copying an export shows a brief Copied confirmation and saving a checkpoint shows a brief Saved confirmation; both are visible and do not permanently block the board"
type = "binary"
weight = 0.5

