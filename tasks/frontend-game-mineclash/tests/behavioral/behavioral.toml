[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "persistence_multi_facet_reload"
description = "After completing a match, changing Sound, and setting playerName plus difficulty on setup, a full page refresh restores Stats figures, Match log entries, Sound state, and the remembered playerName and difficulty together — never a mix where some facets persist and others silently reset."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "match_log_order_proves_live_matches"
description = "Finish two matches with observably different winners or round-win counts. Open Match log and confirm both entries appear most-recent-first with distinct winner/round-win fields matching each match — not a single hardcoded row."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "score_and_strikes_derived_from_play"
description = "During a round, reveal a safe tile then a mine (or force mine via play). Confirm the You/Rival scores and strike icons change with those reveals — not an identical static HUD redraw regardless of play."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "match_complete_echoes_log_and_stats"
description = "Win a match (2 round wins). Without reload, confirm Match Complete, the new Match log top entry, and Stats for that difficulty all reflect the same match outcome and ore totals."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "score_and_strike_count_delta"
description = "Note the You score and filled strike count, then reveal one safe tile and (separately) one mine when available. Immediately after each action the score rises by the tile ore or drops by 5 (floored at 0) and strikes increase by exactly one on a mine — no off-by-one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_matches_different_exports"
description = "Complete two matches with different difficulties or different round outcomes and Export Match for each. Confirm the two JSON artifacts differ in difficulty, winner, or round wins in the ways the play dictates."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "pause_stats_interleave_preserves_round"
description = "Start a match, Pause mid-round (note scores and turn), open Stats then Match log then return to the board, and Resume. Confirm neither view switches nor the pause corrupted the frozen scores/turn; resume continues the same round."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_log_then_repopulate"
description = "With no prior matches, Match log and Stats show empty-state messaging; finish one match, then confirm Match log gains a top entry, Stats updates, and the empty state is gone."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n1"
name = "partial_persistence_incoherent"
description = "After finishing a match and reloading, Stats survive but Match log, Sound, or remembered playerName/difficulty silently revert (or the reverse), producing incoherent partial persistence."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n2"
name = "hud_ignores_reveal_inputs"
description = "Revealing safe tiles or mines leaves scores, strikes, and the turn banner identical regardless of those actions."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n3"
name = "different_matches_identical_exports"
description = "Repeating two finished matches with observably different outcomes yields byte-identical Export Match JSON that ignores the play."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n4"
name = "cross_view_stale_until_reload"
description = "After Match Complete, Match log or Stats stay stale until a full page reload rather than reflecting the new match immediately."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.9"
name = "export_reflects_different_play"
description = "Finish two matches with different play outcomes and export each via Export Match. Confirm the two JSON artifacts differ in winner, round wins, or totals in the ways the play dictates."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "save_resume_reload_round_trip"
description = "During a round after at least one reveal, Save Progress, reload, Resume Saved Match: scores, strikes, turn, hints remaining, and board match the pre-reload checkpoint while committed Stats and Match log facets also remain coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "import_export_match_round_trip"
description = "Export a finished match, note its playerName/difficulty/winner/round wins, import the match-json, and confirm Match log shows an entry matching those fields without inventing extra fabricated matches."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "rematch_resets_live_keeps_meta"
description = "From Match Complete, Rematch resets both sides to score 0 and 0 strikes for Round 1 at the same difficulty while prior Match log entries and Stats from earlier matches remain."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.n5"
name = "export_identical_across_different_play"
description = "Export Match produces byte-identical JSON for two finished matches that had observably different winners, difficulties, or round-win counts."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "14.n6"
name = "rematch_leaks_prior_scores"
description = "After Rematch from Match Complete, Round 1 still shows the previous match's live scores or strikes instead of resetting to 0."
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "behavioral.catchall"
name = "behavioral_catchall"
description = "The app exhibits a significant, browser-observable defect in behavioral or state-integrity flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
