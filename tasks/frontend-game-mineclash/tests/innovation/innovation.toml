[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "rival_thinking_polish"
description = "Beyond the required thinking delay, the Rival turn presents a polished waiting state that makes the duel feel competitive rather than a silent board swap."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "history_branch_clarity"
description = "The branching history panel makes branch points and the current node unusually clear for a puzzle duel, beyond a flat undo stack."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "match_export_preview_clarity"
description = "Export Match or Export Archive surfaces a readable preview of the match-result fields that helps the player verify the artifact before download/copy."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "strike_near_loss_emphasis"
description = "The 2-strike warning state is especially clear in the HUD so the near-loss moment is hard to miss."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "checkpoint_resume_affordance"
description = "Save Progress / Resume Saved Match present a clear checkpoint summary (playerName, difficulty, round, scores) that builds confidence before resume."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The build is purely barebones: Rival turns resolve as silent instant board flips with no thinking indicator, and Match Complete or export surfaces omit celebratory or confirmation polish entirely."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "11.n2"
name = "experience_is_generic_template"
description = "Interactions and visuals read as a generic unstyled template: You and Rival panels lack identity color treatment and the board reads as a plain unmarked grid rather than a dark stone mine-grid duel."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app includes a noteworthy, browser-observable enhancement beyond the specification that improves the duel, export, or resume experience and is NOT covered by any other criterion in this file. If present, name it and cite evidence. If nothing beyond the spec qualifies, answer no."
type = "binary"
weight = 0.5
