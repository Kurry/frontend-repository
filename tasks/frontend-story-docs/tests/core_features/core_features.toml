[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, Board mode shows at least 8 seeded scene cards with images and descriptions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After creating a scene titled 'Harbor Opening' with valid required fields, the text 'Harbor Opening' is visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After adding 3 new scenes on top of the seed set, the board shows exactly 3 more scenes than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After switching to Slide (Tutorial) mode, a single centered active scene is visible with navigation affordances"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After editing a scene description/title to 'Evening Cutaway', the text 'Evening Cutaway' is visible and the previous text is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After deleting a scene, that scene's title/description is no longer visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After deleting all scenes, an empty state is visible on the board"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After submitting create with an empty required title/description, the scenes count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After switching among Tile, List, and Slide view modes, the scene set re-layouts without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After advancing prev/next in Slide mode (when multiple scenes exist), the active scene index changes and the centered scene updates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When hovering scene cards, mode toggles, or header controls, a visible hover lift, wash, or shadow change appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "Welcome to Docs! is visible in the workspace chrome on load"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "On load, a left storyboard sidebar shows the active Getting Started row plus sibling storyboards with an Add Storyboard control and a Help footer control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "After opening a scene's kebab menu, edit and delete actions for that scene are available and operate on that scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "After clicking an inert control (a sidebar storyboard row, a header utility tool, or Help), a demo-only toast appears and the page does not navigate away"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Scenes collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Renders visible validation feedback when create is submitted with empty required fields, and the collection count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Scenes list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.22"
name = "1_22"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "A left storyboard sidebar lists the active Getting Started row plus sibling demo storyboards, with an Add Storyboard control and a footer Help control"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "The product header shows a logo mark, the Demo Projects project label, the 1. Getting Started storyboard title, a kebab menu, and utility tools (notifications bell, dashboard, account)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "Each scene card exposes a per-scene kebab menu offering edit and delete actions for that scene"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Inert non-navigational controls (sidebar storyboard rows, header utility tools, Add Storyboard, Help) surface a demo-only toast instead of navigating"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "Scene edit and delete are not reachable from a per-scene control; the scene kebab menu is decorative and triggers no edit or delete action"
type = "binary"
weight = 1.0
negate = true
