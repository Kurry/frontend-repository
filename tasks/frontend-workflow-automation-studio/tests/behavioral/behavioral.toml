[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_reset"
description = "Configure several facets — select a different script, add a step, enable a schedule, switch the console theme — then reload; every facet coherently resets to the seeded baseline (seeded scripts and runs, no schedules, default theme, empty undo history), never a mix of kept and reset state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "runs_ordering_derives_live"
description = "Complete two new runs and confirm the Runs view lists them newest first with distinct run numbers and timestamps; the ordering and totals recompute from live records rather than a fixed list"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_surfaces_input_sensitivity"
description = "Disable one step and re-run: the run record shows that step Skipped and the totals change accordingly; re-enable and run again and the totals change back, proving the rollup and report derive from live step state"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_to_export"
description = "Rename a script and edit a step parameter, then confirm without a reload that the library entry, the editor, and the Definition JSON preview all show the new values; complete a run and confirm the Run report totals equal the console rollup"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_exact_on_run"
description = "Measure the Runs view count and the library step count immediately before and after one run and one step add; each changes by exactly one with no lag"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_different_records"
description = "Run two scripts with different steps and compare their run records and Definition JSON: the records differ exactly in the ways the scripts differ, and two runs of one script differ in extracted values"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_edit_and_run"
description = "Start a run, switch to another script and edit it mid-run, then return: the run completed or continued correctly, the edit persisted on the other script, and neither flow corrupted the other"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_and_repopulate_round_trip"
description = "Delete every step from a script, confirm Run Script disables and the empty state shows, then undo repeatedly: the steps return in order, numbering and the Definition JSON track back exactly through the transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "full_pipeline_probe_to_export_text"
description = "Chain the full pipeline: create a script, add an Extract and an Assert Text step via the editor, pull a selector from the Playground into the Extract step, save a version, run to completion with at least one retry observed, enable a schedule and Trigger now, then open Export: the Definition JSON text contains the script name, both steps with their typed params, the version number, and the schedule interval, and the Run report contains the schedule-triggered run with its per-step outcomes and extracted value; copy the export and confirm the clipboard text equals the visible preview"
type = "binary"
weight = 1.0

