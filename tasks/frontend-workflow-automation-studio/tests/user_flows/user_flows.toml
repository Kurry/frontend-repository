[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "build_and_run_end_to_end"
description = "Creating a script, adding a Navigate, a Type, an Extract, and an Assert Text step with valid parameters, saving a version, and clicking Run Script highlights the steps in order, streams one console line per step, fills the extracted-values table, updates the rollup to n of m, writes one new record into the Runs view, and shows all four steps in the Definition JSON while the Run report shows the new run results — all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "invalid_forms_block_inline"
description = "Submitting New Script, a step parameter form, or the schedule form with missing or invalid required fields triggers immediate inline validation naming the field and changes no collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "failure_recovery_flow"
description = "When a step exhausts its retries the rollup failure count increases and the console shows the error reason; the step Retry control resumes from that step, pausing and resuming freezes and continues at the same step, and the event timeline records the retry, pause, and resume transitions in order"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "selector_to_step_flow"
description = "Pasting HTML into the Playground, typing a selector that highlights two matched elements with a match count of 2, and using Send to step writes that selector into the chosen step field, visible when the editor is reopened"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "diff_two_runs_flow"
description = "Running the same script twice produces two run records whose extracted values differ; selecting both and activating Compare highlights the changed values, and comparing a run with itself shows the no-differences state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "schedule_round_trip_flow"
description = "Enabling a schedule with a time and interval shows the clock badge in the sidebar and a countdown in the Scheduled queue; Trigger now produces a schedule-triggered run record in history and the Run report tab then reflects that run totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "undo_timeline_flow"
description = "Reordering two steps, deleting a third, then clicking the history timeline entry from before the delete restores the deleted step and its position while keeping the reorder"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "sidebar_collapse_continuity"
description = "At a narrow width the script library collapses behind a toggle and reopens as an overlay with the same entries, badges, and selection state, preserving workflow continuity"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "overlays_dismiss_cleanly"
description = "The New Script modal, screenshot modal, inline confirmations, and the palette all close via their cancel control and Escape, returning to the prior view state with no lost work outside the dismissed overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "flows_recover_without_reload"
description = "Every dead end is recoverable in-app: after deleting the selected script, emptying a script of steps, or closing the diff view, the user can continue working without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unreachable"
description = "Creating, editing, running, diffing, scheduling, or exporting cannot be completed from the UI alone"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "records_lost_or_duplicated"
description = "A completed run fails to appear in the Runs view or appears twice"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "flow_state_desyncs_views"
description = "Completing a flow leaves two surfaces disagreeing — for example the library step count contradicts the editor list"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "view_switch_loses_selection"
description = "Switching between editor, Playground, Runs, Scheduled queue, and Export loses the selected script or breaks layout"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "emptied_script_breaks_ui"
description = "Removing every step produces a broken or blank editor instead of the empty state naming Add Step"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "filtered_surfaces_disagree"
description = "The timeline status filter or the Runs list disagrees with the underlying run data visible elsewhere"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n7"
name = "collapsed_sidebar_stuck"
description = "The collapsed script library cannot be reopened"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n8"
name = "overlay_traps_user"
description = "A modal, confirmation, or the palette blocks interaction with no keyboard or click path to dismiss it"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n9"
name = "failed_action_silent"
description = "A failed or rejected action (invalid form, undo with empty stack, run on a script with no enabled steps) gives no visible feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n10"
name = "dead_end_requires_reload"
description = "Some navigation state can only be corrected by reloading the page"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
