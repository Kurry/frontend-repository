[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_to_mobile_adapts"
description = "The layout adapts gracefully from 1440px desktop to 375px mobile: sidebar, step editor, console, and panels reflow without breakage"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets"
description = "Primary controls (Run Script, step type selectors, bulk bar actions, palette rows) are tap targets of at least 44px on mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_scales"
description = "Typography remains readable at both desktop and mobile widths with no unreadably small text, including console text"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_viewport_clipping"
description = "No content clips or overflows the viewport at any width between 1440px and 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_collapses_at_768"
description = "At widths of 768 pixels and below the script library collapses behind a toggle control that opens it as an overlay; at desktop widths it is open by default"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "step_fields_wrap_at_narrow"
description = "The step editor inline parameter fields wrap or stack at narrow widths without losing any field"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "panes_scroll_in_containers"
description = "The console, diff view, and export preview size responsively and scroll within their own containers"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_page_scroll"
description = "At 375px width there is no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "stacking_order_logical"
description = "At narrow widths the editor stacks logically: script header, steps, console, panels in a sensible order"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_reachable"
description = "The toolbar, undo/redo, run controls, and view switcher remain accessible at every width"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "layout_breaks_at_breakpoints"
description = "The layout breaks or overflows at common breakpoints between 1440px and 375px"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "controls_unusable_on_mobile"
description = "Controls are too small or misaligned to use on mobile widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n3"
name = "unreadable_mobile_text"
description = "Text becomes too small to read at mobile widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n4"
name = "unnecessary_scrollbars_or_cropping"
description = "Content is cropped or unnecessary scrollbars appear at some widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n5"
name = "sidebar_missing_at_widths"
description = "The script library is missing or inoperable at some widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n6"
name = "fixed_elements_obscure_content"
description = "A fixed toolbar or overlay obscures the editor or console at narrow widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n7"
name = "overlap_at_any_size"
description = "Elements stack or overlap incorrectly at any viewport size"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n8"
name = "console_overflows_container"
description = "The console renders at a static size and overflows its container at narrow widths"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n9"
name = "bulk_bar_lost_on_mobile"
description = "A bulk actions bar or its actions disappear at mobile widths while items are selected"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n10"
name = "controls_vanish_at_sizes"
description = "Any specified control disappears entirely at specific viewport sizes"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
