[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, structured-editor-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, editor_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_script_studio_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse navigation, editor operations on scripts, steps, schedules, and the playground, session run controls, and artifact export/copy change the same script library, step editor, console, run history, and export panes the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/search/apply_filter/clear_filter over destinations step-editor, playground, runs, scheduled-queue, and export with filters timeline-status and compare-pair; editor select/add/delete/update_property/set_content/switch_mode/preview on script, step, schedule, and playground (modes edit, version-preview, diff); session start/pause/resume/restart plus demos script-run, trigger-now, save-version, and restore-version; artifact export/copy with formats definition-json and run-report-json — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_with_visible_postconditions"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed, and an invoked editor add of a script adds exactly one library entry with its step count and selects it, while delete (confirm=true) removes it from the library, run history, and schedule queue together."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_operations_update_visible_script_state"
description = "Declared editor operations on scripts, steps, schedules, and the playground all work: update_property edits (step-type, url, selector, text, variable, ms, expected-text, disabled, order, schedule fields, mock-html) are reflected in the visible step editor and in the Definition JSON export alongside disabled flags, version number, and schedule."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_run_controls_are_bound"
description = "Session operations are bound to the real run lifecycle: start highlights steps in sequence, streams console lines, fills the extracted-values table, updates the n-of-m rollup, and writes one run record into the Runs view; pause freezes at the current step and resume continues from exactly that step; save-version grows the Versions panel by one and restore copies the old steps into a new version."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_match_declared_set"
description = "Browse tools navigate only the declared destinations (step-editor, playground, runs, scheduled-queue, export) and filters (timeline-status, compare-pair), and visible navigation state updates through the same handlers as the UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no arbitrary URL or selector runner, step types stay inside {navigate, click, type, extract, wait, screenshot, assert_text}, and no export formats beyond definition-json and run-report-json."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, editor, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: step drag-to-reorder gestures, console streaming cadence, Ctrl+K palette mechanics, and undo/redo or history-timeline rollback are left to real UI interaction, and no tool returns Copy-export clipboard contents."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "automation_studio_tools_missing_or_noop"
description = "WebMCP tooling for scripts, steps, schedules, runs, or exports is unbound, missing, or a no-op that reports success while the library, step editor, console, or Runs view stays unchanged."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_run_ui"
description = "A tool handler bypasses the UI's logic: for example an invoked script-run demo reports completion while the per-step grid, console rollup, and Runs view record stay unchanged, or a schedule edit changes tool output but not the sidebar clock badge and Scheduled-queue countdown."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_routes_or_runner_exposed"
description = "Undeclared capabilities are exposed, such as arbitrary URL/selector destinations beyond the five declared ones, step types outside the seven-value enum, or a generic state setter."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "Declared tools error, hang, or demand raw DOM selectors instead of the declared binding arguments when invoked through webmcp_invoke_tool, so the contract cannot be exercised from automation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "script_bounds_bypassed_via_tools"
description = "A tool accepts values outside the declared bounds — a non-positive wait ms, an unparseable target-url, a schedule interval outside {hourly, daily, weekly}, an enabled schedule without a time, or a delete without confirm=true — leaving MCP-visible state inconsistent with the UI."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info, webmcp_list_tools, or webmcp_invoke_tool returns errors or incomplete data for the declared browse, editor, session, or artifact tools."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP registration or invocation relies on manual edits or undocumented hacks such as console flags or hidden query parameters."
type = "binary"
negate = true
weight = 0.5

[[criterion]]
id = "12.n8"
name = "declared_module_entirely_missing"
description = "One of the four declared modules (browse-query-v1, structured-editor-v1, command-session-v1, artifact-transfer-v1) is entirely unimplemented, with no tools registered under its prefix."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed: tools are listed but their handlers are empty or disconnected from the script, run, and schedule state."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "excluded_mechanics_faked_or_validation_fails"
description = "A WebMCP tool drives or fakes an excluded mechanic — replaying the step drag-reorder gesture, fabricating console stream output, or returning clipboard contents in tool results — or the build fails automated MCP contract validation."
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
