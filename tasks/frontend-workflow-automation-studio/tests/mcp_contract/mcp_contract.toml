[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "four_mandated_modules_bound"
description = "All four contract-mandated modules are initialized and bound: browse-query-v1, structured-editor-v1, command-session-v1, and artifact-transfer-v1, with tools discoverable via webmcp_list_tools under the browse_*, editor_*, session_*, and artifact_* prefixes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_script_studio_ui_logic"
description = "Exposed tool handlers call the same application logic as the visible UI: browse navigation, editor operations on scripts, steps, schedules, and the playground, session run controls, and artifact export/copy change the same script library, step editor, console, run history, and export panes the visible controls use."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_declared_ops_and_bindings"
description = "Only documented operations from the bindings are available: browse open/search/apply_filter/clear_filter over destinations step-editor, playground, runs, scheduled-queue, and export with filters timeline-status and compare-pair; editor select/add/delete/update_property/set_content/switch_mode/preview on script, step, schedule, and playground (modes edit, version-preview, diff); session start/pause/resume/restart plus demos script-run, trigger-now, save-version, and restore-version; artifact export/copy with formats definition-json and run-report-json — no invented routes."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_exercisable_with_visible_postconditions"
description = "The contract can be fully exercised via automation: webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool succeed, and an invoked editor add of a script adds exactly one library entry with its step count and selects it, while delete (confirm=true) removes it from the library, run history, and schedule queue together."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "editor_operations_update_visible_script_state"
description = "Declared editor operations on scripts, steps, schedules, and the playground all work: update_property edits (step-type, url, selector, text, variable, ms, expected-text, disabled, order, schedule fields, mock-html) are reflected in the visible step editor and in the Definition JSON export alongside disabled flags, version number, and schedule."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "session_run_controls_are_bound"
description = "Session operations are bound to the real run lifecycle: start highlights steps in sequence, streams console lines, fills the extracted-values table, updates the n-of-m rollup, and writes one run record into the Runs view; pause freezes at the current step and resume continues from exactly that step; save-version grows the Versions panel by one and restore copies the old steps into a new version."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "browse_destinations_match_declared_set"
description = "Browse tools navigate only the declared destinations (step-editor, playground, runs, scheduled-queue, export) and filters (timeline-status, compare-pair), and visible navigation state updates through the same handlers as the UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra or undeclared capabilities are exposed: no arbitrary URL or selector runner, step types stay inside {navigate, click, type, extract, wait, screenshot, assert_text}, and no export formats beyond definition-json and run-report-json."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool are correctly surfaced on the app page and return complete data for the bound browse, editor, session, and artifact tools."
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "init_clean_and_exclusions_honored"
description = "MCP initialization works on a plain page load without manual editing or harness changes, and tools stay inside the mechanics exclusions: step drag-to-reorder gestures, console streaming cadence, Ctrl+K palette mechanics, and undo/redo or history-timeline rollback are left to real UI interaction, and no tool returns Copy-export clipboard contents."
type = "binary"
weight = 1.0

