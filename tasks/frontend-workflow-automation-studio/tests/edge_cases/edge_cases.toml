[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "double_run_single_execution"
description = "Double-activating Run Script starts exactly one run: one set of step highlights, one new run record, and one rollup sequence"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "double_create_single_script"
description = "Double-activating the New Script Create control creates exactly one script"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "delete_selected_script_empty_state"
description = "Deleting the currently selected script clears the editor to an empty state with a message and a control to create or select a script"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "all_disabled_steps_run"
description = "Running a script whose steps are all disabled completes immediately showing every step Skipped and a run record with zero passes and zero failures"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "empty_stacks_disable_undo_redo"
description = "Undo with an empty stack and Redo with an empty redo stack are disabled and produce no console errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "invalid_wait_fails_gracefully"
description = "A Wait step with a non-numeric duration keeps its warning marker and the run treats it as failed validation rather than crashing; fixing the value clears the marker"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "stepless_script_state"
description = "Removing every step shows an empty-state message naming Add Step as the next action, and Run Script is disabled while the script has no enabled steps"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "timeline_filter_empty_state"
description = "Filtering the event timeline to a status with no entries shows an empty-state message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "jump_to_latest_visibility"
description = "The console jump-to-latest control appears only after scrolling away from the newest line and disappears once following resumes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "copy_matches_visible_preview"
description = "Copying the export mid-run copies exactly the text currently visible in the preview block"
type = "binary"
weight = 1.0

