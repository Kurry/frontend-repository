[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 1.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "all"

[[criterion]]
id = "1.1"
name = "render_draft_term_on_load"
description = "On load, the main canvas renders the Draft term `((λx. λy. x y) y)` with 7 expression nodes and 2 stable binders."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "capture_warning_on_drag"
description = "Dragging free argument VAR-ARG-Y across the BINDER-Y scope membrane visually triggers a capture risk warning (naïve capture ghost)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "fresh_name_wheel_alpha_preview"
description = "Detouring the drag to the fresh-name wheel and selecting `z` previews alpha-renamed labels and arcs before completing the beta substitution."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "beta_reduction_commits_subst"
description = "Confirming the substitution retires exactly APP-ROOT, ABS-X, VAR-X, and BINDER-X, mapping VAR-ARG-Y into the VAR-X slot."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "reconcile_named_and_de_bruijn"
description = "After beta reduction, the De Bruijn form correctly displays `(λ.(free:y 0))` while the named form displays `(λz.(y z))`."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "export_proof_artifact_zip"
description = "Export Proof downloads a valid 9-file ZIP artifact containing manifest.json, nodes.csv, bindings.csv, reduction-steps.csv, history.ndjson, capture-avoidance-proof.svg, reduction-report.md, lambda-project.schema.json, and lambda-project.json."
type = "binary"
weight = 1.0
