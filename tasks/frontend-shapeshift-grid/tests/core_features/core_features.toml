[judge]
judge = "claude-code"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "stagehand-webmcp"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@browserbasehq/stagehand@3.7.0",
  "mcp",
  "--env",
  "LOCAL",
  "--chrome-version",
  "151.0.7922.34",
  "--enable-webmcp",
  "--tools",
  "webmcp_session_info,webmcp_list_tools,webmcp_invoke_tool",
  "--disable-tools",
  "act,observe,extract,agent",
  "--cdp-port",
  "$WEBMCP_CDP_PORT",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "Every checklist-* criterion in this Core Features dimension passes during the agent verifier run"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "Saved boards collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "Renders visible validation feedback when create is submitted with empty required fields, and the collection count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "Saved boards list is static HTML only with no working create/edit/delete against shared state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.8"
name = "1_8"
description = "App chrome navigates via real outbound links to other origins instead of in-app view state"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "checklist-1"
name = "checklist_1"
description = "On load, Paint mode shows the canvas stage with the floating toolbar and brush/palette controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-2"
name = "checklist_2"
description = "On load (or after opening Gallery), at least 4 seeded saved boards are visible with names"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-3"
name = "checklist_3"
description = "After saving/creating a board named 'Harbor Signal' with a valid name, the text 'Harbor Signal' is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-4"
name = "checklist_4"
description = "After adding 3 new boards on top of the seed set, Gallery shows exactly 3 more items than the initial seeded count"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-5"
name = "checklist_5"
description = "After loading a seeded board from Gallery, the paint canvas cells update to that board's snapshot"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-6"
name = "checklist_6"
description = "After editing a board name to 'Evening Grid', the text 'Evening Grid' is visible and the previous name is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-7"
name = "checklist_7"
description = "After deleting a board, that board name is no longer visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-8"
name = "checklist_8"
description = "After deleting all boards, an empty state is visible in Gallery"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-9"
name = "checklist_9"
description = "After submitting save/create with an empty required board name, the boards count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-10"
name = "checklist_10"
description = "After filtering Gallery by a tag or favorites (with mixed items present), only matching boards remain visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-11"
name = "checklist_11"
description = "After switching between Paint and Gallery modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "checklist-12"
name = "checklist_12"
description = "When hovering toolbar buttons, swatches, or gallery rows, a visible hover wash or fill change appears"
type = "binary"
weight = 1.0
