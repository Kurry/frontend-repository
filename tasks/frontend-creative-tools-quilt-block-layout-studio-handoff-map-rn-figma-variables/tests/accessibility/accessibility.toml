[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]

[[criterion]]
id = "AC-08"
name = "alternate_input"
description = "Alternate input (keyboard and touch-equivalent controls) produces identical state with visible focus and live feedback."
type = "binary"
weight = 1.0

[[criterion]]
id = "AC-26"
name = "semantic_html"
description = "The application uses appropriate semantic HTML tags for core functionality and has good contrast."
type = "binary"
weight = 1.0
