[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/mcp/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the dashboard view shows an active identity nickname, a public key rendered as an npub1-prefixed string, and a masked private key surface (no raw dashboard/starter placeholder content)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "On load, the Identities view lists at least 2 seeded identity cards, each with a distinct npub"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "On load, localStorage holds persisted identities, active identity, permission grants, and theme under a single vault storage key"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "When the create-identity form is submitted with a label, a new identity card appears, the identity count increases by 1, and the new identity's npub differs from every existing identity's npub"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "When the create-identity form is submitted with an empty label, a visible validation message appears and the identity count does not increase"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "When the create-identity form is cancelled, no new identity is added and the form closes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After a newly created identity is added, it becomes the active identity and its data appears on the dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "When an application's permission toggle is switched for the active identity, only that application's grant for that identity changes; the other three applications' grants for the same identity remain as they were"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After switching the active identity to a second seeded identity, the dashboard's displayed npub changes to the second identity's own key"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After switching identities, the Permissions view shows the second identity's own grants, not the grants that were toggled while the first identity was active"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "When the reveal-key control is clicked, the masked nsec surface is replaced by a real nsec1-prefixed string for the active identity; clicking it again re-masks it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "The Audit log view lists at least one seeded entry on load and gains a new entry, shown first, after creating an identity, switching identities, or toggling a permission"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After reloading the page, the same identities (same npubs), the same active identity, and the same permission grants are restored"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When the theme control in Settings is clicked, the app surface switches between light and dark without a full page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "Hovering interactive chrome (nav items, buttons, identity cards, permission toggle) shows a visible hover feedback wash"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "Calling window.webmcp_list_tools() returns registered tools including an identity-create tool, an identity-select tool, and an application-permission toggle tool; invoking the toggle tool for the active identity and one named app changes that same toggle's visible state in the Permissions view"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "The initial view is a Nostr identity dashboard (active identity nickname, npub1 public key, masked nsec1 private key, per-app grant badges) rather than a generic starter or blank dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "At least 2 seeded identities are present on first load, each with its own distinct npub"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Submitting the create-identity form with a label adds a new identity card and increases the identity count by exactly 1"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "A newly created identity is generated with a keypair distinct from every existing identity's keypair"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "A newly created identity becomes the active identity immediately, reflected on the dashboard"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "Submitting the create-identity form with an empty label shows a visible validation message and does not add an identity"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "1_23"
description = "Selecting a different seeded identity via its Select control makes it the active identity everywhere it is displayed (dashboard key, permission badges, Permissions view)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Toggling one named application's (damus, snort, coracle, or iris) permission grant for the active identity changes only that application's grant for that identity, leaving the other three applications' grants for the same identity unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "After switching to a second identity, that identity's own permission grants are shown, never the grants belonging to a different identity (no cross-identity permission bleed)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "The Audit log view records identity creation, identity selection, and permission toggle actions with the newest entry listed first"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "1_27"
description = "No control anywhere in the app performs outbound navigation (no working external links, no window navigation away from the app)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "1_28"
description = "Deleting or archiving all identities is never possible in a way that leaves zero identities and an unusable dashboard (at least one identity always remains active)"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "1_29"
description = "The app is a static list of identity names with no working create/select/permission-toggle behavior (a non-interactive mock)"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "1.30"
name = "1_30"
description = "Cancelling the create-identity form still adds an identity, or leaves the collection changed"
type = "binary"
weight = 1.0
negate = true
