[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_operable"
description = "Every interactive control — search, filter, chips, table checkboxes, pin controls, toolbar buttons, legend entries, disclosure triggers, Undo, Redo, Export, Log usage, and command palette results — is reachable and operable with the keyboard alone, with a visible focus indicator"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "modals_trap_and_return_focus"
description = "Modals, the command palette, and the export panel trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "live_region_announcements"
description = "Alert toasts, new-event announcements, over-budget transitions, and successful import or copy confirmations are exposed through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "form_labels_and_field_errors"
description = "Form fields in the alert modal, log-usage modal, budget control, and import control have visible labels, and validation messages are associated with their fields so each message names the field it belongs to"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "headings_landmarks_present"
description = "The app uses a logical heading order and landmark regions (main, navigation or complementary for the sidebar) so assistive tech can orient across catalog, sidebar, and feed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "state_not_color_only"
description = "Free versus paid badges, over-budget state, and pin state are not conveyed by color alone; each carries a text label or icon cue"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.n1"
name = "controls_not_keyboard_reachable"
description = "Pin controls, Export, Log usage, Undo, or command palette results cannot be activated or reached via keyboard"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n2"
name = "focus_indicators_missing"
description = "Focus indicators are missing or obscured on toolbar buttons, table checkboxes, or form fields"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n3"
name = "modal_focus_not_trapped"
description = "While a modal, the command palette, or the export panel is open, Tab moves focus to controls behind the overlay"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "1.n4"
name = "errors_visual_only"
description = "Validation or import errors are visual only with no accessible association or live announcement"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "accessibility.catchall"
name = "accessibility_catchall"
description = "The app exhibits a significant, browser-observable defect in accessibility that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

