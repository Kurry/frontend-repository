[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "monitor_layout_composition"
description = "At 1440 pixel width the app composes as a full-width data table with a sticky header row that remains visible while the table body scrolls, and a cost sidebar docked to the right at approximately 280 pixels"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "badge_colors_consistent"
description = "Free badges render in green and paid badges in gray with the same treatment wherever they appear: the catalog table, the comparison modal, and the cost sidebar"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "cost_list_structure"
description = "The cost sidebar renders as structured rows with hairline dividers between entries, and the session total row is visually heavier (size or weight) than the per-model rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.4"
name = "chart_palette_matches_tokens"
description = "Pie chart slices use a consistent accent palette that visibly matches accent colors used elsewhere in the app (badges, chips, or controls) rather than arbitrary unrelated colors"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "type_hierarchy_clear"
description = "A clear typographic hierarchy is visible: the app title is larger than panel headings, which are larger than table body and event feed text, consistently across all surfaces"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.6"
name = "spacing_and_icons_consistent"
description = "Spacing follows one consistent rhythm across the toolbar, chips row, table, and sidebar with no crowded or orphaned regions, and one consistent icon set is used across toolbar, badges, feed, and disclosure triggers"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "control_states_distinct"
description = "Buttons, inputs, and chips show distinct default, hover, focus (visible ring), and disabled treatments, confirmed by inspecting computed styles while the state is active"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "visual_polish_rating"
description = "Rate the overall visual polish of the monitor: coherent palette, disciplined density in the table and sidebar, and a designed rather than default-template appearance"
type = "likert"
points = 5
weight = 0.5

[[criterion]]
id = "2.9"
name = "export_panel_designed_chrome"
description = "The export panel shows format tabs, a monospaced preview block, and Copy / Download / Import actions that match the app's surface and border language rather than unstyled browser defaults; currency values use one consistent dollar format across sidebar, feed, budget, and exports"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "over_budget_error_treatment"
description = "When over budget, the remaining-budget readout uses a 2 pixel error-colored border and an Over budget label that is not color-only"
type = "binary"
weight = 1.0

