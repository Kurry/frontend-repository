[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "monitoring_flow_live_rollups"
description = "Monitoring flow: start the simulation, wait for at least two usage events in the feed, and confirm the session total, affected models' subtotals, the pie chart, and the remaining-budget readout all change together without a reload; pause and confirm totals freeze"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "filtering_flow_combine_and_clear"
description = "Filtering flow: type a provider fragment into search, apply a provider filter, confirm both constraints combine and the shown-of-total count matches visible rows, then clear both and confirm the full seeded list returns exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "alert_flow_toast_respects_toggle"
description = "Alert flow: enable alerts with a valid minimum context window, trigger a refresh or simulation that flips a qualifying model to free, and confirm a toast names that model; disable alerts and confirm an equivalent transition produces no toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "comparison_flow_preserves_selection"
description = "Comparison flow: select three models by checkbox, open Compare, confirm all three appear side by side with catalog values including pinned state, close the modal, and confirm the three rows remain selected"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "drill_down_highlights_catalog_row"
description = "Drill-down flow: open a cost row's contributing-events list, activate one entry's model link, and confirm the catalog highlights that model's row in the same session without navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "manual_log_to_export_flow"
description = "Manual log to export: submit a valid Log usage event, confirm feed, rollups, pie chart, and remaining budget update together, open Export session, and confirm Session JSON usage_events and Usage CSV both contain that request_label and cost"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "undo_redo_round_trip_flow"
description = "Undo round trip: log a usage event, note the session total, Undo, confirm the event is gone and the total restores, Redo, confirm the event and total return"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "budget_breach_and_clear_flow"
description = "Budget breach: lower the session budget below the current session total and confirm the Over budget treatment appears; raise it above the total and confirm the treatment clears"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "pin_watchlist_export_flow"
description = "Pin watchlist: pin two models, activate the Pinned-only chip, confirm only those two rows remain, and confirm Session JSON pinned_models lists both names"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "export_import_round_trip_flow"
description = "Export then import round-trip: after a manual log plus at least one pin, Copy or Download Session JSON, Import that same JSON, and confirm feed labels, session total, pins, budget, and both export previews match the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "command_palette_export_jump"
description = "Command palette jump: open with Control-K or Command-K, type enough to match Export session, choose it, and land on the export panel with the palette closed"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.n1"
name = "primary_flows_unavailable_from_ui"
description = "Simulation, Log usage, Export session, or Compare cannot be completed from visible UI controls"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n2"
name = "export_import_desyncs_session"
description = "After a successful Session JSON import, the feed, session total, or pin watchlist disagree with the imported document or with each other"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n3"
name = "state_changes_desync_displays"
description = "A manual log or simulation event updates the feed but leaves the session total, pie chart, or remaining-budget readout stale until reload"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n4"
name = "undo_breaks_flow_continuity"
description = "Undo after a manual log leaves the UI in a broken state, disables further logging, or requires a reload to recover"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n5"
name = "overlay_blocks_navigation"
description = "The export panel, command palette, or a modal blocks navigation with no Escape or close path"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "6.n6"
name = "failed_flow_lacks_feedback"
description = "An invalid Log usage, budget, alert, or import submission provides no visible feedback"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "user_flows.catchall"
name = "user_flows_catchall"
description = "The app exhibits a significant, browser-observable defect in critical end-to-end user flows that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

