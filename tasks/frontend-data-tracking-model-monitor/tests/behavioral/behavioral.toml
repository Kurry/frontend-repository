[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_round_trip"
description = "Multi-facet round-trip: enable alerts, set a custom session budget, pin a model, log a usage event, and open the export panel, then reload. Because this is an in-memory good-app task, all facets coherently reset to the seeded baseline (seeded catalog and usage, alerts off, default budget, simulation paused, empty undo stacks) — never a mix of preserved and reset facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "sort_reversal_proves_live_data"
description = "Compare selection proof: select two models, open Compare and note their order, deselect and select a different pair, reopen Compare; the modal shows the newly selected pair's catalog values rather than the prior pair, proving comparison derives from live selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "derived_view_responds_to_input"
description = "Derived-view sensitivity: submit two Log usage events with different prompt_tokens or models and confirm the session total, the affected per-model subtotals, the pie chart, and the remaining-budget readout all change by the amounts those inputs dictate rather than redrawing identically"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "cross_view_echo_without_reload"
description = "Cross-view echo: log a usage event and confirm the same cost appears in the event feed, the cost sidebar row, the pie chart share, and the Session JSON usage_events preview without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "count_delta_is_exact"
description = "Count-delta integrity: measure total request count and the affected model's request count immediately before and after a successful Log usage submit; each increases by exactly one"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_inputs_change_outcomes"
description = "Input-dependent output: log two usage events with different request_label values and different prompt_tokens; the feed shows both distinct labels and the session total differs by the two computed costs"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flows_preserve_state"
description = "Interleaved-flow integrity: start Log usage, open the command palette and jump to the cost sidebar, finish submitting the log, then open Export; the new event is present in rollups and in the export preview, and palette navigation did not drop the draft or double-submit"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_to_repopulated_round_trip"
description = "Edge-state round-trip: toggle every pie legend entry off to the empty chart state, then re-enable models or append a usage event so slices return; totals and the chart track through both transitions"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_contains_session_work"
description = "Full-pipeline export probe: pin a model, log a usage event with a unique request_label, open Export session, and confirm Session JSON pinned_models includes the pin and usage_events includes that request_label and cost, and Usage CSV contains the same label"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "import_export_round_trip_probe"
description = "Import/export round-trip probe: after mutating pins and logging usage, export Session JSON, import it, and confirm visible feed labels, session total, pins, budget, and both export previews match the imported document"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_probe"
description = "Undo round-trip probe: log a usage event, note session total and feed length, Undo, confirm both restore to prior values, Redo, confirm both return to the post-log values"
type = "binary"
weight = 1.0

