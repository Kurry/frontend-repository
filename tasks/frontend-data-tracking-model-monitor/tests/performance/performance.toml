[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_during_exercise"
description = "No console errors or warnings appear on load or during a full exercise of the app, including a running simulation, export regeneration, and import"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "simulation_stays_responsive"
description = "The table, feed, and chart stay responsive while the simulation is running; rapid repeated filtering during an active simulation causes no hangs or dropped interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "export_recompile_stays_responsive"
description = "Opening Export session regenerates Session JSON and Usage CSV from live state without freezing the UI for more than a brief moment; rapid log-then-reopen cycles stay responsive"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "ui_hangs_under_simulation"
description = "While the simulation is running, filtering, pinning, or opening export hangs or drops interactions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "export_freezes_ui"
description = "Opening Export session freezes the UI for a prolonged period with a stalled or blank export preview"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

