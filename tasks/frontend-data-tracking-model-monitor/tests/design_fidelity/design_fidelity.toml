[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_and_sizing_follow_scale"
description = "Spacing and sizing across the toolbar, catalog table, cost sidebar, and export panel follow one consistent scale with no arbitrary one-off gaps visible in computed styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the instruction hierarchy: app title larger than panel headings, which are larger than table body and event feed text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_monitor_composition"
description = "Layout matches the specified monitor composition: sticky-header catalog table, 280 pixel docked cost sidebar on desktop, and designed export panel with monospaced preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Transitions are applied to the state changes the instruction calls out: refresh row enter/depart, feed slide-in, modal and export panel enter/exit, disclosure expand, and toast dismiss"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_spec"
description = "Responsive behavior matches the instruction: sidebar collapses at 768 pixels and below; at 375 pixels the table scrolls in-container without page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "control_styling_matches_spec"
description = "Buttons, inputs, chips, and badges show the specified default, hover, focus, and disabled treatments consistently across catalog and export chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "badge_and_budget_treatments_match"
description = "Free/paid badge colors and the over-budget 2 pixel error border treatment match the visual_design lines across table, comparison modal, and budget readout"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.n1"
name = "layout_diverges_from_spec"
description = "The desktop layout lacks a docked cost sidebar or sticky table header, diverging from the specified composition"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "3.n2"
name = "export_chrome_unstyled"
description = "The export panel uses unstyled browser defaults that break visual continuity with the rest of the monitor"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "design_fidelity.catchall"
name = "design_fidelity_catchall"
description = "The app exhibits a significant, browser-observable defect in design fidelity to the instruction that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

