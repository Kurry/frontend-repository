[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "alert_invalid_context_rejected"
description = "Submitting the alert configuration form with a negative or non-numeric context window value shows an inline message naming the field and saves nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "log_usage_invalid_fields_rejected"
description = "Submitting Log usage with a model name absent from the catalog, an empty request label, or negative tokens shows inline messages naming each invalid field and appends nothing"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "budget_invalid_values_rejected"
description = "Submitting a session budget of 0, a negative number, or a value with more than 2 decimal places shows an inline message naming the budget field and leaves the prior ceiling unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "legend_all_off_empty_chart"
description = "Toggling every model off via the chart legend shows a designed empty chart state rather than a broken or blank chart"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "double_refresh_coherent"
description = "Rapidly clicking Refresh twice runs a single coherent refresh with no duplicate rows and a shown-of-total count consistent with visible rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "removed_model_dropped_from_selection"
description = "A model removed by refresh while selected for comparison is dropped from the selection; Compare disables if fewer than two selections remain"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "import_malformed_rejected"
description = "Importing malformed Session JSON or a document that omits schema_version routing-session-report-v1 or required arrays shows an inline error naming the import field, leaves the session total and feed unchanged, and does not clear undo history as if the import succeeded"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "undo_disabled_is_noop"
description = "With Undo disabled (nothing to undo), activating Undo changes no session state; after one undo, Redo restores exactly the prior step"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "export_seeded_state_valid"
description = "Opening Export session before any in-session mutations still produces valid Session JSON and Usage CSV for the seeded catalog and seeded usage; the panel never shows an empty or broken region"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_log_submit_once"
description = "Double-activating a valid Log usage submit appends exactly one event"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.n1"
name = "empty_collection_has_no_feedback"
description = "When filters match zero models or the feed has no events, the region shows nothing and provides no empty-state guidance"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n2"
name = "errors_only_reach_console"
description = "Validation or import errors are surfaced only in the browser console"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n3"
name = "actions_lack_visible_feedback"
description = "Log usage, export copy, or import actions lack visible feedback and silently succeed or fail"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n4"
name = "validation_feedback_missing_or_delayed"
description = "Alert, budget, log-usage, or import validation feedback is missing or delayed with no UI indication"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "4.n5"
name = "malformed_import_mutates_session"
description = "A malformed Session JSON import still mutates the feed, pins, or session total"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "edge_cases.catchall"
name = "edge_cases_catchall"
description = "The app exhibits a significant, browser-observable defect in edge-case UX and feedback that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

