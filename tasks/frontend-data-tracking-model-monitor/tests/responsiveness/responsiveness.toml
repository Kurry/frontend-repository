[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_sidebar_docked"
description = "At desktop widths the cost sidebar is docked at approximately 280 pixels beside the catalog table"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tablet_sidebar_collapses"
description = "At widths of 768 pixels and below the sidebar collapses into a toggleable panel reachable from a toolbar control"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "mobile_no_page_overflow"
description = "At 375 pixel width no content clips or overflows the viewport and no page-level horizontal scrolling appears; the data table scrolls within its own container"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "export_reachable_at_375"
description = "At 375 pixel width the Export session panel, format tabs, and Copy / Download / Import controls remain reachable and operable without page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "command_palette_usable_narrow"
description = "At 375 pixel width the command palette opens, accepts typed search, and choosing a result still navigates without layout breakage"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.n1"
name = "narrow_viewport_clips_controls"
description = "At 375 pixel width toolbar controls, the budget readout, or export actions are clipped or unreachable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "7.n2"
name = "page_level_horizontal_scroll"
description = "At 375 or 768 pixel width, page-level horizontal scrolling appears"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "responsiveness.catchall"
name = "responsiveness_catchall"
description = "The app exhibits a significant, browser-observable defect in responsive layout that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0

