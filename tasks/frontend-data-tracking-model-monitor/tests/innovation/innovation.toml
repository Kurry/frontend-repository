[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "optional_routing_insights_beyond_spec"
description = "Optional: beyond the required catalog, budget, and export surfaces, the app offers an extra routing insight such as a cheapest-eligible-model suggestion for the current alert minimum context window or a live cost-per-request sparkline"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "optional_keyboard_power_user_depth"
description = "Optional: beyond the required command palette, the app adds further keyboard power-user depth such as jumplist recent models or chord shortcuts for pin and compare"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "optional_export_diff_preview"
description = "Optional: the export panel shows a compact diff or change summary of what changed since seed before download"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "optional_budget_burn_projection"
description = "Optional: beyond the required remaining-budget readout, the app projects session burn rate or time-to-exhaustion while the simulation is running"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "optional_provider_health_affordance"
description = "Optional: provider rows or chips show a simulated health or latency cue that is not required by the core features"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.n1"
name = "innovation_breaks_core_flows"
description = "An optional enhancement beyond the spec breaks a required flow such as Log usage, Export session, or Undo so the core monitor becomes unusable"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "Optional: the app shows an additional browser-observable innovation that clearly goes beyond the written specification and is NOT covered by any other criterion in this file. If present, name it and cite the concrete evidence. If nothing beyond the spec is present, answer no."
type = "binary"
weight = 1.0

