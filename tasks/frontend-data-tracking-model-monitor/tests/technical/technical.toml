[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "cold_load_interactive"
description = "The app serves from its documented start path and is interactive (table rendered, controls responding) within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "console_clean_full_exercise"
description = "No console errors, warnings, or unhandled promise rejections appear on load or during a full exercise of the app, including a running simulation, export regeneration, and import"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "state_coherence_across_surfaces"
description = "A single simulated or manually logged usage event updates the event feed, the affected model's sidebar row, the session totals, the pie chart, and the remaining-budget readout in the same interaction; no surface shows a stale value another surface already updated"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "reload_restores_seeded_baseline"
description = "After exercising the app (simulation events, a refresh, filters, alert changes, budget edit, pin toggle, manual log), a page reload returns it to the seeded baseline: the seeded catalog and session usage, alerts off, default session budget, simulation paused, and empty undo/redo stacks"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "input_dependent_simulation"
description = "Triggering the refresh and the usage simulation on two separate occasions produces visibly different results (different models affected, different event values), proving the simulated outcomes derive from live logic rather than one hardcoded script"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "responsive_under_rapid_input"
description = "Rapid repeated filtering, chip clicks, selection changes, and export reopen while the simulation is running cause no hangs, dropped interactions, or desynced counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "export_import_schemas_coherent"
description = "Exported Session JSON field names and enums (pricing_tier free|paid, usage event keys, alert_config, session_budget_usd) match the same contracts the Log usage and alert forms enforce, so a valid export can round-trip through Import"
type = "binary"
weight = 1.0

