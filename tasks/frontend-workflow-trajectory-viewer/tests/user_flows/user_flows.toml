[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "open_trial_end_to_end"
description = "Comparing and opening a trial end to end: open a task from the catalog, sort its trial table by reward descending, click the top row, watch the ingest checklist complete, and land in the viewer with step 1 active and the header showing that trial's model, reward, outcome, and duration"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "scrub_inspect_files_flow"
description = "Scrubbing and inspecting files: drag the scrubber to a mid-trial step, confirm the file tree badges reflect only changes up to that step, select a badged code file and see it rendered with coloring and a working copy control, then advance one step and see any new change badge appear"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "annotate_and_return_flow"
description = "Annotating and returning: activate a late step, attach a note to it, navigate back to an early step, then click the note in the annotations list and land back on the annotated step with all three panes in sync"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "classify_failure_flow"
description = "Classifying a failure: submit the classification form with fields missing and see per-field messages, correct every field using the declared enum values, submit, and see the report card with implicated-step links that jump the viewer when clicked"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "timeline_filter_flow"
description = "Filtering the timeline: choose the tool-call step-type filter, confirm only tool-call steps remain, activate one, then clear the filter and confirm the full ordered timeline returns with the same step still active when it is still in range"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "command_palette_jump_flow"
description = "Command palette jump: press Ctrl+K or Cmd+K, type part of a step summary, activate the match, and land on that step with timeline, workspace, and detail in sync"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "export_closes_the_loop"
description = "Export closes the loop: after annotating at least one step and submitting a valid classification, open the Export panel, confirm Review JSON shows schemaVersion exactly trajectory-viewer.review-package.v1 and carries the exact values just entered, copy it with visible confirmation, then Undo the classification and confirm the preview's failure_report becomes null while annotations remain until undone"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "import_round_trip_flow"
description = "Import round trip: export Review JSON for a trial with annotations and a report, clear the annotations and report, import that JSON, and confirm the annotations list and report card match the imported values"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "reload_returns_seeded_state"
description = "A page reload returns the app to its seeded state: the task catalog with 3 tasks, no annotations, no classification reports, empty undo history, and a default export preview with empty annotations and a null failure_report"
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "invalid_create_shows_inline_validation"
description = "Invalid note or classification submission triggers immediate inline validation naming the offending fields and changes no review state"
type = "binary"
weight = 1.0

