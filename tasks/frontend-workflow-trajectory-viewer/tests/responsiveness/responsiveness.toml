[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_desktop_to_mobile"
description = "At 1440px the three-pane trial viewer is visible; at 1024px and below it collapses to the tabbed timeline/workspace/detail arrangement; at 375px the app remains usable without page-level horizontal scroll"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_are_large_enough"
description = "Timeline tabs, filter controls, undo/redo, export tabs, and primary buttons remain usable tap targets on a 375px viewport"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_resizes_across_breakpoints"
description = "Page titles, section headings, and body/label text remain legible and hierarchically distinct from 1440px down to 375px"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "content_avoids_clipping_and_overflow"
description = "At 375px, content never clips or overflows the viewport; code blocks, the terminal, and the export preview scroll horizontally within their own containers if needed"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "chrome_adapts_to_small_screens"
description = "At 1024px and below the three panes become switchable tabs and the active step stays consistent across tab switches"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "stacking_reflows_logically"
description = "At narrow widths the catalog, task page, and viewer reflow into a single-column stack without overlapping controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "palette_usable_on_mobile"
description = "At 375px the command palette overlay fits the viewport, the search field stays reachable, and results scroll within the overlay"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "At 375px there is no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "media_and_previews_resize"
description = "Images in the file workspace and the export preview size responsively to fit their containers at desktop and mobile widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Header undo/redo, export entry, and palette triggers remain reachable at all specified widths"
type = "binary"
weight = 1.0

