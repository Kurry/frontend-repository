[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  # Chromium's --force-prefers-reduced-motion is silently ignored on current
  # builds; real emulation happens at the MCP context level (reducedMotion:
  # "reduce" flips both matchMedia and CSS @media evaluation).
  "--config",
  "/tests/playwright_rm_config.json",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "seeded_catalog_and_task_page"
description = "On load, the task catalog lists exactly 3 seeded benchmark tasks, each showing a task name, a one-line description, a trial count of 3, and a best-reward value; selecting a task opens its page with the instruction text rendered as formatted rich text, a config summary panel, a reference environment file tree, and a test listing with at least 3 named tests"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "trial_table_columns_complete"
description = "The task page lists all 3 of that task's trials in a comparison table whose columns include model (fictional model names, no real vendor or product names), reward shown as a number between 0 and 1 with two decimals, a pass or fail outcome, duration, and step count"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "reward_sort_reversal"
description = "Scripted probe: click the reward column header and note the row order, then click it again; the second order is the reverse of the first relative to the reward values, proving the sort derives from live data rather than fixed markup"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "filesystem_toggle_swaps_tree"
description = "Activating the two-position toggle above the file tree swaps the visible tree between the reference filesystem and the selected trial's final agent filesystem without a full page reload, the two trees differ in content, and the active side is visibly indicated at all times"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "ingest_checklist_then_viewer_header"
description = "Clicking a trial row first shows a simulated ingest checklist of at least 4 items that tick complete one by one with per-item status icons and an overall progress indicator, then opens the trial viewer whose header strip shows that trial's model name, reward, pass or fail badge, and duration matching its table row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "timeline_mixed_step_types"
description = "The trial timeline lists at least 12 ordered steps, includes at least one reasoning, one tool call, one observation, one terminal output, and one screenshot step, and each entry shows a step index, a type glyph, a one-line summary, a timestamp, and a status marker; in the trial seeded with a failed step, that step shows an error status in the timeline and an error-styled output in its tool invocation panel while the viewer remains fully functional"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "click_step_syncs_all_panes"
description = "Clicking any timeline entry highlights that entry as active and updates both the center file workspace and the right rail step detail to that step's content in the same interaction, without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "keyboard_and_scrubber_navigation"
description = "With the timeline focused, pressing the arrow keys moves the active step to the previous or next visible step with the newly active entry scrolled into view and the other panes following; dragging the scrubber updates the active step continuously while the handle moves, not only on release"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "badge_accumulation_probe"
description = "Scripted probe: activate an early step and record which files carry Added/Modified/Deleted/Truncated badges, advance several steps and confirm badges accumulate for newly changed files, then step backward and confirm the badge set recomputes so it reflects only changes at or before the now-active step"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "file_renderers_by_type"
description = "Selecting files in the tree renders each by type: a markdown file as formatted rich text (headings/lists, not raw markup), a code file in a monospaced block with syntax-aware coloring, a visible language label, and a copy control that shows visible confirmation and places the exact text on the clipboard, an image file scaled to fit its pane, and a tabular data file as a grid with column headers; a file badged Deleted shows a deleted-file notice instead of stale content"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "terminal_streaming_and_follow"
description = "Activating a step with terminal output renders the output progressively (text appears incrementally) with a status affordance distinguishing streaming from complete; while streaming, the panel auto-follows the latest line, scrolling up pauses following and reveals a jump-to-latest control, and activating that control resumes following"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "annotation_round_trip_probe"
description = "Scripted probe: activate a late step, submit a note through the annotate control, confirm the note appears immediately in the annotations list with that step's index, navigate to an early step, click the note, and confirm the timeline highlight, center workspace, and right rail all jump to the annotated step; the note's remove control then deletes exactly that note"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "forms_inline_validation"
description = "Submitting the note form with empty note_text or text longer than 500 characters shows an inline message naming note_text and attaches nothing; submitting the classification form with any select unset, evidence outside 20–2000 characters, or no implicated steps shows inline per-field messages naming each invalid field and creates no report card"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "classification_report_links_jump"
description = "Submitting a valid failure classification using the declared enums (stage in planning/tool-use/verification/recovery; root_cause in wrong-tool/missing-context/hallucinated-path/timeout; behavior in loops/abandons/invents-files/ignores-errors; impact in score-zero/partial-credit/flaky-pass/false-pass) renders a report card showing all four chosen classifications, the evidence text, and one link per implicated step; clicking an implicated-step link jumps the viewer to that step, and re-submitting the form updates the existing card in place"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "reasoning_disclosure_remembers_state"
description = "The reasoning region on a step is collapsed by default, expands and collapses on activation, and after expanding it on one step, navigating away and back shows that step's reasoning still expanded while other steps remain collapsed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "step_type_filter_narrows_timeline"
description = "The step-type filter above the timeline offers All plus reasoning, tool-call, observation, terminal, and screenshot; activating tool-call narrows the visible timeline to tool-call steps only, and choosing All restores the full ordered list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "command_palette_jumps_to_step"
description = "Pressing Ctrl+K or Cmd+K opens a command palette with search focused; typing part of a step summary on the open trial narrows results, and activating a step result makes that step active with timeline, workspace, and detail in sync; Escape closes the palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "undo_redo_review_edits"
description = "After adding an annotation and submitting a classification, Undo restores the prior report and annotation state across the annotations list, report card, and export preview; Redo reapplies them; Undo and Redo disable when their stacks are empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "review_package_export_reflects_session"
description = "After annotating at least one step and submitting a valid classification, the Export panel Review JSON preview shows schemaVersion exactly trajectory-viewer.review-package.v1 and contains the exact note_text, step_index, stage, root_cause, behavior, impact, evidence, and implicated_steps just entered under the required keys schemaVersion, exportedAt, trial_id, task_id, model, reward, outcome, duration, step_count, annotations, and failure_report; Copy export puts that exact preview text on the clipboard with visible confirmation, and Download export yields a file matching the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "review_package_import_round_trip"
description = "Exporting Review JSON for a trial with annotations and a report, clearing those session edits, then importing that JSON via Import review package reconstructs the annotations list and report card to match the imported payload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "annotation_edit_updates_in_place"
description = "Editing an existing annotation's note_text through its edit control updates that entry in place in the annotations list and in the export preview, leaving other notes unchanged"
type = "binary"
weight = 1.0

