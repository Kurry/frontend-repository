[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "delightful_microinteractions"
description = "Where the build goes beyond the spec, it adds unique, delightful microinteractions — for example a flourish when a review package first becomes non-empty"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.2"
name = "advanced_motion_mechanics"
description = "Where present beyond the spec, advanced animation mechanics (choreographed pane transitions, staggered badge updates) elevate the viewer's motion language"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.3"
name = "guided_onboarding_or_shortcuts"
description = "Where present, a guided first-run tour of annotate-classify-export or an on-screen shortcut reference for the command palette goes beyond the specification"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.4"
name = "step_bookmark_strip"
description = "Where present, a step bookmark strip that lets reviewers pin and jump between bookmarked steps goes beyond the required annotation list"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.5"
name = "before_after_file_diff"
description = "Where present, a side-by-side before and after file diff for Modified badges goes beyond the required single-file renderer"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.6"
name = "preference_personalization"
description = "Where present, a configurable density or theme mode beyond the base requirement personalizes the workspace"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.7"
name = "polished_product_narrative"
description = "Where present, the viewer carries a polished product identity — cohesive naming and purposeful empty states that make the review-package story legible"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.8"
name = "keyboard_driven_annotation"
description = "Where present, keyboard-driven annotation entry from the timeline goes beyond the required annotate control"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.9"
name = "platform_features_where_apt"
description = "Where the genre allows, web platform features (rich clipboard export, print-friendly markdown report) are used to genuine benefit"
type = "binary"
weight = 1.0

[[criterion]]
id = "11.10"
name = "competition_level_innovation"
description = "Competition-level innovation beyond the specification is visible to users"
type = "binary"
weight = 1.0


[[criterion]]
id = "11.n1"
name = "demo_is_bare_spec_only"
description = "The build is purely spec-compliant, barebones, and unenhanced beyond the required review-package surfaces"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "11.n2"
name = "experience_is_generic_or_copied"
description = "Interactions and visuals are generic, templated, or copied with no trajectory-viewer identity"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable enhancement beyond the spec that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
