[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All panes derive from one shared state: changing the active step from any control (timeline click, arrow keys, scrubber, annotation link, report link, command palette) updates the timeline highlight, file tree badges, and right rail together in one interaction, and an added, edited, or removed annotation plus a classification submit update the annotations list, report card, and export preview immediately without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after opening trials, scrubbing, annotating, classifying, exporting, and undoing, and a page reload returns the app to its seeded state — the 3-task catalog with no annotations, no classification reports, empty undo history, and a default export preview with empty annotations and a null failure_report"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "The console is free of errors and warnings on load and stays clean after opening tasks and trials, scrubbing the timeline, streaming terminal output, filtering steps, using the command palette, annotating, classifying, undoing, and exporting"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "load_and_interaction_stability"
description = "The app is interactive (catalog entries respond to activation) within 2 seconds of a local cold load, rapidly scrubbing back and forth across all steps of a trial stays smooth with no hangs, no dropped interactions, and no pane showing a step other than the active one, and the timeline, tree, forms, undo, and export preview remain responsive while terminal output is streaming"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus"
description = "Every interactive control — catalog entries, table rows, the filesystem toggle, timeline entries, the scrubber, tree rows, disclosure toggles, form fields, annotation links, step-type filter, undo and redo, export format tabs, copy and download, import, and the command palette — is reachable and operable with the keyboard alone with a visible focus indicator, Home and End jump the timeline to the first and last visible steps, the active timeline entry is programmatically marked as current, opening the note form or command palette moves focus to its first field with focus returning to the opening control on close, and overlays close on the Escape key"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "labels_errors_alt_text"
description = "Form fields have visible labels, each validation message names the field it belongs to (including note_text, stage, root_cause, behavior, impact, evidence, and implicated_steps) and renders in association with that field, and images rendered in the file workspace carry descriptive alternative text"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.11"
name = "api_shaped_form_and_export_contracts"
description = "The note and classification forms enforce the declared API-shaped bounds and enums (note_text non-empty ≤500 chars; stage/root_cause/behavior/impact restricted to their declared option sets; evidence 20–2000 chars; implicated_steps non-empty), and the Review JSON export uses the same field names and nesting with schemaVersion exactly trajectory-viewer.review-package.v1 plus exportedAt, trial_id, task_id, model, reward, outcome, duration, step_count, annotations[].note_text/step_index, and failure_report.stage/root_cause/behavior/impact/evidence/implicated_steps (or null)"
type = "binary"
weight = 1.0

