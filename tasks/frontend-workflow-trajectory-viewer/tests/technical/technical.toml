[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/app"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "2.1"
name = "shared_state_coherence"
description = "All panes derive from one shared state: changing the active step from any control (timeline click, arrow keys, scrubber, annotation link, report link) updates the timeline highlight, file tree badges, and right rail together in one interaction, and an added or removed annotation is reflected immediately everywhere it appears without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.2"
name = "no_storage_reload_seeded"
description = "No browser storage is used: localStorage and sessionStorage remain empty after opening trials, scrubbing, annotating, and classifying, and a page reload returns the app to its seeded state — the 3-task catalog with no annotations and no classification reports"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.3"
name = "storage_persistence_used"
description = "localStorage or sessionStorage holds trial, step, annotation, or report state after exercising the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.4"
name = "external_network_requests"
description = "The devtools network log shows requests to external origins or third-party CDNs (scripts, styles, fonts, icons, images, or data) during load or a full exercise of the app"
type = "binary"
weight = 1.0
negate = true

[[criterion]]
id = "2.5"
name = "console_clean_full_exercise"
description = "The console is free of errors and warnings on load and stays clean after opening tasks and trials, scrubbing the timeline, streaming terminal output, annotating, and submitting classifications"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.7"
name = "load_and_interaction_stability"
description = "The app is interactive (catalog entries respond to activation) within 2 seconds of a local cold load, rapidly scrubbing back and forth across all steps of a trial stays smooth with no hangs, no dropped interactions, and no pane showing a step other than the active one, and the timeline, tree, and forms remain responsive while terminal output is streaming"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.8"
name = "keyboard_operability_focus"
description = "Every interactive control — catalog entries, table rows, the filesystem toggle, timeline entries, the scrubber, tree rows, disclosure toggles, form fields, and annotation links — is reachable and operable with the keyboard alone with a visible focus indicator, Home and End jump the timeline to the first and last steps, the active timeline entry is programmatically marked as current, opening the note form moves focus to its first field with focus returning to the opening control on close, and overlays close on the Escape key"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.10"
name = "labels_errors_alt_text"
description = "Form fields have visible labels, each validation message names the field it belongs to and renders in association with that field, and images rendered in the file workspace carry descriptive alternative text"
type = "binary"
weight = 1.0

[[criterion]]
id = "2.catchall"
name = "technical_catchall"
description = "The app exhibits a significant, browser-observable technical, performance, or accessibility defect that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (console line, network entry, element, page state) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
negate = true
