[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_washes_required"
description = "Hovering with the real pointer shows a full-width hover wash on timeline entries, trial table rows, and file tree rows, buttons ease background and shadow with a slight press effect, and form controls show focus rings — verified while hovering, not from static styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "step_change_crossfade"
description = "Changing the active step through the real timeline controls (click or arrow keys, never a state-shortcut tool call) eases the highlight to the new entry and cross-fades the center and right pane content over roughly 150 to 250 milliseconds rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "disclosure_chevron_height_ease"
description = "Activating the reasoning region or a tool output panel expands and collapses it with an eased height transition while the disclosure chevron rotates over roughly 0.2 seconds"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "terminal_streaming_indicator"
description = "Activating a terminal-bearing step through the real UI streams its output incrementally with a cursor or streaming indicator while active, and the indicator visibly changes state when streaming completes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "annotation_list_microinteractions"
description = "Driven through the real UI controls: a newly added annotation animates into the annotations list and a removed annotation animates out rather than appearing or vanishing instantly, ingest checklist items tick complete with an animated check transition, the code copy control briefly swaps to a confirmation state after copying, and a newly created classification report card enters with a short opacity and scale transition"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, animations are removed and state changes apply instantly, while every surface and flow (step navigation, streaming completion, forms, palette, export) remains complete and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "palette_and_filter_motion"
description = "Driven through the real UI: the command palette opens with a short opacity and scale transition, and filtered timeline rows animate out and back when the step-type filter changes rather than snapping"
type = "binary"
weight = 1.0

