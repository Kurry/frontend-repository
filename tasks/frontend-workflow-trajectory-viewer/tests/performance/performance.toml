[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "cold_start_is_under_two_seconds"
description = "Cold start to interactive catalog is under 2 seconds on local render"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_is_clean"
description = "Browser devtools show no errors or warnings on load or during a full exercise including scrub, annotate, classify, palette, undo, and export"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "transitions_respond_under_100ms"
description = "Activating timeline steps, filter chips, and export tabs begins responding in under 100ms of the gesture"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "async_work_has_loading_indicators"
description = "Trial ingest shows its checklist progress indicator before the viewer appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "timeline_scrub_without_lag"
description = "Rapidly scrubbing across all steps of a trial stays smooth with no hangs and no pane showing a step other than the active one"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The timeline, tree, forms, undo, and export preview remain interactive while terminal output is streaming"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Step cross-fades, annotation list motion, and palette open stay smooth without visible frame drops during normal use"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "Rapid scrubbing, filter toggling, palette typing, and undo/redo do not hang or freeze the UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.9"
name = "extended_sessions_avoid_resource_runaway"
description = "An extended session of opening multiple trials, annotating, and exporting shows no runaway memory growth that degrades interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.10"
name = "palette_typing_stays_responsive"
description = "Opening the command palette and typing to narrow results stays responsive with no dropped keystrokes"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.n1"
name = "local_load_exceeds_two_seconds"
description = "More than 2 seconds pass before catalog interaction is possible on local render"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n2"
name = "console_errors_during_flows"
description = "Errors or warnings are present in the console during scrub, annotate, classify, palette, or export flows"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n3"
name = "transitions_block_or_lag"
description = "Step, filter, or palette transitions block or lag interaction"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n4"
name = "streaming_hangs_ui"
description = "Terminal streaming causes the timeline, forms, or export preview to hang or freeze"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n5"
name = "large_timeline_kills_frame_rate"
description = "Scrubbing a 12-plus-step timeline kills the frame rate or drops interactions"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n6"
name = "animation_blocks_input"
description = "Input becomes unresponsive during ingest, cross-fade, or palette animation"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n7"
name = "resource_load_blocks_rendering"
description = "The UI blocks rendering while loading trial assets or export preview text"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n8"
name = "browser_resources_run_away"
description = "Memory leaks or runaway browser resource usage occur during repeated trial opens and exports"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n9"
name = "loading_state_is_blank"
description = "Nothing is displayed while trial ingest is running"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "9.n10"
name = "rapid_or_edge_use_crashes"
description = "The app crashes under rapid scrubbing, filter changes, or repeated undo/redo"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "performance.catchall"
name = "performance_catchall"
description = "The app exhibits a significant, browser-observable defect in performance or stability that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
