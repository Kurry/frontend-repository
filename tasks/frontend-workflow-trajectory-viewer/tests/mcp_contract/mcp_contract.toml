[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, entity, form, and artifact prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed browse, entity, form, and artifact tool handlers drive the same visible UI logic as the on-page controls (destinations, step-type filter, annotation create/select/update/delete, classification validate/submit, export/import/copy)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented browse, entity, form, and artifact operations from the module specs and Bindings are available — no undeclared routes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/apply_filter/sort, entity create/select/update/delete, form validate/submit, and artifact export/import/copy against the bound values"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, and delete work for annotation with fields note-text and step-index, matching the visible annotations list"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form-workflow operations validate and submit are bound for note-text, stage, root-cause, behavior, impact, evidence, and implicated-steps and surface the same validation/success UI as manual use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations (task-catalog, task-page, trial-viewer, reference-filesystem, trial-filesystem, annotations-list, classification-report, export-panel, command-palette), sorts (reward-asc, reward-desc), filter step-type, and value bounds including schemaVersion trajectory-viewer.review-package.v1 match the Bindings block"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / entity-collection-v1 / form-workflow-v1 / artifact-transfer-v1 and the declared Bindings are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_copy_import_bound"
description = "artifact-transfer-v1 exposes export (formats json and markdown), copy, and import (mode review-package) that drive the same Export panel handlers as the visible UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_export_reflects_session_review"
description = "After creating an annotation and submitting a classification via UI or MCP, invoking artifact.export acknowledges the live review package under schemaVersion trajectory-viewer.review-package.v1 (same store as the visible Export panel preview)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.n1"
name = "mcp_tools_missing_or_noop"
description = "Browse, entity, form, or artifact MCP tooling is unbound, missing, or a no-op when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n2"
name = "handlers_diverge_from_ui_logic"
description = "A browse, entity, form, or artifact tool invocation updates MCP-reported state without matching the visible UI (or the reverse)"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n3"
name = "undeclared_capabilities_exposed"
description = "Undeclared destinations or operations outside the Bindings/permitted_operations lists are exposed via webmcp_list_tools"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n4"
name = "automation_cannot_exercise_contract"
description = "webmcp_invoke_tool cannot exercise browse open/filter/sort, entity annotation ops, form validate/submit, or artifact export/import/copy against the declared bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n5"
name = "validation_bypass_desyncs_state"
description = "Invoking form submit via MCP bypasses validation and leaves UI/MCP state inconsistent with a manual invalid submit"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n6"
name = "session_or_tool_api_errors"
description = "webmcp_session_info or webmcp_list_tools returns errors or incomplete module/tool data for the declared contract"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n7"
name = "mcp_relies_on_undocumented_hacks"
description = "MCP only works after undocumented manual harness hacks or console stubs rather than app-registered handlers"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n8"
name = "required_contract_module_missing"
description = "browse-query-v1, entity-collection-v1, form-workflow-v1, or artifact-transfer-v1 is not implemented despite being declared required"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n9"
name = "mcp_is_stubbed_or_commented_out"
description = "The MCP interface is commented out or only stubbed so list/invoke cannot reach real handlers"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n10"
name = "automated_contract_validation_fails"
description = "The project fails automated MCP contract validation against the declared Bindings"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "12.n11"
name = "artifact_module_missing_or_noop"
description = "artifact-transfer-v1 export/import/copy tools are unbound, absent from webmcp_list_tools, or no-ops that leave the Export panel unchanged when invoked"
type = "binary"
negate = true
weight = 1.0

[[criterion]]
id = "mcp_contract.catchall"
name = "mcp_contract_catchall"
description = "The app exhibits a significant, browser-observable defect in the declared MCP contract that is NOT covered by any other criterion in this file. 'Significant' means it would plausibly matter to a real user, not a nitpick. If present, name the defect and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the defect is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
negate = true
weight = 1.0
