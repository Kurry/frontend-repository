[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.0

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "12.1"
name = "mandated_modules_are_bound"
description = "Contract modules browse-query-v1, entity-collection-v1, form-workflow-v1, and artifact-transfer-v1 are initialized and bound (webmcp_session_info / webmcp_list_tools show tools for browse, entity, form, and artifact prefixes)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.2"
name = "handlers_match_visible_ui_logic"
description = "Exposed browse, entity, form, and artifact tool handlers drive the same visible UI logic as the on-page controls (destinations, step-type filter, annotation create/select/update/delete, classification validate/submit, export/import/copy)"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.3"
name = "only_documented_operations_exist"
description = "Only documented browse, entity, form, and artifact operations from the module specs and Bindings are available — no undeclared routes"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.4"
name = "contract_is_automation_exercisable"
description = "The contract can be fully exercised via webmcp_invoke_tool for browse open/apply_filter/sort, entity create/select/update/delete, form validate/submit, and artifact export/import/copy against the bound values"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.5"
name = "declared_entity_operations_work"
description = "Entity operations create, select, update, and delete work for annotation with fields note-text and step-index, matching the visible annotations list"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.6"
name = "form_flow_operations_are_bound"
description = "Form-workflow operations validate and submit are bound for note-text, stage, root-cause, behavior, impact, evidence, and implicated-steps and surface the same validation/success UI as manual use"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.7"
name = "queries_match_allowed_spec"
description = "Browse destinations (task-catalog, task-page, trial-viewer, reference-filesystem, trial-filesystem, annotations-list, classification-report, export-panel, command-palette), sorts (reward-asc, reward-desc), filter step-type, and value bounds including schemaVersion trajectory-viewer.review-package.v1 match the Bindings block"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.8"
name = "capabilities_stay_declared"
description = "No extra modules, destinations, or operations beyond browse-query-v1 / entity-collection-v1 / form-workflow-v1 / artifact-transfer-v1 and the declared Bindings are exposed"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.9"
name = "session_tool_and_invoke_apis_work"
description = "window.webmcp_session_info, webmcp_list_tools, and webmcp_invoke_tool correctly surface session info, the tool list, and invocation results without errors"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.10"
name = "mcp_initializes_without_harness_edits"
description = "MCP tools register from the app's own module_spec + Bindings implementation without requiring manual edits to the verifier harness"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.11"
name = "artifact_export_copy_import_bound"
description = "artifact-transfer-v1 exposes export (formats json and markdown), copy, and import (mode review-package) that drive the same Export panel handlers as the visible UI"
type = "binary"
weight = 1.0

[[criterion]]
id = "12.12"
name = "artifact_export_reflects_session_review"
description = "After creating an annotation and submitting a classification via UI or MCP, invoking artifact.export acknowledges the live review package under schemaVersion trajectory-viewer.review-package.v1 (same store as the visible Export panel preview)"
type = "binary"
weight = 1.0

