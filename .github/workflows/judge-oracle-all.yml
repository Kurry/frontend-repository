# Full-corpus concurrent Codex-OAuth judge sweep workflow.
#
# Maintainer / owner sanctioned concurrent sweep: supersedes the single-task / serial-only
# guidance of judge-oracle.yml for full corpus sweeps.
#
# Trigger: workflow_dispatch ONLY. Never run automatically on PRs or issue comments,
# as CODEX_AUTH_JSON must never execute against unvetted/PR-controlled code.
#
# Concurrency: uses group `judge-oracle-all` so a PR /judge invocation during a sweep
# is +1 concurrent session rather than a queued/dropped run.
#
# Expected wall time for full corpus (~100 tasks):
# ~100 tasks * ~30 min / 20 concurrent jobs ≈ 2.5 - 3 hours.

name: Full corpus judge sweep

on:
  workflow_dispatch:
    inputs:
      slugs:
        description: "Space/comma-separated subset of task slugs under tasks/ (empty = all tasks)"
        required: false
        default: ""
        type: string
      max_parallel:
        description: "Maximum concurrent judge jobs (1-20)"
        required: false
        default: "20"
        type: string
      model:
        description: "Rewardkit judge model (e.g. gpt-5.6-luna or gpt-5.6-sol)"
        required: false
        default: "gpt-5.6-luna"
        type: string

permissions:
  contents: write

concurrency:
  group: judge-oracle-all
  cancel-in-progress: false

jobs:
  discover:
    name: Discover task oracles
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.matrix.outputs.slugs }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - id: checkout
        uses: actions/checkout@v7

      - name: Discover tasks
        id: matrix
        env:
          SLUG_FILTER: ${{ inputs.slugs }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const tasksDir = 'tasks';
          const allSlugs = fs.readdirSync(tasksDir, { withFileTypes: true })
            .filter((entry) => entry.isDirectory() && /^frontend-[a-z0-9-]+$/.test(entry.name))
            .map((entry) => entry.name)
            .filter((slug) => {
              const taskToml = path.join(tasksDir, slug, 'task.toml');
              const solveSh = path.join(tasksDir, slug, 'solution/solve.sh');
              return fs.existsSync(taskToml) && fs.existsSync(solveSh);
            })
            .sort();

          const allSet = new Set(allSlugs);
          const filterInput = (process.env.SLUG_FILTER || '').trim();
          let selected = allSlugs;

          if (filterInput) {
            const requested = filterInput.split(/[\s,]+/).filter(Boolean);
            for (const req of requested) {
              if (!allSet.has(req)) {
                throw new Error(`Requested slug "${req}" does not exist under tasks/ or lacks task.toml / solution/solve.sh`);
              }
            }
            selected = Array.from(new Set(requested)).sort();
          }

          if (selected.length === 0) {
            throw new Error('No task slugs selected for judging');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `slugs=${JSON.stringify(selected)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `count=${selected.length}\n`);
          console.log(`Discovered ${selected.length} tasks for judging`);
          NODE

  judge:
    name: Judge (${{ matrix.slug }})
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        slug: ${{ fromJson(needs.discover.outputs.slugs) }}
    env:
      JUDGE_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: source
          persist-credentials: false

      - name: Hash oracle solution
        id: fingerprint
        working-directory: source
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          hash="$(git rev-parse "HEAD:tasks/$SLUG/solution/app")"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Validate target and secret
        working-directory: source
        env:
          SLUG: ${{ matrix.slug }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail
          [[ -f "tasks/$SLUG/task.toml" && -x "tasks/$SLUG/solution/solve.sh" ]]
          jq -e 'type == "object"' <<<"$CODEX_AUTH_JSON" >/dev/null
          docker info >/dev/null

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install locked workspace
        working-directory: source
        run: uv sync --locked

      - name: Run the oracle and Codex judge
        id: harbor
        continue-on-error: true
        working-directory: source
        env:
          SLUG: ${{ matrix.slug }}
          JOBS_DIR: ${{ runner.temp }}/judge-jobs
          JOB_NAME: judge-all-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.slug }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -o pipefail
          compact_auth="$(jq -c . <<<"$CODEX_AUTH_JSON")"
          echo "::add-mask::$compact_auth"
          uv run harbor run \
            --path tasks \
            --include-task-name "$SLUG" \
            --n-tasks 1 \
            --agent oracle \
            --jobs-dir "$JOBS_DIR" \
            --job-name "$JOB_NAME" \
            --n-concurrent 1 \
            --yes \
            --override-cpus 2 \
            --memory ignore \
            --verifier-env "CODEX_AUTH_JSON=$compact_auth" \
            --verifier-env "REWARDKIT_MODEL=$JUDGE_MODEL" \
            --verifier-env "REWARDKIT_JUDGE=codex"

      - name: Build score report
        id: report
        if: always()
        env:
          SLUG: ${{ matrix.slug }}
          SHA: ${{ github.sha }}
          HARBOR_OUTCOME: ${{ steps.harbor.outcome }}
          ORACLE_HASH: ${{ steps.fingerprint.outputs.hash }}
          JOBS_DIR: ${{ runner.temp }}/judge-jobs
          REPORT_DIR: ${{ runner.temp }}/judge-results/${{ matrix.slug }}
          REPORT_JSON: ${{ runner.temp }}/judge-results/${{ matrix.slug }}/judge-result.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          report_dir.mkdir(parents=True, exist_ok=True)

          jobs_dir = Path(os.environ["JOBS_DIR"])
          rewards = list(jobs_dir.glob("**/verifier/reward.json"))
          success = os.environ["HARBOR_OUTCOME"] == "success" and len(rewards) == 1
          data = json.loads(rewards[0].read_text()) if success else {}
          numeric = {
              key: float(value)
              for key, value in data.items()
              if isinstance(value, (int, float)) and not isinstance(value, bool)
          }
          total = numeric.get("reward")
          success = success and total is not None
          dimensions = {
              key: value
              for key, value in numeric.items()
              if key not in {"reward", "pass"}
          }
          result = {
              "slug": os.environ["SLUG"],
              "sha": os.environ["SHA"],
              "oracleHash": os.environ["ORACLE_HASH"],
              "model": os.environ["JUDGE_MODEL"],
              "total": total,
              "per-dim": dimensions,
              "run": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }
          Path(os.environ["REPORT_JSON"]).write_text(json.dumps(result, separators=(",", ":")) + "\n")

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a") as stream:
              stream.write(f"success={'true' if success else 'false'}\n")
          PY

      - name: Upload judge result artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: judge-result-${{ matrix.slug }}
          path: ${{ runner.temp }}/judge-results/
          retention-days: 14
          overwrite: true

      - name: Upload jobs dir for failed runs
        if: always() && steps.report.outputs.success != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: judge-jobs-${{ matrix.slug }}-${{ github.run_id }}
          path: ${{ runner.temp }}/judge-jobs
          retention-days: 14
          if-no-files-found: warn

      - name: Enforce successful judge result
        if: always()
        env:
          SUCCESS: ${{ steps.report.outputs.success }}
        run: test "$SUCCESS" = "true"

  report:
    name: Corpus report & ledger update
    if: always()
    needs: [discover, judge]
    runs-on: ubuntu-latest
    outputs:
      scored: ${{ steps.aggregate.outputs.scored }}
      failed: ${{ steps.aggregate.outputs.failed }}
    steps:
      - uses: actions/checkout@v7

      - name: Download judge results
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: judge-result-*
          path: ${{ runner.temp }}/all-judge-results
          merge-multiple: true

      - name: Build aggregate report and prepare ledger lines
        id: aggregate
        env:
          RESULTS_DIR: ${{ runner.temp }}/all-judge-results
          EXPECTED_SLUGS: ${{ needs.discover.outputs.slugs || '[]' }}
          LINES_FILE: ${{ runner.temp }}/ledger-lines.jsonl
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          results_dir = Path(os.environ["RESULTS_DIR"])
          expected_slugs = json.loads(os.environ["EXPECTED_SLUGS"])
          lines_file = Path(os.environ["LINES_FILE"])

          result_files = list(results_dir.glob("**/judge-result.json")) if results_dir.exists() else []

          scored_entries = []
          failed_slugs = set(expected_slugs)

          for file in result_files:
              try:
                  data = json.loads(file.read_text())
                  slug = data.get("slug")
                  total = data.get("total")
                  if slug and total is not None and isinstance(total, (int, float)):
                      scored_entries.append(data)
                      if slug in failed_slugs:
                          failed_slugs.remove(slug)
              except Exception as e:
                  print(f"Error reading {file}: {e}")

          # Write ledger lines with the 'run' key stripped
          ledger_lines = []
          for entry in scored_entries:
              ledger_entry = {
                  "slug": entry["slug"],
                  "sha": entry["sha"],
                  "oracleHash": entry["oracleHash"],
                  "model": entry["model"],
                  "total": entry["total"],
                  "per-dim": entry.get("per-dim", {}),
              }
              ledger_lines.append(json.dumps(ledger_entry, separators=(",", ":")))

          if ledger_lines:
              lines_file.write_text("\n".join(ledger_lines) + "\n")
          else:
              lines_file.write_text("")

          # Build Markdown summary table
          scored_entries.sort(key=lambda x: x["total"])

          md_lines = ["### Full Corpus Oracle Judge Sweep Report", ""]
          md_lines.append(f"**Scored: {len(scored_entries)} / {len(expected_slugs)} tasks**")
          md_lines.append("")

          if scored_entries:
              md_lines.append("| Task | Total | Weakest dimensions |")
              md_lines.append("| --- | ---: | --- |")
              for entry in scored_entries:
                  per_dim = entry.get("per-dim", {})
                  if per_dim:
                      sorted_dims = sorted(per_dim.items(), key=lambda x: x[1])
                      weakest = ", ".join(f"`{d}` ({s:.4f})" for d, s in sorted_dims[:3])
                  else:
                      weakest = "N/A"
                  md_lines.append(f"| `{entry['slug']}` | {entry['total']:.4f} | {weakest} |")
              md_lines.append("")

          if failed_slugs:
              md_lines.append("#### Tasks Not Scored")
              md_lines.append("")
              for slug in sorted(failed_slugs):
                  md_lines.append(f"- `{slug}`")
              md_lines.append("")

          summary_content = "\n".join(md_lines) + "\n"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write(summary_content)

          scored_count = len(scored_entries)
          failed = "true" if len(failed_slugs) > 0 or len(expected_slugs) == 0 else "false"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a") as stream:
              stream.write(f"scored={scored_count}\n")
              stream.write(f"failed={failed}\n")
          PY

      - name: Append committed judge ledger
        id: ledger
        if: always() && steps.aggregate.outputs.scored != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          LINES_FILE: ${{ runner.temp }}/ledger-lines.jsonl
        run: |
          set -euo pipefail
          path="repos/$GITHUB_REPOSITORY/contents/docs/judge-ledger.jsonl"
          for attempt in {1..5}; do
            if current="$(gh api "$path?ref=main" 2>/dev/null)"; then
              sha_field="$(jq -n --arg sha "$(jq -r .sha <<<"$current")" '{sha: $sha}')"
              existing="$(jq -r .content <<<"$current" | base64 --decode)"
            else
              sha_field='{}'
              existing=""
            fi
            new_content="$(printf '%s' "$existing"; cat "$LINES_FILE")"
            new_base64="$(base64 -w0 <<<"$new_content")"
            payload="$(jq -n \
              --arg msg "ci: record full-corpus judge sweep scores" \
              --arg content "$new_base64" \
              --arg branch "main" \
              --argjson sha_field "$sha_field" \
              '{message: $msg, content: $content, branch: $branch} + $sha_field')"
            if gh api --method PUT "$path" --input - <<<"$payload" >/dev/null; then
              exit 0
            fi
            echo "Ledger push raced with main (attempt $attempt/5); retrying." >&2
            sleep "$attempt"
          done
          echo "Could not publish the judge ledger after 5 attempts." >&2
          exit 1

      - name: Enforce overall sweep success
        if: always()
        env:
          DISCOVER_OUTCOME: ${{ needs.discover.result }}
          JUDGE_OUTCOME: ${{ needs.judge.result }}
          AGGREGATE_FAILED: ${{ steps.aggregate.outputs.failed }}
          LEDGER_OUTCOME: ${{ steps.ledger.outcome }}
          SCORED_COUNT: ${{ steps.aggregate.outputs.scored }}
        run: |
          set -euo pipefail
          if [[ "$DISCOVER_OUTCOME" != "success" ]]; then
            echo "Discover job failed." >&2
            exit 1
          fi
          if [[ "$AGGREGATE_FAILED" == "true" ]]; then
            echo "One or more tasks failed to produce valid scores." >&2
            exit 1
          fi
          if [[ "$SCORED_COUNT" != "0" && "$LEDGER_OUTCOME" != "success" ]]; then
            echo "Ledger commit failed." >&2
            exit 1
          fi
