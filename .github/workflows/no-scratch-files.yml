name: No scratch files

on:
  pull_request:
    branches: [main]

# Guards against ad-hoc debug/scratch artifacts landing in a PR diff — the
# recurring pattern seen from automated fix sessions: throwaway scripts
# (patch.js, fix_all.js, test_escape.mjs, run_zod.js, pre_commit.js, ...)
# committed at repo root, and Playwright's own test-results/ output dirs
# committed instead of gitignored. Fails the check rather than silently
# stripping the files, so the author fixes it before merge.

jobs:
  check-scratch-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List files added or modified in this PR
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git diff --name-only --diff-filter=ACMR "$base" "$head" > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Reject known scratch-file patterns
        run: |
          set -euo pipefail
          offenders=()

          # Known throwaway debug-script filenames seen from automated fix
          # sessions, wherever in the tree they land.
          scratch_name_pattern='(^|/)(patch[0-9]*\.(js|py|mjs)|fix_all\.(js|py)|fix_plan\.md|run_zod\.js|pre_commit\.js|issue\.html|test_escape[0-9]*\.(js|mjs)|debug_[A-Za-z0-9_-]*\.(js|py|mjs)|scratch_[A-Za-z0-9_-]*\.(js|py|mjs))$'

          # Playwright's own run artifacts should never be committed.
          artifact_pattern='(^|/)test-results/'

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if echo "$f" | grep -qE "$scratch_name_pattern"; then
              offenders+=("$f  (scratch/debug script)")
            elif echo "$f" | grep -qE "$artifact_pattern"; then
              offenders+=("$f  (Playwright test-results artifact)")
            fi
          done < /tmp/changed_files.txt

          if [ "${#offenders[@]}" -gt 0 ]; then
            echo "::error::Scratch/debug files found in this PR — remove them before merging:"
            printf '  %s\n' "${offenders[@]}"
            exit 1
          fi
          echo "No scratch files found."

      - name: Reject unexpected new top-level files
        run: |
          set -euo pipefail
          # Anything added directly at repo root must be an explicitly
          # allowed file — catches novel scratch-file names this check's
          # pattern list hasn't seen yet.
          allowed_root_files='^(README\.md|CLAUDE\.md|AGENTS\.md|BUGBOT\.md|LICENSE|pyproject\.toml|uv\.lock|package\.json|package-lock\.json|\.gitignore|\.gitattributes|\.python-version)$'
          allowed_root_dirs='^(tasks|packages|docs|configs|scripts|jobs|reports|\.github|\.claude|\.agents)/'

          offenders=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # only care about files that are new at the repo root
            top="${f%%/*}"
            if [ "$top" = "$f" ]; then
              # file lives directly at repo root
              if ! echo "$f" | grep -qE "$allowed_root_files"; then
                offenders+=("$f  (unexpected new root-level file)")
              fi
            fi
          done < /tmp/changed_files.txt

          if [ "${#offenders[@]}" -gt 0 ]; then
            echo "::error::Unexpected new file(s) at repo root — if this is intentional, add it to the allowlist in .github/workflows/no-scratch-files.yml; otherwise remove it:"
            printf '  %s\n' "${offenders[@]}"
            exit 1
          fi
          echo "No unexpected root-level files."
