name: Playwright test lint

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: playwright-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install repository tooling
        run: npm ci

      - name: Lint added Playwright test lines
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run lint:playwright:changed -- --base "$BASE_SHA" --head "$HEAD_SHA"
