<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAPESHIFT Grid Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="grid-painter-page">
    <section class="gp-section gp-drag-wrapper">
      <div class="container gp-header-row">
        <div>
          <h1 id="page-title" class="h2 page-title text-new-site-black">&lt;SHAPESHIFT GRID TOOL&gt;</h1>
        </div>
        <div class="gp-intro">
          <div class="typewriter-container-wrapper">
            <div class="typewriter-container h4">
              &lt;<span class="font-Hoves h4 uppercase type-text">You are the algorithm</span>&gt;
            </div>
          </div>
          <p>Browser-based open canvas. Everything you touch is transformed into a structured grid.</p>
          <p><strong class="text-bold">Capture. Draw. Download. Share.</strong></p>
        </div>
      </div>

      <div class="container mx-auto relative">
        <div class="toolbar-wrapper">
          <div class="gp-toolbar gp-drag-box">
            <div class="gp-drag-handle">
              <span class="drag-box-label">/SHAPESHIFT TOOLS</span>
              <span class="drag-box-dots">
                <span class="draggable-box-btn">
                  <svg width="29" height="10" viewBox="0 0 29 10" fill="none" xmlns="http://www.w3.org/2000/svg" draggable="false" aria-hidden="true">
                    <g opacity="0.5">
                      <rect x="25.5" y="1.24577e-06" width="3.5" height="3.5" transform="rotate(90 25.5 1.24577e-06)" fill="white"></rect>
                      <rect x="25.5" y="6" width="3.5" height="3.5" transform="rotate(90 25.5 6)" fill="white"></rect>
                      <rect x="16" y="1.24577e-06" width="3.5" height="3.5" transform="rotate(90 16 1.24577e-06)" fill="white"></rect>
                      <rect x="16" y="6" width="3.5" height="3.5" transform="rotate(90 16 6)" fill="white"></rect>
                      <rect x="6.5" y="1.24577e-06" width="3.5" height="3.5" transform="rotate(90 6.5 1.24577e-06)" fill="white"></rect>
                      <rect x="6.5" y="6" width="3.5" height="3.5" transform="rotate(90 6.5 6)" fill="white"></rect>
                    </g>
                  </svg>
                </span>
              </span>
            </div>

            <label class="gp-ctrl">
              <p>Cell</p>
              <input id="cellSize" type="range" min="16" max="64" value="40">
            </label>

            <div class="gp-modes">
              <button id="modeQR" class="on" title="Q" type="button">QR Brush</button>
              <button id="modeColor" title="B" type="button">Color Brush</button>
              <button id="modeEraser" title="E" type="button">Eraser</button>
              <button id="toggleGrid" title="G" type="button">Grid On</button>
            </div>

            <div class="gp-palette">
              <button class="gp-swatch active" data-color="#000000" title="2 black" type="button"></button>
              <button class="gp-swatch" data-color="#ffffff" title="1 white" type="button"></button>
              <button class="gp-swatch" data-color="#ff0000" title="3 red" type="button"></button>
              <button class="gp-swatch" data-color="#ffff00" title="4 yellow" type="button"></button>
              <button class="gp-swatch" data-color="#00ff00" title="5 green" type="button"></button>
              <button class="gp-swatch" data-color="#0000ff" title="6 blue" type="button"></button>
              <button class="gp-swatch" data-color="#ff0098" title="7 pink" type="button"></button>
            </div>

            <div class="buttons-wrapper">
              <div class="buttons-inner">
                <button id="uploadBtn" class="new-primary-btn white text-scramble-btn" aria-label="Upload" type="button">
                  <span>Upload</span>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M3.5 12.5H12.654L9.827 8.73L7.212 12.038L5.462 9.923L3.5 12.5ZM0 16V0H16V16H0Z" fill="black"></path>
                  </svg>
                </button>
                <button id="cameraBtn" class="new-primary-btn white text-scramble-btn" aria-label="Camera" type="button">
                  <span>CAMERA</span>
                  <svg width="22" height="19" viewBox="0 0 22 19" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6.882 0H15.118L16.618 3H22V19H0V3H5.382L6.882 0ZM5.75 10.75C5.75 12.1424 6.30312 13.4777 7.28769 14.4623C8.27225 15.4469 9.60761 16 11 16C12.3924 16 13.7277 15.4469 14.7123 14.4623C15.6969 13.4777 16.25 12.1424 16.25 10.75C16.25 9.35761 15.6969 8.02225 14.7123 7.03769C13.7277 6.05312 12.3924 5.5 11 5.5C9.60761 5.5 8.27225 6.05312 7.28769 7.03769C6.30312 8.02225 5.75 9.35761 5.75 10.75Z" fill="black"></path>
                  </svg>
                </button>
                <div class="undo-clear">
                  <button id="undoBtn" class="mb-0 linkish" type="button">Undo</button>
                  <button id="clearBtn" class="mb-0 linkish" type="button">Clear</button>
                </div>
              </div>

              <div class="gp-stage-share-option">
                <button id="saveBtn" class="new-primary-btn yellow text-scramble-btn" aria-label="Download" type="button">
                  <span>Download</span>
                  <svg width="5" height="10" viewBox="0 0 5 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M0 10L5 5L8.74228e-07 -4.37114e-07L0 10Z" fill="black"></path>
                  </svg>
                </button>
                <button id="shareBtn" class="new-primary-btn yellow text-scramble-btn xl:hidden" aria-label="Share" type="button">
                  <span>Share</span>
                  <svg width="5" height="10" viewBox="0 0 5 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M0 10L5 5L8.74228e-07 -4.37114e-07L0 10Z" fill="black"></path>
                  </svg>
                </button>
              </div>
            </div>

            <div id="cameraOverlay" class="gp-camera-overlay">
              <video id="cameraFeed" autoplay playsinline muted></video>
              <div class="gp-camera-controls">
                <button id="captureBtn" class="new-primary-btn yellow text-scramble-btn" aria-label="Capture" type="button">
                  <span>Capture</span>
                  <svg width="5" height="10" viewBox="0 0 5 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M0 10L5 5L8.74228e-07 -4.37114e-07L0 10Z" fill="black"></path>
                  </svg>
                </button>
                <button id="cancelCameraBtn" class="new-primary-btn black text-scramble-btn" aria-label="Cancel" type="button">
                  <span>Cancel</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="gp-stage">
          <canvas id="gp-view" width="1024" height="1024" aria-label="Shapeshift grid canvas"></canvas>
          <input type="file" id="gp-fileInput" accept="image/*" hidden>
        </div>
      </div>
    </section>
  </main>

  <script src="vendor/qrious.min.js"></script>
  <script src="grid-tool.js"></script>
</body>
</html>
