# Install-only sweep over every task under tasks/ (no slug enumeration).
# Discovers each immediate child that has a task.toml (~89 tasks); skips
# non-task files like tasks/_pins.py. Runs agent setup for each of:
# claude-code, codex, kimi-cli, mini-swe-agent.
#
# Usage (from frontend-repository root):
#   uv run harbor run -y -c configs/install-only-all-tasks.yaml --yes
#
# Equivalent CLI-only form (if you omit install_only in the YAML):
#   harbor run -y -c configs/install-only-all-tasks.yaml --install-only
#
# Host env expectations (API keys only — no OAuth / auth.json force flags):
#   claude-code:    ANTHROPIC_API_KEY
#   codex:          OPENAI_API_KEY
#   kimi-cli:       KIMI_API_KEY
#   mini-swe-agent: ANTHROPIC_API_KEY (matches model_name provider)
job_name: install-only-all-tasks
jobs_dir: jobs
n_attempts: 1
n_concurrent_trials: 100
install_only: true

environment:
  type: modal
  kwargs:
    # Modal replaces the image ENTRYPOINT with its keepalive (harbor
    # _ModalDirect.start). Route the keepalive THROUGH our entrypoint so the
    # shared CDP Chrome still starts; without this every trial fails test.sh's
    # Chrome gate as an infra error.
    keepalive: ["/opt/verifier/entrypoint.sh", "sh", "-c", "sleep infinity"]
  delete: true

agents:
  - name: claude-code
    model_name: anthropic/claude-sonnet-5
    env:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  - name: codex
    model_name: openai/gpt-5.6-sol-pro
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  - name: kimi-cli
    model_name: kimi/kimi-k3
    env:
      KIMI_API_KEY: ${KIMI_API_KEY}

  - name: mini-swe-agent
    model_name: anthropic/claude-sonnet-5
    env:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

datasets:
  - path: ./tasks
