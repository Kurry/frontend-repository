[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "palette_background_and_accent"
description = "The layout uses the light #F5F5F7 background with dark #1D1D1E primary text, and the vivid blue #007AFF is reserved for the primary Submit Word action, links, and key highlights such as the active streak badge and current tier readout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "button_styles_primary_secondary"
description = "Primary buttons (Submit Word, Pause, Export Run, Save Progress) use blue #007AFF fill with #FEFEFE text and a full pill shape; secondary buttons (Undo Last Tile, Resume, Resume Saved Run, Copy, Import) use the light #E6EEF7 fill with #007AFF text; both use no shadow."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "power_tiles_visually_distinct"
description = "Bomb and Slow power tiles are visually distinct from ordinary letter tiles and from each other in shape and color, and remain readable at normal fall speed."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "danger_line_hazard_styling"
description = "The danger line is always visible and reads as a hazard (warning-toned line or gradient) distinct from the board background."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "state_highlights_and_locked_achievements"
description = "The active streak badge and difficulty tier are visually highlighted so the player can read state at a glance, and locked achievements use muted/grayscale treatment that turns to full color when unlocked."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "button_hover_states_visible"
description = "Submit Word, Undo Last Tile, Pause, Resume, Save, Save Progress, Export Run, Export History, Copy, Import, and Play again each show a visible hover state on the real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "typography_scale_and_stack"
description = "Computed styles show an Arial-based system font stack with H1 at 34px and H2 and body text at 17px."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "spacing_and_radius_tokens"
description = "Panels and cards use a 6px border radius, spacing follows a consistent 4px-based scale, and primary and secondary buttons render as full pills (border radius 1000px) with no shadow."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "consistent_chrome_and_icon_set"
description = "HUD panels, view tabs, dialogs, toasts, and the settings form share one consistent component style throughout the chrome, and every icon in the chrome comes from a single icon set applied consistently."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "inline_error_treatment_distinct"
description = "Inline validation messages in the settings form render in a clearly distinct error treatment directly under the field they name."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "toasts_nonblocking_visual"
description = "Transient confirmations for valid words, power tiles, and achievement unlocks appear as non-blocking toasts (or equivalent) that do not cover the entire board as a modal sheet."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.14"
name = "export_and_save_controls_styled"
description = "Export Run / Save Progress read as primary pill actions and Copy / Import / Resume Saved Run as secondary pills, consistent with the #007AFF / #E6EEF7 button system."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "export_preview_shows_game_result_fields"
description = "Export Run / Export History surfaces present a readable JSON preview where the game-result field names format, schemaVersion, score, tilesCleared, durationSec, playerName, tierReached, endedAt, result, and words are visible in the preview text."
type = "binary"
weight = 1.0

