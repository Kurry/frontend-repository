[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "persistence_multi_facet_reload"
description = "Starting from empty storage: save a playerName in Settings, finish one run that unlocks Clean Sweep (or note Best Score and a History game-result), then reload. Best Score, the Match History game-result fields, unlocked Achievements, and saved settings all survive together — never a mix where some facets persist and others silently reset."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "history_order_proves_live_runs"
description = "Finish two runs with observably different final scores (different words cleared or different durations). Open History and confirm both entries appear most-recent-first with distinct scores matching each run — not a single hardcoded History row regardless of play."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "tier_and_streak_derived_from_play"
description = "During a run, submit consecutive valid words until the streak meter reaches 3 and a multiplier badge appears; then submit an invalid word. Confirm the streak meter, multiplier badge, and (as score crosses thresholds) tier readout change with play — not an identical static HUD redraw regardless of submissions."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "score_echoes_gameover_and_history"
description = "End a run via danger-line Game Over. Without reload, confirm the final score on the Game Over screen matches the new top History entry's score and, if it beat the previous best, the Best Score readout — board/run outcome echoes into History and Best Score."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "score_and_history_count_delta"
description = "Note the HUD score and History entry count, then submit one valid word and finish the run. Immediately after the valid submit the HUD score rises by the awarded points; after Game Over the History list gains exactly one new top entry (count delta +1) with no off-by-one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_runs_different_scores"
description = "Play two separate runs with different valid-word submissions (different lengths or different numbers of words). Confirm the two final scores differ in the ways the play dictates — not byte-identical hardcoded Game Over scores."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "pause_tab_interleave_preserves_run"
description = "Start a run, pause mid-run (note timer and score), switch to History then Achievements then back to Game, and resume. Confirm neither the tab switches nor the pause corrupted the frozen score/timer; resume continues the same run without starting a duplicate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_history_then_repopulate"
description = "With no prior runs, History shows the empty-state message and Best Score is zero; finish one run, then confirm History gains a top entry, Best Score updates if applicable, and the empty state is gone — derived chrome tracks through empty → populated."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_reflects_different_runs"
description = "Finish two runs with different valid-word play and export each via Export Run. Confirm both include format letterdrop-game-v1 and schemaVersion 1, and that the two JSON artifacts differ in final score and words arrays in the ways the play dictates — not identical hardcoded exports."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "save_resume_reload_round_trip"
description = "During a run after scoring, Save Progress, reload, Resume Saved Run: score, streak, tray, and tier match the pre-reload checkpoint while Best Score and History facets that were already committed also remain coherent."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "import_export_history_round_trip"
description = "Export a finished run, note its score, tilesCleared, durationSec, playerName, tierReached, endedAt, and words, import the run-json, and confirm History shows a game-result matching those fields without inventing extra fabricated runs."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "restart_resets_run_keeps_meta"
description = "After Game Over, Play again resets the live run score and streak for the new run while Match History and Best Score from prior runs remain — restart fully resets run state without wiping meta progress."
type = "binary"
weight = 1.0

