[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "VD-1"
name = "dark_theme_token_palette"
description = "The workspace uses the dark theme tokens: background near #1F242E, surface panels near #2A303B, borders near #3A414D, with light primary text near #F3F4F6 for readable contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-2"
name = "primary_and_accent_button_colors"
description = "The Export PNG button uses the #0000EE primary background with white text and the active toolbar tool uses the #0079FD accent background with a white icon, distinguishing it from inactive tools"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-3"
name = "section_label_type_hierarchy"
description = "Toolbar section labels (Shapes, Effects, Style) render small (~11-13px), semi-bold, uppercase, and muted while the Layers heading renders larger and bolder (~16-18px, weight 700), giving a clear type hierarchy"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-4"
name = "radius_and_4px_spacing_scale"
description = "Toolbar buttons are square with an 8px radius and panels use a 12px radius with a 1px border, and spacing across the rail and panels reads as multiples of a 4px base unit"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-5"
name = "swatch_palette_with_selected_indicator"
description = "The palette shows 12 preset swatches plus a custom color input and the selected swatch shows a clear selected-state indicator such as a ring or check"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-6"
name = "light_theme_stays_legible"
description = "Switching between the dark and light themes keeps every background and text pairing legible in both themes"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-7"
name = "mobile_canvas_scales_to_viewport"
description = "At ~375px viewport width the canvas region scales its content to fit the viewport width so the loaded image and its annotations remain fully visible, and the stacked layout shows no horizontal page scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-8"
name = "desktop_three_region_layout"
description = "At 1280px width and above, the narrow left tool rail (~88px), the flexible central canvas region that centers the image, and the right Layers panel (~256-288px wide, holding the layer list, Saved projects, and Collaboration scenario) are all visible simultaneously without overlap"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-9"
name = "consistent_icon_set_throughout"
description = "Every toolbar tool, header action, and Layers row control carries an icon drawn from one consistent icon set at a consistent stroke weight, with no visibly mixed icon styles"
type = "binary"
weight = 0.5

[[criterion]]
id = "VD-10"
name = "system_ui_font_stack"
description = "Computed styles show UI text rendering from the Segoe UI, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif stack rather than a browser-default serif or an unrelated display face"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "VD-11"
name = "validation_message_error_color"
description = "The inline validation message under the project name field renders in a distinct error color clearly separated from the secondary text color"
type = "binary"
weight = 0.5

[[criterion]]
id = "VD-12"
name = "empty_state_copy_explains_next_step"
description = "The drop-zone empty state names both ways to load an image (choosing a file and dropping one) and the empty Layers panel explains that annotations will appear there, rather than either region rendering blank"
type = "binary"
weight = 0.5

[[criterion]]
id = "VD-13"
name = "specific_verbs_consistent_capitalization"
description = "Buttons and section labels use one consistent capitalization convention and specific verbs (e.g. Export PNG, Go offline) rather than generic labels like Submit or OK"
type = "binary"
weight = 0.5

[[criterion]]
id = "VD-14"
name = "presets_and_history_panel_chrome"
description = "The left tool rail includes a Presets group with the four named recipes, and the right column shows History and Versions panels with headings larger/bolder than muted uppercase tool-rail section labels"
type = "binary"
weight = 1.0

[[criterion]]
id = "VD-15"
name = "project_json_preview_monospace_surface"
description = "The project JSON preview renders as monospace text on a recessed surface visually distinct from the Layers list rows"
type = "binary"
weight = 0.5

