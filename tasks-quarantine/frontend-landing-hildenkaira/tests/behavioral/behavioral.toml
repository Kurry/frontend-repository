[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "in_memory_multi_facet_reload_resets"
description = "Starting on the homepage: set the locale label to FI, advance the client carousel to a non-first client, click flick-deck Next once on the active deck, shortlist Loom House, and dismiss the cookie banner with Accept; then reload. All facets coherently reset to the seeded baseline (EN locale, first client centered, front flick card restored, empty shortlist count 0, cookie banner appears again) — never a mixed partial survival of some facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "locale_and_carousel_derived_surfaces_change"
description = "Derived-view sensitivity: choosing FI updates the locale dropdown label to FI; advancing the client carousel changes which client card is at scale(1) with active deck controls — toggling back to EN and paging back restores the prior label and centered client."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "carousel_echo_to_deck_controls"
description = "Cross-view echo: advance the client carousel to center a different client; without reload, that client's Show case control, flick Previous/Next, and Organic views / Likes tiles become the active ones while the prior client's controls are no longer the active set."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "testimonials_indicator_count_delta"
description = "Count-delta integrity: note the testimonials current-position indicator, advance once, and confirm the indicator and visible quote both move by exactly one step with no off-by-one lag."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "playback_seek_input_dependent"
description = "Input-dependent output: play the front card, drag the timeline to two different positions in separate trials; the elapsed readout matches each distinct seek position rather than a constant hardcoded time."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_flick_and_locale"
description = "Interleaved-flow integrity: click flick-deck Next once, switch locale to FI, click flick-deck Previous, switch locale back to EN; the flick deck returns to the prior front card and the locale label ends on EN — neither flow corrupted the other."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "cookie_dismiss_reload_edge_round_trip"
description = "Edge-state round-trip: dismiss the cookie banner with Accept (banner gone), then fully reload; the banner appears again in the seeded state, proving consent visibility is in-memory rather than persisted."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "brief_export_pipeline_to_artifact"
description = "Full-pipeline check: shortlist Loom House and Second Circle, set locale to FI, toggle Marketing off, advance carousel and flick deck, submit contact with a unique email; open Export brief — JSON schemaVersion is 1 and shortlistedClients, locale, cookieCategories.marketing, activeClient, flickIndexByClient, contactSubmitted, and contactEmail match the session under the Discovery brief field contract; Copy confirmation appears on the JSON tab."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "brief_import_export_round_trip"
description = "Export a discovery brief with a non-empty shortlist and FI locale, clear the shortlist and return locale to EN, then Import the exported JSON; nav count, Shortlist controls, locale label, and centered client restore to the exported brief values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_shortlist"
description = "Shortlist Loom House (count 1), Undo (count 0 and control cleared), Redo (count 1 and control active again); discovery brief shortlistedClients tracks each step when reopened."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "export_input_dependent_contact_and_cookie_payloads"
description = "Input-dependent output: submit contact with email a@example.com then note brief contactEmail; on a fresh load Accept then note cookieCategories all true; on another fresh load save preferences with marketing false — the three Export brief JSON snapshots differ in contactEmail and/or cookieCategories.marketing accordingly (not hardcoded identical rows)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "invalid_then_valid_contact_brief_round_trip"
description = "Edge-state round-trip: open contact, submit an invalid payload (named field errors, no success, brief contactSubmitted stays false), then submit a valid email with terms true; Thanks for your submission! appears and Export brief shows contactSubmitted true with that contactEmail only — no leftover invalid email in the artifact."
type = "binary"
weight = 1.0

