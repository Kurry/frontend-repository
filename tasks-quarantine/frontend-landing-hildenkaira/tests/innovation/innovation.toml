[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "execution_quality_of_signature_interactions"
description = "Score execution quality of the reference experience (not invention beyond it): flick-deck elastic reshuffle, client-carousel scale(1)/scale(0.94), primary-button hover wipe, and cookie banner ease feel polished and coherent rather than unfinished stubs."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "scroll_storytelling_services_throw_execution"
description = "On a fresh load, scrolling through the pinned services region throws Organic content / Ads for social / Training with rotation driven by real scroll progress, and scrolling back reverses the sequence — executed smoothly as reference recreation rather than a missing or janky stub."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "lime_veil_lettermark_intro_execution"
description = "On a fresh load, the lime page-load veil lifts with the brand lettermark rising letter by letter and the nav settling in one orchestrated timeline matching the reference ambition."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "cinder_bloom_brand_narrative_arc"
description = "The long-form page reads as one Cinder & Bloom narrative arc from hero through statement, client deck, services, testimonials, about/self-esteem, CTA, and full-height footer rather than disconnected template blocks."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a1"
name = "designed_experience_narrative_arc"
description = "The page reads as a designed experience with a narrative arc — sections build on each other visually and the signature pinned-services throw is memorable as faithful reference execution, not a template with effects sprinkled on."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.a2"
name = "showcase_rechoreographed_at_narrow_widths"
description = "Impeccable execution across breakpoints: at about 479px the showcase composition is re-choreographed (tighter hero, hamburger lime menu, fluid type) rather than a broken shrink of the desktop layout."
type = "binary"
weight = 0.5

[[criterion]]
id = "11.b1"
name = "operator_tools_polished_execution"
description = "Bonus execution quality: shortlist → live discovery brief (schemaVersion 1 field contract) → Download/Copy/Import with schema-invalid import rejection and the Ctrl+K palette feel polished and coherent with the Cinder & Bloom recreation rather than unfinished stubs bolted onto a static page."
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app demonstrates a noteworthy, browser-observable execution-quality enhancement of the reference experience that is NOT covered by any other criterion in this file. The enhancement must plausibly matter to a real user, not be a nitpick, and must not invent design beyond the reference. If present, name the enhancement and cite the concrete evidence (element, page state, screenshot) that demonstrates it. If the enhancement is already covered — even partially — by another criterion in this file, answer no here and let that criterion carry it."
type = "binary"
weight = 1.0
