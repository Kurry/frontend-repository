id = "3.13"
name = "block_fidelity_statement_band"
description = "Block: statement band — full-bleed dark media band showing an elderly reader among bookshelves, overlaid with a lime serif heading and a black-boxed subtitle (reference: segment-02.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
