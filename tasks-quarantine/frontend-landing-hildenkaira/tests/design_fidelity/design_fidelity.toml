description = "Block: footer — full-height footer re-assembling the liquid-chrome lettermark on a metallic surface (fictional Cinder & Bloom lettermark in place of the source wordmark), with Sitemap links, Podcast and Social panels with icon rows, and a design credit (reference: segment-13.png). Score this block against the reference segment: 5 = identical position, layout, spacing, alignment, text, fonts, colors, and imagery; 4 = minor imperfections (misalignment under 2px, one minor text or formatting slip); 3 = partial match (noticeable misalignment or spacing drift, multiple text discrepancies); 2 = poor match (significant misalignment, mostly inconsistent layout); 1 = missing or completely misplaced."
type = "likert"
