[[criterion]]
id = "3.4"
name = "specified_motion_states_present"
description = "Reference-required motion states are present: lime veil + lettermark intro on fresh load, line-mask reveals, pinned services throw, flick-deck elastic settle (~0.6s), and client-carousel scale(1)/scale(0.94) over ~600ms — verified via the real UI/scroll path."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_patterns_match_reference"
description = "Responsive behavior matches the reference patterns: hamburger only at about 479 and below; smooth scroll at 768 and up; hero re-composition at narrow width rather than a mere shrink."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_match_token_styled_chrome"
description = "Primary buttons, contact chrome-metallic popup fields, and cookie dark banner match the reference styling (token-driven fills, floating labels) rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "display_vs_body_hierarchy"
description = "Typography hierarchy clearly distinguishes oversized editorial display headings from grotesque body/eyebrow/nav text across the homepage."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_reference"
description = "Default/hover/active states match the reference where specified: nav link red-dot scale, primary-button hover wipe with turquoise fill, flick active vs neighbor card scales, and video player chrome fade while playing."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "palette_surfaces_exact_theme_colors"
description = "Color treatments match exactly: off-white #eae9e6 body, near-black #181818 text, lime #ecfdad, turquoise #3fae86, red #ff4545 nav dot, dark-grey #2b2b2b footer; theme-media bands black with lime headings; chrome reserved for Likes tile, contact popup, and footer theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_reference_timing"
description = "Hover/press microinteractions follow the reference language with primary-motion easing cubic-bezier(0.625, 0.05, 0, 1) over 0.525s on buttons and nav-dot back ease cubic-bezier(0.175, 0.885, 0.32, 1.275) over 0.525s."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.b1"
name = "operator_chrome_does_not_displace_sections"
description = "Shortlist, command palette, and discovery brief controls layer as overlays/chrome without displacing the mandated section order (hero → statement → client → services → testimonials → about → CTA → footer) or removing reference-required surfaces at 1440."
type = "binary"
weight = 1.0

