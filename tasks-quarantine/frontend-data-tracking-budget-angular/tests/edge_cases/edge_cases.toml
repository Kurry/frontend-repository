[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_period_shows_empty_state"
description = "Navigating to a reporting period with no expenses shows a zeroed Total expenses figure, empty progress bars, and an empty Expenses table with a visible empty-state message rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "expense_form_validates_field_contract"
description = "Submitting the add/edit expense dialog with an empty or non-positive amount, a missing or non-YYYY-MM-DD date, or no category shows inline validation naming each invalid field before commit and adds or changes no row"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "errors_name_field_and_fix"
description = "Validation and import errors name the offending field and the problem rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "snackbar_confirms_mutations"
description = "Snackbar confirmations appear after add, update, delete, bulk actions, export copy, and import"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "empty_filter_shows_empty_state"
description = "Selecting a category filter that matches no expenses in the current period shows an empty-state message in the table region, and clearing the filter restores the full row set"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "undo_available_after_destructive"
description = "After a destructive expense delete or bulk delete, Undo is enabled and can restore the prior Expenses rows and Dashboard totals"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "chart_tooltip_names_category"
description = "Hovering a spending-breakdown chart segment shows a tooltip naming the category and its amount"
type = "binary"
weight = 0.5

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Bottom-nav items, dialog actions, table actions, and form fields use semantic interactive elements (buttons, inputs, labels) rather than clickable bare divs"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "dialogs_support_close_paths"
description = "The add/edit expense dialog and export drawer support Cancel/Close controls and Escape (and backdrop where applicable) to dismiss without applying a pending create"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_submit_and_empty_bulk_safe"
description = "Double-activating the dialog confirm creates or applies exactly one change; Bulk delete with no rows selected is unavailable (tray hidden or actions disabled)"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "import_malformed_json_rejected"
description = "Importing malformed or empty JSON shows an inline error naming the problem and leaves the current expenses, categories, and totals unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "import_contract_invalid_rejected"
description = "Importing parseable JSON that fails the BudgetDocument field contract — missing displayName, activePeriod, categories, or expenses; activePeriod.month outside 1–12; expense value not greater than 0 or datetime not YYYY-MM-DD; period/datetime mismatch; or unknown categoryId — shows an inline error naming the offending field and leaves expenses, categories, and totals unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "category_name_contract_rejected"
description = "Adding or renaming a category with an empty, whitespace-only, over-40-character, or duplicate name shows validation naming the name field and does not change the Categories list"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "csv_commit_with_zero_valid_rows_inert"
description = "Committing a CSV import when no row is valid changes nothing: the Expenses table, Dashboard totals, and export previews stay exactly as before and the summary reports zero imported"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "recurring_rule_contract_rejected"
description = "Adding or editing a recurring rule with an empty name, non-positive amount, unknown category, or day of month outside 1 through 28 shows validation naming that field and does not add or change a rule"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "threshold_boundary_and_zero_projection"
description = "A category whose spent is exactly the threshold percent of its limit shows the Over threshold label, and a reporting period with no expenses shows every category's projected total as 0 with no Projected overage flag and no console error"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "report_import_missing_sections_rejected"
description = "Importing a Budget report JSON missing meta, totals, recurringRules, or settings, or whose totals disagree with its own expenses, shows an inline error naming the offending key and leaves expenses, categories, rules, threshold, and totals unchanged"
type = "binary"
weight = 1.0

