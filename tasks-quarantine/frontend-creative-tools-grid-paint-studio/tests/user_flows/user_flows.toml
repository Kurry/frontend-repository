[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "6.1"
name = "paint_and_save_increments_gallery"
description = "Paint-and-save flow: paint at least 3 cells with Color Brush, switch to Gallery mode, and save the board with a valid unique name and closed-enum tag — the gallery count increases by exactly one, the new card shows the entered name, that tag, and a thumbnail matching the painted cells, Project JSON boards includes that SavedBoard, and returning to Paint mode shows the same painted board untouched, all without a reload."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.2"
name = "empty_save_name_shows_inline_validation"
description = "Create flow: attempting Save board with an empty or invalid name, duplicate name, or invalid tag triggers immediate inline validation naming the offending field, keeps the submit control disabled until every required field is valid, and does not increase the gallery count."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.3"
name = "rename_updates_card_in_place"
description = "Rename flow: renaming a board in Gallery updates that same card's name in place; the gallery count stays the same, no duplicate card appears, and Project JSON boards reflect the new name."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.4"
name = "delete_removes_card_keeps_canvas"
description = "Delete flow: deleting a board removes its card, decreases the gallery count by exactly one, and if that board's cells were loaded on the canvas the canvas keeps its current pixels — only the collection changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.5"
name = "load_board_returns_to_paint"
description = "Load-and-verify flow: loading a saved board from Gallery writes its cells back onto the paint canvas, returns to Paint mode with the loaded artwork visible, locks the Cell control because the board now holds art, and reopening Gallery still lists that same board unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.6"
name = "last_delete_reveals_empty_gallery"
description = "After deleting every board, Gallery shows a clear empty-gallery state in the list region that explains the gallery is empty and how to save a board."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.7"
name = "filter_echo_keeps_favorite_marker"
description = "Filter echo flow: favoriting a board and then filtering the gallery by its tag shows the board with its favorite marker intact; toggling the favorite while the filter is active updates the same visible card without a reload, and clearing the filter restores the full list exactly."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.8"
name = "toolbar_drag_preserves_paint_state"
description = "On desktop, dragging the floating toolbar by its /GRID PAINT TOOLS header repositions the panel within the stage; the current tool, palette, grid state, mirror mode, and painted board all survive the drag with workflow continuity."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.9"
name = "camera_overlay_cancel_leaves_board"
description = "Camera overlay flow: opening Camera shows the in-toolbar live-feed overlay; Cancel closes the overlay without painting and leaves the board exactly as it was."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.10"
name = "reload_returns_seeded_baseline"
description = "A page reload returns the app to its seeded state: the 4 seeded boards in Gallery, a blank canvas at cell size 40, QR Brush active, black swatch selected, Mirror Off, Vision Off, empty undo/redo — recoverable without stuck navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.11"
name = "export_pipeline_contains_session_work"
description = "Export pipeline: paint a recognizable multicolor pattern, save the board with a valid name and closed-enum tag, snap a named version, open Export center — Project JSON shows ProjectDocument keys (cellSize, tool, swatch, mirror, vision, gridVisible, cells, boards, versions) with the painted cells, the new board name and tag, and the version name; CSS palette lists seven swatch custom properties; Download PNG yields branded grid_paint.png matching the board."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.12"
name = "import_round_trip_restores_session"
description = "Import round-trip: export Project JSON from a session with painted cells and a saved board, Clear and alter gallery if needed, then Import Project that JSON — canvas, cell lock, tool/swatch/mirror/vision, gallery cards, versions, and histogram bars reconstruct to match the export."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.13"
name = "undo_redo_with_histogram"
description = "Undo/redo flow: paint a stroke, flood-fill a region, undo twice, redo once — only the first action returns; histogram bars track each step; a new paint after undo disables Redo."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.14"
name = "bulk_gallery_favorite_delete_flow"
description = "Bulk gallery flow: select three boards, Favorite selected (all three show markers), then Delete selected after confirmation — exactly those three disappear and the gallery count decreases by three."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.15"
name = "symmetry_paint_undo_pair"
description = "Symmetry paint flow: set Mirror to Horizontal, paint one edge cell with Color Brush — the mirrored cell paints in the same stroke; one Undo clears both cells together."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.16"
name = "command_palette_board_and_export"
description = "Command palette flow: open with Ctrl+K or Cmd+K, type part of a seeded board name, Enter loads it in Paint mode; reopen and choose Export center to switch to that panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "6.17"
name = "schema_validation_then_valid_save"
description = "Schema validation flow: attempting Save board with a duplicate seeded name, an empty/invalid tag, or a name over 40 characters leaves the gallery count unchanged with inline errors naming the offending field (SavedBoard contract); then submitting a unique valid name with a closed-enum tag increases the count by exactly one and Project JSON boards includes that request-body-shaped record."
type = "binary"
weight = 1.0

