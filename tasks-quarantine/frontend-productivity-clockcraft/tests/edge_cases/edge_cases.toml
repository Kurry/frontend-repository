[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_states_before_entries"
description = "Before any entry exists, the timeline and All entries list show friendly empty states inviting a first activity."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "manual_form_validates_inline"
description = "Inline validation appears on the manual form, timer inputs, edit dialog, interruption reason step, and import confirmation before submit."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_contract_errors_are_actionable"
description = "Validation messages name the offending field from the entry or Session JSON field contract rather than only saying Invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "actions_show_toast_confirmation"
description = "Starting a timer, saving a manual entry, deleting, bulk categorize, export, and import each show a transient toast confirmation."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "interruption_step_is_clear"
description = "The interruption reason step clearly requires Internal or External before a sub-25-minute stop commits."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "delete_and_import_support_cancel"
description = "Delete confirmation and Import confirmation support cancel that leaves the collection unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "weekly_and_heatmap_tooltips"
description = "Hover tooltips are present for Weekly overview bar segments and heat-map cells."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "controls_use_semantic_tags"
description = "Buttons, inputs, checkboxes, and labels use semantic tags."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "modal_supports_close_paths"
description = "Export drawer, edit dialog, and other modals close via close control, backdrop click, and Escape."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "no_results_and_invalid_import_feedback"
description = "A search/filter with no matches shows an explicit no-results message; invalid Import shows validation naming the offending field and changes nothing."
type = "binary"
weight = 1.0

