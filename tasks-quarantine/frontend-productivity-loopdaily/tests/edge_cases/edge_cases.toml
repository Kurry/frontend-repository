[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_state_before_first_habit"
description = "Before any habit exists, the main list shows a friendly empty-state message inviting the user to create the first habit rather than a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "habit_form_field_contract_inline_errors"
description = "Submitting the New Habit form with a blank name, a name longer than 80 characters, a targetCount outside 1–100, once with targetCount not equal to 1, or a reminder longer than 40 characters shows an inline error naming the offending field and adds no habit"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_contract_errors_name_the_field"
description = "Field-contract validation errors name the offending field (name, icon, targetCount, reminder, or category name) and the rule that failed rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "create_export_import_toasts"
description = "Creating a habit, exporting Workspace JSON, and completing a valid Import each produce a transient visible confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "stats_empty_message"
description = "The Stats view with no habits created yet shows its own short message instead of blank numbers"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "import_cancel_leaves_data"
description = "Cancelling the Import confirmation step leaves the current habits, categories, and history untouched"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "category_name_field_contract"
description = "Creating a category with a blank or over-40-character name is rejected with an inline error naming the name field and no category chip is added"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "stepper_floor_at_zero"
description = "A minus-one tap when a stepper habit's count for today is already zero leaves the count at zero rather than going negative"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "import_confirm_modal_dismiss"
description = "The Import confirmation dialog can be dismissed via Cancel or backdrop without replacing data"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "import_field_contract_rejection"
description = "Importing malformed Workspace JSON, or JSON that fails the field contract (wrong schemaVersion, missing habits or categories, targetType outside once|count, unresolved categoryId, or illegal completions), leaves habits, categories, Stats, and history unchanged and shows validation naming the offending field"
type = "binary"
weight = 1.0

