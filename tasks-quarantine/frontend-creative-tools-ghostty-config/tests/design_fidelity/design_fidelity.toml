[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_matches_two_pane_reference"
description = "At 1440px, spacing among the translucent left sidebar, titled settings content, and right-hand generated-config panel follows a consistent scale matching the reference screenshots — no arbitrary one-off gaps that break the two-pane composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_settings_app_spec"
description = "Section titles, labeled setting rows, and monospace generated-config lines match the reference hierarchy: UI chrome uses the settings-app type scale and the config panel stays monospace."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: macOS-style window with window-dot chrome, translucent left category sidebar, settings form, right-hand generated-config panel, and dock-hosted terminal preview."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "State changes the spec calls out — category switches, override lines entering/leaving the generated-config panel, and toast feedback for Copy/Download/Reset — show transitions rather than hard cuts when driven through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "At about 375px vs 1440px, responsive behavior matches the reference patterns: desktop keeps sidebar + form + config panel together; narrow width stacks panes while keeping product identity."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Sliders, steppers, dropdowns, pill toggles, switches, color pickers, and export buttons use the styled macOS-settings treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_hierarchy_form_vs_config"
description = "Typography hierarchy clearly distinguishes section titles and labeled rows from denser notes and from the monospace generated-config output."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Controls show distinct default, hover, focus (visible ring), pressed, selected, and disabled treatments as specified — disabled Copy/Download/Reset all read as non-interactive while labels stay legible."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "terminal_panel_and_status_colors"
description = "Color and depth treatments match the spec: generated-config uses a terminal scheme (dark background, light text, colorized keys and values); danger/reset reads red and success feedback reads green."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteraction_timing_matches_spec"
description = "Slider drag tracking, switch/pill selected-state animation, and toast enter/dismiss follow the specified microinteraction feel when driven through real controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "hardened_surfaces_match_spec"
description = "Diff mode, command palette overlay, Import surface, and Profiles panel follow the specified chrome treatments rather than unstyled browser defaults, matching the macOS-settings craft of the reference."
type = "binary"
weight = 1.0

