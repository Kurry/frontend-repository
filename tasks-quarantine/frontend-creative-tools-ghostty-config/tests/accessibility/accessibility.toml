[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "font_family_keyboard_editable"
description = "The font-family input can be reached and edited with the keyboard alone (Tab to focus, then type), and typed text updates both the input and the generated font-family line."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "sidebar_and_export_keyboard_operable"
description = "Every interactive control — sidebar categories, sliders, switches, pill toggles, dropdowns, and the Copy/Download/Reset all actions — is reachable and operable with the keyboard, each showing a visible focus indicator when focused."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "category_icons_have_accessible_names"
description = "Sidebar category icons and other meaningful iconography expose descriptive accessible names (aria-label or equivalent) so assistive technology can identify the category or action."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "export_feedback_uses_live_region"
description = "Copy, Download, and Reset all feedback is announced through a polite ARIA live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "setting_controls_explicitly_labeled"
description = "Setting form controls (font-family, font-size, colors, cursor-style, and other validated editors) use explicit label elements associated with the controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Settings section titles and panel headings follow a logical heading order with no skips (for example H1 to H2 to H3)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmarks_for_editor_chrome"
description = "The editor exposes semantic landmarks (for example nav for the category sidebar and main for the settings form / generated-config region) so assistive technology can navigate the chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Sidebar labels, settings form text, generated-config lines, and primary export controls have sufficient color contrast against their light and dark surfaces."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "switches_expose_selected_state"
description = "Switches and pill toggles expose their on/off or selected state to assistive technology, and that state updates when toggled."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, category transitions, override-line enter/exit, and toast enter/dismiss are removed or minimized while every state change still applies instantly and completely."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "hardened_controls_keyboard_operable"
description = "Undo, Redo, Import, Diff, Profiles, and the command palette are reachable and operable with the keyboard alone, each with a visible focus indicator."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "command_palette_dialog_focus_trap"
description = "The command palette uses dialog semantics: focus moves into the search field on open, stays trapped while open, closes on Escape, and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "import_profile_feedback_live_region"
description = "Import and profile action feedback is announced through a polite ARIA live region as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "compare_sides_have_accessible_names"
description = "In Compare themes, each side's theme selector and Apply control carry accessible names identifying side A or side B, and both are keyboard operable"
type = "binary"
weight = 0.5

