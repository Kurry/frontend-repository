[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "zero_overrides_empty_state_visible"
description = 'With zero overrides, the generated-config panel shows the empty-state comment line "# No changes to the default config yet", the override count reads zero, and Copy, Download, and Reset all are disabled and read as non-interactive.'
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "invalid_setting_inline_validation"
description = "Typing an invalid value into a validated setting control shows an inline message naming that setting next to the control, and no malformed line is emitted into the generated configuration while the value is invalid."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "validation_names_setting_and_range"
description = 'Validation messages name the setting and the accepted range, format, or enum from the Ghostty field contract rather than only saying "Invalid".'
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "copy_download_reset_show_toast_feedback"
description = "After Copy, Download, or Reset all (when enabled), transient toast feedback appears with visible confirmation of the action."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "font_size_clamped_to_4_60"
description = "The font-size control cannot produce a value outside 4 to 60: dragging stops at the bounds, and a typed out-of-range value is rejected or clamped with the shown value staying inside the range."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "single_reset_preserves_unrelated_overrides"
description = "Deleting or resetting one override removes exactly that override; every unrelated override keeps its generated line and value, and the override count decreases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "section_notes_guide_settings"
description = "Grouped settings sections include short notes that explain what a setting does, so non-obvious terminal options have in-app guidance."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "export_and_setting_controls_semantic"
description = "Export actions and setting editors use semantic button/input/label elements rather than unlabeled decorative wrappers."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "toast_feedback_dismisses"
description = "Toast feedback for Copy/Download/Reset enters, stays readable, and dismisses with a fade without permanently blocking the editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "successive_font_family_no_duplicate_lines"
description = "Entering two different font-family values in succession leaves the generated line following the latest value, with no duplicate font-family lines in the output."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "malformed_import_rejected"
description = "Importing malformed config text (lines that are not comments and not valid key = value) shows a visible parse error naming the problem, applies no overrides, and leaves the override count unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "empty_undo_redo_disabled"
description = "Undo with an empty history and Redo with an empty redo stack are disabled, not silent no-ops."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "empty_profile_name_rejected"
description = "Saving a profile with an empty or whitespace-only name creates no profile and shows validation naming the name field."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.14"
name = "diff_zero_overrides_no_differences"
description = "Opening Diff with zero overrides shows a no-differences state rather than a blank or broken panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.15"
name = "empty_search_filter_state"
description = "A settings search that matches nothing shows an empty filter state; clearing the query restores the full category form."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.16"
name = "field_contract_violations_rejected"
description = "Importing or committing a value that violates the Ghostty field contract — font-size outside 4 to 60, cursor-style outside block/bar/underline/block_hollow, a color that is not #RRGGBB, an opacity outside 0 to 1, clipboard outside ask/allow/deny, copy-on-select outside true/false/clipboard, window-decoration outside auto/none/client/server, theme outside the declared set, a palette index outside 0 to 255, empty font-family, or an empty profile-name — shows inline validation naming the field, does not emit that malformed override into the generated configuration, and on Import leaves existing overrides and the override count unchanged."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.17"
name = "rename_conflict_rejected_self_allowed"
description = "Renaming a profile to another saved profile's name shows a message naming the conflict and changes nothing, while renaming a profile to its own current name is not flagged as a conflict"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.18"
name = "compare_same_theme_both_sides"
description = "In Compare themes, selecting the same theme on both sides renders two matching previews, and Apply still commits exactly one theme = line with no duplicate theme lines"
type = "binary"
weight = 0.5

