[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "desktop_two_pane_composition"
description = "At desktop width the composition establishes a two-pane settings-and-preview layout with grouped controls, sliders or inputs, color values, and monospace configuration output."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "first_viewport_emphasizes_form_and_preview"
description = "The first viewport gives greater visual emphasis to the categorized settings form and its generated-config preview than to secondary metadata, notes, or badges."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "monospace_terminal_style_output"
description = "The generated-config output is monospace and uses a terminal-style color scheme (dark background, light text, colorized keys and values) rather than plain unstyled text."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.4"
name = "three_distinct_type_roles"
description = "At least three distinguishable type roles are visible (section title, body text, secondary label) differing in size and/or weight."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.5"
name = "body_text_contrast_meets_aa"
description = "Primary body text meets a contrast ratio of at least 4.5 to 1 against its background in the editor."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.6"
name = "sentence_case_microcopy_with_numerals"
description = "UI microcopy is concise sentence-case text and uses numerals for counts (for example the override count), rather than Title Case or spelled-out numbers."
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "3.9"
name = "macos_window_chrome_composition"
description = "The app presents a desktop macOS-style application window: a translucent left sidebar with window-dot chrome and category icons, a titled content area with a back/forward history control, and a right-hand generated-config panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "varied_control_types_in_grouped_sections"
description = "The settings form uses grouped sections with section titles and notes, labeled rows, and a visible mix of control types including sliders, number steppers with unit toggles, text inputs, dropdowns, pill toggles, switches, color pickers, a palette grid, and a repeatable-value list editor."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "dock_hosts_live_terminal_preview"
description = "A macOS-style dock hosts a live interactive terminal preview that re-themes as settings change."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "consistent_status_colors_and_legibility"
description = "Light and dark surfaces stay legible, and status colors are consistent across the UI (danger/reset actions in red, success feedback in green)."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.14"
name = "narrow_width_panes_stack_keeping_identity"
description = "At a narrow width (about 375 pixels) the sidebar, settings form, and generated-config panel stack while keeping the product identity, with no horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.15"
name = "validation_copy_names_setting_and_range"
description = "Where a validation message is rendered, it names the setting and the accepted range or format rather than showing a generic rejection."
type = "binary"
weight = 0.5

[[criterion]]
id = "3.17"
name = "diff_and_palette_chrome_craft"
description = "Diff mode marks changed keys with a clear changed treatment for default vs current values; the command palette is a centered overlay with a search field and scrollable result list; Undo/Redo/Import/Diff/Profiles sit in editor chrome without crowding the form or generated-config panel."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.18"
name = "compare_panes_equal_ab_labels"
description = "The Compare themes surface shows two equal-weight preview panes labelled A and B, each with its own theme selector and Apply control, clearly separated so the two themes read side by side"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.19"
name = "profile_rows_consistent_row_treatment"
description = "Profile rows present the profile name, its override count, and Apply, Rename, and Delete controls in one consistent row treatment"
type = "binary"
weight = 0.5

