[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "desktop_two_pane_composition"
description = "At desktop widths (~1440px) the sidebar, settings form, and generated-config panel are visible together as the two-pane composition with the sidebar alongside."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At about 375px width, sidebar categories, setting controls, and export actions present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Section titles, setting labels, and generated-config text remain legible at both 1440px and about 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At about 375px width the stacked panes and controls do not clip content or overflow the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "sidebar_adapts_at_narrow_width"
description = "At about 375px width the category sidebar adapts (stacks, collapses, or otherwise reflows) so categories remain reachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "narrow_width_stacks_panes_logically"
description = "At about 375px width the layout reflows: panes stack in a logical order while controls stay operable and product identity remains."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "narrow_controls_tappable"
description = "At about 375px width, tap/click activation works on sidebar categories, primary setting controls, and export actions."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At about 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "preview_and_config_scale_with_viewport"
description = "The live terminal preview and generated-config panel size responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "export_actions_remain_reachable"
description = "Copy, Download, and Reset all remain reachable at both 1440px and about 375px — fixed positioning does not push them off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "overlays_operable_at_375"
description = "At about 375px width, the command palette, Diff panel, Import surface, Profiles panel, and Compare themes surface (its two previews stacking vertically) remain fully visible and operable rather than rendering off-screen."
type = "binary"
weight = 1.0

