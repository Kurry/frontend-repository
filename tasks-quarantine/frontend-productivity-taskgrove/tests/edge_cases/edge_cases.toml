[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "empty_tree_and_archive_messages"
description = "On first load with no data, the tree area shows an empty-state message inviting the first root task, and the Archive panel shows a short explanatory message instead of a blank area."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "blank_title_inline_field_contract"
description = "Submitting New root task or Add Child with a blank or whitespace-only title shows an inline error naming the title field before submit and adds no task."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "field_errors_name_offending_field"
description = "Task title, status, priority, dueDate, and tag name/color validation errors name the offending field (title, status, priority, dueDate, name, or color) and the fix rather than only saying Invalid"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "durable_actions_show_toast"
description = "Adding a task or child, editing a task, archiving, restoring, Move To, and importing a grove package each show a transient confirmation toast"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.5"
name = "overlength_title_rejected"
description = "A title longer than 120 characters is rejected with an inline error naming the title field and adds no task."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.6"
name = "tag_duplicate_and_invalid_color_rejected"
description = "Submitting a tag with a duplicate name (case-insensitive) is rejected naming the name field; a color outside the closed hex enum is rejected naming the color field; no invalid tag is added."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.7"
name = "sixth_tag_attachment_blocked"
description = "Attempting to attach a 6th tag to a node that already has 5 is blocked and the node still shows exactly 5 chips."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "incomplete_branch_hides_archive"
description = "A node whose branch is not fully complete does not show an Archive control."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "move_picker_escape_closes"
description = "The Move To picker closes on Escape and returns focus to the control that opened it."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.10"
name = "double_submit_single_task"
description = "Double-activating a task submit control creates exactly one task: exactly one new node appears in the tree."
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "malformed_grove_import_rejected"
description = "Importing malformed Grove JSON or Grove CSV leaves the tree, tags, archive, and theme unchanged and shows visible validation naming the import problem"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.12"
name = "schema_invalid_grove_import_rejected"
description = "Importing parseable JSON or CSV that fails the Grove package field contract — wrong schemaVersion, theme outside light|dark|forest, status or priority outside their closed enums, tag color outside the closed hex enum, blank title, node tags longer than 5, or CSV columns that do not match the Grove CSV header — leaves the session unchanged and shows validation naming the offending field or rule"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.13"
name = "invalid_status_priority_due_date_blocked"
description = "Submitting status outside todo|in_progress|done|blocked, priority outside low|medium|high|urgent, or dueDate that is not empty and not YYYY-MM-DD shows an inline error naming the offending field and adds or saves nothing"
type = "binary"
weight = 1.0

