[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_8px_scale"
description = "Spacing and gaps follow the 8px base unit described in the visual design, with no arbitrary one-off crowding in the shell"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_spec"
description = "Typography matches the spec: app name at 96px in the ui-sans-serif/system-ui stack, secondary headings at 48px, body and task titles at 10px Arial"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "layout_matches_reference_shell"
description = "Desktop layout matches the reference screenshots shell (header, toolbar, tree beside Archive, footer create form) within a small tolerance; where screenshots and text conflict, text wins"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_animate"
description = "Row add/remove/reorder, chevron rotate, progress-ring fill, and Grove package panel enter/exit animate as specified rather than hard-cutting"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "narrow_behavior_matches_spec"
description = "At ~375px the Archive panel stacks below the tree, toolbar wraps, and nested titles wrap or truncate as specified"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "primary_secondary_buttons_match"
description = "Primary #00BC7D buttons (16px radius, soft shadow) and secondary bordered buttons match the specified treatments on New Root Task, Add Child, Export as Text, Download grove package, Move, and Archive"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "hierarchy_title_vs_body"
description = "The TaskGrove title is visually larger than Archive/Tag manager/Grove package headings, which are distinct from 10px task body text"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "hover_active_states_match"
description = "Hover and focus states on node rows, chevrons, and primary buttons match the specified treatments"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "surfaces_match_palette"
description = "In Light theme, canvas #FFFFFF, ink #0F172B, and accent #00BC7D match the specified palette; Dark and Forest keep a recognizable green accent"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "grove_panel_chrome_matches"
description = "Grove package panel tabs, monospaced preview, and Download/Copy controls match the specified chrome language rather than an unstyled default"
type = "binary"
weight = 1.0

