[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to 375px mobile keeps a usable palette library: intro, controls, and at least one Browse layout remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At 375px width, view toggles, period filter, swatches, MENU/CART, and editor submit present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "Serif lead, monospace intro body, control labels, and hex/meta remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At 375px width, no content clips or overflows the viewport."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "controls_row_stacks_at_narrow_width"
description = "At narrow widths the controls row stacks or wraps so the view toggles and the period filter both remain fully visible and operable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "intro_collapses_to_single_column"
description = "At 375px width the two-column monospace intro collapses to a single column without overlapping the lead or controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At 375px width, tap/click activation works on view toggles, period filter, swatches, MENU/CART, and palette editor controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At 375px width the page does not produce horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "palette_grid_reflows_to_one_column"
description = "The Palette-view card grid reflows across widths: multiple columns at desktop widths narrowing to a single column at phone widths with no clipped cards."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_remain_operable_at_small_widths"
description = "The cart drawer, Detail/Editor overlay, subscribe popup, and export drawer stay fully visible and operable at 375px rather than rendering off-screen."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.11"
name = "export_and_simulator_usable_at_375"
description = "At 375px width, Export format tabs, Copy/Download controls, Import package, and Layout simulator remain reachable and operable without page-level horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.12"
name = "advanced_panels_operable_at_375"
description = "At 375 pixel width the Detail/Editor color wheel, contrast matrix, batch-edit tray, undo/redo controls, and vision-simulation control fit the viewport and remain operable without horizontal scrolling"
type = "binary"
weight = 1.0

