[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_persist_queue_resets"
description = "Starting from the empty queue: select a non-default catalog category, switch the theme, change output quality and default Convert-to, and save a conversion preset; then reload. Confirm active category, theme, quality, default target, and presets survive the reload, while the conversion queue coherently resets to a single empty state with \"0 files queued\" and no phantom row — never a mix of surviving queue rows with reset settings."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "target_reversal_proves_live_state"
description = "Selection-reversal proof (genre stand-in for sort reversal): add the sample png, set Convert to webp and note the target, set Convert to jpeg and note the different target, then set Convert to webp again. Confirm the row's Convert-to value returns to webp — proving the selector is bound to live per-file state, not two hardcoded snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "quality_derived_output_sensitivity"
description = "Derived-view sensitivity: convert the sample png to jpeg at quality 100 and note the completed output size; lower quality substantially in Settings and reconvert the same file to jpeg. Confirm the completed row's output size changes meaningfully rather than redrawing an identical size regardless of quality."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "convert_echoes_in_row_counts_and_export"
description = "Cross-view echo: run Convert on a ready sample row; without reload confirm that row's status becomes Done with an output size, Download enables, the counts line reflects the same done/ready totals, and the session JSON export preview lists matching status/to/outputSize."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "sample_add_count_delta_exact"
description = "Count-delta integrity: measure the queued count on the counts line (starting from \"0 files queued\"), click \"Add sample png\" once, and re-measure immediately — the queued count increases by exactly one (no off-by-one, no lagging counter)."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_targets_different_outputs"
description = "Input-dependent output: convert the same sample source once to webp and once to jpeg (two completed rows or sequential reconverts). Confirm the two outcomes differ in output size and download extension the way the targets dictate — not byte-identical results."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_settings_batch_and_convert"
description = "Interleaved-flow integrity: add two sample files, select both and Batch set format to webp, open Settings and change quality, return to Convert and run Convert; confirm both rows still target webp, conversion completes, and neither the batch, settings edit, nor convert run corrupted the others' state."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_queue"
description = "Edge-state round-trip: add a sample file then remove it (empty state and \"0 files queued\" visible), then add a sample again and Convert; confirm the empty state clears, the row appears, counts track through both transitions, and Download enables on Done."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "mutate_then_session_export_contains_work"
description = "Full-pipeline probe ending at export text: lower quality, save a ConversionPreset, add sample png, Batch set format or retarget to webp, Convert to Done, then open session JSON export — the preview text contains schemaVersion vert-session-v1, the lowered quality, the saved preset under ConversionPreset keys, and a QueueFile entry matching the Done row (name/from/to/status/outputSize), proving the export is compiled live from session mutations."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "session_import_export_round_trip"
description = "Export→import round-trip: after mutating settings and presets with at least one file still queued, Download or Copy the session JSON, change settings/presets away, then Import that same ConversionSessionDocument — Settings, presets, and matching queued files' Convert-to targets match the pre-export mutated state, and the export preview matches again including schemaVersion vert-session-v1."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "undo_round_trip_restores_export"
description = "Undo round-trip ending at export text: remove a queued file (counts and session JSON update), Undo restores that row, prior counts, and the session JSON export preview listing; Redo removes it again and the export preview drops that file — never a surface left stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "malformed_import_leaves_store_and_undo"
description = "Import of malformed session JSON, or JSON that fails the ConversionSessionDocument field contract (wrong schemaVersion, invalid preset, or invalid QueueFile), is rejected with an inline error naming the offending field (or the import field); quality, presets, and queue targets stay unchanged, and undo history is not cleared as if the import succeeded."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.13"
name = "form_payload_echoes_in_export_contract"
description = "After a valid SettingsUpdate (quality and defaultTarget) and a valid ConversionPreset save, the session JSON export preview shows those exact field-contract values under quality, defaultTarget, and presets — the created records ARE the would-be request bodies mirrored in the export."
type = "binary"
weight = 1.0

