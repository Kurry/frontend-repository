[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "spacing_follows_4_8_scale"
description = "At 1440px, spacing among the pill navbar, hero, drop-zone card, queue rows, batch tray, and catalog cards follows a consistent 4/8px scale matching the reference screenshots — no arbitrary one-off gaps that break the converter composition."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "typography_matches_hero_and_body_spec"
description = "Typography matches the spec: an oversized hero headline paired with smaller section/card headings and muted body/caption roles, consistent with the reference screenshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.3"
name = "desktop_composition_matches_reference"
description = "At 1440px the layout matches the reference composition within a small tolerance: magenta-to-blush gradient page, floating rounded white navbar pill, bold hero \"The file converter you'll love.\", large white drop-zone card as the first-viewport focal point, then queue and \"VERT supports...\" catalog — not a generic dashboard."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "specified_state_changes_have_motion"
description = "State changes the spec calls out — file row enter/exit, Clear queue row clears, status Ready→Converting→Done, Convert/Settings/About view switches, batch-tray reveal, Session export panel enter/exit, and drop-zone dragover/press — show the specified transitions rather than hard cuts (verified via real UI controls)."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "responsive_behavior_matches_reference"
description = "At narrow widths versus 1440px, responsive behavior matches the reference patterns: hero stacks, catalog collapses to one column, file rows stack, and primary controls stay operable without horizontal page scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "controls_styled_not_browser_default"
description = "Convert-to selectors, status pills, Download/Remove actions, selection checkboxes, batch tray actions, Undo/Redo, sample affordances, preset list, Session export controls, and primary Convert control use the converter treatments from the spec rather than unstyled browser defaults."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "clear_type_hierarchy_three_roles"
description = "Typography hierarchy clearly distinguishes at least three roles: oversized hero, section/card headings, and body/muted captions."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.8"
name = "component_states_match_spec"
description = "Buttons, selectors, queue rows, and category cards show distinct default, hover wash, focus ring, pressed, selected (inset/accent ring), and disabled (Download until Done; Undo/Redo when unavailable) treatments as specified."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "magenta_accent_and_status_colors"
description = "Color treatments match the design: one magenta accent family on a light neutral base, with muted Ready, amber Converting, green Done, and red Failed/Unsupported status pills; Video support label uses the accent color for \"Server supported\"."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "microinteractions_match_spec_timing"
description = "Hover wash, pressed-on-pointer-down, drop-zone dragover highlight/scale, and status-pill transitions follow the spec's short feedback timing when exercised through real UI controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "batch_tray_and_export_match_spec"
description = "When multi-select is active, the batch tray appears as a compact bar; Session export shows format tabs with a monospaced preview; presets read as a compact named list — matching the visual_design composition rather than inventing a second dashboard."
type = "binary"
weight = 1.0

