[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "builder_controls_keyboard_operable"
description = "Every interactive editor control — Profile Header fields, Add Project and Add Testimonial forms, Skills Add, section show/hide toggles, Move Up/Down, theme swatches (Sunrise/Slate/Forest/Blossom), Density, drafts Save As Draft/Load/Delete, layout presets, bulk project checkboxes and bulk actions, Export package tabs/Copy/Download/Import, History panel Undo/Redo/Apply Scenario Change/branch selection, command palette, and Download PDF — is reachable and operable with the keyboard alone (Tab, Shift+Tab, Enter/Space)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "focus_visible_on_builder_controls"
description = "Keyboard Tab focus is visibly indicated on form fields, theme swatches, section toggles, reorder buttons, Density controls, and History panel entries."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "chrome_icons_have_accessible_names"
description = "Meaningful chrome icons for section toggles, reorder controls, delete controls, and the drafts panel expose descriptive accessible names or alt text so assistive technology can identify them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_save_feedback_announced"
description = "Inline validation and duplicate-rejection messages render adjacent to the field they describe, and the transient draft-save confirmation is exposed to assistive technology (for example via an ARIA live region) as well as shown visually."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "editor_forms_explicitly_labeled"
description = "Profile Header, Add Project, Add Testimonial, Skills, Contact, and Save As Draft form fields use explicit label elements associated with their controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "preview_heading_order_logical"
description = "In the assembled preview, the profile name renders as an h1 and section titles as h2s with no skipped heading levels (for example no jump from h1 to h3)."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "builder_landmarks_present"
description = "The app exposes semantic landmarks (for example main for the builder workspace, and navigation or complementary regions for editor chrome vs preview) so assistive technology can navigate the two-pane PortfolioFrame shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "chrome_and_preview_text_contrast"
description = "Editor chrome labels, primary buttons, preview body copy, and completeness panel text meet sufficient contrast against their warm off-white / white surfaces in the default chrome theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "toggles_and_buttons_use_semantics"
description = "Section show/hide toggles, theme swatches, Move Up/Down, Undo/Redo, and primary actions use button/switch semantics with accessible names rather than unlabeled clickable divs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_removes_list_animations"
description = "With prefers-reduced-motion set, project/testimonial/skill enter-exit and section reorder animations are removed and every state change — add, delete, reorder, theme, density, draft save — still applies instantly through the real controls."
type = "binary"
weight = 1.0

