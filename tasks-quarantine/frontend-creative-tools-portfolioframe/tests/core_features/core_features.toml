[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "1_1"
description = "On load, the app opens at / into the PortfolioFrame builder with a left editor panel and a right live preview panel, and the preview shows a friendly start-building prompt because no content exists yet"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "1_2"
description = "After typing 'Ada Lovelace' into the Profile Header Name field, the text 'Ada Lovelace' appears in the live preview's header block immediately without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "1_3"
description = "After submitting the Add Project form with a Title 'Portfolio Site' and a Category Tag, a project card showing 'Portfolio Site' and that category appears in the preview's project grid; after editing the project's Title the preview card updates, and after deleting the project it is no longer visible in the preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "1_4"
description = "After adding a skill 'Design' and then attempting to add 'design' with different letter casing, the duplicate is rejected with a visible inline message and the preview still shows exactly one 'Design' chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "1_5"
description = "After submitting the Add Testimonial form with a Quote, Name, and Role, a matching entry appears in the preview's horizontally scrollable testimonials row"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "1_6"
description = "After turning the Skills section's show/hide toggle off, the Skills section disappears from the preview while the other sections keep their relative order, and turning it back on restores it in its original position rather than at the end"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "1_7"
description = "After using a section's Move Up control, that section's position in the preview shifts above the section that was previously before it, and Move Up is disabled for the section at the top of the order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "1_8"
description = "After selecting the Forest theme, the preview's section headings and chips recolor to the Forest green accent while the surrounding editor chrome color is unchanged"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "1_9"
description = "After toggling the Density control between Compact and Spacious, the spacing between the preview's blocks visibly changes between the two settings"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "1_10"
description = "After filling one previously empty recommended field, the Completeness panel's 'x of y complete' count increases by one live without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "1_11"
description = "After entering distinctive Profile Header content, saving it with Save As Draft under a name, and performing a full page refresh, the drafts list still shows the saved draft and loading it restores the exact saved content to the editor and preview; deleting the draft removes it and it does not reappear after another refresh"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "1_12"
description = "After adding two skills in sequence, clicking Undo once removes the second skill from the preview while the first remains, clicking Undo again removes the first, and clicking Redo twice restores both in order, with Undo disabled when there is nothing left to undo and Redo disabled when there is nothing left to redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "1_13"
description = "After making several content changes, undoing one or more, and then making a different change through the real controls, the History panel's History state region and a separate selectable branch are shown, and selecting a branch restores its exact prior visible state rather than a flattened history"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "1_14"
description = "When hovering buttons, theme swatches, and section toggles, a visible hover state such as a background, border, or shadow change appears, and keyboard Tab focus is visibly indicated on interactive controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "1_15"
description = "No console.error or unhandled promise rejections appear in the browser log during the agent verifier session"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.16"
name = "1_16"
description = "The projects, skills, and testimonials collections support create, edit, and delete through visible editor controls, and each change is reflected in the live preview from shared application state without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "1_17"
description = "Editing a Profile Header field (Name, Title, or Bio) or a Contact field (Email or Location) updates the corresponding block in the live preview immediately as it is typed"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "1_18"
description = "Adding a skill that case-insensitively duplicates an existing one is rejected with a visible inline message and creates no second chip, while a distinct skill is added as a chip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "1_19"
description = "Each section's show/hide toggle immediately adds or removes that section from the preview, and toggling a hidden section back on restores it in its existing position rather than appending it at the end"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.20"
name = "1_20"
description = "Move Up and Move Down reorder the sections shown in the live preview, and the controls are disabled for the section at the top and bottom of the order"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.21"
name = "1_21"
description = "Selecting each of the four named themes (Sunrise, Slate, Forest, Blossom) recolors the preview's headings, chips, and accent text, and toggling Density between Compact and Spacious visibly re-spaces the preview blocks"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.22"
name = "1_22"
description = "The Contact section renders the Email, Location, and up to 3 custom labeled links together, with each custom link showing its own entered label"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.23"
name = "1_23"
description = "Download PDF triggers the browser's native print flow (window.print) against print-specific CSS (an @media print rule) that hides the editor chrome and shows only the assembled preview, rather than using a client-side PDF library"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "1_24"
description = "Save As Draft stores the current content under a typed name in a drafts list, loading a draft replaces the current editor and preview content with the draft's values, and deleting a draft removes it from the list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "1_25"
description = "The Completeness panel shows a live 'x of y complete' count that increases when a previously empty recommended field is filled, without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "1_26"
description = "Undo reverts the most recent content change and Redo reapplies the last undone change across multiple consecutive changes, with Undo disabled when there is nothing to undo and Redo disabled when there is nothing to redo"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "1_27"
description = "The History panel exposes a region labelled History state showing the current snapshot and an Apply Scenario Change action, and undoing one or more steps and then making a different change creates a separate selectable branch whose selection restores that branch's exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "export_package_live_preview_tabs"
description = "The Export package panel shows a live-compiled monospaced preview with Portfolio JSON and Markdown resume tabs; after setting Profile Header Name to a unique string and adding a uniquely titled project, both tabs' visible text contain those exact strings without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "export_copy_and_download_controls"
description = "Copy export puts the exact visible Export package preview text on the clipboard with a visible confirmation that reverts after a moment, and Download export produces a file whose contents match the currently visible tab (portfolio.json or resume.md)"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "import_package_round_trip"
description = "After building content and exporting Portfolio JSON, importing that package reconstructs the same visible Name, project titles, section order, theme, and density in the editor and preview without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "bulk_project_select_and_delete"
description = "Selecting at least two projects via checkboxes shows a bulk actions bar with the live selected count; Delete selected removes all selected projects from the preview grid and clears the selection, and both Export package tabs no longer contain those project titles"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "layout_presets_apply_pack"
description = "Applying a named layout preset (Classic, Compact stack, or Spotlight) instantly changes section order, visibility, theme, and density together in the preview and updates the Export package preview; Undo restores the prior layout state exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "command_palette_ctrl_k"
description = "Pressing Ctrl+K (Cmd+K on macOS) opens a command palette with a focused search input; typing narrows results across sections, presets, drafts, themes, and actions with kind labels; Enter activates the highlighted result and Escape closes the palette"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "project_status_and_featured_pin"
description = "Submitting a project with Status wip shows a WIP chip on its preview card; pinning Featured on a project renders it first with a Featured treatment, and pinning a different project moves the Featured treatment so exactly one featured project is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "project_field_contract_enforced"
description = "Add Project enforces the Project field contract: empty Title or Category Tag, Status outside shipped|wip|concept, or Title over 80 characters keeps submit disabled or shows an inline error naming that field and appends no card; a valid submit with Status wip creates a card whose WIP chip and exported project object use status wip"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "testimonial_and_draft_field_contracts"
description = "Add Testimonial rejects empty Quote/Name/Role or Quote over 400 characters with an inline error naming that field; Save As Draft rejects empty, over-60-character, or case-insensitive duplicate names with an inline error naming the name field and adds no draft"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "contact_and_profile_field_contracts"
description = "Contact rejects a non-empty email missing @ with an inline error naming email; Profile Header rejects empty or over-80-character Name with an inline error naming name; valid Contact email/location/links and Profile name appear in the preview and in Portfolio JSON under the same field names"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "portfolio_json_field_contract_shape"
description = "After adding a project and setting a profile Name, the visible Portfolio JSON preview shows schemaVersion exactly portfolioframe-v1 plus top-level keys profile, projects, skills, testimonials, contact, sections, theme, and density; each projects element includes title, categoryTag, status, and featured matching the Project field contract"
type = "binary"
weight = 1.0

