[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_to_seed"
description = "Starting from defaults: step aperture and ISO off default, create a valid preset, mark one favorite, save a snapshot, apply a look pack; then reload. Confirm every facet coherently resets — dials f/16, 1/60, ISO 100, zeroed sliders, centered meter, empty snapshots, empty undo/redo, no active look pack, and exactly the seeded presets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "favorites_filter_reversal_proves_live_list"
description = "Mark at least two presets favorite, switch to favorites-only and record the exact visible names, clear the filter, then re-enable favorites-only. Confirm the favorites-only set returns identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "filter_derived_list_sensitivity"
description = "With mixed favorites and look tags present, switch the presets filter from all → favorites-only → a specific look tag → all. Confirm the visible list membership changes meaningfully for each input."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "apply_preset_echoes_in_meter_lab"
description = "In Presets/Compare apply a seeded preset whose stops differ from the current dials; switch to Meter/Lab without reload. Confirm all three dial readouts, the preview stack, and the meter position match that preset."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "preset_create_count_delta_exact"
description = "In Presets/Compare measure the visible preset row count, create one valid preset, and re-measure immediately — the count increases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_stops_different_preview"
description = "From defaults, step aperture two stops toward open and note brightness/blur/meter; reset; then step ISO upward two stops and note brightness/grain/meter. Confirm the two outcomes differ in the ways the inputs dictate."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_dial_flows"
description = "Start creating a preset (open form, enter a name), switch to Meter/Lab and step a dial, return to Presets/Compare and finish creating a second valid preset; confirm the dial change persisted and exactly one new completed preset appears."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_presets"
description = "Delete every preset (empty state visible), then create two valid presets; confirm the empty state clears, both new rows appear, and favorites/tag filters operate on the repopulated collection."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "pixel_export_input_dependent"
description = "Export PNG at a bright edit state and again at a dark edit state; the two downloaded bitmaps differ visibly, proving export is input-dependent rather than a hardcoded file."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "edit_stack_round_trip_schema_coherent"
description = "Mutate dials and sliders, save a snapshot, Download edit stack (confirm schemaVersion camera-exposure.edit-stack.v1 and bounds), Reset, Import — every restored facet matches the export including lookPack and snapshots."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "bracket_count_delta_and_derived_names"
description = "Count-delta and derived-output probe: measure the preset count, set frame count 5, step 1, base name Dusk, Generate bracket, and re-measure immediately — the count increases by exactly five and rows Dusk -2 EV through Dusk +2 EV appear with only the shutter shifted along the discrete list; applying Dusk +2 EV writes its shifted shutter into the dials"
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "chained_scene_edit_export_differs"
description = "Chained pixel-proof probe: Download PNG at defaults in Daylight Courtyard; select Neon Alley Night (EV drops by 3, meter moves toward under-exposed, preview darkens, histogram shifts left), lower Shadows, then Download PNG again — the two exposure-export.png files are visibly different and the second matches the darker on-screen preview at export time"
type = "binary"
weight = 1.0

