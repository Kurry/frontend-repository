[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "4.1"
name = "hover_states_on_all_controls"
description = "Hovering each interactive control through real pointer movement (nav tabs, Add Spark, + New Thread, Assign to Thread, Pin, the status segmented control, tag chips, Merge Into…, Archive, tag remove buttons, Export, Import, Undo, Redo, bulk tray actions, command palette rows) shows a visible hover state, verified via computed styles while hovering"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.2"
name = "action_toasts_slide_and_dismiss"
description = "Assigning a spark, creating a thread, setting a status, pinning, merging, archiving, copying export text, and completing Import through the real controls each surface a brief confirmation toast that slides in from the right and auto-dismisses"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.3"
name = "merge_dialog_transition_two_step"
description = "Selecting Merge Into… opens a modal dialog with a brief enter transition rather than snapping open, and it requires an explicit two-step confirm (Continue, then Confirm Merge) before it executes"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.4"
name = "card_hover_shadow_and_nav_fill"
description = "Thread cards and spark cards raise their shadow on hover, the active nav tab is filled with the primary color, and inactive tabs take a hover wash"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.7"
name = "spark_enter_exit_animations"
description = "Driven through the real capture, delete, and assign controls: a newly captured spark animates into the top of the inbox rather than appearing instantly, a deleted spark animates out, and a spark leaving the inbox on assignment animates away instead of snapping"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.8"
name = "pin_reorder_animates"
description = "Clicking the Pin or Unpin toggle animates the thread card to its new position in the list rather than snapping instantly"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.9"
name = "button_press_and_hover_easing"
description = "Buttons depress slightly on press and ease their background and border color on hover, and secondary buttons wash to a light hover tint"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "4.10"
name = "export_drawer_and_palette_enter"
description = "Opening the Export drawer and the command palette via the real UI controls shows a brief opacity/scale enter transition rather than an instant hard cut"
type = "binary"
weight = 1.0

[[criterion]]
id = "4.11"
name = "bulk_tray_slides_on_selection"
description = "Selecting the first spark via its checkbox slides the bulk tray up; clearing the selection slides it away — observed through the real checkbox UI path, not a state shortcut"
type = "binary"
weight = 1.0

