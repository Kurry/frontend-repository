[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "coherent_dark_studio_palette"
description = "The UI uses a coherent dark studio palette — near-black surfaces, light shell text, and indigo/Material primary accent — consistently across header, tabs, tools, and Saved Themes."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "roboto_hierarchy_and_material_icons"
description = "Typography uses Roboto (or the bundled equivalent) with clear hierarchical size differences for the Material-UI Theme Creator brand, tab labels, tool headings, and body; Material iconography is used consistently."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "dark_shell_brand_and_typography"
description = "Header brand lockup Material-UI Theme Creator sits above the main tabs with version affordance @material-ui/core@^4.11.0 visible in the dark shell."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "preview_workspace_split_layout"
description = "On desktop, Preview shows device toggles plus framed sample site on one side and the code editor plus stacked tool panels on the other — a full-viewport tool density layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "distinct_component_state_treatments"
description = "Buttons, inputs, and accordion rows show distinct default, hover, focus (visible ring), and disabled treatments."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "preview_workspace_stacks_at_1024"
description = "At widths of 1024 pixels and below, the Preview workspace stacks vertically with device preview above editor and tool panels."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "consistent_label_capitalization"
description = "Headings, buttons, and tab labels (Preview, Components, Saved Themes, Palette rows, New Theme, Theme Files) use one consistent capitalization convention."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "status_and_validation_copy_quality"
description = "Save status reads All changes saved when appropriate; validation messages name the field and the fix; Theme Files panes are labeled JSON and CSS."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.11"
name = "empty_state_copy_explains_next_step"
description = "The Saved Themes empty state explains what belongs in the region and how to add a theme."
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "contrast_matrix_and_export_visual_anatomy"
description = "Contrast matrix rows show ratio numerals plus AA / AAA / Fail badges with distinct treatments; Theme Files shows two labeled monospace artifact panes with Copy and Download; Before/After and Color blindness sit as compact preview-stage chrome."
type = "binary"
weight = 1.0

