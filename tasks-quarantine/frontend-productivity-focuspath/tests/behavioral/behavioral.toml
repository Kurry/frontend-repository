[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "14.1"
name = "multi_facet_reload_resets_empty"
description = "Multi-facet round-trip: create a goal with a milestone and step, toggle Focus Today, open Completed Goals visibility, and switch into the goal detail view; then reload. All facets coherently reset to the empty in-memory baseline (empty overview, no focus, empty undo) — never a mix of surviving and reverted facets."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.2"
name = "target_date_sort_reversal_live"
description = "Sort-reversal proof: create three goals with distinct target dates so nearest-first order is visible; then edit the furthest goal's target date to become the nearest; confirm the overview card order updates to place that goal first — proving order is derived from live target dates rather than a hardcoded list."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.3"
name = "step_toggle_derived_percent_and_export"
description = "Derived-view sensitivity: on a goal with 4 steps, complete 2 (50%) then a 3rd (75%); confirm the detail percentage, overview card percentage, progress-bar fills, and Path Pack completionPercent each change meaningfully rather than redrawing identically."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.4"
name = "focus_quick_complete_cross_view_echo"
description = "Cross-view echo: tick a Today's Focus quick-complete checkbox; without reload confirm the same step is checked in its milestone checklist, the goal percentage updates on overview and detail, Daily Velocity increments, and Export Markdown shows the step checked."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.5"
name = "mark_complete_count_delta_exact"
description = "Count-delta integrity: measure active goal cards, confirm Mark Goal Complete on a 100% goal, and re-measure immediately — the active count decreases by exactly one."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.6"
name = "different_titles_different_exports"
description = "Input-dependent output: create a goal titled Alpha Path then Export; delete it (or Undo); create a goal titled Beta Path then Export; confirm the two Path Pack JSON texts differ by those titles rather than being byte-identical."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.7"
name = "interleaved_create_and_detail_flows"
description = "Interleaved-flow integrity: start creating a goal (open form, type a title but do not submit), open another goal's detail and add a milestone, then return and submit the new goal; confirm exactly one new overview card appears and the other goal's milestone remains."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.8"
name = "empty_then_repopulate_overview"
description = "Edge-state round-trip: delete every goal until the empty-state CTA shows, then create two goals with milestones; confirm empty state clears, both cards appear, and percentages/focus surfaces track."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.9"
name = "export_import_round_trip_preserves_path"
description = "Mutate → derived → export → import: create a goal with a milestone and two steps, check one step, Focus Today the other; confirm percentages and Export reflect that; Download Path Pack JSON; delete the goal; Import the file; confirm overview, detail, focus, Daily Velocity, and Export match the pack."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.10"
name = "undo_round_trip_restores_surfaces"
description = "Undo round-trip: complete a step (percentage, node fill, Export update), Undo restores prior incomplete state everywhere those surfaces show it, Redo reapplies the completion everywhere — never a surface left stale."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.11"
name = "path_pack_contract_round_trip_probe"
description = "Mutate → export contract → import: create a goal with accentColor #c98a3d, a milestone, and a completed step; open Path Pack JSON and confirm visible text includes format focuspath-path-pack-v1, that accentColor, createdAt fields, and completed true on the step; Download; change the goal; Import the downloaded JSON; confirm editor surfaces and Export restore the exported contract values."
type = "binary"
weight = 1.0

[[criterion]]
id = "14.12"
name = "schema_invalid_import_leaves_state"
description = "Starting from a known goal selection, attempt Import of parseable JSON with format not equal to focuspath-path-pack-v1 or with accentColor outside the 8-swatch enum; confirm goal count, focus, and Export stay unchanged and validation names the offending field."
type = "binary"
weight = 1.0

