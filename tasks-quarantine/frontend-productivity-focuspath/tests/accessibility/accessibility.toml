[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Every interactive control (buttons, checkboxes, reorder arrows, Focus Today toggles, stream controls, Undo, Redo, Export, Import, command palette) is reachable and operable with the keyboard alone via Tab, Shift+Tab, Enter, or Space."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "export_import_palette_focus_trap"
description = "Export, Import confirmation, and the command palette trap focus while open, close on Escape, and return focus to the control that opened them."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls in the header, stream panel, and path reorder affordances expose accessible names (aria-label or equivalent) rather than unnamed decorative-only controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_and_copy_live_regions"
description = "Inline validation messages and Export Copy confirmation are conveyed visually and via an aria-live region or equivalent accessible announcement."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Goal, milestone, step, and Import form fields use visible labels associated with their inputs."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "Headings for FocusPath, overview, goal detail, Today's Focus, and Completed Goals follow a logical order without skipping levels in a way that breaks outline navigation."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_navigation_present"
description = "The page exposes landmark regions (for example main and complementary for Today's Focus or stream) so assistive technology can jump between primary areas."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Primary text on the off-white background and teal primary buttons with white text have sufficient color contrast for readable UI chrome."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_used"
description = "Interactive controls use semantic button/checkbox roles (or equivalent ARIA) rather than clickable bare divs for New Goal, Focus Today, Undo, Redo, and stream controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_is_respected"
description = "With prefers-reduced-motion set, animations are removed or near-instant while state changes still land correctly."
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "undo_redo_disabled_exposed"
description = "Undo and Redo expose their disabled state to assistive technology when their stacks are empty."
type = "binary"
weight = 0.5

[[criterion]]
id = "1.12"
name = "state_not_color_alone"
description = "Checked versus unchecked steps, disabled reorder controls, and the read-only completed path are distinguishable without relying on color alone."
type = "binary"
weight = 1.0

