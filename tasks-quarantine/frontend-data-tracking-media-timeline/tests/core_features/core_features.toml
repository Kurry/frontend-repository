[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "scrub_explore_stage_with_pins"
description = "On load, Scrub/Explore mode shows a timeline stage with seeded event pins or markers for MediaTimeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "library_shows_seeded_events"
description = "On load (or after opening Library/Filter), the events list shows multiple seeded events with title and year visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "create_signal_tower_demo_visible"
description = "After creating an event titled Signal Tower Demo with type Milestone, timestamp 1920-01-01T00:00:00.000Z, mediaRefs containing signal-tower-demo, and a valid year, the text Signal Tower Demo is visible in the events list and the Timeline JSON preview includes that title with matching type, timestamp, and mediaRefs"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "three_creates_add_three_rows"
description = "After adding 3 new events on top of the initial user-managed count, the list shows exactly 3 more rows than before those creates"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "category_filter_narrows_visible_set"
description = "After filtering by a category/band (with mixed categories present), only matching events remain visible in the filtered list or stage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "edit_title_to_evening_broadcast"
description = "After editing an event title to 'Evening Broadcast', the text 'Evening Broadcast' is visible and the previous title is not"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "delete_removes_title_from_list"
description = "After deleting an event, that event's title is no longer visible in the events list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "empty_state_after_clearing_user_events"
description = "After deleting all user-managed events (or clearing the editable set), an empty state is visible in the list region"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "empty_title_blocks_create"
description = "After submitting create with an empty required title, the events count does not increase and validation feedback is visible"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "scrubber_updates_visible_pins"
description = "After adjusting the year scrubber/window, the set of visible pins or in-view count updates without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "mode_switch_without_reload"
description = "After switching between Scrub/Explore and Library/Filter modes, the main canvas shows the other mode without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "hover_wash_on_pins_and_controls"
description = "When hovering pins, list rows, or scrubber controls, a visible hover wash, scale, or glow appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.15"
name = "zoom_pan_updates_in_view_count"
description = "After zooming or panning the stage, the 'N events in view' count updates without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.17"
name = "crud_updates_shared_collection"
description = "Timeline events collection supports create, edit, and delete with list rows and derived counts updating from shared application state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.18"
name = "two_interaction_modes_switchable"
description = "At least two distinct views or interaction modes are switchable without full page navigation"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.19"
name = "filters_recompute_from_shared_collection"
description = "Domain state beyond CRUD is implemented (filters, status/priority/mode, or equivalent) and recomputes visible results from the shared collection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.23"
name = "pin_opens_detail_with_stepping"
description = "Clicking an event pin opens an in-page detail with kicker (year and place), title, category, and body, and Previous/Next controls or the arrow keys step through the currently filtered events while a close control or Escape returns to the stage"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.24"
name = "five_era_bands_and_current_era_label"
description = "At least five named era bands wash the stage and a current-era label updates to the era at the window midpoint as the year window moves"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "dual_handle_scrubber_and_fit_all"
description = "The dual-handle year scrubber and numeric year from/to inputs set the visible window with a BCE/CE readout, and a fit-all/reset control returns to the full span"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "pin_hover_label_and_offset"
description = "Hovering an unclustered event pin reveals a label with title, place, and BCE/CE year, and overlapping same-year pins offset so each stays individually clickable"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.27"
name = "in_view_and_catalogued_count_readouts"
description = "An event-count readout ('N events in view') and a result note ('Showing N of M catalogued events') update as filters and the year window change"
type = "binary"
weight = 0.5
optional = true

[[criterion]]
id = "1.29"
name = "create_flow_syncs_list_count_and_pin"
description = "Starting in Library/Filter mode, creating a valid event adds exactly one row to the event list and increases the 'Showing N of M catalogued events' readout by exactly one (measured immediately before and after the submit), and switching to Scrub/Explore mode shows the new event's pin at its year position when the year window covers it, all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.30"
name = "edit_flow_updates_list_pin_and_detail"
description = "Editing a user-managed event's title and year updates that same record in its library list row, in its stage pin position and hover label, and in any open detail panel, all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.31"
name = "delete_flow_clears_all_surfaces_and_counts"
description = "Deleting a user-managed event removes its list row, removes its pin from the stage, clears it from any open detail or selection, and decreases both the 'Showing N of M catalogued events' readout and the 'N events in view' readout by exactly one, measured immediately around the delete"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "category_filter_syncs_stage_list_and_counts"
description = "Disabling one category filter immediately removes that category's pins from the stage, drops the same events from the library list, and lowers the 'N events in view' readout; re-enabling it or using clear-filters restores the same pins, rows, and counts exactly"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "scrubber_window_syncs_count_era_and_inputs"
description = "Narrowing the year window with the scrubber lowers the 'N events in view' readout to only events inside the window, updates the current-era label to the era at the new midpoint, and the numeric year from/to inputs show the same bounds the scrubber set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "detail_stepping_follows_filtered_order"
description = "After disabling a category filter, stepping through events with Previous/Next controls or the left/right arrow keys in the open detail never lands on an event from the disabled category"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "reload_restores_seeded_baseline_coherently"
description = "After creating an event, disabling a category filter, narrowing the year window, and performing an undoable mutation, a page reload returns every facet to the seeded state together — seeded corpus, default year window, all categories enabled, empty undo/redo stacks, no selection, and no user-created events — never a partial mix of reset and surviving facets"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "double_submit_adds_single_event"
description = "Double-activating the create form's submit control in quick succession adds exactly one event: the collection count increases by one and exactly one new row appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "empty_state_offers_recovery_control"
description = "When filters or the year window match nothing, or all user-managed events are deleted, the empty state shows a message plus a working control that restores filters or opens the create flow"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "fit_all_full_span_and_stable_zoom_midpoint"
description = "The fit-all/reset control returns the window to the full seeded span, and wheel zoom keeps the year-window midpoint stable so events do not jump from one side of the stage to the other while zooming"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "search_recomputes_results_and_matched_count"
description = "Entering a free-text search that matches only some events narrows the visible list and pins to matches over title, place, or summary and the result note shows the matched count; clearing the search restores the full set"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "about_overlay_opens_in_page"
description = "An About/help overlay opens in-page with how-to copy and no outbound links, and a close control or Escape returns to the app without leaving the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "library_list_scrolls_without_blank_gaps"
description = "Scrolling the Library/Filter event list rapidly from top to bottom through the full seeded corpus shows continuous rows with no blank gaps or stutter"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "timeline_event_request_body_field_contract"
description = "Create and edit forms enforce the TimelineEvent request-body field contract: title trimmed 1–120; type exactly one of Milestone/Invention/Release/Publication/Broadcast; timestamp an ISO-8601 datetime ending with Z whose UTC year equals year when year >= 1 (or timestamp exactly 0001-01-01T00:00:00.000Z when year < 1); mediaRefs a non-empty array of 1–8 trimmed 1–64 character labels; year integer -4000..2100; place trimmed 1–80; summary trimmed 1–2000; categories a non-empty closed-enum subset of Print/Broadcast/Photography/Cinema/Computing/Networks/Audio/Typography/Publishing/Telecom; empty title, invalid type, bad timestamp, empty mediaRefs, invalid year, empty place, empty summary, or zero categories shows an inline error naming that field, and submit stays disabled or rejects until valid"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "seeded_corpus_density_matches_spec"
description = "The seeded corpus is on the order of 60 events spanning at least 10 categories and at least 5 named eras, verifiable from the 'Showing N of M catalogued events' readout, the category filter list, and the era bands"
type = "binary"
weight = 0.5

[[criterion]]
id = "1.44"
name = "shift_wheel_translates_year_window"
description = "In Scrub/Explore mode, Shift+wheel (or a dominant horizontal wheel gesture) over the stage translates the year window — the from/to readout shifts and pins move accordingly — rather than zooming or scrolling the page"
type = "binary"
weight = 0.5


[[criterion]]
id = "1.45"
name = "closed_category_enum_and_named_eras"
description = "Category filters expose exactly the ten closed enum labels Print, Broadcast, Photography, Cinema, Computing, Networks, Audio, Typography, Publishing, and Telecom, and the stage shows the five named era bands Oral Tradition, Manuscript Age, Print Revolution, Broadcast Era, and Network Age"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "category_density_strip_tracks_in_view"
description = "A category density strip lists each enabled category with a live count of events currently in view; narrowing the year window or toggling a category filter changes those counts in the same interaction"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "library_year_sort_reverses_order"
description = "Switching the Library year sort between Year ascending and Year descending reverses the visible library row order relative to the other choice"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "multi_select_tray_batch_categorize"
description = "Selecting two or more user-managed library rows reveals a selection tray; Batch categorize applies one chosen closed-enum category to every selected user-managed event at once and updates list badges, pin colors, density counts, and the Timeline JSON export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "batch_delete_removes_selected_count"
description = "Selecting two user-managed events and confirming Batch delete decreases the catalogued-events count by exactly two, removes both rows and pins, and drops both titles from the Timeline JSON export preview"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.50"
name = "undo_redo_restore_mutations"
description = "After deleting a user-managed event, Undo restores that event's row, pin, and counts; Redo deletes it again; after a new create following an undo, Redo is disabled"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.51"
name = "export_drawer_three_live_formats"
description = "Opening Export timeline shows an export drawer with Timeline JSON, Events CSV, and Window Markdown tabs; each tab shows a monospaced preview compiled live from the current store, and Copy shows a brief confirmation while Download starts a file download of the same preview text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "timeline_json_package_field_contract"
description = "The Timeline JSON preview conforms to the package field contract: required keys version, document exactly media-timeline, window.fromYear, window.toYear, enabledCategories, eras (name/fromYear/toYear), and events entries each carrying title, type, timestamp ending with Z, mediaRefs, year, place, categories, summary, and source matching the TimelineEvent contract"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.53"
name = "export_reflects_session_mutations"
description = "After creating an event with a distinctive title, type, timestamp ending with Z, and mediaRefs, both the Timeline JSON and Events CSV export previews contain that title plus matching type/timestamp/mediaRefs before copy or download; after deleting it, the title is absent from both previews"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.54"
name = "import_timeline_json_round_trip"
description = "After mutating the collection, importing a previously exported Timeline JSON restores library titles, types, years, mediaRefs, enabled categories, year window, density counts, and export previews to match the pre-export mutated state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.57"
name = "events_csv_header_and_media_refs_join"
description = "Events CSV preview shows header line title,type,timestamp,mediaRefs,year,place,categories,summary,source with categories pipe-joined and mediaRefs semicolon-joined on each data line"
type = "binary"
weight = 1.0

