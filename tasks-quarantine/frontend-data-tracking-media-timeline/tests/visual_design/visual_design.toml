[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "3.1"
name = "exploration_first_composition"
description = "Timeline stage plus scrubber/library composition stays exploration-first, not a marketing card stack"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.2"
name = "empty_state_visually_present"
description = "Empty list/filter state is visually present when no events match"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.4"
name = "expressive_typography_and_paper_stage"
description = "Typography is expressive rather than Inter, Roboto, or system default fonts, and the stage carries a warm or cool paper atmosphere rather than a plain default-white background"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.5"
name = "category_color_and_detail_hierarchy"
description = "Event pins or list rows show their category color, and the detail surface presents a clear hierarchy of kicker (year · place), title, type, mediaRefs, category, and body"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.6"
name = "single_consistent_icon_set"
description = "Chrome controls (mode switch, filters, close, navigation, undo/redo, export) share one consistent icon set with no visibly mixed icon styles"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.7"
name = "narrow_layout_stacks_and_stays_usable"
description = "At 768px viewport width and below, the stage and Library/Filter stack or the library becomes a drawer/sheet, and both modes stay reachable and usable"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.9"
name = "bce_ce_year_format_consistent"
description = "Years render in a consistent BCE/CE format everywhere they appear: the scrubber readout, pin hover labels, the detail kicker, and list rows"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.10"
name = "validation_and_empty_copy_actionable"
description = "Validation messages name the field and the fix, empty states explain what matched nothing and how to recover, and the About/help copy explains both interaction modes in complete sentences"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.12"
name = "mediatimeline_brand_and_tool_first_viewport"
description = "The product name MediaTimeline appears with History of Media and Communication as the brand signal, and the first viewport is the timeline tool itself rather than a marketing hero"
type = "binary"
weight = 1.0

[[criterion]]
id = "3.13"
name = "export_drawer_and_density_chrome"
description = "The export drawer shows format tabs, a monospaced preview, and Copy / Download actions; the selection tray appears in Library/Filter when multi-select is active; the category density strip reads as a compact tally near filters or scrubber"
type = "binary"
weight = 1.0

