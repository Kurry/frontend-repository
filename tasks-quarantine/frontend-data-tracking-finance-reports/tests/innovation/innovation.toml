[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.25

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "11.1"
name = "polished_ledger_brand_moments"
description = "Beyond the required soft mint shell, the Ledger brand lockup or sidebar treatment shows an extra polished brand moment that strengthens product identity"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.2"
name = "thresholds_panel_clarity"
description = "The thresholds panel presents under/near/over status with clarity beyond a bare number, such as progress bars or concise status chips that remain readable"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.3"
name = "export_preview_readability"
description = "The export drawer preview is especially readable (syntax highlighting, section headers, or sticky Download/Copy chrome) beyond a plain monospace dump"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.4"
name = "undo_redo_affordance_clarity"
description = "Undo/Redo controls communicate stack availability clearly (disabled styling, tooltips, or last-action labels) beyond bare enabled buttons"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.5"
name = "currency_switch_feedback"
description = "Switching display currency provides a brief confirmation or rate hint so the conversion is understandable without reading the instruction"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.6"
name = "coachmarks_or_print_stylesheet"
description = "Optional first-run coachmarks on Export or Thresholds, or a printable stylesheet for the export preview, are present as an enhancement"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.7"
name = "sankey_legend_polish"
description = "Breakdown sankey labeling or legend polish exceeds minimum readability (stable node layout, clear amount formatting)"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.8"
name = "empty_state_illustration_quality"
description = "The empty transactions state uses a thoughtful illustration or structured guidance beyond a single terse line"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.9"
name = "keyboard_shortcut_legend"
description = "A keyboard shortcut legend for Undo/Redo or Export is available as an optional enhancement"
type = "binary"
weight = 0.5

[[criterion]]
id = "11.10"
name = "fx_rate_transparency"
description = "Mock FX rates used for EUR/GBP conversion are visible somewhere in the UI (tooltip, footer, or currency control) so conversions are inspectable"
type = "binary"
weight = 0.5

[[criterion]]
id = "innovation.catchall"
name = "innovation_catchall"
description = "The app exhibits a significant positive innovation or polish beyond the specification that is NOT covered by any other criterion in this file. If present, name the enhancement and cite the concrete evidence. If nothing beyond-spec stands out, answer no."
type = "binary"
weight = 0.5
