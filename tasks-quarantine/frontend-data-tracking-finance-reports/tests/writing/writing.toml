[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000
weight = 0.5

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "15.1"
name = "consistent_capitalization"
description = "Where the app renders headings, nav items, and buttons, one consistent capitalization convention is used throughout"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.2"
name = "validation_messages_name_field_and_fix"
description = "Where the app renders validation messages, they name the field and the fix rather than only saying Invalid"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.3"
name = "empty_states_explain_region"
description = "Where the app renders an empty state, it explains what belongs in the region and how to add it"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.4"
name = "export_import_labels_are_specific"
description = "Where the app renders export and import controls, labels are specific (Export, Import, Download JSON, Download CSV, Copy) rather than generic placeholders"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.5"
name = "currency_formatting_consistent"
description = "Where the app renders currency amounts, formatting is consistent across cards, table, legends, thresholds, and export preview for the active display currency"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.6"
name = "seeded_copy_reads_as_finance_data"
description = "Where the app renders seeded payees, categories, and amounts, they read as plausible synthetic finance data"
type = "binary"
weight = 0.5

[[criterion]]
id = "15.7"
name = "toasts_name_confirmed_action"
description = "Where the app renders toasts, they name the action they confirm"
type = "binary"
weight = 0.5

