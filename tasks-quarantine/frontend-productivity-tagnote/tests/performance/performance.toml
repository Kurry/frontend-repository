[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "9.1"
name = "interactive_within_two_seconds"
description = "The app is interactive within 2 seconds of a local cold load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.2"
name = "console_clean_on_load"
description = "No console errors or warnings appear on initial load"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.3"
name = "console_clean_full_exercise"
description = "No console errors or warnings appear during send, filter, bulk, export, import, and undo exercise"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.4"
name = "rapid_send_stays_responsive"
description = "The UI stays responsive during rapid repeated sends with no hangs or blank screens"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.5"
name = "export_import_non_blocking"
description = "Opening Export or Import and copying/downloading does not freeze the timeline or drop interactions"
type = "binary"
weight = 1.0

[[criterion]]
id = "9.6"
name = "state_changes_remain_interactive"
description = "The UI remains interactive during state changes."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.7"
name = "animations_maintain_smooth_frame_rate"
description = "Animations maintain a smooth 60fps; games maintain a stable frame rate during play."
type = "binary"
weight = 1.0

[[criterion]]
id = "9.8"
name = "rapid_input_does_not_freeze"
description = "The app does not hang or freeze even under rapid user input."
type = "binary"
weight = 1.0

