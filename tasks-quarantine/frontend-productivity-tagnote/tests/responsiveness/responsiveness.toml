[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "no_horizontal_scroll_375"
description = "At approximately 375px wide there is no page-level horizontal scrolling"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "tag_rail_and_chips_scroll_locally"
description = "At ~375px the tag rail and search syntax chips scroll horizontally inside their own containers rather than breaking the layout"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "composer_pinned_narrow"
description = "At ~375px the composer stays pinned and legible at the bottom"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "export_bulk_usable_narrow"
description = "At ~375px Export tabs, Copy, Download, and the bulk tray stay fully visible and operable"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "desktop_centered_column"
description = "At desktop widths the single centered column keeps its maximum width while the canvas fills remaining space"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "long_url_wraps"
description = "A long unbroken URL wraps inside its bubble rather than overflowing the column at narrow and desktop widths"
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_touch_gestures_work"
description = "Touch gestures such as swipe and tap work on mobile where present."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "small_screens_avoid_horizontal_scroll"
description = "Small screens have no horizontal scrolling."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "media_and_canvases_resize"
description = "Images, grids, and canvases size responsively to fit the layout."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "fixed_controls_remain_accessible"
description = "Fixed controls remain accessible on all devices."
type = "binary"
weight = 1.0

