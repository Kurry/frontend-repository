[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "first_note_empty_state_prompt"
description = "On load with an empty timeline, a friendly empty-state prompt invites the user to send the first note rather than showing a blank area"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "send_appends_under_today_and_clears"
description = "After typing a note and clicking Send (or pressing Enter), the note appears under a Today date header with its exact text and the composer input clears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "hash_tokens_parsed_to_tag_chips"
description = "After sending a note reading call mom #family #todo, the bubble shows exactly two tag chips reading family and todo beneath its text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "url_auto_link_tag_and_anchor"
description = "After sending a note containing an https:// URL and no typed tags, the note automatically gains a link tag chip and the URL renders as a clickable anchor inside the bubble"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "case_insensitive_tag_dedup_count"
description = "When one note contains #Work and another contains #work, the tag rail lists a single work tag with a usage count of 2 and clicking it filters the timeline to both notes, showing case-insensitive deduplication"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "tag_rail_filter_toggle_clear"
description = "When a tag is clicked in the rail, the timeline filters to only notes carrying it and a Clear filter control appears; clicking the same tag again restores the full timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "todo_tag_open_done_split"
description = "After marking a shared tag as a TODO tag and checking one of its two notes done, that tag's filtered view splits into an Open section containing the unchecked note and a Done section containing the checked note"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "pin_unpin_section_roundtrip"
description = "When a note is Pinned it moves into a Pinned section above the chronological timeline, and Unpin returns it to its original chronological position"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "edit_rederives_tags_and_links"
description = "After Editing a note whose text originally had one tag, changing the text to a different tag plus a URL and saving, the note shows the new tag chip and an auto-added link chip while the original tag no longer applies"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "delete_confirm_cancel_no_count_change"
description = "When Delete is used a confirmation dialog appears; canceling leaves the note in place in every view and changes no visible counts, while confirming permanently removes it from the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.11"
name = "archive_unarchive_position_roundtrip"
description = "After archiving a note it disappears from the main timeline and appears in the Archived view, and Unarchive restores it to its original chronological position in the main timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.12"
name = "calendar_today_marker_filter_toggle"
description = "When the Calendar control is opened, today's day cell shows a marker; clicking that day filters the timeline to notes created today and clicking it again clears the filter and restores the full timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.13"
name = "reload_resets_to_empty_baseline"
description = "After creating notes, pinning, tagging, and opening Export, a full page refresh returns the app to the empty seeded baseline: empty timeline with the first-note empty-state prompt, empty tag rail, and no active filters — never a mix of surviving notes with reset chrome"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.14"
name = "undo_redo_adjacent_states"
description = "After making two visible changes, activating Undo restores the immediately previous visible state and activating Redo re-applies the undone change, while Apply Scenario Change commits a new visible transition, without disturbing unrelated notes"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.25"
name = "attach_file_chip_and_file_tag"
description = "Attaching a file through the Attach File control shows a chip with the file's name and human-readable size on the note and automatically adds a file tag to it"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.26"
name = "search_across_text_tags_within_filter"
description = "Search filters the visible list across both note text and tag names, narrows within an active tag filter, and shows a no results message when nothing matches"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.27"
name = "date_group_headers_stable_on_edit"
description = "The timeline groups notes under Today / Yesterday / full-date headers keyed to original creation date, and editing a note does not move it to a new date group"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.28"
name = "calendar_month_grid_markers_navigation"
description = "The Calendar month grid marks days that have notes, filters the timeline to a clicked day's notes, clears on a second click, and navigates months via Previous and Next"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.29"
name = "history_panel_branching_states"
description = "Undo/Redo plus Apply Scenario Change model an explicit history: the History panel shows a History state region and undoing then making a different change yields a separately selectable branch that restores its exact prior visible state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.32"
name = "single_page_shell_layout"
description = "The app opens at / into a single-column shell showing a sticky top bar titled TagNote with Calendar, Archived, History, Export, Import, Apply Scenario Change, Undo, and Redo controls, a search field, a horizontal tag rail, the note timeline, and a composer pinned to the bottom, and exercising these controls never navigates away from the page"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.33"
name = "composer_bold_italic_toggle_roundtrip"
description = "Selecting text in the composer and activating Bold renders that span bold in the composer and in the sent note bubble, Italic works the same way, activating the same toggle again on the same span removes the formatting, and a formatted note parses exactly the same hash-word tag chips as its unformatted plain text would"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.34"
name = "composer_local_undo_shortcut"
description = "Pressing the standard undo keyboard shortcut while typing in the composer reverts the last typing or formatting change inside the composer only, leaving the timeline's own Undo/Redo history and existing notes untouched"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.35"
name = "edit_mode_save_cancel_formatting"
description = "Activating Edit on a note loads its text with bold/italic formatting preserved into the composer, which switches to an Editing note mode with Save and Cancel controls; Cancel discards the edit and leaves the note unchanged while Save applies the new text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.36"
name = "blank_submit_blocked_with_inline_error"
description = "Activating Send with a blank or whitespace-only composer appends no note and shows a visible inline error message naming the note text field (a silently disabled Send control alone is insufficient), and the last valid timeline state stays intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.37"
name = "double_send_appends_exactly_one"
description = "Double-activating Send in rapid succession on the same composer text appends exactly one note: the visible note count increases by exactly one and exactly one new bubble appears"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.38"
name = "send_flow_rail_counts_chain"
description = "Starting from a loaded timeline, type call mom #family #todo and send: exactly one new bubble appears under the Today header, the visible note count measured immediately before and after differs by exactly one, and the tag rail family and todo chips each increase their usage count by one (appearing with count 1 when new), all without a reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.39"
name = "bold_format_edit_export_marks_chain"
description = "Bold a word in the composer and send, confirm the sent bubble renders the word bold, then edit that note, toggle the bold off, and save, confirming the saved bubble renders it plain; opening Export after each of the two steps shows Session JSON marks that match the visible formatting state"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.40"
name = "archive_rail_counts_multisurface_chain"
description = "Archiving a note removes its bubble from the main timeline (visible count down by exactly one), immediately decreases its tags' usage counts in the rail with a tag used only by that note leaving the rail entirely, and the Archived view lists the note; Unarchive then returns it to its original chronological position and restores the rail counts, all without a page reload"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.41"
name = "todo_done_split_export_chain"
description = "Marking work as a TODO tag adds a checkbox to every timeline note carrying work; checking one of those notes inside the work filtered view moves it from the Open section to the Done section immediately, and Session JSON lists work under todoTags with that note done true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.42"
name = "note_text_field_contract_blank_and_length"
description = "Sending blank/whitespace-only composer text or text longer than 2000 characters appends no note and shows an inline validation message naming the text field; the last valid timeline stays intact"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.43"
name = "search_syntax_chips_filter"
description = "Clicking the tag:family search syntax chip fills the search field with tag:family and narrows the visible list to family-tagged notes; clearing the field restores the prior unfiltered list"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.44"
name = "bulk_archive_selected_updates_surfaces"
description = "Selecting 2 notes and activating Archive selected moves both into the Archived view, decreases the main timeline visible count by exactly 2, updates tag rail counts, and clears the selection"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.45"
name = "export_session_json_field_contract"
description = "Opening Export shows a Session JSON preview whose visible text includes schemaVersion equal to tagnote-session/v1, exportedAt, todoTags, and notes keys; after sending a distinctive note with #family and pinning it, the preview contains that note text and family tag with pinned true"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.46"
name = "export_timeline_markdown_reflects_session"
description = "After sending a distinctive note, the Timeline Markdown export tab preview contains that note text and its tags as hash-words under a date grouping matching the timeline"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.47"
name = "export_copy_and_download_controls"
description = "On an Export format tab, Copy places the preview text on the clipboard with a visible confirmation, and Download triggers a real file download whose contents match the previewed text"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.48"
name = "import_session_json_round_trip"
description = "After exporting a Session JSON document that includes at least one distinctive pinned note, clearing the session via reload, and Importing that JSON, the timeline shows the same bubble text, pin state, and matching tag rail counts"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.49"
name = "import_invalid_field_contract_rejected"
description = "Importing JSON with wrong schemaVersion or a mark style outside bold|italic leaves notes and rail counts unchanged and shows visible validation naming the offending field"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.52"
name = "done_syntax_chips_and_combined_query"
description = "The search syntax chip row offers at least tag:family, tag:todo, done:open, and done:done; clicking done:open narrows the visible list to unchecked notes carrying any TODO-designated tag and done:done to checked ones, and adding a typed keyword after a chip token applies both constraints simultaneously"
type = "binary"
weight = 1.0

