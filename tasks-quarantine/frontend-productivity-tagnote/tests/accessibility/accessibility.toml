[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "1.1"
name = "controls_keyboard_accessible"
description = "Top bar controls, tag rail chips, search syntax chips, note actions, selection checkboxes, bulk tray actions, Export/Import controls, and the composer are keyboard accessible with Tab, Shift+Tab, Enter, or Space"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.2"
name = "dialogs_manage_focus"
description = "Delete confirmation, Export panel, and Import panel trap focus while open, close on Escape, and return focus to the control that opened them"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.3"
name = "icons_have_accessible_names"
description = "Icon-only controls expose accessible names describing their action"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.4"
name = "validation_uses_live_regions"
description = "Composer inline validation and Import validation messages are announced through an aria-live polite region as well as shown visually"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.5"
name = "forms_have_explicit_labels"
description = "Composer and Import fields use visible labels or accessible names associated with the controls"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.6"
name = "headings_follow_logical_order"
description = "TagNote title and date-section headings follow a logical order without skips"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.7"
name = "landmark_regions_present"
description = "The shell exposes landmark regions (banner/main/complementary or equivalent) so the timeline and composer are distinguishable"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.8"
name = "text_and_controls_have_contrast"
description = "Primary ink on #F5F5F7 canvas and #007AFF controls on near-white text keep sufficient contrast"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.9"
name = "semantic_html_roles_used"
description = "Interactive controls use button/input semantics rather than clickable bare divs for Send, Export, and note actions"
type = "binary"
weight = 1.0

[[criterion]]
id = "1.10"
name = "reduced_motion_respected"
description = "With prefers-reduced-motion set, shake, bubble, toast, tray, and export animations are removed while features remain usable"
type = "binary"
weight = 1.0

