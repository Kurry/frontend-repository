[judge]
judge = "codex"
model = "gpt-5.6-sol"
prompt_template = "../system_prompt.md"
cwd = "/logs/verifier"
mode = "batched"
timeout = 3000

[[judge.mcp_servers]]
name = "webmcp"
transport = "stdio"
command = "node"
args = [
  "/tests/webmcp_stdio_server.mjs",
]
allowed_tools = [
  "webmcp_session_info",
  "webmcp_list_tools",
  "webmcp_invoke_tool",
]

[[judge.mcp_servers]]
name = "playwright"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_navigate_back",
  "browser_resize",
  "browser_tabs",
  "browser_click",
  "browser_close",
  "browser_console_messages",
  "browser_drag",
  "browser_evaluate",
  "browser_file_upload",
  "browser_fill_form",
  "browser_handle_dialog",
  "browser_hover",
  "browser_network_requests",
  "browser_press_key",
  "browser_select_option",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_type",
  "browser_wait_for",
]

# Observation browser with prefers-reduced-motion forced (the entrypoint's second
# Chrome, --force-prefers-reduced-motion, CDP $WEBMCP_RM_CDP_ENDPOINT). Use ONLY
# for reduced-motion criteria; every other criterion is graded on `playwright`.
[[judge.mcp_servers]]
name = "playwright_reduced_motion"
transport = "stdio"
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.76",
  "--browser",
  "chromium",
  "--cdp-endpoint",
  "$WEBMCP_RM_CDP_ENDPOINT",
  "--isolated",
  "--output-dir",
  "/logs/verifier/screenshots",
]
allowed_tools = [
  "browser_navigate",
  "browser_resize",
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_evaluate",
  "browser_console_messages",
  "browser_wait_for",
  "browser_press_key",
  "browser_click",
  "browser_hover",
]

[scoring]
aggregation = "weighted_mean"

[[criterion]]
id = "7.1"
name = "layout_adapts_1440_to_375"
description = "Resizing from 1440px desktop to roughly 375px mobile keeps a usable PaneCraft workspace: header, page tabs, library or its mobile equivalent, and panes remain present and operable at both widths."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.2"
name = "mobile_tap_targets_adequate"
description = "At roughly 375px width, Add Page, Create Pane, page tabs, pane Edit/Delete/Share, and date-range controls present tap targets at least 44px in at least one dimension."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.3"
name = "typography_readable_both_widths"
description = "PaneCraft title, pane titles, and body/table text remain legible at both 1440px and 375px — type scales or reflows without becoming unreadably small on mobile."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.4"
name = "no_clip_or_overflow_at_375"
description = "At roughly 375px width, pane cards, header controls, and library content never clip or overflow the viewport at the page level."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.5"
name = "page_tabs_scrollable_on_mobile"
description = "At roughly 375px wide the page tabs stay scrollable and usable rather than disappearing or becoming unreachable."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.6"
name = "pane_grid_collapses_to_one_column"
description = "At roughly 375px wide the pane grid collapses to a single column with a logical stacking order and no overlapping panes."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.7"
name = "mobile_controls_tappable"
description = "At roughly 375px width, tap/click activation works on page tabs, Create Pane, date-range options, and pane Edit/Share controls."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.8"
name = "no_horizontal_scroll_at_375"
description = "At roughly 375px width the page does not produce horizontal scrolling at the page level."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.9"
name = "charts_and_grid_scale"
description = "Chart panes, data tables, and the pane grid size responsively with the viewport rather than staying a fixed overflowing size."
type = "binary"
weight = 1.0

[[criterion]]
id = "7.10"
name = "overlays_operable_at_small_widths"
description = "At roughly 375px wide the preview modal, pane wizard, Share panel, Export center, and saved-analysis views remain readable and operable without clipped controls."
type = "binary"
weight = 1.0

